review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: imperativo dirigido a Dios, vergüenza como objeto, cláusula final de propósito/resultado, y uso correcto de Yahvé para יְהוָה. También preserva la nota alternativa sobre וִיבַקְשׁוּ. Sin embargo, «el rostro de ellos» no representa con naturalidad ni con precisión estilística el plural פְנֵיהֶם en español bíblico fluido; la formulación más fiel y natural es «sus rostros».'
  spanish_quality_summary: La redacción es clara, pero «Llena el rostro de ellos de vergüenza» suena forzada y poco idiomática en español general y eclesial. «Llena sus rostros de vergüenza» conserva mejor la imagen hebrea, mejora la legibilidad, y evita un giro innecesariamente calcado. El resto del verso está bien resuelto.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: «Yahvé» para יְהוָה, «vergüenza» para קָלוֹן, y «tu nombre» para שִׁמְךָ. No hay conflicto teológico ni léxico mayor aparte del ajuste de «rostro» singular a «rostros» plural.'
  issues:
  - severity: medium
    issue: «el rostro de ellos» es una construcción poco natural y estilísticamente rígida
    rationale: Aunque intenta reflejar el hebreo, en español suena calco. «Sus rostros» transmite el plural hebreo con mejor fluidez y mantiene la imagen de vergüenza pública.
  - severity: low
    issue: Desajuste entre el texto y la decisión léxica sobre פְנֵיהֶם
    rationale: La evidencia fuente y la POB inglesa favorecen el plural «faces». La elección española en singular («el rostro») debilita esa correspondencia sin necesidad.
  revised_spanish_text: Llena sus rostros de vergüenza[a], para que busquen tu nombre, Yahvé.
