translation:
  language: es
  text: Ciertamente, tú los pones en lugares resbaladizos[a]; los haces caer en ruina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre suelo resbaladizo»; literalmente, «en lugares lisos».
    reason: lexical_alternative
  - marker: b
    text: O «los haces caer hasta la ruina» o «en desolaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Solo que
  alternatives_spanish:
  - Ciertamente
  - Seguro
  lexicon: HALOT
  rationale: La partícula marca contraste y énfasis en la conclusión del salmista. «Solo que» comunica bien el giro correctivo del contexto sin sonar artificial; mantiene la fuerza discursiva de «Surely».
- source_word: בַּחֲלָקוֹת
  english_pob_choice: in slippery places
  chosen_spanish: en lugares resbaladizos
  alternatives_spanish:
  - sobre suelo resbaladizo
  - en sitios lisos
  lexicon: HALOT
  rationale: El hebreo alude literalmente a «lugares lisos/suaves», pero en contexto expresa inestabilidad y peligro de caída. «Lugares resbaladizos» conserva la imagen y el resultado implícito con buen español.
- source_word: תָּשִׁית לָמוֹ
  english_pob_choice: you set them
  chosen_spanish: los pones
  alternatives_spanish:
  - los colocas
  - los sitúas
  lexicon: HALOT
  rationale: שׁית significa poner/colocar/poner en un lugar. «Los pones» es natural en español y preserva la acción directa dirigida por Dios a ellos.
- source_word: הִפַּלְתָּם
  english_pob_choice: you cast them down
  chosen_spanish: los haces caer
  alternatives_spanish:
  - los derribas
  - los arrojas abajo
  lexicon: HALOT
  rationale: 'El hifil de נפל tiene fuerza causativa: «hacer caer». En español, «los haces caer» expresa con claridad esa causalidad sin añadir un matiz más violento de lo que exige el verbo.'
- source_word: לְמַשּׁוּאוֹת
  english_pob_choice: to ruin
  chosen_spanish: en ruina
  alternatives_spanish:
  - a ruina
  - para destrucción
  lexicon: HALOT
  rationale: El sustantivo denota ruina/desolación. «En ruina» funciona de manera natural con la caída y mantiene el estado resultante; evita una abstracción innecesaria.
theological_decisions:
- issue: Agencia divina en la caída de los impíos
  english_pob_reading: 'The verse is rendered with direct divine action: ''you set... you cast them down,'' preserving the psalm''s attribution of judgment to God.'
  chosen_spanish_reading: 'El texto mantiene la acción directa de Dios: «tú los pones... los haces caer», sin diluir la atribución del juicio al sujeto divino.'
  alternative_spanish_readings:
  - Una versión más impersonal que enfatice circunstancias en vez de acción divina
  rationale: El hebreo usa verbos en segunda persona singular dirigidos a Dios. La traducción conserva esa atribución explícita del juicio y no la suaviza, siguiendo la tensión teológica del original.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La lectura inglesa revisada osciló entre 'you make them fall' y 'you cast them down'; la decisión española opta por una forma que conserve la causalidad sin perder naturalidad. También se integró la imagen de 'smooth/slippery places' mediante una expresión idiomática comprensible en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto del salmo, coherente con la dirección a la segunda persona.
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton explícito en esta forma hebrea; la referencia es el interlocutor divino del salmo.
  - «Ruina» conserva el campo semántico de desolación/derrumbe sin introducir un término litúrgico no requerido.
