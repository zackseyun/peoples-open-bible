translation:
  language: es
  text: Entonces David reunió a todo el pueblo y fue a Rabá, y luchó contra ella y la capturó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el ejército» o «todas las tropas»; el hebreo dice literalmente «todo el pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  - agrupó
  lexicon: HALOT
  rationale: אָסַף en este contexto narrativo expresa traer a las personas juntas. «Reunió» es natural en español y conserva la idea de congregar sin imponer una organización militar más específica que la que el hebreo explicita.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el ejército
  - todas las tropas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todo el pueblo». En este contexto probablemente se refiere a la fuerza de combate, pero el término usado es עָם, no un sustantivo militar más preciso. «Todo el pueblo» preserva el dato de la fuente y deja visible la amplitud del grupo.
- source_word: רַבָּתָה
  english_pob_choice: to Rabbah
  chosen_spanish: a Rabá
  alternatives_spanish:
  - a Rabbá
  - a Rabbat
  lexicon: HALOT
  rationale: Se trata del nombre propio de la ciudad, con movimiento hacia ella. «Rabá» es la forma habitual y natural en español bíblico; mantiene el referente geográfico sin introducir una transliteración menos transparente.
- source_word: וַיִּלָּחֶם בָּהּ
  english_pob_choice: fought against it
  chosen_spanish: luchó contra ella
  alternatives_spanish:
  - peleó contra ella
  - hizo guerra contra ella
  lexicon: HALOT
  rationale: לָחַם con ב indica entrar en batalla contra una ciudad. En español, «luchó contra ella» transmite bien la acción bélica y conserva el femenino gramatical del referente ciudad, que el hebreo marca con sufijo femenino.
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la apresó
  lexicon: HALOT
  rationale: לָכַד suele significar capturar o tomar una ciudad en contexto militar. «La capturó» es claro, preciso y fiel al matiz bélico del verbo.
translation_notes:
  revision_awareness: 'El texto español sigue el consenso alto del control de calidad: mantiene el sentido narrativo simple, conserva la literalidad de «todo el pueblo» en el cuerpo principal y solo explicita en nota la alternativa militar implícita en el contexto.'
  spanish_consistency_notes:
  - Se usó «Rabá» como forma española estable para el topónimo.
  - Se mantuvo el femenino singular en «ella/la» para reflejar la referencia pronominal hebrea a la ciudad.
  - No se introdujo lenguaje eclesiástico ni equivalentes interpretativos ajenos al hebreo.
