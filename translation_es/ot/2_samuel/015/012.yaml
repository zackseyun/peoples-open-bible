revisions:
- from: Y Absalón envió a Ahitofel el gilonita[a], consejero de David, desde su ciudad, desde Giló, mientras ofrecía los sacrificios. Y la conspiración se hizo fuerte[b], y el pueblo iba aumentando[c] con Absalón.
  to: Y Absalón mandó llamar a Ahitofel el gilonita[a], consejero de David, desde su ciudad, desde Giló, mientras ofrecía los sacrificios. Y la conspiración se fortaleció[b], y el pueblo iba aumentando[c] con Absalón.
  rationale: Se ajusta el verbo inicial para reflejar mejor el valor contextual de convocatoria de וַיִּשְׁלַח, conforme al análisis auditado. También se cambia ‘se hizo fuerte’ por ‘se fortaleció’, una formulación más natural en español para una conspiración y más acorde con la progresión del hebreo. Se conservan el resto de las decisiones porque representan fielmente el texto fuente y leen bien en español.
