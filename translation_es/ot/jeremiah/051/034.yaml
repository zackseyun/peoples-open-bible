  - severity: medium
    issue: Anclaje inadecuado de la nota sobre la personificación singular
    rationale: La nota c explica por qué se traduce el objeto como singular 'me', pero en el borrador está colocada en 'me ha arrojado[c]', donde no es el lugar más claro. Debe anclarse en una ocurrencia pertinente de 'me' o en una frase donde esa decisión se vea de inmediato.
