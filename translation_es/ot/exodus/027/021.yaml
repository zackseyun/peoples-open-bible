translation:
  language: es
  text: En el tabernáculo de reunión[a], fuera del velo[b] que está delante del testimonio[c], Aarón y sus hijos lo dispondrán delante de Yahvé desde la tarde hasta la mañana. Será estatuto perpetuo por todas sus generaciones, de los israelitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tienda de reunión». La expresión hebrea designa el lugar cultual de encuentro y no una reunión cualquiera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cortina». פָּרֹכֶת es el divisor interior del santuario; «velo» conserva el sentido cultual tradicional.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo lit. «sobre el testimonio». En este contexto, «el testimonio» probablemente alude a las tablas del pacto guardadas en el arca; por eso la frase describe la posición del velo delante del arca.
    reason: cultural_note
lexical_decisions:
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en el tabernáculo del encuentro
  - en la tienda de reunión
  lexicon: HALOT
  rationale: En español, 'tabernáculo de reunión' conserva el valor técnico-cultual de אֹהֶל מוֹעֵד y suena más natural y estable que una traducción más literal como 'tienda de reunión'.
- source_word: מִחוּץ לַפָּרֹכֶת
  english_pob_choice: outside the veil
  chosen_spanish: fuera del velo
  alternatives_spanish:
  - fuera de la cortina
  - al otro lado del velo
  lexicon: HALOT
  rationale: '''Velo'' mantiene el sentido cultual de פָּרֹכֶת, como hace la POB en inglés. ''Cortina'' es posible, pero ''velo'' preserva mejor el registro bíblico-técnico.'
- source_word: אֲשֶׁר עַל הָעֵדֻת
  english_pob_choice: that is before the testimony
  chosen_spanish: que está sobre el testimonio
  alternatives_spanish:
  - que está delante del testimonio
  - que está ante el testimonio
  lexicon: HALOT
  rationale: La preposición עַל admite aquí una relación espacial con el arca/testimonio. En español, 'sobre el testimonio' conserva la tensión del hebreo sin forzar una paráfrasis interpretativa; se deja la aclaración contextual en nota.
- source_word: יַעֲרֹךְ אֹתוֹ
  english_pob_choice: shall arrange it
  chosen_spanish: lo dispondrán
  alternatives_spanish:
  - lo arreglarán
  - lo pondrán en orden
  - lo arreglará
  lexicon: HALOT
  rationale: El verbo ערך puede significar arreglar, ordenar o disponer. 'Lo dispondrán' en plural concuerda con Aarón y sus hijos y suena natural en español litúrgico sin perder la idea de ordenación del servicio.
- source_word: מֵעֶרֶב עַד בֹּקֶר
  english_pob_choice: from evening until morning
  chosen_spanish: desde la tarde hasta la mañana
  alternatives_spanish:
  - de la tarde a la mañana
  - desde el anochecer hasta el amanecer
  lexicon: HALOT
  rationale: '''Tarde'' y ''mañana'' reflejan el par temporal del hebreo de manera clara y sobria. ''Anochecer/amanecer'' interpreta más de lo que dice el texto.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según la política del proyecto. 'Delante de' reproduce el idioma cultual de לִפְנֵי sin sonar rígido en español.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a perpetual statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto permanente
  - estatuto eterno
  lexicon: HALOT
  rationale: '''Estatuto perpetuo'' reproduce bien la fórmula legal-cultual sin intensificarla a una eternidad filosófica; sigue de cerca la revisión inglesa más estándar para עוֹלָם en este contexto.'
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - para todas sus generaciones
  lexicon: HALOT
  rationale: '''Por todas sus generaciones'' es una fórmula española natural que conserva el sentido de continuidad intergeneracional del hebreo.'
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the Israelites
  chosen_spanish: de parte de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - procedente de los hijos de Israel
  lexicon: HALOT
  rationale: La forma hebrea marca procedencia/origen. 'De parte de' mantiene esa noción relacional y permite que la cláusula final suene suficientemente formal en español bíblico.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. Siguiendo la política del proyecto y la decisión inglesa de no ocultarlo, se usa 'Yahvé' en lugar de un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Spatial phrase involving הָעֵדֻת and the veil
  english_pob_reading: that is before the testimony
  chosen_spanish_reading: que está sobre el testimonio
  alternative_spanish_readings:
  - que está delante del testimonio
  - que está por delante del testimonio
  rationale: El hebreo usa עַל, y la POB inglesa aclara el sentido espacial por el contexto del tabernáculo. En español se mantiene una formulación que no borra la relación con el testimonio y se acompaña con nota explicativa para preservar la tensión topográfica.
  doctrine_reference: HALOT; English POB cultural note
- issue: Force of חֻקַּת עוֹלָם in cultic legislation
  english_pob_reading: a perpetual statute
  chosen_spanish_reading: estatuto perpetuo
  alternative_spanish_readings:
  - estatuto permanente
  - estatuto eterno
  rationale: Se preserva el valor jurídico-cultual de la fórmula sin sobretraducirla como una afirmación metafísica absoluta. 'Perpetuo' sigue de cerca la revisión inglesa documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency/documented exception principle
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'permanent statute' por 'perpetual statute' para reflejar mejor חֻקַּת עוֹלָם, manteniendo intactas las demás decisiones léxicas y teológicas. Esta propuesta española sigue esa revisión con 'estatuto perpetuo' y conserva la estructura cultual del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino, conforme a la política del proyecto.
  - Se conserva un registro bíblico formal, evitando arcaísmos innecesarios.
  - '''Velo'' se usa como término técnico para פָּרֹכֶת; no se sustituye por ''cortina'' en el texto principal.'
  - '''Estatuto perpetuo'' refleja la fórmula legal de duración continua sin exagerarla.'
  - La secuencia temporal 'desde la tarde hasta la mañana' sigue de cerca el hebreo y la POB inglesa.
