  rationale: Se hizo una reparación menor para mejorar la claridad sintáctica en español, alinear la nota alternativa con el expediente inglés y usar una formulación más idiomática para el doble verbo 'huirán y se pondrán a salvo'. No hay cambio de sentido respecto del griego ni del POB inglés.
