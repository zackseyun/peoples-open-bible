translation:
  language: es
  text: Y nuestros padres descendieron a Egipto[a], y vivimos en Egipto muchos días[b], y los egipcios nos trataron mal[c] a nosotros y a nuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados» para «nuestros padres» en ambas apariciones; el hebreo dice literalmente «nuestros padres».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «muchos días», un modismo para un período largo.
    reason: lexical_alternative
  - marker: c
    text: O «maltrataron a nuestros padres y a nosotros» o «hicieron mal a nuestros padres y a nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron a
  lexicon: HALOT
  rationale: El verbo ירד conserva el movimiento hacia abajo o hacia un lugar inferior; en este contexto histórico-geográfico, «descendieron» mantiene la imagen bíblica y la dirección hacia Egipto sin sonar forzado en español.
- source_word: אֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres / antepasados
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «nuestros padres». En español, «nuestros padres» preserva la forma del original y el registro bíblico; el sentido de antepasados queda claro por el contexto histórico.
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - a la tierra de Egipto
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia un lugar. «A Egipto» es la equivalencia natural y fiel en español.
- source_word: וַנֵּשֶׁב
  english_pob_choice: we lived
  chosen_spanish: vivimos
  alternatives_spanish:
  - habitamos
  - residimos
  - nos establecimos
  lexicon: HALOT
  rationale: ישב aquí expresa residir o habitar. «Vivimos» comunica con claridad la permanencia prolongada sin cargar el español con arcaísmo.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - por mucho tiempo
  - largos años
  lexicon: HALOT
  rationale: La expresión es literalmente «muchos días». Se preserva esa forma en el texto principal para no perder la imagen y la redacción hebrea, dejando la idiomatización implícita.
- source_word: וַיָּרֵעוּ
  english_pob_choice: treated ... badly
  chosen_spanish: nos trataron mal
  alternatives_spanish:
  - nos maltrataron
  - nos hicieron daño
  - hicieron el mal contra nosotros
  lexicon: HALOT
  rationale: El hifil de רעע expresa hacer mal o causar daño. «Nos trataron mal» reproduce bien el valor negativo sin estrecharlo solo a abuso físico o institucional.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  - los habitantes de Egipto
  lexicon: HALOT
  rationale: Aunque la forma hebrea es «Egipto», el verbo plural exige un sujeto personal. «Los egipcios» explicita correctamente que se trata del pueblo de Egipto, no del territorio.
- source_word: לָנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: HALOT
  rationale: Tras «tratar mal», el objeto afectado en español se expresa naturalmente con clítico. «Nos» mantiene la fluidez y el valor de afectación.
- source_word: וְלַאֲבֹתֵינוּ
  english_pob_choice: and our fathers
  chosen_spanish: y a nuestros padres
  alternatives_spanish:
  - y a nuestros antepasados
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo con la misma expresión «nuestros padres», y se explicita la preposición «a» para el español natural con un objeto personal.
translation_notes:
  revision_awareness: 'Concordante con la edición auditada en inglés: se mantiene la estructura del versículo, el sentido direccional de ירד, la literalidad de «muchos días» y la ambigüedad semántica de רעע sin borrar la tensión entre «tratar mal» / «hacer el mal».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en todo el proyecto cuando corresponda; en este versículo no aparece el tetragrámaton.
  - Se preserva «nuestros padres» por fidelidad lexical, con nota alternativa para «antepasados».
  - El plural «los egipcios» refleja el sujeto verbal plural del hebreo.
  - Se mantiene un estilo bíblico moderno, claro y digno, sin arcaísmos innecesarios.
