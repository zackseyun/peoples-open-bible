  text: And they came up over the breadth of the earth and surrounded the camp of the saints and the beloved city[c][b][a]. And fire came down from heaven and consumed them.
  footnotes:
  - marker: a
    text: Or 'over the breadth of the earth.' The Greek expression is literally 'upon the breadth of the earth,' referring to a vast expanse.
    reason: lexical_alternative
  - marker: b
    text: Or 'encircled.'
    reason: lexical_alternative
  - marker: c
    text: The text does not explicitly identify 'the beloved city'; interpreters commonly understand it as Jerusalem or, more broadly, the city of God.
    reason: alternative_reading
