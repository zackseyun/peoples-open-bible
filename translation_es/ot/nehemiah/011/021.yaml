translation:
  language: es
  text: Y los servidores del templo habitaban en el Ofel[a], y Ziha y Gishpa estaban al frente de los servidores del templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo נְתִינִים (Nethinim), un término técnico para una clase asignada al servicio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netineos
  - los dados
  - los siervos
  lexicon: HALOT
  rationale: En este contexto postexílico, נְתִינִים es un término técnico para una clase asignada al servicio del templo. «Servidores del templo» comunica la función institucional con claridad en español, sin perder el valor técnico del término.
- source_word: יֹשְׁבִים
  english_pob_choice: were living
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - estaban viviendo
  - moraban
  lexicon: HALOT
  rationale: El participio indica residencia continua. «Habitaban» conserva mejor ese matiz durativo y es natural en español bíblico contemporáneo.
- source_word: בָּעֹפֶל
  english_pob_choice: on the Ophel
  chosen_spanish: en el Ofel
  alternatives_spanish:
  - sobre el Ofel
  - en el Ophel
  - en la loma del Ofel
  lexicon: HALOT
  rationale: עֹפֶל funciona aquí como nombre/topónimo tradicional. «Ofel» mantiene la referencia histórica y «en» expresa de manera idiomática la localización; «sobre» podría sugerir demasiado la forma topográfica y no es imprescindible en español.
- source_word: צִיחָא
  english_pob_choice: Ziha
  chosen_spanish: Ziha
  alternatives_spanish:
  - Sija
  - Tziha
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se conserva «Ziha» para mantener continuidad con la convención de la base inglesa y evitar crear una forma castellana no atestiguada por el expediente.
- source_word: גִשְׁפָּא
  english_pob_choice: Gishpa
  chosen_spanish: Gispá
  alternatives_spanish:
  - Gishpa
  - Guishpa
  lexicon: nombre propio
  rationale: Nombre propio transliterado con adaptación gráfica mínima al español. Se opta por «Gispá» para una pronunciación más natural en español, manteniendo la cercanía al hebreo.
- source_word: עַל
  english_pob_choice: were over
  chosen_spanish: estaban sobre
  alternatives_spanish:
  - estaban al frente de
  - supervisaban a
  - estaban encargados de
  lexicon: HALOT
  rationale: En este contexto administrativo, עַל expresa autoridad u oversight. «Estaban sobre» sigue de cerca el hebreo y conserva la relación jerárquica sin añadir una explicación interpretativa excesiva.
theological_decisions:
- issue: Término técnico postexílico נְתִינִים
  english_pob_reading: the temple servants
  chosen_spanish_reading: los servidores del templo
  alternative_spanish_readings:
  - los netineos
  - los siervos del templo
  rationale: 'La decisión principal es funcional: el texto identifica una clase adscrita al servicio del templo. En español, «servidores del templo» comunica esa función sin oscurecer el carácter técnico del grupo. Se evita «los netineos» en el texto principal porque traslada el término pero reduce claridad para lectores generales.'
  doctrine_reference: Neh 11:21; término histórico-administrativo del período postexílico
translation_notes:
  revision_awareness: 'El expediente inglés fue revisado y quedó sin cambios en el último pase, con alto acuerdo entre revisores. La redacción española sigue esa lectura estable: residencia continua de los נְתִינִים en el Ofel, y autoridad administrativa de Ziha y Gispá sobre ese grupo.'
  spanish_consistency_notes:
  - Se mantiene «templo» en singular para el grupo técnico נְתִינִים, conforme al sentido institucional del pasaje.
  - 'Se conserva el orden hebreo básico de las cláusulas: residencia del grupo primero y luego la relación de autoridad de Ziha y Gispá.'
  - «Ofel» se escribe con mayúscula por tratarse de un topónimo.
  - Se usa «Gispá» como adaptación gráfica española de Gishpa, evitando una transliteración demasiado anglicada.
