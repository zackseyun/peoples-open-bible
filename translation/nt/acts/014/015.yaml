theological_decisions:
- issue: Human status of Paul and Barnabas in contrast to divine honors
  chosen_reading: We also are men with the same nature as you
  alternative_readings:
  - We too are only human, like you
  - We are of like passions with you
  rationale: The verse rejects any implication that the apostles are divine beings. The chosen wording preserves the shared-humanity emphasis without archaic phrasing and without reducing the statement to mere emotion.
  doctrine_reference: Affirmations; Translation philosophy 6
- issue: Scope of 'worthless things'
  chosen_reading: broad anti-idolatry language rather than explicit 'idols' in the main text
  alternative_readings:
  - idols
  rationale: The immediate context concerns attempted pagan sacrifice, so idols are in view; however, the Greek adjective with the article is broader than a direct noun for idols. The main text preserves the source wording, while a footnote can clarify the contextual sense.
  doctrine_reference: Translation philosophy 1, 3, 5
