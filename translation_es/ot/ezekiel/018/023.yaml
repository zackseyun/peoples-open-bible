translation:
  language: es
  text: ¿Acaso me complazco en absoluto en la muerte del malvado? —declara el Señor Yahvé[a][b]. ¿No está más bien en que se vuelva de sus caminos y viva[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Acaso me deleito en la muerte del malvado?». El verbo hebreo puede expresar placer, deleite o deseo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «declara el Señor Yahvé» (אֲדֹנָי יְהוִה). El nombre divino יְהוָה se vierte normalmente «Yahvé» en este proyecto; en el título compuesto se conservan ambos elementos.'
    reason: lexical_alternative
  - marker: c
    text: O «cuando se vuelve de sus caminos y vive».
    reason: alternative_reading
lexical_decisions:
- source_word: הֶחָפֹץ אֶחְפֹּץ
  english_pob_choice: Do I take any pleasure at all
  chosen_spanish: ¿Acaso quiero yo... ?
  alternatives_spanish:
  - ¿Acaso me complazco yo... ?
  - ¿Acaso me deleito yo... ?
  - ¿De veras deseo yo... ?
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la pregunta. En español, una pregunta retórica con «¿Acaso quiero yo...?» conserva el énfasis y la fuerza volitiva/afectiva sin sonar rígida ni forzar una paráfrasis excesiva.
- source_word: מוֹת
  english_pob_choice: the death
  chosen_spanish: la muerte
  alternatives_spanish:
  - el morir
  - la muerte de
  lexicon: HALOT
  rationale: El sustantivo nombra el evento de la muerte; «la muerte» refleja directamente el hebreo y encaja con el genitivo siguiente.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: del malvado
  alternatives_spanish:
  - del impío
  - del culpable
  - del perverso
  lexicon: HALOT
  rationale: «Malvado» comunica bien el sustantivo/adjetivo hebreo en español contemporáneo y evita un calco que suene demasiado técnico. Se conserva el singular representativo.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  - oráculo de
  lexicon: HALOT
  rationale: En la fórmula profética, «declara» transmite la solemnidad y el acto de habla autorizante con claridad natural en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir יְהוִה como «Yahvé» en el texto principal. En español, «Señor Yahvé» preserva ambos títulos sin recurrir al enmascaramiento «SEÑOR» y evita la repetición artificial «Señor Señor».
- source_word: הֲלוֹא
  english_pob_choice: Is it not rather
  chosen_spanish: ¿No es más bien
  alternatives_spanish:
  - ¿No es acaso
  - ¿No es más bien cierto que
  lexicon: HALOT
  rationale: La partícula introduce una respuesta positiva esperada y contraste con la pregunta anterior. «Más bien» reproduce bien el giro contrastivo implícito en el discurso.
- source_word: בְּשׁוּבוֹ
  english_pob_choice: in his turning
  chosen_spanish: en su volver
  alternatives_spanish:
  - cuando se vuelve
  - en su arrepentirse
  - al volverse
  lexicon: HALOT
  rationale: La construcción preposicional con infinitivo se conserva de manera cercana. «Volver» mantiene el movimiento de regreso/cambio de dirección sin resolver demasiado pronto la carga de arrepentimiento.
- source_word: מִדְּרָכָיו
  english_pob_choice: from his ways
  chosen_spanish: de sus caminos
  alternatives_spanish:
  - de su conducta
  - de sus sendas
  - de sus maneras de obrar
  lexicon: HALOT
  rationale: «Caminos» es la metáfora bíblica habitual para conducta y se conserva por fidelidad y resonancia teológica.
- source_word: וְחָיָה
  english_pob_choice: and living
  chosen_spanish: y vivir
  alternatives_spanish:
  - y viva
  - y tenga vida
  lexicon: HALOT
  rationale: El infinitivo/forma verbal final se vierte naturalmente como «y vivir», manteniendo el paralelismo con «en su volver» y la simplicidad del hebreo.
theological_decisions:
- issue: ¿Placer, deleite o deseo divino en la muerte del malvado?
  english_pob_reading: The verse is rendered as a rhetorical denial that God delights in the death of the wicked, with the positive alternative being the wicked person's turning and living.
  chosen_spanish_reading: La pregunta se formula como una negación retórica de que Yahvé quiera la muerte del malvado, dejando la alternativa positiva en su volver y vivir.
  alternative_spanish_readings:
  - ¿Acaso me deleito en la muerte del malvado?
  - ¿Acaso deseo yo la muerte del malvado?
  rationale: חפץ puede abarcar placer, deleite o deseo. «Quiero» conserva el campo volitivo-afectivo sin fijar de antemano una sola matización y mantiene la tensión teológica del texto entre juicio y misericordia.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: ¿Cómo reflejar el título divino compuesto אֲדֹנָי יְהוִה?
  english_pob_reading: the Lord GOD, with the divine name normally rendered LORD and 'GOD' used to avoid 'Lord LORD'.
  chosen_spanish_reading: Se traduce como «el Señor Yahvé», preservando ambos elementos del título en español.
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor, Yahvé
  - el Señor Yahveh
  rationale: El proyecto pide traducir יְהוִה como «Yahvé» en el texto principal. «El Señor Yahvé» comunica el compuesto sin ocultar el nombre divino y evita una solución tipográfica ajena al estándar español de este proyecto.
  doctrine_reference: Tratamiento del nombre divino y del título compuesto
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente sin cambios sustanciales; el veredicto global fue de coincidencia moderada con observaciones menores. Se mantuvo la tensión léxica de חפץ y la estructura retórica del hebreo, ajustando el español para que suene natural sin perder la relación directa con la fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוִה conforme al criterio del proyecto.
  - Se conserva el paralelo entre «volver» y «vivir» para reflejar בְּשׁוּבוֹ ... וְחָיָה.
  - No se introduce «arrepentirse» en el texto principal para no fijar de más la lectura de שׁוּב; queda como posibilidad implícita.
  - «Malvado» se usa como equivalente representativo de רָשָׁע en singular genérico.
