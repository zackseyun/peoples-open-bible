translation:
  language: es
  text: Pero yo soy pobre y necesitado; el Señor piensa en mí. Tú eres mi ayuda y mi libertador; mi Dios[a], no tardes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Señor tiene consideración por mí» o «el Señor pensará en mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La conjunción con pronombre independiente expresa contraste con el contexto anterior; «Pero yo» comunica mejor esa oposición en español natural.
- source_word: עָנִי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - afligido
  - humilde
  lexicon: HALOT
  rationale: En paralelo con «necesitado», «pobre» conserva el valor de condición baja o indigente sin sobrerrefinar el matiz.
- source_word: וְאֶבְיוֹן
  english_pob_choice: and needy
  chosen_spanish: y necesitado
  alternatives_spanish:
  - y menesteroso
  - y pobre
  lexicon: HALOT
  rationale: «Necesitado» distingue el segundo término del primero y mantiene la pareja poética עני ואביון sin nivelar ambos vocablos.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - mi Señor
  lexicon: HALOT
  rationale: Se trata del título divino אֲדֹנָי, no del Tetragrámaton. En español, «el Señor» conserva el valor reverencial y el uso eclesial, manteniendo la distinción con Yahvé en el sistema del proyecto.
- source_word: יַחֲשָׁב לִי
  english_pob_choice: thinks of me
  chosen_spanish: piensa en mí
  alternatives_spanish:
  - tiene en cuenta mi causa
  - me considera
  - hace caso de mí
  lexicon: HALOT
  rationale: חשב con ל puede significar pensar, considerar o tener en cuenta. «Piensa en mí» comunica el sentido relacional y evita forzar un valor técnico de cómputo o un futuro que el hebreo no exige.
- source_word: עֶזְרָתִי
  english_pob_choice: my help
  chosen_spanish: mi ayuda
  alternatives_spanish:
  - mi auxilio
  - mi socorro
  lexicon: HALOT
  rationale: El sustantivo denota ayuda o asistencia; «mi ayuda» es directo y conserva el paralelismo poético.
- source_word: וּמְפַלְטִי
  english_pob_choice: and my deliverer
  chosen_spanish: y mi libertador
  alternatives_spanish:
  - y mi salvador
  - y mi rescatador
  lexicon: HALOT
  rationale: El participio funciona sustantivamente como el que libra o rescata. «Libertador» expresa bien la fuerza verbal y la liberación efectiva en registro bíblico natural para español.
- source_word: אַתָּה
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Eres tú
  lexicon: HALOT
  rationale: El pronombre explícito marca énfasis; en español se necesita la cópula para una cláusula fluida y clara.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  - oh Dios mío
  lexicon: HALOT
  rationale: El sufijo posesivo indica relación personal. «Mi Dios» es fiel y directo; el valor vocativo queda claro por el contexto.
- source_word: אַל תְּאַחַר
  english_pob_choice: do not delay
  chosen_spanish: no tardes
  alternatives_spanish:
  - no te demores
  - no te detengas
  - no tardes en venir
  lexicon: HALOT
  rationale: El mandato negativo pide prontitud. «No tardes» es una equivalencia natural y breve que preserva la urgencia del ruego.
theological_decisions:
- issue: Traducción del título divino אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - mi Señor
  rationale: El hebreo usa אֲדֹנָי, título divino, no יהוה. Por eso no corresponde el tratamiento reservado al nombre divino Yahvé en el texto principal; «el Señor» mantiene la distinción y la inteligibilidad litúrgica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms policy for YHWH and divine titles'
- issue: Sentido de יַחֲשָׁב לִי
  english_pob_reading: the Lord thinks of me
  chosen_spanish_reading: piensa en mí
  alternative_spanish_readings:
  - tiene en cuenta mi causa
  - me considera
  - guarda consideración por mí
  rationale: El hebreo admite la idea de pensar, considerar o tener en cuenta. Se conserva la relación personal sin cerrar la amplitud semántica ni imponer una lectura más técnica de providencia.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; se mantiene una alineación alta con la auditoría inglesa y no se introducen reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se conserva el paralelismo pobre/necesitado con dos adjetivos diferenciados.
  - El título divino se traduce como «el Señor» para אֲדֹנָי, mientras que Yahvé queda reservado para יהוה según la convención del proyecto.
  - Se mantiene el tono de súplica breve y urgente en la segunda hemistiquio.
  - «Libertador» preserva el valor activo del participio hebreo sin caer en una paráfrasis extensa.
