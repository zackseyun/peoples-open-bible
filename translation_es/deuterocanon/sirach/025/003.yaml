translation:
  language: es
  text: Un hombre pobre orgulloso, y un hombre rico que miente[a], y un anciano que comete adulterio y carece de entendimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo מְכַחֵשׁ también puede significar 'engaña' o 'niega'; el griego paralelo tiene 'mentiroso', lo que apoya 'que miente'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo 'carece de entendimiento' también puede traducirse 'está sin entendimiento' o 'le falta juicio'; el griego de modo similar dice 'disminuido en entendimiento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּל
  english_pob_choice: poor man
  chosen_spanish: hombre pobre
  alternatives_spanish:
  - pobre
  - persona pobre
  - el pobre
  lexicon: HALOT
  rationale: דל designa a alguien pobre o de condición baja. En español, 'hombre pobre' conserva la singularidad masculina del hebreo y su valor descriptivo directo.
- source_word: גֵּאֶה
  english_pob_choice: proud
  chosen_spanish: orgulloso
  alternatives_spanish:
  - soberbio
  - altivo
  - arrogante
  lexicon: HALOT
  rationale: El adjetivo expresa elevación propia o arrogancia. 'Orgulloso' es natural en español y mantiene el matiz moral sin volverlo innecesariamente arcaico.
- source_word: וְעָשִׁיר
  english_pob_choice: and a rich man
  chosen_spanish: y un hombre rico
  alternatives_spanish:
  - y el hombre rico
  - y un rico
  lexicon: HALOT
  rationale: עָשִׁיר significa rico o adinerado. 'Un hombre rico' conserva la estructura singular y el paralelismo con la primera cola.
- source_word: מְכַחֵשׁ
  english_pob_choice: who lies
  chosen_spanish: que miente
  alternatives_spanish:
  - que engaña
  - que niega
  - mentiroso
  lexicon: HALOT
  rationale: El participio de כחש puede abarcar mentir, engañar o negar. La tradición de la POB inglesa, apoyada por el paralelo griego ψεύστην, favorece 'que miente'.
- source_word: וְזָקֵן
  english_pob_choice: and an old man
  chosen_spanish: y un anciano
  alternatives_spanish:
  - y un hombre viejo
  - y un hombre anciano
  lexicon: HALOT
  rationale: זקן aquí se refiere a un hombre de edad avanzada, no a un cargo. 'Anciano' es claro y sobrio en español.
- source_word: מְנָאֵף
  english_pob_choice: who commits adultery
  chosen_spanish: que comete adulterio
  alternatives_spanish:
  - adúltero
  - que es adúltero
  lexicon: HALOT
  rationale: El participio indica la acción de adulterar. La forma verbal conserva el paralelismo con los otros participios descriptivos.
- source_word: וַחֲסַר דַּעַת
  english_pob_choice: and lacks sense
  chosen_spanish: y carece de entendimiento
  alternatives_spanish:
  - y está sin entendimiento
  - y le falta juicio
  - y carece de juicio
  lexicon: HALOT
  rationale: La expresión significa faltar conocimiento o entendimiento; el paralelo griego ἐλαττούμενον συνέσει apunta a deficiencia en comprensión. 'Carece de entendimiento' es fiel y natural.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego en Sirácida 25:3
  english_pob_reading: Translate the extant Hebrew line directly while using the Greek to confirm the sense of disputed terms.
  chosen_spanish_reading: Traducir directamente el hebreo conservado, dejando que el griego confirme el sentido de 'miente' y 'carece de entendimiento'.
  alternative_spanish_readings:
  - 'Traducir más libremente desde el griego: ''un pobre orgulloso, un rico mentiroso y un anciano adúltero sin entendimiento'''
  rationale: El proyecto privilegia el hebreo donde está preservado en Sirácida, pero el paralelo griego sirve como control semántico. La redacción española sigue el hebreo sin perder el acuerdo sustancial entre ambas tradiciones.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácida sobrevive; usar el paralelo griego como insumo real de traducción'
- issue: Riesgo de forzar una etiqueta nominal en lugar de una descripción verbal
  english_pob_reading: A poor man who is proud, and a rich man who lies, and an old man who commits adultery and lacks sense.
  chosen_spanish_reading: Un hombre pobre que es orgulloso[a], y un hombre rico que miente[b], y un anciano que comete adulterio y carece de entendimiento.
  alternative_spanish_readings:
  - Un hombre pobre orgulloso, y un hombre rico mentiroso, y un anciano adúltero sin entendimiento
  rationale: Las formas verbales conservan el carácter participial del hebreo y evitan convertir toda la línea en una lista de sustantivos/adjetivos. Esto mantiene el paralelismo y la fuerza acusatoria del verso.
  doctrine_reference: 'PHILOSOPHY.md: preservar la forma y la fuerza del original cuando el español lo permite'
translation_notes:
  revision_awareness: Se corrigió la validación anterior haciendo explícitos en el texto español los marcadores [a] y [b] junto a los términos correspondientes. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene 'entendimiento' para συνέσει / דַּעַת, en línea con la decisión inglesa de preservar la fuerza intelectual-moral.
  - Se traduce Sirácida de forma directa y sobria, con registro bíblico contemporáneo pero no arcaizante.
  - Se evita reemplazar el hebreo participial por sustantivos cuando el español puede conservar mejor la dinámica descriptiva.
