translation:
  language: es
  text: 'Y estos son los que no deben comer de entre ellos: el águila[a], el quebrantahuesos y el buitre negro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación de los nombres hebreos de estas aves es incierta. 'Águila' quizá puede referirse a un buitre grande; 'quebrantahuesos' corresponde tradicionalmente a 'ossifrage'; y algunos traducen 'buitre negro' como 'águila marina' o 'halcón pescador'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Y esto es
  - Ahora estos son
  lexicon: HALOT
  rationale: El hebreo usa una forma singular, pero introduce una lista; en español, el plural 'estos son' comunica mejor la enumeración sin perder el valor deíctico del original.
- source_word: אֲשֶׁר לֹא תֹאכְלוּ מֵהֶם
  english_pob_choice: that you shall not eat from among them
  chosen_spanish: que no comerán de entre ellos
  alternatives_spanish:
  - que no comerán de ellos
  - que no deben comer de entre ellos
  lexicon: HALOT
  rationale: Mantiene la prohibición directa y el sentido partitivo de מִן, expresado naturalmente en español con 'de entre ellos'.
- source_word: הַנֶּשֶׁר
  english_pob_choice: the eagle
  chosen_spanish: el águila
  alternatives_spanish:
  - el buitre grande
  - el gran ave de rapiña
  lexicon: HALOT
  rationale: Sigo la decisión auditada de la POB en inglés, que conserva 'eagle' como glosa tradicional, aunque reconociendo que el término hebreo puede abarcar un ave carroñera o rapaz de gran tamaño.
- source_word: הַפֶּרֶס
  english_pob_choice: the bearded vulture
  chosen_spanish: el quebrantahuesos
  alternatives_spanish:
  - el buitre barbudo
  - el lammergayer
  lexicon: HALOT
  rationale: '''Quebrantahuesos'' es el nombre español más establecido y comunica la especie moderna a la que normalmente se refiere la identificación tradicional; conserva la precisión zoológica sin usar un arcaísmo.'
- source_word: הָעָזְנִיָּה
  english_pob_choice: the black vulture
  chosen_spanish: el buitre negro
  alternatives_spanish:
  - el águila marina
  - el halcón pescador
  lexicon: HALOT
  rationale: La POB inglesa adopta una identificación moderna ('black vulture') y preserva la incertidumbre en nota; en español, 'buitre negro' es la equivalencia natural y transparente.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje fuente; la redacción sigue de cerca el texto hebreo y la solución auditada en inglés, conservando la nota de incertidumbre zoológica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'águila' en el texto principal para reflejar la glosa auditada en inglés, con nota explicativa por la incertidumbre del término hebreo.
  - '''Quebrantahuesos'' se prefiere sobre ''ossifrage'' por claridad para el lector en español.'
  - '''Buitre negro'' conserva la decisión moderna de identificación y la ambigüedad documentada.'
