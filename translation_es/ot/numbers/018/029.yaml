translation:
  language: es
  text: De todos sus dones ofrecerán[a] toda ofrenda de Yahvé; de toda su mejor parte[b], su porción santa[c] de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «elevarán»; el verbo hebreo conserva la imagen ritual de alzar una porción como contribución sagrada.
    reason: lexical_alternative
  - marker: b
    text: O «su grasa», es decir, su porción más escogida; aquí el hebreo puede referirse a la parte mejor o más rica de la ofrenda.
    reason: lexical_alternative
  - marker: c
    text: O «su porción consagrada».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל / From all
  english_pob_choice: From all
  chosen_spanish: De todas
  alternatives_spanish:
  - De todo
  - De entre todas
  lexicon: HALOT
  rationale: 'La preposición מִן con כֹּל expresa origen o separación: la ofrenda se toma del total de los dones. En español, «De todas» conserva bien la idea distributiva y suena natural con «sus ofrendas».'
- source_word: מַתְּנֹתֵיכֶם / your gifts
  english_pob_choice: your gifts
  chosen_spanish: sus ofrendas
  alternatives_spanish:
  - sus dones
  - sus contribuciones
  lexicon: HALOT
  rationale: El contexto sacerdotal hace que estas «ofrendas» sean porciones dadas para el culto. «Ofrendas» comunica mejor el valor cultual que un genérico «regalos», sin perder la referencia a dones presentados.
- source_word: תָּרִימוּ / you shall offer
  english_pob_choice: you shall offer
  chosen_spanish: levantarán
  alternatives_spanish:
  - presentarán
  - ofrecerán
  lexicon: HALOT
  rationale: La forma hifil de רוּם conserva el trasfondo técnico de «elevar/levantar» una porción para consagrarla. En español, «levantarán» mantiene esa imagen cultual sin sonar tan forzado como una traducción más literal. Aunque el inglés POB revisó hacia «offer», el hebreo sigue motivando la imagen de elevación.
- source_word: תְּרוּמַת יְהוָה / offering of Yahweh
  english_pob_choice: offering of Yahweh
  chosen_spanish: ofrenda de Yahvé
  alternatives_spanish:
  - contribución de Yahvé
  - ofrenda elevada de Yahvé
  lexicon: HALOT
  rationale: תרומה es un término técnico para porción alzada o contribución sagrada. «Ofrenda de Yahvé» es breve, clara y fiel al nombre divino según la norma del proyecto. «Ofrenda elevada» sería más explícita, pero menos natural en español.
- source_word: חֶלְבּוֹ / its best part
  english_pob_choice: from all its best part
  chosen_spanish: su mejor
  alternatives_spanish:
  - su grasa
  - su parte más selecta
  lexicon: HALOT
  rationale: חֵלֶב puede significar literalmente «grasa», pero aquí el contexto de ofrenda permite el sentido idiomático de la porción más rica o escogida. «Su mejor» mantiene esa tensión sin decidir prematuramente entre «grasa» y «parte selecta»; la nota explica la alternativa lexical.
- source_word: מִקְדְּשׁוֹ / its holy portion
  english_pob_choice: its holy portion
  chosen_spanish: su porción santa
  alternatives_spanish:
  - su porción consagrada
  - su porción santificada
  lexicon: HALOT
  rationale: El sufijo exige que la frase sea posesiva. «Porción santa» conserva el valor cultual de lo apartado para Dios y evita la ambigüedad de un simple «santo». «Consagrada» es una alternativa válida, pero «santa» responde mejor al paralelismo con el hebreo.
- source_word: מִמֶּנּוּ / from it
  english_pob_choice: from it
  chosen_spanish: de ello
  alternatives_spanish:
  - de ella
  - de él
  lexicon: HALOT
  rationale: El pronombre retoma la ofrenda/porción de manera colectiva e indefinida. «De ello» evita elegir género en español y refleja bien la referencia inclusiva del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la convención del proyecto, se conserva el nombre propio del pacto como «Yahvé», en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de חֵלֶב en contexto sacrificial
  english_pob_reading: its best part
  chosen_spanish_reading: su mejor
  alternative_spanish_readings:
  - su grasa
  - su parte más selecta
  rationale: El contexto permite la tensión entre el sentido literal de «grasa» y el sentido idiomático de «porción más escogida». La redacción española mantiene la ambigüedad útil sin borrar el trasfondo sacrificial, que queda aclarado en la nota.
  doctrine_reference: Lexical theology of sacrificial portions in priestly legislation
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de una expresión más literal con «lift up» a «offer», y de «the holy portion» a «its holy portion». La redacción española intenta equilibrar ambas observaciones: mantiene la imagen cultual de elevación con «levantarán», pero la naturaliza en el flujo de la oración, y refleja el posesivo del segundo colon con «su porción santa».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evita «SEÑOR» porque ocultaría el nombre divino presente en el hebreo.
  - «Porción santa» conserva mejor el registro cultual que «porción consagrada» en esta línea breve.
  - La expresión «de ello» se usa para no forzar género donde el hebreo es referencialmente neutro.
