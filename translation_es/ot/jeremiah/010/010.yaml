translation:
  language: es
  text: Pero Yahvé es el Dios verdadero[a][b]; él es el Dios vivo y el Rey eterno[c]. Ante su indignación, la tierra tiembla, y las naciones no pueden soportar su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y Yahvé»; la conjunción también puede leerse de modo simplemente conectivo, pero aquí probablemente introduce contraste con los ídolos del contexto inmediato.'
    reason: alternative_reading
  - marker: b
    text: O «Dios de verdad». La expresión probablemente significa «el Dios verdadero» en contraste con los dioses falsos.
    reason: lexical_alternative
  - marker: c
    text: O «el Rey perdurable».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: But Yahweh
  chosen_spanish: Pero Yahvé
  alternatives_spanish:
  - Yahvé
  - Y el Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícitamente como 'Yahvé', conforme al criterio del proyecto para יהוה. El conector inicial se vierte como 'Pero' para reflejar el contraste retórico con los ídolos del contexto inmediato, tal como lo documenta el audit trail inglés.
- source_word: אֱלֹהִים אֱמֶת
  english_pob_choice: the true God
  chosen_spanish: el Dios verdadero
  alternatives_spanish:
  - Dios de verdad
  - el Dios de verdad
  - un Dios verdadero
  lexicon: HALOT
  rationale: 'La construcción se entiende predicativamente: Yahvé es ''el Dios verdadero'' en oposición a los dioses falsos. ''Dios de verdad'' es posible, pero en español suena menos natural y debilita el contraste polémico que el POB inglés preserva.'
- source_word: אֱלֹהִים חַיִּים
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios que vive
  - un Dios vivo
  lexicon: HALOT
  rationale: '''Dios vivo'' es la forma natural en español bíblico y conserva el contraste entre el Dios vivo y los ídolos sin vida. No se sustituye por una paráfrasis más explicativa.'
- source_word: וּמֶלֶךְ עוֹלָם
  english_pob_choice: and the everlasting King
  chosen_spanish: y el Rey eterno
  alternatives_spanish:
  - y el Rey para siempre
  - y el Rey perdurable
  - y el Rey eterno
  lexicon: HALOT
  rationale: '''עוֹלָם'' expresa permanencia indefinida; ''eterno'' transmite bien esa duración en español digno y claro. ''Rey eterno'' mantiene la estructura nominal y la solemnidad del pasaje.'
- source_word: מִקִּצְפּוֹ
  english_pob_choice: At his wrath
  chosen_spanish: Ante su indignación
  alternatives_spanish:
  - A causa de su ira
  - Por su ira
  - Ante su ira
  lexicon: HALOT
  rationale: La preposición con el sustantivo de ira sugiere reacción o consecuencia. 'Ante su indignación' comunica el efecto producido por la ira divina sin reducirla a una simple causa mecánica. 'Indignación' preserva el matiz judicial/solemne que el POB inglés también favorece.
- source_word: תִּרְעַשׁ הָאָרֶץ
  english_pob_choice: the earth quakes
  chosen_spanish: la tierra tiembla
  alternatives_spanish:
  - la tierra se estremece
  - la tierra se conmueve
  - la tierra quiebra
  lexicon: HALOT
  rationale: רעש denota temblor o sacudida; 'tiembla' es idiomático y claro en español. 'La tierra' conserva el alcance cósmico del verso mejor que 'el país' o 'la tierra firme'.
- source_word: וְלֹא יָכִלוּ גוֹיִם
  english_pob_choice: and the nations cannot endure
  chosen_spanish: y las naciones no pueden soportar
  alternatives_spanish:
  - y las naciones no pueden resistir
  - y las naciones no pueden sostener
  - y los pueblos no pueden soportar
  lexicon: HALOT
  rationale: יָכִלוּ expresa incapacidad de mantenerse frente a algo abrumador. 'Soportar' comunica bien la fuerza del hebreo y armoniza con el contexto de juicio. 'Naciones' mantiene el sentido político-colectivo de גוֹיִם.
- source_word: זַעְמוֹ
  english_pob_choice: his indignation
  chosen_spanish: su furor
  alternatives_spanish:
  - su indignación
  - su ira
  - su enojo
  lexicon: HALOT
  rationale: Se opta por 'furor' en la clausula final para reflejar la intensidad de זַעַם. Aunque 'indignación' es posible, 'furor' resulta más natural en español al final de la línea y conserva la severidad del juicio divino.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el criterio del proyecto de usar el nombre divino de forma explícita. 'Yahvé' es la forma española establecida para el Tetragrama en este marco, evitando el ocultamiento del nombre mediante 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Conector inicial וַ־ en contraste con el contexto
  english_pob_reading: But Yahweh
  chosen_spanish_reading: Pero Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Y también Yahvé
  rationale: El contexto inmediato contrasta a Yahvé con los ídolos; por eso 'Pero' reproduce la lectura adversativa que el POB inglés documenta, sin añadir contenido ajeno al texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; la versión inglesa más reciente quedó marcada como unchanged, con alto acuerdo en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה, conforme al criterio del proyecto.
  - Se conserva 'Dios' para אֱלֹהִים y no se sustituye por una formulación más explicativa.
  - Se distingue el tono solemne de 'indignación/furor' según el contexto judicial del verso.
  - La puntuación sigue el ritmo poético del hebreo y de la versión inglesa auditada.
