translation:
  language: es
  text: Y durmió Roboam con sus padres, y fue sepultado con sus padres en la ciudad de David. Y el nombre de su madre era Naama la amonita[a]. Y reinó en su lugar Abiyam[b], su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un gentilicio femenino explícito; por eso se traduce simplemente 'la amonita' sin añadir 'mujer'.
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea de este versículo dice 'Abiyam'; en otros pasajes el mismo rey aparece como 'Abías'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: En las fórmulas reales de muerte, שׁכב con 'con sus padres' expresa el fallecimiento de manera convencional. En español, 'se acostó' conserva esa fórmula sin recurrir a una interpretación más explícita como 'murió'.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus ancestros
  lexicon: HALOT
  rationale: La expresión es una fórmula dinástica de muerte/sepultura. 'Padres' mantiene la correspondencia formal y el eco bíblico; 'antepasados' explicaría el sentido, pero suaviza la formulación recibida.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue depositado en sepultura
  lexicon: HALOT
  rationale: קבר se refiere al acto de dar sepultura. 'Fue sepultado' es natural en español bíblico y conserva el tono formal del pasaje.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David el rey
  lexicon: HALOT
  rationale: Es la designación estable del lugar de sepultura real. La forma española tradicional y clara es 'la ciudad de David'.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: And his mother's name was
  chosen_spanish: Y el nombre de su madre era
  alternatives_spanish:
  - Y su madre se llamaba
  lexicon: HALOT
  rationale: La construcción hebrea de aviso genealógico queda bien reflejada con una frase nominal directa. 'El nombre de su madre era' conserva la forma formularia sin añadir matices no presentes.
- source_word: נַעֲמָה הָעַמֹּנִית
  english_pob_choice: Naamah the Ammonite
  chosen_spanish: Naama la amonita
  alternatives_spanish:
  - Naama, la mujer amonita
  - Naama la ammonita
  lexicon: HALOT
  rationale: El gentilicio femenino hebreo se traduce naturalmente como 'la amonita'. La revisión inglesa descartó añadir 'woman'; en español tampoco hace falta expandirlo, porque el gentilicio ya implica identidad femenina en este contexto.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - fue rey
  lexicon: HALOT
  rationale: מלך en esta fórmula sucesoria se rinde de manera directa con 'reinó', que es idiomático y fiel.
- source_word: אֲבִיָּם
  english_pob_choice: Abijam
  chosen_spanish: Abiyam
  alternatives_spanish:
  - Abijam
  - Abías
  lexicon: HALOT
  rationale: La forma consonántica de este versículo corresponde a אֲבִיָּם, por lo que conviene reflejarla como 'Abiyam'. Se preserva así la lectura específica del versículo, aunque otros pasajes usen la variante 'Abías'.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: El modismo de sucesión real se expresa de forma natural con 'en su lugar', que conserva la idea de reemplazo sin sonar forzado.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y la auditoría inglesa revisada: se conserva la fórmula de muerte y sepultura dinástica, se traduce el gentilicio femenino sin expansión innecesaria, y se refleja la forma específica אֲבִיָּם como ''Abiyam'' en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se eligió 'se acostó' para reproducir la fórmula hebrea de muerte sin sustituirla por 'murió'.
  - '''La ciudad de David'' se mantiene como expresión fija de ubicación real y funeraria.'
  - '''Amonita'' funciona como gentilicio femenino en español y evita una glosa superflua.'
  - Se prefirió 'Abiyam' para respetar la forma consonántica del versículo, en continuidad con la auditoría inglesa.
