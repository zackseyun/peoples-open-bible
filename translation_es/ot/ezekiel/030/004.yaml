translation:
  language: es
  text: Y vendrá una espada sobre Egipto[a], y habrá angustia en Cus[b], cuando caigan los muertos en Egipto, y le quiten su multitud[c], y sus cimientos serán derribados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cus es la región al sur de Egipto, a menudo correspondiente de manera amplia a la antigua Nubia, más que al Estado moderno de Etiopía.
    reason: cultural_note
  - marker: b
    text: 'O: «habrá temblor en Cus». El término hebreo puede denotar temblor, retorcimiento o angustia ante una catástrofe.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su multitud/abundancia». La palabra hebrea puede referirse a población, abundancia o riquezas; aquí «multitud» conserva esa amplitud semántica, aunque en contexto de conquista también puede implicar lo que se le quita o arrebata.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאָה
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá sobre
  - llegará
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético expresa futuro; en español, «vendrá» comunica con naturalidad la irrupción anunciada del juicio.
- source_word: חֶרֶב
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  - guerra
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «espada» como metonimia de guerra e invasión, en lugar de generalizar a «guerra».
- source_word: בְּמִצְרַיִם
  english_pob_choice: upon Egypt
  chosen_spanish: sobre Egipto
  alternatives_spanish:
  - contra Egipto
  - en Egipto
  lexicon: HALOT
  rationale: «Sobre» reproduce bien el movimiento hostil del juicio y sigue la revisión inglesa que prefirió una preposición más natural que «contra» para este contexto.
- source_word: חַלְחָלָה
  english_pob_choice: anguish
  chosen_spanish: angustia
  alternatives_spanish:
  - temblor
  - estremecimiento
  - terror
  lexicon: HALOT
  rationale: El término hebreo puede expresar temblor, retorcimiento o angustia ante una catástrofe. «Angustia» mantiene el componente de aflicción intensa sin perder la posibilidad de reacción corporal y emocional.
- source_word: בְּכוּשׁ
  english_pob_choice: in Cush
  chosen_spanish: en Cus
  alternatives_spanish:
  - en Etiopía
  lexicon: HALOT
  rationale: Se conserva el nombre histórico «Cus» para no reemplazarlo por una etiqueta moderna potencialmente reductora o imprecisa; sigue la política del proyecto para este topónimo.
- source_word: בִּנְפֹל חָלָל
  english_pob_choice: when the slain fall
  chosen_spanish: cuando caigan los muertos
  alternatives_spanish:
  - cuando caigan los muertos y heridos
  - al caer los muertos
  - cuando caiga el caído
  lexicon: HALOT
  rationale: El infinitivo constructo introduce una cláusula temporal. Aunque חָלָל suele referirse a «muerto» o «caído en combate», en español «los muertos» es una opción natural que conserva el sentido militar de víctimas de guerra.
- source_word: הֲמוֹנָהּ
  english_pob_choice: her multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - su abundancia
  - sus riquezas
  - su muchedumbre
  lexicon: HALOT
  rationale: Se mantiene la opción más cercana a la revisión inglesa («multitude»), respetando la ambigüedad hebrea entre población, abundancia o riquezas; el contexto de saqueo permite entenderla como botín sin explicitarlo en el texto principal.
- source_word: וְנֶהֶרְסוּ יְסוֹדֹתֶיהָ
  english_pob_choice: her foundations are torn down
  chosen_spanish: sus cimientos sean derribados
  alternatives_spanish:
  - sus fundamentos sean derribados
  - sus bases sean demolidas
  - sus cimientos sean destruidos
  lexicon: HALOT
  rationale: Niphal de derribo/destrucción. «Cimientos» mantiene la imagen arquitectónica y figurada; «sean derribados» conserva el sentido pasivo de ruina.
theological_decisions:
- issue: Representación del topónimo Cush/Cus
  english_pob_reading: Cush is the region south of Egypt, often corresponding broadly to ancient Nubia rather than the modern nation-state of Ethiopia.
  chosen_spanish_reading: Cus es la región al sur de Egipto, relacionada ampliamente con la antigua Nubia más que con el Estado moderno de Etiopía.
  alternative_spanish_readings:
  - Etiopía
  - Nubia
  rationale: Se preserva «Cus» en el texto principal por fidelidad al nombre bíblico, y la nota aclara que no debe leerse como equivalente directo del Estado moderno de Etiopía.
  doctrine_reference: Geografía bíblica / uso histórico de topónimos
- issue: Ambigüedad de הֲמוֹנָהּ
  english_pob_reading: Or 'they take away her multitude/abundance.' The Hebrew word can refer to a population, abundance, or wealth; here it is rendered in the sense of plundered riches.
  chosen_spanish_reading: «su multitud» mantiene la ambigüedad semántica del hebreo sin fijarla prematuramente en solo población o solo riquezas.
  alternative_spanish_readings:
  - sus riquezas
  - su abundancia
  - su muchedumbre
  rationale: La lectura inglesa revisada prefirió «multitude» para acercarse más al hebreo. En español, «multitud» es igualmente ambigua y permite conservar la tensión entre población, abundancia o botín.
  doctrine_reference: Principios de traducción léxico-semántica
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se prefirió una preposición natural en el movimiento de juicio («sobre») y se recuperó el matiz de הֲמוֹנָהּ con «multitud» en lugar de «riquezas». La versión española refleja esas mismas decisiones y mantiene la ambigüedad léxica donde el hebreo la exige.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se usó «Cus» consistentemente para el topónimo bíblico, no «Etiopía».
  - 'Se conservó el orden de imágenes del hebreo: espada, angustia, caída de los muertos, saqueo, derribo de cimientos.'
