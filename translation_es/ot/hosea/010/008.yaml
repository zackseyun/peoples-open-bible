  glossary_alignment: 'No hay conflictos con las terminologías troncales del proyecto. La principal cuestión léxica es בָּמוֹת: el borrador usa «alturas», pero para preservar el sentido cultual documentado por el POB conviene «lugares altos». «Aven», «pecado», «cúbrannos» y «caigan sobre nosotros» están alineados con el expediente.'
