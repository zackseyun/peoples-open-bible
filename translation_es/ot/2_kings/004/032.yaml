translation:
  language: es
  text: Cuando Eliseo entró en la casa, he aquí, el muchacho estaba muerto, tendido[a] sobre su cama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acostado» o «echado allí». El participio hebreo puede rendirse más literalmente como un estado de estar extendido o yacer allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came into
  chosen_spanish: entró en
  alternatives_spanish:
  - vino a
  - llegó a
  - entró
  lexicon: HALOT
  rationale: El wayyiqtol de בוא avanza la narración con pasado simple. En español, «entró en» expresa de forma natural el movimiento hacia el interior de la casa, manteniendo la fuerza direccional del hebreo.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elías
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se vierte por la forma española tradicional y reconocible, que corresponde a la transliteración usual de אֱלִישָׁע.
- source_word: הַבָּיְתָה
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el interior de la casa
  - a la casa
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia/into la casa. En español, ese matiz ya queda incorporado de manera natural con «entró en la casa», por lo que no hace falta reproducirlo con una perífrasis adicional.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - miren
  lexicon: HALOT
  rationale: «He aquí» conserva el valor discursivo de presentación vívida y de atención súbita. Se evita suavizarlo a una expresión menos marcada, porque el hebreo introduce una escena observada con énfasis.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  - el chico
  lexicon: HALOT
  rationale: נַעַר puede abarcar niño, muchacho, joven o siervo según el contexto. Aquí se trata del hijo de la sunamita, y «el muchacho» comunica bien su edad sin volverlo demasiado infantil ni demasiado adulto.
- source_word: מֵת
  english_pob_choice: was dead
  chosen_spanish: estaba muerto
  alternatives_spanish:
  - estaba muerto ya
  - había muerto
  lexicon: HALOT
  rationale: El participio/adjetivo expresa el estado visible del muchacho al llegar Eliseo. «Estaba muerto» conserva el valor estativo, sin desplazarlo al evento previo de la muerte.
- source_word: מֻשְׁכָּב
  english_pob_choice: laid
  chosen_spanish: tendido
  alternatives_spanish:
  - acostado
  - puesto
  - echado
  lexicon: HALOT
  rationale: 'La forma pasiva de שׁכב describe una condición resultante: el cuerpo está colocado o extendido sobre la cama. «Tendido» comunica ese estado pasivo con naturalidad en español y evita una lectura demasiado activa de «estaba acostado».'
- source_word: עַל מִטָּתוֹ
  english_pob_choice: on his bed
  chosen_spanish: sobre su cama
  alternatives_spanish:
  - en su cama
  - encima de su cama
  lexicon: HALOT
  rationale: La preposición עַל se expresa de modo directo con «sobre». «Su cama» reproduce el posesivo del hebreo; «cama» es preferible a «lecho» por claridad y registro contemporáneo digno.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo de WLC y mantiene la misma secuencia narrativa que la POB inglesa. Se conserva la nota alternativa para la forma participial מֻשְׁכָּב, porque en español también existe la tensión entre un participio de estado («tendido») y una opción más descriptiva («acostado»/«echado»).
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - Se mantiene «Eliseo» como forma española estándar del nombre propio.
  - «He aquí» se conserva por su función de presentación vívida, equivalente a la de «behold» en la auditoría inglesa.
