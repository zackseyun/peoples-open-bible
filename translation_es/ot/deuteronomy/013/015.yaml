    reason: lexical_alternative
  revision_rationale: Se revisa la fórmula judicial para reflejar explícitamente הַדָּבָר (‘el asunto’) y evitar una construcción española incompleta. También se reemplaza «ha sido hecha» por «se ha cometido», que es más natural y precisa con «abominación» en este contexto legal-cultual, sin apartarse del sentido del hebreo ni del razonamiento documentado en la auditoría inglesa.
