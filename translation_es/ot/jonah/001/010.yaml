translation:
  language: es
  text: 'Entonces los hombres tuvieron un gran temor[a], y le dijeron: «¿Qué es esto que has hecho?». Porque los hombres sabían que él huía de la presencia de Yahvé, porque él se lo había dicho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «los hombres temieron un gran temor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ ... יִרְאָה גְדוֹלָה
  english_pob_choice: were greatly afraid
  chosen_spanish: tuvieron un gran temor
  alternatives_spanish:
  - tuvieron mucho miedo
  - temieron con gran temor
  lexicon: HALOT
  rationale: El hebreo usa una construcción intensiva con verbo + sustantivo cognado. «Tuvieron un gran temor» conserva la intensidad sin sonar forzado en español, y mantiene el matiz más literal que un simple «tuvieron mucho miedo».
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los marineros
  - la gente
  lexicon: HALOT
  rationale: El término hebreo es el genérico «hombres»/«varones». Aunque el contexto narra a marineros, el texto original usa un sustantivo más directo y general, que en español se refleja mejor con «los hombres».
- source_word: מַה זֹּאת עָשִׂיתָ
  english_pob_choice: What is this that you have done?
  chosen_spanish: ¿Qué es esto que has hecho?
  alternatives_spanish:
  - ¿Qué has hecho?
  - ¿Por qué has hecho esto?
  lexicon: HALOT
  rationale: Se conserva el valor enfático de «esto» en la pregunta hebrea. La opción más breve («¿Qué has hecho?») pierde parte de esa demostración; la elegida mantiene el peso retórico y sigue siendo natural.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from the presence of Yahweh
  chosen_spanish: de la presencia de Yahvé
  alternatives_spanish:
  - de delante de Yahvé
  - de la faz de Yahvé
  lexicon: HALOT
  rationale: «De la presencia de» reproduce bien el sentido relacional de לִפְנֵי y conserva la ironía teológica del intento de huir de Dios. Se usa «Yahvé» porque el texto hebreo contiene el Tetragrama y la pauta del proyecto exige su transliteración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se vierte según la norma editorial del proyecto como «Yahvé», preservando el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: בֹרֵחַ
  english_pob_choice: was fleeing
  chosen_spanish: huía
  alternatives_spanish:
  - estaba huyendo
  - iba huyendo
  lexicon: HALOT
  rationale: El participio expresa acción en curso. En español, «huía» comunica bien ese aspecto progresivo y es más sobrio que perífrasis más largas.
- source_word: כִּי ... כִּי
  english_pob_choice: For ... because
  chosen_spanish: Porque ... pues
  alternatives_spanish:
  - Porque ... porque
  - Pues ... porque
  lexicon: HALOT
  rationale: 'Los dos כִּי cumplen funciones discursivas distintas: el primero introduce explicación y el segundo da la causa de la certeza. «Porque ... pues» refleja esa doble relación sin resultar rígido.'
- source_word: הִגִּיד לָהֶם
  english_pob_choice: he had told them
  chosen_spanish: se lo había dicho
  alternatives_spanish:
  - les había dicho
  - se lo dijo
  lexicon: HALOT
  rationale: La forma pronominal española hace natural la referencia al contenido previamente mencionado. El pluscuamperfecto mantiene la anterioridad lógica respecto de la comprensión de los hombres.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El pasaje contiene el Tetragrama de forma explícita. Conforme al estándar del proyecto, se translitera como «Yahvé» para conservar el nombre personal de Dios y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el tramo auditado en inglés: se conserva la intensidad del hebreo, el contraste discursivo de כִּי, el nombre divino como Yahvé y el aspecto progresivo de בֹרֵחַ. No se detectan revisiones posteriores que modifiquen la decisión base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה.
  - «Los hombres» refleja el sustantivo hebreo sin introducir «marineros» en el texto principal.
  - La nota[a] preserva la alternativa más literal del cognado hebreo sin desplazar la lectura fluida del cuerpo principal.
  - El orden y la puntuación buscan ser naturales en español, sin perder las relaciones causales y explicativas del original.
