id: MAT.10.37
reference: Matthew 10:37
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ φιλῶν πατέρα ἢ μητέρα ὑπὲρ ἐμὲ οὐκ ἔστιν μου ἄξιος· καὶ ὁ φιλῶν υἱὸν ἢ θυγατέρα ὑπὲρ ἐμὲ οὐκ ἔστιν μου ἄξιος·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/037.yaml
  text: 'The one who loves father or mother more than me is not worthy of me[a], and the one who loves son or daughter more than me is not worthy of me.'
  footnotes:
  - marker: a
    text: Or 'above me.' The Greek phrase ὑπὲρ ἐμέ expresses loving someone in preference to Jesus.
    reason: lexical_alternative
translation:
  language: ko
  text: '아버지나 어머니를 나보다 더 사랑하는 자는 내게 합당하지 않고, 아들이나 딸을 나보다 더 사랑하는 자는 내게 합당하지 않다.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 10:37 제자도의 대가 — 가족애를 압도하는 그리스도 우선성
  chosen_reading: 「나보다 더 사랑하는 자는 내게 합당하지 않다」
  alternative_readings:
  - 가족애를 부정하지 않고 「먼저」 정도로 완화
  rationale: 본문은 ὑπὲρ ἐμέ(나를 넘어서)로, 가족 사랑 자체를 부정하지 않지만 그리스도에 대한 충성이 가족애를 능가해야 함을 분명히 한다. 누가 14:26의 「미워하지 아니하면」과 함께 읽히는 강한 제자도 본문이므로 「합당하지 않다」를 약화시키지 않는다.
  doctrine_reference: 'DOCTRINE.md: §5'
