translation:
  language: es
  text: 'Y dijo[a]: «No puedo volver contigo ni ir contigo, y no comeré pan ni beberé agua contigo en este lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un «contigo» femenino en las dos primeras cláusulas y un «contigo» masculino en la cláusula de comer y beber; el español no puede reflejar esa distinción en la misma forma pronominal.
    reason: textual_variant
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: La narración hebrea introduce el discurso directo con un wayyiqtol simple; en español, «Y él dijo» conserva el flujo narrativo sin añadir matices causales o adversativos.
- source_word: לֹא אוּכַל
  english_pob_choice: I cannot
  chosen_spanish: No puedo
  alternatives_spanish:
  - No soy capaz de
  - No podré
  lexicon: HALOT
  rationale: El verbo expresa incapacidad; «No puedo» es la forma más natural y directa en español, sin convertirlo en un futuro ni debilitar la imposibilidad.
- source_word: לָשׁוּב
  english_pob_choice: return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - volver atrás
  lexicon: HALOT
  rationale: «Volver» comunica bien el movimiento de retorno y encaja con el paralelismo del versículo; «regresar» también sería válido, pero «volver» es más breve y natural aquí.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con tu casa
  lexicon: HALOT
  rationale: El hebreo usa sufijo femenino singular en los primeros dos miembros. En español no puede marcarse esa distinción de modo natural; se conserva el sentido relacional con «contigo» y se registra la tensión textual en la nota.
- source_word: וְלָבוֹא
  english_pob_choice: or go with you
  chosen_spanish: ni ir contigo
  alternatives_spanish:
  - ni venir contigo
  - ni entrar contigo
  lexicon: HALOT
  rationale: El hebreo simplemente añade «ir/venir contigo» en paralelo con «volver». En español, «ni ir contigo» preserva el paralelismo sin introducir un «entrar» que no está exigido por el hebreo.
- source_word: וְלֹא אֹכַל לֶחֶם
  english_pob_choice: and I will not eat bread
  chosen_spanish: y no comeré pan
  alternatives_spanish:
  - y no comeré alimento
  - y no tomaré pan
  lexicon: HALOT
  rationale: «Pan» mantiene la metonimia hebrea de לֶחֶם y respeta la forma concreta del texto; no se sustituye por «comida» para no suavizar el lenguaje del original.
- source_word: וְלֹא אֶשְׁתֶּה ... מַיִם
  english_pob_choice: or drink water
  chosen_spanish: ni beberé agua
  alternatives_spanish:
  - y no beberé agua
  - ni tomaré agua
  lexicon: HALOT
  rationale: La segunda prohibición queda en coordinación negativa con la primera. «Ni beberé agua» reproduce bien la estructura acumulativa del hebreo y su paralelismo con el pan.
- source_word: אִתְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con él
  lexicon: HALOT
  rationale: Aquí el hebreo pasa a sufijo masculino singular. El español no distingue esta alternancia con una forma pronominal obligatoria en el texto principal; la nota preserva la información auditada.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - aquí
  lexicon: HALOT
  rationale: «En este lugar» es una correspondencia clara y digna del locativo hebreo. Mantiene el registro formal mejor que «aquí».
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «go in with you» por «go with you» para ajustarse mejor al hebreo; esta versión española sigue esa lectura más directa y evita introducir «entrar» o «ir dentro» en la traducción principal.
  spanish_consistency_notes:
  - Se mantiene el paralelismo negativo del hebreo con «no puedo... ni... ni...», sin suavizarlo a una sola negación general.
  - Se conserva el sustantivo concreto «pan» para לֶחֶם y «agua» para מַיִם.
  - La nota textual marca la diferencia de género gramatical que el español no puede reproducir plenamente en el pronombre de segunda persona.
