    text: 'Hebreo literalmente: «cortar un pacto» ... «el pacto que cortó con ellos».'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin alterar el sentido fuente: «concertar con» expresa de manera más idiomática la acción de formalizar un pacto y evita el calco «para hacer con». Se conservan «Yahvé», «pacto» y «los hijos de Israel» por fidelidad al hebreo y a las decisiones del proyecto. La nota se ajusta para reflejar con más precisión la literalidad del hebreo en ambos miembros del versículo.'
