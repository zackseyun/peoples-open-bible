review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo y sigue adecuadamente la línea del English POB: concubina, infidelidad sexual como lectura principal con nota alternativa, salida hacia la casa del padre en Belén de Judá, y duración de cuatro meses. Sin embargo, hay dos puntos mejorables de fidelidad y naturalidad: ''fue infiel a él'' suena poco idiomático en español, y la puntuación con punto y coma antes de ''y estuvo allí'' introduce una ruptura innecesaria en una sola secuencia narrativa.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene calcos poco naturales: ''fue infiel a él'' y ''se fue de él'' suenan forzados. ''Le fue infiel'' y ''se fue de su lado'' conservan mejor la relación expresada por el hebreo sin perder legibilidad. También conviene suavizar la puntuación para una narración más fluida.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Concubina' está bien; no aparecen términos del glosario mayor como Yahvé/Mesías. La nota mantiene correctamente la alternativa interpretativa documentada en el POB.
  issues:
  - severity: medium
    issue: '''fue infiel[a] a él'' es poco natural en español'
    rationale: Aunque reproduce el valor relacional de עָלָיו, en español la construcción idiomática es 'le fue infiel'. Esto preserva mejor el sentido del hebreo y la legibilidad eclesial amplia.
  - severity: medium
    issue: '''se fue de él'' suena calcado y ambiguo'
    rationale: וַתֵּלֶךְ מֵאִתּוֹ expresa separación de su compañía. 'Se fue de su lado' o 'se alejó de él' comunica mejor esa separación en español natural sin sobreinterpretar como 'lo dejó'.
  - severity: low
    issue: El punto y coma antes de 'y estuvo allí' entorpece la continuidad narrativa
    rationale: El hebreo encadena acciones de forma continua. Una coma mantiene mejor el flujo del relato en español moderno.
  revised_spanish_text: Pero su concubina le fue infiel[a], y se fue de su lado a la casa de su padre, a Belén de Judá, y estuvo allí cuatro meses.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «se prostituyó contra él». Algunos intérpretes antiguos entendieron la cláusula de otro modo, como «se enojó con él» o «discutió con él».
    reason: alternative_reading
  revision_rationale: 'Se ajusta la redacción para un español más idiomático sin cambiar la decisión exegética del POB: ''le fue infiel'' conserva la lectura principal de זנה + עָלָיו; ''se fue de su lado'' expresa mejor מֵאִתּוֹ; y la puntuación se hace más fluida. La nota alternativa se mantiene sustancialmente igual porque preserva la tensión textual documentada.'
