revisions:
- from: Entraré en las hazañas poderosas de Yahvé[a]; proclamaré tu justicia[b][c], solo la tuya.
  to: Vendré en los poderosos hechos del Señor Yahvé[a]; proclamaré tu justicia[c][b], solo la tuya.
  rationale: 'Se corrige el borrador para conservar todos los elementos del hebreo: «Vendré» refleja mejor אָבוֹא que «Entraré»; «el Señor Yahvé» preserva el compuesto אֲדֹנָי יְהוִה sin enmascarar יהוה; y la nota del verbo se ajusta a una alternativa real frente a «proclamaré». También se mejora la naturalidad de גבורות con «poderosos hechos».'
