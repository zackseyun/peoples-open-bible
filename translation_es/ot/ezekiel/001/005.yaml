review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: procedencia desde el interior, lenguaje de ‘semejanza’, referencia a cuatro seres vivientes y descripción de apariencia humana. Sin embargo, la nota [a] documenta una alternativa para וּמִתּוֹכָהּ que no corresponde al punto léxico preservado en el POB inglés, y la decisión léxica sobre לָהֵנָּה en el expediente español es internamente inconsistente, porque el texto sí traduce la posesión con ‘tenían’ mientras la ficha dice ‘era’.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene una reparación menor de las notas para que expliquen correctamente las decisiones significativas. ‘Y este era su aspecto: tenían la semejanza de un hombre’ suena aceptable, aunque ‘este’ puede suavizarse a ‘este era’ sin problema. La redacción principal no necesita cambio sustancial.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Semejanza’, ‘seres vivientes’ y ‘un hombre’ preservan bien la cautela visionaria y la elección léxica auditada. No intervienen términos sensibles del glosario como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: La nota [a] introduce una alternativa sobre ‘salía’ en vez de documentar la alternativa de חַיּוֹת.
    rationale: En el POB inglés la nota alternativa vinculada a ‘living creatures’ preserva ‘living beings’, no una variante de ‘from within it’. La nota española actual desplaza el foco y no conserva el mismo tipo de alternativa léxica significativa.
  - severity: medium
    issue: Falta en español una nota equivalente a la observación inglesa sobre ‘the likeness of a man’ entendida como forma humana.
    rationale: 'El POB inglés conserva explícitamente la aclaración fenomenológica: ‘that is, they appeared in human form’. Dado que el español usa ‘la semejanza de un hombre’, la misma aclaración sigue siendo útil y fiel al expediente.'
  - severity: low
    issue: La ficha léxica para לָהֵנָּה no coincide con el texto español final.
    rationale: El texto correctamente dice ‘tenían’, pero la decisión registrada indica ‘era’. No obliga a rehacer el versículo, pero confirma que hace falta corregir el aparato explicativo.
  revised_spanish_text: 'Y desde su interior salía la semejanza de cuatro seres vivientes[a]. Y este era su aspecto: tenían la semejanza de un hombre[b].'
  revised_footnotes:
  - marker: a
    text: O ‘cuatro seres vivos’.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘la semejanza de un hombre’; es decir, aparecían en forma humana.
    reason: lexical_alternative
  revision_rationale: 'La traducción principal es sustancialmente fiel, pero las notas deben alinearse con el expediente inglés y con las decisiones fuente realmente significativas: la alternativa léxica de חַיּוֹת y la aclaración sobre דְּמוּת אָדָם. Se eliminó la nota sobre ‘salía’ porque no corresponde al aparato auditado principal de este versículo.'
