translation:
  language: es
  text: Se compran a todo precio,[a] pero no hay aliento en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu». El griego πνεῦμα puede significar «aliento», «espíritu» o «viento»; aquí el sentido es que los ídolos carecen de vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ πάσης τιμῆς
  english_pob_choice: at every price
  chosen_spanish: a cualquier precio
  alternatives_spanish:
  - a todo precio
  - a costa de cualquier precio
  - por cualquier precio
  lexicon: LSJ
  rationale: La expresión griega comunica adquisición mediante pago costoso o de cualquier valor requerido. «A cualquier precio» conserva en español la idea comercial y la intensidad del costo sin forzar un monto específico.
- source_word: ἠγορασμένα
  english_pob_choice: are bought
  chosen_spanish: están comprados
  alternatives_spanish:
  - han sido comprados
  - son comprados
  - fueron comprados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ἀγοράζω describe los ídolos como objetos adquiridos. «Están comprados» transmite el estado resultante de la compra y suena natural en español.
- source_word: πνεῦμα
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - espíritu
  - respiración
  - viento
  lexicon: BDAG
  rationale: En este contexto polémico contra los ídolos, el punto es que carecen de vida. «Aliento» preserva en español la imagen concreta de vida animada, equivalente funcional de «breath», y evita cargar el verso con una lectura más metafísica de «espíritu».
- source_word: ἐν οἷς
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - dentro de ellos
  - en los cuales
  lexicon: BDAG
  rationale: El pronombre relativo remite a los ídolos comprados. «En ellos» es la forma más natural en español para conservar la relación locativa sin rigidez.
theological_decisions:
- issue: Sentido de πνεῦμα en una polémica contra los ídolos
  english_pob_reading: breath
  chosen_spanish_reading: aliento
  alternative_spanish_readings:
  - espíritu
  rationale: La línea subraya que los ídolos, aunque costosos, están sin vida. «Aliento» preserva la conexión bíblica entre aliento y vida y evita resolver indebidamente la tensión semántica de πνεῦμα, que también puede significar «espíritu».
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de resolverla; consistencia de términos o excepción documentada.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una oposición simple con «but» en lugar de un matiz más fuerte. Por eso se emplea «pero» en español, manteniendo el contraste directo entre el costo de los ídolos y su carencia de vida.
  spanish_consistency_notes:
  - Se conserva «aliento» como equivalente principal de πνεῦμα en este contexto, con nota alternativa a «espíritu».
  - «A cualquier precio» refleja la idea comercial de ἐκ πάσης τιμῆς sin sobreexplicarla.
  - Se mantiene el paralelismo breve y sobrio del griego, propio de una afirmación antiidolátrica concisa.
