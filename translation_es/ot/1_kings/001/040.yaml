  to: Y todo el pueblo subieron detrás de él[a], y el pueblo iba tocando flautas y alegrándose con gran alegría[b], y la tierra se partió por su estruendo.
  rationale: Se corrigió el verbo inicial al plural para reflejar fielmente וַיַּעֲלוּ. Se ajustó «se abrió» a «se partió» para acercarse mejor a בקע y mantener la fuerza de la imagen hiperbólica. Se cambió «por su sonido» a «por su estruendo» para representar más naturalmente en español el ruido colectivo del pueblo y los instrumentos. Se conservaron las dos notas, con leve ajuste en la nota b para armonizar con el texto revisado.
