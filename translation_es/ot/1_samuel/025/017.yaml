revisions:
- from: Ahora, sabe esto y considera qué debes hacer[a], porque el mal ha sido determinado contra nuestro señor y contra toda su casa, y él es un hombre tan vil que no se le puede hablar.
  to: Ahora, sabe esto y considera qué deberías hacer, porque la calamidad ha sido decidida contra nuestro amo y contra toda su casa, y él es un hombre tan vil[a] que no se le puede hablar.
  rationale: Se corrige el matiz deliberativo de מַה תַּעֲשִׂי con «deberías hacer», se sustituye la nota para alinearla con la alternativa léxica documentada por el POB en בֶּן בְּלִיַּעַל, y se mejora la naturalidad contextual de כָלְתָה הָרָעָה con «la calamidad ha sido decidida». También se usa «amo» para reflejar mejor el registro doméstico de אֲדֹנֵינוּ en este contexto.
  reviewer_model: gpt-5.4
