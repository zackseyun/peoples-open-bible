  text: בְּרוֹשִׁ֤ים מִ/שְּׂנִיר֙ בָּ֣נוּ לָ֔/ךְ אֵ֖ת כָּל לֻֽחֹתָ֑יִם אֶ֤רֶז מִ/לְּבָנוֹן֙ לָקָ֔חוּ לַ/עֲשׂ֥וֹת תֹּ֖רֶן עָלָֽיִ/ךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/027/005.yaml
  text: With cypresses from Senir they built all your planking[b][a]; they took a cedar from Lebanon to make a mast for you.
