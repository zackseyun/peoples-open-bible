    issue: «a todo el campamento en su mano» suena poco natural en español
    rationale: Aunque el hebreo dice literalmente «en su mano», la secuencia completa en español queda rígida y algo opaca. La auditoría inglesa preserva el idiomático «into his hand» y explica el sentido en nota; en español conviene una redacción principal más fluida, manteniendo la nota del hebraísmo.
  - severity: low
    issue: La nota [b] está anclada en «un hombre de Israel» pero explica «en su mano»
    rationale: Según la disciplina requerida, el marcador debe aparecer en la palabra o frase relevante. La nota cultural debe anclarse en «mano» o en la cláusula correspondiente, no en la identificación de Gedeón.
  - severity: low
    issue: «No hay otra cosa que» es correcto pero menos idiomático en diálogo directo
    rationale: La exclusión enfática del hebreo puede expresarse con mayor naturalidad en español como «Esto no es otra cosa que» o «No es sino». Es una mejora estilística menor, no un error de fidelidad.
