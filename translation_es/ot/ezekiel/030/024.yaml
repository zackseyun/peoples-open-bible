  text: וְ/חִזַּקְתִּ֗י אֶת זְרֹעוֹת֙ מֶ֣לֶךְ בָּבֶ֔ל וְ/נָתַתִּ֥י אֶת חַרְבִּ֖/י בְּ/יָד֑/וֹ וְ/שָׁבַרְתִּי֙ אֶת זְרֹע֣וֹת פַּרְעֹ֔ה וְ/נָאַ֛ק נַאֲק֥וֹת חָלָ֖ל לְ/פָנָֽי/ו־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/030/024.yaml
  text: And I will strengthen the arms of the king of Babylon[a], and I will put my sword into his hand; but I will break the arms of Pharaoh, and he will groan before him with the groanings of a slain man.
  footnotes:
