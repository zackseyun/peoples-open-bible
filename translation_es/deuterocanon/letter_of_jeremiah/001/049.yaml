translation:
  language: es
  text: ¿Cómo, entonces, puede alguien no darse cuenta[a] de que no son dioses, ya que ni se salvan a sí mismos de la guerra ni de las calamidades[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Cómo entonces no es posible percatarse de que no son dioses...?» El griego usa una negación retórica para subrayar que la conclusión debería ser obvia.'
    reason: lexical_alternative
  - marker: b
    text: «Calamidades» traduce el griego κακῶν en el sentido de hechos dañinos o desastres; también podría verterse como «males», «desgracias» o «desastres».
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo entonces
  alternatives_spanish:
  - ¿Cómo, pues
  - ¿Cómo por tanto
  lexicon: LSJ
  rationale: Introduce la pregunta retórica enfática con su partícula inferencial (οὖν). «¿Cómo entonces» es natural en español y conserva tanto la forma interrogativa como la fuerza inferencial de οὖν sin caer en el latinismo «por tanto», menos idiomático en este registro.
- source_word: οὐκ ἔστιν αἰσθέσθαι
  english_pob_choice: can one fail to perceive
  chosen_spanish: no se puede percibir
  alternatives_spanish:
  - no es posible percatarse
  - no se puede advertir
  - ¿cómo no reconocer
  lexicon: LSJ
  rationale: αἰσθέσθαι (aoristivo de αἰσθάνομαι) significa «percibir, notar, darse cuenta». El griego usa οὐκ ἔστιν + infinitivo para expresar imposibilidad; la negación interna a la pregunta retórica subraya que la conclusión es obvia. «No se puede percibir» conserva la negación del original en una construcción interrogativa retórica inteligible en español. El POB en inglés optó por una paráfrasis idiomática («can one fail to perceive»); en español la forma literal funciona sin artificiosidad. La alternativa «no es posible percatarse» se recoge en nota.
- source_word: ὅτι οὐκ εἰσὶν θεοί
  english_pob_choice: that they are not gods
  chosen_spanish: que no son dioses
  alternatives_spanish:
  - que no son verdaderos dioses
  - que son falsos dioses
  lexicon: LSJ
  rationale: Traducción directa de la cláusula sustantiva. El POB en inglés preservó «not gods» para mantener la tensión polémica del texto griego; igualmente en español «no son dioses» reproduce la afirmación léxica del original y deja al contexto de la Carta de Jeremías establecer que se habla de ídolos, sin expansión parafrástica.
- source_word: οἳ
  english_pob_choice: since they
  chosen_spanish: ya que
  alternatives_spanish:
  - quienes
  - pues
  lexicon: LSJ
  rationale: El pronombre relativo introduce la cláusula explicativa que fundamenta la conclusión de que no son dioses. Como en el POB en inglés («since they»), se hace explícita la fuerza causal mediante «ya que», que es la conjunción causal más natural en español moderno neutro para este registro.
- source_word: οὔτε σώζουσιν ἑαυτοὺς
  english_pob_choice: they neither save themselves
  chosen_spanish: ni se salvan a sí mismos
  alternatives_spanish:
  - ni pueden rescatarse a sí mismos
  - ni se liberan a sí mismos
  lexicon: LSJ
  rationale: 'σώζω = «salvar, rescatar, preservar». «Salvarse a sí mismos» es conciso y conserva la ironía central del versículo: dioses que ni siquiera pueden salvar su propia existencia. La forma reflexiva «a sí mismos» reproduce ἑαυτοὺς de manera idiomática en español.'
- source_word: ἐκ πολέμου
  english_pob_choice: from war
  chosen_spanish: de la guerra
  alternatives_spanish:
  - de la batalla
  - del combate
  lexicon: LSJ
  rationale: πόλεμος = «guerra». «De la guerra» es la traducción más directa. El artículo definido en español («la guerra») es natural y no añade ni quita especificidad frente al griego, que carece de artículo por ser un genitivo partitivo tras ἐκ.
- source_word: οὔτε ἐκ κακῶν
  english_pob_choice: nor from calamities
  chosen_spanish: ni de las calamidades
  alternatives_spanish:
  - ni de los males
  - ni de las desgracias
  - ni de los desastres
  lexicon: LSJ
  rationale: κακά puede significar «males», «daños», «desgracias» o «desastres». El POB en inglés eligió «calamities» para enfatizar el sentido de daños externos concretos sin importar la carga de «mal moral»; «calamidades» es el cognado español directo, de amplio uso en registro bíblico y eclesiástico latinoamericano, y reproduce esa misma decisión. Las alternativas se recogen en nota al pie.
theological_decisions:
- issue: Referente de θεοί en la polémica antiidolátrica
  english_pob_reading: Render θεοί as 'gods' while making clear by context that these are false gods/idols.
  chosen_spanish_reading: «no son dioses» — se preserva la forma léxica del griego; el contexto de la Carta establece que se trata de ídolos.
  alternative_spanish_readings:
  - «no son verdaderos dioses»
  - «son falsos dioses»
  - «no son deidades»
  rationale: El texto griego declara ὅτι οὐκ εἰσὶν θεοί, constituyendo en sí mismo la afirmación polémica. Ampliar a «falsos dioses» o sustituir por «ídolos» sería parafrasear más allá de lo que el texto requiere. El español «no son dioses» reproduce fielmente esa tensión léxico-teológica, igual que hizo el POB en inglés, dejando que el contexto retórico de toda la carta establezca el referente idolátrico.
  doctrine_reference: 'Filosofía de traducción: primacía de la lengua original; preservar la tensión teológica del texto sin expansión parafrástica (cf. decisión teológica del POB en inglés).'
translation_notes:
  revision_awareness: 'No hay revisiones aplicadas (applied_revisions vacío). La revisión más reciente (gpt-5.4, 2026-04-23) no introdujo cambios; el cotejo cruzado arrojó acuerdo total (score 1.0, veredicto: agree). El borrador español sigue fielmente el texto base establecido por el POB en inglés sin apartarse de sus decisiones léxicas y teológicas documentadas.'
  spanish_consistency_notes:
  - θεοί se renderiza como «dioses» (no «divinidades» ni «ídolos»), conforme a los valores predeterminados del POB español para θεός / אֱלֹהִים.
  - No aparece el nombre divino יהוה/YHWH en este versículo; la regla de «Yahvé» no se activa.
  - σώζω se renderiza como «salvan» (forma verbal de «salvar»), preservando la ironía del original sin suavizarla con «proteger» o «preservar».
  - κακῶν se renderiza como «calamidades» siguiendo la decisión del POB en inglés, con alternativas documentadas en nota al pie.
  - οἳ con fuerza causal se traduce por «ya que» en lugar de conservar la forma relativa «quienes», en alineación con la opción «since they» del POB en inglés y con el idioma español moderno.
  - La puntuación interrogativa española doble (¿...?) se aplica a toda la oración, que es una única pregunta retórica.
