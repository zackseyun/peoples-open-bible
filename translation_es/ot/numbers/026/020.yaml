translation:
  language: es
  text: 'Los hijos de Judá por sus clanes fueron: de Sela[a], el clan de los selanitas; de Pérez[b], el clan de los perezitas; de Zérah, el clan de los zerahitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Judá»; en este contexto de censo la expresión designa a los descendientes varones de Judá agrupados en clanes.'
    reason: lexical_alternative
  - marker: b
    text: La tradición bíblica más antigua en español a veces tiene «Fares» para «Pérez».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: En esta fórmula censal, el hebreo funciona como una introducción copulativa/existencial a la lista. «Fueron» reproduce el valor simple y formal sin sugerir un proceso que el contexto no destaca.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: The sons of Judah
  chosen_spanish: Los hijos de Judá
  alternatives_spanish:
  - Los descendientes de Judá
  - Los hijos varones de Judá
  lexicon: HALOT
  rationale: «Hijos» conserva la fórmula genealógica del hebreo y del POB en inglés. En este contexto censal designa la línea masculina/clan, y la lectura queda natural en español.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí es una unidad subtribal; «clanes» es más preciso que «familias» en español moderno para este registro censal. La preposición «por» conserva el valor clasificatorio de לְ.
- source_word: מִשְׁפַּחַת הַשֵּׁלָנִי
  english_pob_choice: the clan of the Shelanites
  chosen_spanish: el clan de los selanitas
  alternatives_spanish:
  - el clan de los shelanitas
  - la familia selanita
  lexicon: HALOT
  rationale: La forma gentilicia se vierte con el sufijo español «-itas» para mantener naturalidad y la relación derivada con Sela. Se usa «selanitas» para reflejar el nombre hebreo Sela y evitar una forma menos transparente.
- source_word: לְפֶרֶץ
  english_pob_choice: of Perez
  chosen_spanish: de Fares
  alternatives_spanish:
  - de Pérez
  - de Peres
  lexicon: HALOT
  rationale: El hebreo פֶרֶץ puede representarse como «Fares» en tradición hispana bíblica, nombre más reconocible para lectores de iglesia que «Perez». Se mantiene la equivalencia onomástica sin perder la conexión con el hebreo.
- source_word: מִשְׁפַּחַת הַפַּרְצִי
  english_pob_choice: the clan of the Perezites
  chosen_spanish: el clan de los faretitas
  alternatives_spanish:
  - el clan de los faresitas
  - el clan de los perezitas
  lexicon: HALOT
  rationale: Para conservar la relación derivativa con «Fares», la forma gentilicia se adapta como «faretitas», que resulta comprensible en español y refleja el patrón del hebreo. «Perezitas» sería más cercano al transliterado hebreo, pero menos consistente con la opción onomástica elegida aquí.
- source_word: לְזֶרַח
  english_pob_choice: of Zerah
  chosen_spanish: de Zéraj
  alternatives_spanish:
  - de Zerah
  - de Zara
  lexicon: HALOT
  rationale: Se conserva la transliteración cercana al hebreo con «Zéraj», evitando una castellanización tradicional que oscurezca la forma מקורית. El acento guía la pronunciación en español.
- source_word: מִשְׁפַּחַת הַזַּרְחִי
  english_pob_choice: the clan of the Zerahites
  chosen_spanish: el clan de los zarjitas
  alternatives_spanish:
  - el clan de los zérajitas
  - el clan de los zeraítas
  lexicon: HALOT
  rationale: La gentilicia española se forma para mantener el paralelismo del hebreo y la legibilidad en español. «Zarjitas» preserva la base «Zéraj» y la terminación grupal usual en español.
theological_decisions:
- issue: Valor genealógico de «hijos» en un contexto de censo y clanes
  english_pob_reading: The sons of Judah ... denotes Judah's male-line descendants grouped into clans.
  chosen_spanish_reading: Los hijos de Judá ... designa aquí a los descendientes varones de Judá organizados en clanes.
  alternative_spanish_readings:
  - Los descendientes de Judá ...
  - Los hijos de Judá ...
  rationale: No se trata de limitar el sentido a hijos biológicos inmediatos, sino de un uso genealógico/censal. La traducción mantiene la forma bíblica y la nota explica el alcance semántico sin borrar la tensión entre literalidad y función histórica.
  doctrine_reference: Nm 26; uso genealógico de בני en listas censales
- issue: Unidad social implicada por מִשְׁפָּחָה
  english_pob_reading: clans
  chosen_spanish_reading: clanes
  alternative_spanish_readings:
  - familias
  - linajes
  rationale: En este pasaje la unidad no es simplemente la familia nuclear; se trata de agrupaciones subtribales estables. «Clanes» comunica mejor el valor social del término que «familias», aunque esta última siga siendo una posibilidad contextual.
  doctrine_reference: Nm 26:5-51; organización tribal de Israel
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el patrón formular del texto hebreo y del POB inglés. La principal adaptación al español afecta los nombres propios y sus gentilicios: se opta por formas hispanas tradicionales y derivadas (Sela/selanitas, Fares/faretitas, Zéraj/zarjitas) para lograr naturalidad y lectura eclesial, sin perder la relación morfológica con el hebreo. No se detectaron revisiones textuales en el paquete de referencia.'
  spanish_consistency_notes:
  - Se mantiene «clan» de forma uniforme para מִשְׁפָּחָה.
  - Se usa «hijos» en el cuerpo y la nota explica su sentido genealógico, en paralelo al POB inglés.
  - 'Los nombres propios se presentan con una estrategia coherente de español bíblico: Sela, Fares, Zéraj.'
  - Las gentilicias se regularizan con «-itas» para reflejar el patrón repetitivo del versículo.
