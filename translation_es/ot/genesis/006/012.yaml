translation:
  language: es
  text: Y vio Dios la tierra[a], y he aquí, estaba corrompida[b], porque toda carne había corrompido su camino sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra» en el sentido de «el mundo»; el hebreo puede abarcar el ámbito creado en sentido amplio, no solo el suelo o un territorio local.
    reason: lexical_alternative
  - marker: b
    text: O «y he aquí, la tierra estaba corrompida». También puede traducirse «estaba arruinada»; el verbo hebreo puede describir corrupción moral y también ruina o deterioro del orden creado.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: HALOT
  rationale: El verbo narrativo de ראה se expresa de forma natural con «vio», que conserva la sencillez y el ritmo del hebreo sin añadir matiz evaluativo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Dios verdadero
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al único Dios verdadero; «Dios» es la forma más natural y fiel en español.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitable
  - el mundo
  lexicon: HALOT
  rationale: En el contexto del diluvio, la referencia abarca el ámbito creado en su conjunto; «la tierra» es más natural en español que «la tierra» como simple suelo, y mantiene la amplitud del pasaje.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: «Y he aquí» conserva la fuerza de atención vívida de הִנֵּה y mantiene un tono bíblico claro sin volverse arcaizante en exceso.
- source_word: נִשְׁחָתָה
  english_pob_choice: was corrupted
  chosen_spanish: estaba corrompida
  alternatives_spanish:
  - había sido corrompida
  - estaba arruinada
  - estaba destruida
  lexicon: HALOT
  rationale: La forma pasiva/reflexiva de שׁחת expresa un estado resultante; «estaba corrompida» preserva la ambigüedad entre corrupción moral y ruina del orden creado, como hace el inglés POB con «corrupted».
- source_word: כִּי הִשְׁחִית
  english_pob_choice: because ... had corrupted
  chosen_spanish: porque ... había corrompido
  alternatives_spanish:
  - pues ... había corrompido
  - porque ... había arruinado
  - pues ... había arruinado
  lexicon: HALOT
  rationale: El causativo de שׁחת se refleja con «había corrompido», manteniendo la repetición lexical con נִשְׁחָתָה y la relación causal explícita.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todo ser humano
  - toda humanidad
  - toda carne viviente
  lexicon: HALOT
  rationale: Se conserva el idiomático כָּל בָּשָׂר con «toda carne», que en español bíblico suena natural y preserva el alcance abierto del hebreo sin resolverlo interpretativamente.
- source_word: דַּרְכּוֹ
  english_pob_choice: its way
  chosen_spanish: su camino
  alternatives_spanish:
  - su conducta
  - su senda
  - su proceder
  lexicon: HALOT
  rationale: «Camino» reproduce bien la metáfora hebrea de דֶּרֶךְ y es inteligible en español para conducta o modo de vida; además mantiene la singularidad colectiva del poseído.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra habitada
  lexicon: HALOT
  rationale: «Sobre la tierra» conserva la preposición y la imagen espacial del hebreo, y funciona de manera natural en español en este contexto narrativo.
theological_decisions:
- issue: Alcance de שׁחת en ambos miembros del versículo
  english_pob_reading: Render with 'corrupted'/'had corrupted' to preserve both moral corruption and resulting devastation.
  chosen_spanish_reading: «corrompida» / «había corrompido» para preservar tanto la corrupción moral como la ruina derivada.
  alternative_spanish_readings:
  - «arruinada» / «había arruinado»
  - «destruida» / «había destruido»
  rationale: El hebreo une la condición de la tierra con la acción de toda carne mediante la misma raíz. «Corrompida» y «había corrompido» permiten conservar esa repetición y no reducen el sentido a pura inmoralidad ni a mera devastación física.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) y §3 (preservar la tensión en vez de resolverla)
- issue: Alcance de כָּל בָּשָׂר
  english_pob_reading: Retain the idiom 'all flesh' in the main text.
  chosen_spanish_reading: Retener el idiomático «toda carne» en el texto principal.
  alternative_spanish_readings:
  - «toda humanidad»
  - «todo ser viviente»
  - «todos los seres humanos»
  rationale: El hebreo deja abierta la amplitud exacta del sintagma; mantener el modismo permite conservar esa amplitud y evita una interpretación prematura.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y semántica)
- issue: Sentido de וְהִנֵּה
  english_pob_reading: behold
  chosen_spanish_reading: «y he aquí»
  alternative_spanish_readings:
  - «y mira»
  - «y de pronto»
  rationale: La expresión introduce una observación vívida y solemne; «y he aquí» conserva ese golpe discursivo sin necesidad de amplificación explicativa.
  doctrine_reference: Translation philosophy §2 (respeto del valor discursivo del original)
translation_notes:
  revision_awareness: La redacción sigue el pasaje en su forma revisada más reciente, que mantiene la repetición de la raíz שׁחת con «corrupted» en ambos miembros. En español se preserva esa consistencia con «corrompida» / «había corrompido», evitando suavizar el vínculo entre el estado de la tierra y la acción de toda carne.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce «SEÑOR», pues el texto hebreo usa אֱלֹהִים.
  - Se conserva el modismo «toda carne» para כָּל בָּשָׂר, en lugar de resolverlo como «toda humanidad».
  - Se usa «camino» para דֶּרֶךְ por su valor metafórico de conducta o modo de vida.
  - La puntuación y el orden siguen la cadencia narrativa del hebreo y del texto base inglés, pero en español natural.
  - Se evita «Cristo», «siervo» u otras fórmulas no pertinentes al pasaje.
