review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: marcador discursivo inicial, pregunta retórica, parentesco de Booz, referencia a las jóvenes de Booz, deíctico de atención y la acción de aventar cebada en la era esta noche. Sin embargo, la nota [a] introduce ''pariente cercano'', que sobreinterpreta מֹדַעְתָּנוּ más allá del inglés auditado (''relative / kinsman'') y del hebreo contextualizado aquí.'
  spanish_quality_summary: El español es claro, natural y digno. 'Y ahora', '¿no es...?', 'Mira' y 'está aventando cebada en la era' funcionan bien. La frase 'con cuyas jóvenes has estado' es fiel, aunque algo formal; sigue siendo plenamente legible. La única reparación necesaria es ajustar la nota [a] para no añadir el matiz de 'cercano'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Booz', 'pariente', 'jóvenes', 'aventando', 'cebada', 'era' y 'esta noche' son compatibles con las decisiones auditadas. La alternativa de nota debe mantenerse dentro de 'pariente / pariente de clan / familiar', no 'pariente cercano'.
  issues:
  - severity: medium
    issue: La nota [a] dice 'nuestro pariente cercano'.
    rationale: El hebreo מֹדַעְתָּנוּ, según el expediente inglés, denota parentesco o conexión de clan, no necesariamente el matiz técnico de cercanía. 'Pariente cercano' añade especificidad no justificada por la evidencia presentada.
  revised_spanish_text: Y ahora[a], ¿no es Booz nuestro pariente, con cuyas jóvenes[b] has estado? Mira, esta noche está aventando cebada en la era.
  revised_footnotes:
  - marker: a
    text: O ‘nuestro familiar’. El hebreo puede indicar relación de parentesco o de clan, no solo una simple cercanía social.
    reason: lexical_alternative
  - marker: b
    text: O ‘con cuyas siervas has estado’. El hebreo puede referirse a las trabajadoras o asistentes de Booz.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota [a] para eliminar el matiz excesivo de 'pariente cercano' y alinearla mejor con la evidencia léxica auditada.
