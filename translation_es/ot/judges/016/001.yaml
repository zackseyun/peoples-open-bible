revisions:
- from: Sansón fue a Gaza[a], y allí vio a una prostituta, y fue a ella.
  to: Sansón fue a Gaza[a], y allí vio a una prostituta, y se llegó a ella.
  rationale: Se cambia «y fue a ella» por «y se llegó a ella» para conservar el eufemismo sexual de וַיָּבֹא אֵלֶיהָ de una manera más inteligible y digna en español bíblico. La nota se simplifica para evitar una pseudo-literalidad española menos natural y para mantener la alternativa explícita documentada por el POB. El resto del versículo puede mantenerse sin cambios.
