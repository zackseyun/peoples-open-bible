base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/037/007.yaml
  text: 'Thus says Yahweh[a], the God of Israel: Thus you shall say to the king of Judah, who sent you to me to inquire of me, ‘Behold, Pharaoh’s army, which came out to help you, has returned to its own land[c][b], Egypt.’'
  footnotes:
  - marker: a
    text: Or “to seek me” / “to consult me.” The Hebrew verb can denote seeking or inquiring, and here refers to asking for a divine answer through Jeremiah.
    reason: lexical_alternative
  - marker: b
    text: Or “which is coming out to help you.” The Hebrew uses a participle; English renders it as past in light of the narrative situation.
    reason: lexical_alternative
  - marker: c
    text: Or “has turned back to the land of Egypt.”
    reason: lexical_alternative
