source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 et factum est cum finissem loqui verba haec, et missus est ad me angelus, qui missus fuerat ad me primis noctibus,

    2 et dixit ad me: surge, Ezra, et audi sermones quos veni loqui ad te.

    3 et dixi: loquere, dominus meus. et dixit ad me: mare positum est in spatioso loco ut esset altum et inmensum.

    4 erit autem ei introitus in angusto loco positus, ut esset similis fluminis.

    5 si quis enim volens voluerit ingredi mare videre eum vel dominari eius, si non transierit angustum, in latitudinem venire quomodo poterit?

    6 item aliud: civitas est aedificata et posita in loco campestri, est autem plena omnium bonorum.

    7 introitus autem eius angustus et in praecipiti positus, ut esset a dextris quidem ignis, a sinistris vero aqua alta.

    8 semita autem est una sola inter eos posita, hoc est ignis et aqua, ut non capiat semita nisi solummodo vestigium hominis.

    9 si autem data dabitur civitas homini in hereditatem, si non heres antepositum periculum pertransierit, quomodo accipiet hereditatem suam?

    10 et dixi: sic, domine. et dixit ad me: sic est et Israhel pars.

    11 propter eos enim feci saeculum, et quando transgressus est Adam constitutiones meas, iudicatum est quod factum est.

    12 et facti sunt introitus huius saeculi angusti et dolentes et laboriosi, paucae autem et malae et periculorum plenae et laborum magnorum fultae.

    13 nam maioris saeculi introitus spatiosi et securi et facientes inmortalitatis fructum.

    14 si ergo non ingredientes ingressi fuerint qui vivunt angusta et vana haec, non poterunt recipere quae sunt reposita.

    15 nunc ergo tu quare conturbaris, corruptibilis cum sis? et quid moveris tu, cum sis mortalis?

    16 et quare non accepisti in corde tuo quod futurum, sed quod in praesenti?

    17 et respondi et dixi: dominator domine, ecce disposuisti in lege tua, quoniam iusti hereditabunt haec, impii autem peribunt.

    18 iusti autem ferent angusta sperantes spatiosa; qui enim impie gesserunt, et angustiam passi sunt et spatiosa non viderunt.

    19 et dixit ad me: non es iudex super Dominum neque intellegens super Altissimum.

    20 pereant enim multi praesentes, quamneglegatur quae anteposita est Dei lex.

    21 mandans enim mandavit Dominus venientibus quando venerunt, quid facientes viverent, et quid observantes non punirentur.

    22 hii autem non sunt persuasi et contradixerunt ei. et constituerunt sibi cogitamenta vanitatis

    23 et proposuerunt sibi circumventiones delictorum. et superdixeruntAltissimum non esse, et vias eius non cognoverunt.

    24 et legem eius spreverunt et sponsiones eius abnegaverunt et legitimis eius fidem non habuerunt et opera eius non perfecerunt.

    25 propter hoc, Ezra, vacua vacuis et plena plenis.

    26 ecce enim tempus veniet, et erit quando venient signa quae praedixi tibi, et apparebit sponsa et apparescens civitas et ostendetur quae nunc subducitur terra.

    27 et omnis qui liberatus est de praedictis malis, ipse videbit mirabilia mea.

    28 revelabitur enim Filius meus Iesus cum his qui cum eo, et iucundabit qui relicti sunt annis quadringentis.

    29 et erit post annos hos, et morietur Filius meus Christus et omnes qui spiramentum habent hominis.

    30 et convertetur saeculum in antiquum silentium diebus septem sicut in prioribus initiis, ita ut nemo derelinquatur.

    31 et erit post dies septem, et excitabitur qui nondum vigilat saeculum et morietur corruptum.

    32 et terra reddet qui in eam dormiunt, et pulvis qui in eo silentio habitant, et promptuaria reddent quae eis commendatae sunt animae.

    33 et revelabitur Altissimus super sedem iudicii, et pertransibunt misericordiae, et longanimitas congregabitur,

    34 iudicium autem solum remanebit. et veritas stabit et fides convalescet,

    35 et opus subsequetur et merces ostendetur. et iustitiae vigilabunt et iniustitiae non dormibunt.

    36 Et apparebit lacus tormenti, et contra illum erit locus requietionis ; et clibanus

    37 gehennae ostendetur, et contra eum iocunditatis paradisus. Et dicet tunc Altissimus ad excitatas gentes : uidete et intellegite quem negastis, uel cui non

    38 seruiuistis, uel cuius diligentias spreuistis. Uidete contra et in contra: hic iocunditas et requies, et ibi ignis et tormenta; haec autem loqueris dicens ad eos in

    39 die iudicii. Hic talis qui neque solem [habeat] neque lunam, neque stellas,

    40 Neque nubem, neque tonitruum, neque coruscationem, neque uentum, neque aquam,

    41 neque aerem, neque tenebras, neque sero, neque mane, Neque aestatem, neque uer, neque aestum, neque hiemem, neque gelu, neque frigus, neque grandi-

    42 nem, neque pluuiam, neque rorem, Neque meridiem, neque noctem, neque ante lucem, neque nitorem, neque claritatem, neque lucem, nisi solummodo splendorem

    43 claritatis Altissimi, unde omnes incipiant uidere quae anteposita sunt. Spatium

    44 enim habebit sicut ebdomada annorum. Hoc est iudicium meum et constitutio eius,

    45 tibi autem soli ostendi haec. Et respondi tunc et dixi: domine, et nunc dico:

    46 beati praesentes et obseruantes quae a te constituta sunt; Sed et [de] quibus erat oratio mea, quis enim est de praesentibus, qui non peccauit, uel quis natus,

    47 qui non praeteriuit sponsionem tuam? Et nunc uideo, quoniam ad paucos per-

    48 tinebit futuram saeculi iocunditatem facere, multis autem tormenta. Increuit enim in nos cor malum, quod nos abalienauit ab his, et deduxit nos in corruptionem, et in itinera mortis, ostendit nobis semitas perditionis et longe fecit nos a uita; et hoc

    49 non paucos, sed pene omnes qui creati sunt. Et respondit ad me et dixit: audi

    50 me et instruam te, et de sequenti corripiam te: Propter hoc non fecit Altissimus

    51 unum saeculum, sed duo. Tu enim, quia dixisti non esse multos iustos, sed paucos,

    52 impios uero multiplicari, audi haec: Lapides electos si habueris paucos ualde,

    53 ad numerum eorum compones eos tibi, plumbum autem et fictile abundat. Et

    54 dixi: domine, quomodo poterit? Et dixit ad me: non hoc solummodo, sed interroga

    55 terram, et dicet tibi, adultere ei, et narrabit tibi, Dices ei : aurum creas et

    56 argentum et æramentum, et ferrum quoque et plumbum et fictile ; Multiplicatur autem argentum super aurum, et æramentum super argentum, et ferrum super

    57 æramentum, plumbum super ferrum, et fictile super plumbum. Aestima et tu, quæ sint pretiosa et desiderabilia, quod multiplicatur aut quod rarum nascitur.

    58 Et dixi : dominator domine, quod abundat uilius, quod enim rarius pretiosius est.

    59 Et respondit ad me et dixit : In te †stant pondera quæ cogitasti, quoniam qui habet

    60 quod difficile est, gaudet super eum, qui uabet abundantiam ; Sic et a me repromissa creatura, iocundabor enim super paucis et qui saluabuntur, propterea quod ipsi sunt qui gloriam meam nunc dominatiorem fecerunt, et per quos nunc nomen meum

    61 nominatum est; Et non contristabor super multitudinem eorum qui perierunt, ipsi enim sunt qui uapori assimilati sunt et flammae, fumo adaequati sunt et exarserunt,

    62 feruerunt et extincti sunt. Et respondit et dixi: O tu terra, quid peperisti, si sensus

    63 factus est de puluere, sicut et cetera creatura! Melius enim erat ipsum pulverem

    64 non esse natum, ut non sensus inde fieret. Nunc autem nobiscum crescit sensus,

    65 et propter hoc torquemur, quoniam scientes perimus. Lugeat hominum genus, et agrestes bestiae laetentur, lugeant omnes qui nati sunt, quadripedia uero et pecora

    66 iocundentur. Multum enim melius est illis quam nobis, non enim sperant iudicium,

    67 nec enim sciunt cruciamenta nec salutem post mortem repromissam sibi. Nobis autem

    68 quid prodest, quoniam salutati saluabimur, si tormento tormentabimur? Omnes enim qui nati sunt, conmixti sunt iniquitatibus, et pleni sunt peccatis, et grauidi delictis;

    69 Et si non essemus post mortem in iudicio uenientes, melius fortassis nobis uenisset.

    70 Et respondit ad me et dixit: et quando Altissimus faciens faciebat saeculum, Adam et omnes qui cum eo uenerunt, primum praeparauit iudicium et quae sunt iudicii.

    71 Et nunc de sermonibus tuis intellege, quoniam dixisti, quia nobiscum crescit sensus;

    72 Qui ergo commorantes sunt in terra, hinc cruciabuntur, quoniam sensum habentes iniquitatem fecerunt, et mandata accipientes non seruauerunt ea, et legem consecuti

    73 fraudauerunt eam quam acceperunt. Et quid habebunt dicere in iudicio, uel quo-

    74 modo respondebunt in nouissimis temporibus? Quantum enim tempus ex quo longanimitatem habuit Altissimus his qui inhabitant saeculum, et non propter eos, sed propter ea quae prouidit tempora! Et respondi et dixi: si inueni gratiam

    75 coram te, domine, demonstra, domine, seruo tuo, si post mortem uel nunc quando reddimus unusquisque animam suam, si conseruati conseruabimur in requie, donec

    76 ueniant tempora illa, in quibus incipies creaturam renouare, aut amodo cruciamur. Et respondit ad me et dixit: ostendam tibi et hoc; tu autem noli commisceri cum eis

    77 qui speruerunt, neque connumeres te cum his qui cruciantur. Etenim est tibi thesaurus operum repositus apud Altissimum, sed non tibi demonstrabitur usque in nouissimis

    78 temporibus. Nam de morte sermo est: quando profectus fuerit terminus sententiae ab Altissimo ut homo moriatur, recedente inspiratione de corpore ut dimittatur iterum

    79 ad eum qui dedit adorare gloriam Altissimi primum. Et si quidem esset eorum qui spreuerunt et non seruauerunt uiam Altissimi, et eorum qui contempserunt legem

    80 eius, et eorum qui oderunt eos qui timent eum, Haec inspirationes in habitationes non

    81 ingredientur, sed uagantes erunt amodo in cruciamentis, dolentes semper et tristes.

    82 Via prima, quia spreuerunt legem Altissimi. Secunda uia, quoniam non possunt re-

    83 uersionem bonam facere ut uiuant. Tertia uia, uident repositam mercedem his qui

    84 testamentis Altissimi crediderunt. Quarta uia, considerabunt sibi in nouissimis repo-

    85 situm cruciamentum. Quinta uia, uidentes aliorum habitaculum ab angelis conseruari

    86 cum silentio magno. Sexta uia, uidentes quemadmodum de eis pertransient in cru-

    87 eiamentum. Septima uia est omnium quae supradictae sunt uiarum maior, quoniam detabescent iu confusione et consumentur in horróribus† et maereescent in timoribus, uidentes gloriam Altissimi coram quem uiuentes peccauerunt et coram

    88 quem incipient in nouissimis temporibus iudicari. Nam eorum qui uias seruaue-

    89 runt Altissimi ordo est hic, quando incipient seruari a uaso corruptibili. In eo tempore commoratae seruierunt cum labore Altissimo, et omni hora sustinuerunt

    90 periculum, uti perfecte custodirent legislatoris legem. Propter quod hic de his

    91 sermo: Imprimis uident cum exultatione multa gloriam eius qui suscipit eas,

    92 requiescent enim per septem ordines. Ordo primus, quoniam cum labore multo certati sunt, ut uincerent cum eis plasmatum cogitamentum malum, ut non eas

    93 seducat a uita in mortem. Secundus ordo, quoniam uident complicationem, in qua

    94 uagantur impiorum animae, et quae in eis manet punitio. Tertius ordo, uidentes testimonium quod testificatus est eis qui plasmauit eas, quoniam uiuentes serua-

    95 uerunt quae per fidem data est lex. Quartus ordo, intellegentes requiem quam nunc in promptuariis congregati requiescent cum silentio multo ab angelis conseruati, †atque in nouissimis eorum manentem gloriam.† Quintus ordo, exultantes

    96 quomodo corruptibile effugerint nunc, et futurum quomodo hereditatem possidebuut, adhuc autem uidentes angustum et [labore] plenum, quoniam liberati sunt,

    97 et spatiosum, [quod incipient] recipere fruniscentes et immortales. Sextus ordo, quando eis ostendetur, quomodo incipiet uultus eorum fulgere sicut sol, et quomodo

    98 incipient stellarum adsimilarí lumini, amodo non corrupti. Septimus ordo, qui est omnibus supradictis maior, quoniam exultabunt cum fiducia et quoniam confidebunt non confusi, et gaudebunt non reuerentes, festinant enim uidere uultum

    99 [eius], cui seruiunt uiuentes et a quo incipiunt gloriosi mercedem recipere. Hic ordo animarum iustorum, ut a modo adnuntiatur, praedictae uiae cruciatus, quas

    100 patientur amodo qui neglexerint. Et respondi et dixi : ergo dabitur tempus animabus postquam separatae fuerint de corporibus, ut uideant de quo mihi

    101 dixisti ? Et dixit : septem diebus erit libertas earum, ut uideant qui praedicti

    102 sunt sermones, et postea congregabuntur in habitaculis suis. Et respondi et dixi : si inueni gratiam ante oculos tuos, demonstra mihi adhuc seruo tuo, si in die

    103 iudicii iusti impios excusare poterint uel deprecari pro eis Altissimum, Si patres pro filiis, uel filii pro parentibus, si fratres pro fratribus, si adfines pro proximis,

    104 si fideles pro carissimis. [Et respondit ad me et dixit: quoniam inueniisti gratiam ante oculos meos, et hoc demonstrabo tibi: dies iudicii dies decretorius est, et omnibus signaculum ueritatis ostendet; quemadmodum enim non mittit pater filium, uel filius patrem, uel dominus seruum], uel fidus carissimum, ut pro

    105 eo intellegat, aut dormiat, aut manducet, aut curetur; Sic nunquam nemo pro aliquo rogabit, omnes enim portabunt unusquisque tunc iniustitias suas aut iustitias.

    106 Et respondi et dixi: et quomodo invenimus modo, quoniam rogavitprimus Abraham propter Sodomitas, et Moyses pro patribus qui in deserto peccaverunt,

    107 et Iesus qui post eum pro Israhel in diebus Achar, et Samuhel in diebus Saul,

    108 et David pro confractione, et Salomon pro eis qui in sanctificationem,

    109 et Helias pro his qui pluviam acceperunt et pro mortuo ut viveret,

    110 et Ezechias pro populo in diebus Sennacherib, et multi pro multis?

    111 Si ergo modo, quando corruptibile increvit et iniustitia multiplicata est, exoraverunt iusti pro impiis quare et tunc sic non erit?

    112 Et respondit ad me et dixit: praesens saeculum non est finis, gloria in eo non frequens manet, propter hoc oraverunt qui potuerunt pro invalidis.

    113 Dies enim iudicii erit finis temporis huius et initium futuri inmortalistemporis, in quo pertransivit corruptela,

    114 soluta est intemperantia, abscisa est incredulitas, crevit autem iustitia, orta est veritas.

    115 Tunc ergo nemo poterit misereri eius qui in iudicio victus fuerit, neque demergere eum qui vicerit.

    116 Et respondi et dixi: hic sermo meus primus et novissimus, quoniam melius erat non dare terramAdam vel, cum iam dedisset, coercereeum ut non peccaret.

    117 Quid enim prodest omnibus in praesenti vivere in tristitia et mortuos sperare punitionem?

    118 O tu quid fecisti, Adam? si enim tu peccasti, non est factum solius tuus casus sed etnostrum qui ex te advenimus.

    119 Quid enim nobis prodest, si promissum est nobis inmortale tempus, nos vero mortalia opera egimus?

    120 Et quoniam praedicta est nobis perennis spes, nos vero pessime vani facti sumus?

    121 Et quoniam reposita sunt habitacula sanitatis et securitatis, nos vero male conversati sumus?

    122 Et quoniam incipiet gloria Altissimi protegere eos qui caste conversati sunt, nos autem pessimis viis ambulavimus?

    123 Et quoniam ostendetur paradisus, cuius fructus incorruptus perseverat, in quo est saturitas et medella,

    124 nos vero non ingrediemur, ingratis enim locis conversati sumus?

    125 Et quoniam super stellas fulgebunt facies eorum qui abstinentiam habuerunt, nostrae vero facies super tenebras nigrae?

    126 Non enim cogitavimus viventes quando iniquitatem faciebamus, quidincipientes post mortem pati.

    127 Et respondit et dixit: hoc est cogitamentum certaminis, quem certavit qui super terram natus est homo,

    128 ut si victus fuerit patiatur quod dixisti, si autem vicerit recipiet quod dico,

    129 quoniam haec est via, quam Moyses dixit cum viveret ad populum dicens: elige tibi vitam ut vivas.

    130 Non crediderunt autem ei, sed nec post eum prophetis, sed nec mihi qui locutus sum ad eos,

    131 quoniam non esset tristitia in perditione eorum, sicut et futurum est gaudium super eos quibus persuasa est salus.

    132 Et respondi et dixi: scio, domine, quoniam nunc vocatus est Altissimus misericors, in eo quod misereatur qui nondum in saeculo advenerunt,

    133 et miserator, in eo quodmiseretur illis qui conversionem faciunt in lege eius,

    134 et longanimis, quoniam longanimitatem praestat his qui peccaverunt quasi suis operibus,

    135 et munificus, quoniam quidem donare vult pro exigere,

    136 et multae misericordiae, quoniam multiplicat magis misericordias his qui praesentes sunt et qui praeterierunt et qui futuri sunt.

    137 Si enim non multiplicaverit, non vivificabitur saeculum cum his qui habitant in eo.

    138 Et donator, quoniam si non donaverit de bonitate sua, ut adleventur hii qui iniquitates fecerunt de suis iniquitatibus, non poterit decies millesima pars hominum vivificari,

    139 et iudex, si non ignoverit his qui creati sunt verbo eius et deleverit multitudinem contemptionum, non fortassis derelinquenturinnumerabilem multitudinem nisi pauci valde.'
