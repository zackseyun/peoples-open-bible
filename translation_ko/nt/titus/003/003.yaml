id: TIT.3.3
reference: Titus 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἦμεν γάρ ποτε καὶ ἡμεῖς ἀνόητοι, ἀπειθεῖς, πλανώμενοι, δουλεύοντες ἐπιθυμίαις καὶ ἡδοναῖς ποικίλαις, ἐν κακίᾳ καὶ φθόνῳ διάγοντες, στυγητοί, μισοῦντες ἀλλήλους.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/003.yaml
  text: For we ourselves also were once foolish[a], disobedient, being led astray, enslaved to various desires and pleasures, spending our lives in malice and envy, hateful[b], hating one another.
  footnotes:
  - marker: a
    text: Or 'deceived' for 'being led astray.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hated' for 'hateful.' The Greek adjective can be understood either actively ('hateful, detestable') or passively ('hated').
    reason: lexical_alternative
translation:
  language: ko
  text: 우리도 한때는 어리석고, 불순종하며, 미혹되어[a], 갖가지 욕망과 쾌락의 노예가 되어, 악의와 시기 가운데 살았으며, 가증한 자[b]요 서로 미워하는 자였기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「속아」. 헬라어 πλανώμενοι는 미혹된 상태와 속음 모두를 함의한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「미움받는 자」. 헬라어 형용사는 능동적(「가증한·혐오스러운」) 또는 수동적(「미움받는」)으로 모두 이해될 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦμεν γάρ ποτε καὶ ἡμεῖς
  english_pob_choice: For we ourselves also were once
  chosen_korean: 우리도 한때는 ~ 이었기 때문입니다
  alternatives_korean:
  - 왜냐하면 우리 자신도 전에는
  - 우리 자신도 전에 ~ 했기 때문입니다
  lexicon: BDAG
  rationale: 앞 절(2절)의 권면이 가능한 근거를 제시하는 인과 접속사 γάρ. 한국어 흐름상 「~이었기 때문입니다」 후치 종결로 옮긴다.
- source_word: ἀνόητοι
  english_pob_choice: foolish
  chosen_korean: 어리석고
  alternatives_korean:
  - 무지하고
  - 미련하고
  lexicon: BDAG
  rationale: ἀνόητος는 분별이 결여된 상태. 「어리석다」가 일반적이다.
- source_word: πλανώμενοι
  english_pob_choice: being led astray
  chosen_korean: 미혹되어
  alternatives_korean:
  - 길을 잃어
  - 속아
  lexicon: BDAG
  rationale: πλανάω 수동 분사. 「미혹되다」가 정립된 신약 등가어로 영적 헤맴의 어감을 살린다.
- source_word: δουλεύοντες ἐπιθυμίαις καὶ ἡδοναῖς ποικίλαις
  english_pob_choice: enslaved to various desires and pleasures
  chosen_korean: 갖가지 욕망과 쾌락의 노예가 되어
  alternatives_korean:
  - 여러 정욕과 쾌락에 종 노릇 하며
  - 다양한 욕심과 향락에 매여
  lexicon: BDAG
  rationale: δουλεύω는 「노예 노릇 하다」. 죄와 욕망에 의한 강제된 매임을 드러내기 위해 「노예가 되다」로 옮긴다. 2:9의 δοῦλοι(노예들)와 어휘 정합성도 확보. 한국 전통의 「종 노릇」은 약화된 어감.
- source_word: ἐν κακίᾳ καὶ φθόνῳ διάγοντες
  english_pob_choice: spending our lives in malice and envy
  chosen_korean: 악의와 시기 가운데 살았으며
  alternatives_korean:
  - 악의와 질투 가운데 세월을 보내며
  - 악함과 시샘 속에 살아가며
  lexicon: BDAG
  rationale: διάγω + 시간/상태는 「~ 가운데 살다·세월을 보내다」. 자연스러운 한국어로 「~ 가운데 살다」.
- source_word: στυγητοί
  english_pob_choice: hateful
  chosen_korean: 가증한 자
  alternatives_korean:
  - 혐오스러운 자
  - 미움받는 자
  lexicon: BDAG
  rationale: στυγητός는 능동·수동 양의적. 1:16의 βδελυκτοί와 일관되게 「가증한 자」를 본문에 두고 수동 해석을 각주에 둔다.
- source_word: μισοῦντες ἀλλήλους
  english_pob_choice: hating one another
  chosen_korean: 서로 미워하는 자
  alternatives_korean:
  - 서로를 미워하며
  lexicon: BDAG
  rationale: 능동 분사. 「서로 미워하는 자」가 자연스럽다.
