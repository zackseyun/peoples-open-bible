translation:
  language: es
  text: Y el corazón del sacerdote se alegró, y tomó el efod, los ídolos domésticos[a] y la imagen tallada[b], y entró en medio del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los terafines». El término hebreo puede referirse a objetos cultuales domésticos o a dioses domésticos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el ídolo» o «la imagen grabada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב לֵב
  english_pob_choice: the priest’s heart was glad
  chosen_spanish: el corazón del sacerdote se alegró
  alternatives_spanish:
  - el corazón del sacerdote estaba contento
  - el sacerdote se alegró
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente, ‘fue bueno el corazón’ del sacerdote. En español, ‘se alegró’ conserva la imagen afectiva sin sonar artificial. Mantiene mejor el valor semántico que una paráfrasis más plana.'
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el cura
  lexicon: HALOT
  rationale: El sustantivo común designa a un sacerdote. ‘Sacerdote’ es el equivalente normal y claro en español bíblico contemporáneo; ‘cura’ no corresponde al registro ni al sentido del hebreo.
- source_word: הָאֵפוֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el pectoral sacerdotal
  - el efod ritual
  lexicon: HALOT
  rationale: Es un término técnico cultual que se conserva por transliteración. ‘Pectoral sacerdotal’ explicaría demasiado y no siempre coincide con el uso bíblico preciso.
- source_word: הַתְּרָפִים
  english_pob_choice: the household idols
  chosen_spanish: los ídolos domésticos
  alternatives_spanish:
  - los terafines
  - los dioses domésticos
  lexicon: HALOT
  rationale: En español, ‘ídolos domésticos’ comunica bien que se trata de objetos/cultos vinculados al hogar. ‘Terafines’ es transliteración posible, pero menos transparente; ‘dioses domésticos’ puede sonar más fuerte de lo que el contexto exige.
- source_word: הַפָּסֶל
  english_pob_choice: the carved image
  chosen_spanish: la imagen tallada
  alternatives_spanish:
  - el ídolo
  - la imagen esculpida
  - la imagen grabada
  lexicon: HALOT
  rationale: פֶּסֶל apunta a una imagen hecha por talla o escultura. ‘Imagen tallada’ preserva la concreción material del hebreo y evita traducir demasiado abstractamente con ‘ídolo’.
- source_word: בְּקֶרֶב הָעָם
  english_pob_choice: into the midst of the people
  chosen_spanish: en medio del pueblo
  alternatives_spanish:
  - en medio de la gente
  - entre el pueblo
  lexicon: HALOT
  rationale: ‘En medio de’ reproduce bien la noción espacial de בקרב y fluye naturalmente en español. ‘Pueblo’ mantiene el sustantivo colectivo del hebreo mejor que ‘gente’.
translation_notes:
  revision_awareness: 'El pasaje no presenta revisiones textuales relevantes en el dossier provisto; la redacción sigue de cerca el hebreo WLC y la decisión léxica inglesa auditada, manteniendo sus tensiones: idiomática para לֵב, transliteración para אֵפוֹד, y traducción descriptiva para תְּרָפִים y פָּסֶל.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo narrativo con tres objetos tomados por el sacerdote: efod, ídolos domésticos e imagen tallada.'
  - Se evita ‘SEÑOR’ o fórmulas de sustitución innecesarias, porque no aparece el Tetragrámaton en este versículo.
  - ‘Sacerdote’ se usa como equivalente funcional estable; no se introduce terminología eclesiástica anacrónica.
