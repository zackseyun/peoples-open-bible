translation:
  language: es
  text: Yahvé ha agotado su ira[a]; ha derramado su ardiente furor[b]. Encendió un fuego en Sión, y consumió sus cimientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha completado su ira» o «ha gastado plenamente su ira».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el ardor de su furor» o «la intensidad de su furor».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּלָּה
  english_pob_choice: has exhausted
  chosen_spanish: ha agotado
  alternatives_spanish:
  - ha completado
  - ha terminado
  - ha gastado
  lexicon: HALOT
  rationale: כלה expresa aquí llevar algo hasta su pleno límite o agotarlo por completo. «Ha agotado» comunica bien esa plenitud consumada de la ira divina sin perder la fuerza del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el Nombre divino directo. En la línea terminológica del POB en español, «Yahvé» preserva el nombre propio y evita la sustitución por un título.
- source_word: חֲמָתוֹ
  english_pob_choice: his wrath
  chosen_spanish: su ira
  alternatives_spanish:
  - su furor
  - su cólera
  lexicon: HALOT
  rationale: חֵמָה denota ira o furor. «Ira» es claro y solemne en español bíblico, y mantiene el paralelismo con la expresión siguiente.
- source_word: שָׁפַךְ
  english_pob_choice: has poured out
  chosen_spanish: ha derramado
  alternatives_spanish:
  - ha vertido
  - ha vaciado
  lexicon: HALOT
  rationale: El verbo significa literalmente «derramar». «Ha derramado» conserva la imagen corporal y verbal del texto.
- source_word: חֲרוֹן אַפּוֹ
  english_pob_choice: his burning anger
  chosen_spanish: su ardiente furor
  alternatives_spanish:
  - la fiebre de su ira
  - su ira ardiente
  - la intensidad de su ira
  lexicon: HALOT
  rationale: La frase combina la idea de ardor/encendido con el modismo de אף como ira. «Ardiente furor» preserva la metáfora del calor y diferencia esta segunda expresión de «ira».
- source_word: וַיַּצֶּת אֵשׁ
  english_pob_choice: He kindled a fire
  chosen_spanish: Encendió un fuego
  alternatives_spanish:
  - Prendió un fuego
  - Encendió fuego
  - Ablandó un fuego
  lexicon: HALOT
  rationale: El verbo es «encender/causar arder». «Encendió un fuego» reproduce la acción de prender fuego con naturalidad en español.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sión
  alternatives_spanish:
  - dentro de Sión
  - contra Sión
  lexicon: HALOT
  rationale: La preposición ב señala ubicación. «En Sión» es la forma directa y fiel, y mantiene el lugar personificado como objeto de juicio.
- source_word: וַתֹּאכַל
  english_pob_choice: it consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - se comió
  lexicon: HALOT
  rationale: El verbo femenino concuerda con «fuego» implícito. «Consumió» es el equivalente más natural para el fuego que destruye hasta el final.
- source_word: יְסוֹדֹתֶיהָ
  english_pob_choice: her foundations
  chosen_spanish: sus cimientos
  alternatives_spanish:
  - sus fundamentos
  - sus bases
  lexicon: HALOT
  rationale: El sufijo femenino refiere a Sión personificada; en español, «sus cimientos» mantiene el referente implícito sin forzar una personificación pronominal poco natural en esta línea.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra explícitamente a YHWH. «Yahvé» preserva el nombre propio y evita ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Paralelismo de la ira divina
  english_pob_reading: Retain both 'wrath' and 'burning anger' as distinct but parallel expressions
  chosen_spanish_reading: Mantener «ira» y «ardiente furor» como expresiones distintas pero paralelas
  alternative_spanish_readings:
  - reducir ambas a «ira»
  - unificarlas en «furor»
  rationale: El hebreo usa dos expresiones relacionadas pero no idénticas. Conservar ambas evita aplanar la intensificación poética y la fuerza judicial del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
translation_notes:
  revision_awareness: 'Revisado contra el último pase de revisión; no hubo cambios necesarios. La redacción mantiene el paralelismo hebreo: una primera línea con la ira agotada/derramada y una segunda con el fuego encendido en Sión que consume sus cimientos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la política del POB en español para el Tetragrámaton.
  - Se distingue «ira» de «ardiente furor» para preservar el doblete hebreo.
  - «Sión» se conserva como topónimo bíblico tradicional y no se paraphrasea.
  - «Cimientos» mantiene la imagen arquitectónica del final del verso.
