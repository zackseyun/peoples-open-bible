review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la estructura general: belleza/adornos, conversión en orgullo, fabricación de imágenes idolátricas y resultado de impureza. Sin embargo, omite la alternativa documentada principal sobre עָשׂוּ בוֹ (''en ello'' / ''con ello'') y desplaza esa nota a ''soberbia'', donde el inglés no la documenta. También ''en ella'' introduce discordancia con el antecedente masculino singular ''adorno''.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay detalles de naturalidad y precisión: ''en ella'' debería concordar con ''adorno'' o reestructurarse; ''un motivo de soberbia'' es aceptable, pero ''lo convirtieron en soberbia'' refleja mejor el sentido resultativo sin añadir ''motivo''. ''Sus cosas detestables'' es fiel pero algo tosco; puede mantenerse por distinción léxica. El conjunto necesita una reparación menor, no una reescritura profunda.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. El verso no contiene Yahvé/Mesías/etc. Se preserva la distinción entre תוֹעֲבֹתָם ('abominaciones') y שִׁקּוּצֵיהֶם ('cosas detestables'). La decisión 'una cosa impura' concuerda con la rationale POB para לְנִדָּה.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a 'soberbia' pero la alternativa documentada principal en el POB corresponde a עָשׂוּ בוֹ ('en ello' / 'con ello').
    rationale: El inglés preserva en nota la ambigüedad de בּוֹ como locativo o instrumental/material. La nota española actual introduce otra explicación no equivalente al rastro auditado y deja sin representar la ambigüedad fuente más significativa.
  - severity: medium
    issue: '''en ella'' no concuerda bien con el antecedente inmediato ''adorno'' (masculino) y puede confundir el referente.'
    rationale: Aunque 'hermosura' es femenino, el pronombre hebreo בּוֹ es masculino singular y enlaza mejor con 'adorno' / el objeto precioso. En español conviene evitar la ambigüedad innecesaria con 'con él' o 'en él', idealmente con nota.
  - severity: low
    issue: '''un motivo de soberbia'' añade un matiz interpretativo (''motivo'') que no está explícito en el hebreo.'
    rationale: לְגָאוֹן es más directamente resultativo ('en/para soberbia'). Una formulación como 'lo convirtieron en soberbia' o 'lo hicieron para orgullo' preserva mejor la relación semántica.
  revised_spanish_text: Y convirtieron la hermosura de su adorno en soberbia, y con él[a] hicieron las imágenes de sus abominaciones, sus cosas detestables; por eso la he hecho para ellos una cosa impura[b].
  revised_footnotes:
  - marker: a
    text: 'O: ''en él''. La frase hebrea puede indicar lugar o material/instrumento: hicieron allí las imágenes, o las hicieron con ello.'
    reason: lexical_alternative
  - marker: b
    text: La expresión 'una cosa impura' traduce un término hebreo asociado con impureza ritual; alternativamente, 'algo que debe rechazarse'.
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia y se restaura la nota léxica principal del POB sobre עָשׂוּ בוֹ, anclándola al lugar adecuado. También se añade la alternativa documentada para לְנִדָּה y se ajusta 'un motivo de soberbia' a una formulación más directamente resultativa y más cercana al hebreo.
