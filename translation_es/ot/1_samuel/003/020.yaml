- from: Y todo Israel, desde Dan hasta Beerseba, supo que Samuel estaba establecido como profeta de Yahvé[a].
  to: Y todo Israel, desde Dan hasta Beerseba, supo que Samuel había quedado confirmado como profeta de Yahvé[a].
  rationale: 'Se revisa «estaba establecido» a «había quedado confirmado» para lograr un español más natural y reflejar mejor el valor resultativo de נֶאֱמָן en contexto: Samuel fue públicamente autenticado como profeta de Yahvé. La nota se ajusta para evitar una lectura centrada en el carácter moral («fiable») y mantener el énfasis en la confirmación de su oficio.'
