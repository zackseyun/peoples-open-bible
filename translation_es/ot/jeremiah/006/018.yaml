translation:
  language: es
  text: Por tanto, oigan las naciones, y conoce[a], oh congregación[b], lo que hay entre ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sabe» o «reconoce». El hebreo tiene un imperativo femenino singular, tratado aquí como una exhortación dirigida a una colectividad en singular.
    reason: lexical_alternative
  - marker: b
    text: O «asamblea» o «comunidad» para «congregación». El hebreo עֵדָה es un término colectivo y aquí su referente exacto es debatido.
    reason: lexical_alternative
  - marker: c
    text: O «lo que hay en ellos». La expresión hebrea es concisa y puede referirse a lo que se halla dentro de ellos o entre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduces the consequence of the preceding indictment con un conector natural en español y fiel al valor discursivo de לָכֵן.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural pide una convocatoria profética; 'oigan' conserva la fuerza de oír/escuchar sin volverlo demasiado explicativo.
- source_word: הַגּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' es la equivalencia más natural y amplia en un contexto profético; ''gentiles'' añadiría una carga técnico-religiosa que el hebreo aquí no exige.'
- source_word: וּדְעִי
  english_pob_choice: and know
  chosen_spanish: y conozcan
  alternatives_spanish:
  - y sepan
  - y reconozcan
  lexicon: HALOT
  rationale: La forma hebrea es singular femenina, pero el conjunto del verso presenta una tensión textual/rética difícil; en español se mantiene el llamado directo y se traduce con plural para corresponder al paralelo con 'las naciones', sin ocultar la dificultad en la nota.
- source_word: עֵדָה
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: '''Congregación'' preserva el valor colectivo singular y el tono profético/judicial; las alternativas se mantienen porque el referente exacto es debatido.'
- source_word: אֶת אֲשֶׁר בָּם
  english_pob_choice: what is among them
  chosen_spanish: lo que hay entre ellos
  alternatives_spanish:
  - lo que hay en ellos
  - aquello que está entre ellos
  lexicon: HALOT
  rationale: La expresión es breve y elíptica; 'lo que hay entre ellos' conserva la ambigüedad del hebreo entre interioridad y localización relacional, sin especificar más de lo que el texto dice.
theological_decisions:
- issue: Reproducción del vocativo difícil en עֵדָה
  english_pob_reading: Treat עֵדָה as a vocative singular collective ('O congregation') addressed alongside the nations.
  chosen_spanish_reading: 'Tratar עֵדָה como vocativo colectivo: ''oh congregación''.'
  alternative_spanish_readings:
  - '''oh asamblea'''
  - '''oh comunidad'''
  - '''oh asamblea de naciones'''
  rationale: La puntuación masorética y el audit trail inglés favorecen un vocativo colectivo directo. En español, 'oh congregación' conserva la forma de llamada sin emendar el texto ni suavizar la rareza.
  doctrine_reference: Jeremiah 6:18; direct address in prophetic discourse
- issue: Dificultad del sujeto/forma verbal en וּדְעִי
  english_pob_reading: The Hebrew expression is concise and may refer to what is found within them or among them.
  chosen_spanish_reading: Mantener la breve frase como una exhortación profética de conocimiento, sin resolver artificialmente la tensión gramatical.
  alternative_spanish_readings:
  - Ajustar todo a un plural explícito en español
  - Reformular como una oración impersonal
  rationale: El hebreo presenta una tensión real entre la forma femenina singular y el destinatario colectivo. La traducción no debe borrar esa dificultad; por eso se conserva el imperativo directo y se refleja la ambigüedad en la nota.
  doctrine_reference: Textual honesty; prophetic rhetoric
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; se mantiene la misma lectura de trabajo, con ajuste estilístico mínimo al español para evitar un calco duro y conservar la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'naciones' para הַגּוֹיִם, en línea con el audit trail inglés y el uso profético estándar.
  - Se eligió 'congregación' como equivalente principal de עֵדָה, con nota de alternativas para no ocultar la discusión lexical.
  - '''Lo que hay entre ellos'' conserva la concisión y ambigüedad de אֲשֶׁר בָּם.'
  - No se introdujo 'SEÑOR' ni otra sustitución para el nombre divino, pues este verso no lo contiene.
