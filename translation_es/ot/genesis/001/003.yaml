translation:
  language: es
  text: 'Y dijo Dios[a]: «Que haya luz», y hubo luz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haya luz». El hebreo usa una forma jussiva que expresa voluntad o mandato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Así dijo
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; «Y dijo» conserva la secuencia narrativa hebrea en un español natural, sin cargar un matiz causal que el verbo no exige.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la Deidad
  lexicon: HALOT
  rationale: En Génesis 1 el término designa al único Creador con verbo singular; «Dios» es la equivalencia española directa y sobria.
- source_word: יְהִי
  english_pob_choice: Let there be
  chosen_spanish: Que haya
  alternatives_spanish:
  - Haya
  - Sea
  lexicon: HALOT
  rationale: El jussivo de היה expresa voluntad/mandato eficaz. En español, «Que haya» comunica el valor volitivo o imperativo creativo con naturalidad; «Sea» sería más duro y menos transparente para esta forma.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: HALOT
  rationale: El sentido básico es «luz»; no hay base contextual para restringirlo a un tipo específico de iluminación o a una metáfora.
- source_word: וַיְהִי
  english_pob_choice: and there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y fue
  - y llegó a haber
  lexicon: HALOT
  rationale: El wayyiqtol de היה expresa el resultado inmediato de la palabra divina. «Y hubo» reproduce bien ese resultado sin añadir interpretación.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: HALOT
  rationale: La repetición del sustantivo se mantiene para reflejar el paralelo hebreo entre mandato y cumplimiento.
theological_decisions:
- issue: Matiz del jussivo creativo
  english_pob_reading: Let there be light
  chosen_spanish_reading: Que haya luz
  alternative_spanish_readings:
  - Haya luz
  - Sea luz
  rationale: La forma hebrea יְהִי es jussiva y expresa volición/mandato. «Que haya luz» preserva esa fuerza efectiva de creación sin convertirla en una simple descripción.
  doctrine_reference: Teología de la creación por la palabra; equivalencia óptima con respeto a la fuerza volitiva del original.
translation_notes:
  revision_awareness: El control de revisión inglés indica alta concordancia y sin cambios necesarios; por eso la propuesta española sigue de cerca la estructura del POB en inglés y mantiene la misma decisión sobre el jussivo creativo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים según el uso estándar en Génesis 1.
  - Se conserva la repetición de «luz» para reflejar el paralelismo hebreo.
  - Se evita «SEÑOR» porque el texto fuente usa אֱלֹהִים, no el tetragrámaton.
