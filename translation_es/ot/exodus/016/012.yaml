revisions:
- from: 'He oído las murmuraciones de los hijos de Israel[a]. Háblales y diles: “Entre las tardes comerán carne, y por la mañana se saciarán de pan, y sabrán que yo soy Yahvé, su Dios.”'
  to: 'He oído las murmuraciones de los hijos de Israel. Háblales así: «Entre las tardes[a] comerán carne, y por la mañana se saciarán de pan, y sabrán que yo soy Yahvé, el Dios de ustedes».'
  rationale: Se corrigió el anclaje de la nota para que corresponda a «Entre las tardes», que es el elemento explicado. También se ajustó la cláusula final a «el Dios de ustedes» para reflejar con mayor fidelidad la segunda persona de אֱלֹהֵיכֶם en un español neutral latinoamericano. Se suavizó la introducción del discurso a «Háblales así» para mayor naturalidad sin perder la estructura del original.
