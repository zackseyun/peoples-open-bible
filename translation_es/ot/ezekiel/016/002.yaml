translation:
  language: es
  text: Hijo[a] de hombre, da a conocer a Jerusalén sus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijo de hombre» reproduce el vocativo profético fijo de Ezequiel.
