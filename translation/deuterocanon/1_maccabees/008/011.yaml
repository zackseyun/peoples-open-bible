theological_decisions:
- issue: Rendering slavery language in a political-military context
  chosen_reading: Use 'enslaved' rather than a softer term like 'subjected' or 'made tributary.'
  alternative_readings:
  - subjected
  - subjugated
  rationale: Although this is not a doctrinally disputed theological term in context, the project's philosophy prefers preserving the bonded force of δουλόω-family terms where salient. The verse emphasizes Rome's domination, so 'enslaved' best reflects the Greek's severity.
