review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura censal del hebreo: «Los hijos de Isacar por sus clanes» refleja בְּנֵי ... לְמִשְׁפְּחֹתָם, y la secuencia distributiva «de Tola ...; de Puvá ...» corresponde adecuadamente al uso de לְ con los antepasados de clan. También preserva correctamente los gentilicios de clan para הַתּוֹלָעִי y הַפּוּנִי. La nota sobre la variante «Puá» está bien motivada por la tradición paralela.'
  spanish_quality_summary: 'El español es claro y natural, pero hay un ajuste menor de forma: en un registro bíblico genealógico, «según sus clanes» suena un poco más idiomático y preciso que «por sus clanes». Además, el nombre «Puvá» resulta algo extraño en español e introduce una acentuación no sustentada por el uso bíblico hispano; conviene conservar la forma consonántica distintiva del audit trail sin forzar tilde, es decir, «Puva», manteniendo la nota sobre «Puá».'
  glossary_alignment: No hay términos teológicos sensibles aquí. Los nombres propios y «clan» concuerdan con la filosofía del proyecto. «Isacar» es una adaptación española aceptable para Issachar. El manejo de «Puva» con nota sobre «Puá» preserva mejor la decisión léxica inglesa que la forma tildada «Puvá».
  issues:
  - severity: medium
    issue: «Puvá» usa una acentuación poco natural en español bíblico.
    rationale: El hebreo apoya la forma consonántica Puvah frente a Puah, pero en español la tilde final en «Puvá» no es necesaria y suena artificial. «Puva» conserva la distinción léxica sin introducir una grafía marcada.
  - severity: low
    issue: «por sus clanes» puede mejorarse a «según sus clanes».
    rationale: Ambas opciones son fieles, pero «según sus clanes» suena algo más natural en una fórmula censal y refleja bien el valor clasificatorio de לְמִשְׁפְּחֹתָם.
  revised_spanish_text: 'Los hijos de Isacar según sus clanes: de Tola, el clan de los tolaítas; de Puva[a], el clan de los punitas.'
  revised_footnotes:
  - marker: a
    text: En pasajes relacionados, este nombre aparece con la grafía «Puá».
    reason: alternative_reading
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad del español censal («según sus clanes») y para ajustar la transliteración a una forma más legible y menos artificial en español («Puva» en lugar de «Puvá»), sin perder la distinción documentada frente a la variante «Puá».
