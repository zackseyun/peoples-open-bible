review_pass:
  verdict: revise
  source_alignment_summary: El hebreo es una simple lista de nombres propios coordinados por וְאֶת. El borrador español conserva correctamente la estructura listal y la mayoría de los nombres, pero introduce una adaptación no justificada en יִדְלָף al pasar de la decisión auditada inglesa 'Jidlaph' a 'Jidlaf'. Dado que la nota inglesa preserva como alternativa 'Yidlaph', la consonante final aspirada forma parte de la decisión documentada y no debe omitirse sin nueva justificación de fuente.
  spanish_quality_summary: El español es claro y natural para una lista genealógica. 'Betuel' es una forma bíblica española natural y aceptable. La puntuación y fluidez son buenas. La principal reparación necesaria es mantener coherencia transliterativa en 'Jidlaf/Jidlaph' y en la nota asociada.
  glossary_alignment: No hay términos teológicos sensibles aquí. El tratamiento de nombres propios por transliteración está en línea con el proyecto. 'Betuel' como forma española es razonable. 'Hazo' puede mantenerse; no hace falta introducir 'Jazo'. La desviación relevante es 'Jidlaf', que se aparta de la decisión léxica auditada sin necesidad.
  issues:
  - severity: medium
    issue: '''Jidlaf'' omite la h final de la forma auditada ''Jidlaph'''
    rationale: La evidencia inglesa documenta 'Jidlaph' como forma elegida y 'Yidlaph' como alternativa más fonética. Cambiar a 'Jidlaf' no refleja esa decisión y reduce la trazabilidad transliterativa del nombre hebreo יִדְלָף.
  - severity: low
    issue: La nota al pie repite la adaptación 'Yidlaf' en vez de la alternativa auditada 'Yidlaph'
    rationale: Para mantener fidelidad al rastro de auditoría, la alternativa debe reflejar la forma documentada con -ph, a menos que se justifique explícitamente una adaptación ortográfica española distinta, cosa que aquí no se documenta.
  - severity: low
    issue: La alternativa léxica 'Jazo' en las decisiones no está respaldada por el rastro inglés
    rationale: No afecta el texto publicado, pero añade ruido innecesario. La forma principal 'Hazo' ya es suficiente y fiel.
