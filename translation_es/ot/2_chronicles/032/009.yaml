translation:
  language: es
  text: Después de esto, Senaquerib, rey de Asiria, envió a sus siervos a Jerusalén—mientras estaba en Laquis[a] con todas sus fuerzas[b] con él—contra Ezequías, rey de Judá, y contra todos los de Judá que estaban en Jerusalén, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras estaba contra Laquis» o «mientras sitiaba Laquis». El hebreo dice literalmente «sobre/contra Laquis», una expresión militar.
    reason: lexical_alternative
  - marker: b
    text: O «con todo su dominio con él». El término hebreo puede referirse al dominio o autoridad de Senaquerib o, en contexto, a la totalidad de las fuerzas bajo su mando.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר זֶה
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Más tarde
  - Después de estas cosas
  lexicon: HALOT
  rationale: La expresión hebrea marca transición temporal simple. «Después de esto» conserva la secuencia sin añadir interpretación.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo básico de envío se expresa naturalmente en español con «envió», que mantiene el valor directo del hebreo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus funcionarios
  - sus esclavos
  lexicon: HALOT
  rationale: En contexto regio/diplomático, עֲבָדִים puede referirse a servidores o agentes del rey. «Siervos» conserva la forma léxica amplia sin introducir «esclavos», que aquí no está exigido por el contexto.
- source_word: יְרוּשָׁלַיְמָה
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: HALOT
  rationale: El he direccional se refleja de manera natural con «a Jerusalén».
- source_word: וְהוּא עַל לָכִישׁ
  english_pob_choice: while he was at Lachish
  chosen_spanish: mientras estaba en Laquis
  alternatives_spanish:
  - mientras estaba contra Laquis
  - mientras sitiaba Laquis
  lexicon: HALOT
  rationale: El POB inglés optó por una formulación más natural sin fijar un detalle militar no explicitado por la sintaxis. En español, «mientras estaba en Laquis» reproduce el marco de ubicación y deja abierta la relación hostil que el contexto sugiere.
- source_word: וְכָל מֶמְשַׁלְתּוֹ עִמּוֹ
  english_pob_choice: with all his forces with him
  chosen_spanish: con toda su fuerza con él
  alternatives_spanish:
  - con todo su dominio con él
  - con todo su ejército con él
  - con todo su poder con él
  lexicon: HALOT
  rationale: מֶמְשָׁלָה puede significar dominio, gobierno, poder o esfera de autoridad. Siguiendo el audit trail inglés, aquí la idea se entiende mejor como la plenitud de sus fuerzas/poder presentes con él. «Toda su fuerza» mantiene el campo semántico de poder efectivo sin convertirlo demasiado pronto en «ejército».
- source_word: עַל יְחִזְקִיָּהוּ ... וְעַל כָּל יְהוּדָה
  english_pob_choice: against Hezekiah ... and against all Judah
  chosen_spanish: contra Ezequías ... y contra todo Judá
  alternatives_spanish:
  - a Ezequías ... y a todo Judá
  lexicon: HALOT
  rationale: En contexto hostil, עַל se rinde mejor por «contra», porque el movimiento es adversarial y no meramente direccional.
- source_word: אֲשֶׁר בִּירוּשָׁלִַם
  english_pob_choice: who were in Jerusalem
  chosen_spanish: que estaba en Jerusalén
  alternatives_spanish:
  - que estaban en Jerusalén
  - que residía en Jerusalén
  lexicon: HALOT
  rationale: El hebreo califica a todo Judá como el grupo localizado en Jerusalén. «Que estaba en Jerusalén» es conciso y fiel; aunque el plural español podría sonar más natural, el antecedente colectivo permite esta redacción.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se traslada con «diciendo», equivalente idiomático directo en español bíblico moderno.
theological_decisions:
- issue: Topónimo y nombre divino ausente; no masking by convention needed, but keep source-historical register.
  english_pob_reading: No theological annotation in the English POB for this verse.
  chosen_spanish_reading: No se añade glosa doctrinal; se conserva el registro histórico y militar del pasaje.
  alternative_spanish_readings:
  - Añadir notas históricas sobre Laquis y Senaquerib
  - Reformular con tono más devocional
  rationale: El versículo funciona como marco narrativo-histórico y no presenta una tensión doctrinal específica. La fidelidad al registro evita sobreinterpretar el texto.
  doctrine_reference: Narrative historical context; no direct doctrinal locus
- issue: מֶמְשָׁלָה / power-domain ambiguity
  english_pob_reading: '''all his forces'' may reflect his imperial rule/realm or the full power under his command.'
  chosen_spanish_reading: «toda su fuerza» conserva la posibilidad de poder efectivo, sin cerrarla solo en ejército.
  alternative_spanish_readings:
  - todo su dominio
  - todo su ejército
  - todo su poder
  rationale: La hebra permite una amplitud semántica entre dominio, esfera de gobierno y poder militar. «Fuerza» mantiene esa ambigüedad útil y se ajusta al contexto de asedio.
  doctrine_reference: Lexical/theological tension preserved at the level of historical power
- issue: Preposición hostil עַל
  english_pob_reading: against Hezekiah ... and against all Judah
  chosen_spanish_reading: contra Ezequías ... y contra todo Judá
  alternative_spanish_readings:
  - a Ezequías ... y a todo Judá
  - sobre Ezequías ... y sobre todo Judá
  rationale: El contexto bélico exige un valor adversativo. «Contra» comunica mejor la hostilidad que una simple dirección hacia alguien.
  doctrine_reference: Military/legal hostility in narrative context
translation_notes:
  revision_awareness: La versión inglesa revisada del POB cambió «before Lachish» por «at Lachish» y «all his dominion» por «all his forces» para mayor naturalidad y para reflejar mejor el poder/recursos presentes con él. La traducción española sigue esa revisión, pero conserva en nota la amplitud semántica de מֶמְשָׁלָה y el trasfondo militar de עַל לָכִישׁ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se usa «siervos» para עֲבָדִים en sentido cortesano; no se emplea «esclavos» porque el contexto es diplomático.
  - «Laquis» sigue la forma toponímica española habitual y no requiere adaptación adicional.
  - La estructura con guiones largos respeta el inciso explicativo presente en el audit trail inglés.
