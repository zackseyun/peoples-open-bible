    reason: lexical_alternative
  revision_rationale: 'Se ajustó «promulgada» a «publicada» para reflejar con más naturalidad el pasivo administrativo de לְהִנָּתֵן en español. Se reemplazó «siendo dada a conocer» por una formulación más fluida: «y dada a conocer públicamente». También se prefirió «preparados» sobre «listos» por tono más digno y ligeramente más cercano al matiz de עֲתִדִים. Se mantuvieron las notas existentes, anclando correctamente [b] en el texto revisado.'
