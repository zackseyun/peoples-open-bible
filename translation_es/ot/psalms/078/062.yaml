revisions:
- from: Entregó a su pueblo a la espada[a], y se encendió contra su heredad[b].
  to: Entregó a su pueblo a la espada[a], y se enfureció con su heredad[b].
  rationale: Se corrige la nota [a] para que refleje fielmente la alternativa documentada sin introducir un pronombre singular ajeno al texto. Se ajusta la segunda cláusula a «se enfureció con su heredad» para alinearse mejor con el rastro POB («was enraged with his inheritance») y mantener la intensidad de הִתְעַבָּר. La nota [b] conserva una alternativa española válida que expresa el posible matiz adversativo.
