  to: Tomaste parte de tus vestidos y te hiciste lugares altos multicolores[a], y te prostituiste sobre ellos; cosas así no debían venir[b], ni debían ser.
  rationale: Se ajustó el español para mayor naturalidad y fidelidad al uso bíblico ('lugares altos'), se eliminó la redundancia de 'te hiciste para ti', y se reubicó la nota de la cláusula final al lugar que realmente explica. También se afinó la nota alternativa para evitar repetir exactamente la lectura principal y reflejar mejor la alternativa interpretativa del POB inglés.
