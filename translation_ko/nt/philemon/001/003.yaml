id: PHM.1.3
reference: Philemon 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/003.yaml
  text: Grace to you and peace from God our Father and the Lord Jesus Messiah[a].
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'' The Greek Χριστός can function title-like (''Messiah'') or, in some contexts, more name-like (''Christ'').'
    reason: alternative_reading
translation:
  language: ko
  text: 우리 아버지 하나님과 주 예수 메시아[a]께로부터 은혜와 평강이 여러분에게 있기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「예수 그리스도」. 헬라어 Χριστός는 칭호로 기능할 수 있고(「메시아」), 어떤 문맥에서는 이름처럼 굳어진 형태로 쓰일 수 있다(「그리스도」). 본 번역은 칭호로 옮기는 원칙을 따른다.
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_korean: 은혜
  alternatives_korean:
  - 호의
  - 은총
  lexicon: BDAG
  rationale: 「은혜」는 바울 서신의 인사 정식에서 가장 표준적이고 관계적·신학적 무게를 함께 담는 한국어 어휘이다.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_korean: 평강
  alternatives_korean:
  - 평화
  - 안녕
  lexicon: BDAG
  rationale: 바울 서신의 인사에서 εἰρήνη는 히브리어 שָׁלוֹם의 그림자가 짙으며, 한국 교회 전통의 「평강」은 단순한 사회적 평화(平和) 이상의 안녕·온전함을 함의해 그 무게를 살린다.
- source_word: ἀπὸ θεοῦ πατρὸς ἡμῶν
  english_pob_choice: from God our Father
  chosen_korean: 우리 아버지 하나님께로부터
  alternatives_korean:
  - 우리 하나님 아버지로부터
  lexicon: BDAG
  rationale: 동격 구문(하나님—곧 우리 아버지)을 자연스러운 한국어 어순으로 옮기며, 인사 정식의 친밀한 음조를 유지한다.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  - 주인
  lexicon: BDAG
  rationale: 신약의 기독론적 칭호로서 굳어진 「주(主)」를 유지한다. 「주 예수 메시아」의 구문 흐름이 가장 간결하다.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  - 예수 곧 메시아
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다. 한국 전통 번역의 「예수 그리스도」는 칭호성이 가려지므로 피한다.
theological_decisions:
- issue: 인사 정식의 Χριστοῦ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 한국 전통 번역에서 「그리스도」는 사실상 이름처럼 굳어졌으나, 헬라어 본문은 칭호의 무게를 그대로 담고 있다. 본 번역의 일관성과 DOCTRINE.md 원칙에 따라 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
