revisions:
- from: No han guardado la carga de mis cosas santas[a], sino que han nombrado a otros para que guardaran la carga en mi santuario, en lugar de ustedes.
  to: No han cumplido el encargo de mis cosas santas, sino que han nombrado a otros para que cumplan mi encargo en mi santuario, para ustedes[a].
  rationale: 'Se ajusta el texto para reflejar mejor el hebreo y el audit trail inglés: ''encargo'' comunica con más fidelidad y naturalidad el sentido de מִשְׁמֶרֶת; se mantiene ''mis cosas santas'' por su amplitud deliberada; y לָכֶם vuelve al valor base ''para ustedes'', dejando ''en lugar de ustedes'' como alternativa en nota. También se corrige el anclaje de la nota al segmento pertinente del texto.'
