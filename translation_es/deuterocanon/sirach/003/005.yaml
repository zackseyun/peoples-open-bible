translation:
  language: es
  text: Quien honra a su padre se alegrará en sus hijos[a], y su oración será escuchada y respondida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «en su hijo» en singular; el paralelo griego lee «en sus hijos».
    reason: alternative_reading
  - marker: b
    text: El paralelo griego solo dice «será escuchada» al final; el hebreo añade «y respondida».
    reason: alternative_reading
lexical_decisions:
- source_word: מְכַבֵּד
  english_pob_choice: honors
  chosen_spanish: honra
  alternatives_spanish:
  - da honor a
  - respeta
  - glorifica
  lexicon: HALOT
  rationale: כבד en piel expresa dar peso, honor o reconocimiento debido. En español, «honra» conserva la fuerza ética y la dignidad sapiencial del enunciado sin sonar forzado.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su progenitor
  - a su papá
  lexicon: HALOT
  rationale: El hebreo especifica «su padre»; se mantiene esa relación exacta en un español natural y reverente.
- source_word: יִשְׂמַח
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - sentirá gozo
  lexicon: HALOT
  rationale: El verbo expresa alegría futura. «Se alegrará» es idiomático en español y preserva el tono sapiencial de promesa o consecuencia.
- source_word: בִּבְנוֹ
  english_pob_choice: in his children
  chosen_spanish: en sus hijos
  alternatives_spanish:
  - por sus hijos
  - con sus hijos
  - en su hijo
  lexicon: HALOT
  rationale: La evidencia hebrea tiene singular («su hijo»), pero el contexto y la decisión revisada del POB inglés favorecen el plural como traducción más natural de la descendencia en español. Se conserva la tensión textual con una nota.
- source_word: וּתְפִלָתוֹ
  english_pob_choice: and his prayer
  chosen_spanish: y su oración
  alternatives_spanish:
  - y su plegaria
  - y su ruego
  lexicon: HALOT
  rationale: תפילה se vierte con el término común y digno «oración», suficiente para la lengua bíblica en español.
- source_word: יִשְׁמַע וְיַעֲנֶה
  english_pob_choice: will be heard and answered
  chosen_spanish: será escuchada y respondida
  alternatives_spanish:
  - será oída y contestada
  - será escuchada y atendida
  lexicon: HALOT
  rationale: 'El hebreo usa dos verbos: oír/escuchar y responder. La forma pasiva en español preserva el sentido de la oración como sujeto receptor de la acción, sin añadir explícitamente al agente divino en el texto principal.'
theological_decisions:
- issue: Agencia divina implícita en que la oración sea escuchada y respondida
  english_pob_reading: his prayer will be heard and answered
  chosen_spanish_reading: su oración será escuchada y respondida
  alternative_spanish_readings:
  - Dios escuchará y responderá su oración
  - su oración llegará a ser oída por Dios
  rationale: El hebreo no nombra a Dios de manera explícita; la agencia divina está implícita por el género sapiencial. La traducción mantiene ese nivel de explicitud, como hace el texto fuente.
  doctrine_reference: Preservar la tensión teológica sin explicitar más de lo que el hebreo dice.
- issue: Relación entre el singular hebreo y el plural griego en la descendencia
  english_pob_reading: in his children
  chosen_spanish_reading: en sus hijos
  alternative_spanish_readings:
  - en su hijo
  - en su descendencia
  rationale: El hebreo subyacente habla de un hijo en singular, mientras que el griego paralelo amplía a plural. Se eligió el plural español siguiendo la revisión inglesa y para comunicar con naturalidad el resultado familiar general, manteniendo la tensión con una nota textual.
  doctrine_reference: Responder a la evidencia textual múltiple sin nivelar las variantes.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al reflejar el sentido plural de la descendencia en el español principal, pero se conservó la tensión entre el hebreo singular y el griego plural mediante nota. También se mantuvo la cláusula final con dos verbos, en línea con el hebreo, aunque el griego solo explicita «será escuchada».
  spanish_consistency_notes:
  - Se usó «honra» para מְכַבֵּד por su naturalidad y por conservar el valor de dar peso o consideración.
  - Se prefirió «oración» sobre «plegaria» por consistencia con el registro bíblico general en español.
  - Se evitó introducir explícitamente a Dios en el texto principal, porque el hebreo no lo nombra en esta cláusula.
  - Se mantuvo «hijos» en plural para seguir la revisión POB y reflejar el sentido colectivo en español, con nota de variante.
  - La puntuación reproduce dos miembros coordinados y una clausura final, acorde con la estructura sapiencial del versículo.
