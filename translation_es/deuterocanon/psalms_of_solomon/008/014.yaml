review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: negación total con παρέλειπον, objeto ἁμαρτίαν, relativa ἣν οὐκ ἐποίησαν, y cierre comparativo ὑπὲρ τὰ ἔθνη. Sin embargo, «más allá de las naciones» suena espacial y poco idiomático en español para una comparación moral; el sentido de exceso/superación de ὑπέρ se expresa mejor con «más que las naciones» o equivalente. También conviene ajustar el tiempo verbal para mayor naturalidad y cercanía al griego.'
  spanish_quality_summary: El texto es comprensible, pero «No omitieron ningún pecado…» resulta algo rígido y «más allá de las naciones» suena forzado en español e introduce una imagen espacial innecesaria. Una leve revisión mejora naturalidad y precisión sin perder literalidad. La nota alternativa actual repite casi el mismo texto y puede reformularse para preservar una alternativa real.
  glossary_alignment: 'No hay términos del glosario principal en disputa. «Pecado» para ἁμαρτίαν está bien. La decisión clave es ὑπὲρ τὰ ἔθνη: debe mantenerse «naciones», no «gentiles», pero con una formulación comparativa idiomática en español. «Cometieron» sigue siendo la mejor opción contextual para ἐποίησαν.'
  issues:
  - severity: medium
    issue: «más allá de las naciones» no comunica bien el valor comparativo de ὑπὲρ τὰ ἔθνη
    rationale: 'En español, «más allá de» se entiende ante todo de modo espacial o metafórico amplio. Aquí el griego expresa exceso comparativo: pecaron más que/superando a las naciones.'
  - severity: low
    issue: «hubieran cometido» es más pesado de lo necesario
    rationale: El griego no exige ese matiz remoto; «cometieron» mantiene mejor la fuerza proverbial/general de la acusación y mejora la fluidez.
  - severity: low
    issue: La nota alternativa actual no ofrece una alternativa claramente distinta y natural
    rationale: Debe preservar la opción literal de «hicieron» o una formulación comparativa distinta, no solo repetir la redacción principal con una pequeña variación poco elegante.
  revised_spanish_text: No omitieron ningún pecado que no cometieron[a], más que las naciones.
