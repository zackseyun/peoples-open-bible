translation:
  language: es
  text: En Jerusalén hizo dispositivos[a], inventados por hombres hábiles, para que estuvieran en las torres y en las esquinas, para lanzar flechas y piedras grandes. Y su fama[b] se extendió muy lejos, porque fue maravillosamente ayudado[c] hasta que se hizo fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'máquinas' o 'ingenios'; es decir, dispositivos militares diseñados para usarse en las torres y en las esquinas de las fortificaciones.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'salió su nombre'.
    reason: lexical_alternative
  - marker: c
    text: El texto no nombra explícitamente a quien lo ayudó, aunque el contexto sugiere ayuda divina.
    reason: alternative_reading
lexical_decisions:
- source_word: חִשְּׁבֹנוֹת
  english_pob_choice: devices
  chosen_spanish: dispositivos
  alternatives_spanish:
  - máquinas
  - artefactos
  - ingenios
  lexicon: HALOT
  rationale: El sustantivo hebreo señala inventos o mecanismos ideados con propósito. 'Dispositivos' conserva esa amplitud en español moderno y evita precisar indebidamente la tecnología antigua.
- source_word: מַחֲשֶׁבֶת חוֹשֵׁב
  english_pob_choice: invented by skillful men
  chosen_spanish: inventados por hombres hábiles
  alternatives_spanish:
  - diseñados por un experto
  - concebidos por un artesano
  - ideados por hombres expertos
  lexicon: HALOT
  rationale: La repetición cognada subraya diseño intencional y pericia artesanal. 'Inventados por hombres hábiles' transmite ambos matices de forma natural en español.
- source_word: עַל הַמִּגְדָּלִים וְעַל הַפִּנּוֹת
  english_pob_choice: on the towers and on the corners
  chosen_spanish: en las torres y en las esquinas
  alternatives_spanish:
  - sobre las torres y sobre las esquinas
  - en las torres y en los ángulos
  - sobre las torres y en las esquinas
  lexicon: HALOT
  rationale: '''Torres'' traduce מגדלים de manera directa. ''Esquinas'' preserva el valor literal de פנות sin sustituirlo por un término interpretativo como ''bastiones'' o ''almenas''.'
- source_word: לִירוֹא בַּחִצִּים וּבָאֲבָנִים גְּדֹלֹות
  english_pob_choice: to shoot arrows and large stones
  chosen_spanish: para disparar flechas y piedras grandes
  alternatives_spanish:
  - para lanzar flechas y piedras grandes
  - para tirar flechas y piedras grandes
  - para disparar flechas y grandes piedras
  lexicon: HALOT
  rationale: El verbo admite el sentido de disparar/lanzar. 'Disparar flechas y piedras grandes' mantiene la finalidad del texto y el paralelismo, sin forzar una reconstrucción técnica más específica.
- source_word: וַיֵּצֵא שְׁמוֹ עַד לְמֵרָחוֹק
  english_pob_choice: his fame spread far abroad
  chosen_spanish: su fama se extendió hasta muy lejos
  alternatives_spanish:
  - su nombre salió hasta muy lejos
  - su renombre se difundió lejos
  - su fama llegó hasta muy lejos
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente que 'salió su nombre'; en español, 'fama' comunica con claridad el sentido de reputación o renombre que se difunde ampliamente.
- source_word: הִפְלִיא לְהֵעָזֵר
  english_pob_choice: he was marvelously helped
  chosen_spanish: fue maravillosamente ayudado
  alternatives_spanish:
  - recibió ayuda maravillosa
  - fue ayudado de manera maravillosa
  - fue extraordinariamente ayudado
  lexicon: HALOT
  rationale: La pasiva conserva que el agente de la ayuda queda implícito en el hebreo. 'Maravillosamente' refleja el matiz de acción extraordinaria o portentosa.
- source_word: עַד כִּי חָזָק
  english_pob_choice: until he became strong
  chosen_spanish: hasta que se hizo fuerte
  alternatives_spanish:
  - hasta que fue fuerte
  - hasta que creció en fuerza
  - hasta que llegó a ser fuerte
  lexicon: HALOT
  rationale: '''Se hizo fuerte'' comunica el estado alcanzado sin añadir elementos ajenos. Mantiene bien el resultado de la ayuda mencionada en la cláusula anterior.'
theological_decisions:
- issue: Agente implícito de la ayuda
  english_pob_reading: left implicit in the main text ('he was marvelously helped')
  chosen_spanish_reading: se mantiene implícito en 'fue maravillosamente ayudado'
  alternative_spanish_readings:
  - '''Yahvé lo ayudó maravillosamente'''
  - '''fue ayudado maravillosamente por Yahvé'''
  rationale: El hebreo no nombra explícitamente a Dios en esta cláusula, aunque el contexto mayor lo sugiere. Para no importar una precisión que el versículo no dice, se conserva la forma pasiva con agente implícito.
  doctrine_reference: Principio de primacía del texto original; no añadir sujetos teológicos no expresados explícitamente en el versículo.
translation_notes:
  revision_awareness: Se siguió de cerca el contexto auditado en inglés y no hubo revisiones aplicadas en la última pasada; el draft español conserva la misma línea interpretativa, incluyendo la pasiva para la ayuda implícita y la nota sobre el hebraísmo de 'su nombre salió'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma base del nombre divino en la serie española, pero este versículo no lo explicita en el cuerpo del texto.
  - '''dispositivos'' se eligió para mantener amplitud semántica sin tecnicismo excesivo.'
  - '''esquinas'' preserva el valor literal de פנות y evita una actualización interpretativa innecesaria.'
  - '''fama'' en español comunica el hebraísmo de ''su nombre'' con naturalidad, y la nota mantiene visible la literalidad del original.'
