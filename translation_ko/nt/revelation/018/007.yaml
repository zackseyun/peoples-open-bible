  text: ὅσα ἐδόξασεν αὑτὴν καὶ ἐστρηνίασεν, τοσοῦτον δότε αὐτῇ βασανισμὸν καὶ πένθος. ὅτι ἐν τῇ καρδίᾳ αὐτῆς λέγει ὅτι Κάθημαι βασίλισσα, καὶ χήρα οὐκ εἰμί, καὶ πένθος οὐ μὴ ἴδω.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/007.yaml
  text: As much as she glorified herself and lived in luxury[a], give her that much torment and mourning. For she says in her heart, ‘I sit as a queen, and I am not a widow[b], and I will certainly never see mourning.’
  footnotes:
  - marker: a
    text: Or 'lived self-indulgently' or 'lived sensuously.' The Greek verb can denote luxurious, wanton living.
    reason: lexical_alternative
  - marker: b
    text: The expression 'I will certainly never see mourning' uses an emphatic Greek negation, expressing strong confidence that mourning will never come.
    reason: lexical_alternative
translation:
  language: ko
  text: '그가 자신을 영화롭게 하고 사치한 만큼, 그에게 그만큼의 고통과 슬픔을 주어라. 그가 마음속으로 「나는 여왕으로 앉았고, 과부가 아니며, 결코 슬픔을 보지 아니하리라」 하고 말하기 때문이다.'
  philosophy: optimal-equivalence
