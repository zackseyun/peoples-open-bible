translation:
  language: es
  text: 'pero volviste, comiste pan y bebiste agua en el lugar respecto al cual él te dijo: «No comas pan ni bebas agua»; tu cadáver no llegará[a] a la tumba de tus padres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tu cadáver no entrará en la tumba de tus padres». El hebreo dice literalmente «no llegará a la tumba de tus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשָׁב
  english_pob_choice: you came back
  chosen_spanish: volviste
  alternatives_spanish:
  - regresaste
  - te volviste
  lexicon: HALOT, שוב
  rationale: El hebreo narra una acción de retorno en secuencia; «volviste» mantiene la fuerza verbal directa en español sin añadir explicación.
- source_word: וַתֹּאכַל לֶחֶם
  english_pob_choice: ate bread
  chosen_spanish: comiste pan
  alternatives_spanish:
  - comiste alimento
  - comiste pan
  lexicon: HALOT, אכל / לחם
  rationale: Se conserva el objeto concreto «pan», como en el hebreo y en la traducción inglesa auditada, para mantener el eco con la prohibición repetida.
- source_word: וַתֵּשְׁתְּ מַיִם
  english_pob_choice: drank water
  chosen_spanish: bebiste agua
  alternatives_spanish:
  - tomaste agua
  - bebiste agua
  lexicon: HALOT, שתה / מים
  rationale: «Bebiste agua» reproduce de manera directa el paralelismo con la prohibición y conserva la repetición retórica del texto.
- source_word: בַּמָּקוֹם אֲשֶׁר דִּבֶּר אֵלֶיךָ
  english_pob_choice: in the place about which he said to you
  chosen_spanish: en el lugar acerca del cual él te dijo
  alternatives_spanish:
  - en el lugar sobre el cual él te habló
  - en el lugar donde él te dijo
  lexicon: HALOT, מקום / דבר
  rationale: «Acerca del cual» conserva la relación del lugar con la palabra dada, siguiendo la decisión inglesa revisada; en español resulta algo más natural que un calco rígido y no pierde la referencia al lugar mencionado.
- source_word: אַל תֹּאכַל לֶחֶם וְאַל תֵּשְׁתְּ מָיִם
  english_pob_choice: Do not eat bread, and do not drink water
  chosen_spanish: No comas pan ni bebas agua
  alternatives_spanish:
  - No comas pan, y no bebas agua
  - No debes comer pan ni beber agua
  lexicon: HALOT, אכל / שתה
  rationale: La prohibición se expresa en forma directa e imperativa, como en hebreo; se mantiene el paralelismo entre pan y agua sin suavizar la orden.
- source_word: נִבְלָתְךָ
  english_pob_choice: your corpse
  chosen_spanish: tu cadáver
  alternatives_spanish:
  - tu cuerpo muerto
  - tu cadáver
  lexicon: HALOT, נבלה
  rationale: «Cadáver» transmite la referencia al cuerpo muerto con dignidad y claridad en español; preserva la dureza del juicio sin introducir una pasiva ajena al hebreo.
- source_word: אֶל קֶבֶר אֲבֹתֶיךָ
  english_pob_choice: to the tomb of your fathers
  chosen_spanish: a la tumba de tus padres
  alternatives_spanish:
  - al sepulcro de tus padres
  - a la tumba de tus padres
  lexicon: HALOT, קבר / אב
  rationale: «Tumba» comunica de forma clara y natural el sentido de קבר en este contexto funerario; «padres» sigue la formulación hebrea y la opción inglesa, preservando el vínculo familiar del entierro ancestral.
theological_decisions:
- issue: Forma de la sentencia sobre el destino del cadáver
  english_pob_reading: your corpse shall not come to the tomb of your fathers
  chosen_spanish_reading: tu cadáver no llegará a la tumba de tus padres
  alternative_spanish_readings:
  - tu cadáver no entrará en la tumba de tus padres
  - tu cadáver no será llevado a la tumba de tus padres
  rationale: 'Se conserva el carácter literal de la frase hebrea: el texto no dice explícitamente «será llevado», sino que niega que el cadáver «llegue» a la tumba. Esto mantiene la tensión del juicio como una negación de sepultura familiar, sin resolver el modo narrativo.'
  doctrine_reference: Preservar la forma concreta del juicio y la tensión textual
- issue: Referencia al lugar mencionado en la prohibición
  english_pob_reading: in the place about which he said to you
  chosen_spanish_reading: en el lugar acerca del cual él te dijo
  alternative_spanish_readings:
  - en el lugar donde él te dijo
  - en el lugar sobre el que él te habló
  rationale: La construcción intenta reflejar la relación del lugar con la palabra divina sin convertirla en una simple localización geográfica. La formulación española mantiene el vínculo entre sitio y mandato.
  doctrine_reference: Mantener la conexión entre palabra dada y lugar señalado
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa revisada que prefiere «about which» para la cláusula relativa del lugar, y conserva el sentido literal de נִבְלָתְךָ y קֶבֶר אֲבֹתֶיךָ sin convertir la sentencia en una paráfrasis. Se evita la terminología eclesiástica tradicional cuando no está exigida por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene el registro bíblico sobrio y directo, evitando arcaísmos innecesarios.
  - «Padres» reproduce la referencia familiar del hebreo y de la tradición auditada; no se amplía a «antepasados» para no diluir el vínculo funerario concreto.
