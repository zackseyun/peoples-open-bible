  language: en
  yaml_path: translation/ot/genesis/006/004.yaml
  text: The Nephilim were on the earth in those days—and also afterward—when the sons of God came in to the daughters of man[a], and they bore children to them. Those were the mighty men who were of old[c][b], men of renown.
  footnotes:
