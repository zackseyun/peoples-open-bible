  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: el límite pasa junto a Bet-hogla, termina en la ''lengua'' del Mar Salado, en el extremo sur del Jordán, y concluye con un resumen del borde meridional. Sin embargo, hay pequeños puntos de fidelidad y naturalidad mejorables en español.'
  spanish_quality_summary: 'El texto es claro y mayormente natural, pero ''hombro norte'' suena menos idiomático que ''ladera norte'' o ''costado norte'' en geografía española, y ''límite sur'' al final es comprensible pero menos natural y preciso que ''límite meridional'' o ''límite sur'' con artículo/adjetivo mejor ajustado. Además, la nota b está anclada al lugar equivocado: la variante ''Mar Muerto'' corresponde a ''Mar Salado'', no al Jordán.'
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Se preserva correctamente ''Mar Salado'' frente a ''Mar Muerto''. La transliteración ''Bet-hogla'' es aceptable. La decisión de mantener ''lengua'' sigue bien la auditoría inglesa. La principal excepción es léxica-estilística: para כֶּתֶף, ''hombro'' es muy literal pero menos legible en español geográfico; ''ladera'' comunica mejor el referente topográfico sin desbordar el sentido.'
  issues:
  - severity: medium
    issue: '''hombro norte'' para כֶּתֶף suena poco natural en español geográfico.'
    rationale: Aunque 'hombro' es una equivalencia formal posible, en una descripción de linderos españolas 'ladera norte' o 'costado norte' comunica mejor el accidente topográfico sin perder fidelidad.
  - severity: medium
    issue: La nota [b] está anclada a 'Jordán' en vez de a 'Mar Salado'.
    rationale: El contenido de la nota explica la alternativa 'Mar Muerto' para יָם הַמֶּלַח, por lo que debe marcar 'Mar Salado', no 'Jordán'.
  - severity: low
    issue: '''Este es el límite sur'' es algo tosco.'
    rationale: Es entendible, pero 'Este es el límite meridional' o 'Este es el límite del sur' suena más natural. Dado el registro buscado, 'límite meridional' equilibra dignidad y claridad.
  revised_spanish_text: Entonces el límite pasó a la ladera norte de Bet-hogla, y el límite terminó en la lengua[a] del Mar Salado[b], en el extremo sur del Jordán. Este es el límite meridional.
  revised_footnotes:
