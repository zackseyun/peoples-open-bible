translation:
  language: es
  text: ¿Y quién eres tú[a], Ajior, y los asalariados de Efraín entre todos los hijos de Moab, para que hayas profetizado entre nosotros como hiciste hoy, y hayas dicho que no se debe hacer guerra contra el linaje[b] de Israel, porque su Dios los defenderá? ¿Y quién es Dios[c] sino Nabucodonosor? Este enviará su fuerza y los exterminará de la faz de la tierra, y su Dios no los librará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mercenarios de Efraín». El término griego designa a hombres que sirven por paga y puede tener un tono despectivo.
    reason: lexical_alternative
  - marker: b
    text: O «la casa de Israel». El griego dice «el linaje/raza de Israel», enfatizando el parentesco étnico.
    reason: lexical_alternative
  - marker: c
    text: La pregunta «¿Y quién es Dios sino Nabucodonosor?» es una jactancia blasfema del hablante, no una afirmación del narrador.
    reason: theological_note
lexical_decisions:
- source_word: Καὶ τίς εἶ σύ
  english_pob_choice: And who are you
  chosen_spanish: ¿Y quién eres tú
  alternatives_spanish:
  - ¿Y quién eres?
  - ¿Y quién eres tú mismo?
  lexicon: LSJ
  rationale: Interrogación enfática directa. Mantengo el orden natural del español sin perder el tono de reproche.
- source_word: Ἀχιὼρ
  english_pob_choice: Achior
  chosen_spanish: Ajior
  alternatives_spanish:
  - Achior
  lexicon: Transliteración directa del nombre propio
  rationale: En español, la adaptación con j refleja mejor la pronunciación habitual y sigue siendo identificable como el mismo nombre.
- source_word: μισθωτοὶ
  english_pob_choice: hirelings
  chosen_spanish: los alquilados
  alternatives_spanish:
  - los mercenarios
  - los jornaleros
  lexicon: LSJ
  rationale: μισθωτοὶ designa personas que sirven por paga. «Los alquilados» conserva el matiz despectivo mejor que un giro más neutral; «mercenarios» sería más específico militarmente.
- source_word: Ἐφράιμ
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraim
  lexicon: Transliteración bíblica usual
  rationale: Nombre propio tribal en forma corriente en español bíblico.
- source_word: ὅτι ἐπροφήτευσας
  english_pob_choice: that you have prophesied
  chosen_spanish: que has profetizado
  alternatives_spanish:
  - que has hablado como profeta
  - que has predicho
  lexicon: LSJ
  rationale: El verbo conserva el lenguaje profético del griego; no conviene rebajarlo a una simple declaración o predicción.
- source_word: τὸ γένος Ἰσραήλ
  english_pob_choice: the house/race of Israel
  chosen_spanish: el linaje de Israel
  alternatives_spanish:
  - la casa de Israel
  - el pueblo de Israel
  lexicon: LSJ
  rationale: γένος apunta a linaje, raza o grupo de parentesco. «Linaje» conserva la fuerza genealógica que el inglés POB quiso mantener, sin sonar tan duro como «raza» en español.
- source_word: μὴ πολεμῆσαι
  english_pob_choice: one should not make war against
  chosen_spanish: no debía guerrear
  alternatives_spanish:
  - no debía hacer guerra
  - no debía combatir
  lexicon: LSJ
  rationale: En español, el infinitivo prohibitivo se expresa con naturalidad como una obligación negativa; «guerrear» preserva el sentido bélico conciso.
- source_word: θεὸς αὐτῶν ὑπερασπιεῖ αὐτῶν
  english_pob_choice: their God will defend them
  chosen_spanish: su Dios los defenderá
  alternatives_spanish:
  - su Dios los protegerá
  - su Dios peleará por ellos
  lexicon: LSJ
  rationale: «Defenderá» reproduce bien ὑπερασπιεῖ y mantiene el registro militar-legal del texto.
- source_word: Ναβουχοδονοσόρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  lexicon: Transliteración bíblica tradicional en español
  rationale: Forma asentada en español bíblico y fácilmente reconocible.
- source_word: ἀποστελεῖ τὸ κράτος αὐτοῦ
  english_pob_choice: He himself will send his force
  chosen_spanish: Este enviará su poder
  alternatives_spanish:
  - Este enviará su fuerza
  - Este enviará su ejército
  lexicon: LSJ
  rationale: κράτος puede ser poder, fuerza o dominio. «Poder» funciona de manera natural en español, aunque «fuerza» también sería posible; no lo reduzco a «ejército» porque el griego es más amplio.
- source_word: ἐξολεθρεύσει
  english_pob_choice: destroy
  chosen_spanish: los exterminará
  alternatives_spanish:
  - los destruirá
  - los aniquilará
  lexicon: LSJ
  rationale: El verbo es fuerte y significa destruir por completo; «exterminará» conserva mejor esa intensidad que un simple «destruirá».
- source_word: ἀπὸ προσώπου τῆς γῆς
  english_pob_choice: from the face of the earth
  chosen_spanish: de la faz de la tierra
  alternatives_spanish:
  - de la superficie de la tierra
  - de la tierra
  lexicon: LSJ
  rationale: Es un modismo bíblico equivalente; «faz» conserva el carácter solemne del original.
- source_word: οὐ ῥύσεται αὐτοὺς
  english_pob_choice: will not rescue them
  chosen_spanish: no los librará
  alternatives_spanish:
  - no los rescatará
  - no los salvará
  lexicon: LSJ
  rationale: ῥύσεται implica librar o rescatar de peligro. «Librará» es más idiomático en español bíblico y no añade connotaciones soteriológicas excesivas.
theological_decisions:
- issue: La afirmación blasfema sobre Nebucodonosor como ‘Dios’
  english_pob_reading: And who is God except Nebuchadnezzar?
  chosen_spanish_reading: ¿Y quién es Dios sino Nabucodonosor?
  alternative_spanish_readings:
  - ¿Y quién es dios sino Nabucodonosor?
  - ¿Y quién es Dios fuera de Nabucodonosor?
  rationale: El griego presenta una afirmación arrogante del hablante, no una confesión del narrador. En español, la mayúscula en «Dios» mantiene el registro literario de la POB, pero el contexto y la ironía del discurso siguen siendo claros; la tensión teológica debe quedar implícita en la escena, no resuelta por el traductor.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB inglés, que cambió 'race of Israel' por 'house of Israel' por naturalidad. En español, opté por 'linaje de Israel' porque preserva mejor el matiz genealógico de γένος sin sonar tan duro como 'raza' y sin perder el foco étnico señalado en la nota inglesa. También reflejé la tensión de 'God'/'god' manteniendo el contexto blasfemo mediante la nota teológica.
  spanish_consistency_notes:
  - Usé 'Yahvé' como término por defecto para el nombre divino, pero aquí el griego dice θεὸς y el contexto habla de 'su Dios'; por eso conservé 'Dios'.
  - 'Mantuve transliteraciones bíblicas usuales: Ajior, Efraín, Nabucodonosor.'
  - Evité 'siervo' para μισθωτοί porque el matiz despectivo del griego pide un equivalente más duro.
  - Conservé el paralelismo de las dos preguntas retóricas y el contraste entre el poder de Nabucodonosor y la incapacidad del dios de Israel según el hablante.
