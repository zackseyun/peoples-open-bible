translation:
  language: es
  text: Y en Moab haré juicios, y sabrán que yo soy Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH, el nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְ/מוֹאָב
  english_pob_choice: And in Moab
  chosen_spanish: Y en Moab
  alternatives_spanish:
  - Y contra Moab
  - Y sobre Moab
  lexicon: HALOT
  rationale: El ב con Moab señala el ámbito del acto judicial; en español, 'en Moab' conserva ese valor básico sin introducir una inferencia interpretativa de hostilidad que el hebreo no explicita en la preposición misma.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will execute
  chosen_spanish: haré
  alternatives_spanish:
  - ejecutaré
  - llevaré a cabo
  lexicon: HALOT
  rationale: Con שְׁפָטִים, עשה expresa la realización efectiva de actos judiciales. En español, 'haré' mantiene la amplitud del verbo hebreo y permite que el sustantivo siguiente aporte el matiz jurídico; 'ejecutaré' sería más técnico, pero algo más interpretativo.
- source_word: שְׁפָטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - juicios de condena
  - actos de juicio
  lexicon: HALOT
  rationale: '''שְׁפָטִים'' aquí refiere a acciones judiciales/punitivas de Dios. ''Juicios'' es una equivalencia natural en español y conserva el plural formal; evita reducir el término a mera ''justicia'', que sería más abstracto.'
- source_word: וְ/יָדְעוּ
  english_pob_choice: and they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - entonces sabrán
  - y conocerán
  lexicon: HALOT
  rationale: El waw consecutivo en contexto tiene sentido resultativo/futuro. 'Y sabrán' reproduce de forma natural ese valor sin añadir explícitamente 'entonces', que el hebreo no formula.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: '''כִּי'' introduce el contenido de lo que sabrán; en español, ''que'' es la construcción más directa y precisa.'
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: yo soy Yahvé
  alternatives_spanish:
  - yo soy Yahweh
  - yo soy el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el criterio del proyecto para יְהוָה, y se mantiene el énfasis del pronombre explícito 'yo' del hebreo. 'El SEÑOR' ocultaría el nombre propio, y 'Yahweh' sería menos natural en español que 'Yahvé'.
theological_decisions:
- issue: Uso del nombre divino יְהוָה en lugar de una sustitución titulada
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo presenta el Tetragrama directamente; la línea editorial del POB español requiere preservarlo como nombre propio. 'Yahvé' mantiene la identidad pactal y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota al pie ahora está anclada explícitamente en el texto con [a]. No se introdujeron cambios textuales adicionales más allá de ajustar la puntuación y el anclaje de la nota.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden sintáctico simple del hebreo: acción divina + objeto + resultado cognitivo.'
  - Se eligió 'Yahvé' en coherencia con la política del proyecto para יְהוָה.
  - '''Juicios'' conserva el plural y la fuerza judicial del sustantivo hebreo sin expandir el sentido.'
