translation:
  language: es
  text: Una lengua sanadora[a] es un árbol de vida, pero la perversidad en ella es un quebranto[b] del espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saludable» o «benigna»; מַרְפֵּא puede denotar curación, salud o una cualidad reparadora.
    reason: lexical_alternative
  - marker: b
    text: O «la torcedura en ella es una fractura del espíritu»; שֶׁבֶר puede expresar ruptura, fractura o quebrantamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְפֵּא
  english_pob_choice: gentle / healing / wholesome
  chosen_spanish: saludable
  alternatives_spanish:
  - sanadora
  - benigna
  - sana
  - que da salud
  lexicon: HALOT
  rationale: מַרְפֵּא puede expresar curación, salud o cualidad reparadora. En español, "saludable" conserva la idea de algo que da o promueve salud sin forzar una imagen demasiado psicológica como "gentil" ni una traducción demasiado médica como "sanadora".
- source_word: לָשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - habla
  - palabra
  - lenguaje
  lexicon: HALOT
  rationale: La imagen hebrea es literal y proverbial. "Lengua" mantiene la metáfora corporal y el paralelismo sapiencial mejor que una abstracción como "habla".
- source_word: עֵץ חַיִּים
  english_pob_choice: a tree of life
  chosen_spanish: árbol de vida
  alternatives_spanish:
  - árbol de la vida
  - árbol vivificante
  lexicon: HALOT
  rationale: Se conserva la expresión sapiencial sin añadir artículo donde el hebreo es anartro. "Árbol de vida" mantiene la resonancia intertextual con Proverbios y Génesis.
- source_word: סֶלֶף
  english_pob_choice: perverseness
  chosen_spanish: perversidad
  alternatives_spanish:
  - torcedura
  - torcimiento
  - deformidad moral
  lexicon: HALOT
  rationale: El término apunta a lo torcido o desviado en el habla. "Perversidad" comunica bien la desviación moral y verbal, y resulta más natural en español que "torcedura".
- source_word: בָּהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en la lengua
  - en ésta
  - en ella misma
  lexicon: HALOT
  rationale: El sufijo femenino se refiere a "lengua". "En ella" preserva la referencia pronominal y suena natural en español.
- source_word: שֶׁבֶר
  english_pob_choice: a broken spirit / a breaking
  chosen_spanish: quebranto
  alternatives_spanish:
  - fractura
  - quebradura
  - quebrantamiento
  lexicon: HALOT
  rationale: שֶׁבֶר denota ruptura, quebradura o colapso. "Quebranto" es un sustantivo español natural que conserva el daño o la ruptura sin volverlo demasiado técnico.
- source_word: בְּרוּחַ
  english_pob_choice: of the spirit / inner spirit
  chosen_spanish: del espíritu
  alternatives_spanish:
  - en el espíritu
  - del ánimo
  - del interior
  lexicon: HALOT
  rationale: En este proverbio רוּחַ se entiende mejor como el espíritu interior humano. "Del espíritu" conserva el alcance antropológico sin decidir indebidamente por "ánimo" o "Espíritu".
theological_decisions:
- issue: Referencia de רוּחַ
  english_pob_reading: human spirit / inner disposition
  chosen_spanish_reading: espíritu humano / interior
  alternative_spanish_readings:
  - Espíritu (divino)
  - ánimo
  rationale: El contraste del proverbio trata sobre el efecto del habla en la persona. El contexto favorece el espíritu humano interior; no hay base suficiente aquí para capitalizarlo como una referencia al Espíritu divino.
  doctrine_reference: Antropología bíblica; mantener la distinción contextual entre espíritu humano y Espíritu de Dios.
- issue: Fuerza de מַרְפֵּא
  english_pob_reading: gentle / wholesome / healing
  chosen_spanish_reading: saludable / reparadora
  alternative_spanish_readings:
  - suave
  - amable
  - sanadora
  rationale: La nota inglesa preserva la tensión entre suavidad y salud/restauración. "Saludable" deja abierta la dimensión de salud y restauración, sin borrar el matiz de trato no agresivo que el contexto proverbial sugiere.
  doctrine_reference: Sabiduría bíblica sobre el poder moral y vivificante de la palabra.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto inglés POB, que pasó de «healing tongue» a «gentle tongue» y de «a breaking of the spirit» a «a broken spirit». La presente versión española busca reflejar ambas capas: la cualidad saludable/restauradora de מַרְפֵּא y el sustantivo de ruptura de שֶׁבֶר con un español natural, sin perder el paralelismo proverbial.'
  spanish_consistency_notes:
  - Se mantiene "árbol de vida" sin artículo para respetar el hebreo anartro y la resonancia sapiencial.
  - '"Lengua" se conserva como metáfora corporal, en línea con el original, en vez de sustituirla por una abstracción.'
  - No se usa "SEÑOR" ni terminología litúrgica ajena al verso; el pasaje no contiene el nombre divino.
  - '"Espíritu" permanece en minúscula y sin capitalización teológica, porque el contexto apunta al espíritu humano.'
