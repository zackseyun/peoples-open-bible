translation:
  language: es
  text: Yahvé nos sacó de Egipto con una mano fuerte y con un brazo extendido, y con gran terror[a], y con señales y prodigios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "con gran asombro" o "con grandes hechos que inspiran asombro". El término hebreo puede denotar temor, terror o una manifestación que produce asombro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִאֵנוּ
  english_pob_choice: brought us out
  chosen_spanish: nos sacó
  alternatives_spanish:
  - nos trajo fuera
  - nos llevó fuera
  lexicon: HALOT
  rationale: El hiphil de יצא expresa hacer salir o sacar. En español, "nos sacó" comunica de forma natural el acto exódico sin perder la fuerza causal del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme al criterio del POB en español. "Yahvé" evita la sustitución por un título y mantiene la referencia al nombre del pacto.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con el verbo "sacar", el complemento natural en español es "de Egipto"; el sentido exódico queda claro sin añadir material innecesario.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - con mano poderosa y fuerte
  lexicon: HALOT
  rationale: La imagen idiomática se conserva de manera directa. "Fuerte" sigue de cerca el adjetivo hebreo y suena natural en español bíblico contemporáneo.
- source_word: וּבִזְרֹעַ נְטוּיָה
  english_pob_choice: and an outstretched arm
  chosen_spanish: y con brazo extendido
  alternatives_spanish:
  - y con brazo alargado
  - y con brazo tendido
  lexicon: HALOT
  rationale: La metáfora exódica se mantiene con una equivalencia idiomática clara. "Extendido" expresa היטב la imagen de זְרוֹעַ נְטוּיָה y resulta comprensible en español.
- source_word: וּבְמֹרָא גָּדֹל
  english_pob_choice: with great terror
  chosen_spanish: con gran terror
  alternatives_spanish:
  - con gran temor
  - con gran awe
  lexicon: HALOT
  rationale: Se conserva la ambigüedad semántica del término dentro del contexto de juicios sobre Egipto. "Gran terror" refleja bien la fuerza del sustantivo y la lectura adoptada por el POB en inglés.
- source_word: וּבְאֹתֹת
  english_pob_choice: and with signs
  chosen_spanish: y con señales
  alternatives_spanish:
  - y con signos
  - y con señales milagrosas
  lexicon: HALOT
  rationale: '"Señales" es la correspondencia más directa y estable para אוֹתֹת, y se ajusta a la pareja fija "señales y prodigios".'
- source_word: וּבְמֹפְתִים
  english_pob_choice: and wonders
  chosen_spanish: y prodigios
  alternatives_spanish:
  - y maravillas
  - y milagros
  lexicon: HALOT
  rationale: '"Prodigios" reproduce el valor de hechos extraordinarios y mantiene bien la pareja tradicional con "señales" sin desplazar el matiz del hebreo.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. En español, el POB conserva ese nombre propio con la forma "Yahvé", en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance de מוֹרָא en la fórmula del éxodo
  english_pob_reading: great terror
  chosen_spanish_reading: gran terror
  alternative_spanish_readings:
  - gran temor
  - gran temor reverente
  - actos imponentes
  rationale: En el contexto de la salida de Egipto, el término apunta a un impacto temible asociado con las obras de Yahvé. "Gran terror" preserva esa fuerza sin suavizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text sense and avoid paraphrase beyond what the text warrants'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje fue confirmado como estable, con alta concordancia en el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יהוה conforme al estándar del proyecto.
  - Se conserva la pareja exódica "señales y prodigios" para אוֹתֹת y מֹפְתִים.
  - Se usa "mano fuerte" y "brazo extendido" como equivalentes idiomáticos directos, sin expansión interpretativa.
