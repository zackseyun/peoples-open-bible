translation:
  language: es
  text: Y toda prenda[a], y todo artículo de cuero, y toda obra de pelo de cabras, y todo artículo de madera, serán purificados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "vestidura". El hebreo בֶּגֶד puede referirse a una prenda o pieza de ropa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּגֶד
  english_pob_choice: garment
  chosen_spanish: vestido
  alternatives_spanish:
  - prenda
  - ropa
  - vestidura
  lexicon: HALOT
  rationale: בֶּגֶד designa una prenda o pieza de vestir. En español, 'vestido' funciona aquí como término general para una prenda, mantiene el registro formal y encaja con la lista de objetos materiales del versículo.
- source_word: כְּלִי עוֹר
  english_pob_choice: article of leather
  chosen_spanish: artículo de cuero
  alternatives_spanish:
  - objeto de cuero
  - utensilio de cuero
  - pieza de cuero
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto, implemento o artículo; 'artículo' preserva esa amplitud mejor que 'utensilio' o 'vasija'. עוֹר señala piel/cuero; 'cuero' comunica bien el material terminado en español contemporáneo.
- source_word: מַעֲשֵׂה עִזִּים
  english_pob_choice: work of goats’ hair
  chosen_spanish: obra de pelo de cabra
  alternatives_spanish:
  - trabajo de pelo de cabra
  - tejido de pelo de cabra
  - hecho de pelo de cabra
  lexicon: HALOT
  rationale: מַעֲשֵׂה puede significar obra, trabajo o cosa hecha. 'Obra de pelo de cabra' sigue de cerca la estructura hebrea sin perder inteligibilidad; evita precisar más de lo que el hebreo exige sobre el proceso o la forma del objeto.
- source_word: כְּלִי עֵץ
  english_pob_choice: article of wood
  chosen_spanish: artículo de madera
  alternatives_spanish:
  - objeto de madera
  - utensilio de madera
  - pieza de madera
  lexicon: HALOT
  rationale: Como en כְּלִי עוֹר, כְּלִי es más amplio que 'vasija'. 'Artículo de madera' conserva la clasificación por material y mantiene el paralelo con la frase anterior.
- source_word: תִּתְחַטָּאוּ
  english_pob_choice: you shall purify
  chosen_spanish: se purificará
  alternatives_spanish:
  - se purificará
  - será purificado
  - se limpiará
  lexicon: HALOT
  rationale: El hitpael de חטא en este contexto cultual expresa purificación ritual. Dado que el versículo enumera objetos, el español debe reflejar un valor pasivo o medio impersonal en lugar de un reflexivo dirigido a personas. 'Se purificará' evita la falsa idea de una auto-purificación moral y conserva el sentido ritual.
theological_decisions:
- issue: El verbo hitpael aplicado a objetos en contexto ritual
  english_pob_reading: The Hebrew verb is the reflexive form of a root associated with sin/purification and here refers to ritual purification.
  chosen_spanish_reading: El versículo habla de purificación ritual de los objetos mencionados, no de arrepentimiento moral ni de conversión espiritual.
  alternative_spanish_readings:
  - vosotros os purificaréis
  - os limpiaréis
  - seréis purificados
  rationale: La forma verbal hebrea pertenece a un contexto de pureza ritual postbélica. Como el sujeto lógico son los objetos de la lista, en español conviene una construcción impersonal/pasiva que no sugiera que las personas se están purificando a sí mismas. Así se preserva la tensión léxica de חטא sin importar categorías doctrinales posteriores.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente que corrigió la antigua lectura reflexiva aplicada a personas. Por eso el español evita 'os purificaréis' y adopta una forma impersonal que corresponde a la lista de objetos del hebreo. También se mantuvo la estructura enumerativa y el registro formal del texto base.
  spanish_consistency_notes:
  - Se usó 'artículo' para כְּלִי de manera consistente en las dos apariciones, siguiendo la amplitud semántica del hebreo.
  - Se prefirió 'cuero' para עוֹר por claridad natural en español, sin perder el valor material del término.
  - '''Purificará'' se entendió en sentido ritual y no moral; la redacción evita un reflexivo humano inapropiado.'
  - La nota al pie se ancla en 'vestido' para preservar una alternativa legítima sin recargar el cuerpo principal.
