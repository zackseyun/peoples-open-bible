translation:
  language: es
  text: Y los hijos de Israel sirvieron[a] a Eglón, rey de Moab, durante dieciocho años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «los hijos de Israel estuvieron sujetos a Eglón, rey de Moab, durante dieciocho años».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - estuvieron sujetos a
  - fueron sometidos a
  lexicon: HALOT
  rationale: En este contexto, עבד describe subordinación política o servidumbre bajo un gobernante extranjero, no servicio cultual. «Sirvieron» conserva la forma verbal cercana al hebreo y es natural en español; las alternativas explicitan más la idea de sujeción, pero son más interpretativas.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión formal del hebreo y del registro del POB en inglés. «Los hijos de Israel» refleja el colectivo hebreo de manera transparente; «los israelitas» es más idiomático, pero menos cercano al texto fuente.
- source_word: אֶת עֶגְלֹון
  english_pob_choice: Eglon
  chosen_spanish: Eglón
  alternatives_spanish:
  - Eglon
  lexicon: HALOT
  rationale: El nombre propio se translitera al español como «Eglón», conservando la adaptación habitual de acentuación gráfica para lectura en español.
- source_word: מֶלֶךְ מוֹאָב
  english_pob_choice: king of Moab
  chosen_spanish: rey de Moab
  alternatives_spanish:
  - el rey de Moab
  lexicon: HALOT
  rationale: La construcción en español más natural y fiel es «rey de Moab». El artículo puede omitirse en aposición, como en el hebreo y en el inglés POB.
- source_word: שְׁמוֹנֶה עֶשְׂרֵה שָׁנָה
  english_pob_choice: for eighteen years
  chosen_spanish: durante dieciocho años
  alternatives_spanish:
  - por dieciocho años
  - dieciocho años
  lexicon: HALOT
  rationale: El hebreo expresa duración temporal; en español «durante» comunica con claridad el valor durativo sin añadir interpretación. «Por» también es posible, pero «durante» resulta más natural en este contexto narrativo.
theological_decisions:
- issue: Sentido de עבד aplicado a un rey extranjero
  english_pob_reading: 'served ... for eighteen years, with an alternative note: ''were subject to'''
  chosen_spanish_reading: sirvieron ... durante dieciocho años, con la alternativa implícita de sujeción política
  alternative_spanish_readings:
  - estuvieron sujetos a
  - fueron sometidos a
  rationale: No se entiende aquí un servicio religioso sino dominación política. Se conserva «sirvieron» por su cercanía al hebreo y se reconoce que el verbo admite una lectura más interpretativa de sujeción, como indicó el POB en inglés.
  doctrine_reference: Lexical/theological note on political subjection in Judges
- issue: Preservación del paralelismo de sujeto colectivo
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se preserva la forma colectiva masculina del hebreo, coherente con la política de exactitud del POB y con la transparencia del texto fuente.
  doctrine_reference: Gender-accurate rendering policy
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el tramo inglés de referencia; el pasaje mostró alta concordancia y quedó sin cambios. La redacción española sigue directamente el hebreo con apoyo del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo «los hijos de Israel» para reflejar el hebreo בְנֵי יִשְׂרָאֵל de manera transparente.
  - Se eligió «sirvieron» y no un verbo de dominación explícita en el texto principal para conservar la tensión lexical documentada; la nota recoge la lectura alternativa.
  - Se transliteró el nombre propio como «Eglón» para ajustarlo a la ortografía española sin alterar la referencia onomástica.
  - Se usó «durante dieciocho años» para expresar la duración acusativa del hebreo con naturalidad en español.
