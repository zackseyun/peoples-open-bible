  - 784
  confidence: high
  validation: normalized_partition_extract
  note: This verse is being loaded from the normalized translation-ready override layer derived from the adjudicated corpus. Standalone ESG chapter 3 = Addition C, segmented from Swete pages 781-784 with First1KGreek used only as a verse-anchor map.
translation:
  text: Hear my petition and be merciful to your allotted people[a], and turn our mourning into gladness, so that, living, we may sing praise to your name, O Lord, and do not destroy the mouth of those who praise you. And all Israel cried out with all their strength[b], because their death was before their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be gracious to your inheritance' / 'be propitious to your lot.' The Greek says literally 'be merciful to your lot.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not destroy the mouth of those who praise you,' an image for not silencing your worshipers.
    reason: lexical_alternative
lexical_decisions:
- source_word: κουσον
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: BDAG
  rationale: Aorist imperative of ἀκούω in prayer language; 'Hear' is idiomatic and suitably direct in English petitionary address.
- source_word: δέησις
  chosen: petition
  alternatives:
  - supplication
  - prayer
  lexicon: BDAG
  rationale: '''Petition'' preserves the specific sense of an urgent request better than the broader ''prayer,'' while remaining readable.'
- source_word: ἱλάσθητι
  chosen: be merciful
  alternatives:
  - be propitious
  - be gracious
  lexicon: BDAG
  rationale: The verb carries the sense of showing favor/being appeased. 'Be merciful' communicates the prayer's force in accessible English without importing technical atonement language.
- source_word: τῷ κλήρῳ σου
  chosen: to your allotted people
  alternatives:
  - to your lot
  - to your inheritance
  lexicon: BDAG
  rationale: κλῆρος literally means 'lot' or 'allotted portion.' In this context it refers to God's own assigned people, so 'your allotted people' makes the relational sense explicit while staying close to the Greek.
- source_word: στρέψον τὸ πένθος ἡμῶν εἰς εὐφροσύνην
  chosen: turn our mourning into gladness
  alternatives:
  - turn our grief into joy
  - change our sorrow into rejoicing
  lexicon: BDAG
  rationale: A natural English rendering of the idiom that preserves the reversal motif. 'Gladness' matches εὐφροσύνη well and avoids over-paraphrase.
- source_word: ἵνα ζῶντες
  chosen: so that, living
  alternatives:
  - so that while we live
  - so that, being alive
  lexicon: BDAG
  rationale: 'The participle is concessive/conditional in effect: survival enables praise. ''So that, living'' keeps the compact Greek linkage to the following verb.'
- source_word: ὑμνῶμεν σου τὸ ὄνομα
  chosen: we may sing praise to your name
  alternatives:
  - we may hymn your name
  - we may praise your name
  lexicon: BDAG
  rationale: ὑμνέω is more specific than generic praise and often implies sung praise. 'Sing praise' preserves that nuance in natural English.
- source_word: μὴ ἀφανίσῃς στόμα αἰνούντων σου
  chosen: do not destroy the mouth of those who praise you
  alternatives:
  - do not silence the mouth of those who praise you
  - do not wipe out the mouth of your praisers
  lexicon: BDAG
  rationale: ἀφανίζω is literally 'destroy' or 'cause to disappear.' Retaining 'mouth' reflects the concrete Greek image, though the sense is effectively silencing those who praise God.
- source_word: ἐκέκραξαν ἐξ ἰσχύος αὐτῶν
  chosen: cried out with all their strength
  alternatives:
  - cried out from their strength
  - shouted mightily
  lexicon: BDAG
  rationale: The phrase is idiomatic for intense, full-strength crying out. 'With all their strength' conveys the force clearly.
- source_word: θάνατος αὐτῶν ἐν ὀφθαλμοῖς αὐτῶν
  chosen: their death was before their eyes
  alternatives:
  - death was in their sight
  - their death was in view
  lexicon: BDAG
  rationale: A literal but idiomatic English rendering of imminent mortal danger; it preserves the vividness of the Greek expression.
