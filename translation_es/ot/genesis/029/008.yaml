  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: incapacidad temporal hasta que se junten los rebaños, se quite la piedra del pozo, y luego dar agua al rebaño. Sin embargo, introduce contenido no expreso con «hacerlo», cambia innecesariamente la voz/agencia de וְגָלֲלוּ a una pasiva refleja («se ruede»), y la nota [a] está mal anclada en «dijeron» en vez de en «ovejas/rebaño», que es donde aplica la alternativa para הַצֹּאן.'
  spanish_quality_summary: El español es generalmente claro y digno. «Abrevamos» es correcto, aunque algo marcado; sigue siendo aceptable en registro bíblico. La principal mejora es quitar «hacerlo» para evitar sobretraducción y ajustar la cláusula de la piedra a una forma más natural y más cercana al hebreo. También conviene corregir el anclaje de la nota léxica.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Rebaños», «boca del pozo» y «ovejas» concuerdan con las decisiones del POB. La nota sobre צֹאן debe conservarse, pero anclada al sustantivo correspondiente. No hay conflicto con los defaults del glosario del proyecto.
  issues:
  - severity: medium
    issue: «hacerlo» añade contenido no explícito
    rationale: לֹא נוּכַל significa simplemente «no podemos» / «no somos capaces». El añadido «hacerlo» explicita un objeto ausente en el hebreo y en el inglés auditado.
  - severity: medium
    issue: «se ruede la piedra» debilita la agencia plural del hebreo
    rationale: וְגָלֲלוּ es plural activo («y [ellos] ruedan/quitan la piedra»), no una construcción pasiva. En español, «rueden la piedra» o «quiten la piedra rodándola» refleja mejor el original.
  - severity: medium
    issue: La nota [a] está anclada en «dijeron» pero trata sobre צֹאן
    rationale: La nota explica una alternativa léxica para «ovejas/rebaño», no para el verbo de habla. Debe colocarse en el término relevante del texto.
  - severity: low
    issue: La nota [b] como «O “pozo”» es poco útil
    rationale: El texto principal ya dice «pozo». Lo valioso de la nota es explicar «boca del pozo» frente a «abertura», no ofrecer «pozo» como alternativa aislada.
