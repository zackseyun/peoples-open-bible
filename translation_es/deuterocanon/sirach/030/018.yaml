    text: Hebreo גלול es un término despectivo para un ídolo; alternativamente, 'un ídolo inmundo' o 'un ídolo de estiércol'.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego dice 'porciones de comida puestas junto a una tumba', en lugar del hebreo 'una ofrenda puesta delante de un ídolo'; ambas imágenes comunican la misma futilidad.
    reason: textual_variant
  revision_rationale: 'Se ajusta el español para que suene natural y fiel al proverbio (''ante una boca cerrada''), se evita el matiz indebido de ''dulces'', y se restauran las notas conforme al audit trail inglés: una para el carácter despectivo de גלול y otra para la variante griega. No hace falta una nota sobre תנופה, porque la decisión de traducirla de forma general como ''ofrenda'' ya queda adecuadamente en el texto y en la documentación léxica.'
