translation:
  language: es
  text: Y subieron al monte Sión con alegría y gozo, y ofrecieron ofrendas quemadas por completo[a], porque no había caído ninguno de ellos hasta regresar en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «ofrendas quemadas». El término griego se refiere a ofrendas consumidas por completo en el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - fueron arriba
  lexicon: LSJ
  rationale: El verbo expresa ascenso físico; «subieron» es natural en español y conserva la imagen de subir a Sión sin sobrecargar el tono.
- source_word: τὸ ὄρος Σιὼν
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sión
  alternatives_spanish:
  - el monte de Sión
  - Monte Sión
  lexicon: LSJ
  rationale: «Monte Sión» es la forma breve y reconocible; el artículo ayuda a la fluidez en español sin perder la referencia geográfica y teológica.
- source_word: ἐν εὐφροσύνῃ καὶ χαρᾷ
  english_pob_choice: with gladness and joy
  chosen_spanish: con alegría y gozo
  alternatives_spanish:
  - con regocijo y gozo
  - en alegría y gozo
  lexicon: LSJ
  rationale: Se preserva el par de sustantivos celebrativos. «Alegría y gozo» distingue bien los dos términos griegos en español común y eclesial.
- source_word: προσήγαγον
  english_pob_choice: offered
  chosen_spanish: presentaron
  alternatives_spanish:
  - ofrecieron
  - trajeron como ofrenda
  lexicon: LSJ
  rationale: En contexto sacrificial, el verbo implica llevar una ofrenda al altar. «Presentaron» comunica la acción cultual de modo natural; el objeto explícito «holocaustos» mantiene el sentido sacrificial.
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas por completo
  - ofrendas holocáusticas
  lexicon: LSJ
  rationale: La palabra griega designa ofrendas totalmente consumidas por el fuego. Se conserva el término técnico «holocaustos», que en español bíblico refiere la ofrenda íntegramente consumida, evitando la connotación histórica moderna de la palabra cuando el contexto sacrificial la aclara.
- source_word: οὐκ ἔπεσεν
  english_pob_choice: had fallen
  chosen_spanish: había caído
  alternatives_spanish:
  - cayó
  - había perecido
  lexicon: LSJ
  rationale: En contexto militar, «caer» puede significar morir en combate. El pretérito pluscuamperfecto refleja la relación temporal con el regreso y conserva la idea de no haber sufrido bajas.
- source_word: ἐξ αὐτῶν οὐθεὶς
  english_pob_choice: not one of them
  chosen_spanish: ninguno de ellos
  alternatives_spanish:
  - no uno de ellos
  - nadie de entre ellos
  lexicon: LSJ
  rationale: «Ninguno de ellos» reproduce la negación enfática y la idea partitiva con naturalidad en español.
- source_word: ἕως τοῦ ἐπιστρέψαι
  english_pob_choice: until they returned
  chosen_spanish: hasta regresar
  alternatives_spanish:
  - hasta que regresaron
  - hasta su regreso
  lexicon: LSJ
  rationale: El infinitivo articular expresa límite temporal; «hasta regresar» es conciso y fiel al valor aspectual del griego.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - sanos y salvos
  - pacíficamente
  lexicon: LSJ
  rationale: «En paz» mantiene la fórmula bíblica y puede incluir la idea de regreso seguro e íntegro, sin restringirla a solo ausencia de conflicto.
theological_decisions:
- issue: Terminología sacrificial para ὁλοκαυτώματα
  english_pob_reading: whole burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas por completo
  - holocaustos completos
  rationale: La escena describe culto de acción de gracias tras el rescate militar. Mantener un término técnico sacrificial preserva la especificidad ritual del pasaje; «holocaustos» es el equivalente bíblico tradicional en español para ofrendas totalmente consumidas, y el contexto evita ambigüedad doctrinal.
  doctrine_reference: Éxodo 29; Levítico 1; traducción bíblica con primacía del original
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés concuerdan de forma alta; no se registran revisiones aplicadas. La versión española sigue de cerca el sentido original, manteniendo el paralelismo de gozo, la acción cultual y la cláusula temporal de seguridad en el regreso.
  spanish_consistency_notes:
  - Se usa «Sión» en vez de «Zion» para la forma española estándar del topónimo.
  - Se mantiene «en paz» para conservar la fórmula bíblica amplia de retorno seguro.
  - Se usa «holocaustos» con nota para reflejar el sentido técnico del término griego sin modernizarlo excesivamente.
