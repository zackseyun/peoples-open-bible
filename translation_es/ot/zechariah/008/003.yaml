review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: fórmula profética, retorno a Sion, morada en medio de Jerusalén, nuevo nombre de Jerusalén y designación del monte. También sigue correctamente la decisión temporal ''He vuelto ... habitaré'' y usa ''Yahvé'' conforme al proyecto. Sin embargo, los pies de nota a/b están invertidos respecto a los puntos realmente necesitados por el texto y por la auditoría inglesa: el marcador junto a ''Jerusalén'' no corresponde a una alternativa sustantiva, mientras que ''Ciudad de Verdad'' sí requiere la nota sobre la amplitud semántica de אֱמֶת. Además, la frase ''el monte de Yahvé de los Ejércitos'' suena algo pesada; en español bíblico natural es preferible ''Yahvé de los Ejércitos'' como título fijo sin artículo interno.'
  spanish_quality_summary: 'El español es mayormente claro y digno. ''He vuelto'', ''habitaré en medio de Jerusalén'' y ''será llamada'' funcionan bien. Hay, no obstante, dos mejoras de naturalidad y presentación: 1) mover la nota al lugar correcto; 2) añadir el artículo en ''la Ciudad de Verdad'' para reflejar mejor עִיר הָאֱמֶת y sonar más idiomático como título. ''Monte Santo'' es aceptable, pero con artículo queda mejor en aposición: ''el Monte Santo''.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה -> ''Yahvé''; שַׁבְתִּי -> ''He vuelto''; וְשָׁכַנְתִּי -> ''habitaré''; בְּתוֹךְ -> ''en medio de''; אֱמֶת -> ''Verdad'' con alternativa de ''fidelidad'' en nota; צְבָאוֹת -> ''Ejércitos''. Debe evitarse una nota incorrectamente anclada en ''Jerusalén'' y conviene fijar mejor el título ''Yahvé de los Ejércitos''.'
  issues:
  - severity: high
    issue: Los marcadores de notas están mal asignados
    rationale: La nota [a] está puesta en 'Jerusalén' pero habla de בְּתוֹךְ, que ya está reflejado en 'en medio de' y no necesita una alternativa 'O en medio de Jerusalén', que repite el texto. En cambio, la auditoría inglesa preserva la alternativa semántica de אֱמֶת, por lo que la nota debe ir en 'Verdad'/'Ciudad de Verdad'.
  - severity: medium
    issue: Falta el artículo en el título 'Ciudad de Verdad'
    rationale: El hebreo עִיר הָאֱמֶת lleva artículo en el segundo término y en español el título suena más natural y completo como 'la Ciudad de Verdad'.
  - severity: medium
    issue: La nota sobre צְבָאוֹת no refleja bien la auditoría inglesa
    rationale: La nota inglesa compara 'Armies' con la opción tradicional 'Hosts'. La nota española actual repite casi el texto y añade 'celestiales', pero no ofrece una alternativa clara y útil para el lector español. Debe señalar mejor la opción tradicional 'Huestes' o explicar 'Ejércitos' como elección transparente.
  - severity: low
    issue: El giro 'el monte de Yahvé de los Ejércitos' puede pulirse
    rationale: No es infiel, pero en español bíblico natural suena mejor 'el monte de Yahvé de los Ejércitos, el Monte Santo' con artículo en la segunda aposición.
  revised_spanish_text: 'Así dice Yahvé: He vuelto a Sion y habitaré en medio de Jerusalén, y Jerusalén será llamada la Ciudad de Verdad[a], y el monte de Yahvé de los Ejércitos[b], el Monte Santo.'
