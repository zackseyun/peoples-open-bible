translation:
  language: es
  text: Lo que ha sido está lejos, y muy profundo; ¿quién puede hallarlo?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y profundo, profundo»; la repetición intensifica el sentido: «muy profundo» o «excesivamente profundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָחוֹק
  english_pob_choice: far off
  chosen_spanish: lejos
  alternatives_spanish:
  - muy lejos
  - remoto
  lexicon: HALOT
  rationale: El adjetivo expresa distancia/inaccesibilidad. En español, «lejos» es natural y claro; «muy lejos» sería posible, pero el contexto ya refuerza la distancia con la imagen de profundidad.
- source_word: מַה שֶּׁהָיָה
  english_pob_choice: what has been
  chosen_spanish: lo que ha sido
  alternatives_spanish:
  - lo que ha llegado a ser
  - lo que fue
  - aquello que ha sido
  lexicon: HALOT
  rationale: La construcción relativa con היה en perfecto señala una realidad ya existente o acontecida. «Lo que ha sido» conserva esa referencia temporal sin forzar un sentido filosófico añadido.
- source_word: וְעָמֹק עָמֹק
  english_pob_choice: and very deep
  chosen_spanish: y muy profundo
  alternatives_spanish:
  - y profundo, profundo
  - y sumamente profundo
  lexicon: HALOT
  rationale: La repetición intensifica el adjetivo. En español, «muy profundo» comunica esa intensificación con naturalidad; la repetición literal queda como alternativa válida, pero menos idiomática.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿quién podría?
  - ¿quién es capaz de?
  lexicon: HALOT
  rationale: Es una pregunta retórica estándar. «¿Quién?» mantiene la concisión y la fuerza retórica del hebreo.
- source_word: יִמְצָאֶנּוּ
  english_pob_choice: can find it out
  chosen_spanish: puede hallarlo
  alternatives_spanish:
  - puede descubrirlo
  - puede encontrarlo
  lexicon: HALOT
  rationale: מצא significa hallar/encontrar, y aquí la idea es la de descubrir o comprender una realidad inaccesible. «Hallarlo» conserva ese matiz de descubrimiento; el objeto implícito en hebreo se traduce con masculino singular neutro-gramatical español para referirse a «lo que ha sido».
translation_notes:
  revision_awareness: El texto base coincide plenamente con el sentido del hebreo y con la lectura auditada en inglés. Se mantiene la intensificación semítica mediante «muy profundo», con una nota que preserva la alternativa más literal de la repetición.
  spanish_consistency_notes:
  - Se usa «lo que ha sido» para mantener la referencia impersonal del hebreo.
  - Se evita «SEÑOR» u otra adaptación no pertinente; no hay nombre divino en este versículo.
  - «Hallarlo» conserva el valor de descubrimiento/comprensión de מצא en contexto sapiencial.
