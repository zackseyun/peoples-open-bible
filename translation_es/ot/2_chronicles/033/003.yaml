base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/033/003.yaml
  text: For he rebuilt the high places that Hezekiah his father had torn down[a], and he set up altars to the Baals, and made Asherah poles[d][c][b], and bowed down to all the host of heaven and served them.
  footnotes:
  - marker: a
    text: Or 'he built again'; the Hebrew uses two verbs, literally 'he returned and built,' expressing that he restored what had been removed.
    reason: lexical_alternative
  - marker: b
    text: '''The Baals'' preserves the Hebrew plural, likely referring to multiple local manifestations or images of Baal; some translations simplify to ''Baal.'''
    reason: lexical_alternative
  - marker: c
    text: Or simply 'Asherahs'; the Hebrew term may refer to cultic poles or symbols associated with the goddess Asherah.
    reason: lexical_alternative
  - marker: d
    text: '''Host of heaven'' here refers to celestial bodies as objects of worship; compare 2 Kings 21:3.'
    reason: cross_reference
