lexical_decisions:
- source_word: ὅλος
  english_pob_choice: the whole
  chosen_spanish: todo el
  alternatives_spanish:
  - el conjunto de
  - la totalidad del
  lexicon: LSJ
  rationale: Con κόσμος, ὅλος expresa totalidad. En español, 'todo el mundo' reproduce bien el alcance general sin sonar forzado.
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - universo
  - creación
  lexicon: LSJ
  rationale: '''Mundo'' conserva el contraste narrativo con la oscuridad que afecta a Egipto, sin convertir el término en una afirmación cosmológica más amplia de lo que pide el contexto.'
- source_word: λαμπρῷ ... φωτί
  english_pob_choice: with bright light
  chosen_spanish: con luz resplandeciente
  alternatives_spanish:
  - con luz brillante
  - con luz radiante
  lexicon: LSJ
  rationale: La construcción dativa instrumental se vierte naturalmente con 'con'. 'Resplandeciente' mantiene el matiz de brillo intenso del griego sin exceso ornamental.
- source_word: κατελάμπετο
  english_pob_choice: was illuminated
  chosen_spanish: era iluminado
  alternatives_spanish:
  - estaba iluminado
  - quedaba iluminado
  lexicon: LSJ
  rationale: El imperfecto pasivo sugiere un estado continuo. 'Era iluminado' conserva esa duratividad en estilo bíblico-natural; no se quiso simplificar a un perfecto puntual.
- source_word: ἀνεμποδίστοις
  english_pob_choice: unhindered
  chosen_spanish: sin estorbo
  alternatives_spanish:
  - sin impedimento
  - sin obstáculo
  lexicon: LSJ
  rationale: El adjetivo describe obras que prosiguen sin trabas. 'Sin estorbo' comunica bien la ausencia de impedimento en español moderno y mantiene un registro sobrio.
- source_word: συνείχετο
  english_pob_choice: was occupied with
  chosen_spanish: estaba ocupado en
  alternatives_spanish:
  - estaba entregado a
  - estaba dedicado a
  lexicon: LSJ
  rationale: Aquí el verbo expresa estar ocupado/absorbido en actividad, no una sujeción física. 'Estaba ocupado en' refleja la lectura contextual del audit trail.
- source_word: ἔργοις
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - actividades
  - labores
  lexicon: LSJ
  rationale: '''Obras'' mantiene la amplitud del término y suena natural en español bíblico. En este contexto incluye el curso ordinario de la actividad humana.'
theological_decisions:
- issue: Alcance de κόσμος en contraste con la plaga de oscuridad
  english_pob_reading: Rendered as 'the whole world' to express the rest of creation outside the afflicted region, without making a cosmological claim beyond the narrative contrast.
  chosen_spanish_reading: '''todo el mundo'' expresa el resto del ámbito humano fuera de la oscuridad narrativa, sin afirmar más de lo que el pasaje demanda.'
  alternative_spanish_readings:
  - '''todo el universo'''
  - '''toda la creación'''
  rationale: El contexto sapiencial establece un contraste literario entre la oscuridad de los impíos y la actividad normal fuera de esa esfera. 'Mundo' preserva esa oposición sin sobrecargar el alcance de κόσμος.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; readable modern Spanish'
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego normalizado del override adjudicado: ὅλος γὰρ ὁ κόσμος λαμπρῷ κατελάμπετο φωτί, καὶ ἀνεμποδίστοις συνείχετο ἔργοις. Se mantuvo el contraste aspectual del imperfecto y la ambigüedad controlada de συνείχετο (''estaba ocupado en'' / ''era dedicado a''), tal como reflejó el audit trail inglés. No se introdujeron lecturas ajenas al texto base.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; no hay léxico divino en este verso.
  - '''Mundo'' se usa con valor contextual general, no como tecnicismo cosmológico.'
  - '''Obras'' y ''ocupado en'' mantienen la referencia a actividad ordinaria sin moralizar el pasaje.'
