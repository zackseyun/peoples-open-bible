- from: 'Yahvé le dijo[a]: «Ciertamente yo estaré contigo, y derrotarás a Madián como a un solo hombre».'
  to: 'Y Yahvé le dijo[a]: «Ciertamente estaré contigo, y golpearás a Madián como un solo hombre».'
  rationale: 'Se revisa para acercar mejor el verbo principal al hebreo נכה («golpearás»), restaurar el flujo narrativo con «Y», y corregir el modismo final a un español natural y fiel: «como un solo hombre». Se mantiene «Yahvé» según la política del proyecto y se conserva la nota alternativa ya documentada, anclada correctamente en el texto.'
