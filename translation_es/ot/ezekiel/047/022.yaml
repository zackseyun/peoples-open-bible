base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/047/022.yaml
  text: And it shall be that you shall allot it as an inheritance for yourselves and for the sojourners who sojourn among you[a], who have fathered children among you; and they shall be to you like a native among the sons of Israel[c][b]. With you they shall receive an inheritance among the tribes of Israel.
