revisions:
- from: 'Entonces se llenó nuestra boca de risa[a], y nuestra lengua de gritos de alegría; entonces se dirá entre las naciones[b]: «Yahvé ha hecho grandes cosas con ellos».'
  to: 'Entonces se llenó nuestra boca de risa, y nuestra lengua de gritos de alegría[a]; entonces dijeron entre las naciones[b]: «Yahvé ha hecho grandes cosas por ellos».'
  rationale: Se corrigió el verbo a «dijeron» para reflejar el 3mp activo del hebreo y el valor retrospectivo del contexto. Se movió la nota [a] al sintagma que realmente comenta, «nuestra lengua de gritos de alegría». Se ajustó «con ellos» a «por ellos» para expresar mejor en español el sentido idiomático benefactivo explicado en la auditoría inglesa, manteniendo la nota literal en [b].
