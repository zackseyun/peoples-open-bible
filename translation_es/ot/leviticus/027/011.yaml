translation:
  language: es
  text: Pero si es cualquier animal impuro, del que no se puede presentar una ofrenda[a] a Yahvé, entonces pondrá el animal delante del sacerdote,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «del que no pueden traer una ofrenda». El hebreo usa un verbo plural general («no pueden presentar») con fuerza impersonal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción introduce un caso condicional nuevo y de contraste dentro de la misma legislación. «Pero si» conserva ese matiz adversativo y suena natural en español.
- source_word: כָּל בְּהֵמָה טְמֵאָה
  english_pob_choice: any unclean animal
  chosen_spanish: cualquier animal impuro
  alternatives_spanish:
  - cualquier animal inmundo
  - cualquier bestia impura
  lexicon: HALOT
  rationale: כָּל con un sustantivo singular tiene fuerza indefinida; por eso «cualquier» expresa bien el valor no específico. «Animal» es más natural que «bestia» en español actual, y «impuro» mantiene el sentido cultual de טְמֵאָה sin reducirlo a suciedad física.
- source_word: אֲשֶׁר לֹא יַקְרִיבוּ מִמֶּנָּה קָרְבָּן
  english_pob_choice: from which they may not present an offering
  chosen_spanish: del cual no pueden presentar una ofrenda
  alternatives_spanish:
  - del cual no pueden traer una ofrenda
  - que no pueden presentar como ofrenda
  - del que no se puede presentar una ofrenda
  lexicon: HALOT
  rationale: 'La cláusula relativa identifica el tipo de animal inmundo que está en vista: uno no apto para presentación sacrificial. «Del cual» reproduce bien el valor de מִמֶּנָּה, y «presentar una ofrenda» conserva mejor el matiz sacrificial de הקריב que un simple «ofrecer».'
- source_word: קָרְבָּן
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - una oblación
  - un sacrificio
  lexicon: HALOT
  rationale: Término cultual estándar. «Ofrenda» es claro y natural en español, y mantiene la idea de algo llevado para presentarlo a Dios.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto en español usa «Yahvé» para el Tetragrámaton, preservando el nombre del pacto en vez de enmascararlo como «SEÑOR».
- source_word: וְהֶעֱמִיד
  english_pob_choice: then he shall set
  chosen_spanish: entonces pondrá
  alternatives_spanish:
  - entonces presentará
  - entonces hará que se ponga
  - entonces colocará
  lexicon: HALOT
  rationale: El hiphil de עמד expresa hacer poner/poner en posición. «Pondrá» es natural en español legal y mantiene la acción de situar el animal ante la autoridad sacerdotal.
- source_word: אֶת הַבְּהֵמָה לִפְנֵי הַכֹּהֵן
  english_pob_choice: the animal before the priest
  chosen_spanish: el animal delante del sacerdote
  alternatives_spanish:
  - el animal ante el sacerdote
  - la bestia delante del sacerdote
  lexicon: HALOT
  rationale: «Delante de» conserva la relación espacial/formal de לִפְנֵי y suena sobrio en español. «Sacerdote» traduce הַכֹּהֵן de manera directa y entendible.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En español se adopta «Yahvé» como forma del nombre del pacto, coherente con la política del proyecto y sin ocultar el nombre divino bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Lenguaje sacrificial de יַקְרִיבוּ / קָרְבָּן
  english_pob_reading: present an offering
  chosen_spanish_reading: presentar una ofrenda
  alternative_spanish_readings:
  - ofrecer un sacrificio
  - traer una ofrenda
  rationale: El verbo hebreo indica acercar/presentar en contexto cultual, no solo «ofrecer» en sentido general. «Presentar una ofrenda» conserva la estructura sacrificial y evita suavizar el lenguaje técnico.
  doctrine_reference: 'DOCTRINE.md: Sacrificial terminology — preserve cultic presentation nuance'
translation_notes:
  revision_awareness: La auditoría inglesa indica acuerdo alto y sin cambios posteriores. No se aplicaron revisiones; por eso la redacción española sigue de cerca el valor legal y cultual del hebreo, ajustándolo solo para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la política del proyecto.
  - Se conserva «ofrenda» como término cultual y no se sustituye por vocablos más eclesiásticos.
  - «Animal impuro» refleja el valor ritual de טְמֵאָה sin convertirlo en noción de suciedad física.
  - La construcción impersonal de יַקְרִיבוּ se refleja con una forma plural en la nota, pero no se sobrecarga la línea principal.
