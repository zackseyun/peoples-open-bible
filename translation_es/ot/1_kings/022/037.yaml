translation:
  language: es
  text: Así murió el rey y fue llevado a Samaria[a], y sepultaron al rey en Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «y el rey murió, y vino a Samaria». El sentido es que, después de su muerte, su cuerpo fue llevado a Samaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - murió
  - falleció
  lexicon: HALOT
  rationale: El wayyiqtol de מות narra el evento de la muerte; en español, «murió» conserva la secuencia narrativa natural y es más directo que un giro pasivo o explicativo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido sin introducir el nombre propio, como en el hebreo, para conservar la referencia contextual ya establecida.
- source_word: וַיָּבֹא שֹׁמְרוֹן
  english_pob_choice: was brought to Samaria
  chosen_spanish: fue llevado a Samaria
  alternatives_spanish:
  - llegó a Samaria
  - vinieron con él a Samaria
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y vino a Samaria», pero el contexto y la nota inglesa muestran que el sentido es el traslado del cuerpo; «fue llevado» expresa esa implicación sin perder la base textual.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaria
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico en su forma castellana estándar.
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: they buried
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - sepultaron al rey
  lexicon: HALOT
  rationale: El plural indefinido se puede volver impersonal en español con sujeto tácito; «lo sepultaron» preserva el agente no especificado y un registro digno.
- source_word: אֶת הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: lo
  alternatives_spanish:
  - al rey
  - lo
  lexicon: HALOT
  rationale: Aunque el hebreo repite «al rey», el español fluye mejor con el pronombre átono ya que el referente sigue siendo inequívoco; la repetición semítica no requiere reproducción literal aquí para ser fiel al sentido.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en Samaria
  lexicon: HALOT
  rationale: La preposición de localización se traduce de manera directa y natural.
translation_notes:
  revision_awareness: 'Se conserva el sentido auditado del inglés POB: el hebreo es literalmente más cercano a «vino a Samaria», pero el contexto exige entender el traslado del cuerpo tras la muerte del rey. No se introducen nombres propios ni explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantiene «Samaria» en ambas apariciones para consistencia toponímica.
  - Se prefiere «sepultaron» por registro bíblico y claridad, sin forzar arcaísmos.
  - La nota explica la tensión verbal hebrea sin borrar la lectura literal documentada.
