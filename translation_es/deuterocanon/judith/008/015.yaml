translation:
  language: es
  text: Porque, si no quiere ayudarnos dentro de estos cinco días, él mismo tiene la autoridad, en los días que quiera, de resguardarnos[a], o incluso de destruirnos ante nuestros enemigos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «protegernos». El verbo griego tiene literalmente la idea de cubrir; aquí, el sentido es de resguardo protector.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «antes del rostro de nuestros enemigos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ βούληται
  english_pob_choice: if he is not willing
  chosen_spanish: si no quiere
  alternatives_spanish:
  - si no está dispuesto
  - si no quisiera
  lexicon: BDAG
  rationale: βούλομαι expresa voluntad o intención. En español, «si no quiere» comunica bien la negativa de voluntad sin forzar una construcción más pesada; mantiene el matiz volitivo que el POB inglés preserva con «is not willing».
- source_word: ἐν ταῖς πέντε ἡμέραις
  english_pob_choice: within these five days
  chosen_spanish: dentro de estos cinco días
  alternatives_spanish:
  - en estos cinco días
  - durante estos cinco días
  lexicon: BDAG
  rationale: La expresión temporal funciona como plazo o límite. «Dentro de estos cinco días» transmite el sentido de vencimiento del término, en paralelo con la decisión inglesa «within these five days».
- source_word: βοηθῆσαι
  english_pob_choice: to help
  chosen_spanish: ayudarnos
  alternatives_spanish:
  - acudir en nuestra ayuda
  - rescatarnos
  lexicon: BDAG
  rationale: El verbo significa ayudar o prestar auxilio. «Ayudarnos» es la opción más amplia y fiel; evita introducir una intensificación como «rescatar» que el griego no exige.
- source_word: αὐτὸς ἔχει τὴν ἐξουσίαν
  english_pob_choice: he himself has the authority
  chosen_spanish: él mismo tiene la autoridad
  alternatives_spanish:
  - él tiene el poder
  - él mismo tiene el derecho
  lexicon: BDAG
  rationale: ἐξουσία puede ser autoridad, derecho o poder. «Autoridad» conserva mejor la idea de prerrogativa legítima; «él mismo» refleja el énfasis de αὐτός.
- source_word: ἐν αἷς θέλει ... ἡμέραις
  english_pob_choice: in whatever days he wishes
  chosen_spanish: en los días que quiera
  alternatives_spanish:
  - en cualesquiera días que quiera
  - cuando quiera
  lexicon: BDAG
  rationale: La cláusula relativa expresa libertad soberana respecto del momento. «En los días que quiera» suena natural en español y mantiene la referencia explícita a días, sin convertirla en una paráfrasis más abstracta como «cuando quiera».
- source_word: σκεπάσαι
  english_pob_choice: to shelter us
  chosen_spanish: resguardarnos
  alternatives_spanish:
  - cubrirnos
  - protegernos
  lexicon: BDAG
  rationale: σκεπάζω literalmente implica cubrir, pero aquí el contexto es de protección. «Resguardarnos» conserva la idea de cobertura protectora sin perder el matiz figurado que el POB inglés refleja con «shelter us».
- source_word: ὀλεθρεῦσαι
  english_pob_choice: to destroy us
  chosen_spanish: destruirnos
  alternatives_spanish:
  - arruinarnos
  - borrarnos
  lexicon: BDAG
  rationale: El verbo denota destruir o llevar a la ruina. «Destruirnos» es directo, sobrio y suficientemente fuerte para reflejar el alcance del griego.
- source_word: πρὸ προσώπου τῶν ἐχθρῶν ἡμῶν
  english_pob_choice: before our enemies
  chosen_spanish: delante de nuestros enemigos
  alternatives_spanish:
  - en presencia de nuestros enemigos
  - ante nuestros enemigos
  lexicon: LEH
  rationale: La expresión idiomática significa literalmente «ante el rostro de». «Delante de nuestros enemigos» conserva la idea de exposición pública o frente a ellos, sin introducir una causalidad ajena al texto.
theological_decisions:
- issue: Soberanía divina sobre el auxilio y el juicio
  english_pob_reading: The verse states that God retains authority both to deliver and to destroy, even if he does not act within the humanly imposed five-day limit.
  chosen_spanish_reading: El versículo afirma que Dios conserva la autoridad tanto para auxiliarnos como para destruirnos, aun si no actúa dentro del plazo humano de cinco días.
  alternative_spanish_readings:
  - El versículo podría suavizarse para sugerir solo que Dios permite el desastre por medio de los enemigos.
  - Podría trasladarse «destruir» a una idea menos directa de ruina o derrota.
  rationale: El griego atribuye la ἐξουσία a Dios y coordina bajo esa autoridad tanto el resguardo como la destrucción. La traducción española conserva esa tensión sin atenuar la segunda cláusula ni desplazarla a una mera permisión indirecta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés y con la evaluación de alta concordancia; no se registran revisiones aplicadas en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se conserva el contraste entre ayuda/resguardo y destrucción, sin suavizar la tensión teológica del original.
  - «Autoridad» se usa de manera consistente con el valor de ἐξουσία en el POB inglés, evitando sustituirlo por «poder» como opción más vaga.
