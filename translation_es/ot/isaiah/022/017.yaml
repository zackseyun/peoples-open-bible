translation:
  language: es
  text: Mira[a], Yahvé está por arrojarte violentamente, oh hombre, y envolverte bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertamente te sacudirá con una sacudida violenta, oh hombre»; el hebreo es compacto y difícil, y גָּבֶר puede entenderse como «hombre/varón fuerte» más que como vocativo directo.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira!
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La interjección hebrea introduce una घोषणा enfática. «¡Mira!» conserva la fuerza deíctica en español moderno sin la solemnidad arcaizante de «He aquí», que sería menos natural aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar el nombre divino transliterado en la forma española establecida «Yahvé», en lugar de sustituirlo por un título.'
- source_word: מְטַלְטֶלְךָ
  english_pob_choice: is about to hurl you away violently
  chosen_spanish: está por arrojarte violentamente
  alternatives_spanish:
  - está por lanzarte violentamente
  - está por sacudirte con violencia
  - está por arrebatarte violentamente
  lexicon: HALOT
  rationale: El pilpel de טלטל comunica movimiento brusco y violento. «Está por» refleja la inminencia del anuncio profético; «arrojarte violentamente» transmite el efecto de expulsión y violencia sin depender de una paráfrasis excesiva.
- source_word: טַלְטֵלָה
  english_pob_choice: hurl
  chosen_spanish: violentamente
  alternatives_spanish:
  - con un sacudimiento violento
  - violentamente
  - con violencia
  lexicon: HALOT
  rationale: El acusativo cognado intensifica la acción. En español conviene absorber esa intensificación en el adverbio «violentamente» para evitar una repetición torpe como «arrojarte un arrojar».
- source_word: גָּבֶר
  english_pob_choice: O man
  chosen_spanish: oh hombre
  alternatives_spanish:
  - oh varón
  - hombre
  - oh fuerte
  lexicon: HALOT
  rationale: Aquí el sustantivo puede funcionar como vocativo/aposición. «Oh hombre» preserva el matiz de dirección personal sin importar una lectura de fuerza que el contexto permite pero no exige. Se mantiene la tensión interpretativa del hebreo.
- source_word: וְעֹטְךָ עָטֹה
  english_pob_choice: and wrap you up tightly
  chosen_spanish: y envolverte estrechamente
  alternatives_spanish:
  - y envolverte por completo
  - y envolverte con firmeza
  - y ceñirte estrechamente
  lexicon: HALOT
  rationale: עטה significa envolver/ceñir. La forma intensiva se vierte de modo natural como «estrechamente», conservando la idea de envolver con fuerza sin forzar una imagen ajena al español.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue el principio del POB de no ocultar el nombre personal de Dios tras una sustitución titular. «Yahvé» es la forma española tradicionalmente empleada para el Tetragrámaton en este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Tratamiento de גָּבֶר en vocativo
  english_pob_reading: O man
  chosen_spanish_reading: oh hombre
  alternative_spanish_readings:
  - varón
  - hombre fuerte
  - oh fuerte
  rationale: El hebreo es sintácticamente compacto y admite más de una lectura. La traducción principal conserva la lectura vocativa simple, pero sin borrar la posibilidad de un matiz de «varón/fuerte» que el texto puede sugerir.
  doctrine_reference: Hebrew syntax / lexical ambiguity preserved in translation notes
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente sin cambios sustanciales: el texto hebreo es compacto y difícil, pero no se documentan revisiones aplicadas al pasaje; se preserva la ambigüedad principal en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, en coherencia con el criterio general del proyecto.
  - Se evita la equivalencia eclesiástica «Señor» para יְהוָה salvo justificación contextual específica.
  - La intensificación hebrea se conserva mediante adverbios y construcción verbal natural en español, sin repetición mecánica.
  - Se respeta la ambigüedad de גָּבֶר en la nota, para no cerrar indebidamente la sintaxis del hebreo.
