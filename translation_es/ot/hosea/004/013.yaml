translation:
  language: es
  text: En las cumbres de los montes ofrecen sacrificios, y sobre los collados queman incienso[a], bajo un roble, un álamo y un terebinto[b], porque su sombra es buena. Por tanto, tus hijas se prostituyen[c], y tus nueras cometen adulterio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacen subir ofrendas en humo'. El verbo hebreo puede referirse específicamente a quemar incienso o, de modo más amplio, a hacer subir ofrendas en humo.
    reason: lexical_alternative
  - marker: b
    text: Los nombres de los árboles se identifican tradicionalmente como roble, álamo y terebinto; la equivalencia botánica exacta no es totalmente segura.
    reason: cultural_note
  - marker: c
    text: Oseas usa con frecuencia el lenguaje de infidelidad sexual como imagen de infidelidad del pacto; aquí, sin embargo, el enunciado también describe de manera directa pecado sexual literal.
    reason: cross_reference
lexical_decisions:
- source_word: רָאשֵׁי הֶהָרִים
  english_pob_choice: the tops of the mountains
  chosen_spanish: las cumbres de los montes
  alternatives_spanish:
  - las cimas de los montes
  - las cumbres de las montañas
  lexicon: HALOT
  rationale: רָאשֵׁי literalmente es 'cabezas de'; en esta construcción idiomática designa las partes altas o cumbres. 'Cumbres de los montes' conserva la imagen de altura cultual y suena natural en español.
- source_word: יְזַבֵּחוּ
  english_pob_choice: they sacrifice
  chosen_spanish: ofrecen sacrificios
  alternatives_spanish:
  - sacrifican
  - hacen sacrificios
  lexicon: HALOT
  rationale: El verbo זבח se refiere al acto sacrificial. 'Ofrecen sacrificios' mantiene el sentido cultual de forma clara y digna en español.
- source_word: יְקַטֵּרוּ
  english_pob_choice: they burn incense
  chosen_spanish: queman incienso
  alternatives_spanish:
  - ofrecen incienso
  - hacen subir incienso
  lexicon: HALOT
  rationale: La revisión del POB en inglés optó por 'burn incense' para precisión léxica. En español, 'queman incienso' reproduce ese valor cultual sin estrecharlo indebidamente a un ritual distinto.
- source_word: תַּחַת אַלּוֹן וְלִבְנֶה וְאֵלָה
  english_pob_choice: under oak and poplar and terebinth
  chosen_spanish: debajo del roble, del álamo y de la encina
  alternatives_spanish:
  - debajo del roble, del álamo y del terebinto
  - bajo roble, álamo y terebinto
  lexicon: HALOT
  rationale: 'Los nombres de árbol están tradicionalmente identificados así: אַלּוֹן como roble, לִבְנֶה como álamo y אֵלָה como encina. En español, ''encina'' comunica mejor que ''terebinto'' para un lector general, aunque el equivalente botánico exacto no sea totalmente seguro.'
- source_word: כִּי טוֹב צִלָּהּ
  english_pob_choice: because their shade is good
  chosen_spanish: porque su sombra es buena
  alternatives_spanish:
  - porque su sombra es agradable
  - pues es buena su sombra
  lexicon: HALOT
  rationale: '''Sombra'' conserva el detalle concreto del texto. La construcción impersonal en español mantiene la observación causal de que esos lugares arbolados resultan atractivos.'
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca consecuencia. 'Por tanto' preserva el enlace lógico y profético entre el culto en lugares altos y el resultado descrito a continuación.
- source_word: תִּזְנֶינָה
  english_pob_choice: prostitute themselves
  chosen_spanish: se prostituyen
  alternatives_spanish:
  - se hacen prostitutas
  - practican prostitución
  lexicon: HALOT
  rationale: זנה puede tener fuerza literal y metafórica. Aquí el contexto inmediato nombra a las hijas y a las nueras, por lo que conviene una traducción sexual directa en español.
- source_word: בְּנוֹתֵיכֶם
  english_pob_choice: your daughters
  chosen_spanish: tus hijas
  alternatives_spanish:
  - vuestras hijas
  - sus hijas
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo con sufijo de segunda persona plural.
- source_word: וְכַלּוֹתֵיכֶם
  english_pob_choice: your daughters-in-law
  chosen_spanish: tus nueras
  alternatives_spanish:
  - vuestras nueras
  - tus esposas de los hijos
  lexicon: HALOT
  rationale: כַּלָּה puede significar 'novia' o 'nuera'; en este contexto familiar, paralelo a 'tus hijas', 'nueras' es la opción más precisa y natural.
- source_word: תְּנָאַפְנָה
  english_pob_choice: commit adultery
  chosen_spanish: cometen adulterio
  alternatives_spanish:
  - adulteran
  - son adúlteras
  lexicon: HALOT
  rationale: נאף denota adulterio de manera específica. La forma verbal en español mantiene la acción explícita y no la reduce a un adjetivo.
theological_decisions:
- issue: ¿Debe la frase sexual leerse principalmente como metáfora de infidelidad espiritual o como pecado sexual literal?
  english_pob_reading: Rendered literally in the main text as sexual misconduct, while allowing that Hosea's broader context also exploits covenant-unfaithfulness imagery.
  chosen_spanish_reading: Se traduce literalmente en el texto principal como conducta sexual, sin perder que en el marco de Oseas también funciona la imagen de la infidelidad del pacto.
  alternative_spanish_readings:
  - Se podría espiritualizar como prostitución idolátrica
  - Se podría traducir solo como infidelidad religiosa
  rationale: La sintaxis inmediata nombra a 'tus hijas' y 'tus nueras' y usa dos verbos sexuales concretos. El español debe conservar esa tensión sin absorberla por completo en una lectura simbólica.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió la última revisión del POB en inglés: ''burn incense'' se refleja aquí como ''queman incienso''. También se preservó la decisión de mantener el lenguaje sexual como literal en el texto principal, sin reducirlo a una mera metáfora.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología proyectual, aunque en este versículo no aparece el nombre divino.
  - '''Incienso'' se emplea para יְקַטֵּרוּ según la revisión más reciente del inglés POB.'
  - Se evita 'harlot' o fórmulas arcaicas; 'se prostituyen' conserva la fuerza léxica en español contemporáneo.
  - Se usa 'nueras' para כַּלּוֹתֵיכֶם por el contexto familiar inmediato.
