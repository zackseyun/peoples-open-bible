revisions:
- from: Pero su concubina fue infiel[a] a él, y se fue de él a la casa de su padre, a Belén de Judá; y estuvo allí cuatro meses.
  to: Pero su concubina le fue infiel[a], y se fue de su lado a la casa de su padre, a Belén de Judá, y estuvo allí cuatro meses.
  rationale: 'Se ajusta la redacción para un español más idiomático sin cambiar la decisión exegética del POB: ''le fue infiel'' conserva la lectura principal de זנה + עָלָיו; ''se fue de su lado'' expresa mejor מֵאִתּוֹ; y la puntuación se hace más fluida. La nota alternativa se mantiene sustancialmente igual porque preserva la tensión textual documentada.'
  reviewer_model: gpt-5.4
