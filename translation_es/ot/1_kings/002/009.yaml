translation:
  language: es
  text: Pero ahora, no lo tengas por inocente, porque eres un hombre sabio, y sabrás qué debes hacerle; y harás descender su cabeza cana al Seol[a] con sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el sepulcro’ o ‘el reino de los muertos’ para ‘Seol’.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנַקֵּהוּ
  english_pob_choice: do not hold him guiltless
  chosen_spanish: no lo declares inocente
  alternatives_spanish:
  - no lo tengas por inocente
  - no lo absuelvas
  - no lo dejes sin castigo
  lexicon: HALOT
  rationale: El piel de נקה con sufijo de objeto expresa dejar libre de culpa, declarar inocente o absolver. En este contexto judicial, ‘no lo declares inocente’ conserva el valor forense sin volverse demasiado interpretativo, y evita una formulación menos directa que podría suavizar la orden.
- source_word: אִישׁ חָכָם
  english_pob_choice: a wise man
  chosen_spanish: un hombre sabio
  alternatives_spanish:
  - un sabio
  - una persona sabia
  lexicon: HALOT
  rationale: El hebreo se dirige a un varón concreto; ‘hombre sabio’ mantiene la precisión de género y el tono de consejo real/judicial.
- source_word: וְיָדַעְתָּ אֵת אֲשֶׁר תַּעֲשֶׂה לּוֹ
  english_pob_choice: and you will know what you should do to him
  chosen_spanish: y sabrás qué debes hacerle
  alternatives_spanish:
  - y sabrás lo que harás con él
  - y sabrás qué hacerle
  lexicon: HALOT
  rationale: La forma verbal expresa confianza en el discernimiento futuro de Salomón. ‘Debes hacerle’ refleja la fuerza prudencial/judicial que el inglés POB captó con ‘should do’, sin convertirlo en una parapráfrasis ajena al hebreo.
- source_word: וְהוֹרַדְתָּ
  english_pob_choice: and you shall bring down
  chosen_spanish: y harás descender
  alternatives_spanish:
  - y derribarás
  - y bajarás
  lexicon: HALOT
  rationale: 'El hifil de ירד es causativo: hacer bajar, hacer descender. ‘Harás descender’ conserva el movimiento causado por la acción del rey/juez y mantiene el paralelo con el hebreo.'
- source_word: שֵׂיבָתוֹ
  english_pob_choice: his gray head
  chosen_spanish: su cabeza cana
  alternatives_spanish:
  - su canicie
  - su cabello cano
  - su vejez
  lexicon: HALOT
  rationale: El hebreo usa una metáfora corporal/metonímica para la vejez. ‘Cabeza cana’ preserva la imagen y su carga idiomática mejor que una abstracción como ‘vejez’.
- source_word: בְּדָם
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - en sangre
  - sangrientamente
  lexicon: HALOT
  rationale: La preposición con דם sugiere derramamiento violento de sangre. ‘Con sangre’ es literal, sobrio y mantiene la aspereza del hebreo.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional ‘Seol’ para no reducir el concepto hebreo a ‘sepulcro’ ni resolver su alcance teológico. En español bíblico es inteligible y mantiene la tensión semántica.
theological_decisions:
- issue: Renderización de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: el Seol
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  rationale: Se mantiene la ambigüedad teológica del término hebreo. ‘El Seol’ preserva el trasfondo cosmológico y no fuerza una identificación exclusiva con la tumba física o con una doctrina posterior del más allá.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador inglés revisó ‘do not let him go unpunished’ por ‘do not hold him guiltless’ para acercarse mejor a נקה en sentido forense. El español sigue esa revisión con ‘no lo declares inocente’, una fórmula judicial más cercana al valor del verbo que una mera exhortación a castigar. También se preserva la imagen corporal de ‘gray head’ mediante ‘cabeza cana’ y la transliteración de שְׁאוֹל mediante ‘Seol’.
  spanish_consistency_notes:
  - Se usa ‘Seol’ de forma consistente con la práctica POB de no ocultar términos teológicamente cargados.
  - Se mantiene ‘con sangre’ como expresión literal del hebreo, sin suavizarla.
  - El registro es formal y bíblico, pero no arcaizante; evita calcos innecesarios como ‘he aquí’ o ‘no le tengas por inocente’.
