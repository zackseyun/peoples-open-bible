id: ZEC.7.3
reference: Zechariah 7:3
source:
  edition: WLC
  text: לֵ/אמֹ֗ר אֶל הַ/כֹּֽהֲנִים֙ אֲשֶׁר֙ לְ/בֵית יְהוָ֣ה צְבָא֔וֹת וְ/אֶל הַ/נְּבִיאִ֖ים לֵ/אמֹ֑ר הַֽ/אֶבְכֶּה֙ בַּ/חֹ֣דֶשׁ הַ/חֲמִשִׁ֔י הִנָּזֵ֕ר כַּ/אֲשֶׁ֣ר עָשִׂ֔יתִי זֶ֖ה כַּ/מֶּ֥ה שָׁנִֽים־־־׃פ
translation:
  text: to say to the priests of the house of Yahweh of Armies[a], and to the prophets, saying, “Should I weep in the fifth month[b], abstaining as I have done for these many years?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “separating myself”; the Hebrew term can denote ritual abstinence more broadly than fasting alone.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “the LORD of Hosts.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  chosen: to say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive construct introduces the purpose/content of the delegation's message. Retaining 'to say' reflects the Hebrew structure at the verse opening.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the cultic office; no contextual reason to paraphrase.
- source_word: אֲשֶׁר לְבֵית יְהוָה צְבָאוֹת
  chosen: who belong to the house of the LORD of Armies
  alternatives:
  - who were at the house of the LORD of Armies
  - of the house of the LORD of Armies
  lexicon: HALOT
  rationale: The phrase modifies 'the priests' and identifies them as attached to the temple. 'Who belong to' is idiomatic English that preserves the genitival relationship without implying mere location.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'Armies' is clearer modern English than the traditional 'Hosts' while preserving the martial/cosmic force of the title.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the recognized prophetic figures consulted alongside the priests.
- source_word: הַאֶבְכֶּה
  chosen: Should I weep
  alternatives:
  - Am I to weep
  - Should weep
  lexicon: HALOT
  rationale: 'The 1cs imperfect in this reported question is best rendered as a deliberative question in English: ''Should I weep?'' This captures the inquiry about continued ritual mourning.'
- source_word: בַּחֹדֶשׁ הַחֲמִשִׁי
  chosen: in the fifth month
  lexicon: HALOT
  rationale: A direct temporal expression; preserving the ordinal avoids importing a later month name not present in the text.
- source_word: הִנָּזֵר
  chosen: abstaining
  alternatives:
  - separating myself
  - fasting
  lexicon: HALOT
  rationale: The Niphal infinitive of נזר conveys keeping oneself separate/abstaining in a ritual sense. 'Abstaining' preserves the broader semantic range better than 'fasting,' though fasting is likely included in context.
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  chosen: as I have done
  alternatives:
  - as I did
  lexicon: HALOT
  rationale: English present perfect naturally expresses a practice continuing over past years up to the present inquiry.
- source_word: זֶה כַּמֶּה שָׁנִים
  chosen: these many years
  alternatives:
  - for so many years
  - these several years
  lexicon: HALOT
  rationale: This idiom refers to an extended span of years. 'These many years' is concise, natural, and preserves the deictic force of זֶה.
