revisions:
- from: 'Así dice Yahvé de los ejércitos: No escuchen las palabras de los profetas que profetizan para ustedes; ellos los están engañando[a]. Hablan una visión de su propio corazón, no de la boca de Yahvé.'
  to: 'Así dice Yahvé de los ejércitos: No escuchen las palabras de los profetas que les profetizan; ellos los engañan[a]. Hablan una visión de su propio corazón, no de la boca de Yahvé.'
  rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad y la fidelidad al hebreo sin cambiar el sentido: ''que les profetizan'' expresa mejor לָכֶם; ''los engañan'' evita una perífrasis pesada; y la nota reemplaza una alternativa poco idiomática por una explicación léxica útil y natural en español.'
