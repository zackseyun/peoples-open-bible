  - severity: low
    issue: Capitalización en la nota al pie
    rationale: La alternativa tradicional debe escribirse 'Ramot-Galaad' o 'Ramot-galaad' con 'Galaad' capitalizado por ser nombre propio. En español bíblico, la capitalización del elemento geográfico es preferible.
  revised_spanish_text: 'Y de la tribu de Gad: Ramot en Galaad[a] con sus pastizales, y Mahanaim con sus pastizales.'
