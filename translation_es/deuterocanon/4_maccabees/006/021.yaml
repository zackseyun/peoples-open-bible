review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis retórica del griego y acierta en «despreciados», «tirano», «ley divina» y «hasta la muerte». Sin embargo, «afeminados» no es una equivalencia fiel de ἄνανδροι: introduce una idea de feminización/expresión de género que el griego no exige. El término griego significa literalmente ‘sin hombría/valor varonil’ y, por extensión, ‘cobardes’.'
  spanish_quality_summary: La frase es natural y clara en español, y la pregunta retórica funciona bien. No obstante, «como afeminados» suena más interpretativo que textual y puede desviar el sentido hacia connotaciones modernas no presentes en el original. Una solución como «como hombres sin valor» preserva mejor la forma genderizada y la referencia al coraje.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto en «Dios/ley». El punto clave es la política de fidelidad a formas genderizadas: aquí conviene conservar la masculinidad del insulto sin sobretraducirlo como «afeminados». La nota debe explicar la alternativa semántica «cobardes».'
  issues:
  - severity: high
    issue: «Afeminados» sobretraduce ἄνανδροι
    rationale: ἄνανδροι denota falta de hombría/coraje, no necesariamente amaneramiento o feminización. «Afeminados» añade una connotación semántica y sociocultural más específica que el griego no demanda.
  - severity: medium
    issue: La nota usa «genderizado»
    rationale: Aunque comprensible, «genderizado» no es la opción más natural ni digna en español eclesial general. «de género marcado» o una explicación más directa suena mejor.
  revised_spanish_text: y ¿seremos despreciados por el tirano como hombres sin valor[a], y no defenderemos nuestra ley divina hasta la muerte?
  revised_footnotes:
