    reason: alternative_reading
  - marker: b
    text: O «dentro de ellos» o «en medio de ellos». El hebreo tiene un sufijo singular («dentro de él»), pero su referente es discutido.
    reason: alternative_reading
  revision_rationale: Se ajusta בְּקִרְבּוֹ a «dentro de él» para conservar mejor el singular ambiguo del texto hebreo y la decisión principal documentada por la POB, dejando las alternativas colectivas en nota. También se añade la nota sobre «pastor/pastores» para reflejar el expediente inglés. Se elimina la nota no necesaria sobre «días antiguos» para no sobrecargar el texto con información no preservada como nota en la auditoría.
