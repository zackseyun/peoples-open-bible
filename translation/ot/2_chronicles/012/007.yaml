id: 2CH.12.7
reference: 2 Chronicles 12:7
source:
  edition: WLC
  text: וּ/בִ/רְא֤וֹת יְהוָה֙ כִּ֣י נִכְנָ֔עוּ הָיָה֩ דְבַר יְהוָ֨ה אֶל שְׁמַֽעְיָ֧ה לֵ/אמֹ֛ר נִכְנְע֖וּ לֹ֣א אַשְׁחִיתֵ֑/ם וְ/נָתַתִּ֨י לָ/הֶ֤ם כִּ/מְעַט֙ לִ/פְלֵיטָ֔ה וְ/לֹא תִתַּ֧ךְ חֲמָתִ֛/י בִּ/ירוּשָׁלִַ֖ם בְּ/יַד שִׁישָֽׁק־־׀־־׃
translation:
  text: When Yahweh saw that they had humbled themselves[a], the word of Yahweh came to Shemaiah, saying, “They have humbled themselves; I will not destroy them, but I will grant them some deliverance, and my wrath will not be poured out on Jerusalem by the hand of Shishak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will give them a little escape” or “I will grant them a few survivors.” The Hebrew phrase is compact and may emphasize limited rescue rather than total destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִרְאוֹת
  chosen: When ... saw
  alternatives:
  - And when ... saw
  - on seeing
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of ראה introduces a temporal clause. 'When ... saw' is natural English and preserves the sequence of events.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִכְנָעוּ
  chosen: they had humbled themselves
  alternatives:
  - they submitted
  - they were humbled
  lexicon: HALOT
  rationale: The Niphal of כנע here denotes self-humbling/submission in response to prophetic rebuke. 'Humbled themselves' best captures the reflexive sense in context.
- source_word: הָיָה דְבַר יְהוָה אֶל
  chosen: the word of the LORD came to
  alternatives:
  - the word of the LORD was to
  - the LORD spoke to
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Came to' preserves the idiom without flattening it into a generic speech verb.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: לֹא אַשְׁחִיתֵם
  chosen: I will not destroy them
  alternatives:
  - I will not ruin them
  - I will not wipe them out
  lexicon: HALOT
  rationale: The Hiphil of שׁחת commonly means 'destroy.' This is the clearest and most standard rendering in judgment contexts.
- source_word: וְנָתַתִּי לָהֶם כִּמְעַט לִפְלֵיטָה
  chosen: but I will grant them a little deliverance
  alternatives:
  - and I will give them a little escape
  - and I will grant them some survivors
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. פְלֵיטָה can denote escape, deliverance, or remnant/survivors. In this context of moderated judgment, 'a little deliverance' best conveys limited rescue while remaining readable. The adversative 'but' reflects the sense in English, though the Hebrew conjunction is simply waw.
- source_word: תִתַּךְ חֲמָתִי
  chosen: my wrath will not be poured out
  alternatives:
  - my fury will not be poured out
  - my wrath will not be unleashed
  lexicon: HALOT
  rationale: נתך in this idiom is used of wrath being poured out. 'Wrath' fits the prophetic/judgment register and is idiomatic in English.
- source_word: בִּירוּשָׁלַם
  chosen: on Jerusalem
  alternatives:
  - in Jerusalem
  - against Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is ב, with the idiom of wrath being poured out, English naturally uses 'on Jerusalem.' This communicates the target of judgment clearly.
- source_word: בְּיַד שִׁישָׁק
  chosen: by the hand of Shishak
  alternatives:
  - through Shishak
  - by Shishak
  lexicon: HALOT
  rationale: '''By the hand of'' is a common Hebrew agency expression. It is preserved here because it remains intelligible in modern English and reflects the instrumental nuance.'
- source_word: שִׁישָׁק
  chosen: Shishak
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention.
