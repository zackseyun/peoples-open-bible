base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/024/019.yaml
  text: These were their appointed duties for their service[a], to enter the house of Yahweh according to their ordinance, under the hand of Aaron their father, as Yahweh, the God of Israel[b], had commanded him.
  footnotes:
