translation:
  language: es
  text: Así convertiré a Samaria en un montón de ruinas en el campo abierto[a], en lugar para plantar viñas; derramaré sus piedras en el valle[b] y dejaré al descubierto sus cimientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un montón de ruinas en el campo». La frase hebrea es compacta y también puede traducirse de forma más literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «arrojaré sus piedras al barranco». El verbo literalmente transmite la idea de hacerlas fluir o derramarse hacia abajo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: So I will make
  chosen_spanish: Así convertiré
  alternatives_spanish:
  - Y convertiré
  - Por tanto, convertiré
  lexicon: HALOT
  rationale: El hebreo expresa una acción futura declarada por Yahvé en discurso profético. «Convertiré» comunica el cambio de estado del lugar con naturalidad en español; «Así» mantiene la conexión discursiva de consecuencia que el inglés POB resolvió con «So».
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Es nombre propio de ciudad. «Samaria» es la forma usual y clara en español bíblico contemporáneo.
- source_word: לְעִי
  english_pob_choice: a heap
  chosen_spanish: un montón de ruinas
  alternatives_spanish:
  - un montón
  - un montículo de ruinas
  - un montón ruinoso
  lexicon: HALOT
  rationale: עִי denota un montón de escombros o ruinas. En español, «un montón de ruinas» conserva la imagen compacta y el sentido desolado; además, armoniza con el paralelismo del verso.
- source_word: הַשָּׂדֶה
  english_pob_choice: the open country
  chosen_spanish: el campo abierto
  alternatives_spanish:
  - el campo
  - la campiña
  - el campo raso
  lexicon: HALOT
  rationale: שָׂדֶה literalmente es «campo», pero aquí contrasta con la ciudad derribada. «El campo abierto» expresa bien ese contraste sin sonar técnico o arcaizante.
- source_word: לְמַטָּעֵי כָרֶם
  english_pob_choice: a place for planting vineyards
  chosen_spanish: lugar para plantar viñas
  alternatives_spanish:
  - para plantar viñedos
  - lugar de plantación de viñas
  - lugar para viñas
  lexicon: HALOT
  rationale: 'La construcción indica finalidad o resultado: el sitio quedará apto para cultivo. «Lugar para plantar viñas» mantiene el sentido agrícola y la sencillez del hebreo.'
- source_word: וְהִגַּרְתִּי
  english_pob_choice: I will pour
  chosen_spanish: derramaré
  alternatives_spanish:
  - arrojaré
  - haré rodar
  - verteré
  lexicon: HALOT
  rationale: El verbo hebreo implica hacer fluir o derramar hacia abajo. Con piedras como objeto, «derramaré» conserva la metáfora de descenso que el POB inglés preserva con «pour».
- source_word: לַגַּי
  english_pob_choice: into the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - al valle
  - en el barranco
  - en la cañada
  lexicon: HALOT
  rationale: גַּי puede significar valle o hondonada. «En el valle» es natural en español y suficientemente amplio para no estrechar el referente.
- source_word: אֲבָנֶיהָ
  english_pob_choice: her stones
  chosen_spanish: sus piedras
  alternatives_spanish:
  - las piedras de ella
  - sus cantos
  lexicon: HALOT
  rationale: El sufijo femenino singular refiere a Samaria. En español, «sus piedras» mantiene la posesión sin forzar una personificación con género gramatical donde puede sonar menos natural.
- source_word: וִיסֹדֶיהָ
  english_pob_choice: her foundations
  chosen_spanish: sus cimientos
  alternatives_spanish:
  - sus fundamentos
  - los cimientos de ella
  lexicon: HALOT
  rationale: יְסוֹדִים designa cimientos o fundamentos. «Cimientos» es la opción más directa y clara en español; conserva el paralelismo con la destrucción total del edificio urbano.
- source_word: אֲגַלֶּה
  english_pob_choice: uncover
  chosen_spanish: descubriré
  alternatives_spanish:
  - desnudaré
  - dejaré al descubierto
  - desvelaré
  lexicon: HALOT
  rationale: גלה en piel significa descubrir o dejar al descubierto. «Descubriré» es la equivalencia más natural y mantiene la imagen de una demolición completa hasta la base.
theological_decisions:
- issue: Personificación femenina de la ciudad
  english_pob_reading: Use 'her' for Samaria
  chosen_spanish_reading: 'Usar posesivos neutros en español: «sus piedras», «sus cimientos»'
  alternative_spanish_readings:
  - «sus piedras», «sus fundamentos» con personificación más marcada
  - «de ella» para conservar al máximo el femenino
  rationale: El hebreo usa sufijos femeninos para Samaria, personificando la ciudad. En español, la personificación queda suficientemente implícita por el contexto, y «sus» evita una construcción menos fluida; no se pierde la fuerza profética de la imagen.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Intensidad de la imagen de destrucción
  english_pob_reading: a heap / pour her stones / uncover her foundations
  chosen_spanish_reading: un montón de ruinas / derramaré sus piedras / descubriré sus cimientos
  alternative_spanish_readings:
  - un montón de escombros
  - arrojaré sus piedras
  - dejaré al descubierto sus fundamentos
  rationale: La secuencia hebrea va de ruina total a desmonte final. La traducción conserva ese progreso sin suavizarlo, manteniendo el carácter judicial y devastador del oráculo.
  doctrine_reference: Poética profética y juicio divino en el libro de Miqueas
translation_notes:
  revision_awareness: El contexto auditado inglés mantiene alta concordancia y no requiere revisión adicional; la versión española sigue el mismo perfil óptimo-equivalente, conservando la progresión imagética y la personificación implícita sin forzar un calco del inglés.
  spanish_consistency_notes:
  - Se usó «Samaria» como nombre propio estándar, en lugar de una adaptación menos común.
  - 'Se mantuvo la secuencia de destrucción completa: ruinas, piedras, cimientos.'
  - «Viñas» traduce con naturalidad el campo de cultivo de כָרֶם en un contexto de plantación.
  - No se introdujo «SEÑOR» porque el verso no contiene el Tetragrámaton explícito.
  - Se prefirió un español bíblico moderno y claro, evitando arcaísmos innecesarios.
