translation:
  language: es
  text: Si un residente extranjero[a] reside contigo y celebra la Pascua para Yahvé, todo varón suyo deberá ser circuncidado; entonces podrá acercarse para celebrarla[b], y será como un natural de la tierra. Pero ningún incircunciso podrá comer de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero» para גֵּר, es decir, alguien no nativo que vive entre Israel.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «hacer la Pascua». En español, «celebrarla» expresa de modo natural la observancia ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - extranjero residente
  - sojourner
  lexicon: HALOT
  rationale: גֵּר designa a un no nativo que vive entre el pueblo del pacto. En español, «forastero» comunica la condición de no pertenecer originariamente a la tierra sin sonar tan técnico como «residente extranjero». Se evita «stranger»/«extraño» por ambigüedad.
- source_word: יָגוּר אִתְּךָ
  english_pob_choice: resides with you
  chosen_spanish: reside contigo
  alternatives_spanish:
  - habita contigo
  - vive contigo
  - sojurna contigo
  lexicon: HALOT
  rationale: El verbo גור expresa permanencia como forastero residente. «Reside contigo» conserva el valor durativo y legal del verbo sin volver la frase pesada o arcaizante.
- source_word: וְעָשָׂה פֶסַח
  english_pob_choice: keeps the Passover
  chosen_spanish: celebra la Pascua
  alternatives_spanish:
  - guarda la Pascua
  - hace la Pascua
  - observa la Pascua
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hace/realiza la Pascua», pero en español bíblico y moderno «celebra la Pascua» comunica la observancia ritual con naturalidad. Se evita «guarda» porque puede sonar demasiado técnico o parcial en español.
- source_word: פֶסַח
  english_pob_choice: Passover
  chosen_spanish: Pascua
  alternatives_spanish:
  - Pascua
  lexicon: HALOT
  rationale: «Pascua» es el equivalente estándar y fiel para la fiesta/rito en este contexto.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la política del proyecto. La preposición ל marca dirección/dedicación de la acción ritual, y «para Yahvé» resulta natural en español y conserva esa dedicación.
- source_word: הִמּוֹל ל֣וֹ כָל זָכָר
  english_pob_choice: every male belonging to him must be circumcised
  chosen_spanish: todo varón suyo deberá ser circuncidado
  alternatives_spanish:
  - deberá circuncidarse todo varón suyo
  - todo macho suyo deberá ser circuncidado
  - deberán circuncidar a todo varón suyo
  lexicon: HALOT
  rationale: La construcción exige la circuncisión de todos los varones asociados a él. «Todo varón suyo» conserva el alcance del hebreo sin añadir «familia» o «casa» que no están explícitos. «Deberá ser circuncidado» traduce bien el valor prescriptivo.
- source_word: וְאָז יִקְרַב
  english_pob_choice: then he may come near
  chosen_spanish: entonces podrá acercarse
  alternatives_spanish:
  - entonces se acercará
  - entonces podrá presentarse
  - entonces podrá llegar
  lexicon: HALOT
  rationale: קרב aquí indica acceso autorizado al rito. «Podrá acercarse» expresa permiso tras cumplir la condición, conservando el matiz de aproximación ritual.
- source_word: לַעֲשֹׂתוֹ
  english_pob_choice: to keep it
  chosen_spanish: para celebrarla
  alternatives_spanish:
  - para hacerla
  - para guardarla
  - para realizarla
  lexicon: HALOT
  rationale: El complemento remite a la Pascua. En español, el pronombre femenino concuerda con «Pascua» y «celebrarla» comunica el sentido ritual de לעשות sin perder la referencia al acto.
- source_word: כְּאֶזְרַח הָאָרֶץ
  english_pob_choice: like a native of the land
  chosen_spanish: como un natural de la tierra
  alternatives_spanish:
  - como un nativo de la tierra
  - como un ciudadano de la tierra
  - como uno nacido en la tierra
  lexicon: HALOT
  rationale: אֶזְרַח denota un nacido nativo, miembro pleno del grupo local. «Natural de la tierra» suena bíblico y preciso en español, y mantiene la comparación legal-social.
- source_word: עָרֵל
  english_pob_choice: uncircumcised person
  chosen_spanish: incircunciso
  alternatives_spanish:
  - persona incircuncisa
  - varón incircunciso
  lexicon: HALOT
  rationale: El adjetivo funciona aquí como categoría excluyente. «Incircunciso» es breve y fiel; en español puede funcionar sustantivado sin forzar una paráfrasis.
- source_word: לֹא יֹאכַל בּוֹ
  english_pob_choice: may eat of it
  chosen_spanish: comerá de ella
  alternatives_spanish:
  - podrá comer de ella
  - no comerá de ella
  - no podrá comer de ella
  lexicon: HALOT
  rationale: La negación expresa prohibición. «Comerá de ella» traduce literalmente el valor verbal con la Pascua como referente femenino, y el contexto prohibitivo queda claro por «ningún incircunciso» y la negación.
theological_decisions:
- issue: Nombre divino YHWH / יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama. Conforme a la política del proyecto, se preserva el nombre divino en español como «Yahvé», evitando el enmascaramiento litúrgico por «SEÑOR» y manteniendo la trazabilidad al original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Condición de participación del forastero en la Pascua
  english_pob_reading: The verse permits participation after circumcision of every male in his household/group, without expanding the text into later theological categories.
  chosen_spanish_reading: El forastero puede participar si se cumple la condición de la circuncisión de todos los varones vinculados a él, y entonces se lo trata como a un natural de la tierra para esta observancia.
  alternative_spanish_readings:
  - Exclusión étnica simple
  - Inclusión plena sin condición
  rationale: La redacción hebrea establece una inclusión condicionada dentro del pacto, no una eliminación de fronteras ni una exclusión absoluta. La traducción preserva esa tensión sin introducir categorías posteriores.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB, especialmente el cambio de «wants to keep» a «keeps» para no añadir deseo no expresado en el hebreo. La redacción española refleja esa misma cautela al usar un presente descriptivo/ritual («celebra») y no una paráfrasis voluntativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma para יהוה, conforme al proyecto.
  - «Pascua» se usa de manera consistente para פֶסַח, y el pronombre femenino en «celebrarla» sigue ese referente.
  - «Incircunciso» se conserva como término de exclusión ritual, alineado con el valor lexical del hebreo.
  - La traducción intenta mantener el tono legal-ritual del versículo sin volverlo rígidamente literal.
