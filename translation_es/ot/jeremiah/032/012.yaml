  - severity: medium
    issue: '''Que estaban escribiendo en el documento de compra'' suena impropio para el contexto legal y puede sugerir simultaneidad innecesaria.'
    rationale: הַכֹּתְבִים es participio, pero el POB revisado optó por 'who had written in' para reflejar mejor el valor contextual. En español, 'que habían escrito en la escritura/documento de compra' conserva la cercanía al hebreo sin introducir el matiz progresivo extraño.
