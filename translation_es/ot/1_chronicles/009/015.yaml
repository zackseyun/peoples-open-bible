lexical_decisions:
- source_word: וּ/בַקְבַּקַּ֥ר
  english_pob_choice: and Bakbakkar
  chosen_spanish: y Bakbakar
  alternatives_spanish:
  - Bakbakar
  lexicon: nombre propio
  rationale: Se conserva la conjunción coordinante para mantener la lista genealógica continua, y el nombre propio se translitera de manera directa en español. Se simplifica la doble consonancia inglesa para una forma española natural sin alterar la identificación del nombre.
- source_word: חֶ֖רֶשׁ
  english_pob_choice: Heresh
  chosen_spanish: Hares
  alternatives_spanish:
  - Jeres
  - Heresh
  lexicon: nombre propio
  rationale: El hebreo presenta un nombre propio; en español se translitera para preservar la forma del texto fuente. Se evita una transliteración inglesa rígida y se adapta la secuencia consonántica a una forma legible en español.
- source_word: וְ/גָלָ֑ל
  english_pob_choice: and Galal
  chosen_spanish: y Galal
  alternatives_spanish:
  - Galal
  lexicon: nombre propio
  rationale: Se mantiene la conjunción de la lista y el nombre se translitera sin traducción, porque es un antropónimo del linaje.
- source_word: וּ/מַתַּנְיָה֙
  english_pob_choice: and Mattaniah
  chosen_spanish: y Matanías
  alternatives_spanish:
  - Matanías
  - Mattanías
  lexicon: nombre propio
  rationale: Se conserva la conjunción serial y se vierte el nombre en una forma española reconocible, más natural que duplicar la consonante inglesa. La base hebrea permite esta transliteración estándar.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una cadena genealógica, בן expresa relación filial directa; en español, 'hijo de' reproduce mejor esa relación que una paráfrasis más amplia. Se mantiene la posibilidad de descendencia más remota en nota por la ambigüedad lexical documentada.
- source_word: מִיכָ֔א
  english_pob_choice: Mica
  chosen_spanish: Mica
  alternatives_spanish:
  - Micaía
  - Micá
  lexicon: nombre propio
  rationale: Se conserva la forma breve del nombre propia del hebreo de este versículo. La forma 'Mica' evita confundirlo con 'Miqueas/Micah' y sigue el criterio auditado del POB inglés.
- source_word: זִכְרִ֖י
  english_pob_choice: Zichri
  chosen_spanish: Zicri
  alternatives_spanish:
  - Zichri
  lexicon: nombre propio
  rationale: El nombre propio se translitera; en español puede omitirse la h de la forma inglesa sin perder identificación. Se elige una forma breve y transparente, compatible con la fonología española.
- source_word: אָסָֽף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asaph
  lexicon: nombre propio
  rationale: Se translitera el nombre propio con grafía española habitual, evitando la h final inglesa. Esto conserva la identificación del personaje bíblico y adapta la forma al español.
