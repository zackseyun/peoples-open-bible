translation:
  language: es
  text: Entonces llegaron los hijos de Israel[a], toda la congregación[b], al desierto de Zin, en el primer mes; y el pueblo se quedó en Cades. Allí murió Miriam, y allí fue sepultada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «toda la comunidad» o «toda la asamblea».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Hijo/hijos conserva la forma literal y familiar del hebreo, manteniendo transparencia frente al texto fuente. En español, "los hijos de Israel" es natural y reconocible; "los israelitas" sería más fluido pero menos literal.
- source_word: כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la comunidad
  - toda la asamblea
  lexicon: HALOT
  rationale: '"Congregación" preserva bien el sentido corporativo y reunido de עֵדָה. "Toda" refleja כָּל. "Asamblea" y "comunidad" son posibles, pero "congregación" comunica mejor la reunión del pueblo en este contexto.'
- source_word: מִדְבַּר צִן
  english_pob_choice: the wilderness of Zin
  chosen_spanish: el desierto de Zin
  alternatives_spanish:
  - el desierto/estepa de Zin
  - la región desértica de Zin
  lexicon: HALOT
  rationale: En español bíblico, "desierto" transmite de modo claro la geografía de מִדְבָּר sin sonar tan técnico como "estepa". Se mantiene el nombre propio Zin sin adaptar.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - en el mes primero
  - en el primer mes lunar
  lexicon: HALOT
  rationale: Es la equivalencia temporal directa y más natural en español. "Mes" es suficiente aquí; el hebreo no exige explicitar "lunar".
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - se asentó
  - permaneció
  lexicon: HALOT
  rationale: '"Se quedó" conserva la idea de permanecer en un lugar sin sugerir más permanencia de la que el contexto inmediato garantiza. "Habitó" o "se asentó" podrían sonar más fuertes de lo que el hebreo exige aquí.'
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: '"El pueblo" mantiene el referente colectivo e identidad de Israel en narración bíblica. "La gente" sería menos solemne y menos preciso en este contexto.'
- source_word: בְּקָדֵשׁ
  english_pob_choice: at Kadesh
  chosen_spanish: en Cades
  alternatives_spanish:
  - en Kadesh
  - en Cades-Barnea
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional "Cades" para el topónimo, que es más legible en español bíblico. La preposición "en" refleja el estado de residencia/estancia del relato.
- source_word: וַתָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: '"Murió" es la renderización directa y sobria de מות. No se suaviza con eufemismos que no están en el hebreo.'
- source_word: וַתִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultada
  alternatives_spanish:
  - fue enterrada
  - la sepultaron
  lexicon: HALOT
  rationale: '"Fue sepultada" conserva el pasivo del hebreo y su tono más formal. "Enterrada" sería más coloquial; "la sepultaron" introduciría un sujeto no expresado.'
- source_word: שָׁם ... שָׁם
  english_pob_choice: there ... there
  chosen_spanish: allí ... allí
  alternatives_spanish:
  - ahí ... ahí
  - allá ... allá
  lexicon: HALOT
  rationale: Se preserva la repetición enfática del hebreo con "allí ... allí", manteniendo el paralelismo narrativo y la sobriedad del original.
translation_notes:
  revision_awareness: El inglés POB está en alta concordancia con el hebreo y no muestra revisiones aplicadas; esta versión española sigue ese mismo perfil de alta literalidad con ajuste de naturalidad idiomática. Se mantuvieron la repetición de שָׁם ... שָׁם y el pasivo de וַתִּקָּבֵר, sin introducir sujeto explícito.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; aquí no aparece.
  - Se evitó «SEÑOR» porque el versículo no contiene יהוה ni κύριος.
  - Se prefirió «hijos de Israel» por transparencia al hebreo y porque el inglés POB ya documenta esa opción literal.
  - «Cades» se mantiene como forma castellana estable del topónimo, coherente con el registro bíblico en español.
