translation:
  text: See[a], beloved, how great and marvelous love is, and there is no explaining its perfection. Who is sufficient to be found in it[b], except those whom God may count worthy? Therefore let us beg and ask from his mercy that we may be found in love, without human partiality, blameless. All the generations from Adam until this day have passed away, but those who were perfected in love according to the grace of God have a place among the godly, and they will be revealed in the visitation of the kingdom of Messiah. For it is written, “Enter into your inner chambers for a very little while, until my wrath and anger pass by; and I will remember a good day, and I will raise you from your tombs.” Blessed are we, beloved, if we do the commandments of God in the harmony of love, so that through love our sins may be forgiven us. For it is written, “Blessed are those whose lawless deeds are forgiven, and whose sins are covered; blessed is the man whose sin the Lord will certainly not reckon, and in whose mouth there is no deceit.” This blessing, then, came upon those chosen by God through Jesus Messiah our Lord, to whom be the glory forever and ever[c][d][e][f]. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'visitation of the kingdom of the Messiah' may also be understood as the appearing or eschatological manifestation of the kingdom.
    reason: alternative_reading
    anchor_ref: '50:3'
  - marker: b
    text: The citation echoes Isa 26:20 and combines language resembling resurrection hope; the wording here follows Clement's form of the citation.
    reason: cross_reference
    anchor_ref: '50:4'
  - marker: f
    text: Or 'in unity of love' for 'in the harmony of love.'
    reason: lexical_alternative
    anchor_ref: '50:5'
  - marker: e
    text: Quoted from Ps 32:1–2(31:1–2 LXX), with the final clause reflecting the Greek scriptural form familiar in early Christian usage.
    reason: cross_reference
    anchor_ref: '50:6'
  - marker: d
    text: Or 'and of its perfection there is no explanation.'.
    reason: previous_rendering
  - marker: c
    text: Or 'whose lawless deeds were forgiven, and whose sins were covered'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows project default. Repeated throughout the chapter to preserve the paraenetic emphasis and rhetorical cohesion.
- source_word: τελειότης / τελειωθέντες
  chosen: perfection / perfected
  alternatives:
  - maturity / made complete
  - completeness / brought to completion
  lexicon: BDAG
  rationale: Keeps the lexical link between love's 'perfection' and those 'perfected' in love. 'Perfection' preserves the elevated moral-theological register better than 'maturity' here.
- source_word: ἐξήγησις
  chosen: explanation
  alternatives:
  - interpretation
  - full account
  lexicon: LSJ
  rationale: The sense is that love's perfection cannot be fully expounded or set forth. 'Explanation' is clear modern English while retaining the idea of verbal exposition.
- source_word: ἱκανός
  chosen: sufficient
  alternatives:
  - worthy
  - fit
  - competent
  lexicon: BDAG
  rationale: The question concerns who is adequate to be found in love; 'sufficient' preserves the humility of the expression without collapsing it into worthiness, which is then supplied by καταξιώσῃ.
- source_word: καταξιώσῃ
  chosen: count worthy
  alternatives:
  - deem worthy
  - make worthy
  lexicon: BDAG
  rationale: Expresses divine granting of worthiness without overstating ontological transformation.
- source_word: δεηθῶμεν ... αἰτώμεθα
  chosen: let us beg and ask
  alternatives:
  - let us pray and request
  - let us entreat and ask
  lexicon: BDAG
  rationale: Preserves the paired verbal force and the earnest tone of supplication.
- source_word: δίχα προσκλίσεως ἀνθρωπίνης
  chosen: without human partiality
  alternatives:
  - without human favoritism
  - apart from human bias
  lexicon: LSJ
  rationale: πρόσκλισις here carries the sense of inclination or bias toward persons. 'Without human partiality' fits the ethical context and ecclesial paraenesis.
- source_word: ἄμωμοι
  chosen: blameless
  alternatives:
  - without blemish
  - faultless
  lexicon: BDAG
  rationale: A standard moral-cultic term; 'blameless' is idiomatic and preserves ethical force.
- source_word: εὐσεβῶν
  chosen: the godly
  alternatives:
  - the pious
  - the devout
  lexicon: BDAG
  rationale: Refers to the righteous company with whom the perfected have a place. 'The godly' is natural and suitably weighty.
- source_word: ἐπισκοπή
  chosen: visitation
  alternatives:
  - oversight
  - appearing
  - inspection
  lexicon: BDAG
  rationale: Retains the biblical resonance of divine visitation rather than flattening to administrative 'oversight.' The phrase likely points to eschatological manifestation.
- source_word: βασιλεία τοῦ Χριστοῦ
  chosen: kingdom of the Messiah
  alternatives:
  - kingdom of Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός as title is translated 'Messiah' where context supports. Here it is titular and eschatological.
- source_word: ταμεῖα
  chosen: inner chambers
  alternatives:
  - rooms
  - storehouses
  lexicon: LSJ
  rationale: In the scriptural citation the sense is private interior rooms or chambers of refuge.
- source_word: θηκῶν
  chosen: tombs
  alternatives:
  - sepulchers
  - resting places
  - coffins
  lexicon: LSJ
  rationale: In context of being raised, the sense is burial places. 'Tombs' is the clearest idiomatic rendering.
- source_word: ὁμονοία
  chosen: harmony
  alternatives:
  - unity
  - concord
  lexicon: BDAG
  rationale: Captures communal oneness while preserving the rhetorical phrase 'in the harmony of love.'
- source_word: ἀφεθῆναι
  chosen: be forgiven
  alternatives:
  - be remitted
  - be pardoned
  lexicon: BDAG
  rationale: Standard rendering in a sins context; clear and theologically familiar without being archaic.
- source_word: ἀνομίαι
  chosen: lawless deeds
  alternatives:
  - iniquities
  - lawless acts
  lexicon: BDAG
  rationale: Preserves the concrete sense of violations of God's order better than the more traditional but less transparent 'iniquities.'
- source_word: λογίσηται
  chosen: reckon
  alternatives:
  - count
  - credit
  - impute
  lexicon: BDAG
  rationale: '''Reckon'' preserves the forensic/accounting nuance and scriptural cadence.'
- source_word: δόλος
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: '''Deceit'' is accessible modern English; ''guile'' is traditional but less current.'
- source_word: μακαρισμός
  chosen: blessing
  alternatives:
  - blessedness
  - pronouncement of blessing
  lexicon: BDAG
  rationale: Refers to the state/pronouncement of blessedness from the cited Psalm. 'Blessing' is concise and natural in context.
- source_word: ἐκλελεγμένους
  chosen: chosen
  alternatives:
  - elect
  - selected
  lexicon: BDAG
  rationale: '''Chosen'' is transparent and avoids importing later technical theological freight beyond the text''s wording.'
- source_word: δόξα
  chosen: glory
  alternatives:
  - honor
  lexicon: BDAG
  rationale: Standard doxological rendering.
theological_decisions:
- issue: Rendering Χριστοῦ in the doxological and eschatological phrases
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title rather than a mere name in 'the kingdom of the Messiah' and 'Jesus Messiah our Lord.' This follows project policy to translate titles where context supports.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of ἐπισκοπῇ τῆς βασιλείας
  chosen_reading: visitation of the kingdom of the Messiah
  alternative_readings:
  - oversight of the kingdom
  - appearing of the kingdom
  - visitation in the kingdom
  rationale: The phrase is somewhat compressed and eschatological. 'Visitation' preserves biblical-theological tension and avoids over-resolving whether the emphasis is on divine inspection, intervention, or manifestation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Force of δίχα προσκλίσεως ἀνθρωπίνης
  chosen_reading: without human partiality
  alternative_readings:
  - without respect of persons
  - without human favoritism
  - without human bias
  rationale: The phrase likely concerns freedom from partisan or person-based preference within the community. 'Without human partiality' is clear and ecclesially relevant while preserving the ethical edge.
