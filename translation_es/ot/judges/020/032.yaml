  yaml_path: translation/ot/judges/020/032.yaml
  text: And the sons of Benjamin said[a], “They are being struck down before us as at the first.” But the sons of Israel said[c][b], “Let us flee and draw them away from the city to the highways.”
  footnotes:
  - marker: a
    text: Hebrew 'as at the first,' referring to the earlier battles in this chapter; that is, 'as before' or 'as in the first encounter.'
    reason: cross_reference
  - marker: b
    text: The Hebrew says 'draw him away' with a singular object, likely using a collective singular for Benjamin or its fighting force; some translations render the sense as 'draw them away.'
    reason: lexical_alternative
  - marker: c
    text: Or 'roads' or 'main roads.' The Hebrew term can refer to built-up roads or highways.
    reason: lexical_alternative
