translation:
  language: es
  text: 'Entonces David dijo a Urías: «Desciende a tu casa y lávate los pies[a]». Y Urías salió de la casa del rey, y un presente[b] del rey salió tras él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lávate los pies» es una expresión literal que también puede sugerir refrescarse o acomodarse en casa después del viaje.
    reason: cultural_note
  - marker: b
    text: O «una porción del rey». El término hebreo puede referirse a algo llevado o enviado, incluyendo una porción o un presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵד
  english_pob_choice: Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Ve
  - Baja
  lexicon: HALOT
  rationale: El imperativo de ירד conserva el matiz direccional de 'go down'. 'Desciende' mantiene esa dirección, probablemente desde el ámbito real hacia la casa de Urías, sin perder claridad en español.
- source_word: לְבֵיתְךָ
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  lexicon: HALOT
  rationale: בַּיִת significa literalmente 'casa'. 'A tu casa' sigue de cerca el hebreo y suena natural en español, mientras que 'hogar' suaviza demasiado el referente concreto.
- source_word: וּרְחַץ רַגְלֶיךָ
  english_pob_choice: and wash your feet
  chosen_spanish: y lávate los pies
  alternatives_spanish:
  - y lava tus pies
  - y refréscate
  lexicon: HALOT
  rationale: La expresión es literalmente corporal. Se conserva la imagen concreta porque puede implicar descanso o renovación tras el viaje, pero sin reemplazarla por una paráfrasis interpretativa.
- source_word: מִבֵּית הַמֶּלֶךְ
  english_pob_choice: from the king’s house
  chosen_spanish: de la casa del rey
  alternatives_spanish:
  - del palacio
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'de la casa del rey'. 'Casa del rey' preserva el vínculo léxico con בית y evita introducir 'palacio', que es posible pero menos literal.
- source_word: מַשְׂאַת הַמֶּלֶךְ
  english_pob_choice: a present from the king
  chosen_spanish: un presente del rey
  alternatives_spanish:
  - una porción del rey
  - un regalo del rey
  lexicon: HALOT
  rationale: מַשְׂאֵת puede referirse a una porción, envío o presente. 'Presente' es una opción formal y natural en español que conserva la ambigüedad útil del término sin decidir indebidamente por 'porción' o por un simple 'regalo'.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - detrás de él
  - después de él
  lexicon: HALOT
  rationale: '''Tras él'' reproduce bien la idea de seguimiento en la secuencia narrativa y es idiomático en español bíblico moderno.'
translation_notes:
  revision_awareness: El texto inglés del POB pasó de 'gift' a 'present' para מַשְׂאַת; por eso se ha elegido 'presente' en español para reflejar ese ajuste estilístico sin perder la posible ambigüedad léxica del hebreo. La cláusula final conserva la dirección narrativa 'salió tras él' / 'after him'.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera de este versículo porque no aparece el Tetragrámaton ni un título divino.
  - Se conserva 'casa del rey' en vez de 'palacio' para alinearse con la forma hebrea y la auditoría inglesa.
  - Se usa 'presente' como equivalente principal de מַשְׂאַת, dejando la alternativa de 'porción' en nota por la ambigüedad documentada.
