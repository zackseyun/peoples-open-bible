translation:
  language: es
  text: cualquiera que se bendice en la tierra[a] se bendecirá por el Dios de la verdad[b], y cualquiera que jura en la tierra[a] jurará por el Dios de la verdad[b]; porque las calamidades anteriores han sido olvidadas, y porque han quedado ocultas a mis ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el país'. El hebreo אֶרֶץ puede significar 'tierra' o 'país/land' según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'por el Dios de Amén' o 'por el Dios fiel'. El hebreo אָמֵן aquí lleva el sentido de firmeza, fidelidad y verdad.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - el que
  - quienquiera que
  lexicon: HALOT
  rationale: Expresa bien el valor indefinido y general del relativo hebreo sin sonar rígido en español contemporáneo.
- source_word: הַמִּתְבָּרֵךְ / יִתְבָּרֵךְ
  english_pob_choice: blesses himself / will bless himself
  chosen_spanish: se bendice / se bendecirá
  alternatives_spanish:
  - se declara bendito / se declarará bendito
  - se pronuncia bendito / se pronunciará bendito
  lexicon: HALOT
  rationale: El hitpael es reflexivo. 'Se bendice' conserva la acción sobre sí mismo; la alternativa 'pronuncia/se declara bendito' explicita la inferencia, pero la lectura principal mantiene la forma más cercana al hebreo.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  lexicon: HALOT
  rationale: '''Tierra'' en español permite conservar la ambigüedad entre ''land'' y ''earth'' mejor que una localización demasiado específica. Dado el contexto profético, evita restringir el alcance sin necesidad.'
- source_word: בֵּאלֹהֵי אָמֵן
  english_pob_choice: by the God of truth
  chosen_spanish: por el Dios de Amén
  alternatives_spanish:
  - por el Dios de la verdad
  - por el Dios fiel
  lexicon: HALOT
  rationale: Se preserva 'Amén' como epíteto/divino descriptor poco usual, siguiendo la decisión del POB inglés de no aplanar la rareza léxica. En español, 'Dios de Amén' mantiene la tensión textual y la conexión con el término hebreo.
- source_word: הַנִּשְׁבָּע / יִשָּׁבַע
  english_pob_choice: whoever swears / will swear
  chosen_spanish: cualquiera que jura / jurará
  alternatives_spanish:
  - cualquiera que hace juramento / hará juramento
  - quien jura / jurará
  lexicon: HALOT
  rationale: '''Jurar'' es idiomático y preciso para ''tomar juramento'' en este contexto, sin perder el valor forense del hebreo.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce claramente la razón causal de la afirmación anterior en español natural.
- source_word: נִשְׁכְּחוּ
  english_pob_choice: are forgotten
  chosen_spanish: han sido olvidadas
  alternatives_spanish:
  - son olvidadas
  - quedaron olvidadas
  lexicon: HALOT
  rationale: El perfecto hebreo sugiere un estado resultante. 'Han sido olvidadas' comunica bien la condición lograda sin perder la pasividad.
- source_word: הַצָּרוֹת הָרִאשֹׁנוֹת
  english_pob_choice: the former troubles
  chosen_spanish: las primeras calamidades
  alternatives_spanish:
  - los primeros males
  - las antiguas tribulaciones
  lexicon: HALOT
  rationale: '''Tzārôt'' puede ser ''troubles/distresses/adversities''. ''Calamidades'' da peso a la gravedad del término; ''primeras'' conserva la relación temporal de ''former''.'
- source_word: נִסְתְּרוּ מֵעֵינָי
  english_pob_choice: they are hidden from my eyes
  chosen_spanish: han sido ocultas de mis ojos
  alternatives_spanish:
  - están ocultas de mis ojos
  - han quedado ocultas a mis ojos
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica de la cláusula hebrea. 'Han sido ocultas de mis ojos' mantiene la voz pasiva y el marco relacional, aunque 'a mis ojos' sería una alternativa más idiomática.
theological_decisions:
- issue: Rango semántico de בָּאָרֶץ
  english_pob_reading: in the land
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en la tierra
  - en la tierra/país
  rationale: El hebreo admite 'tierra' o 'país/land'. Se eligió 'tierra' por su amplitud y por evitar estrechar indebidamente el horizonte del texto profético. La decisión conserva la tensión entre sentido local y cósmico sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Título divino בֵּאלֹהֵי אָמֵן
  english_pob_reading: the God of Amen / the God of truth
  chosen_spanish_reading: el Dios de Amén
  alternative_spanish_readings:
  - el Dios de la verdad
  - el Dios fiel
  rationale: Se preserva la forma extraña del hebreo para no borrar la singularidad del epíteto. 'Dios de la verdad' es una lectura interpretativa válida, pero la forma principal mantiene la huella léxica de אָמֵן y su resonancia de firmeza/fiabilidad.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El inglés POB fue revisado desde 'the God of Amen' a 'the God of truth' para mayor naturalidad, pero mantuvo en nota la posibilidad literal de 'Amen'. En español se optó deliberadamente por preservar el formante raro 'Amén' en el texto principal, con la alternativa interpretativa recogida en decisiones léxicas y teológicas para no perder la tensión textual.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלֹהִים, conforme al estándar del proyecto.
  - Se eligió 'tierra' para אֶרֶץ como equivalente principal, con nota sobre 'país'.
  - Se mantuvo la imagen reflexiva de 'bendecirse' y 'jurar' sin sustituirla por una paráfrasis más explicativa.
  - El tono es bíblico-digno pero en español moderno, evitando arcaísmos innecesarios.
