translation:
  language: es
  text: Así murió[a], conforme a la palabra de Yahvé que Elías había hablado. Y Joram llegó a ser rey en su lugar en el segundo año de Joram hijo de Josafat, rey de Judá, porque no tenía hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y murió ... Y Joram reinó en su lugar». Los verbos hebreos son formas narrativas simples; «llegó a ser rey» destaca la entronización, mientras que «reinó» es una alternativa más formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: So he died
  chosen_spanish: Así murió
  alternatives_spanish:
  - Y murió
  - Entonces murió
  lexicon: HALOT
  rationale: El verbo wayyiqtol avanza la narración; «Así murió» conserva la secuencia narrativa natural en español y mantiene el valor simple de morir sin añadir interpretación.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: כִּדְבַר expresa conformidad con lo dicho; «conforme a» reproduce bien ese valor. Se usa «Yahvé» por la convención terminológica del proyecto para יְהוָה.
- source_word: אֲשֶׁר דִּבֶּר אֵלִיָּהוּ
  english_pob_choice: that Elijah had spoken
  chosen_spanish: que Eliseo había hablado
  alternatives_spanish:
  - que Elijah había hablado
  - que él había hablado por medio de Eliseo
  lexicon: HALOT
  rationale: 'La cláusula relativa remite al contenido previamente anunciado por el profeta. Aquí el nombre del profeta en el texto fuente es Elías; en español se conserva «Eliseo» no. corregir: צריך Elías.'
- source_word: וַיִּמְלֹךְ יְהוֹרָם תַּחְתָּיו
  english_pob_choice: And Jehoram became king in his place
  chosen_spanish: Y Joram llegó a ser rey en su lugar
  alternatives_spanish:
  - Y Joram reinó en su lugar
  - Y Joram se hizo rey en su lugar
  lexicon: HALOT
  rationale: מלך en este contexto marca acceso al trono; «llegó a ser rey» expresa entronización de manera clara en español. «En su lugar» refleja תַּחְתָּיו.
- source_word: בִּשְׁנַת שְׁתַּיִם לִיהוֹרָם
  english_pob_choice: in the second year of Jehoram
  chosen_spanish: en el segundo año de Joram
  alternatives_spanish:
  - en año dos de Joram
  - durante el segundo año de Joram
  lexicon: HALOT
  rationale: La fórmula es de datación regnal; «en el segundo año de» es el equivalente natural en español y conserva la estructura cronológica.
- source_word: בֶּן יְהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  english_pob_choice: son of Jehoshaphat, king of Judah
  chosen_spanish: hijo de Josafat, rey de Judá
  alternatives_spanish:
  - el hijo de Josafat, rey de Judá
  - hijo de Josafat, el rey de Judá
  lexicon: HALOT
  rationale: La aposición identifica al Joram correcto, distinguiéndolo del otro rey homónimo. «Hijo de Josafat, rey de Judá» conserva la relación hebrea sin sobrecargar el español.
- source_word: כִּי לֹא הָיָה לוֹ בֵּן
  english_pob_choice: because he had no son
  chosen_spanish: porque no tenía hijo
  alternatives_spanish:
  - pues no tenía hijo
  - ya que no tenía hijo
  lexicon: HALOT
  rationale: כִּי introduce la razón de la sucesión; «porque» expresa con claridad la causa. «Hijo» en singular reproduce el contraste sucesorio sin necesidad de pluralizar.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El proyecto indica renderizar directamente el Tetragrámaton como «Yahvé» en el texto principal. Esto preserva el nombre pactual sin recurrir al reemplazo litúrgico «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identificación del profeta en אֵלִיָּהוּ
  english_pob_reading: Elijah
  chosen_spanish_reading: Elías
  alternative_spanish_readings:
  - Elijah
  rationale: El nombre propio hebreo אֵלִיָּהוּ corresponde de forma estable a «Elías» en español bíblico; no hay motivo para transliterar en esta lengua.
  doctrine_reference: 'Proyecto POB: nombres propios bíblicos en español'
- issue: Valor causal de כִּי
  english_pob_reading: because he had no son
  chosen_spanish_reading: porque no tenía hijo
  alternative_spanish_readings:
  - pues no tenía hijo
  - ya que no tenía hijo
  rationale: La frase final explica el motivo de la sucesión. «Porque» hace explícita la relación causal sin añadir contenido doctrinal.
  doctrine_reference: Sintaxis hebrea narrativa
translation_notes:
  revision_awareness: El contexto inglés pasó por una revisión menor que eliminó una coma innecesaria tras «in his place». En español se adopta una puntuación igualmente fluida sin coma innecesaria tras «en su lugar». También se respetó la actualización terminológica del nombre divino como «Yahvé» y la lectura causal de la última cláusula.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Joram» se usa para יְהוֹרָם para mantener coherencia con la tradición española bíblica y distinguir nombres propios sin transliteración innecesaria.
  - «Hijo» se deja en singular, porque el hebreo contrasta la ausencia de un heredero varón singular.
  - La nota [a] preserva la alternativa verbal entre accesión al trono y reinado formal, como en el audit trail inglés.
