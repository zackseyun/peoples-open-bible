  text: Περὶ δὲ τῆς εὐχαριστίας, οὕτως εὐχαριστήσατε· πρῶτον περὶ τοῦ ποτηρίου· Εὐχαριστοῦμέν σοι, Πάτερ ἡμῶν, ὑπὲρ τῆς ἁγίας ἀμπέλου Δαβὶδ τοῦ παιδός σου, ἧς ἐγνώρισας ἡμῖν διὰ Ἰησοῦ τοῦ παιδός σου· σοὶ ἡ δόξα εἰς τοὺς αἰῶνας. Περὶ δὲ τοῦ κλάσματος· Εὐχαριστοῦμέν σοι, Πάτερ ἡμῶν, ὑπὲρ τῆς ζωῆς καὶ γνώσεως, ἧς ἐγνώρισας ἡμῖν διὰ Ἰησοῦ τοῦ παιδός σου· σοὶ ἡ δόξα εἰς τοὺς αἰῶνας. Ὥσπερ ἦν τοῦτο κλάσμα διεσκορπισμένον ἐπάνω τῶν ὀρέων καὶ συναχθὲν ἐγένετο ἕν, οὕτω συναχθήτω σου ἡ ἐκκλησία ἀπὸ τῶν περάτων τῆς γῆς εἰς τὴν σὴν βασιλείαν· ὅτι σοῦ ἐστιν ἡ δόξα καὶ ἡ δύναμις διὰ Ἰησοῦ Χριστοῦ εἰς τοὺς αἰῶνας. Μηδεὶς δὲ φαγέτω μηδὲ πιέτω ἀπὸ τῆς εὐχαριστίας ὑμῶν, ἀλλ' οἱ βαπτισθέντες εἰς ὄνομα Κυρίου· καὶ γὰρ περὶ τούτου εἴρηκεν ὁ Κύριος· Μὴ δῶτε τὸ ἅγιον τοῖς κυσί.
