    issue: «sin mancha» debilita el matiz de ἀμίαντον
    rationale: Aunque no es incorrecto, «sin mancha» puede sonar más moral o figurado. En este contexto de lugar santo preservado de profanación, conviene una expresión que conserve mejor la pureza cultual y la idea de no haber sido contaminado o profanado.
  - severity: low
    issue: «al Señor manifiesto» suena algo poco natural en español
    rationale: Refleja literalmente ἐπιφανῆ, pero en español la colocación es algo tiesa. Aun así, es defendible y no exige adjudicación mayor; puede mantenerse para preservar la decisión léxica del POB.
