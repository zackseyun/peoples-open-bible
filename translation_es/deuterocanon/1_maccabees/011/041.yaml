revisions:
- from: Y Jonatán envió a Demetrio el rey[a], para pedir que expulsara a los de la ciudadela de Jerusalén y a los de las fortalezas; porque estaban combatiendo contra Israel.
  to: Y Jonatán envió a Demetrio el rey, para pedir que expulsara de Jerusalén a los de la ciudadela[a] y a los de las fortalezas; porque estaban combatiendo contra Israel.
  rationale: Se reordenó la frase para que «de Jerusalén» modifique claramente la expulsión, en mejor correspondencia con ἐκβάλῃ ... ἐξ Ἱερουσαλήμ, y se movió el ancla de la nota al término que realmente explica, «ciudadela».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:58:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: Jonatán envía a Demetrio, solicita la expulsión de ciertos ocupantes, y da la razón de que estaban en guerra contra Israel. Sin embargo, «a los de la ciudadela de Jerusalén» introduce una relación posesiva/locativa algo ambigua que puede sonar como si la ciudadela perteneciera a Jerusalén, mientras que el griego distingue mejor «los de la ciudadela» y luego «fuera de Jerusalén». Conviene explicitar la expulsión «de Jerusalén» con la frase completa para preservar mejor ἐκβάλῃ ... ἐξ Ἱερουσαλήμ.'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. La sintaxis general funciona bien. El ajuste principal es estilístico y de precisión espacial: «expulsara de Jerusalén a los de la ciudadela» suena más natural y evita la posible ambigüedad de «la ciudadela de Jerusalén».'
  glossary_alignment: No hay términos del glosario teológico principal en juego. «Ciudadela» para ἄκρα y la nota sobre «Acra» concuerdan con la auditoría inglesa. «Fortalezas» para ὀχυρώματα y «combatiendo contra Israel» son aceptables y fieles.
  issues:
  - severity: medium
    issue: Ambigüedad en «los de la ciudadela de Jerusalén»
    rationale: El griego expresa a «los de la ciudadela» y además el movimiento de expulsarlos «de Jerusalén». En español, «la ciudadela de Jerusalén» puede leerse simplemente como un sintagma nominal fijo, diluyendo la fuerza espacial de ἐξ Ἱερουσαλήμ.
  - severity: low
    issue: La nota [a] está anclada en «el rey» en vez de en «ciudadela»
    rationale: La nota explica ἄκρα/Acra, así que su anclaje debería ir sobre «ciudadela» o la frase correspondiente, no sobre «el rey». Esto mejora la correspondencia entre texto y nota exigida por el proyecto.
  revised_spanish_text: Y Jonatán envió a Demetrio el rey, para pedir que expulsara de Jerusalén a los de la ciudadela[a] y a los de las fortalezas; porque estaban combatiendo contra Israel.
  revised_footnotes:
  - marker: a
    text: O, más específicamente, «los de la Acra», la ciudadela seleúcida en Jerusalén.
    reason: lexical_alternative
  revision_rationale: Se reordenó la frase para que «de Jerusalén» modifique claramente la expulsión, en mejor correspondencia con ἐκβάλῃ ... ἐξ Ἱερουσαλήμ, y se movió el ancla de la nota al término que realmente explica, «ciudadela».
