translation:
  language: es
  text: Abre canales[a] a través de las rocas, y su ojo ve toda cosa preciosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'corrientes' o 'cauces'; el término hebreo puede designar cursos de agua, pero aquí probablemente se refiere a canales excavados en la roca dentro de la imaginería minera del contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'toda cosa valiosa' o 'todo mineral precioso'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצּוּרוֹת
  english_pob_choice: through the rocks
  chosen_spanish: entre las rocas
  alternatives_spanish:
  - a través de las rocas
  - en las rocas
  - por las rocas
  lexicon: HALOT
  rationale: צוּר denota roca dura o peñasco. En español, 'entre las rocas' conserva la imagen del trabajo de abrir paso en terreno rocoso sin sonar demasiado mecánico; mantiene bien el contexto de minería del versículo.
- source_word: יְאֹרִים
  english_pob_choice: channels
  chosen_spanish: canales
  alternatives_spanish:
  - canales de agua
  - corrientes
  - conductos
  lexicon: HALOT
  rationale: El término puede referirse a cursos de agua, canales o cauces, pero aquí el contexto hace pensar en pasajes excavados. 'Canales' conserva la amplitud semántica y funciona naturalmente en español.
- source_word: בִּקֵּעַ
  english_pob_choice: cuts
  chosen_spanish: abre
  alternatives_spanish:
  - corta
  - raja
  - hende
  lexicon: HALOT
  rationale: בקע implica partir, abrir o hender. 'Abre' es idiomático en español para la acción de trazar o formar un paso en la roca, y conserva la idea de crear una vía.
- source_word: יְקָר
  english_pob_choice: precious thing
  chosen_spanish: cosa preciosa
  alternatives_spanish:
  - objeto precioso
  - tesoro precioso
  - cosa valiosa
  lexicon: HALOT
  rationale: יְקָר designa lo precioso o valioso, sin limitarse a mineral o metal. 'Cosa preciosa' mantiene la amplitud del hebreo y refleja la decisión inglesa de no restringirlo a 'ore'.
- source_word: רָאֲתָה עֵינוֹ
  english_pob_choice: his eye sees
  chosen_spanish: su ojo ve
  alternatives_spanish:
  - lo ve
  - su ojo ha visto
  - él ve
  lexicon: HALOT
  rationale: La imagen antropomórfica se conserva mejor con 'su ojo ve'. Evita reducir la expresión a un simple sujeto implícito y respeta el paralelismo poético del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría fue de alta concordancia, por lo que esta redacción sigue de cerca la lectura inglesa aprobada y la evidencia hebrea.
  spanish_consistency_notes:
  - Se mantiene 'canales' para יְאֹרִים conforme a la amplitud léxica documentada.
  - Se conserva la metáfora antropomórfica 'su ojo ve' en lugar de aplanarla a 'él ve'.
  - '''Cosa preciosa'' preserva el alcance general de יְקָר sin forzarlo a ''oro'' o ''mineral''.'
  - La puntuación sigue el ritmo poético español y el sentido unitario del hemistiquio.
