translation:
  language: es
  text: Y tomarás de su sangre y la pondrás sobre sus cuatro cuernos, en las cuatro esquinas de la [a]repisa, y en el borde todo alrededor; así lo purificarás y harás expiación por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la plataforma». El término hebreo se refiere a la estructura, repisa o plataforma que rodea el altar en la visión de Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדָּמוֹ
  english_pob_choice: some of its blood
  chosen_spanish: de su sangre
  alternatives_spanish:
  - de parte de su sangre
  - algo de su sangre
  lexicon: HALOT
  rationale: El partitivo hebreo indica tomar una porción de la sangre, no toda. En español, «de su sangre» conserva naturalmente esa idea sacrificial sin forzar una expresión más pesada.
- source_word: קַרְנֹתָיו
  english_pob_choice: its four horns
  chosen_spanish: sus cuatro cuernos
  alternatives_spanish:
  - sus cuatro salientes
  - sus cuatro puntas
  lexicon: HALOT
  rationale: En el contexto del altar, קֶרֶן designa las proyecciones angulares. «Cuernos» es el equivalente cultual claro y directo en español.
- source_word: פִּנּוֹת
  english_pob_choice: corners
  chosen_spanish: esquinas
  alternatives_spanish:
  - ángulos
  - puntas
  lexicon: HALOT
  rationale: El término nombra las esquinas o extremidades angulares. «Esquinas» es la opción más natural y transparente en español.
- source_word: הָעֲזָרָה
  english_pob_choice: the ledge
  chosen_spanish: plinto
  alternatives_spanish:
  - borde elevado
  - plataforma
  lexicon: HALOT
  rationale: Siguiendo la nota del POB en inglés, el término se refiere a una estructura alrededor del altar en la visión de Ezequiel. «Plinto» comunica mejor en español una base/repisa arquitectónica que «atrio», que sugeriría otra realidad cultual. Se conserva la nota para no borrar la tensión lexical.
- source_word: הַגְּבוּל סָבִיב
  english_pob_choice: the border all around
  chosen_spanish: el borde todo alrededor
  alternatives_spanish:
  - el borde circundante
  - el borde alrededor
  lexicon: HALOT
  rationale: גְּבוּל expresa límite o borde, y סָבִיב intensifica la circunferencia. «El borde todo alrededor» reproduce bien ambos elementos y suena natural en español.
- source_word: וְחִטֵּאתָ אֹתוֹ
  english_pob_choice: so you shall purify it
  chosen_spanish: así lo purificarás
  alternatives_spanish:
  - así lo limpiarás
  - así lo purgarás
  lexicon: HALOT
  rationale: El pi‘el de חטא en contexto sacrificial significa purgar/limpiar ritualmente. «Purificar» mantiene el sentido ritual sin introducir una teoría ajena al pasaje.
- source_word: וְכִפַּרְתָּהוּ
  english_pob_choice: make atonement for it
  chosen_spanish: harás expiación por él
  alternatives_spanish:
  - harás atonación por él
  - lo reconciliarás
  lexicon: HALOT
  rationale: כפר conserva su fuerza cultual de expiación. En español, «hacer expiación» es más preciso y respeta el registro ritual; «expiar» aquí evita reducirlo a una idea meramente subjetiva.
theological_decisions:
- issue: Distinguir los dos verbos rituales finales, חטא y כפר
  english_pob_reading: purify it and make atonement for it
  chosen_spanish_reading: lo purificarás y harás expiación por él
  alternative_spanish_readings:
  - lo limpiarás y expiarás por él
  - lo purgarás y harás atonación por él
  rationale: El hebreo usa dos acciones relacionadas pero no idénticas. Mantener dos verbos distintos en español preserva la secuencia ritual y evita fundir la purificación con la expiación.
  doctrine_reference: Translation philosophy §3, §5
- issue: Verter הָעֲזָרָה sin borrar la ambigüedad arquitectónica del texto
  english_pob_reading: the ledge
  chosen_spanish_reading: plinto
  alternative_spanish_readings:
  - repisa
  - plataforma
  rationale: La nota inglesa aclara que no se trata del patio del templo sino de una estructura alrededor del altar. «Plinto» intenta comunicar esa pieza arquitectónica sin convertirla en una explicación interpretativa cerrada.
  doctrine_reference: Nota lexical POB sobre הָעֲזָרָה / settle
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «rim» por «border» para acercarse más al término de límite/perímetro. En español se refleja con «borde todo alrededor», manteniendo la misma precisión lexical. También se conserva la distinción entre la estructura del altar (הָעֲזָרָה) y el borde periférico (הַגְּבוּל סָבִיב) sin fusionarlas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - Se mantiene «expiación» para כפר, coherente con el registro cultual del POB.
  - Se preserva la distinción entre una estructura del altar y su borde periférico, en línea con la nota inglesa sobre הָעֲזָרָה.
  - El pronombre final «él» sigue el referente gramatical del altar implícito en el texto, como en el inglés POB.
