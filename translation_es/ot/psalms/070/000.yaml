translation:
  language: es
  text: Al director del coro. De David. Para memoria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Para memorial', 'Para hacer recordar', 'Para traer a la memoria', o posiblemente una nota litúrgica relacionada con la memoria memorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al maestro de canto
  - Al músico principal
  lexicon: HALOT
  rationale: En las superscripciones de los Salmos, el término señala al responsable musical/litúrgico. 'Al director del coro' comunica esa función de forma natural en español y preserva el valor direccional del ל de la fórmula.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en encabezados salmódicos puede indicar autoría, dedicación o asociación. 'De David' conserva esa ambigüedad mejor que una opción más interpretativa.
- source_word: לְהַזְכִּיר
  english_pob_choice: For remembrance
  chosen_spanish: Para recuerdo
  alternatives_spanish:
  - Para memorial
  - Para hacer recordar
  - Para traer a la memoria
  lexicon: HALOT
  rationale: El infinitivo causativo de זכר expresa la idea de hacer recordar o recordar. En una superscripción, 'para recuerdo' mantiene la función breve y nominal del hebreo sin decidir si el énfasis recae en Dios, en el adorador o en una nota litúrgica.
theological_decisions:
- issue: Función de לְהַזְכִּיר en la superscripción
  english_pob_reading: A purpose label rendered neutrally as 'For remembrance'
  chosen_spanish_reading: Una etiqueta de propósito rendida neutralmente como 'Para recuerdo'
  alternative_spanish_readings:
  - Para memorial
  - Para traer a la memoria
  - Para el recuerdo del adorador
  rationale: El hebreo no especifica de quién es el recuerdo ni si se trata de una instrucción litúrgica. La traducción debe preservar esa tensión y no resolverla con una interpretación teológica o cultual más estrecha.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente que corrigió la posición del marcador: el indicador de nota se coloca al final de la cláusula correspondiente a לְהַזְכִּיר, no sobre ''director del coro''.'
  spanish_consistency_notes:
  - Se mantiene 'David' como forma propia del nombre, sin añadir explicaciones no presentes en la fuente.
  - '''Al director del coro'' sigue el valor funcional de la superscripción y evita una formulación eclesiástica demasiado específica.'
  - '''Para recuerdo'' preserva la concisión nominal del hebreo y la ambigüedad auditada en el texto fuente.'
