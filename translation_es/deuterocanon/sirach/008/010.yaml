translation:
  language: es
  text: No abandones el discurso de los sabios[a][b], y dedícate a sus enigmas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aplícate a sus enigmas». El hebreo usa aquí un verbo poco común; el sentido es una implicación activa en los dichos difíciles de los sabios.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego de este versículo dice en cambio: «No avives las brasas de un pecador, no sea que te quemes en el fuego de su llama». Esto refleja una tradición textual sustancialmente diferente del hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּטֹּשׁ
  english_pob_choice: Do not abandon
  chosen_spanish: No abandones
  alternatives_spanish:
  - No dejes
  - No abandones
  - No desampares
  lexicon: HALOT
  rationale: נָטַשׁ expresa dejar, abandonar o apartarse deliberadamente. «No abandones» comunica bien la fuerza de una decisión consciente y suena natural en español contemporáneo.
- source_word: שִׂיחַת
  english_pob_choice: the discourse
  chosen_spanish: el discurso
  alternatives_spanish:
  - la conversación
  - la charla
  - la enseñanza
  lexicon: HALOT
  rationale: שִׂיחָה puede referirse a habla, discurso o conversación reflexiva. Aquí, junto con «los sabios» y la segunda cola sobre sus enigmas, «discurso» conserva el tono de instrucción sapiencial sostenida.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los sabios varones
  - los hombres sabios
  - los sabios
  lexicon: HALOT
  rationale: El hebreo plural masculino funciona como clase. «Los sabios» mantiene la referencia colectiva sin añadir una especificación de género innecesaria en español.
- source_word: וּבְחִידֹתֵיהֶם
  english_pob_choice: with their riddles
  chosen_spanish: de sus enigmas
  alternatives_spanish:
  - con sus enigmas
  - en sus enigmas
  - con sus acertijos
  lexicon: HALOT
  rationale: חִידָה puede ser enigma, acertijo o dicho oscuro. «Enigmas» es un término digno y claro; la preposición «de» se ajusta mejor al español con «discurso» que un calco como «con».
- source_word: הִתְרַפֵּשׂ
  english_pob_choice: occupy yourself
  chosen_spanish: ocúpate
  alternatives_spanish:
  - aplícate
  - ocúpate
  - dedícate
  lexicon: HALOT
  rationale: El verbo reflexivo es raro y algo incierto; el audit trail inglés ya opta por la idea de involucrarse activamente. «Ocúpate» conserva la exhortación a un compromiso activo y formal.
translation_notes:
  revision_awareness: 'El texto hebreo preservado en la fuente principal difiere del paralelo griego, que en esta ocasión pertenece a otra tradición textual: «No enciendas las brasas del pecador, no sea que te abrases en el fuego de su llama». La redacción española sigue el hebreo de Kahana como texto base, y la diferencia griega se registra como variante textual relevante en la tradición de Sirácida.'
  spanish_consistency_notes:
  - Se usó «sabios» para חֲכָמִים, coherente con el uso sapiential y más natural que «sages» o «hombres sabios».
  - «Enigmas» refleja bien חִידֹתֵיהֶם sin forzar un matiz meramente lúdico de «acertijos».
  - No se incorporó la lectura griega al texto principal porque la fuente hebrea está marcada con alta confianza y validación de acuerdo; la variante se documenta solo en la nota de revisión.
