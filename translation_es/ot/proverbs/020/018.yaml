review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: מַחֲשָׁבוֹת = «planes», בְּעֵצָה con valor instrumental, תִכּוֹן = «se establecen», y עֲשֵׂה מִלְחָמָה como modismo de emprender/librar guerra. También preserva correctamente el giro militar de וּבְתַחְבֻּלוֹת mediante «estrategia». Sin embargo, las notas no están del todo alineadas con la auditoría inglesa: la nota [a] introduce alternativas nuevas no preservadas en el POB inglés y la nota [b] debería reflejar más directamente las alternativas documentadas («dirección hábil», «dirección sabia») sin sobreexpandir.'
  spanish_quality_summary: 'El español es claro y natural. No obstante, «haz la guerra» suena algo menos idiomático y más literal en español eclesial/general que «libra la guerra» o «haz guerra». Dado que el inglés POB ya optó por un equivalente idiomático («wage war»), en español conviene una formulación igualmente idiomática: «libra la guerra». Además, las notas pueden simplificarse para evitar redundancia y ajustarse mejor a la función de aclarar alternativas léxicas reales.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión «estrategia» concuerda con la revisión inglesa final para תַחְבֻּלוֹת. «Consejo» mantiene bien el registro sapiencial.
  issues:
  - severity: medium
    issue: «haz la guerra» es una elección algo rígida y menos idiomática en español
    rationale: El hebreo usa un modismo equivalente a ‘hacer/librar guerra’. Así como el inglés evitó el literalismo con ‘wage war’, el español también debe evitar una expresión algo torpe cuando existe «librar la guerra», que conserva fuerza y naturalidad.
  - severity: low
    issue: La nota [a] añade alternativas no documentadas en el POB inglés
    rationale: La auditoría inglesa no incluyó nota para תִכּוֹן; añadir una nota aquí no es necesario y puede sobrecargar el verso sin resolver una ambigüedad nueva en español.
  - severity: low
    issue: La nota [b] puede alinearse mejor con las alternativas documentadas
    rationale: El inglés preservó explícitamente ‘with strategy’ y como alternativas ‘with wise direction’ / ‘steering’. La nota española debe reflejar esas opciones de manera más directa.
  revised_spanish_text: Los planes se establecen por consejo; libra la guerra con estrategia[a].
