translation:
  language: es
  text: 'Él se alimenta de cenizas[a]; un corazón engañado lo ha desviado, y no puede librarse a sí mismo ni decir[b]: «¿No hay una mentira en mi mano derecha?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se apacienta de cenizas». El hebreo conserva viva la metáfora de alimentarse o pastar.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «librar su נפשׁ»; según el contexto puede significar «a sí mismo», «su vida» o «su alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעֶה
  english_pob_choice: feeds on
  chosen_spanish: se alimenta de
  alternatives_spanish:
  - pacienta con
  - pastorea
  - se nutre de
  lexicon: HALOT
  rationale: El participio expresa la imagen concreta de pastorear/alimentarse. En español, «se alimenta de» conserva la metáfora sin volverla extraña, y mantiene el matiz de consumir algo vano o inútil.
- source_word: אֵפֶר
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - polvo
  lexicon: HALOT
  rationale: «Ceniza» es el equivalente normal y preciso del sustantivo hebreo en este contexto satírico; además armoniza con la imagen de lo quemado y lo inútil.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  lexicon: HALOT
  rationale: «Corazón» preserva el término antropológico hebreo que incluye mente, voluntad y afectos. En español bíblico actual es claro y no reduce indebidamente el alcance cognitivo del hebreo.
- source_word: הוּתַל
  english_pob_choice: deceived
  chosen_spanish: engañado
  alternatives_spanish:
  - deludido
  - seducido
  lexicon: HALOT
  rationale: La forma pasiva indica un estado de engaño. «Engañado» comunica de modo idiomático la pasividad del corazón sin perder la fuerza moral del término.
- source_word: הִטָּהוּ
  english_pob_choice: has led him astray
  chosen_spanish: lo ha desviado
  alternatives_spanish:
  - lo ha extraviado
  - lo ha apartado
  lexicon: HALOT
  rationale: El verbo causativo de נטה expresa apartar/desviar de la dirección correcta. «Lo ha desviado» preserva la idea de apartarlo del camino verdadero; además, en español mantiene bien la relación causal con el «corazón engañado».
- source_word: נַפְשׁוֹ
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - su vida
  - su alma
  lexicon: HALOT
  rationale: En este contexto, נֶפֶשׁ se refiere a la persona entera o a la propia vida, no a un concepto técnico de «alma». «A sí mismo» reproduce con naturalidad el valor reflexivo que la POB inglesa quiso conservar con «himself».
- source_word: יֹאמַר
  english_pob_choice: or say
  chosen_spanish: ni decir
  alternatives_spanish:
  - ni decirse
  - ni afirmar
  lexicon: HALOT
  rationale: El paralelo negativo continúa la incapacidad del idólatra. En español, «ni decir» enlaza bien con el infinitivo anterior y conserva la fluidez de la cláusula sin añadir contenido ajeno.
- source_word: הֲלוֹא
  english_pob_choice: Is there not
  chosen_spanish: ¿No hay
  alternatives_spanish:
  - ¿Acaso no hay?
  - ¿No es verdad que hay?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica con respuesta afirmativa esperada. «¿No hay» conserva esa forma interrogativa directa y el tono de autoexamen.
- source_word: שֶׁקֶר
  english_pob_choice: a lie
  chosen_spanish: una mentira
  alternatives_spanish:
  - falsedad
  - engaño
  lexicon: HALOT
  rationale: Aquí el sustantivo señala falsedad o cosa ilusoria; «una mentira» transmite la acusación con fuerza y naturalidad en español.
- source_word: בִּימִינִי
  english_pob_choice: in my right hand
  chosen_spanish: en mi mano derecha
  alternatives_spanish:
  - a mi derecha
  - junto a mi mano derecha
  lexicon: HALOT
  rationale: La lectura literal preserva la imagen vívida del ídolo sostenido físicamente. Se mantiene el posesivo de primera persona porque forma parte de la cita interior del hablante.
theological_decisions:
- issue: Alcance de נַפְשׁוֹ
  english_pob_reading: Rendered as 'himself' rather than 'his soul' in the main text
  chosen_spanish_reading: «a sí mismo» en lugar de «su alma»
  alternative_spanish_readings:
  - su alma
  - su vida
  rationale: El contexto describe la incapacidad del idólatra para rescatarse del engaño, no una afirmación doctrinal técnica sobre el alma inmaterial. «A sí mismo» conserva el valor reflexivo del hebreo y evita cargar el texto con una precisión teológica posterior que aquí no está en primer plano.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y coincide con la revisión más reciente, que no introdujo cambios respecto del borrador previo. Se mantiene la metáfora de alimentarse/pastorear y la ambigüedad de נֶפֶשׁ en forma reflexiva.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Corazón» se usa para לֵב conforme al valor antropológico hebreo.
  - «Mentira» traduce שֶׁקֶר con el mismo vigor acusatorio que «lie» en la POB inglesa.
  - La construcción «no puede librarse a sí mismo» refleja la imposibilidad del sujeto de rescatarse, sin convertir נֶפֶשׁ en un término doctrinalmente técnico.
