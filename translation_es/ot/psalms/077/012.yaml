translation:
  language: es
  text: Recordaré los hechos de Yah[a], porque recordaré tus maravillas de antaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recontaré los hechos de Yah». El verbo puede implicar recordar en voz alta o hacer mención.
    reason: lexical_alternative
  - marker: b
    text: O «desde tiempos antiguos» o «hace mucho tiempo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַזְכִּיר
  english_pob_choice: I will remember
  chosen_spanish: haré memoria de
  alternatives_spanish:
  - recordaré
  - haré mención de
  - recontaré
  lexicon: HALOT
  rationale: El hiphil de זכר puede significar recordar, hacer memoria, mencionar o recountar. En español, «haré memoria de» conserva bien la acción deliberada de rememorar sin forzar una proclamación pública. También mantiene el paralelismo con el segundo miembro, que vuelve a usar el mismo verbo de recordar.
- source_word: מַעַלְלֵי
  english_pob_choice: deeds
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  - las obras realizadas
  lexicon: HALOT
  rationale: מַעֲלָלִים designa acciones o hechos realizados. «Obras» es natural en español bíblico contemporáneo y funciona bien con el tono poético del verso. Evita la rigidez de «actos» y conserva el sentido de acciones concretas de Yah.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa la forma breve y poética יָהּ, no el tetragrámaton completo. Por eso se conserva «Yah» en español, para no aplanar la distinción léxica ni sustituirla por la forma habitual de YHWH.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Aquí introduce la explicación o respaldo de la primera cola. «Porque» expresa de manera clara la relación causal/explanatoria entre los dos miembros del verso en español natural.
- source_word: אֶזְכְּרָה
  english_pob_choice: I will remember
  chosen_spanish: recordaré
  alternatives_spanish:
  - me acordaré
  - haré memoria
  - volveré a recordar
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución. «Recordaré» transmite bien esa determinación en español moderno. Se prefiere una forma verbal directa para conservar la fuerza del paralelismo con la primera cola.
- source_word: מִקֶּדֶם
  english_pob_choice: from of old
  chosen_spanish: de antaño
  alternatives_spanish:
  - desde antiguo
  - desde tiempos remotos
  - de tiempos antiguos
  lexicon: HALOT
  rationale: La expresión señala antigüedad o tiempos pasados. «De antaño» es breve, poética y fiel al tono del hebreo, sin exagerar hacia «desde el principio».
- source_word: פִּלְאֶךָ
  english_pob_choice: your wonders
  chosen_spanish: tus maravillas
  alternatives_spanish:
  - tus prodigios
  - tus hechos maravillosos
  - tus obras maravillosas
  lexicon: HALOT
  rationale: פלא denota maravilla, prodigio o acto admirable. «Maravillas» es la opción más natural y tradicional en español para este campo semántico, y conserva el paralelismo con «obras» en la primera cola.
theological_decisions:
- issue: Preservar la forma breve del nombre divino יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El hebreo emplea la forma poética corta del nombre divino. Traducirla como «Yahvé» o «el SEÑOR» ocultaría la distinción textual entre יָהּ y יְהוָה. Mantener «Yah» en español respeta la huella original y el cuidado lexical del POB inglés.
  doctrine_reference: Translation philosophy §1; terminología POB para el nombre divino
- issue: El verbo de memoria en paralelismo poético
  english_pob_reading: I will remember ... for I will remember
  chosen_spanish_reading: Haré memoria ... porque recordaré
  alternative_spanish_readings:
  - Recordaré ... porque recordaré
  - Haré memoria ... pues haré memoria
  rationale: El hebreo repite la raíz זכר en ambas mitades del verso. La traducción debe dejar visible esa repetición. «Haré memoria» / «recordaré» conserva la resonancia sin volver el verso mecánico, y mantiene el énfasis deliberado del hablante.
  doctrine_reference: Poetic parallelism; lexical consistency
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que no introdujo cambios. La coincidencia general fue alta; la principal tensión restante fue cómo reflejar en español la repetición de זכר y la forma breve divina יָהּ sin perder naturalidad.
  spanish_consistency_notes:
  - Se conserva «Yah» para יָהּ, no «Yahvé» ni «el SEÑOR».
  - Se mantiene la repetición semántica del verbo de memoria en ambas colas del verso.
  - «Maravillas» se usa para פִּלְאֶךָ por su claridad y registro bíblico natural.
  - El orden del verso sigue de cerca el paralelismo hebreo sin calco sintáctico rígido.
