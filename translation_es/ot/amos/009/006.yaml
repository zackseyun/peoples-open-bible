translation:
  language: es
  text: El que construye sus aposentos altos en los cielos[a], y funda su bóveda sobre la tierra[b]; el que llama a las aguas del mar y las derrama sobre la superficie de la tierra, Yahvé es su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ascensos» o «sus escalones» para «sus aposentos altos». El término hebreo puede denotar alturas, escaleras o habitaciones superiores; aquí probablemente alude a estructuras celestiales elevadas.
    reason: lexical_alternative
  - marker: b
    text: O «su banda», «su estructura» o «su cúpula» para «su bóveda». La palabra hebrea se refiere a algo atado o unido, y aquí se usa en una imagen de arquitectura cósmica.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹנֶה
  english_pob_choice: He who builds
  chosen_spanish: Él que construye
  alternatives_spanish:
  - el que construye
  - el que edifica
  lexicon: HALOT
  rationale: El participio con artículo funciona sustantivamente como descripción de acción característica. En español, «el que construye» mantiene el valor descriptivo; «Él que» se usa aquí para sostener el tono doxológico del verso, aunque «el que» también es viable.
- source_word: מַעֲלוֹתָיו
  english_pob_choice: his upper chambers
  chosen_spanish: sus aposentos altos
  alternatives_spanish:
  - sus ascensos
  - sus escalones
  - sus cámaras altas
  lexicon: HALOT
  rationale: El término puede referirse a alturas, subidas, escalones o habitaciones superiores. En este contexto cósmico conviene una expresión arquitectónica natural en español que conserve la imagen de estructura elevada; «aposentos altos» comunica mejor que un calco como «ascensos».
- source_word: וַאֲגֻדָּתוֹ
  english_pob_choice: his vault
  chosen_spanish: su bóveda
  alternatives_spanish:
  - su banda
  - su estructura
  - su cúpula
  lexicon: HALOT
  rationale: El vocablo alude a algo atado o reunido, usado aquí para la arquitectura del cosmos. «Bóveda» mantiene la imagen de una estructura envolvente y elevada sin forzar una explicación moderna.
- source_word: יְסָדָהּ
  english_pob_choice: has founded
  chosen_spanish: ha asentado
  alternatives_spanish:
  - ha fundado
  - ha establecido
  - ha echado sus fundamentos
  lexicon: HALOT
  rationale: El verbo יסד expresa fundar o establecer. «Ha asentado» conserva la idea de colocar firmemente sobre la tierra y suena natural en español junto con la imagen de «bóveda».
- source_word: הַקֹּרֵא
  english_pob_choice: who calls for
  chosen_spanish: el que llama a
  alternatives_spanish:
  - el que convoca
  - el que llama sobre
  lexicon: HALOT
  rationale: El participio paralelo al anterior describe otra acción característica de Yahvé. Con לְ más «las aguas del mar», «llama a» expresa la idea de convocar o hacer venir sin sobreespecificar.
- source_word: לְמֵי הַיָּם
  english_pob_choice: the waters of the sea
  chosen_spanish: las aguas del mar
  alternatives_spanish:
  - las aguas del mar
  - las aguas del océano
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de manera directa y natural. «Mar» conserva el registro bíblico habitual y evita ampliar indebidamente el referente.
- source_word: וַיִּשְׁפְּכֵם
  english_pob_choice: and pours them out
  chosen_spanish: y las derrama
  alternatives_spanish:
  - y las vacía
  - y las vierte
  lexicon: HALOT
  rationale: שפך significa derramar o verter. «Las derrama» mantiene la imagen vívida y es idiomático en español; el referente puede entenderse como las aguas convocadas, sin necesidad de aclaración adicional.
- source_word: עַל פְּנֵי הָאָרֶץ
  english_pob_choice: upon the face of the earth
  chosen_spanish: sobre la superficie de la tierra
  alternatives_spanish:
  - sobre la faz de la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo común. «Sobre la superficie de la tierra» conserva la imagen espacial con un español claro; «faz» sería posible pero más arcaizante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según el estándar español del proyecto, se rinde como «Yahvé» para preservar el nombre divino sin sustituirlo por un título.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  lexicon: HALOT
  rationale: La cláusula nominal final se vierte de forma directa y solemne. «Es su nombre» conserva el cierre identificatorio del verso.
theological_decisions:
- issue: Imagen cósmica de construcción en מַעֲלוֹתָיו / וַאֲגֻדָּתוֹ
  english_pob_reading: Render with architectural/cosmic imagery ('upper chambers' / 'vault') without forcing a modern scientific description.
  chosen_spanish_reading: «aposentos altos» / «bóveda» conservan la imaginería arquitectónica y cósmica sin convertir el verso en una descripción científica moderna.
  alternative_spanish_readings:
  - «ascensos» / «banda»
  - «cámaras altas» / «cúpula»
  rationale: El pasaje exalta a Yahvé como creador y soberano mediante imágenes de arquitectura celestial. La traducción debe sostener esa imaginería antigua y no neutralizarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el nombre propio del pacto. En español, «Yahvé» respeta el proyecto de no ocultar el nombre bajo un título genérico.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el auditorio de revisión más reciente: el estado indica alta concordancia y sin cambios requeridos en la pasada más reciente. La redacción española sigue de cerca la decisión lexical y teológica ya auditada en el inglés, especialmente en las dos imágenes cosmológicas y en el nombre divino.'
  spanish_consistency_notes:
  - 'Se mantiene el orden retórico del verso: descripción de construcción, asentamiento, llamado a las aguas y derramamiento sobre la tierra.'
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - «Aposentos altos» y «bóveda» preservan el paralelismo imagístico sin introducir términos técnicos ajenos al registro bíblico.
  - Los referentes pronominales («sus», «las») quedan claros por el contexto inmediato y por el paralelismo verbal.
