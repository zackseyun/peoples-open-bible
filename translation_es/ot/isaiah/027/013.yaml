translation:
  language: es
  text: Y en aquel día se tocará una gran trompeta[a], y vendrán los que perecían[b] en la tierra de Asiria y los que habían sido expulsados[c] en la tierra de Egipto, y adorarán[d] a Yahvé en el monte santo, en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «shofar» o «cuerno de carnero».
    reason: lexical_alternative
  - marker: b
    text: O «los que estaban perdidos».
    reason: lexical_alternative
  - marker: c
    text: O «los desterrados» o «los expulsados».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «se postrarán» o «se inclinarán en adoración».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en ese tiempo
  lexicon: HALOT
  rationale: Conserva la fórmula profética temporal con naturalidad en español y mantiene el carácter solemne sin volverla arcaica.
- source_word: יִתָּקַע בְּשׁוֹפָר גָּדוֹל
  english_pob_choice: a great trumpet will be blown
  chosen_spanish: se tocará un gran cuerno
  alternatives_spanish:
  - se hará sonar un gran shofar
  - se tocará una gran trompeta
  lexicon: HALOT
  rationale: שׁוֹפָר designa el instrumento de cuerno; 'cuerno' conserva mejor el referente concreto que 'trompeta'. 'Se tocará' refleja el pasivo impersonal del hebreo sin forzar el agente.
- source_word: הָאֹבְדִים
  english_pob_choice: those who were perishing
  chosen_spanish: los que estaban pereciendo
  alternatives_spanish:
  - los que se perdían
  - los perdidos
  lexicon: HALOT
  rationale: El participio comunica un estado en curso; 'estaban pereciendo' preserva la fuerza verbal y evita resolver prematuramente el matiz entre 'perderse' y 'destruirse'.
- source_word: בְּאֶרֶץ אַשּׁוּר
  english_pob_choice: in the land of Assyria
  chosen_spanish: en la tierra de Asiria
  alternatives_spanish:
  - en Asiria
  lexicon: HALOT
  rationale: Se conserva 'tierra' porque está explícita en el hebreo y añade concreción geográfica.
- source_word: וְהַנִּדָּחִים
  english_pob_choice: those who were driven away
  chosen_spanish: los que habían sido expulsados
  alternatives_spanish:
  - los desterrados
  - los que habían sido alejados
  lexicon: HALOT
  rationale: נדח expresa ser echado fuera o expulsado; 'habían sido expulsados' preserva la pasividad y el sentido de exilio. 'Desterrados' sería posible, pero introduce un matiz más técnico que el hebreo no exige aquí.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se mantiene la misma decisión que con Asiria para reflejar la concreción del texto.
- source_word: וְהִשְׁתַּחֲו֧וּ
  english_pob_choice: will come and worship
  chosen_spanish: adorarán
  alternatives_spanish:
  - se postrarán
  - se inclinarán en adoración
  lexicon: HALOT
  rationale: El gesto físico de postrarse está presente, pero con Yahvé el acto se entiende como adoración; 'adorarán' comunica bien el sentido religioso en español, mientras la nota conserva la alternativa literal.
- source_word: לַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  lexicon: Project default
  rationale: 'Se sigue el estándar del proyecto para YHWH: ''Yahvé'', en vez de la convención de ocultamiento con ''SEÑOR''.'
- source_word: בְּהַר הַקֹּדֶשׁ
  english_pob_choice: on the holy mountain
  chosen_spanish: en el monte santo
  alternatives_spanish:
  - sobre el monte santo
  - en el monte de santidad
  lexicon: HALOT
  rationale: '''Monte santo'' reproduce de forma natural la referencia a Sion como lugar sagrado; ''en'' refleja mejor la ubicación que ''sobre'' en español.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español, con la preposición natural correspondiente.
theological_decisions:
- issue: Preservación de la imagen de reunión/restauración futura
  english_pob_reading: Retain the prophetic image of a future regathering from Assyria and Egypt without specifying whether it is exclusively historical return, typological restoration, or final eschatological ingathering.
  chosen_spanish_reading: Mantener la imagen profética de una reunión futura desde Asiria y Egipto sin precisar si se trata solo de un retorno histórico, de una restauración tipológica o de una recolección escatológica final.
  alternative_spanish_readings:
  - Restringirlo a un retorno histórico de los exiliados
  - Restringirlo a una reunión escatológica final
  rationale: El texto conserva una tensión deliberada en el horizonte profético; la traducción no debe cerrarla indebidamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Forma reverencial del nombre divino
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto establece Yahvé como equivalente principal de YHWH; se evita el ocultamiento del nombre detrás de una mayúscula reverencial.
  doctrine_reference: 'Contested terms table: יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió la redacción de los participios a formas más naturales («those who were perishing», «those who were driven away») sin alterar el valor participial. La traducción española conserva ese aspecto verbal con construcciones progresivas/perfectivas equivalentes. También se corrigió la referencia a la nota del cuerno para que el marcador [a] aparezca exactamente en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto.
  - Se mantiene 'tierra de' para Asiria y Egipto porque el hebreo lo explicita.
  - '''Monte santo'' se conserva como sintagma fijo y no se sustituye por ''monte de santidad''.'
  - '''Adorarán'' resume el gesto de postración sin perder el contexto cultual; la nota preserva la alternativa literal.'
