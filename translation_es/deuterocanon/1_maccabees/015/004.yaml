review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: voluntad personal («quiero»), salida con desplazamiento territorial, propósito hostil contra los devastadores, y doble descripción del daño causado a la tierra y a las ciudades. Sin embargo, «a recorrer la tierra» introduce un matiz algo más libre y exploratorio que ἐκβῆναι κατὰ τὴν χώραν; una formulación como «salir por la tierra» o «salir por el territorio» conserva mejor el movimiento por la región sin añadir la idea de recorrerla deliberadamente. Además, el inglés auditado preserva «pursue» como opción principal, y el español «ir contra» se apoya en la nota pero se aleja innecesariamente de ese valor principal.'
  spanish_quality_summary: El español es claro y legible, con registro digno y natural. «Han asolado muchas ciudades en el reino» funciona bien. No obstante, «salir a recorrer la tierra» suena un poco interpretativo, y la repetición de «tierra» puede mantenerse mejor si se ajusta la primera instancia a «territorio». También conviene preferir «perseguir» como verbo principal por mayor precisión semántica y mejor correspondencia con la decisión POB documentada.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones léxicas clave son en general adecuadas. «Reino», «devastado» y «asolado» están bien alineados con el griego y el audit trail. La principal desalineación está en μετέλθω, donde el valor principal documentado es «pursue» y en español debe representarse mejor con «perseguir», dejando «proceder contra / castigar» en nota como alternativa.
  issues:
  - severity: medium
    issue: «a recorrer la tierra» sobreinterpreta κατὰ τὴν χώραν
    rationale: El griego expresa salida y movimiento por el territorio, no necesariamente la idea más activa de ‘recorrer’. «Por el territorio» o «por la tierra» conserva mejor la amplitud semántica y coincide con la nota léxica.
  - severity: medium
    issue: «para ir contra» debilita la correspondencia con μετέλθω como opción principal
    rationale: Aunque la nota admite «proceder contra» o «castigar», la decisión principal del POB inglés es «pursue». En español, «perseguir» mantiene mejor ese valor y sigue dejando las alternativas en la nota.
  - severity: low
    issue: La repetición de «tierra» en dos funciones cercanas puede sonar menos precisa
    rationale: Usar «territorio» en la primera frase ayuda a distinguir el movimiento espacial de la referencia posesiva «nuestra tierra», sin perder fidelidad a χώρα.
  revised_spanish_text: Pero yo quiero salir por el territorio[a], para perseguir a los que han devastado nuestra tierra y han asolado muchas ciudades en el reino[b].
