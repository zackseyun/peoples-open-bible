translation:
  language: es
  text: Si un hombre roba un buey o una oveja[a] y los degüella o los vende, restituirá[b] cinco reses por el buey y cuatro ovejas por la oveja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שֶׂה puede designar de manera más amplia una cabeza de ganado menor, incluida una oveja o una cabra; aquí se traduce «oveja» porque la cláusula de restitución con «cuatro ovejas» hace más natural esa opción en español.
    reason: lexical_alternative
  - marker: b
    text: O «pagará». El verbo hebreo puede llevar el sentido jurídico más pleno de hacer restitución o pagar compensación.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce la cláusula casuística de una ley. En español jurídico y bíblico, 'Si' reproduce con naturalidad la estructura condicional del hebreo.
- source_word: יִגְנֹב
  english_pob_choice: steals
  chosen_spanish: roba
  alternatives_spanish:
  - hurta
  - toma por robo
  lexicon: HALOT
  rationale: גנב en contexto legal se expresa de forma directa con 'robar'. Es el verbo más natural y preciso en español para el acto ilícito.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino genérico. 'Un hombre' conserva esa forma representativa sin neutralizar indebidamente el sujeto.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - ganado
  lexicon: HALOT
  rationale: שׁוֹר designa un bovino de labor o adulto. 'Buey' es una opción estable y más natural en español bíblico que 'toro', que puede sonar demasiado sexoespecífico.
- source_word: שֶׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - animal menor
  lexicon: HALOT
  rationale: Aunque שֶׂה puede abarcar ovino o caprino, la cláusula paralela de restitución con צֹאן favorece una traducción concreta y natural. 'Oveja' funciona bien en español, y se mantiene la cohesión con la compensación final.
- source_word: וּטְבָחוֹ
  english_pob_choice: and slaughters it
  chosen_spanish: y la degüella
  alternatives_spanish:
  - y la sacrifica
  - y la mata
  lexicon: HALOT
  rationale: טבח implica matar por degüello o faena, no simple matar. 'Degüella' preserva mejor la especificidad de la acción en el marco legal de la venta de animales robados.
- source_word: מְכָרוֹ
  english_pob_choice: or sells it
  chosen_spanish: o la vende
  alternatives_spanish:
  - o la ha vendido
  lexicon: HALOT
  rationale: מכר con sufijo 3ms es una acción transitiva simple. 'La vende' conserva el estilo legal condicional y fluye naturalmente en español.
- source_word: חֲמִשָּׁה בָקָר
  english_pob_choice: five cattle
  chosen_spanish: cinco reses
  alternatives_spanish:
  - cinco cabezas de ganado
  - cinco bovinos
  lexicon: HALOT
  rationale: בקר es un colectivo para ganado bovino. 'Reses' comunica bien la cantidad contada sin forzar 'oxen' o un sexo animal específico, y evita sonar demasiado técnico.
- source_word: יְשַׁלֵּם
  english_pob_choice: he shall repay
  chosen_spanish: compensará
  alternatives_spanish:
  - restituirá
  - pagará
  lexicon: HALOT
  rationale: En contexto jurídico, שלם incluye la idea de pago reparador o restitución. 'Compensará' expresa bien la finalidad legal sin perder el sentido de resarcimiento.
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  lexicon: HALOT
  rationale: La preposición marca sustitución o equivalencia compensatoria. En español, 'por' en este tipo de fórmula restitutiva es claro y natural, manteniendo la relación de reemplazo.
- source_word: וְאַרְבַּע צֹאן
  english_pob_choice: and four sheep
  chosen_spanish: cuatro ovejas
  alternatives_spanish:
  - cuatro animales de rebaño
  - cuatro reses menores
  lexicon: HALOT
  rationale: צֹאן designa ganado menor en conjunto, pero el paralelismo con 'oveja' permite una restitución concreta y coherente en español. 'Ovejas' mantiene la naturalidad de la fórmula.
theological_decisions:
- issue: Alcance legal de יְשַׁלֵּם
  english_pob_reading: he shall repay
  chosen_spanish_reading: compensará
  alternative_spanish_readings:
  - restituirá
  - pagará
  rationale: No se trata de un pago genérico, sino de una reparación legal por el robo y la disposición del animal. 'Compensará' deja visible el sentido de resarcimiento sin sobrecargar el verso.
  doctrine_reference: Lex talionis / restitución en la legislación del pacto
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que prefirió 'five cattle' frente a una expresión más perifrástica. Por eso se eligió 'cinco reses' / 'por el buey' para mantener una formulación directa y formal en español, sin perder el sentido colectivo de בקר ni la estructura restitutiva del hebreo.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o equivalentes porque el versículo no contiene el nombre divino.
  - Se mantuvo una sintaxis casuística simple ('Si...') propia de la ley.
  - '''Buey'' y ''reses'' preservan la diferencia entre el animal robado singular y la compensación colectiva.'
  - Las notas a y b están ancladas explícitamente en el texto con [a][b].
