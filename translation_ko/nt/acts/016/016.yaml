translation:
  language: ko
  text: 우리가 기도처로 가다가, 점치는 영이 들린 한 여종이 우리를 만났습니다. 그 여종은 점을 쳐서 그의 주인들에게 많은 이익을 가져다주고 있었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα πύθωνα
  english_pob_choice: python spirit
  chosen_korean: 점치는 영
  alternatives_korean:
  - 파이톤 영
  - 점신(占神)
  lexicon: BDAG
  rationale: 「πύθων」은 본래 델포이 신탁의 뱀신을 가리키며, 헬레니즘 시대에는 복화술적 점술의 신으로 통용되었다. 한국 독자의 즉각적 이해를 위해 의역 「점치는 영」을 채택하되 각주로 보충할 수 있다.
- source_word: παιδίσκην
  english_pob_choice: slave girl
  chosen_korean: 여종
  alternatives_korean:
  - 종 처녀
  - 소녀 노예
  lexicon: BDAG
  rationale: παιδίσκη는 「여자 종」을 의미한다. 한국어 「여종」이 자연스럽다.
