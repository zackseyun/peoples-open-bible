  to: 'Entonces Saúl dijo al quenita[a]: «Vayan, apártense, bajen de en medio de los amalecitas, no sea que los destruya junto con ellos[c][b]. Porque ustedes mostraron bondad con todos los hijos de Israel cuando subieron de Egipto». Y el quenita se apartó de en medio de los amalecitas.'
