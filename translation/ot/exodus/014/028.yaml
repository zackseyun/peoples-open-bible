id: EXO.14.28
reference: Exodus 14:28
source:
  edition: WLC
  text: וַ/יָּשֻׁ֣בוּ הַ/מַּ֗יִם וַ/יְכַסּ֤וּ אֶת הָ/רֶ֨כֶב֙ וְ/אֶת הַ/פָּ֣רָשִׁ֔ים לְ/כֹל֙ חֵ֣יל פַּרְעֹ֔ה הַ/בָּאִ֥ים אַחֲרֵי/הֶ֖ם בַּ/יָּ֑ם לֹֽא נִשְׁאַ֥ר בָּ/הֶ֖ם עַד אֶחָֽד־־־־׃
translation:
  text: And the waters returned and covered the chariots and the horsemen[a], all the army of Pharaoh that had gone after them into the sea; not one of them remained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the cavalry' for 'the horsemen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: From שוב, here describing the waters resuming their former place/state after being divided. 'Returned' is natural English and preserves the narrative force without over-paraphrase.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew plural form regularly takes plural sense in English in this context. 'The waters' matches the concrete, dramatic imagery of the sea closing back over the Egyptians.
- source_word: וַיְכַסּוּ
  chosen: covered
  alternatives:
  - overwhelmed
  - concealed
  lexicon: HALOT
  rationale: כסה means 'cover.' 'Covered' is the plain lexical sense and avoids importing interpretive expansion such as 'overwhelmed,' though that is implied by context.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariotry
  - the chariot force
  lexicon: HALOT
  rationale: While רכב can denote chariotry collectively, 'the chariots' is idiomatic and fits the paired military items in the verse.
- source_word: הַפָּרָשִׁים
  chosen: the horsemen
  alternatives:
  - the cavalry
  - the riders
  lexicon: HALOT
  rationale: פָּרָשִׁים refers to mounted warriors. 'Horsemen' is a direct and readable rendering; 'cavalry' is more interpretive and modernized.
- source_word: לְכֹל חֵיל פַּרְעֹה
  chosen: all the army of Pharaoh
  alternatives:
  - the whole force of Pharaoh
  - all Pharaoh's forces
  lexicon: HALOT
  rationale: חֵיל here denotes military force/army. Rendering with 'all the army of Pharaoh' preserves the totalizing force of לְכֹל and the military sense.
- source_word: הַבָּאִים אַחֲרֵיהֶם בַּיָּם
  chosen: that had gone in after them into the sea
  alternatives:
  - who were coming after them into the sea
  - that entered the sea after them
  lexicon: HALOT
  rationale: The participle with context is best rendered relatively in English. 'Had gone in' fits the narrative sequence after the Israelites entered and the Egyptians pursued. 'After them' refers to the Israelites.
- source_word: לֹא נִשְׁאַר בָּהֶם עַד אֶחָד
  chosen: Not one of them remained
  alternatives:
  - there did not remain among them even one
  - not even one of them was left
  lexicon: HALOT
  rationale: This idiom expresses total destruction. 'Not one of them remained' is concise, natural English and preserves the emphatic totality of עַד אֶחָד.
