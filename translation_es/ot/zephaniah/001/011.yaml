    reason: lexical_alternative
  revision_rationale: 'La revisión corrige un error ortográfico claro de puntuación, mejora la naturalidad del español para un público latinoamericano amplio, y conserva las decisiones léxicas del POB: «el Mortero» como topónimo significativo, «Canaán» con sentido mercantil preservado en nota, y el paralelismo de juicio económico. «Pueblo de mercaderes» mantiene el colectivo hebreo mejor que «pueblo mercader», y «han sido eliminados» comunica con más claridad el valor judicial de נִכְרְתוּ.'
