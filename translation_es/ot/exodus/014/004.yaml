translation:
  language: es
  text: Y endureceré el corazón de Faraón[a], y él los perseguirá; y me glorificaré[b] en Faraón y en todo su ejército, y los egipcios sabrán que yo soy Yahvé». Y así lo hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fortaleceré el corazón de Faraón». El verbo hebreo puede significar «hacer fuerte/firme»; en este contexto del Éxodo, esa firmeza se expresa como obstinación, de ahí «endureceré».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «seré glorificado en Faraón». La expresión hebrea habla de que Yahvé recibe honor o gloria en relación con Faraón por lo que sigue.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְחִזַּקְתִּי
  english_pob_choice: I will harden
  chosen_spanish: endureceré
  alternatives_spanish:
  - fortaleceré
  - haré firme
  lexicon: HALOT
  rationale: El hebreo hifil de חזק expresa hacer firme o fuerte; en este contexto narrativo, esa firmeza se manifiesta como obstinación, por lo que en español "endureceré" comunica bien la fuerza y la carga contextual sin perder el trasfondo literal de "fortaleceré".
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: En español bíblico, "corazón" conserva la idiomática semítica del centro de voluntad y pensamiento, equivalente funcional de לֵב, y suena natural en un contexto de juicio y resistencia.
- source_word: וְרָדַף אַחֲרֵיהֶם
  english_pob_choice: he will pursue them
  chosen_spanish: él los perseguirá
  alternatives_spanish:
  - él los seguirá persiguiendo
  - él irá tras ellos
  lexicon: HALOT
  rationale: רדף + אחרי expresa persecución activa; "perseguirá" es directo, natural y suficientemente fuerte para el contexto militar.
- source_word: וְאִכָּבְדָה בְּפַרְעֹה
  english_pob_choice: I will gain glory through Pharaoh
  chosen_spanish: me glorificaré en Faraón
  alternatives_spanish:
  - ganaré gloria por medio de Faraón
  - seré glorificado en Faraón
  lexicon: HALOT
  rationale: La forma hebrea comunica que Yahvé recibe honor/gloria a través de lo que sucede con Faraón. "Me glorificaré en Faraón" preserva esa relación con un español sobrio; "seré glorificado" sería posible, pero puede sonar más pasivo y menos acorde con la auto-exaltación divina del contexto.
- source_word: וּבְכָל חֵילוֹ
  english_pob_choice: and through all his army
  chosen_spanish: y en todo su ejército
  alternatives_spanish:
  - y en toda su fuerza
  - y en todo su host
  lexicon: HALOT
  rationale: חֵיל aquí designa la fuerza militar de Faraón; "ejército" es la equivalencia moderna más clara. Se mantiene la preposición con valor relacional de impacto/juicio mediante "en".
- source_word: וְיָדְעוּ מִצְרַיִם
  english_pob_choice: and the Egyptians will know
  chosen_spanish: y los egipcios sabrán
  alternatives_spanish:
  - y Egipto sabrá
  - y conocerán los egipcios
  lexicon: HALOT
  rationale: El plural con nombre propio apunta al pueblo egipcio; "los egipcios" preserva ese sentido personal y nacional mejor que abstraerlo a "Egipto".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Conforme al criterio del proyecto, el Tetragrámaton se vierte "Yahvé" en el texto principal para preservar el nombre personal revelado, en lugar de sustituirlo por un título.
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: And they did so
  chosen_spanish: Y así lo hicieron
  alternatives_spanish:
  - Y lo hicieron así
  - Y lo cumplieron
  lexicon: HALOT
  rationale: Cierra la escena de manera natural en español y conserva la fórmula narrativa de obediencia/realización del mandato.
theological_decisions:
- issue: Acción divina en el endurecimiento del corazón de Faraón
  english_pob_reading: 'Render the verb directly as divine causation: ''I will harden Pharaoh’s heart'''
  chosen_spanish_reading: 'Traducirlo como acción divina directa: "endureceré el corazón de Faraón"'
  alternative_spanish_readings:
  - dejaré que el corazón de Faraón se endurezca
  - fortaleceré el corazón de Faraón
  rationale: El hebreo presenta a Yahvé como sujeto activo. La versión española mantiene esa causalidad explícita sin suavizarla a mera अनुमति/permisión, y al mismo tiempo no introduce explicación doctrinal externa al versículo.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Sentido de כבד en la relación de Yahvé con Faraón y su ejército
  english_pob_reading: I will gain glory through Pharaoh
  chosen_spanish_reading: me glorificaré en Faraón y en todo su ejército
  alternative_spanish_readings:
  - ganaré gloria por medio de Faraón y de todo su ejército
  - seré glorificado en Faraón y en todo su ejército
  rationale: La frase preserva la tensión teológica de que Yahvé recibe gloria mediante el juicio sobre Faraón. "Me glorificaré" mantiene un matiz activo y reverente en español; se evita reducirlo a una mera explicación externa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la expresión de כבד de "get glory over" a "gain glory through" para reflejar mejor el sentido pasivo/reflexivo de recibir gloria/honor en relación con Faraón y su ejército. La redacción española adopta ese mismo matiz con "me glorificaré en...", evitando una formulación demasiado mecánica o agresivamente preposicional.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" para el Tetragrámaton, conforme al estándar del proyecto.
  - '"Faraón" conserva la capitalización usual en español bíblico para el nombre propio.'
  - Se eligió "corazón" para לֵב por consistencia antropológica bíblica y fluidez en español.
  - 'La estructura del versículo conserva el encadenamiento narrativo causal: endurecimiento, persecución, glorificación, conocimiento, obediencia final.'
