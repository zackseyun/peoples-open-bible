revisions:
- from: Y hicieron de la hermosura de su adorno un motivo de soberbia[a], y en ella hicieron las imágenes de sus abominaciones, sus cosas detestables[b]; por eso la he hecho para ellos una cosa impura.
  to: Y convirtieron la hermosura de su adorno en soberbia, y con él[a] hicieron las imágenes de sus abominaciones, sus cosas detestables; por eso la he hecho para ellos una cosa impura[b].
  rationale: Se corrige la concordancia y se restaura la nota léxica principal del POB sobre עָשׂוּ בוֹ, anclándola al lugar adecuado. También se añade la alternativa documentada para לְנִדָּה y se ajusta 'un motivo de soberbia' a una formulación más directamente resultativa y más cercana al hebreo.
