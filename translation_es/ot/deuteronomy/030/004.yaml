translation:
  language: es
  text: Si tus desterrados[a] están al fin de los cielos[b], de allí Yahvé tu Dios te reunirá, y de allí te tomará[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus expulsados» o «tus dispersos». El hebreo se refiere a los que han sido alejados o esparcidos.
    reason: lexical_alternative
  - marker: b
    text: «Al fin de los cielos» es un modismo hebreo para indicar el lugar más remoto posible.
    reason: cultural_note
  - marker: c
    text: O «te traerá». El verbo hebreo es más literalmente «tomar».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  - Aun si
  lexicon: HALOT
  rationale: La cláusula es condicional; «Si» comunica con naturalidad la estructura del hebreo sin añadir énfasis no explícito en el texto.
- source_word: יִהְיֶה
  english_pob_choice: are
  chosen_spanish: estu vieren
  alternatives_spanish:
  - serán
  - estarán
  lexicon: HALOT
  rationale: El hebreo usa un singular verbal con sentido idiomático para describir la condición de los dispersos. En español, «estu vieren» mantiene un tono bíblico y condicional sin forzar una concordancia artificial con un sujeto plural en castellano moderno.
- source_word: נִדַּחֲךָ
  english_pob_choice: your outcasts
  chosen_spanish: tus desterrados
  alternatives_spanish:
  - tus expulsados
  - tus dispersos
  - tus exiliados
  lexicon: HALOT
  rationale: El verbo נדח apunta a los que han sido arrojados lejos o dispersados. «Desterrados» conserva esa fuerza de expulsión/alejamiento y suena natural en español bíblico sin reducir el matiz a una sola causa histórica.
- source_word: בִּקְצֵה הַשָּׁמָיִם
  english_pob_choice: at the end of the heavens
  chosen_spanish: al fin de los cielos
  alternatives_spanish:
  - hasta el extremo de los cielos
  - en el extremo de los cielos
  - al fin del cielo
  lexicon: HALOT
  rationale: Se mantiene la imagen espacial extrema del hebreo. «Cielos» preserva el plural hebreo שָׁמַיִם y evita estrechar el sentido a «cielo» como simple atmósfera visible.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La repetición del adverbio se conserva con «de allí», una forma clara y sobria que corresponde al movimiento de restauración del texto.
- source_word: יְקַבֶּצְךָ
  english_pob_choice: will gather you
  chosen_spanish: te reunirá
  alternatives_spanish:
  - te juntará
  - te congregará
  - te volverá a reunir
  lexicon: HALOT
  rationale: El piel de קבץ significa reunir/recoger. «Reunirá» expresa bien el acto de juntar a los dispersos y evita introducir «volverá» como explicitación no requerida por el verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino según la convención del proyecto: «Yahvé», en lugar de una sustitución por título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios propio
  lexicon: HALOT
  rationale: La forma posesiva del pacto se mantiene con «tu Dios», en aposición natural a Yahvé.
- source_word: וּמִשָּׁם יִקָּחֶךָ
  english_pob_choice: and from there he will take you
  chosen_spanish: y de allí te tomará
  alternatives_spanish:
  - y de allí te llevará
  - y de allí te recogerá
  lexicon: HALOT
  rationale: לקח se traduce de modo literal como «tomar». «Te tomará» preserva la fuerza léxica sin anticipar una paráfrasis interpretativa como «llevará».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo presenta el Tetragrama; la política del proyecto pide transliterarlo como nombre propio. «Yahvé» conserva la identificación personal del Dios del pacto y evita la sustitución honorífica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Unidad corporativa de Israel en singular
  english_pob_reading: Second-person singular rendered as 'you/your' with collective force
  chosen_spanish_reading: 'Segunda persona singular mantenida con sentido corporativo: «tus», «te»'
  alternative_spanish_readings:
  - vuestras/vosotros
  - ustedes
  rationale: El hebreo se dirige a Israel como un solo destinatario, aunque hable de los dispersos del pueblo. Mantener el singular en español preserva esa voz de pacto sin perder el sentido colectivo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés sin cambios relevantes respecto de la última revisión aceptada; la redacción española mantiene el nombre divino, la imagen espacial extrema y el verbo final con fuerza literal.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, conforme a la terminología del proyecto.
  - Se conserva la repetición de «de allí» para reflejar מִשָּׁם.
  - «Cielos» reproduce el plural hebreo שָׁמַיִם y el registro elevado del pasaje.
  - La sintaxis mantiene el singular corporativo dirigido a Israel.
