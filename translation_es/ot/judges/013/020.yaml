translation:
  language: es
  text: Y cuando la llama subía del altar hacia el cielo, el ángel de Yahvé[a] subió en la llama del altar, mientras Manoá y su esposa miraban; y cayeron sobre sus rostros hasta el suelo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». La palabra hebrea puede significar «ángel» o «mensajero».
    reason: lexical_alternative
  - marker: b
    text: Lit. «cayeron sobre sus rostros hasta el suelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּעֲלוֹת
  english_pob_choice: And when ... went up
  chosen_spanish: Y cuando ... subía
  alternatives_spanish:
  - Y aconteció que ... subía
  - Y al subir ...
  lexicon: HALOT
  rationale: La construcción introduce una escena temporal. «Y cuando ... subía» conserva la progresión narrativa de manera natural en español sin cargar el giro idiomático con una literalidad innecesaria.
- source_word: הַלַּהַב
  english_pob_choice: the flame
  chosen_spanish: la llama
  alternatives_spanish:
  - el fuego
  - el resplandor
  lexicon: HALOT
  rationale: לַהַב designa una llama o fuego llameante. «La llama» es concreto, idiomático y mantiene la imagen visible del texto.
- source_word: מֵעַל הַמִּזְבֵּחַ
  english_pob_choice: from the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - de sobre el altar
  - desde encima del altar
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «de sobre», en español «del altar» comunica con naturalidad el punto de origen; el movimiento ascendente ya está expresado por el verbo «subía».
- source_word: הַשָּׁמַיְמָה
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia los cielos
  - cielos arriba
  lexicon: HALOT
  rationale: La forma direccional marca movimiento ascendente. «Hacia el cielo» preserva esa orientación vertical con español claro y digno.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: Se conserva la designación narrativa establecida por el POB. «Ángel» es el equivalente más natural en este contexto, sin resolver en la traducción la cuestión interpretativa sobre su identidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el nombre divino, evitando el reemplazo por un título en mayúsculas y manteniendo la transparencia respecto al texto hebreo.
- source_word: בְּלַהַב הַמִּזְבֵּחַ
  english_pob_choice: in the flame of the altar
  chosen_spanish: en la llama del altar
  alternatives_spanish:
  - dentro de la llama del altar
  - con la llama del altar
  lexicon: HALOT
  rationale: El hebreo presenta al ángel subiendo dentro o por medio de la llama visible del altar. «En la llama del altar» conserva la imagen sin especular sobre el mecanismo exacto.
- source_word: וּמָנוֹחַ וְאִשְׁתּוֹ רֹאִים
  english_pob_choice: while Manoah and his wife were watching
  chosen_spanish: mientras Manoá y su esposa miraban
  alternatives_spanish:
  - mientras Manoá y su esposa estaban viendo
  - cuando Manoá y su esposa observaban
  lexicon: HALOT
  rationale: El participio expresa acción simultánea y durativa. «Miraban» reproduce esa continuidad de manera natural; «veían» sería más genérico y menos vívido.
- source_word: וַיִּפְּלוּ עַל פְנֵיהֶם
  english_pob_choice: they fell on their faces to the ground
  chosen_spanish: cayeron sobre sus rostros
  alternatives_spanish:
  - cayeron de bruces
  - se postraron con el rostro en tierra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «Cayeron sobre sus rostros» mantiene el paralelismo con el texto fuente y preserva la postura de reverencia/temor; la adición «en tierra» completa el sentido locativo de אָרְצָה.
- source_word: אָֽרְצָה
  english_pob_choice: to the ground
  chosen_spanish: en tierra
  alternatives_spanish:
  - al suelo
  - a tierra
  lexicon: HALOT
  rationale: La forma direccional apunta al suelo/la tierra. «En tierra» suena solemne y conserva la resonancia bíblica sin perder claridad.
theological_decisions:
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: Render as 'the angel of Yahweh' without resolving in the translation whether this figure is merely an angelic messenger or a theophanic manifestation.
  chosen_spanish_reading: «el ángel de Yahvé» sin resolver en la traducción si se trata solo de un mensajero angelical o de una manifestación teofánica.
  alternative_spanish_readings:
  - «el mensajero de Yahvé»
  - una aparición teofánica
  rationale: El hebreo nombra al personaje de forma abierta; la traducción conserva esa designación y no introduce una interpretación dogmática en el cuerpo del texto. La nota permite reconocer la alternativa léxica sin perder la forma principal elegida por el POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés revisado cambió «fell facedown to the ground» por «fell on their faces to the ground» para ajustarse más al modismo hebreo עַל־פְּנֵיהֶם; la versión española conserva ese mismo equilibrio entre literalidad y fluidez mediante «cayeron sobre sus rostros en tierra».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «ángel» en lugar de «mensajero» en el texto principal, con la alternativa indicada en nota y decisión teológica.
  - «Llama» reproduce bien הַלַּהַב y evita la sobreinterpretación de «fuego» en este contexto narrativo.
  - «Miraban» expresa el valor durativo del participio hebreo.
  - «Cayeron sobre sus rostros en tierra» preserva el idiomatismo semítico y el tono reverente del pasaje.
