  glossary_alignment: No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). Las decisiones léxicas principales son compatibles con la auditoría inglesa. 'Engendras hijos' sigue la revisión aplicada, aunque la nota reconoce correctamente la tensión con el griego pasivo 'nacéis'.
