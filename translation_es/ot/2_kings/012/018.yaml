translation:
  language: es
  text: Entonces Hazael, rey de Aram[b], subió y peleó contra Gat y la capturó, y Hazael puso su rostro[a] para subir contra Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Puso su rostro» conserva el hebraísmo; también puede entenderse como «decidió» o «se propuso» subir contra Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: «Aram» es el nombre hebreo que tradicionalmente suele verterse como «Siria».
    reason: cultural_note
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel tiempo
  - Luego
  lexicon: HALOT
  rationale: Marca temporal narrativa que introduce el siguiente hecho en secuencia. «Entonces» es natural en español y conserva el avance del relato.
- source_word: יַעֲלֶה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue hacia arriba
  - marchó
  lexicon: HALOT
  rationale: עלה conserva el valor idiomático de «subir» en contexto militar; «subió» reproduce el hebraísmo sin perder claridad en español.
- source_word: חֲזָאֵל מֶלֶךְ אֲרָם
  english_pob_choice: Hazael king of Aram
  chosen_spanish: Hazael, rey de Aram
  alternatives_spanish:
  - Hazael, rey de Siria
  lexicon: HALOT
  rationale: Se mantiene «Aram» para reflejar el término hebreo más directamente, tal como el POB en inglés evita la sustitución tradicional «Syria».
- source_word: וַיִּלָּחֶם עַל
  english_pob_choice: fought against
  chosen_spanish: peleó contra
  alternatives_spanish:
  - hizo guerra contra
  - atacó
  lexicon: HALOT
  rationale: La construcción militar expresa conflicto hostil; «peleó contra» es claro y fiel, sin añadir un matiz más fuerte que el verbo hebreo por sí solo.
- source_word: גַּת
  english_pob_choice: Gath
  chosen_spanish: Gat
  alternatives_spanish:
  - Gath
  lexicon: HALOT
  rationale: Nombre propio de lugar adaptado a la ortografía española habitual.
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la se apoderó de
  lexicon: HALOT
  rationale: לכד en contexto de conquista significa capturar o tomar una ciudad; «la capturó» conserva el sentido de toma militar de forma directa.
- source_word: וַיָּשֶׂם חֲזָאֵל פָּנָיו
  english_pob_choice: Hazael set his face
  chosen_spanish: Hazael puso su rostro
  alternatives_spanish:
  - Hazael decidió
  - Hazael fijó su propósito
  lexicon: HALOT
  rationale: Se conserva el giro semítico «poner su rostro» para no borrar la textura idiomática del hebreo. En español puede sonar algo literario, pero sigue siendo entendible.
- source_word: לַעֲלוֹת עַל יְרוּשָׁלִָם
  english_pob_choice: to go up against Jerusalem
  chosen_spanish: para subir contra Jerusalén
  alternatives_spanish:
  - para marchar contra Jerusalén
  - para atacar Jerusalén
  lexicon: HALOT
  rationale: עלה con עַל en este marco militar indica avance hostil hacia una ciudad; «subir contra» preserva el idiomismo y la dirección de agresión sin resolverlo prematuramente en «atacar».
theological_decisions:
- issue: Aram vs. Syria as ethnogeographic designation
  english_pob_reading: The English POB renders אֲרָם as Aram rather than the traditional Syria.
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - Siria
  rationale: Se sigue la decisión auditada del POB en inglés para mantener correspondencia con el término hebreo y evitar la equivalencia tradicional que puede ocultar la forma original.
  doctrine_reference: Terminología histórica/etnogeográfica; no doctrinal
translation_notes:
  revision_awareness: 'Se siguió el estado de alta concordancia del control cruzado: no hubo revisiones aplicadas y el pasaje quedó estable respecto del borrador fuente en inglés.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden narrativo del hebreo: entonces + verbo de ascenso + conflicto + captura + giro idiomático hacia Jerusalén.'
  - Se evitó traducir «Aram» por «Siria» para conservar la decisión auditada del POB en inglés.
  - Se preservó el valor idiomático de «subir» en dos lugares, coherente con el hebreo עלה y con el registro bíblico narrativo.
