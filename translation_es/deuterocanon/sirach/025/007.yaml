revisions:
- from: La corona de los ancianos es[m] mucha experiencia[a], y su gloria es el temor del Señor.
  to: La corona de los ancianos es mucha experiencia[a], y su motivo de gloria es el temor del Señor.
  rationale: Se corrige «gloria» a «motivo de gloria» para reflejar mejor καύχημα y mantener un español natural y publicable. Se elimina la nota [m] por innecesaria y por incumplir el orden de marcadores. Se conserva «el temor del Señor» conforme al griego y a la decisión teológica auditada.
