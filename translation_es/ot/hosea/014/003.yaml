base_translation:
  language: en
  yaml_path: translation/ot/hosea/014/003.yaml
  text: Take words with you and return to Yahweh[a]. Say to him, “Take away all iniquity and receive what is good[b], and we will repay with the fruit of our lips.”
  footnotes:
  - marker: a
    text: Or “forgive all guilt” for “take away all iniquity”; the Hebrew idiom literally speaks of bearing away guilt.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the bulls of our lips,” a metaphor for spoken praise, confession, or vows offered in place of animal sacrifice. Some ancient witnesses and interpreters understand this as “the fruit of our lips.”
    reason: alternative_reading
