- issue: Whether to interpret ἐκ τοῦ φόβου μου as deliverance from an inward emotion or from the external object feared
  chosen_reading: from my fear
  alternative_readings:
  - from the thing I fear
  - from my dread
  rationale: The Greek phrase is concise and can be heard as either subjective fear or the danger provoking it. To preserve theological and emotional tension, the main text keeps the more literal 'from my fear,' while an alternative is preserved in a footnote.
