review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés: preserva la repetición legal de וְכֵן תַּעֲשֶׂה, mantiene ''tu hermano'' para אָחִיךָ, refleja bien el matiz no agentivo de אֲשֶׁר תֹּאבַד מִמֶּנּוּ, y comunica correctamente la prohibición final. La nota conserva adecuadamente la alternativa más literal de לְהִתְעַלֵּם.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un desajuste de anclaje de nota: la nota [a] explica la cláusula final ''no podrás ocultarte / hacerte el desentendido'', no ''asno''. Además, en la frase media conviene simplificar el pluscuamperfecto de subjuntivo compuesto para mejorar fluidez y mantener tono legal directo. ''No podrás desentenderte de ella'' es aceptable, aunque ''no podrás hacerte el desentendido'' reproduce mejor la imaginería idiomática del hebreo junto con la nota.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen Yahvé/Mesías/etc. 'Asno', 'manto', 'tu hermano' y la prohibición final son compatibles con las decisiones léxicas documentadas. La única corrección necesaria es de presentación y naturalidad sintáctica, no de glosario.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'asno' en vez de la prohibición final.
    rationale: La nota explica לְהִתְעַלֵּם ('ocultarte' / 'hacerte el desentendido'), no לַחֲמֹרוֹ ('su asno'). Esto rompe la disciplina de notas y puede confundir al lector.
  - severity: medium
    issue: La secuencia 'que se le haya perdido y tú la hayas encontrado' suena innecesariamente pesada.
    rationale: Aunque es gramatical, el doble perfecto de subjuntivo compuesto recarga el español. Una forma más simple como 'que se le pierda y tú la encuentres' o equivalente mantiene mejor la fuerza legal general.
  - severity: low
    issue: La cláusula final puede sonar más idiomática si la nota se ancla allí.
    rationale: Con el anclaje correcto, 'no podrás desentenderte de ella[a]' funciona, aunque la nota ya preserva la imagen más literal del hebreo.
  revised_spanish_text: Y así harás con su asno, y así harás con su manto, y así harás con cualquier cosa perdida de tu hermano que se le pierda y tú la encuentres; no podrás desentenderte de ella[a].
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «no podrás ocultarte» o «no podrás hacerte el desentendido».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a לְהִתְעַלֵּם, y se aligera la sintaxis de la cláusula relativa para un español más natural y legalmente general sin alterar el sentido del hebreo ni las decisiones del POB inglés.
