  text: un platillo de oro de diez siclos[a], lleno de incienso;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «un platillo de oro, diez [de oro], lleno de incienso»; «siclos» se suministra a partir de la fórmula repetida de peso en este capítulo para mayor claridad.
