translation:
  language: es
  text: Y ahora, he aquí, voy a mi pueblo. Ven[b], te aconsejaré lo que este pueblo hará a tu pueblo en los postreros días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “en días venideros”. La expresión hebrea puede referirse ampliamente al futuro, aunque “en los postreros días” conserva su peso profético.
    reason: alternative_reading
  - marker: b
    text: O, “contra tu pueblo”. La preposición hebrea literalmente dice “a tu pueblo”, pero en contexto puede implicar acción hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora mismo
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva de ו y el adverbio temporal sin volverlo más enfático de lo que permite el hebreo.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - aquí estoy
  lexicon: HALOT
  rationale: Mantiene el matiz deíctico y de énfasis solemne del hebreo sin perder naturalidad en español bíblico contemporáneo.
- source_word: הוֹלֵךְ
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me voy
  lexicon: HALOT
  rationale: El participio expresa acción inminente o en curso; 'voy' es natural en español y no añade aspecto ajeno al contexto.
- source_word: לְעַמִּי
  english_pob_choice: to my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - hacia mi pueblo
  - a mi propia gente
  lexicon: HALOT
  rationale: La relación posesiva y direccional del hebreo queda bien representada con 'a mi pueblo', sin necesidad de explicitar más.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Ven ahora
  lexicon: HALOT
  rationale: En este uso exhortativo de llamada/atención, 'ven' conserva la fuerza imperativa con una forma natural en español.
- source_word: אִיעָצְךָ
  english_pob_choice: I will advise you
  chosen_spanish: te aconsejaré
  alternatives_spanish:
  - te aconsejaré como
  - te daré consejo
  lexicon: HALOT
  rationale: '''Aconsejar'' reproduce el campo semántico de יעץ y funciona mejor en español que ''informar''; mantiene el sentido de consejo/orientación profética.'
- source_word: אֲשֶׁר יַעֲשֶׂה
  english_pob_choice: what ... will do
  chosen_spanish: lo que ... hará
  alternatives_spanish:
  - qué ... hará
  - lo que ... va a hacer
  lexicon: HALOT
  rationale: La construcción relativa se vierte de forma idiomática y fiel; 'lo que ... hará' respeta el valor predictivo sin sobreparafrasear.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo de aquí
  - esta gente
  lexicon: HALOT
  rationale: '''Pueblo'' conserva el singular colectivo del hebreo עָם y su tono más formal que ''gente''.'
- source_word: לְעַמְּךָ
  english_pob_choice: to your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - contra tu pueblo
  - para tu pueblo
  lexicon: HALOT
  rationale: La preposición ל es relacional y puede implicar afectación hostil en contexto; 'a tu pueblo' mantiene la cercanía al hebreo, dejando la posible hostilidad para la nota.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los postreros días
  alternatives_spanish:
  - en los últimos días
  - en días venideros
  lexicon: HALOT
  rationale: '''Postreros días'' preserva el giro idiomático y su peso profético sin resolverlo a un simple futuro genérico.'
theological_decisions:
- issue: Valor profético de בְּאַחֲרִית הַיָּמִים
  english_pob_reading: in the latter days
  chosen_spanish_reading: en los postreros días
  alternative_spanish_readings:
  - en los últimos días
  - en días venideros
  rationale: Se conserva la tensión escatológica/profética del hebreo, evitando reducir la expresión a un futuro indiferenciado. 'Postreros días' retiene un registro bíblico claro en español.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Posible matiz hostil de לְעַמְּךָ
  english_pob_reading: to your people
  chosen_spanish_reading: a tu pueblo
  alternative_spanish_readings:
  - contra tu pueblo
  rationale: El hebreo permite una relación direccional/afectada sin marcar explícitamente la hostilidad en la cláusula misma. En el texto principal se conserva la literalidad, y la posible implicación queda para nota.
  doctrine_reference: Translation philosophy §3 (Preserve lexical/theological tension)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y armoniza con la auditoría inglesa: conserva el marcador temporal inicial, el deíctico enfático, el participio de movimiento, la llamada imperativa, el consejo profético y la expresión idiomática de tiempo futuro. No hubo revisiones textuales en el pasaje fuente; se mantiene la lectura aprobada por la auditoría inglesa de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''Pueblo'' se mantiene para עָם por consistencia con el singular colectivo hebreo.'
  - '''Postreros días'' se emplea como equivalente idiomático de alta carga profética, coherente con la política de la POB en español.'
