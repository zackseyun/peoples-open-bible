    text: Or “offspring of Canaan, and not Judah.” The phrase is a sharp denunciation contrasting corrupt Canaanite identity with Judah.
    reason: lexical_alternative
  - marker: b
    text: Or “lust has perverted your heart.”
    reason: lexical_alternative
