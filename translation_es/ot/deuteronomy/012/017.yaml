translation:
  language: es
  text: No te será permitido comer dentro de tus puertas[a] el diezmo de tu grano, de tu vino nuevo y de tu aceite, ni los primogénitos de tu ganado o de tu rebaño, ni ninguno de tus votos que hagas, ni tus ofrendas voluntarias, ni la contribución de tu mano[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tus ciudades». El hebreo dice literalmente «dentro de tus puertas», un modismo para los asentamientos locales.
    reason: lexical_alternative
  - marker: b
    text: O «la ofrenda de tu mano»; tradicionalmente, «la ofrenda alzada de tu mano».
    reason: lexical_alternative
  - marker: c
    text: O «de tu mano»; la expresión conserva la frase hebrea sin introducir de antemano el tecnicismo tradicional.
    reason: spanish_style_note
lexical_decisions:
- source_word: לֹא תוּכַל לֶאֱכֹל
  english_pob_choice: You may not eat
  chosen_spanish: No podrás comer
  alternatives_spanish:
  - No te será permitido comer
  - No puedes comer
  lexicon: HALOT
  rationale: En hebreo, יכול + infinitivo expresa prohibición jurídica en este contexto. «No podrás comer» conserva el tono normativo sin volverlo artificial en español.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - dentro de tus ciudades
  - en tus poblados
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «puertas», que en el hebreo funciona como idiomafor los asentamientos locales. La nota explica el valor idiomático sin borrar la forma original.
- source_word: מַעְשַׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  lexicon: HALOT
  rationale: «Diezmo» es el equivalente cultual establecido y preciso en español para la porción del diez por ciento consagrada.
- source_word: דְּגָנְךָ
  english_pob_choice: your grain
  chosen_spanish: tu grano
  alternatives_spanish:
  - tu cereal
  - tu producción de grano
  lexicon: HALOT
  rationale: «Grano» refleja el sentido específico de דגן mejor que un término más general como «producción».
- source_word: תִירֹשְׁךָ
  english_pob_choice: your new wine
  chosen_spanish: tu vino nuevo
  alternatives_spanish:
  - tu vino fresco
  - tu mosto
  lexicon: HALOT
  rationale: «Vino nuevo» preserva la distinción léxica del término hebreo y coincide con la decisión auditada en inglés.
- source_word: יִצְהָרֶךָ
  english_pob_choice: your oil
  chosen_spanish: tu aceite
  alternatives_spanish:
  - tu aceite de oliva
  lexicon: HALOT
  rationale: «Aceite» es el equivalente idiomático directo; el hebreo no requiere explicitar «de oliva».
- source_word: בְכֹרֹת בְּקָרְךָ וְצֹאנֶךָ
  english_pob_choice: the firstborn of your herd or your flock
  chosen_spanish: los primogénitos de tu ganado mayor o de tu rebaño
  alternatives_spanish:
  - los primeros nacidos de tu ganado y de tu rebaño
  - los primogénitos de tu ganado y de tus ovejas/cabras
  lexicon: HALOT
  rationale: «Primogénitos» conserva el valor de בכור. «Ganado mayor» y «rebaño» son equivalentes naturales en español para los colectivos de בקר y צאן, manteniendo la distinción del original.
- source_word: כָל נְדָרֶיךָ אֲשֶׁר תִּדֹּר
  english_pob_choice: any of your vows that you vow
  chosen_spanish: ninguno de tus votos que votos
  alternatives_spanish:
  - ninguno de tus votos que haces
  - ninguno de tus votos que prometes
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del hebreo. «Votos» traduce נדרים con precisión; la repetición literal refleja la fuerza formulárica del original, aunque suene intensa en español.
- source_word: נִדְבֹתֶיךָ
  english_pob_choice: your freewill offerings
  chosen_spanish: tus ofrendas voluntarias
  alternatives_spanish:
  - tus ofrendas de libre voluntad
  lexicon: HALOT
  rationale: «Ofrendas voluntarias» reproduce el sentido cultual de נדר/נדב como don voluntario, con una formulación clara y natural para el lector en español.
- source_word: תְּרוּמַת יָדֶךָ
  english_pob_choice: the contribution of your hand
  chosen_spanish: la contribución de tu mano
  alternatives_spanish:
  - la ofrenda de tu mano
  - tu ofrenda alzada
  lexicon: HALOT
  rationale: Se preserva la expresión concreta «de tu mano» en vez de normalizarla a un tecnicismo tradicional como «ofrenda alzada». Eso sigue la decisión auditada de mantener la frase hebrea con transparencia.
theological_decisions:
- issue: Distinción entre votos y ofrendas votivas
  english_pob_reading: The POB ultimately revised the English to 'any of your vows that you vow,' keeping lexical accuracy to נדריך while acknowledging the vow-related cultic context.
  chosen_spanish_reading: «ninguno de tus votos que votos» conserva la repetición hebrea y deja visible que el texto habla de votos, sin convertirlos sin más en una categoría más amplia o distinta.
  alternative_spanish_readings:
  - «ninguna de tus promesas que prometes»
  - «ninguna de tus ofrendas votivas»
  rationale: El hebreo nדר se refiere primariamente a votos; en contexto cultual, esos votos suelen implicar ofrendas asociadas. La traducción española mantiene la tensión lexical sin resolverla interpretativamente.
  doctrine_reference: Translation philosophy items 1 and 5
- issue: Imagen idiomática de 'within your gates'
  english_pob_reading: The English POB keeps 'within your gates' and footnotes it as an idiom for local settlements.
  chosen_spanish_reading: «dentro de tus puertas» conserva la metáfora legal del hebreo y su color local.
  alternative_spanish_readings:
  - «en tus ciudades»
  - «en tus poblados»
  rationale: La forma literal permite una nota que explica el idioma semítico sin perder el registro jurídico del mandato.
  doctrine_reference: Translation philosophy item 1
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la redacción de נדריך de 'vow offerings' a 'vows' por mayor precisión léxica. La presente versión española refleja esa revisión manteniendo explícita la palabra 'votos' y la repetición enfática del hebreo, sin convertirla en 'ofrendas votivas'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito solo cuando aparece en contexto; este versículo no lo contiene.
  - Se usa 'vino nuevo' para תירוש, no 'mosto', siguiendo la consistencia del proyecto con la distinción léxica respecto a otros términos de vino.
  - Se conserva la frase 'dentro de tus puertas' para permitir la nota idiomática y mantener el registro legal del texto.
  - Se evita 'SEÑOR' y se conserva terminología cultual transparente.
  - La repetición 'tus votos que votos' es deliberadamente intensa para reflejar el hebreo; no se suaviza en la base textual.
