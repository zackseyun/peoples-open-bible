id: EPH.2.3
reference: Ephesians 2:3
source:
  edition: SBLGNT
  text: ἐν οἷς καὶ ἡμεῖς πάντες ἀνεστράφημέν ποτε ἐν ταῖς ἐπιθυμίαις τῆς σαρκὸς ἡμῶν, ποιοῦντες τὰ θελήματα τῆς σαρκὸς καὶ τῶν διανοιῶν, καὶ ⸀ἤμεθα τέκνα φύσει ὀργῆς ὡς καὶ οἱ λοιποί·
translation:
  text: among whom we all also once lived in the desires of our flesh[a], fulfilling the desires of the flesh and of the mind, and we were by nature children of wrath[e][d][c][b], just as the rest were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in which'; the Greek may point back to the sphere of disobedience or to the people characterized by it. 'Among whom' takes the reference personally in context.
    reason: alternative_reading
  - marker: b
    text: '''Flesh'' could also be rendered ''sinful nature'' here, but the main text keeps Paul''s term and leaves its full theological nuance explicit rather than interpreted.'
    reason: lexical_alternative
  - marker: c
    text: Or 'objects of wrath.' The expression 'children of wrath' is a literal rendering of the Greek idiom.
    reason: lexical_alternative
  - marker: d
    text: Or 'doing the wills of the flesh and of the thoughts'.
    reason: previous_rendering
  - marker: e
    text: Or 'just as the rest were also'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν οἷς
  chosen: among whom
  alternatives:
  - in which
  - among whom these things
  lexicon: BDAG
  rationale: The relative pronoun is dative plural and refers back to the people just mentioned in v. 2 ('the sons of disobedience'), not merely abstract 'trespasses and sins.' 'Among whom' best captures the personal reference in idiomatic English.
- source_word: ἀνεστράφημέν
  chosen: lived
  alternatives:
  - conducted ourselves
  - walked
  lexicon: BDAG
  rationale: ἀναστρέφω in the middle/passive can mean 'conduct oneself' or 'live one's life.' 'Lived' is natural modern English and fits the surrounding participial elaboration, while still conveying manner of life.
- source_word: ποτε
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: Marks past state prior to conversion; 'once' is concise and idiomatic.
- source_word: ἐπιθυμίαις
  chosen: desires
  alternatives:
  - lusts
  - cravings
  lexicon: BDAG
  rationale: '''Desires'' is broad enough to cover morally disordered longings without restricting the sense to sexual lust, which would be too narrow here.'
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ may be rendered 'flesh' literally or 'sinful nature' metaphorically. Here Paul uses it in an anthropological-ethical sense, but 'flesh' preserves the Pauline term and theological tension without over-interpreting the mechanism of sin.
- source_word: ποιοῦντες
  chosen: doing
  alternatives:
  - carrying out
  - fulfilling
  lexicon: BDAG
  rationale: A straightforward participial rendering that preserves the ongoing practical expression of the prior clause.
- source_word: θελήματα
  chosen: wills
  alternatives:
  - desires
  - wishes
  lexicon: BDAG
  rationale: θέλημα is stronger than mere impulse; 'wills' preserves the sense of volitional aims or intentions. Using 'desires' here would blur the distinction from ἐπιθυμίαις earlier in the verse.
- source_word: διανοιῶν
  chosen: thoughts
  alternatives:
  - minds
  - ways of thinking
  lexicon: BDAG
  rationale: The plural points to mental dispositions or thought-patterns. 'Thoughts' is concise and readable, though broader than strictly cognitive 'minds.'
- source_word: τέκνα ὀργῆς
  chosen: children of wrath
  alternatives:
  - objects of wrath
  - destined for wrath
  lexicon: BDAG
  rationale: This is a Semitic-style genitive construction. 'Children of wrath' preserves the idiom and theological force without prematurely resolving whether the emphasis is character, condition, or liability to judgment.
- source_word: φύσει
  chosen: by nature
  alternatives:
  - naturally
  - by birth
  lexicon: BDAG
  rationale: '''By nature'' is the standard and most transparent rendering, preserving the debated theological force of innate condition without narrowing it to biology alone.'
- source_word: οἱ λοιποί
  chosen: the rest
  alternatives:
  - the others
  - everyone else
  lexicon: BDAG
  rationale: A natural rendering that keeps the comparative force with the surrounding humanity outside Christ.
