translation:
  language: es
  text: Casa a una hija, y el asunto quedará resuelto[a]; y dásela[b] a un hombre prudente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: ''y el asunto saldrá''; el sentido es que la preocupación queda concluida. El paralelo griego lo expresa más explícitamente: ''y habrás completado una gran tarea''.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''dala en matrimonio a un hombre prudente''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצֵא / ἔκδου
  english_pob_choice: Marry off
  chosen_spanish: Casa a
  alternatives_spanish:
  - Dala en matrimonio
  - Cásala
  lexicon: HALOT; Greek ἔκδου
  rationale: El hebreo literalmente dice 'saca/trae fuera', y el griego confirma el sentido de dar en matrimonio. En español, 'casa a' conserva la acción parental y el valor idiomático sin perder la referencia matrimonial.
- source_word: בַת / θυγατέρα
  english_pob_choice: a daughter
  chosen_spanish: una hija
  alternatives_spanish:
  - tu hija
  - una muchacha
  lexicon: HALOT
  rationale: El hebreo no exige posesivo; 'una hija' mantiene la forma indefinida y funciona bien en un dicho sapiencial.
- source_word: וְיֵצֵא עֵסֶק / τετελεκὼς ἔργον μέγα
  english_pob_choice: the matter will be settled
  chosen_spanish: habrás terminado una gran tarea
  alternatives_spanish:
  - el asunto quedará resuelto
  - se acabará el asunto
  - habrás concluido un gran trabajo
  lexicon: HALOT; Greek τετελεκὼς ἔργον μέγα
  rationale: El hebreo habla de que 'saldrá' el asunto, y el griego lo vuelve explícito como 'haber completado una gran obra'. En español, 'habrás terminado una gran tarea' integra ambas líneas sin reducir el peso del esfuerzo ni imponer una sola imagen.
- source_word: גֶּבֶר נָבוֹן / ἀνδρὶ συνετῷ
  english_pob_choice: an intelligent man
  chosen_spanish: un hombre prudente
  alternatives_spanish:
  - un hombre inteligente
  - un hombre sensato
  - un hombre entendido
  lexicon: HALOT; Greek συνετός
  rationale: נָבוֹן y συνετός apuntan a discernimiento, sensatez y prudencia. 'Prudente' suena natural en español bíblico contemporáneo y evita que 'inteligente' se lea solo como capacidad intelectual.
- source_word: חַבְּרָהּ / δώρησαι αὐτήν
  english_pob_choice: give her
  chosen_spanish: dásela
  alternatives_spanish:
  - dásela en matrimonio
  - entrégasela
  lexicon: HALOT; Greek δώρησαι
  rationale: El hebreo sugiere unirla/ligarla a alguien, y el griego usa una forma de dar. 'Dásela' conserva el acto de entrega matrimonial en español, con naturalidad y sin añadir una glosa interpretativa en el texto principal.
translation_notes:
  revision_awareness: 'Se incorporó la revisión del audit trail que cambió la coordinación de contraste a coordinación simple: el hebreo וְאֶל no introduce oposición, por lo que se evitó ''pero'' y se usó ''y''. También se respetó la valoración del griego como amplificación del esfuerzo concluido, sin depender solo de una paráfrasis inglesa.'
  spanish_consistency_notes:
  - Se mantuvo 'hija' sin posesivo porque el hebreo es indefinido y el proverbio admite lectura general.
  - Se prefirió 'prudente' para συνετός/נָבוֹן por su valor de sensatez y discernimiento, más que 'inteligente' en sentido moderno estrecho.
  - Se evitó 'SEÑOR' u otras convenciones no presentes, porque este versículo no contiene el Tetragrámaton ni alusiones que lo exijan.
