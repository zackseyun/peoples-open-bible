review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y la línea del POB inglés: pregunta temporal, respuesta con límite de juicio, ciudades sin habitantes, casas sin gente y tierra en desolación. Sin embargo, hay dos desajustes relevantes: «yacieran» introduce un imperfecto pasado ajeno al hebreo y al español natural tras «hasta que» en este contexto, y «quede una desolación» omite el sentido léxico de תִּשָּׁאֶה (‘ser devastada / quedar desolada’) al dejar solo un verbo copulativo-débil.'
  spanish_quality_summary: El español es en general claro y digno, pero «Hasta que las ciudades yacieran en ruinas» suena gramaticalmente forzado en registro bíblico moderno; lo natural es «queden asoladas» o similar. Asimismo, la nota [b] no corresponde bien al anclaje textual actual, porque comenta «quede» con una glosa de «quede arrasada», lo que evidencia que falta en el texto principal el contenido verbal de devastación.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señor» para אֲדֹנָי es correcto; no corresponde usar «Yahvé» aquí porque el hebreo no tiene יהוה sino אֲדֹנָי. «Gente» para אָדָם genérico es aceptable en español y sigue la revisión auditada inglesa hacia una formulación inclusiva. «Tierra» para הָאֲדָמָה es adecuado en este contexto.
  issues:
  - severity: high
    issue: Tiempo/modo verbal inadecuado en «yacieran»
    rationale: Después de «hasta que», el español aquí pide presente de subjuntivo con valor prospectivo («queden», «estén»), no imperfecto de subjuntivo pasado. El hebreo expresa el límite futuro del juicio, no una acción hipotética pasada.
  - severity: high
    issue: Pérdida del sentido léxico de תִּשָּׁאֶה en «la tierra quede una desolación»
    rationale: El hebreo no solo dice que la tierra ‘sea’ una desolación, sino que ‘sea devastada/quede desolada’. Conviene expresar el verbo de devastación y luego el sustantivo intensificador «una desolación».
  - severity: medium
    issue: La nota [b] no se alinea con el texto anclado
    rationale: El anclaje actual está en «quede[b]», pero la nota explica una formulación que no aparece en el texto principal. Debe corregirse el texto o suprimirse la nota.
  revised_spanish_text: 'Entonces dije[a]: «¿Hasta cuándo, Señor?». Y él dijo: «Hasta que las ciudades queden asoladas, sin habitante, y las casas sin gente, y la tierra sea devastada, una desolación».'
  revised_footnotes:
  - marker: a
    text: 'O: «¿Cuánto tiempo, Señor?»'
    reason: lexical_alternative
  revision_rationale: Se corrige el español para reflejar con naturalidad y precisión el valor prospectivo de la respuesta («queden») y para restaurar el contenido léxico de devastación en תִּשָּׁאֶה («sea devastada»), manteniendo el cierre nominal intensificador «una desolación». Se elimina la nota [b] porque ya no hace falta una glosa suplementaria una vez que el texto principal expresa claramente el verbo de desolación.
