revisions:
- from: Tú[a], oh Señor, siendo de nada[b] menester, te complaciste en que un templo para tu morada viniera a existir entre nosotros.
  to: Tú, oh Señor, sin necesitar nada[b], te complaciste en que un templo para tu morada llegara a existir entre nosotros[a].
  rationale: Se reemplazó la expresión poco natural 'siendo de nada menester' por 'sin necesitar nada', que mantiene la autosuficiencia divina de ἀπροσδεὴς en español claro y digno. Se movió la nota [a] al lugar correcto, junto a 'entre nosotros', porque allí está la ambigüedad de ἐν ἡμῖν. También se suavizó 'viniera a existir' a 'llegara a existir' para mejorar la fluidez sin perder fidelidad a γενέσθαι.
