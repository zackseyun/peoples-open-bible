    text: 'O, más literalmente: «y vino a la casa de su padre, a Ofra».'
    reason: lexical_alternative
  - marker: b
    text: «Sobre una sola piedra» puede referirse a una única piedra o sitio de ejecución, subrayando que los setenta fueron muertos juntos en un solo lugar.
    reason: cultural_note
  - marker: c
    text: 'O: «quedó con vida».'
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor: mejora la legibilidad y la fidelidad estilística al marcar ''setenta hombres'' como inciso enfático, y ajusta la nota alternativa de ''quedó'' a una formulación más natural en español sin cambiar el sentido fuente.'
