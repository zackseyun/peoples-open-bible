  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἴδαμεν γὰρ ὅτι ἐὰν ἡ ἐπίγειος ἡμῶν οἰκία τοῦ σκήνους καταλυθῇ, οἰκοδομὴν ἐκ θεοῦ ἔχομεν οἰκίαν ἀχειροποίητον αἰώνιον ἐν τοῖς οὐρανοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/001.yaml
  text: For we know that if our earthly tent-house is torn down, we have a building from God, a house not made with hands, eternal in the heavens.
  footnotes:
  - marker: a
    text: Or 'our earthly house of the tent'; the Greek preserves both 'house' and 'tent' imagery for the present mortal dwelling.
    reason: lexical_alternative
  - marker: b
    text: Or 'is destroyed' or 'is dismantled'; the verb can suggest the taking down of a structure, fitting the tent image.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'we have,' not 'we will have,' preserving a tension between present possession and future realization.
    reason: alternative_reading
  - marker: d
    text: Or 'a house not made by human hands.' This expression carries biblical resonance for what is of divine, not human, origin.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리가 알기로, 우리의 땅에 있는 장막 집이 무너지면, 우리에게는 하나님께로부터 오는 건물, 곧 손으로 짓지 아니한 영원한 집이 하늘에 있습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπίγειος ... οἰκία τοῦ σκήνους
  english_pob_choice: earthly tent-house
  chosen_korean: 땅에 있는 장막 집
  alternatives_korean:
  - 지상의 장막 집
  - 땅의 천막 집
  lexicon: BDAG
  rationale: σκῆνος는 「장막·천막」으로 몸의 일시성을 표현. 「장막 집」으로 옮긴다.
- source_word: οἰκοδομὴν ... οἰκίαν ἀχειροποίητον
  english_pob_choice: a building ... a house not made with hands
  chosen_korean: 건물, 곧 손으로 짓지 아니한 집
  alternatives_korean: []
  lexicon: BDAG
  rationale: ἀχειροποίητος는 「사람의 손으로 만들어지지 않은」 — 신적 기원 강조.
