theological_decisions:
- issue: Nature of the manna as 'food of angels'
  chosen_reading: Retain the phrase as written without explaining whether it means food belonging to angels or food fit for angels.
  alternative_readings:
  - food from angels
  - bread fit for angels
  rationale: The Greek genitive allows the traditional expression without forcing a more specific theological interpretation. The text emphasizes heavenly provision rather than angelology itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
