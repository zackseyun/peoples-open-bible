revisions:
- from: 'Jefté dijo a los ancianos de Galaad: “Si ustedes me hacen volver para combatir contra los amonitas, y Yahvé los pone delante de mí, yo seré para ustedes jefe[a].”'
  to: 'Jefté dijo a los ancianos de Galaad: «Si ustedes me hacen volver para combatir contra los amonitas, y Yahvé los entrega ante mí, yo seré su cabeza[a]»'
  rationale: Se ajusta «los pone delante de mí» a «los entrega ante mí» para mejorar la naturalidad española y reflejar mejor el sentido contextual de victoria dada por Yahvé. Se cambia «jefe» por «cabeza» en el texto principal para alinearse con la decisión léxica auditada de preservar la metáfora de ראש, dejando las alternativas más interpretativas en nota. No se requiere adjudicación adicional porque son ajustes claros de estilo y fidelidad.
