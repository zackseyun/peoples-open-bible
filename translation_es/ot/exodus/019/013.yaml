base_translation:
  language: en
  yaml_path: translation/ot/exodus/019/013.yaml
  text: No hand shall touch him[a], for he must surely be stoned or surely shot; whether beast or man, he shall not live. When the ram’s horn sounds a long blast[c][b], they may go up on the mountain.
  footnotes:
  - marker: a
    text: Or 'No hand shall touch it,' if the pronoun is taken more generally; the sense is that the offender must not be touched directly but executed from a distance.
    reason: alternative_reading
  - marker: b
    text: Or 'surely pierced.' The Hebrew verb can refer to being shot, likely with arrows in this context.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'when the yobel is drawn out'; this likely refers to a prolonged blast on a ram’s horn.
    reason: cultural_note
