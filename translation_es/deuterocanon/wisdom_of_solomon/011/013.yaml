translation:
  language: es
  text: Porque cuando oyeron que aquellos mismos estaban siendo beneficiados por medio de sus propios castigos[a], reconocieron al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'llegaron a darse cuenta del Señor'. El griego puede indicar percepción o reconocimiento más que una confesión plena de fe.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε γὰρ
  english_pob_choice: For when
  chosen_spanish: Porque cuando
  alternatives_spanish:
  - Pues cuando
  - Cuando
  lexicon: LSJ
  rationale: Mantiene la fuerza explicativa de γάρ y la relación temporal de ὅτε con una frase natural en español.
- source_word: ἤκουσαν
  english_pob_choice: they heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: LSJ
  rationale: Conserva la recepción auditiva de un reporte, que es el sentido básico del verbo en este contexto.
- source_word: διὰ τῶν ἰδίων κολάσεων
  english_pob_choice: through their own punishments
  chosen_spanish: por medio de sus propios castigos
  alternatives_spanish:
  - a través de sus propios castigos
  - mediante sus propios tormentos
  lexicon: LSJ
  rationale: διά con genitivo expresa medio; 'castigos' comunica bien el contexto de juicios/plagas. 'Sus propios' preserva la ironía contrastiva de ἰδίων.
- source_word: εὐεργετουμένους
  english_pob_choice: were being benefited
  chosen_spanish: eran beneficiados
  alternatives_spanish:
  - recibían beneficios
  - eran tratados con bondad
  lexicon: LSJ
  rationale: El participio pasivo pide una construcción pasiva en español. 'Beneficiados' conserva el matiz de recibir bien/hecho bueno sin sobreexplicar.
- source_word: αὐτούς
  english_pob_choice: those very people
  chosen_spanish: aquellos mismos
  alternatives_spanish:
  - esos mismos
  - ellos
  lexicon: LSJ
  rationale: Hace explícito el contraste entre el grupo castigado y el grupo favorecido, sin añadir contenido nuevo.
- source_word: ᾔσθοντο
  english_pob_choice: they recognized
  chosen_spanish: reconocieron
  alternatives_spanish:
  - percibieron
  - se dieron cuenta de
  lexicon: LSJ
  rationale: En este contexto, el verbo apunta a una comprensión o reconocimiento progresivo; 'reconocieron' evita reducirlo a mera percepción sensorial.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Dueño
  lexicon: LSJ
  rationale: Sigue la convención del proyecto para κύριος cuando denota a Dios, con el artículo en forma natural española.
theological_decisions:
- issue: 'Alcance de ᾔσθοντο: percepción o reconocimiento religioso pleno'
  english_pob_reading: they recognized the Lord
  chosen_spanish_reading: reconocieron al Señor
  alternative_spanish_readings:
  - percibieron al Señor
  - se dieron cuenta del Señor
  - reconocieron la acción del Señor
  rationale: '''Reconocieron'' preserva la ambigüedad entre darse cuenta y reconocer, sin afirmar más de lo que el griego obliga. No se fuerza una confesión de fe completa.'
  doctrine_reference: 'Preservar la tensión léxica: reconocimiento/percibón, no conversión explícita.'
- issue: Referente de αὐτούς y contraste narrativo
  english_pob_reading: those very people
  chosen_spanish_reading: aquellos mismos
  alternative_spanish_readings:
  - esos mismos
  - aquellas mismas personas
  rationale: La expresión hace visible que los beneficiados son precisamente los que estaban en contraste con quienes sufren castigo, manteniendo la ironía del pasaje.
  doctrine_reference: Lectura contextual del relato de las plagas y la inversión de destinos.
translation_notes:
  revision_awareness: 'Se siguió el texto griego normalizado de la capa override adjudicada: ὅτε γὰρ ἤκουσαν διὰ τῶν ἰδίων κολάσεων εὐεργετουμένους αὐτούς, ᾔσθοντο τοῦ κυρίου. La decisión española conserva la ironía del medio (''por medio de sus propios castigos'') y la ambigüedad de ᾔσθοντο, en línea con la nota auditada del POB en inglés.'
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος conforme al criterio del proyecto cuando designa a Dios.
  - '''Castigos'' mantiene el paralelismo con el contexto de plagas y juicio; no se suaviza a ''correcciones'' porque el griego y el contexto apoyan una fuerza más fuerte.'
  - '''Reconocieron'' es preferido sobre ''percibieron'' para no volver el final demasiado físico ni demasiado débil semánticamente.'
