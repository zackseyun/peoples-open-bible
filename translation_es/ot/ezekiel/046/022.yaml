  yaml_path: translation/ot/ezekiel/046/022.yaml
  text: In the four corners of the court there were enclosed courts[a], forty long and thirty wide[c][b]; the four of them had the same measurement.
  footnotes:
  - marker: a
    text: Or, 'walled courts' or 'closed-off courts.' The Hebrew adjective likely describes the courts as enclosed spaces.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not explicitly repeat the unit 'cubits' here, though it is implied by the surrounding temple measurements.
    reason: cultural_note
  - marker: c
    text: The final Hebrew term is rare and difficult. It may also be understood to emphasize that these were the four corner courts.
    reason: lexical_alternative
