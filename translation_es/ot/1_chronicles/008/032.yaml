review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: genealogía (''Mikloth engendró...''), énfasis inclusivo (''ellos también''), residencia en Jerusalén y repetición final ''con sus hermanos''. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría inglesa: (1) el nombre שִׁמְאָה se vertió como ''Sima'', pero la base inglesa auditada usa ''Shimeah'' y la nota inglesa no presenta una lectura alternativa textual, solo transliteración estándar; en español ''Simea'' refleja mejor el hebreo y la alternativa documentada. (2) La nota [b] fue colocada en ''Jerusalén'', pero su contenido explica נֶגֶד (''frente a/opuesto a/cerca de''), no ''Jerusalén''; además falta la nota cultural inglesa sobre ''hermanos'' como miembros del clan.'
  spanish_quality_summary: El español es claro y digno. 'Engendró' y 'habitaron' son adecuados en registro bíblico moderno. No obstante, la ancla de la nota [b] está mal ubicada y la nota [a] necesita ajustarse para no favorecer una forma menos fiel ('Sima'). También conviene conservar 'Mikloth' en vez de 'Miklot' para alinearse mejor con la transliteración auditada y evitar una castellanización innecesaria no justificada en el expediente.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La principal cuestión de glosario es la transliteración de nombres propios: ''Mikloth'' y ''Simea'' mantienen mejor la alineación con la auditoría POB y con el hebreo. ''Sus hermanos'' debe conservarse en el texto, con nota cultural para aclarar el sentido de parentesco/clan.'
  issues:
  - severity: medium
    issue: '''Sima'' no refleja bien שִׁמְאָה ni la auditoría inglesa.'
    rationale: La forma española propuesta simplifica demasiado el nombre y se aparta de la forma auditada 'Shimeah'. 'Simea' es una solución española más fiel y ya contemplada como alternativa en el propio borrador.
  - severity: high
    issue: La nota [b] está anclada en 'Jerusalén' pero explica la preposición נֶגֶד ('frente a').
    rationale: Esto produce una nota mal referida y confunde al lector. El marcador debe ir sobre 'frente a' y, si se mantiene otra nota, debe reservarse para 'hermanos' o para el lugar correspondiente.
  - severity: medium
    issue: Falta la nota cultural sobre 'hermanos' presente en la auditoría inglesa.
    rationale: La auditoría inglesa aclara que 'hermanos' probablemente se refiere a miembros del clan o parientes dentro de la genealogía benjaminita, no solo hermanos biológicos. Esa aclaración sigue siendo útil en español.
  - severity: low
    issue: '''Miklot'' se aparta sin necesidad de la transliteración auditada ''Mikloth''.'
    rationale: No es un error grave de sentido, pero la forma con -th final mantiene mejor la continuidad onomástica con el expediente fuente y evita introducir una castellanización no documentada.
  revised_spanish_text: Mikloth engendró a Simea[a]. Ellos también habitaron frente a[b] sus hermanos en Jerusalén, con sus hermanos[c].
  revised_footnotes:
  - marker: a
    text: O 'Shimea'; el hebreo permite cierta variación en la transliteración del nombre propio.
    reason: lexical_alternative
  - marker: b
    text: O 'cerca de sus hermanos'; la preposición hebrea puede indicar posición delante de, frente a, o en proximidad a alguien.
    reason: lexical_alternative
  - marker: c
    text: '''Hermanos'' aquí probablemente se refiere a miembros del mismo clan o parientes dentro de la genealogía benjaminita, no necesariamente solo a hermanos biológicos.'
    reason: cultural_note
  revision_rationale: Se corrigió la transliteración del nombre a 'Simea', que representa mejor שִׁמְאָה en español; se restauró 'Mikloth' para alinear el nombre propio con la auditoría POB; se reubicó la nota de alternativa léxica sobre נֶגֶד al lugar correcto ('frente a'); y se añadió la nota cultural sobre 'hermanos' para preservar la explicación contextual documentada en el expediente inglés.
