  rationale: Se conserva el sentido del borrador, pero se añaden las notas del rastro auditado inglés para preservar decisiones léxicas y alternativas relevantes. También se ajusta levemente el orden a «que Moisés habló» para mejorar la naturalidad formal del español sin alejarse del hebreo.
