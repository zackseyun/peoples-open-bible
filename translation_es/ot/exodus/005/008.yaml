revisions:
- from: 'Y la cuota de ladrillos que ellos hacían ayer y antes de ayer, la impondréis sobre ellos; no la disminuiréis en nada, porque están ociosos. Por eso claman, diciendo: «Vayamos a sacrificar a nuestro Dios»[a].'
  to: 'Y la cuota de ladrillos que ellos hacían ayer y antes de ayer[a], se la impondréis; no la disminuiréis en nada, porque están ociosos. Por eso claman, diciendo: «Vayamos a sacrificar a nuestro Dios».'
  rationale: Se corrige un calco poco natural («la impondréis sobre ellos») por una forma española más idiomática y fiel al sentido administrativo («se la impondréis»), y se reubica la nota [a] junto a la expresión temporal que comenta. No se requieren cambios sustantivos de sentido.
