translation:
  language: es
  text: Busquen el bienestar[a] de la ciudad donde los he enviado al exilio, y oren a Yahvé por ella, porque en su bienestar tendrán bienestar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘paz’ / ‘bienestar integral’ en todo el versículo; el hebreo shalom se repite tanto para la ciudad como para los exiliados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִרְשׁוּ / דִרְשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Busquen
  alternatives_spanish:
  - Busquen activamente
  - Procuren
  lexicon: HALOT
  rationale: דרשׁ en este contexto pide una acción intencional y persistente en favor de la ciudad. 'Busquen' comunica bien la idea de buscar/procurar el bien sin volverla demasiado interpretativa.
- source_word: שְׁלוֹם
  english_pob_choice: welfare
  chosen_spanish: bienestar
  alternatives_spanish:
  - paz
  - prosperidad
  - paz y bienestar
  lexicon: HALOT
  rationale: El hebreo shalom aquí abarca bienestar integral de la ciudad, no solo ausencia de guerra. 'Bienestar' conserva ese sentido amplio y permite mantener la repetición del término en toda la frase.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - la población
  lexicon: HALOT
  rationale: Es la forma natural y precisa en español para la ciudad específica del exilio.
- source_word: הִגְלֵיתִי
  english_pob_choice: have sent you into exile
  chosen_spanish: he llevado en exilio
  alternatives_spanish:
  - los he exiliado
  - los he hecho ir al exilio
  lexicon: HALOT
  rationale: El hifil de גלה expresa causar el exilio. 'He llevado en exilio' conserva la agencia divina y suena natural en español, sin perder la fuerza del evento.
- source_word: שָׁמָּה
  english_pob_choice: where
  chosen_spanish: adonde
  alternatives_spanish:
  - donde
  - allí
  lexicon: HALOT
  rationale: El relativo con movimiento queda más natural en español con 'adonde', porque el verbo implica haber sido llevados a ese lugar.
- source_word: וְהִתְפַּלְלוּ
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - intercedan
  - recen
  lexicon: HALOT
  rationale: El hitpael imperativo significa orar/practicar oración; 'oren' es la opción más directa y digna en español contemporáneo.
- source_word: בַעֲדָהּ
  english_pob_choice: on its behalf
  chosen_spanish: por ella
  alternatives_spanish:
  - en favor de ella
  - a favor de ella
  lexicon: HALOT
  rationale: La preposición con sufijo expresa oración en favor de la ciudad. 'Por ella' es natural y mantiene la relación de intercesión sin sobrecargar la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en forma española auditable.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación. 'Porque' transmite claramente la causalidad del hebreo.
- source_word: בִשְׁלוֹמָהּ ... לָכֶם שָׁלוֹם
  english_pob_choice: in its welfare you will have welfare
  chosen_spanish: en su bienestar tendrán bienestar
  alternatives_spanish:
  - cuando ella prospere, ustedes prosperarán
  - en su paz tendrán paz
  lexicon: HALOT
  rationale: Se mantiene la repetición de shalom con el mismo término español para conservar el juego léxico y la lógica recíproca del hebreo, como en la tradición auditada del POB.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se conserva el nombre propio divino según el estándar del proyecto, en vez de sustituirlo por un título, para mantener transparencia textual y consistencia con la política de YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Repetición de שָׁלוֹם / שְׁלוֹם como juego léxico
  english_pob_reading: welfare ... welfare
  chosen_spanish_reading: bienestar ... bienestar
  alternative_spanish_readings:
  - paz ... paz
  - bienestar ... paz
  rationale: La repetición intencional del hebreo se preserva con la misma palabra en español para no borrar la tensión semántica entre el bien de la ciudad y el del pueblo exiliado.
  doctrine_reference: Jeremiah 29:7 lexical repetition; POB audit trail on shalom
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente del texto inglés auditado; el veredicto fue de alta concordancia y sin cambios necesarios. La versión española sigue esa línea estable, manteniendo las decisiones léxicas y la repetición de shalom.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se conserva la repetición de 'bienestar' para reflejar el juego de palabras de shalom.
  - '''Oren'' y ''por ella'' mantienen el matiz de intercesión sin añadir contenido no presente en el hebreo.'
  - '''Adonde'' expresa el movimiento implícito en ''he llevado en exilio''.'
