translation:
  language: es
  text: 'Y el mensajero que había ido a llamar a Micaías le dijo: “Mira ahora: las palabras de los profetas, a una voz,[a] favorecen al rey. Por favor, que tu palabra sea como la palabra de uno de ellos, y habla favorablemente.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «con una boca», un modismo que significa «a una voz» o «unánimemente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el ángel
  - el enviado
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de un agente humano enviado para llamar a Micaías, no de un ser celestial. «Mensajero» conserva el valor contextual y evita la lectura de «ángel» que el hebreo permitiría en otros pasajes.
- source_word: לִקְרֹא
  english_pob_choice: to summon
  chosen_spanish: a llamar
  alternatives_spanish:
  - a convocar
  - a llamar ante sí
  lexicon: HALOT
  rationale: Aquí el sentido es el de ir a buscar formalmente al profeta para presentarlo ante el rey. En español, «a llamar» con el contexto narrativo ya comunica la idea de convocatoria sin añadir demasiada interpretación.
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - Observa ahora
  lexicon: HALOT
  rationale: La combinación hebrea llama la atención y suaviza la exhortación. «Mira ahora» mantiene ese tono conversacional e imperativo, con un registro natural en español.
- source_word: דִּבְרֵי הַנְּבִיאִים
  english_pob_choice: the words of the prophets
  chosen_spanish: las palabras de los profetas
  alternatives_spanish:
  - el mensaje de los profetas
  - las profecías de los profetas
  lexicon: HALOT
  rationale: Se conserva la correspondencia directa con el sustantivo plural hebreo «palabras», sin convertirlo prematuramente en «mensaje» o «profecías».
- source_word: פֶּה אֶחָד
  english_pob_choice: with one mouth
  chosen_spanish: a una voz
  alternatives_spanish:
  - con una sola boca
  - unánimemente
  lexicon: HALOT
  rationale: La imagen hebrea literal es «con una boca», pero en español suena más natural expresar la unanimidad con «a una voz». Se preserva así el sentido idiomático sin perder la idea de concordancia.
- source_word: טוֹב אֶל הַמֶּלֶךְ
  english_pob_choice: favorable to the king
  chosen_spanish: favorables al rey
  alternatives_spanish:
  - buenas para el rey
  - propicias al rey
  lexicon: HALOT
  rationale: El adjetivo hebreo describe palabras positivas respecto del rey. En español, «favorables al rey» reproduce bien la relación y evita el calco poco natural «buenas para el rey».
- source_word: יְהִי נָא דברי/ך
  english_pob_choice: Please let your word be
  chosen_spanish: que tu palabra sea
  alternatives_spanish:
  - por favor, que tus palabras sean
  - que tu mensaje sea
  lexicon: HALOT
  rationale: 'El hebreo usa una forma volitiva con cortesía; en español se expresa de manera natural como petición: «que tu palabra sea». Se conserva el singular, como en la comparación inmediata.'
- source_word: כִּדְבַר אַחַד מֵהֶם
  english_pob_choice: like the word of one of them
  chosen_spanish: como la palabra de uno de ellos
  alternatives_spanish:
  - como una de sus palabras
  - como la palabra de cualquiera de ellos
  lexicon: HALOT
  rationale: Se mantiene la estructura singular del hebreo y su referencia a conformarse con cualquiera de los profetas favorables.
- source_word: וְדִבַּרְתָּ טּוֹב
  english_pob_choice: and speak favorably
  chosen_spanish: y habla favorablemente
  alternatives_spanish:
  - y habla bien
  - y habla de manera favorable
  lexicon: HALOT
  rationale: El hebreo exige aquí un valor adverbial. «Habla favorablemente» reproduce el sentido con dignidad y sin perder la fuerza pragmática de la exhortación.
theological_decisions:
- issue: Unanimidad de los profetas y tono de presión retórica
  english_pob_reading: the words of the prophets are with one mouth favorable to the king
  chosen_spanish_reading: las palabras de los profetas, a una voz, son favorables al rey
  alternative_spanish_readings:
  - las palabras de los profetas son unánimes y favorables al rey
  - las palabras de los profetas son con una sola boca favorables al rey
  rationale: La frase hebrea es idiomática y retóricamente cargada; no se suaviza en una paráfrasis general. Se conserva la imagen de unanimidad y su función persuasiva, porque eso es central en la escena.
  doctrine_reference: Prudencia hermenéutica; unidad/consenso profético como recurso narrativo, no como garantía de verdad
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la imagen idiomática de פֶּה אֶחָד con una solución española natural («a una voz») y conservando el tono de súplica/persuasión del versículo sin ampliar el sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «Micaías» como forma española del nombre propio hebreo מִיכָיְהוּ, en línea con la transliteración bíblica usual y sin introducir variantes no atestiguadas.
  - «Mensajero» evita la ambigüedad de «ángel» en un contexto humano.
  - «A una voz» preserva la nota idiomática documentada en el audit trail inglés y mantiene la idea de unanimidad sin sobreexplicar.
