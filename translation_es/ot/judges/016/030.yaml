  to: 'Y Sansón dijo[a]: «Que yo muera con los filisteos». Entonces se apoyó con toda su fuerza, y la casa cayó sobre los gobernantes y sobre todo el pueblo que estaba en ella[c][b]. Así, los muertos que mató al morir fueron más que los que había matado durante su vida.'
