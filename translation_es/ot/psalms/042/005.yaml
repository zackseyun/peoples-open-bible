translation:
  language: es
  text: 'Estas cosas recuerdo[a], y derramo mi alma en mi interior: cómo solía ir con la multitud y guiarlos[b] en procesión hasta la casa de Dios, con voz de júbilo y acción de gracias, una multitud festiva.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la procesión» para «con la multitud»; el sustantivo hebreo בַּסָּךְ es difícil y puede referirse al grupo congregado para la fiesta o a la comitiva procesional misma.
    reason: lexical_alternative
  - marker: b
    text: O «conducírlos» / «ir con ellos» para «guiarlos»; el verbo hebreo אֶדַּדֵּם es raro y su matiz preciso es incierto, aunque el contexto muestra claramente un movimiento con otros hacia la casa de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Esto
  lexicon: HALOT
  rationale: El demostrativo plural introduce varios recuerdos; en español, «Estas cosas» conserva el plural y el valor deíctico sin forzar una lectura singular.
- source_word: אֶזְכְּרָה
  english_pob_choice: I remember
  chosen_spanish: recuerdo
  alternatives_spanish:
  - recordaré
  - quiera yo recordar
  lexicon: HALOT
  rationale: La forma poética tiene fuerza de recuerdo vivo e inmediato; el presente en español reproduce mejor esa vividez que un futuro simple.
- source_word: וְאֶשְׁפְּכָה
  english_pob_choice: and I pour out
  chosen_spanish: y derramo
  alternatives_spanish:
  - y derramaré
  - y vaciaré
  lexicon: HALOT
  rationale: «Derramo» mantiene la metáfora de derramar algo interior y sigue el valor emocional del hebreo en contexto de lamento.
- source_word: עָלַי נַפְשִׁי
  english_pob_choice: my soul within me
  chosen_spanish: mi alma dentro de mí
  alternatives_spanish:
  - mi alma sobre mí
  - mi vida dentro de mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi alma sobre mí»; en español, «dentro de mí» comunica mejor el colapso interior sin perder la referencia al alma/vida personal.
- source_word: כִּי
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - porque
  - cuando
  lexicon: HALOT
  rationale: Aquí introduce el contenido recordado; «cómo» es la forma natural de abrir esa reminiscencia en español.
- source_word: אֶעֱבֹר
  english_pob_choice: I used to go
  chosen_spanish: solía ir
  alternatives_spanish:
  - iba
  - pasaba
  lexicon: HALOT
  rationale: El imperfecto rememorativo expresa hábito pasado; «solía ir» conserva ese valor iterativo y temporal.
- source_word: בַּסָּךְ
  english_pob_choice: with the throng
  chosen_spanish: con la multitud
  alternatives_spanish:
  - en la procesión
  - con la turba
  lexicon: HALOT
  rationale: La palabra es difícil; en este contexto de peregrinación y movimiento hacia el templo, «multitud» conserva el sentido colectivo sin decidir demasiado entre «procesión» o «grupo reunido».
- source_word: אֶדַּדֵּם
  english_pob_choice: lead them in procession
  chosen_spanish: conducirlos en procesión
  alternatives_spanish:
  - guiarlos
  - ir con ellos
  lexicon: HALOT
  rationale: El verbo raro sugiere conducir/ir al frente; «en procesión» refleja el matiz ritual y el movimiento hacia la casa de Dios, manteniendo la incertidumbre léxica documentada.
- source_word: עַד בֵּית אֱלֹהִים
  english_pob_choice: to the house of God
  chosen_spanish: hasta la casa de Dios
  alternatives_spanish:
  - a la casa de Dios
  - hasta el templo de Dios
  lexicon: HALOT
  rationale: «Hasta» reproduce bien el alcance direccional del hebreo y preserva el carácter de destino peregrino; «casa de Dios» se mantiene sin explicitar «templo».
- source_word: בְּקוֹל רִנָּה וְתוֹדָה
  english_pob_choice: with the voice of joyful shouting and thanksgiving
  chosen_spanish: con la voz de grito jubiloso y acción de gracias
  alternatives_spanish:
  - con voz de alegría y alabanza
  - con el clamor gozoso y la gratitud
  lexicon: HALOT
  rationale: Se conserva el carácter audible de קוֹל y el sentido festivo de רִנָּה; «acción de gracias» traduce bien תּוֹדָה en un registro litúrgico claro.
- source_word: הָמוֹן חוֹגֵג
  english_pob_choice: a festal multitude
  chosen_spanish: una multitud festiva
  alternatives_spanish:
  - una multitud celebrante
  - la multitud de la fiesta
  lexicon: HALOT
  rationale: La combinación describe una multitud en celebración cultual; «multitud festiva» es concisa y fiel al matiz de fiesta/peregrinación.
theological_decisions:
- issue: Referencia al culto y la peregrinación hacia la casa de Dios
  english_pob_reading: The verse recalls public worship and movement toward the house of God without over-specifying the setting.
  chosen_spanish_reading: El versículo recuerda el culto público y el ir hacia la casa de Dios sin precisar más allá de lo que dice el texto.
  alternative_spanish_readings:
  - ir al templo de Dios
  - la casa de Yahvé
  rationale: «Casa de Dios» conserva la formulación del hebreo y del audit trail inglés; no se añade «templo» porque el texto no lo explicita, y no se sustituye por un equivalente tradicional no presente aquí.
  doctrine_reference: culto bíblico y peregrinación en el salterio
- issue: Valor de נֶפֶשׁ como interioridad personal
  english_pob_reading: '''my soul within me'' conveys internal emotional collapse.'
  chosen_spanish_reading: «mi alma dentro de mí» expresa la interioridad desgarrada del salmista.
  alternative_spanish_readings:
  - mi vida dentro de mí
  - yo mismo dentro de mí
  rationale: «Alma» mantiene la tensión bíblica del término sin reducirlo a mero sentimiento; la versión española conserva el dramatismo interior del lamento.
  doctrine_reference: antropología bíblica y lenguaje del alma en poesía
- issue: Ambigüedad de בַּסָּךְ y אֶדַּדֵּם en la escena procesional
  english_pob_reading: The Hebrew is difficult and may refer to the gathered festival crowd or the processional company itself; the verb is rare and its precise nuance is uncertain.
  chosen_spanish_reading: 'Se mantiene una formulación abierta: «con la multitud» y «conducirlos en procesión».'
  alternative_spanish_readings:
  - en la procesión / guiarlos
  - con la turba / ir con ellos
  rationale: 'La traducción española preserva la incertidumbre documentada: no se resuelve dogmáticamente si se trata del grupo reunido o de la procesión misma, pero sí se comunica el movimiento ritual hacia la casa de Dios.'
  doctrine_reference: principio de cautela ante léxicos raros y poesía hebrea
translation_notes:
  revision_awareness: La redacción española sigue el pasaje revisado del audit trail inglés, que ajustó «pass along» a un «go» más natural y precisó el sentido procesional de «lead them in procession». También conserva la escena festiva y la ambigüedad léxica documentada en el hebreo para בַּסָּךְ y אֶדַּדֵּם.
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» de manera uniforme para בית אלהים.
  - «Multitud» y «procesión» se usan con cuidado para no borrar la ambigüedad del hebreo.
  - «Alma» se conserva como término bíblico, sin sustituirlo por «vida» o «ser».
  - La puntuación con dos puntos reproduce la transición del recuerdo a la escena evocada.
