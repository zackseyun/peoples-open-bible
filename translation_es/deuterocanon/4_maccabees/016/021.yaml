review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del audit trail inglés: Daniel como «el justo», el lanzamiento «a los leones», los nombres hebreos de los tres jóvenes, y la formulación relativamente literal «horno de fuego». Sin embargo, no preserva del todo la diferenciación verbal del original entre ἐβλήθη («fue arrojado») y ἀπεσφενδονήθησαν («fueron lanzados/hurled»), porque en español la combinación «arrojado» / «lanzados» queda aceptable pero menos marcada; además, omite la nota inglesa sobre la identidad más conocida de los tres jóvenes como Sadrac, Mesac y Abednego, que sí aporta una alternativa significativa para lectores hispanos.'
  spanish_quality_summary: El español es claro y digno, pero conviene un ajuste menor. «Perseveraron por causa de Dios» es comprensible, aunque menos directo que «soportaron/resistieron por causa de Dios» o «soportaron por Dios». Dado que ὑπέμειναν enfatiza aguante bajo sufrimiento, «soportaron» o «resistieron» refleja mejor el contexto martirial que «perseveraron». También es preferible conservar la nota sobre los nombres tradicionales, ya que mejora la legibilidad e identificación intertextual sin alterar el texto principal.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Dios» para θεόν; no hay conflicto con Yahvé/Mesías/etc. «El justo» concuerda con la decisión teológica documentada para δίκαιος. Los nombres hebreos Ananías, Azarías y Misael están correctamente preservados en el texto principal. La principal mejora es léxica-contextual: ὑπέμειναν se expresa mejor en español como «soportaron» o «resistieron» que como «perseveraron» en este contexto de sufrimiento.'
  issues:
  - severity: medium
    issue: «Perseveraron» debilita el matiz de ὑπέμειναν
    rationale: El verbo griego aquí subraya soportar o resistir bajo prueba severa. «Perseveraron» comunica constancia, pero menos claramente el aguante del padecimiento en el contexto del horno.
