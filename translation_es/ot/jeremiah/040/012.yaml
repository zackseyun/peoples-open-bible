revisions:
- from: Entonces todos los judeanos[a] regresaron de todos los lugares donde habían sido dispersados[b], y llegaron a la tierra de Judá, a Gedalías en Mizpá, y recogieron vino y fruto de verano[c] en gran abundancia.
  to: Entonces todos los judeanos[a] regresaron de todos los lugares donde habían sido expulsados[b], y llegaron a la tierra de Judá, a Gedalías en Mizpá, y recogieron vino y fruto de verano[c] en muy gran abundancia.
  rationale: Se ajusta «dispersados» a «expulsados» para reflejar mejor el valor principal de נִדְּחוּ en la auditoría fuente, y se refuerza la expresión final a «en muy gran abundancia» para conservar la intensificación de הַרְבֵּה מְאֹד documentada en la revisión inglesa.
