  text: אִם ר֤וּחַ הַ/מּוֹשֵׁל֙ תַּעֲלֶ֣ה עָלֶ֔י/ךָ מְקוֹמְ/ךָ֖ אַל תַּנַּ֑ח כִּ֣י מַרְפֵּ֔א יַנִּ֖יחַ חֲטָאִ֥ים גְּדוֹלִֽים־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/010/004.yaml
  text: If the ruler’s anger rises against you[a], do not leave your place[d][c][b], for calmness lays great offenses to rest.
  footnotes:
  - marker: a
    text: Or 'the ruler’s spirit' or 'the ruler’s temper.' The Hebrew word רוּחַ literally means 'spirit' or 'wind' and here likely refers to an angry disposition.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'healing' or 'gentleness.' The Hebrew noun מַרְפֵּא carries the idea of a soothing or healing response.
    reason: lexical_alternative
  - marker: d
    text: Or 'great sins.'
    reason: lexical_alternative
