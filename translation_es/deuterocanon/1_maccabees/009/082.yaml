translation:
  language: es
  text: la falange[a], pues la caballería se deshizo; y fueron aplastados por él y huyeron. Y la caballería se dispersó en la llanura, y huyeron hacia
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego de Swete conserva solo la parte final de la oración en este versículo y termina en una frase incompleta («y huyeron hacia ...»). Por eso la traducción reproduce el corte del texto sin suplir lo que falta.
    reason: textual_variant
lexical_decisions:
- source_word: φάλαγγα
  english_pob_choice: the phalanx
  chosen_spanish: la falange
  alternatives_spanish:
  - la formación
  - la línea de batalla
  lexicon: LSJ
  rationale: φάλαγξ designa una formación militar compacta; en español, «falange» conserva el término técnico y la idea de formación de combate sin explicitar más de lo que permite el fragmento griego.
- source_word: ἵππος
  english_pob_choice: cavalry
  chosen_spanish: caballería
  alternatives_spanish:
  - jinetes
  - caballos
  lexicon: LSJ
  rationale: Aunque la forma es singular, el uso colectivo militar en contexto narrativo justifica «caballería», que comunica mejor la unidad táctica que «caballo».
- source_word: ἐξελύθη
  english_pob_choice: broke up
  chosen_spanish: se deshizo
  alternatives_spanish:
  - se desbandó
  - se desorganizó
  - se quebró
  lexicon: LSJ
  rationale: El verbo expresa desarticulación o desintegración de la formación; «se deshizo» transmite bien la ruptura del cuerpo militar sin cargarlo de una derrota más precisa que la del griego.
- source_word: συνετρίβησαν
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastados
  alternatives_spanish:
  - fueron destrozados
  - fueron quebrantados
  lexicon: LSJ
  rationale: El verbo sugiere derrota severa y violencia; «fueron aplastados» conserva la fuerza física y militar del original de manera natural en español.
- source_word: ἀπʼ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - a manos de él
  - a causa de él
  lexicon: LSJ
  rationale: La frase es breve y dependiente del contexto bélico; «por él» refleja la agencia directa de modo conciso y acorde con la revisión inglesa más reciente.
- source_word: ἐσκορπίσθη
  english_pob_choice: was scattered
  chosen_spanish: fue dispersada
  alternatives_spanish:
  - se dispersó
  - fue esparcida
  lexicon: LSJ
  rationale: El pasivo de dispersión se reproduce con «fue dispersada», manteniendo el matiz militar y la relación con la caballería.
- source_word: πεδίῳ
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - el campo abierto
  lexicon: LSJ
  rationale: En narrativa militar, πεδίον alude al terreno abierto; «la llanura» es la opción más natural y fiel en español.
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del inglés POB, que prefirió «by him» para ἀπʼ αὐτοῦ; en español se siguió esa decisión con «por él». También se mantuvo el carácter fragmentario del testimonio griego, sin completar la cláusula final.
  spanish_consistency_notes:
  - Se usó «caballería» para ἵππος conforme al valor colectivo militar ya documentado en el audit trail inglés.
  - Se evitó «SEÑOR» u otra terminología teológica no pertinente, porque el pasaje es narrativo militar y no contiene léxico divino.
  - «Falange» conserva el registro técnico y corresponde bien al término militar griego en un fragmento que ya es abrupto en la fuente.
