revisions:
- from: Y entró Noé, con sus hijos, su esposa y las esposas de sus hijos con él, en el arca, a causa de las aguas del diluvio.
  to: Y Noé, con sus hijos, su esposa y las esposas de sus hijos con él, entró en el arca a causa de las aguas del diluvio.
  rationale: 'Se hizo una reparación menor de estilo y orden: se colocó ''Noé'' antes del verbo y ''entró en el arca'' como unidad verbal más natural en español. Esto conserva la estructura del hebreo y la decisión auditada en inglés, mantiene el explícito ''con él'', y mejora la fluidez sin cambiar el sentido.'
