translation:
  language: es
  text: Y Holofernes ordenó a sus guardias personales que no la estorbaran. Así ella permaneció en el campamento tres días; y salía de noche al valle[a] de Betulia, y se lavaba[b] junto a la fuente de agua, cerca del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cañada», «garganta» o «barranco». El término griego puede referirse a una depresión o paso estrecho del terreno.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego aquí pertenece a la misma raíz que más tarde se usa para «bautizar»; en este contexto se refiere a lavarse o bañarse, no al bautismo cristiano.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes a
  lexicon: LSJ
  rationale: «Ordenó» conserva la fuerza autoritativa del verbo sin volverlo excesivamente solemne. En español encaja bien con una narración histórica breve.
- source_word: τοῖς σωματοφύλαξι
  english_pob_choice: bodyguards
  chosen_spanish: a los guardias de su cuerpo
  alternatives_spanish:
  - a los guardias
  - a sus guardias personales
  lexicon: LSJ
  rationale: El compuesto apunta literalmente a guardias personales o de protección corporal. «Guardias de su cuerpo» mantiene la imagen del griego con naturalidad suficiente en español y evita una domesticación excesiva.
- source_word: μὴ διακωλύειν
  english_pob_choice: not to hinder
  chosen_spanish: que no la estorbaran
  alternatives_spanish:
  - que no la impidieran
  - que no la obstaculizaran
  lexicon: LSJ
  rationale: «Estorbar» expresa bien la idea de no interferir con su paso o movimiento. Es más idiomático que un calco como «no impedirla», y conserva el sentido práctico del verbo.
- source_word: παρέμεινεν
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - estuvo
  lexicon: LSJ
  rationale: «Permaneció» reproduce el valor narrativo de continuidad con un registro digno y preciso.
- source_word: παρεμβολῇ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: LSJ
  rationale: En contexto militar, «campamento» es el equivalente más claro y natural en español moderno.
- source_word: ἡμέρας τρεῖς
  english_pob_choice: for three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  - durante tres días
  lexicon: LSJ
  rationale: En español la duración se entiende naturalmente con el verbo de permanencia sin necesidad de añadir una preposición; por eso se prefiere la forma breve y fluida.
- source_word: ἐξεπορεύετο
  english_pob_choice: went out
  chosen_spanish: salía
  alternatives_spanish:
  - iba
  - se salía
  lexicon: LSJ
  rationale: El imperfecto sugiere acción repetida o habitual. «Salía» preserva ese matiz mejor que un pretérito simple y armoniza con «de noche».
- source_word: κατὰ νύκτα
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - de noche, en la oscuridad
  lexicon: LSJ
  rationale: «De noche» es la forma más natural y clara en español, sin exagerar el posible matiz habitual del griego.
- source_word: φάραγγα
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - barranco
  - cañada
  - garganta
  lexicon: LSJ
  rationale: El término griego puede cubrir depresión o garganta/cañada, pero la tradición inglesa del POB optó por «valley» para no forzar precisión topográfica; en español «valle» sigue esa decisión y mantiene la fluidez.
- source_word: Βαιτυλοῦα
  english_pob_choice: Bethulia
  chosen_spanish: Betulia
  alternatives_spanish:
  - Bethulia
  - Baítulua
  lexicon: standard transliteration
  rationale: «Betulia» es la forma establecida en español para este topónimo y resulta más reconocible para lectores bíblicos.
- source_word: ἐβαπτίζετο
  english_pob_choice: washed herself
  chosen_spanish: se lavaba
  alternatives_spanish:
  - se bañaba
  - se sumergía
  lexicon: LSJ
  rationale: El verbo puede significar lavar, bañar o sumergir. Aquí el contexto es de aseo nocturno junto a una fuente, no de rito cristiano; «se lavaba» comunica el acto sin importar una connotación sacramental posterior que el pasaje no exige.
- source_word: ἐπὶ τῆς πηγῆς τοῦ ὕδατος
  english_pob_choice: at the spring of water
  chosen_spanish: junto a la fuente de agua
  alternatives_spanish:
  - en la fuente de agua
  - en la fuente
  lexicon: LSJ
  rationale: «Junto a» conserva el sentido locativo de cercanía y suena natural en español. «Fuente de agua» reproduce de forma bastante directa la combinación del griego, sin dejar de ser comprensible.
theological_decisions:
- issue: Sentido de ἐβαπτίζετο en un contexto narrativo no sacramental
  english_pob_reading: washed herself
  chosen_spanish_reading: se lavaba
  alternative_spanish_readings:
  - se bañaba
  - se sumergía
  - se bautizaba
  rationale: 'La forma verbal griega es la misma familia léxica que luego se usa para «bautizar», pero aquí el contexto inmediato describe una acción de limpieza o baño en una fuente cercana al campamento. «Se lavaba» evita introducir una lectura ritual cristiana ajena al pasaje y conserva la tensión lexical: el griego sigue siendo el mismo, pero el contexto determina el sentido.'
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; evitar cargar el texto con asociaciones doctrinales posteriores; preservar el sentido contextual'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la revisión más reciente; se mantuvo la decisión de traducir ἐβαπτίζετο por una acción de lavado/baño no sacramental. Esta propuesta sigue esa lectura y la expresa con un español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Betulia» como topónimo bíblico asentado en español.
  - Se evita «bautizaba» para no importar una terminología eclesial no justificada por el contexto.
  - «Campamento» y no «real» para conservar claridad moderna y el matiz militar del griego.
