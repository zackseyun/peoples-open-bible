  glossary_alignment: La preferencia general del proyecto por «esclavo» para δοῦλος/slave no obliga aquí, porque el término fuente es hebreo עֶבֶד y la propia auditoría inglesa documenta una excepción contextual por vasallaje político. «Siervo» o mejor «servidor» serían posibles, pero para seguir la auditoría y conservar la nota, «siervo» en el texto con nota «vasallo» es la mejor solución en español bíblico legible.
