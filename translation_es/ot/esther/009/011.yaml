translation:
  language: es
  text: Aquel día, el número de los muertos en Susa la ciudadela fue llevado[a] ante el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «vino ante el rey»; la formulación española refleja el sentido idiomático de un informe que llega a la presencia real.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La frase temporal hebrea señala un momento específico ya identificado en el contexto. «En aquel día» conserva la deixis y mantiene un tono narrativo natural en español bíblico moderno.
- source_word: מִסְפַּר
  english_pob_choice: the number
  chosen_spanish: el número
  alternatives_spanish:
  - el conteo
  - la cantidad
  lexicon: HALOT
  rationale: מִסְפַּר designa un total numérico. «El número» es la opción más directa y transparente en español.
- source_word: הַהֲרוּגִים
  english_pob_choice: of those killed
  chosen_spanish: de los muertos
  alternatives_spanish:
  - de los asesinados
  - de los caídos
  lexicon: HALOT
  rationale: El participio pasivo de הרג refiere a quienes fueron muertos. En español, «los muertos» comunica el resultado del acto con claridad y sin añadir matices no presentes en el hebreo.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  english_pob_choice: in Susa the citadel
  chosen_spanish: en Susa la ciudadela
  alternatives_spanish:
  - en Susa la fortaleza
  - en la ciudadela de Susa
  lexicon: HALOT
  rationale: שׁוּשַׁן es el topónimo Susa; הַבִּירָה alude al recinto fortificado real. «Ciudadela» reproduce bien ese valor y conserva la apposición del hebreo.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - ante el rey
  - en presencia del rey
  lexicon: HALOT
  rationale: לִפְנֵי expresa proximidad/presencia formal. «Delante del rey» mantiene esa relación espacial-cortés sin forzar una reformulación más interpretativa.
- source_word: בָּא
  english_pob_choice: came / was brought
  chosen_spanish: fue presentado
  alternatives_spanish:
  - llegó
  - vino
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente «vino/llegó», el contexto personifica el reporte y el audit trail inglés reconoce que el sentido natural es que el informe llegó ante el rey. «Fue presentado» preserva esa recepción del informe en estilo español natural, sin perder la idea de comparecer ante la presencia real.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el tramo auditado de revisión inglesa: la versión inglesa pasó de «came before the king» a «was brought before the king» para expresar con más naturalidad la llegada del informe. La traducción española adopta una solución equivalente («fue presentado») sin ocultar la literalidad hebrea, que se explica en la nota.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - Se usa «rey» y no una perífrasis más explicativa, porque el hebreo mantiene el sustantivo simple.
  - «Ciudadela» sigue el valor de הַבִּירָה y evita traducirlo como «castillo», que introduciría una imagen menos precisa.
