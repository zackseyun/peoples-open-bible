revisions:
- from: 'Y cuando terminó de ofrecer el holocausto[a], Jehú dijo a los corredores y a los oficiales: «Entren; mátenlos. Que nadie salga». Los hirieron con el filo de la espada, y los corredores y los oficiales los arrojaron y avanzaron hasta la ciudad[b] de la casa de Baal.'
  to: 'Y cuando terminó de ofrecer el holocausto, Jehú dijo a los corredores y a los oficiales: «Entren; derríbenlos. Que nadie salga». Los hirieron con el filo de la espada, y los corredores y los oficiales los arrojaron fuera y avanzaron hasta el santuario interior[a] de la casa de Baal.'
  rationale: 'Se revisa para alinear el español con las decisiones léxicas auditadas del POB: 1) «derríbenlos» preserva mejor la fuerza verbal de הַכּוּם que «mátenlos»; 2) «los arrojaron fuera» refleja el matiz de expulsión de וַיַּשְׁלִכוּ; 3) «santuario interior» traslada al texto principal la lectura contextual adoptada por el POB para עִיר, dejando «ciudad/ciudadela» como alternativa en nota. Se elimina la nota sobre «holocausto» por no ser necesaria para una ambigüedad real del español en este versículo.'
