review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: participio legal general (''quien golpea/golpee''), referencia específica a padre y madre, y ajuste disyuntivo correcto de וְ a «o» en contexto casuístico. También preserva la fórmula penal intensificada מוֹת יוּמָת como sanción judicial, no mera mortalidad. Sin embargo, «será muerto» suena poco natural y algo calcado en español actual; conviene una formulación más idiomática que mantenga la pasiva/legalidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «ciertamente será muerto» resulta forzado y menos legible para un lector hispano actual. «Será condenado a muerte» sería más interpretativo; «morirá irremediablemente» perdería el matiz judicial. La mejor reparación menor es «ciertamente se le dará muerte», que conserva la pasiva impersonal/legal y mejora la naturalidad.
  glossary_alignment: No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). «Golpee»/«golpea» es adecuado para נכה. El uso de «o» con nota es coherente con el razonamiento auditado en inglés. La decisión sobre la pena capital debe conservar fuerza jurídica; la revisión propuesta lo hace mejor en español que «será muerto».
  issues:
  - severity: medium
    issue: «ciertamente será muerto» es un calco poco natural en español
    rationale: Aunque intenta preservar la pasiva jurídica de מוֹת יוּמָת, en español moderno suena torpe y menos inteligible. Una formulación como «ciertamente se le dará muerte» comunica mejor la sanción judicial sin alejarse del hebreo.
  - severity: low
    issue: Desajuste de modo verbal entre sujeto genérico y registro legal
    rationale: «Quien golpee» funciona, pero combinado con «ciertamente será muerto» crea una cadencia menos idiomática. Mantener «Quien golpee...» con una pena más natural resuelve el problema sin rehacer la estructura.
  revised_spanish_text: Quien golpee[a] a su padre o a su madre, ciertamente se le dará muerte.
  revised_footnotes:
  - marker: a
    text: 'El hebreo dice literalmente «y su madre», pero el sentido legal exige «o su madre»: golpear a cualquiera de los dos padres está en vista.'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido jurídico del hebreo y la nota sobre la conjunción disyuntiva, pero se reemplaza «será muerto» por «se le dará muerte» para lograr un español más natural y ampliamente legible, manteniendo a la vez la fuerza de la fórmula penal pasiva/intensificada.
