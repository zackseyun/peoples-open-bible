translation:
  language: es
  text: Pues por tu causa[a] nos matan todo el día; somos considerados como ovejas al matadero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa tuya» o «a causa de ti». El hebreo puede expresar sufrimiento soportado en relación con Dios.
    reason: lexical_alternative
  - marker: b
    text: O «somos contados como ovejas para el matadero».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque es que
  lexicon: HALOT
  rationale: En español, כִּי al inicio del verso introduce la razón de la queja anterior. «Porque» conserva la relación causal de manera natural y digna, sin añadir énfasis innecesario.
- source_word: עָלֶיךָ
  english_pob_choice: for your sake
  chosen_spanish: por tu causa
  alternatives_spanish:
  - por tu bien
  - a causa de ti
  - en tu cuenta
  lexicon: HALOT
  rationale: La preposición עַל con sufijo aquí expresa relación causal o de referencia. «Por tu causa» comunica que el sufrimiento ocurre en relación con Yahvé, sin convertirlo en agente directo del mal.
- source_word: הֹרַגְנוּ
  english_pob_choice: we are killed
  chosen_spanish: somos muertos
  alternatives_spanish:
  - nos matan
  - estamos siendo muertos
  - hemos sido muertos
  lexicon: HALOT
  rationale: El perfecto hebreo en este lamento poético expresa una realidad continua o repetida. «Somos muertos» mantiene el pasivo y el tono solemne; «nos matan» sonaría más coloquial y menos literal.
- source_word: כָל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - cada día
  - a lo largo del día
  lexicon: HALOT
  rationale: «Todo el día» es el equivalente idiomático natural en español para una duración continua. Conserva la idea de persistencia sin ampliar el sentido.
- source_word: נֶחְשַׁבְנוּ
  english_pob_choice: we are regarded
  chosen_spanish: somos considerados
  alternatives_spanish:
  - somos contados
  - somos estimados
  - somos tenidos por
  lexicon: HALOT
  rationale: «Considerados» reproduce el valor evaluativo del verbo חשׁב en pasivo. «Contados» puede sugerir solo cantidad, mientras que aquí el punto es la valoración que otros hacen de ellos.
- source_word: כְּצֹאן
  english_pob_choice: as sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - igual que ovejas
  - cual ovejas
  lexicon: HALOT
  rationale: El comparativo כ se expresa naturalmente con «como». «Ovejas» es la equivalencia normal y clara en español para el animal del símil.
- source_word: טִבְחָה
  english_pob_choice: for slaughter
  chosen_spanish: para el matadero
  alternatives_spanish:
  - para el sacrificio
  - para la degollación
  - para ser sacrificadas
  lexicon: HALOT
  rationale: El sustantivo indica matanza o degüello. «Matadero» conserva la fuerza de destino a la muerte en un registro comprensible; «sacrificio» podría suavizar indebidamente el sentido.
theological_decisions:
- issue: Si la frase implica que Dios causa directamente la muerte o que el sufrimiento ocurre por lealtad a él
  english_pob_reading: The main text renders עָלֶיךָ as 'for your sake,' expressing suffering endured on account of belonging to God, without making God the direct agent of the killing.
  chosen_spanish_reading: «Por tu causa» expresa sufrimiento soportado en relación con Yahvé, sin convertirlo en el agente directo del asesinato.
  alternative_spanish_readings:
  - porque de ti
  - a causa de ti
  - por tu bien
  rationale: 'El hebreo permite varias soluciones cercanas. La redacción española conserva la tensión teológica del salmo: el pueblo sufre en relación con Dios y por fidelidad a él, pero el texto no especifica que Dios sea quien mata.'
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La fuente muestra un alto grado de acuerdo y no registra revisiones aplicadas; la redacción española sigue de cerca el texto hebreo y el auditorial inglés, manteniendo la tensión teológica de עָלֶיךָ y el valor pasivo/continuo de los verbos.
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con la terminología del proyecto para el nombre divino.
  - 'Se mantiene el paralelismo verbal en pasivo: «somos muertos / somos considerados».'
  - «Ovejas» y «matadero» preservan el símil fuerte sin suavizarlo con lenguaje sacrificial más interpretativo.
