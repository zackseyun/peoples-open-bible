    rationale: La nota explica la elección de 'Dichoso' para אַשְׁרֵי/μακάριος; por disciplina del proyecto, el marcador debe aparecer exactamente en la palabra o frase anclada.
  - severity: medium
    issue: '''Las guarda en su corazón'' no expresa tan bien el idiomatismo de וְנוֹתֵן עַל לִבּוֹ como ''las toma a pecho''.'
    rationale: El hebreo y la decisión inglesa apuntan a internalizar seriamente o 'tomar a corazón', no meramente conservar. 'Las toma a pecho' es idiomático, natural en español y preserva mejor el valor de 'takes them to heart'.
  revised_spanish_text: Dichoso[a] el hombre que medita en estas cosas, y el que las toma a pecho llegará a ser sabio.
  revised_footnotes:
