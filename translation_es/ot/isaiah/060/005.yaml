revisions:
- from: Entonces verás y resplandecerás[a], y tu corazón temblará y se ensanchará, porque la abundancia del mar será vuelta hacia ti[b]; las riquezas de las naciones vendrán a ti.
  to: Entonces verás y resplandecerás[a], y tu corazón temblará y se ensanchará, porque la abundancia del mar se volverá hacia ti[b]; las riquezas de las naciones vendrán a ti.
  rationale: Se corrigió una construcción española poco natural («será vuelta hacia ti») por «se volverá hacia ti», que comunica mejor el giro hacia Sion implícito en el hebreo sin alejarse del sentido auditado. También se refinó la nota [a] para alinearla mejor con «resplandecerás».
