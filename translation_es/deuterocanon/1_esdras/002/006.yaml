translation:
  language: es
  text: Por tanto, cuantos viven en los distintos lugares, que los hombres de su lugar le ayuden con oro y plata, con dones, con caballos y ganado[a], junto con las demás cosas añadidas como ofrendas votivas para el templo del Señor en Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente “caballos y ganado”. El paralelo hebreo de Esdras 1:4/1:6 difiere y habla de bienes/propiedad y ganado; aquí se sigue el testimonio griego de 1 Esdras.
    reason: alternative_reading
  - marker: b
    text: También puede entenderse “para el santuario del Señor”. ἱερόν puede significar “templo” o “santuario”; aquí se prefirió “templo” por el contexto de reconstrucción en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι οὖν
  english_pob_choice: Therefore, as many as
  chosen_spanish: Por tanto, todos los que
  alternatives_spanish:
  - Así que, cuantos
  - Por tanto, cuantos
  lexicon: LSJ
  rationale: ὅσοι introduce un grupo indefinido distributivo; οὖν añade continuidad inferencial. En español, "Por tanto" conserva la inferencia y "todos los que" expresa el valor distributivo con naturalidad.
- source_word: κατὰ τοὺς τόπους οἰκοῦσιν
  english_pob_choice: live in the various places
  chosen_spanish: viven en los distintos lugares
  alternatives_spanish:
  - habitan en los lugares
  - residen en los diversos lugares
  lexicon: LSJ
  rationale: La frase distribuye a las personas por localidades. "Distintos lugares" mantiene el sentido plural/distributivo sin sonar rígido en español.
- source_word: βοηθείτωσαν αὐτῷ
  english_pob_choice: let ... help him
  chosen_spanish: que ... le ayuden
  alternatives_spanish:
  - que ... le asistan
  - que ... le apoyen
  lexicon: BDAG
  rationale: βοηθέω significa ayudar o acudir en auxilio. El imperativo exhortativo se expresa naturalmente en español con "que ... ayuden"; se conserva el singular de referencia en "le".
- source_word: οἱ ἐν τῷ τόπῳ αὐτοῦ
  english_pob_choice: the men in his place
  chosen_spanish: los hombres de su lugar
  alternatives_spanish:
  - los de su lugar
  - las personas de su lugar
  lexicon: LSJ
  rationale: La construcción apunta a los residentes locales. "Los hombres de su lugar" sigue de cerca el valor del paralelo semítico y reproduce la distinción de sexo/función implícita en el contexto sin volverlo pesado.
- source_word: ἐν χρυσίῳ καὶ ἐν ἀργυρίῳ
  english_pob_choice: with gold and silver
  chosen_spanish: con oro y plata
  alternatives_spanish:
  - en oro y plata
  - mediante oro y plata
  lexicon: LSJ
  rationale: Los ἐν instrumentales se vierten de forma idiomática con "con". La repetición no necesita duplicarse en español para mantener fluidez.
- source_word: ἐν δόσεσιν
  english_pob_choice: with gifts
  chosen_spanish: con dones
  alternatives_spanish:
  - con dádivas
  - con ofrendas
  lexicon: LSJ
  rationale: δόσεις son cosas dadas, dones o donativos. "Dones" es breve y suficientemente amplio, sin forzar todavía un matiz cultual específico.
- source_word: μεθʼ ἵππων καὶ κτηνῶν
  english_pob_choice: with horses and livestock
  chosen_spanish: con caballos y ganado
  alternatives_spanish:
  - con caballos y bestias de carga
  - con caballos y animales de crianza
  lexicon: LSJ
  rationale: ἵππων es literalmente "caballos" y κτηνῶν refiere animales domésticos o de cría. "Ganado" es un equivalente claro y natural en español para ese campo semántico.
- source_word: σὺν τοῖς ἄλλοις
  english_pob_choice: along with the other things
  chosen_spanish: junto con las demás cosas
  alternatives_spanish:
  - además de las demás cosas
  - con las otras cosas
  lexicon: LSJ
  rationale: σύν añade elementos acompañantes. "Junto con" conserva la suma de cosas sin sobreinterpretar.
- source_word: τοῖς κατʼ εὐχὰς προστεθειμένοις
  english_pob_choice: added as vowed offerings
  chosen_spanish: añadidas como ofrendas votivas
  alternatives_spanish:
  - añadidas según votos
  - añadidas por voto
  lexicon: LSJ
  rationale: κατʼ εὐχάς remite a votos; προστεθειμένοις indica cosas agregadas. "Ofrendas votivas" comunica el carácter de voto y el añadido suplementario de manera compacta y fiel.
- source_word: εἰς τὸ ἱερὸν τοῦ κυρίου
  english_pob_choice: for the temple of the Lord
  chosen_spanish: para el templo del Señor
  alternatives_spanish:
  - para el santuario del Señor
  - para la casa del Señor
  lexicon: LSJ
  rationale: ἱερόν aquí designa el recinto/templo; en español "templo" es la opción más precisa y pública. Aunque el proyecto suele reservar "Yahvé" para יהוה, aquí el texto griego usa κυρίου; por lectura de contexto litúrgico se conserva "Señor" en la frase tradicionalmente reconocible.
- source_word: τὸ ἐν Ἱερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - que está en Jerusalén
  lexicon: LSJ
  rationale: La frase adjetiva identifica la localización del templo; el español directo "en Jerusalén" evita recargo innecesario.
theological_decisions:
- issue: κύριος en un contexto del templo de Israel
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El testimonio primario es griego y emplea κυρίου. Para un español bíblico claro y reverente, "Señor" mantiene la convención de la fuente sin sustituir de manera artificial el término del texto griego por el tetragrama.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → Yahvé'
- issue: 'ἱερὸν: templo/santuario'
  english_pob_reading: temple
  chosen_spanish_reading: templo
  alternative_spanish_readings:
  - santuario
  - casa
  rationale: El audit trail revisa la opción desde "house" hacia "temple" para precisar ἱερόν. En español, "templo" es el equivalente más directo y estable para el lector.
  doctrine_reference: LSJ / audit revision on ἱερόν
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión reciente del texto inglés: se eliminó la repetición de ''with'' antes de ''silver'' y se ajustó ''house'' a ''temple'' para reflejar ἱερόν. El español sigue esa precisión léxica y mantiene la dependencia principal del griego, con el paralelo hebreo como control contextual.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κυρίου en conformidad con el texto griego y el registro bíblico estándar del español.
  - Se usa 'templo' para ἱερὸν, sin forzar 'casa' ni 'santuario' en el texto principal.
  - Se conserva el valor distributivo de ὅσοι οὖν mediante una estructura española natural y reverente.
  - '''Dones'' y ''ofrendas votivas'' se diferencian para evitar que el añadido final se confunda con el bloque general de contribuciones.'
