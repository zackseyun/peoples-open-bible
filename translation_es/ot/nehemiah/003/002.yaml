translation:
  language: es
  text: Y junto a él construyeron los hombres de Jericó, y junto a él[a] construyó Zacur hijo de Imri.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también dice literalmente «junto a él» en la segunda cláusula; en inglés se explicitó «junto a ellos» para referirse al grupo precedente, pero aquí se conserva la forma singular del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  english_pob_choice: and next to him
  chosen_spanish: y junto a él
  alternatives_spanish:
  - y al lado de él
  - y al lado suyo
  lexicon: HALOT
  rationale: El hebreo usa una locución de proximidad espacial en la secuencia de edificación. «Junto a él» conserva ese valor relacional de manera natural en español y evita una calca poco idiomática como «a su mano».
- source_word: בָּנוּ
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: HALOT
  rationale: El verbo básico בנה significa «construir/edificar». En este contexto de muralla y lista de obreros, «edificaron» comunica bien la acción sin agregar la idea de restauración que el hebreo aquí no expresa explícitamente.
- source_word: אַנְשֵׁי יְרֵחוֹ
  english_pob_choice: the men of Jericho
  chosen_spanish: los hombres de Jericó
  alternatives_spanish:
  - la gente de Jericó
  - los varones de Jericó
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». «Los hombres de Jericó» mantiene la forma del hebreo y el registro de la lista genealógico-laboral, sin neutralizar innecesariamente el término.
- source_word: זַכּוּר בֶּן אִמְרִי
  english_pob_choice: Zaccur the son of Imri
  chosen_spanish: Zacur hijo de Imri
  alternatives_spanish:
  - Zacur, hijo de Imri
  - Zakur hijo de Imri
  lexicon: Transliteration tradition + Hebrew patronymic
  rationale: Se translitera el nombre propio como «Zacur» para lectura natural en español. Se conserva la construcción patronímica hebrea con «hijo de» porque el texto presenta identificación familiar, no un título.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: conserva la repetición de la fórmula de proximidad, traduce בנה con un verbo de construcción no reparadora, y mantiene el patronímico en forma transparente. No se introdujeron cambios respecto al sentido del pasaje.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otros equivalentes de nomenclatura cultual porque el versículo no contiene el nombre divino.
  - Se mantuvo la simetría de las dos cláusulas con «junto a él» para reflejar la repetición del hebreo.
  - Se prefirió «edificaron/edificó» como equivalente bíblico sobrio y transparente para בנה en una lista de trabajos comunitarios.
