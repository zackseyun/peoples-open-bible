  rationale: Se reemplaza 'Ponte[a]' por 'Párate' para una orden más natural, digna y precisa en español. Se elimina la nota innecesaria sobre עֲמֹד y se traslada la nota al verbo הִשְׁתַּחֲוָה, donde la auditoría inglesa documenta explícitamente una alternativa léxica relevante. También se ajusta la puntuación final conforme al uso normal del español.
