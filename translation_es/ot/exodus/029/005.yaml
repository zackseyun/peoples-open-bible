base_translation:
  language: en
  yaml_path: translation/ot/exodus/029/005.yaml
  text: Then you shall take the garments and clothe Aaron with the tunic[a], the robe of the ephod, the ephod, and the breastpiece[b], and you shall bind it on him with the skillfully woven band of the ephod.
  footnotes:
  - marker: a
    text: Or 'and gird him with it by the woven band of the ephod.' The Hebrew verb is rare and may emphasize fastening or girding the ephod onto Aaron.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'breastplate'; the Hebrew more broadly denotes a chest piece, so 'breastpiece' is used here.
    reason: lexical_alternative
