translation:
  language: es
  text: 'Y de la tribu de Gad: Ramot en Galaad[a], la ciudad de refugio para el homicida, con sus tierras de pasto[b], y Mahanaim con sus tierras de pasto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Ramot-galaad' o 'Ramot de Galaad'. El hebreo permite tanto la forma con preposición como el compuesto tradicional del topónimo.
    reason: alternative_reading
  - marker: b
    text: '''Tierras de pasto'' se refiere al terreno asignado alrededor de la ciudad para su uso; también puede traducirse ''terreno circundante'' o ''tierras de pastoreo''.'
    reason: cultural_note
lexical_decisions:
- source_word: מִמַּטֵּה גָד
  english_pob_choice: And from the tribe of Gad
  chosen_spanish: Y de la tribu de Gad
  alternatives_spanish:
  - Y de la vara de Gad
  - Y del bastón de Gad
  lexicon: HALOT
  rationale: En listas de repartición territorial, מַטֶּה designa 'tribu', no un objeto literal. En español, 'tribu' conserva el valor administrativo y genealógico del contexto mejor que una traducción mecánica.
- source_word: עִיר מִקְלַט
  english_pob_choice: city of refuge
  chosen_spanish: la ciudad de refugio
  alternatives_spanish:
  - la ciudad-refugio
  - la ciudad asilo
  lexicon: HALOT
  rationale: La expresión bíblica técnica se reproduce de manera natural en español como 'ciudad de refugio', manteniendo el sentido legal de asilo.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  - el matador involuntario
  lexicon: HALOT
  rationale: En este contexto jurídico, רֹצֵחַ puede abarcar al que ha quitado una vida sin implicar necesariamente asesinato premeditado. 'Homicida' conserva esa amplitud mejor que 'asesino' y evita endurecer indebidamente la culpa.
- source_word: רָמֹת בַּגִּלְעָד
  english_pob_choice: Ramoth in Gilead
  chosen_spanish: Ramot en Galaad
  alternatives_spanish:
  - Ramot-galaad
  - Ramot de Galaad
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado y se vierte la relación geográfica con una preposición natural en español. 'Galaad' es la forma habitual en español bíblico.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras comunes
  - su terreno circundante
  - sus dehesas
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere al terreno adyacente asignado a la ciudad, usado como espacio abierto y de pastoreo. 'Pastizales' comunica bien esa función sin perder la referencia territorial.
- source_word: מַחֲנַיִם
  english_pob_choice: Mahanaim
  chosen_spanish: Mahanaim
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración, como en el inglés auditado.
theological_decisions:
- issue: Valor jurídico de רֹצֵחַ en la ciudad de refugio
  english_pob_reading: the manslayer
  chosen_spanish_reading: el homicida
  alternative_spanish_readings:
  - el asesino
  - el matador
  rationale: La lista pertenece al marco legal de las ciudades de refugio, donde el término no debe endurecerse automáticamente como 'asesino'. 'Homicida' preserva la tensión entre muerte causada y posible ausencia de premeditación.
  doctrine_reference: Nm 35; Dt 19; Jos 20
- issue: Término técnico para מִגְרָשׁ
  english_pob_reading: pasturelands
  chosen_spanish_reading: pastizales
  alternative_spanish_readings:
  - tierras de pasto
  - terreno común
  - tierras circundantes
  rationale: El término designa la franja de terreno ligada a la ciudad, no solo un pasto agrícola aislado. 'Pastizales' es una solución breve y comprensible en español que conserva la dimensión de uso comunitario y ganadero.
  doctrine_reference: Lv 25:34; Nm 35:2-5
translation_notes:
  revision_awareness: 'El pasaje se mantiene sin cambios respecto al último control de revisión: alta concordancia con el texto fuente y con el audit trail inglés. No se detectaron ajustes necesarios en esta pasada.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se prefiere 'homicida' sobre 'asesino' para respetar el contexto jurídico de la ciudad de refugio.
  - Se translitera 'Mahanaim' y 'Ramot' de modo consistente con el español bíblico y con el audit trail inglés.
  - Se evita el calco rígido de 'pasturelands' y se opta por una forma española natural que mantiene el sentido territorial.
