revisions:
- from: Y Caldea[a] será para saqueo; todos los que la saqueen quedarán saciados[b], dice Yahvé.
  to: Y Caldea[a] se convertirá en botín; todos los que la saqueen se hartarán[b], dice Yahvé.
  rationale: Se ajusta «será para saqueo» a «se convertirá en botín» para reflejar mejor el valor resultativo de וְהָיְתָה y una expresión española más natural para לְשָׁלָל. Se cambia «quedarán saciados» por «se hartarán» para representar con más viveza e idiomaticidad el sentido contextual de יִשְׂבָּעוּ (‘tener su llenura’ de botín), manteniendo la alternativa más literal en nota. También se afina la redacción de la nota a para mayor precisión gramatical.
