revisions:
- from: Vio que el lugar de descanso era bueno[a], y que la tierra era agradable, así que inclinó su hombro para cargar, y llegó a ser un siervo para trabajo forzado[b].
  to: Vio que el lugar de descanso era bueno[a], y que la tierra era agradable, así que inclinó su hombro para llevar cargas, y quedó sometido a trabajos forzados[b].
  rationale: Se ajustó el español para que sea más natural y fiel al hebreo sin sobreinterpretar la condición social exacta de Isacar. 'Quedó sometido a trabajos forzados' expresa bien לְמַס עֹבֵד en español contemporáneo legible para iglesia, mientras la nota preserva las alternativas interpretativas documentadas. 'Para llevar cargas' mantiene la imagen corporal del hombro y la idea de soportar una carga.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:04:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: Isacar ve un lugar/descanso bueno y una tierra agradable, se somete a la carga y termina en condición de servicio forzado. Sin embargo, la cláusula final en español suena poco idiomática (''siervo para trabajo forzado'') y el matiz de לְמַס עֹבֵד se expresa mejor con una formulación más natural como ''quedó sometido a trabajos forzados'', manteniendo la ambigüedad social en nota.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos mejoras importantes: (1) ''para cargar'' puede afinarse a ''para llevar cargas'', que conecta mejor con el gesto del hombro y el infinitivo לִסְבֹּל; (2) ''llegó a ser un siervo para trabajo forzado'' es torpe en español e innecesariamente calcada del inglés. ''Quedó sometido a trabajos forzados[b]'' lee con más naturalidad y conserva el sentido central.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo evitar elecciones poco justificadas para עֹבֵד. Dado que el inglés auditado ya evitó 'slave' en el texto principal por la ambigüedad de מַס, conviene no fijar 'esclavo' en el texto principal español. 'Siervo' aquí tampoco es ideal por naturalidad. La nota debe conservar las alternativas 'siervo tributario' y 'esclavo sometido a trabajos forzados' o equivalente, además de mencionar corvea.
  issues:
  - severity: medium
    issue: La frase 'un siervo para trabajo forzado' es poco idiomática en español.
    rationale: Aunque refleja de cerca el inglés revisado, en español suena forzada y calcada. El hebreo describe quedar bajo servicio/corvea; una formulación verbal como 'quedó sometido a trabajos forzados' comunica mejor el sentido.
  - severity: low
    issue: '''para cargar'' es algo escueta y puede perder el vínculo con la imagen de llevar una carga sobre el hombro.'
    rationale: לִסְבֹּל en este contexto se entiende como llevar/soportar carga. 'Para llevar cargas' suena más natural y concreta en español.
  - severity: low
    issue: La nota b usa 'corvea' sin tilde.
    rationale: En español corresponde 'corvea'. Además conviene mantener una redacción más natural en las alternativas.
  revised_spanish_text: Vio que el lugar de descanso era bueno[a], y que la tierra era agradable, así que inclinó su hombro para llevar cargas, y quedó sometido a trabajos forzados[b].
  revised_footnotes:
  - marker: a
    text: O ‘descanso’. El hebreo מְנֻחָה puede significar ‘descanso’ o ‘lugar de descanso’.
    reason: lexical_alternative
  - marker: b
    text: O ‘llegó a ser un siervo tributario’ o ‘un esclavo sometido a trabajos forzados’. El hebreo לְמַס עֹבֵד es debatido; מַס suele referirse a trabajo forzado o corvea.
    reason: alternative_reading
  revision_rationale: Se ajustó el español para que sea más natural y fiel al hebreo sin sobreinterpretar la condición social exacta de Isacar. 'Quedó sometido a trabajos forzados' expresa bien לְמַס עֹבֵד en español contemporáneo legible para iglesia, mientras la nota preserva las alternativas interpretativas documentadas. 'Para llevar cargas' mantiene la imagen corporal del hombro y la idea de soportar una carga.
