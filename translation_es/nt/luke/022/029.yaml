translation:
  language: es
  text: Y yo les confiero un reino[a], así como mi Padre me confirió uno[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo les pacto un reino … así como mi Padre me pactó uno». El verbo griego puede tener fuerza pactual o de disposición, además del sentido de conferir o asignar.'
    reason: alternative_reading
  - marker: b
    text: 'O: «les asigno un reino, así como mi Padre me asignó uno».'
    reason: previous_rendering
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo también
  - Yo también
  lexicon: BDAG
  rationale: La crasis añade conexión y énfasis personal; «Y yo» conserva la continuidad con el contexto inmediato sin sobrerrepresentar una suma explícita con «también».
- source_word: διατίθεμαι
  english_pob_choice: confer
  chosen_spanish: confiero
  alternatives_spanish:
  - otorgo
  - dispongo
  - establezco
  - hago un pacto
  lexicon: BDAG
  rationale: El verbo puede abarcar confesar/poner en disposición/establecer e incluso matices pactuales. En español, «confiero» expresa la acción formal de entregar o conceder una realeza sin imponer de entrada una formulación estrictamente pactual en el texto principal.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con objeto indirecto en español; «les» mantiene brevedad y fluidez en el discurso directo de Jesús.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  - igual que
  lexicon: BDAG
  rationale: «Así como» marca con claridad la comparación y conserva el paralelismo con el segundo miembro de la frase.
- source_word: διέθετό
  english_pob_choice: conferred
  chosen_spanish: confirió
  alternatives_spanish:
  - otorgó
  - dispuso
  - estableció
  - hizo un pacto
  lexicon: BDAG
  rationale: Mantener el mismo verbo en español preserva el paralelismo verbal del griego entre la acción de Jesús y la del Padre.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: BDAG
  rationale: 'Con «confirió» en español, el destinatario se expresa de forma natural con dativo clítico: «me».'
- source_word: ὁ πατήρ μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - el Padre mío
  - el Padre de mí
  lexicon: BDAG
  rationale: «Mi Padre» es la forma idiomática y reverente en español, y conserva la relación filial central del pasaje.
- source_word: βασιλείαν
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - un reinado
  - un reino real
  - la realeza
  lexicon: BDAG
  rationale: El sustantivo anarthro singular se vierte naturalmente como «un reino». En este contexto también puede implicar dominio/regencia, pero «reino» es la forma más transparente y sobria en español.
theological_decisions:
- issue: Si traducir διατίθεμαι con lenguaje explícitamente pactual en el texto principal
  english_pob_reading: The main text uses 'confer' and footnotes the covenantal possibility.
  chosen_spanish_reading: El texto principal usa «confiero» y la nota conserva la posibilidad pactual.
  alternative_spanish_readings:
  - hago un pacto con ustedes
  - les establezco un pacto
  - les otorgo un reino
  rationale: El griego puede tener fuerza pactual o disposicional. Sin embargo, el contexto inmediato favorece la acción de conferir/establecer un reino. La nota permite conservar la tensión interpretativa sin forzar una lectura técnica de pacto en la línea principal.
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que prefería una estructura más natural y paralela; en español se conservó ese paralelismo con dos cláusulas breves y la repetición de «confirió», evitando una construcción forzada o elipsis poco clara.
  spanish_consistency_notes:
  - Se mantuvo «reino» para βασιλείαν, conforme al uso habitual y al registro del pasaje.
  - Se evitó «SEÑOR» para preservar la referencia explícita al Padre en el griego.
  - Se eligió un registro digno y moderno, sin arcaísmos innecesarios.
  - La nota sobre el posible matiz pactual se conserva porque el verbo griego lo permite y el contexto no lo excluye.
