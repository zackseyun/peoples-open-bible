translation:
  language: es
  text: Porque, ¿quién ha despreciado el día de las cosas pequeñas? Pues estos siete se alegrarán y verán la piedra de plomada[a] en la mano de Zorobabel; estos son los ojos de Yahvé, que recorren toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedra de estaño»; tradicionalmente, «la plomada» o «el plomo de plomada». El término hebreo puede denotar estaño, pero en este contexto de construcción probablemente se refiere a un peso o piedra de plomada.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַז
  english_pob_choice: has despised
  chosen_spanish: ha despreciado
  alternatives_spanish:
  - ha menospreciado
  - ha desechado
  lexicon: HALOT
  rationale: El verbo expresa tratar algo como insignificante o indigno de aprecio. «Ha despreciado» conserva la fuerza retórica de la pregunta, con un español natural y digno.
- source_word: לְיוֹם קְטַנּוֹת
  english_pob_choice: the day of small things
  chosen_spanish: el día de las cosas pequeñas
  alternatives_spanish:
  - el día de las pequeñas cosas
  - el día de los comienzos pequeños
  lexicon: HALOT
  rationale: 'Se mantiene la imagen concreta del hebreo («día» + «cosas pequeñas») sin convertirla de entrada en una interpretación más explicativa como «comienzos». '
- source_word: וְשָׂמְחוּ
  english_pob_choice: will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se gozarán
  - se regocijarán
  lexicon: HALOT
  rationale: En este contexto futuro/resultativo, el español «se alegrarán» comunica bien la reacción esperada ligada a la visión siguiente.
- source_word: וְרָאוּ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - y verán
  - cuando vean
  lexicon: HALOT
  rationale: Se conserva el segundo verbo de la secuencia verbal; el español coordinado reproduce la relación estrecha entre alegrarse y ver.
- source_word: הָאֶבֶן הַבְּדִיל
  english_pob_choice: the plumb stone
  chosen_spanish: la piedra de plomada
  alternatives_spanish:
  - la piedra de plomo
  - el plomo de plomada
  - el plomada
  lexicon: HALOT
  rationale: En este contexto de construcción, בְּדִיל probablemente señala una herramienta o peso de plomada, no simplemente «estaño». «Piedra de plomada» mantiene la imagen del objeto medidor y evita una explicación excesiva en el texto principal.
- source_word: בְּיַד זְרֻבָּבֶל
  english_pob_choice: in the hand of Zerubbabel
  chosen_spanish: en la mano de Zorobabel
  alternatives_spanish:
  - en la mano de Zerubabel
  - en manos de Zorobabel
  lexicon: HALOT
  rationale: Se conserva la construcción hebrea literal, que subraya el papel activo de Zorobabel en la escena visionaria.
- source_word: שִׁבְעָה אֵלֶּה
  english_pob_choice: these seven
  chosen_spanish: estos siete
  alternatives_spanish:
  - aquellos siete
  - esos siete
  lexicon: HALOT
  rationale: El demostrativo remite a los siete ya presentes en la visión; «estos» conserva bien esa referencia deíctica.
- source_word: עֵינֵי יְהוָה
  english_pob_choice: the eyes of Yahweh
  chosen_spanish: los ojos de Yahvé
  alternatives_spanish:
  - los ojos de Yahveh
  - los ojos del Señor
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, usando «Yahvé» en lugar de una sustitución por título.
- source_word: מְשׁוֹטְטִים בְּכָל הָאָרֶץ
  english_pob_choice: ranging through all the earth
  chosen_spanish: que recorren toda la tierra
  alternatives_spanish:
  - que van de un lado a otro por toda la tierra
  - que andan por toda la tierra
  lexicon: HALOT
  rationale: El participio expresa movimiento activo y continuo por toda la tierra. «Recorren» comunica bien esa extensión sin sonar arcaico.
theological_decisions:
- issue: Identidad de «estos siete»
  english_pob_reading: Appositional link to the eyes of Yahweh within the visionary symbolism.
  chosen_spanish_reading: «Estos siete» queda unido a «los ojos de Yahvé» como explicación simbólica.
  alternative_spanish_readings:
  - «Estos siete» se refiere primero a siete lámparas y luego a los ojos de Yahvé
  - «Estos siete» alude a agentes celestiales distintos de los ojos de Yahvé
  rationale: La sintaxis hebrea coloca la expresión inmediatamente antes de «los ojos de Yahvé», lo que favorece una relación appositiva. La traducción no sobreespecifica el símbolo y deja intacta la tensión interpretativa del pasaje.
  doctrine_reference: Zacarías 4:10; simbolismo visionario de los ojos de Yahvé
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto fuente usa el Tetragrámaton; se mantiene la forma «Yahvé» conforme a la política del proyecto para preservar el nombre divino personal.
  doctrine_reference: Éxodo 3:14-15; uso del nombre divino en el AT
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que añadió explícitamente «and will see» para reflejar ambos verbos del hebreo. La frase española conserva esa doble acción con «se alegrarán y verán». También se preservó la decisión auditada de entender הַבְּדִיל en contexto de construcción como una piedra/peso de plomada, sin traducirla mecánicamente como «estaño» en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Zorobabel» sigue la adaptación española habitual del nombre propio.
  - 'La secuencia verbal mantiene dos acciones: «se alegrarán y verán».'
  - El orden del texto conserva la estructura del hebreo sin forzar una paráfrasis interpretativa.
