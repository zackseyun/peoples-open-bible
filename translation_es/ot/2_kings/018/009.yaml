translation:
  language: es
  text: Y aconteció en el cuarto año del rey Ezequías, que era el séptimo año de Oseas hijo de Ela, rey de Israel, que Salmanasar, rey de Asiria, marchó contra Samaria y la sitió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  - Y vino a suceder
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce un hecho histórico; «aconteció» conserva bien la función discursiva solemne sin sonar arcaico en exceso.
- source_word: בַּשָּׁנָה הָרְבִיעִית
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - en año cuatro
  lexicon: HALOT
  rationale: Es una fórmula cronológica de reinado; «en el cuarto año» es la forma natural y precisa en español.
- source_word: לַמֶּלֶךְ חִזְקִיָּהוּ
  english_pob_choice: of King Hezekiah
  chosen_spanish: del rey Ezequías
  alternatives_spanish:
  - del rey Hezequías
  - de Ezequías el rey
  lexicon: HALOT
  rationale: El lamed señala el marco regnal. En español, «del rey Ezequías» expresa con claridad la relación de datación.
- source_word: הִיא
  english_pob_choice: which was
  chosen_spanish: que era
  alternatives_spanish:
  - el cual era
  - y era
  lexicon: HALOT
  rationale: El pronombre resumptivo enlaza los dos sincronismos cronológicos; «que era» mantiene la relación sin sobrecargar la sintaxis.
- source_word: הַשָּׁנָה הַשְּׁבִיעִית לְהוֹשֵׁעַ בֶּן־אֵלָה מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the seventh year of Hoshea son of Elah, king of Israel
  chosen_spanish: el séptimo año de Oseas hijo de Ela, rey de Israel
  alternatives_spanish:
  - el séptimo año para Oseas hijo de Ela, rey de Israel
  lexicon: HALOT
  rationale: Se conserva el doble sincronismo regnal con la misma estructura natural en español. «De Oseas hijo de Ela, rey de Israel» refleja el constructo sin añadir explicaciones.
- source_word: עָלָה
  english_pob_choice: came up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - marchó contra
  - vino contra
  lexicon: HALOT
  rationale: En contexto militar, עלה puede significar avanzar en campaña contra una ciudad. «Subió contra» mantiene la imagen semítica y el sentido bélico del verbo.
- source_word: שַׁלְמַנְאֶסֶר
  english_pob_choice: Shalmaneser
  chosen_spanish: Salmanasar
  alternatives_spanish:
  - Salmanasar
  - Shalmanasar
  lexicon: HALOT
  rationale: Se adopta la transliteración española tradicionalmente inteligible para el nombre asirio, manteniendo la identificación histórica.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: 'El título y el reino se vierten de modo estándar en español histórico: «rey de Asiria».'
- source_word: עַל שֹׁמְרוֹן
  english_pob_choice: against Samaria
  chosen_spanish: contra Samaria
  alternatives_spanish:
  - sobre Samaria
  - a Samaria
  lexicon: HALOT
  rationale: Con el verbo de movimiento militar, עַל expresa hostilidad hacia el objetivo. «Contra Samaria» comunica esa fuerza adversativa con naturalidad.
- source_word: וַיָּצַר עָלֶיהָ
  english_pob_choice: and besieged it
  chosen_spanish: y la sitió
  alternatives_spanish:
  - y puso sitio a ella
  - y la cercó
  lexicon: HALOT
  rationale: צור en este contexto denota asedio militar. «La sitió» es la forma más directa, precisa y sobria en español.
translation_notes:
  revision_awareness: El texto inglés auditado está en acuerdo alto con el hebreo y no presenta cambios revisionarios; la versión española sigue la misma lectura base sin introducir variantes textuales ni decisiones doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera del versículo porque no aparece en el hebreo.
  - Se conserva el nombre del rey asirio en forma española inteligible («Salmanasar») por consistencia histórica y lectoría eclesial.
  - Se usa la misma estructura de sincronismo regnal que el hebreo, con puntuación que ayuda a leer las dos dataciones consecutivas.
  - No se añaden notas al pie porque el versículo no requiere variantes textuales ni alternativas lexicográficas imprescindibles.
