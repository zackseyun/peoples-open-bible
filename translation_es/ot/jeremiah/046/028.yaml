base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/046/028.yaml
  text: But you[a], do not fear, my servant Jacob, declares Yahweh, for I am with you. For I will make a full end of all the nations where I have driven you, but of you I will not make a full end. Yet I will discipline you with justice[b], and I will by no means leave you unpunished.
  footnotes:
  - marker: a
    text: Or 'I will not completely destroy you.' The Hebrew repeats 'make a full end' for rhetorical contrast between the nations and Jacob.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will certainly not acquit you.' The Hebrew can carry the forensic sense 'declare innocent,' though here it also implies not leaving Jacob without due punishment.
    reason: lexical_alternative
