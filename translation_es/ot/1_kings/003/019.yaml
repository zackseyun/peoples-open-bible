translation:
  language: es
  text: Y murió el hijo de esta mujer en la noche[a][b], porque se acostó sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de noche».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que/cuando se acostó sobre él»; aquí la cláusula se vierte causalmente porque el contexto muestra que acostarse sobre él fue la causa de su muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: And ... died
  chosen_spanish: Y murió
  alternatives_spanish:
  - Y falleció
  - Y estaba muerto
  lexicon: HALOT
  rationale: El wayyiqtol narra un hecho pasado; en español bíblico y moderno, «murió» comunica de forma natural e inmediata el evento sin añadir matices no presentes en el hebreo.
- source_word: בֶּן
  english_pob_choice: son
  chosen_spanish: el hijo
  alternatives_spanish:
  - el niño
  - el muchacho
  lexicon: HALOT
  rationale: בֶּן significa específicamente «hijo». En español, «hijo» preserva la especificidad semántica mejor que «niño», que sería más interpretativo.
- source_word: הָאִשָּׁה הַזֹּאת
  english_pob_choice: this woman's
  chosen_spanish: de esta mujer
  alternatives_spanish:
  - de esta mujer que
  - de la mujer esta
  lexicon: HALOT
  rationale: La construcción de relación se vierte de manera natural como «de esta mujer». Se conserva la referencia deíctica de הַזֹּאת sin forzar una estructura posesiva inglesa.
- source_word: לָיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - durante la noche
  lexicon: HALOT
  rationale: El acusativo temporal indica el momento de la muerte. «En la noche» mantiene con bastante cercanía el valor temporal y suena digno en español.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - cuando
  - ya que
  lexicon: HALOT
  rationale: Aunque אֲשֶׁר es formalmente relativo, el contexto causal hace que la relación explicativa sea la que mejor se entiende en la frase. «Porque» expresa esa relación sin perder la conexión con la causa narrada.
- source_word: שָׁכְבָה עָלָיו
  english_pob_choice: she lay on him
  chosen_spanish: se recostó sobre él
  alternatives_spanish:
  - se acostó sobre él
  - durmió sobre él
  lexicon: HALOT
  rationale: שָׁכַב con עַל indica estar acostada o recostada encima de alguien. «Se recostó sobre él» comunica la presión física causal de manera natural en español y evita sugerir algo más específico que el hebreo no exige.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el texto inglés final se mantiene con alta concordancia y la causalidad de אֲשֶׁר se conserva como decisión interpretativa ya documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «hijo» para בֶּן por precisión léxica.
  - Se optó por «porque» para reflejar la relación causal aceptada en el POB inglés.
  - «En la noche» conserva el valor temporal, mientras la nota admite la alternativa idiomática «de noche».
  - «Se recostó sobre él» preserva la imagen corporal causal sin introducir la idea de dormir, que sería más específica.
