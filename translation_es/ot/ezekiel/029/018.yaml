base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/018.yaml
  text: Son of man[a], Nebuchadnezzar king of Babylon made his army labor greatly against Tyre; every head was made bald and every shoulder was rubbed bare[c][b], yet there was no pay for him or for his army from Tyre for the labor that he had performed against it.
  footnotes:
  - marker: a
    text: Or 'Mortal' for 'Son of man,' a common address to Ezekiel; the Hebrew is literally 'son of man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'great labor' or 'hard service.'
    reason: lexical_alternative
  - marker: c
    text: The imagery of every head made bald and every shoulder rubbed bare likely reflects the physical strain of siege labor.
    reason: cultural_note
