revisions:
- from: Ahora Jacob habitó en la tierra de las moradas de su padre[a], en la tierra de Canaán.
  to: Ahora Jacob habitó en la tierra donde su padre había vivido como forastero[a], en la tierra de Canaán.
  rationale: Se reemplaza «de las moradas de su padre» por «donde su padre había vivido como forastero» para preservar el sentido de מְגוּרֵי con español natural y claro. Se mantiene en la nota una alternativa más formal, cercana a la estructura del original y del rastro de auditoría inglés, usando «sojornos» solo como opción más literal y no como texto principal por su menor naturalidad en español.
