translation:
  language: es
  text: Y Tobit, su padre, contaba cada día[a]; y cuando se cumplieron los días del viaje y no volvían[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no venían». El imperfecto griego puede expresar que todavía no habían llegado después de haber pasado el tiempo esperado del viaje; en contexto, esto implica que no regresaban a casa según lo previsto.'
    reason: lexical_alternative
  - marker: b
    text: La tradición paralela semítica amplía la escena al mencionar el cómputo de días y noches y la angustia de los padres, pero la traducción principal aquí sigue la redacción más breve del griego, que es la fuente primaria.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλογίζετο
  english_pob_choice: counted
  chosen_spanish: lo contaba
  alternatives_spanish:
  - lo iba contando
  - lo calculaba
  - lo llevaba contando
  lexicon: BDAG
  rationale: En este contexto temporal, el verbo expresa el acto concreto de ir llevando la cuenta de los días. «Lo contaba» conserva esa acción simple y natural en español sin volver abstracto el sentido.
- source_word: ἑκάστης ἡμέρας
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: LSJ
  rationale: «Cada día» reproduce con claridad el valor distributivo de la expresión griega y suena natural en español bíblico contemporáneo.
- source_word: ἐπληρώθησαν
  english_pob_choice: were completed
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - se completaron
  - llegaron a su término
  - se terminaron
  lexicon: BDAG
  rationale: Para el tiempo transcurrido, «se cumplieron» mantiene la idea de que el plazo esperado llegó a su fin, sin imponer un tono excesivamente teológico.
- source_word: αἱ ἡμέραι τῆς πορείας
  english_pob_choice: the days of the journey
  chosen_spanish: los días del viaje
  alternatives_spanish:
  - los días para el viaje
  - el tiempo del viaje
  - los días del camino
  lexicon: LSJ
  rationale: «Los días del viaje» es la equivalencia más directa y idiomática para el período esperado de la travesía.
- source_word: οὐκ ἤρχοντο
  english_pob_choice: they were not coming back
  chosen_spanish: ellos no volvían
  alternatives_spanish:
  - no venían
  - no regresaban
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción/no-llegada todavía en curso. «No volvían» conserva el matiz de retorno esperado y evita decidir de manera demasiado puntual entre venir o regresar.
- source_word: Τωβεὶτ ὁ πατὴρ αὐτοῦ
  english_pob_choice: Tobit his father
  chosen_spanish: Tobit, su padre,
  alternatives_spanish:
  - Tobit, el padre de él,
  - su padre Tobit,
  lexicon: LSJ
  rationale: 'La apposición se aclara con comas en español: «Tobit, su padre,» preserva la relación de parentesco sin alterar el orden del original más de lo necesario.'
theological_decisions:
- issue: El sentido del verbo imperfecto final (ausencia/retorno esperado)
  english_pob_reading: The imperfect can denote that they had still not arrived after the expected time for the journey had passed; in context this implies not returning home on schedule.
  chosen_spanish_reading: «ellos no volvían» mantiene la expectativa incumplida de regreso al hogar tras el tiempo previsto del viaje.
  alternative_spanish_readings:
  - ellos no venían
  - ellos no regresaban
  rationale: 'No hay una afirmación doctrinal en juego, pero sí una tensión aspectual importante: el griego imperfecto no describe solo un hecho puntual, sino una espera aún insatisfecha. La redacción española conserva esa apertura temporal.'
  doctrine_reference: Aspecto verbal griego / narración bíblica
- issue: Escena breve frente a la ampliación de la tradición semítica paralela
  english_pob_reading: The Semitic parallel tradition expands the scene ... but the main translation here follows the shorter Greek wording of the primary source.
  chosen_spanish_reading: La traducción principal sigue la forma breve del griego y no incorpora la ampliación paralela.
  alternative_spanish_readings:
  - Incluir la ampliación de días y noches
  - fusionar ambas tradiciones en una sola redacción
  rationale: El POB inglés prioriza el testimonio griego principal y reconoce la ampliación paralela solo como nota. El español mantiene esa misma decisión metodológica y no mezcla tradiciones en el cuerpo del texto.
  doctrine_reference: Crítica textual / prioridad de la fuente base
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el texto español se ajusta directamente al griego de Swete con la misma decisión de traducción óptima y la misma nota de alternativa aspectual para el imperfecto final.
  spanish_consistency_notes:
  - Se mantiene «Tobit» como nombre propio sin traducir.
  - Se usa «viaje» para πορείας siguiendo el valor temporal del trayecto esperado.
  - No se introduce «Señor» ni terminología teológica no presente en el versículo.
  - Las notas al pie en español preservan la alternativa aspectual del imperfecto, equivalente a la observación del POB inglés.
