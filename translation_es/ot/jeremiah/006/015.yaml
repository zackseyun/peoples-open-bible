translation:
  language: es
  text: ¿Se avergonzaron porque hicieron una abominación? No, no se avergonzaron en absoluto; ni siquiera sabían cómo sonrojarse. Por tanto, caerán entre los caídos; cuando yo los castigue[a], tropezarán, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando yo los visite». El verbo hebreo puede significar «visitar» o «atender», pero aquí lleva el sentido de visita punitiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישׁוּ
  english_pob_choice: Were they ashamed
  chosen_spanish: ¿Se avergonzaron?
  alternatives_spanish:
  - ¿Estuvieron avergonzados?
  - ¿Sintieron vergüenza?
  lexicon: HALOT
  rationale: El hebreo funciona como pregunta retórica en contexto. En español, el pretérito refleja esa pregunta de manera natural y mantiene la ironía profética.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón esperada para la vergüenza: habían hecho algo detestable.'
- source_word: תוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - una cosa abominable
  - algo detestable
  lexicon: HALOT
  rationale: «Abominación» conserva la fuerza moral y cultual del término profético sin debilitarlo a una paráfrasis más suave.
- source_word: עָשׂוּ
  english_pob_choice: they had done
  chosen_spanish: hicieron
  alternatives_spanish:
  - habían hecho
  - cometieron
  lexicon: HALOT
  rationale: El español puede expresar el antecedente perfecto con el pretérito simple en una pregunta retórica, sin perder el sentido de acción ya cumplida.
- source_word: גַּם בּוֹשׁ לֹא יֵבֹשׁוּ
  english_pob_choice: they were not ashamed at all
  chosen_spanish: no se avergonzaron en absoluto
  alternatives_spanish:
  - no se avergonzaron ni un poco
  - ni siquiera se avergonzaron
  lexicon: HALOT
  rationale: La construcción intensiva se vierte con una negación enfática y natural en español.
- source_word: הַכְלִים
  english_pob_choice: to blush
  chosen_spanish: sonrojarse
  alternatives_spanish:
  - ruborizarse
  - avergonzarse
  lexicon: HALOT
  rationale: En paralelo con בוש, el verbo expresa la manifestación visible de vergüenza. «Sonrojarse» comunica bien esa imagen corporal en español actual.
- source_word: לֹא יָדָעוּ
  english_pob_choice: they did not even know
  chosen_spanish: ni siquiera supieron
  alternatives_spanish:
  - no sabían
  - ni siquiera conocían
  lexicon: HALOT
  rationale: La idea no es simple ignorancia factual, sino que carecían hasta de la capacidad o el recurso para sonrojarse; «ni siquiera supieron» conserva esa fuerza idiomática.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca con claridad la consecuencia judicial que sigue a la shamelessness anterior.
- source_word: יִפְּלוּ בַנֹּפְלִים
  english_pob_choice: they will fall among the fallen
  chosen_spanish: caerán entre los caídos
  alternatives_spanish:
  - caerán con los que caen
  - caerán entre los que caen
  lexicon: HALOT
  rationale: Se conserva la imagen poética y la repetición de la raíz de «caer» en una forma natural para el español.
- source_word: בְּעֵת פְּקַדְתִּים
  english_pob_choice: at the time I punish them
  chosen_spanish: al tiempo en que yo los castigue
  alternatives_spanish:
  - cuando yo los visite
  - en el tiempo en que los atienda
  lexicon: HALOT
  rationale: En contexto judicial, פקד comunica visita punitiva. En español, «castigue» deja explícito ese sentido sin perder la relación con la alternativa literal.
- source_word: יִכָּשְׁלוּ
  english_pob_choice: they will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - se tambalearán
  - caerán
  lexicon: HALOT
  rationale: El verbo expresa fracaso o derrumbe bajo juicio; «tropezarán» es la equivalencia directa más idiomática en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en vez de sustituirlo por un título.
theological_decisions:
- issue: Sentido de פקד en contexto de juicio
  english_pob_reading: at the time I punish them
  chosen_spanish_reading: al tiempo en que yo los castigue
  alternative_spanish_readings:
  - cuando yo los visite
  - en el tiempo en que los atienda
  rationale: El contexto inmediato habla de vergüenza, caída y tropiezo; por eso la visita divina se entiende como intervención punitiva. La traducción conserva esa lectura sin eliminar la ambigüedad lexical de base.
  doctrine_reference: 'Translation philosophy: original-language primacy; judgment-context rendering'
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se mantiene el nombre propio divino conforme al estándar del POB en español, evitando la sustitución por una designación genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y conserva el paralelismo y la tensión léxica de בוש / הכלים, así como la ambigüedad de פקד resuelta en contexto judicial. No se identificaron revisiones aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «abominación» para תוֹעֵבָה por coherencia con el léxico profético del proyecto.
  - «Sonrojarse» preserva la imagen corporal del segundo miembro poético sin caer en una explicación excesiva.
  - «Caerán entre los caídos» conserva el paralelismo y la repetición verbal del hebreo.
