    text: Or 'had been killed by a human plot and not by divine judgment.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says literally that Onias 'prayed something concerning him,' leaving somewhat open whether the prayer was for Apollonius or about the matter involving him.
    reason: alternative_reading
