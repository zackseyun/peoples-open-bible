id: 2TI.3.4
reference: 2 Timothy 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: προδόται, προπετεῖς, τετυφωμένοι, φιλήδονοι μᾶλλον ἢ φιλόθεοι,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/004.yaml
  text: traitors, reckless, puffed up, lovers of pleasure rather than lovers of God,
translation:
  language: ko
  text: 배신하고, 무모하고, 우쭐대며, 하나님을 사랑하기보다 쾌락을 사랑할 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προδόται
  english_pob_choice: traitors
  chosen_korean: 배신하고
  alternatives_korean:
  - 배반하고
  - 변절하고
  lexicon: BDAG
  rationale: προδότης는 「배신자」. 본 절의 동사적 운율 흐름에 맞춰 「배신하고」로 옮긴다.
- source_word: προπετεῖς
  english_pob_choice: reckless
  chosen_korean: 무모하고
  alternatives_korean:
  - 경솔하고
  - 성급하고
  lexicon: BDAG
  rationale: προπετής는 「앞으로 쏠리듯 성급한·무모한」. 「무모하다」가 자연스럽다.
- source_word: τετυφωμένοι
  english_pob_choice: puffed up
  chosen_korean: 우쭐대며
  alternatives_korean:
  - 우쭐해 있고
  - 거들먹거리며
  lexicon: BDAG
  rationale: τυφόομαι는 「(연기처럼) 부풀려져 자만에 빠진」. 「우쭐대다」가 한국어로 자연스럽다.
- source_word: φιλήδονοι μᾶλλον ἢ φιλόθεοι
  english_pob_choice: lovers of pleasure rather than lovers of God
  chosen_korean: 하나님을 사랑하기보다 쾌락을 사랑할 것입니다
  alternatives_korean:
  - 하나님보다 쾌락을 더 사랑하고
  - 향락을 사랑하기를 하나님 사랑하는 것보다 더하고
  lexicon: BDAG
  rationale: 두 합성어(쾌락 사랑/하나님 사랑)의 대비를 한국어 어순에 맞춰 「하나님을 사랑하기보다 쾌락을 사랑하다」로 옮긴다. 3:2의 시작(「자기를 사랑하고」)으로부터 이어진 사랑의 그릇된 대상 목록을 마무리하는 절이다.
