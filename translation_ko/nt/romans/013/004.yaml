id: ROM.13.4
reference: Romans 13:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: θεοῦ γὰρ διάκονός ἐστιν σοὶ εἰς τὸ ἀγαθόν. ἐὰν δὲ τὸ κακὸν ποιῇς, φοβοῦ· οὐ γὰρ εἰκῇ τὴν μάχαιραν φορεῖ· θεοῦ γὰρ διάκονός ἐστιν, ἔκδικος εἰς ὀργὴν τῷ τὸ κακὸν πράσσοντι.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/004.yaml
  text: For it is God's servant for your good. But if you do what is evil, be afraid, for it does not bear the sword for nothing. For it is God's servant, an avenger for wrath against the one who practices evil.
translation:
  language: ko
  text: 이는 그것이 당신의 유익을 위한 하나님의 일꾼이기 때문입니다. 그러나 당신이 악을 행하면 두려워하십시오. 그것이 공연히 칼을 차고 있지 않기 때문입니다. 그것은 하나님의 일꾼으로서, 악을 행하는 자에게 진노를 위한 보응자입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「악을 행하는 자에게 진노를 집행하는 자」. 헬라어 ἔκδικος εἰς ὀργὴν은 보응적 정의를 위한 대리자임을 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: διάκονός
  english_pob_choice: servant
  chosen_korean: 일꾼
  alternatives_korean:
  - 종
  - 봉사자
  lexicon: BDAG
  rationale: 본 문맥의 διάκονος는 통치 권세를 가리키므로 교회 직제의 「집사」나 매임의 「노예」가 아니다. 시민적 대리자 의미를 살려 「일꾼」으로 옮긴다. 정책 글로사리는 διάκονος→집사를 교회 직제 문맥으로 한정한다.
- source_word: σοὶ εἰς τὸ ἀγαθόν
  english_pob_choice: for your good
  chosen_korean: 당신의 유익을 위한
  alternatives_korean:
  - 당신에게 선을 위한
  lexicon: BDAG
  rationale: 여격 σοὶ가 유익의 대상을 표시하고 εἰς τὸ ἀγαθόν이 목적을 표시한다. 「당신의 유익을 위한」으로 두 의미를 자연스럽게 결합한다.
- source_word: φοβοῦ
  english_pob_choice: be afraid
  chosen_korean: 두려워하십시오
  alternatives_korean:
  - 두려워하라
  lexicon: BDAG
  rationale: 중간/수동태 명령형을 합쇼체로 옮긴다. 권세의 형벌적 역할에 대한 두려움을 가리킨다.
- source_word: εἰκῇ
  english_pob_choice: for nothing
  chosen_korean: 공연히
  alternatives_korean:
  - 헛되이
  - 까닭 없이
  lexicon: BDAG
  rationale: 부사 εἰκῇ는 「목적 없이」를 뜻한다. 「공연히」가 자연스럽고 칼의 형벌적 무게를 살린다.
- source_word: μάχαιραν φορεῖ
  english_pob_choice: bear the sword
  chosen_korean: 칼을 차고 있다
  alternatives_korean:
  - 칼을 휴대하다
  - 칼을 지니다
  lexicon: BDAG
  rationale: '핵심 사법적 상징 「칼」을 보존한다. φορέω는 습관적·지속적 휴대를 가리키므로 「차고 있다」가 자연스럽다.'
- source_word: ἔκδικος
  english_pob_choice: an avenger
  chosen_korean: 보응자
  alternatives_korean:
  - 보수자
  - 정의를 집행하는 자
  lexicon: BDAG
  rationale: ἔκδικος는 보수적 정의를 집행하는 자다. 「보응자」가 보수적 의미를 보존한다.
- source_word: εἰς ὀργὴν
  english_pob_choice: for wrath
  chosen_korean: 진노를 위한
  alternatives_korean:
  - 진노를 위해
  - 형벌을 위한
  lexicon: BDAG
  rationale: 목적·결과의 εἰς. 「하나님의 진노」로 한정하지 않고 본문의 압축된 표현을 보존한다.
- source_word: τῷ τὸ κακὸν πράσσοντι
  english_pob_choice: against the one who practices evil
  chosen_korean: 악을 행하는 자에게
  alternatives_korean:
  - 악을 일삼는 자에게
  lexicon: BDAG
  rationale: πράσσω 현재 분사는 지속적 행함을 시사한다. 「행하는 자」가 자연스럽고 「일삼는」은 보다 강조적 대안.
theological_decisions:
- issue: 권세의 형벌적 역할과 신적 진노의 관계
  chosen_reading: εἰς ὀργήν을 「진노를 위한」으로 옮기되 본문에서 「하나님의 진노」로 못박지 않는다.
  alternative_readings:
  - 진노를 집행하는
  - 하나님의 진노를 가져오는
  - 형벌을 위한
  rationale: 문맥상 통치자는 형벌적 심판에서 하나님의 대리자로 기능하지만, 본문 자체는 「하나님의」를 명시 반복하지 않는다. 「진노를 위한」이 신학적 연결을 유지하면서 본문에 없는 교리적 설명을 더하지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
