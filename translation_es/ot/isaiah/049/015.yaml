translation:
  language: es
  text: ¿Acaso puede una mujer olvidar a su niño lactante[a], y dejar de compadecerse del hijo de su vientre? Aun estas pueden olvidar, pero yo no me olvidaré de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el niño de su vientre». Hebreo: «el hijo de su vientre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תִשְׁכַּח
  english_pob_choice: Can ... forget
  chosen_spanish: ¿Acaso puede ... olvidar?
  alternatives_spanish:
  - ¿Puede ... olvidar?
  - ¿Será que ... olvida?
  lexicon: HALOT
  rationale: La partícula interrogativa con imperfecto 3fs en hebreo expresa una pregunta retórica sobre una posibilidad casi inconcebible. En español, «¿Acaso puede...?» conserva mejor esa fuerza que una pregunta simple o una forma futura.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una madre
  - una esposa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mujer», no «madre». Aunque el contexto es materno, «una mujer» mantiene la palabra del texto fuente y deja que las frases siguientes expliciten la relación maternal.
- source_word: עוּלָהּ
  english_pob_choice: her nursing child
  chosen_spanish: su hijo que mama
  alternatives_spanish:
  - su niño lactante
  - su bebé que mama
  lexicon: HALOT
  rationale: Se preserva la imagen de dependencia alimentaria y afectiva. «Hijo que mama» suena natural en español y conserva el matiz de lactancia sin neutralizar el vínculo del original.
- source_word: מֵ/רַחֵם
  english_pob_choice: have no compassion
  chosen_spanish: dejar de compadecerse
  alternatives_spanish:
  - no tener compasión
  - no apiadarse
  lexicon: HALOT
  rationale: La construcción hebrea expresa la idea de cesar de tener compasión. «Dejar de compadecerse» reproduce bien ese valor aspectual y mantiene el campo semántico de רחם, sin volverlo una mera ausencia fría de sentimiento.
- source_word: בֶּן בִּטְנָהּ
  english_pob_choice: the son of her womb
  chosen_spanish: el hijo de su vientre
  alternatives_spanish:
  - el hijo de su seno
  - el hijo de su matriz
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «hijo». En español, «hijo de su vientre» conserva la imagen poética y el parentesco físico del original; «vientre» es más idiomático y transparente que una calca más cruda.
- source_word: גַּם אֵלֶּה
  english_pob_choice: Even these
  chosen_spanish: Aunque estas mujeres
  alternatives_spanish:
  - Aun estas
  - Incluso estas
  lexicon: HALOT
  rationale: La frase retoma a las mujeres recién mencionadas y funciona como concesión. «Aunque estas mujeres» expone con claridad la estructura concesiva en español y preserva el contraste retórico con la fidelidad divina.
- source_word: תִשְׁכַּחְנָה
  english_pob_choice: may forget
  chosen_spanish: lleguen a olvidarlo
  alternatives_spanish:
  - pueden olvidarlo
  - podrían olvidarlo
  lexicon: HALOT
  rationale: El imperfecto plural aquí expresa posibilidad dentro de la concesión, no certeza. «Lleguen a olvidarlo» transmite esa eventualidad sin afirmar que de hecho ocurra.
- source_word: וְ/אָנֹכִי
  english_pob_choice: yet I
  chosen_spanish: yo no
  alternatives_spanish:
  - pero yo
  - y yo
  lexicon: HALOT
  rationale: אָנֹכִי es enfático. En español, la contraposición queda suficientemente marcada por el giro final; se conserva el énfasis con el pronombre explícito «yo» y la negación enfática posterior.
- source_word: לֹא אֶשְׁכָּחֵךְ
  english_pob_choice: will not forget you
  chosen_spanish: no me olvidaré de ti
  alternatives_spanish:
  - no te olvidaré
  - jamás me olvidaré de ti
  lexicon: HALOT
  rationale: El hebreo usa la primera persona con objeto directo implícito de segunda persona; en español, la forma natural es «no me olvidaré de ti» para conservar el sentido relacional y la promesa personal. «Olvidarme de ti» expresa con precisión el valor idiomático del verbo en este contexto.
theological_decisions:
- issue: Imagen materna con lenguaje masculino en בֶּן בִּטְנָהּ
  english_pob_reading: the son of her womb
  chosen_spanish_reading: el hijo de su vientre
  alternative_spanish_readings:
  - el niño de su vientre
  - el hijo de su interior
  rationale: Se mantiene el masculino בן («hijo») como en el hebreo, sin neutralizarlo a «niño» en el texto principal. A la vez, «vientre» conserva la intensidad afectiva y corporal de la imagen bíblica.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Fuerza de la concesión en גַּם אֵלֶּה תִשְׁכַּחְנָה
  english_pob_reading: Even these may forget, yet I will not forget you
  chosen_spanish_reading: Aunque estas mujeres lleguen a olvidarlo, yo no me olvidaré de ti
  alternative_spanish_readings:
  - Aunque estas mujeres puedan olvidarlo, yo no me olvidaré de ti
  - Aun si estas mujeres lo olvidan, yo no me olvidaré de ti
  rationale: 'La cláusula hebrea presenta una concesión: aun el caso improbable de olvido materno no altera la fidelidad divina. La formulación elegida preserva esa tensión sin exagerar la probabilidad del olvido ni añadir matices doctrinales ajenos al texto.'
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 3 y 6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y la revisión más reciente no introdujo cambios. La principal decisión en español fue mantener el paralelismo retórico del hebreo con una concesión clara y un cierre de promesa personal, sin borrar el masculino explícito de בן ni el matiz de compasión de רחם.
  spanish_consistency_notes:
  - Se usó «Yahvé» en coherencia con el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «mujer» frente a «madre» para respetar el sustantivo hebreo אִשָּׁה.
  - Se mantuvo el lenguaje relacional con «olvidarme de ti» para reflejar el pronombre de segunda persona y la promesa directa.
  - Se evitó «siervo»/«Cristo»/terminología no pertinente al versículo.
