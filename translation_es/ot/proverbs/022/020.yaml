translation:
  language: es
  text: ¿No he escrito para ti treinta dichos de consejo y conocimiento?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No he escrito para ti antes de ahora acerca de consejo y conocimiento?». La palabra hebrea que aquí muchos entienden como «treinta» es difícil; también puede entenderse en sentido temporal, como «antes» o «anteriormente».'
    reason: alternative_reading
  - marker: b
    text: Las versiones tradicionales en inglés suelen leer «cosas excelentes» en vez de «treinta dichos». Esto refleja otra manera de entender la difícil expresión hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Have I not
  chosen_spanish: ¿No he... ?
  alternatives_spanish:
  - ¿Acaso no he... ?
  - ¿No he escrito...?
  lexicon: HALOT
  rationale: La pregunta retórica en hebreo espera respuesta afirmativa. En español, invertir el orden con «¿No he...?» conserva la fuerza interrogativa de manera natural y sobria.
- source_word: כָתַבְתִּי
  english_pob_choice: written
  chosen_spanish: he escrito
  alternatives_spanish:
  - escribí
  lexicon: HALOT
  rationale: 'El perfecto hebreo con relevancia presente se expresa bien con el pretérito perfecto compuesto en español: «he escrito». Mantiene el valor de acción completada con vigencia actual.'
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - por ti
  lexicon: HALOT
  rationale: En el contexto sapiencial, el ל indica beneficio o destinatario. «Para ti» transmite con naturalidad que el material fue compuesto para el provecho del lector.
- source_word: שלשום
  english_pob_choice: thirty sayings
  chosen_spanish: treinta dichos
  alternatives_spanish:
  - antes de ahora
  - anteriormente
  - dichos excelentes
  lexicon: HALOT
  rationale: Siguiendo la lectura adoptada por el POB inglés y su auditoría, se entiende el término difícil como alusivo a «treinta». «Dichos» preserva el sentido sapiencial de piezas breves o sentencias, más natural que un calco literal.
- source_word: בְּמוֹעֵצֹת
  english_pob_choice: of counsel
  chosen_spanish: de consejo
  alternatives_spanish:
  - de consejos
  - en consejos
  - acerca de consejo
  lexicon: HALOT
  rationale: El sustantivo עֵצָה remite a consejo, plan o instrucción. En español, «de consejo» mantiene la relación atributiva y evita una construcción pesada; «consejo» en singular funciona como sustantivo colectivo en este contexto.
- source_word: וָדָעַת
  english_pob_choice: and knowledge
  chosen_spanish: y conocimiento
  alternatives_spanish:
  - y saber
  - y entendimiento
  lexicon: HALOT
  rationale: דעת se traduce con fidelidad por «conocimiento», conservando el paralelismo con «consejo» y el registro característico de la literatura sapiencial.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustanciales: mantiene la lectura de «treinta» adoptada por la traducción inglesa POB y conserva en notas las alternativas históricas y textuales documentadas.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay el Tetragrámaton ni una cita del nombre divino en este versículo.
  - Se usa «dichos» para reflejar el carácter sapiencial de las unidades de enseñanza, sin introducir una paráfrasis interpretativa más amplia.
  - «Conocimiento» se mantiene como equivalente estable de דעת en contexto sapiencial, en paralelo con «consejo».
