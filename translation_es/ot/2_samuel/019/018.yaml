translation:
  language: es
  text: y mil hombres de Benjamín con él[a], y Siba, el siervo de la casa de Saúl, con sus quince hijos y sus veinte siervos; cruzaron el Jordán delante del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante el rey». La expresión hebrea puede significar tanto en presencia del rey como por delante de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף אִישׁ
  english_pob_choice: a thousand men
  chosen_spanish: mil hombres
  alternatives_spanish:
  - mil personas
  - mil tropas
  lexicon: HALOT
  rationale: En español, «hombres» conserva el valor masculino plural del hebreo y suena natural en un contexto de acompañantes varones; «personas» diluiría ese matiz, y «tropas» sería más interpretativo.
- source_word: מִבִּנְיָמִן
  english_pob_choice: from Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - de la tribu de Benjamín
  - procedentes de Benjamín
  lexicon: HALOT
  rationale: La forma breve «de Benjamín» preserva la afiliación tribal sin añadir explicación innecesaria; en español es idiomática y fiel al hebreo.
- source_word: צִיבָא
  english_pob_choice: Ziba
  chosen_spanish: Siba
  alternatives_spanish:
  - Ziba
  lexicon: convención onomástica española
  rationale: Se adopta «Siba» como forma española del nombre para lectura eclesial en español, manteniendo la referencia al mismo personaje.
- source_word: נַעַר בֵּית שָׁאוּל
  english_pob_choice: the servant of Saul’s house
  chosen_spanish: el servidor de la casa de Saúl
  alternatives_spanish:
  - el joven de la casa de Saúl
  - el siervo de la casa de Saúl
  lexicon: HALOT
  rationale: «נַעַר» puede ser joven, asistente o servidor. Aquí el contexto de la casa de Saúl y la función de Ziba favorecen «servidor» como término funcional y claro en español; «siervo» sería posible, pero «servidor» evita sonar excesivamente religioso.
- source_word: וַחֲמֵשֶׁת עָשָׂר בָּנָיו
  english_pob_choice: with his fifteen sons
  chosen_spanish: con sus quince hijos
  alternatives_spanish:
  - y sus quince hijos
  lexicon: HALOT
  rationale: El hebreo coordina al grupo que acompaña a Ziba. En español, «con sus quince hijos» expresa con naturalidad la relación de compañía y mantiene el sentido del texto fuente.
- source_word: וְעֶשְׂרִים עֲבָדָיו
  english_pob_choice: and his twenty servants
  chosen_spanish: y sus veinte servidores
  alternatives_spanish:
  - y sus veinte siervos
  - y sus veinte esclavos
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede significar «esclavo», aquí el contexto es una casa/entorno doméstico-administrativo; «servidores» comunica mejor la función sin imponer una lectura más fuerte que la del pasaje.
- source_word: וְצָלְחוּ
  english_pob_choice: they crossed
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - pasaron al otro lado
  lexicon: HALOT
  rationale: Con el Jordán como objeto, «cruzaron» es el equivalente español más natural y fiel; expresa el movimiento de atravesar el río sin añadir comentario.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: «El Jordán» es la forma breve y estándar en español bíblico, suficiente para identificar el río sin redundancia.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - ante el rey
  - en presencia del rey
  - delante de el rey
  lexicon: HALOT
  rationale: La frase hebrea admite una ambigüedad entre presencia y precedencia espacial. «Delante del rey» preserva esa amplitud semántica en español sin forzar una interpretación exclusivamente ceremonial o temporal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el cauce del POB en inglés, manteniendo la ambigüedad de לִפְנֵי הַמֶּלֶךְ mediante una nota y evitando amplificar el texto más allá de lo que el versículo afirma.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Siba» de forma consistente dentro del verso.
  - Se conserva «Jordán» como nombre geográfico establecido en español.
  - Se evita «esclavos» porque el contexto inmediato presenta una comitiva doméstica, y la carga semántica fuerte no parece central aquí.
  - La puntuación con punto y coma separa la lista de la acción final, en armonía con la sintaxis hebrea y con lectura natural en español.
