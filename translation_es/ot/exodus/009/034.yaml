translation:
  language: es
  text: Pero cuando Faraón vio que habían cesado la lluvia, el granizo y los truenos[a], siguió pecando y endureció su corazón, él y sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las voces»; en este contexto de tormenta, la expresión se refiere a los truenos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - percibió
  lexicon: HALOT
  rationale: ראה en narrativa se expresa de forma natural con «ver»; «vio» conserva el movimiento concreto del relato sin añadir interpretación.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Introduce el contenido de lo que Faraón vio: «que habían cesado...». En español, «que» mantiene la sintaxis subordinante sin forzar un valor causal.'
- source_word: חָדַל
  english_pob_choice: had ceased
  chosen_spanish: habían cesado
  alternatives_spanish:
  - se habían detenido
  - habían terminado
  lexicon: HALOT
  rationale: חדל significa cesar o detenerse; el pluscuamperfecto español refleja bien el valor de anterioridad respecto de «vio».
- source_word: הַמָּטָר
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la precipitación
  - el aguacero
  lexicon: HALOT
  rationale: «Lluvia» es la equivalencia directa y más natural en español para מטר en este contexto.
- source_word: הַבָּרָד
  english_pob_choice: the hail
  chosen_spanish: el granizo
  alternatives_spanish:
  - la granizada
  lexicon: HALOT
  rationale: ברד se traduce de manera estándar como «granizo».
- source_word: הַקֹּלֹת
  english_pob_choice: the thunder
  chosen_spanish: los truenos
  alternatives_spanish:
  - las voces
  - los sonidos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «las voces/los sonidos», en el contexto de la plaga se refiere idiomáticamente a truenos; el plural español conserva la coordinación y la fuerza meteorológica del pasaje.
- source_word: וַיֹּסֶף לַחֲטֹא
  english_pob_choice: he continued to sin
  chosen_spanish: siguió pecando
  alternatives_spanish:
  - volvió a pecar
  - añadió a pecar
  lexicon: HALOT
  rationale: La construcción יסף + infinitivo expresa continuidad o reiteración; «siguió pecando» transmite ese valor con naturalidad y sin calco pesado.
- source_word: וַיַּכְבֵּד לִבּוֹ
  english_pob_choice: hardened his heart
  chosen_spanish: endureció su corazón
  alternatives_spanish:
  - hizo pesado su corazón
  - hizo obstinado su corazón
  lexicon: HALOT
  rationale: כבד literalmente remite a peso, pero en el idioma de Éxodo se usa como endurecimiento del corazón; «endureció su corazón» preserva el término tradicional en español y el sentido idiomático del hebreo.
- source_word: הוּא וַעֲבָדָיו
  english_pob_choice: he and his servants
  chosen_spanish: él y sus servidores
  alternatives_spanish:
  - él y sus siervos
  - él y sus esclavos
  lexicon: HALOT
  rationale: עבדים en este contexto de corte real apunta a la comitiva/funcionarios de Faraón; «servidores» comunica esa relación sin introducir la carga potencial de «esclavos».
theological_decisions:
- issue: Alcance de la afirmación sobre endurecimiento del corazón
  english_pob_reading: The verse states that Pharaoh hardened his own heart, with the concluding phrase extending involvement to 'he and his servants.'
  chosen_spanish_reading: El verso dice que Faraón endureció su corazón, y añade explícitamente «él y sus servidores» sin ampliar más la agencia.
  alternative_spanish_readings:
  - La frase final podría leerse como una simple reiteración enfática de Faraón y su corte
  - Podría entenderse que el endurecimiento afectó al grupo de Faraón de manera conjunta
  rationale: La redacción española conserva la estructura del hebreo y no resuelve la tensión entre agencia humana y el marco teológico más amplio del libro. Se mantiene la referencia explícita a Faraón y a sus servidores tal como aparece en el texto.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo consonante y la auditoría inglesa, sin cambios revisionales relevantes: se preserva la secuencia narrativa, el valor idiomático de "las voces" como truenos y la construcción de endurecimiento del corazón.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «Faraón» como nombre propio convencional en español.
  - «Seresvidores» se eligió para עבדים por el contexto de corte real, manteniendo la relación de dependencia sin forzar «esclavos».
  - La puntuación y el orden sintáctico buscan claridad en español sin perder la correspondencia con la coordinación hebrea.
