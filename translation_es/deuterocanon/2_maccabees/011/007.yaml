translation:
  language: es
  text: Pero Macabeo mismo[a], siendo el primero en tomar las armas, instó a los otros a exponerse al peligro con él y a acudir en ayuda de sus hermanos[b]; y juntos también se lanzaron con prontitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el propio Macabeo»; el griego subraya su iniciativa personal.'
    reason: alternative_reading
  - marker: b
    text: «Hermanos» puede referirse aquí a sus correligionarios o parientes, no necesariamente solo a hermanos biológicos.
    reason: cultural_note
lexical_decisions:
- source_word: αὐτὸς δὲ πρῶτος ὁ Μακκαβαῖος
  english_pob_choice: But Maccabeus himself ... first
  chosen_spanish: Pero el mismo Macabeo[a], ... primero
  alternatives_spanish:
  - Pero Macabeo mismo ... primero
  - Pero el propio Macabeo ... primero
  lexicon: LSJ
  rationale: αὐτός añade énfasis sobre la persona misma, y πρῶτος señala iniciativa y prioridad. En español, «el mismo» conserva ese énfasis sin sonar forzado, y «Macabeo» reproduce el epíteto/título como en la tradición POB inglesa.
- source_word: ἀναλαβὼν τὰ ὅπλα
  english_pob_choice: taking up arms
  chosen_spanish: tomando primero las armas
  alternatives_spanish:
  - habiendo tomado las armas
  - armándose primero
  lexicon: LSJ
  rationale: La expresión griega es idiomática para armarse o tomar las armas. «Tomando primero las armas» conserva el sentido militar y el matiz de antecedencia de πρῶτος sin calcar de manera rígida.
- source_word: προετρέψατο τοὺς ἄλλους
  english_pob_choice: urged the others
  chosen_spanish: instó a los otros
  alternatives_spanish:
  - animó a los otros
  - exhortó a los otros
  lexicon: LSJ
  rationale: προτρέπω puede significar urgir, exhortar o animar. «Instó» transmite bien la fuerza exhortativa en contexto bélico y es natural en español contemporáneo.
- source_word: ἅμα αὐτῷ διακινδυνεύοντας
  english_pob_choice: to risk danger along with him
  chosen_spanish: a exponerse al peligro con él
  alternatives_spanish:
  - a arriesgar el peligro con él
  - a correr peligro junto con él
  lexicon: LSJ
  rationale: διακινδυνεύω expresa exponerse o arriesgarse. En español, «exponerse al peligro» es más natural que «arriesgar peligro» y mantiene la acción de asumir el riesgo junto con él.
- source_word: ἐπιβοηθεῖν τοῖς ἀδελφοῖς αὐτῶν
  english_pob_choice: to come to the aid of their brothers
  chosen_spanish: a acudir en ayuda de sus hermanos[b]
  alternatives_spanish:
  - a ayudar a sus hermanos
  - a socorrer a sus hermanos
  lexicon: LSJ
  rationale: ἐπιβοηθέω implica acudir en ayuda urgente. «Acudir en ayuda de» conserva mejor la idea de venir en auxilio que un simple «ayudar». «Hermanos» mantiene el lenguaje literal del griego y la lectura étnico-kinship del contexto.
- source_word: ὁμοῦ δὲ καὶ προθύμως ἐξώρμησαν
  english_pob_choice: and together they also rushed out eagerly
  chosen_spanish: y juntos también salieron con prontitud.
  alternatives_spanish:
  - y juntos también irrumpieron con prontitud
  - y todos juntos salieron con entusiasmo
  lexicon: LSJ
  rationale: ὁμοῦ indica acción conjunta y προθύμως expresa disposición pronta y voluntaria. ἐξορμάω puede ser «salir precipitadamente» o «sallir/salir con prontitud»; elegí una forma sobria que conserve el impulso sin sobrecargar el tono militar.
theological_decisions:
- issue: 'ἀδελφοῖς αὐτῶν: sentido de parentesco o de compatriotas'
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus compatriotas
  - sus parientes
  rationale: El griego dice literalmente «hermanos». Aunque el contexto probablemente apunta a judíos correligionarios o parientes, el texto conserva lenguaje de fraternidad. Mantener «hermanos» evita suavizar una imagen social y teológica importante del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión auditada del inglés POB: el exhorto se distribuye en dos complementos coordinados («a exponerse al peligro con él y a acudir en ayuda de sus hermanos»), en lugar de ligar torpemente el gerundio al verbo principal. Se preserva también el matiz de iniciativa de πρῶτος y la acción conjunta de ὁμοῦ.'
  spanish_consistency_notes:
  - Se usó «Macabeo» como transliteración del epíteto, en coherencia con el inglés POB.
  - Se mantuvo «hermanos» por fidelidad lexical y por consistencia con la terminología POB para este tipo de parentesco amplio.
  - «Tomando primero las armas» conserva la imagen de armarse sin sustituirla por una paráfrasis más general.
