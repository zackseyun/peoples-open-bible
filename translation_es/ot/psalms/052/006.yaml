    issue: 'La nota al pie usa una formulación española poco natural: ''lengua de engaño''.'
    rationale: Aunque reproduce más formalmente el hebreo, en español suena acartonado. Una alternativa más formal y todavía fiel sería 'lengua engañosa' o, si se quiere conservar el genitivo, debería explicarse mejor; pero la nota debe seguir siendo buen español.
  - severity: low
    issue: La nota al pie está envuelta en comillas simples innecesarias.
    rationale: 'La convención editorial española aquí funciona mejor con la fórmula directa: ''O, más formalmente: «...».'', sin comillas simples externas.'
