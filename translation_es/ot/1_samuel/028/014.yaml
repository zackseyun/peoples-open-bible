base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/014.yaml
  text: He said to her[a], “What is his appearance?” And she said, “An old man is coming up, and he is wrapped in a robe.” Then Saul knew that it was Samuel[c][b], and he bowed with his face to the ground and prostrated himself.
  footnotes:
  - marker: a
    text: Or 'is ascending' / 'is rising up.' The Hebrew participle emphasizes upward movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'is wearing a robe.' The Hebrew more vividly suggests being wrapped or cloaked in it.
    reason: lexical_alternative
  - marker: c
    text: The final verb can also be rendered 'bowed down' or, in some contexts, 'worshiped'; here it denotes an act of deep prostration before the figure identified as Samuel.
    reason: alternative_reading
