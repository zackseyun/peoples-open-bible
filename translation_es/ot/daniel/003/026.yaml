review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el arameo y el rastro del POB inglés en la secuencia narrativa, la fórmula de habla («respondió y dijo»), el título divino («el Dios Altísimo») y la salida «de en medio del fuego». Sin embargo, la nota al pie [a] no corresponde al mismo alcance semántico que la nota inglesa auditada: el inglés documenta la alternativa para «door» y además la redacción «to the opening/entrance of the furnace», mientras que el español actual omite «de la puerta» y puede sonar como si «abertura/entrada» sustituyera a toda la frase sin integrar bien el complemento. Conviene ajustar la nota para reflejar con más fidelidad la alternativa documentada.'
  spanish_quality_summary: El texto es claro, natural y digno en español eclesial general. «Horno de fuego ardiente», «siervos del Dios Altísimo» y «vengan acá» son legibles y fieles. La única reparación necesaria es de precisión editorial en la nota al pie; el cuerpo del versículo no requiere cambio sustancial.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé. El título divino se conserva como «el Dios Altísimo». El uso de «siervos» para עַבְדֹוהִי concuerda con la decisión lexical documentada del POB para este contexto reverencial.
  issues:
  - severity: medium
    issue: La nota [a] está formulada de manera incompleta respecto del audit trail inglés.
    rationale: La evidencia inglesa conserva como alternativa «to the opening/entrance of the furnace», no solo «abertura/entrada del horno». En español, la nota actual («a la abertura/entrada del horno») es entendible, pero sería más fiel y más clara si explicitara «a la puerta/entrada del horno» o «a la abertura del horno», manteniendo el mismo alcance del sustantivo principal לִתְרַע.
  revised_spanish_text: 'Entonces Nabucodonosor se acercó a la puerta[a] del horno de fuego ardiente. Respondió y dijo: «Sadrac, Mesac y Abed-nego, siervos del Dios Altísimo, salgan y vengan acá». Entonces Sadrac, Mesac y Abed-nego salieron de en medio del fuego.'
  revised_footnotes:
  - marker: a
    text: O «a la abertura del horno» o «a la entrada del horno».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se ajusta la nota [a] para que refleje con mayor exactitud la alternativa lexical documentada para לִתְרַע en el audit trail inglés.
