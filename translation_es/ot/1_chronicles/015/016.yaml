translation:
  language: es
  text: 'Entonces David dijo a los jefes de los levitas que designaran a sus hermanos[a], los cantores, con instrumentos musicales: arpas, liras y címbalos, haciéndolos resonar, levantando la voz con alegría[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus compañeros levitas»; el hebreo dice literalmente «a sus hermanos», es decir, a los levitas de su mismo servicio.
    reason: cultural_note
  - marker: b
    text: O «para alzar la voz con alegría»; el hebreo es literalmente «para levantar con voz/sonido para alegría».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then David told
  chosen_spanish: Entonces David dijo
  alternatives_spanish:
  - Luego David habló
  - Entonces David mandó
  lexicon: HALOT
  rationale: El hebreo avanza la narración con waw consecutivo; en español, «Entonces» conserva la secuencia. «Dijo» mantiene el valor básico de אָמַר sin forzar una paráfrasis; el infinitivo siguiente de mandato queda claro por el contexto.
- source_word: לְשָׂרֵי הַלְוִיִּם
  english_pob_choice: the leaders of the Levites
  chosen_spanish: a los jefes de los levitas
  alternatives_spanish:
  - a los líderes de los levitas
  - a los jefes levitas
  lexicon: HALOT
  rationale: שָׂרִים denota jefes, líderes u oficiales. «Jefes» es claro y fiel. «Levitas» se conserva como nombre del grupo, sin suavizar la estructura administrativa del texto.
- source_word: לְהַעֲמִיד
  english_pob_choice: to appoint
  chosen_spanish: que designaran
  alternatives_spanish:
  - que pusieran
  - que establecieran
  lexicon: HALOT
  rationale: En este contexto organizativo, el Hiphil de עמד expresa nombrar o designar para una función. «Designaran» reproduce bien la idea de comisión formal mejor que una simple colocación física.
- source_word: אֶת אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos de clan
  - a sus compañeros levitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hermanos». Se conserva la relación fraterna y de pertenencia. El contexto levítico aclara que se trata de los compañeros de servicio dentro del mismo grupo.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores que cantaban
  - los cantores/salmodiadores
  lexicon: HALOT
  rationale: El participio de שׁיר designa específicamente a quienes cantan. «Cantores» es un término natural en español bíblico y distingue bien esta función de la de los instrumentistas.
- source_word: בִּכְלֵי שִׁיר
  english_pob_choice: with musical instruments
  chosen_spanish: con instrumentos musicales
  alternatives_spanish:
  - con instrumentos de canto
  - con instrumentos de música
  lexicon: HALOT
  rationale: La expresión constructa indica instrumentos destinados al canto o la música. «Instrumentos musicales» es idiomático y transparente en español, sin perder el sentido.
- source_word: נְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - liras grandes
  - nábalos
  lexicon: HALOT
  rationale: Aunque la identificación exacta del instrumento antiguo es debatida, «arpas» es la equivalencia estándar más reconocible y fiel para el lector moderno. Se evita un tecnicismo poco transparente.
- source_word: וְכִנֹּרוֹת
  english_pob_choice: lyres
  chosen_spanish: liras
  alternatives_spanish:
  - arpas
  - cordófonos
  lexicon: HALOT
  rationale: כִּנּוֹר suele corresponder a «lira». Mantenerlo distinto de נֶבֶל preserva la diferencia entre ambos instrumentos, como en la traducción inglesa auditada.
- source_word: וּמְצִלְתַּיִם
  english_pob_choice: cymbals
  chosen_spanish: címbalos
  alternatives_spanish:
  - cimbalillos
  - platillos
  lexicon: HALOT
  rationale: El sustantivo designa címbalos. «Címbalos» es el equivalente bíblico estándar en español y conserva el tono litúrgico sin perder precisión.
- source_word: מַשְׁמִיעִים
  english_pob_choice: sounding aloud
  chosen_spanish: haciendo oír el sonido
  alternatives_spanish:
  - haciendo resonar
  - sonando en voz alta
  lexicon: HALOT
  rationale: El Hiphil de שׁמע significa «hacer oír». La frase española retiene la causalidad y la dimensión audible pública del canto sin añadir una interpretación excesiva sobre la manera exacta.
- source_word: לְהָרִים בְּקוֹל
  english_pob_choice: lifting up the voice
  chosen_spanish: levantando la voz
  alternatives_spanish:
  - alzando la voz
  - levantando con voz
  lexicon: HALOT
  rationale: El hebreo literalmente dice «levantar con voz/sonido». «Levantando la voz» preserva la imagen idiomática de elevar la expresión sonora. Se evita introducir «cantos» porque el hebreo no los menciona explícitamente en esta cláusula.
- source_word: לְשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - para alegría
  - para regocijo
  lexicon: HALOT
  rationale: La expresión final comunica la cualidad o propósito gozoso de la acción. «Con alegría» es natural en español y refleja bien el valor semántico sin rigidizar la construcción.
theological_decisions:
- issue: Título administrativo y función cultual de los levitas
  english_pob_reading: leaders of the Levites / appoint their brothers, the singers
  chosen_spanish_reading: jefes de los levitas / que designaran a sus hermanos, los cantores
  alternative_spanish_readings:
  - líderes de los levitas
  - que establecieran a sus hermanos
  rationale: No hay necesidad de convertir el mandato en lenguaje eclesiástico posterior. El texto describe una organización levítica concreta para el servicio musical del templo; «jefes» y «designaran» mantienen el carácter administrativo y cultual sin anacronismos.
  doctrine_reference: 1 Crónicas 15:16; servicio levítico y orden del culto
- issue: Expresión final de alabanza y la cláusula idiomática hebrea
  english_pob_reading: lifting up the voice with joy
  chosen_spanish_reading: levantando la voz con alegría
  alternative_spanish_readings:
  - alzando la voz con alegría
  - haciendo oír el sonido con alegría
  rationale: La frase hebrea tiene una tensión lexical entre «levantar», «voz/sonido» y «gozo». Se conserva esa tensión en español sin resolverla en una paráfrasis devocional más libre. La alegría expresa el resultado o ambiente del acto musical.
  doctrine_reference: 1 Crónicas 15:16; expresión de gozo en el servicio a Yahvé
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una redacción más interpretativa («to raise songs of joy») a una más cercana al hebreo («lifting up the voice with joy»). Por eso el español evita añadir «cantos» en la cláusula final y conserva la imagen de levantar la voz. También se mantuvieron separadas las tres clases de instrumentos y la referencia literal a «sus hermanos», con nota aclaratoria sobre el alcance levítico.
  spanish_consistency_notes:
  - Se usó «Yahvé» en la traducción española como término estándar del proyecto, aunque este versículo no contiene el nombre divino explícito.
  - Se prefirió «cantores» para הַמְשֹׁרְרִים y «instrumentos musicales» para בִּכְלֵי שִׁיר, manteniendo la distinción entre función vocal e instrumental.
  - «Címbalos» y no «platillos» conserva la terminología bíblica tradicional sin perder inteligibilidad.
  - La cláusula final mantiene la tensión hebrea entre sonido, voz y alegría en vez de resolverla en un giro más libre.
