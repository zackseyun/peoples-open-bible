translation:
  language: es
  text: 'Pero él se puso de pie en medio de ellos y dijo: «¿Son tan insensatos, hijos de Israel? Sin examinar el caso ni conocer con claridad los hechos[b], ¿han condenado a una hija de Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «sin investigar y sin averiguar los hechos claros». El lenguaje griego tiene tono judicial y subraya que no examinaron debidamente el caso antes de condenar a Susana.
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  english_pob_choice: he stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - estuvo de pie
  - se levantó
  lexicon: LSJ
  rationale: El participio aoristo introduce la acción física previa al discurso. «Se puso de pie» conserva la imagen concreta y suena natural en español, sin perder el valor narrativo de la postura asumida para hablar públicamente.
- source_word: ἐν μέσῳ αὐτῶν
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - en su medio
  lexicon: LSJ
  rationale: La expresión marca el carácter público y confrontativo de la reprensión. «En medio de ellos» es una equivalencia directa, clara y natural en español.
- source_word: Οὕτως μωροί
  english_pob_choice: Are you such fools
  chosen_spanish: ¿Tan insensatos son?
  alternatives_spanish:
  - ¿Son ustedes tan necios?
  - ¿Tan necios son?
  lexicon: LSJ
  rationale: La frase griega funciona como reprensión exclamativa en forma interrogativa. «Insensatos» mantiene la fuerza de μωροί sin exigir un tono vulgar; «tan» refleja οὕτως como intensificador. Se evita «fools» como sustantivo duro si en español pudiera sonar excesivamente insultante, aunque la reprensión sigue siendo fuerte.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: sons of Israel
  chosen_spanish: hijos de Israel
  alternatives_spanish:
  - hijos del Israel
  - israelitas
  lexicon: LSJ
  rationale: Se conserva el paralelismo masculino explícito del griego. «Hijos de Israel» es el equivalente más natural y fiel; «israelitas» suavizaría el vocativo y perdería el contraste retórico con «hija de Israel».
- source_word: ἀνακρίναντες
  english_pob_choice: examining the matter
  chosen_spanish: examinar el caso
  alternatives_spanish:
  - investigar
  - hacer una indagación
  lexicon: LSJ
  rationale: El verbo tiene matiz judicial de examen/investigación formal. «Examinar el caso» transmite bien esa idea procesal en español y conserva el trasfondo legal de la condena.
- source_word: τὸ σαφὲς ἐπιγνόντες
  english_pob_choice: learning the facts clearly
  chosen_spanish: conocer con claridad los hechos
  alternatives_spanish:
  - averiguar claramente la verdad
  - reconocer con claridad lo evidente
  lexicon: LSJ
  rationale: La expresión combina claridad con conocimiento pleno de lo evidente. «Conocer con claridad los hechos» comunica el sentido forense y evita una formulación demasiado interpretativa; «los hechos» expresa el contenido objetivo que se esperaba determinar.
- source_word: κατεκρίνατε
  english_pob_choice: have you condemned
  chosen_spanish: han condenado
  alternatives_spanish:
  - condenaron
  - han sentenciado
  lexicon: LSJ
  rationale: El perfecto/aoristo griego se vierte con presente perfecto en español para reflejar el acto consumado cuya injusticia se denuncia en la pregunta retórica. «Han condenado» mantiene el peso judicial del verbo.
- source_word: θυγατέρα Ἰσραήλ
  english_pob_choice: a daughter of Israel
  chosen_spanish: a una hija de Israel
  alternatives_spanish:
  - a la hija de Israel
  - a una mujer de Israel
  lexicon: LSJ
  rationale: Se conserva el singular anartro y el contraste femenino explícito. «Hija de Israel» replica la fórmula del griego y mantiene la correspondencia con «hijos de Israel».
theological_decisions:
- issue: Contraste covenantal de género en la reprensión
  english_pob_reading: sons of Israel / a daughter of Israel
  chosen_spanish_reading: hijos de Israel / una hija de Israel
  alternative_spanish_readings:
  - israelitas / una mujer de Israel
  - hijos de Israel / una israelita
  rationale: La escena enfatiza el contraste retórico entre los varones que juzgan y la mujer del pueblo de Israel a quien condenan. Mantener «hijos» y «hija» preserva esa tensión textual y evita neutralizar el lenguaje del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete (Theodotion) y conserva el tono judicial de la reprensión. Se tuvo en cuenta el audit trail en inglés, especialmente la doble opción para μωροί y la nota sobre ἀνακρίναντες / τὸ σαφὲς ἐπιγνόντες, sin depender mecánicamente del inglés para la sintaxis española.
  spanish_consistency_notes:
  - Se mantiene «Israel» en la forma posesiva de las expresiones fijas («hijos de Israel», «hija de Israel»).
  - «Caso» y «hechos» reflejan adecuadamente el registro forense del pasaje.
  - La nota [b] se ancla en el segmento judicial para preservar la alternativa registrada en el audit trail.
