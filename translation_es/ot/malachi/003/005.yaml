review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el audit trail inglés en la secuencia judicial, los grupos denunciados y el uso de «Yahvé». Sin embargo, hay dos desajustes importantes: «los que hacen torcer al forastero» no refleja bien וּמַטֵּי גֵר, que apunta a desviar/apartar o privar de derecho al residente forastero, no a hacer que él mismo tuerza algo; y la nota [c] está mal formulada porque repite la misma lectura principal en vez de preservar la alternativa tradicional documentada («Yahvé de las Huestes» o análogo). También conviene ajustar «para el juicio» a «para juicio» y «testigo veloz» a «testigo pronto» para mayor naturalidad y dignidad bíblica en español.'
  spanish_quality_summary: El español es mayormente claro y legible, pero tiene una construcción poco natural y semánticamente equívoca en «hacen torcer al forastero». Además, la serie «el salario de un jornalero, la viuda y el huérfano» queda correctamente entendida solo si se sobreentiende que el verbo rige todos los complementos; esto puede mantenerse, pero el conjunto fluye mejor con una formulación más idiomática. «Yahvé de los Ejércitos» es aceptable y acorde al proyecto.
  glossary_alignment: Alinea bien con los estándares del proyecto en «Yahvé», «hechiceros», «adúlteros», «temen». «Forastero» para גֵר es posible, pero aquí el verbo exige una expresión como «apartan al forastero» o «privan de sus derechos al forastero» para preservar mejor el sentido. La nota tradicional sobre צְבָאוֹת debe corregirse; no puede decir lo mismo que el texto principal.
  issues:
  - severity: high
    issue: «los que hacen torcer al forastero» traduce deficientemente וּמַטֵּי גֵר
    rationale: El hebreo participial de נטה en este contexto legal-social expresa apartar, desviar, pervertir o torcer el derecho del גֵר. La redacción actual sugiere que hacen que el forastero se tuerza o se desvíe, lo cual no suena natural en español ni comunica bien la opresión jurídica implícita.
  - severity: medium
    issue: La nota [c] es incorrecta
    rationale: 'La nota dice «Traducción tradicional: “Yahvé de los Ejércitos”», que no ofrece una alternativa a la lectura principal. El audit trail inglés preserva una alternativa tradicional equivalente a «the LORD of Hosts»; en español debe reflejarse como «Yahvé de las Huestes» o, menos preferiblemente, una formulación con «SEÑOR» si se explicara la convención, pero no repetir el texto principal.'
  - severity: low
    issue: «para el juicio» suena más pesado que «para juicio»
    rationale: Ambas opciones son fieles, pero «para juicio» es más idiomático y sobrio en español bíblico moderno.
  - severity: low
    issue: «testigo veloz» es comprensible, pero «testigo pronto» suena más natural en registro bíblico
    rationale: «Veloz» se usa más naturalmente para movimiento físico; «pronto» o «rápido» encajan mejor con el valor de prontitud del testimonio/juzgar.
  revised_spanish_text: Entonces me acercaré a ustedes para juicio[a], y seré un testigo pronto contra los hechiceros, contra los adúlteros, contra los que juran en falso, contra los que oprimen el salario de un jornalero, la viuda y el huérfano, y contra los que apartan al forastero[b], y no me temen, dice Yahvé de los Ejércitos[c].
