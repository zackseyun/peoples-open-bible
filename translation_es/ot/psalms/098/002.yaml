    issue: El texto principal usa 'su justicia' para צִדְקָתוֹ en lugar de reflejar la elección principal auditada 'his righteousness'.
    rationale: La auditoría inglesa documenta explícitamente 'his righteousness' como lectura principal por su amplitud teológica, dejando 'justice' solo como alternativa. En español, 'justicia' puede sonar más estrecho o más forense; 'rectitud' preserva mejor la amplitud de rightness/righteousness sin cancelar la nota alternativa.
  - severity: low
    issue: La nota [b] queda invertida respecto de la auditoría inglesa.
    rationale: Si el texto principal pasa a 'su rectitud', la alternativa debe ser 'su justicia', no al revés, para mantener la relación entre texto principal y nota léxica.
