review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: los sacerdotes portadores del arca permanecen en el Jordán sobre seco mientras Israel cruza hasta completar el paso. Conserva correctamente ‘Yahvé’, la repetición de ‘tierra seca’ y el colectivo ‘toda la nación’. Sin embargo, hay dos desajustes menores con el audit trail y la fidelidad formal: la nota [a] no ofrece una alternativa real distinta del texto principal, y el anclaje de [b] sobre ‘Yahvé’ es incorrecto porque la nota explica ‘firmemente’, no el nombre divino.'
  spanish_quality_summary: El español es claro y natural, con tono digno y legible. ‘Iba pasando’ funciona, pero ‘estaba cruzando’ o ‘cruzaba’ serían algo más directos; aun así no es necesario cambiarlo. Sí conviene reparar la ubicación de las notas para evitar confusión lectora, y reescribir la nota [a] en español natural y útil.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → ‘Yahvé’; בֶּחָרָבָה → ‘tierra seca’; כָּל הַגּוֹי → ‘toda la nación’. No hay conflicto doctrinal. La única corrección necesaria es de aparato crítico/footnotes, no del glosario principal.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada a ‘Yahvé’ en vez de a ‘se mantuvieron firmes’.
    rationale: La nota [b] explica el valor de הָכֵן / la firmeza de la postura, no el nombre divino. Su ubicación actual induce a error y no sigue la disciplina de anclar cada nota a la palabra o frase relevante.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa léxica real al texto principal.
    rationale: 'El texto principal ya dice ‘el arca del pacto de Yahvé’, y la nota repite prácticamente lo mismo. La alternativa documentada en el audit trail inglés es el orden posesivo equivalente a ‘el arca del pacto de Yahvé’ / ‘el arca del pacto de Yahvé’; en español debe formularse como una opción realmente distinta, por ejemplo ‘el arca del pacto de Yahvé’ frente a ‘el arca del pacto de Yahvé’ no aporta nada. Una alternativa útil sería ‘el arca del pacto de Yahvé’ → ‘el arca de la alianza de Yahvé’ o mejor, siguiendo la evidencia inglesa, ‘el arca del pacto de Yahvé’ / ‘el arca del pacto de Yahvé’ no distingue; por tanto la nota debe replantearse como ‘O: “el arca del pacto de Yahvé”’ no sirve. Lo más fiel es usar una alternativa de orden posesivo español: ‘el arca del pacto de Yahvé’ / ‘el arca del pacto de Yahvé’ sigue sin cambiar; por ello conviene expresarla como ‘O: “el arca del pacto perteneciente a Yahvé”’, aclarando la cadena constructa.'
  - severity: low
    issue: La formulación inglesa ‘Or’ quedó sin adaptar al español en dos notas.
    rationale: En una edición española debe decir ‘O:’ en vez de ‘Or:’. Es un detalle editorial menor pero conviene corregirlo.
  revised_spanish_text: Y los sacerdotes que llevaban el arca del pacto de Yahvé[a] se mantuvieron firmes[b] sobre tierra seca en medio del Jordán, mientras todo Israel iba pasando sobre tierra seca hasta que toda la nación[c] acabó de pasar el Jordán.
  revised_footnotes:
