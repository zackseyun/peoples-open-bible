translation:
  language: es
  text: y muere en el monte que estás subiendo, y sé reunido[a] a tu pueblo, así como Aarón tu hermano murió en el monte Hor y fue reunido a su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sé reunido a tus antepasados'. El modismo hebreo dice literalmente 'sé reunido a tu pueblo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֻת
  english_pob_choice: and die
  chosen_spanish: y muere
  alternatives_spanish:
  - y morirás
  - y debes morir
  lexicon: HALOT
  rationale: El hebreo usa una forma volitiva dirigida a Moisés; en español, el imperativo simple conserva la inmediatez y la fuerza directa del mandato sin añadir modalidad interpretativa.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: HALOT
  rationale: ‘Monte’ es una opción natural y bíblica en español para הַר, y ‘en’ transmite mejor la localización que un calco como ‘sobre’.
- source_word: אֲשֶׁר אַתָּה עֹלֶה
  english_pob_choice: that you are ascending
  chosen_spanish: al que subes
  alternatives_spanish:
  - que estás subiendo
  - al que asciendes
  lexicon: HALOT
  rationale: Se conserva la imagen de ascenso de עלה con un giro español natural. ‘Subes’ evita la dureza de un calco como ‘estás ascendiendo’.
- source_word: וְהֵאָסֵף אֶל עַמֶּיךָ
  english_pob_choice: and be gathered to your people
  chosen_spanish: y sé reunido a tu pueblo
  alternatives_spanish:
  - y sé recogido entre tu pueblo
  - y reúnéte con tu pueblo
  lexicon: HALOT
  rationale: Se mantiene la expresión idiomática de אסף sin resolverla a ‘morir’ o ‘ser sepultado’. ‘Reunido a tu pueblo’ conserva la tensión bíblica y la referencia comunitaria del idioma original.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: HALOT
  rationale: ‘Así como’ expresa comparación directa y suena natural en español bíblico contemporáneo.
- source_word: מֵת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - ha muerto
  - falleció
  lexicon: HALOT
  rationale: En la comparación narrativa, el pasado simple es el equivalente natural de מֵת.
- source_word: בְּהֹר הָהָר
  english_pob_choice: on Mount Hor
  chosen_spanish: en el monte Hor
  alternatives_spanish:
  - en el monte de Hor
  - sobre el monte Hor
  lexicon: HALOT
  rationale: La forma de nombre propio tradicionalmente reconocible en español es ‘monte Hor’; se conserva sin añadir explicaciones no presentes en el texto.
- source_word: וַיֵּאָסֶף אֶל עַמָּיו
  english_pob_choice: and was gathered to his people
  chosen_spanish: y fue reunido a su pueblo
  alternatives_spanish:
  - y fue recogido entre su pueblo
  - y se reunió con su pueblo
  lexicon: HALOT
  rationale: Se repite el mismo giro idiomático para Aarón, manteniendo coherencia léxica con la primera mitad del versículo y evitando neutralizar el idioma bíblico.
theological_decisions:
- issue: 'Idiom of death: אסף אל־עמיו'
  english_pob_reading: Retain the idiom 'be gathered to your/his people' in the main text
  chosen_spanish_reading: Mantener ‘ser reunido a tu/su pueblo’ como giro principal
  alternative_spanish_readings:
  - ser reunido a tus antepasados
  - unirse a su pueblo en la muerte
  rationale: La expresión hebrea es una fórmula convencional asociada con la muerte, pero su alcance puede ser más rico que una mera sepultura. Se preserva la tensión teológica del idioma bíblico sin resolverla en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del audit trail inglés que eliminó el innecesario ‘there’ después de ‘ascending’; en español se optó por un sintagma igualmente natural (‘al que subes’) sin añadir de nuevo un deíctico artificial. No se incorporó nota textual porque no hay variante significativa en el paquete fuente.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto lo exigiera; este versículo no contiene el nombre divino.
  - Se mantuvo ‘pueblo’ para עַם, en coherencia con el idiomático ‘reunido a su pueblo’.
  - Se prefirió ‘monte’ para la topografía y ‘reunido’ para el verbo idiomático, evitando ‘sepultado’ o ‘enterrado’ porque el hebreo no los dice explícitamente.
