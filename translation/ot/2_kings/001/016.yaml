id: 2KI.1.16
reference: 2 Kings 1:16
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר אֵלָ֜י/ו כֹּֽה אָמַ֣ר יְהוָ֗ה יַ֜עַן אֲשֶׁר שָׁלַ֣חְתָּ מַלְאָכִים֮ לִ/דְרֹשׁ֮ בְּ/בַ֣עַל זְבוּב֮ אֱלֹהֵ֣י עֶקְרוֹן֒ הַֽ/מִ/בְּלִ֤י אֵין אֱלֹהִים֙ בְּ/יִשְׂרָאֵ֔ל לִ/דְרֹ֖שׁ בִּ/דְבָר֑/וֹ לָ֠/כֵן הַ/מִּטָּ֞ה אֲשֶׁר עָלִ֥יתָ שָּׁ֛ם לֹֽא תֵרֵ֥ד מִמֶּ֖/נָּה כִּֽי מ֥וֹת תָּמֽוּת־־־־־־׃
translation:
  text: 'And he spoke to him[a], “Thus says Yahweh: Because you have sent messengers to inquire of Baal-zebub, the god of Ekron—is it because there is no God in Israel to inquire of his word? Therefore the bed on which you have gone up[c][b], you will not come down from it, for you shall surely die.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “to inquire of his word,” likely meaning to seek a divine message or oracle from him.'
    reason: lexical_alternative
  - marker: b
    text: The name is spelled Baal-zebub in the Hebrew text; a related form, Baal-zebul, appears in later tradition.
    reason: alternative_reading
  - marker: c
    text: Or 'the bed that you have gone up on there'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְדַבֵּר אֵלָיו
  chosen: And he spoke to him
  alternatives:
  - And he said to him
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' Here it introduces Elijah's direct address to the king's representative contextually reported to the king. 'Spoke to him' preserves the verbal distinction from the following formula 'thus says.'
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh.' Present-tense 'says' is idiomatic in English for prophetic citation.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because that
  - Since
  lexicon: HALOT
  rationale: The combination introduces the reason for judgment. 'Because' is natural and sufficiently formal.
- source_word: שָׁלַחְתָּ מַלְאָכִים
  chosen: you sent messengers
  alternatives:
  - you sent envoys
  lexicon: HALOT
  rationale: מַלְאָכִים here refers to human messengers, not angels. 'Messengers' is the most direct rendering.
- source_word: לִדְרֹשׁ
  chosen: to inquire
  alternatives:
  - to seek an oracle
  - to consult
  lexicon: HALOT
  rationale: דרש in this context means seeking information or an oracle from a deity. 'Inquire' preserves the religious-consultative sense without overparaphrase.
- source_word: בְּבַעַל זְבוּב
  chosen: of Baal-zebub
  alternatives:
  - from Baal-zebub
  - of Baal-zebul
  lexicon: HALOT
  rationale: The preposition with דרש can be represented in English as 'inquire of.' The MT form is Baal-zebub, which should be retained in the main text as the source-text reading; the better-known variant 'Baal-zebul' belongs as an alternative, not the main rendering.
- source_word: אֱלֹהֵי עֶקְרוֹן
  chosen: the god of Ekron
  alternatives:
  - Ekron's god
  lexicon: HALOT
  rationale: Construct chain straightforwardly identifies Baal-zebub as the deity worshiped at Ekron.
- source_word: הֲמִבְּלִי אֵין אֱלֹהִים בְּיִשְׂרָאֵל
  chosen: is it because there is no God in Israel
  alternatives:
  - is it because there is not a God in Israel
  - is it for lack of a God in Israel
  lexicon: HALOT
  rationale: This rhetorical question rebukes the king's apostasy. Singular 'God' is appropriate in English though אֱלֹהִים is morphologically plural, because it refers to Israel's God.
- source_word: לִדְרֹשׁ בִּדְבָרוֹ
  chosen: to inquire of his word
  alternatives:
  - to inquire by his word
  - to seek his counsel
  - to inquire of him
  lexicon: HALOT
  rationale: The Hebrew explicitly includes דָבָר with suffix, literally 'his word/matter.' Rather than omit it, 'of his word' preserves the wording, though it is somewhat idiomatic. It likely refers to seeking an oracle or message from God.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the consequence of the king's action in formal prophetic style.
- source_word: הַמִּטָּה אֲשֶׁר עָלִיתָ שָּׁם
  chosen: the bed that you have gone up on there
  alternatives:
  - the bed on which you have lain
  - the couch you have climbed into there
  lexicon: HALOT
  rationale: מִטָּה is bed/couch. The verb עלה is literally 'go up,' likely reflecting ascent onto an upper-room bed or couch. Retaining 'gone up on' preserves the concrete Hebrew image better than flattening to 'lie on.'
- source_word: לֹא תֵרֵד מִמֶּנָּה
  chosen: you will not come down from it
  alternatives:
  - you will not get down from it
  lexicon: HALOT
  rationale: Direct future judgment statement; 'come down' matches the literal ירד and fits the prior 'gone up.'
- source_word: כִּי מוֹת תָּמוּת
  chosen: for you will surely die
  alternatives:
  - for dying you shall die
  - for you shall certainly die
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies certainty. 'You will surely die' is the standard clear English equivalent.
