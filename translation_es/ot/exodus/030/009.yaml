- from: No ofrecerás sobre él incienso no autorizado[a], ni holocausto, ni ofrenda vegetal; y no derramarás sobre él libación.
  to: No ofrecerán sobre él incienso no autorizado[a], ni holocausto, ni ofrenda de grano; y no derramarán sobre él libación.
