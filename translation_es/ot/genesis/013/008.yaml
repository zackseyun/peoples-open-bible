translation:
  language: es
  text: 'Entonces Abram dijo a Lot[a]: «Por favor, que no haya riña entre tú y yo, ni entre mis cuidadores de ganado y los tuyos, porque somos hermanos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes cercanos». El hebreo «hermanos» puede referirse a un parentesco más amplio, no solo a hijos de los mismos padres.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: So Abram said
  chosen_spanish: Entonces Abram dijo
  alternatives_spanish:
  - Y Abram dijo
  - Luego Abram dijo
  lexicon: WLC/HALOT
  rationale: La waw narrativa expresa avance secuencial. «Entonces» conserva el flujo narrativo natural en español sin sonar mecánico.
- source_word: אַל נָא
  english_pob_choice: Please, let there be no
  chosen_spanish: Por favor, no haya
  alternatives_spanish:
  - Por favor, que no haya
  - Te ruego que no haya
  lexicon: WLC/HALOT
  rationale: La combinación de prohibición y cortesía se expresa de forma natural con «Por favor». El subjuntivo «no haya» refleja bien el valor jussivo de תְהִי.
- source_word: תְהִי מְרִיבָה
  english_pob_choice: let there be no strife
  chosen_spanish: no haya riña
  alternatives_spanish:
  - no haya contienda
  - no haya disputa
  lexicon: WLC/HALOT
  rationale: מְרִיבָה puede abarcar conflicto o disputa. «Riña» comunica el desacuerdo interpersonal de manera clara y en registro bíblico actual, sin suavizar demasiado el término.
- source_word: בֵּינִי וּבֵינֶיךָ
  english_pob_choice: between me and you
  chosen_spanish: entre tú y yo
  alternatives_spanish:
  - entre yo y tú
  - entre nosotros
  lexicon: WLC/HALOT
  rationale: En español, el orden natural es «tú y yo». Aunque el hebreo repite la estructura distributiva, esta forma mantiene la relación explícita entre ambos sujetos.
- source_word: רֹעַי ... רֹעֶיךָ
  english_pob_choice: my herdsmen ... your herdsmen
  chosen_spanish: mis pastores y los tuyos
  alternatives_spanish:
  - mis pastores y tus pastores
  - los que cuidan mis rebaños y los que cuidan los tuyos
  lexicon: HALOT
  rationale: El término denota a quienes atienden el ganado. «Pastores» es comprensible en español bíblico y mantiene la brevedad del hebreo; la referencia al ganado queda clara por el contexto de Abram y Lot.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: WLC/HALOT
  rationale: Introduce la razón de la petición. «Porque» expresa causalidad de forma directa y natural en español.
- source_word: אֲנָשִׁים אַחִים אֲנָחְנוּ
  english_pob_choice: we are kinsmen
  chosen_spanish: somos hermanos
  alternatives_spanish:
  - somos parientes cercanos
  - somos de la misma familia
  lexicon: WLC/HALOT
  rationale: El hebreo usa «hombres» + «hermanos» como fórmula de parentesco. En el texto principal, «hermanos» conserva la fuerza y la concisión del original; en nota se preserva el sentido ampliado de parentesco.
theological_decisions:
- issue: Alcance de אַחִים entre Abram y Lot
  english_pob_reading: Rendered as 'brothers' while preserving the broader kinship sense in a footnote.
  chosen_spanish_reading: Traducido como «hermanos» y aclarado en nota como parentesco más amplio.
  alternative_spanish_readings:
  - parientes cercanos
  - familiares cercanos
  rationale: Aunque Abram es tío de Lot, el hebreo puede usar «hermanos» para parientes no inmediatos. Mantener «hermanos» en el texto preserva la formulación bíblica y la apelación retórica a la solidaridad familiar; la nota evita una lectura restringida solo a hermanos de sangre.
  doctrine_reference: Principios de fidelidad léxica y aclaración contextual; cf. notas de kinship en la metodología POB.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una corrección importante en la frase final: de una traducción más analítica a «we are kinsmen», por considerar que אֲנָשִׁים אַחִים funciona como una unidad idiomática de parentesco. En español se optó por conservar la palabra «hermanos» en el texto principal para reflejar la imagen del hebreo, mientras la nota expone el sentido ampliado de parentesco. También se evitó una calca de la estructura inglesa en la cláusula de causa y en la coordinación de las relaciones interpersonales.'
  spanish_consistency_notes:
  - Se usa «Abram» conforme al texto fuente, no «Abrán».
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aparece.
  - «Pastores» se eligió por naturalidad y brevedad; no implica necesariamente ovinos únicamente, sino cuidadores del ganado en contexto pastoril.
  - La nota a preserva la tensión entre el valor literal «hermanos» y el sentido ampliado de parentesco documentado en el audit trail.
