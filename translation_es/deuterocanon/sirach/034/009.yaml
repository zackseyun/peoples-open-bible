translation:
  language: es
  text: Un hombre instruido ha conocido muchas cosas, y el que tiene mucha experiencia[a] contará el entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el muy experimentado»; el griego también puede entenderse con un matiz de experiencia adquirida, en paralelo con el resto del dicho sapiencial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  - Uno
  lexicon: BDAG
  rationale: El griego usa un sustantivo masculino singular que funciona proverbialmente. «Un hombre» conserva esa forma sin perder el valor general.
- source_word: πεπαιδευμένος
  english_pob_choice: who has traveled / educated / trained
  chosen_spanish: instruido
  alternatives_spanish:
  - educado
  - formado
  - disciplinado
  lexicon: BDAG
  rationale: La tradición auditada muestra una tensión entre «educado/instruido» y la lectura contextual ligada a experiencia. En español, «instruido» conserva la idea de formación adquirida sin forzar una paráfrasis como «que ha viajado», que iría más allá del término griego por sí solo.
- source_word: ἔγνω πολλά
  english_pob_choice: knows many things
  chosen_spanish: ha conocido muchas cosas
  alternatives_spanish:
  - conoce muchas cosas
  - ha aprendido mucho
  lexicon: BDAG
  rationale: El aoristo gnómico admite una formulación de resultado adquirido. «Ha conocido muchas cosas» suena natural en español y mantiene el sentido de saber adquirido por experiencia.
- source_word: ὁ πολυπειρῶν
  english_pob_choice: one with much experience
  chosen_spanish: el que tiene mucha experiencia
  alternatives_spanish:
  - el muy experimentado
  - el que ha probado mucho
  lexicon: BDAG
  rationale: La expresión subraya la acumulación de experiencia. «El que tiene mucha experiencia» es transparente y conserva el matiz experiencial.
- source_word: ἐκδιηγήσεται
  english_pob_choice: will recount
  chosen_spanish: contará
  alternatives_spanish:
  - relatará
  - narrará
  - expondrá
  lexicon: BDAG
  rationale: El verbo implica expresar o declarar algo de manera desarrollada. «Contará» es breve y fiel en un dicho sapiencial.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la comprensión
  - el discernimiento
  - la inteligencia
  lexicon: BDAG
  rationale: «Entendimiento» refleja el término sapiencial sin reducirlo a mera capacidad intelectual; en español bíblico conserva bien la amplitud semántica.
theological_decisions:
- issue: Fuente principal en vista del conflicto entre el hebreo suministrado y el paralelo griego
  english_pob_reading: The draft follows the Greek witness here because the supplied Hebrew line is materially divergent and appears to belong elsewhere.
  chosen_spanish_reading: El texto principal sigue el testimonio griego, ya que el hebreo suministrado no corresponde al contenido de este versículo.
  alternative_spanish_readings:
  - 'Traducir el hebreo suministrado: «En todos tus hechos muestra un rostro alegre, y con gozo diezma lo que es santo».'
  rationale: La tarea exige un manejo auditable de la evidencia. Dado que el griego coincide con la estructura proverbial de Sirácides 34:9 y el hebreo aportado es ajeno al contexto, la línea principal debe basarse en el griego, mientras se reconoce la discrepancia textual.
  doctrine_reference: 'PHILOSOPHY.md: preservar honestamente la incertidumbre textual y traducir desde el testigo operativo más fiable para el pasaje.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota no anclada y haciendo que el marcador [a] aparezca exactamente en el texto. La redacción principal mantiene el testimonio griego como base operativa, en coherencia con la nota textual auditada.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y no aplica aquí ninguna terminología del nombre divino.
  - Se usó registro sapiencial sobrio y publicable, sin calcos excesivamente ingleses.
  - «Entendimiento» se mantiene como término amplio y bíblicamente reconocible.
  - El marcador de nota al pie aparece una sola vez y está anclado en el sintagma al que corresponde.
