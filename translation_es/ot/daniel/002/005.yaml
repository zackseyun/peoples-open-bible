base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/005.yaml
  text: 'The king answered and said to the Chaldeans[a], “The word from me is firm: if you do not make known to me the dream and its interpretation, you will be torn limb from limb[b], and your houses will be made a refuse heap.”'
  footnotes:
  - marker: a
    text: Or, “The word has gone out from me.”
    reason: alternative_reading
  - marker: b
    text: Traditionally, “you will be made into pieces.” The Aramaic term is more literally “limbs” or “members,” implying dismemberment.
    reason: lexical_alternative
