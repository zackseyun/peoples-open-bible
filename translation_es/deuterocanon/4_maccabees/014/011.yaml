translation:
  language: es
  text: Y no consideren extraordinario que la razón haya prevalecido sobre aquellos hombres en sus tormentos[a], pues incluso la mente de una mujer despreció dolores[b] más intensos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haya prevalecido sobre aquellos hombres en sus torturas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dolores más severos» o «se elevó por encima de sufrimientos más variados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμαστόν
  english_pob_choice: remarkable
  chosen_spanish: admirable
  alternatives_spanish:
  - asombroso
  - sorprendente
  - maravilloso
  lexicon: LSJ
  rationale: En español, 'admirable' comunica mejor que no debe ser visto como algo digno de asombro, sin volverlo demasiado coloquial. Conserva el valor de algo que no ha de considerarse extraordinario en el sentido de asombrar.
- source_word: ἡγεῖσθε
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - piensen
  - estimen
  - reparen
  lexicon: LSJ
  rationale: Con un adjetivo predicativo, el verbo expresa 'considerar/estimar como'. 'Consideren' es natural y reproduce el giro exhortativo del griego.
- source_word: λογισμὸς
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - la facultad racional
  - la reflexión
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός es un término programático para la razón que domina las pasiones. 'La razón' es la equivalencia más directa y clara en español.
- source_word: περιεκράτησεν
  english_pob_choice: gained the mastery over
  chosen_spanish: haya prevalecido sobre
  alternatives_spanish:
  - haya dominado a
  - haya vencido a
  - haya ganado la victoria sobre
  lexicon: LSJ
  rationale: '''Prevalecido sobre'' preserva la idea de dominio efectivo y suena más natural en español que una perífrasis más pesada, manteniendo la fuerza del compuesto griego.'
- source_word: βασάνοις
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - suplicios
  - pruebas
  lexicon: LSJ
  rationale: '''Tormentos'' conserva el campo semántico de sufrimiento infligido sin restringirlo mecánicamente a la técnica de tortura.'
- source_word: ὅπου γε καί
  english_pob_choice: since even
  chosen_spanish: pues incluso
  alternatives_spanish:
  - ya que incluso
  - puesto que incluso
  - porque incluso
  lexicon: LSJ
  rationale: La partícula introduce una razón enfática. 'Pues incluso' transmite bien la relación causal y el refuerzo retórico.
- source_word: νοῦς
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - intelecto
  - pensamiento
  lexicon: LSJ
  rationale: '''Mente'' es el equivalente más natural en español para el facultad interior que aquí se contrapone al dolor corporal.'
- source_word: πολυτροπωτέρων
  english_pob_choice: more severe / more varied
  chosen_spanish: más intensos
  alternatives_spanish:
  - más severos
  - más variados
  - más múltiples
  lexicon: LSJ
  rationale: El contexto y la revisión inglesa favorecen la idea de sufrimientos intensificados, no solo diversos. 'Más intensos' recoge mejor esa fuerza comparativa en español.
- source_word: ὑπερεφρόνησεν
  english_pob_choice: looked down on
  chosen_spanish: despreció
  alternatives_spanish:
  - miró por encima
  - se elevó sobre
  - tuvo en poco
  lexicon: LSJ
  rationale: El verbo expresa desprecio o estimar por debajo de sí. 'Despreció' comunica la superioridad moral/mental del sujeto sobre el dolor.
- source_word: ἀλγηδόνων
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - padecimientos
  - sufrimientos
  - agonías
  lexicon: LSJ
  rationale: '''Dolores'' es una opción clara y fiel, especialmente en combinación con ''más intensos''; conserva el sentido directo de sufrimientos dolorosos.'
theological_decisions:
- issue: λoγισμός como término antropológico-filosófico en un texto de martirio
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - la racionalidad
  - el juicio racional
  rationale: La obra desarrolla la tesis de que la razón gobierna las pasiones. Mantener 'la razón' preserva esa afirmación antropológica sin introducir terminología ajena al pasaje.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
- issue: Contraste de género explícito en γυναικός
  english_pob_reading: a woman's mind
  chosen_spanish_reading: la mente de una mujer
  alternative_spanish_readings:
  - la mente femenina
  - la mujer en su mente
  rationale: El griego marca de modo explícito a 'una mujer'. 'La mente de una mujer' conserva ese contraste con 'aquellos hombres' sin neutralizarlo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
- issue: Relación entre πολυτροπωτέρων y ἀλγηδόνων
  english_pob_reading: more severe pains
  chosen_spanish_reading: dolores más intensos
  alternative_spanish_readings:
  - padecimientos más severos
  - sufrimientos más intensos
  - dolores más variados
  rationale: La revisión inglesa corrigió la lectura hacia una intensificación del dolor, no mera variedad. En español, 'más intensos' mantiene esa decisión y evita debilitar la comparación.
  doctrine_reference: source_payload + applied_revisions
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que prefirió una lectura intensiva de πολυτροπωτέρων ἀλγηδόνων ('more severe pains') frente a 'more varied pains'. Mantengo también la decisión léxica de λογισμός como 'reason' y el contraste marcado entre 'those men' y 'a woman's mind'.
  spanish_consistency_notes:
  - Conservo 'la razón' para λογισμός en coherencia con 4 Macabeos.
  - Uso 'tormentos' para βασάνοις, alineado con el valor martirial del contexto.
  - Mantengo 'mente de una mujer' para preservar el contraste explícito de género del griego.
  - La puntuación y el orden buscan una cadencia bíblica moderna sin calco servil.
