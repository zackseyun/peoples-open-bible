id: ISA.21.14
reference: Isaiah 21:14
source:
  edition: WLC
  text: לִ/קְרַ֥את צָמֵ֖א הֵתָ֣יוּ מָ֑יִם יֹשְׁבֵי֙ אֶ֣רֶץ תֵּימָ֔א בְּ/לַחְמ֖/וֹ קִדְּמ֥וּ נֹדֵֽד׃
translation:
  text: Bring water to meet the thirsty[a]; O inhabitants of the land of Tema[b], meet the fugitive with bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'meet the fugitive with bread for him.' The Hebrew phrase may mean either accompanying the meeting with his bread/provisions or supplying bread to him.
    reason: lexical_alternative
  - marker: b
    text: Tema was an Arabian oasis/region associated with caravan routes.
    reason: cultural_note
lexical_decisions:
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - for meeting
  - toward
  lexicon: HALOT
  rationale: The preposition with qerat expresses movement/action toward someone in encounter. In English, 'to meet' best captures the idiom in both cola.
- source_word: צָמֵא
  chosen: the thirsty
  alternatives:
  - the thirsty one
  - the thirsty person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally and likely collectively or representatively. 'The thirsty' is natural English and preserves the sense without over-specifying number.
- source_word: הֵתָיוּ
  chosen: bring
  alternatives:
  - bring here
  - come with
  lexicon: HALOT
  rationale: Imperative plural from אתה/יאה in this context is commonly understood as an exhortation to bring or present. 'Bring' fits the object 'water' and the parallel imperative in the second colon.
- source_word: מָיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: יֹשְׁבֵי אֶרֶץ תֵּימָא
  chosen: O inhabitants of the land of Tema
  alternatives:
  - inhabitants of the land of Tema
  - those dwelling in the land of Tema
  lexicon: HALOT
  rationale: Vocative sense is demanded by the imperative address. Tema is a place name and is transliterated per translation philosophy.
- source_word: בְּלַחְמוֹ
  chosen: with his bread
  alternatives:
  - with bread for him
  - with food
  - with bread
  lexicon: HALOT
  rationale: The beth is best taken instrumentally/accompaniment, and the 3ms suffix most naturally refers to the fugitive ('his bread'). This preserves the Hebrew form without paraphrasing to the more interpretive 'bring him bread.'
- source_word: קִדְּמוּ
  chosen: meet
  alternatives:
  - go before
  - come before
  - greet
  lexicon: HALOT
  rationale: The piel commonly means to meet or go to meet. 'Meet' gives clear modern English and matches the first colon's encounter language.
- source_word: נֹדֵד
  chosen: the fugitive
  alternatives:
  - the wanderer
  - the one fleeing
  lexicon: HALOT
  rationale: In context of an oracle about flight and displacement, 'fugitive' best captures the participle's sense of one in flight, more specifically than 'wanderer.'
