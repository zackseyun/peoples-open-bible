translation:
  language: es
  text: No son sabios muchos, ni los ancianos entienden la justicia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “juicio” o “lo que es recto”. El hebreo mishpat puede referirse al juicio legal, a la justicia o al orden recto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: It is not
  chosen_spanish: No son
  alternatives_spanish:
  - No es
  - No son los
  lexicon: HALOT
  rationale: La negación introduce una sentencia gnómica contrastiva; en español, 'No son...' expresa con naturalidad la estructura enfática sin añadir elementos ajenos al hebreo.
- source_word: רַבִּים
  english_pob_choice: the many
  chosen_spanish: los muchos
  alternatives_spanish:
  - muchos
  - la multitud
  - los numerosos
  lexicon: HALOT
  rationale: El hebreo funciona sustantivado y contrasta un grupo numeroso con 'los ancianos'. 'Los muchos' conserva esa sustantivación y evita introducir la idea de rango o prestigio.
- source_word: יֶחְכָּמוּ
  english_pob_choice: are wise
  chosen_spanish: son sabios
  alternatives_spanish:
  - llegan a ser sabios
  - se vuelven sabios
  - muestran sabiduría
  lexicon: HALOT
  rationale: 'En este proverbio, el valor es estativo/general: no afirma un proceso sino una cualidad atribuida. ''Son sabios'' refleja bien ese sentido.'
- source_word: וּזְקֵנִים
  english_pob_choice: nor the old
  chosen_spanish: ni los ancianos
  alternatives_spanish:
  - ni los viejos
  - ni los de edad avanzada
  - ni los mayores
  lexicon: HALOT
  rationale: Aunque זְקֵנִים puede ser 'ancianos' en sentido de oficio, aquí el paralelismo con la edad es el punto principal. 'Ancianos' mantiene la referencia etaria y suena natural en registro bíblico.
- source_word: יָבִינוּ
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - disciernen
  - comprenden
  lexicon: HALOT
  rationale: '''Entienden'' es la equivalencia más directa y clara para בין en este contexto de discernimiento moral.'
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - lo recto
  - el derecho
  lexicon: HALOT
  rationale: El POB inglés opta por 'justice' para abarcar el sentido moral-jurídico más amplio. En español, 'la justicia' comunica esa amplitud con naturalidad; 'juicio' queda como alternativa lexical viable.
theological_decisions:
- issue: Sentido de מִשְׁפָּט en un dicho sapiencial
  english_pob_reading: justice; not merely legal judgment but moral-judicial discernment
  chosen_spanish_reading: la justicia; no solo decisión legal, sino discernimiento moral y orden recto
  alternative_spanish_readings:
  - el juicio
  - lo correcto
  - el derecho
  rationale: El hebreo permite una gama semántica amplia. La traducción mantiene 'justicia' para conservar el alcance ético-jurídico señalado por el audit trail, sin reducirlo a un trámite forense.
  doctrine_reference: Sabiduría bíblica / ética del discernimiento
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; se conserva el sentido general del audit trail inglés y se ajusta a un español bíblico natural. Se mantuvo la tensión léxica de מִשְׁפָּט con una nota alternativa, en lugar de resolverla de manera reductiva.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este verso; no aparece el nombre divino.
  - Se mantuvo 'justicia' como término principal para מִשְׁפָּט, en línea con la elección inglesa 'justice'.
  - Se prefirió una sintaxis española directa ('No son... ni...') para reflejar el paralelismo hebreo sin calco rígido.
  - No se introdujeron términos eclesiásticos ajenos al hebreo; 'ancianos' se entiende aquí en sentido etario, no como cargo.
