review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: γάρ como explicación, βασιλέα como objeto indefinido, y la doble incapacidad de los ídolos respecto a realeza y lluvia. Sin embargo, la segunda cláusula en español pierde claridad al decir ''ni ciertamente darán lluvia'', donde la negación enfática griega οὐ μὴ δῶσιν no queda expresada de forma suficientemente directa dentro de la propia cláusula. Además, ''para una tierra'' es posible pero menos natural aquí que ''para un país'' o ''para una región'', dado el contexto político de ''rey''.'
  spanish_quality_summary: 'El español es comprensible, pero suena algo calcado en dos puntos: ''para una tierra'' junto a ''levantarán un rey'' resulta menos idiomático, y ''ni ciertamente darán'' suena forzado. Una formulación más natural y fiel sería ''Porque ciertamente no levantarán un rey para un país[a], ni ciertamente darán lluvia a los hombres[b]'' o, mejor aún, con la negación repetida explícitamente: ''ni ciertamente no darán lluvia...'', pero eso sería antinatural en español. La solución más fluida y precisa es desplazar el adverbio: ''ni darán ciertamente lluvia''. Aun así, para reflejar bien οὐ μή, lo más natural es ''ni de ningún modo darán lluvia''.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo ἀνθρώποις. El uso de 'a los hombres' es defendible por correspondencia formal y coincide con la nota explicativa. No hay conflicto teológico. El principal ajuste es estilístico-lexical en χώρας y en la expresión de la negación enfática.
  issues:
  - severity: medium
    issue: La negación enfática de οὐ μὴ δῶσιν queda débilmente expresada en la segunda cláusula.
    rationale: En griego, también la segunda acción está bajo negación enfática. 'Ni ciertamente darán' puede entenderse, pero en español no transmite con tanta claridad 'de ningún modo darán'.
  - severity: medium
    issue: '''Para una tierra'' suena menos natural que la alternativa contextual.'
    rationale: Aunque χώρα puede significar 'tierra', con 'rey' el sentido político-territorial favorece 'país' o 'región'. El propio English POB revisado optó por 'country'.
  - severity: low
    issue: La colocación de 'ciertamente' en ambas cláusulas suena algo rígida.
    rationale: Es comprensible, pero poco idiomática en español moderno eclesial. Conviene una redacción más natural sin perder la fuerza del original.
  revised_spanish_text: Porque ciertamente no levantarán un rey para un país[a], ni de ningún modo darán lluvia a los hombres[b],
  revised_footnotes:
  - marker: a
    text: O 'para una tierra' o 'para una región'. El griego χώρας puede significar tierra, país o región.
    reason: lexical_alternative
  - marker: b
    text: '''A los hombres'' conserva la forma masculina del griego, con sentido genérico para los seres humanos en general.'
    reason: lexical_alternative
  revision_rationale: Se ajusta χώρας a 'país' por mayor naturalidad contextual con 'rey', manteniendo en nota las alternativas 'tierra' y 'región'. Se fortalece la segunda cláusula con 'de ningún modo' para representar claramente la negación enfática οὐ μή sin producir una construcción española torpe. Se conserva 'a los hombres' con nota, ya que el borrador documenta correctamente la correspondencia formal con ἀνθρώποις.
