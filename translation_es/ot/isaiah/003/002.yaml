translation:
  language: es
  text: el valiente y el hombre de guerra, el juez y el profeta, el adivino[a] y el anciano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el soothsayer». El término hebreo se refiere a quien practica adivinación.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּבּוֹר
  english_pob_choice: the mighty man
  chosen_spanish: el valiente
  alternatives_spanish:
  - el poderoso
  - el hombre poderoso
  - el guerrero
  lexicon: HALOT
  rationale: En esta lista de figuras sociales y de liderazgo, גִּבּוֹר puede referirse a un hombre fuerte o valeroso. «El valiente» conserva la idea de vigor/capacidad personal sin duplicar innecesariamente la función militar que ya expresa la frase siguiente.
- source_word: אִישׁ מִלְחָמָה
  english_pob_choice: the man of war
  chosen_spanish: el hombre de guerra
  alternatives_spanish:
  - el guerrero
  - el soldado
  lexicon: HALOT
  rationale: La expresión hebrea se mantiene de modo cercano en español para preservar el giro idiomático y la distinción respecto de גִּבּוֹר. «El hombre de guerra» refleja con claridad el sentido de un perfil militar o belicoso.
- source_word: שׁוֹפֵט
  english_pob_choice: the judge
  chosen_spanish: el juez
  alternatives_spanish:
  - el gobernante
  - el magistrado
  lexicon: HALOT
  rationale: El término designa a quien juzga en sentido cívico o legal. «El juez» es la equivalencia más directa y reconocible en español.
- source_word: נָבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el vidente
  lexicon: HALOT
  rationale: Es el equivalente estándar y más fiel al oficio reconocido del texto.
- source_word: קֹסֵם
  english_pob_choice: the diviner
  chosen_spanish: el adivino
  alternatives_spanish:
  - el soothsayer
  - el hechicero
  lexicon: HALOT
  rationale: El término hebreo se refiere a quien practica adivinación. «Adivino» comunica el sentido de manera natural en español y evita una rareza léxica. La carga negativa queda implícita por el contexto profético, sin suavizar el vocablo.
- source_word: זָקֵן
  english_pob_choice: the elder
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el anciano de la comunidad
  lexicon: HALOT
  rationale: En una lista de figuras públicas, זָקֵן puede aludir tanto a edad como a estatus social. «El anciano» mantiene la ambigüedad útil entre edad y autoridad de mayor edad, sin reducirlo a una mera descripción biológica.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - ','
  - y también
  lexicon: BHSA / uso coordinativo general
  rationale: La serie hebrea es catalogal y se reproduce con coordinación normal en español. «Y» conserva la acumulación de cargos y figuras sin forzar una sintaxis extraña.
theological_decisions:
- issue: Tratamiento de קֹסֵם en un catálogo de liderazgo que será removido
  english_pob_reading: the diviner
  chosen_spanish_reading: el adivino
  alternative_spanish_readings:
  - el soothsayer
  - el hechicero
  - el adivino/soothsayer
  rationale: La traducción mantiene el valor descriptivo del término sin convertirlo en una aprobación moral ni atenuarlo. En el contexto de Isaías 3, se trata de una figura social que Yahvé quitará de Judá y Jerusalén; no hace falta introducir una explicación doctrinal en el texto principal.
  doctrine_reference: Isaías 3:1-3; principio POB de preservar la fuerza lexical sin suavizar el juicio profético
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y concuerda con la decisión inglesa auditada de distinguir גִּבּוֹר de אִישׁ מִלְחָמָה, conservar el valor funcional de שׁוֹפֵט y traducir קֹסֵם de forma directa. No se requieren ajustes por revisiones previas, ya que el informe indica que no hubo cambios.
  spanish_consistency_notes:
  - Se mantuvo la serie nominal breve y solemne del hebreo, con artículos repetidos para claridad natural en español.
  - «Anciano» conserva la posible carga de oficio/comunidad mejor que «viejo».
  - No se usó «SEÑOR» ni otros sustitutos, porque no aparece el tetragrámaton en este versículo.
  - La nota al pie se ancla solo en «adivino» para preservar la alternativa léxica documentada en la edición inglesa.
