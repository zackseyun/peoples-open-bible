theological_decisions:
- issue: Rendering the cluster of covenantal/legal terms before Sinai
  chosen_reading: Retain the distinct legal terms ('charge, commandments, statutes, laws') without harmonizing or explaining them away.
  alternative_readings:
  - Compress the list into a smoother phrase such as 'my requirements and laws'
  - Render תורותי as 'instructions' to avoid anachronistic legal overtones
  rationale: The verse intentionally piles up near-synonymous covenantal terms to stress Abraham's comprehensive obedience. The translation preserves that rhetorical weight and theological tension rather than resolving questions about how pre-Sinai obedience relates to later Torah categories. This follows the project's principle of preserving tension rather than importing a doctrinal system.
  doctrine_reference: Translation philosophy §3, §5
