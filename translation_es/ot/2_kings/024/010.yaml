translation:
  language: es
  text: En aquel tiempo, los siervos de Nabucodonosor, rey de Babilonia, subieron contra Jerusalén[a], y la ciudad entró en asedio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «subieron a Jerusalén»; el modismo hebreo «subir/ir arriba» suele reflejar tanto la elevación geográfica como el avance militar.
    reason: lexical_alternative
  - marker: b
    text: O «la ciudad fue sitiada». El hebreo dice más literalmente «la ciudad entró en el asedio», lo cual puede subrayar el comienzo del asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Por aquel tiempo
  lexicon: HALOT
  rationale: La frase marca el encuadre temporal histórico. «En aquel tiempo» conserva el valor deíctico del hebreo y suena natural y digno en español bíblico moderno.
- source_word: עָלָה
  english_pob_choice: came up against
  chosen_spanish: subieron contra
  alternatives_spanish:
  - subieron a
  - marcharon contra
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «subir/ir arriba» y, en contexto militar, expresa avance hostil hacia Jerusalén. «Subieron contra» preserva el modismo y deja clara la hostilidad sin sobreexplicar.
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - oficiales
  - servidores
  lexicon: HALOT
  rationale: Aquí el sustantivo designa a los subordinados de Nabucodonosor. «Siervos» mantiene el sentido relacional de dependencia sin forzar «esclavos», que en español puede sonar más duro de lo que el contexto exige.
- source_word: נְבֻכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  lexicon: standard transliteration
  rationale: Se usa la forma española establecida del nombre propio, equivalente al inglés estándar, para una lectura natural y reconocible.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babel
  lexicon: HALOT
  rationale: Título real directo y transparente; «Babilonia» es la forma usual en español bíblico para el imperio y la ciudad-estado en este contexto.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: standard transliteration
  rationale: Nombre propio según la convención española habitual.
- source_word: וַתָּבֹא הָעִיר בַּמָּצוֹר
  english_pob_choice: and the city came under siege
  chosen_spanish: y la ciudad quedó sitiada
  alternatives_spanish:
  - y la ciudad entró en sitio
  - y la ciudad fue sitiada
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «la ciudad entró en sitio/sitiación», con valor ingresivo. «Quedó sitiada» comunica ese estado resultante con naturalidad en español, sin perder el sentido de inicio del asedio.
- source_word: מָצוֹר
  english_pob_choice: siege
  chosen_spanish: sitiada
  alternatives_spanish:
  - sitio
  - asedio
  lexicon: HALOT
  rationale: El término denota el estado de sitio militar. En español, la forma verbal/adjetival «sitiada» integra el sustantivo implícito y mantiene la fuerza del hebreo con mayor fluidez que un giro nominal pesado.
theological_decisions:
- issue: Cómo verter la frase militar «came up against» sin borrar el matiz geográfico del hebreo ni la hostilidad contextual
  english_pob_reading: came up against
  chosen_spanish_reading: subieron contra
  alternative_spanish_readings:
  - subieron a
  - marcharon contra
  rationale: 'El hebreo usa el verbo de ascenso, que puede aludir tanto a la subida geográfica hacia Jerusalén como al avance militar. «Subieron contra» conserva ambos planos: el movimiento ascendente y la intención hostil del contexto narrativo.'
  doctrine_reference: Narrativa histórica; no implica doctrina específica.
- issue: Cómo reflejar el valor ingresivo de וַתָּבֹא הָעִיר בַּמָּצוֹר
  english_pob_reading: and the city came under siege
  chosen_spanish_reading: y la ciudad quedó sitiada
  alternative_spanish_readings:
  - y la ciudad fue sitiada
  - y la ciudad entró en sitio
  rationale: La audit trail inglesa destaca que el hebreo puede enfatizar el comienzo del asedio. «Quedó sitiada» comunica el estado alcanzado y, por contexto narrativo, permite entender el ingreso a la situación de sitio sin recurrir a un calco menos natural.
  doctrine_reference: Narrativa histórica; no implica doctrina específica.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el trazado auditado en inglés, sin cambios de sentido respecto de la traducción POB inglesa; se adaptó el estilo al español manteniendo el valor idiomático y el matiz ingresivo del asedio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se usa «siervos» como equivalente contextual de עַבְדֵי, sin introducir «esclavos» porque aquí la relación de dependencia es cortesana/política y no esclavista en sentido directo.
  - Se preserva el movimiento militar con «subieron contra» para no borrar el modismo hebreo.
  - «Sitiada» se eligió para dar una lectura natural del estado resultante, coherente con el inglés auditado «came under siege».
