lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... dijo
  - Luego ... habló
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, 'Entonces' conserva la progresión temporal de forma natural. 'Habló' refleja con mayor precisión el acto de dirigirse a alguien que el simple 'dijo', especialmente porque luego sigue לֵאמֹר introduciendo la cita.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mosés
  lexicon: Nombre propio bíblico estándar
  rationale: Nombre propio tradicional y claro en español bíblico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - con
  lexicon: HALOT
  rationale: La preposición marca dirección del habla; en español, 'habló a Yahvé' reproduce mejor esa relación que otras opciones.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino personal revelado en el texto original. 'Yahvé' es la forma española adoptada para el mismo criterio que el inglés POB expresa con 'Yahweh', en lugar de sustituirlo por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - deciendo
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso directo se traduce de manera directa con 'diciendo', manteniendo la estructura hebrea sin expansión innecesaria.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea doctrinal del POB evita la sustitución del Tetragrámaton por un título. En español, 'Yahvé' preserva ese nombre personal y mantiene la misma decisión teológica que el auditable 'Yahweh' del inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y con el audit trail inglés; no se detectaron revisiones aplicadas ni cambios necesarios en el sentido, solo adaptación idiomática al español con preservación del nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para conservar la decisión del POB sobre el Tetragrámaton.
  - Se usa 'habló ... diciendo' para reflejar la fórmula narrativa hebrea sin añadir contenido.
  - La puntuación española introduce una coma antes de la cita directa siguiendo el uso moderno y la cadencia del castellano bíblico.
