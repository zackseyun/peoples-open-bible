translation:
  language: es
  text: La carreta[a] llegó al campo de Josué el bet-semesita y se detuvo allí[b], donde había una piedra grande. Entonces partieron la madera de la carreta y ofrecieron las vacas como holocausto a Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el carro». El hebreo עֲגָלָה nombra un vehículo de ruedas; aquí se refiere a la carreta que llevaba el arca y la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O «y estuvo allí». El verbo hebreo dice literalmente «estuvo de pie», pero aplicado a una carreta en movimiento se entiende que se detuvo.
    reason: lexical_alternative
  - marker: c
    text: La fuente hebrea dice literalmente «a Yahvé».
    reason: source_note
lexical_decisions:
- source_word: הָעֲגָלָה
  english_pob_choice: the cart
  chosen_spanish: la carreta
  alternatives_spanish:
  - el carro
  - la carreta
  lexicon: HALOT
  rationale: עֲגָלָה designa aquí el vehículo que transporta el arca y la ofrenda. En español, «carreta» comunica con naturalidad un vehículo de este tipo y mantiene el tono narrativo; «carro» podría sonar más genérico o moderno según el contexto.
- source_word: בָּאָה
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia un lugar concreto. «Llegó» conserva ese valor direccional en español sin forzar un matiz interpretativo adicional.
- source_word: שְׂדֵה יְהוֹשֻׁעַ בֵּית הַשִּׁמְשִׁי
  english_pob_choice: the field of Joshua the Beth-shemite
  chosen_spanish: el campo de Josué el bet-semesita
  alternatives_spanish:
  - el campo de Josué de Bet-semes
  - el campo de Josué, hombre de Bet-semes
  lexicon: HALOT
  rationale: La construcción hebrea identifica a Josué por su relación con Bet-semes. Se mantiene el gentilicio con «bet-semesita» para conservar la referencia local y la economía del original, evitando una paráfrasis más explicativa.
- source_word: וַתַּעֲמֹד שָׁם
  english_pob_choice: and stopped there
  chosen_spanish: y se detuvo allí
  alternatives_spanish:
  - y estuvo allí
  - y paró allí
  lexicon: HALOT
  rationale: Aunque עמד significa literalmente «estar de pie», aquí el sujeto es una carreta en movimiento. «Se detuvo» reproduce la función contextual del verbo sin perder la imagen del alto en ese lugar.
- source_word: וְשָׁם אֶבֶן גְּדוֹלָה
  english_pob_choice: where there was a large stone
  chosen_spanish: donde había una piedra grande
  alternatives_spanish:
  - y allí había una piedra grande
  - donde estaba una gran piedra
  lexicon: HALOT
  rationale: La frase señala la presencia de una piedra destacada en ese sitio. «Había» evita una repetición torpe de «allí» y conserva el valor locativo del hebreo.
- source_word: וַיְבַקְּעוּ
  english_pob_choice: they split up
  chosen_spanish: partieron
  alternatives_spanish:
  - rajaron
  - dividieron
  - hendidieron
  lexicon: HALOT
  rationale: בקע expresa partir o rajar madera. «Partieron» es claro y natural en español para la acción de preparar la madera como combustible; «rajaron» sería más coloquial y «hendidieron» más técnico.
- source_word: עֲצֵי הָעֲגָלָה
  english_pob_choice: the wood of the cart
  chosen_spanish: la madera de la carreta
  alternatives_spanish:
  - la leña de la carreta
  - la madera del carro
  lexicon: HALOT
  rationale: El sintagma se refiere a la madera del vehículo, preparada para el fuego. «Madera» mantiene el sentido material sin añadir la idea de leña, que es posible pero más interpretativa.
- source_word: הַפָּרוֹת
  english_pob_choice: the cows
  chosen_spanish: las vacas
  alternatives_spanish:
  - las novillas
  - las reses
  lexicon: HALOT
  rationale: פרות es el plural común de vacas. Se conserva ese sentido básico; «novillas» estrecharía indebidamente el referente y no está exigido por el hebreo de este versículo.
- source_word: הֶעֱלוּ עֹלָה
  english_pob_choice: offered up ... as a burnt offering
  chosen_spanish: ofrecieron ... como holocausto
  alternatives_spanish:
  - sacrificaron ... como holocausto
  - ofrecieron ... en holocausto
  lexicon: HALOT
  rationale: La construcción sacrificial indica una ofrenda quemada completa. «Holocausto» es el término bíblico español tradicional y transparente; «ofrecieron» conserva la imagen verbal de elevar/ofrecer algo a Dios.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de traducir יְהוָה como «Yahvé» en el texto principal, preservando el nombre del pacto en lugar de ocultarlo tras una sustitución reverencial.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: 'El versículo usa directamente el Tetragrama. En consonancia con la decisión doctrinal del proyecto de no enmascararlo, se traduce con el nombre propio de Dios en forma hispana establecida: «Yahvé».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sacrificial terminology for עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - sacrificio totalmente quemado
  rationale: La ofrenda descrita es una qorbán totalmente consumida por el fuego. «Holocausto» es la equivalencia bíblica española más asentada y conserva la categoría sacrificial sin sobreexplicar el rito.
  doctrine_reference: Terminología sacrificial estándar en el corpus bíblico
- issue: Identifying Joshua as a Beth-shemite
  english_pob_reading: the Beth-shemite
  chosen_spanish_reading: el bet-semesita
  alternative_spanish_readings:
  - el de Bet-semes
  - el hombre de Bet-semes
  rationale: El hebreo usa un gentilicio relacional. «Bet-semesita» preserva esa relación y evita convertirla en una explicación más larga que debilite la concisión narrativa.
  doctrine_reference: Onomástica y gentilicios bíblicos
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético y la auditoría inglesa, pero adapta con naturalidad los verbos de movimiento y la sintaxis locativa. Se preservan las decisiones del audit trail sobre עָגָלָה, עמד, בקע, עֹלָה y el Tetragrama, ajustando la formulación al español sin perder la tensión lexical.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la política del proyecto para יְהוָה.
  - «Holocausto» se usa como término sacrificial técnico; no se sustituyó por «ofrenda quemada».
  - El gentilicio «bet-semesita» conserva la relación con Bet-semes sin expandir el nombre propio.
  - Las notas a pie distinguen alternativas léxicas reales y no duplican el contenido del texto principal.
