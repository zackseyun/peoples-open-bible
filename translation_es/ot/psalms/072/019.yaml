  - severity: low
    issue: Punto y coma algo rígido tras 'para siempre'.
    rationale: No es incorrecto, pero una coma fluye mejor en español contemporáneo sin perder solemnidad.
  revised_spanish_text: Y bendito sea su nombre glorioso[a] para siempre, y que su gloria llene toda la tierra[b]. Amén y amén.
