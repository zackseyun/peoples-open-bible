    text: O «a mi puesto» o «a mi posición»; el modismo hebreo se refiere a la restitución a su antigua función oficial.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta «nos lo interpretó» a «nos interpretó» para reflejar con mayor naturalidad פתר לנו sin añadir un objeto directo implícito. Se cambia «lo colgó» por «lo ahorcó» para expresar con claridad el sentido judicial de תלה en español contemporáneo. También se mejora la nota: «posición» funciona mejor que «estación» en español eclesial general para este contexto de cargo oficial.'
