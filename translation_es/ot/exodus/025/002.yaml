    text: 'Hebreo: «los hijos de Israel», designación tradicional del pacto para el pueblo de Israel.'
    reason: cultural_note
  - marker: b
    text: 'O: «cuyo corazón lo impulse» o «cuyo corazón lo inspire». El hebreo enfatiza una disposición interior voluntaria.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la cláusula final para reflejar claramente la segunda persona plural de תִּקְחוּ y evitar que el español atribuya el verbo a «ellos». También se suavizó el anglicismo «covenantal» en la nota [a]. Se mantuvo «ofrenda», «hijos de Israel» y el modismo del corazón por su buena fidelidad al hebreo y a la auditoría POB.
