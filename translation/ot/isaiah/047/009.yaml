theological_decisions:
- issue: Force of the preposition ב in the final two phrases
  chosen_reading: concessive ('despite your many sorceries ... despite your very powerful spells')
  alternative_readings:
  - causal ('because of your many sorceries ... because of your powerful spells')
  - instrumental/associative ('with your many sorceries ... with your powerful spells')
  rationale: In the immediate literary context, Babylon is condemned for trusting in sorceries and enchantments; the point is that judgment still comes in spite of them. A causal reading could imply the calamities come as a direct result of sorcery, which is possible theologically, but the taunt's rhetorical thrust is better preserved by the concessive sense.
- issue: Aspect of בָּאוּ in prophetic discourse
  chosen_reading: future in English ('they will come upon you')
  alternative_readings:
  - past/perfect ('they have come upon you')
  rationale: The Hebrew perfect can function as a prophetic perfect, presenting a future event as certain. Rendering it as future avoids confusion in English while preserving the prophetic certainty.
