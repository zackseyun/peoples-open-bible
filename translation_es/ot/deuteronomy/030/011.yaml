  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mandamiento» está bien elegido para מִצְוָה. No aparecen términos sensibles del glosario principal. La nota léxica preserva correctamente las alternativas «más allá de ti» y «oculto para ti».
