translation:
  language: es
  text: Su ofrenda de cereal será quemada por completo[a], cada día, dos veces al día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego paralelo: «Sus sacrificios serán completamente consumidos, continuamente, dos veces al día». El testimonio hebreo es más específico: «su ofrenda de cereal».'
    reason: alternative_reading
lexical_decisions:
- source_word: מנחתו
  english_pob_choice: His grain offering
  chosen_spanish: Su ofrenda de cereal
  alternatives_spanish:
  - su ofrenda
  - su ofrenda de tributo
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה puede designar una ofrenda vegetal o de cereal. ‘Ofrenda de cereal’ conserva la especificidad del hebreo mejor que un genérico ‘ofrenda’, y evita introducir ‘sacrificio’ como ampliación innecesaria.
- source_word: כליל
  english_pob_choice: burned up whole
  chosen_spanish: quemada por completo
  alternatives_spanish:
  - completamente consumida
  - quemada totalmente
  - como holocausto
  lexicon: HALOT
  rationale: El término expresa consumo total. ‘Quemada por completo’ comunica esa totalidad en español natural sin convertir la ofrenda en un holocausto técnico distinto de la מִנְחָה.
- source_word: תקטר
  english_pob_choice: shall be burned up
  chosen_spanish: será quemada
  alternatives_spanish:
  - será consumida por el humo
  - será ofrecida en humo
  - será quemada en el altar
  lexicon: HALOT
  rationale: En uso sacrificial, קטר refiere hacer subir la ofrenda en humo sobre el altar. ‘Será quemada’ es la forma más natural y fiel; ‘por completo’ recoge la intensidad de כליל.
- source_word: בכל יום
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - diariamente
  lexicon: HALOT
  rationale: La expresión temporal es directa. ‘Cada día’ mantiene la cadencia y la repetición cotidiana del hebreo.
- source_word: צמיד
  english_pob_choice: continually
  chosen_spanish: de manera continua
  alternatives_spanish:
  - continuamente
  - sin interrupción
  - regularmente
  lexicon: HALOT
  rationale: El hebreo indica continuidad o regularidad cultual. Aunque el texto español ya dice ‘cada día’, conviene conservar la idea de constancia con una nota léxica y no sobresimplificarla en la redacción principal.
- source_word: פעמים
  english_pob_choice: twice
  chosen_spanish: dos veces al día
  alternatives_spanish:
  - dos veces
  - dos veces cada día
  lexicon: HALOT
  rationale: El valor de δίς y פעמים es inequívoco. En español, ‘dos veces al día’ fluye mejor que una repetición literal de ‘dos veces’ sin complemento temporal.
- source_word: θυσίαι αὐτοῦ
  english_pob_choice: His sacrifices
  chosen_spanish: Su ofrenda de cereal
  alternatives_spanish:
  - sus sacrificios
  - sus ofrendas
  lexicon: BDAG
  rationale: El griego paralelo es más amplio (‘sacrificios’), pero el hebreo conservado es más específico y primario aquí. La traducción española sigue el hebreo, mientras el griego funciona como confirmación del marco sacrificial y de la consumación completa.
- source_word: ὁλοκαρπωθήσονται
  english_pob_choice: shall be burned up whole
  chosen_spanish: será quemada por completo
  alternatives_spanish:
  - será consumida por entero
  - será totalmente quemada
  lexicon: BDAG
  rationale: El griego apoya la idea de consumo íntegro sobre el altar. En español, ‘quemada por completo’ preserva la totalidad sin introducir un tecnicismo ajeno al contexto.
theological_decisions:
- issue: Preferencia por la especificidad del hebreo sobre la generalidad del griego
  english_pob_reading: The English POB follows the Hebrew witness and renders the offering specifically as 'grain offering,' noting the Greek broader reading in a footnote.
  chosen_spanish_reading: La lectura española sigue la especificidad de ‘ofrenda de cereal’ y no generaliza a ‘sacrificios’.
  alternative_spanish_readings:
  - sus sacrificios serán quemados por completo, cada día, dos veces al día
  rationale: El testimonio hebreo disponible es más específico y debe tener primacía donde es claro. El griego paralelo confirma el contexto sacrificial y la totalidad de la consumición, pero no obliga a perder la precisión del hebreo.
  doctrine_reference: Primacía de la fuente original; equivalencia óptima
- issue: Conservación de la idea de consumación total sin confundirla con holocausto técnico
  english_pob_reading: '''burned up whole'' avoids importing ''holocaust'' and preserves complete consumption.'
  chosen_spanish_reading: ‘Quemada por completo’ conserva la totalidad sin convertir la ofrenda en un término técnico distinto.
  alternative_spanish_readings:
  - quemada totalmente
  - consumida por entero
  rationale: En español, ‘holocausto’ puede sonar técnicamente incorrecto o confuso en una ofrenda que no es עֹלָה. La formulación elegida mantiene la tensión lexical del original y evita una falsa equivalencia.
  doctrine_reference: Precisión léxica en contexto sacrificial
- issue: Persistencia de la regularidad cultual
  english_pob_reading: 'The line indicates a repeated, ongoing ritual: ''every day, twice a day.'''
  chosen_spanish_reading: ‘Cada día, dos veces al día’ expresa la repetición cotidiana; ‘de manera continua’ queda implícito por el trasfondo léxico y puede explicarse en nota.
  alternative_spanish_readings:
  - cada día, continuamente, dos veces
  - cada día, dos veces
  rationale: El hebreo y el griego combinan frecuencia diaria con continuidad cultual. En español, una formulación demasiado cargada sonaría torpe; por eso se conserva la secuencia temporal clara y se deja constancia de la continuidad en la nota léxica.
  doctrine_reference: Fidelidad semántica con español natural
translation_notes:
  revision_awareness: Se siguió el hebreo conservado como testimonio primario, con el griego como paralelo de control. La formulación española mantiene la especificidad de מִנְחָה, la consumación total de כליל תקטר, y la doble periodicidad del cierre hebreo/griego. También se respetó la tensión entre una ofrenda concreta y la lectura griega más general, reflejándola en nota sin diluirla en el texto principal.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no aplica aquí porque el versículo no contiene el nombre divino.
  - ‘Ofrenda de cereal’ conserva el campo sacrificial de מִנְחָה sin recurrir a ‘sacrificio’ como genérico.
  - ‘Quemada por completo’ evita un calco rígido y mantiene la consumación total.
  - ‘Cada día, dos veces al día’ traduce de modo natural la repetición cultual del hebreo y del griego.
  - La nota marca la divergencia entre hebreo y griego sin borrar ninguna de las dos lecturas.
