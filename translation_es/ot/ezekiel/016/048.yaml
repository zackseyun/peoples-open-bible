translation:
  language: es
  text: «Vivo yo[a] —declara el Señor Dios Yahvé—, que Sodoma, tu hermana, ella y sus hijas[b], no hizo como hicieron tú y tus hijas.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Fórmula hebrea de juramento: literalmente, «Vivo yo ... si Sodoma tu hermana ha hecho ...». La construcción expresa una negación enfática y solemne.'
    reason: lexical_alternative
  - marker: b
    text: «Hijas» se refiere a las ciudades o comunidades asociadas con Sodoma y con Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: חַי אָ֗נִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo[a]
  alternatives_spanish:
  - Tan cierto como que vivo
  - Por mi vida
  lexicon: HALOT
  rationale: La fórmula hebrea de juramento se conserva como una declaración solemne y natural en español. «Vivo yo» mantiene la forma idiomática del original y, con la nota, deja claro el valor de juramento y negación enfática.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: Es la fórmula profética normal de introducción. «Declara» es claro, digno y corresponde bien al tono oracular sin volverlo arcaico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se mantiene la distinción entre אֲדֹנָי y el nombre divino con el término POB «Yahvé» para יְהוָה. «Señor» refleja אֲדֹנָי de manera reverente y natural en español.
- source_word: אִם
  english_pob_choice: has not
  chosen_spanish: 'no'
  alternatives_spanish:
  - ciertamente no
  - si no
  lexicon: HALOT
  rationale: En la sintaxis de juramento, אִם expresa negación enfática. En español la negación se hace explícita con «no» para preservar el sentido real del enunciado.
- source_word: עָשְׂתָה
  english_pob_choice: has done
  chosen_spanish: hizo
  alternatives_spanish:
  - ha hecho
  - obró
  lexicon: HALOT
  rationale: El verbo עשה es amplio; aquí la comparación histórica y acusatoria funciona bien con «hizo» en pasado simple, natural en español y fiel al contraste del versículo.
- source_word: סְדֹם אֲחוֹתֵךְ
  english_pob_choice: your sister Sodom
  chosen_spanish: Sodoma, tu hermana
  alternatives_spanish:
  - tu hermana Sodoma
  - Sodoma, hermana tuya
  lexicon: HALOT
  rationale: Se conserva la metáfora familiar del capítulo. El orden «Sodoma, tu hermana» suena natural en español y mantiene el énfasis del sustantivo propio.
- source_word: הִיא וּבְנוֹתֶיהָ
  english_pob_choice: she and her daughters
  chosen_spanish: ella y sus hijas[b]
  alternatives_spanish:
  - ella misma y sus hijas
  - ella y sus ciudades dependientes
  lexicon: HALOT
  rationale: «Hijas» conserva el recurso metafórico del texto y permite la misma ambigüedad productiva que en el inglés POB, donde alude a pueblos o comunidades asociadas con Sodoma.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - según como
  lexicon: HALOT
  rationale: La comparación se expresa de forma directa y fluida con «como» en español.
- source_word: עָשִׂית אַתְּ וּבְנוֹתָיִךְ
  english_pob_choice: you and your daughters have done
  chosen_spanish: hiciste tú y tus hijas
  alternatives_spanish:
  - has hecho tú y tus hijas
  - tú y tus hijas hicisteis
  lexicon: HALOT
  rationale: Se mantiene el femenino singular dirigido a Jerusalén. El orden con pronombre explícito refleja el énfasis del hebreo y preserva la comparación acusatoria.
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». En el compuesto, «Señor» traduce אֲדֹנָי y «Yahvé» preserva el nombre propio divino, evitando la máscara litúrgica «SEÑOR».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Juramento hebreo con חַי־אני ... אִם
  english_pob_reading: 'a solemn negated assertion: ''As I live ... has not done'''
  chosen_spanish_reading: 'una afirmación negada y solemne: «Vivo yo ... no hizo»'
  alternative_spanish_readings:
  - «Si Sodoma ...» literal pero oscuro
  - «Tan cierto como que vivo ...»
  rationale: El hebreo de juramento usa אִם para una negación enfática. Traducirla como negación explícita en español evita un condicional engañoso y conserva la fuerza retórica del oráculo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora cada nota al pie tiene su marcador correspondiente en el texto principal. También se ajustó la colocación de la nota [a] para anclarla directamente en la fórmula de juramento.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, de acuerdo con la terminología del proyecto.
  - Se conserva «Señor» para אֲדֹנָי en el título compuesto.
  - Se mantiene la metáfora «tu hermana» / «sus hijas» sin explicitarla en el texto principal más allá de la nota.
  - El verbo se expresa en pasado simple («hizo») para un español natural y fiel a la comparación del versículo.
