translation:
  language: es
  text: 'Pero cuando Rubén lo oyó[a], lo rescató de sus manos y dijo: «No le quitemos la vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «cuando lo oyó». El hebreo literalmente dice: «oyó»; el contexto indica que oyó la conversación o el plan de sus hermanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: when ... heard it
  chosen_spanish: cuando ... lo oyó
  alternatives_spanish:
  - oyó
  - se enteró de ello
  lexicon: HALOT
  rationale: שׁמע significa básicamente «oír». En el contexto narrativo, Rubén oye el plan o lo dicho por sus hermanos, así que «lo oyó» reproduce la secuencia de manera natural en español sin añadir más de lo que el contexto permite.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  lexicon: Nombre propio bíblico
  rationale: Se translitera el nombre propio según el uso bíblico común en español, con la forma «Rubén».
- source_word: וַיַּצִּלֵהוּ
  english_pob_choice: rescued him
  chosen_spanish: lo rescató
  alternatives_spanish:
  - lo libró
  - lo salvó
  lexicon: HALOT
  rationale: נצל en hifil suele significar «librar, rescatar». «Lo rescató» expresa bien la acción de apartarlo del peligro inmediato de sus hermanos.
- source_word: מִיָּדָם
  english_pob_choice: from their hand
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de su mano
  - de ellos
  lexicon: HALOT
  rationale: La expresión hebrea conserva la imagen de poder/control. En español, «de sus manos» mantiene esa fuerza idiomática sin volverlo rígidamente literal.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y les dijo
  lexicon: HALOT
  rationale: Fórmula narrativa estándar para introducir discurso directo; «y dijo» es claro y fiel.
- source_word: לֹא נַכֶּנּוּ
  english_pob_choice: Let us not take his life
  chosen_spanish: No le quitemos la vida
  alternatives_spanish:
  - No lo matemos
  - No lo golpeemos hasta matarlo
  lexicon: HALOT
  rationale: נכה literalmente es «golpear/smote», pero aquí, con נֶפֶשׁ, la expresión resulta idiomática para causar una muerte. «No le quitemos la vida» conserva el sentido final sin perder la dignidad del español.
- source_word: נָפֶשׁ
  english_pob_choice: (implicit in 'take his life')
  chosen_spanish: la vida
  alternatives_spanish:
  - su vida
  - la vida de él
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí funciona idiomáticamente con valor de vida/vida misma. En español, «la vida» comunica ese valor sin forzar una traducción de «alma» o una calca extraña.
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés, que prefirió una formulación directa para el idiomatismo hebreo final: «Let us not take his life». En español se preserva esa decisión con «No le quitemos la vida», evitando una calca de «golpearlo» que podría sonar menos natural aunque sea parte del campo semántico de נכה.'
  spanish_consistency_notes:
  - Se mantiene el nombre bíblico «Rubén» de forma consistente con el uso estándar en español.
  - La imagen hebrea de «mano» se conserva como «manos» en plural para reflejar el sufijo plural de מקור texto.
  - «Lo rescató» y «de sus manos» trabajan juntos para mantener tanto la acción como la imagen de control/poder del hebreo.
  - El final se expresa idiomáticamente para comunicar el sentido de la construcción hebrea sin perder el componente de vida/muerte.
