  rationale: Se corrige el anclaje de la nota para que corresponda al verbo וְעִנִּיתֶם, y se ajusta שַׁבַּת a 'sabbat' para conservar mejor la designación cultual fija que el POB inglés mantuvo como 'Sabbath'. El resto del versículo ya preservaba bien el sentido fuente y la decisión teológica documentada.
