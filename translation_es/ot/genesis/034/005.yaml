revisions:
- from: Y Jacob oyó que había deshonrado[a] a su hija Dina. Pero sus hijos estaban con su ganado en el campo, y Jacob guardó silencio hasta que ellos volvieron.
  to: Y Jacob oyó que había mancillado[a] a su hija Dina. Pero sus hijos estaban con su ganado en el campo, y Jacob guardó silencio hasta que ellos llegaron.
  rationale: Se revisa «deshonrado» a «mancillado» para preservar mejor el valor léxico de טִמֵּא, manteniendo en nota la alternativa contextual «violado». Se cambia «volvieron» por «llegaron» para reflejar fielmente עַד בֹּאָם sin añadir un matiz de retorno no explícito. El resto del texto puede mantenerse.
  reviewer_model: gpt-5.4
