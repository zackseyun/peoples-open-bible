  - severity: medium
    issue: «En los caminos» subtraduce בַּמְסִלּוֹת.
    rationale: מְסִלּוֹת se refiere a rutas principales, calzadas o caminos elevados; «caminos» es demasiado amplio y pierde el matiz de vías establecidas.
  - severity: medium
    issue: «Derribaron a dos mil hombres» es menos natural y menos preciso que una formulación de muerte en combate.
    rationale: Para נכה en este contexto bélico, «abatieron» o «mataron» comunican mejor el resultado letal. «Derribaron» puede sugerir solo tumbar o hacer caer.
