translation:
  language: es
  text: Una oración de David. Inclina tu oído, Yahvé, y respóndeme, porque soy pobre[a] y necesitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afligido». El hebreo עָנִי puede referirse a alguien pobre, afligido o humillado.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Una oración
  alternatives_spanish:
  - Oración
  lexicon: HALOT
  rationale: 'Como encabezado de superscripción, el sustantivo funciona naturalmente en español con el artículo indefinido: «Una oración». Mantiene el valor genérico y el tono de género literario sin sobreexplicar.'
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: En el encabezado del salmo, «de David» preserva la ambigüedad del ל como asociación/autoria sin fijar más de lo que el hebreo indica.
- source_word: הַטֵּה
  english_pob_choice: Incline
  chosen_spanish: Inclina
  alternatives_spanish:
  - Inclina hacia
  - Dobla
  - Vuelve
  lexicon: HALOT
  rationale: «Inclina» reproduce la metáfora idiomática de prestar atención al oído y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en transliteración española estándar del proyecto: «Yahvé», en lugar de sustituirlo por un título como «Señor».'
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu audición
  lexicon: HALOT
  rationale: En español, «oído» expresa con mayor naturalidad el órgano/sentido en la fórmula idiomática «inclinar el oído», manteniendo la imagen corporal del hebreo.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - hazme respuesta
  lexicon: HALOT
  rationale: En contexto de oración, el verbo equivale a pedir una respuesta divina; «respóndeme» es idiomático y conserva la fuerza peticional.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce el fundamento de la petición. «Porque» comunica de forma directa la razón dada por el hablante.
- source_word: עָנִי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - afligido
  - humilde
  lexicon: HALOT
  rationale: La pareja con «necesitado» favorece el sentido concreto de indigencia material y social. «Pobre» preserva ese valor principal sin eliminar la posible resonancia de aflicción.
- source_word: וְאֶבְיֹן
  english_pob_choice: and needy
  chosen_spanish: y necesitado
  alternatives_spanish:
  - y menesteroso
  - y desamparado
  - y indigente
  lexicon: HALOT
  rationale: «Necesitado» reproduce bien la segunda mitad del paralelismo y es claro para lectura pública. Mantiene la idea de carencia sin cargar el verso con un registro excesivamente arcaico.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - estoy
  lexicon: HALOT
  rationale: El hebreo nominal exige completar la copula en español; «soy» expresa de manera natural la identificación del hablante con los adjetivos que siguen.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide conservar el nombre divino en el texto principal. «Yahvé» es la forma española estable y legible para ese nombre, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de עָנִי en paralelo con אֶבְיוֹן
  english_pob_reading: poor and needy
  chosen_spanish_reading: pobre y necesitado
  alternative_spanish_readings:
  - afligido y necesitado
  - humilde y necesitado
  rationale: El hebreo permite una gama entre pobreza, aflicción y humillación. Dado el paralelismo con אֶבְיוֹן, «pobre» conserva mejor la referencia concreta sin borrar la posible tensión semántica que la nota inglesa ya documenta.
  doctrine_reference: 'DOCTRINE.md: Lexical range and contextual rendering'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se conservó la estructura de encabezado poético, el nombre divino como Yahvé, y se mantuvo la tensión léxica de עָנִי con una nota alternativa equivalente a la del inglés. No hubo revisiones aplicadas en el expediente base, y la concordancia del revisor fue alta.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de acuerdo con el estándar español del proyecto para יְהוָה.
  - Se eligió «oído» para preservar la metáfora idiomática de atención.
  - Se prefirió «pobre y necesitado» como paralelismo directo y publicable en español.
  - El marcador [a] aparece en el punto exacto de la palabra glosada.
