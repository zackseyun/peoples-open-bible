translation:
  language: es
  text: Y lo persiguió hasta Azoto[a], y los campamentos entablaron batalla detrás de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los campamentos entablaron batalla tras él». El griego repite la expresión espacial «detrás/tras él», algo pesada en español; la redacción principal mantiene el orden de persecución y combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδίωξεν
  english_pob_choice: pursued
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo siguió en persecución
  - lo acosó militarmente
  lexicon: LSJ
  rationale: El verbo expresa persecución activa en contexto militar. «Lo persiguió» es natural en español y conserva la idea de seguimiento hostil sin recargar el estilo.
- source_word: εἰς Ἄζωτον
  english_pob_choice: to Azotus
  chosen_spanish: hasta Azoto
  alternatives_spanish:
  - a Azoto
  - hasta Asdod
  lexicon: LSJ
  rationale: «εἰς» indica movimiento hacia el lugar; en un contexto de persecución, «hasta» refleja bien el alcance del avance. Se usa «Azoto» como transliteración tradicional castellana del topónimo griego.
- source_word: συνῆψαν
  english_pob_choice: joined battle
  chosen_spanish: se unieron en batalla
  alternatives_spanish:
  - entablaron batalla
  - se trabaron en combate
  lexicon: LSJ
  rationale: En contexto militar, el verbo denota entrar en combate o trabarse en lucha. «Se unieron en batalla» preserva el matiz de encuentro bélico y mantiene la referencia al plural del sujeto.
- source_word: αἱ παρεμβολαὶ
  english_pob_choice: the camps
  chosen_spanish: los campamentos
  alternatives_spanish:
  - los ejércitos
  - las huestes
  - las fuerzas
  lexicon: LSJ
  rationale: La palabra alude propiamente a campamentos militares. «Campamentos» conserva la imagen concreta del griego mejor que una generalización como «ejércitos».
- source_word: ὀπίσω αὐτοῦ
  english_pob_choice: behind him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - a sus espaldas
  lexicon: LSJ
  rationale: La repetición espacial del griego se puede reflejar en español con «detrás de él», que es claro y conserva la secuencia de persecución y combate sin forzar un calco.
translation_notes:
  revision_awareness: 'Se siguió el texto griego de 1 Macabeos 10:78 y el audit trail inglés, especialmente la decisión de mantener εἰς Ἄζωτον como movimiento dirigido al lugar. Se preservó la secuencia narrativa: persecución hasta Azoto y luego combate de los campamentos detrás de él.'
  spanish_consistency_notes:
  - Se eligió «Azoto» por coherencia con transliteraciones castellanas frecuentes en literatura bíblica deuterocanónica.
  - «Campamentos» mantiene el plural del griego αἱ παρεμβολαὶ y evita suavizarlo a «ejércitos».
  - La nota al pie conserva la alternativa señalada por el audit trail inglés para la estructura repetida «detrás/tras él».
