translation:
  language: es
  text: '¡Qué hermosos son sobre los montes los pies del que trae buenas noticias, del que anuncia paz, del que trae buenas noticias de cosas buenas, del que anuncia salvación, del que dice a Sion: «Tu Dios reina»[a]!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu Dios ha llegado a ser rey» o «tu Dios es rey». El hebreo puede enfatizar la entronización o el reinado efectivo.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Qué
  alternatives_spanish:
  - ¡Cuán
  - ¡Cómo de
  lexicon: HALOT
  rationale: La partícula exclamativa se vierte naturalmente en español con «qué» en una exclamación de admiración, manteniendo el tono poético sin volverlo interrogativo.
- source_word: נָּאו֨וּ
  english_pob_choice: beautiful
  chosen_spanish: hermosos
  alternatives_spanish:
  - bellos
  - agradables
  - lindos
  lexicon: HALOT
  rationale: El verbo expresa belleza/atractivo. «Hermosos» comunica bien la admiración poética en español contemporáneo y conserva el valor apreciativo del hebreo.
- source_word: עַל הֶ/הָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - en los montes
  - por los montes
  - sobre las montañas
  lexicon: HALOT
  rationale: «Montes» es una opción natural en español bíblico y poético para הָרִים. «Sobre» refleja la imagen de aproximación desde alturas sin forzar una localización técnica.
- source_word: רַגְלֵי
  english_pob_choice: the feet
  chosen_spanish: los pies
  alternatives_spanish:
  - los pasos
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta de las extremidades del mensajero. «Los pies» preserva la imagen metonímica de la llegada del heraldo.
- source_word: מְבַשֵּׂר
  english_pob_choice: the one who brings good news
  chosen_spanish: del que trae buenas noticias
  alternatives_spanish:
  - del mensajero de buenas noticias
  - del heraldo de buenas noticias
  - del que anuncia buenas noticias
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «El que trae buenas noticias» conserva el sentido verbal y evita imponer un oficio técnico que el hebreo no explicita.
- source_word: מַשְׁמִיעַ שָׁלוֹם
  english_pob_choice: who announces peace
  chosen_spanish: del que anuncia paz
  alternatives_spanish:
  - del que proclama paz
  - del que hace oír paz
  lexicon: HALOT
  rationale: El hifil de שמע implica hacer oír/annunciar. «Anuncia paz» es idiomático y conserva el carácter de proclamación pública.
- source_word: מְבַשֵּׂר טוֹב
  english_pob_choice: who brings good news of good things
  chosen_spanish: del que trae buenas noticias de cosas buenas
  alternatives_spanish:
  - del que trae buenas noticias de bien
  - del que anuncia cosas buenas
  - del que trae buenas nuevas de bien
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea de la raíz בשר y la amplitud de טוֹב. «Cosas buenas» refleja de forma clara y natural el matiz más amplio que «prosperidad» o una reducción demasiado estrecha.
- source_word: מַשְׁמִיעַ יְשׁוּעָה
  english_pob_choice: who announces salvation
  chosen_spanish: del que anuncia salvación
  alternatives_spanish:
  - del que proclama liberación
  - del que anuncia rescate
  lexicon: HALOT
  rationale: יְשׁוּעָה se traduce mejor con «salvación» en un contexto de proclamación escatológica y teológica, sin excluir la idea de liberación.
- source_word: אֹמֵר לְ/צִיּוֹן
  english_pob_choice: who says to Zion
  chosen_spanish: del que dice a Sion
  alternatives_spanish:
  - del que dice a Jerusalén
  - del que le dice a Sion
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional «Sion» en español bíblico. «Dice a» mantiene la introducción sencilla del discurso directo.
- source_word: מָלַ֥ךְ
  english_pob_choice: Your God reigns
  chosen_spanish: reina
  alternatives_spanish:
  - ha llegado a ser rey
  - es rey
  - ha sido entronizado
  lexicon: HALOT
  rationale: El qatal de מלך en este anuncio puede enfatizar entronización o ejercicio del reinado. «Reina» es la formulación más natural y suficientemente amplia en español para preservar esa tensión sin cerrarla prematuramente.
- source_word: אֱלֹהָֽיִ/ךְ
  english_pob_choice: Your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo femenino singular en hebreo se refleja con «tu Dios»; el español no distingue género en la segunda persona singular escrita estándar, por lo que se conserva el referente personal sin sobreexplicarlo.
theological_decisions:
- issue: La proclamación real de Yahvé en מָלַךְ אֱלֹהָיִךְ
  english_pob_reading: Your God reigns
  chosen_spanish_reading: Tu Dios reina
  alternative_spanish_readings:
  - Tu Dios ha llegado a ser rey
  - Tu Dios es rey
  rationale: El perfecto hebreo puede leerse como anuncio de entronización o como declaración del ejercicio real continuo. La forma «reina» preserva la fuerza proclamativa y mantiene abierta la tensión interpretativa que el POB inglés documenta.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés que ajustó «good» a «good things»; por eso se refleja explícitamente como «cosas buenas» en la frase correspondiente, manteniendo la repetición hebrea de la raíz de «buenas noticias».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto, pero en este versículo la forma explícita es «tu Dios», por lo que no aparece el nombre tetragramático en el texto principal.
  - «Sion» se mantiene como transliteración bíblica estable y no como equivalente geográfico moderno.
  - Se preserva la cadencia poética con una estructura acumulativa de participios, siguiendo de cerca el paralelismo del hebreo.
