    text: O «enseres para el exilio» o «artículos de destierro». El hebreo se refiere a las pertenencias que un desterrado llevaría consigo.
    reason: lexical_alternative
  - marker: b
    text: O «Quizá entiendan»; el verbo hebreo dice literalmente «ver», pero puede extenderse a percepción o reconocimiento.
    reason: lexical_alternative
  revision_rationale: Se revisa para restaurar el sentido explícito de destierro/exilio en las dos ocurrencias de גלה y para reemplazar «útiles» por una expresión más natural y precisa en español. Se conserva «hijo de hombre», la repetición de la visibilidad pública y la ambigüedad de «vean».
