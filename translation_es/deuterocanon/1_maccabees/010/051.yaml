lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El aoristo de ἀποστέλλω se vierte con un verbo narrativo natural en español. «Envió» conserva la acción simple y directa sin añadir matiz de urgencia o formalidad no exigido por el griego.
- source_word: πρὸς
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: LSJ
  rationale: Con un verbo de envío y objeto personal, πρὸς funciona idiomáticamente como dirección de destinatario. En español, «a» es la forma más natural y fiel.
- source_word: πρέσβεις
  english_pob_choice: ambassadors
  chosen_spanish: embajadores
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: LSJ
  rationale: El contexto es diplomático y regio. «Embajadores» comunica mejor el carácter oficial y representativo del término que «mensajeros».
- source_word: κατὰ τοὺς λόγους τούτους
  english_pob_choice: with these words
  chosen_spanish: con estas palabras
  alternatives_spanish:
  - según estas palabras
  - en estos términos
  lexicon: LSJ
  rationale: La expresión introduce el contenido del mensaje. «Con estas palabras» reproduce el valor idiomático de manera natural en español y mantiene la función discursiva de la frase.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: LSJ
  rationale: El participio introductorio se conserva con una forma participial en español para dejar abierta la cita que sigue y reflejar la sintaxis griega.
- source_word: βασιλέα Αἰγύπτου
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  lexicon: LSJ
  rationale: El griego funciona como aposición al nombre propio. «Rey de Egipto» conserva el título sin forzar un artículo que no aparece en el original.
