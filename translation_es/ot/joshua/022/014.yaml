translation:
  language: es
  text: y con él diez jefes, un jefe por cada casa paterna de todas las tribus de Israel; y cada uno de ellos era la cabeza de su casa paterna entre los miles[a] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘entre los miles de Israel’; aquí ‘miles’ probablemente se refiere a divisiones de clan o grupos familiares mayores dentro de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְשִׂאִים / נָשִׂיא
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - príncipes
  - caudillos
  lexicon: HALOT
  rationale: נָשִׂיא designa una persona elevada para dirigir o representar. En este contexto tribal-administrativo, ‘líderes’ es claro y natural en español moderno, y mantiene el sentido oficial sin caer en un arcaísmo como ‘príncipes’.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  lexicon: HALOT
  rationale: La preposición con el sufijo pronominal se refiere a Finees por el contexto inmediato. ‘Con él’ reproduce la relación de acompañamiento de manera directa y natural.
- source_word: נָשִׂיא אֶחָד נָשִׂיא אֶחָד
  english_pob_choice: one leader for each
  chosen_spanish: un líder por cada
  alternatives_spanish:
  - un líder, un líder
  - un jefe por cada
  lexicon: HALOT
  rationale: La repetición hebrea es distributiva. En español, ‘un líder por cada’ comunica mejor la distribución sin sonar mecánico.
- source_word: לְבֵית אָב
  english_pob_choice: for each ancestral house
  chosen_spanish: casa paterna
  alternatives_spanish:
  - casa del padre
  - casa ancestral
  - familia paterna
  lexicon: HALOT
  rationale: בֵּית אָב es un término técnico de parentesco y organización tribal. ‘Casa paterna’ conserva la estructura semítica y el valor genealógico; aquí se adapta bien al estilo bíblico en español.
- source_word: לְכֹל מַטּוֹת יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de todas las tribus de Israel
  alternatives_spanish:
  - entre todas las tribus de Israel
  - de entre todas las tribus de Israel
  lexicon: HALOT
  rationale: El hebreo presenta una relación distributiva/representativa. ‘De todas las tribus de Israel’ es la forma más natural en español para marcar procedencia o representación dentro del conjunto tribal.
- source_word: וְאִישׁ
  english_pob_choice: each of them
  chosen_spanish: cada uno de ellos
  alternatives_spanish:
  - y cada hombre
  - y cada uno
  lexicon: HALOT
  rationale: Aquí אִישׁ funciona distributivamente respecto a los diez representantes. ‘Cada uno de ellos’ preserva el sentido sin forzar una traducción literal de ‘hombre’ donde el español sonaría innecesariamente marcado.
- source_word: רֹאשׁ בֵּית אֲבוֹתָם
  english_pob_choice: the head of his ancestral house
  chosen_spanish: la cabeza de su casa paterna
  alternatives_spanish:
  - el jefe de su casa paterna
  - la cabeza de su familia paterna
  lexicon: HALOT
  rationale: רֹאשׁ significa ‘cabeza/jefe’. ‘La cabeza de su casa paterna’ mantiene el paralelismo con ‘casa paterna’ y refleja el rol de autoridad dentro del grupo de parentesco.
- source_word: לְאַלְפֵי יִשְׂרָאֵל
  english_pob_choice: among the thousands of Israel
  chosen_spanish: entre los miles de Israel
  alternatives_spanish:
  - entre los millares de Israel
  - entre los clanes de Israel
  lexicon: HALOT
  rationale: El inglés POB decidió mantener ‘thousands’ para reflejar más de cerca אַלְפֵי y conservar el registro formal. En español, ‘miles’ sigue de cerca el término hebreo; aunque puede sugerir un número, aquí se deja esa tensión visible por fidelidad al texto y al audit trail.
theological_decisions:
- issue: 'Sentido de אַלְפֵי יִשְׂרָאֵל: cifra o subdivisión social'
  english_pob_reading: among the thousands of Israel
  chosen_spanish_reading: entre los miles de Israel
  alternative_spanish_readings:
  - entre los clanes de Israel
  - entre los millares de Israel
  rationale: Se conserva la literalidad de ‘thousands’ porque el texto hebreo usa אַלְפֵי. Aunque en este contexto puede aludir a subdivisiones de tipo clan, la traducción principal no debe resolver en exceso esa ambigüedad. La opción elegida deja abierta la tensión semántica que el audit trail documenta.
  doctrine_reference: No aplica; decisión lexical-administrativa, no doctrinal.
translation_notes:
  revision_awareness: El audit trail inglés revisó una paráfrasis interpretativa (‘clans of Israel’) y volvió a una forma más cercana al hebreo (‘thousands of Israel’). La versión española sigue esa revisión y mantiene la tensión semántica en ‘miles de Israel’, sin resolverla hacia ‘clanes’.
  spanish_consistency_notes:
  - Se usa ‘casa paterna’ para בית־אב, manteniendo un término técnico estable en la sección.
  - Se usa ‘líderes’ para נְשִׂיאִים, coherente con el registro administrativo del pasaje.
  - Se conserva ‘Israel’ sin artículo, como en el nombre propio bíblico habitual.
  - La nota al pie marca explícitamente la ambigüedad de ‘miles’, siguiendo el audit trail inglés y evitando una normalización excesiva.
