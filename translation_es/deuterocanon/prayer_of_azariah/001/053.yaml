  glossary_alignment: La decisión de traducir τὸν κύριον como «el Señor» es correcta en este contexto griego y conforme al expediente doctrinal; no corresponde imponer «Yahvé». «Bendecid» preserva bien εὐλογεῖτε. «Cantad himnos» refleja adecuadamente ὑμνεῖτε. El principal ajuste léxico necesario es para πάντα τὰ φυόμενα y ὑπερυψοῦτε.
