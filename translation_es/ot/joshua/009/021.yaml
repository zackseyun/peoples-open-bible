- from: 'Los líderes les dijeron: «Vivan». Así se convirtieron en cortadores de leña y sacadores de agua para toda la congregación, tal como los líderes les habían dicho.'
  to: 'Los líderes les dijeron: «Que vivan». Así se convirtieron en cortadores de leña y en los que sacan agua para toda la congregación, tal como los líderes les habían dicho.'
  rationale: Se ajustó el valor yusivo/decretivo de יִחְיוּ con «Que vivan» y se reemplazó la expresión poco natural «sacadores de agua» por «los que sacan agua», que conserva la imagen concreta del hebreo y la intención formal del POB inglés, pero con mejor legibilidad en español.
