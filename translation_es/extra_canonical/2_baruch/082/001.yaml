  - se está dando prisa
  lexicon: Payne Smith
  rationale: Conserva la acción divina de acelerar los tiempos con un verbo claro y bíblicamente sobrio.
- source_word: ܟܘܪ̈ܙܐ ܕܥܠܡܐ
  english_pob_choice: the heraldings of the age
  chosen_spanish: los pregones de la era
