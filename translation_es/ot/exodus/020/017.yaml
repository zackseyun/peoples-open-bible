translation:
  language: es
  text: No codiciarás la casa de tu prójimo[a]; no codiciarás la mujer de tu prójimo, ni su esclavo varón, ni su esclava, ni su buey, ni su asno, ni cosa alguna que pertenezca a tu prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la casa de tu prójimo como hogar"; el hebreo בַּיִת puede referirse tanto a una casa física como a una casa entendida como casa-hogar. Aquí "casa" encaja mejor con la lista separada que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַחְמֹד
  english_pob_choice: covet
  chosen_spanish: codiciarás
  alternatives_spanish:
  - desearás
  - ansiarás
  lexicon: HALOT
  rationale: En este mandamiento, חמד expresa un deseo indebido por lo ajeno. "Codiciar" conserva el peso ético y jurídico del término mejor que "desear", que en español es más general.
- source_word: בֵּית רֵעֶךָ
  english_pob_choice: your neighbor’s house
  chosen_spanish: la casa de tu prójimo
  alternatives_spanish:
  - la casa de tu vecino
  - el hogar de tu prójimo
  lexicon: HALOT
  rationale: '"Casa" sigue la elección del POB inglés y encaja con la estructura del versículo, donde después se enumeran esposa, esclavos y animales por separado. "Prójimo" preserva el sentido comunitario del hebreo רֵעַ.'
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu compañero
  lexicon: HALOT
  rationale: '"Prójimo" comunica bien el sentido interpersonal y ético de רֵעַ en contexto de ley de pacto, sin reducirlo a una mera proximidad física.'
- source_word: אֵשֶׁת רֵעֶךָ
  english_pob_choice: your neighbor’s wife
  chosen_spanish: la mujer de tu prójimo
  alternatives_spanish:
  - la esposa de tu prójimo
  lexicon: HALOT
  rationale: El hebreo significa literalmente "la mujer de tu prójimo". Se prefiere esta forma como más cercana al original; "esposa" es posible, pero atenúa un poco la formulación del texto.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo varón
  alternatives_spanish:
  - su esclavo
  - su siervo varón
  lexicon: HALOT
  rationale: Se mantiene "esclavo" conforme a la preferencia del proyecto cuando el estatus servil/bondado es prominente. "Varón" distingue el término del femenino siguiente y evita ambigüedad en español.
- source_word: אֲמָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su sierva
  - su criada
  lexicon: HALOT
  rationale: אָמָה denota una esclava/sierva femenina. En este listado legal, "esclava" preserva mejor la asimetría social que "criada" o "sierva".
- source_word: שׁוֹרוֹ
  english_pob_choice: his ox
  chosen_spanish: su buey
  alternatives_spanish:
  - su toro
  - su res
  lexicon: HALOT
  rationale: En español bíblico "buey" comunica naturalmente el animal de trabajo al que se refiere שׁוֹר. Es más idiomático que "toro" o "res" en esta lista.
- source_word: חֲמֹרוֹ
  english_pob_choice: his donkey
  chosen_spanish: su asno
  alternatives_spanish:
  - su burro
  - su mula
  lexicon: HALOT
  rationale: '"Asno" es el equivalente tradicional y preciso de חֲמוֹר; se conserva por fidelidad al inventario legal y por su naturalidad en este registro.'
- source_word: וְכֹל אֲשֶׁר לְרֵעֶךָ
  english_pob_choice: anything that belongs to your neighbor
  chosen_spanish: ni cosa alguna que pertenezca a tu prójimo
  alternatives_spanish:
  - ni nada de lo que es de tu prójimo
  - ni todo lo que pertenece a tu prójimo
  lexicon: HALOT
  rationale: La frase totalizadora se vuelve en español mediante una construcción natural que mantiene el alcance universal del hebreo. "Pertenezca" refleja bien la relación de posesión expresada por לְ.
theological_decisions:
- issue: Cómo reflejar la secuencia de prohibiciones dobles del hebreo
  english_pob_reading: You shall not ... you shall not
  chosen_spanish_reading: No codiciarás ...; no codiciarás ...
  alternative_spanish_readings:
  - No codicies ...; no codicies ...
  - No tendrás deseo por ...; no tendrás deseo por ...
  rationale: Se conserva la repetición enfática del hebreo en dos prohibiciones separadas. El futuro exhortativo en español bíblico y litúrgico comunica con claridad el valor mandatorio del texto.
  doctrine_reference: Éxodo 20:17; principio de correspondencia formal/funcional del proyecto
- issue: Si בֵּית debe ampliarse a "hogar" o "casa"
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - hogar
  - familia
  rationale: '"Casa" respeta la decisión auditada del POB inglés y evita mezclar este primer elemento con la lista posterior. La ampliación a "hogar" introduciría una interpretación más amplia que el contexto inmediato no exige.'
  doctrine_reference: Éxodo 20:17; nota lexical auditada sobre בַּיִת
- issue: Cómo rendir עֶבֶד/אָמָה en un listado legal de posesiones
  english_pob_reading: male slave / female slave
  chosen_spanish_reading: esclavo varón / esclava
  alternative_spanish_readings:
  - siervo varón / sierva
  - criado / criada
  rationale: Se mantiene el valor de estatus dependiente que el POB inglés documenta para este contexto legal. "Esclavo" evita suavizar el término, y "varón" preserva la distinción de género del paralelo hebreo.
  doctrine_reference: Éxodo 20:17; decisión léxica sobre términos de esclavitud
- issue: Cómo entender la última cláusula totalizadora
  english_pob_reading: anything that belongs to your neighbor
  chosen_spanish_reading: ni cosa alguna que pertenezca a tu prójimo
  alternative_spanish_readings:
  - ni nada de lo que es de tu prójimo
  - ni todo lo que pertenece a tu prójimo
  rationale: La cláusula se traduce de forma inclusiva para abarcar cualquier otro bien no enumerado. "Cosa alguna" mantiene el alcance absoluto sin añadir contenido extra.
  doctrine_reference: Éxodo 20:17
translation_notes:
  revision_awareness: El pasaje coincide con el texto auditado de alto acuerdo; no hubo revisiones aplicadas en la última pasada y la formulación española sigue de cerca las decisiones léxicas documentadas en el POB inglés.
  spanish_consistency_notes:
  - Se mantuvo "prójimo" para רֵעַ de manera consistente en todo el versículo.
  - Se preservó la duplicación de "No codiciarás" para reflejar el hebreo.
  - Se usó "esclavo/esclava" por coherencia con la política del proyecto en contextos legales donde el estatus de servidumbre es central.
  - Se eligió "buey" y "asno" por ser equivalentes naturales y tradicionales en español bíblico sin caer en arcaísmo excesivo.
