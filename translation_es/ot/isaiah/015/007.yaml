translation:
  language: es
  text: Por tanto, la abundancia que habían adquirido y lo que habían almacenado se los llevaron más allá del arroyo de los sauces[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «más allá del wadi del Arabá» / «más allá del valle de las llanuras desérticas». La expresión hebrea es incierta; la traducción tradicional es «arroyo de los sauces».
    reason: alternative_reading
  - marker: b
    text: La frase traducida «lo que habían almacenado» es un hebreo difícil y también puede significar «sus posesiones» o «lo que les había sido confiado».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְרָה
  english_pob_choice: the abundance
  chosen_spanish: la abundancia
  alternatives_spanish:
  - el excedente
  - lo sobrante
  - la riqueza
  lexicon: HALOT
  rationale: El sustantivo expresa exceso, resto o abundancia. En este contexto de huida con bienes, «la abundancia» conserva la idea de caudal acumulado sin restringirlo solo a «riqueza».
- source_word: עָשָׂה
  english_pob_choice: they have gained
  chosen_spanish: habían adquirido
  alternatives_spanish:
  - habían hecho
  - habían ganado
  - habían obtenido
  lexicon: HALOT
  rationale: Aunque la forma hebrea es 3ms, funciona de modo colectivo con el sustantivo previo. En español, «habían adquirido» comunica con naturalidad la idea de bienes acumulados sin la aspereza de un calco literal.
- source_word: וּפְקֻדָּתָם
  english_pob_choice: what they have stored up
  chosen_spanish: lo que habían almacenado
  alternatives_spanish:
  - sus posesiones
  - su depósito
  - lo que les fue encomendado
  lexicon: HALOT
  rationale: El término es difícil y debatido. Aquí se vierte de manera abierta como algo guardado o reservado, manteniendo la incertidumbre lexical que también preserva la POB en inglés.
- source_word: נַחַל
  english_pob_choice: Brook
  chosen_spanish: arroyo
  alternatives_spanish:
  - wadi
  - cauce
  - valle torrencial
  lexicon: HALOT
  rationale: נחל puede referirse a un cauce o arroyo estacional. «Arroyo» es comprensible en español y conserva la imagen de un curso de agua.
- source_word: הָעֲרָבִים
  english_pob_choice: the Willows
  chosen_spanish: de los sauces
  alternatives_spanish:
  - de los álamos
  - del Arabá
  - de las llanuras desérticas
  lexicon: HALOT
  rationale: La lectura tradicional entiende un nombre asociado a árboles ribereños, de ahí «sauces». Se mantiene la alternativa geográfica/semántica en nota porque el hebreo es incierto.
- source_word: יִשָּׂאֻם
  english_pob_choice: they carry away
  chosen_spanish: se lo llevan
  alternatives_spanish:
  - lo transportan
  - lo cargan
  - lo llevan
  lexicon: HALOT
  rationale: El verbo נשׂא significa llevar/cargar. «Se lo llevan» encaja con el contexto de escape y sugiere desplazamiento de los bienes, como en la POB inglesa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión inglesa POB y conserva las dos dificultades principales del versículo: la expresión geográfica incierta de נחל העֲרָבִים y el valor lexical debatido de פקדתם. No se introdujeron cambios textuales respecto del contexto auditado de alta concordancia.'
  spanish_consistency_notes:
  - Se empleó «Yahvé» solo cuando corresponde; este versículo no contiene el nombre divino.
  - «Abundancia» mantiene un sustantivo abstracto amplio, coherente con el valor colectivo del hebreo.
  - La nota a preserva la tensión entre la lectura tradicional de lugar con árboles ribereños y una posible referencia al Arabá.
  - La nota b mantiene abierta la ambigüedad de פקדתם sin decidirla dogmáticamente.
