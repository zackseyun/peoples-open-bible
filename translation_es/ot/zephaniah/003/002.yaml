translation:
  language: es
  text: No obedeció la voz[a]; no aceptó la corrección[b]. No confió en Yahvé; no se acercó[d] a su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no escuchó la voz» o «no hizo caso de la voz». El hebreo puede resaltar una escucha obediente más que la mera audición.
    reason: lexical_alternative
  - marker: b
    text: O «no recibió disciplina» o «no tomó instrucción».
    reason: lexical_alternative
  - marker: d
    text: O «no se aproximó». «Acercarse» puede llevar matices relacionales y de culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעָה בְּקוֹל
  english_pob_choice: did not obey the voice
  chosen_spanish: no obedeció la voz
  alternatives_spanish:
  - no escuchó la voz
  - no hizo caso de la voz
  - no atendió a la voz
  lexicon: HALOT
  rationale: El hebreo שׁמע con בְּקוֹל suele implicar escucha obediente, no solo percepción auditiva. «Obedeció» conserva mejor esa fuerza idiomática en español que una simple escucha.
- source_word: קוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - el llamado
  lexicon: HALOT
  rationale: קוֹל significa literalmente «voz» o «sonido». En este reproche profético, «la voz» mantiene el matiz personal y autoritativo del original.
- source_word: לָקְחָה מוּסָר
  english_pob_choice: did not accept correction
  chosen_spanish: no aceptó la corrección
  alternatives_spanish:
  - no recibió disciplina
  - no tomó instrucción
  - no aceptó disciplina
  lexicon: HALOT
  rationale: La expresión idiomática comunica la negativa a recibir instrucción correctiva. «Corrección» es clara y natural en español moderno, y conserva el sentido de reprensión moral.
- source_word: מוּסָר
  english_pob_choice: correction
  chosen_spanish: corrección
  alternatives_spanish:
  - disciplina
  - instrucción
  lexicon: HALOT
  rationale: מוּסָר puede abarcar disciplina, reprensión o instrucción. Aquí el contexto favorece la idea de corrección rechazada; por eso «corrección» expresa bien el valor contextual.
- source_word: בַּיהוָה
  english_pob_choice: did not trust in Yahweh
  chosen_spanish: no confió en Yahvé
  alternatives_spanish:
  - no confió en el Yahvé
  - no puso su confianza en Yahvé
  - no se apoyó en Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el estándar del proyecto. El verbo בטח se vierte naturalmente por «confiar», que en español mantiene la idea de dependencia y seguridad relacional.
- source_word: אֱלֹהֶיהָ
  english_pob_choice: her God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - su Diosa
  - sus dioses
  lexicon: HALOT
  rationale: Aunque la forma base es plural, el contexto del pacto y el paralelo con Yahvé exigen singular. En español «su Dios» refleja la referencia singular sin añadir explicitación innecesaria.
- source_word: קָרֵבָה
  english_pob_choice: did not draw near
  chosen_spanish: no se acercó
  alternatives_spanish:
  - no se aproximó
  - no se acercó a él
  - no se aproximó a él
  lexicon: HALOT
  rationale: קרב aquí sugiere acercarse a Dios en sentido relacional y posiblemente cultual. «Se acercó» es una traducción natural y suficientemente amplia para conservar ambos matices.
theological_decisions:
- issue: Referente implícito del sujeto femenino singular
  english_pob_reading: Render with the feminine pronoun 'she,' leaving the antecedent implicit in this verse.
  chosen_spanish_reading: Mantener el sujeto implícito mediante el verbo en tercera persona singular femenina, sin añadir un sustantivo como «Jerusalén».
  alternative_spanish_readings:
  - Jerusalén no obedeció...
  - La ciudad no obedeció...
  rationale: El hebreo marca femenino singular y remite a la ciudad/personificación del contexto. En español, el sujeto puede quedar implícito en los verbos para conservar la misma economía y no introducir un antecedente que el verso no dice.
  doctrine_reference: Translation philosophy §1, §6
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton; por política del proyecto se translitera como «Yahvé» en el cuerpo principal para preservar el nombre divino sin sustituirlo por un título genérico.
  doctrine_reference: 'Contested terms: יהוה YHWH'
- issue: Matiz de קָרֵבָה en relación con Dios
  english_pob_reading: did not draw near. 'Draw near' may carry both relational and worship-related overtones.
  chosen_spanish_reading: no se acercó a su Dios
  alternative_spanish_readings:
  - no se aproximó a su Dios
  - no acudió a su Dios
  rationale: «Acercarse» permite en español la misma doble resonancia relacional y cultual que «draw near» en inglés, sin sobreinterpretar el verbo con una sola escena.
  doctrine_reference: Translation philosophy §2, §7
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés coinciden en lo esencial; se mantuvo la estructura tripartita del reproche y la personificación femenina implícita. La principal adaptación española fue usar el nombre divino «Yahvé» según la política del proyecto, en lugar de la forma inglesa «Yahweh» o la sustitución por un título.
  spanish_consistency_notes:
  - Se mantuvo la secuencia de tres negativas con ritmo paralelo, como en el hebreo.
  - Se preservó «la voz» y «la corrección» para conservar el paralelismo con las dos primeras acusaciones.
  - Se evitó expandir el sujeto implícito, para respetar la personificación femenina del original.
  - «Yahvé» se usa de forma consistente como equivalente del Tetragrámaton en el texto principal.
