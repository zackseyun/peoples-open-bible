id: T12P.JUD.18
reference: Testament of Judah 18
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: "XVIII. *Καὶ ἔγνωκα¹ ὅσα κακὰ ποιήσετε² ἐν³ [ταῖς ἐσχάταις ἡμέραις]⁴. 2. Φυλάξασθε⁵ οὖν, τέκνα μου, ἀπὸ τῆς πορνείας *καὶ τῆς φιλαργυρίας⁷, καὶ ἀκούσατε⁸ Ἰούδα τοῦ πατρὸς ὑμῶν. 3. Ὅτι¹⁰ ταῦτα¹¹ ἀφιστᾷ¹² τοῦ νόμου τοῦ θεοῦ, καὶ τυφλοῖ¹⁴ τὸ διαβούλιον τῆς ψυχῆς, καὶ ὑπερηφανίαν¹⁵ ἐκδιδάσκει, καὶ οὐκ ἀφίει¹⁶ ἄνδρα ἐλεῆσαι¹⁷ τὸν¹⁸ πλησίον αὐτοῦ. 4. Στερίσκει¹⁹ τὴν ψυχὴν αὐτοῦ²⁰ ἀπὸ πάσης ἀγαθότητος²¹, καὶ συνέχει αὐτὸν²² ἐν²³ πόνοις καὶ μόχθοις²⁴, *τὸν ὕπνον ἐκδιδάσκει ἀπ᾽ αὐτοῦ²⁵, καὶ καταδαπανᾷ²⁷ τὰς σάρκας αὐτοῦ²⁸. 5. *Θυσίας Θεοῦ ἐμποδίζει²⁹, *καὶ εὐλογίαν Θεοῦ οὐ μνημονεύει³⁰. *Προφήτου λαλοῦντος οὐκ ἀκούει³¹, καὶ λόγους εὐσεβείας³³ προσοχθίζει³⁴. 6. *Δυσὶ γὰρ πάθεσιν ἐναντίοις δουλεύει³⁵, *καὶ Θεῷ ὑπακοῦσαι³⁶ οὐ δύναται³⁷, ὅτι ἐτύφλωσε³⁸ τὴν ψυχὴν αὐτοῦ καὶ ἐν ἡμέρᾳ ὡς ἐν νυκτὶ πορεύεται."
  language: Greek
  source_pages:
  - 163
  - 164
translation:
  text: '1[a]. The Lord gave me favor because I obeyed my father. 2. Therefore I never grieved Jacob my father, for I did everything he told me. 3. And Abraham my forefather blessed me to reign in Israel, and Jacob blessed me likewise. 4[b]. And I know what evils you will do in the last days.


    5. Guard yourselves, therefore, my children, from sexual immorality and from the love of money, and listen to Judah your father. 6. For these turn one away from the law of God, and blind the purpose of the soul, and teach arrogance, and do not allow a man to show mercy to his neighbor. 7. They deprive his soul of every goodness, and hold him fast in pains and labors; they drive sleep away from him, and consume his flesh. 8. They hinder the sacrifices of God, and he does not remember the blessing of God. He does not listen when a prophet speaks, and he is offended by words of godliness. 9. For he is enslaved to two contrary passions, and is not able to obey God[d][c], because they have blinded his soul.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek opening is textually compressed in this witness; the translation supplies the implied sense that the Lord favored Judah because of his obedience to his father.
    reason: textual_variant
  - marker: b
    text: '''The last days'' is standard testamentary and apocalyptic language for the future period of moral decline and judgment.'
    reason: cultural_note
  - marker: c
    text: Or 'blind the counsel of the soul.' The Greek term refers to inner deliberation, resolve, or moral purpose.
    reason: lexical_alternative
  - marker: d
    text: The 'two contrary passions' most likely refer back to sexual immorality and the love of money named in the exhortation.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν ὑπακοῇ
  chosen: because I obeyed
  alternatives:
  - in obedience
  - through obedience
  lexicon: LSJ
  rationale: 'The phrase is instrumental/causal in context: the Lord''s favor comes on account of Judah''s obedience to his father. ''Because I obeyed'' is natural English while preserving the causal force.'
- source_word: παρελύπησα
  chosen: grieved
  alternatives:
  - distressed
  - caused sorrow to
  lexicon: LSJ
  rationale: The verb denotes causing pain or sorrow. 'Grieved' preserves the filial and emotional force without overexpansion.
- source_word: βασιλεύειν
  chosen: to reign
  alternatives:
  - to be king
  - to rule as king
  lexicon: LSJ
  rationale: The infinitive carries royal rule, and 'to reign' fits the elevated testamentary register better than the flatter 'to be king'.
- source_word: ἐσχάταις ἡμέραις
  chosen: the last days
  alternatives:
  - the latter days
  - the final days
  lexicon: LSJ
  rationale: This is standard apocalyptic/testamentary language. 'The last days' is idiomatic and preserves the prophetic tone.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - unchastity
  lexicon: BDAG
  rationale: The term broadly denotes illicit sexual conduct. 'Sexual immorality' is the clearest modern rendering and avoids overly narrow or archaic phrasing.
- source_word: φιλαργυρίας
  chosen: the love of money
  alternatives:
  - greed
  - avarice
  lexicon: BDAG
  rationale: The compound literally means love of silver/money. Rendering it transparently as 'the love of money' preserves the moral diagnosis better than the more generalized 'greed'.
- source_word: ἀφιστᾷ τῷ νόμῳ τοῦ θεοῦ
  chosen: turn one away from the law of God
  alternatives:
  - cause apostasy from God's law
  - separate from the law of God
  lexicon: LSJ
  rationale: The verb means to remove or cause to depart. 'Turn one away' captures the moral defection in readable English.
- source_word: τυφλοῖ τὸ διαβούλιον τῆς ψυχῆς
  chosen: blind the purpose of the soul
  alternatives:
  - blind the counsel of the soul
  - blind the mind's deliberation
  lexicon: LSJ
  rationale: διαβούλιον refers to counsel, resolve, or deliberative purpose. 'Purpose of the soul' keeps the inner-moral faculty in view without sounding overly technical.
- source_word: ὑπερηφάνειαν ἐκδιδάσκει
  chosen: teach arrogance
  alternatives:
  - instill pride
  - teach haughtiness
  lexicon: LSJ
  rationale: The phrase presents vice as a tutor. 'Teach arrogance' preserves the active pedagogical metaphor and the vice term's sharpness.
- source_word: οὐκ ἀφίει ἄνδρα ἐλεῆσαι τὸν πλησίον αὐτοῦ
  chosen: do not allow a man to show mercy to his neighbor
  alternatives:
  - do not permit a man to pity his neighbor
  - do not let a person have mercy on his neighbor
  lexicon: LSJ
  rationale: ἀφίημι here has permissive force, and ἐλεέω is best rendered 'show mercy.' The plural subject ('these') governs the plural English verb.
- source_word: Στερίσκει
  chosen: deprive
  alternatives:
  - rob
  - make destitute of
  lexicon: LSJ
  rationale: The verb means to bereave or deprive. 'Deprive his soul of every goodness' preserves the privative force and moral register.
- source_word: συνέχει αὐτὸν
  chosen: hold him fast
  alternatives:
  - constrain him
  - hem him in
  lexicon: LSJ
  rationale: The verb can mean press, confine, or hold together. 'Hold him fast' conveys bondage to vice in idiomatic elevated English.
- source_word: πόνοις καὶ μόχθοις
  chosen: pains and labors
  alternatives:
  - toils and troubles
  - pain and hardship
  lexicon: LSJ
  rationale: The pair intensifies affliction through suffering and exhausting effort. 'Pains and labors' preserves the parallelism and concreteness.
- source_word: καταδαπανᾷ τὰς σάρκας αὐτοῦ
  chosen: consume his flesh
  alternatives:
  - wear away his body
  - devour his flesh
  lexicon: LSJ
  rationale: The expression is vivid and bodily. 'Consume his flesh' keeps the stark imagery rather than softening it to a generic psychological effect.
- source_word: Θυσίας Θεοῦ ἐμποδίζει
  chosen: hinder the sacrifices of God
  alternatives:
  - obstruct God's sacrifices
  - prevent sacrifice to God
  lexicon: LSJ
  rationale: The vice pair interrupts worship. 'Hinder the sacrifices of God' is close to the Greek and preserves cultic language.
- source_word: εὐλογίαν Θεοῦ οὐ μνημονεύει
  chosen: does not remember the blessing of God
  alternatives:
  - does not call to mind God's blessing
  - forgets the blessing of God
  lexicon: LSJ
  rationale: μνημονεύω is remember/mention. 'Does not remember' is straightforward and fits the sequence of neglected piety.
- source_word: λόγους εὐσεβείας προσοχθίζει
  chosen: resents words of godliness
  alternatives:
  - is offended by words of piety
  - finds godly words burdensome
  lexicon: LSJ
  rationale: The verb suggests irritation or aversion. 'Resents' captures the hostile inward reaction to pious instruction.
- source_word: Δυσὶ ... πάθεσιν ἐναντίοις δουλεύει
  chosen: he is enslaved to two contrary passions
  alternatives:
  - he serves two opposing passions
  - he is in bondage to two hostile impulses
  lexicon: LSJ
  rationale: δουλεύει is strong bondage language; 'enslaved' preserves that force. πάθη are passions or impulses, and ἐναντίοις marks them as mutually opposed yet jointly tyrannical.
verse_count_note: |
  The project chapter contains 9 per-verse YAMLs against Charles 1908's 6 α-verses
  for XVIII. This is intentional boundary re-flow, consistent with the ch3/4 and
  ch19/20 re-flow pattern documented in docs/JUDAH_SKELETON_DECISION.md.

  Project verses 18:1–18:3 were pulled from Charles chapter XVII rather than XVIII:
    18:1  ← Charles XVII.2 (tail fragment: "ἣν ἔδωκέ μοι Κύριος ἐν ὑπακοῇ πατρός μου")
    18:2  ← Charles XVII.3 ("Ἐγὼ οὐδέποτε παρελάλησα Ἰακὼβ...")
    18:3  ← Charles XVII.4 ("Καὶ Ἀβραὰμ ὁ πρόπατός μου...")
  Project verses 18:4–18:9 map 1-to-1 onto Charles XVIII.1–XVIII.6:
    18:4  ← Charles XVIII.1 ("*Καὶ ἔγνωκα¹ ὅσα κακὰ ποιήσετε²...")
    18:5  ← Charles XVIII.2 ("Φυλάξασθε⁵ οὖν, τέκνα μου...")
    18:6  ← Charles XVIII.3 ("Ὅτι¹⁰ ταῦτα¹¹ ἀφιστᾷ¹²...")
    18:7  ← Charles XVIII.4 ("Στερίσκει¹⁹ τὴν ψυχὴν αὐτοῦ²⁰...")
    18:8  ← Charles XVIII.5 ("*Θυσίας Θεοῦ ἐμποδίζει²⁹...")
    18:9  ← Charles XVIII.6 ("*Δυσὶ γὰρ πάθεσιν ἐναντίοις δουλεύει³⁵...")

  The project chapter xvii ends at its verse 3 (Charles XVII.3-tail, absorbed into 18:1
  boundary), omitting Charles XVII.5 ("Καὶ ἐγὼ οἶδα ὅτι ἐξ ἐμοῦ στήσεται τὸ
  βασίλειον"). That omission is a separate category-(e) content gap unrelated to the
  9-vs-6 skeleton question.

  Decision: INTENTIONAL. Do not restructure per-verse files.
