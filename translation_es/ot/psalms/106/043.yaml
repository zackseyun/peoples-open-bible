    text: O «en su consejo» o «en su propósito». El hebreo puede enfatizar tanto su acción rebelde como su disposición rebelde, y עֵצָה puede significar «consejo», «plan» o «propósito».
    reason: lexical_alternative
  - marker: b
    text: O «se hundieron» o «se consumieron por su iniquidad». El verbo hebreo puede denotar ser abatidos, derrumbarse o consumirse.
    reason: lexical_alternative
  revision_rationale: 'Se revisa «fueron humillados» a «fueron abatidos» para seguir mejor el valor de מוך y la decisión léxica inglesa documentada. También se rehacen las notas para que preserven las alternativas significativas del expediente POB en los lugares correctos: «en sus planes»/«consejo»/«propósito» para בַעֲצָתָם y «abatidos»/«se hundieron»/«se consumieron» para וַיָּמֹכּוּ. Se elimina la nota sobre «los libró» porque no está respaldada por las notas auditadas de este verso y no añade una ambigüedad nueva necesaria en español.'
