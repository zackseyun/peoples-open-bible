translation:
  language: es
  text: Tú dispones una mesa ante mí en presencia de mis enemigos[a]; unges mi cabeza con aceite[b]; mi copa rebosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tú preparas una mesa ante mí». El verbo hebreo puede significar «disponer», «arreglar» o «preparar»; «dispones» se eligió para conservar en español la imagen concreta de poner la mesa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «engordaste / hiciste rica mi cabeza con aceite», un modismo de abundante refresco u honor. «Unges mi cabeza con aceite» expresa el sentido probable en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּעֲרֹךְ
  english_pob_choice: You set
  chosen_spanish: preparas
  alternatives_spanish:
  - pones en orden
  - arreglas
  - preparas
  lexicon: HALOT
  rationale: El verbo ערך puede significar ordenar, disponer o preparar. En español, «preparas una mesa» comunica con naturalidad la imagen de hospedar y evita un calco duro, manteniendo la idea de disponer la mesa para una comida.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  - delante de mí
  lexicon: HALOT
  rationale: La frase expresa cercanía relacional y espacial. «Delante de mí» suena natural en español y preserva el matiz de que la mesa se dispone a la vista del salmista.
- source_word: שֻׁלְחָן
  english_pob_choice: a table
  chosen_spanish: una mesa
  alternatives_spanish:
  - una tabla
  - una mesa
  lexicon: HALOT
  rationale: El sustantivo se refiere a una mesa de comida u hospitalidad. «Mesa» es el equivalente natural y claro en español.
- source_word: נֶגֶד
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - ante
  - frente a
  - en presencia de
  lexicon: HALOT
  rationale: נגד aquí añade la idea de visibilidad y confrontación respetuosa. «En presencia de» expresa bien la escena sin perder la tensión de estar ante los enemigos.
- source_word: צֹרְרָי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - los que me hostigan
  - mis enemigos
  lexicon: HALOT
  rationale: El término alude a quienes muestran hostilidad. «Enemigos» es la opción más directa e idiomática en este contexto poético.
- source_word: דִּשַּׁנְתָּ
  english_pob_choice: you anoint
  chosen_spanish: unges
  alternatives_spanish:
  - me unges
  - me refrescas abundantemente
  - me haces rico de honor
  lexicon: HALOT
  rationale: La raíz דשן puede implicar hacer grasoso/rico o tratar con abundancia; en contexto con aceite y cabeza, «unges» comunica la acción concreta de hospitalidad y honor. En español conserva la imagen sin imponer una lectura sacramental.
- source_word: בַשֶּׁמֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - con aceite
  - con aceite de oliva
  lexicon: HALOT
  rationale: «Aceite» reproduce fielmente el instrumento mencionado. No se añade «de oliva» porque el hebreo no lo especifica.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi cabeza
  lexicon: HALOT
  rationale: El sustantivo es corporal y concreto. En español «cabeza» es la forma natural, ligeramente más viva que «mi cabeza» mantenida literal.
- source_word: כּוֹסִי
  english_pob_choice: my cup
  chosen_spanish: mi copa
  alternatives_spanish:
  - mi copa
  - mi cáliz
  lexicon: HALOT
  rationale: El vaso de beber continúa la imagen de banquete y hospitalidad. «Copa» es el equivalente idiomático en español; «cáliz» sería más litúrgico y menos ajustado al contexto.
- source_word: רְוָיָה
  english_pob_choice: overflows
  chosen_spanish: rebosa
  alternatives_spanish:
  - rebosa
  - desborda
  - está llena hasta rebosar
  lexicon: HALOT
  rationale: El término expresa saturación o plenitud abundante. «Rebosa» conserva la imagen de exceso de provisión en una forma breve y poética.
theological_decisions:
- issue: Imagen de hospitalidad y honor en la unción de la cabeza
  english_pob_reading: 'Rendered as concrete hospitality language: ''you anoint my head with oil.'''
  chosen_spanish_reading: «Unges mi cabeza con aceite» como gesto de hospitalidad y honra, no como afirmación sacramental explícita.
  alternative_spanish_readings:
  - «me haces rico la cabeza con aceite»
  - «me refrescas abundantemente con aceite»
  - «me unges la cabeza con aceite»
  rationale: El hebreo permite la idea de tratar con abundancia o riqueza; el contexto de mesa, aceite y copa apunta a hospitalidad real y honra. La versión española conserva el gesto concreto y no traslada automáticamente el lenguaje a una lectura cultual posterior.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tiempo verbal e inmediatez poética
  english_pob_reading: 'Used present-tense English throughout: ''You set... you anoint... my cup overflows.'''
  chosen_spanish_reading: 'Presente poético continuo: «preparas... unges... rebosa».'
  alternative_spanish_readings:
  - pasado perfecto («has preparado... has ungido... rebosa» )
  - pretérito simple («preparaste... ungiste... rebosa» )
  rationale: En español, el presente transmite bien la vividez del cuidado continuo de Yahvé, sin forzar una cronología distinta. Mantiene la inmediatez poética del hebreo y la lectura fluida.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el auditoría inglesa: se mantiene la imagen de mesa, la unción con aceite y la copa rebosante. La principal adaptación es escoger un presente poético natural en español y evitar calcos demasiado literales que oscurezcan la hospitalidad implícita en דִּשַּׁנְתָּ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino en el texto del salmo, de acuerdo con la convención del proyecto, aunque en este versículo no aparece explícitamente el tetragrámaton.
  - «Mesa», «aceite» y «copa» conservan el campo semántico de banquete/hospitalidad.
  - «Rebosa» mantiene la imagen de superabundancia sin añadir una explicación interpretativa en el texto principal.
