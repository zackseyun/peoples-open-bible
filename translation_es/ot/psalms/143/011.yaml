review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: apelación al nombre de Yahvé, petición de preservar la vida, y extracción del alma/vida de la angustia. Sin embargo, se aparta innecesariamente de dos decisiones auditadas del POB inglés: «for the sake of» se representa mejor como «Por amor de» o «Por causa de», pero la nota a convierte erróneamente una explicación en alternativa; y, sobre todo, בְּצִדְקָתְךָ fue documentado con preferencia por «in your righteousness», mientras que el borrador usa «en tu justicia», desplazando el eje léxico-teológico. También faltan en español algunas alternativas importantes del inglés para תְּחַיֵּנִי.'
  spanish_quality_summary: El español es legible y digno, pero puede afinarse para mayor naturalidad bíblica y mejor alineación terminológica. «Por amor de tu nombre» suena más idiomático en registro salmódico que «Por causa de tu nombre». «En tu rectitud» comunica mejor el valor de righteousness en español sin caer en un calco extraño. Las notas actuales contienen una nota explicativa donde corresponde una alternativa léxica, y omiten alternativas relevantes ya preservadas en inglés.
  glossary_alignment: 'Alinea correctamente יְהוָה como «Yahvé» y נַפְשִׁי como «mi alma» con nota aclaratoria. No alinea del todo la preferencia del proyecto por «righteousness/rectitud/justicia según contexto»: aquí «justicia» es posible, pero la documentación del verso favorece «righteousness», mejor representado en español como «rectitud» en el texto principal, dejando «justicia» como alternativa. «Preserva mi vida» es adecuado para תְּחַיֵּנִי.'
  issues:
  - severity: medium
    issue: בְּצִדְקָתְךָ está traducido como «en tu justicia» en vez de una forma que preserve mejor la decisión auditada de «in your righteousness».
    rationale: Aunque «justicia» es semánticamente posible, el expediente inglés privilegia «righteousness» por su fuerza teológica en este contexto. En español, «en tu rectitud» conserva mejor esa elección, dejando «por tu rectitud» o «en tu justicia» como alternativas en nota.
  - severity: medium
    issue: La nota [a] no presenta una alternativa léxica, sino una explicación interpretativa no requerida por el expediente.
    rationale: El POB inglés no añadió nota para «your name» con explicación semántica; la nota española actual cambia la función de las notas y añade expansión innecesaria.
  - severity: low
    issue: Faltan alternativas importantes en la nota de תְּחַיֵּנִי.
    rationale: El inglés preserva «revive me» y «give me life». En español conviene retener «revíveme» o «dame vida» para reflejar el rango del verbo.
  - severity: low
    issue: «Por causa de tu nombre» es aceptable, pero «Por amor de tu nombre» suena más natural y litúrgico en el registro de los Salmos.
    rationale: No es un error de fidelidad, pero una mejora estilística dentro del español bíblico moderno y digno.
