review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca las decisiones del POB en la mayoría de los segmentos: la corrección inicial, la procedencia de Seba, la imagen idiomática de ''alzar la mano'', la doble referencia ''contra el rey, contra David'', la exigencia de entregar solo al culpable, la retirada del asedio y la promesa sobre la cabeza arrojada por encima del muro. Sin embargo, hay dos problemas de alineación con el expediente auditado: (1) la nota [a] fue colocada erróneamente sobre ''Eso no es así'' cuando la alternativa documentada corresponde a ''de la región montañosa de Efraín''; (2) el inglés POB conservó una nota alternativa para el modismo ''has raised his hand'' = ''has rebelled'', y el español debería preservarla también porque la decisión lexical fue explícitamente auditada.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos asperezas de naturalidad: ''por nombre'' suena algo forzado en español bíblico actual, y ''hacia ti'' en ''será arrojada hacia ti'' es menos idiomático que ''te será arrojada'' o ''será arrojada a ti''. Además, la ubicación errónea de la nota produce confusión lectora. Con ajustes menores, el texto queda natural y fiel.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Los nombres propios 'David', 'Joab', 'Efraín', 'Seba' y 'Bicri' son aceptables en español. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La conservación de 'ha alzado su mano' está en línea con la filosofía lexical del POB, siempre que se añada la nota alternativa sobre 'se ha rebelado'.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota existente explica מֵהַר אֶפְרַיִם ('de la región montañosa de Efraín' / 'del monte de Efraín'), pero en el borrador aparece tras 'Eso no es así'. Esto rompe la correspondencia entre nota y palabra/frase relevante, contrariando la disciplina de anclaje exigida.
  - severity: medium
    issue: Falta una nota lexical para 'ha alzado su mano'.
    rationale: El expediente inglés conservó explícitamente la alternativa interpretativa 'has rebelled against the king, against David' para el modismo נָשָׂא יָדוֹ. Dado que la traducción principal española mantiene la imagen literal, también debe preservarse la alternativa en nota para reflejar la decisión auditada.
  - severity: low
    issue: '''por nombre'' suena poco natural en español.'
    rationale: Aunque no es incorrecto, 'de nombre' o 'llamado' expresa mejor שְׁמוֹ en español moderno y digno, sin perder fidelidad.
  - severity: low
    issue: '''será arrojada hacia ti'' es menos idiomático de lo deseable.'
    rationale: En español, con verbos de arrojar dirigidos a una persona, 'te será arrojada' resulta más natural y mantiene bien el sentido pasivo del hebreo.
  revised_spanish_text: '“No es así. Más bien, un hombre de la región montañosa[a] de Efraín, Seba hijo de Bicri, de nombre, ha alzado su mano[b] contra el rey, contra David. Entréguenlo a él solo, y yo me retiraré de la ciudad.” Y la mujer dijo a Joab: “Mira, su cabeza te será arrojada por encima del muro.”'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: “de la región montañosa de Efraín”; tradicionalmente también puede traducirse “del monte de Efraín”.'
    reason: lexical_alternative
  - marker: b
    text: 'O, de forma más interpretativa: “se ha rebelado contra el rey, contra David”. El modismo hebreo es literalmente “ha alzado su mano”.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el anclaje de la nota geográfica para que corresponda a la frase pertinente, se añadió la nota lexical exigida para el modismo ''ha alzado su mano'', y se hicieron dos mejoras menores de estilo: ''No es así'' en lugar de ''Eso no es así'' y ''te será arrojada'' en lugar de ''será arrojada hacia ti''. También se ajustó ''por nombre'' a ''de nombre'' para un español más natural.'
