translation:
  language: es
  text: Y ahora, por favor, bendigan a Yahvé, el que es bueno.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y ahora, por favor, bendigan a Yahvé, el que es bueno». El testigo griego, en cambio, lee de manera sustancialmente distinta: «Que les dé sabiduría en su corazón, para juzgar a su pueblo con justicia, a fin de que no desaparezcan sus bienes, y su gloria por sus generaciones».'
    reason: textual_variant
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: El marcador discursivo introduce la exhortación final; «Y ahora» conserva mejor la conexión con lo anterior que un simple «Ahora».
- source_word: בָּרֲכוּ־נָא
  english_pob_choice: please bless
  chosen_spanish: por favor, bendigan
  alternatives_spanish:
  - bendigan ahora
  - les ruego, bendigan
  lexicon: HALOT
  rationale: El plural imperativo con נָא expresa ruego cortés; «por favor» es la forma más natural en español para conservar ese matiz sin suavizar el mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo contiene el nombre divino; el estándar español del proyecto usa «Yahvé» para reflejar el Tetragrama sin sustituirlo por un título.
- source_word: הַטּוֹב
  english_pob_choice: the good one
  chosen_spanish: el bueno
  alternatives_spanish:
  - quien es bueno
  - el que es bueno
  lexicon: HALOT
  rationale: El artículo con el adjetivo funciona de modo sustantivo/aposicional; «el bueno» preserva esa concisión y evita una paráfrasis más interpretativa.
theological_decisions:
- issue: Nombre divino en el cierre benedictivo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: La lectura hebrea subyacente es יְהוָה; la política del proyecto en español exige transliterar el nombre divino en lugar de ocultarlo tras una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre el hebreo y el testigo griego
  english_pob_reading: Main text follows the extant Hebrew exhortation; Greek parallel preserved as an alternative/textual note
  chosen_spanish_reading: Texto principal según el hebreo conservado; el griego se documenta como variante textual significativa
  alternative_spanish_readings:
  - Adoptar el griego como texto principal
  - Fusionar hebreo y griego en una sola redacción
  rationale: El hebreo disponible es el testigo primario de alta confianza para este versículo, mientras que el griego ofrece una formulación notablemente diferente. En el cuerpo principal se mantiene el hebreo y no se mezcla con la forma griega.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy and transparent documentation'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se privilegia el hebreo conservado para el texto principal, se mantiene el nombre divino explícito y se refleja el valor adjetival sustantivado de הַטּוֹב con una formulación breve y fiel.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el tono exhortativo y cortés de נָא con «por favor», sin volverlo meramente decorativo.
  - «El bueno» reproduce la concisión del hebreo y evita introducir una cláusula relativa que el texto no exige.
