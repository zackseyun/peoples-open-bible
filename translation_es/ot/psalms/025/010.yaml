translation:
  language: es
  text: Todos los caminos de Yahvé son amor constante y fidelidad[a] a los que guardan su pacto y sus testimonios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verdad» para אֱמֶת; en esta pareja pactal («amor constante y fidelidad»), el hebreo suele expresar más bien fidelidad confiable que verdad abstracta.
    reason: lexical_alternative
  - marker: b
    text: O «para los que guardan»; la preposición hebrea puede reflejarse en español como «a» o «para», según el matiz relacional que se quiera destacar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada uno de
  lexicon: HALOT
  rationale: El cuantificador abarca la totalidad de los caminos de Yahvé; «Todos» es natural en español y conserva la fuerza comprehensiva del hebreo.
- source_word: אָרְחוֹת
  english_pob_choice: paths
  chosen_spanish: caminos
  alternatives_spanish:
  - senderos
  - sendas
  lexicon: HALOT
  rationale: אָרְחוֹת designa literalmente caminos o senderos. «Caminos» mantiene la metáfora y suena más natural en español bíblico actual que una opción más literal pero pesada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino personal, según la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor constante
  alternatives_spanish:
  - amor leal
  - amor fiel
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד tiene un peso de lealtad pactal y amor comprometido. «Amor constante» comunica esa estabilidad relacional sin reducirlo a «misericordia» ni forzar un tecnicismo ajeno al español común.
- source_word: אֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - verdad
  - fiabilidad
  lexicon: HALOT
  rationale: En la pareja חֶסֶד וֶאֱמֶת, el sentido es de fidelidad confiable dentro del pacto. «Fidelidad» expresa mejor esa relación que «verdad» en sentido abstracto.
- source_word: לְנֹצְרֵי
  english_pob_choice: to those who keep
  chosen_spanish: para los que guardan
  alternatives_spanish:
  - a los que guardan
  - para los que observan
  - para los que custodian
  lexicon: HALOT
  rationale: El participio de נצר implica guardar con cuidado, custodiar. «Los que guardan» conserva esa idea y, con la preposición, «para» refleja bien la relación indicada por לְ sin perder naturalidad en español.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su pacto de alianza
  lexicon: HALOT
  rationale: בְּרִית se traduce con frecuencia como «pacto» en este contexto; mantiene la referencia covenantal sin inflar el texto.
- source_word: וְעֵדֹתָיו
  english_pob_choice: and his testimonies
  chosen_spanish: y sus testimonios
  alternatives_spanish:
  - y sus decretos
  - y sus estipulaciones
  lexicon: HALOT
  rationale: «Testimonios» sigue de cerca la dicción bíblica de עֵדוֹת y conserva el paralelismo con el hebreo.
theological_decisions:
- issue: Relación entre los atributos divinos y la cláusula final
  english_pob_reading: The LORD's ways are characterized by covenantal love and faithfulness, especially in relation to covenant keepers.
  chosen_spanish_reading: Los caminos de Yahvé están caracterizados por amor constante y fidelidad, y esa realidad se expresa hacia los que guardan su pacto y sus testimonios.
  alternative_spanish_readings:
  - Los caminos de Yahvé conducen a amor constante y fidelidad
  - Los caminos de Yahvé son amor constante y fidelidad en un sentido general
  rationale: La cláusula hebrea sin verbo predica cualidades de los caminos de Yahvé. La frase final especifica el ámbito relacional de esa experiencia, sin implicar que la fidelidad divina dependa de la obediencia humana. Se conserva la tensión teológica del texto.
  doctrine_reference: Preserve theological tension rather than resolve it; avoid importing doctrinal claims beyond the text.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'for those who keep' a 'to those who keep' para reflejar mejor la preposición hebrea y sonar más natural. En español se optó por «para los que guardan», que preserva la relación relacional/dativa del לְ sin perder fluidez, y se dejó constancia de la alternativa «a los que guardan» en nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה conforme al estándar del proyecto.
  - Se usa «pacto» para בְּרִית y «testimonios» para עֵדֹתָיו, coherentes con el resto del corpus.
  - «Amor constante y fidelidad» conserva la pareja pactal sin suavizarla en términos más genéricos.
