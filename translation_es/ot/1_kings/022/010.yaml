translation:
  language: es
  text: Y el rey de Israel y Josafat, rey de Judá, estaban sentados, cada uno en su trono, ataviados con ropas, en la era, a la entrada de la puerta de Samaria, y todos los profetas profetizaban delante de ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּמֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: Now the king of Israel
  chosen_spanish: Y el rey de Israel
  alternatives_spanish:
  - Ahora el rey de Israel
  - Y el rey de Israel, en ese momento
  lexicon: HALOT
  rationale: Mantengo la conexión narrativa simple de ו con «Y», sin forzar un marcador temporal que no está en el hebreo. «Rey de Israel» conserva el título sin añadir elementos.
- source_word: וִיהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  english_pob_choice: and Jehoshaphat king of Judah
  chosen_spanish: y Josafat rey de Judá
  alternatives_spanish:
  - y Josafat, rey de Judá
  - y Josafat, el rey de Judá
  lexicon: HALOT
  rationale: La apposición breve reproduce la estructura hebrea sin insertar artículo inexistente. El nombre se translitera de forma estándar como Josafat.
- source_word: יֹשְׁבִים
  english_pob_choice: were sitting
  chosen_spanish: estaban sentados
  alternatives_spanish:
  - estaban sentándose
  - se sentaban
  lexicon: HALOT
  rationale: El participio describe postura continua en escena; «estaban sentados» conserva bien el estado descriptivo en español.
- source_word: אִישׁ עַל כִּסְאוֹ
  english_pob_choice: each on his throne
  chosen_spanish: cada uno en su trono
  alternatives_spanish:
  - cada uno sobre su trono
  - cada uno en su silla
  lexicon: HALOT
  rationale: «אִישׁ» funciona distributivamente como «cada uno». «Trono» es el sentido contextual adecuado de כִּסֵּא en este marco real.
- source_word: מְלֻבָּשִׁים בְּגָדִים
  english_pob_choice: clothed in garments
  chosen_spanish: vestidos con vestidos
  alternatives_spanish:
  - vestidos con ropa
  - ataviados con vestidos
  lexicon: HALOT
  rationale: 'Sigo de cerca la literalidad del hebreo: «vestidos con vestidos» expresa la construcción verbal + sustantivo sin añadir «real» u otro calificativo no explícito. Aunque suena repetitivo, preserva la ausencia de especificación en la fuente y evita suavizar la tensión lexical documentada en la revisión inglesa.'
- source_word: בְּגֹרֶן
  english_pob_choice: at the threshing floor
  chosen_spanish: en la era
  alternatives_spanish:
  - en la era de trillar
  - junto a la era
  lexicon: HALOT
  rationale: «Góren» es «era» o «era de trillar». En español bíblico «era» comunica bien el lugar sin pesadez técnica; la preposición «en» refleja ubicación.
- source_word: פֶּתַח שַׁעַר שֹׁמְרוֹן
  english_pob_choice: at the entrance of the gate of Samaria
  chosen_spanish: a la entrada de la puerta de Samaria
  alternatives_spanish:
  - en la entrada de la puerta de Samaria
  - a la entrada de la puerta de Samaria
  lexicon: HALOT
  rationale: Conservo la cadena nominal de forma relativamente estrecha. «Puerta de Samaria» mantiene el constructo; «a la entrada» comunica la localización de manera natural en español.
- source_word: וְכָל הַנְּבִיאִים
  english_pob_choice: and all the prophets
  chosen_spanish: y todos los profetas
  alternatives_spanish:
  - y todos los profetas de allí
  - y todos los profetas
  lexicon: HALOT
  rationale: Traducción directa y clara del cuantificador universal con el sustantivo plural definido.
- source_word: מִתְנַבְּאִים
  english_pob_choice: were prophesying
  chosen_spanish: profetizaban
  alternatives_spanish:
  - estaban profetizando
  - ejercían como profetas
  lexicon: HALOT
  rationale: El hitpael de נבא se traduce naturalmente por «profetizar». En español, el imperfecto «profetizaban» mantiene el aspecto durativo del contexto narrativo sin recargar la frase.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  lexicon: HALOT
  rationale: «Delante de ellos» reproduce la relación espacial/pública del hebreo de manera idiomática y clara.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, especialmente al no introducir «real» antes de «vestidos», ya que el hebreo solo dice «vestidos/ropas» y no especifica ceremonialidad. Se preserva además la escena cortesana sin reinterpretar el lugar ni la función de los profetas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «profetizaban» para מִתְנַבְּאִים, coherente con el valor verbal habitual de נבא en contexto narrativo.
  - Se evita «siervos»/«criados» porque no hay δοῦλος ni equivalente en este texto.
  - «Trono» se conserva para כִּסֵּא por el contexto regio, y no se sustituye por «asiento».
