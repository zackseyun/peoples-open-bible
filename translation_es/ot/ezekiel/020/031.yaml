    rationale: Aunque léxicamente posible, 'regalos' suena cotidiano. En este contexto 'dones' preserva la forma sin perder solemnidad, y una nota puede dar la alternativa 'ofrendas'.
  - severity: medium
    issue: Falta en español la alternativa léxica documentada en inglés para 'gifts/offerings'.
    rationale: El English POB preservó la alternativa 'offerings'; la revisión española debería conservar una nota equivalente, especialmente si se elige 'dones' en el texto.
  - severity: low
    issue: '''el Señor Yahvé'' suena algo rígido para אֲדֹנָי יְהוִה.'
    rationale: No es infiel, pero en español eclesial amplio suele leerse mejor 'el Señor Dios, Yahvé', que distingue título y nombre divino con mayor claridad.
