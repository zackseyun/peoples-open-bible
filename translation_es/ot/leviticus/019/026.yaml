translation:
  language: es
  text: No comerán sobre la sangre[a]. No practicarán adivinación ni[b] interpretarán presagios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con la sangre'; la expresión hebrea es difícil y puede referirse a comer carne con sangre o a participar en una comida ritual relacionada con la sangre.
    reason: alternative_reading
  - marker: b
    text: O 'practicarán sortilegios' o, más tradicionalmente, 'observarán tiempos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תֹאכְלוּ
  english_pob_choice: You shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No deben comer
  - No comerán
  lexicon: HALOT
  rationale: En español jurídico-bíblico, la prohibición se expresa con claridad y dignidad mediante el futuro de mandato negativo. Mantiene el registro de ley del hebreo sin sonar arcaico.
- source_word: עַל הַדָּם
  english_pob_choice: over the blood
  chosen_spanish: sobre la sangre
  alternatives_spanish:
  - con la sangre
  - en la sangre
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de conservar la expresión relativamente transparente y ambigua. 'Sobre la sangre' refleja עַל de forma cercana y evita resolver el sentido oscuro del hebreo.
- source_word: תְנַחֲשׁוּ
  english_pob_choice: practice divination
  chosen_spanish: practicarán adivinación
  alternatives_spanish:
  - harán adivinación
  - adivinarán
  - practicarán soothsaying
  lexicon: HALOT
  rationale: '''Adivinación'' comunica el acto prohibido con precisión en español moderno, sin recurrir a un término demasiado arcaico o técnico.'
- source_word: תְעוֹנֵנוּ
  english_pob_choice: interpret omens
  chosen_spanish: interpretarán presagios
  alternatives_spanish:
  - observarán tiempos
  - leerán los presagios
  - interpretarán señales
  lexicon: HALOT
  rationale: '''Presagios'' transmite la esfera de lectura de signos/augurios de manera natural en español. ''Interpretarán'' conserva el paralelo verbal con el primer verbo prohibido y evita cerrar el sentido a una sola técnica adivinatoria.'
theological_decisions:
- issue: Cómo traducir la frase oscura עַל הַדָּם
  english_pob_reading: Retain a relatively literal rendering, 'over the blood,' in the main text
  chosen_spanish_reading: 'Conservar una versión literal y abierta: ''sobre la sangre'''
  alternative_spanish_readings:
  - con la sangre
  - mientras la sangre aún está en él
  - en un rito de sangre
  rationale: La expresión hebrea es difícil y discutida. La traducción principal mantiene la ambigüedad en lugar de resolverla, de acuerdo con la filosofía POB de preservar la tensión textual y dejar abiertas las opciones interpretativas.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; la lectura coincide con el pase final de alta concordancia y se mantiene la tensión interpretativa de la expresión oscura sin resolverla en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'sangre' para הַדָּם y no se sustituye por una explicación interpretativa en el cuerpo del texto.
  - '''Adivinación'' y ''presagios'' conservan el paralelismo de dos prácticas prohibidas distintas.'
  - La puntuación y el orden de las cláusulas siguen el patrón breve imperativo del hebreo, en un español publicable y natural.
