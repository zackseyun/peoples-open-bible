id: 2CH.25.10
reference: 2 Chronicles 25:10
source:
  edition: WLC
  text: וַ/יַּבְדִּילֵ֣/ם אֲמַצְיָ֗הוּ לְ/הַ/גְּדוּד֙ אֲשֶׁר בָּ֤א אֵלָי/ו֙ מֵֽ/אֶפְרַ֔יִם לָ/לֶ֖כֶת לִ/מְקוֹמָ֑/ם וַ/יִּ֨חַר אַפָּ֤/ם מְאֹד֙ בִּֽ/יהוּדָ֔ה וַ/יָּשׁ֥וּבוּ לִ/מְקוֹמָ֖/ם בָּ/חֳרִי אָֽף־־׃פ
translation:
  text: So Amaziah separated them[a], the troops that had come to him from Ephraim, to go to their place. And they became very angry with Judah and returned to their place in fierce anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became very angry against Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבְדִּילֵם
  chosen: dismissed them
  alternatives:
  - separated them
  - set them apart
  - sent them away
  lexicon: HALOT
  rationale: The verb בדל literally means to separate/divide, but in this context Amaziah is releasing the Ephraimite force from service and sending them back. 'Dismissed them' captures the contextual force in natural English better than the more wooden 'separated them.'
- source_word: לְהַגְּדוּד
  chosen: the troops
  alternatives:
  - the band
  - the division
  - the raiding party
  lexicon: HALOT
  rationale: גְּדוּד can denote a troop, band, or military unit. Since this refers to hired soldiers from Ephraim, 'the troops' is clear, contemporary, and militarily appropriate.
- source_word: אֲשֶׁר בָּא אֵלָיו מֵאֶפְרַיִם
  chosen: that had come to him from Ephraim
  alternatives:
  - which came to him from Ephraim
  lexicon: HALOT
  rationale: This relative clause identifies the dismissed force. The past perfect 'had come' fits the narrative sequence in English.
- source_word: לָלֶכֶת לִמְקוֹמָם
  chosen: to go to their place
  alternatives:
  - to return to their place
  - to go home
  lexicon: HALOT
  rationale: 'The infinitive phrase expresses purpose: Amaziah dismissed them for the purpose of going back. ''To go to their place'' stays close to the Hebrew; ''go home'' would be smoother but slightly more interpretive.'
- source_word: וַיִּחַר אַפָּם מְאֹד
  chosen: they became very angry
  alternatives:
  - their anger burned greatly
  - their nose burned exceedingly
  lexicon: HALOT
  rationale: The idiom חרה אף literally speaks of burning anger. 'They became very angry' renders the sense idiomatically in modern English without preserving a Hebrew body-part idiom that would sound unnatural.
- source_word: בִּיהוּדָה
  chosen: with Judah
  alternatives:
  - against Judah
  - at Judah
  lexicon: HALOT
  rationale: The preposition here marks the object/target of anger. 'With Judah' is idiomatic English for hostility directed toward Judah, while 'against Judah' is also possible. The latter is preserved as an alternative because it slightly heightens adversative force.
- source_word: וַיָּשׁוּבוּ לִמְקוֹמָם
  chosen: returned to their place
  alternatives:
  - went back to their place
  lexicon: HALOT
  rationale: שׁוב commonly means return. Since the prior clause already used 'go to their place,' varying with 'returned' avoids awkward repetition while preserving meaning.
- source_word: בָּחֳרִי אָף
  chosen: in fierce anger
  alternatives:
  - in burning anger
  - in heat of anger
  - furiously
  lexicon: HALOT
  rationale: This phrase intensifies the emotional state accompanying their return. 'In fierce anger' is vivid and natural, preserving the Hebrew emphasis on heated wrath.
