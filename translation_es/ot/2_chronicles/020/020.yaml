translation:
  language: es
  text: 'Se levantaron temprano en la mañana y salieron al desierto[a] de Tecoa. Mientras salían, Josafat se puso de pie y dijo: «Escúchenme, Judá y habitantes de Jerusalén: crean en Yahvé, su Dios, y serán afirmados[b]; crean a sus profetas[c], y tendrán éxito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estepa de Tecoa». El hebreo מִדְבָּר puede abarcar desierto, estepa o región agreste.
    reason: lexical_alternative
  - marker: b
    text: 'O «y permanecerán firmes». El hebreo usa un juego de palabras con אמן: «crean» ... «serán afirmados/establecidos».'
    reason: lexical_alternative
  - marker: c
    text: O «crean en sus profetas» o «confíen en sus profetas». El mismo verbo hebreo se repite por efecto retórico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  english_pob_choice: They rose early
  chosen_spanish: Se levantaron temprano
  alternatives_spanish:
  - Se levantaron de madrugada
  - Se despertaron temprano
  lexicon: HALOT
  rationale: El verbo hifil de שׁכם expresa levantarse temprano o comenzar temprano. «Se levantaron temprano» conserva el movimiento narrativo con español natural y fiel.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: La expresión temporal es directa y común. «Por la mañana» suena natural en español y mantiene el marco temporal explícito.
- source_word: וַיֵּצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se dirigieron
  lexicon: HALOT
  rationale: יצא en narrativa de movimiento se rinde de forma simple con «salieron», sin añadir matices interpretativos innecesarios.
- source_word: לְמִדְבַּר תְּקוֹעַ
  english_pob_choice: to the wilderness of Tekoa
  chosen_spanish: al desierto de Tecoa
  alternatives_spanish:
  - al desierto de Tekoa
  - a la región desértica de Tecoa
  lexicon: HALOT
  rationale: מִדְבָּר puede designar desierto, estepa o región agreste. Aquí «desierto» es válido y comunica bien el lugar, sin perder el valor geográfico.
- source_word: וּבְצֵאתָם
  english_pob_choice: As they were going out
  chosen_spanish: mientras salían
  alternatives_spanish:
  - cuando salían
  - al salir
  lexicon: HALOT
  rationale: La construcción temporal marca simultaneidad. «Mientras salían» expresa bien la acción en curso cuando Josafat habla.
- source_word: עָמַד
  english_pob_choice: stood
  chosen_spanish: se puso en pie
  alternatives_spanish:
  - se detuvo
  - estuvo de pie
  lexicon: HALOT
  rationale: Aunque «estuvo de pie» es literal, «se puso en pie» suena más idiomático en español y conserva la acción de colocarse para hablar.
- source_word: שְׁמָעוּנִי
  english_pob_choice: Listen to me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Atiéndanme
  lexicon: HALOT
  rationale: El imperativo con sufijo exige una llamada directa. «Escúchenme» mantiene el tono exhortativo y la relación de primera persona.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la gente de Judá
  - pueblo de Judá
  lexicon: HALOT
  rationale: El vocativo nombra al pueblo/polidad. «Judá» es conciso y conserva el carácter colectivo del llamado.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלַם
  english_pob_choice: and inhabitants of Jerusalem
  chosen_spanish: y habitantes de Jerusalén
  alternatives_spanish:
  - y los que habitan en Jerusalén
  - y residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio sustantivado de ישׁב se traduce naturalmente como «habitantes», manteniendo el registro formal de un discurso público.
- source_word: הַאֲמִינוּ בַּיהוָה אֱלֹהֵיכֶם
  english_pob_choice: believe in Yahweh your God
  chosen_spanish: crean en Yahvé, su Dios
  alternatives_spanish:
  - confíen en Yahvé, su Dios
  - crean en Yahvé, el Dios de ustedes
  lexicon: HALOT
  rationale: El hifil de אמן con ב admite «creer en» o «confiar en». Se conserva «crean en» para reflejar la repetición léxica del verso y no diluir el paralelismo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino con la terminología del proyecto. «Yahvé» preserva el nombre propio del pacto, en vez de ocultarlo tras un título.
- source_word: וְתֵאָמֵנוּ
  english_pob_choice: and you will be established
  chosen_spanish: y serán establecidos
  alternatives_spanish:
  - y permanecerán firmes
  - y quedarán firmes
  lexicon: HALOT
  rationale: El niphal de אמן retoma por juego de palabras el mismo campo semántico de «creer». «Serán establecidos» mantiene la relación léxica y el matiz de firmeza/confirmación.
- source_word: הַאֲמִינוּ בִנְבִיאָיו
  english_pob_choice: believe in his prophets
  chosen_spanish: crean en sus profetas
  alternatives_spanish:
  - crean a sus profetas
  - confíen en sus profetas
  lexicon: HALOT
  rationale: Se conserva la repetición de אמן con el mismo verbo español. «Crean en sus profetas» mantiene el paralelismo retórico del hebreo.
- source_word: וְהַצְלִיחוּ
  english_pob_choice: and you will succeed
  chosen_spanish: y tendrán éxito
  alternatives_spanish:
  - y prosperarán
  - y les irá bien
  lexicon: HALOT
  rationale: צלח puede significar prosperar o tener éxito. «Tendrán éxito» funciona bien en el contexto narrativo y militar sin reducirlo a prosperidad material.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre propio divino para hacer visible el dato del original y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH'
- issue: Fuerza de אמן / תֵאָמֵנוּ en la exhortación
  english_pob_reading: believe in ... and you will be established
  chosen_spanish_reading: crean en ... y serán establecidos
  alternative_spanish_readings:
  - confíen en ... y permanecerán firmes
  - crean ... y estarán firmes
  rationale: El verso usa repetición intencional y juego de palabras entre «creer» y «ser establecidos». Se conserva con el mismo verbo español para no perder la relación formal y semántica.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3 and #5'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador sigue el consenso de alta concordancia y conserva la lectura teológica y léxica del audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conserva «crean» para reproducir la repetición de אמן en ambos miembros del paralelismo.
  - «Serán establecidos» mantiene la relación verbal con «crean» sin introducir una paráfrasis doctrinal.
  - Se mantiene un registro bíblico moderno y digno, evitando fórmulas tradicionales que oculten el nombre divino.
