translation:
  language: es
  text: Porque he guardado los caminos de Yahvé[a], y no me he apartado impíamente de mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no he actuado perversamente al apartarme de mi Dios». El hebreo puede leerse más literalmente como «he actuado perversamente», con la frase siguiente expresando la separación de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la razón o fundamento de la afirmación anterior. «Porque» conserva bien esa relación causal/explanatoria en español sin añadir matices no presentes en el hebreo.
- source_word: שָׁמַרְתִּי
  english_pob_choice: I have kept
  chosen_spanish: he guardado
  alternatives_spanish:
  - he observado
  - he conservado
  - guardé
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o custodiar. «He guardado» mantiene el valor de obediencia y fidelidad a una norma o camino, y funciona de manera natural con «los caminos».
- source_word: דַּרְכֵי
  english_pob_choice: the ways
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - las vías
  - los modos
  lexicon: HALOT
  rationale: En sentido moral/covenantal, דֶּרֶךְ se traduce bien por «camino». En plural, «los caminos» comunica las pautas de vida prescritas por Yahvé sin forzar una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino y es la forma estándar preferida en el español de este trabajo.
- source_word: רָשַׁעְתִּי
  english_pob_choice: I have not wickedly departed from my God
  chosen_spanish: no me he apartado perversamente
  alternatives_spanish:
  - no he actuado perversamente
  - no me he alejado con maldad
  - no he sido impío al apartarme
  lexicon: HALOT
  rationale: רשע expresa actuar perversamente o wickedly; con la preposición מִן, el sentido es de apartarse de Dios de manera perversa. «No me he apartado perversamente» preserva la fuerza relacional y la tensión lexical entre 'actuar perversamente' y 'apartarse'.
- source_word: מֵאֱלֹהָי
  english_pob_choice: from my God
  chosen_spanish: de mi Dios
  alternatives_spanish:
  - de parte de mi Dios
  - de mi Dios
  lexicon: HALOT
  rationale: El sufijo posesivo es «mi Dios». En español, la preposición requerida por «apartarse» expresa naturalmente la separación con «de». Esto conserva el vínculo y la dirección de alejamiento implícitos en el hebreo.
theological_decisions:
- issue: Mantener la tensión entre fidelidad del salmista y evitar una lectura de impecabilidad absoluta
  english_pob_reading: 'The verse is translated as a covenantal claim of faithful conduct: ''I have kept the ways of the LORD, and I have not wickedly departed from my God.'''
  chosen_spanish_reading: 'El verso se traduce como una afirmación de fidelidad de pacto: «Porque he guardado los caminos de Yahvé, y no me he apartado perversamente de mi Dios».'
  alternative_spanish_readings:
  - Porque he guardado los caminos de Yahvé, y no he sido perverso delante de mi Dios
  - Porque he guardado los caminos de Yahvé, y no he actuado mal contra mi Dios
  rationale: El hebreo presenta una afirmación fuerte de integridad, pero no debe absolutizarse como si eliminara toda posibilidad de pecado. La traducción conserva el reclamo de fidelidad y la relación de pacto, manteniendo la tensión teológica en lugar de suavizarla o resolverla.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisión en inglés, especialmente la preferencia por una formulación más concisa de la fuerza de רשע + מן. La redacción española sigue esa lectura integrada, evitando una paráfrasis excesivamente explicativa y manteniendo la relación entre «perversamente» y «apartarse» en una sola cláusula.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto para יהוה.
  - Se conserva el plural «los caminos» para דַּרְכֵי en un contexto moral/covenantal.
  - «Perversamente» refleja la fuerza de רָשַׁעְתִּי sin convertirla en una simple negación general.
  - La preposición «de» con «apartarse» transmite adecuadamente el valor de מִן en español.
  - El registro es reverente pero contemporáneo, adecuado para publicación y lectura eclesial.
