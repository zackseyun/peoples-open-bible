translation:
  language: es
  text: Y Husam murió, y Hadad hijo de Bedad reinó en su lugar, quien hirió a Madián en el campo de Moab; y el nombre de su ciudad fue Avit[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Aiot”, transliteración variante del nombre de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: HALOT
  rationale: El verbo narrativo de מות se rinde de forma directa con "murió", que es natural en español y no suaviza el hecho con eufemismo.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó después de él
  - llegó a reinar en su lugar
  lexicon: HALOT
  rationale: מלך expresa acceso al reinado; "reinó en su lugar" conserva la relación de sucesión que marca תחתיו con una forma natural en español.
- source_word: הֲדַד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  alternatives_spanish:
  - Hadad
  lexicon: política de transliteración propia
  rationale: Los nombres propios se transliteran; se conserva la forma tradicional en español sin intentar adaptar el nombre.
- source_word: בֶּן בְּדַד
  english_pob_choice: son of Bedad
  chosen_spanish: hijo de Bedad
  alternatives_spanish:
  - hijo de Bedad
  lexicon: HALOT
  rationale: La construcción patronímica בן se traduce de manera directa con "hijo de" para mantener la relación familiar explícita.
- source_word: הַמַּכֶּה
  english_pob_choice: who struck
  chosen_spanish: el que hirió
  alternatives_spanish:
  - el que golpeó
  - el que derrotó
  lexicon: HALOT
  rationale: El participio de נכה identifica a Hadad por una acción característica. "Hirió" conserva la cercanía léxica sin introducir una interpretación más fuerte como "derrotó".
- source_word: אֶת מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Madián
  - Madián (Midian)
  lexicon: política de nombres bíblicos en español
  rationale: Se usa la forma española usual del nombre propio para el pueblo/lugar, manteniendo la identificación bíblica de manera reconocible.
- source_word: בִּשְׂדֵה מוֹאָב
  english_pob_choice: in the field of Moab
  chosen_spanish: en el campo de Moab
  alternatives_spanish:
  - en la tierra de Moab
  - en la región de Moab
  lexicon: HALOT
  rationale: שָׂדֶה puede significar "campo" y también zona abierta; "campo de Moab" conserva la imagen concreta del hebreo y sigue siendo idiomático en español.
- source_word: וְשֵׁם עִירוֹ
  english_pob_choice: and the name of his city was
  chosen_spanish: y el nombre de su ciudad fue
  alternatives_spanish:
  - y el nombre de su ciudad era
  - y su ciudad se llamaba
  lexicon: HALOT
  rationale: Se preserva la fórmula nominal hebrea con una estructura castellana clara y solemne, sin añadir matices no presentes en el texto.
- source_word: עיות
  english_pob_choice: Avith
  chosen_spanish: Avit
  alternatives_spanish:
  - Aiot
  - Avit
  lexicon: transliteración convencional del topónimo
  rationale: Se translitera el topónimo con una forma breve y publicable en español; la variante vocalizada del nombre admite oscilación, pero se conserva un único equivalente consistente.
theological_decisions:
- issue: La relación entre el rey previo y su sucesor
  english_pob_reading: reigned in his place
  chosen_spanish_reading: reinó en su lugar
  alternative_spanish_readings:
  - reinó después de él
  - ocupó su puesto
  rationale: La frase no añade interpretación histórica; simplemente señala sucesión. "En su lugar" mantiene la idea de reemplazo sin cargar el texto con términos modernos de oficina o administración.
  doctrine_reference: 1 Crónicas 1:46; sucesión real narrativa sin implicación doctrinal adicional
- issue: El verbo para la acción contra Madián
  english_pob_reading: who struck Midian
  chosen_spanish_reading: el que hirió a Madián
  alternative_spanish_readings:
  - el que derrotó a Madián
  - el que atacó a Madián
  rationale: El hebreo usa un participio de נכה, cuyo sentido básico es golpear/herir. Se evita "derrotó" porque intensifica el resultado más allá del verbo base.
  doctrine_reference: HALOT sobre נכה; mantener la fuerza léxica sin sobreinterpretar
translation_notes:
  revision_awareness: El audit trail inglés simplificó "the one who struck" a "who struck" para mayor naturalidad. La versión española sigue esa revisión y evita una perífrasis innecesaria, manteniendo la relación participial directa del hebreo. También conserva la transliteración del topónimo con una sola forma publicable, señalando la variante tradicional como nota alternativa.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - '"Madián" se usa como forma española estable para el nombre bíblico.'
  - La puntuación sigue el flujo narrativo breve del versículo y evita expandir la estructura hebrea más allá de lo necesario.
  - La nota al pie se ancla en el topónimo para registrar la variante transliterada sin duplicar el sentido principal.
