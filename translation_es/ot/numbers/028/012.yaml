    text: 'Hebreo: “tres décimas” y “dos décimas”; se entiende que son décimas de un efa.'
    reason: cultural_note
  - marker: b
    text: O “entremezclada con aceite”.
    reason: lexical_alternative
  revision_rationale: Se corrige 'único' por 'un' para evitar una implicación de exclusividad ausente del hebreo y producir un español más natural, manteniendo el sentido distributivo del precepto sacrificial. También se repara la nota b para que ofrezca una alternativa léxica genuina, y se mejora la nota a para reflejar ambos miembros paralelos tal como hace la auditoría inglesa.
