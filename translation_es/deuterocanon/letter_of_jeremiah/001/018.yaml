review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: λύχνους = «lámparas», καίουσιν = «encienden», πλείους ἢ ἑαυτοῖς = comparación de mayor provisión para los ídolos que para los adoradores, y ὧν οὐδένα δύνανται ἰδεῖν = incapacidad de ver ni una sola de las lámparas. Sin embargo, «más que para ellos mismos» suena incompleto en español porque el comparativo queda sin apoyo nominal claro; conviene explicitar levemente el objeto implícito sin añadir contenido ajeno.'
  spanish_quality_summary: El español es claro, pero la frase comparativa resulta algo forzada y poco idiomática. Una leve reparación a «más de las que encienden para sí mismos» mejora naturalidad y precisión. El resto del verso es legible y digno. La nota sobre «velas» no aporta valor suficiente y puede inducir una alternativa menos fiel al contexto de λύχνους.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Lámparas» y «ver» están bien alineados con las decisiones del POB. No intervienen términos sensibles como Yahvé, Mesías o δοῦλος.
  issues:
  - severity: medium
    issue: Comparativo español poco natural en «más que para ellos mismos»
    rationale: Aunque intenta preservar la elipsis griega, en español suena truncado y puede dificultar la comprensión. El sentido comparativo se conserva mejor con una explicitación mínima del referente implícito.
  - severity: low
    issue: Nota lexical sobre «velas» innecesaria y potencialmente menos fiel
    rationale: El griego λύχνους se refiere concretamente a lámparas; introducir «velas» como alternativa regional no mejora la comprensión y puede desviar del objeto cultural más probable.
  revised_spanish_text: Les encienden lámparas, más de las que encienden para sí mismos, pero no pueden ver ni una sola de ellas.
  revision_rationale: Se ajusta solo la comparación para que el español suene natural y exprese con claridad el contraste implícito en πλείους ἢ ἑαυτοῖς, sin sobreinterpretar. Se elimina la nota porque no es necesaria y la alternativa propuesta no es la más fiel al valor léxico de λύχνους.
