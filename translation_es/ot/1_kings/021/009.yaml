translation:
  language: es
  text: 'Ella escribió en las cartas, diciendo: «Proclamen un ayuno y sienten a Nabot al frente[a] del pueblo.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante del pueblo» o «en un lugar prominente entre el pueblo». El hebreo dice literalmente «a la cabeza del pueblo», lo que puede indicar una posición visible o destacada en la asamblea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְתֹּב
  english_pob_choice: She wrote
  chosen_spanish: Ella escribió
  alternatives_spanish:
  - Entonces escribió
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción consecutiva; en español, «escribió» comunica la acción pasada de forma natural. Se mantiene el sujeto femenino singular implícito en el contexto, reflejado con «Ella».
- source_word: בַּסְּפָרִים
  english_pob_choice: in the letters
  chosen_spanish: en las cartas
  alternatives_spanish:
  - en los documentos
  - en las misivas
  lexicon: HALOT
  rationale: Aquí ספרים no significa «libros», sino cartas escritas y enviadas. «Cartas» preserva el sentido epistolar y es más natural en español que un calco como «en las letras».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así
  lexicon: HALOT
  rationale: Es la fórmula introductoria del contenido citado. «Diciendo» conserva la estructura formal sin añadir interpretación.
- source_word: קִרְאוּ
  english_pob_choice: Proclaim
  chosen_spanish: Proclamen
  alternatives_spanish:
  - Anuncien
  - Convocen
  lexicon: HALOT
  rationale: El imperativo plural de קרא aquí tiene fuerza pública y oficial en el contexto de un ayuno convocado. «Proclamen» refleja mejor esa autoridad que «llamen».
- source_word: צוֹם
  english_pob_choice: a fast
  chosen_spanish: un ayuno
  alternatives_spanish:
  - un día de ayuno
  - un ayuno público
  lexicon: HALOT
  rationale: צוֹם denota la práctica de abstinencia colectiva. «Ayuno» es la forma más natural y fiel en español, sin añadir detalles que el hebreo no explicita.
- source_word: וְהוֹשִׁיבוּ
  english_pob_choice: and seat
  chosen_spanish: y sienten
  alternatives_spanish:
  - y coloquen sentado
  - y hagan sentar
  lexicon: HALOT
  rationale: El verbo hiphil expresa causar que alguien se siente. «Sienten» en español transmite bien la acción causativa y resulta más idiomático que una construcción pesada.
- source_word: אֶת נָבֹות
  english_pob_choice: Naboth
  chosen_spanish: a Nabot
  alternatives_spanish:
  - a Naboth
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español como «Nabot», forma gráfica habitual y coherente con la pronunciación aproximada en español bíblico, manteniendo el referente sin añadir título ni explicación.
- source_word: בְּרֹאשׁ הָעָם
  english_pob_choice: at the head of the people
  chosen_spanish: al frente del pueblo
  alternatives_spanish:
  - en la cabeza del pueblo
  - ante el pueblo
  - en un lugar prominente entre el pueblo
  lexicon: HALOT
  rationale: La expresión literalmente dice «en la cabeza del pueblo», pero en español suena más natural y conserva la imagen de prominencia pública con «al frente del pueblo». Mantiene la tensión entre posición destacada y posible lugar visible en la asamblea.
translation_notes:
  revision_awareness: 'He seguido el acuerdo alto del audit trail inglés y no introduje cambios sustantivos: mantuve la acción epistolar, el imperativo público de convocar un ayuno y la colocación destacada de Nabot. Ajusté únicamente la formulación española para que fuera natural y fiel al hebreo.'
  spanish_consistency_notes:
  - Uso «Yahvé» cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino.
  - «Proclamen un ayuno» conserva la fuerza pública del imperativo plural hebreo.
  - «Al frente del pueblo» preserva la ambigüedad del hebreo entre posición literal y prominente.
