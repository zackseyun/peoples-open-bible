    text: 'Hebreo: «bienaventurado es él»; el masculino singular es genérico y se refiere a cualquier persona que confía en Yahvé.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la colocación y el contenido de las notas para que coincidan con el aparato inglés auditado: la alternativa léxica de מַשְׂכִּיל queda en [a], y la explicación del masculino singular genérico de אַשְׁרָיו pasa a [b] sobre «bienaventurado». Además, «hallará el bien» mejora la naturalidad del español sin perder la amplitud del hebreo.'
