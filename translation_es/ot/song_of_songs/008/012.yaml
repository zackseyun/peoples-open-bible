translation:
  language: es
  text: Mi viña, mi propia viña, está delante de mí. El millar[a] es para ti, Salomón, y doscientos para los que guardan su fruto.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mil piezas de plata son para ti, Salomón». El verso anterior menciona «mil piezas de plata», pero este verso en sí solo dice «el millar».'
    reason: lexical_alternative
  - marker: b
    text: «Está delante de mí» también puede sugerir «está bajo mi cuidado» o «bajo mi control».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּרְמִי
  english_pob_choice: My vineyard
  chosen_spanish: Mi viña
  alternatives_spanish:
  - Mi viñedo
  - Mi viña, mi cultivo
  lexicon: HALOT
  rationale: כרם designa normalmente una viña; en español, «viña» conserva mejor la imagen poética y agrícola que «viñedo» en este contexto. Mantiene también la metáfora sin explicarla en exceso.
- source_word: שֶׁלִּי
  english_pob_choice: my very own
  chosen_spanish: la que es mía
  alternatives_spanish:
  - mi propiedad
  - que me pertenece
  lexicon: HALOT
  rationale: La repetición intensifica la posesión. «La que es mía» conserva esa fuerza enfática de manera natural en español, sin volverlo demasiado jurídico.
- source_word: לְפָנַי
  english_pob_choice: is before me
  chosen_spanish: está delante de mí
  alternatives_spanish:
  - está ante mí
  - está en mi cuidado
  lexicon: HALOT
  rationale: «Delante de mí» reproduce bien la imagen espacial y deja abierta la ambigüedad documentada entre presencia inmediata y control/custodia.
- source_word: הָאֶלֶף
  english_pob_choice: The thousand
  chosen_spanish: Los mil
  alternatives_spanish:
  - El millar
  - Mil
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el mil»; en español, «los mil» comunica de forma natural el valor sustantivado sin añadir «monedas» ni «siclos», que el verso no menciona explícitamente.
- source_word: לְךָ שְׁלֹמֹה
  english_pob_choice: is for you, Solomon
  chosen_spanish: son para ti, Salomón
  alternatives_spanish:
  - pertenecen a ti, Salomón
  - te corresponden, Salomón
  lexicon: HALOT
  rationale: La lamed expresa asignación o pertenencia. «Son para ti» mantiene el reparto directo y evita forzar un verbo de posesión más fuerte que el hebreo.
- source_word: וּמָאתַיִם
  english_pob_choice: and two hundred
  chosen_spanish: y doscientos
  alternatives_spanish:
  - más doscientos
  - además, doscientos
  lexicon: HALOT
  rationale: Número cardinal directo; no se añade moneda en el texto principal porque el hebreo no la especifica aquí.
- source_word: לְנֹטְרִים
  english_pob_choice: for those who keep
  chosen_spanish: para los que guardan
  alternatives_spanish:
  - para los que cuidan
  - para los vigilantes de
  lexicon: HALOT
  rationale: נטר puede significar guardar o vigilar. «Guardar» encaja bien con el ámbito de la viña y preserva la ambigüedad entre cuidar y custodiar.
- source_word: אֶת פִּרְיוֹ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - el fruto de ella
  - su cosecha
  lexicon: HALOT
  rationale: פְּרִי puede ser fruto o produce. «Su fruto» es idiomático y conserva la referencia al producto de la viña sin especificar más de lo que da el hebreo.
translation_notes:
  revision_awareness: 'El pasaje coincide con el hebreo masorético y con la lectura auditada en inglés: se conservó la brevedad del hebreo en «Los mil», sin introducir «siclos» en el texto principal. Se mantuvo la ambigüedad de לְפָנַי con una redacción espacial literal y nota alternativa, y se evitó interpretar el reparto numérico más allá de lo explicitado por el verso.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se eligió «viña» por coherencia con la imaginería agrícola y poética del Cantar.
  - Se mantuvo la distinción entre posesión enfática («la que es mía») y asignación («son para ti»).
