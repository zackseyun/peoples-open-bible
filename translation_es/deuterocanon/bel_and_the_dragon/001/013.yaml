translation:
  language: es
  text: Pero ellos no se preocupaban[a], porque habían hecho una entrada oculta bajo la mesa, y por ella solían entrar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'lo tomaban a la ligera' o 'lo despreciaban', reflejando el rango semántico más amplio de κατεφρόνουν.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ δὲ κατεφρόνουν
  english_pob_choice: But they were unconcerned
  chosen_spanish: Pero ellos no hacían caso
  alternatives_spanish:
  - pero ellos lo despreciaban
  - pero ellos pensaban nada de ello
  - pero ellos lo daban por nada
  lexicon: BDAG
  rationale: κατεφρόνουν puede abarcar desprecio, despreocupación o desdén. En este contexto narrativo, el énfasis está en su actitud de desestimarlo porque confiaban en su acceso secreto; 'no hacían caso' reproduce esa idea con naturalidad sin intensificar indebidamente el tono a un desprecio personal.
- source_word: πεποιήκεσαν
  english_pob_choice: had made
  chosen_spanish: habían hecho
  alternatives_spanish:
  - habían preparado
  - habían construido
  lexicon: BDAG
  rationale: El pluscuamperfecto expresa una acción anterior ya completada. 'Habían hecho' conserva esa anterioridad de forma sobria y cercana al valor del griego, sin añadir una especificación de construcción que el texto no exige.
- source_word: κεκρυμμένην εἴσοδον
  english_pob_choice: a hidden entrance
  chosen_spanish: una entrada oculta
  alternatives_spanish:
  - una entrada escondida
  - un acceso secreto
  - una entrada secreta
  lexicon: BDAG
  rationale: La combinación participio + sustantivo describe una entrada que estaba escondida. 'Entrada oculta' mantiene el sentido directo del griego y es idiomática en español.
- source_word: ὑπὸ τὴν τράπεζαν
  english_pob_choice: under the table
  chosen_spanish: debajo de la mesa
  alternatives_spanish:
  - bajo la mesa
  - debajo de la tabla
  lexicon: BDAG
  rationale: La referencia espacial es literal y simple. 'Mesa' refleja τράπεζα sin interpretar el objeto como altar o mesa ritual, ya que el griego solo dice 'mesa'.
- source_word: διʼ αὐτῆς
  english_pob_choice: through it
  chosen_spanish: y por ella
  alternatives_spanish:
  - y a través de ella
  - y por medio de ella
  - y por esa entrada
  lexicon: BDAG
  rationale: El pronombre femenino se refiere naturalmente a la 'entrada oculta'. 'Por ella' conserva la referencia pronominal y el movimiento de paso; 'y por ella' mantiene la conexión fluida con la cláusula anterior.
- source_word: εἰσεπορεύοντο
  english_pob_choice: they would go in
  chosen_spanish: solían entrar
  alternatives_spanish:
  - entraban
  - iban entrando
  - acostumbraban a entrar
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual en el pasado. 'Solían entrar' transmite esa costumbre mejor que un simple pretérito narrativo y evita sugerir una sola ocasión.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no requieren una revisión sustantiva; se conservó la distinción aspectual del imperfecto y el matiz de desprecio/desestimación de κατεφρόνουν sin endurecerlo innecesariamente.
  spanish_consistency_notes:
  - Se mantiene 'entrada oculta' para κεκρυμμένην εἴσοδον en armonía con el valor elegido en el POB inglés.
  - Se evitó 'Cristo', 'Señor' o terminología teológica ajena, porque el versículo es narrativo y no contiene vocabulario teológico explícito.
  - 'La puntuación respeta el paralelismo causal del original: contraste inicial, causa, y luego la acción habitual.'
