id: 1TI.1.10
reference: 1 Timothy 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πόρνοις, ἀρσενοκοίταις, ἀνδραποδισταῖς, ψεύσταις, ἐπιόρκοις, καὶ εἴ τι ἕτερον τῇ ὑγιαινούσῃ διδασκαλίᾳ ἀντίκειται,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/010.yaml
  text: the sexually immoral, men who have sex with men,[a] slave traders, liars, perjurers, and whatever else is opposed to sound teaching,
  footnotes:
  - marker: a
    text: Or, 'men who practice homosexuality.' The Greek term ἀρσενοκοῖται is rare and debated, but it clearly refers to male same-sex sexual activity.
    reason: alternative_reading
translation:
  language: ko
  text: 음행하는 자와 남자와 동침하는 남자[a]와 노예 상인과 거짓말하는 자와 거짓 맹세하는 자, 그 밖에 건전한 가르침을 거스르는 모든 자를 위해 제정된 것입니다—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「동성애를 행하는 남자」. 헬라어 ἀρσενοκοῖται는 ἄρσην(남자)+κοίτη(잠자리/성관계)의 합성어로, 레위기 LXX 본문을 반영한다고 보이며 남자 간의 성관계를 가리킨다. 어원·범위가 논의 중이라 각주로 대안을 둔다.
    reason: alternative_reading
lexical_decisions:
- source_word: πόρνοις
  english_pob_choice: the sexually immoral
  chosen_korean: 음행하는 자
  alternatives_korean:
  - 음란한 자
  - 성적으로 부도덕한 자
  lexicon: BDAG
  rationale: 한국 교회 정립 어휘 「음행」을 사용하되, 「음란한」보다 행위 지향적인 「음행하는 자」가 본문 어감에 더 가깝다.
- source_word: ἀρσενοκοίταις
  english_pob_choice: men who have sex with men
  chosen_korean: 남자와 동침하는 남자
  alternatives_korean:
  - 동성애를 행하는 남자
  - 남색하는 자
  lexicon: BDAG
  rationale: 남성-남성 성행위 지시를 명확히 하되, 현대 정체성 범주를 본문에 부과하지 않기 위해 행위 중심으로 「남자와 동침하는 남자」로 옮긴다. 어원·범위 논쟁은 각주에 보존한다.
- source_word: ἀνδραποδισταῖς
  english_pob_choice: slave traders
  chosen_korean: 노예 상인
  alternatives_korean:
  - 인신매매범
  - 사람을 매매하는 자
  lexicon: BDAG
  rationale: 사람을 잡아 노예로 매매하는 자를 가리키며, 「노예 상인」이 간결하고 직접적이다.
- source_word: ψεύσταις
  english_pob_choice: liars
  chosen_korean: 거짓말하는 자
  alternatives_korean:
  - 거짓된 자
  lexicon: BDAG
  rationale: 「거짓말쟁이」는 비속한 어감이 있으므로 정식체 「거짓말하는 자」.
- source_word: ἐπιόρκοις
  english_pob_choice: perjurers
  chosen_korean: 거짓 맹세하는 자
  alternatives_korean:
  - 위증자
  - 맹세를 어기는 자
  lexicon: BDAG
  rationale: 「위증」은 현대 법정적 함의가 강하다. 「거짓 맹세하는 자」가 본문의 도덕적·종교적 범주를 더 잘 담는다.
- source_word: τῇ ὑγιαινούσῃ διδασκαλίᾳ
  english_pob_choice: to sound teaching
  chosen_korean: 건전한 가르침
  alternatives_korean:
  - 바른 가르침
  - 건강한 교훈
  lexicon: BDAG
  rationale: ὑγιαίνω의 「건강한」 비유적 어감을 「건전한」으로 자연스럽게 옮긴다.
- source_word: ἀντίκειται
  english_pob_choice: is opposed
  chosen_korean: 거스르는
  alternatives_korean:
  - 대적하는
  - 반대되는
  lexicon: BDAG
  rationale: 「거스르는」이 도덕·신학적 반대의 어감을 자연스럽게 담는다.
