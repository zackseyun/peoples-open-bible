  to: Te di un rey en mi ira[a], y lo quité en mi furor[b].
  rationale: Se ajusta la segunda cláusula para reflejar mejor el paralelismo del hebreo y se fortalece עֶבְרָה con «furor», que distingue mejor la intensidad respecto de «ira». También se completa la nota alternativa para que preserve toda la lectura formal documentada en la auditoría inglesa.
