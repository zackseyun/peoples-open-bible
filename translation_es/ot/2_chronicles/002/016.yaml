revisions:
- from: Entonces Salomón contó[a] a todos los hombres geritas[b] que estaban en la tierra de Israel, después del censo que David su padre había hecho de ellos; y se halló que eran ciento cincuenta y tres mil seiscientos.
  to: Entonces Salomón contó a todos los extranjeros residentes[a] que estaban en la tierra de Israel, después del censo que David su padre había hecho de ellos; y se halló que eran ciento cincuenta y tres mil seiscientos.
  rationale: Se reemplaza «hombres geritas» por «extranjeros residentes» para reflejar con claridad y naturalidad la categoría de גֵּרִים documentada en el POB inglés. Se elimina la nota sobre «contó» por no ser necesaria para la fidelidad ni para la lectura. Se conserva «tierra de Israel», «después del censo» y el total numérico, que están bien alineados con el hebreo y el rastro auditado.
