translation:
  language: es
  text: mantendrá tu tiempo, pero ni siquiera la mitad. Entonces la tercera se levantó y sostuvo el dominio como las anteriores, y no apareció, y
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: tenebit
  english_pob_choice: will hold
  chosen_spanish: mantendrá
  alternatives_spanish:
  - retendrá
  - sostendrá
  lexicon: teneo
  rationale: El latín futuro tenebit expresa aquí acción de mantener/retener algo en duración o posesión. «Mantendrá» conserva el valor prospectivo y suena natural en español bíblico sin sobrecargar el verbo.
- source_word: tempus tuum
  english_pob_choice: your time
  chosen_spanish: tu tiempo
  alternatives_spanish:
  - tu plazo
  - tu duración
  lexicon: tempus
  rationale: tempus se traduce de forma directa por «tiempo»; «plazo» o «duración» podrían explicitar la idea, pero «tu tiempo» es más fiel al término base y deja abierta la ambigüedad temporal del contexto.
- source_word: sed nec dimidium eius
  english_pob_choice: but not even half of it
  chosen_spanish: pero ni siquiera la mitad de él
  alternatives_spanish:
  - pero ni la mitad de él
  - pero ni siquiera su mitad
  lexicon: sed / dimidium / eius
  rationale: «sed» pide contraste con «pero»; «nec dimidium eius» intensifica la negación, por eso «ni siquiera». Mantengo «de él» para conservar la referencia pronominal al tiempo, aunque en español también podría naturalizarse como «su mitad».
- source_word: Et leuauit se tertia
  english_pob_choice: Then the third rose up
  chosen_spanish: Entonces la tercera se levantó
  alternatives_spanish:
  - Y la tercera se levantó
  - Entonces la tercera se alzó
  lexicon: leuo
  rationale: «se levantó» reproduce bien el gesto de alzarse/levantarse sin caer en un calco rígido; «entonces» refleja la secuencia narrativa de et en este pasaje.
- source_word: tenuit principatum
  english_pob_choice: held the rule
  chosen_spanish: sostuvo el dominio
  alternatives_spanish:
  - mantuvo el dominio
  - retuvo el dominio
  - tuvo el poder
  lexicon: principatus
  rationale: En este contexto principatum es la posesión del gobierno o dominio. «Dominio» preserva el campo semántico del poder soberano mejor que una sola equivalencia devocionalizada; «sostuvo» refleja la continuación de ese ejercicio de autoridad.
- source_word: sicut et priores
  english_pob_choice: as the former ones had
  chosen_spanish: como las anteriores
  alternatives_spanish:
  - como las anteriores también
  - como las primeras
  lexicon: sicut / priores
  rationale: La comparación remite a los reinados/poderes previos. «Las anteriores» evita especificar más de lo que el latín dice y mantiene la referencia colectiva.
- source_word: non apparuit
  english_pob_choice: it disappeared
  chosen_spanish: desapareció
  alternatives_spanish:
  - no apareció
  - se hizo invisible
  lexicon: appareo
  rationale: Aunque el latín dice literalmente «no apareció», el flujo de la versión inglesa ya interpreta el resultado como desaparición. «Desapareció» comunica con claridad ese sentido narrativo sin agregar contenido extra; la nota recoge la alternativa literal.
theological_decisions:
- issue: La identidad de «la tercera» y la continuidad de la secuencia de poderes
  english_pob_reading: Then the third rose up and held the rule as the former ones had, and it disappeared, and
  chosen_spanish_reading: Entonces la tercera se levantó y sostuvo el dominio como las anteriores, y desapareció, y
  alternative_spanish_readings:
  - Entonces la tercera se levantó y sostuvo el dominio como las anteriores, y no apareció, y
  - Entonces la tercera se levantó y sostuvo el dominio como las anteriores, y se hizo invisible, y
  rationale: El texto no identifica explícitamente a «la tercera»; por eso se mantiene la referencia numérica sin interpretarla. El final conserva la secuencia abierta del manuscrito/verso, sin cerrar artificialmente la frase.
  doctrine_reference: Apocalíptica de 2 Esdras; respeto a la ambigüedad del símbolo político
- issue: Relación entre el latín 'non apparuit' y la traducción narrativa 'disappeared'
  english_pob_reading: it disappeared
  chosen_spanish_reading: desapareció
  alternative_spanish_readings:
  - no apareció
  - dejó de aparecer
  rationale: La versión inglesa convertía el no-aparecer en un resultado narrativo. En español se mantiene esa lectura fluida, pero se documenta la literalidad del latín para no borrar la tensión entre descripción y efecto.
  doctrine_reference: Principio de transparencia textual y fidelidad al testimonio latino
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió un desajuste importante de segmentación: 2 Esdras 11:18 debe iniciar con la cláusula latina «tenebit tempus tuum, sed nec dimidium eius» y continuar con la tercera que se levantó y sostuvo el principado. Esta versión española sigue ese reanclaje y evita incorporar elementos de 11:19, como el matiz de «también», que no corresponde aquí.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - «Dominio» se usa como equivalente funcional de principatum, sin convertirlo en término eclesiástico.
  - La cadencia final con «y» conserva la apertura del texto fuente, que queda continuado por el siguiente versículo.
