translation:
  language: es
  text: Cuanto más se multiplicaron[a], más pecaron contra mí; yo convertiré su gloria en vergüenza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «A medida que se multiplicaron, así pecaron contra mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yo cambiaré su gloria por vergüenza».'
