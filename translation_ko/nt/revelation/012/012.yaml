  yaml_path: translation/nt/revelation/012/012.yaml
  text: Therefore rejoice[a], O heavens, and you who dwell in them. Woe to the earth and the sea, because the devil has come down to you with great fury[c][b], knowing that he has only a little time.
  footnotes:
  - marker: a
    text: Or 'the land and the sea.' The Greek γῆ can mean either 'earth' or 'land'; here 'earth' is preferred because the context is cosmic in scope.
    reason: lexical_alternative
  - marker: b
    text: Or 'having great wrath.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'he has a little time.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 하늘들이여, 그리고 그 안에 거하는 자들이여, 기뻐하십시오. 그러나 땅과 바다에는 화가 있을 것입니다. 마귀가 자기에게 시간이 얼마 남지 않은 줄을 알고 큰 분노를 품고 너희에게 내려갔기 때문입니다.
  philosophy: optimal-equivalence
