translation:
  language: es
  text: 'Y para el sacrificio de paz[a]: dos cabezas de ganado, cinco carneros, cinco machos cabríos y cinco corderos machos de un año. Esta fue la ofrenda de Ahira, hijo de Enán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «ofrenda de comunión» u «ofrenda de bienestar» para «sacrificio de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: And for the sacrifice of
  chosen_spanish: Y para el sacrificio de
  alternatives_spanish:
  - Y para
  - Como sacrificio de
  lexicon: HALOT
  rationale: La preposición y la conjunción introducen un nuevo elemento en la lista de ofrendas. «Para el sacrificio de» conserva la relación nominal con זֶבַח sin reducirla a una simple etiqueta.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: los sacrificios de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: «שְׁלָמִים» designa una categoría sacrificial tradicionalmente conocida como «peace offerings». En español, «sacrificios de paz» mantiene esa designación cultual reconocible sin perder la relación con shalom/paz; las alternativas aclaran el matiz de comunión o bienestar, pero no son la etiqueta más directa.
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos cabezas de ganado
  alternatives_spanish:
  - dos reses
  - dos bovinos
  lexicon: HALOT
  rationale: «בָּקָר» es un término colectivo para ganado vacuno. «Cabezas de ganado» suena natural en español y conserva el valor colectivo sin precisar más de lo que dice el hebreo.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco machos de oveja
  lexicon: HALOT
  rationale: «אֵילִים» se refiere específicamente a carneros. «Carneros» es preciso y natural en español.
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabras machos
  - cinco chivos
  lexicon: HALOT
  rationale: «עַתּוּדִים» significa machos cabríos. «Machos cabríos» es claro y mantiene la fuerza lexical del original.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five male lambs a year old
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos en su primer año
  lexicon: HALOT
  rationale: «כְּבָשִׂים» aquí se refiere a corderos, y «בְּנֵי שָׁנָה» indica edad. En español, «corderos de un año» comunica de forma natural la idea de animales en su primer año sin añadir una aclaración innecesaria sobre el sexo, que no queda expresado de manera explícita en la forma nominal española.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Este fue el sacrificio de
  - Esta fue la ofrenda
  lexicon: HALOT
  rationale: La fórmula conclusiva identifica la ofrenda presentada. «Ofrenda» traduce bien קָרְבָּן en un cierre narrativo; el femenino concuerda naturalmente con «ofrenda» en español.
- source_word: אֲחִירַע בֶּן עֵינָן
  english_pob_choice: Ahira son of Enan
  chosen_spanish: Ahira, hijo de Enán
  alternatives_spanish:
  - Ahira, hijo de Enan
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de manera consistente. «Hijo de» conserva el patronímico hebreo, y el acento en «Enán» sigue la adaptación ortográfica española usual.
theological_decisions:
- issue: Categoría sacrificial de שְּׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: El texto enumera una ofrenda cultual específica; no conviene diluirla en una explicación interpretativa. «Sacrificios de paz» conserva la etiqueta tradicional y permite ver el vínculo con la idea de paz/shalom sin imponer una paráfrasis doctrinal.
  doctrine_reference: Levítico 3; Levítico 7:11-21
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. No se introdujeron cambios de sentido respecto al control inglés; la principal adaptación es la elección española de «sacrificios de paz» para mantener la categoría sacrificial sin perder la referencia a שְׁלָמִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí, ya que el versículo no contiene el nombre divino.
  - Se conserva un registro cultual formal y claro, evitando fórmulas eclesiásticas no requeridas por el hebreo.
  - «Ofrenda» se usa para קָרְבָּן en la fórmula final, en continuidad con el patrón narrativo del pasaje.
