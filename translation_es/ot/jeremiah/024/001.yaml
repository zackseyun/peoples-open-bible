base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/024/001.yaml
  text: Yahweh showed me[a], and behold, two baskets of figs were set before the temple of Yahweh, after Nebuchadrezzar king of Babylon had taken into exile Jeconiah son of Jehoiakim, king of Judah, along with the officials of Judah, the craftsmen, and the smiths from Jerusalem[c][b], and had brought them to Babylon.
  footnotes:
