translation:
  language: es
  text: 'Y les dijo[a]: «Ustedes son los jefes de las casas paternas de los levitas. Santifíquense, ustedes y sus hermanos, y suban el arca de Yahvé, el Dios de Israel, al lugar que he preparado para ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Conságrense». El verbo hebreo se refiere a una santificación ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los cabezas de las casas paternas
  - los jefes de las familias
  - los cabezas de los clanes paternos
  lexicon: HALOT
  rationale: La expresión hebrea conserva una estructura social de linaje/clan. «Casas paternas» refleja de manera transparente la organización por casas/familias de origen paterno; «jefes» comunica adecuadamente רָאשֵׁי sin caer en una traducción literal poco natural como «cabezas».
- source_word: לַלְוִיִּם
  english_pob_choice: of the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - entre los levitas
  - para los levitas
  lexicon: HALOT
  rationale: El lamed marca relación/apartenenencia. «De los levitas» es la forma más natural en español y mantiene la referencia étnico-tribal sin añadir matiz ajeno.
- source_word: הִתְקַדְּשׁוּ
  english_pob_choice: Sanctify yourselves
  chosen_spanish: Santifíquense
  alternatives_spanish:
  - Conságrense
  - Háganse santos
  lexicon: HALOT
  rationale: El hitpael de קדשׁ aquí tiene valor ritual de auto-consagración. «Santifíquense» conserva ese sentido cultual y permite el uso del pronombre reflexivo implícito en español.
- source_word: וַאֲחֵי/כֶם
  english_pob_choice: you and your brothers
  chosen_spanish: ustedes y sus hermanos
  alternatives_spanish:
  - ustedes y sus hermanos de tribu
  - ustedes y sus parientes
  lexicon: HALOT
  rationale: «Hermanos» reproduce el término hebreo y, por el contexto levítico, se entiende como compañeros/consanguíneos. En español se prefiere mantener la imagen fraterna del texto.
- source_word: וְהַֽעֲלִיתֶם
  english_pob_choice: bring up
  chosen_spanish: suban
  alternatives_spanish:
  - lleven arriba
  - traigan arriba
  - hagan subir
  lexicon: HALOT
  rationale: עלה en causativo expresa «hacer subir/traer arriba». En contexto de traslado del arca, «suban» es una solución idiomática y fiel que evita la rigidez de «hagan subir».
- source_word: אֲרוֹן יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the ark of Yahweh, the God of Israel
  chosen_spanish: el arca de Yahvé, el Dios de Israel
  alternatives_spanish:
  - el arca de Yahvé, Dios de Israel
  - el arca del Señor, el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según el estándar del proyecto. La apposición «el Dios de Israel» se conserva completa, porque en hebreo identifica al portador del arca sin necesidad de suavizarla.
- source_word: אֶל הֲכִינוֹתִי לוֹ
  english_pob_choice: to the place I have prepared for it
  chosen_spanish: al lugar que he preparado para ella
  alternatives_spanish:
  - al lugar que he preparado para él
  - a lo que he preparado para ella
  - a donde he preparado para ella
  lexicon: HALOT
  rationale: El verbo y el contexto exigen suplir el destino implícito como «lugar», tal como hace el audit trail inglés. Para el arca, en español es más natural el pronombre femenino «ella»; aunque el referente gramatical hebreo es masculino, aquí el acuerdo pronominal en español sigue al sustantivo español «arca».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El proyecto pide usar «Yahvé» para el Tetragrámaton. Se evita la convención de máscara «SEÑOR» para preservar la forma del nombre divino.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el criterio doctrinal del proyecto para representar el nombre del pacto de Dios sin ocultarlo mediante sustitución litúrgica. «Yahvé» es la forma establecida para el texto principal en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido ritual de הִתְקַדְּשׁוּ
  english_pob_reading: Sanctify yourselves. The Hebrew verb refers to ritual sanctification.
  chosen_spanish_reading: Santifíquense
  alternative_spanish_readings:
  - Conságrense
  - Purifíquense
  rationale: La forma verbal no se reduce a moralidad general; en este contexto es una preparación cultual para tocar y trasladar el arca. «Santifíquense» mantiene esa tensión ritual sin añadir explicaciones al texto principal.
  doctrine_reference: Lexical note from the English POB audit trail
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto fuente y con el control inglés; no se registran revisiones aplicadas en el audit trail más reciente. La redacción española conserva la estructura y las decisiones léxicas principales sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «arca» en femenino para el acuerdo natural del pronombre «ella», aunque el antecedente hebreo tenga género gramatical distinto.
  - «Casas paternas» conserva la estructura social del hebreo mejor que una simplificación a «familias».
  - La puntuación y el discurso directo siguen un estilo bíblico moderno y legible en español.
