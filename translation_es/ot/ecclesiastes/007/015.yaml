base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/007/015.yaml
  text: 'I have seen it all in the days of my vanity: there is a righteous man perishing in his righteousness[c][b][a], and there is a wicked man prolonging his life in his evil.'
  footnotes:
  - marker: a
    text: Or 'in the days of my fleetingness' or 'in the days of my vapor.' The Hebrew הֶבֶל, a key word in Ecclesiastes, suggests transience, elusiveness, and frustration.
    reason: lexical_alternative
  - marker: b
    text: Or 'perishing despite his righteousness.' The Hebrew can be read more than one way; the main text preserves the ambiguity.
    reason: alternative_reading
  - marker: c
    text: Or 'prolonging his life despite his evil' or 'lengthening his days in his evil.'
    reason: alternative_reading
