translation:
  language: es
  text: 'Él dijo: «Júrame». Y él le juró. Entonces Israel se postró sobre la cabecera de la cama[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre la cabecera del bastón/cayado». Las consonantes hebreas también pueden leerse así, y esa es la idea reflejada en la Septuaginta y en Hebreos 11:21.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִשָּׁבְעָה
  english_pob_choice: Swear
  chosen_spanish: Júrame
  alternatives_spanish:
  - Hazme jurar
  - Júramelo
  - Haz un juramento
  lexicon: HALOT
  rationale: El imperativo de שבע en esta fórmula exige una orden directa de juramento; «Júrame» conserva la fuerza breve y solemne del hebreo y suena natural en español bíblico moderno.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: he swore
  chosen_spanish: le juró
  alternatives_spanish:
  - juró
  - hizo juramento
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo de jurar para reflejar la continuidad léxica del hebreo y del audit trail inglés; el dativo «le» expresa correctamente el destinatario del juramento.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed himself
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - adoró
  - se inclinó profundamente
  lexicon: HALOT
  rationale: En este contexto la acción es corporal y no se explicita adoración a Dios; «se postró» preserva el gesto físico de reverencia sin añadir un matiz cultual no señalado por el contexto inmediato.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre tal como aparece en el texto hebreo, siguiendo la preferencia del POB por respetar la designación fuente y no armonizarla con «Jacob».
- source_word: עַל רֹאשׁ הַמִּטָּה
  english_pob_choice: on the head of the bed
  chosen_spanish: sobre la cabecera de la cama
  alternatives_spanish:
  - sobre la cabeza de la cama
  - al extremo de la cama
  lexicon: HALOT
  rationale: La preposición עַל admite la idea de «sobre»; «cabecera» comunica de manera natural la expresión espacial del hebreo y mantiene la lectura masorética de מיטָּה como «cama».
- source_word: הַמִּטָּה
  english_pob_choice: bed
  chosen_spanish: la cama
  alternatives_spanish:
  - el lecho
  - la litera
  lexicon: HALOT
  rationale: El vocalizado masorético apunta a מיטָּה como «cama/lecho»; «cama» es la equivalencia más clara y pública en español contemporáneo.
theological_decisions:
- issue: Lectura masorética «cama» frente a la lectura alternativa «bastón/cayado» preservada en la tradición griega y en Hebreos 11:21.
  english_pob_reading: bed
  chosen_spanish_reading: cabecera de la cama
  alternative_spanish_readings:
  - cabecera del bastón
  - al extremo del bastón
  - sobre la vara
  rationale: Para Génesis se sigue el texto hebreo masorético presente, que vocaliza הַמִּטָּה como «la cama». La lectura alternativa se conserva como posibilidad textual-teológica por su relevancia en la recepción canónica, sin resolverla en el texto principal.
  doctrine_reference: Principio de primacía del original y preservación de tensión textual/canónica
- issue: El gesto de postración puede leerse como reverencia física o como acto de culto.
  english_pob_reading: bowed himself
  chosen_spanish_reading: se postró
  alternative_spanish_readings:
  - lo adoró
  - se inclinó ante él
  rationale: El hebreo sólo asegura el acto de inclinarse o postrarse; no obliga a traducirlo como adoración. «Se postró» mantiene abierta la ambigüedad y evita introducir una interpretación no explícita.
  doctrine_reference: Criterio de no sobredeterminar la acción verbal del hebreo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que ajustó la preposición inglesa a «on the head of the bed» para reflejar más directamente el hebreo עַל; en español se decidió «sobre la cabecera de la cama» para preservar esa relación espacial sin perder naturalidad. También se retuvo la decisión auditada de mantener la lectura masorética de מיטָּה en el texto principal y relegar la alternativa «bastón/cayado» a nota.
  spanish_consistency_notes:
  - Se mantiene «Israel» conforme al texto fuente, no «Jacob».
  - Se evita «SEÑOR» o una sustitución devocional por «Yahvé» porque aquí no aparece el tetragrámaton.
  - «Se postró» se usa como equivalente corporal de וַיִּשְׁתַּחוּ, sin explicitar adoración.
  - La nota conserva la tensión textual entre «cama» y «bastón/cayado» conforme al audit trail inglés y a la recepción en Hebreos 11:21.
