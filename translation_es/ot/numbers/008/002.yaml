  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mantiene los dos verbos de habla («Habla… y dile»), conserva «las lámparas / las siete lámparas», y expresa la orientación «hacia el frente» del objeto cultual. También preserva adecuadamente la alternativa léxica de בְּהַעֲלֹתְךָ en nota. Sin embargo, «alces las lámparas» no suena natural en español para este contexto ritual y puede sugerir levantar físicamente las lámparas, mientras que el inglés auditado y la evidencia léxica apuntan a disponerlas/colocarlas o encenderlas. Además, «candelabro» es comprensible, pero «lampstand» se representa mejor por «lampario», que evita asociaciones modernas o decorativas de «candelabro» con velas.'
