translation:
  language: es
  text: 'Mientras subían por la cuesta de la ciudad, encontraron a unas jóvenes que salían a sacar agua, y les dijeron: «¿Está aquí el vidente[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el profeta». El hebreo dice específicamente «el vidente», un término más antiguo para quien después se llamó profeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלִים
  english_pob_choice: were going up
  chosen_spanish: subían
  alternatives_spanish:
  - iban subiendo
  - estaban subiendo
  lexicon: HALOT
  rationale: El participio narrativo expresa acción en curso; «subían» comunica bien ese movimiento progresivo en español sin forzar una perífrasis excesiva.
- source_word: בְּמַעֲלֵה הָעִיר
  english_pob_choice: the ascent to the city
  chosen_spanish: por la cuesta de la ciudad
  alternatives_spanish:
  - por la subida de la ciudad
  - por la cuesta que lleva a la ciudad
  lexicon: HALOT
  rationale: מַעֲלֶה designa una subida o pendiente. «Cuesta» mantiene la imagen topográfica de una subida concreta y es natural en español.
- source_word: מָצְאוּ
  english_pob_choice: they found
  chosen_spanish: encontraron
  alternatives_spanish:
  - se toparon con
  - hallaron
  lexicon: HALOT
  rationale: El sentido básico es «encontrar»; en este contexto implica el encuentro con personas en el camino, y «encontraron» preserva esa claridad.
- source_word: נְעָרוֹת
  english_pob_choice: young women
  chosen_spanish: unas jóvenes
  alternatives_spanish:
  - unas muchachas
  - unas muchachas jóvenes
  lexicon: HALOT
  rationale: El término refiere a mujeres jóvenes. «Jóvenes» evita tanto un matiz demasiado infantil como una palabra arcaica.
- source_word: יֹצְאוֹת לִשְׁאֹב מָיִם
  english_pob_choice: coming out to draw water
  chosen_spanish: que salían a sacar agua
  alternatives_spanish:
  - que venían a sacar agua
  - que salían a extraer agua
  lexicon: HALOT
  rationale: La construcción expresa salida con propósito. «Sacar agua» es la forma natural y fiel en español para el acto de sacar agua de un pozo o fuente.
- source_word: הֲיֵשׁ בָּזֶה
  english_pob_choice: Is ... here?
  chosen_spanish: ¿Está aquí... ?
  alternatives_spanish:
  - ¿Hay aquí... ?
  - ¿Se encuentra aquí... ?
  lexicon: HALOT
  rationale: La pregunta busca presencia en ese lugar. «Está aquí» reproduce la idiomaticidad del inglés POB y del hebreo sin añadir explicaciones.
- source_word: הָרֹאֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: Se conserva el término histórico específico del hebreo. «Vidente» mantiene la distinción tradicional entre este título antiguo y el posterior «profeta».
theological_decisions:
- issue: Título profético antiguo frente a equivalencia funcional moderna
  english_pob_reading: The Hebrew specifically says 'the seer,' an older term for one later called a prophet.
  chosen_spanish_reading: el vidente
  alternative_spanish_readings:
  - el profeta
  rationale: Se mantiene la tensión léxica del hebreo al no sustituir el título antiguo por el más común. La nota aclara la equivalencia histórica sin borrar la especificidad del texto.
  doctrine_reference: 1 Samuel 9:9-11; cf. 1 Samuel 3:20
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; se mantiene la lectura auditada como de alta concordancia, sin necesidad de ajustar la traducción ni la nota de alternativa léxica.
  spanish_consistency_notes:
  - Se mantiene el sujeto plural implícito de la escena con «subían» y «encontraron».
  - «Cuesta» conserva la imagen física de מַעֲלֶה sin sonar técnico.
  - Se usa «sacar agua» por ser la expresión española más natural para לִשְׁאֹב מָיִם.
  - La comilla de cierre y el signo de interrogación se ajustan a la puntuación española.
  - El marcador [a] aparece en el texto exactamente donde se aplica la nota.
