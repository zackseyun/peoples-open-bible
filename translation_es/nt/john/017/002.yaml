  text: καθὼς ἔδωκας αὐτῷ ἐξουσίαν πάσης σαρκός, ἵνα πᾶν ὃ δέδωκας αὐτῷ ⸀δώσῃ αὐτοῖς ζωὴν αἰώνιον.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/002.yaml
  text: just as you gave him authority over all flesh[a], so that to all whom you have given him[b], he may give eternal life.
  footnotes:
