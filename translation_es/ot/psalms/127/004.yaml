  to: Como flechas en la mano de un guerrero[a], así son los hijos nacidos en la juventud.
  rationale: Se cambia «los hijos de la juventud» por «los hijos nacidos en la juventud» para expresar con español natural el sentido idiomático de בְּנֵי הַנְּעוּרִים, en línea con la revisión inglesa «the sons of one's youth». Se conserva «hijos» para no neutralizar indebidamente el masculino del hebreo, y se mueve la formulación más literal a nota al pie como alternativa.
