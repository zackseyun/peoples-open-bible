review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica bien el sentido general del hebreo: la Sabiduría como sujeto femenino adornará al oyente con dos imágenes paralelas de honor. «Pondrá sobre tu cabeza» refleja adecuadamente תִּתֵּן לְרֹאשְׁךָ, y «te otorgará» representa bien תְּמַגְּנֶךָּ como acto de conferir, no de proteger. Sin embargo, «corona de gracia» para לִוְיַת חֵן debilita la distinción léxica entre לִוְיַת y עֲטֶרֶת, ya que el hebreo usa dos ornamentos relacionados pero distintos. Conviene preservar mejor el primer término como «guirnalda» o equivalente, dejando «corona» para עֲטֶרֶת.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse la imaginería poética evitando repetir o desplazar los campos léxicos de los dos adornos. «Diadema de hermosura» es comprensible, aunque «corona de hermosura» suena más natural y se alinea más estrechamente con עֲטֶרֶת. La redacción revisada queda más fiel y fluida.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. La principal cuestión léxica es mantener la diferencia entre לִוְיַת («guirnalda/guirnalda de gracia») y עֲטֶרֶת («corona»). El borrador la difumina al usar «corona» en el primer miembro y «diadema» en el segundo.
  issues:
  - severity: medium
    issue: «corona de gracia» para לִוְיַת חֵן
    rationale: El hebreo distingue לִוְיַת de עֲטֶרֶת. Traducir el primero como «corona» borra parte del paralelismo y hace menos visible la alternativa auditada «guirnalda de gracia».
  - severity: low
    issue: La nota [a] no refleja la alternativa principal auditada
    rationale: 'La auditoría inglesa da como alternativas «she will give / set», pero la nota española explica de forma más libre. Es mejor una nota más directa y breve: «También: “te dará”».'
  - severity: low
    issue: «diadema de hermosura» es posible pero menos directo que «corona de hermosura»
    rationale: עֲטֶרֶת corresponde normalmente a «corona». Aquí no es necesario evitar la repetición a costa de desplazar la imagen, especialmente porque el primer miembro puede resolverse con «guirnalda».
  revised_spanish_text: Pondrá[a] sobre tu cabeza una guirnalda de gracia[b]; te otorgará una corona de hermosura.
  revised_footnotes:
