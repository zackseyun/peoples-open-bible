translation:
  language: es
  text: Pero cuando se fortaleció, su corazón se enalteció hasta su destrucción, y actuó infielmente contra Yahvé su Dios; entró en el templo de Yahvé para quemar incienso en el altar del incienso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּכְחֶזְקָתוֹ
  english_pob_choice: But when he became strong
  chosen_spanish: Pero cuando se fortaleció
  alternatives_spanish:
  - Pero cuando llegó a ser fuerte
  - Pero al fortalecerse
  lexicon: HALOT
  rationale: 'El hebreo expresa un valor temporal: “cuando/as se fortaleció”. En español, “se fortaleció” conserva el cambio de estado sin sonar mecánico.'
- source_word: גָּבַהּ לִבּוֹ
  english_pob_choice: his heart was lifted up
  chosen_spanish: su corazón se enalteció
  alternatives_spanish:
  - su corazón se elevó
  - se volvió orgulloso
  lexicon: HALOT
  rationale: La imagen literal es “su corazón fue alto”. “Se enalteció” preserva la metáfora del corazón elevado y su matiz moral sin reducirlo solo a “orgullo”.
- source_word: עַד לְהַשְׁחִית
  english_pob_choice: to his destruction
  chosen_spanish: hasta su destrucción
  alternatives_spanish:
  - hasta su ruina
  - hasta llegar al desastre
  lexicon: HALOT
  rationale: La frase señala resultado y desenlace. “Hasta su destrucción” mantiene de forma directa la relación causal y el resultado fatal del orgullo.
- source_word: וַיִּמְעַל
  english_pob_choice: he acted unfaithfully
  chosen_spanish: actuó infielmente
  alternatives_spanish:
  - fue infiel
  - cometió una traición
  lexicon: HALOT
  rationale: מעל en contexto de pacto implica una falta de lealtad o traición religiosa. “Actuó infielmente” conserva ese valor verbal y la gravedad del término.
- source_word: בַּיהוָה אֱלֹהָיו
  english_pob_choice: against Yahweh his God
  chosen_spanish: contra Yahvé su Dios
  alternatives_spanish:
  - contra Yahvé, su Dios
  - contra Yahvé, el Dios de él
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como “Yahvé” según la convención del proyecto, y la relación hostil de מעל se expresa naturalmente con “contra”.
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: el templo de Yahvé
  alternatives_spanish:
  - el santuario de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: En este contexto narrativo, היכל designa el edificio del templo. “Templo” es la opción clara y fiel para el lector español.
- source_word: לְהַקְטִיר
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer humear incienso
  lexicon: HALOT
  rationale: El verbo cultual implica el acto de quemar/incensar. “Quemar incienso” es la equivalencia más directa y comprensible en español.
- source_word: מִזְבַּח הַקְּטֹרֶת
  english_pob_choice: the altar of incense
  chosen_spanish: sobre el altar del incienso
  alternatives_spanish:
  - sobre el altar de incienso
  - sobre el altar del perfume
  lexicon: HALOT
  rationale: La construcción hebrea es un genitivo de función o destino. “Altar del incienso” conserva la fórmula cultual y resulta idiomática en español.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. Según la convención del proyecto en español, se usa “Yahvé” de forma explícita, evitando la máscara litúrgica “SEÑOR”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido moral de גָּבַהּ לִבּוֹ
  english_pob_reading: his heart was lifted up
  chosen_spanish_reading: su corazón se enalteció
  alternative_spanish_readings:
  - su corazón se volvió soberbio
  - su corazón se elevó
  rationale: La expresión hebrea conserva una metáfora corporal para la soberbia. “Se enalteció” mantiene la imagen y el juicio moral, sin neutralizarlo ni explicar en exceso.
  doctrine_reference: Uso figurado bíblico del corazón como centro de la voluntad y del orgullo
- issue: מעל como infidelidad de pacto
  english_pob_reading: he acted unfaithfully
  chosen_spanish_reading: actuó infielmente
  alternative_spanish_readings:
  - fue infiel
  - quebrantó su lealtad
  rationale: En un contexto de relación con Dios, מעל no es mera desobediencia general sino una ruptura de fidelidad. “Actuó infielmente” conserva esa tensión de pacto.
  doctrine_reference: Éxodo 19; Levítico 5; uso bíblico de מעל en contextos de fidelidad
- issue: מִזְבַּח הַקְּטֹרֶת como objeto cultual
  english_pob_reading: altar of incense
  chosen_spanish_reading: altar del incienso
  alternative_spanish_readings:
  - altar de incienso
  - altar para el incienso
  rationale: La expresión es técnica y cultual; en español, “altar del incienso” es la forma más clara y estable sin perder el vínculo con el objeto destinado al incienso.
  doctrine_reference: Éxodo 30:1-10; lenguaje cultual del tabernáculo/templo
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés indicó que no se requirieron cambios y el pasaje fue confirmado con alta concordancia. Se mantuvo la línea de traducción ya auditada, adaptándola a terminología española propia del proyecto (especialmente Yahvé) sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” de forma consistente con la política española del proyecto.
  - 'Se eligió una equivalencia de verbo fuerte y directa para מעל: “actuó infielmente”.'
  - 'No se suavizó la progresión causal del versículo: fortaleza → enaltecimiento del corazón → destrucción.'
  - “Templo” y “altar del incienso” siguen el registro cultual del texto sin reemplazos devocionales más libres.
