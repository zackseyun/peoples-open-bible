  text: Ἐγὼ δὲ ⸂οὐ κέχρημαι οὐδενὶ⸃ τούτων. οὐκ ἔγραψα δὲ ταῦτα ἵνα οὕτως γένηται ἐν ἐμοί, καλὸν γάρ μοι μᾶλλον ἀποθανεῖν ἤ— τὸ καύχημά μου ⸂οὐδεὶς κενώσει⸃.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/015.yaml
  text: But I have made use of none of these things[a]. Yet I did not write these things so that it should be done this way for me[b], for I would rather die than—no one will nullify my boasting.
  footnotes:
  - marker: a
    text: Or, more explicitly from the context, 'none of these rights.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek breaks off after ''than—'' and then resumes: ''my boasting no one will empty.'' Many translations smooth the sense as ''than have anyone empty my boasting.'''
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 나는 이것들 가운데 어느 것도 사용하지 않았습니다. 또한 이런 일이 나에게 그렇게 행해지도록 하려고 이 글을 쓴 것도 아닙니다. 차라리 죽는 것이 내게는 더 낫기 때문입니다—누구도 내 자랑을 헛되게 하지 못할 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본문은 「죽는 것이 나에게 더 낫다—」에서 끊긴 채 「내 자랑을 누구도 헛되게 못한다」로 이어진다. 헬라어의 단절된 어법을 그대로 보존한다.
    reason: alternative_reading
