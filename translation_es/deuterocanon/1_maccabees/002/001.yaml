translation:
  language: es
  text: En aquellos días, Matatías, hijo de Juan, hijo de Simeón, sacerdote de los hijos de Joarib, vino de Jerusalén y se asentó en Modeín[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se estableció en Modeín». El griego dice literalmente «se sentó en Modeín», un modismo para residir o establecerse allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquel tiempo
  lexicon: LSJ
  rationale: La fórmula temporal es un encabezamiento narrativo estable. «En aquellos días» conserva el valor de marco histórico y suena natural en español bíblico contemporáneo.
- source_word: ἀνέστη
  english_pob_choice: came from Jerusalem / rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - apareció
  - se puso en pie
  - se alzó
  lexicon: LSJ
  rationale: El verbo significa literalmente «levantarse / ponerse en pie». En este contexto introductorio presenta la irrupción de Matatías en la narración. «Se levantó» preserva esa fuerza sin forzar un giro menos natural en español.
- source_word: Ματταθίας Ἰωάννου τοῦ Συμεών
  english_pob_choice: Mattathias son of John, son of Simeon
  chosen_spanish: Matatías, hijo de Juan, hijo de Simeón
  alternatives_spanish:
  - Matatías de Juan, de Simeón
  lexicon: LSJ
  rationale: Los genitivos son genealógicos. En español bíblico, «hijo de» explicita con claridad la relación y evita ambigüedad.
- source_word: ἱερεὺς
  english_pob_choice: a priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - un sacerdote
  lexicon: LSJ
  rationale: El sustantivo identifica oficio/estatus sacerdotal. En español, el artículo indefinido puede omitirse sin perder sentido; «sacerdote» mantiene la función descriptiva de manera fluida.
- source_word: τῶν υἱῶν Ἰωαρίβ
  english_pob_choice: of the sons of Joarib
  chosen_spanish: de los hijos de Joarib
  alternatives_spanish:
  - de la casa de Joarib
  - de la división de Joarib
  lexicon: LSJ
  rationale: La expresión es genealógica o de pertenencia a un grupo sacerdotal. «De los hijos de Joarib» sigue de cerca el griego y no introduce la interpretación de «división» sin necesidad textual inmediata.
- source_word: ἀπὸ Ἱερουσαλήμ
  english_pob_choice: from Jerusalem
  chosen_spanish: que vino de Jerusalén
  alternatives_spanish:
  - procedente de Jerusalén
  - desde Jerusalén
  lexicon: LSJ
  rationale: 'El auditrail inglés ajusta el primer verbo para que el sentido global sea natural: el movimiento se expresa mejor en español con «vino de Jerusalén». Esto integra el origen indicado por ἀπό y evita la redundancia de un segundo «se levantó» mal asociado al lugar.'
- source_word: ἐκάθισεν ἐν Μωδεείν
  english_pob_choice: settled in Modein
  chosen_spanish: y se asentó en Modeín
  alternatives_spanish:
  - y habitó en Modeín
  - y vivió en Modeín
  - y se sentó en Modeín
  lexicon: LSJ
  rationale: Aunque el verbo es literalmente «sentarse», aquí funciona como modismo de residencia. «Se asentó» reproduce el sentido idiomático que documenta la nota inglesa y es más claro que una traducción literal en español.
theological_decisions:
- issue: Valor del verbo ἀνέστη en un inicio narrativo
  english_pob_reading: came forward / rose up, with the following origin phrase rendered idiomatically
  chosen_spanish_reading: se levantó, con el movimiento hacia el lugar expresado por «vino de Jerusalén»
  alternative_spanish_readings:
  - apareció
  - se presentó
  - saltó a la escena
  rationale: No hay una carga doctrinal especial, pero sí una tensión lexical entre el sentido literal de «levantarse» y el flujo natural del español. Se conserva el gesto de emergencia narrativa sin convertirlo en un simple «apareció».
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés más reciente corrigió «rose up from Jerusalem» a «came from Jerusalem» porque ἀνέστη se entiende mejor idiomáticamente junto con ἀπὸ Ἱερουσαλήμ. La versión española sigue esa decisión combinando «se levantó» como apertura narrativa con «vino de Jerusalén» para el origen, y mantiene el cierre idiomático «se asentó en Modeín».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo exige; este versículo no contiene el nombre divino.
  - «Modeín» conserva la transliteración habitual del topónimo griego Μωδεείν.
  - Se mantiene «sacerdote» como término funcional sin ampliar a una glosa institucional no presente en el texto.
