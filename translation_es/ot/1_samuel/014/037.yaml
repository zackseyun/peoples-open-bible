revisions:
- from: 'Entonces Saúl consultó a Dios[a]: «¿Debo ir tras los filisteos? ¿Los entregarás en mano de Israel?» Pero no le respondió aquel día.'
  to: 'Entonces Saúl consultó a Dios: «¿Debo bajar tras los filisteos? ¿Los entregarás en la mano de Israel[a]?». Pero no le respondió aquel día.'
  rationale: Se corrige 'ir' por 'bajar' para preservar el valor de ירד, se mantiene 'tras los filisteos' como equivalente adecuado de אַחֲרֵי, se ajusta el modismo a 'en la mano de Israel' para mejorar la naturalidad sin perder la imagen hebrea, y se rehace la nota al pie para reflejar una alternativa española real y útil del modismo bélico.
