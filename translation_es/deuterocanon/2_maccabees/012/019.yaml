  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general y las decisiones léxicas principales del griego: identifica a Dositheus y Sosipater como subordinados de Macabeo, mantiene el matiz militar de ἐξοδεύσαντες, une correctamente ὑπὸ Τιμοθέου con καταλειφθέντας, y conserva ''más de diez mil hombres''. Sin embargo, hay un problema onomástico importante: ''Dositreo'' no corresponde bien a Δωσίθεος; la forma española natural y reconocible es ''Dositeo''. Además, ''marcharon'' sin complemento puede sonar como simple avance, mientras que el griego expresa salir/marchar fuera; ''salieron a campaña'' o ''salieron'' sería más claro, pero ''marcharon fuera'' es menos idiomático. La mejor reparación mínima es ajustar el nombre y usar ''salieron'' para mayor fidelidad sintáctica, manteniendo nota del matiz militar.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'Dositreo' resulta extraño y poco natural. 'Líderes bajo Macabeo' es comprensible, aunque 'líderes al mando con Macabeo' no sería necesario; la opción actual puede mantenerse. 'Marcharon' anclado con nota es aceptable, pero sin un complemento de salida pierde parte del valor de ἐξοδεύσαντες; 'salieron' suena más natural en español bíblico narrativo. El resto de la frase fluye bien.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. La alineación léxica con el expediente inglés es buena en ''líderes'', ''fortaleza'' y ''más de diez mil hombres''. La excepción relevante es onomástica: Δωσίθεος debe verterse como ''Dositeo'', no ''Dositreo''.'
  issues:
  - severity: high
    issue: 'Onomástico incorrecto: ''Dositreo'' para Δωσίθεος'
    rationale: La forma española reconocible y fiel al nombre griego es 'Dositeo'. 'Dositreo' parece una adaptación errónea y puede confundir al lector.
  - severity: medium
    issue: '''Marcharon'' no expresa con claridad el componente de salida de ἐξοδεύσαντες'
    rationale: El participio significa 'salir/marchar fuera'. En español, 'marcharon' solo puede sonar incompleto o ligeramente menos fiel al movimiento de salida. 'Salieron' preserva mejor la sintaxis básica; el matiz militar puede quedar en nota.
  revised_spanish_text: Pero Dositeo y Sosípatro, líderes bajo Macabeo, salieron[a] y destruyeron a los que había dejado atrás Timoteo en la fortaleza, más de diez mil hombres.
  revised_footnotes:
  - marker: a
    text: '''''''Salieron'''' traduce ἐξοδεύσαντες. En este contexto militar también puede entenderse como ''''marcharon'''' o ''''salieron a campaña''''.'
    reason: lexical_alternative
  revision_rationale: Se corrige un error importante en el nombre propio ('Dositreo' -> 'Dositeo') y se ajusta el verbo a una forma más fiel y natural para ἐξοδεύσαντες, manteniendo en nota la alternativa con matiz militar. No se requieren cambios adicionales.
