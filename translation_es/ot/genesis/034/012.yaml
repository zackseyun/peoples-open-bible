translation:
  language: es
  text: Exíjanme un precio de novia[a] y un presente muy altos, y les daré lo que me digan; solo denme a la joven por esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dote»; el hebreo מֹהַר se refiere específicamente al pago hecho por el novio o por su familia a la familia de la novia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְבּוּ
  english_pob_choice: Demand
  chosen_spanish: Exigid
  alternatives_spanish:
  - Pedid
  - Haced grande
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural que intensifica la petición del precio. «Exigid» conserva la fuerza transaccional y mandativa del contexto, sin perder la claridad en español.
- source_word: עָלַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - sobre mí
  - para mí
  lexicon: HALOT
  rationale: Con el imperativo, la preposición marca lo que se reclama al hablante. «De mí» es la solución natural en español para una suma exigida al hablante.
- source_word: מְאֹד
  english_pob_choice: a very large
  chosen_spanish: muy grande
  alternatives_spanish:
  - en gran manera
  - sumamente grande
  lexicon: HALOT
  rationale: El adverbio intensifica la magnitud de lo pedido. En español, «muy grande» modifica con naturalidad el monto o el valor del precio y el presente.
- source_word: מֹהַר
  english_pob_choice: bride-price
  chosen_spanish: precio de novia
  alternatives_spanish:
  - precio nupcial
  - compra matrimonial
  lexicon: HALOT
  rationale: Se evita «dote», porque en español suele referirse a bienes que aporta la novia o su familia, no al pago del novio a la familia de la novia. «Precio de novia» comunica el valor específico del término hebreo y mantiene la precisión lexical.
- source_word: וּמַתָּן
  english_pob_choice: gift
  chosen_spanish: presente
  alternatives_spanish:
  - regalo
  - don
  lexicon: HALOT
  rationale: El sustantivo añade un obsequio complementario al pago principal. «Presente» conserva el sentido de regalo adicional sin sonar excesivamente coloquial.
- source_word: וְאֶתְּנָה
  english_pob_choice: and I will give
  chosen_spanish: y yo daré
  alternatives_spanish:
  - y daré
  - y lo daré
  lexicon: HALOT
  rationale: La forma cohortativa expresa disposición o resolución. En español, «y yo daré» reproduce bien esa voluntad en discurso directo.
- source_word: כַּאֲשֶׁר תֹּאמְרוּ אֵלַי
  english_pob_choice: whatever you say to me
  chosen_spanish: lo que me digáis
  alternatives_spanish:
  - como me digáis
  - según me digáis
  lexicon: HALOT
  rationale: La frase implica aceptación de cualquier cantidad o condición que propongan. «Lo que me digáis» mantiene la amplitud de sentido con un español idiomático.
- source_word: וּתְנוּ לִי
  english_pob_choice: only give me
  chosen_spanish: solo dadme
  alternatives_spanish:
  - pero dadme
  - y dadme
  lexicon: HALOT
  rationale: El matiz discursivo culmina la petición. «Solo dadme» refleja el énfasis final sin añadir contenido ajeno al hebreo.
- source_word: הַנַּעֲרָ
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  lexicon: HALOT
  rationale: El término describe a una mujer joven en edad de matrimonio. «La joven» es claro, moderno y fiel al registro del contexto.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - para esposa
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula marital estándar. «Por esposa» suena natural en español y conserva la función relacional del complemento.
translation_notes:
  revision_awareness: El texto coincide con el estado revisado más reciente del audit trail inglés; no se registran revisiones aplicadas ni cambios pendientes. La redacción española se ajusta directamente al hebreo WLC con el apoyo de las decisiones léxicas auditadas en inglés.
  spanish_consistency_notes:
  - Se preserva la distinción entre el pago principal (precio de novia) y el presente adicional.
  - Se evita «dote» en el cuerpo principal porque puede sugerir el flujo patrimonial inverso al del hebreo.
  - «Joven» se usa como equivalente de una mujer en edad de casarse, sin infantilizarla.
  - El orden y la fuerza imperativa se mantienen en español con registro claro y digno.
