  rationale: 베드로가 「유대 사람들」 「이스라엘 사람들」이라 부르며 공적 광장에서 선포하는 장면이므로, 한국어 화행의 자연성에 맞춰 합쇼체로 옮긴다. 직접 신적 발화나 친밀한 제자 대상 발화는 별도 정책을 따른다.
  doctrine_reference: 'KOREAN_PIPELINE.md: 합쇼체 정책 + DOCTRINE.md §5'
