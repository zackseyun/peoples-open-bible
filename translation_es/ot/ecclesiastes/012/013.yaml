translation:
  language: es
  text: 'El fin del asunto, cuando todo se ha oído: teme a Dios y guarda sus mandamientos, porque esto es todo del ser humano[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «porque esto es todo/el todo del hombre». También puede entenderse: «porque este es todo el deber del hombre» o «porque esto es para toda la humanidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: סוֹף דָּבָר
  english_pob_choice: The end of the matter
  chosen_spanish: El fin del asunto
  alternatives_spanish:
  - La conclusión del asunto
  - El fin de la materia
  lexicon: HALOT
  rationale: סוֹף expresa cierre o conclusión, y דָּבָר aquí se refiere al asunto tratado. «Asunto» comunica de forma natural el contenido discursivo sin reducirlo a una sola «palabra».
- source_word: הַכֹּל נִשְׁמָע
  english_pob_choice: when all has been heard
  chosen_spanish: cuando todo ha sido oído
  alternatives_spanish:
  - cuando todo ha sido escuchado
  - después de que todo ha sido oído
  lexicon: HALOT
  rationale: La cláusula es elíptica y señala el momento en que se enuncia la conclusión. «Ha sido oído» conserva la pasiva y funciona con naturalidad en español.
- source_word: אֶת הָאֱלֹהִים יְרָא
  english_pob_choice: fear God
  chosen_spanish: teme a Dios
  alternatives_spanish:
  - reverencia a Dios
  - ten temor de Dios
  lexicon: HALOT
  rationale: יִרְא con Dios mantiene el peso de temor reverente y obediencia. «Teme a Dios» es la forma más directa y fiel; «reverencia» suaviza demasiado la fuerza del mandato.
- source_word: וְאֶת מִצְוֺתָיו שְׁמוֹר
  english_pob_choice: and keep his commandments
  chosen_spanish: y guarda sus mandamientos
  alternatives_spanish:
  - y observa sus mandamientos
  - y conserva sus mandamientos
  lexicon: HALOT
  rationale: שָׁמַר con mandamientos significa guardar, observar o custodiar. «Guarda» preserva la obligación ética y el matiz de obediencia continua.
- source_word: כִּי זֶה
  english_pob_choice: for this is
  chosen_spanish: porque esto es
  alternatives_spanish:
  - pues esto es
  - ya que esto es
  lexicon: HALOT
  rationale: כִּי introduce la razón o fundamento de la exhortación. En español, «porque» expresa de manera clara esa relación explicativa.
- source_word: כָּל הָאָדָם
  english_pob_choice: the whole duty of man
  chosen_spanish: el todo del hombre
  alternatives_spanish:
  - todo el hombre
  - el todo de la humanidad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todo el hombre» / «el todo del hombre», sin añadir «deber» o «duty». La redacción escogida conserva la densidad y la apertura interpretativa del hebreo, evitando importar una glosa interpretativa al texto principal.
theological_decisions:
- issue: Sentido de כָּל הָאָדָם
  english_pob_reading: the whole duty of man
  chosen_spanish_reading: el todo del hombre
  alternative_spanish_readings:
  - el deber total del hombre
  - todo el deber del hombre
  - el todo de la humanidad
  rationale: La tradición interpretativa suele entender la frase como la obligación total del ser humano, pero la forma hebrea no incluye la palabra «deber». Por eso el texto principal mantiene la ambigüedad original y la nota recoge las opciones interpretativas sin resolverlas dogmáticamente.
  doctrine_reference: 'Translation philosophy §§1, 3, 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: El texto español sigue la última lectura auditada en inglés al preservar la clausura proverbial y la nota sobre כָּל הָאָדָם, pero evita introducir «deber» en el cuerpo principal, manteniendo la literalidad hebrea que el expediente señala como punto de tensión interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí el texto dice אֱלֹהִים, por lo que corresponde «Dios».
  - Se prefirió «mandamientos» para מִצְוֺתָיו, en línea con el valor normativo y plural del término.
  - Se mantuvo un tono bíblico moderno y sobrio, evitando el calco duro de «cuando todo ha sido oído» sin perder la sintaxis del hebreo.
  - La nota al pie conserva la tensión entre la lectura tradicional «deber del hombre» y la literalidad «todo del hombre» sin eliminar ninguna de las posibilidades registradas en el expediente.
