translation:
  language: es
  text: 'Jesús dijo: «¡Ay de la carne que depende[a] del alma[b][c]; ay del alma que depende de la carne!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo ⲉⲓϣⲉ también puede verterse «se apoya en» o «cuelga de», para conservar una imagen más concreta.
    reason: lexical_alternative
  - marker: b
    text: ⲯⲩⲭⲏ también puede significar «vida» o «yo», pero «alma» mantiene la oposición tajante entre carne y alma del copto.
    reason: lexical_alternative
  - marker: c
    text: El manuscrito muestra ⲧⲁⲉⲓ en ambas cláusulas; la normalización editorial usa ⲡⲁⲓ. Aquí no afecta el sentido, porque funciona como un «que» relativo con valor semántico debilitado.
    reason: dialect_note
lexical_decisions:
- source_word: ⲟⲩⲟⲉⲓ / ⲟⲩⲟⲓ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de
  lexicon: Crum; préstamo del griego οὐαί
  rationale: En español, «¡ay de…!» conserva el valor oracular y de denuncia de «woe» sin sonar artificial. Mantiene la fuerza de advertencia del dicho.
- source_word: ⲥⲁⲣⲝ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  lexicon: Crum; préstamo del griego
  rationale: «Carne» es el equivalente directo y mantiene la oposición tajante con «alma» que pide el texto. «Cuerpo» suavizaría el contraste.
- source_word: ⲯⲩⲭⲏ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo
  - ser
  lexicon: Crum; préstamo del griego
  rationale: «Alma» comunica bien la polaridad carne/alma que el dicho subraya. Aunque el campo semántico puede incluir «vida» o «yo», esa opción aquí debilitaría la simetría del texto.
- source_word: ⲉⲧⲉⲣⲉⲉⲓϣⲉ (ⲉⲓϣⲉ)
  english_pob_choice: depends on
  chosen_spanish: depende de
  alternatives_spanish:
  - se apoya en
  - cuelga de
  lexicon: Crum; Layton (grammar) on ⲉⲓϣⲉ with ⲛ
  rationale: «Depende de» expresa la relación de apoyo/reliance con claridad natural en español. «Se apoya en» o «cuelga de» pueden sugerir el matiz pictórico, pero aquí la formulación más fluida preserva el sentido básico.
- source_word: ⲡⲁⲓ / ⲧⲁⲉⲓ (demostrativo)
  english_pob_choice: that [which]
  chosen_spanish: que
  alternatives_spanish:
  - el que
  - la que
  - aquello que
  lexicon: Layton (grammar) on demonstratives with relative clauses
  rationale: El demostrativo se absorbe naturalmente en la relativa española con «que». En este contexto, el género del demostrativo no aporta una diferencia semántica estable.
- source_word: preposición ⲛ con ⲟⲩⲟⲓ / verbo
  english_pob_choice: to/on
  chosen_spanish: de
  alternatives_spanish:
  - a
  - sobre
  - en
  lexicon: Lambdin (grammar) on dative-like ⲛ
  rationale: En español, la estructura idiomática correcta es «ay de…» y «depende de…». Así se conserva la doble función relacional del ⲛ copto sin forzar la sintaxis.
translation_notes:
  revision_awareness: Se siguió el testimonio copto sahídico con las observaciones del aparato inglés POB. No se introdujeron cambios doctrinales ni ampliaciones interpretativas; se preservó la polaridad carne/alma y la fuerza interjectiva de ⲟⲩⲟⲓ.
  spanish_consistency_notes:
  - Se evitó «cuerpo» para ⲥⲁⲣⲝ por la decisión lexical ya documentada en el POB inglés.
  - Se evitó «espíritu» porque el texto contrapone explícitamente carne y alma, no carne y espíritu.
  - La puntuación reproduce dos miembros paralelos separados por punto y coma, siguiendo la estructura del original.
