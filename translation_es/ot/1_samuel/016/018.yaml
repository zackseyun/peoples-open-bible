translation:
  language: es
  text: 'Entonces uno de los jóvenes respondió y dijo: «Mira, he visto a un hijo de Isaí, el de Belén[a], que sabe tocar[b], un hombre de valor[c], un hombre de guerra, prudente en su hablar, y un hombre de buena presencia, y Yahvé está con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el betlehemita», un gentilicio que significa «de Belén».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que es hábil para tocar»; el instrumento no se nombra en este versículo, aunque el contexto se refiere a tocar para Saúl.'
    reason: lexical_alternative
  - marker: c
    text: «Un hombre de valor» también puede entenderse como «un guerrero valiente» o, en sentido más amplio, «un hombre capaz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En un contexto narrativo de diálogo, ענה introduce la toma de la palabra. «Respondió» conserva el giro hebreo y suena natural en español.
- source_word: אֶחָד מֵהַנְּעָרִים
  english_pob_choice: one of the young men
  chosen_spanish: uno de los jóvenes
  alternatives_spanish:
  - uno de los muchachos
  - uno de los servidores
  - uno de los asistentes
  lexicon: HALOT
  rationale: נְעָרִים puede abarcar jóvenes, servidores o asistentes. «Jóvenes» mantiene la forma léxica sin decidir de más el oficio cortesano.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica pide atención inmediata. «Mira» expresa bien esa función en español actual sin sonar arcaico.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - he observado
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresarse como pasado simple o perfecto compuesto. «He visto» mantiene el valor de experiencia relevante para la recomendación presente.
- source_word: בֵּן לְיִשַׁי
  english_pob_choice: a son of Jesse
  chosen_spanish: un hijo de Isaí
  alternatives_spanish:
  - uno de los hijos de Isaí
  - un hijo de Jesé
  lexicon: HALOT
  rationale: Se conserva la relación filial directa del hebreo. «Isaí» sigue la forma bíblica habitual en español y evita oscilar con «Jesé».
- source_word: בֵּית הַלַּחְמִי
  english_pob_choice: the Bethlehemite
  chosen_spanish: el betlehemita
  alternatives_spanish:
  - el de Belén
  - el belenita
  lexicon: HALOT
  rationale: El hebreo usa un gentilicio. «Betlehemita» reproduce ese valor de procedencia sin convertirlo en una paráfrasis locativa.
- source_word: יֹדֵעַ נַגֵּן
  english_pob_choice: who is skillful in playing
  chosen_spanish: que sabe tocar
  alternatives_spanish:
  - que es hábil para tocar
  - diestro al tocar
  lexicon: HALOT
  rationale: La construcción expresa habilidad práctica para tocar un instrumento, no mero conocimiento teórico. «Sabe tocar» es natural en español y no añade el instrumento no nombrado en el verso.
- source_word: גִּבּוֹר חַיִל
  english_pob_choice: a mighty man of valor
  chosen_spanish: un hombre valiente
  alternatives_spanish:
  - un valiente guerrero
  - un hombre poderoso
  - un hombre de valor
  lexicon: HALOT
  rationale: La expresión puede indicar valentía, capacidad o pericia militar. Dado que sigue «un hombre de guerra», «valiente» conserva el elogio sin redundar demasiado en un castellano más solemne que el necesario.
- source_word: אִישׁ מִלְחָמָה
  english_pob_choice: a man of war
  chosen_spanish: un hombre de guerra
  alternatives_spanish:
  - un guerrero
  - experto en la guerra
  lexicon: HALOT
  rationale: Se mantiene la estructura paralela y la fuerza literal de la expresión hebrea.
- source_word: נְבוֹן דָּבָר
  english_pob_choice: prudent in speech
  chosen_spanish: prudente en su hablar
  alternatives_spanish:
  - discreto en sus palabras
  - sabio al hablar
  - entendido en asuntos
  lexicon: HALOT
  rationale: La frase apunta a discernimiento expresado en el hablar o consejo. «Prudente en su hablar» conserva ese matiz y resulta claro en español.
- source_word: אִישׁ תֹּאַר
  english_pob_choice: a handsome man
  chosen_spanish: un hombre de buena presencia
  alternatives_spanish:
  - un hombre atractivo
  - un hombre bien parecido
  - un hombre de hermoso semblante
  lexicon: HALOT
  rationale: תֹּאַר se refiere a forma/apariencia. «De buena presencia» comunica una apariencia favorable sin cargar el texto con una evaluación demasiado moderna o estética.
- source_word: וַיהוָה עִמּוֹ
  english_pob_choice: and Yahweh is with him
  chosen_spanish: y Yahvé está con él
  alternatives_spanish:
  - y Yahvé está con él
  - y Yahvé lo acompaña
  lexicon: HALOT
  rationale: Se conserva el nombre divino del hebreo como «Yahvé» según la terminología del proyecto. El verbo en presente transmite la afirmación de presencia/favor divino.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se traslada como «Yahvé» en el cuerpo principal, preservando el nombre del pacto en vez de enmascararlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente en inglés afinó la sintaxis de la lista de cualidades para hacer explícito el valor participial de יֹדֵעַ נַגֵּן y mantener el paralelismo descriptivo. La versión española sigue esa claridad estructural sin forzar un calco, y conserva la tensión semántica de גִּבּוֹר חַיִל / אִישׁ מִלְחָמָה mediante una serie de descripciones paralelas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, coherente con el estándar español del proyecto.
  - Se usó «Isaí» como forma bíblica estable en español para יִשַׁי.
  - Se evitó «Cristo» y vocabulario eclesiástico no exigido por el hebreo.
  - La serie de cualidades conserva paralelismo y tono laudatorio, sin convertir las expresiones en una paráfrasis interpretativa.
