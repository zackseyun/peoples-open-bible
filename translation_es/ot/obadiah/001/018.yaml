  rationale: Se ajusta solamente la cláusula verbal central para reflejar mejor la compacidad y la imaginería del hebreo, evitando una sobreinterpretación causativa ('incendiarán') y mejorando el tono poético del español. Se conserva el resto por su fidelidad y buena alineación terminológica.
