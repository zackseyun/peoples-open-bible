  language: en
  yaml_path: translation/ot/joshua/006/017.yaml
  text: And the city and all that is in it shall be devoted to destruction for Yahweh[a]. Only Rahab the prostitute shall live, she and all who are with her in the house[b], because she hid the messengers whom we sent.
  footnotes:
