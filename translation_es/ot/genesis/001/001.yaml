    issue: «En el principio» es poco natural en español actual
    rationale: Aunque comprensible, suena más calco que español fluido. El proyecto pide evitar calcos de madera cuando la gramática española se vuelve poco natural. «Al principio» conserva bien el sentido temporal y la sintaxis dependiente.
  - severity: low
    issue: Pequeño ajuste de estilo en la nota al pie
    rationale: «Sin artículo definido» es más preciso que «sin artículo», y «la cláusula principal aparece» suena más natural que «llega» en contexto exegético.
