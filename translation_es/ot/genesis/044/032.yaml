revisions:
- from: 'Porque tu esclavo[a] salió fiador del muchacho ante mi padre, diciendo: “Si no lo llevo[b] a ti, entonces seré culpable ante mi padre todos los días”.'
  to: 'Porque tu siervo salió fiador por el muchacho ante mi padre, diciendo: «Si no te lo traigo, cargaré con la culpa[a] ante mi padre todos mis días».'
  rationale: Se ajusta «tu siervo» al registro deferente documentado por la POB inglesa; se mantiene «salió fiador» para conservar la fuerza de garante de עָרַב; se mejora la naturalidad con «te lo traigo»; se corrige el sentido de וְחָטָאתִי a una culpa asumida y se reubica allí la nota léxica; y se corrige «todos los días» a «todos mis días» para expresar duración vitalicia.
