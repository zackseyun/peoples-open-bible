    text: O «será un esclavo de esclavos»; la expresión hebrea intensifica la idea de servidumbre extrema.
    reason: lexical_alternative
  revision_rationale: 'Se reestructura la cláusula final para expresar de manera natural en español la relación marcada por לְאֶחָיו sin perder el sentido de subordinación: «será para sus hermanos un esclavo de esclavos». También se coloca «esclavo de esclavos» en el texto principal, conforme al hebreo y a la decisión léxica del proyecto, y se eliminan notas no esenciales.'
