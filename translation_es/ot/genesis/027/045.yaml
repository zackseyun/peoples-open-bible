translation:
  language: es
  text: hasta que la ira de tu hermano se aparte de ti[a], y olvide lo que le has hecho. Entonces yo enviaré y te traeré desde allí[b]. ¿Por qué he de quedar sin mis dos hijos en un solo día?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: ''hasta que la ira de tu hermano vuelva de ti''. El hebreo usa el verbo ''volver/retornar'' con ''ira'' de manera idiomática.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice simplemente 'te tomaré/traeré de allí'; no se añade aquí la idea de 'de vuelta' que no está expresada de forma explícita.
    reason: source_note
  - marker: c
    text: '''Quedar sin mis dos hijos en un solo día'' refleja la preocupación de Rebeca por perder a sus dos hijos en una misma jornada, sin precisar el mismo modo de pérdida.'
    reason: cultural_note
lexical_decisions:
- source_word: עַד שׁוּב
  english_pob_choice: until ... turns away
  chosen_spanish: hasta que ... se aparte
  alternatives_spanish:
  - hasta que ... vuelva
  - hasta que ... se vuelva
  lexicon: HALOT
  rationale: El hebreo usa עַד + infinitivo constructo de שוב con un valor temporal de límite. Con 'ira' como sujeto idiomático, en español natural funciona mejor 'se aparte' que un giro literal como 'vuelva'. Mantiene la idea de que la ira deja de dirigirse hacia Jacob.
- source_word: אַף
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  - cólera
  lexicon: HALOT
  rationale: אַף en este contexto denota enojo/ira. 'Ira' es un registro digno y claro en español bíblico contemporáneo, sin perder la fuerza afectiva del término.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano mayor
  - tu hermano
  lexicon: HALOT
  rationale: Término de parentesco directo con sufijo de segunda persona masculino singular. No requiere expansión; la referencia es transparente en el contexto.
- source_word: וְשָׁכַח אֵת אֲשֶׁר עָשִׂיתָ לוֹ
  english_pob_choice: and he forgets what you have done to him
  chosen_spanish: y olvide lo que le has hecho
  alternatives_spanish:
  - y olvide lo que hiciste con él
  - y olvide lo que le hiciste
  lexicon: HALOT
  rationale: El verbo שׁכח expresa olvidar, y el complemento relata la acción previa de Jacob contra Esaú. 'Le has hecho' conserva la referencia personal y la tensión moral sin añadir interpretaciones.
- source_word: וְשָׁלַחְתִּי
  english_pob_choice: Then I will send
  chosen_spanish: Entonces yo enviaré
  alternatives_spanish:
  - Y enviaré
  - Después enviaré
  lexicon: HALOT
  rationale: La waw consecutiva marca avance secuencial. 'Entonces' comunica bien la progresión narrativa y mantiene el valor de posterioridad.
- source_word: וּלְקַחְתִּיךָ
  english_pob_choice: bring you from there
  chosen_spanish: te traeré desde allí
  alternatives_spanish:
  - te tomaré de allí
  - te llevaré desde allí
  lexicon: HALOT
  rationale: Aunque לקח literalmente es 'tomar', en el contexto de retorno desde el lugar de refugio el español 'traeré desde allí' comunica la dirección del movimiento sin introducir 'de vuelta', que no está explícito en el hebreo. Se conserva la tensión entre 'tomar' y el sentido contextual de rescate/retorno.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - de ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple referido al lugar de refugio. 'Desde allí' mantiene la dirección de salida.
- source_word: לָמָה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué he de... ?
  alternatives_spanish:
  - ¿Por qué... ?
  - ¿Para qué... ?
  lexicon: HALOT
  rationale: 'Con el imperfecto siguiente, el español idiomático pide una pregunta retórica con valor de lamento: ''¿Por qué he de... ?''.'
- source_word: אֶשְׁכַּל
  english_pob_choice: I be bereaved
  chosen_spanish: quedar privada
  alternatives_spanish:
  - seré despojada
  - me quedaré sin
  lexicon: HALOT
  rationale: שכל en qal suele referirse a quedar sin hijos o ser privado de ellos. En voz femenina, 'quedar privada' expresa la idea de privación familiar con naturalidad en español, sin perder el trasfondo de duelo materno.
- source_word: גַּם שְׁנֵיכֶם
  english_pob_choice: both of you
  chosen_spanish: ambos de ustedes
  alternatives_spanish:
  - los dos
  - ustedes dos
  lexicon: HALOT
  rationale: La combinación enfatiza a los dos hijos. 'Ambos de ustedes' conserva la referencia dual en un registro claro, aunque menos idiomático que 'los dos'; la formulación femenina del hablante exige ajustar la posesión al hablante y no al receptor.
- source_word: יוֹם אֶחָד
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - el mismo día
  lexicon: HALOT
  rationale: '''En un solo día'' transmite la unidad temporal y la posible doble pérdida en una misma jornada.'
theological_decisions:
- issue: El alcance de 'te traeré desde allí' frente a una lectura explícita de retorno
  english_pob_reading: bring you from there
  chosen_spanish_reading: te traeré desde allí
  alternative_spanish_readings:
  - te traeré de vuelta desde allí
  - te devolveré desde allí
  rationale: El audit trail inglés corrigió cualquier añadido de 'back'. En español se evita introducir explícitamente una dirección de retorno no verbalizada; 'traeré desde allí' conserva el verbo de movimiento sin sobreinterpretación.
  doctrine_reference: fidelidad al texto fuente y control de adiciones interpretativas
- issue: La voz femenina de Rebeca en la pregunta final
  english_pob_reading: Why should I be bereaved of both of you in one day?
  chosen_spanish_reading: ¿Por qué he de quedar privada de ambos de ustedes en un solo día?
  alternative_spanish_readings:
  - ¿Por qué habría de perder a ambos en un solo día?
  - ¿Por qué he de ser despojada de ambos en un solo día?
  rationale: El hebreo usa primera persona singular femenina implícita en אֶשְׁכַּל. La redacción española debe hacer visible que habla Rebeca. 'Quedar privada' conserva el sentido de pérdida/duelo sin forzar una construcción demasiado moderna.
  doctrine_reference: coherencia gramatical del hablante y preservación del matiz de duelo
- issue: La metáfora de la ira como entidad que se aparta
  english_pob_reading: your brother’s anger turns away from you
  chosen_spanish_reading: la ira de tu hermano se aparte de ti
  alternative_spanish_readings:
  - la ira de tu hermano vuelva de ti
  - la ira de tu hermano se retire de ti
  rationale: No se debe suavizar la metáfora bíblica. 'Se aparte de ti' conserva el movimiento idiomático de la ira sin reemplazarlo por una explicación psicológica.
  doctrine_reference: respeto del lenguaje figurado del texto bíblico
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que eliminó 'back' después de 'bring you' por no estar explícito en el hebreo. La versión española evita añadir una equivalencia de retorno no requerida y mantiene la estructura secuencial del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la voz de Rebeca en primera persona femenina en la última cláusula.
  - No se traduce מִשָּׁם con un término más interpretativo que 'desde allí' para no exceder la evidencia contextual.
