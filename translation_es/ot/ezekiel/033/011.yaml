base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/011.yaml
  text: Say to them[a], ‘As I live,’ declares the Lord GOD, ‘I take no pleasure in the death of the wicked, but rather that the wicked turn from his way and live. Turn back, turn back from your evil ways! Why will you die[b], O house of Israel?’
  footnotes:
  - marker: a
    text: Or 'I do not delight in the death of the wicked.' The Hebrew verb can denote pleasure, delight, or desire.
    reason: lexical_alternative
  - marker: b
    text: The repeated command 'Turn back, turn back' is emphatic; the Hebrew verb is the same one used earlier for the wicked person 'turning' from his way.
    reason: lexical_alternative
