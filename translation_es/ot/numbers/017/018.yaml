translation:
  language: es
  text: Y escribirás el nombre de Aarón sobre la vara de Leví[a], porque habrá una sola vara para el jefe de la casa de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una sola vara por cada cabeza de la casa de sus padres». La expresión hebrea también puede entenderse de forma distributiva, indicando que cada jefe de casa paterna está representado por una sola vara.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכְתֹּב
  english_pob_choice: you shall write
  chosen_spanish: escribirás
  alternatives_spanish:
  - deberás escribir
  - escribirás tú
  lexicon: HALOT
  rationale: El hebreo usa una forma imperfecta en contexto exhortativo/instructivo. En español, el futuro simple transmite bien la instrucción directa sin perder la fuerza mandatoria.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre propio
  - nombre
  lexicon: HALOT
  rationale: La referencia es al nombre personal de Aarón que debe inscribirse; 'nombre' es la opción natural y precisa en español.
- source_word: מַטֵּה
  english_pob_choice: staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - bastón
  - cetro
  lexicon: HALOT
  rationale: En este contexto se trata de un objeto físico representativo de una tribu. 'Bastón' comunica bien el objeto concreto en español sin forzar un matiz regia como 'cetro'. 'Vara' es posible, pero 'bastón' resulta más claro y natural aquí.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la grafía española usual 'Leví'.
- source_word: בֵּית אֲבוֹתָם
  english_pob_choice: their fathers’ house
  chosen_spanish: la casa de sus padres
  alternatives_spanish:
  - la casa paterna
  - la casa de sus padres
  lexicon: HALOT
  rationale: La expresión hebrea designa la unidad familiar/clánica paterna. 'Casa de sus padres' preserva la estructura y evita una paráfrasis excesiva.
- source_word: לְ/רֹאשׁ
  english_pob_choice: for the head
  chosen_spanish: por cada cabeza
  alternatives_spanish:
  - para la cabeza
  - por cada jefe
  lexicon: HALOT
  rationale: Aquí 'cabeza' funciona como metonimia de jefe o representante. En español, 'por cada cabeza' conserva esa imagen y permite la lectura distributiva documentada en la nota inglesa.
theological_decisions:
- issue: Lectura distributiva de 'un solo bastón'
  english_pob_reading: Or 'one staff for each head of their fathers’ house.' The Hebrew phrase can be understood distributively, explaining that each paternal house head is represented by a single staff.
  chosen_spanish_reading: un solo bastón por cada cabeza de la casa de sus padres
  alternative_spanish_readings:
  - un solo bastón para cada jefe de la casa de sus padres
  - un bastón para cada cabeza de la casa de sus padres
  rationale: La sintaxis española conserva la posibilidad distributiva que la nota inglesa documenta, sin cerrar indebidamente la ambigüedad del hebreo. 'Cabeza' mantiene la metáfora semítica y deja visible el sentido de representante o jefe.
  doctrine_reference: Estructura tribal y representativa en el relato de Números 17; la nota conserva la ambigüedad textual sin cargarla doctrinalmente.
translation_notes:
  revision_awareness: El testimonio inglés POB muestra una única nota textual/lexical sin cambios de revisión aplicados; la presente versión mantiene esa ambigüedad distributiva y adapta el registro al español natural.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque aparezca aquí, sino como norma del proyecto para el tetragrámaton; este versículo no lo contiene.
  - '''Leví'' y ''Aarón'' se conservan como nombres propios estándar en español.'
  - '''bastón'' se eligió frente a ''vara'' para evitar un tono excesivamente arcaico y mantener claridad pública, aunque ambas son posibles en este contexto.'
