translation:
  language: es
  text: y perdona a tu pueblo, que ha pecado contra ti, y todas sus transgresiones[b] que han cometido contra ti; y concédeles compasión ante quienes los llevaron cautivos, para que tengan compasión de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y tendrán compasión de ellos». La cláusula final puede leerse como resultado además de propósito.'
    reason: alternative_reading
  - marker: b
    text: «Transgresiones» también puede traducirse «rebeliones», enfatizando la ruptura de pacto contra Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָלַחְתָּ
  english_pob_choice: and forgive
  chosen_spanish: y perdona
  alternatives_spanish:
  - y perdonarás
  - y absuelve
  lexicon: HALOT
  rationale: En el contexto de súplica de oración, la forma verbal hebrea funciona con fuerza de petición. «Perdona» comunica mejor esa función en español que un futuro literal, y conserva el sentido de סלח sin volverlo técnico.
- source_word: לְעַמְּךָ
  english_pob_choice: your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - por tu pueblo
  - para tu pueblo
  lexicon: HALOT
  rationale: El hebreo marca objeto indirecto con ל; en español, con «perdonar» el complemento natural es «a tu pueblo». Mantiene el valor relacional sin cargarlo de preposición innecesaria.
- source_word: חָטְאוּ לָךְ
  english_pob_choice: have sinned against you
  chosen_spanish: ha pecado contra ti
  alternatives_spanish:
  - han pecado contra ti
  - han pecado ante ti
  lexicon: HALOT
  rationale: 'La preposición ל con חטא se traduce idiomáticamente como «contra». En singular colectivo, «tu pueblo» puede tomar verbo singular en español: «ha pecado». Esto suena natural y no altera el referente colectivo.'
- source_word: פִּשְׁעֵיהֶם / פָּשְׁעוּ
  english_pob_choice: transgressions / committed against you
  chosen_spanish: rebeliones / han cometido
  alternatives_spanish:
  - transgresiones / han transgredido
  - ofensas / han cometido
  lexicon: HALOT
  rationale: Pֶשַׁע tiene peso de quebranto o rebelión de pacto. «Rebeliones» conserva esa fuerza mejor que un término más general. Para el verbo cognado, «han cometido» evita la dureza de repetir «rebelarse» y mantiene la relación léxica sin sonar forzado.
- source_word: וּנְתַתָּם לְרַחֲמִים
  english_pob_choice: and grant them compassion
  chosen_spanish: y dales compasión
  alternatives_spanish:
  - y concédeles compasión
  - y ponlos en compasión
  lexicon: HALOT
  rationale: La expresión hebrea comunica colocar a alguien en una स्थिति de favor compasivo. «Dales compasión» mantiene la acción divina y es más natural que una perífrasis explicativa. En español, «compasión» aquí funciona como el medio/estado concedido.
- source_word: לִפְנֵי שֹׁבֵיהֶם
  english_pob_choice: before those who took them captive
  chosen_spanish: delante de sus cautivadores
  alternatives_spanish:
  - en presencia de sus cautivadores
  - ante quienes los cautivaron
  lexicon: HALOT
  rationale: שֹׁבֵהֶם son los que los llevaron cautivos. «Cautivadores» es un equivalente breve y transparente en español bíblico moderno para captors/captive-takers. «Delante de» reproduce bien el valor espacial-relacional de לִפְנֵי.
- source_word: וְרִחֲמֽוּם
  english_pob_choice: so that they may have compassion on them
  chosen_spanish: para que ellos tengan compasión de ellos
  alternatives_spanish:
  - y tendrán compasión de ellos
  - de modo que tengan misericordia de ellos
  lexicon: HALOT
  rationale: El final puede leerse como resultado o propósito. «Para que» preserva esa abertura sin decidirla de forma rígida. «Compasión» mantiene el vínculo verbal con רחמים; «misericordia» es posible, pero aquí el paralelismo favorece conservar el mismo campo léxico.
theological_decisions:
- issue: Relación entre el perdón divino y la compasión humana de los cautivadores
  english_pob_reading: The verse presents a prayer that God would forgive Israel and move their captors to treat them compassionately.
  chosen_spanish_reading: La versícula pide que Yahvé perdone al pueblo y le conceda compasión delante de sus cautivadores, con el resultado o propósito de que estos lo traten con compasión.
  alternative_spanish_readings:
  - 'La última cláusula puede entenderse simplemente como resultado: «y ellos tendrán compasión de ellos».'
  rationale: El hebreo enlaza las peticiones sin resolver por completo si la última cláusula expresa propósito o resultado. La versión española conserva esa tensión con «para que», siguiendo el auditable equilibrio del POB inglés.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión cuando el hebreo permite más de una lectura sintáctica'
translation_notes:
  revision_awareness: 'Coincide con el pase de revisión más reciente: no se registraron cambios posteriores al texto inglés auditado, y el acuerdo externo fue alto. La redacción española sigue ese estado estable sin introducir revisiones no documentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de un equivalente mascador, conforme al estándar del proyecto.
  - Se conserva el campo léxico de רחם/רחמים con «compasión» para reproducir el paralelismo verbal.
  - «Cautivadores» se usa como solución breve y sobria para שֹׁבֵי־הֶם, sin recurrir a una paráfrasis más larga que altere el ritmo del versículo.
