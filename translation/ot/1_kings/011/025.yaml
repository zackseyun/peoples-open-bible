id: 1KI.11.25
reference: 1 Kings 11:25
source:
  edition: WLC
  text: וַ/יְהִ֨י שָׂטָ֤ן לְ/יִשְׂרָאֵל֙ כָּל יְמֵ֣י שְׁלֹמֹ֔ה וְ/אֶת הָ/רָעָ֖ה אֲשֶׁ֣ר הֲדָ֑ד וַ/יָּ֨קָץ֙ בְּ/יִשְׂרָאֵ֔ל וַ/יִּמְלֹ֖ךְ עַל אֲרָֽם־־־׃פ
translation:
  text: And he was an adversary to Israel all the days of Solomon[a], along with the harm that Hadad caused. And he loathed Israel and reigned over Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides the evil/trouble that Hadad did.' The Hebrew phrase is elliptical and may mean that this adversary arose in addition to the harm caused by Hadad.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂטָן
  chosen: adversary
  alternatives:
  - enemy
  - accuser
  lexicon: HALOT
  rationale: In this historical narrative context the noun denotes a human opponent, not the supernatural figure 'Satan.' 'Adversary' preserves the lexical sense without importing later theological associations.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - against Israel
  lexicon: HALOT
  rationale: The preposition ל with שָׂטָן idiomatically marks the party opposed. 'To Israel' is slightly more formal and reflects the Hebrew closely; in English the adversarial sense is carried by 'adversary.'
- source_word: כָּל יְמֵי שְׁלֹמֹה
  chosen: all the days of Solomon
  alternatives:
  - throughout Solomon's days
  - all Solomon's days
  lexicon: HALOT
  rationale: A standard temporal expression meaning the entirety of Solomon's lifetime/reign. The chosen rendering is transparent and close to the Hebrew form.
- source_word: וְאֶת הָרָעָה אֲשֶׁר הֲדָד
  chosen: along with the harm that Hadad caused
  alternatives:
  - besides the evil that Hadad did
  - together with the trouble from Hadad
  lexicon: HALOT
  rationale: 'The phrase is elliptical, appositional, and difficult. רָעָה here is best taken as calamity/harm rather than moral evil. ''Along with'' captures waw + את as an additive sense: Rezon was an adversary in addition to the trouble associated with Hadad.'
- source_word: רָעָה
  chosen: harm
  alternatives:
  - evil
  - trouble
  - calamity
  lexicon: HALOT
  rationale: In context the word refers to hostile trouble brought upon Israel, not abstract moral evil. 'Harm' is concise and natural.
- source_word: וַיָּקָץ
  chosen: he loathed
  alternatives:
  - he abhorred
  - he was hostile to
  lexicon: HALOT
  rationale: The verb קוץ in this stem conveys abhorrence or loathing. 'Loathed' preserves the strong personal hostility expressed by the Hebrew.
- source_word: בְּיִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - against Israel
  lexicon: HALOT
  rationale: With קוץ, the preposition ב marks the object of loathing. English idiom prefers a direct object after 'loathed,' so the preposition is not reproduced woodenly.
- source_word: וַיִּמְלֹךְ עַל אֲרָם
  chosen: reigned over Aram
  alternatives:
  - became king over Aram
  - ruled over Syria
  lexicon: HALOT
  rationale: Aram is the proper name and should be transliterated rather than replaced with the later geographical label 'Syria.' 'Reigned over' fits the narrative sequence and the verb מלך.
