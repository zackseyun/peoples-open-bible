translation:
  language: es
  text: porque David había hecho lo recto a los ojos de Yahvé y no se había apartado de nada de lo que él le había mandado todos los días de su vida, excepto en el asunto de Urías el hitita[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «en el caso de Urías el hitita».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: En este contexto introduce la causa de la afirmación anterior; en español, «porque» expresa con naturalidad la relación causal sin forzar una paráfrasis.
- source_word: עָשָׂה ... אֶת הַיָּשָׁר
  english_pob_choice: had done what was right
  chosen_spanish: había hecho lo recto
  alternatives_spanish:
  - había hecho lo correcto
  - había hecho lo justo
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de evaluación moral. «Lo recto» conserva la valoración ética y la conexión con el lenguaje bíblico sin sonar artificial en español.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la imagen evaluativa de los ojos como esfera de juicio o valoración. «Ante los ojos de» refleja mejor el giro idiomático y conserva la metáfora.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, sin sustituirlo por una mayúscula funcional ni por una tradición denominacional distinta.
- source_word: וְלֹא סָר
  english_pob_choice: and had not turned aside
  chosen_spanish: y no se había apartado
  alternatives_spanish:
  - y no había desviado
  - y no se había desviado
  lexicon: HALOT
  rationale: «Apartarse» comunica bien la idea de desviación del camino de obediencia. Se conserva el sentido de continuidad en el tiempo con el pluscuamperfecto.
- source_word: מִכֹּל אֲשֶׁר צִוָּהוּ
  english_pob_choice: from anything that he had commanded him
  chosen_spanish: de nada de lo que él le había mandado
  alternatives_spanish:
  - de todo lo que él le había mandado
  - de ninguna de las cosas que él le había mandado
  lexicon: HALOT
  rationale: El hebreo niega cualquier desviación respecto de lo mandado. En español, «de nada de lo que él le había mandado» preserva la totalidad negativa con naturalidad.
- source_word: כֹּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - a lo largo de toda su vida
  lexicon: HALOT
  rationale: Es una fórmula temporal hebrea convencional. La traducción mantiene su forma y alcance sin explicarla en exceso.
- source_word: רַק
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - solo que
  lexicon: HALOT
  rationale: Introduce la excepción única al elogio previo. «Excepto» es claro y directo en español.
- source_word: בִּדְבַר אוּרִיָּה
  english_pob_choice: in the matter of Uriah
  chosen_spanish: en el asunto de Urías
  alternatives_spanish:
  - en el caso de Urías
  - respecto de Urías
  lexicon: HALOT
  rationale: דבר aquí significa asunto/caso. «Asunto» mantiene el valor idiomático y evita estrechar el sentido más de lo que el hebreo permite.
- source_word: אוּרִיָּה הַחִתִּי
  english_pob_choice: Uriah the Hittite
  chosen_spanish: Urías el hitita
  alternatives_spanish:
  - Uría el hitita
  - Urías, el hitita
  lexicon: HALOT
  rationale: Se usa la forma castellanizada «Urías» y el etnónimo «hitita» de manera directa y reconocible.
theological_decisions:
- issue: Alcance de la valoración positiva de David frente a la excepción explícita
  english_pob_reading: Retain the text's broad commendation with its explicit exception, without softening or expanding it.
  chosen_spanish_reading: Mantener la alabanza amplia sobre David junto con la excepción explícita, sin suavizarla ni ampliarla.
  alternative_spanish_readings:
  - Explicar que David fue fiel en general
  - Añadir una nota interpretativa sobre arrepentimiento o fidelidad de pacto
  rationale: El versículo formula una evaluación positiva real, pero no absoluta, y luego añade una excepción concreta. La traducción debe conservar esa tensión sin resolverla interpretativamente dentro del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés al conservar el pluscuamperfecto («había hecho», «se había apartado», «le había mandado») y la formulación de la excepción con «excepto», manteniendo la precisión temporal y el contraste entre la alabanza general y la salvedad explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el texto principal conforme al criterio del proyecto.
  - Se conserva la imagen idiomática de valoración con «ante los ojos de».
  - «Urías» y «hitita» siguen la castellanización estándar coherente con el nombre propio y el etnónimo.
  - La formulación negativa «de nada de lo que él le había mandado» preserva el alcance total del hebreo sin volverlo interpretativo.
