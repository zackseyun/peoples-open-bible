lexical_decisions:
- source_word: טוֹבִים
  english_pob_choice: better
  chosen_spanish: Mejores
  alternatives_spanish:
  - Buenos
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo en construcción comparativa con מִן; en español, la comparación natural es «mejores» y no «buenos».
- source_word: הַשְּׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - los dos
  lexicon: HALOT
  rationale: El numeral con artículo tiene valor proverbial/generico; en español, «dos» suena más natural y mantiene la forma sentenciosa.
- source_word: מִן הָאֶחָד
  english_pob_choice: than one
  chosen_spanish: que uno
  alternatives_spanish:
  - que el uno
  - que una sola persona
  lexicon: HALOT
  rationale: La comparación expresa la superioridad de la pluralidad sobre la singularidad; «que uno» conserva el sentido sin volverlo pesado.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior; «porque» expresa de modo claro la fuerza causal.
- source_word: יֵשׁ לָהֶם
  english_pob_choice: they have
  chosen_spanish: tienen
  alternatives_spanish:
  - hay para ellos
  - les pertenece
  lexicon: HALOT
  rationale: 'La construcción existencial con ל se vierte idiomáticamente en español como posesión: «tienen».'
- source_word: שָׂכָר
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - pago
  - beneficio
  - retorno
  lexicon: HALOT
  rationale: En el contexto sapiencial, שָׂכָר denota compensación o resultado favorable; «recompensa» conserva ese valor general sin reducirlo a salario.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - buen
  - beneficiosa
  lexicon: HALOT
  rationale: Califica directamente a «recompensa»; en español concuerda en género con el sustantivo y mantiene el sentido cualitativo.
- source_word: בַּעֲמָלָם
  english_pob_choice: for their labor
  chosen_spanish: por su labor
  alternatives_spanish:
  - por su trabajo
  - en su toil
  - de su labor
  lexicon: HALOT
  rationale: עָמָל en Eclesiastés suele referirse a labor/toil; el preposición ב puede señalar la esfera o motivo de la compensación. «Por su labor» es natural en español y conserva la relación entre esfuerzo y recompensa.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: el valor proverbial de la comparación, la causalidad de אֲשֶׁר y la flexibilidad de שָׂכָר/בַּעֲמָלָם se mantienen sin cambios sustanciales.'
  spanish_consistency_notes:
