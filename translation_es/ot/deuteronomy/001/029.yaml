translation:
  language: es
  text: 'Entonces les dije: «No les tengan terror[a] ni les teman»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No les tengan miedo». El primer verbo es más fuerte que el segundo y expresa pavor o temor intenso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces yo les dije
  alternatives_spanish:
  - Y yo les dije
  - Entonces dije
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia y «les dije» comunica de modo natural la primera persona singular en discurso directo.
- source_word: אֲלֵכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se expresa de forma natural en español con complemento indirecto plural. «Les» evita una marca regional y mantiene el plural implícito del original.
- source_word: לֹא תַעַרְצוּן
  english_pob_choice: Do not dread them
  chosen_spanish: No [a] les tengan miedo
  alternatives_spanish:
  - No los aterren
  - No se espanten de ellos
  - No les teman
  lexicon: HALOT
  rationale: El verbo ערץ indica temor intenso, más fuerte que el verbo siguiente. En español, «tener miedo» expresa bien el campo semántico general; la nota distingue que el primer verbo es más fuerte y puede entenderse como «dread/temor intenso».
- source_word: וְלֹא תִירְאוּן
  english_pob_choice: or fear them
  chosen_spanish: ni los [b] teman
  alternatives_spanish:
  - ni les teman
  - ni tengan temor de ellos
  lexicon: HALOT
  rationale: ירא es el verbo común «temer». «Teman» preserva la oposición con el verbo anterior y la negación coordinada con «ni» refleja bien la estructura hebrea.
- source_word: מֵהֶם
  english_pob_choice: of them
  chosen_spanish: los
  alternatives_spanish:
  - de ellos
  - por ellos
  lexicon: HALOT
  rationale: Aunque el hebreo usa מן con verbos de temor, en español la relación se expresa de manera más natural con objeto directo en la construcción verbal escogida. La idea resultante sigue siendo el objeto temido.
theological_decisions:
- issue: Diferencia de intensidad entre los dos verbos de temor
  english_pob_reading: The first verb is stronger than the second, expressing terror or dread.
  chosen_spanish_reading: El primer verbo se refleja con una expresión más intensa que la segunda, y la nota lo explicita.
  alternative_spanish_readings:
  - No les aterroricen ni los teman
  - No les tengan pánico ni los teman
  rationale: El hebreo distingue entre un temor intenso y el temor común. La traducción principal mantiene esa distinción sin sobrecargar el texto; la nota conserva la tensión léxica que el audit trail documenta.
  doctrine_reference: Lexical distinction in Hebrew, not a doctrinal issue
- issue: Construcción de temor con preposición מן
  english_pob_reading: of them
  chosen_spanish_reading: objeto temido expresado con verbo transitivo en español
  alternative_spanish_readings:
  - temer de ellos
  - tener miedo de ellos
  rationale: El español común no exige reproducir mecánicamente la preposición hebrea. La estructura elegida evita un calco poco natural y mantiene el sentido de miedo dirigido hacia ellos.
  doctrine_reference: Spanish idiom vs. Hebrew syntax
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de una formulación redundante («be terrified of them, and do not fear them») a una que distingue mejor los dos verbos hebreos («dread them or fear them»). La propuesta española sigue esa misma decisión, evitando la redundancia y manteniendo la diferencia de intensidad.
  spanish_consistency_notes:
  - Se usa «Entonces» para el valor secuencial de וָאֹמַר.
  - Se conserva el paralelismo negativo con «no... ni...» para reflejar la coordinación hebrea.
  - «Temer» se usa para ירא, mientras que el primer verbo recibe una formulación más intensa en la nota.
  - Se evita «SEÑOR» u otra terminología ajena al versículo; no hay referencia al nombre divino en este texto.
