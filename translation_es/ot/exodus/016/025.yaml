translation:
  language: es
  text: 'Y Moisés dijo[a]: «Cómanlo hoy, porque hoy es un sábado para Yahvé; hoy no lo encontrarán en el campo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «a Yahvé». La preposición hebrea puede expresar dedicación o pertenencia: «hoy es un sábado para/a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la acción siguiente; «Y ... dijo» conserva la secuencia narrativa sin añadir matiz causal o consecutivo excesivo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mose
  - Moyses
  lexicon: Uso bíblico estándar en español
  rationale: Nombre propio bíblico en forma plenamente reconocible y estable en español.
- source_word: אִכְלֻהוּ
  english_pob_choice: Eat it
  chosen_spanish: Comanlo
  alternatives_spanish:
  - Cómanlo
  - Coman eso
  lexicon: HALOT
  rationale: 'El imperativo plural con sufijo objeto exige un mandato directo en plural. «Comanlo» preserva el objeto pronominal y el sentido imperativo; se omite la tilde en la ortografía correcta: «cómanlo» si se marca acento gráfico, pero aquí se opta por la forma ortográficamente correcta con tilde implícita en la pronunciación, normalizada en el flujo textual.'
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y mantiene la repetición enfática del original.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - for
  lexicon: HALOT
  rationale: En este contexto introduce la razón del mandato. En español, «porque» expresa con claridad la fuerza causal; se mantiene la relación lógica sin forzar un calco del inglés.
- source_word: שַׁבָּת
  english_pob_choice: a Sabbath
  chosen_spanish: un sábado
  alternatives_spanish:
  - un día de reposo
  - un descanso sabático
  lexicon: HALOT
  rationale: En español, «sábado» reproduce el sustantivo del día señalado; en este contexto predicativo funciona naturalmente como «un sábado»/«sábado» en sentido de día santo de reposo. Se evita «día de reposo» porque añade una paráfrasis más explicativa que el sustantivo hebreo solo no exige.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  - para el Señor
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se preserva el nombre divino con la forma doctrinal estándar del proyecto, «Yahvé». La preposición ל admite dedicación o pertenencia; «para» expresa bien la orientación/dedicación del sábado a Yahvé.
- source_word: לֹא תִמְצָאֻהוּ
  english_pob_choice: you will not find it
  chosen_spanish: no lo encontrarán
  alternatives_spanish:
  - no lo hallarán
  - no lo encontrarán allí
  lexicon: HALOT
  rationale: El imperfecto negativo en contexto expresa una expectativa futura; «no lo encontrarán» es idiomático y conserva la previsión de ausencia del maná.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la campiña
  lexicon: HALOT
  rationale: «Campo» es la equivalencia natural y amplia en español para שָׂדֶה en este contexto, sin restringir indebidamente la referencia.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente; conforme a la terminología del proyecto, se conserva el nombre divino como «Yahvé» en lugar de ocultarlo como título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לַיהוָה en la frase 'שַׁבָּת הַיּוֹם לַיהוָה'
  english_pob_reading: a Sabbath to Yahweh
  chosen_spanish_reading: un sábado para Yahvé
  alternative_spanish_readings:
  - un sábado de Yahvé
  - un sábado dedicado a Yahvé
  rationale: La preposición ל puede indicar dedicación, pertenencia o dirección. «Para Yahvé» comunica de forma clara la consagración del día sin eliminar la posible relación de pertenencia/dedicación presente en el hebreo.
  doctrine_reference: HALOT / sintaxis hebrea de ל de relación y dedicación
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. El versículo se mantiene con el sentido ya confirmado por la auditoría inglesa, sin añadir marcadores de nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva el tono narrativo breve y directo del hebreo.
  - Se evita 'SEÑOR' para no ocultar el nombre divino.
  - Se mantiene la repetición de 'hoy' en tres posiciones para reflejar el énfasis del original.
