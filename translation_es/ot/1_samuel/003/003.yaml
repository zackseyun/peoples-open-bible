translation:
  language: es
  text: Y la lámpara de Dios todavía no se había apagado, y Samuel estaba acostado en el templo[a] de Yahvé, donde estaba el arca de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el santuario de Yahvé’. El hebreo heikhal puede referirse a un templo o santuario; aquí denota el lugar de morada de Yahvé en Siló.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵר אֱלֹהִים
  english_pob_choice: the lamp of God
  chosen_spanish: la lámpara de Dios
  alternatives_spanish:
  - la lámpara de Dios
  - la lámpara divina
  lexicon: HALOT
  rationale: נֵר designa una lámpara concreta, no una luz en sentido general. Mantener el genitivo 'de Dios' conserva la forma del hebreo y el matiz cultual del texto, asociado al santuario.
- source_word: טֶרֶם יִכְבֶּה
  english_pob_choice: had not yet gone out
  chosen_spanish: todavía no se había apagado
  alternatives_spanish:
  - no se había apagado aún
  - todavía no se había extinguido
  lexicon: HALOT
  rationale: טֶרֶם marca una acción que aún no se completa. En español, con una lámpara, 'apagarse' comunica de forma natural el sentido del verbo כבה sin perder la temporalidad anterior al amanecer o al apagado.
- source_word: שֹׁכֵב
  english_pob_choice: was lying down
  chosen_spanish: estaba acostado
  alternatives_spanish:
  - estaba echado
  - yacía
  lexicon: HALOT
  rationale: El participio describe la postura de Samuel. 'Estaba acostado' es natural y fiel en español; 'yacía' es más literal pero suena más literario/arcaico, y 'estaba durmiendo' iría más allá del valor léxico.
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: el templo de Yahvé
  alternatives_spanish:
  - el santuario de Yahvé
  - el palacio de Yahvé
  lexicon: HALOT
  rationale: הֵיכָל puede significar templo, santuario o palacio. Aquí el contexto cultual y la presencia del arca favorecen 'templo' como equivalente claro y digno. Se conserva 'Yahvé' según la convención española del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino, siguiendo la política del proyecto en español y evitando la sustitución por un título.
- source_word: אֲשֶׁר שָׁם אֲרוֹן אֱלֹהִים
  english_pob_choice: where the ark of God was
  chosen_spanish: donde estaba el arca de Dios
  alternatives_spanish:
  - donde se hallaba el arca de Dios
  - en donde estaba el arca de Dios
  lexicon: HALOT
  rationale: El relativo localiza el lugar por la presencia del arca. 'Donde estaba' reproduce la función locativa de שָׁם con español natural, y 'arca de Dios' conserva la construcción hebrea.
theological_decisions:
- issue: Render הֵיכַל יְהוָה in the pre-monarchic sanctuary context
  english_pob_reading: the temple of Yahweh
  chosen_spanish_reading: el templo de Yahvé
  alternative_spanish_readings:
  - el santuario de Yahvé
  rationale: Aunque el escenario es el santuario de Siló antes del templo de Salomón, הֵיכָל admite 'templo' léxicamente. La forma se conserva por fidelidad al término hebreo y porque el español moderno la entiende con naturalidad. Se deja implícita la localización histórica sin introducir explicación en el texto.
  doctrine_reference: Translation philosophy §§1, 6; Contested terms table for יְהוָה
translation_notes:
  revision_awareness: 'Coincide con la última revisión indicada: no se requerían cambios sustantivos. La redacción española sigue de cerca el análisis léxico del inglés auditado y la lectura del hebreo, manteniendo la equivalencia óptima sin forzar calcos innecesarios.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה.
  - Se conserva 'arca de Dios' para reflejar la construcción hebrea.
  - '''Templo'' se emplea como equivalente léxico de הֵיכַל, con nota alternativa para ''santuario''.'
  - '''Acostado'' mantiene la postura de Samuel sin inferir sueño explícito.'
