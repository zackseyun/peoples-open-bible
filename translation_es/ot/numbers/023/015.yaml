translation:
  language: es
  text: 'Y le dijo a Balac[a]: «Ponte aquí, junto a tu holocausto, y yo me encontraré con él allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me encontraré allí» o «tendré un encuentro allí». El hebreo es conciso y puede traducirse de varias maneras estrechamente relacionadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֶל־בָּלָק
  english_pob_choice: And he said to Balak
  chosen_spanish: Y le dijo a Balac
  alternatives_spanish:
  - Entonces le dijo a Balac
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce discurso directo; en español, «Y le dijo» conserva el flujo narrativo sin forzar una interpretación adicional de secuencia. Se mantiene el nombre propio Balac.
- source_word: הִתְיַצֵּב
  english_pob_choice: Stand
  chosen_spanish: Ponte
  alternatives_spanish:
  - Ponte de pie
  - Toma tu puesto
  - Establécete
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse o mantenerse en posición. En este contexto, «Ponte aquí» comunica de manera natural la idea de permanecer en un lugar concreto, sin perder la fuerza imperativa.
- source_word: כֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - a este lado
  lexicon: HALOT
  rationale: Aquí funciona de forma deíctica y espacial, no como «así». «Aquí» conserva el contraste con el posterior «allí» y suena natural en español.
- source_word: עַל עֹלָתֶךָ
  english_pob_choice: beside your burnt offering
  chosen_spanish: junto a tu holocausto
  alternatives_spanish:
  - al lado de tu holocausto
  - junto a tu ofrenda quemada
  - al lado de tu ofrenda quemada
  lexicon: HALOT
  rationale: עַל puede indicar ubicación junto a algo, no solo sobre ello. «Junto a» expresa bien la relación locativa. Para עֹלָה se usa «holocausto», término bíblico y culto, aunque se anota la alternativa más descriptiva si se necesita.
- source_word: וְאָנֹכִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - pero yo
  - y yo, por mi parte
  lexicon: HALOT
  rationale: Se conserva la coordinación simple y el énfasis del pronombre explícito. «Y yo» es natural y mantiene el contraste implícito con la postura de Balac.
- source_word: אִקָּרֶה
  english_pob_choice: will meet him
  chosen_spanish: me encontraré
  alternatives_spanish:
  - me presentaré
  - me encontraré con él
  - lo encontraré
  lexicon: HALOT
  rationale: El verbo es conciso y puede abarcar encuentro o cita. «Me encontraré» preserva la ambigüedad del hebreo y evita añadir un objeto explícito que el versículo no nombra. En el contexto narrativo, el encuentro está determinado por el relato, pero el español no necesita explicitarlo aquí.
- source_word: כֹּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: El segundo כֹּה marca contraste espacial con el primero. «Allí» mantiene la deíxis y la oposición aquí/allí de manera clara en español.
theological_decisions:
- issue: Objeto implícito del encuentro de Balaam
  english_pob_reading: I will meet him there
  chosen_spanish_reading: y yo me encontraré allí
  alternative_spanish_readings:
  - y yo me encontraré con él allí
  - y yo lo encontraré allí
  - y yo me encontraré con él
  rationale: El hebreo no expresa un objeto directo en este versículo. La versión española conserva esa reserva y no especifica a quién se refiere el encuentro. Esto respeta la tensión textual y evita sobreinterpretar el pasaje, aunque el contexto narrativo sugiera un encuentro con Yahvé.
  doctrine_reference: Principios de fidelidad al texto fuente y preservación de ambigüedades reales en la narración.
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del audit trail inglés, que simplificó «I will go to meet him over there» a «I will meet him there» para sonar más directo. En español, se mantuvo esa misma simplificación y se conservó el contraste espacial aquí/allí.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general cuando el nombre divino aparece explícito; en este versículo no aparece y no se introdujo artificialmente.
  - «Holocausto» se empleó como equivalente bíblico estándar de עֹלָה en un contexto sacrificial.
  - Se preservó la ambigüedad del objeto del encuentro, con nota de alternativa para lectores que prefieran explicitarla.
