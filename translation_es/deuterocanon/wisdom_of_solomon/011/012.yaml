translation:
  language: es
  text: Porque se apoderaron de ellos una doble pena y gemido por el recuerdo de lo que había pasado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gemido al recordar las cosas que habían pasado». La frase griega es condensada y admite una formulación más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διπλῆ
  english_pob_choice: double
  chosen_spanish: doble
  alternatives_spanish:
  - dos veces
  - bifurcado
  - doblemente
  lexicon: LSJ
  rationale: El adjetivo intensifica y duplica la experiencia; «doble» conserva la fuerza e imagen de duplicación sin sonar artificial en español.
- source_word: ἔλαβε
  english_pob_choice: seized
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - tomó
  - vino sobre
  - agarró
  lexicon: LSJ
  rationale: En este contexto, el verbo expresa que la aflicción irrumpe y domina a los sujetos; «se apoderó de» reproduce mejor esa idea que un simple «tomó».
- source_word: λύπη
  english_pob_choice: grief
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - tristeza
  - aflicción
  lexicon: LSJ
  rationale: Aunque «grief» en inglés puede ser «dolor», «pena» o «aflicción», aquí «dolor» comunica una carga intensa y se combina bien con «gemido».
- source_word: στεναγμός
  english_pob_choice: groaning
  chosen_spanish: gemido
  alternatives_spanish:
  - lamento
  - suspiro
  - gemir
  lexicon: LSJ
  rationale: El sustantivo alude a una vocalización audible de aflicción; «gemido» mantiene esa sonoridad y la intensidad del contexto.
- source_word: μνημῶν
  english_pob_choice: at the memory
  chosen_spanish: por el recuerdo
  alternatives_spanish:
  - al recordar
  - en memoria de
  - al rememorar
  lexicon: LSJ
  rationale: La construcción griega es comprimida y vinculada causalmente al gemido; «por el recuerdo» conserva la relación de motivo/ocasión sin volverla demasiado literal o oscura.
- source_word: τῶν παρελθουσῶν
  english_pob_choice: of what had happened
  chosen_spanish: de lo que había pasado
  alternatives_spanish:
  - de las cosas pasadas
  - de los acontecimientos pasados
  - de lo sucedido
  lexicon: LSJ
  rationale: El participio significa literalmente «las cosas que habían pasado»; «lo que había pasado» es natural en español y mantiene el referente a hechos previos.
translation_notes:
  revision_awareness: La traducción española sigue el ajuste del texto inglés revisado, que une «double grief» y «groaning» bajo un solo verbo de irrupción. Se mantuvo esa estructura para reflejar que ambos elementos alcanzaron a los sujetos de forma conjunta.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo exige; este versículo no contiene el Tetragrámaton.
  - «dolor» y «gemido» conservan un registro sobrio y bíblico sin recurrir a formulaciones eclesiásticas más tradicionales que no son requeridas por el griego.
  - Se evitó «pena» para no debilitar la intensidad del paralelo con «gemido».
