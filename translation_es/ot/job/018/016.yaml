translation:
  language: es
  text: Sus raíces se secan abajo,[a] y arriba su rama se marchita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su brote es cortado’ o ‘su rama es cortada’. El sustantivo hebreo puede evocar lo que se corta o se siega; en este contexto se refiere al crecimiento superior de la planta.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתַּחַת
  english_pob_choice: beneath
  chosen_spanish: por debajo
  alternatives_spanish:
  - debajo
  - desde debajo
  lexicon: HALOT
  rationale: La preposición expresa la relación espacial de ‘desde debajo / por debajo’. En español, ‘por debajo’ suena natural y mantiene el paralelismo con ‘por encima’ en el segundo hemistiquio.
- source_word: שָׁרָשָׁיו
  english_pob_choice: his roots
  chosen_spanish: Sus raíces
  alternatives_spanish:
  - sus raíces
  - su raíz
  lexicon: HALOT
  rationale: El plural hebreo con sufijo de 3ms conserva la imagen vegetal en plural. ‘Sus raíces’ evita singularizar indebidamente y refleja mejor el sujeto arbóreo implícito.
- source_word: יִבָשׁוּ
  english_pob_choice: dry up
  chosen_spanish: se secan
  alternatives_spanish:
  - se resecan
  - se secan
  lexicon: HALOT
  rationale: El verbo expresa volverse seco, no solo ‘marchitarse’. ‘Se secan’ es la opción más natural y directa en español, y mantiene la imagen de pérdida de vida en las raíces.
- source_word: וּמִמַּעַל
  english_pob_choice: and above
  chosen_spanish: y por encima
  alternatives_spanish:
  - y arriba
  - desde arriba
  lexicon: HALOT
  rationale: La coordinación del contraste espacial se conserva con ‘y por encima’, que reproduce con claridad el contrapunto con ‘por debajo’.
- source_word: יִמַּל
  english_pob_choice: withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se corta
  - se poda
  - se desgaja
  lexicon: HALOT
  rationale: La revisión inglesa prefirió ‘withers’ para conservar la imaginería vegetal y evitar una lectura demasiado técnica de ‘cortar’. En español, ‘se marchita’ comunica bien el deterioro del crecimiento superior sin cerrar la ambigüedad del verbo hebreo.
- source_word: קְצִירוֹ
  english_pob_choice: his branch
  chosen_spanish: su brote
  alternatives_spanish:
  - su rama
  - su retoño
  - su brote
  lexicon: HALOT
  rationale: Aunque קציר suele significar ‘cosecha’, aquí el contexto arbóreo favorece el sentido de crecimiento superior de la planta. ‘Brote’ preserva la imagen de la parte joven y alta del vegetal, y deja abierta la alternativa léxica documentada en la nota inglesa.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de ‘is cut off’ a ‘withers’ para ajustar mejor el verbo fuente y mantener la imaginería vegetal. La traducción española sigue esa revisión con ‘se marchita’, pero conserva la fuerza espacial del contraste ‘por debajo / por encima’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se eligió un registro poético claro, evitando tanto un calco rígido como una paráfrasis explicativa.
  - La nota mantiene la alternativa semántica del hebreo para no perder la tensión entre ‘cortar’ y la imagen vegetal superior.
