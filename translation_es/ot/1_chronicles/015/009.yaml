translation:
  language: es
  text: 'De los hijos de Hebrón: Eliel el jefe[a], y ochenta de sus hermanos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'parientes' para 'hermanos'; el hebreo dice literalmente 'sus hermanos', probablemente refiriéndose a los varones del grupo de clan representado por Eliel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: Para los hijos de
  alternatives_spanish:
  - De los hijos de
  - Para los descendientes de
  lexicon: HALOT
  rationale: El prefijo ל aquí introduce el grupo/clan dentro de una lista, y en español 'Para los hijos de' conserva la relación de pertenencia o adscripción sin volverlo pesado. 'Hijos' mantiene la imagen de parentesco del hebreo mejor que 'descendientes', aunque esta última también sería posible en contexto genealógico.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español, 'Hebrón' es la forma natural y reconocible, manteniendo la equivalencia onomástica sin traducir el nombre.
- source_word: אֱלִיאֵל
  english_pob_choice: Eliel
  chosen_spanish: Eliel
  alternatives_spanish:
  - Eliél
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva 'Eliel' por ser la forma establecida y legible en español bíblico.
- source_word: הַשַּׂר
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el líder
  - el príncipe
  - el capitán
  lexicon: HALOT
  rationale: שַׂר designa a un dirigente u oficial. En este contexto de lista clanica, 'jefe' comunica bien la función administrativa sin dar un matiz monárquico ('príncipe') ni militar demasiado específico ('capitán').
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  - y sus hermanos de sangre
  lexicon: HALOT
  rationale: La lectura literal es 'sus hermanos'. Aunque el contexto puede sugerir miembros varones del clan o parientes, mantener 'hermanos' preserva el valor léxico hebreo y la tensión semántica documentada por la POB inglesa.
- source_word: שְׁמוֹנִים
  english_pob_choice: eighty
  chosen_spanish: ochenta
  alternatives_spanish:
  - '80'
  lexicon: HALOT
  rationale: Número cardinal exacto de los asociados con Eliel; se expresa con palabras por estilo bíblico en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y el pasaje muestra alta concordancia con el texto fuente; la propuesta sigue de cerca el hebreo y mantiene la misma tensión léxica que la auditoría inglesa documenta para אֶחָיו.
  spanish_consistency_notes:
  - Se conserva el patrón breve de lista genealógica/administrativa.
  - '''Hebrón'' y ''Eliel'' siguen la transliteración estándar en español.'
  - Se mantiene 'hermanos' con nota alternativa para no perder la literalidad del hebreo.
  - '''Jefe'' evita sobreinterpretar el cargo como militar o real.'
