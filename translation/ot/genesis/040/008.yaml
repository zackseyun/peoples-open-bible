  chosen_reading: God
  alternative_readings:
  - a god/gods
  rationale: In the Joseph narrative, the reference is to the true God whom Joseph acknowledges as the source of interpretive ability. The context is not generic polytheistic speculation but Joseph's theological claim about divine sovereignty over dream interpretation.
