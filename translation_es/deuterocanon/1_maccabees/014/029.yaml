revisions:
- from: Puesto que muchas veces habían surgido guerras en la tierra, Simón, hijo de Matatías, uno de los hijos de Jojarib, y sus hermanos se expusieron al peligro y se opusieron a los adversarios de su nación, para que sus santidades[a] y la ley permanecieran[b], y glorificaron a su nación con gran gloria[c].
  to: Puesto que muchas veces habían surgido guerras en la tierra, Simón, hijo de Matatías, uno de los hijos de Jojarib, y sus hermanos se expusieron al peligro y se opusieron a los adversarios de su nación, para que su santuario[a] y la ley permanecieran, y glorificaron a su nación con gran gloria[b].
  rationale: Se corrige «sus santidades» a «su santuario» para reflejar fielmente la resolución contextual documentada para τὰ ἅγια αὐτῶν y producir un español natural y eclesialmente legible. Se mantienen en nota las alternativas derivadas del plural griego. Se simplifican las notas a las variantes significativas preservadas por la auditoría inglesa.
