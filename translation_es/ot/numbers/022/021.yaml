review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa hebrea: Balaam se levantó, preparó su asna y fue con los príncipes de Moab. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece en ''por la mañana'', pero la nota explica la especificidad léxica de אֲתֹנוֹ (''su asna'' / hembra del asno). Además, ''se fue'' introduce un matiz de partida más marcado que el simple וַיֵּלֶךְ; ''fue'' o ''marchó'' serían más neutros y fieles.'
  spanish_quality_summary: El texto es legible y digno. 'Enalbardó' es preciso, pero menos transparente para un lector eclesial amplio; 'ensilló' sería más natural, aunque 'enalbardó' sigue siendo defendible. El problema principal de calidad es la ubicación errónea de la nota. También conviene pulir la nota, porque 'su burra hembra' es redundante y poco idiomático.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. 'Balaam', 'Moab' y 'príncipes' concuerdan con el rastro inglés. Para אֲתֹנוֹ, el español puede conservar mejor que el inglés el sexo del animal con 'asna' o 'burra'; dado el registro del proyecto, 'asna' encaja mejor que 'burra'.
  issues:
  - severity: high
    issue: La nota al pie está anclada en la frase equivocada.
    rationale: El marcador [a] aparece después de 'por la mañana', pero la nota trata sobre 'su asna' como hembra del asno. Esto rompe la correspondencia exigida entre texto y nota.
  - severity: medium
    issue: La formulación de la nota al pie es poco idiomática.
    rationale: '''Su burra hembra'' suena redundante y antinatural en español. La alternativa adecuada es ''su asna'' o ''su burrita'' según registro; aquí ''su asna'' es más claro y digno.'
  - severity: medium
    issue: '''Se fue'' añade un matiz no exigido por el hebreo.'
    rationale: וַיֵּלֶךְ es simplemente 'fue' / 'anduvo' / 'marchó' en secuencia narrativa. 'Se fue' puede sugerir salida o alejamiento de modo algo más interpretativo.
  - severity: low
    issue: '''Burra'' es natural, pero menos digno que ''asna'' en este registro.'
    rationale: Para una Biblia de estilo moderno pero digno y ampliamente eclesial, 'asna' comunica bien el sexo del animal con un registro más estable y menos coloquial.
  revised_spanish_text: Así que Balaam se levantó por la mañana, enalbardó su asna[a] y fue con los príncipes de Moab.
  revised_footnotes:
  - marker: a
    text: O 'su burra'. El hebreo nombra específicamente una asna, es decir, una hembra del asno.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre el sustantivo relevante, se mejora la idiomaticidad de la nota, se ajusta 'se fue' a 'fue' para reflejar mejor el verbo hebreo simple, y se prefiere 'asna' por registro y claridad léxica.
