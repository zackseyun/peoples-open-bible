revisions:
- from: El rey de Babilonia degolló a los hijos de Sedequías en Ribla, delante de sus ojos[a], y el rey de Babilonia degolló a todos los nobles de Judá.
  to: El rey de Babilonia masacró a los hijos de Sedequías en Ribla, delante de sus ojos, y el rey de Babilonia masacró a todos los nobles de Judá[a].
  rationale: Se reemplaza «degolló» por «masacró» para preservar la brutalidad de שָׁחַט / «slaughtered» sin introducir un método de ejecución demasiado específico. Además, se reubica la nota [a] para que ancle directamente en «nobles de Judá», que es el sintagma al que corresponde la alternativa léxica documentada en el inglés POB. No se requiere adjudicación adicional.
