revisions:
- from: Todo el que toque a un muerto, el cuerpo de un hombre que haya muerto, y no se purifique, ha profanado el tabernáculo de Yahvé; esa persona será eliminada[a] de Israel. Porque no fue rociada sobre él el agua de impureza, quedará impuro; su impureza sigue sobre él.
  to: Todo el que toque a un muerto, el cuerpo de un hombre que haya muerto, y no se purifique, ha contaminado el tabernáculo de Yahvé; esa persona será cortada de Israel. Porque no se roció sobre él el agua de impureza[a], quedará impuro; su impureza sigue sobre él.
  rationale: La revisión preserva mejor la fórmula pactual de כרת sin interpretarla de más, restaura la nota léxica documentada para מֵי נִדָּה, mejora la naturalidad sintáctica del español en la cláusula de aspersión, y ajusta «ha contaminado» para reflejar más de cerca el valor ritual de טִמֵּא.
  reviewer_model: gpt-5.4
