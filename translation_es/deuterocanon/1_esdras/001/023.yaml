translation:
  language: es
  text: Y después de toda esta actividad de Josías, sucedió que el faraón, rey de Egipto, vino a provocar guerra en Carquemis, junto al Éufrates; y Josías salió contra él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego conservado se interrumpe al final de la cláusula («y salió a …»); «salió contra él» expresa el sentido inmediato sin ocultar la truncación.
    reason: textual_variant
lexical_decisions:
- source_word: μετὰ πᾶσαν τὴν πρᾶξιν ταύτην
  english_pob_choice: after all this activity
  chosen_spanish: después de toda esta actividad
  alternatives_spanish:
  - después de todas estas cosas
  - después de todo este acto
  - después de toda esta acción
  lexicon: LSJ
  rationale: πρᾶξις puede ser hecho, acción o actividad. Dado el contexto narrativo, «actividad» conserva la idea de un curso de acción completo sin sonar rígido ni reducirlo a un solo acto puntual.
- source_word: Ἰωσείου
  english_pob_choice: Josias
  chosen_spanish: Josías
  alternatives_spanish:
  - Josiah
  lexicon: Transliteración del nombre griego
  rationale: En 1 Esdras el nombre aparece en forma griega; en español, «Josías» conserva el vínculo con la forma fuente y sigue siendo inteligible para el lector bíblico.
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - aconteció
  - pasó
  lexicon: LSJ
  rationale: «Sucedió» reproduce la fórmula narrativa con registro digno y natural en español moderno.
- source_word: πόλεμον ἐγείραι
  english_pob_choice: to stir up war
  chosen_spanish: a provocar guerra
  alternatives_spanish:
  - a suscitar guerra
  - a levantar guerra
  - a iniciar guerra
  lexicon: LSJ
  rationale: ἐγείρω con πόλεμος expresa la idea de levantar o suscitar conflicto. «Provocar guerra» preserva esa fuerza causativa en español, sin volverlo meramente administrativo como «hacer la guerra».
- source_word: ἐν Χαρκαμυς
  english_pob_choice: at Carchemish
  chosen_spanish: en Carquemis
  alternatives_spanish:
  - en Carquemís
  lexicon: Topónimo histórico
  rationale: Se mantiene el nombre propio en una forma española reconocible y cercana a la transliteración del griego.
- source_word: ἐπὶ τοῦ Εὐφράτου
  english_pob_choice: on the Euphrates
  chosen_spanish: junto al Éufrates
  alternatives_spanish:
  - sobre el Éufrates
  - en el Éufrates
  - a orillas del Éufrates
  lexicon: LSJ
  rationale: La construcción griega sitúa el hecho en la zona del río; en español «junto al Éufrates» comunica la localización con naturalidad sin forzar una imagen espacial demasiado literal.
- source_word: καὶ ἐξῆλθεν εἰς
  english_pob_choice: and Josias went out against him
  chosen_spanish: y Josías salió contra él
  alternatives_spanish:
  - y Josías salió a su encuentro
  - y Josías marchó contra él
  lexicon: LSJ
  rationale: El griego conservado está truncado, pero el contexto inmediato exige la respuesta de Josías. «Salió contra él» mantiene la dirección hostil sin añadir más de lo que el sentido permite.
theological_decisions:
- issue: Texto griego truncado al final de la cláusula final
  english_pob_reading: The rendering 'against him' reflects the immediate narrative context and the likely sense of the unfinished clause, but the surviving Zone 1 wording is incomplete at this point.
  chosen_spanish_reading: «salió contra él» refleja el contexto inmediato, reconociendo que el texto griego conservado termina truncado en εἰς.
  alternative_spanish_readings:
  - «salió»
  - «salió a su encuentro»
  rationale: No se debe ocultar la incompletitud del testimonio griego. La traducción completa la dirección implícita solo lo suficiente para que el español sea legible, sin afirmar más de lo que la fuente conserva.
  doctrine_reference: 'Principio textual: no sobretraducir un testimonio incompleto'
translation_notes:
  revision_awareness: El inglés auditado cambió «action» por «activity» para ajustar πρᾶξις con mayor naturalidad; en español se siguió esa misma línea semántica con «actividad». También se respetó la decisión auditada de mantener el nombre en su forma fuente, adaptado al uso bíblico español («Josías»), y se reconoció que el griego conservado termina truncado en la última cláusula.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología estándar del proyecto solo cuando corresponda; aquí no aparece.
  - Se usó «Éufrates» con tilde conforme al uso español.
  - Se evitó «SEÑOR» porque no hay un caso del tetragrama en este versículo.
  - «Josías» funciona como forma española del nombre griego Ἰωσείου sin perder la referencia al personaje bíblico.
