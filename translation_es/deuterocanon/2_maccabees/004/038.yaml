  to: Y, encendido de ira, enseguida le quitó el manto púrpura de Andronico y le rasgó los vestidos; y, después de hacerlo recorrer toda la ciudad hasta el mismo lugar donde había cometido su impiedad contra Onías, allí despachó al homicida[a], al darle el Señor el castigo que merecía.
  rationale: 'Se hizo una reparación menor para ajustar mejor el texto español al griego y al rastro de auditoría POB: «manto púrpura» explicita que πορφύραν funciona aquí como prenda de rango, no como abstracción; «despachó» evita sobreespecificar el modo de matar que «atravesó» imponía; «enseguida» adopta la grafía estándar actual; y «al darle el Señor...» mantiene explícita la retribución divina con una construcción más natural en español.'
