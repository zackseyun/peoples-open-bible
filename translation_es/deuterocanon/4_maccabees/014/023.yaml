translation:
  language: es
  text: Amó más la piedad[a] que salva[b] a la vida eterna, conforme a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devoción» para εὐσέβεια.
    reason: lexical_alternative
  - marker: b
    text: La frase «conforme a Dios» puede también entenderse como «según la voluntad de Dios» o «a juicio de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: εὐσέβειαν
  english_pob_choice: piety
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - religiosidad
  - piedad religiosa
  lexicon: LSJ
  rationale: εὐσέβεια en este contexto judío helenístico expresa devoción reverente a Dios unida a conducta fiel. En español, «piedad» conserva ese peso religioso y ético mejor que opciones más generales como «devoción» o «religiosidad».
- source_word: μᾶλλον
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - más bien
  - antes
  - preferentemente
  lexicon: LSJ
  rationale: El adverbio marca comparación de preferencia. «Más» mantiene la comparación de forma breve y natural en español.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - apreció
  - prefirió
  lexicon: LSJ
  rationale: El aoristo de ἀγαπάω se expresa de manera directa con «amó». La idea comparativa ya queda señalada por μᾶλλον, así que no conviene cargar el verbo con una preferencia implícita adicional.
- source_word: τὴν σώζουσαν
  english_pob_choice: the piety that saves
  chosen_spanish: la piedad que salva
  alternatives_spanish:
  - la que salva
  - la piedad salvadora
  - la piedad que da salvación
  lexicon: LSJ
  rationale: El participio atributivo se vierte de forma explícita como oración relativa para preservar el vínculo con εὐσέβειαν y mantener clara la función de «salva» en español.
- source_word: εἰς αἰώνιον ζωὴν
  english_pob_choice: unto eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hasta vida eterna
  - hacia vida eterna
  - a vida eterna
  lexicon: LSJ
  rationale: εἰς indica meta o resultado. En español, «para vida eterna» expresa esa finalidad de manera natural y fiel, sin sonar arcaico.
- source_word: κατὰ θεόν
  english_pob_choice: according to God
  chosen_spanish: conforme a Dios
  alternatives_spanish:
  - según Dios
  - de acuerdo con Dios
  - según la voluntad de Dios
  lexicon: LSJ
  rationale: La frase es compacta y puede entenderse como conformidad con el criterio o voluntad divina. «Conforme a Dios» conserva la apertura interpretativa de la construcción griega sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Sentido de κατὰ θεόν
  english_pob_reading: Render literally as 'according to God' rather than interpretively expanding it.
  chosen_spanish_reading: conforme a Dios
  alternative_spanish_readings:
  - según la voluntad de Dios
  - en conformidad con la voluntad de Dios
  - a juicio de Dios
  rationale: 'La traducción literal mantiene la ambigüedad teológica del griego: puede apuntar a conformidad con el estándar de Dios, con su voluntad o con su juicio. Traducirlo de forma más explícita introduciría una precisión doctrinal que el texto no fuerza.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: La base inglesa revisó «for eternal life» a «unto eternal life» para reflejar mejor εἰς. En español se optó por «para vida eterna», que comunica la meta/resultante de εἰς con naturalidad; el resto conserva la estructura y la tensión interpretativa del audit trail.
  spanish_consistency_notes:
  - Se mantuvo «piedad» para εὐσέβεια por consistencia con el valor técnico-religioso documentado.
  - Se evitó «Cristo» u otra terminología no presente en el versículo.
  - «Conforme a Dios» preserva la ambigüedad de κατὰ θεόν sin sobreinterpretación.
  - 'La sintaxis intenta reflejar el paralelismo del griego: amor preferente + piedad salvadora + finalidad eterna + conformidad divina.'
