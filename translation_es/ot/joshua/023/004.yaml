translation:
  language: es
  text: Miren, yo les he repartido estas naciones que quedan como herencia para sus tribus, desde el Jordán, junto con todas las naciones que he eliminado, hasta el Mar Grande, hacia donde se pone el sol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hacia donde se pone el sol», es decir, hacia el occidente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Vean
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: El imperativo plural de ראה funciona como llamado enfático de atención. «Mira» es natural y directo en español; conserva el valor deíctico sin sonar excesivamente arcaico. Aunque el plural sería «Miren», el contexto profético/narrativo admite la forma singular exhortativa en español como llamado general al oyente, pero se deja como alternativa preferible en traducción pública si se desea concordancia explícita.
- source_word: הִפַּלְתִּי
  english_pob_choice: I have allotted
  chosen_spanish: yo les he repartido
  alternatives_spanish:
  - yo les he asignado
  - yo les he repartido por sorteo
  - yo les he adjudicado
  lexicon: HALOT
  rationale: El verbo hiphil de נפל aquí expresa la repartición de territorio, probablemente con trasfondo de sorteo. «He repartido» comunica la distribución concreta sin perder la idea de asignación territorial. Se evita una traducción mecánica como «he hecho caer», que no transmite el sentido idiomático en este contexto.
- source_word: הַגּוֹיִם הַנִּשְׁאָרִים הָאֵלֶּה
  english_pob_choice: these remaining nations
  chosen_spanish: estas naciones que quedan
  alternatives_spanish:
  - estas naciones restantes
  - estas naciones que permanecen
  - estas naciones que han quedado
  lexicon: HALOT
  rationale: נִשְׁאָרִים describe naciones todavía presentes en la tierra. «Que quedan» preserva la noción de resto/remanente de forma clara y sobria en español, evitando añadir una lectura teológica que no está explicitada por el hebreo.
- source_word: בְּנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como heredad
  - como posesión heredada
  - en herencia
  lexicon: HALOT
  rationale: נחלה en Josué suele referirse a la porción territorial recibida por herencia. «Como herencia» es la forma más natural en español para mantener el valor de don territorial/covenantal sin forzar un tecnicismo.
- source_word: לְשִׁבְטֵיכֶם
  english_pob_choice: for your tribes
  chosen_spanish: para sus tribus
  alternatives_spanish:
  - para sus tribus
  - a sus tribus
  - para vuestras tribus
  lexicon: HALOT
  rationale: El referente son las tribus de Israel como destinatarias del reparto. En español bíblico contemporáneo, «sus tribus» resulta claro y no introduce la oscilación entre tú/ustedes. Se mantiene el sentido beneficiario del dativo.
- source_word: מִן הַיַּרְדֵּן ... וְהַיָּם הַגָּדוֹל
  english_pob_choice: from the Jordan ... to the Great Sea
  chosen_spanish: desde el Jordán ... hasta el Mar Grande
  alternatives_spanish:
  - del Jordán ... al Mar Grande
  - desde el Jordán ... hacia el Mar Grande
  lexicon: HALOT
  rationale: La frase marca extensión territorial. «Desde ... hasta ...» expresa con precisión el límite occidental y conserva la estructura fronteriza del hebreo. «Mar Grande» es el equivalente tradicional y textual de הַיָּם הַגָּדוֹל.
- source_word: וְכָל הַגּוֹיִם אֲשֶׁר הִכְרַתִּי
  english_pob_choice: with all the nations that I have cut off
  chosen_spanish: junto con todas las naciones que he exterminado
  alternatives_spanish:
  - junto con todas las naciones que he cortado de raíz
  - junto con todas las naciones que he eliminado
  - y todas las naciones que he exterminado
  lexicon: HALOT
  rationale: כרת en este contexto tiene el matiz de cortar/juzgar hasta destruir. En español, «exterminado» comunica con fuerza la acción de juicio total, aunque «cortado de raíz» sería una alternativa más idiomática y algo más cercana al hebreo. Se conserva el tono severo del texto sin suavizarlo.
- source_word: מְבוֹא הַשָּׁמֶשׁ
  english_pob_choice: toward the going down of the sun
  chosen_spanish: hacia donde se pone el sol
  alternatives_spanish:
  - hacia el ocaso
  - hacia el oeste
  - hacia la puesta del sol
  lexicon: HALOT
  rationale: La expresión es un hebraísmo para el oeste/sunset. «Hacia donde se pone el sol» conserva la imagen original y sigue siendo comprensible en español; no se reduce directamente a «oeste» para mantener la transparencia semántica.
theological_decisions:
- issue: Extensión territorial y lenguaje de juicio en la promesa de la tierra
  english_pob_reading: I have allotted ... these remaining nations ... with all the nations that I have cut off
  chosen_spanish_reading: yo les he repartido ... estas naciones que quedan ... junto con todas las naciones que he exterminado
  alternative_spanish_readings:
  - yo les he asignado ... estas naciones restantes ... con todas las naciones que he destruido
  - yo les he adjudicado ... estas naciones que permanecen ... junto con todas las naciones que he eliminado
  rationale: 'El versículo combina reparto de herencia territorial y juicio sobre naciones expulsadas o destruidas. La traducción española conserva ambas líneas: reparto/ herencia y exterminio/juicio. No se suaviza el lenguaje bélico porque forma parte del sentido del texto y de su marco de conquista en Josué.'
  doctrine_reference: Josué 23; teología de la tierra prometida y juicio divino en el relato de conquista
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado del texto fuente inglés, pero vuelve al hebreo para resolver el matiz de רְאוּ, הִפַּלְתִּי, הִכְרַתִּי y מְבוֹא הַשָּׁמֶשׁ. Se preserva la extensión territorial con «desde ... hasta ...» y el tono de juicio con «he exterminado».
  spanish_consistency_notes:
  - Se usa «Mar Grande» para הַיָּם הַגָּדוֹל, consistente con la terminología bíblica común y el texto inglés auditado.
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton.
  - Se mantiene el vocabulario de herencia territorial con «herencia» / «repartido» en lugar de una paráfrasis más abstracta.
