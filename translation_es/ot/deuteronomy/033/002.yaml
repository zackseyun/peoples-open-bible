  yaml_path: translation/ot/deuteronomy/033/002.yaml
  text: 'And he said: “Yahweh came from Sinai and dawned from Seir upon them[a]; he shone forth from Mount Paran, and came from myriads of holy ones[b]; from his right hand came fiery bolts for them.”'
