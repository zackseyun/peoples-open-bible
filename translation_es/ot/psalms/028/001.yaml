revisions:
- from: De David[a]. A ti, Yahvé, clamo; mi roca, no guardes silencio ante mí[c][b], para que no te calles ante mí y yo llegue a ser como los que descienden al sepulcro.
  to: De David[a]. A ti, Yahvé, clamo; mi roca, no seas sordo a mí[c], no sea que te calles ante mí y yo llegue a ser como los que descienden a la fosa[b].
  rationale: 'Se revisa para reflejar la distinción documentada entre los dos verbos hebreos: primero ''no seas sordo a mí'' (no oír/atender), luego ''no sea que te calles ante mí'' (no responder). También se cambia ''para que no'' por ''no sea que'' para expresar mejor el valor de פֶּן, y ''la fosa'' para conservar más de cerca la imagen concreta de בור, manteniendo en nota su posible referencia a la tumba o al ámbito de los muertos.'
  reviewer_model: gpt-5.4
