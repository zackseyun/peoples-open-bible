review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y la geografía básica del hebreo: movimiento desde allí, ubicación entre Betel y Hai, construcción de un altar e invocación del nombre divino. También acierta al usar «Yahvé» conforme al proyecto. Sin embargo, hay desajustes menores: la nota [a] no corresponde a una verdadera alternativa, y «llamó invocando el nombre de Yahvé» suena poco natural y no reproduce bien el modismo hebreo בְּשֵׁם יהוה, que en español bíblico se expresa mejor como «invocó el nombre de Yahvé» con nota sobre la posible lectura «proclamó».'
  spanish_quality_summary: El español es en general claro y digno, pero tiene dos problemas de estilo/legibilidad. Primero, «llamó invocando» es torpe e innecesariamente explicativo; «invocó el nombre de Yahvé» es más natural y fiel. Segundo, la nota [a] está mal anclada y duplicativa, porque repite la misma opción que aparece en el texto en vez de preservar una alternativa real. El resto del versículo lee bien en español eclesial amplio.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé», «altar» y la orientación geográfica. «Región montañosa» es aceptable para הָהָרָה. «Hai» es una forma castellana tradicional inteligible. La principal corrección terminológica es representar וַיִּקְרָא בְּשֵׁם יְהוָה como «invocó el nombre de Yahvé» y preservar «proclamó...» en nota, conforme al rastro auditado en inglés.
  issues:
  - severity: medium
    issue: La formulación «llamó invocando el nombre de Yahvé» es poco natural y no reproduce bien el modismo hebreo.
    rationale: וַיִּקְרָא בְּשֵׁם יְהוָה se expresa naturalmente en español como «invocó el nombre de Yahvé» o «llamó al nombre de Yahvé». La redacción actual mezcla dos verbos y suena forzada.
  - severity: medium
    issue: La nota [a] no preserva una alternativa significativa y además está anclada a un lugar equivocado.
    rationale: 'El texto ya dice «región montañosa», y la nota repite «O “región montañosa”». La alternativa relevante documentada en el audit trail está en la frase final: «proclamó el nombre de Yahvé» frente a «invocó...».'
  - severity: low
    issue: Conviene reubicar las notas para que correspondan a las decisiones léxicas realmente disputadas.
    rationale: La tensión interpretativa principal del versículo está en «invocó/proclamó el nombre de Yahvé», mientras que la nota sobre «YHWH» debe anclarse al nombre divino, no a «oriente».
  revised_spanish_text: Desde allí se trasladó a la región montañosa al oriente de Betel y levantó su tienda, con Betel al occidente y Hai al oriente. Allí edificó un altar a Yahvé[a] e invocó[b] el nombre de Yahvé.
  revised_footnotes:
  - marker: a
    text: Hebreo «YHWH»; tradicionalmente se traduce «el SEÑOR».
    reason: lexical_alternative
  - marker: b
    text: O «proclamó el nombre de Yahvé». La expresión hebrea puede referirse a invocar a Yahvé en adoración o a declarar públicamente su nombre.
    reason: alternative_reading
  revision_rationale: 'Se elimina una nota inadecuada sobre «región montañosa» y se traslada la nota de alternativa al lugar donde el hebreo realmente presenta tensión interpretativa: וַיִּקְרָא בְּשֵׁם יְהוָה. También se reemplaza «llamó invocando» por «e invocó el nombre de Yahvé», que es más idiomático en español y fiel al sentido principal preservando la alternativa «proclamó» en nota.'
