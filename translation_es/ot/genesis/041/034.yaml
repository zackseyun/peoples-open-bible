translation:
  language: es
  text: 'Que Faraón haga esto: que ponga supervisores sobre la tierra y que tome una quinta parte[a] del producto de la tierra de Egipto durante los siete años de abundancia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que cobre una quinta parte de la tierra de Egipto’. El verbo hebreo puede entenderse como imponer o tomar una quinta parte durante los años de abundancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲשֶׂה
  english_pob_choice: Let Pharaoh do this
  chosen_spanish: Que Faraón haga esto
  alternatives_spanish:
  - Que Faraón actúe así
  - Faraón debe hacer esto
  lexicon: HALOT
  rationale: El verbo עשה es amplio (‘hacer’/‘actuar’). En este contexto, José da una recomendación administrativa, por lo que una forma exhortativa en español comunica bien el valor volitivo sin añadir contenido ajeno.
- source_word: וְיַפְקֵד
  english_pob_choice: let him appoint
  chosen_spanish: que ponga
  alternatives_spanish:
  - que nombre
  - que designe
  - que establezca
  lexicon: HALOT
  rationale: El piel/causativo de פקד puede implicar asignar o colocar a alguien en una responsabilidad. En español, ‘poner’ seguido de un cargo expresa de manera natural la idea de instalar responsables, manteniendo el matiz administrativo.
- source_word: פְּקִדִים
  english_pob_choice: overseers
  chosen_spanish: supervisores
  alternatives_spanish:
  - inspectores
  - encargados
  - funcionarios
  lexicon: HALOT
  rationale: El sustantivo refiere a personas puestas sobre una tarea de control o vigilancia. ‘Supervisores’ transmite con claridad la autoridad delegada y evita el matiz militar o demasiado genérico de otras opciones.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el país
  - por toda la tierra
  - en la tierra
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere al territorio bajo administración, no al mundo entero. ‘Sobre la tierra’ conserva la relación de autoridad expresada por עַל y suena natural en español.
- source_word: וְחִמֵּשׁ
  english_pob_choice: take a fifth
  chosen_spanish: que tome una quinta parte
  alternatives_spanish:
  - que cobre un quinto
  - que recaude una quinta parte
  - que exija un quinto
  lexicon: HALOT
  rationale: El valor léxico es el de tomar/levantar una quinta parte del producto. ‘Tomar una quinta parte’ es fiel y sobrio; en nota se preserva la alternativa de entenderlo como recaudar desde la tierra.
- source_word: אֶת אֶרֶץ מִצְרַיִם
  english_pob_choice: of the produce of the land of Egypt
  chosen_spanish: del producto de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  - de la producción de la tierra de Egipto
  lexicon: HALOT
  rationale: El hebreo señala el objeto del que se toma la quinta parte; el contexto económico indica que se trata del rendimiento de la tierra, no de la tierra misma. ‘Producto’ comunica esa idea de cosecha/yield con precisión.
- source_word: בְּשֶׁבַע שְׁנֵי הַשָּׂבָע
  english_pob_choice: during the seven years of abundance
  chosen_spanish: durante los siete años de abundancia
  alternatives_spanish:
  - en los siete años de abundancia
  - durante los siete años de plenitud
  - en los siete años de la abundancia
  lexicon: HALOT
  rationale: שָׂבָע expresa plenitud/saciedad y, en esta narración, años de cosecha abundante. ‘Abundancia’ es natural en español y conserva el sentido económico del pasaje.
translation_notes:
  revision_awareness: La redacción sigue de cerca el patrón de la POB inglesa revisada, especialmente la aclaración de que se toma una quinta parte del producto y no de la tierra misma. Se evitó un calco rígido de ‘appoint overseers’ en favor de una formulación española natural (‘ponga supervisores’), sin perder el matiz administrativo del hebreo.
  spanish_consistency_notes:
  - Se conserva ‘Faraón’ como título propio del soberano, en línea con el uso bíblico.
  - Se emplea ‘tierra’ para אֶרֶץ porque el contexto es territorial/agrícola, no cosmológico.
  - ‘Producto’ fija la referencia económica del cinco por ciento, armonizando con la nota alternativa.
  - El tono es exhortativo y formal, apto para lectura pública, sin añadir elementos interpretativos no presentes en el texto.
