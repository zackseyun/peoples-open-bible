translation:
  language: es
  text: Entonces recordarán sus malos caminos y sus obras que no eran buenas, y se aborrecerán[a] a sí mismos por sus iniquidades y por sus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "ante sus propios ojos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְכַרְתֶּם
  english_pob_choice: Then you will remember
  chosen_spanish: Entonces recordarán
  alternatives_spanish:
  - Y recordarán
  - Luego recordarán
  lexicon: HALOT
  rationale: El perfecto con waw en secuencia profética expresa acción futura consecuente; 'Entonces' marca bien la transición de la restauración previa al recuerdo moral.
- source_word: דַּרְכֵיכֶם
  english_pob_choice: your ways
  chosen_spanish: sus malos caminos
  alternatives_spanish:
  - sus maneras de vivir
  - sus conductas
  lexicon: HALOT
  rationale: '''Caminos'' conserva la imagen hebrea de modo de vida o conducta; ''malos'' refleja הָרָעִים sin sobretraducirlo.'
- source_word: וּמַעַלְלֵיכֶם
  english_pob_choice: your deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: מַעַלְלִים designa actos o prácticas; 'obras' es natural en español bíblico y mantiene el paralelo con 'caminos'.
- source_word: אֲשֶׁר לֹא טוֹבִים
  english_pob_choice: that were not good
  chosen_spanish: que no eran buenas
  alternatives_spanish:
  - que no eran buenas cosas
  - que no eran rectas
  lexicon: HALOT
  rationale: La cláusula relativa dice literalmente 'no buenos'; 'no eran buenas' preserva la fuerza sin intensificarla indebidamente a 'malvadas'.
- source_word: וּנְקֹטֹתֶם
  english_pob_choice: you will loathe yourselves
  chosen_spanish: se despreciarán a sí mismos
  alternatives_spanish:
  - se abominarán a sí mismos
  - se tendrán asco
  lexicon: HALOT
  rationale: El verbo expresa repulsión o autodesprecio. En español, 'se despreciarán a sí mismos' comunica esa autovisión de rechazo con dignidad y claridad.
- source_word: בִּפְנֵיכֶם
  english_pob_choice: yourselves / in your own sight
  chosen_spanish: a sí mismos
  alternatives_spanish:
  - en su propia presencia
  - a su propia vista
  lexicon: HALOT
  rationale: La expresión idiomática 'en sus rostros/presencia' apunta aquí a una percepción reflexiva de sí mismos; 'a sí mismos' mantiene el sentido idiomático y evita una literalidad extraña.
- source_word: עַל עֲוֺנֹתֵיכֶם
  english_pob_choice: for your iniquities
  chosen_spanish: por sus iniquidades
  alternatives_spanish:
  - a causa de sus iniquidades
  - por su culpa
  lexicon: HALOT
  rationale: עַל expresa aquí la base o motivo del rechazo; 'por' reproduce bien el valor causal y 'iniquidades' conserva el peso moral del término.
- source_word: וְעַל תּוֹעֲבֹתֵיכֶם
  english_pob_choice: and your abominations
  chosen_spanish: y por sus abominaciones
  alternatives_spanish:
  - y por sus cosas detestables
  - y por sus prácticas abominables
  lexicon: HALOT
  rationale: תּוֹעֵבָה es un término fuerte de repulsión moral y cultual; 'abominaciones' preserva el registro bíblico y el impacto teológico.
theological_decisions:
- issue: Respuesta moral tras la restauración divina
  english_pob_reading: The verse describes a divinely prompted remembrance and self-loathing over past sins without importing later doctrinal categories beyond the text.
  chosen_spanish_reading: El versículo describe un recuerdo provocado por Dios y un autodesprecio por pecados pasados, sin añadir categorías doctrinales ajenas al texto.
  alternative_spanish_readings:
  - mero remordimiento psicológico
  - doctrina completa del arrepentimiento
  rationale: 'La frase final mantiene la tensión bíblica: hay memoria moral y rechazo de sí mismo por el pecado, pero el versículo no desarrolla aquí una doctrina sistemática completa.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés al mantener el valor causal de עַל con 'por' y al conservar la secuencia profética futura ('Entonces recordarán'). También evita suavizar el peso moral de 'abominaciones' y respeta la tensión entre recuerdo, repulsión y autodesprecio sin convertirla en una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se prefirió 'caminos' para דַּרְכֵיכֶם y 'obras' para מַעַלְלֵיכֶם por coherencia con el paralelismo hebreo.
  - '''Abominaciones'' se mantiene como término fuerte y establecido en registro bíblico.'
  - La nota [a] está anclada explícitamente en 'se despreciarán a sí mismos' para ofrecer la alternativa idiomática documentada en el audit trail inglés.
