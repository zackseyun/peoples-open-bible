base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/018/007.yaml
  text: And the women who were celebrating sang responsively[a], saying, “Saul has struck down his thousands[c][b], and David his tens of thousands.”
  footnotes:
  - marker: a
    text: Or “answered one another,” with the sense here likely being antiphonal or responsive singing.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew participle can also suggest festive play, dancing, or merrymaking.
    reason: lexical_alternative
  - marker: c
    text: Or “has slain”; the Hebrew verb literally means “has struck,” here in a military sense.
    reason: lexical_alternative
