translation:
  language: es
  text: Él recuerda su alianza para siempre[a], la palabra que mandó para mil generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la promesa que estableció para mil generaciones'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכַר
  english_pob_choice: He remembers
  chosen_spanish: Él recuerda
  alternatives_spanish:
  - Él ha recordado
  - Él recordó
  lexicon: HALOT
  rationale: 'El qal perfecto hebreo expresa una acción con valor duradero en un contexto poético de fidelidad divina. En español, el presente comunica mejor esa continuidad: no solo un hecho pasado, sino una memoria/preservación activa de Yahvé.'
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para la eternidad
  lexicon: HALOT
  rationale: La expresión con ל indica duración indefinida y permanente. 'Para siempre' es natural en español y preserva la fuerza de permanencia del pacto.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  lexicon: HALOT
  rationale: En un contexto de historia de salvación, בְּרִית no se vuelve 'tratado' ni 'acuerdo' por estilo moderno; 'pacto' es el equivalente español más fiel y transparenta la relación vinculante entre Dios y su pueblo.
- source_word: דָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la promesa
  - el dicho
  - el asunto
  lexicon: HALOT
  rationale: Se conserva el valor léxico amplio de דבר sin reducirlo de entrada a 'promesa'. 'La palabra' mantiene el paralelismo con 'su pacto' y deja abierta la lectura de una declaración divina ligada al pacto.
- source_word: צִוָּה
  english_pob_choice: he commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - decretó
  - dispuso
  lexicon: HALOT
  rationale: El verbo piel de צוה suele significar 'mandar/ordenar'. 'Mandó' es directo y natural en español, y conserva el tono de decreto divino.
- source_word: לְאֶלֶף דּוֹר
  english_pob_choice: for a thousand generations
  chosen_spanish: para mil generaciones
  alternatives_spanish:
  - a mil generaciones
  - por mil generaciones
  lexicon: HALOT
  rationale: La construcción numeral se vierte en español de manera idiomática en plural. 'Mil generaciones' refleja el alcance hiperbólico y transgeneracional del hebreo sin perder transparencia.
theological_decisions:
- issue: Aspecto de 'recordar' aplicado a Yahvé
  english_pob_reading: Present tense expressing ongoing covenant faithfulness
  chosen_spanish_reading: 'Presente gnómico: Dios sigue recordando su pacto'
  alternative_spanish_readings:
  - 'Perfecto simple: ''Él recordó su pacto para siempre'''
  - 'Perfecto compuesto: ''Él ha recordado su pacto para siempre'''
  rationale: En poesía hebrea, el perfecto puede comunicar una realidad vigente. El presente español evita que la cláusula suene como un mero recuerdo puntual y resalta la fidelidad continua de Yahvé.
  doctrine_reference: Sal 105:8; fidelidad del pacto
- issue: Sentido de דָּבָר en paralelismo de pacto
  english_pob_reading: Retain 'the word' in the main text
  chosen_spanish_reading: Conservar 'la palabra' en el texto principal
  alternative_spanish_readings:
  - '''la promesa'' como paráfrasis interpretativa'
  - '''el decreto'' si se enfatiza la dimensión de mando'
  rationale: El hebreo usa un término amplio. En español, 'la palabra' preserva la transparencia del léxico y el paralelismo con 'pacto'; 'promesa' se reserva como alternativa interpretativa, pero no reemplaza el término básico sin necesidad textual.
  doctrine_reference: Sal 105:8; fidelidad verbal de Dios
translation_notes:
  revision_awareness: 'Coincide con el examen auditado: no se requieren revisiones respecto del inglés POB; se mantiene la distinción entre ''pacto'' y ''palabra'' sin domesticar el lenguaje de alianza.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en coherencia con el proyecto; este versículo no contiene el tetragrámaton explícito, así que no requiere decisión de máscara nominal.
  - '''Pacto'' se mantiene como término técnico bíblico frente a alternativas más civiles como ''alianza'' o ''convenio''.'
  - '''Para siempre'' conserva la durabilidad sin introducir matices temporales ajenos al hebreo.'
