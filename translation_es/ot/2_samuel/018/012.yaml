base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/012.yaml
  text: But the man said to Joab[a], “Even if I were weighing out a thousand pieces of silver on my palms, I would not put out my hand against the king’s son; for in our hearing the king commanded you and Abishai and Ittai, saying[b], ‘Guard for me the young man Absalom.’”
  footnotes:
