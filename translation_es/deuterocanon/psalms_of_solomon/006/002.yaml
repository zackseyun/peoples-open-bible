revisions:
- from: Cuando él recuerde el nombre de Yahvé, será salvado.[a]
  to: Cuando recuerde el nombre de Yahvé, será salvo[a].
  rationale: Se ajusta el anclaje de la nota para que corresponda exactamente a σωθήσεται, se mejora la naturalidad y dignidad del español con «será salvo», y se elimina el pronombre explícito innecesario sin alterar la decisión exegética sobre αὐτὸν como sujeto lógico.
