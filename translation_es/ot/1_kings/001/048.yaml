  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Yahvé» correcto para יְהוָה; «Dios» correcto; no hay conflictos mayores de glosario. La única mejora léxica es acercar יֹשֵׁב a un participio sustantivado en español en vez de una construcción de finalidad.'
