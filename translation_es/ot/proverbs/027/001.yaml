- from: No te jactes del día de mañana[a], porque no sabes qué producirá un día.
  to: No te jactes de mañana[a], porque no sabes qué producirá un día.
  rationale: Se ajusta «del día de mañana» a «de mañana» para un español más natural y proverbial, manteniendo el mismo sentido prospectivo del hebreo y del English POB («about tomorrow»). Se conserva «qué producirá un día» como texto principal por claridad, y se preserva la imagen literal de ילד en una nota al pie mejorada editorialmente.
