translation:
  language: es
  text: Anda, come tu pan con alegría, y bebe tu vino con un corazón alegre, porque Dios ya ha aprobado[a] tus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ha aceptado tus obras' o 'se complace en tus obras'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Anda
  alternatives_spanish:
  - Ve
  - Vete
  - Vamos
  lexicon: HALOT
  rationale: El imperativo funciona como lanzador exhortativo. 'Anda' conserva el impulso discursivo natural en español sin añadir contenido ajeno.
- source_word: אֱכֹל
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - come
  - come de
  - alimenta-te
  lexicon: HALOT
  rationale: El mandato es directo; 'come' es la forma natural y fiel en español para el sentido básico de אכל.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - alegremente
  - en alegría
  - con gozo
  lexicon: HALOT
  rationale: La preposición ב marca modo. 'Con alegría' conserva el sustantivo y transmite bien el matiz de gozo interior.
- source_word: לַחְמֶךָ
  english_pob_choice: your bread
  chosen_spanish: tu pan
  alternatives_spanish:
  - tu comida
  - tu alimento
  lexicon: HALOT
  rationale: לֶחֶם es literalmente 'pan'. En español, 'pan' mantiene la imagen concreta y sigue siendo comprensible como alimento cotidiano.
- source_word: וּשֲׁתֵה
  english_pob_choice: and drink
  chosen_spanish: y bebe
  alternatives_spanish:
  - y toma
  - y beba
  lexicon: HALOT
  rationale: Imperativo coordinado sencillo; 'bebe' preserva la forma verbal sin diluir el paralelismo.
- source_word: בְלֶב טוֹב
  english_pob_choice: with a glad heart
  chosen_spanish: con un corazón alegre
  alternatives_spanish:
  - con un corazón contento
  - con buen ánimo
  - alegremente
  lexicon: HALOT
  rationale: El hebreo usa la imagen del 'corazón' como sede interior del gozo. 'Con un corazón alegre' mantiene la metáfora y resulta natural en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base del exhorto. 'Porque' expresa con claridad la relación causal en español.
- source_word: כְבָר
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya antes
  - desde antes
  - ya mismo
  lexicon: HALOT
  rationale: '''סignaliza favor previo o ya establecido. ''Ya'' reproduce de manera breve y natural ese valor aspectual.'
- source_word: רָצָה
  english_pob_choice: has already approved
  chosen_spanish: ha aprobado
  alternatives_spanish:
  - ha aceptado
  - se complace en
  - ha mirado con favor
  lexicon: HALOT
  rationale: El verbo puede significar complacerse, aceptar favorablemente o aprobar. 'Ha aprobado' comunica la valoración favorable en español sin cargar el verso con una lectura técnica de mérito.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Altísimo
  lexicon: HALOT
  rationale: El sustantivo definido se refiere al único Dios verdadero; 'Dios' es la equivalencia estándar y precisa.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - tus acciones
  - tus obras hechas
  lexicon: HALOT
  rationale: '''Obras'' conserva la concreción evaluativa de מעשים y suena natural en español bíblico contemporáneo.'
theological_decisions:
- issue: Sentido de la aprobación divina final
  english_pob_reading: The verse states that God has already looked favorably on the addressee's deeds, grounding the exhortation to enjoy life's gifts; it does not by itself teach salvation by works.
  chosen_spanish_reading: El verso afirma que Dios ya ha mirado favorablemente las obras del destinatario, y con eso fundamenta la exhortación a disfrutar los dones de la vida; por sí solo no enseña salvación por obras.
  alternative_spanish_readings:
  - Dios ha aceptado sus obras en sentido cultual
  - Dios está complacido con lo que hace en sentido general de providencia
  rationale: רצה con מעשים permite matices de aceptación favorable o complacencia. En Eclesiastés, el punto es el gozo legítimo bajo el favor previo de Dios, no una doctrina de mérito humano. 'Ha aprobado' mantiene la fuerza evaluativa sin sobrecargar el verso doctrinalmente.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registraron cambios en el texto fuente ni en la decisión de traducción base; la versión española sigue de cerca la lectura ya confirmada y ajusta solo la formulación idiomática al español.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para הָאֱלֹהִים, conforme al valor definido del hebreo.
  - Se traduce לֶחֶם como 'pan' por su literalidad y naturalidad en español.
  - Se conserva la imagen de 'corazón' en בְלֶב טוֹב para no aplanar el hebreo a un simple adverbio.
  - '''Obras'' preserva la concreción de מַעֲשִׂים y la evaluación favorable del final del versículo.'
  - El pie de nota recoge alternativas semánticas reales del verbo רָצָה, tal como el audit trail inglés preserva 'accepted' y 'is pleased with'.
