  text: 우리는 그분 안에서 그분의 피로 말미암아 구속[a] 곧 범죄[b]의 사함을 얻었으니, 이는 그분의 풍성한 은혜를 따른 것이며—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἀπολύτρωσις는 노예·포로의 「풀려남」을 가리키는 어휘로 값을 치러 자유롭게 함을 함의한다. 한국 교회 전통의 「구속(救贖)」으로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: παράπτωμα는 「미끄러져 넘어짐」을 어원으로 하며 일반 죄(ἁμαρτία)보다 구체적 범행을 가리킨다. 「범죄」로 옮긴다.
    reason: lexical_alternative
