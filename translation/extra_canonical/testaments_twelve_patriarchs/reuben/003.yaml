theological_decisions:
- issue: Double reference to the eighth spirit / spirit of sleep in vv. 1 and 7
  chosen_reading: Translate both references, treating v. 7 as a parallel or expanded restatement rather than silently omitting it.
  alternative_readings:
  - Omit v. 7 as secondary dittography
  - Harmonize vv. 1 and 7 into a single statement
  rationale: The Greek witness supplied includes both statements, with textual complexity visible. Transparency requires translating the extant text and signaling the issue in a note rather than conflating the lines.
  doctrine_reference: 'PHILOSOPHY.md: translate what is in the Greek witness honestly, and use notes rather than silently harmonizing.'
- issue: Anthropological language of internal 'spirits' tied to organs and faculties
  chosen_reading: Render the catalogue straightforwardly as spirits associated with bodily faculties and passions.
  alternative_readings:
  - Demythologize into mere impulses or habits
  - Interpret as demons explicitly
  rationale: The Greek presents a moral-psychological taxonomy in testamentary exhortation. Translating 'spirit' consistently preserves the text's own conceptual world without over-interpreting it.
