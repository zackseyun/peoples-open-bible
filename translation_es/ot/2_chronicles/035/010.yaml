    reason: lexical_alternative
  - marker: c
    text: O «conforme a sus divisiones».
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción principal porque es fiel y natural en español. La revisión corrige el anclaje de la nota [b] para que explique la expresión hebrea עַל עָמְדָם ('en sus puestos') en vez de aparecer erróneamente junto a 'divisiones'.
