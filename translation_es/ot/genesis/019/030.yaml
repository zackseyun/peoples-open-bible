translation:
  language: es
  text: Entonces Lot subió de Zoar y habitó en las montañas, y sus dos hijas estaban con él, porque tenía miedo de habitar en Zoar. Así vivió en una cueva[a], él y sus dos hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la cueva»; el artículo definido puede simplemente señalar la cueva concreta que ocupaba Lot, aunque en español suele decirse «en una cueva» cuando se menciona por primera vez un refugio así.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - salió
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente; «subió» preserva la dirección/topografía de manera natural en español sin perder la fuerza literal del verbo.
- source_word: מִצּוֹעַר
  english_pob_choice: from Zoar
  chosen_spanish: de Zoar
  alternatives_spanish:
  - desde Zoar
  lexicon: HALOT
  rationale: La preposición מן indica alejamiento desde el lugar llamado Zoar; «de Zoar» es la forma más directa y fluida en español.
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  - se quedó
  lexicon: HALOT
  rationale: ישב puede significar sentarse, morar o habitar. Aquí se trata de residencia narrativa; «habitó» conserva ese valor sin sonar tan moderno como «vivió» ni sugerir más permanencia de la que el contexto exige con «se estableció».
- source_word: בָּהָר
  english_pob_choice: in the mountains
  chosen_spanish: en las montañas
  alternatives_spanish:
  - en el monte
  - en la sierra
  - en la montaña
  lexicon: HALOT
  rationale: El singular hebreo הַר funciona aquí con sentido topográfico/colectivo. La revisión inglesa prefirió «the mountains» por ser más directo; en español, «las montañas» transmite de forma natural ese valor plural/topográfico sin forzar un singular artificial.
- source_word: וּשְׁתֵּי בְנֹתָיו עִמּוֹ
  english_pob_choice: and his two daughters were with him
  chosen_spanish: y sus dos hijas estaban con él
  alternatives_spanish:
  - y sus dos hijas con él
  - y con él estaban sus dos hijas
  lexicon: HALOT
  rationale: El hebreo es una frase nominal coordinada. «Estaban con él» hace explícita la relación de compañía en un español claro, conservando el orden narrativo simple.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del cambio de lugar. «Porque» expresa de manera natural la causalidad en español contemporáneo.
- source_word: יָרֵא
  english_pob_choice: he was afraid
  chosen_spanish: tenía miedo
  alternatives_spanish:
  - temía
  - tenía temor
  lexicon: HALOT
  rationale: El valor estativo se expresa con naturalidad como «tenía miedo». «Temía» también sería posible, pero «tenía miedo» es más idiomático en este contexto narrativo.
- source_word: לָשֶׁבֶת בְּצֹוַר
  english_pob_choice: to live in Zoar
  chosen_spanish: de habitar en Zoar
  alternatives_spanish:
  - de vivir en Zoar
  - de morar en Zoar
  - para habitar en Zoar
  lexicon: HALOT
  rationale: El infinitivo constructo de ישב mantiene el sentido de residencia. «Habitar» preserva mejor la conexión léxica con וַיֵּשֶׁב y evita una repetición menos marcada de «vivir».
- source_word: בַּמְּעָרָה
  english_pob_choice: in a cave
  chosen_spanish: en una cueva
  alternatives_spanish:
  - en la cueva
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo («en la cueva»), en español la introducción de un refugio suele expresarse naturalmente con indefinido. Se respeta la posibilidad del artículo mediante nota textual, pero el texto principal prioriza la idiomaticidad.
- source_word: הוּא וּשְׁתֵּי בְנֹתָיו
  english_pob_choice: he and his two daughters
  chosen_spanish: él y sus dos hijas
  alternatives_spanish:
  - él con sus dos hijas
  - él y las dos hijas
  lexicon: HALOT
  rationale: La frase restablece a los ocupantes de la cueva. Mantener «él y sus dos hijas» conserva el énfasis appositivo del hebreo y cierra la oración con sencillez.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «the hill country» por «the mountains» para acercarse más directamente a בהר. En español se siguió esa misma dirección con «en las montañas». También se conservó la nota sobre la posible lectura definida de «en la cueva», pero el texto principal usa una forma más natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de base en la serie, aunque este versículo no contiene el nombre divino.
  - Se usó «habitó/habitar» para reflejar la repetición de ישב en ambos miembros del versículo.
  - Se evitó «SEÑOR» y otras sustituciones tradicionales no presentes en el hebreo de este versículo.
  - La nota a pie distingue entre la literalidad hebrea con artículo y el uso idiomático español en la primera mención de una cueva.
