translation:
  language: es
  text: Lo que el impío teme[a] le sobrevendrá; pero el deseo de los justos[b] será concedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el temor del impío». El hebreo puede expresarse más literalmente, pero el texto principal busca la misma idea en español claro.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «será dado». El sujeto queda implícito; la traducción principal conserva ese rasgo al usar la voz pasiva.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְגוֹרַת
  english_pob_choice: what the wicked dreads
  chosen_spanish: lo que ... teme
  alternatives_spanish:
  - el temor de
  - la cosa que teme
  lexicon: HALOT
  rationale: El sustantivo denota temor, pavor o el objeto temido. En este proverbio, la idea es el objeto de ese temor; por eso «lo que ... teme» reproduce la fuerza semántica sin volverlo demasiado abstracto ni demasiado mecánico.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - la persona impía
  lexicon: HALOT
  rationale: El adjetivo funciona como sustantivo para una clase proverbial. «Impío» es una equivalencia bíblica natural en español y conserva el contraste moral del dicho sin añadir matices no presentes.
- source_word: הִיא תְבוֹאֶנּוּ
  english_pob_choice: will come upon him
  chosen_spanish: le sobrevendrá
  alternatives_spanish:
  - vendrá sobre él
  - le llegará
  lexicon: HALOT
  rationale: El hebreo expresa llegada o irrupción de aquello temido. «Le sobrevendrá» comunica bien la idea de algo que cae de pronto sobre la persona y mantiene el sentido idiomático del original.
- source_word: וְתַאֲוַת
  english_pob_choice: but the desire of
  chosen_spanish: pero el deseo de
  alternatives_spanish:
  - y el deseo de
  - pero el anhelo de
  lexicon: HALOT
  rationale: תאווה puede ser deseo, anhelo o apetito. «Deseo» es la opción más neutra y adecuada para el paralelo positivo con los justos. El contraste con la primera cola justifica «pero» en español para reflejar la antítesis proverbial.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - personas justas
  lexicon: HALOT
  rationale: El plural adjetival es sustantivado. «Los justos» conserva el valor colectivo proverbial y corresponde al uso bíblico habitual en español.
- source_word: יִתֵּן
  english_pob_choice: will be granted
  chosen_spanish: será concedido
  alternatives_spanish:
  - será dado
  - él dará
  lexicon: HALOT
  rationale: El verbo está en forma activa con sujeto no expresado. En español, el pasivo «será concedido» comunica el resultado deseado sin introducir un sujeto explícito que el hebreo no nombra, y evita resolver la ambigüedad del dador.
theological_decisions:
- issue: Sujeto implícito de יִתֵּן
  english_pob_reading: Leave the giver implicit in translation by using 'will be granted.'
  chosen_spanish_reading: Dejar implícito al dador con «será concedido».
  alternative_spanish_readings:
  - «Dios lo concederá»
  - «él dará»
  rationale: El hebreo no nombra al sujeto. Mantener el pasivo preserva la tensión teológica y la concisión sapiencial, sin añadir explícitamente a Dios ni a un sujeto humano que el texto no determina.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; la concordancia de revisión indica alta aprobación y ningún cambio necesario, por lo que esta propuesta sigue de cerca la lectura auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el texto lo requiera, pero este versículo no contiene el nombre divino explícito.
  - Se usa «impío»/«justos» como equivalentes proverbiales naturales en español, sin desplazar el contraste moral del hebreo.
  - La pasiva «será concedido» evita introducir un dador no expresado en el hebreo.
