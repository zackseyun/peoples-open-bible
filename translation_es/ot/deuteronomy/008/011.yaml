translation:
  language: es
  text: Ten cuidado, no sea que olvides a Yahvé tu Dios por no guardar sus mandamientos, sus juicios y sus estatutos[a][b], que yo te mando hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al no guardar» sus mandamientos, sus juicios y sus estatutos.'
    reason: lexical_alternative
  - marker: b
    text: 'Nombre divino: יְהוָה se traduce aquí «Yahvé», conforme al criterio del proyecto para preservar el nombre personal de Dios.'
    reason: theological_note
lexical_decisions:
- source_word: הִשָּׁמֶר
  english_pob_choice: Be careful
  chosen_spanish: Cuídate
  alternatives_spanish:
  - Ten cuidado
  - Guárdate
  - Vigílate
  lexicon: HALOT
  rationale: Es un imperativo de advertencia; «cuídate» comunica bien la alerta personal y suena natural en español sin perder el tono exhortativo solemne.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: HALOT
  rationale: Introduce una advertencia negativa. «No sea que» preserva el matiz preventivo y es idiomático en español bíblico contemporáneo.
- source_word: תִּשְׁכַּח
  english_pob_choice: you forget
  chosen_spanish: olvides
  alternatives_spanish:
  - llegues a olvidar
  - te olvides
  lexicon: HALOT
  rationale: El verbo expresa el peligro de olvidar a Yahvé; «olvides» mantiene la sencillez del hebreo en una construcción de advertencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT / nomen divinum
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios tuyo
  lexicon: HALOT
  rationale: Designación pactual directa y natural en español.
- source_word: לְבִלְתִּי שְׁמֹר
  english_pob_choice: by failing to keep
  chosen_spanish: dejando de guardar
  alternatives_spanish:
  - por no guardar
  - al no guardar
  - sin guardar
  lexicon: HALOT
  rationale: 'La construcción hebrea explica en qué consiste el olvido: en no guardar. «Dejando de guardar» refleja ese valor de manera idiomática y conserva la relación causal/manifestativa señalada por el audit trail.'
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: HALOT
  rationale: Término legal-covenantal estándar; «mandamientos» es claro y fiel.
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus decretos
  - sus leyes
  lexicon: HALOT
  rationale: Se conserva la fuerza jurídica de מִשְׁפָּט con «juicios», que puede sonar menos técnico que «ordenanzas» pero sigue la equivalencia preferida por el POB inglés.
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus leyes estatutarias
  lexicon: HALOT
  rationale: «Estatutos» reproduce el término jurídico tradicional para חֻקִּים y mantiene el paralelismo con los otros dos sustantivos.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: which I am commanding you today
  chosen_spanish: que yo te mando hoy
  alternatives_spanish:
  - que hoy te mando
  - que yo te estoy mandando hoy
  lexicon: HALOT
  rationale: La forma participial con valor presente/imperfectivo se expresa de modo natural con «te mando», conservando la urgencia de «hoy» en el contexto deuteronómico.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio divino revelado en el texto hebreo, siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «by not keeping» a «by failing to keep» para reflejar con más naturalidad la construcción infinitiva. En español, «dejando de guardar» conserva ese matiz de manifestación/resultado sin volverse rígido ni perder la relación lógica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «mandamientos / juicios / estatutos» conserva el paralelismo jurídico del original.
  - El imperativo de advertencia se traduce con una forma natural y solemne en español, sin diluir el tono preventivo.
  - No se introduce «Señor» como sustituto del Nombre divino.
