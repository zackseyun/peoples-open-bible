theological_decisions:
- issue: Rendering the covenant name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Characterization of Saul's sin
  chosen_reading: unfaithfulness
  alternative_readings:
  - trespass
  - breach of faith
  rationale: The verse frames Saul's offense as covenantal infidelity toward the LORD and his word, not merely a generic wrongdoing. 'Unfaithfulness' communicates this theological dimension in accessible English.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms §5
