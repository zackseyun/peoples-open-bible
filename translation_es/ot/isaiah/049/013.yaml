base_translation:
  language: en
  yaml_path: translation/ot/isaiah/049/013.yaml
  text: Shout for joy[a], O heavens, and rejoice, O earth; let the mountains break out in singing[c][b], for Yahweh has comforted his people and will have compassion on his afflicted ones.
  footnotes:
  - marker: a
    text: Or 'Sing for joy, O heavens.' The Hebrew verb can also be rendered 'sing for joy' rather than 'shout for joy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his poor' or 'his humble.' The Hebrew term can denote those who are afflicted, poor, or humble.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH.'
    reason: alternative_reading
