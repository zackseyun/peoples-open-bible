translation:
  language: es
  text: 'Entonces José le dijo: «Esta es la interpretación del sueño: las tres ramas[a] son tres días».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sarmientos» o «brotes» para el término hebreo traducido «ramas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa consecutiva introduce el avance de la escena; «Entonces» conserva esa progresión en español sin sonar demasiado mecánico.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al copero
  lexicon: HALOT
  rationale: El objeto pronominal explícito se mantiene como clítico dativo natural en español, sin suplir en el texto principal el referente específico.
- source_word: זֶה פִּתְרֹנוֹ
  english_pob_choice: This is its interpretation
  chosen_spanish: Esta es su interpretación
  alternatives_spanish:
  - Ésta es la interpretación de ello
  - Esta es su solución
  lexicon: HALOT
  rationale: «Interpretación» es el equivalente preciso para פִּתְרוֹן en el contexto de sueño; el posesivo «su» refleja el sufijo masculino singular y permite que el referente quede implícito, como en el inglés POB.
- source_word: שְׁלֹשֶׁת הַשָּׂרִגִים
  english_pob_choice: the three branches
  chosen_spanish: las tres ramas
  alternatives_spanish:
  - los tres sarmientos
  - los tres brotes
  lexicon: HALOT
  rationale: El sustantivo se refiere a las partes de la vid vistas en el sueño. «Ramas» es claro y natural en español; «sarmientos» sería más técnico pero menos inmediato para lectura pública.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: three days
  chosen_spanish: tres días
  lexicon: HALOT
  rationale: El numeral y el sustantivo temporal se traducen de manera directa y literal, porque la explicación identifica el símbolo con un período de tiempo.
- source_word: הֵם
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - son ellos
  lexicon: HALOT
  rationale: El pronombre independiente hebreo funciona de modo enfático en la ecuación predicativa; en español se expresa de forma natural con «son» sin sobrecargar la frase.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto español en el lugar correspondiente a «interpretación». La redacción se mantiene alineada con el sentido del hebreo y con la decisión auditada del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene el referente implícito de «su» para פִּתְרֹנוֹ, coherente con el inglés POB («its interpretation»).
  - «Entonces» conserva la progresión narrativa de וַיֹּאמֶר sin introducir una paráfrasis excesiva.
  - «Ramas» evita una tecnicidad innecesaria, pero la nota preserva la alternativa léxica documentada.
