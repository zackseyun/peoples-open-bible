translation:
  language: es
  text: Así los repartieron por suertes[a], éstos con aquéllos[b], porque había oficiales del santuario y oficiales de Dios entre los hijos de Eleazar y entre los hijos de Itamar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por sorteo»; el hebreo literalmente dice «por suertes/lotes».
    reason: lexical_alternative
  - marker: b
    text: O «un grupo con otro»; el hebreo literalmente dice «éstos con aquéllos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְלְקוּם
  english_pob_choice: they divided them
  chosen_spanish: los repartieron
  alternatives_spanish:
  - los dividieron
  - los distribuyeron
  lexicon: HALOT
  rationale: El verbo indica una acción concreta de repartir o asignar por partes. «Repartieron» comunica bien la distribución de los grupos y suena natural en español, sin perder el sentido material del hebreo.
- source_word: בְּגוֹרָל֖וֹת
  english_pob_choice: by lots
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suertes
  - mediante suertes
  lexicon: HALOT
  rationale: El sustantivo se refiere al acto de echar suertes para asignar turnos o porciones. «Por sorteo» es una forma clara y actual en español para expresar ese medio, preservando la idea de decisión por suertes.
- source_word: אֵ֣לֶּה עִם אֵ֑לֶּה
  english_pob_choice: these with those
  chosen_spanish: unos con otros
  alternatives_spanish:
  - éstos con aquéllos
  - unos junto con otros
  lexicon: HALOT
  rationale: La expresión hebrea es breve y distributiva. En español, «unos con otros» reproduce esa relación paralela sin sobreexplicar, y mantiene el contraste entre los grupos.
- source_word: שָֽׂרֵי קֹ֨דֶשׁ
  english_pob_choice: officers of the sanctuary
  chosen_spanish: jefes del santuario
  alternatives_spanish:
  - oficiales del santuario
  - príncipes del santuario
  lexicon: HALOT
  rationale: שָׂרִים puede significar jefes, oficiales o príncipes. En este contexto cultual, «jefes» funciona bien en español y «del santuario» evita una abstracción como «santidad», que no refleja tan directamente el ámbito institucional.
- source_word: וְשָׂרֵי הָאֱלֹהִים
  english_pob_choice: officers of God
  chosen_spanish: jefes de Dios
  alternatives_spanish:
  - oficiales de Dios
  - jefes del servicio de Dios
  lexicon: HALOT
  rationale: Se conserva la forma literal del hebreo, como hizo el inglés POB con «officers of God». «Jefes de Dios» suena un poco duro, pero preserva la tensión del original y no introduce una expansión como «del servicio de Dios» sin base explícita en el texto.
- source_word: מִבְּנֵי אֶלְעָזָר וּבִבְנֵי אִיתָמָר
  english_pob_choice: from the sons of Eleazar and from the sons of Ithamar
  chosen_spanish: entre los hijos de Eleazar y entre los hijos de Itamar
  alternatives_spanish:
  - de entre los hijos de Eleazar y de entre los hijos de Itamar
  - de los hijos de Eleazar y de los hijos de Itamar
  lexicon: HALOT
  rationale: La secuencia preposicional hebrea enmarca a los grupos dentro de ambas líneas sacerdotales. «Entre» refleja la distribución interna de los oficiales dentro de cada linaje y suena natural en español, manteniendo el paralelismo del verso.
theological_decisions:
- issue: Cómo verter שָׂרֵי קֹדֶשׁ וְשָׂרֵי הָאֱלֹהִים sin armonizarlo
  english_pob_reading: Two parallel designations for priestly officials are preserved without harmonizing or expanding them beyond the Hebrew.
  chosen_spanish_reading: 'Se preservan dos designaciones paralelas para los responsables sacerdotales: «jefes del santuario» y «jefes de Dios».'
  alternative_spanish_readings:
  - «príncipes del santuario» y «príncipes de Dios»
  - «oficiales del santuario» y «oficiales de Dios»
  - reformularlo como «jefes del servicio del templo»
  rationale: 'El versículo explica por qué se usó sorteo: había responsables aptos en ambas líneas sacerdotales. La traducción conserva el paralelismo y no sustituye la frase hebrea por una expansión interpretativa como «del servicio del templo», que no aparece en el texto.'
  doctrine_reference: 'Principios de traducción: fidelidad léxica, preservación del paralelismo y no harmonización indebida'
- issue: Valor de קֹדֶשׁ en contexto cultual
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - santidad
  - lo sagrado
  - lugar santo
  rationale: En este contexto, קֹדֶשׁ apunta al ámbito santuario/cultual más que a una cualidad abstracta. «Santuario» conserva mejor la referencia institucional y evita diluirla en un concepto más general.
  doctrine_reference: Principio de equivalencia optimal y semántica contextual
- issue: Permanencia de la literalidad de הָאֱלֹהִים
  english_pob_reading: of God
  chosen_spanish_reading: de Dios
  alternative_spanish_readings:
  - del Dios
  - del servicio de Dios
  - del templo de Dios
  rationale: Se mantiene la literalidad de la expresión, como en el audit trail inglés, porque el hebreo no añade «templo» ni «servicio». La frase queda algo más fuerte en español, pero esa tensión es parte del original.
  doctrine_reference: Principio de no expansión sin base textual
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin cambios sustantivos en la revisión más reciente. La versión española sigue de cerca la decisión inglesa de conservar la distribución por lotes y el paralelismo de «these with those», sin introducir expansión interpretativa adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término predeterminado solo donde aparezca el nombre divino explícito; aquí no aparece.
  - Se evitó «Cristo» porque no hay referencia a Χριστός en este versículo.
  - Se usó «santuario» para קֹדֶשׁ por el contexto cultual concreto.
  - Se conservó la literalidad de «de Dios» para הָאֱלֹהִים, siguiendo el audit trail inglés.
  - Se prefirió «jefes» sobre «príncipes/oficiales» por claridad natural en español, sin perder el valor de liderazgo del hebreo.
