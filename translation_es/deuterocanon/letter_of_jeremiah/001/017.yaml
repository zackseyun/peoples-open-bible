translation:
  language: es
  text: Y así como los atrios quedan cerrados en torno a uno que ha agraviado a un rey[a], como a uno llevado a la muerte, así los sacerdotes fortifican sus casas[b] con puertas, cerrojos y barras, para que no sean saqueadas por los ladrones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los recintos quedan asegurados alrededor de uno que ha ofendido al rey». El comienzo de la comparación es sintácticamente difícil, pero el sentido es que una fuerte seguridad rodea a un culpable condenado.'
    reason: lexical_alternative
  - marker: b
    text: «Sus casas» se refiere a las casas o edificios de los ídolos, custodiados por los sacerdotes.
    reason: cultural_note
lexical_decisions:
- source_word: περιτετράχηλαι εἰσὶν αἱ αὐλαί
  english_pob_choice: the courts are secured around
  chosen_spanish: los patios quedan cercados alrededor
  alternatives_spanish:
  - los atrios quedan encerrados alrededor
  - los recintos quedan asegurados alrededor
  lexicon: LSJ
  rationale: αὐλαί puede referirse a patios, atrios o recintos; el giro griego es difícil e idiomático. «Patios» conserva un sentido espacial natural en español, y «quedan cercados alrededor» transmite la idea de estar rodeados y asegurados sin forzar una terminología arquitectónica más precisa de la que exige el texto.
- source_word: τινὶ ἠδικηκότι βασιλέα
  english_pob_choice: one who has wronged a king
  chosen_spanish: uno que ha agraviado a un rey
  alternatives_spanish:
  - uno que ha ofendido a un rey
  - uno culpable contra un rey
  lexicon: BDAG
  rationale: ἠδικηκότι expresa haber obrado mal o haber hecho daño. «Agraviar» mantiene el matiz de ofensa/injusticia en un registro natural y digno en español, sin perder el sentido jurídico y relacional del verbo.
- source_word: ὡς ἐπὶ θάνατον ἀπηγμένῳ
  english_pob_choice: as one being led away to death
  chosen_spanish: como uno que es llevado a la muerte
  alternatives_spanish:
  - como uno conducido a la ejecución
  - como uno llevado para morir
  lexicon: LSJ
  rationale: ἀπάγω sugiere ser llevado bajo custodia. «Es llevado a la muerte» conserva la gravedad y el proceso, y evita añadir la especificación interpretativa de «ejecución» al texto principal.
- source_word: ὀχυροῦσιν
  english_pob_choice: fortify
  chosen_spanish: fortifican
  alternatives_spanish:
  - aseguran
  - refuerzan
  lexicon: LSJ
  rationale: El verbo denota fortalecer o hacer fuerte. «Fortifican» reproduce bien el tono satírico del pasaje, donde los sacerdotes tratan sus casas como si fueran fortalezas amenazadas.
- source_word: τοὺς οἴκους αὐτῶν
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus templos
  - sus santuarios
  lexicon: LSJ
  rationale: οἶκοι significa literalmente «casas». Mantener «sus casas» sigue de cerca el griego y deja que el contexto anti-idolátrico sugiera que se trata de las casas o edificios de los ídolos, sin introducir una precisión no explícita en el original.
- source_word: θυρώμασιν τε καὶ κλείθροις καὶ μοχλοῖς
  english_pob_choice: with doors and locks and bars
  chosen_spanish: con puertas, cerrojos y barras
  alternatives_spanish:
  - con puertas, cerraduras y barras
  - con portones, cerrojos y travesaños
  lexicon: LSJ
  rationale: Los tres sustantivos nombran elementos de seguridad física. «Puertas, cerrojos y barras» es claro en español moderno y conserva la acumulación enfática del griego.
- source_word: συληθῶσι
  english_pob_choice: be plundered
  chosen_spanish: sean saqueadas
  alternatives_spanish:
  - sean despojadas
  - sean robadas
  lexicon: BDAG
  rationale: συλάω puede significar despojar o saquear. «Saqueadas» expresa mejor el despojo de bienes en contexto de robo violento y preserva la fuerza del término.
- source_word: λῃστῶν
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - salteadores
  - bandoleros
  lexicon: BDAG
  rationale: λῃσταί son robbers/bandits. «Ladrones» comunica de manera directa y comprensible la amenaza contra la que se cierran las casas.
theological_decisions:
- issue: Referente de «sus casas» en un contexto anti-idolátrico
  english_pob_reading: Rendered literally as 'their houses' rather than interpretively as 'their temples.'
  chosen_spanish_reading: Se mantiene «sus casas» literalmente en vez de explicitar «sus templos» o «sus santuarios».
  alternative_spanish_readings:
  - sus templos
  - sus santuarios
  rationale: El griego dice οἴκους, «casas». Conservar esa literalidad preserva la ironía del pasaje y no introduce una precisión cultual que el texto no da de forma explícita. El contexto permite entender la referencia sin alterar la superficie del original.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete 1909 y coincide sustancialmente con la versión inglesa auditada, sin revisiones registradas en la pasarela más reciente; se ha mantenido la dificultad sintáctica del símil inicial y la referencia literal a «sus casas».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque el versículo no lo requiere.
  - «Casas» se conserva de forma literal para respetar οἶκους y la ironía del contexto.
  - «Ladrones» y «saqueadas» mantienen la imagen de robo violento sin suavizarla.
