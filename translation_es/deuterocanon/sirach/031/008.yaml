  language: en
  yaml_path: translation/deuterocanon/sirach/031/008.yaml
  text: Blessed is the man who is found blameless[b][a], and who has not gone astray after wealth.
  footnotes:
  - marker: a
    text: Hebrew text is difficult in the second clause. The sense is likely that the man has not gone astray in relation to wealth; alternatively, 'who has not gone astray after wealth' or 'who has not been led astray by money.'
    reason: alternative_reading
  - marker: b
    text: The Greek parallel for this verse differs substantially from the surviving Hebrew wording, so the translation follows the Hebrew while acknowledging uncertainty in the clause about wealth.
    reason: textual_variant
