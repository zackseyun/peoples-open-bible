review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: la reciprocidad enfática («Yo también»), la condición hipotética, la repetición de נֶפֶשׁ con nota léxica, la idea de acumular palabras contra los amigos y el gesto de mover la cabeza en señal de desprecio. Sin embargo, la última frase no refleja bien el modismo en español: «sacudir mi cabeza en su contra» suena poco natural y añade una formulación innecesariamente literal del destinatario.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «sacudir mi cabeza en su contra» es torpe y poco idiomático. «Meneando la cabeza ante ustedes» o «sacudiendo la cabeza ante ustedes» comunica mejor el gesto de burla/desdén. Además, conviene preservar la nota cultural inglesa sobre el gesto, ya que en español también puede entenderse como simple desaprobación y no necesariamente escarnio.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «vida» para נֶפֶשׁ es defendible aquí con nota que preserve «alma» como alternativa. No hay nombres divinos ni términos teológicos sensibles afectados.
  issues:
  - severity: medium
    issue: La expresión «sacudir mi cabeza en su contra» es poco natural en español.
    rationale: Aunque intenta representar literalmente el hebreo, no suena idiomática ni clara en registro bíblico moderno. El hebreo describe un gesto dirigido a ellos; en español se expresa mejor como «meneando la cabeza ante ustedes» o similar.
  - severity: medium
    issue: Falta una nota cultural para el gesto de la cabeza.
    rationale: El inglés POB documenta que el gesto es de escarnio o desprecio. En español, «sacudir/menear la cabeza» puede sugerir solo desacuerdo; la nota ayuda a conservar la fuerza contextual.
  revised_spanish_text: Yo también podría hablar como ustedes[a], si su vida[b] estuviera en lugar de mi vida; podría amontonar palabras contra ustedes y menear la cabeza ante ustedes[c].
