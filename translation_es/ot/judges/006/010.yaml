translation:
  language: es
  text: 'Y les dije: «Yo soy Yahvé, su Dios; no teman[a] a los dioses de los amorreos, en cuya tierra habitan. Pero no han escuchado mi voz[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No deben temer». El hebreo expresa una prohibición directa.'
    reason: lexical_alternative
  - marker: b
    text: «Escuchado mi voz» también puede entenderse como «obedecido mi voz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Y les dije
  - Y yo dije
  lexicon: HALOT
  rationale: La forma narrativa introduce una palabra previa de Yahvé; en español, «dije» conserva la primera persona y el valor de cita directa. Se omite «a ustedes» como complemento expreso en la frase principal porque se recupera inmediatamente con «a ustedes» y la cita, manteniendo fluidez.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino propio, no con una sustitución titulada. «Yahvé» sigue el uso del proyecto en español y preserva el nombre personal del pacto.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - tu Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológicamente, el referente es singular. En español, «su Dios» mantiene la referencia covenantal y funciona bien para un plural de destinatarios con tratamiento respetuoso.
- source_word: לֹא תִירְאוּ
  english_pob_choice: do not fear
  chosen_spanish: no teman
  alternatives_spanish:
  - no deben temer
  - no tengan temor
  lexicon: HALOT
  rationale: La negación con imperfecto expresa prohibición. «No teman» refleja la fuerza imperativa de manera directa y natural, sin añadir matiz de obligación que no está en el hebreo.
- source_word: אֶת אֱלֹהֵי הָאֱמֹרִי
  english_pob_choice: the gods of the Amorites
  chosen_spanish: a los dioses de los amorreos
  alternatives_spanish:
  - a los dioses del amorreo
  - a los dioses amorreos
  lexicon: HALOT
  rationale: El constructo señala a las deidades asociadas con ese pueblo; en español, el plural étnico «amorreos» es la forma natural. Se conserva «dioses» en plural porque el hebreo aquí no habla de un solo dios.
- source_word: אֲשֶׁר אַתֶּם יוֹשְׁבִים בְּאַרְצָם
  english_pob_choice: in whose land you dwell
  chosen_spanish: en cuya tierra habitan
  alternatives_spanish:
  - en cuya tierra viven
  - en cuya tierra residen
  lexicon: HALOT
  rationale: ישב expresa asentarse o habitar; «habitan» comunica residencia estable con buena dignidad literaria. Se antepone la relativa a «tierra» para ajustar la sintaxis española sin perder el vínculo con la tierra de los amorreos.
- source_word: וְלֹא שְׁמַעְתֶּם בְּקוֹלִי
  english_pob_choice: But you have not listened to my voice
  chosen_spanish: Pero no han escuchado mi voz
  alternatives_spanish:
  - Pero no han obedecido mi voz
  - Y no han escuchado mi voz
  lexicon: HALOT
  rationale: שמַע בקולִי conserva el idiomático «escuchar la voz» y también puede implicar obediencia. «Han escuchado» preserva el eco verbal y deja abierta la fuerza obediencial sin sustituirla por una paráfrasis más interpretativa.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene el nombre propio del pacto. Se mantiene la transliteración del nombre divino en español para no ocultarlo detrás de un título y para seguir la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the prohibition לֹא תִירְאוּ
  english_pob_reading: do not fear
  chosen_spanish_reading: no teman
  alternative_spanish_readings:
  - no deben temer
  - no tengan temor
  rationale: La forma hebrea expresa una prohibición directa; «no teman» reproduce esa fuerza sin convertirla en una obligación abstracta ni suavizarla excesivamente.
  doctrine_reference: HALOT / analysis of prohibitive imperfect
- issue: Meaning of שְׁמַעְתֶּם בְּקוֹלִי
  english_pob_reading: you have not listened to my voice
  chosen_spanish_reading: no han escuchado mi voz
  alternative_spanish_readings:
  - no han obedecido mi voz
  - no han atendido mi voz
  rationale: La POB inglesa preserva el idioma «listened to my voice» y anota que también puede entenderse como obediencia. En español, «escuchado mi voz» conserva el idiomático y deja visible la posible carga de desobediencia sin fijarla como única lectura.
  doctrine_reference: Hebrew idiom שמע בקול + note on obedience
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió la prohibición directa «do not fear» frente a «you must not fear». También conserva la nota alternativa sobre שמע בקול, entendiendo que el español debe mantener tanto la metáfora auditiva como la posible implicación de obediencia.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme a la terminología del proyecto en español.
  - Se usa «Dios» en singular para אֱלֹהֵיכֶם por el referente covenantal singular.
  - Se conserva el plural «dioses» para אֱלֹהֵי הָאֱמֹרִי, ya que el hebreo se refiere a las deidades de ese pueblo.
  - La prohibición se expresa con «no teman», ajustada a la revisión inglesa más reciente.
  - La voz verbal en presente de cita directa se adapta al español sin perder el valor narrativo de la fórmula introductoria.
