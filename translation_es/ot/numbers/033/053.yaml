review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mandato de tomar/obtener posesión de la tierra, habitar en ella, y razón causal basada en el don divino. Sin embargo, «despojarán la tierra» no es una formulación fiel ni natural en español para הורשתם con objeto «la tierra»; en español parece que se despoja a la tierra misma, no que se toma posesión de ella mediante desposesión de otros. El hebreo aquí, con objeto directo «la tierra», se expresa mejor como «tomarán posesión de la tierra» en el texto principal, preservando «heredarla» como alternativa léxica en nota.'
  spanish_quality_summary: El español es claro y de registro digno, pero «despojarán la tierra» suena impropio y poco idiomático. «Habitarán en ella» y «porque yo les he dado la tierra para poseerla» funcionan bien. Conviene ajustar solo el primer verbo para mejorar fidelidad semántica y naturalidad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «La tierra», «habitarán», «yo les he dado» y «poseerla» encajan bien. La decisión clave es evitar un calco inadecuado de «dispossess» en español y volver a una formulación natural que exprese ירשׁ en este contexto.
  issues:
  - severity: high
    issue: «despojarán la tierra» es un calco semánticamente equívoco
    rationale: En español, «despojar» normalmente requiere un poseedor/persona despojada de algo; aplicado a «la tierra» sugiere quitarle algo a la tierra, no tomar posesión de ella. El hebreo con objeto «la tierra» apunta al resultado de posesión/ocupación, no a que la tierra sea la entidad despojada.
  - severity: medium
    issue: La decisión léxica documentada en español defiende un matiz causativo que el texto español no comunica bien
    rationale: Aunque el análisis teológico sobre ירשׁ es válido, la forma elegida en español no preserva bien ese matiz. «Tomarán posesión de la tierra» comunica adecuadamente el mandato principal en esta construcción sintáctica.
  revised_spanish_text: Ustedes tomarán posesión de la tierra y habitarán en ella[a], porque yo les he dado la tierra para poseerla.
  revised_footnotes:
  - marker: a
    text: O «heredarla». El verbo hebreo ירשׁ puede expresar tanto heredar como tomar posesión, especialmente en contextos de promesa de tierra del pacto.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «despojarán la tierra» por «tomarán posesión de la tierra» porque esa es la manera fiel y natural de expresar הורשתם cuando el objeto directo es «la tierra». Se conserva la nota léxica sobre «heredarla», que sigue siendo una alternativa válida en contexto de promesa de tierra.
