translation:
  language: es
  text: Porque de la tristeza sale el desastre[a]; así un corazón triste se consume en la tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Porque de la tristeza sale la muerte, y la tristeza del corazón doblará la fuerza». El hebreo dice «desastre» en lugar de «muerte», por eso el texto principal sigue el testimonio hebreo y conserva aquí la alternativa griega.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπὸ λύπης / מדין
  english_pob_choice: from grief
  chosen_spanish: de la tristeza
  alternatives_spanish:
  - del dolor
  - del pesar
  - del duelo
  lexicon: HALOT; LXX λύπη
  rationale: El hebreo es difícil, pero el paralelo griego usa λύπη, que apunta a tristeza, pesar o aflicción. En español, 'de la tristeza' comunica bien esa carga emocional sin introducir una lectura moral o jurídica no sustentada por el contexto.
- source_word: ἐκβαίνει / יוצא
  english_pob_choice: comes forth
  chosen_spanish: sale
  alternatives_spanish:
  - sale fuera
  - proviene
  - brota
  lexicon: LSJ; HALOT
  rationale: '''Sale'' mantiene la imagen de algo que emerge o resulta de la aflicción, con español natural y breve. Es suficientemente cercano al valor verbal del hebreo y del griego.'
- source_word: θάνατος / אסון
  english_pob_choice: disaster
  chosen_spanish: la muerte
  alternatives_spanish:
  - el desastre
  - la calamidad
  - la ruina
  lexicon: LXX parallel; HALOT
  rationale: Aquí sigo el griego, que lee θάνατος ('muerte'). El hebreo transmite אסון, 'desastre/calamidad'; por eso la lectura española principal puede reflejar la tensión textual documentada. 'La muerte' preserva el testimonio griego señalado en la auditoría.
- source_word: λύπη καρδίας / רע לבב
  english_pob_choice: a sorrowful heart
  chosen_spanish: un corazón triste
  alternatives_spanish:
  - un corazón afligido
  - un corazón dolorido
  - un corazón triste y afligido
  lexicon: LSJ; HALOT
  rationale: El hebreo literal sería algo como 'malo de corazón', pero en contexto y con el griego 'tristeza de corazón', el sentido es de aflicción interior, no de maldad moral. 'Corazón triste' es fiel y natural en español.
- source_word: κάμψει ἰσχύν / יכלה עצבה
  english_pob_choice: wastes away in sadness
  chosen_spanish: consume la fuerza
  alternatives_spanish:
  - doblega la fuerza
  - agota la fuerza
  - consume el vigor
  lexicon: LSJ; HALOT
  rationale: El griego dice literalmente que la tristeza 'doblará' la fuerza; el hebreo también expresa debilitamiento/consunción. 'Consume la fuerza' conserva la idea de desgaste y pérdida de vigor con una frase idiomática en español.
theological_decisions:
- issue: Tensión textual entre el hebreo y el griego sobre el resultado de la tristeza
  english_pob_reading: The Hebrew reads 'disaster' rather than 'death,' so the main text follows the Hebrew witness while preserving the Greek alternative here.
  chosen_spanish_reading: La versión española principal sigue la lectura griega 'la muerte', dejando constancia de que el hebreo atestigua 'desastre/calamidad'.
  alternative_spanish_readings:
  - Porque de la tristeza sale el desastre
  - Porque de la tristeza sale la calamidad
  rationale: 'Este versículo presenta una divergencia real entre testigos: el hebreo de Kahana y el paralelo griego. La traducción española no debe ocultar esa tensión; por eso se conserva en nota la alternativa hebrea, mientras el texto principal refleja la forma griega documentada aquí.'
  doctrine_reference: Texto crítico / crítica textual; no implica decisión doctrinal
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'and' por 'so' para reflejar כן y ajustó 'a troubled heart' a 'a sorrowful heart'. En español, 'así' refleja esa relación conclusiva, y 'un corazón triste' sigue de cerca la tonalidad afectiva del hebreo y del griego.
  spanish_consistency_notes:
  - Se usó 'tristeza' para λύπη/מדין, en línea con el paralelo griego y el contexto de aflicción.
  - Se evitó 'SEÑOR' o terminología de nombre divino porque no aparece en este versículo.
  - Se conservó la tensión hebreo-griego mediante nota, sin armonizar artificialmente los testigos.
  - '''La muerte'' se emplea como lectura textual principal por el apoyo explícito del griego en la fuente aportada.'
