review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: εὐλογία = «bendición», μετʼ αὐτοῦ = «con él», y suple correctamente la cópula implícita con «está». También conserva la alternativa léxica de ἐν ἰσχύϊ en nota. Sin embargo, «en fuerza» suena poco natural en español y no representa tan bien la fuerza instrumental/circunstancial de ἐν ἰσχύϊ como una opción más idiomática.'
  spanish_quality_summary: «Y la bendición de Yahvé está con él» es claro y digno. El único problema de legibilidad importante es «en fuerza», que en español eclesial general resulta torpe y calcado. «Con fuerza» mantiene cercanía semántica con el griego y mejora notablemente la naturalidad. La nota debe ajustarse para no repetir la nueva lectura principal.
  glossary_alignment: El uso de «Yahvé» concuerda con la política del proyecto para el nombre divino. «Bendición» y «con él» están bien. No hay conflicto teológico relevante. La revisión propuesta solo corrige la expresión de ἐν ἰσχύϊ hacia un español más fielmente idiomático.
  issues:
  - severity: medium
    issue: La frase «en fuerza» es poco idiomática en español.
    rationale: Aunque reproduce formalmente el inglés «in strength», en español suena forzada y puede entorpecer la comprensión. Para ἐν ἰσχύϊ, «con fuerza» comunica mejor la idea en español sin perder el sentido de fuerza/might/power.
  - severity: low
    issue: La nota textual queda desalineada si se mantiene «en poder»/«con poder» como únicas alternativas sin distinguir la nueva lectura principal.
    rationale: Si el texto principal se corrige a «con fuerza», conviene preservar las alternativas del inglés como variantes léxicas reales y no repetir la formulación principal.
  revised_spanish_text: Y la bendición de Yahvé está con él con fuerza,[a]
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «con poder» o «con gran poder».'
    reason: lexical_alternative
  revision_rationale: Se cambia «en fuerza» por «con fuerza» porque ἐν ἰσχύϊ debe sonar natural en español sin perder el campo semántico de fuerza/might/power. La nota se ajusta para conservar alternativas léxicas útiles en español sin duplicar la lectura principal.
