translation:
  language: es
  text: 'Y ellos dijeron: «Es mentira. Por favor, dinos». Entonces él dijo: «Así y así[a] me habló, diciendo: “Así dice Yahvé: te he ungido rey sobre Israel”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «así y así», un modismo que indica un resumen indefinido o parcial; también puede entenderse como «tal y tal cosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁקֶר
  english_pob_choice: That is a lie
  chosen_spanish: Es mentira
  alternatives_spanish:
  - Es una mentira
  - Eso es mentira
  - Falso
  lexicon: HALOT
  rationale: El sustantivo hebreo significa 'mentira/falsehood'. En español natural, tras un enunciado directo, 'Es mentira' reproduce la acusación sin forzar una estructura más pesada. Mantiene el tono abrupto del diálogo.
- source_word: הַגֶּד נָא לָנוּ
  english_pob_choice: Please tell us
  chosen_spanish: Por favor, dinos
  alternatives_spanish:
  - Te rogamos que nos digas
  - Dinos, por favor
  - Cuéntanos, por favor
  lexicon: HALOT
  rationale: הַגֶּד es el imperativo causativo de נגד, 'decir/declarar'; נָא añade cortesía o ruego urgente. 'Por favor, dinos' expresa bien la petición urgente y suena natural en español contemporáneo.
- source_word: כָּזֹאת וְכָזֹאת
  english_pob_choice: this and that
  chosen_spanish: Así y así
  alternatives_spanish:
  - Esto y aquello
  - Tal y tal cosa
  - Tal y cual
  lexicon: HALOT
  rationale: El hebreo es un modismo de resumen indefinido, no una cita literal. 'Así y así' conserva el carácter vago y formal del hebreo, y corresponde mejor que una paráfrasis más expansiva.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  - Así dice el SEÑOR
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. Se mantiene el presente solemne 'dice' para conservar el valor oracular. Se traduce el nombre divino como 'Yahvé' según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. 'Yahvé' preserva el Tetragrámaton sin sustituirlo por una máscara litúrgica.
- source_word: מְשַׁחְתִּיךָ
  english_pob_choice: I have anointed you
  chosen_spanish: Yo te he ungido
  alternatives_spanish:
  - Te he ungido
  - Yo te ungí
  - Te ungí
  lexicon: HALOT
  rationale: 'El verbo משׁח se refiere a ungir con sentido real y teológico. El perfecto hebreo en discurso directo se vierte bien con pretérito perfecto compuesto en español: ''he ungido''.'
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  - para rey
  lexicon: HALOT
  rationale: La preposición ל marca nombramiento a un cargo. En español, 'rey' funciona de modo natural sin añadir una preposición que debilite la fórmula.
- source_word: אֶל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - para Israel
  lexicon: HALOT
  rationale: Aunque אֶל puede significar 'a/hacia', en el contexto de entronización se expresa mejor la idea de gobierno con 'sobre'. Esto preserva el sentido de investidura real.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. Se mantiene el nombre propio divino en la forma indicada por el proyecto, evitando el reemplazo litúrgico por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética כֹּה אָמַר יְהוָה
  english_pob_reading: Thus says Yahweh
  chosen_spanish_reading: Así dice Yahvé
  alternative_spanish_readings:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  rationale: Conviene conservar la cadencia formal de la mensajería profética. El presente de 'dice' transmite mejor la fuerza oracular que un pasado, y no atenúa la autoridad de la declaración.
  doctrine_reference: Estilo profético y consistencia terminológica del proyecto
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que sustituyó una formulación demasiado coloquial por una expresión más formal e idiomática para el resumen indefinido ('thus and thus'). En español se adoptó 'Así y así' para reflejar ese mismo registro y conservar el carácter indeterminado del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al criterio del proyecto para יְהוָה.
  - Se usó 'ungido' para משׁח, conservando el valor real y teológico.
  - Se tradujo el modismo כָּזֹאת וְכָזֹאת de forma no literal pero suficientemente cercana para preservar su indefinición.
  - La estructura de discurso directo se mantuvo para reflejar la sucesión de voces del hebreo.
