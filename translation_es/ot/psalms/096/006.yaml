translation:
  language: es
  text: Esplendor y majestad están delante de él[a]; fuerza y belleza están en su santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuerza y esplendor están en su santuario». תִפְאֶרֶת también puede traducirse «esplendor» o «gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹד
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - honor
  - gloria
  - majestad
  lexicon: HALOT
  rationale: Hôd expresa magnificencia solemne o esplendor. «Esplendor» conserva ese matiz y mantiene la distinción poética frente a הָדָר.
- source_word: הָדָר
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - honor
  - belleza
  - gloria
  lexicon: HALOT
  rationale: En paralelismo con הוֹד, הָדָר añade la idea de dignidad regia y exaltada. «Majestad» reproduce mejor ese tono que «honor» o «belleza».
- source_word: לְפָנָיו
  english_pob_choice: are before him
  chosen_spanish: están delante de él
  alternatives_spanish:
  - están ante él
  - están en su presencia
  lexicon: HALOT
  rationale: La preposición indica espacialmente «delante de él». «Están delante de él» conserva la imagen original con una sintaxis natural en español.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - vigor
  - fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza o poder. «Fuerza» resulta clara y mantiene el balance poético con תִפְאֶרֶת.
- source_word: תִפְאֶרֶת
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - gloria
  - esplendor
  - ornato
  lexicon: HALOT
  rationale: Aquí תִפְאֶרֶת puede significar belleza, gloria o esplendor. «Belleza» preserva el contraste estético con «fuerza» y evita repetir el campo semántico de הוֹד/הָדָר.
- source_word: בְּמִקְדָּשׁוֹ
  english_pob_choice: in his sanctuary
  chosen_spanish: en su santuario
  alternatives_spanish:
  - en su lugar santo
  - en su templo
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa un lugar santo o santuario. «Santuario» es amplio, preciso y no fuerza una identificación más concreta que la del hebreo.
theological_decisions:
- issue: Referencia de los pronombres («él», «su»).
  english_pob_reading: The suffixes refer to the LORD in the psalm's context.
  chosen_spanish_reading: Los pronombres se refieren a Yahvé según el contexto inmediato del salmo.
  alternative_spanish_readings:
  - los pronombres podrían dejarse sin explicitar en notas
  - referencia genérica a Dios sin nombrarlo
  rationale: El hebreo usa sufijos pronominales sin repetir el nombre divino. En español, mantener «él» y «su» conserva el flujo poético; la referencia implícita es Yahvé por el contexto del salmo.
  doctrine_reference: Salmos 96:1-6; filosofia de traducción §1
translation_notes:
  revision_awareness: El texto inglés reciente se mantiene sin cambios relevantes; se conserva la disyuntiva léxica de תִפְאֶרֶת mediante nota, como en el audit trail. No hay revisiones aplicadas que obliguen a ajustar el sentido base.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma estándar del nombre divino cuando el contexto lo requiera explícitamente, aunque aquí el verso usa solo pronombres.
  - Se evita «SEÑOR» como máscara del nombre divino, en coherencia con el proyecto.
  - 'Se mantiene el paralelismo poético con dos binomios: «esplendor/majestad» y «fuerza/belleza».'
  - «Santuario» conserva el espacio sagrado sin especificar «templo» donde el hebreo no lo exige.
