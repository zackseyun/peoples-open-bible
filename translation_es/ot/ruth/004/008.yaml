translation:
  language: es
  text: 'Entonces el redentor[a] dijo a Booz: «Cómpralo para ti», y se quitó su sandalia[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pariente redentor». El término hebreo se refiere a un pariente cercano con responsabilidad legal de redimir la propiedad o la línea familiar.
    reason: lexical_alternative
  - marker: b
    text: Quitar la sandalia funcionaba como una señal legal consuetudinaria en esta transacción; compárese Rut 4:7.
    reason: cultural_note
lexical_decisions:
- source_word: הַגֹּאֵל
  english_pob_choice: the redeemer
  chosen_spanish: el redentor
  alternatives_spanish:
  - el pariente redentor
  - el pariente-rescatador
  lexicon: HALOT
  rationale: גאל en Rut designa al pariente con obligación legal de rescatar. «Redentor» preserva la función jurídica y familiar con naturalidad en español; «pariente redentor» explicita la relación, pero suena más interpretativo.
- source_word: לְבֹעַז
  english_pob_choice: to Boaz
  chosen_spanish: a Boaz
  alternatives_spanish:
  - para Boaz
  lexicon: transliteración propia
  rationale: La preposición con nombre propio se traduce de forma directa al español con «a» en el complemento verbal de hablar.
- source_word: קְנֵה
  english_pob_choice: Buy
  chosen_spanish: Cómpralo
  alternatives_spanish:
  - Adquiérelo
  - Cómpralo
  lexicon: HALOT
  rationale: El imperativo de קנה aquí está en un contexto legal de compraventa. «Cómpralo» reproduce el valor imperativo y el objeto implícito del derecho o la porción en cuestión, siguiendo el sentido inmediato del intercambio.
- source_word: לָךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para usted
  lexicon: HALOT
  rationale: El sufijo pronominal marca beneficio/repercusión para la misma persona. «Para ti» es la forma natural en español y conserva el matiz reflexivo de la orden.
- source_word: וַיִּשְׁלֹף
  english_pob_choice: and he took off
  chosen_spanish: y se quitó
  alternatives_spanish:
  - y desenvainó
  - y sacó
  lexicon: HALOT
  rationale: En el contexto de una sandalia, el verbo significa retirar/quitar. «Se quitó» es el equivalente idiomático más claro en español y evita una literalidad extraña como «sacó».
- source_word: נַעֲלוֹ
  english_pob_choice: his sandal
  chosen_spanish: su sandalia
  alternatives_spanish:
  - su zapato
  - su calzado
  lexicon: HALOT
  rationale: El hebreo se refiere a una sandalia en el marco cultural antiguo. «Sandalia» es más preciso que «zapato» y mantiene el referente material del signo legal.
theological_decisions:
- issue: Título legal-familiar גֹּאֵל en Rut
  english_pob_reading: the redeemer
  chosen_spanish_reading: el redentor
  alternative_spanish_readings:
  - el pariente redentor
  - el pariente-rescatador
  rationale: La POB inglesa opta por una forma concisa que conserva la función de rescate legal. En español, «redentor» mantiene esa tensión entre parentesco y obligación jurídica sin imponer una glosa excesiva en el texto principal.
  doctrine_reference: Rut 4; Levítico 25
- issue: Gesto de quitar la sandalia como señal jurídica
  english_pob_reading: Removing the sandal functioned as a customary legal sign in this transaction; compare Ruth 4:7.
  chosen_spanish_reading: se quitó su sandalia como señal legal consuetudinaria
  alternative_spanish_readings:
  - se quitó su sandalia
  - se descalzó
  rationale: El texto narra una costumbre jurídica antigua. La formulación principal conserva el acto concreto y su función legal sin añadir una interpretación ajena al pasaje.
  doctrine_reference: Rut 4:7-8
translation_notes:
  revision_awareness: 'El registro inglés actual no presenta revisiones textuales ni cambios recientes: latest_revision_pass indica que no hubo cambios y cross_check_summary reporta alta concordancia. La traducción española sigue ese estado estable y mantiene las decisiones léxicas clave del POB inglés sin introducir variantes no atestiguadas.'
  spanish_consistency_notes:
  - Se mantiene «Boaz» como nombre propio transliterado, coherente con el POB inglés.
  - Se usa «redentor» en lugar de «SEÑOR» o «pariente redentor» en el cuerpo principal para conservar la concisión y el peso técnico-jurídico del término.
  - «Sandalia» se conserva por precisión cultural del signo legal antiguo.
  - La sintaxis narrativa con «Entonces» reproduce la secuencia del waw-consecutivo sin forzar un calco mecánico.
