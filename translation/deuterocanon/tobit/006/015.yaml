id: TOB.6.15
reference: Tobit 6:15
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἐγὼ μόνος εἰμὶ τῷ πατρί, καὶ φοβοῦμαι μὴ εἰσελθὼν ἀποθάνω καθὼς καὶ οἱ πρότεροι, ὅτι δαιμόνιον φιλεῖ αὐτὴν ὃ οὐκ ἀδικεῖ οὐδένα πλὴν τῶν προσαγόντων αὐτῇ. καὶ νῦν ἐγὼ φοβοῦμαι μὴ ἀποθάνω, καὶ κατάξω τὴν ζωὴν τοῦ πατρός μου καὶ τῆς μητρός μου μετʼ ὀδύνης ἐπʼ ἐμοὶ εἰς τὸν τάφον αὐτῶν· καὶ υἱὸς ἕτερος οὐχ ὑπάρχει αὐτοῖς ὃς θάψει αὐτούς.
  language: Greek
  pages:
  - 832
  - 835
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  - 848
  - 849
  confidence: high
  validation: agree
translation:
  text: And now I am my father's only one[a], and I am afraid that if I go in, I will die, just as the former ones did, because a demon loves her, and it harms no one except those who approach her. And now I am afraid that I may die and bring down the life of my father and my mother in grief because of me to their grave[c][b]; and they have no other son who will bury them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those before me'; the phrase refers to Sarah's previous husbands or suitors.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'a demon loves her,' expressing the demon's possessive attachment to Sarah.
    reason: lexical_alternative
  - marker: c
    text: Literally 'bring down the life of my father and my mother ... to their grave'—an idiom for causing them to die in grief because of me.
    reason: cultural_note
lexical_decisions:
- source_word: μόνος
  chosen: only one
  alternatives:
  - alone
  - only son
  lexicon: LSJ
  rationale: In context with τῷ πατρί ('to/for my father'), the sense is that Tobias is his father's sole remaining child. 'Only one' preserves the Greek wording without over-specifying 'son,' though the following clause confirms sonship.
- source_word: φοβοῦμαι μὴ εἰσελθὼν ἀποθάνω
  chosen: I am afraid that if I go in, I will die
  alternatives:
  - I fear lest, after entering, I die
  - I am afraid I may die when I go in
  lexicon: BDAG
  rationale: This renders the idiom φοβοῦμαι μή with natural English while preserving the contingent sense tied to entering the marriage chamber/going in to her.
- source_word: οἱ πρότεροι
  chosen: the former ones
  alternatives:
  - the previous ones
  - those before me
  lexicon: LSJ
  rationale: The phrase refers to Sarah's previous husbands/suitors. 'Former ones' is formally close; the referent is clear from context.
- source_word: δαιμόνιον
  chosen: a demon
  alternatives:
  - an evil spirit
  lexicon: BDAG
  rationale: The Greek plainly denotes a demon. 'Demon' is the most direct and standard rendering.
- source_word: φιλεῖ αὐτήν
  chosen: loves her
  alternatives:
  - is attached to her
  - desires her
  lexicon: LSJ
  rationale: φιλέω ordinarily means 'love' or 'have affection for.' Here it describes the demon's possessive attachment to Sarah. 'Loves her' is the plain lexical sense, even though the context makes the attachment malign.
- source_word: ἀδικεῖ
  chosen: harms
  alternatives:
  - wrongs
  - injures
  lexicon: BDAG
  rationale: Although ἀδικέω can mean 'do wrong to,' in this context the practical effect is physical harm or destruction. 'Harms' communicates the sense clearly in modern English.
- source_word: τῶν προσαγόντων αὐτῇ
  chosen: those who approach her
  alternatives:
  - those who come near her
  - those who are brought to her
  lexicon: LSJ
  rationale: The participle can suggest coming to her, likely in marriage. 'Approach her' preserves the broader Greek without narrowing too much.
- source_word: κατάξω τὴν ζωὴν ... εἰς τὸν τάφον αὐτῶν
  chosen: bring down the life of my father and my mother in grief because of me to their grave
  alternatives:
  - bring my father's and my mother's life down to the grave in sorrow because of me
  - cause my parents to go down to the grave in grief because of me
  lexicon: LSJ
  rationale: The idiom expresses causing their lives to descend to the grave in sorrow, that is, bringing them to a sorrowful death. The chosen rendering stays close to the Greek imagery while remaining intelligible.
- source_word: μετʼ ὀδύνης
  chosen: in grief
  alternatives:
  - with sorrow
  - in pain
  lexicon: LSJ
  rationale: The phrase denotes sorrowful anguish. 'In grief' is concise and natural.
- source_word: υἱὸς ἕτερος οὐχ ὑπάρχει αὐτοῖς
  chosen: they have no other son
  alternatives:
  - no other son exists for them
  - there is no other son for them
  lexicon: BDAG
  rationale: This is straightforward existential language. 'They have no other son' is idiomatic English.
- source_word: ὃς θάψει αὐτούς
  chosen: who will bury them
  alternatives:
  - to bury them
  lexicon: BDAG
  rationale: The future verb expresses the expected filial duty of burial. 'Who will bury them' preserves that sense.
