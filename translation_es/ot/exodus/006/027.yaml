translation:
  language: es
  text: Estos son los que hablaron[a] al faraón, rey de Egipto, para sacar a los hijos de Israel[b] de Egipto; este es Moisés y Aarón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los que hablaban» o «los que estaban hablando». El hebreo usa un participio para una caracterización en curso.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice más específicamente «los hijos de Israel»; la expresión tradicional «los israelitas» es menos transparente al hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵם
  english_pob_choice: These are the ones
  chosen_spanish: Estos son los que
  alternatives_spanish:
  - Ellos son los que
  - Estos son
  lexicon: HALOT
  rationale: El pronombre independiente tiene fuerza identificadora y resumptiva. En español, «Estos son los que» conserva esa identificación enfática con una construcción natural y publicada para lectura pública.
- source_word: הַמְדַבְּרִים
  english_pob_choice: who spoke
  chosen_spanish: hablaban
  alternatives_spanish:
  - hablaban
  - estaban hablando
  - hablaban continuamente
  lexicon: HALOT
  rationale: El participio hebreo expresa una caracterización en curso; por eso se mantiene la idea de acción continua. «Hablaban» suena natural en español y preserva mejor el valor aspectual que un simple pretérito puntual.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: el faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, rey de Egipto
  - el faraón rey de Egipto
  lexicon: HALOT
  rationale: Se conserva la apposición del título real. En español, la coma marca con claridad la relación explicativa sin añadir material interpretativo.
- source_word: לְהוֹצִיא
  english_pob_choice: to bring ... out
  chosen_spanish: para sacar
  alternatives_spanish:
  - para hacer salir
  - para sacar fuera
  lexicon: HALOT
  rationale: El hiphil de יצא es causativo. «Sacar» comunica de modo natural la idea de hacer salir sin perder el sentido de acción intencional dirigida a liberar al pueblo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la equivalencia más transparente con el hebreo. Aunque «hijos» puede leerse de forma inclusiva en español bíblico, aquí conserva mejor la huella léxica del constructo hebreo que «israelitas».
- source_word: מִמִּצְרָיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de Egipto
  - saliendo de Egipto
  lexicon: HALOT
  rationale: En combinación con «sacar», «de Egipto» es el complemento natural en español y preserva el valor direccional del hebreo sin redundancia innecesaria.
- source_word: הוּא
  english_pob_choice: this is
  chosen_spanish: estos son
  alternatives_spanish:
  - éste es
  - son
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, el español identifica de manera más natural a un grupo con plural. Se conserva el gesto de identificación final sin forzar una concordancia artificial.
- source_word: מֹשֶׁה וְאַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: Moisés y Aarón
  alternatives_spanish:
  - Moisés y Aarón
  lexicon: HALOT
  rationale: Se mantienen los nombres propios en su forma tradicional en español, que corresponde al uso bíblico recibido y resulta plenamente inteligible.
theological_decisions:
- issue: Sons of Israel vs. children of Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos varones de Israel
  - los israelitas
  rationale: La decisión sigue la precisión morfológica del hebreo masculino plural constructo. «Hijos de Israel» conserva la forma del texto sin imponer una neutralización que borre el dato lexical. En este versículo no se requiere aclaración doctrinal adicional, solo fidelidad semántica.
  doctrine_reference: Precisión léxica del texto base; política de exactitud gramatical del plural masculino
- issue: Participio hebreo y carácter continuo de la acción de hablar
  english_pob_reading: who were speaking
  chosen_spanish_reading: hablaban
  alternative_spanish_readings:
  - estaban hablando
  - hablaban continuamente
  rationale: El participio caracteriza a Moisés y Aarón por su acción ante Faraón, no solo por un evento puntual. «Hablaban» permite reflejar esa caracterización continua sin añadir una perífrasis excesiva.
  doctrine_reference: Aspecto verbal del hebreo bíblico; preservación de tensiones aspectuales
- issue: Identificación final con singular hebreo frente a plural español
  english_pob_reading: this is Moses and Aaron
  chosen_spanish_reading: estos son Moisés y Aarón
  alternative_spanish_readings:
  - éste es Moisés y Aarón
  - son Moisés y Aarón
  rationale: El hebreo presenta un singular resumptivo que introduce una identificación colectiva. El español requiere plural para la concordancia natural con el referente múltiple, pero se conserva la función identificadora del cierre.
  doctrine_reference: Concordancia natural en español frente a estructura resumptiva hebrea
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y no se siguió mecánicamente su sintaxis cuando el español requería una concordancia más natural. Se mantuvieron las tensiones relevantes: el participio hebreo con valor de caracterización continua, la precisión léxica de «los hijos de Israel» y el cierre identificador con singular hebreo adaptado a plural español.'
  spanish_consistency_notes:
  - Se usa «faraón» en minúscula salvo inicio de oración, conforme al uso editorial bíblico en español.
  - Se mantienen los nombres propios tradicionales «Moisés» y «Aarón».
  - «Sacar» se eligió para לְהוֹצִיא por su naturalidad y por conservar el matiz causativo sin sobretraducción.
