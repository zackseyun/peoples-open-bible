review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego: κατευθυνεῖς = «dirigirás», ἐν καιρῷ ἀντιλήψεως σου = «en el tiempo de tu ayuda», τοῦ ἐλεῆσαι = propósito, «para tener misericordia», τὸν οἶκον Ἰακώβ = «la casa de Jacob», y la forma difícil ἐπηγγείλω αὐτοῖς se refleja correctamente como «les prometiste» con nota. La única desalineación relevante es sintáctica: «en el día que les prometiste» en español sugiere que se prometió el día mismo, pero el griego «εἰς ἡμέραν ἐν ᾗ» apunta más naturalmente a «para el día en que…» o «para el día que…», con matiz prospectivo hacia un día señalado.'
  spanish_quality_summary: El español es claro y digno, pero «en el día que les prometiste» suena algo forzado y ambiguo. También «para tener misericordia» es comprensible, aunque en oración dirigida a Dios resulta más natural «para tener misericordia de» o, mejor aún, mantener la estructura con claridad temporal mejorada. Una leve reparación produce un español más natural sin alejarse del griego ni del audit trail.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «La casa de Jacob» preserva correctamente la expresión pactal; no hay términos sensibles como Yahvé/Mesías/Espíritu en este versículo. La nota textual sobre «les prometiste / les prometí» está bien conservada.
  issues:
  - severity: medium
    issue: La frase «en el día que les prometiste» es ambigua y no refleja bien el valor prospectivo de εἰς ἡμέραν ἐν ᾗ.
    rationale: En español, la construcción actual puede entenderse como que Dios prometió «el día», mientras que el griego mira hacia un día señalado relacionado con la promesa. «Para el día en que les prometiste» o similar comunica mejor la sintaxis y el sentido.
  - severity: low
    issue: La nota a incluye comilla inicial sobrante en la redacción.
    rationale: '«''O: …» presenta puntuación innecesaria/errónea. Conviene normalizarla para buena presentación editorial.'
  revised_spanish_text: Tú nos dirigirás en el tiempo de tu ayuda[a], para tener misericordia de la casa de Jacob para el día en que les prometiste[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Tú nos encaminarás». El verbo griego puede expresar también la idea de hacer recto el camino o dirigir la marcha.'
    reason: lexical_alternative
  - marker: b
    text: La forma verbal final es textualmente difícil; aquí se entiende en contexto como «les prometiste». Una posibilidad más literal, pero menos adecuada al contexto, sería «les prometí».
    reason: textual_variant
  revision_rationale: 'Se ajusta la frase temporal final para reflejar mejor εἰς ἡμέραν ἐν ᾗ con un español más natural y menos ambiguo: «para el día en que les prometiste». También se corrige la puntuación de la nota a. El resto del versículo preserva adecuadamente el sentido griego y las decisiones auditadas en inglés.'
