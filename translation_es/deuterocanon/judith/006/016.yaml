revisions:
- from: Y llamó a todos los ancianos de la ciudad, y corrieron juntos todos sus jóvenes y las mujeres[a] a la asamblea; y pusieron a Ajior en medio de todo su pueblo, y Ozías le preguntó lo ocurrido.
  to: Y convocó a todos los ancianos de la ciudad, y corrieron juntos a la asamblea todos sus jóvenes varones[a] y las mujeres; y pusieron a Ajior en medio de todo su pueblo, y Ozías le preguntó lo ocurrido.
  rationale: Se revisa «llamó» a «convocó» para reflejar mejor συνεκάλεσεν como reunión formal de los ancianos. Se cambia «jóvenes» por «jóvenes varones» para conservar el contraste del griego entre νεανίσκος y γυναῖκες, evitando que el español sugiera un grupo juvenil mixto. Se reemplaza la nota al pie para explicar esta decisión léxica real. El resto del verso puede mantenerse como fiel y natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:23Z'
