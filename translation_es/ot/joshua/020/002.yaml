    rationale: En español bíblico y editorial suena mejor «modismo» o «expresión idiomática» que «idiomismo».
  - severity: low
    issue: Puntuación tipográfica mejorable
    rationale: El punto final debe colocarse dentro de las comillas que cierran la cita directa en esta construcción española, y conviene mantener puntuación más natural.
