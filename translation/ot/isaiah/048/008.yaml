theological_decisions:
- issue: Whether 'from the womb' describes literal prenatal guilt or idiomatic lifelong rebelliousness
  chosen_reading: Idiomatic characterization of Israel/Jacob as rebellious from earliest existence
  alternative_readings:
  - Literal assertion of personal guilt from the womb
  rationale: The verse addresses Israel corporately in prophetic rhetoric. 'From the womb' is retained literally in translation, but the wording is not sharpened into a doctrinal claim beyond the text's idiomatic force.
  doctrine_reference: Preserve theological tension rather than resolve it.
