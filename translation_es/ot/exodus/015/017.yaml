translation:
  language: es
  text: Tú los introducirás y los plantarás en el monte de tu heredad, el lugar[a] que hiciste para tu morada, Yahvé, el santuario, Señor[c][b], que tus manos establecieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y los establecerás». El verbo hebreo literalmente significa «plantarlos», preservando la imagen de un asentamiento seguro.
    reason: lexical_alternative
  - marker: b
    text: La expresión «el monte de tu heredad» puede referirse ampliamente a la tierra dada por Dios a su pueblo o más específicamente al monte de su santuario.
    reason: alternative_reading
  - marker: c
    text: El hebreo tiene tanto el nombre divino «Yahvé» (יְהוָה) como el título «Señor» (אֲדֹנָי) en este versículo.
    reason: cultural_note
lexical_decisions:
- source_word: תְּבִאֵמוֹ
  english_pob_choice: You will bring them in
  chosen_spanish: Tú los introducirás
  alternatives_spanish:
  - Los introducirás
  - Tú los llevarás adentro
  lexicon: HALOT
  rationale: El hifil de בוא expresa acción causativa de introducir a un lugar. «Introducirás» conserva ese sentido causal y suena natural en español; «los» mantiene el sufijo de 3ª persona plural.
- source_word: וְתִטָּעֵמוֹ
  english_pob_choice: and plant them
  chosen_spanish: y los plantarás
  alternatives_spanish:
  - y los establecerás
  - y los asentarás
  lexicon: HALOT
  rationale: נטע significa literalmente «plantar». En el poema la imagen concreta de plantar debe conservarse, sin reducirse de entrada a «establecer». La metáfora comunica asentamiento seguro.
- source_word: בְּהַר נַחֲלָתְךָ
  english_pob_choice: on the mountain of your inheritance
  chosen_spanish: en el monte de tu heredad
  alternatives_spanish:
  - en el monte de tu herencia
  - sobre el monte de tu heredad
  lexicon: HALOT
  rationale: «Monte» es un equivalente claro para הַר en español bíblico. «Heredad» comunica mejor la idea de posesión asignada que «herencia» en este contexto poético. Se preserva la relación posesiva sin resolver si el referente es el país entero o el monte santo.
- source_word: מָכוֹן לְשִׁבְתְּךָ
  english_pob_choice: the place ... that you made for your dwelling
  chosen_spanish: el lugar que preparaste para tu morada
  alternatives_spanish:
  - el sitio establecido para tu morada
  - el lugar fijo para tu morada
  lexicon: HALOT
  rationale: מָכוֹן denota un lugar establecido o preparado. «Lugar» es más natural en español y «preparaste» refleja bien la idea de un sitio dispuesto para habitar, sin perder el matiz de establecimiento.
- source_word: פָּעַלְתָּ
  english_pob_choice: you made
  chosen_spanish: preparaste
  alternatives_spanish:
  - hiciste
  - realizaste
  lexicon: HALOT
  rationale: פָּעַל puede abarcar hacer, obrar o realizar. En esta construcción con el lugar de morada, «preparaste» resulta la mejor equivalencia funcional en español, porque enlaza con la idea del sitio dispuesto para habitar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene la transliteración establecida por el proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: מִקְּדָשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto santo
  lexicon: HALOT
  rationale: «Santuario» es el equivalente español más natural y teológicamente apropiado para מִקְּדָשׁ.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - el Señor
  lexicon: HALOT
  rationale: Se usa «Señor» para conservar el título divino y diferenciarlo de «Yahvé». En español, añadir «mi» sobretraduciría la forma congelada hebrea y no es necesario.
- source_word: כּוֹנְנ֥וּ יָדֶֽי/ךָ
  english_pob_choice: that your hands established
  chosen_spanish: que tus manos establecieron
  alternatives_spanish:
  - que tus manos fundaron
  - que tus manos consolidaron
  lexicon: HALOT
  rationale: כּוֹנְנוּ expresa establecer, asentar firmemente o hacer firme. «Establecieron» conserva la imagen antropomórfica de las manos de Dios como agente de firme fundación.
theological_decisions:
- issue: Distinguir entre יְהוָה y אֲדֹנָי en la misma línea
  english_pob_reading: Render יְהוָה as 'Yahweh' and אֲדֹנָי as 'Lord'
  chosen_spanish_reading: Renderizar יְהוָה como «Yahvé» y אֲדֹנָי como «Señor»
  alternative_spanish_readings:
  - Renderizar ambos como «Señor»
  - Renderizar יְהוָה como «Yahvé» y אֲדֹנָי como «Señor»
  rationale: El hebreo distingue claramente entre el nombre del pacto y el título divino. La traducción mantiene esa distinción visible en español sin ocultarla tras una sustitución uniforme.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de «el monte de tu heredad» y «el santuario»
  english_pob_reading: Preserve the poetic tension between the promised land/mountain and God's sanctuary without resolving the exact geographic referent
  chosen_spanish_reading: Preservar la tensión poética entre la heredad prometida y el santuario de Dios sin precisar un referente geográfico único
  alternative_spanish_readings:
  - Identificar explícitamente el monte con Sión/monte del templo
  - Identificar explícitamente la heredad con toda Canaán
  rationale: La formulación española conserva la ambigüedad del hebreo y no fuerza una identificación más estrecha que la que el texto presenta. Esto permite leer tanto la heredad amplia como el lugar santo concreto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de control cruzado fue alto y no se requirieron ajustes. Se conserva la solución auditada, incluyendo la distinción entre Yahvé y Señor y la imagen verbal de «plantar».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Señor» se reserva para אֲדֹנָי para no borrar la distinción hebrea.
  - «Plantar» conserva la imagen agrícola del verbo נטע; la nota a aclara la posible equivalencia «establecer».
  - «Monte de tu heredad» y «santuario» se dejan abiertos para no resolver indebidamente la tensión poética del versículo.
  - La puntuación con comas reproduce el flujo poético del hebreo y separa los segmentos sin añadir interpretaciones.
