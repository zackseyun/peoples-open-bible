    rationale: 'La formulación ''O: ‘una eyaculación de semilla’'' suena rígida y la puntuación es mejorable. Conviene dejarla como ''O "una emisión de semilla"'' o similar, manteniendo la precisión léxica sin introducir un término excesivamente clínico.'
  revised_spanish_text: Si un hombre se acuesta con una mujer y tiene una emisión de semen[a], ambos se lavarán en agua y serán impuros hasta la tarde[b].
