translation:
  language: es
  text: Como calor en tierra seca[a], humillas el tumulto de los extraños; como calor a la sombra de una nube[b], el canto de los despiadados es abatido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los extranjeros” para “los extraños”.
    reason: lexical_alternative
  - marker: b
    text: O “el canto de los despiadados es humillado/abatido”; el verbo hebreo también puede significar “responde”, pero el contexto favorece la idea de ser sometido.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּחֹרֶב
  english_pob_choice: Like heat
  chosen_spanish: Como calor
  alternatives_spanish:
  - Como calor abrasador
  - Como sequedad
  lexicon: HALOT
  rationale: חֹרֶב puede referirse a calor intenso o a sequedad. En este paralelismo poético, “calor” conserva la imagen principal sin añadir una especificación que el hebreo no exige.
- source_word: בְּצָיוֹן
  english_pob_choice: in a dry land
  chosen_spanish: en tierra seca
  alternatives_spanish:
  - en tierra árida
  - en sequedad
  lexicon: HALOT
  rationale: צָיוֹן expresa aridez o sequedad. “Tierra seca” es idiomático en español y mantiene la imagen ambiental de forma clara.
- source_word: שְׁאוֹן
  english_pob_choice: uproar
  chosen_spanish: tumulto
  alternatives_spanish:
  - ruido
  - estruendo
  lexicon: HALOT
  rationale: שְׁאוֹן denota conmoción ruidosa o tumulto. “Tumulto” conserva tanto el componente sonoro como el hostil.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: los extraños
  alternatives_spanish:
  - los extranjeros
  - los forasteros
  lexicon: HALOT
  rationale: זָרִים puede significar “extraños” o “extranjeros”. “Extraños” mantiene el matiz léxico amplio que la tradición auditada de POB prefirió en inglés, sin cerrar innecesariamente la referencia.
- source_word: תַּכְנִיעַ
  english_pob_choice: you subdue
  chosen_spanish: humillas
  alternatives_spanish:
  - subyugas
  - abates
  - humillas y sometes
  lexicon: HALOT
  rationale: El hifil de כנע puede significar humillar, someter o abatir. En español, “humillas” comunica bien la acción divina y armoniza con el paralelismo del verso.
- source_word: בְּצֵל עָב
  english_pob_choice: by the shadow of a cloud
  chosen_spanish: bajo la sombra de una nube
  alternatives_spanish:
  - a la sombra de una nube
  - bajo la sombra de la nube espesa
  lexicon: HALOT
  rationale: צֵל es sombra y עָב es nube espesa. “Bajo la sombra de una nube” preserva la imagen compacta y natural en español.
- source_word: זְמִיר
  english_pob_choice: song
  chosen_spanish: la canción
  alternatives_spanish:
  - el canto
  - el canto triunfal
  lexicon: HALOT
  rationale: זְמִיר puede designar una canción o canto poético. “Canción” es transparente y respeta el valor básico del sustantivo.
- source_word: עָרִיצִים
  english_pob_choice: the ruthless
  chosen_spanish: de los violentos
  alternatives_spanish:
  - de los tiranos
  - de los crueles
  lexicon: HALOT
  rationale: עָרִיץ se refiere a los violentos, opresores o tiranos. “Violentos” expresa la fuerza del término en español sin perder su tono ético.
- source_word: יַעֲנֶה
  english_pob_choice: is brought low
  chosen_spanish: es abatida
  alternatives_spanish:
  - es humillada
  - es sometida
  - responde
  lexicon: HALOT
  rationale: Aunque יַעֲנֶה puede significar “responde”, el contexto poético favorece la idea de ser humillado o abatido. “Es abatida” conserva esa tensión y evita resolverla de manera excesiva.
theological_decisions:
- issue: Sujeto implícito de la acción divina
  english_pob_reading: The verse continues to address God directly with 'you subdue,' while the final colon is rendered passively in English ('is brought low') to reflect the Hebrew without forcing an explicit subject.
  chosen_spanish_reading: Se mantiene el segundo singular implícito en “humillas” y se conserva la clausula final en pasiva “es abatida”.
  alternative_spanish_readings:
  - Como calor en tierra seca, tú subyugas el tumulto de los extraños; como calor bajo la sombra de una nube, tú abates la canción de los violentos.
  - '... la canción de los violentos responde.'
  rationale: El contexto dirige la acción a Dios; por eso se conserva el verbo en segunda persona. La cláusula final es más difícil y el español pasivo permite no imponer una solución interpretativa donde el hebreo es debatido.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el estado más reciente indica que no hubo cambios necesarios y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el nombre divino aparece explícitamente en el texto fuente; aquí no aparece.
  - Se mantiene un registro poético y bíblico, evitando arcaísmos innecesarios pero preservando la imagen paralela del hebreo.
  - La terminología elegida evita suavizar la carga negativa de זָרִים y עָרִיצִים, que en contexto describen opresores/forasteros hostiles.
