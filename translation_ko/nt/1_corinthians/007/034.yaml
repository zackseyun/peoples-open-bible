  yaml_path: translation/nt/1_corinthians/007/034.yaml
  text: And she is divided. And the unmarried woman[a], that is, the virgin, is concerned about the things of the Lord, so that she may be holy both in body and in spirit. But the married woman is concerned about the things of the world, how she may please her husband.
  footnotes:
  - marker: a
    text: 'Or, ''And the unmarried woman and the virgin are concerned about the things of the Lord.'' The Greek can be read as listing two categories rather than identifying the unmarried woman with the virgin.'
    reason: alternative_reading
translation:
  language: ko
  text: 그래서 그는 분열되어 있습니다. 결혼하지 않은 여자와 처녀는 주의 일을 염려하여 몸과 영 둘 다에서 거룩하려 합니다. 그러나 결혼한 여자는 세상의 일을 염려하여 어떻게 남편을 기쁘게 할까 합니다.
  philosophy: optimal-equivalence
