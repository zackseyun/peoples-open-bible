translation:
  language: es
  text: Porque recordé el sueño que vi acerca de estos asuntos[a], pues no ha pasado ni una palabra de ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «concerniente a estas palabras», o «sobre estas cosas». El griego λόγοι puede referirse a palabras, asuntos o contenidos del sueño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθην
  english_pob_choice: I remembered
  chosen_spanish: recordé
  alternatives_spanish:
  - me acordé
  - fui recordado
  lexicon: BDAG
  rationale: El aoristo con sentido activo se expresa de manera natural en español con un pretérito simple. 'Recordé' conserva el acto de traer a la memoria el sueño.
- source_word: ἐνυπνίου
  english_pob_choice: dream
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño-visión
  - ensueño
  lexicon: LSJ
  rationale: El sustantivo significa simplemente 'sueño'; no se añade 'visión' porque la evidencia no obliga a esa precisión.
- source_word: περὶ τῶν λόγων τούτων
  english_pob_choice: concerning these matters
  chosen_spanish: acerca de estos asuntos
  alternatives_spanish:
  - concerniente a estas palabras
  - sobre estas cosas
  lexicon: BDAG
  rationale: λόγοι puede referirse aquí a asuntos o contenidos del sueño, no solo a palabras literales. 'Acerca de estos asuntos' mantiene la referencia amplia y suena natural en español.
- source_word: οὐδὲ ... παρῆλθεν ἀπʼ αὐτῶν λόγος
  english_pob_choice: for not a word of them has passed by
  chosen_spanish: pues ni una palabra de ellos ha pasado
  alternatives_spanish:
  - pues no ha pasado ni una palabra de ellos
  - pues nada de ellos ha pasado
  lexicon: BDAG
  rationale: La construcción griega es breve y algo idiomática. 'Ni una palabra de ellos ha pasado' conserva la imagen de παρῆλθεν sin resolverla explícitamente como cumplimiento, manteniendo la tensión interpretativa del texto.
theological_decisions:
- issue: Sentido de οὐδὲ γὰρ παρῆλθεν ἀπʼ αὐτῶν λόγος
  english_pob_reading: The clause means that no part of what the dream concerned was missed or overlooked.
  chosen_spanish_reading: La frase indica que ni una sola parte del contenido del sueño ha pasado; no se formula de manera más fuerte como 'se cumplió todo'.
  alternative_spanish_readings:
  - nada de ello se dejó de cumplir
  - nada de ello pasó desapercibido
  rationale: El griego permite una lectura más literal o una lectura más eventiva. La redacción española evita cerrar el sentido hacia un cumplimiento total que el texto aquí no afirma de forma explícita.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: mantiene el registro formal de ''concerning these matters'' con ''acerca de estos asuntos'', y reproduce la cláusula final sin expandirla a una interpretación de cumplimiento. Se evita además la fórmula inglesa ''escaped notice'' por ser una interpretación no necesaria en español.'
  spanish_consistency_notes:
  - Se usa 'sueño' para ἐνυπνίου, sin añadir 'visión'.
  - Se mantiene 'asuntos' para λόγοι por su amplitud semántica.
  - Se preserva 'ni una palabra de ellos ha pasado' para reflejar la brevedad del griego.
  - El marcador [a] aparece exactamente en el texto traducido y no se reutiliza.
