translation:
  language: es
  text: Porque nuestros pecados se han multiplicado sobre nuestras cabezas, y nuestras ofensas[a] han subido hasta el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestras faltas», «nuestros errores» o «nuestras ofensas por ignorancia». El griego distingue este término del de «pecados» en la cláusula anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: BDAG
  rationale: ἁμαρτίαι denota pecados en sentido moral general. «Pecados» es el equivalente natural y fiel en español, y conserva la fuerza del plural acumulativo.
- source_word: ἐπλεόνασαν
  english_pob_choice: have multiplied
  chosen_spanish: se han multiplicado
  alternatives_spanish:
  - han aumentado
  - se han hecho muchos
  lexicon: BDAG
  rationale: El verbo expresa aumento cuantitativo; «se han multiplicado» conserva la imagen de acumulación y el tono enfático del griego.
- source_word: ὑπὲρ τὰς κεφαλὰς ἡμῶν
  english_pob_choice: beyond our heads
  chosen_spanish: por encima de nuestras cabezas
  alternatives_spanish:
  - sobre nuestras cabezas
  - más allá de nuestras cabezas
  lexicon: BDAG
  rationale: 'La imagen es espacial e idiomática: el peso de la culpa rebasa la cabeza. «Por encima de nuestras cabezas» preserva esa metáfora sin volverla demasiado coloquial.'
- source_word: ἄγνοιαι
  english_pob_choice: offenses
  chosen_spanish: ofensas
  alternatives_spanish:
  - ignorancias
  - errores
  - faltas por ignorancia
  lexicon: BDAG
  rationale: El POB inglés decidió no reducir ἄγνοιαι a «sins» y optó por una forma más natural que mantenga una diferencia lexical. «Ofensas» funciona en español como término serio y amplio, sin borrar del todo la distinción respecto de «pecados».
- source_word: ὑπερήνεγκαν
  english_pob_choice: have risen up
  chosen_spanish: han subido
  alternatives_spanish:
  - han ascendido
  - se han elevado
  - han llegado
  lexicon: LSJ
  rationale: El verbo comunica ascenso vertical hasta el cielo. «Han subido» preserva el movimiento ascendente y suena natural en español bíblico contemporáneo.
- source_word: ἕως τοῦ οὐρανοῦ
  english_pob_choice: to heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - hasta los cielos
  - hasta el firmamento
  lexicon: BDAG
  rationale: «Cielo» es la equivalencia bíblica normal en español para οὐρανός en este contexto moral y teológico.
theological_decisions:
- issue: 'Mantener la distinción entre dos términos de culpa: ἁμαρτίαι y ἄγνοιαι'
  english_pob_reading: 'Maintain a distinction: ''sins'' and ''offenses''.'
  chosen_spanish_reading: Mantener la distinción entre «pecados» y «ofensas».
  alternative_spanish_readings:
  - Reducir ambos a «pecados»
  - Traducir ambos como «culpas»
  rationale: El griego usa dos vocablos distintos. En español, «pecados» y «ofensas» preservan mejor la intensificación retórica y la transparencia textual que una sola categoría genérica.
  doctrine_reference: DOCTRINE.md § Translation philosophy, puntos 1 y 5
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «ignorances» a «offenses» para ἄγνοιαι por mayor naturalidad; esta versión española conserva la distinción léxica mediante «ofensas», sin perder la oposición con «pecados».
  spanish_consistency_notes:
  - Se mantiene «cielo» para οὐρανός en armonía con el registro bíblico español.
  - Se conserva el paralelismo sintáctico de dos cláusulas coordinadas para reflejar la estructura del griego.
  - No se usa «SEÑOR» ni terminología litúrgica ajena al texto, porque este versículo no contiene el nombre divino ni una cita directa de κύριος.
