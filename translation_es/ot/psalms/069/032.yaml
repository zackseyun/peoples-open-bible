translation:
  language: es
  text: Y le agradará a Yahvé más que un buey[a], un toro con cuernos y pezuñas partidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “mejor que un buey, un toro”; el hebreo compara la alabanza con un animal sacrificial plenamente calificado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתִיטַב
  english_pob_choice: And it will please
  chosen_spanish: Y le agradará
  alternatives_spanish:
  - Y será mejor
  - Y será agradable
  lexicon: HALOT
  rationale: El qal imperfecto femenino singular retoma la alabanza del versículo anterior; en español, 'le agradará' expresa bien la idea de ser acepto/agradable para Yahvé sin perder el valor comparativo del hebreo.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md / POB terminology
  rationale: Se conserva el nombre divino en forma explícita según la terminología española del proyecto, en lugar de mascarlo como 'el SEÑOR'. La forma 'Yahvé' es la opción principal establecida para יְהוָה.
- source_word: מִשּׁוֹר
  english_pob_choice: more than an ox
  chosen_spanish: más que un buey
  alternatives_spanish:
  - más que un toro
  - mejor que un buey
  lexicon: HALOT
  rationale: El hebreo usa מִן con valor comparativo. 'Buey' reproduce naturalmente שׁוֹר en español y mantiene el contraste sacrificial.
- source_word: פָּר
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un novillo
  - un becerro
  lexicon: HALOT
  rationale: פָּר añade una segunda designación del animal y conserva la intensificación/apposición del hebreo. 'Toro' es una equivalencia digna y clara para el registro litúrgico.
- source_word: מַקְרִן
  english_pob_choice: with horns
  chosen_spanish: con cuernos
  alternatives_spanish:
  - cornudo
  - con astas
  lexicon: HALOT
  rationale: El participio adjetival de קרן describe al animal como portador de cuernos. 'Con cuernos' es la forma natural en español y evita un giro demasiado técnico o arcaico.
- source_word: מַפְרִיס
  english_pob_choice: and split hooves
  chosen_spanish: y pezuñas partidas
  alternatives_spanish:
  - y pezuñas hendidas
  - y de pezuñas divididas
  lexicon: HALOT
  rationale: פרס alude a la pezuña dividida, rasgo sacrificial de animal limpio. 'Pezuñas partidas' mantiene el valor descriptivo y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Preservación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso nombra directamente a יהוה, por lo que la traducción debe preservar el nombre del pacto y no sustituirlo por un título. 'Yahvé' mantiene la decisión doctrinal y la coherencia con el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor comparativo de la construcción con מִן
  english_pob_reading: more than an ox
  chosen_spanish_reading: más que un buey
  alternative_spanish_readings:
  - mejor que un buey
  - más agradable que un buey
  rationale: La comparación no contrasta dos cantidades sino el agrado de Yahvé frente al sacrificio animal. 'Más que' conserva la relación comparativa sin imponer una paráfrasis interpretativa excesiva.
  doctrine_reference: 'Gramática hebrea: מִן con sentido comparativo en יטב'
- issue: Apposición/énfasis animal en שׁוֹר פָּר
  english_pob_reading: an ox, a bull
  chosen_spanish_reading: un buey, un toro
  alternative_spanish_readings:
  - un buey, un novillo
  - un toro, un toro
  rationale: El hebreo acumula dos términos para resaltar la calidad del animal sacrificial. En español, 'buey' y 'toro' conservan la doble denominación sin colapsarla en una sola palabra.
  doctrine_reference: Lexical emphasis in sacrificial animal description
- issue: Animal limpio descrito como totalmente apto
  english_pob_reading: with horns and split hooves
  chosen_spanish_reading: con cuernos y pezuñas partidas
  alternative_spanish_readings:
  - cornudo y de pezuñas hendidas
  - con astas y pezuñas divididas
  rationale: La descripción completa del animal subraya su idoneidad ritual. Se mantiene el rasgo físico de modo transparente para no diluir la imagen sacrificial del texto.
  doctrine_reference: Levítico 11; pure/clean sacrificial imagery
translation_notes:
  revision_awareness: Se tomó en cuenta el estado más reciente del pasaje, con revisión sin cambios y acuerdo alto entre controles, por lo que no se introdujeron correcciones textuales adicionales. La redacción española sigue la lectura estable del audit trail inglés, preservando la comparación y la doble designación del animal sacrificial.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular para יהוה, en coherencia con las directrices del proyecto.
  - Se usó 'buey' para שׁוֹר y 'toro' para פָּר para conservar la intensificación hebrea sin caer en redundancia plana.
  - '''Pezuñas partidas'' conserva el sentido de división/escisión del hebreo y resulta comprensible en español moderno.'
  - La nota al pie conserva la alternativa lexical del inglés POB sobre la posibilidad de leer la frase como 'mejor que un buey, un toro'.
