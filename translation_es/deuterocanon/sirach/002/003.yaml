revisions:
- from: Pégate a él y no te apartes[a], para que seas engrandecido en tu postrimería.
  to: Aférrate a él y no te apartes, para que seas exaltado[a] en tu postrimería.
  rationale: Se ajusta el verbo inicial a un registro más natural y digno en español bíblico ('Aférrate' en vez de 'Pégate') y se alinea mejor la cláusula final con la decisión principal del POB inglés ('seas exaltado'), conservando en la nota la amplitud léxica del hebreo y del griego. No se requiere adjudicación adicional porque la evidencia fuente y la trayectoria de decisiones están suficientemente claras.
  reviewer_model: gpt-5.4
