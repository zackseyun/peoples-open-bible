translation:
  language: es
  text: Preferiría vivir con un león y un dragón que habitar con una mujer malvada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «con una esposa malvada». El griego γυνή puede significar «mujer» o «esposa», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνοικῆσαι
  english_pob_choice: live with
  chosen_spanish: vivir con
  alternatives_spanish:
  - compartir casa con
  - cohabitar con
  lexicon: BDAG
  rationale: El infinitivo aoristo de συνοικέω expresa vivir en el mismo hogar; «vivir con» es natural en español y conserva el sentido doméstico sin añadir matices sexuales no presentes en el griego.
- source_word: λέοντι
  english_pob_choice: a lion
  chosen_spanish: un león
  alternatives_spanish:
  - un leona
  lexicon: LSJ
  rationale: Dativo singular de λέων; se mantiene la imagen singular y proverbial con el equivalente directo en español.
- source_word: δράκοντι
  english_pob_choice: a dragon
  chosen_spanish: un dragón
  alternatives_spanish:
  - una serpiente
  - un monstruo
  lexicon: LSJ
  rationale: δράκων puede significar dragón o gran serpiente; «dragón» reproduce mejor la imagen intensa y tradicional del dicho.
- source_word: εὐδόκησα
  english_pob_choice: I would rather
  chosen_spanish: Preferiría
  alternatives_spanish:
  - Me agradaría más
  - Preferí
  lexicon: BDAG
  rationale: En esta construcción comparativa con ἤ, el verbo expresa preferencia; «Preferiría» transmite bien la fuerza idiomática en español.
- source_word: ἐνοικῆσαι
  english_pob_choice: dwell
  chosen_spanish: habitar
  alternatives_spanish:
  - vivir
  - residir
  lexicon: BDAG
  rationale: ἐνοικέω denota habitar o residir; «habitar» conserva el tono más elevado del proverbio y evita repetir exactamente «vivir».
- source_word: μετὰ γυναικὸς πονηρᾶς
  english_pob_choice: with a wicked woman
  chosen_spanish: con una mujer malvada
  alternatives_spanish:
  - con una esposa malvada
  - con una mujer maligna
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa»; el griego no marca posesión explícita, por eso se conserva «mujer». πονηρός aquí es moral y «malvada» comunica bien esa fuerza.
theological_decisions:
- issue: 'γυνή: ¿«mujer» o «esposa»?'
  english_pob_reading: woman
  chosen_spanish_reading: mujer
  alternative_spanish_readings:
  - esposa
  rationale: El griego permite ambos sentidos, pero sin un posesivo explícito la lectura más segura es genérica. Se deja abierta la alternativa doméstica sin imponerla en el texto principal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo entre el texto griego de Swete y el audit trail inglés. Se conservó la preferencia proverbial con el mismo valor comparativo y la misma alternativa lexical documentada para γυνή.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «dragón» en lugar de «serpiente» para preservar la imaginería proverbial fuerte indicada por el auditor inglés.
  - Se evitó «cohabitar» por su posible carga sexual en español contemporáneo, que no está exigida por el griego.
