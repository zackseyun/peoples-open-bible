revisions:
- from: Porque se acercan con sus corazones[a] como un horno en su emboscada[b]; toda la noche duerme su panadero[c], pero por la mañana arde como fuego de llama.
  to: Porque se acercan con sus corazones[a] como un horno mientras acechan[b]; toda la noche duerme su panadero[c], pero por la mañana arde como llama de fuego.
  rationale: Se ajusta la frase de acecho a una formulación más natural en español y más cercana al valor verbal señalado por la auditoría inglesa. También se reemplaza 'como fuego de llama' por 'como llama de fuego' para mantener la intensificación del hebreo sin producir una expresión antinatural. Se conservan la metáfora del horno, el plural contextual 'corazones' y el figurado 'su panadero'.
