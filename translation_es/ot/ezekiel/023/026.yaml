translation:
  language: es
  text: Te despojarán de tus ropas y tomarán tus adornos espléndidos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «tus ornamentos espléndidos»; más literalmente: «los objetos» o «los artículos de tu esplendor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְשִׁיטוּךְ
  english_pob_choice: they will strip you
  chosen_spanish: te despojarán
  alternatives_spanish:
  - te quitarán la ropa
  - te desnudarán
  - te arrancarán los vestidos
  lexicon: HALOT
  rationale: El verbo hebreo expresa quitar la ropa a alguien. «Despojar» conserva la fuerza de desvestir con un matiz de violencia compatible con el contexto, sin sonar tan coloquial como «quitarán la ropa» ni tan absoluto como «desnudarán».
- source_word: בְּגָדָיִךְ
  english_pob_choice: your garments
  chosen_spanish: tus vestidos
  alternatives_spanish:
  - tus ropas
  - tus prendas
  - tus vestiduras
  lexicon: HALOT
  rationale: בגד se refiere a ropa o vestiduras. «Vestidos» funciona bien en español bíblico contemporáneo y mantiene un registro algo elevado, cercano a «garments» en inglés.
- source_word: וְלָקְחוּ
  english_pob_choice: and take
  chosen_spanish: tomarán
  alternatives_spanish:
  - y tomarán
  - y se llevarán
  - y arrebatarán
  lexicon: HALOT
  rationale: לקח es el verbo general «tomar». En este contexto implica quitar o llevarse algo por la fuerza, pero el hebreo no añade un verbo más específico; por eso «tomarán» conserva la neutralidad básica del original.
- source_word: כְּלֵי תִפְאַרְתֵּךְ
  english_pob_choice: your splendid ornaments
  chosen_spanish: tus adornos espléndidos
  alternatives_spanish:
  - tus ornamentos espléndidos
  - los objetos de tu esplendor
  - tus espléndidos adornos
  lexicon: HALOT
  rationale: כְּלִי puede abarcar objetos, utensilios o adornos, y en esta construcción con תפארת el sentido apunta a ornamentos ligados al esplendor/belleza. «Adornos espléndidos» refleja mejor ese cruce semántico que una equivalencia demasiado interpretativa como «joyas».
translation_notes:
  revision_awareness: La redacción sigue el tramo revisado del texto inglés POB, que pasó de una formulación más interpretativa («beautiful jewelry») a otra más formal y cercana al hebreo («splendid ornaments»). La versión española conserva ese movimiento hacia una traducción menos explicativa y más pegada al sintagma nominal hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - «Despojar» se usa aquí con valor verbal fuerte, sin introducir explícitamente «dejarlas desnuda(s)», porque el complemento «tus vestidos» ya concreta el acto.
  - «Adornos espléndidos» evita reducir כְּלֵי תִפְאַרְתֵּךְ a «joyas», preservando la amplitud del sustantivo hebreo y la nota de esplendor del segundo término.
