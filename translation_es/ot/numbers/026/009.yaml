base_translation:
  language: en
  yaml_path: translation/ot/numbers/026/009.yaml
  text: 'And the sons of Eliab: Nemuel[a], and Dathan, and Abiram. These are that Dathan and Abiram, the called ones of the congregation, who contended against Moses and against Aaron in the company of Korah, when they contended against Yahweh.'
