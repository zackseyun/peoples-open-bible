base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/015.yaml
  text: 'Thus says Yahweh: “A voice is heard in Ramah[a], lamentation and bitter weeping—Rachel weeping for her children. She refuses to be comforted for her children[b], because they are no more.”'
  footnotes:
  - marker: a
    text: Or 'because he is no more'; Hebrew has a singular form in this idiom, though the context speaks of Rachel's children collectively.
    reason: lexical_alternative
  - marker: b
    text: Ramah was a town associated with the territory of Benjamin; Rachel is poetically portrayed as the matriarch mourning her descendants.
    reason: cultural_note
