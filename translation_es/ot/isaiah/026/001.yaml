    text: O «una ciudad fortificada».
    reason: lexical_alternative
  - marker: b
    text: O «él designa la salvación como muros y baluarte». El hebreo deja implícito el sujeto de «pone/designa»; en contexto suele entenderse que es Dios.
    reason: alternative_reading
  - marker: c
    text: «Baluarte» traduce un término hebreo para una fortificación defensiva exterior; versiones tradicionales suelen usar «bastión» o «muralla exterior».
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final a «como muros y baluarte» para reflejar con más fidelidad y naturalidad el sentido de יָשִׁית ... חוֹמוֹת וָחֵל. También se corrigen los anclajes de las notas para que cada marcador aparezca junto al término correspondiente en el texto español.
