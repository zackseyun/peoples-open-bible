translation:
  language: es
  text: Y todos los reyes de Israel no habían celebrado una Pascua[a][b] semejante a la que celebró Josías[c], y los sacerdotes, los levitas, los judeanos[d] y todo Israel, los que se hallaban habitando en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa literalmente la idea de 'llevar' o 'conducir' una Pascua; aquí se vierte con 'celebrar' para expresar de manera natural en español el sentido de observarla.
    reason: lexical_alternative
  - marker: b
    text: También podría traducirse 'guardar una Pascua' u 'observar una Pascua'.
    reason: lexical_alternative
  - marker: c
    text: El griego tiene la forma Ἰωσείας; en español bíblico se usa normalmente 'Josías'.
    reason: cross_reference
  - marker: d
    text: '''Judeanos'' conserva el matiz etnogeográfico del griego Ἰουδαῖοι; también puede verterse ''judíos'' según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγον πάσχα
  english_pob_choice: had not kept such a Passover
  chosen_spanish: no habían celebrado una Pascua
  alternatives_spanish:
  - no habían guardado una Pascua
  - no habían hecho una Pascua
  - no habían observado una Pascua
  lexicon: BDAG
  rationale: En español, con πάσχα el verbo de sentido idiomático no debe ser literalmente 'llevar'. 'Celebrar' expresa bien el acto cultual y resulta natural; 'guardar' también sería posible, pero 'celebrar' comunica mejor el hecho de celebrar la Pascua sin perder el valor observancial.
- source_word: τοιοῦτον οἷον
  english_pob_choice: such a ... as
  chosen_spanish: como la que
  alternatives_spanish:
  - tal como la
  - una Pascua semejante a la que
  - una Pascua de la clase que
  lexicon: LSJ
  rationale: 'La correlación comparativa se mantiene de forma idiomática con ''como la que''. Preserva la comparación enfática: ninguna Pascua anterior fue de esta clase.'
- source_word: Ἰωσείας
  english_pob_choice: Josias
  chosen_spanish: Josías
  alternatives_spanish:
  - Josias
  lexicon: Greek proper name / Spanish biblical usage
  rationale: Aunque el griego tiene la forma Ἰωσείας, en español bíblico la forma más clara y establecida es 'Josías'. Mantiene la identificación histórica sin forzar una transliteración poco natural para el lector español.
- source_word: Ἰουδαῖοι
  english_pob_choice: the Judeans
  chosen_spanish: los judeanos
  alternatives_spanish:
  - los judíos
  - los de Judea
  - los hombres de Judá
  lexicon: BDAG
  rationale: Se conserva el valor etnogeográfico del término griego, evitando cargarlo automáticamente con un sentido religioso más tardío. 'Judeanos' sigue la decisión auditada de 'Judeans' en inglés.
- source_word: οἱ εὑρεθέντες ἐν τῇ κατοικήσει αὐτῶν ἐν Ἰερουσαλήμ
  english_pob_choice: who were found dwelling in Jerusalem
  chosen_spanish: los que fueron hallados habitando en Jerusalén
  alternatives_spanish:
  - los que fueron encontrados habitando en Jerusalén
  - los hallados viviendo en Jerusalén
  - los que residían en Jerusalén
  lexicon: BDAG
  rationale: '''Fueron hallados'' conserva la pasiva del participio y ''habitando en Jerusalén'' reproduce el sentido residencial. Evita suavizar demasiado la expresión griega, que vincula la presencia con haber sido ''encontrados'' allí.'
theological_decisions:
- issue: Alcance de 'todos los reyes de Israel'
  english_pob_reading: Retain the broad historical claim as written, without narrowing it to only Judah's kings.
  chosen_spanish_reading: Y todos los reyes de Israel
  alternative_spanish_readings:
  - Y todos los reyes de Judá
  - Y todos los reyes de Israel y de Judá
  - Y todos los antiguos reyes
  rationale: Se conserva sin armonizar la afirmación amplia del griego. No se restringe a Judá ni se corrige hacia la formulación de Crónicas; así se respeta la tensión histórica del texto de 1 Esdras.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión histórica
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se mantiene la coordinación simple del griego (''y... y... y...'') sin añadir expresiones como ''junto con''. También se preserva la lectura amplia de ''todos los reyes de Israel'' y la opción etnogeográfica para Ἰουδαῖοι, mientras se adapta el giro idiomático de ἤγαγον πάσχα a un español natural y culto.'
  spanish_consistency_notes:
  - Se mantiene 'Israel' en la frase principal sin armonizarla con 'Judá', en coherencia con el griego y con la nota teológica del expediente.
  - '''celebrar una Pascua'' se usa como equivalente cultual de ἤγαγον πάσχα, sin perder el valor observancial.'
  - 'La secuencia coordinada conserva el polisíndeton simple del original: ''y... y... y...'''
  - Se usa 'Josías' por claridad en español, con nota que vincula la forma griega Ἰωσείας.
  - '''judeanos'' se reserva para el sentido de pertenencia a Judea/Judá, no como etiqueta confesional automática.'
