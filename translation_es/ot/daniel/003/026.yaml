translation:
  language: es
  text: 'Entonces Nabucodonosor se acercó a la puerta[a] del horno de fuego ardiente. Respondió y dijo: «Sadrac, Mesac y Abed-nego, siervos del Dios Altísimo, salgan y vengan acá». Entonces Sadrac, Mesac y Abed-nego salieron de en medio del fuego.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la abertura/entrada del horno».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  - Al instante
  lexicon: HALOT
  rationale: Es un marcador discursivo arameo de secuencia narrativa; «Entonces» conserva la progresión temporal con naturalidad en español.
- source_word: קְרֵב
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se llegó
  lexicon: HALOT
  rationale: El verbo expresa aproximación física; «se acercó» es claro y fiel al movimiento de Nabucodonosor hacia la abertura del horno.
- source_word: לִתְרַע
  english_pob_choice: to the door
  chosen_spanish: a la puerta[a]
  alternatives_spanish:
  - a la abertura[a]
  - a la entrada[a]
  lexicon: HALOT
  rationale: תרע puede designar puerta, entrada o abertura. «Puerta» es aceptable y natural, y la nota preserva la alternativa de «abertura/entrada» que la traducción inglesa también documenta.
- source_word: אַתּוּן נוּרָא יָקִדְתָּא
  english_pob_choice: the blazing fiery furnace
  chosen_spanish: el horno de fuego ardiente
  alternatives_spanish:
  - el horno de fuego abrasador
  - el horno del fuego ardiente
  - el horno llameante
  lexicon: HALOT
  rationale: La construcción acumula «horno» + «fuego» + un participio/adjetivo de intensidad. En español, «horno de fuego ardiente» conserva la fuerza descriptiva sin sonar forzado.
- source_word: עָנֵה וְאָמַר
  english_pob_choice: He answered and said
  chosen_spanish: Respondió y dijo
  alternatives_spanish:
  - Y dijo
  - Respondió
  lexicon: HALOT
  rationale: Es la fórmula semítica de discurso. Mantener ambos verbos preserva el tono del original y la textura narrativa, sin reducirlo a un simple «dijo».
- source_word: עַבְדֹוהִי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - servidores
  lexicon: HALOT
  rationale: Aquí el énfasis recae en su pertenencia y servicio al Dios Altísimo; «siervos» comunica bien esa relación reverente y evita una lectura socialmente reductiva de esclavitud humana en este contexto.
- source_word: אֱלָהָא עליא
  english_pob_choice: the Most High God
  chosen_spanish: el Dios Altísimo
  alternatives_spanish:
  - el Dios Más Alto
  - el Dios supremo
  lexicon: HALOT
  rationale: Es un título divino establecido; en español bíblico «Altísimo» funciona como equivalente directo y mantiene la mayestática referencia a la supremacía de Dios.
- source_word: פֻּקוּ
  english_pob_choice: come out
  chosen_spanish: salgan
  alternatives_spanish:
  - salgan fuera
  - salgan de allí
  - salgan afuera
  lexicon: HALOT
  rationale: El mandato plural de salir del interior del horno se expresa de forma natural con «salgan»; el movimiento queda claro por el contexto inmediato.
- source_word: וֶאֱתוֹ
  english_pob_choice: come here
  chosen_spanish: vengan acá
  alternatives_spanish:
  - vengan
  - acérquense
  lexicon: HALOT
  rationale: La segunda orden añade dirección hacia el hablante. «Vengan acá» conserva esa fuerza de acercamiento de manera idiomática en español.
- source_word: נָפְקִין
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron fuera
  - vinieron afuera
  - salieron de allí
  lexicon: HALOT
  rationale: El verbo narrativo plural corresponde al cumplimiento de la orden. «Salieron» es el equivalente más natural y directo.
- source_word: מִן גּוֹא נוּרָא
  english_pob_choice: from the midst of the fire
  chosen_spanish: de en medio del fuego
  alternatives_spanish:
  - del medio del fuego
  - desde el interior del fuego
  - de entre las llamas
  lexicon: HALOT
  rationale: גוֹא señala el interior o el medio. «De en medio del fuego» conserva la imagen vívida de que salieron desde dentro del fuego, no solo de sus alrededores.
theological_decisions:
- issue: Título divino אֱלָהָא עליא
  english_pob_reading: the Most High God
  chosen_spanish_reading: el Dios Altísimo
  alternative_spanish_readings:
  - el Dios supremo
  - el Dios Más Alto
  rationale: Se preserva el título como tal, sin suavizarlo ni sustituirlo por una expresión menos bíblica. «Altísimo» transmite la proclamación de supremacía divina que Nebucodonosor reconoce en el relato.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto final mantiene el acuerdo alto con la auditoría inglesa y preserva la alternancia lexical documentada para תרע.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלָהָא y «Altísimo» como parte fija del título.
  - Se usa «siervos» en vez de «esclavos» porque el contexto es honorífico y relacional, no de condición legal humana.
  - La duplicación verbal de la fórmula de habla («Respondió y dijo») se conserva por fidelidad al arameo.
  - «De en medio del fuego» refleja mejor la imagen espacial de מן גוֹא que una simple paráfrasis como «del fuego».
