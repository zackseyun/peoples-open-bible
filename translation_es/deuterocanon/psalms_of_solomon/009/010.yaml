    reason: lexical_alternative
  - marker: c
    text: Otra posibilidad sería «son justos», pero eso convertiría la expresión en adjetiva y debilitaría la cadena léxica de δικαιοσύνη en el contexto.
    reason: alternative_reading
  revision_rationale: Se ajusta el español para hacer explícito el valor distributivo en ambos miembros («cada hombre y cada casa») y se corrigen las notas para que sean idiomáticas y coherentes con la auditoría inglesa y la decisión de preservar δικαιοσύνη como sustantivo.
