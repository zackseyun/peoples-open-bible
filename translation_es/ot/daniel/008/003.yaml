translation:
  language: es
  text: Entonces alcé mis ojos y vi, y he aquí, un solo carnero estaba de pie delante del canal[a], y tenía dos cuernos. Los cuernos eran altos, pero uno de ellos era más alto que el otro[b], y el más alto apareció de último.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arroyo» o «río» para «canal»; el término hebreo designa un curso de agua y en Daniel probablemente indica un canal.
    reason: lexical_alternative
  - marker: b
    text: O «el más alto surgió más tarde».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא עֵינַי
  english_pob_choice: Then I lifted up my eyes
  chosen_spanish: Entonces alcé mis ojos
  alternatives_spanish:
  - levanté mis ojos
  - miré hacia arriba
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático para dirigir la mirada; en español, «alcé mis ojos» conserva el tono visionario y sigue siendo natural y solemne.
- source_word: וָאֶרְאֶה וְהִנֵּה
  english_pob_choice: and saw, and behold
  chosen_spanish: y vi, y he aquí
  alternatives_spanish:
  - y vi, y he aquí
  - y vi, y mira
  lexicon: HALOT
  rationale: «Y vi» mantiene la secuencia perceptiva, y «he aquí» reproduce el valor deíctico e intensificador de הִנֵּה con registro bíblico adecuado al género visionario.
- source_word: אַיִל אֶחָד
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un solo carnero
  - un carnero
  lexicon: HALOT
  rationale: אַיִל designa específicamente un carnero; en español, «carnero» es el equivalente directo y suficientemente claro. El numeral hebreo puede quedar implícito en la presentación del símbolo, sin forzarlo si no añade claridad en esta lengua.
- source_word: עֹמֵד לִפְנֵי הָאֻבָל
  english_pob_choice: was standing before the canal
  chosen_spanish: estaba de pie delante del canal
  alternatives_spanish:
  - estaba de pie frente al canal
  - se hallaba delante del canal
  lexicon: HALOT
  rationale: El participio עֹמֵד expresa postura continua; «estaba de pie» conserva esa imagen. «Canal» sigue la decisión del POB inglés para אֻבָל, término que en Daniel apunta probablemente a un curso artificial de agua y no debe generalizarse sin necesidad.
- source_word: וְלֹו קְרָנָיִם
  english_pob_choice: and it had two horns
  chosen_spanish: y tenía dos cuernos
  alternatives_spanish:
  - y con dos cuernos
  - y le pertenecían dos cuernos
  lexicon: HALOT
  rationale: 'La construcción pronominal hebrea se expresa de forma idiomática en español con posesión: «tenía dos cuernos». Mantiene la concisión del texto y su imaginería concreta.'
- source_word: וְהַקְּרָנַיִם גְּבֹהוֹת
  english_pob_choice: The horns were high
  chosen_spanish: Los cuernos eran altos
  alternatives_spanish:
  - Los cuernos eran elevados
  - Los cuernos eran altos y prominentes
  lexicon: HALOT
  rationale: גָּבֹהַּ describe altura física; «altos» es el equivalente más directo y sobrio en español.
- source_word: וְהָאַחַת גְּבֹהָה מִן הַשֵּׁנִית
  english_pob_choice: but one was higher than the other
  chosen_spanish: pero uno era más alto que el otro
  alternatives_spanish:
  - y uno era más alto que el segundo
  - pero uno era más alto que el otro
  lexicon: HALOT
  rationale: En español, «el otro» es más natural que «el segundo» y preserva la comparación entre dos elementos. Se mantiene «más alto» para continuidad léxica con «altos».
- source_word: וְהַגְּבֹהָה עֹלָה בָּאַחֲרֹנָה
  english_pob_choice: and the higher one came up last
  chosen_spanish: y el más alto surgió al final
  alternatives_spanish:
  - y el más alto apareció después
  - y el más alto se levantó al final
  lexicon: HALOT
  rationale: עֹלָה aquí comunica aparición/emergencia más que mera elevación espacial; «surgió» conserva ese matiz. «Al final» expresa בָּאַחֲרֹנָה como secuencia temporal sin añadir interpretación.
theological_decisions:
- issue: Imaginería simbólica apocalíptica sin interpretación anticipada
  english_pob_reading: Retain the concrete imagery ('ram,' 'horns') without interpretive expansion in the main text.
  chosen_spanish_reading: Conservar la imaginería concreta («carnero», «cuernos») sin explicación interpretativa en el cuerpo del versículo.
  alternative_spanish_readings:
  - Introducir una paráfrasis explicativa en el texto
  - Traducir el símbolo ya interpretado
  rationale: El versículo presenta una visión simbólica cuya interpretación aparece más adelante en el capítulo. La traducción debe respetar esa tensión y no resolverla prematuramente.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la concordancia más reciente indicó alta concordancia y ningún cambio necesario, con una observación menor ya absorbida en la decisión léxica de «canal».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB para el nombre divino, aunque este versículo no lo contiene.
  - Se prefirió «carnero» para אַיִל y «cuernos» para קְרָנָיִם, con registro bíblico claro y sin interpretaciones añadidas.
  - Se preservó el paralelismo de altura con «altos / más alto» y el matiz temporal de עֹלָה con «surgió».
