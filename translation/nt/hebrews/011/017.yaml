id: HEB.11.17
reference: Hebrews 11:17
source:
  edition: SBLGNT
  text: Πίστει προσενήνοχεν Ἀβραὰμ τὸν Ἰσαὰκ πειραζόμενος, καὶ τὸν μονογενῆ προσέφερεν ὁ τὰς ἐπαγγελίας ἀναδεξάμενος,
translation:
  text: By faith Abraham[a], when he was being tested, offered up Isaac, and the one who had received the promises was offering up his one and only son,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'only son' or 'unique son.' The Greek term emphasizes uniqueness; 'only begotten' is a traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  chosen: By faith
  alternatives:
  - Through faith
  lexicon: BDAG
  rationale: Dative of means/instrument; 'By faith' is the standard and natural English rendering, matching the chapter's repeated formula and the doctrine default for πίστις.
- source_word: προσενήνοχεν
  chosen: offered up
  alternatives:
  - has offered up
  - presented
  lexicon: BDAG
  rationale: Perfect active indicative of προσφέρω. In this narrative-summary context, idiomatic English prefers simple past over a wooden present perfect. 'Offered up' preserves sacrificial force better than merely 'presented'.
- source_word: πειραζόμενος
  chosen: when he was being tested
  alternatives:
  - being tested
  - when he was tested
  - being tried
  lexicon: BDAG
  rationale: Present passive participle modifying Abraham. 'When he was being tested' makes the temporal-circumstantial sense explicit and preserves the passive. 'Tested' is preferable to 'tempted' here because the Genesis context concerns proving faith, not enticement to sin.
- source_word: μονογενῆ
  chosen: one and only son
  alternatives:
  - only son
  - unique son
  - only begotten son
  lexicon: BDAG
  rationale: μονογενής commonly denotes uniqueness/one-of-a-kind status rather than biological begetting as such. 'One and only son' is clear modern English and fits Isaac's unique covenantal status, even though Abraham had another biological son. 'Only begotten' is traditional but misleading in contemporary English.
- source_word: προσέφερεν
  chosen: was offering up
  alternatives:
  - offered up
  lexicon: BDAG
  rationale: Imperfect active indicative of προσφέρω. Rendering it as progressive ('was offering up') preserves the imperfective aspect and the vividness of the scene, distinguishing it from the earlier perfect.
- source_word: ἀναδεξάμενος
  chosen: had received
  alternatives:
  - had welcomed
  - had accepted
  lexicon: BDAG
  rationale: Aorist middle participle referring to Abraham as the one who had received the promises. 'Received' is the most natural fit for ἐπαγγελίαι in English and avoids over-interpretation.
- source_word: ἐπαγγελίας
  chosen: the promises
  alternatives:
  - the promise-words
  lexicon: BDAG
  rationale: Standard rendering for ἐπαγγελία. The plural should be preserved because the Greek is plural and refers to the set of divine promises given to Abraham.
- source_word: καὶ
  chosen: and
  alternatives:
  - indeed
  lexicon: BDAG
  rationale: Simple connective is sufficient. More interpretive renderings are unnecessary.
