  spanish_quality_summary: El texto principal es claro y natural en español eclesial moderno. La corrección necesaria estaba en la nota al pie, que usaba «una confianza confiada» (redundante) y «dependencia fiel» (desplaza hacia faithfulness). Se corrigió para reflejar el matiz de trustful reliance documentado en el rastro inglés.
  glossary_alignment: πίστις correctamente como «fe» en el texto, con «confianza» como alternativa en nota, conforme a la guía doctrinal.
  issues:
