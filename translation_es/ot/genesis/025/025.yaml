translation:
  language: es
  text: El primero salió rojizo[a], todo él como un manto velludo[b], y le pusieron por nombre Esaú[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '“Rojizo” traduce el adjetivo hebreo con un matiz de apariencia, no necesariamente de color uniforme. Otras posibilidades: “bermejo” o “rojo”.'
    reason: lexical_alternative
  - marker: b
    text: O también “como una prenda de pelo” o “como un manto de pelo”. El hebreo usa un símil con “manto/capa” y “pelo”, para describir la abundancia de vello.
    reason: lexical_alternative
  - marker: c
    text: La fórmula hebrea dice literalmente “y llamaron su nombre Esaú”, una expresión estándar de nombramiento; en español también puede decirse “le pusieron por nombre Esaú”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - vino al mundo
  - salió afuera
  lexicon: HALOT
  rationale: En el contexto del nacimiento, “salió” reproduce de manera natural y fiel la idea concreta de que el primer gemelo salió del vientre, sin añadir interpretación.
- source_word: הָרִאשׁוֹן
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer hijo
  - el primero en salir
  lexicon: HALOT
  rationale: Refiere al primer gemelo en el orden del nacimiento. “El primero” es breve, claro y mantiene la referencia ordinal.
- source_word: אַדְמוֹנִי
  english_pob_choice: reddish
  chosen_spanish: rojizo
  alternatives_spanish:
  - rojizo de piel
  - bermejo
  - rojo
  lexicon: HALOT
  rationale: “Rojizo” conserva el matiz adjetival de una apariencia tirando a rojo, más natural en español que “rojo” y menos arcaico que “bermejo”. Evita, además, cerrar demasiado el sentido de una palabra que describe la apariencia general del niño.
- source_word: כֻּלּוֹ
  english_pob_choice: all of him
  chosen_spanish: todo él
  alternatives_spanish:
  - completamente
  - todo su cuerpo
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza que la descripción abarca a la persona entera. “Todo él” conserva ese valor sin volver la frase pesada.
- source_word: כְּאַדֶּרֶת שֵׂעָר
  english_pob_choice: like a hairy cloak
  chosen_spanish: como un manto de pelo
  alternatives_spanish:
  - como un vestido de pelo
  - como una capa de pelo
  lexicon: HALOT
  rationale: אַדֶּרֶת designa una prenda amplia, tipo manto o capa. “Manto de pelo” preserva la metáfora del simile y sugiere la abundancia de vello sin sustituirla por una paráfrasis explicativa.
- source_word: וַיִּקְרְאוּ שְׁמוֹ
  english_pob_choice: they called his name
  chosen_spanish: le pusieron por nombre
  alternatives_spanish:
  - lo llamaron
  - le dieron el nombre de
  lexicon: HALOT
  rationale: La fórmula hebrea de nombramiento puede sonar más natural en español como “le pusieron por nombre”, manteniendo el sentido de acción nominativa colectiva sin perder transparencia.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: standard proper-name transliteration
  rationale: Se usa la forma española estándar del nombre propio, conservando la identificación tradicional del personaje.
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última revisión y el cotejo informó alta concordancia; esta propuesta sigue esa línea, manteniendo las tres notas léxicas principales del original (color, simile de pelo, fórmula de nombramiento) con español natural y transparente.
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio en forma española estándar: Esaú.'
  - 'Se conserva la secuencia narrativa del hebreo: salida del primero, descripción física, nombramiento.'
  - No se introduce interpretación teológica adicional, ya que el versículo es descriptivo y no doctrinal.
