translation:
  language: es
  text: Dios lo saca de Egipto[a]; él tiene para sí los cuernos de un buey salvaje. Consumirá a las naciones que son sus adversarios[b], y roerá sus huesos y los aplastará con sus flechas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fuerza de un buey salvaje». La expresión hebrea כְּתוֹעֲפֹת רְאֵם es difícil; las versiones tradicionales a menudo expresan la imagen de forma más general como fuerza, en vez de referirse explícitamente a los cuernos.
    reason: lexical_alternative
  - marker: b
    text: O «quebrará sus huesos» o «dejará sus huesos al descubierto». El verbo hebreo יְגָרֵם es raro y su matiz preciso es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - Mighty God
  lexicon: HALOT
  rationale: Aquí אֵל funciona claramente como designación de Dios como sujeto de la acción. «Dios» es el equivalente natural y fiel en español, sin añadir matiz que el hebreo no exige.
- source_word: מוֹצִיאוֹ
  english_pob_choice: brings him out
  chosen_spanish: lo saca
  alternatives_spanish:
  - lo trae fuera
  - lo hace salir
  lexicon: HALOT
  rationale: El participio con sufijo expresa una acción verbal viva en poesía. «Lo saca» conserva la inmediatez del presente poético y el sentido de salida desde Egipto.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: En español, con «saca» el complemento natural es «de Egipto»; el valor idiomático de éxodo queda claro sin sobrecargar la frase.
- source_word: כְּתוֹעֲפֹת רְאֵם
  english_pob_choice: the horns of a wild ox
  chosen_spanish: los cuernos de un buey salvaje
  alternatives_spanish:
  - la fuerza de un buey salvaje
  - los cuernos de un reem
  - los cuernos elevados de un buey salvaje
  lexicon: HALOT
  rationale: Se mantiene la imagen animal concreta que el audit trail prefería explicitar. «Buey salvaje» comunica mejor en español moderno la idea del animal fuerte y no domestico; «cuernos» preserva la lectura metafórica elegida por la POB inglesa, sin borrar la alternativa de «fuerza» que la nota inglesa documenta.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - en favor de él
  - para su beneficio
  lexicon: HALOT
  rationale: La preposición con sufijo puede expresar posesión o ventaja. «Para él» reproduce de manera natural el valor de beneficio, manteniendo abierta la referencia singular.
- source_word: יֹאכַל
  english_pob_choice: will consume
  chosen_spanish: Consumirá
  alternatives_spanish:
  - devorará
  - comerá
  lexicon: HALOT
  rationale: En poesía bélica, el verbo de comer funciona metafóricamente como destrucción. «Consumirá» preserva ese desplazamiento metafórico sin sonar demasiado coloquial.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - las naciones
  - a los pueblos
  lexicon: HALOT
  rationale: El plural genérico conserva su alcance colectivo. El acusativo se expresa naturalmente en español con la preposición «a» ante objeto animado personificado o colectivo.
- source_word: צָרָיו
  english_pob_choice: that are his adversaries
  chosen_spanish: que son sus adversarios
  alternatives_spanish:
  - que son sus enemigos
  - que le son contrarios
  lexicon: HALOT
  rationale: «Adversarios» refleja bien el campo léxico de צרר y mantiene la relación explicativa con «las naciones» sin resolverla demasiado en una equivalencia más interpretativa como «enemigos».
- source_word: וְעַצְמֹתֵיהֶם
  english_pob_choice: their bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - los huesos de ellos
  lexicon: HALOT
  rationale: «Huesos» es el equivalente natural de עַצְמוֹת. El posesivo español comunica directamente el referente plural.
- source_word: יְגָרֵם
  english_pob_choice: will gnaw
  chosen_spanish: roerá
  alternatives_spanish:
  - quebrará
  - desmenuzará
  - desgarrará
  lexicon: HALOT
  rationale: El verbo hebreo es raro y el contexto con «huesos» favorece una acción de roer o desgastar; «roerá» preserva la imaginería corporal y deja abierta la incertidumbre semántica documentada por la nota inglesa.
- source_word: וְחִצָּיו
  english_pob_choice: with his arrows
  chosen_spanish: con sus flechas
  alternatives_spanish:
  - con sus saetas
  - sus flechas
  lexicon: HALOT
  rationale: El valor instrumental se expresa con «con». «Flechas» es el equivalente claro y común en español; no se fuerza un tecnicismo innecesario.
- source_word: יִמְחָץ
  english_pob_choice: crush
  chosen_spanish: aplastará
  alternatives_spanish:
  - desmenuzará
  - quebrará
  - hará pedazos
  lexicon: HALOT
  rationale: «Aplastar» transmite la violencia de מחץ con naturalidad en español y encaja con la imagen de impacto de las flechas.
theological_decisions:
- issue: Referente de los pronombres singulares en la profecía de Balaam
  english_pob_reading: The singular 'him/he/his' is preserved without specifying beyond the text, referring poetically to Israel as a corporate singular or its kingly representative.
  chosen_spanish_reading: Se conservan los pronombres singulares («lo», «él», «sus») sin especificar más allá del texto.
  alternative_spanish_readings:
  - Israel corporativo
  - Israel como su rey/representante
  - una lectura mesiánica individual
  rationale: El hebreo mantiene singularidad pronominal, y la POB inglesa deliberadamente no la resuelve. El español sigue esa decisión para preservar la tensión interpretativa y no imponer una identificación doctrinal no explicitada en el verso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión inglesa sin cambios sustantivos: se mantiene la solución optimizada para la imagen de los cuernos de un buey salvaje, el verbo raro יְגָרֵם se conserva con una traducción que admite la incertidumbre, y no se introducen lecturas doctrinales adicionales.'
  spanish_consistency_notes:
  - Se conserva «Dios» para אֵל y no se usa «SEÑOR», en coherencia con el texto fuente.
  - Se mantiene «buey salvaje» para רְאֵם como equivalente moderno y claro; no se recurre a «unicornio».
  - Los pronombres singulares se preservan para reflejar la ambigüedad corporativa/representativa del hebreo.
  - La puntuación separa las cláusulas poéticas con dos puntos y comas de manera natural en español.
  - Las notas al pie marcan únicamente alternativas léxicas documentadas por el audit trail inglés.
