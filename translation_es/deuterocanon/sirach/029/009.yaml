translation:
  language: es
  text: Por amor del mandamiento[a], ayuda al pobre, y según su necesidad no lo despidas vacío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo despidas con las manos vacías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - en atención a
  lexicon: LSJ
  rationale: La construcción con genitivo expresa motivo o finalidad; en español, «por amor de» comunica bien la motivación ética sin volver la frase mecánica. Conserva la idea de actuar por consideración al mandamiento.
- source_word: ἐντολῆς
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el precepto
  - la orden
  lexicon: LSJ
  rationale: «Mandamiento» mantiene el peso normativo y la forma definida del griego. «Precepto» sería posible, pero suena más general; «orden» estrecha innecesariamente el sentido.
- source_word: ἀντιλαβοῦ
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - socorre
  - sostén
  - asiste
  lexicon: BDAG
  rationale: El verbo sugiere tomar a alguien para apoyarlo o prestarle ayuda activa. «Ayuda» conserva esa fuerza de asistencia sin sonar forzado en español.
- source_word: πένητος
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al necesitado
  - al indigente
  lexicon: LSJ
  rationale: El singular griego funciona de modo representativo para una persona pobre. «Al pobre» reproduce ese valor general y conserva la economía del original.
- source_word: κατὰ τὴν ἔνδειαν αὐτοῦ
  english_pob_choice: according to his need
  chosen_spanish: según su necesidad
  alternatives_spanish:
  - conforme a su carencia
  - de acuerdo con su pobreza
  lexicon: LSJ
  rationale: 'ἔνδεια significa necesidad, falta o carencia. «Según su necesidad» es natural en español y mantiene el principio distributivo: dar en proporción a lo que realmente le falta.'
- source_word: μὴ ἀποστρέψῃς αὐτὸν κενόν
  english_pob_choice: do not send him away empty
  chosen_spanish: no lo despidas vacío
  alternatives_spanish:
  - no lo rechaces vacío
  - no lo envíes vacío
  - no lo des vuelta vacío
  lexicon: BDAG
  rationale: El griego puede expresar alejar o despedir sin haber ayudado. «No lo despidas vacío» conserva la idea concreta de dejarlo ir sin respuesta, y permite en español la alternativa implícita de «vacío de manos» sin añadirla al texto principal.
theological_decisions:
- issue: Referencia de «el mandamiento»
  english_pob_reading: A general moral/divine command to care for the poor
  chosen_spanish_reading: Una referencia general al mandamiento divino o moral de socorrer al pobre
  alternative_spanish_readings:
  - Un mandamiento específico de la Torá
  - Una instrucción moral no necesariamente explícitamente divina
  rationale: El singular definido del griego es concreto pero no identifica un texto legal específico. «El mandamiento» en español conserva esa ambigüedad reverente, sin reducirlo a una ley particular ni diluirlo en mera sugerencia.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: El texto griego y la auditable solución inglesa no requieren cambios sustanciales; la redacción española sigue la misma decisión de sentido, ajustando la naturalidad sintáctica sin perder la tensión entre motivación del mandamiento y la prohibición final de despedir al necesitado sin ayuda.
  spanish_consistency_notes:
  - Se mantiene «mandamiento» para reflejar la definitud del griego.
  - «Pobre» se usa como singular representativo, no como un individuo masculino concreto.
  - «Vacío» conserva la idea de dejarlo sin auxilio; la nota recoge la alternativa más literal «vacío de manos».
