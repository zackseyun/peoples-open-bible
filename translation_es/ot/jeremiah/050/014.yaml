translation:
  language: es
  text: Pónganse en formación contra Babilonia, por todos lados, todos ustedes los que tensan el arco; disparen contra ella; no escatimen ninguna flecha, porque ha pecado contra Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עִרְכוּ
  english_pob_choice: Draw up
  chosen_spanish: Pónganse en orden
  alternatives_spanish:
  - Pónganse en formación
  - Dispónganse en orden
  - Alístense para la batalla
  lexicon: HALOT
  rationale: El verbo en contexto militar pide una orden de formación para combate. «Pónganse en orden» conserva la idea de alinearse/disponerse para la batalla sin sonar tan arcaico como «sean puestos en orden».
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: HALOT
  rationale: En el marco hostil contra Babilonia, «contra» transmite con naturalidad el valor adversativo del preposición.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La palabra indica cerco desde todos los lados. «Todo alrededor» mantiene la imagen de encirclemento de forma clara en español.
- source_word: כָּל דֹּרְכֵי קֶשֶׁת
  english_pob_choice: all you who bend the bow
  chosen_spanish: todos ustedes los que tensan el arco
  alternatives_spanish:
  - todos los arqueros
  - todos los que doblan el arco
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «tensar/doblar» el arco, pero con un verbo natural en español. «Tensan el arco» refleja el valor concreto del participio sin reducirlo del todo a un término técnico.
- source_word: יְדוּ אֵלֶיהָ
  english_pob_choice: shoot at her
  chosen_spanish: disparen contra ella
  alternatives_spanish:
  - tiroteen contra ella
  - arrojen flechas contra ella
  lexicon: HALOT
  rationale: El verbo en contexto de arquería se entiende como disparar/soltar flechas. «Contra ella» conserva la referencia a Babilonia personificada en femenino.
- source_word: אַל תַּחְמְלוּ אֶל חֵץ
  english_pob_choice: do not spare an arrow
  chosen_spanish: no perdonen ninguna flecha
  alternatives_spanish:
  - no escatimen ninguna flecha
  - no tengan piedad de una flecha
  lexicon: HALOT
  rationale: El sentido es no reservar ni ahorrar flechas en el ataque. «No perdonen ninguna flecha» reproduce la fuerza de no mostrar indulgencia ni reserva, y mantiene la colectividad implícita del singular «flecha» como conjunto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato bélico. «Porque» es la correspondencia más directa y clara en español.
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - ante Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: El hebreo con ל y חטא expresa el objeto contra quien se peca; por eso se traduce «contra». Se conserva «Yahvé» conforme al estándar del proyecto para יהוה.
- source_word: חָטָאָה
  english_pob_choice: she has sinned
  chosen_spanish: ha pecado
  alternatives_spanish:
  - ha cometido pecado
  - pecó
  lexicon: HALOT
  rationale: El perfecto femenino singular se refiere a Babilonia personificada. «Ha pecado» mantiene el peso moral-teológico del verbo sin hacer más explícito de lo que el hebreo exige.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton, y el estándar español del proyecto es «Yahvé». Se evita la sustitución por un título en mayúsculas para no ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Construcción de pecado con לַיהוָה
  english_pob_reading: for she has sinned against Yahweh
  chosen_spanish_reading: porque ha pecado contra Yahvé
  alternative_spanish_readings:
  - porque ha pecado a Yahvé
  - porque ha pecado para Yahvé
  rationale: La preposición hebrea con חטא expresa la persona ofendida o contra quien se comete el pecado. En español, «pecar contra» comunica correctamente la relación moral y evita una traducción literal opaca.
  doctrine_reference: HALOT, entrada חטא; principio de equivalencia óptima con primacía del hebreo
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; por tanto, este borrador español sigue la lectura estable del texto fuente y conserva la misma estructura semántica y teológica, adaptada a un español bíblico moderno.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה en el texto principal.
  - Se conserva el registro militar con imperativos directos y vocabulario claro.
  - No se introduce nota al pie porque no hay variante textual significativa en este versículo ni ambigüedad que el español no resuelva de forma natural.
