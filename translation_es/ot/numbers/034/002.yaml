translation:
  language: es
  text: 'Ordena a los hijos de Israel y diles: «Cuando entren en la tierra de Canaán[a], esta es la tierra que les tocará[b] como herencia: la tierra de Canaán según sus límites».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de Israel» refleja más de cerca la expresión literal hebrea; «israelitas» sería una equivalencia más fluida, pero menos cercana al original.
    reason: lexical_alternative
  - marker: b
    text: O «que les será asignada como herencia». El hebreo dice literalmente «que caerá para ustedes», un modismo para la asignación territorial por heredad.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Comanda
  - Da la orden a
  lexicon: HALOT
  rationale: El imperativo צַו exige una orden con autoridad. En español, «ordena» preserva la fuerza directiva sin sonar rígidamente militar como «comanda».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: La POB inglesa conservó la literalidad de «sons of Israel»; en español, «hijos de Israel» mantiene esa forma masculina heredada del hebreo sin neutralizarla a «israelitas».
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y háblales
  lexicon: HALOT
  rationale: El hebreo encadena una instrucción verbal directa. «Diles» es natural en español y conserva la secuencia imperativa de la frase.
- source_word: כִּי אַתֶּם בָּאִים אֶל
  english_pob_choice: When you enter
  chosen_spanish: Cuando entren
  alternatives_spanish:
  - Cuando estén entrando
  - Cuando vayan a entrar
  lexicon: HALOT
  rationale: Aunque כִּי puede ser «cuando/porque/que», aquí introduce el momento de la entrada en la tierra. En español, el futuro temporal «cuando entren» expresa bien esa circunstancia.
- source_word: הָאָרֶץ כְּנָעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - la tierra, Canaán
  - la tierra cananea
  lexicon: HALOT
  rationale: La construcción hebrea se vierte de manera natural como «la tierra de Canaán», conservando el topónimo y la referencia territorial.
- source_word: אֲשֶׁר תִּפֹּל לָכֶם בְּנַחֲלָה
  english_pob_choice: that will fall to you as an inheritance
  chosen_spanish: que les tocará en herencia
  alternatives_spanish:
  - que caerá para ustedes como herencia
  - que les será asignada como herencia
  lexicon: HALOT
  rationale: נפל literalmente es «caer/fallar», pero en contexto de reparto de tierra alude a lo asignado por heredad. «Les tocará en herencia» comunica el sentido del reparto sin perder la idea de porción concedida.
- source_word: אֶרֶץ כְּנַעַן לִגְבֻלֹתֶיהָ
  english_pob_choice: the land of Canaan according to its borders
  chosen_spanish: la tierra de Canaán conforme a sus fronteras
  alternatives_spanish:
  - la tierra de Canaán según sus límites
  - la tierra de Canaán de acuerdo con sus fronteras
  lexicon: HALOT
  rationale: «Conforme a sus fronteras» preserva el tono formal y delimitador de לִגְבֻלֹתֶיהָ, adecuado para una descripción territorial precisa.
translation_notes:
  revision_awareness: El contexto de revisión muestra alta concordancia con la traducción fuente en inglés y no registra cambios aplicados; por eso se mantuvo una correspondencia muy cercana al hebreo, con ajuste mínimo para la naturalidad del español.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para אֶרֶץ de forma consistente con el contexto de herencia y delimitación territorial.
  - Se evitó sustituir la referencia a la herencia por formulaciones eclesiásticas o abstractas.
  - La puntuación reproduce la cadencia del enunciado legal y el cierre delimitador del hebreo.
