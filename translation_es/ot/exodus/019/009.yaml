translation:
  language: es
  text: 'Yahvé dijo a Moisés: «Mira, yo vengo a ti en una nube espesa, para que el pueblo oiga cuando yo hable contigo, y también te crea[a] para siempre». Y Moisés comunicó a Yahvé las palabras del pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'confíe en ti' o 'crea en ti'. El hebreo puede expresar confianza en Moisés como portavoz acreditado de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton, como exige la política del proyecto. 'Yahvé' mantiene el valor de nombre revelado y evita sustituirlo por un título.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce una apelación solemne y deíctica. 'Mira' es natural en español moderno y conserva la fuerza de llamada del hebreo sin sonar arcaica.
- source_word: בָּא
  english_pob_choice: I am coming
  chosen_spanish: vengo
  alternatives_spanish:
  - estoy viniendo
  - voy a venir
  lexicon: HALOT
  rationale: El participio/forma verbal expresa inminencia y movimiento en curso. 'Vengo' es la forma española más natural y sobria para ese valor presente-dinámico.
- source_word: בְּעַב הֶעָנָן
  english_pob_choice: in a thick cloud
  chosen_spanish: en una nube espesa
  alternatives_spanish:
  - en una nube densa
  - en la espesura de la nube
  lexicon: HALOT
  rationale: La expresión describe una nube cerrada y visible, no una abstracción. 'Nube espesa' conserva la imagen y suena idiomático en español.
- source_word: בַּעֲבוּר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Aquí introduce finalidad, no simple causa. 'Para que' expresa mejor la relación teleológica del contexto.
- source_word: יִשְׁמַע הָעָם
  english_pob_choice: the people may hear
  chosen_spanish: el pueblo oiga
  alternatives_spanish:
  - el pueblo escuche
  - el pueblo pueda oír
  lexicon: HALOT
  rationale: El imperfecto tras una cláusula de finalidad se vuelve de manera natural un subjuntivo en español. 'Oiga' conserva la idea de percepción auditiva sin añadir matices ajenos.
- source_word: בְּדַבְּרִי עִמָּךְ
  english_pob_choice: when I speak with you
  chosen_spanish: cuando yo hable contigo
  alternatives_spanish:
  - mientras yo hable contigo
  - al hablar yo contigo
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición expresa la situación temporal en la que el pueblo oirá. 'Cuando yo hable contigo' es claro y respeta la relación directa marcada por עִם.
- source_word: וְגַם בְּךָ יַאֲמִינוּ
  english_pob_choice: and may also believe in you
  chosen_spanish: y también crea en ti
  alternatives_spanish:
  - y también confíe en ti
  - y también te crea
  lexicon: HALOT
  rationale: La construcción con ב puede expresar creer/poner confianza en alguien como portavoz acreditado. 'Crea en ti' mantiene la lectura relacional y preserva la tensión entre creer a alguien y confiar en su autoridad, sin resolverla de forma excesiva.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa duración continua y estable en español contemporáneo con naturalidad. 'Para siempre' comunica bien el alcance temporal indefinido.
- source_word: וַיַּגֵּד
  english_pob_choice: Then Moses told
  chosen_spanish: Y Moisés comunicó
  alternatives_spanish:
  - Y Moisés dijo
  - Y Moisés informó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración y presenta el reporte de Moisés. 'Comunicó' conserva el sentido de transmitir un contenido verbal sin reducirlo a una simple cita.
- source_word: דִּבְרֵי הָעָם
  english_pob_choice: the words of the people
  chosen_spanish: las palabras del pueblo
  alternatives_spanish:
  - las palabras del pueblo
  - lo que el pueblo había dicho
  lexicon: HALOT
  rationale: Se mantiene el sustantivo 'palabras' para no paraprasear el contenido reportado. 'Del pueblo' es más natural en español que una forma posesiva pesada.
theological_decisions:
- issue: Nombre divino del tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo usa יְהוָה directamente. Se preserva el nombre propio del pacto como 'Yahvé', siguiendo la norma del proyecto y evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בְּךָ יַאֲמִינוּ respecto de Moisés
  english_pob_reading: may also believe in you
  chosen_spanish_reading: también crea en ti
  alternative_spanish_readings:
  - también confíe en ti
  - también te crea
  rationale: El punto no es una afirmación doctrinal abstracta, sino la validación de Moisés como portavoz acreditado de Dios. 'Crea en ti' conserva la fuerza de confianza/credibilidad que el hebreo puede llevar, sin sobrecargar el verso con una formulación más teológica de la necesaria.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del audit trail inglés, que ajustó la relación de בְּךָ יַאֲמִינוּ para reflejar mejor la construcción hebrea y su sentido de confianza en Moisés como mediador acreditado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se preserva 'Moisés' como nombre propio sin variación.
  - '''Nube espesa'' mantiene la imaginería concreta del hebreo y su registro solemne.'
  - '''Crea en ti'' intenta conservar la tensión entre creer la palabra de Moisés y confiar en su persona como autorizado por Dios.'
