    text: 'O «sus rostros estarán en llamas». El hebreo dice literalmente: «sus rostros [son] rostros de llamas», una imagen vívida que puede sugerir palidez o rubor causados por el terror, o bien un aspecto de fuego visible en el rostro.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para reflejar mejor el hebreo y sonar más natural en español: «dolores de parto» por idiomaticidad y precisión contextual; «se quedará mirando» para conservar el matiz de estupor fijo de יִתְמָהוּ; y una leve mejora estilística de la nota al pie.'
