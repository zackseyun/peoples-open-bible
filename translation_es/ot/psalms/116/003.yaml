  - el reino de los muertos
  rationale: La transliteración preserva el término hebreo y su ambigüedad teológica, sin imponer una equivalencia interpretativa que el texto no exige. Se acompaña de nota para accesibilidad.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
