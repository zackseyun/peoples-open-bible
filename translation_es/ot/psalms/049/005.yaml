translation:
  language: es
  text: Inclinaré mi oído a un proverbio[a]; abriré mi enigma[c] con la lira[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una parábola». El hebreo מָשָׁל puede referirse a un proverbio, una parábola o una sentencia sapiencial.
    reason: lexical_alternative
  - marker: b
    text: O «sobre la lira»; tradicionalmente, «con el arpa». El hebreo כִּנּוֹר designa un instrumento de cuerdas parecido a la lira.
    reason: lexical_alternative
  - marker: c
    text: O «mi dicho oscuro» o «mi acertijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַטֶּה
  english_pob_choice: I will incline
  chosen_spanish: Inclinaré
  alternatives_spanish:
  - Doblaré
  - Volveré
  lexicon: HALOT
  rationale: El hebreo expresa una acción deliberada de orientar el oído; «inclinar» conserva bien esa imagen en español y suena natural en un registro bíblico moderno.
- source_word: לְמָשָׁל
  english_pob_choice: to a proverb
  chosen_spanish: a un proverbio
  alternatives_spanish:
  - a una parábola
  - a un dicho
  - a una sentencia
  lexicon: HALOT
  rationale: En este contexto sapiencial, מָשָׁל puede ser proverbio, dicho o parábola. «Proverbio» comunica mejor la forma breve y didáctica, sin cerrar del todo la amplitud semántica.
- source_word: אָזְנִי
  english_pob_choice: my ear
  chosen_spanish: mi oído
  alternatives_spanish:
  - mi oreja
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «mi oído» en singular, en español «inclinar mi oído» es comprensible pero algo menos idiomático que «inclinar mi oído»/«inclinaré mi oído». Se mantiene la imagen sin forzar un plural ni perder precisión.
- source_word: אֶפְתַּח
  english_pob_choice: I will open
  chosen_spanish: abriré
  alternatives_spanish:
  - desplegaré
  - manifestaré
  - explicaré
  lexicon: HALOT
  rationale: פתח significa literalmente «abrir». Se conserva el verbo para no diluir la metáfora del hebreo, que introduce la comunicación en forma enigmática.
- source_word: בְּכִנּוֹר
  english_pob_choice: with the lyre
  chosen_spanish: con el arpa
  alternatives_spanish:
  - con la lira
  - con el laúd
  lexicon: HALOT
  rationale: El término כִּנּוֹר designa un instrumento de cuerdas tipo lira. En español bíblico, «arpa» es el equivalente más reconocido y lector-amigable, aunque no es el más técnico; se evita introducir una nota aquí para no sobrecargar el verso, dado que el auditorio español entiende mejor «arpa».
- source_word: חִידָתִי
  english_pob_choice: my riddle
  chosen_spanish: mi enigma
  alternatives_spanish:
  - mi acertijo
  - mi enigma oscuro
  - mi dicho enigmático
  lexicon: HALOT
  rationale: חִידָה puede ser acertijo, enigma o dicho oscuro. «Enigma» reproduce bien el carácter críptico del texto sin sonar infantil como «acertijo».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y coincide en sustancia con la decisión inglesa auditada: escuchar atentamente un proverbio y expresar un enigma con acompañamiento instrumental. No se detectaron revisiones que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantuvo el singular implícito del hebreo con «mi oído».
  - Se preservó la metáfora de «abrir» para פתח.
  - Se eligió un registro bíblico claro y contemporáneo, evitando el calco excesivo.
  - Se usó «enigma» para reflejar la ambigüedad de חִידָה sin perder legibilidad.
