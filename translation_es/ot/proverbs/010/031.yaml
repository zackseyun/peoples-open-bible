translation:
  language: es
  text: La boca del justo da fruto de sabiduría[a], pero la lengua de perversidad[b] será cortada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace brotar sabiduría»; el hebreo del verbo sugiere brotar o dar fruto.
    reason: lexical_alternative
  - marker: b
    text: O «lengua perversa» o «lengua de perversidades»; el plural hebreo puede intensificar la idea de habla torcida.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - mouth
  - boca de
  lexicon: HALOT
  rationale: En español, «boca» conserva la concreción metonímica del órgano de habla y suena más natural que calcar «mouth»; mantiene la imagen sapiencial del miembro que habla.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - el justo
  - los rectos
  lexicon: HALOT
  rationale: El singular adjetival hebreo funciona aquí como clase representativa; en español, el plural sustantivado «los justos» comunica de forma natural el grupo caracterizado por la justicia sin forzar un masculino singular.
- source_word: יָנוּב
  english_pob_choice: bears ... as fruit
  chosen_spanish: produce ... como fruto
  alternatives_spanish:
  - da fruto
  - brota
  - lleva fruto
  lexicon: HALOT
  rationale: El verbo hebreo evoca brotar o dar fruto. «Produce ... como fruto» conserva la metáfora orgánica sin sonar arcaico en español; la nota preserva la alternativa más literal de «dar fruto».
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - palabras sabias
  - habla sabia
  lexicon: HALOT
  rationale: El sustantivo abstracto se mantiene como «sabiduría», tal como permite el hebreo y como refleja el audit trail inglés; no se expande indebidamente a «habla sabia».
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - habla
  - lenguaje
  lexicon: HALOT
  rationale: «Lengua» reproduce el metónimo hebreo de forma clara y paralela a «boca» en el primer hemistiquio.
- source_word: תַּהְפֻּכ֗וֹת
  english_pob_choice: perversity
  chosen_spanish: perversidad
  alternatives_spanish:
  - perversiones
  - torcedura
  - engaño
  lexicon: HALOT
  rationale: Aunque el inglés revisado optó por singular, el plural hebreo puede expresar cualidad colectiva. «Perversidad» comunica en español la cualidad moral torcida sin perder la severidad del término.
- source_word: תִּכָּרֵת
  english_pob_choice: will be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será eliminada
  - será extirpada
  - será arrancada
  lexicon: HALOT
  rationale: La pasiva del verbo de cortar se vierte con el giro directo «será cortada», que preserva la contundencia del hebreo sin añadir una interpretación específica de silenciamiento o destrucción.
theological_decisions:
- issue: Tratamiento de צַדִּיק como categoría ética colectiva en proverbio
  english_pob_reading: the righteous
  chosen_spanish_reading: los justos
  alternative_spanish_readings:
  - el justo
  - las personas justas
  rationale: El audit trail inglés entiende el término como una clase representativa. En español, el plural sustantivado evita restringir la referencia a un individuo masculino y mantiene el valor proverbial general.
  doctrine_reference: 'Sabiduría proverbial: la conducta de los justos frente a los perversos.'
- issue: Imagen orgánica de יָנוּב
  english_pob_reading: bears wisdom as fruit
  chosen_spanish_reading: produce sabiduría como fruto
  alternative_spanish_readings:
  - da fruto de sabiduría
  - brota sabiduría
  rationale: Se conserva la tensión entre metáfora botánica y objeto abstracto. «Como fruto» mantiene el campo semántico de crecer/brotar/bear fruit señalado por el inglés y evita convertir el versículo en una mera afirmación abstracta.
  doctrine_reference: 'Proverbios: la palabra justa tiene efecto fecundo y moralmente vivificante.'
- issue: Valor del plural hebreo תַּהְפֻּכ֗וֹת sin forzar una singularización excesiva
  english_pob_reading: tongue of perversity
  chosen_spanish_reading: lengua de perversidad
  alternative_spanish_readings:
  - lengua de perversidades
  - lengua perversa
  rationale: El inglés revisado singularizó por naturalidad, pero el hebreo plural puede funcionar como intensificación o cualidad colectiva. «Perversidad» conserva la cualidad abstracta y evita perder completamente la forma del original.
  doctrine_reference: 'Ética bíblica del habla: Dios juzga la palabra torcida.'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «perversities» a la singular más natural «perversity» para תַּהְפֻּכוֹת. La presente versión mantiene la naturalidad española con «perversidad», pero explicita en nota que el plural hebreo puede intensificar la cualidad o el conjunto de desvíos del habla. También conserva la metáfora orgánica de יָנוּב mediante «produce ... como fruto», equivalente funcional a «bears wisdom as fruit».
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «sabiduría» para חָכְמָה sin ampliar a «habla sabia», siguiendo el sustantivo del texto.
  - «Boca» y «lengua» se mantienen como pares metonímicos paralelos, coherentes con el estilo sapiencial hebreo.
  - «Justos» traduce צַדִּיק de manera sustantivada y colectiva, acorde con el uso proverbial.
  - La pasiva «será cortada» preserva la dureza del hebreo sin suavizarla a «será silenciada».
