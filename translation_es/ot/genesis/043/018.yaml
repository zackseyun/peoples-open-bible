translation:
  language: es
  text: 'Los hombres tuvieron miedo porque habían sido llevados a la casa de José, y dijeron: «Es por el dinero que fue devuelto en nuestros sacos la primera vez que nos están haciendo entrar, para que él busque un pretexto[a] contra nosotros, caiga sobre nosotros, y nos tome como esclavos, junto con nuestros asnos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que busque una ocasión contra nosotros». La expresión hebrea detrás de «busque un pretexto contra nosotros» es idiomática y difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - se asustaron
  - temieron
  lexicon: HALOT
  rationale: El hebreo expresa la reacción emocional de temor en la narración. ‘Tuvieron miedo’ es natural en español y conserva el valor de miedo sin forzar una terminología más fuerte que el contexto no exige.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: Se refiere a los hermanos y sus acompañantes como sujetos masculinos. ‘Los hombres’ es preciso y fluido en español.
- source_word: הוּבְאוּ
  english_pob_choice: had been brought
  chosen_spanish: habían sido introducidos
  alternatives_spanish:
  - habían sido llevados
  - fueron llevados
  lexicon: HALOT
  rationale: La forma pasiva del hebreo indica que fueron causados a entrar en la casa. ‘Introducidos’ comunica bien la idea de ser conducidos al interior, conservando el matiz pasivo.
- source_word: בֵּית יוֹסֵף
  english_pob_choice: Joseph’s house
  chosen_spanish: la casa de José
  alternatives_spanish:
  - la casa de José
  - la casa de José
  lexicon: HALOT
  rationale: Mantengo el genitivo simple y directo del hebreo. En español, ‘la casa de José’ es la forma más natural y fiel.
- source_word: עַל דְּבַר הַכֶּסֶף
  english_pob_choice: because of the money
  chosen_spanish: a causa del dinero
  alternatives_spanish:
  - por el asunto del dinero
  - con respecto al dinero
  lexicon: HALOT
  rationale: La expresión hebrea aquí es causal, no meramente temática. ‘A causa de’ reproduce bien la inferencia de los hermanos.
- source_word: הַשָּׁב
  english_pob_choice: that was returned
  chosen_spanish: que fue devuelto
  alternatives_spanish:
  - que había sido devuelto
  - devuelto
  lexicon: HALOT
  rationale: El participio pasivo apunta al dinero regresado en los costales. ‘Que fue devuelto’ es claro y respeta la referencia narrativa.
- source_word: בְּאַמְתְּחֹתֵינוּ
  english_pob_choice: in our sacks
  chosen_spanish: en nuestros costales
  alternatives_spanish:
  - en nuestros sacos
  - en nuestras bolsas
  lexicon: HALOT
  rationale: אָמְתַּחַת designa un saco de viaje o grano. ‘Costales’ funciona bien en español bíblico contemporáneo y sugiere un recipiente de transporte grande.
- source_word: בַּתְּחִלָּה
  english_pob_choice: the first time
  chosen_spanish: la primera vez
  alternatives_spanish:
  - al principio
  - inicialmente
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere al viaje anterior a Egipto. ‘La primera vez’ es la equivalencia más clara y natural.
- source_word: מֽוּבָאִים
  english_pob_choice: we are being brought in
  chosen_spanish: estamos siendo introducidos
  alternatives_spanish:
  - somos introducidos
  - nos están llevando
  lexicon: HALOT
  rationale: La forma pasiva/medio-pasiva expresa una acción en curso. ‘Estamos siendo introducidos’ conserva el valor progresivo y la voz pasiva del hebreo.
- source_word: לְהִתְגֹּלֵל עָלֵינוּ
  english_pob_choice: so that he may make a pretext against us
  chosen_spanish: para que él busque un pretexto contra nosotros
  alternatives_spanish:
  - para que él encuentre una excusa contra nosotros
  - para acusarnos
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de captar el idioma difícil con una equivalencia idiomática. ‘Buscar un pretexto contra nosotros’ preserva el matiz hostil y forense sin literalismo opaco.
- source_word: וּלְהִתְנַפֵּל עָלֵינוּ
  english_pob_choice: and fall upon us
  chosen_spanish: y caiga sobre nosotros
  alternatives_spanish:
  - y nos ataque
  - y se lance sobre nosotros
  lexicon: HALOT
  rationale: El hitpael de נפל con עַל comunica una agresión. ‘Caiga sobre nosotros’ sigue de cerca la imagen hebrea y funciona en español.
- source_word: וְלָקַחַת אֹתָנוּ לַעֲבָדִים
  english_pob_choice: and take us as slaves
  chosen_spanish: y nos tome como esclavos
  alternatives_spanish:
  - y nos lleve como esclavos
  - y nos haga esclavos
  lexicon: HALOT
  rationale: POB opta por ‘slaves’ para preservar la fuerza lexical de la raíz. ‘Esclavos’ mantiene esa fuerza mejor que ‘siervos’.
- source_word: וְאֶת חֲמֹרֵינוּ
  english_pob_choice: along with our donkeys
  chosen_spanish: junto con nuestros asnos
  alternatives_spanish:
  - y nuestros asnos
  - además de nuestros asnos
  lexicon: HALOT
  rationale: El hebreo añade los animales como parte de lo que temen que les sea arrebatado. ‘Junto con’ expresa bien la coordinación inclusiva.
theological_decisions:
- issue: Cómo renderizar la pasiva de הוּבְאוּ / מוּבָאִים sin suavizar la ironía temerosa de los hermanos
  english_pob_reading: had been brought / we are being brought in
  chosen_spanish_reading: habían sido introducidos / estamos siendo introducidos
  alternative_spanish_readings:
  - habían sido llevados / nos están llevando
  - habían sido conducidos / estamos siendo conducidos
  rationale: 'El texto presenta su miedo como una deducción: interpretar su entrada en la casa como el inicio de un trato hostil. En español, la doble pasiva preserva la sensación de ser puestos en manos ajenas, sin añadir una interpretación doctrinal ajena al pasaje.'
  doctrine_reference: Ninguna; observación narrativa y lexical.
- issue: Mantener ‘esclavos’ para לַעֲבָדִים
  english_pob_reading: take us as slaves
  chosen_spanish_reading: nos tome como esclavos
  alternative_spanish_readings:
  - nos haga siervos
  - nos ponga a servir
  rationale: La palabra hebrea designa servidumbre coercitiva. ‘Esclavos’ conserva la dureza del peligro que imaginan los personajes y evita suavizar el texto.
  doctrine_reference: Éxodo 21:2; Levítico 25:39-46 como trasfondo de esclavitud y servidumbre forzada.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de Génesis 43:18 y el historial auditado en inglés. No hubo revisiones previas aplicadas en el paquete de control; la versión española mantiene la misma lectura básica, con ajustes naturales de sintaxis y léxico para el español.
  spanish_consistency_notes:
  - Se mantiene ‘José’ para יוֹסֵף, conforme al uso bíblico establecido y a la transparencia del nombre propio.
  - Se usa ‘esclavos’ y no ‘siervos’ para לַעֲבָדִים, en coherencia con la elección POB y la fuerza del contexto.
  - Se conserva el matiz idiomático de לְהִתְגֹּלֵל עָלֵינוּ mediante una nota, porque el sentido exacto es difícil y no debe normalizarse indebidamente.
  - Se emplea ‘asnos’ como equivalente directo de חֲמֹרֵינוּ, sin domesticarlo a un término más genérico.
