translation:
  language: es
  text: Y todo el que no venga dentro de tres días[a], conforme al consejo de los oficiales y de los ancianos, todos sus bienes serán confiscados[b], y él mismo será separado de la asamblea de los exiliados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al cabo de tres días». La frase establece un plazo límite para comparecer.
    reason: alternative_reading
  - marker: b
    text: O «serán puestos bajo el anatema» o «serán puestos bajo el ban». El verbo hebreo denota ser puesto bajo חרם, lo que puede implicar destrucción o confiscación; aquí el sentido contextual es la pérdida legal de los bienes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל אֲשֶׁר
  english_pob_choice: And everyone who
  chosen_spanish: Y todo el que
  alternatives_spanish:
  - Y quien
  - Y todos los que
  lexicon: HALOT
  rationale: La expresión introduce una clase general y distributiva. «Todo el que» es natural en español, conserva el alcance individual y evita una formulación rígida o demasiado literal.
- source_word: לֹא יָבוֹא
  english_pob_choice: does not come
  chosen_spanish: no venga
  alternatives_spanish:
  - no llegue
  - no acuda
  lexicon: HALOT
  rationale: En este contexto legal, el verbo señala presentarse en respuesta al llamado. En español, el subjuntivo en la cláusula condicional («no venga») expresa adecuadamente la condición.
- source_word: לִשְׁלֹשֶׁת הַיָּמִים
  english_pob_choice: within three days
  chosen_spanish: dentro de tres días
  alternatives_spanish:
  - en tres días
  - al cabo de tres días
  lexicon: HALOT
  rationale: La frase marca el plazo límite para comparecer. «Dentro de tres días» comunica bien el plazo en español contemporáneo sin perder el sentido de límite temporal.
- source_word: כַּעֲצַת
  english_pob_choice: according to the counsel of
  chosen_spanish: conforme al consejo de
  alternatives_spanish:
  - según la decisión de
  - de acuerdo con el consejo de
  lexicon: HALOT
  rationale: עֵצָה puede significar consejo, determinación o decisión. «Conforme al consejo de» conserva la relación léxica y resulta claro en un contexto administrativo y judicial.
- source_word: הַשָּׂרִים וְהַזְּקֵנִים
  english_pob_choice: the officials and the elders
  chosen_spanish: los oficiales y los ancianos
  alternatives_spanish:
  - los príncipes y los ancianos
  - los líderes y los ancianos
  lexicon: HALOT
  rationale: En el contexto postexílico, שָׂרִים se entiende mejor como «oficiales» que como «príncipes». «Ancianos» es el equivalente habitual de זְקֵנִים.
- source_word: יָחֳרַם
  english_pob_choice: shall be forfeited
  chosen_spanish: será puesto bajo anatema
  alternatives_spanish:
  - será confiscado
  - será declarado devoto al anatema
  - será puesto bajo el ban
  lexicon: HALOT
  rationale: El verbo חרם conserva una carga técnica de anatema/ban, con posible efecto de confiscación o destrucción. Como la revisión inglesa favoreció «forfeited» por el contexto legal, en español se mantiene la tensión con «puesto bajo anatema», sin reducirlo a una simple incautación.
- source_word: כָּל רְכוּשׁוֹ
  english_pob_choice: all his property
  chosen_spanish: todo su bien
  alternatives_spanish:
  - todas sus posesiones
  - toda su propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ designa posesiones o bienes. «Todo su bien» suena más natural en español legal-bíblico y mantiene el sentido de totalidad patrimonial.
- source_word: וְהוּא יִבָּדֵל
  english_pob_choice: and he himself shall be separated
  chosen_spanish: y él mismo será separado
  alternatives_spanish:
  - y él será excluido
  - y él quedará separado
  lexicon: HALOT
  rationale: Niphal de בדל indica separación. Se conserva la formulación directa «será separado» para no introducir una categoría eclesial ajena al texto, y «él mismo» refleja el pronombre enfático.
- source_word: מִקְּהַל הַגּוֹלָה
  english_pob_choice: from the assembly of the exiles
  chosen_spanish: de la asamblea de los exiliados
  alternatives_spanish:
  - de la congregación de los exiliados
  - de la comunidad de los exiliados
  lexicon: HALOT
  rationale: קהל se rinde bien como «asamblea», evitando un lenguaje eclesiástico innecesario. הַגּוֹלָה se refiere a la comunidad del exilio; «exiliados» conserva la referencia directa al grupo histórico.
theological_decisions:
- issue: Sentido de חרם aplicado a la propiedad
  english_pob_reading: Forfeited, with note that the Hebrew verb denotes being placed under חרם, a ban/devotion that can imply destruction or confiscation.
  chosen_spanish_reading: «Será puesto bajo anatema» en el texto principal, para conservar la fuerza técnica del término, con la idea de posible confiscación implícita en el contexto.
  alternative_spanish_readings:
  - será confiscado
  - será puesto bajo el ban
  - será devoto al anatema
  rationale: La revisión inglesa observa que en este caso el efecto legal puede ser de pérdida de bienes; sin embargo, el verbo hebreo conserva la categoría de חרם. En español conviene mantener esa tensión con «anatema»/«ban», sin trivializarlo como mera incautación administrativa.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Naturaleza de la separación del culpable
  english_pob_reading: He himself shall be separated from the assembly of the exiles.
  chosen_spanish_reading: Él mismo será separado de la asamblea de los exiliados.
  alternative_spanish_readings:
  - será excluido de la asamblea de los exiliados
  - será excomulgado de la asamblea de los exiliados
  rationale: El texto dice separación de la asamblea, no una categoría institucional posterior. «Será separado» preserva el lenguaje fuente y evita importar un término eclesiástico no explicitado por el hebreo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió «devoted to destruction» por «forfeited» para reflejar mejor el matiz legal de יָחֳרַם en este contexto. La redacción española conserva esa corrección sin perder la fuerza técnica del hebreo mediante «puesto bajo anatema», con nota que admite la alternativa de confiscación. Se mantuvo la estructura sintáctica general del texto fuente y la distinción entre la sanción sobre los bienes y la separación del individuo.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el tetragrámaton.
  - «Oficiales» se emplea en lugar de «príncipes» por el contexto postexílico administrativo.
  - «Asamblea» se prefirió a «congregación» para evitar cargar el pasaje con terminología eclesial posterior.
  - Se mantuvo «exiliados» para reflejar con claridad la referencia histórica de הַגּוֹלָה.
  - La nota sobre חרם preserva la tensión entre anatema, ban y confiscación, conforme al audit trail inglés y al hebreo.
