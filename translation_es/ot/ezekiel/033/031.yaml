  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: venir al profeta, sentarse delante de él como pueblo de Dios, oír sus palabras y no hacerlas, con contraste entre boca y corazón. Conserva adecuadamente עַמִּי como «mi pueblo», la oposición oír/hacer, y בִצְעָם como «ganancia injusta». El principal desajuste está en כִּמְבוֹא עָם: «como viene la gente» suena poco natural y además debilita el matiz comparativo/idiomático de «como suele venir un pueblo / como viene un pueblo». También «cosas de deseo» preserva la ambigüedad léxica, pero en español queda algo opaco; puede mejorarse sin perder la nota explicativa.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero necesita un ajuste de naturalidad y claridad. «Como viene la gente» resulta torpe en español bíblico-natural. «Cosas de deseo» es entendible, aunque algo extraño; «cosas sensuales» comunica mejor el sentido contextual de expresiones de deseo desordenado, mientras la nota conserva alternativas más amplias. El resto del verso fluye bien y mantiene un registro eclesial moderno.
  glossary_alignment: No hay términos del glosario mayor comprometidos en este versículo. Se mantiene «mi pueblo» correctamente. No aparece el nombre divino ni otros términos sensibles del proyecto. La revisión propuesta respeta la decisión auditada de mantener el contraste boca/corazón y el matiz moral de «ganancia injusta».
