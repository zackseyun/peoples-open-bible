translation:
  language: es
  text: 'Entonces les dije[a]: «Si les parece bien, denme mi salario; pero si no, absténganse». Entonces pesaron mi salario: treinta piezas de plata.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «treinta plata»; posiblemente «treinta siclos de plata».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces les dije
  alternatives_spanish:
  - Y les dije
  - Entonces dije
  lexicon: HALOT
  rationale: La forma con waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia y suena natural en español. Se explicita el destinatario con «les» porque אֲלֵיהֶם lo hace explícito.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: HALOT
  rationale: El sufijo de tercera persona plural se refleja de modo natural en el dativo átono español. El complemento se integra en la sintaxis del verbo de habla.
- source_word: אִם טוֹב בְּעֵינֵיכֶם
  english_pob_choice: If it is good in your eyes
  chosen_spanish: Si os parece bien
  alternatives_spanish:
  - Si es bueno a vuestros ojos
  - Si os resulta agradable
  lexicon: HALOT
  rationale: La imagen hebrea «bueno en vuestros ojos» se conserva idiomáticamente como «os parece bien», que comunica la misma evaluación sin sonar forzado. En español mantiene el sentido de aprobación subjetiva.
- source_word: הָבוּ
  english_pob_choice: give
  chosen_spanish: dadme
  alternatives_spanish:
  - pagadme
  - entregadme
  lexicon: HALOT
  rationale: El imperativo básico es «dar»; como el objeto es salario, en español «dadme» conserva la forma léxica y el contexto aporta la noción de pago. Se evita sustituirlo por «pagadme» para no estrechar innecesariamente el verbo hebreo.
- source_word: שְׂכָרִי
  english_pob_choice: my wages
  chosen_spanish: mi salario
  alternatives_spanish:
  - mi paga
  - mi recompensa
  lexicon: HALOT
  rationale: «Salario» expresa compensación debida por trabajo de modo claro y contemporáneo, y es suficientemente amplio para el contexto pastoril. Se evita «recompensa» por ser menos preciso económicamente.
- source_word: וְאִם לֹא חֲדָלוּ
  english_pob_choice: but if not, refrain
  chosen_spanish: y si no, absteneos
  alternatives_spanish:
  - y si no, dejadlo
  - pero si no, desistid
  lexicon: HALOT
  rationale: חָדַל significa cesar o abstenerse; «absteneos» reproduce bien la idea de dejar de actuar sin introducir un matiz distinto. «Y si no» mantiene la contraposición breve del hebreo.
- source_word: וַיִּשְׁקְלוּ
  english_pob_choice: they weighed out
  chosen_spanish: Y ellos pesaron
  alternatives_spanish:
  - Y ellos pesaron en balanza
  - Y ellos midieron por peso
  lexicon: HALOT
  rationale: El verbo es literalmente «pesar». En español, «pesaron» preserva la imagen de pago por peso; «pesaron» con objeto directo resulta claro y fiel, sin añadir elementos no expresados.
- source_word: שְׁלֹשִׁים כָּסֶף
  english_pob_choice: thirty pieces of silver
  chosen_spanish: treinta piezas de plata
  alternatives_spanish:
  - treinta monedas de plata
  - treinta siclos de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «treinta plata»; la POB inglesa eligió «pieces of silver» sin fijar una unidad. En español, «piezas de plata» mantiene esa indeterminación mejor que «monedas», y «siclos» quedaría demasiado específico sin apoyo explícito en el texto.
theological_decisions:
- issue: Unidad monetaria implícita en la frase final
  english_pob_reading: thirty pieces of silver
  chosen_spanish_reading: treinta piezas de plata
  alternative_spanish_readings:
  - treinta siclos de plata
  - treinta monedas de plata
  rationale: El hebreo no nombra la unidad; por eso conviene conservar una expresión amplia que no introduzca una especificación histórica no explicitada. «Piezas de plata» sigue de cerca el sentido del inglés POB y deja abierta la equivalencia exacta.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: Este borrador sigue de cerca la decisión revisada del inglés POB de no fijar la unidad monetaria en el texto principal. No se aprecian revisiones posteriores que obliguen a modificar el sentido o la puntuación del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el nombre divino aparece explícitamente; aquí no aparece.
  - Se usa tratamiento plural coherente con el hebreo («os», «dadme», «absteneos») por el destinatario plural.
  - «Salario» se emplea como término transparente y neutral para שְׂכָר, sin convertirlo en lenguaje litúrgico.
