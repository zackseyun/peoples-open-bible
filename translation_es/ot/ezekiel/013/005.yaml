review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la imaginería militar del hebreo: «brechas», «muro», «batalla» y «día de Yahvé». También mantiene correctamente «Yahvé» para יְהוָה. Sin embargo, hay un problema gramatical importante de concordancia verbal: el hebreo usa 2mp («ustedes»), pero el español dice «subiste… levantaste» en singular. Además, «subiste a las brechas» suena algo forzado; «subieron a las brechas» o «acudieron a las brechas» sería más natural, pero conviene conservar el valor concreto de עלה con «subieron».'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero necesita corrección por la incongruencia entre sujeto plural implícito y verbos singulares. También mejora la fluidez cambiar «ella pudiera mantenerse firme» por «pudiera mantenerse firme», ya que «la casa de Israel» ya funciona como antecedente claro y el pronombre expreso resulta algo pesado.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Yahvé» para יְהוָה y mantenimiento de la metáfora fortificadora. «Brechas» es una elección adecuada, y la nota alternativa «en las brechas» refleja bien la posible lectura preposicional sin perder la imagen de muralla rota.'
  issues:
  - severity: high
    issue: Concordancia incorrecta de número en los verbos principales
    rationale: עֲלִיתֶם y וַתִּגְדְּרוּ están en segunda persona plural. «Subiste… levantaste» cambia el destinatario del reproche y no es fiel al hebreo.
  - severity: low
    issue: Pronombre explícito «ella» innecesario
    rationale: «Para que ella pudiera mantenerse firme» es comprensible, pero en español suena más natural «para que pudiera mantenerse firme», manteniendo el antecedente colectivo «la casa de Israel».
  revised_spanish_text: No subieron[a] a las brechas ni levantaron un muro para la casa de Israel, para que pudiera mantenerse firme en la batalla en el día de Yahvé.
  revised_footnotes:
  - marker: a
    text: O «en las brechas». El hebreo se refiere a roturas en una muralla, siguiendo la imagen defensiva.
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia a segunda persona plural implícita en español («subieron… levantaron») para reflejar fielmente las formas hebreas plurales. Se mantiene «brechas», «muro», «batalla» y «Yahvé» por su buena alineación con el texto fuente y la política terminológica. Se elimina «ella» para mejorar la naturalidad del español sin pérdida de sentido.
