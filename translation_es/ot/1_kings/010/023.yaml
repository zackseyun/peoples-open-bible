translation:
  language: es
  text: Así el rey Salomón superó a todos los reyes de la tierra en riqueza y sabiduría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y el rey Salomón llegó a ser más grande que todos los reyes de la tierra en riqueza y sabiduría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  english_pob_choice: surpassed
  chosen_spanish: llegó a ser mayor que
  alternatives_spanish:
  - superó
  - fue mayor que
  - creció más que
  lexicon: HALOT
  rationale: En esta construcción comparativa con מִן, גדל expresa hacerse o resultar mayor que otros. En español, «llegó a ser mayor que» conserva el matiz de cambio/resultado sin sonar forzado; «superó» también sería posible, pero introduce un matiz más activo que el hebreo no exige.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - rey Salomón
  - Salomón, el rey
  lexicon: HALOT
  rationale: La apposición hebrea se expresa de forma natural en español con artículo + título + nombre. «El rey Salomón» preserva el título definido y el nombre propio de manera clara y digna.
- source_word: מִכֹּל מַלְכֵי הָאָרֶץ
  english_pob_choice: all the kings of the earth
  chosen_spanish: que todos los reyes de la tierra
  alternatives_spanish:
  - que todos los reyes de la tierra
  - que todos los reyes del país
  - que todos los reyes del mundo
  lexicon: HALOT
  rationale: En este contexto real y comparativo, אֶרֶץ se entiende de manera amplia como «tierra», no solo «país». El giro comparativo español «mayor que todos los reyes de la tierra» reproduce con naturalidad el alcance del hebreo.
- source_word: לְעֹשֶׁר
  english_pob_choice: in wealth
  chosen_spanish: en riqueza
  alternatives_spanish:
  - en riqueza material
  - en bienes
  - en riquezas
  lexicon: HALOT
  rationale: עֹשֶׁר designa riqueza material. «Riqueza» es el equivalente más directo y claro en español; mantiene el sustantivo abstracto y funciona bien en la coordinación con «sabiduría».
- source_word: וּלְחָכְמָה
  english_pob_choice: and wisdom
  chosen_spanish: y sabiduría
  alternatives_spanish:
  - e inteligencia
  - y en sabiduría
  lexicon: HALOT
  rationale: חָכְמָה se traduce normalmente como «sabiduría». En español, repetir «en» ante el segundo miembro es posible pero no necesario; la coordinación simple «riqueza y sabiduría» conserva el sentido del hebreo de manera fluida.
translation_notes:
  revision_awareness: El texto inglés POB usa «surpassed» con nota alternativa más formal; la versión española refleja esa misma decisión con una construcción natural («llegó a ser mayor que») y conserva la alternativa formal en nota.
  spanish_consistency_notes:
  - Se mantiene «Salomón» y no «Shlomó» por la forma estándar bíblica en español.
  - «Yahvé» no aparece en este versículo, por lo que no aplica la convención del nombre divino.
  - Se ha preferido «tierra» para הָאָרֶץ siguiendo el alcance universal del contexto comparativo, no «país».
