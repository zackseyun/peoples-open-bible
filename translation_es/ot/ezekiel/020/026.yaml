translation:
  language: es
  text: Y los contaminé por medio de sus dones[a], al hacer pasar por el fuego a todo primogénito[b], para que los devastara[c], a fin de que supieran que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de sus ofrendas». El hebreo dice literalmente «sus dones», aunque en este contexto cultual puede referirse a ofrendas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «todo el que abre el vientre». Este modismo hebreo se refiere al primogénito.
    reason: lexical_alternative
  - marker: c
    text: O «para que los desolara» o «para que los horrorizara».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲטַמֵּא
  english_pob_choice: And I defiled
  chosen_spanish: los contaminé
  alternatives_spanish:
  - los hice inmundos
  - los profané
  lexicon: HALOT
  rationale: El verbo hebreo en causativo expresa que Dios los hizo quedar impuros/contaminados en sentido cultual y moral. «Contaminé» conserva esa fuerza con buen español, sin suavizarla a una expresión meramente explicativa.
- source_word: בְּמַתְּנוֹתָם
  english_pob_choice: through their gifts
  chosen_spanish: con sus ofrendas
  alternatives_spanish:
  - por sus dones
  - mediante sus regalos
  lexicon: HALOT
  rationale: En contexto sacrificial, מַתָּנוֹת puede referirse a ofrendas. «Ofrendas» comunica el sentido cultual sin perder la base léxica; «con» refleja el valor instrumental de בְּ.
- source_word: בְּהַעֲבִיר
  english_pob_choice: by making ... pass through
  chosen_spanish: al hacer pasar
  alternatives_spanish:
  - por hacer pasar
  - cuando hicieron pasar
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ admite valor instrumental o temporal. «Al hacer pasar» suena natural en español y conserva la relación causal/instrumental del hebreo.
- source_word: כָּל פֶּטֶר רָחַם
  english_pob_choice: every firstborn pass through the fire
  chosen_spanish: a todo primer nacido
  alternatives_spanish:
  - a todo el que abre el vientre
  - a todo primogénito
  lexicon: HALOT
  rationale: La expresión es un idiomático «abridor del vientre», es decir, el primogénito. «Primer nacido» mantiene la idea sin encerrar al lector en un calco duro; la nota preserva la forma literal.
- source_word: לְמַעַן אֲשִׁמֵּם
  english_pob_choice: so that I might devastate them
  chosen_spanish: para que los devastara
  alternatives_spanish:
  - para arruinarlos
  - para desolarlos
  lexicon: HALOT
  rationale: El hifil de שמם puede significar desolar/devastar o aturdir. En este contexto de juicio, «devastara» expresa bien el resultado punitivo y mantiene la tensión del texto.
- source_word: לְמַעַן אֲשֶׁר יֵדְעוּ
  english_pob_choice: so that they might know
  chosen_spanish: a fin de que supieran
  alternatives_spanish:
  - para que conocieran
  - de modo que supieran
  lexicon: HALOT
  rationale: La fórmula profética de Ezequiel apunta al reconocimiento revelador de Yahvé mediante el juicio. «A fin de que» conserva el matiz final más solemne que un simple «para que».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino usada por la POB en español. Esto preserva la distinción entre el nombre propio y un título sustitutivo.
theological_decisions:
- issue: Agencia divina en la contaminación de Israel
  english_pob_reading: Retain the direct first-person divine statement ('I defiled them') without softening it, while allowing the instrumental phrase to show that this occurred through their own cultic gifts and the passing over of the firstborn.
  chosen_spanish_reading: 'Conservar una declaración divina directa: «los contaminé», sin volverla meramente permisiva o impersonal.'
  alternative_spanish_readings:
  - los dejé contaminarse
  - permití su contaminación
  - los entregué a la contaminación
  rationale: El hebreo usa primera persona causal. La traducción debe conservar esa tensión teológica sin diluirla. A la vez, la frase instrumental «con sus ofrendas» y la acción ritual mencionada sitúan la contaminación en el marco del juicio sobre sus propios actos.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Idiomatismo de «פֶּטֶר רָחַם» y el trasfondo del rito
  english_pob_reading: Translate the idiom with explicit firstborn language and preserve the more literal 'opener of the womb' in a footnote.
  chosen_spanish_reading: Usar «a todo primer nacido» en el texto principal y conservar en nota la literalidad del hebreo.
  alternative_spanish_readings:
  - a todo el que abre el vientre
  - a todo primogénito
  - a todo primer fruto del vientre
  rationale: El español necesita una formulación clara y publicable; «primer nacido» comunica el sentido idiomático. La nota preserva el equivalente más literal y la imagen del vientre para la auditoría textual.
  doctrine_reference: Equivalencia óptima; documentar decisiones léxicas significativas.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del auditable inglés, que sustituyó una formulación imprecisa sobre «womb» por «pass through the fire». Por eso la versión española evita reproducir «vientre» en el texto principal y mantiene el matiz ritual de «hacer pasar por el fuego» mediante una nota explicativa implícita en la selección léxica de la frase.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה, de acuerdo con el estándar del proyecto.
  - Se prefiere «contaminé» frente a «hice inmundos» por fluidez y fuerza cultual.
  - «Primer nacido» se usa en el texto principal como equivalente natural de la expresión idiomática hebrea.
  - Las notas mantienen alternativas léxicas relevantes sin sobrecargar el texto principal.
