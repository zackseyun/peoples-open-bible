translation:
  language: es
  text: 'Y dije: «Ciertamente las tinieblas me cubrirán[a], y la noche será luz alrededor de mí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me abrumarán» o «me herirán». El verbo hebreo es raro, y su matiz preciso aquí es debatido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y la noche es luz alrededor de mí». La cláusula hebrea no tiene verbo; puede traducirse en presente o en futuro, según cómo se entienda su relación con la declaración del salmista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Y yo dije
  lexicon: HALOT
  rationale: El verbo es un perfecto narrativo de 1cs con ו consecutiva; en español natural y fiel puede rendirse como pasado simple. Se omite el sujeto explícito porque el español lo permite y mantiene la fluidez del discurso.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Solo
  lexicon: HALOT
  rationale: Aquí אַךְ es enfático, no restrictivo. «Ciertamente» conserva la seguridad/assertividad del hablante sin introducir una restricción que el contexto no exige.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  - la noche
  lexicon: HALOT
  rationale: Se mantiene el campo semántico de oscuridad/tinieblas. «Las tinieblas» suena natural en registro bíblico y preserva el valor poético colectivo del término.
- source_word: יְשׁוּפֵנִי
  english_pob_choice: will cover me
  chosen_spanish: me cubrirán
  alternatives_spanish:
  - me aplastarán
  - me herirán
  - me oprimirán
  - me envolverán
  lexicon: HALOT
  rationale: El verbo es raro y su matiz exacto es debatido. Siguiendo la decisión inglesa de privilegiar una imagen de cobertura/recubrimiento, «me cubrirán» comunica bien el paralelismo con la segunda mitad del verso y evita fijar una violencia más concreta que el contexto no obliga a adoptar.
- source_word: וְלַיְלָה
  english_pob_choice: and the night
  chosen_spanish: y la noche
  alternatives_spanish:
  - y aun la noche
  - y la noche misma
  lexicon: HALOT
  rationale: La conjunción simple y el sustantivo se rinden de forma directa. «La noche» preserva el paralelo con «las tinieblas» sin sobreinterpretar el valor de la conjunción.
- source_word: אוֹר
  english_pob_choice: will be light
  chosen_spanish: será luz
  alternatives_spanish:
  - es luz
  - se hará luz
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal sin verbo. En español, «será luz» reproduce de manera natural la predicación y mantiene la tensión futura del enunciado profético/reflexivo que adoptó la versión inglesa.
- source_word: בַּעֲדֵנִי
  english_pob_choice: around me
  chosen_spanish: alrededor de mí
  alternatives_spanish:
  - a mi alrededor
  - sobre mí
  - en torno a mí
  lexicon: HALOT
  rationale: La preposición en este contexto expresa circundamiento espacial. «Alrededor de mí» es claro, idiomático y conserva la imagen envolvente de la noche.
theological_decisions:
- issue: 'Valor del enunciado: reflexión presente o proyección futura'
  english_pob_reading: The clause is rendered with future tense in English to match the psalmist's projected statement and maintain parallelism.
  chosen_spanish_reading: Se mantiene el futuro («me cubrirán», «será luz») para conservar la proyección retórica del hablante.
  alternative_spanish_readings:
  - me cubre / es luz
  - me cubriría / sería luz
  rationale: El hebreo permite una formulación no verbal en la segunda cola y una lectura discursiva de la primera; el POB inglés opta por futuro para sostener el paralelismo. El español sigue esa decisión sin forzar un presente gnómico que debilitaría el contraste imaginado.
  doctrine_reference: Poética bíblica; temporalidad discursiva en los Salmos
translation_notes:
  revision_awareness: Se revisó el estado más reciente del pasaje y no se detectaron cambios pendientes en la línea de base inglesa; la cruzada de revisión indicó necesidad de examen, pero el texto final inglés quedó sin modificación. La presente propuesta sigue la decisión auditada del POB inglés y explicita en español la ambigüedad léxica principal del verbo raro.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según la terminología del proyecto, pero este verso no contiene esas formas.
  - Se conserva un registro bíblico sobrio y público, sin arcaísmos innecesarios.
  - La puntuación respeta el paralelismo poético y el cierre de cita directa.
