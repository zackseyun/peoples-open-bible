translation:
  language: es
  text: Pero si el pueblo de la tierra ciertamente esconde[a] sus ojos ante ese hombre, cuando él da parte de sus hijos[b] a Molec[c], para no darle muerte,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ignora completamente a ese hombre»; el hebreo dice literalmente «esconder sus ojos de ese hombre».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «semilla»; aquí se refiere a sus hijos.
    reason: lexical_alternative
  - marker: c
    text: Molec puede referirse a una deidad o a un tipo de rito de sacrificio infantil; alternativamente, algunos han leído «al rey».
    reason: alternative_reading
lexical_decisions:
- source_word: הַעְלֵם יַעְלִימוּ
  english_pob_choice: indeed hide their eyes
  chosen_spanish: realmente oculta sus ojos
  alternatives_spanish:
  - ciertamente esconden sus ojos
  - deliberadamente apartan sus ojos
  - ciertamente pasan por alto
  lexicon: HALOT
  rationale: La duplicación verbal hebrea intensifica la acción. En español, «realmente oculta sus ojos» intenta conservar esa fuerza enfática y el modismo de no atender al caso, sin volverlo demasiado literal o antinatural.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el pueblo del país
  - la población de la tierra
  lexicon: HALOT
  rationale: La frase funciona aquí como designación colectiva del conjunto de la comunidad. «El pueblo de la tierra» mantiene la correspondencia formal con el hebreo y evita introducir una categoría social ajena al contexto legal.
- source_word: אֶת עֵינֵיהֶם מִן הָאִישׁ הַהוּא
  english_pob_choice: their eyes from that man
  chosen_spanish: sus ojos de ese hombre
  alternatives_spanish:
  - sus ojos respecto de ese hombre
  - sus ojos ante ese hombre
  - a ese hombre
  lexicon: HALOT
  rationale: 'El hebreo usa un giro idiomático: ‘ocultar los ojos de alguien’ equivale a desentenderse de él o negarse a actuar. En español, «oculta sus ojos de ese hombre» conserva la imagen y el valor legal del modismo.'
- source_word: בְּתִתּוֹ מִזַּרְעוֹ
  english_pob_choice: when he gives some of his offspring
  chosen_spanish: cuando da parte de su descendencia
  alternatives_spanish:
  - cuando da de su semilla
  - cuando entrega parte de sus hijos
  - cuando ofrece algunos de sus descendientes
  lexicon: HALOT
  rationale: זֶרַע aquí es partitivo y se refiere a parte de sus hijos/descendencia. «Descendencia» preserva el sentido colectivo y evita una traducción demasiado biológica o mecánica de «semilla», mientras «parte de» refleja el valor partitivo.
- source_word: לַמֹּלֶךְ
  english_pob_choice: to Molech
  chosen_spanish: a Molec
  alternatives_spanish:
  - al rey
  - a Moloc
  - a Mólec
  lexicon: HALOT
  rationale: Se mantiene la transliteración del referente cultual. «Molec» conserva el nombre propio sin convertirlo en una paráfrasis interpretativa como «al rey».
- source_word: לְבִלְתִּי הָמִית אֹתוֹ
  english_pob_choice: so as not to put him to death
  chosen_spanish: para no hacerlo morir
  alternatives_spanish:
  - para no darle muerte
  - sin hacerlo morir
  - a fin de no matarlo
  lexicon: HALOT
  rationale: 'La construcción expresa finalidad: el ocultamiento impide aplicar la pena correspondiente. «Para no hacerlo morir» reproduce el valor final y conserva un registro jurídico claro en español.'
theological_decisions:
- issue: Valor de לַמֹּלֶךְ
  english_pob_reading: Molech may refer to a deity or a type of child-sacrifice rite; alternatively, some have read 'to the king.'
  chosen_spanish_reading: Molec puede referirse a una deidad o a un tipo de rito de sacrificio de niños; alternativamente, algunos han leído ‘al rey’.
  alternative_spanish_readings:
  - al rey
  - a Moloc como nombre del ídolo
  rationale: Como en el texto fuente y en el audit trail inglés, la forma transliterada preserva la ambigüedad documentada sin resolverla prematuramente. En español, «Molec» funciona como equivalente neutral del referente cultual y deja abierta la discusión histórica/textual.
  doctrine_reference: Levítico 18:21; 20:2–5
- issue: Sentido del modismo de ocultar los ojos
  english_pob_reading: the Hebrew idiom is literally 'hide their eyes from that man.'
  chosen_spanish_reading: «oculta sus ojos de ese hombre» mantiene el modismo hebreo y su fuerza jurídica.
  alternative_spanish_readings:
  - ignora por completo a ese hombre
  - vuelven la vista de ese hombre
  rationale: El hebreo no describe solo una omisión visual, sino una negativa deliberada a actuar. La versión española conserva la imagen para que no se pierda el peso legal y moral del mandato.
  doctrine_reference: Levítico 20:4–5
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail inglés, que ajustó el modismo a «indeed hide their eyes» para reflejar con mayor precisión la intensificación hebrea de הַעְלֵם יַעְלִימוּ, manteniendo el registro formal y el marco jurídico del versículo.
  spanish_consistency_notes:
  - Se conservó «Molec» como transliteración consistente con el valor cultual del texto y con la ambigüedad documentada en el audit trail.
  - Se evitó «SEÑOR» u otras sustituciones convencionales, porque aquí no aparece el nombre divino.
  - «Descendencia» se eligió para מִזַּרְעוֹ por claridad en español y para preservar el matiz partitivo de «algo de su semilla».
  - El orden y la puntuación buscan reflejar la estructura condicional del hebreo sin forzar un calco sintáctico.
  - La nota a pie de página en a queda anclada en «oculta[a]» para preservar la alternativa idiomática documentada.
