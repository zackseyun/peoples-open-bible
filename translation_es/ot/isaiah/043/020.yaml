translation:
  language: es
  text: Las bestias del campo me honrarán, los chacales[a] y las avestruces[b], porque doy agua en el desierto, ríos en la tierra árida, para dar de beber a mi pueblo, mis escogidos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dragones», según una tradición más antigua; aquí «chacales» es más probable para תַּנִּים en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hijas del avestruz», un modismo hebreo para «avestruces»; traducciones más antiguas a veces ponían «búhos».
    reason: lexical_alternative
  - marker: c
    text: El hebreo tiene una forma singular, probablemente con referencia corporativa a Israel; por eso aquí se traduce en plural.
    reason: theological_note
lexical_decisions:
- source_word: תְּכַבְּדֵנִי
  english_pob_choice: will honor me
  chosen_spanish: me honrarán
  alternatives_spanish:
  - me glorificarán
  - me darán honra
  lexicon: HALOT
  rationale: El piel de כבד expresa la idea de otorgar honra o peso. «Me honrarán» es natural en español y conserva la acción de reconocer el valor/gloria de Dios sin volverla demasiado litúrgica.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las fieras del campo
  lexicon: HALOT
  rationale: La expresión es un giro hebreo fijo para animales salvajes. «Bestias del campo» conserva el registro elevado y la imagen poética del original.
- source_word: תַּנִּים
  english_pob_choice: jackals
  chosen_spanish: los chacales
  alternatives_spanish:
  - los dragones
  - los perros salvajes
  lexicon: HALOT
  rationale: En este contexto poético y de paralelismo con fauna del desierto, el sentido más probable es «chacales». Se evita «dragones» por ser una tradición inglesa antigua menos probable lexicalmente.
- source_word: בְנוֹת יַעֲנָה
  english_pob_choice: ostriches
  chosen_spanish: las crías de avestruz
  alternatives_spanish:
  - las avestruces
  - las hijas del avestruz
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «hijas del avestruz» y funciona como un modismo para avestruces. En español, «crías de avestruz» mantiene el valor idiomático y la referencia zoológica sin sonar forzado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la acción anterior. «Porque» es claro, directo y adecuado al tono profético.
- source_word: נָתַתִּי
  english_pob_choice: I give
  chosen_spanish: doy
  alternatives_spanish:
  - he dado
  - daré
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en contexto profético expresa una acción divina segura y vigente. El presente «doy» conserva inmediatez y solemnidad en español.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en el desierto árido
  lexicon: HALOT
  rationale: «Desierto» comunica bien el lugar desolado y es plenamente natural en español. Se mantiene la imagen bíblica sin sobrecargarla con tecnicismos.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  lexicon: HALOT
  rationale: Traducción directa y transparente.
- source_word: נְהָרוֹת
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - arroyos
  lexicon: HALOT
  rationale: El sustantivo normalmente designa ríos. «Ríos» preserva la amplitud e intensidad de la provisión prometida.
- source_word: בִּישִׁימוֹן
  english_pob_choice: in the wasteland
  chosen_spanish: en la tierra árida
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: El término apunta a un lugar seco, estéril y desolado. «Tierra árida» mantiene el paralelismo con «desierto» y evita una repetición demasiado mecánica.
- source_word: לְהַשְׁקוֹת
  english_pob_choice: to give drink to
  chosen_spanish: para dar de beber a
  alternatives_spanish:
  - para abrevar a
  - para ofrecer de beber a
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Dar de beber a» conserva la imagen concreta y funciona naturalmente con el objeto humano.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: Es la expresión pactual habitual y se mantiene sin variación.
- source_word: בְחִירִי
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - mi escogido
  lexicon: HALOT
  rationale: La revisión inglesa opta por plural para reflejar el sentido corporativo del hebreo junto a «mi pueblo». En español, el plural «mis escogidos» preserva esa lectura y evita forzar un singular artificial.
theological_decisions:
- issue: Referencia corporativa de «mi escogido»
  english_pob_reading: my chosen ones
  chosen_spanish_reading: mis escogidos
  alternative_spanish_readings:
  - mi escogido
  - mi pueblo escogido
  rationale: El hebreo usa un singular adjetival con referencia corporativa a Israel. Dado el ajuste del POB inglés hacia plural para reflejar el sentido colectivo, «mis escogidos» mantiene la tensión entre singularidad gramatical y pluralidad referencial sin perder la identidad del pueblo del pacto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo de Isaías 43:20 y toma como contexto auditado la decisión inglesa de renderizar תַּנִּים como «jackals», בְנוֹת יַעֲנָה como «ostriches» y בְחִירִי en plural («my chosen ones») por el valor corporativo. La versión española refleja esas decisiones con equivalentes naturales: «chacales», «crías de avestruz» y «mis escogidos».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo contiene el nombre divino explícito; aquí el versículo usa pronombre de primera persona, por lo que no aparece ningún equivalente nominal.
  - Se conserva el paralelismo poético entre «desierto» y «tierra árida» sin nivelar ambos términos en una sola palabra.
  - «Bestias del campo» se mantiene como registro bíblico elevado, coherente con el tono de Isaías.
  - La pluralidad de «mis escogidos» sigue la revisión auditada del POB inglés y evita el singular que podría sonar menos natural en español en este contexto.
