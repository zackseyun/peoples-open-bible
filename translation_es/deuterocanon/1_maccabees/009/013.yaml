translation:
  language: es
  text: Y la tierra fue sacudida por causa de sus campamentos[a]; y la batalla se trabó desde la mañana hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la batalla se trabó desde la mañana hasta la tarde».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐσείσθη
  english_pob_choice: shook
  chosen_spanish: fue sacudida
  alternatives_spanish:
  - tembló
  - fue estremecida
  lexicon: LSJ
  rationale: El aoristo pasivo de σείω expresa un sacudimiento real. «Fue sacudida» conserva la pasiva y el efecto físico sin perder claridad en español.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  lexicon: LSJ
  rationale: «Tierra» mantiene el amplio alcance de γῆ y suena natural en español bíblico. «Suelo» estrecharía demasiado el sentido.
- source_word: ἀπὸ τῶν παρεμβολῶν αὐτῶν
  english_pob_choice: from their encampments
  chosen_spanish: por causa de sus campamentos
  alternatives_spanish:
  - a causa de sus campamentos
  - desde sus campamentos
  - por sus campamentos
  lexicon: LSJ
  rationale: La construcción griega indica origen o causa del estremecimiento. En español, «por causa de» comunica mejor esa relación causal sin forzar una imagen espacial que no queda natural.
- source_word: ὁ πόλεμος
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: LSJ
  rationale: Aquí πόλεμος designa el enfrentamiento concreto del relato. «Batalla» es más preciso que «guerra» para este contexto narrativo.
- source_word: συνηγμένος
  english_pob_choice: was joined
  chosen_spanish: se trabó
  alternatives_spanish:
  - se entabló
  - fue juntada
  - estuvo unida
  lexicon: LSJ
  rationale: El participio sugiere algo «unido/traído junto». La revisión inglesa optó por «was joined» para evitar expansión interpretativa; en español, «se trabó» expresa de manera idiomática que la batalla quedó plenamente entablada, sin añadir la idea de furia que no está en el griego.
- source_word: ἀπὸ πρωΐθεν ἕως ἑσπέρας
  english_pob_choice: from morning until evening
  chosen_spanish: desde la mañana hasta la tarde
  alternatives_spanish:
  - desde la mañana hasta la noche
  - desde temprano en la mañana hasta la tarde
  lexicon: LSJ
  rationale: La frase marca duración. «Desde la mañana hasta la tarde» es una equivalencia clara y natural, fiel al marco temporal del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del inglés POB: se sustituyó «the battle raged» por «the battle was joined» para reflejar con más precisión ἐγένετο ὁ πόλεμος συνηγμένος. La versión española evita una expansión dinámica y sigue la idea de batalla plenamente entablada.'
  spanish_consistency_notes:
  - Se conserva «Y» inicial para corresponder al arranque narrativo del griego καὶ.
  - No se introduce terminología eclesiástica ni se suaviza el tono militar del pasaje.
  - La nota al pie refleja la alternativa más literal preservada en el audit trail inglés.
