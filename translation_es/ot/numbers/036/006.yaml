  yaml_path: translation/ot/numbers/036/006.yaml
  text: This is the word that Yahweh has commanded concerning the daughters of Zelophehad[a], saying, ‘Let them become wives to whomever seems good in their eyes[b]; only they must become wives within the family of the tribe of their father.’
  footnotes:
  - marker: a
    text: Or, 'to whomever they think best.' The Hebrew idiom is literally 'to the good in their eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'within the clan of their father's tribe.' The Hebrew combines family/clan and tribe terminology to stress that the inheritance must remain within the paternal tribal line.
    reason: lexical_alternative
