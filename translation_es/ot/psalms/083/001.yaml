translation:
  language: es
  text: Un cántico[a]. Un salmo de Asaf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para Asaf». La preposición hebrea puede indicar autoría, asociación o dedicación en los encabezamientos de salmos.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: HALOT
  rationale: El hebreo designa una composición cantada; en español, «cántico» conserva el registro bíblico y litúrgico sin perder el sentido básico de una pieza para ser cantada.
- source_word: מִזְמ֣וֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - salmodia
  - poema musical
  lexicon: HALOT
  rationale: En los encabezamientos de los Salmos, el término técnico se vierte naturalmente como «salmo», que en español conserva el valor de género y la asociación canónica.
- source_word: לְ/אָסָֽף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: La preposición ל puede indicar autoría, asociación o dedicación. «De Asaf» es la solución más idiomática en español y preserva la misma ambigüedad interpretativa que el texto y la nota inglesa.
translation_notes:
  revision_awareness: 'El testimonio hebreo y el audit trail inglés están en alto acuerdo: la línea es un encabezamiento breve con dos sustantivos genéricos y una relación abierta con Asaf; no se requieren cambios textuales ni ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantuvo la estructura breve del encabezamiento en dos frases cortas, en paralelo con el inglés auditado.
  - Se evitó «SEÑOR» porque no hay aquí el tetragrámaton ni una sustitución por κύριος; el versículo sólo contiene título genérico y nombre propio.
  - Se conservó la ambigüedad de לְאָסָף mediante la nota, sin fijar indebidamente autoría, dedicación o pertenencia.
