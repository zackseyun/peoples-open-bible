revisions:
- from: y la tierra abrió su boca y los tragó[a], a sus casas, a toda la gente que pertenecía a Coré[b], y todos sus bienes.
  to: y la tierra abrió su boca y los tragó[a], a sus familias, a toda la gente que pertenecía a Coré[b], y todos sus bienes.
  rationale: Se corrige «sus casas» a «sus familias» para alinearse con la decisión principal del POB inglés (‘their households’) y mejorar la naturalidad del español en este contexto. Se conserva la alternativa física en una nota. También se repara la nota b para que realmente preserve la alternativa literal documentada («todo hombre…») en vez de repetir la lectura principal colectiva. No se requiere adjudicación adicional porque son ajustes claros de alineación y legibilidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea principal: «la tierra abrió su boca» preserva la metáfora, «los tragó» refleja bien וַתִּבְלַע, y «todos sus bienes» comunica adecuadamente כָּל־הָרֲכוּשׁ. Sin embargo, «a sus casas» no representa bien la decisión auditada del POB inglés, que llevó el texto principal hacia ‘their households’ y dejó ‘their houses’ como alternativa en nota. Además, la nota b está mal formulada porque repite la lectura principal en vez de ofrecer la alternativa literal documentada.'
  spanish_quality_summary: El español es generalmente claro y natural, pero «los tragó, a sus casas» suena algo forzado por la repetición de la preposición «a» en la serie. «Sus hogares» tampoco sería ideal aquí. «Sus familias» o «los de su casa» darían el sentido doméstico, pero para alinearse con el expediente inglés y mantener buena legibilidad, «sus casas» debe pasar a nota y el texto principal usar «sus familias» o «sus hogares». «Sus familias» es la opción más clara y natural en este contexto narrativo.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto (no aparecen Yahvé, Mesías, δοῦλος, etc.). La principal cuestión léxica es בָּתֵּיהֶם: el borrador se aparta de la decisión inglesa documentada al poner «casas» en el texto principal. También debe corregirse la nota sobre כָּל הָאָדָם אֲשֶׁר לְקֹרַח para que preserve la alternativa literal «todo hombre…» en vez de duplicar «toda la gente…».'
  issues:
  - severity: medium
    issue: בָּתֵּיהֶם está en el texto principal como «sus casas».
    rationale: El expediente inglés eligió «their households» en el texto principal y dejó «their houses» como alternativa léxica. En español, mantener «casas» en el texto principal no preserva esa decisión auditada y además suena menos natural en la enumeración de personas y bienes.
  - severity: medium
    issue: La nota b no presenta una verdadera alternativa al texto principal.
    rationale: El texto principal ya dice «toda la gente que pertenecía a Coré», pero la nota b comienza con la misma lectura. La documentación inglesa preserva como alternativa la lectura literal «todo hombre que pertenecía a Coré»; eso debe reflejarse en español.
  - severity: low
    issue: La coordinación con preposiciones repetidas reduce la fluidez.
    rationale: «los tragó, a sus casas, a toda la gente...» es comprensible, pero menos idiomático que una serie sin reiteración innecesaria tras el verbo.
  revised_spanish_text: y la tierra abrió su boca y los tragó[a], a sus familias, a toda la gente que pertenecía a Coré[b], y todos sus bienes.
  revised_footnotes:
  - marker: a
    text: O «sus casas». El hebreo puede referirse tanto a las casas físicas como, por extensión, a sus familias o unidades domésticas.
    reason: lexical_alternative
  - marker: b
    text: Lit. «todo hombre que pertenecía a Coré». El hebreo usa אָדָם en sentido colectivo.
    reason: alternative_reading
  revision_rationale: Se corrige «sus casas» a «sus familias» para alinearse con la decisión principal del POB inglés (‘their households’) y mejorar la naturalidad del español en este contexto. Se conserva la alternativa física en una nota. También se repara la nota b para que realmente preserve la alternativa literal documentada («todo hombre…») en vez de repetir la lectura principal colectiva. No se requiere adjudicación adicional porque son ajustes claros de alineación y legibilidad.
