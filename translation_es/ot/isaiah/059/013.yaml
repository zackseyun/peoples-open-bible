revisions:
- from: Transgrediendo y negando a Yahvé, y volviéndose atrás de seguir a nuestro Dios; hablando opresión y revuelta[a], concibiendo y pronunciando desde el corazón palabras de falsedad[b].
  to: Transgrediendo y negando a Yahvé, y apartándonos de seguir a nuestro Dios, hablando opresión y rebelión[a], concibiendo y pronunciando desde el corazón[b] palabras de falsedad.
  rationale: 'Se ajusta el español para que suene natural y fiel: «apartándonos de seguir a nuestro Dios» expresa mejor el hebreo idiomático de dejar de seguir; «rebelión» refleja mejor וְסָרָה que «revuelta» en este contexto; y se ancla correctamente la nota [b] en «desde el corazón», tal como exige la disciplina de notas del proyecto.'
