translation:
  language: es
  text: Y además, yo he oído el gemido de los hijos de Israel[a], a quienes los egipcios están esclavizando, y he recordado[b] mi pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «el pueblo de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: '«Recordar» aquí es lenguaje de pacto: no significa que Dios hubiera olvidado, sino que se vuelve hacia su pacto en acción.'
    reason: theological_note
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y además
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: Mantiene el valor aditivo e intensivo del hebreo sin perder fluidez en español. «Y además» conserva la conexión con el discurso anterior y el énfasis de la forma compuesta.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - —
  lexicon: HALOT
  rationale: 'El pronombre explícito se conserva para reproducir el énfasis del hablante divino: no solo «he oído», sino «yo he oído».'
- source_word: שָׁמַעְתִּי
  english_pob_choice: have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oí
  - he escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado relevante presente; el pretérito perfecto compuesto en español comunica bien esa vigencia actual de la acción concluida.
- source_word: נַאֲקַת
  english_pob_choice: the groaning
  chosen_spanish: el gemido
  alternatives_spanish:
  - el clamor
  - el lamento
  - la queja
  lexicon: HALOT
  rationale: «Gemido» conserva la carga de dolor y opresión del término hebreo. Es más concreto que «lamento» y más natural que un calco más técnico.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión literal del hebreo, preservando la forma del texto fuente y su fuerza corporativa. En español, «hijos de Israel» es inteligible y evita diluir la imagen con una paráfrasis.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa la nación como nombre colectivo, el contexto agentivo exige el sujeto personal: son los egipcios quienes están oprimiendo. «Los egipcios» reproduce esa fuerza con naturalidad.'
- source_word: מַעֲבִדִים
  english_pob_choice: are enslaving
  chosen_spanish: están esclavizando
  alternatives_spanish:
  - están sometiendo a servidumbre
  - están haciendo servir
  - están forzando a trabajar
  lexicon: HALOT
  rationale: Se opta por un verbo fuerte que refleje la coerción del hiphil de עבד. «Esclavizando» comunica mejor la opresión que una formulación más débil o genérica.
- source_word: וָאֶזְכֹּר
  english_pob_choice: I have remembered
  chosen_spanish: he recordado
  alternatives_spanish:
  - me he acordado de
  - he traído a la memoria
  lexicon: HALOT
  rationale: Se conserva el lenguaje bíblico de «recordar», que en este contexto es de pacto y acción, no de simple recuperación mental. En español, «he recordado» es claro y mantiene el término sin explicarlo en el cuerpo del texto.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: «Pacto» es el término más estable en español bíblico para בְּרִית y conserva la dimensión formal y vinculante del vínculo divino. Se evita «alianza» por su posible debilitamiento semántico en este contexto.
theological_decisions:
- issue: Relación entre «recordar» y la acción pactual de Dios
  english_pob_reading: I have remembered my covenant
  chosen_spanish_reading: he recordado mi pacto
  alternative_spanish_readings:
  - me he acordado de mi pacto
  - he tomado en cuenta mi pacto
  - he actuado conforme a mi pacto
  rationale: 'Se preserva el modismo bíblico de «recordar» como lenguaje de pacto, sin convertirlo en una paráfrasis explicativa. Esto mantiene la tensión teológica: Dios no había olvidado, sino que se dispone a actuar en fidelidad a su pacto.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: La expresión corporativa «hijos de Israel»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma literal masculina plural con valor corporativo, en continuidad con el texto hebreo. La opción más idiomática queda implícita como posibilidad de lectura, pero no desplaza la estructura fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con la revisión inglesa más reciente: no se registraron cambios aplicados y el dictamen de revisión fue de acuerdo total. La presente redacción sigue ese estado estable, trasladando al español las mismas decisiones lexicais y teológicas sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en otros pasajes del proyecto; aquí el versículo contiene primera persona divina, por lo que no se introduce el nombre.
  - Se conserva la distinción entre el lenguaje literal del hebreo («hijos de Israel») y una alternativa idiomática en nota, conforme a la política de fidelidad formal con apoyo de notas.
  - «Pacto» se usa de manera consistente para בְּרִית en el contexto de Éxodo.
  - «Esclavizando» refleja la fuerza coercitiva del participio hebreo y conserva la relación con el contexto del Éxodo.
