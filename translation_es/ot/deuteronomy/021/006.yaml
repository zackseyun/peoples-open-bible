  to: Y todos los ancianos de aquella ciudad, los más cercanos al muerto[a], se lavarán las manos sobre la becerra cuya cerviz fue quebrada en el cauce del arroyo[b].
  rationale: Se ajusta el texto principal para reflejar mejor la decisión léxica documentada para נחל y se mejora la naturalidad del español en הֶחָלָל. «Se lavarán las manos» es más idiomático que «lavarán sus manos» sin alterar el valor prescriptivo. Se conservan en notas las alternativas relevantes del hebreo y del rastro POB.
