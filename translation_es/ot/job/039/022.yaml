    rationale: La secuencia «de [a] el miedo» incumple la disciplina de anclaje y produce un español incorrecto. El marcador debe ir pegado a la palabra o frase pertinente, por ejemplo «del miedo[a]».
  - severity: medium
    issue: «Vuelve la espalda» añade una imagen no explícita en el hebreo
    rationale: שוב significa «volver atrás / retroceder / volverse», no literalmente «dar la espalda». La formulación actual es más idiomática e interpretativa de lo que pide el texto fuente y el rastro léxico del POB.
  - severity: low
