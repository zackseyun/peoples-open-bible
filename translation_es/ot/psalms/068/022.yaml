translation:
  language: es
  text: Ciertamente Dios aplastará la cabeza de sus enemigos, la coronilla peluda[a] del que anda en su culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cráneo peludo del que anda en su culpa»; o «la coronilla peluda del que sigue en sus transgresiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - En verdad
  - Sin duda
  - Sólo
  lexicon: HALOT
  rationale: Aquí אַךְ funciona como partícula enfática de afirmación. «Ciertamente» transmite bien la certeza y el énfasis sin volverlo torpe en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: El verbo es singular y el referente inmediato es el Dios de Israel; en español, «Dios» es la forma natural y fiel.
- source_word: יִמְחַץ
  english_pob_choice: will crush
  chosen_spanish: aplastará
  alternatives_spanish:
  - quebrará
  - desmenuzará
  - golpeará
  lexicon: HALOT
  rationale: El verbo expresa acción violenta de aplastar o triturar. «Aplastará» conserva la fuerza imagética y suena natural en español.
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - cima
  - parte superior
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal literal, como en el hebreo, porque el poema usa esta concreción para hablar del enemigo.
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de él
  - sus hostiles
  lexicon: HALOT
  rationale: El sufijo se entiende naturalmente referido a Dios en el contexto inmediato; «sus enemigos» conserva esa referencia sin añadir más explicación al texto.
- source_word: קָדְקֹד
  english_pob_choice: crown
  chosen_spanish: coronilla
  alternatives_spanish:
  - cráneo
  - cumbre de la cabeza
  - cabeza
  lexicon: HALOT
  rationale: El término apunta a la parte alta de la cabeza. «Coronilla» es una opción clara en español y evita una interpretación demasiado literal de «corona».
- source_word: שֵׂעָר
  english_pob_choice: hairy
  chosen_spanish: del que... en su culpa
  alternatives_spanish:
  - velludo
  - cubierto de pelo
  - peludo
  lexicon: HALOT
  rationale: En este versículo la idea de pelo aparece en la descripción de la coronilla; en español, para no forzar una frase poco natural, se integra la imagen en la construcción tradicional de la línea poética y se documenta la alternativa literal en la nota.
- source_word: מִתְהַלֵּךְ
  english_pob_choice: the one who walks
  chosen_spanish: del que anda
  alternatives_spanish:
  - del que camina
  - del que procede
  lexicon: HALOT
  rationale: El participio expresa conducta habitual. «Anda» reproduce bien la metáfora bíblica de la manera de vivir.
- source_word: בַּאֲשָׁמָיו
  english_pob_choice: in his guilt
  chosen_spanish: en su culpa
  alternatives_spanish:
  - en su culpabilidad
  - en su delito
  - en sus culpas
  lexicon: HALOT
  rationale: La lectura principal es el estado de culpa, no una expansión interpretativa a «actos culpables». «En su culpa» sigue de cerca el hebreo y la revisión inglesa más reciente.
theological_decisions:
- issue: Referente del sufijo en «sus enemigos»
  english_pob_reading: 'The suffix refers to God: ''his enemies.'''
  chosen_spanish_reading: El sufijo se refleja como «sus enemigos», referido naturalmente a Dios.
  alternative_spanish_readings:
  - los enemigos del rey
  - los enemigos de su pueblo
  rationale: El sujeto inmediato es Dios con verbo singular; la referencia más natural es divina. Se mantiene esa lectura sin estrecharla artificialmente a un referente mesiánico o nacional no explícito.
  doctrine_reference: Primacía del texto hebreo y preservación de la referencia inmediata del pronombre.
- issue: Sentido de באשמיו
  english_pob_reading: 'Rendered as habitual sinful conduct: ''in his guilt.'''
  chosen_spanish_reading: 'Se traduce como estado de culpa: «en su culpa».'
  alternative_spanish_readings:
  - en sus transgresiones
  - en su culpabilidad
  - en sus delitos
  rationale: La revisión inglesa reciente prefirió «guilt» para reflejar con más precisión el singular hebreo y evitar expansión interpretativa. En español, «culpa» conserva esa condensación semántica y la imagen de una vida persistente en culpa.
  doctrine_reference: Equivalencia óptima; mantener la tensión lexical sin paraphrasearla.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «in his guilty deeds» a «in his guilt» para ceñirse más al singular hebreo באשמיו. La versión española sigue esa revisión y evita expandir la frase a actos culpables; además, la imagen de שֵׂעָר se mantiene en la nota como alternativa léxica, sin introducir un marcador no anclado en el texto.
  spanish_consistency_notes:
  - Usé «Dios» para אֱלֹהִים por el verbo singular y el referente inmediato.
  - Conservé el paralelo corporal «cabeza / coronilla» para mantener la imaginería hebrea.
  - Preferí «culpa» para באשמיו siguiendo la revisión inglesa más reciente y evitando expansión interpretativa.
  - La nota a conserva las alternativas textuales principales sin duplicar marcadores.
