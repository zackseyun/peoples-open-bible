translation:
  language: es
  text: y los garfios, los tazones y los jarros de oro puro; y para los cuencos de oro, por peso para cada cuenco; y para los cuencos de plata, por peso para cada cuenco.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: מִּזְלָגוֹת
  english_pob_choice: forks
  chosen_spanish: garfios
  alternatives_spanish:
  - tenedores
  - horquillas
  lexicon: HALOT
  rationale: El término designa utensilios de tipo horquilla empleados en el ámbito del templo. En español, “garfios” conserva la idea de pieza metálica con púas y evita el sentido doméstico moderno de “tenedores”, que sería menos preciso en este inventario cultual.
- source_word: מִּזְרָקוֹת
  english_pob_choice: basins
  chosen_spanish: tazones
  alternatives_spanish:
  - fuentes
  - vasijas
  lexicon: HALOT
  rationale: El POB inglés distingue este término del posterior כפורים con “basins”. En español, “tazones” comunica un recipiente amplio y abierto sin confundirlo con los “cuencos” posteriores; “vasijas” sería demasiado general.
- source_word: קְּשָׂוֹת
  english_pob_choice: pitchers
  chosen_spanish: jarros
  alternatives_spanish:
  - jarros
  - cántaros
  lexicon: HALOT
  rationale: El contexto sugiere un recipiente de servicio, probablemente para verter. “Vasijas” es más amplio que “jarros” o “cántaros” y evita forzar una forma más específica de lo que el hebreo permite con seguridad.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro fino
  lexicon: HALOT
  rationale: La frase modifica el conjunto de utensilios y se vierte de manera natural como “de oro puro”, preservando tanto el material como la cualidad de pureza/metalicidad sin añadir matices no atestiguados.
- source_word: כְפוֹרֵי
  english_pob_choice: bowls
  chosen_spanish: cuencos
  alternatives_spanish:
  - copas
  - tazones
  lexicon: HALOT
  rationale: Aquí el término refiere a un recipiente menor distinto de los anteriores. “Cuencos” mantiene la diferencia con los “tazones” y es una forma natural en español para un recipiente de este tipo.
- source_word: בְּמִשְׁקָל
  english_pob_choice: by weight
  chosen_spanish: por peso
  alternatives_spanish:
  - según su peso
  - por peso
  lexicon: HALOT
  rationale: La construcción indica asignación según el peso de cada pieza. “Con peso” conserva la concisión del hebreo y la idea de medida determinada, sin sobreexplicar.
- source_word: לִכְפוֹר וּכְפוֹר
  english_pob_choice: for each bowl
  chosen_spanish: para cada cuenco
  alternatives_spanish:
  - para cuenco y cuenco
  - para cada uno de los cuencos
  lexicon: HALOT
  rationale: El hebreo usa repetición distributiva. El POB inglés decidió suavizar la repetición como “for each bowl”; en español, “para cada cuenco” transmite el mismo valor distributivo de forma idiomática y evita una calca artificial.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - de plata
  - plateado
  lexicon: HALOT
  rationale: El metal se expresa naturalmente como “plata”. En esta enumeración, “cuencos de plata” conserva el paralelismo con “cuencos de oro” y el contraste material del hebreo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió la repetición poco natural “for each bowl and bowl” y la redujo a un distributivo idiomático (“for each bowl”) sin perder el sentido. La presente redacción española sigue esa misma decisión: mantiene la distribución uno por uno, pero la expresa de forma natural con “para cada cuenco”. También conserva la distinción entre los tres grupos de utensilios del verso y el contraste entre oro y plata.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma estándar cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - 'Se traduce el inventario cultual con términos consistentes: garfios, tazones, vasijas, cuencos.'
  - Se preserva el paralelismo material oro/plata y la distribución individual sin repetir innecesariamente la unidad.
  - No se introduce terminología eclesiástica tradicional ajena al hebreo; se priorizan nombres concretos de utensilios.
