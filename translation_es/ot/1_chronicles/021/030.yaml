revisions:
- from: Pero David no pudo ir[a] para buscar a Dios, porque se aterrorizó ante la espada del ángel de Yahvé.
  to: Pero David no pudo ir delante de ella[a] para buscar a Dios, porque estaba aterrorizado por la espada del ángel de Yahvé.
  rationale: Se restaura explícitamente לְפָנָיו en el texto principal con 'delante de ella', en línea con la decisión principal del audit trail de que el pronombre se refiere al tabernáculo/lugar de culto mencionado en el contexto. La alternativa 'delante de él' se conserva en nota. Además, 'estaba aterrorizado por' mejora la naturalidad y refleja mejor el sentido causal/estativo del hebreo en este contexto.
