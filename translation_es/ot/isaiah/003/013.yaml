translation:
  language: es
  text: Yahvé se pone de pie para contender[a], y se mantiene en pie para juzgar a los pueblos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para llevar un pleito' / 'para presentar un caso'; el verbo hebreo puede llevar la imagen de un litigio.
    reason: lexical_alternative
  - marker: b
    text: O 'las naciones'; el hebreo 'los pueblos' es plural y puede referirse de manera amplia a varios pueblos.
    reason: alternative_reading
lexical_decisions:
- source_word: נִצָּב
  english_pob_choice: takes his stand
  chosen_spanish: se pone de pie
  alternatives_spanish:
  - toma posición
  - se mantiene firme
  - está en pie
  lexicon: HALOT
  rationale: El participio expresa una postura firme y deliberada en un marco judicial. 'Se pone de pie' conserva la imagen concreta y natural en español, con sentido activo semejante a 'takes his stand'.
- source_word: לָרִיב
  english_pob_choice: to contend
  chosen_spanish: contender
  alternatives_spanish:
  - pleitear
  - llevar un pleito
  - disputar
  lexicon: HALOT
  rationale: ריב tiene fuerza de litigio o contienda legal. 'Contender' mantiene el matiz adversarial sin especificar demasiado el procedimiento judicial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: La convención del proyecto para יהוה es 'Yahvé', preservando el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: וְעֹמֵד
  english_pob_choice: and stands
  chosen_spanish: y está de pie
  alternatives_spanish:
  - y permanece en pie
  - y sigue de pie
  - y está en pie
  lexicon: HALOT
  rationale: El paralelo con נצב refuerza la imagen de presencia formal y estable. 'Está de pie' reproduce bien esa repetición enfática en español.
- source_word: לָדִין
  english_pob_choice: to judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - para dictar juicio
  - para hacer juicio
  - para sentenciar
  lexicon: HALOT
  rationale: דין aquí es juicio forense. 'Juzgar' es la forma más clara y fiel en español, sin añadir el resultado del juicio.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos de la tierra
  lexicon: HALOT
  rationale: El plural hebreo preserva la idea de varios pueblos, no solo una colectividad única. 'Los pueblos' mantiene esa pluralidad y la apertura semántica del original.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se conserva el nombre divino como nombre propio, conforme a la política del proyecto, evitando el reemplazo litúrgico por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Alcance de עַמִּים
  english_pob_reading: the peoples
  chosen_spanish_reading: los pueblos
  alternative_spanish_readings:
  - las naciones
  rationale: '''Los pueblos'' preserva la pluralidad del hebreo y evita estrechar el referente a ''las naciones'' cuando el texto mantiene una amplitud deliberada.'
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El pasaje fue revisado en un pase reciente y quedó sin cambios sustantivos; la presente propuesta mantiene esa solución, ajustada al requisito de anclaje exacto de las notas al pie.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה, coherente con la política terminológica del proyecto.
  - Se conserva la duplicación verbal de postura ('se pone de pie' / 'está de pie') para reflejar el paralelismo hebreo.
  - '''Los pueblos'' mantiene el plural del hebreo y no lo reduce a una sola colectividad.'
