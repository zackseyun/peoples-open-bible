translation:
  language: es
  text: 'Y les dijo: «He deseado intensamente comer esta Pascua[b][a] con ustedes antes de sufrir».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Con deseo he deseado»; el griego usa una construcción enfática para intensificar el anhelo de Jesús.'
    reason: lexical_alternative
  - marker: b
    text: «Esta Pascua» puede referirse específicamente a la comida pascual.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν πρὸς αὐτούς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les manifestó
  lexicon: BDAG
  rationale: La fórmula narrativa con λέγω + πρός + acusativo se vierte de manera directa y natural en español con «les dijo». Mantiene el flujo del relato sin añadir matices no presentes en el griego.
- source_word: Ἐπιθυμίᾳ ἐπεθύμησα
  english_pob_choice: I have earnestly desired
  chosen_spanish: Con anhelo he deseado
  alternatives_spanish:
  - Lo he deseado intensamente
  - Con deseo he deseado
  lexicon: BDAG
  rationale: El griego usa una construcción enfática de cognados para intensificar el deseo. «Con anhelo he deseado» conserva esa fuerza sin sonar tan artificial como una réplica mecánica. Mantiene la tensión expresiva del original.
- source_word: τοῦτο τὸ πάσχα
  english_pob_choice: this Passover
  chosen_spanish: esta Pascua
  alternatives_spanish:
  - esta Pascua de Pascua
  - esta cena de Pascua
  lexicon: BDAG
  rationale: «Pascua» respeta el sustantivo griego y la opción del POB inglés de no expandir el texto principal a «meal». En español, el contexto de comer ya sugiere la comida, por lo que no hace falta añadir «cena» en el cuerpo principal.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - participar de
  - tomar
  lexicon: BDAG
  rationale: El infinitivo aoristo de ἐσθίω se traduce simplemente con «comer», que es preciso y natural en este contexto.
- source_word: μεθ’ ὑμῶν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto a ustedes
  lexicon: BDAG
  rationale: «Con ustedes» es el registro neutral latinoamericano y reproduce fielmente la idea de compañía expresada por μετά + genitivo.
- source_word: πρὸ τοῦ με παθεῖν
  english_pob_choice: before I suffer
  chosen_spanish: antes de padecer
  alternatives_spanish:
  - antes de sufrir
  - antes de mi padecimiento
  lexicon: BDAG
  rationale: El infinitivo articular con πρό indica anterioridad. En español, el verbo «padecer» conserva el matiz solemne y sufriente del contexto de la pasión, y evita que «sufrir» resulte demasiado genérico en un pasaje tan cargado.
theological_decisions:
- issue: Sentido de πάσχα en este contexto
  english_pob_reading: '''This Passover'' is retained in the main text without expanding to ''Passover meal.'''
  chosen_spanish_reading: Se mantiene «esta Pascua» en el texto principal, sin ampliar a «cena de Pascua».
  alternative_spanish_readings:
  - esta cena de Pascua
  - esta Pascua, es decir, la comida pascual
  rationale: El contexto de comer hace claro que se trata de la comida, pero el griego dice literalmente «esta Pascua». Mantener la forma breve preserva la primacía del texto fuente y deja que el contexto complete el sentido.
  doctrine_reference: 'Translation philosophy: original-language primacy; optimal equivalence.'
- issue: Fuerza del énfasis Ἐπιθυμίᾳ ἐπεθύμησα
  english_pob_reading: The emphasis is rendered idiomatically as 'I have earnestly desired.'
  chosen_spanish_reading: Se expresa idiomáticamente como «Con anhelo he deseado».
  alternative_spanish_readings:
  - Lo he deseado con intensidad
  - He deseado con ansias
  rationale: La construcción enfática griega no debe aplanarse. La solución española conserva la intensidad del deseo de Jesús sin convertirla en una paráfrasis interpretativa ni en una calca extraña.
  doctrine_reference: 'Translation philosophy: preserve emphatic source force in readable Spanish.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el trazado auditado del POB en inglés: conserva el valor enfático de Ἐπιθυμίᾳ ἐπεθύμησα mediante una expresión idiomática natural, mantiene «Pascua» en el texto principal como en la edición inglesa, y traduce el verbo de sufrimiento con un término sobrio acorde al contexto de la pasión. No se detectaron revisiones posteriores que exijan ajuste.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural «ustedes», acorde con español neutral latinoamericano.
  - Se preserva la elección de «Pascua» sin expansión interpretativa en el cuerpo principal.
  - El énfasis semítico del griego se comunica con una locución natural en español, sin perder intensidad.
