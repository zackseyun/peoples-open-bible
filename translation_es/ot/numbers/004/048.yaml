review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura del hebreo: verbo copulativo de total censal, sustantivo de personas registradas en censo, y la cifra 8,580. También conserva la nota alternativa sobre פְּקֻדֵיהֶם. Sin embargo, la elección principal «sus censados» no preserva tan bien como debería la referencia personal y masculina explícita que el rastro inglés documenta en contexto.'
  spanish_quality_summary: «Sus censados fueron...» es comprensible, pero suena algo nominal y menos natural en español bíblico claro que una formulación como «sus hombres censados eran/fueron...». Además, la nota «sus numerados» resulta poco idiomática; «sus inscritos» o «sus registrados» sería mejor español, pero dado el rastro inglés conviene mantener una alternativa más cercana al conteo censal.
  glossary_alignment: No hay términos del glosario principal en juego. El punto clave de alineación es la decisión doctrinal/lexical sobre lenguaje de censo con referente masculino. El español debería reflejar esa precisión mejor que «sus censados» solo.
  issues:
  - severity: medium
    issue: La expresión principal «sus censados» no reproduce con suficiente claridad el referente masculino de contexto que el POB inglés decidió preservar con «their counted men».
    rationale: En Números 4 el recuento es de varones levitas aptos para servicio. En español, «censados» puede sonar demasiado abstracto o mixto; «sus hombres censados» mantiene la fuerza contextual sin alejarse del hebreo.
  - severity: low
    issue: La nota alternativa contiene «sus numerados», que es poco idiomático en español.
    rationale: Aunque intenta seguir de cerca «their numbered ones», en español suena forzado. Puede conservarse una alternativa cercana más natural como «sus contados» o «los contados de entre ellos».
