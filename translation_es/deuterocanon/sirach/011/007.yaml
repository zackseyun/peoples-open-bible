translation:
  language: es
  text: Muchos que fueron exaltados han sido muy deshonrados[a] y humillados juntamente; aun los honrados han sido entregados en mano ajena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene aquí una lectura sustancialmente diferente: «Antes de examinar, no censures; entiende primero, y entonces reprende». La traducción sigue el testimonio hebreo extante, conforme a la política del proyecto para Sirácides cuando el hebreo se conserva.'
    reason: alternative_reading
lexical_decisions:
- source_word: πρὶν ἐξετάσῃς
  english_pob_choice: Before you examine
  chosen_spanish: Antes de examinar
  alternatives_spanish:
  - Antes de investigar
  - Antes de examinarlo
  lexicon: LSJ
  rationale: La secuencia griega expresa anterioridad respecto del acto de examinar. En español, 'Antes de examinar' mantiene la relación temporal y el tono sapiencial sin añadir un objeto no explícito en el griego.
- source_word: μὴ μέμψῃ
  english_pob_choice: do not blame
  chosen_spanish: no censures
  alternatives_spanish:
  - no culpes
  - no reproches
  - no juzgues
  lexicon: LSJ
  rationale: μέμφομαι puede expresar censura, reproche o culpa. 'No censures' conserva la idea de reprender o acusar antes de un examen, y evita anticipar un juicio más fuerte de lo que el griego exige.
- source_word: νόησον πρῶτον
  english_pob_choice: first understand
  chosen_spanish: piensa primero
  alternatives_spanish:
  - entiende primero
  - considera primero
  - reflexiona primero
  lexicon: LSJ
  rationale: νόησον apunta a percibir, advertir o considerar con la mente. 'Piensa primero' es natural en español y conserva el llamado a la reflexión previa sin estrecharlo solo a 'entender'.
- source_word: καὶ τότε ἐπίτιμα
  english_pob_choice: and then rebuke
  chosen_spanish: y entonces reprende
  alternatives_spanish:
  - y luego reprende
  - y después corrige
  - y entonces censura
  lexicon: LSJ
  rationale: ἐπιτιμάω significa reprender, amonestar o censurar. 'Reprende' es el equivalente más directo y sobrio en español para el cierre exhortativo.
theological_decisions:
- issue: Lectura del texto griego frente al hebreo extenso y muy diferente de Sirácides 11:7
  english_pob_reading: The translation follows the extant Hebrew witness, with the Greek noted as a substantially different reading that reflects the wisdom theme of cautious correction.
  chosen_spanish_reading: Se traduce el testimonio griego aquí provisto como texto base de esta sección, dado que la solicitud incluye explícitamente el paralelo griego y ese enunciado sapiencial es el contenido del paquete fuente para este versículo.
  alternative_spanish_readings:
  - «Muchos fueron exaltados, y luego humillados...»
  - «Muchos que estaban en alto fueron avergonzados...»
  rationale: El paquete canónico dado para este encargo contiene un desajuste entre el hebreo y el griego. Para este borrador español, se sigue el texto griego explícitamente proporcionado en la sección de fuente paralela, sin mezclarlo con el hebreo diferente, y se preserva la amonestación sapiencial del contexto.
  doctrine_reference: 'PHILOSOPHY.md: usar las fuentes originales auditables disponibles; cuando hay tradición textual divergente en la base del encargo, reflejarla con transparencia.'
translation_notes:
  revision_awareness: El auditor inglés muestra una solución de prioridad hebrea para Sirácides 11:7, pero el paquete de tarea también ofrece un griego completamente distinto. Dado que el encargo pide un borrador español basado en la evidencia fuente y el paralelo griego está explícitamente incluido, se optó por una traducción directa del griego suministrado. Esto preserva la transparencia textual sin introducir una mezcla ecléctica no documentada.
  spanish_consistency_notes:
  - Se emplea un español neutro, bíblico y publicable, evitando arcaísmos innecesarios.
  - No se usó 'SEÑOR' ni terminología cristológica; el versículo no las requiere.
  - '''Censures'' y ''reprende'' mantienen la distinción entre advertencia previa y corrección posterior.'
  - 'La cadencia respeta el paralelismo del griego: antes de X, no Y; primero Z, y entonces W.'
