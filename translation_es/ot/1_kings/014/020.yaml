revisions:
- from: Los días en que Jeroboam reinó fueron veintidós años. Luego se acostó con sus padres[a], y Nadab su hijo reinó en su lugar.
  to: Los días que Jeroboam reinó fueron veintidós años. Luego descansó con sus padres[a], y Nadab su hijo llegó a ser rey en su lugar.
  rationale: Se revisa el modismo de muerte para que conserve la textura hebrea en un español natural y digno, evitando la torpeza de «se acostó con sus padres». También se distingue mejor entre el verbo de duración del reinado y el de entronización del sucesor, conforme al análisis auditado del inglés POB.
