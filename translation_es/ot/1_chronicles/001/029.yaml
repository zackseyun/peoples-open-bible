translation:
  language: es
  text: 'Estas son sus generaciones: el primogénito de Ismael[a], Nebaiot, Quedar, Adbeel, y Mibsam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nebaiot también se escribe tradicionalmente Nebayot en algunas transliteraciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estos son
  - He aquí
  lexicon: HALOT
  rationale: La fórmula de apertura genealógica se expresa de modo natural en español como una cláusula copulativa en presente. ‘Estas son’ conserva el valor deíctico y el tono de registro genealógico sin añadir interpretación.
- source_word: תֹּלְדוֹתָם
  english_pob_choice: their generations
  chosen_spanish: sus generaciones
  alternatives_spanish:
  - su descendencia
  - su linaje
  - su registro genealógico
  lexicon: HALOT
  rationale: En contextos genealógicos, תּוֹלְדוֹת puede denotar generaciones, descendencia o registro familiar. ‘Sus generaciones’ mantiene la formulación formal y cercana al hebreo, igual que en el inglés POB.
- source_word: בְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero nacido
  - el hijo primogénito
  lexicon: HALOT
  rationale: ‘Primogénito’ expresa con precisión el estatus de nacimiento y es idiomático en español bíblico. Se evita añadir ‘hijo’ porque el nombre propio siguiente ya identifica al individuo y el hebreo solo marca el rango de primogenitura.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ishmael
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: נְבָיוֹת
  english_pob_choice: Nebaioth
  chosen_spanish: Nebaiot
  alternatives_spanish:
  - Nebaiot
  - Nebayot
  lexicon: HALOT
  rationale: Se translitera el nombre propio según el hebreo. La forma ‘Nebaiot’ es más natural en español que la grafía inglesa; se conserva la referencia al mismo nombre sin imponer una convención inglesa.
- source_word: קֵדָר
  english_pob_choice: Kedar
  chosen_spanish: Quedar
  alternatives_spanish:
  - Kedar
  lexicon: HALOT
  rationale: Se usa ‘Quedar’ para adaptar la transliteración a la ortografía española habitual, manteniendo la identidad del nombre propio.
- source_word: אַדְבְּאֵל
  english_pob_choice: Adbeel
  chosen_spanish: Adbeel
  alternatives_spanish:
  - Adbeel
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa, sin expansión.
- source_word: מִבְשָׂם
  english_pob_choice: Mibsam
  chosen_spanish: Mibsam
  alternatives_spanish:
  - Mibsam
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa, sin expansión.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el auditable inglés POB, sin cambios de sentido. La única decisión relevante de forma fue adaptar los nombres propios a grafías españolas cuando eso mejora la lectura sin alterar la identificación.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico formal con ‘Estas son sus generaciones’.
  - Se evita ‘SEÑOR’ u այլ sustituciones, porque no aparece el Tetragrámaton ni un título divino en este versículo.
  - Los nombres propios se presentan en grafía española cuando procede (Ismael, Quedar, Nebaiot), conservando la identificabilidad bíblica.
