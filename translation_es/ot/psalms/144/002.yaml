review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general bien la cadena de epítetos del hebreo y mantiene correctamente «mi pueblo» en el texto principal, conforme al TM y a la decisión léxico-teológica documentada. También conserva bien la imagen de refugio en וּבוֹ חָסִיתִי. Sin embargo, las notas están mal asignadas respecto del expediente inglés: la nota [a] fue puesta sobre «fortaleza» pero su contenido trata la variante final «pueblos», y la nota [b] convierte en alternativa léxica una diferencia que en el expediente inglés corresponde a la antigua redacción «y mi libertador para mí».'
  spanish_quality_summary: 'El español es claro y digno, pero requiere reparación menor para coherencia editorial y legibilidad. «Mi amor fiel» es aceptable, aunque algo menos idiomático que «mi amor leal»; no obliga cambio. «Bajo mí» es formalmente fiel, aunque en español puede sonar algo tieso; aun así es defendible y comprensible en contexto real. El problema principal es paratextual: anclaje incorrecto de notas y contenido de notas no alineado con el historial auditado.'
  glossary_alignment: No hay conflicto con los términos proyectuales mayores. No aparece Yahvé ni Mesías. Las decisiones «mi amor fiel», «mi fortaleza», «mi baluarte», «mi libertador», «mi escudo», «me refugio», «mi pueblo» son en conjunto compatibles con la evidencia y con la racionalidad léxica documentada. Debe preservarse la nota sobre la lectura alternativa «pueblos» en el lugar correspondiente del texto, y la nota sobre «para mí» debe asociarse a «mi libertador», no a «me refugio».
  issues:
  - severity: high
    issue: La nota [a] está anclada a «fortaleza», pero su contenido trata la variante final «pueblos».
    rationale: Las notas deben aparecer en el lugar exacto al que corresponden. Aquí la variante textual afecta עַמִּי al final del versículo, no מְצוּדָתִי.
  - severity: high
    issue: 'La nota [b] no sigue el expediente inglés: ofrece «y en él busco refugio» como alternativa léxica en vez de reflejar la antigua redacción «y mi libertador para mí».'
    rationale: El rastro de auditoría documenta esa nota como previous_rendering asociada a לִי / מְפַלְטִי, no como alternativa de חסה. Cambiarla altera la justificación editorial preservada.
  - severity: medium
    issue: El texto principal carece de anclaje de nota en «mi pueblo», donde debe preservarse la alternativa «pueblos».
    rationale: La tensión textual/versal documentada debe quedar visible en español donde realmente surge la ambigüedad.
  revised_spanish_text: Mi amor fiel y mi fortaleza, mi baluarte y mi libertador[a], mi escudo, y en él me refugio; el que somete a mi pueblo[b] bajo mí.
  revised_footnotes:
