translation:
  language: es
  text: ¿Quién abrió las puertas de su rostro?[a] Alrededor de sus dientes hay terror.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién puede abrir las puertas de su boca?». El hebreo dice literalmente: «las puertas de su rostro», una expresión poética para la boca o las mandíbulas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Alrededor de sus dientes hay pavor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּלְתֵי
  english_pob_choice: doors
  chosen_spanish: puertas
  alternatives_spanish:
  - jaws
  - portones
  lexicon: HALOT
  rationale: El plural constructo de דלת es literalmente 'puertas'. En español, 'puertas de su rostro' conserva la imagen hebrea sin convertirla prematuramente en una glosa interpretativa como 'mandíbulas'. 'Portones' es demasiado grandioso para el contexto.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su boca
  - su frente
  lexicon: HALOT
  rationale: פנים significa normalmente 'rostro/cara', y el hebreo aquí conserva esa imagen corporal amplia. 'Rostro' mantiene la metáfora de 'puertas' y deja que el contexto sugiera la boca o las mandíbulas sin reemplazar la figura original.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  lexicon: HALOT
  rationale: Interrogativo estándar para la pregunta retórica.
- source_word: פִתֵּחַ
  english_pob_choice: has opened
  chosen_spanish: ha abierto
  alternatives_spanish:
  - puede abrir
  - abrió
  lexicon: HALOT
  rationale: 'El perfecto retórico en hebreo se vierte naturalmente con pretérito perfecto compuesto en español: ''ha abierto''. ''Puede abrir'' introduce una inferencia de capacidad que el hebreo no expresa de forma directa en esta cláusula.'
- source_word: סְבִיבוֹת
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: HALOT
  rationale: Expresión locativa que en español se expresa con naturalidad como 'alrededor de'.
- source_word: שִׁנָּיו
  english_pob_choice: his teeth
  chosen_spanish: sus dientes
  alternatives_spanish:
  - sus colmillos
  lexicon: HALOT
  rationale: El sentido básico es 'dientes'. 'Colmillos' intensifica la imagen, pero no es necesario ni plenamente justificable por el léxico base.
- source_word: אֵימָה
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - pavor
  - dread
  lexicon: HALOT
  rationale: '''Terror'' reproduce con fuerza la cláusula nominal final. ''Pavor'' es posible, pero ''terror'' coincide mejor con la intensidad del hebreo y con la POB inglesa.'
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB no introdujo cambios y mantiene alta concordancia con el texto fuente (acuerdo 0.95). La presente versión sigue esa lectura estable, conservando las alternativas léxicas documentadas en las notas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se usa 'rostro' para preservar la imagen hebrea de פָנָיו, en lugar de resolverla directamente como 'boca'.
  - Se conserva 'terror' para אֵימָה, con nota alternativa 'pavor' para reflejar la opción secundaria documentada en el inglés POB.
  - La puntuación respeta la pregunta retórica y la cláusula nominal final del hebreo.
