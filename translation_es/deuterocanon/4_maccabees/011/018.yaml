translation:
  language: es
  text: Sobre eso[a], mientras era estirado metódicamente y descoyuntado[b], era quemado por debajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuidadosamente» o «con método»; el adverbio griego subraya una acción deliberada y regulada en la tortura.
    reason: lexical_alternative
  - marker: b
    text: O «con las articulaciones dislocadas» o «dislocado»; el verbo griego alude a la luxación violenta de las articulaciones o vértebras.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφ' οὗ
  english_pob_choice: On it
  chosen_spanish: Sobre él
  alternatives_spanish:
  - Encima de él
  - Sobre aquello
  lexicon: LSJ
  rationale: La referencia es anafórica al instrumento o superficie de tortura mencionada antes. «Sobre él» conserva la remisión directa y suena natural en español, sin introducir una paráfrasis excesiva.
- source_word: κατατεινόμενος
  english_pob_choice: being stretched out
  chosen_spanish: era estirado
  alternatives_spanish:
  - era tendido
  - era extendido
  - era estirado en tensión
  lexicon: LSJ
  rationale: El participio expresa la acción continua de ser tensado o extendido en un contexto de tormento. «Era estirado» comunica bien esa violencia física en español y mantiene el aspecto progresivo.
- source_word: εὐμελῶς
  english_pob_choice: methodically
  chosen_spanish: metódicamente
  alternatives_spanish:
  - cuidadosamente
  - ordenadamente
  - con método
  lexicon: LSJ
  rationale: El adverbio indica una acción deliberada, regulada y ordenada. «Metódicamente» preserva esa idea de ejecución calculada que el contexto de tortura exige, y corresponde al énfasis del audit trail inglés.
- source_word: ἐκσφονδυλιζόμενος
  english_pob_choice: disjointed
  chosen_spanish: dislocado
  alternatives_spanish:
  - con las articulaciones dislocadas
  - con los miembros descoyuntados
  - desarticulado
  lexicon: LSJ
  rationale: El verbo señala la luxación violenta de articulaciones o vértebras. «Dislocado» es breve, fiel y suficientemente fuerte; las alternativas explicitan más el daño corporal pero son más largas.
- source_word: ὑπεκαίετο
  english_pob_choice: he was being burned underneath
  chosen_spanish: era quemado por debajo
  alternatives_spanish:
  - era quemado desde abajo
  - era quemado por debajo de él
  - ardía por debajo
  lexicon: LSJ
  rationale: El imperfecto pasivo pide una acción continua. «Era quemado por debajo» conserva tanto la progresividad como la dirección espacial sugerida por ὑπο-, sin convertirlo en una paráfrasis más libre.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del texto inglés auditado, que ajustó εὐμελῶς de «with measured care» a «methodically» por naturalidad. Se conservó la estructura causal/participial y el sentido de violencia física acumulativa, sin suavizar ni amplificar el griego.
  spanish_consistency_notes:
  - Se mantiene «metódicamente» para εὐμελῶς, en línea con el enfoque del audit trail inglés y con el matiz de acción deliberada.
  - «Dislocado» preserva la crudeza lexical sin sobretraducir a una imagen más amplia que el verbo griego.
  - «Era quemado por debajo» reproduce el aspecto imperfectivo y la localización del fuego; no se sustituyó por una fórmula más interpretativa.
  - El texto evita vocabulario eclesiástico no presente en el original y mantiene un registro sobrio, apto para lectura pública.
