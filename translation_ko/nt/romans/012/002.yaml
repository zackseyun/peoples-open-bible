id: ROM.12.2
reference: Romans 12:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ μὴ ⸀συσχηματίζεσθε τῷ αἰῶνι τούτῳ, ἀλλὰ ⸀μεταμορφοῦσθε τῇ ἀνακαινώσει τοῦ ⸀νοός, εἰς τὸ δοκιμάζειν ὑμᾶς τί τὸ θέλημα τοῦ θεοῦ, τὸ ἀγαθὸν καὶ εὐάρεστον καὶ τέλειον.
base_translation:
  language: en
  yaml_path: translation/nt/romans/012/002.yaml
  text: And do not be conformed to this age[a], but be transformed by the renewing of your mind[c][b], so that you may discern what the will of God is—the good and pleasing and perfect.
  footnotes:
  - marker: a
    text: 'Or: “this world.” Greek αἰών more precisely means “age,” referring to the present order or era.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “so that you may test and approve what the will of God is.” The Greek verb can include both testing and recognizing what is approved.'
    reason: lexical_alternative
  - marker: c
    text: “Pleasing” may mean pleasing to God; some translate “acceptable.”
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분은 이 시대를 본받지 말고, 마음을 새롭게 함으로 변화를 받으십시오. 그리하여 여러분이 하나님의 뜻이 무엇인지, 곧 선하시고 기뻐하시고 온전하신 그 뜻을 분별하게 하기 위함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συσχηματίζεσθε
  english_pob_choice: be conformed
  chosen_korean: 본받지
  alternatives_korean:
  - 같은 모양이 되지
  - 닮지
  lexicon: BDAG
  rationale: συν-σχηματίζω의 「겉모양을 같이 하다」를 자연스럽게 옮긴다.
- source_word: μεταμορφοῦσθε
  english_pob_choice: be transformed
  chosen_korean: 변화를 받으십시오
  alternatives_korean:
  - 변모하십시오
  - 변형되십시오
  lexicon: BDAG
  rationale: 정책 지시 어휘. 수동태(피동의 신적 행위)를 살린다.
- source_word: ἀνακαινώσει τοῦ νοός
  english_pob_choice: renewing of the mind
  chosen_korean: 마음을 새롭게 함
  alternatives_korean:
  - 생각을 새롭게 함
  - 지성의 갱신
  lexicon: BDAG
  rationale: νοῦς를 「마음」으로 옮기는 한국 신약 전통을 따르되, 단순한 감정이 아닌 인식·판단의 새로워짐임을 문맥이 분명히 한다.
