- from: Hasta los jóvenes se fatigan y se cansan, y los jóvenes tropiezan ciertamente.
  to: Hasta los jóvenes se fatigan y se cansan, y los jóvenes[a] ciertamente tropiezan.
  rationale: Se conserva la estructura y el sentido del original, pero se mejora la naturalidad de la frase enfática y se añade una nota para no perder el matiz léxico de בַּחוּרִים. No hace falta una reescritura mayor ni adjudicación adicional.
