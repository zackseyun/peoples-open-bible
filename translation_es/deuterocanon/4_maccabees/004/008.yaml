translation:
  language: es
  text: Lo impedían[a] todo lo que podían. Pero con amenazas Apolonio iba al templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo obstaculizaban tanto como podían». El griego expresa capacidad o posibilidad de manera idiomática.'
    reason: lexical_alternative
  - marker: b
    text: «Templo» traduce ἱερόν, que puede referirse al recinto del templo en sentido amplio, no solo al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷόν τε ἦν
  english_pob_choice: as much as they could
  chosen_spanish: tanto como podían
  alternatives_spanish:
  - todo lo que podían
  - en la medida de lo posible
  lexicon: LSJ
  rationale: El giro griego expresa posibilidad o capacidad; por eso conviene una frase de capacidad efectiva. «Tanto como podían» comunica bien el alcance sin añadir explicación excesiva ni volver la cláusula torpemente literal.
- source_word: ἐκώλυον
  english_pob_choice: they were preventing
  chosen_spanish: les impedían
  alternatives_spanish:
  - los estaban impidiendo
  - los obstaculizaban
  lexicon: BDAG
  rationale: El imperfecto plural indica acción continua. En español, «les impedían» mantiene ese valor aspectual y el sentido de obstaculizar/impedir; aquí el complemento implícito se entiende por el contexto narrativo.
- source_word: μετὰ ἀπειλῆς
  english_pob_choice: with threats
  chosen_spanish: con amenazas
  alternatives_spanish:
  - amenazándolo
  - amenazante
  lexicon: LSJ
  rationale: La preposición con sustantivo singular en griego funciona naturalmente en español como plural genérico de hostilidad. «Con amenazas» conserva la idea de intimidación sin forzar una reformulación interpretativa.
- source_word: ὁ Ἀπολλώνιος
  english_pob_choice: Apollonius
  chosen_spanish: Apolonio
  alternatives_spanish:
  - Apollonio
  lexicon: Convención onomástica
  rationale: Se usa la forma castellana habitual del nombre propio, sin añadir comentario. La adaptación es mínima y transparente.
- source_word: ἀπῄει
  english_pob_choice: was going
  chosen_spanish: iba
  alternatives_spanish:
  - se dirigía
  - se encaminaba
  lexicon: BDAG
  rationale: El imperfecto expresa movimiento en curso; «iba» reproduce esa progresividad de manera natural en español. Evita una puntuación de acción concluyente que el griego no exige.
- source_word: εἰς τὸ ἱερόν
  english_pob_choice: to the temple
  chosen_spanish: al templo
  alternatives_spanish:
  - al recinto del templo
  - al templo sagrado
  lexicon: BDAG
  rationale: ἱερόν suele referirse al complejo/recinto del templo. «Al templo» es la opción más natural y fiel en español; si se quisiera explicitar el ámbito, «recinto del templo» sería una alternativa, pero no necesaria en el texto principal.
theological_decisions:
- issue: Alcance de ἱερόν
  english_pob_reading: Temple translates ἱερόν, which can refer to the temple precincts broadly, not only the inner sanctuary.
  chosen_spanish_reading: «Templo» se entiende como el recinto del templo, no como el santuario interior.
  alternative_spanish_readings:
  - «Recinto del templo»
  - «santuario»
  rationale: No hay necesidad de restringir el término al lugar más interno; el griego permite un sentido amplio. Mantener «templo» preserva la naturalidad, y la nota aclara el alcance espacial sin alterar el texto.
  doctrine_reference: Ninguna
- issue: Fuerza del impedían
  english_pob_reading: They were preventing him as much as they could.
  chosen_spanish_reading: «Les impedían tanto como podían» conserva la insistencia y el esfuerzo continuo de oposición.
  alternative_spanish_readings:
  - «Lo obstaculizaban tanto como podían»
  - «lo impedían todo lo posible»
  rationale: No se trata de un bloqueo necesariamente exitoso, sino de resistencia persistente. «Impedir» mantiene la fuerza del verbo sin introducir más matices de los que el contexto muestra.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'Se siguió la lectura revisada del inglés POB: primera cláusula naturalizada como capacidad continua («as much as they could») y ἀπῄει entendido de forma progresiva. La traducción española evita calcar «going away» y conserva la oposición mediante un imperfecto narrativo.'
  spanish_consistency_notes:
  - Se mantuvo «Apolonio» como forma española estable del nombre propio.
  - «Templo» se usó de manera consistente con el valor amplio de ἱερόν.
  - El imperfecto español («impedían», «iba») reproduce la progresividad del griego.
  - No se introdujeron términos teológicos ajenos al versículo.
