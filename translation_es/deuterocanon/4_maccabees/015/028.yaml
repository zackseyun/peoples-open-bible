- from: Pero la hija recordó la perseverancia de Abraham, el temeroso de Dios[a].
  to: Pero la hija recordó la perseverancia de Abraham[a], temeroso de Dios.
  rationale: Se ajusta la frase para que θεοσεβοῦς modifique a Abraham de forma natural en español, conservando la referencia explícita a Dios y mejorando la legibilidad. Se mantiene «perseverancia» como opción válida para καρτερίας. La nota se simplifica para ofrecer alternativas realmente naturales en español y coherentes con la evidencia griega y la auditoría inglesa.
