translation:
  language: es
  text: Como cuando el fuego enciende la broza[a], y el fuego hace hervir el agua[b], para dar a conocer tu nombre a tus adversarios, de modo que las naciones tiemblen ante tu presencia—[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maleza», «ramas secas» o «paja» para «broza». El término hebreo es raro y se refiere a material que prende con facilidad.
    reason: lexical_alternative
  - marker: b
    text: O «hace burbujear» o «hace bullir».
    reason: lexical_alternative
  - marker: c
    text: En algunas numeraciones, esta línea corresponde a Isaías 63:19b.
    reason: textual_variant
lexical_decisions:
- source_word: כִּ/קְדֹחַ
  english_pob_choice: As when ... kindles
  chosen_spanish: Como cuando el fuego enciende
  alternatives_spanish:
  - Cuando el fuego enciende
  - Como cuando el fuego prende
  lexicon: HALOT
  rationale: El כ comparativo pide una equivalencia con 'como/cuando'; el infinitivo de קדח expresa la acción de encender o arder. 'Enciende' conserva el movimiento verbal y suena natural en español sin perder la imagen comparativa.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - fuego
  - la llama
  lexicon: HALOT
  rationale: Término directo y transparente; 'fuego' mantiene la imagen poética y la repetición del verso.
- source_word: הֲמָסִים
  english_pob_choice: brushwood
  chosen_spanish: la broza
  alternatives_spanish:
  - la maleza
  - las ramas secas
  - la paja
  lexicon: HALOT
  rationale: El término es raro y alude a material fácilmente inflamable. 'Broza' comunica combustible vegetal de manera natural en español y deja abierta la imprecisión del hebreo.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: el agua
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: Correspondencia léxica directa.
- source_word: תִּבְעֶה
  english_pob_choice: causes ... to boil
  chosen_spanish: hace hervir
  alternatives_spanish:
  - hace burbujear
  - hace bullir
  lexicon: HALOT
  rationale: El verbo aquí expresa que el fuego produce ebullición o borboteo. 'Hace hervir' es idiomático en español y conserva la fuerza del efecto.
- source_word: לְ/הוֹדִ֥יעַ
  english_pob_choice: to make known
  chosen_spanish: para dar a conocer
  alternatives_spanish:
  - para hacer saber
  - para revelar
  lexicon: HALOT
  rationale: El hiphil de ידע conserva el matiz causativo. 'Dar a conocer' reproduce bien esa causalidad en español bíblico moderno.
- source_word: שִׁמְ/ךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu nombre y renombre
  lexicon: HALOT
  rationale: Se mantiene el idiomático 'nombre' como identidad y reputación divina, sin paraphrasearlo.
- source_word: לְ/צָרֶ֑י/ךָ
  english_pob_choice: to your adversaries
  chosen_spanish: a tus adversarios
  alternatives_spanish:
  - a tus enemigos
  - contra tus enemigos
  lexicon: HALOT
  rationale: '''Adversarios'' conserva el sentido de oposición relacional y sigue de cerca la decisión inglesa sin endurecer innecesariamente el matiz militar.'
- source_word: מִ/פָּנֶ֖י/ךָ
  english_pob_choice: at your presence
  chosen_spanish: ante tu presencia
  alternatives_spanish:
  - delante de ti
  - por causa de tu presencia
  lexicon: HALOT
  rationale: La locución idiomática hebrea se expresa de forma natural como presencia divina; 'ante tu presencia' conserva el efecto teofánico.
- source_word: גּוֹיִ֥ם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: En Isaías, el término suele referirse a las naciones en general. 'Naciones' es la opción más precisa y menos interpretativa.
- source_word: יִרְגָּֽזוּ
  english_pob_choice: tremble
  chosen_spanish: tiemblen
  alternatives_spanish:
  - se estremezcan
  - se agiten
  - se sacudan
  lexicon: HALOT
  rationale: El verbo denota temblor, agitación o estremecimiento ante una manifestación divina. 'Tiemblen' es breve, claro y fiel al efecto descrito.
theological_decisions:
- issue: Relación con la petición previa y numeración versicular
  english_pob_reading: The verse continues the prophet's plea with comparative imagery, without importing the preceding verse's wording into the main text.
  chosen_spanish_reading: El verso se vierte como continuación poética de la súplica, con la comparación 'Como cuando...', sin incorporar en el texto principal la formulación del versículo anterior.
  alternative_spanish_readings:
  - Unirlo explícitamente con la petición anterior en la redacción principal
  - Reformularlo como una oración completa independiente
  rationale: El hebreo aquí comienza con imagen comparativa, no con la repetición de la súplica anterior. La redacción española debe reflejar el verso tal como está, aunque conserve la conexión literaria con el contexto inmediato.
  doctrine_reference: Preservar la relación literaria sin alterar la unidad textual.
- issue: Sentido teológico de la imagen de fuego y agua hirviendo
  english_pob_reading: Retain the simile as poetic imagery of God's powerful self-disclosure and judgment, without narrowing it to a single doctrinal category.
  chosen_spanish_reading: Se conserva la imagen como manifestación poderosa de Dios, con posible trasfondo de juicio, sin reducirla sólo a juicio ni sólo a purificación.
  alternative_spanish_readings:
  - Entenderla exclusivamente como juicio
  - Entenderla exclusivamente como purificación
  rationale: 'El versículo acumula fuerza poética y teofánica: fuego, agua que hierve, nombre dado a conocer, naciones que tiemblan. Traducirlo con apertura mantiene la tensión interpretativa presente en el texto.'
  doctrine_reference: Preservar la tensión teológica sin resolverla en exceso.
translation_notes:
  revision_awareness: La versión se mantiene en alta concordancia con la revisión más reciente y con el dictamen de revisión de acuerdo amplio; no se identificaron cambios necesarios en la línea base inglesa. Se ha optado por un español natural que preserve la comparación, la repetición de 'fuego', la rareza de 'הֲמָסִים' y la tensión teológica del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero en este versículo no aparece el tetragrámaton; no aplica una sustitución de nombre divino.
  - '''Adversarios'' mantiene el registro bíblico y evita endurecer el matiz a ''enemigos'' donde el hebreo permite oposición amplia.'
  - '''Naciones'' se conserva frente a ''pueblos'' por la preferencia contextual en Isaías.'
  - Las notas mantienen alternativas léxicas cuando el hebreo es raro o admite oscilación semántica.
  - La puntuación con raya final reproduce el cierre abierto del verso y su continuidad con el contexto inmediato.
