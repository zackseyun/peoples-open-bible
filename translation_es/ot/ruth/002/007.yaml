  to: 'Ella dijo: «Por favor, déjame espigar y recoger entre las gavillas, detrás de los segadores». Y vino y se ha quedado desde la mañana hasta ahora; ha estado en la casa[a] solo un poco.'
  rationale: Se reubica la nota al sintagma final, que es donde realmente existe la dificultad textual, y se elimina la redundancia de una segunda nota. También se mejora la naturalidad del español cambiando «solo ha estado sentada en la casa muy poco» por «ha estado en la casa solo un poco», lo cual conserva la idea de presencia/descanso mínimo en la casa o refugio sin una construcción torpe. No requiere adjudicación adicional porque el ajuste es claro y sigue la decisión ya documentada por la auditoría inglesa.
