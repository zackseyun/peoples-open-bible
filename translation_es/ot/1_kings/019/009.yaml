translation:
  language: es
  text: 'Allí llegó a la cueva y pasó la noche allí. Y he aquí,[a] la palabra de Yahvé vino a él y le dijo: «¿Qué haces aquí, Elías?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué estás aquí, Elías?». El hebreo, literalmente, dice: «¿Qué [hay] para ti aquí, Elías?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - entró
  lexicon: HALOT
  rationale: בוא expresa movimiento de llegada; en español «llegó» comunica bien la progresión narrativa y evita sobreespecificar la acción más allá de lo que exige el contexto con «a la cueva».
- source_word: הַמְּעָרָה
  english_pob_choice: the cave
  chosen_spanish: la cueva
  alternatives_spanish:
  - la gruta
  - el cavernón
  lexicon: HALOT
  rationale: מְעָרָה normalmente significa «cueva». Se conserva el artículo definido y se usa el sustantivo natural en español actual.
- source_word: וַיָּלֶן
  english_pob_choice: spent the night
  chosen_spanish: pasó la noche
  alternatives_spanish:
  - pernoctó
  - se hospedó
  lexicon: HALOT
  rationale: לון/לין tiene el sentido de pasar la noche o alojarse. «Pasó la noche» es idiomático y claro en español moderno, sin añadir matices ajenos.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y resulta que
  lexicon: HALOT
  rationale: הִנֵּה introduce una irrupción o énfasis repentino. «Y he aquí» preserva ese valor discursivo de manera digna y reconocible en español bíblico.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra de Yahweh
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «palabra» para reflejar la fórmula profética y se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé», no como sustitución por un título, para conservar el nombre divino personal tal como exige la doctrina del proyecto.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo pronominal es direccional; «a él» reproduce el sentido básico de destinación/referencia.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo a él
  - y habló con él
  lexicon: HALOT
  rationale: Se naturaliza la repetición pronominal del hebreo con la forma española habitual «le dijo», manteniendo la secuencia narrativa.
- source_word: מַה לְּךָ פֹה
  english_pob_choice: What are you doing here
  chosen_spanish: ¿Qué haces aquí
  alternatives_spanish:
  - ¿Por qué estás aquí?
  - ¿Qué tienes tú aquí?
  lexicon: HALOT
  rationale: El hebreo literalmente dice «¿Qué [hay] para ti aquí?», pero en contexto funciona como una pregunta incisiva sobre la presencia de Elías. «¿Qué haces aquí?» conserva esa fuerza y evita restringir el sentido solo a la causa/motivo.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Eliyahu
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional y transparente del nombre propio, plenamente reconocible para la lectura bíblica en español.
theological_decisions:
- issue: Rendering of יְהוָה in the divine speech formula
  english_pob_reading: the word of Yahweh
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - la palabra del Señor
  - la palabra de Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Conforme a la pauta del proyecto, se preserva el nombre divino personal «Yahvé» en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatic force of מַה לְּךָ פֹה
  english_pob_reading: What are you doing here
  chosen_spanish_reading: ¿Qué haces aquí?
  alternative_spanish_readings:
  - ¿Por qué estás aquí?
  - ¿Qué tienes tú aquí?
  rationale: La pregunta hebrea es un giro idiomático con fuerza interrogativa sobre la situación/presencia de Elías. En español, «¿Qué haces aquí?» conserva la viveza sin forzar una paráfrasis más estrecha que el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La tradición auditada en inglés mantiene la fórmula profética «the word of Yahweh» y anota la alternativa idiomática de מַה לְּךָ פֹה. No hubo revisiones posteriores que alteraran la lectura, así que se conserva la misma interpretación de base en español, ajustando solo la expresión para que sea natural y fiel.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «palabra» en la fórmula profética, no «mensaje», para respetar la fraseología del original.
  - Se usa «Elías» como forma castellana estándar del nombre propio, sin perder la referencia al hebreo אֵלִיָּהוּ.
  - La nota al pie preserva la tensión entre la traducción idiomática y el sentido literal del hebreo.
