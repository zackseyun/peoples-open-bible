  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: el pueblo lleva la masa no leudada, con los recipientes de amasado envueltos/atados en sus mantos sobre los hombros. Sin embargo, «antes de que fermentara» se desvía levemente del matiz pascual específico de יֶחְמָץ, que aquí apunta a leudarse, no simplemente a fermentar en sentido general. Además, la nota al pie está mal anclada: el marcador [a] aparece en «fermentara», pero el contenido de la nota explica una alternativa para «artesas de amasar».'
  spanish_quality_summary: 'El español es claro y digno, pero conviene ajustar dos puntos para mayor fidelidad y legibilidad: usar «antes de que se leudara» en lugar de «fermentara», y mover la nota [a] al sintagma «artesas de amasar[a]». El resto de la redacción es natural y bien formada.'
  glossary_alignment: No hay términos del glosario mayor en juego aquí. «El pueblo», «masa», «mantos» y «sobre sus hombros» son adecuados. «Artesas de amasar» es aceptable y preciso; la alternativa preservada en nota debe seguir vinculada a ese término. El único ajuste léxico importante es preferir «se leudara» para יֶחְמָץ en este contexto pascual.
  issues:
  - severity: medium
    issue: «fermentara» para טֶרֶם יֶחְמָץ
    rationale: Aunque relacionado, «fermentar» es más amplio y menos específico que el proceso de leudado relevante en Éxodo 12. «Antes de que se leudara» preserva mejor la conexión con el pan sin levadura.
  - severity: high
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica una alternativa para מִשְׁאֲרֹתָם («artesas de amasar» / «recipientes usados para preparar la masa»), pero el marcador está colocado en «fermentara». Esto rompe la correspondencia exigida entre nota y palabra anclada.
  revised_spanish_text: Así, el pueblo llevó su masa antes de que se leudara, con sus artesas de amasar[a] atadas en sus mantos, sobre sus hombros.
  revised_footnotes:
  - marker: a
    text: O «sus recipientes de amasado». El hebreo nombra recipientes usados para preparar la masa.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo a «se leudara» para reflejar con mayor precisión el hebreo en el contexto de la Pascua, y se reubica la nota [a] al término «artesas de amasar», que es el verdadero lugar de la alternativa léxica documentada.
