review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Yahvé pasa por la tierra de Egipto esa noche, hiere a todo primogénito, desde hombre hasta bestia, y ejecuta juicios contra los dioses de Egipto. También preserva correctamente el nombre divino «Yahvé» y «dioses de Egipto». Sin embargo, hay dos desajustes: la nota [a] introduce como alternativa «pasaré por encima de», que corresponde al sentido que el análisis precisamente excluye; y «sobre todos los dioses» suena menos fiel en español que «contra todos los dioses» para la dirección hostil de los juicios.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere pequeños ajustes de naturalidad y precisión. «En esta noche» es comprensible, aunque «en esta noche»/«esta noche» en español suena algo menos natural que «en esta noche» dentro de registro bíblico; no exige cambio. El punto principal de calidad es «sobre todos los dioses», que en español resulta menos idiomático que «contra todos los dioses» con «ejecutaré juicios». La nota [a] además crea confusión semántica.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé», אֱלֹהֵי מִצְרַיִם -> «dioses de Egipto», שְׁפָטִים -> «juicios». «Todo primogénito» y «desde el hombre hasta la bestia» son aceptables. Se debe corregir la alternativa de la nota [a] para no sugerir el falso sentido de «pasar por encima de / pasar por alto».'
  issues:
  - severity: high
    issue: 'La nota [a] da una alternativa equivocada: «pasaré por encima de»'
    rationale: El expediente inglés aclara que עבר aquí significa pasar por la tierra / atravesarla, no «pass over» en el sentido de perdonar o pasar de largo. «Pasaré por encima de» induce precisamente la confusión que debe evitarse.
  - severity: medium
    issue: «Sobre todos los dioses de Egipto» es menos fiel/idiomático que «contra todos los dioses de Egipto»
    rationale: La construcción hebrea expresa acción judicial dirigida hostilmente contra los dioses. En español, con «ejecutaré juicios», «contra» comunica mejor esa fuerza que «sobre», que suena más calcado.
  revised_spanish_text: Porque yo pasaré por la tierra de Egipto en esta noche[a], y heriré a todo primogénito en la tierra de Egipto, desde el hombre hasta la bestia[b]; y contra todos los dioses de Egipto ejecutaré juicios. Yo soy Yahvé[c].
  revised_footnotes:
  - marker: a
    text: 'O: «iré por». El verbo aquí indica pasar a través de la tierra, no «pasar por alto» en el sentido de perdonar.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el hombre hasta la bestia».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: YHWH, tradicionalmente «el SEÑOR»; aquí se conserva «Yahvé».'
    reason: alternative_reading
  revision_rationale: Se corrige la nota [a] para alinearla con el hebreo y con la auditoría inglesa, eliminando una alternativa engañosa asociada al motivo de «pasar por alto». También se cambia «sobre todos los dioses» por «contra todos los dioses» para reflejar mejor la dirección hostil de los juicios en español natural. El resto del texto puede mantenerse.
