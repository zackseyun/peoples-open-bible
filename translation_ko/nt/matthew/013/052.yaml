  text: ὁ δὲ εἶπεν αὐτοῖς· Διὰ τοῦτο πᾶς γραμματεὺς μαθητευθεὶς ⸂τῇ βασιλείᾳ⸃ τῶν οὐρανῶν ὅμοιός ἐστιν ἀνθρώπῳ οἰκοδεσπότῃ ὅστις ἐκβάλλει ἐκ τοῦ θησαυροῦ αὐτοῦ καινὰ καὶ παλαιά.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/013/052.yaml
  text: 'Then he said to them[c][b][a], “Therefore every scribe who has been trained for the kingdom of heaven is like a master of a house who brings out of his treasure new things and old.”'
  footnotes:
  - marker: a
    text: Or “who has become a disciple of the kingdom of heaven.” The Greek participle can carry the sense of being made a disciple as well as being instructed or trained.
    reason: alternative_reading
  - marker: b
    text: Or “householder” or “head of a household.”
    reason: lexical_alternative
  - marker: c
    text: “Treasure” may also suggest a storeroom or treasury from which valued things are brought out.
    reason: lexical_alternative
translation:
  language: ko
  text: '예수님이 그들에게 말씀하셨습니다. 「그러므로 하늘 나라의 제자가 된 모든 서기관은, 자기 곳간에서 새것과 옛것을 내는 집 주인과 같다.」'
  philosophy: optimal-equivalence
