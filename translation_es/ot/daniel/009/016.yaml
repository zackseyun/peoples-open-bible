  text: אֲדֹנָ֗/י כְּ/כָל צִדְקֹתֶ֨/ךָ֙ יָֽשָׁב נָ֤א אַפְּ/ךָ֙ וַ/חֲמָ֣תְ/ךָ֔ מֵ/עִֽירְ/ךָ֥ יְרוּשָׁלִַ֖ם הַר קָדְשֶׁ֑/ךָ כִּ֤י בַ/חֲטָאֵ֨י/נוּ֙ וּ/בַ/עֲוֺנ֣וֹת אֲבֹתֵ֔י/נוּ יְרוּשָׁלִַ֧ם וְ/עַמְּ/ךָ֛ לְ/חֶרְפָּ֖ה לְ/כָל סְבִיבֹתֵֽי/נוּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/016.yaml
  text: Lord[a], according to all your righteous acts, please let your anger and your wrath turn away from your city Jerusalem, your holy mountain; for because of our sins and the iniquities of our fathers[b], Jerusalem and your people are a reproach to all those around us.
  footnotes:
  - marker: a
    text: Or 'your acts of justice' or 'your righteousness.' The Hebrew is plural, likely pointing to God's righteous deeds rather than only an abstract attribute.
    reason: lexical_alternative
  - marker: b
    text: '''Our fathers'' refers to the prior generations/ancestors of the people.'
    reason: lexical_alternative
