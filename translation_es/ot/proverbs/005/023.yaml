translation:
  language: es
  text: Muere por falta de disciplina[a], y en la abundancia de su necedad se desvía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Morirá por falta de disciplina, y en la abundancia de su necedad se desviará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - morirá
  lexicon: HALOT
  rationale: En proverbio sapiencial, el imperfecto hebreo expresa un resultado cierto o habitual. «Muere» mantiene el valor gnómico y la inmediatez proverbial en español, como el inglés POB «dies».
- source_word: בְּאֵין
  english_pob_choice: for lack of
  chosen_spanish: por falta de
  alternatives_spanish:
  - sin
  - en ausencia de
  lexicon: HALOT
  rationale: La construcción con ב + אֵין expresa circunstancia o causa. «Por falta de» comunica naturalmente la idea causal sin perder la tensión de carencia expresada por el hebreo.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - castigo disciplinario
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר apunta a formación correctiva, no solo a información. «Disciplina» conserva esa fuerza moral y pedagógica que el inglés POB prioriza.
- source_word: וּבְרֹב
  english_pob_choice: in the abundance of
  chosen_spanish: en la abundancia de
  alternatives_spanish:
  - en la grandeza de
  - por la abundancia de
  - a causa de la abundancia de
  lexicon: HALOT
  rationale: רֹב expresa abundancia, multitud o plenitud. «En la abundancia de» refleja bien esa intensidad y sigue de cerca la imagen hebrea, como la revisión inglesa más naturalizada.
- source_word: אִוַּלְתּוֹ
  english_pob_choice: his folly
  chosen_spanish: su necedad
  alternatives_spanish:
  - su insensatez
  - su foolishness
  lexicon: HALOT
  rationale: אִוָּלָה / אִוֶּלֶת en el lenguaje sapiencial denota necedad moral, no simple torpeza. «Necedad» es más idiomática y conserva mejor el peso ético que «foolishness»/«foolishness».
- source_word: יִשְׁגֶּה
  english_pob_choice: he goes astray
  chosen_spanish: se desvía
  alternatives_spanish:
  - yerra
  - anda extraviado
  - se extravía
  lexicon: HALOT
  rationale: שׁגה puede significar errar, extraviarse o desviarse. «Se desvía» mantiene el sentido moral de apartarse del camino correcto sin añadir una imagen física innecesaria.
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: Muere
  alternatives_spanish:
  - Él muere
  - Ese hombre muere
  lexicon: HALOT
  rationale: El pronombre enfático hebreo ya queda absorbido por la estructura española; no hace falta reproducirlo de forma literal. El sujeto queda claro por el verbo y el contexto.
translation_notes:
  revision_awareness: 'La versión española sigue el texto hebreo de WLC y el audit trail inglés de POB: mantiene el valor gnómico de los imperfectos, conserva la causalidad de בְּאֵין y refleja la revisión inglesa que naturalizó רֹב como «abundance».'
  spanish_consistency_notes:
  - Se usó «disciplina» para מוּסָר, alineado con el sentido formativo-correctivo documentado en POB.
  - Se prefirió «necedad» para אִוַּלְתּוֹ por ser el equivalente sapiencial más natural en español.
  - «Se desvía» comunica שׁגה con una imagen moral suficientemente amplia sin sobreespecificar el matiz.
  - La nota textual alternativa preserva el carácter gnómico del verso con futuros españoles posibles, como en la nota inglesa.
