  text: Εἰδότες οὖν τὸν φόβον τοῦ κυρίου ἀνθρώπους πείθομεν, θεῷ δὲ πεφανερώμεθα· ἐλπίζω δὲ καὶ ἐν ταῖς συνειδήσεσιν ὑμῶν πεφανερῶσθαι.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/011.yaml
  text: Therefore, knowing the fear of the Lord, we persuade people; but we have been made known to God, and I hope that we also have been made known in your consciences.
  footnotes:
  - marker: a
    text: Or 'we have been manifested to God ... to have been manifested in your consciences.'
    reason: lexical_alternative
  - marker: b
    text: '''The fear of the Lord'' may also be understood as reverent awe before the Lord, especially in light of the judgment-seat context in the previous verse.'
