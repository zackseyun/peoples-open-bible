revisions:
- from: Aquel día será un día de ira[a], un día de angustia y aprieto, un día de ruina y devastación[b], un día de oscuridad y lobreguez[c], un día de nubes y espesa oscuridad.
  to: Aquel día es un día de ira[a], un día de angustia y aflicción, un día de ruina y devastación[b], un día de oscuridad y lobreguez, un día de nubes y espesa oscuridad[c].
  rationale: Se reemplaza «será» por «es» para evitar añadir un futuro no explícito en el hebreo y alinearse con la identificación descriptiva del English POB. Se sustituye «aprieto» por «aflicción» para mantener un registro más solemne y ampliamente inteligible en español eclesial. Además, se reubica la nota [c] al sintagma final, que es donde corresponde su contenido sobre «nube / nubes» y el singular hebreo; la nota no debe anclarse en «lobreguez», ya que allí crea desajuste entre texto y nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:00:19Z'
