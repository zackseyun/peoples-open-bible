translation:
  language: es
  text: El comienzo de toda obra es una palabra[b][a], y el comienzo de toda labor es un pensamiento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego aquí dice una sentencia diferente: «Hay uno que es sabio para su propia alma, y los frutos de su entendimiento son dignos de confianza en su boca».'
    reason: alternative_reading
  - marker: b
    text: O «cosa/asunto» para «palabra» (hebreo dabar); el término hebreo puede abarcar ambos sentidos.
    reason: lexical_alternative
  - marker: c
    text: O «plan» para «pensamiento» (hebreo machashevet).
    reason: lexical_alternative
lexical_decisions:
- source_word: ראש
  english_pob_choice: the beginning of
  chosen_spanish: el comienzo de
  alternatives_spanish:
  - la cabeza de
  - lo primero de
  - el principio de
  lexicon: HALOT
  rationale: En este proverbio, ראש expresa lo que va primero o lo que está al inicio. «El comienzo de» suena natural en español y conserva la relación paralela entre los dos miembros sin forzar una imagen corporal como «cabeza».
- source_word: כל
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: El valor distributivo de כל se refleja bien con «toda» ante sustantivos singulares contables como «obra» y «labor», manteniendo el carácter general del proverbio.
- source_word: מעשה
  english_pob_choice: deed
  chosen_spanish: obra
  alternatives_spanish:
  - deed
  - acto
  - acción
  lexicon: HALOT
  rationale: «Obra» comunica una realización concreta y permite distinguir este primer cola de פועל en el segundo, sin perder el campo semántico de la acción humana.
- source_word: דבר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un asunto
  - una cosa
  - un dicho
  lexicon: HALOT
  rationale: Dado que דבר puede significar «palabra» o «cosa/asunto», aquí «una palabra» sigue la antítesis con «pensamiento» y mantiene la estructura proverbial del hebreo.
- source_word: פועל
  english_pob_choice: work
  chosen_spanish: labor
  alternatives_spanish:
  - obra
  - trabajo
  - actividad
  lexicon: HALOT
  rationale: «Labor» preserva la noción de trabajo o actividad realizada y evita confundirlo con מעשה, que ya se tradujo con otro término cercano.
- source_word: מחשבת
  english_pob_choice: thought
  chosen_spanish: un pensamiento
  alternatives_spanish:
  - un plan
  - una intención
  - una reflexión
  lexicon: HALOT
  rationale: מחשבת puede abarcar pensamiento, intención o plan. «Un pensamiento» refleja de manera amplia y clara la base cognitiva del proverbio, sin estrecharlo indebidamente a «plan».
theological_decisions:
- issue: Prioridad del hebreo frente al testimonio griego divergente
  english_pob_reading: Translate the Hebrew as the primary witness, while noting the Greek preserves a substantially different sentence.
  chosen_spanish_reading: Traducir el hebreo como testimonio principal y conservar en nota que el griego transmite una sentencia distinta.
  alternative_spanish_readings:
  - 'Ajustar el texto principal al griego: «Hay uno que es sabio para su propia alma…»'
  - Harmonizar hebreo y griego en una sola formulación
  rationale: En Sirácida, cuando el hebreo está preservado, se le da primacía como fuente principal. Aquí el griego no es una simple variante verbal, sino otra sentencia; por eso se mantiene la traducción del hebreo y se documenta la divergencia en nota para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo cuando se conserva; usar el paralelo griego como control real sin desplazar la prioridad hebrea.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en la que se añadió el artículo indefinido implícito en inglés («a thought»), reflejándolo en español con «un pensamiento» para preservar la paralelía y la naturalidad.
  spanish_consistency_notes:
  - Se mantiene la primacía del hebreo sobre el griego divergente, en línea con el control textual indicado.
  - Se evita «SEÑOR» u այլ masking porque no aparece el Tetragrámaton en este versículo.
  - «Obra / labor» conserva la distinción semántica entre מעשה y פועל, tal como el audit trail distingue «deed / work».
  - La puntuación y el paralelismo reproducen el tono sapiencial breve y sentencioso del original.
