translation:
  language: es
  text: Un río[a]—sus corrientes alegran la ciudad de Dios, las santas moradas[b] del Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay un río cuyas corrientes alegran la ciudad de Dios». El hebreo abre con un sustantivo sin verbo; el español puede suplir «hay» para suavizar el inicio poético.'
    reason: alternative_reading
  - marker: b
    text: Hebreo «moradas» en plural; algunas versiones lo vierten de forma más idiomática en singular como «morada» o «santuario».
    reason: alternative_reading
lexical_decisions:
- source_word: נָהָר
  english_pob_choice: A river
  chosen_spanish: Un río
  alternatives_spanish:
  - Hay un río
  - El río
  lexicon: HALOT
  rationale: El hebreo abre con un sustantivo sin artículo; el español puede reproducir bien esa indefinición con «Un río», manteniendo el arranque poético y sin añadir una cláusula explicativa innecesaria.
- source_word: פְּלָגָיו
  english_pob_choice: its streams
  chosen_spanish: sus corrientes
  alternatives_spanish:
  - sus riachuelos
  - sus canales
  lexicon: HALOT
  rationale: El término alude a las subdivisiones o ramales del río. «Corrientes» conserva la imagen fluvial con naturalidad en español y evita un tecnicismo demasiado seco.
- source_word: יְשַׂמְּחוּ
  english_pob_choice: make glad
  chosen_spanish: alegran
  alternatives_spanish:
  - hacen feliz
  - regocijan
  lexicon: HALOT
  rationale: 'El verbo piel tiene fuerza causativa: las corrientes producen alegría. «Alegran» expresa esa causalidad de forma breve y poética en español.'
- source_word: עִיר אֱלֹהִים
  english_pob_choice: the city of God
  chosen_spanish: la ciudad de Dios
  alternatives_spanish:
  - la ciudad de Dios
  lexicon: HALOT
  rationale: La construcción en estado constructo se refleja de modo directo con la forma tradicional y transparente «la ciudad de Dios».
- source_word: קְדֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - santa
  - sagrado
  lexicon: HALOT
  rationale: Aquí funciona como descripción del lugar que sigue. «Santo» mantiene el valor cualitativo y la solemnidad del texto.
- source_word: מִשְׁכְּנֵי
  english_pob_choice: dwelling place
  chosen_spanish: lugar de moradas
  alternatives_spanish:
  - moradas
  - morada
  lexicon: HALOT
  rationale: El hebreo es plural constructo. Para conservar algo de esa pluralidad sin perder naturalidad, «lugar de moradas» comunica el sentido colectivo y evita borrar la forma plural por completo.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Exaltado
  lexicon: HALOT
  rationale: Es un título divino fijo; «Altísimo» es la equivalencia española más estable y reverente, y «del» refleja la relación atributiva del hebreo.
theological_decisions:
- issue: Si suavizar el plural מִשְׁכְּנֵי en una forma singular idiomática o conservar una huella del plural
  english_pob_reading: Retain the plural sense, while English revision moved toward the collective singular 'dwelling place' for naturalness.
  chosen_spanish_reading: Conservar una huella del plural con «lugar de moradas», sin reducirlo sin más a un singular liso.
  alternative_spanish_readings:
  - santuario
  - morada
  - lugar de morada
  rationale: El hebreo conserva una forma plural; en español, una solución totalmente singularizaría demasiado el dato formal. «Lugar de moradas» permite inteligibilidad y transparencia textual a la vez.
  doctrine_reference: Principio de primacía del texto fuente y preservación de tensiones léxicas documentadas.
translation_notes:
  revision_awareness: La revisión inglesa reciente tendió a singularizar 'dwelling place' para naturalidad colectiva; aquí se optó por mantener visible la pluralidad del hebreo mediante «lugar de moradas», sin perder fluidez en español. También se evitó trasladar mecánicamente la solución inglesa más reciente cuando ésta atenuaba un rasgo formal importante del original.
  spanish_consistency_notes:
  - Se mantiene «Dios» y el título «Altísimo» conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el verso no contiene el tetragrámaton.
  - Se conserva un registro bíblico digno pero contemporáneo, sin arcaísmos innecesarios.
