review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia ritual y la mayoría de los referentes: sacerdote, espaldilla/porción del carnero, panes sin levadura, palmas del nazareo y la acción de colocar los elementos. Sin embargo, falla de manera importante al final del versículo: אַחַר הִתְגַּלְּחוֹ אֶת נִזְרוֹ no debe quedar como «después de que haya raspado su consagración». El hebreo condensado se refiere al rapado de la cabeza/cabello que llevaba la consagración nazarea, no a ‘raspar la consagración’ en abstracto.'
  spanish_quality_summary: El español es generalmente legible, pero «galleta» suena demasiado doméstico/moderno para רְקִיק en contexto ritual, y «raspado su consagración» es poco natural y semánticamente confuso. «Canasta» es comprensible, aunque «cesta» o «canastillo» sería algo más bíblico-neutral; no es un error. La oración mejora claramente con una formulación directa y natural del rapado de la cabeza consagrada.
  glossary_alignment: '«Nazareo» está bien y respeta la terminología del proyecto. No aparecen términos sensibles como Yahvé/Mesías. La decisión principal que debe alinearse con la auditoría inglesa es נִזְרוֹ: el inglés documenta explícitamente «his consecrated head» en texto principal, con la literalidad en nota. El español debe reflejar ese mismo criterio, no revertir a la abstracción principal «su consagración».'
  issues:
  - severity: high
    issue: «después de que haya raspado su consagración» no representa fielmente el sentido contextual de אַחַר הִתְגַּלְּחוֹ אֶת נִזְרוֹ
    rationale: El verbo es ‘afeitar/rapar’, y נִזְרוֹ aquí funciona metonímicamente para la cabeza/cabello consagrado del nazareo. En español, ‘raspar su consagración’ resulta oscuro y equivocado.
  - severity: medium
    issue: La elección principal «su consagración» contradice la decisión documentada del POB inglés
    rationale: La auditoría inglesa opta por expresar el referente encarnado (‘his consecrated head’) y reservar la literalidad para nota. El español debería mantener esa misma estrategia exegética.
  - severity: low
    issue: «galleta sin levadura» es posible pero poco adecuada en registro ritual
    rationale: Para רְקִיק, «oblea» o «torta delgada» conserva mejor la delgadez y el contexto cultual; «galleta» suena coloquial y puede sugerir un producto moderno.
  revised_spanish_text: Entonces el sacerdote tomará la espaldilla cocida del carnero, una torta sin levadura de la canasta y una oblea sin levadura, y las pondrá sobre las palmas del nazareo[a], después de que se haya rapado la cabeza consagrada.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «después de haber rapado su consagración». En contexto, esto se refiere al cabello o la cabeza que llevaba la señal de su consagración nazarea.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el tramo final para reflejar el sentido contextual documentado del hebreo: no una abstracción (‘su consagración’) como objeto directo de ‘raspar’, sino la cabeza/cabello consagrado que se rapa al concluir el voto. También se sustituye «galleta» por «oblea» para un registro ritual más natural y preciso.'
