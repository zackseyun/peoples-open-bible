translation:
  language: es
  text: Honra al médico según la necesidad que tengas de él[a], porque también Dios le ha dado una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo el griego: «Honra al médico por sus servicios, porque también el Señor lo creó». El hebreo dice más literalmente: «porque con él también hay una porción de parte de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: רעי / Τίμα
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Respeta
  - Estima
  - Trata con honor
  lexicon: HALOT; Swete LXX
  rationale: El imperativo hebreo y el paralelo griego coinciden en la idea de dar honor. «Honra» conserva ese valor formal y suena natural en español bíblico actual.
- source_word: רופא
  english_pob_choice: the physician
  chosen_spanish: al médico
  alternatives_spanish:
  - al doctor
  - al sanador
  - al facultativo
  lexicon: HALOT
  rationale: «Médico» comunica con claridad el oficio curativo y mantiene el registro sobrio de la literatura sapiencial. «Doctor» es menos preciso en español bíblico por su posible ambigüedad moderna.
- source_word: לפני צרכו
  english_pob_choice: according to your need of him
  chosen_spanish: según tu necesidad de él
  alternatives_spanish:
  - cuando lo necesites
  - según tu necesidad de él
  - por su servicio necesario
  lexicon: HALOT
  rationale: La frase hebrea es condensada y remite a la necesidad concreta. «Según tu necesidad de él» reproduce esa relación sin desplazar el sentido hacia honorarios o servicios, aunque el griego sí amplía la idea a las necesidades/servicios.
- source_word: כי עם אותו
  english_pob_choice: for God has also given him a portion
  chosen_spanish: porque también Dios le ha dado
  alternatives_spanish:
  - porque también Dios le ha asignado
  - pues también Dios le ha concedido
  - porque también Dios le ha repartido
  lexicon: HALOT
  rationale: La construcción hebrea es breve y apunta a una provisión/participación dada por Dios. «Le ha dado» refleja bien la revisión inglesa más reciente y permite enlazar con la frase siguiente.
- source_word: חלק אל
  english_pob_choice: a portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una parte
  - una participación
  - un lote
  lexicon: HALOT
  rationale: «Porción» es el equivalente más natural en español para חלק en este contexto de reparto o participación asignada. Mantiene la idea de algo dado por Dios sin sobreexplicar el término.
theological_decisions:
- issue: Tensión entre el hebreo («una porción») y el griego («el Señor también lo creó»).
  english_pob_reading: 'for God has also given him a portion; footnote notes the Greek: ''for the Lord also created him.'''
  chosen_spanish_reading: porque también Dios le ha dado una porción
  alternative_spanish_readings:
  - porque también el Señor lo creó
  - porque también el Señor lo ha creado
  - porque también Dios lo creó
  rationale: La redacción principal sigue el hebreo conservado, que habla de una porción dada por Dios. La nota preserva la alternativa griega, donde la motivación teológica se expresa como creación por el Señor. Así no se borra la tensión documental entre testigos.
  doctrine_reference: Primacía de la evidencia original y conservación transparente de variantes significativas.
translation_notes:
  revision_awareness: 'La versión española refleja la revisión inglesa más reciente en dos puntos clave: usa «según tu necesidad de él» para לפני צרכו, y «una porción» para חלק. También preserva en nota la lectura griega alternativa sobre la creación por el Señor.'
  spanish_consistency_notes:
  - Se mantiene «Dios» en el cuerpo principal conforme al hebreo, y «Señor» solo en la nota al citar la alternativa griega.
  - «Médico» se usa de manera consistente para רופא, en vez de «doctor», por el registro sapiencial y la claridad moderna.
  - «Porción» conserva el valor semántico de חלק sin introducir terminología eclesiástica ajena al contexto.
