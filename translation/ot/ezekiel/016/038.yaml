id: EZK.16.38
reference: Ezekiel 16:38
source:
  edition: WLC
  text: וּ/שְׁפַטְתִּי/ךְ֙ מִשְׁפְּטֵ֣י נֹאֲפ֔וֹת וְ/שֹׁפְכֹ֖ת דָּ֑ם וּ/נְתַתִּ֕י/ךְ דַּ֥ם חֵמָ֖ה וְ/קִנְאָֽה׃
translation:
  text: And I will judge you with the judgments of women who commit adultery and who shed blood[b][a], and I will give you over to blood in wrath and jealousy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'adulteresses.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blood in wrath and jealousy,' likely meaning a bloody punishment or bloodshed inflicted in wrath and jealousy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁפַטְתִּיךְ
  chosen: And I will judge you
  alternatives:
  - And I will sentence you
  lexicon: HALOT
  rationale: שׁפט in this context denotes judicial action by God against Jerusalem. 'Judge' preserves the verbal link with the following noun מִשְׁפְּטֵי and avoids over-specifying the outcome as only sentencing.
- source_word: מִשְׁפְּטֵי
  chosen: with the judgments of
  alternatives:
  - according to the judgments of
  - as
  lexicon: HALOT
  rationale: The construct plural indicates the manner or standard of judgment. 'With the judgments of' is slightly formal but preserves the Hebrew idiom and the legal force.
- source_word: נֹאֲפוֹת
  chosen: women who commit adultery
  alternatives:
  - adulteresses
  lexicon: HALOT
  rationale: The feminine plural participle refers to adulterous women. 'Women who commit adultery' is clearer modern English than 'adulteresses' while preserving the gendered imagery of the allegory.
- source_word: וְשֹׁפְכֹת דָּם
  chosen: and who shed blood
  alternatives:
  - and bloodshedding women
  - and who pour out blood
  lexicon: HALOT
  rationale: The participial phrase parallels נֹאֲפוֹת and describes women guilty of bloodshed. 'Shed blood' is the standard idiom in English for unlawful killing and preserves the gravity of דם.
- source_word: וּנְתַתִּיךְ
  chosen: and I will give you over
  alternatives:
  - and I will make you
  - and I will hand you over
  lexicon: HALOT
  rationale: נתן plus the following object-complement construction conveys handing someone over to a condition or fate. 'Give you over' is idiomatic and preserves divine judicial agency.
- source_word: דַּם
  chosen: to blood
  alternatives:
  - bloodshed
  - a bloody death
  lexicon: HALOT
  rationale: Here דם likely denotes a blood-penalty or bloody fate corresponding to the crimes named earlier. 'To blood' keeps the compact Hebrew expression, while the sense is clarified by the surrounding phrase.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - rage
  - fury
  lexicon: HALOT
  rationale: חֵמָה denotes burning anger. 'Wrath' fits prophetic judgment language and pairs naturally with 'jealousy' in English.
- source_word: וְקִנְאָה
  chosen: and jealousy
  alternatives:
  - and zeal
  lexicon: HALOT
  rationale: In covenantal context קִנְאָה refers to God's jealous indignation over unfaithfulness. 'Jealousy' is the most direct rendering; 'zeal' is possible but weaker for the marital metaphor in this chapter.
