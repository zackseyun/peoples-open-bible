translation:
  language: es
  text: 'Estos eran los jefes de sus casas paternas: Efer[a], Ishi, Eliel, Azriel, Jeremías, Hodavía y Yahdiel, hombres poderosos y valientes, hombres de renombre[b], jefes de sus casas paternas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jefes de sus casas ancestrales». La expresión hebrea se refiere a unidades familiares de clan bajo un antepasado común.
    reason: cultural_note
  - marker: b
    text: 'Hebreo: «hombres de nombres», es decir, hombres de renombre o distinción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Y estos eran
  - Ahora bien, estos eran
  lexicon: HALOT
  rationale: En una lista genealógica, el deíctico se conserva con naturalidad en español mediante «Estos eran», sin forzar un calco del valor conjuntivo inicial.
- source_word: רָאשֵׁי בֵית אֲבוֹתָם
  english_pob_choice: the heads of their fathers’ houses
  chosen_spanish: los jefes de sus casas paternas
  alternatives_spanish:
  - los cabezas de sus casas paternas
  - los jefes de sus casas ancestrales
  - los principales de sus familias
  lexicon: HALOT
  rationale: «Casa paterna» conserva la unidad social/clánica del hebreo. «Jefes» comunica el sentido de liderazgo mejor que una glosa más literal pero menos idiomática.
- source_word: עֵפֶר
  english_pob_choice: Epher
  chosen_spanish: Efer
  alternatives_spanish:
  - Epher
  lexicon: transliteración convencional al español
  rationale: Se adapta la transliteración al patrón gráfico usual del español bíblico, manteniendo la consonancia con el hebreo sin imponer una forma inglesa innecesaria.
- source_word: יִשְׁעִי
  english_pob_choice: Ishi
  chosen_spanish: Isi
  alternatives_spanish:
  - Ishi
  lexicon: transliteración convencional al español
  rationale: Se usa una forma española breve y legible del nombre, conservando el valor propio sin introducir pronunciación inglesa.
- source_word: אֱלִיאֵל
  english_pob_choice: Eliel
  chosen_spanish: Eliel
  lexicon: transliteración convencional
  rationale: La forma ya es transparente y estable en español bíblico.
- source_word: עַזְרִיאֵל
  english_pob_choice: Azriel
  chosen_spanish: Azriel
  alternatives_spanish:
  - Azareel
  lexicon: transliteración convencional
  rationale: Se mantiene la forma breve y reconocible que refleja bien el hebreo y es inteligible en español.
- source_word: יִרְמְיָה
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremía
  lexicon: transliteración bíblica tradicional
  rationale: En español bíblico la forma asentada y reconocible es «Jeremías»; comunica el nombre propio de modo natural sin perder referencia.
- source_word: הוֹדַוְיָה
  english_pob_choice: Hodaviah
  chosen_spanish: Hodavías
  alternatives_spanish:
  - Hodavía
  - Hodaviah
  lexicon: transliteración convencional al español
  rationale: Se hispaniza la terminación para mayor fluidez lectora, preservando la identidad del nombre.
- source_word: יַחְדִּיאֵל
  english_pob_choice: Jahdiel
  chosen_spanish: Jahdiel
  alternatives_spanish:
  - Yajdiel
  - Yachdiel
  lexicon: transliteración convencional
  rationale: Se conserva la forma inglesa/auditada más reconocible, dado que ya representa de modo estándar el nombre propio.
- source_word: אֲנָשִׁים גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - hombres esforzados
  - guerreros valientes
  lexicon: HALOT
  rationale: La expresión hebrea denota hombres de fuerza probada y valor; en español «hombres valientes» comunica el núcleo semántico sin sonar redundante o arcaizante. Se evita expandir a «guerreros» porque el hebreo no exige explícitamente un oficio militar en esta frase.
- source_word: אַנְשֵׁי שֵׁמוֹת
  english_pob_choice: men of renown
  chosen_spanish: hombres de renombre
  alternatives_spanish:
  - hombres de nombre
  - hombres famosos
  - hombres distinguidos
  lexicon: HALOT
  rationale: «Hombres de renombre» conserva el valor idiomático honorífico del hebreo «hombres de nombres», con buena naturalidad en español y sin perder la idea de reputación.
- source_word: רָאשִׁים לְבֵית אֲבוֹתָם
  english_pob_choice: heads of their fathers’ houses
  chosen_spanish: jefes de sus casas paternas
  alternatives_spanish:
  - cabezas de sus casas paternas
  - principales de sus casas paternas
  lexicon: HALOT
  rationale: Se repite la idea final como en el hebreo, manteniendo la estructura inclusiva del verso y la referencia a la organización clánica.
theological_decisions:
- issue: Repetición de la estructura clánica («casas paternas» / «jefes» al inicio y al final)
  english_pob_reading: The Hebrew intentionally restates their status within the clan structure.
  chosen_spanish_reading: El verso repite intencionalmente su condición de jefes de linaje/clan, y la traducción lo conserva.
  alternative_spanish_readings:
  - Se podrían simplificar las repeticiones para evitar redundancia.
  - Se podría traducir solo una vez la expresión de jefatura.
  rationale: La reiteración es parte del énfasis hebreo y ayuda a mostrar que el texto está clasificando a estos hombres dentro de la estructura familiar tribal. Suprimirla suavizaría indebidamente el patrón del original.
  doctrine_reference: No aplica; decisión literaria y socio-histórica.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios de contenido sustancial: se mantuvo la doble referencia a la jefatura de la casa paterna, se preservó el valor idiomático de «hombres de valor/renombre» y se adaptaron los nombres propios a formas españolas legibles y consistentes. No se detectaron revisiones textuales adicionales en el pasaje auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - «Casa paterna» se emplea de forma consistente para בֵית אֲבוֹתָם.
  - Se evita «SEÑOR» u otros sustitutos teológicos no presentes en el versículo.
  - La lista de nombres se mantiene en transliteración hispanizada breve y coherente con el uso bíblico en español.
