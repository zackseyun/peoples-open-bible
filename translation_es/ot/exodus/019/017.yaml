revisions:
- from: Entonces Moisés sacó al pueblo del campamento para encontrarse con Dios[a], y se detuvieron al pie del monte.
  to: Entonces Moisés sacó al pueblo del campamento al encuentro de Dios, y ellos se colocaron al pie del monte.[a]
  rationale: Se ajusta «para encontrarse con» a «al encuentro de» para reflejar mejor לִקְרַאת en contexto de movimiento. Se cambia «se detuvieron» por «se colocaron» para conservar el matiz deliberado de וַיִּתְיַצְּבוּ. Se corrige la nota alternativa a un español natural y gramatical.
