translation:
  language: es
  text: Damasco ha quedado debilitada[a]; se ha vuelto para huir, y el temblor se ha apoderado de ella[b]. La angustia y los dolores de parto la han tomado[c], como una mujer que da a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha quedado débil» / «ha desfallecido» para «ha quedado debilitada». El hebreo puede expresar debilitamiento o pérdida de ánimo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el terror se ha apoderado de ella» para «el temblor se ha apoderado de ella». El sustantivo denota más literalmente temblor o estremecimiento, probablemente por miedo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «punzadas» / «dolores de parto» para «dolores de parto». El contexto del alumbramiento en la frase siguiente apoya el sentido obstétrico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָפְתָה
  english_pob_choice: has become feeble
  chosen_spanish: ha quedado debilitada
  alternatives_spanish:
  - ha quedado débil
  - se ha debilitado
  - ha desfallecido
  lexicon: HALOT
  rationale: רפה puede expresar debilitamiento físico o pérdida de ánimo. «Ha quedado debilitada» conserva la idea de debilitamiento sin forzar un matiz exclusivamente emocional ni sonar demasiado literal en español.
- source_word: דַמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: N/A (nombre propio)
  rationale: Se mantiene el topónimo estándar en español para la ciudad.
- source_word: הִפְנְתָה לָנוּס
  english_pob_choice: has turned to flee
  chosen_spanish: se ha vuelto para huir
  alternatives_spanish:
  - se ha vuelto para correr
  - se ha vuelto para escapar
  - ha girado para huir
  lexicon: HALOT
  rationale: El hebreo combina «volver/dirigir» con el infinitivo de huir. «Se ha vuelto para huir» refleja con naturalidad el giro hacia la fuga y evita una paráfrasis excesiva.
- source_word: וְרֶטֶט
  english_pob_choice: and trembling
  chosen_spanish: el temblor
  alternatives_spanish:
  - el temblor
  - el estremecimiento
  - el terror
  lexicon: HALOT
  rationale: רטט denota temblor o sacudida, a menudo por miedo. «El temblor» conserva el movimiento corporal del término; se evita «terror» en el texto principal porque introduce una interpretación más que el sustantivo mismo.
- source_word: הֶחֱזִיקָה
  english_pob_choice: has seized
  chosen_spanish: se ha apoderado de ella
  alternatives_spanish:
  - la ha tomado
  - la ha sujetado
  - la ha agarrado
  lexicon: HALOT
  rationale: חזק en causativo expresa tomar o aferrar con fuerza. «Se ha apoderado de ella» comunica bien la fuerza invasiva del sujeto sin perder la personificación.
- source_word: צָרָה
  english_pob_choice: Distress
  chosen_spanish: La angustia
  alternatives_spanish:
  - La angustia
  - La aflicción
  - La tribulación
  lexicon: HALOT
  rationale: צָרָה abarca angustia, aflicción o calamidad. «Angustia» mantiene un registro natural en español y funciona bien en paralelo con «dolores de parto».
- source_word: וַחֲבָלִים
  english_pob_choice: and labor pains
  chosen_spanish: y los dolores de parto
  alternatives_spanish:
  - y los dolores de parto
  - y los sufrimientos del parto
  - y los dolores
  lexicon: HALOT
  rationale: Dado el simile final con la mujer que da a luz, «dolores de parto» expresa con claridad el sentido obstétrico de חבלים.
- source_word: אֲחָזַתָּה
  english_pob_choice: have taken hold of her
  chosen_spanish: la han tomado
  alternatives_spanish:
  - la han tomado
  - la han aferrado
  - la han sujetado
  lexicon: HALOT
  rationale: אחז significa asir, tomar o apoderarse. «La han tomado» conserva la fuerza verbal y enlaza con el paralelismo del versículo.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: like a woman giving birth
  chosen_spanish: como a una mujer que da a luz
  alternatives_spanish:
  - como a una mujer que da a luz
  - como a una mujer en parto
  - como a una parturienta
  lexicon: HALOT
  rationale: El participio señala a una mujer en el acto de dar a luz. La forma elegida es clara y digna en español contemporáneo.
translation_notes:
  revision_awareness: Alta concordancia con el audit trail inglés; no se registran revisiones aplicadas y el último pase confirmó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se conserva «Damasco» como topónimo estándar en español.
  - Se evita sustituir el campo semántico de temblor por «terror» en el texto principal, pero se documenta como alternativa.
  - Se mantiene el paralelismo entre debilitamiento, fuga, temblor y dolores de parto sin añadir elementos interpretativos.
  - El registro es moderno y digno, apto para lectura eclesial amplia.
