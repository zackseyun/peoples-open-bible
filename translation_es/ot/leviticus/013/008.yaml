    reason: lexical_alternative
  revision_rationale: Se suavizó una literalidad poco natural ('y he aquí, si') para un español más claro y fiel al uso procedimental del hebreo en contexto diagnóstico. Se mantuvo 'lepra' por conformidad con la decisión final del expediente inglés y se conservó la nota aclaratoria para evitar un anacronismo médico. También se ajustó 'sobre la piel' a 'en la piel' por mejor idiomaticidad.
