    rationale: A diferencia del inglés 'O Yahweh', el español puede invocar naturalmente con 'Yahvé' sin 'oh', conservando solemnidad y mejor fluidez.
  revised_spanish_text: En ti, Yahvé, he tomado refugio; que nunca sea avergonzado. En tu rectitud[a], líbrame.
