translation:
  language: es
  text: Todo esto nos ha venido, y sin embargo no te hemos olvidado, ni hemos sido infieles a tu pacto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hemos obrado falsamente con tu pacto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל זֹאת
  english_pob_choice: All this
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Todas estas cosas
  lexicon: HALOT
  rationale: La expresión colectiva resume las aflicciones mencionadas antes. «Todo esto» conserva la amplitud de כָּל y su referencia resumida al conjunto de lo ocurrido, con una formulación natural en español.
- source_word: בָּאַתְנוּ
  english_pob_choice: has come upon us
  chosen_spanish: nos ha venido
  alternatives_spanish:
  - ha venido sobre nosotros
  - nos ha sobrevenido
  - nos ha acontecido
  lexicon: HALOT
  rationale: El verbo de llegada/concurrencia se expresa de manera natural como algo que «ha venido» sobre el pueblo. «Nos ha venido» mantiene el matiz de algo que irrumpe sobre nosotros y conserva bien el valor perfecto del hebreo.
- source_word: וְלֹא
  english_pob_choice: yet ... not
  chosen_spanish: y no
  alternatives_spanish:
  - sin embargo, no
  - pero no
  - y sin embargo no
  lexicon: HALOT
  rationale: 'En español, la oposición se entiende bien por el encadenamiento del verso: sufrimiento, pero fidelidad. No se necesita un conector fuertemente adversativo para mantener la tensión del original; «y no» conserva la simple coordinación del hebreo.'
- source_word: שְׁכַחֲנוּךָ
  english_pob_choice: we have not forgotten you
  chosen_spanish: te hemos olvidado
  alternatives_spanish:
  - te hemos echado en olvido
  - te hemos dejado de recordar
  lexicon: HALOT
  rationale: El verbo estándar en español para שׁכח es «olvidar». El sufijo de segunda persona singular se expresa con «te». Mantener la negación preserva la afirmación de lealtad relacional al Dios al que se habla.
- source_word: שִׁקַּרְנוּ
  english_pob_choice: we have not been false
  chosen_spanish: hemos sido falsos
  alternatives_spanish:
  - hemos obrado con falsedad
  - hemos tratado engañosamente
  - hemos mentido
  lexicon: HALOT
  rationale: שקר en este contexto no se limita a «mentir» en sentido verbal, sino a actuar falsamente. «Hemos sido falsos» reproduce esa amplitud y conserva el lenguaje breve y forense del hebreo.
- source_word: בִּבְרִיתֶךָ
  english_pob_choice: to your covenant
  chosen_spanish: con tu pacto
  alternatives_spanish:
  - para con tu pacto
  - respecto de tu pacto
  - en tu pacto
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede marcar la esfera de la falsedad, en español la frase más natural para expresar infidelidad de alianza es «con tu pacto». Se preserva el término «pacto» por fidelidad al marco bíblico del hebreo y para evitar suavizar la relación de compromiso.
theological_decisions:
- issue: La afirmación de fidelidad no debe convertirse en una pretensión de inocencia absoluta
  english_pob_reading: The verse is rendered as a protest of continued covenant fidelity without expanding it into a claim of absolute sinlessness.
  chosen_spanish_reading: El verso se presenta como una protesta de fidelidad continuada al pacto, sin convertirla en una afirmación de inocencia total.
  alternative_spanish_readings:
  - No hemos pecado en absoluto
  - somos completamente inocentes delante de Dios
  rationale: El hebreo niega haber olvidado a Dios y haber obrado falsamente con su pacto; no dice que Israel carezca de pecado en sentido absoluto. La redacción española conserva esa tensión teológica sin ampliarla indebidamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Coincide con el tramo auditado en inglés: el sentido global, la referencia colectiva de «todo esto», el perfecto de llegada, y la negación de olvido/infidelidad al pacto no requieren revisión sustantiva respecto del análisis previo. Se mantiene la misma lectura teológica básica: protesta de fidelidad, no declaración de impecabilidad.'
  spanish_consistency_notes:
  - Se conserva «pacto» como equivalente de בְּרִית, conforme al uso bíblico habitual y al contexto de alianza.
  - Se usa la segunda persona singular («te», «tu») para reflejar el sufijo hebreo -ךָ.
  - La nota al pie se limita a una alternativa lexical de בָּאַתְנוּ; no introduce una variación doctrinal.
  - La coordinación sencilla «y no» refleja el hebreo sin sobrerrepresentar la adversatividad, que ya queda clara por el contexto.
