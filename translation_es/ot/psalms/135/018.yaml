translation:
  language: es
  text: Quienes los hacen llegarán a ser como ellos[a], todos los que confían en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán como ellos». El verbo hebreo puede traducirse como «serán» o «llegarán a ser»; aquí se expresa en el texto principal el sentido resultativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹ/הֶם
  english_pob_choice: like them
  chosen_spanish: como ellos
  alternatives_spanish:
  - igual que ellos
  - semejantes a ellos
  lexicon: HALOT
  rationale: La comparación directa del hebreo se expresa con naturalidad en español como 'como ellos', manteniendo la semejanza sin añadir explicación.
- source_word: יִהְי֣וּ
  english_pob_choice: will become
  chosen_spanish: serán
  alternatives_spanish:
  - llegarán a ser
  - se volverán
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por un matiz resultativo ('will become'), en español 'serán' comunica de manera natural el efecto descrito por el hebreo, sin forzar una perífrasis. La noción de resultado queda implícita en el contexto poético.
- source_word: עֹשֵׂי/הֶ֑ם
  english_pob_choice: those who make them
  chosen_spanish: los que los hacen
  alternatives_spanish:
  - los que los fabrican
  - sus hacedores
  lexicon: HALOT
  rationale: El participio agente de עשה con sufijo se rinde de forma clara y directa. 'Hacen' evita tecnicismos y conserva la referencia a los ídolos ya mencionados.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: everyone who
  chosen_spanish: todos los que
  alternatives_spanish:
  - todo el que
  - todos quienes
  lexicon: HALOT
  rationale: La construcción universal del hebreo se expresa de manera idiomática y amplia con 'todos los que'.
- source_word: בֹּטֵחַ
  english_pob_choice: trusts
  chosen_spanish: confían
  alternatives_spanish:
  - se apoyan
  - ponen su confianza
  lexicon: HALOT
  rationale: בטח denota confiar o apoyarse en algo. En plural, 'confían' mantiene el sentido de confianza depositada en los ídolos.
- source_word: בָּ/הֶם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - sobre ellos
  lexicon: HALOT
  rationale: Con בטח, el complemento natural en español es 'en ellos', equivalente al inglés POB 'in them' y fiel al objeto de la confianza indebida.
theological_decisions:
- issue: El resultado de parecerse a los ídolos
  english_pob_reading: The verse states that idol-makers and idol-trusters come to resemble the idols they worship, without specifying the exact mechanism.
  chosen_spanish_reading: El versículo afirma la semejanza entre quienes hacen y confían en ídolos y los ídolos mismos, sin explicar el mecanismo exacto.
  alternative_spanish_readings:
  - se vuelven espiritualmente insensibles como ellos
  - se vuelven impotentes o sin vida como ellos
  rationale: El hebreo dice que serán 'como ellos' pero no define en qué consiste exactamente esa semejanza. La traducción conserva esa tensión teológica sin resolverla ni interpretarla de más.
  doctrine_reference: Preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: El antecedente inglés fue ajustado de una raya a una coma para suavizar el flujo; la versión española sigue esa misma estructura sintáctica continua sin pausa enfática adicional.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin calcos innecesarios.
  - '''Ídolos'' queda implícito por el contexto del salmo; el pronombre ''los'' en español remite naturalmente a ellos.'
  - Se evita 'SEÑOR' u otras sustituciones no motivadas, porque este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
