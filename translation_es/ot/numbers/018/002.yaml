base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/002.yaml
  text: And also bring near with you your brothers[a], the tribe of Levi, your father's tribe, so that they may be joined to you and serve you[b], while you and your sons with you are before the tent of the testimony.
  footnotes:
