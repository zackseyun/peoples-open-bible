translation:
  language: es
  text: los que rasguean sobre la boca del arpa[a], y como David idean[b] para sí instrumentos de canción—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sobre la boca del arpa»; la frase también puede significar «al sonido del arpa» o simplemente «con el arpa».
    reason: lexical_alternative
  - marker: b
    text: O «idean para sí instrumentos musicales», pues el verbo puede significar «idear» o «ingeniar» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפֹּרְטִים
  english_pob_choice: who strum
  chosen_spanish: los que rasguean
  alternatives_spanish:
  - los que puntean
  - los que tocan
  lexicon: HALOT
  rationale: El participio hebreo פרט se refiere a pulsar o tañer cuerdas. «Rasguean» comunica un acto musical natural en español sin perder el valor físico del verbo, y evita una paráfrasis excesiva.
- source_word: עַל פִּי הַנָּבֶל
  english_pob_choice: on the mouth of the harp
  chosen_spanish: sobre la boca del arpa[a]
  alternatives_spanish:
  - al sonido del arpa
  - con el arpa
  lexicon: HALOT
  rationale: Se conserva la expresión concreta «boca del arpa» porque el hebreo es literalmente «sobre la boca del nebel». «Arpa» sigue siendo la mejor equivalencia general, aunque el instrumento exacto no sea seguro.
- source_word: נָּבֶל
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - lira
  - laúd
  lexicon: HALOT
  rationale: נבל designa un instrumento de cuerda; la identificación exacta es incierta. «Arpa» es el equivalente español más claro y tradicional para este contexto, sin afirmar más precisión de la que da la fuente.
- source_word: כְּדָוִיד
  english_pob_choice: like David
  chosen_spanish: como David
  alternatives_spanish:
  - tal como David
  - igual que David
  lexicon: HALOT
  rationale: La partícula comparativa כ se rinde de manera directa con «como». Mantiene la brevedad y la comparación explícita con David.
- source_word: חָשְׁבוּ
  english_pob_choice: devise
  chosen_spanish: devisan[b]
  alternatives_spanish:
  - idean
  - conciben
  - maquinan
  lexicon: HALOT
  rationale: El verbo puede significar pensar, planear o idear; en este contexto, con «instrumentos de canción», expresa la idea de componer o idear. «Devisan» conserva la conexión con la lectura auditada de la POB inglesa y la tensión entre planear e inventar, aunque suene menos común en español.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - para sí mismos
  lexicon: HALOT
  rationale: La preposición con sufijo indica beneficio/posesión reflexiva. «Para sí» es breve, natural y mantiene el matiz de autoapropiación.
- source_word: כְּלֵי שִׁיר
  english_pob_choice: instruments of song
  chosen_spanish: instrumentos de canción
  alternatives_spanish:
  - instrumentos musicales
  - instrumentos para cantar
  lexicon: HALOT
  rationale: La construcción es literalmente «utensilios/instrumentos de canción». «Instrumentos de canción» sigue de cerca el hebreo y preserva la imagen sin convertirla automáticamente en una generalidad moderna.
theological_decisions:
- issue: Identificación de Yahvé en el trasfondo profético
  english_pob_reading: No explicit divine-name rendering is needed in this verse; the line is descriptive and not a direct divine speech formula.
  chosen_spanish_reading: No se introduce ninguna sustitución devocional ni se añade «Yahvé» en el versículo, porque el hebreo de esta línea no contiene el nombre divino.
  alternative_spanish_readings:
  - añadir Yahvé por contexto profético
  - usar el Señor
  rationale: La política del proyecto es traducir Yahvé cuando aparece יהוה. Aquí no aparece, así que no corresponde insertarlo. Tampoco se debe ocultar el texto con una convención de mayúsculas que no está en la base hebrea.
  doctrine_reference: Principio de transparencia textual del POB; fidelidad al lema divino solo cuando está presente en el original.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió ‘invent’ por ‘devise’ por ser más natural y formalmente apropiado para חָשְׁבוּ. La versión española refleja esa decisión con un verbo que preserve la noción de ideación/planificación sin perder la tensión semántica.
  spanish_consistency_notes:
  - Se conservó el orden y la concisión del hebreo con un español publicable.
  - Se mantuvo la metáfora concreta «boca del arpa» con nota, en línea con el audit trail.
  - Se evitó sustituir el lenguaje instrumental por una paráfrasis demasiado amplia.
  - La elección de «devisan» busca corresponder al valor de חָשְׁבוּ según la POB inglesa revisada, aun si el uso español resulta algo literario.
