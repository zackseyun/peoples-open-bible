  yaml_path: translation/ot/2_chronicles/025/013.yaml
  text: But the men of the troop whom Amaziah had sent back from going with him to battle raided the cities of Judah[a], from Samaria to Beth-horon[b], and struck down three thousand of them and took much plunder.
  footnotes:
