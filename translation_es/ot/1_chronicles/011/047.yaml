- source_word: הַמְּצֹבָיָה
  english_pob_choice: the Mezobaite
  chosen_spanish: el mezobaíta
  alternatives_spanish:
  - el mezobaita
  - el mitzobaíta
  - el de Mezobá
  lexicon: HALOT
  rationale: El hebreo es una designación gentilicia con artículo, probablemente indicando procedencia de un lugar o clan llamado Mezobá/Mezobah; en español se conserva la función gentilicia con una forma transparente y se mantiene la incertidumbre del topónimo subyacente mediante transliteración aproximada.
translation_notes:
  revision_awareness: El texto inglés POB mantiene un tratamiento estable del nombre propio y de la designación gentilicia, sin revisiones sustantivas; el punto delicado sigue siendo la incertidumbre del topónimo subyacente en הַמְּצֹבָיָה, que se conserva en español mediante una transliteración gentilicia y nota explicativa.
  spanish_consistency_notes:
  - Se mantiene el patrón POB de transliterar nombres propios del hebreo.
  - Se evita traducir la designación gentilicia con una paráfrasis interpretativa que borre la incertidumbre del lugar o clan de origen.
  - La conjunción hebrea se integra de manera idiomática en español para una lista breve de nombres.
  - Se usa minúscula en ‘mezobaíta’ por tratarse de un gentilicio común en español, no de un nombre propio independiente.
