  rationale: For Sirach, surviving Hebrew is primary where extant, but the prompt explicitly requires the Greek parallel to be used as actual translation input. Since the Hebrew here is brief and the Greek supplies a likely original or early explanatory expansion naming Dathan, Abiram, and Korah, the English combines them transparently rather than ignoring either witness. A footnote preserves the shorter Hebrew-only form.
