translation:
  text: 'His disciples questioned him and said to him[1], "Do you want us to fast?
    And how shall we pray? Shall we give alms? And what shall we observe concerning
    eating?"


    Jesus said, "Do not lie, and what you hate, do not do. For all things are revealed
    before heaven. For there is nothing hidden that will not be revealed[2], and nothing
    covered that will remain without being uncovered."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:40:04Z'
  footnotes:
  - marker: '1'
    text: The Greek fragment P.Oxy. 654 reads "before truth" (ἐνώπιον τῆς ἀληθείας)
      instead of "before heaven".
    reason: textual_variant
  - marker: '2'
    text: The Greek fragment P.Oxy. 654 reads "and nothing buried that will not be
      raised" (καὶ τεθαμμένον ὃ οὐκ ἐγερθήσεται) instead of "and nothing covered that
      will remain without being uncovered".
    reason: textual_variant
lexical_decisions:
- source_word: ⲣⲛⲏⲥⲧⲉⲩⲉ
  chosen: fast
  rationale: Greek loanword (νηστεύω) meaning to fast.
  lexicon: BDAG
- source_word: ⲉϣ ⲧⲉ ⲑⲉ
  chosen: how
  rationale: Literally 'what is the way', the standard Coptic idiom for 'how'.
  lexicon: Crum
  entry: 54b
- source_word: ϭⲓⲛⲟⲩⲱⲙ
  chosen: eating
  rationale: A compound noun meaning 'eating, food, diet'. Rendered 'concerning eating'
    to match the prepositional phrase ⲉ-ⲟⲩ ⲛ-.
  lexicon: Crum
  entry: 819a
- source_word: ϫⲉϭⲟⲗ
  chosen: lie
  rationale: Literally 'speak a lie'. Rendered simply as 'lie' for aphoristic punch.
  lexicon: Crum
  entry: 808b
- source_word: ⲙⲡⲉⲙⲧⲟ ⲉⲃⲟⲗ
  chosen: before
  rationale: Compound preposition meaning 'in the presence of, before'.
  lexicon: Crum
  entry: 192a
- source_word: ⲟⲩⲉϣⲛ
  chosen: without
  rationale: Privative prefix meaning 'without', here attached to the infinitive ϭⲟⲗⲡ
    ('uncover').
  lexicon: Crum
  entry: 501b
theological_decisions:
- issue: Divergence between Coptic 'covered' and Greek 'buried'
  chosen_reading: covered that will remain without being uncovered
  rationale: The Coptic text (ϩⲟⲃⲥ) clearly means 'covered', shifting the Greek fragment's
    eschatological/resurrection overtone ('buried/raised') into an epistemological/revelatory
    register ('covered/uncovered'). The translation strictly follows the Coptic while
    noting the Greek variant in the footnotes.
drafter_notes: The saying addresses traditional Jewish and early Christian piety (fasting,
  praying, almsgiving, dietary laws). Jesus's response bypasses specific regulations,
  offering a general ethical maxim ('do not lie, and what you hate, do not do') grounded
  in the inevitability of universal revelation. The Coptic text diverges significantly
  from the Greek fragment P.Oxy. 654 at the end, replacing the Greek's resurrection
  imagery ('buried that will not be raised') with purely revelatory imagery ('covered
  that will remain without being uncovered').
