translation:
  language: es
  text: 'Y entraron para ofrecer sacrificios y holocaustos. Y Jehú apostó afuera a ochenta hombres, y dijo: «El hombre que deje escapar a alguno de los hombres que yo entrego en sus manos, su vida[a] por la vida de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su vida por su vida»; la idea es que el guardia que permita escapar a alguien perderá su propia vida en lugar de la del fugitivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: they went in
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron adentro
  - ingresaron
  lexicon: HALOT
  rationale: בוא en este contexto narrativo cultual expresa movimiento hacia el interior; «entraron» es natural en español y conserva la dirección del acto sin añadir interpretación.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para hacer
  - para realizar
  lexicon: HALOT
  rationale: 'Aunque el verbo básico es «hacer», con ofrendas sacrificiales el valor idiomático es cultual: «ofrecer». El español lo expresa de forma clara sin perder el vínculo con el acto ritual.'
- source_word: זְבָחִים
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas sacrificadas
  - ofrendas
  lexicon: HALOT
  rationale: En contexto sacrificial, זבחים corresponde directamente a «sacrificios». Es el término más transparente y fiel para la escena.
- source_word: וְעֹלֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - sacrificios quemados
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda que sube totalmente en humo; «holocausto» es el equivalente tradicional y preciso en español bíblico. Se mantiene la distinción cultual frente a «sacrificios».
- source_word: שָׂם לוֹ
  english_pob_choice: had stationed for himself
  chosen_spanish: puso para sí
  alternatives_spanish:
  - colocó para sí
  - apostó para sí
  - estacionó para sí
  lexicon: HALOT
  rationale: שׂים significa «poner/colocar». Dado que el contexto ya muestra una guardia en posición, «puso para sí» preserva la sencillez hebrea; «apostó» o «estacionó» serían más militares, pero añaden un matiz no explícito en el hebreo.
- source_word: בַחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - en el exterior
  lexicon: HALOT
  rationale: «Afuera» reproduce bien la localización externa y suena natural en español contemporáneo.
- source_word: שְׁמֹנִים אִישׁ
  english_pob_choice: eighty men
  chosen_spanish: ochenta hombres
  alternatives_spanish:
  - ochenta hombres armados
  - ochenta guardias
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ochenta hombres»; no se debe especificar «guardias» o «armados» sin que el texto lo indique. «Hombres» conserva la amplitud del original.
- source_word: הָאִישׁ אֲשֶׁר יִמָּלֵט
  english_pob_choice: The man who lets any ... escape
  chosen_spanish: El hombre que deje escapar a alguno
  alternatives_spanish:
  - El hombre que permita escapar a alguno
  - El hombre que se escape
  lexicon: HALOT
  rationale: El niphal de מלט en este marco se entiende como responsabilidad de dejar escapar. En español conviene explicitar esa responsabilidad con «deje escapar», siguiendo la fuerza del aviso.
- source_word: מִן הָאֲנָשִׁים
  english_pob_choice: any of the men
  chosen_spanish: a alguno de los hombres
  alternatives_spanish:
  - a uno de los hombres
  - de entre los hombres
  lexicon: HALOT
  rationale: El distributivo del plural se expresa mejor con «a alguno de los hombres», que conserva la idea de una posible fuga individual dentro del grupo.
- source_word: אֲשֶׁר אֲנִי מֵבִיא עַל יְדֵיכֶם
  english_pob_choice: whom I am delivering into your hands
  chosen_spanish: que yo entrego en manos de ustedes
  alternatives_spanish:
  - que yo estoy entregando en sus manos
  - que yo pongo en sus manos
  lexicon: HALOT
  rationale: La expresión «en manos de ustedes» reproduce el hebraísmo עַל יְדֵי/כֶם con naturalidad en español. «Entrego» mantiene el sentido de poner bajo su custodia/poder.
- source_word: נַפְשׁוֹ תַּחַת נַפְשׁוֹ
  english_pob_choice: his life for that man’s life
  chosen_spanish: su vida por la vida de él
  alternatives_spanish:
  - su vida en lugar de la vida de él
  - su vida por su vida
  lexicon: HALOT
  rationale: נפש aquí significa «vida», no «alma». «Su vida por la vida de él» conserva la fórmula retributiva sin suavizarla y deja visible el intercambio penal del hebreo.
theological_decisions:
- issue: Fórmula retributiva de responsabilidad penal
  english_pob_reading: his life for that man’s life
  chosen_spanish_reading: su vida por la vida de él
  alternative_spanish_readings:
  - su vida en lugar de la vida de él
  - su vida por su vida
  rationale: 'La frase hebrea expresa una equivalencia penal: el guardia negligente perderá su propia vida en lugar de la del fugitivo. La traducción española debe conservar esa tensión jurídica sin convertirla en una paráfrasis moralizante.'
  doctrine_reference: lex talionis / principio de retribución
- issue: עֹלָה como tipo de ofrenda
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  rationale: En español bíblico, «holocausto» es el término consagrado para la ofrenda que asciende totalmente en humo. Mantiene la precisión cultual del מקור sin depender de un giro moderno menos estable.
  doctrine_reference: culto sacrificial del Pentateuco
- issue: נֶפֶשׁ como 'vida'
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - persona
  rationale: En esta cláusula, נֶפֶשׁ no debe espiritualizarse como «alma». El contexto de una amenaza de muerte exige «vida» para preservar el sentido legal y concreto.
  doctrine_reference: semántica de נפש
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el trazado auditado en inglés, conservando la estructura narrativa, el campo sacrificial y la fórmula retributiva. Se mantiene la distinción entre sacrificios y holocaustos, y se evita intensificar «puso» a una solución más militarizada sin que el hebreo lo exija.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece.
  - Se mantiene «vida» para נֶפֶשׁ en la cláusula final por exigencia contextual.
  - Se conserva el paralelismo entre «sacrificios» y «holocaustos» sin fusionarlos.
  - «En manos de ustedes» refleja el hebraísmo de entrega/poder con español idiomático.
  - «Afuera» comunica la posición externa de la guardia sin añadir detalle interpretativo.
