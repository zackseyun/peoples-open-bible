translation:
  language: es
  text: Me empujaste con fuerza para que cayera[a][b], pero Yahvé me ayudó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite la misma raíz de forma enfática: literalmente, «empujando, me empujaste». En español se expresa de modo natural como «me empujaste con fuerza».'
    reason: lexical_alternative
  - marker: b
    text: También puede leerse «y Yahvé me ayudó», porque la conjunción hebrea puede ser simplemente aditiva; el contexto, sin embargo, favorece el sentido contrastivo «pero».
    reason: alternative_reading
lexical_decisions:
- source_word: דַּחֹה
  english_pob_choice: pushed me hard
  chosen_spanish: me empujaste con fuerza
  alternatives_spanish:
  - me empujaste duramente
  - me empujaste violentamente
  - me empujaste con insistencia
  lexicon: HALOT
  rationale: La construcción enfática de infinitivo absoluto + verbo finito exige en español una intensificación natural. «Con fuerza» comunica el empuje hostil y el énfasis sin sonar mecánico.
- source_word: דְחִיתַנִי
  english_pob_choice: you pushed me
  chosen_spanish: me empujaste
  alternatives_spanish:
  - me arrojaste
  - me empujaste violentamente
  - me hiciste retroceder
  lexicon: HALOT
  rationale: El verbo expresa acción física de empujar o lanzar con violencia. «Me empujaste» es directo, idiomático y conserva el sujeto hostil del hebreo.
- source_word: לִנְפֹּל
  english_pob_choice: so that I might fall
  chosen_spanish: para que cayera
  alternatives_spanish:
  - para hacerme caer
  - a fin de que cayera
  - con el fin de que cayera
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito o resultado. «Para que cayera» conserva esa relación sin cargar innecesariamente la frase con una paráfrasis más explicativa.
- source_word: וַיהוָה
  english_pob_choice: but Yahweh
  chosen_spanish: pero Yahvé
  alternatives_spanish:
  - y Yahvé
  - mas Yahvé
  lexicon: HALOT
  rationale: Aunque el waw puede leerse como «y», el contexto contrapone la agresión humana con la ayuda divina. Según la terminología del proyecto, יהוה se rinde como «Yahvé» en el texto principal.
- source_word: עֲזָרָנִי
  english_pob_choice: helped me
  chosen_spanish: me ayudó
  alternatives_spanish:
  - vino en mi ayuda
  - me socorrió
  - me asistió
  lexicon: HALOT
  rationale: El verbo עזר indica ayuda efectiva. «Me ayudó» es la forma más natural y fiel en español; «socorrió» o «vino en mi ayuda» serían válidas, pero menos directas.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la terminología estándar del proyecto en español, se mantiene el nombre divino como «Yahvé» y no se sustituye por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la primera y la segunda cláusula
  english_pob_reading: but Yahweh helped me
  chosen_spanish_reading: pero Yahvé me ayudó
  alternative_spanish_readings:
  - y Yahvé me ayudó
  - mas Yahvé me ayudó
  rationale: El waw admite lectura simplemente aditiva, pero el contraste retórico entre ataque humano y auxilio divino está fuertemente apoyado por el contexto. «Pero» preserva esa tensión sin negar la lectura aditiva posible.
  doctrine_reference: 'POB audit trail: alternative reading for וַ'
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada del inglés que ajustó la segunda cláusula para reflejar con más precisión el infinitivo de propósito («so that I might fall») y mantiene la decisión ya verificada de usar un contraste fuerte en la segunda mitad del versículo. También conserva la lectura del nombre divino como Yahvé, coherente con la política terminológica española del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del nombre divino en la traducción principal.
  - Se evita el calco «empujando, empujaste» en el cuerpo del texto, trasladando la intensificación al español natural mediante «con fuerza».
  - «Ayudó» conserva el valor verbal del hebreo עזר sin introducir matices no sustentados como «socorrió» en el texto principal.
  - La puntuación con coma antes de «pero» refuerza el contraste retórico sin alterar el sentido de la cláusula hebrea.
