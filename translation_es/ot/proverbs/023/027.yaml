  rationale: Se cambia «pozo hondo» por «fosa profunda» para reflejar mejor שׁוּחָה y preservar el contraste léxico con בְּאֵר, que sí puede traducirse «pozo». Se mantiene «prostituta» y «mujer extranjera» conforme a la evidencia y a la filosofía del POB. La nota se conserva con leve limpieza tipográfica.
