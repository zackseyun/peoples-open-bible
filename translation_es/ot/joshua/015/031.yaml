lexical_decisions:
- source_word: צִקְלַג
  english_pob_choice: Ziklag
  chosen_spanish: Ziclag
  alternatives_spanish:
  - Ziklag
  - Ziclagh
  lexicon: N/A (nombre propio)
  rationale: Se translitera el topónimo; en español bíblico es natural adaptar la c a /k/ con ‘c’ antes de ‘l’, manteniendo una forma reconocible y sobria. Se conserva el nombre propio sin traducir.
- source_word: מַדְמַנָּה
  english_pob_choice: Madmannah
  chosen_spanish: Madmana
  alternatives_spanish:
  - Madmanná
  - Madmaná
  lexicon: N/A (nombre propio)
  rationale: Es un topónimo; se translitera de manera legible en español. Se evita duplicar consonantes por mera costumbre inglesa cuando no aporta claridad al español, conservando la identidad del nombre.
- source_word: סַנְסַנָּה
  english_pob_choice: Sansannah
  chosen_spanish: Sansana
  alternatives_spanish:
  - Sansannah
  - Sansaná
  lexicon: N/A (nombre propio)
  rationale: Se translitera el nombre propio con una forma natural en español. Se omite la h final inglesa, ya que no se pronuncia en español y no es necesaria para la lectura pública.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción coordinante se rinde con ‘y’, la forma normal en español para una lista simple de nombres. No hace falta ‘e’ porque el siguiente elemento no comienza con /i/ o /hi/.
translation_notes:
  revision_awareness: El contexto fuente muestra alta concordancia y no registra revisiones ni problemas textuales; por ello no se introducen notas textuales ni alternativas doctrinales. La decisión principal fue adaptar los tres topónimos a una forma española transparente, manteniendo su carácter de nombres propios y sin añadir información no presente en el hebreo.
  spanish_consistency_notes:
  - Se mantiene una política consistente de transliteración de topónimos.
  - Se usa ‘y’ coordinante estándar en enumeraciones breves.
  - No se agregan artículos ni glosas, porque el hebreo presenta solo una lista nominal de lugares.
