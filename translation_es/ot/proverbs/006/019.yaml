translation:
  language: es
  text: Un testigo falso que exhala mentiras[a], y el que envía discordia entre hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un testigo mentiroso que pronuncia falsedades».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre hermanos»; esto puede referirse literalmente a hermanos o, más ampliamente, a miembros cercanos de una comunidad.'
    reason: cultural_note
lexical_decisions:
- source_word: יָפִיחַ
  english_pob_choice: breathes out
  chosen_spanish: exhala
  alternatives_spanish:
  - sopla
  - emite
  - pronuncia
  lexicon: HALOT
  rationale: El hebreo expresa la imagen vívida de sacar el aliento, usada idiomáticamente para hablar. «Exhala» conserva esa metáfora de manera natural en español y evita una paráfrasis demasiado plana.
- source_word: כְּזָבִים
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  lexicon: HALOT
  rationale: El plural hebreo designa falsedad dicha o afirmada. «Mentiras» es la equivalencia más directa y comprensible en español contemporáneo, con fuerza moral clara.
- source_word: עֵד שָׁקֶר
  english_pob_choice: a false witness
  chosen_spanish: un testigo falso
  alternatives_spanish:
  - un testigo mentiroso
  - un testigo de falsedad
  lexicon: HALOT
  rationale: La construcción tiene sentido forense. «Testigo falso» mantiene el valor jurídico y proverbial sin introducir una formulación más técnica de lo necesario.
- source_word: וּמְשַׁלֵּחַ
  english_pob_choice: one who sends out
  chosen_spanish: uno que envía
  alternatives_spanish:
  - uno que difunde
  - uno que suscita
  - uno que siembra
  lexicon: HALOT
  rationale: Aunque el verbo puede adquirir un sentido idiomático de promover conflicto, el contexto inmediato con «discordia» permite conservar la imagen de «enviar» sin perder naturalidad. Se evita sustituirlo por un verbo interpretativo más fuerte que no esté exigido por el hebreo.
- source_word: מְדָנִים
  english_pob_choice: strife
  chosen_spanish: discordia
  alternatives_spanish:
  - pleitos
  - contiendas
  - disputas
  lexicon: HALOT
  rationale: El sustantivo denota disputas o contiendas. «Discordia» funciona bien en español para el efecto relacional del proverbio y mantiene un tono sobrio y sapiencial.
- source_word: בֵּין אַחִים
  english_pob_choice: among brothers
  chosen_spanish: entre hermanos
  alternatives_spanish:
  - entre hermanos de sangre
  - entre miembros de la comunidad
  lexicon: HALOT
  rationale: Se conserva el valor literal de la expresión. «Entre hermanos» respeta el masculino plural hebreo y la relación cercana sugerida por el contexto, sin neutralizarla innecesariamente.
theological_decisions:
- issue: Valor relacional de אַחִים
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - miembros de la comunidad
  - parientes
  rationale: El hebreo es masculino plural y el contexto sapiencial permite una referencia representativa. Mantener «hermanos» preserva la forma y la textura social del dicho, sin borrar la relación fraterna explícita del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el hebreo y la versión inglesa publicada. La revisión más reciente mantuvo el verbo «sends out» para reflejar mejor וּמְשַׁלֵּחַ; por eso se conserva en español una imagen verbal cercana («envía») antes que sustituirla por un equivalente más interpretativo.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial breve y sentencioso.
  - Se conserva la relación semántica entre «mentiras» y «discordia» como dos acciones condenadas en paralelo.
  - Se evita el masculino genérico neutralizante para אַחִים, siguiendo la pauta documental del proyecto.
