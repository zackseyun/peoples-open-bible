revisions:
- from: '«[a]Clama otra vez, diciendo: “Así dice Yahvé de los ejércitos: Mis ciudades otra vez rebosarán de prosperidad, y Yahvé otra vez consolará a Sion, y otra vez escogerá a Jerusalén.”»'
  to: 'Clama de nuevo, diciendo: «Así dice Yahvé de los ejércitos: Mis ciudades de nuevo rebosarán[a] de prosperidad, y Yahvé de nuevo consolará a Sion, y de nuevo escogerá a Jerusalén.»'
  rationale: Se conserva el sentido del original y de la auditoría inglesa, pero se corrige la ubicación de la nota para cumplir la disciplina de anclaje y se mejora ligeramente la naturalidad del español con «de nuevo». No se requieren cambios teológicos ni léxicos de fondo.
