  text: 그러자 베드로가 열한 사도와 함께 일어서서 목소리를 높여 그들에게 선포하였습니다. 「유대 사람들과 예루살렘에 사는 모든 사람들이여, 이 일을 알아 두시고, 내 말에 귀를 기울이십시오.
