revisions:
- from: Pero aparecieron a él otros dos jóvenes, sobresalientes en fuerza, hermosísimos en apariencia y espléndidos en su vestidura; y, puestos a ambos lados de él, lo azotaban sin cesar, lanzándole muchos golpes.
  to: Pero se le aparecieron otros dos jóvenes, sobresalientes en fuerza, hermosísimos en apariencia y espléndidos en vestidura; y, puestos a ambos lados, lo azotaban sin cesar, asestándole muchos golpes.
  rationale: 'Se corrigen varios calcos y se mejora la naturalidad del español manteniendo el sentido exacto del griego y las decisiones del POB en inglés: ''se le aparecieron'' por ἐφάνησαν αὐτῷ, supresión de posesivo innecesario en la descripción del vestido, simplificación de la locución espacial, y ''asestándole muchos golpes'' como mejor equivalente idiomático de πολλὰς ἐπιρριπτοῦντες... πληγάς.'
