    text: O «y me odiaron y me enviaron lejos de entre ustedes». La conjunción hebrea וְ en «וְאַתֶּם» puede traducirse más literalmente como «y», pero aquí probablemente tiene un sentido circunstancial o causal; por eso se vierte «si» en el texto principal.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «me despidieron» por «me enviaron lejos» para representar con mayor fidelidad וַתְּשַׁלְּחוּנִי y sonar natural en español general. También se ajusta la nota para conservar explícitamente la alternativa más literal con «y», en línea con la auditoría inglesa.
