translation:
  language: es
  text: y que toda la tierra que posean[a] esté exenta de tributo para ellos; y que los caldeos[b] dejen las aldeas judías que retienen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda la tierra que posean sea libre de tributo para ellos».'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «caldeos»; algunos lectores pueden entender aquí «babilonios» en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: χώραν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  - región
  lexicon: LSJ
  rationale: En este contexto administrativo y territorial, «tierra» comunica bien la extensión poseída sin cargarlo con un matiz político más fuerte que el griego.
- source_word: κρατήσουσιν
  english_pob_choice: possess
  chosen_spanish: posean
  alternatives_spanish:
  - posean y controlen
  - retengan
  - tengan
  lexicon: LSJ
  rationale: El verbo griego expresa tener bajo control o posesión; «posean» conserva la idea de tenencia efectiva, alineada con la revisión inglesa que prefirió 'possess'.
- source_word: ἀφορολόγητον
  english_pob_choice: tax-free
  chosen_spanish: libre de tributo
  alternatives_spanish:
  - exenta de impuestos
  - sin tributo
  - libre de impuestos
  lexicon: LSJ
  rationale: «Libre de tributo» recoge el sentido fiscal del adjetivo y mantiene un tono sobrio y bíblico; en español evita la ambigüedad contemporánea de «tax-free» asociada al comercio minorista.
- source_word: ὑπάρχειν
  english_pob_choice: should be for them
  chosen_spanish: les sea
  alternatives_spanish:
  - sea para ellos
  - quede para ellos
  - permanezca para ellos
  lexicon: LSJ
  rationale: 'En la cláusula de decreto, el infinitivo expresa estado legal: que la tierra quede en condición de exención para ellos. «Les sea» permite conservar esa fuerza normativa sin sonar forzado.'
- source_word: Χαλδαῖοι
  english_pob_choice: Chaldeans
  chosen_spanish: caldeos
  alternatives_spanish:
  - babilonios
  lexicon: LSJ
  rationale: Se conserva el etnónimo griego. «Caldeos» es la forma directa y deja abierta la posible referencia histórica más amplia sin sustituir el término fuente.
- source_word: ἀφίουσι
  english_pob_choice: should leave
  chosen_spanish: dejen
  alternatives_spanish:
  - abandonen
  - dejen libres
  - desocupen
  lexicon: LSJ
  rationale: Aquí el verbo implica renunciar a la ocupación o control; «dejen» funciona naturalmente con el objeto «las aldeas» y preserva la idea de retirada.
- source_word: κώμας
  english_pob_choice: villages
  chosen_spanish: aldeas
  alternatives_spanish:
  - pueblos
  - villas
  - caseríos
  lexicon: LSJ
  rationale: «Aldeas» corresponde bien a κώμαι y mantiene un tamaño de asentamiento inferior a «pueblos», sin sobreinterpretar el término.
- source_word: διακρατοῦσιν
  english_pob_choice: hold
  chosen_spanish: tienen bajo su control
  alternatives_spanish:
  - mantienen
  - poseen
  - retienen
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de dominio persistente. «Tienen bajo su control» expresa con claridad ese matiz sin introducir una carga militar innecesaria.
theological_decisions:
- issue: Fuerza legal-administrativa de las cláusulas del decreto
  english_pob_reading: Render with prescriptive 'should' clauses in English.
  chosen_spanish_reading: Usar subjuntivo de mandato/orden («les sea», «dejen») para reproducir el carácter normativo del decreto.
  alternative_spanish_readings:
  - 'infinitivos más literales: «ser libre de tributo», «dejar»'
  - formas indicativas menos precisas
  rationale: El griego presenta estipulaciones de decreto; en español, el subjuntivo expresa mejor la prescripción sin perder legibilidad. Así se conserva el valor jurídico del texto fuente.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern Spanish'
- issue: Identidad de Χαλδαῖοι
  english_pob_reading: '''Chaldeans'' is preserved; English note allows broader understanding as Babylonians.'
  chosen_spanish_reading: Preservar «caldeos» en el texto principal.
  alternative_spanish_readings:
  - «babilonios» en el texto principal
  - «caldeos» con nota explicativa
  rationale: El griego nombra explícitamente a los Χαλδαῖοι; traducirlos como «babilonios» borraría ese rasgo del original. «Caldeos» conserva la forma fuente y la tensión histórica que el inglés también dejó abierta.
  doctrine_reference: POB lexical fidelity policy
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa más reciente al reflejar κρατήσουσιν con «posean» en vez de un equivalente más débil de ocupación, y ἀφορολόγητον ὑπάρχειν con una formulación de exención fiscal más directa. También se preservó el etnónimo Χαλδαῖοι sin normalizarlo a «babilonios», para no borrar una decisión léxica documentada.
  spanish_consistency_notes:
  - Se mantuvo un registro jurídico-administrativo, adecuado a una cláusula de decreto.
  - Se evitó calcar estructuras inglesas como «tax-free» y se prefirió una equivalencia española natural y precisa.
  - «Caldeos» se conserva como etnónimo fuente; la nota deja abierta la lectura histórica más amplia sin sustituir el término principal.
  - Se usó una frase verbal española fluida («les sea libre de tributo») para representar la construcción infinitival griega sin perder su fuerza normativa.
