    text: 'O: «para David» o «por David». La preposición hebrea puede señalar autoría, dedicación o pertenencia.'
    reason: lexical_alternative
  - marker: b
    text: «La fosa» puede referirse a la tumba o al ámbito de los muertos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «no guardes silencio ante mí». El primer verbo puede solaparse con la idea de silencio de la cláusula siguiente, pero el texto principal conserva la distinción entre no oír y no responder.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para reflejar la distinción documentada entre los dos verbos hebreos: primero ''no seas sordo a mí'' (no oír/atender), luego ''no sea que te calles ante mí'' (no responder). También se cambia ''para que no'' por ''no sea que'' para expresar mejor el valor de פֶּן, y ''la fosa'' para conservar más de cerca la imagen concreta de בור, manteniendo en nota su posible referencia a la tumba o al ámbito de los muertos.'
