translation:
  language: es
  text: Tendrá dos piezas de hombro[a] unidas a sus dos extremos, para que quede unido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dos hombreras». El hebreo puede designar partes relacionadas con el hombro de la prenda, no hombros literales.
    reason: lexical_alternative
  - marker: b
    text: O «y quedará unido». La cláusula final puede expresarse de manera más formal, pero la idea es que la prenda queda unida por estas piezas de hombro.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּ֧י
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambas
  lexicon: HALOT
  rationale: El numeral femenino plural indica simplemente cantidad. En español, «dos» es la opción más directa y natural.
- source_word: כְתֵפֹ֣ת
  english_pob_choice: shoulder pieces
  chosen_spanish: piezas de hombro
  alternatives_spanish:
  - hombreras
  - correas de hombro
  - hombros
  lexicon: HALOT
  rationale: El término hebreo se refiere a partes de la prenda relacionadas con el hombro, no a hombros anatómicos. «Piezas de hombro» conserva esa referencia funcional sin forzar una traducción más concreta de lo que el hebreo permite.
- source_word: חֹֽבְרֹ֗ת
  english_pob_choice: joined
  chosen_spanish: unidas
  alternatives_spanish:
  - unidas entre sí
  - ajuntadas
  - conectadas
  lexicon: HALOT
  rationale: El participio de חבר expresa unión o conexión. «Unidas» refleja bien la idea de piezas enlazadas en una prenda y mantiene la correspondencia con el motivo repetido de la raíz en el verso.
- source_word: יִֽהְיֶה לּ֛/וֹ
  english_pob_choice: it shall have
  chosen_spanish: Tendrá
  alternatives_spanish:
  - habrá para él
  - le pertenecerán
  lexicon: HALOT
  rationale: La construcción existencial con ל + sufijo posee sentido de pertenencia. En español, «Tendrá» comunica con naturalidad que la prenda posee esas piezas.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - junto a
  lexicon: HALOT
  rationale: La relación espacial con los extremos de la prenda se expresa con «a» en español, que resulta idiomático y preciso.
- source_word: שְׁנֵ֥י קְצוֹתָ֖י/ו
  english_pob_choice: its two ends
  chosen_spanish: sus dos extremos
  alternatives_spanish:
  - sus dos bordes
  - sus dos puntas
  lexicon: HALOT
  rationale: קצה indica extremidad o extremo. «Extremos» es la opción más general y fiel para una pieza de ropa.
- source_word: וְ/חֻבָּֽר
  english_pob_choice: so that it may be joined together
  chosen_spanish: para que quede unido
  alternatives_spanish:
  - y quede unido
  - de modo que se una
  lexicon: HALOT
  rationale: 'La forma pasiva expresa el resultado: la prenda queda unida por medio de esas piezas. «Para que quede unido» transmite ese valor resultativo en español sin sobrecargar la frase.'
theological_decisions:
- issue: Referencia de las partes de la prenda (terminología del efod)
  english_pob_reading: shoulder pieces / joined together
  chosen_spanish_reading: piezas de hombro / unidas
  alternative_spanish_readings:
  - hombreras / unidas
  - correas de hombro / unidas
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión terminológica: el texto describe la construcción del efod. «Piezas de hombro» evita imponer una forma más específica que el hebreo no exige y conserva la relación funcional con el hombro.'
  doctrine_reference: Éxodo 28:7; terminología del efod en contexto cultual
- issue: Sentido resultativo del pasivo final
  english_pob_reading: so that it may be joined together
  chosen_spanish_reading: para que quede unido
  alternative_spanish_readings:
  - y quede unido
  - para que sea unido
  rationale: El hebreo final comunica resultado más que una simple coordinación. «Para que quede unido» mantiene el valor resultativo y no introduce una noción adicional que el texto no explicita.
  doctrine_reference: Éxodo 28:7; gramática verbal hebrea
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que cambió «attached» por «joined» para reflejar con más coherencia la raíz hebrea repetida חבר. En español, eso se preserva con «unidas» y «quede unido», manteniendo la repetición semántica sin sonar rígido.
  spanish_consistency_notes:
  - Se emplea «Dios/Yahvé» solo cuando el contexto lo requiere; este verso no lo contiene.
  - Se evitó «siervo» o vocabulario teológico no pertinente al pasaje.
  - La coordinación de tiempos y voz busca reflejar el valor resultativo del hebreo sin sobredeterminar la sintaxis española.
