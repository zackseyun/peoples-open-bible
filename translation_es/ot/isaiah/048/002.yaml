review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: causal inicial, identidad vinculada con la ciudad santa, dependencia del Dios de Israel, y fórmula final con el nombre divino. Sin embargo, ''desde la ciudad santa'' suena menos natural con ''son llamados'' y no expresa tan bien en español la ambigüedad entre procedencia y designación que el inglés auditado conserva con nota. ''De la ciudad santa'' representa mejor el valor de origen/designación sin forzar el español.'
  spanish_quality_summary: El texto es claro y digno, pero 'son llamados desde la ciudad santa' resulta algo rígido e idiomáticamente extraño en español eclesial general. 'Son llamados de la ciudad santa' fluye mejor y encaja mejor con la nota alternativa. El resto del versículo es legible y fiel; 'Yahvé' y 'el Dios de Israel' están bien. 'De los ejércitos' es aceptable para צבאות.
  glossary_alignment: Se alinea con la terminología del proyecto en 'Yahvé', 'Dios', y la preservación de la metáfora en 'se apoyan en'. No hay conflicto teológico relevante. La única mejora léxica recomendada es ajustar מֵעִיר הַקֹּדֶשׁ a 'de la ciudad santa' en el texto principal para mejor fidelidad idiomática al español y mejor coordinación con la nota.
  issues:
  - severity: medium
    issue: '''desde la ciudad santa'' con ''son llamados'' suena poco natural'
    rationale: Aunque 'desde' puede marcar procedencia, en español 'ser llamado desde X' normalmente sugiere un punto de emisión de una llamada, no origen/designación identitaria. 'De la ciudad santa' preserva mejor la ambigüedad fuente/designación del hebreo.
  - severity: low
    issue: La nota alternativa queda demasiado cercana al texto principal
    rationale: Si el texto principal usa 'desde', la nota con 'de la ciudad santa' apenas añade una alternativa claramente distinguible. Cambiar el texto principal a 'de la ciudad santa' deja la explicación de ambigüedad más coherente.
  revised_spanish_text: Porque son llamados de la ciudad santa[a], y se apoyan en el Dios de Israel; Yahvé de los ejércitos es su nombre.
  revised_footnotes:
  - marker: a
    text: O, «son llamados desde la ciudad santa». El hebreo puede enfatizar tanto su procedencia como su designación por la ciudad.
    reason: alternative_reading
  revision_rationale: Se ajusta 'desde la ciudad santa' a 'de la ciudad santa' para un español más natural con 'son llamados' y para representar mejor la ambigüedad del hebreo entre origen y designación, dejando la lectura más explícitamente direccional en nota. No se requieren otros cambios.
