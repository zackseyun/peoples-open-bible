translation:
  language: es
  text: Abominación para Yahvé es todo el de corazón altivo; mano a mano[a], no quedará impune.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «mano a mano», un modismo que puede significar «seguramente/ciertamente», o quizá «aunque se den la mano» (es decir, aun en alianza).
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - algo detestable
  - cosa detestable
  lexicon: HALOT
  rationale: En Proverbios el sustantivo expresa algo moral y religiosamente repugnante; «abominación» conserva esa fuerza fuerte y ya es un término bíblico claro en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino; en español del POB se mantiene su transliteración como nombre, no como sustitución por título. «Yahvé» es la forma más estable y legible en español general.
- source_word: כָּל
  english_pob_choice: Everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - todo aquel que
  - quienquiera que
  lexicon: HALOT
  rationale: 'La fuerza distributiva del hebreo se expresa naturalmente en español con una construcción relativa: «todo el que».'
- source_word: גְּבַהּ לֵב
  english_pob_choice: proud in heart
  chosen_spanish: corazón altivo
  alternatives_spanish:
  - corazón orgulloso
  - corazón soberbio
  lexicon: HALOT
  rationale: El hebreo literalmente alude a alguien «alto» en el corazón; en español, «corazón altivo» conserva la imagen interna y el matiz de orgullo/arrogancia sin sonar forzado.
- source_word: יָד לְיָד
  english_pob_choice: hand to hand
  chosen_spanish: mano a mano
  alternatives_spanish:
  - seguro que
  - ciertamente
  - aunque se den la mano
  lexicon: HALOT
  rationale: Se retiene el giro idiomático de modo transparente para no resolver prematuramente su ambigüedad. «Mano a mano» deja visible la expresión hebrea y permite las lecturas alternativas documentadas.
- source_word: לֹא יִנָּקֶה
  english_pob_choice: he will certainly not go unpunished
  chosen_spanish: no quedará impune
  alternatives_spanish:
  - no será absuelto
  - no escapará del castigo
  lexicon: HALOT
  rationale: El nifal de נקה aquí comunica no quedar libre de culpa/castigo; «no quedará impune» es una equivalencia natural y jurídica en español que preserva el sentido judicial.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se conserva el nombre propio divino revelado en el hebreo, evitando la sustitución por un título. La elección sigue el estándar del POB en español para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Interpretación de יָד לְיָד
  english_pob_reading: retain the idiom 'hand to hand' in the main text and reflect its emphatic sense in the clause 'he will certainly not go unpunished.'
  chosen_spanish_reading: retener el modismo «mano a mano» en el texto principal y reflejar su fuerza en «no quedará impune»
  alternative_spanish_readings:
  - ciertamente
  - seguro que
  - aunque se den la mano
  rationale: La frase es ambigua y no doctrinalmente cargada; mantener el modismo en español respeta la tensión del original y deja abiertas las interpretaciones documentadas.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar la línea de traducción; esta versión corrige el problema de validación asegurando que el marcador [a] aparece en el texto principal.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino personal, no como «SEÑOR».
  - La expresión idiomática se conserva con equivalente transparente («mano a mano») para no borrar su ambigüedad.
  - «No quedará impune» transmite el valor judicial del hebreo sin añadir elementos no presentes en el texto.
  - El estilo es sobrio y publicable, con sintaxis natural en español latinoamericano.
