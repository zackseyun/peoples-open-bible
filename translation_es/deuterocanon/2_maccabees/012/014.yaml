translation:
  language: es
  text: Pero los de dentro, confiando en la fortaleza de las murallas y en el suministro de provisiones, trataban a Judas y a los suyos[a] con mayor arrogancia, insultándolos[b], y además blasfemando y diciendo lo que no es lícito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que estaban alrededor de Judas». El giro griego es idiomático y puede referirse al grupo asociado con Judas.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «vituperándolos» o «ultrajándolos». Aquí se mantiene «insultándolos» por claridad, aunque el griego tiene un matiz más fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἔνδον
  english_pob_choice: those inside
  chosen_spanish: los de dentro
  alternatives_spanish:
  - los que estaban dentro
  - los de adentro
  lexicon: LSJ
  rationale: La expresión griega es espacial y describe a los defensores dentro de la fortificación. «Los de dentro» conserva esa referencia de forma natural en español sin añadir detalles no presentes en el griego.
- source_word: πεποιθότες
  english_pob_choice: trusting
  chosen_spanish: confiando en
  alternatives_spanish:
  - teniendo confianza en
  - fiados en
  lexicon: BDAG
  rationale: El participio perfecto indica confianza asentada; «confiando en» comunica bien esa dependencia continua en español moderno.
- source_word: τῇ τῶν τειχέων ἐρυμνότητι
  english_pob_choice: in the strength of the walls
  chosen_spanish: en la fortaleza de las murallas
  alternatives_spanish:
  - en la seguridad de las murallas
  - en la fuerza de las murallas
  lexicon: LSJ
  rationale: ἐρυμνότης expresa fortaleza/defensibilidad. «Fortaleza de las murallas» reproduce el sentido militar de la frase y suena natural en español.
- source_word: τῇ τε τῶν βρωμάτων παραθέσει
  english_pob_choice: in the supply of provisions
  chosen_spanish: y en el suministro de provisiones
  alternatives_spanish:
  - y en la abundancia de alimentos
  - y en el depósito de víveres
  lexicon: LSJ
  rationale: βρώματα aquí son provisiones de asedio, y παράθεσις sugiere una disposición o suministro. «Suministro de provisiones» conserva ese sentido sin domesticarlo indebidamente.
- source_word: ἀναυθαγέστερον ἐχρῶντο
  english_pob_choice: treated ... more arrogantly
  chosen_spanish: trataban ... con mayor arrogancia
  alternatives_spanish:
  - se comportaban con mayor insolencia hacia
  - los trataban con más prepotencia
  lexicon: LSJ
  rationale: La comparativa intensifica la actitud hostil hacia el grupo de Judas. «Con mayor arrogancia» mantiene el matiz de insolencia o prepotencia con estilo claro.
- source_word: τοῖς περὶ τὸν Ἰούδαν
  english_pob_choice: Judas and his men
  chosen_spanish: Judas y a los suyos
  alternatives_spanish:
  - los de alrededor de Judas
  - la gente de Judas
  lexicon: LSJ
  rationale: El giro idiomático apunta al grupo asociado con Judas. «Judas y a los suyos» expresa bien el referente colectivo sin forzar una paráfrasis militar excesiva.
- source_word: λοιδοροῦντες
  english_pob_choice: reviling
  chosen_spanish: insultándolos
  alternatives_spanish:
  - ultrajándolos
  - vituperándolos
  lexicon: BDAG
  rationale: El participio indica abuso verbal; «insultándolos» es la opción más clara en español, aunque algo menos solemne que «vituperándolos».
- source_word: βλασφημοῦντες
  english_pob_choice: blaspheming
  chosen_spanish: blasfemando
  alternatives_spanish:
  - hablando blasfemias
  - profanando con palabras
  lexicon: BDAG
  rationale: Conviene preservar el peso religioso del término y no reducirlo a simple insulto. «Blasfemando» mantiene la escalada del texto y la carga impía de la expresión.
- source_word: λαλοῦντες ἃ μὴ θέμις
  english_pob_choice: speaking what is not lawful
  chosen_spanish: diciendo lo que no es lícito
  alternatives_spanish:
  - diciendo lo que no debe decirse
  - pronunciando lo que no está permitido
  lexicon: LSJ
  rationale: θέμις designa lo permitido o lícito, con fuerza moral/religiosa. «Lo que no es lícito» preserva esa gravedad y es idiomático en español.
theological_decisions:
- issue: Distinción entre λοιδοροῦντες y βλασφημοῦντες
  english_pob_reading: Retain distinct religious force with 'blaspheming' rather than collapsing it into mere insult.
  chosen_spanish_reading: Mantener «insultándolos» y «blasfemando» como acciones distintas, con peso creciente.
  alternative_spanish_readings:
  - reducir ambos a abuso verbal
  - traducir βλασφημοῦντες solo como 'hablando mal de ellos'
  rationale: 'El griego apila los verbos para intensificar la hostilidad: primero insultos, luego blasfemia, y luego palabras ilícitas. Conservar esa progresión evita aplanar el matiz religioso del pasaje.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y sin cambios necesarios; por eso esta propuesta sigue de cerca el audit trail inglés y conserva las tensiones léxicas relevantes sin introducir paráfrasis nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se conserva el tono sobrio y bíblico sin recurrir a formulaciones eclesiásticas fijas no sustentadas por el griego.
  - La combinación de «blasfemando» y «lo que no es lícito» preserva la escalada retórica del original.
