translation:
  language: es
  text: Recuerda el fin[a], y deja de ser hostil; recuerda la decadencia y la muerte[b], y permanece en los mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «las últimas cosas». La expresión puede significar el final propio o el desenlace último.'
    reason: lexical_alternative
  - marker: b
    text: 'El testimonio hebreo suministrado aquí parece corresponder a otro dicho: aproximadamente, «...responde una palabra antes de oír», lo que indica una desalineación de la fuente para este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Ten presente
  - Acuérdate
  lexicon: BDAG
  rationale: Imperativo exhortativo directo; en español, «Recuerda» es natural, solemne y fiel al tono sapiencial.
- source_word: τὰ ἔσχατα
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - las postrimerías
  - las últimas cosas
  lexicon: BDAG
  rationale: «El fin» conserva la concisión del inglés POB y la amplitud semántica de «las últimas cosas» sin sonar artificial. La nota preserva la alternativa más literal.
- source_word: παῦσαι ἐχθραίνων
  english_pob_choice: stop being hostile
  chosen_spanish: deja la hostilidad
  alternatives_spanish:
  - cesa de enemistarte
  - deja de ser hostil
  lexicon: BDAG
  rationale: La construcción expresa una actitud o conducta continua de enemistad/hostilidad. «Deja la hostilidad» comunica bien el valor práctico sin reducirlo solo a emoción interna.
- source_word: καταφθοράν
  english_pob_choice: decay
  chosen_spanish: la corrupción
  alternatives_spanish:
  - la decadencia
  - la ruina
  lexicon: BDAG
  rationale: En español, «corrupción» puede abarcar descomposición o deterioro físico, y mantiene la fuerza del par con «muerte». «Decadencia» suena más abstracta; «ruina» desplaza el matiz corporal.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Correspondencia directa y estable del sustantivo griego.
- source_word: ἔμμενε
  english_pob_choice: remain
  chosen_spanish: permanece
  alternatives_spanish:
  - persevera
  - continúa
  lexicon: BDAG
  rationale: Imperativo de perseverancia; «permanece» encaja de forma natural con «en los mandamientos» y conserva el valor de continuidad.
- source_word: ἐντολαῖς
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  lexicon: BDAG
  rationale: «Mandamientos» conserva el tono moral-religioso habitual del término sin añadir explícitamente «de Dios», que el griego no dice.
theological_decisions:
- issue: Base textual para la traducción de Sirácides 28:6
  english_pob_reading: Translate from the Greek parallel as the operative text for this verse, while noting the Hebrew line in Zone 1 appears to belong to a different saying.
  chosen_spanish_reading: Traducir según el paralelo griego como texto operativo de este versículo, indicando en nota que la línea hebrea dada parece corresponder a otro dicho.
  alternative_spanish_readings:
  - 'Traducir directamente la línea hebrea conservada: «Y más ligero que un viajero, responde una palabra antes de oír.»'
  rationale: La evidencia provista muestra una desalineación entre el hebreo y la referencia de Sirácides 28:6. Por fidelidad al testimonio más coherente para este versículo, se sigue el griego y se documenta honestamente la discrepancia textual.
  doctrine_reference: 'PHILOSOPHY.md: usar el testimonio original más sólido disponible para deuterocanónicos, y registrar con honestidad las incertidumbres o desajustes de la transmisión.'
translation_notes:
  revision_awareness: 'Último pase de revisión sin cambios: el contexto de auditoría indica alta concordancia (agreement 1.0) y no requiere ajustes adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como preferencia general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita añadir «de Dios» a «los mandamientos» porque el griego no lo expresa explícitamente.
  - «Hostilidad» preserva mejor la idea de enemistad activa que una simple traducción emocional como «odio».
  - «Corrupción» se usa aquí por su capacidad de evocar deterioro/mortalidad en paralelo con «muerte».
