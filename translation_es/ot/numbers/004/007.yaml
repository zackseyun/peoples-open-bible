  yaml_path: translation/ot/numbers/004/007.yaml
  text: And over the table of the Presence they shall spread a blue cloth[a], and they shall place on it the plates, the cups, the bowls, and the pitchers for the drink offering[b]; and the regular bread shall be on it.
  footnotes:
