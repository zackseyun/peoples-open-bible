translation:
  language: es
  text: 'Entonces el hombre de Dios dijo: «¿Dónde cayó?» Y él le mostró el lugar. Entonces cortó un palo y lo arrojó allí, y el hierro[a] flotó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el hierro». En contexto, se trata de la cabeza de hierro del hacha mencionada en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Mantiene el título hebreo idiomático sin expandirlo interpretativamente. En español, «hombre de Dios» es directo, reconocible y fiel al valor convencional del sintagma.
- source_word: אָ֣נָה
  english_pob_choice: Where
  chosen_spanish: ¿Dónde?
  alternatives_spanish:
  - ¿A dónde?
  - ¿En qué lugar?
  lexicon: HALOT
  rationale: La pregunta pide ubicación, no dirección. «¿Dónde?» reproduce naturalmente el valor locativo del adverbio en este contexto.
- source_word: נָפָ֑ל
  english_pob_choice: did it fall
  chosen_spanish: cayó
  alternatives_spanish:
  - ha caído
  - se cayó
  lexicon: HALOT
  rationale: El perfecto hebreo refiere a un hecho ya ocurrido. En español narrativo, el pretérito simple «cayó» conserva esa referencia sin sobrecargarla.
- source_word: וַיַּרְאֵ֨/הוּ֙
  english_pob_choice: he showed him
  chosen_spanish: le mostró
  alternatives_spanish:
  - y le hizo ver
  - le enseñó
  lexicon: HALOT
  rationale: El hifil de ראה tiene sentido causativo, «hacer ver». «Le mostró» es el equivalente español más natural y fiel a la acción causativa.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: HALOT
  rationale: «Lugar» conserva el referente concreto sin añadir matiz estilístico innecesario. Es la opción más transparente para el español actual.
- source_word: וַיִּקְצָב עֵץ
  english_pob_choice: he cut off a stick
  chosen_spanish: cortó un palo
  alternatives_spanish:
  - cortó un trozo de madera
  - cortó una rama
  lexicon: HALOT
  rationale: עֵץ puede referirse a madera/árbol/objeto de madera; en contexto se trata de una pieza arrojable. «Palo» comunica bien la concreción sin exagerar el tamaño ni especificar una forma no presente en el hebreo.
- source_word: וַיַּשְׁלֶךְ שָׁמָּה
  english_pob_choice: threw it there
  chosen_spanish: lo arrojó allí
  alternatives_spanish:
  - lo echó allí
  - lo lanzó allí
  lexicon: HALOT
  rationale: «Arrojar» preserva el sentido de lanzar/throw sin perder dignidad estilística. «Allí» mantiene la referencia deíctica breve del hebreo.
- source_word: וַיָּצֶף
  english_pob_choice: floated
  chosen_spanish: flotó
  alternatives_spanish:
  - salió a flote
  - subió a la superficie
  lexicon: HALOT
  rationale: El verbo describe que el hierro quedó flotando; «flotó» es la forma más directa y no interpreta el evento más allá del hebreo.
- source_word: הַבַּרְזֶל
  english_pob_choice: the iron
  chosen_spanish: el hierro
  alternatives_spanish:
  - la cabeza de hierro del hacha
  - el hierro del hacha
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el hierro». Se conserva esa formulación en el texto principal, dejando la identificación contextual como posibilidad implícita.
theological_decisions:
- issue: Presentación del milagro sin atenuación
  english_pob_reading: 'Render the event straightforwardly as a miracle: ''the iron floated.'''
  chosen_spanish_reading: 'Presentar el hecho de manera directa: «el hierro flotó».'
  alternative_spanish_readings:
  - «el hierro salió a flote»
  - «el hierro subió a la superficie»
  rationale: El relato muestra una intervención milagrosa sin metáfora ni explicación naturalizante. La traducción debe decir con sencillez lo que el hebreo afirma, sin suavizarlo.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del POB inglés al separar la cláusula de la muestra del lugar: «Y él le mostró el lugar. Entonces cortó...», evitando subordinar indebidamente la secuencia verbal hebrea. También mantuve la lectura literal de «el hierro», como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «el hombre de Dios» de manera consistente con el título hebreo idiomático.
  - Se conserva la secuencia narrativa con dos «Entonces» para reflejar la progresión de los verbos hebreos.
  - «El hierro» se mantiene literal en el texto principal; la aclaración contextual queda en nota.
  - Se evitó «SEÑOR» o cualquier sustitución porque no aparece el tetragrámaton en este versículo.
