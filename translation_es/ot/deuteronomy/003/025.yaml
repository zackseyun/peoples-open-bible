translation:
  language: es
  text: Permíteme, por favor, cruzar y ver la buena tierra que está más allá del Jordán, esta buena región montañosa[a] y el Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este buen monte». El hebreo puede referirse tanto a una montaña específica como a la región montañosa al oeste del Jordán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעְבְּרָה
  english_pob_choice: let me cross over
  chosen_spanish: Permíteme, por favor, cruzar
  alternatives_spanish:
  - Déjame cruzar
  - Permite que yo cruce
  lexicon: HALOT
  rationale: El cohortativo expresa ruego o deseo de Moisés, no futuro simple. «Permíteme, por favor, cruzar» conserva la súplica y suena natural en español.
- source_word: נָּא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula suaviza la petición. «Por favor» transmite bien el tono de ruego en español moderno sin arcaísmo.
- source_word: וְאֶרְאֶה
  english_pob_choice: and see
  chosen_spanish: y ver
  alternatives_spanish:
  - y que vea
  - y contemple
  lexicon: HALOT
  rationale: El segundo cohortativo expresa propósito o resultado de cruzar. «Y ver» mantiene la sencillez y el paralelo con el hebreo.
- source_word: הָאָרֶץ הַטּוֹבָה
  english_pob_choice: the good land
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - la tierra buena
  - el buen país
  lexicon: HALOT
  rationale: אֶרֶץ suele ser «tierra» en contexto territorial y pactal. Se conserva «buena» para reflejar el adjetivo y la valoración del texto.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: that is beyond the Jordan
  chosen_spanish: que está más allá del Jordán
  alternatives_spanish:
  - que está al otro lado del Jordán
  - que está del otro lado del Jordán
  lexicon: HALOT
  rationale: בְּעֵבֶר indica la región al otro lado del río desde la perspectiva del hablante. «Más allá del Jordán» es idiomático y fiel.
- source_word: הָהָר הַטּוֹב הַזֶּה
  english_pob_choice: this good hill country
  chosen_spanish: este buen país montañoso
  alternatives_spanish:
  - esta buena región montañosa
  - este buen monte
  lexicon: HALOT
  rationale: הָר puede referirse a una montaña o a una zona montañosa. En este contexto, junto con «el Líbano», el sentido regional es más probable; «país montañoso» lo expresa con naturalidad en español.
- source_word: וְהַלְּבָנוֹן
  english_pob_choice: and Lebanon
  chosen_spanish: y el Líbano
  alternatives_spanish:
  - y Líbano
  lexicon: HALOT
  rationale: Nombre propio geográfico; se traduce de forma directa como en español bíblico común.
theological_decisions:
- issue: Sentido geográfico de הָהָר ('la montaña' / región montañosa)
  english_pob_reading: Rendered collectively as 'this good hill country' rather than a singular 'this good mountain.'
  chosen_spanish_reading: «este buen país montañoso» en lugar de «este buen monte».
  alternative_spanish_readings:
  - este buen monte
  - esta buena sierra
  rationale: El singular hebreo puede funcionar de manera colectiva para una región montañosa. En este contexto descriptivo de la tierra, y en apposición con «el Líbano», el valor regional comunica mejor la referencia sin forzar una montaña específica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó la coma antes de «and Lebanon» para reflejar mejor la estructura appositiva. En español se siguió esa misma fluidez: «este buen país montañoso y el Líbano», sin coma intermedia. También se mantuvo la opción regional para הָהָר por coherencia con el análisis revisado.'
  spanish_consistency_notes:
  - Se usa «Jordán» con artículo en el uso bíblico normalizado español.
  - Se conserva «buena»/«buen» para reproducir el adjetivo hebreo en ambas menciones.
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - «Líbano» se mantiene como nombre propio sin transliteración artificial.
  - La nota al pie se ancla en «tierra» para preservar la alternativa entre tierra/monte en el hebreo.
