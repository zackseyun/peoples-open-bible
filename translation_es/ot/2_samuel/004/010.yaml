base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/004/010.yaml
  text: When someone told me[a], saying, ‘Look, Saul is dead,’ and he thought he was bringing good news in his own eyes[b], I seized him and killed him in Ziklag—that was the reward I gave him for his news.
  footnotes:
  - marker: a
    text: Or, more formally, 'the one who told me, “Behold, Saul is dead,” while he was in his own eyes like one bringing good news.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is elliptical in Hebrew and likely ironic: David means that execution, not payment, was the only ''reward'' the messenger received for reporting Saul''s death.'
    reason: cultural_note
