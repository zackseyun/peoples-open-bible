    reason: lexical_alternative
  revision_rationale: Se corrige un calco poco natural («subieron a ella») por una expresión idiomática fiel al movimiento hacia Dalila; se ajusta פַּתִּי a «Sedúcelo», que preserva mejor el sentido de atraer/inducir para obtener información en este contexto; y se reubica la nota monetaria al sintagma que realmente explica.
