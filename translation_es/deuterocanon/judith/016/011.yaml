translation:
  language: es
  text: Entonces mis humildes[a] prorrumpieron, y mis débiles tuvieron miedo y se llenaron de pánico; alzaron su voz, y fueron derribados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alzaron un grito de guerra»; el verbo griego puede denotar un clamor fuerte con fuerza marcial en contexto.
    reason: lexical_alternative
  - marker: b
    text: 'La última cláusula, «y fueron derribados», es ambigua en este griego: puede seguir refiriéndose a los «humildes» y «débiles» de Judit, o puede implicar que sus adversarios fueron derribados.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἠλάλαξαν
  english_pob_choice: shouted
  chosen_spanish: prorrumpieron
  alternatives_spanish:
  - gritaron
  - alzaron un grito de guerra
  lexicon: LSJ
  rationale: El verbo griego puede expresar un clamor fuerte, incluso con matiz bélico. «Prorrumpieron» comunica una irrupción sonora intensa sin fijar de entrada el matiz militar; la alternativa «alzaron un grito de guerra» quedaría más interpretativa.
- source_word: οἱ ταπεινοί μου
  english_pob_choice: my lowly ones
  chosen_spanish: mis humildes
  alternatives_spanish:
  - mis bajos
  - mis abatidos
  - mis oprimidos
  lexicon: LSJ
  rationale: ταπεινοί puede abarcar lo bajo, humilde o socialmente rebajado. «Mis humildes» conserva la amplitud semántica y el posesivo, sin imponer el sentido moral de «humildes» como virtud ni estrecharlo a «oprimidos».
- source_word: οἱ ἀσθενοῦντές μου
  english_pob_choice: my weak ones
  chosen_spanish: mis débiles
  alternatives_spanish:
  - mis flacos
  - los que eran débiles entre los míos
  lexicon: LSJ
  rationale: La forma sustantivada señala a los que son débiles o endebles. «Mis débiles» es natural en español y mantiene el contraste con la primera designación; «flacos» sería menos digno y «los que eran débiles entre los míos» explicita más de lo que el griego dice.
- source_word: ἐφοβήθησαν
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - temieron
  - se asustaron
  lexicon: LSJ
  rationale: La aoristo/deponente expresa una respuesta de temor simple. «Tuvieron miedo» es claro y idiomático en español, sin intensificar innecesariamente el grado del temor.
- source_word: ἐπτοήθησαν
  english_pob_choice: panicked
  chosen_spanish: se llenaron de pánico
  alternatives_spanish:
  - quedaron aterrados
  - se turbaron
  lexicon: LSJ
  rationale: El verbo comunica sobresalto, terror o fuerte alarma. «Se llenaron de pánico» reproduce el incremento respecto de ἐφοβήθησαν y preserva la progresión emocional; «se turbaron» sería más débil.
- source_word: ὕψωσαν τὴν φωνὴν αὐτῶν
  english_pob_choice: they raised their voice
  chosen_spanish: alzaron su voz
  alternatives_spanish:
  - levantaron su voz
  - alzaron la voz
  lexicon: LSJ
  rationale: La expresión es un modismo para un clamor audible. «Alzaron su voz» sigue de cerca la frase griega y suena natural en español; el singular «voz» refleja el giro idiomático del original.
- source_word: ἀνετράπησαν
  english_pob_choice: they were overthrown
  chosen_spanish: fueron derribados
  alternatives_spanish:
  - fueron derrocados
  - fueron volteados
  - fueron derrotados
  lexicon: LSJ
  rationale: El verbo puede significar volcar, derribar o overthrow. «Fueron derribados» conserva la pasiva y la imagen de caída/ruina sin decidir de forma excesiva si el efecto es militar o general; «derrocados» sonaría demasiado político, y «derrotados» interpretaría demasiado.
theological_decisions:
- issue: Referencia del pasivo final ἀνετράπησαν
  english_pob_reading: The same subject as the immediately preceding verbs is retained in translation without interpretive expansion.
  chosen_spanish_reading: Se mantiene el sujeto implícito del griego sin añadir «sus enemigos» ni resolver la ambigüedad.
  alternative_spanish_readings:
  - fueron derribados ellos mismos
  - fueron derribados sus enemigos
  rationale: El griego es sintácticamente compacto y permite más de una relación del pasivo final. Dado el contexto de auditoría y la nota inglesa sobre la ambigüedad, la traducción española conserva la tensión sin aclararla artificialmente.
  doctrine_reference: Primacía del texto fuente y preservación de ambigüedad documentada; no forzar una lectura teológica o narrativa que el griego no explicita.
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el expediente fuente; se mantuvo la lectura griega recibida, con la misma ambigüedad final señalada por el auditor inglés.
  spanish_consistency_notes:
  - Se preservó la cadencia de dos miembros iniciales paralelos, seguida de dos verbos de temor y un cierre pasivo.
  - Se evitó traducir ἠλάλαξαν con un tecnicismo militar obligatorio; la nota ofrece la alternativa documentada.
  - Se mantuvo la ambigüedad del pasivo final sin resolverla por contexto inferido más allá del texto dado.
  - La puntuación española refleja la progresión retórica del verso y conserva el paralelismo del original.
