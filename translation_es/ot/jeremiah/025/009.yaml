  text: הִנְ/נִ֣י שֹׁלֵ֡חַ וְ/לָקַחְתִּי֩ אֶת כָּל מִשְׁפְּח֨וֹת צָפ֜וֹן נְאֻם יְהוָ֗ה וְ/אֶל נְבֽוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּבֶל֮ עַבְדִּ/י֒ וַ/הֲבִ֨אֹתִ֜י/ם עַל הָ/אָ֤רֶץ הַ/זֹּאת֙ וְ/עַל יֹ֣שְׁבֶ֔י/הָ וְ/עַ֛ל כָּל הַ/גּוֹיִ֥ם הָ/אֵ֖לֶּה סָבִ֑יב וְ/הַ֣חֲרַמְתִּ֔י/ם וְ/שַׂמְתִּי/ם֙ לְ/שַׁמָּ֣ה וְ/לִ/שְׁרֵקָ֔ה וּ/לְ/חָרְב֖וֹת עוֹלָֽם־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/025/009.yaml
  text: Look[a], I am sending for and taking all the clans of the north, declares Yahweh, and Nebuchadnezzar king of Babylon, my servant, and I will bring them against this land and against its inhabitants and against all these surrounding nations[b]. I will devote them to destruction and make them a horror, a hissing[c], and everlasting ruins.
  footnotes:
  - marker: a
    text: Or 'I will utterly destroy them'; the Hebrew verb can denote putting people or things under the ban, that is, devoting them to destruction.
    reason: lexical_alternative
  - marker: b
    text: '''My servant'' here identifies Nebuchadnezzar as an instrument of the LORD''s purpose, not necessarily as a faithful worshiper.'
    reason: cultural_note
  - marker: c
    text: Or 'a desolation' for 'a horror.'
    reason: lexical_alternative
