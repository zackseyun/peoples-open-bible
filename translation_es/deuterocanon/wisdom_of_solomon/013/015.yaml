lexical_decisions:
- source_word: ποιήσας
  english_pob_choice: after making
  chosen_spanish: y después de hacer
  alternatives_spanish:
  - habiendo hecho
  - y habiendo hecho
  lexicon: BDAG
  rationale: El participio aoristo anterior a la acción principal se expresa naturalmente en español con una secuencia temporal previa; «y después de hacer» conserva la relación de anterioridad sin sonar rígido.
- source_word: αὐτῷ
  english_pob_choice: for it
  chosen_spanish: le
  alternatives_spanish:
  - para ello
  - para él
  lexicon: BDAG
  rationale: El referente es el ídolo o imagen del contexto, no una persona; en español, el dativo se puede verter con clítico implícito en «hacerle una morada», manteniendo la referencia neutra del objeto sin forzar un pronombre explícito.
- source_word: αὐτοῦ ἄξιον
  english_pob_choice: fit for it
  chosen_spanish: adecuada
  alternatives_spanish:
  - digna de él
  - apropiada
  lexicon: LSJ
  rationale: Ἄξιον puede ser «digno/adecuado/apropiado». En este contexto de una morada para un objeto fabricado, «adecuada» comunica bien la idea de conveniencia sin introducir una valoración más solemne que la del griego.
- source_word: οἴκημα
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - vivienda
  - casa
  - habitáculo
  lexicon: LSJ
  rationale: «Morada» mantiene el sentido de lugar destinado a habitar y suena natural en español bíblico; conserva además el matiz irónico de dar residencia a un ídolo.
- source_word: ἐν τοίχῳ
  english_pob_choice: in a wall
  chosen_spanish: en un muro
  alternatives_spanish:
  - en la pared
  - dentro de un muro
  lexicon: LSJ
  rationale: «Muro» es fiel al valor locativo y algo más solemne que «pared», adecuado al registro bíblico; además puede sugerir una hornacina o fijación en la estructura.
- source_word: ἔθηκεν
  english_pob_choice: he set
  chosen_spanish: la puso
  alternatives_spanish:
  - la colocó
  - la situó
  lexicon: BDAG
  rationale: «Puso»/«la puso» es una solución directa y clara para el verbo de colocación; el pronombre femenino concuerda con «morada», no con el ídolo, y evita ambigüedad en español.
- source_word: ἀσφαλισάμενος
  english_pob_choice: securing
  chosen_spanish: asegurándola
  alternatives_spanish:
  - fijándola
  - sujetándola
  lexicon: BDAG
  rationale: El participio de medio expresa la acción concomitante de dejarla firme; «asegurándola» reproduce bien la idea de hacerla segura y estable sin especificar un mecanismo no dado por el texto.
- source_word: σιδήρῳ
  english_pob_choice: with iron
  chosen_spanish: con hierro
  alternatives_spanish:
  - por medio de hierro
  - con una sujeción de hierro
  lexicon: LSJ
  rationale: El dativo instrumental se vierte naturalmente como «con hierro», preservando la concisión griega y sin añadir detalles técnicos no presentes en el texto.
theological_decisions:
- issue: Referencia neutra al objeto idolátrico
  english_pob_reading: neuter 'it' throughout
  chosen_spanish_reading: tratamiento implícitamente neutro del objeto, sin personificarlo
  alternative_spanish_readings:
  - él/ella
  - le
  rationale: El contexto es la fabricación de una imagen o ídolo. En español, la oración puede mantenerse neutra mediante sustantivos y concordancias, evitando atribuirle personalidad al objeto y conservando la crítica a la idolatría.
  doctrine_reference: Principio de primacía del texto fuente sobre la tradición de traducción; preservar el sentido llano del original.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; la principal decisión en español fue resolver el participio temporal y la relación del dativo con un referente no personal, manteniendo el tono bíblico sin introducir una interpretación excesiva.
  spanish_consistency_notes:
  - Se prefirió «morada» sobre «casa» para conservar el registro y el matiz de lugar habitado.
  - «Muro» se mantuvo por fidelidad y por la posible imagen de una hornacina o nicho en la pared.
  - La concordancia de «la» se refiere a «morada», no al objeto idolátrico, evitando confusión gramatical en español.
  - Se evitó «SEÑOR» y otros términos no pertinentes; no hay aquí nombres divinos ni títulos cristológicos.
