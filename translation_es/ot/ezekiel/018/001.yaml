translation:
  language: es
  text: 'Y vino a mí la palabra de Yahvé, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El hebreo waw-consecutivo introduce una fórmula narrativa/secuencial. En español, «Y vino» conserva la llegada efectiva del habla divina y suena natural en una fórmula profética, sin debilitarse en un giro más abstracto como «sucedió».
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר־יְהוָה, «la palabra» reproduce el valor técnico y recurrente del hebreo. «Mensaje» es posible, pero pierde parte de la fijación formal de la fórmula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como «Yahvé» conforme al estándar del proyecto en español, preservando el nombre propio divino en lugar de reemplazarlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el profeta. «A mí» es la equivalencia directa y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: Este infinitivo constructo introduce el discurso directo siguiente. «Diciendo:» reproduce de forma transparente la apertura de la cita en estilo bíblico español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; el proyecto evita la sustitución por un título. «Yahvé» mantiene el nombre personal de Dios con una forma española ya establecida en el POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene una sola nota para explicar el Tetragrámaton y no introduce variantes textuales. La propuesta española sigue ese mismo perfil: conserva la fórmula profética, traduce el nombre divino de acuerdo con la convención POB en español y no añade notas innecesarias.'
  spanish_consistency_notes:
  - «Yahvé» se usa de manera consistente para יְהוָה, en continuidad con la convención del proyecto.
  - «la palabra» conserva la fórmula profética sin convertirla en una paráfrasis.
  - La puntuación con dos puntos después de «diciendo» prepara la cita directa de manera natural en español.
