  text: וִ֠/יהִי כְּֽ/שָׁמְעֲ/ךָ֞ אֶת ק֤וֹל הַ/צְּעָדָה֙ בְּ/רָאשֵׁ֣י הַ/בְּכָאִ֔ים אָ֖ז תֵּצֵ֣א בַ/מִּלְחָמָ֑ה כִּֽי יָצָ֤א הָֽ/אֱלֹהִים֙ לְ/פָנֶ֔י/ךָ לְ/הַכּ֖וֹת אֶת מַחֲנֵ֥ה פְלִשְׁתִּֽים־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/014/015.yaml
  text: And when you hear the sound of marching in the tops of the balsam trees[a], then go out to battle, for God has gone out before you to strike down the camp of the Philistines.
