translation:
  language: es
  text: Su refugio[a] era en Salem[b], y su morada en Sión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tabernáculo', 'cabaña' o 'pabellón' para 'refugio'.
    reason: lexical_alternative
  - marker: b
    text: Salem se identifica tradicionalmente con Jerusalén; el versículo pone en paralelo Salem y Sión como nombres del lugar de habitación de Dios.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - fue
  lexicon: HALOT
  rationale: El verbo היה aquí funciona como copulativo/existencial para introducir la ubicación de la morada divina. En español, 'estaba' expresa con naturalidad ese estado o localización sin forzar un matiz perfectivo fuerte como 'fue'.
- source_word: בְשָׁלֵם
  english_pob_choice: in Salem
  chosen_spanish: en Salem
  alternatives_spanish:
  - en Jerusalén
  lexicon: HALOT
  rationale: El hebreo conserva el nombre propio Salem; el POB en inglés lo mantiene en la línea principal y solo explica su identificación tradicional con Jerusalén en nota. En español se preserva el nombre directo para no resolver interpretativamente el texto poético.
- source_word: סֻכּוֹ
  english_pob_choice: his shelter
  chosen_spanish: su refugio
  alternatives_spanish:
  - su tabernáculo
  - su cabaña
  - su pabellón
  lexicon: HALOT
  rationale: סֻכּוֹ viene de סֻכָּה y remite a una estructura de resguardo. 'Refugio' comunica bien la idea básica en español contemporáneo y evita importar de entrada un sentido cultual más técnico que el hebreo no exige aquí.
- source_word: וּמְעוֹנָתוֹ
  english_pob_choice: and his dwelling place
  chosen_spanish: y su morada
  alternatives_spanish:
  - y su habitación
  - y su residencia
  lexicon: HALOT
  rationale: מְעוֹנָה designa un lugar de habitación. 'Morada' es una opción natural y digna en español bíblico contemporáneo, y conserva el paralelismo con 'refugio' sin perder el sentido locativo.
- source_word: בְצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: צִיּוֹן es el nombre propio tradicional en español como 'Sion'. Mantener esa forma facilita la lectura eclesial en español sin alterar el referente.
theological_decisions:
- issue: Relación poética y teológica entre Salem y Sion
  english_pob_reading: Render both place names distinctly without collapsing them into a single interpreted location in the main text.
  chosen_spanish_reading: 'Conservar ambos topónimos de manera distinta: Salem y Sion.'
  alternative_spanish_readings:
  - Traducir Salem como Jerusalén en el texto principal
  rationale: El versículo crea un paralelismo entre Salem y Sion como designaciones del lugar de habitación divina. La traducción debe preservar esa textura poética y no resolverla en el cuerpo principal; la identificación tradicional puede explicarse en nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el último pase indicó que no eran necesarios cambios, con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo 'Sion' en lugar de 'Zion' por ser la forma española tradicional y ampliamente reconocible.
  - Se evitó 'SEÑOR' porque el hebreo aquí no contiene el tetragrámaton; el versículo habla de la morada de Dios de forma poética, no de una sustitución del nombre divino.
  - '''Refugio'' y ''morada'' conservan el paralelismo del hebreo sin sobrecargar ''sucá'' con una terminología cultual específica.'
