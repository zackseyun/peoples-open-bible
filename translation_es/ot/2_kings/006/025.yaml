base_translation:
  language: en
  yaml_path: translation/ot/2_kings/006/025.yaml
  text: And there was a great famine in Samaria; and behold[a], they were besieging it until a donkey’s head was eighty pieces of silver, and a fourth of a kab of dove’s dung was five pieces of silver.
  footnotes:
