revisions:
- from: Durante siete días comerán pan sin levadura[a]. Pero el primer día harán desaparecer la levadura de sus casas, porque todo el que coma algo leudado[b], esa persona será eliminada de Israel, desde el primer día hasta el séptimo día.
  to: Durante siete días comerán pan sin levadura. Pero el primer día quitarán[a] la levadura de sus casas, porque todo el que coma algo con levadura, esa persona será excluida de Israel[b], desde el primer día hasta el séptimo día.
  rationale: Se corrige la ubicación y el contenido de las notas para que coincidan con el hebreo y con el rastro auditado del POB inglés. Se reemplaza 'será eliminada' por 'será excluida de Israel' para preservar mejor la tensión legal de וְנִכְרְתָה sin imponer una interpretación más fuerte de la que permite el texto. También se simplifica חָמֵץ como 'algo con levadura', más claro en español general.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:25:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: mandato de comer panes sin levadura por siete días, instrucción específica del primer día de quitar la levadura de las casas, y sanción para quien coma algo leudado durante ese período. Sin embargo, no preserva de manera adecuada dos decisiones auditadas del POB: la nota al pie [a] fue anclada al término equivocado y sustituyó la alternativa sobre תַשְׁבִּיתוּ por una nota sobre מַצּוֹת; y la sanción וְנִכְרְתָה se tradujo como ''será eliminada'', lo cual inclina demasiado hacia destrucción/muerte en vez de conservar la expresión legal abierta ''será excluida/cortada'' documentada por el POB.'
  spanish_quality_summary: El español es claro y bastante natural, pero 'leudado' suena menos ampliamente accesible que 'con levadura' en un registro eclesial general, y 'será eliminada' resulta más brusco y menos fiel al matiz jurídico. También conviene reubicar la nota [a] al verbo correspondiente para que el lector no asocie erróneamente la alternativa con 'pan sin levadura'.
  glossary_alignment: No hay conflicto con terminología principal del proyecto (no aparecen Yahvé/Mesías/etc.). 'Pan sin levadura' para מַצּוֹת y 'levadura' para שְּׂאֹר están bien. Para חָמֵץ, 'algo con levadura' comunica mejor el alcance amplio que el inglés POB explicitó. Para וְנִכְרְתָה, la mejor alineación con la decisión teológica auditada es 'será excluida de Israel' con una nota que preserve el trasfondo legal de 'ser cortada'.
  issues:
  - severity: high
    issue: La nota [a] está colocada en 'pan sin levadura' pero su contenido corresponde a תַשְׁבִּיתוּ ('harán cesar/quitar').
    rationale: Esto altera el rastro de auditoría y confunde qué elemento del hebreo tiene la alternativa léxica preservada por el POB inglés.
  - severity: high
    issue: '''Será eliminada'' para וְנִכְרְתָה sobreinterpreta la sanción.'
    rationale: El POB inglés retiene la fórmula legal abierta 'shall be cut off' precisamente para no decidir entre expulsión, muerte o juicio divino. 'Eliminada' en español se inclina demasiado a aniquilación o muerte.
  - severity: medium
    issue: La nota [b] del borrador no corresponde a la nota teológica del POB sobre la sanción legal.
    rationale: El inglés ya documentó para חָמֵץ el sentido en el texto mismo ('anything leavened'); la nota preservada era sobre 'shall be cut off'. El español debería reflejar esa prioridad auditada.
  - severity: low
    issue: '''Algo leudado'' es comprensible, pero menos neutral y ampliamente claro que ''algo con levadura''.'
    rationale: En español general latinoamericano eclesial, 'con levadura' evita regionalismo o tecnicismo culinario innecesario y mantiene el alcance amplio del hebreo.
  revised_spanish_text: Durante siete días comerán pan sin levadura. Pero el primer día quitarán[a] la levadura de sus casas, porque todo el que coma algo con levadura, esa persona será excluida de Israel[b], desde el primer día hasta el séptimo día.
  revised_footnotes:
