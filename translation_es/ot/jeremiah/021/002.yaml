translation:
  language: es
  text: Por favor, consulta a Yahvé por nosotros, porque Nabucodonosor[a], rey de Babilonia, está combatiendo contra nosotros. Tal vez Yahvé actúe por nosotros conforme a todas sus obras maravillosas[b], para que él se retire de nosotros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Nabucodrezar', reflejando más de cerca la grafía hebrea.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''conforme a todas sus obras maravillosas''; es decir, según el patrón de los hechos extraordinarios de salvación que Yahvé hizo en el pasado.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'y él subirá de sobre nosotros', un modismo que aquí significa que el rey atacante se retirará de su asedio contra nosotros.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָשׁ נָא
  english_pob_choice: Please inquire
  chosen_spanish: Por favor, consulta
  alternatives_spanish:
  - Por favor, inquiere
  - Por favor, busca
  lexicon: HALOT
  rationale: דרש con נָא aquí expresa una petición cortés de buscar respuesta de Dios mediante intercesión profética. En español, 'consultar' comunica bien la idea de pedir orientación divina sin sonar mecánico.
- source_word: בַעֲדֵנוּ
  english_pob_choice: on our behalf
  chosen_spanish: en nuestro favor
  alternatives_spanish:
  - por nosotros
  - a nuestro favor
  lexicon: HALOT
  rationale: La preposición בעד tiene matiz representativo/intercesor. 'En nuestro favor' conserva ese sentido natural en español y evita perder la dimensión de intercesión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Es la forma de nombre divino preferida en el texto principal, en lugar de una sustitución como ''SEÑOR''.'
- source_word: נִלְחָם עָלֵינוּ
  english_pob_choice: is fighting against us
  chosen_spanish: está combatiendo contra nosotros
  alternatives_spanish:
  - está luchando contra nosotros
  - está haciendo guerra contra nosotros
  lexicon: HALOT
  rationale: El participio describe una acción hostil en curso. 'Combatiendo' suena natural en español bíblico contemporáneo y conserva la fuerza militar del hebreo.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Tal vez
  alternatives_spanish:
  - Quizá
  - Puede que
  lexicon: HALOT
  rationale: '''Tal vez'' conserva la incertidumbre esperanzada del ruego sin coloquializar en exceso.'
- source_word: יַעֲשֶׂה יְהוָה אוֹתָנוּ
  english_pob_choice: the LORD will act for us
  chosen_spanish: Yahvé actúe por nosotros
  alternatives_spanish:
  - Yahvé obre por nosotros
  - Yahvé haga por nosotros
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático amplio; el contexto pide intervención favorable de Dios. 'Actúe por nosotros' mantiene la intención sin forzar una literalidad extraña en español.
- source_word: כְּכָל נִפְלְאֹתָיו
  english_pob_choice: according to all his wondrous acts
  chosen_spanish: conforme a todas sus obras maravillosas
  alternatives_spanish:
  - según todas sus maravillas
  - de acuerdo con todos sus actos maravillosos
  lexicon: HALOT
  rationale: נִפְלְאֹתָיו son obras extraordinarias de salvación. 'Obras maravillosas' transmite bien el carácter de actos divinos portentosos y mantiene el vínculo con la historia de salvación.
- source_word: וְיַעֲלֶה מֵעָלֵינוּ
  english_pob_choice: so that he will withdraw from us
  chosen_spanish: y él se retire de sobre nosotros
  alternatives_spanish:
  - y él se aparte de nosotros
  - y él se retire de nosotros
  lexicon: HALOT
  rationale: עלה מן/מעל en contexto militar expresa retirada o levantamiento del sitio. 'De sobre nosotros' conserva la imagen espacial del hebreo y el valor de desamparo/asedio.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nabucodreazar
  lexicon: HALOT
  rationale: Se usa la forma española asentada y reconocible del nombre propio, sin perder la identificación con el rey de Babilonia.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, se traduce como 'Yahvé' y no se sustituye por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Implicit subject of וְיַעֲלֶה מֵעָלֵינוּ
  english_pob_reading: the clause refers to Nebuchadnezzar/Babylon withdrawing from Jerusalem
  chosen_spanish_reading: la cláusula expresa que el atacante se retire del sitio sobre nosotros
  alternative_spanish_readings:
  - que él se aparte de nosotros
  - que él se retire de nosotros
  rationale: La lógica del ruego exige entender que el agresor babilonio se aparta del asedio. En español conviene explicitar el valor de retirada militar sin eliminar la imagen del hebreo.
  doctrine_reference: 'POB translation principle: preserve idiom with readable equivalence'
translation_notes:
  revision_awareness: 'Se corrigió la omisión del ancla de nota: ahora el marcador [a] aparece en el texto principal. Además, se mantuvo el sentido idiomático de ''actuar por nosotros'' y la retirada militar implícita en ''subir de sobre nosotros''.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' como forma principal del nombre divino, consistente con el estándar del proyecto.
  - '''Nabucodonosor'' se adopta como nombre propio español convencional para máxima legibilidad.'
  - 'Se conserva una equivalencia óptima: fidelidad al hebreo con español fluido y publicable.'
  - Los marcadores de nota presentes en el texto coinciden exactamente con las notas incluidas.
