  text: אֵ֤ל יְהוָה֮ וַ/יָּ֪אֶר לָ֥/נוּ אִסְרוּ חַ֥ג בַּ/עֲבֹתִ֑ים עַד קַ֝רְנ֗וֹת הַ/מִּזְבֵּֽחַ׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/118/027.yaml
  text: Yahweh is God[a], and he has given light to us. Bind the festal sacrifice with cords[d][c][b], up to the horns of the altar.
  footnotes:
  - marker: a
    text: Or 'and he has shone on us.' The Hebrew verb can mean either that the LORD gave light to his people or that he shone upon them with favor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Bind the חג.' The noun usually means 'festival' or 'feast,' but here many understand it to refer by association to the festival sacrifice; others take the line as referring to a festal procession.
    reason: alternative_reading
  - marker: c
    text: Or 'with thick ropes'; some interpret the word as 'branches,' but 'cords/ropes' is the more likely lexical sense.
    reason: lexical_alternative
  - marker: d
    text: Or 'up to the horns of the altar'.
    reason: previous_rendering
