translation:
  language: es
  text: Si una persona peca y comete una infidelidad contra Yahvé, engañando a su prójimo sobre un depósito, o una prenda[a], o mediante robo, o si ha oprimido a su prójimo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «algo puesto en su mano»; la expresión también puede referirse a una garantía confiada a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - alguien
  - un alma
  lexicon: HALOT
  rationale: En lenguaje legal, נֶפֶשׁ designa al individuo responsable, no el alma en sentido interior. «Una persona» conserva el sujeto singular con naturalidad en español.
- source_word: כִּי תֶחֱטָא
  english_pob_choice: If ... sins
  chosen_spanish: Si ... peca
  alternatives_spanish:
  - Cuando ... peca
  - Si ... comete pecado
  lexicon: HALOT
  rationale: El valor condicional casuístico de כִּי + imperfecto se expresa bien con «si». «Peca» mantiene la brevedad jurídica del hebreo.
- source_word: וּמָעֲלָה מַעַל
  english_pob_choice: and commits a breach of faith
  chosen_spanish: y comete una infidelidad
  alternatives_spanish:
  - y actúa infielmente
  - y comete una traición
  lexicon: HALOT
  rationale: La construcción cognada intensifica la idea de infidelidad/traición. «Infidelidad» conserva la fuerza relacional y de pacto mejor que un tecnicismo más opaco.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra el Señor
  - frente a Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: «Yahvé» en el texto principal. «Contra» preserva la idea de responsabilidad vertical explícita en el hebreo.'
- source_word: וְכִחֵשׁ
  english_pob_choice: by deceiving
  chosen_spanish: engañando
  alternatives_spanish:
  - mintiendo
  - tratando falsamente
  lexicon: HALOT
  rationale: El verbo puede abarcar negar, mentir o engañar. Aquí «engañando» comunica el fraude práctico en el marco legal sin reducirlo solo a la mentira verbal.
- source_word: בַּעֲמִיתוֹ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su compañero
  lexicon: HALOT
  rationale: עָמִית es el prójimo o compañero de comunidad. «Prójimo» es idiomático y mantiene el carácter relacional y legal.
- source_word: בְּפִקָּדוֹן
  english_pob_choice: about a deposit
  chosen_spanish: acerca de un depósito
  alternatives_spanish:
  - respecto de un depósito
  - en cuanto a un depósito
  lexicon: HALOT
  rationale: El sustantivo alude a bienes confiados para custodia. «Depósito» es la equivalencia breve y clara para este contexto legal.
- source_word: בִתְשׂוּמֶת יָד
  english_pob_choice: a pledge
  chosen_spanish: una prenda
  alternatives_spanish:
  - un objeto puesto en su mano
  - un empeño
  lexicon: HALOT
  rationale: La expresión es discutida; el audit trail inglés preserva la alternativa «a pledge» y una glosa más amplia. En español, «prenda» mantiene el posible sentido de garantía/objeto entregado, aunque el hebreo admite otras lecturas.
- source_word: בְגָזֵל
  english_pob_choice: through robbery
  chosen_spanish: mediante robo
  alternatives_spanish:
  - por robo
  - a causa de robo
  lexicon: HALOT
  rationale: El sustantivo denota robo o toma violenta. «Mediante robo» encaja en la serie preposicional y suena natural en español.
- source_word: עָשַׁק אֶת עֲמִיתוֹ
  english_pob_choice: if he has oppressed his neighbor
  chosen_spanish: o si ha oprimido a su prójimo
  alternatives_spanish:
  - o si ha extorsionado a su prójimo
  - o si ha defraudado a su prójimo
  lexicon: HALOT
  rationale: עָשַׁק cubre oprimir, explotar o extorsionar. «Oprimido» conserva el peso moral amplio sin estrechar indebidamente el sentido económico.
theological_decisions:
- issue: Cómo expresar que una falta contra el prójimo es a la vez una infidelidad contra Yahvé
  english_pob_reading: against Yahweh
  chosen_spanish_reading: contra Yahvé
  alternative_spanish_readings:
  - con respecto a Yahvé
  - contra el Señor
  rationale: El hebreo afirma explícitamente que el engaño al prójimo constituye una infidelidad contra Yahvé. La traducción conserva esa dimensión vertical sin explicitar más de lo que dice el texto.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Cómo verter el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: 'Se aplica el estándar del proyecto para el nombre del pacto: «Yahvé» en el texto principal, manteniendo accesible y reconocible la referencia al Tetragrámaton.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La base inglesa fue revisada para preferir «a pledge» en lugar de una glosa más amplia; por eso el español mantiene «prenda» como opción directa, sin borrar la ambigüedad léxica señalada por el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יהוה.
  - «Prójimo» traduce consistentemente עָמִית en un contexto legal-relacional.
  - La puntuación conserva el estilo casuístico de una cláusula legal extensa sin añadir palabras interpretativas innecesarias.
  - El pie de nota marca la ambigüedad de תְשׂוּמֶת יָד sin imponer una sola lectura.
