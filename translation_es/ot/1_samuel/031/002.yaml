translation:
  language: es
  text: Los filisteos alcanzaron a Saúl y a sus hijos[a], y los filisteos derribaron[b] a Jonatán, a Abinadab y a Malqui-súa, los hijos de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dieron alcance a Saúl y a sus hijos» o «los persiguieron de cerca hasta alcanzarlos». El verbo hebreo comunica una persecución estrecha que llega al objetivo.
    reason: lexical_alternative
  - marker: b
    text: O «mataron a Jonatán, a Abinadab y a Malqui-súa». El verbo hebreo literalmente significa «golpearon» o «hirieron», pero en este contexto de batalla probablemente implica muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְבְּקוּ
  english_pob_choice: overtook
  chosen_spanish: alcanzaron
  alternatives_spanish:
  - dieron alcance a
  - persiguieron de cerca a
  - alcanzaron y dieron alcance a
  lexicon: HALOT
  rationale: El verbo hebreo expresa una persecución cercana que llega a alcanzar al objetivo. En español, «alcanzaron» comunica de forma natural ese sentido militar sin volverlo demasiado interpretativo.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: HALOT
  rationale: Es el etnónimo habitual en español bíblico y conserva la referencia al pueblo enemigo sin necesidad de transliteración.
- source_word: אֶת שָׁאוּל וְאֶת בָּנָיו
  english_pob_choice: Saul and his sons
  chosen_spanish: a Saúl y a sus hijos
  alternatives_spanish:
  - a Saúl y a sus hijos varones
  - a Saúl y a sus niños
  lexicon: HALOT
  rationale: בָּנָיו significa específicamente «sus hijos», y el contexto inmediato nombra a tres varones concretos; por eso no conviene ampliar a «hijos varones» en el texto principal.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - derribaron
  - mataron
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «golpear/hirieron». En este contexto bélico implica daño mortal, pero el español principal mantiene la literalidad básica sin decidir de más; la implicación letal queda clara por el relato.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: standard Spanish biblical name usage
  rationale: «Jonatán» es la forma natural y reconocible en español bíblico, manteniendo el nombre propio sin anglicismo.
- source_word: אֲבִינָדָב
  english_pob_choice: Abinadab
  chosen_spanish: Abinadab
  alternatives_spanish:
  - Abinadab
  lexicon: standard Spanish biblical name usage
  rationale: La transliteración coincide con el uso habitual en español y no requiere adaptación adicional.
- source_word: מַלְכִּי שׁוּעַ
  english_pob_choice: Malchi-shua
  chosen_spanish: Malqui-súa
  alternatives_spanish:
  - Malquisúa
  - Malki-súa
  lexicon: standard Spanish biblical name usage
  rationale: Se conserva la forma compuesta del nombre. La adaptación con guion ayuda a reflejar la unidad del nombre sin perder legibilidad en español.
- source_word: בְּנֵי שָׁאוּל
  english_pob_choice: the sons of Saul
  chosen_spanish: hijos de Saúl
  alternatives_spanish:
  - los hijos de Saúl
  - los hijos varones de Saúl
  lexicon: HALOT
  rationale: La frase appositiva identifica a los tres nombres anteriores. En español, la inversión «hijos de Saúl» funciona de modo natural y mantiene la relación posesiva del hebreo.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo con la ayuda del audit trail inglés, conservando la tensión lexical de וַיַּדְבְּקוּ y וַיַּכּוּ mediante un verbo natural en español y notas que preservan las alternativas interpretativas. No se reportan revisiones aplicadas en el expediente inglés más reciente.
  spanish_consistency_notes:
  - Se prefirió «los filisteos» y no una transliteración, por ser el etnónimo asentado en español.
  - Se usó «Jonatán» y «Malqui-súa» para armonizar con el uso bíblico español y mantener inteligibilidad.
  - La nota sobre «hirieron» preserva la ambigüedad entre golpe físico y resultado letal sin imponer una traducción más fuerte en el texto principal.
  - El orden de nombres y la frase final «hijos de Saúl» siguen de cerca la estructura del hebreo, como en el inglés auditado.
