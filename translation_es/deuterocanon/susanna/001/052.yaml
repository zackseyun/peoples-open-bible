translation:
  language: es
  text: 'Pero cuando fueron separados, uno del otro, llamó a uno de ellos y le dijo: «Tú, que has envejecido en el mal[a], ahora han venido sobre ti los pecados que venías haciendo antes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse más literalmente: «Tú, anciano, envejecido en el mal». La redacción principal conserva el tono de reproche del vocativo griego.'
    reason: lexical_alternative
  - marker: b
    text: El griego transmitido aquí termina en τὸ, lo que sugiere una continuación en la palabra o expresión siguiente; por eso la traducción refleja el sentido probable de «antes» sin pretender cerrar artificialmente el texto.
    reason: textual_variant
lexical_decisions:
- source_word: διεχωρίσθησαν
  english_pob_choice: had been separated
  chosen_spanish: fueron separados
  alternatives_spanish:
  - habían sido separados
  - se separaron
  lexicon: BDAG
  rationale: El aoristo pasivo expresa que la separación les ocurrió; en español, «fueron separados» transmite bien la pasividad y mantiene la naturalidad narrativa sin añadir interpretación temporal excesiva.
- source_word: εἷς ἀπὸ τοῦ ἑνός
  english_pob_choice: one from the other
  chosen_spanish: uno de otro
  alternatives_spanish:
  - uno del otro
  - cada uno del otro
  lexicon: LSJ
  rationale: La construcción subraya la separación de los dos ancianos. «Uno de otro» conserva la brevedad del griego y su sentido relacional, con una formulación natural en español bíblico contemporáneo.
- source_word: ἐκάλεσεν τὸν ἕνα αὐτῶν
  english_pob_choice: he called one of them
  chosen_spanish: llamó a uno de ellos
  alternatives_spanish:
  - llamó a uno de ellos aparte
  - convocó a uno de ellos
  lexicon: BDAG
  rationale: «Llamó» es suficiente y fiel al verbo griego; «convocó» sería más fuerte de lo que exige el texto. No se explicita «aparte» porque la separación ya quedó dicha antes.
- source_word: Πεπαιλαιωμένε
  english_pob_choice: You who have grown old
  chosen_spanish: Tú, que has envejecido
  alternatives_spanish:
  - Viejo
  - Hombre envejecido
  lexicon: LSJ
  rationale: El participio perfecto vocativo admite un valor adjetival o descriptivo. Elegí una paráfrasis leve en español que conserve la fuerza de reproche y la idea de estado adquirido sin reducirlo a una mera etiqueta nominal.
- source_word: ἡμερῶν κακῶν
  english_pob_choice: in evil days
  chosen_spanish: en el mal
  alternatives_spanish:
  - en días malos
  - en días de mal
  lexicon: LSJ
  rationale: El griego es compacto y el audit trail inglés revisó la frase hacia una correspondencia más estricta con el valor moral, no cronológico, de κακῶν. En español, «en el mal» preserva esa tensión y evita introducir «días» como elemento explícito que el contexto no requiere.
- source_word: νῦν ἥκασιν αἱ ἁμαρτίαι σου
  english_pob_choice: now your sins have come upon you
  chosen_spanish: ahora han llegado sobre ti los pecados
  alternatives_spanish:
  - ahora tus pecados han llegado
  - ahora tus pecados han caído sobre ti
  lexicon: BDAG
  rationale: «Han llegado sobre ti» reproduce la metáfora de ἥκασιν con una imagen clara en español. Se mantiene el plural «pecados» para respetar la carga acusatoria del texto.
- source_word: ἃς ἐποίεις
  english_pob_choice: which you were doing
  chosen_spanish: que venías haciendo
  alternatives_spanish:
  - que hacías
  - que estabas haciendo
  lexicon: BDAG
  rationale: El imperfecto indica acción continuada o repetida en el pasado. «Venías haciendo» comunica ese valor aspectual con más precisión que un pasado simple, sin sonar excesivamente técnico.
- source_word: τὸ
  english_pob_choice: before
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - en otro tiempo
  lexicon: LSJ
  rationale: El fragmento griego transmitido queda cortado y sugiere una continuación adverbial. «Antes» cubre la idea recuperable de forma sobria y transparente, siguiendo la cautela textual del audit trail inglés.
theological_decisions:
- issue: Alcance moral de la reprensión
  english_pob_reading: The rebuke is rendered as an accusation of long-standing wickedness rather than merely advanced age.
  chosen_spanish_reading: La reprensión se entiende como denuncia de una vida persistente en el mal, no solo como mención de vejez.
  alternative_spanish_readings:
  - Un simple reproche por ser anciano
  - 'Un vocativo neutral: «anciano de días malos»'
  rationale: El contexto judicial y condenatorio del pasaje exige conservar la acusación moral implícita en la expresión. La traducción española mantiene la ambigüedad entre edad y estado moral, pero deja claro que el peso recae en el mal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic.'
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión que ajustó la frase inicial hacia una correspondencia más cercana con el griego («grown old in evil») y reordenó la cláusula final para reflejar mejor el imperfecto y el cierre fragmentario. La versión española sigue esa línea: evita introducir «días» como elemento explícito, conserva el carácter incompleto del final con una nota textual, y preserva la acusación moral del vocativo.'
  spanish_consistency_notes:
  - Se usa «pecados» para αἱ ἁμαρτίαι σου, manteniendo el plural acusatorio.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; no hay nombre divino en este versículo.
  - «en el mal» sigue la preferencia de no desplazar sin necesidad la carga moral a una imagen más explicativa.
  - Las comillas angulares y la puntuación siguen uso español, con nota textual enlazada por marcador en el lugar correspondiente.
