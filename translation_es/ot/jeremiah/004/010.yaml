revisions:
- from: 'Entonces dije[a]: «¡Ah, Señor Yahvé, ciertamente has engañado por completo a este pueblo y a Jerusalén, diciendo[b]: “Tendréis paz”, cuando la espada ha llegado hasta el alma».'
  to: 'Entonces dije: «¡Ah[a], Señor Yahvé, ciertamente has engañado por completo a este pueblo y a Jerusalén, diciendo: “Ustedes tendrán paz”, cuando la espada ha llegado hasta el alma[b]».'
  rationale: Se corrigieron las anclas de las notas para que correspondan a las palabras que realmente explican («¡Ah!» y «alma»), y se cambió «Tendréis paz» por «Ustedes tendrán paz» para ajustarlo al español neutral latinoamericano sin perder la segunda persona plural del hebreo.
  reviewer_model: gpt-5.4
