translation:
  language: es
  text: 'Yahvé dijo a Moisés y a Aarón: «Este es el estatuto de la Pascua: ningún extranjero[a] comerá de ella»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hijo de extranjería». La frase designa a un extranjero, es decir, a alguien fuera de la comunidad del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo el criterio POB de transliterarlo en lugar de sustituirlo por un título. En español, «Yahvé» es la forma más reconocible y digna para esa transliteración.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - manifestó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se expresa naturalmente con «dijo» en español llano y directo, sin sobrecargar el texto.
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Esta
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula identificativa; en español la cópula se expresa con naturalidad como «Esta es».
- source_word: חֻקַּת
  english_pob_choice: statute
  chosen_spanish: estatuta
  alternatives_spanish:
  - estatuto
  - ordenanza
  - decreto
  lexicon: HALOT
  rationale: Se buscó conservar el tono jurídico formal de חֻקָּה. «Estatuta» refleja el sustantivo legal del original y evita diluir la fuerza normativa; aunque menos común que otras opciones, mantiene mejor la correspondencia léxica con el término fuente.
- source_word: הַפָּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua de la liberación
  - el sacrificio de la Pascua
  lexicon: HALOT
  rationale: Aquí el término designa la celebración/institución de la Pascua en su marco inmediato. «La Pascua» es la forma más clara y fiel en español, sin añadir especificaciones no presentes en el versículo.
- source_word: בֶּן נֵכָר
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - persona extranjera
  - hijo de extranjería
  lexicon: HALOT
  rationale: El giro hebreo literalmente es «hijo de extranjería», pero el sentido idiomático es «forastero/extranjero». «Extranjero» comunica con claridad la exclusión legal sin interpretar más allá del texto.
- source_word: לֹא יֹאכַל
  english_pob_choice: may eat
  chosen_spanish: comerá
  alternatives_spanish:
  - podrá comer
  - ha de comer
  - comerá de
  lexicon: HALOT
  rationale: En una prohibición legal del hebreo, el futuro negativo en español puede transmitir restricción normativa de forma natural. Aquí «no comerá» comunica la prohibición sin forzar un modal que no aparece explícito en el hebreo.
- source_word: בּוֹ
  english_pob_choice: of it
  chosen_spanish: de ella
  alternatives_spanish:
  - de él
  - de eso
  - de la Pascua
  lexicon: HALOT
  rationale: El sufijo pronominal retoma la Pascua, femenina en español; «de ella» reproduce el valor idiomático de אכל ב־ como «comer de».
theological_decisions:
- issue: Alcance de la exclusión del banquete pascual
  english_pob_reading: Rendered בֶּן נֵכָר as 'foreigner' without importing a narrower theological category such as 'uncircumcised foreigner' into the main text.
  chosen_spanish_reading: Se mantiene «extranjero» sin añadir calificaciones como «incircunciso» en el texto principal.
  alternative_spanish_readings:
  - extranjero incircunciso
  - no israelita
  - forastero fuera del pacto
  rationale: El hebreo del versículo dice solo בֶּן נֵכָר. Aunque el contexto más amplio puede implicar fronteras del pacto, este versículo por sí mismo no añade la especificación de incircuncisión. La traducción principal preserva esa tensión y evita ampliar el sentido.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El expediente inglés indica que no hubo revisiones aplicadas y que la última pasada quedó sin cambios; la versión española sigue ese mismo perfil estable, manteniendo la lectura directa y la decisión léxica principal de no expandir בֶּן נֵכָר más allá de «extranjero».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se eligió «Pascua» como nombre institucional, no una paráfrasis explicativa.
  - La nota al pie marca la ambigüedad idiomática de בֶּן נֵכָר sin convertirla en interpretación doctrinal adicional.
  - Se conserva el registro legal/formal del versículo con una estructura breve y normativa.
