translation:
  language: es
  text: Hombres, ¿cómo no son fuertes las mujeres[a], que actúan así?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fuertes» traduce ἰσχυραὶ con un sentido amplio de fuerza o capacidad; también podría entenderse como «poderosas», pero «fuertes» es más directo y menos interpretativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ ἄνδρες
  english_pob_choice: O men
  chosen_spanish: ¡Oh hombres!
  alternatives_spanish:
  - Hombres
  - Varones
  - ¡Oh varones!
  lexicon: LSJ
  rationale: El vocativo plural con fuerza exclamativa se expresa de manera natural en español con «¡Oh hombres!», conservando el tono directo y el registro masculino explícito del griego y del inglés POB.
- source_word: πῶς οὐκ
  english_pob_choice: how are ... not
  chosen_spanish: cómo no son
  alternatives_spanish:
  - cómo no están
  - cómo no pueden ser
  - por qué no son
  lexicon: LSJ
  rationale: La pregunta retórica se mantiene con una construcción directa en español. «Cómo no son» conserva la forma interrogativa y evita añadir una modulación explicativa que no está en el griego.
- source_word: ἰσχυραὶ
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - poderosas
  - poderosas y fuertes
  - valientes
  lexicon: LSJ
  rationale: «Fuertes» es el equivalente más natural y amplio en español para la idea de fuerza/capacidad. Evita sobrecargar el verso con connotaciones de poder político o valentía que el adjetivo griego no exige.
- source_word: αἱ γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  - las esposas
  lexicon: LSJ
  rationale: El plural es genérico y se refiere a las mujeres como clase, no específicamente a esposas. Por eso «las mujeres» sigue mejor el alcance semántico del griego.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: LSJ
  rationale: Aquí ὅτι introduce la oración subordinada que explica o reexpresa el asombro retórico. En español, «que» preserva mejor la neutralidad sintáctica que «porque» o «pues».
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de tal manera
  lexicon: LSJ
  rationale: «Así» es la forma más natural y breve en español para remitir al comportamiento previamente aludido.
- source_word: πράσσουσιν
  english_pob_choice: they act
  chosen_spanish: actúan
  alternatives_spanish:
  - hacen
  - se comportan
  lexicon: LSJ
  rationale: «Actúan» refleja bien el sentido de πράσσω como hacer/actuar, con un matiz de conducta observable. Es más idiomático que una traducción literal de «hacen» y más precisa que «se comportan» en este contexto.
translation_notes:
  revision_awareness: El griego presenta una pregunta retórica breve. La versión inglesa POB optó por una estructura cercana al original («how are women not strong, that they act in this way?») y luego revisó ὅτι de «since» a «that» para no cargarlo causalmente. La versión española sigue esa decisión manteniendo la subordinación con «que» y sin introducir una causalidad explícita.
  spanish_consistency_notes:
  - Se conserva «hombres» como vocativo masculino plural para reflejar el griego y el audit trail en inglés.
  - Se evita «esposas», porque γυνή aquí funciona en plural genérico como «mujeres».
  - Se evita traducir ὅτι con «porque», ya que la relación sintáctica en una pregunta retórica es más neutral con «que».
  - El tono final queda interrogativo y retórico, sin añadir explicaciones no presentes en la fuente.
