translation:
  language: es
  text: Por tanto, armémonos[a] con el dominio sobre las pasiones[b] que proviene de la razón piadosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «equipémonos»; el griego conserva una metáfora militar para la preparación moral.
    reason: lexical_alternative
  - marker: b
    text: O «con la dominación de las pasiones»; el compuesto griego expresa gobierno o señorío sobre ellas.
    reason: lexical_alternative
  - marker: c
    text: O «de la razón divina»; aquí se prefiere «piadosa» para conservar el matiz ético-religioso de θείος en 4 Macabeos.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθοπλισώμεθα
  english_pob_choice: let us arm ourselves
  chosen_spanish: armémonos
  alternatives_spanish:
  - equipémonos
  - armémonos plenamente
  lexicon: LSJ
  rationale: El subjuntivo exhortativo de primera persona plural pide una forma imperativa inclusiva y natural en español. «Armémonos» conserva la metáfora bélica moral sin volverla pesada.
- source_word: τοιγαροῦν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: LSJ
  rationale: La partícula introduce una conclusión inferencial; «Por tanto» suena solemne y fiel al valor conclusivo del griego.
- source_word: τῇ ... παθοκρατίᾳ
  english_pob_choice: with the mastery over the passions
  chosen_spanish: con el dominio sobre las pasiones
  alternatives_spanish:
  - con la dominación de las pasiones
  - con el control de las pasiones
  - con el dominio de las pasiones
  lexicon: LSJ
  rationale: El dativo expresa el medio con el que uno se «arma». «Dominio sobre las pasiones» conserva el sentido de regla o gobierno del compuesto παθοκρατία, evitando reducirlo a mera represión.
- source_word: τοῦ θείου λογισμοῦ
  english_pob_choice: that comes from godly reason
  chosen_spanish: que proviene de la razón piadosa
  alternatives_spanish:
  - de la razón divina
  - que procede del razonamiento piadoso
  - de la facultad racional divina
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός designa juicio racional/moral; «razón» es la forma más clara en español. «Piadosa» recoge el matiz ético-religioso de θείος en este contexto judío sin imponer una lectura filosófica posterior. «Proviene de» hace explícita la relación de fuente sugerida por el genitivo.
- source_word: θείου
  english_pob_choice: godly
  chosen_spanish: piadosa
  alternatives_spanish:
  - divina
  - de Dios
  - digna de Dios
  lexicon: LSJ
  rationale: «Piadosa» traduce el tono devocional y moral del adjetivo en este pasaje exhortativo. «Divina» es posible, pero en español puede sonar más metafísica y menos ético-religiosa.
- source_word: λογισμοῦ
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - razonamiento
  - juicio racional
  - mente
  lexicon: LSJ
  rationale: En esta obra, λογισμός es una facultad de discernimiento moral y racional. «Razón» comunica con claridad ese concepto central sin perder su fuerza conceptual.
theological_decisions:
- issue: Relación entre la razón piadosa y el dominio de las pasiones
  english_pob_reading: the mastery over the passions that comes from godly reason
  chosen_spanish_reading: el dominio sobre las pasiones que proviene de la razón piadosa
  alternative_spanish_readings:
  - la dominación de las pasiones de la razón divina
  - el control de las pasiones por parte de la razón piadosa
  rationale: 'La frase mantiene la tensión moral de 4 Macabeos: la razón piadosa no anula la afectividad, sino que la gobierna. «Proviene de» conserva la dependencia causal/derivativa del griego sin convertirla en una abstracción filosófica innecesaria.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada una vez para añadir el artículo definido antes de «passions». La redacción española refleja ese ajuste con «las pasiones» y conserva la estructura conclusiva y el matiz instrumental del original griego.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Cristo» porque el texto no contiene ni cita directa del nombre divino ni terminología cristológica.
  - «Razón» se mantiene para λογισμός según el uso técnico de 4 Macabeos, y «piadosa» para θείος en este contexto judío sapiencial.
  - La metáfora militar de καθοπλισώμεθα se conservó con un verbo exhortativo inclusivo en español.
  - El artículo definido «las pasiones» sigue la revisión inglesa y ayuda a naturalidad y precisión en español.
