translation:
  language: es
  text: Nuestro corazón no ha retrocedido[a], ni se han desviado nuestros pasos de tu camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestro corazón no ha vuelto atrás, ni nuestros pasos se han apartado de tu senda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסוֹג
  english_pob_choice: has not turned back
  chosen_spanish: no se ha vuelto atrás
  alternatives_spanish:
  - no ha retrocedido
  - no ha regresado
  lexicon: HALOT
  rationale: סוֹג expresa retirarse o volverse atrás; en español, 'se ha vuelto atrás' conserva la imagen de retroceso sin endurecer el registro con un calco poco natural.
- source_word: אָחוֹר
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - en reversa
  lexicon: HALOT
  rationale: Como adverbio con נָסוֹג, 'atrás' es la equivalencia más natural y mantiene la fuerza direccional del hebreo.
- source_word: לִבֵּנוּ
  english_pob_choice: Our heart
  chosen_spanish: Nuestro corazón
  alternatives_spanish:
  - Nuestra mente
  - Nuestro ser interior
  lexicon: HALOT
  rationale: '''Corazón'' preserva el antropologismo bíblico del hebreo, que incluye voluntad, lealtad y disposición interior, sin reducirlo a emoción o intelecto.'
- source_word: וַתֵּט
  english_pob_choice: have turned aside
  chosen_spanish: se han desviado
  alternatives_spanish:
  - se han apartado
  - han torcido su rumbo
  - se han inclinado
  lexicon: HALOT
  rationale: נטה en este contexto de camino y conducta se entiende como desviarse o apartarse; el plural español concuerda naturalmente con 'nuestros pasos'.
- source_word: אֲשֻׁרֵינוּ
  english_pob_choice: our steps
  chosen_spanish: nuestros pasos
  alternatives_spanish:
  - nuestros pies
  - nuestras huellas
  lexicon: HALOT
  rationale: '''Pasos'' reproduce el sustantivo de movimiento y conserva la metáfora de conducta y trayectoria.'
- source_word: מִנִּי
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - fuera de
  lexicon: HALOT
  rationale: La preposición de separación se expresa de modo natural en español con 'de' en esta construcción idiomática.
- source_word: אָרְחֶךָ
  english_pob_choice: your path
  chosen_spanish: tu sendero
  alternatives_spanish:
  - tu camino
  - tu senda
  lexicon: HALOT
  rationale: אֹרַח puede denotar camino o senda; 'sendero' mantiene la imagen concreta y poética. Se prefiere a 'camino' para evitar un término demasiado general y conservar el paralelismo con 'pasos'.
theological_decisions:
- issue: Metáfora del 'corazón' como centro interior
  english_pob_reading: Retain 'heart' literally rather than interpretively rendering it as 'mind' or 'loyalty.'
  chosen_spanish_reading: Conservar 'corazón' literalmente, sin sustituirlo por 'mente' o 'lealtad'.
  alternative_spanish_readings:
  - Nuestra lealtad no se ha vuelto atrás
  - Nuestra mente no se ha vuelto atrás
  rationale: El hebreo usa el lenguaje estándar del interior humano; 'corazón' conserva esa antropología bíblica y evita restringir el sentido a una sola facultad.
  doctrine_reference: Principio de fidelidad semántica al antropologismo bíblico; evitar paráfrasis que estrechen el alcance del texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: mantiene el paralelismo corazón/pasos, conserva la metáfora de retroceso y de camino, y ajusta la segunda cola a un español natural sin perder la relación con el hebreo.'
  spanish_consistency_notes:
  - Se usa 'Dios' solo cuando aparezca explícitamente; aquí el posesivo 'tu' conserva el referente divino implícito del salmo sin introducir un término no presente.
  - '''Corazón'' y ''pasos'' se mantienen como imágenes literales para respetar la poesía hebrea y la continuidad terminológica de la serie.'
  - '''Sendero'' funciona como equivalente poético de ''path/way'' y evita una simplificación excesiva de la metáfora.'
