review_pass:
  verdict: revise
  source_alignment_summary: 'La base del sentido está bien captada: los criados del rey informan que Amán está en el patio/cour y el rey ordena permitir su entrada. Sin embargo, el borrador debilita un matiz significativo del participio עֹמֵד al reducirlo de ''está de pie/está parado'' a simplemente ''está en'', y la nota alternativa no refleja con precisión la alternativa inglesa documentada (''courtyard'').'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para ser más fiel sin perder fluidez. 'Los servidores del rey' es aceptable, aunque 'los servidores' suena algo más doméstico que palaciego; aun así no exige cambio. 'Mira' funciona bien para הִנֵּה. 'Que entre' es una buena equivalencia del mandato. La principal mejora necesaria es explicitar la postura/presencia continua de עֹמֵד con 'está de pie'.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La adaptación 'Amán' es normal en español bíblico. No hay conflicto con la terminología POB del proyecto.
  issues:
  - severity: medium
    issue: עֹמֵד fue traducido como 'está en' en vez de reflejar el participio 'está de pie/está parado'.
    rationale: El hebreo usa un participio de postura/presencia continuada, y el rastro léxico inglés documenta explícitamente 'is standing' frente a opciones más interpretativas. 'Está en' elimina ese matiz fuente.
  - severity: low
    issue: La nota 'patio interior' no corresponde exactamente a la alternativa auditada 'courtyard'.
    rationale: La evidencia léxica conserva 'court/courtyard'; en español, la alternativa más directa y fiel es 'patio' o 'patio del palacio', no necesariamente 'patio interior', que añade especificidad no exigida por la fuente.
  revised_spanish_text: 'Los servidores del rey le dijeron: «Mira, Amán está de pie en el patio[a]». Y el rey dijo: «Que entre».'
  revised_footnotes:
  - marker: a
    text: O «en el patio del palacio».
    reason: lexical_alternative
