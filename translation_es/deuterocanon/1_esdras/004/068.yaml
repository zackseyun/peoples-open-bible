  yaml_path: translation/deuterocanon/1_esdras/004/068.yaml
  text: 'And now this is what I ask[a], O lord king, and what I request from you[b], and this is the greatness that comes from you: therefore I beg that you fulfill the vow which I vowed to the King of heaven to perform by your mouth.'
  footnotes:
