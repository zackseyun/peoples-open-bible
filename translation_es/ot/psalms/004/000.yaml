translation:
  language: es
  text: Para el director del coro, con instrumentos de cuerda. Un salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; la expresión hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder musical
  - Al director
  lexicon: HALOT
  rationale: En los encabezamientos de los salmos, la expresión funciona como una indicación musical dirigida al responsable de la ejecución. «Director del coro» comunica con claridad esa función en español moderno sin perder el matiz litúrgico.
- source_word: בִּנְגִינוֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - con cuerdas
  - con instrumentos de cuerda pulsada
  - al son de instrumentos de cuerda
  lexicon: HALOT
  rationale: El término apunta a música/instrumentos de cuerda en el encabezado del salmo. «Con instrumentos de cuerda» es natural en español y conserva la indicación musical sin añadir detalles no presentes en el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Poema
  - Salmo
  lexicon: HALOT
  rationale: Es el género establecido del encabezamiento. «Salmo» es el equivalente reconocido y más fiel en español bíblico.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La construcción hebrea admite autoría, asociación o dedicación. «De David» preserva esa amplitud sin decidir más de lo que el texto permite.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en el encabezamiento
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: 'La traducción mantiene la tensión interpretativa del hebreo: puede implicar autoría, relación o dedicación. No se estrecha a una afirmación histórica más específica que la del texto.'
  doctrine_reference: Preservar ambigüedad textual y no resolverla indebidamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que movió el marcador de la nota al final del encabezamiento para que corresponda a לְדָוִד, no a «instrumentos». La nota española se coloca igualmente sobre «David».
  spanish_consistency_notes:
  - Se mantiene el registro bíblico formal pero natural en español.
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton.
  - «Salmo» se usa como género, no como paráfrasis.
  - La nota [a] está anclada al segmento «David» para reflejar la ambigüedad del hebreo.
