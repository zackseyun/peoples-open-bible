translation:
  language: es
  text: 'Y en el lado oriental[a], cuatro mil quinientos codos, con tres puertas: la puerta de José, una; la puerta de Benjamín, una; la puerta de Dan, una.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «cuatro mil quinientos»; «codos» se toma del contexto cercano de las medidas de la ciudad en este capítulo.
    reason: cross_reference
lexical_decisions:
- source_word: פְּאַת קָדִימָה
  english_pob_choice: the east side
  chosen_spanish: el lado oriental
  alternatives_spanish:
  - el lado del este
  - la parte oriental
  - el costado oriental
  lexicon: HALOT
  rationale: פְּאַת señala un lado, borde o sección; קָדִימָה fija la orientación al este. «Lado oriental» conserva la imagen espacial y suena natural en español para una descripción de medidas y límites.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  english_pob_choice: four thousand five hundred cubits
  chosen_spanish: cuatro mil quinientos codos
  alternatives_spanish:
  - cuatro mil quinientos
  - cuatro mil y quinientos codos
  lexicon: HALOT
  rationale: El hebreo dice literalmente una suma de «quinientos y cuatro mil», es decir, 4.500. Como en el contexto inmediato de Ezequiel 48 la unidad de medida es codos, se la expresa en español para una lectura completa y fiel al marco de la sección.
- source_word: וּשְׁעָרִים שְׁלֹשָׁה
  english_pob_choice: with three gates
  chosen_spanish: con tres puertas
  alternatives_spanish:
  - y tres puertas
  - habrá tres puertas
  lexicon: HALOT
  rationale: La construcción nominal hebrea funciona como descripción adjunta; «con tres puertas» comunica con claridad la relación sin añadir un verbo que el texto no exige. «Puertas» conserva el sentido urbano de שַׁעַר/שְׁעָרִים en esta visión.
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - entrada
  lexicon: HALOT
  rationale: En español, para una ciudad amurallada, «puerta» es el equivalente más natural y lector. «Portón» sería posible, pero suena más mecánico o moderno; «entrada» pierde la referencia al elemento arquitectónico nombrado por tribus.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: HALOT
  rationale: Se usa la forma española bíblica estándar «José» para el nombre tribal, manteniendo la identificación tradicional y la inteligibilidad para lectores hispanos.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Se adopta la forma usual española «Benjamín», conforme al uso bíblico establecido y a la pronunciación natural en español.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Dán
  lexicon: HALOT
  rationale: Se conserva «Dan» como nombre propio tribal ya asentado en español bíblico.
- source_word: אֶחָד ... אֶחָד ... אֶחָד
  english_pob_choice: one ... one ... one
  chosen_spanish: una ... una ... una
  alternatives_spanish:
  - uno ... uno ... uno
  - cada una
  lexicon: HALOT
  rationale: El hebreo repite el numeral tras cada puerta para enfatizar una puerta por tribu. En español, como «puerta» es femenino, la repetición se refleja con «una ... una ... una» para conservar la enumeración.
theological_decisions:
- issue: Unidad de medida implícita en la cifra
  english_pob_reading: '''cubits'' is supplied from the surrounding context of the city''s measurements in this chapter.'
  chosen_spanish_reading: Se explicita «codos» en el texto, porque el contexto inmediato de las medidas de la ciudad en este capítulo lo exige.
  alternative_spanish_readings:
  - cuatro mil quinientos
  - cuatro mil quinientos codos [en nota]
  rationale: No se trata de una ampliación interpretativa libre, sino de una unidad de medida contextual ya determinada por el pasaje. En español, dejarla solo en nota reduciría la fluidez y la claridad de una cláusula puramente mensurativa.
  doctrine_reference: Contexto literario inmediato de Ez 48; principio de suplir elipsis por claridad cuando la unidad está determinada por el pasaje.
translation_notes:
  revision_awareness: El texto sigue de cerca el cierre de la revisión inglesa más reciente, que no introdujo cambios y confirmó el acuerdo alto con el original hebreo. La única decisión destacada para el español es hacer explícita la unidad de medida implícita en la cifra, manteniendo la estructura enumerativa y el paralelismo de las tres puertas tribales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - 'Se prefieren nombres tribales españoles usuales: José, Benjamín y Dan.'
  - Se conserva la enumeración enfática con repetición de «una» para reflejar אֶחָד en cada segmento.
  - «Puertas» traduce שְׁעָרִים con valor arquitectónico urbano, coherente con el contexto de la ciudad visionaria.
