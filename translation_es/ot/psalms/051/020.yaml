translation:
  language: es
  text: En tu buena voluntad[a], haz bien a Sion; edifica[b] los muros de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tu favor» o «según tu voluntad».'
    reason: alternative_reading
  - marker: b
    text: 'O: «edifica» o, en sentido de restauración, «reconstruye».'
