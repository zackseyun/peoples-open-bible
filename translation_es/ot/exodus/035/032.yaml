translation:
  language: es
  text: para idear diseños[a], para trabajar en oro y en plata y en bronce[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para planear planes» o «para diseñar diseños»; el hebreo usa un verbo y un sustantivo cognado de la misma raíz para enfatizar la concepción artística hábil.'
    reason: alternative_reading
  - marker: b
    text: «Bronce» también podría traducirse «cobre»; versiones antiguas en inglés suelen decir «brass».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/חְשֹׁב
  english_pob_choice: to devise
  chosen_spanish: idear
  alternatives_spanish:
  - pensar
  - planear
  - concebir
  lexicon: HALOT
  rationale: El verbo חשב en este contexto artesanal expresa planificación hábil y concepción creativa, no simple pensamiento abstracto. «Idear» comunica bien la elaboración intencional de un diseño.
- source_word: מַחַשָׁבֹת
  english_pob_choice: designs
  chosen_spanish: diseños
  alternatives_spanish:
  - planes
  - proyectos
  - diseños artísticos
  lexicon: HALOT
  rationale: El sustantivo derivado del mismo raíz refuerza la idea de formas o concepciones artísticas. «Diseños» es natural en español y conserva la fuerza técnica del contexto de artesanía.
- source_word: לַ/עֲשֹׂת
  english_pob_choice: to work
  chosen_spanish: para trabajar
  alternatives_spanish:
  - para hacer
  - para fabricar
  - para ejecutar
  lexicon: HALOT
  rationale: En una lista de materiales de artesanía, עשה se refiere a la ejecución hábil del trabajo. «Trabajar» suena natural en español para una actividad artesanal en metales.
- source_word: בַּ/זָּהָב
  english_pob_choice: in gold
  chosen_spanish: en oro
  alternatives_spanish:
  - con oro
  - usando oro
  lexicon: HALOT
  rationale: La preposición ב en este tipo de lista de materiales se entiende naturalmente como el ámbito o medio del trabajo. «En oro» conserva esa relación material.
- source_word: וּ/בַ/כֶּסֶף
  english_pob_choice: and in silver
  chosen_spanish: y en plata
  alternatives_spanish:
  - y con plata
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «oro» y la referencia al material de trabajo; «plata» es la equivalencia usual de כסף.
- source_word: וּ/בַ/נְּחֹשֶׁת
  english_pob_choice: and in bronze
  chosen_spanish: y en bronce
  alternatives_spanish:
  - y en cobre
  - y en latón
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, נְחֹשֶׁת suele referirse al metal trabajado como «bronce». «Bronce» preserva la opción preferida del POB en inglés.
translation_notes:
  revision_awareness: La revisión más reciente indica alto acuerdo y no requiere cambios sustantivos; se conserva la decisión inglesa de resaltar la artesanía creativa con un verbo de planificación/diseño y el metal como «bronce».
  spanish_consistency_notes:
  - 'Se conserva el paralelismo del hebreo con dos infinitivos finales: «para idear diseños» / «para trabajar».'
  - No se introduce «SEÑOR» ni otra terminología cultual ajena al versículo.
  - La nota sobre «bronce» mantiene la alternativa léxica documentada sin imponerla sobre el texto principal.
