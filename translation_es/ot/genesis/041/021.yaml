translation:
  language: es
  text: Y entraron en su vientre[a], pero no se notó que habían entrado en su vientre, y su aspecto era malo, como al principio. Entonces desperté.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''a su interior / en medio de ellas''. En el contexto del sueño, ''vientre'' hace explícita la imagen de que las vacas comidas habían entrado en el interior de las otras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹאנָה
  english_pob_choice: they went in
  chosen_spanish: habían entrado
  alternatives_spanish:
  - entraron
  - fueron metidas
  lexicon: HALOT
  rationale: El hebreo narra la acción de entrar en secuencia, pero en español conviene marcar que el evento ocurrió antes de que se notara; por eso se usa un pluscuamperfecto natural en la subordinada temporal. Mantiene el movimiento hacia el interior sin introducir una lectura más mecánica de simple pasado.
- source_word: אֶל קִרְבֶּנָה
  english_pob_choice: into their bellies
  chosen_spanish: en su interior
  alternatives_spanish:
  - en sus entrañas
  - en su vientre
  - en su medio
  lexicon: HALOT
  rationale: קֶרֶב significa el interior, lo íntimo o el medio interno. En español, 'en su interior' conserva esa amplitud semántica y evita fijar demasiado pronto una imagen anatómica que el hebreo no exige de manera estricta. Dado el contexto onírico, sigue siendo suficientemente vívido.
- source_word: וְלֹא נוֹדַע
  english_pob_choice: it was not known
  chosen_spanish: no se notó
  alternatives_spanish:
  - no se supo
  - no fue perceptible
  - no se pudo advertir
  lexicon: HALOT
  rationale: El nifal de ידע expresa que el hecho no llegó a percibirse. 'No se notó' comunica bien la falta de percepción visual en el sueño y suena natural en español, sin perder el pasivo impersonal del original.
- source_word: כִּי בָאוּ אֶל קִרְבֶּנָה
  english_pob_choice: that they had gone into their bellies
  chosen_spanish: que habían entrado en su interior
  alternatives_spanish:
  - que habían entrado en ellas
  - que habían ido dentro de ellas
  - que habían penetrado en su interior
  lexicon: HALOT
  rationale: La repetición del verbo y del sustantivo del interior se conserva en español para mantener la imagen concreta y la estructura explicativa del hebreo. Se evita 'vientre' para no añadir una precisión corporal que el término קֶרֶב no obliga a establecer.
- source_word: וּמַרְאֵיהֶן רַע
  english_pob_choice: and their appearance was bad
  chosen_spanish: y su aspecto era malo
  alternatives_spanish:
  - y su apariencia era mala
  - y se veían mal
  - y su aspecto era feo
  lexicon: HALOT
  rationale: מַרְאֶה es la apariencia visible; 'aspecto' resulta idiomático y conserva la referencia a lo que se ve. 'Malo' sigue de cerca רַע sin cargar innecesariamente el sentido hacia 'feo' o 'horrible'.
- source_word: כַּאֲשֶׁר בַּתְּחִלָּה
  english_pob_choice: just as at the beginning
  chosen_spanish: como al principio
  alternatives_spanish:
  - tal como al principio
  - igual que al comienzo
  - como antes
  lexicon: HALOT
  rationale: La comparación temporal se expresa de forma breve y natural. 'Al principio' mantiene la referencia a la condición inicial del sueño sin añadir interpretación.
- source_word: וָאִיקָץ
  english_pob_choice: Then I awoke
  chosen_spanish: Entonces desperté
  alternatives_spanish:
  - Y desperté
  - Después desperté
  - Entonces me desperté
  lexicon: HALOT
  rationale: La forma wayyiqtol cierra el relato onírico. 'Entonces desperté' preserva la secuencia narrativa y suena más sobrio que 'me desperté' en este contexto.
theological_decisions:
- issue: La repetición del interior en una imagen de sueño puede sonar corporal o figurada; decidir entre una literalidad anatómica y una expresión más general.
  english_pob_reading: into their bellies
  chosen_spanish_reading: en su interior
  alternative_spanish_readings:
  - en sus entrañas
  - en su vientre
  rationale: El hebreo קֶרֶב apunta al interior/midst, no necesariamente a un órgano específico. En español, 'en su interior' conserva la imagen sin forzar una anatomía que podría empobrecer el alcance semántico del término. La nota mantiene abierta la lectura más concreta en contextos de imagen onírica, pero sin imponerla.
  doctrine_reference: None
- issue: La frase 'su aspecto era malo' debe evitar moralizar o exagerar el juicio estético.
  english_pob_reading: their appearance was bad
  chosen_spanish_reading: su aspecto era malo
  alternative_spanish_readings:
  - su apariencia era mala
  - se veían mal
  rationale: El hebreo describe la cualidad visible, no una valoración moral. 'Malo' reproduce el valor básico de רַע sin convertir la observación en un juicio ético.
  doctrine_reference: None
translation_notes:
  revision_awareness: El expediente inglés pasó por una corrección importante sobre la ambigüedad del sujeto en la primera cláusula. La solución final volvió a una secuencia simple ('And they went...') en inglés, manteniendo la repetición de 'into their bellies'. En español se resolvió la misma ambigüedad con 'Y cuando habían entrado en su interior', dejando claro que el participio subordinado se refiere a los animales que fueron devorados, sin introducir una lectura confusa de que el mismo sujeto entrara en su propio interior.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera de este versículo porque no aparece ninguna mención divina explícita.
  - Se evita 'vientre' en el cuerpo principal para conservar la amplitud de קֶרֶב; si se requiere una traducción más imagética en otra unidad del proyecto, podría anotarse como alternativa.
  - El cierre 'Entonces desperté' conserva el tono narrativo directo del sueño de José.
