translation:
  language: es
  text: De acuerdo con todos los hechos que han hecho desde el día en que los hice subir de Egipto hasta este día[a], dejándome y sirviendo a otros dioses[b], así también te están haciendo a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta el día de hoy».'
    reason: lexical_alternative
  - marker: b
    text: «Sirviendo a otros dioses» también puede expresarse como «adorando a otros dioses»; el verbo hebreo es literalmente «servir».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכָל / הַמַּעֲשִׂים
  english_pob_choice: According to all the deeds
  chosen_spanish: De acuerdo con todas las obras
  alternatives_spanish:
  - Según todas las obras
  - Conforme a todas las obras
  - De acuerdo con todos los hechos
  lexicon: HALOT
  rationale: כְּכָל introduce una comparación/medida que en español se expresa con naturalidad como 'de acuerdo con' o 'conforme a'. מַעֲשִׂים se refiere a hechos/obras/acciones; 'obras' mantiene el peso moral y la referencia a conductas concretas.
- source_word: מִיּוֹם הַעֲלֹתִי אֹתָם מִמִּצְרַיִם
  english_pob_choice: from the day I brought them up out of Egypt
  chosen_spanish: desde el día en que los hice subir de Egipto
  alternatives_spanish:
  - desde el día en que los saqué de Egipto
  - desde el día en que los llevé fuera de Egipto
  lexicon: HALOT
  rationale: הֶעֱלָה en hiphil conserva la imagen de 'hacer subir' y el éxodo como acto divino. 'Los hice subir de Egipto' sigue de cerca la forma verbal sin sonar rígido en español.
- source_word: וְעַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  - hasta este mismo día
  lexicon: HALOT
  rationale: La expresión temporal idiomática se conserva de modo natural en español. 'Hasta este día' mantiene el alcance continuo del período sin añadir matiz interpretativo.
- source_word: וַיַּעַזְבֻנִי
  english_pob_choice: forsaking me
  chosen_spanish: dejándome
  alternatives_spanish:
  - abandonándome
  - apartándose de mí
  - dejándome de lado
  lexicon: HALOT
  rationale: El hebreo expresa deserción relacional/covenantal. 'Dejándome' es breve y natural en el flujo de la frase, aunque 'abandonándome' también sería posible; se evita sobreexplicar el matiz con lenguaje más interpretativo.
- source_word: וַיַּעַבְדוּ אֱלֹהִים אֲחֵרִים
  english_pob_choice: and serving other gods
  chosen_spanish: y sirviendo a otros dioses
  alternatives_spanish:
  - y adorando a otros dioses
  - y rindiendo culto a otros dioses
  - y sirviendo a dioses ajenos
  lexicon: HALOT
  rationale: עבד con deidades puede significar servir o rendir culto. Se conserva 'sirviendo' para mantener la literalidad teológica del texto y la misma tensión lexical del inglés POB.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así también
  alternatives_spanish:
  - de la misma manera
  - así
  - por eso
  lexicon: HALOT
  rationale: כֵּן marca la correspondencia entre dos situaciones. 'Así también' refleja la similitud y preserva el paralelismo con el comportamiento previo de Israel.
- source_word: הֵמָּה עֹשִׂים גַּם לָךְ
  english_pob_choice: they are also doing to you
  chosen_spanish: están haciendo contigo
  alternatives_spanish:
  - también te están haciendo esto
  - lo mismo te están haciendo a ti
  - también te hacen a ti
  lexicon: HALOT
  rationale: El hebreo deja el objeto implícito. 'Están haciendo contigo' preserva esa elipsis sin completar de manera interpretativa; 'también' ya está cubierto por 'así también', por lo que se evita duplicación pesada.
theological_decisions:
- issue: Relación entre el rechazo a Samuel y el rechazo a Yahvé
  english_pob_reading: The verse presents Israel's request as part of a continuing pattern of covenant unfaithfulness, without adding interpretive language beyond the text.
  chosen_spanish_reading: El verso presenta la conducta de Israel como continuidad de una infidelidad anterior, sin añadir explicación doctrinal o psicológica no presente en el hebreo.
  alternative_spanish_readings:
  - Israel se rebela contra ti como se rebeló contra mí
  - están rechazándote del mismo modo que me rechazaron a mí
  rationale: 'La frase hebrea compara patrones de conducta: abandonaron a Yahvé y sirvieron a otros dioses; así actúan también con Samuel. La traducción conserva esa analogía sin intensificarla con lenguaje no explicitado por el texto.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Esta redacción sigue la última revisión del POB en inglés, que prefirió 'According to' para reflejar con mayor cercanía כְּכָל y eliminó las pausas interpretativas. La versión española conserva esa decisión con 'De acuerdo con' y una sintaxis corrida, manteniendo la comparación y el flujo del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino en la política del proyecto, pero en este versículo el texto hebreo nombra a Dios implícitamente mediante 'otros dioses' y el sujeto divino está en la primera persona verbal; no hay necesidad de insertar el nombre.
  - '''Obras'' se eligió como equivalente de מַעֲשִׂים por su peso ético y por coherencia con el tono narrativo-profético.'
  - Se mantiene la elipsis final de 'haciendo contigo' para respetar la apertura del hebreo y evitar una paráfrasis demasiado explícita.
