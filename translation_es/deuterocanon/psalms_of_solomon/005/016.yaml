- from: Pero tu dádiva es muy abundante en bondad y rica[a], y la esperanza en ti no será defraudada en la dádiva.
  to: Pero tu dádiva es abundante en bondad y rica[a], y la esperanza en ti no será defraudada en la dádiva.
