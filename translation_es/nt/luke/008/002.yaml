review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés en casi todos los puntos: conserva la indefinición de γυναῖκές τινες, la distinción entre espíritus malignos/enfermedades y demonios, y el valor resultativo anterior de las formas verbales. Sin embargo, la nota [b] no preserva una alternativa real: repite exactamente el texto principal en vez de reflejar la alternativa inglesa documentada entre ''had gone out'' y ''had come out''.'
  spanish_quality_summary: El español es claro, natural y de tono bíblico moderno. 'Algunas mujeres', 'habían sido sanadas', 'espíritus malos', y 'llamada Magdalena' son legibles y fieles. Hay solo un ajuste menor necesario en la nota [b] para que sea útil y corresponda al expediente auditado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Espíritus malos' y 'demonios' preservan correctamente la diferencia entre πνεύματα πονηρά y δαιμόνια. No aparecen términos del glosario mayor como Yahvé/Mesías/esclavo que requieran revisión aquí.
  issues:
  - severity: medium
    issue: La nota [b] duplica el texto principal y no ofrece una alternativa léxica real.
    rationale: 'El inglés conserva una alternativa significativa: ''had gone out'' / ''had come out''. En español, la nota actual dice exactamente ''de quien habían salido siete demonios'', igual que el texto principal, por lo que no cumple función de nota textual o léxica. Debe reflejar una alternativa como ''de quien habían salido fuera siete demonios'' o, más naturalmente, mover la principal a ''habían salido'' y la nota a ''habían salido de ella''/''habían salido fuera'', según la decisión editorial.'
  revised_spanish_text: 'y algunas mujeres que habían sido sanadas[a] de espíritus malos y de enfermedades: María, llamada Magdalena, de quien habían salido siete demonios[b].'
  revised_footnotes:
  - marker: a
    text: O «ciertas mujeres».
    reason: lexical_alternative
  - marker: b
    text: O «de quien habían salido de ella siete demonios».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota [b] para que presente una alternativa real al matiz de ἐξεληλύθει y ἀφ’ ἧς, en vez de repetir exactamente la redacción principal. Aunque 'de quien habían salido de ella' suena algo pesado en español, funciona como nota de alternativa más explícita de procedencia y salida, no como texto principal.
