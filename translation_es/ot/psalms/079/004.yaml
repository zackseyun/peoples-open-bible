translation:
  language: es
  text: Nos hemos vuelto un oprobio ante nuestros vecinos[a], una burla y un escarnio para los que nos rodean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una burla y una mofa para los que nos rodean».'
