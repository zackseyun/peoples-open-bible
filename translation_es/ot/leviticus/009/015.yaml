translation:
  language: es
  text: Entonces presentó la ofrenda del pueblo, y tomó el macho cabrío de la ofrenda por el pecado que era para el pueblo, lo degolló y lo ofreció como ofrenda por el pecado[a], como hizo con el primero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo ofreció por el pecado». El verbo hebreo también puede llevar el sentido de purificar o purgar en contextos rituales sacerdotales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: presented
  chosen_spanish: presentó
  alternatives_spanish:
  - trajo
  - hizo presentar
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo expresa presentar o acercar una ofrenda. «Presentó» conserva ese sentido ritual con español natural y fiel al acto de introducir la ofrenda ante Yahvé.
- source_word: קָרְבַּן הָעָם
  english_pob_choice: the people's offering
  chosen_spanish: la ofrenda del pueblo
  alternatives_spanish:
  - la ofrenda del pueblo
  - la ofrenda del pueblo
  lexicon: HALOT
  rationale: קָרְבָּן es el término general para una ofrenda traída cerca. «La ofrenda del pueblo» refleja bien el constructo hebreo y evita una paráfrasis excesiva.
- source_word: שְׂעִיר הַחַטָּאת
  english_pob_choice: the goat of the sin offering
  chosen_spanish: el macho cabrío de la ofrenda por el pecado
  alternatives_spanish:
  - el macho cabrío de la ofrenda por el pecado
  - el macho cabrío de la ofrenda por el pecado
  lexicon: HALOT
  rationale: שְׂעִיר es un macho cabrío; חַטָּאת en contexto sacrificial designa la ofrenda por el pecado, no solo el pecado abstracto. «Macho cabrío de la ofrenda por el pecado» conserva la relación genitiva y el valor cultual.
- source_word: אֲשֶׁר לָעָם
  english_pob_choice: that was for the people
  chosen_spanish: que era para el pueblo
  alternatives_spanish:
  - que pertenecía al pueblo
  - destinado al pueblo
  lexicon: HALOT
  rationale: El ל aquí señala relación o destinación ritual. «Que era para el pueblo» preserva la función vicaria/designada sin imponer una idea de propiedad exclusiva.
- source_word: וַיִּשְׁחָטֵהוּ
  english_pob_choice: slaughtered it
  chosen_spanish: lo degolló
  alternatives_spanish:
  - lo sacrificó
  - lo mató
  lexicon: HALOT
  rationale: שָׁחַט es el verbo técnico para degollar o sacrificar animales. «Degolló» mantiene la concreción cultual mejor que «mató» y no añade una interpretación más amplia que el verbo no exige.
- source_word: וַיְחַטְּאֵהוּ
  english_pob_choice: offered it for sin
  chosen_spanish: lo ofreció por el pecado
  alternatives_spanish:
  - lo ofreció como ofrenda por el pecado
  - hizo con él la ofrenda por el pecado
  lexicon: HALOT
  rationale: El piel de חטא en este contexto ritual es semánticamente difícil; la opción española sigue la revisión inglesa final y expresa la función sacrificial sin reducirla a «purificó» ni sobreexplicarla como expiación explícita.
- source_word: כָּרִאשׁוֹן
  english_pob_choice: as with the first one
  chosen_spanish: como con el primero
  alternatives_spanish:
  - como al primero
  - según el primero
  lexicon: HALOT
  rationale: La frase remite al procedimiento previo en el capítulo. «Como con el primero» mantiene la referencia comparativa y la continuidad ritual con el primer sacrificio.
theological_decisions:
- issue: Sentido sacrificial de חַטָּאת
  english_pob_reading: Rendered as 'sin offering' rather than 'sin.'
  chosen_spanish_reading: «ofrenda por el pecado» en vez de «pecado»
  alternative_spanish_readings:
  - pecado
  - ofrenda por el pecado
  rationale: En Levítico 9 el contexto es sacrificial, por lo que חַטָּאת nombra la ofrenda misma. Traducirlo como «pecado» debilitaría el sentido cultual del pasaje.
  doctrine_reference: Levítico 4–9; uso sacerdotal de חַטָּאת
- issue: Sentido de וַיְחַטְּאֵהוּ
  english_pob_reading: Rendered functionally as performing the sin-offering rite with the goat.
  chosen_spanish_reading: «lo ofreció por el pecado» como fórmula funcional del rito
  alternative_spanish_readings:
  - lo purificó
  - hizo expiación con él
  - lo hizo ofrenda por el pecado
  rationale: El verbo hebreo puede referirse al rito de la ofrenda por el pecado o a la purificación/purga ritual. En español, «lo ofreció por el pecado» preserva la función cultual sin imponer más especificidad teológica que la que el verbo exige aquí.
  doctrine_reference: Levítico 8–10; rito de la ofrenda por el pecado
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: the chosen English moved from ''made a sin offering with it'' to ''offered it for sin''. La línea española refleja esa decisión con «lo ofreció por el pecado», manteniendo la estructura de la frase y la distinción entre la ofrenda del pueblo, el macho cabrío y el rito final.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino según la política del proyecto.
  - Se prefirió «ofrenda por el pecado» para חַטָּאת, manteniendo el valor sacrificial del término.
  - «Lo ofreció por el pecado» conserva la tensión semántica del hebreo sin convertirla en una explicación doctrinal más amplia.
