base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/004.yaml
  text: And as soon as he has arisen[a], his kingdom will be broken and divided toward the four winds of heaven, but not to his posterity, and not according to the dominion with which he ruled[b]; for his kingdom will be uprooted and given to others besides these.
  footnotes:
  - marker: a
    text: Or 'descendants.' The Hebrew phrase 'not to his latter end' here refers to those who would come after him in dynastic succession.
    reason: lexical_alternative
  - marker: b
    text: '''Toward the four winds of heaven'' is a Hebrew idiom for being divided in every direction, that is, toward the four points of the compass.'
    reason: cultural_note
