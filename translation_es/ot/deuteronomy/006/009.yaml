    rationale: שַׁעַר normalmente apunta a portones, accesos o entradas, no simplemente a 'puertas' en sentido doméstico. En español, 'puertas' aquí colapsa la distinción con מְזוּזוֹת y debilita la precisión del original y de la auditoría inglesa.
  - severity: low
    issue: La conjunción inicial 'Y' es innecesaria en español de versículo aislado
    rationale: Aunque el hebreo lleva conjunción, en español bíblico moderno puede omitirse sin pérdida de sentido, especialmente cuando el versículo se presenta solo. Esto mejora la fluidez sin traicionar la secuencia injuntiva.
  - severity: low
    issue: La nota b podría alinearse mejor con la opción principal revisada
    rationale: Si el texto principal usa 'entradas', la nota debe conservar claramente 'portones' como alternativa y explicar el área de acceso o los postes estructurales.
  revised_spanish_text: Las escribirás sobre los postes de la puerta de tu casa[a] y en tus entradas[b].
