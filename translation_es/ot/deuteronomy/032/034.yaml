translation:
  language: es
  text: ¿No está guardado[a] conmigo, sellado en mis almacenes[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "oculto".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "en mis tesoros".'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No está…?
  alternatives_spanish:
  - ¿No es…?
  - ¿Acaso no está…?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. En español, '¿No está…?' conserva ese valor interrogativo natural sin volverla una afirmación interpretativa. La forma con '¿Acaso no…?' también sería posible, pero suena más marcada.
- source_word: הוּא
  english_pob_choice: it
  chosen_spanish: —(implícito en la construcción)
  alternatives_spanish:
  - ello
  - eso
  lexicon: HALOT
  rationale: El pronombre masculino singular no apunta necesariamente a una persona masculina; en el contexto funciona de modo impersonal, referido a lo previamente mencionado. En español se preserva mejor dejando el referente implícito en la pregunta, sin forzar 'él' ni añadir un sujeto innecesario.
- source_word: כָּמֻס
  english_pob_choice: laid up
  chosen_spanish: guardado
  alternatives_spanish:
  - depositado
  - guardado en reserva
  - oculto
  lexicon: HALOT
  rationale: El participio pasivo expresa algo retenido o preservado. 'Guardado' comunica bien la idea de algo reservado y encaja con la imagen del depósito; 'oculto' sería una alternativa posible, pero desplaza demasiado el matiz hacia el esconder en vez de almacenar.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  - en mi poder
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona se rinde de forma directa por 'conmigo', que conserva la relación personal de posesión o custodia sin sobreexplicar.
- source_word: חָתֻם
  english_pob_choice: sealed
  chosen_spanish: sellado
  alternatives_spanish:
  - cerrado
  - sello puesto
  lexicon: HALOT
  rationale: El participio pasivo denota algo asegurado con sello. 'Sellado' es el equivalente más directo y claro en español moderno.
- source_word: בְּאוֹצְרֹתָי
  english_pob_choice: in my storehouses
  chosen_spanish: en mis almacenes
  alternatives_spanish:
  - en mis tesoros
  - en mis tesorerías
  lexicon: HALOT
  rationale: El sustantivo puede referirse a depósitos o cámaras de reserva. 'Almacenes' reproduce bien la imagen concreta de un lugar donde se guarda algo; 'tesoros/tesorerías' podría sugerir riqueza monetaria y estrechar el campo semántico. Se prefiere la neutralidad física de 'almacenes'.
theological_decisions:
- issue: Referente impersonal del objeto guardado y sellado
  english_pob_reading: An impersonal referent ('it') referring to the matter previously described, likely the record of guilt or reserved judgment
  chosen_spanish_reading: Un referente impersonal implícito ('ello/eso'), sin resolverlo explícitamente
  alternative_spanish_readings:
  - '''él'' si se tomara como persona masculina'
  - '''esto'' como resumen de lo anterior'
  rationale: El hebreo usa un pronombre masculino singular, pero el contexto inmediato favorece una referencia impersonal y ambigua. La traducción española mantiene esa tensión al no especificar el antecedente, evitando una precisión que el texto no exige.
  doctrine_reference: Preservar la tensión textual en vez de cerrarla interpretativamente.
translation_notes:
  revision_awareness: 'Consulta auditada con alta concordancia: el texto fuente y la revisión más reciente coinciden, sin cambios aplicados. La versión española sigue de cerca la decisión inglesa de mantener la referencia impersonal y la imaginería de custodia/almacenamiento.'
  spanish_consistency_notes:
  - Se mantiene 'sellado' para חָתֻם y 'almacenes' para בְּאוֹצְרֹתָי, evitando términos eclesiásticos no motivados por el hebreo.
  - La pregunta retórica se ha conservado con '¿No está…?' para reflejar הֲלֹא.
  - La omisión de un sujeto explícito para הוּא preserva la ambigüedad del referente, como en la auditoría inglesa.
