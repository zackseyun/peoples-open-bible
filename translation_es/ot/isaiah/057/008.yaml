translation:
  language: es
  text: Detrás de la puerta y del poste de la puerta pusiste tu memorial[a]; porque, apartándote de mí, te descubriste y subiste; ensanchaste tu lecho, y te hiciste un acuerdo con ellos[b]; amaste su lecho; viste una mano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''pusiste tu símbolo/recordatorio''. El hebreo זִכְרוֹן puede aludir a un objeto colocado en secreto con sentido idólatra.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''te hiciste un pacto con ellos''. El hebreo usa lenguaje de hacer pacto, aunque no aparece explícitamente el sustantivo ''pacto''.'
    reason: lexical_alternative
  - marker: c
    text: Lit. 'viste una mano'. La frase es oscura; posibles sentidos incluyen 'viste un monumento/marcador' o un eufemismo sexual.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַחַר הַדֶּלֶת וְהַמְּזוּזָה
  english_pob_choice: Behind the door and the doorpost
  chosen_spanish: Detrás de la puerta y del poste de la puerta
  alternatives_spanish:
  - Detrás de la puerta y del dintel
  - Detrás de la puerta y del marco de la puerta
  lexicon: HALOT
  rationale: אַחַר tiene aquí sentido espacial de ‘detrás’; מְזוּזָה es el poste lateral de la puerta, por lo que ‘poste de la puerta’ conserva mejor el referente que opciones más interpretativas.
- source_word: שַׂמְתְּ זִכְרוֹנֵךְ
  english_pob_choice: you set up your memorial
  chosen_spanish: pusiste tu memorial
  alternatives_spanish:
  - pusiste tu recuerdo
  - pusiste tu símbolo
  lexicon: HALOT
  rationale: זִכְרוֹן puede referirse a un memorial o recordatorio concreto. ‘Memorial’ mantiene la ambigüedad útil del término sin convertirlo en ‘ídolo’ en el texto principal.
- source_word: כִּי מֵאִתִּי גִּלִּית
  english_pob_choice: for, departing from me, you uncovered yourself
  chosen_spanish: porque, apartándote de mí, te descubriste
  alternatives_spanish:
  - porque, separándote de mí, te descubriste
  - porque, desde mí, te descubriste
  lexicon: HALOT
  rationale: מֵאִתִּי expresa separación de Yahvé; ‘apartándote de mí’ comunica esa fuerza de forma natural. גִּלִּית en este contexto tiene sentido de ‘desnudarte/descubrirte’, conservando la carga de vergüenza y metáfora sexual.
- source_word: וַתַּעֲלִי
  english_pob_choice: and went up
  chosen_spanish: y subiste
  alternatives_spanish:
  - y fuiste hacia arriba
  - y ascendiste
  lexicon: HALOT
  rationale: עלה significa literalmente ‘subir’. ‘Subiste’ es la versión más directa y deja abierta la alusión a los lugares altos sin sobreexplicarla.
- source_word: הִרְחַבְתְּ מִשְׁכָּבֵךְ
  english_pob_choice: you made your bed wide
  chosen_spanish: hiciste ancho tu lecho
  alternatives_spanish:
  - ensanchaste tu lecho
  - extendiste tu lecho
  lexicon: HALOT
  rationale: El hiphil de רחב expresa hacer ancho/ensanchar. ‘Lecho’ funciona bien en español para conservar el doble sentido sexual y figurado de מִשְׁכָּב.
- source_word: וַתִּכְרָת לָךְ מֵהֶם
  english_pob_choice: you made an agreement for yourself with them
  chosen_spanish: te hiciste un pacto con ellos
  alternatives_spanish:
  - hiciste un pacto para ti con ellos
  - te hiciste un acuerdo con ellos
  lexicon: HALOT
  rationale: Aunque el hebreo no explicita el sustantivo בְּרִית, כרת con este uso es la fórmula normal de pacto. ‘Pacto’ preserva mejor la resonancia bíblica que ‘acuerdo’, y ‘te hiciste’ refleja el dativo reflexivo לָךְ.
- source_word: אָהַבְתְּ מִשְׁכָּבָם
  english_pob_choice: you loved their bed
  chosen_spanish: amaste su lecho
  alternatives_spanish:
  - amaste su cama
  - amaste su lecho compartido
  lexicon: HALOT
  rationale: ‘Lecho’ conserva la metáfora y el tono sexual del hebreo. ‘Amaste’ sigue la fuerza afectiva/volitiva del verbo sin suavizarla.
- source_word: יָד חָזִית
  english_pob_choice: you saw a hand
  chosen_spanish: viste una mano
  alternatives_spanish:
  - miraste una mano
  - viste un signo
  lexicon: HALOT
  rationale: La frase es oscura; el sentido literal ‘mano’ se mantiene para no decidir prematuramente entre alternativas como marcador, monumento o sentido eufemístico. ‘Viste’ responde a חָזִית de forma natural.
theological_decisions:
- issue: Imagen sexual e idolátrica para describir la infidelidad de Judá
  english_pob_reading: Retain the sexual imagery in the main text as metaphorically describing idolatry and illicit alliances, without flattening it into a purely abstract statement about unfaithfulness.
  chosen_spanish_reading: Conservar en español la imaginería sexual y de pacto para describir la infidelidad de Judá, sin reducirla a una explicación abstracta de idolatría.
  alternative_spanish_readings:
  - convertir todo el verso en una paráfrasis explícita de idolatría
  - reducirlo principalmente a alianzas políticas
  rationale: Isaías usa lenguaje corporal y de pacto para denunciar la ruptura del pacto con Yahvé. La traducción debe preservar esa tensión y no resolverla en una sola explicación más cómoda o modernizada.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión del inglés POB: se reflejó el cambio de ‘away from me’ a ‘apartándote de mí’, la preferencia por un registro más natural para מֵאִתִּי, y la decisión de conservar ‘a hand’ literalmente como ‘una mano’ en el texto principal, dejando la ambigüedad en nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ para el nombre divino en la formulación contextual implícita, aunque no aparece de forma explícita en este versículo.
  - Se eligió ‘pacto’ en lugar de ‘acuerdo’ por coherencia con la terminología bíblica de כרת ברית y por la fuerza teológica del pasaje.
  - ‘Lecho’ se conserva de manera consistente para mantener la imaginería sexual y simbólica del hebreo.
  - La puntuación española separa las cláusulas con comas y punto y coma para reflejar el ritmo del original sin sobreexplicarlo.
