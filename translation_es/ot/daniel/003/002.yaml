base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/002.yaml
  text: Then King Nebuchadnezzar sent to assemble the satraps[a], the prefects, and the governors, the counselors, the treasurers, the judges, the magistrates, and all the officials of the provinces, to come to the dedication of the image that King Nebuchadnezzar had set up.
  footnotes:
