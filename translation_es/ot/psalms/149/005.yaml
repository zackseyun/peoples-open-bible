translation:
  language: es
  text: Que los fieles[a] se regocijen en gloria[b]; que canten con gozo sobre sus lechos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los piadosos» o «los santos». El hebreo se refiere a quienes están marcados por lealtad al pacto y devoción.
    reason: lexical_alternative
  - marker: b
    text: «En gloria» también puede entenderse como «en honor».
    reason: lexical_alternative
  - marker: c
    text: O «griten de gozo sobre sus lechos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעְלְזוּ
  english_pob_choice: Let ... exult
  chosen_spanish: Que ... exulten
  alternatives_spanish:
  - Que ... se alegren
  - Que ... jubilen
  lexicon: HALOT
  rationale: El imperfecto/jusivo plural aquí funciona como exhortación poética. «Exulten» conserva el tono elevado y celebrativo mejor que un simple «se alegren».
- source_word: חֲסִידִים
  english_pob_choice: the faithful
  chosen_spanish: los fieles
  alternatives_spanish:
  - los piadosos
  - los santos
  - los leales
  lexicon: HALOT
  rationale: חֲסִידִים designa a los caracterizados por lealtad de pacto y devoción. «Los fieles» comunica bien esa identidad sin cargar el término con matices eclesiásticos posteriores.
- source_word: בְּכָבוֹד
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - en honor
  - con honor
  - por gloria
  lexicon: HALOT
  rationale: 'La combinación de ב con כָבוֹד se entiende de manera natural como esfera o condición: «en gloria». «Honor» es posible, pero «gloria» conserva mejor el peso poético del hebreo.'
- source_word: יְרַנְּנוּ
  english_pob_choice: let them sing for joy
  chosen_spanish: canten de gozo
  alternatives_spanish:
  - clamen de gozo
  - canten con júbilo
  - griten de alegría
  lexicon: HALOT
  rationale: El verbo רנן en piel suele expresar gritos jubilosos, frecuentemente en canto. «Canten de gozo» mantiene la dimensión sonora y el contexto salmódico.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  - upon
  lexicon: HALOT
  rationale: La preposición introduce el lugar literal de la acción respecto de los lechos. «Sobre» reproduce bien la relación espacial sin añadir interpretación.
- source_word: מִשְׁכְּבוֹתָם
  english_pob_choice: their beds
  chosen_spanish: sus lechos
  alternatives_spanish:
  - sus camas
  - sus lugares de descanso
  lexicon: HALOT
  rationale: El sustantivo alude a lugares donde se yace. «Lechos» es un equivalente digno y suficientemente literal para el contexto poético.
theological_decisions:
- issue: Rendering of חֲסִידִים without later ecclesiastical overtones
  english_pob_reading: the faithful
  chosen_spanish_reading: los fieles
  alternative_spanish_readings:
  - los santos
  - los piadosos
  rationale: El verso describe a quienes pertenecen a Yahvé por lealtad de pacto. «Los fieles» preserva esa identidad religiosa sin introducir una categoría técnica de tradición posterior, como podría ocurrir con «los santos».
  doctrine_reference: Translation philosophy §§1, 6
- issue: Choice of divine style in a verse with no explicit divine name
  english_pob_reading: No explicit divine-name rendering issue in the verse
  chosen_spanish_reading: No se introduce aquí ningún equivalente de nombre divino
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El hebreo de este versículo no contiene יהוה ni un κύριος alusivo directo; por tanto, no corresponde insertar un nombre divino en español.
  doctrine_reference: Project-level terminology defaults
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia con el original y con la auditoría inglesa; no se identificaron cambios necesarios respecto del sentido base.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético de dos miembros con exhortación («Que...; que...»).
  - Se evitó calcar «SEÑOR» o introducir «Yahvé», porque el versículo no contiene el nombre divino.
  - Se conservó la tensión entre «gloria» y «honor» mediante nota, como en la auditoría inglesa.
  - «Lechos» mantiene un registro bíblico digno sin perder el sentido concreto de lugares de descanso.
