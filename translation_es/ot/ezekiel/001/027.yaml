translation:
  language: es
  text: Y vi algo semejante al aspecto del metal resplandeciente[a], como el aspecto del fuego todo alrededor en su interior[b], desde el aspecto de su cintura hacia arriba; y desde el aspecto de su cintura hacia abajo vi algo semejante al aspecto del fuego, y resplandor alrededor de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo חַשְׁמַל (hashmal) es un término incierto; posibles traducciones incluyen «ámbar» o «electro» (una aleación metálica brillante).
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea traducida «todo alrededor en su interior» es difícil; puede describir el fuego como apareciendo dentro de un recinto o envoltura luminosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/עֵין
  english_pob_choice: something like
  chosen_spanish: algo semejante a
  alternatives_spanish:
  - como
  - parecido a
  - algo como
  lexicon: HALOT
  rationale: La construcción hebrea introduce comparación, no identificación plena. «Algo semejante a» conserva la cautela visionaria de Ezequiel sin sonar forzado en español.
- source_word: חַשְׁמַ֗ל
  english_pob_choice: glowing metal
  chosen_spanish: metal resplandeciente
  alternatives_spanish:
  - ámbar
  - electro
  - metal brillante
  lexicon: HALOT
  rationale: El término es raro y de sentido incierto. «Metal resplandeciente» comunica el campo semántico luminoso y metálico, manteniendo la incertidumbre léxica sin optar por un equivalente demasiado técnico o demasiado específico.
- source_word: כְּ/מַרְאֵה
  english_pob_choice: the appearance of
  chosen_spanish: el aspecto de
  alternatives_spanish:
  - la apariencia de
  - lo que parecía
  - el parecer de
  lexicon: HALOT
  rationale: La repetición de מַרְאֵה en el verso sostiene el lenguaje fenomenológico. «El aspecto de» es natural en español y preserva la repetición estructural del hebreo y de la POB inglesa.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - fuego ardiente
  lexicon: HALOT
  rationale: Es el equivalente normal y directo en este contexto visionario.
- source_word: בֵּית לָהּ סָבִיב
  english_pob_choice: all around within it
  chosen_spanish: todo alrededor en su interior
  alternatives_spanish:
  - dentro de él todo alrededor
  - con un borde alrededor
  - en un recinto alrededor
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y puede sugerir una interioridad rodeada o un envoltorio/cascarón alrededor. «Todo alrededor en su interior» sigue de cerca la lectura auditada de la POB inglesa sin resolver en exceso la imagen.
- source_word: מָתְנָיו
  english_pob_choice: his waist
  chosen_spanish: sus lomos
  alternatives_spanish:
  - su cintura
  - sus caderas
  - sus lomos
  lexicon: HALOT
  rationale: «Lomos» conserva la referencia corporal amplia y la tonalidad bíblica, a la vez que evita reducir demasiado el término a una cintura moderna. En este contexto visionario, el plural posesivo en español refleja bien el hebreo.
- source_word: וּ/לְ/מָעְלָה
  english_pob_choice: and upward
  chosen_spanish: hacia arriba
  alternatives_spanish:
  - y hacia arriba
  - arriba
  - y arriba
  lexicon: HALOT
  rationale: Expresa la orientación espacial con naturalidad y mantiene la simetría con la cláusula opuesta.
- source_word: וּ/לְ/מַטָּה
  english_pob_choice: and downward
  chosen_spanish: hacia abajo
  alternatives_spanish:
  - y hacia abajo
  - abajo
  - y abajo
  lexicon: HALOT
  rationale: Balancea «hacia arriba» y conserva la estructura paralela del hebreo.
- source_word: וְ/נֹ֥גַהּ
  english_pob_choice: brightness
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - fulgor
  - luminosidad
  lexicon: HALOT
  rationale: נֹגַהּ expresa brillo o radiación luminosa. «Resplandor» es una opción sobria y bíblicamente inteligible en español, sin perder la fuerza visual del término.
- source_word: ל֖/וֹ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - a su alrededor
  - de su alrededor
  - alrededor de él
  lexicon: HALOT
  rationale: El sufijo masculino singular del hebreo se conserva con «de él». En contexto, el referente sigue siendo la figura antropomórfica de la visión.
theological_decisions:
- issue: Referente masculino de la figura visionaria
  english_pob_reading: Use 'his waist' and 'around him' to reflect the masculine singular suffixes in the Hebrew without over-identifying the figure beyond the text.
  chosen_spanish_reading: Conservar «sus lomos» y «alrededor de él» para reflejar los sufijos masculinos singulares sin precisar más allá de la visión.
  alternative_spanish_readings:
  - su cintura / alrededor de ello
  - su cintura / alrededor de eso
  - sus caderas / alrededor de eso
  rationale: El hebreo usa sufijos masculinos singulares, y el contexto presenta una figura con rasgos humanos. La traducción mantiene esa gramática y su carácter antropomórfico sin convertir la descripción en una identificación doctrinal cerrada.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral); §3 (Preserve theological tension rather than resolve it)
- issue: Tratamiento de la frase difícil בֵּית לָהּ סָבִיב
  english_pob_reading: The Hebrew phrase rendered 'enclosed all around' is difficult; it may describe the fire as appearing within an enclosing brightness or casing.
  chosen_spanish_reading: La frase se vierte como «todo alrededor en su interior», manteniendo la ambigüedad entre interioridad y envoltura.
  alternative_spanish_readings:
  - encerrado todo alrededor
  - en un recinto todo alrededor
  - dentro de él, todo alrededor
  rationale: La imagen es sintácticamente difícil y no conviene fijarla con demasiada precisión. La solución española sigue la lectura auditada de la POB inglesa y preserva la tensión del pasaje.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión auditada de la POB inglesa, especialmente la resolución de בֵּית לָהּ סָבִיב como una relación espacial entre interioridad y contorno, sin sobreespecificarla. También conserva la doble repetición de מַרְאֵה («el aspecto de») y el paralelismo espacial «hacia arriba / hacia abajo».
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque el versículo no contiene el Tetragrámaton.
  - Se mantiene «aspecto» para מַרְאֵה de forma consistente en todo el versículo.
  - Se preserva la duplicación de «lomos» para מָתְנָיו a fin de reflejar el paralelismo hebreo.
  - Se evita armonizar la imagen visionaria con términos doctrinales posteriores; el lenguaje permanece descriptivo y fenoménico.
