  - No se introducen títulos ni equivalencias interpretativas, porque el versículo es una secuencia nominal.
  - La puntuación en español usa comas para separar los nombres y punto final.
  - Se evita el calco de la ortografía inglesa final en «Bilgah» y se adapta a la ortografía española sin perder la identificación del nombre.
