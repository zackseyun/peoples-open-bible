    rationale: Aunque es comprensible y fiel, «De un muerto» expresa mejor el singular genérico en español y evita una ligera dureza sintáctica al inicio del versículo.
  revised_spanish_text: De un muerto[a], como de uno que ya no existe, perece la alabanza; pero el que está vivo y sano alabará a Yahvé.
