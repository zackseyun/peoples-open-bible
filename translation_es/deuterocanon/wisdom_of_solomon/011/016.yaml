theological_decisions:
- issue: Correspondencia entre pecado y castigo
  english_pob_reading: The verse states that punishment comes by means of the same kinds of things through which sin was committed.
  chosen_spanish_reading: El versículo afirma que el castigo llega por medio de las mismas cosas con que se peca.
  alternative_spanish_readings:
  - El castigo se relaciona con los pecados de manera general.
  - Dios castiga al pecador sin señalar una correspondencia exacta.
  rationale: La doble construcción con διά en griego indica una correspondencia intencional entre el medio del pecado y el medio del castigo. La redacción española procura conservar esa reciprocidad sin suavizarla ni explicarla más de lo que el texto permite.
  doctrine_reference: Preservar la lógica retributiva y la tensión semántica del original griego; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: El texto griego y el aparato inglés concuerdan estrechamente; no se requieren revisiones textuales ni ajustes por variantes. La decisión principal fue reproducir en español la repetición enfática de διά...τούτων y el valor retributivo de κολάζεται.
  spanish_consistency_notes:
  - Se usó «Dios» implícitamente no por estar explícito en este versículo, sino porque el contexto de Sabiduría presupone juicio retributivo; aun así, no se añadió sujeto divino donde el griego no lo expresa.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el Nombre divino ni κύριος.
  - «Castigada» conserva el paralelo sintáctico con «peca»; el femenino responde a la concordancia gramatical con «una persona» entendida en español genérico.
