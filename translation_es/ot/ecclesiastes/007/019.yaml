translation:
  language: es
  text: La sabiduría fortalece a un sabio más que diez gobernantes que estaban en una ciudad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en la ciudad”. La forma hebrea permite entenderlo de manera definida, pero el dicho parece general y no vinculado a una ciudad concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחָכְמָה
  english_pob_choice: Wisdom
  chosen_spanish: La sabiduría
  alternatives_spanish:
  - Sabiduría
  - La Sabiduría
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido; en español conviene conservarlo porque el sustantivo funciona de modo proverbial y genérico. No se necesita mayúscula teológica, ya que no hay personificación obligatoria en el contexto.
- source_word: תָּעֹז
  english_pob_choice: strengthens
  chosen_spanish: fortalece
  alternatives_spanish:
  - da fuerza a
  - hace fuerte a
  - robustece
  lexicon: HALOT
  rationale: El verbo expresa una acción causativa de fortalecer. 'Fortalece' es natural en español, mantiene el sentido directo del hebreo y evita una paráfrasis excesiva.
- source_word: לֶחָכָם
  english_pob_choice: to a wise man
  chosen_spanish: a un hombre sabio
  alternatives_spanish:
  - a un sabio
  - para un hombre sabio
  - al hombre sabio
  lexicon: HALOT
  rationale: La preposición ל marca destinatario o ventaja. 'A un hombre sabio' preserva el singular masculino y el valor proverbial individual sin volverlo genérico abstracto.
- source_word: מֵעֲשָׂרָה
  english_pob_choice: more than ten
  chosen_spanish: más que diez
  alternatives_spanish:
  - más de diez
  - por encima de diez
  - que diez
  lexicon: HALOT
  rationale: La preposición מ aquí es comparativa. 'Más que diez' reproduce de forma natural la comparación cuantitativa del hebreo y coincide con el valor del audit trail inglés.
- source_word: שַׁלִּיטִים
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - gobernadores
  - autoridades
  - señores
  lexicon: HALOT
  rationale: שַׁלִּיטִים señala personas con autoridad o dominio. 'Gobernantes' es amplio, claro y apropiado para el marco cívico del proverbio.
- source_word: אֲשֶׁר הָיוּ בָּעִיר
  english_pob_choice: who were in a city
  chosen_spanish: que estaban en una ciudad
  alternatives_spanish:
  - que estaban en la ciudad
  - que hubo en una ciudad
  - en una ciudad
  lexicon: HALOT
  rationale: Se conserva el valor relativo y la referencia genérica. 'Una ciudad' refleja mejor el tono proverbial y la observación general, igual que en el audit trail inglés; no se fuerza una ciudad específica.
translation_notes:
  revision_awareness: El inglés auditado pasó de una redacción más perifrástica ('gives strength to') a 'strengthens'. La versión española sigue esa revisión con un verbo simple y directo ('fortalece'), manteniendo el registro proverbial y la relación comparativa del hebreo.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de sabiduría como sustantivo abstracto definido, sin personificación añadida.
  - El comparativo se expresa con 'más que' para reflejar la fuerza de מ en la comparación.
  - '''Gobernantes'' conserva el sentido de dominio/autoridad sin estrecharlo a una función política moderna demasiado específica.'
  - La nota reproduce la ambigüedad documentada entre lectura definida y sentido genérico de בָּעִיר.
