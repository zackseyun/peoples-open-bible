translation:
  language: es
  text: 'Los cien talentos de plata fueron para fundir las bases[a] del santuario y las bases del velo[b]: cien bases para los cien talentos, un talento por cada base.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Bases" también puede traducirse como "sockets"; se refiere a las piezas metálicas de fundación del tabernáculo.'
    reason: lexical_alternative
  - marker: b
    text: '"Velo" designa la cortina interior que separaba el Lugar Santo del Lugar Santísimo.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - sirvieron para
  lexicon: HALOT
  rationale: En este contexto contable, el verbo introduce la destinación del metal; en español, "fueron para" expresa naturalmente esa función sin sugerir un cambio de estado narrativo.
- source_word: מְאַת כִּכַּר הַכֶּסֶף
  english_pob_choice: the hundred talents of silver
  chosen_spanish: los cien talentos de plata
  alternatives_spanish:
  - las cien medidas de plata
  - cien talentos de plata
  lexicon: HALOT
  rationale: La construcción expresa una cantidad medida; el español natural requiere el sustantivo con artículo plural para dar fluidez, conservando el número exacto y el material.
- source_word: לָצֶקֶת
  english_pob_choice: for casting
  chosen_spanish: para vaciar
  alternatives_spanish:
  - para fundir
  - para verter
  lexicon: HALOT
  rationale: En contexto metalúrgico, el verbo hebreo se refiere a formar piezas por vaciado del metal. "Vaciar" es idiomático en español bíblico-técnico y mantiene la idea de fundición/casting sin perder precisión.
- source_word: אַדְנֵי
  english_pob_choice: bases
  chosen_spanish: bases
  alternatives_spanish:
  - sockets
  - pedestales
  lexicon: HALOT
  rationale: '"Bases" es claro y fiel para las piezas de fundación metálicas; evita el tecnicismo menos transparente de "sockets" y conserva la función estructural.'
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto santo
  lexicon: HALOT
  rationale: Aquí el término designa el conjunto sagrado del tabernáculo en contraste con el velo. "Santuario" reproduce bien esa amplitud sin restringirlo indebidamente al lugar santo interior.
- source_word: הַפָּרֹכֶת
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el paramento
  lexicon: HALOT
  rationale: '"Velo" preserva la especificidad cultual de la cortina interior que separaba los espacios sagrados; además coincide con el registro litúrgico tradicional pero sigue siendo comprensible.'
- source_word: מְאַת אֲדָנִים
  english_pob_choice: one hundred bases
  chosen_spanish: cien bases
  alternatives_spanish:
  - cien pedestales
  - cien zócalos
  lexicon: HALOT
  rationale: La repetición del total se traduce de forma directa y contable; el español omite el artículo en la segunda mención por naturalidad, manteniendo la equivalencia numérica.
- source_word: לִמְאַת הַכִּכָּר
  english_pob_choice: for the hundred talents
  chosen_spanish: para los cien talentos
  alternatives_spanish:
  - correspondientes a los cien talentos
  - por los cien talentos
  lexicon: HALOT
  rationale: La preposición marca correspondencia/distribución. "Para" comunica de manera natural que esos cien bases estaban asignados a los cien talentos.
- source_word: כִּכָּר לָאָדֶן
  english_pob_choice: a talent for each base
  chosen_spanish: un talento por base
  alternatives_spanish:
  - un talento para cada base
  - un talento por cada base
  lexicon: HALOT
  rationale: La frase expresa una razón de distribución. "Por base" condensa con claridad la relación uno-a-uno sin agregar interpretación extra.
theological_decisions:
- issue: Sentido de הַקֹּדֶשׁ en contraste con הַפָּרֹכֶת
  english_pob_reading: the sanctuary ... the veil
  chosen_spanish_reading: el santuario ... el velo
  alternative_spanish_readings:
  - el lugar santo ... la cortina
  - el recinto santo ... el velo
  rationale: No se trata aquí del Lugar Santísimo, sino de los elementos estructurales del tabernáculo y del velo. Mantener "santuario" evita restringir el referente más de lo que permite el hebreo y conserva el contraste cultual con el velo.
  doctrine_reference: Éxodo 26; Hebreos 9:2-3
- issue: Terminología de las piezas fundidas del tabernáculo
  english_pob_reading: bases
  chosen_spanish_reading: bases
  alternative_spanish_readings:
  - sockets
  - pedestales
  rationale: La elección conserva la decisión auditada de la POB en inglés, pero en español "bases" sigue siendo suficientemente técnico y transparente. No se adopta un término eclesiástico más tradicional que oscurezca la función material.
  doctrine_reference: Éxodo 26:19-21; 38:30-31
translation_notes:
  revision_awareness: El texto sigue el consenso alto del auditorial inglés y no requiere revisión sustantiva; se mantuvo la relación numérica exacta y el contraste entre santuario y velo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general, pero este versículo no contiene el nombre divino.
  - '"Bases" se conserva de manera consistente con la terminología técnica del tabernáculo.'
  - '"Velo" se usa en sentido cultual específico, no como cortina genérica.'
  - '"Vaciar" se eligió por la fuerza técnica de יצק en metalurgia; no se traduce como simple "verter".'
