theological_decisions:
- issue: Whether to imply actual death or only apparent death
  chosen_reading: The boy appeared dead but was not stated to be actually dead.
  alternative_readings:
  - The boy died temporarily
  - The text leaves open whether he actually died
  rationale: The comparative ὡσεὶ ('like/as if') and the report of the crowd ('many were saying') indicate appearance and perception rather than a narrator assertion of death. The translation preserves that tension without importing a miracle of resurrection into this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
