translation:
  language: es
  text: 'Dijo[a]: «Córtenlo», y lo cortan; dijo: «Plántenlo», y lo plantan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego omite el objeto en ambos miembros; el español lo hace explícito con «lo» para que la frase suene natural y conserve el paralelismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - dijo
  - él ordenó
  - él mandó
  lexicon: LSJ
  rationale: El aoristo de λέγω funciona aquí como fórmula introductoria de cada directriz. «Dijo» conserva la tersura y la repetición del griego sin convertir el enunciado en una paráfrasis más interpretativa como «ordenó» o «mandó».
- source_word: ἐκκόψαι
  english_pob_choice: Cut it down
  chosen_spanish: Córtenlo
  alternatives_spanish:
  - Cortarlo
  - Derríbenlo
  - Tálenlo
  lexicon: LSJ
  rationale: El infinitivo aoristo tras εἶπεν expresa el contenido del mandato. En español, la forma natural y fiel es un imperativo directo. «Córtenlo» comunica la acción de cortar o talar con claridad, manteniendo el objeto implícito del griego mediante el pronombre átono.
- source_word: ἐκκόπτουσιν
  english_pob_choice: they cut it down
  chosen_spanish: lo cortan
  alternatives_spanish:
  - lo talan
  - lo derriban
  - cortan
  lexicon: LSJ
  rationale: El presente plural expresa ejecución inmediata de la orden. «Lo cortan» conserva la brevedad y la repetición del paralelismo. «Talan» sería posible si el contexto exigiera de forma más explícita árboles, pero el griego no lo especifica.
- source_word: φυτεῦσαι
  english_pob_choice: Plant it
  chosen_spanish: Plántenlo
  alternatives_spanish:
  - Plantarlo
  - Siémbrenlo
  - Pónganlo a plantar
  lexicon: LSJ
  rationale: 'El infinitivo aoristo paralelo a ἐκκόψαι pide de nuevo una forma imperativa natural en español. «Plántenlo» mantiene el paralelo con «Córtenlo» y respeta el valor simple de φυτεύω: introducir o establecer una planta.'
- source_word: φυτεύουσιν
  english_pob_choice: they plant it
  chosen_spanish: lo plantan
  alternatives_spanish:
  - plantan
  - lo siembran
  - lo establecen
  lexicon: LSJ
  rationale: Se conserva el presente plural y el objeto implícito con el pronombre «lo». «Lo plantan» reproduce el ritmo del texto y evita añadir matices no garantizados por el griego.
translation_notes:
  revision_awareness: 'El borrador sigue la lectura griega de Swete: dos enunciados paralelos con infinitivo de contenido tras εἶπεν y respuesta en presente plural. La revisión inglesa POB también suplió un objeto tácito; aquí se mantiene la misma solución en español, sin añadir el referente porque el contexto inmediato no lo especifica.'
  spanish_consistency_notes:
  - Se usó «dijo» en vez de «habló» o «mandó» para mantener la sencillez del griego.
  - Se mantuvo el paralelismo sintáctico con dos órdenes y dos respuestas inmediatas.
  - El objeto tácito se resolvió con «lo» en ambos hemistiquios para una lectura fluida y consistente.
