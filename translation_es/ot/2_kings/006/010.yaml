translation:
  language: es
  text: Entonces el rey de Israel envió aviso[a] al lugar acerca del cual el hombre de Dios le había hablado y le había advertido, y se mantuvo alerta[b] allí, no una vez ni dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «envió al lugar». El hebreo dice simplemente «envió»; el objeto exacto queda implícito en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se mantuvo en guardia allí». El hebreo puede enfatizar tanto que el rey estaba alerta como que tomó precauciones en ese lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'envió'; en español, 'envió' es la equivalencia directa y natural. No se añade un objeto explícito como 'hombres' porque no está en el texto fuente y la construcción española puede mantenerse sobria y fiel alipsis del hebreo.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - al sitio
  - a ese lugar
  lexicon: HALOT
  rationale: מָקוֹם se traduce de forma directa como 'lugar'. El artículo definido se conserva con 'al lugar' para mantener la referencia específica y el flujo narrativo.
- source_word: אֲשֶׁר אָמַר לוֹ
  english_pob_choice: about which ... had spoken to him
  chosen_spanish: acerca del cual ... le había hablado
  alternatives_spanish:
  - del que ... le había dicho
  - sobre el cual ... le había hablado
  lexicon: HALOT
  rationale: La cláusula relativa une el lugar con la comunicación previa del varón de Dios. 'Acerca del cual' conserva la relación preposicional sin forzar una paráfrasis excesiva, y 'le había hablado' refleja bien אָמַר en este contexto de advertencia previa.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se conserva el título hebreo tradicional 'hombre de Dios' porque es una designación narrativa estable y transparente; 'varón' sería más literal pero menos natural en español actual, y 'profeta' interpretaría más de lo que el hebreo dice aquí.
- source_word: וְהִזְהִירֹה
  english_pob_choice: and warned him
  chosen_spanish: le había advertido
  alternatives_spanish:
  - le había alertado
  - le había prevenido
  lexicon: HALOT
  rationale: El hitpael/hiphil de זהר expresa advertir o poner sobre aviso. 'Le había advertido' es claro y fiel, y conserva la advertencia previa sin intensificarla indebidamente.
- source_word: וְנִשְׁמַר
  english_pob_choice: and he kept himself on guard
  chosen_spanish: se mantuvo ... en guardia
  alternatives_spanish:
  - se guardó
  - tomó precauciones
  lexicon: HALOT
  rationale: 'El nifal de שמר aquí tiene sentido reflexivo: el rey actuó con cautela. ''Se mantuvo en guardia'' expresa esa vigilancia continua en un español natural, sin perder el matiz reflexivo.'
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: '''Allí'' retoma el lugar ya mencionado y suena idiomático en español narrativo.'
- source_word: לֹא אַחַת וְלֹא שְׁתָּיִם
  english_pob_choice: not once or twice
  chosen_spanish: no una vez ni dos
  alternatives_spanish:
  - no una sola vez ni dos
  - no una vez o dos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y significa repetición. 'No una vez ni dos' preserva el ritmo y la fuerza proverbial sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Título אישי־divino 'hombre de Dios' frente a 'profeta'
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el varón de Dios
  - el profeta de Dios
  rationale: Se conserva el título del hebreo y del POB inglés. Aunque el referente sea Eliseo, el texto no usa aquí la palabra 'profeta'; por fidelidad, se mantiene la fórmula tradicional hebrea.
  doctrine_reference: 2 Reyes 6:10; uso narrativo del título נָבִיא no explícito aquí
- issue: Sentido reflexivo de וְנִשְׁמַר
  english_pob_reading: and he kept himself on guard
  chosen_spanish_reading: se mantuvo ... en guardia
  alternative_spanish_readings:
  - estuvo en guardia
  - tomó precauciones
  rationale: La lectura elegida conserva la tensión entre vigilancia y precaución sin decidir de forma demasiado estrecha si el énfasis recae en la actitud continua o en las medidas tomadas. El español 'en guardia' mantiene bien la imagen de cautela del hebreo.
  doctrine_reference: HALOT, שמר nifal reflexivo en contextos de cautela
- issue: Idiomática numérica 'no una vez ni dos'
  english_pob_reading: not once or twice
  chosen_spanish_reading: no una vez ni dos
  alternative_spanish_readings:
  - no una vez o dos
  - no pocas veces
  rationale: Se conserva el paralelismo semítico sin convertirlo en una paráfrasis interpretativa como 'muchas veces' o 'repetidamente'. La forma elegida mantiene la fuerza retórica del original.
  doctrine_reference: 2 Reyes 6:10; idiomatismo hebreo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglesa: la sugerencia de insertar un objeto explícito como ''[men]'' no se siguió porque no está en el hebreo; se mantuvo la lectura sobria ''envió al lugar''. También se respetó la decisión revisada de no añadir ''word'' ni otro complemento ajeno al texto fuente. El español refleja esa misma contención auditada.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים y se conserva el título 'hombre de Dios' por consistencia con el registro narrativo de la serie.
  - '''Guardia'' y ''en guardia'' se usan para reproducir el campo semántico de שמר sin sobreinterpretarlo.'
  - No se introduce 'Cristo', 'SEÑOR' ni otros equivalentes no pertinentes al versículo.
  - La puntuación reproduce la cadencia del hebreo con una pausa final idiomática en español.
