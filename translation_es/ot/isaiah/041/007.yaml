  text: וַ/יְחַזֵּ֤ק חָרָשׁ֙ אֶת צֹרֵ֔ף מַחֲלִ֥יק פַּטִּ֖ישׁ אֶת ה֣וֹלֶם פָּ֑עַם אֹמֵ֤ר לַ/דֶּ֨בֶק֙ ט֣וֹב ה֔וּא וַ/יְחַזְּקֵ֥/הוּ בְ/מַסְמְרִ֖ים לֹ֥א יִמּֽוֹט־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/041/007.yaml
  text: The craftsman strengthens the goldsmith[a]; he who smooths with the hammer strengthens him who strikes the anvil, saying of the soldering, “It is good”[b]; then he fastens it with nails so that it will not totter.
  footnotes:
  - marker: a
    text: Or “of the joining,” “of the solder,” or less likely “of the glue.” The Hebrew term refers to the material or process by which the crafted object is joined together.
    reason: lexical_alternative
  - marker: b
    text: Or “so that it will not be moved” or “so that it will not topple.”
    reason: lexical_alternative
