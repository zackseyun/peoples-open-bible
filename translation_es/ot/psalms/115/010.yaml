  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: vocativo «Casa de Aarón», imperativo plural «confíen», nombre divino «Yahvé», y la cláusula final en tercera persona plural «su ayuda y su escudo». También preserva correctamente la imagen concreta de «escudo».'
  spanish_quality_summary: 'El texto principal es claro y fiel, pero la nota al pie es defectuosa: dice «Hebreo: “Yahvé”» como si fuera una alternativa textual, cuando en realidad el hebreo usa יהוה y el texto principal ya lo traduce como «Yahvé». Esa nota proviene del rastro inglés anterior y no corresponde al criterio actual del proyecto en español. Además, marcar «Casa de Aarón» con una nota sobre el nombre divino desancla la nota del término relevante.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé» en el texto principal; no se enmascara como «SEÑOR». No hay conflicto con otras entradas del glosario. La única desalineación es la nota heredada, que ya no representa una alternativa significativa y debe eliminarse.'
  issues:
  - severity: medium
    issue: Nota al pie incorrecta e innecesaria sobre el nombre divino
    rationale: 'El texto principal ya usa «Yahvé», que es precisamente el estándar del proyecto para יהוה. La nota «Hebreo: “Yahvé”...» no informa una variante ni una alternativa útil, y además está anclada en «Casa de Aarón» en vez de en «Yahvé».'
  revised_spanish_text: Casa de Aarón, confíen en Yahvé; él es su ayuda y su escudo.
  revision_rationale: Se conserva el texto del versículo porque es fiel al hebreo y suena natural en español. Se elimina la nota al pie porque es inexacta, redundante y está mal anclada; no hace falta ninguna nota para justificar «Yahvé», ya que esa es la forma principal exigida por el proyecto.
