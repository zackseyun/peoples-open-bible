  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios están bien en español («David», «Absalón»). La decisión de mantener «corazón/corazones» en vez de parafrasear como «lealtad» concuerda con la justificación léxica, siempre que se exprese naturalmente en español.
