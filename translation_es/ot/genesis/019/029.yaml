  rationale: 'Se ajusta el texto para reflejar mejor el hebreo y la auditoría POB: 1) se conserva la fórmula narrativa con un español más natural («Y sucedió que...»); 2) se reemplaza «sacó» por «hizo salir» para respetar mejor שׁלח; 3) se recupera más claramente el eco léxico entre הַהֲפֵכָה y בַּהֲפֹךְ mediante «catástrofe ... volcó» y notas; 4) se corrige la nota [a] para que corresponda a la alternativa documentada en inglés. No parece requerir adjudicación adicional.'
