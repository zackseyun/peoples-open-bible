translation:
  language: es
  text: Y sale el sol, y se pone el sol; y, apresurándose a su lugar, allí vuelve a salir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y a su lugar se apresura; allí vuelve a salir". El participio hebreo שׁוֹאֵף puede entenderse como "jadear" o, más idiomáticamente aquí, "apresurarse".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָרַח
  english_pob_choice: And the sun rises
  chosen_spanish: Y sale el sol
  alternatives_spanish:
  - Y el sol se levanta
  - Y el sol amanece
  lexicon: HALOT
  rationale: זָרַח describe el resplandecer o salir del sol. En español, "sale el sol" comunica con naturalidad la imagen observacional y mantiene el valor presente/gnómico del hebreo.
- source_word: וּבָא
  english_pob_choice: and the sun goes down
  chosen_spanish: y se pone el sol
  alternatives_spanish:
  - y el sol baja
  - y el sol se oculta
  lexicon: HALOT
  rationale: בוא con el sol alude idiomáticamente a su puesta. "Se pone el sol" es una expresión natural en español y conserva la dirección del movimiento sin forzar un calco.
- source_word: מְקוֹמוֹ
  english_pob_choice: to its place
  chosen_spanish: hacia su lugar
  alternatives_spanish:
  - a su lugar
  - a su sitio
  lexicon: HALOT
  rationale: El sustantivo significa "lugar" y el sufijo indica posesión singular masculina. "Hacia su lugar" conserva la orientación y la progresión espacial del hebreo.
- source_word: שׁוֹאֵף
  english_pob_choice: hastening
  chosen_spanish: apurándose
  alternatives_spanish:
  - acelerándose
  - apresurándose
  lexicon: HALOT
  rationale: El participio puede sugerir jadear, ansiar o apresurarse. Siguiendo la revisión inglesa que prefirió una lectura más natural que "pants", "apurándose" expresa la prisa del movimiento sin perder la energía del verbo.
- source_word: זוֹרֵחַ
  english_pob_choice: rising
  chosen_spanish: vuelve a salir
  alternatives_spanish:
  - sale de nuevo
  - vuelve a levantarse
  lexicon: HALOT
  rationale: El participio expresa acción continua y enlaza con el verbo inicial. "Vuelve a salir" comunica bien la repetición cíclica y evita una redundancia poco natural en español.
- source_word: הוּא שָׁם
  english_pob_choice: there again
  chosen_spanish: allí
  alternatives_spanish:
  - allí de nuevo
  - allí otra vez
  lexicon: HALOT
  rationale: El hebreo subraya el retorno al mismo lugar. En español, el adverbio "allí" deja abierta la referencia y, en combinación con "vuelve a salir", comunica el valor resumptivo sin añadir más de lo que exige el texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que reemplazó "it pants" por una formulación más natural como "hastening". Por eso la española evita un calco físico de "jadear" en el texto principal y reserva la alternativa más literal para la nota.
  spanish_consistency_notes:
  - Se mantuvo "sol" en minúscula por tratarse de un astro común dentro de una sentencia general.
  - Se evitó "Cristo/Mesías" y cualquier terminología teológica no presente en el versículo.
  - La construcción verbal intenta conservar el paralelismo hebreo de dos acciones del sol con una cláusula participial intermedia.
  - El adverbio final se integró de manera implícita en "vuelve a salir" para no sobrecargar el español con una repetición artificiosa.
