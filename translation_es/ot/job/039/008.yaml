translation:
  language: es
  text: Explora las montañas como su pastura[a], y anda en busca de toda cosa verde[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recorre las montañas como su lugar de pastoreo».'
    reason: lexical_alternative
  - marker: b
    text: «Toda cosa verde» se refiere a vegetación fresca o brotes verdes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְתוּר
  english_pob_choice: explores
  chosen_spanish: explora
  alternatives_spanish:
  - recorre
  - explora por
  - revisa
  lexicon: HALOT
  rationale: The Qal of תור conveys roaming, exploring, scouting, or ranging about. «Explora» mantiene el movimiento libre y de búsqueda del animal sin volverlo estático.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - montañas
  - los montes
  lexicon: HALOT
  rationale: El sustantivo es literalmente «montañas»; el artículo hebreo se conserva de manera natural en español con «las montañas».
- source_word: מִרְעֵהוּ
  english_pob_choice: his pasture
  chosen_spanish: su pasto
  alternatives_spanish:
  - su pastura
  - su lugar de pastoreo
  - su pastizal
  lexicon: HALOT
  rationale: מִרְעֶה designa el lugar de pasto o de alimentación. «Su pasto» es breve y natural en español, y conserva la idea del lugar donde se alimenta.
- source_word: וְאַחַר
  english_pob_choice: and ... after
  chosen_spanish: anda en busca de
  alternatives_spanish:
  - y busca
  - y va tras
  - y sigue
  lexicon: HALOT
  rationale: La secuencia con אַחַר expresa persecución o búsqueda dirigida. En español, «anda en busca de» transmite esa orientación sin sonar rígido.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - toda clase de
  - cualquier
  lexicon: HALOT
  rationale: Aquí כָּל funciona de manera distributiva con «verde»; «toda» comunica amplitud y abarque sin excesiva literalidad.
- source_word: יָרוֹק
  english_pob_choice: green thing
  chosen_spanish: cosa verde
  alternatives_spanish:
  - vegetación verde
  - brote verde
  - planta verde
  lexicon: HALOT
  rationale: El término refiere a lo verde, especialmente vegetación fresca. «Cosa verde» preserva el alcance amplio de la expresión inglesa y la referencia a crecimiento fresco.
- source_word: יִדְרֹשׁ
  english_pob_choice: he searches
  chosen_spanish: anda en busca de
  alternatives_spanish:
  - busca
  - persigue
  - explora
  lexicon: HALOT
  rationale: דרשׁ en Qal significa buscar o indagar; en este contexto de forrajeo, «anda en busca de» expresa una búsqueda activa y continuada.
translation_notes:
  revision_awareness: No se aplicaron revisiones en el último pase; el texto base del control inglés permaneció sin cambios. La opción española sigue de cerca el mismo sentido auditado, ajustando la fluidez natural del español sin añadir contenido no sustentado por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «las montañas» con artículo, en paralelo al inglés auditado y al hebreo definido.
  - Se evitó «SEÑOR» o terminología teológica no pertinente; el verso es descriptivo y zoológico.
  - «Su pasto» conserva el matiz de lugar de alimentación; la nota ofrece la alternativa más cercana a «grazing place».
  - «Cosa verde» preserva el alcance abierto de יָרוֹק, con explicación explícita en nota.
