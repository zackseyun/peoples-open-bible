translation:
  language: es
  text: En aquellos días hubo una hambruna muy grave, y el país se pasó a su lado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tierra se pasó con ellos» o «al otro bando». El verbo griego indica defección o deserción hacia otra parte.'
