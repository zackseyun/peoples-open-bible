revisions:
- from: Él recuerda su pacto para siempre[a], la palabra que mandó para mil generaciones.
  to: Él recuerda su alianza para siempre[a], la palabra que mandó para mil generaciones.
  rationale: Se cambia 'pacto' por 'alianza' para reflejar mejor בְּרִית en español bíblico natural y acorde con la carga teológica de covenant. Se conserva 'la palabra' en el texto principal, conforme al POB auditado. La nota se ajusta a una formulación española más idiomática para expresar la alternativa interpretativa 'promesa' sin la aspereza de 'promesa que mandó'.
  reviewer_model: gpt-5.4
