review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: petición jussiva («Que…»), «tu obra» para פָעֳלֶךָ, y «tu esplendor» para וַהֲדָרְךָ. También mantiene correctamente la distinción entre los siervos presentes y la generación siguiente. Sin embargo, en español el texto principal «sus hijos» no preserva del todo la decisión auditada del POB de expresar el sentido generacional inclusivo de בְּנֵיהֶם como ‘children’ en vez de ‘sons’.'
  spanish_quality_summary: La redacción es clara, natural y digna. «Que se manifieste tu obra» suena bien en español bíblico contemporáneo. El punto mejorable es «sus hijos[b]», que en español tiende a leerse de forma más masculina/exclusiva que el inglés auditado; «sus hijos e hijas» sería demasiado expansivo frente al hebreo, pero «sus hijos» en texto con nota no alcanza la meta de exactitud de referente fijada por el POB. «sus hijos» también crea una tensión innecesaria con la nota, que admite un sentido más amplio.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. «Siervos» está justificado contextualmente frente a «esclavos». «Esplendor» sigue bien la decisión de evitar confundir הָדָר con «gloria». La mejora necesaria es alinear בְּנֵיהֶם con la política de referente generacional inclusivo ya documentada en el audit trail, usando «sus hijos[a]»? No: mejor ajustar el texto principal a «sus descendientes[a]» o «sus hijos e hijas»; de estas, «sus descendientes[a]» conserva mejor el alcance generacional sin sobretraducción. También conviene reordenar las notas para que la alternativa sobre יֵרָאֶה quede en un marcador distinto y el anclaje corresponda exactamente.'
  issues:
  - severity: medium
    issue: «sus hijos» en el texto principal no refleja plenamente la decisión auditada de traducir בְּנֵיהֶם con sentido generacional inclusivo.
    rationale: El inglés POB eligió explícitamente ‘their children’ para evitar una lectura exclusivamente masculina. En español, «hijos» puede funcionar a veces como genérico, pero aquí no transmite con suficiente claridad esa decisión; «descendientes» comunica mejor la intención documentada.
  - severity: low
    issue: La nota sobre «Que se vea tu obra» está anclada a «siervos[a]» en vez de al segmento verbal donde recae la alternativa.
    rationale: La disciplina del proyecto pide que el marcador aparezca en la palabra o frase relevante. La alternativa corresponde a יֵרָאֶה, no a עֲבָדֶיךָ.
