review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el texto griego breve de SBLGNT: στραφεὶς δὲ ἐπετίμησεν αὐτοῖς = «Pero él se volvió y los reprendió». La nota también preserva correctamente la variante larga conocida. Sin embargo, la redacción de la nota puede mejorarse para mayor naturalidad y fidelidad idiomática al español eclesial actual.'
  spanish_quality_summary: 'El texto principal es claro, natural y fiel. La única reparación necesaria es estilística en la nota: «las vidas de los hombres» suena calcado e innecesariamente torpe; conviene «la vida de las personas» o similar. También «No saben» debe concordar mejor con el sujeto implícito de plural respetuoso o con el contexto; «No saben de qué clase de espíritu son» suena más natural que «de qué espíritu son».'
  glossary_alignment: No hay términos del glosario mayor en juego salvo mantener un registro digno y natural. «reprendió» corresponde bien a ἐπετίμησεν; no hay conflicto terminológico. La variante no introduce problemas con Yahvé/Mesías/etc. en el texto principal.
  issues:
  - severity: medium
    issue: La nota textual usa «destruir las vidas de los hombres»
    rationale: Es un calco poco natural en español y no refleja bien el uso idiomático de «people's lives» en la nota inglesa ni la forma normal de expresarlo en español bíblico contemporáneo.
  - severity: low
    issue: La frase de la variante «No saben de qué espíritu son» puede sonar rígida
    rationale: Aunque entendible, «de qué clase de espíritu son» comunica mejor la idea y evita una formulación algo literalizada.
  revised_spanish_text: Pero él se volvió y los reprendió[a].
  revised_footnotes:
  - marker: a
    text: 'Algunos manuscritos posteriores añaden: «y dijo: “No saben de qué clase de espíritu son; porque el Hijo del Hombre no ha venido a destruir la vida de las personas, sino a salvarla”»'
    reason: textual_variant
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, claro y natural. Solo se ajusta la nota textual para eliminar un calco poco idiomático («las vidas de los hombres») y mejorar la fluidez de la variante conocida en español, sin alterar la decisión textual documentada de mantener la lectura corta en el cuerpo principal.
