translation:
  language: es
  text: Con los cascos de sus caballos pisoteará todas tus calles[a]; matará a tu pueblo con la espada, y los pilares[b] de tu fuerza caerán a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas tus plazas» o «todos tus espacios abiertos» para «todas tus calles».
    reason: lexical_alternative
  - marker: b
    text: O «los monumentos de tu fuerza». El hebreo puede referirse a pilares prominentes o monumentos asociados con el poder de Tiro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפַרְסוֹת
  english_pob_choice: With the hoofs of
  chosen_spanish: Con los cascos de
  alternatives_spanish:
  - Con las pezuñas de
  - Por medio de los cascos de
  lexicon: HALOT
  rationale: La preposición ב indica instrumento o medio; en español, «con» comunica bien la acción realizada por medio de los cascos. «Cascos» conserva la imagen animal normal para caballos y evita un calco torpe.
- source_word: סוּסָיו
  english_pob_choice: his horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus corceles
  - los caballos de él
  lexicon: HALOT
  rationale: El sustantivo apunta de manera directa a los caballos del agente. «Sus caballos» es claro y fiel; «corceles» sería más literario de lo que pide el contexto.
- source_word: יִרְמֹס
  english_pob_choice: he will trample
  chosen_spanish: pisoteará
  alternatives_spanish:
  - pisará
  - aplastará bajo los pies
  lexicon: HALOT
  rationale: El verbo רמס expresa la acción de pasar por encima y triturar con los pies. «Pisoteará» mantiene esa fuerza visual en español y suena natural.
- source_word: כָּל חוּצוֹתָיִךְ
  english_pob_choice: all your streets
  chosen_spanish: todas tus calles
  alternatives_spanish:
  - todas tus plazas
  - todos tus espacios abiertos
  lexicon: HALOT
  rationale: חוּצוֹת puede significar calles, plazas o espacios abiertos. En esta escena de asedio, «calles» funciona como equivalencia amplia y comprensible, sin excluir el matiz urbano abierto.
- source_word: עַמֵּךְ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tus habitantes
  lexicon: HALOT
  rationale: עַם se refiere a la población de la ciudad. «Tu pueblo» conserva el valor colectivo directo y es idiomático en español bíblico moderno.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: HALOT
  rationale: La expresión hebrea es instrumental y concreta. «Con la espada» conserva la imagen de arma usada para matar, en paralelo con el hebreo y con el estilo del versículo.
- source_word: יַהֲרֹג
  english_pob_choice: he will kill
  chosen_spanish: matará
  alternatives_spanish:
  - asesinará
  - matará a espada
  lexicon: HALOT
  rationale: El sentido básico de הרג es matar. «Matará» es el equivalente más directo y menos arcaico, acorde con la política de español moderno digno.
- source_word: וּמַצְּבֹת עֻזֵּךְ
  english_pob_choice: and the pillars of your strength
  chosen_spanish: y los pilares de tu fuerza
  alternatives_spanish:
  - y los monumentos de tu fuerza
  - y los pilares de tu poder
  lexicon: HALOT
  rationale: מַצֵּבוֹת puede referirse a pilares, monumentos o piedras erigidas. «Pilares de tu fuerza» preserva la metáfora sin resolver demasiado el referente, manteniendo la tensión lexical documentada por la POB.
- source_word: לָאָרֶץ תֵּרֵד
  english_pob_choice: will come down to the ground
  chosen_spanish: caerán a tierra
  alternatives_spanish:
  - descenderán a la tierra
  - serán derribados al suelo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «descenderá/descenderán a la tierra», en español la caída de pilares se expresa más naturalmente con «caerán a tierra». Se conserva el movimiento de descenso y destrucción sin forzar una construcción extraña.
translation_notes:
  revision_awareness: La versión española sigue de cerca el paquete fuente hebreo y el rastro auditado de la POB inglesa. No se detectaron revisiones aplicadas en la fuente inglesa; por eso se conserva la misma lectura básica, con ajustes naturales de español para «with the sword» y «will come down to the ground».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar cuando aparezca el Nombre divino; aquí no aplica porque el versículo no lo contiene.
  - Se conserva la imagen concreta de guerra y ruina sin sustituirla por un equivalente más interpretativo.
  - «Pilares de tu fuerza» retiene la ambigüedad del hebreo entre pilares, monumentos o piedras erigidas, tal como refleja la nota inglesa.
  - El plural español «caerán» se usa por concordancia natural con «los pilares», aunque el hebreo tenga forma singular con sentido colectivo.
