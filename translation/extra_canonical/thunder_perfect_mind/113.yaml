      (‘yourselves’).
    reason: lexical_alternative
  - marker: '2'
    text: 'ⲛⲉⲛⲧⲁⲩⲧⲛ̄ⲛⲟⲟⲩ = ‘those who (have) seen you’: ⲛⲉ (those who) + ⲛⲧⲁⲩ- (3pl
      first perfect) + ⲧⲛ̄ (2pl obj.) + ⲛⲟⲟⲩ (see). Aspect could be rendered ‘have
      seen’.'
    reason: cultural_note
  - marker: '3'
    text: ⲡⲓⲛⲁ is here taken as ‘sign’; ‘mark’ is also possible depending on dialectal
      usage.
    reason: lexical_alternative
  - marker: '4'
    text: ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ is rendered ‘that points out’; alternatives include ‘that brings
