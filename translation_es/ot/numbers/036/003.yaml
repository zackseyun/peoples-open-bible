revisions:
- from: Y si llegan a ser esposas de uno de los hijos de las tribus de los hijos de Israel, entonces su herencia será quitada de la herencia de nuestros padres y añadida a la herencia de la tribu a la que pertenezcan, y será quitada del lote[a] de nuestra herencia.
  to: Y si llegan a ser esposas de alguno de los hijos de las tribus de los hijos de Israel, entonces su herencia será quitada de la herencia de nuestros padres y añadida a la herencia de la tribu a la que pertenezcan, y será quitada de la porción asignada[a] de nuestra herencia.
  rationale: Se ajusta la expresión matrimonial para un español más natural y se cambia 'lote' por 'porción asignada' en el texto principal, siguiendo mejor la decisión contextual documentada en el POB inglés para גּוֹרָל, mientras la nota conserva la alternativa más literal.
