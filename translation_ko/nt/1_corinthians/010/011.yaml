base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/010/011.yaml
  text: Now these things happened to them as examples[a], but they were written for our instruction[c][b], on whom the ends of the ages have come.
  footnotes:
  - marker: a
    text: Or "as types" or "typologically"; Paul presents these events as patterns with instructive significance for later believers.
    reason: lexical_alternative
  - marker: b
    text: Or "for our admonition" or "for our warning"; the Greek includes both corrective instruction and warning.
    reason: lexical_alternative
  - marker: c
    text: Or "the end of the ages has come"; the Greek is plural, "the ends of the ages," which preserves Paul's salvation-historical wording.
    reason: alternative_reading
