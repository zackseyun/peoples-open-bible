    reason: lexical_alternative
  - marker: b
    text: O «corrientes de agua».
    reason: lexical_alternative
  - marker: c
    text: O «aguas profundas»; también «en la llanura y en las montañas».
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido principal del borrador, pero se corrige el léxico y el aparato de notas para alinearlos mejor con el hebreo y con el expediente inglés POB. «Una buena tierra» suena más natural en español que «una tierra buena». Se usa «arroyos de agua» como opción principal para נַחֲלֵי מָיִם, dejando «corrientes de agua» como alternativa en nota. «Profundidades» refleja mejor וּתְהֹמֹת en este contexto que «abismos». Y «en los valles y las colinas» comunica mejor el sentido topográfico colectivo documentado por la revisión inglesa. También se reducen y reordenan las notas para que sus anclajes sean claros y no se multipliquen sin necesidad.
