translation:
  language: es
  text: 'Entonces todos dijeron[a]: «¿Así que eres el Hijo de Dios?». Y él les dijo: «Ustedes dicen que yo soy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Ustedes lo dicen» o «Es como ustedes dicen». La respuesta de Jesús es afirmativa por el contexto, pero el griego es más literalmente: «Ustedes dicen que yo soy».'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - ellos todos
  - todos ellos
  lexicon: BDAG
  rationale: El participio/adjetivo plural funciona sustantivamente y se refiere al grupo entero. En español, «todos» conserva esa totalidad de forma natural; el sujeto explícito «ellos» queda sobreentendido por el contexto.
- source_word: οὖν
  english_pob_choice: so
  chosen_spanish: así que
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: En esta pregunta, οὖν marca inferencia o consecuencia del intercambio previo. «Así que» comunica bien esa relación en español moderno sin sonar forzado.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios Padre
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Se trata de un título cristológico; conviene conservar su forma formal y reconocible. «El Hijo de Dios» reproduce la construcción nominal y su peso acusatorio/interrogativo.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - les dijo
  lexicon: BDAG
  rationale: Aquí el verbo de habla es simple y directo. «Dijo» es natural en español y no añade matices interpretativos que el griego no exige.
- source_word: λέγετε
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - dicen ustedes
  - están diciendo
  lexicon: BDAG
  rationale: El presente plural puede expresarse de manera natural como «dicen». Sin embargo, para reflejar la fuerza de la respuesta de Jesús y la pluralidad del verbo, la formulación completa «Ustedes dicen» mantiene la referencia a los interlocutores.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que
  - porque
  lexicon: BDAG
  rationale: Aquí introduce el contenido de lo dicho; «que» es la correspondencia natural en español y preserva la sintaxis griega sin interpretarla de más.
- source_word: ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - yo soy él
  - yo soy
  lexicon: BDAG
  rationale: La frase es breve y potencialmente solemne. «Yo soy» traduce de forma directa las palabras presentes y conserva la tensión teológica sin añadir una paráfrasis explicativa.
theological_decisions:
- issue: Cómo traducir la respuesta de Jesús sin resolver por adelantado su valor afirmativo e indirecto
  english_pob_reading: Render literally as 'You say that I am' and footnote idiomatic alternatives
  chosen_spanish_reading: «Ustedes dicen que yo soy» con nota de alternativas idiomáticas
  alternative_spanish_readings:
  - «Así es como ustedes dicen que yo soy»
  - «Eso dicen ustedes»
  - «Tú lo dices»
  rationale: El griego permite entender la frase como una afirmación en contexto, pero su forma literal es más sobria y deja abierta la tensión retórica. La nota ofrece equivalentes idiomáticos sin borrar la ambigüedad expresiva del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, y mantiene una traducción literal y publicable de la respuesta de Jesús, con la alternativa idiomática reservada para la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto subyacente lo requiera explícitamente; aquí no aparece el nombre divino tetragramático, sino θεοῦ, por lo que corresponde «Dios».
  - Se mantiene «Hijo de Dios» como título cristológico formal, sin sustituirlo por una glosa más explicativa.
  - «Yo soy» conserva la brevedad del ἐγώ εἰμι y evita cerrar la posible resonancia teológica del griego.
  - La nota [a] está anclada al final de la primera oración para reflejar la alternativa idiomática sin alterar el texto principal.
