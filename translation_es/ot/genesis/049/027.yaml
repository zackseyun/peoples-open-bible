    text: Or 'Benjamin is a ravening wolf'; the Hebrew verb emphasizes tearing prey, so the main text renders the image more explicitly.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'prey' can also be understood more broadly as 'booty' or 'plunder.'
    reason: lexical_alternative
  - marker: c
    text: '''Spoil'' may also be translated ''plunder'' or ''booty.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'that tears its prey'.
    reason: previous_rendering
