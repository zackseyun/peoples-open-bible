  to: 'Entonces Rut dijo[a]: «No me ruegues que te deje, que me vuelva de seguirte[b]. Pues adonde tú vayas, yo iré; y donde tú pases la noche, yo pasaré la noche[c]. Tu pueblo será mi pueblo[d], y tu Dios mi Dios».'
  rationale: 'Se ajusta el español para mayor naturalidad y mejor fidelidad estilística al hebreo y al audit trail del POB: ''me ruegues'' refleja bien פגע ב y mantiene tono suplicante; ''me vuelva de seguirte'' comunica el modismo sin rigidez; ''pases la noche'' representa mejor לון en español idiomático; y la nota final corrige la documentación sobre las cláusulas sin verbo para alinearla con el texto y con la decisión inglesa.'
