  to: 'Entonces Yahvé dijo a Moisés: «Extiende tu mano hacia el cielo[a], para que caiga granizo sobre toda la tierra de Egipto, sobre el hombre[b] y sobre la bestia y sobre toda planta del campo en la tierra de Egipto».'
  rationale: 'Se conserva el texto principal casi intacto por ser fiel y legible, pero se corrige el aparato de notas para que refleje la evidencia fuente y el audit trail inglés: se elimina la nota innecesaria sobre «Yahvé», se ancla correctamente la alternativa de «cielo/cielos», y se añade la aclaración requerida para el sentido genérico de «el hombre».'
