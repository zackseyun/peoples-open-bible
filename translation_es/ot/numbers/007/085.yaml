translation:
  language: es
  text: cada plato de plata pesaba ciento treinta siclos, y cada cuenco setenta; toda la plata de los utensilios era de dos mil cuatrocientos siclos, según el siclo del santuario[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “conforme al siclo del santuario”.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשִׁים וּמֵאָה
  english_pob_choice: one hundred thirty
  chosen_spanish: ciento treinta
  alternatives_spanish:
  - ciento y treinta
  - ciento treinta y uno
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'treinta y cien', pero en español el orden natural y fiel es 'ciento treinta'. Conserva el valor numérico sin mecanicismo.
- source_word: הַקְּעָרָה הָאַחַת
  english_pob_choice: each silver plate
  chosen_spanish: cada platillo
  alternatives_spanish:
  - cada plato
  - el platillo
  lexicon: HALOT
  rationale: 'En este inventario cultual, la forma singular con artículo funciona distributivamente: se refiere al peso de cada objeto. ''Platillo'' comunica bien קְעָרָה en español y evita ambigüedad con un plato cotidiano demasiado genérico.'
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - de plata fina
  - de plata
  lexicon: HALOT
  rationale: Aquí el material del recipiente es plata, no dinero. En español, 'de plata' es natural y mantiene el sentido material.
- source_word: וְשִׁבְעִים
  english_pob_choice: seventy
  chosen_spanish: setenta
  alternatives_spanish:
  - setenta y uno
  lexicon: HALOT
  rationale: Número cardinal directo para el peso del segundo recipiente.
- source_word: הַמִּזְרָק הָאֶחָד
  english_pob_choice: each basin
  chosen_spanish: cada tazón
  alternatives_spanish:
  - cada cuenco
  - cada basin
  lexicon: HALOT
  rationale: מִזְרָק designa un recipiente para aspersión/uso ritual. 'Tazón' es un equivalente claro y legible en español; 'cuenco' también sería posible, pero 'tazón' resulta más natural sin perder el sentido de utensilio ritual.
- source_word: כֹּל כֶּסֶף הַכֵּלִים
  english_pob_choice: all the silver of the vessels
  chosen_spanish: toda la plata de los utensilios
  alternatives_spanish:
  - todo el peso de plata de los utensilios
  - toda la plata de los vasos
  lexicon: HALOT
  rationale: כֵּלִים son utensilios/vajilla ritual; 'utensilios' preserva el alcance genérico sin sugerir objetos modernos. 'Toda la plata' mantiene el total de material, no un monto monetario.
- source_word: אַלְפַּיִם וְאַרְבַּע מֵאוֹת
  english_pob_choice: two thousand four hundred
  chosen_spanish: dos mil cuatrocientos
  alternatives_spanish:
  - dos mil y cuatrocientos
  lexicon: HALOT
  rationale: Se usa el orden numérico natural del español para el total.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo del lugar santo
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'according to' por naturalidad; en español 'según' expresa bien el patrón de peso. 'Siclo del santuario' conserva la referencia técnica y evita sustituirla por una paráfrasis más interpretativa.
theological_decisions:
- issue: 标准 de peso cultual / valor de la frase final
  english_pob_reading: according to the shekel of the sanctuary
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - conforme al siclo del santuario
  - según el siclo del lugar santo
  rationale: El texto especifica una norma de peso usada en el contexto sagrado, no una localización espacial. 'Según' mantiene la idea de conformidad con un estándar; no introduce interpretación doctrinal adicional.
  doctrine_reference: Números 7:85; Éxodo 30:13; Levítico 27:25
- issue: Distribución singular en lista de ofrendas
  english_pob_reading: each silver plate ... and each basin
  chosen_spanish_reading: cada platillo ... y cada tazón
  alternative_spanish_readings:
  - el platillo ... y el tazón
  - cada plato ... y cada cuenco
  rationale: La estructura hebrea usa singular con artículo para cada objeto dentro de una lista cuantificada. En español conviene reflejar la distribución explícita con 'cada' para evitar que se lea como un solo objeto.
  doctrine_reference: Números 7:84-88
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final de 'by the shekel of the sanctuary' a 'according to the shekel of the sanctuary' por naturalidad. La versión española sigue esa misma lógica con 'según el siclo del santuario'. También conserva el valor distributivo de los singulares hebreos mediante 'cada' en los dos primeros miembros.
  spanish_consistency_notes:
  - Se mantiene 'siclo' para שֶׁקֶל en coherencia con terminología bíblica técnica en español.
  - Se usa 'de plata' para el material del objeto, no 'plata' como sustantivo absoluto, para mayor claridad.
  - '''Utensilios'' abarca correctamente כֵּלִים en un contexto de ofrenda ritual.'
  - La puntuación con punto y coma separa los dos grupos de ofrendas y refleja la estructura enumerativa del hebreo.
