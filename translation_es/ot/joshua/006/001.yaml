translation:
  language: es
  text: Jericó estaba cerrada y bien asegurada[a] por causa de los hijos de Israel[b]; nadie salía ni nadie entraba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea combina dos formas del verbo סגר para intensificar la idea: Jericó estaba completamente cerrada y asegurada.'
    reason: lexical_alternative
  - marker: b
    text: O 'los israelitas'. El hebreo dice 'los hijos de Israel', una designación corporativa habitual para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִירִיחוֹ
  english_pob_choice: Now Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Ahora Jericó
  - Y Jericó
  lexicon: HALOT
  rationale: El hebreo con ו- funciona como avance narrativo; en español no siempre requiere un equivalente explícito. Aquí se mantiene el nombre propio sin añadir una partícula que suene artificial en una oración breve de apertura.
- source_word: סֹגֶרֶת וּמְסֻגֶּרֶת
  english_pob_choice: was tightly shut up
  chosen_spanish: estaba cerrada y bien asegurada
  alternatives_spanish:
  - estaba cerrada y cerrada con seguridad
  - estaba completamente cerrada
  - estaba cerrada y sellada
  lexicon: HALOT
  rationale: La doble forma del hebreo intensifica el cierre total de la ciudad. En español, 'cerrada y bien asegurada' conserva la intensificación sin forzar un calco mecánico ni introducir imágenes no atestiguadas como 'barricada' o 'sellada'.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: delante de
  alternatives_spanish:
  - a causa de
  - por causa de
  - ante
  lexicon: HALOT
  rationale: En este verso la expresión no comunica solo localización, sino situación de la ciudad en relación con Israel. 'Delante de' mantiene el valor básico de 'frente a / en presencia de' y deja que el contexto explique la causa de la clausura sin añadir una interpretación emocional como 'por temor'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula corporativa hebrea. 'Los hijos de Israel' es transparente y fiel al paralelismo del texto, sin reemplazarla por el etnónimo más genérico 'israelitas'.
- source_word: אֵין יוֹצֵא וְאֵין בָּא
  english_pob_choice: no one went out, and no one came in
  chosen_spanish: nadie salía ni nadie entraba
  alternatives_spanish:
  - no salía nadie ni entraba nadie
  - no había quien saliera ni quien entrara
  - nadie salió ni nadie entró
  lexicon: HALOT
  rationale: El hebreo expresa clausura total mediante una fórmula idiomática. En español, el imperfecto narrativo 'salía/entraba' reproduce bien la descripción del estado de la ciudad, mientras que 'nadie' conserva la generalidad del hebreo sin sobrecargar la frase.
translation_notes:
  revision_awareness: Se siguió el acuerdo de alta concordancia del cotejo previo y no se introdujeron revisiones textuales nuevas; la decisión principal fue mantener en español la intensificación del hebreo sin calcarla de modo rígido.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia divina explícita.
  - Se eligió 'los hijos de Israel' para conservar la fórmula hebrea estándar y su tono corporativo.
  - Se usó lenguaje neutro y publicable en español latinoamericano, evitando arcaísmos innecesarios.
