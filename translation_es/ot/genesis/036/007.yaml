revisions:
- from: Porque sus posesiones eran demasiado grandes para habitar juntos, y la tierra de su peregrinación no podía sostenerlos[a] a causa de su ganado.
  to: Porque sus posesiones eran demasiado grandes para habitar juntos,[a] y la tierra de su residencia temporal[b] no podía sostenerlos[a] a causa de su ganado.
  rationale: Se reemplazó «peregrinación» por «residencia temporal» para reflejar mejor מְגֻרֵיהֶם como estancia de forasteros, no peregrinaje. Se añadió la nota literal correspondiente a לָשֵׂאת אֹתָם, preservada en el POB inglés. Se mantuvo «habitar juntos», «sostenerlos» y «ganado» por fidelidad y naturalidad en español.
