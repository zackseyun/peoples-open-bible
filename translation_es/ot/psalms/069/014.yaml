  text: וַ/אֲנִ֤י תְפִלָּתִֽ/י לְ/ךָ֨ יְהוָ֡ה עֵ֤ת רָצ֗וֹן אֱלֹהִ֥ים בְּ/רָב חַסְדֶּ֑/ךָ עֲ֝נֵ֗/נִי בֶּ/אֱמֶ֥ת יִשְׁעֶֽ/ךָ־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/069/014.yaml
  text: But as for me[a], my prayer is to you, O Yahweh, at a time of favor; O God, in the abundance of your steadfast love[b], answer me in the truth of your salvation.
