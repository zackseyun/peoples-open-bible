translation:
  language: es
  text: Ahora bien, entreguen las ciudades que tomaron, y los impuestos de los lugares que dominaron, más allá de las fronteras de Judea.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «desde las fronteras de Judea». La frase griega sobre los límites es algo condensada; aquí se da el sentido contextual más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Así pues
  - Ahora entonces
  lexicon: LSJ
  rationale: La combinación introduce una transición inferencial e inmediata. «Ahora pues» mantiene ese valor discursivo en español sin sonar forzado.
- source_word: παράδοτε
  english_pob_choice: hand over
  chosen_spanish: entreguen
  alternatives_spanish:
  - entreguen por completo
  - cedan
  lexicon: LSJ
  rationale: El imperativo pide transferir posesión o control. «Entreguen» es natural y directo; evita agregar matices de rendición o devolución que el contexto no obliga.
- source_word: τὰς πόλεις ἃς κατελάβετε
  english_pob_choice: the cities that you seized
  chosen_spanish: las ciudades que ustedes se apoderaron
  alternatives_spanish:
  - las ciudades que capturaron
  - las ciudades que ocuparon
  lexicon: LSJ
  rationale: καταλαμβάνω expresa tomar por fuerza o conquista. «Se apoderaron» comunica bien la apropiación violenta, aunque es menos literal que «capturaron».
- source_word: τοὺς φόρους
  english_pob_choice: the taxes
  chosen_spanish: los impuestos
  alternatives_spanish:
  - los tributos
  - las exacciones
  lexicon: LSJ
  rationale: φόροι puede referirse a impuestos o tributo. «Impuestos» es claro en español moderno; «tributos» sería posible, pero más arcaico o especializado.
- source_word: τῶν τόπων
  english_pob_choice: of the places
  chosen_spanish: de los lugares
  alternatives_spanish:
  - de los territorios
  - de los distritos
  lexicon: LSJ
  rationale: τόποι es amplio y no exige una precisión administrativa mayor. «Lugares» permanece cercano al griego y es comprensible.
- source_word: ὧν κατεκυριεύσατε
  english_pob_choice: over which you gained control
  chosen_spanish: sobre los cuales llegaron a dominar
  alternatives_spanish:
  - sobre los cuales obtuvieron dominio
  - de los cuales se hicieron dueños
  lexicon: LSJ
  rationale: κατακυριεύω significa obtener dominio o señorío. «Llegaron a dominar» comunica la idea de control político sin imponer un matiz teológico de «señorear».
- source_word: τῶν ὁρίων τῶν ἐκ τῆς Ἰουδαίας
  english_pob_choice: beyond the borders of Judea
  chosen_spanish: más allá de los límites de Judea
  alternatives_spanish:
  - fuera de los límites de Judea
  - desde los límites de Judea
  lexicon: LSJ
  rationale: La frase griega es comprimida y con fuerza elíptica. «Más allá de los límites de Judea» refleja bien el sentido contextual de territorios situados fuera de Judea propiamente dicha, preservando la elección interpretativa del POB inglés.
theological_decisions:
- issue: Sentido de la frase fronteriza τῶν ὁρίων τῶν ἐκ τῆς Ἰουδαίας
  english_pob_reading: beyond the borders of Judea
  chosen_spanish_reading: más allá de los límites de Judea
  alternative_spanish_readings:
  - fuera de los límites de Judea
  - desde los límites de Judea
  rationale: No es una cuestión doctrinal, pero sí una decisión interpretativa relevante. En contexto, la demanda se refiere a ciudades e impuestos tomados en áreas que quedan fuera de Judea propiamente dicha; por eso se adopta una lectura natural y legible en español.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity where genuine, but render the plain sense in readable modern Spanish.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la frase fronteriza de 'outside the borders of Judea' a 'beyond the borders of Judea'. La versión española sigue esa misma actualización con 'más allá de los límites de Judea'.
  spanish_consistency_notes:
  - Se mantiene «Judea» como topónimo establecido en español bíblico.
  - Se conserva el plural de tratamiento («ustedes») para reflejar el imperativo plural griego.
  - No se introduce «tributo» como equivalente principal porque el registro auditado del POB privilegia «taxes/impuestos» para φόροι.
