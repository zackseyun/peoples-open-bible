    issue: «Una cosa malvada» es poco idiomático
    rationale: Aunque formalmente fiel, en español suena torpe. El audit trail ya reconoce «vile matter» como alternativa; «una cosa vil» conserva la amplitud de דְּבַר בְּלִיַּעַל y lee con mayor naturalidad y dignidad.
  - severity: medium
    issue: «y al acostarse» no representa bien el enlace de וַאֲשֶׁר
    rationale: La frase española sugiere un acto puntual ('cuando se acuesta') más que el estado presente/resultante de estar postrado. «Y ahora que yace» o «y ahora que está tendido» preserva mejor el sentido contextual de consecuencia temporal sin sobreinterpretar.
