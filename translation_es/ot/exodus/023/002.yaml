review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y conserva el énfasis en no seguir a la mayoría para el mal ni en el contexto forense. Sin embargo, en el cuerpo principal se aparta del rastro auditado del POB al traducir תַעֲנֶה como «responderás» en lugar de una forma forense explícita como «testificarás», cuando el POB inglés optó deliberadamente por ''testify'' para aclarar el marco judicial de עַל רִיב. Esa opción puede dejar demasiado abierta la escena en español. Además, la nota al pie está mal anclada: ofrece como alternativa una lectura correspondiente a la segunda cláusula, pero el marcador [a] aparece en «hacer el mal».'
  spanish_quality_summary: El español es claro y digno, pero «responderás en un litigio» suena menos natural y menos preciso jurídicamente que «testificarás en un litigio» o «darás testimonio en un litigio». También «apartarte tras la mayoría» resulta algo rígido; «desviarte siguiendo a la mayoría» o «inclinarte tras la mayoría» mejora la naturalidad sin perder cercanía formal. La frase final «pervertir la justicia» es buena y clara.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La cuestión clave es de precisión léxica y de fidelidad al razonamiento documentado: ענה en este contexto debe alinearse con el valor forense explicitado por el POB. La alternativa más literal «responder» puede preservarse en nota, no como texto principal.'
  issues:
  - severity: high
    issue: תַעֲנֶה se tradujo como «responderás» en el texto principal
    rationale: El POB inglés documenta una decisión léxica deliberada por 'testify' debido al contexto legal con עַל רִיב. «Responderás» es posible como alternativa, pero en español diluye el sentido forense principal y no preserva bien la decisión auditada.
  - severity: high
    issue: La nota al pie [a] está anclada en el lugar equivocado
    rationale: La nota describe una alternativa para la segunda cláusula («no responderás en un litigio...»), pero el marcador [a] aparece junto a «hacer el mal». Esto incumple la disciplina de marcadores y puede confundir al lector.
  - severity: medium
    issue: «apartarte tras la mayoría» suena poco idiomático
    rationale: Aunque refleja el hebreo, en español resulta algo torpe. Una formulación como «desviarte siguiendo a la mayoría» conserva el sentido judicial y mejora la legibilidad.
  revised_spanish_text: No seguirás a la mayoría para hacer el mal, ni testificarás en un litigio[a] para desviarte siguiendo a la mayoría, para pervertir la justicia.
  revised_footnotes:
  - marker: a
    text: 'O: «ni responderás en un litigio para apartarte tras la mayoría, para torcer el juicio».

      '
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear el texto principal con la decisión léxica documentada del POB en inglés: en contexto judicial, ענה se expresa mejor como «testificarás». Se corrige el anclaje de la nota para que corresponda a la cláusula donde realmente aplica la alternativa más literal. También se suaviza la sintaxis de la cláusula media para un español más natural sin perder la repetición de la presión de la mayoría ni el sentido forense del hebreo.'
