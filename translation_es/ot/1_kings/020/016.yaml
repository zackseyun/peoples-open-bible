- from: Y salieron al mediodía[a]; y Ben-adad estaba bebiendo hasta embriagarse en las chozas, él y los treinta y dos reyes que lo ayudaban.
  to: Salieron al mediodía, mientras Ben-adad estaba bebiendo hasta embriagarse en las chozas[a], él y los treinta y dos reyes que lo ayudaban.
  rationale: Se ajusta la cláusula de Ben-adad para reflejar mejor el valor circunstancial del hebreo y del análisis POB («mientras...»), se mejora la naturalidad del español eliminando la coordinación redundante, y se corrige el anclaje de la nota léxica para que aparezca sobre «chozas», que es el término explicado.
