translation:
  language: es
  text: Son once días desde Horeb por la ruta del monte Seir hasta Kadesh-barnea[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «once días de camino». El hebreo expresa el tiempo de viaje entre Horeb y Kadesh-barnea por esta ruta.'
    reason: lexical_alternative
  - marker: b
    text: Horeb es el nombre usado aquí en el texto hebreo; a menudo se asocia con Sinaí.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַד עָשָׂר יוֹם
  english_pob_choice: It is eleven days
  chosen_spanish: Son once días
  alternatives_spanish:
  - Es un viaje de once días
  - Son once días de camino
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal idiomática que expresa duración/tiempo de viaje, no una afirmación sobre un objeto contado. En español, «Son once días» reproduce con naturalidad la lectura revisada del inglés POB y conserva el valor temporal sin añadir elementos no presentes en el hebreo.
- source_word: מֵחֹרֵב
  english_pob_choice: from Horeb
  chosen_spanish: desde Horeb
  alternatives_spanish:
  - de Horeb
  - desde el Horeb
  lexicon: HALOT
  rationale: Horeb es un nombre propio del texto hebreo y se conserva transliterado. «Desde» expresa mejor el punto de partida del trayecto que un simple «de» en español.
- source_word: דֶּרֶךְ
  english_pob_choice: by the way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la ruta de
  - vía el camino de
  lexicon: HALOT
  rationale: דֶּרֶךְ indica ruta o trayecto. «Por el camino de» suena natural en español y mantiene la idea de itinerario sin convertirla en una paráfrasis más libre.
- source_word: הַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: el monte Seir
  alternatives_spanish:
  - Mont Seir
  - la montaña de Seir
  lexicon: HALOT
  rationale: Aunque הַר puede referirse a una zona montañosa, la forma más directa y reconocible en español es «el monte Seir». Mantiene el carácter topográfico del hebreo y el orden usual del nombre propio compuesto.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hasta llegar a
  lexicon: HALOT
  rationale: En contexto geográfico, עַד marca el destino final del recorrido. «Hasta» es la equivalencia natural en español y conserva el límite espacial.
- source_word: קָדֵשׁ בַּרְנֵעַ
  english_pob_choice: Kadesh-barnea
  chosen_spanish: Kadesh-barnea
  alternatives_spanish:
  - Cades-barnea
  - Cades Barnea
  lexicon: HALOT
  rationale: Se conserva el nombre propio compuesto por transliteración. En un texto bíblico en español, la forma con guion facilita la lectura y refleja la unidad del topónimo.
theological_decisions:
- issue: Horeb frente a la identificación tradicional con Sinaí
  english_pob_reading: Horeb is the name used here in the Hebrew text; it is often associated with Sinai.
  chosen_spanish_reading: Horeb se mantiene como nombre del texto hebreo; suele asociarse con Sinaí.
  alternative_spanish_readings:
  - Sinaí
  - el Sinaí
  rationale: El hebreo de este versículo dice explícitamente Horeb, no Sinaí. Para respetar el dato fuente y la política del POB, se conserva Horeb en el texto principal y se deja constancia de su asociación tradicional con Sinaí en la nota.
  doctrine_reference: Deuteronomio 1:2; uso toponímico del Pentateuco
translation_notes:
  revision_awareness: La revisión inglesa eliminó una formulación más interpretativa («an eleven-day journey») y prefirió la cláusula nominal más literal («It is eleven days»). La redacción española sigue esa revisión, evitando introducir «viaje» como sustantivo principal en el texto base y reservando esa posibilidad para nota.
  spanish_consistency_notes:
  - Se conserva la transliteración de Horeb y Kadesh-barnea para mantener coherencia con el texto hebreo y con el criterio POB.
  - «Monte Seir» refleja la convención bíblica española más natural para הַר שֵׂעִיר sin añadir interpretaciones geográficas.
  - La cláusula inicial se formula en presente copulativo impersonal («Son once días») para reflejar la construcción nominal hebrea.
