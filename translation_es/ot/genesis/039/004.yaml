translation:
  language: es
  text: Y José halló favor ante sus ojos y le sirvió, y lo puso a cargo de su casa[a][b], y todo lo que tenía lo puso en su mano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo puso sobre su casa».'
    reason: lexical_alternative
  - marker: b
    text: 'La secuencia completa también puede entenderse así: «y le sirvió, y lo puso a cargo de su casa, y todo lo que tenía lo puso en su mano».'
    reason: previous_rendering
  - marker: c
    text: 'Hebreo: «en su mano», un modismo que significa bajo su autoridad o cuidado.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּמְצָא
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - halló favor
  lexicon: HALOT
  rationale: En la expresión con חֵן, el hebreo conserva el giro de ‘hallar favor’; ‘halló’ permite mantener ese patrón idiomático en español sin sonar áspero. ‘Encontró’ es posible, pero ‘halló’ acompaña mejor la fórmula bíblica.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  lexicon: HALOT
  rationale: En este contexto narrativo, ‘favor’ reproduce con naturalidad el sentido de aceptación o agrado en la evaluación de otro. ‘Gracia’ es válida, pero en español suena más teológica que la escena inmediata.
- source_word: בְּעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - en sus ojos
  lexicon: HALOT
  rationale: ‘Ante sus ojos’ conserva la imagen hebrea de evaluación personal y suena natural en español. ‘A sus ojos’ también sería posible, pero ‘ante’ expresa mejor el juicio u opinión.
- source_word: וַיְשָׁרֶת אֹתוֹ
  english_pob_choice: served him
  chosen_spanish: le sirvió
  alternatives_spanish:
  - le prestó servicio
  - le atendió
  lexicon: HALOT
  rationale: ‘Servir’ es el equivalente directo y claro para el servicio personal de José a Potifar. ‘Atender’ suaviza demasiado el verbo, y ‘prestar servicio’ resulta más pesado.
- source_word: וַיַּפְקִדֵהוּ עַל בֵּיתוֹ
  english_pob_choice: he appointed him over his house
  chosen_spanish: lo puso sobre su casa
  alternatives_spanish:
  - lo puso en cargo de su casa
  - lo puso a cargo de su casa
  - lo nombró sobre su casa
  lexicon: HALOT
  rationale: El verbo פקד en este contexto administrativo comunica asignación de responsabilidad. ‘Lo puso sobre su casa’ preserva la formalidad y la estructura del hebreo; ‘a cargo de’ explicita el sentido pero pierde algo de la imagen.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa/servicio doméstico
  - su casa-hogar
  lexicon: HALOT
  rationale: ‘Casa’ mantiene el término hebreo y funciona bien en español bíblico. En este contexto incluye la administración de la casa y del personal doméstico, sin necesidad de expandirlo en el texto principal.
- source_word: וְכָל יֶשׁ־לוֹ
  english_pob_choice: all that he had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todo cuanto poseía
  - todas sus posesiones
  lexicon: HALOT
  rationale: ‘Todo lo que tenía’ expresa de manera amplia y natural la totalidad de sus bienes. ‘Poseía’ es más formal; ‘posesiones’ acota demasiado el alcance del hebreo.
- source_word: נָתַן בְּיָדוֹ
  english_pob_choice: put all that he had into his hand
  chosen_spanish: lo puso en su mano
  alternatives_spanish:
  - lo puso bajo su autoridad
  - lo entregó a su cuidado
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de ‘mano’, que aquí indica responsabilidad o custodia. ‘Bajo su autoridad’ explicita la idea, pero borra la imagen original; por eso se deja la literalidad con claridad suficiente.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. Además, se evitó introducir ‘su maestro’ u otras aclaraciones interpretativas no presentes en el hebreo; se mantuvo la estructura breve del versículo y la metáfora de ‘mano’ con nota explicativa.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva el nombre propio como ‘José’ y no ‘Joseph’.
  - Se conserva la metáfora de ‘mano’ para reflejar el modismo hebreo y se explica en nota.
  - ‘Casa’ se deja sin expandir en el texto principal porque el contexto ya sugiere el sentido administrativo-doméstico.
