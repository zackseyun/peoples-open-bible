translation:
  language: es
  text: Bakbuquías y Unó[a], sus hermanos, estaban frente a ellos por divisiones de servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «y sus hermanos les respondieron por divisiones», si וענו se lee como verbo y no como el nombre propio Unó.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבַקְבֻּקְיָה
  english_pob_choice: And Bakbukiah
  chosen_spanish: Y Bakbucías
  alternatives_spanish:
  - Y Bakbukías
  - Bakbucías
  lexicon: transliteración propia del nombre
  rationale: Se conserva el nombre propio mediante transliteración; el prefijo conjuntivo וְ/וּ se vierte con «Y» para mantener la secuencia narrativa de nombres en el contexto.
- source_word: וַעֻנּוֹ
  english_pob_choice: Unno
  chosen_spanish: Unno
  alternatives_spanish:
  - y sus hermanos respondieron
  - Y Uno
  lexicon: lectura onomástica frente a verbal
  rationale: Se mantiene la decisión de leer la secuencia como nombre propio, coherente con el contexto de listas nominales. La alternativa verbal sigue siendo posible según la auditoría, pero no se adopta en el texto principal.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos de clan
  lexicon: HALOT
  rationale: «Hermanos» conserva el término de parentesco del hebreo y funciona bien en el marco de agrupaciones levíticas/familiares.
- source_word: לְנֶגְדָּם
  english_pob_choice: stood opposite them
  chosen_spanish: estaban enfrente de ellos
  alternatives_spanish:
  - estaban delante de ellos
  - se hallaban opuestos a ellos
  lexicon: HALOT
  rationale: En español conviene expresar la relación espacial con una construcción natural. Se omite un verbo explícito equivalente a «stood» porque el estado/resultante se entiende en el paralelismo y evita añadir más de lo que el hebreo dice literalmente.
- source_word: לְמִשְׁמָרוֹת
  english_pob_choice: in the divisions of service
  chosen_spanish: en las divisiones del servicio
  alternatives_spanish:
  - por turnos de servicio
  - en los turnos del servicio
  - en las guardias
  lexicon: HALOT
  rationale: «Divisiones del servicio» refleja el sentido organizativo/cultual de מִשְׁמָרוֹת sin reducirlo a «guardias», que en español puede sonar más militar que litúrgico.
theological_decisions:
- issue: Lectura de וענו como nombre propio o como verbo
  english_pob_reading: Unno as a proper name, with a footnote allowing the verbal reading 'answered'
  chosen_spanish_reading: Unno como nombre propio, con nota que admite la lectura verbal alternativa
  alternative_spanish_readings:
  - y sus hermanos respondieron
  - y respondió con sus hermanos
  rationale: La forma y el contexto de una lista de nombres favorecen la lectura onomástica, pero la ambigüedad se preserva en nota para no borrar la tensión documentada por la POB inglesa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La traducción sigue la decisión revisada de la POB inglesa: mantener la lectura de nombre propio para וענו, sin desplazar la ambigüedad textual señalada en la nota. No se requieren cambios adicionales según el último pase de revisión.'
  spanish_consistency_notes:
  - Se usa «Y» inicial para reflejar la coordinación narrativa del hebreo.
  - «Estaban enfrente de ellos» mantiene la relación espacial sin forzar una paráfrasis litúrgica.
  - «Divisiones del servicio» conserva la organización cultual indicada por מִשְׁמָרוֹת.
  - La nota al pie preserva la alternativa verbal sin convertirla en el texto principal.
