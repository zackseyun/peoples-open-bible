  lexicon: BDAG
  rationale: ἐπαρκέω의 「돕다·돌보다」.
- source_word: μὴ βαρείσθω ἡ ἐκκλησία
  english_pob_choice: let the church not be burdened
  chosen_korean: 교회가 짐을 지지 않게
  alternatives_korean:
  - 교회가 부담받지 않게
  lexicon: BDAG
  rationale: 3:5·15와 일관 「교회」.
- source_word: ταῖς ὄντως χήραις ἐπαρκέσῃ
  english_pob_choice: provide for those who are truly widows
  chosen_korean: 참으로 과부 된 자들을 돌볼
  alternatives_korean:
  - 진짜 과부들을 후원할
  lexicon: BDAG
  rationale: 3절과 일관.
