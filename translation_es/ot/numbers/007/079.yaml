translation:
  language: es
  text: Su ofrenda fue un plato de plata[a], que pesaba ciento treinta siclos, y un cuenco de plata[b] de setenta siclos, según el siclo del santuario; ambos llenos de flor de harina mezclada con aceite, para una ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un cuenco de plata» para קַעֲרָה, ya que el término hebreo designa un recipiente y su forma exacta no es totalmente segura.
    reason: lexical_alternative
  - marker: b
    text: O «un cuenco de aspersión de plata» para מִזְרָק, destacando la función ritual del recipiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su presente
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es el término sacrificial general para una ofrenda llevada delante de Dios. «Ofrenda» es la equivalencia natural y clara en español culto y bíblico.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un cuenco de plata
  - una vasija de plata
  lexicon: HALOT
  rationale: קַעֲרָה designa un recipiente cuya forma exacta no es segura. En español, «plato» comunica mejor la idea de una pieza poco profunda, manteniendo la cautela lexical del POB inglés.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - con un peso de ciento treinta siclos
  - que pesaba ciento treinta siclos
  lexicon: HALOT
  rationale: El hebreo expresa literalmente el peso de la vasija. «De peso de» conserva esa información sin volverla forzada en español.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: un cuenco de plata
  alternatives_spanish:
  - una vasija de plata
  - un tazón de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente ritual; en español «cuenco» es suficientemente amplio y natural, sin precisar indebidamente la función en el texto principal.
- source_word: שִׁבְעִים שֶׁקֶל בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: of seventy shekels, according to the sanctuary shekel
  chosen_spanish: de setenta siclos, según el siclo del santuario
  alternatives_spanish:
  - de setenta siclos, conforme al siclo del santuario
  - de setenta siclos, según la medida del santuario
  lexicon: HALOT
  rationale: «Siclo» es el equivalente estándar de שֶׁקֶל. «Según el siclo del santuario» preserva la fórmula técnica y evita diluir el estándar cultual.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos de ellos
  lexicon: HALOT
  rationale: El pronombre dual/plural en contexto apunta a los dos recipientes. En español, «ambos» es natural y conserva la referencia conjunta.
- source_word: מְלֵאִים
  english_pob_choice: full of
  chosen_spanish: llenos de
  alternatives_spanish:
  - colmados de
  - repletos de
  lexicon: HALOT
  rationale: Participio predicativo que describe el contenido de los recipientes. «Llenos de» es directo y fiel.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: La expresión cultual tradicional en español es «flor de harina», que corresponde bien a la harina finamente molida requerida para las ofrendas.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada en aceite
  - amasada con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica que la harina ya está combinada con aceite. «Mezclada con aceite» es natural y exacto.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda de cereal
  - para ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה es la ofrenda cereal/sin sangre. En la tradición de la POB en español, «ofrenda vegetal» puede preservar el sentido cultual amplio sin reducirlo a una simple categoría agrícola.
theological_decisions:
- issue: Nombre del sacrificio מִנְחָה
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para ofrenda vegetal
  alternative_spanish_readings:
  - para ofrenda de cereal
  - para ofrenda de grano
  rationale: Se mantiene la distinción cultual de מִנְחָה como ofrenda sin sangre. «Vegetal» sigue la opción POB ya documentada para este tipo de ofrenda, sin perder el sentido ritual.
  doctrine_reference: Levítico 2; Números 15:4-10
- issue: Vasija ritual מִזְרָק
  english_pob_reading: one silver basin
  chosen_spanish_reading: un cuenco de plata
  alternative_spanish_readings:
  - un cuenco ritual de plata
  - una vasija de plata
  rationale: El hebreo indica un recipiente ceremonial pero no exige precisar su forma en español. Se evita imponer «bandeja» o «recipiente para aspersión» en el texto principal.
  doctrine_reference: Éxodo 27:3; Números 7:13-17
- issue: Estándar de peso sagrado
  english_pob_reading: according to the sanctuary shekel
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - conforme al siclo del santuario
  - según el siclo sagrado
  rationale: Se conserva la fórmula técnica del texto hebreo. «Del santuario» mantiene el vínculo con la norma cultual sin sustituirla por una paráfrasis interpretativa.
  doctrine_reference: Éxodo 30:13; Levítico 27:25
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el consenso fue de alta concordancia y no hubo ajustes pendientes. Esta versión española sigue de cerca el texto hebreo y conserva las dos alternativas léxicas documentadas en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - «Siclo» se usa de forma uniforme para שֶׁקֶל en contextos de peso cultual.
  - Se preserva la distinción entre recipiente poco profundo (plato) y recipiente ritual (cuenco) sin sobreespecificar la forma.
  - «Ofrenda vegetal» se emplea como término cultual establecido del proyecto para מִנְחָה.
