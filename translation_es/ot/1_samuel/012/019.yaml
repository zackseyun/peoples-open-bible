translation:
  language: es
  text: 'Entonces todo el pueblo dijo a Samuel[a]: «Ruega a Yahvé tu Dios por tus siervos, y no nos dejes morir, porque hemos añadido a todos nuestros pecados este mal: pedir un rey para nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intercede ... en favor de tus siervos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: WLC/HALOT
  rationale: La forma narrativa se vierte con «Entonces» para conservar el avance secuencial del relato en un español natural y solemne.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - toda la gente
  lexicon: WLC/HALOT
  rationale: «Todo el pueblo» comunica bien el colectivo sin perder el tono bíblico ni introducir una expresión menos precisa como «la gente».
- source_word: הִתְפַּלֵּל
  english_pob_choice: Pray
  chosen_spanish: Ruega
  alternatives_spanish:
  - Ora
  - Intercede
  lexicon: HALOT
  rationale: Aquí el verbo tiene fuerza de súplica dirigida a Samuel; «ruega» mantiene el registro y deja abierta la dimensión intercesora sin imponer una glosa más interpretativa en el texto principal.
- source_word: בְּעַד עֲבָדֶיךָ
  english_pob_choice: for your servants
  chosen_spanish: por tus siervos
  alternatives_spanish:
  - en favor de tus siervos
  - por tus esclavos
  lexicon: HALOT
  rationale: «Por» expresa bien la intercesión, y «siervos» conserva la deferencia con la que el pueblo se dirige a Samuel. «Esclavos» sería más duro y no está exigido aquí por el contexto social.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el que te sirve
  - nuestro Dios
  lexicon: HALOT
  rationale: La construcción posesiva se conserva sin suavizarla; el pueblo habla a Samuel como mediador y la forma «tu Dios» preserva esa tensión retórica.
- source_word: וְאַל נָמוּת
  english_pob_choice: and do not let us die
  chosen_spanish: y no nos dejes morir
  alternatives_spanish:
  - para que no muramos
  - y que no muramos
  lexicon: WLC/HALOT
  rationale: El hebreo expresa un ruego negativo directo; «no nos dejes morir» reproduce mejor la inmediatez de la petición que una subordinación final más interpretativa.
- source_word: יָסַפְנוּ
  english_pob_choice: we have added
  chosen_spanish: hemos añadido
  alternatives_spanish:
  - hemos aumentado
  - hemos agregado
  lexicon: HALOT
  rationale: «Hemos añadido» refleja el valor de sumar algo a lo ya existente y sigue de cerca la idea del verbo en este contexto confesional.
- source_word: עַל כָּל חַטֹּאתֵינוּ
  english_pob_choice: to all our sins
  chosen_spanish: a todos nuestros pecados
  alternatives_spanish:
  - sobre todos nuestros pecados
  - a todas nuestras faltas
  lexicon: HALOT
  rationale: La preposición con יסף expresa adición, y en español «a» comunica esa suma de manera fluida. «Pecados» mantiene el peso moral del término.
- source_word: רָעָה
  english_pob_choice: this evil
  chosen_spanish: este mal
  alternatives_spanish:
  - esta maldad
  - esta malicia
  lexicon: HALOT
  rationale: «Mal» es una equivalencia directa y digna para la confesión de culpa; «maldad» intensifica más el rasgo ético, pero no es necesario aquí.
- source_word: לִשְׁאֹל לָנוּ מֶלֶךְ
  english_pob_choice: to ask for a king for ourselves
  chosen_spanish: pedir para nosotros un rey
  alternatives_spanish:
  - pedir un rey para nosotros
  - solicitar para nosotros un rey
  lexicon: HALOT
  rationale: «Pedir» es una traducción natural del infinitivo en este contexto y mantiene el contenido de la culpa confesada. «Para nosotros» conserva el matiz de auto-beneficio presente en el hebreo.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: «Siervos» refleja el trato deferente y es consistente con el uso bíblico cuando la relación de subordinación es retórica y respetuosa.
theological_decisions:
- issue: Conservación de la tensión teológica en «tu Dios»
  english_pob_reading: Retain the second-person expression 'your God' without softening it to 'our God' or expanding it interpretively.
  chosen_spanish_reading: Conservar «tu Dios» sin convertirlo en «nuestro Dios».
  alternative_spanish_readings:
  - nuestro Dios
  - el Dios que te sirve
  rationale: 'La formulación del pueblo a Samuel preserva la tensión del pasaje: se dirigen a él como intercesor y reconocen a Yahvé como su Dios, pero en este momento lo expresan como «tu Dios». Resolverlo en el texto principal debilitaría esa carga retórica.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail inglés: usa una petición directa negativa («y no nos dejes morir») en lugar de una subordinada de propósito, manteniendo el registro formal y la cercanía al hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al criterio del proyecto.
  - Se usa «siervos» para עֲבָדֶיךָ por su deferencia y coherencia con el registro bíblico.
  - «Pecados» se emplea para חַטֹּאתֵינוּ, preservando el peso moral del confesional.
  - La nota al pie marca la alternativa intercesora de הִתְפַּלֵּל sin recargar el texto principal.
