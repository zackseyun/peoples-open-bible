    rationale: Aunque refleja el énfasis espacial hebreo, en español normal basta «salieron» o «salieron afuera/afuera» solo si se busca fuerte coloquialidad; «salieron al exterior» o «salieron afuera» no es tan elegante como «salieron» con contexto suficiente. Aquí «salieron» o «salieron al exterior» comunica bien el sentido.
  - severity: low
