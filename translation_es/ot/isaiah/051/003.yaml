translation:
  language: es
  text: Porque Yahvé consuela a Sion; consuela todas sus ruinas[a]. Hace su desierto como Edén, y su desierto[c] como el jardín de Yahvé. Gozo y alegría se hallarán en ella, acción de gracias y el sonido del canto[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos sus lugares desolados' o 'todos sus lugares devastados'.
    reason: lexical_alternative
  - marker: c
    text: O 'su estepa'. El hebreo se refiere a una llanura árida o región desértica.
    reason: lexical_alternative
  - marker: d
    text: O 'la voz del canto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino revelado en el texto hebreo, conforme a la práctica POB de no sustituirlo por un título. 'Yahvé' es la forma española más estable y legible para el Tetragrámaton.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  - Zion
  lexicon: HALOT
  rationale: En español bíblico, 'Sion' es la forma tradicional y clara para el nombre propio de la ciudad/personificación.
- source_word: נִחַם
  english_pob_choice: comforts
  chosen_spanish: consuela
  alternatives_spanish:
  - ha consolado
  - consuela/apacienta
  - se compadece
  lexicon: HALOT
  rationale: El verbo admite la idea de consolar, compadecerse o aliviar. Aquí el objeto es Sion y sus ruinas, por lo que 'consuela' expresa bien la restauración afectiva y reparadora sin reducir el campo semántico a mera emoción.
- source_word: כָּל חָרְבֹתֶיהָ
  english_pob_choice: all her ruins
  chosen_spanish: todas sus ruinas
  alternatives_spanish:
  - todos sus lugares desolados
  - todas sus ruinas devastadas
  lexicon: HALOT
  rationale: '''Ruinas'' es concreto e idiomático en español y preserva la fuerza de destrucción/desolación del hebreo. Se mantiene el plural con ''todas'' y el posesivo femenino implícito en ''sus''.'
- source_word: וַיָּשֶׂם
  english_pob_choice: He makes
  chosen_spanish: convierte
  alternatives_spanish:
  - hace
  - pone
  - transforma
  lexicon: HALOT
  rationale: El verbo en este contexto describe una acción transformadora sobre el paisaje. 'Convierte' comunica bien el cambio resultante y evita una calca menos natural de 'hace'.
- source_word: מִדְבָּרָהּ
  english_pob_choice: her wilderness
  chosen_spanish: su desierto
  alternatives_spanish:
  - su desierto
  - su yermo
  - su tierra despoblada
  lexicon: HALOT
  rationale: Se conserva el contraste con el término siguiente. 'Desierto' es la equivalencia más natural en español; 'wilderness' no exige siempre un término distinto aquí.
- source_word: כְּעֵדֶן
  english_pob_choice: like Eden
  chosen_spanish: en Edén
  alternatives_spanish:
  - como Edén
  - como el Edén
  lexicon: HALOT
  rationale: Como verbo de transformación, 'convierte... en Edén' comunica el valor comparativo de manera idiomática. Se mantiene el nombre propio intertextual de Génesis.
- source_word: וְעַרְבָתָהּ
  english_pob_choice: her desert
  chosen_spanish: su Arabá
  alternatives_spanish:
  - su estepa
  - su desierto
  - su llanura árida
  lexicon: HALOT
  rationale: Aquí se conserva la posible referencia topográfica específica del término עֲרָבָה, que puede aludir a la Arabá o a una llanura árida. Mantener 'Arabá' preserva la tensión léxica y el paralelismo diferenciado del hebreo.
- source_word: כְּגַן יְהוָה
  english_pob_choice: like the garden of the LORD
  chosen_spanish: en el jardín de Yahvé
  alternatives_spanish:
  - como el jardín de Yahvé
  - como el jardín del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el vínculo con el nombre divino y el eco del jardín de Génesis. 'Jardín' es transparente y evita la sustitución litúrgica del nombre propio.
- source_word: שָׂשׂוֹן וְשִׂמְחָה
  english_pob_choice: Joy and gladness
  chosen_spanish: Gozo y alegría
  alternatives_spanish:
  - gozo y regocijo
  - alegría y gozo
  lexicon: HALOT
  rationale: El par poético se vierte con dos sustantivos naturales y cercanos en español. 'Gozo y alegría' conserva la duplicación enfática sin forzar registros arcaicos.
- source_word: יִמָּצֵא בָהּ
  english_pob_choice: will be found in her
  chosen_spanish: se hallarán en ella
  alternatives_spanish:
  - serán hallados en ella
  - se encontrarán en ella
  lexicon: HALOT
  rationale: La pasiva niphal se expresa de manera natural con 'se hallarán'. El plural concuerda con el par 'gozo y alegría' y mantiene la idea de presencia/restauración.
- source_word: תּוֹדָה
  english_pob_choice: thanksgiving
  chosen_spanish: acción de gracias
  alternatives_spanish:
  - agradecimiento
  - alabanza de gratitud
  - gratitud
  lexicon: HALOT
  rationale: En un contexto de restauración cultual, 'acción de gracias' suena idiomático y preserva la dimensión de respuesta devocional. Evita restringir el término solo a sentimiento interior.
- source_word: וְקוֹל זִמְרָה
  english_pob_choice: and the sound of song
  chosen_spanish: y la voz del canto
  alternatives_spanish:
  - y el sonido del canto
  - y la voz de la canción
  lexicon: HALOT
  rationale: Se preserva la imagen auditiva de 'voz/sonido' y 'canto'. 'La voz del canto' es suficientemente natural y mantiene la cercanía al hebreo sin caer en una paraphrasis más libre.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto usa directamente el Tetragrámaton, así que el español mantiene el nombre propio en vez de una sustitución honorífica. 'Yahvé' es la forma POB coherente con la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspecto verbal profético en la restauración de Sion
  english_pob_reading: 'Present/future mix: comforts / makes with explicit future will be found'
  chosen_spanish_reading: Presente profético con 'consuela' y 'convierte', más futuro/pasivo en 'se hallarán'
  alternative_spanish_readings:
  - 'pasado perfecto: ''ha consolado... ha convertido... se hallarán'''
  - 'futuro uniforme: ''consulará... convertirá... se hallarán'''
  rationale: El hebreo profético presenta la restauración como segura y vigente. El español usa presente para dar viveza y certeza, sin forzar una cronología más precisa de la que el texto marca.
  doctrine_reference: Uso profético del perfecto y del wayyiqtol en promesas de restauración
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del inglés POB, que simplifica la segunda cola a 'desert' en vez de 'desert plain'. Para el español se decidió conservar 'Arabá' en la segunda cola porque el término tiene un valor topográfico/lexical más marcado que 'desierto' y ayuda a mantener la distinción paralela del hebreo entre מִדְבָּר y עֲרָבָה. También se mantuvo la imaginería de Edén/jardín de Yahvé y el cierre auditivo de acción de gracias/canto.
  spanish_consistency_notes:
  - '''Yahvé'' se usa de forma consistente para יְהוָה.'
  - '''Sion'' sigue la forma española tradicional del topónimo.'
  - Se preserva la diferencia entre 'desierto' y 'Arabá' para reflejar el paralelismo hebreo.
  - '''Gozo y alegría'' refleja el par poético sin introducir términos eclesiásticos más marcados.'
  - La voz del canto' mantiene la imagen sonora del hebreo y coincide con el tono poético del verso.
