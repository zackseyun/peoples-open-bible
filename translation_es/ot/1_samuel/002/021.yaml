translation:
  language: es
  text: Porque Yahvé visitó a Ana[a], y ella concibió y dio a luz tres hijos y dos hijas[b]. Y el muchacho Samuel creció delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atendió a Ana» o «cuidó de Ana». El verbo hebreo puede denotar una intervención misericordiosa en favor de alguien.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con Yahvé»; por el contexto, probablemente significa que Samuel creció en la presencia de Yahvé en el santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Aquí introduce la continuidad explicativa con el versículo anterior; «Porque» preserva mejor la relación causal/explicativa que una simple secuencia narrativa.
- source_word: פָקַד
  english_pob_choice: visited
  chosen_spanish: visitó
  alternatives_spanish:
  - atendió a
  - se acordó de
  - cuidó de
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa intervención favorable de Yahvé en favor de Ana, culminando en el embarazo. «Visitó» mantiene la fuerza idiomática bíblica sin reducir el sentido a mera atención genérica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvéh
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como transliteración del Tetragrámaton, de acuerdo con la política terminológica del POB en español, en vez de sustituirlo por un título.
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  - quedó encinta
  lexicon: HALOT
  rationale: «Concibió» es una traducción natural y precisa del nacimiento/embarazo en registro narrativo, y conserva la concisión del hebreo.
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - tuvo
  lexicon: HALOT
  rationale: «Dar a luz» expresa de forma clara y digna el nacimiento, y es idiomático en español contemporáneo.
- source_word: שְׁלֹשָׁה בָנִים וּשְׁתֵּי בָנוֹת
  english_pob_choice: three sons and two daughters
  chosen_spanish: tres hijos y dos hijas
  alternatives_spanish:
  - tres varones y dos mujeres
  - tres hijos varones y dos hijas
  lexicon: HALOT
  rationale: «Bānîm» puede especificarse como «hijos» o «varones» según el contexto; aquí se prefiere «hijos» para un español fluido y genérico, dado que el número y el paralelo con «hijas» ya distinguen el sexo. No se fuerza una glosa excesivamente literal.
- source_word: וַיִּגְדַּל
  english_pob_choice: grew
  chosen_spanish: crecía
  alternatives_spanish:
  - creció
  - iba creciendo
  - se hizo grande
  lexicon: HALOT
  rationale: El imperfecto narrativo hebreo admite una progresión continua; «crecía» conserva bien ese matiz de desarrollo sostenido mejor que un pretérito puntual.
- source_word: הַנַּעַר שְׁמוּאֵל
  english_pob_choice: the boy Samuel
  chosen_spanish: el muchacho Samuel
  alternatives_spanish:
  - el niño Samuel
  - el joven Samuel
  lexicon: HALOT
  rationale: «נער» aquí denota al muchacho/joven en crecimiento. «Muchacho» mantiene el tono narrativo y evita infantilizarlo como «niño».
- source_word: עִם יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  - con Yahvé
  lexicon: HALOT
  rationale: La preposición y el contexto cultual favorecen una lectura espacial/relacional en el santuario. «Delante de Yahvé» reproduce con naturalidad el valor de estar en su presencia, sin resolverlo de manera más doctrinal de lo que el texto exige.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto narrativo de intervención favorable
  english_pob_reading: Yahweh visited Hannah
  chosen_spanish_reading: Yahvé visitó a Ana
  alternative_spanish_readings:
  - Yahvé atendió a Ana
  - Yahvé cuidó de Ana
  rationale: El texto describe una acción favorable de Yahvé que resulta en la concepción. Se conserva el nombre divino y el verbo «visitó», dejando que el contexto narre la benevolencia divina sin sustituirla por una paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עִם יְהוָה en la maduración de Samuel
  english_pob_reading: the boy Samuel grew before Yahweh
  chosen_spanish_reading: el muchacho Samuel crecía delante de Yahvé
  alternative_spanish_readings:
  - el muchacho Samuel crecía ante Yahvé
  - el muchacho Samuel crecía en presencia de Yahvé
  rationale: La frase se entiende como una descripción narrativa del desarrollo de Samuel en el entorno del santuario y bajo la mirada divina. «Delante de Yahvé» mantiene la tensión entre proximidad cultual y simple localización, sin explicitar más de lo que el hebreo permite.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather than over-resolve
translation_notes:
  revision_awareness: El audit trail inglés revisó la última cláusula de «in the presence of the LORD» a «before the LORD» por ser más directa y formal. En español se sigue esa preferencia con «delante de Yahvé», que conserva la orientación espacial/cultual y la dignidad formal, sin cerrar el matiz con una explicación interpretativa excesiva en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la tensión entre traducción literal y sentido contextual en פקד y עִם יְהוָה, explicada en notas.
  - «Hijos e hijas» se usa como equivalente natural del hebreo numérico/familiar sin introducir términos ajenos al texto.
  - El estilo es narrativo, sobrio y apto para lectura eclesial moderna en español latinoamericano.
