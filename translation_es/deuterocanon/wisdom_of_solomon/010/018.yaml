lexical_decisions:
- source_word: διεβίβασεν
  english_pob_choice: brought them across
  chosen_spanish: los hizo pasar
  alternatives_spanish:
  - los condujo a través
  - los pasó al otro lado
  - los llevó a través
  lexicon: LSJ
  rationale: El verbo griego expresa el acto causativo de hacer cruzar o pasar a alguien de un lado a otro. En español, «los hizo pasar» conserva bien la causalidad sin sonar forzado, y funciona naturalmente con el movimiento del éxodo.
- source_word: θάλασσαν ἐρυθράν
  english_pob_choice: the Red Sea
  chosen_spanish: el Mar Rojo
  alternatives_spanish:
  - el mar rojo
  lexicon: LSJ
  rationale: La expresión apunta al nombre geográfico establecido en la tradición del éxodo. En español, «Mar Rojo» es la forma natural y reconocible del nombre propio.
- source_word: διήγαγεν
  english_pob_choice: led them through
  chosen_spanish: los condujo a través
  alternatives_spanish:
  - los llevó a través
  - los guió a través
  - los pasó por
  lexicon: LSJ
  rationale: Aquí el griego añade la idea de guiar o conducir a través del trayecto. «Los condujo a través» distingue esta acción de «los hizo pasar» y preserva la imagen de dirección.
- source_word: διʼ ὕδατος πολλοῦ
  english_pob_choice: through much water
  chosen_spanish: a través de mucha agua
  alternatives_spanish:
  - a través de abundante agua
  - por muchas aguas
  - por agua abundante
  lexicon: LSJ
  rationale: La construcción griega es literalmente «de/por mucha agua». En español, «mucha agua» comunica con claridad la masa de agua sin introducir un plural que el griego no exige. Mantiene la tensión entre literalidad y fluidez que refleja la revisión inglesa final.
theological_decisions:
- issue: Referencia al éxodo y nombre del mar
  english_pob_reading: the Red Sea
  chosen_spanish_reading: el Mar Rojo
  alternative_spanish_readings:
  - el mar rojo
  rationale: El texto alude claramente al evento del éxodo. Usar el nombre propio tradicional en español comunica de inmediato esa referencia histórica y literaria sin alterar el sentido del griego.
  doctrine_reference: Éxodo 14; Sabiduría 10:18 como alusión narrativa al cruce del mar.
translation_notes:
  revision_awareness: 'La base inglesa fue revisada desde «abundant water» a «much water» para ajustarse mejor a ὕδατος πολλοῦ. La versión española sigue esa decisión: evita «abundante» como opción más interpretativa y conserva «mucha agua» para reflejar con mayor cercanía el griego, manteniendo un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantuvo «Mar Rojo» como nombre propio coherente con el uso español estándar y con la decisión inglesa de tratarlo como designación geográfica establecida.
  - Se evitó «Cristo»/«Mesías» y otras terminologías no pertinentes al versículo.
  - 'La repetición de pronombres («los») refleja los dos verbos griegos y ayuda a distinguir el doble movimiento: hacer pasar y conducir.'
