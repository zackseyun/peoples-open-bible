translation:
  language: es
  text: Reconócelo en todos tus caminos, y él enderezará[a] tus sendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dirigirá tus sendas». El hebreo dice más literalmente: «enderezará tus sendas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל
  english_pob_choice: In all
  chosen_spanish: en todos
  alternatives_spanish:
  - en cada uno de
  lexicon: HALOT
  rationale: La construcción preposicional con כָּל expresa una totalidad de esfera; en español, «en todos» conserva bien ese alcance distributivo y suena natural en proverbio sapiencial.
- source_word: דְּרָכֶיךָ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus vías
  - tu curso de vida
  lexicon: HALOT
  rationale: דֶּרֶךְ puede referir ruta literal o conducta. «Caminos» mantiene la imagen figurada sin volver el verso demasiado explicativo; además distingue esta primera imagen de אֹרְחוֹתֶיךָ al final.
- source_word: דָעֵהוּ
  english_pob_choice: acknowledge him
  chosen_spanish: Reconócelo
  alternatives_spanish:
  - Conócelo
  - Ténlo presente
  lexicon: HALOT
  rationale: El verbo de ידע con sufijo de 3ª masc. sing. pide más que información mental; implica reconocerlo y darle consideración activa. «Reconócelo» preserva ese valor relacional y funciona bien en español bíblico moderno.
- source_word: וְהוּא
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - entonces él
  - y él mismo
  lexicon: HALOT
  rationale: La partícula conjuntiva más el pronombre independiente introduce la respuesta divina de forma directa. «Y él» conserva la simpleza del hebreo sin sobrecargarlo con un matiz inferido como «entonces».
- source_word: יְיַשֵּׁר
  english_pob_choice: will make straight
  chosen_spanish: enderezará
  alternatives_spanish:
  - hará rectos
  - guiará
  lexicon: HALOT
  rationale: El piel de יָשַׁר significa hacer recto/llano. «Enderezará» reproduce la imagen con naturalidad en español y evita desplazarla a una noción más interpretativa como «guiará».
- source_word: אֹרְחֹתֶיךָ
  english_pob_choice: your paths
  chosen_spanish: tus sendas
  alternatives_spanish:
  - tus caminos
  - tus huellas
  lexicon: HALOT
  rationale: אֹרַח designa senda o vereda, literal o figurada. «Sendas» conserva el paralelismo con «caminos» y refleja mejor el matiz de trayecto/recorrido que «caminos» en la segunda mitad del verso.
theological_decisions:
- issue: Promesa de guía divina
  english_pob_reading: he will make your paths straight
  chosen_spanish_reading: él enderezará tus sendas
  alternative_spanish_readings:
  - él dirigirá tus sendas
  - él te guiará en tus sendas
  rationale: La imagen hebrea prioriza la acción de hacer recto/llano el camino, no solo la orientación interior. «Enderezará» preserva esa afirmación concreta y deja abierta la posibilidad tradicional de guía, sin convertirla en el sentido principal.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la auditoría inglesa: conserva la distinción entre דְּרָכֶיךָ y אֹרְחוֹתֶיךָ con «caminos/sendas», mantiene el valor relacional de דָעֵהוּ con «Reconócelo», y traduce יְיַשֵּׁר con una imagen de enderezar en lugar de la paráfrasis interpretativa «dirigir».'
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el texto fuente lo exija explícitamente; aquí el pronombre de tercera persona basta y no requiere sustitución.
  - «Caminos» y «sendas» se usan de forma diferenciada para conservar el paralelismo y evitar una traducción uniformada.
  - El tono es proverbial, sobrio y apto para lectura eclesial amplia.
