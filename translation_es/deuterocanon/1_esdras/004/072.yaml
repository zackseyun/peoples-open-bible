    reason: lexical_alternative
  revision_rationale: Se ajustó la primera cláusula a una formulación más natural en español jurídico-narrativo («esté exenta de tributo para ellos»). En la segunda, se eliminó la ambigüedad del relativo haciendo que la acción de retener recaiga inequívocamente sobre «las aldeas». «Aldeas judías» reproduce de forma natural «las aldeas de los judíos» en este contexto posesivo, y «retienen» expresa bien el matiz de control persistente de διακρατοῦσιν sin perífrasis pesada.
