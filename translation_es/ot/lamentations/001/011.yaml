revisions:
- from: Todo su pueblo gime[a], buscando pan; han dado sus cosas preciosas por alimento, para restaurar la vida[b]. Mira, Yahvé, y contempla[c], porque he llegado a ser despreciada.
  to: Todo su pueblo gime, buscando pan; han dado sus cosas preciosas[a] por alimento, para restaurar la vida[b]. Mira, Yahvé, y contempla, porque he llegado a ser despreciada[c].
  rationale: La traducción principal es sustancialmente fiel, pero requiere corrección de los anclajes de notas para que correspondan a las palabras correctas del texto fuente. También se ajusta la nota sobre לְהָשִׁיב נָפֶשׁ para que refleje la literalidad subyacente en vez de repetir la redacción principal, y se normaliza la nota final en español natural.
