translation:
  language: es
  text: Alabemos ahora a los hombres fieles en el amor[a], a nuestros padres en sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Alabemos ahora a hombres gloriosos, y a nuestros padres en su generación». El hebreo dice «hombres de amor leal».'
    reason: alternative_reading
lexical_decisions:
- source_word: Αἰνέσωμεν δὴ / אהללה נא
  english_pob_choice: Let us now praise
  chosen_spanish: Alabemos ahora
  alternatives_spanish:
  - Pongámonos ahora a alabar
  - Alabemos ya
  lexicon: LXX Greek αἰνέω; Hebrew הלל
  rationale: El griego es exhortativo plural («Alabemos»), y נא añade la idea de inmediatez o énfasis («ahora»). «Alabemos ahora» conserva ambas señales sin forzar una perífrasis más larga.
- source_word: ἄνδρας ἐνδόξους / אנשי חסד
  english_pob_choice: godly men
  chosen_spanish: a los hombres de amor leal
  alternatives_spanish:
  - a los hombres piadosos
  - a los hombres gloriosos
  - a los hombres de bondad
  lexicon: HALOT; LXX ἐνδόξους
  rationale: 'La tradición hebrea preservada en el texto fuente apunta a אנשי חסד, literalmente asociados con חסד, un término de lealtad y fidelidad pactual. «Amor leal» intenta reflejar esa densidad semántica en español sin perder la tensión con el griego, que habla de «hombres gloriosos». '
- source_word: אבותינו
  english_pob_choice: our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  lexicon: HALOT
  rationale: Se conserva el término familiar masculino explícito del hebreo. En español, «padres» es la correspondencia más directa y mantiene el paralelismo tradicional del pasaje.
- source_word: בדורותם / τῇ γενέσει
  english_pob_choice: in their generations
  chosen_spanish: en sus generaciones
  alternatives_spanish:
  - en su generación
  - a lo largo de sus generaciones
  lexicon: HALOT; LXX γένεσις
  rationale: La forma plural hebrea y el dativo singular griego convergen en una referencia a las sucesivas épocas o linajes de los antepasados. «En sus generaciones» respeta esa amplitud histórica y el plural hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego sobre la caracterización de los honrados
  english_pob_reading: Follow the extant Hebrew 'men of faithful love' in the main text, while preserving the Greek 'glorious men' in a footnote.
  chosen_spanish_reading: Mantener en el texto principal «hombres de amor leal» y anotar la alternativa griega «hombres gloriosos».
  alternative_spanish_readings:
  - hombres gloriosos
  - hombres piadosos
  rationale: Como en el proyecto POB, el testimonio hebreo disponible tiene primacía en el texto principal, pero la discrepancia con el griego se preserva visiblemente. Así no se borra la tensión textual ni se absolutiza una sola tradición.
  doctrine_reference: 'DOCTRINE.md: primacía del original con preservación transparente de variantes significativas.'
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que sustituyó «men of faithful love» por «godly men» por naturalidad. En español, opté por no absorber esa reinterpretación, porque el hebreo אנשי חסד sostiene con más fuerza una noción de fidelidad/lealtad pactual que «piadosos» no expresa tan bien. El texto principal sigue el hebreo, y la nota conserva la divergencia griega.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece aquí el Tetragrámaton ni un reemplazo convencional equivalente.
  - «Amor leal» se usa para חסד como término relacional y pactual, no como mero afecto.
  - «Padres» mantiene el paralelismo bíblico y no neutraliza innecesariamente el género del sustantivo.
  - La nota distingue claramente la variante griega para no ocultar la diferencia de tradición textual.
