  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Bel» está bien conservado; no aparecen términos sensibles como Yahvé, Mesías o δοῦλος. «Percibir» respeta bien αἰσθέσθαι, con alternativas adecuadas en nota.
