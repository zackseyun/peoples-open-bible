translation:
  language: es
  text: Pero ahora, como la razón[a] ha vencido a las pasiones, como corresponde le asignamos la autoridad del liderazgo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juicio racional ha vencido a las pasiones».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «le asignamos la autoridad del liderazgo/gobierno».
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δέ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: LSJ
  rationale: El giro introduce contraste y transición; «Pero ahora» conserva mejor ese valor argumentativo que un simple «Ahora».
- source_word: λογισμοῦ
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - el razonamiento
  - la facultad de razonar
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός designa la facultad o ejercicio de juicio racional que domina las pasiones; «la razón» es natural en español y mantiene el sentido filosófico.
- source_word: τὰ πάθη
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los sufrimientos
  - las emociones
  - los impulsos
  lexicon: LSJ
  rationale: Aquí πάθη contrasta con λογισμός como impulsos irracionales, no como sufrimientos; «las pasiones» reproduce mejor esa oposición.
- source_word: νικήσαντος
  english_pob_choice: has conquered
  chosen_spanish: ha vencido
  alternatives_spanish:
  - ha conquistado
  - ha superado
  - habiendo vencido
  lexicon: LSJ
  rationale: El participio aoristo expresa victoria completada; «ha vencido» es una equivalencia natural en español y preserva la idea de triunfo previo.
- source_word: αὐτῷ
  english_pob_choice: to it
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - a la razón
  lexicon: LSJ
  rationale: Remite a λογισμός; en español conviene repetir el referente en la oración («le») sin sobrecargar el estilo.
- source_word: προσηκόντως
  english_pob_choice: rightly
  chosen_spanish: con propiedad
  alternatives_spanish:
  - de manera adecuada
  - como corresponde
  - de forma apropiada
  lexicon: LSJ
  rationale: El adverbio expresa lo que corresponde o conviene; «con propiedad» mantiene la noción de adecuación y resulta idiomático en español formal.
- source_word: τὴν τῆς ἡγεμονίας ... ἐξουσίαν
  english_pob_choice: the authority of leadership
  chosen_spanish: la autoridad del gobierno
  alternatives_spanish:
  - la autoridad del mando
  - la autoridad del liderazgo
  - el poder de gobernar
  lexicon: LSJ
  rationale: Ἡγεμονία combina liderazgo y gobierno; ἐξουσία es autoridad. «Autoridad del gobierno» conserva el conjunto sin forzar una expresión demasiado técnica en español.
- source_word: προσνέμομεν
  english_pob_choice: we assign
  chosen_spanish: le asignamos
  alternatives_spanish:
  - le concedemos
  - le atribuimos
  - le otorgamos
  lexicon: LSJ
  rationale: El verbo significa asignar o adjudicar; «asignamos» refleja bien el acto deliberado de conferir el lugar que le corresponde a la razón.
theological_decisions:
- issue: Framing anthropológico-filosófico de λογισμός y πάθη
  english_pob_reading: Render λογισμός as 'reason' and πάθη as 'the passions'
  chosen_spanish_reading: Traducir λογισμός como «la razón» y πάθη como «las pasiones»
  alternative_spanish_readings:
  - «el juicio racional» y «los impulsos»
  - «la facultad de razonar» y «las emociones»
  rationale: 'La afirmación resume la tesis ética de 4 Macabeos: la razón gobierna las pasiones. Mantener esa oposición en español preserva la tensión conceptual del texto sin reinterpretarla en categorías posteriores.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo en el texto principal los anclajes [a] y [b] exactamente donde corresponden, para que cada nota de pie quede vinculada a su marcador. No se introdujeron marcadores sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «la razón» para λογισμός y «las pasiones» para πάθη, en coherencia con el lenguaje filosófico de 4 Macabeos.
  - «Pero ahora» conserva el matiz de transición con contraste del griego νυνὶ δέ.
  - «Con propiedad» traduce el adverbio de conveniencia προσηκόντως sin caer en una formulación demasiado literal.
  - «Autoridad del gobierno» busca reflejar ἡγεμονίας ... ἐξουσίαν sin perder la doble idea de liderazgo y autoridad.
