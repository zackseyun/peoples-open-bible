translation:
  language: es
  text: 'Y el hombre me dijo: «Hijo de hombre[a], mira con tus ojos, oye con tus oídos, y pon tu corazón en todo lo que yo te muestro, porque fuiste traído aquí para que yo te mostrara estas cosas. Declara a la casa de Israel todo lo que ves».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mortal’ o ‘ser humano’ para «Hijo de hombre». La expresión hebrea es la forma habitual de dirigirse a Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la persona
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común para ‘hombre’. En este contexto de visión alude a la figura masculina del versículo anterior, así que ‘el hombre’ mantiene la referencia natural y el tono sobrio.
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: En Ezequiel es una fórmula fija de dirección profética. ‘Hijo de hombre’ conserva la repetición literaria y la continuidad del libro; las opciones más dinámicas explican el sentido pero pierden el valor idiomático.
- source_word: רְאֵה בְעֵינֶיךָ
  english_pob_choice: see with your eyes
  chosen_spanish: mira con tus ojos
  alternatives_spanish:
  - ve con tus ojos
  - observa con tus ojos
  lexicon: HALOT
  rationale: El imperativo exige atención visual activa. ‘Mira con tus ojos’ reproduce la redundancia enfática del hebreo en un español natural.
- source_word: וּבְאָזְנֶיךָ שְׁמַע
  english_pob_choice: hear with your ears
  chosen_spanish: oye con tus oídos
  alternatives_spanish:
  - escucha con tus oídos
  - oye atentamente
  lexicon: HALOT
  rationale: ‘Oye’ mantiene mejor el paralelo con ‘mira’ y refleja el verbo hebreo sin convertirlo en una paráfrasis más interpretativa.
- source_word: וְשִׂים לִבְּךָ
  english_pob_choice: set your heart
  chosen_spanish: pon tu corazón
  alternatives_spanish:
  - pon atención
  - fija tu mente
  lexicon: HALOT
  rationale: La expresión hebrea incluye atención, voluntad y reflexión. ‘Pon tu corazón’ preserva la imagen antropológica y la fuerza exhortativa mejor que reducirla a ‘pon atención’.
- source_word: לְכֹל אֲשֶׁר אֲנִי מַרְאֶה אוֹתָךְ
  english_pob_choice: on all that I show you
  chosen_spanish: en todo lo que yo te muestro
  alternatives_spanish:
  - en todo lo que te voy mostrando
  - en todo lo que yo te hago ver
  lexicon: HALOT
  rationale: El hifil de ראה tiene sentido causativo de ‘mostrar/hacer ver’. ‘Yo te muestro’ es idiomático en español y conserva ese valor sin rigidez.
- source_word: כִּי לְמַעַן הַרְאוֹתְכָה הֻבָאתָה הֵנָּה
  english_pob_choice: for you were brought here so that I might show you these things
  chosen_spanish: porque para que te lo mostrara fuiste traído aquí
  alternatives_spanish:
  - pues para mostrarte estas cosas fuiste traído aquí
  - porque fuiste traído aquí para que yo te mostrara estas cosas
  lexicon: HALOT
  rationale: 'La cláusula expresa propósito: el traslado de Ezequiel tiene la finalidad de la revelación. ‘Te lo mostrara’ resume el contenido visionario colectivo ya mencionado; en una nota se puede aclarar la pluralidad implícita de ‘estas cosas’ si se desea, pero el español fluye mejor así en la línea principal.'
- source_word: הַגֵּד
  english_pob_choice: declare
  chosen_spanish: Declara
  alternatives_spanish:
  - di
  - proclama
  - anuncia
  lexicon: HALOT
  rationale: El imperativo hifil de נגד tiene un tono de hacer saber, reportar o proclamar. ‘Declara’ conserva el registro profético y solemne del encargo.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: a la casa de Israel
  alternatives_spanish:
  - a Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: ‘Casa de Israel’ es una expresión profética fija. Se preserva por fidelidad literaria y por consistencia con el patrón del libro.
- source_word: כָּל אֲשֶׁר אַתָּה רֹאֶה
  english_pob_choice: all that you see
  chosen_spanish: todo lo que ves
  alternatives_spanish:
  - todo cuanto ves
  - todo lo que estás viendo
  lexicon: HALOT
  rationale: La frase resume el material visionario. ‘Todo lo que ves’ es claro, directo y suficientemente cercano al hebreo.
theological_decisions:
- issue: Tratamiento de בֶּן אָדָם en Ezequiel
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: No se toma como título cristológico aquí, sino como fórmula profética dirigida a Ezequiel. Se conserva la forma fija por continuidad literaria y para no borrar la tensión semántica del hebreo.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)'''
- issue: Valor colectivo de la revelación en la cláusula de propósito
  english_pob_reading: show you these things
  chosen_spanish_reading: te lo mostrara
  alternative_spanish_readings:
  - te mostrara estas cosas
  - te mostrara todo esto
  rationale: El hebreo apunta a un contenido visionario plural o colectivo. En la línea principal se usa un objeto neutro resumido para naturalidad; el sentido plural puede explicitarse en nota si se desea, sin alterar el mandato central.
  doctrine_reference: 'DOCTRINE.md: preserve source tension; avoid over-explicitation'
translation_notes:
  revision_awareness: 'Se siguió el cierre revisado del audit trail inglés: la frase de propósito refleja el sentido colectivo de la visión sin calco torpe, mientras que el resto de los rasgos se mantienen estables respecto de la versión auditada.'
  spanish_consistency_notes:
  - Se conserva ‘casa de Israel’ como expresión profética fija.
  - Se mantiene ‘Hijo de hombre’ en mayúsculas como fórmula de vocación/dirigencia textual, no como título cristológico.
  - Se usa ‘mira’ / ‘oye’ / ‘pon tu corazón’ para reproducir el paralelismo semítico con un español publicable.
  - Se evita ‘SEÑOR’ porque aquí no aparece el Tetragrámaton ni una cita del nombre divino.
