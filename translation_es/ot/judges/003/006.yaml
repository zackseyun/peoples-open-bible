translation:
  language: es
  text: Tomaron para sí a sus hijas como esposas[a], y dieron sus hijas a los hijos de Israel, y sirvieron a sus dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adoraron a sus dioses».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: They took
  chosen_spanish: Tomaron
  alternatives_spanish:
  - Tomaron para sí
  - Se casaron con
  lexicon: HALOT
  rationale: לקח significa literalmente 'tomar'; en contextos matrimoniales puede referirse a tomar a una mujer como esposa. 'Tomaron' conserva el verbo hebreo y deja que la frase siguiente explicite el sentido marital.
- source_word: בְּנוֹתֵיהֶם
  english_pob_choice: their daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - las hijas de ellos
  - sus propias hijas
  lexicon: HALOT
  rationale: El sufijo de tercera persona plural remite a los pueblos vecinos mencionados en el contexto. 'Sus hijas' es natural en español y suficiente cuando el antecedente se infiere del contexto.
- source_word: לָהֶם לְנָשִׁים
  english_pob_choice: for themselves as wives
  chosen_spanish: para sí como esposas
  alternatives_spanish:
  - para sí por esposas
  - como esposas para sí
  lexicon: HALOT
  rationale: La doble construcción preposicional expresa beneficio o ventaja ('para sí') y finalidad o resultado ('como esposas'). 'Esposas' evita una paráfrasis excesiva y mantiene la fuerza matrimonial del hebreo.
- source_word: וְאֶת בְּנוֹתֵיהֶם נָתְנוּ לִבְנֵיהֶם
  english_pob_choice: and they gave their daughters to their sons
  chosen_spanish: y dieron sus hijas a sus hijos
  alternatives_spanish:
  - y entregaron sus hijas a sus hijos
  - y dieron sus hijas a sus hijos en matrimonio
  lexicon: HALOT
  rationale: נתן significa 'dar'. En este contexto alude a dar hijas en matrimonio. 'Sus hijas' reproduce el hebreo sin añadir un intensificador no presente en el texto fuente.
- source_word: לִבְנֵיהֶם
  english_pob_choice: to their sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos de ellos
  lexicon: HALOT
  rationale: El sufijo se refiere a Israel, en contraste con los sufijos anteriores que se refieren a las naciones. 'A sus hijos' es formalmente fiel y claro en español.
- source_word: וַיַּעַבְדוּ
  english_pob_choice: and they served
  chosen_spanish: y sirvieron
  alternatives_spanish:
  - y adoraron
  - y sirvieron/adoraron
  lexicon: HALOT
  rationale: עבד con dioses puede significar 'servir' o 'adorar'. 'Sirvieron' preserva mejor el verbo y la dimensión de lealtad de pacto, sin reducirlo solo al acto cultual.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - a sus deidades
  lexicon: HALOT
  rationale: El plural con sufijo designa a los dioses de los pueblos circundantes. 'A sus dioses' es claro, sobrio y corresponde al uso bíblico habitual.
theological_decisions:
- issue: Alcance de עבד con dioses paganos
  english_pob_reading: served their gods
  chosen_spanish_reading: sirvieron a sus dioses
  alternative_spanish_readings:
  - adoraron a sus dioses
  - rindieron culto a sus dioses
  rationale: '''Servir'' conserva la amplitud del hebreo עבד, que incluye sumisión religiosa y lealtad práctica; no se restringe solo al acto de adoración, aunque esa idea está implícita.'
  doctrine_reference: Consistencia terminológica POB sobre servicio/adoración y fidelidad de pacto
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y el cierre del inglés POB, sin añadir ‘propias’ ni otras expansiones no requeridas. Se mantiene la alternativa de lectura para עבד en nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aparece, por lo que el versículo mantiene «sus dioses».
  - Se conserva el paralelismo de tres miembros con coordinación simple, acorde al hebreo.
  - «Esposas» se emplea por claridad matrimonial; no se usa una fórmula eclesiástica más tradicional que oscurezca el valor verbal de לקח.
