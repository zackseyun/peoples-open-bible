translation:
  language: es
  text: Porque se acercan con sus corazones[a] como un horno mientras acechan[b]; toda la noche duerme su panadero[c], pero por la mañana arde como llama de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "su corazón". El hebreo usa una forma singular colectiva; el español adopta el plural por claridad contextual y por concordancia con el sujeto plural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "en su emboscada" o "en su acecho". La frase hebrea puede llevar la idea de acecho o de esconderse para atacar.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente, "su panadero". El POB inglés conserva la figura porque probablemente continúa la metáfora del horno: el que lo atiende o lo aviva.'
    reason: cultural_note
lexical_decisions:
- source_word: קֵרְבוּ
  english_pob_choice: draw near
  chosen_spanish: se acercan
  alternatives_spanish:
  - se aproximan
  - se allegan
  lexicon: HALOT
  rationale: El verbo hebreo expresa movimiento de acercamiento; en español, "se acercan" conserva la imagen sin volverla más interpretativa de lo que permite el texto.
- source_word: כַתַּנּוּר
  english_pob_choice: like an oven
  chosen_spanish: como un horno
  alternatives_spanish:
  - como un horno de barro
  - como un horno
  lexicon: HALOT
  rationale: '"Horno" reproduce el símil básico y es natural en español; evita especificar un tipo de horno que el hebreo no exige aquí.'
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: sus corazones
  alternatives_spanish:
  - su corazón
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma singular colectiva, el contexto plural favorece en español el plural para concordar con el sujeto y con la revisión auditada del POB en inglés.
- source_word: בְּאָרְבָּם
  english_pob_choice: in their lying in wait
  chosen_spanish: en su emboscada
  alternatives_spanish:
  - mientras acechan
  - en su acecho
  lexicon: HALOT
  rationale: La preposición y la raíz ארב permiten un sentido de acecho o emboscada. "Emboscada" mantiene la tensión conspirativa y deja abierto el matiz verbal que el inglés POB señaló.
- source_word: יָשֵׁן
  english_pob_choice: sleeps
  chosen_spanish: duerme
  alternatives_spanish:
  - está durmiendo
  - se duerme
  lexicon: HALOT
  rationale: El predicado se vierte con un verbo simple y fluido en español, preservando la imagen de descanso aparente en medio de la conspiración.
- source_word: אֹפֵהֶם
  english_pob_choice: their baker
  chosen_spanish: su panadero
  alternatives_spanish:
  - el que les hornea
  - su cocinero
  lexicon: HALOT
  rationale: Se conserva la literalidad de "panadero" porque el POB inglés mantiene la figura y la nota cultural. En español suena extraño, pero esa extrañeza es parte de la metáfora y no debe borrarse.
- source_word: בֹעֵר
  english_pob_choice: burns
  chosen_spanish: arde
  alternatives_spanish:
  - está ardiendo
  - se inflama
  lexicon: HALOT
  rationale: '"Arde" expresa el participio hebreo de forma directa y prepara el cierre intensivo del símil.'
- source_word: כְאֵשׁ לֶהָבָה
  english_pob_choice: like a flaming fire
  chosen_spanish: como fuego de llama
  alternatives_spanish:
  - como una llama de fuego
  - como fuego llameante
  lexicon: HALOT
  rationale: La expresión hebrea duplica la imagen del fuego con la llama. "Fuego de llama" conserva esa intensificación de manera bastante literal, sin suavizarla con una paráfrasis más idiomática.
theological_decisions:
- issue: Ambigüedad sintáctica de la imagen del horno y del 'panadero'
  english_pob_reading: The verse depicts the conspirators' hearts as oven-like, with 'their baker' continuing the metaphor for the one tending or inciting their passion/plot.
  chosen_spanish_reading: El versículo mantiene la imagen del corazón/los corazones como horno y deja a "su panadero" dentro de la metáfora, sin identificarlo de forma más precisa.
  alternative_spanish_readings:
  - Los conspiradores se acercan con corazones ardientes como un horno mientras acechan.
  - Su panadero literal duerme; después todo se enciende.
  rationale: El hebreo es comprimido y oscuro, por lo que la traducción debe preservar la tensión en vez de resolverla artificialmente. Se conserva la rareza de "panadero" y la ambigüedad del cuadro para no imponer una explicación que el texto no obliga a adoptar.
  doctrine_reference: 'Translation philosophy §3: preserve tension rather than resolve it'
- issue: Número de לִבָּם en contexto
  english_pob_reading: heart -> hearts in the revision pass
  chosen_spanish_reading: sus corazones
  alternative_spanish_readings:
  - su corazón
  rationale: Aunque la forma hebrea puede leerse colectivamente en singular, la revisión auditada del POB en inglés decidió el plural por concordancia con el sujeto y por claridad contextual. El español sigue esa decisión para mantener la misma lectura interpretativa.
  doctrine_reference: Revision awareness / applied revisions
translation_notes:
  revision_awareness: La versión inglesa auditada revisó "heart" a "hearts" para reflejar mejor el plural contextual. La propuesta española sigue esa revisión y conserva, además, la rareza de "su panadero" para no borrar la metáfora extendida del horno.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como término estándar cuando corresponda, pero este verso no lo contiene.
  - '"Horno", "emboscada" y "panadero" forman un campo metafórico que no se suaviza para respetar la dificultad del hebreo.'
  - Se evita "Cristo/Mesías" porque no aparece en el texto.
  - La puntuación española usa punto y coma para reflejar la progresión interna del versículo.
