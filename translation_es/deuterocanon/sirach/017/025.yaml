translation:
  language: es
  text: ¡Cuán grande es la misericordia de Yahvé, y su expiación[a] para los que vuelven a él!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «propiciación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς μεγάλη
  english_pob_choice: How great
  chosen_spanish: ¡Cuán grande!
  alternatives_spanish:
  - ¡Qué grande!
  - Tan grande
  lexicon: LSJ
  rationale: El griego exclamativo con ὡς y un adjetivo pide una exclamación natural en español. «¡Cuán grande!» conserva mejor el énfasis laudatorio que una traducción más plana.
- source_word: ἐλεημοσύνη
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordia divina
  - limosna
  lexicon: BDAG/LSJ
  rationale: Aunque ἐλεημοσύνη puede significar «limosna» en otros contextos, aquí con «del Señor» describe su acción compasiva. «Misericordia» es la equivalencia más clara y fiel en español.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - del Amo
  lexicon: BDAG/LSJ
  rationale: En este contexto sapiencial judío, κύριος alude reverencialmente a Dios. Se usa «Yahvé» según el estándar del proyecto para el nombre divino, en lugar de ocultarlo con «Señor».
- source_word: ἐξιλασμός
  english_pob_choice: atonement
  chosen_spanish: expiación
  alternatives_spanish:
  - atonamiento
  - propiciación
  - reconciliación
  lexicon: LSJ
  rationale: ἐξιλασμός denota la remoción de culpa o la obtención de expiación. «Expiación» comunica bien ese valor y mantiene abierta la tensión teológica sin imponer un modelo doctrinal más específico.
- source_word: τοῖς ἐπιστρέφουσιν
  english_pob_choice: for those who turn to him
  chosen_spanish: para los que se vuelven
  alternatives_spanish:
  - para los que regresan
  - para los que se arrepienten
  lexicon: BDAG/LSJ
  rationale: ἐπιστρέφω significa literalmente «volverse, regresar». «Se vuelven» preserva el movimiento de retorno a Dios sin forzarlo como término técnico de arrepentimiento.
- source_word: ἐπ᾿ αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: BDAG/LSJ
  rationale: La preposición con ἐπιστρέφω expresa orientación o movimiento hacia Dios. «A él» es idiomático y reproduce bien la dirección relacional del griego.
theological_decisions:
- issue: Valor de ἐξιλασμός y su relación con el perdón divino
  english_pob_reading: atonement
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - propiciación
  - atonamiento
  rationale: La línea afirma que Yahvé provee ἐξιλασμός para quienes se vuelven a él. «Expiación» conserva el peso sacrificial/relacional sin escoger de antemano una teoría doctrinal posterior sobre cómo opera esa obra.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than over-resolve; avoid ecclesiastical jargon where accessible language can preserve the sense.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: la frase fue ajustada de ''turn back to him'' a ''turn to him'', por lo que el español evita cualquier matiz adicional de retroceso y usa una formulación directa de orientación: ''se vuelven a él''.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino según el estándar del proyecto.
  - Se eligió «misericordia» para ἐλεημοσύνη, evitando «limosna» por inadecuación contextual.
  - Se prefirió «expiación» para ἐξιλασμός, manteniendo la ambigüedad teológica documentada en el audit trail.
  - La sintaxis es breve y exclamativa, acorde con el griego.
  - Se evitó «Cristo» y otras formulaciones eclesiásticas no presentes en el texto fuente.
