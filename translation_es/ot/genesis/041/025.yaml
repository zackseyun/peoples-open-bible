  yaml_path: translation/ot/genesis/041/025.yaml
  text: Then Joseph said to Pharaoh[a], “Pharaoh’s dreams are one[b]; what God is doing he has declared to Pharaoh.”
  footnotes:
  - marker: a
    text: Or “Pharaoh’s dream is one.” The Hebrew uses singular “dream,” but in context Joseph refers to Pharaoh’s two dreams as a single message.
    reason: lexical_alternative
  - marker: b
    text: Or “what God is doing” or “what God does.” The Hebrew participle may be rendered more literally, but here it likely points to what God is about to bring about.
    reason: lexical_alternative
