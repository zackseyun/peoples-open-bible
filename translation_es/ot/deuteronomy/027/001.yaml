translation:
  language: es
  text: 'Entonces Moisés y los ancianos de Israel mandaron al pueblo, diciendo: «Guarda toda[a] el mandamiento que hoy te estoy mandando».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el mandamiento»; el hebreo tiene singular colectivo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa segunda persona singular para dirigirse colectivamente al pueblo.
    reason: translation_note
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandaron
  alternatives_spanish:
  - ordenaron
  - dieron mandato
  lexicon: HALOT
  rationale: El verbo צוה expresa dar una orden o mandato. En español, «mandaron» comunica con naturalidad la acción de imponer un mandato y conserva la autoridad de la escena sin volverse arcaico.
- source_word: וְזִקְנֵי יִשְׂרָאֵל
  english_pob_choice: and the elders of Israel
  chosen_spanish: y los ancianos de Israel
  alternatives_spanish:
  - junto con los ancianos de Israel
  lexicon: HALOT
  rationale: La coordinación hebrea se refleja con «y» para mantener la sintaxis y evitar suavizar la relación entre Moisés y los ancianos.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: HALOT
  rationale: En contexto pactual, עָם se refiere al pueblo de Israel. «Al pueblo» conserva ese sentido colectivo y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y les dijo
  lexicon: HALOT
  rationale: La forma de cita se mantiene con un participio equivalente para conservar la estructura discursiva del hebreo.
- source_word: שָׁמֹר
  english_pob_choice: Keep
  chosen_spanish: Guarden
  alternatives_spanish:
  - Observen
  - Cuiden
  lexicon: HALOT
  rationale: שׁמר puede ser «guardar», «observar» o «guardar/cumplir» según el contexto. En mandamientos, «guarden» es una solución natural en español que retiene la idea de obediencia vigilante.
- source_word: כָּל הַמִּצְוָה
  english_pob_choice: all the commandment
  chosen_spanish: todo el mandamiento
  alternatives_spanish:
  - todo el mandato
  - la totalidad del mandamiento
  lexicon: HALOT
  rationale: Se preserva el singular hebreo colectivo. «Todo el mandamiento» refleja כָּל + singular sin convertirlo en plural; también mantiene la tensión documentada entre singular gramatical y sentido colectivo.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם
  english_pob_choice: that I am commanding you
  chosen_spanish: que hoy les estoy mandando
  alternatives_spanish:
  - que hoy les mando
  - que hoy les ordeno
  lexicon: HALOT
  rationale: El participio מְצַוֶּה sugiere una acción en curso o inmediata; «les estoy mandando» preserva ese valor aspectual. El complemento «hoy» se integra naturalmente en la cláusula final.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia moderna directa y mantiene el énfasis temporal del hebreo.
theological_decisions:
- issue: Sentido colectivo del singular מִצְוָה
  english_pob_reading: 'singular collective: ''the commandment'''
  chosen_spanish_reading: 'singular colectivo: «todo el mandamiento»'
  alternative_spanish_readings:
  - «los mandamientos»
  - «todo el mandato»
  rationale: Se conserva el singular hebreo en lugar de pluralizarlo. Esto evita importar una diferencia de sentido no presente en el texto y reproduce la lectura colectiva ya documentada en el POB inglés.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado auditado en inglés: mantiene el singular colectivo de מִצְוָה, refleja el valor aspectual del participio מְצַוֶּה con una perífrasis progresiva y conserva la coordinación de Moisés y los ancianos. No se requiere ajuste adicional según el pass más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se mantiene un registro bíblico sobrio y contemporáneo, evitando calcos innecesarios.
  - La forma verbal «mandaron» permite lectura natural sin perder la fuerza imperativa del hebreo.
  - Las notas preservan la ambigüedad lexical donde el español podría aplanarla.
