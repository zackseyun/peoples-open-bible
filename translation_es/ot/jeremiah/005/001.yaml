review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura imperativa del hebreo, mantiene el singular representativo אִישׁ como «un hombre», traduce adecuadamente עֹשֶׂה מִשְׁפָּט como «haga justicia» y conserva el matiz ético de אֱמוּנָה con «fidelidad». Sin embargo, hay dos desajustes con el expediente auditado: el marcador de nota [a] está anclado en «Jerusalén» cuando la nota trata de חוּצוֹת/«calles», y falta la nota documentada sobre «un hombre» como singular representativo. Además, «perdonaré» es posible, pero «la perdonaré» suena menos natural aquí que «la perdonaré»; el problema principal es de notas, no de sentido.'
  spanish_quality_summary: El español es claro y digno, pero mezcla tuteo/voseo litúrgico con un registro algo coloquial en «por favor». También «mirad y sabed» suena algo rígido; «miren y sepan» sería más natural en español latinoamericano neutral, pero el borrador sigue siendo inteligible. Conviene mover la nota [a] al lugar correcto y añadir una nota para «un hombre». También es preferible evitar la puntuación excesiva alrededor de «por favor».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Jerusalén», «justicia» y «fidelidad» están bien alineados con las decisiones léxicas del POB. La conservación de «un hombre» concuerda con la política de singular masculino representativo. No se requiere ajuste teológico mayor.
  issues:
  - severity: high
    issue: El marcador [a] está colocado en «Jerusalén», pero la nota explica «calles»/חוּצוֹת.
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante; de lo contrario, el aparato crítico resulta engañoso.
  - severity: high
    issue: Falta una nota para «un hombre» que preserve la justificación documentada del singular masculino representativo.
    rationale: El expediente inglés preserva explícitamente esta decisión; omitirla pierde una motivación traductológica significativa del proyecto.
  - severity: medium
    issue: «Por favor» es comprensible, pero suena algo conversacional en este contexto profético.
    rationale: נָא suaviza o apremia la orden; en español bíblico legible suele funcionar mejor «por favor» sin comas internas o con una formulación más integrada.
  - severity: low
    issue: El uso de «mirad / sabed / buscad» suena más peninsular que neutral latinoamericano.
    rationale: El objetivo pide español neutral latinoamericano / ampliamente eclesial. No es incorrecto, pero puede mejorarse con formas de ustedes.
