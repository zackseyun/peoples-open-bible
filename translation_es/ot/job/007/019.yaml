translation:
  language: es
  text: ¿Hasta cuándo no apartarás tu mirada de mí[a], ni me dejarás en paz hasta que trague saliva?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuelvas tu mirada de mí» / «me dejes en paz hasta que trague mi saliva»; es un modismo que significa «ni por el más breve instante».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Cuánto
  - ¿Por qué
  lexicon: HALOT
  rationale: En lamento, כַּמָּה suele expresar una queja temporal. En español, «¿Hasta cuándo» comunica de forma natural esa duración dolorosa mejor que un literal «¿Cuánto» o un causal «¿Por qué».
- source_word: תִשְׁעֶה מִמֶּנִּי
  english_pob_choice: will you not look away from me
  chosen_spanish: no apartarás tu mirada de mí
  alternatives_spanish:
  - no volverás tu mirada de mí
  - no apartarás tus ojos de mí
  - no mirarás aparte de mí
  lexicon: HALOT
  rationale: El verbo transmite la idea de desviar o dirigir la vista. «Apartar tu mirada de mí» conserva la fuerza de una mirada fija y la necesidad de alivio, sin sonar torpe en español.
- source_word: תַרְפֵּנִי
  english_pob_choice: leave me alone
  chosen_spanish: ni me soltarás
  alternatives_spanish:
  - ni me dejarás solo
  - ni me dejarás en paz
  - ni aflojarás tu mano sobre mí
  lexicon: HALOT
  rationale: El hifil de רפה comunica soltar, dejar ir o desistir. «Soltarme» mantiene esa idea con paralelismo claro frente a «apartar tu mirada», evitando una expresión demasiado interpretativa.
- source_word: עַד בִּלְעִי רֻקִּי
  english_pob_choice: until I swallow my spit
  chosen_spanish: hasta que me trague mi saliva
  alternatives_spanish:
  - hasta que me trague mi escupitajo
  - hasta que trague mi saliva
  lexicon: HALOT
  rationale: Se conserva el modismo corporal y su efecto de brevísimo intervalo. «Saliva» es más natural y digno que «escupitajo», aunque el hebreo es deliberadamente áspero; el sentido idiomático sigue siendo «ni por un instante».
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y el auditable English POB, manteniendo el paralelismo entre la mirada fija y el no ser dejado solo. Se preserva el modismo final con una nota explicativa, como en el registro inglés, pero adaptado al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo contiene יהוה; aquí no aparece.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita que obligue a ocultarlo.
  - «Saliva» se mantiene como equivalente natural de רֻקִּי, conservando el registro intenso del lamento.
  - La puntuación interrogativa inicial y la coma interna reflejan el ritmo poético y el paralelismo hebreo.
