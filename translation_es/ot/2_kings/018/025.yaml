translation:
  language: es
  text: 'Ahora[a], ¿acaso subí contra este lugar sin Yahvé para destruirlo? Yahvé me dijo: «Sube contra esta tierra y destrúyela».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparte de Yahvé» o «independientemente de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִבַּלְעֲדֵי
  english_pob_choice: was it apart from
  chosen_spanish: ¿fue aparte de
  alternatives_spanish:
  - ¿fue sin
  - ¿fue independientemente de
  lexicon: HALOT
  rationale: La construcción interrogativa retórica expresa negación de actuación autónoma. «Aparte de» conserva la idea de que no fue por iniciativa independiente de Yahvé y suena natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino יהוה. «Yahvé» mantiene el nombre de pacto y evita la sustitución por un título.
- source_word: עָלִיתִי
  english_pob_choice: I came up
  chosen_spanish: subí
  alternatives_spanish:
  - vine
  - ascendí
  - marché
  lexicon: HALOT
  rationale: עלה conserva aquí el movimiento de ascenso/avance militar. En español, «subí» es breve, fiel y natural en el discurso directo.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este lugar
  lexicon: HALOT
  rationale: «Lugar» reproduce bien מָקוֹם sin identificar de forma interpretativa Jerusalén; preserva la amplitud semántica del hebreo en el contexto.
- source_word: לְהַשְׁחִיתוֹ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirlo
  alternatives_spanish:
  - para arrasarlo
  - para devastarlo
  lexicon: HALOT
  rationale: El hifil de שׁחת indica acción destructiva. «Destruirlo» es la equivalencia más directa y mantiene el paralelo verbal con el segundo verbo.
- source_word: אָמַר אֵלַי
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - habló conmigo
  - dijo a mí
  lexicon: HALOT
  rationale: Fórmula verbal directa y usual en español; conserva la pretensión de autorización divina sin añadir matiz explicativo.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve
  - Avanza
  lexicon: HALOT
  rationale: El imperativo de עלה en contexto militar se expresa bien con «sube», que conserva la imagen direccional y el paralelismo con «subí».
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - este país
  - esta tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra, país o territorio. «Tierra» es amplio, sobrio y fiel al contexto de invasión sin restringir indebidamente el referente.
- source_word: וְהַשְׁחִיתָהּ
  english_pob_choice: and destroy it
  chosen_spanish: y destrúyela
  alternatives_spanish:
  - y arráasala
  - y devástala
  lexicon: HALOT
  rationale: Se mantiene la repetición de שׁחת con el mismo verbo base en español para conservar el vínculo léxico entre ambas cláusulas. El imperativo femenino se refleja con «-la».
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton directamente. El proyecto pide «Yahvé» como forma principal, preservando el nombre de pacto sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether to identify 'this place' and 'this land' as Jerusalem/Judah
  english_pob_reading: Retain 'this place' and 'this land' without interpretive substitution
  chosen_spanish_reading: Conservar «este lugar» y «esta tierra» sin sustitución interpretativa
  alternative_spanish_readings:
  - esta ciudad
  - Jerusalén
  - Judá
  rationale: El hebreo distingue מָקוֹם y אֶרֶץ. Mantener ambas expresiones evita ampliar o estrechar el referente más allá de lo que dice el texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy; never paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: El cotejo reciente indica alta concordancia y ningún cambio aplicado; se mantiene la lectura acordada en el audit trail inglés, con adaptación natural al español y sin introducir identificación interpretativa de Jerusalén o Judá.
  spanish_consistency_notes:
  - Se conservó la repetición de שׁחת con «destruir» / «destrúyela» para mantener el enlace léxico.
  - Se mantuvo el nombre divino como «Yahvé» en todo el versículo, conforme al estándar del proyecto.
  - Se evitó traducir מָקוֹם/אֶרֶץ con términos más específicos que «lugar»/«tierra», para respetar la amplitud del hebreo.
