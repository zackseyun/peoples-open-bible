revisions:
- from: Si Balac me diera su casa llena de plata y oro[a], no podría pasar por encima de la palabra de Yahvé, para hacer bien o mal por mi propia voluntad. Lo que Yahvé hable, eso hablaré.
  to: Si Balac me diera su casa llena de plata y oro[a], no podría ir más allá de la palabra de Yahvé, para hacer bien o mal de mi propio corazón. Lo que Yahvé hable, eso hablaré.
  rationale: 'Se hacen ajustes menores para mejorar la fidelidad léxica y la naturalidad del español sin cambiar el sentido global ya bien logrado: ''ir más allá'' por fluidez y ''de mi propio corazón'' para preservar מִלִּבִּי. También se corrige la nota para reflejar con precisión la alternativa literal auditada.'
  reviewer_model: gpt-5.4
