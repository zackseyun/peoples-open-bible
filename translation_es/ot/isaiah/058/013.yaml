base_translation:
  language: en
  yaml_path: translation/ot/isaiah/058/013.yaml
  text: If you turn back your foot from the Sabbath[a], from doing your own pleasure on my holy day, and call the Sabbath a delight, the holy thing of Yahweh honorable, and honor it by not going your own ways, nor seeking your own pleasure, nor speaking a word[c][b],
  footnotes:
  - marker: a
    text: Or 'and honor him,' taking the pronoun as referring to the LORD rather than to the Sabbath.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'nor speaking a word'; this may mean refraining from ordinary, self-serving, or idle speech.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'your own pleasure' can also mean 'your own desire' or, in context, 'your own business.'
    reason: lexical_alternative
