translation:
  language: es
  text: Más majestuoso que el sonido de muchas aguas[a], que los poderosos rompientes del mar, es Yahvé en lo alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Más poderoso que los sonidos de muchas aguas, que los rompientes del mar, es poderoso Yahvé en lo alto».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/קֹּלוֹת
  english_pob_choice: than the sound of
  chosen_spanish: que el sonido de
  alternatives_spanish:
  - que las voces de
  - que los sonidos de
  lexicon: HALOT
  rationale: El hebreo usa un comparativo con מִן y קוֹל, que puede significar ‘sonido’, ‘voz’ o ‘ruido’. En español, ‘sonido’ mantiene el valor auditivo y conserva la imagen poética sin forzar ‘voz’ en un contexto de aguas y olas.
- source_word: מַיִם רַבִּים
  english_pob_choice: many waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - aguas numerosas
  - grandes aguas
  lexicon: HALOT
  rationale: La expresión hebrea funciona como un modismo bíblico para aguas extensas y poderosas. ‘Muchas aguas’ reproduce el paralelismo y la resonancia del original con naturalidad en español.
- source_word: אַדִּירִים
  english_pob_choice: majestic
  chosen_spanish: más majestuoso
  alternatives_spanish:
  - más poderoso
  - más imponente
  lexicon: HALOT
  rationale: El adjetivo combina fuerza, nobleza y grandeza. ‘Majestuoso’ capta mejor el tono real y exaltado del salmo que un simple ‘poderoso’, y permite conservar el valor comparativo.
- source_word: מִשְׁבְּרֵי יָם
  english_pob_choice: the mighty breakers of the sea
  chosen_spanish: los poderosos rompientes del mar
  alternatives_spanish:
  - los rompientes del mar
  - las olas poderosas del mar
  - los breakers del mar
  lexicon: HALOT
  rationale: מִשְׁבָּר designa los rompientes o la resaca del mar. ‘Rompientes’ es el equivalente más directo y técnico; el adjetivo ‘poderosos’ refleja en español la fuerza que el inglés POB vincula al término.
- source_word: אַדִּיר
  english_pob_choice: majestic
  chosen_spanish: más majestuoso
  alternatives_spanish:
  - más poderoso
  lexicon: HALOT
  rationale: La segunda ocurrencia de אַדִּיר se predica de Yahvé en relación de superioridad. Repetir ‘majestuoso’ mantiene la cohesión léxica y el tono de exaltación regia del verso.
- source_word: בַּ/מָּרוֹם
  english_pob_choice: on high
  chosen_spanish: en lo alto
  alternatives_spanish:
  - en las alturas
  - en la altura
  - en el cielo
  lexicon: HALOT
  rationale: La frase indica elevación trascendente. ‘En lo alto’ es idiomático en español y conserva la poesía sin especificar ‘cielo’, que sería más interpretativo de lo que el hebreo exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton como ‘Yahvé’, conforme a la política del proyecto, evitando la sustitución por un título. ‘Jehová’ queda descartado por no ser la forma preferida del proyecto y ‘el SEÑOR’ por ocultar el nombre.
theological_decisions:
- issue: Cómo leer la construcción comparativa con מִן al inicio del verso
  english_pob_reading: The verse states that the LORD is more majestic than the overwhelming waters and sea-breakers.
  chosen_spanish_reading: El verso afirma que Yahvé es más majestuoso que las aguas y los rompientes del mar.
  alternative_spanish_readings:
  - Puede leerse como una exclamación sobre las aguas, seguida de una afirmación independiente sobre Yahvé en lo alto.
  rationale: La sintaxis comparativa del hebreo favorece entender una comparación de superioridad. La traducción conserva la supremacía de Yahvé sobre la fuerza caótica del mar sin introducir especulación ajena al texto.
  doctrine_reference: 'DOCTRINE.md: Comparative poetry and divine supremacy'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el nombre de pacto. ‘Yahvé’ lo reproduce en español con la misma intención de preservar el nombre propio divino, no una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del texto fuente y del audit trail inglés. No se registraron revisiones aplicadas en la fuente auditada; se mantiene la lectura comparativa y la rendición del nombre divino como Yahvé, con ajuste estilístico natural para español.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ de forma consistente para יְהוָה.
  - Se usó ‘majestuoso’ en ambas ocurrencias de אַדִּיר para conservar cohesión léxica.
  - ‘Rompientes’ reproduce de manera estable מִשְׁבְּרֵי sin sustituirlo por términos más generales como ‘olas’.
  - La estructura comparativa ‘más ... que ...’ refleja la fuerza del מִן hebreo sin suavizarla en una mera exclamación.
