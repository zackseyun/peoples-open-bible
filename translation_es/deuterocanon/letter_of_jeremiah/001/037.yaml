translation:
  language: es
  text: Nunca mostrarán misericordia a una viuda[a], ni harán bien a un huérfano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente no mostrarán compasión a una viuda». El griego usa una negación enfática (οὐ μή).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni beneficiarán al huérfano»; también puede entenderse «ni harán bien al huérfano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χήραν
  english_pob_choice: a widow
  chosen_spanish: a una viuda
  alternatives_spanish:
  - a la viuda
  - a viudas
  lexicon: LSJ
  rationale: El griego presenta χήραν en acusativo singular con valor representativo; en español, 'una viuda' conserva ese sentido genérico sin convertirlo en plural ni volverlo demasiado abstracto. 'Viuda' mantiene el referente social vulnerable del texto.
- source_word: οὐ μὴ ἐλεήσωσιν
  english_pob_choice: will never show mercy
  chosen_spanish: Nunca mostrarán misericordia
  alternatives_spanish:
  - Ciertamente no tendrán compasión
  - De ningún modo mostrarán piedad
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo aoristo expresa negación enfática. 'Nunca' comunica bien esa fuerza en español y 'mostrarán misericordia' preserva el campo semántico de ἐλεέω mejor que una traducción más débil como 'no sentirán lástima'.
- source_word: οὔτε
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - y no
  lexicon: LSJ
  rationale: '''Ni'' es la coordinación negativa natural en español después de una primera cláusula negativa, y reproduce el valor de οὔτε sin sobrecargar la frase.'
- source_word: ὀρφανῷ
  english_pob_choice: an orphan
  chosen_spanish: un huérfano
  alternatives_spanish:
  - el huérfano
  - un hijo sin padre
  lexicon: LSJ
  rationale: ὀρφανῷ es dativo singular y puede significar 'huérfano' o 'desamparado/fatherless'. 'Huérfano' es claro y fiel en español moderno, y conserva la categoría ética de los vulnerables.
- source_word: εὖ ποιήσουσιν
  english_pob_choice: do good to
  chosen_spanish: harán bien a
  alternatives_spanish:
  - beneficiarán a
  - tratarán bien a
  lexicon: BDAG
  rationale: εὖ ποιέω significa hacer bien, obrar con bondad o beneficiar. 'Hacer bien a' refleja la estructura verbal del griego y su alcance moral, sin perder naturalidad en español.
theological_decisions:
- issue: La pareja social de vulnerables (viuda / huérfano)
  english_pob_reading: widow / orphan
  chosen_spanish_reading: viuda / huérfano
  alternative_spanish_readings:
  - viuda / desamparado
  - viuda / hijo sin padre
  rationale: El versículo denuncia la incapacidad de los ídolos para mostrar compasión o benevolencia a quienes la ética bíblica reconoce como especialmente vulnerables. 'Viuda' y 'huérfano' preservan esa carga social y teológica en un español claro y estándar.
  doctrine_reference: 'DOCTRINE.md: Readable modern Spanish, preserve theological weight and social-ethical force'
- issue: La negación enfática de οὐ μή
  english_pob_reading: will never show mercy
  chosen_spanish_reading: Nunca mostrarán misericordia
  alternative_spanish_readings:
  - Ciertamente no mostrarán misericordia
  - De ningún modo mostrarán misericordia
  rationale: La fuerza enfática del griego debe oírse en español. 'Nunca' expresa bien la negación absoluta y evita suavizar el dicho a un simple 'no'.
  doctrine_reference: 'Greek grammar: οὐ μή + subjunctive as emphatic negation'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el criterio POB en inglés: conserva la negación enfática de οὐ μή, mantiene el par social viuda/huérfano y reproduce εὖ ποιήσουσιν con una fórmula verbal natural en español. Se evita traducir mecánicamente desde el inglés cuando el griego permite una formulación más directa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - '''Misericordia'' se conserva como equivalente natural de ἐλεέω, en línea con el valor ético-religioso del verbo.'
  - '''Huérfano'' se prefiere a ''huérfano sin padre'' por claridad y porque el contexto ya lo sitúa como figura vulnerable paradigmática.'
