- from: Porque el júbilo de los impíos es breve[a], y el gozo del impío sin Dios dura solo un momento.
  to: Porque el júbilo de los impíos es breve[a], y el gozo del impío dura solo un momento.
  rationale: Se conserva la fidelidad al hebreo y al English POB, pero se corrige la sobretraducción de חָנֵף. «Impío» es una opción natural, digna y suficientemente amplia en español para el sentido contextual de «godless», mientras la nota preserva la alternativa «hipócrita». La línea resultante es más idiomática y mantiene mejor el paralelismo poético.
