review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mantiene la doble pareja רֹאִים/תִרְאוּ y חֹזִים/תֶחֱזוּ, conserva la secuencia de prohibiciones e imperativos, y transmite el rechazo a la revelación recta a favor de mensajes engañosos. Sin embargo, hay dos desajustes importantes: (1) el anclaje de la nota [a] está colocado en ''videntes'', pero la nota explicativa corresponde a נְכֹחוֹת (''cosas rectas/lo recto/verdadero''), no a רֹאִים; y (2) varias formulaciones suenan poco naturales en español bíblico actual (''para nosotros de cosas rectas'', ''cosas suaves'', ''tengan visiones de ilusiones'').'
  spanish_quality_summary: El español es comprensible, pero resulta algo calcado y menos idiomático de lo deseable. 'No tengan visiones para nosotros de cosas rectas' es torpe; 'no nos presenten lo recto' o similar suena mejor y sigue fiel al hebreo. 'Cosas suaves' comunica parcialmente la imagen, pero en español puede sonar física más que retóricamente; 'cosas halagüeñas' expresa mejor el sentido contextual. 'Tengan visiones de ilusiones' también es rígido; 'vean ilusiones' conserva mejor el paralelismo verbal y fluye más naturalmente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La distinción entre ''videntes'' y ''visionarios'' está bien conservada. No aparecen términos del glosario principal como Yahvé, Mesías, etc. Conviene, eso sí, alinear las notas con las decisiones léxicas auditadas: la nota [a] debe ir sobre ''lo recto'' (נְכֹחוֹת), y la nota [b] puede mantenerse sobre el término para מַהֲתַלּוֹת si se conserva una opción como ''ilusiones''.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota inglesa [a] explica נְכֹחוֹת ('what is right' / 'what is straightforward' / 'truthful things'), pero en el borrador español [a] aparece en 'videntes', donde en realidad no hay nota en el audit trail inglés. Esto altera la documentación léxica y deja sin nota el lugar que sí la requiere.
  - severity: medium
    issue: La frase 'No tengan visiones para nosotros de cosas rectas' es poco natural en español.
    rationale: Aunque intenta preservar el cognado de חֹזִים/תֶחֱזוּ, la construcción con 'tener visiones ... de cosas rectas' suena forzada. Una formulación como 'no nos presenten[a] lo recto' o 'no visualicen para nosotros lo recto' mejora la claridad sin perder el sentido.
  - severity: medium
    issue: '''Cosas suaves'' no comunica con suficiente claridad el matiz retórico de חֲלָקוֹת.'
    rationale: Literalmente puede defenderse, pero en español contemporáneo suele evocar textura física. El contexto pide discurso lisonjero o complaciente; 'cosas halagüeñas' o 'palabras halagüeñas' transmite mejor la fuerza contextual documentada.
  - severity: low
    issue: '''Tengan visiones de ilusiones'' es torpe estilísticamente.'
    rationale: La repetición es auditable, pero no idiomática. 'Vean ilusiones[b]' mantiene el contraste con 'vean'/'visionarios' y suena más natural en español.
