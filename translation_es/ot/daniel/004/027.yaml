    issue: Las notas al pie están desalineadas con sus anclas y con el expediente inglés.
    rationale: En el texto español, [a] está anclada a «dijo», pero la nota [a] actualmente dice «O “respondió y habló”», mientras el expediente inglés usa la primera nota para «great Babylon / Babylon the Great». Además, falta una nota para «como residencia real», donde el POB inglés sí preserva alternativas léxicas significativas para לְבֵית מַלְכוּ.
