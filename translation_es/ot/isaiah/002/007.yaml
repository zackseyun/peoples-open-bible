translation:
  language: es
  text: Su tierra está llena de plata y oro[a], y no hay fin de sus tesoros[b]; su tierra está llena de caballos, y no hay fin de sus carros de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo singular en todo el versículo: «su tierra ... sus tesoros ... sus carros». El singular probablemente se refiere de manera colectiva a la nación o al pueblo.'
    reason: lexical_alternative
  - marker: b
    text: También podría entenderse «depósitos» o «almacenes» para el término traducido aquí como «tesoros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמָּלֵא
  english_pob_choice: is filled
  chosen_spanish: se llena
  alternatives_spanish:
  - está llena
  - fue llenada
  - se llenó
  lexicon: HALOT
  rationale: El hebreo presenta un estado resultante de llenura; en español, "se llena" comunica bien el carácter descriptivo y profético sin forzar un pasado puntual ni una formulación demasiado estática.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra
  - su país
  lexicon: HALOT
  rationale: Se conserva el posesivo singular 3ms del hebreo. "Su tierra" mantiene la referencia colectiva implícita sin normalizarla a plural.
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - dinero y oro
  - plata y oro fino
  lexicon: HALOT
  rationale: La pareja nominal hebrea se traduce de forma directa y natural. "Plata" y "oro" preservan el paralelismo y el valor material/poético del texto.
- source_word: וְאֵין קֵצֶה
  english_pob_choice: there is no end
  chosen_spanish: no hay fin
  alternatives_spanish:
  - no hay límite
  - sin fin
  lexicon: HALOT
  rationale: '"No hay fin" reproduce el modismo existencial hebreo con naturalidad en español y conserva la fuerza de abundancia ilimitada.'
- source_word: לְאֹצְרֹתָיו
  english_pob_choice: to his treasures
  chosen_spanish: de sus tesoros
  alternatives_spanish:
  - de sus almacenes
  - de sus depósitos
  lexicon: HALOT
  rationale: 'Aunque el hebreo puede abarcar tesoros, tesorerías o almacenes, aquí el paralelo con plata y oro favorece "tesoros". La preposición se adapta a la construcción española del complemento de abundancia: "no hay fin de sus tesoros".'
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - corceles
  lexicon: HALOT
  rationale: Equivalencia directa y clara del plural nominal.
- source_word: לְמַרְכְּבֹתָיו
  english_pob_choice: to his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carruajes
  - sus carros de guerra
  lexicon: HALOT
  rationale: '"Carros" es la forma más natural en español bíblico para מַרְכֶּבֶת / chariot. No se añade "de guerra" porque el hebreo no lo explicita, aunque el contexto militar queda sugerido por la mención de caballos.'
theological_decisions:
- issue: Conservación del singular posesivo colectivo
  english_pob_reading: his land ... his treasures ... his chariots
  chosen_spanish_reading: su tierra ... sus tesoros ... sus carros
  alternative_spanish_readings:
  - su tierra ... su tesorería ... sus carros
  - su tierra ... sus almacenes ... sus carros
  rationale: Se mantiene el singular posesivo del hebreo, que probablemente funciona de modo colectivo para la nación. En español, el posesivo cambia de "su" a "sus" por la concordancia con plurales internos, pero sin perder la referencia singular del sujeto colectivo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto del control de calidad y conserva las decisiones auditadas del inglés: el presente descriptivo para מלא, el singular posesivo colectivo y la opción léxica de אֹצָר como «tesoros» en este contexto. No hubo revisiones pendientes en el registro fuente.'
  spanish_consistency_notes:
  - Se evitó "SEÑOR" o formulaciones de máscara porque no aparece el tetragrámaton en este versículo.
  - '"Carros" se usa en lugar de "carros de guerra" para no añadir un matiz no explicitado por el hebreo, aunque el contexto lo sugiera.'
  - La concordancia posesiva en español se ajusta al número gramatical de los sustantivos, pero se mantiene la lectura colectiva del sujeto singular hebreo.
