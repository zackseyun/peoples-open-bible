revisions:
- from: y el sacerdote lo examina[a], y he aquí, la tumefacción de la afección es rojiza-blanca sobre su cabeza calva o sobre su frente calva, como la apariencia de una afección de piel por la lepra[b] de la carne.
  to: y el sacerdote lo examina, y he aquí, la hinchazón de la afección es rojiza-blanca sobre su cabeza calva[a] o sobre su frente calva, como la apariencia de una enfermedad de la piel[b] en la carne,
  rationale: La revisión elimina la adición indebida «por la lepra», reubica la nota sobre צָרַעַת en el lugar pertinente, mejora la naturalidad de עוֹר בָּשָׂר con «en la carne» y sustituye el tecnicismo «tumefacción» por «hinchazón» para un español más claro y eclesialmente legible, sin perder la precisión diagnóstica del hebreo.
