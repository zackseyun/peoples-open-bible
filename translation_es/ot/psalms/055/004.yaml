review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: mantiene la causalidad de מִקּוֹל / מִפְּנֵי, conserva la imagen concreta de “voz”, refleja la opresión del impío, y transmite la hostilidad final. Sin embargo, en יָמִיטוּ עָלַי אָוֶן el español “arrojan mal sobre mí” no representa tan fielmente la decisión auditada del POB (“cast trouble upon me”) ni el valor contextual de אָוֶן como daño/trouble infligido; “mal” en español suena más moral o genérico. También la nota al pie está anclada a “enemigo”, pero explica קוֹל/“voz”, de modo que el marcador está mal ubicado.'
  spanish_quality_summary: 'El texto es legible y digno, pero hay dos detalles mejorables: “porque arrojan mal sobre mí” suena menos natural y menos preciso que una opción como “porque echan calamidad sobre mí”; y el anclaje de la nota [a] debe ir en “voz”, no en “enemigo”. “Con furor me aborrecen” es comprensible, aunque “con ira me odian” sería más llano; no obstante, “aborrecen” sigue siendo aceptable en registro bíblico.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. “Impío” para רָשָׁע es defendible. La cuestión principal es lexical: אָוֶן aquí debe reflejar aflicción/daño/calacidad más que “mal” en sentido abstracto o moral. La nota alternativa debe preservar esa amplitud semántica.'
  issues:
  - severity: high
    issue: La frase “arrojan mal sobre mí” no refleja bien el sentido contextual de אָוֶן.
    rationale: Según el expediente inglés, אָוֶן aquí se refiere a trouble/harm infligido al salmista, no al mal moral en abstracto. En español, “mal” puede malentenderse como maldad o un mal genérico; “calamidad”, “daño” o “aflicción” preservan mejor el sentido contextual.
  - severity: medium
    issue: La nota [a] está anclada al término equivocado.
    rationale: La nota explica el valor léxico de קוֹל (“voz”, “sonido”, “clamor”), por lo que el marcador debe aparecer junto a “voz”, no junto a “enemigo”.
  - severity: low
    issue: Falta una nota léxica para la alternativa de אָוֶן, presente en la auditoría inglesa.
    rationale: El POB inglés preserva una alternativa léxica para este término. Dado que el español adopta una solución contextual específica, conviene mantener una nota breve con la alternativa para no perder la amplitud semántica documentada.
  revised_spanish_text: Por la voz[a] del enemigo, por la opresión del impío; porque echan calamidad sobre mí[b], y con furor me aborrecen.
  revised_footnotes:
  - marker: a
    text: 'O: “clamor”. El hebreo קוֹל puede significar “voz”, “sonido” o “clamor”; aquí se conserva “voz” por ser la opción más cercana al texto y al paralelismo poético.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “mal” o “daño”. El hebreo אָוֶן puede significar “calamidad”, “daño” o “mal”, según el contexto.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] sobre “voz”, que es el término realmente comentado. Se cambia “arrojan mal sobre mí” por “echan calamidad sobre mí” para reflejar mejor el valor contextual de אָוֶן como aflicción/daño infligido, en línea con la decisión auditada del POB. Se añade una nota [b] para conservar la alternativa léxica documentada.
