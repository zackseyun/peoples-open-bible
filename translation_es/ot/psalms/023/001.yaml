translation:
  language: es
  text: Salmo de David[a]. Yahvé es mi pastor[b]; nada me faltará[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; la superscripción hebrea לְדָוִד puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
  - marker: b
    text: Hebreo YHWH, tradicionalmente vertido «el SEÑOR» en muchas traducciones.
    reason: lexical_alternative
  - marker: c
    text: O «no careceré»; la idea es de carencia, no de deseo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמ֥וֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Una melodía
  - Un canto
  lexicon: HALOT
  rationale: En este encabezado literario, מִזְמוֹר funciona como rótulo de género. «Salmo» es el equivalente español más natural y reconocible, y conserva el valor de género sin añadir interpretación.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los superscripciones puede señalar autoría, dedicación o asociación. «De David» preserva esa amplitud en español sin decidir de más.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino en forma transliterada conforme al criterio del proyecto. «Yahvé» mantiene el Tetragrámaton sin sustituirlo por un título.
- source_word: רֹעִי
  english_pob_choice: my shepherd
  chosen_spanish: mi pastor
  alternatives_spanish:
  - el que me pastorea
  - mi guía pastor
  lexicon: HALOT
  rationale: El participio/nombre de רעה describe a quien apacienta o guía un rebaño. «Mi pastor» conserva la metáfora y es la forma natural en español, equivalente al inglés auditado.
- source_word: אֶחְסָר
  english_pob_choice: I will not lack
  chosen_spanish: no me faltará
  alternatives_spanish:
  - no me faltará nada
  - no careceré
  lexicon: HALOT
  rationale: Desde חסר, la idea es «carecer / faltar». En español, «no me faltará» transmite la carencia negada con fuerza verbal futura, evitando la ambigüedad de un «desear» malentendido.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo trae directamente el Tetragrámaton, y el criterio del proyecto exige conservar el nombre divino. «Yahvé» reproduce esa decisión en español y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the superscription לְדָוִד
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: La superscripción admite autoría, dedicación o asociación. «De David» conserva esa tensión documental y no fuerza una conclusión que el hebreo no obliga a tomar.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se registran cambios necesarios y el consenso de revisión fue de alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - «Salmo» traduce el rótulo מִזְמוֹר como género literario.
  - La negación final se expresa con futuro («no me faltará») para conservar la fuerza verbal del hebreo.
  - Se conserva la ambigüedad de לְדָוִד mediante «de David», con nota de alternativas.
  - Las notas al pie usan marcadores únicos y están ancladas en el texto donde corresponde.
