translation:
  language: es
  text: Les retribuirás[a], Yahvé, conforme a la obra de sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo puede oírse también como una súplica: «Que les retribuyas, Yahvé»'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «conforme a la obra de sus manos», un modismo que alude a lo que han hecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשִׁיב
  english_pob_choice: You will repay
  chosen_spanish: Tú les darás su pago
  alternatives_spanish:
  - Tú les pagarás
  - Tú les retribuirás
  - Que les des su pago
  lexicon: HALOT 7725
  rationale: El hifil de שוב puede expresar devolver o hacer volver, y en este contexto con גְּמוּל el sentido es de retribución. En español, 'dar su pago' comunica la idea de retribuir de forma natural sin forzar un calco, y mantiene abierta la tensión entre declaración y súplica implícita.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos mismos
  lexicon: HALOT 3mp
  rationale: El dativo hebreo funciona como objeto indirecto de la retribución. En español, 'les' integra esa relación de manera idiomática y más fluida que repetir 'a ellos'.
- source_word: גְּמוּל
  english_pob_choice: repay
  chosen_spanish: su pago
  alternatives_spanish:
  - recompensa
  - retribución
  - pago
  lexicon: HALOT 1576
  rationale: El sustantivo designa recompensa, paga o retribución recibida en retorno. 'Su pago' conserva el valor retributivo sin cargar el verso con un tecnicismo excesivo; el verbo español ya lleva la noción de retribuir.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - oh Yahvé
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino como 'Yahvé' conforme al estándar del proyecto, sin sustituirlo por un título. En español, la invocación queda natural sin añadir 'oh' salvo si el tono lo exigiera.
- source_word: כְּמַעֲשֵׂה
  english_pob_choice: according to the work
  chosen_spanish: conforme a la obra
  alternatives_spanish:
  - según la obra
  - de acuerdo con la obra
  - conforme al trabajo
  lexicon: HALOT 4639
  rationale: La preposición כ indica correspondencia o medida. 'Conforme a' expresa bien esa proporcionalidad en español bíblico contemporáneo; 'obra' respeta el campo semántico de מַעֲשֶׂה sin reducirlo a mero 'trabajo'.
- source_word: יְדֵיהֶם
  english_pob_choice: of their hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de sus propias manos
  - por lo que hicieron
  - por sus obras
  lexicon: HALOT 3027
  rationale: '''Manos'' conserva la metáfora hebrea de acción y conducta. En español, ''de sus manos'' mantiene la imagen concreta y deja implícito el sentido idiomático de sus hechos.'
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; por la doctrina del proyecto se translitera como 'Yahvé'. Se evita la sustitución litúrgica por 'SEÑOR' para preservar el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor modal de תָּשִׁיב en un lamento orante
  english_pob_reading: You will repay them / May you repay them
  chosen_spanish_reading: Tú les darás su pago
  alternative_spanish_readings:
  - Que les des su pago
  - Tú les retribuirás
  - Dales su pago
  rationale: 'El imperfecto hebreo puede leerse como futuro de confianza o como ruego. La forma española elegida permite ambas resonancias: suena declarativa, pero en contexto de lamentación también funciona como petición implícita. La alternancia no se resuelve del todo para respetar la tensión textual.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el auditoría inglesa existente, especialmente la tensión modal de תָּשִׁיב y el valor idiomático de יְדֵיהֶם. No se introdujeron cambios de sentido respecto del consenso alto del control cruzado; la principal decisión fue adaptar de forma natural al español sin perder la imagen de retribución ni el nombre divino.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''De sus manos'' preserva la metáfora hebrea de acción; no se suavizó a ''lo que hicieron'' en el texto principal.'
  - '''Conforme a'' refleja la equivalencia proporcional del כ.'
  - La oración conserva una lectura doble, declarativa y volitiva, mediante una formulación española abierta.
