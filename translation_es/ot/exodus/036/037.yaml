translation:
  language: es
  text: E hizo una cortina[a] para la entrada de la tienda, de azul, púrpura y carmesí, y de lino fino torcido, obra de un bordador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pantalla» o «colgadura». El término hebreo designa una pieza colgante en una entrada, distinta del «velo» interior (פָּרֹכֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he made
  chosen_spanish: E hizo
  alternatives_spanish:
  - Entonces hizo
  - Y hizo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «e hizo» conserva la secuencia de manera natural en español sin añadir matiz innecesario.
- source_word: מָסָךְ
  english_pob_choice: screen
  chosen_spanish: cortina
  alternatives_spanish:
  - pantalla
  - velo
  lexicon: HALOT
  rationale: En español, «cortina» comunica de forma más natural la idea de una pieza colgante en la entrada. Se mantiene la nota para preservar la distinción con el velo interior (פָּרֹכֶת), como hace el texto auditado en inglés.
- source_word: לְפֶתַח הָאֹהֶל
  english_pob_choice: for the entrance of the tent
  chosen_spanish: para la entrada de la tienda
  alternatives_spanish:
  - para la puerta de la tienda
  - para la entrada del tabernáculo
  lexicon: HALOT
  rationale: «Entrada» refleja bien פתח y «tienda» traduce אֹהֶל sin sustituirlo por un término eclesiástico más interpretativo como «tabernáculo».
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul teñido
  - azul oscuro
  lexicon: HALOT
  rationale: «Azul» es la forma concisa y estándar; el contexto textil deja claro que se trata de material teñido.
- source_word: וְאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura teñida
  lexicon: HALOT
  rationale: «Púrpura» es la equivalencia habitual y precisa para el colorante/tela púrpura del contexto cultual.
- source_word: וְתוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - hilo escarlata
  - escarlata
  lexicon: HALOT
  rationale: La expresión hebrea designa material teñido de rojo intenso. «Carmesí» reproduce bien el color; en español se omite «hilo» porque la secuencia ya enumera materiales textiles y la frase final los agrupa como conjunto. Se evita sobreespecificar sin apoyo explícito del hebreo.
- source_word: וְשֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino retorcido
  - lino finamente torcido
  lexicon: HALOT
  rationale: «Lino fino torcido» conserva tanto la calidad («fino») como la manufactura («torcido»), siguiendo de cerca la forma hebrea sin sonar excesivamente técnica.
- source_word: מַעֲשֵׂה רֹקֵם
  english_pob_choice: the work of an embroiderer
  chosen_spanish: obra de bordador
  alternatives_spanish:
  - trabajo de bordador
  - obra bordada
  lexicon: HALOT
  rationale: «Obra de bordador» refleja el sustantivo de oficio y mantiene el sentido de habilidad artesanal; es una opción breve y digna en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada en inglés y el hebreo, manteniendo la distinción técnica entre מָסָךְ y פָּרֹכֶת, y conservando la serie textil como lista de materiales y acabado artesanal. No se detectaron revisiones sustantivas en el pasaje fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefiere «cortina» en el texto principal por naturalidad española, con nota para no perder la distinción técnica del hebreo.
  - «Púrpura» y «carmesí» mantienen la serie cromática sin añadir glosas innecesarias.
  - «Lino fino torcido» evita el calco rígido y conserva la cualidad manufacturada del material.
