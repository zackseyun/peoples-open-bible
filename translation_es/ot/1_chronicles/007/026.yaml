lexical_decisions:
- source_word: לַעְדָּן
  english_pob_choice: Ladan
  chosen_spanish: Ladán
  alternatives_spanish:
  - Laadán
  lexicon: HALOT
  rationale: Es un nombre propio; en español se translitera para conservar la forma del hebreo. Se mantiene la vocalización habitual 'Ladán', con 'Laadán' como alternativa posible reflejada por la misma grafía hebrea.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: En esta genealogía, el valor literal de parentesco se comunica con naturalidad como 'su hijo'. En español, el posesivo enclítico no es necesario; 'su hijo' preserva la relación filial sin sobrecargar la sintaxis.
- source_word: עַמִּיהוּד
  english_pob_choice: Ammihud
  chosen_spanish: Amihud
  alternatives_spanish:
  - Ammihud
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se usa 'Amihud' como forma española más fluida y cercana a la pronunciación esperable, sin alterar la identidad del nombre.
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elisama
  alternatives_spanish:
  - Elishama
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español, 'Elisama' evita una grafía anglicada innecesaria y mantiene la forma del nombre hebreo de manera legible.
translation_notes:
  revision_awareness: El texto fuente y el control inglés muestran acuerdo alto y no requieren revisión sustantiva; la única tensión relevante es la transliteración del primer nombre propio, para la cual se conserva una nota de alternativa.
