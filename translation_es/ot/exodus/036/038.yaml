translation:
  language: es
  text: y sus cinco columnas con sus ganchos; recubrió sus partes superiores y sus bandas con oro[a], y sus cinco bases[b] eran de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo traducido «bandas» suele verterse tradicionalmente «filetes»; probablemente se refiere a elementos decorativos o de unión en las columnas.
    reason: lexical_alternative
  - marker: b
    text: O «sus cinco zócalos».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדָיו
  english_pob_choice: its five pillars
  chosen_spanish: sus cinco columnas
  alternatives_spanish:
  - sus cinco pilares
  - sus cinco postes
  lexicon: HALOT
  rationale: עַמּוּד designa una columna o pilar vertical. En español, «columnas» comunica bien la función estructural y suena natural en un contexto arquitectónico-santuario; «pilares» también sería posible, pero «columnas» conserva mejor la imagen constructiva sin volverse arcaico.
- source_word: וָוֵיהֶם
  english_pob_choice: their hooks
  chosen_spanish: sus ganchos
  alternatives_spanish:
  - sus ganchos
  - sus garfios
  - sus clavijas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, וָוֵי refiere a piezas de sujeción para colgar o fijar. «Ganchos» es claro y natural en español; «clavijas» o «garfios» introducirían matices menos seguros.
- source_word: וְצִפָּה
  english_pob_choice: he overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - sobrecubrió
  - cubrió con lámina
  - chapó
  lexicon: HALOT
  rationale: El verbo describe aplicar una cubierta metálica. «Recubrió» transmite la acción de revestir con metal de modo idiomático en español, sin perder la idea técnica de overlay.
- source_word: רָאשֵׁיהֶם
  english_pob_choice: their tops
  chosen_spanish: sus cabezas
  alternatives_spanish:
  - sus extremos superiores
  - sus capiteles
  - sus partes superiores
  lexicon: HALOT
  rationale: Literalmente es «sus cabezas». En español, «cabezas» mantiene la metáfora del hebreo y también funciona en un registro bíblico; «capiteles» sería más técnico de lo que el hebreo exige.
- source_word: חֲשֻׁקֵיהֶם
  english_pob_choice: their bands
  chosen_spanish: sus bandas
  alternatives_spanish:
  - sus aros
  - sus ligaduras
  - sus filletes
  lexicon: HALOT
  rationale: El término tiene un sentido arquitectónico incierto, pero en la tradición de tabernáculo puede referir a bandas o elementos de unión/decoración. «Bandas» conserva la ambigüedad y coincide con la decisión inglesa de evitar el arcaísmo «fillets».
- source_word: זָהָב
  english_pob_choice: with gold
  chosen_spanish: con oro
  alternatives_spanish:
  - de oro
  - en oro
  lexicon: HALOT
  rationale: En español, al hablar de recubrir, lo natural es expresar el material con «con oro». Esto refleja el valor instrumental del sustantivo en la frase.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their five bases
  chosen_spanish: sus cinco bases
  alternatives_spanish:
  - sus cinco zócalos
  - sus cinco zoclos
  - sus cinco pedestales
  lexicon: HALOT
  rationale: אֶדֶן en lenguaje del tabernáculo puede ser base o encastre/socket. «Bases» es comprensible y fiel al contexto constructivo, sin forzar un tecnicismo que en español podría sonar desigual.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En la terminología bíblica de objetos del tabernáculo, «bronce» es la equivalencia estándar y reproduce la decisión contextual del texto base.
translation_notes:
  revision_awareness: 'El texto inglés auditado ya está en alta concordancia con el hebreo y sin revisiones aplicadas; la versión española sigue esa lectura estructural: cinco columnas con ganchos, recubrimiento de las partes superiores y de las bandas con oro, y cinco bases de bronce. Se preserva la posible alternancia léxica de אֶדֶן como «bases» o «zócalos/sockets», pero se mantiene «bases» por claridad.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de tres miembros de la frase hebrea.
  - «Columnas» y «bases» se usan en sentido arquitectónico coherente con el contexto del tabernáculo.
  - Se conserva la ambigüedad controlada de חֲשֻׁקֵי mediante «bandas», como en el audit trail inglés con ‘bands’.
  - No se introduce terminología eclesiástica ajena al contexto constructivo.
