translation:
  language: ko
  text: 그러나 일하지 않고 도리어 불경건한 자를 의롭다 하시는 분을 믿는 자에게는 그의 믿음이 의로 여겨집니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσεβῆ
  english_pob_choice: the ungodly
  chosen_korean: 불경건한 자
  alternatives_korean:
  - 경건치 않은 자
  lexicon: BDAG
  rationale: 1:18과 일관되게 ἀσέβεια-계열을 「불경건」으로 옮긴다. 바울 칭의론의 충격(「불경건한 자를 의롭다 하신다」)을 약화시키지 않는다.
theological_decisions:
- issue: 4:5 「불경건한 자를 의롭다 하시는 분」의 충격 보존
  chosen_reading: 불경건한 자를 의롭다 하시는 분
  alternative_readings:
  - 악인을 의롭다 하시는 분
  - 경건치 못한 자를 의롭다 하시는 분
  rationale: 바울의 가장 충격적 명제 중 하나이다. 「불경건한 자」(ἀσεβής)의 신학적 무게를 약화시키지 않고 그대로 보존한다. 출 23:7, 잠 17:15(「악인을 의롭다 하는 자는 ... 여호와께 가증함」)와의 신학적 긴장을 한국어 독자도 경험하도록 한다.
  doctrine_reference: DOCTRINE.md §1+§5 — author's powerful meaning
