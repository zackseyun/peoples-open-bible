translation:
  language: es
  text: Ha levantado un cuerno[b] para su pueblo[a], alabanza para todos sus fieles, para los hijos de Israel[c], el pueblo cercano a él. ¡Alaben a Yah![d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una alabanza para todos sus fieles»; la sintaxis hebrea después de «ha levantado un cuerno para su pueblo» es condensada y puede leerse de manera aposicional o resultativa.'
    reason: alternative_reading
  - marker: b
    text: «Cuerno» es una metáfora hebrea de fuerza, honor o poder exaltado.
    reason: cultural_note
  - marker: c
    text: 'O: «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».'
    reason: lexical_alternative
  - marker: d
    text: «¡Alaben a Yah!» es el significado de la expresión litúrgica «Aleluya».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶם
  english_pob_choice: he has raised up
  chosen_spanish: ha levantado
  alternatives_spanish:
  - levantó
  - exalta
  lexicon: HALOT
  rationale: El hebreo expresa la acción de elevar/levantar; en español, «ha levantado» conserva el valor perfectivo y el matiz celebrativo del texto poético mejor que un simple pretérito. También mantiene la imagen verbal sin volverla abstracta.
- source_word: קֶרֶן
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - fuerza
  - poder
  lexicon: HALOT
  rationale: Se conserva la imagen metafórica concreta del hebreo. «Cuerno» es natural en español bíblico y permite que la fuerza, el honor o el poder exaltado sigan implícitos sin resolver la metáfora.
- source_word: לְעַמּוֹ
  english_pob_choice: for his people
  chosen_spanish: para su pueblo
  alternatives_spanish:
  - para su nación
  - para su propio pueblo
  lexicon: HALOT
  rationale: «Pueblo» comunica bien el sentido corporativo y relacional de עַם en español. La forma con sufijo se refleja de manera natural con «su pueblo».
- source_word: תְּהִלָּה
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - una alabanza
  - gloria
  lexicon: HALOT
  rationale: En contexto poético, el sustantivo funciona de modo condensado y puede entenderse como resultado o apposición. «Alabanza» conserva el valor léxico y suena natural en español; no se ha forzado a «gloria», que sería menos preciso.
- source_word: לְכָל חֲסִידָיו
  english_pob_choice: for all his faithful ones
  chosen_spanish: para todos sus fieles
  alternatives_spanish:
  - para todos sus santos
  - para todos sus piadosos
  lexicon: HALOT
  rationale: «Fieles» transmite la idea de lealtad pactual/devoción que caracteriza a חֲסִידִים sin introducir un tono eclesiástico fuerte como «santos». Es una opción clara y amplia para lectores hispanohablantes.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los hijos de Israel
  - para los hijos/descendientes de Israel
  - para el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural del hebreo con «hijos», siguiendo la precisión morfológica y la tradición semítica de la expresión. «Hijos de Israel» es natural en español y no borra la forma del original.
- source_word: עַם קְרֹבוֹ
  english_pob_choice: the people near to him
  chosen_spanish: el pueblo cercano a él
  alternatives_spanish:
  - un pueblo cercano a él
  - su pueblo cercano
  lexicon: HALOT
  rationale: 'La construcción se conserva de manera directa: el sustantivo y el adjetivo expresan proximidad relacional/covenantal. «Cercano a él» evita interpretar de más y mantiene la tensión poética del hebreo.'
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alaben a Yah!
  alternatives_spanish:
  - ¡Alaben a Yah!
  - ¡Aleluya!
  - ¡Alaben a Yahvé!
  lexicon: HALOT
  rationale: El imperativo plural se traduce con un mandato español claro, y el nombre corto divino יָהּ se preserva como «Yah» en lugar de sustituirlo por un equivalente más largo. «Aleluya» se evita aquí para no opacar la forma verbal y el nombre divino presentes en el hebreo.
theological_decisions:
- issue: מֵטÁfora de קֶרֶן
  english_pob_reading: horn
  chosen_spanish_reading: cuerno
  alternative_spanish_readings:
  - fuerza
  - poder
  - honor
  rationale: Se conserva la metáfora en vez de interpretarla. Así se respeta la imaginería real/pactual del salmo y se deja visible la tensión entre símbolo y sentido, tal como hace la traducción inglesa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Forma masculina plural en בְנֵי יִשְׂרָאֵל
  english_pob_reading: for the sons of Israel
  chosen_spanish_reading: para los hijos de Israel
  alternative_spanish_readings:
  - para los niños de Israel
  - para el pueblo de Israel
  rationale: Se retiene la forma masculina plural por fidelidad morfológica al hebreo. En este contexto funciona como designación étnica/corporativa, no como restricción de género en sentido moderno.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Traducción de יָהּ
  english_pob_reading: Praise Yah!
  chosen_spanish_reading: ¡Alaben a Yah!
  alternative_spanish_readings:
  - ¡Aleluya!
  - ¡Alaben al Señor!
  rationale: El texto usa la forma breve del nombre divino, no el tetragrámaton ni una fórmula litúrgica opaca. «Yah» preserva la forma fuente y el valor invocatorio del cierre doxológico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
translation_notes:
  revision_awareness: 'Se revisó el antecedente inglés con estado de alta concordancia y sin cambios recientes; se mantuvieron las decisiones principales: metáfora de «cuerno», lectura corporativa de «hijos de Israel», y cierre litúrgico con «Yah».'
  spanish_consistency_notes:
  - Se usó «Yah» en lugar de «SEÑOR» o «Aleluya» para reflejar la forma breve יָהּ.
  - «Fieles» evita el término eclesiástico «santos», que no es necesario aquí.
  - 'La puntuación sigue el castellano moderno: coma para la enumeración y exclamación final para el imperativo doxológico.'
