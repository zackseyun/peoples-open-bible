translation:
  language: es
  text: Y también he enviado a Menelao para animarlos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego παρακαλέσοντα también puede traducirse «para alentarlos» o «para apelar a ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: πέπομφα
  english_pob_choice: I have sent
  chosen_spanish: he enviado
  alternatives_spanish:
  - envié
  - he despachado
  lexicon: LSJ
  rationale: El perfecto griego expresa una acción ya cumplida con relevancia presente; en español, el perfecto compuesto «he enviado» conserva bien ese matiz sin sonar forzado.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: LSJ
  rationale: Aquí δὲ funciona como enlace suave de continuidad; «Y» reproduce el flujo sin cargar un contraste que el griego no exige.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: LSJ
  rationale: Marca a Menelao como una persona adicional enviada; «también» es la equivalencia natural y clara en español.
- source_word: τὸν Μενέλαον
  english_pob_choice: Menelaus
  chosen_spanish: Menelao
  lexicon: transliteration
  rationale: Nombre propio trasladado a la forma usual en español bíblico, manteniendo la identificación histórica.
- source_word: παρακαλέσοντα
  english_pob_choice: to encourage you
  chosen_spanish: para alentarlos
  alternatives_spanish:
  - para animarlos
  - para exhortarlos
  - para apelar a ustedes
  lexicon: LSJ
  rationale: El participio futuro con valor de propósito indica la función de Menelao al ser enviado. Dado el audit trail inglés, «alentar» conserva la suavidad relacional de «encourage» y evita un tono más fuerte como «exhortar».
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  lexicon: grammar
  rationale: En español, el objeto directo plural se expresa aquí de forma enclítica con el infinitivo/propósito implícito en «alentarlos». Se mantiene la referencia de segunda persona plural del griego.
translation_notes:
  revision_awareness: El texto griego dice literalmente «he enviado también a Menelao, [a uno] que los alentará». El inglés POB osciló entre «urge» y «encourage»; se siguió la revisión más reciente por su mejor ajuste al contexto y se conservó en español el sentido de propósito con una formulación natural.
  spanish_consistency_notes:
  - Se evita «Señor» o terminología litúrgica ajena porque el versículo no contiene lenguaje divino.
  - «Alentar» se eligió para reflejar la lectura revisada del POB inglés; no se ha suavizado a un simple «acompañar», que perdería la finalidad verbal del participio.
  - El nombre «Menelao» sigue la convención hispana habitual para nombres helenísticos.
