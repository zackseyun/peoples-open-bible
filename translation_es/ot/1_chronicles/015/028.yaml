  text: וְ/כָל יִשְׂרָאֵ֗ל מַעֲלִים֙ אֶת אֲר֣וֹן בְּרִית יְהוָ֔ה בִּ/תְרוּעָה֙ וּ/בְ/ק֣וֹל שׁוֹפָ֔ר וּ/בַ/חֲצֹצְר֖וֹת וּ/בִ/מְצִלְתָּ֑יִם מַשְׁמִעִ֕ים בִּ/נְבָלִ֖ים וְ/כִנֹּרֽוֹת־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/015/028.yaml
  text: And all Israel was bringing up the ark of the covenant of Yahweh with shouting[a], with the sound of a horn, with trumpets, and with cymbals[b], making music with harps and lyres.
  footnotes:
  - marker: a
    text: Or 'with a shout'; the Hebrew term can denote a loud cry of celebration or acclamation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'shofar,' traditionally a horn, distinct from the 'trumpets' mentioned next.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
