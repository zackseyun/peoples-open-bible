translation:
  language: es
  text: en cuya mano están las profundidades[a] de la tierra, y las alturas de los montes[b] son suyas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los lugares profundos de la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «las cumbres de los montes son suyas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: in whose
  chosen_spanish: en cuya
  alternatives_spanish:
  - cuyo
  - en quien
  lexicon: HALOT
  rationale: La relativa hebrea introduce la frase referida a Yahvé del versículo anterior. «En cuya» conserva la relación posesiva y la imagen concreta de dependencia sin volverla abstracta.
- source_word: בְּיָדוֹ
  english_pob_choice: in whose hand
  chosen_spanish: en cuya mano
  alternatives_spanish:
  - en su mano
  - bajo su control
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene con la metáfora corporal de la mano, que comunica posesión y dominio soberano. «Bajo su control» sería demasiado interpretativo.
- source_word: מֶחְקְרֵי
  english_pob_choice: the depths
  chosen_spanish: las profundidades
  alternatives_spanish:
  - los lugares profundos
  - los abismos
  - los lugares recónditos
  lexicon: HALOT
  rationale: El campo semántico apunta a lo profundo o inaccesible. «Profundidades» reproduce bien el contraste poético con las alturas de los montes y evita sobreexplicar la imagen.
- source_word: אָרֶץ
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra/terreno
  - de la tierra habitada
  lexicon: HALOT
  rationale: En este contexto cósmico, «tierra» es natural en español y conserva la amplitud universal del hebreo mejor que una restricción a «territorio» o «país».
- source_word: וְתוֹעֲפוֹת
  english_pob_choice: the heights
  chosen_spanish: las alturas
  alternatives_spanish:
  - las cumbres
  - las elevaciones
  - los picos
  lexicon: HALOT
  rationale: «Alturas» empareja de forma directa con «profundidades» y mantiene la simetría poética. «Cumbres» o «picos» precisarían demasiado la imagen.
- source_word: הָרִים
  english_pob_choice: of the mountains
  chosen_spanish: de los montes
  alternatives_spanish:
  - de las montañas
  lexicon: HALOT
  rationale: «Montes» es una opción válida y sobria en español bíblico para reproducir el sustantivo plural hebreo sin forzar un registro excesivamente técnico.
- source_word: לוֹ
  english_pob_choice: are his
  chosen_spanish: son suyas
  alternatives_spanish:
  - le pertenecen
  - son de él
  lexicon: HALOT
  rationale: La predicación posesiva breve del hebreo se expresa de modo natural con «son suyas». Así se preserva la tersura poética y la idea de pertenencia.
theological_decisions:
- issue: Alcance de la posesión divina en la imagen de creación
  english_pob_reading: A cosmic statement of the LORD's sovereign possession over both the earth's depths and the mountains' heights.
  chosen_spanish_reading: Una afirmación cósmica de la soberanía posesiva de Yahvé sobre las profundidades de la tierra y las alturas de los montes.
  alternative_spanish_readings:
  - Una referencia más local al territorio de Israel y su relieve
  - Una simple descripción poética sin implicación de soberanía
  rationale: El paralelismo entre profundidades y alturas, junto con el marco de alabanza universal del salmo, favorece una lectura cósmica. La traducción mantiene la idea de pertenencia soberana sin diluirla en una mera descripción paisajística.
  doctrine_reference: Salmo 95:3-5; doctrina de la soberanía creadora de Dios
translation_notes:
  revision_awareness: 'El texto inglés auditado conserva dos alternativas léxicas en nota: para מֶחְקְרֵי, «the depths / the deep places of the earth», y para וְתוֹעֲפוֹת הָרִים, «the heights / the peaks of the mountains belong to him». La versión española mantiene esas dos tensiones: «profundidades» con la alternativa «lugares profundos», y «alturas de los montes» con la alternativa «cumbres de los montes». No se introdujeron cambios de sentido respecto del estado revisado del POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino según la política terminológica del proyecto.
  - Se preserva la metáfora de la mano y la posesión con una estructura posesiva natural en español.
  - «Montes» se eligió por sobriedad poética; la nota ofrece «montes»/«cumbres» para reflejar la alternativa inglesa sin perder el paralelismo.
  - La puntuación conserva el paralelismo de dos miembros con una coma antes de la conjunción final.
