translation:
  language: es
  text: Entonces Amalec[a] vino y peleó con Israel en Refidim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «peleó contra Israel». La preposición hebrea dice literalmente «con», pero en contextos de batalla el español puede expresar el sentido adversarial como «contra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יָּבֹ֖א
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y ... vino
  - Luego ... vino
  lexicon: HALOT
  rationale: La secuencia narrativa del waw consecutivo se expresa naturalmente en español con «Entonces»; «vino» conserva el sentido simple de בוא sin sobrecargar el texto.
- source_word: עֲמָלֵ֑ק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pueblo/ancestro en forma española bíblica usual «Amalec», inteligible y reconocible para lectura eclesial en español.
- source_word: וַ/יִּלָּ֥חֶם
  english_pob_choice: fought
  chosen_spanish: peleó
  alternatives_spanish:
  - luchó
  - hizo guerra
  lexicon: HALOT
  rationale: El verbo expresa acción bélica directa; «peleó» comunica con naturalidad el combate sin introducir una solemnidad innecesaria ni un giro demasiado técnico.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: Se mantiene el valor preposicional básico «con», como en el hebreo. En español, la relación adversarial queda implícita por el verbo «peleó», evitando sobrerinterpretar con «contra» en el texto principal.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre del pueblo del pacto conservado en transliteración estándar.
- source_word: בִּ/רְפִידִֽם
  english_pob_choice: at Rephidim
  chosen_spanish: en Refidim
  alternatives_spanish:
  - en Rephidim
  - en Refidim
  lexicon: HALOT
  rationale: La preposición locativa ב se vierte naturalmente como «en» para un topónimo de lugar de combate/campamento; «Refidim» es la forma española usual y clara.
theological_decisions:
- issue: Relación entre «con» y el sentido adversarial del combate
  english_pob_reading: The Hebrew preposition is literally 'with,' but in battle contexts English may express the adversarial sense as 'against.'
  chosen_spanish_reading: «peleó con Israel» conserva la preposición literal y deja el carácter hostil al verbo y al contexto.
  alternative_spanish_readings:
  - «peleó contra Israel»
  - «hizo guerra contra Israel»
  rationale: 'No se borra la tensión lexical del hebreo: la preposición es realmente עִם (''con''). En español, «peleó con» puede sonar adversarial y permite preservar mejor el dato fuente sin imponer una reinterpretación más fuerte que la necesaria.'
  doctrine_reference: Lexical fidelity to Hebrew preposition; narrative context of battle.
translation_notes:
  revision_awareness: El texto y las decisiones siguen el pasaje hebreo breve y el audit trail inglés con acuerdo alto; no se aplicaron revisiones posteriores, y no hay cambios pendientes en la formulación base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Amalec» como nombre propio bíblico estándar en español.
  - Se conserva «Refidim» como topónimo transliterado, con preposición locativa española natural.
  - La nota al pie preserva la alternativa semántica de la preposición hebrea sin duplicar el sentido principal del texto.
