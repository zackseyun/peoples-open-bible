    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo introductorio a «les ordenó» por mayor cercanía al hebreo y mejor naturalidad; se cambia «corazón íntegro» por «corazón entero» para reflejar mejor לֵבָב שָׁלֵם y el audit trail inglés («with a whole heart»); y se reubican las notas para que cada una ancle exactamente la expresión que explica. La nota [a] se coloca al final de la cita porque su alternativa afecta a «Así actuarán».
