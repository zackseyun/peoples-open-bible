translation:
  language: es
  text: 'Para el maestro de coro. De David. En Yahvé me refugio; ¿cómo pueden decirle[a] a mi alma: «Huye a tu monte, pájaro[b]»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «¿cómo pueden decir a mi alma...?».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es difícil; también puede entenderse: «Huye como un pájaro a tu monte».'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de coro
  alternatives_spanish:
  - Para el director musical
  - Al músico principal
  lexicon: מנצח
  rationale: El hebreo designa al responsable musical/litúrgico del salmo. «Maestro de coro» mantiene la función sin cargar la frase con un registro demasiado arcaico.
- source_word: בַּיהוָה
  english_pob_choice: In Yahweh
  chosen_spanish: En Yahvé
  alternatives_spanish:
  - En el Señor
  lexicon: יהוה
  rationale: Se conserva el nombre divino según la norma del proyecto. No se usa el sustituto «Señor» porque el texto fuente nombra explícitamente a יהוה.
- source_word: חָסִיתִי
  english_pob_choice: I take refuge
  chosen_spanish: me refugio
  alternatives_spanish:
  - me he refugiado
  - busco refugio
  lexicon: חסה
  rationale: El verbo expresa refugiarse/protegerse en Dios. «Me refugio» mantiene el valor presente y confesional del hebreo y de la versión inglesa revisada.
- source_word: לְנַפְשִׁי
  english_pob_choice: to my soul
  chosen_spanish: a mi alma
  alternatives_spanish:
  - a mi vida
  - a mí
  lexicon: נפש
  rationale: La revisión inglesa corrigió «to me» a «to my soul» para reflejar mejor נֶפֶשׁ. En español, «alma» comunica la referencia personal interior sin perder la fuerza antropológica del término.
- source_word: נודו
  english_pob_choice: Flee
  chosen_spanish: Huye
  alternatives_spanish:
  - Escapa
  - Vuela lejos
  lexicon: נוד
  rationale: El verbo transmite el imperativo de huida o desplazamiento urgente. «Huye» es la opción más directa y natural en español.
- source_word: הַרְכֶם צִפּוֹר
  english_pob_choice: to your mountain, bird / Flee like a bird to your mountain
  chosen_spanish: a tu monte, pájaro
  alternatives_spanish:
  - como un pájaro a tu monte
  - a tu monte como pájaro
  lexicon: texto difícil / sintaxis poética
  rationale: Se conserva la dureza sintáctica del hebreo, que el audit trail reconoce como difícil. La puntuación en español deja abierta la posibilidad de leer la imagen como una vocativa o como una comparación implícita, sin resolver artificialmente la ambigüedad.
theological_decisions:
- issue: Uso del nombre divino יהוה
  english_pob_reading: In Yahweh I take refuge
  chosen_spanish_reading: En Yahvé me refugio
  alternative_spanish_readings:
  - En el Señor me refugio
  rationale: El proyecto pide transliterar יהוה como «Yahvé» en el texto principal. Esto preserva la identidad del nombre del pacto y evita el ocultamiento devocional por un título genérico.
  doctrine_reference: Éxodo 3:15; Salmo 83:18
- issue: Relación entre «alma» y el pronombre personal
  english_pob_reading: how can you say to my soul
  chosen_spanish_reading: ¿cómo pueden decirle a mi alma
  alternative_spanish_readings:
  - ¿cómo pueden decirme
  - ¿cómo pueden decir a mi alma
  rationale: La revisión inglesa prioriza el destinatario interno del discurso. En español, el dativo «le» con «a mi alma» conserva esa dirección sin reducir el hebreo a una simple segunda persona indirecta.
  doctrine_reference: Salmo 42:5; 103:1
- issue: Imagen final de la huida
  english_pob_reading: Flee like a bird to your mountain
  chosen_spanish_reading: Huye a tu monte, pájaro
  alternative_spanish_readings:
  - Huye como un pájaro a tu monte
  - Huye, pájaro, a tu monte
  rationale: El hebreo es sintácticamente áspero y el audit trail señala la dificultad. Se prefiere no suavizar demasiado la imagen para no borrar la tensión textual; la forma resultante mantiene la extrañeza poética documentada.
  doctrine_reference: Salmo 11:1
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del inglés POB, que completó el arranque de la cláusula principal («En Yahweh me refugio»), restauró el destinatario como «a mi alma» y mantuvo la lectura difícil del remate poético. Se conservó esa tensión en español en vez de normalizarla con una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה en el texto principal.
  - Se eligió «alma» para נֶפֶשׁ conforme a la revisión inglesa y al valor antropológico del hebreo.
  - Se mantuvo un registro reverente pero no arcaizante, evitando fórmulas eclesiásticas no exigidas por el texto.
  - La puntuación reproduce la ambigüedad del final en lugar de resolverla artificialmente.
