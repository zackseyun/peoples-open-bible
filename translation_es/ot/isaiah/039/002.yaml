translation:
  language: es
  text: 'Y Ezequías se alegró[a] por causa de ellos, y les mostró su casa del tesoro[b]: la plata, el oro, las especias, el aceite fino, todo su arsenal[c], y todo lo que se hallaba en sus almacenes[d]. No hubo cosa que Ezequías no les mostrara en su casa y en todo su dominio[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se regocijó sobre ellos’ o ‘se complació en ellos’. El giro hebreo puede entenderse como alegría a causa de los enviados o regalos, o como alegría dirigida hacia ellos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘casa de sus cosas preciosas’; tradicionalmente se entiende como su tesorería o casa del tesoro.
    reason: lexical_alternative
  - marker: c
    text: O ‘toda la casa de sus utensilios’ o ‘todo el lugar de su equipo’; muchos entienden esto como ‘todo su arsenal’ por el contexto y el paralelo en 2 Reyes 20:13.
    reason: alternative_reading
  - marker: d
    text: O ‘sus tesoros’ o ‘sus depósitos’.
    reason: lexical_alternative
  - marker: e
    text: O ‘reino’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמַח עֲלֵיהֶם
  english_pob_choice: was glad because of them
  chosen_spanish: se alegró por causa de ellos
  alternatives_spanish:
  - se regocijó por ellos
  - se complació en ellos
  lexicon: HALOT
  rationale: La construcción hebrea con שׂמח + עַל admite el matiz de alegrarse a causa de alguien o de alegrarse sobre alguien. 'Por causa de ellos' conserva el valor causal del pasaje y evita forzar una relación emocional más fuerte de la que exige el hebreo.
- source_word: וַיַּרְאֵם
  english_pob_choice: he showed them
  chosen_spanish: les mostró
  alternatives_spanish:
  - les dejó ver
  - les exhibió
  lexicon: HALOT
  rationale: El hifil de ראה significa 'hacer ver'. 'Les mostró' es la equivalencia natural en español para una acción de presentar o exhibir los tesoros reales.
- source_word: בֵּית נכתה
  english_pob_choice: his treasure house
  chosen_spanish: su casa del tesoro
  alternatives_spanish:
  - su tesorería
  - la casa de sus cosas preciosas
  lexicon: HALOT
  rationale: La forma hebrea apunta a una 'casa' asociada con bienes preciosos. 'Casa del tesoro' conserva el componente de בית y refleja bien la función del lugar en el contexto de la lista de riquezas.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata fina
  - el dinero
  lexicon: HALOT
  rationale: En un inventario regio, el sentido primario es el metal precioso. 'La plata' evita trasladar el término al campo de 'dinero', que sería más interpretativo.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - el oro fino
  lexicon: HALOT
  rationale: Corresponde al metal precioso mencionado en la serie de bienes de valor.
- source_word: הַבְּשָׂמִים
  english_pob_choice: the spices
  chosen_spanish: las especias
  alternatives_spanish:
  - los aromas
  - los perfumes
  lexicon: HALOT
  rationale: El término puede abarcar sustancias aromáticas en general. 'Especias' es una opción clara y sobria en español para este inventario de objetos valiosos.
- source_word: הַשֶּׁמֶן הַטּוֹב
  english_pob_choice: the fine oil
  chosen_spanish: el aceite fino
  alternatives_spanish:
  - el aceite precioso
  - el buen aceite
  lexicon: HALOT
  rationale: Aunque literalmente puede entenderse como 'aceite bueno', 'fino' comunica mejor en español la idea de aceite de alta calidad o de valor, coherente con el contexto de tesoros.
- source_word: כָּל בֵּית כֵּלָיו
  english_pob_choice: all his armory
  chosen_spanish: toda la casa de sus utensilios
  alternatives_spanish:
  - todo su arsenal
  - toda su casa de armas
  - todo el lugar de sus utensilios
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'la casa de sus utensilios' o en sentido amplio de sus enseres/equipamiento. Mantengo la forma más pegada al hebreo, porque 'armory' presupone una lectura específica que no está explícita en el sustantivo; además, 'utensilios' conserva la amplitud de objetos/implementos.
- source_word: כָּל אֲשֶׁר נִמְצָא בְּאֹצְרֹתָיו
  english_pob_choice: all that was found in his storehouses
  chosen_spanish: todo lo que se hallaba en sus almacenes
  alternatives_spanish:
  - todo lo que se hallaba en sus tesoros
  - todo lo que había en sus treasuries
  lexicon: HALOT
  rationale: אֹצָר puede referirse a tesoro o depósito. Aquí 'almacenes' transmite la idea de lugares de depósito de bienes sin repetir 'casa del tesoro' y sin perder el valor de repositorios reales.
- source_word: לֹא הָיָה דָבָר אֲשֶׁר לֹא הֶרְאָם
  english_pob_choice: There was nothing ... that Hezekiah did not show them
  chosen_spanish: No hubo cosa que Ezequías no les mostrara
  alternatives_spanish:
  - Nada hubo que Ezequías no les mostrara
  - No había cosa que Ezequías no les mostrara
  lexicon: HALOT
  rationale: La doble negación hebrea se reproduce de manera natural como una afirmación enfática de totalidad. 'No hubo cosa...' conserva el énfasis sin sonar excesivamente arcaico.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su palacio
  - en su residencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'en su casa'. Aunque en contexto real puede implicar palacio, 'casa' mantiene la correspondencia fuente-texto y sigue siendo comprensible.
- source_word: וּבְכָל מֶמְשַׁלְתּוֹ
  english_pob_choice: or in all his dominion
  chosen_spanish: y en todo su dominio
  alternatives_spanish:
  - y en todo su reino
  - y en toda su soberanía
  lexicon: HALOT
  rationale: מֶמְשָׁלָה abarca dominio, gobierno o esfera de autoridad. 'Dominio' preserva ese alcance amplio mejor que limitarlo a 'reino'.
translation_notes:
  revision_awareness: 'Se mantuvo la línea del audit trail inglés, pero con ajustes para el español: se optó por una frase más directa que conserva el contraste entre el inventario material y la totalidad de lo mostrado. No se asumió ''armory'' donde el hebreo base dice literalmente ''casa de sus utensilios''; por eso se preservó una formulación más cercana al original.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo tiene el nombre divino; este versículo no lo contiene.
  - Se mantuvo la distinción entre 'casa del tesoro' y 'almacenes' para evitar repetir el mismo término en dos expresiones hebreas distintas.
  - '''Dominio'' se eligió como equivalente amplio de מֶמְשָׁלָה, sin reducirlo automáticamente a ''reino''.'
  - La puntuación con dos puntos introduce la enumeración de bienes de manera natural en español.
