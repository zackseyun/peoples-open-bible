translation:
  language: es
  text: Escuchen y presten atención; no se vuelvan altivos[a], porque Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ensoberbezcan» o «se exalten». El verbo hebreo puede denotar estar «alto» en el sentido de arrogancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Atiendan
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide una apelación directa al oído y a la obediencia. «Escuchen» es natural en español actual y mantiene el valor de una primera orden distinta.
- source_word: וְהַאֲזִינוּ
  english_pob_choice: and listen
  chosen_spanish: y presten atención
  alternatives_spanish:
  - y escuchen
  - y den oído
  lexicon: HALOT
  rationale: La forma hifil de אזן intensifica la idea de oír con atención. «Presten atención» reproduce bien esa intensificación sin perder naturalidad en español.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no deben
  - no vayan a
  lexicon: HALOT
  rationale: La partícula prohibitiva con el imperfecto/jusivo se expresa de forma directa en español con «no».
- source_word: תִּגְבָּהוּ
  english_pob_choice: be proud
  chosen_spanish: sean orgullosos
  alternatives_spanish:
  - sean altivos
  - se ensoberbezcan
  - se exalten
  lexicon: HALOT
  rationale: El verbo de ‘ser alto’ funciona aquí en sentido moral de arrogancia. «Sean orgullosos» comunica la idea principal en español moderno; se conserva la tensión semántica con la nota alternativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado por el Tetragrámaton. «Yahvé» es el término preferido del proyecto en el texto principal, preservando el nombre personal en lugar de sustituirlo por un título.
- source_word: דִּבֵּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - ha dicho
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una palabra divina ya pronunciada con vigencia actual. «Ha hablado» conserva ese valor completivo y su tono profético.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La base hebrea contiene directamente el Tetragrámaton. Siguiendo la política del proyecto, se vierte como «Yahvé» para preservar el nombre pactal de Dios y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza moral de תִּגְבָּהוּ
  english_pob_reading: be proud
  chosen_spanish_reading: sean orgullosos
  alternative_spanish_readings:
  - sean altivos
  - se ensoberbezcan
  - se exalten
  rationale: El hebreo puede abarcar tanto ‘estar alto’ como la arrogancia. En español, «orgullosos» comunica con claridad la prohibición sin borrar la tensión semántica, que queda visible en la nota.
  doctrine_reference: 'DOCTRINE.md: Lexical caution — height/highness imagery used morally'
translation_notes:
  revision_awareness: 'El registro inglés POB muestra acuerdo alto y sin revisiones aplicadas; la versión española sigue de cerca las decisiones auditadas: dos imperativos diferenciados, prohibición directa, nombre divino como Yahvé y perfecto verbal con valor actual.'
  spanish_consistency_notes:
  - Se conservó la duplicación retórica «Escuchen y presten atención» para reflejar los dos imperativos hebreos.
  - Se evitó «SEÑOR» para יְהוָה conforme a la norma del proyecto; se usó «Yahvé» en el texto principal.
  - Se eligió un registro sobrio y publicable, sin arcaísmos innecesarios, pero sin suavizar la advertencia profética.
