translation:
  language: es
  text: Así que guarden las palabras de este pacto y pónganlas por obra, para que actúen con sabiduría[a] en todo lo que hagan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tengan éxito» en todo lo que hagan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - conserven
  - mantengan
  lexicon: HALOT
  rationale: En contexto de pacto, שׁמר expresa guardar u observar obligaciones pactales. En español, «guarden» conserva esa fuerza de cumplimiento y resulta natural en un registro bíblico contemporáneo.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los términos de
  - los mandatos de
  - las estipulaciones de
  lexicon: HALOT
  rationale: דברים remite aquí a las cláusulas o expresiones del pacto. «Las palabras de» sigue de cerca la forma hebrea y preserva la referencia verbal sin volverla demasiado interpretativa.
- source_word: הַבְּרִית הַזֹּאת
  english_pob_choice: this covenant
  chosen_spanish: este pacto
  alternatives_spanish:
  - este convenio
  - este pacto de alianza
  lexicon: HALOT
  rationale: «Pacto» es el equivalente natural de ברית en español bíblico actual. «Este» conserva la deixis inmediata del hebreo.
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: do them
  chosen_spanish: pónganlas por obra
  alternatives_spanish:
  - háganlas
  - cumplan con ellas
  - practíquenlas
  lexicon: HALOT
  rationale: El pronombre plural se refiere a «las palabras», no a una idea abstracta. «Pónganlas por obra» expresa el sentido de realizar concretamente esas palabras y evita una literalidad torpe en español, manteniendo la correspondencia plural.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Introduce finalidad. «Para que» es la manera más natural y exacta de expresar la relación de propósito en español.
- source_word: תַּשְׂכִּילוּ
  english_pob_choice: you may act wisely
  chosen_spanish: actúen con sabiduría
  alternatives_spanish:
  - procedan sabiamente
  - tengan éxito
  - se conduzcan con prudencia
  lexicon: HALOT
  rationale: El verbo שׂכל en hifil puede expresar actuar con prudencia/sabiduría y, según contexto, también éxito. Dado el ajuste revisado del POB inglés hacia «act wisely», aquí se prioriza la dimensión sapiencial sin borrar que el término puede implicar buen resultado.
- source_word: אֵת כָּל אֲשֶׁר תַּעֲשׂוּן
  english_pob_choice: in all that you do
  chosen_spanish: en todo lo que hagan
  alternatives_spanish:
  - en cuanto hagan
  - en todo cuanto emprendan
  - en todo lo que emprendan
  lexicon: HALOT
  rationale: La construcción amplia el alcance de la promesa. «En todo lo que hagan» es idiomática y conserva la comprehensividad de כָּל אֲשֶׁר.
- source_word: וְ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Por tanto
  - Entonces
  lexicon: HALOT
  rationale: El enlace discursivo tiene fuerza inferencial por el contexto. «Así que» comunica esa relación con naturalidad en español.
theological_decisions:
- issue: 'Sentido de תַּשְׂכִּילוּ: sabiduría frente a prosperidad'
  english_pob_reading: The English audit trail revised the verse from 'prosper' to 'act wisely' to stay closer to the Hebrew and avoid importing a result not explicit in the text.
  chosen_spanish_reading: «Actúen con sabiduría» / «con sabiduría»
  alternative_spanish_readings:
  - «tengan éxito»
  - «prosperen»
  rationale: El hebreo permite una gama entre actuar sabiamente y obtener éxito. Siguiendo la revisión más reciente del POB inglés, la redacción española privilegia la lectura sapiencial para no adelantarse a una prosperidad no explicitada, aunque se reconoce la alternativa resultativa.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather than resolve it
- issue: Naturaleza de la obediencia en el verbo final
  english_pob_reading: Keep... and do them
  chosen_spanish_reading: «guarden... y pónganlas por obra»
  alternative_spanish_readings:
  - «guarden... y háganlas»
  - «guarden... y practíquenlas»
  rationale: El hebreo une la custodia del pacto con su ejecución concreta. La formulación española mantiene esa doble exigencia sin separar indebidamente obediencia y práctica.
  doctrine_reference: Covenant obedience motif in Deuteronomy
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que sustituyó «prosper» por una formulación de sabiduría para representar mejor תַּשְׂכִּילוּ. Por eso el español evita una versión resultativa explícita y conserva la opción sapiencial, con nota de alternativa semántica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a YHWH explícito; este versículo no lo contiene.
  - «Pacto» se mantiene para ברית, en coherencia con la terminología POB.
  - Se conserva el plural en «las palabras» y en el pronombre implícito de «pónganlas» para reflejar el antecedente plural hebreo.
  - El registro es bíblico contemporáneo y evita arcaísmos innecesarios sin perder solemnidad.
