translation:
  language: es
  text: Toma las muelas del molino y muele harina; descubre tu velo[a], quítate la falda[b], descubre la pierna[c], cruza los ríos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «tu cabellera» o «tu cabello».
    reason: lexical_alternative
  - marker: b
    text: O «tu saya» o «tu borde inferior de la ropa».
    reason: lexical_alternative
  - marker: c
    text: O «el muslo».
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחִי
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recoge
  - Toma en tus manos
  lexicon: HALOT
  rationale: El imperativo femenino singular de לקח pide una orden directa y natural en español. «Toma» conserva la inmediatez del mandato sin añadir matices ajenos.
- source_word: רֵחַיִם
  english_pob_choice: the millstones
  chosen_spanish: las muelas del molino
  alternatives_spanish:
  - la piedra de moler
  - el molino
  lexicon: HALOT
  rationale: El término designa el aparato de moler, concretamente las piedras/muelas. «Muelas del molino» mantiene la imagen concreta y resulta claro en español moderno.
- source_word: וְטַחֲנִי קָמַח
  english_pob_choice: and grind flour
  chosen_spanish: y muele harina
  alternatives_spanish:
  - y muele grano
  - y haz harina
  lexicon: HALOT
  rationale: טחן es «moler» y קמח es «harina». La combinación conserva la labor servil humillante del texto sin suavizarla.
- source_word: גַּלִּי
  english_pob_choice: uncover
  chosen_spanish: descubre
  alternatives_spanish:
  - destapa
  - desnuda
  lexicon: HALOT
  rationale: El imperativo intensifica la idea de quitar una cobertura visible. «Descubre» reproduce bien la repetición verbal del hebreo y es idiomático en español.
- source_word: צַמָּתֵךְ
  english_pob_choice: your veil
  chosen_spanish: tu velo
  alternatives_spanish:
  - tu cabellera
  - tu cabello
  lexicon: HALOT
  rationale: En este contexto, el término puede referirse al adorno o cobertura de la cabeza. «Velo» es la opción más natural y fiel al encadenamiento de exposición pública; se preserva la alternativa capilar en nota.
- source_word: חֶשְׂפִּי
  english_pob_choice: strip off
  chosen_spanish: quítate
  alternatives_spanish:
  - despréndete de
  - arráncate
  lexicon: HALOT
  rationale: El verbo implica despojar o desnudar. En español, «quítate» con el objeto explícito («la falda») comunica la acción de manera clara y sin exagerar el matiz.
- source_word: שֹׁבֶל
  english_pob_choice: your skirt
  chosen_spanish: la falda
  alternatives_spanish:
  - el borde
  - la saya
  lexicon: HALOT
  rationale: El término se refiere al bajo vestido o a la prenda inferior/cola. Tras la revisión del POB inglés hacia «skirt», «falda» refleja mejor el valor léxico que «cola» o «train».
- source_word: שׁוֹק
  english_pob_choice: the leg
  chosen_spanish: la pierna
  alternatives_spanish:
  - el muslo
  - la pantorrilla
  lexicon: HALOT
  rationale: La palabra puede señalar la pierna en sentido amplio; en el contexto de atravesar aguas, «pierna» es la opción más clara y no introduce una precisión anatómica innecesaria.
- source_word: עִבְרִי
  english_pob_choice: cross over
  chosen_spanish: cruza
  alternatives_spanish:
  - atraviesa
  - pasa
  lexicon: HALOT
  rationale: El imperativo de עבר se expresa con naturalidad como «cruza». Mantiene la idea de pasar al otro lado o atravesar.
- source_word: נְהָרֽוֹת
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - las corrientes
  - los arroyos
  lexicon: HALOT
  rationale: El plural normal es «ríos». Esta opción conserva el alcance del plural y la imagen de atravesar aguas en un escenario de humillación/exilio.
theological_decisions:
- issue: Grado de exposición y humillación
  english_pob_reading: The verse is rendered as a sequence of commands depicting Babylon's enforced humiliation and loss of royal dignity, without making the exposure more explicitly sexual than the Hebrew requires.
  chosen_spanish_reading: La versión presenta una secuencia de mandatos que describe la humillación forzada de Babilonia y la pérdida de su dignidad real, sin volver la exposición más sexual de lo que exige el hebreo.
  alternative_spanish_readings:
  - Una lectura más abiertamente sexualizada de la exposición
  - Una versión que atenúe demasiado la vergüenza y el despojo
  rationale: El hebreo contiene una progresión de despojo y exposición pública. La traducción debe preservar esa tensión sin intensificarla ni suavizarla indebidamente.
  doctrine_reference: 'Principio de traducción: no paraprasear más allá de lo que el texto fuente permite y conservar la tensión del texto.'
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión menor en la que «train» fue reemplazado por «skirt» por mayor precisión léxica. En español, ese ajuste se refleja con «falda», evitando una imagen demasiado técnica o demasiado occidentalizada de una prenda específica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - 'Se preserva la secuencia imperativa y el paralelismo de exposición: descubrir/quitar/descubrir/cruzar.'
  - «Los ríos» conserva el plural hebreo sin convertirlo en singular genérico.
  - La nota sobre צַמָּתֵךְ deja abierta la alternativa capilar sin resolverla artificialmente.
