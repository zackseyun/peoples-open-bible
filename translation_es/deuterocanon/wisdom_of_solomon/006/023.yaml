translation:
  language: es
  text: Ni siquiera me asociaré con la envidia que se consume[a], porque ésta no tendrá parte en la sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ni siquiera andaré en compañía de la envidia consumida»; también, la última cláusula puede entenderse como «porque el envidioso no tendrá parte en la sabiduría» o «porque la envidia misma no tendrá parte en la sabiduría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε μὴν
  english_pob_choice: Nor indeed
  chosen_spanish: Ni siquiera
  alternatives_spanish:
  - Ni ciertamente
  - Ni tampoco
  lexicon: LSJ
  rationale: La combinación negativa añade énfasis y continuidad con la frase anterior; «Ni siquiera» comunica bien esa fuerza sin sonar rígido en español.
- source_word: φθόνῳ
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - malicia envidiosa
  lexicon: LSJ
  rationale: En este contexto sapiencial, «envidia» es el término moral más natural y fiel al vicio denotado por φθόνος.
- source_word: τετηκότι
  english_pob_choice: that wastes away
  chosen_spanish: que se consume
  alternatives_spanish:
  - que se derrite
  - consumida
  - que se va desgastando
  lexicon: LSJ
  rationale: El participio perfecto de τήκω sugiere algo desgastado o consumido; «que se consume» conserva la imagen de deterioro corrosivo en español.
- source_word: συνοδεύσω
  english_pob_choice: I accompany
  chosen_spanish: me acompañaré de
  alternatives_spanish:
  - viajaré con
  - haré compañía a
  - acompañaré
  lexicon: LSJ
  rationale: El verbo implica ir en compañía o asociarse; en español, la construcción reflexiva «me acompañaré de» expresa esa asociación de forma idiomática y cercana al valor relacional del verbo.
- source_word: οὗτος
  english_pob_choice: it
  chosen_spanish: ésta
  alternatives_spanish:
  - éste
  - esa envidia
  - este envidioso
  lexicon: LSJ
  rationale: Dado que la revisión inglesa decidió tomar el referente como la envidia misma, el demostrativo femenino concuerda con «envidia» y mantiene la referencia al vicio personificado.
- source_word: οὐ κοινωνήσει
  english_pob_choice: will have no share in
  chosen_spanish: no tendrá parte en
  alternatives_spanish:
  - no participará en
  - no compartirá
  lexicon: LSJ
  rationale: «Tener parte en» reproduce bien la idea de participación/exclusión de κοινωνέω y suena natural en español bíblico contemporáneo.
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: LSJ
  rationale: Se conserva el término clave de la literatura sapiencial con artículo definido por claridad discursiva en español.
theological_decisions:
- issue: Referente de οὗτος / valor personificador del vicio
  english_pob_reading: The English audit trail allows either the envious person or envy itself; the latest revision prefers envy as the referent.
  chosen_spanish_reading: El español sigue la revisión más reciente y toma el demostrativo como referencia a la envidia personificada («ésta»), sin negar que la frase también puede implicar al envidioso.
  alternative_spanish_readings:
  - éste
  - este envidioso
  - este hombre
  rationale: La concordancia gramatical con «envidia» permite conservar la resolución editorial más reciente del POB y, a la vez, mantener el matiz personificador sin forzar una antropología explícita que el griego no exige.
  doctrine_reference: Preservar la ambigüedad controlada del referente sin suprimir la tensión semántica documentada.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al tratar τετηκότι como una cualidad del vicio («que se consume») y οὗτος como referencia a la envidia misma, reflejada en el demostrativo femenino español. Se evita traducir mecánicamente desde el inglés cuando el griego permite una lectura más natural y concordante en español.
  spanish_consistency_notes:
  - Se usa «sabiduría» consistentemente para σοφίᾳ.
  - Se usa «envidia» para φθόνῳ, siguiendo el registro moral sapiencial.
  - Se mantiene una construcción negativa enfática con «Ni siquiera» para οὔτε μὴν.
  - No se emplea «SEÑOR» ni terminología teológica no presente en el versículo.
