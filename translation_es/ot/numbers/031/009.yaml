translation:
  language: es
  text: Los hijos de Israel tomaron cautivas a las mujeres de Madián y tomaron cautivos a sus pequeños[b][a], y saquearon todo su ganado, todos sus rebaños y todas sus riquezas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
  - marker: b
    text: O «sus hijos».
    reason: lexical_alternative
  - marker: c
    text: O «todos sus bienes» para «todas sus riquezas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: took captive
  chosen_spanish: tomaron cautivas
  alternatives_spanish:
  - capturaron
  - llevaron cautivos
  lexicon: HALOT
  rationale: שׁבה en qal expresa tomar personas como cautivos. En español, «tomaron cautivas» conserva el matiz de cautiverio humano y suena natural sin debilitar el sentido bélico.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: The sons of Israel
  chosen_spanish: Los hijos de Israel
  alternatives_spanish:
  - Los israelitas
  - Los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma idiomática de filiación del hebreo. «Los hijos de Israel» es transparente y conserva mejor la forma de la expresión fuente que «israelitas».
- source_word: נְשֵׁי מִדְיָן
  english_pob_choice: the women of Midian
  chosen_spanish: las mujeres de Madián
  alternatives_spanish:
  - las mujeres midianitas
  - las esposas de Madián
  lexicon: HALOT
  rationale: נָשִׁים aquí designa mujeres en sentido general, no necesariamente esposas. «De Madián» sigue de cerca la construcción en genitivo.
- source_word: טַפָּם
  english_pob_choice: their little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños
  - sus hijos pequeños
  lexicon: HALOT
  rationale: טַף suele referirse a los niños pequeños o la descendencia joven. «Sus pequeños» conserva el matiz de edad y evita ampliar indebidamente a «hijos» en sentido más general.
- source_word: בְּהֶמְתָּם
  english_pob_choice: their livestock
  chosen_spanish: todo su ganado
  alternatives_spanish:
  - todos sus animales
  - todo su bestiame
  lexicon: HALOT
  rationale: בְּהֵמָה en uso colectivo remite a animales domésticos o de cría. «Ganado» es idiomático en español y funciona bien junto con «rebaños» para diferenciar la lista.
- source_word: מִקְנֵהֶם
  english_pob_choice: their herds
  chosen_spanish: todos sus rebaños
  alternatives_spanish:
  - todo su hato
  - todos sus hatos
  lexicon: HALOT
  rationale: מִקְנֶה suele designar el ganado poseído como rebaños/manadas. «Rebaños» mantiene el sentido pastoril y distingue este término del anterior.
- source_word: חֵילָם
  english_pob_choice: their wealth
  chosen_spanish: sus riquezas
  alternatives_spanish:
  - sus bienes
  - sus posesiones
  lexicon: HALOT
  rationale: חַיִל puede denotar riqueza, recursos o bienes materiales. En este contexto, tras personas y animales, «riquezas» resume adecuadamente el resto de los bienes de Madián.
- source_word: בָּזָזוּ
  english_pob_choice: they plundered
  chosen_spanish: saquearon
  alternatives_spanish:
  - tomaron como botín
  - despojaron
  lexicon: HALOT
  rationale: בזז expresa tomar botín tras la victoria. «Saquearon» preserva el sentido militar y de despojo mejor que un término más genérico.
theological_decisions:
- issue: Tratamiento de «hijos de Israel» como expresión étnico-covenantal
  english_pob_reading: The sons of Israel
  chosen_spanish_reading: Los hijos de Israel
  alternative_spanish_readings:
  - Los israelitas
  - Los hijos de Israel
  rationale: No hay un problema doctrinal, pero se conserva la forma del hebreo con un plural masculino explícito, en línea con la fidelidad formal y la transparencia al texto fuente.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó la repetición del sujeto antes de «plundered» por naturalidad, sin cambiar el contenido. La redacción española sigue esa misma economía sintáctica: una sola coordinación verbal después del primer sujeto, sin añadir repeticiones innecesarias ni omitir elementos del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Madián» como forma española estable del topónimo.
  - 'Se prefieren equivalentes concretos y auditables: «ganado», «rebaños», «riquezas»; no se neutraliza la lista en un solo término genérico.'
  - «Tomaron cautivas» preserva el objeto humano del verbo y evita confundirlo con el saqueo de bienes.
  - Las notas alternativas reflejan ambigüedades léxicas reales del hebreo sin sobreexplicar el texto principal.
