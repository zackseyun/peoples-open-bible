review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en gran medida el sentido del hebreo: Aarón realiza expiación sobre los cuernos del altar una vez al año, con la sangre de la ofrenda por el pecado, y el altar es clasificado como sumamente santo para Yahvé. También acierta al usar ''Yahvé'' conforme al estándar español del proyecto y al mantener el lenguaje cultual de כפר como ''expiación''. Sin embargo, hay dos desajustes relevantes: el nombre propio ''Aaron'' debe normalizarse a ''Aarón'' en español, y ''por vuestras generaciones'' suena poco natural y algo calcado frente al sentido idiomático de לְדֹרֹתֵיכֶם.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero mezcla registro no óptimo para el proyecto: ''Aaron'' sin tilde es impropio en español bíblico, y ''vuestras'' introduce un matiz peninsular menos neutral para un objetivo latinoamericano amplio. Además, ''por sus generaciones'' o ''a lo largo de sus generaciones'' sería más natural que ''por vuestras generaciones''. ''Santísimo es para Yahvé'' es comprensible, pero ''Es santísimo para Yahvé'' fluye mejor en español actual.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto en los puntos principales: יהוה -> ''Yahvé''; כפר -> ''hará expiación''; חטאת -> ''ofrenda por el pecado''. No hay conflicto doctrinal serio. La principal mejora es idiomática y de normalización onomástica, no terminológica.'
  issues:
  - severity: medium
    issue: Nombre propio sin adaptación española
    rationale: El texto dice 'Aaron' en vez de 'Aarón'. En una Biblia española esto debe corregirse por ortografía y legibilidad estándar.
  - severity: medium
    issue: '''por vuestras generaciones'' es poco natural y no corresponde al español meta neutral'
    rationale: Aunque refleja de cerca la estructura hebrea, suena calcado y además usa 'vuestras', menos neutro para el español latinoamericano amplio. 'A lo largo de sus generaciones' o 'por todas sus generaciones' comunica mejor לְדֹרֹתֵיכֶם.
  - severity: low
    issue: Orden sintáctico final algo rígido
    rationale: '''Santísimo es para Yahvé'' es entendible, pero ''Es santísimo para Yahvé'' suena más natural en español moderno sin pérdida semántica.'
  revised_spanish_text: Aarón hará expiación sobre sus cuernos una vez al año[a]. Con la sangre de la ofrenda por el pecado de la expiación hará expiación por él una vez al año, a lo largo de sus generaciones. Es santísimo para Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: “con la sangre de la ofrenda por el pecado de la expiación”. El hebreo dice literalmente “de la sangre de la ofrenda por el pecado de las expiaciones”.'
    reason: lexical_alternative
  revision_rationale: Se corrige 'Aaron' a 'Aarón', se reemplaza 'por vuestras generaciones' por 'a lo largo de sus generaciones' para un español más natural y neutral sin perder el sentido de continuidad generacional, y se suaviza el orden final a 'Es santísimo para Yahvé'. Se conserva la nota léxica existente porque sigue siendo pertinente para el valor literal de la construcción hebrea.
