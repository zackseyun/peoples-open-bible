review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general bien el TM de Amós 9:12 y mantiene correctamente ''Yahvé'', ''remanente'', ''Edom'' y la nota sobre la variante griega de Hechos 15:17. Sin embargo, introduce dos desajustes importantes: añade un ''de'' no motivado en ''y de todas las naciones'', que debilita la estructura directa del objeto coordinado, y en la cláusula relativa el texto principal se aparta de la elección auditada del POB inglés (''llamadas por mi nombre'') para usar ''es invocado mi nombre'', formulación menos fiel al valor idiomático de pertenencia y más ambigua en español.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero puede mejorarse para mayor naturalidad y fidelidad: ''y todas las naciones'' coordina mejor con ''el remanente de Edom'', y ''que son llamadas por mi nombre'' expresa de forma más idiomática y comprensible el sentido principal. La nota léxica puede conservar la alternativa más literal ''sobre las cuales ha sido invocado mi nombre'' como explicación del hebraísmo.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto en ''Yahvé'', ''Dios'' no aplicable, y mantenimiento del lenguaje de ''naciones''. La principal desviación es terminológica en אֲשֶׁר נִקְרָא שְׁמִי עֲלֵיהֶם: el proyecto/auditoría privilegia una forma idiomática equivalente al sentido de pertenencia en el texto principal, dejando la formulación más literal para nota.'
  issues:
  - severity: medium
    issue: '''y de todas las naciones'' añade una preposición no presente en la coordinación hebrea'
    rationale: 'El hebreo coordina dos objetos directos: ''el remanente de Edom y todas las naciones''. En español, repetir ''de'' puede sugerir una dependencia sintáctica menos directa y suaviza la estructura del original.'
  - severity: high
    issue: '''sobre las cuales es invocado mi nombre'' no preserva bien la decisión principal del POB para el idiomático hebreo'
    rationale: נִקְרָא שְׁמִי עֲלֵיהֶם expresa que esas naciones son reclamadas/pertenecen a Yahvé. 'Es invocado mi nombre' puede entenderse como simple apelación litúrgica, no como pertenencia. La auditoría inglesa reserva la formulación más literal para nota, no para el texto principal.
  - severity: low
    issue: La nota a usa presente 'es invocado' en vez de una forma más cercana al perfecto/pasivo resultativo
    rationale: Aunque no es grave, 'ha sido invocado' o 'es llamado' refleja mejor la relación con el hebreo y evita sonar como acción habitual de invocación.
  revised_spanish_text: para que posean el remanente de Edom y todas las naciones que son llamadas por mi nombre[a]”, declara Yahvé[b], quien hace esto.
