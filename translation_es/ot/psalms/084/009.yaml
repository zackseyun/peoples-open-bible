translation:
  language: es
  text: Oh Yahvé[a], Dios de los ejércitos, oye mi oración; presta oído, oh Dios de Jacob. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé»; tradicionalmente se traduce «el SEÑOR» en muchas Biblias.'
    reason: alternative_reading
  - marker: b
    text: '«Selah» es un término hebreo litúrgico o musical de sentido incierto; posibles matices: «pausa» o «interludio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma española establecida en el proyecto, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí funciona como título divino en aposición con Yahvé; «Dios» es la equivalencia natural y transparente en español.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: En español, «ejércitos» comunica el sentido tradicional de la expresión sin la dureza poco idiomática de un calco como «hosts».
- source_word: שִׁמְעָה
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  lexicon: HALOT
  rationale: Imperativo breve y natural en oración directa; conserva la petición inmediata del hebreo.
- source_word: תְפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  lexicon: HALOT
  rationale: Renderiza de forma directa el sustantivo con sufijo de primera persona; «oración» es claro y idiomático en español bíblico contemporáneo.
- source_word: הַאֲזִינָה
  english_pob_choice: give ear
  chosen_spanish: presta oído
  alternatives_spanish:
  - inclina el oído
  - atiende
  lexicon: HALOT
  rationale: Conserva la intensificación poética respecto de «oye» sin repetir mecánicamente el mismo verbo; en español suena natural y mantiene el paralelo.
- source_word: אֱלֹהֵי יַעֲקֹב
  english_pob_choice: God of Jacob
  chosen_spanish: Dios de Jacob
  alternatives_spanish:
  - el Dios de Jacob
  lexicon: HALOT
  rationale: Reproduce de manera transparente la construcción de posesión/covenantaria; la forma breve funciona bien dentro del paralelismo poético.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - pausa
  - interludio
  lexicon: HALOT
  rationale: Se translitera para preservar el marcador litúrgico-musical y no resolver indebidamente su sentido, que sigue siendo incierto.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del hebreo exige conservar el nombre propio del pacto. «Yahvé» sigue la política terminológica del proyecto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Tratamiento de סֶלָה
  english_pob_reading: Selah
  chosen_spanish_reading: Selah
  alternative_spanish_readings:
  - pausa
  - interludio
  rationale: Se mantiene la tensión textual y litúrgica sin imponer una explicación especulativa, tal como pide la filosofía de traducción del proyecto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior incorporando los marcadores de nota exactamente en el texto español: [a] junto a «de los ejércitos» y [b] junto a «Selah». No se añadieron notas sin ancla textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al criterio del proyecto.
  - «Dios» se mantiene para אֱלֹהִים en aposición con el nombre divino.
  - «de los ejércitos» refleja el valor idiomático de צְבָאוֹת en español bíblico.
  - Se preserva «Selah» sin traducción para no resolver el término de manera especulativa.
  - El paralelismo «oye / presta oído» reproduce la intensificación del hebreo sin sobreexplicar.
