translation:
  language: es
  text: Todo el que ofrecía una contribución de plata o de bronce[a] trajo la contribución para Yahvé, y todo el que tenía disponible[b] madera de acacia para cualquier obra del servicio la trajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "una contribución de plata y de bronce". La conjunción hebrea puede entenderse de cualquiera de las dos maneras; el sentido es que cada persona aportó el metal que tenía.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "con quien se hallaba" madera de acacia; es un modismo que significa que la tenía disponible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מֵרִים
  english_pob_choice: Everyone who offered
  chosen_spanish: Todos los que ofrecían
  alternatives_spanish:
  - Todos los que presentaban
  - Todos los que levantaban
  lexicon: HALOT
  rationale: El participio de רוּם con תְּרוּמָה expresa la acción de presentar u ofrecer una contribución. En español, “ofrecían” conserva el sentido participial y suena natural en un contexto litúrgico/material.
- source_word: תְּרוּמַת כֶּ֨סֶף֙ וּנְחֹשֶׁת
  english_pob_choice: a contribution of silver or bronze
  chosen_spanish: una contribución de plata o de bronce
  alternatives_spanish:
  - una ofrenda de plata y de bronce
  - una contribución de plata y de cobre
  lexicon: HALOT
  rationale: תְּרוּמָה es una contribución apartada para uso sagrado. “Plata o de bronce” sigue la distribución idiomática del inglés POB y refleja que cada persona aportaba el metal que tenía, sin forzar una lista conjunta.
- source_word: הֵבִיאוּ אֵת תְּרוּמַת יְהוָה
  english_pob_choice: brought Yahweh’s contribution
  chosen_spanish: trajeron la contribución de Yahvé
  alternatives_spanish:
  - trajeron la ofrenda de Yahvé
  - trajeron la contribución para Yahvé
  lexicon: HALOT
  rationale: El constructo תְּרוּמַת יְהוָה se entiende mejor como la contribución que pertenece a Yahvé o está destinada a él. Se conserva el término técnico “contribución” y el nombre divino según la pauta del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: “Yahvé”, en lugar de “SEÑOR”, manteniendo visible el nombre de pacto.'
- source_word: וְכֹל אֲשֶׁר נִמְצָא אִתּוֹ
  english_pob_choice: and everyone with whom acacia wood was found
  chosen_spanish: y todos aquellos con quienes se hallaba madera de acacia
  alternatives_spanish:
  - y todos los que tenían madera de acacia
  - y todos aquellos a quienes se les hallaba madera de acacia
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea “con quienes se hallaba”, que en español comunica disponibilidad/posesión sin perder el matiz original. “Madera de acacia” traduce עֲצֵי שִׁטִּים con el equivalente moderno estándar.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: acacia wood
  chosen_spanish: madera de acacia
  alternatives_spanish:
  - leño de acacia
  - madera de shittim
  lexicon: HALOT
  rationale: “Madera de acacia” es la forma clara y estable en español; evita la transliteración innecesaria y mantiene la referencia al material del tabernáculo.
- source_word: לְכָל מְלֶאכֶת הָעֲבֹדָה
  english_pob_choice: for any work of the service
  chosen_spanish: para cualquier obra del servicio
  alternatives_spanish:
  - para toda obra del servicio
  - para cualquier trabajo del servicio
  lexicon: HALOT
  rationale: “Obra” conserva מְלֶאכֶת como labor/actividad artesanal, y “del servicio” preserva עֲבֹדָה sin sobreexplicar. La construcción queda solemne y fiel al hebreo.
- source_word: הֵבִיאוּ
  english_pob_choice: brought it
  chosen_spanish: la trajeron
  alternatives_spanish:
  - trajeron
  - lo trajeron
  lexicon: HALOT
  rationale: El objeto implícito es la madera de acacia, un sustantivo femenino en español; por eso se usa “la trajeron” para concordancia natural y clara.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente יְהוָה, no un título genérico. La forma “Yahvé” sigue el estándar doctrinal del proyecto y preserva la identidad del nombre de pacto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de תְּרוּמָה en contexto de tabernáculo
  english_pob_reading: contribution / offering
  chosen_spanish_reading: contribución
  alternative_spanish_readings:
  - ofrenda
  - donativo
  rationale: En este contexto de materiales para el tabernáculo, “contribución” comunica mejor la idea de un aporte dedicado para una obra sagrada sin cargar el término con connotaciones sacrificiales ajenas al pasaje.
  doctrine_reference: HALOT; contexto de Éxodo 35
- issue: Idiomatización de נִמְצָא אִתּוֹ
  english_pob_reading: with whom ... was found
  chosen_spanish_reading: con quienes se hallaba
  alternative_spanish_readings:
  - que tenían
  - a quienes pertenecía
  rationale: Se preserva la tensión idiomática del hebreo entre hallarse y poseerse/estar disponible. El español permite esta forma sin perder naturalidad.
  doctrine_reference: HALOT; nota de idioma hebreo
translation_notes:
  revision_awareness: El inglés POB optó por una equivalencia óptima que distribuye “silver or bronze” y explica en nota el hebreo idiomático de “with whom ... was found”. La presente versión sigue esas decisiones, pero las adapta al español con concordancia natural (“la trajeron”) y mantiene el nombre divino “Yahvé” conforme al criterio del proyecto. No se introducen lecturas alternativas no atestiguadas; la única nota explica la relación entre la construcción hebrea y el español seleccionado.
  spanish_consistency_notes:
  - Se usa “contribución” de forma consistente para תְּרוּמָה.
  - Se reserva “Yahvé” para יְהוָה, sin sustituirlo por “SEÑOR”.
  - “Bronce” se mantiene como equivalencia contextual estándar de נְחֹשֶׁת.
  - “Madera de acacia” evita transliteraciones no necesarias y mantiene claridad para lectores contemporáneos.
  - La concordancia pronominal en “la trajeron” responde al género de “madera” en español y no altera el referente hebreo.
