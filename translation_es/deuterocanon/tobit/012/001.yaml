  to: 'Entonces Tobit llamó a Tobías, su hijo, y le dijo: «Mira, hijo[a], hay que darle salario al hombre que fue contigo, y además hay que añadirle algo más».'
  rationale: 'Se requiere una reparación menor: traducir la nota al español y ajustar la cláusula final para conservar explícitamente la idea de compensación adicional («algo más»). Se mantiene «hijo» por legibilidad española, pero la nota revisada explica con precisión que el griego usa τέκνον y el paralelo semítico «mi hijo». No hace falta adjudicación adicional.'
