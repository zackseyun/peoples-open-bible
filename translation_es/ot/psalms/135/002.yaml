translation:
  language: es
  text: los que están de pie en la casa de Yahvé[a], en los atrios[b] de la casa de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la casa de Yahvé» ... «la casa de nuestro Dios»; «casa» aquí se refiere al santuario del templo y a sus recintos.'
    reason: cultural_note
  - marker: b
    text: O «patios».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁעֹמְדִים
  english_pob_choice: who stand
  chosen_spanish: los que están
  alternatives_spanish:
  - los que permanecen
  - los que se mantienen en pie
  lexicon: HALOT
  rationale: El participio con la partícula relativa introduce una cláusula descriptiva. En español, 'los que están' transmite la continuidad del estado/acción sin sonar forzado; 'permanecen' o 'se mantienen en pie' conservarían más el matiz durativo, pero resultan menos naturales aquí.
- source_word: בְּבֵית
  english_pob_choice: in the house of
  chosen_spanish: en la casa de
  alternatives_spanish:
  - en la casa del
  - en el templo de
  lexicon: HALOT
  rationale: '''Casa'' conserva la metáfora hebrea y su resonancia cultual. ''Templo'' sería una aclaración interpretativa no exigida por el hebreo, y ''casa de'' mantiene mejor el paralelismo del verso.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton en la forma estándar del proyecto en español. 'Yahvé' comunica directamente el nombre revelado, en lugar de reemplazarlo por un título.
- source_word: בְּחַצְרוֹת
  english_pob_choice: in the courts
  chosen_spanish: en los patios
  alternatives_spanish:
  - en los atrios
  - en las cortes
  lexicon: HALOT
  rationale: El plural de חָצֵר puede referir a los recintos del templo. 'Patios' es la alternativa española más transparente y amplia; 'atrios' sería más tradicional, pero menos inmediato para lectores modernos. Mantengo la alternativa interpretativa sin borrar el posible rango semántico.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el templo de
  - la morada de
  lexicon: HALOT
  rationale: La repetición de 'casa' reproduce la estructura hebrea y su paralelismo. 'Templo' explicita el referente, pero debilita la relación verbal con el primer hemistiquio.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: La expresión posesiva comunitaria se rinde de manera directa como 'nuestro Dios'. 'Dios nuestro' sería posible, pero menos natural en este registro.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios en vez de sustituirlo por un título. Esto sigue la doctrina del proyecto y evita ocultar el tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en sentido, estructura y decisiones léxicas principales. No hay revisiones aplicadas en el contexto fuente; por eso la versión española conserva el paralelismo de 'casa' en ambos miembros y mantiene una nota para el posible rango de חַצְרוֹת.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con el nombre divino del proyecto en español.
  - Se mantuvo 'casa' en ambos miembros para reflejar el paralelismo hebreo.
  - '''Patios'' se eligió como equivalente claro de חַצְרוֹת, dejando nota de la alternativa ''atrios''.'
  - La puntuación y el orden reflejan una cláusula relativa breve y una segunda cola paralela en estilo poético.
