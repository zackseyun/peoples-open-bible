  to: Y toda la tierra[a] vino al bosque, y había miel sobre la superficie del campo.[b]
  rationale: Se reemplaza «todo el territorio» por «toda la tierra» para reflejar más directamente הָאָרֶץ, y «entró» por «vino» para corresponder mejor a la elección literal del POB inglés revisado («came into») y al plural hebreo. Se añaden notas para preservar el sentido colectivo probable y la alternativa idiomática de עַל פְּנֵי הַשָּׂדֶה, en línea con la documentación auditada. Se mantiene «bosque», «miel» y «superficie del campo» por fidelidad y claridad suficiente en español.
