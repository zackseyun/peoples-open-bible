translation:
  language: es
  text: Dentro de ti han tomado sobornos para derramar sangre; has tomado interés y lucro[a], y has extorsionado a tus vecinos mediante opresión, y te has olvidado de mí, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «usura y aumento». El hebreo usa dos términos relacionados para el provecho obtenido por préstamos: נֶשֶׁךְ («interés») y תַרְבִּית («lucro» o «aumento»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחַד
  english_pob_choice: bribes
  chosen_spanish: sobornos
  alternatives_spanish:
  - coimas
  - mordidas
  lexicon: HALOT
  rationale: El sustantivo designa pagos ilícitos para torcer la justicia. “Sobornos” comunica con claridad el sentido jurídico y moral sin perder la fuerza del término.
- source_word: לָקְחוּ בָךְ
  english_pob_choice: In you they have taken
  chosen_spanish: Dentro de ti han tomado
  alternatives_spanish:
  - Entre ti han tomado
  - En ti han recibido
  lexicon: HALOT
  rationale: 'La preposición בָךְ dirigida a la ciudad personificada se entiende de forma natural como ámbito interno: “dentro de ti”. Mantiene el discurso a Jerusalén sin sonar torpe en español.'
- source_word: לְמַעַן שְׁפָךְ דָּם
  english_pob_choice: to shed blood
  chosen_spanish: para derramar sangre
  alternatives_spanish:
  - con el fin de derramar sangre
  - para hacer derramar sangre
  lexicon: HALOT
  rationale: La construcción expresa propósito o resultado. “Derramar sangre” conserva la gravedad profética y es idiomático en español bíblico.
- source_word: נֶשֶׁךְ
  english_pob_choice: interest
  chosen_spanish: interés
  alternatives_spanish:
  - usura
  - rédito
  lexicon: HALOT
  rationale: En español moderno “interés” es la forma más clara para el lector amplio. Aunque “usura” existe, puede estrechar demasiado el sentido a interés excesivo; aquí el contexto ya aporta la condena.
- source_word: וְתַרְבִּית
  english_pob_choice: profit
  chosen_spanish: lucro
  alternatives_spanish:
  - ganancia
  - incremento
  lexicon: HALOT
  rationale: El segundo término complementa a נֶשֶׁךְ como ganancia ilícita derivada del préstamo. “Lucro” mantiene el matiz de ganancia obtenida por ventaja indebida y distingue bien el par léxico.
- source_word: לָקַחַתְּ
  english_pob_choice: you have taken
  chosen_spanish: has tomado
  alternatives_spanish:
  - tomaste
  - has cobrado
  lexicon: HALOT
  rationale: El perfecto 2fs continúa la acusación a la ciudad personificada. El pretérito perfecto compuesto suena natural en español y conserva la fuerza de acto consumado.
- source_word: וַתְּבַצְּעִי
  english_pob_choice: you have extorted
  chosen_spanish: has extorsionado
  alternatives_spanish:
  - has explotado
  - has saqueado
  - has arrancado
  lexicon: HALOT
  rationale: En este contexto de ganancia injusta, “extorsionar” expresa la extracción violenta o abusiva de bienes/beneficios mejor que un genérico como “explotar”. Refleja la carga moral del hebreo.
- source_word: רֵעַיִךְ
  english_pob_choice: your neighbors
  chosen_spanish: a tus vecinos
  alternatives_spanish:
  - a tus prójimos
  - a tus compañeros
  lexicon: HALOT
  rationale: “Vecinos” traduce bien la cercanía social del plural y encaja con el lenguaje ético profético. “Prójimos” sería posible, pero introduce una resonancia más teológica que contextual.
- source_word: בָּעֹשֶׁק
  english_pob_choice: by oppression
  chosen_spanish: mediante opresión
  alternatives_spanish:
  - por opresión
  - con opresión
  lexicon: HALOT
  rationale: La preposición instrumental se expresa con claridad como “mediante”. “Opresión” mantiene el sustantivo fuerte del hebreo y evita suavizar el abuso.
- source_word: וְאֹתִי שָׁכַחַתְּ
  english_pob_choice: and you have forgotten me
  chosen_spanish: y te has olvidado de mí
  alternatives_spanish:
  - y me has olvidado
  - y te olvidaste de mí
  lexicon: HALOT
  rationale: 'La formulación reflexiva es la más natural en español y conserva el foco relacional y de pacto: no solo omisión mental, sino abandono de la memoria/consideración debida a Yahvé.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara Yahvé Dios
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo de Yahvé Dios
  lexicon: HALOT
  rationale: Se preserva el nombre divino YHWH como “Yahvé” según la directriz del proyecto, y אֲדֹנָי se vierte con “Dios” para evitar la sustitución tradicional por “SEÑOR”. La fórmula profética נְאֻם queda bien como “declara” en español bíblico sobrio.
theological_decisions:
- issue: Tratamiento del Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / divine-name formula
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé, el Señor
  rationale: La política del proyecto exige transparentar el Tetragrámaton como “Yahvé” y no ocultarlo con una convención tipográfica. En esta fórmula, el título אֲדֹנָי se mantiene como “Dios” para evitar la lectura tradicional que enmascara el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Lenguaje de violencia y corrupción judicial
  english_pob_reading: bribes to shed blood; ... extorted ... by oppression
  chosen_spanish_reading: han tomado sobornos para derramar sangre; ... has extorsionado ... mediante opresión
  alternative_spanish_readings:
  - han recibido sobornos ...
  - has saqueado ...
  rationale: El texto vincula corrupción económica con violencia mortal. Mantener “sobornos”, “derrama[r] sangre” y “extorsionado” preserva esa tensión moral sin atenuarla.
  doctrine_reference: Ética profética en Ezequiel 22:12
translation_notes:
  revision_awareness: 'He seguido el estado de revisión más reciente indicado como sin cambios, y he mantenido la resolución lexical principal del inglés POB: dos términos relacionados para el provecho ilícito de préstamos, además de la lectura profética de corrupción que conduce a derramamiento de sangre.'
  spanish_consistency_notes:
  - He evitado “SEÑOR” como máscara del Nombre divino y usé “Yahvé” conforme a la directriz del proyecto.
  - He mantenido un registro consistente del discurso dirigido a la ciudad personificada con verbos en segunda persona singular.
  - He conservado la distinción entre נֶשֶׁךְ y תַרְבִּית mediante “interés” y “lucro”, con nota alternativa al pie.
  - No añadí glosas doctrinales ajenas al versículo; la puntuación y el orden se ajustan a una lectura pública en español.
