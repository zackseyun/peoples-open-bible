    issue: La nota [a] no coincide bien con la alternativa preservada en el rastro inglés.
    rationale: La nota inglesa [a] ofrece una alternativa de redacción para toda la cláusula participial y su complemento ('having disregarded the pain even to death'), mientras que la nota española actual solo sustituye el verbo por 'hacer caso omiso' y no refleja la variante de alcance/frase completa.
  - severity: low
    issue: '''Despreciado'' puede sonar más afectivo o despectivo que el matiz principal de ὑπεριδόντες.'
    rationale: El verbo griego aquí apunta a desestimar o no tomar en cuenta el dolor como factor decisivo. 'Despreciado' es defendible, pero 'hecho caso omiso de' reproduce mejor la alternativa inglesa adoptada en revisión y evita una posible sobreactuación semántica.
  revised_spanish_text: Pues todos estos, al haber hecho caso omiso del dolor hasta la muerte[a], demostraron que la razón domina sobre las pasiones[b].
  revised_footnotes:
