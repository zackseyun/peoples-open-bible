translation:
  language: es
  text: No enciendan fuego en ninguna de sus moradas[a] el día de sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Moradas» traduce un término amplio de habitación o residencia; puede abarcar casas, viviendas o lugares de asentamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְבַעֲרוּ
  english_pob_choice: kindle
  chosen_spanish: encenderán
  alternatives_spanish:
  - prenderán
  - encenderán un fuego
  lexicon: HALOT
  rationale: El piel de בער expresa la acción de iniciar o avivar el fuego. En español, «encender» comunica con naturalidad esa acción y evita tanto una lectura demasiado amplia como la imagen menos idiomática de «prender» en algunos registros.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: fuego
  alternatives_spanish:
  - un fuego
  - fuego
  lexicon: HALOT
  rationale: El hebreo nombra el objeto prohibido de forma directa. En español, «fuego» funciona de manera natural sin exigir artículo indefinido; la idea sigue siendo la prohibición de iniciar fuego, no una abstracción sobre el elemento en general.
- source_word: בְּכֹל מֹשְׁבֹתֵיכֶם
  english_pob_choice: in any of your dwellings
  chosen_spanish: en ninguna de sus moradas
  alternatives_spanish:
  - en todas sus moradas
  - en cualquiera de sus moradas
  - en sus viviendas
  lexicon: HALOT
  rationale: La fuerza distributiva de בְּכֹל se expresa bien con «en ninguna de sus moradas» dentro de una prohibición, que comunica el alcance de cada lugar de habitación. «Moradas» conserva un tono bíblico claro y amplio para מֹשְׁבֹתֵיכֶם, sin reducirlo a «casas» o «hogares».
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día del sábado
  alternatives_spanish:
  - en sábado
  - en el día de reposo
  lexicon: HALOT
  rationale: El hebreo menciona explícitamente «día». «En el día del sábado» preserva esa referencia temporal sin borrar el sustantivo del texto. Se evita «día de reposo» porque introduce una formulación interpretativa más tradicional que el hebreo mismo aquí no desarrolla.
theological_decisions:
- issue: Alcance de la prohibición del fuego en sábado
  english_pob_reading: Render the command as a direct prohibition against kindling fire, without importing later interpretive expansions about all fire use or all forms of work involving heat.
  chosen_spanish_reading: Presentar el mandato como una prohibición directa de encender fuego, sin ampliar el texto hacia restricciones posteriores sobre todo uso del fuego o sobre cualquier actividad con calor.
  alternative_spanish_readings:
  - No harán fuego en absoluto el sábado
  - No usarán fuego el sábado
  - No encenderán fuego en sus casas el sábado
  rationale: El hebreo prohíbe encender fuego en las moradas durante el día del sábado. La traducción debe decir eso de forma llana, sin resolver debates interpretativos posteriores que el versículo no explicita. La forma elegida mantiene la tensión textual entre la acción concreta prohibida y el marco sabático.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto base y la auditoría inglesa muestran acuerdo alto y no registran revisiones aplicadas; por eso la redacción española sigue de cerca la decisión léxica principal de prohibir «encender fuego» en las «moradas» durante el sábado, sin añadir notas de variante textual.
  spanish_consistency_notes:
  - Se mantiene «sábado» como equivalente de שַׁבָּת en este contexto, porque el versículo lo usa como nombre del día y no requiere peripasis interpretativa.
  - «Encender fuego» conserva la prohibición concreta del hebreo, mientras que «fuego» sin complemento evita sonar mecánico.
  - «Moradas» preserva el alcance distributivo de «en cualquier de sus moradas» de forma idiomática en español.
