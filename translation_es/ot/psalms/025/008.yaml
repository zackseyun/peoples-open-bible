translation:
  language: es
  text: Bueno y recto es Yahvé; por eso instruye[a] a los pecadores en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enseña a los pecadores el camino». El verbo puede significar «enseñar», «instruir» o «dirigir».
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Good
  chosen_spanish: Bueno
  alternatives_spanish:
  - Bondadoso
  - Benevolente
  lexicon: HALOT
  rationale: El adjetivo expresa bondad moral y de carácter. «Bueno» comunica de forma natural esa evaluación ética y mantiene el paralelismo con «recto».
- source_word: וְיָשָׁר
  english_pob_choice: and upright
  chosen_spanish: y recto
  alternatives_spanish:
  - y justo
  - y derecho
  - y rectilíneo
  lexicon: HALOT
  rationale: יָׁשָׁר denota rectitud moral. «Recto» conserva esa fuerza con una forma breve y idiomática en español, sin perder la idea de integridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre personal del Dios de Israel en lugar de sustituirlo por un título.'
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: La expresión marca consecuencia lógica. «Por eso» es natural en español y conserva el vínculo causal sin volver la frase demasiado formal.
- source_word: יוֹרֶה
  english_pob_choice: he instructs
  chosen_spanish: instruye
  alternatives_spanish:
  - enseña
  - guía
  - dirige
  lexicon: HALOT
  rationale: El verbo en hifil puede significar enseñar, instruir o dirigir. «Instruye» conserva el matiz de enseñanza y dirección, como en la nota inglesa, y encaja bien con el contexto sapiencial.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los que pecan
  - a los hombres pecadores
  lexicon: HALOT
  rationale: El sustantivo plural se refiere directamente a personas caracterizadas por el pecado. «Pecadores» mantiene la categoría moral sin suavizarla.
- source_word: בַּדָּרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en la vía
  - en el sendero
  lexicon: HALOT
  rationale: La metáfora hebrea alude al camino de vida o conducta. «En el camino» reproduce de forma fiel y clara la imagen sin añadir el adjetivo interpretativo «recto» al complemento.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la política del proyecto de representar el Nombre divino como transliteración. «Yahvé» preserva mejor el valor reverencial y distintivo del Tetragrámaton que una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de יוֹרֶה en contexto sapiencial
  english_pob_reading: he instructs sinners in the way
  chosen_spanish_reading: instruye a los pecadores en el camino
  alternative_spanish_readings:
  - enseña a los pecadores en el camino
  - dirige a los pecadores en el camino
  rationale: El hebreo admite enseñar, instruir o dirigir. Se conserva la amplitud semántica con «instruye», sin imponer una lectura más estrecha o más explicativa de la que exige el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not paraphrase beyond what the source warrants'
- issue: Interpretación de בַּדָּרֶךְ
  english_pob_reading: in the way
  chosen_spanish_reading: en el camino
  alternative_spanish_readings:
  - en la senda
  - por el camino
  rationale: No se añade «recto» al complemento porque el hebreo no lo expresa. La imagen de camino se conserva abierta, permitiendo la lectura moral de conducta sin sobreinterpretación.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not paraphrase beyond what the source warrants'
