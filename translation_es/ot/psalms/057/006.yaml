translation:
  language: es
  text: ¡Seas exaltado sobre los cielos[a], oh Dios; que tu gloria esté sobre toda la tierra!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu gloria está sobre toda la tierra». La segunda línea hebrea carece de verbo y puede leerse tanto como una petición como una declaración.'
    reason: alternative_reading
lexical_decisions:
- source_word: ר֣וּמָה
  english_pob_choice: Be exalted
  chosen_spanish: ¡Sé enaltecido!
  alternatives_spanish:
  - ¡Sé levantado!
  - ¡Alzate!
  lexicon: HALOT
  rationale: El hebreo es una forma imperativa/jusiva de רום en una súplica doxológica. «Sé enaltecido» conserva la idea de elevación con un matiz reverente y natural en español bíblico, sin reducirlo a un movimiento físico.
- source_word: עַל הַשָּׁמַיִם
  english_pob_choice: above the heavens
  chosen_spanish: por encima de los cielos
  alternatives_spanish:
  - sobre los cielos
  - más alto que los cielos
  lexicon: HALOT
  rationale: Con «los cielos», עַל expresa supremacía y elevación. «Por encima de» comunica mejor esa superioridad espacial/metafórica en español que un simple «sobre».
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: El contexto es de invocación directa, por lo que el vocativo en español debe hacerse explícito. «Oh Dios» mantiene el tono de oración y evita ambigüedad sintáctica.
- source_word: עַל כָּל הָאָרֶץ
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - por encima de toda la tierra
  - en toda la tierra
  lexicon: HALOT
  rationale: Aquí עַל expresa extensión y supremacía. «Sobre toda la tierra» reproduce bien el paralelismo con la primera línea y el alcance universal del verso.
- source_word: כְּבוֹדֶךָ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu esplendor
  lexicon: HALOT
  rationale: כבוד, en referencia a Dios, denota su gloria manifiesta y majestad. «Tu gloria» es la equivalencia más transparente y teológicamente estable en español.
theological_decisions:
- issue: 'Cómo reflejar la segunda línea verbless: ¿petición implícita o afirmación declarativa?'
  english_pob_reading: let your glory be over all the earth
  chosen_spanish_reading: que tu gloria esté sobre toda la tierra
  alternative_spanish_readings:
  - tu gloria está sobre toda la tierra
  - tu gloria sobre toda la tierra
  rationale: El hebreo omite el verbo en la segunda cola, y el audit trail inglés preserva la tensión entre súplica y declaración. En español, «que ... esté» mantiene la fuerza volitiva/orante sin perder la posibilidad de leer la línea como afirmación poética de alcance universal.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo consonante/vocalizado del WLC y el audit trail inglés sin cambios de revisión pendientes; la traducción española conserva el paralelismo y la ambigüedad verbal de la segunda cola.
  spanish_consistency_notes:
  - Se usa «Dios» como vocativo sin mascaramiento de nombre divino porque el hebreo aquí dice אֱלֹהִים, no יהוה.
  - Se mantiene «gloria» para כָּבוֹד, evitando sustituirlo por «honor» o «esplendor» en el texto principal.
  - La puntuación reproduce el paralelismo poético con una pausa fuerte entre las dos colonas.
