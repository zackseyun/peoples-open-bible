id: GEN.30.29
reference: Genesis 30:29
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֔י/ו אַתָּ֣ה יָדַ֔עְתָּ אֵ֖ת אֲשֶׁ֣ר עֲבַדְתִּ֑י/ךָ וְ/אֵ֛ת אֲשֶׁר הָיָ֥ה מִקְנְ/ךָ֖ אִתִּֽ/י־׃
translation:
  text: He said to him[a], “You know how I have served you, and how your livestock has been with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “and what your livestock was with me.” The Hebrew idiom likely refers to how Laban’s livestock prospered under Jacob’s care, not merely to their location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: He said to him
  alternatives:
  - And he said to him
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequence. English can omit the conjunction for natural style without loss of meaning.
- source_word: אַתָּה
  chosen: you yourself
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis before the verb; 'you yourself' preserves that emphasis better than a bare 'you'.
- source_word: יָדַעְתָּ
  chosen: know
  alternatives:
  - have known
  - understand
  lexicon: HALOT
  rationale: 'Qal perfect 2ms in direct speech functions naturally as present stative in English: ''you know.'''
- source_word: אֵת אֲשֶׁר עֲבַדְתִּיךָ
  chosen: how I have served you
  alternatives:
  - what service I rendered you
  - how I worked for you
  lexicon: HALOT
  rationale: עבד in this labor context means to serve/work for someone. 'Served you' preserves both employment and subordinate-service nuance.
- source_word: וְאֵת אֲשֶׁר
  chosen: and how
  alternatives:
  - and what
  lexicon: HALOT
  rationale: This repeats the prior construction and introduces the manner/result clause in idiomatic English.
- source_word: הָיָה מִקְנְךָ אִתִּי
  chosen: your livestock has fared with me
  alternatives:
  - your livestock was with me
  - your cattle came to be with me
  - your possessions were with me
  lexicon: HALOT
  rationale: מִקְנֶה here refers specifically to livestock/herds, not possessions generally. The clause idiomatically refers to the condition or increase of Laban's animals under Jacob's care, not merely their location, so 'has fared with me' best captures the sense.
- source_word: מִקְנְךָ
  chosen: your livestock
  alternatives:
  - your herd
  - your cattle
  lexicon: HALOT
  rationale: מִקְנֶה is a collective term for domesticated animals/property in herds and flocks. 'Livestock' is broad and modern without being too narrow.
- source_word: אִתִּי
  chosen: with me
  alternatives:
  - under my care
  - in my charge
  lexicon: HALOT
  rationale: The preposition is literally 'with me.' The broader sense of being under Jacob's care is conveyed by the whole clause, so the literal phrase is retained in natural English.
