translation:
  language: es
  text: El injusto no escapará con el botín[a], y el deseo de los justos nunca será frustrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y la perseverancia del piadoso ciertamente no será demorada». El hebreo dice: «el deseo de los justos nunca será frustrado».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יִמָּלֵט / οὐκ ἐκφεύξεται
  english_pob_choice: will not escape
  chosen_spanish: no escapará
  alternatives_spanish:
  - no se librará
  - no podrá huir
  lexicon: HALOT; LXX ἐκφεύγω
  rationale: El hebreo y el griego coinciden en la idea de escapar o librarse. 'No escapará' es natural en español y conserva la fuerza judicial/sapiencial del dicho sin suavizarlo.
- source_word: בְּגָזֵל / ἐν ἁρπάγμασιν
  english_pob_choice: with plunder
  chosen_spanish: con el saqueo
  alternatives_spanish:
  - con el botín
  - por medio del robo
  - con bienes robados
  lexicon: HALOT; LSJ
  rationale: בְּ puede expresar medio o circunstancia acompañante; el griego ἐν ἁρπάγμασιν apunta a botín/saqueo. 'Con el saqueo' comunica que el saqueo no le servirá de amparo, manteniendo la idea de ganancia ilícita.
- source_word: עַוָּל / ἁμαρτωλός
  english_pob_choice: an unjust one / a sinner
  chosen_spanish: el injusto
  alternatives_spanish:
  - el pecador
  - el malhechor
  - el injusto
  - el perverso
  lexicon: HALOT; BDAG/LSJ
  rationale: El hebreo עַוָּל describe al injusto o perverso; el griego ἁμαρτωλός subraya al pecador. 'El injusto' refleja mejor el hebreo y sigue siendo compatible con el paralelo griego, sin borrar la tensión lexical entre ambos testigos.
- source_word: תַּאֲוַת צַדִּיק
  english_pob_choice: the desire of the righteous
  chosen_spanish: el deseo de los justos
  alternatives_spanish:
  - el anhelo de los justos
  - la aspiración de los justos
  - el deseo del justo
  lexicon: HALOT
  rationale: תַּאֲוָה es deseo o anhelo. 'Deseo' es la correspondencia más directa y clara en español; el plural colectivo 'los justos' reproduce bien el uso genérico del hebreo.
- source_word: וְלֹא יַשְׁבִּית / οὐ μὴ καθυστερήσει
  english_pob_choice: will never fail / will certainly not be delayed
  chosen_spanish: nunca fallará
  alternatives_spanish:
  - nunca será frustrado
  - no se demorará nunca
  - no será retrasado
  lexicon: HALOT; LXX καθυστερέω
  rationale: El hebreo puede leerse como 'no hará cesar' o 'no frustrará'; el griego dice que no será demorado. 'Nunca fallará' recoge el resultado esperado en español corriente y deja espacio para la alternativa griega, sin forzar una explicación interpretativa.
theological_decisions:
- issue: Tensión entre el hebreo ('deseo') y el griego ('paciencia/endurance') en la segunda cola
  english_pob_reading: the desire of the righteous will never fail, with a footnote preserving the Greek 'the endurance of the godly will certainly not be delayed'
  chosen_spanish_reading: el deseo de los justos nunca fallará, con nota que preserva la lectura griega de la perseverancia del piadoso
  alternative_spanish_readings:
  - la perseverancia del piadoso ciertamente no será demorada
  - la paciencia del piadoso no se retrasará
  rationale: La tradición hebrea es la base principal del cuerpo del texto, mientras que el griego ofrece un matiz real y significativo. Mantener la lectura hebrea en el texto y documentar la variante griega evita borrar la tensión documental entre testigos.
  doctrine_reference: Original-language primacy over translation tradition; preserve meaningful textual tension
- issue: Designación moral de עַוָּל frente a ἁμαρτωλός
  english_pob_reading: an unjust one / a sinner
  chosen_spanish_reading: el injusto
  alternative_spanish_readings:
  - el pecador
  - el malhechor
  - el perverso
  rationale: '''El injusto'' conserva el valor ético-jurídico del hebreo y funciona bien en contraste con ''los justos''. No se sustituye por un término más eclesiástico si el texto no lo exige.'
  doctrine_reference: Lexical primacy; avoid flattening Hebrew/Greek nuance
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del expediente inglés, que precisó 'an unjust one', 'desire' y 'will never fail'. La versión española sigue el hebreo base con apoyo del paralelo griego, manteniendo el contraste moral y la promesa sapiencial sin expandir el sentido más allá de lo documentado.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se eligió 'el injusto' para reflejar el hebreo עַוָּל, evitando traducirlo mecánicamente como 'pecador' cuando el español permite una correspondencia más precisa.
  - '''Deseo'' se mantuvo como núcleo semántico de תַּאֲוָה; no se desplazó a ''paciencia'' en el cuerpo principal, porque esa es la lectura del griego y quedó documentada en la nota.'
  - '''Nunca fallará'' conserva la promesa en español natural sin borrar que el hebreo literal puede sugerir ''no será frustrado'' o ''no hará cesar''.'
