translation:
  language: es
  text: Entonces se levantaron los hombres que habían sido designados por nombre, y se hicieron cargo de los cautivos; y del botín vistieron a todos los que estaban desnudos entre ellos. Los vistieron, les pusieron sandalias, les dieron de comer, les dieron de beber, los ungieron y llevaron sobre asnos a todos los débiles entre ellos. Los llevaron a Jericó, la ciudad de las palmeras, junto a sus hermanos[a]; y luego regresaron a Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes» o «sus compatriotas israelitas» para «sus hermanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִקְּבוּ בְשֵׁמוֹת
  english_pob_choice: had been designated by name
  chosen_spanish: habían sido designados por nombre
  alternatives_spanish:
  - habían sido mencionados por nombre
  - habían sido nombrados por nombre
  - habían sido especificados por nombre
  lexicon: HALOT
  rationale: El niphal de נקב con 'por nombres' expresa identificación o designación explícita. 'Designados por nombre' conserva esa formalidad sin forzar una traducción mecánica.
- source_word: וַיַּחֲזִיקוּ בַשִּׁבְיָה
  english_pob_choice: took charge of the captives
  chosen_spanish: se hicieron cargo de los cautivos
  alternatives_spanish:
  - tomaron a cargo a los cautivos
  - sostuvieron a los cautivos
  - se ocuparon de los cautivos
  lexicon: HALOT
  rationale: חזיק en este contexto no es una captura hostil, sino asumir responsabilidad y cuidado. 'Se hicieron cargo de' comunica esa función compasiva y activa.
- source_word: מַעֲרֻמֵּיהֶם
  english_pob_choice: all who were naked among them
  chosen_spanish: todos los que estaban desnudos entre ellos
  alternatives_spanish:
  - los desnudos de entre ellos
  - todos los desnudos entre ellos
  - los que estaban desnudos entre ellos
  lexicon: HALOT
  rationale: La forma apunta a los que estaban desnudos o despojados dentro del grupo de cautivos. 'Los que estaban desnudos entre ellos' preserva el valor distributivo sin endurecer el español.
- source_word: מִן הַשָּׁלָל
  english_pob_choice: from the spoil
  chosen_spanish: de lo tomado como botín
  alternatives_spanish:
  - del botín
  - del despojo
  - de la presa
  lexicon: HALOT
  rationale: '''Botín'' es correcto, pero ''de lo tomado como botín'' deja clara la procedencia del vestido y evita una lectura demasiado técnica o militarizada en español.'
- source_word: וַיַּלְבִּשׁוּם
  english_pob_choice: They clothed them
  chosen_spanish: Los vistieron
  alternatives_spanish:
  - Los cubrieron con ropa
  - Los pusieron ropa
  lexicon: HALOT
  rationale: La causativa de לבשׁ se expresa naturalmente con 'vestir' en español. Repetir el verbo refuerza la serie de actos de cuidado del hebreo.
- source_word: וַיַּנְעִלוּם
  english_pob_choice: put sandals on them
  chosen_spanish: les pusieron sandalias
  alternatives_spanish:
  - los calzaron
  - les dieron calzado
  - les pusieron calzado
  lexicon: HALOT
  rationale: נעל se refiere a poner calzado. 'Sandalias' es más concreto y acorde al mundo antiguo que un término genérico.
- source_word: וַיַּאֲכִל֨וּ/ם
  english_pob_choice: fed them
  chosen_spanish: les dieron de comer
  alternatives_spanish:
  - los alimentaron
  - les dieron alimento
  lexicon: HALOT
  rationale: La causativa de אכל se vierte de manera idiomática en español con 'dar de comer', sin perder el sentido de provisión.
- source_word: וַיַּשְׁק֜וּ/ם
  english_pob_choice: gave them drink
  chosen_spanish: les dieron de beber
  alternatives_spanish:
  - los bebieron
  - les dieron bebida
  lexicon: HALOT
  rationale: El verbo denota dar bebida. 'Les dieron de beber' es natural, amplio y fiel, sin especificar agua donde el hebreo no lo hace.
- source_word: וַיְסֻכ֗וּ/ם
  english_pob_choice: anointed them
  chosen_spanish: los ungieron
  alternatives_spanish:
  - los untaron con aceite
  - les aplicaron aceite
  lexicon: HALOT
  rationale: סוך suele referirse a ungir o frotar con aceite. 'Ungieron' conserva la lexicalidad bíblica y es suficientemente claro en contexto restaurativo.
- source_word: וַיְנַהֲל֤וּ/ם בַּ/חֲמֹרִים
  english_pob_choice: led all the feeble among them on donkeys
  chosen_spanish: llevaron sobre asnos a todos los débiles entre ellos
  alternatives_spanish:
  - guiaron a todos los débiles sobre asnos
  - los transportaron en asnos
  - los condujeron sobre asnos
  lexicon: HALOT
  rationale: נהל comunica un conducir cuidadoso. En español, 'llevaron sobre asnos' mantiene la imagen y el movimiento compasivo; 'débiles' traduce כושל como fragilidad física.
- source_word: לְכָל כּוֹשֵׁל
  english_pob_choice: all the feeble among them
  chosen_spanish: a todos los débiles entre ellos
  alternatives_spanish:
  - a todos los que tropezaban
  - a todos los que estaban abatidos
  - a todos los que estaban débiles
  lexicon: HALOT
  rationale: כושל literalmente es quien tropieza o vacila, pero en este contexto de cautivos agotados el valor comunicativo es la debilidad física. 'Entre ellos' explicita el referente colectivo.
- source_word: יְרֵחוֹ עִיר הַתְּמָרִים
  english_pob_choice: Jericho, the city of palm trees
  chosen_spanish: Jericó, la ciudad de las palmeras
  alternatives_spanish:
  - Jericó, ciudad de las palmeras
  - Jericó, la ciudad de los palmerales
  lexicon: HALOT
  rationale: Se mantiene el epíteto tradicional y transparente. 'Palmeras' reproduce bien el plural hebreo y resulta natural en español contemporáneo.
- source_word: אֵצֶל אֲחֵיהֶם
  english_pob_choice: to their brothers
  chosen_spanish: junto a sus hermanos
  alternatives_spanish:
  - a sus hermanos
  - junto a sus parientes
  - junto a su propia gente
  lexicon: HALOT
  rationale: אצל indica cercanía o colocación junto a. 'Junto a sus hermanos' conserva el sustantivo de parentesco y el matiz locativo del hebreo.
- source_word: וַיָּשׁוּבוּ שֹׁמְרוֹן
  english_pob_choice: then they returned to Samaria
  chosen_spanish: y luego regresaron a Samaria
  alternatives_spanish:
  - entonces volvieron a Samaria
  - y regresaron a Samaria
  - después volvieron a Samaria
  lexicon: HALOT
  rationale: La secuencia narrativa se expresa naturalmente con 'luego regresaron'. 'Regresaron' corresponde bien al wayyiqtol final sin sobrecargar el estilo.
theological_decisions:
- issue: אֲחֵיהֶם como vínculo fraternal/covenantal
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - su propia gente
  - sus compatriotas israelitas
  rationale: El hebreo dice literalmente 'sus hermanos'. En contexto apunta a la solidaridad entre el pueblo de Dios, pero la forma más fiel y sobria en español es mantener el parentesco directo sin neutralizarlo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Secuencia de acciones de misericordia como restauración práctica
  english_pob_reading: clothed, put sandals on, fed, gave drink, anointed, led on donkeys
  chosen_spanish_reading: los vistieron, les pusieron sandalias, les dieron de comer, les dieron de beber, los ungieron y llevaron sobre asnos
  alternative_spanish_readings:
  - los atendieron con ropa, comida y bebida
  - los restauraron físicamente
  - los trataron con cuidado
  rationale: El texto no solo narra ayuda material; muestra una restauración concreta de la dignidad de los cautivos. La traducción debe preservar la cadena de verbos sin suavizarla en una paráfrasis general.
  doctrine_reference: Contexto narrativo de 2 Crónicas 28:15; principio POB de conservar la fuerza lexical del texto fuente
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que ajustó la frase equivalente a 'all who were naked among them'. La redacción española adopta esa misma solución con 'todos los que estaban desnudos entre ellos', manteniendo el sentido distributivo y evitando una formulación demasiado dura o literalista. También se respetó la secuencia de verbos de cuidado y la referencia a Jericó como 'la ciudad de las palmeras'.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Ungieron'' se mantiene como verbo bíblico estándar; no se reemplazó por una explicación más larga porque el contexto ya aclara el acto.'
  - '''Asnos'' conserva el animal del texto; no se generalizó a ''animales de carga'' para no perder la imagen concreta.'
  - '''Hermanos'' se mantuvo por fidelidad léxica y por coherencia con la política de género-accuracy del proyecto.'
