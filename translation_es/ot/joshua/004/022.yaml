translation:
  language: es
  text: 'entonces harán saber a sus hijos[a], diciendo: «Israel cruzó este Jordán por tierra seca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus hijos varones», si la frase se entiende en sentido más restringido; el hebreo puede referirse específicamente a varones o a hijos en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹדַעְתֶּם
  english_pob_choice: then you shall let ... know
  chosen_spanish: entonces harán saber
  alternatives_spanish:
  - y harán saber
  - entonces informarán
  lexicon: HALOT
  rationale: El hiphil de ידע expresa causar a saber / hacer saber. «Harán saber» conserva la causatividad; «entonces» refleja el flujo narrativo-instructivo del prefijo conjuntivo, como en la decisión inglesa.
- source_word: בְּנֵיכֶם
  english_pob_choice: your children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus descendientes
  lexicon: HALOT
  rationale: בנים puede significar «hijos/varones» o «hijos/descendientes» en sentido amplio. En este contexto memorial e instructivo, «hijos» es natural en español y mantiene la amplitud generacional sin restringirlo innecesariamente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Infinitivo introductorio de discurso. «Diciendo» es la forma más directa y natural en español.
- source_word: בַּיַּבָּשָׁה
  english_pob_choice: on dry ground
  chosen_spanish: sobre tierra seca
  alternatives_spanish:
  - en tierra seca
  - por tierra seca
  lexicon: HALOT
  rationale: יַבָּשָׁה denota tierra seca / suelo seco. «Sobre tierra seca» suena natural en español y preserva la imagen del cruce sin añadir elementos ajenos al hebreo.
- source_word: עָבַר
  english_pob_choice: crossed
  chosen_spanish: cruzó
  alternatives_spanish:
  - pasó
  - pasó al otro lado
  lexicon: HALOT
  rationale: עבר significa pasar, cruzar. Con «este Jordán», «cruzó» comunica con claridad el movimiento de un lado al otro.
- source_word: הַיַּרְדֵּן הַזֶּה
  english_pob_choice: this Jordan
  chosen_spanish: este Jordán
  alternatives_spanish:
  - este río Jordán
  - el Jordán, este
  lexicon: HALOT
  rationale: El demostrativo cercano se conserva con «este». En español bíblico, «Jordán» funciona como nombre propio del río, por lo que no hace falta añadir «río».
translation_notes:
  revision_awareness: 'La redacción sigue el mismo sentido y la misma decisión lexical principal que el texto inglés auditable: el hebreo causativo de ידע se vierte con una construcción natural en español; בנים se mantiene deliberadamente amplio; בַּיַּבָּשָׁה se expresa como suelo/tierra seca; y הַיַּרְדֵּן הַזֶּה conserva el demostrativo cercano con el nombre propio del río.'
  spanish_consistency_notes:
  - Se mantiene «Jordán» como nombre propio sin añadir «río» para respetar la concisión del hebreo.
  - «Hijos» se usa como término amplio y se deja la alternativa restringida en nota, siguiendo la ambigüedad documentada.
  - La puntuación abre la cita directa con dos puntos y comillas angulares por claridad en español bíblico moderno.
