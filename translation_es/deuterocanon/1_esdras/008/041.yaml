translation:
  language: es
  text: 'De los hijos de Banái: Outou hijo de Istakalkou[a], y con él setenta hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo aproximado (Esdras 8:13) difiere bastante aquí: lee otra línea familiar y otros nombres, y da sesenta varones en vez de setenta hombres. En el texto principal se sigue el griego de 1 Esdras.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν Βαναὶ
  english_pob_choice: From the sons of Banai
  chosen_spanish: De entre los hijos de Banái
  alternatives_spanish:
  - De entre los descendientes de Banái
  - De la familia de Banái
  lexicon: LSJ
  rationale: ἐκ con genitivo señala procedencia o pertenencia a un grupo. En listas genealógicas, υἱῶν puede leerse literalmente como 'hijos' o de manera más amplia como descendientes; en español, 'de entre los hijos de' conserva la forma del griego y resulta natural en un registro de lista.
- source_word: Οὐτοῦ
  english_pob_choice: Outou
  chosen_spanish: Outou
  alternatives_spanish:
  - Utou
  - Outu
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre propio según el testimonio griego primario. La revisión inglesa ajustó la vocal final para reflejar mejor Οὐτοῦ, y el español sigue esa forma.
- source_word: Ἰστακάλκου
  english_pob_choice: son of Istakalkou
  chosen_spanish: hijo de Istakalkou
  alternatives_spanish:
  - de Istakalkou
  - Istakalkou
  lexicon: LSJ
  rationale: El griego presenta dos nombres contiguos sin un término explícito de filiación; la POB inglesa lo hizo explícito como relación patronímica. En español, 'hijo de' mantiene esa lectura listal sin exceder la evidencia del contexto.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  - acompañado por él
  lexicon: LSJ
  rationale: La frase expresa acompañamiento. 'Y con él' es una equivalencia directa y fluida en español, preservando el sentido simple del griego.
- source_word: ἄνδρες ἑβδομήκοντα
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta varones
  - setenta adultos
  lexicon: LSJ
  rationale: ἄνδρες denota hombres/varones; en un contexto de lista o censo, 'hombres' es la opción más directa y natural en español, sin neutralizar el matiz de sexo gramatical y referencial.
theological_decisions:
- issue: Diferencia entre el testimonio griego de 1 Esdras y el paralelo hebreo aproximado en nombres y número
  english_pob_reading: 'Follow the Greek list as the main text: Banai, Outou, Istakalkou, seventy men'
  chosen_spanish_reading: 'Seguir la lista griega como texto principal: Banái, Outou, Istakalkou, setenta hombres'
  alternative_spanish_readings:
  - La tradición paralela hebrea presenta otra línea familiar, otros nombres y sesenta varones
  rationale: En 1 Esdras, el griego es la base primaria; el paralelo hebreo de Esdras 8:13 es solo una comparación aproximada y no gobierna la redacción cuando difiere sustancialmente. Para conservar la transparencia textual, la divergencia se mantiene implícitamente en la nota, mientras el texto principal sigue el griego.
  doctrine_reference: 'PHILOSOPHY.md: el texto griego de la LXX es base para los libros deuterocanónicos; los paralelos de MT funcionan como referencia cruzada, no como base controladora.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó el nombre personal de Outu a Outou para reflejar mejor Οὐτοῦ; la redacción española adopta esa forma. También se respetó la decisión de mantener el griego como texto principal frente al paralelo hebreo aproximado, añadiendo una nota transparente sobre la discrepancia textual.
  spanish_consistency_notes:
  - Se mantiene 'Banái' con acento para respetar la pronunciación natural en español de un nombre propio transliterado.
  - Se conserva 'Outou' como transliteración consistente con el testimonio griego y con la revisión inglesa más reciente.
  - '''hijos'' se usa en sentido genealógico/listal, no necesariamente solo biológico literal.'
  - No se sustituye 'hombres' por una fórmula genérica, para preservar el valor de ἄνδρες en el registro censal/listal.
