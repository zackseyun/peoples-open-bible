translation:
  language: es
  text: Él fundió cuatro anillos en las cuatro esquinas de la rejilla de bronce, como alojamientos para las varas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los cuatro extremos» de la rejilla de bronce.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «casas» para las varas; es decir, receptáculos o alojamientos para recibirlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצֹק
  english_pob_choice: He cast
  chosen_spanish: Él fundió
  alternatives_spanish:
  - Él vació
  - Él hizo fundir
  lexicon: HALOT
  rationale: En este contexto de fabricación de piezas metálicas del tabernáculo, el verbo hebreo describe el trabajo de fundición/moldeado del metal. «Fundió» comunica de manera natural en español esa acción técnica sin perder el sentido de producción de los anillos.
- source_word: אַרְבַּע טַבָּעֹת
  english_pob_choice: four rings
  chosen_spanish: cuatro anillos
  alternatives_spanish:
  - cuatro aros
  - cuatro argollas
  lexicon: HALOT
  rationale: טַבָּעֹת son piezas metálicas circulares para sujeción. «Anillos» conserva el valor formal y es transparente en español; «argollas» también sería posible, pero «anillos» sigue mejor la correspondencia lexical básica.
- source_word: בְּאַרְבַּע הַקְּצָוֺת
  english_pob_choice: on the four corners
  chosen_spanish: en las cuatro esquinas
  alternatives_spanish:
  - en los cuatro extremos
  - en las cuatro puntas
  lexicon: HALOT
  rationale: קְצָוֺת significa extremos o terminaciones; en una estructura rectangular, «esquinas» comunica con claridad la ubicación funcional. Mantiene el sentido contextual que el audit trail inglés resolvió como «corners».
- source_word: לְמִכְבַּר הַנְּחֹשֶׁת
  english_pob_choice: of the bronze grating
  chosen_spanish: de la rejilla de bronce
  alternatives_spanish:
  - de la reja de bronce
  - para la rejilla de bronce
  lexicon: HALOT
  rationale: מִכְבָּר es una malla o rejilla; «rejilla» es un equivalente claro y actual en español. «Bronce» traduce נְחֹשֶׁת con precisión material moderna, evitando «latón».
- source_word: בָּתִּים
  english_pob_choice: holders
  chosen_spanish: soportes
  alternatives_spanish:
  - receptáculos
  - alojamientos
  - casquillos
  lexicon: HALOT
  rationale: Literalmente «casas», pero aquí designa piezas que reciben y sostienen las varas. «Soportes» expresa la función sin forzar un tecnicismo innecesario; se conserva la nota explicativa en el aparato para la idea de receptáculo.
- source_word: לַבַּדִּים
  english_pob_choice: for the poles
  chosen_spanish: para las varas
  alternatives_spanish:
  - para los polos
  - para los bastones
  lexicon: HALOT
  rationale: בַּדִּים son las varas de transporte del mobiliario sagrado. «Varas» es más natural y preciso en español bíblico que «polos»; «bastones» podría sonar demasiado genérico.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo consonante y la solución inglesa auditada, sin cambios revisados que alteren el sentido. Se mantiene la estructura de fabricación y colocación de las piezas metálicas, y se preservan las alternativas léxicas documentadas para קְצָוֺת y בָּתִּים.
  spanish_consistency_notes:
  - Se prefirió «bronce» para נְחֹשֶׁת, en coherencia con el criterio moderno ya auditado en inglés.
  - Se usó «varas» para בַּדִּים por ser el equivalente bíblico natural en español y conservar el registro del mobiliario del tabernáculo.
  - Se evitó «SEÑOR» y otros términos teológicos porque el versículo no contiene nombre divino ni referencia doctrinal explícita.
