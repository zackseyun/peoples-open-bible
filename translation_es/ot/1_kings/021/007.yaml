revisions:
- from: 'Entonces Jezabel, su esposa, le dijo: «¿Ahora tú gobiernas[a] sobre Israel como rey? Levántate, come pan y alégrese tu corazón[b]; yo te daré la viña de Nabot el jezreelita».'
  to: 'Entonces Jezabel, su esposa, le dijo: «¿Ahora tú gobiernas Israel como rey[a]? Levántate, come pan y que tu corazón se alegre[b]; yo te daré la viña de Nabot el jezreelita».'
  rationale: 'Se ajustó la sintaxis para un español más natural y fiel al tono exhortativo del hebreo: «gobiernas Israel como rey» evita una construcción pesada, y «que tu corazón se alegre» comunica mejor la idea de ánimo interior tras los imperativos previos. Se conservaron las dos notas del expediente inglés porque siguen siendo pertinentes en español.'
