revisions:
- from: Y llegaron y lo sitiaron en Abel de Bet-maaca[a], y levantaron un terraplén[b] contra la ciudad, y este se puso frente al muro exterior[c]; y todo el pueblo que estaba con Joab estaba derribándolo para hacer caer el muro.
  to: Y llegaron y lo sitiaron en Abel de Bet-maaca[a], y levantaron un terraplén[b] contra la ciudad, y este se alzó contra el muro exterior[c]; y todo el pueblo que estaba con Joab estaba golpeando el muro para derribarlo.
  rationale: Se corrigió la cláusula final para concordar con el sentido plural del participio hebreo y para hacer explícito que el objeto del ataque era el muro, conforme a la revisión auditada del POB en inglés. También se ajustó «se puso frente al» a «se alzó contra el» para expresar mejor la función y colocación del terraplén en contexto de asedio, con español más natural y más fiel al contexto militar.
