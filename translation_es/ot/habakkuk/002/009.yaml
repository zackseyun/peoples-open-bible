    reason: cultural_note
  - marker: c
    text: Literalmente, «de la palma/mano del mal»; es decir, del alcance o poder de la calamidad.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «acumula» por «obtiene» para ajustarse mejor a בֹּצֵעַ y evitar un matiz no explicitado de acumulación. Se cambia «escaparse» por «escapar» para un registro más sobrio. Se corrige la nota [a] eliminando el anglicismo «wrongdoing» y expresándolo en español natural.
