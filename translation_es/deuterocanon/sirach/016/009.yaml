translation:
  language: es
  text: Y no perdonó a un pueblo consagrado a la destrucción[a], los aplastados en su iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: "una nación de destrucción, los removidos en sus pecados". El hebreo parece usar una imagen de ser pisoteados o aplastados; el griego refleja un sentido de juicio estrechamente relacionado, aunque con otra formulación.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא חָמַל
  english_pob_choice: and he did not spare
  chosen_spanish: y no tuvo compasión de
  alternatives_spanish:
  - y no perdonó a
  - y no escatimó a
  lexicon: HALOT
  rationale: חמל puede expresar no perdonar/no tener compasión. En español, 'no tuvo compasión de' conserva el tono de juicio y la carga afectiva sin sonar mecánico.
- source_word: גוֹי
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - un gentío
  lexicon: HALOT
  rationale: גוֹי puede ser 'pueblo' o 'nación'. 'Pueblo' es natural en español bíblico contemporáneo y no sugiere necesariamente un Estado moderno.
- source_word: חֶרֶם
  english_pob_choice: devoted to destruction
  chosen_spanish: dedicado a la destrucción
  alternatives_spanish:
  - bajo el anatema
  - destinado a destrucción
  lexicon: HALOT
  rationale: '''Dedicado a la destrucción'' mantiene la fuerza judicial-sacral de חֶרֶם y evita una calca opaca como ''bajo el anatema''.'
- source_word: הַנּדוֹשִׁים
  english_pob_choice: those trampled down
  chosen_spanish: los que son aplastados
  alternatives_spanish:
  - los que son pisoteados
  - los triturados
  lexicon: HALOT
  rationale: La imagen hebrea sugiere ser oprimidos/aplastados. 'Aplastados' comunica la fuerza del verbo y resulta más claro que una traducción demasiado literal o técnica.
- source_word: בַּעֲוֹנָם
  english_pob_choice: in their iniquity
  chosen_spanish: en su iniquidad
  alternatives_spanish:
  - por su iniquidad
  - en su culpa
  lexicon: HALOT
  rationale: עון puede ser 'iniquidad' o 'culpa'. 'En su iniquidad' sigue de cerca el hebreo y deja abierta la relación entre condición y juicio.
theological_decisions:
- issue: Cómo rendir חרם en un contexto de juicio
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: dedicado a la destrucción
  alternative_spanish_readings:
  - bajo el anatema
  - destinado a destrucción
  rationale: La frase conserva el carácter de sentencia divina sin introducir terminología eclesiástica que oscurezca el sentido de juicio del hebreo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación entre el hebreo difícil y el paralelo griego
  english_pob_reading: those trampled down in their iniquity
  chosen_spanish_reading: los que son aplastados en su iniquidad
  alternative_spanish_readings:
  - los que son removidos en sus pecados
  - los que son pisoteados en su pecado
  rationale: El texto hebreo presenta una imagen difícil, pero el sentido general de opresión/juicio está claro. Se mantiene la imagen hebrea en el cuerpo del texto y se deja constancia del paralelo griego en la nota.
  doctrine_reference: Translation philosophy §3; Sirach Hebrew+Greek practice
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto de traducción exactamente donde corresponde.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el Nombre divino explícito.
  - '''Pueblo'' se usa para גוֹי por naturalidad y fidelidad semántica.'
  - '''En su iniquidad'' conserva la correspondencia con עון y con el matiz de juicio del hebreo.'
  - La nota al pie conserva la alternativa griega sin resolver silenciosamente la tensión textual.
