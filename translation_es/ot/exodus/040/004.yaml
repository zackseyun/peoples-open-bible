translation:
  language: es
  text: Entonces introducirás la mesa y dispondrás lo que va sobre ella; e introducirás el candelabro y colocarás sus lámparas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «harás subir sus lámparas». El verbo hebreo literalmente significa «hacer subir» y puede aludir a que la llama ascienda al encenderlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתָ
  english_pob_choice: you shall bring in
  chosen_spanish: llevarás
  alternatives_spanish:
  - traerás
  - llevarás adentro
  lexicon: HALOT
  rationale: El hebreo en hiphil de בוא indica hacer entrar o introducir el mobiliario en el recinto. En español, 'llevarás' comunica el traslado ordenado sin forzar una explicitación extra; el contexto de la tienda ya sugiere el ingreso. 'Llevarás adentro' sería más explícito, pero menos fluido.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa de los panes de la Presencia
  - la mesa
  lexicon: HALOT
  rationale: El sustantivo designa simplemente la mesa; en español 'mesa' es claro y natural. No se añade la identificación cultual específica porque el verso mismo no la expresa, aunque el contexto mayor la conozca.
- source_word: וְעָרַכְתָּ אֶת עֶרְכּוֹ
  english_pob_choice: arrange what belongs on it
  chosen_spanish: dispondrás lo que va sobre ella
  alternatives_spanish:
  - ordenarás su disposición
  - dispondrás su arreglo
  - colocarás lo que le corresponde
  lexicon: HALOT
  rationale: La construcción con ערך y el sustantivo cognado apunta a poner en orden el contenido o el arreglo prescrito de la mesa. 'Disponer lo que va sobre ella' conserva esa idea sin el calco poco natural 'disponer su disposición'.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - el lampadario
  - la menorá
  lexicon: HALOT
  rationale: '''Candelabro'' es el equivalente español más extendido y comprensible para la pieza del tabernáculo. Se evita ''menorá'' como transliteración, porque el proyecto privilegia traducir sustantivos comunes cuando el sentido puede expresarse claramente.'
- source_word: וְהַעֲלֵיתָ
  english_pob_choice: set up
  chosen_spanish: colocarás
  alternatives_spanish:
  - pondrás en alto
  - instalarás
  - harás subir
  lexicon: HALOT
  rationale: En este contexto de instalación del santuario, el verbo puede referirse a montar o poner en posición el candelabro con sus lámparas. 'Colocarás' comunica bien la acción previa a la iluminación, sin borrar la posible resonancia de 'hacer subir' que queda para la nota.
- source_word: נֵרֹתֶיהָ
  english_pob_choice: its lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus luces
  - sus mechas
  lexicon: HALOT
  rationale: '''Lámparas'' reproduce de manera directa el referente material de נֵר en contexto cultual. ''Luces'' sería más interpretativo, y ''mechas'' no corresponde aquí al objeto señalado por el texto.'
translation_notes:
  revision_awareness: 'Se verificó el pasaje con el texto hebreo masorético (WLC) y con el rastro auditado en inglés. La versión inglesa opta por una equivalencia óptima: simplifica la mesa a ''the table'', entiende ערך como el arreglo prescrito de lo que va sobre ella, y traduce עלה con ''set up'' en vez de ''light'' para el momento de instalación del mobiliario. La redacción española sigue esas decisiones, conservando en nota la alternativa de encendido para el verbo final.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el nombre divino aparece; aquí no aparece.
  - Se traduce el mobiliario cultual con vocabulario natural ('mesa', 'candelabro') y no con transliteraciones innecesarias.
  - La nota [a] preserva la tensión lexical de עַלָה en contexto de lámparas sin saturar el cuerpo del texto.
