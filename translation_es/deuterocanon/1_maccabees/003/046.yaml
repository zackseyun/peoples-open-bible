translation:
  language: es
  text: Y se reunieron y llegaron a Mizpá[a], frente a Jerusalén, porque anteriormente Mizpá había sido para Israel un lugar de oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enfrente de Jerusalén». La expresión griega indica una posición opuesta o delante de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  english_pob_choice: they assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: BDAG
  rationale: El aoristo pasivo/deponente expresa una acción colectiva de reunión. «Se reunieron» comunica con naturalidad esa acción en español y conserva el sentido comunitario sin forzar una forma pasiva artificial.
- source_word: ἦλθοσαν
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: BDAG
  rationale: Con εἰς y un destino, el verbo describe el movimiento hasta el lugar. «Llegaron» es la forma española más natural desde la perspectiva narrativa y mantiene la idea de arribo.
- source_word: Μασσηφά
  english_pob_choice: Mizpah
  chosen_spanish: Mizpá
  alternatives_spanish:
  - Mizpa
  - Masséfa
  lexicon: LSJ
  rationale: Se conserva la transliteración bíblica conocida en español, con acento gráfico para ayudar a la pronunciación y lectura. Evita sustituir el topónimo por una forma menos reconocible.
- source_word: κατέναντι Ἰερουσαλήμ
  english_pob_choice: opposite Jerusalem
  chosen_spanish: frente a Jerusalén
  alternatives_spanish:
  - enfrente de Jerusalén
  - opuesta a Jerusalén
  lexicon: LSJ
  rationale: La expresión griega indica una posición enfrente o en oposición espacial. «Frente a Jerusalén» es claro en español y preserva la relación espacial sin reducirla indebidamente a mera cercanía.
- source_word: τόπος προσευχῆς
  english_pob_choice: a place of prayer
  chosen_spanish: un lugar de oración
  alternatives_spanish:
  - un sitio de oración
  - un lugar para la oración
  lexicon: BDAG
  rationale: La frase designa un lugar asociado con la oración. «Un lugar de oración» conserva el valor devocional/cultual sin añadir categorías institucionales que el texto no menciona.
- source_word: τὸ πρότερον
  english_pob_choice: formerly
  chosen_spanish: anteriormente
  alternatives_spanish:
  - antes
  - en tiempos pasados
  lexicon: BDAG
  rationale: El adverbio apunta a un tiempo anterior. «Anteriormente» mantiene ese valor temporal de manera precisa y digna en español.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - en beneficio de Israel
  lexicon: BDAG
  rationale: 'El dativo expresa referencia/beneficio: Mizpá había servido a Israel como lugar de oración. «Para Israel» refleja bien esa relación sin exceder el alcance del griego.'
theological_decisions:
- issue: Naturaleza de Mizpá como sitio de culto/oración
  english_pob_reading: Rendered τόπος προσευχῆς as 'a place of prayer' without specifying synagogue, sanctuary, or altar.
  chosen_spanish_reading: Traducir τόπος προσευχῆς como «un lugar de oración» sin especificar sinagoga, santuario ni altar.
  alternative_spanish_readings:
  - una casa de oración
  - un lugar de culto
  rationale: El griego solo afirma que Mizpá había sido asociada con la oración de Israel en tiempos anteriores. Es mejor no introducir una institución religiosa más específica de la que el texto no da evidencia.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación espacial de Mizpá con Jerusalén
  english_pob_reading: '''Opposite Jerusalem'' with a footnote noting the Greek can mean ''facing Jerusalem.'''
  chosen_spanish_reading: «frente a Jerusalén» con nota que reconoce la posible lectura «enfrente/facing».
  alternative_spanish_readings:
  - enfrente de Jerusalén
  - opuesta a Jerusalén
  rationale: La preposición griega κατέναντι puede significar «opuesto» o «frente a». La redacción principal conserva la relación espacial, y la nota preserva la alternativa sin perder claridad en español.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran plena concordancia en la lectura básica: reunión de la gente, llegada a Mizpá, su ubicación frente/opuesta a Jerusalén y la razón histórica vinculada a su uso como lugar de oración para Israel. No se registran revisiones textuales ni cambios de última pasada; la traducción española sigue esa misma línea con terminología transparente y sin ampliar el contenido.'
  spanish_consistency_notes:
  - Se mantiene «Mizpá» como topónimo bíblico reconocible y coherente con el uso estándar español.
  - Se usa «frente a Jerusalén» como equivalente principal de κατέναντι, reservando la alternativa para la nota.
  - «Lugar de oración» evita términos litúrgicos más cargados que no aparecen en el griego.
  - 'La sintaxis española sigue el orden narrativo natural sin perder los dos movimientos del verso: reunión y llegada.'
