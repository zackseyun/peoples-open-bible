id: LUK.8.54
reference: Luke 8:54
source:
  edition: SBLGNT
  text: αὐτὸς ⸀δὲ κρατήσας τῆς χειρὸς αὐτῆς ἐφώνησεν λέγων· Ἡ παῖς, ⸀ἔγειρε.
translation:
  text: But he took her by the hand and called out[a], saying, “Child, arise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Girl, get up.” The Greek παῖς can mean “child” or, in context, “girl.”
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς δὲ
  chosen: But he
  alternatives:
  - And he
  - But he himself
  lexicon: BDAG
  rationale: δέ is mildly adversative or continuative here; 'But he' preserves the narrative turn after the surrounding mourners' reaction. αὐτός is naturally represented by the pronoun 'he'; the emphatic force is not pressed into English with 'himself' because that would sound overstated in context.
- source_word: κρατήσας
  chosen: took hold of
  alternatives:
  - grasped
  - seized
  - took
  lexicon: BDAG
  rationale: The aorist participle denotes a concrete act of taking her by the hand. 'Took hold of' is idiomatic and preserves the physical action without the harshness of 'seized.'
- source_word: τῆς χειρὸς αὐτῆς
  chosen: of her hand
  alternatives:
  - her hand
  lexicon: BDAG
  rationale: χείρ means 'hand.' In English the phrase is best expressed as 'took hold of her hand,' which reflects the genitive construction naturally.
- source_word: ἐφώνησεν
  chosen: called out
  alternatives:
  - called
  - cried out
  lexicon: BDAG
  rationale: φωνέω here indicates vocal address. 'Called out' conveys an audible summons without implying distress as strongly as 'cried out' might.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the direct speech. 'Saying' keeps the Greek structure and reads naturally in English.
- source_word: Ἡ παῖς
  chosen: Child
  alternatives:
  - Girl
  - Little girl
  - Maiden
  lexicon: BDAG
  rationale: παῖς can mean 'child,' 'boy,' 'girl,' or 'servant' depending on context. Here it addresses Jairus's daughter. 'Child' is tender, natural, and faithful without adding the diminutive nuance of 'little girl,' which is more explicit in some parallels than in Luke's wording. The article functions vocatively and is not separately translated.
- source_word: ἔγειρε
  chosen: get up
  alternatives:
  - arise
  - wake up
  - rise
  lexicon: BDAG
  rationale: The present imperative of ἐγείρω is a direct command to stand up or rise. 'Get up' is clear modern English and fits the immediate context of restoration to life. 'Arise' is more traditional but less natural for the target audience.
