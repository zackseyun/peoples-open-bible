id: ISA.65.7
reference: Isaiah 65:7
source:
  edition: WLC
  text: עֲ֠וֺנֹתֵי/כֶם וַ/עֲוֺנֹ֨ת אֲבוֹתֵי/כֶ֤ם יַחְדָּו֙ אָמַ֣ר יְהוָ֔ה אֲשֶׁ֤ר קִטְּרוּ֙ עַל הֶ֣/הָרִ֔ים וְ/עַל הַ/גְּבָע֖וֹת חֵרְפ֑וּ/נִי וּ/מַדֹּתִ֧י פְעֻלָּתָ֛/ם רִֽאשֹׁנָ֖ה על חֵיקָֽ/ם־־־׃ס
translation:
  text: your iniquities and the iniquities of your fathers together[a], says Yahweh, because they burned incense on the mountains and reproached me on the hills[b]; so I will measure their former deed into their lap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their recompense' for 'their deed' (פְעֻלָּתָם); the Hebrew term can denote either an act/work or its due payment, though the surrounding idiom already expresses repayment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'into their bosom'; this Hebrew idiom means to repay directly and personally.
    reason: cultural_note
lexical_decisions:
- source_word: עֲוֺנֹתֵיכֶם
  chosen: your iniquities
  alternatives:
  - your sins
  - your guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the punishment/consequence of guilt. Here, paired with the fathers' עֲוֺנוֹת and followed by divine recompense, the term carries moral wrongdoing with culpable weight. 'Iniquities' preserves that gravity better than the flatter 'sins,' while not collapsing it into punishment.
- source_word: וַעֲוֺנֹת אֲבוֹתֵיכֶם
  chosen: and the iniquities of your fathers
  alternatives:
  - and your fathers' iniquities
  lexicon: HALOT
  rationale: The construct chain is rendered transparently. 'Fathers' is retained rather than 'ancestors' because the Hebrew is explicitly masculine plural and refers to forefathers in covenant history.
- source_word: יַחְדָּו
  chosen: both ... together
  alternatives:
  - together
  - alike
  lexicon: HALOT
  rationale: The adverb emphasizes the combined consideration of the present generation's sins with those of their fathers. English idiom is best served by expressing the force with 'both ... together' rather than a bare 'together' at the end of the phrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: 'Although formally a relative particle (''who/that''), in context it introduces the grounds for judgment: they burned incense and reproached God. ''Because'' makes the causal force clear in natural English.'
- source_word: קִטְּרוּ
  chosen: burned incense
  alternatives:
  - offered incense
  - made offerings of incense
  lexicon: HALOT
  rationale: The piel of קטר commonly refers to burning incense in cultic settings. 'Burned incense' is the most direct and idiomatic rendering.
- source_word: עַל הֶהָרִים וְעַל הַגְּבָעוֹת
  chosen: on the mountains and on the hills
  alternatives:
  - upon the mountains and upon the hills
  - on the high places
  lexicon: HALOT
  rationale: The text names mountains and hills explicitly; 'high places' would import an interpretive shorthand not used here. Repeating 'on' preserves the Hebrew parallelism.
- source_word: חֵרְפוּנִי
  chosen: reproached me
  alternatives:
  - taunted me
  - insulted me
  - defied me
  lexicon: HALOT
  rationale: חרף denotes reproach, insult, or scorn. 'Reproached me' is suitably formal and preserves the covenantal offense without over-specifying the manner.
- source_word: וּמַדֹּתִי
  chosen: so I will measure
  alternatives:
  - and I will measure
  - therefore I will measure out
  lexicon: HALOT
  rationale: The verb מדד in the qal means 'measure.' With prefixed waw after the causal clause, the sense is consequential. 'So I will measure' captures the resultative force in readable English.
- source_word: פְעֻלָּתָם
  chosen: their deed
  alternatives:
  - their work
  - their recompense
  - their action
  lexicon: HALOT
  rationale: פְּעֻלָּה can mean work, deed, or wages/recompense depending on context. Since the object of measuring is what they have done, 'their deed' best fits here, while the punitive sense is carried by the measuring-into-the-lap idiom.
- source_word: רִאשֹׁנָה
  chosen: former
  alternatives:
  - first
  - from the beginning
  lexicon: HALOT
  rationale: The adjective likely qualifies their deed as prior/former, i.e., their earlier acts now being repaid. 'Former' is more idiomatic than 'first' in this context and avoids ambiguity.
- source_word: עַל חֵיקָם
  chosen: into their lap
  alternatives:
  - into their bosom
  - upon their breast
  lexicon: HALOT
  rationale: The idiom of repaying into one's bosom/lap conveys personal, direct recompense. 'Into their lap' is clear modern English while preserving the metaphor.
