base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/024.yaml
  text: The priests slaughtered them and applied their blood to the altar to make atonement for all Israel[b][a], because the king had said that the burnt offering and the sin offering were for all Israel.
  footnotes:
