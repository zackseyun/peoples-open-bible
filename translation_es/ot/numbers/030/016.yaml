- from: Pero si de veras los anula después de haberlos escuchado, entonces llevará su culpa[a].
  to: Pero si de veras los anula después de haberlos oído, entonces llevará su culpa[a].
  rationale: Se hace una reparación menor para mejorar la naturalidad del español en un contexto de oír votos («oído» en lugar de «escuchado») y para anclar la nota al pie exactamente en la frase que explica. El resto del borrador preserva bien el sentido fuente, el énfasis legal y la amplitud teológica del POB inglés.
