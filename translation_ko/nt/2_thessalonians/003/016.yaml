id: 2TH.3.16
reference: 2 Thessalonians 3:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ὁ κύριος τῆς εἰρήνης δῴη ὑμῖν τὴν εἰρήνην διὰ παντὸς ἐν παντὶ τρόπῳ. ὁ κύριος μετὰ πάντων ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/016.yaml
  text: Now may the Lord of peace himself give you peace at all times in every way[b][a]. The Lord be with all of you.
translation:
  language: ko
  text: 이제 평강의 주께서 친히 여러분에게 항상[a] 모든 방식으로[b] 평강을 주시기를 빕니다. 주께서 여러분 모두와 함께 계시기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「언제나」, 「끊임없이」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「모든 양태로」, 「온갖 방식으로」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς
  english_pob_choice: himself
  chosen_korean: 친히
  alternatives_korean:
  - 자신이
  - 몸소
  lexicon: BDAG
  rationale: 강조적 αὐτός를 「친히」로 자연스럽게 표현.
- source_word: δὲ
  english_pob_choice: Now
  chosen_korean: 이제
  alternatives_korean:
  - 그러면
  lexicon: BDAG
  rationale: 마무리 축복으로의 부드러운 화제 전환.
- source_word: ὁ κύριος τῆς εἰρήνης
  english_pob_choice: the Lord of peace
  chosen_korean: 평강의 주
  alternatives_korean:
  - 평화의 주
  - 평강을 주시는 주
  lexicon: BDAG
  rationale: 속격의 칭호 표현을 그대로 보존. 「평강」은 1:2와 어휘적 일관.
- source_word: δῴη
  english_pob_choice: may ... give
  chosen_korean: 주시기를 빕니다
  alternatives_korean:
  - 주시기를
  - 베푸시기를
  lexicon: BDAG
  rationale: 부정과거 기원법의 기원적 어조를 「~하시기를 빕니다」로 한국어 축복문 형식으로 옮긴다.
- source_word: τὴν εἰρήνην
  english_pob_choice: peace
  chosen_korean: 평강을
  alternatives_korean:
  - 그 평강을
  lexicon: BDAG
  rationale: 정관사가 있으나 한국어 축복문에서는 자연스럽게 생략.
- source_word: διὰ παντὸς
  english_pob_choice: at all times
  chosen_korean: 항상
  alternatives_korean:
  - 언제나
  - 끊임없이
  lexicon: BDAG
  rationale: 시간적 지속성을 표준 「항상」으로 옮긴다.
- source_word: ἐν παντὶ τρόπῳ
  english_pob_choice: in every way
  chosen_korean: 모든 방식으로
  alternatives_korean:
  - 모든 양태로
  - 온갖 방법으로
  lexicon: BDAG
  rationale: τρόπος의 「양식·방식」을 「방식」으로 옮긴다.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: with all of you
  chosen_korean: 여러분 모두와 함께
  alternatives_korean:
  - 여러분 모두에게
  lexicon: BDAG
  rationale: 분배적 「모두」 보존.
- source_word: ὁ κύριος μετὰ πάντων ὑμῶν
  english_pob_choice: The Lord be with all of you
  chosen_korean: 주께서 여러분 모두와 함께 계시기를 빕니다
  alternatives_korean:
  - 주께서 여러분 모두와 함께 계시기를
  lexicon: BDAG
  rationale: 동사가 없으나 축복문의 기원적 의미를 「계시기를 빕니다」로 보충.
theological_decisions:
- issue: 「주」의 지시 대상
  chosen_reading: 「주」 — 본문이 명시하지 않으므로 좁히지 않음(바울 정형으로는 주 예수께 자연스럽게 적용됨)
  alternative_readings:
  - 「주 예수」로 명시
  - 일반적인 하나님 지시
  rationale: 본문은 ὁ κύριος만을 사용한다. 본 번역은 본문이 진술한 것을 넘어 명시하지 않는다.
  doctrine_reference: 'Affirmations; Translation philosophy §§1, 3'
