translation:
  language: es
  text: 'Entonces dije[a]: «¿Qué son estos, mi señor?» Y el ángel que hablaba conmigo[b] me dijo: «Te mostraré qué son estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor» para אֲדֹנִי; el hebreo אֲדֹנִי es aquí una forma respetuosa de tratamiento, no el nombre divino.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el ángel que hablaba en mí»; la expresión hebrea es idiomática para hablar con el profeta en este contexto de visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Así que dije
  lexicon: HALOT
  rationale: El wayyiqtol introduce la secuencia narrativa; «entonces» conserva el avance temporal en español sin repetir mecánicamente «y».
- source_word: מָה אֵלֶּה
  english_pob_choice: What are these
  chosen_spanish: ¿Qué son estos?
  alternatives_spanish:
  - ¿Qué son estas cosas?
  - ¿Qué es esto?
  lexicon: HALOT
  rationale: La pregunta busca identificar el referente señalado por el demostrativo; en español se sobreentiende el verbo «son» y no hace falta añadir «cosas».
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor
  - mi amo
  lexicon: HALOT
  rationale: En este contexto es un tratamiento respetuoso hacia la figura interlocutora, no el nombre divino. «Mi señor» mantiene el tono honorífico; «señor» perdería la relación posesiva del hebreo.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En la escena visionaria, el ser funciona como intérprete celestial; «ángel» es la opción más natural y fiel al contexto.
- source_word: הַדֹּבֵר בִּי
  english_pob_choice: who was speaking with me
  chosen_spanish: que hablaba conmigo
  alternatives_spanish:
  - que me hablaba
  - que estaba hablando conmigo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática en Zacarías para el ángel intérprete en diálogo con el profeta. «Conmigo» reproduce la relación comunicativa; «en mí» sería engañosamente literal.
- source_word: אֲנִי אַרְאֶךָּ
  english_pob_choice: I will show you
  chosen_spanish: yo te mostraré
  alternatives_spanish:
  - te mostraré
  - yo mismo te mostraré
  lexicon: HALOT
  rationale: El hiphil de ראה significa «hacer ver, mostrar». El pronombre explícito da énfasis; «yo te mostraré» lo conserva de forma natural.
- source_word: מָה הֵמָּה אֵלֶּה
  english_pob_choice: what these are
  chosen_spanish: lo que son estos
  alternatives_spanish:
  - qué son estos
  - lo que son estas cosas
  lexicon: HALOT
  rationale: La cláusula repite la pregunta con énfasis pronominal; en español, «lo que son estos» evita forzar una repetición poco natural de la interrogación directa y refleja el contenido del objeto de la promesa.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי
  english_pob_reading: A respectful human-style address, rendered 'my lord,' directed to the interpreting angel rather than a divine title.
  chosen_spanish_reading: Un tratamiento respetuoso dirigido al ángel intérprete, no un título divino.
  alternative_spanish_readings:
  - señor
  - mi amo
  rationale: El contexto muestra un diálogo visionario con un intérprete celestial; traducirlo como «mi señor» preserva la cortesía sin identificar al interlocutor con Yahvé.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de בִּי en הַדֹּבֵר בִּי
  english_pob_reading: 'Idiomatic relational sense: ''speaking with me.'''
  chosen_spanish_reading: 'Sentido idiomático relacional: «hablaba conmigo».'
  alternative_spanish_readings:
  - hablaba en mí
  - me hablaba
  rationale: Aunque la preposición literal sea «en», el uso en Zacarías es idiomático para comunicación con el profeta. «Conmigo» evita una lectura de interioridad que el contexto no exige.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se conserva el valor narrativo de wayyiqtol, el tratamiento respetuoso de אֲדֹנִי, el sentido idiomático de הַדֹּבֵר בִּי y la promesa causal de ראה en hiphil. No se detectaron revisiones posteriores que alteren la decisión base.'
  spanish_consistency_notes:
  - Se usa «mi señor» como equivalente de courtesy address, coherente con el registro bíblico y sin cargarlo de sentido divino.
  - «Conmigo» mantiene la relación dialogal del ángel intérprete con el profeta, evitando el calco «en mí» salvo en la nota de alternativa.
  - El cierre «lo que son estos» conserva la idea de identificación sin añadir sustantivos inexistentes en el hebreo.
