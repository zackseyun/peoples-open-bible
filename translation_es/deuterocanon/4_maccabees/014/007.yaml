translation:
  language: es
  text: ¡Oh santísimo grupo de siete[a] hermanos en armonía, porque, así como en la creación del mundo los días tienen que ver con la piedad[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente «siete hermanos en armonía». El griego ἑβδομάς designa aquí al conjunto de siete en forma vocativa colectiva, no una «semana».
    reason: lexical_alternative
  - marker: b
    text: La comparación queda incompleta y continúa en el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: πανάγιε
  english_pob_choice: most holy
  chosen_spanish: santísima
  alternatives_spanish:
  - suma santidad
  - all-santa
  lexicon: LSJ
  rationale: El vocativo exige un tratamiento exclamativo y reverente. «Santísima» conserva la fuerza superlativa de πανάγιε con español natural y litúrgicamente digno.
- source_word: συμφώνων
  english_pob_choice: harmonious
  chosen_spanish: en armonía
  alternatives_spanish:
  - concordes
  - de común acuerdo
  lexicon: LSJ
  rationale: El participio/adjetivo expresa concordia entre los hermanos. «En armonía» reproduce la imagen de acuerdo mutuo sin sonar rígido.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - siblingos
  lexicon: LSJ
  rationale: El griego es masculino plural y se refiere a los siete hermanos del relato. «Hermanos» es la forma natural y fiel en español.
- source_word: ἑβδομάς
  english_pob_choice: seven
  chosen_spanish: semana
  alternatives_spanish:
  - heptada
  - grupo de siete
  lexicon: LSJ
  rationale: Aquí el sustantivo puede funcionar como designación de un grupo de siete; sin embargo, por el orden y el contexto retórico, en español «semana» da una lectura más directa del vocativo colectivo, manteniendo la referencia al siete. Se conserva la tensión con la designación numérica del conjunto en nota.
- source_word: κοσμοποιία
  english_pob_choice: creation of the world
  chosen_spanish: creación del mundo
  alternatives_spanish:
  - cosmogonía
  - formación del mundo
  lexicon: LSJ
  rationale: «Creación del mundo» es claro, solemne y exacto para el compuesto que alude a la fabricación del cosmos.
- source_word: ἡμέραι
  english_pob_choice: days
  chosen_spanish: los días
  alternatives_spanish:
  - días
  lexicon: LSJ
  rationale: Traducción directa y transparente del sustantivo plural.
- source_word: περὶ τὴν εὐσέβειαν
  english_pob_choice: are concerned with godliness
  chosen_spanish: están ligados a la piedad
  alternatives_spanish:
  - tienen que ver con la piedad
  - se ocupan de la piedad
  - están relacionados con la piedad
  lexicon: LSJ
  rationale: La construcción preposicional expresa relación o referencia. En 4 Macabeos εὐσέβεια es un término clave; «piedad» mantiene la resonancia bíblico-ética en español, y «están ligados a» evita una paráfrasis excesiva a la vez que refleja la relación gramatical indicada por el griego.
theological_decisions:
- issue: Renderización de εὐσέβεια
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - godliness
  rationale: En 4 Macabeos εὐσέβεια es un término técnico de virtud religiosa. En español, «piedad» comunica mejor el campo semántico de devoción y conducta reverente, y es una opción tradicionalmente comprensible; se evita «devoción» porque puede sonar más general y perder el valor ético-virtudinal del término.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Comparación incompleta introducida por «for just as»
  english_pob_reading: the sentence continues in the following verse
  chosen_spanish_reading: la frase continúa en el versículo siguiente
  alternative_spanish_readings:
  - la comparación queda incompleta aquí
  - el griego sigue en el versículo siguiente
  rationale: El griego conserva una comparación que no se completa en este versículo. En español conviene respetar la incompletitud retórica sin cerrarla artificialmente, dejando constancia de que el enunciado sigue en el versículo siguiente.
  doctrine_reference: Cross-reference and discourse structure note
translation_notes:
  revision_awareness: El texto griego de 4 Macabeos 14:7 presenta una comparación truncada con ὦ πανάγιε συμφώνων ἀδελφῶν ἑβδομάς y una cláusula introducida por καθάπερ γάρ que continúa en el versículo siguiente. La versión inglesa POB revisó 'concern godliness' a 'are concerned with godliness' para ajustar la sintaxis; en español se mantuvo la relación preposicional con un giro natural («están ligados a la piedad») y se conservó la incompletitud mediante nota cruzada. También se decidió traducir εὐσέβεια como «piedad» por su valor técnico-ético en 4 Macabeos, aunque la alternativa «godliness» fue explícitamente documentada en la tradición inglesa.
  spanish_consistency_notes:
  - Se mantiene «piedad» para εὐσέβεια en concordancia con el registro ético-religioso del libro.
  - Se usa un tratamiento vocativo reverente («¡Oh santísima…!») para preservar la elevación del original.
  - Se evita cerrar la comparación para respetar la sintaxis incompleta del griego.
