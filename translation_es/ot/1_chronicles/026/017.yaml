translation:
  language: es
  text: Al oriente, seis levitas; al norte, cuatro por día; al sur, cuatro por día; y en los almacenes[a], de dos en dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Asuppim; el término puede referirse a un nombre de lugar o a un complejo de cámaras, más que a «almacenes» en sentido general.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמִּזְרָח
  english_pob_choice: on the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - en el oriente
  - hacia el este
  lexicon: HALOT
  rationale: El hebreo señala dirección/ubicación por lado; en español, «hacia el oriente» conserva el valor direccional y suena natural en un inventario administrativo del templo. «Oriente» mantiene un registro más solemne que «este».
- source_word: הַלְוִיִּם
  english_pob_choice: Levites
  chosen_spanish: levitas
  alternatives_spanish:
  - los levitas
  - levitas
  lexicon: HALOT
  rationale: El término designa al grupo levítico. En español, el plural sustantivado «levitas» es claro y bíblico sin añadir una formulación más pesada de lo necesario.
- source_word: לַצָּפֹנָה
  english_pob_choice: on the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en el norte
  - hacia el lado norte
  lexicon: HALOT
  rationale: Se mantiene el paralelismo direccional con «hacia el oriente» y «hacia el sur». «Hacia» conserva la idea de asignación por lado o sector.
- source_word: לַיּוֹם
  english_pob_choice: a day
  chosen_spanish: por día
  alternatives_spanish:
  - cada día
  - al día
  - diariamente
  lexicon: HALOT
  rationale: La expresión distributiva indica número asignado diariamente. «Por día» es idiomático en español administrativo y preserva la distribución.
- source_word: לַנֶּגְבָּה
  english_pob_choice: on the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - en el sur
  - hacia el lado sur
  lexicon: HALOT
  rationale: Se traduce en paralelo con las demás orientaciones, conservando la serie espacial del texto.
- source_word: וְלָאֲסֻפִּים
  english_pob_choice: at the storehouses
  chosen_spanish: en los almacenes
  alternatives_spanish:
  - en los asupim
  - en los depósitos
  - en las cámaras de depósito
  lexicon: HALOT
  rationale: El sentido común del sustantivo parece referirse a un lugar de almacenamiento o cámaras del complejo del templo. «Almacenes» comunica con claridad ese valor sin ocultar que el hebreo puede funcionar como nombre propio o término técnico.
- source_word: שְׁנַיִם שְׁנָיִם
  english_pob_choice: two by two
  chosen_spanish: dos y dos
  alternatives_spanish:
  - dos por dos
  - en parejas
  - dos cada vez
  lexicon: HALOT
  rationale: La repetición del numeral tiene fuerza distributiva y señala asignación en pares. «Dos y dos» reproduce esa colocación sin forzar una imagen idiomática demasiado específica.
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con el texto hebreo base y con la solución inglesa auditable: orientación por lados, conteo distributivo diario y lectura probable de Asuppim como espacio técnico del recinto. No se requirieron revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y administrativo, adecuado a listas de turnos del templo.
  - Se conserva la alternancia de marcadores espaciales con «hacia» para reflejar la estructura paralela del hebreo.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el verso.
  - La nota sobre Asuppim se ancla en el término problemático y preserva la tensión lexical sin resolverla de forma dogmática.
