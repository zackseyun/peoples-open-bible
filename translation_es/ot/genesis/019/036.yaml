translation:
  language: es
  text: Así pues, las dos hijas de Lot quedaron embarazadas[a] de su padre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «concibieron»; el verbo hebreo indica que llegaron a estar encinta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «de su padre»; la preposición hebrea מִן marca origen o paternidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהֲרֶיןָ
  english_pob_choice: became pregnant
  chosen_spanish: concibieron
  alternatives_spanish:
  - quedaron embarazadas
  - quedaron encinta
  lexicon: HALOT
  rationale: El verbo hebreo הָרָה en wayyiqtol 3fp expresa el acto de concebir / quedar encinta. 'Concibieron' es la forma literaria y digna estándar en español para esta acción reproductiva y traduce directamente la raíz verbal; es preferible aquí sobre el más coloquial 'quedaron embarazadas'. El inglés POB eligió 'became pregnant' por claridad moderna, pero en español 'concibieron' es igualmente accesible y mantiene el registro narrativo. La alternativa coloquial se preserva en nota al pie.
- source_word: שְׁתֵּי
  english_pob_choice: both
  chosen_spanish: las dos
  alternatives_spanish:
  - ambas
  lexicon: HALOT
  rationale: El numeral hebreo שְׁתַּיִם en estado constructo femenino se une a בְנוֹת לוֹט. 'Las dos' refleja con transparencia el numeral hebreo y es la expresión más directa en español. 'Ambas' es igualmente idiomática y capta el sentido distributivo que el inglés POB buscó con 'both'; se mantiene como alternativa. Se prefiere 'las dos' por fidelidad léxica al numeral fuente.
- source_word: בְנוֹת לוֹט
  english_pob_choice: Lot's daughters
  chosen_spanish: hijas de Lot
  alternatives_spanish:
  - las hijas de Lot
  lexicon: HALOT
  rationale: La cadena constructo בְנוֹת לוֹט se rinde en español con 'hijas de Lot'. El artículo definido 'las' ya está aportado por la frase numeral precedente ('las dos hijas de Lot'), evitando repetición. Equivale al posesivo inglés 'Lot's daughters' con naturalidad.
- source_word: מֵאֲבִיהֶן
  english_pob_choice: by their father
  chosen_spanish: de su padre
  alternatives_spanish:
  - por su padre
  lexicon: HALOT
  rationale: 'La preposición מִן marca aquí origen / paternidad: los embarazos procedían de su propio padre. ''De su padre'' es la traducción literal (''from their father'') y funciona con plena naturalidad en español para expresar paternidad en este contexto. El inglés POB prefirió ''by their father'' por idiomatismo inglés, pero en español la versión literal ''de su padre'' es igualmente idiomática y no necesita ajuste agentivo. La alternativa ''por su padre'' añadiría un matiz más activo/instrumental y se preserva en nota.'
translation_notes:
  revision_awareness: 'El texto inglés POB pasó la revisión más reciente (gpt-5.4, 2026-04-23) sin cambios y obtuvo acuerdo pleno (1.0) en dos rondas de verificación cruzada (gemini-3.1-pro-preview). Este borrador español refleja esa estabilidad: no hay tensiones pendientes en el texto fuente que requieran tratamiento especial más allá de las decisiones léxicas aquí documentadas.'
  spanish_consistency_notes:
  - No aparece ningún nombre divino (YHWH / θεός) en este versículo; las convenciones de proyecto para 'Yahvé' no se aplican aquí.
  - El nombre propio לוֹט se trasliteras como 'Lot' en español, forma estándar en las Biblias en español y en la tradición eclesiástica latinoamericana.
  - El wayyiqtol narrativo hebreo (וַתַּהֲרֶיןָ) se rinde con pretérito indefinido español ('concibieron'), que es el tiempo narrativo correspondiente en la prosa histórica del AT.
