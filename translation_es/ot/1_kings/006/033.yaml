- from: Y así hizo para la entrada del templo jambas de madera de olivo[a], cuadradas.
  to: Y así hizo para la entrada de la nave jambas de madera de olivo[a], cuadradas.
  rationale: Se reemplaza «del templo» por «de la nave» para preservar el sentido específico de הַהֵיכָל en este contexto de arquitectura del templo. También se pule la nota para expresar con más naturalidad en español la alternativa más literal y la dificultad interpretativa del hebreo.
