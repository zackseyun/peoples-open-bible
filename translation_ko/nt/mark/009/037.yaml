  text: Ὃς ⸀ἂν ἓν τῶν τοιούτων παιδίων δέξηται ἐπὶ τῷ ὀνόματί μου, ἐμὲ δέχεται· καὶ ὃς ⸁ἂν ἐμὲ ⸀δέχηται, οὐκ ἐμὲ δέχεται ἀλλὰ τὸν ἀποστείλαντά με.
base_translation:
  language: en
  yaml_path: translation/nt/mark/009/037.yaml
  text: Whoever receives one of such children in my name receives me; and whoever receives me receives not me, but the one who sent me.
  footnotes:
  - marker: a
    text: Or 'one such child.' The Greek literally says 'one of such children,' emphasizing a child of this kind rather than pointing specifically to 'these' children.
    reason: lexical_alternative
  - marker: b
    text: Or 'welcomes' for 'receives' throughout the verse; the same Greek verb is repeated in each clause.
    reason: lexical_alternative
translation:
  language: ko
  text: 「누구든지 이런 어린아이 가운데 하나를 내 이름으로 영접하면, 곧 나를 영접하는 것입니다. 그리고 누구든지 나를 영접하면, 나를 영접하는 것이 아니라 나를 보내신 분을 영접하는 것입니다.」
  philosophy: optimal-equivalence
