translation:
  language: es
  text: Y a los hijos de Gersón, de las familias[a] de la tribu de Isacar, y de la tribu de Aser, y de la tribu de Neftalí, y de la media tribu de Manasés en Basán, por sorteo, trece ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los clanes de la tribu de Isacar». El hebreo מִשְׁפָּחוֹת puede referirse a grupos familiares extensos o clanes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  english_pob_choice: And to the sons of
  chosen_spanish: Y a los hijos de
  alternatives_spanish:
  - Y para los hijos de
  - Y a los descendientes de
  lexicon: HALOT
  rationale: Conservo la función conjuntiva y preposicional como continuidad de la lista de repartos. «Hijos de» refleja de forma directa בנים en contextos genealógicos y tribales; «descendientes» sería posible, pero diluye la forma hebrea más explícita.
- source_word: גֵרְשׁוֹן
  english_pob_choice: Gershon
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gersón
  lexicon: HALOT
  rationale: Nombre propio levítico. En español bíblico es natural conservar la transliteración, con acento gráfico para adecuarla a la pronunciación española.
- source_word: מִ/מִּשְׁפְּח֣וֹת
  english_pob_choice: from the families of
  chosen_spanish: de las familias de
  alternatives_spanish:
  - de los clanes de
  lexicon: HALOT
  rationale: «Familias» conserva la correspondencia formal con מִשְׁפָּחוֹת y es suficientemente natural en español. «Clanes» explicita la idea sociológica, pero se aparta más del término base.
- source_word: מַטֵּה
  english_pob_choice: tribe of
  chosen_spanish: tribu de
  alternatives_spanish:
  - tribu de
  - vara de
  lexicon: HALOT
  rationale: En listas de distribución territorial, מַטֶּה designa una unidad tribal. «Tribu de» expresa el sentido contextual; «vara» no corresponde aquí.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Isacar
  lexicon: HALOT
  rationale: Transliteración estándar del nombre tribal al español.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Aser
  lexicon: HALOT
  rationale: Transliteración estándar al español.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: HALOT
  rationale: Transliteración estándar al español, con acento gráfico natural en español.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Transliteración tradicional y transparente del nombre tribal al español.
- source_word: חֲצִי מַטֵּה
  english_pob_choice: half-tribe of
  chosen_spanish: media tribu de
  alternatives_spanish:
  - media tribu de
  - media parte de la tribu de
  lexicon: HALOT
  rationale: «Media tribu» expresa de manera idiomática la división territorial de Manasés sin perder el valor técnico de חֲצִי מַטֶּה.
- source_word: בַ/בָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - en Basán
  - en el Basán
  lexicon: HALOT
  rationale: Basán es un topónimo; en español bíblico se conserva como nombre propio sin artículo.
- source_word: בַּ/גּוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por sorteo
  - por suerte
  - por lotes
  lexicon: HALOT
  rationale: «Por sorteo» comunica el procedimiento de distribución con claridad en español moderno. «Por lotes» podría sonar administrativo y menos preciso; «por suerte» es más ambiguo.
- source_word: עָרִים שְׁלֹשׁ עֶשְׂרֵה
  english_pob_choice: thirteen cities
  chosen_spanish: trece ciudades
  alternatives_spanish:
  - trece ciudades
  - trece poblaciones
  lexicon: HALOT
  rationale: «Ciudades» conserva la formulación estándar de los listados de reparto en Josué. «Poblaciones» es posible, pero menos directo y menos uniforme con la terminología del pasaje.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el reparto sintáctico del hebreo y coincide con el sentido confirmado por la auditoría inglesa: una lista de asignación tribal, terminada con el dato numérico de trece ciudades. No se detectaron revisiones textuales ni tensiones doctrinales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente griego directo.
  - 'Los nombres tribales se transliteran de manera consistente al español: Gersón, Isacar, Aser, Neftalí, Manasés.'
  - «Tribu» se usa para מַטֵּה por su sentido contextual en repartos territoriales, no como traducción de «vara».
  - «Media tribu» conserva la división técnica de Manasés y evita una paráfrasis más larga.
  - La nota[a] preserva la alternativa semántica documentada para מִשְׁפָּחוֹת sin sobretraducir el texto principal.
