revisions:
- from: Y los hijos de Aarón, los sacerdotes, tocarán las trompetas; y esto[a] será para ustedes una ordenanza permanente[a] por sus generaciones.
  to: Y los hijos de Aarón, los sacerdotes, tocarán las trompetas; y serán para ustedes una ordenanza permanente[a] a través de sus generaciones.
  rationale: Se cambió «y esto será» por «y serán» para reflejar con mayor fidelidad el plural del hebreo y la revisión final del inglés POB. Se eliminó la reutilización incorrecta del marcador de nota y se dejó la nota solo sobre «permanente», donde realmente corresponde la alternativa léxica de עוֹלָם. Se ajustó «por sus generaciones» a «a través de sus generaciones» para expresar mejor la continuidad de לְדֹרֹתֵיכֶם en español natural.
