revisions:
- from: 'Y Yahvé dijo a Gedeón: «Con los trescientos hombres que lamieron, yo los salvaré[a] y pondré a Madián en tu mano. Y que todo el pueblo se vaya, cada hombre a su lugar».'
  to: 'Y Yahvé dijo a Gedeón[a]: «Con los trescientos hombres que lamieron, los salvaré y entregaré a Madián en tu mano. Y que todo el pueblo se vaya, cada hombre a su lugar».'
  rationale: 'Se hace una reparación menor para mejorar fidelidad idiomática y naturalidad: se quita el «yo» enfático innecesario, se mantiene la nota léxica sobre «libraré», y se cambia «pondré» por «entregaré» para reflejar mejor el modismo hebreo «dar en tu mano». Se conserva el resto del texto porque representa bien el hebreo y las decisiones POB.'
