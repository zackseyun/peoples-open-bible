    text: Hebrew literally, 'came from the sunrise to the land of Moab,' an idiom meaning they approached Moab from the east/east side.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the other side of the Arnon.'
    reason: lexical_alternative
