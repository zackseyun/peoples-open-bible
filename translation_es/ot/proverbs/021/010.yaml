translation:
  language: es
  text: El alma del impío desea el mal; su prójimo[a] no halla favor[b] a sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su amigo» o «su compañero» para «su prójimo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no halla favor en sus ojos», un hebraísmo que indica que no le muestra bondad ni aprobación.
    reason: cultural_note
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - ser interior
  - apetito
  - yo
  lexicon: HALOT
  rationale: En este proverbio, נֶפֶשׁ apunta al centro interior de deseos e inclinaciones. «Alma» conserva la densidad antropológica y la concisión del hebreo mejor que una paráfrasis como «ser interior» o una reducción a «apetito».
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - la persona impía
  - el perverso
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «El impío» es breve, bíblico y mantiene el valor caracterizador sin añadir especificaciones no presentes en el hebreo.
- source_word: אִוְּתָה
  english_pob_choice: desires
  chosen_spanish: desea
  alternatives_spanish:
  - anhela
  - codicia
  - apetece
  lexicon: HALOT
  rationale: El verbo expresa deseo o ansia por el mal. «Desea» refleja bien el sentido básico sin intensificar indebidamente la fuerza del término.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  - daño
  lexicon: HALOT
  rationale: En sabiduría, רָע suele tener fuerza moral. «El mal» conserva esa amplitud ética mejor que «daño», que estrecha el alcance a perjuicio o desgracia.
- source_word: יֻחַן
  english_pob_choice: finds no favor
  chosen_spanish: no halla favor
  alternatives_spanish:
  - no recibe favor
  - no se le muestra favor
  - no obtiene gracia
  lexicon: HALOT
  rationale: El pasivo de חנן transmite no ser favorecido. «No halla favor» permite conservar la imagen idiomática y su tono evaluativo, siguiendo de cerca la lectura auditada en inglés.
- source_word: בְּעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - en sus ojos
  - a su parecer
  lexicon: HALOT
  rationale: El hebreo usa el modismo «en sus ojos». En español, «ante sus ojos» comunica de forma natural la perspectiva o evaluación del sujeto sin perder la imagen.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su amigo
  - su compañero
  lexicon: HALOT
  rationale: Aquí רֵעַ designa a la persona cercana en el ámbito social, no necesariamente a un amigo íntimo. «Prójimo» expresa bien esa relación interpersonal y mantiene la amplitud ética del término.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la antítesis moral y el modismo final sin convertirlo en paráfrasis. Se eligió un español natural, pero suficientemente literal para preservar la densidad semántica del proverbio.
  spanish_consistency_notes:
  - Se mantuvo «el mal» para רָע, en coherencia con el sentido moral documentado.
  - Se prefirió «prójimo» para רֵעַ por su amplitud ética; «vecino» o «amigo» estrecharían indebidamente el campo semántico.
  - El modismo final se dejó reconocible en nota para no borrar la imagen hebrea de la evaluación «ante/en sus ojos».
