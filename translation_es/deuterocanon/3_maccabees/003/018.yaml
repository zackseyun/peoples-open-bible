translation:
  language: es
  text: Llevados por una antigua presunción[a], nos cerraron el paso, quedando por debajo de nuestra fuerza, por la cual tenemos benevolencia hacia todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevados por una presunción antigua»; también puede entenderse «arrastrados por un orgullo de larga data». El griego τύφοις φερόμενοι παλαιοτέροις es compacto y admite matices de arrogancia heredada o prolongada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τύφοις
  english_pob_choice: conceit
  chosen_spanish: presunción
  alternatives_spanish:
  - orgullo
  - vanidad
  - arrogancia
  lexicon: LSJ
  rationale: El dativo plural expresa una disposición moral de soberbia o autoexaltación. «Presunción» comunica bien esa actitud de orgullo injustificado sin endurecer el matiz más allá del griego.
- source_word: φερόμενοι
  english_pob_choice: carried away
  chosen_spanish: llevados
  alternatives_spanish:
  - arrastrados
  - impulsados
  - llevados por
  lexicon: BDAG
  rationale: El participio pasivo sugiere ser conducidos o impulsados por una disposición interna. «Llevados por» conserva esa fuerza pasiva y suena natural en español.
- source_word: παλαιοτέροις
  english_pob_choice: ancient
  chosen_spanish: antigua
  alternatives_spanish:
  - de antiguo
  - de mucho tiempo
  - ancestral
  lexicon: LSJ
  rationale: Aunque formalmente es comparativo, aquí funciona idiomáticamente como algo de vieja data. «Antigua» expresa bien la idea de una presunción heredada o de largo tiempo.
- source_word: εἶρξαν
  english_pob_choice: barred
  chosen_spanish: nos prohibieron la entrada
  alternatives_spanish:
  - nos cerraron el paso
  - nos impidieron entrar
  - nos excluyeron
  lexicon: LSJ
  rationale: El verbo indica impedir la entrada. «Nos prohibieron la entrada» preserva el sentido de bloqueo de acceso y resulta claro en español.
- source_word: τῆς εἰσόδου
  english_pob_choice: from entry
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - el ingreso
  - de entrar
  lexicon: BDAG
  rationale: La construcción griega marca la acción impedida; en español, «la entrada» transmite de forma natural ese mismo contenido.
- source_word: λειπόμενοι
  english_pob_choice: falling short of
  chosen_spanish: quedando por debajo de
  alternatives_spanish:
  - careciendo de
  - siendo inferiores a
  - faltando
  lexicon: BDAG
  rationale: El participio expresa deficiencia respecto de la fuerza mencionada. «Quedando por debajo de» conserva la comparación implícita sin volverlo demasiado interpretativo.
- source_word: τῆς ἡμετέρας ἀλκῆς
  english_pob_choice: our strength
  chosen_spanish: nuestra fuerza
  alternatives_spanish:
  - nuestro vigor
  - nuestro poder
  - nuestro valor
  lexicon: LSJ
  rationale: ἀλκή puede ser fuerza, vigor o capacidad de resistencia. «Fuerza» es el equivalente más directo y comprensible para el contexto.
- source_word: διʼ ἣν
  english_pob_choice: by which
  chosen_spanish: por la cual
  alternatives_spanish:
  - por medio de la cual
  - mediante la cual
  - a causa de la cual
  lexicon: BDAG
  rationale: El relativo retoma la fuerza/capacidad mencionada y señala medio o base. «Por la cual» mantiene esa relación de forma sobria.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  - mantenemos
  - mostramos
  lexicon: BDAG
  rationale: Se conserva el verbo simple, porque el griego no exige expansión. «Tenemos» funciona bien con el sustantivo siguiente y preserva la sencillez del original.
- source_word: πρὸς ἅπαντας ἀνθρώπους
  english_pob_choice: toward all people
  chosen_spanish: hacia todos los pueblos
  alternatives_spanish:
  - hacia todas las personas
  - para con todas las personas
  - hacia toda la gente
  lexicon: BDAG
  rationale: Aunque ἄνθρωποι puede ser genérico para personas, aquí el plural amplio permite un sentido colectivo. «Todos los pueblos» expresa el alcance universal en un registro bíblico natural en español.
- source_word: φιλανθρωπίαν
  english_pob_choice: goodwill
  chosen_spanish: benevolencia
  alternatives_spanish:
  - bondad
  - buena voluntad
  - humanidad
  lexicon: BDAG
  rationale: El término denota disposición benévola hacia otros seres humanos. «Benevolencia» conserva ese valor ético con mayor precisión que «bondad» y sin la ambigüedad de «humanidad».
theological_decisions:
- issue: Alcance de πρὸς ἅπαντας ἀνθρώπους
  english_pob_reading: toward all people
  chosen_spanish_reading: hacia todos los pueblos
  alternative_spanish_readings:
  - hacia todas las personas
  - hacia toda la humanidad
  - hacia todos los hombres
  rationale: El griego expresa un alcance universal de benevolencia. En español, «todos los pueblos» mantiene ese alcance colectivo y solemne sin restringirlo al masculino genérico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre δύναμις/ἀλκή implícita y φιλανθρωπία
  english_pob_reading: by which we have goodwill toward all people
  chosen_spanish_reading: por la cual tenemos benevolencia hacia todos los pueblos
  alternative_spanish_readings:
  - por la cual mostramos benevolencia hacia todos los pueblos
  - por la cual tenemos buena voluntad hacia toda la humanidad
  rationale: La frase griega vincula la fuerza/capacidad con la actitud benévola. «Tenemos benevolencia» conserva la posesión de una disposición, sin convertirlo innecesariamente en una acción distinta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'Se revisó la frase para evitar depender mecánicamente del inglés: se mantuvo la relación causal entre ἀλκή y φιλανθρωπία, y se incorporó la nota textual/lexical correspondiente al matiz de τύφοις φερόμενοι παλαιοτέροις con el anclaje [a] en el texto.'
  spanish_consistency_notes:
  - Se usó «benevolencia» para φιλανθρωπίαν por ser el término más preciso y menos ambiguo en español.
  - Se evitó «SEÑOR» u otras convenciones litúrgicas porque el versículo no contiene el nombre divino.
  - Se prefirió un español sobrio y bíblico, sin calcos innecesarios del inglés, pero manteniendo la sintaxis y relaciones del griego.
