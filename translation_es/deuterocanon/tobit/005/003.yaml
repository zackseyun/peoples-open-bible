revisions:
- from: 'Y le dio el escrito[a] y le dijo: «Busca para ti un hombre que vaya contigo, y le daré salario mientras yo viva[b]; luego ve y recoge la plata».'
  to: 'Y le dio la nota escrita[a] y le dijo: «Busca para ti un hombre que vaya contigo, y le daré salario mientras yo viva; luego ve a recibir la plata[b]».'
  rationale: Se ajusta χειρόγραφον a «la nota escrita» para reflejar mejor la decisión auditada y sonar más natural en español. Se cambia «recoge la plata» por «ve a recibir la plata» para expresar mejor la acción de ir por los fondos depositados. Se conserva «plata» en el texto principal por fidelidad léxica, pero se añade la alternativa «dinero» en nota, siguiendo la auditoría inglesa. Se elimina la nota sobre «mientras yo viva» por innecesaria.
