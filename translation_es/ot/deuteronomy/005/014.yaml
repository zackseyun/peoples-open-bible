base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/005/014.yaml
  text: But the seventh day is a Sabbath to Yahweh your God[a]. You shall not do any work—you, or your son, or your daughter, or your male slave, or your female slave, or your ox, or your donkey, or any of your livestock[b], or the sojourner who is within your gates—so that your male slave and your female slave may rest as you do.
  footnotes:
  - marker: a
    text: Or 'resident foreigner' for 'sojourner.' The Hebrew גֵּר refers to a non-native resident living within the community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'within your gates,' an idiom for those residing within your town or community.
    reason: cultural_note
