translation:
  language: es
  text: Y tomaron de delante de Moisés toda la contribución[a] que los hijos de Israel habían traído para la obra del servicio del santuario, para hacerla[b]. Y seguían trayéndole todavía ofrendas voluntarias[c] mañana tras mañana[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda»; aquí se refiere al aporte dado para la construcción del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O «para llevarla a cabo»; literalmente, «para hacerla».
    reason: lexical_alternative
  - marker: c
    text: O «dones voluntarios»; el término subraya la espontaneidad del aporte.
    reason: lexical_alternative
  - marker: d
    text: O «cada mañana» o «mañana por mañana»; la repetición hebrea expresa constancia diaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  lexicon: HALOT
  rationale: לקח expresa básicamente ‘tomar’; en este contexto, los artesanos toman los materiales de la custodia inmediata de Moisés. ‘Tomaron’ conserva el verbo hebreo con naturalidad en español.
- source_word: מִלִּפְנֵי מֹשֶׁה
  english_pob_choice: from before Moses
  chosen_spanish: de delante de Moisés
  alternatives_spanish:
  - de la presencia de Moisés
  - de Moisés
  lexicon: HALOT
  rationale: La expresión hebrea indica procedencia ‘de delante / de la presencia de’. ‘De delante de Moisés’ mantiene la imagen espacial del original sin perder claridad.
- source_word: הַתְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - la contribución
  - la ofrenda elevada
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, תְּרוּמָה designa un don apartado para uso sagrado. En español, ‘ofrenda’ comunica bien la entrega cultual, aunque ‘contribución’ sería una alternativa más literal del uso material.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula formal del hebreo. ‘Hijos de Israel’ es transparente y evita aplanar el matiz genealógico/colectivo del original.
- source_word: לִמְלֶאכֶת עֲבֹדַת הַקֹּדֶשׁ
  english_pob_choice: for the work of the service of the sanctuary
  chosen_spanish: para la obra del servicio del santuario
  alternatives_spanish:
  - para la obra del servicio santo
  - para la obra de servicio del lugar santo
  lexicon: HALOT
  rationale: 'El hebreo apila sustantivos relacionados: ‘trabajo/obra’, ‘servicio’ y ‘santidad’. ‘Santuario’ expresa con naturalidad הַקֹּדֶשׁ en el marco del tabernáculo, preservando el doble énfasis de trabajo y servicio.'
- source_word: לַעֲשֹׂת אֹתָהּ
  english_pob_choice: to do it
  chosen_spanish: para hacerla
  alternatives_spanish:
  - para llevarla a cabo
  - para realizarla
  lexicon: HALOT
  rationale: עָשָׂה puede significar ‘hacer’ o ‘llevar a cabo’. El sufijo femenino se refiere más naturalmente a la obra/servicio como tarea colectiva; ‘para hacerla’ sigue de cerca el hebreo sin sonar forzado.
- source_word: וְהֵם הֵבִיאוּ
  english_pob_choice: And they kept bringing
  chosen_spanish: Y seguían trayéndole
  alternatives_spanish:
  - Y trajeron
  - Y continuaban trayéndole
  lexicon: HALOT
  rationale: La combinación de pronombre independiente y verbo enfatiza continuidad. ‘Seguían trayéndole’ reproduce la persistencia de la acción sin introducir contraste inexistente.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Moisés
  lexicon: HALOT
  rationale: El referente es Moisés; en español, el clítico ‘le’ resulta natural y mantiene la cohesión del texto sin repetir el nombre.
- source_word: נְדָבָה
  english_pob_choice: freewill offering
  chosen_spanish: ofrenda voluntaria
  alternatives_spanish:
  - don voluntario
  - ofrenda libre
  lexicon: HALOT
  rationale: נְדָבָה expresa un regalo voluntario. ‘Ofrenda voluntaria’ comunica bien la espontaneidad del don y evita restringirlo a un acto sacrificial específico.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning after morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana por mañana
  lexicon: HALOT
  rationale: La repetición hebrea indica regularidad continua. ‘Mañana tras mañana’ preserva esa iteración de manera idiomática en español.
theological_decisions:
- issue: Naturaleza de הַתְּרוּמָה en el contexto del tabernáculo
  english_pob_reading: the contribution
  chosen_spanish_reading: la ofrenda
  alternative_spanish_readings:
  - la contribución
  - la ofrenda elevada
  rationale: No se trata de un sacrificio animal, sino de materiales ofrecidos para la obra sagrada. ‘Ofrenda’ conserva el carácter devocional del don; se evita borrar la dimensión cultual del término.
  doctrine_reference: Ex 25–36 (ofrendas para el tabernáculo)
- issue: Repetición final y sentido iterativo
  english_pob_reading: morning after morning
  chosen_spanish_reading: mañana tras mañana
  alternative_spanish_readings:
  - cada mañana
  - mañana por mañana
  rationale: El doble בַּבֹּקֶר intensifica la constancia. ‘Mañana tras mañana’ mantiene el valor iterativo y evita diluir la repetición en una mera frecuencia genérica.
  doctrine_reference: Hebraísmo aspectual/iterativo
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una revisión menor: se eliminó el matiz adversativo de «But» y se ajustó el singular a plural en «freewill offerings». La redacción española sigue ese estado revisado y mantiene la continuidad simple del hebreo con «Y».'
  spanish_consistency_notes:
  - Se conservó «Moisés» como referente explícito, con clítico en la segunda cláusula para fluidez.
  - Se mantuvo «hijos de Israel» por fidelidad formal al hebreo y coherencia con el registro del texto.
  - Se eligió «santuario» para הַקֹּדֶשׁ en sentido tabernacular, no «santo» como adjetivo abstracto.
  - «Ofrenda» se usó en sentido cultual; el aparato explica la alternativa «contribución».
