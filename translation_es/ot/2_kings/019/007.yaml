translation:
  language: es
  text: Mira, estoy poniendo en él un espíritu[a], y oirá una noticia[b] y volverá a su propia tierra, y haré que caiga a espada en su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un viento» o «un aliento»; el hebreo puede referirse también a una disposición interior.
    reason: lexical_alternative
  - marker: b
    text: O «un rumor» o «un reporte».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La forma introduce una घोषणा/afirmación divina con fuerza deíctica. «Mira» conserva esa llamada de atención en español moderno sin sobrecargar el tono.
- source_word: נֹתֵן
  english_pob_choice: I am putting
  chosen_spanish: estoy poniendo
  alternatives_spanish:
  - pondré
  - estoy por poner
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa inmediatez; el presente progresivo en español comunica mejor esa cercanía profética que un futuro simple.
- source_word: רוּחַ
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un viento
  - un aliento
  - una disposición
  lexicon: HALOT
  rationale: Se mantiene la ambigüedad hebrea entre agente espiritual, impulso interior y otros matices posibles. «Espíritu» conserva la amplitud del término mejor que resolverlo como «disposición».
- source_word: שְׁמוּעָה
  english_pob_choice: a report
  chosen_spanish: una noticia
  alternatives_spanish:
  - un informe
  - un reporte
  - un rumor
  lexicon: HALOT
  rationale: El sustantivo puede ser noticia, rumor o reporte. En español, «noticia» es natural y suficientemente neutral; no decide si el contenido es verificado o meramente oído.
- source_word: וְשָׁב
  english_pob_choice: and return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - dará la vuelta
  - volverá atrás
  lexicon: HALOT
  rationale: «Volverá» reproduce el valor de retorno/retroceso de manera idiomática y fluida con «a su propia tierra».
- source_word: לְאַרְצוֹ
  english_pob_choice: to his own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a su país
  lexicon: HALOT
  rationale: «Tierra» conserva el registro bíblico-geográfico; «propia» refleja el sufijo pronominal y el matiz de pertenencia.
- source_word: וְהִפַּלְתִּיו
  english_pob_choice: and I will make him fall
  chosen_spanish: haré que caiga
  alternatives_spanish:
  - lo haré caer
  - lo derribaré
  - lo abatiré
  lexicon: HALOT
  rationale: El hiphil de נפל es causativo. «Haré que caiga» preserva con claridad esa causatividad sin añadir una imagen más interpretativa.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: En español bíblico, «caer a espada» comunica el instrumento de muerte de forma natural y tradicional, conservando el valor idiomático del hebreo.
- source_word: בְּאַרְצוֹ
  english_pob_choice: in his own land
  chosen_spanish: en su propia tierra
  alternatives_spanish:
  - en su tierra
  - dentro de su tierra
  lexicon: HALOT
  rationale: 'La repetición de «propia» retoma el sufijo y conserva la ironía del juicio: la caída ocurre en el mismo territorio al que vuelve.'
theological_decisions:
- issue: Sentido de רוּחַ en un oráculo de juicio
  english_pob_reading: a spirit
  chosen_spanish_reading: un espíritu
  alternative_spanish_readings:
  - una disposición
  - un viento
  - un aliento
  rationale: Se conserva la tensión del hebreo sin definir mecánicamente el modo de la acción divina. «Espíritu» permite entender una influencia enviada por Dios sobre el rey, sin cerrar el rango semántico del término.
  doctrine_reference: Translation philosophy §3 (preservar tensión teológica y lexical)
- issue: Relación entre la noticia oída y la retirada del rey
  english_pob_reading: and he will hear a report and return
  chosen_spanish_reading: oirá una noticia y volverá
  alternative_spanish_readings:
  - escuchará un reporte y regresará
  - oirá un rumor y volverá
  rationale: «Noticia» mantiene la neutralidad del hebreo שְׁמוּעָה y deja abierta la fuente exacta del disparador narrativo, como en el texto base.
  doctrine_reference: No aplica; decisión narrativa/lexical
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético de 2 Reyes 19:7 y el auditorio inglés POB. Mantiene la secuencia causal y el doble énfasis territorial («a su propia tierra» / «en su propia tierra»), así como la ambigüedad de רוּחַ y שְׁמוּעָה. No se introdujeron cambios respecto al razonamiento auditado; solo se adaptó a un español natural y publicable.
  spanish_consistency_notes:
  - Se usó «Yahvé» donde corresponda en la tradición general del proyecto, pero este versículo no contiene el tetragrámaton en la superficie del texto.
  - Se evitó «SEÑOR» como sustituto no presente en el hebreo.
  - «Espíritu» se escribió en minúscula porque aquí no hay marcador explícito del Espíritu Santo; el sentido es indeterminado.
  - La construcción «caiga a espada» conserva el idiomático bíblico sin convertirlo en paráfrasis interpretativa.
