review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y del POB inglés: Yahvé habla, denuncia que los profetas profetizan falsedad en su nombre, niega haberlos enviado/mandado/hablado, y enumera fuentes o contenidos fraudulentos. Sin embargo, la clausura española altera el valor de לָכֶם y la sintaxis: el hebreo dice que ''ellos les profetizan a ustedes'' esa serie de cosas, no ''es lo que ellos profetizan para ustedes''. También conviene hacer más natural en español la enumeración nominal con artículo.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la frase final suena algo calcada y menos natural: ''Visión falsa... es lo que ellos profetizan para ustedes'' resulta pesada y cambia ligeramente el sentido direccional. ''Les profetizan'' o ''profetizan para ustedes'' no son equivalentes; aquí el dativo de destinatario pide ''a ustedes/les''. También es preferible minúscula en ''visión'' tras la oración anterior.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה = ''Yahvé''; שקר = ''mentiras'' / ''falsa''; קסם = ''adivinación''; אלול entendido como ''vacío'' con nota alternativa. No hay conflicto terminológico mayor. La nota al pie debe ajustarse al español normativo con ''ídolo'' en vez de ''idol''.'
  issues:
  - severity: medium
    issue: La frase final traduce לָכֶם como 'para ustedes' dentro de una construcción explicativa ('es lo que ellos profetizan para ustedes').
    rationale: El hebreo הֵמָּה מִתְנַבְּאִים לָכֶם enfatiza que ellos profetizan 'a ustedes' como destinatarios. 'Para ustedes' puede sugerir beneficio o propósito y no reproduce tan bien el dativo.
  - severity: medium
    issue: La sintaxis 'Visión falsa, adivinación, vacío[a] y el engaño de su propio corazón es lo que ellos profetizan...' es poco natural en español.
    rationale: Aunque comprensible, suena forzada. Una formulación verbal directa como 'Les profetizan una visión falsa...' conserva mejor la fluidez y el enlace con el hebreo.
  - severity: low
    issue: La nota al pie usa 'idol' en lugar de 'ídolo'.
    rationale: Es un detalle de calidad editorial en español; debe corregirse al sustantivo español con tilde.
  revised_spanish_text: 'Y Yahvé me dijo: «Los profetas profetizan mentiras en mi nombre. No los envié, ni les mandé, ni les hablé. Les profetizan una visión falsa, adivinación, vacío[a] y el engaño de su propio corazón».'
  revised_footnotes:
  - marker: a
    text: O posiblemente «ídolo»; el término hebreo puede llevar ese sentido en otros contextos.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula final para reflejar con mayor fidelidad el dativo 'a ustedes/les' de לָכֶם y para producir un español más natural y directo. También se normaliza la nota léxica al español ('ídolo').
