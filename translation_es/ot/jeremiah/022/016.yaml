translation:
  language: es
  text: Él juzgó la causa del pobre y del necesitado[a]; entonces le fue bien[b]. ¿No es eso conocerme? declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juzgó el caso del pobre y del necesitado»; el hebreo usa un modismo forense que se refiere a sostener su causa legal.
    reason: lexical_alternative
  - marker: b
    text: Lit., «¿No es eso el conocimiento de mí?»
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּן
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - defendió
  - hizo justicia a
  - defendió la causa de
  lexicon: HALOT
  rationale: El verbo hebreo expresa aquí una acción forense sobre una causa, no mera evaluación mental. «Juzgó» conserva el núcleo judicial que el audit trail inglés mantuvo al revisar «defended» por «judged».
- source_word: דִּין
  english_pob_choice: the cause of
  chosen_spanish: la causa de
  alternatives_spanish:
  - el caso de
  - el derecho de
  - la demanda de
  lexicon: HALOT
  rationale: El sustantivo cognado retoma el ámbito legal de la expresión. «La causa de» es natural en español y preserva el sentido forense y de litigio en favor del vulnerable.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el humilde
  lexicon: HALOT
  rationale: En este contexto social-judicial, עָנִי se refiere a la persona pobre o oprimida. «El pobre» es claro y fiel.
- source_word: אֶבְיוֹן
  english_pob_choice: needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el indigente
  - el desamparado
  lexicon: HALOT
  rationale: Junto con עָנִי, este término intensifica la vulnerabilidad material. «El necesitado» conserva la distinción sin volver redundante la frase en español.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  - así
  - luego
  lexicon: HALOT
  rationale: Marca el resultado de la acción previa. «Entonces» reproduce bien el valor consecutivo/resultativo.
- source_word: טוֹב
  english_pob_choice: it was well
  chosen_spanish: estuvo bien
  alternatives_spanish:
  - fue bueno
  - todo estuvo bien
  - quedó bien
  lexicon: HALOT
  rationale: El adjetivo funciona predicativamente y expresa el resultado favorable. «Estuvo bien» suena natural y breve en español, sin diluir la conclusión del texto.
- source_word: הֲלוֹא
  english_pob_choice: Is not that
  chosen_spanish: ¿No es eso
  alternatives_spanish:
  - ¿Acaso no es eso
  - ¿No es que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. «¿No es eso…?» es idiomático y fiel al efecto retórico.
- source_word: הִיא הַדַּעַת אֹתִי
  english_pob_choice: to know me
  chosen_spanish: conocerme
  alternatives_spanish:
  - el conocimiento de mí
  - conocer a mí
  - saber de mí
  lexicon: HALOT
  rationale: El hebreo literalmente dice «el conocimiento de mí». En español, el infinitivo «conocerme» conserva la relación personal sin forzar una construcción nominal poco natural.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se mantiene de forma solemne y moderna. Se conserva el nombre divino «Yahvé» conforme al estándar del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Conocimiento de Yahvé en contexto ético-covenantal
  english_pob_reading: Relational-covenantal knowledge evidenced by doing justice for the poor and needy
  chosen_spanish_reading: Conocimiento relacional y de pacto que se manifiesta en hacer justicia al pobre y al necesitado
  alternative_spanish_readings:
  - Conocimiento meramente intelectual de Dios
  - Reducción del conocer a una ética social aislada
  rationale: 'La frase final no se limita al dato intelectual; vincula el «conocerme» con la práctica de justicia en favor de los vulnerables. La traducción conserva esa tensión: el acto justo es la evidencia concreta del verdadero conocimiento de Yahvé, pero no se afirma que agote toda relación de pacto.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se prefirió «juzgó» por mayor precisión frente a דָּן דִּין y se simplificó la cláusula final a una pregunta directa («¿No es eso conocerme?») para reflejar más de cerca el hebreo. También se mantuvo la equivalencia de nombre divino con Yahvé, coherente con el estándar del proyecto.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» en la fórmula profética.
  - «Pobre» y «necesitado» distinguen los dos términos hebreos sin redundancia excesiva.
  - La pregunta retórica conserva el vínculo entre justicia social y conocimiento de Yahvé sin resolver la tensión teológica.
  - El estilo es bíblico contemporáneo, digno y publicable, sin calcos innecesarios.
