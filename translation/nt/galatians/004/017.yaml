id: GAL.4.17
reference: Galatians 4:17
source:
  edition: SBLGNT
  text: ζηλοῦσιν ὑμᾶς οὐ καλῶς, ἀλλὰ ἐκκλεῖσαι ὑμᾶς θέλουσιν, ἵνα αὐτοὺς ζηλοῦτε.
translation:
  text: They are zealous for you[a], but not in a good way. Rather, they want to shut you out[b], so that you may be zealous for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are zealous for you, not honorably'; the Greek verb can also carry the sense 'court' or 'seek earnestly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'exclude you.' The sense is likely that they want to cut you off from Paul and his associates so that you will seek them instead.
    reason: alternative_reading
lexical_decisions:
- source_word: ζηλοῦσιν
  lemma: ζηλόω
  chosen: are eager for
  alternatives:
  - are zealous for
  - court
  lexicon: BDAG
  rationale: The verb ζηλόω can denote zealous interest, strong desire, or courting attention/affection. In this context, the parallel with the final ζηλοῦτε and the relational/manipulative sense supports 'are eager for' as natural English that preserves the positive-seeming but ultimately self-serving interest of Paul's opponents without importing a romantic nuance too strongly.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of ζηλοῦσιν and again of ἐκκλεῖσαι; straightforward second person plural, rendered simply as 'you' in English.
- source_word: οὐ καλῶς
  chosen: not in a good way
  alternatives:
  - not rightly
  - not honorably
  - not commendably
  lexicon: BDAG
  rationale: Paul qualifies the opponents' zeal as improper in manner or motive. 'Not in a good way' is idiomatic modern English and preserves the moral evaluation without sounding wooden.
- source_word: ἀλλὰ
  chosen: Rather
  alternatives:
  - but
  lexicon: BDAG
  rationale: Marks a strong contrast explaining the bad motive behind the previous clause. 'Rather' makes the corrective force explicit in readable English.
- source_word: ἐκκλεῖσαι
  lemma: ἐκκλείω
  chosen: to shut you out
  alternatives:
  - to exclude you
  - to shut you off
  lexicon: BDAG
  rationale: The infinitive from ἐκκλείω means to shut out/exclude. 'Shut you out' is vivid and idiomatic, while preserving the social/relational exclusion implied by the verb. 'Exclude you' is possible but slightly more formal and less concrete.
- source_word: θέλουσιν
  chosen: they want
  alternatives:
  - they desire
  - they wish
  lexicon: BDAG
  rationale: Common volitional verb; 'they want' is clear modern English and fits the manipulative purpose construction that follows.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural and sufficiently precise.
- source_word: αὐτοὺς
  chosen: them
  alternatives:
  - those men
  lexicon: BDAG
  rationale: Refers to the agitators/opponents. 'Them' is the natural English pronoun; the antecedent is clear from context.
- source_word: ζηλοῦτε
  chosen: you may be eager for
  alternatives:
  - you may be zealous for
  - you may court
  lexicon: BDAG
  rationale: 'For consistency with the earlier ζηλοῦσιν, the same semantic field should be preserved. ''You may be eager for'' keeps the rhetorical symmetry: they are eager for you in a bad way so that you may be eager for them.'
