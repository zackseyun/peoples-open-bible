translation:
  language: es
  text: No espera volver de la oscuridad[a], y está destinado a la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es vigilado por la espada», «está destinado a la espada» o «la espada lo espera». El verbo hebreo es difícil, y la línea probablemente comunica un juicio violento inminente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: does not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no ...
  lexicon: HALOT
  rationale: La negación simple en español reproduce la función del hebreo לֹא sin añadir matices.
- source_word: יַאֲמִין
  english_pob_choice: expect
  chosen_spanish: espera
  alternatives_spanish:
  - cree
  - confía
  - espera
  lexicon: HALOT
  rationale: Aquí el verbo expresa expectativa respecto del futuro, no fe religiosa; «espera» comunica bien esa expectativa en español.
- source_word: שׁוּב
  english_pob_choice: to return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - volver
  lexicon: HALOT
  rationale: El infinitivo de retorno se expresa de manera natural con «volver» y conserva la idea de retorno desde un estado previo.
- source_word: מִנִּי חֹשֶׁךְ
  english_pob_choice: from darkness
  chosen_spanish: de la oscuridad
  alternatives_spanish:
  - de la oscuridad
  - desde la oscuridad
  lexicon: HALOT
  rationale: «Oscuridad» traduce literalmente חֹשֶׁךְ y funciona bien en español para la condición de calamidad/ruina sugerida por el contexto.
- source_word: וְצָפוּ
  english_pob_choice: is destined
  chosen_spanish: está destinado
  alternatives_spanish:
  - es esperado
  - está señalado
  - está destinado
  lexicon: HALOT
  rationale: La forma es difícil; siguiendo la lectura POB de destino/jucio inminente, «está destinado» preserva la pasividad y el sentido de designación para el castigo.
- source_word: אֱלֵי
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Después de una pasiva/de estado, «para» expresa con naturalidad la finalidad o destino de la espada.
- source_word: חָרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada
  - una espada
  lexicon: HALOT
  rationale: «La espada» conserva el valor figurado de muerte violenta o juicio y sigue el uso convencional del sustantivo con artículo en este contexto.
translation_notes:
  revision_awareness: La redacción sigue el sentido revisado del POB inglés, que pasó de «marked out for the sword» a «destined for the sword» para una equivalencia más natural sin perder la idea de designación hacia juicio violento. Se mantiene además la ambigüedad del verbo hebreo difícil mediante una nota de alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada del proyecto cuando no aparece aquí, sin necesidad en este versículo.
  - «Oscuridad» se mantuvo como traducción directa de חֹשֶׁךְ; no se reemplazó por una paráfrasis interpretativa.
  - «Destinado» preserva el matiz pasivo/appointive del final del verso, coherente con la nota textual del POB inglés.
