translation:
  language: es
  text: Nuestros ojos han visto tus juicios[a], oh Dios; hemos justificado tu nombre honorable para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido dice literalmente: «nuestros ojos dieron tus juicios». Se traduce según el sentido aparente del contexto: «nuestros ojos han visto tus juicios».'
    reason: textual_variant
  - marker: b
    text: 'O: «tu nombre honrado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοσαν
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - han dado
  - han contemplado
  - han reconocido
  lexicon: LSJ
  rationale: El verbo griego transmitido es literalmente «dieron», pero con «nuestros ojos» como sujeto y «tus juicios» como objeto el giro es difícil. Siguiendo el sentido aparente reconocido en el audit trail inglés, «han visto» expresa la percepción que mejor encaja con el contexto inmediato.
- source_word: τὰ κρίματά σου
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tus actos de juicio
  - tus veredictos
  lexicon: LSJ
  rationale: κρίματα se refiere aquí a los actos o decisiones judiciales de Dios. «Juicios» es la equivalencia más directa y natural en español bíblico.
- source_word: ἐδικαιώσαμεν
  english_pob_choice: have justified
  chosen_spanish: hemos justificado
  alternatives_spanish:
  - hemos vindicado
  - hemos declarado justo
  lexicon: LSJ
  rationale: Se conserva «justificado» para reflejar más de cerca ἐδικαιώσαμεν y mantener la relación verbal con δικαιόω. En español, el contexto hace claro que no significa conferir justicia a Dios, sino reconocer y afirmar la rectitud de su nombre.
- source_word: τὸ ὄνομά σου τὸ ἔντιμον
  english_pob_choice: your honored name
  chosen_spanish: tu nombre honrado
  alternatives_spanish:
  - tu nombre honorable
  - tu precioso nombre
  lexicon: LSJ
  rationale: ἔντιμος expresa lo que es tenido en honor o estima. «Honrado» conserva el tono reverente y suena natural en español actual.
- source_word: εἰς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - para los siglos
  lexicon: LSJ
  rationale: La expresión indica duración continua. «Para siempre» es la equivalencia más clara e idiomática en español.
theological_decisions:
- issue: Sentido de ἐδικαιώσαμεν con Dios como objeto implícito a través de «tu nombre»
  english_pob_reading: The English audit trail preserves the formal force of 'have justified' while noting that the line concerns God's honored name.
  chosen_spanish_reading: «Hemos justificado tu nombre honrado» mantiene la fuerza formal del verbo, entendiendo que el sentido es reconocer públicamente la rectitud y honra del nombre de Dios, no hacerlo justo.
  alternative_spanish_readings:
  - hemos vindicado tu nombre honrado
  - hemos declarado justo tu nombre honrado
  rationale: La frase debe conservar la tensión lexical de δικαιόω sin suavizarla demasiado. En este contexto poético, el español puede sostener «justificado» con una nota implícita de reconocimiento/aprobación de la justicia de Dios.
  doctrine_reference: Justicia/rectitud divina; uso relacional de δικαιόω
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió «justified» para ἐδικαιώσαμεν por mayor cercanía formal al griego, sin perder la aclaración contextual sobre el nombre de Dios.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός.
  - Se traduce κρίματα como «juicios», manteniendo el registro bíblico y la relación con el contexto inmediato.
  - Se prefirió «para siempre» por claridad idiomática, aunque «por/para los siglos» sería una alternativa más literal.
  - No se introdujo «Cristo», «SEÑOR» ni otras formas no respaldadas por el texto griego dado.
