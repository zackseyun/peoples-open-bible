revisions:
- from: Y Yahvé oyó su voz y miró su aflicción[a][b], y el pueblo estaba ayunando por muchos días en toda Judea y Jerusalén, delante de las cosas santas del Señor Todopoderoso.
  to: Y Yahvé oyó su voz[a] y miró su aflicción, y el pueblo estaba ayunando por muchos días en toda Judea y Jerusalén, ante las cosas santas[b] de Yahvé Todopoderoso.
  rationale: Se corrige el anclaje de notas para que cada nota explique la palabra o frase pertinente en el texto. Se unifica la representación de κύριος como «Yahvé» en ambas ocurrencias para ajustarse mejor a la pauta del proyecto y a la coherencia interna del versículo. También se suaviza la frase preposicional a «ante las cosas santas» para mejorar la naturalidad del español sin perder el sentido del griego.
