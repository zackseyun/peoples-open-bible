  yaml_path: translation/ot/judges/001/031.yaml
  text: Asher did not drive out the inhabitants of Acco[a], or the inhabitants of Sidon, or Ahlab, or Achzib, or Helbah, or Aphek[b], or Rehob.
  footnotes:
