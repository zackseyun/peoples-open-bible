    text: 'Hebreo: «Lot, hijo de Harán, hijo de su hijo»; es decir, Lot era nieto de Terah.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y llegaron a Harán y vivieron allí». El hebreo dice más literalmente: «Llegaron hasta Harán y se establecieron allí».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de la nota sobre Lot, mejora la naturalidad del español usando «su nieto» en el texto principal mientras preserva la formulación literal en la nota, y suaviza la aposición de Sarai con un artículo. También reubica la nota [b] al segmento final, donde realmente corresponde la alternativa documentada por el English POB. No se requiere adjudicación adicional porque son ajustes claros de fidelidad y legibilidad.
