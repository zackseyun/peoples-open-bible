id: JUD.1.10
reference: Jude 1:10
source:
  edition: SBLGNT
  text: οὗτοι δὲ ὅσα μὲν οὐκ οἴδασιν βλασφημοῦσιν, ὅσα δὲ φυσικῶς ὡς τὰ ἄλογα ζῷα ἐπίστανται, ἐν τούτοις φθείρονται.
translation:
  text: But these people slander whatever they do not understand[a], and whatever they understand naturally, like irrational animals[c][b], by these things they are corrupted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blaspheme' or 'revile' whatever they do not know.
    reason: lexical_alternative
  - marker: b
    text: Or 'whatever they know naturally, like unreasoning animals.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in these things they are corrupted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  chosen: these people
  alternatives:
  - these
  - these men
  lexicon: BDAG
  rationale: Refers to the intruders denounced in context. 'These people' makes the referent clear in natural English without importing a male-specific sense not explicit in the plural demonstrative alone.
- source_word: βλασφημοῦσιν
  chosen: slander
  alternatives:
  - blaspheme
  - revile
  lexicon: BDAG
  rationale: The verb can denote speaking abusively against persons or sacred realities. Here the object is 'whatever they do not understand,' so 'slander' best captures abusive denunciation without restricting the sense to direct blasphemy against God.
- source_word: ὅσα μὲν οὐκ οἴδασιν
  chosen: whatever they do not understand
  alternatives:
  - whatever they do not know
  lexicon: BDAG
  rationale: Although οἶδα is literally 'know,' in this contrast with instinctive apprehension the sense is cognitive comprehension. 'Understand' better fits the polemical contrast.
- source_word: φυσικῶς
  chosen: by instinct
  alternatives:
  - naturally
  - instinctively
  lexicon: BDAG
  rationale: The adverb contrasts with rational or revealed understanding and is clarified by the comparison to animals. 'By instinct' is idiomatic and preserves the force.
- source_word: ἄλογα ζῷα
  chosen: irrational animals
  alternatives:
  - unreasoning animals
  - brute beasts
  lexicon: BDAG
  rationale: ἄλογα emphasizes lack of reason or speech. 'Irrational animals' is clear modern English and preserves the contrast with true understanding.
- source_word: ἐπίστανται
  chosen: understand
  alternatives:
  - know
  - grasp
  lexicon: BDAG
  rationale: In context the verb refers to the limited kind of awareness they possess naturally. 'Understand' keeps the parallel with the earlier clause in English.
- source_word: ἐν τούτοις
  chosen: by these things
  alternatives:
  - in these things
  - by them
  lexicon: BDAG
  rationale: The dative with ἐν can be rendered locally or instrumentally. Here the sense is that the very instincts they follow become the means of ruin, so instrumental 'by these things' best conveys the thought.
- source_word: φθείρονται
  chosen: are being destroyed
  alternatives:
  - are corrupted
  - perish
  lexicon: BDAG
  rationale: The verb can mean moral corruption or ruin/destruction. In Jude's judgment context, both ideas overlap, but 'are being destroyed' best captures the resultant ruin while allowing moral self-corruption to remain implicit.
