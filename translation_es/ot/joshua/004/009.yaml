revisions:
- from: Y Josué levantó doce piedras en medio del Jordán, debajo del lugar donde se detuvieron los pies de los sacerdotes que llevaban el arca del pacto; y allí están hasta hoy[a].
  to: Y Josué levantó doce piedras en medio del Jordán, debajo del lugar donde estaban de pie los pies de los sacerdotes que llevaban el arca del pacto, y allí están hasta hoy[a].
  rationale: Se reemplaza «se detuvieron» por «estaban de pie» para reflejar con mayor fidelidad מַצָּב y evitar un matiz de detención no presente en el hebreo. También se suaviza la puntuación para un español más natural, manteniendo la nota léxica sobre la literalidad de la expresión.
