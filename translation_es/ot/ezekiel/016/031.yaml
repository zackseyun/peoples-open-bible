review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la cláusula temporal, las dos construcciones cultuales, la comparación paradójica con una prostituta y la idea de despreciar el pago. También conserva correctamente la metáfora sexual fuerte de Ezequiel. Sin embargo, la locución final «en que despreciabas el pago» suena poco natural en español y no reproduce con suficiente claridad la fuerza explicativa/formal del inglés auditado «in that you scorned payment».'
  spanish_quality_summary: 'La mayor parte del versículo es clara y digna. «Tu montículo», «tu lugar alto» y «en cada plaza» son lecturas defendibles. El principal problema es de naturalidad y de aparato crítico: la nota [a] está mal anclada, porque explica la cláusula final pero está colocada sobre «prostituta». Además, la redacción de la nota como «O...» no corresponde a una verdadera alternativa textual, sino a una explicación contextual.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: se mantiene «prostituta» y no se suaviza la imagen; «lugar alto» preserva el valor cultual; no hay conflictos con términos troncales del glosario. La única mejora necesaria es ajustar la sintaxis final para un español más idiomático y reubicar la nota al segmento pertinente.'
  issues:
  - severity: medium
    issue: La expresión «en que despreciabas el pago» es poco idiomática en español bíblico natural.
    rationale: Aunque intenta seguir la formalidad de «in that», en español resulta forzada. «porque despreciabas el pago» o «al despreciar el pago» comunican mejor la lógica del hebreo sin perder fidelidad.
  - severity: medium
    issue: La nota [a] está anclada en «prostituta», pero su contenido explica la cláusula final.
    rationale: Según las reglas del proyecto, el marcador debe aparecer exactamente donde corresponde la nota. Aquí la explicación se refiere a «despreciabas el pago», no a «prostituta».
  - severity: low
    issue: La nota se presenta como alternativa con «O ...», pero en realidad funciona como explicación contextual.
    rationale: No ofrece una traducción alternativa distinta; explica la ironía del pasaje. Conviene reformularla como nota explicativa/cross-reference.
  revised_spanish_text: Cuando edificaste tu montículo al comienzo de cada camino y levantaste tu lugar alto en cada plaza, no fuiste como una prostituta, porque despreciabas el pago[a].
