  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה -> ''Yahvé'', מוּסָר -> ''disciplina'', לַחַשׁ con sentido de oración en voz baja. No hay conflicto doctrinal ni terminológico importante. La revisión solo reubica y corrige las notas para preservar las alternativas léxicas documentadas.'
