translation:
  language: es
  text: Él edificó la puerta superior de la casa de Yahvé[a], y en el muro del Ofel edificó mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «edificó mucho», o «edificó en abundancia», en el muro del Ofel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: En español, «edificar» mantiene el sentido de construir/edificar con un registro digno y bíblico, sin forzar «reconstruyó», que no está exigido por el contexto inmediato.
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - portal
  lexicon: HALOT
  rationale: Aunque el hebreo suele referirse a una puerta de acceso fortificada, en español bíblico «puerta» comunica naturalmente la entrada arquitectónica; «portón» sería posible, pero menos estable en registro escritural.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: «Casa de Yahvé» conserva de cerca la expresión hebrea בֵּית יְהוָה y mantiene el nombre divino revelado, en lugar de sustituirlo por un título interpretativo como «templo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La forma de destino del proyecto en español es «Yahvé», transliteración del nombre divino. Se evita «SEÑOR» por la instrucción del proyecto de no ocultar el Tetragrámaton.
- source_word: הָעֶלְיוֹן
  english_pob_choice: upper
  chosen_spanish: superior
  alternatives_spanish:
  - de arriba
  - alto
  lexicon: HALOT
  rationale: Como adjetivo de ubicación aplicado a «puerta», «superior» es el equivalente más natural y preciso en español.
- source_word: וּבְחוֹמַת
  english_pob_choice: and on the wall of
  chosen_spanish: y en el muro de
  alternatives_spanish:
  - y sobre el muro de
  - y junto al muro de
  lexicon: HALOT
  rationale: El hebreo permite la idea de trabajo realizado en la superficie o en relación con el muro; «en el muro de» conserva esa relación sin sobreespecificarla.
- source_word: הָעֹפֶל
  english_pob_choice: the Ophel
  chosen_spanish: el Ofel
  alternatives_spanish:
  - Ophel
  lexicon: HALOT
  rationale: Es un topónimo/proper nombre de Jerusalén; se translitera como «Ofel» para lectura hispana natural y auditable.
- source_word: לָרֹב
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en abundancia
  - ampliamente
  lexicon: HALOT
  rationale: La decisión inglesa reciente de volver a «much» refleja de forma más directa el valor cuantitativo/extentivo de לָרֹב. En español, «mucho» preserva esa fuerza sin añadir una paráfrasis.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre propio divino en transliteración, conforme a la política del proyecto y al testimonio textual del hebreo; no se sustituye por un título eclesial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La base inglesa pasó de «extensively» a «much» para לָרֹב, buscando un reflejo más directo y sobrio. La versión española sigue esa revisión con «mucho» y evita intensificar artificialmente el sentido.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente para יְהוָה.
  - Se translitera «Ofel» como topónimo y no se traduce.
  - «Edificó» mantiene un registro bíblico sobrio y compatible con el paralelismo del versículo.
  - La nota [a] se ancla en «mucho» porque el hebreo permite tanto el adverbio de cantidad como una lectura de abundancia.
