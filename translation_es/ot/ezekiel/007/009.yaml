    rationale: 'La nota dice «Hebreo: “Yahvé” representa el nombre divino YHWH», pero el hebreo no escribe «Yahvé» sino יהוה/YHWH. La nota debe expresar que «Yahvé» es la representación/traducción española del nombre divino YHWH.'
