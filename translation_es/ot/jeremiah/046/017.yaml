translation:
  language: es
  text: 'Allí gritan[a]: «Faraón, rey de Egipto, no es más que un ruido; ha dejado pasar el tiempo señalado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Allí claman: “Faraón, rey de Egipto, no es más que un ruido; ha perdido el momento señalado”». El hebreo es muy breve y burlón; שָׁאוֹן también puede entenderse como «tumulto», «estruendo» o «vana fanfarronería».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ
  english_pob_choice: they cry
  chosen_spanish: gritan
  alternatives_spanish:
  - claman
  - proclaman
  - dicen
  lexicon: HALOT
  rationale: El qal perfecto plural aquí funciona como una proclamación o exclamación. «Gritan» conserva el tono vivo y burlón que la POB inglesa captó con «they cry», sin volverlo excesivamente narrativo ni suavizarlo a un simple «dijeron».
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Es un adverbio locativo simple. «Allí» es la equivalencia más natural y clara en español para el valor espacial de la partícula.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: Faraón, rey de Egipto
  alternatives_spanish:
  - Faraón rey de Egipto
  - Faraón, el rey de Egipto
  lexicon: HALOT
  rationale: Se conserva la aposición real sin añadir una interpretación. La coma ayuda a reflejar la estructura breve del hebreo y mantiene el orden natural en español.
- source_word: שָׁאוֹן
  english_pob_choice: only a noise
  chosen_spanish: no es más que un ruido
  alternatives_spanish:
  - es solo un ruido
  - no es más que tumulto
  - no es más que un estruendo
  lexicon: HALOT
  rationale: 'La POB inglesa entendió el término como desprecio taunting: no solo «ruido», sino algo vacío e ineficaz. «No es más que un ruido» preserva la fuerza despectiva sin añadir contenido no atestiguado.'
- source_word: הֶעֱבִיר
  english_pob_choice: has let ... pass by
  chosen_spanish: ha dejado pasar
  alternatives_spanish:
  - ha hecho pasar
  - ha permitido pasar
  - ha pasado
  lexicon: HALOT
  rationale: El hiphil expresa causar o dejar pasar. «Ha dejado pasar» mantiene el matiz causativo y la idea de oportunidad perdida que la POB inglesa explicó como dejar pasar el momento decisivo.
- source_word: הַמּוֹעֵד
  english_pob_choice: the appointed time
  chosen_spanish: el tiempo señalado
  alternatives_spanish:
  - el momento señalado
  - el tiempo fijado
  - la cita señalada
  lexicon: HALOT
  rationale: En este contexto militar-político, «tiempo señalado» comunica mejor que un término cultual como «fiesta». También conserva el doble sentido de momento determinado y oportunidad decisiva.
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto en inglés no requirió cambios y que la lectura aprobada mantiene la solución óptima ya establecida. La versión española sigue esa misma línea, preservando el tono taunting, la brevedad del hebreo y la ambigüedad léxica de שָׁאוֹן mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como nombre/título tradicional transliterado, coherente con el punto de apoyo del hebreo.
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el Tetragrámaton.
  - «Tiempo señalado» conserva la neutralidad contextual de מוֹעֵד sin cargarlo con sentido litúrgico.
  - La frase breve y sentenciosa respeta la tersura del hebreo, especialmente en la doble acusación de vacío y oportunidad perdida.
