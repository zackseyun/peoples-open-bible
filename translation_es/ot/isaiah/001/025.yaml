base_translation:
  language: en
  yaml_path: translation/ot/isaiah/001/025.yaml
  text: I will turn my hand against you[a], and I will smelt away your dross as with lye[c][b], and remove all your alloy.
  footnotes:
  - marker: a
    text: Or 'upon you'; the Hebrew idiom 'turn my hand upon/against' can introduce either punitive action or purifying intervention. Here the refining imagery suggests judgment with a cleansing purpose.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'lye' refers to an alkali used in cleansing or refining; some render 'with alkali' or 'like soap.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your tin' or 'your base metals'; the Hebrew may refer specifically to tin or more generally to inferior metal mixed into an alloy.
    reason: lexical_alternative
