id: 2KI.21.6
reference: 2 Kings 21:6
source:
  edition: WLC
  text: וְ/הֶעֱבִ֤יר אֶת בְּנ/וֹ֙ בָּ/אֵ֔שׁ וְ/עוֹנֵ֣ן וְ/נִחֵ֔שׁ וְ/עָ֥שָׂה א֖וֹב וְ/יִדְּעֹנִ֑ים הִרְבָּ֗ה לַ/עֲשׂ֥וֹת הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָ֖ה לְ/הַכְעִֽיס־׃
translation:
  text: He made his son pass through the fire[a], practiced soothsaying and divination, and dealt with mediums and spiritists. He multiplied doing what was evil in the eyes of Yahweh[c][b], provoking him to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'He sacrificed his son in the fire.' The Hebrew idiom is literally 'made his son pass through the fire.'
    reason: alternative_reading
  - marker: b
    text: '''Divination'' may also be rendered ''interpreted omens.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'consulted mediums and spiritists.' The Hebrew idiom is difficult and may denote involvement with such practitioners more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱבִיר אֶת־בְּנוֹ בָּאֵשׁ
  chosen: He made his son pass through the fire
  alternatives:
  - He burned his son in the fire
  - He sacrificed his son in the fire
  lexicon: HALOT
  rationale: The Hiphil of עבר with 'son' and 'in/through the fire' is an idiom associated with child sacrifice rites, but the Hebrew wording itself is 'made pass through the fire.' Optimal equivalence preserves the idiom in the main text without over-specifying the exact ritual action; stronger interpretive alternatives are preserved in a footnote.
- source_word: וְעוֹנֵן
  chosen: practiced soothsaying
  alternatives:
  - practiced sorcery
  - practiced augury
  lexicon: HALOT
  rationale: The verb ענן in this context refers to forbidden occult prognostication. 'Soothsaying' is accessible modern English that preserves the divinatory sense without collapsing it into a broader category like 'sorcery.'
- source_word: וְנִחֵשׁ
  chosen: divination
  alternatives:
  - interpreted omens
  - practiced enchantments
  lexicon: HALOT
  rationale: The verb נחשׁ commonly denotes divination, often by omens. Rendering it with the cognate noun after 'practiced soothsaying' gives natural English while keeping the distinct occult practice in view.
- source_word: וְעָשָׂה אוֹב וְיִדְּעֹנִים
  chosen: dealt with mediums and spiritists
  alternatives:
  - consulted mediums and spiritists
  - appointed mediums and spiritists
  - made use of a medium and familiar spirits
  lexicon: HALOT
  rationale: The idiom 'עשה אוב וידענים' is difficult woodenly ('made medium and spiritists'). In context it indicates involvement with or employment of such practitioners. 'Dealt with' is broad enough to cover the Hebrew idiom without forcing a narrower action such as formal appointment or mere consultation. 'Spiritists' renders יִדְּעֹנִים in readable modern English.
- source_word: הִרְבָּה לַעֲשׂוֹת
  chosen: He multiplied doing
  alternatives:
  - He did much
  - He greatly increased in doing
  - He did more and more
  lexicon: HALOT
  rationale: The Hiphil of רבה plus infinitive conveys intensification or abundance. 'He multiplied doing' is slightly marked English but preserves the force of deliberate increase better than a flat 'he did.'
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - what was bad
  lexicon: HALOT
  rationale: The substantivized adjective is naturally rendered 'what was evil,' preserving the moral category.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of' is transparent and preserves the metaphor. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: לְהַכְעִיס
  chosen: provoking him to anger
  alternatives:
  - to provoke him
  - to anger him
  lexicon: HALOT
  rationale: 'The infinitive expresses result/purpose: his actions were such as to provoke YHWH. ''Provoking him to anger'' makes the object explicit in English and preserves the causative force.'
