translation:
  language: es
  text: Dios de los ejércitos[a], restáuranos; haz resplandecer tu rostro[b], y seremos salvos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las huestes». El hebreo puede abarcar fuerzas celestiales, cósmicas o militares; «ejércitos» mantiene esa amplitud.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu rostro». Esta expresión hebrea alude al favor o la presencia benévola de Dios.
    reason: lexical_alternative
  - marker: c
    text: O «seremos librados». El hebreo puede expresar rescate o liberación en sentido amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: En este vocativo, la forma natural y fiel en español es «Dios»; no se requiere un marcador vocativo explícito para conservar la dirección de la súplica.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos celestiales y terrenales
  lexicon: HALOT
  rationale: «Ejércitos» preserva el alcance marcial y cósmico del título sin restringirlo sólo a fuerzas humanas. En español, «Dios de los ejércitos» comunica de forma natural el hebraísmo titulado.
- source_word: הֲשִׁיבֵנוּ
  english_pob_choice: restore us
  chosen_spanish: restáuranos
  alternatives_spanish:
  - haz que volvamos
  - vuélvenos
  lexicon: HALOT
  rationale: El hifil de שוב admite la idea de hacer volver y de restaurar. «Restáuranos» recoge ambas dimensiones en una forma idiomática y orante en español, sin fijar indebidamente si el retorno es geográfico, espiritual o pactual.
- source_word: וְהָאֵר
  english_pob_choice: make your face shine
  chosen_spanish: haz resplandecer
  alternatives_spanish:
  - haz que brille
  - haz brillar
  lexicon: HALOT
  rationale: La forma causativa pide un verbo causativo en español. «Haz resplandecer» mantiene la fuerza verbal y suena más natural con el complemento «tu rostro».
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: «Rostro» preserva el hebraísmo corporal concreto que en la Biblia expresa favor/presencia divina. «Presencia» sería interpretativo y menos transparente para el texto fuente.
- source_word: וְנִוָּשֵׁעָה
  english_pob_choice: and we will be saved
  chosen_spanish: y seremos salvos
  alternatives_spanish:
  - y seremos librados
  - y seremos rescatados
  lexicon: HALOT
  rationale: El nifal de ישׁע puede referir salvación o rescate amplio. «Seremos salvos» mantiene la resonancia bíblica y deja abierta la amplitud semántica del hebreo.
theological_decisions:
- issue: Título divino אֱלֹהִים צְבָאוֹת
  english_pob_reading: God of hosts
  chosen_spanish_reading: Dios de los ejércitos
  alternative_spanish_readings:
  - Dios de los ejércitos celestiales
  - Dios de las huestes
  rationale: Se conserva el peso teológico del título como afirmación de soberanía sobre todas las fuerzas. «Ejércitos» es un equivalente bíblico natural y suficientemente amplio en español, sin reducir el concepto a un mero militarismo.
  doctrine_reference: Salmo 80:8; cf. la función titular de צבאות en la teología del AT
- issue: Alcance de la salvación en וְנִוָּשֵׁעָה
  english_pob_reading: we will be saved
  chosen_spanish_reading: seremos salvos
  alternative_spanish_readings:
  - seremos librados
  - seremos rescatados
  rationale: «Salvos» conserva la amplitud bíblica de rescate/restauración y la resonancia canónica de salvación, sin cerrar el sentido a una sola clase de liberación histórica.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto se ajusta al pasaje hebreo masorético y coincide sustancialmente con la lectura auditada en inglés; no se registraron revisiones aplicadas en el último pase, y se preserva la ambigüedad controlada de los verbos causativos y del término de salvación.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente y directo del vocativo divino sin añadir artículos innecesarios.
  - Se conserva la metáfora corporal «rostro» para no desdibujar el hebraísmo.
  - «Salvos» se usa en sentido bíblico amplio, coherente con el campo semántico del hebreo y con la elección inglesa «saved».
  - 'La puntuación sigue el paralelismo y el ritmo del original: petición, paralelismo causativo y resultado final.'
