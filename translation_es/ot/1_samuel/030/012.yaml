translation:
  language: es
  text: Le dieron un pedazo de torta de higos[a] y dos racimos de pasas[b], y comió, y su espíritu volvió a él[c], porque no había comido pan ni bebido agua durante tres días y tres noches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'torta de higos prensados'; el hebreo se refiere a una torta hecha de higos secos comprimidos.
    reason: cultural_note
  - marker: b
    text: O posiblemente 'dos tortas de pasas'.
    reason: lexical_alternative
  - marker: c
    text: O 'su fuerza volvió a él' o 'revivió'; literalmente, 'su espíritu volvió a él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶלַח דְּבֵלָה
  english_pob_choice: a piece of fig cake
  chosen_spanish: un pedazo de torta de higos
  alternatives_spanish:
  - un trozo de pastel de higos
  - una porción de torta de higos
  - una rebanada de torta de higos
  lexicon: HALOT
  rationale: פֶלַח indica una porción o pedazo, y דְּבֵלָה designa un pastel/torta prensada de higos secos. 'Torta de higos' comunica el alimento antiguo de forma natural en español sin perder la referencia al higo ni exigir la precisión técnica de 'prensada' en el cuerpo del texto.
- source_word: שְׁנֵי צִמֻּקִים
  english_pob_choice: two clusters of raisins
  chosen_spanish: dos racimos de pasas
  alternatives_spanish:
  - dos tortas de pasas
  - dos manojos de pasas
  lexicon: HALOT
  rationale: צִמֻּקִים son pasas. 'Racimos' reproduce de manera natural la imagen de una pequeña agrupación/porción, manteniendo abierta la posible ambigüedad de si eran racimos o tortas compactadas; por eso se evita fijar 'tortas' en el texto principal.
- source_word: רוּחוֹ
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su fuerza
  - revivió
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su espíritu'. En español, 'su espíritu volvió a él' conserva la imagen idiomática sin borrar la posible relación entre espíritu, vigor y reanimación que el contexto permite.
- source_word: וַתָּשָׁב רוּחוֹ אֵלָיו
  english_pob_choice: his spirit returned to him
  chosen_spanish: y su espíritu volvió a él
  alternatives_spanish:
  - y recobró el aliento
  - y volvió en sí
  - y revivió
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y se preserva mejor con una traducción cercana al original. 'Volvió a él' mantiene el movimiento figurado del texto y deja visible la tensión entre literalidad e interpretación funcional.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: לֶחֶם es literalmente 'pan'. En español, 'pan' funciona de forma natural junto con 'agua' y mantiene el contraste de privación básica del pasaje.
- source_word: שָׁתָה מַיִם
  english_pob_choice: drunk water
  chosen_spanish: bebido agua
  alternatives_spanish:
  - tomado agua
  - bebido líquido
  lexicon: HALOT
  rationale: El hebreo especifica 'agua', no una bebida genérica. La forma verbal compuesta con 'haber bebido' conserva bien la negación de la cláusula temporal sin sobrecargar el estilo.
- source_word: שְׁלֹשָׁה יָמִים וּשְׁלֹשָׁה לֵילוֹת
  english_pob_choice: three days and three nights
  chosen_spanish: tres días y tres noches
  alternatives_spanish:
  - tres días y tres noches completas
  lexicon: HALOT
  rationale: La expresión temporal es directa y debe mantenerse sin ajustar el sentido de manera interpretativa.
theological_decisions:
- issue: Sentido de 'su espíritu volvió a él'
  english_pob_reading: Or 'his strength returned to him' or 'he revived'; literally, 'his spirit returned to him.'
  chosen_spanish_reading: '''su espíritu volvió a él'' en el texto principal, con la posibilidad implícita de reanimación o recuperación de fuerzas.'
  alternative_spanish_readings:
  - '''recobró las fuerzas'''
  - '''revivió'''
  rationale: El hebreo permite tanto una lectura más literal como una más funcional. Se conserva la imagen de 'espíritu' para no borrar la formulación del original, mientras que la nota deja abierta la equivalencia semántica con recuperación física.
  doctrine_reference: Antropología bíblica y uso idiomático de רוּחַ en contexto de debilitamiento y recuperación
translation_notes:
  revision_awareness: El audit trail inglés revisó 'a piece of pressed fig cake' a 'a piece of fig cake' por naturalidad, sin cambiar el referente básico. En español se siguió esa misma línea con 'torta de higos' y una nota que preserva la posibilidad de 'higos prensados'. La decisión sobre 'his spirit returned to him' mantiene la literalidad del hebreo, mientras que la nota recoge las equivalencias funcionales ya documentadas en el inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó 'siervo' o 'esclavo' porque no aparecen en el versículo.
  - Se preservó la distinción entre 'espíritu' y 'fuerza' en la nota para no borrar la ambigüedad semántica.
  - '''Pan'' y ''agua'' se dejaron concretos para reflejar la privación básica del hebreo.'
