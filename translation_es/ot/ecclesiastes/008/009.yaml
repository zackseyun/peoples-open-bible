revisions:
- from: Todo esto lo he visto[a], mientras aplicaba mi corazón a toda obra que se hace debajo del sol, en un tiempo cuando un hombre ha dominado sobre otro hombre para su mal.
  to: Todo esto he visto[a], poniendo mi corazón en toda obra que se hace bajo el sol, en un tiempo en que un hombre ha gobernado sobre otro hombre para su perjuicio.
  rationale: La revisión mantiene el sentido y las decisiones del POB inglés, pero corrige calcos y giros poco naturales en español. 'Poniendo mi corazón' conserva la imagen hebrea con mejor fluidez; 'bajo el sol' y 'en un tiempo en que' son más idiomáticos; 'ha gobernado sobre' representa bien שָׁלַט sin dureza innecesaria; y 'para su perjuicio' expresa claramente el daño implicado en לְרַע לוֹ. Se conserva la nota alternativa inclusiva para אָדָם.
  reviewer_model: gpt-5.4
