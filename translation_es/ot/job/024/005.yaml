source:
  edition: WLC
  text: הֵ֤ן פְּרָאִ֨ים בַּֽ/מִּדְבָּ֗ר יָצְא֣וּ בְּ֭/פָעֳלָ/ם מְשַׁחֲרֵ֣י לַ/טָּ֑רֶף עֲרָבָ֥ה ל֥/וֹ לֶ֝֗חֶם לַ/נְּעָרִֽים׀׃
base_translation:
  language: en
  yaml_path: translation/ot/job/024/005.yaml
  text: Look[a], like wild donkeys in the wilderness they go out to their work, seeking prey early; the desert is bread for him[b], for the children.
  footnotes:
  - marker: a
    text: Or 'the steppe provides food for his young ones.' The Hebrew has singular 'for him' and a final noun that could be rendered 'young ones,' 'children,' or 'boys,' depending on how concretely one takes the image.
    reason: lexical_alternative
  - marker: b
    text: '''Seeking food early'' renders a participle that can also be understood as ''rising early for prey/provision.'''
    reason: lexical_alternative
  ai_draft:
