translation:
  language: es
  text: Él hace mis pies como los de ciervas[a], y me afirma sobre mis alturas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como los de venadas»; «ciervas» refleja el femenino plural del hebreo y evoca agilidad y paso seguro.
    reason: lexical_alternative
  - marker: b
    text: O «me pone en mis lugares altos». El hebreo habla de alturas elevadas asociadas con seguridad y triunfo, no necesariamente de lugares de culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׁוֶּה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - hace igual
  - hace semejantes
  - pone
  lexicon: HALOT
  rationale: El participio piel de שוה aquí expresa causar semejanza; en español, 'hace' comunica con naturalidad la idea causativa sin forzar un calco como 'hace igual'.
- source_word: רַגְלַי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis piernas
  - mis pasos
  lexicon: HALOT
  rationale: רֶגֶל designa de forma primaria 'pie'; 'mis pies' conserva la imagen de agilidad y firmeza del paralelismo poético.
- source_word: כָּאַיָּלוֹת
  english_pob_choice: like the feet of deer
  chosen_spanish: como los de ciervas
  alternatives_spanish:
  - como los de ciervos
  - como ciervas
  - como las patas de cierva
  lexicon: HALOT
  rationale: El hebreo usa el plural femenino de אַיָּלָה, por lo que 'ciervas' respeta mejor el matiz léxico que un genérico masculino. En español se sobreentiende 'pies' por el contexto y por la construcción comparativa.
- source_word: בָּמוֹתַי
  english_pob_choice: my heights
  chosen_spanish: mis alturas
  alternatives_spanish:
  - mis alturas elevadas
  - mis lugares altos
  - mis altos lugares
  lexicon: HALOT
  rationale: בָּמוֹת significa literalmente 'alturas' o 'lugares altos'. 'Mis alturas' mantiene la poesía y el posesivo, sin introducir una connotación cultual que el contexto no exige.
- source_word: יַעֲמִדֵנִי
  english_pob_choice: sets me secure
  chosen_spanish: me coloca firmemente
  alternatives_spanish:
  - me hace estar firme
  - me establece con seguridad
  - me mantiene firme
  lexicon: HALOT
  rationale: El hifil de עמד implica 'hacer estar en pie' o 'poner'. 'Me coloca firmemente' conserva el sentido causativo y añade la estabilidad implícita en el contexto de terreno elevado y peligroso.
translation_notes:
  revision_awareness: La versión previa en inglés fue corregida para concordar con el sufijo de primera persona ('my feet' / 'mis pies'); la traducción española sigue esa lectura y conserva la imagen poética de simetría y firmeza. También se mantuvo la preferencia POB por un equivalente natural de 'sets me secure' sin convertirlo en una simple ubicación espacial.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre la imagen de agilidad (ciervas) y la de estabilidad (mis alturas).
  - Se eligió un español natural y reverente, evitando el calco 'hacer igual' y la frase técnica 'lugares altos' en el cuerpo del texto.
  - La segunda cláusula conserva el componente dinámico de poner/establecer y el matiz de firmeza implícita en el audit trail inglés.
