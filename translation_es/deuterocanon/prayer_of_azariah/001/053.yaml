translation:
  language: es
  text: Bendigan al Señor, todo lo que crece sobre la tierra; canten himnos y exáltenlo en gran manera por siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural pide una exhortación litúrgica dirigida a la creación. «Bendecid» conserva el valor de bendecir/alabar que el POB inglés retuvo con 'Bless' y encaja bien en un tono de himno.
- source_word: πάντα τὰ φυόμενα
  english_pob_choice: all things that grow
  chosen_spanish: todos los que crecen
  alternatives_spanish:
  - todas las cosas que crecen
  - toda vegetación
  - todo lo que brota
  lexicon: LSJ
  rationale: El participio presente de φύω expresa lo que está creciendo o brotando. En español, una formulación nominalizada como «los que crecen» suena más natural y mantiene la amplitud del griego sin restringirlo innecesariamente a «vegetación».
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: La preposición con genitivo expresa ubicación. «Sobre la tierra» reproduce ese sentido espacial con fluidez en español y evita un giro demasiado técnico.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: BDAG
  rationale: Siguiendo la decisión del POB de traducir κύριος como 'Lord', en español la equivalencia natural y reverente es «el Señor». Se conserva el artículo porque el griego lo tiene y la fórmula es litúrgica.
- source_word: ὑμνεῖτε
  english_pob_choice: sing hymns
  chosen_spanish: cantad himnos
  alternatives_spanish:
  - entonad himnos
  - cantad alabanzas
  - cantad
  lexicon: BDAG
  rationale: El verbo implica cantar himnos o cantos de alabanza. «Cantad himnos» conserva el matiz musical mejor que un simple «alabad».
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo altamente
  alternatives_spanish:
  - exaltadlo grandemente
  - levantadlo en alto
  - exaltadlo en gran manera
  lexicon: LSJ
  rationale: El compuesto intensifica la acción de exaltar. «Exaltadlo altamente» mantiene la fuerza intensiva y sigue de cerca la decisión inglesa sin sonar del todo extraña en español litúrgico.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre retoma al Señor como objeto directo en español; «lo» es la forma más natural y económica.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: En este contexto doxológico, el modismo expresa perpetuidad. «Por siempre» es claro, reverente y plenamente idiomático en español contemporáneo.
theological_decisions:
- issue: Traducción de κύριος en un refrán litúrgico de la Septuaginta
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: Aunque el proyecto usa «Yahvé» para יהוה cuando el hebreo subyacente lo exige, aquí el texto griego presenta κύριος sin escribir el tetragrámaton. Por eso se conserva la forma litúrgica y doctrinalmente neutra «el Señor», que corresponde al POB inglés y evita introducir una lectura no explicitada por el griego.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; no sustitución automática por el nombre divino cuando el texto fuente es griego.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la decisión inglesa ya estabilizada: refrán exhortativo, vocabulario litúrgico y clausula de eternidad sin cambios textuales relevantes según el informe de revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo el registro litúrgico y coral del original, con imperativos plurales en segunda persona plural.
  - Se evitó «vegetación» para no estrechar indebidamente el sentido de φυόμενα; la formulación elegida preserva amplitud semántica.
  - «El Señor» se conserva por coherencia con el griego κύριον y con la política del POB para este tipo de refranes griegos.
