  to: El pueblo andaba de un lado a otro y lo recogía; lo molían con las piedras de molino o lo machacaban en el mortero, lo cocían en la olla y hacían tortas con ello; y su sabor era como el sabor del aceite sustancioso[a].
  rationale: Se reemplazó «se dispersaba» por «andaba de un lado a otro» para reflejar fielmente el valor de שָׁטוּ según la evidencia fuente y el POB inglés. Se ajustó «lo hacían tortas» a «hacían tortas con ello» para mantener más claramente la relación con el objeto sin sonar forzado. Se cambió «aceite rico» por «aceite sustancioso», una expresión más idiomática y precisa en español para la riqueza/untuosidad del hebreo difícil לְשַׁד הַשָּׁמֶן, conservando la alternativa «aceite fresco» en nota. También se normalizó la puntuación de la nota al pie.
