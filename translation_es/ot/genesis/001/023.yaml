translation:
  language: es
  text: Y hubo tarde[a], y hubo mañana—el quinto día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y fue tarde, y fue mañana—el quinto día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: and there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y fue
  - y aconteció
  - y llegó a ser
  lexicon: HALOT
  rationale: El hebreo וַיְהִי funciona aquí como fórmula narrativa de ocurrencia. «Hubo» comunica de manera natural la existencia/ocurrencia de la tarde y la mañana, conservando el paralelismo repetitivo del relato de creación sin endurecerlo con un calco innecesario.
- source_word: עֶרֶב
  english_pob_choice: evening
  chosen_spanish: tarde
  alternatives_spanish:
  - atardecer
  - noche
  lexicon: HALOT
  rationale: El término denota la fase vespertina del día. En español, «tarde» es una equivalencia breve y natural para esta fórmula fijada; «atardecer» sería más explícito, pero altera la repetición tradicional del pasaje.
- source_word: בֹקֶר
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - alba
  - amanecer
  lexicon: HALOT
  rationale: El sustantivo designa la mañana. «Mañana» es la correspondencia directa y mantiene el paralelismo con «tarde» en la fórmula narrativa.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  lexicon: HALOT
  rationale: יוֹם aquí nombra el día numerado de la creación. «Día» es la equivalencia directa y no introduce por sí misma una interpretación sobre duración o naturaleza.
- source_word: חֲמִישִׁי
  english_pob_choice: fifth
  chosen_spanish: quinto
  alternatives_spanish:
  - 5.º
  lexicon: HALOT
  rationale: El adjetivo ordinal modifica a «día». «Quinto» es el ordinal exacto en español y conserva la secuencia del relato.
theological_decisions:
- issue: Naturaleza del refrán de los días de creación
  english_pob_reading: Retain the literal temporal refrain 'And there was evening, and there was morning—the fifth day' without interpreting the length or nature of the day.
  chosen_spanish_reading: 'Conservar el refrán temporal sin interpretar la duración ni la naturaleza del día: «Y hubo tarde, y hubo mañana: el quinto día».'
  alternative_spanish_readings:
  - «Y fue tarde, y fue mañana…»
  - «Y llegó a ser tarde, y llegó a ser mañana…»
  - Una versión interpretativa que sugiera explícitamente un día de 24 horas o una era
  rationale: El hebreo presenta la fórmula recurrente tarde-mañana junto con el día ordinal, pero no resuelve por sí mismo debates posteriores sobre la duración o el carácter literario de los días de creación. La versión española conserva la tensión textual y evita cerrar una cuestión que el original deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada; se mantiene la lectura estable del refrán de creación sin cambios de sentido.
  spanish_consistency_notes:
  - Se preserva la fórmula repetitiva breve para reflejar el ritmo del texto hebreo.
  - «Tarde» y «mañana» se usan como equivalentes funcionales del binomio עֶרֶב / בֹקֶר, sin añadir explicación temporal externa.
  - No se introduce «SEÑOR» ni otros términos teológicos ajenos al versículo.
  - La nota mantiene la alternativa más literal que el equipo inglés documentó, adaptada al español.
