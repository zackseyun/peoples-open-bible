translation:
  language: es
  text: Y tu sierva[a] tenía dos hijos[b], y los dos pelearon en el campo, y no había quien los separara; entonces el uno golpeó al otro y lo mató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Sierva'' conserva el femenino del hebreo y el matiz deferente de la hablante ante el rey; compárese la opción inglesa ''your servant''.'
    reason: lexical_alternative
  - marker: b
    text: '''Hijos'' traduce el hebreo masculino plural בָנִים y mantiene la relación familiar explícita sin añadir una explicación innecesaria en el cuerpo del texto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשִׁפְחָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu criada
  - tu servidora
  - tu esclava
  lexicon: HALOT
  rationale: שִׁפְחָה es un término femenino de servidumbre; en la boca de una mujer que se dirige al rey funciona como auto-denominación deferente. 'Sierva' conserva el femenino y la humildad, y en español es más natural y reverente que una forma más literal pero menos idiomática.
- source_word: שְׁנֵי בָנִים
  english_pob_choice: two sons
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos hijos varones
  - dos muchachos
  lexicon: HALOT
  rationale: בָנִים puede traducirse como 'hijos' en español sin perder el referente masculino cuando el contexto ya lo establece. 'Hijos' suena más natural que repetir 'varones' aquí; el conteo sigue siendo exacto y la relación familiar queda clara.
- source_word: וַיִּנָּצוּ
  english_pob_choice: fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - se enfrentaron
  - riñeron
  - combatieron
  lexicon: HALOT
  rationale: El verbo indica contienda o lucha física, no solo discusión verbal. 'Pelearon' comunica bien el conflicto que desemboca en muerte y evita suavizar la fuerza del hebreo.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el terreno
  lexicon: HALOT
  rationale: '''Campo'' es el equivalente español natural para el lugar abierto de la escena. Mantiene la sencillez locativa del hebreo.'
- source_word: וְאֵין מַצִּיל בֵּינֵיהֶם
  english_pob_choice: there was no one to separate them
  chosen_spanish: no había quien los separara
  alternatives_spanish:
  - no había rescatador entre ellos
  - no había quien interviniera entre ellos
  lexicon: HALOT
  rationale: מַצִּיל literalmente es 'rescatador/libertador', pero en este contexto la función concreta es intervenir para detener la pelea. 'Separara' expresa la idea idiomática con claridad en español y preserva el trasfondo de falta de auxilio.
- source_word: וַיַּכּוֹ הָאֶחָד אֶת הָאֶחָד
  english_pob_choice: then the one struck the other
  chosen_spanish: entonces el uno golpeó al otro
  alternatives_spanish:
  - entonces uno hirió al otro
  - entonces el uno pegó al otro
  lexicon: HALOT
  rationale: נכה puede ser 'golpear', 'herir' o 'smitir'. 'Golpeó' mantiene la amplitud del acto sin especificar más de lo que el texto dice, y encaja con la progresión hacia la muerte en la cláusula siguiente.
- source_word: וַיָּמֶת אֹתוֹ
  english_pob_choice: and killed him
  chosen_spanish: y lo mató
  alternatives_spanish:
  - y causó su muerte
  - y le dio muerte
  lexicon: HALOT
  rationale: Aunque la forma verbal procede de מות ('morir'), con objeto directo tiene sentido causativo. 'Lo mató' es la manera más directa y fiel de expresar ese resultado en español.
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó 'your servant woman' a 'your servant' para mayor naturalidad, sin cambiar el hecho de que la auto-referencia hebrea es femenina y deferente. La versión española conserva ese matiz con 'sierva' mientras sigue siendo idiomática. También se mantuvo la estructura narrativa y la secuencia causal sin introducir aclaraciones no presentes en el hebreo.
  spanish_consistency_notes:
  - Se prefirió 'sierva' como equivalente reverente y femenino de שִׁפְחָה, evitando 'esclava' porque en español moderno puede sonar más duro de lo que aquí requiere la auto-referencia cortesana.
  - '''Hijos'' y ''lo mató'' mantienen la economía narrativa del hebreo y no añaden sujeto explícito innecesario.'
  - '''Separara'' refleja la función de intervención del מַצִּיל sin convertirla en una traducción más interpretativa de ''rescatara''.'
