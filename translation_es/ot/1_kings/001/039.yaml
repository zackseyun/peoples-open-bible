  to: 'Entonces Sadoc, el sacerdote, tomó el cuerno de aceite de la tienda[a] y ungió a Salomón. Entonces tocaron el cuerno de carnero[b], y todo el pueblo dijo: «¡Viva el rey Salomón!»'
