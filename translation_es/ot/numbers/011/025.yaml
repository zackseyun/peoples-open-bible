translation:
  language: es
  text: Entonces Yahvé descendió en la nube y le habló, y tomó parte del Espíritu que estaba sobre él y lo puso sobre los setenta ancianos. Y cuando el Espíritu reposó sobre ellos, profetizaron, pero no continuaron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no cesaron». La expresión hebrea es breve y ha sido entendida de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Tetragrama (YHWH)
  rationale: Sigo el valor propio del nombre divino, tal como el POB en inglés usa 'Yahweh'. En español, 'Yahvé' es la transliteración usual y mantiene la distinción frente a un simple título como 'SEÑOR'.
- source_word: וַיֵּרֶד
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT
  rationale: El verbo expresa movimiento descendente; 'descendió' preserva con dignidad la escena teofánica sin perder el sentido básico.
- source_word: בֶּעָנָן
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - en una nube
  - con la nube
  lexicon: HALOT
  rationale: La frase con artículo apunta a la nube conocida de la presencia divina en el desierto; 'en la nube' conserva esa referencia sin añadir interpretación excesiva.
- source_word: וַיְדַבֵּר אֵלָיו
  english_pob_choice: spoke to him
  chosen_spanish: le habló
  alternatives_spanish:
  - habló con él
  - le dijo
  lexicon: HALOT
  rationale: דבר אל normalmente se expresa en español como 'hablar a/alguien'; 'le habló' es natural y conserva la dirección del discurso sin sobreespecificarla.
- source_word: וַיָּאצֶל מִן הָרוּחַ אֲשֶׁר עָלָיו
  english_pob_choice: he took some of the Spirit that was on him
  chosen_spanish: tomó parte del Espíritu que estaba sobre él
  alternatives_spanish:
  - tomó un poco del Espíritu que estaba sobre él
  - derivó parte del Espíritu que estaba sobre él
  - apartó del Espíritu que estaba sobre él
  lexicon: HALOT
  rationale: El verbo raro אצל sugiere tomar o separar una porción. 'Tomó parte de' comunica la distribución a los ancianos sin implicar que el Espíritu se agote. Mantengo 'Espíritu' con mayúscula por el contexto de investidura y profecía.
- source_word: רוּחַ
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  - viento
  lexicon: HALOT
  rationale: Aquí se trata del poder/presencia divina que produce profecía; por eso la mayúscula aclara la referencia al Espíritu de Dios, no a un viento ni a una disposición humana.
- source_word: וַיִּתֵּן עַל
  english_pob_choice: put it on
  chosen_spanish: lo puso sobre
  alternatives_spanish:
  - se lo dio a
  - lo colocó sobre
  lexicon: HALOT
  rationale: La preposición עַל conserva la imagen de reposo o colocación sobre los ancianos. 'Lo puso sobre' reproduce esa metáfora de manera clara en español.
- source_word: שִׁבְעִים אִישׁ הַזְּקֵנִים
  english_pob_choice: the seventy men, the elders
  chosen_spanish: los setenta ancianos
  alternatives_spanish:
  - los setenta hombres, los ancianos
  - los setenta hombres ancianos
  lexicon: HALOT
  rationale: El hebreo nombra a los ancianos por su número y su cargo; en español, 'los setenta ancianos' es la forma más natural y fiel, como ya reconoció la revisión inglesa al preferir esta estructura.
- source_word: כְּנוֹחַ עֲלֵיהֶם הָרוּחַ
  english_pob_choice: when the Spirit rested on them
  chosen_spanish: cuando el Espíritu reposó sobre ellos
  alternatives_spanish:
  - cuando el Espíritu descansó sobre ellos
  - cuando el Espíritu se posó sobre ellos
  lexicon: HALOT
  rationale: נוח con על expresa reposar o asentarse. 'Reposó sobre ellos' mantiene la imagen de permanencia tranquila del Espíritu sobre los ancianos.
- source_word: וַיִּתְנַבְּאוּ
  english_pob_choice: they prophesied
  chosen_spanish: profetizaron
  alternatives_spanish:
  - hablaron como profetas
  - ejercieron el don profético
  lexicon: HALOT
  rationale: El hitpael de נבא en este contexto designa acto profético real; 'profetizaron' es la equivalencia directa y transparente.
- source_word: וְלֹא יָסָפוּ
  english_pob_choice: they did not continue
  chosen_spanish: pero no continuaron
  alternatives_spanish:
  - pero no cesaron
  - pero no volvieron a hacerlo
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual preferida por el POB inglés: la profecía no siguió de manera continua. ''No continuaron'' deja abierta la tersa ambigüedad del hebreo y no resuelve silenciosamente la discusión.'
theological_decisions:
- issue: Naturaleza de רוּחַ en el pasaje
  english_pob_reading: divine 'Spirit'
  chosen_spanish_reading: Espíritu divino capitalizado
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto presenta una transferencia de la presencia/poder que estaba sobre Moisés a los ancianos y el resultado es profecía; por eso la referencia es al Espíritu de Dios, no a un espíritu indefinido.
  doctrine_reference: Pneumatología bíblica; lectura contextual del Espíritu como agente de profecía.
- issue: Sentido de וְלֹא יָסָפוּ
  english_pob_reading: the elders' prophesying did not continue
  chosen_spanish_reading: no continuaron
  alternative_spanish_readings:
  - no cesaron
  - no profetizaron otra vez
  rationale: La cláusula es breve y admite más de una lectura. Mantengo una formulación que favorece la continuación no habitual, pero sin borrar la posibilidad alternativa documentada por la tradición interpretativa.
  doctrine_reference: Preservar ambigüedad textual; no cerrar indebidamente una tensión léxica y exegética.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa POB revisada, especialmente la preferencia por 'the seventy elders' frente a una apposición más pesada. También conserva la nota de ambigüedad en וְלֹא יָסָפוּ, sin resolverla más allá de lo que permite el hebreo. La elección de 'Yahvé' responde al estándar terminológico español del proyecto y mantiene el nombre divino en lugar de sustituirlo por un título.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - '''Espíritu'' va con mayúscula por el contexto de investidura divina y profecía.'
  - '''Profetizaron'' conserva el valor verbal directo de נבא sin paráfrasis.'
  - La nota al pie marca la única alternativa relevante preservada por el POB inglés.
