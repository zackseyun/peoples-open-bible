translation:
  language: es
  text: Los extranjeros han devorado[a] su fuerza, pero él no lo sabe. Aun las canas ya están esparcidas sobre él[b], pero él no lo sabe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los extranjeros han consumido su fuerza».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las canas han sido esparcidas sobre él», una imagen de decadencia y envejecimiento.
    reason: cultural_note
lexical_decisions:
- source_word: אָכְלוּ
  english_pob_choice: have devoured
  chosen_spanish: han devorado
  alternatives_spanish:
  - han comido
  - consumen
  lexicon: HALOT
  rationale: El qal perfecto 3cp de אכל se usa aquí en sentido metafórico de consumir o arruinar recursos. «Han devorado» conserva la fuerza vívida del verbo, como en el inglés POB, sin volverlo plano.
- source_word: זָרִים
  english_pob_choice: Strangers
  chosen_spanish: los extraños
  alternatives_spanish:
  - los extranjeros
  - los forasteros
  lexicon: HALOT
  rationale: El término puede referirse a personas ajenas o a potencias externas. «Los extraños» mantiene esa amplitud y suena natural en español; «extranjeros» también es posible, pero puede sonar más restrictivo en algunos contextos.
- source_word: כֹּחוֹ
  english_pob_choice: his strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su poder
  - su vigor
  lexicon: HALOT
  rationale: כֹּחַ designa fuerza, capacidad o poder. «Su fuerza» comunica bien la imagen de agotamiento nacional sin precisar en exceso si es militar, económica o vital.
- source_word: וְהוּא לֹא יָדָע
  english_pob_choice: but he does not know it
  chosen_spanish: pero él no lo sabe
  alternatives_spanish:
  - y él no lo sabe
  - pero no lo percibe
  lexicon: HALOT
  rationale: La cláusula repite la idea de falta de percepción. En español, «no lo sabe» reproduce de forma natural el objeto implícito y mantiene el contraste adversativo.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - también
  lexicon: HALOT
  rationale: 'Aquí intensifica la segunda imagen: no solo se consume la fuerza, sino que además aparece el signo del envejecimiento. «Aun» expresa bien esa escalada.'
- source_word: שֵׂיבָה
  english_pob_choice: gray hair
  chosen_spanish: el cabello cano
  alternatives_spanish:
  - canas
  - cabello gris
  lexicon: HALOT
  rationale: La palabra alude literalmente a la canicie, señal de vejez. «Cabello cano» conserva la imagen concreta y es claro en español bíblico contemporáneo.
- source_word: זָרְקָה
  english_pob_choice: is sprinkled
  chosen_spanish: ha sido esparcido
  alternatives_spanish:
  - está esparcido
  - ha sido salpicado
  lexicon: HALOT
  rationale: El verbo sugiere esparcir o rociar. Como imagen visual sobre la canicie, «ha sido esparcido» comunica la dispersión de canas de modo natural, aunque pierde algo del matiz de “rociado” del hebreo.
- source_word: בּוֹ
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - encima de él
  lexicon: HALOT
  rationale: Con la imagen del cabello cano apareciendo sobre una persona, «sobre él» es la opción más natural y fiel al cuadro metafórico.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC y el audit trail inglés. No hubo revisiones aplicadas en el POB inglés; la versión española refleja la misma lectura base y conserva la metáfora de consumo y canicie esparcida.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se prefirió una construcción verbal natural en español («han devorado», «ha sido esparcido») sin suavizar la metáfora.
  - «Los extraños» se eligió por amplitud semántica, dejando la alternativa «los extranjeros» en nota.
  - Se conservó la repetición de «pero él no lo sabe» para reflejar el énfasis del hebreo.
