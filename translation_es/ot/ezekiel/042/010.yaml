translation:
  language: es
  text: A lo ancho del muro del atrio, hacia el este[a], frente al área separada y frente al edificio[b], había aposentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el ancho del recinto del atrio» o «a lo largo de la anchura del muro del atrio». El hebreo es espacialmente condensado y arquitectónico.
    reason: lexical_alternative
  - marker: b
    text: «El área separada» traduce un término técnico en la visión del templo de Ezequiel para una sección distinta, apartada de las estructuras circundantes.
    reason: cultural_note
lexical_decisions:
- source_word: בְּרֹחַב
  english_pob_choice: along the width of
  chosen_spanish: A lo ancho de
  alternatives_spanish:
  - en el ancho de
  - a lo largo de la anchura de
  lexicon: HALOT
  rationale: El hebreo expresa ubicación/extensión en relación con la anchura; «a lo ancho de» conserva el valor espacial de manera natural en español.
- source_word: גֶּדֶר הֶחָצֵר
  english_pob_choice: the court wall
  chosen_spanish: el muro del atrio
  alternatives_spanish:
  - la cerca del atrio
  - el muro de cerramiento del atrio
  lexicon: HALOT
  rationale: גֶּדֶר puede ser muro, cerca o barrera de cierre. En contexto arquitectónico del templo, «muro» es claro y mantiene la idea de límite del atrio.
- source_word: דֶּרֶךְ הַקָּדִים
  english_pob_choice: toward the east
  chosen_spanish: hacia el este
  alternatives_spanish:
  - al oriente
  - en dirección al este
  lexicon: HALOT
  rationale: דֶּרֶךְ con una dirección cardinal indica orientación o rumbo. «Hacia el este» preserva el sentido direccional sin rigidizarlo como término técnico.
- source_word: אֶל פְּנֵי
  english_pob_choice: facing
  chosen_spanish: frente a
  alternatives_spanish:
  - encaradas a
  - opuestas a
  lexicon: HALOT
  rationale: La expresión repetida señala orientación frontal/opuesta. «Frente a» es una equivalencia breve y natural en descripción arquitectónica.
- source_word: הַגִּזְרָה
  english_pob_choice: the separate area
  chosen_spanish: el área separada
  alternatives_spanish:
  - el lugar separado
  - la zona apartada
  lexicon: HALOT
  rationale: En la visión del templo de Ezequiel, גִּזְרָה designa una sección distinguida y apartada. «Área separada» conserva el valor técnico sin sobreinterpretar.
- source_word: הַבִּנְיָן
  english_pob_choice: the building
  chosen_spanish: el edificio
  alternatives_spanish:
  - la estructura
  - la construcción
  lexicon: HALOT
  rationale: El sustantivo es amplio y arquitectónico; «edificio» es la forma más directa y legible en español.
- source_word: לְשָׁכוֹת
  english_pob_choice: were chambers
  chosen_spanish: había cámaras
  alternatives_spanish:
  - había cuartos
  - eran cámaras
  lexicon: HALOT
  rationale: לְשָׁכוֹת son cámaras o cuartos laterales en contexto del templo. Como el hebreo es elíptico, se suplió el verbo con «había»; «cámaras» conserva el término arquitectónico formal.
theological_decisions:
- issue: Término técnico גִּזְרָה en la visión del templo
  english_pob_reading: The separate area renders a technical term in Ezekiel's temple vision for a distinct section set apart from surrounding structures.
  chosen_spanish_reading: el área separada
  alternative_spanish_readings:
  - el lugar separado
  - la zona apartada
  rationale: No se busca reinterpretar la expresión; se mantiene como designación técnica de una sección diferenciada dentro del complejo.
  doctrine_reference: Ezequiel 40–48; terminología arquitectónica del templo visionario
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión que eliminó la coma tras «wall» por fluidez. En español se evitó una pausa innecesaria y se mantuvo una sola estructura fluida: «A lo ancho del muro del atrio, hacia el este...».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma cuando corresponda; en este versículo no aparece el nombre divino.
  - Se eligió «cámaras» para conservar el registro arquitectónico del templo.
  - «Área separada» mantiene la terminología técnica sin convertirla en paráfrasis interpretativa.
  - La puntuación sigue el orden espacial del hebreo sin añadir comas que rompan la unidad sintáctica.
