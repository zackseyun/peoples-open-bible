translation:
  language: es
  text: Faraón envió[a], y he aquí que no había muerto ni uno del ganado de Israel. Pero el corazón de Faraón se puso pesado[b], y no dejó ir al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «envió»; el objeto del envío queda implícito en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el corazón de Faraón se hizo pesado», una expresión que comunica obstinación sin especificar aquí una agencia explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió a preguntar
  lexicon: HALOT
  rationale: El verbo básico שׁלח significa 'enviar'. En este contexto, el texto da por supuesto el acto de enviar para verificar el informe. 'Envió' conserva la tersura del hebreo sin añadir un objeto no explícito en el versículo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - e incluso
  lexicon: HALOT
  rationale: La partícula introduce una constatación súbita o llamativa. 'Y he aquí' preserva ese valor de atención narrativa con un registro natural y bíblico en español.
- source_word: מִמִּקְנֵה יִשְׂרָאֵל עַד אֶחָד
  english_pob_choice: not even one of Israel’s livestock had died
  chosen_spanish: no había muerto ni uno de los animales de Israel
  alternatives_spanish:
  - no había muerto ni uno del ganado de Israel
  - no había muerto un solo animal del ganado de Israel
  lexicon: HALOT
  rationale: מִקְנֶה abarca ganado/livestock de forma amplia. 'Animales de Israel' comunica el sentido general sin restringirlo a bovinos; 'ni uno' refleja bien el idiomatismo עַד אֶחָד ('ni uno').
- source_word: וַיִּכְבַּד לֵב פַּרְעֹה
  english_pob_choice: Pharaoh’s heart was heavy
  chosen_spanish: el corazón de Faraón se endureció
  alternatives_spanish:
  - el corazón de Faraón se volvió pesado
  - el corazón de Faraón se puso duro
  lexicon: HALOT
  rationale: El hebreo dice literalmente que el corazón de Faraón 'se hizo pesado'. En español, 'se endureció' expresa el resultado idiomático de obstinación con claridad y evita una frase poco natural, aunque se reconoce que el hebreo usa una metáfora de pesadez más que el verbo estándar de endurecer. Se conserva en nota la tensión lexical del original.
- source_word: וְלֹא שִׁלַּח אֶת הָעָם
  english_pob_choice: and he did not let the people go
  chosen_spanish: y no dejó ir al pueblo
  alternatives_spanish:
  - y no soltó al pueblo
  - y no despidió al pueblo
  lexicon: HALOT
  rationale: En Éxodo, שׁלח con objeto humano suele significar liberar/dejar ir. 'Dejó ir' es idiomático en español y comunica la acción sin volverla más formal de lo que el hebreo exige.
theological_decisions:
- issue: La agencia en el endurecimiento del corazón de Faraón
  english_pob_reading: Pharaoh’s heart was heavy / was hardened, preserving the idiom without assigning explicit agency in this verse
  chosen_spanish_reading: el corazón de Faraón se endureció
  alternative_spanish_readings:
  - el corazón de Faraón se puso pesado
  - Faraón endureció su corazón
  rationale: 'Aunque el hebreo usa la metáfora de ''hacerse pesado'', la formulación española ''se endureció'' comunica el efecto teológico-narrativo reconocido en Éxodo: obstinación persistente. Se evita atribuir aquí una agencia explícita que el versículo no enuncia, pero también se evita una traducción demasiado literal que suene extraña en español.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa final prefirió 'was heavy' frente a 'was hardened' para reflejar más directamente וַיִּכְבַּד לֵב פַּרְעֹה y evitar importar una fórmula pasiva de otros pasajes. La presente redacción española mantiene esa atención al hebreo base, pero elige un equivalente idiomático ('se endureció') para conservar naturalidad y la carga narrativa de obstinación sin borrar la metáfora de pesadez, que queda explicitada en la nota.
  spanish_consistency_notes:
  - Se usa 'Faraón' para el nombre propio, coherente con el registro bíblico español.
  - '''Yahvé'' no aparece en este versículo.'
  - Se prefiere 'dejó ir' para שׁלח con objeto humano, en línea con la terminología POB para liberar al pueblo.
  - '''Animales de Israel'' se escoge como paraguas semántico de מִקְנֶה, evitando una restricción indebida a ''ganado'' en sentido estrecho.'
