revisions:
- from: 'Cuando vengáis para presentaros ante mí[a], ¿quién ha pedido esto de vuestra mano: el pisoteo de mis atrios?'
  to: 'Cuando ustedes vienen para presentarse ante mí[a], ¿quién ha requerido esto de su mano: pisotear mis atrios?'
  rationale: Se ajusta el registro al español neutral latinoamericano con «ustedes» y «su». Se cambia «ha pedido» por «ha requerido» para reflejar mejor la fuerza de בִקֵּשׁ en contexto cultual. Se suaviza la nominalización final a «pisotear mis atrios», que conserva el contenido del infinitivo hebreo y fluye con más naturalidad en español tras los dos puntos. La nota sobre «ver mi rostro» se mantiene porque preserva la alternativa literal documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:07:26Z'
