translation:
  language: es
  text: 'Y cuando el alba estaba despuntando, los ángeles apremiaron a Lot, diciendo: «Levántate; toma a tu mujer y a tus dos hijas que están aquí, para que no seas arrastrado en el castigo[a] de la ciudad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la iniquidad de la ciudad» o «por la culpa de la ciudad». El hebreo de עָוֹן puede referirse a iniquidad, culpa o al castigo que resulta de esa culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְמוֹ הַשַּׁחַר עָלָה
  english_pob_choice: And as dawn was rising
  chosen_spanish: Y cuando el alba estaba despuntando
  alternatives_spanish:
  - Y cuando amanecía
  - Y cuando la aurora estaba saliendo
  lexicon: HALOT
  rationale: La imagen combina una partícula temporal-comparativa con ‘alba/dawn’ y el verbo ‘subir/ascender’. «El alba estaba despuntando» conserva la imagen de inicio gradual y suena natural en español sin perder el matiz de avance temporal.
- source_word: וַיָּאִיצוּ
  english_pob_choice: urged
  chosen_spanish: apremiaron
  alternatives_spanish:
  - instaron
  - apresuraron
  lexicon: HALOT
  rationale: El verbo expresa presión para actuar con rapidez. «Apremiaron» mantiene la urgencia y el carácter exhortativo mejor que una forma más genérica.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: HALOT
  rationale: En Génesis 19 se trata de seres celestiales; «ángeles» comunica mejor el referente contextual, aunque el hebreo permita ‘mensajeros’ en otros contextos.
- source_word: קוּם קַח
  english_pob_choice: Get up, take
  chosen_spanish: Levántate; toma
  alternatives_spanish:
  - Ponte en pie; toma
  - Arriba; toma
  lexicon: HALOT
  rationale: Se conservan dos imperativos distintos. «Levántate» reproduce el impulso de קוּם y «toma» traduce קַח de forma directa y idiomática.
- source_word: אֶת אִשְׁתְּךָ וְאֶת שְׁתֵּי בְנֹתֶיךָ
  english_pob_choice: your wife and your two daughters
  chosen_spanish: a tu mujer y a tus dos hijas
  alternatives_spanish:
  - a tu esposa y a tus dos hijas
  - a tu mujer y a tus dos hijas
  lexicon: HALOT
  rationale: Se mantiene el objeto directo con la numeración explícita. «Mujer» refleja fielmente אִשָּׁה en este contexto, con un registro bíblico natural en español.
- source_word: הַנִּמְצָאֹת
  english_pob_choice: who are here
  chosen_spanish: que están aquí
  alternatives_spanish:
  - que se hallan aquí
  - que están presentes
  lexicon: HALOT
  rationale: El participio literalmente sugiere ‘halladas/presentes’. «Que están aquí» comunica de modo claro la distinción contextual entre estas hijas y las que ya no están con Lot.
- source_word: פֶּן תִּסָּפֶה
  english_pob_choice: lest you be swept away
  chosen_spanish: para que no seas arrastrado
  alternatives_spanish:
  - para que no perezcas
  - no sea que seas barrido
  lexicon: HALOT
  rationale: El nifal de ספה puede expresar ser arrebatado o barrido junto con otros. «Arrastrado» preserva la idea de ser llevado con la catástrofe, sin endurecer prematuramente el sentido hacia una sola opción interpretativa.
- source_word: בַּעֲוֺן הָעִיר
  english_pob_choice: in the punishment of the city
  chosen_spanish: junto con la culpa de la ciudad
  alternatives_spanish:
  - en la iniquidad de la ciudad
  - por la culpa de la ciudad
  lexicon: HALOT
  rationale: עָוֹן puede referir a culpa/iniquidad o al castigo consecuente. La fórmula «junto con la culpa de la ciudad» deja abierta la tensión semántica reflejada por el POB inglés, evitando reducirla solo a ‘castigo’ o solo a ‘iniquidad’.
theological_decisions:
- issue: Sentido de עָוֹן en un anuncio de juicio
  english_pob_reading: punishment of the city
  chosen_spanish_reading: junto con la culpa de la ciudad
  alternative_spanish_readings:
  - junto con el castigo de la ciudad
  - junto con la iniquidad de la ciudad
  rationale: El hebreo permite tanto la idea de culpa/iniquidad como la del castigo que recae por esa culpa. En español se mantiene la ambigüedad productiva para no borrar la tensión documentada por el texto y por el aparato auditivo inglés.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo y el consenso del audit trail inglés, pero en español conserva de forma explícita la ambigüedad de עָוֹן que el inglés resolvía como «punishment of the city». No se introdujeron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se mantiene «ángeles» por el contexto narrativo de Génesis 19.
  - «Mujer» traduce el hebreo de forma directa y bíblicamente comprensible en español.
  - La nota a pie de página marca la alternativa semántica relevante sin duplicar el conflicto en el cuerpo principal.
