translation:
  language: es
  text: Cuando David regresó de derribar al filisteo[a], Abner lo tomó y lo llevó ante Saúl, con la cabeza del filisteo en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y la cabeza del filisteo estaba en su mano». El hebreo usa una cláusula sin verbo que puede traducirse como una frase circunstancial o como una cláusula coordinada más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְשׁוּב
  english_pob_choice: When ... returned
  chosen_spanish: Cuando ... regresó
  alternatives_spanish:
  - Y cuando ... regresó
  - Al regresar
  lexicon: HALOT
  rationale: La forma con infinitivo constructo introduce una cláusula temporal; «Cuando ... regresó» conserva la secuencia y suena natural en español sin perder el valor temporal.
- source_word: מֵהַכּוֹת
  english_pob_choice: from striking down
  chosen_spanish: de golpear
  alternatives_spanish:
  - después de matar
  - después de derrotar
  lexicon: HALOT
  rationale: נכה expresa aquí el golpe que resulta en la derrota mortal del filisteo. «Golpear» conserva el verbo concreto de base; «derrotar» suaviza demasiado la imagen y «matar» explicita más de lo que el hebreo dice en esta frase.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo campeón
  - Goliat
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el filisteo». Se mantiene la designación del texto fuente en vez de sustituirla por el nombre propio o una glosa interpretativa.
- source_word: וַיִּקַּח אֹתוֹ
  english_pob_choice: Abner took him
  chosen_spanish: Abner lo tomó
  alternatives_spanish:
  - Abner lo agarró
  - Abner lo llevó
  lexicon: HALOT
  rationale: לקח con objeto pronominal puede traducirse sencillamente «tomó». «Lo tomó» conserva la fuerza básica sin añadir violencia ni anticipar el verbo siguiente.
- source_word: וַיְבִאֵהוּ לִפְנֵי שָׁאוּל
  english_pob_choice: brought him before Saul
  chosen_spanish: lo llevó ante Saúl
  alternatives_spanish:
  - lo condujo ante Saúl
  - lo llevó a la presencia de Saúl
  lexicon: HALOT
  rationale: El hiphil de בוא aquí significa «traer/llevar». «Ante Saúl» reproduce con naturalidad לִפְנֵי y mantiene el sentido de presentar a alguien delante de otra persona.
- source_word: וְרֹאשׁ הַפְּלִשְׁתִּי בְּיָדוֹ
  english_pob_choice: with the Philistine’s head in his hand
  chosen_spanish: con la cabeza del filisteo en su mano
  alternatives_spanish:
  - y la cabeza del filisteo estaba en su mano
  - mientras llevaba la cabeza del filisteo
  lexicon: HALOT
  rationale: La cláusula hebrea es nominal y puede entenderse como circunstancia acompañante. En español, «con ... en su mano» expresa de modo idiomático esa imagen, manteniendo la ambigüedad del referente más inmediato sin forzar una paráfrasis.
translation_notes:
  revision_awareness: Coincide con el texto hebreo masorético y con la lectura auditada en inglés; se conserva la estructura temporal, la referencia genérica a «el filisteo» y la cláusula nominal final con una nota de alternativa formal.
  spanish_consistency_notes:
  - Se usa «filisteo» en minúscula como gentilicio étnico, conforme al contexto bíblico.
  - Se mantiene «Saúl» y «Abner» como nombres propios transliterados de forma estándar.
  - La puntuación y el uso de pronombres enclíticos siguen el español moderno y no añaden información ausente en el hebreo.
