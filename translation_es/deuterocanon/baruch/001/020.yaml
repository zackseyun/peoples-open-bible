  language: en
  yaml_path: translation/deuterocanon/baruch/001/020.yaml
  text: And the calamities and the curse that the Lord appointed for Moses his servant clung to us[a], on the day when he brought our fathers out to give us a land flowing with milk and honey[c][b], as it is this day.
  footnotes:
