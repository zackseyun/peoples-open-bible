translation:
  language: es
  text: Los príncipes de Judá se han vuelto como los que mueven un mojón[a]; sobre ellos derramaré mi ira como agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como los que desplazan un lindero». La imagen puede referirse literalmente a mover marcas de propiedad o figuradamente a violar límites fijados por Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיוּ
  english_pob_choice: have become
  chosen_spanish: se han vuelto
  alternatives_spanish:
  - eran
  - han llegado a ser
  lexicon: HALOT
  rationale: El qatal de היה puede expresar un estado resultado. «Se han vuelto» comunica bien la idea de que los príncipes llegaron a ser semejantes a los que desplazan linderos, sin reducirlo a un simple pasado descriptivo.
- source_word: שָׂרֵי יְהוּדָה
  english_pob_choice: the princes of Judah
  chosen_spanish: los príncipes de Judá
  alternatives_spanish:
  - los líderes de Judá
  - los oficiales de Judá
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a gobernantes, príncipes u কর্মকর্তales. «Príncipes» conserva el matiz elevado y político que la POB inglesa también preserva.
- source_word: כְּמַסִּיגֵי גְּבוּל
  english_pob_choice: like those who move a boundary marker
  chosen_spanish: como los que mueven un mojón
  alternatives_spanish:
  - como los que quitan un lindero
  - como los que desplazan un límite
  - como los que mueven un mojón de lindero
  lexicon: HALOT
  rationale: El participio con גְּבוּל evoca la acción ilícita de mover linderos o marcadores de propiedad. «Mojón» es un término claro en español para esa marca física y conserva la imagen concreta del texto.
- source_word: גְּבוּל
  english_pob_choice: boundary marker
  chosen_spanish: mojón
  alternatives_spanish:
  - lindero
  - límite
  - marca de lindero
  lexicon: HALOT
  rationale: Aunque גְּבוּל puede significar «frontera» o «límite», en este dicho alude a un hito territorial o de propiedad. «Mojón» expresa mejor el objeto concreto implicado en la transgresión.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - sobre sus cabezas
  lexicon: HALOT
  rationale: La preposición más el pronombre introduce el destinatario del juicio. «Sobre ellos» mantiene la relación espacial del hebreo y deja abierta la fuerza judicial implícita.
- source_word: אֶשְׁפּוֹךְ
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - verteré
  - esparciré
  lexicon: HALOT
  rationale: שׁפך en contextos de juicio se traduce naturalmente por «derramar». Esa elección conserva la metáfora de una ira abundante y vertida sobre los culpables.
- source_word: כַּמַּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - como las aguas
  - como un torrente
  lexicon: HALOT
  rationale: El texto dice literalmente «como agua»; la comparación expresa abundancia e intensidad sin añadir una imagen de crecida que el hebreo no explicita.
- source_word: עֶבְרָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furia
  - mi indignación
  lexicon: HALOT
  rationale: עֶבְרָה designa ira intensa, especialmente divina. «Ira» es breve, natural en español bíblico actual y suficientemente fuerte; «furia» podría sonar más interpretativa.
theological_decisions:
- issue: Naturaleza de la acusación contra los príncipes de Judá
  english_pob_reading: A metaphor of covenantal and social violation is preserved without over-specifying whether the 'boundary' is literal land theft, political encroachment, or moral transgression.
  chosen_spanish_reading: Se conserva la metáfora de una violación de límites sociales y de pacto, sin precisar si el mojón es literal o si la imagen apunta de forma figurada a una transgresión más amplia.
  alternative_spanish_readings:
  - Se refiere a robo literal de tierras o alteración de propiedades
  - Alude de manera figurada a límites fijados por Dios
  - Puede apuntar a una invasión política o territorial
  rationale: El hebreo mantiene deliberadamente abierta la referencia. La traducción en español conserva la imagen concreta del mojón y no resuelve la tensión interpretativa en el cuerpo del versículo.
  doctrine_reference: Preservar la tensión exegética sin cerrarla prematuramente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés: mantiene el estado resultante de היה, la imagen legal concreta de גְּבוּל, y el simile de juicio «como agua» sin intensificarlo más allá del hebreo. No se registraron revisiones posteriores en el expediente.'
  spanish_consistency_notes:
  - Se usa «Judá» y «Yahvé» según el estándar del proyecto, pero en este versículo no aparece el nombre divino.
  - Se prefirió «ira» por ser más sobria y directa que «furia» en español bíblico moderno.
  - «Mojón» se eligió por su valor concreto y por mantener la tensión entre lectura literal y figurada del límite.
