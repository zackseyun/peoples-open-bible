translation:
  language: es
  text: los diez hijos de Amán, hijo de Hamdatá, el enemigo de los judíos, mataron; pero no echaron mano al botín[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֶׂרֶת
  english_pob_choice: the ten
  chosen_spanish: los diez
  alternatives_spanish:
  - diez
  lexicon: HALOT
  rationale: En español, el numeral cardinal funciona naturalmente en esta construcción nominal; el artículo se omite o se integra según el estilo. «Los diez» reproduce con claridad el grupo total.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos varones de
  - descendientes de
  lexicon: HALOT
  rationale: El contexto inmediato identifica a los descendientes masculinos de Haman. «Hijos de» mantiene la relación genealógica sin volverla más amplia que el hebreo inmediato.
- source_word: הָמָן
  english_pob_choice: Haman
  chosen_spanish: Haman
  lexicon: transliteration
  rationale: Nombre propio transliterado de forma estándar.
- source_word: בֶּן הַמְּדָתָא
  english_pob_choice: son of Hammedatha
  chosen_spanish: hijo de Hamdatá
  alternatives_spanish:
  - hijo de Hammedatá
  - hijo de Hammedata
  lexicon: transliteration
  rationale: Se conserva la genealogía con transliteración al español. La forma «Hamdatá» evita una transliteración excesivamente inglesa y se ajusta a la pronunciación española, manteniendo el referente personal.
- source_word: צֹרֵר הַיְּהוּדִים
  english_pob_choice: the enemy of the Jews
  chosen_spanish: el enemigo de los judíos
  alternatives_spanish:
  - el adversario de los judíos
  - el enemigo de los judíos
  lexicon: HALOT
  rationale: צֹרֵר expresa hostilidad activa o aflicción. «Enemigo» es la equivalencia natural y clara en español, coherente con la apposición explicativa del pasaje.
- source_word: הָרָגוּ
  english_pob_choice: they killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - mataron
  lexicon: HALOT
  rationale: Verbo directo y moderno que reproduce el perfecto 3cp de הרג sin arcaísmo.
- source_word: וּבַבִּזָּה
  english_pob_choice: but ... on the plunder
  chosen_spanish: pero no ... al botín
  alternatives_spanish:
  - y ... al botín
  - pero ... al botín
  lexicon: HALOT
  rationale: בִּזָּה significa «botín»/«saqueo». El contraste del verso se expresa con «pero» para hacer explícita la oposición narrativa entre matar y no apropiarse de bienes, sin alterar el sentido del waw coordinante.
- source_word: לֹא שָׁלְחוּ אֶת יָדָם
  english_pob_choice: they did not lay a hand
  chosen_spanish: no echaron mano
  alternatives_spanish:
  - no pusieron la mano
  - no extendieron la mano
  lexicon: HALOT
  rationale: Es un modismo bien entendido en español para no tomar o no apoderarse de algo. Conserva la imagen corporal del hebreo con naturalidad.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés y con la revisión más reciente: no se detectaron cambios necesarios. Se mantuvo el sentido narrativo y la tensión entre «botín» y el modismo de no tomarlo.'
  spanish_consistency_notes:
  - Se usa «judíos» de forma consistente con el referente del hebreo.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se eligió «hijo de» para preservar la relación genealógica explícita.
  - El modismo hebreo de no extender la mano se naturaliza como «no echaron mano», sin perder la imagen de apropiación.
