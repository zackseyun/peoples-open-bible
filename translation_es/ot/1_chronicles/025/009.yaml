    issue: '''sus hijos'' no preserva con suficiente precisión וּבָנָיו'
    rationale: En español, 'hijos' puede ser mixto; el hebreo aquí especifica varones. Dado que el inglés POB conservó 'sons', conviene explicitar 'hijos varones' para mantener la fuerza léxica sin ambigüedad.
  - severity: medium
    issue: La nota b no coincide con la razón documentada en el audit trail
    rationale: La nota inglesa b explica la forma del nombre Gedaliah/Gedaliahu. El borrador español la reemplazó por una nota sobre 'hijos', introduciendo una justificación distinta y omitiendo la alternativa documentada para el nombre propio.
  revised_spanish_text: La primera suerte salió para Asaf[a], para José; Gedalías[b], la segunda; él y sus hermanos y sus hijos varones, doce.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática en el contexto de echar suertes: «La primera suerte cayó para Asaf, para José».'
    reason: lexical_alternative
  - marker: b
    text: Gedalías representa la forma hebrea Gedalyahu; también puede transliterarse más de cerca como «Guedalyahu».
    reason: lexical_alternative
