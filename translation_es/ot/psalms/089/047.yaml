translation:
  language: es
  text: ¿Hasta cuándo[a], Yahvé? ¿Te esconderás para siempre? ¿Arderá tu ira como fuego?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: עַד מָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo más?
  - ¿Por cuánto tiempo?
  - ¿Hasta cuándo será?
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula idiomática de lamentación que pregunta por la duración del sufrimiento; «¿Hasta cuándo?» comunica de forma natural y reverente ese sentido en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del tetragrámaton según la norma del proyecto en español: «Yahvé», en lugar de sustituirlo por un título. Esto mantiene la referencia personal al Dios del pacto.'
- source_word: תִּסָּתֵר
  english_pob_choice: will you hide yourself
  chosen_spanish: ¿Te esconderás
  alternatives_spanish:
  - ¿Te ocultarás
  - ¿Permanecerás escondido
  lexicon: HALOT
  rationale: 'El nifal tiene aquí un matiz reflexivo/pasivo: Dios aparece como ocultándose o quedando oculto. «Te esconderás» es idiomático en español y preserva la fuerza de la queja.'
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - perpetuamente
  lexicon: HALOT
  rationale: La expresión indica duración indefinida. «Para siempre» es la equivalencia natural y clara en español contemporáneo.
- source_word: תִּבְעַר
  english_pob_choice: will ... burn
  chosen_spanish: Arderá
  alternatives_spanish:
  - Quemará
  - Blazará
  lexicon: HALOT
  rationale: El verbo בער comunica la imagen de arder; en español, «arderá» conserva la metáfora del fuego sin intensificarla indebidamente.
- source_word: כְּמוֹ אֵשׁ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como una llama
  - cual fuego
  lexicon: HALOT
  rationale: La comparación es directa. «Como fuego» resulta natural en español y mantiene la imagen comparativa sin añadir elementos no presentes.
- source_word: חֲמָתֶךָ
  english_pob_choice: your wrath
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu furia
  - tu enojo
  - tu cólera
  lexicon: HALOT
  rationale: El sustantivo puede abarcar ira, furia o cólera. «Ira» conserva el registro elevado adecuado en un salmo y es comprensible para lectores modernos.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo invoca directamente a YHWH. Conforme a la práctica doctrinal del proyecto para el español, se usa la transliteración «Yahvé» para preservar el nombre propio y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el ancla [a] en el texto español para que la nota de nombre divino quede correctamente vinculada. No se introdujeron cambios de sentido respecto del borrador auditado; la versión mantiene la equivalencia óptima con el hebreo y la decisión proyectual de usar Yahvé.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente en segunda persona singular, coherente con el hebreo.
  - «Ira» se eligió por registro y claridad; no se suavizó a un término menos intenso.
  - La pregunta inicial conserva el carácter de lamento urgente del salmo.
  - La nota [a] está anclada directamente en «Yahvé» para reflejar la decisión sobre el tetragrámaton.
