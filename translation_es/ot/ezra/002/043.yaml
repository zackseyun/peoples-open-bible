  glossary_alignment: No hay conflictos con los términos teológicos del proyecto. Para הַנְּתִינִים, 'servidores del templo' encaja mejor que 'sirvientes del templo' con la decisión funcional del POB en inglés y con un registro español más natural y digno. 'Los hijos de' conserva correctamente בְּנֵי, con nota alternativa sobre 'descendientes de'. Los nombres propios pueden mantenerse como Ziha, Hasufa y Tabbaot en español, pero la nota sobre Hashufa debe presentarse como variante de transliteración, no como rasgo de 'tradiciones inglesas'.
