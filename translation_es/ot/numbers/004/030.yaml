translation:
  language: es
  text: 'Desde los treinta años de edad y en adelante, hasta los cincuenta años de edad, los contarás: todo aquel que entra[a] al servicio[b] para realizar la obra de la tienda de reunión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo aquel que viene para el deber».'
    reason: alternative_reading
  - marker: b
    text: «Servicio» traduce un término que también puede denotar una compañía o un cuerpo organizado; aquí se refiere al deber asignado de los levitas.
    reason: cultural_note
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמַעְלָה
  english_pob_choice: From thirty years old and upward
  chosen_spanish: Desde los treinta años de edad y en adelante
  alternatives_spanish:
  - Desde el hijo de treinta años y en adelante
  - Desde los treinta años de edad y arriba
  lexicon: HALOT
  rationale: La construcción hebrea es un modismo de edad; en español, «desde los treinta años de edad y en adelante» preserva el umbral sin calcar «hijo de». «Y en adelante» mantiene el matiz de extensión progresiva.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: up to fifty years old
  chosen_spanish: hasta los cincuenta años de edad
  alternatives_spanish:
  - y hasta los cincuenta años de edad
  - incluso hasta los cincuenta años de edad
  lexicon: HALOT
  rationale: «Hasta» reproduce con naturalidad el límite superior del rango de edad, manteniendo la claridad del hebreo sin añadir énfasis innecesario.
- source_word: תִּפְקְדֵם
  english_pob_choice: you shall count them
  chosen_spanish: los contarás
  alternatives_spanish:
  - los numerarás
  - los pasarás revista
  lexicon: HALOT
  rationale: En este contexto censal, פקד significa contar o registrar. «Los contarás» es directo y fiel; «numerarás» y «pasarás revista» son posibles, pero menos naturales o más interpretativos en español.
- source_word: כָּל הַבָּא
  english_pob_choice: everyone who enters
  chosen_spanish: todo aquel que entra
  alternatives_spanish:
  - todo el que entra
  - todos los que entran
  lexicon: HALOT
  rationale: El participio distributivo con כָּל se expresa bien con «todo aquel que entra», conservando el sentido individual de cada persona que se incorpora.
- source_word: לַצָּבָא
  english_pob_choice: the service
  chosen_spanish: al servicio
  alternatives_spanish:
  - al deber
  - al ejército
  - a la host
  lexicon: HALOT
  rationale: Aquí צָבָא no apunta a combate sino a una función organizada y asignada. «Al servicio» conserva la idea institucional sin militarizar indebidamente el pasaje; es el equivalente más natural para español.
- source_word: לַעֲבֹד
  english_pob_choice: to do
  chosen_spanish: para realizar
  alternatives_spanish:
  - para hacer
  - para servir
  lexicon: HALOT
  rationale: El infinitivo expresa el desempeño de una tarea asignada. «Para realizar» evita la repetición redundante de «servicio» y mantiene el valor de ejecución concreta de la labor.
- source_word: עֲבֹדַת
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - el servicio
  lexicon: HALOT
  rationale: «עֲבֹדָה» puede ser trabajo, labor o servicio. «La obra» suena digna y adecuada para una tarea sagrada, sin perder el sentido de labor asignada. Se distingue así de «al servicio» en la frase anterior.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la Tienda de Reunión
  lexicon: HALOT
  rationale: «אֹהֶל מוֹעֵד» designa el santuario portátil; «tienda de reunión» sigue de cerca la forma hebrea y mantiene un registro sobrio. Se evita «tabernáculo» por ser más tradicional y menos transparente respecto del hebreo.
theological_decisions:
- issue: Nuance institucional de לַצָּבָא en un contexto levítico
  english_pob_reading: the service
  chosen_spanish_reading: al servicio
  alternative_spanish_readings:
  - al deber
  - al ejército
  - a la host
  rationale: El texto describe la incorporación de levitas a una labor ordenada del tabernáculo, no a combate. «Al servicio» conserva la estructura asignada del trabajo sin introducir una lectura militar que el contexto no exige.
  doctrine_reference: Principio de primacía del texto original y de evitar sobrerrepresentar imágenes militares ausentes en el pasaje.
- issue: Naturaleza del término עֲבֹדַת en combinación con לַצָּבָא
  english_pob_reading: the work of the tent of meeting
  chosen_spanish_reading: la obra de la tienda de reunión
  alternative_spanish_readings:
  - el trabajo de la tienda de reunión
  - el servicio de la tienda de reunión
  rationale: La combinación apunta a la tarea concreta que se realiza en el santuario. «Obra» mantiene dignidad y concreción; «servicio» podría duplicar el valor de לַצָּבָא y hacer menos visible la distinción entre la asignación general y la labor específica.
  doctrine_reference: Traducir con precisión funcional sin borrar distinciones léxicas del hebreo.
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y el audit trail inglés, sin cambios de revisión aplicados en la versión más reciente; la propuesta mantiene la lectura acordada y alta coincidencia del control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - Se prefirió «tienda de reunión» para אֹהֶל מוֹעֵד, en coherencia con el estilo transparente del proyecto.
  - «Servicio» se usa para לַצָּבָא con nota explicativa, conservando el matiz organizativo documentado en el audit trail.
  - «Obra» se reserva para עֲבֹדַת para distinguir la tarea específica de la asignación general.
