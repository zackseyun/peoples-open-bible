translation:
  language: es
  text: Cuando Aram vio[a] que había sido derrotado ante Israel, se reunieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Aram vio que había sido derrotado ante Israel, y se reunieron». El hebreo usa el nombre propio singular «Aram» en sentido colectivo para los arameos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: La forma con waw consecutiva marca avance narrativo y, en español, 'Cuando' comunica con naturalidad la relación temporal con la acción siguiente sin perder el valor básico de 'ver'.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, como en el audit trail inglés. El hebreo usa la forma singular, con sentido colectivo; el español puede mantener 'Aram' y dejar que el contexto militar sugiera el conjunto.
- source_word: נִגַּף
  english_pob_choice: had been defeated
  chosen_spanish: había sido derrotado
  alternatives_spanish:
  - había sido batido
  - había sido vencido
  - había sido abatido
  lexicon: HALOT
  rationale: El nifal expresa haber sufrido derrota en combate. 'Derrotado' es claro y natural en español moderno; evita sobreespecificar la imagen física y mantiene el valor militar del pasaje.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - frente a
  - en presencia de
  lexicon: HALOT
  rationale: En contexto bélico, la expresión señala la posición de desventaja frente a Israel. 'Delante de' reproduce bien la relación espacial/relacional y suena más natural que un calco rígido.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio conservado sin cambios.
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: they gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  - se ensamblaron
  lexicon: HALOT
  rationale: El nifal de אסף aquí tiene sentido de reunirse/agruparse. 'Se reunieron' es idiomático y suficientemente amplio para el contexto militar sin añadir una lectura demasiado técnica como 'reagruparse'.
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - en conjunto
  - así juntos
  lexicon: HALOT
  rationale: El adverbio indica acción conjunta; 'juntos' es la forma más natural en español. Se evita duplicar innecesariamente la idea con una construcción pesada.
theological_decisions:
- issue: Nombre colectivo singular 'Aram' y referencia a un grupo/plural implícito
  english_pob_reading: The Hebrew uses the singular proper name 'Aram' collectively for the Arameans.
  chosen_spanish_reading: Se mantiene 'Aram' en el texto principal y se deja la lectura colectiva en una nota.
  alternative_spanish_readings:
  - los arameos
  - Siria
  rationale: El hebreo conserva la forma singular del nombre propio, pero el sentido es colectivo. Mantener 'Aram' respeta el dato léxico; la nota aclara que se refiere a los arameos como grupo, sin sustituir el nombre por una etnia o una geografía diferente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se preserva el nombre propio singular ''Aram'', el valor temporal de la waw consecutiva y la pasiva de derrota. La revisión más reciente indicó que no se requerían cambios.'
  spanish_consistency_notes:
  - Se mantiene 'Aram' como transliteración consistente con el nombre propio hebreo y con la práctica del POB.
  - '''Derrotado'' refleja la derrota militar sin introducir una metáfora adicional.'
  - '''Se reunieron juntos'' reproduce la redundancia suave del hebreo וַיֵּאָסְפוּ יָחַד sin volverla demasiado pesada en español.'
  - La nota al pie explicita la lectura colectiva para evitar ambigüedad en español.
