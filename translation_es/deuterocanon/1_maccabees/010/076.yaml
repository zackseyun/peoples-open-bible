translation:
  language: es
  text: Y los que estaban en la ciudad, como tenían miedo, abrieron las puertas[a], y Jonatán tomó el control de Jope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abrieron»; el griego no dice explícitamente «abrieron las puertas», aunque eso es lo más probable por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβηθέντες
  english_pob_choice: being afraid
  chosen_spanish: al temer
  alternatives_spanish:
  - estando atemorizados
  - por temor
  lexicon: LSJ
  rationale: El participio aoristo pasivo funciona aquí como circunstancia causal o temporal. «Al temer» conserva esa relación sin añadir intensidad interpretativa ni un giro demasiado pesado.
- source_word: οἱ ἐκ τῆς πόλεως
  english_pob_choice: those in the city
  chosen_spanish: los que estaban en la ciudad
  alternatives_spanish:
  - los de la ciudad
  - los habitantes de la ciudad
  lexicon: LSJ
  rationale: La expresión griega literalmente dice «los de la ciudad», pero el contexto militar hace natural entenderlos como los que estaban dentro de la ciudad. «Los que estaban en la ciudad» evita especificar más de lo que el griego da.
- source_word: ἤνοιξαν
  english_pob_choice: opened the gates
  chosen_spanish: abrieron las puertas
  alternatives_spanish:
  - abrieron
  - abrieron las puertas de la ciudad
  lexicon: LSJ
  rationale: El verbo solo dice «abrieron». El contexto sugiere las puertas, pero no lo expresa de manera explícita. En español, «abrieron las puertas» comunica la implicación contextual sin forzar una precisión inexistente en el texto griego.
- source_word: ἐκυρίευσεν
  english_pob_choice: took control of
  chosen_spanish: tomó control de
  alternatives_spanish:
  - se apoderó de
  - ganó dominio sobre
  lexicon: LSJ
  rationale: κυριεύω denota ejercer dominio, señorío o control. «Tomó control de» reproduce bien el sentido político-militar y evita reducirlo indebidamente a «capturó».
- source_word: Ἰόππης
  english_pob_choice: Joppa
  chosen_spanish: Jope
  alternatives_spanish:
  - Jaffa
  - Jope
  lexicon: LSJ
  rationale: Para el topónimo, «Jope» es la forma tradicional en español bíblico y resulta claramente identificable. Mantiene equivalencia funcional con «Joppa» en inglés.
theological_decisions:
- issue: Alcance de la acción de abrir
  english_pob_reading: opened the gates, though that is likely implied by the context
  chosen_spanish_reading: abrieron las puertas, con la misma reserva implícita del contexto
  alternative_spanish_readings:
  - abrieron
  - abrieron las puertas de la ciudad
  rationale: 'No se debe borrar la tensión lexical: el griego no nombra explícitamente el objeto. La redacción española sigue la inferencia contextual, pero la nota preserva la alternativa más literal «abrieron».'
  doctrine_reference: Fidelidad textual y prudencia exegética; no hay implicación doctrinal directa.
translation_notes:
  revision_awareness: El texto inglés final pasó de «those from the city» a «those in the city» y de «opened up» a «opened the gates». La versión española sigue el estado final del audit trail, pero conserva la cautela textual mediante una nota que reconoce que el griego solo dice «abrieron».
  spanish_consistency_notes:
  - Se usa «Jope» para el topónimo por consistencia con el español bíblico tradicional, pero sin recurrir a fórmulas eclesiásticas innecesarias.
  - Se mantiene «tomó control de» para conservar el matiz de dominio/custodia militar sin sobretraducir.
  - «Al temer» refleja mejor el valor circunstancial del participio que una simple subordinación causal más explicativa.
