translation:
  language: es
  text: Ahora, el resto de los hechos[a] de Ezequías y sus obras de fidelidad[b], he aquí, están escritos en la visión de Isaías hijo de Amoz, el profeta, en el Libro de los reyes de Judá e Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actos»; aquí דִּבְרֵי puede abarcar los hechos, asuntos o acciones de Ezequías en un resumen histórico-regio.
    reason: lexical_alternative
  - marker: b
    text: O «sus actos de fidelidad al pacto» o «sus actos leales». El hebreo puede llevar el sentido de lealtad, fidelidad o bondad comprometida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: En una fórmula de cierre histórico, וְיֶתֶר introduce el material restante. «Ahora, el resto de» conserva el valor transicional y funciona con naturalidad en español narrativo formal.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - palabras
  - asuntos
  - eventos
  lexicon: HALOT
  rationale: En resúmenes regios, דִּבְרֵי abarca la historia o los hechos de una persona, no solo sus palabras. «Hechos» refleja bien el sentido historiográfico sin volverlo demasiado interpretativo.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Jehizquías
  lexicon: Uso bíblico español tradicional
  rationale: «Ezequías» es la forma bíblica estable en español y comunica el nombre con claridad pastoral y académica.
- source_word: וַחֲסָדָיו
  english_pob_choice: his faithful deeds
  chosen_spanish: sus obras de fidelidad
  alternatives_spanish:
  - sus actos de fidelidad al pacto
  - sus actos leales
  - sus obras de lealtad
  lexicon: HALOT
  rationale: חֶסֶד aquí describe acciones marcadas por lealtad/ fidelidad. «Obras de fidelidad» conserva el énfasis ético sin reducirlo a simple «bondad» ni forzar de entrada el tecnicismo de «pacto» en el texto principal.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí, están
  alternatives_spanish:
  - en verdad, están
  - están
  lexicon: HALOT
  rationale: La partícula presentacional pide una señal de énfasis. «He aquí» reproduce bien el gesto retórico y suena natural en un registro bíblico sobrio.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo se traduce de forma directa por «escritos», manteniendo la idea de un testimonio documental.
- source_word: בַּחֲזוֹן
  english_pob_choice: in the vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en el libro profético
  - en la profecía
  lexicon: HALOT
  rationale: חָזוֹן conserva su sentido primario de «visión». Aunque alude a un escrito profético, la traducción principal mantiene el término de origen sin diluirlo.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ הַנָּבִיא
  english_pob_choice: Isaiah son of Amoz, the prophet
  chosen_spanish: Isaías hijo de Amoz, el profeta
  alternatives_spanish:
  - Isaías, hijo de Amoz, el profeta
  - Isaías, el profeta, hijo de Amoz
  lexicon: Uso bíblico español tradicional
  rationale: Se conserva la filiación y el oficio profético, con un orden natural en español que sigue de cerca la estructura hebrea.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En esta fórmula bibliográfica, עַל vincula una obra con otra fuente escrita. «En» comunica de manera idiomática la ubicación documental mencionada en el texto fuente.
- source_word: סֵפֶר מַלְכֵי יְהוּדָה וְיִשְׂרָאֵל
  english_pob_choice: the Book of the Kings of Judah and Israel
  chosen_spanish: el Libro de los reyes de Judá e Israel
  alternatives_spanish:
  - el libro de los reyes de Judá e Israel
  - los anales de los reyes de Judá e Israel
  lexicon: HALOT
  rationale: סֵפֶר designa un documento o libro. Se capitaliza «Libro» por tratarse de un título de obra citado en la fórmula, y se mantiene la referencia a Judá e Israel sin expandirla interpretativamente.
theological_decisions:
- issue: Cómo rendir חֶסֶד aplicado a las acciones de Ezequías
  english_pob_reading: Rendered as 'faithful deeds'
  chosen_spanish_reading: «obras de fidelidad»
  alternative_spanish_readings:
  - «actos de fidelidad al pacto»
  - «actos leales»
  - «obras leales»
  rationale: El término puede implicar lealtad, fidelidad o bondad comprometida. En un rey humano, la frase debe conservar el valor moral y relacional sin imponer en el texto principal una formulación técnica de alianza que el contexto no exige de forma explícita.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor de הִנָּם como recurso de énfasis
  english_pob_reading: behold, they are
  chosen_spanish_reading: «he aquí, están»
  alternative_spanish_readings:
  - «en verdad, están»
  - «están»
  rationale: La partícula introduce atención solemne a lo que sigue. «He aquí» mantiene el tono bíblico y la fuerza presentacional del hebreo sin sonar artificial en español.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Se mantuvo alta concordancia con el audit trail inglés: la fórmula final sigue el patrón histórico-regio; se preservó חָזוֹן como «visión» y עַל como enlace documental «en»; y se hizo explícita en notas la tensión lexical de חֶסֶד, tal como el POB inglés la documenta.'
  spanish_consistency_notes:
  - Se usa «Ezequías» como nombre bíblico estándar en español.
  - Se mantiene «Yahvé» como forma preferente del proyecto cuando corresponda; en este versículo no aparece el Tetragrámaton.
  - «Libro» se capitaliza por tratarse de un título de obra citado en la fórmula documental.
  - Se evitó sustituir «fidelidad» por un término más eclesiástico o más interpretativo como «misericordia», para no borrar la tensión lexical de חֶסֶד.
