translation:
  language: es
  text: Las aflicciones de mi corazón se han multiplicado[a]; sácame de mis aprietos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Las aflicciones de mi corazón se han ensanchado», preservando más literalmente la imagen hebrea.
    reason: lexical_alternative
  - marker: b
    text: O «de mis estrecheces». El hebreo conserva la imagen concreta de una situación angosta u opresiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרוֹת
  english_pob_choice: troubles
  chosen_spanish: angustias
  alternatives_spanish:
  - troubles
  - aflicciones
  - tribulaciones
  lexicon: HALOT
  rationale: El sustantivo expresa calamidades o situaciones aflictivas. 'Angustias' comunica bien el peso emocional del verso en español y armoniza con el paralelismo del segundo hemistiquio.
- source_word: לְבָבִי
  english_pob_choice: of my heart
  chosen_spanish: de mi corazón
  alternatives_spanish:
  - de mi interior
  - de mi ser
  - de mi mente
  lexicon: HALOT
  rationale: '''Corazón'' preserva la imagen antropológica hebrea del centro interior de la persona y suena natural en español bíblico contemporáneo.'
- source_word: הִרְחִיבוּ
  english_pob_choice: have multiplied
  chosen_spanish: se han multiplicado
  alternatives_spanish:
  - se han ensanchado
  - se han agrandado
  - han crecido
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'han ensanchado/expandido'. Siguiendo la revisión inglesa que prefirió 'have multiplied' para reflejar la idea de aumento, 'se han multiplicado' expresa mejor en español el crecimiento de las angustias sin perder la imagen de expansión.
- source_word: מִמְּצוּקוֹתַי
  english_pob_choice: out of my distresses
  chosen_spanish: de mis angustias
  alternatives_spanish:
  - de mis estrecheces
  - de mis tribulaciones
  - de mis aprietos
  lexicon: HALOT
  rationale: מְצוּקוֹת comunica estrechez, aprieto o aflicción. 'Angustias' mantiene el plural y la fuerza opresiva del término; con el verbo de salida, 'de' basta en español para expresar la idea de rescate.
- source_word: הוֹצִיאֵנִי
  english_pob_choice: bring me out
  chosen_spanish: sácame
  alternatives_spanish:
  - líbrame
  - hazme salir
  - sácame de
  lexicon: HALOT
  rationale: El verbo significa 'hacer salir' o 'sacar'. 'Sácame' conserva la concreción del movimiento de rescate y es idiomático en español; el complemento 'de mis angustias' completa el sentido del original.
translation_notes:
  revision_awareness: La revisión inglesa final sustituyó 'have grown' por 'have multiplied' para acercarse más al verbo hebreo y mantener la idea de incremento; por eso el español sigue 'se han multiplicado' en lugar de una expansión más literal. También se conservó la segunda petición como movimiento concreto de salida/rescate, no como una paráfrasis abstracta.
  spanish_consistency_notes:
  - Se preserva el paralelismo entre 'corazón' y 'angustias', reflejando la secuencia hebrea entre el interior afectado y la estrechez externa o experimentada.
  - '''Angustias'' se usa dos veces para sostener la repetición semántica del verso y evitar suavizar el contraste.'
  - El tono es sobrio y devocional, apto para lectura eclesial, sin desplazar el sentido figurado del hebreo.
