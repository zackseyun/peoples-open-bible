translation:
  language: es
  text: entre todas las tribus de la tierra habitada hay mezclado un cierto pueblo hostil[a], opuesto en sus leyes a toda nación, y que continuamente pasa por alto los decretos de los reyes[b], para que no se mantenga nuestro irreprochable gobierno compartido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contrario en sus costumbres a toda nación'. El griego νόμοι puede significar 'leyes' o, en sentido más amplio, 'costumbres' o 'prácticas'.
    reason: lexical_alternative
  - marker: b
    text: El griego aquí es sintácticamente comprimido; 'pasa por alto los decretos de los reyes' refleja un sentido probable de pasar de largo o desatender las órdenes reales.
    reason: lexical_alternative
  - marker: c
    text: O 'gobierno común' o 'gobierno conjunto' para 'gobierno compartido' (griego συναρχίαν).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πάσαις ταῖς κατὰ τὴν οἰκουμένην φυλαῖς
  english_pob_choice: among all the tribes throughout the inhabited world
  chosen_spanish: entre todas las tribus de la tierra habitada
  alternatives_spanish:
  - entre todos los pueblos de la tierra habitada
  - entre todas las provincias de la tierra habitada
  lexicon: LSJ
  rationale: φυλαῖς conserva mejor 'tribus' o 'clanes'; 'tierra habitada' traduce οἰκουμένη de manera literal e inteligible en español.
- source_word: ἀναμεμιγμένον
  english_pob_choice: mixed in
  chosen_spanish: hay mezclado
  alternatives_spanish:
  - está mezclado
  - se halla mezclado
  - está intercalado
  lexicon: LSJ
  rationale: La idea es de estar interminguido entre otros, no solo presente geográficamente. 'Hay mezclado' preserva el tono del relato acusatorio sin volverse demasiado literal.
- source_word: δυσμενῆ λαόν τινα
  english_pob_choice: a certain hostile people
  chosen_spanish: un cierto pueblo hostil
  alternatives_spanish:
  - un cierto pueblo adverso
  - un cierto pueblo mal dispuesto
  - una cierta nación hostil
  lexicon: LSJ
  rationale: λαός es 'pueblo'; δυσμενής expresa hostilidad o mala voluntad. Se conserva la indefinición de τινα con 'un cierto'.
- source_word: τοῖς νόμοις ἀντίθετον πρὸς πᾶν ἔθνος
  english_pob_choice: opposed in its laws to every nation
  chosen_spanish: opuesto en sus leyes a toda nación
  alternatives_spanish:
  - contrario en sus leyes a todo pueblo
  - en desacuerdo por sus costumbres con toda nación
  lexicon: LSJ
  rationale: ἀντίθετον es 'opuesto' o 'en contra'. νόμοι puede ser 'leyes' o 'costumbres'; se eligió 'leyes' porque el cargo tiene fuerza jurídico-política.
- source_word: τά τε τῶν βασιλέων παραπέμποντας διηνεκῶς προστάγματα
  english_pob_choice: continually disregarding the decrees of the kings
  chosen_spanish: y que continuamente pasa por alto los decretos de los reyes
  alternatives_spanish:
  - y que continuamente deja de lado los decretos de los reyes
  - y que perpetuamente desatiende los decretos de los reyes
  - y que constantemente pasa por alto las órdenes de los reyes
  lexicon: LSJ
  rationale: La construcción es comprimida y algo difícil. παραπέμπω aquí se entiende como 'pasar por alto' o 'desatender'; προστάγματα se rinde naturalmente como 'decretos' en contexto real.
- source_word: πρὸς τὸ μὴ κατατίθεσθαι
  english_pob_choice: so that ... may not be maintained
  chosen_spanish: para que no se mantenga
  alternatives_spanish:
  - para que no se establezca
  - a fin de que no se sostenga
  - de modo que no quede asegurada
  lexicon: LSJ
  rationale: El valor es preventivo o resultativo. 'Mantenerse' refleja bien el matiz de conservar una disposición ya en curso; 'establecerse' queda como alternativa viable.
- source_word: τὴν ὑφʼ ἡμῶν κατευθυνομένην ἀμέμπτως συναρχίαν
  english_pob_choice: the blameless joint-rule directed by us
  chosen_spanish: la irreprochable co-gobernación dirigida por nosotros
  alternatives_spanish:
  - la blameless[?]
  lexicon: LSJ
  rationale: συναρχία significa gobierno conjunto o co-gobierno; κατευθυνομένην es 'dirigida'. ἀμέμπτως se expresa como 'irreprochable' para evitar suavizar el tono laudatorio-administrativo del texto.
theological_decisions:
- issue: Tono acusatorio y propagandístico del pasaje
  english_pob_reading: Retain the hostile and propagandistic tone without softening it into neutral description.
  chosen_spanish_reading: Conservar el tono hostil y propagandístico sin convertirlo en una descripción neutral.
  alternative_spanish_readings:
  - neutralizar el lenguaje a 'distinto pueblo' o 'costumbres particulares'
  - suavizar el cargo con formulaciones menos acusatorias
  rationale: El pasaje forma parte de una acusación real contra los judíos en las Adiciones griegas. La traducción debe reflejar esa caracterización hostil del hablante y no resolver la tensión.
  doctrine_reference: Primacía de la fuente original; preservar la tensión retórica del texto.
translation_notes:
  revision_awareness: El inglés POB revisó 'their laws' a 'its laws' por concordancia con 'a certain hostile people', y cambió 'be established' por 'be maintained' para reflejar mejor κατατίθεσθαι. La versión española sigue esa concordancia singular y opta por 'se mantenga' para conservar el matiz de preservación/continuidad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'leyes' para νόμοι con nota de alternativa 'costumbres' porque el contexto jurídico del edicto favorece ese matiz.
  - Se conserva el singular 'pueblo' con verbos singulares y posesivos singulares para reproducir la concordancia del griego y del inglés revisado.
  - '''Co-gobernación'' se usa para συναρχία como equivalente transparente de ''joint-rule'', evitando un término eclesiástico ajeno al contexto.'
