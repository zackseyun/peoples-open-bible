translation:
  language: es
  text: Si Galaad es iniquidad[a], ciertamente han llegado a ser nada[b]; en Gilgal sacrifican toros; en verdad[c], sus altares son como montones de piedras sobre los surcos del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente Galaad es iniquidad»; la partícula hebrea puede leerse como enfática más que condicional.'
    reason: alternative_reading
  - marker: b
    text: 'O: «han llegado a ser falsedad / vacío»; la expresión hebrea es compacta y puede enfatizar vaciedad, nulidad o falsedad.'
    reason: lexical_alternative
  - marker: c
    text: La imagen puede comparar sus muchos altares con los montones de piedras que suelen verse a lo largo de los surcos de un campo arado.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ciertamente
  - Acaso
  lexicon: HALOT
  rationale: La partícula puede introducir una condición o una afirmación enfática. «Si» conserva la forma hebrea y mantiene abierta la tensión retórica sin resolverla de antemano.
- source_word: גִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; en español bíblico, «Galaad» es la forma establecida y legible.
- source_word: אָוֶן
  english_pob_choice: wickedness / iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - impiedad
  - idolatría
  lexicon: HALOT
  rationale: «Iniquidad» mantiene el peso moral del término y sigue de cerca la decisión revisada en inglés. Evita estrechar demasiado el sentido a una sola idea como «idolatría».
- source_word: אַךְ
  english_pob_choice: surely / indeed
  chosen_spanish: ciertamente
  alternatives_spanish:
  - solo
  - solo que
  - de veras
  lexicon: HALOT
  rationale: Expresa bien el matiz asseverativo y encaja con la frase profética de juicio.
- source_word: שָׁוְא
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - vanidad
  - falsedad
  - vacío
  lexicon: HALOT
  rationale: En este contexto profético, el término comunica vaciedad o nulidad. «Nada» es la forma más natural en español para reflejar ese resultado sin sobreinterpretarlo.
- source_word: הָי֔וּ
  english_pob_choice: they have become
  chosen_spanish: han llegado a ser
  alternatives_spanish:
  - se han vuelto
  - llegaron a ser
  - son
  lexicon: HALOT
  rationale: «Han llegado a ser» expresa con claridad el estado resultante del verbo hebreo y su valor perfectivo en la denuncia profética.
- source_word: בַּ/גִּלְגָּל
  english_pob_choice: in Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Guilgal
  - en Galgal
  lexicon: HALOT
  rationale: Nombre propio del sitio cultual; se conserva la transliteración tradicional «Gilgal».
- source_word: שְׁוָרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: En contexto sacrificial, «toros» es natural en español y preserva la referencia a bovinos ofrecidos en culto.
- source_word: זִבֵּחוּ
  english_pob_choice: they sacrifice
  chosen_spanish: sacrifican
  alternatives_spanish:
  - sacrificaron
  - ofrecen sacrificios
  lexicon: HALOT
  rationale: El presente español funciona bien para el valor profético habitual de la acción cultual; mantiene vividez y denuncia continua.
- source_word: גַּם
  english_pob_choice: indeed
  chosen_spanish: e incluso
  alternatives_spanish:
  - también
  - además
  - sí, incluso
  lexicon: HALOT
  rationale: «E incluso» conserva el impulso acumulativo y enfático del hebreo sin forzar una interpretación más fuerte de la necesaria.
- source_word: מִזְבְּחוֹתָם
  english_pob_choice: their altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - sus sacrificios
  - sus lugares altos
  lexicon: HALOT
  rationale: Traducción directa y transparente del plural con sufijo posesivo.
- source_word: כְּ/גַלִּים
  english_pob_choice: like stone heaps
  chosen_spanish: como montones de piedras
  alternatives_spanish:
  - como montones
  - como pilas de piedras
  lexicon: HALOT
  rationale: «Montones de piedras» hace explícita la imagen agrícola del hebreo sin añadir elementos ajenos al texto.
- source_word: עַל תַּלְמֵי שָׂדָי
  english_pob_choice: on the furrows of the field
  chosen_spanish: sobre los surcos del campo
  alternatives_spanish:
  - en los surcos del campo
  - sobre las hileras del campo arado
  lexicon: HALOT
  rationale: «Surcos del campo» conserva el cuadro agrícola y la relación espacial de los altares/pedruscos sobre la tierra labrada.
theological_decisions:
- issue: Interpretación de la apertura condicional con אִם
  english_pob_reading: Rendered as a rhetorical conditional, 'If Gilead is iniquity,' preserving the compressed accusation.
  chosen_spanish_reading: 'Se mantiene como condicional retórico: «Si Galaad es iniquidad...».'
  alternative_spanish_readings:
  - Ciertamente Galaad es iniquidad
  - ¿Es Galaad iniquidad?
  rationale: La frase hebrea permite más de una lectura; el español conserva esa tensión en lugar de fijar de manera prematura una sola solución interpretativa. La acusación siguiente completa el juicio.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica y retórica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión del inglés POB: se prefirió «iniquidad» para אָוֶן y «e incluso»/«ciertamente» para reflejar mejor el énfasis de גַּם y אַךְ, manteniendo la cláusula inicial como condicional retórico. También se preservó la imagen agrícola final con una formulación natural en español.'
  spanish_consistency_notes:
  - Se usa «Galaad» y «Gilgal» como nombres propios bíblicos estándar en español.
  - Se mantuvo el registro profético formal sin caer en calcos demasiado rígidos.
  - «Nada» se apoya en la decisión inglesa de enfatizar vaciedad/nulidad, mientras la nota ofrece alternativas semánticas.
  - La puntuación conserva el paralelismo y la acumulación del verso original.
