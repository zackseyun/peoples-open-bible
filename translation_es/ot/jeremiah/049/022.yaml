  language: en
  yaml_path: translation/ot/jeremiah/049/022.yaml
  text: Behold[a], like an eagle he will rise up and soar and spread his wings over Bozrah, and the heart of Edom’s warriors on that day will be like the heart of a woman in labor.
  footnotes:
