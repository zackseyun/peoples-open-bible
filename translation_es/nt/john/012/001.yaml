translation:
  language: es
  text: Así pues, Jesús fue a Betania seis días antes de la Pascua, donde estaba Lázaro, a quien Jesús había levantado de entre los muertos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así pues
  alternatives_spanish:
  - Entonces
  - Por tanto
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula inferencial/narrativa οὖν se vierte con una conexión natural en español. «Así pues» conserva el enlace con el contexto previo sin sonar forzado ni demasiado coloquial.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Nombre propio estándar en español, conforme al texto fuente y a la convención de la POB.
- source_word: πρὸ ἓξ ἡμερῶν τοῦ πάσχα
  english_pob_choice: six days before the Passover
  chosen_spanish: seis días antes de la Pascua
  alternatives_spanish:
  - seis días previo a la Pascua
  - antes de la Pascua, seis días
  lexicon: BDAG
  rationale: La expresión temporal se naturaliza en español como «seis días antes de la Pascua». Se mantiene el valor temporal exacto sin introducir matices adicionales.
- source_word: ἦλθεν εἰς Βηθανίαν
  english_pob_choice: came to Bethany
  chosen_spanish: fue a Betania
  alternatives_spanish:
  - vino a Betania
  - llegó a Betania
  lexicon: BDAG
  rationale: ἦλθεν admite tanto «vino» como «fue» según el punto de vista narrativo. Aquí «fue a» suena natural en español y conserva el movimiento hacia Betania sin añadir el matiz de «llegó».
- source_word: Βηθανίαν
  english_pob_choice: Bethany
  chosen_spanish: Betania
  alternatives_spanish:
  - Betania
  lexicon: BDAG
  rationale: Topónimo transliterado según el uso bíblico en español.
- source_word: ὅπου ἦν Λάζαρος
  english_pob_choice: where Lazarus was
  chosen_spanish: donde estaba Lázaro
  alternatives_spanish:
  - donde se encontraba Lázaro
  - donde Lázaro estaba
  lexicon: BDAG
  rationale: El valor locativo/existencial de ὅπου ἦν se expresa de forma natural con «donde estaba». No se añade información sobre residencia o estancia que el griego no explicita.
- source_word: ἤγειρεν
  english_pob_choice: had raised
  chosen_spanish: había levantado
  alternatives_spanish:
  - había resucitado
  - había levantado de la muerte
  lexicon: BDAG
  rationale: ἐγείρω en contexto de resurrección puede traducirse como «levantar» o «resucitar». Se conserva «levantado» para reflejar el verbo subyacente y mantener la tensión léxica que la POB inglesa deja visible, con el complemento posterior aclarando el sentido resurreccional.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los difuntos
  lexicon: BDAG
  rationale: «De entre los muertos» es una traducción española natural y relativamente literal que preserva mejor el valor de ἐκ + genitivo plural que el simple «de los muertos».
- source_word: ⸀Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: Se mantiene el nombre explícito al final de la cláusula, como en el griego, para conservar la identificación enfática del sujeto y no suavizarla con un pronombre.
theological_decisions:
- issue: Verbo de resurrección en referencia a Lázaro
  english_pob_reading: whom Jesus had raised from the dead
  chosen_spanish_reading: a quien Jesús había levantado de entre los muertos
  alternative_spanish_readings:
  - a quien Jesús había resucitado
  - a quien había levantado de entre los muertos
  rationale: La opción «había levantado de entre los muertos» sigue de cerca el verbo griego ἐγείρω y preserva la tensión entre el sentido literal de ‘levantar’ y el contexto de resurrección. No se borra el agente explícito «Jesús», que el griego repite para enfatizarlo.
  doctrine_reference: Original-language primacy; preserve lexical tension rather than smoothing it into a fully interpretive equivalent.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se requieren revisiones de fondo. Se mantuvo la repetición final de «Jesús» y la relación temporal exacta. La principal decisión fue escoger una solución española natural que conserve la fuerza del verbo ἐγείρω sin domesticarla en exceso.
  spanish_consistency_notes:
  - «Pascua» se usa para πάσχα como término bíblico estándar en español.
  - Se conserva «Betania» y «Jesús» según la convención del proyecto.
  - La frase final mantiene explícito el sujeto «Jesús», evitando la reducción a pronombre.
  - La nota al pie marca la alternativa más literal de ἐκ νεκρῶν sin desplazar el texto principal.
