id: GEN.47.21
reference: Genesis 47:21
source:
  edition: WLC
  text: וְ/אֶ֨ת הָ/עָ֔ם הֶעֱבִ֥יר אֹת֖/וֹ לֶ/עָרִ֑ים מִ/קְצֵ֥ה גְבוּל מִצְרַ֖יִם וְ/עַד קָצֵֽ/הוּ־־־׃
translation:
  text: As for the people[a], he moved them to the cities, from one end of the territory of Egypt to the other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he transferred them to the cities.' Some translations, following a different textual understanding, render the verse as Joseph making the people servants; the Hebrew here more directly speaks of relocating them.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם here refers collectively to the Egyptian population affected by Joseph's policy, not a specific subgroup. 'The people' is the most natural and sufficiently formal collective rendering.
- source_word: הֶעֱבִיר אֹתוֹ
  chosen: he moved them
  alternatives:
  - he transferred them
  - he caused them to pass over
  - he removed them
  lexicon: HALOT
  rationale: The Hiphil of עבר commonly means 'cause to pass/move/transfer.' Because the object is collective singular ('the people') but refers to many persons, English idiom uses plural 'them.' 'Moved' captures the relocation sense without over-literal awkwardness.
- source_word: לֶעָרִים
  chosen: into the cities
  alternatives:
  - to the cities
  - by cities
  lexicon: HALOT
  rationale: The preposition ל with ערים in this context is best rendered directionally as relocation into urban centers. 'Into the cities' communicates destination more clearly than the more wooden 'to the cities.'
- source_word: מִקְצֵה גְבוּל מִצְרַיִם וְעַד קָצֵהוּ
  chosen: from one end of the territory of Egypt to the other
  alternatives:
  - from one end of Egypt's border to its other end
  - from one end of Egypt to the other
  lexicon: HALOT
  rationale: The phrase is an idiom of total extent. גְבוּל can mean border/territory; here 'territory' avoids the misleading impression of a narrow boundary line and conveys the whole land's extent. 'From one end ... to the other' preserves the merism naturally in English.
