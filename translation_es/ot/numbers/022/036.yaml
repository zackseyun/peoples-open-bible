translation:
  language: es
  text: Cuando Balac oyó que Balaam había llegado, salió a su encuentro en la ciudad de Moab[a], que está en la frontera del Arnón, al borde de la frontera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una ciudad de Moab». La frase hebrea puede referirse a una ciudad específica conocida de Moab o más generalmente a una ciudad perteneciente a Moab.
    reason: lexical_alternative
  - marker: b
    text: O «al final del territorio». El término hebreo para «frontera» también puede referirse al territorio delimitado en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: שׁמע en este contexto narrativo expresa recepción de noticia. «Oyó» es natural en español y conserva la inmediatez del reporte sin añadir mediación no explícita en el hebreo.
- source_word: כִּי בָא
  english_pob_choice: that Balaam had come
  chosen_spanish: que Balaam había llegado
  alternatives_spanish:
  - que Balaam venía
  - que Balaam llegó
  lexicon: HALOT
  rationale: 'El pluscuamperfecto español reproduce bien la secuencia temporal: Balac oye primero la noticia y después actúa. «Había llegado» mantiene el valor de arribo de בוא en este contexto narrativo.'
- source_word: וַיֵּצֵא
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió hacia allá
  - fue
  lexicon: HALOT
  rationale: יצא se expresa con naturalidad como «salió». El verbo conserva el movimiento narrativo desde la ubicación de Balac hacia Balaam.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarlo
  - para recibirlo
  lexicon: HALOT
  rationale: La expresión hebrea indica movimiento hacia alguien para encontrarse con él. «A su encuentro» suena idiomático en español y preserva la neutralidad de la escena.
- source_word: אֶל עִיר מוֹאָב
  english_pob_choice: at the city of Moab
  chosen_spanish: hasta la ciudad de Moab
  alternatives_spanish:
  - a la ciudad de Moab
  - en la ciudad de Moab
  lexicon: HALOT
  rationale: El hebreo usa אֶל con un verbo de movimiento. En español, «hasta» comunica la dirección y el punto de llegada de manera fluida sin perder el sentido locativo del contexto.
- source_word: אֲשֶׁר עַל גְּבוּל אַרְנֹן
  english_pob_choice: which is on the border of the Arnon
  chosen_spanish: que está sobre la frontera del Arnón
  alternatives_spanish:
  - que está junto a la frontera del Arnón
  - que está en la frontera del Arnón
  lexicon: HALOT
  rationale: עַל גבול marca ubicación sobre o junto a un límite. «Sobre la frontera» conserva la relación espacial del hebreo; «del Arnón» mantiene el nombre propio como referencia geográfica reconocible.
- source_word: אֲשֶׁר בִּקְצֵה הַגְּבוּל
  english_pob_choice: at the edge of the border
  chosen_spanish: al borde de la frontera
  alternatives_spanish:
  - al extremo de la frontera
  - al final del territorio
  lexicon: HALOT
  rationale: קצה significa «borde, extremo, punta». En español, «al borde de la frontera» conserva la repetición retórica del hebreo (גבול / קצה הגבול) sin volver opaca la imagen geográfica.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de POB con alta concordancia, pero se ajustó la sintaxis al español para conservar la secuencia narrativa y la repetición espacial del hebreo. No se detectaron revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Balaam» y «Balac» como formas propias ya establecidas en la tradición castellana del proyecto.
  - Se prefirió «Arnón» con tilde por adaptación ortográfica española del nombre propio.
  - «Frontera» traduce גבול de forma consistente con el contexto geográfico, sin borrar la posible amplitud semántica indicada en la nota.
  - La nota a preserva la tensión temporal de בָא sin decidir de forma absoluta entre llegada consumada y noticia de llegada.
