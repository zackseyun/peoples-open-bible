translation:
  language: es
  text: Yo fui ojos para los ciegos[a] y pies para los cojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «Yo era como ojos para los ciegos y como pies para los cojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַיִם
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  - guía
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo concreto en plural de manera predicativa; «ojos» conserva la imagen metafórica de dar orientación o ayuda práctica sin convertirla en una paráfrasis abstracta.
- source_word: הָיִיתִי
  english_pob_choice: I was
  chosen_spanish: yo fui
  alternatives_spanish:
  - yo era
  - yo estaba
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción/estado retrospectivo en el testimonio de Job. En español, «yo fui» conserva esa referencia al pasado de manera natural y enfática.
- source_word: לַעִוֵּר
  english_pob_choice: to the blind
  chosen_spanish: para el ciego
  alternatives_spanish:
  - para el ciego[a]
  - al ciego
  - para los ciegos
  lexicon: HALOT
  rationale: La preposición ל indica relación de beneficio o destino. «Para el ciego» expresa mejor esa función en español que «a» o «ante», y mantiene el sustantivo/adjetivo en singular colectivo como en el hebreo.
- source_word: וְרַגְלַיִם
  english_pob_choice: and feet
  chosen_spanish: y pies
  alternatives_spanish:
  - y los pies
  - y pasos
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal paralela a «ojos» para no debilitar el paralelismo poético. «Pies» es la correspondencia más directa y natural.
- source_word: לַפִּסֵּחַ
  english_pob_choice: to the lame
  chosen_spanish: para el cojo
  alternatives_spanish:
  - para el lisiado
  - para el discapacitado
  lexicon: HALOT
  rationale: «Cojo» refleja con precisión el sentido léxico básico sin introducir un registro más clínico o moderno que atenúe la imagen poética. También mantiene la simetría con «el ciego».
- source_word: אָֽנִי
  english_pob_choice: I myself
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático en hebreo, pero en español la repetición final resultaría forzada. El sujeto explícito inicial ya permite conservar la fuerza retórica sin añadir una repetición poco natural.
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión que eliminó un remate enfático poco natural («I myself»). En español se evita igualmente reproducir ese cierre, porque el énfasis del pronombre hebreo queda suficientemente reflejado con el sujeto explícito y el paralelismo poético.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo concreto «ojos / pies» para conservar la metáfora hebrea.
  - Se eligió «para» como equivalente funcional del ל benefactivo/direccional en ambos miembros.
  - El texto usa «ciego/cojo» en singular genérico, coherente con el hebreo y con el inglés auditado.
  - No se añadió «yo mismo» al final para evitar una repetición poco idiomática en español.
