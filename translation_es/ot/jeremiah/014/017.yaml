translation:
  language: es
  text: 'Y les dirás esta palabra: «Que mis ojos derramen lágrimas de noche y de día, y no cesen[a], porque la virgen hija de mi pueblo[b] ha sido quebrada con un gran quebrantamiento[c], con una herida muy grave».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y no se detengan» / «y no reposen»; el verbo hebreo puede implicar quedar en silencio o cesar.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la virgen hija de mi pueblo», una personificación poética del pueblo como una joven.
    reason: cultural_note
  - marker: c
    text: 'Hebreo literalmente usa una expresión cognada: «un gran quebrantamiento es quebrado», para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: And you shall say to them
  chosen_spanish: Y dirás a ellos
  alternatives_spanish:
  - Y les dirás
  - Entonces les dirás
  lexicon: HALOT
  rationale: La forma verbal profética funciona como mandato/instrucción. «Dirás a ellos» conserva la fuerza directiva con un registro natural en español bíblico.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - estas palabras
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra» o «mensaje». Se eligió el singular «esta palabra» para mantener la cercanía al hebreo y la construcción enfática con demostrativo.
- source_word: תֵּרַדְנָה עֵינַי דִּמְעָה
  english_pob_choice: Let my eyes run down with tears
  chosen_spanish: Caigan mis ojos en lágrimas
  alternatives_spanish:
  - Corran mis ojos en lágrimas
  - Que mis ojos derramen lágrimas
  lexicon: HALOT
  rationale: El hebreo personifica los ojos como si descendieran en llanto. «Caigan ... en lágrimas» intenta conservar la imagen de movimiento descendente sin sonar antinatural en español.
- source_word: לַיְלָה וְיוֹמָם
  english_pob_choice: night and day
  chosen_spanish: de noche y de día
  alternatives_spanish:
  - noche y día
  - por la noche y por el día
  lexicon: HALOT
  rationale: Es un merismo para continuidad incesante. «De noche y de día» es una formulación clara y solemne en español.
- source_word: וְאַל תִּדְמֶינָה
  english_pob_choice: and let them not cease
  chosen_spanish: y no cesen
  alternatives_spanish:
  - y no se callen
  - y no reposen
  lexicon: HALOT
  rationale: En este contexto el verbo puede implicar dejar de llorar o quedar quieto. «No cesen» sigue la lectura del POB inglés y preserva la idea de llanto ininterrumpido.
- source_word: שֶׁבֶר גָּדוֹל נִשְׁבְּרָה
  english_pob_choice: is broken with a great breaking
  chosen_spanish: ha sido quebrada con un gran quebrantamiento
  alternatives_spanish:
  - ha sido rota con una gran ruptura
  - ha sido quebrada con una gran quebradura
  lexicon: HALOT
  rationale: Se conserva el juego cognado hebreo entre sustantivo y verbo. «Quebrada ... quebrantamiento» reproduce la intensificación retórica sin borrar la tensión lexical.
- source_word: בְּתוּלַת בַּת עַמִּי
  english_pob_choice: the virgin daughter of my people
  chosen_spanish: la virgen hija de mi pueblo
  alternatives_spanish:
  - la doncella hija de mi pueblo
  - la virgen hija de mi pueblo
  lexicon: HALOT
  rationale: La personificación poética se mantiene. «Virgen hija de mi pueblo» sigue de cerca el hebreo y conserva su carga afectiva y metafórica.
- source_word: מַכָּה נַחְלָה מְאֹד
  english_pob_choice: with a very grievous wound
  chosen_spanish: con una herida muy grave
  alternatives_spanish:
  - con una herida gravísima
  - con un golpe muy doloroso
  lexicon: HALOT
  rationale: נַחְלָה expresa una herida/enfermedad grave o dolorosa. «Herida muy grave» es idiomática y mantiene la intensidad sin añadir un matiz clínico no explícito.
theological_decisions:
- issue: La expresión personificada «la virgen hija de mi pueblo»
  english_pob_reading: Retained as a metaphorical personification of the people/Judah rather than paraphrasing it away.
  chosen_spanish_reading: Se conserva como personificación metafórica del pueblo, no como una referencia literal a una mujer individual.
  alternative_spanish_readings:
  - el pueblo de Judá
  - la hija de Sion / mi pueblo como título poético
  rationale: El lamento profético depende de la fuerza poética y covenantal de la imagen. Mantenerla evita diluir el peso emocional y literario del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «is broken» frente a «is shattered» para ajustarse mejor a נִשְׁבְּרָה, conservando la expresión intensiva cognada. La versión española refleja esa preferencia con «ha sido quebrada» y «gran quebrantamiento».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se conserva el paralelismo y la intensificación del hebreo sin convertir la imagen poética en prosa explicativa.
  - «Cesar»/«no cesen» se usa para el verbo de detener el llanto, siguiendo la lectura auditada del POB inglés.
  - «Quebrada» y «quebrantamiento» evitan suavizar el cognado hebreo entre sustantivo y verbo.
