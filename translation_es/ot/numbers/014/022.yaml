translation:
  language: es
  text: Porque todos los hombres que han visto mi gloria y mis señales que hice en Egipto y en el desierto, y me han puesto a prueba estas diez veces, y no han escuchado mi voz[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no han obedecido mi voz». El hebreo «escuchar mi voz» puede implicar obedecer o hacer caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o base del juicio divino que sigue en el contexto. En español, «Porque» comunica bien esa relación explicativa sin forzar un matiz exclusivamente causal.
- source_word: כָל הָאֲנָשִׁים
  english_pob_choice: all the men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - toda la gente
  - todos los varones
  - todos esos hombres
  lexicon: HALOT
  rationale: El hebreo usa אֲנָשִׁים, con referencia masculina en este contexto. «Hombres» conserva esa fuerza de género y evita neutralizar indebidamente el referente.
- source_word: הָרֹאִים
  english_pob_choice: who have seen
  chosen_spanish: que han visto
  alternatives_spanish:
  - que vieron
  - viendo
  - los que vieron
  lexicon: HALOT
  rationale: El participio hebreo describe a quienes cuentan con la experiencia de haber visto, con relevancia presente. El perfecto compuesto español comunica bien ese valor.
- source_word: כְּבֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi majestad
  - mi esplendor
  lexicon: HALOT
  rationale: En contexto divino, כָּבוֹד se refiere a la gloria manifestada de Yahvé. «Gloria» es la equivalencia más directa y teológicamente reconocible.
- source_word: אֹתֹתַי
  english_pob_choice: my signs
  chosen_spanish: mis señales
  alternatives_spanish:
  - mis signos
  - mis maravillas
  - mis milagros
  lexicon: HALOT
  rationale: אֹתֹת expresa actos/señales con función demostrativa. «Señales» preserva mejor esa función que «milagros», que ya interpreta el tipo de evento.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that I did
  chosen_spanish: que hice
  alternatives_spanish:
  - que realicé
  - que llevé a cabo
  - que hice yo
  lexicon: HALOT
  rationale: La forma es simple y directa; «hice» evita sobreinterpretar el verbo y sigue de cerca la llaneza del hebreo.
- source_word: בְּמִצְרַיִם וּבַמִּדְבָּר
  english_pob_choice: in Egypt and in the wilderness
  chosen_spanish: en Egipto y en el desierto
  alternatives_spanish:
  - en Egipto y en el desierto del camino
  - en Egipto y en la tierra seca
  - en Egipto y en el yermo
  lexicon: HALOT
  rationale: «Desierto» es comprensible en español general, pero mantiene aquí el referente del éxodo sin necesidad de una perífrasis más técnica. «Yermo» sería más literario y menos natural.
- source_word: וַיְנַסּוּ אֹתִי
  english_pob_choice: and have tested me
  chosen_spanish: y me han puesto a prueba
  alternatives_spanish:
  - y me han probado
  - y me han tentado
  - y me han testeado
  lexicon: HALOT
  rationale: נסה aquí expresa probar o poner a prueba. «Puesto a prueba» conserva la idea de testeo relacional y judicial sin sonar artificial.
- source_word: זֶה עֶשֶׂר פְּעָמִים
  english_pob_choice: these ten times
  chosen_spanish: estas diez veces
  alternatives_spanish:
  - diez veces
  - ya diez veces
  - estas diez ocasiones
  lexicon: HALOT
  rationale: El demostrativo זֶה añade deixis; «estas» conserva esa proximidad retórica que el inglés POB también mantuvo con «these».
- source_word: וְלֹא שָׁמְעוּ בְּקוֹלִי
  english_pob_choice: and have not listened to my voice
  chosen_spanish: y no han escuchado mi voz
  alternatives_spanish:
  - y no han obedecido mi voz
  - y no han atendido a mi voz
  - y no han oído mi voz
  lexicon: HALOT
  rationale: El hebreo «escuchar la voz» puede implicar obedecer. Se conserva la imagen literal con «escuchado mi voz», dejando abierta la fuerza idiomática sin borrarla.
theological_decisions:
- issue: Inequivalencia potencial entre «escuchar» y «obedecer» en la locución hebrea
  english_pob_reading: The Hebrew idiom 'listen to my voice' can carry the sense of heeding or obeying.
  chosen_spanish_reading: «y no han escuchado mi voz» mantiene la imagen hebrea, con la obediencia implícita en el contexto.
  alternative_spanish_readings:
  - y no han obedecido mi voz
  - y no han hecho caso de mi voz
  rationale: El idioma hebreo permite la carga de obediencia sin explicitarla siempre. La redacción española conserva la metáfora auditiva y, por contexto, el rechazo a obedecer queda claro.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia masculina de הָאֲנָשִׁים en un contexto de juicio generacional
  english_pob_reading: all the men
  chosen_spanish_reading: todos los hombres
  alternative_spanish_readings:
  - toda la gente
  - todos los varones
  rationale: La forma hebrea es masculina y el contexto del juicio recae en la generación masculina contada en el relato. «Hombres» evita una neutralización que diluiría el valor del texto base.
  doctrine_reference: Translation philosophy §4
- issue: Traducción de כְּבוֹדִי en contexto de teofanía
  english_pob_reading: my glory
  chosen_spanish_reading: mi gloria
  alternative_spanish_readings:
  - mi majestad
  - mi esplendor
  rationale: «Gloria» es la equivalencia estándar y conserva el peso teológico de la manifestación visible de Yahvé en el desierto y en Egipto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue el último pasaje revisado del POB en inglés: se omitió cualquier equivalente de «yet» porque no está explícito en el hebreo, y se mantuvo la estructura directa del reproche divino con los mismos núcleos semánticos: gloria, señales, Egipto, desierto, prueba y voz.'
  spanish_consistency_notes:
  - Se mantuvo «mi gloria» y no «mi majestad» para conservar la terminología POB alineada con כָּבוֹד.
  - Se eligió «señales» para אֹתֹת en vez de «milagros», preservando la función evidencial del término.
  - «Desierto» traduce מִדְבָּר de manera natural y consistente con el relato del éxodo.
  - «No han escuchado mi voz» conserva la imagen idiomática hebrea sin borrar la posible lectura de obediencia.
