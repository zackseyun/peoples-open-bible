revisions:
- from: 'Y el jefe de los eunucos les puso nombres: a Daniel le puso el nombre de Beltsasar[a], y a Hananías el de Sadrac, a Misael el de Mesac, y a Azarías el de Abed-nego.'
  to: 'Y el jefe de los eunucos les puso nombres: a Daniel le puso el nombre de Beltsasar[a], a Hananías el nombre de Sadrac, a Misael el nombre de Mesac, y a Azarías el nombre de Abed-nego.'
  rationale: Se mantiene la base del borrador, pero se refuerza la fidelidad al historial auditado repitiendo «el nombre de» en cada renombramiento. También se pule la nota para que la alternativa léxica suene natural en español. La forma «Beltsasar» se conserva como nombre de Daniel 1:7, que en español bíblico distingue adecuadamente este nombre de «Belsasar».
