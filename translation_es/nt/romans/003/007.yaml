review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido principal del griego: contraste entre la verdad de Dios y la mentira humana, valor instrumental de ἐν en «por mi mentira», sentido de abundancia en «ha abundado», y juicio continuo en «soy juzgado». Sin embargo, las notas presentan errores formales y léxicos que deben corregirse para preservar fielmente el audit trail inglés y la legibilidad española.'
  spanish_quality_summary: 'El texto principal es natural, claro y de registro digno. «Pero si la verdad de Dios ha abundado por mi mentira para su gloria, ¿por qué todavía soy juzgado como pecador?» es plenamente legible. Los problemas están en las notas: «falseedad» está mal escrito y además suena poco natural; la nota «hacia su gloria» no representa bien la alternativa inglesa «to his glory», que en español se expresa mejor como «a su gloria».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «verdad», «mentira», «pecador» y «juzgado» son adecuados. La decisión de mantener «la verdad de Dios» en vez de «la veracidad de Dios» concuerda con la revisión final inglesa y sigue siendo teológicamente responsable en este contexto.
  issues:
  - severity: medium
    issue: 'La nota [b] contiene un error ortográfico: «falseedad».'
    rationale: La forma correcta es «falsedad». El error afecta la calidad editorial y la confiabilidad del recurso.
  - severity: medium
    issue: La alternativa léxica «falsedad» en la nota [b] es mejor que «falseedad», pero debe mantenerse como alternativa y no en el texto principal.
    rationale: El griego ψεύσματι se vierte con más naturalidad como «mentira» en el texto principal; «falsedad» sirve bien como alternativa secundaria.
  - severity: low
    issue: La nota [c] dice «Literalmente, “hacia su gloria”», que no es la mejor equivalencia española para la alternativa inglesa «to his glory».
    rationale: «Hacia su gloria» suena poco idiomático y puede sugerir dirección espacial. «A su gloria» conserva mejor la literalidad de εἰς sin perder naturalidad.
  revised_spanish_text: Pero si la verdad de Dios ha abundado por[a] mi mentira[b] para su gloria[c], ¿por qué todavía soy juzgado como pecador?
  revised_footnotes:
  - marker: a
    text: O «por medio de».
    reason: alternative_reading
  - marker: b
    text: O «mi falsedad».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «a su gloria».
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al griego, al audit trail inglés y al español natural. Solo se corrigen las notas para eliminar un error ortográfico y mejorar la literalidad/idiomaticidad de la alternativa de εἰς τὴν δόξαν αὐτοῦ.
