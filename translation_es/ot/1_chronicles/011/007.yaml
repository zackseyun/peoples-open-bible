translation:
  language: es
  text: David habitó en la fortaleza[a]; por eso la llamaron la Ciudad de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortaleza». El hebreo מְצָד se refiere a un lugar fortificado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  - residió
  lexicon: HALOT
  rationale: En hebreo narrativo, ישב con complemento locativo expresa asentarse o habitar. «Habitó» mantiene el sentido de residencia estable y suena natural en español bíblico sin perder la idea de ocupación permanente del lugar.
- source_word: בַּמְצָד
  english_pob_choice: in the stronghold
  chosen_spanish: en la fortaleza
  alternatives_spanish:
  - en la ciudadela
  - en el baluarte
  - en la plaza fuerte
  lexicon: HALOT
  rationale: מְצָד designa un lugar fortificado. «Fortaleza» comunica bien el valor defensivo y militar del término en español, aunque «fortaleza» y «baluarte» pueden acercarse matizadamente a «stronghold».
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: La locución introduce consecuencia. «Por eso» conserva la relación causal con un registro natural y claro en español contemporáneo.
- source_word: קָרְאוּ לוֹ
  english_pob_choice: they called it
  chosen_spanish: la llamaron
  alternatives_spanish:
  - la nombraron
  - le pusieron nombre
  - la denominaron
  lexicon: HALOT
  rationale: El hebreo usa verbo activo plural con לווֹ en función idiomática de nombrar. En español, como el referente es la fortaleza/ciudad y no una persona, «la llamaron» refleja con naturalidad la acción de dar nombre.
- source_word: עִיר דָּוִיד
  english_pob_choice: the City of David
  chosen_spanish: la Ciudad de David
  alternatives_spanish:
  - la ciudad de David
  - la Ciudad de David
  lexicon: HALOT
  rationale: Es un nombre establecido en el uso bíblico. Se mantiene con mayúscula inicial como designación fija de lugar.
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo cambios textuales ni revisiones sustantivas; la concordancia entre el hebreo y la traducción inglesa es alta, y la versión española sigue ese mismo estado estable.
  spanish_consistency_notes:
  - Se conservó el nombre fijo «Ciudad de David» para mantener continuidad bíblica y toponímica.
  - Se prefirió «fortaleza» como equivalente principal de מְצָד, con nota alternativa para conservar la tensión léxica registrada en el POB inglés.
  - «Habitó» equilibra fidelidad semántica y fluidez, evitando un calco excesivamente literal de «se sentó».
