review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: imagen metafórica de «muro», protección continua «de noche y de día», duración temporal «todos los días», y el colectivo «rebaño». Sin embargo, añade «como» en «Fueron como un muro», cuando el hebreo dice literalmente «fueron un muro», y eso debilita la metáfora concreta que la auditoría inglesa quiso conservar. Además, el anclaje de notas [a][b] está colocado sobre la expresión temporal, aunque la nota a corresponde a «alrededor de nosotros» y la b a «el rebaño».'
  spanish_quality_summary: El español es claro y natural, con registro bíblico moderno y digno. «Tanto de noche como de día» y «cuidando el rebaño» suenan bien. No obstante, conviene mejorar la precisión estilística quitando «como» para mantener la fuerza de la imagen, y reubicar las llamadas de nota para que correspondan a las palabras explicadas.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Muro», «rebaño» y el resto de elecciones son apropiadas. La nota sobre צאן se preserva correctamente en contenido, aunque su anclaje debe moverse. La alternativa «sobre nosotros» para עָלֵינוּ también está bien documentada.
  issues:
  - severity: medium
    issue: Se añadió «como» en «Fueron como un muro».
    rationale: חוֹמָה הָיוּ עָלֵינוּ expresa directamente «fueron un muro sobre/alrededor de nosotros», no una mera comparación. La auditoría inglesa preserva la imagen concreta; «como» la atenúa innecesariamente.
  - severity: medium
    issue: Las notas [a][b] están ancladas en la frase temporal en vez de las expresiones pertinentes.
    rationale: La nota a explica la preposición en «alrededor de nosotros»; la nota b explica «el rebaño» como equivalente de צאן. Deben aparecer junto a esas expresiones para mantener trazabilidad y claridad editorial.
  - severity: low
    issue: La nota b lleva comillas y puntuación inicial poco natural en español editorial.
    rationale: '"''Hebreo: ...''" parece un residuo de formato. Conviene normalizarla a «Hebreo: …».'
  revised_spanish_text: Fueron un muro alrededor de nosotros[a], tanto de noche como de día, todos los días que estuvimos con ellos, cuidando el rebaño[b].
