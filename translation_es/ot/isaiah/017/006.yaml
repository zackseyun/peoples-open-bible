translation:
  language: es
  text: 'Pero quedarán en él rebuscos[a], como cuando se golpea un olivo: dos o tres bayas en la copa de la rama más alta, cuatro o cinco en sus ramas fructíferas, declara Yahvé, el Dios de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dos o tres aceitunas ... cuatro o cinco entre sus ramas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁאַר
  english_pob_choice: Yet ... will be left
  chosen_spanish: Aun quedarán
  alternatives_spanish:
  - Y quedarán
  - Pero quedarán
  lexicon: HALOT
  rationale: El nifal de שׁאר expresa quedar o ser dejado. «Aun» comunica bien el valor adversativo-contextual del waw en el marco del juicio, y «quedarán» suena natural en español.
- source_word: בּוֹ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en ello
  - sobre él
  lexicon: HALOT
  rationale: El sufijo pronominal remite al referente juzgado. «En él» conserva la referencia más neutral y evita sobreinterpretar el antecedente.
- source_word: עֹלֵלֹת
  english_pob_choice: gleanings
  chosen_spanish: rebuscos
  alternatives_spanish:
  - espigas rebuscadas
  - restos de cosecha
  lexicon: HALOT
  rationale: El término alude a lo que queda tras la cosecha y puede recogerse como rebusco. «Rebuscos» preserva la imagen agrícola y la idea de remanente pequeño sin forzar una equivalencia más explicativa.
- source_word: כְּנֹקֶף זַיִת
  english_pob_choice: as when an olive tree is beaten
  chosen_spanish: como cuando se golpea un olivo
  alternatives_spanish:
  - como al sacudir un olivo
  - como cuando se bate un olivo
  lexicon: HALOT
  rationale: נֹקֶף se refiere al proceso de golpear o sacudir para cosechar aceitunas. «Se golpea un olivo» es idiomático en español y conserva la imagen del acto de cosecha.
- source_word: גַּרְגְּרִים
  english_pob_choice: berries
  chosen_spanish: bayas
  alternatives_spanish:
  - aceitunas
  - frutos
  lexicon: HALOT
  rationale: La palabra denota frutos pequeños individuales. «Bayas» mantiene esa pequeñez y corresponde mejor al sentido léxico que «aceitunas», aunque el contexto es el olivo.
- source_word: בְּרֹאשׁ אָמִיר
  english_pob_choice: at the top of the highest bough
  chosen_spanish: en la copa de la rama más alta
  alternatives_spanish:
  - en la punta de la rama más alta
  - en la cima de la rama superior
  lexicon: HALOT
  rationale: רֹאשׁ es «copa/top» y אָמִיר designa la rama superior. «Copa de la rama más alta» comunica la ubicación elevada con naturalidad en español.
- source_word: בִּסְעִפֶיהָ
  english_pob_choice: on its fruitful branches
  chosen_spanish: en sus ramas fructíferas
  alternatives_spanish:
  - en sus ramas
  - entre sus ramas
  lexicon: HALOT
  rationale: סְעִיפִים son ramas o gajos. «Ramas fructíferas» preserva el carácter productivo del árbol y el valor descriptivo del adjetivo.
- source_word: פֹּרִיָּה
  english_pob_choice: fruitful
  chosen_spanish: fructíferas
  alternatives_spanish:
  - fecundas
  - con fruto
  lexicon: HALOT
  rationale: El adjetivo significa fértil o fructífero. «Fructíferas» es preciso y claro en español bíblico contemporáneo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יְהוָה. Siguiendo la terminología base del proyecto, se conserva «Yahvé» en el texto principal; «declara» reproduce bien la fórmula profética נְאֻם.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa es directa y conviene mantenerla íntegra para preservar la identificación pactual de Dios con Israel.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrámaton explícitamente. Conforme a la terminología del proyecto, se traduce como «Yahvé» para no ocultar el nombre del pacto y mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Preservación de la imagen agrícola del remanente
  english_pob_reading: gleanings ... as when an olive tree is beaten
  chosen_spanish_reading: rebuscos ... como cuando se golpea un olivo
  alternative_spanish_readings:
  - restos de cosecha ...
  - como al sacudir un olivo
  rationale: La comparación expresa que solo quedará una pequeña cantidad después del juicio. «Rebuscos» y «se golpea un olivo» conservan la metáfora agrícola sin diluirla en una paráfrasis abstracta.
  doctrine_reference: Isaías 17:6 en su contexto de juicio y remanente
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la decisión de mantener la imagen del olivo y el remanente mínimo. La principal adaptación al español es el uso de «rebuscos» para עֹלֵלֹת y la elección de «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto. No se detectan revisiones materiales pendientes en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con los lineamientos del proyecto para יְהוָה.
  - Se preserva la fuerza concreta de la metáfora agrícola en lugar de convertirla en una explicación general del remanente.
  - «Fructíferas» y «rebuscos» sostienen un registro bíblico contemporáneo, claro y publicable para lectores hispanohablantes.
