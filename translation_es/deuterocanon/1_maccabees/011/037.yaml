revisions:
- from: Ahora pues[a], cuiden de hacer una copia de estas cosas, y que se la entregue a Jonatán, y que se la coloque en el monte santo, en un lugar visible.
  to: Ahora bien, procuren hacer una copia de estas cosas, y que le sea dada a Jonatán, y que sea colocada en el monte santo, en un lugar destacado[a].
  rationale: Se ajusta el enlace discursivo a un español más natural («Ahora bien»), se representa con mayor fidelidad la voz pasiva imperativa del griego («que le sea dada», «que sea colocada»), y se mejora ἐν τόπῳ ἐπισήμῳ con «en un lugar destacado», que conserva mejor el matiz de notoriedad pública u oficial documentado en la auditoría inglesa. La revisión mantiene el sentido y el tono formal del original sin introducir paráfrasis.
