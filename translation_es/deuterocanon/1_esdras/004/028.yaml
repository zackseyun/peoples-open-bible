translation:
  language: es
  text: Y ahora[a], ¿no me creen? ¿No es grande el rey en su autoridad? ¿No temen todas las tierras tocarlo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No están todas las tierras en temor de tocarlo?». χῶραι puede significar «tierras», «países» o «regiones», y εὐλαβοῦνται puede expresar temor reverente o cautela temerosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύετέ μοι
  english_pob_choice: do you not believe me
  chosen_spanish: ¿no me creen?
  alternatives_spanish:
  - ¿no confían en mí?
  - ¿no me dan crédito?
  lexicon: BDAG
  rationale: El verbo πιστεύω aquí lleva a la persona del hablante como objeto directo implícito en la réplica retórica; en español, «creerme» o «creer en mí» expresa mejor la aceptación de su afirmación que «confiar», que desplaza el matiz hacia lealtad o confianza relacional.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  - magnífico
  lexicon: LSJ
  rationale: «Grande» conserva el valor directo de μέγας sin añadir una interpretación específica de poder o esplendor que el contexto no exige.
- source_word: ἐξουσίᾳ
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho a reinar
  lexicon: LSJ
  rationale: «Autoridad» reproduce bien la idea de prerrogativa real o potestad gobernante que el inglés POB documenta; «poder» sería posible, pero es más amplio y menos preciso para esta formulación.
- source_word: χῶραι
  english_pob_choice: lands
  chosen_spanish: tierras
  alternatives_spanish:
  - países
  - regiones
  lexicon: LSJ
  rationale: «Tierras» mantiene el sentido amplio de territorios o dominios y evita el anacronismo de «países» como estados nacionales modernos.
- source_word: εὐλαβοῦνται
  english_pob_choice: fear
  chosen_spanish: temen
  alternatives_spanish:
  - sienten temor
  - guardan reverencia
  - están en cautela
  lexicon: LSJ
  rationale: El contexto inmediato de «tocarlo» favorece el sentido de temor práctico o cauteloso. «Temen» es más natural que «reverencian» en español y conserva la tensión del texto.
- source_word: ἅψασθαι
  english_pob_choice: to touch
  chosen_spanish: tocar
  alternatives_spanish:
  - ponerle la mano encima
  - tocarlo
  lexicon: LSJ
  rationale: «Tocar» es la equivalencia más simple y concreta para ἅπτομαι; en español, el infinitivo con pronombre («tocarlo») se integra mejor en la pregunta final.
theological_decisions:
- issue: Tono de reverencia vs. miedo ante el rey
  english_pob_reading: fear to touch him
  chosen_spanish_reading: temen tocarlo
  alternative_spanish_readings:
  - le tienen reverencia y temor al tocarlo
  - tienen cautela de tocarlo
  rationale: El griego εὐλαβοῦνται puede abarcar cautela reverente o miedo prudente. Dado el paralelo con la prohibición de tocar al rey, la forma breve «temen tocarlo» conserva la ambigüedad útil sin suavizarla ni volverla técnica.
  doctrine_reference: Lexical/theological nuance in narrative rhetoric; no doctrinal claim.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto griego y con la solución auditada en inglés; no se detectaron revisiones aplicadas en el historial reciente. La versión española sigue de cerca la estructura interrogativa triple del original y conserva la alternancia entre autoridad real y temor de acercamiento.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene «autoridad» para ἐξουσία por coherencia con decisiones POB previas sobre prerrogativa gobernante.
  - «Tierras» evita introducir un marco político moderno ajeno a χῶραι.
  - La nota al pie marca la ambigüedad de χῶραι/εὐλαβοῦνται sin alterar el texto principal.
