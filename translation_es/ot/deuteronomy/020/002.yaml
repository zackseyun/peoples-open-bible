translation:
  language: es
  text: Y cuando os acerquéis a la batalla[a], el sacerdote se adelantará y hablará al pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la guerra». El hebreo מִלְחָמָה puede denotar guerra en general o un combate concreto; aquí el acercamiento inmediato al enfrentamiento favorece «batalla».
    reason: lexical_alternative
  - marker: b
    text: «El pueblo» aquí se refiere al contingente israelita reunido, pero el hebreo conserva el término más amplio «pueblo» en vez de una etiqueta militar más estrecha como «tropas».
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y acontecerá cuando
  - Y será cuando
  lexicon: HALOT
  rationale: La construcción hebrea introduce una circunstancia futura; en español, «Y cuando» comunica de manera natural esa relación temporal sin forzar un calco innecesario.
- source_word: כְּקָרָבְכֶם
  english_pob_choice: you draw near
  chosen_spanish: os acerquéis
  alternatives_spanish:
  - os acercáis
  - os aproximéis
  lexicon: HALOT
  rationale: קרב expresa acercarse o aproximarse. En una cláusula temporal con sentido futuro, «os acerquéis» conserva el movimiento verbal y suena idiomático en español.
- source_word: אֶל הַמִּלְחָמָה
  english_pob_choice: to the battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - a la guerra
  - para la batalla
  lexicon: HALOT
  rationale: מִלְחָמָה puede significar guerra o combate. Aquí el contexto inmediato es el acercamiento a un enfrentamiento concreto, por eso «batalla» refleja mejor el valor puntual que «guerra».
- source_word: וְנִגַּשׁ
  english_pob_choice: shall come forward
  chosen_spanish: se adelantará
  alternatives_spanish:
  - se acercará
  - se presentará
  lexicon: HALOT
  rationale: נגשׁ significa acercarse o aproximarse. En el contexto de un sacerdote que toma la palabra, «se adelantará» expresa bien el acto de dar un paso al frente para dirigirse al pueblo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote ministrante
  - el levita
  lexicon: HALOT
  rationale: כֹּהֵן corresponde a «sacerdote». No hay indicio aquí para especificar más ni para sustituir por una designación distinta.
- source_word: וְדִבֶּר
  english_pob_choice: and speak
  chosen_spanish: y hablará
  alternatives_spanish:
  - y dirá
  - y pronunciará
  lexicon: HALOT
  rationale: דבר en piel normalmente significa hablar o dirigirse a alguien. «Hablará» mantiene la sencillez del hebreo y el ritmo de la frase.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo reunido
  - a la gente
  lexicon: HALOT
  rationale: הָעָם es literalmente «el pueblo». En este contexto se trata del contingente israelita convocado, pero el hebreo mantiene el término amplio; «al pueblo» conserva esa forma.
theological_decisions:
- issue: Alcance de מִלְחָמָה
  english_pob_reading: battle rather than war
  chosen_spanish_reading: batalla más que guerra
  alternative_spanish_readings:
  - guerra
  - combate
  rationale: La evidencia contextual favorece un enfrentamiento inmediato y concreto. «Batalla» evita ampliar innecesariamente el campo semántico a guerra general, a la vez que conserva la tensión militar del pasaje.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios y la lectura fue confirmada con alto nivel de acuerdo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se prefirió un registro bíblico moderno y claro, evitando calcos como «y será que» o «se allegará».
  - «Pueblo» se conservó por la amplitud semántica del hebreo, en línea con la auditoría en inglés.
