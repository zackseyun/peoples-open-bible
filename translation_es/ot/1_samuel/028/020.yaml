base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/020.yaml
  text: Saul immediately fell full length to the ground[a], and he was very afraid because of Samuel’s words. There was no strength in him either, because he had eaten no bread all that day and all that night.
  footnotes:
