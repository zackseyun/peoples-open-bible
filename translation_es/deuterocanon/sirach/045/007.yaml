translation:
  language: es
  text: Puso sobre él esplendor y lo atendió con su gloria[a]; lo ciñó con los cuernos del toro salvaje[b] y lo vistió con campanillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Estableció para él una alianza eterna, y le dio el sacerdocio del pueblo; lo bendijo con ornamento, y lo ciñó con un manto de gloria». El testimonio hebreo aquí difiere sustancialmente del griego.'
    reason: alternative_reading
  - marker: b
    text: O posiblemente «con la fuerza elevada del toro salvaje». La frase hebrea es difícil, y la imagen puede ser metafórica más que una descripción literal de cuernos ornamentales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוד / ἔστησεν ... διαθήκην αἰῶνος / ἐμακάρισεν ... ἐν εὐκοσμίᾳ
  english_pob_choice: splendor / blessed him with adornment
  chosen_spanish: Puso sobre él esplendor
  alternatives_spanish:
  - le puso gloria
  - le dio esplendor
  - lo adornó con esplendor
  lexicon: HALOT; LXX parallel as audit control
  rationale: El hebreo leído por el POB habla de נתן עליו הוד, literalmente 'poner sobre él esplendor'; por eso se evita 'clothed' y se conserva la imagen de investidura. El paralelo griego usa lenguaje distinto de bendición/adornos, que se preserva en nota por ser una variante sustancial.
- source_word: וישרתהו
  english_pob_choice: ministered to him
  chosen_spanish: lo ministró
  alternatives_spanish:
  - lo sirvió
  - lo atendió
  - le ministró
  lexicon: HALOT
  rationale: שרת expresa servicio ministerial. 'Lo ministró' mantiene el registro cultual y evita la ambigüedad de un servicio doméstico; además refleja mejor la elección revisada del inglés POB frente a 'attended'.
- source_word: בכבודו
  english_pob_choice: with his glory
  chosen_spanish: con su gloria
  alternatives_spanish:
  - con honor
  - en su gloria
  - con su majestad
  lexicon: HALOT
  rationale: Se conserva el posesivo y el tono elevado del hebreo/inglés. 'Gloria' mantiene el campo semántico de כבוד sin rebajarlo a una mera cortesía.
- source_word: ויאזרהו
  english_pob_choice: he girded him
  chosen_spanish: lo ciñó
  alternatives_spanish:
  - lo ciñó alrededor
  - lo ajustó con un cinturón
  - lo beltó
  lexicon: HALOT
  rationale: Aזר en contexto de vestidura ceremonial se rinde naturalmente como 'ceñir'. Es la forma más idiomática en español sin perder la acción ritual.
- source_word: בתועפות ראם
  english_pob_choice: with the horns of a wild ox
  chosen_spanish: con los cuernos del toro salvaje
  alternatives_spanish:
  - con la fuerza elevada del toro salvaje
  - con el vigor del toro salvaje
  - con los cuernos del búfalo
  lexicon: HALOT
  rationale: El hebreo es difícil y admite tanto la imagen concreta de cuernos como la idea de fuerza exaltada. El POB inglés mantuvo la imagen literal y añadió nota; en español se sigue esa línea con 'toro salvaje', más inteligible que 'wild ox' y aún suficientemente literal.
- source_word: וילבישהו פעמונים
  english_pob_choice: clothed him with bells
  chosen_spanish: lo vistió con campanillas
  alternatives_spanish:
  - lo cubrió con campanas
  - lo adornó con campanillas
  - lo ciñó de campanillas
  lexicon: HALOT
  rationale: פעמונים son campanillas/pequeñas campanas de vestidura sacerdotal. 'Lo vistió con campanillas' mantiene la secuencia de investidura y es claro en español moderno.
theological_decisions:
- issue: Mismatched Hebrew and Greek witnesses in Sirach 45:7
  english_pob_reading: Primary translation follows the extant Hebrew wording while preserving the Greek alternative in a footnote.
  chosen_spanish_reading: La traducción principal sigue el hebreo conservado, con la alternativa griega preservada en nota.
  alternative_spanish_readings:
  - 'Seguir el griego como texto base: ''Estableció para él una alianza eterna, y le dio el sacerdocio del pueblo; lo bendijo con ornamento, y lo ciñó con un manto de gloria.'''
  - Harmonizar hebreo y griego en una sola redacción
  rationale: El expediente marca una discrepancia mayor entre testigos. Para mantener la trazabilidad, la línea principal debe seguir el hebreo disponible y la nota debe retener el giro ceremonial del griego sin fusionarlo silenciosamente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva, usando el paralelo griego como control real y preservando honestamente la incertidumbre.'
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del expediente: ''put splendor upon him'' se volvió ''Puso sobre él esplendor'', y ''ministered to him'' se reflejó como ''lo ministró'' para acercarse más al hebreo נתן עליו y וישרתהו. Se mantuvo la imagen de ceñir con el toro salvaje y de vestir con campanillas, y se preservó en nota la lectura alternativa del griego.'
  spanish_consistency_notes:
  - Se usa 'gloria' para כבוד/δόξα en sentido honorífico y cultual, manteniendo el contraste con 'esplendor' para הוד.
  - '''Ministró'' se reserva aquí por el contexto sacerdotal; no se emplea como simple sinónimo de ''sirvió''.'
  - '''Lo ciñó'' es preferible a un calco más duro porque español bíblico y culto lo admite con naturalidad.'
  - '''Toro salvaje'' traduce ראם de forma comprensible; la nota conserva la alternativa de fuerza exaltada.'
  - Las notas usan marcadores [a] y [b] únicos y alineados con el texto principal.
