translation:
  language: es
  text: Partieron del desierto de Sinaí y acamparon en Kibrot-hataavá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibrot-hataavá significa «sepulcros del deseo».
