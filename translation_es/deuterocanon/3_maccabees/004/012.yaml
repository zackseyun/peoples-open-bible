translation:
  language: es
  text: Y cuando esto sucedió, al oír que sus compatriotas de la ciudad salían en secreto y se escabullían con mayor frecuencia[b] a causa de la aflicción de sus hermanos[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego en la frase que aquí se vierte por «a causa de la aflicción de sus hermanos» es difícil, especialmente la forma transmitida como ἰχθεῖ. La traducción sigue el sentido contextual aparente de la cláusula más que una versión más literal pero oscura.
    reason: textual_variant
  - marker: b
    text: O «se escabullían más a menudo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ τοῦτο ἐγενήθη
  english_pob_choice: And when this happened
  chosen_spanish: Y cuando esto sucedió
  alternatives_spanish:
  - Ahora bien, cuando esto ocurrió
  - Pero cuando esto sucedió
  lexicon: LSJ
  rationale: La construcción temporal se vierte de modo natural en español con una subordinada de tiempo. Se conserva el enlace narrativo de δέ con «Y» sin intensificar indebidamente la oposición.
- source_word: ἀκούσας
  english_pob_choice: having heard
  chosen_spanish: al oír
  alternatives_spanish:
  - habiendo oído
  - cuando oyó
  lexicon: LSJ
  rationale: El participio aoristo se expresa con una frase adverbial natural en español. «Al oír» mantiene la anterioridad y la relación circunstancial con la reacción implícita del sujeto.
- source_word: τοὺς ἐκ τῆς πόλεως ὁμοεθνεῖς
  english_pob_choice: his fellow countrymen from the city
  chosen_spanish: sus compatriotas de la ciudad
  alternatives_spanish:
  - sus coterráneos de la ciudad
  - los de la misma nación de la ciudad
  lexicon: LSJ
  rationale: Ὁμοεθνεῖς indica personas de la misma nación o etnia. «Compatriotas» comunica bien ese matiz en español; se mantiene «de la ciudad» como especificación local. El posesivo se sobreentiende por el contexto, como en la solución inglesa.
- source_word: κρυβῇ ἐκπορευομένους
  english_pob_choice: were secretly going out
  chosen_spanish: salían en secreto
  alternatives_spanish:
  - se iban en secreto
  - salían furtivamente
  lexicon: LSJ
  rationale: La idea principal es el movimiento de salida con clandestinidad. «Salían en secreto» es claro y fiel, evitando sobrerreproducir la estructura participial griega.
- source_word: πυκνότερον
  english_pob_choice: more frequently
  chosen_spanish: con mayor frecuencia
  alternatives_spanish:
  - más a menudo
  - más frecuentemente
  lexicon: LSJ
  rationale: El adverbio comparativo apunta a repetición. «Con mayor frecuencia» es la opción más natural y precisa en español contemporáneo.
- source_word: ὑποδιδράσκειν
  english_pob_choice: slipping away
  chosen_spanish: se escabullían
  alternatives_spanish:
  - se deslizaban fuera
  - se escapaban
  lexicon: LSJ
  rationale: El verbo sugiere un retirarse furtivo o un escaparse con sigilo. «Se escabullían» conserva el matiz clandestino sin volverlo demasiado interpretativo.
- source_word: τὴν ἰχθεῖ τῶν ἀδελφῶν ταλαιπωρίαν
  english_pob_choice: because of the misery of their brothers
  chosen_spanish: a causa de la aflicción de sus hermanos
  alternatives_spanish:
  - por la aflicción de sus hermanos
  - debido al sufrimiento de sus hermanos
  lexicon: LSJ
  rationale: La frase transmitida es difícil y el inglés POB sigue el sentido contextual. En español, «aflicción» reproduce bien la idea de padecimiento, y «a causa de» expresa la fuerza causal del contexto.
- source_word: τῶν ἀδελφῶν
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos de sangre
  - sus hermanos de raza
  lexicon: LSJ
  rationale: Se conserva «hermanos» para la solidaridad de parentesco/comunidad que expresa ἀδελφῶν, sin sustituirlo por un término eclesiástico más interpretativo.
theological_decisions:
- issue: Solidaridad de grupo expresada por ὁμοεθνεῖς y ἀδελφῶν
  english_pob_reading: his fellow countrymen from the city ... their brothers
  chosen_spanish_reading: sus compatriotas de la ciudad ... sus hermanos
  alternative_spanish_readings:
  - sus coterráneos ... sus hermanos de sangre
  - los de la misma nación ... sus hermanos
  rationale: No hay doctrina explícita, pero sí un lenguaje de pertenencia étnica y fraterna que conviene no diluir. «Compatriotas» y «hermanos» preservan el doble vínculo de comunidad y solidaridad del original.
  doctrine_reference: Solidaridad comunitaria / vocabulario de parentesco en el texto bíblico
