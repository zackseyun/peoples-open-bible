base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/005.yaml
  text: then I myself will set my face against that man and against his family[a], and I will cut off him and all who prostitute themselves after him by prostituting themselves after Molech[b], from among their people.
  footnotes:
