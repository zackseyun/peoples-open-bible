translation:
  language: es
  text: Y Shallún hijo de Col-hozeh[a], oficial del distrito de Mizpa, reparó la Puerta de la Fuente. Él la reconstruyó y la techó, y colocó sus puertas, sus cerrojos y sus barras; y reparó el muro del estanque de Shelah, junto al jardín del rey, hasta las gradas que descienden desde la Ciudad de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el estanque de Siloa» (tradicionalmente asociado con Siloé). El nombre hebreo aquí es Shelah.
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁעַר הָעַיִן
  english_pob_choice: the Fountain Gate
  chosen_spanish: la Puerta de la Fuente
  alternatives_spanish:
  - la Puerta del Manantial
  - la Puerta de la Primavera
  lexicon: HALOT
  rationale: עַיִן puede referirse a una fuente de agua, manantial o surtidor. En español, «Puerta de la Fuente» conserva la imagen topográfica y es natural en un contexto urbano antiguo. «Manantial» también es posible, pero «fuente» refleja bien la decisión inglesa y la función de punto de agua.
- source_word: הֶחֱזִיק
  english_pob_choice: repaired
  chosen_spanish: reparó
  alternatives_spanish:
  - fortaleció
  - hizo reparaciones en
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo describe trabajo de restauración en muro o puerta. «Reparó» comunica esa labor constructiva de forma directa y evita la dureza de una traducción meramente literal como «fortaleció».
- source_word: שַׂר פֶּלֶךְ הַמִּצְפָּה
  english_pob_choice: official of the district of Mizpah
  chosen_spanish: oficial del distrito de Mizpa
  alternatives_spanish:
  - gobernante del distrito de Mizpa
  - gobernador del distrito de Mizpa
  lexicon: HALOT
  rationale: שַׂר señala a un funcionario o jefe; פֶּלֶךְ es un distrito administrativo. «Oficial del distrito» mantiene la amplitud del título sin sobredeterminarlo como un cargo político moderno más fuerte.
- source_word: ה֤וּא יִבְנֶ֨/נּוּ֙
  english_pob_choice: He rebuilt it
  chosen_spanish: Él la reconstruyó
  alternatives_spanish:
  - Él la edificó
  - Él la reparó
  lexicon: HALOT
  rationale: El pronombre enfatiza que él mismo asumió la obra. En este contexto de restauración, «reconstruyó» comunica mejor que «edificó», y conserva el valor de participación personal de la frase.
- source_word: וִ/יטַלְלֶ֔/נּוּ
  english_pob_choice: roofed it
  chosen_spanish: la techó
  alternatives_spanish:
  - la cubrió
  - le puso techo
  lexicon: HALOT
  rationale: El verbo alude a cubrir la estructura del portal. «Techó» es breve, idiomático y preserva la imagen arquitectónica sin añadir detalles no presentes en el hebreo.
- source_word: ו/יעמידו דַּלְתֹתָ֔י/ו מַנְעֻלָ֖י/ו וּ/בְרִיחָ֑י/ו
  english_pob_choice: and set up its doors, its bolts, and its bars
  chosen_spanish: y colocó sus puertas, sus cerrojos y sus barras
  alternatives_spanish:
  - y instaló sus puertas, sus cerraduras y sus barras
  - y puso sus puertas, sus cerrojos y sus travesaños
  lexicon: HALOT
  rationale: La secuencia describe la instalación de las piezas funcionales de la puerta. «Colocó» encaja bien con el causativo de עמד en este contexto. «Cerrojos» recoge razonablemente מַנְעֻלִים; «barras» reproduce בְרִיחִים de manera clara y bíblica.
- source_word: חוֹמַת בְּרֵכַת הַשֶּׁלַח
  english_pob_choice: the wall of the Pool of Shelah
  chosen_spanish: el muro del estanque de Sela
  alternatives_spanish:
  - el muro del estanque de Siloa
  - el muro del estanque de Siloé
  lexicon: HALOT
  rationale: בְּרֵכָה es «estanque» o «piscina»; aquí «estanque» funciona bien para una obra hidráulica antigua. Para הַשֶּׁלַח se conserva la forma hebrea transcrita «Sela» como reflejo directo del texto, mientras que la identificación tradicional con Siloé/Siloa se deja en nota. Esta opción evita borrar la tensión léxica entre forma hebrea y nombre más conocido.
- source_word: לְגַן הַמֶּלֶךְ
  english_pob_choice: by the king’s garden
  chosen_spanish: junto al jardín del rey
  alternatives_spanish:
  - por el jardín del rey
  - hacia el jardín del rey
  lexicon: HALOT
  rationale: La preposición לְ en este tipo de descripción puede ser local o direccional. «Junto a» suena natural en español para un lindero urbano y expresa bien la proximidad del muro al jardín.
- source_word: וְעַד הַמַּעֲלוֹת הַיּוֹרְדוֹת
  english_pob_choice: as far as the stairs that go down
  chosen_spanish: hasta las gradas que descienden
  alternatives_spanish:
  - hasta los escalones que bajan
  - hasta las escaleras que descienden
  lexicon: HALOT
  rationale: מַעֲלוֹת puede significar gradas, escalones o escalinata. «Gradas» mantiene la idea de peldaños monumentales y es compatible con el registro histórico. «Que descienden» preserva el participio y el sentido topográfico descendente.
- source_word: מֵעִיר דָּוִיד
  english_pob_choice: from the City of David
  chosen_spanish: desde la Ciudad de David
  alternatives_spanish:
  - de la Ciudad de David
  - desde la ciudad de David
  lexicon: HALOT
  rationale: El hebreo indica origen o punto de partida. «Desde» comunica mejor el movimiento límite de la descripción del muro, sin perder la referencia geográfica establecida.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la decisión inglesa auditada; no se registran revisiones aplicadas en el texto base. La versión española sigue el mismo perfil de equivalencia óptima, conservando la terminología topográfica y la alternativa tradicional del nombre del estanque en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo requeriría explícitamente; este versículo no contiene el Tetragrámaton.
  - Se mantiene «Mesías/Cristo» fuera de este pasaje porque no aparece vocabulario mesiánico.
  - Se usa «estanque» para בְּרֵכָה en coherencia con el contexto hidráulico y con la opción inglesa «Pool».
  - «Ciudad de David» se conserva como topónimo fijo bíblico.
  - La nota al pie marca la variante toponímica tradicional sin sustituir la forma hebrea del texto principal.
