translation:
  language: es
  text: Su descendencia[a] está establecida delante de ellos, con ellos y sus descendientes delante de sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su descendencia está segura delante de ellos, y sus descendientes a la vista de ellos».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: זַרְעָם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - sus hijos
  lexicon: HALOT
  rationale: זֶרַע puede referirse a semilla, descendencia u offspring/progenie. En español, «descendencia» comunica de forma natural el sentido colectivo de posteridad sin reducirlo solo a niños, y mantiene el paralelismo con el segundo miembro.
- source_word: נָכוֹן
  english_pob_choice: are established
  chosen_spanish: está establecida
  alternatives_spanish:
  - está segura
  - está firme
  lexicon: HALOT
  rationale: El participio/adjetival expresa una condición fija o asentada. «Está establecida» conserva esa idea de estado permanente; «segura» es posible, pero desplaza el matiz hacia protección y resulta algo más interpretativo.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  lexicon: HALOT
  rationale: La imagen hebrea es espacial y visual. «Delante de ellos» preserva la colocación literal y la escena de ver a la descendencia prosperar delante de uno.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto a ellos
  - entre ellos
  lexicon: HALOT
  rationale: La preposición עִם significa de manera directa «con». «Con ellos» mantiene la secuencia hebrea y evita suavizar la cercanía concreta que el texto subraya.
- source_word: וְצֶאֱצָאֵיהֶם
  english_pob_choice: and their descendants
  chosen_spanish: y sus retoños
  alternatives_spanish:
  - y sus descendientes
  - y su posteridad
  lexicon: HALOT
  rationale: צֶאֱצָאִים alude a progenie/descendencia. Para variar levemente el primer miembro y conservar el paralelismo, «retoños» funciona en español como metáfora de vástagos; «descendientes» también es válido, pero puede sonar más técnico y menos natural en este verso.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - en su propia vista
  lexicon: HALOT
  rationale: El modismo hebreo significa observación directa. «Delante de sus ojos» mantiene la imagen vívida y el paralelismo con «delante de ellos».
translation_notes:
  revision_awareness: 'El texto inglés auditado añadió comas para distinguir con claridad la secuencia hebrea: «before them, with them». El español conserva esa distinción con la misma pausa sintáctica: «delante de ellos, con ellos», sin fusionar los dos complementos.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras convenciones no pertinentes; no hay nombres divinos en este versículo.
  - «Descendencia» y «retoños» diferencian los dos sustantivos hebreos paralelos sin perder el sentido colectivo.
  - La puntuación reproduce la separación entre los dos complementos circunstanciales, siguiendo la revisión inglesa auditada.
