translation:
  language: es
  text: Y toda ofrenda de cereal[a] mezclada con aceite, o seca, será de todos los hijos de Aarón; cada uno por igual[b] con su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "ofrenda de grano". El hebreo מִנְחָה en este contexto designa una ofrenda cultual de cereal, no una ofrenda genérica.
    reason: lexical_alternative
  - marker: b
    text: O "cada uno igualmente con su hermano". El modismo hebreo enfatiza la distribución igualitaria entre los hijos de Aarón.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda
  - ofrenda vegetal
  - ofrenda de grano
  lexicon: HALOT
  rationale: En el contexto levítico sacrificial, מִנְחָה no es una ofrenda genérica, sino la ofrenda de cereal / grano. "Ofrenda de cereal" comunica la categoría cultual con naturalidad en español y mantiene la especificidad del rito.
- source_word: בְלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - batida con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio pasivo con la frase preposicional describe la preparación de la ofrenda. "Amasada con aceite" transmite la mezcla material de forma idiomática en español; "mezclada con aceite" es una alternativa válida, pero menos concreta para una ofrenda de cereal.
- source_word: חֲרֵבָה
  english_pob_choice: dry
  chosen_spanish: seca
  alternatives_spanish:
  - sin aceite
  - seca, sin mezclar
  - sin mezcla
  lexicon: HALOT
  rationale: '"Seca" conserva el contraste directo con la ofrenda amasada con aceite y evita añadir explícitamente la idea interpretativa de "sin aceite", que el hebreo no expresa de manera literal aquí.'
- source_word: לְכָל בְּנֵי אַהֲרֹן
  english_pob_choice: shall belong to all the sons of Aaron
  chosen_spanish: será de todos los hijos de Aarón
  alternatives_spanish:
  - pertenecerá a todos los hijos de Aarón
  - será para todos los hijos de Aarón
  lexicon: HALOT
  rationale: La construcción hebrea con לְ y היה expresa asignación o pertenencia. "Será de" comunica bien el reparto legal sin forzar una perífrasis más pesada; "hijos de Aarón" preserva el lenguaje de parentesco masculino del texto.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos varones de Aarón
  - los descendientes de Aarón
  lexicon: HALOT
  rationale: El hebreo usa una expresión de filiación masculina en un contexto sacerdotal legal. "Hijos de Aarón" es fiel, natural en español bíblico moderno y evita neutralizar el término.
- source_word: אִישׁ כְּאָחִיו
  english_pob_choice: each alike with his brother
  chosen_spanish: cada uno como su hermano
  alternatives_spanish:
  - cada uno por igual con su hermano
  - cada uno de la misma manera que su hermano
  - cada uno igualmente con su hermano
  lexicon: HALOT
  rationale: El modismo expresa reparto igualitario entre los sacerdotes. "Cada uno como su hermano" conserva la comparación distributiva y sugiere igualdad sin sobreexplicar el giro idiomático.
theological_decisions:
- issue: Lenguaje sacerdotal masculino y reparto igualitario
  english_pob_reading: sons of Aaron ... each alike with his brother
  chosen_spanish_reading: los hijos de Aarón ... cada uno como su hermano
  alternative_spanish_readings:
  - los descendientes de Aarón ... cada uno por igual
  - los hijos de Aarón ... cada uno igualmente
  rationale: El hebreo usa términos de parentesco masculinos en un marco legal sacerdotal. Se preserva ese lenguaje en español para no borrar la precisión del texto, y se mantiene el sentido distributivo del modismo final sin neutralizar la referencia masculina.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se mantiene alta concordancia con el texto fuente y con la auditoría inglesa. La única decisión principal es la elección de "ofrenda de cereal" frente a otras opciones posibles para מִנְחָה, y la formulación idiomática de la comparación final para preservar el reparto equitativo.
  spanish_consistency_notes:
  - Se mantiene "Aarón" con acento estándar en español.
  - Se usa "hijos de Aarón" como equivalente consistente de la expresión hebrea masculina.
  - '"Seca" se conserva como contraste breve y directo con "amasada con aceite".'
  - La nota a pie de página está anclada a "ofrenda de cereal" para reflejar la alternativa léxica documentada.
