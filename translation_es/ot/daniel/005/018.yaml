translation:
  language: es
  text: En cuanto a ti[a], rey, Dios Altísimo dio realeza, grandeza, gloria y majestad a Nabucodonosor, tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu ancestro» o «tu predecesor»; el término arameo literalmente significa «tu padre», pero puede usarse de manera más amplia en el lenguaje de linaje real.
    reason: lexical_alternative
lexical_decisions:
- source_word: אנתה
  english_pob_choice: As for you
  chosen_spanish: En cuanto a ti
  alternatives_spanish:
  - Tú
  - Y tú
  lexicon: HALOT
  rationale: La forma pronominal independiente va en posición enfática y contrastiva; «En cuanto a ti» transmite mejor ese giro discursivo que un simple «Tú».
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El vocativo debe conservarse explícitamente en español para reflejar el trato directo y solemne de la escena cortesana.
- source_word: אֱלָהָא עִלָּיָא
  english_pob_choice: the Most High God
  chosen_spanish: el Dios Altísimo
  alternatives_spanish:
  - el Dios muy alto
  - el Dios del Altísimo
  lexicon: HALOT
  rationale: La expresión aramea es un título divino fijo; «Dios Altísimo» es la forma natural y fiel en español, sin perder el superlativo.
- source_word: מַלְכוּתָא
  english_pob_choice: kingship
  chosen_spanish: realeza
  alternatives_spanish:
  - reino
  - poder real
  lexicon: HALOT
  rationale: Aquí el don es la dignidad y condición real concedida a Nabucodonosor, no principalmente el territorio; «realeza» evita reducirlo a «reino».
- source_word: רְבוּתָא
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - magnificencia
  - gran poder
  lexicon: HALOT
  rationale: El término describe exaltación o grandeza de rango; «grandeza» mantiene la serie de honores regios de manera directa.
- source_word: וִיקָרָא
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: HALOT
  rationale: En este contexto regial, «gloria» preserva el valor de honor magnificente y encaja bien en la acumulación de dones.
- source_word: וְהַדְרָה
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: HALOT
  rationale: «Majestad» comunica con claridad la dignidad real y distingue este término del anterior «gloria».
- source_word: יְהַב
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - concedió
  - otorgó
  lexicon: HALOT
  rationale: Verbo simple de dar en pasado; «dio» es directo, claro y suficiente para el acto de concesión divina.
- source_word: לִנְבֻכַדְנֶצַּר
  english_pob_choice: to Nebuchadnezzar
  chosen_spanish: a Nabucodonosor
  alternatives_spanish:
  - para Nabucodonosor
  lexicon: HALOT
  rationale: Se translitera el nombre propio en español bíblico estándar.
- source_word: אֲבוּךְ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu ancestro
  - tu predecesor
  lexicon: HALOT
  rationale: Se conserva la forma literal del término de parentesco. En el uso real/dinástico arameo puede significar también antepasado o predecesor; la nota preserva esa tensión semántica.
theological_decisions:
- issue: Sentido de «tu padre» en lenguaje real/dinástico
  english_pob_reading: Retain the literal expression 'your father' in the main text while recognizing it can mean ancestor/predecessor.
  chosen_spanish_reading: Mantener «tu padre» en el texto principal, entendiendo que puede abarcar antepasado o predecesor.
  alternative_spanish_readings:
  - tu ancestro
  - tu predecesor
  rationale: El término original usa la palabra ordinaria para padre, y la equivalencia óptima favorece conservarla. El contexto histórico muestra que el arameo real puede emplearla en sentido dinástico amplio; por eso la ambigüedad se explica en nota en vez de resolverse en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador se mantiene en alta concordancia con el control cruzado y no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene «Dios Altísimo» como título divino natural en español, equivalente al arameo sin sustituirlo por una perífrasis menos idiomática.
  - «Realeza» se usa para מַלְכוּתָא para evitar confundir la dignidad conferida a la persona con un territorio político.
  - 'La lista de dones conserva cuatro sustantivos en serie: realeza, grandeza, gloria y majestad, siguiendo el paralelismo del original.'
  - Se evita «SEÑOR» como máscara del nombre divino; aquí el texto no contiene el Tetragrámaton, sino el título «Dios Altísimo».
