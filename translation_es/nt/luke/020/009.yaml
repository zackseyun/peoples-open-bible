translation:
  language: es
  text: 'Entonces empezó a contarle al pueblo esta parábola: «Un hombre plantó una viña[a], y la arrendó a labradores, y se fue por mucho tiempo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se fue a otro país por mucho tiempo». El verbo puede implicar estar ausente de la región propia, incluso en el extranjero.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤρξατο
  english_pob_choice: began
  chosen_spanish: empezó
  alternatives_spanish:
  - comenzó
  - inició
  lexicon: BDAG
  rationale: El aoristo de ἄρχω introduce el inicio del acto de hablar; «empezó» es natural en español y conserva la progresión narrativa.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δὲ funciona aquí como transición narrativa; «Entonces» mantiene ese enlace sin forzar una adición de sentido.
- source_word: πρὸς τὸν λαὸν
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la multitud
  lexicon: BDAG
  rationale: πρός con acusativo tras verbo de habla indica dirección del discurso hacia una audiencia; λαός se expresa bien como «pueblo», que conserva el sentido colectivo.
- source_word: λέγειν
  english_pob_choice: to tell
  chosen_spanish: decirle
  alternatives_spanish:
  - hablar
  - contarle
  lexicon: BDAG
  rationale: Con παραβολή como objeto implícito en español, «decirle ... esta parábola» suena más natural que una traducción literal de «decir» o «hablar».
- source_word: τὴν παραβολὴν ταύτην
  english_pob_choice: this parable
  chosen_spanish: esta parábola
  alternatives_spanish:
  - esta ilustración
  lexicon: BDAG
  rationale: «Parábola» conserva el género literario bíblico y la resonancia intertextual; «esta» reproduce el demostrativo.
- source_word: Ἄνθρωπος
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  lexicon: BDAG
  rationale: El sujeto introductorio es masculino y específico; «un hombre» evita neutralizar el rasgo gramatical y narrativo del original.
- source_word: ἐφύτευσεν ἀμπελῶνα
  english_pob_choice: planted a vineyard
  chosen_spanish: plantó una viña
  alternatives_spanish:
  - plantó un viñedo
  - estableció una viña
  lexicon: BDAG
  rationale: Ἀμπελών denota un terreno de vides; en español, «viña» es la forma más natural y bíblicamente reconocible sin perder la imagen agrícola.
- source_word: ἐξέδετο
  english_pob_choice: leased
  chosen_spanish: la arrendó
  alternatives_spanish:
  - la alquiló
  - la cedió en arriendo
  lexicon: BDAG
  rationale: ἐκδίδωμι aquí expresa ceder la propiedad para explotación por otros; «arrendó» comunica bien la idea legal/comercial en español y evita una ambigüedad moderna de «alquilar».
- source_word: γεωργοῖς
  english_pob_choice: farmers
  chosen_spanish: a labradores
  alternatives_spanish:
  - a campesinos
  - a agricultores
  - a viñadores
  lexicon: BDAG
  rationale: γεωργός designa cultivadores de la tierra; «labradores» conserva un matiz rural amplio y suena más preciso que «viñadores», que sería demasiado específico para la forma léxica.
- source_word: ἀπεδήμησεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - viajó
  - marchó
  lexicon: BDAG
  rationale: ἀποδημέω señala estar ausente de la región propia; «se fue» es la equivalencia más sobria y flexible en español, sin añadir destino no explicitado por el verso.
- source_word: χρόνους ἱκανούς
  english_pob_choice: for a considerable time
  chosen_spanish: por mucho tiempo
  alternatives_spanish:
  - por un tiempo considerable
  - por largo tiempo
  lexicon: BDAG
  rationale: La expresión indica una duración prolongada; «por mucho tiempo» comunica el valor idiomático con naturalidad en español actual.
theological_decisions:
- issue: Renderizado de λαός como «pueblo»
  english_pob_reading: to the people
  chosen_spanish_reading: al pueblo
  alternative_spanish_readings:
  - a la gente
  - a la multitud
  rationale: No hay motivo para reducir o intensificar la referencia más allá de una audiencia colectiva; «pueblo» conserva la dignidad y la amplitud del término griego sin convertirlo en un simple grupo informal.
  doctrine_reference: N/A
- issue: Elección de «viña» para ἀμπελῶνα
  english_pob_reading: vineyard
  chosen_spanish_reading: viña
  alternative_spanish_readings:
  - viñedo
  rationale: El verso presenta la plantación de una propiedad agrícola con vides; «viña» mantiene la imaginería bíblica y evita una tecnificación innecesaria.
  doctrine_reference: N/A
- issue: Mantenimiento del matiz legal de ἐξέδετο
  english_pob_reading: leased
  chosen_spanish_reading: la arrendó
  alternative_spanish_readings:
  - la alquiló
  - la dio en arriendo
  rationale: La parábola incluye una relación de administración/tenencia, no solo una cesión informal. «Arrendó» preserva mejor ese valor que «alquiló», que en español puede sonar más doméstico o menos jurídico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de su redacción: se conservaron las decisiones léxicas centrales (δηλ. tiempo narrativo, audiencia, parábola, viña, arrendamiento y duración) y se ajustó el español a una formulación natural y publicable. No hubo revisiones adicionales en el pass más reciente, y el veredicto de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «Mesías/Cristo» no aplicable aquí; no se introduce terminología no presente en el texto.
  - «Labradores» se eligió para γεωργοῖς por precisión léxica y por armonía con la imagen de una viña, evitando una sobreespecificación como «viñadores».
  - La nota al pie marca una alternativa legítima para ἀπεδήμησεν sin convertirla en interpretación obligatoria del texto principal.
