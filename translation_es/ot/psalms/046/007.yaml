review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: naciones en agitación, reinos inestables, voz divina, y respuesta cósmica. Conserva adecuadamente «naciones», «reinos» y «la tierra». Sin embargo, «él dio su voz» suena poco natural en español y no comunica tan bien el valor idiomático de נָתַן בְּקוֹלוֹ como una opción más idiomática. Además, la alternativa de nota mezcla dos alternativas inglesas en una sola nota española, y «se derritió» para la tierra es posible pero algo menos natural que «se derrite»/«se deshace» en poesía; aun así, es defendible.'
  spanish_quality_summary: La línea es legible y digna, pero «él dio su voz» resulta calcado y poco idiomático en español eclesial general. «Hizo oír su voz» preserva mejor el sentido soberano de la locución hebrea sin sugerir meramente volumen, y lee con más naturalidad. El resto del versículo fluye bien. La nota al pie debe reflejar una alternativa clara y directamente anclada al texto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece el nombre divino ni títulos mesiánicos. «Las naciones», «los reinos» y «la tierra» se alinean bien con las decisiones auditadas. La única mejora importante es una formulación española más natural para נָתַן בְּקוֹלוֹ.
  issues:
  - severity: medium
    issue: «él dio su voz» es un calco poco natural en español
    rationale: Aunque literalmente cercano al hebreo, en español suena forzado y menos claro. «Hizo oír su voz» mantiene la fuerza poética y el acto soberano de hablar sin sobreinterpretar.
  - severity: low
    issue: La nota alternativa combina dos alternativas en una sola formulación
    rationale: El inglés ofrece una alternativa para la primera mitad del verso; en español conviene mantener una alternativa clara y bien formada, no una mezcla que parezca retraducción compuesta.
  revised_spanish_text: Las naciones se alborotaron[a], los reinos vacilaron; él hizo oír su voz, la tierra se derritió.
