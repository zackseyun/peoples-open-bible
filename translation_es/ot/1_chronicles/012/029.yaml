translation:
  language: es
  text: Y Zadoc, un joven, poderoso y valiente[a], y de la casa de su padre, veintidós comandantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre valiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ / וְ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Y luego
  lexicon: HALOT
  rationale: La conjunción enlaza esta entrada con la lista anterior; «Y» conserva la estructura enumerativa sin añadir matiz temporal no explícito.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Zadoc
  alternatives_spanish:
  - Sadoc
  - Zadok
  lexicon: HALOT
  rationale: Es nombre propio. Se translitera al español de forma transparente; «Zadoc» mantiene una forma legible y cercana a la tradición hispana, sin traducir el nombre.
- source_word: נַעַר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven hombre
  - siervo
  lexicon: HALOT
  rationale: En este contexto militar, el término señala edad/juventud más que oficio. «Joven» es natural en español y preserva esa referencia básica sin imponer la idea de siervo.
- source_word: גִּבּוֹר חָיִל
  english_pob_choice: mighty in valor
  chosen_spanish: valiente
  alternatives_spanish:
  - hombre valiente
  - poderoso en valor
  - mighty man of valor
  lexicon: HALOT
  rationale: La combinación hebrea expresa fortaleza y capacidad para la guerra. «Valiente» resume con naturalidad esa fuerza militar; se evita cargar el texto con una perífrasis más pesada que podría sonar redundante en español.
- source_word: בֵית אָבִיו
  english_pob_choice: his father’s house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - su casa paterna
  - su linaje paterno
  - su clan
  lexicon: HALOT
  rationale: La expresión hebrea conserva la imagen del ámbito paterno-familiar. «La casa de su padre» reproduce con fidelidad esa estructura social, sin pasar prematuramente a una interpretación más abstracta como «clan».
- source_word: שָׂרִים
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - jefes
  - líderes
  - capitanes
  - príncipes
  lexicon: HALOT
  rationale: En este contexto militar, el término se refiere a personas con mando. «Comandantes» comunica bien esa función en español moderno; «príncipes» sería engañoso y «jefes» resulta más vago.
- source_word: עֶשְׂרִים וּשְׁנָיִם
  english_pob_choice: twenty-two
  chosen_spanish: veintidós
  alternatives_spanish:
  - '22'
  lexicon: HALOT
  rationale: Número cardinal directo, sin necesidad de adaptación semántica.
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado y quedó sin cambios; aquí se mantiene la lectura estable, con ajuste de naturalidad al español y sin introducir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene la conjunción inicial para conservar el carácter de lista.
  - Se preserva «casa de su padre» por su valor idiomático y social en el hebreo.
  - Se evita «siervo» para נַעַר porque el contexto no lo exige y podría desviar el sentido hacia función doméstica.
  - «Comandantes» refleja el valor militar de שָׂרִים en esta lista de guerreros.
