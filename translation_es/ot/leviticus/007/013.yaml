translation:
  language: es
  text: Junto con tortas de pan con levadura, presentará su ofrenda con el sacrificio de sus ofrendas de paz[a] de acción de gracias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ofrendas de comunión» o «sus ofrendas de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - además de
  lexicon: HALOT
  rationale: En este contexto cultual, עַל introduce acompañamiento o adición, no ubicación física. «Junto con» comunica esa relación de manera natural en español y conserva la idea de que las tortas acompañan a la ofrenda.
- source_word: חַלֹּת לֶחֶם
  english_pob_choice: cakes of bread
  chosen_spanish: tortas de pan
  alternatives_spanish:
  - tortas de trigo
  - panes
  lexicon: HALOT
  rationale: חַלּוֹת designa piezas horneadas, a menudo tortas o panes redondos. «Tortas de pan» suena natural en español y mantiene la referencia a una preparación de pan sin especificar más de lo que el hebreo da.
- source_word: חָמֵץ
  english_pob_choice: leavened
  chosen_spanish: leudado
  alternatives_spanish:
  - leudado con levadura
  - fermentado
  lexicon: HALOT
  rationale: El término cultual se refiere a pan preparado con levadura. «Leudado» es claro, breve y adecuado al registro bíblico; evita una paráfrasis excesiva.
- source_word: יַקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - hará presentar
  lexicon: HALOT
  rationale: En lenguaje sacrificial, el hiphil de קרב significa presentar u ofrecer. «Presentará» conserva el valor ritual y evita repetir innecesariamente «ofrecer» junto a קָרְבָּנוֹ.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: «Ofrenda» comunica bien el sustantivo general קָרְבָּן en español bíblico actual y mantiene el sentido de algo traído cerca para Dios.
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - víctima
  - ofrenda sacrificada
  lexicon: HALOT
  rationale: En legislación ritual, זֶבַח se refiere a un sacrificio ofrecido mediante inmolación. «Sacrificio» es la equivalencia más estable y transparente en español.
- source_word: תּוֹדַת
  english_pob_choice: of thanksgiving
  chosen_spanish: de acción de gracias
  alternatives_spanish:
  - de agradecimiento
  - para acción de gracias
  lexicon: HALOT
  rationale: La construcción expresa una ofrenda/sacrificio caracterizado por gratitud. «Acción de gracias» preserva el matiz nominal del hebreo y suena natural en español litúrgico.
- source_word: שְׁלָמָיו
  english_pob_choice: his peace offerings
  chosen_spanish: sus ofrendas de paz
  alternatives_spanish:
  - sus ofrendas de comunión
  - sus ofrendas de bienestar
  lexicon: HALOT
  rationale: Se conserva la terminología tradicional «ofrendas de paz» para שְׁלָמִים, ya que refleja la decisión inglesa principal y mantiene continuidad léxica. Se añade el posesivo para reproducir el sufijo pronominal hebreo.
theological_decisions:
- issue: Clasificación sacrificial de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: El término hebreo designa una categoría técnica de sacrificio asociada con paz, plenitud y comunión. Mantener «ofrendas de paz» preserva la continuidad terminológica y la referencia cultual reconocible.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa auditada, pero ajusta el orden para una sintaxis española más fluida. Se refleja la revisión final que precisó la relación constructa de thanksgiving, traduciendo תּוֹדַת como «de acción de gracias» dentro de «sacrificio de sus ofrendas de paz de acción de gracias».
  spanish_consistency_notes:
  - Se mantiene «ofrenda» para קָרְבָּן y «sacrificio» para זֶבַח para evitar colapsar dos términos distintos en uno solo.
  - Se conserva el plural «ofrendas de paz» porque el hebreo presenta un sustantivo plural técnico con sufijo pronominal.
  - La nota al pie solo marca la alternativa lexical relevante para חַלּוֹת לֶחֶם חָמֵץ; no se añaden notas donde el texto español ya es suficientemente transparente.
