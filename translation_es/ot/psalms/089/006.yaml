review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: «los cielos» por שָׁמַיִם, «alabarán» por וְיֹודוּ, «tus maravillas» por פִּלְאֶךָ, «Yahvé» por יְהוָה, y «tu fidelidad en la asamblea de…» por אַף אֱמוּנָתְךָ בִּקְהַל…. Sin embargo, «los santos» para קְדֹשִׁים no preserva tan bien como el inglés POB la ambigüedad del hebreo ni su probable referencia celestial; en español tiende a leerse como personas santas canonizadas o creyentes humanos.'
  spanish_quality_summary: El español es claro y digno, pero «oh Yahvé» suena algo calcado; «Yahvé» basta como vocativo natural. Además, la nota actual repite «los santos» como alternativa y no explica adecuadamente la opción principal. «los santos» en el texto principal introduce una connotación eclesial/tradicional menos neutral que «los santos»/«los seres santos»; la opción más legible y fiel es «los santos» no, sino «los seres santos» o mejor «los santos[a]»? Dado el objetivo del POB, «los seres santos» preserva mejor la referencia abierta sin fijarla como ángeles.
  glossary_alignment: 'Se alinea bien con la norma del proyecto en «Yahvé». La principal desalineación es קְדֹשִׁים: el POB inglés documenta «the holy ones», no «the saints», precisamente para evitar sobredeterminar el referente. En español, «los seres santos» refleja mejor esa decisión léxica y teológica que «los santos».'
  issues:
  - severity: medium
    issue: «los santos» para קְדֹשִׁים reduce la neutralidad del original
    rationale: En este contexto del consejo celestial, el hebreo permite «los santos», pero el POB inglés eligió «the holy ones» para conservar la ambigüedad y evitar una lectura demasiado humana o eclesial. En español, «los santos» carga más tradición interpretativa que «los seres santos».
  - severity: medium
    issue: La nota al pie no corresponde bien a la decisión léxica principal
    rationale: La nota dice «O «los santos»», pero el texto principal ya usa «los santos». La nota debe presentar una alternativa real y aclarar la probable referencia celestial, no duplicar la lectura principal.
  - severity: low
    issue: «oh Yahvé» puede sonar menos natural que «Yahvé»
    rationale: El vocativo español bíblico moderno admite «Yahvé» sin «oh». No es un error, pero una ligera mejora estilística favorece naturalidad sin perder dignidad.
  revised_spanish_text: Los cielos alabarán tus maravillas, Yahvé; sí, tu fidelidad en la asamblea de los seres santos[a].
  revised_footnotes:
  - marker: a
    text: O «los santos»; en este contexto, «los seres santos» probablemente se refiere a seres celestiales.
    reason: alternative_reading
  revision_rationale: Se revisa principalmente קְדֹשִׁים para reflejar mejor la decisión del POB inglés («the holy ones») y preservar la ambigüedad contextual sin arrastrar la carga tradicional de «los santos». También se corrige la nota para que ofrezca una alternativa real y se suaviza el vocativo para un español más natural.
