translation:
  language: es
  text: Vuelvan, por favor; no haya injusticia. Vuelvan otra vez[a]; mi justicia aún está en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Regresen una vez más; mi derecho aún está en el asunto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻֽׁבוּ
  english_pob_choice: Turn back
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Regresen
  - Vuelvan atrás
  - Vuélvanse de nuevo
  lexicon: HALOT
  rationale: El imperativo plural de שוב expresa un movimiento de retorno o reversión. «Vuélvanse» conserva esa imagen y suena natural en español bíblico contemporáneo, sin debilitar el llamado de Job a que sus amigos reconsideren su postura.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - ahora
  - les ruego
  lexicon: HALOT
  rationale: La partícula suaviza la súplica. «Por favor» es el equivalente moderno más claro y conserva el tono cortés sin arcaísmo.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - mal
  - torcido
  - iniquidad
  lexicon: HALOT
  rationale: En este contexto de disputa y juicio, «injusticia» comunica mejor la idea de decisión o trato injusto. Mantiene el sustantivo abstracto del hebreo y evita convertirlo en una acusación más específica de la que el texto exige.
- source_word: וְשֻׁבוּ
  english_pob_choice: Turn back again
  chosen_spanish: Vuélvanse otra vez
  alternatives_spanish:
  - Regresen una vez más
  - Vuelvan otra vez
  lexicon: HALOT
  rationale: La repetición intensifica la exhortación. «Otra vez» reproduce esa reiteración de modo natural en español y preserva el énfasis del original.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - todavía sigue
  - de nuevo
  lexicon: HALOT
  rationale: 'Aquí עוד marca continuidad: la rectitud de Job permanece. «Aún» expresa bien ese valor durativo y evita confundirlo con la repetición ya expresada por «otra vez».'
- source_word: צִדְקִי
  english_pob_choice: my righteousness
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi rectitud
  - mi derecho
  - mi vindicación
  lexicon: HALOT
  rationale: צדק puede referirse a justicia, rectitud o derecho en un marco forense. «Mi justicia» mantiene la relación léxica con el término y funciona bien en español, sin resolver prematuramente si se trata de integridad moral o de causa justa en el litigio.
- source_word: בָהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en esto
  - en el asunto
  - en la causa
  lexicon: HALOT
  rationale: El sufijo femenino remite a un antecedente implícito, probablemente el asunto o la causa discutida. «En ella» conserva la referencia pronominal del hebreo; el antecedente queda implícito como en el original.
theological_decisions:
- issue: Alcance de la afirmación de Job sobre su צדק
  english_pob_reading: Job asserts his continuing righteousness/integrity in the matter under dispute, not sinless perfection.
  chosen_spanish_reading: Job afirma que su justicia/rectitud sigue vigente en el asunto debatido, no una perfección sin pecado.
  alternative_spanish_readings:
  - Job afirma que su causa sigue siendo justa
  - Job dice que aún tiene razón en el caso
  rationale: El contexto del discurso de Job apunta a su integridad y a la validez de su causa frente a sus amigos. «Mi justicia aún está en ella» conserva la tensión entre rectitud moral e हिसto?; no la aplana a una simple inocencia absoluta ni a una mera victoria procesal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: conserva el doble llamado a volver, la súplica cortés, la negación impersonal de la injusticia y el sufijo pronominal final. Se evitó traducir mecánicamente «righteousness» por un calco rígido; en cambio, se eligió «justicia» con nota de alternativa para respetar la tensión jurídica/moral documentada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un registro bíblico moderno y claro, evitando arcaísmos como «ruégoles» o «iniquidad».
  - Los signos de segunda persona plural se adaptan al español de América Latina con forma respetuosa y natural.
