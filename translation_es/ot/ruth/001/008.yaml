revisions:
- from: 'Entonces Noemí dijo a sus dos nueras[a]: «Vayan, vuélvanse; cada una a la casa de su madre. Que Yahvé les haga misericordia[b], como ustedes la han hecho con los muertos y conmigo».'
  to: 'Entonces Noemí dijo a sus dos nueras: «Vayan, vuélvanse, cada una a la casa de su madre. Que Yahvé les muestre bondad[a], como ustedes la han mostrado a los muertos y a mí».'
  rationale: Se ajusta חֶסֶד a 'bondad' para reflejar mejor el contexto interpersonal y permitir una construcción española natural con 'mostrar'. Se corrige la cláusula final a 'la han mostrado a los muertos y a mí', que expresa con claridad el modismo hebreo. Se elimina la nota sobre 'nueras' porque la alternativa ofrecida era inválida y no hace falta nota para un término bien resuelto. No requiere adjudicación adicional.
