revisions:
- from: Porque hay un amigo en su propio tiempo[a], y ciertamente no permanecerá en el día de tu angustia.
  to: Porque hay amigo[a] por un tiempo, y ciertamente no permanecerá en el día de tu aflicción.
  rationale: Se reemplaza «en su propio tiempo» por «por un tiempo» para lograr un español más natural y conservar una de las alternativas léxicas ya avaladas por la auditoría inglesa para ἐν καιρῷ αὐτοῦ; la nota mantiene la otra posibilidad contextual («cuando le conviene»). También se ajusta «angustia» a «aflicción» para una expresión más idiomática y bíblicamente estable con θλῖψις.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:08:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: existe un amigo solo en un momento favorable y no permanecerá en el día de tu aflicción. Sin embargo, «en su propio tiempo» suena calcado y poco natural en español, y debilita la ambigüedad contextual que el inglés auditado preserva mejor con una nota. El resto de la línea corresponde adecuadamente a φίλος, οὐ μὴ παραμείνῃ y ἐν ἡμέρᾳ θλίψεώς σου.'
  spanish_quality_summary: El español es comprensible, pero «hay un amigo en su propio tiempo» resulta rígido y poco idiomático. «Hay amigo[a] para su momento» o «hay amigo[a] a su tiempo» serían más naturales, pero la primera puede sonar demasiado libre y la segunda demasiado neutra. La mejor reparación mínima es «Porque hay amigo[a] por un tiempo», apoyada por la nota que preserva la alternativa «cuando le conviene». Además, en español bíblico actual «aflicción» encaja mejor que «angustia» con θλῖψις en una expresión como «el día de tu aflicción».
  glossary_alignment: No hay términos del glosario mayor en juego. «Amigo» para φίλος está bien. No hay conflicto teológico. La revisión propuesta mejora la naturalidad española sin apartarse de la justificación léxica documentada para ἐν καιρῷ αὐτοῦ y θλίψεώς σου.
  issues:
  - severity: medium
    issue: «en su propio tiempo» es una formulación poco natural en español
    rationale: Aunque reproduce de cerca el inglés auditado, en español suena calcada y opaca. El griego ἐν καιρῷ αὐτοῦ admite la idea de temporalidad limitada o conveniencia del amigo; la nota ya documenta esas opciones.
  - severity: low
    issue: «angustia» es posible, pero «aflicción» encaja mejor en la expresión fija
    rationale: Para θλῖψις, «aflicción» mantiene mejor el registro bíblico y combina de manera más natural con «el día de tu…» en español eclesial legible.
  revised_spanish_text: Porque hay amigo[a] por un tiempo, y ciertamente no permanecerá en el día de tu aflicción.
  revised_footnotes:
  - marker: a
    text: 'O: «hay un amigo cuando le conviene» o «a su tiempo», destacando la idea de una amistad que dura solo mientras las condiciones son favorables.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «en su propio tiempo» por «por un tiempo» para lograr un español más natural y conservar una de las alternativas léxicas ya avaladas por la auditoría inglesa para ἐν καιρῷ αὐτοῦ; la nota mantiene la otra posibilidad contextual («cuando le conviene»). También se ajusta «angustia» a «aflicción» para una expresión más idiomática y bíblicamente estable con θλῖψις.
