translation:
  language: es
  text: Y después de esto leyó[a] todas las palabras de la ley, la bendición y la maldición[b], conforme a todo lo que está escrito en el libro de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «proclamó» o «leyó en voz alta»; el verbo hebreo puede denotar lectura pública o proclamación según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Ley» traduce hebreo torah, que también puede significar «instrucción». En este contexto de pacto y documento, «ley» es la opción más adecuada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַֽחֲרֵי כֵן
  english_pob_choice: And afterward
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y luego
  - Y después
  lexicon: HALOT
  rationale: La expresión marca una secuencia temporal en la narración. «Y después de esto» conserva la relación con el episodio anterior y suena natural en español bíblico moderno.
- source_word: קָרָא
  english_pob_choice: he read
  chosen_spanish: leyó
  alternatives_spanish:
  - proclamó
  - leyó en voz alta
  lexicon: HALOT
  rationale: En este contexto, con un objeto directo compuesto por «todas las palabras de la ley», el verbo denota lectura pública/recitación. «Leyó» es la forma más directa y clara; el matiz público queda implícito por la escena.
- source_word: אֶת כָּל דִּבְרֵי הַתּוֹרָה
  english_pob_choice: all the words of the law
  chosen_spanish: todas las palabras de la ley
  alternatives_spanish:
  - todas las palabras de la instrucción
  - todo el texto de la ley
  lexicon: HALOT
  rationale: «Palabras» preserva דִּבְרֵי con concreción. «Ley» refleja torah en este contexto de pacto y documento, coherente con la frase final «libro de la ley».
- source_word: הַבְּרָכָה וְהַקְּלָלָה
  english_pob_choice: the blessing and the curse
  chosen_spanish: la bendición y la maldición
  alternatives_spanish:
  - la bendición y el maldecir
  - la bendición y la maldición del pacto
  lexicon: HALOT
  rationale: Las formas singulares resumen las secciones o categorías de bendición y maldición del pacto. «Maldición» conserva la fuerza nominal del hebreo sin añadir formulaciones interpretativas.
- source_word: כְּ/כָל
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La frase indica conformidad con el texto escrito. «Conforme a todo lo que» mantiene el valor de correspondencia sin sonar forzado en español.
- source_word: הַ/כָּת֖וּב
  english_pob_choice: is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se encuentra escrito
  lexicon: HALOT
  rationale: El participio pasivo funciona naturalmente como estado resultante en español. «Está escrito» es idiomático y fiel.
- source_word: בְּ/סֵ֥פֶר הַ/תּוֹרָֽה
  english_pob_choice: in the Book of the Law
  chosen_spanish: en el libro de la ley
  alternatives_spanish:
  - en el libro de la instrucción
  - en el rollo de la ley
  lexicon: HALOT
  rationale: «Libro» traduce bien סֵפֶר como documento escrito. Se conserva «ley» por el mismo motivo contextual y por la correspondencia con el uso inmediato del término.
theological_decisions:
- issue: Sentido de torah en contexto de pacto
  english_pob_reading: '''Law'' translates Hebrew torah, which can also mean ''instruction.'' Here the covenant-document context favors ''law.'''
  chosen_spanish_reading: «Ley»
  alternative_spanish_readings:
  - «Instrucción»
  - «Enseñanza»
  rationale: El contexto describe lectura pública de un documento pactual junto con bendición y maldición; por eso «ley» comunica mejor la función normativa y documental del texto. «Instrucción» es posible semánticamente, pero debilita esa dimensión en español.
  doctrine_reference: Josué 8:34; Deuteronomio 27–28
- issue: Naturaleza de la acción verbal de קָרָא
  english_pob_reading: he read / he proclaimed / he read aloud
  chosen_spanish_reading: «leyó»
  alternative_spanish_readings:
  - «proclamó»
  - «leyó en voz alta»
  rationale: La fuente inglesa preserva la tensión entre leer y proclamar. En español, «leyó» es suficiente y no fuerza una elección interpretativa excesiva; el carácter público queda sugerido por el contexto narrativo.
  doctrine_reference: Josué 8:34; Nehemías 8:1–8
- issue: Bendición y maldición como categorías pactales
  english_pob_reading: the blessing and the curse
  chosen_spanish_reading: «la bendición y la maldición»
  alternative_spanish_readings:
  - «la bendición y el maldecir»
  - «la bendición y la maldición del pacto»
  rationale: Se preserva la formulación nominal compacta del hebreo y la lectura pactal del pasaje. Añadir «del pacto» aclararía, pero no es explícito en la línea hebrea misma.
  doctrine_reference: Deuteronomio 27:12–13; 28:1–68
translation_notes:
  revision_awareness: 'Coincide con la decisión de la auditoría inglesa: no se requieren revisiones textuales; la traducción sigue la misma interpretación base y conserva la tensión léxica de קָרָא y torah sin expandirla innecesariamente.'
  spanish_consistency_notes:
  - Se mantiene el orden narrativo simple y directo, con estilo bíblico moderno pero natural.
  - Se conserva «ley» en todo el versículo para coherencia terminológica con «libro de la ley».
  - La puntuación usa coma para reproducir la cadencia enumerativa del hebreo sin añadir segmentación doctrinal.
