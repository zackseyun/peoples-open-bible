translation:
  language: es
  text: 'Esto es lo que me mostró: y vi[a] al Señor de pie junto a un muro hecho con una plomada, con una plomada en su mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y he aquí»; la fórmula hebrea introduce una aparición repentina en la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: This is what
  chosen_spanish: Esto es lo que
  alternatives_spanish:
  - Así
  - Así fue como
  lexicon: HALOT
  rationale: Introduce el informe visionario de manera natural en español, conservando el valor demostrativo de la fórmula hebrea sin volverla demasiado literal.
- source_word: הִרְאַנִי
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me dejó ver
  lexicon: HALOT
  rationale: El causativo de ראה en contexto de visión se expresa con naturalidad mediante 'me mostró', que mantiene la idea de que la visión fue dada por Dios.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: '[a]'
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La marca deíctica de sorpresa y presencia súbita se conserva mejor con una nota de atención breve en español; se evita cargar la frase con una fórmula menos natural. La presencia del marcador en el texto permite señalar esa exclamación/índice visionario.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Soberano
  - el Señor Dios
  lexicon: HALOT
  rationale: Aquí se trata del título divino אֲדֹנָי, no del Nombre del pacto; en español, 'el Señor' es la forma más natural y reverente para un título divino, manteniendo la distinción con Yahvé.
- source_word: נִצָּב
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba plantado
  - estaba parado
  lexicon: HALOT
  rationale: El participio describe una escena en curso; 'estaba de pie' conserva la imagen visual sin sonar arcaico.
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - sobre
  - al lado de
  lexicon: HALOT
  rationale: Dado el contexto de inspección y la dificultad de la imagen, 'junto a' transmite mejor la relación espacial sin sugerir que estuviera literalmente encima del muro.
- source_word: חוֹמַת אֲנָךְ
  english_pob_choice: a wall made with a plumb line
  chosen_spanish: un muro hecho con una plomada
  alternatives_spanish:
  - un muro de plomada
  - un muro trazado a plomo
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y probablemente alude a un muro construido o evaluado con un instrumento de plomada. 'Muro hecho con una plomada' conserva la rareza del original y enlaza con la repetición inmediata del instrumento.
- source_word: אֲנָךְ
  english_pob_choice: plumb line
  chosen_spanish: plomada
  alternatives_spanish:
  - plomada de albañil
  - plomada
  lexicon: HALOT
  rationale: En español, 'plomada' expresa el instrumento de medición vertical que corresponde mejor al contexto. Evita 'plomo', que podría sugerir el metal y no el instrumento.
- source_word: וּבְיָדוֹ
  english_pob_choice: with a plumb line in his hand
  chosen_spanish: con una plomada en su mano
  alternatives_spanish:
  - y en su mano una plomada
  - teniendo una plomada en su mano
  lexicon: HALOT
  rationale: Mantiene la misma imagen del objeto de medición sostenido por la figura visionaria, con una sintaxis natural en español.
theological_decisions:
- issue: Tratamiento del título divino אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Soberano
  rationale: Se conserva la lectura de título divino, no el Nombre Yahvé, porque el hebreo aquí usa אֲדֹנָי. En español, 'el Señor' es el equivalente reverente y más idiomático en este contexto visionario.
  doctrine_reference: 'DOCTRINE.md: translate titles; distinguish divine titles from the Tetragrammaton'
- issue: Ambigüedad de חוֹמַת אֲנָךְ
  english_pob_reading: a wall made with a plumb line
  chosen_spanish_reading: un muro hecho con una plomada
  alternative_spanish_readings:
  - un muro de plomada
  - un muro trazado a plomo
  rationale: La frase hebrea es lexicográficamente difícil. Se preserva la idea de un muro asociado a una plomada sin resolver de forma excesiva la ambigüedad; así se mantiene el vínculo con la repetición del instrumento en la segunda mitad del versículo.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical tensions'
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente, que prefirió una relación espacial directa ('by') y una formulación más cercana al hebreo para la imagen del muro. En español, esto se refleja con 'junto a' y con 'muro hecho con una plomada', manteniendo la tensión léxica documentada en אֲנָךְ.
  spanish_consistency_notes:
  - Se usa 'el Señor' para אֲדֹנָי, en coherencia con la política de traducir títulos divinos.
  - Se elige 'plomada' para אֲנָךְ por ser el término español más claro para el instrumento de verticalidad.
  - Se conserva el carácter visionario y súbito del hebreo sin sobreexplicar la escena.
  - La nota de pie de página marca la alternativa tradicional 'y he aquí' para la función de וְהִנֵּה.
