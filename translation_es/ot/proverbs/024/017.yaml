  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: prohibición de alegrarse por la caída del enemigo y de permitir un gozo interno cuando tropieza. También conserva correctamente la distinción léxica entre נפל («caer») y כשל («tropezar»). Sin embargo, la segunda cláusula española no reproduce fielmente la sintaxis ni el sentido de יָגֵל לִבֶּךָ («no exulte tu corazón»), porque «ni deje tu corazón de júbilo» es gramaticalmente defectuoso y semánticamente opaco.'
  spanish_quality_summary: 'La primera mitad es natural y clara. La segunda mitad suena incorrecta en español moderno y dificulta la comprensión. Conviene reformularla con una construcción verbal natural: «ni exulte tu corazón» o «ni se regocije tu corazón». «Exulte» preserva bien la fuerza de גיל y mantiene el paralelismo sapiencial con dignidad y claridad.'
  glossary_alignment: No hay términos del glosario maestro en juego salvo el manejo general de distinciones léxicas. El borrador acierta al diferenciar «alegrarse» de un término más intenso, pero debe expresar גיל con un verbo pleno en español. «Exultar» es adecuado y más fiel que la frase nominal actual.
  issues:
  - severity: high
    issue: La frase «ni deje tu corazón de júbilo» es gramaticalmente incorrecta.
    rationale: No corresponde a una construcción idiomática del español ni refleja de manera comprensible el verbo hebreo יָגֵל aplicado a «tu corazón».
  - severity: medium
    issue: Se pierde la correspondencia verbal directa de «your heart exult».
    rationale: El hebreo presenta «tu corazón» como sujeto del verbo de gozo intenso; la versión actual sustituye eso por una locución defectuosa que diluye la imagen antropológica.
  - severity: low
    issue: La nota al pie usa «jubilarse» como glosa posible de גיל.
    rationale: En español actual, «jubilarse» se asocia primariamente con retirarse del trabajo y puede sonar equívoco. «Exultar» o «regocijarse intensamente» evita ambigüedad.
  revised_spanish_text: No te alegres cuando caiga tu enemigo[a], ni exulte tu corazón cuando tropiece.
  revised_footnotes:
