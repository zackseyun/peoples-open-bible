  text: Ἠσαΐας δὲ κράζει ὑπὲρ τοῦ Ἰσραήλ· Ἐὰν ᾖ ὁ ἀριθμὸς τῶν υἱῶν Ἰσραὴλ ὡς ἡ ἄμμος τῆς θαλάσσης, τὸ ⸀ὑπόλειμμα σωθήσεται·
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/027.yaml
  text: But Isaiah cries out concerning Israel[a], “Though the number of the sons of Israel is like the sand of the sea[c][b], only the remnant will be saved.”
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Greek reads 'the sons of Israel,' a traditional covenantal designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'If the number of the sons of Israel is like the sand of the sea.' The Greek conditional can be rendered more literally, though here it carries a concessive force in context.
    reason: alternative_reading
  - marker: c
    text: Or 'will be delivered.' The wording echoes Isaiah's prophecy of a surviving remnant.
    reason: cross_reference
translation:
  language: ko
  text: '그리고 이사야가 이스라엘에 대하여 외칩니다: 「이스라엘 자손의 수가 바다의 모래와 같을지라도, 남은 자만 구원받을 것이다.」'
  philosophy: optimal-equivalence
