translation:
  language: es
  text: Así celebraron la Pascua en el primer mes, el día catorce del mes, al atardecer[a], en el desierto de Sinaí; conforme a todo lo que Yahvé había mandado a Moisés, así hicieron los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “entre las tardes”, un modismo que se refiere al periodo crepuscular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ / עָשׂוּ
  english_pob_choice: kept / did
  chosen_spanish: celebraron / hicieron
  alternatives_spanish:
  - observaron / hicieron
  - guardaron / hicieron
  lexicon: HALOT
  rationale: Con פֶּסַח, עשה funciona como modismo para celebrar o guardar la Pascua; en español, “celebraron” comunica el acto ritual con naturalidad. El cierre resumido se vierte con “hicieron” para reflejar el valor general de עָשׂוּ en la cláusula final sin perder el paralelismo del hebreo.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pascua
  - la celebración de la Pascua
  lexicon: HALOT
  rationale: Aquí פֶּסַח se refiere a la observancia de la Pascua en su conjunto, no solo al sacrificio. “La Pascua” es la forma española más natural y fiel al uso contextual.
- source_word: בָּרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - en el primero
  - en el primer mes del año
  lexicon: HALOT
  rationale: El hebreo presupone el sustantivo “mes” dentro de la fórmula calendárica; en español conviene explicitarlo para que la fecha sea clara y fluida.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם לַחֹדֶשׁ
  english_pob_choice: on the fourteenth day of the month
  chosen_spanish: el día catorce del mes
  alternatives_spanish:
  - el catorce del mes
  - el día catorce de este mes
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea estándar de datación, con una estructura natural en español y suficientemente cercana al original.
- source_word: בֵּין הָעַרְבַּיִם
  english_pob_choice: at twilight
  chosen_spanish: al atardecer
  alternatives_spanish:
  - al anochecer
  - entre las dos tardes
  lexicon: HALOT
  rationale: El hebreo es un modismo temporal que literalmente significa “entre las tardes” y señala el periodo crepuscular. “Al atardecer” expresa bien ese intervalo en español sin introducir una imagen extraña; la lectura más literal queda implícitamente disponible por el contexto auditado.
- source_word: בְּמִדְבַּר סִינָי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto del Sinaí
  - en el yermo de Sinaí
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse por “desierto” o “desierto/wilderness” según el registro; “desierto de Sinaí” es claro y reconocido en español, manteniendo el lugar y el tono bíblico.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La expresión enfatiza conformidad total con el mandato; “conforme a todo lo que” conserva esa amplitud y suena natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración directa, conforme a la política del proyecto, en lugar de sustituirlo por un título genérico. “Yahvé” es la forma española asentada para el Tetragrámaton.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT
  rationale: El valor es de mandato previo ya vigente al momento de la acción. “Había mandado” es una solución sobria y fiel, más idiomática que un calco.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se preserva la forma masculina plural explícita del hebreo. “Los hijos de Israel” mantiene la terminología bíblica y la referencia corporativa sin neutralizar el texto fuente.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide no ocultarlo con una sustitución como “SEÑOR”. “Yahvé” conserva el nombre propio del pacto y es plenamente legible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la forma masculina explícita del hebreo por fidelidad gramatical y documental, sin borrar su sentido colectivo. En este contexto, la referencia sigue siendo todo el pueblo de Israel.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés y con la revisión más reciente: no hubo cambios aplicados y el control cruzado reporta alta concordancia. La decisión principal de estilo en español es usar equivalentes naturales, pero sin perder el valor idiomático de “entre las tardes” ni la forma explícita del nombre divino.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יהוה, conforme al estándar del proyecto.
  - 'Se mantiene la estructura temporal completa: primer mes / día catorce / al atardecer.'
  - “Los hijos de Israel” conserva el plural masculino explícito del hebreo.
  - La nota [a] acompaña solo a la expresión temporal idiomática y no introduce otra variante textual.
