revisions:
- from: Los sacerdotes levíticos —toda la tribu de Leví— no tendrán parte ni herencia con Israel[a]; comerán las ofrendas encendidas[b] de Yahvé, es decir, su herencia.
  to: Los sacerdotes levíticos —toda la tribu de Leví— no tendrán parte ni herencia con Israel; comerán las ofrendas de alimento[a] de Yahvé, es decir, su herencia[b].
  rationale: Se corrige el término sacrificial principal para reflejar el sentido documentado de אִשֵּׁי יְהוָה en el POB («ofrendas de alimento»), dejando la forma más literal «ofrendas por fuego» en nota. Se elimina una nota errónea sobre «con Israel» y se añade la nota contextual sobre «su herencia», ya respaldada por el expediente inglés. El resto del versículo se conserva porque es fiel, claro y acorde con la terminología del proyecto.
