revisions:
- from: Ciertamente[a], así como una mujer traiciona a su compañero, así ustedes me han traicionado a mí, oh casa de Israel, declara Yahvé.
  to: Ciertamente[a], como una mujer traiciona a su compañero, así me han traicionado, casa de Israel, declara Yahvé.
  rationale: 'Se hicieron ajustes menores de estilo para lograr un español más natural y digno sin cambiar el sentido: «como ... así ...» en lugar de «así como ... así ...», se eliminó la redundancia «a mí», y se suavizó el vocativo quitando «oh». El resto del contenido está fiel al hebreo y al razonamiento léxico-teológico auditado.'
