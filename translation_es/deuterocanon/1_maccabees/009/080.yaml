translation:
  language: es
  text: detrás de él. Y cercaron el campamento en torno a él, y desde temprano hasta la tarde dispararon flechas contra el pueblo[a]. Pero el pueblo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
