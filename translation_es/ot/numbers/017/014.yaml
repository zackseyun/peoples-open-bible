review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: distingue entre los muertos de la plaga y otro grupo previo vinculado con Coré, y conserva correctamente la cifra de 14,700. Sin embargo, la nota al pie no preserva plenamente las alternativas documentadas en la auditoría inglesa para עַל דְּבַר קֹרַח, especialmente el matiz de «en el asunto de Coré» / «con respecto a Coré».'
  spanish_quality_summary: El español es claro, natural y digno. «Ahora» funciona, aunque en narrativa bíblica también podría omitirse o usarse «Y». «Además de» y «los que murieron» son idiomáticos. La principal mejora necesaria es ajustar la nota para reflejar mejor el rango semántico del hebreo y la razón documentada en el English POB.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El nombre קֹרַח como «Coré» es aceptable en tradición bíblica española. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La elección «por causa de Coré» es defendible en el texto principal, pero la nota debe conservar mejor las alternativas auditadas.
  issues:
  - severity: medium
    issue: La nota al pie reduce demasiado las alternativas de עַל דְּבַר קֹרַח.
    rationale: La auditoría inglesa preserva no solo una alternativa causal («on account of Korah») sino también una alternativa de asunto/materia («in the matter of Korah»). La nota española actual solo ofrece «a causa de Coré», perdiendo parte del espectro semántico relevante.
  - severity: low
    issue: La redacción de la nota podría vincular más explícitamente la frase con las muertes previas relacionadas con la rebelión de Coré.
    rationale: 'El texto actual ya apunta en esa dirección, pero puede alinearse más estrechamente con la explicación inglesa: se trata de los que ya habían muerto en conexión con la rebelión de Coré.'
  revised_spanish_text: Ahora, los que murieron en la plaga fueron catorce mil setecientos[a], además de los que murieron por causa de Coré.
  revised_footnotes:
  - marker: a
    text: O «a causa de Coré» o «en el asunto de Coré». La frase se refiere a los que ya habían muerto en relación con la rebelión de Coré.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, claro y natural en español. Se revisa la nota al pie para preservar mejor las alternativas semánticas documentadas para עַל דְּבַר קֹרַח y para reflejar con mayor precisión la explicación contextual del English POB.
