  glossary_alignment: No hay conflictos con la terminología base del proyecto. Rubén está bien. «Compañías» concuerda con la revisión inglesa documentada para לְצִבְאֹתָם. El cambio propuesto a «censados» mejora la representación de הַפְּקֻדִים sin añadir contenido.
