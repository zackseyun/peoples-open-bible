lexical_decisions:
- source_word: ἔδοξεν
  english_pob_choice: he thought
  chosen_spanish: pensó
  alternatives_spanish:
  - le pareció
  - decidió
  lexicon: LSJ
  rationale: El verbo introduce la conclusión o juicio del sujeto. «Pensó» comunica bien esa valoración mental en español sin volverla demasiado impersonal como «le pareció» ni demasiado volitiva como «decidió».
- source_word: συλλαβὼν
  english_pob_choice: by arresting
  chosen_spanish: al arrestarlo
  alternatives_spanish:
  - habiéndolo apresado
  - al capturarlo
  lexicon: BDAG
  rationale: En este contexto narrativo el participio expresa la acción de prender a alguien. «Al arrestarlo» conserva el sentido de tomarlo bajo custodia con español natural y formal.
- source_word: ἐκεῖνον
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a ese hombre
  lexicon: LSJ
  rationale: El demostrativo señala a una persona ya identificada. El clítico «lo» es directo y natural en español; evita añadir una explicitación innecesaria como «ese hombre».
- source_word: τούτοις
  english_pob_choice: these people
  chosen_spanish: a estos hombres
  alternatives_spanish:
  - a estas personas
  - a estos
  lexicon: LSJ
  rationale: El dativo plural masculino apunta al grupo concreto en vista. «A estos hombres» refleja mejor la forma gramatical y el matiz referencial que una opción más genérica como «personas».
- source_word: ἐνεργάσασθαι
  english_pob_choice: he would bring about
  chosen_spanish: causaría
  alternatives_spanish:
  - produciría
  - traería
  lexicon: BDAG
  rationale: El infinitivo medio aquí tiene fuerza causativa. «Causaría» expresa de forma compacta y fiel que el arresto produciría un efecto dañino sobre el grupo.
- source_word: συμφοράν
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - desastre
  lexicon: LSJ
  rationale: El sustantivo denota un infortunio serio. «Calamidad» mantiene el peso del término sin sonar demasiado coloquial; «desastre» podría sonar más moderno, pero menos preciso en registro bíblico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del griego y del hilo auditado en inglés: el juicio mental del sujeto, la detención como acción concreta, el referente específico de ἐκεῖνον y el efecto perjudicial sobre el grupo. Se evita la paráfrasis expansiva y se conserva la gravedad del sustantivo final.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin recurrir a fórmulas eclesiásticas fosilizadas.
  - No se añadió nota al pie porque la alternativa inglesa («it seemed») no exige en español una ambigüedad textual independiente; la opción principal ya recoge el juicio subjetivo del verbo griego.
  - Se prefirió «calamidad» por consistencia con el valor léxico serio del sustantivo griego y con una traducción transparente para lectores hispanohablantes.
