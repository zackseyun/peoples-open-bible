translation:
  language: es
  text: Porque Yahvé ha construido Sion[a]; ha aparecido en su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «se ve en su gloria» o «ha sido visto en su gloria». El verbo hebreo puede entenderse tanto como aparición divina como como ser visto.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o explicación de lo dicho antes. En español, «Porque» conserva bien esa relación causal o explicativa en un registro poético claro.
- source_word: בָנָה
  english_pob_choice: has built
  chosen_spanish: ha construido
  alternatives_spanish:
  - ha edificado
  - ha levantado
  - ha reedificado
  lexicon: HALOT
  rationale: El verbo qal perfecto expresa una acción completa. «Ha construido» es directo y fiel; evita añadir el matiz de restauración que tendría «reedificado», ya que no está explícito en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio mediante la transliteración establecida del proyecto, en vez de sustituirlo por un título. «Yahvé» preserva la referencia al nombre del pacto.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Es un nombre propio que debe mantenerse como tal. «Sion» sigue el uso español habitual y evita generalizar el referente a Jerusalén, lo cual no exige el hebreo.
- source_word: נִרְאָה
  english_pob_choice: has appeared
  chosen_spanish: se ha aparecido
  alternatives_spanish:
  - se ve
  - ha sido visto
  - aparece
  lexicon: HALOT
  rationale: El nifal de ראה puede leerse como «ser visto» o «aparecer». Aquí, con Yahvé como sujeto y «en su gloria» como marco, «se ha aparecido» comunica una manifestación divina sin eliminar la ambigüedad textual entre aparecer y ser visto.
- source_word: בִּכְבוֹדוֹ
  english_pob_choice: in his glory
  chosen_spanish: en su gloria
  alternatives_spanish:
  - con su gloria
  - en su esplendor
  lexicon: HALOT
  rationale: «Gloria» reproduce el valor central de כָּבוֹד y mantiene el peso teológico del enunciado. «En su gloria» refleja con naturalidad la relación expresada por la preposición.
theological_decisions:
- issue: Ambigüedad de נִרְאָה בִּכְבוֹדוֹ entre aparición divina y visión pasiva
  english_pob_reading: he has appeared in his glory
  chosen_spanish_reading: se ha aparecido en su gloria
  alternative_spanish_readings:
  - se ve en su gloria
  - ha sido visto en su gloria
  rationale: 'La POB inglesa conserva la tensión: el verbo puede entenderse como auto-manifestación divina o como ser visto. El español elegido mantiene esa apertura sin resolverla de forma excesiva hacia una sola lectura.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés al evitar añadir un matiz no explícito como «de nuevo» o «reconstruido»; también refleja la decisión de traducir el nombre divino por «Yahvé» y no por una sustitución titular.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para el Tetragrama.
  - «Sion» se usa como nombre propio sin ampliar el referente.
  - La construcción verbal busca equilibrio entre fidelidad semántica y español natural en poesía bíblica.
  - La nota al pie preserva la tensión interpretativa documentada en el inglés POB.
