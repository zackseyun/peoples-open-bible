translation:
  language: es
  text: En lugar de trigo, que salgan espinos, y en lugar de cebada, maleza pestilente[a]. Las palabras de Job han terminado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hierba fétida» o «maleza nociva»; no se puede identificar con certeza la planta hebrea exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en lugar de que
  lexicon: HALOT
  rationale: En este contexto de sustitución imprecatoria, la relación no es espacial sino sustitutiva; «en lugar de» reproduce bien el valor de תַּחַת y suena natural en español.
- source_word: חִטָּה
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - trigo candeal
  - trigo
  lexicon: HALOT
  rationale: «Trigo» es el equivalente normal y claro para el cereal contrastado con el crecimiento dañino; mantiene la oposición agrícola del hebreo.
- source_word: יֵצֵא
  english_pob_choice: let ... come up
  chosen_spanish: que salgan
  alternatives_spanish:
  - que broten
  - que suban
  lexicon: HALOT
  rationale: Con vegetación, el verbo hebreo expresa emergencia desde la tierra; «que salgan» conserva esa imagen de surgir del suelo sin forzar un calco.
- source_word: חוֹחַ
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - cardos
  - zarzas
  lexicon: HALOT
  rationale: El hebreo nombra una planta espinosa dañina de forma general. «Espinos» comunica bien la idea en español, aunque deja abierta la identificación botánica exacta.
- source_word: שְׂעֹרָה
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - cebada común
  lexicon: HALOT
  rationale: «Cebada» es la equivalencia estándar y directa del cereal mencionado.
- source_word: בָאְשָׁה
  english_pob_choice: stinkweed
  chosen_spanish: hierba pestilente
  alternatives_spanish:
  - hierba fétida
  - maleza pestilente
  - hierba nociva
  lexicon: HALOT
  rationale: El término hebreo alude a una vegetación mala o maloliente, pero la especie exacta es incierta. «Hierba pestilente» conserva el matiz de hedor/repulsión sin fingir precisión botánica que el texto no garantiza.
- source_word: תַּמּוּ
  english_pob_choice: are ended
  chosen_spanish: se han terminado
  alternatives_spanish:
  - han concluido
  - se han acabado
  lexicon: HALOT
  rationale: La fórmula final indica conclusión; «se han terminado» refleja bien el cierre formal del libro/diálogo.
- source_word: דִּבְרֵי אִיּוֹב
  english_pob_choice: the words of Job
  chosen_spanish: las palabras de Job
  alternatives_spanish:
  - los dichos de Job
  - los discursos de Job
  lexicon: HALOT
  rationale: «Palabras» sigue de cerca el constructo hebreo y funciona de manera natural como colofón literario.
theological_decisions:
- issue: Cierre colofónico del libro y tono de conclusión
  english_pob_reading: The words of Job are ended.
  chosen_spanish_reading: Las palabras de Job se han terminado.
  alternative_spanish_readings:
  - Las palabras de Job han concluido.
  - Terminan las palabras de Job.
  rationale: No se trata de una afirmación doctrinal, sino de una nota final editorial/literaria. La redacción española conserva el carácter de cierre solemne y objetivo del hebreo.
  doctrine_reference: Sin referencia doctrinal directa; colofón literario.
translation_notes:
  revision_awareness: 'Se siguió el criterio del POB inglés: traducción óptima-eq con preservación de la incertidumbre botánica en nota. No hubo necesidad de ajustar revisiones previas porque el contexto auditado muestra alta concordancia y sin cambios requeridos.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantuvo «Job» como nombre propio bíblico estándar en español.
  - La fórmula final «se han terminado» conserva el tono de colofón sin añadir interpretación.
  - «Espinos» y «hierba pestilente» respetan la tensión lexical entre una planta espinosa genérica y una maleza o planta fétida de identificación incierta.
