translation:
  language: es
  text: Estabas mirando hasta que una piedra fue desprendida[a], no por manos, e hirió a la estatua[b] en sus pies de hierro y barro, y los trituró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin manos». El arameo indica que la piedra no fue cortada por agencia humana.
    reason: lexical_alternative
  - marker: b
    text: O «la imagen». El término arameo puede significar imagen o estatua; aquí se refiere a la gran figura vista en el sueño.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוַיְתָ
  english_pob_choice: you were watching
  chosen_spanish: tú estabas observando
  alternatives_spanish:
  - tú veías
  - tú estabas mirando
  - tú estabas viendo
  lexicon: HALOT
  rationale: El participio con הֲוַיְתָ expresa acción շարունակada en pasado. «Estabas observando» conserva el aspecto durativo y suena natural en español sin perder el matiz de atención sostenida.
- source_word: עַד דִּי
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el momento en que
  lexicon: HALOT
  rationale: En español, «hasta que» reproduce con claridad el límite temporal introducido por la secuencia aramea.
- source_word: הִתְגְּזֶרֶת אֶבֶן
  english_pob_choice: a stone was cut out
  chosen_spanish: una piedra fue cortada
  alternatives_spanish:
  - una piedra fue tallada
  - una piedra fue cortada de un bloque
  - una piedra fue extraída
  lexicon: HALOT
  rationale: «Fue cortada» mantiene la pasiva y la imagen de una piedra sacada mediante corte. Se evita «tallada» por ser menos directo y «extraída» por desplazar el foco del corte.
- source_word: דִּי לָא בִידַיִן
  english_pob_choice: not by hands
  chosen_spanish: no por manos
  alternatives_spanish:
  - sin manos
  - no con manos
  lexicon: HALOT
  rationale: La forma literal «no por manos» conserva la fuerza idiomática de agencia no humana. Se mantiene la tensión lexical documentada por el POB; «sin manos» queda como alternativa natural pero menos cercana a la construcción.
- source_word: וּמְחָת
  english_pob_choice: and it struck
  chosen_spanish: e hizo impacto
  alternatives_spanish:
  - y golpeó
  - y golpeó contra
  - y dio contra
  lexicon: HALOT
  rationale: El verbo puede expresar golpe/choque violento. «Hizo impacto» comunica el evento con solemnidad y claridad en español, sin perder la idea de choque contundente.
- source_word: לְצַלְמָא
  english_pob_choice: the statue
  chosen_spanish: la estatua
  alternatives_spanish:
  - la imagen
  lexicon: HALOT
  rationale: En este contexto narrativo, צלם refiere a la gran figura del sueño; «estatua» es más concreto y visual en español. «Imagen» permanece como alternativa válida, pero menos precisa aquí.
- source_word: עַל רַגְלֹוהִי
  english_pob_choice: on its feet
  chosen_spanish: en sus pies
  alternatives_spanish:
  - sobre sus pies
  - sobre sus piernas
  lexicon: HALOT
  rationale: «En sus pies» refleja de forma directa el sintagma preposicional y conserva la localización del impacto. Se evita «piernas» por alejarse del léxico del original.
- source_word: דִּי פַרְזְלָא וְחַסְפָּא
  english_pob_choice: of iron and clay
  chosen_spanish: de hierro y barro
  alternatives_spanish:
  - de hierro y arcilla
  - de hierro y greda
  lexicon: HALOT
  rationale: «Barro» comunica bien חַסְפָּא en español común y mantiene el contraste de materiales frágiles. «Arcilla» sería más técnico, pero no necesario para la comprensión.
- source_word: וְהַדֵּקֶת הִמּוֹן
  english_pob_choice: and crushed them
  chosen_spanish: y los aplastó
  alternatives_spanish:
  - y los hizo polvo
  - y los trituró
  - y los quebrantó
  lexicon: HALOT
  rationale: El verbo expresa aplastamiento/pulverización. «Aplastó» es fuerte, natural y fiel al sentido, preservando la violencia del acto mejor que opciones más libres.
theological_decisions:
- issue: Agencia no humana en la frase 'not by hands'
  english_pob_reading: not by hands
  chosen_spanish_reading: no por manos
  alternative_spanish_readings:
  - sin manos
  rationale: 'Se preserva la ambigüedad teológica del arameo: la piedra no procede de fabricación o acción humana. La opción literal mantiene abierta la lectura de origen divino y no humano, como en el POB inglés.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Naturaleza de צלם en el sueño
  english_pob_reading: the statue
  chosen_spanish_reading: la estatua
  alternative_spanish_readings:
  - la imagen
  rationale: El contexto del sueño describe una figura colosal, no una imagen cultual. «Estatua» comunica mejor la escena sin borrar que el término hebreo/arameo también puede significar «imagen».
  doctrine_reference: Narrative context / HALOT lexical range
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la puntuación para mayor naturalidad sin alterar el contenido. En español se optó por una sintaxis igualmente fluida y una puntuación simple, manteniendo la progresión: observación continua, irrupción de la piedra, impacto, y destrucción de los pies.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general de este proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'estatua' por coherencia con el contexto onírico de Daniel 2 y con la nota lexical inglesa sobre צלם.
  - Se conservó la metáfora física de 'piedra' y el lenguaje de impacto fuerte para no suavizar la escena.
  - Se prefirió 'barro' por ser transparente y natural en español, sin introducir un tecnicismo innecesario.
