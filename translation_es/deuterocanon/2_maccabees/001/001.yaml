review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura epistolar griega, mantiene la repetición de «hermanos», distingue destinatarios y remitentes, y preserva «buena paz» como calco deliberadamente marcado de εἰρήνην ἀγαθήν. Sin embargo, «salud» para χαίρειν en español bíblico actual suena poco natural y fácilmente se malinterpreta como bienestar físico; «saludos» conserva mejor la función epistolar sin añadir el verbo «enviar».
  spanish_quality_summary: El texto es claro y mayormente natural, pero «salud» resulta arcaizante y menos legible para un lector eclesial contemporáneo. También puede simplificarse «que están en Jerusalén» a «en Jerusalén» sin pérdida de sentido. La frase final con «saludos[a] y buena paz» lee mejor en español moderno y sigue siendo fiel al griego.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Hermanos» concuerda con la decisión auditada para ἀδελφοί. «Judea» y «tierra de Judea» son adecuados. No aparecen términos sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: «salud» para χαίρειν
    rationale: Aunque puede defenderse históricamente como fórmula epistolar, en español neutro contemporáneo se entiende con facilidad como salud física y no como saludo. «Saludos» comunica mejor el valor epistolar documentado por el POB sin introducir una paráfrasis verbal.
  - severity: low
    issue: Pesadez de «que están en Jerusalén»
    rationale: La relativa es comprensible, pero «los hermanos judíos en Jerusalén» es más fluido y sigue reflejando οἱ ἐν Ἱεροσολύμοις.
  revised_spanish_text: 'A los hermanos judíos en Egipto: los hermanos judíos en Jerusalén y los que están en la tierra de Judea, saludos[a] y buena paz.'
