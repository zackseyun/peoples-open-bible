translation:
  language: es
  text: Respóndeme pronto, Yahvé; mi espíritu desfallece. No escondas tu rostro de mí, o llegaré a ser como los que descienden al pozo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que descienden al sepulcro». El hebreo «el pozo» es una imagen poética de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de inmediato
  lexicon: HALOT
  rationale: El imperativo adverbial expresa urgencia en la petición. «Pronto» suena natural en español moderno y conserva la premura sin sonar rígido.
- source_word: עֲנֵנִי
  english_pob_choice: Answer me
  chosen_spanish: Respóndeme
  alternatives_spanish:
  - Contéstame
  - Atiéndeme
  lexicon: HALOT
  rationale: En el contexto de oración, ענה pide una respuesta a la súplica. «Respóndeme» mantiene el valor directo y devocional sin perder naturalidad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton. «Yahvé» es la forma principal del proyecto en español y evita la sustitución por un título.
- source_word: כָּלְתָה רוּחִי
  english_pob_choice: my spirit fails
  chosen_spanish: mi espíritu desfallece
  alternatives_spanish:
  - mi espíritu se agota
  - mi espíritu está consumido
  - mi espíritu falla
  lexicon: HALOT
  rationale: כלה expresa agotamiento o consumación. Con «espíritu», «desfallece» comunica debilidad y colapso de manera idiomática en español, manteniendo la intensidad poética.
- source_word: אַל תַּסְתֵּר פָּנֶיךָ מִמֶּנִּי
  english_pob_choice: Do not hide your face from me
  chosen_spanish: No escondas de mí tu rostro
  alternatives_spanish:
  - No apartes de mí tu rostro
  - No ocultes tu rostro de mí
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática del hebreo. «Esconder el rostro» comunica retirada de favor o presencia, y «de mí» mantiene el movimiento relacional de la frase.
- source_word: וְנִמְשַׁלְתִּי
  english_pob_choice: or I will become like
  chosen_spanish: o llegaré a ser como
  alternatives_spanish:
  - y seré como
  - o seré contado entre
  lexicon: HALOT
  rationale: El nifal de משל aquí indica llegar a ser comparable o semejante. «Llegaré a ser como» conserva la consecuencia temida y suena natural tras la cláusula negativa.
- source_word: יֹרְדֵי בוֹר
  english_pob_choice: those who go down to the pit
  chosen_spanish: los que descienden al pozo
  alternatives_spanish:
  - los que bajan al sepulcro
  - los que descienden a la tumba
  lexicon: HALOT
  rationale: «Pozo» conserva la metáfora hebrea de muerte sin resolverla en un equivalente más interpretativo como «sepulcro». «Los que descienden» reproduce el participio sustantivado.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura inglesa del audit trail preserva el nombre personal de Dios. En español, «Yahvé» cumple la misma función teológica y se ajusta al estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de «el pozo»
  english_pob_reading: the pit as a poetic image for death
  chosen_spanish_reading: el pozo como imagen poética de la muerte
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el reino de los muertos
  rationale: Se conserva la metáfora sin explicitarla en el texto principal. Esto respeta la tensión poética y evita cerrar prematuramente el sentido del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El pasaje coincide con la lectura final sin cambios respecto al último pase revisado; no se detectan revisiones aplicadas en el flujo auditado. La redacción española sigue de cerca las decisiones confirmadas del audit trail inglés, preservando el nombre divino, la imagen del rostro oculto y la metáfora del pozo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - «Pozo» mantiene la imagen metafórica del hebreo, en paralelo al inglés «pit».
  - La secuencia verbal conserva la súplica urgente y el resultado temido sin introducir interpretaciones doctrinales adicionales.
  - El estilo es contemporáneo y reverente, apto para lectura eclesial amplia.
