revisions:
- from: Cuando estén [a]calentados, pondré su bebida y los embriagaré, para que se exulten y duerman un sueño eterno, y no despierten[b], declara Yahvé.
  to: Cuando estén acalorados, pondré su bebida[a] y los embriagaré, para que se regocijen y duerman un sueño eterno, y no despierten[b], declara Yahvé.
  rationale: Se corrige el anclaje de la nota [a] para que corresponda al sustantivo מִשְׁתֵּיהֶם, se mejora la naturalidad de בְּחֻמָּם con ‘acalorados’, y se sustituye ‘se exulten’ por ‘se regocijen’, que conserva el tono elevado y la intención del hebreo en español idiomático. El resto del texto se mantiene fiel al sentido fuente y a la terminología del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:12:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en general la secuencia y el sentido del hebreo: estado circunstancial inicial, acción divina de poner la bebida, embriagar, propósito, sueño irreversible y fórmula profética con Yahvé. Sin embargo, contiene varios problemas de fidelidad y de anclaje de notas: la nota [a] está colocada sobre ‘calentados’ pero su contenido corresponde a מִשְׁתֵּיהֶם (‘su bebida’); además, ‘se exulten’ no es español natural ni refleja bien el uso verbal esperado aquí.'
  spanish_quality_summary: El texto es mayormente legible, pero ‘[a]calentados’ resulta tipográficamente extraño, ‘cuando estén calentados’ suena forzado en español, y ‘se exulten’ es poco idiomático y difícilmente aceptable en una Biblia de lectura eclesial amplia. ‘se regocijen’ mantiene el tono elevado y la ironía contextual sin caer en un calco defectuoso. También conviene mover [a] a ‘bebida’.
  glossary_alignment: ‘Yahvé’ está bien aplicado para יְהוָה. No hay conflicto con otras políticas terminológicas del proyecto. La conservación de ‘sueño eterno’/‘sueño de perpetuidad’ es compatible con la decisión teológica documentada, aunque ‘eterno’ podría discutirse frente a ‘perpetuo’; no exige adjudicación adicional aquí.
  issues:
  - severity: high
    issue: La nota [a] está anclada en la palabra equivocada.
    rationale: La nota explica una alternativa léxica para מִשְׁתֵּיהֶם (‘su bebida/banquete’), pero en el borrador [a] aparece en ‘[a]calentados’, que corresponde a בְּחֻמָּם. Esto desinforma al lector y rompe la trazabilidad léxica.
  - severity: medium
    issue: ‘Se exulten’ no es una formulación natural en español bíblico general.
    rationale: Aunque intenta reflejar ‘exult’, en español estándar ‘exultar’ se usa normalmente como intransitivo (‘exultar de gozo’), y ‘se exulten’ suena incorrecto o muy extraño. ‘se regocijen’ o ‘exulten’ serían opciones más naturales; ‘se regocijen’ encaja mejor aquí.
  - severity: medium
    issue: ‘Cuando estén calentados’ suena poco natural.
    rationale: Formalmente se acerca al inglés auditado, pero en español ‘calentados’ tiende a sonar físico o coloquial. ‘Cuando estén acalorados’ preserva mejor la idea circunstancial de excitación/calor sin perder dignidad.
  revised_spanish_text: Cuando estén acalorados, pondré su bebida[a] y los embriagaré, para que se regocijen y duerman un sueño eterno, y no despierten[b], declara Yahvé.
  revised_footnotes:
  - marker: a
    text: O ‘su fiesta’ o ‘su banquete’ para מִשְׁתֵּיהֶם; el término hebreo puede denotar una fiesta de bebida.
    reason: lexical_alternative
  - marker: b
    text: ‘Sueño eterno’ es una metáfora hebrea de muerte irreversible bajo juicio; literalmente, ‘sueño de perpetuidad’.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda al sustantivo מִשְׁתֵּיהֶם, se mejora la naturalidad de בְּחֻמָּם con ‘acalorados’, y se sustituye ‘se exulten’ por ‘se regocijen’, que conserva el tono elevado y la intención del hebreo en español idiomático. El resto del texto se mantiene fiel al sentido fuente y a la terminología del proyecto.
