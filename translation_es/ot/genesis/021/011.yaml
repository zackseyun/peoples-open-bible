    issue: «La cosa» para הַדָּבָר
    rationale: Aunque posible de manera literal, «la cosa» suena demasiado coloquial en español y no refleja bien el registro narrativo digno del pasaje. «El asunto» preserva la amplitud de דבר y mejora la legibilidad.
  - severity: low
    issue: Anclaje y redacción de la nota alternativa
    rationale: 'La nota debe corresponder al punto textual relevante y conviene formular la alternativa en español natural: «El asunto fue muy malo a los ojos de Abraham con respecto a su hijo».'
  revised_spanish_text: El asunto fue muy desagradable a los ojos de Abraham[a], a causa de su hijo.
