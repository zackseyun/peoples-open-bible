translation:
  text: An unjust one will not escape with plunder[a], and the desire of the righteous will never fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and the endurance of the godly will certainly not be delayed.'' The Hebrew reads ''the longing of the righteous will never be frustrated.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יִמָּלֵט
  chosen: will not escape
  alternatives:
  - will not get away
  - will not be delivered
  lexicon: HALOT
  rationale: The Niphal of מלט commonly means to escape or be delivered. In this wisdom context, 'will not escape' is the most natural English and matches the Greek ἐκφεύξεται as a consistency check.
- source_word: בְּגָזֵל
  chosen: with plunder
  alternatives:
  - by plunder
  - through robbery
  - in stolen goods
  lexicon: HALOT
  rationale: The Hebrew noun גזל denotes robbery/plunder, while the prefixed ב can indicate means or attendant circumstance. 'With plunder' captures the sense that ill-gotten gain will not secure escape. The Greek ἐν ἁρπάγμασιν likewise points to plunder/acts of seizure.
- source_word: עַוָּל
  chosen: a sinner
  alternatives:
  - a wrongdoer
  - an unjust man
  - the unjust
  lexicon: HALOT
  rationale: Though עול can denote one who acts unjustly or perversely, 'a sinner' fits the moral contrast with 'the righteous' in the second colon and is supported by the Greek ἁμαρτωλός. 'Wrongdoer' is possible but narrower than the broader ethical contrast.
- source_word: וְלֹא יַשְׁבִּית
  chosen: will never be frustrated
  alternatives:
  - will not cease
  - will not be made to stop
  - will not be delayed
  lexicon: HALOT
  rationale: From שבת in the Hiphil, the Hebrew can mean cause to cease; the Greek parallel has οὐ μὴ καθυστερήσει, 'will certainly not delay.' Given the object 'the longing of the righteous,' the idiomatic sense is that it will not be thwarted or left unrealized. 'Will never be frustrated' communicates the result in natural English while preserving the promise.
- source_word: תַּאֲוַת צַדִּיק
  chosen: the longing of the righteous
  alternatives:
  - the desire of the righteous man
  - the craving of the just
  lexicon: HALOT
  rationale: תאוה is desire/longing. 'Longing' is more fitting than 'craving' in a positive moral context. The singular צדיק may be generic; rendering it collectively as 'the righteous' conveys representative force in readable English while preserving the ethical category.
- source_word: לְעוֹלָם
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: 'Here לְעוֹלָם functions adverbially to intensify the negation: ''never.'' This is more idiomatic in English than ''forever'' with a negative verb in this context.'
