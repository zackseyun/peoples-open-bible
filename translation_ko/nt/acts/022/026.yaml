  yaml_path: translation/nt/acts/022/026.yaml
  text: When the centurion heard this[a], he went to the commander and reported it, saying[b], “What are you about to do? For this man is a Roman citizen.”
  footnotes:
  - marker: a
    text: Or, “What are you going to do?” The Greek expression can indicate either imminent action or intended action.
    reason: lexical_alternative
  - marker: b
    text: Literally, “this man is a Roman.” In context, the meaning is that he possesses Roman citizenship.
    reason: lexical_alternative
translation:
  language: ko
  text: 백부장이 이 말을 듣고 천부장에게 가서 보고했습니다.[b] 「당신은 무엇을 하려고 하십니까? 이 사람은 로마 시민입니다.[a]」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「이 사람은 로마 사람입니다.」 문맥상 그가 로마 시민권을 지녔음을 뜻한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「무엇을 하시려는 것입니까?」 헬라어 표현은 임박한 행동과 의도된 행동 모두를 가리킬 수 있다.
    reason: lexical_alternative
