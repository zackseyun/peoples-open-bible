id: PHP.4.21
reference: Philippians 4:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀσπάσασθε πάντα ἅγιον ἐν Χριστῷ Ἰησοῦ. ἀσπάζονται ὑμᾶς οἱ σὺν ἐμοὶ ἀδελφοί.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/021.yaml
  text: Greet every saint in Messiah Jesus. The brothers with me greet you.
translation:
  language: ko
  text: 메시아 예수[a] 안에 있는 모든 성도에게 안부를 전해 주십시오. 나와 함께 있는 형제들[b]이 여러분에게 안부를 전합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도 예수」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
  - marker: b
    text: 「형제들」(ἀδελφοί)은 남성 복수형이나, 바울 곁에 있는 동료 신자들 — 여성을 포함할 수도 있는 — 을 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάσασθε
  english_pob_choice: Greet
  chosen_korean: 안부를 전해 주십시오
  alternatives_korean:
  - 문안하십시오
  - 인사를 전해 주십시오
  lexicon: BDAG
  rationale: 서신 끝의 정형 인사 명령. 합쇼체 「안부를 전해 주십시오」가 자연스럽고 따뜻하다. 「문안하십시오」도 한국 교회 정형어이나 조금 무겁다.
- source_word: πάντα ἅγιον
  english_pob_choice: every saint
  chosen_korean: 모든 성도
  alternatives_korean:
  - 모든 거룩한 자
  - 각 성도
  lexicon: BDAG
  rationale: 본 번역의 ἅγιος 기본 옮김(「성도」)을 유지한다. 단수 πᾶς의 분배적 함의가 「모든 성도」로 자연스럽게 전달된다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에 있는
  alternatives_korean:
  - 그리스도 예수 안에 있는
  - 메시아 예수 안의
  lexicon: BDAG
  rationale: 7절·19절과 동일한 칭호 번역 원칙. 분사·관형절로 자연스럽게 옮긴다.
- source_word: ἀσπάζονται
  english_pob_choice: greet
  chosen_korean: 안부를 전합니다
  lexicon: BDAG
  rationale: 현재 중간태를 한국어 능동 「안부를 전합니다」로 자연스럽게 옮긴다.
- source_word: οἱ σὺν ἐμοὶ ἀδελφοί
  english_pob_choice: The brothers with me
  chosen_korean: 나와 함께 있는 형제들
  alternatives_korean:
  - 나와 함께 있는 형제자매들
  - 나와 함께한 형제들
  lexicon: BDAG
  rationale: 1절·8절과 동일한 원칙. 헬라어 남성 복수의 정확성을 「형제들」로 유지하고, 포용적 함의는 각주에 보존한다.
theological_decisions:
- issue: ἐν Χριστῷ Ἰησοῦ에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아 예수 안에 있는
  alternative_readings:
  - 그리스도 예수 안에 있는
  rationale: 7절·19절과 동일.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
