translation:
  language: es
  text: Todas las ciudades de los levitas, dentro de la posesión de los hijos[a] de Israel, sumaban cuarenta y ocho ciudades, con sus pastizales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' / 'los hijos de Israel'. El hebreo dice literalmente 'hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'terrenos abiertos' o 'tierras comunales' para la tierra que rodeaba las ciudades.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todo el conjunto de
  - La totalidad de
  lexicon: HALOT
  rationale: Expresa la suma total de las ciudades sin añadir matices innecesarios; en español concuerda naturalmente con 'ciudades'.
- source_word: עָרֵי הַלְוִיִּם
  english_pob_choice: the cities of the Levites
  chosen_spanish: las ciudades de los levitas
  alternatives_spanish:
  - las ciudades levíticas
  lexicon: HALOT
  rationale: Conserva la relación genitiva explícita del hebreo y suena claro en español moderno. 'Levíticas' es posible, pero menos transparente para lectores generales.
- source_word: בְּתוֹךְ
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en medio de
  - entre
  lexicon: HALOT
  rationale: Da la ubicación interna dentro del territorio de Israel con una construcción natural en español.
- source_word: אֲחֻזַּת
  english_pob_choice: the possession
  chosen_spanish: la posesión
  alternatives_spanish:
  - la heredad
  - la propiedad
  lexicon: HALOT
  rationale: '''Posesión'' reproduce bien el sentido territorial de un bien/tenencia sin forzar un matiz específicamente hereditaria que el contexto inmediato no exige.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Mantiene la forma masculina plural del designador nacional hebreo, como refleja el POB inglés. 'Israelitas' sería más idiomático, pero menos transparente al hebreo.
- source_word: עָרִים אַרְבָּעִים וּשְׁמֹנֶה
  english_pob_choice: were forty-eight cities
  chosen_spanish: eran cuarenta y ocho ciudades
  alternatives_spanish:
  - había cuarenta y ocho ciudades
  - sumaban cuarenta y ocho ciudades
  lexicon: HALOT
  rationale: Completa la cláusula sumaria de forma natural en español y preserva exactamente el total numérico.
- source_word: וּמִגְרְשֵׁיהֶן
  english_pob_choice: with their pasturelands
  chosen_spanish: con sus pastizales
  alternatives_spanish:
  - con sus tierras de pastoreo
  - con sus campos abiertos
  lexicon: HALOT
  rationale: מִגְרָשׁ en estos textos se refiere al terreno abierto alrededor de la ciudad, a menudo de uso pastoril. 'Pastizales' comunica ese valor de manera breve y comprensible.
theological_decisions:
- issue: Designación nacional masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la referencia masculina plural del hebreo sin neutralizarla, en línea con la fidelidad formal del registro POB. El término sigue siendo corporativo y se entiende como el pueblo de Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue el pasaje resumido de Josué 21:41 y se ajusta al repaso editorial del POB inglés, que privilegia una formulación directa y formal ('with' frente a expresiones más expansivas). No se introducen notas porque no hay una ambigüedad que requiera anclaje en el texto español.
  spanish_consistency_notes:
  - Se mantiene 'levitas' en minúscula como designación étnico-tribal.
  - Se usa 'posesión' para evitar sobreinterpretar como 'heredad' cuando el hebreo puede leerse más ampliamente como tenencia territorial.
  - El número se expresa en palabras para la fluidez bíblica estándar en español.
  - No se añade nota sobre 'hijos de Israel' porque la opción elegida ya refleja de forma transparente la forma hebrea y no requiere alternativa anclada.
