    reason: lexical_alternative
  - marker: c
    text: '''My sons'' may refer literally to children or figuratively to the people/inhabitants who have departed.'
    reason: cultural_note
  - marker: d
    text: Or 'There is no one anymore to pitch my tent and raise my tent curtains.'
    reason: lexical_alternative
