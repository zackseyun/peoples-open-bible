    rationale: El hebreo puede significar «islas» o, más ampliamente, regiones marítimas distantes/coastlands. «Las costas» en español puede sonar demasiado literal y estrecho; «las costas lejanas» comunica mejor el valor geográfico amplio documentado en la auditoría inglesa.
  - severity: low
    issue: «Dones» no es la mejor opción contextual para אֶשְׁכָּר.
    rationale: Aunque no es incorrecto, «dones» en español suele asociarse a capacidades o regalos de carácter más elevado/abstracto. En un contexto de homenaje real, «regalos» o «presentes» resulta más idiomático y más cercano a la decisión inglesa «gifts».
  revised_spanish_text: Que los reyes de Tarsis y de las costas lejanas[a] traigan tributo[b]; que los reyes de Sabá y de Seba ofrezcan regalos.
