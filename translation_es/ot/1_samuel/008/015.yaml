translation:
  language: es
  text: Él tomará la décima parte de la semilla de ustedes y de sus viñas, y la dará a sus oficiales[a] y a sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a sus eunucos”; el hebreo סָרִיסָיו puede referirse tanto a eunucos como, en sentido más amplio, a oficiales de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַרְעֵיכֶם
  english_pob_choice: your seed
  chosen_spanish: tu semilla
  alternatives_spanish:
  - tu cosecha
  - tu producto
  - tu grano
  lexicon: HALOT
  rationale: זרע significa literalmente “semilla”, y en este contexto agrícola puede extenderse al producto sembrado. “Tu semilla” preserva la cercanía al hebreo y, junto con “tomará la décima parte”, comunica la exacción sin perder el campo semántico agrícola.
- source_word: כַרְמֵיכֶם
  english_pob_choice: your vineyards
  chosen_spanish: tus viñas
  alternatives_spanish:
  - tus viñas y su fruto
  - tus viñedos
  lexicon: HALOT
  rationale: כרם denota normalmente una viña o viñedo. “Tus viñas” es natural en español y conserva la referencia directa a la posesión agrícola que el rey gravará.
- source_word: יַעְשֹׂר
  english_pob_choice: will take a tenth
  chosen_spanish: tomará la décima parte
  alternatives_spanish:
  - diezmará
  - exigirá la décima parte
  lexicon: HALOT
  rationale: El verbo עשר en esta forma expresa tomar o imponer una décima parte. “Tomará la décima parte” hace explícita la exacción real y evita cargar el término con el matiz cultual de “diezmará”.
- source_word: וְנָתַן
  english_pob_choice: and give
  chosen_spanish: y la dará
  alternatives_spanish:
  - y dará
  - y entregará
  lexicon: HALOT
  rationale: La cadena verbal continúa la descripción futura. En español conviene explicitar el objeto implícito (“la”) para que la acción de dar la décima parte resulte clara y fluida.
- source_word: לְסָרִיסָיו
  english_pob_choice: to his officials
  chosen_spanish: a sus oficiales
  alternatives_spanish:
  - a sus eunucos
  - a sus funcionarios de la corte
  lexicon: HALOT
  rationale: סריס puede significar “eunuco” o, más ampliamente, funcionario de la corte. Aquí el sentido administrativo es el más probable; “oficiales” conserva la función sin fijar indebidamente el estado físico. Se mantiene la alternativa más literal en nota.
- source_word: וְלַעֲבָדָיו
  english_pob_choice: and his servants
  chosen_spanish: y a sus siervos
  alternatives_spanish:
  - y a sus esclavos
  - y a sus servidores
  lexicon: HALOT
  rationale: עבד puede ser “siervo”, “servidor” o “esclavo” según el contexto. Dado que aquí se refiere al personal del rey, “siervos” comunica dependencia y servicio de forma más amplia que “esclavos”, sin forzar el matiz de propiedad humana.
theological_decisions:
- issue: Sentido de סָרִיסים en una lista de personal real
  english_pob_reading: The Hebrew can refer either to eunuchs or, more broadly, to royal court officials.
  chosen_spanish_reading: El hebreo puede referirse a eunucos o, más ampliamente, a oficiales de la corte.
  alternative_spanish_readings:
  - eunucos
  - funcionarios de la corte
  rationale: No conviene ocultar la tensión léxica. El texto describe la redistribución de recursos del rey; en ese marco, el valor administrativo es probable, pero la posibilidad de “eunucos” sigue siendo real y se preserva para el lector.
  doctrine_reference: Ninguna doctrina específica; decisión léxica sobre un término administrativo hebreo.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y no se detectaron revisiones aplicadas en la última pasada; la redacción española mantiene la decisión de traducir יַעְשֹׂר como una exacción (“tomará la décima parte”) y conserva la ambigüedad de סָרִיס con nota.
  spanish_consistency_notes:
  - Se usó “Yahvé” como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó “diezmará” para no introducir un matiz cultual que no está en el contexto.
  - “Siervos” se mantiene como término funcional amplio; no se sustituyó por “esclavos” porque el contexto es de personal del rey, no de esclavitud doméstica o de guerra.
