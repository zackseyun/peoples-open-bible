translation:
  language: es
  text: Porque lo hecho[a], junto con quien lo hizo, será castigado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''lo realizado, junto con quien lo realizó, será castigado.'' En el contexto, la frase se refiere al ídolo fabricado y a su hacedor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πραχθέν
  english_pob_choice: the thing done
  chosen_spanish: lo hecho
  alternatives_spanish:
  - lo realizado
  - lo efectuado
  - la cosa hecha
  lexicon: BDAG
  rationale: El participio aoristo pasivo neutro sustantivado de πράσσω/πράττω aquí se refiere al hecho o acción realizada. 'Lo hecho' conserva el valor de resultado/acto sin introducir 'idol' en el texto principal, que el griego no nombra explícitamente en esta cláusula.
- source_word: σὺν
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - en compañía de
  lexicon: BDAG
  rationale: Expresa la asociación de ambos en un mismo castigo. 'Junto con' suena natural en español y mantiene la simultaneidad/compañía que el contexto exige.
- source_word: τῷ δράσαντι
  english_pob_choice: the one who did it
  chosen_spanish: quien lo hizo
  alternatives_spanish:
  - el que lo hizo
  - el hacedor
  - quien lo realizó
  lexicon: BDAG
  rationale: δράω aquí funciona como 'hacer' / 'realizar' una acción, en paralelo con τὸ πραχθέν. 'Quien lo hizo' conserva el vínculo directo con 'lo hecho' y evita forzar un sentido de 'fabricar' que no es necesario en español.
- source_word: κολασθήσεται
  english_pob_choice: will be punished
  chosen_spanish: será castigado
  alternatives_spanish:
  - será punido
  - recibirá castigo
  - será sancionado
  lexicon: BDAG
  rationale: El futuro pasivo de κολάζω denota castigo penal. 'Será castigado' es claro, digno y fiel al valor punitivo del verbo.
- source_word: καὶ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Y porque
  - Porque, en efecto
  lexicon: BDAG
  rationale: La combinación introduce explicación o razón. 'Porque' transmite esa relación causal de modo directo y natural en español.
theological_decisions:
- issue: Si hacer explícito el objeto como 'ídolo' en el texto principal
  english_pob_reading: Keep the wording general as 'the thing done' rather than 'the idol.'
  chosen_spanish_reading: Mantener el texto general como 'lo hecho'.
  alternative_spanish_readings:
  - el ídolo
  - lo realizado
  - la obra hecha
  rationale: El contexto inmediato trata de ídolos, pero esta cláusula no usa el sustantivo 'ídolo'. Mantener una formulación general respeta la primacía del griego y deja que el contexto identifique el referente.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'made' / 'made it' a 'done' / 'did it' para reflejar con más precisión πραχθέν / δράσαντι como acto o hecho, no como fabricación. La redacción española sigue ese ajuste reciente y evita 'hecho fabricado' o 'hecho' en sentido artesanal.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo 'lo hecho ... quien lo hizo' para reflejar la correspondencia gramatical del griego.
  - '''Castigado'' se eligió por ser el equivalente español más natural de un futuro pasivo punitivo.'
  - No se introdujo 'Yahvé', 'Mesías' ni otra terminología no pertinente al versículo.
