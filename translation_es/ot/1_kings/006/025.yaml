translation:
  language: es
  text: Y el segundo querubín medía diez codos[a]; ambos querubines tenían una sola medida y una sola forma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "ambos querubines eran de la misma medida y la misma proporción".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעֶשֶׂר בָּאַמָּה
  english_pob_choice: was ten cubits
  chosen_spanish: medía diez codos
  alternatives_spanish:
  - era de diez codos
  - tenía diez codos
  lexicon: HALOT
  rationale: El hebreo expresa una dimensión, no necesariamente una afirmación existencial. En español, 'medía' comunica con naturalidad la medida del querubín sin añadir 'alto' ni especificar más de lo que el texto dice.
- source_word: הַכְּרוּב הַשֵּׁנִי
  english_pob_choice: the second cherub
  chosen_spanish: el segundo querubín
  alternatives_spanish:
  - el segundo querubín
  - el otro querubín
  lexicon: HALOT
  rationale: El ordinal definido se refleja con 'el segundo'. 'Querubín' conserva el singular hebreo y la terminología bíblica estándar.
- source_word: מִדָּה אַחַת
  english_pob_choice: one measure
  chosen_spanish: una sola medida
  alternatives_spanish:
  - una medida
  - la misma medida
  lexicon: HALOT
  rationale: '''Una sola medida'' mantiene la fuerza de unidad del hebreo y suena más natural en español que repetir ''una medida'' sin énfasis. ''La misma medida'' es interpretativa y se reserva como alternativa.'
- source_word: וְקֶצֶב אֶחָד
  english_pob_choice: and one form
  chosen_spanish: y una sola forma
  alternatives_spanish:
  - y una sola proporción
  - y una sola figura
  - y una sola forma
  lexicon: HALOT
  rationale: קֶצֶב puede referirse a forma, proporción o patrón general. 'Forma' es claro en español; 'una sola' conserva la repetición enfática del hebreo.
- source_word: לִשְׁנֵי הַכְּרֻבִים
  english_pob_choice: both cherubim had
  chosen_spanish: ambos querubines tenían
  alternatives_spanish:
  - para los dos querubines
  - los dos querubines tenían
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'para los dos querubines', pero en español la relación se expresa con naturalidad mediante 'ambos querubines tenían', preservando el sentido distributivo sin calco incómodo.
translation_notes:
  revision_awareness: El contexto y el audit trail inglés coinciden plenamente; no se registran revisiones textuales ni cambios de sentido relevantes en esta línea.
  spanish_consistency_notes:
  - Se mantiene 'querubines' como término bíblico técnico.
  - Se usa 'codos' para la medida hebrea de longitud, en continuidad con la terminología tradicional y clara en español.
  - La formulación evita introducir 'alto' porque el hebreo solo da la medida, no especifica orientación.
