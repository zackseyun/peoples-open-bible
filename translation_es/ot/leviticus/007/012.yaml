revisions:
- from: Si lo ofrece como ofrenda de acción de gracias[a], junto con el sacrificio de acción de gracias ofrecerá tortas sin levadura mezcladas con aceite, hojuelas sin levadura ungidas[b] con aceite, y tortas de flor de harina bien mezclada[c] con aceite.
  to: Si lo ofrece como ofrenda de acción de gracias[a], entonces ofrecerá con el sacrificio de acción de gracias tortas sin levadura mezcladas con aceite, obleas sin levadura untadas[b] con aceite, y tortas de flor de harina bien mezclada[c] con aceite.
  rationale: La revisión conserva el sentido del hebreo y de la auditoría POB, pero mejora la naturalidad y precisión del español. Se cambia "junto con" por "con" para reflejar mejor la relación sacrificial; "hojuelas" por "obleas" para representar mejor רְקִיקֵי מַצּוֹת; y "ungidas" por "untadas" en el texto principal para evitar una lectura ritual innecesaria en español, manteniendo la alternativa literal en la nota.
  reviewer_model: gpt-5.4
