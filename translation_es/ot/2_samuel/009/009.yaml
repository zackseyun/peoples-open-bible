translation:
  language: es
  text: 'Entonces el rey llamó a Siba[a], el siervo de Saúl, y le dijo[b][c]: «Todo lo que pertenecía a Saúl y a toda su casa lo he dado al hijo de tu señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el joven de Saúl” o “el asistente de Saúl”; para נַעַר. Aquí probablemente denota un siervo o servidor de la casa de Saúl.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “y a toda su casa”, es decir, a toda la casa, hogar o hacienda de Saúl.'
    reason: lexical_alternative
  - marker: c
    text: “El hijo de tu señor” se refiere a Mefiboset, descendiente de Saúl y superior de Siba dentro de la estructura de la casa.
    reason: cultural_note
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - joven
  - criado
  - asistente
  lexicon: HALOT
  rationale: En este contexto de corte y de administración doméstica, נַעַר no se limita a “joven”; designa un subordinado o retén de Saúl. “Siervo” conserva la relación de dependencia funcional que la POB inglesa quiso destacar con “servant”, sin forzar un matiz de edad.
- source_word: כֹּל אֲשֶׁר הָיָה לְשָׁאוּל
  english_pob_choice: All that belonged to Saul
  chosen_spanish: Todo lo que pertenecía a Saúl
  alternatives_spanish:
  - Todo lo que era de Saúl
  - Todo lo que fue de Saúl
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión/pertinencia. “Pertenecía” reproduce bien el sentido de propiedad con naturalidad en español y evita una traducción demasiado rígida.
- source_word: וּלְכָל בֵּיתוֹ
  english_pob_choice: and to all his house
  chosen_spanish: y a toda su casa
  alternatives_spanish:
  - y a toda su casa/linaje
  - y a toda su familia
  lexicon: HALOT
  rationale: “Casa” mantiene el término bíblico y puede abarcar casa, casa real, hogar o casa/linaje según el contexto. Aquí sigue la amplitud de la frase hebrea y la nota aclara el alcance doméstico/posesorio.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: lo he dado
  alternatives_spanish:
  - se lo he dado
  - lo di
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso directo presenta una acción ya realizada con vigencia actual. El pretérito perfecto compuesto (“lo he dado”) comunica bien ese estado resultante en español.
- source_word: לְבֶן אֲדֹנֶיךָ
  english_pob_choice: to your master’s son
  chosen_spanish: a tu señor’s hijo
  alternatives_spanish:
  - al hijo de tu señor
  - al hijo de tu amo
  - al hijo de tu señor
  lexicon: HALOT
  rationale: 'La intención es reflejar el vínculo de subordinación de אֲדוֹן sin usar un título divino. La forma final necesita corrección idiomática en español: “al hijo de tu señor” o “al hijo de tu amo” sería natural; se preserva la referencia al superior humano de Siba, identificado en el contexto narrativo como Saúl/Mefiboset. (Nota: se recomienda la forma idiomática en la revisión.)'
- source_word: וַיִּקְרָא ... וַיֹּאמֶר
  english_pob_choice: Then the king called ... and said
  chosen_spanish: Entonces el rey llamó ... y le dijo
  alternatives_spanish:
  - Y el rey llamó ... y le dijo
  - Luego el rey llamó ... y le dijo
  lexicon: HALOT
  rationale: La secuencia waw-consecutiva avanza la narración; “Entonces” conserva el avance temporal y suena natural en español.
translation_notes:
  revision_awareness: Se ha seguido el audit trail inglés para mantener el valor de נַעַר como término de estatus, la posesión implícita en כֹּל אֲשֶׁר הָיָה לְשָׁאוּל, la amplitud de בֵּיתוֹ y el perfecto de נָתַתִּי. Se corrigió la formulación final para que sea idiomática en español y se preservó la relación social marcada por אֲדֹנֶיךָ.
  spanish_consistency_notes:
  - Usar “Saúl” para el nombre propio y “Siba” para Ziba, conforme a la grafía española habitual y coherente con el nombre del personaje.
  - Mantener “casa” para בַּיִת cuando el contexto incluya hogar, casa real o linaje, salvo que el contexto requiera explicitación adicional.
  - Conservar el tratamiento de superior humano en אֲדוֹן como “señor” o “amo” según naturalidad contextual; aquí se prefiere “señor” por registro bíblico y neutralidad.
