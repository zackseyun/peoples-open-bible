base_translation:
  language: en
  yaml_path: translation/ot/exodus/035/024.yaml
  text: Everyone who offered a contribution of silver or bronze brought Yahweh’s contribution[b][a], and everyone with whom acacia wood was found for any work of the service brought it.
  footnotes:
  - marker: a
    text: Or 'an offering of silver and bronze.' The Hebrew conjunction can be rendered either way in English, though the sense is that each person brought whatever metal contribution he or she had.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with whom acacia wood was found,' an idiom meaning 'who had acacia wood available.'
    reason: lexical_alternative
