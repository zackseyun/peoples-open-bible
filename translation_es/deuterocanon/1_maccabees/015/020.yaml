translation:
  language: es
  text: Y nos pareció bien recibir el escudo de parte de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aceptar el escudo de parte de ellos». El griego ἀσπίς puede significar un escudo en general; en este contexto diplomático quizá se refiere a un regalo honorífico, tradicionalmente entendido como un escudo de oro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοξεν
  english_pob_choice: it seemed good
  chosen_spanish: nos pareció bien
  alternatives_spanish:
  - se nos hizo bien
  - nos pareció mejor
  - se decidió
  lexicon: BDAG
  rationale: El aoristo impersonal de δοκέω expresa que algo pareció bueno o conveniente al grupo. «Nos pareció bien» conserva el tono formal y diplomático sin volverlo demasiado interpretativo.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: BDAG
  rationale: El dativo marca al grupo al que le pareció bien la acción. En español, el pronombre átono «nos» funciona de manera natural junto con «pareció bien».
- source_word: δέξασθαι
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - aceptar
  lexicon: BDAG
  rationale: El infinitivo aoristo medio de δέχομαι puede significar recibir o aceptar. «Recibir» se mantiene más cercano al griego y encaja con el registro diplomático del pasaje.
- source_word: τὴν ἀσπίδα
  english_pob_choice: the shield
  chosen_spanish: el escudo
  alternatives_spanish:
  - el escudo de oro
  - el broquel
  lexicon: LSJ
  rationale: ἀσπίς significa normalmente «escudo». Aunque en este contexto histórico puede aludir a un regalo honorífico, el griego del versículo solo dice «el escudo», sin añadir «de oro» en el texto principal.
- source_word: παρʼ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de parte de ellos
  alternatives_spanish:
  - de ellos
  - de su parte
  lexicon: BDAG
  rationale: παρά con genitivo indica procedencia u origen. «De parte de ellos» comunica con claridad la fuente del envío y su matiz relacional en un contexto diplomático.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de 1 Macabeos 15:20 y el audit trail inglés. No se detectaron cambios de revisión en el registro fuente; se conserva la decisión de no introducir «de oro» en el texto principal, reservando esa posibilidad para una nota.
  spanish_consistency_notes:
  - Se mantiene el registro formal y diplomático del original.
  - «Escudo» se conserva sin añadir calificativo en el texto principal, conforme a la cautela léxica del POB inglés.
  - La partícula de procedencia se expresó como «de parte de ellos» para evitar una calca rígida y mantener naturalidad en español.
