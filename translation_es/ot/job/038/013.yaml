review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: propósito (''para que''), imagen de tomar los extremos de la tierra, y resultado de que los malvados sean removidos de ella. Sin embargo, ''orillas'' restringe innecesariamente la imagen hacia ribera/costa y no representa tan bien el campo semántico poético de כַנְפוֹת (''alas/extremidades''). Además, la nota b dice ''se adhiere'', que no corresponde a לֶאֱחֹז ni a la explicación inglesa (''takes hold of'').'
  spanish_quality_summary: El español es claro y digno, pero 'orillas de la tierra' suena algo extraño en contexto cósmico y puede evocar costas. 'Extremos' o 'bordes' funciona mejor. El resto del verso es natural; 'sean sacudidos de ella' es aceptable y conserva la imagen.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los malvados' es una opción válida para רְשָׁעִים, aunque 'los impíos' también sería posible. La principal cuestión léxica es כַנְפוֹת, para la que 'extremos' alinea mejor con la justificación auditada que 'orillas'.
  issues:
  - severity: medium
    issue: '''orillas de la tierra'' para בְּכַנְפוֹת הָאָרֶץ'
    rationale: Aunque intenta transmitir periferia, 'orillas' en español suele asociarse a ríos, lagos o costas. En este contexto cósmico-poético, 'extremos' o 'bordes' preserva mejor 'alas/extremidades' sin introducir una imagen de ribera.
  - severity: low
    issue: Nota b usa 'se adhiere'
    rationale: La imagen auditada es la del amanecer que 'toma' o 'agarra' la tierra, no que 'se adhiere' a ella. Conviene ajustar la nota para que concuerde con לֶאֱחֹז y con la explicación inglesa.
  revised_spanish_text: para que tome los extremos de la tierra[a], y los malvados sean sacudidos de ella[b].
