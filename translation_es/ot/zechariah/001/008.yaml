revisions:
- from: Vi en la noche[a], y he aquí, un hombre montado sobre un caballo rojo. Él estaba de pie entre los mirtos que estaban en la hondonada, y detrás de él había caballos rojos, tordos[b] y blancos.
  to: Vi en la noche[a], y he aquí, un hombre montado sobre un caballo rojo. Estaba de pie entre los mirtos que estaban en la hondonada, y detrás de él había caballos rojos, alazanes[b] y blancos.
  rationale: Se conserva casi todo el borrador porque refleja bien el hebreo y la auditoría inglesa. Se cambia únicamente 'tordos' por 'alazanes' para representar mejor un color equino dentro del rango rojizo/castaño asociado a שְׂרֻקִּים, y se ajusta la nota correspondiente para mantener abiertas las alternativas documentadas sin introducir un patrón demasiado específico. Además, se omite el pronombre explícito 'Él' por fluidez natural en español, sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:11:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés en la mayor parte del versículo: ''Vi'', ''en la noche'', ''y he aquí'', ''un hombre'', ''montado sobre un caballo rojo'', ''estaba de pie'', ''entre los mirtos'', ''detrás de él había'', y ''blancos'' reflejan fielmente las decisiones fuente. También conserva correctamente la indeterminación teológica de ''un hombre''. La principal desviación está en שְׂרֻקִּים: ''tordos'' en español suele evocar un pelaje grisáceo, lo que no corresponde bien al campo semántico documentado por la auditoría inglesa (''sorrel'', ''dappled'', ''speckled'', o un tono rojizo-marrón).'
  spanish_quality_summary: 'El texto es legible, natural y digno en español. ''Y he aquí'' funciona bien en registro bíblico moderno. ''En la hondonada'' suena natural. ''Él estaba de pie'' es entendible, aunque ''estaba de pie'' sin pronombre sería algo más fluido; no es un problema grave. La única reparación necesaria es el color de los caballos: ''alazanes'' expresa mejor un color equino rojizo/castaño que ''tordos''. También conviene ajustar la nota para evitar ''píos'', que suele indicar blanco y negro, demasiado específico frente a la incertidumbre léxica documentada.'
  glossary_alignment: No hay conflicto con la terminología teológica del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión de mantener 'un hombre' concuerda con la racionalidad teológica documentada. La revisión propuesta solo corrige una elección léxica equina para alinearla mejor con la auditoría inglesa.
  issues:
  - severity: medium
    issue: שְׂרֻקִּים fue traducido como 'tordos'
    rationale: La auditoría inglesa documenta un color debatido pero dentro del rango 'sorrel / dappled / speckled / reddish-brown'. En español, 'tordo' normalmente describe un caballo gris o entrecano, lo cual desplaza el sentido lejos del rango rojizo/moteado probable.
  - severity: low
    issue: La nota b usa 'píos' como alternativa
    rationale: '''Pío'' en español equino suele referirse a un patrón manchado muy específico, a menudo blanco y negro o contrastado, más estrecho de lo que permite la evidencia. ''Moteados'' o ''manchados'' preservan mejor la apertura léxica.'
  revised_spanish_text: Vi en la noche[a], y he aquí, un hombre montado sobre un caballo rojo. Estaba de pie entre los mirtos que estaban en la hondonada, y detrás de él había caballos rojos, alazanes[b] y blancos.
  revised_footnotes:
  - marker: a
    text: O 'en las profundidades' o 'en la hondonada'; el hebreo probablemente se refiere a un lugar bajo o una depresión.
    reason: lexical_alternative
  - marker: b
    text: O 'moteados', 'manchados' o quizá otro color de pelaje marrón-rojizo.
    reason: lexical_alternative
  revision_rationale: Se conserva casi todo el borrador porque refleja bien el hebreo y la auditoría inglesa. Se cambia únicamente 'tordos' por 'alazanes' para representar mejor un color equino dentro del rango rojizo/castaño asociado a שְׂרֻקִּים, y se ajusta la nota correspondiente para mantener abiertas las alternativas documentadas sin introducir un patrón demasiado específico. Además, se omite el pronombre explícito 'Él' por fluidez natural en español, sin alterar el sentido.
