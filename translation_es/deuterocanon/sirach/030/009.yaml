translation:
  language: es
  text: Disciplina a tu hijo[a], para que no te avergüences; pero si juegas con él, te humillará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Mima o cría con demasiada indulgencia a un niño, y te asombrará; juega con él, y te afligirá». El testimonio hebreo, en cambio, dice: «Disciplina a tu hijo ... te humillará».'
    reason: alternative_reading
lexical_decisions:
- source_word: יסר
  english_pob_choice: Discipline
  chosen_spanish: Corrige
  alternatives_spanish:
  - Disciplina
  - Castiga
  - Corrige con disciplina
  lexicon: HALOT
  rationale: El hebreo יסר expresa corrección formativa y disciplinaria. En español, «corrige» comunica con claridad la idea de reprensión formativa; «disciplina» también es posible, pero aquí puede sonar más abstracta o nominal que verbal.
- source_word: בנך
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  - tu hijo
  lexicon: HALOT
  rationale: El hebreo es masculino singular, pero en español bíblico contemporáneo «hijo» es la forma natural y suficientemente precisa para conservar la referencia filial masculina sin sobrecargar el estilo.
- source_word: לבל תבוש
  english_pob_choice: lest you be put to shame
  chosen_spanish: para que no te avergüences
  alternatives_spanish:
  - para que no quedes avergonzado
  - no sea que te avergüences
  lexicon: HALOT
  rationale: La cláusula expresa prevención del deshonor asociado con la mala conducta del hijo. «Para que no te avergüences» mantiene el valor preventivo de la frase y suena natural en español.
- source_word: תשחק עמו
  english_pob_choice: play with him
  chosen_spanish: juegas con él
  alternatives_spanish:
  - juegues con él
  - lo consientes
  - bromeas con él
  lexicon: HALOT
  rationale: El verbo שׂחק permite el sentido concreto de «jugar», y el paralelo griego σύνπαιξον confirma esa imagen. En contexto, el español mantiene la literalidad básica sin perder la advertencia implícita contra la familiaridad imprudente.
- source_word: יכלימך
  english_pob_choice: he will humiliate you
  chosen_spanish: te humillará
  alternatives_spanish:
  - te avergonzará
  - te deshonrará
  lexicon: HALOT
  rationale: De כלם, el verbo denota avergonzar o humillar. «Te humillará» reproduce la fuerza activa del efecto sobre el padre y preserva el vínculo semántico con la vergüenza del primer hemistiquio.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en Ben Sira
  english_pob_reading: The English POB translates the surviving Hebrew as primary and notes the Greek as an alternative reading in a footnote.
  chosen_spanish_reading: La línea principal sigue el hebreo conservado; el griego queda reconocido como lectura alternativa en nota.
  alternative_spanish_readings:
  - 'Una versión basada en el griego: «Cría/calma a un niño, y te asombrará; juega con él, y te afligirá».'
  - Traducir el primer verbo como una acción de cuidado en vez de corrección.
  rationale: La política del proyecto da primacía al hebreo donde está disponible y lo trata como texto fuente principal. El griego se conserva como testimonio paralelo significativo, pero no sustituye la lectura hebrea en el cuerpo principal.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input/check'
- issue: Tensión entre «vergüenza» y «humillación»
  english_pob_reading: 'The English POB keeps both shame and humiliation language distinct: ''lest you be put to shame'' / ''he will humiliate you.'''
  chosen_spanish_reading: Se conserva la diferencia entre la vergüenza preventiva del padre y la humillación causada por el hijo.
  alternative_spanish_readings:
  - Repetir ambos con el mismo verbo («avergonzar»)
  - Suavizar el final a «te entristecerá»
  rationale: El hebreo repite la esfera semántica de la vergüenza pero con matices distintos. Mantener «avergüences» y «humillará» evita borrar esa tensión lexical y reproduce el efecto exhortativo del proverbio.
  doctrine_reference: Halot entries for יסר and כלם; POB lexical consistency policy
translation_notes:
  revision_awareness: 'Este borrador sigue la revisión más reciente sin cambios sustantivos respecto del juicio de alta concordancia: el hebreo se mantiene como base principal y el griego se registra como lectura alternativa en nota.'
  spanish_consistency_notes:
  - Se mantiene «hijo» para reflejar el masculino singular del hebreo.
  - Se conserva el campo semántico de vergüenza/humillación sin neutralizarlo.
  - La nota[a] está anclada al primer hemistiquio para reflejar la divergencia textual del verbo inicial y del desenlace en el griego.
