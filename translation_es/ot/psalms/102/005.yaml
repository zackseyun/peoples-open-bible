revisions:
- from: Mi corazón está herido como hierba y se seca, pues he olvidado comer mi pan[a][b].
  to: Mi corazón está golpeado como la hierba y marchito, pues olvido[a] comer mi pan[b].
  rationale: Se ajusta הוּכָּה a «está golpeado» para conservar mejor el pasivo de aflicción; se cambia «se seca» por «marchito» para reflejar mejor la imagen de hierba ya seca/consumida; y se corrige la nota aspectual para que realmente preserve la alternativa documentada por el POB inglés. También se añade «la» en «como la hierba», que suena más natural en español sin alterar el sentido.
