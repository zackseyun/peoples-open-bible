    text: O «Como pastor, apacentará a su rebaño».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su seno», imagen de cercanía y tierno cuidado.
    reason: cultural_note
  - marker: c
    text: O «las ovejas con cría».
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción general del borrador por su fidelidad y buena legibilidad, pero se corrige la última frase para reflejar con mayor precisión עָלוֹת como ovejas lactantes/con cría y se reubica la nota alternativa al segmento correcto. También se elimina la nota errónea sobre «los llevará en sus brazos», ya que el inglés POB no preserva esa alternativa como nota allí, sino que mantiene «in his bosom» con nota cultural.
