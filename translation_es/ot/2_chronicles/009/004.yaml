translation:
  language: es
  text: la comida de su mesa, la disposición de sus siervos, la asistencia de sus ministros y sus vestidos, sus coperos y sus vestidos, y la escalera[a] por la cual subía a la casa de Yahvé, no había ya en ella aliento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo el paralelo en 1 Reyes 10:5, «el holocausto que él ofrecía en la casa de Yahvé». El hebreo aquí, con mayor naturalidad, dice «la subida/la escalera por la cual subía».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «no había ya en ella aliento»; un modismo que expresa asombro abrumador.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַאֲכַל שֻׁלְחָנוֹ
  english_pob_choice: the food of his table
  chosen_spanish: la comida de su mesa
  alternatives_spanish:
  - el alimento de su mesa
  - la provisión de su mesa
  lexicon: HALOT
  rationale: מַאֲכַל denota comida/alimento para comer. «Comida» conserva el sentido concreto y fluye de manera natural en español sin diluir el detalle de la mesa real.
- source_word: מוֹשַׁב עֲבָדָיו
  english_pob_choice: the seating of his servants
  chosen_spanish: la disposición de sus siervos
  alternatives_spanish:
  - el asiento de sus siervos
  - los lugares de sus siervos
  lexicon: HALOT
  rationale: מֹשָׁב puede referirse a asiento, lugar de asiento o arreglo/disposición de asientos. «Disposición» comunica mejor en español la organización visible de la corte. Para עֲבָדָיו se eligió «siervos» porque aquí el contexto cortesano no exige el matiz lexical fuerte de «esclavos».
- source_word: מַעֲמַד מְשָׁרְתָיו
  english_pob_choice: the attendance of his ministers
  chosen_spanish: la asistencia de sus ministros
  alternatives_spanish:
  - la postura de sus servidores
  - el servicio de sus ministros
  lexicon: HALOT
  rationale: מַעֲמַד implica estar de pie, estación o posición establecida; en este contexto se entiende como la asistencia ordenada de los que servían al rey. «Asistencia» reproduce esa idea de presencia/servicio en acto. «Ministros» mantiene la distinción con עֲבָדָיו, pues מְשָׁרְתָיו apunta a funcionarios de servicio o atendientes de rango cortesano.
- source_word: מַלְבּוּשֵׁיהֶם
  english_pob_choice: their clothing
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su ropa
  - sus prendas
  lexicon: HALOT
  rationale: El sustantivo denota vestimenta/ropa. «Vestidos» conserva el plural concreto y es suficientemente digno y claro en español bíblico moderno.
- source_word: מַשְׁקָיו
  english_pob_choice: his cupbearers
  chosen_spanish: sus servidores de bebida
  alternatives_spanish:
  - sus coperos
  - los que servían su bebida
  lexicon: HALOT
  rationale: En el entorno real, el término se refiere a quienes se ocupaban del servicio de bebida. «Servidores de bebida» mantiene la función sin imponer una palabra más culturalmente específica como «copero», que puede sonar singular o demasiado estrecha en español.
- source_word: עֲלִיָּתוֹ אֲשֶׁר יַעֲלֶה בֵּית יְהוָה
  english_pob_choice: the stairway by which he went up to the house of Yahweh
  chosen_spanish: la subida por la cual él subía a la casa de Yahvé
  alternatives_spanish:
  - la escalera por la cual subía a la casa de Yahvé
  - su ascenso por el cual subía a la casa de Yahvé
  lexicon: HALOT
  rationale: El hebreo masorético lee con más naturalidad una subida/escalera procesional, no el sacrificio. «Subida» conserva el término general de ascenso y el movimiento ascensional del texto. Se evita traducir mecánicamente como «escalera» porque el sustantivo hebreo puede referirse a la elevación o acceso mismo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: בֵּית es literalmente «casa». Se mantiene «casa de Yahvé» siguiendo la convención del proyecto para el Tetragrámaton y preservando la expresión hebrea.
- source_word: רֽוּחַ
  english_pob_choice: there was no more breath in her
  chosen_spanish: no había ya en ella espíritu
  alternatives_spanish:
  - no le quedaba aliento
  - no había ya en ella aliento
  lexicon: HALOT
  rationale: 'רוּחַ puede significar espíritu, aliento o viento. Aquí el español presenta una ambigüedad legítima: «espíritu» conserva la literalidad y deja abierta la lectura idiomática de asombro, mientras que «aliento» explicitaría más el sentido fisiológico. Se preserva la tensión semántica del hebreo.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La política del proyecto en español establece «Yahvé» como forma principal para el Tetragrámaton. Se evita la sustitución por «SEÑOR» para no ocultar el nombre propio divino ni perder la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Sentido de רוּחַ al final del versículo
  english_pob_reading: there was no more breath in her, an idiom expressing overwhelming astonishment
  chosen_spanish_reading: no había ya en ella espíritu
  alternative_spanish_readings:
  - no había ya en ella aliento
  - quedó sin aliento
  rationale: El hebreo permite un giro literal con carga idiomática. En español se conserva «espíritu» para mantener la transparencia y no resolver prematuramente la imagen en una explicación psicológica. La interpretación de asombro extremo queda disponible en nota, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: רוּחַ / ruach'
translation_notes:
  revision_awareness: La versión inglesa auditada no necesitó cambios en la última revisión; el acuerdo general fue alto y solo se registraron observaciones menores. Para el español se mantuvo la lectura masorética de «la subida» en el texto principal, con la alternativa sacrificial preservada en nota como en el expediente inglés, y se respetó la ambigüedad de רוּחַ sin diluirla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del Tetragrámaton.
  - Se distingue «siervos» de «ministros» para reflejar dos términos hebreos diferentes.
  - «Vestidos» se usa de manera consistente para מַלְבּוּשֵׁיהֶם.
  - La última cláusula conserva la literalidad de רוּחַ sin convertirla en paráfrasis interpretativa dentro del texto principal.
