translation:
  language: es
  text: David tomó[a] estas palabras a pecho, y tuvo mucho miedo de Aquis, rey de Gat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "puso estas cosas en su corazón". El modismo hebreo significa que tomó el informe en serio y lo reflexionó interiormente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - puso
  - colocó
  lexicon: HALOT
  rationale: El hebreo con בִּלְבָבוֹ expresa un acto interior de asimilar o tomar en serio las palabras, no un poner físico. En español, "tomó ... en su corazón" conserva bien esa idiomaticidad sin perder la imagen interna.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este asunto
  lexicon: HALOT
  rationale: דְּבָרִים puede significar palabras, cosas o asuntos. Como el referente inmediato es el informe hablado del verso anterior, "estas palabras" es la opción más precisa y natural en español.
- source_word: בִּלְבָבוֹ
  english_pob_choice: to heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su mente
  - dentro de sí
  lexicon: HALOT
  rationale: El hebreo usa "corazón" como centro del pensar y reflexionar. Aunque el inglés opta por la idiomática "to heart", en español conviene mantener la imagen bíblica de "corazón" para no debilitar la metáfora.
- source_word: וַיִּרָא מְאֹד
  english_pob_choice: was very much afraid
  chosen_spanish: tuvo mucho temor
  alternatives_spanish:
  - estuvo muy asustado
  - temió mucho
  lexicon: HALOT
  rationale: יָרֵא con מְאֹד intensifica el temor real de David. "Tuvo mucho temor" es sobrio, claro y conserva el peso emocional del hebreo.
- source_word: מִפְּנֵי
  english_pob_choice: of
  chosen_spanish: delante de
  alternatives_spanish:
  - por causa de
  - ante
  lexicon: HALOT
  rationale: Aunque la construcción puede equivaler a "temer a", en español "delante de" ayuda a reflejar el matiz literal de "ante la presencia de" sin sonar forzado; además mantiene la relación personal con Aquis.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquis
  alternatives_spanish:
  - Aquís
  - Aquis
  lexicon: transliteration
  rationale: Se translitera el nombre propio a la forma usada en español bíblico amplio, "Aquis", por claridad lectora y consistencia onomástica.
- source_word: מֶלֶךְ גַּת
  english_pob_choice: king of Gath
  chosen_spanish: rey de Gat
  alternatives_spanish:
  - el rey de Gat
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa como "rey de Gat". En español, el artículo es opcional y puede omitirse para mayor fluidez sin perder el sentido.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y mantiene la decisión auditada del inglés POB de tratar el modismo שׂוּם ... בִּלְבָב como una internalización seria del informe, no como acción física. No hay revisiones previas aplicadas en el paquete, y el estado de concordancia indica alta coincidencia.
  spanish_consistency_notes:
  - Se mantiene "corazón" para בֵּ/בָב según el valor bíblico del centro interior de la persona.
  - Se usa "Aquis" como forma española estable de אָכִישׁ.
  - Se conserva "Gat" como topónimo bíblico transliterado, no traducido.
  - El tono es sobrio y readable, evitando tanto arcaísmo como paráfrasis excesiva.
