translation:
  language: es
  text: y llevar las primicias de nuestra tierra y las primicias de todo fruto de todo árbol, año tras año, a la casa de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/לְ/הָבִיא
  english_pob_choice: and to bring
  chosen_spanish: y llevar
  alternatives_spanish:
  - y traer
  - y presentar
  lexicon: HALOT
  rationale: El infinitivo con prefijo expresa la obligación de aportar ofrendas al lugar de culto. En español, 'llevar' comunica naturalmente el acto de conducir los primeros frutos al templo sin perder el matiz de entrega ritual.
- source_word: בִּכּוּרֵי
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - la primicia
  lexicon: HALOT
  rationale: '''Primicias'' es el término español cultual más establecido para בִּכּוּרִים y conserva el sentido de ofrenda ritual, no solo de producto agrícola.'
- source_word: אַדְמָתֵנוּ
  english_pob_choice: our soil / our land
  chosen_spanish: nuestra tierra
  alternatives_spanish:
  - nuestro suelo
  - nuestra tierra cultivable
  lexicon: HALOT
  rationale: '''Tierra'' recoge bien el valor agrícola y territorial del hebreo אדמה en un contexto de cosecha. ''Suelo'' suena más técnico y ''tierra cultivable'' añade más explicación de la que el hebreo exige.'
- source_word: וּ/בִכּוּרֵי כָּל פְּרִי כָל עֵץ
  english_pob_choice: and the firstfruits of all the fruit of every tree
  chosen_spanish: y las primicias de todo fruto de todo árbol
  alternatives_spanish:
  - y las primicias de cada fruto de cada árbol
  - y las primicias de todo el fruto de cada árbol
  lexicon: HALOT
  rationale: 'Mantengo la acumulación hebrea de genitivos para conservar la amplitud: no se trata de una sola clase de fruto, sino de todos los frutos arbóreos. ''Todo fruto de todo árbol'' preserva esa fuerza distributiva sin volver la frase torpe.'
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producción
  lexicon: HALOT
  rationale: '''Fruto'' funciona mejor en español bíblico y general para el producto de los árboles. ''Fruta'' suena más coloquial y ''producción'' diluye la imagen concreta.'
- source_word: כָל עֵץ
  english_pob_choice: every tree
  chosen_spanish: todo árbol
  alternatives_spanish:
  - cada árbol
  - todos los árboles
  lexicon: HALOT
  rationale: El hebreo es distributivo; 'todo árbol' mantiene esa amplitud y suena natural en español en una serie nominal.
- source_word: שָׁנָה בְשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - de año en año
  lexicon: HALOT
  rationale: La expresión idiomática en español más fluida es 'año tras año', que conserva la repetición regular y el ritmo iterativo del hebreo.
- source_word: לְבֵית יְהוָה
  english_pob_choice: to the house of Yahweh
  chosen_spanish: a la casa de Yahvé
  alternatives_spanish:
  - al templo de Yahvé
  - a la casa de Yahvé, el templo
  lexicon: HALOT
  rationale: Se conserva 'casa' para seguir de cerca el hebreo בית y 'Yahvé' conforme a la convención del proyecto para el Tetragrámaton. 'Templo' es verdadero en contexto, pero es más interpretativo que el texto base.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo nombra directamente a YHWH. Conforme a la norma del proyecto, se traduce como 'Yahvé' para preservar el nombre del pacto y evitar la convención de sustitución por mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del contexto inglés y adopta el ajuste revisado de אַדְמָתֵנוּ: en vez de una traducción demasiado técnica como ''suelo'', se opta por ''tierra'', que es más natural en español y sigue siendo fiel al campo semántico agrícola del hebreo. También se mantiene la decisión del marco POB de no ocultar el nombre divino, usando ''Yahvé''.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y actual, sin arcaísmos innecesarios.
  - Se preserva la estructura acumulativa del hebreo para no reducir el alcance de la obligación.
  - '''Primicias'' se usa de manera uniforme como término cultual.'
  - No se introduce 'templo' en el texto principal para no sustituir la formulación literal 'casa'.
