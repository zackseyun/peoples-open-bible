translation:
  language: es
  text: Saca[a] a un pueblo ciego, aunque tiene ojos, y a los sordos, aunque tienen oídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haz salir a un pueblo ciego, aunque tiene ojos, y a los sordos, aunque tienen oídos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצִיא
  english_pob_choice: Bring out
  chosen_spanish: Saca
  alternatives_spanish:
  - Saca fuera
  - Haz salir
  - Trae fuera
  lexicon: HALOT
  rationale: El hiphil imperativo masculino singular expresa la acción de hacer salir o traer afuera. «Saca» comunica bien la fuerza imperativa en español moderno y mantiene la brevedad profética del hebreo.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  - un pueblo
  lexicon: HALOT
  rationale: Aquí el sustantivo colectivo funciona naturalmente como «pueblo» en español. Conserva el sentido de grupo caracterizado por la ceguera sin cargar el matiz político de «nación».
- source_word: עִוֵּר
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - ciego/a
  - cegado
  - sin vista
  lexicon: HALOT
  rationale: El adjetivo físico/metafórico se expresa de modo directo con «ciego», preservando la ironía profética.
- source_word: וְעֵינַיִם יֵשׁ
  english_pob_choice: though they have eyes
  chosen_spanish: aunque tienen ojos
  alternatives_spanish:
  - y tienen ojos
  - pero tienen ojos
  - aun teniendo ojos
  lexicon: HALOT
  rationale: 'La construcción hebrea es concesiva en el contexto: son ciegos pese a poseer ojos. «Aunque tienen ojos» reproduce esa tensión sin sobreexplicar la metáfora.'
- source_word: וְחֵרְשִׁים
  english_pob_choice: and the deaf
  chosen_spanish: y a los sordos
  alternatives_spanish:
  - y los sordos
  - y a sordos
  lexicon: HALOT
  rationale: El adjetivo plural sustantivado se vierte con artículo implícito en español, y el acusativo preposicional «a los» mantiene la naturalidad del paralelo con «a un pueblo ciego».
- source_word: וְאָזְנַיִם לָמוֹ
  english_pob_choice: though they have ears
  chosen_spanish: aunque tienen oídos
  alternatives_spanish:
  - pero tienen oídos
  - y tienen oídos
  - aunque oídos les pertenecen
  lexicon: HALOT
  rationale: Como en la primera mitad del verso, la frase hebrea expresa posesión real de oídos dentro de una ironía concesiva. «Aunque tienen oídos» conserva el contraste sin convertirlo en una paráfrasis interpretativa.
theological_decisions:
- issue: Ceguera y sordera como lenguaje profético literal-metafórico
  english_pob_reading: Retain the literal sensory terms while allowing the prophetic context to imply spiritual insensitivity.
  chosen_spanish_reading: Mantener los términos sensoriales literales, dejando que el contexto profético sugiera la insensibilidad espiritual.
  alternative_spanish_readings:
  - Explicitar «espiritualmente ciego y sordo» en el texto principal
  - Parafrasear como una incapacidad de comprender
  rationale: El hebreo usa vocabulario ordinario de sentidos físicos; el contexto de Isaías permite la aplicación metafórica. Traducirlo literalmente preserva la tensión teológica y evita introducir interpretación en la línea principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se reflejó la revisión inglesa que cambió de «the blind people» a «a blind people»; por eso el español usa «a un pueblo ciego» para conservar la indefinición del sintagma hebreo. También se mantuvo la lectura concesiva en ambas cláusulas, según el aparato auditado.
  spanish_consistency_notes:
  - Se usa «pueblo» para עַם, coherente con un colectivo caracterizado por una cualidad, no necesariamente una entidad política.
  - Se mantiene «ciego/sordos» en sentido literal, sin añadir «espiritualmente» en el texto principal.
  - La nota al pie ofrece una alternativa verbal cercana al inglés auditado, pero la base principal sigue el hebreo indefinido y la fuerza concesiva.
  - La preposición «a» en «a un pueblo ciego» y «a los sordos» mantiene un español fluido sin perder el paralelismo semítico.
