translation:
  language: es
  text: 'Moisés le dijo[a]: «Tan pronto como salga de la ciudad, extenderé mis manos hacia Yahvé; los truenos cesarán, y ya no habrá granizo, para que sepas que la tierra[b] pertenece a Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las voces»; en este contexto de tormenta se refiere al trueno.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la tierra» también puede traducirse «el país» o «la tierra/territorio».'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/צֵאתִ/י
  english_pob_choice: As soon as I have gone out
  chosen_spanish: Tan pronto como salga de la ciudad
  alternatives_spanish:
  - Cuando salga de la ciudad
  - En cuanto salga de la ciudad
  lexicon: HALOT
  rationale: La construcción con כְ + infinitivo de יצא expresa cercanía temporal respecto de la salida de Moisés. «Tan pronto como» reproduce bien ese matiz inminente en español natural, sin añadir demora ni causalidad.
- source_word: אֶפְרֹשׂ אֶת כַּפַּי
  english_pob_choice: I will spread out my hands
  chosen_spanish: extenderé mis manos
  alternatives_spanish:
  - alzaré mis manos
  - abriré mis manos
  lexicon: HALOT
  rationale: פרשׂ con כף en contexto de oración describe el gesto físico de extender las manos en súplica. «Extenderé mis manos» conserva la imagen corporal y su registro reverente.
- source_word: יְהוָה / לַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la convención proyectiva de la POB en español, el Tetragrámaton se vierte como «Yahvé» de forma explícita, preservando el nombre del pacto que aparece en el hebreo.
- source_word: הַ/קֹּל֣וֹת
  english_pob_choice: the thunder
  chosen_spanish: los truenos
  alternatives_spanish:
  - las voces
  - los sonidos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «las voces/los sonidos», en este relato de tormenta el referente meteorológico es el trueno. «Los truenos» expresa con claridad el sentido contextual que la POB inglesa ya documenta.
- source_word: יֶחְדָּל֗וּ/ן
  english_pob_choice: will cease
  chosen_spanish: cesarán
  alternatives_spanish:
  - se detendrán
  - terminarán
  lexicon: HALOT
  rationale: חדל significa cesar o detenerse. «Cesarán» mantiene el valor léxico y el tono formal del versículo.
- source_word: וְ/הַ/בָּרָד֙ לֹ֣א יִֽהְיֶה ע֔וֹד
  english_pob_choice: and the hail will be no more
  chosen_spanish: y el granizo no volverá
  alternatives_spanish:
  - y ya no habrá granizo
  - y el granizo no seguirá
  lexicon: HALOT
  rationale: La cláusula comunica la desaparición del granizo como evento en curso. «No volverá» comunica con naturalidad la idea de que no continuará ni reaparecerá; aun así, se conserva el sentido de cese total sin volverlo más interpretativo que el hebreo.
- source_word: לְמַ֣עַן תֵּדַ֔ע
  english_pob_choice: so that you may know
  chosen_spanish: para que sepas
  alternatives_spanish:
  - a fin de que sepas
  - para que conozcas
  lexicon: HALOT
  rationale: למען introduce propósito. «Para que sepas» conserva la finalidad y suena natural en español bíblico contemporáneo.
- source_word: כִּ֥י לַ/יהוָ֖ה הָ/אָֽרֶץ
  english_pob_choice: that the earth belongs to Yahweh
  chosen_spanish: que la tierra pertenece a Yahvé
  alternatives_spanish:
  - que la tierra es de Yahvé
  - que la tierra es de Yahvé
  lexicon: HALOT
  rationale: El ל de posesión expresa pertenencia. «Pertenece a Yahvé» traduce esa relación de propiedad de manera clara y auditable. Se mantiene «la tierra», como en el audit trail inglés, porque el contexto de la plaga afirma soberanía sobre el mundo creado y no solo sobre un territorio local.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La fuente hebrea usa directamente el Nombre. En español POB, «Yahvé» preserva esa referencia explícita sin ocultarla tras una sustitución litúrgica. Esto mantiene la transparencia textual y la coherencia con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra/territorio
  rationale: 'En el contexto de la confrontación con Faraón, la afirmación tiene alcance teológico universal: Yahvé es dueño de toda la tierra. «La tierra» conserva ese sentido amplio en español, siguiendo la decisión auditada del inglés.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
- issue: Sentido meteorológico de הַקֹּלוֹת
  english_pob_reading: the thunder
  chosen_spanish_reading: los truenos
  alternative_spanish_readings:
  - las voces
  - los sonidos
  rationale: Aunque el hebreo literalmente dice «las voces», el contexto de la tormenta exige el referente de trueno. Traducir «los truenos» evita oscurecer la imagen y refleja la lectura lexical documentada en la POB inglesa.
  doctrine_reference: HALOT; contextual usage in Exodus 9:29
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto inglés auditado permaneció estable y el cruce de control marcó alto acuerdo. La versión española sigue esa línea sin añadir expansiones interpretativas ni suavizar decisiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente para יְהוָה.
  - «La tierra» conserva el alcance amplio del inglés auditado; no se restringe a «el país».
  - «Los truenos» respeta el sentido contextual de הַקֹּלוֹת en la plaga, con nota explicativa por la literalidad hebrea.
  - El registro es reverente y actual, sin recurrir a fórmulas eclesiales opacas.
