review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea del POB inglés: conserva el modismo יָד לְיָד en el texto principal, comunica correctamente que el malvado no quedará sin castigo, y contrasta eso con la liberación de la descendencia de los justos. Sin embargo, «mano a mano» en español moderno suele sugerir combate o cooperación directa y puede desviar más que aclarar el modismo hebreo. Además, la nota [b] sobre «el malo» no es necesaria en el texto final y sobreexplica una decisión que en español puede sostenerse sin nota.'
  spanish_quality_summary: El español es claro y legible, pero «mano a mano» suena idiomáticamente cargado en español contemporáneo. «De mano en mano» no sería fiel aquí; una solución mejor es mantener la literalidad auditiva con «Mano con mano» y aclararla en nota. También conviene simplificar «no quedará sin castigo» a «no quedará impune», que es más proverbial, más natural y semánticamente equivalente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Justos» y «descendencia» encajan bien. «El malo» preserva el valor personal del singular hebreo mejor que «el mal». La revisión propuesta mantiene la decisión documentada sobre el modismo y mejora su recepción en español.
  issues:
  - severity: medium
    issue: «Mano a mano» puede malinterpretarse en español
    rationale: Aunque intenta preservar la imagen hebrea, en español moderno evoca con fuerza un duelo, un trato bilateral o cercanía física, no una partícula enfática de certeza. Eso puede distorsionar el sentido más que el inglés «Hand to hand».
  - severity: low
    issue: «No quedará sin castigo» es correcto pero menos idiomático que «no quedará impune»
    rationale: Ambas opciones son fieles a יִנָּקֶה, pero «no quedará impune» es más natural, breve y proverbial en español bíblico actual.
  - severity: low
    issue: La nota [b] es innecesaria
    rationale: El español «el malo» ya comunica adecuadamente el valor sustantivado personal. La nota agrega metalenguaje gramatical sin resolver una ambigüedad real para el lector.
  revised_spanish_text: Mano con mano[a], el malo no quedará impune, pero la descendencia de los justos escapará.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «mano con mano», un modismo que probablemente expresa certeza firme; también puede entenderse como «ciertamente».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el modismo inicial para conservar mejor la literalidad sin activar la lectura española más común de «mano a mano». También se cambia «no quedará sin castigo» por «no quedará impune» por mayor naturalidad proverbial. Se elimina la nota sobre «el malo» porque no hace falta para la comprensión y no preserva una alternativa textual necesaria.
