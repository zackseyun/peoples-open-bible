revisions:
- from: Y yo mismo pondré mi rostro contra aquel hombre y lo cortaré[a] de en medio de su pueblo, porque de su descendencia dio a Moloc, para contaminar mi santuario y profanar mi santo nombre.
  to: Y yo mismo pondré mi rostro contra aquel hombre y lo eliminaré de entre su pueblo, porque ha dado[a] a Moloc parte de su descendencia, para contaminar mi santuario y profanar mi santo nombre.
  rationale: Se corrige el texto para reflejar el matiz partitivo de מִזַּרְעוֹ, mejorar la legibilidad del español en el predicado judicial, y reubicar la nota al pie en el segmento que el rastro POB documenta como lexicalmente sensible. Así se preservan mejor tanto el sentido del hebreo como la auditoría inglesa.
