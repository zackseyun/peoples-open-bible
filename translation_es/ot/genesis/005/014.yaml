translation:
  language: es
  text: Y fueron todos los días de Kenán[a] novecientos diez años[b], y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los días de Kenán», fórmula genealógica recurrente que significa su vida entera.'
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea del nombre aquí es «Kenán»; «Cainan» es una forma tradicional influida por la tradición griega e inglesa.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: So ... were
  chosen_spanish: Así fueron
  alternatives_spanish:
  - Y fueron
  - Entonces fueron
  lexicon: HALOT
  rationale: El verbo con waw consecutiva avanza la fórmula genealógica; «Así fueron» conserva la continuidad narrativa y suena natural en español sin perder el enlace secuencial.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: «כָּל» modifica «días» con sentido de totalidad; «todos» reproduce bien el alcance total en español.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - la vida de
  - la duración de la vida de
  lexicon: HALOT
  rationale: Se mantiene la forma literal de la fórmula genealógica para conservar el ritmo recurrente de Génesis 5, donde «los días de» expresa la totalidad de la vida.
- source_word: קֵינָן
  english_pob_choice: Kenan
  chosen_spanish: Kenán
  alternatives_spanish:
  - Cainan
  lexicon: HALOT
  rationale: Se adopta la forma hebrea del nombre, transliterada al uso hispano como «Kenán». La variante tradicional «Cainan» refleja la tradición greco-latina, pero no el hebreo de este pasaje.
- source_word: עֶשֶׂר שָׁנִים וּתְשַׁע מֵאֹות שָׁנָה
  english_pob_choice: nine hundred and ten years
  chosen_spanish: novecientos diez años
  alternatives_spanish:
  - diez años y novecientos años
  lexicon: HALOT
  rationale: El orden numeral hebreo se vierte en el orden idiomático normal del español. Se usa «años» en plural con la cantidad total, como corresponde al uso natural.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y él murió
  - entonces murió
  lexicon: HALOT
  rationale: La clausura genealógica se traduce de forma directa y sobria. En español, el sujeto implícito resulta natural y conserva la concisión del hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail inglés de la POB, manteniendo la fórmula genealógica y la forma hebrea del nombre, sin introducir cambios interpretativos. No se requieren revisiones textuales relevantes respecto del pasaje base.
  spanish_consistency_notes:
  - Se conserva la fórmula de genealogía de Génesis 5 con «los días de», por coherencia interna y transparencia auditiva.
  - Se translitera el nombre propio según la forma hebrea, evitando la variante tradicional anglo-latina salvo en nota.
  - La construcción verbal en pasado simple reproduce la secuencia narrativa sin sobrecargar el español.
  - No hay tensiones teológicas específicas en este versículo, solo una decisión lexical sobre la fórmula genealógica y el nombre propio.
