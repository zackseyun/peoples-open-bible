translation:
  language: es
  text: 'De David[a]. Un salmo. Yahvé dice a mi señor[b]: «Siéntate a mi derecha hasta que ponga a tus enemigos como estrado para tus pies[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «De parte de David». El prefijo hebreo puede expresar autoría, pertenencia o asociación en el encabezamiento del salmo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo distingue «Yahvé» (יְהוָה) de «mi señor» (אֲדֹנִי).
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «para tus pies»; algunas versiones lo interpretan como «bajo tus pies».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: El ל prefijado en los encabezamientos de salmos puede indicar autoría, pertenencia o asociación. «De David» conserva esa ambigüedad con naturalidad en español, sin decidir de más entre autoría estricta y relación temática.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un cántico
  - Una melodía
  lexicon: HALOT
  rationale: Es el equivalente de género más transparente y estable para el título del salmo.
- source_word: נְאֻם
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - oráculo de
  lexicon: HALOT
  rationale: «Dice» mantiene el flujo natural de la cita directa en español, mientras deja abierta la fuerza solemne del término hebreo. «Declara» sería posible, pero más marcado; «oráculo de» sería demasiado pesado como traducción principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: לַאדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi maestro
  - a mi señor mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona designa un título de respeto, no el nombre divino. «Mi señor» preserva la distinción entre Yahvé y la figura a la que se dirige el versículo, sin cargarla tipográficamente con una lectura posterior.
- source_word: שֵׁב
  english_pob_choice: Sit
  chosen_spanish: Siéntate
  alternatives_spanish:
  - Siéntate aquí
  - Toma asiento
  lexicon: HALOT
  rationale: El imperativo singular queda bien representado por «Siéntate». En español, el reflexivo aporta la forma natural de la orden sin añadir contenido extraño.
- source_word: לִימִינִי
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi diestra
  - junto a mi derecha
  lexicon: HALOT
  rationale: El hebreo expresa la posición de honor mediante la imagen de la derecha. «A mi derecha» es claro y conserva la metáfora real sin sonar arcaico.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - en tanto que
  lexicon: HALOT
  rationale: Introduce correctamente la duración límite de la acción divina en español.
- source_word: אָשִׁית
  english_pob_choice: I make
  chosen_spanish: ponga
  alternatives_spanish:
  - coloque
  - haga
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «poner/colocar», en español la construcción «poner a tus enemigos por estrado» reproduce con naturalidad el valor resultativo del verbo en la idiomática del versículo.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - quienes te odian
  lexicon: HALOT
  rationale: Es la equivalencia directa y suficiente para el plural con sufijo de segunda persona.
- source_word: הֲדֹם
  english_pob_choice: a footstool
  chosen_spanish: por estrado
  alternatives_spanish:
  - por banquillo
  - como escabel
  lexicon: HALOT
  rationale: «Estrado» comunica la imagen de sometimiento y apoyo para los pies de modo natural en español bíblico contemporáneo. «Escabel» sería más literal pero menos común; «banquillo» no conserva tan bien la imagen real.
- source_word: לְרַגְלֶיךָ
  english_pob_choice: for your feet
  chosen_spanish: para tus pies
  alternatives_spanish:
  - bajo tus pies
  - a tus pies
  lexicon: HALOT
  rationale: El ל hebreo es «para/a», no explícitamente «bajo». «Para tus pies» mantiene la cercanía formal al texto fuente y sugiere la función del estrado sin añadir una localización que el hebreo no expresa de manera directa.
theological_decisions:
- issue: Distinguir entre el nombre divino y el título aplicado al destinatario humano/exaltado
  english_pob_reading: Yahweh says to my lord
  chosen_spanish_reading: Yahvé dice a mi señor
  alternative_spanish_readings:
  - Yahvé dice a mi Señor
  - El Señor dice a mi señor
  rationale: El hebreo distingue con claridad יְהוָה de אֲדֹנִי. Mantener «Yahvé» y «mi señor» preserva la tensión lexical y la transparencia teológica del versículo, sin resolverla por capitalización interpretativa.
  doctrine_reference: Salmo 110:1; principios de transparencia del Tetragrámaton
- issue: Conservar el tono oracular del verbo introductorio sin forzar una interpretación posterior
  english_pob_reading: Yahweh says
  chosen_spanish_reading: Yahvé dice
  alternative_spanish_readings:
  - Yahvé declara
  - Oráculo de Yahvé
  rationale: El hebreo נְאֻם puede sonar a declaración solemne u oráculo. En español, «dice» funciona bien en la cita directa y deja que el tono solemne lo aporte el contexto; «declara» o «oráculo de» serían más marcados y menos fluidos.
  doctrine_reference: Salmo 110:1; fórmulas proféticas de enunciación
- issue: Mantener la imagen de entronización sin interpretarla excesivamente
  english_pob_reading: at my right hand ... a footstool for your feet
  chosen_spanish_reading: a mi derecha ... por estrado para tus pies
  alternative_spanish_readings:
  - a mi diestra ... como escabel para tus pies
  - a mi derecha ... bajo tus pies
  rationale: La imagen hebrea es de honor y sometimiento real. «A mi derecha» preserva la localización de honor, y «por estrado para tus pies» conserva la metáfora de dominación sin cambiarla por una glosa explicativa.
  doctrine_reference: Salmo 110:1; lenguaje de entronización y victoria real
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés muestran un consenso alto: se mantienen el encabezamiento, la distinción entre YHWH y אֲדֹנִי, la cita directa y la imagen de estrado. La única decisión sensible para el español fue cómo naturalizar לְרַגְלֶיךָ sin perder la literalidad; se optó por «para tus pies», con la metáfora «por estrado» para sostener el valor idiomático. No se registran revisiones aplicadas en el historial inglés reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se conserva «mi señor» en minúscula para reflejar el título hebreo y no una capitalización interpretativa.
  - «De David» mantiene la ambigüedad del ל en el encabezamiento sin decidir en exceso por autoría estricta.
  - La puntuación reproduce una apertura breve, seguida de cita directa con comillas españolas y cierre con punto final según norma editorial en español.
