  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los querubines extienden las alas hacia arriba, cubren/sombrean el propiciatorio con ellas, están orientados uno hacia otro y sus rostros están hacia el propiciatorio. También preserva correctamente la repetición concreta de ''rostros'' y la referencia cultual de כַּפֹּרֶת.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero presenta dos puntos mejorables: ''uno hacia el otro'' suena algo calcado en español bíblico natural, y ''cubriendo'' atenúa el matiz visual de sombrear/recubrir desde arriba que el contexto de alas extendidas sugiere. Una leve revisión mejora la fluidez y la precisión imagética sin apartarse del texto fuente.'
  glossary_alignment: '''Querubines'' y ''propiciatorio'' están bien alineados con la terminología bíblica española y con la racionalidad documentada para כְּרֻבִים y כַּפֹּרֶת. No hay conflicto con los términos por defecto del proyecto. La nota alternativa sobre ''tapa de expiación'' es adecuada y está bien anclada.'
  issues:
  - severity: medium
    issue: La frase 'sus rostros estarán uno hacia el otro' suena poco idiomática en español.
    rationale: Aunque reproduce la reciprocidad del hebreo, en español más natural y digno conviene 'el uno frente al otro' o formulación equivalente. Esto conserva el distributivo sin calco innecesario.
  - severity: low
    issue: '''Cubriendo con sus alas'' es aceptable, pero pierde parte del matiz de cubrir desde arriba/sombrear.'
    rationale: סֹכְכִים en este contexto de alas extendidas sobre el propiciatorio sugiere cobertura protectora por encima. 'Cubriendo por encima con sus alas' expresa mejor la imagen espacial sin volverse interpretativo ni forzado.
