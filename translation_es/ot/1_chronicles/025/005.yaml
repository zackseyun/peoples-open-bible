    reason: alternative_reading
  - marker: b
    text: O «para levantar el cuerno». El «cuerno» es una imagen figurada de fuerza, honor o posición exaltada.
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a las verdaderas ambigüedades preservadas por el hebreo y por el rastro POB, se eliminó la nota innecesaria sobre «Hemán/vidente», se ajustó «Todos estos eran los hijos» para reflejar mejor בָנִים en contexto genealógico, y se prefirió «exaltar el cuerno» por mayor alineación léxica con la auditoría inglesa sin perder naturalidad en español.
