  - Se mantuvo el paralelismo entre «nuestras vidas» y «nuestras leyes» para reflejar el doble objeto de la lucha.
  - Se eligieron términos sobrios y eclesialmente legibles, evitando sustituir la carga histórica de νόμιμα por un término demasiado general.
