    reason: alternative_reading
  - marker: b
    text: O «nada de la carne para comer». El hebreo dice literalmente «carne», un término común en contextos sacrificiales.
    reason: lexical_alternative
  - marker: c
    text: O «el primer día» puede entenderse más ampliamente en relación con los sacrificios de la fiesta al inicio de la celebración; el texto hebreo no lo especifica más.
