translation:
  language: es
  text: 'Y Eliseo volvió a Gilgal[a], y había una hambruna en la tierra. Los hijos de los profetas estaban sentados delante de él, y dijo a su criado: «Pon la olla grande y cuece un guisado para los hijos de los profetas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los discípulos de los profetas», refiriéndose a una comunidad o gremio profético.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: HALOT
  rationale: El perfecto qal de שוב expresa retorno a un lugar previo. «Volvió» es natural en español y conserva el movimiento de regreso sin añadir matices innecesarios.
- source_word: הַגִּלְגָּלָה
  english_pob_choice: to Gilgal
  chosen_spanish: a Gilgal
  alternatives_spanish:
  - hacia Gilgal
  - a Gilgal
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia el lugar. En español se expresa de forma natural con «a Gilgal».
- source_word: וְהָרָעָב בָּאָרֶץ
  english_pob_choice: and there was a famine in the land
  chosen_spanish: y había hambre en la tierra
  alternatives_spanish:
  - y había una hambruna en la tierra
  - y el hambre estaba en la tierra
  lexicon: HALOT
  rationale: La cláusula hebrea es circunstancial y sin verbo explícito. «Había hambre» reproduce el sentido de existencia de una escasez alimentaria de forma idiomática en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: «Tierra» mantiene el registro bíblico y corresponde bien al hebreo הארץ. «País» sería menos natural en este contexto narrativo.
- source_word: בְנֵי הַנְּבִיאִים
  english_pob_choice: the sons of the prophets
  chosen_spanish: los hijos de los profetas
  alternatives_spanish:
  - los discípulos de los profetas
  - la comunidad profética
  lexicon: HALOT
  rationale: Se preserva el giro hebreo literal porque el POB inglés lo retiene como idiomático e históricamente cargado. En español, «hijos de los profetas» mantiene la forma fuente sin ocultar el posible sentido institucional.
- source_word: יֹשְׁבִים לְפָנָיו
  english_pob_choice: were sitting before him
  chosen_spanish: estaban sentados delante de él
  alternatives_spanish:
  - estaban sentados ante él
  - estaban sentados en su presencia
  lexicon: HALOT
  rationale: El participio describe una escena continua. «Delante de él» conserva la relación espacial y respetuosa, y «estaban sentados» fluye naturalmente en español.
- source_word: לְנַעֲרוֹ
  english_pob_choice: to his servant
  chosen_spanish: a su criado
  alternatives_spanish:
  - a su siervo
  - a su servidor
  lexicon: HALOT
  rationale: נַעַר puede ser joven, asistente o servidor. Aquí indica una función de servicio doméstico o asistencial; «criado» comunica bien ese papel sin perder el matiz de subordinación.
- source_word: שְׁפֹת
  english_pob_choice: Put on
  chosen_spanish: Pon
  alternatives_spanish:
  - Coloca
  - Pon sobre el fuego
  lexicon: HALOT
  rationale: El imperativo aquí significa poner una vasija sobre el fuego. En español, «Pon la olla grande» es breve, claro y mantiene la acción implícita del contexto.
- source_word: הַסִּיר הַגְּדוֹלָה
  english_pob_choice: the large pot
  chosen_spanish: la olla grande
  alternatives_spanish:
  - la vasija grande
  - el gran caldero
  lexicon: HALOT
  rationale: סִיר es un recipiente de cocina; en español, «olla» es el equivalente más transparente y contemporáneo. «Grande» conserva el adjetivo del hebreo.
- source_word: וּבַשֵּׁל
  english_pob_choice: and boil
  chosen_spanish: cuece
  alternatives_spanish:
  - hierve
  - cocina
  lexicon: HALOT
  rationale: El verbo expresa cocción por hervor o cocción intensa. «Cuece» abarca bien el sentido culinario y funciona con el objeto implícito del guisado.
- source_word: נָזִיד
  english_pob_choice: stew
  chosen_spanish: un guisado
  alternatives_spanish:
  - un estofado
  - un potaje
  lexicon: HALOT
  rationale: נָזִיד denota comida hervida o guiso. «Guisado» es una equivalencia natural en español y evita el arcaísmo de «potaje» o la restricción de «sopa».
theological_decisions:
- issue: La expresión בְנֵי הַנְּבִיאִים
  english_pob_reading: the sons of the prophets; an identifiable prophetic community or guild
  chosen_spanish_reading: los hijos de los profetas, manteniendo el giro hebreo literal
  alternative_spanish_readings:
  - los discípulos de los profetas
  - la comunidad profética
  rationale: No se trata de una disputa doctrinal, pero sí de una expresión institucional y culturalmente marcada. Se conserva el hebraísmo en el texto principal para respetar la primacía de la forma fuente, y se deja la alternativa explicativa para quienes necesiten mayor claridad.
  doctrine_reference: Translation philosophy §§1, 4, 5
translation_notes:
  revision_awareness: El texto inglés auditado permanece estable en la última revisión; no hay cambios aplicados y la concordancia de revisión es alta. La redacción española sigue directamente el hebreo, usando el inglés POB como control de decisiones léxicas e institucionales, no como base mecánica.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general para el nombre divino, pero este versículo no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aparece en este texto.
  - Se mantiene un registro bíblico sobrio y natural en español, sin arcaísmos innecesarios.
  - Se conserva la tensión entre el hebraísmo «hijos de los profetas» y su posible valor institucional mediante nota.
  - La escena verbal se expresa en pasado narrativo continuo con formas naturales en español.
