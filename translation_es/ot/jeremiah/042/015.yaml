translation:
  language: es
  text: 'Ahora pues, oigan la palabra de Yahvé, remanente de Judá. Así dice Yahvé de los ejércitos, el Dios de Israel: Si están decididos[a] a ir a Egipto y a ir a residir allí como forasteros,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «si de veras ponen su rostro para ir a Egipto»; es un modismo que expresa resolución firme.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה לָכֵן
  english_pob_choice: Now therefore
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Ahora, por tanto
  - Así que ahora
  lexicon: HALOT
  rationale: La combinación marca una transición inferencial y solemne. «Ahora pues» conserva el valor discursivo sin sonar pesado en español.
- source_word: שִׁמְעוּ דְבַר יְהוָה
  english_pob_choice: hear the word of Yahweh
  chosen_spanish: oigan la palabra de Yahvé
  alternatives_spanish:
  - escuchen la palabra de Yahvé
  - oir la palabra de Yahvé
  lexicon: HALOT
  rationale: «Oigan» mantiene el llamado profético directo y el peso de שׁמע en contexto exhortativo. «La palabra de Yahvé» sigue el nombre divino directo, conforme al criterio del proyecto.
- source_word: שְׁאֵרִית יְהוּדָה
  english_pob_choice: O remnant of Judah
  chosen_spanish: remanente de Judá
  alternatives_spanish:
  - resto de Judá
  - remanente de Judá, oh
  lexicon: HALOT
  rationale: «Remanente» reproduce el valor teológico establecido de שְׁאֵרִית. El vocativo se entiende por el contexto, sin necesidad de una interjección forzada en español.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé Sabaot
  lexicon: HALOT
  rationale: «De los ejércitos» es la equivalencia natural y fiel de צְבָאוֹת. Se evita sustituir el título por una forma litúrgica menos transparente.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel,
  - el Dios de Israel
  lexicon: HALOT
  rationale: Constructo directo y transparente; «Dios de Israel» comunica bien la relación pactual sin añadir matices no presentes.
- source_word: אִם אַתֶּם שׂוֹם תְּשִׂמ֤וּ/ן פְּנֵי/כֶם
  english_pob_choice: If you are determined
  chosen_spanish: Si de veras ponen su rostro
  alternatives_spanish:
  - Si ustedes se disponen firmemente
  - Si ponen decididamente su rostro
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «poner el rostro», que expresa resolución firme. «De veras» ayuda a reflejar la intensificación del infinitivo absoluto + verbo finito, sin borrar el idiomatismo.
- source_word: לָבֹא מִצְרַיִם
  english_pob_choice: to go to Egypt
  chosen_spanish: para entrar en Egipto
  alternatives_spanish:
  - para ir a Egipto
  - para llegar a Egipto
  lexicon: HALOT
  rationale: «Entrar en Egipto» refleja con precisión el movimiento hacia un territorio, y mantiene una cierta cercanía al hebreo. Es una alternativa más sobria que «ir a», sin perder naturalidad.
- source_word: וּבָאתֶם
  english_pob_choice: and to go
  chosen_spanish: y para habitar allí
  alternatives_spanish:
  - y entran
  - y van
  lexicon: HALOT
  rationale: En esta cláusula, el verbo se integra con el infinitivo de finalidad del final de la frase. «Y para habitar allí» comunica la secuencia condicional completa en español fluido, manteniendo el doble movimiento del hebreo hacia llegar y residir.
- source_word: לָגוּר שָׁם
  english_pob_choice: to sojourn there
  chosen_spanish: para habitar allí
  alternatives_spanish:
  - para morar allí como extranjeros
  - para sojornar allí
  lexicon: HALOT
  rationale: גור expresa residir temporalmente; en español, «habitar allí» es claro y digno. Se evita «sojornar», demasiado técnico, aunque la nota conserva la idea de residencia en tierra ajena.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la línea del proyecto exige su transliteración en el texto principal. «Yahvé» es la forma española establecida en esta serie y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La expresión idiomática de resolución «poner el rostro»
  english_pob_reading: If you are determined
  chosen_spanish_reading: Si de veras ponen su rostro
  alternative_spanish_readings:
  - Si están determinados
  - Si fijan su rostro
  rationale: La POB inglesa documenta el hebraísmo «set your faces». El español conserva la imagen para no borrar la metáfora, añadiendo solo una intensificación natural («de veras») para reflejar el valor enfático de la construcción.
  doctrine_reference: HALOT / uso idiomático profético
- issue: «Yahvé de los ejércitos» como título divino
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé Sabaot
  rationale: La fórmula profética exige mantener el título sin domesticarlo. «Ejércitos» preserva el alcance militar y cósmico de צְבָאוֹת sin desplazarlo por una paráfrasis interpretativa.
  doctrine_reference: HALOT / título divino
translation_notes:
  revision_awareness: La versión inglesa fue revisada para añadir el segundo infinitivo («to go to sojourn there»), haciendo más explícita la estructura hebrea. La redacción española refleja esa duplicación funcional con «para entrar en Egipto y para habitar allí», evitando reducirla a un solo movimiento y manteniendo la progresión condicional completa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה y «Dios» para אֱלֹהִים, conforme al criterio del proyecto.
  - «Remanente» se usa para שְׁאֵרִית, coherente con el uso profético establecido.
  - Se conserva la imagen de «poner el rostro» porque la ambigüedad idiomática es significativa y está documentada en el audit trail.
  - «Habitar allí» se eligió por claridad y dignidad en español; no implica necesariamente permanencia absoluta, por lo que sigue siendo compatible con el matiz de residencia temporal del verbo גור.
