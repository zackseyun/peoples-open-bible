translation:
  language: es
  text: Aun hasta la vejez y las canas[a], oh Dios, no me abandones, hasta que anuncie tu brazo[b] a la generación venidera[c], tu poder a todos los que han de venir[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta la ancianidad y las canas». La expresión hebrea combina edad avanzada con cabello canoso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu fuerza» o «tu poder» para «tu brazo»; el hebreo conserva la metáfora del brazo como poder activo de Dios.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a la siguiente generación» o «a la generación que viene».'
    reason: alternative_reading
  - marker: d
    text: 'O: «a todo el que haya de venir» o «a todas las generaciones futuras».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Even
  chosen_spanish: Y aun
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: El hebreo añade una continuación enfática; «y aun» conserva ese matiz sin sonar forzado en español.
- source_word: עַד זִקְנָה וְשֵׂיבָה
  english_pob_choice: Even to old age and gray hairs
  chosen_spanish: hasta la vejez y las canas
  alternatives_spanish:
  - hasta la ancianidad y las canas
  - hasta la vejez y el cabello cano
  lexicon: HALOT
  rationale: La pareja hebrea describe edad avanzada con la imagen concreta de las canas. «Vejez y las canas» es natural en español y conserva la doble referencia.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: Es vocativo en oración; «oh Dios» refleja la apelación directa con registro reverente.
- source_word: אַֽל תַּעַזְבֵ֥נִי
  english_pob_choice: do not forsake me
  chosen_spanish: no me abandones
  alternatives_spanish:
  - no me dejes
  - no me desampares
  lexicon: HALOT
  rationale: עָזַב expresa abandonar/forsake. «Abandonar» es claro y fiel en español contemporáneo; «desamparar» sería más tradicional pero menos directo.
- source_word: זְרוֹעֲךָ
  english_pob_choice: your arm
  chosen_spanish: tu brazo
  alternatives_spanish:
  - tu brazo poderoso
  - tu fuerza
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. «Brazo» es el equivalente natural en español para esta imagen de poder activo.
- source_word: לְדוֹר
  english_pob_choice: to the next generation
  chosen_spanish: a la generación venidera
  alternatives_spanish:
  - a la siguiente generación
  - a la generación que viene
  lexicon: HALOT
  rationale: El sentido es prospectivo; «venidera» conserva el movimiento hacia el futuro y evita restringirlo demasiado.
- source_word: לְכָל יָבוֹא
  english_pob_choice: to everyone who is to come
  chosen_spanish: a todo el que haya de venir
  alternatives_spanish:
  - a todos los que han de venir
  - a toda futura generación
  lexicon: HALOT
  rationale: La construcción hebrea amplía el alcance más allá de una sola generación. «Todo el que haya de venir» mantiene la apertura colectiva y el tono solemne.
theological_decisions:
- issue: Preservar la metáfora de la fuerza divina en «tu brazo»
  english_pob_reading: 'Preserve the metaphor in the main text: ''your arm'''
  chosen_spanish_reading: Se conserva «tu brazo» en el texto principal
  alternative_spanish_readings:
  - tu fuerza
  - tu poder
  rationale: El hebreo presenta el poder eficaz de Dios mediante una imagen corporal. Mantenerla respeta la textura poética y no elimina una metáfora teológicamente significativa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Distinguir el destinatario generacional inicial del alcance más amplio
  english_pob_reading: Distinguish 'the next generation' and then broaden to 'everyone who is to come'
  chosen_spanish_reading: Se distingue «la generación venidera» y luego «todo el que haya de venir»
  alternative_spanish_readings:
  - a otra generación ... a todas las generaciones futuras
  - a la generación siguiente ... a todos los que vendrán
  rationale: El hebreo pasa de una generación concreta a un alcance más inclusivo. La traducción conserva esa progresión sin fusionar las dos frases.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'when I am old and gray' por 'to old age and gray hairs' para ajustarse más de cerca al hebreo. En español se reflejó con una frase nominal equivalente, «hasta la vejez y las canas», manteniendo el paralelismo con el vocativo y con las dos cláusulas finales de testimonio.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en vocativo, conforme al estándar del proyecto.
  - Se mantiene la metáfora «brazo» en lugar de explicarla como poder, porque el contexto poético la sostiene y la POB inglesa la preserva.
  - «Generation venidera» y «todo el que haya de venir» distinguen el avance del texto de una generación específica a un alcance más amplio.
  - Se prefirió «abandonar» para עזב por su claridad y fidelidad semántica en español actual.
