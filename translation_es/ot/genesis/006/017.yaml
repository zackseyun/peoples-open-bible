translation:
  language: es
  text: Y yo—he aquí[a]— estoy trayendo el diluvio de aguas sobre la tierra para destruir toda carne en la cual hay aliento[b] de vida, todo lo que hay debajo de los cielos. Todo lo que está sobre la tierra morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por mi parte». El hebreo añade un pronombre enfático que contrasta la acción de Yahvé con el resto del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «espíritu de vida». El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu»; aquí el sentido contextual favorece «aliento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Por mi parte
  - Y en cuanto a mí
  lexicon: HALOT
  rationale: La construcción con pronombre independiente marca contraste enfático del hablante. «Y yo» conserva esa fuerza discursiva sin añadir explicaciones que el hebreo no da.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí, estoy
  alternatives_spanish:
  - miren, estoy
  - aquí estoy
  lexicon: HALOT
  rationale: La partícula intensifica la inmediatez y solemnidad. «He aquí, estoy» mantiene el énfasis retórico en un español digno y natural.
- source_word: מֵבִיא
  english_pob_choice: am bringing
  chosen_spanish: estoy trayendo
  alternatives_spanish:
  - voy a traer
  - traigo
  lexicon: HALOT
  rationale: El participio expresa una acción presentada como en curso o inminente. «Estoy trayendo» refleja bien ese valor sin forzar una perífrasis más interpretativa.
- source_word: הַמַּבּוּל מַיִם
  english_pob_choice: the flood of waters
  chosen_spanish: el diluvio de aguas
  alternatives_spanish:
  - el diluvio de agua
  - las aguas del diluvio
  lexicon: HALOT
  rationale: «Diluvio» conserva el término técnico bíblico; «de aguas» refleja de cerca la construcción hebrea y el carácter destructivo del agente. Se evita «agua» singular porque el plural hebreo contribuye al matiz del juicio desbordado.
- source_word: עַל הָאָרֶץ
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra entera
  - sobre el mundo
  lexicon: HALOT
  rationale: «Tierra» comunica el alcance global del relato en un español claro. «Sobre» reproduce adecuadamente el valor de la preposición sin calco pesado.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arruinar
  - para exterminar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Destruir» es la equivalencia directa y sobria para el juicio anunciado.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todo ser viviente
  - toda criatura
  lexicon: HALOT
  rationale: Se preserva la expresión bíblica «carne» por su fuerza semítica y su amplitud de referencia. «Toda carne» evita suavizar el alcance del texto.
- source_word: אֲשֶׁר בּוֹ רוּחַ חַיִּים
  english_pob_choice: in which is the breath of life
  chosen_spanish: en la cual hay aliento de vida
  alternatives_spanish:
  - en la cual está el espíritu de vida
  - que tiene aliento de vida
  lexicon: HALOT
  rationale: En este contexto, רוּחַ se entiende mejor como el principio vital de los seres animados; por eso «aliento de vida» sigue de cerca el sentido contextual y la relación con la creación, sin cerrar la ambigüedad de manera innecesaria.
- source_word: מִתַּחַת הַשָּׁמָיִם
  english_pob_choice: from under heaven
  chosen_spanish: de debajo de los cielos
  alternatives_spanish:
  - desde debajo del cielo
  - bajo el cielo
  lexicon: HALOT
  rationale: La expresión idiomática denota el ámbito total bajo el firmamento. «De debajo de los cielos» conserva la amplitud y mantiene un registro bíblico natural en español.
- source_word: כֹּל אֲשֶׁר בָּאָרֶץ
  english_pob_choice: Everything that is on the earth
  chosen_spanish: Todo lo que está sobre la tierra
  alternatives_spanish:
  - Todo lo que hay en la tierra
  - Todo ser que esté sobre la tierra
  lexicon: HALOT
  rationale: La frase final resume el alcance universal del juicio. «Todo lo que está sobre la tierra» reproduce con claridad el valor totalizador del hebreo.
- source_word: יִגְוָע
  english_pob_choice: will perish
  chosen_spanish: morirá
  alternatives_spanish:
  - perecerá
  - expirará
  lexicon: HALOT
  rationale: El verbo puede denotar morir o exhalar el último aliento. Aquí, por el paralelismo con el juicio de muerte universal, «morirá» es más directo y fiel que una paráfrasis más abstracta.
theological_decisions:
- issue: Sentido de רוּחַ חַיִּים
  english_pob_reading: breath of life
  chosen_spanish_reading: aliento de vida
  alternative_spanish_readings:
  - espíritu de vida
  - aliento vital
  rationale: En el contexto del diluvio, la referencia apunta al principio vital que anima a los seres vivientes. «Aliento de vida» preserva la ambigüedad real de רוּחַ entre «aliento», «viento» y «espíritu», pero en español sugiere con precisión la vida animada sin imponer una lectura antropológica más desarrollada de la que el texto exige.
  doctrine_reference: Translation philosophy §3 (preservar tensiones teológicas cuando la ambigüedad es genuina)
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, que pasó de «floodwaters» a «flood of waters» para reflejar más literalmente el hebreo. En español se conserva esa cercanía con «el diluvio de aguas», manteniendo el tono formal y el alcance universal del juicio. También se retiene la alternativa lexical de רוּחַ mediante nota, en consonancia con el aparato inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto principal solo cuando el tetragrámaton aparece explícitamente; aquí el versículo no lo contiene.
  - «Carne» se conserva como término bíblico amplio, sin reemplazarlo por «seres vivientes».
  - «Aliento de vida» se usa por la fuerza contextual de רוּחַ, pero la nota mantiene abierta la alternativa «espíritu de vida».
  - «Cielos» traduce el plural hebreo de manera natural en español bíblico, sin perder el valor idiomático de totalidad.
