revisions:
- from: Y sus heridos llenarán sus barrancos y sus wadis[a], y un río desbordado se llenará con sus muertos;
  to: Y sus heridos llenarán sus barrancos y los wadis[a], y un río desbordante se llenará de sus muertos;
