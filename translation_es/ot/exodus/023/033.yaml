revisions:
- from: No habitarán en tu tierra[a], no sea que te hagan pecar contra mí; porque si sirves a sus dioses[b], sin duda te será una trampa[c].
  to: No habitarán en tu tierra[a], no sea que te hagan pecar contra mí; porque si sirves a sus dioses[b], te será un lazo[c].
  rationale: 'Se conserva la estructura y el sentido del borrador, pero se ajusta la última cláusula para reflejar mejor la metáfora de מוֹקֵשׁ y mejorar la naturalidad del español bíblico: «te será un lazo» es más fiel y más idiomático que «sin duda te será una trampa».'
