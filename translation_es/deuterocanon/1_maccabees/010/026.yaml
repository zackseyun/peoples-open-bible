translation:
  language: es
  text: Ya que han guardado fidelidad con nosotros en los tratados[a], y han permanecido en nuestra amistad y no se han unido a nuestros enemigos, hemos oído[b], y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han guardado fidelidad/lealtad con nosotros en los tratados». En este contexto diplomático, πίστις puede abarcar la idea de fidelidad o lealtad.
    reason: lexical_alternative
  - marker: b
    text: El texto griego transmitido aquí termina con «hemos oído, y», y la oración continúa en el versículo siguiente; por eso este versículo queda incompleto.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: Since
  chosen_spanish: Ya que
  alternatives_spanish:
  - puesto que
  - porque
  lexicon: LSJ
  rationale: Introduce la base de la afirmación siguiente. «Ya que» expresa bien la relación causal o justificativa en español sin volver la frase rígida.
- source_word: συνετηρήσατε
  english_pob_choice: you have kept
  chosen_spanish: han guardado
  alternatives_spanish:
  - han mantenido
  - han observado
  lexicon: LSJ
  rationale: El compuesto comunica conservar o mantener con firmeza. «Han guardado» funciona de forma natural con «fidelidad» y preserva la idea de continuidad fiel.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fidelidad
  alternatives_spanish:
  - fe
  - lealtad
  lexicon: LSJ
  rationale: En este contexto diplomático, πίστις tiene el sentido de fidelidad o lealtad en relaciones pactadas. En español, «fidelidad» evita una lectura demasiado religiosa de «fe» y recoge mejor el matiz del texto griego.
- source_word: πρὸς ἡμᾶς
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - hacia nosotros
  - para con nosotros
  lexicon: LSJ
  rationale: Con πίστιν, el español natural es «con nosotros», que expresa la relación bilateral de lealtad del mismo modo que el inglés POB opta por una formulación idiomática.
- source_word: συνθήκας
  english_pob_choice: in the treaties
  chosen_spanish: en los tratados
  alternatives_spanish:
  - en los acuerdos
  - en las alianzas
  lexicon: LSJ
  rationale: El sustantivo designa acuerdos políticos formales entre partes. «Tratados» es la equivalencia más precisa y transparente en español para este contexto.
- source_word: ἐνεμείνατε
  english_pob_choice: have remained
  chosen_spanish: han permanecido
  alternatives_spanish:
  - han seguido
  - han persistido
  lexicon: LSJ
  rationale: El verbo subraya permanecer firmes en una relación o postura. «Han permanecido» conserva esa estabilidad relacional sin sobreinterpretar.
- source_word: τῇ φιλία ἡμῶν
  english_pob_choice: in our friendship
  chosen_spanish: en nuestra amistad
  alternatives_spanish:
  - en nuestra alianza
  - en amistad con nosotros
  lexicon: LSJ
  rationale: φιλία puede significar amistad y, en contexto político, alianza. Se mantiene «amistad» para seguir de cerca el griego, sin borrar el trasfondo diplomático.
- source_word: οὐ προσεχωρήσατε
  english_pob_choice: have not joined
  chosen_spanish: no se han unido
  alternatives_spanish:
  - no se han pasado
  - no se han alineado
  lexicon: LSJ
  rationale: El verbo sugiere adherirse a otro bando o sumarse a él. «No se han unido» transmite bien esa idea de no pasarse al campo contrario.
- source_word: τοῖς ἐχθροῖς ἡμῶν
  english_pob_choice: our enemies
  chosen_spanish: a nuestros enemigos
  alternatives_spanish:
  - con nuestros enemigos
  - del lado de nuestros enemigos
  lexicon: LSJ
  rationale: La construcción con el verbo de unirse pide en español la preposición «a». Mantiene el sentido directo y la referencia al grupo hostil.
- source_word: ἠκούσαμεν
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - hemos escuchado
  - hemos sabido
  lexicon: LSJ
  rationale: El aoristo epistolar puede expresarse en pasado o perfecto; «hemos oído» preserva la conexión con la respuesta actual y sigue de cerca la elección inglesa.
theological_decisions:
- issue: Sentido de πίστις en un contexto político-diplomático
  english_pob_reading: faith
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - fe
  - lealtad
  rationale: El pasaje no trata de fe religiosa sino de constancia en pactos. La decisión española prioriza el valor relacional y político de πίστις, que aquí se entiende mejor como fidelidad o lealtad.
  doctrine_reference: 'DOCTRINE.md: contested terms — πίστις / fidelity-loyalty range'
- issue: Final incompleto del versículo
  english_pob_reading: we have heard, and
  chosen_spanish_reading: hemos oído, y
  alternative_spanish_readings:
  - hemos escuchado, y
  - hemos sabido, y
  rationale: El texto griego transmitido termina de forma abierta en este versículo, por lo que la traducción debe conservar la incompletitud sintáctica sin cerrarla artificialmente.
  doctrine_reference: Textual note on transmitted ending
translation_notes:
  revision_awareness: Se ha revisado el pasaje teniendo en cuenta el audit trail inglés y la observación de revisión externa. La traducción mantiene la estructura causal, el valor diplomático de πίστις/φιλία y el final abierto del testimonio transmitido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se conserva el matiz diplomático de «tratados» y «amistad» sin convertirlos en lenguaje eclesiástico.
  - «Fidelidad» se eligió para πίστις por su adecuación contextual; se deja constancia de las alternativas «fe» y «lealtad».
  - La frase final permanece incompleta para respetar el texto transmitido.
