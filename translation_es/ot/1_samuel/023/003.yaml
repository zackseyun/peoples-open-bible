translation:
  language: es
  text: 'Pero los hombres de David le dijeron[a]: «Mira, aquí en Judá estamos atemorizados; ¿cuánto más, entonces, si vamos a Queila contra las líneas de batalla de los filisteos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «déjanos soltar una objeción: “con mayor razón si vamos a Queila contra las filas de los filisteos”». El hebreo usa un modismo de menor a mayor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Entonces ... dijeron
  lexicon: WLC/halot
  rationale: El waw narrativo avanza la escena; «pero» conserva mejor en español el matiz de contraste con la propuesta anterior, siguiendo la lectura discursiva del POB en inglés.
- source_word: אַנְשֵׁי דָוִד
  english_pob_choice: David’s men
  chosen_spanish: los hombres de David
  alternatives_spanish:
  - los varones de David
  - los hombres pertenecientes a David
  lexicon: WLC/halot
  rationale: La construcción posesiva se vierte de forma natural en español sin perder la pertenencia al grupo de David.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: WLC/halot
  rationale: El clítico dativo español expresa con naturalidad el complemento indirecto referido a David.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: WLC/halot
  rationale: «Mira» conserva la fuerza deíctica y apelativa de הִנֵּה en un registro contemporáneo y dignificado.
- source_word: אֲנַחְנוּ פֹה בִּיהוּדָה
  english_pob_choice: we are afraid here in Judah
  chosen_spanish: aquí en Judá estamos atemorizados
  alternatives_spanish:
  - aquí en Judá tenemos miedo
  - estamos aquí en Judá, atemorizados
  lexicon: WLC/halot
  rationale: Se mantiene la localización «aquí en Judá» y se traduce יְרֵאִים con un término de fuerza semejante a la del inglés POB; «atemorizados» suena más intenso que «con miedo» y conserva el tono situacional.
- source_word: יְרֵאִים
  english_pob_choice: afraid
  chosen_spanish: atemorizados
  alternatives_spanish:
  - con miedo
  - temerosos
  lexicon: WLC/halot
  rationale: El adjetivo/predicativo expresa el estado de temor real de la situación; «temerosos» es posible, pero «atemorizados» comunica mejor la intensidad contextual sin introducir una paráfrasis ajena.
- source_word: וְאַף כִּי
  english_pob_choice: how much more, then, if
  chosen_spanish: ¿cuánto más, entonces, si
  alternatives_spanish:
  - ¡cuánto más si
  - mucho más si
  lexicon: WLC/halot
  rationale: Se explicita en español el argumento de menor a mayor que el hebreo idiomático marca; la versión mantiene la lógica comparativa del POB sin perder naturalidad.
- source_word: נֵלֵךְ קְעִלָה
  english_pob_choice: we go to Keilah
  chosen_spanish: vamos a Queila
  alternatives_spanish:
  - iremos a Queila
  - nos dirigimos a Queila
  lexicon: WLC/halot
  rationale: El movimiento hacia un destino se expresa con «vamos a»; se usa la transliteración estándar «Queila» para el topónimo.
- source_word: אֶל מַעַרְכוֹת פְּלִשְׁתִּים
  english_pob_choice: against the battle lines of the Philistines
  chosen_spanish: contra las líneas de batalla de los filisteos
  alternatives_spanish:
  - contra las formaciones de batalla de los filisteos
  - contra los frentes de batalla de los filisteos
  lexicon: WLC/halot
  rationale: מַעַרְכוֹת se refiere al arreglo militar; «líneas de batalla» preserva el sentido bélico concreto y corresponde al énfasis del POB en la confrontación.
theological_decisions:
- issue: Expresión del argumento de menor a mayor en el hebreo idiomático
  english_pob_reading: The Hebrew idiom expresses an argument from lesser to greater.
  chosen_spanish_reading: La frase hebrea expresa un argumento de menor a mayor.
  alternative_spanish_readings:
  - el hebreo expresa la idea de «si aquí tememos, con mayor razón allá»
  - se trata de un «cuánto más» idiomático
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión hermenéutica importante: conviene dejar explícito que la frase no es sólo temporal o locativa, sino una construcción argumentativa que intensifica la objeción.'
  doctrine_reference: Retórica bíblica / interpretación del discurso hebreo
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente indicado como sin cambios; no se detectaron revisiones aplicadas adicionales, y la versión española se alinea con el alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se preservó el tono narrativo con contraste inicial («Pero») conforme a la función discursiva del waw en el contexto.
  - 'Se evitó «SEÑOR» y se mantuvo una transliteración coherente del topónimo: «Queila».'
  - La nota al pie marca el modismo hebreo sin ocultar la lectura principal del texto en el cuerpo.
