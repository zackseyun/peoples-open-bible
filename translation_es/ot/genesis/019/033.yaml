translation:
  language: es
  text: Así que esa noche le dieron vino a su padre, y la primogénita entró y se acostó con su padre. Él no supo cuándo se acostó ni cuándo se levantó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «él no supo en su acostarse ni en su levantarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּשְׁקֶיןָ
  english_pob_choice: they gave ... wine to drink
  chosen_spanish: les dieron vino a beber
  alternatives_spanish:
  - hicieron beber a su padre vino
  - le dieron vino de beber a su padre
  lexicon: HALOT
  rationale: El causativo de שׁקה expresa hacer beber o dar a beber. En español, «dar vino a beber» conserva el sentido causativo de manera natural y evita una calca pesada.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - licor
  lexicon: HALOT
  rationale: «Vino» es la equivalencia directa y normal para יין en este contexto narrativo.
- source_word: בַּלַּיְלָה הוּא
  english_pob_choice: that night
  chosen_spanish: esa noche
  alternatives_spanish:
  - aquella noche
  - en esa noche
  lexicon: HALOT
  rationale: La expresión temporal definida se entiende de forma natural en español como «esa noche».
- source_word: הַבְּכִירָה
  english_pob_choice: the firstborn
  chosen_spanish: la primogénita
  alternatives_spanish:
  - la mayor
  - la primera nacida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la primogénita», con énfasis en el orden de nacimiento. «Primogénita» preserva ese matiz mejor que «la mayor».
- source_word: וַתָּבֹא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue adentro
  - vino
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo de entrada se puede expresar con «entró», que es natural y suficientemente cercano al hebreo sin perder la implicación narrativa.
- source_word: וַתִּשְׁכַּב אֶת
  english_pob_choice: lay with
  chosen_spanish: se acostó con
  alternatives_spanish:
  - se acostó junto a
  - durmió con
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual estándar. «Se acostó con» lo reproduce con claridad en español sin volverlo demasiado coloquial; «durmió con» podría sonar más ambiguo sobre el matiz del acto.
- source_word: וְלֹא יָדַע
  english_pob_choice: He did not know
  chosen_spanish: Él no supo
  alternatives_spanish:
  - Él no sabía
  - Él no se enteró
  lexicon: HALOT
  rationale: יָדַע aquí expresa desconocimiento/conciencia. «No supo» es una forma breve y digna en español; mantiene la idea de falta de conocimiento sin introducir una explicación no presente en el hebreo.
- source_word: בְּשִׁכְבָהּ
  english_pob_choice: when she lay down
  chosen_spanish: cuándo ella se acostó
  alternatives_spanish:
  - al acostarse ella
  - en su acostarse
  lexicon: HALOT
  rationale: La construcción preposicional marca circunstancia temporal. En español, la coordinación con «cuándo» ayuda a reflejar el valor temporal del hebreo en paralelo con la cláusula siguiente.
- source_word: וּבְקוּמָהּ
  english_pob_choice: when she arose
  chosen_spanish: ni cuándo se levantó
  alternatives_spanish:
  - ni en su levantarse
  - ni cuando se puso de pie
  lexicon: HALOT
  rationale: La paridad con la cláusula anterior se conserva con «ni cuándo se levantó». «Levantarse» es natural en español y reproduce la oposición entre acostarse y levantarse.
theological_decisions:
- issue: La referencia relacional y moral del acto incestuoso debe quedar explícita sin atenuación.
  english_pob_reading: the firstborn went in and lay with her father
  chosen_spanish_reading: la primogénita entró y se acostó con su padre
  alternative_spanish_readings:
  - la primogénita entró y durmió con su padre
  - la mayor entró y se acostó con su padre
  rationale: El pasaje narra un acto sexual ilícito; «se acostó con su padre» conserva la fuerza eufemística del hebreo sin suavizar el hecho. Se evita una formulación más débil o más ambigua.
  doctrine_reference: Génesis 19:30-36; levítico 18:7-8 como trasfondo legal de parentesco prohibido
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa: no hubo cambios aplicados y el consenso de revisión fue de alta concordancia. La redacción española sigue de cerca las decisiones léxicas auditadas del inglés POB, especialmente en los verbos causativos, el eufemismo sexual y la cláusula temporal final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el nombre divino.
  - «Primogénita» mantiene el valor de orden de nacimiento de הַבְּכִירָה.
  - La nota al pie reproduce la alternativa literal registrada en el audit trail inglés, adaptándola a un español idiomático.
  - Se evita introducir «sabía» o «se dio cuenta»; el hebreo enfatiza desconocimiento general, no percepción puntual.
