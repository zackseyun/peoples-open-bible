translation:
  language: es
  text: Porque tan altos están los cielos sobre la tierra, tan grande es su amor fiel[a] hacia los que le temen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su misericordia' o 'su lealtad de pacto'; el hebreo חֶסֶד abarca amor leal y fiel dentro de una relación de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa del versículo anterior; 'Porque' conserva con naturalidad ese valor causal/explanatorio en español.
- source_word: כִגְבֹהַּ
  english_pob_choice: as high as
  chosen_spanish: como ... son más altos
  alternatives_spanish:
  - tan alto como
  - a la altura de
  lexicon: HALOT
  rationale: La comparación de grado se expresa de forma idiomática en español con 'como ... son más altos', manteniendo el paralelo con la altura sin volverlo rígidamente literal.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos del cielo
  - el cielo
  lexicon: HALOT
  rationale: '''Los cielos'' preserva el plural hebreo y el registro poético; ''el cielo'' perdería parte de esa fuerza.'
- source_word: הָאָרֶץ
  english_pob_choice: above the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el suelo
  lexicon: HALOT
  rationale: En español, la comparación vertical se entiende naturalmente con 'más altos que la tierra'; la relación espacial implícita en el hebreo queda clara por la estructura comparativa.
- source_word: גָּבַר
  english_pob_choice: is ... great
  chosen_spanish: es de grande
  alternatives_spanish:
  - es poderoso
  - prevalece
  lexicon: HALOT
  rationale: El verbo expresa fuerza o superioridad; aquí el paralelo poético con la distancia entre cielos y tierra favorece una formulación de magnitud ('es de grande') en lugar de una idea de combate o victoria.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su misericordia
  - su lealtad de pacto
  - su amor fiel
  lexicon: HALOT
  rationale: חֶסֶד combina amor leal, fiel y misericordioso. 'Amor constante' comunica bien en español la continuidad y fidelidad del término sin reducirlo a una sola faceta.
- source_word: עַל
  english_pob_choice: toward
  chosen_spanish: para con
  alternatives_spanish:
  - hacia
  - con
  lexicon: HALOT
  rationale: Aquí la preposición marca orientación relacional del חסד; 'para con' resulta natural y conserva el sentido de dirección hacia las personas temerosas de Dios.
- source_word: יְרֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que lo reverencian
  - sus temerosos
  lexicon: HALOT
  rationale: La expresión participial designa a las personas caracterizadas por temer a Dios. 'Los que le temen' es directo, fiel y bíblicamente reconocible en español.
theological_decisions:
- issue: Cómo traducir חֶסֶד sin reducir su carga de pacto ni su afecto
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su amor constante
  alternative_spanish_readings:
  - su misericordia
  - su lealtad de pacto
  - su amor fiel
  rationale: La POB inglesa opta por 'steadfast love' para mantener juntas la fidelidad de pacto y el afecto. 'Amor constante' conserva esa tensión sin escoger solo 'misericordia' ni volverlo un tecnicismo más pesado.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la decisión auditada en la POB inglesa: se mantiene la comparación de altura, el paralelismo poético y la elección semántica amplia de חֶסֶד sin introducir cambios doctrinales ni estilísticos no respaldados por la fuente.'
  spanish_consistency_notes:
  - Se preserva el plural poético 'los cielos' para שָׁמַיִם.
  - '''Le temen'' mantiene el sentido reverencial del participio sin suavizarlo a una mera ''respeta''.'
  - La nota de pie de página recoge las alternativas semánticas relevantes para חֶסֶד, como en la POB inglesa.
