translation:
  language: es
  text: Ahora, el nombre del hombre israelita[a], que fue muerto, que fue muerto junto con la mujer madianita, era Zimri hijo de Salu[b], jefe de una casa paterna entre los simeonitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «el hombre israelita que fue muerto, que fue muerto con la madianita». El hebreo repite el verbo para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Casa paterna» designa una unidad de linaje o clan patrilineal dentro de la tribu.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/שֵׁם
  english_pob_choice: Now the name
  chosen_spanish: Ahora, el nombre
  alternatives_spanish:
  - Y el nombre
  - Ahora bien, el nombre
  lexicon: HALOT
  rationale: La partícula inicial introduce una aclaración identificadora tras el relato previo. «Ahora» conserva el valor discursivo de enlace sin sonar artificial en español.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the Israelite man
  chosen_spanish: el hombre israelita
  alternatives_spanish:
  - el israelita
  - el hombre de Israel
  lexicon: HALOT
  rationale: «Hombre israelita» preserva la referencia masculina singular explícita de אִישׁ y el gentilicio nacional, con español natural y claro.
- source_word: הַמֻּכֶּה ... אֲשֶׁר הֻכָּה
  english_pob_choice: who was struck down, who was struck down
  chosen_spanish: que fue derribado, que fue derribado
  alternatives_spanish:
  - que fue golpeado, que fue golpeado
  - que fue muerto, que fue muerto
  lexicon: HALOT
  rationale: Se conserva la repetición deliberada del hebreo para mantener el énfasis. «Derribado» comunica la violencia del pasaje sin imponer un matiz demasiado técnico o interpretativo.
- source_word: אֶת הַמִּדְיָנִית
  english_pob_choice: with the Midianite woman
  chosen_spanish: junto con la mujer madianita
  alternatives_spanish:
  - con la mujer madianita
  - al lado de la mujer madianita
  lexicon: HALOT
  rationale: Aquí אֶת funciona idiomáticamente con sentido de acompañamiento. «Junto con» expresa bien que ambos fueron alcanzados en el mismo acto. «Mujer» se explicita por el femenino del adjetivo y el contexto narrativo.
- source_word: זִמְרִי בֶּן סָלוּא
  english_pob_choice: Zimri son of Salu
  chosen_spanish: Zimri hijo de Salu
  alternatives_spanish:
  - Zimri, hijo de Salu
  - Zimri, el hijo de Salu
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. «Hijo de» es la forma española más natural para la filiación y mantiene el valor identificador del hebreo.
- source_word: נְשִׂיא
  english_pob_choice: a leader
  chosen_spanish: príncipe
  alternatives_spanish:
  - líder
  - jefe
  - caudillo
  lexicon: HALOT
  rationale: Aunque «líder» es posible, «príncipe» refleja con más precisión el rango elevado de נְשִׂיא en muchas ocurrencias bíblicas y preserva la dignidad del cargo. No se entiende en sentido monárquico, sino como designación de un principal/representante.
- source_word: בֵית אָב
  english_pob_choice: a father's house
  chosen_spanish: de una casa paterna
  alternatives_spanish:
  - de una casa de padre
  - de un linaje paterno
  - de una familia paterna
  lexicon: HALOT
  rationale: «Casa paterna» mantiene la estructura técnica del hebreo para una unidad de clan patrilineal. Es más transparente que reducirlo a «familia».
- source_word: לַשִּׁמְעֹנִי
  english_pob_choice: among the Simeonites
  chosen_spanish: entre los simeonitas
  alternatives_spanish:
  - de los simeonitas
  - perteneciente a los simeonitas
  lexicon: HALOT
  rationale: «Entre» conserva la idea de pertenencia dentro del conjunto tribal, como en el inglés POB. «Simeonitas» sigue la forma gentilicia habitual en español bíblico.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la auditoría inglesa; la principal decisión mantenida en español es conservar la repetición enfática del verbo hebreo y expresar la relación con la madianita de manera idiomática. No se detectaron revisiones textuales sustanciales que alteren el sentido.
  spanish_consistency_notes:
  - 'Se conservan los nombres propios sin traducción: Zimri, Salu y los simeonitas.'
  - «Derribado» se usa de forma consistente para reproducir נכה sin suavizar el matiz violento.
  - «Casa paterna» mantiene la terminología social del hebreo sin sustituirla por un término sociológico más moderno.
  - Se evita «SEÑOR» u այլ sustituciones no pertinentes porque el versículo no contiene el Tetragrámaton.
