translation:
  language: es
  text: ¡Grita en voz alta y lanza gritos de júbilo[a], habitante de Sion[b], porque grande en medio de ti es el Santo de Israel!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grita y canta de júbilo». El segundo imperativo puede expresar canto jubiloso además de un grito de alegría.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «habitante de Sion», femenino singular, personificando a Sion como una mujer a la que se dirige directamente.'
    reason: cultural_note
lexical_decisions:
- source_word: צַהֲלִי
  english_pob_choice: Cry aloud
  chosen_spanish: ¡Grita en voz alta
  alternatives_spanish:
  - Exulta
  - Prorrumpe en gritos
  lexicon: HALOT
  rationale: El imperativo femenino singular expresa un clamor fuerte y audible. «Grita en voz alta» conserva el carácter vocal y enfático sin sonar arcaico ni debilitar la fuerza del verbo.
- source_word: וָרֹנִּי
  english_pob_choice: and shout for joy
  chosen_spanish: y da gritos de júbilo
  alternatives_spanish:
  - y canta
  - y alégrate
  lexicon: HALOT
  rationale: רנן puede implicar gritos jubilosos y, a veces, canto. «Da gritos de júbilo» mantiene el paralelismo con el primer imperativo y no reduce el alcance del hebreo a un simple «cantar».
- source_word: יוֹשֶׁבֶת צִיּוֹן
  english_pob_choice: inhabitant of Zion
  chosen_spanish: habitante de Sion
  alternatives_spanish:
  - hija de Sion
  - Sion que habitas
  lexicon: HALOT
  rationale: El hebreo usa un participio femenino singular que personifica a Sion como destinataria. «Habitante de Sion» preserva esa dirección singular y la personificación sin introducir una formulación distinta como «hija de Sion».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de los imperativos. «Porque» es natural en español y conserva la relación causal.
- source_word: גָדֹול
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  lexicon: HALOT
  rationale: El adjetivo califica al Santo de Israel. «Grande» es la equivalencia más directa y no restringe innecesariamente el sentido a solo poder.
- source_word: בְּקִרְבֵּךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - entre ti
  lexicon: HALOT
  rationale: La forma con sufijo femenino singular preserva la dirección a Sion personificada. «En medio de ti» reproduce la imagen espacial y suena natural en español bíblico contemporáneo.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de los israelitas
  - Israel, su Santo
  lexicon: HALOT
  rationale: Es un título divino isaiano fijo. «El Santo de Israel» es la forma transparente y reconocible en español, manteniendo el peso teológico del título.
theological_decisions:
- issue: Personificación femenina singular de Sion
  english_pob_reading: Retain singular direct address with 'inhabitant of Zion' and 'your midst'
  chosen_spanish_reading: Mantener el vocativo singular femenino con «habitante de Sion» y «de ti»
  alternative_spanish_readings:
  - 'Tratarlo como plural colectivo: «habitantes de Sion»'
  - Sustituir por «hija de Sion»
  rationale: El hebreo usa formas singulares femeninas y presenta a Sion como una mujer a la que se habla directamente. Conservar ese rasgo evita aplanar la poesía y mantiene la imagen profética original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4 and #6'
- issue: Título divino isaiano
  english_pob_reading: Render קְדוֹשׁ יִשְׂרָאֵל as 'the Holy One of Israel'
  chosen_spanish_reading: Traducir קְדוֹשׁ יִשְׂרָאֵל como «el Santo de Israel»
  alternative_spanish_readings:
  - «Israel, su Santo»
  - «el Santo de los israelitas»
  rationale: El título afirma la santidad de Yahvé en relación de pacto con Israel. La forma elegida es literal, estable y teológicamente transparente en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo de alta concordancia del control final: no hubo revisiones sustantivas en el pasaje base y la redacción resultante mantiene las decisiones léxicas y poéticas del audit trail inglés.'
  spanish_consistency_notes:
  - Se conserva la personificación de Sion en singular femenino mediante el vocativo «habitante de Sion» y los pronombres de segunda persona singular.
  - «Santo de Israel» se mantiene como título divino fijo, sin expandirlo ni reinterpretarlo.
  - La elección de «gritos de júbilo» refleja la posible amplitud de רנן sin reducirla exclusivamente a «cantar».
  - No se introduce «SEÑOR» como máscara del nombre divino, ya que el verso usa el título «Santo de Israel».
