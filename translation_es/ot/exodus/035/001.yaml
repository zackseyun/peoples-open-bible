    text: 'Hebreo: «los hijos de Israel», designación pactual para el pueblo de Israel; la expresión se refiere a toda la comunidad, no solo a varones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «palabras» / «asuntos».'
    reason: lexical_alternative
  revision_rationale: 'Se propone una reparación menor para hacer más natural y transparente la expresión de לַעֲשֹׂת אֹתָם en español: «ha mandado que se hagan» comunica mejor que se trata de cosas ordenadas para su ejecución. Se mantienen sin cambio las decisiones clave del proyecto: «Yahvé», «congregación» y «los hijos de Israel» con nota explicativa.'
