translation:
  language: es
  text: Pues ¿qué esperanza hay para el impío[a] cuando Dios acaba con él[b], cuando le quita la vida[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hipócrita». El término hebreo puede designar al irreverente, al impío o al hipócrita.
    reason: lexical_alternative
  - marker: b
    text: La cláusula es difícil; alternativamente, puede entenderse «cuando obtiene ganancia» o «aunque haya obtenido ganancia».
    reason: alternative_reading
  - marker: c
    text: O «le arranca el alma/vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְוַת
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: HALOT
  rationale: תִּקְוָה expresa aquello que se espera o en lo que se confía; «esperanza» es el equivalente natural y sobrio en español para la pregunta retórica del versículo.
- source_word: חָנֵף
  english_pob_choice: the godless
  chosen_spanish: el impío
  alternatives_spanish:
  - el hipócrita
  - el profano
  - el irreverente
  lexicon: HALOT
  rationale: En Job, חָנֵף puede abarcar al irreverente o sin Dios, no solo al hipócrita en sentido externo. «Impío» comunica bien esa falta de piedad/reverencia en español bíblico sin cerrar el matiz.
- source_word: יִבְצָע
  english_pob_choice: he cuts him off
  chosen_spanish: lo corta
  alternatives_spanish:
  - lo aparta
  - lo desarraiga
  - lo corta de golpe
  lexicon: HALOT
  rationale: La forma verbal es difícil y debatida. Siguiendo la lectura auditada del POB en inglés, el sentido se entiende como la acción de Dios de cortar a la persona; «lo corta» conserva la fuerza breve y el sujeto divino del contexto.
- source_word: יֵשֶׁל
  english_pob_choice: takes away
  chosen_spanish: le quita
  alternatives_spanish:
  - le arrebata
  - le retira
  - lo saca
  lexicon: HALOT
  rationale: El verbo apunta a remover o sacar la vida. «Le quita» es idiomático en español y mantiene la idea de la pérdida de la vida sin añadir precisión metafísica que el hebreo no exige aquí.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es el término poético singular para Dios en Job; «Dios» reproduce directamente ese valor en español.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: la vida
  alternatives_spanish:
  - su alma
  - su vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida de la persona. «Le quita la vida» expresa claramente el sentido y evita imponer una lectura técnica de «alma» que el versículo no subraya.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: Render as 'life' rather than 'soul'
  chosen_spanish_reading: Traducir como «la vida» y no como «el alma»
  alternative_spanish_readings:
  - su alma
  - su ser
  rationale: El versículo habla de Dios quitando la vida del hombre; no formula una tesis doctrinal sobre el alma. «La vida» conserva la tensión y el lenguaje del hebreo sin sobredeterminar la antropología.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
- issue: Sujeto implícito en la cláusula difícil de יִבְצָע
  english_pob_reading: '''when God cuts him off'''
  chosen_spanish_reading: 'Hacer explícito a Dios como sujeto: «cuando Dios lo corta»'
  alternative_spanish_readings:
  - cuando él corta
  - cuando corta su ganancia
  rationale: La revisión inglesa del POB favorece leer a Dios como sujeto de la acción. El español refleja esa decisión para evitar que el verbo parezca referirse a la ganancia del impío en vez de a su final bajo el juicio divino.
  doctrine_reference: Job 27:8 en el marco del juicio divino sobre el impío.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que corrigió la cláusula difícil de יִבְצָע para leer la acción de Dios sobre la persona, y se mantuvo la segunda cláusula como paralelo de quitar la vida. También se conservó la elección auditada de traducir נֶפֶשׁ como «vida» y no como «alma».
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלוֹהַּ, de acuerdo con el valor poético del hebreo.
  - Se prefirió «impío» por su amplitud semántica y su registro bíblico natural en español.
  - Se evitó «alma» en el texto principal para no resolver antropológicamente lo que el verso expresa de modo concreto como pérdida de la vida.
  - La puntuación conserva el tono retórico de la pregunta hebrea y del POB inglés.
