id: MRK.9.20
reference: Mark 9:20
source:
  edition: SBLGNT
  text: καὶ ἤνεγκαν αὐτὸν πρὸς αὐτόν. καὶ ἰδὼν αὐτὸν ⸂τὸ πνεῦμα εὐθὺς⸃ ⸀συνεσπάραξεν αὐτόν, καὶ πεσὼν ἐπὶ τῆς γῆς ἐκυλίετο ἀφρίζων.
translation:
  text: And they brought him to him[a]. And when the spirit saw him, it immediately convulsed him, and he fell on the ground and rolled about[b], foaming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unclean spirit'; the broader context identifies the spirit as unclean, but this verse itself says simply 'the spirit.'
    reason: alternative_reading
  - marker: b
    text: Or 'threw him into convulsions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  chosen: brought
  alternatives:
  - carried
  lexicon: BDAG
  rationale: Aorist of φέρω here refers to bringing the boy to Jesus. 'Brought' is idiomatic and natural in English narrative style.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - before him
  - toward him
  lexicon: BDAG
  rationale: πρός with accusative commonly indicates movement toward a person. 'To him' is the clearest rendering in context, referring to Jesus.
- source_word: ἰδὼν αὐτὸν
  chosen: when the spirit saw him
  alternatives:
  - seeing him
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered temporally in smooth English: ''when the spirit saw him.'' The subject is explicitly τὸ πνεῦμα.'
- source_word: τὸ πνεῦμα
  chosen: the spirit
  alternatives:
  - the unclean spirit
  - the demon
  lexicon: BDAG
  rationale: The immediate Greek text has simply 'the spirit.' Although the broader context identifies it as an unclean spirit, adding 'unclean' or 'demon' here would import words not present in this verse.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς; 'immediately' preserves the adverb's force in contemporary English.
- source_word: συνεσπάραξεν
  chosen: convulsed
  alternatives:
  - threw into convulsions
  - shook violently
  - tore
  lexicon: BDAG
  rationale: The verb denotes causing severe spasms or convulsions. 'Convulsed him' is concise and medically/narratively clear. 'Tore' reflects older idiom but is misleading in modern English.
- source_word: πεσὼν ἐπὶ τῆς γῆς
  chosen: falling on the ground
  alternatives:
  - after he fell to the ground
  - and he fell on the ground
  lexicon: BDAG
  rationale: The participle πεσών is contemporaneous/sequential with the following action. 'Falling on the ground' preserves the participial flow without over-specifying sequence.
- source_word: ἐκυλίετο
  chosen: he rolled about
  alternatives:
  - he rolled around
  - he was rolling
  lexicon: BDAG
  rationale: The imperfect middle depicts ongoing motion. 'Rolled about' conveys repeated or continued movement naturally in English.
- source_word: ἀφρίζων
  chosen: foaming
  alternatives:
  - while foaming
  - foaming at the mouth
  lexicon: BDAG
  rationale: The participle describes the boy's condition during the seizure. 'Foaming' is faithful and concise; 'at the mouth' is likely implied but not explicit in the Greek.
