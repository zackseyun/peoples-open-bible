revisions:
- from: En ti han tratado con desprecio[a] al padre y a la madre; en medio de ti han oprimido al forastero[c][b]; en ti han defraudado al huérfano y a la viuda.
  to: En ti han tratado con desprecio[a] al padre y a la madre; en medio de ti han oprimido al forastero[c]; en ti han defraudado al que no tiene padre[b] y a la viuda.
  rationale: Se corrige la principal desalineación lexical con יָתוֹם, preservando en el texto el matiz específico de «fatherless» mediante «al que no tiene padre», una solución clara y fiel en español. También se reescribe la nota correspondiente para que la alternativa «huérfano» quede bien explicada y no contradiga la evidencia fuente ni el razonamiento documentado. El resto del verso puede mantenerse tal como está.
