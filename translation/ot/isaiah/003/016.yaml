id: ISA.3.16
reference: Isaiah 3:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֗ה יַ֚עַן כִּ֤י גָֽבְהוּ֙ בְּנ֣וֹת צִיּ֔וֹן וַ/תֵּלַ֨כְנָה֙ נטוות גָּר֔וֹן וּֽ/מְשַׂקְּר֖וֹת עֵינָ֑יִם הָל֤וֹךְ וְ/טָפֹף֙ תֵּלַ֔כְנָה וּ/בְ/רַגְלֵי/הֶ֖ם תְּעַכַּֽסְנָה׃
translation:
  text: 'And Yahweh said: Because the daughters of Zion are haughty[a], and walk with outstretched necks, glancing with their eyes, walking and mincing as they go, and making a jingling with their feet[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'making their anklets jingle with their feet.' The Hebrew verb likely refers to producing a tinkling or jingling sound, probably from ankle ornaments, though 'anklets' is not stated explicitly in this verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'casting seductive glances with their eyes.' The Hebrew expression is rare and may refer to flirtatious or deceptive eye movements.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַעַן כִּי
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The paired particles introduce the reason for the following judgment; 'Because' is natural modern English and preserves the causal force.
- source_word: גָבְהוּ
  chosen: are haughty
  alternatives:
  - are proud
  - have become arrogant
  lexicon: HALOT
  rationale: The verb literally relates to being high/exalted, but in this context describes arrogance. 'Haughty' fits the prophetic denunciation and pairs well with the following description of demeanor.
- source_word: בְּנוֹת צִיּוֹן
  chosen: the daughters of Zion
  alternatives:
  - the women of Zion
  - Zion's daughters
  lexicon: HALOT
  rationale: A formally close rendering that preserves the personified/covenantal expression rather than flattening it to merely 'women of Jerusalem.'
- source_word: נטוות גָּרוֹן
  chosen: with outstretched necks
  alternatives:
  - with stretched-out necks
  - with extended necks
  lexicon: HALOT
  rationale: The phrase depicts an affected, proud posture. 'Outstretched necks' is idiomatic enough in English while staying close to the Hebrew image.
- source_word: מְשַׂקְּרוֹת עֵינָיִם
  chosen: flirting with their eyes
  alternatives:
  - ogling with their eyes
  - making false/glancing eyes
  - wanton with their eyes
  lexicon: HALOT
  rationale: The expression is difficult and likely refers to seductive or deceptive eye movements. 'Flirting with their eyes' communicates the probable sense in readable modern English without overinterpreting.
- source_word: הָלוֹךְ וְטָפֹף תֵּלַכְנָה
  chosen: walking and mincing as they go
  alternatives:
  - they go along, step by step
  - walking with tiny steps
  - walking and tripping along
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action, and טפף suggests short, affected steps. 'Walking and mincing as they go' preserves both the iterative movement and the affected gait.
- source_word: וּבְרַגְלֵיהֶם תְּעַכַּסְנָה
  chosen: making a jingling with their feet
  alternatives:
  - making their anklets jingle with their feet
  - tinkling with their feet
  - making a clinking sound with their feet
  lexicon: HALOT
  rationale: The verb likely denotes producing an ornamental sound, probably from anklets, but the noun 'anklets' is not explicit in this verse. The chosen rendering keeps the audible effect in the text while leaving the specific instrument for a footnote.
