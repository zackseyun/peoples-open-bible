translation:
  language: es
  text: Porque el que volvía la mirada[a] era salvado no por lo que se veía[b], sino por ti, el Salvador de todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que se volvió», «el que se volvió atrás» o «el que retornó». El participio griego enfatiza el acto de volverse hacia la señal indicada.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «no por lo que era contemplado, sino por ti». El verso subraya que el objeto visible mismo no salvó; Dios sí.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιστραφεὶς
  english_pob_choice: the one who turned
  chosen_spanish: el que se volvió
  alternatives_spanish:
  - el que se volvió atrás
  - el que retornó
  - el que dio la vuelta
  lexicon: BDAG
  rationale: El participio aoristo pasivo funciona aquí como sustantivo. «Se volvió» conserva el movimiento de volverse hacia la señal designada sin cargarlo innecesariamente con el matiz de «arrepentirse»; «se volvió atrás» sería más direccional, pero en español suena más marcado de lo que el contexto exige.
- source_word: θεωρούμενον
  english_pob_choice: what was seen
  chosen_spanish: lo que se veía
  alternatives_spanish:
  - lo que era visto
  - la cosa vista
  - el objeto contemplado
  lexicon: BDAG
  rationale: El participio pasivo presente se refiere a la realidad visible como tal. «Lo que se veía» mantiene la pasividad y suena natural en español; evita introducir una precisión interpretativa mayor que el griego no exige.
- source_word: ἐσώζετο
  english_pob_choice: was saved
  chosen_spanish: fue salvado
  alternatives_spanish:
  - era salvado
  - fue liberado
  - era rescatado
  lexicon: BDAG
  rationale: El imperfecto pasivo de σῴζω expresa la acción salvadora en perspectiva narrativa o explicativa. «Fue salvado» es idiomático y conserva la fuerza teológica de la salvación; «era salvado» podría sonar más continuo de lo que el contexto requiere.
- source_word: σωτῆρα
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - rescatador
  lexicon: BDAG
  rationale: «Salvador» es el equivalente directo y teológicamente fuerte para el título aplicado a Dios. «Libertador» debilita el eco soteriológico del término griego.
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todos y de todo
  - de todas las cosas
  - de todos los hombres
  lexicon: BDAG
  rationale: El genitivo plural tiene amplitud comprehensiva. «De todos» preserva la amplitud sin restringirla a personas solamente ni forzar una tesis doctrinal adicional.
theological_decisions:
- issue: Relación entre la señal visible y el acto salvífico de Dios
  english_pob_reading: The visible object was not itself the means of salvation; God was.
  chosen_spanish_reading: Lo visible no fue el agente salvador; Dios fue el verdadero salvador.
  alternative_spanish_readings:
  - El objeto visible fue un medio por el cual Dios salvó
  - La cosa vista participó instrumentalmente en la salvación
  rationale: El griego contrapone explícitamente «no por lo visible... sino por ti». La traducción conserva que el objeto visible no es la causa última de la salvación, sin negar su papel narrativo como señal.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Alcance de πάντων en el título divino
  english_pob_reading: the Savior of all
  chosen_spanish_reading: el Salvador de todos
  alternative_spanish_readings:
  - el Salvador de todas las personas
  - el Salvador de todas las cosas
  rationale: «De todos» deja intacto el alcance amplio del griego y evita cerrar la frase hacia una formulación más doctrinalmente específica de lo que el texto dice.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del auditable en inglés: se prefirió una forma más natural para ἐπιστραφεὶς y una expresión menos forzada para τὸ θεωρούμενον, manteniendo la pasiva y el contraste causal con Dios como σωτήρ.'
  spanish_consistency_notes:
  - Se usa «Salvador» para σωτῆρα conforme al valor soteriológico del título.
  - «Se volvió» preserva el movimiento direccional sin convertirlo en una interpretación de arrepentimiento.
  - «Lo que se veía» conserva la voz pasiva y evita reificar en exceso el participio griego.
  - No se introduce «Cristo» ni «SEÑOR»; el texto habla de Dios como salvador universal.
  - La puntuación reproduce el contraste del original entre la causa negativa y la afirmación positiva.
