translation:
  language: es
  text: Pero si la mujer no quiere ir contigo[a], quedarás libre[b] de este juramento mío; solamente no debes hacer volver a mi hijo allá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «ir detrás de ti»; también puede entenderse «ir contigo» o «seguirte».
    reason: lexical_alternative
  - marker: b
    text: O «quedarás exento de este juramento mío».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En contexto introduce una condición con matiz adversativo respecto de la instrucción previa; «Pero si» conserva esa transición natural en español.
- source_word: תֹאבֶה
  english_pob_choice: is not willing
  chosen_spanish: no quiere
  alternatives_spanish:
  - no está dispuesta
  - no consiente
  - se rehúsa
  lexicon: HALOT
  rationale: אבה expresa voluntad/consentimiento. En español, «no quiere» comunica bien la falta de disposición sin añadir una dureza que el hebreo no exige.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: Aquí aún es una posible novia no identificada; «la mujer» es más preciso que «la esposa».
- source_word: לָלֶכֶת אַחֲרֶיךָ
  english_pob_choice: to go after you
  chosen_spanish: ir contigo
  alternatives_spanish:
  - ir tras de ti
  - seguirte
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «ir detrás de ti», pero en español «ir contigo» transmite de forma natural el contexto de viaje sin perder la relación de acompañamiento. Se preserva la alternativa con nota porque el inglés POB documentó la literalidad.
- source_word: וְנִקִּיתָ
  english_pob_choice: you will be free
  chosen_spanish: quedarás libre
  alternatives_spanish:
  - serás liberado
  - quedarás exento
  lexicon: HALOT
  rationale: El nifal de נקה aquí indica quedar exento o liberado de una obligación. «Quedarás libre» es idiomático y conserva la fuerza legal del pasaje.
- source_word: מִשְּׁבֻעָתִי זֹאת
  english_pob_choice: from this oath of mine
  chosen_spanish: de este juramento mío
  alternatives_spanish:
  - de este juramento mío
  - de mi juramento
  - de esta obligación jurada mía
  lexicon: HALOT
  rationale: Se mantiene el demostrativo «este» y el posesivo de primera persona. «Juramento» refleja bien שְׁבוּעָה en este contexto solemne; «obligación jurada» sería más explícito pero menos natural.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo que
  alternatives_spanish:
  - pero
  - solamente
  lexicon: HALOT
  rationale: La partícula limita la exención otorgada. «Solo que» funciona bien en español para introducir la restricción que sigue.
- source_word: אֶת בְּנִי לֹא תָשֵׁב שָׁמָּה
  english_pob_choice: you must not take my son back there
  chosen_spanish: no debes llevar a mi hijo de regreso allá
  alternatives_spanish:
  - no debes hacer regresar a mi hijo allá
  - no debes traer de vuelta a mi hijo allá
  lexicon: HALOT
  rationale: 'El hifil de שוב es causativo: «hacer volver/llevar de regreso». «Llevar a mi hijo de regreso allá» mantiene la idea de retorno al lugar de origen sin sonar forzado en español.'
translation_notes:
  revision_awareness: Se siguió de cerca el análisis auditado del texto hebreo y la traducción inglesa del POB. No hubo revisiones aplicadas en el pase más reciente; el pasaje fue confirmado como de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió un registro moderno y digno, evitando calcos excesivamente literales cuando el español natural podía expresar mejor el mismo contenido legal y narrativo.
  - 'Se conservó la fuerza condicional y restrictiva del hebreo: excepción de la obligación, seguida de la prohibición absoluta sobre el hijo.'
