review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: muerte de Nadab y Abiú ante Yahvé, la ofrenda de fuego extraño, la localización en el desierto de Sinaí y el servicio sacerdotal de Eleazar e Itamar en relación con Aarón. También respeta la política de traducir יְהוָה como ''Yahvé''. Sin embargo, hay un desajuste significativo en וּבָנִים לֹא הָיוּ לָהֶם, porque el hebreo especifica ''hijos/varones'' y el inglés POB lo fijó como ''sons''; ''no tuvieron hijos'' en español puede incluir hijas y diluye el punto sucesorio del texto.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico moderno. ''Fuego extraño'', ''delante de Yahvé'' y ''en presencia de Aarón su padre'' funcionan bien. No obstante, la nota [a] está mal formulada porque repite la misma opción (''fuego extraño'') en vez de ofrecer una verdadera alternativa; y la nota [b] está anclada a ''hijos'' pero mezcla dos asuntos distintos: una alternativa léxica para בָנִים y una observación sobre עַל־פְּנֵי אַהֲרֹן. Conviene precisar el texto principal y separar mejor el alcance de la nota.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> ''Yahvé'' correctamente; lenguaje sacerdotal aceptable con ''ejercieron el sacerdocio'', aunque ''sirvieron como sacerdotes'' sería más transparente. La principal excepción injustificada es בָנִים, donde debe conservarse el valor masculino específico como ''hijos varones'' o, mejor en este contexto, ''hijos''. Dado que en español ''hijos'' puede ser ambiguo, se requiere explicitación.'
  issues:
  - severity: medium
    issue: וּבָנִים לֹא הָיוּ לָהֶם se tradujo como 'no tuvieron hijos'
    rationale: El hebreo בָנִים significa específicamente 'hijos/varones', y el inglés POB auditado escogió 'sons' precisamente por el contexto de sucesión sacerdotal. En español, 'hijos' puede entenderse genéricamente como descendencia, por lo que aquí conviene 'hijos varones' para preservar el matiz fuente.
  - severity: medium
    issue: La nota [a] repite la misma lectura principal
    rationale: La nota dice 'O «fuego extraño» o «fuego ajeno»', pero 'fuego extraño' ya está en el texto principal. Una nota de alternativa debe aportar variantes reales como 'fuego ajeno' o una explicación de 'fuego no autorizado'.
  - severity: low
    issue: La nota [b] combina dos observaciones distintas bajo un solo anclaje
    rationale: Anclada en 'hijos', la nota empieza con una alternativa léxica para בָנִים y luego pasa a una posible lectura de עַל־פְּנֵי אַהֲרֹן, que pertenece a otra frase. No es inválido, pero reduce claridad editorial. Puede simplificarse o enfocarse mejor.
