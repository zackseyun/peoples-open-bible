translation:
  language: es
  text: Y no me dejaste besar a mis hijos y a mis hijas[a]. Ahora has obrado neciamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «no me dejaste para besar a mis hijos y a mis hijas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטַשְׁתַּנִי
  english_pob_choice: you did not let me
  chosen_spanish: no me dejaste
  alternatives_spanish:
  - no me permitiste
  - no me dejaste ir
  lexicon: HALOT
  rationale: El hebreo puede expresar el haber quedado sin ser dejado o permitido para hacer algo. En español, «no me dejaste» comunica con naturalidad la queja de Laban y conserva la fuerza relacional del reclamo sin volverlo demasiado literal o pesado.
- source_word: לְנַשֵּׁק
  english_pob_choice: kiss
  chosen_spanish: besar
  alternatives_spanish:
  - dar un beso de despedida
  - besar en despedida
  lexicon: HALOT
  rationale: El infinitivo hebreo significa simplemente «besar». Como el contexto es de partida, el matiz de despedida se entiende por la escena, pero no está explicitado en la forma verbal; por eso se mantiene el verbo simple.
- source_word: לְבָנַי וְלִבְנֹתַי
  english_pob_choice: my sons and my daughters
  chosen_spanish: a mis hijos y a mis hijas
  alternatives_spanish:
  - a mis hijos
  - a mis hijos e hijas
  lexicon: HALOT
  rationale: El hebreo nombra de manera explícita tanto a hijos como a hijas. Se conserva esa precisión en español, aunque «hijos e hijas» sería igualmente posible; «a mis hijos y a mis hijas» mantiene mejor la duplicación del original.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Y ahora
  lexicon: HALOT
  rationale: Es un marcador discursivo/temporal sencillo. «Ahora» reproduce de forma directa la transición a la conclusión de Laban.
- source_word: הִסְכַּלְתָּ עֲשׂוֹ
  english_pob_choice: you have acted foolishly
  chosen_spanish: has obrado neciamente
  alternatives_spanish:
  - has actuado neciamente
  - has hecho locuras
  - has obrado como un necio
  lexicon: HALOT
  rationale: El verbo en hifil junto con el complemento de עשׂה expresa conducta insensata. «Obrar neciamente» es natural en español bíblico contemporáneo y conserva el juicio moral sin exagerarlo; «actuado» también sería posible, pero «obrado» suena más solemne y directo.
translation_notes:
  revision_awareness: 'Coincide con el testimonio de la fuente hebrea y con el audit trail inglés: se mantiene el reclamo de impedimento (no simple abandono) y la valoración final de conducta insensata. No se observan revisiones aplicadas en el expediente, y el consenso de revisión es de alta concordancia.'
  spanish_consistency_notes:
  - Se preserva la distinción entre «hijos» y «hijas» porque el hebreo la expresa explícitamente.
  - Se evita «SEÑOR» u otras sustituciones devocionales porque no aparece aquí el Tetragrámaton.
  - «Obrado neciamente» mantiene el tono de reproche judicial/personal sin añadir interpretaciones.
