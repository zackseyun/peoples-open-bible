  to: Hay una palabra[a] envuelta en muerte; que no se halle en la heredad de Jacob. Porque todas estas cosas se apartarán de los piadosos, y no se revolcarán en pecados.
  rationale: Se corrige la nota al pie para que refleje la alternativa léxica documentada en el inglés POB y se ancle a la frase pertinente. También se ajusta «vestida de muerte» a «envuelta en muerte» por mayor naturalidad y precisión metafórica en español, manteniendo intacto el sentido del griego y la fuerza moral del pasaje.
