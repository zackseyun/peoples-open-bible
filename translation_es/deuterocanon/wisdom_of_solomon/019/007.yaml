revisions:
- from: La nube que cubría el campamento fue vista[a], y del agua que había estado delante de ellos surgió tierra seca; del Mar Rojo vino un camino sin impedimento, y de la ola violenta, una llanura herbosa.
  to: La nube que cubría el campamento fue vista, y del agua que había estado allí surgió tierra seca; del Mar Rojo[a] vino un camino sin impedimento, y del oleaje violento, una llanura herbosa.
  rationale: Se corrige el anclaje de la nota para que corresponda a «Mar Rojo», que es el único lugar donde aplica la alternativa. También se mejora la naturalidad de «del agua que había estado allí» para reflejar mejor el participio griego sin calco, y se ajusta «ola violenta» a «oleaje violento» para representar con más precisión κλύδωνος βιαίου.
