    issue: 'Construcción redundante: «el nombre de aquel lugar se llama»'
    rationale: Aunque intenta reflejar קָרָא שֵׁם, en español resulta poco natural. Una forma como «aquel lugar se llama» o «ese lugar fue llamado» preserva mejor el sentido con buena legibilidad.
  - severity: medium
    issue: Nota al pie con glosas en inglés
    rationale: La nota dice «trouble» y «disturbance» en vez de equivalentes españoles. Debe estar completamente en español para consistencia del proyecto y legibilidad del lector hispanohablante.
  - severity: low
    issue: «se apartó del ardor de su ira» puede sonar ligeramente forzado
    rationale: No es incorrecto, pero «se volvió del ardor de su ira» o «se apartó de la ardiente ira» reflejaría mejor la imagen de שׁוּב + מִן. Se recomienda una redacción más natural sin perder la metáfora.
  revised_spanish_text: Y levantaron sobre él un gran montón de piedras hasta el día de hoy, y Yahvé se volvió del ardor de su ira. Por eso aquel lugar se llama Valle de Acor[a] hasta el día de hoy.
  revised_footnotes:
