translation:
  language: es
  text: Y vino la palabra de Yahvé[a] a mí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR»; alternativamente, «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: El waw consecutivo de היה funciona aquí como introducción narrativa/secuencial de fórmula profética. En español, «Y vino» conserva la llegada de la palabra sin añadir un giro más interpretativo como «aconteció», que aquí no aporta contenido adicional.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: HALOT
  rationale: En la expresión fija דְבַר יְהוָה, «palabra» preserva la fórmula profética estable y su resonancia teológica mejor que «mensaje», que sería más explicativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce como «Yahvé» según el criterio del proyecto, manteniendo el nombre propio divino y evitando la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular indica dirección hacia el profeta. «A mí» es natural y fiel al sentido directo del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce discurso directo. «Diciendo» mantiene la fórmula profética convencional y deja abierta la continuación del habla en el versículo siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, «Yahvé» preserva el nombre revelado de Dios y corresponde al criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: la traducción ya no contiene una nota anclada sin marcador visible. Se mantiene la lectura directa del texto hebreo y del audit trail inglés, sin cambios de sentido respecto a la revisión más reciente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «la palabra» para conservar la fórmula profética clásica sin sustituirla por un término explicativo.
  - «Diciendo» refleja la función introductoria de לֵאמֹר sin añadir contenido ajeno al verso.
