translation:
  language: es
  text: 'Sus discípulos le dijeron: «Veinticuatro profetas[a] hablaron en Israel, y todos hablaron acerca de ti[b]».


    Él les dijo: «Han dejado de lado[c] al viviente que está en su presencia[d], y han hablado de los muertos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Veinticuatro profetas» puede reflejar una enumeración tradicional o simbólica de autoridades proféticas; el dicho no la explica.
    reason: cultural_note
  - marker: b
    text: La lectura del copto impreso permite entender «tu corazón», mientras que la lematización normalizada apunta a «ti». Aquí se sigue la lectura normalizada porque encaja mejor con el sentido global.
    reason: textual_variant
  - marker: c
    text: «Han dejado de lado» traduce el valor activo de ⲕⲱ. También podría verterse «han omitido» o «han pasado por alto».
    reason: lexical_alternative
  - marker: d
    text: «En su presencia» refleja el sentido de «delante de ustedes / ante ustedes» y conserva el matiz formal del original.
    reason: cross_reference
lexical_decisions:
- source_word: ϫⲟⲩⲧⲁϥⲧⲉ
  english_pob_choice: twenty-four
  chosen_spanish: veinticuatro
  alternatives_spanish:
  - veinte y cuatro
  lexicon: Crum; Layton
  rationale: Número compuesto estándar en español; conserva la precisión y la concisión del original sin artificialidad.
- source_word: ⲁⲛⲧⲟⲟⲩϣⲁϫⲉ
  english_pob_choice: they spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - habían hablado
  - dijeron
  lexicon: Layton (sistema verbal)
  rationale: El contexto narrativo pide pasado simple; 'hablaron' reproduce la acción verbal de forma natural en español.
- source_word: ϩⲣⲁⲓ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: Crum
  rationale: '''Acerca de'' expresa con claridad la relación temática con personas en un registro sobrio y bíblico.'
- source_word: ⲛ̄ϩⲏⲧⲕ / ϩⲛⲛⲧⲟⲕ
  english_pob_choice: you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu corazón
  - acerca de ti
  lexicon: Crum; Layton
  rationale: El audit trail deja abierta la variante 'corazón', pero la lectura normalizada 'concerning you' encaja mejor con el discurso y se vierte de manera directa con 'de ti'.
- source_word: ⲕⲱ
  english_pob_choice: leave out
  chosen_spanish: han dejado
  alternatives_spanish:
  - han omitido
  - les ha faltado
  lexicon: Crum
  rationale: Para un español natural, 'han dejado' comunica la idea de omitir o pasar por alto a alguien; conserva la fuerza activa del reproche. La alternativa 'omitir' se reserva para una nota.
- source_word: ⲡⲉⲧⲉⲣⲉⲱⲛϩ
  english_pob_choice: the living one
  chosen_spanish: al viviente
  alternatives_spanish:
  - al que vive
  - al que está vivo
  - al viviente
  lexicon: Layton
  rationale: Se mantiene el singular sustantivado del original. 'Viviente' funciona en español formal y evita perder la marcada referencia singular.
- source_word: ⲛⲡⲉⲧⲛⲙⲧⲟ ⲉⲃⲟⲗ
  english_pob_choice: in your presence
  chosen_spanish: en vuestra presencia
  alternatives_spanish:
  - delante de vosotros
  - ante vosotros
  lexicon: Crum; Lambdin
  rationale: '''En vuestra presencia'' conserva el tono formal del dicho y traduce el idiomático ''before you'' sin sonar forzado.'
- source_word: ϣⲁϫⲉ
  english_pob_choice: speak
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - proclamaron
  lexicon: Crum
  rationale: Aquí el verbo denota discurso acerca de alguien; 'hablaron' mantiene la repetición y el paralelismo con 'hablaron acerca de ti'.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲟⲩ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - el muerto
  - los que están muertos
  lexicon: Layton; Crum
  rationale: El plural español natural recoge el valor colectivo del sustantivo relativizado y hace legible el contraste con 'el viviente'.
theological_decisions:
- issue: Contraste entre el viviente y los muertos
  english_pob_reading: Thomas frames the point as missing the living one in your presence, then speaking about the dead.
  chosen_spanish_reading: Tomás plantea que se dejó fuera al viviente presente y se habló de los muertos.
  alternative_spanish_readings:
  - se omitió al viviente que está ante vosotros
  - se habló de quienes están muertos
  rationale: 'La formulación española mantiene el contraste teológico central del dicho: la ceguera ante la presencia viva de Jesús frente al discurso sobre autoridades ya muertas. No se diluye la tensión entre presencia viva y referencia al pasado.'
  doctrine_reference: Cristología en el marco del Evangelio de Tomás; contraste vida/muerte, presencia/reconocimiento.
translation_notes:
  revision_awareness: Se siguió la lectura normalizada de Dilley para la frase final, mientras que se dejó constancia de la variante manuscrita posible ('tu corazón') en nota. No hubo cambios necesarios respecto al último pase de revisión; se conserva el consenso alto del expediente inglés.
  spanish_consistency_notes:
  - Se mantiene 'viviente' para preservar el singular sustantivado del original y evitar diluir el contraste con 'los muertos'.
  - Se usa 'hablaron acerca de ti' para reproducir la relación temática sin forzar una traducción literal de preposiciones.
  - Se opta por 'en vuestra presencia' por tono y claridad, aunque la preposición griega admite un matiz de 'delante de'.
  - Se evita 'SEÑOR' o 'Cristo' porque el texto no contiene esos términos; se conserva la cristología del dicho mediante el contraste interno del pasaje.
