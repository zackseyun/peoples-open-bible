translation:
  language: es
  text: Si el ladrón es hallado en el acto de irrumpir[a] y es herido de modo que muera[b], no hay culpa de sangre para él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «si el ladrón es hallado en el allanamiento». El término hebreo se refiere a un irrumpir o entrada clandestina, probablemente abriendo paso por una pared o entrando a escondidas.
    reason: lexical_alternative
  - marker: b
    text: Es decir, quien hirió al ladrón no incurre en culpa legal de sangre en este caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמַּחְתֶּרֶת
  english_pob_choice: breaking in
  chosen_spanish: mientras se introduce a robar
  alternatives_spanish:
  - en el allanamiento
  - en la intrusión
  - en la ruptura de la pared
  lexicon: HALOT
  rationale: El hebreo alude a una entrada clandestina o un rompimiento para entrar, no simplemente a un lugar físico. En español, 'mientras se introduce a robar' comunica la acción ilícita y el escenario legal sin sonar técnico ni demasiado literal.
- source_word: יִמָּצֵא
  english_pob_choice: is found
  chosen_spanish: es hallado
  alternatives_spanish:
  - es encontrado
  - se encuentra
  lexicon: HALOT
  rationale: La forma nifal pide una pasiva natural en español. 'Es hallado' conserva el valor jurídico de la aprehensión o detección en el acto.
- source_word: הַגַּנָּב
  english_pob_choice: the thief
  chosen_spanish: el ladrón
  alternatives_spanish:
  - el ratero
  - el hurón
  lexicon: HALOT
  rationale: גנב es el término común para 'thief'. 'Ladrón' es el equivalente más directo y transparente en español; 'ratero' rebaja el registro y 'hurón' no corresponde.
- source_word: וְהֻכָּה
  english_pob_choice: is struck
  chosen_spanish: es herido
  alternatives_spanish:
  - es golpeado
  - es apaleado
  - es alcanzado
  lexicon: HALOT
  rationale: El pasivo de נכה admite la idea de ser golpeado o herido; en este contexto legal, 'es herido' evita sugerir necesariamente una paliza repetida y permite el resultado fatal sin añadir detalles no dados por el hebreo.
- source_word: וָמֵת
  english_pob_choice: so that he dies
  chosen_spanish: de modo que muera
  alternatives_spanish:
  - y muere
  - y muere como resultado
  lexicon: HALOT
  rationale: La secuencia expresa resultado. 'De modo que muera' preserva el valor consecutivo/resultativo del hebreo con un español natural.
- source_word: אֵין לוֹ דָּמִים
  english_pob_choice: there is no bloodguilt for him
  chosen_spanish: no hay sangre culpable sobre él
  alternatives_spanish:
  - no hay culpa de sangre sobre él
  - no se le imputa sangre
  - no hay sangre que reclamar contra él
  lexicon: HALOT
  rationale: El hebreo usa un idiomático legal de 'sangres' que apunta a culpabilidad por derramamiento de sangre. 'Sangre culpable' conserva la fuerza jurídica y evita sustituirla por el término moderno más estrecho 'homicidio' o por una paráfrasis explicativa excesiva.
theological_decisions:
- issue: Naturaleza de la exención legal en un allanamiento nocturno
  english_pob_reading: Render the clause as absence of bloodguilt rather than as a broad moral endorsement of killing.
  chosen_spanish_reading: No hay sangre culpable sobre él.
  alternative_spanish_readings:
  - no se le imputa homicidio
  - no cae sobre él culpa de muerte
  rationale: La frase debe leerse como un veredicto legal dentro de este caso, no como aprobación general de matar. La elección mantiene la categoría de responsabilidad por sangre sin desplazarla a un lenguaje penal moderno que estrecharía el sentido.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió el último estado revisado sin cambios sustantivos; la decisión principal fue mantener el matiz legal de דָּמִים como culpabilidad de sangre, no como 'muerte' o 'asesinato'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió 'ladrón' para גנב por transparencia léxica y consistencia con el registro legal del enunciado.
  - Se conservó el valor resultativo de la segunda cláusula con 'de modo que muera' para no perder la relación causa-resultado.
  - La nota a amplía la alternativa formal que el inglés POB ya documenta para בַּמַּחְתֶּרֶת.
