  glossary_alignment: 'No hay términos teológicos mayores en este versículo. En nombres propios, conviene mantener una transliteración estable y cercana a la forma auditada: «Quiriataim», «Sibma» y «Zéret-sáhar»/similar. La alternativa semántica documentada debe mantenerse solo para צֶרֶת הַשַּׁחַר, no para קִרְיָתַיִם.'
