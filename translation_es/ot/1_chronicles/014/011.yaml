translation:
  language: es
  text: 'Así subieron a Baal-perazim[a], y David los derribó allí. Entonces David dijo: «Dios irrumpió contra mis enemigos por mi mano, como el irrumpir de muchas aguas». Por eso llamaron a aquel lugar Baal-perazim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baal-perazim suena como «señor de irrupciones» o «lugar de brechas/irrupciones», en eco con la declaración de David de que Dios irrumpió contra sus enemigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: they went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - avanzaron
  lexicon: HALOT
  rationale: עלה en contexto de movimiento militar admite la idea de ir/subir. «Subieron» conserva el hebraísmo direccional sin forzar una interpretación táctica más específica.
- source_word: בְּבַעַל פְּרָצִים / בַּעַל פְּרָצִים
  english_pob_choice: Baal-perazim
  chosen_spanish: Baal-perazim
  alternatives_spanish:
  - Baal Perazim
  - Señor de las brechas
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; por eso se translitera. El juego de palabras con פרץ se mantiene en el texto y se explica en nota.
- source_word: וַיַּכֵּם
  english_pob_choice: David struck them down
  chosen_spanish: los derribó
  alternatives_spanish:
  - los hirió
  - los derrotó
  lexicon: HALOT
  rationale: נכה en contexto bélico puede significar golpear/derrotar. «Los derribó» preserva la fuerza concreta del golpe y su efecto victorioso, con un español natural.
- source_word: פָּרַץ
  english_pob_choice: has broken through
  chosen_spanish: ha abierto paso
  alternatives_spanish:
  - ha roto
  - ha hecho una brecha
  lexicon: HALOT
  rationale: פרץ expresa romperse/abrirse un paso. «Ha abierto paso» comunica bien la acción divina y deja visible el vínculo con la imagen del lugar y con la metáfora del agua.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, aquí funciona idiomáticamente como sujeto divino singular. En español, «Dios» es la forma más natural y fiel al sentido.
- source_word: אֶת אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - mis foes
  lexicon: HALOT
  rationale: La relación posesiva y el objeto directo son directos; «mis enemigos» es claro, idiomático y suficiente para el valor léxico.
- source_word: בְּיָדִי
  english_pob_choice: by my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - por medio de mí
  - con mi mano
  lexicon: HALOT
  rationale: La expresión hebrea indica agencia/instrumentalidad. «Por mi mano» conserva la imagen y resulta natural en español bíblico contemporáneo.
- source_word: כְּפֶרֶץ מָיִם
  english_pob_choice: like a bursting flood of waters
  chosen_spanish: como una ruptura de aguas
  alternatives_spanish:
  - como un torrente que rompe
  - como una avenida de aguas
  lexicon: HALOT
  rationale: La imagen compara la acción divina con aguas que se abren paso con violencia. «Ruptura de aguas» conserva el vínculo léxico con פרץ y la metáfora, sin añadir elementos no explicitados.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Conector inferencial estándar. «Por eso» es claro y adecuado en narrativa española.
- source_word: קָרְאוּ שֵׁם הַמָּקוֹם הַהוּא
  english_pob_choice: they called the name of that place
  chosen_spanish: llamaron al nombre de aquel lugar
  alternatives_spanish:
  - pusieron por nombre a aquel lugar
  - dieron nombre a aquel lugar
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea de nombrar, incluida la pluralidad verbal. «Llamaron al nombre de» refleja con cercanía el original y permite mantener el relato nominal.
theological_decisions:
- issue: Agencia divina y humana en la victoria
  english_pob_reading: God as the singular divine subject acting through David
  chosen_spanish_reading: Dios es el agente principal que abre paso, y David es el instrumento humano por cuya mano ocurre la victoria
  alternative_spanish_readings:
  - Dios derrotó a mis enemigos
  - David los venció
  rationale: El verbo singular del hebreo atribuye la acción a Dios, mientras que la frase instrumental conserva la participación de David. La traducción debe preservar ambas dimensiones sin diluir ninguna.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada, pero ajusta la sintaxis al español natural y mantiene el juego de palabras de פרץ mediante «abierto paso» y la nota sobre Baal-perazim. No se detectaron revisiones posteriores que exigieran cambios.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים conforme a la decisión auditada.
  - Se mantuvo la transliteración de Baal-perazim como nombre propio, con nota explicativa.
  - «Por mi mano» conserva la instrumentalidad del hebreo sin sustituirla por una explicación más libre.
  - La expresión «llamaron al nombre de» reproduce la fórmula narrativa hebrea aunque en español sea algo más formal que una versión idiomática como «pusieron por nombre».
