translation:
  language: es
  text: Harás el tabernáculo con diez cortinas de lino fino torcido, y azul y púrpura y carmesí; con querubines, obra de un hábil diseñador[a], las harás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con querubines trabajados hábilmente en ellas». La expresión hebrea מַעֲשֵׂה חֹשֵׁב puede indicar un diseño artístico incorporado en la tela.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la habitación
  lexicon: HALOT
  rationale: En este contexto cultual, מִשְׁכָּן designa el santuario portátil. «Tabernáculo» es el término técnico ya establecido en español bíblico y conserva mejor el sentido sacro que un equivalente más genérico como «morada».
- source_word: יְרִיעֹת
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - paños
  - lonas
  - paneles
  lexicon: HALOT
  rationale: El término se refiere aquí a grandes piezas textiles de la estructura del tabernáculo. «Cortinas» es natural en español y comunica bien la función de estas telas sin perder el valor arquitectónico del hebreo.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: finely twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino retorcido
  - lino finamente torcido
  - lino torcido
  lexicon: HALOT
  rationale: שֵׁשׁ apunta al lino fino y מָשְׁזָר al hilo torcido o hilado con torsión. «Lino fino torcido» preserva el material y la idea de trabajo textil sin añadir más de lo que exige el hebreo.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul intenso
  - azul
  lexicon: HALOT
  rationale: En la serie de materiales textiles del tabernáculo, תְּכֵלֶת se expresa de forma suficiente con «azul». Mantiene la referencia cromática tradicional sin sobreespecificar el tinte.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura
  lexicon: HALOT
  rationale: אַרְגָּמָן designa un tinte púrpura. «Púrpura» es más preciso y más cercano al registro cultual que «morado».
- source_word: תֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - carmesí
  - hilo carmesí
  lexicon: HALOT
  rationale: La expresión hebrea nombra material teñido de escarlata/carmesí. Aquí se opta por «carmesí» para mantener la serie de colores y evitar añadir «hilo» sin apoyo explícito en el hebreo de esta línea; el contexto textil ya está dado por «cortinas».
- source_word: כְּרֻבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  lexicon: HALOT
  rationale: Se conserva el término bíblico tradicional «querubines». En español no conviene rebajarlo a un diminutivo angelical moderno, porque el término tiene sentido técnico cultual propio.
- source_word: מַעֲשֵׂה חֹשֵׁב
  english_pob_choice: the work of a skillful designer
  chosen_spanish: obra de un diseñador hábil
  alternatives_spanish:
  - obra de un artesano hábil
  - obra de un tejedor experto
  - obra artística
  lexicon: HALOT
  rationale: La frase describe una elaboración artística e intencional en la tela, no solo trabajo manual. «Diseñador hábil» conserva la dimensión de diseño/patrón que la POB inglesa resaltó con «skillful designer», sin convertirlo en mera «bordado» o «tejido».
- source_word: וְאֶת ... תַּעֲשֶׂה
  english_pob_choice: And you shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás
  lexicon: HALOT
  rationale: El hebreo encadena instrucciones con waw consecutiva. En español, iniciar con «Harás» suena natural y digno; el valor aditivo de la conjunción queda implícito en el contexto inmediato de mandato.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las
  - las mismas
  lexicon: HALOT
  rationale: El pronombre plural remite a las cortinas, que en español son femeninas. Se traduce con objeto directo femenino plural para mantener concordancia natural y claridad referencial.
theological_decisions:
- issue: 'Naturaleza del santuario: término técnico vs. traducción genérica'
  english_pob_reading: the tabernacle
  chosen_spanish_reading: el tabernáculo
  alternative_spanish_readings:
  - la morada
  - el santuario
  rationale: No se atenúa el carácter técnico del מִשְׁכָּן. «Tabernáculo» conserva la referencia cultual concreta y evita perder la alusión a la estructura sagrada portátil del desierto.
  doctrine_reference: Éxodo 25–40; santuario portátil de Yahvé
- issue: Sentido de מַעֲשֵׂה חֹשֵׁב
  english_pob_reading: the work of a skillful designer
  chosen_spanish_reading: obra de un diseñador hábil
  alternative_spanish_readings:
  - obra de un artesano hábil
  - obra bordada por un experto
  rationale: La expresión no se reduce a adorno genérico. La redacción española mantiene la tensión entre tejido, patrón y arte intencional, en línea con la nota inglesa que destaca el diseño artístico en la tela.
  doctrine_reference: Éxodo 26:31, 36:8-9; arte sagrado del tabernáculo
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la auditoría inglesa y no requiere cambios de fondo. La principal decisión de ajuste en español fue mantener la fuerza técnica de מִשְׁכָּן y conservar el matiz artístico de מַעֲשֵׂה חֹשֵׁב sin sobreinterpretarlo. También se evitó añadir 'hilo' a תֹלַעַת שָׁנִי para no exceder el apoyo explícito del hebreo en esta línea.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» reservado para donde el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se usa «tabernáculo» como término técnico consistente con el proyecto.
  - Se conserva el registro cultual con «querubines», «púrpura» y «carmesí» para alinear con el léxico bíblico estándar en español.
  - La nota de pie marca la ambigüedad de מַעֲשֵׂה חֹשֵׁב sin imponer una sola interpretación en el cuerpo principal.
