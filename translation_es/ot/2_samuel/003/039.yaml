translation:
  language: es
  text: Y yo todavía hoy estoy débil[a], aunque soy rey ungido; y estos hombres, los hijos de Sarvia, son demasiado duros para mí. Yahvé recompense[b] al que hace el mal según su mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y yo todavía hoy estoy tierno». El adjetivo hebreo puede significar «tierno/suave» o, según el contexto, «débil».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé recompensará al que hace el mal según su mal». El verbo hebreo también puede entenderse como futuro simple.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַךְ
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - tierno
  - suave
  - blando
  lexicon: HALOT
  rationale: En este contexto David no habla de ternura afectiva, sino de falta de fuerza para imponerse sobre estos hombres. 'Débil' comunica mejor en español la vulnerabilidad práctica que la POB destacó con 'weak'.
- source_word: וּמָשׁוּחַ מֶלֶךְ
  english_pob_choice: though anointed king
  chosen_spanish: aunque ungido rey
  alternatives_spanish:
  - y ungido rey
  - aun siendo rey ungido
  - aunque soy ungido rey
  lexicon: HALOT
  rationale: 'La construcción es yuxtapuesta y funciona con valor concesivo. ''Aunque ungido rey'' conserva la tensión: David es rey por unción, pero sigue sin poder actuar contra ellos.'
- source_word: בְּנֵי צְרוּיָה
  english_pob_choice: the sons of Zeruiah
  chosen_spanish: los hijos de Sarvia
  alternatives_spanish:
  - los hijos de Zeruía
  - Sarvia's sons
  lexicon: HALOT
  rationale: Se mantiene la designación familiar fija para Joab y sus hermanos. 'Sarvia' es una forma castellana reconocible y eclesialmente legible; el hebreo no exige una adaptación explicativa adicional.
- source_word: קָשִׁים מִמֶּנִּי
  english_pob_choice: are too harsh for me
  chosen_spanish: son demasiado duros para mí
  alternatives_spanish:
  - son demasiado fuertes para mí
  - son demasiado severos para mí
  - son demasiado ásperos para mí
  lexicon: HALOT
  rationale: קָשִׁים puede abarcar dureza, severidad o aspereza. 'Duros' preserva el campo semántico sin cerrar la ambigüedad entre carácter recio e imposibilidad de manejarlos.
- source_word: יְשַׁלֵּם
  english_pob_choice: May ... repay
  chosen_spanish: recompense
  alternatives_spanish:
  - repague
  - pagará
  - quiera Yahvé recompensar
  lexicon: HALOT
  rationale: Aunque el verbo puede leerse como futuro simple, el contexto favorece un ruego o imprecación. 'Recompense' en español permite esa fuerza optativa sin forzar una forma perifrástica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'', manteniendo el nombre divino personal y evitando la sustitución titulativa.'
- source_word: לְעֹשֵׂה הָרָעָה
  english_pob_choice: the evildoer
  chosen_spanish: al que hace el mal
  alternatives_spanish:
  - al malhechor
  - al que comete el mal
  - al hacedor de mal
  lexicon: HALOT
  rationale: El participio define a la persona por su acción. 'Al que hace el mal' conserva la forma agentiva sin introducir un término más técnico que pudiera endurecer o fijar demasiado el sentido.
- source_word: כְּרָעָתוֹ
  english_pob_choice: according to his evil
  chosen_spanish: conforme a su maldad
  alternatives_spanish:
  - según su maldad
  - según su mal
  - de acuerdo con su maldad
  lexicon: HALOT
  rationale: La fórmula expresa retribución proporcional. 'Conforme a su maldad' suena natural en español bíblico actual y mantiene la correspondencia de medida entre acto y paga.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se preserva el nombre divino como transliteración y no como sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza del cierre de David
  english_pob_reading: 'optative/imprecatory: ''May the LORD repay...'''
  chosen_spanish_reading: 'optativo/impetratorio: ''Yahvé recompense...'''
  alternative_spanish_readings:
  - Yahvé recompensará...
  - Que Yahvé recompense...
  rationale: El contexto inmediato muestra a David renunciando a vengarse personalmente y dejando la justicia en manos de Dios. El español puede expresar esa súplica con una forma verbal breve sin convertirla en una simple predicción.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension where ambiguity exists)
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa indicada como sin cambios; la redacción española se ajusta al mismo estado textual y mantiene las dos tensiones señaladas por la POB: רַךְ (tierno/débil) y יְשַׁלֵּם (futuro/optativo).'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton conforme al estándar del proyecto.
  - '''Ungido rey'' conserva la construcción concesiva sin añadir un verbo innecesario.'
  - '''Los hijos de Sarvia'' mantiene la designación familiar hebrea; no se sustituye por un título explicativo.'
  - Se preserva la ambigüedad de קָשִׁים con 'duros' y nota alternativa para 'fuertes'.
  - La última cláusula mantiene el valor de ruego sin excluir una lectura futura del verbo hebreo.
