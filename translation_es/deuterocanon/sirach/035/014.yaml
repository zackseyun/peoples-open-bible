translation:
  language: es
  text: Da la recompensa[b][a] de los que esperan en ti, y haz que tus profetas sean hallados fieles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego dice algo bastante distinto, con el sentido: «El que teme al Señor recibirá instrucción, y los que madrugan hallarán favor». Esto probablemente refleja una forma textual diferente.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los que te esperan». El verbo hebreo puede abarcar tanto esperar como esperar con esperanza o confianza en ti.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תן
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Concede
  - Otorga
  - Da
  lexicon: HALOT
  rationale: Imperativo directo de נתן. En español, «Da» es natural, solemne y fiel al tono de petición a Dios sin añadir matices ajenos.
- source_word: פעלת
  english_pob_choice: the recompense
  chosen_spanish: la recompensa
  alternatives_spanish:
  - la retribución
  - la paga
  - el pago
  lexicon: HALOT
  rationale: El audit trail inglés revisó «reward» a «recompense» por precisión formal. En español, «recompensa» transmite bien la idea de lo debido o concedido por Dios, con un registro digno y comprensible.
- source_word: קוויך
  english_pob_choice: those who wait for you
  chosen_spanish: los que esperan en ti
  alternatives_spanish:
  - los que esperan de ti
  - los que confían en ti
  - los que te aguardan
  lexicon: HALOT
  rationale: קוה puede implicar esperar con esperanza/confianza. «Esperan en ti» conserva la espera expectante y la dependencia personal. Se evita reducirlo solo a espera temporal o solo a confianza abstracta.
- source_word: ונביאיך
  english_pob_choice: and your prophets
  chosen_spanish: y tus profetas
  alternatives_spanish:
  - y tus profetas
  - y los profetas tuyos
  lexicon: HALOT
  rationale: Construcción directa con sufijo pronominal. «Tus profetas» es fiel, claro y natural en español.
- source_word: יאמנו
  english_pob_choice: be found faithful
  chosen_spanish: sean hallados fieles
  alternatives_spanish:
  - sean hallados verdaderos
  - sean acreditados como fieles
  - sean confirmados
  lexicon: HALOT
  rationale: אָמַן aquí tiene el sentido de ser verificado/vindicado como fiable. «Sean hallados fieles» reproduce bien la pasiva de hallazgo y el valor de confiabilidad sin borrar la posible idea de vindicación.
theological_decisions:
- issue: Primacía del hebreo frente al paralelo griego divergente
  english_pob_reading: 'Translate primarily from the Hebrew petition: ''Give the recompense of those who wait for you, and let your prophets be found faithful.'''
  chosen_spanish_reading: 'Traducir primariamente la petición hebrea: «Da la recompensa de los que esperan en ti, y haz que tus profetas sean hallados fieles.»'
  alternative_spanish_readings:
  - 'Lectura basada en el griego: «El que teme al Señor recibirá instrucción, y los que se levantan temprano hallarán favor.»'
  rationale: Sirácida se traduce aquí desde el hebreo conservado, usando el griego como testimonio comparativo. Dado que el griego refleja una forma textual distinta, no debe desplazar la lectura hebrea en el texto principal; sí conviene señalar la divergencia en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input/check, not as primary over extant Hebrew.'
translation_notes:
  revision_awareness: El texto español sigue la revisión inglesa más reciente, que prefirió «recompense» frente a «reward» para פעלת. También mantiene la decisión editorial de privilegiar el hebreo de Sirácida sobre el testimonio griego, aunque el griego difiera sustancialmente y deba registrarse como lectura alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; aquí el hebreo dice קויך y el griego Κύριον, por lo que no corresponde introducirlo en el texto principal.
  - Se evitó «Cristo» y otras terminologías no pertinentes al versículo.
  - «Fieles» conserva el valor verificativo de יאמנו sin forzar una traducción exclusivamente forense.
