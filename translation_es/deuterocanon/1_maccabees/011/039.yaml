  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: Trifón pertenecía antes al grupo de Alejandro, vio el descontento de las fuerzas contra Demetrio, y fue a ver al árabe que criaba al niño Antíoco, hijo de Alejandro. Sin embargo, hay dos problemas de fidelidad/forma onomástica: ''Antioquio'' no es la forma española normal para Ἀντίοχον; debe ser ''Antíoco''. Además, ''el árabe'' conviene ir con mayúscula étnica en aposición como en español bíblico moderno: ''el Árabe''.'
  spanish_quality_summary: El texto es legible y natural, pero 'Antioquio' suena impropio y poco reconocible en español. 'Había estado antes' es entendible, aunque algo pesado; 'había estado anteriormente' o 'antes había estado' serían opciones, pero no exigen cambio. 'Niño pequeño' transmite bien παιδάριον, y la nota aclara correctamente la filiación implícita. La puntuación y sintaxis general funcionan.
  glossary_alignment: 'No hay términos teológicos clave del glosario de proyecto en este versículo. En nombres propios, conviene alinearse con formas españolas ampliamente reconocibles: ''Trifón'' está bien; ''Antíoco'' debe reemplazar ''Antioquio''. La decisión de mantener ''de Alejandro'' en el texto y aclarar ''hijo de Alejandro'' en nota sí sigue la rationale auditada.'
  issues:
