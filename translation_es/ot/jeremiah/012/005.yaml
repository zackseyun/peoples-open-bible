base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/012/005.yaml
  text: If you have run with footmen and they have wearied you[a], then how will you compete with horses? And if in a land of peace you are secure, then what will you do in the thicket of the Jordan?
