revisions:
- from: Y cuando oyeron la voz desde en medio de[a] la oscuridad, mientras el monte ardía en fuego, se acercaron a mí—todos los cabezas de sus tribus y sus ancianos—
  to: Y cuando oyeron la voz de en medio de[a] la oscuridad, mientras el monte ardía en fuego, se acercaron a mí—todos los jefes de sus tribus y sus ancianos—
  rationale: Se corrige la frase espacial para un español más natural y fiel a מִתּוֹךְ, y se reemplaza «cabezas» por «jefes» porque la metáfora literal aquí produce una construcción deficiente en español. Se conserva la nota léxica sobre «voz/sonido» y el resto de la estructura narrativa del original.
