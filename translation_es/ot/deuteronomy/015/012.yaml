revisions:
- from: Si tu hermano[a], un hebreo o una hebrea, se vende a ti y te sirve seis años, entonces, en el séptimo año, lo enviarás libre de ti.
  to: Si tu hermano[a], un hebreo o una hebrea, es vendido a ti y te sirve seis años, entonces, en el séptimo año, lo dejarás ir libre de tu lado.
  rationale: Se corrige «se vende» a «es vendido» para ajustarse mejor al nifal pasivo y al razonamiento del POB inglés. Se sustituye «lo enviarás libre de ti» por «lo dejarás ir libre de tu lado» para lograr un español natural que aún preserve la idea de liberación y salida de la esfera del destinatario. Se mantiene «tu hermano», «un hebreo o una hebrea» y el singular masculino genérico con nota aclaratoria.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la mayoría de las decisiones: mantiene «tu hermano», conserva el par «hebreo / hebrea», refleja el servicio de seis años y retiene el masculino singular genérico con nota. Sin embargo, «se vende a ti» se aparta del valor pasivo preferido de יִמָּכֵר («es vendido / es vendido a ti») y suena menos fiel al hebreo y al POB auditado. Además, «de ti» al final es demasiado calcado y poco idiomático en español bíblico natural; conviene una formulación que preserve «from you» sin dureza impropia.'
  spanish_quality_summary: 'El texto es mayormente claro, pero presenta dos puntos de naturalidad importantes: «se vende a ti» suena forzado en español y puede implicar reflexividad no deseada; «lo enviarás libre de ti» también suena poco idiomático. Una redacción más natural y fiel sería «es vendido a ti» y «lo dejarás ir libre de tu lado».'
  glossary_alignment: No hay conflicto con la terminología global principal. «Hermano» preserva bien אָחִיךָ. El proyecto no exige aquí «esclavo», y el borrador acierta en no introducirlo para הָעִבְרִי / הָעִבְרִיָּה. La decisión de mantener el masculino singular con nota está alineada con el audit trail inglés.
  issues:
  - severity: medium
    issue: «se vende a ti» para יִמָּכֵר
    rationale: El inglés POB auditado eligió «is sold» por el valor pasivo del nifal. «Se vende» en español inclina hacia reflexivo/medio y puede sugerir auto-venta más que simple pasivo. «Es vendido a ti» refleja mejor la forma y el razonamiento documentado.
  - severity: medium
    issue: «lo enviarás libre de ti» suena poco idiomático
    rationale: Aunque intenta conservar «send him out ... from you», en español esa combinación resulta dura y poco natural. Una formulación como «lo dejarás ir libre de tu lado» o «lo enviarás libre lejos de ti» comunica mejor la liberación sin perder el sentido de separación del ámbito del amo.
  - severity: low
    issue: La nota al pie podría precisar mejor el verbo completo
    rationale: La nota actual cita solo «enviarás», mientras el inglés POB explica «send him out». En español conviene vincular la nota a la referencia masculina singular genérica, no solo al verbo aislado.
  revised_spanish_text: Si tu hermano[a], un hebreo o una hebrea, es vendido a ti y te sirve seis años, entonces, en el séptimo año, lo dejarás ir libre de tu lado.
  revised_footnotes:
