    issue: «Harás llegar» para וְהִקְרַבְתָּ
    rationale: Aunque intenta conservar el causativo de הקריב, en español suena artificial y poco idiomático. En contexto sacrificial, «presentarás» comunica mejor el acto cultual de traer ante la presencia del santuario sin perder fidelidad.
  - severity: low
    issue: La nota al pie queda menos coherente con la elección principal
    rationale: Si el texto principal se mejora a «presentarás», la nota debe ofrecer las otras alternativas reales («harás acercar», «traerás») de forma alineada con el español revisado.
  revised_spanish_text: Presentarás el toro[a] delante de la tienda de reunión, y Aarón y sus hijos pondrán sus manos sobre la cabeza del toro.
