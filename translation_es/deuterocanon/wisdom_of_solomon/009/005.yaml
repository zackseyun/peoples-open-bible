lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: El griego expresa estatus servil, no solo servicio. En esta oración de humillación, «esclavo» conserva mejor la fuerza semántica que «siervo», siguiendo el criterio POB para δοῦλος cuando la subordinación es central.
- source_word: υἱὸς τῆς παιδίσκης σου
  english_pob_choice: the son of your female slave
  chosen_spanish: el hijo de tu esclava
  alternatives_spanish:
  - el hijo de tu criada
  - el hijo de tu sierva
  lexicon: LSJ
  rationale: παιδίσκη puede significar esclava joven o criada/serva, pero aquí el paralelismo con δοῦλος favorece una referencia de estatus. «Esclava» preserva la simetría y la humildad del hablante.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - persona
  lexicon: BDAG
  rationale: El hablante se describe a sí mismo con referencia masculina singular. «Hombre» es la correspondencia más directa y natural en español.
- source_word: ἀσθενής
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - frágil
  - enfermo
  lexicon: BDAG
  rationale: El adjetivo comunica incapacidad o debilidad. «Débil» es la opción más directa y clara en español contemporáneo.
- source_word: ὀλιγόχρονιος
  english_pob_choice: short-lived
  chosen_spanish: de poca duración
  alternatives_spanish:
  - de pocos años
  - de vida breve
  lexicon: LSJ
  rationale: El compuesto alude a tener poco tiempo o pocos años. «De poca duración» mantiene el sentido de brevedad mortal sin añadir matices no presentes en el griego.
- source_word: ἐλάσσων
  english_pob_choice: lacking
  chosen_spanish: con menos
  alternatives_spanish:
  - inferior en
  - falto de
  lexicon: LSJ
  rationale: El comparativo expresa insuficiencia o menor capacidad. «Con menos entendimiento» reproduce esa idea de carencia relativa sin introducir una evaluación más fuerte que la del griego.
- source_word: σύνεσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  lexicon: BDAG
  rationale: El sustantivo apunta a comprensión mental. «Entendimiento» es natural en español y mantiene el énfasis cognitivo de la oración.
- source_word: κρίσεως
  english_pob_choice: judgment
  chosen_spanish: juzgar
  alternatives_spanish:
  - juicio
  - sentenciar
  lexicon: BDAG
  rationale: Aquí κρίσις se refiere al acto o capacidad de juzgar en contexto judicial/real. La construcción «entendimiento para juzgar» comunica esa función con claridad en español.
- source_word: νόμων
  english_pob_choice: laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - leyes
  - estatutos
  lexicon: BDAG
  rationale: El plural griego es explícito. «Las leyes» conserva el número y el marco jurídico-político del texto.
theological_decisions:
- issue: Conservación del lenguaje de esclavitud en una oración de humildad
  english_pob_reading: Use 'slave' / 'female slave' rather than softer traditional terms
  chosen_spanish_reading: Usar «esclavo» / «esclava» en vez de «siervo» / «sierva»
  alternative_spanish_readings:
  - siervo/sierva
  - criado/criada
  rationale: El pasaje subraya la pequeñez y dependencia del orante ante Dios. Traducir con «esclavo» preserva la fuerza relacional y social del griego δοῦλος / παιδίσκη, en vez de atenuarla con un vocabulario eclesiástico más suave.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para δοῦλος; principios de fidelidad lexical y transparencia'
- issue: Reproducción de la modestia cognitiva en la segunda mitad del verso
  english_pob_reading: less in understanding of judgment and laws
  chosen_spanish_reading: con menos entendimiento para juzgar y para las leyes
  alternative_spanish_readings:
  - falto de entendimiento para juzgar y para las leyes
  - menos entendido en el juicio y en las leyes
  rationale: La frase griega no solo indica ignorancia general, sino insuficiencia para desempeñar una tarea de discernimiento/juicio conforme a la ley. La formulación elegida mantiene esa tensión entre carencia intelectual y capacidad judicial.
  doctrine_reference: 'Principio de equivalencia óptima: conservar el alcance funcional del comparativo ἐλάσσων sin sobreexplicar'
translation_notes:
  revision_awareness: El texto inglés del expediente pasó por una corrección que restauró ‘slave’ frente a ‘servant’ y mantuvo la idea de insuficiencia cognitiva. La versión española sigue esa lectura final y evita suavizar δοῦλος / παιδίσκη. También toma en cuenta que la revisión inglesa alternó entre ‘too small’ y ‘lacking’; aquí se resolvió con una formulación española que refleja la carencia relativa sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene «esclavo/esclava» como equivalente regular de δοῦλος/pαιδίσκη cuando el contexto enfatiza subordinación.
  - «Entendimiento» se usa para σύνεσις y se combina con una construcción verbal para evitar una traducción demasiado abstracta.
  - «Juzgar» y «las leyes» conservan el campo jurídico explícito de κρίσεως / νόμων.
  - El registro es reverente pero no arcaizante, en línea con un español bíblico moderno y digno.
