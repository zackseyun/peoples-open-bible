    rationale: Aunque sigue de cerca «seed of the field», en español no es la formulación más natural para grano reservado para sembrar. «Para semilla para el campo» conserva cercanía y mejora la legibilidad.
  - severity: low
    issue: «para los de sus casas» es algo coloquial y potencialmente impreciso
    rationale: La frase hebrea se refiere a las personas de sus hogares. Una formulación como «para los que están en sus casas» expresa mejor el referente humano sin dureza ni ambigüedad.
