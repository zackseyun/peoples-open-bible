translation:
  language: es
  text: Porque conspiraron juntos de un solo corazón[a][b]; contra ti hacen un pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «cortan un pacto contra ti».'
    reason: lexical_alternative
  - marker: b
