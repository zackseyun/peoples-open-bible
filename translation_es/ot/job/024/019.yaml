translation:
  language: es
  text: La sequía y el calor también arrebatan las aguas de la nieve[a]; así Sheol se lleva a los que han pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el deshielo de la nieve». El hebreo dice literalmente «las aguas de la nieve».
    reason: lexical_alternative
  - marker: b
    text: «Sheol» es el término hebreo para el ámbito de los muertos; alternativamente, «el sepulcro».
    reason: alternative_reading
lexical_decisions:
- source_word: צִיָּה
  english_pob_choice: drought
  chosen_spanish: sequía
  alternatives_spanish:
  - aridez
  - tierra seca
  lexicon: HALOT
  rationale: El hebreo nombra una condición de extrema falta de agua; «sequía» conserva esa idea de desecación y suena natural en español poético, en paralelo con «calor».
- source_word: גַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: Marca la suma del segundo miembro del paralelismo («sequía y calor también»), manteniendo el valor aditivo del hebreo.
- source_word: חֹם
  english_pob_choice: heat
  chosen_spanish: calor
  alternatives_spanish:
  - tiempo caluroso
  - ardor
  lexicon: HALOT
  rationale: Es la equivalencia más directa y clara para el sustantivo en este contexto poético.
- source_word: יִגְזְלוּ
  english_pob_choice: snatch away
  chosen_spanish: arrebatan
  alternatives_spanish:
  - roban
  - quitan
  - arrancan
  lexicon: HALOT
  rationale: El verbo גזל expresa quitar por la fuerza o robar; «arrebatan» reproduce bien la violencia de la imagen sin exigir un sujeto personal.
- source_word: מֵימֵי שֶׁלֶג
  english_pob_choice: the waters of snow
  chosen_spanish: las aguas de la nieve
  alternatives_spanish:
  - las aguas de la nieve derretida
  - el agua de la nieve
  lexicon: HALOT
  rationale: Mantiene la literalidad poética del hebreo («aguas de nieve»), sin cerrar el sentido a una sola interpretación como «deshielo», que el texto no especifica de manera explícita.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva la transliteración para respetar el término hebreo y su amplitud semántica, evitando reducirlo a una noción doctrinal posterior.
- source_word: חָטָאוּ
  english_pob_choice: those who have sinned
  chosen_spanish: los que han pecado
  alternatives_spanish:
  - pecadores
  - los que pecaron
  lexicon: HALOT
  rationale: El perfecto plural pide una referencia personal explícita en español; «los que han pecado» conserva el valor verbal mejor que el sustantivo «pecadores» y mantiene la relación con Sheol como sujeto.
theological_decisions:
- issue: Sentido de שְׁאוֹל
  english_pob_reading: Sheol is retained as a transliteration referring to the realm of the dead.
  chosen_spanish_reading: Sheol se conserva como transliteración que designa el ámbito de los muertos.
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  - la muerte
  rationale: La comparación poética no exige identificar aquí a Sheol con «infierno» ni con un concepto doctrinal más específico. Mantener el hebraísmo preserva la ambigüedad original y la lectura auditada del POB inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene la lectura auditada con acuerdo moderado y sin ajustes necesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se conserva «Sheol» por tratarse de un término técnico hebreo con amplitud semántica no reducible en el contexto.
  - «Pecado» se traduce con el verbo «pecar» para respetar el valor verbal del perfecto plural hebreo.
