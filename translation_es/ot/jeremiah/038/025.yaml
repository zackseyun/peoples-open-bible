translation:
  language: es
  text: Pero si los oficiales escuchan que he hablado contigo[a], y vienen a ti y te dicen, «Por favor, dinos lo que dijiste al rey; no nos lo ocultes, y no te daremos muerte, y lo que el rey te dijo»,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los príncipes», refiriéndose a los líderes reales o gobernantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La combinación introduce una condición continuada con matiz de contraste respecto de la instrucción anterior; «Pero si» conserva esa continuidad y el valor adversativo suave en español natural.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los jefes
  lexicon: HALOT
  rationale: En este contexto cortesano, שָׂרִים designa líderes del gobierno o de la corte; «oficiales» evita la ambigüedad de «príncipes» y sigue la decisión del POB inglés.
- source_word: דִבַּרְתִּי אִתָּךְ
  english_pob_choice: I have spoken with you
  chosen_spanish: he hablado contigo
  alternatives_spanish:
  - hablé contigo
  - he conversado contigo
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con presente perfecto español para mantener la acción completada con relevancia inmediata dentro de la condición; «he hablado» es fiel y natural.
- source_word: הַגִּידָה נָּא לָנוּ
  english_pob_choice: Please tell us
  chosen_spanish: Por favor, dinos
  alternatives_spanish:
  - Por favor, decláranos
  - Dinos, por favor
  lexicon: HALOT
  rationale: El imperativo de נגד con נָא expresa ruego insistente; «Por favor, dinos» transmite cortesía y urgencia sin perder claridad.
- source_word: מַה דִּבַּרְתָּ אֶל הַמֶּלֶךְ
  english_pob_choice: what you said to the king
  chosen_spanish: lo que hablaste con el rey
  alternatives_spanish:
  - lo que dijiste al rey
  - lo que hablaste al rey
  lexicon: HALOT
  rationale: «Hablar con» refleja mejor el contenido de una conversación que «decir a» en este punto; se mantiene la referencia al rey y el objeto implícito del discurso.
- source_word: אַל תְּכַחֵד מִמֶּנּוּ
  english_pob_choice: do not hide it from us
  chosen_spanish: no lo ocultes de nosotros
  alternatives_spanish:
  - no nos lo escondas
  - no lo encubras de nosotros
  lexicon: HALOT
  rationale: כחד significa ocultar/encubrir; «ocultes» conserva la fuerza semántica y el pronombre «lo» recupera naturalmente el contenido pedido.
- source_word: וְלֹא נְמִיתֶךָ
  english_pob_choice: and we will not put you to death
  chosen_spanish: y no te daremos muerte
  alternatives_spanish:
  - y no te mataremos
  - y no te haremos morir
  lexicon: HALOT
  rationale: El hifil de מות es causativo; «daremos muerte» mantiene precisión formal y evita suavizar el valor jurídico/amenazante del original.
- source_word: וּמַה דִּבֶּר אֵלֶיךָ הַמֶּלֶךְ
  english_pob_choice: and what the king said to you
  chosen_spanish: y lo que el rey te habló
  alternatives_spanish:
  - y lo que el rey te dijo
  - y lo que el rey habló contigo
  lexicon: HALOT
  rationale: Se conserva la clausula final coordinada como en el hebreo; «te habló» sigue el paralelo con la primera mención del intercambio verbal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó el guion largo antes de la cláusula final por una coma para reflejar mejor la continuidad del discurso directo; por eso el español mantiene la enumeración continua dentro de las comillas sin ruptura fuerte.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento directo en segunda persona singular, acorde con el hebreo.
  - Se preservó la secuencia de discurso citado continua, sin separar artificialmente la cláusula final.
  - Se eligió terminología administrativa («oficiales») para שָׂרִים, en línea con el audit trail inglés y el contexto cortesano.
  - No se introdujo un equivalente litúrgico o eclesiástico ajeno al contexto del pasaje.
