translation:
  language: es
  text: Como quien ata una piedra en una honda[a], así es el que da honor a un necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Como quien coloca una piedra en un montón de piedras, así es el que da honor a un necio». El término hebreo traducido «honda» es léxicamente incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/צְר֣וֹר
  english_pob_choice: Like one who binds
  chosen_spanish: Como quien sujeta
  alternatives_spanish:
  - Como quien ata
  - Como quien amarra
  lexicon: HALOT
  rationale: El verbo transmite la acción concreta de atar o sujetar algo con firmeza. «Sujeta» suena natural en español y conserva la imagen proverbial sin volverse demasiado coloquial; «ata» y «amarra» son posibles, pero menos precisos en registro para este contexto sapiencial.
- source_word: אֶ֭בֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una piedra
  - una roca
  lexicon: HALOT
  rationale: El hebreo designa una piedra común. «Piedra» es la opción más natural y directa en español; «roca» sería demasiado grande y alteraría la imagen.
- source_word: בְּ/מַרְגֵּמָ֑ה
  english_pob_choice: in a sling
  chosen_spanish: en una honda[a]
  alternatives_spanish:
  - en una honda
  - en un montón de piedras
  lexicon: HALOT
  rationale: Sigo la lectura contextual más adoptada, «honda», porque mantiene el cuadro de una piedra colocada o fijada en un instrumento de lanzamiento. La alternativa «montón de piedras» se preserva en la nota por la incertidumbre léxica del término hebreo.
- source_word: נוֹתֵ֖ן
  english_pob_choice: one who gives
  chosen_spanish: el que da
  alternatives_spanish:
  - quien da
  - el que otorga
  lexicon: HALOT
  rationale: El participio expresa una acción general y proverbial. «El que da» conserva ese valor genérico de manera clara y sobria.
- source_word: לִ/כְסִ֣יל
  english_pob_choice: to a fool
  chosen_spanish: a un necio
  alternatives_spanish:
  - a un necio
  - a un insensato
  lexicon: HALOT
  rationale: En Proverbios, כְסִיל se refiere al necio obstinado y moralmente torpe. «Necio» es el equivalente tradicional y preciso en español; «insensato» es posible, pero algo más atenuado.
- source_word: כָּבֽוֹד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  lexicon: HALOT
  rationale: En este contexto sapiencial, el sentido es la estimación o dignidad conferida a alguien. «Honra» evita la sonoridad más abstracta de «gloria» y funciona bien en español bíblico sin desdibujar el matiz social del término.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión revisada del audit trail inglés: se mantiene la comparación explícita («Como quien… así es…») y la imagen concreta de una piedra en una honda, preservando la alternativa textual/lexical en nota por la incertidumbre de מַרְגֵּמָה.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se traduce כְּסִיל con «necio» para mantener la fuerza sapiencial habitual en Proverbios.
  - «Honra» se eligió frente a «gloria» para evitar una elevación semántica innecesaria en un proverbio de contraste práctico.
  - La nota al pie marca la ambigüedad del término hebreo y no introduce una nueva interpretación no presente en el expediente inglés.
