revisions:
- from: Entonces descendió y levantó sus manos sobre toda la asamblea de Israel[a], con la bendición de Yahvé en sus labios[b], y se gloriaba en el nombre de Yahvé.
  to: Entonces descendió y levantó sus manos sobre toda la asamblea de Israel, con la bendición de Yahvé en sus labios[a], y se glorió[b] en el nombre de Yahvé.
  rationale: La revisión corrige un imperfecto narrativamente inadecuado y alinea las notas con el expediente inglés y con las decisiones léxicas/hebreo-griegas documentadas. El texto principal permanece sustancialmente igual porque ya era fiel y natural en español.
