review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia imperativa, el referente de הַחֹשֶׁן como pectoral, y la ubicación de los anillos en los dos extremos del pectoral. Sin embargo, la nota [a] está mal anclada y no preserva la alternativa inglesa real: el texto español principal ya dice «dos anillos de oro», mientras que la alternativa documentada es el orden «dos anillos de oro / dos anillos de oro» en inglés, que en español debe distinguirse como «dos anillos de oro» frente a «dos anillos áureos» no es natural; la mejor preservación es usar en el texto «dos anillos de oro» y en nota «O: «dos anillos de oro»» no añade nada. Por tanto, la nota [a] debe eliminarse. La nota [b] sí preserva correctamente la alternativa «en los dos extremos».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Harás… y pondrás…» funciona bien para el tono instructivo. «Pectoral» es terminología bíblica adecuada. «Sobre los dos extremos» suena aceptable, aunque «en los dos extremos» es la alternativa bien recogida en nota. El principal problema de calidad es paratextual: una nota redundante y mal justificada.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Pectoral» para חֹשֶׁן es correcto en este contexto. No aparecen términos teológicos sensibles del glosario global.
  issues:
  - severity: medium
    issue: La nota [a] es redundante y no preserva una alternativa real en español.
    rationale: 'El texto principal ya dice «dos anillos de oro». Repetir exactamente la misma frase en una nota «O: «dos anillos de oro»» no comunica una variante léxica útil ni refleja de forma funcional la alternativa inglesa «two rings of gold».'
  - severity: low
    issue: El anclaje de [a] en «pectoral» no corresponde al segmento al que supuestamente afecta.
    rationale: La nota léxica trata de «dos anillos de oro», no de «pectoral». Las notas deben anclarse en la palabra o frase pertinente; si la nota se elimina, el problema desaparece.
  revised_spanish_text: Harás dos anillos de oro sobre el pectoral, y pondrás los dos anillos sobre los dos extremos del pectoral[b].
  revised_footnotes:
  - marker: b
    text: 'O: «en los dos extremos del pectoral».'
    reason: lexical_alternative
  revision_rationale: Se elimina la nota [a] porque es redundante en español y estaba anclada al lugar equivocado. Se conserva la nota [b], que sí transmite una alternativa espacial genuina documentada en la auditoría inglesa.
