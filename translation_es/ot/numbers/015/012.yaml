translation:
  language: es
  text: Según el número que harán[a], así harán para cada uno según su número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Según el número que preparen, así prepararán para cada uno según su número». El hebreo עשה comúnmente significa «hacer» o «preparar»; aquí «preparar» puede aclarar el contexto sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּ/מִּסְפָּר
  english_pob_choice: According to the number
  chosen_spanish: Según la cantidad
  alternatives_spanish:
  - De acuerdo con el número
  - Según el número
  lexicon: HALOT
  rationale: El prefijo comparativo כַּ- pide una equivalencia o ajuste proporcional. En español, «según la cantidad» comunica con naturalidad la idea de medida o proporción sin perder el sentido de conteo del sustantivo מִסְפָּר.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - lo cual
  lexicon: HALOT
  rationale: Introduce una relativa simple y natural en español para modificar «cantidad». Mantiene la relación sintáctica sin sobrecargar el estilo.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you prepare
  chosen_spanish: hagáis
  alternatives_spanish:
  - hagáis la preparación
  - prepareis
  - hagan
  lexicon: HALOT
  rationale: 'El verbo עשה es amplio: «hacer», «preparar», «disponer». En este contexto cultual, el inglés POB usa «prepare» para aclarar la acción sacrificial; en español, «hacer» permite conservar esa amplitud sin introducir un objeto no explicitado, y el contexto ritual lo hace inteligible.'
- source_word: כָּכָה
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de este modo
  lexicon: HALOT
  rationale: Corresponde al adverbio correlativo del inicio. «Así» es la forma más directa y natural para expresar la consecuencia o correspondencia del mandato.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall prepare
  chosen_spanish: haréis
  alternatives_spanish:
  - prepararéis
  - haréis ustedes
  lexicon: HALOT
  rationale: Se mantiene la repetición del mismo verbo básico para reflejar el paralelismo hebreo. El futuro de mandato en español comunica el valor prescriptivo de la instrucción.
- source_word: לָ/אֶחָד
  english_pob_choice: for each one
  chosen_spanish: por cada uno
  alternatives_spanish:
  - para cada uno
  - a cada uno
  lexicon: HALOT
  rationale: La forma distributiva pide un español igualmente distributivo. «Por cada uno» expresa bien que la norma se aplica individualmente a cada caso contado.
- source_word: כְ/מִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su cantidad
  alternatives_spanish:
  - de acuerdo con su número
  - conforme a su número
  lexicon: HALOT
  rationale: El sufijo plural remite a los elementos contados. «Su cantidad» conserva el referente colectivo sin forzar una referencia demasiado literal al plural pronominal en español.
translation_notes:
  revision_awareness: 'El hebreo repite dos veces el verbo עשה y estructura la frase con paralelismo proporcional: primero «según la cantidad...», luego «así... por cada uno según su cantidad». La versión española conserva ese paralelismo y la repetición verbal, pero opta por un verbo general («hacer») en lugar de «preparar», porque el contexto ritual ya aporta la aclaración necesaria y así se mantiene mejor la elasticidad semántica del original.'
  spanish_consistency_notes:
  - Se conserva el tono normativo con futuro de mandato («haréis») para reflejar la instrucción legal.
  - Se evita introducir términos sacrificiales no presentes explícitamente en el hebreo.
  - «Cantidad» traduce el campo semántico de מִסְפָּר en un registro natural para una norma de reparto o medida.
