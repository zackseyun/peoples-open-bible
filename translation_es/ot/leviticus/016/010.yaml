translation:
  language: es
  text: Pero el macho cabrío sobre el cual cayó la suerte para Azazel[a] será presentado vivo delante de Yahvé, para hacer expiación sobre él[b], para enviarlo al desierto a Azazel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'chivo expiatorio'. El término hebreo 'Azazel' es debatido; puede ser un nombre propio o una expresión asociada con la remoción.
    reason: alternative_reading
  - marker: b
    text: O 'para hacer expiación por él'. El hebreo puede leerse con el matiz de beneficio para el animal o como parte del rito asociado con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשָּׂעִיר
  english_pob_choice: But the goat
  chosen_spanish: Pero el macho cabrío
  alternatives_spanish:
  - Y el macho cabrío
  - Pero el cabro
  lexicon: HALOT
  rationale: שָׂעִיר designa un macho cabrío; en español, 'macho cabrío' conserva mejor la especificidad léxica que solo 'cabra/cabra macho'. Mantengo 'Pero' para reflejar el contraste con el otro animal del contexto ritual.
- source_word: אֲשֶׁר עָלָה עָלָיו הַגּוֹרָל
  english_pob_choice: on which the lot ... fell
  chosen_spanish: sobre el cual cayó la suerte
  alternatives_spanish:
  - sobre el cual salió la suerte
  - al cual le correspondió la suerte
  lexicon: HALOT
  rationale: El idiomático hebreo expresa la asignación por sorteo. 'Cayó la suerte' reproduce la imagen de selección por sorteo con naturalidad en español y conserva el valor pasivo del original.
- source_word: לַעֲזָאזֵל
  english_pob_choice: for Azazel
  chosen_spanish: para Azazel
  alternatives_spanish:
  - para el chivo emisario
  - para completa remoción
  lexicon: HALOT
  rationale: Se conserva 'Azazel' por la decisión auditada de no resolver el término debatido en el texto principal. 'Para' respeta el dativo direccional del hebreo y deja abierta la interpretación.
- source_word: יָעֳמַד
  english_pob_choice: shall be presented
  chosen_spanish: será presentado
  alternatives_spanish:
  - será hecho estar
  - será puesto de pie
  lexicon: HALOT
  rationale: El Hophal sugiere una acción hecha sobre el macho cabrío. 'Será presentado' es la forma más natural en español para una presentación cultual ante Yahvé y mantiene la pasividad/cadencia del hebreo sin sonar forzado.
- source_word: חַי
  english_pob_choice: alive
  chosen_spanish: vivo
  alternatives_spanish:
  - con vida
  - viviente
  lexicon: HALOT
  rationale: '''Vivo'' es el equivalente más directo y claro en español; mantiene el contraste ritual con el macho cabrío sacrificado.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La preposición cultual לִפְנֵי se vierte de manera natural como 'delante de' / 'ante'. Se sigue el término de proyecto 'Yahvé' para el Tetragrámaton, no el ocultamiento con 'SEÑOR'.
- source_word: לְכַפֵּר עָלָיו
  english_pob_choice: to make atonement over it
  chosen_spanish: para hacer expiación sobre él
  alternatives_spanish:
  - para hacer expiación por él
  - para expiarlo
  lexicon: HALOT
  rationale: כפר en contexto sacrificial puede expresarse como 'expiación' en español bíblico-teológico. Se conserva 'sobre él' para no resolver la relación exacta entre el rito y el animal; 'por él' sería más interpretativo.
- source_word: לְשַׁלַּח אֹתוֹ
  english_pob_choice: to send it away
  chosen_spanish: para enviarlo
  alternatives_spanish:
  - para mandarlo fuera
  - para soltarlo
  lexicon: HALOT
  rationale: El infinitivo final indica propósito. 'Enviarlo' comunica bien la acción ritual de remoción sin añadir matices no presentes en el hebreo.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al desierto / a la estepa
  - al desierto
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse 'desierto' o 'desierto/estepa' según contexto. Aquí, 'al desierto' funciona de modo claro en español y conserva la idea de zona apartada; la dirección la da el movimiento implícito del verbo.
theological_decisions:
- issue: Término debatido עֲזָאזֵל
  english_pob_reading: Azazel (transliterated) with footnote noting 'scapegoat' as alternative
  chosen_spanish_reading: Azazel, transliterado, con nota que conserva 'chivo expiatorio' como alternativa interpretativa
  alternative_spanish_readings:
  - chivo expiatorio
  - el de la completa remoción
  rationale: La traducción principal no resuelve el debate léxico-teológico. Se mantiene la transliteración para respetar la primacía del original y no borrar la tensión documentada por el POB en inglés. La nota permite al lector ver la lectura histórica 'chivo expiatorio' sin imponerla.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original), §3 (preservar tensión teológica)
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'be made to stand alive' por 'be presented alive' para mayor naturalidad; la redacción española sigue esa revisión con 'será presentado vivo'. También se mantiene la decisión revisada de conservar la ambigüedad de Azazel y de traducir el movimiento final como envío/remoción al desierto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'Azazel' en el texto principal y se explica la alternativa interpretativa en nota.
  - '''Expiación'' se usa como equivalente cultual de כפר, evitando simplificarlo a ''perdón''.'
  - Se prefiere 'al desierto' por naturalidad en español, sin perder el valor direccional del hebreo.
