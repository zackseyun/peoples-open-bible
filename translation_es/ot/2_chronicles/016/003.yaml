base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/016/003.yaml
  text: There is a treaty between me and you[a], and between my father and your father. Look, I have sent you silver and gold. Go, break your treaty with Baasha king of Israel[b], so that he may withdraw from me.
  footnotes:
  - marker: a
    text: Or 'covenant' or 'alliance' for 'treaty' (Hebrew בְּרִית); here the context is a political pact between kings.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and he may go up from upon me'; the idiom likely means that Baasha would withdraw his pressure or military action from Asa.
    reason: lexical_alternative
