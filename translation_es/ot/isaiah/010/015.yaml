base_translation:
  language: en
  yaml_path: translation/ot/isaiah/010/015.yaml
  text: Does the axe boast over the one who chops with it? Or does the saw magnify itself over the one who wields it? As if a rod were to wield the one who lifts it up[a], or as if a staff were to lift up one who is not wood!
  footnotes:
