translation:
  language: es
  text: Cuando Amán vio que Mardoqueo no se inclinaba[a] ni se postraba delante de él, Amán se llenó de ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacía reverencia' y 'se postraba'. El hebreo usa dos verbos relacionados pero distintos para actos de obeisancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When Haman saw
  chosen_spanish: Cuando Amán vio
  alternatives_spanish:
  - Y Amán vio
  - Entonces Amán vio
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, 'Cuando' conserva el valor temporal natural sin forzar un calco sintáctico.
- source_word: כִּי אֵין מָרְדֳּכַי
  english_pob_choice: that Mordecai was ... not
  chosen_spanish: que Mardoqueo no
  alternatives_spanish:
  - que no había en Mardoqueo
  - que Mardoqueo no estaba
  lexicon: HALOT
  rationale: La combinación de אֵין con los participios expresa una negación continua de la acción; en español se naturaliza como 'que Mardoqueo no...' sin perder el aspecto durativo.
- source_word: כֹּרֵעַ
  english_pob_choice: bowing down
  chosen_spanish: se inclinaba
  alternatives_spanish:
  - se arrodillaba
  - hacía reverencia
  lexicon: HALOT
  rationale: כָּרַע alude a doblar la rodilla o inclinarse. 'Se inclinaba' preserva el gesto corporal sin sobreespecificar 'arrodillarse'.
- source_word: וּמִשְׁתַּחֲוֶה
  english_pob_choice: paying homage to him
  chosen_spanish: se postraba
  alternatives_spanish:
  - hacía homenaje
  - se prosternaba
  lexicon: HALOT
  rationale: הִשְׁתַּחֲוָה suele denotar postración u acto de obeisancia. 'Se postraba' mantiene la distinción respecto de כֹּרֵעַ y suena natural en español bíblico contemporáneo.
- source_word: לּוֹ
  english_pob_choice: to him / before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - para él
  lexicon: HALOT
  rationale: Aunque literalmente es 'a él', en español el marco gestual de reverencia se expresa mejor con 'delante de él', que refleja la dirección relacional del acto.
- source_word: וַיִּמָּלֵא ... חֵמָה
  english_pob_choice: was filled with rage
  chosen_spanish: se llenó de ira
  alternatives_spanish:
  - se llenó de furia
  - ardió de ira
  lexicon: HALOT
  rationale: Se conserva el idiomático 'se llenó de...'. חֵמָה se vierte como 'ira' para un registro digno y claro; 'ira' evita una carga demasiado coloquial de 'rabia' y mantiene la intensidad.
- source_word: חֵמָה
  english_pob_choice: rage
  chosen_spanish: ira
  alternatives_spanish:
  - furia
  - enojo
  lexicon: HALOT
  rationale: En este contexto narrativo, 'ira' comunica bien la indignación intensa de Amán sin introducir matices teológicos ajenos.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anclando la nota al término correspondiente en el texto: ''[a]'' aparece junto a ''se inclinaba''. Se mantuvo la distinción verbal del hebreo entre כֹּרֵעַ y וּמִשְׁתַּחֲוֶה, como en el audit trail inglés, pero con español natural y publicación-readable.'
  spanish_consistency_notes:
  - Se usa 'Amán' y 'Mardoqueo' de forma consistente con la tradición bíblica en español.
  - Se preserva la diferencia entre el gesto de inclinarse y el de postrarse, evitando fusionar ambos verbos.
  - Se emplea 'ira' por registro; 'furia' queda como alternativa semántica cercana.
