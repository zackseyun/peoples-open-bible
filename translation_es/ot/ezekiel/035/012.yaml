translation:
  language: es
  text: 'Entonces sabrás que yo soy Yahvé. He oído todas tus palabras de menosprecio[a] que hablaste contra los montes de Israel, diciendo: «Están desolados; nos han sido dados para comer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabras de revilings» o «palabras de menosprecio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrás
  alternatives_spanish:
  - Y sabrás
  - Y entonces sabrás
  lexicon: HALOT
  rationale: En discurso profético, el perfecto con waw suele expresar resultado futuro. «Entonces» conserva la consecuencia; «sabrás» es un futuro natural en español y evita un calco mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en español como «Yahvé», conforme a la política del proyecto de no sustituirlo por una máscara titulada.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - He escuchado
  - Oí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya realizada con relevancia presente; «he oído» reproduce bien esa fuerza sin perder naturalidad en español.
- source_word: נָאָצוֹתֶיךָ
  english_pob_choice: revilings
  chosen_spanish: palabras de menosprecio
  alternatives_spanish:
  - reproches despectivos
  - palabras de burla
  - palabras de escarnio
  lexicon: HALOT
  rationale: El sustantivo denota habla insolente o despectiva. «Palabras de menosprecio» mantiene el matiz de desprecio verbal sin cargar innecesariamente con un sentido técnico de blasfemia contra Dios.
- source_word: עַל הָרֵי יִשְׂרָאֵל
  english_pob_choice: against the mountains of Israel
  chosen_spanish: contra los montes de Israel
  alternatives_spanish:
  - contra las montañas de Israel
  - acerca de los montes de Israel
  lexicon: HALOT
  rationale: El עַל con discurso hostil se rinde mejor por «contra», no por mera referencia temática. «Montes» es un equivalente bíblico natural y claro en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Introductorio estándar de cita; «diciendo» fluye bien en español.
- source_word: שָׁמֵמָה
  english_pob_choice: They are desolate
  chosen_spanish: Están desolados
  alternatives_spanish:
  - Está desolada
  - Son una desolación
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular femenina, el referente colectivo son los montes/la tierra de Israel. En español, el plural concuerda naturalmente con el referente implícito.
- source_word: נִתְּנוּ לָנוּ לְאָכְלָה
  english_pob_choice: they have been given to us for food
  chosen_spanish: nos han sido dados para comer
  alternatives_spanish:
  - nos han sido dados como alimento
  - se nos han dado para devorarlos
  - han sido entregados a nosotros para alimento
  lexicon: HALOT
  rationale: La construcción pasiva comunica que han sido entregados para ser consumidos. «Para comer» conserva la imagen de alimento/consumo sin introducir una paráfrasis excesiva.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El versículo contiene explícitamente el Tetragrámaton. Se mantiene la traducción del nombre propio divino como «Yahvé», en continuidad con la política del proyecto y la lectura auditada en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: La auditoría inglesa pasó de «blasphemies» a «revilings» por mayor precisión léxica. La traducción española evita «blasfemias» y usa una expresión que conserva el valor de habla hostil y despectiva contra los montes de Israel, sin intensificar indebidamente el sentido hacia una ofensa específicamente contra Dios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la terminología del proyecto.
  - «Montes de Israel» preserva el registro bíblico y la referencia geográfica-teológica.
  - La cita final se conserva en estilo directo con comillas españolas, y la imagen de comida/alimento no se amplifica más allá del hebreo.
