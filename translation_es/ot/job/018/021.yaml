translation:
  language: es
  text: Ciertamente estas son las moradas del injusto[a], y este es el lugar[b] de quien no conoce a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del malvado» para «del injusto».
    reason: lexical_alternative
  - marker: b
    text: O «y este es el lugar de quien no conoce a Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Seguro
  lexicon: HALOT
  rationale: La partícula es enfática o aseverativa al cerrar el discurso; «Ciertamente» comunica bien ese valor en español natural, sin volverla restrictiva como «solo».
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - éstas
  lexicon: HALOT
  rationale: El demostrativo plural retoma lo descrito antes; «estas» conserva la referencia de cercanía textual.
- source_word: מִשְׁכְּנוֹת
  english_pob_choice: dwellings
  chosen_spanish: moradas
  alternatives_spanish:
  - habitaciones
  - viviendas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a lugares de habitación de modo general. «Moradas» mantiene el campo semántico y suena natural en español bíblico sin estrecharse a «tiendas».
- source_word: עַוָּל
  english_pob_choice: the unjust
  chosen_spanish: del injusto
  alternatives_spanish:
  - del malvado
  - del perverso
  lexicon: HALOT
  rationale: Se preserva la fuerza moral-jurídica de la palabra. El singular colectivo en español transmite la categoría de persona caracterizada por injusticia, como en la lectura inglesa del POB.
- source_word: וְזֶה
  english_pob_choice: and this is
  chosen_spanish: y este es
  alternatives_spanish:
  - y este
  lexicon: HALOT
  rationale: La conjunción más el demostrativo introducen una cláusula paralela resumidora; en español hace falta explicitar el verbo «es» para una frase idiomática y clara.
- source_word: מְקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el lugar de morada
  lexicon: HALOT
  rationale: Es la equivalencia más directa y conserva el paralelismo con «moradas» sin añadir información no presente en el hebreo.
- source_word: לֹא יָדַע אֵל
  english_pob_choice: one who does not know God
  chosen_spanish: quien no conoce a Dios
  alternatives_spanish:
  - quien no ha conocido a Dios
  - el que no conoce a Dios
  lexicon: HALOT
  rationale: «Conocer» conserva la fuerza relacional y de alianza del hebreo, no mera información intelectual. El giro con «quien» expresa de manera natural la cláusula relativa implícita.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: En este contexto de Job, אֵל se refiere al Dios verdadero; «Dios» es la traducción directa y suficiente, sin expandir innecesariamente el título.
theological_decisions:
- issue: Sentido de «no conoce a Dios»
  english_pob_reading: relational/moral knowledge of God rather than mere intellectual ignorance
  chosen_spanish_reading: conocimiento relacional y moral de Dios, no simple falta de datos
  alternative_spanish_readings:
  - solo ignorancia intelectual de Dios
  - no haber oído hablar de Dios
  rationale: La traducción mantiene el verbo «conocer» sin explicarlo de más, pero la formulación española deja intacta la carga bíblica de relación, reconocimiento y conducta delante de Dios.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: la revisión más reciente no introdujo cambios y el consenso de revisión es alto. La versión española sigue la misma lectura óptima-equivalente, manteniendo el paralelismo, la aseveración inicial y la ambigüedad controlada de «conocer a Dios».'
  spanish_consistency_notes:
  - Se conservó el singular colectivo en «del injusto» para reflejar el término hebreo, como hace el inglés con «the unjust».
  - Se eligió «moradas» en vez de «tiendas» o «habitaciones» para un español bíblico claro sin sobrerinterpretar el tipo de vivienda.
  - La cláusula relativa «quien no conoce a Dios» mantiene la tensión teológica sin convertirla en una paráfrasis doctrinal.
  - Se usó «Dios» y no una forma genérica, porque el hebreo אֵל aquí designa al Dios verdadero dentro del discurso de Job.
