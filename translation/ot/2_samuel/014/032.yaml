id: 2SA.14.32
reference: 2 Samuel 14:32
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אַבְשָׁל֣וֹם אֶל יוֹאָ֡ב הִנֵּ֣ה שָׁלַ֣חְתִּי אֵלֶ֣י/ךָ לֵ/אמֹ֡ר בֹּ֣א הֵ֠נָּה וְ/אֶשְׁלְחָה֩ אֹתְ/ךָ֨ אֶל הַ/מֶּ֜לֶךְ לֵ/אמֹ֗ר לָ֤/מָּה בָּ֨אתִי֙ מִ/גְּשׁ֔וּר ט֥וֹב לִ֖/י עֹ֣ד אֲנִי שָׁ֑ם וְ/עַתָּ֗ה אֶרְאֶה֙ פְּנֵ֣י הַ/מֶּ֔לֶךְ וְ/אִם יֶשׁ בִּ֥/י עָוֺ֖ן וֶ/הֱמִתָֽ/נִי־׀־־־־׃
translation:
  text: Absalom said to Joab[a], “Look, I sent word to you, saying, ‘Come here, so that I may send you to the king, to say, “Why have I come from Geshur? It would be better for me still to be there.”’ Now then, let me see the king’s face; and if there is guilt in me[b], let him put me to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “let me see the king’s face,” an idiom for appearing before the king.
    reason: lexical_alternative
  - marker: b
    text: Or, “Better for me if I were still there.” The Hebrew clause is elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Rendered with a natural modern discourse marker that still preserves the demonstrative force of drawing attention to Absalom's point.
- source_word: שָׁלַחְתִּי אֵלֶיךָ
  chosen: I sent word to you
  alternatives:
  - I sent to you
  - I sent for you
  lexicon: HALOT
  rationale: The idiom with שלח plus indirect object in this context refers to sending a message or summons, not physically sending an object. 'Sent word to you' communicates the intended sense clearly.
- source_word: בֹּא הֵנָּה
  chosen: Come here
  alternatives:
  - Come here now
  - Come hither
  lexicon: HALOT
  rationale: A direct imperative plus deictic adverb; 'Come here' is the most natural contemporary equivalent.
- source_word: וְאֶשְׁלְחָה אֹתְךָ אֶל הַמֶּלֶךְ
  chosen: so that I may send you to the king
  alternatives:
  - and I will send you to the king
  - that I might send you to the king
  lexicon: HALOT
  rationale: The cohortative expresses purpose following the summons. 'So that I may send you' captures the intended function better than a simple future.
- source_word: לָמָּה בָּאתִי מִגְּשׁוּר
  chosen: Why have I come from Geshur?
  alternatives:
  - Why did I come from Geshur?
  - Why was I brought back from Geshur?
  lexicon: HALOT
  rationale: The Hebrew verb is first person singular 'I came,' not a passive or causative. Present perfect English fits the current-result force in Absalom's complaint.
- source_word: טוֹב לִי עוֹד אֲנִי שָׁם
  chosen: It would be better for me still to be there
  alternatives:
  - It was better for me when I was still there
  - Better for me if I were still there
  lexicon: HALOT
  rationale: This clause is elliptical in Hebrew. The chosen rendering makes the implied comparison explicit in idiomatic English while preserving Absalom's meaning that remaining in Geshur would have been preferable.
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a transition from complaint to demand. 'Now then' preserves the rhetorical pivot.
- source_word: אֶרְאֶה פְּנֵי הַמֶּלֶךְ
  chosen: let me see the king’s face
  alternatives:
  - let me appear before the king
  - let me see the king
  lexicon: HALOT
  rationale: Literally 'see the face of the king,' an idiom for appearing before him. The more literal rendering preserves the Hebrew imagery while remaining understandable.
- source_word: עָוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - sin
  lexicon: HALOT
  rationale: עון can denote guilt or iniquity, including culpability for wrongdoing. 'Guilt' fits the judicial context of Absalom's challenge to the king.
- source_word: וֶהֱמִתָנִי
  chosen: let him put me to death
  alternatives:
  - let him kill me
  - then let him execute me
  lexicon: HALOT
  rationale: The Hiphil of מות is causative, 'cause me to die.' 'Put me to death' is idiomatic and suitably grave, without over-specifying a formal legal execution.
