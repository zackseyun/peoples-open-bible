translation:
  language: es
  text: Así, los aseritas vivieron entre los cananeos[a], los habitantes de la tierra, porque no los expulsaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa aquí formas singulares colectivas: «el aserita ... el cananeo ... no lo expulsó». La traducción española expresa el sentido colectivo que exige el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: vivieron
  alternatives_spanish:
  - habitaron
  - moraron
  - residieron
  lexicon: HALOT
  rationale: El verbo ישׁב puede expresar sentarse, habitar o vivir. En este contexto narrativo, «vivieron» comunica de manera natural y fiel la idea de residir entre otro pueblo, sin volver la frase arcaica.
- source_word: הָאָשֵׁרִי
  english_pob_choice: the Asherites
  chosen_spanish: los aseritas
  alternatives_spanish:
  - Asher
  - la tribu de Aser
  lexicon: HALOT
  rationale: La forma gentilicia singular con artículo funciona colectivamente para el grupo tribal. En español, «los aseritas» preserva ese sentido colectivo y evita la impresión de un individuo llamado Asher.
- source_word: בְּקֶרֶב
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - en el centro de
  lexicon: HALOT
  rationale: בְּקֶרֶב indica estar en medio de un grupo. «Entre» es la opción española más natural y expresa bien la convivencia en el mismo ámbito humano.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, aquí tiene sentido colectivo. El plural español refleja mejor ese valor colectivo, en paralelo con el participio plural que sigue.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los que habitaban la tierra
  - los moradores de la tierra
  lexicon: HALOT
  rationale: El sintagma participial identifica a los cananeos. «Los habitantes de la tierra» es claro, fiel y mantiene la función explicativa del hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación precedente. «Porque» expresa con precisión y naturalidad esa relación causal en español contemporáneo.
- source_word: לֹא הוֹרִישׁוֹ
  english_pob_choice: they did not drive them out
  chosen_spanish: no los expulsaron
  alternatives_spanish:
  - no los desalojaron
  - no los echaron
  lexicon: HALOT
  rationale: El hifil de ירשׁ en Jueces refiere a expulsar o desposeer a los habitantes. En español, «expulsaron» transmite esa fuerza de manera idiomática; el plural sigue el sentido colectivo documentado por la POB inglesa.
theological_decisions:
- issue: Formas colectivas en singular del hebreo
  english_pob_reading: Render both tribal and ethnic singular forms collectively in idiomatic English.
  chosen_spanish_reading: 'Traducir de modo colectivo e idiomático: «los aseritas ... los cananeos ... no los expulsaron».'
  alternative_spanish_readings:
  - «Aser vivió entre el cananeo ... porque no lo expulsó»
  - «el aserita vivió entre el cananeo ... porque no lo expulsó»
  rationale: El hebreo usa singulares colectivos para la tribu y el pueblo. Un singular literal en español sugeriría indebidamente una persona individual; la lectura colectiva conserva el sentido histórico y narrativo del pasaje.
  doctrine_reference: 'Philosophy of translation: optimal equivalence; preservar el sentido colectivo del texto fuente sin forzar el español.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto fuente inglés: no se registran cambios aplicados en el pasaje y el acuerdo del revisor fue alto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - Se usa «expulsaron» para reflejar la fuerza del hifil de ירשׁ, en continuidad con la decisión inglesa de «drive them out».
  - Se conserva el plural colectivo para tribu y etnia, evitando una lectura individualizante del hebreo.
