  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. Se preserva correctamente el masculino de אִישׁ / אַנְשֵׁי, y «nuera», «suegra», «desprecio» son decisiones adecuadas al contexto y al rationale documentado.
