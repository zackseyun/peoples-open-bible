revisions:
- from: Porque, sabiendo que ser devoto no es irracional, no se resistieron a los dolores.
  to: Porque, sabiendo que ser devoto no es irracional, no se opusieron a los padecimientos.
  rationale: Se ajusta únicamente la cola verbal para un español más natural y una mejor correspondencia contextual con μὴ ἀνθίστασθαι τοῖς πόνοις. «No se opusieron a los padecimientos» preserva el sentido de no resistir ni echarse atrás ante el sufrimiento, y «padecimientos» refleja mejor el contexto martirial que «dolores».
