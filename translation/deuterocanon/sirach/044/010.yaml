translation:
  text: But these were men of mercy, whose righteous deeds[b] were not forgotten;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Cairo Geniza Hebrew for this line is difficult and appears mismatched here; taken more literally, it reads something like, 'As though they had not been, they were, and their children after them.' The main text follows the coherent Greek parallel for this verse.
    reason: textual_variant
  - marker: b
    text: Or 'acts of justice' for 'righteous deeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλʼ ἢ / כאשר
  chosen: But these
  alternatives:
  - Rather, these
  - As if they had not been
  lexicon: LSJ / HALOT
  rationale: The Hebrew in Zone 1 is difficult and likely mismatched or corrupt in this line ('כאשר לא היו היו'), while the Greek parallel provides a coherent adversative transition from the previous verse's mention of those without memorial. The translation therefore follows the Greek sense for the clause opening, while keeping the Hebrew witness in view as uncertain.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - people
  - menfolk
  lexicon: BDAG / LSJ
  rationale: The Greek explicitly uses the masculine plural 'men.' Per project philosophy, gender-accurate language is preferred where the source is masculine and representative.
- source_word: ἐλέους
  chosen: of mercy
  alternatives:
  - merciful
  - of compassion
  lexicon: BDAG / LSJ
  rationale: The genitive construction is well represented by 'men of mercy,' preserving the Hebrew-style characterization reflected in the Greek.
- source_word: δικαιοσύναι
  chosen: righteous deeds
  alternatives:
  - righteousnesses
  - acts of justice
  lexicon: BDAG / LSJ
  rationale: The plural points to concrete expressions of righteousness rather than an abstract quality alone. 'Righteous deeds' is natural English and preserves the plural's practical force.
- source_word: οὐκ ἐπελήσθησαν
  chosen: were not forgotten
  alternatives:
  - were not neglected
  - did not pass from memory
  lexicon: BDAG / LSJ
  rationale: This is the plain sense of the Greek verb. It also fits the immediate contrast with the previous verse's loss of remembrance.
