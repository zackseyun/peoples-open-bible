translation:
  language: es
  text: Los asnos fueron 30.500[a], y su tributo a Yahvé fue 61.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su leva'. El término hebreo se refiere a la porción tasada del botín apartada para Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/חֲמֹרִים
  english_pob_choice: The donkeys
  chosen_spanish: Los asnos
  alternatives_spanish:
  - Los burros
  - Los pollinos
  lexicon: HALOT
  rationale: חֲמֹרִים es el plural común de 'donkeys'. En español bíblico-neutral, 'asnos' conserva el referente exacto y suena más natural que 'burros' en un registro sobrio. Se omite el valor conjuntivo inicial, como en la lista censal hebrea y en la decisión inglesa.
- source_word: שְׁלֹשִׁים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: 30,500
  chosen_spanish: '30.500'
  alternatives_spanish:
  - treinta mil quinientos
  lexicon: HALOT
  rationale: La secuencia cardinal hebrea expresa un total exacto. Se usan cifras por la naturaleza inventarial del versículo y por claridad de lectura; en español se adapta la puntuación numérica con punto decimal de miles en formato latino.
- source_word: וּ/מִכְסָ֥/ם
  english_pob_choice: their tribute
  chosen_spanish: su tributo
  alternatives_spanish:
  - su levadura
  - su impuesto
  - su cuota
  lexicon: HALOT
  rationale: מִכְסָם designa la porción tasada apartada del botín para Yahvé. 'Tributo' comunica mejor que 'impuesto' o 'cuota' el carácter obligatorio y consagrado de la porción en este contexto de guerra y culto.
- source_word: לַֽ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La forma española POB para el Tetragrama es 'Yahvé'. El ל introductorio marca destino/entrega de la porción; 'para Yahvé' conserva esa relación de pertenencia y dedicación, sin ocultar el nombre divino.
- source_word: אֶחָ֥ד וְ/שִׁשִּֽׁים
  english_pob_choice: '61'
  chosen_spanish: '61'
  alternatives_spanish:
  - sesenta y uno
  lexicon: HALOT
  rationale: El hebreo da la cantidad exacta del tributo. Se mantiene en cifra por consistencia con el total precedente y por el estilo de inventario del texto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política española del proyecto exige 'Yahvé' para יְהוָה. Aquí no hay motivo para enmascarar el nombre con 'SEÑOR'; además, el contexto de la porción dedicada al Dios de Israel preserva el valor teológico del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el sentido estable del texto masorético y con la auditoría inglesa: lista censal, cifra exacta y porción apartada para Yahvé. No hay revisiones registradas en el pasaje base; se mantuvo la estructura concisa del inventario.'
  spanish_consistency_notes:
  - Se preservó el nombre divino 'Yahvé' según la terminología POB en español.
  - '''Asnos'' mantiene el referente léxico de חֲמֹרִים sin arcaizar innecesariamente.'
  - La cifra se dejó en formato numérico para reflejar el carácter contable del verso.
  - '''Tributo'' mantiene la tensión entre porción cultual y exacción obligatoria, como en la nota inglesa.'
