theological_decisions:
- issue: Rendering of צָרַעַת in Levitical purity law
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  rationale: The Hebrew term refers to a broader ritual-impurity condition than modern leprosy. To avoid importing anachronistic medical assumptions, the main text uses 'skin disease.' Because 'leprosy' is familiar in translation tradition, it is preserved as an alternative in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition); §5 (consistency of key terms, or documented exception)
