base_translation:
  language: en
  yaml_path: translation/ot/numbers/003/013.yaml
  text: For every firstborn is mine[a]. On the day when I struck down every firstborn in the land of Egypt, I consecrated to myself every firstborn in Israel, from man to beast. They shall be mine[b]. I am Yahweh.
  footnotes:
  - marker: a
    text: Or 'belongs to me' for the repeated phrase 'is mine / to myself / shall be mine.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from man to beast,' a stock expression meaning from humans to animals.
    reason: lexical_alternative
