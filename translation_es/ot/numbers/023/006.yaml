  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa hebrea: וַיָּשָׁב = «volvió», אֵלָיו = «a él», וְהִנֵּה = «y he aquí», y mantiene correctamente «su holocausto» para עֹלָתוֹ y «príncipes de Moab» para שָׂרֵי מוֹאָב con nota alternativa adecuada. Sin embargo, נִצָּב expresa una postura continua de estar de pie/estar apostado, y el simple «estaba» en español pierde ese matiz. Además, la nota [b] duplica casi exactamente la redacción del texto principal en la alternativa, cuando debería preservar mejor la posibilidad «junto a / al lado de / ante» o explicar la no literalidad de עַל.'
