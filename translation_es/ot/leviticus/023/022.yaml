revisions:
- from: Y cuando siegues la cosecha de tu tierra[a], no segarás completamente el borde de tu campo, ni recogerás el rebusco de tu cosecha; lo dejarás para el pobre y para el forastero[b]. Yo soy Yahvé tu Dios.
  to: Y cuando sieguen la cosecha de su tierra, no segarás completamente el borde[a] de tu campo, ni recogerás el rebusco de tu cosecha; lo dejarás para el pobre y para el residente extranjero[b]. Yo soy Yahvé vuestro Dios.
  rationale: Se corrigió el anclaje de la nota sobre פאה para que recaiga en 'borde'; se ajustó גֵּר a 'residente extranjero' para reflejar mejor el matiz legal documentado; y se cambió la fórmula final a 'vuestro Dios' para respetar el plural hebreo אֱלֹהֵיכֶם. Se mantuvo 'rebusco' por su precisión agrícola y tradicional. También se abrió con 'sieguen... su tierra' para reflejar mejor el plural inicial del hebreo, conservando luego el singular legal distributivo en los mandatos.
