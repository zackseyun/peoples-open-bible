translation:
  language: es
  text: Y agradó al pueblo recibir a los hombres con honor, y poner una copia de sus palabras en los registros públicos del pueblo[a], para que el pueblo de los espartanos tuviera un memorial de ellos[b]; y escribieron una copia de estas cosas a Simón, el sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase traducida como 'registros públicos del pueblo' es literalmente 'los libros designados para el pueblo', es decir, archivos o registros cívicos oficiales.
    reason: cultural_note
  - marker: b
    text: O 'el pueblo espartano'. El griego literalmente dice 'el pueblo de los espartanos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρεσεν τῷ δήμῳ
  english_pob_choice: it pleased the people
  chosen_spanish: agradó al pueblo
  alternatives_spanish:
  - pareció bien al pueblo
  - el pueblo aprobó
  lexicon: LSJ
  rationale: La construcción impersonal con dativo se vuelve naturalmente en español con 'agradó al pueblo'. Conserva el tono de decisión cívica formal sin introducir matices ajenos.
- source_word: ἐπιδέξασθαι
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - acoger
  - aceptar
  lexicon: LSJ
  rationale: Aquí expresa una recepción favorable. 'Recibir' es fiel y sobrio en contexto público; 'acoger' sugiere más calidez de la que exige el griego.
- source_word: τοὺς ἄνδρας
  english_pob_choice: the men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a estos hombres
  - a los enviados
  lexicon: LSJ
  rationale: El griego dice literalmente 'los hombres'. Aunque el contexto sugiere representantes oficiales, 'enviados' interpretaría más de lo que el texto dice.
- source_word: ἐνδόξως
  english_pob_choice: with honor
  chosen_spanish: con honor
  alternatives_spanish:
  - honorablemente
  - con distinción
  lexicon: LSJ
  rationale: '''Con honor'' reproduce bien el sentido de tratamiento digno en una escena pública y suena natural en español contemporáneo.'
- source_word: τοῦ δέσθαι
  english_pob_choice: to place
  chosen_spanish: poner
  alternatives_spanish:
  - depositar
  - colocar
  - registrar
  lexicon: LSJ
  rationale: En relación con un escrito y libros archivísticos, el sentido es poner/dejar una copia en los registros. 'Poner' evita tecnicismos innecesarios y preserva la acción básica.
- source_word: τὸ ἀντίγραφον τῶν λόγων αὐτῶν
  english_pob_choice: a copy of their words
  chosen_spanish: una copia de sus palabras
  alternatives_spanish:
  - una copia de sus declaraciones
  - una transcripción de sus palabras
  - una copia de su mensaje
  lexicon: LSJ
  rationale: '''ἀντίγραφον'' es ''copia'' y λόγοι puede ser ''palabras'' o ''declaraciones''. ''Palabras'' sigue de cerca el griego; ''declaraciones'' explicita, pero va un poco más allá.'
- source_word: ἐν τοῖς ἀποδεδειγμένοις τῷ δήμῳ βιβλίοις
  english_pob_choice: in the public records of the people
  chosen_spanish: en los libros designados para el pueblo
  alternatives_spanish:
  - en los registros públicos del pueblo
  - en los libros oficialmente destinados al pueblo
  - en los libros reservados para el pueblo
  lexicon: LSJ
  rationale: El griego habla literalmente de 'los libros designados para el pueblo'. En español, 'designados para el pueblo' conserva la estructura y permite al lector ver el trasfondo archivístico sin suplir demasiado con 'registros públicos'.
- source_word: τοῦ μνημόσυνον ἔχειν
  english_pob_choice: so that ... might have a memorial
  chosen_spanish: para que ... tuviera un memorial
  alternatives_spanish:
  - para que ... tuviera un recuerdo
  - a fin de que ... quedara un memorial
  - para que ... conservara un memorial
  lexicon: LSJ
  rationale: '''Memorial'' conserva la idea conmemorativa y documental. ''Recuerdo'' sería más general y perdería parte del peso público y permanente del término.'
- source_word: τὸν δῆμον τῶν Σπαρτιατῶν
  english_pob_choice: the people of the Spartans
  chosen_spanish: el pueblo de los espartanos
  alternatives_spanish:
  - el pueblo espartano
  - los espartanos
  lexicon: LSJ
  rationale: Se mantiene la estructura del genitivo griego ('el pueblo de...'), como en la traducción inglesa auditada. 'Pueblo espartano' sería más fluido, pero suaviza la forma fuente.
- source_word: τὸ δὲ ἀντίγραφον τούτων ἔγραψαν
  english_pob_choice: and they wrote a copy of these things
  chosen_spanish: y escribieron una copia de estas cosas
  alternatives_spanish:
  - y redactaron una copia de esto
  - y enviaron por escrito una copia de estas cosas
  lexicon: LSJ
  rationale: '''Escribieron una copia'' refleja bien ἔγραψαν con ἀντίγραφον. ''Estas cosas'' reproduce el demostrativo amplio del griego sin precisar más de lo que el texto da.'
- source_word: Σίμωνι τῷ ἀρχιερεῖ
  english_pob_choice: to Simon the high priest
  chosen_spanish: a Simón, el sumo sacerdote
  alternatives_spanish:
  - para Simón, el sumo sacerdote
  - a Simón, el sumo sacerdote
  lexicon: LSJ
  rationale: El dativo se entiende naturalmente como destinatario. 'Sumo sacerdote' es la equivalencia española estándar y exacta de ἀρχιερεύς.
translation_notes:
  revision_awareness: Coincide con el testimonio griego de alta concordancia y con la traducción inglesa auditada. No se introdujeron revisiones doctrinales ni variantes textuales; se mantuvo la estructura narrativa y documental del versículo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se mantuvo 'sumo sacerdote' para ἀρχιερεύς, en consonancia con el español bíblico y la equivalencia directa del término.
  - Se preservó 'memorial' en lugar de 'recuerdo' para respetar el valor conmemorativo documental del pasaje.
  - Se evitó 'Cristo' porque no aparece Χριστός en este versículo.
