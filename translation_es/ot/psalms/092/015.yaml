translation:
  language: es
  text: Todavía dan fruto en la vejez[a]; están llenos de savia[b] y verdes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todavía darán fruto en la vejez; estarán llenos de savia y verdes». Los imperfectos hebreos también pueden entenderse con fuerza futura.'
    reason: alternative_reading
  - marker: b
    text: Lit. «gordos»; «llenos de savia» expresa la imagen botánica de forma natural en español.
    reason: lexical_alternative
  - marker: c
    text: 'O también: «frescos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֭וֹד
  english_pob_choice: still
  chosen_spanish: Todavía
  alternatives_spanish:
  - aún
  - todavía
  lexicon: HALOT
  rationale: Expresa continuidad desde el contexto anterior; 'todavía' comunica mejor la persistencia de la vitalidad en español bíblico moderno.
- source_word: יְנוּב֣וּ/ן
  english_pob_choice: bear fruit
  chosen_spanish: dar fruto
  alternatives_spanish:
  - fructificar
  - producir fruto
  - florecer
  lexicon: HALOT
  rationale: El verbo hebreo pertenece a la imagen vegetal del salmo; 'dar fruto' es natural en español y conserva la metáfora sin volverla demasiado técnica.
- source_word: בְּ/שֵׂיבָ֑ה
  english_pob_choice: in old age
  chosen_spanish: en la vejez
  alternatives_spanish:
  - con canas
  - en la vejez / con canas
  lexicon: HALOT
  rationale: Aunque el sustantivo alude literalmente a las canas, el sentido idiomático es la edad avanzada. 'En la vejez' comunica el valor temporal con claridad.
- source_word: דְּשֵׁנִ֖ים
  english_pob_choice: full of sap
  chosen_spanish: llenos de savia
  alternatives_spanish:
  - gordos
  - ricos
  - vigorosos
  lexicon: HALOT
  rationale: La imagen botánica de 'fat/rich' en hebreo se vuelve más transparente en español con 'llenos de savia', que preserva la figura de vitalidad vegetal.
- source_word: וְ/רַֽעֲנַנִּ֣ים
  english_pob_choice: green
  chosen_spanish: verdes
  alternatives_spanish:
  - frescos
  - lozanos
  - verdosos
  lexicon: HALOT
  rationale: Mantiene el paralelismo con la descripción de vigor vegetal; 'verdes' es breve, natural y acorde con la metáfora arbórea.
- source_word: יִהְיֽוּ
  english_pob_choice: they are
  chosen_spanish: estarán
  alternatives_spanish:
  - son
  - serán
  lexicon: HALOT
  rationale: El imperfecto hebreo admite lectura prospectiva o gnómica. Aquí se conserva la posibilidad futurista del hebreo con un español natural en poesía.
theological_decisions:
- issue: 'Aspecto verbal: presente gnómico vs. futuro'
  english_pob_reading: Present/generic description ('bear fruit', 'are')
  chosen_spanish_reading: Futuro descriptivo ('darán', 'estarán')
  alternative_spanish_readings:
  - presente gnómico ('dan', 'están')
  - mixto ('darán... están')
  rationale: El hebreo usa imperfectos poéticos que pueden leerse como descripción general o como proyección. En español, el futuro mantiene esa apertura sin perder naturalidad, y suena solemne en una sentencia sapiencial/poética.
  doctrine_reference: Poetic imperfects; preserve source ambiguity where warranted by the Hebrew form
- issue: Metáfora vegetal y léxico de vitalidad
  english_pob_reading: full of sap and green
  chosen_spanish_reading: llenos de savia y verdes
  alternative_spanish_readings:
  - vigorosos y verdes
  - lozanos y verdes
  rationale: La combinación preserva la imagen de salud vegetal sin sustituirla por un lenguaje demasiado explicativo. 'Savia' mantiene la conexión botánica documentada en el hebreo.
  doctrine_reference: Lexical transparency in metaphor; avoid flattening imagery
translation_notes:
  revision_awareness: 'Se siguió el sentido confirmado por el texto hebreo masorético: adverbio de continuidad + dos imperfectos poéticos + metáforas vegetales. La revisión inglesa reciente corrigió solo la puntuación final; en español se refleja con una oración completa cerrada con punto y con paralelismo claro.'
  spanish_consistency_notes:
  - Se mantiene 'vejez' para בְּשֵׂיבָה en lugar de 'canas' como opción principal, por naturalidad idiomática.
  - '''Llenos de savia'' conserva la imagen arbórea; no se sustituye por ''vigorosos'' en el texto principal para no perder la metáfora.'
  - Se usa futuro en español para reflejar la apertura aspectual del imperfecto hebreo sin imponer una sola lectura temporal.
