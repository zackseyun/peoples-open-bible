translation:
  language: es
  text: Y cuando extiendan sus palmas[a], aparto mis ojos de ustedes; aunque multipliquen oraciones, no estoy escuchando[b]. Sus manos están llenas de sangre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus manos». El hebreo dice específicamente «sus palmas», evocando el gesto de las manos levantadas en oración.
    reason: lexical_alternative
  - marker: b
    text: O «no oigo» / «no oiré». La expresión hebrea puede traducirse de forma más formal, pero aquí comunica el rechazo continuo de Dios a recibir sus oraciones.
    reason: lexical_alternative
  - marker: c
    text: «Sangre» también puede entenderse como «derramamiento de sangre» o «culpa de sangre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְפָרִשְׂכֶם
  english_pob_choice: And when you spread out
  chosen_spanish: Y cuando extiendan
  alternatives_spanish:
  - Y cuando abran
  - Y cuando desplieguen
  lexicon: HALOT
  rationale: El hebreo usa una construcción temporal con el infinitivo/acción de extender o desplegar. En español, «extiendan» conserva el gesto y funciona de manera natural en una exhortación profética.
- source_word: כַּפֵּיכֶם
  english_pob_choice: your palms
  chosen_spanish: sus palmas
  alternatives_spanish:
  - sus manos
  lexicon: HALOT
  rationale: כַּף se refiere de manera concreta a la palma o hueco de la mano. «Palmas» preserva la imagen corporal específica de las manos levantadas en oración; «manos» sería más general y perdería precisión.
- source_word: אַעְלִים עֵינַי מִכֶּם
  english_pob_choice: I hide my eyes from you
  chosen_spanish: esconderé mis ojos de ustedes
  alternatives_spanish:
  - apartaré mis ojos de ustedes
  - ocultar é mis ojos de ustedes
  lexicon: HALOT
  rationale: El hebreo expresa una acción deliberada de ocultar/apartar la mirada. «Esconderé mis ojos» mantiene la imagen antropomórfica y la fuerza de rechazo del texto; el futuro español refleja bien el valor profético.
- source_word: גַּם כִּי
  english_pob_choice: even though
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - aun cuando
  lexicon: HALOT
  rationale: 'La partícula introduce concesión: pese a que oren mucho, la respuesta divina sigue siendo negativa. «Aunque» es la forma más clara y fiel en español.'
- source_word: תַרְבּוּ תְפִלָּה
  english_pob_choice: you multiply prayers
  chosen_spanish: multipliquen las oraciones
  alternatives_spanish:
  - hagan muchas oraciones
  - oren mucho
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hagan muchas/multipliquen oración(es)». Dado el plural documentado en la revisión inglesa, «las oraciones» preserva esa cantidad y suena natural en español.
- source_word: אֵינֶנִּי שֹׁמֵעַ
  english_pob_choice: I am not listening
  chosen_spanish: no estoy escuchando
  alternatives_spanish:
  - no escucho
  - no les oiré
  lexicon: HALOT
  rationale: El participio con negación expresa una negativa vigente y continua. «No estoy escuchando» conserva la idea de rechazo relacional y el matiz durativo mejor que un simple presente.
- source_word: יְדֵיכֶם
  english_pob_choice: Your hands
  chosen_spanish: Sus manos
  alternatives_spanish:
  - Sus brazos
  lexicon: HALOT
  rationale: Aquí el hebreo usa el término común para manos, en contraste con «palmas» al inicio. Mantener «manos» preserva el cambio retórico hacia la culpa moral.
- source_word: דָּמִים
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - derramamiento de sangre
  - culpa de sangre
  lexicon: HALOT
  rationale: El plural hebreo puede sugerir sangre derramada o culpabilidad por sangre; «sangre» es la forma más directa y contundente en español, dejando abierta la amplitud semántica documentada.
- source_word: מָלֵאוּ
  english_pob_choice: are full of
  chosen_spanish: están llenas de
  alternatives_spanish:
  - se han llenado de
  - están colmadas de
  lexicon: HALOT
  rationale: El perfecto describe un estado resultante. «Están llenas de» reproduce con naturalidad el estado presente de culpabilidad descrito por el hebreo.
theological_decisions:
- issue: Lenguaje antropomórfico de Dios que rechaza el culto hipócrita
  english_pob_reading: Retain the concrete anthropomorphic expressions 'I hide my eyes' and 'I am not listening' without softening them.
  chosen_spanish_reading: Mantener «esconderé mis ojos» y «no estoy escuchando» sin suavizarlas.
  alternative_spanish_readings:
  - te ignoro
  - no les hago caso
  - me aparto de ustedes
  rationale: El hebreo usa imágenes corporales para expresar rechazo pactual al culto hipócrita. En español conviene conservar la concreción, porque una paráfrasis más abstracta diluiría la fuerza profética del reproche.
  doctrine_reference: 'Translation philosophy #1, #3, #6'
translation_notes:
  revision_awareness: La revisión más reciente ajustó «prayer» a «prayers» para reflejar con mayor precisión el plural del hebreo. La redacción española adopta ese plural con «las oraciones» y mantiene sin cambios la decisión de conservar la imaginería corporal y la negativa continua.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera explícitamente; este versículo no contiene el Tetragrámaton.
  - Se conserva la distinción entre «palmas» al inicio y «manos» al final, siguiendo el contraste del hebreo.
  - «No estoy escuchando» refleja la negativa continua; no se reemplaza por un simple «no oigo» para no perder el matiz durativo.
  - La frase final mantiene «sangre» de forma amplia, sin restringirla innecesariamente a una sola lectura interpretativa.
