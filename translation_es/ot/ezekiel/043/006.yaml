translation:
  language: es
  text: Entonces oí a uno que me hablaba desde la casa[a][b], mientras un hombre estaba de pie junto a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a una voz que me hablaba desde la casa». El hebreo no expresa explícitamente el sustantivo «voz» ni identifica al hablante en este versículo.'
    reason: lexical_alternative
  - marker: b
    text: «La casa» aquí se refiere al edificio del templo en la visión de Ezequiel.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶשְׁמַע
  english_pob_choice: Then I heard
  chosen_spanish: Entonces oí
  alternatives_spanish:
  - Y oí
  - Así que oí
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva el valor secuencial natural del relato sin forzar una paráfrasis.
- source_word: מִדַּבֵּר
  english_pob_choice: one speaking
  chosen_spanish: a uno que me hablaba
  alternatives_spanish:
  - a uno hablando
  - a una voz que me hablaba
  - a uno que hablaba
  lexicon: HALOT
  rationale: El hebreo no especifica explícitamente un sustantivo como «voz» ni identifica al hablante. En español, una relativa con «uno que me hablaba» mantiene la indefinición y suena natural, evitando añadir «voz» en el texto principal.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - conmigo
  lexicon: HALOT
  rationale: El valor direccional de אֶל se expresa de manera natural con el dativo enclítico «me» en «me hablaba»; esto conserva el destinatario del habla sin redundancia.
- source_word: מֵהַבָּיִת
  english_pob_choice: from the house
  chosen_spanish: desde la casa
  alternatives_spanish:
  - desde el templo
  - de la casa
  lexicon: HALOT
  rationale: «Casa» traduce literalmente בַּיִת. En el contexto de la visión, el referente es el edificio del templo, pero se preserva el término hebreo en el texto principal; «desde» refleja adecuadamente la procedencia del habla.
- source_word: וְאִישׁ
  english_pob_choice: while a man
  chosen_spanish: y un hombre
  alternatives_spanish:
  - mientras un hombre
  - y el hombre
  lexicon: HALOT
  rationale: אִישׁ es indeterminado; «un hombre» conserva esa falta de especificación. Se mantiene la coordinación simple con «y», sin introducir una subordinción que el hebreo no exige.
- source_word: הָיָה עֹמֵד
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - se mantenía de pie
  lexicon: HALOT
  rationale: La construcción היה + participio expresa acción/estado en desarrollo en el pasado. «Estaba de pie» comunica el aspecto durativo con buen español y evita un calco rígido.
- source_word: אֶצְלִי
  english_pob_choice: beside me
  chosen_spanish: junto a mí
  alternatives_spanish:
  - a mi lado
  - cerca de mí
  lexicon: HALOT
  rationale: אצל indica proximidad; «junto a mí» es natural en español y mantiene el cuadro espacial sin exagerar la cercanía.
theological_decisions:
- issue: Identidad del que habla desde la casa
  english_pob_reading: 'Leave the speaker indefinite: ''one speaking to me from the house.'''
  chosen_spanish_reading: 'Dejar al hablante indefinido: «a uno que me hablaba desde la casa».'
  alternative_spanish_readings:
  - «a una voz que me hablaba desde la casa»
  - «a él que me hablaba desde la casa»
  rationale: El hebreo no identifica explícitamente al hablante en este versículo. Se conserva esa tensión teológica y narrativa, en vez de resolverla con una identificación que provenga solo del contexto amplio.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de «la casa» en la visión
  english_pob_reading: '''The house'' here refers to the temple building in Ezekiel''s vision.'
  chosen_spanish_reading: «La casa» se conserva como «la casa», con la referencia al templo implícita en el contexto de la visión.
  alternative_spanish_readings:
  - «el templo»
  - «la casa del templo»
  rationale: Aunque el sentido contextual es el templo, el hebreo dice literalmente «casa». Mantener el sustantivo ayuda a conservar la textura del original; la identificación arquitectónica queda clara por el contexto inmediato.
  doctrine_reference: 'Translation philosophy §2: Preserve source terms where context makes the referent clear.'
translation_notes:
  revision_awareness: Se siguió de cerca el último estado revisado del POB en inglés, manteniendo la indefinición del hablante y el valor espacial de «from the house». Se ajustó la sintaxis al español para evitar un calco pesado, pero sin resolver ambigüedades que el hebreo deja abiertas.
  spanish_consistency_notes:
  - Se conserva «casa» en el cuerpo principal, no «templo», para respetar el término hebreo בַּיִת.
  - Se mantiene un sujeto indefinido («uno») para reflejar la ausencia de identificación explícita del hablante.
  - Se usa «junto a mí» / «estaba de pie» como equivalentes naturales de proximidad y estado durativo.
  - Se evitó «SEÑOR» y terminología litúrgica no presente en este versículo.
