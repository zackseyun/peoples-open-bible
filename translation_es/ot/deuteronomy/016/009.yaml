revisions:
- from: Contarás para ti siete semanas; desde que comience a meterse la hoz en la mies, comenzarás a contar siete semanas.[a]
  to: Contarás para ti siete semanas[a]; desde que comience a meterse la hoz al grano en pie, comenzarás a contar siete semanas.
  rationale: Se conserva la estructura y el contenido del borrador, pero se corrige el modismo agrícola para que el español sea natural y fiel al sentido de 'poner la hoz al grano en pie'. También se reubica el anclaje de la nota al lugar donde se traduce la expresión explicada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:49:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: mantiene ''siete semanas'', conserva el dativo explícito en ''para ti'' y reproduce la doble mención de contar. Sin embargo, ''a meterse la hoz en la mies'' no representa de manera suficientemente natural ni precisa el modismo agrícola subyacente a חֶרְמֵשׁ בַּקָּמָה; en español bíblico claro conviene expresar que la hoz se aplica al grano/cereal en pie.'
  spanish_quality_summary: El español es mayormente claro, pero 'meterse la hoz' suena extraño e incluso reflexivo de forma no intencional. 'La mies' es comprensible, pero con ese verbo la frase resulta poco idiomática. Una reformulación breve mejora mucho la naturalidad y la legibilidad sin alejarse del hebreo ni de la POB inglesa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Siete semanas' y la nota sobre 'siete sietes' están bien. No aparecen términos teológicos sensibles del glosario global. La principal cuestión es estilístico-lexical en el modismo de cosecha.
  issues:
  - severity: medium
    issue: La frase 'a meterse la hoz en la mies' es poco natural en español.
    rationale: El hebreo describe el inicio del acto de segar el grano en pie con la hoz. En español, 'meterse la hoz' suena impropio y reflexivo; 'se meta la hoz al grano en pie' o 'se aplique la hoz a la mies' comunica mejor el sentido.
  - severity: low
    issue: La nota al pie está anclada al final del versículo en vez de la expresión relevante.
    rationale: La nota explica 'siete semanas' como idiomático 'siete sietes'; conviene anclarla en la primera ocurrencia de 'siete semanas' para mayor precisión editorial.
  revised_spanish_text: Contarás para ti siete semanas[a]; desde que comience a meterse la hoz al grano en pie, comenzarás a contar siete semanas.
  revised_footnotes:
  - marker: a
    text: Literalmente, «siete sietes». Aquí el hebreo idiomático se refiere a siete semanas.
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el contenido del borrador, pero se corrige el modismo agrícola para que el español sea natural y fiel al sentido de 'poner la hoz al grano en pie'. También se reubica el anclaje de la nota al lugar donde se traduce la expresión explicada.
