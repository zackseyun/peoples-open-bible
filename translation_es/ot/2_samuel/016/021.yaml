base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/016/021.yaml
  text: Ahithophel said to Absalom[a], “Go in to your father’s concubines, whom he left to keep the house, and all Israel will hear that you have become odious to your father[c][b], and the hands of all who are with you will be strengthened.”
