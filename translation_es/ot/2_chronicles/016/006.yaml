base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/016/006.yaml
  text: Then King Asa took all Judah[a], and they carried away the stones of Ramah and its timber, with which Baasha had built[b], and he built with them Geba and Mizpah.
  footnotes:
