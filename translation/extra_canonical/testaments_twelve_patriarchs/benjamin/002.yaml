theological_decisions:
- issue: Textual instability across the chapter, especially verses 1-5 and the fragmentary ending in verse 8
  chosen_reading: Translate the main narrative from the fuller Greek witness represented in the supplied apparatus, while preserving the broken ending honestly rather than reconstructing beyond the extant text.
  alternative_readings:
  - Shorter forms that omit Joseph's concealment motive
  - Readings where the lion episode is phrased differently or the sale is back to Ishmaelites
  rationale: The chapter survives in divergent forms in the apparatus. The fuller sequence yields a coherent narrative and paraenetic transition, but the final clause is clearly incomplete in the supplied text, so the translation ends with suspension rather than conjectural completion.
  doctrine_reference: 'PHILOSOPHY.md: transparency and original-language primacy'
- issue: Joseph's concealment of the brothers' guilt
  chosen_reading: Render Joseph as intentionally hiding the brothers' deeds from Benjamin.
  alternative_readings:
  - Joseph merely repeats facts without emphasis on concealment
  rationale: The Greek ἤθελεν γὰρ κρύπτειν ἀπʼ ἐμοῦ τὰ ἔργα τῶν ἀδελφῶν ἡμῶν explicitly gives motive. This moral nuance matters for Benjamin's portrait of Joseph's gentleness and restraint.
