  - trabajó
  - hizo reparaciones
  lexicon: contextual syntax
  rationale: El hebreo omite el verbo en la segunda cláusula, pero el contexto repetitivo de Nehemías 3 lo exige en español. «Reparó» reproduce el verbo elíptico de forma directa y coherente.
