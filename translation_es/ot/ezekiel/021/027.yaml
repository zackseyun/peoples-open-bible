  to: 'En su mano derecha estaba la adivinación para Jerusalén: poner arietes, abrir la boca con matanza[a], levantar la voz con un grito de guerra, poner arietes contra las puertas, echar un terraplén y construir un muro de asedio[b].'
  rationale: Se sustituyó «carneros» por «arietes» para reflejar correctamente el sentido militar de כָּרִים en contexto de asedio y alinearse con la decisión principal del English POB. Se mejoró «gritería de guerra» a «grito de guerra» por mayor naturalidad y precisión. Se reubicó la nota sobre דָּיֵק al sintagma final «muro de asedio», que es el elemento al que realmente corresponde, y se añadió la nota alternativa sobre «abrir la boca ...» siguiendo la auditoría inglesa.
