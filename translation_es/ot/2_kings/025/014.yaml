    rationale: הַמְזַמְּרוֹת en este contexto se entiende comúnmente como instrumento para despabilar lámparas. «Despabiladeras» es preciso, natural en registros bíblicos en español y mantiene la función cultual; la nota puede conservar la alternativa de instrumento de corte.
  - severity: medium
    issue: «los llevaron» no expresa tan bien como «se llevaron» la idea de remoción/saqueo de לָקָחוּ en contexto.
    rationale: El hebreo dice simplemente «tomaron», pero en contexto de expolio la POB inglesa explícita «took away». En español, «se llevaron» es la forma más natural para comunicar esa remoción sin sonar torpe ni introducir un objeto redundante.
