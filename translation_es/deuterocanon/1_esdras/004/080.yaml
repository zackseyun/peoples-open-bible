translation:
  language: es
  text: 'Y cuando el joven salió, levantando su rostro hacia el cielo, frente a Jerusalén, bendijo al Rey del cielo, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ νεανίσκος
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven varón
  lexicon: LSJ
  rationale: νεανίσκος designa a un joven o muchacho; «el joven» es natural en español moderno y conserva el sentido sin añadir servidumbre ni otro matiz no presente.
- source_word: ἄρας τὸ πρόσωπον
  english_pob_choice: lifting up his face
  chosen_spanish: levantando su rostro
  alternatives_spanish:
  - alzando su rostro
  - levantando su semblante
  lexicon: LSJ
  rationale: La imagen corporal de oración se conserva con una expresión directa y natural en español; «rostro» es más común que «semblante» y mantiene la concreción del gesto.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia los cielos
  - al cielo
  lexicon: LSJ
  rationale: El griego marca dirección. En español, «hacia el cielo» refleja esa orientación y suena más idiomático que una calca rígida.
- source_word: ἔναντιον Ἰερουσαλήμ
  english_pob_choice: opposite Jerusalem / facing Jerusalem
  chosen_spanish: frente a Jerusalén
  alternatives_spanish:
  - en dirección a Jerusalén
  - opuesto a Jerusalén
  lexicon: LSJ
  rationale: ἔναντιον expresa una orientación o posición frente a algo. «Frente a Jerusalén» comunica la postura espacial sin introducir una interpretación más fuerte que el texto.
- source_word: εὐλόγησεν
  english_pob_choice: he blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - dio bendición a
  lexicon: LSJ
  rationale: El verbo εὐλογέω se vierte normalmente como «bendecir»; en contexto dirigido a Dios, «bendijo» preserva el registro bíblico y la forma verbal directa.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  english_pob_choice: the King of heaven
  chosen_spanish: al Rey del cielo
  alternatives_spanish:
  - al Rey de los cielos
  - al Rey celestial
  lexicon: LSJ
  rationale: La construcción genitiva se traduce de modo transparente. «Del cielo» mantiene la referencia al ámbito celestial y conserva el título reverente sin desplazarse a fórmulas más tradicionales que no son necesarias aquí.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: LSJ
  rationale: El participio introduce el discurso siguiente; «diciendo» reproduce la continuidad griega de manera natural en español.
theological_decisions:
- issue: Título divino τῷ βασιλεῖ τοῦ οὐρανοῦ
  english_pob_reading: the King of heaven
  chosen_spanish_reading: el Rey del cielo
  alternative_spanish_readings:
  - el Rey de los cielos
  - el Rey celestial
  rationale: Se conserva el título reverente para Dios sin sustituirlo por una fórmula de ocultación. «Del cielo» sigue de cerca la estructura griega y respeta el sentido teológico del pasaje.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve divine referents plainly.'
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del inglés POB, especialmente la orientación espacial precisa de ἔναντιον Ἰερουσαλήμ, evitando ampliar el sentido a una simple 'mirando hacia' o 'ante' Jerusalén. También mantiene el flujo sintáctico del participio final con «diciendo».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca el tetragrámaton; aquí no aparece.
  - Se mantiene «Rey del cielo» como título divino transparente, coherente con el tratamiento de títulos en el proyecto.
  - No se introducen notas al pie porque el versículo no presenta una variante textual o ambigüedad lexicográfica que requiera marcación explícita.
