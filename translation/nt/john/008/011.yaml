id: JHN.8.11
reference: John 8:11
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ἡ δὲ εἶπεν, Οὐδείς, κύριε. Εἶπεν δὲ ὁ Ἰησοῦς, Οὐδὲ ἐγώ σε κατακρίνω· πορεύου,
    καὶ μηκέτι ἁμάρτανε.
  language: Greek
translation:
  text: She[a] said, "No one, Lord." And Jesus said, "Neither do I condemn you; go,
    and sin no more."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Final verse of the story of the woman caught in adultery (John 7:53–8:11).
      See note on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: While 'sir' is a valid translation of the vocative 'kyrie' as a polite
    address, 'Lord' is traditionally retained here, reflecting a recognition of Jesus'
    authority.
- source_word: κατακρίνω
  chosen: condemn
  alternatives:
  - pass judgment on
  - sentence
  lexicon: BDAG
  rationale: '''Condemn'' perfectly captures the judicial sense of passing a sentence
    against someone, which fits the context of the scribes and Pharisees seeking to
    stone her.'
- source_word: μηκέτι
  chosen: no more
  alternatives:
  - no longer
  - from now on not
  lexicon: BDAG
  rationale: '''No more'' is concise and carries the temporal weight of ceasing an
    action from this point forward.'
