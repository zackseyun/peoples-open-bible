base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/091.yaml
  text: They said to him[a], "Say to us who you are, so that we may believe in you." He said to them, "You test the face of the sky and the earth, and the one who is before you you do not recognize[e][d][c][b]; and this kairos you do not know how to test."
  footnotes:
  - marker: a
    text: “Face” can mean “appearance”; the Coptic phrase is literally “the face of the sky and the earth.”
    reason: cultural_note
  - marker: b
    text: Kairos is a Greek loan meaning an appointed/critical time or season; left untranslated to retain its nuance.
    reason: cultural_note
  - marker: c
    text: The verb for “believe” is a Greek loan (from pisteuein) and can also mean “trust.”
    reason: lexical_alternative
  - marker: d
    text: 'The clause can also be read “what is before you,” but the following pronoun (“him”) favors a personal reference: “the one who is before you.”'
    reason: textual_variant
  - marker: e
    text: Printed has ϫⲟⲟⲥ ⲉⲣⲟⲛ; normalized reads ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ. Both mean “tell us.”
    reason: textual_variant
