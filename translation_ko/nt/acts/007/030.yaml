  yaml_path: translation/nt/acts/007/030.yaml
  text: And after forty years had passed[a], an angel appeared to him in the wilderness of Mount Sinai[c][b], in a flame of fire from a bush.
  footnotes:
  - marker: a
    text: Or 'when forty years were completed.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in a flame of fire of a bush'; that is, the flame was associated with a bush, echoing Exodus 3:2.
    reason: cross_reference
  - marker: c
    text: Some interpreters connect this with 'the angel of the Lord' in Exodus 3:2, but Acts here says simply 'an angel.'
    reason: alternative_reading
