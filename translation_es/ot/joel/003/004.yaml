translation:
  language: es
  text: El sol se volverá tinieblas,[a] y la luna a sangre,[b] antes de la venida del gran y temible día de Yahvé.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "será convertido en tinieblas". El hebreo expresa un cambio de estado: literalmente, "será vuelto a oscuridad/tinieblas".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "de color sangre". El hebreo dice literalmente "a sangre".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "el gran y terrible día de Yahvé".'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: HALOT
  rationale: Nombra de forma directa el cuerpo celeste, como en el inglés POB, sin añadir explicación.
- source_word: יֵהָפֵךְ
  english_pob_choice: will be turned
  chosen_spanish: será vuelto
  alternatives_spanish:
  - será cambiado
  - se volverá
  lexicon: HALOT
  rationale: El nifal expresa cambio sufrido; 'será vuelto' conserva la pasiva/resultativa de la imagen mejor que una forma plenamente intransitiva.
- source_word: לְחֹשֶׁךְ
  english_pob_choice: to darkness
  chosen_spanish: a tinieblas
  alternatives_spanish:
  - a oscuridad
  - en tinieblas
  lexicon: HALOT
  rationale: La preposición marca estado resultante. En español, 'a tinieblas' conserva la transición poética y el contraste con la luz.
- source_word: וְהַיָּרֵחַ
  english_pob_choice: and the moon
  chosen_spanish: y la luna
  alternatives_spanish:
  - y el satélite lunar
  lexicon: HALOT
  rationale: Correspondencia directa con el cuerpo celeste, en paralelo con 'el sol'.
- source_word: לְדָם
  english_pob_choice: to blood
  chosen_spanish: a sangre
  alternatives_spanish:
  - a sangre roja
  - en sangre
  lexicon: HALOT
  rationale: Sigue la literalidad de 'to blood' y preserva la tensión profética sin resolverla prematuramente como 'sangre roja'.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  - previo a
  lexicon: HALOT
  rationale: El valor temporal es claro en el contexto; 'antes de' es el equivalente natural en español.
- source_word: בּוֹא
  english_pob_choice: the coming of
  chosen_spanish: la venida de
  alternatives_spanish:
  - la llegada de
  - el venir de
  lexicon: HALOT
  rationale: El infinitivo constructo funciona bien como sustantivo verbal; 'venida' mantiene tono bíblico y legibilidad.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of the LORD
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahveh
  - el día del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para YHWH: ''Yahvé'' en el texto principal, preservando el nombre divino en lugar de una sustitución titular.'
- source_word: הַגָּדוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - magnífico
  lexicon: HALOT
  rationale: Adjetivo intensificador del día; 'gran' es natural antepuesto en español y mantiene el peso solemne del hebreo.
- source_word: וְהַנּוֹרָא
  english_pob_choice: fearful
  chosen_spanish: temible
  alternatives_spanish:
  - espantoso
  - terrible
  - asombroso
  lexicon: HALOT
  rationale: '''Temible'' conserva el matiz de provocar temor reverente/judicial. En español evita el posible sesgo positivo de ''asombroso'' y la vaguedad de ''terrible''.'
theological_decisions:
- issue: Nombre divino YHWH en 'יוֹם יְהוָה'
  english_pob_reading: the day of the LORD / Yahweh in context, with the divine name rendered Yahweh in the main text
  chosen_spanish_reading: el día de Yahvé
  alternative_spanish_readings:
  - el día del Señor
  - el día de Yahveh
  rationale: El texto hebreo contiene explícitamente el Tetragrama. El proyecto pide 'Yahvé' como forma principal en español, evitando la sustitución tradicional 'Señor' y preservando la identidad del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Imágenes cósmicas apocalípticas
  english_pob_reading: Retain literal-apocalyptic wording ('moon to blood') in the main text
  chosen_spanish_reading: la luna a sangre
  alternative_spanish_readings:
  - la luna en sangre roja
  - la luna convertida en sangre
  rationale: La formulación mantiene la crudeza del hebreo y la tensión profética sin explicarla como mera metáfora. El español conserva la posibilidad de imagen visual o señal apocalíptica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia y sin cambios sustanciales; se mantiene la decisión de traducir el Tetragrama como 'Yahvé' y de preservar la imaginería apocalíptica literal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - '''a tinieblas'' y ''a sangre'' conservan la estructura resultativa del hebreo sin interpretaciones explicativas en el cuerpo principal.'
  - '''temible'' sostiene el registro profético solemne y evita la ambigüedad positiva de ''asombroso''.'
