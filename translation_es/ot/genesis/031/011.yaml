translation:
  language: es
  text: 'Entonces el ángel de Dios me dijo en el sueño[a]: «Jacob». Y yo dije: «Aquí estoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un sueño». El hebreo dice literalmente «en el sueño».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... me habló
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo. En español, «Entonces» conserva la secuencia, y «me habló» expresa con naturalidad la acción de dirigirse a alguien en discurso directo. Se evita sobrecargar el texto con una repetición rígida de «dijo» si el contexto ya deja claro el habla directa.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El sufijo pronominal de primera persona singular queda bien reflejado con el dativo clítico «me», natural en español y fiel al destinatario del habla.
- source_word: מַלְאַךְ הָאֱלֹהִים
  english_pob_choice: the angel of God
  chosen_spanish: el ángel de Dios
  alternatives_spanish:
  - el mensajero de Dios
  - el ángel divino
  lexicon: HALOT
  rationale: «Ángel» es la equivalencia directa y más clara para מַלְאָךְ en este contexto narrativo. «De Dios» conserva la construcción posesiva/genitiva del hebreo sin resolver la identidad del personaje más allá de lo que el texto dice.
- source_word: בַּחֲלֹם
  english_pob_choice: in the dream
  chosen_spanish: en el sueño
  alternatives_spanish:
  - en un sueño
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido, por eso «en el sueño» reproduce mejor la forma que «en un sueño». En español suena un poco más marcado, pero es fiel al dato formal del hebreo.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - —
  lexicon: standard proper-name convention
  rationale: Nombre propio transcrito de manera estándar.
- source_word: וָאֹמַר
  english_pob_choice: and I said
  chosen_spanish: Y yo dije
  alternatives_spanish:
  - Entonces yo dije
  - Y dije
  lexicon: HALOT
  rationale: La respuesta de Jacob se conserva con un verbo simple de habla. «Y yo dije» mantiene el cambio a primera persona y el paralelismo narrativo sin sonar forzado.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Aquí me tienes
  - Presente
  lexicon: HALOT
  rationale: «Aquí estoy» es el equivalente idiomático natural en español para la fórmula de disponibilidad/respuesta. Preserva el valor de auto-presentación inmediata del hebreo.
theological_decisions:
- issue: Identidad del ángel de Dios sin resolver una cristología o angelología más amplia
  english_pob_reading: the angel of God
  chosen_spanish_reading: el ángel de Dios
  alternative_spanish_readings:
  - el mensajero de Dios
  - el ángel divino
  rationale: La traducción conserva la designación del hebreo sin añadir una interpretación que cierre la tensión teológica. No se identifica explícitamente al mensajero con una teofanía u otra figura, siguiendo el criterio auditable del POB en inglés.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Artículo definido en בַּחֲלֹם
  english_pob_reading: in the dream
  chosen_spanish_reading: en el sueño
  alternative_spanish_readings:
  - en un sueño
  rationale: Se prioriza la huella formal del hebreo (artículo definido) aunque el español más idiomático podría decir «en un sueño». El POB en inglés ya documenta esta tensión entre fidelidad formal e idiomaticidad.
  doctrine_reference: Fidelidad formal con nota de alternativa natural
- issue: Fórmula de respuesta הִנֵּנִי
  english_pob_reading: Here I am
  chosen_spanish_reading: Aquí estoy
  alternative_spanish_readings:
  - Aquí me tienes
  - Presente
  rationale: «Aquí estoy» transmite la disponibilidad y presencia inmediata que caracteriza la fórmula hebrea, sin sobreinterpretarla como mera ubicación física.
  doctrine_reference: Equivalencia idiomática de fórmula responde
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios adicionales; se conserva la decisión de reflejar el artículo definido de בַּחֲלֹם con una nota de alternativa idiomática. La traducción española sigue el mismo criterio, manteniendo la tensión entre precisión formal y fluidez natural.
  spanish_consistency_notes:
  - Se usa «ángel de Dios» de manera consistente con el audit trail en inglés y con la terminología POB.
  - Se mantiene «Aquí estoy»/«Aquí estoy» como fórmula de respuesta, equivalente al inglés «Here I am».
  - Se opta por «en el sueño» en el texto principal y se anota la alternativa natural «en un sueño» para transparencia textual.
