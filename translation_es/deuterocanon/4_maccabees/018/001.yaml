translation:
  language: es
  text: Oh, hijos, descendientes de la simiente de Abraham[a], israelitas, obedezcan esta ley, y sean piadosos[b] de toda manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «descendientes de la semilla de Abraham». La expresión griega está acumulada y enfatiza de modo inusual la identidad ancestral.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vivan devotamente» / «sean reverentes». El verbo implica conducta honradora de Dios, no solo disposición interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh!
  alternatives_spanish:
  - O
  lexicon: LSJ
  rationale: Conserva el exclamativo vocativo elevado sin añadir contenido; en español, «¡Oh!» suena natural y solemne.
- source_word: τῶν Ἀβραμιαίων σπερμάτων ἀπόγονοι
  english_pob_choice: descendants of the seed of Abraham
  chosen_spanish: descendientes de la simiente de Abraham
  alternatives_spanish:
  - descendientes del linaje de Abraham
  - descendientes de la semilla de Abraham
  lexicon: LSJ
  rationale: La imagen griega está estratificada y enfatiza el origen ancestral. «Simiente» conserva esa textura más literalmente que una paráfrasis más lisa, y sigue siendo comprensible en registro bíblico.
- source_word: παῖδες
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: BDAG
  rationale: Como vocativo filial dirigido al pueblo, «hijos» mantiene el tono de apelación familiar y el vínculo de descendencia. En español es más natural que «niños» y menos interpretativo que «descendientes».
- source_word: Ἰσραηλεῖται
  english_pob_choice: Israelites
  chosen_spanish: israelitas
  alternatives_spanish:
  - pueblo de Israel
  - hombres de Israel
  lexicon: LSJ
  rationale: Es el etnónimo estándar y directo; no requiere expansión.
- source_word: πείθεσθε
  english_pob_choice: obey
  chosen_spanish: obedezcan
  alternatives_spanish:
  - atiendan
  - sigan
  lexicon: BDAG
  rationale: Con τῷ νόμῳ en dativo, el sentido es cumplimiento práctico. «Obedezcan» comunica mejor que una mera persuasión interior.
- source_word: τῷ νόμῳ τούτῳ
  english_pob_choice: this law
  chosen_spanish: esta ley
  alternatives_spanish:
  - esta Ley
  - esta norma
  lexicon: BDAG
  rationale: «Ley» reproduce νόμος de forma natural en español. No se capitaliza, porque el griego no marca una convención tipográfica equivalente y el contexto ya identifica la ley ancestral de Israel.
- source_word: πάντα τρόπον
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - de toda manera
  - en cada modo
  lexicon: LSJ
  rationale: La frase adverbial expresa totalidad de conducta. «En todo» es una formulación breve y natural que conserva la amplitud del original.
- source_word: εὐσεβεῖτε
  english_pob_choice: be godly
  chosen_spanish: sean piadosos
  alternatives_spanish:
  - vivan devotamente
  - sean reverentes
  lexicon: BDAG
  rationale: El verbo pide conducta reverente y honradora de Dios. «Piadosos» mantiene el campo semántico de ευσέβεια sin sustituirlo por un lenguaje más doctrinalmente cargado.
theological_decisions:
- issue: Referencia de «esta ley»
  english_pob_reading: the Jewish law/Torah as the covenantal law being urged upon Israel
  chosen_spanish_reading: la ley ancestral de Israel, entendida como la Torá/código pactual que el texto exhorta a obedecer
  alternative_spanish_readings:
  - ley moral en sentido general
  - una norma religiosa genérica
  rationale: El vocativo a israelitas y la trama de 4 Macabeos apuntan a la ley heredada de Israel, no a una moral abstracta. La traducción mantiene esa referencia sin agregar una glosa explícita en el cuerpo del verso.
  doctrine_reference: Principio de primacía del texto fuente y conservación del referente histórico-covenantal.
- issue: Alcance de εὐσεβεῖτε
  english_pob_reading: show piety / live devoutly
  chosen_spanish_reading: sean piadosos
  alternative_spanish_readings:
  - vivan devotamente
  - sean reverentes
  rationale: En este contexto martirial, el verbo no solo describe ritualidad sino una conducta entera orientada a Dios. «Piadosos» preserva esa fuerza ética y religiosa sin imponer una lectura más estrecha.
  doctrine_reference: Distinción semántica entre piedad, reverencia y devoción en el registro bíblico.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al reflejar con mayor cercanía la frase griega intensamente acumulada sobre Abraham y al traducir εὐσεβεῖτε con un término que conserve el peso ético-religioso del verbo. También conserva la estructura vocativa e imperativa de forma natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton; por eso no aparece aquí.
  - «Ley» traduce νόμος de manera directa y consistente con el contexto judaico del pasaje.
  - «Piadosos» se eligió para εὐσεβεῖτε por su equilibrio entre fidelidad semántica y fluidez en español; se deja nota de alternativa para lectores que prefieran una matización como «devotamente».
