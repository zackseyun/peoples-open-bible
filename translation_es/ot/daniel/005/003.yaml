  yaml_path: translation/ot/daniel/005/003.yaml
  text: Then they brought in the gold vessels that had been taken out of the temple[a], the house of God, which was in Jerusalem, and the king and his nobles[b], his wives and his concubines drank from them.
  footnotes:
