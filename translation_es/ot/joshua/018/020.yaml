    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Benjamín», designación tribal para los descendientes de Benjamín.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal para expresar de manera más natural en español que el Jordán funcionaba como frontera territorial, y se mejora la fluidez de la frase resumidora sobre los límites alrededor del territorio. Se conservan el contenido, la estructura y las decisiones léxicas clave del POB, con notas alineadas a las alternativas fuente.
