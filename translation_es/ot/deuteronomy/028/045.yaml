  source_alignment_summary: 'El borrador español sigue bien la secuencia del hebreo: las maldiciones vienen sobre el destinatario, lo persiguen, lo alcanzan y terminan en su destrucción por no responder a Yahvé guardando sus mandamientos y estatutos. Sin embargo, el punto clave כִּי לֹא שָׁמַעְתָּ בְּקוֹל está más literalmente y teológicamente cargado como «no escuchaste / no atendiste a la voz», no «no obedeciste a la voz». La auditoría inglesa preservó deliberadamente esa metáfora auditiva en el texto principal y dejó «obey» como alternativa en nota. El español invierte esa prioridad.'
  spanish_quality_summary: El texto es claro y natural, con buen registro bíblico moderno. «Vendrán sobre ti», «te perseguirán», «te alcanzarán» y «hasta que seas destruido» funcionan bien. La principal mejora de legibilidad y fidelidad es reemplazar «no obedeciste a la voz» por «no escuchaste la voz», que además suena más idiomático en español que «obedecer a la voz».
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé», «mandamientos» y «estatutos». No hay conflicto con otros términos doctrinales. El único desajuste importante es no seguir la decisión auditada de preservar la metáfora «listen to the voice» en el texto principal.
  issues:
  - severity: medium
    issue: Se reemplaza en el texto principal la metáfora auditiva hebrea por una paráfrasis interpretativa.
    rationale: שׁמע בקול significa obedecer, pero literalmente es «escuchar la voz de». La auditoría inglesa decidió preservar esa formulación en el texto principal por razones de filosofía de traducción y textura teológica. El borrador español la desplaza a nota y pone «obedeciste» en el cuerpo, lo cual sobreinterpreta.
  - severity: low
    issue: «Obedeciste a la voz» suena menos natural en español que la formulación literal.
    rationale: Aunque comprensible, en español general bíblico moderno resulta más natural «escuchaste la voz de Yahvé» o «atendiste a la voz de Yahvé». Esto permite además que la cláusula «para guardar sus mandamientos...» explique el sentido obediencial sin duplicarlo.
