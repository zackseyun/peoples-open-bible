review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: la necedad humana distorsiona o arruina el propio camino, y luego el corazón se enfurece contra Yahvé. Conserva correctamente «corazón» para לִבּוֹ y «Yahvé» para יְהוָה. Sin embargo, hay una inconsistencia interna importante: el texto principal usa «Yahvé», pero el resumen textual heredado del borrador muestra «contra Yahvé» mientras la decisión léxica alinea con esa forma; eso está bien. El punto que sí requiere ajuste es la colocación de notas y la naturalidad de una de las alternativas léxicas.'
  spanish_quality_summary: La redacción es clara y digna. «La necedad del hombre tuerce su camino» es legible y sapiencial. No obstante, la doble nota [a][b] está anclada sobre «camino», cuando la nota [a] corresponde a «del hombre», no a «camino». Además, la alternativa «hace torcido su sendero» suena poco natural en español; conviene reformularla como «hace torcida su senda» o mejor «hace tortuoso su sendero».
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé»; אִוֶּלֶת → «necedad»; לִבּוֹ → «su corazón». La elección «tuerce» para תְּסַלֵּף es defendible porque preserva la imagen hebrea, y la nota alternativa ya recoge el matiz de «pervierte»/«hace torcido».'
  issues:
