base_translation:
  language: en
  yaml_path: translation/ot/leviticus/011/003.yaml
  text: You may eat any animal that has a split hoof[a], completely divided[b], and that chews the cud.
  footnotes:
  - marker: a
    text: Literally, 'that parts the hoof and splits a split of hooves.' The Hebrew uses two related expressions to specify a truly divided hoof.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'brings up cud'; that is, chews the cud.
    reason: lexical_alternative
