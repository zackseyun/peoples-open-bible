review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja correctamente la lista sacrificial, los números, la edad de los corderos y la cláusula final sobre la dedicación del altar después de su unción. Sin embargo, la frase «para el sacrificio de los sacrificios de paz» es una reproducción demasiado literal y torpe de זֶבַח הַשְּׁלָמִים; duplica innecesariamente «sacrificio» y no suena natural en español. El sentido fuente se preserva mejor con «para el sacrificio de paz», manteniendo la categoría cultual sin añadir redundancia.
  spanish_quality_summary: El texto es claro en general, pero la secuencia «el sacrificio de los sacrificios de paz» resulta poco idiomática y pesada para lectores hispanohablantes. El resto del versículo es legible y digno. «Después de que fue ungido» es aceptable, aunque «después de haber sido ungido» también sería posible; no hace falta cambiarlo.
  glossary_alignment: No hay términos del glosario mayor en conflicto. La principal cuestión terminológica es שְׁלָמִים, donde conviene conservar la categoría tradicional con español natural. «Sacrificio de paz» alinea mejor con la decisión inglesa «sacrifice of peace offerings» que la forma redundante del borrador. La nota léxica alternativa del inglés debe conservarse también en español.
  issues:
  - severity: medium
    issue: 'Frase no idiomática: «el sacrificio de los sacrificios de paz»'
    rationale: Aunque intenta reflejar la estructura hebrea, en español la duplicación de «sacrificio» suena antinatural y entorpece la lectura. El hebreo nombra una categoría sacrificial; no exige repetir el sustantivo en español.
  - severity: low
    issue: Falta la nota de alternativa léxica para שְׁלָמִים
    rationale: El English POB preserva alternativas significativas ('fellowship offerings', 'well-being offerings'). Conviene mantener una nota española equivalente para conservar el rastro auditado y la matización teológica/lexical.
  revised_spanish_text: Y todo el ganado para el sacrificio de paz[a] fue veinticuatro toros, sesenta carneros, sesenta machos cabríos y sesenta corderos de un año. Esta fue la dedicación del altar después de que fue ungido.
  revised_footnotes:
  - marker: a
    text: O «el sacrificio de las ofrendas de comunión» o «el sacrificio de las ofrendas de bienestar».
    reason: lexical_alternative
  revision_rationale: Se reemplaza la expresión redundante «el sacrificio de los sacrificios de paz» por «el sacrificio de paz», que preserva la categoría cultual de שְׁלָמִים con español natural. Además, se añade la nota de alternativas léxicas para reflejar el audit trail inglés.
