    issue: '''Ahora David'' no refleja bien la revisión auditada ni suena natural en español narrativo.'
    rationale: La waw inicial no exige 'ahora' en español. Además, el inglés revisado eliminó el primer 'then' por naturalidad; mantener 'Ahora' al inicio reintroduce una marcación temporal que el audit trail justamente suavizó.
  - severity: medium
    issue: Falta la nota léxica correspondiente a מְצוּדָה.
    rationale: El English POB conservó una nota con la alternativa 'fortress' para 'stronghold'. Dado que el español principal usa 'fortaleza', conviene anclar una nota que preserve la alternativa léxica documentada, aquí mejor como 'fortín' para distinguirla del término principal.
  revised_spanish_text: David estaba en la fortaleza[a], y la guarnición de los filisteos estaba entonces en Belén.
