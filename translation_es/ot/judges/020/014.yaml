    rationale: El he direccional indica movimiento hacia Gibeá, no mera ubicación. La POB inglesa traduce «to Gibeah»; «en Gibeá» debilita ese matiz y crea una leve desviación del hebreo.
  - severity: low
    issue: La nota [a] no corresponde a la mejor necesidad textual
    rationale: La nota actual compensa una decisión principal menos fiel. Si el texto se corrige a «a Gibeá», ya no hace falta esa nota, porque el sentido direccional queda expresado directamente.
