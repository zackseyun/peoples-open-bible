translation:
  language: es
  text: Él también escribió acerca de la provisión y de la vestidura sacerdotal[a], en qué habían de ministrar en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la provisión y la vestidura sacerdotal, indicando en qué habían de servir en ella». El griego es muy comprimido, especialmente en la frase «en qué ... en ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote concerning
  chosen_spanish: escribió acerca de
  alternatives_spanish:
  - escribió sobre
  - dejó por escrito
  - redactó acerca de
  lexicon: LSJ
  rationale: El aoristo de γράφω aquí se entiende en sentido administrativo, como dejar por escrito o consignar instrucciones. «Escribió acerca de» reproduce de forma natural ese valor sin cargar más de lo que el griego exige.
- source_word: χορηγίαν
  english_pob_choice: provision
  chosen_spanish: suministro
  alternatives_spanish:
  - provisión
  - abastecimiento
  - provisión asignada
  lexicon: LSJ
  rationale: χορηγία puede referirse al suministro o la provisión destinada a una necesidad concreta. «Suministro» mantiene esa amplitud y suena natural en español; «provisión» también sería posible, pero puede sonar algo más abstracta.
- source_word: ἱερατικὴν στολήν
  english_pob_choice: priestly garment
  chosen_spanish: vestido sacerdotal
  alternatives_spanish:
  - vestidura sacerdotal
  - atuendo sacerdotal
  - ropa sacerdotal
  lexicon: LSJ
  rationale: στολή suele denotar una prenda o vestidura distinguida. «Vestido sacerdotal» conserva el sentido cultual y evita un tecnicismo eclesiástico; «vestidura sacerdotal» es una alternativa muy cercana y algo más solemne.
- source_word: ἐν τίνι
  english_pob_choice: in what
  chosen_spanish: en el cual
  alternatives_spanish:
  - en qué
  - en lo cual
  - para qué
  lexicon: LSJ
  rationale: La construcción griega es comprimida y algo ambigua. En español, la referencia más natural es al vestido sacerdotal, por eso se vierte «en el cual» para expresar la relación sin expandir indebidamente el texto.
- source_word: λατρεύσουσιν
  english_pob_choice: they are to minister
  chosen_spanish: habían de ministrar
  alternatives_spanish:
  - habían de servir
  - habrán de ministrar
  - deberán ministrar
  lexicon: LSJ
  rationale: En contexto de templo, λατρεύω implica servicio cultual. «Ministrar» preserva ese matiz litúrgico mejor que «servir», y el giro «habían de» refleja la finalidad o instrucción implícita del pasaje.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en ella
  - en ello
  - allí
  lexicon: LSJ
  rationale: Aunque el antecedente griego probable es la «στολή» femenina, en español «vestido» es masculino. Para mantener concordancia natural se usa «en él», aceptando que el referente sea la prenda mencionada.
theological_decisions:
- issue: Servicio cultual y lenguaje de ministerio
  english_pob_reading: they are to minister
  chosen_spanish_reading: habían de ministrar
  alternative_spanish_readings:
  - habían de servir
  - debían oficiar
  rationale: No hay aquí una decisión doctrinal fuerte, pero sí una preferencia léxica importante. «Ministrar» conserva el carácter sacerdotal/cultual del verbo griego sin reducirlo a servicio general ni volverlo excesivamente técnico.
  doctrine_reference: Cultic service in temple context; lexical nuance of λατρεύω
translation_notes:
  revision_awareness: El inglés auditado pasó de una formulación más interpretativa («wrote out», con expansión explicativa) a una más cercana al griego («wrote concerning»). En español se siguió esa revisión con «escribió acerca de», evitando añadir explicación extra y manteniendo la compresión del original, mientras que la nota a pie de página preserva la alternativa interpretativa que el inglés también documenta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - «Ministrar» se usa aquí en sentido cultual, coherente con el contexto del templo y con la decisión inglesa para λατρεύω.
  - «Vestido sacerdotal» conserva la referencia a una prenda ritual sin imponer terminología confesional más marcada.
