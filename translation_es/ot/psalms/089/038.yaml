translation:
  language: es
  text: Como la luna[a], será establecido para siempre, y el testigo en el cielo[b] es fiel. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al igual que la luna'.
    reason: lexical_alternative
  - marker: b
    text: El 'testigo en el cielo' suele entenderse como la luna, que funciona como testigo celestial fiable de la permanencia del pacto.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּיָרֵחַ
  english_pob_choice: Like the moon
  chosen_spanish: Como la luna
  alternatives_spanish:
  - Como la luna
  - Al igual que la luna
  lexicon: HALOT
  rationale: El prefijo כְּ expresa comparación y יָרֵחַ significa 'luna'. 'Como la luna' conserva la similitud de modo natural en español y evita una calca rígida.
- source_word: יִכּוֹן
  english_pob_choice: it will be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - será afirmado
  - permanecerá firme
  lexicon: HALOT
  rationale: El nifal imperfecto expresa ser establecido o hecho firme. En español, 'será establecido' conserva el valor pasivo/resultativo y permite dejar implícito el sujeto, como en el hebreo.
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: En este contexto poético de pacto, עוֹלָם denota permanencia duradera. 'Para siempre' es idiomático, solemne y fiel al sentido.
- source_word: וְעֵד
  english_pob_choice: and the witness
  chosen_spanish: y el testigo
  alternatives_spanish:
  - y un testigo
  - y el testimonio
  lexicon: HALOT
  rationale: עֵד significa 'testigo'. 'El testigo' mantiene el referente celestial probable que el audit trail conserva sin resolverlo dogmáticamente, y suena natural en español.
- source_word: בַּשַּׁחַק
  english_pob_choice: in the sky
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo
  - en los cielos
  - en la bóveda celeste
  lexicon: HALOT
  rationale: שַׁחַק en poesía puede aludir al cielo/firmamento. 'En el cielo' refleja el singular del ajuste de revisión en el inglés POB y evita especificaciones no exigidas por el hebreo.
- source_word: נֶאֱמָן
  english_pob_choice: is faithful
  chosen_spanish: es fiel
  alternatives_spanish:
  - es fiel
  - es fiable
  - es seguro
  lexicon: HALOT
  rationale: El adjetivo expresa confiabilidad y firmeza; 'es fiel' preserva bien el matiz de fidelidad y resonancia de pacto sin sonar forzado.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selah
  lexicon: HALOT
  rationale: El término es de significado incierto; se translitera, como en el inglés POB, en lugar de inventar una traducción especulativa.
theological_decisions:
- issue: Referente del sujeto implícito en 'será establecido'
  english_pob_reading: El sujeto se deja como 'it', remitiendo al linaje/trono davídico del contexto inmediato sin repetirlo interpretativamente.
  chosen_spanish_reading: El sujeto queda implícito en 'será establecido', remitiendo al contexto davídico inmediato sin añadir 'su trono' ni 'su descendencia'.
  alternative_spanish_readings:
  - su trono será establecido
  - su descendencia será establecida
  rationale: El hebreo omite el sujeto explícito; el español puede conservar esa compactación con voz pasiva. Nombrar el referente cerraría una tensión interpretativa que el texto no resuelve aquí.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identidad del 'testigo en el cielo'
  english_pob_reading: Se conserva genéricamente 'the witness in the sky' sin identificarlo en el texto principal.
  chosen_spanish_reading: Se conserva genéricamente 'el testigo en el cielo' sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - la luna como testigo
  - un testigo celestial, posiblemente la luna
  - el testimonio del cielo
  rationale: La frase admite varias lecturas, y el hebreo no identifica de forma expresa al testigo. Mantener la ambigüedad en el texto principal respeta la cautela del POB y evita resolver la imagen más allá de la evidencia.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'skies' por 'sky' para reflejar con mayor precisión el singular hebreo; por eso la traducción española usa 'en el cielo'. Se mantuvo el resto de la línea sin ampliar el sujeto implícito ni identificar de manera concluyente al testigo celestial.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' en el proyecto cuando corresponde, pero en este versículo no aparece el Tetragrámaton.
  - Se conserva 'Selah' sin traducir por consistencia con el tratamiento POB del término.
  - '''Fiel'' se eligió para נֶאֱמָן por su naturalidad y porque preserva el matiz de fiabilidad/covenantidad sin necesidad de paráfrasis.'
