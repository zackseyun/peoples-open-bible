translation:
  language: es
  text: Y vinieron todos aquellos cuyo corazón los impulsó[a], y todos aquellos cuyo espíritu los movió voluntariamente; trajeron la ofrenda[a] de Yahvé para la obra de la tienda de reunión, para todo su servicio, y para las vestiduras sagradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuyo corazón se conmovió» y «cuyo espíritu los hizo dispuestos». El hebreo usa modismos de impulso interior y generosidad voluntaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: And everyone came
  chosen_spanish: Y todos los que… trajeron
  alternatives_spanish:
  - Y vino todo hombre
  - Y todos llegaron
  lexicon: HALOT
  rationale: El hebreo enlaza con la acción de presentarse para aportar. En español, «trajeron» expresa con naturalidad el acto de llevar la contribución; el contexto de donación justifica esta equivalencia sin perder el movimiento narrativo.
- source_word: כָּל אִישׁ
  english_pob_choice: everyone
  chosen_spanish: todos los que
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: El sentido es distributivo e inclusivo, no restrictivamente masculino. «Todos los que» conserva el valor colectivo y suena natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר נְשָׂא לִבּוֹ
  english_pob_choice: whose heart stirred him
  chosen_spanish: a quienes el corazón conmovido[b]
  alternatives_spanish:
  - cuyo corazón lo impulsó
  - cuyo corazón lo conmovió
  lexicon: HALOT
  rationale: 'La imagen hebrea es idiomática: el corazón como sede del impulso interior. «Conmovido» mantiene la idea de moción interna sin forzar una metáfora demasiado literal en español; se señala la alternativa para no ocultar la tensión léxica.'
- source_word: וְכֹל אֲשֶׁר נָדְבָה רוּחוֹ אֹתוֹ
  english_pob_choice: everyone whose spirit moved him willingly
  chosen_spanish: y todos aquellos a quienes el espíritu movía generosamente
  alternatives_spanish:
  - y todos aquellos cuyo espíritu los hizo dispuestos
  - y todos aquellos a quienes su espíritu impulsó voluntariamente
  lexicon: HALOT
  rationale: נָדַב aquí expresa disposición voluntaria y generosidad interior. «Movía generosamente» comunica tanto el impulso como la prontitud voluntaria, evitando reducirlo a mera emoción o a una decisión fría.
- source_word: הֵבִיאוּ
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - llevaron
  lexicon: HALOT
  rationale: «Trajeron» es la forma más directa y natural para el acto concreto de entregar una contribución al santuario.
- source_word: תְּרוּמַת יְהוָה
  english_pob_choice: Yahweh’s contribution
  chosen_spanish: la ofrenda de Yahvé
  alternatives_spanish:
  - la contribución de Yahvé
  - la ofrenda para Yahvé
  lexicon: HALOT
  rationale: תְּרוּמָה denota una ofrenda/contribución separada para un fin sagrado. En español, «ofrenda» conserva el registro cultual y evita la posible ambigüedad administrativa de «contribución»; se mantiene Yahvé por la decisión del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, usando «Yahvé» como forma española estable y reverente del nombre divino.
- source_word: לִמְלֶאכֶת
  english_pob_choice: for the work of
  chosen_spanish: para la obra de
  alternatives_spanish:
  - para el trabajo de
  - para la labor de
  lexicon: HALOT
  rationale: «Obra» funciona bien en el contexto del tabernáculo y su fabricación/erección, y suena más natural que un calco de «trabajo».
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - la carpa de reunión
  lexicon: HALOT
  rationale: En el contexto del Éxodo, «tabernáculo de reunión» es la denominación más reconocible y fiel para אֹהֶל מוֹעֵד, preservando el referente cultual tradicional sin perder inteligibilidad.
- source_word: וּלְכָל עֲבֹדָתוֹ
  english_pob_choice: for all its service
  chosen_spanish: para todo su servicio
  alternatives_spanish:
  - para toda su labor
  - para todo su ministerio
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto cultual apunta al servicio/ministerio del santuario. «Servicio» mantiene ese campo semántico sin introducir un término excesivamente eclesial.
- source_word: וּלְבִגְדֵי הַקֹּדֶשׁ
  english_pob_choice: and for the holy garments
  chosen_spanish: y para las vestiduras sagradas
  alternatives_spanish:
  - y para las vestiduras santas
  - y para los vestidos sagrados
  lexicon: HALOT
  rationale: «Vestiduras sagradas» expresa con dignidad y claridad el carácter consagrado de las prendas; evita «vestidos», que puede sonar demasiado moderno o genérico en este contexto.
theological_decisions:
- issue: Cómo expresar la disposición interior voluntaria de los donantes
  english_pob_reading: whose heart stirred him / whose spirit moved him willingly
  chosen_spanish_reading: el corazón conmovido y el espíritu que movía generosamente
  alternative_spanish_readings:
  - cuyo corazón lo impulsó
  - cuyo espíritu lo hizo voluntario
  rationale: El versículo combina dos idiomatismos de motivación interior. Se conservan ambos como impulsos internos libres y voluntarios, sin borrar la doble presentación hebrea de corazón y espíritu. «Generosamente» ayuda a captar la dimensión de liberalidad implícita en el acto de dar.
  doctrine_reference: Ex 35:21; notas POB sobre impulso interior y voluntariedad
- issue: Nombre divino Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se preserva el nombre divino propio en español, en continuidad con la política del proyecto de no reemplazarlo por una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto español sigue el último ajuste auditado del inglés, donde se prefirió una expresión más natural para el modismo del corazón. Aquí se mantuvo la doble estructura del hebreo (corazón/espíritu), pero se optó por un español fluido que preserve el matiz de impulso voluntario y la referencia cultual del tabernáculo. También se trasladó la decisión doctrinal de usar el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la política del proyecto para יְהוָה.
  - Se usa «tabernáculo de reunión» como equivalente estable de אֹהֶל מוֹעֵד.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - Se conserva un registro bíblico moderno con términos cultuales claros y no eclesializados.
