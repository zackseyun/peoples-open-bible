  explicitly; the core list (sins, ignorances, passions, pleasures) is clear. The
  consult English provided does not match this Coptic fragment, reinforcing that the
  mapping likely straddles a page-edge or mis-segment. The phrase ‘ⲡⲣⲟⲥ ⲡⲉ’ at the
  end is fragmentary; I render it additively (‘as well’) rather than directionally
  to avoid false precision.
