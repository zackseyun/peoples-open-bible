translation:
  language: es
  text: Pero Menelao, pensando que había hallado una oportunidad favorable, se apropió indebidamente[a] de algunos objetos de oro del templo y se los dio a Andrónico[b]; y otros había vendido en Tiro y en las ciudades de alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desvió para sí» o «se adueñó fraudulentamente». El griego implica apropiación indebida de bienes sagrados.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se los entregó». El verbo griego también puede sugerir que se los dio como favor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νομίσας
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - creyendo
  - considerando
  lexicon: LSJ
  rationale: El participio aoristo introduce el juicio interno de Menelao. «Pensando» conserva ese matiz subjetivo de evaluación sin volver la frase pesada en español.
- source_word: καιρὸν εὐφυῆ
  english_pob_choice: a favorable opportunity
  chosen_spanish: una oportunidad favorable
  alternatives_spanish:
  - un momento oportuno
  - una ocasión propicia
  lexicon: LSJ
  rationale: La expresión señala una ocasión bien aprovechada o ventajosa. «Oportunidad favorable» / «una oportunidad favorable» comunica oportunidad y ventaja con naturalidad en español.
- source_word: χρυσώματά τινα
  english_pob_choice: some of the gold vessels
  chosen_spanish: algunos objetos de oro
  alternatives_spanish:
  - algunas vasijas de oro
  - ciertos artículos de oro
  lexicon: LSJ
  rationale: El término puede abarcar objetos de oro del templo sin exigir que sean vasijas específicas. Dado que el griego y el contexto permiten amplitud, «objetos de oro» evita restringir indebidamente el sentido.
- source_word: τῶν τοῦ ἱεροῦ
  english_pob_choice: from the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - pertenecientes al templo
  - del santuario
  lexicon: LSJ
  rationale: El genitivo identifica esos objetos como propiedad sagrada. «Del templo» es claro, directo y conserva la referencia cultual.
- source_word: νοσφισάμενος
  english_pob_choice: misappropriated
  chosen_spanish: se apropió indebidamente
  alternatives_spanish:
  - desvió para sí
  - se adueñó fraudulentamente
  lexicon: LSJ
  rationale: El verbo implica apropiación fraudulenta de bienes sagrados o confiados. «Se apropió indebidamente» mantiene la fuerza moral sin introducir un tecnicismo financiero más específico de lo que el griego exige.
- source_word: ἐχαρίσατο
  english_pob_choice: gave them
  chosen_spanish: se los dio
  alternatives_spanish:
  - se los entregó
  - se los regaló
  lexicon: LSJ
  rationale: El medio de χαρίζομαι aquí expresa dar como favor. En español, «se los dio» reproduce de forma sobria el acto de entregarlos a Andrónico sin expandir innecesariamente a «como regalo».
- source_word: ἐτύγχανεν πεπρακὼς
  english_pob_choice: he had sold
  chosen_spanish: había vendido
  alternatives_spanish:
  - había logrado vender
  - había llegado a vender
  lexicon: LSJ
  rationale: La perífrasis indica que otras piezas ya estaban vendidas; el matiz incidental puede mantenerse en nota. «Había vendido» es la forma más natural en español formal.
- source_word: ἕτερα
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - otras piezas
  - otros artículos
  lexicon: LSJ
  rationale: Retoma los restantes objetos del templo. «Otros» conserva la referencia anafórica sin añadir información no explícita.
- source_word: εἴς τε Τύρον καὶ τὰς κύκλῳ πόλεις
  english_pob_choice: in Tyre and the surrounding cities
  chosen_spanish: en Tiro y las ciudades de alrededor
  alternatives_spanish:
  - en Tiro y las ciudades vecinas
  - a Tiro y a las ciudades de alrededor
  lexicon: LSJ
  rationale: La frase ubica el lugar donde se vendieron los otros objetos. «En Tiro y las ciudades de alrededor» sigue de cerca el griego y suena natural en español.
theological_decisions:
- issue: Gravedad del abuso de bienes sagrados
  english_pob_reading: Rendered νοσφισάμενος as 'misappropriated' to emphasize wrongful appropriation of temple property without adding later doctrinal categories.
  chosen_spanish_reading: «se apropió indebidamente»
  alternative_spanish_readings:
  - «se robó»
  - «desvió para sí»
  rationale: El texto denuncia el abuso sacrílego de bienes del templo, pero el griego no obliga a usar un término jurídico moderno específico. «Se apropió indebidamente» conserva la censura moral y el carácter fraudulento sin sobrerinterpretar.
  doctrine_reference: Principio de primacía del idioma original y de correspondencia semántica; evitar insertar categorías no exigidas por el texto.
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del inglés POB, que ajustó νοσφισάμενος de 'embezzled' a 'misappropriated' y eliminó la expansión 'as a gift' en ἐχαρίσατο. En español, se optó por una formulación igualmente sobria y formal («se apropió indebidamente», «se los dio»), manteniendo el matiz de favor sin añadir desarrollo interpretativo innecesario.
  spanish_consistency_notes:
  - Se mantiene «Menelao» y «Andrónico» como nombres propios ya normalizados en español.
  - «Templo» se usa de forma consistente para ἱερόν en este contexto.
  - 'La cláusula final preserva el orden y la relación de acciones del griego: primero la apropiación y entrega, luego la venta de otros objetos en otra zona geográfica.'
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones terminológicas ajenas al griego del versículo.
