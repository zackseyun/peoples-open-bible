translation:
  language: es
  text: Pero su delicia está en la ley[a] de Yahvé, y en su ley medita[b] día y noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción» para «ley».
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo también puede sugerir murmurar o recitar en voz baja mientras se medita.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Más bien
  - Sino
  lexicon: HALOT
  rationale: La construcción es claramente adversativa/exclusiva frente al cuadro del impío en el versículo anterior. «Pero» conserva bien el contraste y suena natural en español bíblico.
- source_word: בְּתוֹרַת
  english_pob_choice: in the law of
  chosen_spanish: en la ley de
  alternatives_spanish:
  - en la instrucción de
  - en la enseñanza de
  lexicon: HALOT
  rationale: תוֹרָה puede abarcar 'instrucción', pero aquí el paralelismo y el peso canónico favorecen «ley» como en la edición inglesa, manteniendo la fuerza escritural y de pacto del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo tiene el Nombre divino directo; se conserva como transliteración «Yahvé» para no sustituirlo por un título. Esto sigue el principio de la POB de transparentar el Tetragrámaton.
- source_word: חֶפְצוֹ
  english_pob_choice: his delight
  chosen_spanish: su delicia
  alternatives_spanish:
  - su placer
  - su deseo
  lexicon: HALOT
  rationale: חֵפֶץ expresa aquello en lo que alguien se deleita o se complace. «Su delicia» es natural en español y preserva el matiz afectivo.
- source_word: וּבְתוֹרָתוֹ
  english_pob_choice: and on his law
  chosen_spanish: y en su ley
  alternatives_spanish:
  - y sobre su ley
  - y medita en su ley
  lexicon: HALOT
  rationale: El sufijo remite a Yahvé. En español, con «medita» la preposición más natural es «en». Repetir «ley» mantiene el paralelismo hebreo y evita diluirlo con un simple pronombre.
- source_word: יֶהְגֶּה
  english_pob_choice: he meditates
  chosen_spanish: medita
  alternatives_spanish:
  - murmura
  - recita en voz baja
  - reflexiona
  lexicon: HALOT
  rationale: El verbo puede abarcar murmurar, recitar en voz baja o meditar. En este contexto sapiencial, «medita» comunica la actividad sostenida de contemplación; la posible matización de recitación queda reconocida en la nota.
- source_word: יוֹמָם וָלָיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - continuamente
  lexicon: HALOT
  rationale: Es un merismo hebreo para continuidad. «Día y noche» es la equivalencia más directa e idiomática en español.
theological_decisions:
- issue: Traducción de תּוֹרָה en un salmo sapiencial
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: Aunque תּוֹרָה puede significar 'instrucción', aquí la POB inglesa opta por 'law' para conservar el valor canónico y del pacto. En español, «ley» es la opción más fiel a esa decisión y al paralelismo del versículo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el Nombre propio de Dios en lugar de una sustitución titular. «Yahvé» es la forma española transparente y reconocible para el Tetragrámaton, coherente con la doctrina POB sobre יְהוָה.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se reportaron cambios y el acuerdo de revisión fue alto. La redacción española mantiene las decisiones auditablemente consistentes con la base hebrea y con la POB inglesa.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «ley» / «su ley».
  - «Yahvé» conserva el Tetragrámaton sin sustituirlo por un título.
  - «Medita» expresa el sentido principal del verbo y la nota preserva la posible ambigüedad de recitación/murmuración.
  - El orden sintáctico busca naturalidad en español sin perder la estructura contrastiva del hebreo.
