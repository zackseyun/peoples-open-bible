review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ταῦτα = «estas cosas», ἐντέλλομαι = mandato dirigido a los discípulos, ἵνα = finalidad/resultado intencional, ἀλλήλους = reciprocidad. Sin embargo, «Estas cosas les mando» suena menos natural en español que una formulación equivalente que preserve el orden enfático sin calco duro. Además, la nota alternativa debe ajustarse al español natural y al modo imperativo si se presenta como contenido cercano.'
  spanish_quality_summary: 'El texto actual es comprensible y digno, pero «Estas cosas les mando» resulta algo tieso en español contemporáneo eclesial. «Estas cosas les ordeno» sería más duro de lo necesario. Una mejor solución es «Esto les mando», pero perdería el plural ταῦτα. La opción más fiel y legible es «Estas cosas les mando» solo si se tolera cierta rigidez; aun así, puede mejorarse con una nota más natural. También conviene revisar la alternativa de la nota: «que se amen» después de dos puntos no es la forma española más directa para mandato citado.'
  glossary_alignment: No hay conflictos con el glosario mayor del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, carne, etc. La elección de «amen»/«se amen» y «unos a otros» está alineada con el valor semántico del griego. El único ajuste necesario es estilístico-sintáctico, no terminológico.
  issues:
  - severity: medium
    issue: La construcción principal «Estas cosas les mando» es comprensible pero algo rígida en español.
    rationale: Aunque refleja el griego de cerca, en español suena menos idiomática que otras opciones formales. Conviene una formulación que conserve fidelidad y mejore la fluidez.
  - severity: medium
    issue: La nota alternativa usa «que se amen unos a otros» como si fuera mandato citado.
    rationale: 'Si la cláusula se presenta como contenido cercano tras dos puntos, en español suena más natural convertirla en imperativo directo: «ámense unos a otros».'
  - severity: low
    issue: El anclaje de la nota sobre «mando» es aceptable, pero la alternativa comentada afecta a toda la cláusula.
    rationale: No exige reanclaje obligatorio, pero la redacción de la nota debe corresponder mejor al alcance sintáctico de la alternativa.
  revised_spanish_text: Estas cosas les mando[a], para que se amen unos a otros.
  revised_footnotes:
  - marker: a
    text: 'O: «Les mando estas cosas: ámense unos a otros». La cláusula con ἵνα puede entenderse como propósito o como contenido cercano.'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque, aunque algo rígido, sigue siendo fiel, claro y suficientemente natural en un registro bíblico formal. La reparación necesaria es menor y se concentra en la nota, que debe expresar la lectura alternativa en español idiomático con imperativo directo («ámense») y una explicación sintáctica más natural («puede entenderse»).
