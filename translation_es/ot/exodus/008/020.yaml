revisions:
- from: Yahvé hizo así[a], y llegó un fuerte enjambre a la casa de Faraón y a las casas de sus siervos; y en toda la tierra de Egipto la tierra quedó arruinada por causa del enjambre.
  to: Yahvé hizo así[a], y llegó un gran enjambre a la casa de Faraón y a las casas de sus siervos; y, por toda la tierra de Egipto, la tierra quedó arruinada por causa del enjambre.
  rationale: Se ajusta «fuerte» a «gran» para reflejar con más fidelidad כָּבֵד en este contexto, manteniendo a la vez un español natural. También se mejora ligeramente la puntuación para hacer más fluida la cláusula final sin alterar la estructura ni el sentido del hebreo. La nota se adapta para preservar tanto la alternativa más literal como la explicación tradicional sobre los insectos.
