  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/004/003.yaml
  text: Therefore, when anyone speaks against you, my children, do not be stirred to anger; and if anyone praises you as holy, do not be puffed up. Be changed neither to delight nor to disgust.
