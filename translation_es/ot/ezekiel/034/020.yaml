translation:
  language: es
  text: 'Por tanto, así dice el Señor Dios Yahvé a ellos: He aquí[a], yo mismo juzgaré entre las ovejas gordas y las flacas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre una oveja gorda y una oveja flaca»; los sustantivos singulares probablemente representan clases dentro del rebaño, por eso en español se usa el colectivo natural «las ovejas gordas y las flacas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca consecuencia inferencial a partir del contexto previo; 'Por tanto' conserva el nexo lógico y el tono profético formal.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Fórmula profética solemne y natural en español; 'así dice' reproduce bien el valor de mensajero sin sobreparafrasear.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con 'Yahvé' según el estándar del proyecto para יְהוָה; 'Señor' refleja אֲדֹנָי en un castellano reverente y fluido. Se evita la convención de ocultar el nombre tras 'SEÑOR'.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - contra ellos
  - para ellos
  lexicon: HALOT
  rationale: En la fórmula de discurso directo, la preposición introduce a los destinatarios del oráculo; 'a ellos' es la solución más directa y neutral.
- source_word: הִנְנִי אָנִי
  english_pob_choice: Behold, I myself
  chosen_spanish: He aquí, yo mismo
  alternatives_spanish:
  - Miren, yo mismo
  - Aquí estoy, yo mismo
  lexicon: HALOT
  rationale: Conserva el deíctico enfático y la autocarga del sujeto. En español, 'He aquí' mantiene el registro bíblico sin sonar excesivamente arcaico.
- source_word: וְשָׁפַטְתִּי
  english_pob_choice: will judge
  chosen_spanish: juzgaré
  alternatives_spanish:
  - haré justicia entre
  - discerniré y juzgaré
  lexicon: HALOT
  rationale: El verbo שׁפט aquí tiene valor discriminativo/decisorio entre grupos del rebaño; 'juzgaré' preserva ese sentido legal y relacional.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - entre ... e ...
  - entre ... y entre ...
  lexicon: HALOT
  rationale: La coordinación española normaliza la repetición del hebreo sin perder la estructura contrastiva.
- source_word: שֶׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordera
  - oveja individual
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, funciona aquí de modo representativo/clasificatorio dentro del rebaño; 'oveja' suena natural y mantiene la imagen pastoral.
- source_word: בִרְיָה
  english_pob_choice: fat
  chosen_spanish: gorda
  alternatives_spanish:
  - cebada
  - robusta
  lexicon: HALOT
  rationale: El adjetivo denota gordura o corpulencia; 'gorda' refleja de forma clara el contraste con 'flaca' en la metáfora del rebaño.
- source_word: רָזָה
  english_pob_choice: lean
  chosen_spanish: flaca
  alternatives_spanish:
  - delgada
  - escuálida
  lexicon: HALOT
  rationale: '''Flaca'' conserva el paralelismo directo con ''gorda'' y expresa adecuadamente la oposición física del texto.'
theological_decisions:
- issue: Traducción del Tetragrámaton en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: La guía del proyecto indica Yahvé para יְהוָה. En el compuesto, 'Señor' traduce אֲדֹנָי y 'Yahvé' mantiene explícito el nombre del pacto; así se conserva el doble valor del hebreo sin la convención de sustitución por mayúsculas.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH -> Yahvé'
- issue: Sentido judicial de שׁפט en un contexto pastoral
  english_pob_reading: will judge
  chosen_spanish_reading: juzgaré
  alternative_spanish_readings:
  - haré justicia entre
  - gobernaré
  rationale: En el pasaje, Dios distingue entre dos clases de ovejas; 'juzgaré' conserva el valor decisorio/discriminativo del verbo sin diluirlo en un sentido meramente administrativo.
  doctrine_reference: HALOT / contexto inmediato de Ezequiel 34:20
translation_notes:
  revision_awareness: 'El texto sigue la lectura alta de acuerdo del audit trail inglés y conserva las decisiones estables: fórmula profética, nombre divino explícito, contraste pastoral y valor judicial de שׁפט. No se adoptó la sustitución inglesa ''the Lord GOD'' como máscara, sino la política española del proyecto ''Señor Yahvé''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Señor'' traduce אֲדֹנָי en el título compuesto.'
  - '''Oveja'' se usa como singular representativo, coherente con el hebreo.'
  - '''Gorda/flaca'' preserva el contraste léxico directo del texto.'
  - La puntuación y el orden responden al registro profético en español natural.
