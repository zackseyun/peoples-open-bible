translation:
  language: es
  text: La esposa capaz enriquece a su marido, y pasará sus años en placidez[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y completará sus años en paz».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵשֶׁת חַיִל / γυνὴ ἀνδρεία
  english_pob_choice: a capable wife
  chosen_spanish: la esposa capaz
  alternatives_spanish:
  - una esposa valiente
  - una esposa excelente
  - una esposa virtuosa
  lexicon: HALOT
  rationale: חַיִל y el griego ἀνδρεία expresan fuerza, capacidad y excelencia probada. En español, «capaz» conserva esa amplitud sin volver el dicho marcial o excesivamente moralizante. «Esposa» es el equivalente natural de wife en este contexto sapiencial.
- source_word: תְּדַּשֵּׁן / εὐφραίνει
  english_pob_choice: enriches
  chosen_spanish: enriquece
  alternatives_spanish:
  - alegra
  - refresca
  - hace prosperar
  lexicon: HALOT
  rationale: El hebreo sugiere hacer próspero, nutrir o volver «grueso» en sentido figurado; el inglés POB eligió «enriches» para reflejar esa fuerza. En español, «enriquece» preserva bien la imagen de bienestar y prosperidad sin perder naturalidad.
- source_word: לְבַעֲלָהּ
  english_pob_choice: her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - para su marido
  lexicon: HALOT
  rationale: בעל significa claramente «marido/esposo» aquí. «Marido» suena más directo y mantiene el paralelismo del enunciado sapiencial; el dativo español «a su marido» expresa bien el complemento del verbo.
- source_word: וּשְׁנֵי חַיָּיו
  english_pob_choice: his years
  chosen_spanish: sus años
  alternatives_spanish:
  - los años de su vida
  - su vida
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «los años de su vida». En español, «sus años» es conciso y conserva el foco temporal sin añadir más de lo necesario.
- source_word: יְבַלֶּה
  english_pob_choice: he will spend
  chosen_spanish: pasará
  alternatives_spanish:
  - vivirá
  - transcurrirá
  - gastará
  lexicon: HALOT
  rationale: El verbo se refiere a pasar el tiempo/la vida. «Pasará» es una solución natural en español y mantiene la idea de transcurrir los años.
- source_word: בַנְעִימִים / ἐν εἰρήνῃ
  english_pob_choice: in pleasantness
  chosen_spanish: en agradable paz
  alternatives_spanish:
  - en placidez
  - en delicia
  - en paz
  lexicon: HALOT
  rationale: 'El hebreo apunta a lo agradable, deleitoso; el griego ofrece «en paz». Para no borrar la tensión entre ambos testigos, se combinan ambos matices en español con una frase natural: «en agradable paz».'
theological_decisions:
- issue: Divergencia hebreo-griega en la frase final
  english_pob_reading: Main text follows Hebrew sense 'in pleasantness'; Greek footnote preserves 'in peace'.
  chosen_spanish_reading: El texto principal dice «en agradable paz», con nota que preserva la lectura griega «en paz».
  alternative_spanish_readings:
  - en paz
  - en placidez
  - en deleite
  rationale: Como el hebreo conservado es de alta confianza y el griego ofrece una posible variante o interpretación, conviene no elegir una sola opción de forma excluyente. La formulación española mantiene el matiz de ambos testigos sin ocultar la diferencia.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar tensiones/alternativas en notas cuando corresponde'
translation_notes:
  revision_awareness: El borrador inglés fue revisado desde «gladdens» a «enriches» para ajustarse mejor al hebreo תְּדַּשֵּׁן. La versión española sigue esa revisión con «enriquece», y conserva la alternativa griega en nota para transparencia textual.
  spanish_consistency_notes:
  - Se mantiene un registro neutral y digno, apto para lectura eclesial.
  - Se evita «SEÑOR» o formulaciones litúrgicas ajenas al pasaje; no aparecen términos teológicos que requieran normalización especial.
  - La nota al pie marca la lectura griega alternativa sin desplazar la traducción principal basada en el hebreo.
