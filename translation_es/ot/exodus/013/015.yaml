review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y mantiene correctamente Yahvé, primogénito, sacrifico y redimo. Sin embargo, no preserva con suficiente fidelidad varios puntos fuente-clave: הִקְשָׁה en contexto con לְשַׁלְּחֵנוּ se expresa mejor como negativa obstinada, no simplemente ''se endureció''; הַזְּכָרִים debe restringir explícitamente a los machos/varones entre los que abren el vientre; y בָּנַי significa específicamente ''mis hijos varones / mis hijos'' en sentido masculino, no una forma potencialmente inclusiva como ''mis hijos'' si produce ambigüedad en español. Además, la sintaxis ''todo el que abre el vientre, los varones'' suena poco natural y puede oscurecer el alcance distributivo.'
  spanish_quality_summary: 'El español es mayormente digno, pero presenta giros poco naturales: ''se endureció para no dejarnos ir'' es menos idiomático que ''se negó obstinadamente a dejarnos ir''; ''todo el que abre el vientre, los varones'' resulta forzado; y ''yo lo redimo'' es innecesariamente enfático. Una redacción más fluida puede conservar el tono legal-sacral sin perder precisión.'
  glossary_alignment: Alinea bien con Yahvé, primogénito y redimir. Requiere ajuste en הִקְשָׁה para reflejar la decisión auditada 'stubbornly refused', y en בָּנַי para no neutralizar 'sons'. Para הַזְּכָרִים, en este contexto de animales consagrados, 'macho' es más exacto que 'varón'.
  issues:
  - severity: medium
    issue: הִקְשָׁה se tradujo como 'se endureció'
    rationale: Aunque קשׁה puede relacionarse con endurecimiento, el audit trail documenta que aquí, con לְשַׁלְּחֵנוּ, el sentido idiomático es negativa obstinada. 'Se negó obstinadamente a dejarnos ir' reproduce mejor el valor contextual.
  - severity: high
    issue: '''todo el que abre el vientre, los varones'' es sintácticamente torpe y semánticamente impreciso'
    rationale: פֶּטֶר רֶחֶם הַזְּכָרִים describe cada macho que abre el vientre. La formulación actual no suena natural en español y puede leerse como aposición confusa. 'Todo macho que abre el vientre' conserva el sentido legal con claridad.
  - severity: medium
    issue: בָּנַי se vertió como 'mis hijos' sin marcar la referencia masculina
    rationale: 'El hebreo especifica ''mis sons''. En español, ''mis hijos'' puede funcionar como masculino genérico, pero aquí conviene evitar ambigüedad y conservar la precisión del original: ''mis hijos varones'' o ''mis hijos primogénitos'' según el contexto inmediato. Dado que ya aparece ''todo primogénito'', ''mis hijos varones'' es la mejor solución.'
  - severity: low
    issue: '''yo lo redimo'' añade énfasis innecesario'
    rationale: El hebreo simplemente dice 'redimiré/redimo'. En español, 'redimo' basta y fluye mejor en la clausula distributiva.
  revised_spanish_text: Y cuando el faraón se negó obstinadamente a dejarnos ir, Yahvé mató a todo primogénito en la tierra de Egipto, desde el primogénito del hombre[a] hasta el primogénito de la bestia. Por tanto, yo sacrifico a Yahvé todo macho que abre el vientre, pero a todo primogénito de mis hijos varones lo redimo.
  revised_footnotes:
  - marker: a
    text: O 'desde el primogénito de la humanidad hasta el primogénito del ganado'.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar con mayor fidelidad la negativa obstinada de Faraón, mejorar la naturalidad española de la fórmula sacrificial, y conservar la precisión de género en 'mis hijos varones', en línea con el hebreo y el audit trail inglés. Se mantiene una nota alternativa para el contraste 'hombre/bestia', siguiendo el precedente del inglés.
