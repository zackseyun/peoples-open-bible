  to: cada plato de plata pesaba ciento treinta siclos, y cada cuenco setenta; toda la plata de los utensilios era de dos mil cuatrocientos siclos, según el siclo del santuario[a].
  rationale: 'Se corrigen dos elecciones léxicas para reflejar mejor los recipientes cultuales del hebreo y del rastro POB en inglés: ''platillo'' → ''plato'', ''tazón'' → ''cuenco''. También se reubica la nota al pie a la frase final, donde realmente pertenece la alternativa de בְּשֶׁקֶל הַקֹּדֶשׁ. No se requiere adjudicación adicional porque el sentido fuente es claro y la reparación es menor.'
