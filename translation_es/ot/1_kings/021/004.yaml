translation:
  language: es
  text: 'Así que Acab entró en su casa hosco[a] y enojado por la palabra que Nabot el jezreelita le había dicho, diciendo: «No te daré la heredad de mis padres[b]». Y se acostó sobre su cama y apartó el rostro[c], y no comió pan[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “abatido” o “malhumorado”. El hebreo expresa un ánimo retraído y ceñudo; “hosco” conserva bien ese matiz junto con “enojado”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “la herencia de mis padres”. Hebreo: “mis padres”, reteniendo el lenguaje patrimonial y familiar del original.'
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea literalmente dice que apartó o volvió su rostro, un gesto de rechazo o despecho.
    reason: source_note
  - marker: d
    text: 'Hebreo: “pan”, un modismo que puede significar alimento en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַר
  english_pob_choice: sullen
  chosen_spanish: sordo
  alternatives_spanish:
  - abatido
  - hosco
  - triste y cerrado
  lexicon: HALOT
  rationale: 'El hebreo describe un estado de ánimo retraído, torcido o ceñudo. En español, ''sordo'' en este contexto no se toma en sentido físico sino idiomático: suena a alguien cerrado, apartado y malhumorado. Sin embargo, porque puede resultar menos transparente que otras opciones, se documenta la alternativa preferente de estilo más directo. Aquí se prefiere una solución que conserve la tensión de retraimiento junto con la ira siguiente.'
- source_word: וְזָעֵף
  english_pob_choice: angry
  chosen_spanish: enojado
  alternatives_spanish:
  - irritado
  - airado
  - enojado
  lexicon: HALOT
  rationale: '''זָעֵף'' expresa estar molesto o enfurecido. ''Enojado'' transmite bien la fuerza emocional en español moderno sin endurecer el texto con un arcaísmo.'
- source_word: עַל הַדָּבָר אֲשֶׁר דִּבֶּר אֵלָיו
  english_pob_choice: because of the word that ... had spoken to him
  chosen_spanish: por la palabra que ... le había dicho
  alternatives_spanish:
  - por lo que ... le había dicho
  - por el asunto que ... le había dicho
  - a causa de la palabra que ... le había dicho
  lexicon: HALOT
  rationale: '''דָּבָר'' puede ser ''palabra'', ''asunto'' o ''cosa''. Como el contexto inmediato es una declaración verbal de Nabot, ''palabra'' mantiene la cercanía formal al hebreo y al mismo tiempo funciona en español.'
- source_word: נָבוֹת הַיִּזְרְעֵאלִי
  english_pob_choice: Naboth the Jezreelite
  chosen_spanish: Nabot el jezreelita
  alternatives_spanish:
  - Nabot el de Jezreel
  - Nabot, el israelita de Jezreel
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se traduce el gentilicio con una forma natural en español bíblico. 'Jezreelita' conserva el vínculo geográfico sin explicitar más de lo que el texto dice.
- source_word: לֹא אֶתֵּן לְךָ אֶת נַחֲלַת אֲבוֹתָי
  english_pob_choice: I will not give you the inheritance of my fathers
  chosen_spanish: No te daré la heredad de mis padres
  alternatives_spanish:
  - No te daré la herencia de mis padres
  - No te daré la heredad de mis antepasados
  - No te daré la heredad de mis padres
  lexicon: HALOT
  rationale: '''נַחֲלָה'' es más que una posesión genérica: es una heredad/inheritance familiar recibida por línea ancestral. ''Heredad'' preserva mejor ese valor legal y patrimonial que ''herencia''. ''Padres'' conserva el plural masculino del hebreo y su peso patrimonial.'
- source_word: אֲבוֹתָי
  english_pob_choice: my fathers
  chosen_spanish: mis padres
  alternatives_spanish:
  - mis antepasados
  - mis padres
  lexicon: HALOT
  rationale: El hebreo usa plural masculino, pero en español 'padres' puede expresar tanto el sentido biológico como el patrimonial de la línea familiar. Se evita 'antepasados' porque diluye la forma concreta del original.
- source_word: וַיִּשְׁכַּב עַל מִטָּתוֹ
  english_pob_choice: he lay down on his bed
  chosen_spanish: se acostó sobre su cama
  alternatives_spanish:
  - se tendió sobre su cama
  - se acostó en su cama
  - se echó sobre su cama
  lexicon: HALOT
  rationale: '''וַיִּשְׁכַּב'' narra la acción de recostarse o acostarse; ''se acostó'' es natural en español y conserva el movimiento narrativo. ''Cama'' es un equivalente normal de ''bed''.'
- source_word: וַיַּסֵּב אֶת פָּנָיו
  english_pob_choice: turned his face away
  chosen_spanish: volvió el rostro
  alternatives_spanish:
  - apartó el rostro
  - volvió su rostro
  - giró el rostro
  lexicon: HALOT
  rationale: El hebreo describe un gesto de apartamiento. 'Volvió el rostro' mantiene la imagen corporal del original y permite una lectura de distanciamiento o despecho sin añadir interpretaciones excesivas.
- source_word: וְלֹא אָכַל לָחֶם
  english_pob_choice: he would not eat bread
  chosen_spanish: no comió pan
  alternatives_spanish:
  - no quiso comer pan
  - no comió alimento
  - no quiso comer
  lexicon: HALOT
  rationale: Se conserva el hebraísmo literal 'pan', que en español bíblico es inteligible y reproduce el idioma de origen. 'No quiso' añadiría demasiado la voluntad explícita; 'no comió pan' deja el enunciado sobrio como en el hebreo.
theological_decisions:
- issue: Mantenimiento del lenguaje de herencia familiar en la negativa de Nabot
  english_pob_reading: I will not give you the inheritance of my fathers
  chosen_spanish_reading: No te daré la heredad de mis padres
  alternative_spanish_readings:
  - No te daré la herencia de mis padres
  - No te daré la heredad de mis antepasados
  rationale: Se conserva la fuerza patrimonial y genealógica de נַחֲלָה y אֲבוֹתָי. 'Heredad' y 'padres' retienen el carácter concreto del reclamo de Nabot sin neutralizar la línea familiar masculina que el hebreo expresa.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate over gender-neutral)
- issue: Gesto de apartar el rostro como señal de disgusto
  english_pob_reading: turned his face away
  chosen_spanish_reading: volvió el rostro
  alternative_spanish_readings:
  - apartó el rostro
  - giró el rostro
  rationale: La acción corporal comunica rechazo, despecho o retraimiento. En español, 'volvió el rostro' deja abierta esa tensión sin convertirla en una interpretación más fuerte de la necesaria.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 2 (Preserve source imagery and narrative tension)
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y toma en cuenta el audit trail inglés, incluida la revisión que cambió la unión de la cita de Nabot a un gerundio (‘saying’), aquí reflejado como «diciendo». Se preserva la tensión entre un ánimo retraído y la negativa de Nabot, así como el hebraísmo final sobre comer pan.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en este proyecto solo cuando el tetragrámaton aparece explícitamente; en este versículo no aparece.
  - Se mantiene la transliteración ‘Nabot’ y el gentilicio ‘jezreelita’ de forma coherente con el estilo del proyecto.
  - ‘Heredad’ se usa aquí por la carga legal y patrimonial de נַחֲלָה, distinta de una posesión genérica.
  - Se conserva el hebraísmo ‘pan’ por fidelidad al modismo, aunque en español pueda entenderse de manera metonímica como alimento.
