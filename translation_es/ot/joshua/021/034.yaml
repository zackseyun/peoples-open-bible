translation:
  language: es
  text: 'Y a las familias de los hijos de Merari, los levitas restantes, de la tribu de Zabulón: Jocneam con sus ejidos, y Kartah[a] con sus ejidos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kartah también aparece como «Kartha» en algunas traducciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מִשְׁפְּח֣וֹת
  english_pob_choice: And to the families of
  chosen_spanish: Y a las familias de
  alternatives_spanish:
  - Y a los clanes de
  - Y para las familias de
  lexicon: HALOT
  rationale: El hebreo continúa la lista de asignación con una preposición de dirección/beneficio; en español, «a las familias de» conserva esa relación sin volverla mecánica. Se prefiere «familias» porque es claro y natural, aunque «clanes» también sería posible.
- source_word: בְּנֵי מְרָרִי
  english_pob_choice: the sons of Merari
  chosen_spanish: los hijos de Merari
  alternatives_spanish:
  - los descendientes de Merari
  lexicon: HALOT
  rationale: Se mantiene la forma genealógica directa del hebreo. «Hijos» conserva la estructura semítica del original; «descendientes» explicita la relación, pero atenúa la forma del texto fuente.
- source_word: הַלְוִיִּם הַנּוֹתָרִים
  english_pob_choice: the remaining Levites
  chosen_spanish: los levitas restantes
  alternatives_spanish:
  - el resto de los levitas
  - los levitas que quedaban
  lexicon: HALOT
  rationale: «Restantes» comunica el valor de lo que queda por asignar en la distribución. Es una opción natural en español y mantiene la idea de que se trata del grupo que todavía no había recibido heredad.
- source_word: מֵאֵת מַטֵּה זְבוּלֻן
  english_pob_choice: from the tribe of Zebulun
  chosen_spanish: de la tribu de Zabulón
  alternatives_spanish:
  - de la vara/tribu de Zabulón
  - del pueblo de la tribu de Zabulón
  lexicon: HALOT
  rationale: En contexto de repartos tribales, מַטֶּה significa «tribu». «De la tribu de Zabulón» es la equivalencia más clara y fiel; «Zabulón» sigue la forma española tradicional del nombre.
- source_word: יָקְנְעָם
  english_pob_choice: Jokneam
  chosen_spanish: Jocneam
  alternatives_spanish:
  - Yocneam
  - Jokneam
  lexicon: Transliteración estándar del topónimo
  rationale: Se usa una transliteración española coherente con la pronunciación tradicional bíblica en castellano. «Jocneam» es la forma más natural para lectores en español y conserva el nombre propio sin interpretarlo.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus ejidos
  alternatives_spanish:
  - sus pastizales
  - sus tierras de pasto
  - su terreno común
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto alrededor de la ciudad, con función de uso común/pastoreo. «Ejidos» recoge bien esa zona comunal en español; aunque no es idéntico a la institución moderna, es una equivalencia lexical estable y comprensible. Se evita «pasturelands» literal porque resulta menos idiomático.
- source_word: קַרְתָּה
  english_pob_choice: Kartah
  chosen_spanish: Quirta
  alternatives_spanish:
  - Kartá
  - Kartah
  lexicon: Transliteración del topónimo
  rationale: Se adopta una forma española legible del nombre propio. «Quirta» refleja una adaptación ortográfica posible en español; la variante inglesa «Kartah» se conserva como opción, pero no como forma principal.
theological_decisions:
- issue: Referencia tribal y reparto levítico sin reinterpretación
  english_pob_reading: A list of allocated Levitical towns from Zebulun’s territory
  chosen_spanish_reading: Una lista de ciudades levíticas asignadas dentro del territorio de Zabulón
  alternative_spanish_readings:
  - Una lista de ciudades para los levitas en territorio de Zabulón
  rationale: El versículo es administrativo y distributivo; no introduce una afirmación doctrinal nueva. La traducción mantiene el sentido de asignación territorial sin añadir explicaciones que el hebreo no expresa en este versículo concreto.
  doctrine_reference: Josué 21:34; reparto levítico en el marco de Números 35 y Josué 21
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el texto base y con la auditoría inglesa. No se detectaron revisiones sustantivas en el flujo de control; se mantuvieron las equivalencias léxicas principales y solo se resolvieron diferencias de forma en transliteración y en el término espacial מִגְרָשׁ mediante un equivalente español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no lo contiene.
  - Se usa «hijos de» para conservar la genealogía del hebreo; en listas tribales del proyecto esto evita una paráfrasis excesiva.
  - «Ejidos» traduce el valor espacial/comunal de מִגְרָשׁ sin introducir una nota teológica adicional.
  - Los nombres propios se adaptan a formas españolas legibles, procurando consistencia con la tradición bíblica en español.
