review_pass:
  verdict: revise
  source_alignment_summary: 'El griego define σωφροσύνη como una virtud de gobierno de los deseos: «σωφροσύνη δὴ τοίνυν ἐστὶν ἐπικράτεια τῶν ἐπιθυμιῶν». La estructura y el sentido general del borrador están bien encaminados, pero «templanza» se aparta del audit trail inglés, que justificó explícitamente «self-control» frente a «temperance» por claridad y alcance práctico. «Dominio sobre los deseos» refleja bien ἐπικράτεια τῶν ἐπιθυμιῶν, y «pues» representa aceptablemente δὴ τοίνυν.'
  spanish_quality_summary: El español es natural y digno, pero «La templanza» suena más clásico-filosófico que la opción más clara y directa para lectura moderna. «El autocontrol, pues, es dominio sobre los deseos» resulta más transparente y más alineado con la definición. También mejora la coherencia semántica entre el sujeto y el predicado definicional.
  glossary_alignment: 'No hay términos del glosario maestro directamente implicados. La principal cuestión léxica es σωφροσύνη: conviene seguir la decisión documentada del POB inglés con «autocontrol» en vez de «templanza», salvo motivo fuerte que aquí no se demuestra. No se requieren notas teológicas.'
  issues:
  - severity: medium
    issue: «templanza» para σωφροσύνη
    rationale: Aunque es una opción clásica posible, el audit trail inglés rechazó «temperance» por ser más estrecho/arcaizante y prefirió el sentido práctico de «self-control». En español, «autocontrol» preserva mejor esa decisión documentada y es más claro para lectores modernos.
  - severity: low
    issue: Nota al pie innecesaria que defiende una elección menos alineada
    rationale: La nota justifica «templanza» como término clásico, pero eso desplaza la racionalidad léxica ya fijada por el POB inglés. Tras corregir a «autocontrol», no hace falta nota.
  revised_spanish_text: El autocontrol, pues, es dominio sobre los deseos.
  revision_rationale: Se reemplaza «templanza» por «autocontrol» para reflejar con mayor fidelidad la decisión léxica documentada para σωφροσύνη y ofrecer una definición más clara en español moderno. Se conserva «pues» para δὴ τοίνυν y «dominio sobre los deseos» para ἐπικράτεια τῶν ἐπιθυμιῶν, que representan bien el sentido del griego.
