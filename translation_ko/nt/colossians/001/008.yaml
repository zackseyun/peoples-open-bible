  text: ὁ καὶ δηλώσας ἡμῖν τὴν ὑμῶν ἀγάπην ἐν πνεύματι.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/008.yaml
  text: and who also made known to us your love in the Spirit.
translation:
  language: ko
  text: 또한 그는 성령 안에서[a] 가진 여러분의 사랑을 우리에게 알려 주었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「영적인 사랑」, 「영 안에서의 사랑」. 헬라어 ἐν πνεύματι는 성령을 가리킬 수도 있고, 사랑의 영역·성격을 가리킬 수도 있다. 바울적 용법을 따라 「성령」으로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ... δηλώσας
  english_pob_choice: who also made known
  chosen_korean: 그는 ... 알려 주었습니다
  alternatives_korean:
  - 알려 준 분
  - 보고한 자
  lexicon: BDAG
  rationale: 앞 절의 에바브라를 받는 관계사적 분사. 한국어에서는 별도 문장으로 풀어 「그는 ~ 알려 주었습니다」로 옮긴다.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_korean: 우리에게
  alternatives_korean: []
  lexicon: BDAG
  rationale: 간접목적어 여격.
- source_word: τὴν ὑμῶν ἀγάπην
  english_pob_choice: your love
  chosen_korean: 여러분의 사랑
  alternatives_korean: []
  lexicon: BDAG
  rationale: 표준적 옮김.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_korean: 성령 안에서
  alternatives_korean:
  - 영 안에서
  - 영적으로
  lexicon: BDAG
  rationale: 바울적 용법에서 무관사 πνεῦμα도 성령을 가리킬 수 있다. 영어 POB의 「in the Spirit」 결정을 따르되, 모호성은 각주로 보존한다.
theological_decisions:
- issue: πνεύματι의 지시 대상
  chosen_reading: 성령
  alternative_readings:
  - 영
  - 영적인
  rationale: 본 절의 무관사 πνεῦμα는 바울적 용법에서 흔히 성령을 가리킨다. 본문에서는 「성령」으로 옮기고, 더 일반적 의미의 가능성은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
