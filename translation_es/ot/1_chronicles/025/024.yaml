translation:
  language: es
  text: 'Para el decimoséptimo[a], Joshbekashá, sus hijos y sus hermanos: doce.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para el decimoséptimo, a Joshbekashá»; en el contexto queda implícita la idea de una «suerte», «lote» o «división».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשִׁבְעָה עָשָׂר
  english_pob_choice: for the seventeenth
  chosen_spanish: para el decimoséptimo
  alternatives_spanish:
  - para el decimoséptimo lote
  - para la decimoséptima división
  lexicon: HALOT
  rationale: La preposición לְ con el ordinal en este contexto de lista distribuye una asignación. En español, «para» conserva bien esa idea de destino/asignación, y «decimoséptimo» refleja el ordinal sin añadir una palabra no expresada explícitamente en el hebreo.
- source_word: לְיָשְׁבְּקָשָׁה
  english_pob_choice: to Joshbekashah
  chosen_spanish: de Joshbekashá
  alternatives_spanish:
  - para Joshbekashá
  lexicon: HALOT
  rationale: Es un nombre propio transliterado. En español, «de» funciona de forma natural para introducir la pertenencia en una lista de asignación, y evita una duplicación poco elegante de la preposición con el ordinal anterior.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos», y aunque en este registro puede implicar varones, el español «hijos» comunica fielmente el sentido sin forzar una marca masculina adicional que el contexto ya hace comprensible.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes varones
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: El sustantivo básico significa «hermanos». Aunque podría abarcar parientes cercanos en un contexto genealógico, «hermanos» es la opción más directa y transparente, en continuidad con la lectura auditada del inglés POB.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  lexicon: HALOT
  rationale: Número cardinal simple; no requiere ampliación. Se traduce de manera directa y sobria.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por el texto hebreo y el audit trail inglés: una asignación secuencial en una lista. Se conserva la omisión explícita de «lote/división» en el cuerpo del texto, pero se deja constancia en nota como implicación contextual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa transliteración de nombre propio («Joshbekashá») de manera consistente con el tratamiento del inglés POB.
  - La construcción española evita calcar el doble valor de לְ con una repetición artificial de preposiciones.
