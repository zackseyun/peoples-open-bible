translation:
  language: es
  text: ¡Oigan[a], reyes; presten oído, gobernantes! Yo, a Yahvé, yo cantaré; cantaré alabanzas[b] a Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Oigan, reyes; presten oído, gobernantes» usa dos imperativos cercanos en paralelo para subrayar la solemnidad del llamado.'
    reason: lexical_alternative
  - marker: b
    text: 'O «haré música». El hebreo usa dos verbos relacionados pero distintos: «cantar» y «hacer música/tocar música». Aquí se traduce «cantaré alabanzas» para mantener la distinción con un español más natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְע֣וּ
  english_pob_choice: Hear
  chosen_spanish: ¡Oigan!
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural convoca con fuerza poética. «Oigan» conserva el tono directo y natural del mandato sin volverlo demasiado técnico.
- source_word: מְלָכִ֔ים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - reyes
  lexicon: HALOT
  rationale: El sustantivo designa gobernantes reales en sentido literal; «reyes» es el equivalente más transparente y fiel al nivel político del texto.
- source_word: הַאֲזִ֖ינוּ
  english_pob_choice: give ear
  chosen_spanish: den oído
  alternatives_spanish:
  - escuchen con atención
  - presten oído
  lexicon: HALOT
  rationale: La segunda orden es cercana pero más enfática y poética. «Den oído» preserva el paralelismo con «oigan» y mantiene una diferencia expresiva sin perder claridad.
- source_word: רֹֽזְנִ֑ים
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - príncipes
  - dignatarios
  - jefes
  lexicon: HALOT
  rationale: El término apunta a altos oficiales o potentados. «Gobernantes» comunica esa función pública de manera clara en español moderno, sin cargar un matiz nobiliario innecesario.
- source_word: אָנֹכִ֗י ... אָנֹכִ֣י
  english_pob_choice: I ... I
  chosen_spanish: Yo ... yo
  alternatives_spanish:
  - En cuanto a mí ... yo
  - Yo mismo ... yo
  lexicon: HALOT
  rationale: La repetición del pronombre independiente es enfática. Mantener «Yo, ... yo» conserva la autoafirmación poética y la insistencia del hebreo.
- source_word: לַֽ/יהוָה֙
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: Con verbos de canto y música, la preposición marca dirección/dedicación. «A Yahvé» es la forma natural en español y respeta el nombre divino según la terminología del proyecto.
- source_word: אָשִׁ֔ירָה
  english_pob_choice: I will sing
  chosen_spanish: cantaré
  alternatives_spanish:
  - quiero cantar
  - cantaré yo
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención resuelta. En español, el futuro simple transmite bien ese compromiso poético y suena más fluido que una perífrasis.
- source_word: אֲזַמֵּ֕ר
  english_pob_choice: I will make music
  chosen_spanish: haré música
  alternatives_spanish:
  - entonaré música
  - cantaré alabanza
  lexicon: HALOT
  rationale: זמר conserva la idea de hacer música o cantar con acompañamiento. «Haré música» retiene la distinción respecto de «cantaré» y evita igualar indebidamente los dos verbos.
- source_word: אֱלֹהֵ֥י יִשְׂרָאֵֽל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción de complemento identifica a Yahvé como Dios propio de Israel. «El Dios de Israel» es directo, reverente y fiel al hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton. Siguiendo el criterio del proyecto para español, se conserva el nombre divino como «Yahvé» en vez de sustituirlo por una convención de máscara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la repetición pronominal independiente
  english_pob_reading: I ... I
  chosen_spanish_reading: Yo ... yo
  alternative_spanish_readings:
  - Yo mismo ... yo
  - En cuanto a mí ... yo
  rationale: La reiteración no es redundante sino enfática y poética. Mantenerla explícitamente en español evita aplanar la autoafirmación del hablante.
  doctrine_reference: Poética hebrea — énfasis por repetición
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que ajustó la puntuación para reflejar mejor la repetición enfática. La versión española mantiene esa repetición con «Yo, a Yahvé, yo cantaré» y conserva el paralelismo verbal sin introducir una pausa o guion que debilite la cadencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se preserva la diferencia entre «cantaré» y «haré música» para no neutralizar el doble verbo del hebreo.
  - El vocativo plural mantiene el paralelismo retórico entre reyes y gobernantes.
