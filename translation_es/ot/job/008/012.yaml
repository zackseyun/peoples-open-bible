  - severity: low
    issue: «pasto» es menos natural que «hierba» para חָצִיר en este versículo
    rationale: En Job 8:12 la comparación es con la vegetación común. «Hierba» suena más general y literaria; «pasto» puede sugerir forraje o césped de manera más específica.
