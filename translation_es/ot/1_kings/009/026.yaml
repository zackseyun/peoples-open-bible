translation:
  language: es
  text: El rey Salomón también construyó una flota de naves en Ezión-geber[a], que está junto a Elot, en la orilla del Mar Rojo, en la tierra de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mar de Suf»; tradicionalmente se traduce «Mar Rojo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֳנִי
  english_pob_choice: also / fleet of ships
  chosen_spanish: también una flota de naves
  alternatives_spanish:
  - también naves
  - también una flota de barcos
  lexicon: HALOT
  rationale: El hebreo designa una nave o conjunto de naves; por el contexto de empresa marítima, 'flota de naves' comunica mejor la idea que una traducción plana como 'barcos'. 'También' reproduce el enlace narrativo del prefijo conjuntivo, como en la POB inglesa.
- source_word: עָשָׂה
  english_pob_choice: built
  chosen_spanish: construyó
  alternatives_spanish:
  - hizo
  - fabricó
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'hacer', aquí se refiere a la construcción de embarcaciones. 'Construyó' es la equivalencia más natural y fiel al contexto.
- source_word: בְּעֶצְיוֹן גֶּבֶר
  english_pob_choice: at Ezion-geber
  chosen_spanish: en Ezión-geber
  alternatives_spanish:
  - en Ezion-geber
  - a Ezión-geber
  lexicon: HALOT
  rationale: Es un topónimo y debe conservarse transliterado. 'En' refleja de forma directa el valor locativo del prefijo preposicional.
- source_word: אֲשֶׁר אֶת אֵלֹות
  english_pob_choice: which is beside Eloth
  chosen_spanish: que está junto a Elot
  alternatives_spanish:
  - que está al lado de Elot
  - que está cerca de Elot
  lexicon: HALOT
  rationale: La construcción expresa proximidad/relación espacial con Elot. 'Junto a' mantiene esa relación sin forzar un giro demasiado interpretativo.
- source_word: עַל שְׂפַת יַם סוּף
  english_pob_choice: on the shore of the Red Sea
  chosen_spanish: en la orilla del mar de Suf
  alternatives_spanish:
  - en la orilla del Mar Rojo
  - sobre la orilla del mar de Suf
  lexicon: HALOT
  rationale: '''Orilla'' reproduce bien שְׂפַת. Se conserva ''mar de Suf'' para no ocultar la tensión lexical del hebreo, mientras el contexto geográfico sigue siendo claro en español. La forma ''Mar Rojo'' se deja como alternativa tradicional.'
- source_word: בְּאֶרֶץ אֱדוֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en Edom
  lexicon: HALOT
  rationale: '''La tierra de Edom'' preserva mejor la fórmula hebrea completa y su énfasis territorial que una abreviación simple ''en Edom''.'
translation_notes:
  revision_awareness: La redacción inglesa revisada añadió 'of ships' y cambió 'near' por 'beside' para ajustarse más al hebreo. La versión española refleja esa misma precisión con 'una flota de naves' y 'junto a'.
  spanish_consistency_notes:
  - Se conservó la transliteración de los topónimos Ezión-geber y Elot para mantener la trazabilidad con el texto fuente.
  - Se prefirió 'mar de Suf' en el texto principal para respetar la tensión léxica del hebreo, con nota sobre la traducción tradicional.
  - '''Tierra de Edom'' mantiene la forma territorial plena del hebreo y armoniza con el registro bíblico del pasaje.'
