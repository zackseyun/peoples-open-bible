translation:
  language: es
  text: Y sobre los que hacían el trabajo del campo[a] para la labranza de la tierra[b] estaba Ezri, hijo de Chelub.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los trabajadores del campo». La expresión participial hebrea puede traducirse de manera más compacta.
    reason: lexical_alternative
  - marker: b
    text: O «para trabajar el suelo». La frase se refiere al cultivo agrícola.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Y encima de
  - Sobre
  lexicon: HALOT
  rationale: En listas administrativas, עַל introduce a quien está puesto a cargo de una esfera de responsabilidad. «Y sobre» conserva el enlace con la enumeración anterior y el sentido de supervisión sin añadir interpretación extra.
- source_word: עֹשֵׂי
  english_pob_choice: those who did
  chosen_spanish: los que hacían
  alternatives_spanish:
  - los trabajadores
  - los que trabajaban
  lexicon: HALOT
  rationale: El participio expresa personas dedicadas a la actividad. «Los que hacían» refleja el carácter participial con naturalidad en español y evita convertir de forma excesiva la frase en un sustantivo.
- source_word: מְלֶאכֶת
  english_pob_choice: the work
  chosen_spanish: el trabajo
  alternatives_spanish:
  - la labor
  - la obra
  lexicon: HALOT
  rationale: Aquí מְלָאכָה se refiere al trabajo u ocupación agrícola. «Trabajo» es la opción más clara y directa en español para este contexto.
- source_word: הַשָּׂדֶה
  english_pob_choice: of the field
  chosen_spanish: del campo
  alternatives_spanish:
  - del campo de cultivo
  - del terreno
  lexicon: HALOT
  rationale: El hebreo dice literalmente «del campo». En español, «campo» comunica de modo natural el ámbito agrícola sin perder la imagen original.
- source_word: לַעֲבֹדַת
  english_pob_choice: for the cultivation
  chosen_spanish: para la labranza
  alternatives_spanish:
  - para el cultivo
  - para el trabajo
  lexicon: HALOT
  rationale: Con הָאֲדָמָה, עֲבֹדָה apunta al trabajo agrícola de la tierra. «Labranza» expresa bien esa idea de cultivo del suelo y preserva la fuerza agrícola del texto.
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra cultivable
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «ground», en español «tierra» es el término más natural para el suelo cultivable. Mantiene el sentido agrícola sin sonar técnico o forzado.
- source_word: עֶזְרִי בֶּן כְּלוּב
  english_pob_choice: Ezri son of Chelub
  chosen_spanish: Ezri, hijo de Chelub
  alternatives_spanish:
  - Ezri, hijo de Quelub
  - Ezri hijo de Chelub
  lexicon: BDB
  rationale: Los nombres propios se transliteran. Se conserva «Chelub» conforme al audit trail inglés; «hijo de» reproduce בן en un registro genealógico/administrativo.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente hebreo y con el audit trail inglés (agreement score 1.0; status: high_agreement). No se requieren notas de variante textual ni ajustes de revisión.'
  spanish_consistency_notes:
  - Se mantiene un registro administrativo sobrio, acorde con una lista de funcionarios o responsables.
  - Se evita «siervo» o «servicio» porque el contexto es agrícola y laboral, no cultual.
  - Se conserva la estructura relacional «sobre... para...», siguiendo la organización del hebreo.
  - Se usa «Chelub» como transliteración coherente con el inglés POB, sin introducir una forma castellanizada no documentada.
