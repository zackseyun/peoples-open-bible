translation:
  language: es
  text: 'Instrucción en la vergüenza: oigan, hijos[b], y avergüéncense conforme a mis juicios[a]. No toda vergüenza conviene conservar, y no toda humillación es digna de ser escogida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Por tanto, avergüéncense ante mi palabra; porque no es bueno conservar toda vergüenza, y no todo es aprobado por todos en la fe». La cláusula final griega difiere de manera notable del hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: «Hijos» traduce el vocativo masculino hebreo y conserva la forma sapiencial del maestro que habla a sus oyentes.
    reason: cultural_note
lexical_decisions:
- source_word: מוסר
  english_pob_choice: Instruction
  chosen_spanish: Instrucción
  alternatives_spanish:
  - Disciplina
  - Corrección
  lexicon: HALOT
  rationale: En literatura sapiencial, מוסר puede expresar instrucción formativa y correctiva. Aquí funciona como encabezado exhortativo, por lo que «Instrucción» comunica bien el tono de enseñanza sin volverlo punitivo.
- source_word: בשת
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - bochorno
  lexicon: HALOT
  rationale: «Vergüenza» cubre el campo semántico de בשת y mantiene el paralelismo con el griego αἰσχύνη. Es claro en español y conserva la tensión entre una vergüenza apropiada y una impropia.
- source_word: שמעו בנים
  english_pob_choice: hear, sons
  chosen_spanish: oigan, hijos
  alternatives_spanish:
  - escuchen, hijos
  - oigan, hijos varones
  lexicon: HALOT
  rationale: El hebreo es un plural masculino explícito. «Hijos» conserva la dirección sapiencial masculina sin sonar artificial. «Oigan» refleja el tono de exhortación oral; es más natural que «escuchen» en este contexto.
- source_word: והכלמו
  english_pob_choice: be ashamed
  chosen_spanish: avergüéncense
  alternatives_spanish:
  - sientan vergüenza
  - sean puestos en vergüenza
  lexicon: HALOT
  rationale: El imperativo exhortativo pide una reacción interna y visible de vergüenza. «Avergüéncense» es idiomático en español y corresponde bien al sentido del hebreo y al griego ἐντράπητε.
- source_word: על משפטי
  english_pob_choice: according to my judgments
  chosen_spanish: conforme a mis juicios
  alternatives_spanish:
  - según mis juicios
  - ante mis juicios
  - por mis juicios
  lexicon: HALOT
  rationale: «Juicios» traduce משפטי como normas/decisiones evaluativas. «Conforme a» preserva la relación normativa del hebreo sin endurecerla como un calco preposicional. El griego paralelo («a mi palabra») apoya el valor admonitorio, pero el hebreo sigue siendo la base principal.
- source_word: לא כל בשת נאה לשמור
  english_pob_choice: Not every shame is fitting to keep
  chosen_spanish: No toda vergüenza es buena para conservarla
  alternatives_spanish:
  - No toda vergüenza conviene conservar
  - No toda vergüenza es apropiada de guardar
  lexicon: HALOT
  rationale: נאה expresa conveniencia/fidelidad a lo apropiado; לשמור es «guardar/conservar». «Buena para conservarla» reproduce el valor de utilidad o idoneidad sin sonar forzado en español.
- source_word: ולא כל הכלם נבחר
  english_pob_choice: and not every disgrace is rightly chosen
  chosen_spanish: y no toda humillación es justamente elegida
  alternatives_spanish:
  - y no toda vergüenza es digna de ser escogida
  - y no toda humillación es preferible
  lexicon: HALOT
  rationale: הכלם puede abarcar vergüenza, humillación o deshonra. Elegí «humillación» para diferenciarlo de בשת y preservar la variación léxica del hebreo; «justamente elegida» transmite נבחר como selección/aprobación, evitando suavizar el contraste.
theological_decisions:
- issue: Tratamiento del vocativo masculino בנים
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - muchachos
  rationale: El texto hebreo usa un vocativo masculino explícito propio de la instrucción sapiencial. En español, «hijos» transmite ese valor de manera natural sin neutralizarlo indebidamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre el hebreo y el paralelo griego en la cláusula final
  english_pob_reading: Follow the Hebrew wording in the main text, with the Greek alternative preserved in a footnote
  chosen_spanish_reading: Seguir el hebreo en el texto principal, señalando el paralelo griego como variante relevante
  alternative_spanish_readings:
  - 'Ajustar el final al griego: «porque no es bueno preservar toda vergüenza, y no todo es aprobado por todos en la fe»'
  rationale: La evidencia hebrea está presente y es de alta confianza; por eso gobierna el texto principal. El griego muestra una expansión/divergencia notable en la clausura, que merece reconocimiento sin desplazar el testimonio hebreo.
  doctrine_reference: PHILOSOPHY.md §What we are translating; §transparent actually means
- issue: Valor semántico de בשת y הכלם
  english_pob_reading: shame / disgrace
  chosen_spanish_reading: vergüenza / humillación
  alternative_spanish_readings:
  - vergüenza / deshonra
  - deshonra / humillación
  rationale: Mantener dos términos distintos en español ayuda a reflejar la variación del hebreo y evita aplanar el pasaje. «Vergüenza» conserva el eje semántico principal; «humillación» deja espacio para el matiz de abatimiento o afrenta del segundo miembro.
  doctrine_reference: HALOT / criterio de diferenciación léxica auditada
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que prefirió «Instrucción en la vergüenza» en lugar de «Instrucción acerca de la vergüenza», porque la combinación מוסר בשת pide una correspondencia léxica más estrecha. El resto de la línea se mantuvo coherente con el pasaje hebreo y con el paralelo griego documentado.
  spanish_consistency_notes:
  - Se mantuvo el registro sapiencial y exhortativo con verbos imperativos naturales en español.
  - Se preservó la distinción entre בשת y הכלם mediante «vergüenza» y «humillación», para no aplanar la variación semántica.
  - Se evitó el comodín litúrgico «SEÑOR» porque este versículo no contiene el tetragrámaton ni un reemplazo directo de él.
  - Las notas al pie señalan la divergencia griega sin desplazar la prioridad del hebreo en el texto principal.
  - La puntuación reproduce el paralelismo hebreo con dos miembros finales claramente diferenciados.
