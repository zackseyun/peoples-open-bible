translation:
  language: es
  text: 'Y dije: «¡Ay de mí! Porque estoy arruinado[b]; porque soy un hombre de labios impuros, y habito en medio de un pueblo de labios impuros; porque mis ojos han visto al Rey, Yahvé de los ejércitos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé de los ejércitos»; tradicionalmente, «el SEÑOR de los ejércitos».'
    reason: alternative_reading
  - marker: b
    text: 'O: «estoy deshecho» / «estoy destruido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹי לִי
  english_pob_choice: Woe is me
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay de mí, pobre de mí!
  - ¡Ay de mí, qué desgracia la mía!
  lexicon: HALOT
  rationale: La exclamación profética expresa lamento y juicio sobre sí mismo. En español, «¡Ay de mí!» comunica ese clamor con naturalidad y dignidad, sin suavizar la fuerza del original.
- source_word: נִדְמֵיתִי
  english_pob_choice: I am ruined
  chosen_spanish: estoy arruinado
  alternatives_spanish:
  - estoy destruido
  - estoy perdido
  - estoy deshecho
  lexicon: HALOT
  rationale: El nifal de דמה aquí expresa una condición de ruina o desintegración ante la presencia divina. «Estoy arruinado» conserva esa fuerza existencial en español contemporáneo, mientras que «destruido» o «perdido» pueden sonar demasiado físicos o menos precisos.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y se refiere al propio Isaías; «un hombre» mantiene la concordancia y el valor del original.
- source_word: טְמֵא שְׂפָתַיִם
  english_pob_choice: of unclean lips
  chosen_spanish: de labios impuros
  alternatives_spanish:
  - con labios impuros
  lexicon: HALOT
  rationale: La construcción posesiva/adjetival se vierte naturalmente como «de labios impuros», preservando que la impureza caracteriza su habla. «Con labios impuros» es posible, pero menos directo para la estructura del hebreo.
- source_word: וּבְתוֹךְ
  english_pob_choice: among
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - entre medio de
  lexicon: HALOT
  rationale: Aquí la idea es local y colectiva; «en medio de» reproduce mejor el sentido de estar ubicado dentro de un grupo. «Entre» es viable, pero menos pleno en este contexto.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: El sustantivo es colectivo e indefinido. «Un pueblo» conserva esa amplitud y resulta natural en español bíblico actual.
- source_word: יוֹשֵׁב
  english_pob_choice: I dwell
  chosen_spanish: habito
  alternatives_spanish:
  - vivo
  - moro
  lexicon: HALOT
  rationale: El participio de ישב indica residencia estable. «Habito» preserva el registro elevado y el sentido de permanencia mejor que «vivo».
- source_word: הַמֶּלֶךְ
  english_pob_choice: the King
  chosen_spanish: al Rey
  alternatives_spanish:
  - al rey
  lexicon: HALOT
  rationale: El título es definido y reverencial. En este contexto refiere a Yahvé; «al Rey» mantiene la mayúscula honorífica y la solemnidad del pasaje.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto, y צְבָאוֹת se traduce por «los ejércitos» para hacer explícito el sentido. «Huestes» es tradicional, pero menos transparente para lectores modernos.
- source_word: רָאוּ עֵינַי
  english_pob_choice: my eyes have seen
  chosen_spanish: mis ojos han visto
  alternatives_spanish:
  - mis ojos vieron
  lexicon: HALOT
  rationale: El perfecto español comunica una experiencia ya realizada con efecto presente, en paralelo al inglés auditado y al impacto inmediato de la visión.
theological_decisions:
- issue: Modo de expresar el Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene יְהוָה de forma directa. Conforme a la terminología del proyecto en español, se usa «Yahvé» en el cuerpo del texto, manteniendo visible el nombre divino y evitando la sustitución por una convención de máscara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre «el Rey» y Yahvé de los ejércitos
  english_pob_reading: the King, Yahweh of Armies
  chosen_spanish_reading: al Rey, Yahvé de los ejércitos
  alternative_spanish_readings:
  - al Rey, el SEÑOR de los ejércitos
  - al Rey, Yahvé de las huestes
  rationale: 'La apposición identifica al Rey con Yahvé de los ejércitos. Se mantiene la estructura para no borrar la tensión/revelación del texto: Isaías ha visto al Rey, es decir, a Yahvé en su majestad soberana.'
  doctrine_reference: Isaías 6:5; DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios en el sentido base; el punto de mayor atención para el español es la decisión terminológica sobre יְהוָה y la transparencia de צְבָאוֹת. Se conservó el paralelismo del hebreo y la tensión teológica de la visión.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar español del proyecto para יְהוָה.
  - Se tradujo צְבָאוֹת por «los ejércitos», no por «huestes», por claridad contemporánea.
  - «Al Rey» conserva el valor titulado y reverencial del hebreo sin añadir explicaciones al texto principal.
  - La puntuación sigue el estilo español de cita directa y respeta el paralelo causal del versículo.
