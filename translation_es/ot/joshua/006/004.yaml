translation:
  language: es
  text: Y siete sacerdotes llevarán siete trompetas de cuerno de carnero[a] delante del arca. El séptimo día marcharán alrededor de la ciudad siete veces, y los sacerdotes tocarán las trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete cuernos de carnero» o «siete shofares de cuerno de carnero». La frase hebrea se refiere a instrumentos de cuerno, probablemente hechos de cuerno de carnero.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂאוּ
  english_pob_choice: shall carry
  chosen_spanish: llevarán
  alternatives_spanish:
  - cargarán
  - portarán
  lexicon: HALOT
  rationale: נשא expresa aquí la acción concreta de transportar algo. En español, «llevarán» es natural y fiel al movimiento de los sacerdotes con las trompetas; «portarán» sería más formal, y «cargarán» suena menos idiomático en este contexto.
- source_word: שׁוֹפְרוֹת הַיּוֹבְלִים
  english_pob_choice: ram’s-horn trumpets
  chosen_spanish: trompetas de cuerno de carnero
  alternatives_spanish:
  - cuernos de carnero
  - shofares de cuerno de carnero
  - trompetas de jubileo
  lexicon: HALOT
  rationale: שׁוֹפָר designa un instrumento de cuerno, y el contexto favorece cuerno de carnero. «Trompetas de cuerno de carnero» conserva la función instrumental y el material; se evita «trompetas de jubileo» porque sería engañoso en español y «shofares» puede ser útil pero menos transparente para una primera lectura.
- source_word: לִפְנֵי הָאָרוֹן
  english_pob_choice: before the ark
  chosen_spanish: delante del arca
  alternatives_spanish:
  - en frente del arca
  - ante el arca
  - delante del arca del pacto
  lexicon: HALOT
  rationale: לִפְנֵי indica posición espacial delante de. «Delante del arca» es claro y sobrio; añadir «del pacto» introduciría una precisión que no está en este versículo.
- source_word: תָּסֹבּוּ
  english_pob_choice: you shall march around
  chosen_spanish: rodearás
  alternatives_spanish:
  - darás vuelta alrededor de
  - marcharás alrededor de
  - darás vuelta a
  lexicon: HALOT
  rationale: סבב significa ir alrededor, rodear, girar. En este mandato a Josué y al pueblo, «rodearás» comunica la acción requerida con naturalidad. Aunque el inglés POB opta por «march around» para el matiz procesional, en español «rodear» transmite el recorrido circular sin sonar forzado.
- source_word: פְּעָמִים
  english_pob_choice: times
  chosen_spanish: veces
  alternatives_spanish:
  - ocasiones
  lexicon: HALOT
  rationale: Con un numeral, פְּעָמִים se traduce de manera directa como «veces».
- source_word: יִתְקְעוּ בַּשּׁוֹפָרוֹת
  english_pob_choice: shall blow the trumpets
  chosen_spanish: tocarán las trompetas
  alternatives_spanish:
  - sonarán las trompetas
  - soplarán las trompetas
  - harán sonar las trompetas
  lexicon: HALOT
  rationale: תקע con ב + שׁוֹפָר es el giro habitual para tocar o hacer sonar una trompeta de cuerno. «Tocarán las trompetas» es idiomático y conserva el acto instrumental sin redundancia.
theological_decisions:
- issue: Cómo reflejar el objeto ritual sin ocultar su forma de cuerno
  english_pob_reading: ram’s-horn trumpets / likely made from ram’s horns
  chosen_spanish_reading: trompetas de cuerno de carnero
  alternative_spanish_readings:
  - shofares de cuerno de carnero
  - cuernos de carnero
  rationale: 'No hay una tensión doctrinal aquí, pero sí una decisión terminológica relevante: el hebreo apunta a instrumentos de cuerno, probablemente de carnero. En español, «trompetas de cuerno de carnero» mantiene tanto la función musical como la materialidad del objeto, sin borrar el matiz del original.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la lectura auditada en inglés. Se preserva el número repetido de siete, la secuencia ritual y el valor instrumental de שׁוֹפָר, mientras que la formulación española se ajusta a una sintaxis natural y publicable. No hubo revisiones aplicadas en el pase más reciente.
  spanish_consistency_notes:
  - Se mantiene «arca» sin ampliar a «arca del pacto», porque el hebreo no lo dice explícitamente aquí.
  - Se usa «Yahvé» solo cuando el hebreo lo requiere; este versículo no contiene el nombre divino.
  - «Trompetas de cuerno de carnero» conserva la fuerza lexical del original mejor que una simple transliteración, pero la nota permite la alternativa «shofares» para lectores que la prefieran.
