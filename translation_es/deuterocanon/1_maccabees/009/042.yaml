translation:
  language: es
  text: Y vengaron la sangre de su hermano[a], y regresaron a la región montañosa del Jordán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, el griego dice: «vengaron la venganza de sangre de su hermano», una expresión enfática de venganza de sangre.'
    reason: lexical_alternative
  - marker: b
    text: O «al monte del Jordán». El griego ὄρος puede designar terreno montañoso o una región de colinas, no necesariamente un pico único.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεδίκησαν
  english_pob_choice: avenged
  chosen_spanish: vengaron
  alternatives_spanish:
  - tomaron venganza
  - ejecutaron venganza
  lexicon: BDAG
  rationale: El verbo expresa el acto de vengar o hacer justicia por un agravio. «Vengaron» es natural en español y conserva el valor activo del verbo griego sin suavizarlo a una fórmula más débil.
- source_word: τὴν ἐκδίκησιν αἵματος
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la venganza de sangre
  - la sangre derramada
  lexicon: LSJ
  rationale: El griego dice literalmente «la venganza de sangre», una expresión enfática de retribución por sangre. En español, «vengaron la sangre» preserva el sentido sin volver torpe la redundancia semítica.
- source_word: ἀδελφοῦ αὐτῶν
  english_pob_choice: their brother
  chosen_spanish: de su hermano
  alternatives_spanish:
  - de su pariente
  - de su kinsman
  lexicon: BDAG
  rationale: «Hermano» es el sentido directo del término griego y mantiene la referencia concreta del texto. No se amplía a un parentesco más general porque el original no lo exige.
- source_word: ἀπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - se volvieron
  lexicon: BDAG
  rationale: En este contexto narrativo indica movimiento de vuelta a un lugar previo. «Regresaron» es natural en español y conserva la dirección del verbo.
- source_word: εἰς τὸ ὄρος τοῦ Ἰορδάνου
  english_pob_choice: to the hill country of the Jordan
  chosen_spanish: a la región montañosa del Jordán
  alternatives_spanish:
  - al monte del Jordán
  - a las tierras altas del Jordán
  lexicon: LSJ
  rationale: ὄρος puede significar monte, pero también zona montañosa o altiplano. «Región montañosa» refleja mejor una designación geográfica que una cumbre única, manteniendo la ambigüedad útil del griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren cambios sustantivos. Se conservó la fuerza de la expresión de venganza de sangre y se optó por una formulación geográfica natural en español que mantiene la ambigüedad de ὄρος.
  spanish_consistency_notes:
  - Se usó «Jordán» como nombre propio del río/región, siguiendo el uso bíblico estándar.
  - Se evitó «SEÑOR» u otra terminología no pertinente; no hay vocabulario divino en este versículo.
  - «Hermano» se mantuvo singular, conforme al griego y al audit trail inglés.
  - La nota [a] se ancla en «sangre» para preservar la tensión literal del cognado verbal y el sustantivo de sangre.
