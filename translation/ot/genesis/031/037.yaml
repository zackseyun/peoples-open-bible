id: GEN.31.37
reference: Genesis 31:37
source:
  edition: WLC
  text: כִּֽי מִשַּׁ֣שְׁתָּ אֶת כָּל כֵּלַ֗/י מַה מָּצָ֨אתָ֙ מִ/כֹּ֣ל כְּלֵי בֵיתֶ֔/ךָ שִׂ֣ים כֹּ֔ה נֶ֥גֶד אַחַ֖/י וְ/אַחֶ֑י/ךָ וְ/יוֹכִ֖יחוּ בֵּ֥ין שְׁנֵֽי/נוּ־־־־־׃
translation:
  text: Since you have searched through all my goods[a], what have you found of all the goods of your house? Set it here before my brothers and your brothers[b], and let them judge between the two of us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “let them judge between the two of us.” The Hebrew verb can carry a judicial or arbitral sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'from all the goods of your house'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִשַּׁשְׁתָּ
  chosen: have searched through
  alternatives:
  - have felt through
  - have rummaged through
  - have examined
  lexicon: HALOT
  rationale: The verb מששׁ literally involves feeling/touching, but in this context of inspecting possessions for stolen items it idiomatically means searching thoroughly. 'Searched through' preserves the concrete force without sounding unnatural in English.
- source_word: כָּל כֵּלַי
  chosen: all my goods
  alternatives:
  - all my belongings
  - all my things
  - all my vessels
  lexicon: HALOT
  rationale: כְּלִי can mean vessel, article, implement, or goods. In this domestic/property context, 'goods' best captures movable possessions broadly, avoiding the overly narrow 'vessels' and the overly casual 'things'.
- source_word: מַה מָּצָאתָ
  chosen: what have you found
  alternatives:
  - what did you find
  lexicon: HALOT
  rationale: A straightforward interrogative plus perfect verb. Present perfect English fits the immediate result of the search in context.
- source_word: מִכֹּל כְּלֵי בֵיתֶךָ
  chosen: from all the goods of your house
  alternatives:
  - among all the goods of your household
  - from all your household goods
  lexicon: HALOT
  rationale: The phrase refers to the property belonging to Laban's household. 'Goods of your house' stays close to the Hebrew while remaining intelligible; it also preserves the repeated כְּלִי/כְּלֵי wordplay with 'goods' in both clauses.
- source_word: שִׂים כֹּה
  chosen: Set it here
  alternatives:
  - Put it here
  - Place it here
  lexicon: HALOT
  rationale: An imperative calling for any allegedly stolen item to be produced publicly. 'Set it here' is natural and suitably direct.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: נֶגֶד marks public presentation in the sight/presence of witnesses. 'Before' is concise and idiomatic in judicial-style English.
- source_word: אַחַי וְאַחֶיךָ
  chosen: my brothers and your brothers
  alternatives:
  - my kinsmen and your kinsmen
  - my relatives and your relatives
  lexicon: HALOT
  rationale: Although 'brothers' can extend to kin-group members, the Hebrew uses the ordinary familial term. Per translation philosophy, gender-accurate wording is preferred unless context clearly demands a broader neutral term.
- source_word: וְיוֹכִיחוּ
  chosen: let them decide
  alternatives:
  - let them judge
  - let them arbitrate
  - let them prove
  lexicon: HALOT
  rationale: 'The Hiphil of יכח here has a forensic sense: to decide, judge, or arbitrate a dispute. ''Decide'' is clear modern English and fits the appeal to witnesses without overformalizing.'
- source_word: בֵּין שְׁנֵינוּ
  chosen: between the two of us
  alternatives:
  - between us both
  - between us
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the numeral idea 'the two of us.' Preserving it reflects the bilateral dispute and adds emphasis present in the source.
