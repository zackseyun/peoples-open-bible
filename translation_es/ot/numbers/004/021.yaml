lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» conserva ese valor secuencial en español. «Habló» refleja mejor el matiz de דבר como acto de dirigirse, más específico que un simple «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del Tetragrámaton según la convención del proyecto, evitando la sustitución por un título. «Yahvé» preserva el valor nominal del texto hebreo y la transparencia frente a la audiencia en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional que introduce el destinatario del habla se expresa naturalmente en español con «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico según la convención habitual en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se vierte con el gerundio «diciendo», que conserva el marcador formal sin forzar una perífrasis más pesada.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. La traducción en español mantiene el nombre propio con una forma ampliamente reconocible y evita la sustitución litúrgica por un título, en coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: conserva la progresión narrativa de וַיְדַבֵּר con «Entonces ... habló», mantiene el nombre divino explícito como Yahvé y reproduce la fórmula de introducción al discurso con «diciendo». No se registran revisiones posteriores en el pasaje fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, no «SEÑOR».
  - «Moisés» sigue la forma española estándar de nombres bíblicos.
  - La puntuación mantiene el arranque de discurso abierto con coma final, como en el inglés auditado.
