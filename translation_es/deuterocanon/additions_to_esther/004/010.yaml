lexical_decisions:
- source_word: οὐ μὴ ἀποθάνῃς
  english_pob_choice: You certainly will not die
  chosen_spanish: No ciertamente morirás
  alternatives_spanish:
  - No morirás ciertamente
  - Ciertamente no morirás
  - No morirás sin duda
  lexicon: BDAG
  rationale: La combinación οὐ μή + subjuntivo expresa una negación enfática de un hecho futuro, no un mandato. En español, «No ciertamente morirás» conserva esa seguridad enfática sin convertirla en prohibición.
- source_word: κοινὸν
  english_pob_choice: general
  chosen_spanish: general
  alternatives_spanish:
  - común
  - compartido
  - aplica a todos por igual
  lexicon: LSJ
  rationale: El contexto jurídico-cortesano favorece una cualidad de alcance general. «General» reproduce bien la idea de aplicación a todos, tal como la nota inglesa explicita con «applies to everyone alike».
- source_word: τὸ πρόσταγμά
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - edicto
  - mandato
  - orden
  lexicon: LSJ
  rationale: Πρόσταγμα designa una orden oficial; en español «decreto» comunica mejor el matiz formal y jurídico que «mandato» u «orden».
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: Se conserva el posesivo de primera persona plural sin neutralizarlo, porque el griego lo expresa explícitamente y puede tener relevancia contextual para los hablantes.
theological_decisions:
- issue: Fuerza del negativo inicial
  english_pob_reading: 'A reassurance/prediction: ''You certainly will not die'''
  chosen_spanish_reading: 'Una reafirmación/predicción: «No ciertamente morirás»'
  alternative_spanish_readings:
  - 'Una prohibición: «No mueras»'
  - 'Una súplica: «No mueras»'
  rationale: La gramática griega favorece una negación enfática de evento futuro, no un imperativo. Por eso la traducción española mantiene el valor de seguridad o garantía, evitando importar una lectura exhortativa que el texto no requiere.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: El inglés POB pasó de «common» a «general» para κοινόν. La versión española sigue esa revisión semántica con «general», manteniendo el sentido de aplicación amplia y evitando un calco menos natural.
  spanish_consistency_notes:
  - Se prefirió «decreto» para πρόσταγμα por su tono oficial y legal, coherente con el contexto del pasaje.
  - Se mantuvo la negación enfática del griego, evitando un imperativo en español.
  - «General» aquí no significa vago, sino de aplicación común a todos; la nota aclara la alternativa contextual.
  - El texto principal evita registrar la alternativa en el cuerpo para no debilitar la seguridad del enunciado.
