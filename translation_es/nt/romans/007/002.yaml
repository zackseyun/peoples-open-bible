translation:
  language: es
  text: Porque la mujer casada está unida por ley a su marido mientras él vive; pero si el marido muere[a], queda libre de la ley de su marido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es liberada de la ley de su marido»; el griego probablemente alude al vínculo legal que la unía a su marido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕπανδρος γυνή
  english_pob_choice: a married woman
  chosen_spanish: la mujer casada
  alternatives_spanish:
  - una mujer bajo marido
  - una esposa
  lexicon: BDAG
  rationale: El compuesto griego señala a una mujer que está bajo el vínculo matrimonial. «Mujer casada» comunica ese sentido legal y relacional con naturalidad en español, sin reducirlo a una equivalencia demasiado técnica ni a un término más estrecho como «esposa».
- source_word: τῷ ζῶντι ἀνδρί
  english_pob_choice: to her husband while he lives
  chosen_spanish: a su marido mientras él vive
  alternatives_spanish:
  - al marido que vive
  - a su marido vivo
  lexicon: BDAG
  rationale: La frase identifica al marido como vivo, elemento esencial del argumento paulino. «Mientras él vive» reproduce con claridad la duración de la obligación y su carácter condicional.
- source_word: δέδεται
  english_pob_choice: is bound
  chosen_spanish: está unida
  alternatives_spanish:
  - está ligada
  - está atada
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado presente resultante de un vínculo previo. En español, «está unida» comunica la relación legal y marital de forma idiomática; «ligada» o «atada» sonarían más mecánicas o más ásperas de lo necesario.
- source_word: νόμῳ
  english_pob_choice: by law
  chosen_spanish: por ley
  alternatives_spanish:
  - por la ley
  - por una ley
  lexicon: BDAG
  rationale: 'El artículo está ausente en griego, lo que favorece un sentido general o cualitativo: un principio legal, no necesariamente una referencia directa a la Ley mosaica. «Por ley» conserva ese alcance general.'
- source_word: κατήργηται
  english_pob_choice: is released
  chosen_spanish: queda libre
  alternatives_spanish:
  - ha sido liberada
  - es desligada
  lexicon: BDAG
  rationale: El verbo indica quedar sin vigencia obligatoria respecto de ese vínculo. «Queda libre» transmite bien la liberación jurídica implícita en el contexto matrimonial; «desligada» sería más literal pero menos natural.
- source_word: ἀπὸ τοῦ νόμου τοῦ ἀνδρός
  english_pob_choice: from the law of her husband
  chosen_spanish: de la ley de su marido
  alternatives_spanish:
  - de la ley concerniente a su marido
  - de la ley de su esposo
  lexicon: BDAG
  rationale: 'La construcción genitiva es comprimida. «La ley de su marido» sigue de cerca el griego y mantiene la ambigüedad útil: no implica que el marido sea el legislador, sino la ley vinculada a esa relación.'
theological_decisions:
- issue: Sentido de νόμῳ / τοῦ νόμου en el símil matrimonial
  english_pob_reading: general marriage law / legal principle
  chosen_spanish_reading: principio legal general del vínculo matrimonial
  alternative_spanish_readings:
  - Ley mosaica aplicada al matrimonio
  - la ley en sentido específico y técnico
  rationale: En el contexto de Romanos 7:2 Pablo usa el matrimonio como analogía para explicar una liberación por medio de la muerte. La ausencia del artículo en νόμῳ y el marco inmediato favorecen en este versículo un sentido general de obligación legal matrimonial, no una afirmación directa sobre la Ley mosaica en particular.
  doctrine_reference: Romanos 7:1-4; analogía paulina sobre la muerte y la liberación de la obligación legal
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa que prefirió «while he lives» y «the law of her husband», evitando una paráfrasis interpretativa como «ley concerniente a su marido». Se mantiene el sentido legal-marital general sin especificar indebidamente la Ley mosaica.
  spanish_consistency_notes:
  - Se conservó «Yahvé» no porque aparezca aquí, sino como norma general del proyecto; en este versículo no aplica.
  - Se eligió «marido» en lugar de «esposo» para mantener la relación con el registro legal-marital del texto y el paralelismo con el griego ἀνήρ.
  - «Queda libre» mantiene la idea de liberación jurídica sin introducir una noción más fuerte de abolición o cancelación.
