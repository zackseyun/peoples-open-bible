translation:
  language: es
  text: Y mi alma está muy turbada[a]—pero tú[c], oh Yahvé[d][b], ¿hasta cuándo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "mi alma"; también puede entenderse como "mi vida" o "yo mismo".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "está aterrada" / "está consternada".'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: "y tú"; se vierte "pero tú" para reflejar el giro del lamento.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo "YHWH"; tradicionalmente se traduce "el SEÑOR". Alternativa: "Yahvé".'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנַפְשִׁי
  english_pob_choice: And my soul
  chosen_spanish: Y mi alma
  alternatives_spanish:
  - Y mi vida
  - Y yo mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o el propio yo. En este lamento poético, "alma" conserva mejor la fuerza antropológica y emocional que "mi vida" o una paráfrasis como "yo mismo". Se omite aquí la conjunción explícita "and" en favor de un español más natural, manteniendo el sentido coordinado con el contexto.
- source_word: נִבְהֲלָה
  english_pob_choice: is greatly troubled
  chosen_spanish: está muy turbada
  alternatives_spanish:
  - está aterrada
  - está consternada
  - está en gran angustia
  lexicon: HALOT
  rationale: בהל expresa estar perturbado, consternado o aterrorizado. "Turbada" comunica bien la conmoción interior sin forzar el matiz hacia un miedo absoluto, y encaja de modo idiomático con el tono de lamentación.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - en gran manera
  - sobremanera
  lexicon: HALOT
  rationale: El adverbio intensifica el verbo precedente. "Muy" es la opción natural en español y conserva la intensificación de manera clara y sobria.
- source_word: וְאַתָּה
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  - y sin embargo tú
  - mas tú
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente "y tú", el giro en el lamento introduce un contraste directo con el estado del salmista. "Pero tú" refleja ese viraje discursivo con naturalidad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. Según la convención del proyecto, se mantiene el nombre divino como "Yahvé" en lugar de sustituirlo por un título. "Yahvé" conserva el nombre propio del pacto de forma legible para el lector español.
- source_word: עַד מָתָי
  english_pob_choice: how long?
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿hasta cuándo será esto?
  - ¿por cuánto tiempo?
  lexicon: HALOT
  rationale: Es la fórmula lamentatoria idiomática del hebreo. "¿Hasta cuándo?" es la traducción española directa, natural y reconocible, preservando la urgencia emocional del salmo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene el Tetragrámaton directamente. Siguiendo la línea doctrinal del proyecto, se traduce como "Yahvé" para preservar el nombre personal de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el auditable de inglés: se preserva el lamento abrupto, el valor intensivo de מְאֹד, el giro discursivo de וְאַתָּה y la decisión doctrinal de mantener el nombre divino como Yahvé. No se detectan revisiones pendientes en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - '"Yahvé" se usa de forma consistente con la política del proyecto para יְהוָה.'
  - La frase final conserva la fórmula lamentatoria española estándar "¿hasta cuándo?".
  - La puntuación con raya realza el cambio de enfoque del salmista hacia Dios, como en el inglés auditado.
