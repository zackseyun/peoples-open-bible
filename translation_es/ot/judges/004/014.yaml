translation:
  language: es
  text: 'Entonces Débora dijo a Barac: «Levántate, porque este es el día en que Yahvé ha entregado[a] a Sísara en tus manos. ¿No ha salido Yahvé delante de ti?» Y Barac descendió del monte Tabor, con diez mil hombres siguiéndolo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha dado a Sísara en tus manos». El hebreo dice literalmente «ha dado ... en tu mano», es decir, lo ha puesto bajo tu poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֗וּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alza(te)
  - Levántate ya
  lexicon: HALOT
  rationale: El imperativo exige acción inmediata. «Levántate» mantiene la fuerza exhortativa natural en español sin perder el tono solemne del mandato a Barac.
- source_word: כִּ֣י זֶ֤ה הַ/יּוֹם֙ אֲשֶׁר֩
  english_pob_choice: for this is the day on which
  chosen_spanish: porque este es el día en que
  alternatives_spanish:
  - pues este es el día en que
  - porque este es el día cuando
  lexicon: HALOT
  rationale: La construcción conserva el énfasis demostrativo de «este es el día» y la relación temporal causal de כִּי y אֲשֶׁר en español natural.
- source_word: נָתַ֨ן ... בְּ/יָדֶ֔/ךָ
  english_pob_choice: has given ... into your hand
  chosen_spanish: ha entregado ... en tu mano
  alternatives_spanish:
  - ha dado ... en tu mano
  - ha puesto ... en tu poder
  lexicon: HALOT
  rationale: El idiomatismo hebreo expresa entrega al poder de otro. «Entregado» preserva el valor de transferencia/entrega sin volverlo mecánico; «en tu mano» retiene la imagen bíblica.
- source_word: יְהוָ֤ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», manteniendo el nombre divino en lugar de sustituirlo por un título.'
- source_word: הֲ/לֹ֥א
  english_pob_choice: Has not
  chosen_spanish: ¿No ha...?
  alternatives_spanish:
  - ¿Acaso no ha...?
  - ¿No es verdad que ha...?
  lexicon: HALOT
  rationale: La pregunta retórica pide asentimiento. En español, «¿No ha...?» conserva la forma interrogativa y la expectativa de respuesta afirmativa.
- source_word: יָצָ֣א לְ/פָנֶ֑י/ךָ
  english_pob_choice: gone out before you
  chosen_spanish: ha salido delante de ti
  alternatives_spanish:
  - ha ido delante de ti
  - ha salido antes que tú
  lexicon: HALOT
  rationale: «Salir delante de» reproduce bien la imagen direccional del hebreo y su sentido militar-contextual, sin añadir más explicación que la requerida por el pasaje.
- source_word: וַ/יֵּ֤רֶד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - se dirigió hacia abajo
  lexicon: HALOT
  rationale: Desde el monte Tabor, «descendió» conserva el movimiento narrativo y el registro digno del relato.
- source_word: מֵ/הַ֣ר תָּב֔וֹר
  english_pob_choice: from Mount Tabor
  chosen_spanish: del monte Tabor
  alternatives_spanish:
  - desde el monte Tabor
  - del monte de Tabor
  lexicon: HALOT
  rationale: «Monte Tabor» es la forma geográfica estándar y clara en español bíblico contemporáneo.
- source_word: וַ/עֲשֶׂ֧רֶת אֲלָפִ֛ים אִ֖ישׁ אַחֲרָֽי/ו
  english_pob_choice: with ten thousand men following him
  chosen_spanish: con diez mil hombres siguiéndolo
  alternatives_spanish:
  - y diez mil hombres tras él
  - con diez mil hombres detrás de él
  lexicon: HALOT
  rationale: «Hombres» refleja el masculino explícito de אִישׁ en contexto militar. «Siguiéndolo» comunica la relación de acompañamiento y movimiento tras Barac.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El pasaje contiene el Tetragrámaton directamente. Para la edición española se mantiene el nombre propio divino «Yahvé», coherente con la política del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de Jueces 4:14 y el tramo auditado en inglés, conservando el imperativo, la cláusula temporal-causal, el idiomatismo de "en tu mano" y la pregunta retórica. Se adopta el nombre divino «Yahvé» conforme a la norma del proyecto, y se opta por una sintaxis española natural sin perder la secuencia narrativa de descenso desde el monte Tabor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, no «SEÑOR».
  - «En tu mano» conserva el idiomatismo de poder/dominio del hebreo.
  - «Monte Tabor» sigue la forma toponímica española habitual.
  - «Hombres» traduce el masculino plural de אִישׁ en contexto militar sin neutralizar indebidamente el referente.
