base_translation:
  language: en
  yaml_path: translation/ot/1_kings/006/003.yaml
  text: The portico in front of the nave of the house was twenty cubits long[a], across the width of the house[c][b], and ten cubits deep in front of the house.
  footnotes:
  - marker: a
    text: Or 'porch' or 'vestibule' for 'portico.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the nave of the house'; that is, the main hall of the temple building.
    reason: lexical_alternative
  - marker: c
    text: Literally 'its width'; the sense here is the portico's depth extending outward in front of the house.
    reason: lexical_alternative
