review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: pregunta retórica, identificación appositiva de Jerusalén con ''este pueblo'', persistencia en el engaño y negativa a volver. Sin embargo, no preserva suficientemente la red léxica de שוב / מְשֻבָה / לָשׁוּב que el POB inglés documenta como decisiva. ''Se ha desviado ... con un desvío perpetuo ... volver'' debilita el juego verbal nominal del original y su contraste entre apartarse y regresar.'
  spanish_quality_summary: El español es claro y legible, pero 'con un desvío perpetuo' suena algo mecánico e idiomáticamente menos natural en registro bíblico moderno. Una formulación como 'con un apartarse perpetuo' o 'con un alejamiento perpetuo' mejora la relación con el verbo inicial, y 'se ha apartado' encaja mejor con el tono profético que 'se ha desviado'.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto principal. La cuestión clave es la consistencia interna con la decisión teológica/lexical del POB sobre שוב: conviene reflejar explícitamente el patrón ''apartarse / apartarse / volver'' o equivalente, con nota sobre alternativas (''apostasía'', ''rebelión persistente'') y sobre la repetición hebrea. También debe preservarse la nota de lectura alternativa sobre ''Jerusalén'' como vocativo, ya que el POB inglés la conserva.'
  issues:
  - severity: medium
    issue: La red léxica de שוב no se preserva con suficiente fuerza.
    rationale: El inglés auditado prioriza mantener el juego 'turned away / turning away / return'. En español, 'se ha desviado / desvío / volver' comunica la idea, pero no muestra tan bien la repetición deliberada del hebreo.
  - severity: medium
    issue: Faltan las notas que el POB inglés preserva como relevantes.
    rationale: El registro español no incluye nota para la lectura vocativa de 'Jerusalén', ni para las alternativas de מְשֻבָה נִצַּחַת, ni para la repetición de שוב. Son decisiones documentadas en el audit trail y deben reflejarse en español.
  - severity: low
    issue: '''Con un desvío perpetuo'' suena algo poco idiomático.'
    rationale: Aunque comprensible, la combinación es menos natural y menos digna que opciones como 'con un apartarse perpetuo' o 'en un apartarse perpetuo', que además enlazan mejor con el verbo inicial.
  revised_spanish_text: ¿Por qué se ha apartado este pueblo —Jerusalén[c]— con un apartarse[a] perpetuo? Se aferran al engaño[b]; se niegan a volver.
  revised_footnotes:
  - marker: a
    text: O 'con una apostasía perpetua' o 'en una rebelión persistente'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite formas del verbo 'volver/regresar' a lo largo del versículo, en contraste entre el apartarse del pueblo y su negativa a volver.
    reason: lexical_alternative
  - marker: c
    text: '''Jerusalén'' también puede entenderse como vocativo: ''¿Por qué se ha apartado este pueblo, oh Jerusalén...?'''
    reason: alternative_reading
  revision_rationale: 'Se ajusta el texto para reflejar mejor la repetición de שוב en el hebreo y la racionalidad lexical ya documentada por el POB inglés: ''se ha apartado ... un apartarse ... volver''. También se restauran las notas significativas del audit trail, con marcadores únicos anclados en el texto.'
