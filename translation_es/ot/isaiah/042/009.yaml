translation:
  language: es
  text: He aquí[a] que las cosas anteriores[b] ya sucedieron, y yo anuncio cosas nuevas; antes de que broten[c], yo se las anuncio a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Miren’.
    reason: lexical_alternative
  - marker: b
    text: O ‘las cosas primeras’.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘brotar’ o ‘surgir’; conserva la imagen vegetal del hebreo para hechos aún no visibles.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִאשֹׁנוֹת
  english_pob_choice: the former things
  chosen_spanish: las cosas primeras
  alternatives_spanish:
  - las cosas anteriores
  - las cosas de antes
  lexicon: HALOT
  rationale: El sustantivo plural sustantivado contrasta con ‘cosas nuevas’. ‘Las cosas primeras’ conserva la brevedad y la oposición semántica del hebreo sin volverlo demasiado abstracto.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: HALOT
  rationale: ‘He aquí’ preserva el tono profético y deíctico de atención, equivalente al ‘Behold’ de la POB en un registro digno y publicable.
- source_word: בָאוּ
  english_pob_choice: have come to pass
  chosen_spanish: ya sucedieron
  alternatives_spanish:
  - han venido
  - han ocurrido
  lexicon: HALOT
  rationale: En contexto de declaraciones proféticas, el verbo expresa cumplimiento o acontecimiento efectivo. ‘Ya sucedieron’ comunica ese valor idiomático en español sin perder el sentido de realización.
- source_word: חֲדָשׁוֹת
  english_pob_choice: new things
  chosen_spanish: cosas nuevas
  alternatives_spanish:
  - novedades
  - cosas recientes
  lexicon: HALOT
  rationale: Se mantiene el paralelismo nominal con ‘las cosas primeras’. ‘Cosas nuevas’ es transparente y fiel a la concisión del hebreo.
- source_word: מַגִּיד
  english_pob_choice: declare
  chosen_spanish: anuncio
  alternatives_spanish:
  - declaro
  - proclamo
  lexicon: HALOT
  rationale: El hifil de נגד expresa hacer saber o declarar. ‘Anuncio’ en primera persona conserva el acto divino de dar a conocer, con fluidez natural en español.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes que
  alternatives_spanish:
  - antes de que
  - antes de
  lexicon: HALOT
  rationale: ‘Antes que’ enlaza naturalmente con la cláusula verbal siguiente y refleja la prioridad temporal del hebreo.
- source_word: תִּצְמַחְנָה
  english_pob_choice: they spring up
  chosen_spanish: broten
  alternatives_spanish:
  - surjan
  - florezcan
  lexicon: HALOT
  rationale: El verbo usa imaginería vegetal de brotar/crecer. ‘Broten’ preserva esa imagen de manera clara y concisa en español.
- source_word: אַשְׁמִיעַ אֶתְכֶם
  english_pob_choice: I announce them to you
  chosen_spanish: yo se las haré oír a ustedes
  alternatives_spanish:
  - yo se las anunciaré a ustedes
  - yo les haré oír
  lexicon: HALOT
  rationale: 'El hifil de שמע es causativo: ‘hacer oír’. Para no perder esa fuerza, se mantiene la construcción causativa con ‘haré oír’. ‘Se las’ retoma ‘cosas nuevas’ de forma natural en español.'
theological_decisions:
- issue: Carácter profético de cumplimiento y anuncio
  english_pob_reading: The verse contrasts previously announced events now fulfilled with newly announced future acts of God.
  chosen_spanish_reading: El versículo contrasta cosas antiguas ya cumplidas con cosas nuevas todavía no visibles, pero ya anunciadas por Dios.
  alternative_spanish_readings:
  - El versículo solo opone pasado y futuro sin énfasis en cumplimiento previo.
  - El versículo funciona como una declaración general de novedad divina.
  rationale: 'La secuencia ‘ya sucedieron’ / ‘anuncio cosas nuevas’ / ‘antes que broten’ preserva la tensión profética del texto: cumplimiento previo y anuncio anticipado. No añade doctrinas externas, pero sí deja visible el tema bíblico de revelación y cumplimiento.'
  doctrine_reference: 'Isaías 40–48: el Dios que anuncia y cumple; filosofía de traducción: sentido llano del texto sin sobrecargarlo.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente sin cambios necesarios; se conserva la lectura auditada de la POB inglesa: atención profética, cumplimiento de ‘former things’, y metáfora vegetal en ‘spring up’.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ no aplicable aquí, pues el verso no contiene el Tetragrámaton explícito.
  - Se evitó ‘SEÑOR’ como máscara porque el hebreo aquí se centra en la voz divina en primera persona.
  - Se preservó el paralelismo sustantival entre ‘cosas primeras’ y ‘cosas nuevas’.
  - Se optó por una construcción causativa en español (‘haré oír’) para reflejar el hifil de שמע.
