  source_alignment_summary: 'El borrador español refleja bien el sentido base del hebreo: exclusión legal de amonitas y moabitas de la asamblea de Yahvé, con preservación explícita de ''la décima generación'' y ''para siempre''. También mantiene correctamente ''Yahvé'' para יְהוָה y ''asamblea'' para קהל. Sin embargo, la secuencia ''ni aun hasta la décima generación'' introduce una coordinación negativa menos fiel al גַּם intensificativo y menos natural en español que ''aun hasta la décima generación'' o ''incluso hasta la décima generación''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'ni aun hasta la décima generación' suena algo forzado y puede sugerir una estructura adversativa innecesaria después del punto y coma. Una leve reparación mejora naturalidad y precisión. El resto del verso lee bien en español eclesial contemporáneo.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> ''Yahvé'', קהל -> ''asamblea'', gentilicios -> ''amonita''/''moabita'', עַד עוֹלָם -> ''para siempre''. No hay conflicto terminológico mayor. La revisión solo ajusta la expresión de גַּם דּוֹר עֲשִׂירִי a una forma española más natural y mejor alineada con ''even to the tenth generation''.'
  issues:
  - severity: medium
    issue: '''ni aun hasta la décima generación'' no expresa de la mejor manera el intensificador גַּם'
    rationale: El hebreo גַּם aquí intensifica ('aun/incluso hasta la décima generación'), no requiere la construcción negativa coordinada 'ni aun'. En español, 'ni aun' tras el punto y coma suena más pesado y menos directo que 'aun hasta' o 'incluso hasta'.
