base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/047/009.yaml
  text: And every living creature that swarms[a], wherever the river goes, will live. And there will be very many fish, because these waters go there and are healed[b]; everything will live wherever the river goes.
  footnotes:
  - marker: a
    text: Hebrew has a dual/plural form, literally 'streams' or 'rivers'; many translations smooth this to the singular 'river.'
    reason: lexical_alternative
  - marker: b
    text: Or 'these waters go there, so that the waters there are healed.' The Hebrew healing imagery is explicit.
    reason: lexical_alternative
