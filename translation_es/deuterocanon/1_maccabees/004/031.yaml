translation:
  language: es
  text: Entrega este campamento en manos[a] de tu pueblo Israel, y que sean avergonzados[b] a causa de su ejército y de su caballería.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «en poder de». El giro griego εἰς χεῖρας es un modismo de entrega al dominio de otro.
    reason: lexical_alternative
  - marker: b
    text: También puede leerse «en su fuerza». El griego δύναμις puede referirse de modo más general a poder o capacidad militar, no solo a un ejército.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύγκλεισον
  english_pob_choice: Deliver
  chosen_spanish: Entrega
  alternatives_spanish:
  - Enciérralo
  - Confínalo
  - Entrégalo
  lexicon: LSJ
  rationale: El verbo griego puede significar literalmente «encerrar» o «confinar», pero en este contexto de oración militar el sentido audible es el de poner al enemigo en poder de Israel. «Entrega» conserva la acción divina de transferir al campamento a la potestad de Israel sin sonar mecánico.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento
  - ejército
  - hueste
  lexicon: LSJ
  rationale: La palabra griega nombra de forma directa un campamento militar, aunque por extensión puede referirse a una fuerza armada. «Campamento» preserva la imagen concreta del texto y evita interpretar de más.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en manos de
  - en poder de
  lexicon: LSJ
  rationale: Es un modismo bíblico de entrega al dominio de otro. «En manos de» mantiene esa expresión idiomática de manera natural en español.
- source_word: λαοῦ σου Ἰσραήλ
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo, Israel
  - tu pueblo Israel
  lexicon: LSJ
  rationale: El griego presenta a Israel como el pueblo de Dios. En español, «tu pueblo Israel» comunica la relación de pacto sin añadir una glosa interpretativa innecesaria.
- source_word: αἰσχυνθήτωσαν
  english_pob_choice: let them be put to shame
  chosen_spanish: que sean puestos en vergüenza
  alternatives_spanish:
  - que sean avergonzados
  - que queden avergonzados
  - que sean deshonrados
  lexicon: LSJ
  rationale: La pasiva-jusiva pide que el enemigo experimente deshonra pública por la derrota. «Puestos en vergüenza» conserva mejor el matiz bíblico de humillación externa que un simple «avergonzados».
- source_word: ἐπὶ τῇ δυνάμει
  english_pob_choice: because of their army
  chosen_spanish: a causa de su ejército
  alternatives_spanish:
  - a causa de su fuerza
  - por su poder
  - en su fuerza
  lexicon: LSJ
  rationale: δύναμις puede ser fuerza, poder o capacidad militar. Dado el paralelo con la caballería, aquí el sentido más probable es la fuerza bélica; «ejército» explicita ese valor militar sin traicionar el contexto.
- source_word: τῇ ἵππῳ αὐτῶν
  english_pob_choice: their cavalry
  chosen_spanish: su caballería
  alternatives_spanish:
  - sus caballos
  - sus jinetes
  - su caballería
  lexicon: LSJ
  rationale: ἵππος puede funcionar colectivamente como caballo/caballería. En este marco de batalla, «caballería» es la equivalencia española más clara y natural.
theological_decisions:
- issue: Petición de victoria militar concedida por Dios
  english_pob_reading: Deliver this camp into the hands of your people Israel
  chosen_spanish_reading: Entrega este campamento en manos de tu pueblo Israel
  alternative_spanish_readings:
  - Enciérralo en manos de tu pueblo Israel
  - Pon este campamento en manos de tu pueblo Israel
  rationale: La frase no formula una tesis doctrinal controvertida; es una súplica para que Dios conceda la victoria. «Entrega» conserva la agencia divina y la idea de transferencia al poder de Israel.
  doctrine_reference: 'DOCTRINE.md: mantener el sentido fuente con equivalencia óptima'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas al texto mediante los marcadores [a] y [b]. Además, se ajustó «campamento» para reflejar con mayor precisión παρεμβολήν, y se mantuvo el registro formal de «Entrega» conforme al último pase de revisión inglés.
  spanish_consistency_notes:
  - Se usa «Israel» como nombre propio sin coma intermedia, siguiendo la apposición clara del griego.
  - Se mantiene «caballería» para τῇ ἵππῳ αὐτῶν, coherente con el contexto militar.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en el versículo.
  - La construcción «que sean puestos en vergüenza» conserva la voz pasiva-jusiva del griego.
