translation:
  language: es
  text: Tú lo pusiste a gobernar sobre las obras de tus manos[b][a]; todo lo pusiste bajo sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Le diste dominio sobre las obras de tus manos»'
    reason: lexical_alternative
  - marker: b
    text: El singular «lo» y «sus» continúa el lenguaje masculino representativo del versículo anterior, refiriéndose a la humanidad según la redacción hebrea.
    reason: cultural_note
lexical_decisions:
- source_word: תַּמְשִׁילֵהוּ
  english_pob_choice: You made him rule
  chosen_spanish: Tú lo hiciste gobernar
  alternatives_spanish:
  - Le diste dominio
  - Lo causaste a gobernar
  lexicon: HALOT
  rationale: El hifil de משל expresa causar que alguien ejerza dominio o gobierno. «Hiciste gobernar» conserva la fuerza causativa y suena natural en español; «le diste dominio» es posible, pero introduce una formulación más interpretativa.
- source_word: בְּמַעֲשֵׂי יָדֶיךָ
  english_pob_choice: over the works of your hands
  chosen_spanish: sobre las obras de tus manos
  alternatives_spanish:
  - sobre tu obra
  - sobre lo que tus manos hicieron
  lexicon: HALOT
  rationale: La preposición con משל marca la esfera de gobierno. «Las obras de tus manos» conserva la imagen concreta y antropomórfica del texto hebreo sin volverla abstracta.
- source_word: כֹּל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo creado
  lexicon: HALOT
  rationale: En este contexto el término es totalizador y abarca de manera comprehensiva lo puesto bajo el dominio humano. «Todo» es breve y fiel al alcance inclusivo del hebreo.
- source_word: שַׁתָּה
  english_pob_choice: you put
  chosen_spanish: pusiste
  alternatives_spanish:
  - colocaste
  - pusiste en su lugar
  lexicon: HALOT
  rationale: El qal de שׁית/שׂים significa poner o colocar. «Pusiste» es la opción más directa y natural en español.
- source_word: תַחַת רַגְלָיו
  english_pob_choice: under his feet
  chosen_spanish: debajo de sus pies
  alternatives_spanish:
  - bajo sus pies
  - bajo sus plantas
  lexicon: HALOT
  rationale: La expresión es un modismo de sometimiento o sujeción. «Debajo de sus pies» preserva la imagen literal y su fuerza de dominio.
theological_decisions:
- issue: Lenguaje masculino singular representativo para la humanidad
  english_pob_reading: Retain singular masculine pronouns ('him,' 'his')
  chosen_spanish_reading: Mantener el singular masculino («lo», «sus»), referido de manera representativa al ser humano en el contexto
  alternative_spanish_readings:
  - los / sus
  - ellos / sus
  rationale: El hebreo mantiene formas singulares masculinas en el contexto inmediato y la lectura representativa del ser humano no se pierde en español al conservarlas. Se evita pluralizar el texto y borrar la correspondencia con el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Lenguaje de dominio
  english_pob_reading: Render משל with 'made him rule' rather than stronger traditional 'gave him dominion'
  chosen_spanish_reading: 'Traducir con un verbo de acción: «hiciste gobernar»'
  alternative_spanish_readings:
  - le diste dominio
  - le concediste dominio
  rationale: El hebreo expresa una acción causativa de hacer que gobierne. «Hiciste gobernar» conserva esa fuerza verbal sin añadir una formulación más teológica o tradicional que el hebreo no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios y hay alto grado de acuerdo en la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «tus manos» para preservar la imagen antropomórfica del hebreo.
  - Se conserva el singular masculino representativo, coherente con la decisión auditada en inglés.
  - Se evita «Cristo», «SEÑOR» u այլ sustituciones no sustentadas por este versículo.
  - La estructura del segundo hemistiquio sigue el paralelismo hebreo con «todo» + «debajo de sus pies».
