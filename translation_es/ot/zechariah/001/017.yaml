    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y de la auditoría inglesa, pero se corrige la ubicación de la nota para cumplir la disciplina de anclaje y se mejora ligeramente la naturalidad del español con «de nuevo». No se requieren cambios teológicos ni léxicos de fondo.
