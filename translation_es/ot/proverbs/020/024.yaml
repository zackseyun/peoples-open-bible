translation:
  language: es
  text: Los pasos del hombre provienen de Yahvé[a]; ¿cómo, pues, podrá el hombre entender su camino?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión ''provienen de Yahvé'' indica procedencia u origen: el curso de la vida de una persona viene de Yahvé y está bajo su dirección o determinación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/יהוָה
  english_pob_choice: from Yahweh / from the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - provienen de Yahvé
  - son de Yahvé
  lexicon: HALOT
  rationale: La preposición מִן expresa procedencia u origen. En español, 'de Yahvé' comunica de forma natural esa fuente sin perder la relación de pertenencia/determinación del hebreo. Se mantiene 'Yahvé' según la norma del proyecto para el Nombre divino.
- source_word: מִצְעֲדֵי
  english_pob_choice: steps
  chosen_spanish: los pasos
  alternatives_spanish:
  - las pisadas
  - los movimientos
  lexicon: HALOT
  rationale: '''Pasos'' es la equivalencia más natural para la metáfora de desplazamiento guiado en la vida. Conserva la imagen proverbial de la marcha o curso de una persona.'
- source_word: גָבֶר
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - el varón
  lexicon: HALOT
  rationale: En español, 'el hombre' reproduce el singular genérico masculino del hebreo y mantiene el paralelismo con el siguiente 'el hombre'. 'Una persona' neutralizaría un rasgo gramatical y retórico presente en el original.
- source_word: וְאָדָם
  english_pob_choice: how then can a man
  chosen_spanish: ¿cómo, pues, podrá el hombre
  alternatives_spanish:
  - ¿y cómo podrá el hombre
  - ¿cómo podrá una persona
  lexicon: HALOT
  rationale: אָדָם funciona aquí como referencia humana general en la segunda cola. '¿Cómo, pues, podrá...' expresa bien la fuerza inferencial de la pregunta retórica y conserva el tono sapiencial del proverbio.
- source_word: מַה
  english_pob_choice: how then can
  chosen_spanish: ¿cómo, pues, podrá
  alternatives_spanish:
  - ¿qué podrá
  - ¿cómo podrá
  lexicon: HALOT
  rationale: En esta construcción interrogativa, 'מה + verbo' expresa imposibilidad o limitación retórica. '¿Cómo, pues, podrá...' suena natural en español y refleja la inferencia del verso.
- source_word: יָּבִין
  english_pob_choice: understand
  chosen_spanish: entender
  alternatives_spanish:
  - comprender
  - discernir
  lexicon: HALOT
  rationale: '''Entender'' es claro, idiomático y fiel al campo semántico de בין. Mantiene la idea de captar o llegar a comprender el propio camino.'
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su curso
  lexicon: HALOT
  rationale: '''Camino'' preserva la metáfora bíblica de la vida como trayectoria. ''Su camino'' comunica bien el sentido metafórico y es plenamente natural en español.'
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, se vierte 'Yahvé' y no se lo oculta detrás de 'SEÑOR'. Esto preserva la visibilidad del Nombre del pacto y la trazabilidad del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Referencia genérica masculina en גבר / אדם
  english_pob_reading: a man ... a man
  chosen_spanish_reading: el hombre ... el hombre
  alternative_spanish_readings:
  - la persona ... la persona
  - la humanidad ... la persona
  rationale: Ambos sustantivos hebreos son masculinos singulares con valor genérico. En español, 'el hombre' conserva esa forma gramatical y retórica sin introducir una neutralización que el original no exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del auditor y conserva la lectura principal del hebreo: origen divino de los pasos humanos y la imposibilidad retórica de que el ser humano comprenda por sí mismo su camino. No se detectaron revisiones posteriores que obliguen a cambiar la decisión de base.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el estándar del proyecto.
  - Se conservó el singular genérico masculino ('el hombre') para reflejar el hebreo sin neutralización.
  - '''Camino'' se usa en sentido metafórico sapiencial, no meramente literal.'
  - La puntuación reproduce el paralelismo y la pregunta retórica del hebreo con fluidez natural en español.
