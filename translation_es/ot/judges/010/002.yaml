lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: he judged
  chosen_spanish: él juzgó
  alternatives_spanish:
  - él gobernó
  - él ejerció como juez sobre
  lexicon: HALOT
  rationale: שׁפט en Jueces designa la función de juez/líder sobre Israel. «Juzgó» conserva el término recurrente del libro y suena natural en español.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - sobre Israel
  - a todo Israel
  lexicon: HALOT
  rationale: El objeto directo es el pueblo/nación Israel; en español, el acusativo se expresa naturalmente con «a».
- source_word: עֶשְׂרִים וְשָׁלֹשׁ שָׁנָה
  english_pob_choice: twenty-three years
  chosen_spanish: durante veintitrés años
  alternatives_spanish:
  - veintitrés años
  - por veintitrés años
  lexicon: HALOT
  rationale: El hebreo expresa duración de gobierno; «durante» explicita la extensión temporal sin alterar el número.
- source_word: וַיָּמָת
  english_pob_choice: Then he died
  chosen_spanish: Luego murió
  alternatives_spanish:
  - Y murió
  - Entonces murió
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Luego» comunica secuencia en español sin cargar el matiz con contraste.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - y fue sepultado
  lexicon: HALOT
  rationale: El nifal pide pasivo; «sepultado» es un equivalente digno y natural en español bíblico, preservando la pasividad sin añadir agente.
- source_word: בְּשָׁמִיר
  english_pob_choice: in Shamir
  chosen_spanish: en Samir
  alternatives_spanish:
  - en Shamir
  - en la ciudad de Samir
  lexicon: HALOT
  rationale: El topónimo se translitera como nombre propio. Se eligió «Samir» para una forma española fluida, manteniendo el referente geográfico del hebreo.
