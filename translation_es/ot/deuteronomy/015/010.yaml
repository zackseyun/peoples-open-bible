base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/015/010.yaml
  text: You shall surely give to him[a], and your heart shall not be grudging when you give to him[c][b], because on account of this Yahweh your God will bless you in all your work and in every undertaking of your hand.
  footnotes:
  - marker: a
    text: Or, 'your heart shall not be grieved' or 'you shall not be resentful' when you give to him.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in every sending out of your hand'; that is, in all that your hand undertakes.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively transliterated 'Yahweh.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
