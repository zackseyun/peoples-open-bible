translation:
  language: es
  text: ¿Quién es este que habla y sucede[a], a menos que el Señor lo haya mandado[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dijo ... y aconteció»; el hebreo usa formas pasadas en una afirmación retórica de verdad general.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a menos que el Señor lo haya ordenado / decretado». El verbo hebreo significa más literalmente «mandó».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי זֶה
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este
  alternatives_spanish:
  - ¿Quién es aquel
  - ¿Quién es este hombre
  lexicon: HALOT
  rationale: La combinación interrogativa + demostrativo conserva el tono retórico enfático del hebreo sin volverse artificial en español.
- source_word: אָמַר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - ha hablado
  lexicon: HALOT
  rationale: Aunque la forma hebrea es pasada, el valor retórico expresa una afirmación general; 'habla' comunica mejor en español la acción verbal genérica que desencadena el hecho.
- source_word: וַתֶּהִי
  english_pob_choice: and it happens
  chosen_spanish: y ocurre
  alternatives_spanish:
  - y sucede
  - y acontece
  - y viene a ser
  lexicon: HALOT
  rationale: Se preserva la idea de resultado/ocurrencia sin recurrir a un giro arcaizante como 'acontece' o 'vino a pasar'.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: HALOT
  rationale: En este proyecto, el título divino se vierte como 'Yahvé' cuando el hebreo apunta al nombre/divino título empleado en el texto; aquí se mantiene la referencia a la soberanía divina sin usar el reemplazo eclesiástico de 'SEÑOR'.
- source_word: לֹא צִוָּה
  english_pob_choice: has not commanded it
  chosen_spanish: lo haya ordenado
  alternatives_spanish:
  - lo haya mandado
  - lo haya decretado
  - lo haya dispuesto
  lexicon: HALOT
  rationale: '''Ordenado'' conserva la fuerza directiva de צוה y su aptitud para abarcar la causalidad soberana del contexto, sin cargar el texto con un término sistemático más fuerte que el verbo hebreo. El complemento ''lo'' explicita el objeto implícito del evento.'
theological_decisions:
- issue: Relación entre mandato divino y soberanía providencial
  english_pob_reading: unless the Lord has commanded it
  chosen_spanish_reading: a menos que Yahvé lo haya ordenado
  alternative_spanish_readings:
  - si Yahvé no lo ha mandado
  - a menos que el Señor lo haya decretado
  - si no lo ha dispuesto Yahvé
  rationale: El hebreo presenta un principio general de que ningún acontecimiento ocurre fuera del querer directivo de Dios. 'A menos que' refleja mejor la cláusula exceptiva que 'si no'. 'Ha ordenado' mantiene la base léxica de צוה sin imponer necesariamente una formulación dogmática más técnica como 'decretado' o 'dispuesto'.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'if' por 'unless' para reflejar mejor el matiz exceptivo del hebreo. La propuesta española sigue ese ajuste con 'a menos que' y mantiene la tensión entre el sentido léxico de 'mandar/ordenar' y la lectura providencial del contexto.
  spanish_consistency_notes:
  - Se evita 'Señor' como sustituto automático del nombre divino, en consonancia con el estándar del proyecto para יהוה.
  - '''Ocurre'' y ''ha ordenado'' equilibran naturalidad española y fidelidad al valor general del hebreo, sin convertir el dicho en una paráfrasis libre.'
  - La cláusula final conserva una alternativa interpretativa en nota porque el auditorio inglés también preserva 'ordained/decreed' como posibles matices.
