translation:
  language: es
  text: 'El rey llamó a gritos para hacer entrar a los encantadores, a los caldeos[a] y a los adivinos. El rey respondió y dijo a los sabios de Babilonia: «Todo hombre[b] que lea esta escritura y me haga conocer su interpretación será vestido de púrpura, llevará una cadena de oro alrededor de su cuello y gobernará como tercero en el reino[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los astrólogos», porque el término puede denotar una clase de sabios de la corte babilónica y no solo el grupo étnico.
    reason: lexical_alternative
  - marker: b
    text: La expresión aramea es masculina singular, pero funciona genéricamente; el sentido es «cualquier persona».
    reason: lexical_alternative
  - marker: c
    text: O «será el tercer gobernante en el reino»; el arameo probablemente se refiere al rango como tercero en autoridad.
    reason: alternative_reading
lexical_decisions:
- source_word: קָרֵא ... בְּחַיִל
  english_pob_choice: called out loudly
  chosen_spanish: llamó a gritos
  alternatives_spanish:
  - clamó con fuerza
  - llamó en alta voz
  lexicon: HALOT
  rationale: La expresión aramea indica una llamada enérgica y pública. «A gritos» conserva la fuerza del verbo sin sonar torpe en español actual.
- source_word: לְהֶעָלָה
  english_pob_choice: to bring in
  chosen_spanish: para traer
  alternatives_spanish:
  - para hacer entrar
  - para introducir
  lexicon: HALOT
  rationale: En el contexto de corte, el sentido es convocar a los especialistas a la presencia del rey. «Traer» mantiene la naturalidad española y el valor causativo contextual.
- source_word: אָשְׁפַיָּא
  english_pob_choice: the enchanters
  chosen_spanish: los encantadores
  alternatives_spanish:
  - los conjuradores
  - los magos
  lexicon: HALOT
  rationale: El término nombra a una clase de especialistas rituales/ocultistas. «Encantadores» sigue la decisión inglesa y distingue este grupo de los «sabios» de Babilonia.
- source_word: כשדי/א
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los astrólogos
  lexicon: HALOT
  rationale: Se conserva el término del texto y su valor técnico en Daniel, sin reducirlo de entrada a una función astral específica que el contexto no obliga a explicitar.
- source_word: וְ/גָזְרַיָּא
  english_pob_choice: the diviners
  chosen_spanish: los adivinos
  alternatives_spanish:
  - los agoreros
  - los pronosticadores
  lexicon: HALOT
  rationale: El vocablo designa especialistas en presagios e interpretación. «Adivinos» comunica con claridad esa función en español bíblico contemporáneo.
- source_word: לְ/חַכִּימֵי בָבֶל
  english_pob_choice: to the wise men of Babylon
  chosen_spanish: a los sabios de Babilonia
  alternatives_spanish:
  - a los sabios babilonios
  lexicon: HALOT
  rationale: Se conserva la relación posesiva/genitiva del hebreo-arameo y el título de corte. «Sabios de Babilonia» es claro y respetuoso del orden fuente.
- source_word: כָל אֱנָשׁ
  english_pob_choice: Any man
  chosen_spanish: Todo hombre[b]
  alternatives_spanish:
  - Cualquiera
  - Toda persona
  lexicon: HALOT
  rationale: La forma es gramaticalmente masculina singular con valor genérico. Se mantiene esa huella formal en español, como hizo la edición inglesa, y se aclara en nota el alcance inclusivo.
- source_word: יִקְרֵה כְּתָבָה דְנָה
  english_pob_choice: reads this writing
  chosen_spanish: lea esta escritura
  alternatives_spanish:
  - lea este escrito
  - lea esta inscripción
  lexicon: HALOT
  rationale: «Escritura» reproduce el término amplio para el mensaje escrito y preserva la solemnidad del relato; «escrito» o «inscripción» serían posibles, pero menos fieles al eco bíblico.
- source_word: וּפִשְׁרֵהּ יְחַוִּנַּנִי
  english_pob_choice: and makes its interpretation known to me
  chosen_spanish: y me haga conocer su interpretación
  alternatives_spanish:
  - y me declare su interpretación
  - y me explique su significado
  lexicon: HALOT
  rationale: El arameo combina «interpretación» con un verbo de hacer saber. «Me haga conocer» preserva esa estructura sin perder claridad en español.
- source_word: אַרְגְּוָנָא יִלְבַּשׁ
  english_pob_choice: shall be clothed with purple
  chosen_spanish: será vestido de púrpura
  alternatives_spanish:
  - llevará púrpura
  - será revestido de púrpura
  lexicon: HALOT
  rationale: La púrpura simboliza honor real. «Vestido de púrpura» sigue de cerca el pasivo arameo y mantiene el tono ceremonial.
- source_word: ו/המונכא די דהבא על צוארהּ
  english_pob_choice: have a chain of gold around his neck
  chosen_spanish: llevará una cadena de oro alrededor de su cuello
  alternatives_spanish:
  - tendrá un collar de oro en el cuello
  - llevará un collar de oro
  lexicon: HALOT
  rationale: Se opta por una expresión natural en español que conserva el objeto ornamental de honor y evita ambigüedad moderna sobre «cadena» como castigo.
- source_word: וְ/תַלְתִּי בְ/מַלְכוּתָא יִשְׁלַט
  english_pob_choice: and rule as third in the kingdom
  chosen_spanish: y ejercerá el tercer puesto en el reino[c]
  alternatives_spanish:
  - y gobernará como tercero en el reino
  - y será el tercer gobernante del reino
  lexicon: HALOT
  rationale: La frase apunta a rango/autoridad como tercero, no solo a una posición numérica. «Ejercerá el tercer puesto» conserva la idea de rango sin sobreinterpretar un cargo exacto.
theological_decisions:
- issue: Título y función de los 'caldeos'
  english_pob_reading: The term can denote a class of Babylonian court sages rather than the ethnic group alone.
  chosen_spanish_reading: «los caldeos» como designación técnica de corte, sin forzar una lectura exclusivamente étnica o exclusivamente profesional.
  alternative_spanish_readings:
  - «los astrólogos»
  - «los sabios caldeos»
  rationale: La evidencia léxica en Daniel permite ambas posibilidades. Se mantiene el término tradicional del texto y se deja abierta la ambigüedad histórica/funcional documentada por la edición inglesa.
  doctrine_reference: Principios de traducción responsable; no es un punto doctrinal propiamente dicho.
- issue: 'Rango prometido: ''tercero en el reino'''
  english_pob_reading: The Aramaic likely refers to rank as third in authority.
  chosen_spanish_reading: «ejercerá el tercer puesto en el reino» como expresión de rango o autoridad tercera.
  alternative_spanish_readings:
  - «será el tercero en autoridad del reino»
  - «gobernará como tercero en el reino»
  rationale: El arameo probablemente señala jerarquía, no mera numeración ceremonial. La formulación española mantiene esa tensión sin cerrar indebidamente el sentido.
  doctrine_reference: Principios de exégesis textual; no es un punto doctrinal.
translation_notes:
  revision_awareness: La edición inglesa reciente mantiene el mismo sentido y no introduce cambios textuales relevantes; solo ajusta matices de presentación entre «have a chain of gold around his neck» y la variante de rango. No hay revisiones aplicadas al español más allá de preservar esa misma ambigüedad controlada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aparece en el versículo.
  - 'Se conserva la distinción de especialistas de corte: «encantadores», «caldeos», «adivinos», «sabios».'
  - Se evita modernizar «escritura» a «inscripción» para no perder el eco del relato y la correspondencia con la fuente aramea.
