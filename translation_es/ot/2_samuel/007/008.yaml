revisions:
- from: 'Ahora, pues[a], así dirás a mi esclavo David: Así dice Yahvé de los ejércitos: Yo te tomé del pastizal, de detrás del rebaño[b], para que fueras gobernante sobre mi pueblo Israel.'
  to: 'Ahora, pues, así dirás a mi siervo David: Así dice Yahvé de los ejércitos: Yo te tomé del pastizal[a], de seguir al rebaño, para ser gobernante sobre mi pueblo Israel.[b]'
  rationale: Se reemplaza «esclavo» por «siervo» para seguir la decisión lexical y teológica documentada para עבד en referencia a David. Se reubica la nota sobre הַנָּוֶה al término correspondiente («pastizal») y se añade la alternativa preservada por el POB para נָגִיד. También se mejora la naturalidad de «de seguir al rebaño» y se simplifica «para ser» para reflejar mejor el infinitivo hebreo.
