  to: 'Entonces Elías le dijo: «Por favor, quédate aquí, porque Yahvé me ha enviado al Jordán[a]». Pero él respondió: «Tan cierto como que Yahvé vive, y como que tú mismo vives[b], no te dejaré». Así que los dos siguieron adelante.'
  rationale: Se corrige la nota [a] para que refleje una alternativa real documentada por el POB. Se reemplaza la fórmula juratoria por una construcción española natural y solemne que preserva el sentido del hebreo y de la auditoría inglesa, evitando la expresión poco idiomática «vive tu propia vida». También se mejora el cierre narrativo para un español más fluido sin pérdida semántica.
