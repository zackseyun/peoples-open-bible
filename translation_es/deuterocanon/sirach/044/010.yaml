translation:
  language: es
  text: Como si no hubieran existido[a], dejaron de existir, y sus hijos después de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado para esta línea es difícil y parece desalineado aquí; más literalmente, diría algo como: «Como si no hubieran sido, fueron, y sus hijos después de ellos». El expediente inglés principal sigue en cambio el paralelo griego, que ofrece una lectura coherente para este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: כאשר לא היו היו / ἀλλʼ ἢ
  english_pob_choice: As though they had not existed
  chosen_spanish: Como si no hubieran existido
  alternatives_spanish:
  - Más bien, ellos
  - Como si no hubieran sido
  lexicon: HALOT / LSJ
  rationale: El hebreo transmitido en esta ubicación es difícil y parece desalineado con el versículo; el griego paralelo ofrece un inicio coherente de comparación. En español, 'Como si no hubieran existido' reproduce con naturalidad el valor comparativo y mantiene la cautela textual indicada por la tradición auditada.
- source_word: היו
  english_pob_choice: had existed
  chosen_spanish: hubieran existido
  alternatives_spanish:
  - hubieran sido
  - hubieran estado
  lexicon: HALOT
  rationale: '''Existir'' comunica bien el sentido de presencia o ser en español moderno y evita una traducción demasiado mecánica de la raíz verbal.'
- source_word: ובניהם מאחריהם / καὶ οἱ υἱοὶ αὐτῶν μετʼ αὐτούς
  english_pob_choice: and their children after them
  chosen_spanish: y sus hijos después de ellos
  alternatives_spanish:
  - y sus hijos tras ellos
  - y sus descendientes después de ellos
  lexicon: HALOT / BDAG
  rationale: '''Hijos'' conserva la forma concreta del texto; ''después de ellos'' refleja la secuencia temporal y generacional sin añadir explicación interpretativa.'
- source_word: ἐπελήσθησαν
  english_pob_choice: were not forgotten
  chosen_spanish: dejaron de existir
  alternatives_spanish:
  - no fueron olvidados
  - no pasaron al olvido
  lexicon: BDAG / LSJ
  rationale: Aquí sigo la revisión hebrea auditada, que reubica la línea lejos del paralelo griego de 'obras de justicia'. La formulación española conserva el tono de extinción o desaparición que el hebreo permite en esta posición del texto, sin importar material de otro versículo.
theological_decisions:
- issue: Tensión entre el hebreo conservado y el paralelo griego en la ubicación del verso
  english_pob_reading: Translate from the coherent Greek parallel while acknowledging the Hebrew line in Zone 1 is uncertain/mismatched for this location.
  chosen_spanish_reading: Traducir la línea conforme al hebreo disponible y reconocer implícitamente su carácter difícil mediante una redacción sobria, sin importar el contenido del paralelo griego.
  alternative_spanish_readings:
  - 'Traducir según el griego: ''Pero estos eran hombres de misericordia, cuyas justicias no fueron olvidadas'''
  - Hacer una nota extensa sobre la discrepancia textual
  rationale: La validación del pasaje indica una desalineación menor y la revisión reciente corrigió el texto de base hacia el hebreo. En un registro de publicación, la solución más fiel es reflejar el hebreo transmitido y no trasladar al texto principal una lectura del griego que pertenece a otra tradición textual de este punto.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando éste se conserva; usar el griego paralelo como control, pero no desplazar el texto base sin necesidad textual clara.'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una traducción que seguía el paralelo griego ('But these were men of mercy...') a otra que refleja el hebreo conservado ('As though they had not existed...'). Esta propuesta española sigue la última revisión y evita importar el contenido del griego como texto principal.
  spanish_consistency_notes:
  - Se usa 'existido' para mantener un español natural y sobrio, coherente con la revisión hebrea.
  - '''Hijos'' se conserva sin ampliar a ''descendientes'' para no interpretar más de lo que dice la forma recibida.'
  - Se evita 'misericordia' / 'justicia' en el cuerpo porque pertenecen al paralelo griego auditado, no al texto base adoptado en la revisión final.
