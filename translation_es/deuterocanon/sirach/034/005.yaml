translation:
  language: es
  text: Las adivinaciones y los presagios[b] y los sueños son vacíos, y el corazón imagina como una mujer en trabajo de parto.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea extante suministrada para este versículo dice: «Con buen ojo da al pobre, y no te irrites al darle», lo que parece reflejar un versículo distinto o un testigo desajustado. El texto griego proporciona la lectura traducida aquí.'
    reason: textual_variant
  - marker: b
    text: O «augurios». El término griego se refiere a interpretar señales como presagios.
    reason: lexical_alternative
lexical_decisions:
- source_word: בעין טובה
  english_pob_choice: With a good eye
  chosen_spanish: Con ojo bueno
  alternatives_spanish:
  - Con mirada generosa
  - Con buen ojo
  lexicon: uso semítico de «ojo» como disposición interior / benevolencia
  rationale: Mantiene la metáfora del «ojo» como actitud favorable y evita sustituirla por una paráfrasis explicativa demasiado amplia. «Con ojo bueno» resulta inteligible en español bíblico moderno, aunque «con mirada generosa» sería más idiomático.
- source_word: תן
  english_pob_choice: give
  chosen_spanish: da
  alternatives_spanish:
  - da a
  - entrega
  lexicon: verbo básico de dar
  rationale: «Da» es el equivalente natural y directo en español para el imperativo de dar.
- source_word: לדל
  english_pob_choice: to the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al necesitado
  - al indigente
  lexicon: דל = pobre, necesitado
  rationale: «Pobre» reproduce el sustantivo concreto del hebreo y conserva el paralelo estilístico con el dicho sapiencial.
- source_word: ולא תקצף
  english_pob_choice: do not be resentful / do not be resentful when you give to him
  chosen_spanish: y no te enojes
  alternatives_spanish:
  - y no te irrites
  - y no te resientas
  lexicon: קצף = enojarse/irritarse
  rationale: El hebreo expresa una reacción interna negativa al dar; «no te enojes» es la forma más natural en español, aunque «no te resientas» preservaría mejor la idea de molestia interior ligada al acto de dar.
- source_word: בתתך לו
  english_pob_choice: when you give to him
  chosen_spanish: cuando se lo des
  alternatives_spanish:
  - cuando le des a él
  - al dárselo
  lexicon: construction with infinitive + suffix
  rationale: La construcción española «cuando se lo des» comunica de modo claro la acción de dar al pobre y evita la pesadez de un calco sintáctico.
