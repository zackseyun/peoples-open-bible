translation:
  language: es
  text: 'Pero les dijo[a]: «El fuego que tienen contra mí no es tan abrasador como para hacerme un cobarde»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacerme actuar como un cobarde»; o, más literalmente, «hacerme poco hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ αὐτοῖς ἔφη
  english_pob_choice: But he said to them
  chosen_spanish: Pero les dijo
  alternatives_spanish:
  - Y les dijo
  - Entonces les dijo
  lexicon: LSJ
  rationale: δέ expresa continuidad con leve contraste; «pero» mantiene ese giro discursivo natural en español. El dativo αὐτοῖς se vierte con «les» para una referencia directa y fluida.
- source_word: Οὐχ οὕτω καυστικώτερον
  english_pob_choice: not so scorching
  chosen_spanish: no es tan ardiente
  alternatives_spanish:
  - no es tan abrasador
  - no es tan candente
  - no es tan quemante
  lexicon: LSJ
  rationale: καυστικώτερον intensifica la imagen de calor o quemadura. «Ardiente» conserva la metáfora térmica sin sonar forzado en español y permite la construcción de grado/resulta «tan ... como para».
- source_word: ἔχετε ... κατʼ ἐμοῦ τὸ πῦρ
  english_pob_choice: the fire you have against me
  chosen_spanish: El fuego que tienen contra mí
  alternatives_spanish:
  - El fuego que tienen sobre mí
  - El fuego dirigido contra mí
  - El fuego que llevan contra mí
  lexicon: LSJ
  rationale: Se mantiene «fuego» como imagen concreta y κατʼ ἐμοῦ como oposición hostil con «contra mí». «Que tienen» conserva el verbo posesivo/activa del griego y evita explicar más de lo que el texto dice.
- source_word: δειλανδρῆσαι
  english_pob_choice: make me a coward
  chosen_spanish: hacerme un cobarde
  alternatives_spanish:
  - hacerme cobarde
  - volverme un cobarde
  - hacerme actuar como un cobarde
  lexicon: LSJ
  rationale: El verbo tiene el sentido de volver cobarde o afeminar en valor, pero el contexto es la firmeza ante el martirio. «Hacerme un cobarde» refleja bien el predicado personal que la revisión inglesa destacó y evita una formulación demasiado técnica o marcadamente sexualizada.
- source_word: οὐχ οὕτω ... ὥστε
  english_pob_choice: not so ... as to
  chosen_spanish: no es tan ... como para
  alternatives_spanish:
  - no es tal que pueda
  - no es tan ... que llegue a
  lexicon: LSJ
  rationale: La construcción de grado y resultado se expresa de forma idiomática en español con «tan ... como para», conservando tanto la comparación como el resultado potencial negado.
theological_decisions:
- issue: Sentido de δειλανδρῆσαι entre cobardía y una alusión etimológica a «hacerlo unmanly»
  english_pob_reading: make me a coward
  chosen_spanish_reading: hacerme un cobarde
  alternative_spanish_readings:
  - hacerme cobarde
  - volverme cobarde
  - hacerme actuar como un cobarde
  rationale: El pasaje subraya valentía moral bajo tortura, no una afirmación doctrinal sobre la masculinidad. En español, «un cobarde» transmite mejor la caracterización ética que el giro etimológico «afeminado» o «sin hombría», que podría desviar el sentido principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy; claridad semántica y fidelidad al foco narrativo
translation_notes:
  revision_awareness: La traducción sigue la última revisión inglesa, que prefirió «make me a coward» sobre «make me cowardly». En español se refleja con un predicado nominal natural («un cobarde») para conservar esa precisión sin perder fluidez.
  spanish_consistency_notes:
  - Se mantiene «fuego» para respetar la imagen concreta y la hostilidad implícita de κατʼ ἐμοῦ.
  - 'Se evita «siervo» u otra domesticación terminológica: el versículo no contiene léxico de servidumbre.'
  - «Ardiente» conserva el valor comparativo de καυστικώτερον sin sobretraducir a intensidad abstracta.
  - La nota explica la alternativa etimológica sin imponerla en el texto principal.
