base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/002/024.yaml
  text: And we did not listen to your voice to serve the king of Babylon[a], and you have fulfilled your words that you spoke by the hands of your servants the prophets[c][b], that the bones of our kings and the bones of our fathers would be brought out from their place.
  footnotes:
  - marker: a
    text: Or, 'did not obey your voice.' The Greek idiom literally speaks of not hearing/listening to God's voice, with obedience implied by context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by the hands of your servants the prophets,' an idiom meaning 'through your servants the prophets.'
    reason: lexical_alternative
  - marker: c
    text: That is, from their burial place; the Greek says only 'from their place.'
    reason: cultural_note
