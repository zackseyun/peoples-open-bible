translation:
  language: es
  text: ¿Llevará un hombre fuego en su seno, y su ropa no se quemará?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su regazo» o «contra su pecho»; el hebreo se refiere al área del seno o regazo, probablemente incluyendo el pliegue de la prenda donde algo podría sostenerse junto al cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְתֶּה
  english_pob_choice: carry
  chosen_spanish: tomará
  alternatives_spanish:
  - cogerá
  - llevará
  - sacará
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de tomar/recoger fuego para tenerlo cerca; en español, «tomará» transmite la acción de manera natural y mantiene la imagen peligrosa de sostener fuego junto al cuerpo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino de forma genérica en un dicho sapiencial. «Un hombre» conserva esa precisión gramatical y el tono proverbial.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llamas
  lexicon: HALOT
  rationale: Equivalente directo y natural en español; mantiene la fuerza concreta de la imagen.
- source_word: בְּחֵיקוֹ
  english_pob_choice: in his bosom
  chosen_spanish: en su seno
  alternatives_spanish:
  - en su regazo
  - contra su pecho
  - en el pliegue de su ropa
  lexicon: HALOT
  rationale: חֵיק designa el seno/bosom o regazo, la zona cercana al pecho donde se guarda algo junto al cuerpo. «En su seno» conserva la proximidad e intimidad de la imagen sin sonar forzado en español.
- source_word: וּבְגָדָיו
  english_pob_choice: and his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestidos» comunica el conjunto de la ropa y preserva un registro bíblico claro en español; además permite mantener la correspondencia con el plural hebreo sin volver la frase demasiado moderna o coloquial.
- source_word: לֹא תִשָּׂרַפְנָה
  english_pob_choice: not be burned
  chosen_spanish: no se quemarán
  alternatives_spanish:
  - no arderán
  - no serán quemados
  lexicon: HALOT
  rationale: 'La forma nifal expresa pasividad/resultativo: la ropa sufriría la quema. «No se quemarán» refleja bien esa voz en español y suena más natural que una pasiva más pesada.'
translation_notes:
  revision_awareness: El texto coincide con el sentido y la imagen del hebreo, y sigue de cerca la decisión auditada en inglés de conservar el sujeto genérico masculino y la metáfora corporal del «bosom/lap», expresándolos en español con naturalidad.
  spanish_consistency_notes:
  - Se conservó el sujeto genérico masculino «un hombre» por fidelidad al hebreo sapiencial.
  - Se eligió «seno» como término base y se añadió nota para las alternativas contextuales «regazo» y «contra su pecho».
  - «Vestidos» mantiene un registro bíblico sobrio y corresponde al plural hebreo de prendas.
  - La pasiva hebrea se refleja con la construcción pronominal española «se quemarán».
