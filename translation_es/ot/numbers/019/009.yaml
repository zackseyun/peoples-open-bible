translation:
  language: es
  text: Entonces un hombre limpio recogerá las cenizas de la becerra y las pondrá fuera del campamento, en un lugar limpio; y quedarán guardadas para la congregación de los hijos de Israel, para agua de impureza[a]; es una ofrenda por el pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «para agua de purificación» o «para agua para impureza».
    reason: lexical_alternative
  - marker: b
    text: 'O: «es una ofrenda de purificación». El hebreo חַטָּאת puede denotar una ofrenda por el pecado y, en contextos sacerdotales, una ofrenda para purificación.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ טָהוֹר
  english_pob_choice: a clean man
  chosen_spanish: un hombre limpio
  alternatives_spanish:
  - un hombre ceremonialmente limpio
  - un hombre puro
  lexicon: HALOT
  rationale: שִׁׂימַר el sustantivo singular אִישׁ como «un hombre» y טָהוֹר como «limpio» para conservar la simplicidad del mandato. En este contexto ritual, la limpieza es ceremonial, pero el matiz queda suficientemente definido por el pasaje.
- source_word: אָסַף
  english_pob_choice: shall gather
  chosen_spanish: recogerá
  alternatives_spanish:
  - reunirá
  - juntará
  lexicon: HALOT
  rationale: El verbo expresa reunir o recoger; «recogerá» es natural en español y comunica la acción concreta de tomar las cenizas para su custodia ritual.
- source_word: אֵפֶר הַפָּרָה
  english_pob_choice: the ashes of the heifer
  chosen_spanish: las cenizas de la becerra
  alternatives_spanish:
  - las cenizas de la novilla
  - las cenizas de la vaca
  lexicon: HALOT
  rationale: אֵפֶר se vierte con «cenizas». פָּרָה designa una res hembra; en español bíblico «becerra» comunica mejor la referencia sacrificial específica que «vaca».
- source_word: וְהִנִּיחַ
  english_pob_choice: and place
  chosen_spanish: y las pondrá
  alternatives_spanish:
  - y las depositará
  - y las colocará
  lexicon: HALOT
  rationale: «Pondrá» refleja bien el acto de colocar/dejar en un sitio determinado. Se mantiene el objeto pronominal «las» para conectar con «las cenizas».
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - más allá del campamento
  lexicon: HALOT
  rationale: La locución es locativa e idiomática; «fuera del campamento» es la forma más clara y estable en español bíblico contemporáneo.
- source_word: בְּמָקוֹם טָהוֹר
  english_pob_choice: in a clean place
  chosen_spanish: en un lugar limpio
  alternatives_spanish:
  - en un lugar ceremonialmente limpio
  - en un lugar puro
  lexicon: HALOT
  rationale: Se conserva la repetición de טָהוֹר con «limpio»; el sentido ritual se entiende por el contexto sin necesidad de tecnicismo excesivo en el texto principal.
- source_word: וְהָיְתָה
  english_pob_choice: and they shall be kept
  chosen_spanish: y quedarán guardadas
  alternatives_spanish:
  - y serán guardadas
  - y permanecerán
  lexicon: HALOT
  rationale: La forma verbal hebrea apunta al estado de custodia de las cenizas. En español, «quedarán guardadas» comunica bien el resultado duradero y evita una traducción demasiado literal de la construcción nominal siguiente.
- source_word: לַעֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for the congregation of the sons of Israel
  chosen_spanish: para la congregación de los hijos de Israel
  alternatives_spanish:
  - para la asamblea de los israelitas
  - para la congregación del pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva «congregación» por su valor técnico en contextos legales del Pentateuco y «hijos de Israel» como eco formal del hebreo.
- source_word: לְמִשְׁמֶרֶת
  english_pob_choice: be kept
  chosen_spanish: guardadas
  alternatives_spanish:
  - en custodia
  - para resguardo
  lexicon: HALOT
  rationale: El sustantivo indica algo puesto bajo guarda o custodia. «Guardadas» integra esa idea con fluidez en español y se coordina con el verbo de estado anterior.
- source_word: לְמֵי נִדָּה
  english_pob_choice: for water for impurity
  chosen_spanish: para agua para impureza
  alternatives_spanish:
  - para agua de impureza
  - para agua de purificación
  lexicon: HALOT
  rationale: Se mantiene de cerca la estructura formal «agua para impureza» para no borrar la tensión lexical del hebreo. La nota preserva la alternativa más idiomática «agua para purificación».
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  - sacrificio por el pecado
  lexicon: HALOT
  rationale: חַטָּאת puede significar «ofrenda por el pecado» y también una ofrenda de purificación. Se adopta una fórmula clara y reconocible en español, sin resolver de modo artificial la doble carga del término.
theological_decisions:
- issue: Valor de חַטָּאת en un rito de purificación
  english_pob_reading: it is a sin offering
  chosen_spanish_reading: es una ofrenda por el pecado
  alternative_spanish_readings:
  - es una ofrenda de purificación
  - es una ofrenda por el pecado / una ofrenda de purificación
  rationale: El término hebreo conserva una tensión real entre sacrificio por el pecado y función purificadora. El texto principal mantiene la forma tradicional y lexicalmente sólida; la nota recoge la posibilidad de «ofrenda de purificación» para no borrar el matiz ritual del capítulo.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el cotejo más reciente indicó alta concordancia y ningún cambio necesario.
  spanish_consistency_notes:
  - Se mantiene Yahvé implícito solo donde el versículo no lo contiene; no se introduce una sustitución ajena al texto.
  - Se conserva «congregación» y «hijos de Israel» para reflejar el lenguaje técnico del Pentateuco.
  - «Limpio» y «impureza» se usan de modo ritual, no moral, por contexto.
  - Se evita suavizar la tensión de חַטָּאת con un único equivalente interpretativo en el texto principal.
