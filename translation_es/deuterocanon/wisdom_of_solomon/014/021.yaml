translation:
  language: es
  text: Y esto se convirtió en una emboscada contra la vida[a], porque hombres, esclavizados por calamidad o por tiranía, atribuyeron el nombre incomunicable a piedras y madera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el nombre no compartido»; es decir, el nombre divino o el honor divino que no debe atribuirse a los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνεδρον
  english_pob_choice: ambush
  chosen_spanish: emboscada
  alternatives_spanish:
  - trampa
  - celada
  lexicon: LSJ
  rationale: «Emboscada» conserva la imagen de acecho y peligro contra la vida, y en español es natural en este contexto de amenaza activa; «trampa» o «celada» son posibles, pero menos directas o menos claras para el lector general.
- source_word: τῷ βίῳ
  english_pob_choice: against life
  chosen_spanish: contra la vida
  alternatives_spanish:
  - para la vida
  - contra la existencia humana
  - para vivir
  lexicon: LSJ
  rationale: La construcción comunica dirección hostil. «Contra la vida» reproduce esa fuerza sin volverla abstracta ni suavizar el impacto del griego.
- source_word: συμφορᾷ
  english_pob_choice: calamity
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - desastre
  lexicon: LSJ
  rationale: «Calamidad» mantiene el registro elevado de Sabiduría y refleja bien una desgracia grave o adversidad fuerte.
- source_word: τυραννίδι
  english_pob_choice: tyranny
  chosen_spanish: tiranía
  alternatives_spanish:
  - despotismo
  - opresión
  lexicon: LSJ
  rationale: «Tiranía» es el equivalente directo y más idiomático en español para un dominio opresivo o arbitrario.
- source_word: δουλεύσαντες
  english_pob_choice: enslaved
  chosen_spanish: esclavizados
  alternatives_spanish:
  - sometidos
  - en esclavitud
  - sirviendo
  lexicon: BDAG
  rationale: El participio expresa quedar bajo servidumbre o esclavitud. «Esclavizados» conserva la coerción del término mejor que «sirviendo», que debilitaría la fuerza del texto.
- source_word: τὸ ἀκοινώνητον ὄνομα
  english_pob_choice: the incommunicable name
  chosen_spanish: el nombre incommunicable
  alternatives_spanish:
  - el nombre no compartido
  - el nombre incomunicable
  - el nombre que no debe compartirse
  lexicon: LSJ
  rationale: Se conserva el matiz teológico de exclusividad del nombre divino. «Incommunicable» es más formal, pero refleja con precisión la idea de algo que no debe comunicarse ni atribuirse a otros.
- source_word: λίθοις καὶ ξύλοις
  english_pob_choice: on stones and wood
  chosen_spanish: a piedras y madera
  alternatives_spanish:
  - sobre piedras y madera
  - a piedra y madera
  - a imágenes de piedra y de madera
  lexicon: LSJ
  rationale: El dativo con περιέθεσαν permite la idea de atribuir o poner sobre. «A piedras y madera» mantiene la sobriedad del griego y evita añadir «imágenes», que no está explícito en el texto.
- source_word: περιέθεσαν
  english_pob_choice: bestowed
  chosen_spanish: atribuyeron
  alternatives_spanish:
  - asignaron
  - concedieron
  - confirieron
  lexicon: LSJ
  rationale: Aquí el verbo expresa el acto de poner o conferir un nombre a algo. «Atribuyeron» transmite con claridad la idea de adjudicar indebidamente el nombre divino a ídolos.
theological_decisions:
- issue: Traducción de τὸ ἀκοινώνητον ὄνομα en contexto antiidolátrico
  english_pob_reading: the incommunicable name
  chosen_spanish_reading: el nombre incommunicable
  alternative_spanish_readings:
  - el nombre no compartido
  - el nombre que no debe compartirse
  rationale: 'Se preserva la tensión teológica del original: el nombre pertenece de modo exclusivo a Dios y no debe transferirse a piedras y madera. «Incommunicable» mantiene la solemnidad y la exclusividad sin expandir el texto en una paráfrasis doctrinal.'
  doctrine_reference: Preservar la exclusividad del nombre divino y la denuncia de la idolatría sin resolver la ambigüedad por tradición eclesiástica.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en los núcleos léxicos principales: ἔνεδρον como amenaza activa, τῷ βίῳ como dirección hostil, δουλεύσαντες como esclavitud, y τὸ ἀκοινώνητον ὄνομα como exclusividad teológica. Se evitó suavizar el antiidolatrismo y se mantuvo el registro elevado del libro.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma predeterminada en el proyecto, pero este versículo no contiene el tetragrámaton.
  - «Esclavizados» conserva la fuerza de δουλεύσαντες sin introducir una traducción eclesiástica más débil.
  - «Piedras y madera» sigue de cerca el griego sin añadir «imágenes», aunque la nota aclara el sentido idolátrico implícito.
