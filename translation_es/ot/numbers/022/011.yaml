revisions:
- from: ¡Mira![a] El pueblo que salió de Egipto ha cubierto la faz de la tierra. Ahora, ven; maldícemelo. Quizá pueda combatir contra él y expulsarlo.
  to: ¡Mira[a], el pueblo que salió de Egipto ha cubierto la faz de la tierra! Ahora, ven; maldícelos por mí. Quizá pueda combatir contra ellos y expulsarlos.
  rationale: Se ajustan los pronombres al plural semántico exigido por el referente colectivo y ya documentado en el rastro del POB, se reemplaza la forma poco idiomática 'maldícemelo' por una construcción natural y fiel ('maldícelos por mí'), y se mejora la puntuación/anclaje de la nota sin alterar el sentido del original. 'La faz de la tierra' se mantiene por fidelidad idiomática al hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:59:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: deíctico inicial, identificación del pueblo salido de Egipto, cobertura de la faz/superficie de la tierra, petición urgente de maldecir, y finalidad militar de combatir y expulsar. Sin embargo, se aparta del rastro auditado del POB y de la naturalidad española al mantener pronombres singulares (''maldícemelo'', ''contra él'', ''expulsarlo'') donde el inglés POB justificó explícitamente el plural semántico para el referente colectivo. En español, esos singulares suenan más forzados y menos claros que en hebreo.'
  spanish_quality_summary: '''¡Mira!'' y ''la faz de la tierra'' son aceptables y legibles. El principal problema de calidad está en ''maldícemelo'', que resulta poco natural y algo enredado en español bíblico moderno; ''maldícelo por mí/para mí'' tampoco sería ideal con referente colectivo. La solución más clara y digna es ''maldícelos por mí'' junto con ''combatir contra ellos y expulsarlos''. También conviene bajar la mayúscula tras el signo de exclamación inicial: ''¡Mira[a], el pueblo...'' para una puntuación española más fluida.'
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. La decisión clave es semántico-gramatical: aunque הָעָם es singular colectivo, en español conviene seguir la práctica del POB auditado usando pronombres plurales para el referente colectivo en las acciones posteriores. La nota sobre ''el ojo de la tierra'' está bien encaminada y debe conservarse con anclaje correcto.'
  issues:
  - severity: medium
    issue: Pronombres singulares para referente colectivo donde el POB auditado usa plural semántico
    rationale: '''lo / él / expulsarlo'' refleja la forma gramatical hebrea, pero en español suena menos natural y menos claro. El inglés POB documentó correctamente ''them'' por exigencia idiomática; el español debe hacer lo mismo: ''maldícelos... contra ellos... expulsarlos''.'
  - severity: medium
    issue: '''maldícemelo'' es una forma poco natural y pesada'
    rationale: Aunque intenta integrar el dativo de ventaja, el resultado suena trabado y puede confundir el objeto y el beneficiario. 'Maldícelos por mí' conserva el sentido de לִי con mayor claridad y mejor lectura.
  - severity: low
    issue: Capitalización y colocación del ancla de nota al inicio
    rationale: '''¡Mira![a] El pueblo...'' interrumpe la fluidez. En español es más natural ''¡Mira[a], el pueblo...''. La mayúscula en ''El'' después del signo no es necesaria al continuar la misma oración.'
  revised_spanish_text: ¡Mira[a], el pueblo que salió de Egipto ha cubierto la faz de la tierra! Ahora, ven; maldícelos por mí. Quizá pueda combatir contra ellos y expulsarlos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «ha cubierto el ojo de la tierra», un modismo para la superficie visible o la faz de la tierra.'
    reason: lexical_alternative
  revision_rationale: Se ajustan los pronombres al plural semántico exigido por el referente colectivo y ya documentado en el rastro del POB, se reemplaza la forma poco idiomática 'maldícemelo' por una construcción natural y fiel ('maldícelos por mí'), y se mejora la puntuación/anclaje de la nota sin alterar el sentido del original. 'La faz de la tierra' se mantiene por fidelidad idiomática al hebreo.
