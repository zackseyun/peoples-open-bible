base_translation:
  language: en
  yaml_path: translation/ot/isaiah/034/006.yaml
  text: The sword of Yahweh is filled with blood[a]; it is made fat with fat, with the blood of lambs and goats, with the fat of the kidneys of rams. For Yahweh has a sacrifice in Bozrah[b], and a great slaughter in the land of Edom.
  footnotes:
  - marker: a
    text: Or 'for the LORD there is a sacrifice in Bozrah.' The Hebrew clause is verbless and can be construed either way.
    reason: alternative_reading
  - marker: b
    text: '''Goats'' translates a term more specifically meaning ''male goats.'''
    reason: lexical_alternative
