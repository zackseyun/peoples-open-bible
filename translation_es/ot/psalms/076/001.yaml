translation:
  language: es
  text: Al director del coro[a]; con instrumentos de cuerda.[b] Salmo de Asaf, un canto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Al director del coro» refleja el sentido funcional del hebreo: el encargado de la interpretación musical. También podría entenderse como «para el director» o «al jefe musical».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Al director del coro: con instrumentos de cuerda».'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director
  - Al jefe musical
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, el término señala a la persona a cargo de la ejecución musical. «Director del coro» comunica con naturalidad esa función en español, conservando el sentido litúrgico-musical sin reducirlo a una mera idea de autoridad genérica.
- source_word: בִּנְגִינֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - con cuerda
  - sobre instrumentos de cuerda
  - con música de cuerda
  lexicon: HALOT
  rationale: El sustantivo apunta a instrumentos o música de cuerda. «Con instrumentos de cuerda» es claro y natural en español, y mantiene el matiz instrumental sin añadir detalles no presentes en el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Salmo cantado
  lexicon: HALOT
  rationale: Funciona aquí como rótulo de género en el superscrito. En español, la forma breve «Salmo» comunica mejor el encabezamiento y conserva el carácter técnico del término.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - de Asaf, posiblemente vinculado a Asaf
  lexicon: HALOT
  rationale: La preposición puede indicar autoría, asociación o dedicación. «De Asaf» preserva esa ambigüedad de manera concisa, como hace el inglés POB con «of Asaph».
- source_word: שִׁיר
  english_pob_choice: a song
  chosen_spanish: canto
  alternatives_spanish:
  - un canto
  - una canción
  lexicon: HALOT
  rationale: En paralelo con «Salmo», el hebreo añade otro rótulo de género. «Canto» suena más apropiado y reverente en español bíblico que «canción», y conserva la idea de composición cantada sin sobretraducir.
theological_decisions:
- issue: Ambigüedad de לְאָסָף respecto de autoría, asociación o dedicación
  english_pob_reading: The phrase 'of Asaph' may indicate authorship, association with the Asaphite guild, or dedication to Asaph rather than strictly personal authorship.
  chosen_spanish_reading: «de Asaf» mantiene abierta la relación exacta, sin resolverla solo como autoría personal.
  alternative_spanish_readings:
  - «para Asaf»
  - «perteneciente a Asaf»
  - «de Asaf, probablemente de la guilda asafita»
  rationale: El hebreo y el audit trail inglés señalan una ambigüedad real. La traducción no debe cerrarla artificialmente; por eso se conserva una formulación breve que permita las tres posibilidades documentadas.
  doctrine_reference: Principios de traducción responsable; no implica una doctrina específica, sino fidelidad a la ambigüedad textual.
translation_notes:
  revision_awareness: El texto hebreo es un superscrito breve y el inglés POB ya mostró una revisión menor de puntuación, pasando de dos puntos a punto y coma para no convertir la segunda frase en explicación de la primera. La versión española sigue esa estructura paralela con punto y coma, manteniendo dos indicaciones litúrgicas separadas.
  spanish_consistency_notes:
  - Se conserva «Asaf» con la forma española usual del nombre propio.
  - «Salmo» y «canto» se presentan como rótulos genéricos, no como una frase fluida, para respetar la forma del superscrito.
  - La puntuación con punto y coma preserva la relación coordinada entre las dos instrucciones musicales.
