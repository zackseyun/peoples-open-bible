translation:
  language: es
  text: Ha subido al templo[a], y Dibón ha subido a los lugares altos, para llorar. Sobre Nebo y sobre Medeba, Moab gime; sobre toda cabeza hay calvicie[b], toda barba está cortada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ha subido a la casa, y Dibón a los lugares altos, para llorar». El hebreo «la casa» puede entenderse más literalmente, pero en este contexto probablemente se refiere a un santuario o templo.'
    reason: lexical_alternative
  - marker: b
    text: «Calvicie» y la barba cortada son señales de duelo.
    reason: cultural_note
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: has gone up
  chosen_spanish: ha subido
  alternatives_spanish:
  - subió
  - ha ido hacia arriba
  lexicon: HALOT
  rationale: El perfecto hebreo narra una acción ya realizada; en español, el pretérito perfecto compuesto 'ha subido' conserva bien ese valor de acción completada con vividez contextual.
- source_word: הַבַּיִת
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - la casa
  - la casa de culto
  lexicon: HALOT
  rationale: Aunque literalmente es 'la casa', el contexto cultual y el paralelo con 'los lugares altos' favorecen un santuario/templo. 'Templo' comunica esa referencia sin ocultar la tensión lexical.
- source_word: וְדִיבֹן
  english_pob_choice: and Dibon
  chosen_spanish: y Dibón
  alternatives_spanish:
  - y a Dibón
  lexicon: HALOT
  rationale: Nombre propio transliterado. Mantengo la coordinación simple del hebreo; la preposición de movimiento queda implícita por el verbo anterior, como en la lectura de la POB inglesa.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - las alturas
  - los santuarios altos
  lexicon: HALOT
  rationale: '''High places'' en español bíblico puede sonar demasiado técnico o arcaizante; ''lugares altos'' preserva el referente cultual sin cerrar del todo la imagen topográfica.'
- source_word: לְבֶכִי
  english_pob_choice: to weep
  chosen_spanish: para llorar
  alternatives_spanish:
  - para llorar en duelo
  - a llorar
  lexicon: HALOT
  rationale: El ל de propósito/resulto se rinde naturalmente con 'para'. 'Llorar' expresa la acción sin añadir un matiz no explicitado por el sustantivo hebreo.
- source_word: נְבוֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  alternatives_spanish:
  - Nebo
  lexicon: HALOT
  rationale: Nombre propio de lugar, conservado por transliteración estándar.
- source_word: מֵידְבָא
  english_pob_choice: Medeba
  chosen_spanish: Medeba
  alternatives_spanish:
  - Medebá
  lexicon: HALOT
  rationale: Nombre propio de lugar. Opto por la forma establecida 'Medeba' para claridad y reconocimiento internacional; 'Medebá' sería una adaptación gráfica posible, pero menos usual.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moab
  lexicon: HALOT
  rationale: Nombre propio colectivo/político conservado sin traducción.
- source_word: יְיֵלִיל
  english_pob_choice: wails
  chosen_spanish: se lamenta
  alternatives_spanish:
  - gime
  - aúlla
  lexicon: HALOT
  rationale: El verbo expresa duelo audible e intenso. 'Se lamenta' mantiene el sentido de lamento colectivo en un español natural, sin el matiz demasiado zoológico que podría tener 'aúlla'.
- source_word: בְּכָל רֹאשָׁיו
  english_pob_choice: on every head
  chosen_spanish: sobre toda cabeza
  alternatives_spanish:
  - en toda cabeza
  - sobre cada cabeza
  lexicon: HALOT
  rationale: El hebreo es distributivo con sentido colectivo; 'sobre toda cabeza' conserva la imagen corporal y el tono poético mejor que una paráfrasis más explícita.
- source_word: קָרְחָה
  english_pob_choice: is baldness
  chosen_spanish: hay calvicie
  alternatives_spanish:
  - hay baldura
  - está rasurada la cabeza
  lexicon: HALOT
  rationale: En contexto de luto, la calvicie no describe una condición ordinaria sino un signo ritual. 'Hay calvicie' preserva la construcción nominal y la imagen del texto, de modo más natural en español que 'es calvicie'.
- source_word: כָּל זָקָן
  english_pob_choice: every beard
  chosen_spanish: toda barba
  alternatives_spanish:
  - cada barba
  - toda la barba
  lexicon: HALOT
  rationale: El distributivo hebreo se expresa bien con 'toda barba'. En español, el singular colectivo suena más idiomático que la repetición 'cada barba'.
- source_word: גְּרוּעָה
  english_pob_choice: is cut off
  chosen_spanish: está cortada
  alternatives_spanish:
  - está recortada
  - está cercenada
  lexicon: HALOT
  rationale: La idea es de reducción/remoción severa en paralelo con el signo de luto. 'Está cortada' comunica bien la acción sin introducir una intensidad excesiva que el contexto no requiera de forma explícita.
theological_decisions:
- issue: הַבַּיִת como posible santuario/templo versus 'la casa' literal
  english_pob_reading: the temple, with a note that 'the house' may be more literal but likely refers to a cultic shrine or temple
  chosen_spanish_reading: el templo, con nota de alternativa literal 'la casa'
  alternative_spanish_readings:
  - la casa
  - la casa de culto
  rationale: 'Sigo el juicio contextual de la POB inglesa: el entorno de ''lugares altos'' y lamento cultual hace que ''templo'' sea la mejor comunicación del sentido. La nota preserva la tensión lexical para no borrar la literalidad hebrea.'
  doctrine_reference: lexical/contextual
translation_notes:
  revision_awareness: He seguido la evaluación de alta concordancia del auditor inglés, sin cambios sustanciales respecto del sentido base. La única decisión de estilo relevante fue mantener 'el templo' en el texto principal y conservar la alternativa literal en nota, siguiendo la tensión ya documentada en la POB inglesa.
  spanish_consistency_notes:
  - Mantengo transliterados los topónimos (Dibón, Nebo, Medeba, Moab) de forma consistente con el patrón de la POB.
  - 'Conservo el paralelismo poético del hebreo con dos miembros: lamento territorial y señales corporales de duelo.'
  - '''Calvicie'' y ''barba cortada'' siguen el simbolismo de duelo, no una descripción física neutral.'
