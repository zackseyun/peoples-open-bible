  language: en
  yaml_path: translation/ot/leviticus/009/022.yaml
  text: Then Aaron lifted up his hands toward the people and blessed them[a], and he came down from offering the sin offering, the burnt offering[c][b], and the peace offerings.
  footnotes:
  - marker: a
    text: Or 'his hand'; the Hebrew form is singular, but the gesture is commonly understood collectively as lifting the hands in blessing.
    reason: lexical_alternative
  - marker: b
    text: Or 'purification offering' for 'sin offering.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
