    text: Or 'toward morning' or 'before dawn.' The Hebrew idiom literally refers to the turning of morning.
    reason: lexical_alternative
  - marker: b
    text: Or 'her lord.' The Hebrew says 'her master,' a term of authority rather than explicitly 'her husband.'
    reason: lexical_alternative
