translation:
  language: es
  text: Las naciones se alborotaron[a], los reinos vacilaron; él hizo oír su voz, la tierra se derritió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las naciones estuvieron en tumulto, los reinos fueron sacudidos»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָמוּ
  english_pob_choice: raged
  chosen_spanish: se alborotaron
  alternatives_spanish:
  - rugieron
  - se tumultuaron
  - estuvieron en tumulto
  lexicon: HALOT
  rationale: El verbo expresa ruido tumultuoso y agitación. «Se alborotaron» comunica desorden y revuelo en español natural, sin perder la dimensión sonora del verbo hebreo ni endurecerlo demasiado en una sola dirección.
- source_word: גּוֹיִם
  english_pob_choice: Nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto apunta a entidades políticas en contraste con «reinos». «Las naciones» mantiene el paralelismo y evita introducir un contraste étnico-religioso que el versículo no enfatiza.
- source_word: מָטוּ
  english_pob_choice: tottered
  chosen_spanish: vacilaron
  alternatives_spanish:
  - titubearon
  - se tambalearon
  - fueron sacudidos
  lexicon: HALOT
  rationale: El verbo sugiere inestabilidad, deslizamiento o tambaleo. «Vacilaron» conserva la idea de perder firmeza y funciona bien en el paralelismo poético con el derrumbamiento implicado por la voz divina.
- source_word: מַמְלָכֹות
  english_pob_choice: kingdoms
  chosen_spanish: los reinos
  alternatives_spanish:
  - los dominios
  - los reinos soberanos
  lexicon: HALOT
  rationale: Es la equivalencia más directa y natural para dominios políticos. «Reinos» conserva el paralelo con «naciones» y es idiomático en español bíblico y moderno.
- source_word: נָתַן בְּקוֹלוֹ
  english_pob_choice: he uttered his voice
  chosen_spanish: él dio su voz
  alternatives_spanish:
  - "alz\0f3 su voz"
  - hizo oír su voz
  - pronunció su voz
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «dio su voz». Se conserva la construcción verbal cercana al original para no borrar la idiomática hebrea; en español resulta comprensible y mantiene la tensión poética sin especificar más de lo que el texto dice.
- source_word: תָּמוּג
  english_pob_choice: melted
  chosen_spanish: se derritió
  alternatives_spanish:
  - se deshizo
  - se fundió
  - se licuó
  lexicon: HALOT
  rationale: El verbo transmite perder consistencia como al derretirse. «Se derritió» es la imagen más directa y poética en español, y conserva el impacto de la respuesta cósmica a la voz de Dios.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el suelo
  - la tierra entera
  lexicon: HALOT
  rationale: Dado el alcance universal del versículo, «la tierra» comunica mejor el ámbito cósmico que «el país» o «la tierra» en sentido territorial; aquí la forma breve funciona bien en poesía.
theological_decisions:
- issue: Sujeto implícito de נָתַן
  english_pob_reading: he = God
  chosen_spanish_reading: él = Dios, identificado por el contexto inmediato
  alternative_spanish_readings:
  - el SEÑOR
  - él = Yahvé explícitamente
  rationale: El hebreo omite el sujeto explícito. En español se requiere pronombre, y «él» preserva la tersura del texto sin insertar el nombre divino donde no aparece en el versículo. El contexto del salmo identifica al hablante/actor como Dios, de modo que la referencia queda clara sin sobretraducción.
  doctrine_reference: Principio de primacía del texto fuente; no importar explícitamente una identificación que el versículo deja implícita.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés y la lectura hebrea, sin cambios necesarios respecto al sentido básico: tumulto de las naciones, inestabilidad de los reinos, voz divina y disolución de la tierra. La redacción española mantiene el paralelismo y la imaginería del original.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» solo en la decisión teológica; en el texto principal se conservó la referencia implícita con pronombre, conforme al hebreo.
  - «Las naciones» y «los reinos» se alinean con el paralelismo político del verso.
  - «Se derritió» preserva la metáfora física del hebreo sin explicarla en exceso.
  - La nota al pie recoge una alternativa válida y ya documentada por el audit trail inglés.
