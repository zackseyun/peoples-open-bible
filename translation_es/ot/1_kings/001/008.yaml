translation:
  language: es
  text: Pero Sadoc el sacerdote, Benaías hijo de Joiada, Natán el profeta, Simeí, Reí y los valientes[a] que pertenecían a David no estaban con Adonías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los valientes de David». El hebreo dice literalmente: «los valientes que eran/de David».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/צָד֣וֹק
  english_pob_choice: But Zadok
  chosen_spanish: Pero Sadoc
  alternatives_spanish:
  - Y Sadoc
  - Ahora Sadoc
  lexicon: HALOT
  rationale: El וְ inicial se entiende aquí con valor adversativo por contraste con el grupo que apoyaba a Adonías; en español, «Pero» expresa mejor ese giro que un simple «Y». Se translitera el nombre como «Sadoc», forma usual en español bíblico y fiel al nombre propio.
- source_word: הַ֠/כֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-sacerdotal
  - el ministro
  lexicon: HALOT
  rationale: כֹּהֵן designa el oficio sacerdotal; «sacerdote» es la equivalencia directa y natural en español, sin añadir matices no presentes en el hebreo.
- source_word: וּ/בְנָיָ֨הוּ בֶן יְהוֹיָדָ֜ע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaías hijo de Joiada
  alternatives_spanish:
  - Benaías, hijo de Joiada
  lexicon: HALOT
  rationale: Se conservan los nombres propios en forma castellanizada tradicional. «Hijo de» mantiene la construcción patronímica hebrea de manera clara y natural.
- source_word: וְ/נָתָ֤ן הַ/נָּבִיא֙
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - y Natán el profeta
  lexicon: HALOT
  rationale: El título apposicional se vierte literalmente como «el profeta», manteniendo la identificación de Natán por su función.
- source_word: וְ/שִׁמְעִ֣י וְ/רֵעִ֔י
  english_pob_choice: Shimei, Rei
  chosen_spanish: Simeí, Reí
  alternatives_spanish:
  - y Simeí y Reí
  lexicon: HALOT
  rationale: Son nombres propios; en español resulta más natural la enumeración con coma. Se conservan las formas castellanizadas habituales de ambos nombres.
- source_word: וְ/הַ/גִּבּוֹרִ֖ים אֲשֶׁ֣ר לְ/דָוִ֑ד
  english_pob_choice: and the mighty men who belonged to David
  chosen_spanish: y los valientes[b] que eran de David
  alternatives_spanish:
  - y los valientes de David
  - y los hombres valientes que pertenecían a David
  lexicon: HALOT
  rationale: גִּבּוֹרִים puede significar «valientes», «héroes» o «hombres poderosos»; aquí se mantiene el sustantivo tradicional y suficientemente amplio «valientes». La expresión לְדָוִד se vierte «que eran de David» para preservar el vínculo relacional del hebreo sin reducirlo solo a posesión; la nota recoge la alternativa posesiva documentada en la tradición inglesa.
- source_word: לֹ֥א הָי֖וּ עִם
  english_pob_choice: were not with
  chosen_spanish: no estaban con
  alternatives_spanish:
  - no se pusieron del lado de
  - no apoyaban a
  lexicon: HALOT
  rationale: 'La construcción hebrea es simple y literal: existencia + preposición. «No estaban con» conserva la restricción del texto y permite que el contexto político exprese la falta de apoyo sin interpretarla excesivamente.'
- source_word: אֲדֹנִיָּֽהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonijah
  lexicon: HALOT
  rationale: Se usa la forma castellanizada corriente del nombre propio bíblico, «Adonías», que mantiene la identificación clara para lectores en español.
theological_decisions:
- issue: El valor adversativo del וְ inicial en contraste con los partidarios de Adonías
  english_pob_reading: But Zadok ... were not with Adonijah.
  chosen_spanish_reading: Pero Sadoc ... no estaban con Adonías.
  alternative_spanish_readings:
  - Y Sadoc ...
  - Ahora Sadoc ...
  rationale: 'No es un cambio doctrinal, pero sí una decisión de sentido discursivo: el hebreo enlaza la frase con contraste implícito, y el español requiere marcarlo con naturalidad. «Pero» reproduce mejor la oposición contextual que «y».'
  doctrine_reference: N/A
- issue: La relación de los gibbôrîm con David
  english_pob_reading: the mighty men who belonged to David
  chosen_spanish_reading: los valientes que eran de David
  alternative_spanish_readings:
  - los valientes de David
  - los hombres valientes que pertenecían a David
  rationale: Se preserva la tensión entre una traducción relacional explícita y una posesiva idiomática. «Que eran de David» mantiene el vínculo sin borrar la literalidad del hebreo; la nota deja abierta la alternativa posesiva.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del paquete fuente hebreo y del audit trail inglés. No hubo cambios revisionales aplicados en la fuente inglesa; la versión española sigue el mismo criterio óptimo-equivalente, conservando el contraste inicial, la lista de nombres propios y la ambigüedad relacional de לְדָוִד mediante una redacción natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usan formas castellanizadas de nombres propios bíblicos (Sadoc, Benaías, Joiada, Natán, Simeí, Reí, Adonías) para legibilidad en español.
  - «Valientes» conserva el campo semántico de גִּבּוֹרִים sin imponer una glosa interpretativa más fuerte que el hebreo.
  - La negación «no estaban con» sigue de cerca el hebreo y evita ampliar indebidamente el sentido a una oposición formal o militar específica.
