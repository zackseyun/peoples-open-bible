translation:
  language: es
  text: Y ofrecerás tus holocaustos[a], la carne y la sangre, sobre el altar de Yahvé tu Dios; y la sangre de tus sacrificios será derramada sobre el altar de Yahvé tu Dios, y comerás la carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y harás tus holocaustos»; en contexto sacrificial, el verbo también puede expresarse más naturalmente como «ofrecerás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: you shall offer
  chosen_spanish: harás
  alternatives_spanish:
  - ofrecerás
  - harás / ofrecerás
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘hacer’, pero en contexto sacrificial significa realizar u ofrecer el rito. En español, ‘harás’ conserva la forma verbal cercana al hebreo y ‘ofrecerás’ aclara el sentido cultual; se eligió ‘harás’ para mantener la cercanía formal del acto prescrito, apoyado por el objeto sacrificial inmediato.
- source_word: עֹלֹתֶיךָ
  english_pob_choice: your burnt offerings
  chosen_spanish: tus holocaustos
  alternatives_spanish:
  - tus ofrendas quemadas
  - tus ofrendas de ascensión
  lexicon: HALOT
  rationale: El término técnico עֹלָה designa la ofrenda completamente quemada. ‘Holocaustos’ es el equivalente tradicional y culto en español bíblico para esa ofrenda; ‘ofrendas quemadas’ sería más descriptivo, pero menos terminológico.
- source_word: הַבָּשָׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne
  - la parte carnosa
  lexicon: HALOT
  rationale: ‘Carne’ reproduce bien el sentido concreto del sustantivo en legislación sacrificial y es natural en español. En este contexto no conviene ‘carne’ como alimento comercial, sino como porción corporal comestible.
- source_word: וְהַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre
  lexicon: HALOT
  rationale: ‘Sangre’ es la equivalencia directa y adecuada; el texto mantiene la pareja ritual carne/sangre.
- source_word: עַל מִזְבַּח יְהוָה אֱלֹהֶיךָ
  english_pob_choice: on the altar of Yahweh your God
  chosen_spanish: sobre el altar de Yahvé tu Dios
  alternatives_spanish:
  - en el altar de Yahvé tu Dios
  - sobre el altar de Yahvé, tu Dios
  lexicon: HALOT
  rationale: ‘Sobre’ refleja bien עַל en el contexto de derramamiento y colocación ritual. Se conserva ‘Yahvé’ según el criterio del proyecto para יהוה.
- source_word: וְדַם זְבָחֶיךָ
  english_pob_choice: the blood of your sacrifices
  chosen_spanish: la sangre de tus sacrificios
  alternatives_spanish:
  - la sangre de tus sacrificios
  - la sangre de tus víctimas
  lexicon: HALOT
  rationale: זֶבַח puede abarcar sacrificio en general; ‘sacrificios’ es claro y mantiene el campo cultual sin introducir una restricción innecesaria.
- source_word: יִשָּׁפֵךְ
  english_pob_choice: shall be poured out
  chosen_spanish: será derramada
  alternatives_spanish:
  - será vertida
  - será derramada / vertida
  lexicon: HALOT
  rationale: El pasivo nifal expresa la acción ritual sobre la sangre. ‘Será derramada’ comunica bien el acto de verter/desangrar en español bíblico y conserva el tono formal.
- source_word: וְהַבָּשָׂר תֹּאכֵל
  english_pob_choice: and you shall eat the flesh
  chosen_spanish: y comerás la carne
  alternatives_spanish:
  - y comerás la carne
  - y la carne la comerás
  lexicon: HALOT
  rationale: La cláusula final exige el verbo en segunda persona singular; ‘comerás la carne’ sigue fielmente el hebreo y evita introducir permiso (‘puedes’) que el texto no explicita en esta forma final revisada.
theological_decisions:
- issue: Renderización de יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme a la norma del proyecto, se translitera como ‘Yahvé’ para preservar el nombre propio del Dios del pacto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Fuerza de la cláusula final וְהַבָּשָׂר תֹּאכֵל
  english_pob_reading: and you shall eat the flesh
  chosen_spanish_reading: y comerás la carne
  alternative_spanish_readings:
  - y comerás la carne
  - y podrás comer la carne
  rationale: La revisión inglesa final favorece la forma simple con ‘shall eat’. En español, ‘comerás’ conserva el valor verbal directo sin añadir modalización de permiso que el hebreo no marca explícitamente aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del contexto inglés, que sustituyó ‘but you may eat the flesh’ por ‘and you shall eat the flesh’ para ajustarse más de cerca al hebreo. Por eso la cláusula final se vierte aquí sin matiz de permiso y con un verbo directo en segunda persona. También se respetó la decisión estable de renderizar יהוה como ‘Yahvé’.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ para יהוה de forma consistente con la política del proyecto.
  - Se eligió ‘holocaustos’ para עֹלֹתֶיךָ por ser el término sacrificial tradicional y técnico en español bíblico.
  - ‘Carne’ y ‘sangre’ conservan el paralelismo ritual del versículo sin suavizarlo.
  - La estructura general sigue de cerca el hebreo, pero con orden natural para el español publicado.
