  text: וְ/יָצָא֙ הַ/כֹּהֵ֔ן אֶל מִ/ח֖וּץ לַֽ/מַּחֲנֶ֑ה וְ/רָאָה֙ הַ/כֹּהֵ֔ן וְ/הִנֵּ֛ה נִרְפָּ֥א נֶֽגַע הַ/צָּרַ֖עַת מִן הַ/צָּרֽוּעַ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/003.yaml
  text: The priest shall go out to a place outside the camp[a], and the priest shall examine him; and behold, the disease of leprosy has been healed in the one with the skin disease,
  footnotes:
