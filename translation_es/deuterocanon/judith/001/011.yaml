translation:
  language: es
  text: Y todos los que habitaban toda la tierra menospreciaron[a] la palabra de Nabucodonosor, rey de los asirios, y no se unieron a él en la guerra, porque no le temían, sino que él estaba delante de ellos como un hombre cualquiera[b], e hicieron volver a sus mensajeros con las manos vacías y con deshonra de delante de él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despreciaron el mensaje/el mandato de Nabucodonosor». El griego τὸ ῥῆμα puede significar «palabra», «mensaje» o «mandato», y ἐφαύλισαν expresa tratarlo como algo de poco valor.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «estaba delante de ellos como un hombre igual». El sentido es que lo consideraban solo como un hombre en su mismo nivel, no como alguien temible.
    reason: lexical_alternative
  - marker: c
    text: O «devolvieron a sus enviados con las manos vacías, con deshonra, desde su presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφαύλισαν
  english_pob_choice: treated ... with contempt
  chosen_spanish: menospreciaron
  alternatives_spanish:
  - despreciaron
  - tuvieron en poco
  - trataron con desprecio
  lexicon: LSJ
  rationale: El verbo expresa tratar algo como de poco valor o digno de desprecio. «Menospreciaron» conserva el sentido activo y resulta natural en español bíblico moderno sin suavizar la fuerza.
- source_word: οἱ κατοικοῦντες πᾶσαν τὴν γῆν
  english_pob_choice: all who inhabited the whole land
  chosen_spanish: todos los que habitaban toda la tierra
  alternatives_spanish:
  - todos los habitantes de toda la tierra
  - todos los que moraban en toda la tierra
  lexicon: LSJ
  rationale: La frase participial se vierte con relativa para mantener claridad y el alcance universal de πάντες y πᾶσαν τὴν γῆν.
- source_word: τὸ ῥῆμα
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la orden
  - el mandato
  lexicon: LSJ
  rationale: ῥῆμα puede ser palabra, mensaje o asunto. «La palabra» conserva la amplitud del griego sin restringirla innecesariamente a un decreto formal.
- source_word: οὐ συνῆλθον αὐτῷ εἰς τὸν πόλεμον
  english_pob_choice: they did not join him in the war
  chosen_spanish: no se unieron a él en la guerra
  alternatives_spanish:
  - no se juntaron con él para la guerra
  - no acudieron con él a la guerra
  lexicon: LSJ
  rationale: «Unirse a él en la guerra» reproduce el sentido de participar con él en la acción militar y suena idiomático en español.
- source_word: οὐκ ἐφοβήθησαν αὐτόν
  english_pob_choice: they did not fear him
  chosen_spanish: no le temían
  alternatives_spanish:
  - no tenían miedo de él
  - no le tuvieron miedo
  lexicon: LSJ
  rationale: El imperfecto en español ayuda a expresar el trasfondo de su actitud; «temer» conserva la relación de reverencia o temor ante un soberano.
- source_word: ἦν ἐναντίον αὐτῶν ὡς ἀνὴρ ἴσος
  english_pob_choice: he was before them like an ordinary man
  chosen_spanish: él estaba delante de ellos como un hombre cualquiera
  alternatives_spanish:
  - él les parecía un hombre de su misma condición
  - él estaba ante ellos como un hombre igual
  lexicon: LSJ
  rationale: La expresión indica que lo consideraban solo como un hombre en su mismo nivel, no como alguien temible. «Un hombre cualquiera» comunica esa rebaja de estatus de forma natural.
- source_word: ἀνέστρεψαν τοὺς ἀγγέλους αὐτοῦ κενοὺς
  english_pob_choice: they sent his messengers back empty
  chosen_spanish: devolvieron vacíos a sus mensajeros
  alternatives_spanish:
  - mandaron de vuelta a sus mensajeros vacíos
  - restituyeron sin respuesta a sus mensajeros
  lexicon: LSJ
  rationale: ἀναστρέφω aquí tiene el sentido de devolver o hacer regresar. «Vacíos» conserva la idea de no haber obtenido resultado, aunque en español puede sonar algo figurado; se mantiene por fidelidad al griego y al audit trail.
- source_word: ἐν ἀτιμίᾳ
  english_pob_choice: in dishonor
  chosen_spanish: en deshonra
  alternatives_spanish:
  - con vergüenza
  - con deshonra
  lexicon: LSJ
  rationale: La expresión denota trato vergonzoso y humillante. «En deshonra» sigue de cerca el griego y es comprensible en registro bíblico.
- source_word: πρὸ προσώπου αὐτοῦ
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - de su presencia
  - de ante su rostro
  lexicon: LSJ
  rationale: El idioma griego literaliza «delante de su rostro/presencia». «De delante de él» conserva ese matiz formal mejor que una paráfrasis más libre.
theological_decisions:
- issue: Tratamiento de la autoridad real de Nabucodonosor y la fuerza de la negativa
  english_pob_reading: The verse presents a royal demand that is scorned, not merely ignored, and the refusal is rooted in lack of fear toward him.
  chosen_spanish_reading: El versículo presenta una exigencia real que es menospreciada, no solo ignorada, y el rechazo se basa en que no le temían.
  alternative_spanish_readings:
  - El versículo presenta una orden real que fue despreciada
  - El rechazo se basa en que no tenían temor de él
  rationale: La traducción mantiene la tensión entre la palabra/mandato del rey y la actitud de desdén expresada por el verbo griego, sin suavizar la humillación del episodio.
  doctrine_reference: N/A
- issue: Sentido de ἦν ἐναντίον αὐτῶν ὡς ἀνὴρ ἴσος
  english_pob_reading: They regarded him as merely a man on their own level, not as one to be feared.
  chosen_spanish_reading: Lo consideraban solo como un hombre en su mismo nivel, no como alguien que inspirara temor.
  alternative_spanish_readings:
  - Lo veían como un hombre igual a ellos
  - Lo tomaban por un hombre cualquiera
  rationale: 'Se conserva la tensión lexical entre igualdad social/jerárquica y la consecuencia práctica: al no verlo como superior, no lo temen.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se prefirió «en la guerra» sobre una construcción menos natural, y se mantuvo el sentido formal de las expresiones idiomáticas sin añadir puntuación innecesaria. La propuesta española refleja esa misma lectura revisada y conserva las alternativas documentadas en el audit trail.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda; aquí no aplica.
  - Se evitó «Señor» para traducir el nombre divino porque el texto no lo contiene.
  - Se mantuvo «Nabucodonosor» como forma española estable del nombre propio, en coherencia con el uso bíblico corriente y el audit trail.
  - Se preservó la diferencia entre «palabra» y «orden/mandato» mediante nota al pie, porque el griego permite más de una lectura léxica.
