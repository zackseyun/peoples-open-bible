    text: O «deportación»; es decir, el traslado forzado de la población de Jerusalén cuando la ciudad cayó.
    reason: lexical_alternative
  revision_rationale: Se cambia «destierro» por «exilio» para una formulación más natural y reconocible en español bíblico, manteniendo el sentido histórico de גְּלוֹת. Se corrige y simplifica la nota, eliminando el error «deporto» y aclarando que se refiere a la deportación de la población de Jerusalén cuando cayó la ciudad.
