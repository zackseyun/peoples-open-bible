    rationale: La auditoría inglesa escogió explícitamente ‘we boiled’ por su concreción y por reflejar mejor el horror literal del contexto; ‘we cooked’ quedó como alternativa. El español principal debe seguir esa decisión salvo razón fuerte, que aquí no aparece.
  - severity: low
    issue: La frase ‘le dije a ella’ es menos natural de lo necesario.
    rationale: El hebreo marca el complemento femenino, pero en español el clítico ‘le’ ya lo expresa suficientemente en este contexto. Mantener ‘a ella’ añade énfasis no requerido y suena más pesado.
  - severity: low
    issue: La nota [a] y su explicación favorecen indebidamente una lectura más general (‘cocinar’) frente a la opción principal documentada.
    rationale: La nota debe presentar ‘cocinamos/cocimos’ como alternativa, no desplazar la preferencia principal por ‘hervimos’.
