    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu ojo no tendrá piedad de él», un hebraísmo que expresa compasión o trato indulgente.
    reason: cultural_note
  - marker: c
    text: O «lo cubras»; es decir, esconderlo o ocultar su culpa.
    reason: lexical_alternative
