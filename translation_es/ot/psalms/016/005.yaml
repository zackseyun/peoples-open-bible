translation:
  language: es
  text: Yahvé es la porción de mi herencia y mi copa[a]; tú sostienes mi suerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé es mi porción y mi copa»; el hebreo reúne imágenes de asignación («porción», «herencia/parte», «suerte») en rápida sucesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en forma transliterada, siguiendo la norma del POB de no ocultar el Tetragrámaton tras un título. "Yahvé" es el equivalente español más establecido para ese nombre revelado.
- source_word: מְנָת
  english_pob_choice: the portion of
  chosen_spanish: la porción de
  alternatives_spanish:
  - la parte de
  - la asignación de
  lexicon: HALOT
  rationale: La construcción posesiva se reproduce de manera natural en español con "la porción de", manteniendo la imagen de repartición/allotment sin perder fluidez.
- source_word: חֶלְקִי
  english_pob_choice: my inheritance
  chosen_spanish: mi herencia
  alternatives_spanish:
  - mi porción
  - mi parte
  lexicon: HALOT
  rationale: El contexto de reparto y heredad permite "herencia" para reflejar la fuerza de asignación patrimonial que el POB destaca en inglés, sin borrar el matiz de posesión asignada.
- source_word: וְכוֹסִי
  english_pob_choice: and my cup
  chosen_spanish: y de mi copa
  alternatives_spanish:
  - y mi copa
  - y la copa que me ha tocado
  lexicon: HALOT
  rationale: '"Copa" conserva la metáfora bíblica literal de la experiencia o destino asignado; se añade "de" para una sintaxis española más natural dentro de la serie de complementos.'
- source_word: תּוֹמִיךְ
  english_pob_choice: uphold
  chosen_spanish: sostienes
  alternatives_spanish:
  - mantienes
  - sustentas
  - apoyas
  lexicon: HALOT
  rationale: '"Sostienes" expresa bien la idea de asegurar y mantener firme lo asignado. Es más idiomático en español que un calco como "apoyas" y conserva la función de preservación implícita en el verbo hebreo.'
- source_word: גּוֹרָלִי
  english_pob_choice: my lot
  chosen_spanish: mi suerte
  alternatives_spanish:
  - mi lot
  - mi porción asignada
  - mi destino
  lexicon: HALOT
  rationale: Se opta por "suerte" para evitar una palabra poco natural como "lot" en español, conservando a la vez la idea de asignación por sorteo o destino concreto. Dado que el verso acumula imágenes de herencia, copa y lotes, "suerte" comunica adecuadamente esa distribución recibida.
theological_decisions:
- issue: Conservación de la acumulación poética de imágenes de asignación
  english_pob_reading: '"the portion of my inheritance and my cup; you uphold my lot" mantiene tres imágenes de repartición: portion, inheritance/share, lot.'
  chosen_spanish_reading: '"la porción de mi herencia y de mi copa; tú sostienes mi suerte" conserva la cadena de imágenes sin reducirla a una sola idea.'
  alternative_spanish_readings:
  - '"mi porción y mi copa; tú sostienes mi heredad"'
  - '"la porción de mi herencia, y mi copa; tú mantienes mi destino"'
  rationale: El hebreo acumula términos relacionados con reparto y destino. La traducción española conserva esa tensión poética y teológica en lugar de nivelarla a una sola metáfora, para que el lector perciba que Yahvé mismo es la posesión asignada del salmista y quien la asegura.
  doctrine_reference: Poética bíblica; teología de la heredad del pueblo de Dios
translation_notes:
  revision_awareness: Sin cambios respecto al último pase revisado en el contexto inglés; se preserva la lectura de alta concordancia y se traslada su tensión léxica al español sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el nombre divino, en coherencia con el criterio POB.
  - Se conserva la metáfora de "copa" en vez de explicarla en el texto principal.
  - La elección de "suerte" para גּוֹרָל evita un tecnicismo poco natural en español y respeta el campo semántico de asignación por sorteo.
  - '"Herencia" traduce el matiz de allotment patrimonial presente en el contexto, aunque en español conviva con el sentido más amplio de posesión recibida.'
