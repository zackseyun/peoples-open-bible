revisions:
- from: Tomó la corona de su rey[a], de sobre su cabeza. Su peso era un talento de oro, y tenía una piedra preciosa, y fue puesta sobre la cabeza de David[b]. Sacó muy gran botín de la ciudad.
  to: Tomó la corona del rey de ellos[a] de su cabeza. Su peso era un talento de oro, y tenía una piedra preciosa, y fue puesta sobre la cabeza de David[b]. Sacó de la ciudad muchísimo botín.
  rationale: Se ajustó «su rey» a «del rey de ellos» para reflejar mejor el sufijo plural hebreo y la decisión del POB inglés. Se simplificó «de sobre su cabeza» a «de su cabeza» por naturalidad española y consonancia con la revisión inglesa auditada. Se reformuló la última cláusula como «Sacó de la ciudad muchísimo botín» para expresar de manera más natural y precisa la abundancia extrema de הַרְבֵּה מְאֹד.
