translation:
  language: es
  text: Han temido la espada[a], y yo traeré la espada sobre ustedes[b] —declara el Señor Dios, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la espada». La repetición también puede abarcar, por extensión, la guerra o el juicio violento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Han temido la espada, y una espada traeré sobre ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  - la guerra
  lexicon: HALOT
  rationale: El sustantivo denota literalmente 'espada'. En el lenguaje profético puede funcionar como metonimia de violencia bélica o juicio, pero 'la espada' conserva la imagen concreta repetida en el verso y su fuerza retórica.
- source_word: יְרֵאתֶם
  english_pob_choice: you have feared
  chosen_spanish: han temido
  alternatives_spanish:
  - temieron
  - han tenido miedo de
  lexicon: HALOT
  rationale: El perfecto Qal 2mp expresa una acción ya realizada. En español, 'han temido' transmite bien ese valor perfectivo y suena natural en una acusación profética.
- source_word: וְחֶרֶב
  english_pob_choice: and I will bring the sword
  chosen_spanish: y yo traeré la espada
  alternatives_spanish:
  - y traeré la espada
  - y una espada traeré
  lexicon: HALOT
  rationale: La repetición del sustantivo mantiene el paralelismo del hebreo. Añadir 'yo' hace explícito el sujeto verbal, útil en español sin alterar el énfasis.
- source_word: אָבִיא עֲלֵיכֶם
  english_pob_choice: I will bring upon you
  chosen_spanish: traeré ... sobre ustedes
  alternatives_spanish:
  - traeré ... contra ustedes
  - pondré ... sobre ustedes
  lexicon: HALOT
  rationale: La construcción con עַל en contexto de juicio se vierte de manera natural con 'sobre', que preserva la idea de algo impuesto o descargado sobre el destinatario.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - oráculo de
  - dice
  lexicon: HALOT
  rationale: '''Declara'' reproduce el registro solemne del formulario profético sin caer en un calco rígido.'
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé Dios
  lexicon: HALOT
  rationale: Siguiendo la directriz del proyecto, יהוה se vierte 'Yahvé'. En la fórmula fija אֲדֹנָי יְהוִה, 'el Señor Yahvé' conserva ambos elementos del título compuesto sin duplicar 'Señor' de forma extraña en español.
theological_decisions:
- issue: Tratamiento del nombre divino en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé Dios
  rationale: El texto hebreo contiene explícitamente el Tetragrama. La consigna del proyecto pide 'Yahvé' como forma principal en español; por eso no se sustituye por una máscara litúrgica como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado del inglés POB no requiere cambios textuales sustantivos; la versión española conserva la repetición de 'la espada' y la fórmula profética, ajustando solo el nombre divino al estándar editorial español del proyecto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la directriz del proyecto para יהוה.
  - Se conserva 'la espada' de forma repetida para reflejar el paralelismo del hebreo.
  - '''Sobre ustedes'' sigue el valor de עַל en contexto de juicio y evita una paráfrasis excesiva.'
