review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura poética y las decisiones léxicas principales del hebreo, pero se aparta innecesariamente del enfoque del POB en dos puntos: convierte el primer ב en una lectura más estática (''En el mar estaba'') en vez de la lectura principal dinámica (''por/a través del mar''), y ''no fueron conocidas'' suena poco natural en español para לֹא נֹדָעוּ. El resto —''camino'', ''sendas'', ''muchas aguas'', ''huellas''— preserva bien el sentido y la tensión poética.'
  spanish_quality_summary: El texto es comprensible, pero 'En el mar estaba tu camino' suena algo forzado y menos natural que 'Tu camino fue por el mar'. Además, 'y tus huellas no fueron conocidas' es gramatical, pero poco idiomático en español bíblico actual; 'no se conocieron' conserva mejor la pasiva/impersonalidad sin rigidez. Conviene también eliminar el 'y' antes de la última cola para una puntuación más fluida.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las opciones 'camino', 'sendas', 'aguas' y 'huellas' son adecuadas. La revisión propuesta alinea mejor la traducción principal con la decisión inglesa documentada de movimiento 'through the sea', dejando la alternativa más literal 'en el mar' en nota.
  issues:
  - severity: medium
    issue: La cláusula principal usa una lectura estática ('En el mar estaba tu camino') donde el POB documenta como principal una lectura dinámica ('through the sea').
    rationale: Aunque ב puede significar 'en', la evidencia y la nota inglesa favorecen que aquí exprese trayecto a través del mar en esta imagen poética. En español, 'Tu camino fue por el mar' comunica mejor ese movimiento sin sobreinterpretar.
  - severity: medium
    issue: '''No fueron conocidas'' es demasiado rígido e idiomáticamente débil para עִקְּבוֹתֶיךָ לֹא נֹדָעוּ.'
    rationale: El hebreo deja abierta la idea de huellas no perceptibles/reconocibles. 'No se conocieron' mantiene la ambigüedad y suena más natural en español. También puede entenderse como pasiva refleja aceptable en registro bíblico.
  - severity: low
    issue: La nota b del borrador ofrece 'tus huellas' como alternativa a una cláusula cuyo sustantivo principal ya es 'tus huellas'.
    rationale: La nota inglesa alternativa se refiere a 'your tracks' o 'your steps were not known'. En español, si el texto principal usa 'huellas', la nota debe ofrecer alternativas distintas, como 'tus rastros' o 'tus pasos no se conocieron'.
  revised_spanish_text: Tu camino fue por el mar[a], y tus sendas por muchas aguas; tus huellas no se conocieron[b].
  revised_footnotes:
