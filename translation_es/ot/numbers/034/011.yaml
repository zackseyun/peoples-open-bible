  language: en
  yaml_path: translation/ot/numbers/034/011.yaml
  text: Then the border shall go down from Shepham to Riblah[a], east of Ain[b]; and the border shall go down and reach the shoulder of the Sea of Kinnereth eastward.
  footnotes:
