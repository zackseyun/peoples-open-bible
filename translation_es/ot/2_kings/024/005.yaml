translation:
  language: es
  text: Los demás hechos de Joacim[a], y todo lo que hizo, ¿no están escritos en el libro de las Crónicas de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los anales de los reyes de Judá». El título hebreo se refiere a una fuente real de registro citada a lo largo de Reyes, no necesariamente al libro canónico de Crónicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo que queda de
  - lo restante de
  lexicon: HALOT
  rationale: En esta fórmula regia, יֶתֶר expresa lo que queda fuera del relato principal. «El resto de» conserva la idea de remanente y suena natural en español.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - acciones
  - hechos y dichos
  lexicon: HALOT
  rationale: En el resumen de reinado, דִּבְרֵי no se refiere aquí a «palabras» sino al conjunto de hechos registrados. «Hechos» comunica bien ese sentido amplio sin añadir interpretación indebida.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joacim
  alternatives_spanish:
  - Yehoyaqim
  - Joaquim
  lexicon: transliteración bíblica tradicional en español
  rationale: Se usa la forma española tradicional de este nombre propio, ampliamente reconocible en lectura bíblica, manteniendo la referencia personal sin calco del inglés.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo lo que realizó
  - y todo cuanto hizo
  lexicon: HALOT
  rationale: La frase hebrea es directa y global. «Todo lo que hizo» conserva el alcance completo sin sobretraducir el verbo.
- source_word: הֲלֹא
  english_pob_choice: are they not
  chosen_spanish: ¿No están...?
  alternatives_spanish:
  - ¿No es así que están...?
  - ¿Acaso no están...?
  lexicon: HALOT
  rationale: La partícula introductoria formula una pregunta retórica que presupone la respuesta afirmativa. En español, «¿No están...?» reproduce bien ese valor.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo se expresa de modo natural con «escritos», manteniendo la imagen documental del texto.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים לְמַלְכֵי יְהוּדָה
  english_pob_choice: the Book of the Chronicles of the Kings of Judah
  chosen_spanish: el Libro de las Crónicas de los reyes de Judá
  alternatives_spanish:
  - el libro de los anales de los reyes de Judá
  - el libro de las memorias de los reyes de Judá
  lexicon: HALOT
  rationale: Se conserva la designación tradicional del registro citado por Reyes. «Crónicas» refleja el título convencional de la fuente, sin identificarla necesariamente con el libro canónico de Crónicas.
theological_decisions:
- issue: Naturaleza de la fuente citada en el cierre regia
  english_pob_reading: The Hebrew title refers to a royal record source cited throughout Kings, not necessarily the canonical book of Chronicles.
  chosen_spanish_reading: El título hebreo se entiende como una fuente documental real citada en Reyes, no necesariamente como el libro canónico de Crónicas.
  alternative_spanish_readings:
  - Puede leerse como una referencia directa al libro canónico de Crónicas.
  - Puede entenderse solo como una manera literaria de decir que está todo escrito en la Escritura.
  rationale: La nota inglesa preserva la tensión entre el título tradicional y la función histórica de la fuente. El español mantiene esa distinción para no confundir la obra citada con el libro bíblico posterior.
  doctrine_reference: Historia bíblica / fuentes regias en Reyes
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la revisión inglesa final sin cambios sustantivos; se mantiene la estructura retórica y la referencia archivística del cierre.
  spanish_consistency_notes:
  - Se mantiene «Judá» como nombre propio geográfico-político.
  - Se prefiere «hechos» para דִּבְרֵי en esta fórmula regia, en coherencia con el uso idiomático del pasaje.
  - Se evita «SEÑOR» o sustitución reverencial, porque aquí no aparece el nombre divino.
  - La pregunta retórica se conserva en forma interrogativa española natural.
