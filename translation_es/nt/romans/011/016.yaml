translation:
  language: es
  text: Ahora bien, si las primicias son santas, también lo es la masa[a]; y si la raíz es santa, también lo son las ramas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la masa entera'. El griego φύραμα se refiere a una masa o mezcla de masa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαρχὴ
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primera porción
  - primer fruto
  lexicon: BDAG
  rationale: '"Primicias" es el equivalente bíblico natural en español para ἀπαρχή y conserva el matiz cultual y de consagración que el inglés POB preserva con "firstfruits". Evita reducir la imagen a una mera cantidad inicial.'
- source_word: ἁγία
  english_pob_choice: holy
  chosen_spanish: santas
  alternatives_spanish:
  - consagradas
  - puestas aparte
  lexicon: BDAG
  rationale: '"Santas" mantiene el paralelismo directo de la cláusula y reproduce la categoría bíblica de santidad sin especificar más de lo que el versículo dice. "Consagradas" o "puestas aparte" son posibles, pero desplazan el registro y hacen más explícita una implicación no desarrollada aquí.'
- source_word: φύραμα
  english_pob_choice: the whole batch of dough
  chosen_spanish: la masa
  alternatives_spanish:
  - el bulto
  - la masa de harina
  - la masa entera
  lexicon: BDAG
  rationale: El término puede referirse a una masa o mezcla de harina/dough. En español, "la masa" comunica de forma natural la imagen y permite conservar la relación con las primicias sin añadir explicaciones que el griego no da. Dado que el inglés POB ya anotó la alternativa "the lump", "masa" es la opción más fluida y fiel en español.
- source_word: ῥίζα
  english_pob_choice: root
  chosen_spanish: la raíz
  alternatives_spanish:
  - el tronco
  lexicon: BDAG
  rationale: '"La raíz" es la traducción botánica directa y preserva la metáfora tal como aparece en el griego y en el contexto del olivo en Romanos 11.'
- source_word: κλάδοι
  english_pob_choice: branches
  chosen_spanish: las ramas
  alternatives_spanish:
  - los sarmientos
  - los brotes
  lexicon: BDAG
  rationale: '"Ramas" es la equivalencia natural en español para el plural κλάδοι y encaja con la imagen del árbol/olivo del contexto inmediato.'
- source_word: εἰ δὲ ... καὶ ...; καὶ εἰ ... καὶ ...
  english_pob_choice: Now if ... so is ...; and if ... so are ...
  chosen_spanish: Ahora bien, si ... también lo es ...; y si ... también lo son ...
  alternatives_spanish:
  - Si ... entonces ...; y si ... entonces ...
  - Pero si ... ...; y si ... ...
  lexicon: Greek grammar
  rationale: El griego usa una construcción condicional elíptica. En español, "también lo es/son" hace explícita la inferencia lógica sin sobreinterpretarla. "Ahora bien" refleja bien el matiz discursivo de δέ.
theological_decisions:
- issue: Naturaleza de la santidad aplicada a primicias/masa y raíz/ramas
  english_pob_reading: Render 'holy' without specifying whether the holiness is covenantal, representative, or saving.
  chosen_spanish_reading: Traducir "santas" sin precisar si la santidad es cultual, representativa o salvífica.
  alternative_spanish_readings:
  - consagradas en sentido cultual
  - hechas santas en sentido salvífico
  rationale: 'El versículo establece una analogía: la santidad de la primicia guarda relación con la masa, y la de la raíz con las ramas, pero no define el modo exacto de esa santidad. La traducción española conserva esa tensión teológica en lugar de resolverla prematuramente.'
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del POB inglés: no hubo cambios en la lectura ni en la forma final, y el draft español sigue la misma decisión léxica y teológica básica.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos miembros condicionales con repetición de "si" y "también lo es/son".
  - Se evitó introducir vocabulario eclesiástico tradicional que no está en el griego, como "consagrado" o "santo" en sentido técnico no aclarado.
  - '"Primicias" y "raíz/ramas" conservan el entramado bíblico y agrícola del pasaje.'
  - La nota de pie de página se ancla solo en "masa", donde existe una alternativa lexical real en el griego.
