translation:
  language: es
  text: Y puso tropas en todas las ciudades fortificadas de Judá, y puso guarniciones[a] en la tierra de Judá y en las ciudades de Efraín que Asa su padre había capturado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gobernadores', 'diputados' o 'prefectos' para נְצִיבִים; el término puede designar funcionarios nombrados además de puestos militares, pero el contexto militar aquí favorece 'guarniciones'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֶּן
  english_pob_choice: he stationed / he placed
  chosen_spanish: puso
  alternatives_spanish:
  - estacionó
  - colocó
  - estableció
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'dio/puso', y en este contexto administrativo-militar el español natural es 'puso'. Mantiene la fuerza de asignación sin introducir una paráfrasis excesiva.
- source_word: חַיִל
  english_pob_choice: forces
  chosen_spanish: tropas
  alternatives_spanish:
  - fuerzas
  - ejército
  - soldados
  lexicon: HALOT
  rationale: Aquí חַיִל tiene sentido militar por la colocación en ciudades fortificadas. 'Tropas' comunica bien unidades militares desplegadas y suena natural en español actual.
- source_word: בְּכָל עָרֵי יְהוּדָה הַבְּצֻרוֹת
  english_pob_choice: in all the fortified cities of Judah
  chosen_spanish: en todas las ciudades fortificadas de Judá
  alternatives_spanish:
  - en cada una de las ciudades fortificadas de Judá
  lexicon: HALOT
  rationale: '''Ciudades fortificadas'' corresponde de manera directa a הַבְּצֻרוֹת. Se conserva el alcance distributivo de ''all'' con ''todas las''.'
- source_word: נְצִיבִים
  english_pob_choice: garrisons
  chosen_spanish: gobernadores[a]
  alternatives_spanish:
  - guarniciones
  - prefectos
  - deputados
  lexicon: HALOT
  rationale: En hebreo el término puede designar oficiales designados o puestos militares. Dado que el inglés POB preserva esa tensión con una nota, en español se elige 'gobernadores' como opción administrativa posible, pero se ancla con nota para reflejar que el contexto militar también permite 'guarniciones'.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en el territorio de Judá
  - por toda la tierra de Judá
  lexicon: HALOT
  rationale: '''Tierra'' reproduce bien אֶרֶץ y evita restringirlo solo a áreas urbanas.'
- source_word: וּבְעָרֵי אֶפְרַיִם
  english_pob_choice: and in the cities of Ephraim
  chosen_spanish: y en las ciudades de Efraín
  alternatives_spanish:
  - y en las ciudades de Efraím
  lexicon: HALOT
  rationale: Se conserva el referente tribal-geográfico con el nombre bíblico habitual en español, 'Efraín'.
- source_word: אֲשֶׁר לָכַד
  english_pob_choice: that ... had captured
  chosen_spanish: que Asa su padre había capturado
  alternatives_spanish:
  - que Asa su padre había tomado
  - que Asa su padre había conquistado
  lexicon: HALOT
  rationale: '''Capturado'' expresa bien el acto militar de tomar ciudades, manteniendo la relación con el inglés POB y el matiz bélico del hebreo.'
- source_word: אָסָא אָבִיו
  english_pob_choice: Asa his father
  chosen_spanish: Asa su padre
  alternatives_spanish:
  - Asa, su padre
  lexicon: HALOT
  rationale: La construcción posesiva española fluye con 'su padre' y conserva la identificación de Asa como padre del rey mencionado.
theological_decisions:
- issue: Tensión léxica de נְצִיבִים entre cargo administrativo y destacamento militar
  english_pob_reading: '''garrisons'' with a note that the Hebrew can also mean governors/deputies/prefects, but the military context favors garrisons.'
  chosen_spanish_reading: '''gobernadores'' con nota que deja abierta la lectura de ''guarniciones'''
  alternative_spanish_readings:
  - '''guarniciones'''
  - '''prefectos'''
  - '''deputados'''
  rationale: No se elimina la ambigüedad documentada. La nota conserva la alternativa militar y administrativa, porque el pasaje combina control territorial y despliegue de defensa.
  doctrine_reference: No doctrinal issue; lexical/theological tension preserved from source.
translation_notes:
  revision_awareness: Se siguió el estado revisado sin cambios indicado por el audit trail en inglés; no se requieren correcciones textuales adicionales respecto del paquete fuente.
  spanish_consistency_notes:
  - Se mantuvo 'Judá' y 'Efraín' como topónimos bíblicos estándar en español.
  - Se eligió un español moderno y formal sin recurrir a 'SEÑOR' para el nombre divino, que no aparece en este versículo.
  - La nota de pie de página reproduce la ambigüedad lexical relevante de נְצִיבִים en forma accesible para lectura pública.
