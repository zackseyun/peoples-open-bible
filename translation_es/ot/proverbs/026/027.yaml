revisions:
- from: Quien cava una fosa caerá en ella[a], y el que revuelve una piedra, a él se le volverá.
  to: Quien cava una fosa caerá en ella, y el que hace rodar una piedra, esta volverá sobre él.[a]
  rationale: Se corrige «revuelve» por «hace rodar», que sí representa גֹלֵל. Se explicita «esta» para reflejar que el verbo final concuerda con «piedra» y para producir un español más claro y natural. Se mantiene la estructura proverbial y la alternativa documentada en inglés entre «sobre él» y «a él».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:59:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La primera mitad refleja bien el hebreo: «Quien cava una fosa caerá en ella» preserva el participio genérico, la imagen de שׁחת y la consecuencia proverbial. La segunda mitad, sin embargo, no representa con precisión וְגֹלֵל אֶבֶן… תָּשׁוּב: «revuelve una piedra» cambia la acción de hacer rodar una piedra, y «a él se le volverá» borra innecesariamente el sujeto implícito femenino, que en hebreo concuerda con «piedra».'
  spanish_quality_summary: El borrador es legible, pero «revuelve una piedra» suena semánticamente inadecuado en español para גֹלֵל. Además, «a él se le volverá» resulta algo forzado y menos claro que una formulación explícita con «la piedra» o «esta». Una leve revisión mejora fidelidad e idiomaticidad sin perder la dignidad proverbial.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La cuestión léxica principal es גֹלֵל: debe expresarse como «hacer rodar» o «rodar» una piedra, no «revolver». La nota alternativa del inglés debe conservar la alternativa entre «volverá sobre él» y «volverá a él/ se le volverá», no repetir el error «revuelve».'
  issues:
  - severity: high
    issue: «revuelve una piedra» no corresponde a וְגֹלֵל אֶבֶן
    rationale: El verbo hebreo גֹלֵל denota rodar/hacer rodar. «Revolver» en español sugiere mezclar o agitar, alterando la imagen proverbial y el sentido del original.
  - severity: medium
    issue: «a él se le volverá» oscurece el sujeto implícito del verbo final
    rationale: Aunque el hebreo no repite «piedra», la forma verbal femenina apunta a אבן. En español es más natural y claro decir «esta volverá sobre él» o «la piedra volverá sobre él», preservando el efecto de retorno perjudicial.
  - severity: low
    issue: La nota al pie reproduce la elección léxica incorrecta
    rationale: La alternativa debe reflejar una opción real del original y del rastro inglés, como «volverá a él», no mantener «revuelve».
  revised_spanish_text: Quien cava una fosa caerá en ella, y el que hace rodar una piedra, esta volverá sobre él.[a]
  revised_footnotes:
  - marker: a
    text: O «y el que hace rodar una piedra, esta volverá a él»
    reason: lexical_alternative
  revision_rationale: Se corrige «revuelve» por «hace rodar», que sí representa גֹלֵל. Se explicita «esta» para reflejar que el verbo final concuerda con «piedra» y para producir un español más claro y natural. Se mantiene la estructura proverbial y la alternativa documentada en inglés entre «sobre él» y «a él».
