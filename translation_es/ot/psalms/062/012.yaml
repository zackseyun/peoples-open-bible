translation:
  language: es
  text: 'Dios ha dicho una cosa[a]; dos cosas he oído: que la fuerza pertenece a Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una vez ha hablado Dios; dos veces he oído esto». El hebreo puede leerse adverbialmente («una vez/dos veces») o como una fórmula numérica sapiencial («una cosa/dos cosas»).'
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַת
  english_pob_choice: One thing
  chosen_spanish: Una cosa
  alternatives_spanish:
  - Una
  - Una sola cosa
  - Una vez
  lexicon: HALOT
  rationale: El numeral femenino singular puede expresar aquí una fórmula sapiencial de conteo. En español, «Una cosa» conserva la estructura paralela con «dos cosas» y comunica mejor la construcción retórica que un adverbial como «una vez».
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - ha dicho
  lexicon: HALOT
  rationale: «Hablar» reproduce bien el acto de pronunciar una palabra formal y mantiene un perfecto natural en español. «Ha dicho» sería posible, pero «ha hablado» se ajusta mejor al matiz verbal del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios
  lexicon: HALOT
  rationale: El hebreo usa la forma plural con sentido singular para el Dios de Israel. En español, «Dios» es la traducción natural y fiel, sin necesidad de marcar el plural morfológico.
- source_word: שְׁתַּיִם
  english_pob_choice: two things
  chosen_spanish: dos cosas
  alternatives_spanish:
  - dos
  - dos veces
  lexicon: HALOT
  rationale: En paralelismo con «una cosa», «dos cosas» preserva la fórmula numérica y evita forzar un valor temporal («dos veces») que no es el mejor en esta lectura.
- source_word: זוּ
  english_pob_choice: things
  chosen_spanish: cosas
  alternatives_spanish:
  - esto
  - estas
  lexicon: HALOT
  rationale: El demostrativo queda absorbido en la formulación española. «Cosas» completa de modo idiomático la expresión sin añadir contenido ajeno al hebreo.
- source_word: שָׁמָעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - escuché
  - he escuchado
  lexicon: HALOT
  rationale: «Oír» reproduce con naturalidad la recepción de lo dicho y mantiene el perfecto español como equivalente del perfecto hebreo en este contexto reflexivo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo oído; por eso «que» es la mejor solución sintáctica en español.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la fortaleza
  - el poderío
  lexicon: HALOT
  rationale: «עֹז» expresa fuerza, vigor o poder. En español, «el poder» comunica bien la idea de capacidad eficaz y mantiene el tono breve y solemne del verso; «la fuerza» también sería posible, pero puede sonar menos abstracta en este contexto.
- source_word: לֵאלֹהִים
  english_pob_choice: belongs to God
  chosen_spanish: pertenece a Dios
  alternatives_spanish:
  - es de Dios
  - está con Dios
  lexicon: HALOT
  rationale: La preposición ל marca posesión o atribución. «Pertenece a Dios» expresa con claridad esa relación de pertenencia y evita ambigüedades que tendría una formulación demasiado literal.
theological_decisions:
- issue: La fórmula numérica «una... dos»
  english_pob_reading: 'Rendered as a rhetorical formula: ''One thing God has spoken; two things I have heard'''
  chosen_spanish_reading: 'Se conserva como fórmula retórica: «Una cosa ha hablado Dios; dos cosas he oído»'
  alternative_spanish_readings:
  - «Una vez ha hablado Dios; dos veces he oído»
  rationale: El hebreo puede leerse como una fórmula sapiencial de enumeración o como un adverbio temporal. La versión española preserva la estructura poética y el paralelismo con la segunda línea, sin cerrar indebidamente la ambigüedad del original.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto sigue la lectura y la decisión retórica del POB inglés, que favorece la fórmula numérica sobre la lectura adverbial, y mantiene la equivalencia óptima sin perder la ambigüedad documentada en la nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en sentido singular.
  - Se evita «SEÑOR» porque el texto hebreo no contiene el tetragrámaton.
  - «Oído» se usa como perfecto natural en español para reflejar שָׁמָעְתִּי.
  - «Poder» se eligió como alternativa válida a «fuerza» por la densidad semántica de עֹז en este contexto poético.
