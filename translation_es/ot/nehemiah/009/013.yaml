translation:
  language: es
  text: Tú descendiste sobre el monte Sinaí y hablaste con ellos desde el cielo[a], y les diste juicios rectos[b], leyes verdaderas[c], estatutos y mandamientos buenos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hablaste a ellos desde el cielo'. El hebreo usa literalmente 'con', pero en español también puede expresarse naturalmente con 'a' con este verbo.
    reason: lexical_alternative
  - marker: b
    text: O 'juicios justos' para 'juicios rectos'.
    reason: lexical_alternative
  - marker: c
    text: O 'leyes de verdad' o 'instrucciones verdaderas' para 'leyes verdaderas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל הַר סִינַי
  english_pob_choice: on Mount Sinai
  chosen_spanish: al monte Sinaí
  alternatives_spanish:
  - sobre el monte Sinaí
  - en el monte Sinaí
  lexicon: HALOT
  rationale: La construcción con עַל + monte se expresa naturalmente en español con 'al monte' en este contexto narrativo-teofánico. 'Sinaí' se conserva como nombre propio; 'al' fluye mejor que un calco rígido y mantiene la localización de la bajada divina.
- source_word: יָרַדְתָּ
  english_pob_choice: You came down
  chosen_spanish: descendiste
  alternatives_spanish:
  - bajaste
  - viniste abajo
  lexicon: HALOT
  rationale: El hebreo ירד marca descenso real. 'Descendiste' conserva con claridad la acción y el tono solemne del discurso dirigido a Dios. 'Bajaste' sería posible, pero menos elevado.
- source_word: וְדַבֵּר עִמָּהֶם מִשָּׁמָיִם
  english_pob_choice: and spoke with them from heaven
  chosen_spanish: y hablaste con ellos desde el cielo
  alternatives_spanish:
  - y hablaste a ellos desde el cielo
  - y hablabas con ellos desde el cielo
  lexicon: HALOT
  rationale: Se mantiene el valor de עִם con 'con ellos', como en el texto hebreo y en la nota inglesa. 'Desde el cielo' comunica מִשָּׁמָיִם de forma natural en español. 'Cielo' es preferible aquí a 'heaven' calco o a una perífrasis más abstracta.
- source_word: וַתִּתֵּן לָהֶם
  english_pob_choice: and you gave them
  chosen_spanish: y les diste
  alternatives_spanish:
  - y diste a ellos
  - y les otorgaste
  lexicon: HALOT
  rationale: נתן con ל admite dativo clítico natural en español. 'Les diste' conserva la segunda persona y evita una redundancia innecesaria. 'Otorgaste' sería más interpretativo.
- source_word: מִשְׁפָּטִים יְשָׁרִים
  english_pob_choice: upright judgments
  chosen_spanish: juicios rectos
  alternatives_spanish:
  - juicios justos
  - ordenanzas rectas
  lexicon: HALOT
  rationale: Se opta por 'juicios' para מִשְׁפָּטִים, manteniendo el sentido legal/forense del término. יְשָׁרִים se vierte como 'rectos' para preservar la idea de rectitud/estabilidad; 'justos' es posible, pero tiende a solaparse con la serie siguiente.
- source_word: וְתוֹרוֹת אֱמֶת
  english_pob_choice: true laws
  chosen_spanish: leyes verdaderas
  alternatives_spanish:
  - leyes de verdad
  - instrucciones verdaderas
  lexicon: HALOT
  rationale: תוֹרוֹת en plural puede significar 'leyes' o 'instrucciones'. Aquí, por la lista legal acumulativa, 'leyes' comunica bien la categoría sin perder el paralelo. אֱמֶת se traduce como 'verdaderas' para reflejar el valor de confiabilidad y verdad; la alternativa 'leyes de verdad' sería más literal, pero menos natural en español.
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' es un equivalente estable para חֻקִּים en registros bíblicos y conserva la diferenciación dentro de la serie legal. ''Ordenanzas'' también sería viable, pero ''estatutos'' encaja mejor con la secuencia.'
- source_word: וּמִצְוֺת
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: HALOT
  rationale: מִצְוֺת se vierte de manera natural y fiel como 'mandamientos', término común y preciso en el campo del pacto y la obediencia. 'Preceptos' es posible, pero menos directo para la lectura general.
- source_word: טוֹבִים
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - benignos
  - excelentes
  lexicon: HALOT
  rationale: El adjetivo final modifica la pareja de 'estatutos y mandamientos'. 'Buenos' preserva la evaluación sencilla del hebreo sin añadir un matiz demasiado interpretativo como 'beneficiosos' o 'excelentes'.
theological_decisions:
- issue: Mantener la serie legal diferenciada sin fusionar términos
  english_pob_reading: Distinguish the four legal nouns as 'judgments,' 'laws,' 'statutes,' and 'commandments.'
  chosen_spanish_reading: Distinguir 'juicios', 'leyes', 'estatutos' y 'mandamientos'.
  alternative_spanish_readings:
  - Reducir la serie a 'leyes y mandamientos'
  - Traducir תּוֹרוֹת como 'instrucciones'
  rationale: El hebreo acumula vocabulario jurídico-covenantal para subrayar la plenitud y confiabilidad de la revelación en Sinaí. En español, conservar términos diferenciados evita aplanar la textura del texto y respeta la intención retórica del original.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y sin cambios necesarios; esta propuesta sigue el sentido consolidado del texto hebreo y la diferenciación léxica auditada en la POB inglesa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo porque el texto hebreo no contiene el tetragrámaton.
  - Se mantiene el registro solemne y la segunda persona directa a Dios, coherente con la oración de Nehemías 9.
  - '''Cielo'' se usa para מִשָּׁמָיִם en un contexto teofánico, sin suavizar la trascendencia del original.'
  - La serie jurídica se conserva con cuatro campos léxicos distintos para reflejar la acumulación hebrea.
  - Los marcadores de nota aparecen solo donde hay alternativas reales en el texto español.
