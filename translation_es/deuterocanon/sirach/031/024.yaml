translation:
  language: es
  text: Dolor y desvelo inquieto[a], y vómito y ahogo[b], y un rostro alterado[c] con un hombre necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto hebreo de esta línea es difícil, especialmente los síntomas intermedios y la expresión de un rostro alterado. El paralelo griego de este versículo es completamente distinto, lo que indica una divergencia textual mayor en la tradición.
    reason: textual_variant
  - marker: b
    text: 'O: «asfixia», «atragantamiento» o «sofoco».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un rostro vuelto» o «una expresión torcida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מכאוב / θύων υἱὸν...
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - sufrimiento
  lexicon: HALOT; griego paralelo de Sirach 31:24
  rationale: Aunque el hebreo de la línea hebrea del expediente difiere notablemente del griego, la tradición inglesa trató el miembro hebreo como una serie de síntomas físicos. 'Dolor' es el equivalente más natural y sobrio en español para ese valor físico.
- source_word: ונדד ישנה
  english_pob_choice: wakeful wandering
  chosen_spanish: vagar despierto
  alternatives_spanish:
  - desvelo errante
  - andar sin dormir
  - insomnio inquieto
  lexicon: HALOT
  rationale: La imagen combina la idea de 'vagar' con la de sueño ausente o expulsado. 'Vagar despierto' conserva la vivacidad de la expresión sin volverla demasiado explicativa.
- source_word: ומער
  english_pob_choice: vomiting
  chosen_spanish: vómito
  alternatives_spanish:
  - náusea
  - arcadas
  - retching
  lexicon: HALOT
  rationale: La lectura inglesa más reciente optó por 'vomiting' por claridad lexical. En español, 'vómito' transmite el efecto corporal de manera directa y natural en una lista de síntomas.
- source_word: ותשניק
  english_pob_choice: choking
  chosen_spanish: ahogo
  alternatives_spanish:
  - asfixia
  - atragantamiento
  - sofoco
  lexicon: HALOT
  rationale: El campo semántico apunta a constricción o sofocación. 'Ahogo' funciona bien en español junto a 'vómito' y conserva el carácter físico de la lista.
- source_word: ופני הפוכות
  english_pob_choice: a distorted face
  chosen_spanish: un rostro desfigurado
  alternatives_spanish:
  - un rostro vuelto
  - una expresión torcida
  - un rostro alterado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y algo incierta. 'Desfigurado' refleja mejor en español la alteración visible del rostro que una traducción demasiado literal como 'vuelto'.
- source_word: עם איש כסיל
  english_pob_choice: with a foolish man
  chosen_spanish: con un hombre necio
  alternatives_spanish:
  - con un necio
  - en compañía de un necio
  - con un hombre insensato
  lexicon: HALOT
  rationale: '''Neceo'' reproduce la categoría sapiencial de כסיל con una palabra natural en español. Se mantiene el singular masculino del hebreo.'
theological_decisions:
- issue: Divergencia textual entre el hebreo de la base y el paralelo griego
  english_pob_reading: The Hebrew text of this line is difficult... The Greek parallel for this verse is entirely different, indicating a major textual divergence in the tradition.
  chosen_spanish_reading: Se traduce la línea hebrea transmitida en el expediente, señalando en nota que el paralelo griego de Sirach 31:24 es completamente distinto.
  alternative_spanish_readings:
  - Seguir el griego y ofrecer otra sentencia totalmente diferente
  - Conflar ambas tradiciones en una sola redacción
  rationale: El expediente pide trabajar desde la fuente original disponible y auditar la tensión textual, no resolverla por armonización. Por eso la nota registra la divergencia sin ocultarla.
  doctrine_reference: Crítica textual / transmisión textual del Eclesiástico
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la línea hacia 'wakeful wandering', 'vomiting' y 'a distorted face'. La presente propuesta sigue esa revisión donde mejora la precisión, pero conserva en español el matiz poético y físico de la serie de síntomas.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y cualquier terminología de sustitución no pertinente, porque el versículo no contiene el tetragrámaton.
  - '''Hombre necio'' mantiene el tono sapiencial de כסיל sin suavizarlo a ''tonto'' o ''insensato'' en exceso.'
  - La puntuación en serie reproduce el encadenamiento de síntomas del texto base y facilita la lectura pública.
