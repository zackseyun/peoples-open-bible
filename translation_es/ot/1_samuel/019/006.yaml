translation:
  language: es
  text: 'Saúl escuchó a Jonatán[a], y Saúl juró: «¡Vive Yahvé! No será puesto a muerte».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «escuchó la voz de Jonatán». La expresión idiomática puede significar escuchar con atención o hacer caso de alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'Fórmula de juramento hebrea: literalmente, «¡Vive Yahvé, si es puesto a muerte…!». Aquí el «si» es elíptico y expresa una negación enfática: «ciertamente no será puesto a muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - prestó atención a
  lexicon: HALOT
  rationale: El hebreo שׁמע puede significar tanto 'oír' como 'escuchar/obedecer'. En este contexto, Saúl no solo percibe el sonido, sino que atiende al ruego de Jonatán; por eso 'escuchó' conserva el matiz responsivo que la POB inglesa documenta con 'listened'.
- source_word: בְּקוֹל
  english_pob_choice: to Jonathan’s voice
  chosen_spanish: la voz de Jonatán
  alternatives_spanish:
  - a Jonatán
  - la voz de Jonatán
  lexicon: HALOT
  rationale: La expresión idiomática hebrea שׁמע בקול suele significar 'escuchar/obedecer la voz de'. En español, 'la voz de Jonatán' reproduce con naturalidad el giro sin perder la imagen auditiva del hebreo.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prometió con juramento
  lexicon: HALOT
  rationale: El verbo significa 'jurar' o 'tomar juramento'. 'Juró' es la forma más directa y natural para introducir la fórmula solemne que sigue.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Tan cierto como vive Yahvé!
  - ¡Por la vida de Yahvé!
  lexicon: HALOT
  rationale: La fórmula hebrea de juramento literalmente dice 'vive Yahvé'. Dado el estándar del proyecto para יְהוָה, se mantiene 'Yahvé' en lugar de sustituirlo por un título; el valor exclamativo del juramento en español se expresa con '¡Vive Yahvé!'.
- source_word: אִם יוּמָת
  english_pob_choice: he shall not be put to death
  chosen_spanish: que no morirá
  alternatives_spanish:
  - que no será muerto
  - que ciertamente no será puesto a muerte
  lexicon: HALOT
  rationale: En fórmulas de juramento, אִם puede funcionar elípticamente con negación implícita; la POB inglesa explicita el sentido de negación fuerte. En español, 'que no morirá' comunica de forma idiomática e inequívoca la intención juramentada, sin dejar de reflejar la construcción elíptica del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la política del proyecto pide su transliteración como nombre propio. 'Yahvé' preserva el nombre del pacto y evita la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la fórmula de juramento con אִם יוּמָת
  english_pob_reading: he shall not be put to death
  chosen_spanish_reading: que no morirá
  alternative_spanish_readings:
  - que no será puesto a muerte
  - que ciertamente no morirá
  rationale: 'La POB inglesa documenta que el ''if'' hebreo es elíptico y comunica negación enfática. La redacción española conserva esa fuerza sin forzar una literalidad opaca: la negación expresa la certeza del juramento.'
  doctrine_reference: Uso contextual de fórmulas de juramento en hebreo bíblico (cf. HALOT, אִם en juramentos)
translation_notes:
  revision_awareness: La POB inglesa permaneció sin cambios en su última revisión (2026-04-23), con acuerdo alto entre revisores y sin observaciones; esta redacción sigue esa línea, trasladando al español las mismas decisiones léxicas y la misma lectura de la fórmula de juramento.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se preserva el matiz responsivo de שׁמע como 'escuchó' y no solo 'oyó'.
  - La fórmula juramentaria se hace idiomática en español sin perder la negación elíptica del hebreo.
  - Se evita 'Cristo' u այլ terminología no pertinente; no hay términos de conflicto adicional en este versículo.
