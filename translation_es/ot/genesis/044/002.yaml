  to: Y pondrás mi copa, la copa de plata, en la boca[a] del saco del menor, junto con la plata de su compra de grano[b]. Y él hizo conforme a la palabra de José, que había dicho.
  rationale: Se reemplaza 'talega' por 'saco' para un español más neutral y acorde con el contexto. Se cambia 'dinero' por 'plata' para seguir mejor la decisión léxica documentada del POB inglés sobre כֶּסֶף. Se deja la imagen de 'boca' con nota explicativa. Se ajusta la cláusula final a un español más natural conservando el sentido del hebreo.
