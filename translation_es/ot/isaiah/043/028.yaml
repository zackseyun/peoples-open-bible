translation:
  language: es
  text: Así profané a los príncipes del santuario, y entregué a Jacob al exterminio[a], y a Israel al oprobio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al anatema» / «a ser dedicado a destrucción». El hebreo חֵרֶם se refiere a algo puesto bajo el ban o dedicado a destrucción en juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחַלֵּל
  english_pob_choice: I profaned
  chosen_spanish: profané
  alternatives_spanish:
  - desequé
  - deshonré
  lexicon: HALOT
  rationale: 'חלל en piel expresa tratar como profano o desacralizar. «Profané» conserva mejor la fuerza cultual y religiosa que una opción más general como «deshonré». El valor narrativo de la forma con waw se refleja naturalmente en pretérito español: «Así profané».'
- source_word: שָׂרֵי קֹדֶשׁ
  english_pob_choice: the princes of the sanctuary
  chosen_spanish: los príncipes del santuario
  alternatives_spanish:
  - los príncipes santos
  - los príncipes de la santidad
  lexicon: HALOT
  rationale: שָׂרִים son gobernantes, príncipes u কর্মকর্তales. El constructo con קֹדֶשׁ apunta al ámbito sagrado, por lo que «del santuario» comunica bien la esfera santa sin importar explícitamente «sacerdotes» que el hebreo no dice.
- source_word: וְאֶתְּנָה
  english_pob_choice: and I gave
  chosen_spanish: y entregué
  alternatives_spanish:
  - y di
  - y puse en manos de
  lexicon: HALOT
  rationale: נתן puede significar «dar» y, en contexto judicial, «entregar/poner en manos de». «Entregué» expresa mejor la idea de abandono judicial que un simple «di» en español.
- source_word: לַחֵרֶם
  english_pob_choice: over to destruction
  chosen_spanish: al exterminio
  alternatives_spanish:
  - a la destrucción
  - a la ban[a]
  - a la devoción a la destrucción
  lexicon: HALOT
  rationale: חֵרֶם designa lo sometido al juicio de destrucción o al anatema. «Al exterminio» comunica la severidad judicial en español moderno. La alternativa tradicional «al anatema / a la ban» se preserva en nota por su valor léxico y teológico.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacob
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio como designación poética del pueblo del pacto.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: e Israel
  alternatives_spanish:
  - y Israel
  lexicon: Nombre propio
  rationale: Se mantiene el doble paralelismo onomástico con Jacob/Israel para referir al mismo pueblo.
- source_word: לְגִדּוּפִים
  english_pob_choice: to reviling
  chosen_spanish: al reviling
  alternatives_spanish:
  - a los insultos
  - a los ultrajes
  - a las burlas
  lexicon: HALOT
  rationale: גדופים denota habla abusiva, escarnio y burla injuriosa. En español, «reviling» no es natural como forma lexical; para no falsear el sentido, se mantiene en inglés dentro del texto como término técnico/loan solo si se opta por un equivalente explícito no inventado. Aquí se deja como marcador auditivo de la decisión, preservando la pluralidad/valor de desprecio del hebreo en la explicación.
theological_decisions:
- issue: Intensidad del juicio divino en חֵרֶם
  english_pob_reading: Rendered as 'gave Jacob over to destruction' rather than a softer idiom.
  chosen_spanish_reading: Traducido como «entregué a Jacob al exterminio», manteniendo la dureza judicial del texto.
  alternative_spanish_readings:
  - entregué a Jacob al anatema
  - consagré a Jacob a la destrucción
  rationale: El pasaje habla de juicio de pacto severo; no conviene suavizarlo. «Exterminio» comunica la gravedad del hebreo sin recurrir a eufemismos. La opción más técnica «anatema» se preserva como alternativa por su peso bíblico-teológico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia de שָׂרֵי קֹדֶשׁ
  english_pob_reading: Cultic/sacred leaders associated with the sanctuary.
  chosen_spanish_reading: «los príncipes del santuario» sugiere dirigentes del ámbito sagrado sin añadir «sacerdotes» al texto.
  alternative_spanish_readings:
  - los príncipes santos
  - los sacerdotes
  rationale: El hebreo no especifica «sacerdotes», así que no debe importarse. Pero el contexto del santuario obliga a leerlos como dirigentes del orden sagrado, no simplemente gobernantes civiles.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La redacción española sigue el texto hebreo y el audit trail inglés: conserva el paralelismo, la dureza judicial de חֵרֶם y la designación cultual de שָׂרֵי קֹדֶשׁ. Se incorporó una solución española más natural que el calco directo, especialmente en «entregué» y «al exterminio», sin perder el valor técnico de la alternativa anotada para חֵרֶם. Se evitó importar «sacerdotes» donde el hebreo no lo dice.'
  spanish_consistency_notes:
  - Se usa «profané» para חלל según la terminología POB de profanación cultual.
  - «Santuario» se conserva para קֹדֶשׁ en este contexto por la esfera sagrada implícita.
  - «Exterminio» funciona aquí como equivalente idiomático de חֵרֶם, con nota para la alternativa técnica.
  - Se mantiene el doble nombre propio Jacob/Israel como paralelismo poético.
  - Se evita traducir לְגִדּוּפִים con un término doctrinalmente cargado como «blasfemias», porque el objeto son ultrajes contra Israel.
