base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/011.yaml
  text: Then the king of the South will become enraged and go out and fight with him[a], with the king of the North; and he will raise up a great multitude[c][b], but the multitude will be given into his hand.
  footnotes:
  - marker: a
    text: Or 'will be stirred up' / 'will become embittered.' The Hebrew verb conveys intense inner agitation leading to action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'fight with him, with the king of the North'—that is, engage in battle against him.
    reason: lexical_alternative
  - marker: c
    text: '''Into his hand'' is a Hebrew idiom meaning ''into his power.'''
    reason: cultural_note
