translation:
  language: es
  text: Ten misericordia del pueblo llamado por tu nombre[a], de Israel, tu primogénito[c][b], al que has adquirido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que lleva tu nombre'. El hebreo expresa identidad y pertenencia a Dios mediante este giro idiomático.
    reason: lexical_alternative
  - marker: b
    text: O 'al que has comprado', 'al que has poseído' o posiblemente 'al que has creado'. El verbo hebreo puede abarcar varios sentidos relacionados.
    reason: alternative_reading
  - marker: c
    text: La tradición griega de la LXX ofrece aquí una línea sustancialmente distinta; esta traducción sigue el testimonio hebreo conservado.
    reason: textual_variant
lexical_decisions:
- source_word: רַחֵם / πρὸ βροντῆς κατασπεύδει ἀστραπή
  english_pob_choice: Have mercy
  chosen_spanish: Ten misericordia
  alternatives_spanish:
  - Muestra compasión
  - Apiádate
  lexicon: HALOT; BDAG
  rationale: La petición hebrea pide acción compasiva; en español, 'ten misericordia' mantiene el tono orante y la fuerza imperativa sin sonar tan rígido como un calco. No se sigue la línea griega de la LXX porque el paquete fuente da primacía al testimonio hebreo para este versículo.
- source_word: עַל־עָם
  english_pob_choice: on the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - sobre el pueblo
  - de tu pueblo
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo sin posesivo explícito. 'Del pueblo' preserva ese valor colectivo y evita añadir 'tu' en el cuerpo principal, aunque la frase siguiente deja claro que pertenece a Dios.
- source_word: נִקְרָא בִּשְׁמֶךָ
  english_pob_choice: called by your name
  chosen_spanish: llamado por tu nombre
  alternatives_spanish:
  - que lleva tu nombre
  - nombrado por tu nombre
  lexicon: HALOT
  rationale: '''Llamado por tu nombre'' conserva el giro idiomático del hebreo y su sentido de pertenencia/covena​ntalidad. ''Que lleva tu nombre'' es posible, pero atenúa un poco la forma verbal del original.'
- source_word: בְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: tu primogénito
  alternatives_spanish:
  - tu hijo primogénito
  - el primogénito
  lexicon: HALOT
  rationale: '''Primogénito'' es la equivalencia natural en español. Se añade el posesivo ''tu'' porque el contexto de relación con Dios está explícito en la lectura hebrea y en la tradición auditada en inglés.'
- source_word: קָנִיתָה
  english_pob_choice: whom you acquired
  chosen_spanish: al que has adquirido
  alternatives_spanish:
  - al que has comprado
  - al que has poseído
  - al que has creado
  lexicon: HALOT
  rationale: '''Adquirir'' reproduce la amplitud semántica de קנה sin comprometerse de antemano con ''comprar'', ''poseer'' o ''crear''. En español, ''al que has adquirido'' suena natural y conserva la relación de pertenencia histórica/covenantal.'
- source_word: Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: N/A
  rationale: Se mantiene el nombre propio sin transliteración adicional, conforme al uso bíblico normal en español.
theological_decisions:
- issue: Identidad pactal expresada por 'llamado por tu nombre'
  english_pob_reading: Retain the idiom as a marker of divine ownership/covenant association
  chosen_spanish_reading: Conservar el modismo como marcador de pertenencia y alianza
  alternative_spanish_readings:
  - Reformular como 'que te pertenece'
  - explicitar 'que lleva tu nombre'
  rationale: El modismo bíblico tiene peso teológico y no debe vaciarse en una explicación plana. 'Llamado por tu nombre' mantiene la textura pactal sin añadir interpretación extra.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
- issue: Sentido de קנה aplicado a Israel
  english_pob_reading: Render as 'whom you acquired' with alternatives preserved in a note
  chosen_spanish_reading: '''al que has adquirido'' con nota de alternativas semánticas'
  alternative_spanish_readings:
  - '''al que has comprado'''
  - '''al que has poseído'''
  - '''al que has creado'''
  rationale: '''Adquirir'' es suficientemente amplio para no cerrar el campo semántico del verbo y respeta la cautela doctrinal del audit trail. Las otras posibilidades se preservan en nota porque el hebreo admite varias lecturas relacionadas.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de ''whom you acquired as firstborn'' a ''your firstborn, whom you acquired'' para ajustar el orden hebreo. La versión española sigue ese orden revisado: ''tu primogénito, al que has adquirido''. No se armonizó con la línea griega, porque el expediente fuente privilegia el testimonio hebreo para este versículo.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' como sustituto del nombre divino porque aquí el versículo hebreo no contiene el tetragrámaton; la frase trata de pertenencia pactal más que de una cita directa del nombre.
  - '''Primogénito'' se mantuvo en singular y con posesivo, acorde con la relación de Israel con Dios en el contexto hebreo auditado.'
  - Se prefirió un español bíblico claro y moderno, sin arcaísmos innecesarios, pero conservando el registro reverente.
