translation:
  language: es
  text: Aparta de ti la perversidad de la boca[a], y mantén lejos de ti los labios torcidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una boca perversa» y «labios perversos». Los sustantivos hebreos en ambas cláusulas describen un habla moralmente torcida o distorsionada.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָסֵר
  english_pob_choice: Put away
  chosen_spanish: Aparta
  alternatives_spanish:
  - Quita
  - Retira
  lexicon: HALOT
  rationale: El imperativo exige una acción deliberada de separar o alejar. «Aparta» es natural en español y conserva la fuerza de rechazo activo del hebreo.
- source_word: מִמְּךָ
  english_pob_choice: from you / from yourself
  chosen_spanish: de ti
  alternatives_spanish:
  - de ti mismo
  - de tu lado
  lexicon: HALOT
  rationale: La preposición con sufijo de segunda persona marca separación del destinatario. «De ti» mantiene la referencia directa sin forzar un reflexivo que suena menos natural en español.
- source_word: עִקְּשׁוּת
  english_pob_choice: crookedness / crooked
  chosen_spanish: perversidad
  alternatives_spanish:
  - torcedura
  - torcimiento
  - desviación
  lexicon: HALOT
  rationale: El sustantivo expresa algo moralmente torcido o retorcido. «Perversidad» comunica bien esa cualidad moral en español y evita una imagen corporal poco natural en esta construcción nominal.
- source_word: פֶּה
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca
  - habla
  lexicon: HALOT
  rationale: Aunque literalmente es «boca», en español la combinación «perversidad de la boca» suena más idiomática que un calco rígido. Mantiene el símbolo corporal del hebreo y el paralelismo con «labios».
- source_word: וּלְזוּת
  english_pob_choice: devious
  chosen_spanish: torcidos
  alternatives_spanish:
  - desviados
  - perversos
  - retorcidos
  lexicon: HALOT
  rationale: El término apunta a distorsión o desviación en el habla. «Torcidos» conserva el campo semántico de lo moralmente desviado y hace juego con la imagen concreta de «labios».
- source_word: שְׂפָתַיִם
  english_pob_choice: lips
  chosen_spanish: los labios
  alternatives_spanish:
  - labios
  - la boca
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de los labios para respetar el paralelismo poético con la primera cláusula.
- source_word: הַרְחֵק
  english_pob_choice: keep ... far
  chosen_spanish: aleja
  alternatives_spanish:
  - mantén lejos
  - pon lejos
  - distancia
  lexicon: HALOT
  rationale: El causativo de רחק pide hacer que algo esté lejos. «Aleja» reproduce bien la acción intensa y paralela al primer imperativo.
- source_word: מִמֶּךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de ti mismo
  - lejos de ti
  lexicon: HALOT
  rationale: La marca de separación se traduce con naturalidad como «de ti», preservando el destinatario como objeto de la acción.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. Además, se mantuvo la correspondencia poética de dos imperativos paralelos y se evitó una traducción mecánica que obscureciera el sustantivo abstracto del primer hemistiquio.
  spanish_consistency_notes:
  - Se prefirió «Aparta» y «aleja» para reflejar ambos imperativos causativos con estilo natural y coherente.
  - Se conservó la dicotomía corporal «boca / labios» para respetar el paralelismo hebreo.
  - «Perversidad» y «torcidos» comparten el campo semántico de desviación moral sin colapsar ambos miembros en una sola palabra.
  - La nota textual se ancla en la primera cláusula para señalar la alternativa léxica sin duplicar marcadores.
