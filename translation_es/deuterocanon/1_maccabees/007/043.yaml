translation:
  language: es
  text: Y los campamentos entablaron batalla[a] el decimotercer día del mes de Adar, y el campamento de Nicanor fue destrozado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los ejércitos entablaron batalla». El griego usa «campamentos» para designar a las fuerzas militares enfrentadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψαν
  english_pob_choice: joined battle
  chosen_spanish: entablaron batalla
  alternatives_spanish:
  - se unieron en batalla
  - entraron en combate
  - se enfrentaron en batalla
  lexicon: LSJ
  rationale: En contexto militar, συνάπτω expresa el cierre o encuentro efectivo de fuerzas en combate. «Entablaron batalla» conserva la idea de inicio del enfrentamiento sin volverla demasiado interpretativa.
- source_word: αἱ παρεμβολαὶ
  english_pob_choice: the camps
  chosen_spanish: las campamentos
  alternatives_spanish:
  - los ejércitos
  - las fuerzas
  - los campamentos
  lexicon: LSJ
  rationale: El griego usa el plural de «campamento» para referirse a las fuerzas militares enfrentadas. En español, la forma natural y fiel es «los campamentos», pero se mantiene la referencia material a los campamentos militares más que a un abstracto «ejércitos».
- source_word: τῇ τρισκαιδεκάτῃ
  english_pob_choice: on the thirteenth day
  chosen_spanish: el día trece
  alternatives_spanish:
  - al trece de
  - el trece
  lexicon: LSJ
  rationale: La fecha en dativo exige una expresión temporal clara en español. «El día trece» reproduce la función temporal y deja el mes para el complemento siguiente.
- source_word: τοῦ μηνὸς Ἀδάρ
  english_pob_choice: of the month Adar
  chosen_spanish: del mes de Adar
  alternatives_spanish:
  - de Adar
  - en el mes de Adar
  lexicon: LSJ
  rationale: Es una fórmula calendárica directa. «Del mes de Adar» es transparente y mantiene el valor genitivo del griego.
- source_word: συνετρίβη
  english_pob_choice: was crushed
  chosen_spanish: fue destrozado
  alternatives_spanish:
  - fue aplastado
  - fue quebrantado
  - fue derrotado
  lexicon: LSJ
  rationale: συντρίβω expresa una derrota violenta, más fuerte que «derrotar». «Fue destrozado» preserva el matiz de ruina completa que el inglés POB marcó con «was crushed».
- source_word: ἡ παρεμβολὴ Νικάνορος
  english_pob_choice: Nicanor’s camp
  chosen_spanish: el campamento de Nicanor
  alternatives_spanish:
  - el campamento de Nicanor
  - las fuerzas de Nicanor
  - el ejército de Nicanor
  lexicon: LSJ
  rationale: El singular final identifica el campamento/fuerza de Nicanor. «Campamento de Nicanor» conserva la correspondencia con el plural inicial y evita diluir el término técnico.
translation_notes:
  revision_awareness: Se siguió de cerca el griego de Swete y el audit trail inglés. Se conservó la imagen militar de «campamentos» y la fuerza de συντρίβω con una traducción intensa en español, evitando suavizar la derrota. No se introdujeron variantes textuales porque el packet muestra acuerdo alto y solo una observación léxica menor.
  spanish_consistency_notes:
  - Se mantuvo «Adar» como nombre del mes, siguiendo el paquete fuente y el inglés POB.
  - Se prefirió un español bíblico moderno y claro, sin sustituir el término militar por equivalentes demasiado genéricos.
  - La puntuación refleja una sola oración coordinada con la estructura del griego.
