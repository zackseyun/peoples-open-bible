translation:
  language: es
  text: Y para nosotros[a], que hemos asumido la dificultad de hacer la obra abreviada, la tarea no es fácil, sino de sudor y desvelo;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «que hemos mostrado la dificultad de la obra abreviada». La expresión griega es algo idiomática; la traducción explicita el sentido de asumir y soportar el esfuerzo implicado en producir esta versión abreviada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμῖν ... τοῖς
  english_pob_choice: for us, who
  chosen_spanish: para nosotros, que
  alternatives_spanish:
  - a nosotros, que
  - para nosotros, los que
  lexicon: LSJ
  rationale: La construcción dativo + artículo + participio identifica a los hablantes como el grupo caracterizado por la acción. «Para nosotros, que» suena natural en español y conserva la autodesignación explicativa sin volverla pesada.
- source_word: τὴν κακοπάθειαν
  english_pob_choice: the hardship
  chosen_spanish: la dificultad
  alternatives_spanish:
  - la penuria
  - el sufrimiento
  - el trabajo penoso
  lexicon: LSJ
  rationale: κακοπάθεια expresa pasar penurias o dificultad. En este prólogo editorial, «dificultad» comunica el esfuerzo implicado sin añadir una connotación de persecución que el contexto no exige.
- source_word: ἐπιδεδειγμένοις
  english_pob_choice: have undertaken
  chosen_spanish: hemos asumido
  alternatives_spanish:
  - hemos mostrado
  - nos hemos aplicado a
  - hemos afrontado
  lexicon: LSJ
  rationale: El participio perfecto medio/pasivo de ἐπιδείκνυμι puede sugerir literalmente «haber mostrado», pero con un objeto abstracto como κακοπάθεια funciona idiomáticamente como asumir o soportar un esfuerzo. «Hemos asumido» conserva ese sentido de compromiso con el trabajo.
- source_word: τῆς ἐπιτομῆς
  english_pob_choice: of making the abridgment
  chosen_spanish: de la abreviación
  alternatives_spanish:
  - del resumen
  - de la epitome
  - de la abreviatura
  lexicon: LSJ
  rationale: ἐπιτομή significa una obra abreviada o un compendio. «Abreviación» mantiene la idea de condensación textual y evita una paráfrasis más interpretativa sobre la acción de componerla.
- source_word: οὐ ῥᾴδιον
  english_pob_choice: is not easy
  chosen_spanish: no es fácil
  alternatives_spanish:
  - no es sencillo
  - no es cosa ligera
  - no es simple
  lexicon: LSJ
  rationale: Es la equivalencia más directa y natural para el predicado negativo en este contexto, preservando la valoración explícita de dificultad.
- source_word: ἱδρῶτος ... καὶ ἀγρυπνίας
  english_pob_choice: of sweat and sleeplessness
  chosen_spanish: de sudor e insomnio
  alternatives_spanish:
  - de sudor y desvelo
  - de trabajo y vigilia
  - con sudor e insomnio
  lexicon: LSJ
  rationale: Los genitivos describen la índole del trabajo. «Sudor e insomnio» conserva la imaginería corporal y la dureza del esfuerzo mejor que una abstracción, y «insomnio» refleja el efecto de αγρυπνία de forma clara en español.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the task
  chosen_spanish: la tarea
  alternatives_spanish:
  - el asunto
  - el trabajo
  - la obra
  lexicon: LSJ
  rationale: πρᾶγμα aquí alude al trabajo en curso, es decir, la obra de abreviar. «La tarea» es idiomática, concisa y mantiene el sentido de labor encomendada.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en el sentido general: una autodescripción de los redactores como personas que afrontan el trabajo de una abreviación, y que lo hacen con gran esfuerzo. La traducción española mantiene ese valor idiomático sin forzar una literalidad extraña; se eligió «abreviación» para ἐπιτομή y «sudor e insomnio» para conservar la imagen concreta del original. No se observan revisiones relevantes en el tramo proporcionado.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o cualquier convención de ocultamiento, porque aquí no aparece el Tetragrámaton.
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Abreviación» se usa en sentido de obra abreviada/compendio, no de «acortar» en sentido común.
  - La puntuación reproduce el cierre sintáctico del griego con punto y coma final.
