translation:
  language: es
  text: 'Para el director del coro: según Mahalath[a]. Un Maskil de David[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O quizá un término musical o litúrgico; el significado de «Mahalath» es incierto.
    reason: lexical_alternative
  - marker: b
    text: «Maskil» es un término técnico en los encabezados de los salmos, posiblemente una composición instructiva o contemplativa.
    reason: lexical_alternative
  - marker: c
    text: El hebreo «de David» puede indicar autoría, asociación, dedicación o pertenencia a una colección.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Al maestro de coro
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el término señala a quien dirige la ejecución musical. «Director del coro» expresa bien la función en español moderno sin volverlo arcaico ni precisar más de lo que el hebreo exige.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - con la melodía de
  - al tono de
  lexicon: HALOT
  rationale: En este tipo de encabezado, עַל puede introducir una indicación de melodía, estilo o modo de ejecución. «Según» mantiene esa relación abierta y suena natural en español, sin forzar una lectura técnica específica.
- source_word: מָחֲלַת
  english_pob_choice: Mahalath
  chosen_spanish: Mahalath
  alternatives_spanish:
  - Mahalat
  - enfermedad
  lexicon: HALOT
  rationale: El referente es incierto; probablemente sea un nombre de melodía o término musical/litúrgico. La transliteración preserva la incertidumbre documentada y evita una traducción especulativa como «enfermedad».
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo contemplativo
  - Un canto instructivo
  lexicon: HALOT
  rationale: Es un término técnico de los encabezados de los salmos cuya fuerza exacta sigue debatida. Mantener «Maskil» conserva la etiqueta tradicional y evita una precisión falsa en la línea principal.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל puede indicar autoría, asociación, dedicación o relación con una colección. «De David» conserva esa ambigüedad, como en el texto inglés de referencia, sin decidir más de lo que el hebreo permite.
theological_decisions:
- issue: Naturaleza del encabezado y ambigüedad de la atribución davídica
  english_pob_reading: The superscription is translated as part of the canonical verse, and לְדָוִד remains ambiguous with 'of David.'
  chosen_spanish_reading: El encabezado se traduce como parte del versículo canónico, y «de David» mantiene la ambigüedad de la relación davídica.
  alternative_spanish_readings:
  - Tratar el encabezado como nota editorial no traducida
  - Traducir לְדָוִד como «por David»
  rationale: El hebreo presenta el encabezado como parte del texto. Traducirlo respeta la forma canónica del salmo; conservar «de David» evita atribuir con demasiada fuerza autoría, dedicación o procedencia.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el presente borrador sigue esa lectura de alta coincidencia y conserva la incertidumbre documentada en el encabezado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la transliteración de términos técnicos inciertos («Mahalath», «Maskil») para no sobreinterpretar el encabezado.
  - La preposición «de» en «de David» reproduce la ambigüedad semántica del hebreo לְ sin concretarla en exceso.
