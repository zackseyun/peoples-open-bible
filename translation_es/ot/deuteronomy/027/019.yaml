revisions:
- from: 'Maldito sea el que pervierta[a] el derecho[b] del forastero[c], del huérfano y de la viuda. Y todo el pueblo dirá: «Amén».'
  to: 'Maldito sea el que pervierta[a] la justicia debida[b] al forastero[c], al huérfano[d] y a la viuda. Y todo el pueblo dirá: «Amén».'
  rationale: 'La revisión es menor pero útil: alinea mejor מִשְׁפָּט con la decisión documentada del POB (''la justicia debida''), preserva la alternativa lexical de יָתוֹם en una nota española natural, y pule la nota cultural de ger. El resto del borrador es fiel, claro y apropiado para el proyecto.'
