translation:
  language: es
  text: 'Entonces le dijo: «Porque no has escuchado la voz de Yahvé, he aquí, cuando te apartes de mí, el león te derribará[a].» Y cuando se apartó de él, el león lo encontró y lo derribó[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te golpeará / lo golpeó»; el hebreo usa el verbo נכה, 'golpear, herir, derribar'. En este contexto implica un golpe fatal, por lo que «derribará / derribó» expresa mejor el sentido que una simple herida, sin parafrasear como «matar».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del juicio de manera natural en español y conserva la relación causal del hebreo.
- source_word: שָׁמַעְתָּ בְּקוֹל יְהוָה
  english_pob_choice: have not listened to the voice of the LORD
  chosen_spanish: no has escuchado la voz de Yahvé
  alternatives_spanish:
  - no has obedecido la voz de Yahvé
  - no has atendido la voz de Yahvé
  lexicon: HALOT
  rationale: שׁמע con בְּקוֹל mantiene la imagen de oír/escuchar, con implicación de obediencia por contexto. 'Escuchado' preserva la metáfora auditiva sin borrar la tensión obediencia/escucha.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración directa del Tetragrámaton, según el criterio doctrinal del proyecto, en vez de sustituirlo por un título.
- source_word: הִנְּךָ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira, pues
  lexicon: HALOT
  rationale: Marca inmediatez y certeza del anuncio. 'Mira' es un equivalente natural en español contemporáneo; no se opta por 'he aquí' por su tono más arcaico.
- source_word: הוֹלֵךְ מֵאִתִּי
  english_pob_choice: when you depart from me
  chosen_spanish: cuando te apartes de mí
  alternatives_spanish:
  - cuando salgas de mi presencia
  - cuando te vayas de mí
  lexicon: HALOT
  rationale: El participio con מֵאִתִּי expresa una partida inminente desde la cercanía del hablante; 'te apartes de mí' conserva esa relación personal y suena natural en español.
- source_word: וְהִכְּךָ הָאַרְיֵה
  english_pob_choice: the lion will strike you down
  chosen_spanish: el león te herirá
  alternatives_spanish:
  - el león te golpeará
  - el león te matará
  lexicon: HALOT
  rationale: נכה es un verbo amplio que aquí implica un golpe fatal. 'Herirá' conserva el verbo de herir/golpear sin explicitar muerte, dejando que el contexto narrativo lo determine.
- source_word: וַיֵּלֶךְ מֵאֶצְלוֹ
  english_pob_choice: when he departed from him
  chosen_spanish: se apartó de él
  alternatives_spanish:
  - se fue de su lado
  - salió de su presencia
  lexicon: HALOT
  rationale: Resume la salida inmediata del personaje y mantiene la relación espacial/personal del hebreo.
- source_word: וַיִּמְצָאֵהוּ
  english_pob_choice: found him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - dio con él
  - lo halló
  lexicon: HALOT
  rationale: Traducción directa y narrativa de מצא.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo mató
  lexicon: HALOT
  rationale: Repite el campo semántico de נכה con la misma moderación lexical que en la primera ocurrencia, preservando la posible fatalidad sin añadir una explicitación que el hebreo no formula aquí.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. El proyecto evita la sustitución por un título y usa una transliteración reverente y auditable en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre oír y obedecer en בְּקוֹל יְהוָה
  english_pob_reading: have not listened to the voice of the LORD
  chosen_spanish_reading: no has escuchado la voz de Yahvé
  alternative_spanish_readings:
  - no has obedecido la voz de Yahvé
  - no has oído la voz de Yahvé
  rationale: Se preserva la imagen verbal de escuchar la voz, dejando que el contexto de reprensión comunique la desobediencia implícita, sin convertirla en una glosa explicativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Fuerza del verbo נכה en la advertencia y cumplimiento
  english_pob_reading: the lion will strike you down / struck him down
  chosen_spanish_reading: el león te herirá / lo hirió
  alternative_spanish_readings:
  - el león te golpeará / lo golpeó
  - el león te matará / lo mató
  rationale: נכה puede implicar un golpe mortal según el contexto. En español, 'herir' conserva el paralelo verbal entre anuncio y cumplimiento sin resolver de antemano la consecuencia fatal que el relato deja implícita.
  doctrine_reference: HALOT; narrativa de cumplimiento inmediato
translation_notes:
  revision_awareness: El audit trail inglés mostró una revisión reciente que cambió 'look' por 'behold' para reflejar mejor הִנְּךָ y un control de consistencia alto con sólo ajustes menores. La presente redacción sigue esa preferencia de formalidad mediante 'mira' al inicio del anuncio, pero prioriza español natural y mantiene la repetición de נכה con 'herir' en ambos miembros para conservar la coherencia léxica del hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente con el criterio del proyecto para יְהוָה.
  - Se conserva el paralelismo verbal 'herirá / hirió' para reflejar la repetición de נכה.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Escuchado la voz de Yahvé'' preserva la metáfora de oído/obediencia sin glosa doctrinal añadida.'
  - El registro es formal y publicable, pero no arcaizante.
