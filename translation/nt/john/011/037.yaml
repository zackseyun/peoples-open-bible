id: JHN.11.37
reference: John 11:37
source:
  edition: SBLGNT
  text: τινὲς δὲ ἐξ αὐτῶν εἶπαν· Οὐκ ἐδύνατο οὗτος ὁ ἀνοίξας τοὺς ὀφθαλμοὺς τοῦ τυφλοῦ ποιῆσαι ἵνα καὶ οὗτος μὴ ἀποθάνῃ;
translation:
  text: But some of them said[a], “Could not this man, who opened the eyes of the blind man, also have made it so that this man would not die?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Could he not have kept this man from dying?”
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς δὲ ἐξ αὐτῶν
  chosen: But some of them
  alternatives:
  - But some from among them
  - Now some of them
  lexicon: BDAG
  rationale: τινές with ἐξ αὐτῶν means 'some of them' or 'some from among them.' δέ is rendered 'But' to mark contrast with the preceding mourners' response.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - were saying
  lexicon: BDAG
  rationale: 'Aorist indicative is best rendered as simple past in narrative: ''said.'''
- source_word: Οὐκ ἐδύνατο
  chosen: Could not
  alternatives:
  - Was not able to
  - Could he not
  lexicon: BDAG
  rationale: The imperfect of δύναμαι in a rhetorical question naturally conveys capability in past time. English idiom favors 'Could not ... ?' rather than the more wooden 'Was not able to ... ?'.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: The demonstrative points directly to Jesus in a somewhat pointed way. 'This man' preserves the tone better than the weaker 'he'.
- source_word: ὁ ἀνοίξας τοὺς ὀφθαλμοὺς
  chosen: who opened the eyes
  alternatives:
  - the one who opened the eyes
  lexicon: BDAG
  rationale: The articular aorist participle functions attributively, identifying Jesus by the prior sign. Relative clause English is most natural.
- source_word: τοῦ τυφλοῦ
  chosen: of the blind man
  alternatives:
  - of the blind one
  lexicon: BDAG
  rationale: The genitive with adjective used substantivally refers to the specific blind man from the earlier narrative (John 9). 'Blind man' is clear and idiomatic.
- source_word: ποιῆσαι ἵνα
  chosen: have made it so that
  alternatives:
  - have caused it so that
  - have done so that
  lexicon: BDAG
  rationale: ποιέω with ἵνα here expresses causing a result. 'Have made it so that' captures the causative sense in natural English without over-paraphrasing.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: 'καί adds the further implication: the one who healed blindness could also have prevented death.'
- source_word: οὗτος
  chosen: this man
  alternatives:
  - he
  - this one
  lexicon: BDAG
  rationale: Refers to Lazarus. Repeating 'this man' preserves the Greek demonstrative and the contrast between Jesus and Lazarus.
- source_word: μὴ ἀποθάνῃ
  chosen: would not die
  alternatives:
  - might not die
  - should not die
  lexicon: BDAG
  rationale: After ἵνα in a result/purpose construction, English idiom here is best expressed as 'would not die.' 'Might not die' is possible but sounds less direct in this rhetorical question.
