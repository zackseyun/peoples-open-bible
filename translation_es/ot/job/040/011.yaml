translation:
  language: es
  text: Derrama los desbordamientos de tu ira[a][b], y mira a todo orgulloso[c], y humíllalo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esparce los desbordamientos de tu ira». El verbo hebreo también puede llevar el matiz de dispersar o esparcir con fuerza.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu nariz», un modismo para «tu ira». Aquí se expresa el sentido idiomático.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «todo orgulloso»; el singular en «humíllalo» trata a cada orgulloso de manera individual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפֵץ
  english_pob_choice: Pour out
  chosen_spanish: Haz salir
  alternatives_spanish:
  - Derrama
  - Esparce
  - Suelta
  lexicon: HALOT
  rationale: El hebreo es un imperativo que comunica un dejar salir o lanzar con fuerza. En español, «haz salir» conserva la idea de hacer brotar o desatar el contenido sin imponer una imagen demasiado líquida que no está explícita en el verbo.
- source_word: עֶבְרוֹת
  english_pob_choice: overflowings
  chosen_spanish: las desbordadas
  alternatives_spanish:
  - los desbordamientos
  - las irrupciones
  - los arrebatos
  lexicon: HALOT
  rationale: El sustantivo plural intensifica la idea de accesos o descargas de ira. «Las desbordadas» intenta mantener esa pluralidad e intensidad; se evita reducirlo a un singular abstracto como «ira», porque el hebreo conserva un matiz plural y enérgico.
- source_word: אַפֶּךָ
  english_pob_choice: your anger
  chosen_spanish: de tu ira
  alternatives_spanish:
  - de tu enojo
  - de tu furor
  - de tu nariz
  lexicon: HALOT
  rationale: אַף es literalmente «nariz», pero aquí es un modismo bien establecido para ira. En español, «ira» expresa el sentido natural sin perder la fuerza del término; se evita la literalidad de «nariz» por falta de inteligibilidad en este contexto poético.
- source_word: וּרְאֵה
  english_pob_choice: and look on
  chosen_spanish: y mira
  alternatives_spanish:
  - y contempla
  - y observa
  - y mira sobre
  lexicon: HALOT
  rationale: El imperativo pide atención dirigida hacia un objeto. «Mira» conserva la acción directa y sobria del hebreo sin sobrecargarlo con un matiz interpretativo.
- source_word: גֵּאֶה
  english_pob_choice: who is proud
  chosen_spanish: el que es orgulloso
  alternatives_spanish:
  - el soberbio
  - el altivo
  - el arrogante
  lexicon: HALOT
  rationale: El adjetivo describe a una persona levantada en orgullo. «El que es orgulloso» reproduce el rasgo personal de manera clara y mantiene el valor distributivo que el inglés expresó con «everyone who is proud».
- source_word: וְהַשְׁפִּילֵהוּ
  english_pob_choice: and bring him low
  chosen_spanish: y humíllalo
  alternatives_spanish:
  - y abátelo
  - y hazlo bajar
  - y rebájalo
  lexicon: HALOT
  rationale: El hiphil de שׁפל significa hacer bajar, humillar, abatir. «Humíllalo» conserva bien el sentido verbal y resulta natural en español poético; «rebájalo» o «abátelo» son posibles, pero menos fluidos aquí.
theological_decisions:
- issue: Tratamiento del paralelismo entre ira divina y humillación del soberbio
  english_pob_reading: The verse links divine wrath imagery with the command to humble the proud individual by individual.
  chosen_spanish_reading: 'La versión española conserva el paralelismo: primero la ira desatada, luego la mirada sobre cada orgulloso y su humillación.'
  alternative_spanish_readings:
  - Haz salir las desbordadas de tu furor, y mira a todo soberbio, y abátelo.
  - Derrama las irrupciones de tu ira, y contempla al soberbio, y humíllalo.
  rationale: 'El texto hebreo yuxtapone dos imperativos relacionados: desatar la ira y rebajar al orgulloso. Conviene mantener esa secuencia sin suavizarla, porque la fuerza retórica forma parte del sentido del pasaje.'
  doctrine_reference: Job 40:11; poética sapiencial sobre soberbia y juicio divino
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del inglés POB que prefirió «Pour out the overflowings of your anger» por mayor cercanía léxica al hebreo. En español, se evitó una calca rígida de «pour out» y se optó por una formulación idiomática que mantenga la imagen de desatar la ira. También se respetó el matiz distributivo de «everyone who is proud» en el segmento «todo el que es orgulloso».

    '
  spanish_consistency_notes:
  - Se mantiene «ira» como equivalente idiomático de אַף, sin introducir «SEÑOR» ni otros reemplazos no pertinentes.
  - 'Se conserva el imperativo encadenado del hebreo con dos acciones: desatar la ira y humillar al orgulloso.'
  - La expresión «el que es orgulloso» mantiene el valor personal/distributivo del adjetivo hebreo.
  - El texto evita una parénesis excesiva y conserva la concisión poética del verso.
