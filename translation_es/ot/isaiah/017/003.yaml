base_translation:
  language: en
  yaml_path: translation/ot/isaiah/017/003.yaml
  text: And the fortress will cease from Ephraim[a], and the kingdom from Damascus; and the remnant of Aram will be like the glory of the sons of Israel[b], declares Yahweh of hosts.
  footnotes:
