    text: Or 'to Mizpah.' The Hebrew form includes a directional ending, though the context indicates the people were assembled there.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lords of the Philistines.' The Hebrew term refers to the recognized Philistine rulers.
    reason: lexical_alternative
