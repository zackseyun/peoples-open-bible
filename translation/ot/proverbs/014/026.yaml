id: PRO.14.26
reference: Proverbs 14:26
source:
  edition: WLC
  text: בְּ/יִרְאַ֣ת יְ֭הוָה מִבְטַח עֹ֑ז וּ֝/לְ/בָנָ֗י/ו יִהְיֶ֥ה מַחְסֶֽה־׃
translation:
  text: In the fear of Yahweh there is strong confidence[a], and for his children there will be a refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'and for his children' may mean 'and for the LORD's children there will be a refuge,' taking 'his' to refer to the LORD rather than to the one who fears him.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/יִרְאַת
  chosen: In the fear of
  alternatives:
  - In fearing
  - By the fear of
  lexicon: HALOT
  rationale: The preposition ב plus construct noun יִרְאָה is best rendered as a locative/sphere expression, 'in the fear of,' preserving the Hebrew idiom of living within reverent fear rather than reducing it to a mere instrumental sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִבְטַח
  chosen: confidence
  alternatives:
  - trust
  - security
  lexicon: HALOT
  rationale: מִבְטַח denotes trust/confidence or a place/state of security. Here, paired with עֹז, it most naturally describes a strong state of confidence rather than naming a physical refuge.
- source_word: עֹז
  chosen: strong
  alternatives:
  - strength
  - mighty
  lexicon: HALOT
  rationale: 'Used attributively with מִבְטַח, עֹז intensifies the noun: ''strong confidence.'' Rendering it adjectivally produces natural English while preserving the Hebrew sense of strength.'
- source_word: וּ֝/לְ/בָנָ֗י/ו
  chosen: and for his children
  alternatives:
  - and for his sons
  - and his children
  lexicon: HALOT
  rationale: בָּנִים can mean sons or children. Because the suffix refers back to the God-fearer and the proverb speaks generically of descendants, 'children' best conveys the representative sense in idiomatic English. The prefixed ל is retained as 'for.'
- source_word: יִהְיֶה
  chosen: there will be
  alternatives:
  - it will be
  - he will have
  lexicon: HALOT
  rationale: 'The verb היה here introduces the existence of what follows: ''there will be a refuge.'' This avoids over-specifying the subject and fits the Hebrew clause structure.'
- source_word: מַחְסֶה
  chosen: a refuge
  alternatives:
  - shelter
  - a place of refuge
  lexicon: HALOT
  rationale: מַחְסֶה commonly denotes refuge or shelter. 'A refuge' is concise, natural, and preserves the protective imagery of the proverb.
