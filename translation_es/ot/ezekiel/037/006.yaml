  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea de restauración corporal y mantiene correctamente Yahvé para יהוה. Sin embargo, se aparta de manera significativa de la decisión contextual documentada para רוּחַ: en este versículo el sentido local favorece ''aliento'' por la reanimación física inmediata (''y vivirán''), mientras que las alternativas ''espíritu'' y ''viento'' deben quedar en nota. También conviene simplificar la nota de גִּדִים para reflejar la alternativa preservada en inglés sin introducir un anglicismo innecesario en el texto principal.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Pondré tendones... haré subir carne... los cubriré con piel' es natural y fiel. El principal problema de legibilidad/fidelidad está en 'pondré espíritu en ustedes', que en español desplaza el foco hacia una lectura más teológica que fisiológica en un contexto anatómico. La revisión a 'aliento' mejora la precisión contextual y mantiene la polisemia en nota.
  glossary_alignment: 'Alineación parcial con el glosario del proyecto: ''Yahvé'' está correcto; ''רוּחַ'' requiere ajuste contextual a ''aliento'' en vez de ''espíritu'', preservando ''espíritu'' y ''viento'' como alternativas en nota. No hay otros choques relevantes con la terminología por defecto.'
  issues:
  - severity: high
    issue: La traducción principal de רוּחַ como 'espíritu' no sigue la decisión contextual auditada.
    rationale: El hebreo רוּחַ es polisémico, pero en Ezequiel 37:6 la secuencia huesos-tendones-carne-piel-רוּחַ-y vivirán apunta localmente a 'aliento'. El English POB documenta esa elección precisamente para preservar la precisión inmediata y deja 'spirit/wind' en nota. El español no debe resolver la tensión en dirección distinta sin necesidad.
  - severity: medium
    issue: La nota de גִּדִים usa 'sinews' como alternativa en inglés dentro de una edición española.
    rationale: Aunque refleja el audit trail inglés, en la edición española conviene expresar la alternativa de forma española y eclesialmente inteligible, por ejemplo 'tendones' / 'cordones' anatómicos o explicar que también puede referirse a tejidos conectivos. Mantener un anglicismo transliterado no ayuda al lector meta.
  revised_spanish_text: Pondré tendones sobre ustedes, y haré subir carne sobre ustedes, y los cubriré con piel, y pondré aliento[a] en ustedes, y vivirán. Entonces sabrán que yo soy Yahvé.
