  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Su alma» / «su vida» respeta la decisión antropológica documentada. Para שַׁחַת, «fosa» encaja mejor que «hoyo» con la intención de «pit» en un español eclesial legible. «Los que causan muerte» es aceptable y mantiene la fuerza causativa sin sobreespecificar.
