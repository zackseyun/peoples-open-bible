translation:
  language: es
  text: el rey de Apec[a], uno; el rey de Sarón, uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Posible alternativa: “el rey del Sarón, uno”. El hebreo incluye artículo con el nombre regional; en español se suele tratar como nombre propio simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king of
  chosen_spanish: el rey de
  alternatives_spanish:
  - rey de
  lexicon: HALOT
  rationale: En esta lista de reyes derrotados, el hebreo usa מֶלֶךְ como encabezado enumerativo para cada gobernante. En español, 'el rey de' conserva la estructura natural de la lista y el valor definido que aporta el inglés POB.
- source_word: אֲפֵק
  english_pob_choice: Aphek
  chosen_spanish: Apec
  alternatives_spanish:
  - Aphek
  lexicon: nombre propio
  rationale: Se trata de un topónimo. Se conserva como nombre propio transliterado en forma española breve y legible, manteniendo la referencia geográfica sin convertirla en descripción.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno solo
  lexicon: HALOT
  rationale: Aquí אֶחָד funciona como cifra de recuento en una lista de conquista. 'Uno' reproduce la concisión enumerativa del hebreo y del inglés POB sin añadir sustantivos implícitos.
- source_word: לַ/שָּׁרוֹן
  english_pob_choice: Sharon
  chosen_spanish: Sarón
  alternatives_spanish:
  - el Sarón
  - la llanura de Sarón
  lexicon: HALOT
  rationale: El hebreo lleva preposición/artículo ante el topónimo. En español bíblico, 'Sarón' es la forma asentada y más natural; se evita 'el Sarón' por sonar forzado y 'la llanura de Sarón' porque introduce una glosa topográfica no explícita en el texto.
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo inglés y quedó sin cambios; no se requieren ajustes textuales adicionales para esta línea breve.
  spanish_consistency_notes:
