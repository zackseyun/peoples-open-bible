translation:
  language: es
  text: Salmo de David[a], cuando estaba en el territorio despoblado[b] de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo «de David» puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
  - marker: b
    text: O «en el desierto de Judá». El término hebreo puede referirse en general a una región despoblada, de estepa o desértica.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמ֥וֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: En los encabezados bíblicos, מִזְמוֹר funciona como término técnico de género litúrgico; «Salmo» es el equivalente español más estable y reconocible, y conserva mejor ese valor técnico que «cántico» o «melodía».
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los títulos de los salmos puede señalar autoría, dedicación o asociación. «De David» mantiene esa ambigüedad sin resolverla de antemano, igual que la decisión auditada en inglés.
- source_word: בִּהְיוֹתוֹ
  english_pob_choice: when he was
  chosen_spanish: cuando estaba
  alternatives_spanish:
  - mientras estaba
  - cuando fue
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo constructo de היה expresa tiempo circunstancial. «Cuando estaba» suena natural en español y preserva el sentido temporal sin sobretraducir la forma hebrea.
- source_word: בְּמִדְבַּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto de Judá
  - en la tierra árida
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «wilderness» por su amplitud semántica, en español «desierto» comunica de forma natural la idea de región estéril o despoblada. Aquí el contexto inmediato ya especifica «de Judá», por lo que la frase completa sigue siendo clara y fiel.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: Es nombre propio del territorio/tribu; «Judá» es la transliteración bíblica estándar en español y evita una identificación posterior con «Judea», que sería más tardía y menos precisa aquí.
theological_decisions:
- issue: Ambigüedad del encabezado davídico
  english_pob_reading: Retain the ambiguous heading 'of David' rather than specifying authorship.
  chosen_spanish_reading: Mantener «de David» sin decidir si indica autoría, dedicación o asociación.
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a una sola lectura. Conservar la ambigüedad respeta el dato fuente y evita imponer una conclusión interpretativa que el texto no exige.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se reportaron cambios necesarios y el estado de verificación fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «Judá» para el topónimo y no «Judea», siguiendo el nombre propio del texto hebreo.
  - Se prefirió «Salmo» como término técnico de encabezado, coherente con el uso bíblico en español.
  - Se conservó la ambigüedad de לְדָוִד en una nota, en vez de fijar autoría.
  - La nota léxica de «desierto» refleja la amplitud semántica de מִדְבָּר y evita estrecharlo indebidamente.
