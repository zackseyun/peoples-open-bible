translation:
  language: es
  text: Bienaventurado[a] el hombre que medita sobre la sabiduría[b], y que reflexiona con entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bienaventurado» mantiene la fórmula sapiencial de dicha/aprobación; también podría entenderse como «Dichoso».
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego dice: «Bienaventurado el hombre que llegará a su fin en sabiduría, y que conversará en su entendimiento», lo que refleja una redacción notablemente distinta en el primer verbo y en el segundo miembro.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: HALOT
  rationale: La fórmula hebrea de bienaventuranza en literatura sapiencial expresa una condición de dicha/aprobación, no solo un estado emocional. «Bienaventurado» conserva el tono elevado y declarativo del hebreo y del griego Μακάριος.
- source_word: אֱנוֹשׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - un hombre
  lexicon: HALOT
  rationale: El singular masculino del hebreo se conserva en español con valor representativo. «El hombre» mantiene la forma proverbial y sapiencial sin neutralizar indebidamente el sujeto.
- source_word: בְּחָכְמָה
  english_pob_choice: on wisdom
  chosen_spanish: en la sabiduría
  alternatives_spanish:
  - sobre la sabiduría
  - con sabiduría
  lexicon: HALOT
  rationale: El hebreo vincula la acción de meditar con la sabiduría como ámbito o contenido; en español, «medita en la sabiduría» expresa esa relación de manera natural y fiel.
- source_word: יֶהְגֶּה
  english_pob_choice: meditates
  chosen_spanish: medita
  alternatives_spanish:
  - murmura
  - reflexiona
  lexicon: HALOT
  rationale: El verbo hebreo sugiere murmurar/meditar en voz baja, propio de la contemplación sapiencial. «Medita» comunica bien ese sentido contemplativo en español contemporáneo y mantiene la resonancia tradicional.
- source_word: וּבִתְבוּנָה
  english_pob_choice: with understanding
  chosen_spanish: con entendimiento
  alternatives_spanish:
  - en entendimiento
  - con discernimiento
  lexicon: HALOT
  rationale: «Entendimiento» reproduce el campo semántico de תְבוּנָה y armoniza con el paralelismo del verso. «Con» conserva la relación acompañante/instrumental sin forzar la sintaxis española.
- source_word: יִשְׁעֶה
  english_pob_choice: reflects
  chosen_spanish: reflexiona
  alternatives_spanish:
  - considera
  - atiende
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir volverse hacia, atender o apoyarse en algo, el paralelo griego διαλεχθήσεται apunta a un ejercicio mental y verbal atento. «Reflexiona» recoge esa atención intelectual sin introducir contenido ajeno.
theological_decisions:
- issue: Bienaventuranza sapiencial y matiz de prosperidad/aprobación
  english_pob_reading: Blessed is
  chosen_spanish_reading: Bienaventurado
  alternative_spanish_readings:
  - Dichoso
  - Feliz
  rationale: Se conserva el valor de aprobación y favor propio de la fórmula sapiencial. «Bienaventurado» evita reducir el sentido a mera emoción subjetiva y mantiene el tono de máxima.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sujeto masculino singular representativo
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - la gente
  rationale: El hebreo presenta un singular masculino proverbial. Se conserva la forma del sujeto para no borrar la figura retórica y la precisión formal del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Apoyo del paralelo griego frente al hebreo
  english_pob_reading: meditates on wisdom ... reflects with understanding
  chosen_spanish_reading: medita en la sabiduría, y que reflexiona con entendimiento
  alternative_spanish_readings:
  - medita en sabiduría ... conversa con su entendimiento
  - muerde la sabiduría ...
  rationale: El hebreo y el griego coinciden en el campo de la contemplación sabia, aunque divergen en el primer verbo y en el segundo hemistiquio. La versión española conserva el sentido común sin ocultar que el testimonio griego apoya una formulación algo distinta, pero compatible con la meditación reflexiva.
  doctrine_reference: Fuente paralela hebreo-griego en el expediente auditado
translation_notes:
  revision_awareness: Se ha seguido el expediente auditado con alta concordancia. No hubo revisiones aplicadas en la última pasada; se preserva la tensión de la bienaventuranza sapiencial y el paralelismo contemplativo del verso, sin depender mecánicamente de una sola forma base.
  spanish_consistency_notes:
  - Se usa «Bienaventurado» para la fórmula אַשְׁרֵי, coherente con el tono sapiencial y con el valor de Μακάριος.
  - Se mantiene el singular masculino «el hombre» por fidelidad formal al hebreo.
  - «Medita» y «reflexiona» conservan el campo semántico de contemplación/atención intelectual del hebreo y del griego paralelo.
  - «Entendimiento» traduce תְבוּנָה de manera estable y eclesiásticamente legible en español.
  - No se introduce terminología eclesial ajena al dicho sapiencial; el verso permanece en registro de sabiduría general.
