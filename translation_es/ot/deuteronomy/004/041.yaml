  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: adverbio temporal, acción de apartar/designar, tres ciudades, ubicación al otro lado del Jordán y orientación hacia el este. Sin embargo, «hacia el nacimiento del sol» no suena natural en español bíblico moderno y no es la mejor forma de preservar la imagen de מִזְרָחָה שָׁמֶשׁ. La nota a también repite la lectura principal como alternativa, cuando debería ofrecer alternativas reales.'
  spanish_quality_summary: El texto es generalmente claro, pero «nacimiento del sol» resulta forzado y poco idiomático. «Entonces Moisés apartó tres ciudades al otro lado del Jordán» es natural y fiel. Para la frase final, «hacia donde sale el sol» mantiene la concreción de la imagen hebrea con mejor legibilidad que «nacimiento del sol».
  glossary_alignment: No hay términos del glosario de alto impacto aquí. «Moisés» es correcto; «apartó» es una buena equivalencia para יבדיל en este contexto. «Al otro lado del Jordán» encaja con el idiomatismo geográfico. La revisión propuesta mejora la correspondencia con la decisión léxica inglesa sobre «toward the sunrise».
  issues:
  - severity: medium
    issue: «hacia el nacimiento del sol» es una expresión poco natural en español
    rationale: Aunque intenta conservar la imagen concreta del hebreo, en español suena artificial. «Hacia donde sale el sol» o «hacia la salida del sol» preserva mejor el sentido con buena legibilidad.
  - severity: low
    issue: La nota [a] duplica la lectura principal como si fuera alternativa
    rationale: La nota dice «O “al otro lado del Jordán”» cuando esa ya es la traducción principal. Debe ofrecer alternativas reales, por ejemplo «más allá del Jordán» o «del otro lado del Jordán».
