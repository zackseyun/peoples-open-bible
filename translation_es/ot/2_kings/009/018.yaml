  text: 'So the horseman went to meet him and said[a], “Thus says the king: Is it peace?” But Jehu said, “What do you have to do with peace? Turn behind me.” And the watchman reported, saying, “The messenger reached them[b], but he has not returned.”'
  footnotes:
