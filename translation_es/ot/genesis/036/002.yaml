review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en los puntos principales: conserva ''tomó'', mantiene la fórmula ''hijas de Canaán'', reproduce la filiación con ''hija de'', y preserva en el texto principal la lectura masorética final ''el heveo'' con nota para la alternativa ''el horeo''. Sin embargo, ''sus mujeres'' no refleja tan fielmente la decisión inglesa ''his wives'' ni el sentido contextual claro de נָשָׁיו en este versículo; en español suena menos preciso y algo ambiguo.'
  spanish_quality_summary: El español es claro y legible, pero 'tomó a sus mujeres' suena poco natural en español bíblico actual y puede sugerir simplemente 'women' en vez de 'wives'. 'Tomó a sus esposas' o 'tomó por esposas' sería más idiomático, y la primera además conserva mejor la estructura hebrea sin sobreexpansión. El resto del verso fluye bien; la puntuación y los etnónimos son adecuados para un registro moderno y digno.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Los nombres y etnónimos son aceptables: ''Esaú'', ''Canaán'', ''hitita'', ''heveo''. La decisión ''Aholibama'' es coherente con una transliteración española. La única desalineación relevante es léxica/contextual: para נָשָׁיו el proyecto debe priorizar el sentido contextual ''esposas'' aunque el sustantivo base sea ''mujeres''.'
  issues:
  - severity: medium
    issue: '''sus mujeres'' para נָשָׁיו'
    rationale: 'Aunque formalmente cercano al hebreo, en español actual resulta menos natural y menos preciso que ''sus esposas''. El contexto aquí no deja una tensión significativa: se refiere claramente a esposas, y el inglés POB también fijó ''his wives''. Mantener ''mujeres'' introduce ambigüedad innecesaria.'
  revised_spanish_text: 'Esaú tomó a sus esposas de entre las hijas de Canaán: Ada, hija de Elon el hitita[a], y Aholibama, hija de Aná, hija de Zibeón el heveo.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «el heveo». Algunos intérpretes armonizan este pasaje con genealogías relacionadas y entienden la línea de forma distinta, incluso como «el horeo».'
    reason: alternative_reading
  revision_rationale: Se revisa únicamente 'sus mujeres' a 'sus esposas' para reflejar con más fidelidad el sentido contextual inequívoco de נָשָׁיו y la decisión documentada en el POB inglés, además de mejorar la naturalidad del español. Se conserva todo lo demás, incluida la nota sobre 'el heveo'/'el horeo', porque sigue correctamente el texto masorético y preserva la tensión genealógica sin armonizarla.
