translation:
  language: es
  text: Harás conforme a la palabra[a] que ellos te declaren desde aquel lugar que Yahvé escogerá, y tendrás cuidado de hacer conforme a todo lo que te instruyan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a la decisión que ellos te declaren». El hebreo דָּבָר puede significar «palabra», «asunto» o «decisión» en un contexto judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall act
  chosen_spanish: Harás
  alternatives_spanish:
  - Actuarás
  - Harás conforme
  lexicon: HALOT
  rationale: 'עשה es amplio: ''hacer'', ''actuar'', ''obrar''. En español, ''harás'' mantiene el mandato legal sin volverlo pesado, y funciona bien con la construcción preposicional que sigue.'
- source_word: עַל פִּי הַדָּבָר
  english_pob_choice: according to the word
  chosen_spanish: conforme a la palabra
  alternatives_spanish:
  - según la palabra
  - de acuerdo con la palabra
  - conforme a la decisión
  lexicon: HALOT
  rationale: עַל־פִּי expresa conformidad o autoridad normativa. 'Conforme a la palabra' conserva la imagen del hebreo y sigue siendo natural en español. Se mantiene 'palabra' porque דָּבָר aquí puede referirse a la declaración o decisión autorizada.
- source_word: יַגִּידוּ לְךָ
  english_pob_choice: they declare to you
  chosen_spanish: ellos te declaren
  alternatives_spanish:
  - te digan
  - te declaren
  lexicon: HALOT
  rationale: 'Hiphil de נגד tiene fuerza formal: ''declarar, hacer saber''. ''Declaren'' conserva el tono judicial/autoritativo mejor que ''digan''.'
- source_word: מִן הַמָּקוֹם הַהוּא אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: from that place which Yahweh will choose
  chosen_spanish: desde aquel lugar que Yahvé escogerá
  alternatives_spanish:
  - desde ese lugar que Yahvé escogerá
  - del lugar que Yahvé escogerá
  lexicon: HALOT
  rationale: מִן permite 'desde' o 'de'. 'Desde aquel lugar' suena más natural en español y conserva la referencia al lugar central elegido por Yahvé. 'Escogerá' refleja el futuro del verbo יִבְחַר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La forma española habitual en este proyecto para el nombre divino es 'Yahvé'. Mantiene el nombre personal del pacto sin sustituirlo por un título.
- source_word: וְשָׁמַרְתָּ לַעֲשׂוֹת
  english_pob_choice: you shall be careful to do
  chosen_spanish: y cuidarás de hacer
  alternatives_spanish:
  - y procurarás hacer
  - y te cuidarás de hacer
  lexicon: HALOT
  rationale: שׁמר + infinitivo expresa observancia cuidadosa. 'Cuidarás de hacer' comunica vigilancia y obediencia atenta en un español claro y digno.
- source_word: כְּכֹל אֲשֶׁר יוֹרוּךָ
  english_pob_choice: according to all that they instruct you
  chosen_spanish: conforme a todo lo que te instruyan
  alternatives_spanish:
  - según todo lo que te instruyan
  - de acuerdo con todo lo que te instruyan
  lexicon: HALOT
  rationale: כְּכֹל marca conformidad total, y יוֹרוּךָ, en contexto legal, significa 'instruir'. 'Conforme a todo lo que te instruyan' preserva la amplitud y el matiz normativo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. En esta serie, se rinde con el nombre propio 'Yahvé' para conservar la referencia al nombre del pacto, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Judicial authority of the pronouncement
  english_pob_reading: according to the word / decision that they declare to you
  chosen_spanish_reading: conforme a la palabra que ellos te declaren
  alternative_spanish_readings:
  - conforme a la decisión que ellos te declaren
  - según la palabra que ellos te declaren
  rationale: דָּבָר en este contexto puede significar 'palabra', 'asunto' o 'decisión'. Se mantiene 'palabra' para respetar la forma del hebreo y la nota de alternativa léxica, sin excluir el matiz judicial.
  doctrine_reference: HALOT; contexto jurídico de Deuteronomio 17
translation_notes:
  revision_awareness: Se verificó el pasaje frente al paquete fuente y el auditable inglés POB. No hay revisiones aplicadas en el tramo reciente; la lectura inglesa quedó confirmada sin cambios sustantivos. La redacción española sigue esa decisión, ajustando únicamente la sintaxis para naturalidad en español y conservando la nota léxica sobre דָּבָר.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se preserva el tono jurídico con 'declaren', 'instruyan' y 'conforme a'.
  - No se sustituye 'palabra' por 'decisión' en el texto principal, pero se documenta la alternativa en nota.
  - '''Cuidarás de hacer'' refleja observancia diligente sin introducir un matiz no presente en el hebreo.'
