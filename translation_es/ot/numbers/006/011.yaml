review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: sacerdote, dos sacrificios, expiación, causa ligada al contacto con el muerto, y nueva consagración de la cabeza en ese día. También preserva correctamente la nota léxica sobre חַטָּאת y la nota cultural sobre הַנפשׁ. Sin embargo, la secuencia española ''a causa de lo que pecó por razón del muerto'' suena trabada y duplica la causalidad de manera poco natural; además, ''pecó'' puede malentenderse moralmente cuando el contexto es contaminación ritual por un muerto.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero necesita una reparación menor de fluidez y precisión idiomática. 'Por la falta que cometió por causa del muerto' o 'porque contrajo culpa por causa del muerto' comunica mejor el sentido ritual-causal que la formulación actual. 'En aquel día' es aceptable, aunque 'en ese día' o 'aquel mismo día' podrían ser más naturales; no es un problema serio.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: ''sacerdote'', ''holocausto'', ''expiación'', ''consagrará''. No hay términos conflictivos con Yahvé/Mesías/etc. La elección ''ofrenda por el pecado'' con nota alternativa ''ofrenda de purificación'' está bien documentada y fiel al rastro de auditoría inglés.'
  issues:
  - severity: medium
    issue: 'Frase causal torpe: ''a causa de lo que pecó por razón del muerto'''
    rationale: Combina dos giros causales seguidos ('a causa de' + 'por razón de') y produce español poco natural. Además, 'lo que pecó' es una construcción débil aquí. El hebreo expresa la base de la expiación por la ofensa/incurrencia relacionada con el muerto; el español debe decirlo con mayor claridad.
  - severity: low
    issue: Posible malentendido moral de 'pecó' en un contexto de impureza ritual
    rationale: Aunque el inglés retiene 'sinned' por fidelidad, en español bíblico contemporáneo puede sonar como pecado moral directo. Una formulación como 'por la falta que cometió' conserva el valor cultual sin borrar la relación con חטא.
  revised_spanish_text: Y el sacerdote ofrecerá uno como ofrenda por el pecado[a] y otro como holocausto, y hará expiación por él por la falta que cometió por causa del muerto[b], y consagrará su cabeza en aquel día.
  revised_footnotes:
  - marker: a
    text: O ‘ofrenda de purificación’. El término hebreo חַטָּאת puede designar la ofrenda por el pecado o, en contextos de impureza ritual, la ofrenda de purificación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘sobre la נֶפֶשׁ’; aquí se refiere, por el contexto, al muerto que causó la impureza.
    reason: cultural_note
  revision_rationale: Se ajustó únicamente la cláusula causal para lograr un español más natural y preciso, evitando la duplicación torpe de expresiones causales y reduciendo el riesgo de una lectura moralizante excesiva en un contexto de impureza ritual. Se conservaron la estructura del versículo, la terminología sacrificial y las notas existentes.
