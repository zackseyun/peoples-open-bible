translation:
  language: es
  text: El hombre[a], aun en honra, pero sin entendimiento, es semejante a las bestias que perecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es semejante a las bestias; es como ellas», preservando una posible lectura del verbo final como «es como» en lugar de «perecen».'
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: Man
  chosen_spanish: El hombre
  alternatives_spanish:
  - la humanidad
  - un hombre
  lexicon: HALOT
  rationale: El sustantivo singular funciona de manera genérica y proverbial. En español, «el hombre» conserva ese valor representativo y el tono poético del verso mejor que «la humanidad».
- source_word: בִּיקָר
  english_pob_choice: in honor
  chosen_spanish: en honor
  alternatives_spanish:
  - en esplendor
  - en riqueza
  - en preciosidad
  lexicon: HALOT
  rationale: La expresión señala una condición de dignidad o alto rango. «En honor» es natural en español y mantiene la idea de estatus elevado.
- source_word: וְלֹא יָבִין
  english_pob_choice: yet without understanding
  chosen_spanish: y no entiende
  alternatives_spanish:
  - pero no discierne
  - y carece de entendimiento
  lexicon: HALOT
  rationale: El verbo בין expresa entender/discernir. Aquí se conserva de forma directa con «no entiende», sin perder la oposición implícita entre honor y falta de discernimiento.
- source_word: נִמְשַׁל
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es comparado con
  - es como
  lexicon: HALOT
  rationale: El niphal de משל expresa ser comparado o asemejado. «Es semejante a» conserva la relación comparativa con un registro poético y claro en español.
- source_word: כַּבְּהֵמוֹת
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - el ganado
  lexicon: HALOT
  rationale: בְּהֵמוֹת se refiere a bestias o animales en general, no específicamente al ganado. «Las bestias» preserva el contraste elevado del salmo.
- source_word: נִדְמוּ
  english_pob_choice: that perish
  chosen_spanish: que perecen
  alternatives_spanish:
  - que son destruidas
  - que se asemejan a ellas
  - que han perecido
  lexicon: HALOT
  rationale: En este contexto, la lectura más probable es la de morir o perecer, en línea con el tema de la mortalidad del salmo. Se mantiene también la tensión interpretativa documentada en la nota.
theological_decisions:
- issue: Sentido del verbo final נִדְמוּ
  english_pob_reading: understood as 'perish' in apposition to 'the beasts'
  chosen_spanish_reading: entendido como «perecen» aplicado a «las bestias»
  alternative_spanish_readings:
  - entendido como «se asemejan a ellas»
  - entendido como «son como ellas»
  rationale: La línea culmina el énfasis del salmo en que el honor humano no libra de la muerte. Por eso se traduce con la idea de perecer. Sin embargo, se preserva la lectura alternativa de semejanza porque la forma hebrea admite esa posibilidad interpretativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/interpretativa en vez de resolverla en silencio.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés, manteniendo la ambigüedad documentada del verbo final en una nota sin imponerla en el cuerpo del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la norma del proyecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «bestias» para conservar el registro poético y el contraste antropológico del salmo.
  - «Entiende» traduce directamente בין sin ampliar innecesariamente el sentido.
  - La nota conserva la alternativa semántica documentada en el inglés POB para el verbo final.
