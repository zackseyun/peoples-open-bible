translation:
  language: es
  text: Y tú mandarás a los hijos de Israel que te traigan aceite puro de oliva, machacado[b], para la luz[a], para hacer arder continuamente una lámpara[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los israelitas” o “el pueblo de Israel”. El hebreo dice literalmente “los hijos de Israel”.
    reason: lexical_alternative
  - marker: b
    text: “Machacado” puede entenderse también como “aplastado” o “triturado”, en alusión al aceite de alta calidad obtenido al golpear las aceitunas antes del prensado ordinario.
    reason: lexical_alternative
  - marker: c
    text: En el uso del tabernáculo, “continuamente” puede indicar una atención regular y constante del servicio, no necesariamente cada instante sin interrupción; compárese Éxodo 27:21 y Levítico 24:2–4.
    reason: cross_reference
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Y tú mismo
  - Ahora tú
  lexicon: HALOT
  rationale: El pronombre independiente conserva el énfasis y el cambio discursivo sin añadir una paráfrasis innecesaria.
- source_word: תְּצַוֶּה
  english_pob_choice: shall command
  chosen_spanish: mandarás
  alternatives_spanish:
  - darás la orden a
  - ordenarás
  lexicon: HALOT
  rationale: צוה expresa la acción de dar mandato. 'Mandarás' es directo, bíblico en registro y mantiene la fuerza imperativa futura del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar masculina del hebreo, en línea con la decisión auditada de mantener el término explícito en vez de neutralizarlo.
- source_word: וְיִקְחוּ אֵלֶיךָ
  english_pob_choice: that they bring to you
  chosen_spanish: que te traigan
  alternatives_spanish:
  - y que te lleven
  - que te hagan llegar
  lexicon: HALOT
  rationale: Aunque literalmente es 'tomen', el contexto de provisión para el santuario pide el sentido idiomático de 'traer'. 'Te traigan' comunica la entrega a Moisés sin alejarse del hebreo.
- source_word: שֶׁמֶן זַיִת
  english_pob_choice: olive oil
  chosen_spanish: aceite de olivas
  alternatives_spanish:
  - aceite de oliva
  - aceite de aceituna
  lexicon: HALOT
  rationale: En español, 'aceite de oliva' es natural y correcto; aquí se prefiere 'aceite de olivas' para reflejar más de cerca la construcción hebrea de 'aceite de olivo/olivas' sin perder inteligibilidad.
- source_word: זָךְ
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - claro
  lexicon: HALOT
  rationale: Describe la calidad cultual del aceite. 'Puro' es la equivalencia más natural y fiel en español bíblico moderno.
- source_word: כָּתִית
  english_pob_choice: beaten
  chosen_spanish: machacado
  alternatives_spanish:
  - aplastado
  - triturado
  lexicon: HALOT
  rationale: El término indica aceite obtenido por golpeado/machacado de las aceitunas. 'Machacado' transmite bien el método sin sonar arcaico.
- source_word: לַמָּאוֹר
  english_pob_choice: for the light
  chosen_spanish: para la luz
  alternatives_spanish:
  - para alumbrar
  - para iluminación
  lexicon: HALOT
  rationale: Se preserva el sustantivo 'luz' para reflejar la forma nominal del hebreo y evitar anticipar de más el objeto concreto.
- source_word: לְהַעֲלֹת נֵר
  english_pob_choice: to cause a lamp to burn
  chosen_spanish: para hacer arder continuamente una lámpara
  alternatives_spanish:
  - para encender una lámpara
  - para mantener encendida una lámpara
  lexicon: HALOT
  rationale: El Hifil de עלה con נר expresa la activación/sostenimiento de la lámpara. 'Hacer arder' conserva la fuerza causativa, y 'una lámpara' mantiene la referencia singular del hebreo.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - de continuo
  lexicon: HALOT
  rationale: En contexto del santuario indica regularidad continua de servicio. 'Continuamente' reproduce bien el valor cultual auditado.
theological_decisions:
- issue: Designación masculina de convenio בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina heredada del hebreo, sin convertirla en una abstracción neutra. La lectura no excluye doctrinalmente a las mujeres; conserva la fórmula del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto base y la evaluación de revisión indican alta concordancia y ausencia de cambios necesarios; se conservan las decisiones auditadas sobre la fórmula masculina, el aceite “puro” y “machacado”, la luz y la continuidad cultual.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando “SEÑOR” como sustituto de Yahvé porque este versículo no contiene el nombre divino.
  - Se conserva la singularidad de ‘lámpara’ y la nominalidad de ‘luz’ conforme al hebreo.
  - La puntuación y el orden buscan fluidez natural en español sin perder el paralelismo del original.
