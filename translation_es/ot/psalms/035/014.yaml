translation:
  language: es
  text: Andaba como si fuera mi amigo[a], como si fuera mi hermano; me inclinaba sombrío[b], como quien hace duelo por una madre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como amigo». El hebreo expresa una cercanía personal íntima.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «oscurecido» o «sombrío». En este contexto, la imagen alude al aspecto abatido del duelo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como quien está de duelo por una madre». El hebreo mantiene la comparación sin desarrollar más la escena.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּרֵעַ
  english_pob_choice: as though he were my friend
  chosen_spanish: como si fuera mi amigo
  alternatives_spanish:
  - como un amigo
  - como si fuera un amigo
  lexicon: HALOT
  rationale: רֵעַ significa 'amigo, compañero, allegado'. El prefijo comparativo כְּ exige una comparación, y en español la forma natural conserva la relación íntima con 'mi amigo'.
- source_word: כְּאָח
  english_pob_choice: as though he were my brother
  chosen_spanish: como si fuera mi hermano
  alternatives_spanish:
  - como un hermano
  - como si fuera un hermano
  lexicon: HALOT
  rationale: אָח es literalmente 'hermano'. Mantener la comparación paralela con la frase anterior preserva el paralelismo poético y el sentido de cercanía familiar.
- source_word: הִתְהַלָּכְתִּי
  english_pob_choice: I walked about
  chosen_spanish: me paseaba
  alternatives_spanish:
  - andaba por ahí
  - me iba de un lado a otro
  - caminaba
  lexicon: HALOT
  rationale: El hitpael de הלך puede expresar conducta habitual o movimiento repetido. 'Me paseaba' comunica bien el andar continuo sin perder la imagen concreta.
- source_word: קֹדֵר
  english_pob_choice: in gloom
  chosen_spanish: en penumbra
  alternatives_spanish:
  - en tristeza
  - con semblante sombrío
  - en oscuridad
  lexicon: HALOT
  rationale: קֹדֵר literalmente remite a estar oscurecido o sombrío, especialmente en contexto de duelo. 'En penumbra' conserva la imagen de oscuridad con naturalidad en español.
- source_word: כַּאֲבֶל אֵם
  english_pob_choice: like one mourning for a mother
  chosen_spanish: como quien hace duelo por una madre
  alternatives_spanish:
  - como un doliente por su madre
  - como alguien que llora por su madre
  lexicon: HALOT
  rationale: 'La unidad כַּאֲבֶל אֵם se entiende como una comparación: el estado del salmista se asemeja al de alguien en duelo por una madre. ''Hace duelo'' mantiene el matiz de lamento formal sin forzar una explicación adicional.'
- source_word: שַׁחוֹתִי
  english_pob_choice: I bowed down
  chosen_spanish: me inclinaba
  alternatives_spanish:
  - me doblaba
  - me agachaba
  - estaba encorvado
  lexicon: HALOT
  rationale: שׁחה/שׁחח denota inclinarse, doblarse o estar encorvado. 'Me inclinaba' conserva la postura corporal humillada y encaja con el tono poético del versículo.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión que corrige la sintaxis del segundo miembro: קֹדֵר se rinde como el estado sombrío/oscuro del salmista, mientras que כַּאֲבֶל אֵם se conserva como la comparación con alguien que hace duelo por una madre. Por eso no se fusionan ambas imágenes en una sola cláusula explicativa.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo con dos comparaciones consecutivas: ''como si fuera mi amigo... como si fuera mi hermano''.'
  - Se evita sustituir el léxico de duelo por un término demasiado interpretativo; 'penumbra' y 'hacer duelo' buscan conservar la imaginería hebrea.
  - La puntuación reproduce la pausa poética del verso y separa claramente la imagen de abatimiento de la comparación de duelo.
