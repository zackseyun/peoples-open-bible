    issue: La nota [a] está anclada en «le dijo» pero su contenido explica «Mira, eres un hombre muerto».
    rationale: Esto rompe la correspondencia entre marcador y elemento explicado, y puede confundir al lector sobre qué expresión está siendo comentada.
  - severity: medium
    issue: Las notas [a] y [b] son parcialmente redundantes sobre la fuerza de מֵת.
    rationale: El inglés auditado conserva una sola nota principal sobre las alternativas y la inminencia de la muerte; en español conviene consolidar para mayor limpieza editorial.
  - severity: low
    issue: «En un sueño de noche» suena poco idiomático en español general.
    rationale: Aunque es comprensible, «por la noche» preserva el sentido de בַּחֲלוֹם הַלָּיְלָה con mejor naturalidad lectora.
