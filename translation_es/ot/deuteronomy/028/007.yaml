translation:
  language: es
  text: Yahvé entregará[a] a tus enemigos que se levantan contra ti, derrotados delante de ti. Por un solo camino saldrán contra ti[b], y por siete caminos huirán delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los pondrá en tus manos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por un camino ... por siete caminos», imagen de enemigos que avanzan unidos pero huyen dispersos en varias direcciones.'
    reason: cultural_note
lexical_decisions:
- source_word: יִתֵּן / יִתֵּן יְהוָה
  english_pob_choice: will give
  chosen_spanish: dará
  alternatives_spanish:
  - entregará
  - pondrá en manos de
  lexicon: HALOT
  rationale: El hebreo נתן en contexto bélico/judicial puede significar 'dar', 'entregar' o 'poner en manos de'. En español, 'dará' conserva el verbo básico del texto y permite que el resultado militar lo exprese el complemento 'derrotados delante de ti', sin forzar un giro más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: Tetragrammaton (YHWH)
  rationale: Se mantiene el nombre propio divino revelado en el texto hebreo. El proyecto pide 'Yahvé' como forma principal en español para YHWH, evitando la sustitución por un título.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - tus opresores
  lexicon: HALOT
  rationale: La equivalencia directa 'enemigos' es la más natural y fiel al plural con sufijo de segunda persona.
- source_word: הַקָּמִים עָלֶיךָ
  english_pob_choice: who rise up against you
  chosen_spanish: que se levantan contra ti
  alternatives_spanish:
  - que se alzan contra ti
  - que se ponen en contra de ti
  lexicon: HALOT
  rationale: קום con על en contexto hostil expresa la acción de levantarse contra alguien. 'Se levantan contra ti' preserva el valor idiomático y la fuerza adversarial del hebreo.
- source_word: נִגָּפִים
  english_pob_choice: defeated
  chosen_spanish: derrotados
  alternatives_spanish:
  - abatidos
  - vencidos
  - golpeados
  lexicon: HALOT
  rationale: El participio nifal comunica ser abatidos/derrotados en combate. 'Derrotados' es natural en español y mantiene el sentido resultativo sin añadir una imagen más específica que la del hebreo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: '''Delante de ti'' reproduce el valor espacial/relacional de לפני en español moderno, con un tono claro y bíblico a la vez.'
- source_word: בְּדֶרֶךְ אֶחָד
  english_pob_choice: by one way
  chosen_spanish: por un solo camino
  alternatives_spanish:
  - por un camino
  - en una sola dirección
  lexicon: HALOT
  rationale: דרך significa 'camino' o 'ruta'. 'Por un solo camino' conserva el paralelismo con 'por siete caminos' y hace explícita la singularidad del movimiento.
- source_word: יֵצְאוּ אֵלֶיךָ
  english_pob_choice: they will come out against you
  chosen_spanish: saldrán contra ti
  alternatives_spanish:
  - saldrán a enfrentarte
  - marcharán contra ti
  - saldrán hacia ti
  lexicon: HALOT
  rationale: יצא con אל en contexto militar implica salir contra alguien. 'Saldrán contra ti' expresa la hostilidad sin perder la concisión del hebreo.
- source_word: וּבְשִׁבְעָה דְרָכִים
  english_pob_choice: and by seven ways
  chosen_spanish: y por siete caminos
  alternatives_spanish:
  - y en siete direcciones
  - y por siete rutas
  lexicon: HALOT
  rationale: '''Siete caminos'' sigue de cerca el paralelismo con ''un solo camino'' y conserva la imagen de dispersión que la nota inglesa explica.'
- source_word: יָנוּסוּ
  english_pob_choice: they will flee
  chosen_spanish: huirán
  alternatives_spanish:
  - escaparán
  - se dispersarán
  - retrocederán
  lexicon: HALOT
  rationale: נוס es 'huir'. 'Huirán' comunica la derrota y el pánico mejor que opciones más débiles como 'retrocederán'.
theological_decisions:
- issue: Nombre divino del Tetragrammaton (יְהוָה)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue la decisión doctrinal del proyecto: traducir el Tetragrama como ''Yahvé'' en el texto principal. Esto preserva el nombre personal del pacto en vez de ocultarlo tras un título.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que eliminó el ‘as’ innecesario antes de ‘defeated’; en español se evitó igualmente una construcción explicativa innecesaria y se prefirió ‘derrotados delante de ti’.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se usó 'camino/caminos' para דרך, conservando el paralelismo numérico del hebreo.
  - Se eligió 'derrotados' en lugar de una perífrasis más larga para respetar la concisión del participio hebreo.
  - La nota de dispersión se dejó en pie porque el inglés POB la documenta y el español puede crear la misma imagen sin sobreexplicar el verso en el texto principal.
