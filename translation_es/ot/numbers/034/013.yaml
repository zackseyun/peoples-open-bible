translation:
  language: es
  text: 'Entonces Moisés mandó a los hijos de Israel[a], diciendo: «Esta es la tierra que ustedes heredarán por suerte, que Yahvé mandó dar a las nueve tribus y a la media tribu»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encomendó
  lexicon: HALOT
  rationale: El piel de צוה expresa una orden con autoridad. En español, 'mandó' conserva bien esa fuerza sin sonar excesivamente técnica o arcaica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del Israel
  lexicon: HALOT
  rationale: Se mantiene el giro corporativo del hebreo. 'Hijos de Israel' refleja la forma fuente y evita neutralizar el masculino plural documental del texto.
- source_word: זֹאת הָאָרֶץ
  english_pob_choice: This is the land
  chosen_spanish: Esta es la tierra
  alternatives_spanish:
  - Esta es la tierra prometida
  - Este es el territorio
  lexicon: HALOT
  rationale: '''Tierra'' es el equivalente normal de אֶרֶץ en este contexto de herencia y repartición; ''territorio'' sería más interpretativo.'
- source_word: תִּתְנַחֲלוּ אֹתָהּ
  english_pob_choice: you shall inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - recibirán como herencia
  - tomarán en herencia
  lexicon: HALOT
  rationale: El verbo tiene sentido de recibir una herencia asignada. 'Heredarán' es natural en español y conserva la idea de posesión por adjudicación.
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por lotes
  - echando suertes
  lexicon: HALOT
  rationale: '''Por sorteo'' comunica con claridad el reparto mediante suerte/castigo de lotes; en español moderno resulta más transparente que una calca.'
- source_word: אֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: which Yahweh commanded
  chosen_spanish: la cual Yahvé mandó
  alternatives_spanish:
  - que Yahvé ordenó
  - la que Yahvé dispuso
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según la política del proyecto. 'Mandó' mantiene la misma fuerza verbal que la orden de Moisés en el versículo.
- source_word: לָתֵת
  english_pob_choice: to be given
  chosen_spanish: que se diera
  alternatives_spanish:
  - para ser dada
  - que fuera dada
  lexicon: HALOT
  rationale: La pasiva subordinada refleja mejor la lectura auditada en inglés ('to be given') y evita atribuir la acción a un agente explícito no expresado en hebreo.
- source_word: לְתִשְׁעַת הַמַּטּוֹת וַחֲצִי הַמַּטֶּה
  english_pob_choice: to the nine tribes and the half-tribe
  chosen_spanish: a las nueve tribus y a la media tribu
  alternatives_spanish:
  - a las nueve tribus y a medio tribu
  - a nueve tribus y a la mitad de la tribu
  lexicon: HALOT
  rationale: '''מַטֶּה'' se refiere aquí a tribu. ''Media tribu'' es la forma natural en español para la porción tribal mitad, y mantiene la distribución del texto.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: 'Se sigue la convención editorial del proyecto para el Tetragrama: transliterar el nombre divino como ''Yahvé'' en vez de sustituirlo por un título. Esto preserva el nombre personal del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Corporate designation בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: El giro mantiene la forma de la fuente y la designación pactual sin convertirla en una paráfrasis sociológica. En español es plenamente comprensible y auditable.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se integró la revisión auditada del inglés para reflejar la pasiva 'que se diera' y se mantuvo la lectura de alta concordancia del expediente. La decisión principal en español fue conservar el nombre divino como 'Yahvé' y el giro corporativo 'hijos de Israel'.
  spanish_consistency_notes:
  - Se conservó la distinción entre 'tierra' y 'territorio' siguiendo el contexto de herencia.
  - '''Media tribu'' reproduce la partición tribal de forma idiomática en español.'
  - El marcador [a] aparece en el texto y queda anclado a la nota de alternativa léxica.
