review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: ''servirán'' para וְעָבְדוּ, ''Yahvé, su Dios'' para יְהוָה אֱלֹהֵיהֶם, y ''David, su rey'' para דָּוִד מַלְכָּם. También preserva correctamente la tensión interpretativa sobre ''David'' mediante nota. Sin embargo, ''a quien yo levantaré para ellos'' suena menos natural en español y puede sugerir una elevación física más que la idea idiomática de suscitar/levantar un rey para el pueblo.'
  spanish_quality_summary: 'El texto es claro y fiel, pero requiere un ajuste estilístico menor para sonar más idiomático y digno en español eclesial general. ''Servirán a Yahvé, su Dios'' está bien puntuado y es legible. El punto a mejorar es la cláusula final: ''a quien yo levantaré para ellos'' es comprensible, pero ''a quien yo suscitaré para ellos'' comunica mejor la idea de levantar/proveer un gobernante y evita una formulación algo rígida.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יהוה -> ''Yahvé'' correctamente; ''David'' se conserva como nombre propio; ''rey'' mantiene la fuerza monárquica; no hay conflictos con terminología doctrinal. La nota sobre el posible sentido mesiánico está bien orientada y no invade el texto principal.'
  issues:
  - severity: medium
    issue: La frase 'a quien yo levantaré para ellos' es poco idiomática en español para un rey futuro.
    rationale: Aunque 'levantar' puede calcar el hebreo/inglés, en español bíblico actual 'suscitar' o 'levantar ... para ellos' con otra reestructuración suena más natural cuando se habla de hacer surgir un gobernante. 'Suscitaré' preserva mejor el valor idiomático sin pérdida semántica.
  revised_spanish_text: Servirán a Yahvé, su Dios, y a David, su rey[a], a quien yo suscitaré para ellos.
  revised_footnotes:
  - marker: a
    text: 'O: "un futuro rey davídico"; muchos intérpretes entienden aquí a "David" como una referencia profética al Mesías, más que a David personalmente.'
    reason: alternative_reading
