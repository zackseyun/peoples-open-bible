  spanish_quality_summary: '«Contadlo» y «vuestros» son comprensibles, pero suenan marcadamente peninsulares y menos neutros para un español latinoamericano amplio. Además, la estructura sin verbos repetidos («y vuestros hijos a sus hijos») resulta poco natural en español moderno. Conviene usar una formulación clara y panhispánica con repetición verbal: «Cuéntenles… y que sus hijos les cuenten…».'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Sí hay un desajuste con la decisión léxica auditada sobre בנים: el inglés eligió «children» por sentido inclusivo generacional, mientras que el español usa «hijos» en texto principal. En español es mejor reflejar esa decisión con «hijos[a]» o «hijos e hijas»; por naturalidad y concisión, «hijos[a]» con nota explicativa funciona bien. También se ajusta mejor al estilo objetivo usar «Yahvé» solo cuando aparezca, lo cual aquí no aplica.'
  issues:
