    issue: Falta la nota léxica equivalente a la del POB inglés sobre יִתְבּוֹנָנוּ.
    rationale: El expediente inglés preserva explícitamente las alternativas «examinar/considerar». En español, «te observarán atentamente» no deja ver por sí sola ese matiz, así que conviene una nota anclada.
  - severity: low
    issue: «Que hacía estremecer reinos» es algo menos directo que el valor de «shook kingdoms».
    rationale: No es una mala traducción, pero «sacudía reinos» o «hacía temblar reinos» reflejan con más inmediatez el paralelismo y la fuerza del hebreo.
