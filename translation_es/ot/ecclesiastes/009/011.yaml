translation:
  language: es
  text: Volví a ver bajo el sol que la carrera no es para los veloces, ni la batalla para los poderosos; ni tampoco el pan para los sabios, ni las riquezas para los entendidos, ni el favor para los que saben; porque el tiempo y el azar[a] les suceden a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tiempo y lo que acontece», «el tiempo y la desventura» o «el tiempo y la ocurrencia». La expresión hebrea enfatiza que circunstancias impredecibles alcanzan a todos.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבְתִּי וְרָאֹה
  english_pob_choice: I again saw
  chosen_spanish: Me volví a mirar
  alternatives_spanish:
  - Volví a ver
  - De nuevo vi
  lexicon: HALOT
  rationale: El hebreo une la idea de volver/reanudar con el acto de ver. En español, «me volví a mirar» conserva el valor discursivo de reanudación y la observación concreta sin sonar rígido.
- source_word: תַּחַת הַשֶּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: bajo el sol
  alternatives_spanish:
  - debajo del sol
  lexicon: HALOT
  rationale: Es la expresión característica de Eclesiastés para la esfera terrenal de la experiencia humana. «Bajo el sol» es natural en español y mantiene el rasgo literario de la frase.
- source_word: לַקַּלִּים הַמֵּרוֹץ
  english_pob_choice: the race is not to the swift
  chosen_spanish: no es para los ligeros la carrera
  alternatives_spanish:
  - la carrera no es para los veloces
  - no le corresponde la carrera a los rápidos
  lexicon: HALOT
  rationale: «Ligeros» transmite la idea de rapidez con tono poético; «carrera» conserva el sustantivo concreto del hebreo. El orden mantiene el paralelismo semítico sin hacerlo mecánico.
- source_word: לַגִּבּוֹרִים הַמִּלְחָמָה
  english_pob_choice: the battle to the mighty
  chosen_spanish: para los valientes la guerra
  alternatives_spanish:
  - para los fuertes la batalla
  - la guerra no es para los poderosos
  lexicon: HALOT
  rationale: גִּבּוֹרִים puede ser «fuertes», «poderosos» o «valientes». «Valientes» funciona bien en español poético y evita reducir el término a fuerza física solamente. «Guerra» es un equivalente amplio y natural del sustantivo hebreo en este paralelo.
- source_word: לַחֲכָמִים לֶחֶם
  english_pob_choice: bread is not to the wise
  chosen_spanish: no... para los sabios el pan
  alternatives_spanish:
  - no... para los sabios la comida
  - no... para los sabios el sustento
  lexicon: HALOT
  rationale: «Pan» preserva la imagen concreta del hebreo y sugiere sustento básico. En español resulta más directo que expandirlo a «comida» o «sustento».
- source_word: לַנְּבֹנִים עֹשֶׁר
  english_pob_choice: nor riches to the discerning
  chosen_spanish: ni para los entendidos las riquezas
  alternatives_spanish:
  - ni para los prudentes la riqueza
  - ni para los inteligentes las riquezas
  lexicon: HALOT
  rationale: «Entendidos» refleja la capacidad de discernimiento sin sobreintelectualizar el término. «Riquezas» mantiene el plural poético y la cadencia del verso.
- source_word: לַיֹּדְעִים חֵן
  english_pob_choice: nor favor to those who know
  chosen_spanish: ni para los que saben el favor
  alternatives_spanish:
  - ni para los conocedores el favor
  - ni para los que saben la gracia
  lexicon: HALOT
  rationale: El hebreo vincula conocer con חֵן, que aquí es favor o aceptación favorable. «Favor» evita cargar el texto con una resonancia teológica que el contexto sapiencial no exige.
- source_word: עֵת וָפֶגַע
  english_pob_choice: time and chance
  chosen_spanish: tiempo y azar
  alternatives_spanish:
  - tiempo y ocurrencia
  - tiempo y contratiempo
  - tiempo y casualidad
  lexicon: HALOT
  rationale: «Azar» comunica la imprevisibilidad del evento sin exigir que el lector entienda una negación de providencia. Conserva la tensión del hebreo y el alcance sapiencial del pasaje.
- source_word: יִקְרֶה אֶת כֻּלָּם
  english_pob_choice: happen to them all
  chosen_spanish: les acontecen a todos
  alternatives_spanish:
  - les suceden a todos
  - les ocurren a todos
  - caen sobre todos
  lexicon: HALOT
  rationale: «Acontecen» reproduce el valor general de קרה y su tono impersonal. El dativo plural «les» refleja el objeto indirecto del hebreo en español natural.
theological_decisions:
- issue: Si עֵת וָפֶגַע debe sonar como negación de providencia divina
  english_pob_reading: The verse states the observable unpredictability of outcomes in life 'under the sun' without making a doctrinal claim that events are outside God's sovereignty.
  chosen_spanish_reading: El versículo describe la imprevisibilidad observable de la vida «bajo el sol» sin convertirla en una tesis doctrinal contra la soberanía de Dios.
  alternative_spanish_readings:
  - La vida está regida por el azar ciego
  - Nada ocurre bajo control providencial
  rationale: «Azar» conserva la fuerza del hebreo y la lectura de Qohelet desde la experiencia humana, pero la frase completa no añade una negación explícita de la providencia. La traducción preserva esa tensión.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente marcada como sin cambios (gpt-5.4, 2026-04-23) y mantiene el acuerdo alto del control cruzado, incorporando la misma lectura de עֵת וָפֶגַע como imprevisibilidad sin resolverla doctrinalmente.
  spanish_consistency_notes:
  - Se mantiene «bajo el sol» como fórmula técnica de Eclesiastés.
  - Se usa «favor» para חֵן en sentido social/sapiencial, no como «gracia» teológica.
  - «Azar» se eligió por su naturalidad en español y para preservar la tensión del hebreo.
  - Se prefirió el orden semítico en la primera cola para conservar paralelismo poético.
  - El marcador de nota [a] aparece anclado en «carrera».
