translation:
  language: es
  text: El hombre[a], el señor de la tierra, nos habló duramente y nos trató como espías del país[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos habló con dureza» o «nos habló severamente». El hebreo usa un adjetivo en función adverbial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nos consideró espías de la tierra». El hebreo dice literalmente «nos dio como espías de la tierra», un giro idiomático para tratarlos o tenerlos por tales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: nos habló
  alternatives_spanish:
  - habló
  - nos dijo
  lexicon: HALOT
  rationale: El verbo pi‘el de דבר expresa hablar; en español, «nos habló» mantiene la acción verbal y permite que «duramente» funcione de modo natural como complemento adverbial, reflejando el uso adverbial del hebreo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: El hombre
  alternatives_spanish:
  - El varón
  - Ese hombre
  lexicon: HALOT
  rationale: La referencia es a José visto desde la perspectiva de los hermanos. «El hombre» conserva ese punto de vista narrativo sin añadir identificación explícita.
- source_word: אֲדֹנֵי הָאָרֶץ
  english_pob_choice: the lord of the land
  chosen_spanish: el señor de la tierra
  alternatives_spanish:
  - el dueño de la tierra
  - el gobernante de la tierra
  lexicon: HALOT
  rationale: אדון en constructo con valor de autoridad se vierte mejor aquí como «señor». «De la tierra» mantiene el sustantivo hebreo «ארץ»; aunque en español podría sonar más natural «del país», se conserva «tierra» por fidelidad al texto y a la repetición de la frase.
- source_word: אִתָּנוּ
  english_pob_choice: with us
  chosen_spanish: nos
  alternatives_spanish:
  - con nosotros
  - a nosotros
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente «con nosotros», en español la combinación «habló duramente con nosotros» suena menos natural que «nos habló duramente». El objeto pronominal conserva la relación de la acción sin perder el sentido del original.
- source_word: קָשׁוֹת
  english_pob_choice: harshly
  chosen_spanish: duramente
  alternatives_spanish:
  - con dureza
  - ásperamente
  - severamente
  lexicon: HALOT
  rationale: El adjetivo plural funciona adverbialmente en hebreo. «Duramente» reproduce esa función en español de manera idiomática y cercana a la fuerza de la expresión.
- source_word: וַיִּתֵּן אֹתָנוּ כִּמְרַגְּלִים
  english_pob_choice: treated us as spies
  chosen_spanish: nos trató como espías
  alternatives_spanish:
  - nos consideró como espías
  - nos tomó por espías
  - nos dio por espías
  lexicon: HALOT
  rationale: נתן con complemento comparativo expresa considerar o tratar como. «Nos trató como espías» es natural en español y mantiene la idea de que fueron clasificados o tomados por espías, sin volver demasiado literal el hebreo.
- source_word: אֶת הָאָרֶץ
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la región
  - del país
  lexicon: HALOT
  rationale: La expresión final conserva «tierra» para reflejar el sustantivo hebreo y la repetición dentro de la frase. En español, «espías de la tierra» es menos idiomático que otras opciones, pero mantiene con fidelidad el objeto implicado en el texto.
translation_notes:
  revision_awareness: El borrador sigue el sentido confirmado por el texto hebreo y coincide con la revisión inglesa reciente que privilegia la relación natural entre «spoke harshly to us» y la acusación de tratarlos como espías. Se evita calcar «with us» donde el español requiere estructura más natural, pero se conserva la tensión semántica del idiomático וַיִּתֵּן אֹתָנוּ כִּמְרַגְּלִים.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «tierra» para ארץ por consistencia léxica con el hebreo, aunque en español ocasionalmente podría equivaler a «país».
  - «Señor» se usa como título humano de autoridad, en minúscula, para evitar confusión con el nombre divino.
