    rationale: La nota sobre «paga en pleno / recompensa abundantemente» debe ir unida a «plenamente» o a toda la expresión verbal de retribución, no solo quedar mencionada en el aparato.
  revised_spanish_text: Amen a Yahvé[a], todos sus fieles. Yahvé preserva a los fieles y paga plenamente[b] al que actúa con soberbia.
