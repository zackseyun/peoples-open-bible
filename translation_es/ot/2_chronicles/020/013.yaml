translation:
  language: es
  text: Y todo Judá estaba de pie delante de Yahvé, incluso sus pequeños, sus esposas y sus niños[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus hijos». El término hebreo puede significar específicamente «hijos» o, más ampliamente, «niños/descendencia» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And all
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y todos
  - Y todo el pueblo
  lexicon: HALOT
  rationale: וְ enlaza la frase con el contexto previo, y כָל expresa totalidad. En español, «Y todo» conserva la conexión y el alcance colectivo sin añadir información.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Aquí el nombre propio designa colectivamente a la gente de Judá. «Judá» es breve, natural y fiel al uso bíblico.
- source_word: עֹמְדִים
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba en pie
  - permanecía de pie
  lexicon: HALOT
  rationale: El participio comunica una postura o estado en curso. «Estaba de pie» conserva ese aspecto durativo en español y suena más natural que un pretérito simple.
- source_word: לִ/פְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en la presencia de
  lexicon: HALOT
  rationale: La expresión indica estar en la presencia de alguien. «Delante de» es concisa y solemne en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino יהוה; la convención española del proyecto lo rinde como «Yahvé», preservando el nombre del pacto en lugar de sustituirlo por un título.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  - aun
  lexicon: HALOT
  rationale: גַּם añade énfasis inclusivo. «Incluso» comunica bien esa fuerza enfática en una lista familiar.
- source_word: טַפָּם
  english_pob_choice: their little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus pequeños niños
  - sus niños pequeños
  lexicon: HALOT
  rationale: טַף se refiere a niños dependientes, a menudo muy pequeños. «Sus pequeños» es idiomático y amplio, sin forzar una precisión mayor que la del hebreo.
- source_word: נְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  lexicon: HALOT
  rationale: En este contexto de listado doméstico, la referencia natural es a las cónyuges. «Esposas» evita ambigüedad y mantiene el valor relacional del término.
- source_word: וּ/בְנֵיהֶם
  english_pob_choice: and their children
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus niños
  lexicon: HALOT
  rationale: בנים puede significar «hijos» o «hijos varones» según el contexto. El español «hijos» conserva la ambivalencia amplia del término en esta lista familiar y no restringe indebidamente el sentido.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura del POB en inglés preserva el nombre divino. En español, «Yahvé» es la forma preferida del proyecto para mantener la identidad personal del nombre del pacto sin recurrir a una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Cobertura del grupo familiar: טַפָּם נְשֵׁיהֶם וּבְנֵיהֶם'
  english_pob_reading: their little ones, their wives, and their children
  chosen_spanish_reading: sus pequeños, sus esposas y sus hijos
  alternative_spanish_readings:
  - sus pequeños, sus mujeres y sus hijos varones
  - sus pequeños, sus esposas y sus hijos
  rationale: La enumeración preserva las categorías domésticas del hebreo sin suavizarlas. «Pequeños» refleja טַף; «esposas» se ajusta al contexto familiar; «hijos» mantiene la amplitud de בנים sin reducirlo solo a varones.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y coincide con la auditoría inglesa aprobada sin cambios sustantivos. Se conserva el nombre divino como «Yahvé» según la convención española del proyecto, y se mantiene la enumeración doméstica con un nivel de especificidad acorde al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יהוה.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Sus hijos» mantiene la amplitud semántica de בנים en este contexto.
  - La nota al pie solo marca la alternativa verbal de עֹמְדִים y no introduce variantes no sustentadas.
