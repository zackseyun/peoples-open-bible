base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/002.yaml
  text: 'Thus says Yahweh of hosts[a], the God of Israel: You yourselves have seen all the disaster that I brought on Jerusalem and on all the cities of Judah. And behold, they are a ruin this day[b], and there is no one living in them.'
  footnotes:
  - marker: a
    text: Or 'all the calamity'; Hebrew רָעָה here refers to destructive judgment, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are in ruins this day.'
    reason: lexical_alternative
