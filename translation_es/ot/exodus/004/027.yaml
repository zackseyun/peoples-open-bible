translation:
  language: es
  text: 'Yahvé dijo a Aarón: «Ve al desierto[a] a encontrarte con Moisés». Él fue, lo encontró en el monte de Dios y lo besó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a encontrarte con Moisés en el desierto». El hebreo puede leerse resaltando el movimiento hacia el desierto como lugar del encuentro.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre propio del pacto: transliterar el Tetragrámaton como «Yahvé». En español evita sustituirlo por un título y conserva el valor nominal personal del hebreo.'
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Sal
  lexicon: HALOT
  rationale: El imperativo de הלך en discurso directo se expresa de forma natural y breve con «Ve», sin añadir matices no presentes en el hebreo.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para encontrarte con
  alternatives_spanish:
  - para ir al encuentro de
  - para reunirte con
  lexicon: HALOT
  rationale: La construcción de propósito se rinde en español con «para encontrarte con», que expresa el objetivo del movimiento sin hacerla más pesada que el hebreo. El reflexivo encaja con la forma dirigida a Aarón.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: in the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - hacia el desierto
  - en el desierto
  lexicon: HALOT
  rationale: El sufijo direccional favorece una lectura de movimiento hacia el lugar; por eso «al desierto» comunica mejor la orientación del mandato. Se mantiene el sustantivo «desierto» como equivalente bíblico habitual de מִדְבָּר.
- source_word: וַיִּפְגְּשֵׁהוּ
  english_pob_choice: met him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - se encontró con él
  - lo vio
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «met him», en español «lo encontró» suena más natural y conserva la idea de encuentro narrativo. Se evita sobrecargar con una formulación demasiado literal que en español resultaría menos idiomática.
- source_word: בְּהַר הָאֱלֹהִים
  english_pob_choice: at the mountain of God
  chosen_spanish: en el monte de Dios
  alternatives_spanish:
  - en el monte de Dios
  - junto al monte de Dios
  lexicon: HALOT
  rationale: «Monte de Dios» reproduce con claridad el constructo hebreo sin perder la referencia geográfica tradicional. «En» expresa adecuadamente el encuentro en ese lugar.
- source_word: וַיִּשַּׁק לוֹ
  english_pob_choice: and kissed him
  chosen_spanish: lo besó
  alternatives_spanish:
  - y lo besó
  - y lo besó en señal de saludo
  lexicon: HALOT
  rationale: El verbo נשׁק se traduce de manera directa por «besar». En español, el clítico «lo» integra bien el objeto sin necesidad de expansión interpretativa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la transliteración del nombre propio divino conforme al estándar del proyecto. No se sustituye por un título litúrgico porque el texto hebreo presenta el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Dirección de movimiento en לִקְרַאת הַמִּדְבָּרָה
  english_pob_reading: Go into the wilderness to meet Moses
  chosen_spanish_reading: Ve al desierto para encontrarte con Moisés
  alternative_spanish_readings:
  - Ve para encontrarte con Moisés en el desierto
  - Ve al desierto a encontrarte con Moisés
  rationale: La nota de revisión del inglés POB muestra que la frase debe leerse con el desierto como destino del movimiento y lugar del encuentro. En español se conserva esa relación sin forzar una estructura extraña.
  doctrine_reference: 'DOCTRINE.md: Translation accuracy and directional construals'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que reordenó la frase para reflejar que «el desierto» modifica el destino del movimiento. Por eso la versión española evita colocar «en el desierto» como si describiera solo el lugar estático y mantiene el sentido direccional del hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma uniforme del nombre divino, según el estándar del proyecto.
  - «Monte de Dios» se mantiene sin artículo adicional ni paráfrasis, en paralelo con el constructo hebreo.
  - 'El orden de la cláusula de movimiento respeta la lectura revisada del original: primero el desplazamiento, luego el encuentro.'
  - «Lo encontró» y «lo besó» preservan la referencia pronominal masculina singular sin añadir sujetos explícitos innecesarios.
