revisions:
- from: Los cielos declaran la gloria de Dios[a], y la expansión proclama la obra de sus manos[b].
  to: Los cielos declaran la gloria de Dios, y la bóveda celeste[a] proclama la obra de sus manos[b].
  rationale: Se corrige הָרָקִיעַ a una expresión más natural y precisa en español ('la bóveda celeste'), se preserva en nota la alternativa tradicional 'el firmamento' conforme al audit trail inglés, y se realinean las notas con las frases correctas del texto. Se elimina la nota innecesaria sobre 'los cielos', ya que el inglés no la preserva y no añade claridad suficiente aquí.
