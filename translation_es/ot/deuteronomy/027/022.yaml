translation:
  language: es
  text: 'Maldito[a] sea el que se acuesta con su hermana, la hija de su padre, o la hija de su madre. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse más literalmente: «la hija de su padre o la hija de su madre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldicho
  - Bajo maldición
  lexicon: HALOT
  rationale: El término abre una fórmula legal de maldición; en español, "maldito" comunica bien la fuerza declarativa y solemne. "Bajo maldición" explicita el estado, pero suena más interpretativo; "maldicho" es menos natural hoy.
- source_word: שֹׁכֵב עִם
  english_pob_choice: lies with
  chosen_spanish: se acuesta con
  alternatives_spanish:
  - tiene relaciones sexuales con
  - duerme con
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo sexual jurídico. "Se acuesta con" conserva el registro sobrio e idiomático sin volverse técnico o coloquial. "Tiene relaciones sexuales con" aclara, pero pierde la forma heredada del hebreo; "duerme con" puede sonar demasiado informal.
- source_word: אֲחֹתוֹ
  english_pob_choice: his sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de él
  lexicon: HALOT
  rationale: Es el equivalente directo y natural en español para el parentesco de primer nivel. Mantiene el vínculo familiar sin añadir precisión que el verso ya desarrolla en las cláusulas siguientes.
- source_word: בַּת אָבִיו
  english_pob_choice: the daughter of his father
  chosen_spanish: la hija de su padre
  alternatives_spanish:
  - la hija del padre de él
  - la hija de su papá
  lexicon: HALOT
  rationale: Se conserva la especificación legal y la estructura paralela del hebreo. En español, "la hija de su padre" suena formal y transparente; evita simplificar prematuramente a "hermana" porque el verso mismo mantiene la designación genealógica.
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  lexicon: HALOT
  rationale: Conjunción disyuntiva directa y exacta.
- source_word: בַת אִמּוֹ
  english_pob_choice: the daughter of his mother
  chosen_spanish: la hija de su madre
  alternatives_spanish:
  - la hija de la madre de él
  - la hija de su mamá
  lexicon: HALOT
  rationale: Mantiene el paralelismo con la cláusula anterior y la formulación legal explícita del hebreo. La reiteración de "la hija de..." conserva el carácter forense del texto.
- source_word: וְאָמַר
  english_pob_choice: And ... shall say
  chosen_spanish: Y ... dirá
  alternatives_spanish:
  - Y ... deberá decir
  - Entonces ... dirá
  lexicon: HALOT
  rationale: La secuencia litúrgica pide una forma futura simple en español. "Dirá" expresa el mandato/respuesta comunitaria de manera natural, sin sobrecargar con un auxiliar.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - toda la asamblea
  lexicon: HALOT
  rationale: '"Pueblo" reproduce con claridad el sustantivo colectivo del hebreo. No se amplía a "Israel" ni a "asamblea" porque el texto no lo dice explícitamente.'
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  lexicon: HALOT
  rationale: Se conserva la fórmula litúrgica tradicional, reconocible y fiel al hebreo. "Así sea" interpreta el sentido, pero pierde la forma ritual establecida.
theological_decisions:
- issue: Descripción del parentesco y alcance de la prohibición
  english_pob_reading: The verse straightforwardly curses intercourse with one's sister, specified by paternal or maternal descent.
  chosen_spanish_reading: El verso maldice al que se acuesta con su hermana, especificada por la relación con el padre o la madre.
  alternative_spanish_readings:
  - El verso se limita solo a una media hermana
  - El verso prohíbe de manera general cualquier pariente cercana
  rationale: La estructura hebrea define a la hermana mediante dos cláusulas parentales, y la traducción preserva esa precisión sin estrecharla ni ampliarla más allá del texto. La redacción española evita interpretar de antemano si es media hermana o hermana plena; deja visible la formulación legal original.
  doctrine_reference: Principios de traducción POB sobre precisión semántica y no expansión del texto
- issue: Respuesta litúrgica comunitaria
  english_pob_reading: And all the people shall say, “Amen.”
  chosen_spanish_reading: 'Y todo el pueblo dirá: «Amén».'
  alternative_spanish_readings:
  - 'Y todo el pueblo responderá: «Amén»'
  - 'Y toda la asamblea dirá: «Amén»'
  rationale: El hebreo presenta una respuesta prescrita de la comunidad; "dirá" mantiene la forma simple del mandato colectivo. "Responderá" explicita la función litúrgica, pero añade una relación no expresada directamente; "asamblea" sustituye el término más general por uno más técnico.
  doctrine_reference: Principios de traducción POB sobre fórmulas litúrgicas y correspondencia formal
translation_notes:
  revision_awareness: El inglés POB más reciente no muestra cambios revisionales respecto de la lectura base; la traducción española sigue esa misma solución, conservando la formulación legal y la respuesta litúrgica sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece en el texto fuente; aquí no aparece.
  - Se conserva el paralelo genealógico «la hija de su padre / la hija de su madre» para respetar la forma jurídica del hebreo.
  - «Amén» se translitera por su uso litúrgico estable en español.
  - La construcción «se acuesta con» mantiene el eufemismo bíblico sin vulgaridad ni tecnicismo excesivo.
