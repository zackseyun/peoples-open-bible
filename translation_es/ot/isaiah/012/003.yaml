translation:
  language: es
  text: Con gozo sacarán agua de los manantiales de la salvación[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los pozos de la salvación» o «de las fuentes de la salvación».
    reason: lexical_alternative
  - marker: b
    text: «Salvación» también puede rendirse aquí como «liberación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁאַבְתֶּם
  english_pob_choice: you will draw
  chosen_spanish: sacarán
  alternatives_spanish:
  - y sacarán
  - sacaréis
  lexicon: HALOT
  rationale: El verbo hebreo se entiende naturalmente en futuro profético. En español, «sacarán» comunica esa promesa con fluidez. Se omite la conjunción inicial porque en español no aporta claridad en esta cláusula aislada.
- source_word: מַ֖יִם
  english_pob_choice: water
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: El plural hebreo funciona aquí como sustantivo de masa. «Aguas» conserva mejor la imagen poética del texto que un singular más abstracto.
- source_word: בְּ/שָׂשׂ֑וֹן
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - gozosamente
  lexicon: HALOT
  rationale: La preposición con el sustantivo se vierte de forma circunstancial. «Con gozo» mantiene el tono poético y la estructura nominal sin volverlo adverbial de modo excesivo.
- source_word: מִ/מַּעַיְנֵ֖י
  english_pob_choice: from the springs
  chosen_spanish: de los manantiales
  alternatives_spanish:
  - de los pozos
  - de las fuentes
  lexicon: HALOT
  rationale: מַעְיָן designa un manantial o fuente natural. «Manantiales» es preciso y más natural en español actual que «pozos», que sugeriría una obra humana.
- source_word: הַ/יְשׁוּעָֽה
  english_pob_choice: of salvation
  chosen_spanish: de la salvación
  alternatives_spanish:
  - de la liberación
  - de la victoria
  lexicon: HALOT
  rationale: «Salvación» preserva el alcance teológico y poético del término hebreo mejor que «liberación» en este contexto, sin cerrar la amplitud del pasaje.
theological_decisions:
- issue: Si יְשׁוּעָה debe restringirse a rescate histórico o conservar su amplitud teológica
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  rationale: En Isaías 12, el canto celebra la acción salvadora de Yahvé con un término que conserva fuerza histórica y resonancia teológica. «Salvación» reproduce mejor esa amplitud que una reducción a «liberación».
  doctrine_reference: Isaías 12:3; principio de preservar la tensión lexical y teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: El texto inglés auditado no recibió revisiones sustantivas y fue confirmado por el control cruzado como de alta concordancia; por eso la versión española sigue de cerca la solución léxica principal sin añadir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato, conforme al estándar del proyecto.
  - Se conservó el registro poético y la metáfora acuática sin sustituirla por una paráfrasis explicativa.
  - Se eligió «manantiales» por concordar mejor con el campo semántico de מַעְיָן y con el paralelismo poético.
  - Las notas al pie usan alternativas reales del campo léxico y no introducen glosas doctrinales ajenas al hebreo.
