translation:
  language: es
  text: ¡Ay de mí, mi madre, porque me diste a luz, hombre de pleito y hombre de contienda para toda la tierra[a]! No he prestado, ni me han prestado[b], y sin embargo todos ellos me maldicen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para toda la tierra» en el sentido de «para toda la tierra entera» o «para toda la tierra». El hebreo también puede entenderse de manera más amplia, pero en Jeremías a menudo se refiere a la tierra o país.
    reason: alternative_reading
  - marker: b
    text: El hebreo probablemente alude a prestar y tomar prestado en un contexto de deuda; Jeremías dice que no ha dado motivo social ordinario para tal hostilidad.
    reason: cultural_note
lexical_decisions:
- source_word: אֽוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de mí,
  lexicon: HALOT
  rationale: Se conserva el grito de lamento y angustia. En español, «¡Ay de mí!» comunica bien la exclamación profética y su tono doliente, sin perder naturalidad.
- source_word: אִמִּי
  english_pob_choice: my mother
  chosen_spanish: madre mía
  alternatives_spanish:
  - mi madre
  lexicon: HALOT
  rationale: Mantiene el vocativo directo en un registro natural y solemne. «Madre mía» conserva el impulso afectivo del hebreo en la lamentación.
- source_word: כִּי יְלִדְתִּנִי
  english_pob_choice: because you bore me
  chosen_spanish: porque me diste a luz
  alternatives_spanish:
  - porque me alumbraste
  - porque me engendraste
  lexicon: HALOT
  rationale: «Dar a luz» expresa de forma clara y digna el acto de parir/traer al mundo; en español resulta más natural que calcar el verbo hebreo. Se conserva la causalidad con «porque».
- source_word: אִישׁ רִיב
  english_pob_choice: a man of strife
  chosen_spanish: hombre de pleito
  alternatives_spanish:
  - hombre de contienda
  - hombre de disputa
  lexicon: HALOT
  rationale: Se busca un equivalente idiomático que mantenga la fuerza conflictiva. «Pleito» expresa bien la idea de disputa litigiosa o contenciosa en español bíblico contemporáneo.
- source_word: וְאִישׁ מָדוֹן
  english_pob_choice: and a man of contention
  chosen_spanish: y hombre de contienda
  alternatives_spanish:
  - y hombre de disputa
  - y hombre de querella
  lexicon: HALOT
  rationale: Se conserva el paralelismo hebreo con un segundo sustantivo cercano pero no idéntico. «Contienda» mantiene la intensificación retórica y el tono formal.
- source_word: לְכָל הָאָרֶץ
  english_pob_choice: to all the land
  chosen_spanish: para toda la tierra
  alternatives_spanish:
  - para toda la tierra del país
  - para todo el país
  lexicon: HALOT
  rationale: El hebreo puede leerse como alcance territorial amplio. Se opta por «tierra» para preservar la amplitud posible del texto y la ambigüedad documentada en la tradición inglesa (land/earth).
- source_word: לֹא נָשִׁיתִי
  english_pob_choice: I have not lent
  chosen_spanish: No he prestado
  alternatives_spanish:
  - No he hecho préstamos
  - No he prestado a interés
  lexicon: HALOT
  rationale: «Prestar» expresa de manera directa la relación de crédito aludida por el hebreo. Se evita especificar interés, porque el texto no lo exige de forma explícita.
- source_word: וְלֹא נָשׁוּ בִי
  english_pob_choice: nor have they lent to me
  chosen_spanish: ni han prestado a mí
  alternatives_spanish:
  - ni me han prestado
  - ni han hecho préstamos a mí
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el verbo de préstamo. La construcción «prestar a mí» resulta algo marcada en español, pero mantiene visible la dirección del intercambio económico que el contexto sugiere.
- source_word: כֻּלֹּה
  english_pob_choice: every one of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - cada uno de ellos
  - todos
  lexicon: HALOT
  rationale: El hebreo es distributivo y colectivo. «Todos ellos» comunica bien la totalidad del sujeto sin sobrerrecargar la frase.
- source_word: מְקַלְלַנִי
  english_pob_choice: curses me
  chosen_spanish: me maldicen
  alternatives_spanish:
  - me están maldiciendo
  - me insultan
  lexicon: HALOT
  rationale: Se preserva la fuerza verbal de la maldición. El presente plural en español comunica la acción general y continua del participio hebreo.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra (en sentido territorial, no necesariamente global)
  rationale: No hay una diferencia doctrinal aquí, pero sí de alcance semántico. Se mantiene «tierra» para no restringir indebidamente el hebreo y para conservar la posibilidad de una lectura amplia, tal como reconoce el audit trail inglés.
  doctrine_reference: Contexto profético de Jeremías; decisión semántica, no doctrinal.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se registraron cambios necesarios y el acuerdo de revisión fue alto. La versión española conserva la misma estructura retórica y la misma resolución de las ambigüedades principales del texto hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - 'Se conserva el paralelismo poético con dos sustantivos coordinados: «hombre de pleito / hombre de contienda».'
  - La nota de préstamo evita tecnicismos no presentes en el hebreo y deja abierta la referencia al trasfondo económico-social.
  - Se usa «tierra» para reflejar la ambigüedad de הָאָרֶץ, sin convertirla automáticamente en «mundo».
