revisions:
- from: Todas las ciudades que den a los levitas serán cuarenta y ocho ciudades[a], ellas y sus ejidos.
  to: Todas las ciudades que ustedes den a los levitas serán cuarenta y ocho ciudades, ellas y sus pastizales[a].
  rationale: Se corrige la persona verbal para reflejar con claridad el 2mp hebreo, se mantiene el resumptivo explícito «ellas» en línea con la revisión inglesa auditada, y se reemplaza «ejidos» por «pastizales» para seguir mejor el valor contextual de מִגְרָשׁ y mejorar la comprensión panhispánica. También se reubica el marcador de nota al término verdaderamente discutido.
