translation:
  language: es
  text: No me trajiste ovejas para tus holocaustos, ni me honraste con tus sacrificios. No te he abrumado con ofrendas de cereal[a], ni te he fatigado con olíbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No te he hecho servir con ofrendas de cereal». El modismo hebreo expresa la idea de imponer un servicio gravoso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - ganado menor
  lexicon: HALOT
  rationale: שֵׂה es un término colectivo para ganado menor, especialmente ovejas o cabras. En español, ‘oveja’ es natural y suficientemente amplio en este contexto; ‘cordero’ sería demasiado específico y ‘ganado menor’ demasiado técnico.
- source_word: עֹלֹתֶיךָ
  english_pob_choice: your burnt offerings
  chosen_spanish: tus holocaustos
  alternatives_spanish:
  - tus ofrendas quemadas
  - tus ofrendas ascendentes
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda completamente consumida por fuego. ‘Holocaustos’ conserva el sentido cultual tradicional y corresponde al tipo de sacrificio; ‘ofrendas ascendentes’ es más etimológica pero menos natural en español.
- source_word: זְבָחֶיךָ
  english_pob_choice: your sacrifices
  chosen_spanish: tus sacrificios
  alternatives_spanish:
  - tus ofrendas de sacrificio
  - tus sacrificios ofrecidos
  lexicon: HALOT
  rationale: זֶבַח es el término general para sacrificio, normalmente de animal degollado. ‘Sacrificios’ es la forma más clara y fiel en español.
- source_word: כִבַּדְתָּנִי
  english_pob_choice: have you honored me
  chosen_spanish: me honraste
  alternatives_spanish:
  - me glorificaste
  - me trataste como digno de honor
  lexicon: HALOT
  rationale: El piel de כבד suele significar ‘honrar’. En este contexto, ‘me honraste’ mantiene la fuerza idiomática y el paralelo con la falta de ofrendas.
- source_word: הֶעֱבַדְתִּיךָ
  english_pob_choice: I have not burdened you
  chosen_spanish: No te he abrumado
  alternatives_spanish:
  - No te he hecho servir
  - No te he esclavizado
  lexicon: HALOT
  rationale: La forma causativa de עבד puede expresar imponer servicio o carga. ‘No te he abrumado’ conserva el matiz de carga onerosa que el POB inglés destacó, y se ajusta al paralelo con ‘ni te he fatigado’.
- source_word: מִנְחָה
  english_pob_choice: grain offerings
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda de grano
  - oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial se refiere a una ofrenda de cereal/grano. ‘Ofrenda de cereal’ es precisa y comprensible en español; ‘oblación’ sería más tradicional pero menos transparente.
- source_word: הוֹגַעְתִּיךָ
  english_pob_choice: wearied you
  chosen_spanish: te he fatigado
  alternatives_spanish:
  - te he cansado
  - te he agotado
  lexicon: HALOT
  rationale: יָגַע en hiphil significa causar fatiga o cansancio. ‘Te he fatigado’ preserva la idea de agotamiento provocado y el paralelismo con ‘abrumado’.
- source_word: לְבוֹנָה
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - olíbano
  - franquincienso
  lexicon: HALOT
  rationale: לְבוֹנָה designa específicamente el incienso aromático usado en el culto; en español bíblico, ‘incienso’ es el término más claro y natural. Aunque ‘frankincense’ es más específico en inglés, ‘incienso’ comunica adecuadamente el referente cultual.
theological_decisions:
- issue: Sentido de la afirmación divina sobre el culto
  english_pob_reading: God says he did not impose oppressive ritual demands on Israel
  chosen_spanish_reading: Dios dice que no les impuso una carga ritual opresiva
  alternative_spanish_readings:
  - Dios dice que no exigió sacrificios en absoluto
  - Dios contrasta su trato ligero con la falta de honor de Israel
  rationale: 'Las dos cláusulas finales funcionan retóricamente: Dios no presenta su culto como una carga pesada, de modo que la falta de ofrendas revela deshonra por parte de Israel. La redacción española mantiene esa tensión sin negar la legitimidad del sistema sacrificial.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; se mantiene la lectura de alta concordancia del auditor y no se introducen revisiones textuales nuevas.
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal entre ‘abrumado’ y ‘fatigado’ para reflejar la estructura del hebreo.
  - ‘Holocaustos’ mantiene la terminología cultual clásica y se usa aquí por fidelidad al tipo de ofrenda.
  - Se evita ‘SEÑOR’ porque el versículo no contiene el Tetragrámaton explícito en esta forma, y no hace falta una sustitución reverencial en esta unidad.
