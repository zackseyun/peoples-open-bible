review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro del POB inglés: mantiene la tensión entre el pasado נָתַתִּי (''di'') y los futuros (''daré''), conserva ''la tierra'' para הָאָרֶץ, y traduce זַרְעֲךָ con el colectivo natural ''descendencia''. La repetición final de ''daré la tierra'' también preserva la reiteración promesal del hebreo.'
  spanish_quality_summary: El texto es claro y natural, pero tiene un pequeño problema de estilo y énfasis en 'te la daré a ti', donde el doble marcado del destinatario suena innecesariamente cargado en español. Además, la nota [b] está anclada en 'ti' aunque su contenido explica 'descendencia'; el anclaje debe moverse al término correspondiente.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'La tierra' y 'descendencia' son adecuados aquí; no hay nombres divinos ni títulos mesiánicos en juego. La elección 'descendencia' concuerda con la decisión documentada de preservar el singular colectivo de זֶרַע.
  issues:
  - severity: medium
    issue: El anclaje de la nota [b] está colocado en 'ti' en vez de en 'descendencia'.
    rationale: La nota explica el valor léxico de זַרְעֲךָ, no el pronombre 'ti'. Debe aparecer junto a 'descendencia' para corresponder con la evidencia fuente y evitar confusión.
  - severity: low
    issue: '''te la daré a ti'' es gramatical, pero estilísticamente recargado.'
    rationale: El hebreo marca el destinatario, pero en español 'te la daré' ya expresa con naturalidad el objeto indirecto. Añadir 'a ti' produce énfasis no requerido por el contexto inmediato y hace la frase menos fluida.
  revised_spanish_text: Y la tierra que di a Abraham y a Isaac[a] te la daré; y a tu descendencia[b] después de ti daré la tierra.
  revised_footnotes:
