  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La revisión recomendada alinea mejor תִירוֹשׁ con la preferencia documentada del POB por «new wine», que en español aquí se expresa mejor como «vino nuevo» que como «mosto».
