id: REV.3.9
reference: 'Revelation 3:9'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'ἰδοὺ ⸀διδῶ ἐκ τῆς συναγωγῆς τοῦ Σατανᾶ, τῶν λεγόντων ἑαυτοὺς Ἰουδαίους εἶναι, καὶ οὐκ εἰσὶν ἀλλὰ ψεύδονται— ἰδοὺ ποιήσω αὐτοὺς ἵνα ⸂ἥξουσιν καὶ προσκυνήσουσιν⸃ ἐνώπιον τῶν ποδῶν σου, καὶ γνῶσιν ὅτι ⸀ἐγὼ ἠγάπησά σε.'
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/009.yaml
  text: 'Look[a], I am giving some from the synagogue of Satan—those who call themselves Jews and are not, but are lying—look, I will make them come and bow down before your feet[b], and they will know that I have loved you.'
  footnotes:
  - marker: a
    text: Or 'those of the synagogue of Satan.' The Greek literally says 'I am giving from the synagogue of Satan,' which likely means that some from that group will be made to come.
    reason: lexical_alternative
  - marker: b
    text: Or 'come and worship before your feet.' The Greek verb can mean 'bow down' or 'worship'; here 'bow down' is used to avoid implying that believers receive divine worship.
    reason: alternative_reading
translation:
  language: ko
  text: '보라, 내가 사탄의 회당에 속한 자들—유대인이라 자칭하나 유대인이 아니요 거짓말하는 자들—중에서 어떤 이들로 하여금[a] 와서 네 발 앞에 엎드리게 하리라[b]. 그리하여 내가 너를 사랑하였음을 그들이 알게 하리라.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 직역은 「내가 사탄의 회당에서 주노라」이며, 그들 중 일부가 오게 될 것임을 가리킨다.'
    reason: lexical_alternative
  - marker: b
    text: '또는 「와서 네 발 앞에서 경배하게 하리라」. 헬라어 동사는 「엎드리다」나 「경배하다」로 모두 옮길 수 있다. 신자가 신적 경배의 대상이 되지 않도록 「엎드리다」를 채택.'
    reason: alternative_reading
