translation:
  language: es
  text: ¡Ojalá hubieras prestado atención[a] a mis mandamientos! Entonces tu paz habría sido como un río, y tu rectitud[b] como las olas del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hubieras escuchado» o «hubieras hecho caso» a mis mandamientos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ל֥וּא
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - Si tan solo
  - ¡Quién hubiera
  lexicon: HALOT
  rationale: Expresa bien el deseo irreal y lamentoso del hebreo en español natural y digno. 'Ojalá' conserva la fuerza emotiva sin sonar arcaico.
- source_word: הִקְשַׁ֖בְתָּ
  english_pob_choice: you had paid attention
  chosen_spanish: hubieras prestado atención
  alternatives_spanish:
  - hubieras escuchado
  - hubieras hecho caso
  lexicon: HALOT
  rationale: El verbo hebreo implica escucha atenta con respuesta. 'Prestar atención' comunica esa atención responsable mejor que una mera audición; el pluscuamperfecto marca el carácter contrafactual.
- source_word: לְמִצְוֺתָ֑/י
  english_pob_choice: to my commandments
  chosen_spanish: a mis mandamientos
  alternatives_spanish:
  - a mis órdenes
  - a mis preceptos
  lexicon: HALOT
  rationale: '''Mandamientos'' preserva el peso pactal y moral de מִצְוֹתַי. ''Órdenes'' suena más general y ''preceptos'' puede resultar más técnico o menos inmediato.'
- source_word: וַ/יְהִ֤י
  english_pob_choice: Then ... would have been
  chosen_spanish: Entonces ... habría sido
  alternatives_spanish:
  - Y ... sería
  - Entonces ... sería
  lexicon: HALOT
  rationale: En este contexto contrafactual, el hebreo expresa el resultado hipotético de una condición no cumplida. 'Habría sido' refleja mejor la relación lógica y temporal que una forma simple del presente o pasado.
- source_word: כַ/נָּהָר֙
  english_pob_choice: like a river
  chosen_spanish: como un río
  alternatives_spanish:
  - como río
  - igual que un río
  lexicon: HALOT
  rationale: La comparación es directa y clara en español. 'Como un río' mantiene la imagen de flujo continuo y abundante.
- source_word: שְׁלוֹמֶ֔/ךָ
  english_pob_choice: your peace
  chosen_spanish: tu paz
  alternatives_spanish:
  - tu bienestar
  - tu plenitud
  lexicon: HALOT
  rationale: '''Paz'' es la traducción más natural y fiel para שָׁלוֹם en este paralelismo poético, sin perder sus resonancias de bienestar integral.'
- source_word: וְ/צִדְקָתְ/ךָ֖
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia recta
  lexicon: HALOT
  rationale: 'Aquí se preserva la tensión lexical documentada: צְדָקָה puede ser ''justicia'' o ''rectitud''. Aunque el inglés POB eligió ''righteousness'' en el texto principal, el español ''justicia'' funciona de forma natural y mantiene el rango semántico jurídico-covenantal que el proyecto señala como posible.'
- source_word: כְּ/גַלֵּ֥י הַ/יָּֽם
  english_pob_choice: like the waves of the sea
  chosen_spanish: como las olas del mar
  alternatives_spanish:
  - como las ondas del mar
  - como las olas del océano
  lexicon: HALOT
  rationale: '''Olas del mar'' reproduce la imagen poética con naturalidad en español. ''Olas'' es más idiomático que una traducción más técnica de ''waves'' y conserva la abundancia y el movimiento continuo.'
theological_decisions:
- issue: 'Tensión lexical de צִדְקָה: ''righteousness'' / ''justice'''
  english_pob_reading: your righteousness like the waves of the sea
  chosen_spanish_reading: tu justicia como las olas del mar
  alternative_spanish_readings:
  - tu rectitud como las olas del mar
  - tu justicia/rectitud como las olas del mar
  rationale: El contexto vincula obediencia a los mandamientos con una condición resultante de orden recto delante de Dios. En español, 'justicia' es una opción plenamente válida y frecuente para צְדָקָה; además conserva la amplitud de sentido jurídico y moral que el registro POB quiere hacer auditable.
  doctrine_reference: Translation philosophy §5; contested terms table on righteousness/justice
- issue: Modo contrafactual del deseo inicial
  english_pob_reading: If only you had paid attention ... Then your peace would have been ...
  chosen_spanish_reading: ¡Ojalá hubieras prestado atención ... Entonces tu paz habría sido ...
  alternative_spanish_readings:
  - Si tan solo hubieras prestado atención ... entonces ... habría sido ...
  - ¡Quién hubiera prestado atención ...!
  rationale: El hebreo ל֥וּא introduce un lamento/deseo no realizado. 'Ojalá' es la forma española más natural para reproducir ese valor afectivo sin debilitar la condición contrafactual.
  doctrine_reference: HALOT; translation philosophy §4 on mood and counterfactual force
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones; se mantuvo estable en la última pasada y presenta alta concordancia. La propuesta española sigue de cerca la estructura contrafactual del hebreo y conserva la tensión léxica de צִדְקָה con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'mandamientos' para מִצְוֺתַי conforme al valor pactal del término.
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija explícitamente; aquí no aparece el Tetragrámaton.
  - Se evita 'Cristo' y 'SEÑOR' por no corresponder al verso.
  - Se conserva el paralelismo poético con 'como un río' / 'como las olas del mar'.
