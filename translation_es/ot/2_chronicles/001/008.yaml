base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/001/008.yaml
  text: And Solomon said to God[a], “You have shown great steadfast love to David my father, and have made me king in his place.”
  footnotes:
  - marker: a
    text: Or “have shown great kindness to David my father” or “have shown great steadfast love to David my father.” The Hebrew חֶסֶד often carries the sense of loyal, covenantal love or faithfulness.
    reason: lexical_alternative
