translation:
  language: es
  text: 'Y el rey volvió del jardín del palacio a la casa del banquete del vino, y Amán había caído sobre el diván donde estaba Ester. Entonces dijo el rey: «¿También va a violentar[a] a la reina mientras yo estoy en la casa?» Apenas salió la palabra de la boca del rey[b], cubrieron el rostro de Amán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿También va a violar a la reina mientras yo estoy en la casa?». El verbo hebreo puede expresar someter o dominar; aquí lleva la acusación del rey de una agresión intolerable.
    reason: lexical_alternative
  - marker: b
    text: Es decir, los sirvientes de la corte cubrieron de inmediato el rostro de Amán, señal de que el juicio contra él ya había recaído efectivamente.
    reason: cultural_note
lexical_decisions:
- source_word: גִּנַּת הַבִּיתָן
  english_pob_choice: the palace garden
  chosen_spanish: el jardín del palacio
  alternatives_spanish:
  - el jardín del pabellón
  - el jardín del palacio real
  lexicon: HALOT
  rationale: גִּנָּה es «jardín» y בִּיתָן remite al complejo palaciego o pabellón real. «Jardín del palacio» conserva el marco real sin forzar un calco poco natural.
- source_word: בֵּית מִשְׁתֵּה הַיַּיִן
  english_pob_choice: the house of the wine feast
  chosen_spanish: la casa del banquete del vino
  alternatives_spanish:
  - la casa del banquete
  - el salón del banquete del vino
  lexicon: HALOT
  rationale: מִשְׁתֶּה es «banquete / festín» y הַיַּיִן especifica el banquete de vino. «Banquete del vino» mantiene el motivo repetido en Ester y suena más natural en español que un literalismo rígido.
- source_word: נֹפֵל
  english_pob_choice: had fallen
  chosen_spanish: estaba caído
  alternatives_spanish:
  - había caído
  - estaba cayendo
  - yacía
  lexicon: HALOT
  rationale: El participio presenta a Amán en la situación en que el rey entra. «Estaba caído» mantiene la escena visible y evita sobrecargar el aspecto verbal con una paráfrasis.
- source_word: הַמִּטָּה
  english_pob_choice: the couch
  chosen_spanish: el diván
  alternatives_spanish:
  - el lecho
  - el sofá reclinable
  lexicon: HALOT
  rationale: En contexto de banquete, מִטָּה designa un mueble de reclinación, no una cama para dormir. «Diván» comunica bien ese mueble sin sexualizarlo innecesariamente.
- source_word: עָלֶיהָ
  english_pob_choice: where Esther was
  chosen_spanish: donde estaba Ester
  alternatives_spanish:
  - sobre el cual estaba Ester
  - en el que estaba Ester recostada
  lexicon: HALOT
  rationale: La preposición significa literalmente «sobre ella». En español, «donde estaba Ester» conserva la claridad de la escena sin añadir un verbo de postura no expresado explícitamente en el hebreo.
- source_word: הֲגַם לִכְבּוֹשׁ
  english_pob_choice: Will he even violate
  chosen_spanish: ¿También va a violentar
  alternatives_spanish:
  - ¿También va a violar
  - ¿También va a someter
  - ¿También va a dominar
  lexicon: HALOT
  rationale: כָּבַשׁ significa subyugar, someter o dominar. En esta acusación cargada, «violentar» transmite la agresión y la amenaza contra la reina sin afirmar con exceso una especificidad léxica que el verbo por sí solo no fija.
- source_word: עִמִּי בַּבָּיִת
  english_pob_choice: while I am in the house
  chosen_spanish: en mi presencia, en la casa
  alternatives_spanish:
  - conmigo en la casa
  - mientras yo estoy en la casa
  lexicon: HALOT
  rationale: Literalmente es «conmigo en la casa». «En mi presencia, en la casa» preserva el escándalo de que el acto se estaría intentando ante el rey mismo, de forma natural en español.
- source_word: הַדָּבָר יָצָא מִפִּי הַמֶּלֶךְ
  english_pob_choice: As the word went out from the king’s mouth
  chosen_spanish: Apenas salió la palabra de la boca del rey
  alternatives_spanish:
  - Cuando salió la palabra de la boca del rey
  - En cuanto salió la palabra de la boca del rey
  lexicon: HALOT
  rationale: La fórmula expresa la inmediatez y autoridad de la palabra real. «Apenas salió» captura bien el efecto narrativo sin perder el matiz de salida verbal.
- source_word: וּפְנֵי הָמָן חָפוּ
  english_pob_choice: they covered Haman’s face
  chosen_spanish: cubrieron el rostro de Amán
  alternatives_spanish:
  - cubrieron la cara de Amán
  - le cubrieron el rostro a Amán
  lexicon: HALOT
  rationale: El hebreo usa una forma activa plural; el español puede reproducirla con sujeto omitido. «Rostro» mantiene un registro digno y bíblico, y la acción expresa la señal de juicio inminente.
theological_decisions:
- issue: Fuerza acusatoria de כָּבַשׁ en la pregunta del rey
  english_pob_reading: Will he even violate the queen while I am in the house?
  chosen_spanish_reading: ¿También va a violentar a la reina en mi presencia, en la casa?
  alternative_spanish_readings:
  - ¿También va a violar a la reina en mi presencia, en la casa?
  - ¿También va a someter a la reina en mi presencia, en la casa?
  rationale: El contexto no describe un acto consumado sino una acusación de agresión infame. «Violentar» conserva la gravedad del ataque y la ambigüedad lexical del hebreo, evitando fijar más de lo que el texto exige.
  doctrine_reference: Ética bíblica del abuso y la violencia sexual; lectura contextual de la acusación real en Ester 7:8
- issue: Cobertura del rostro de Amán como señal judicial
  english_pob_reading: they covered Haman’s face
  chosen_spanish_reading: cubrieron el rostro de Amán
  alternative_spanish_readings:
  - le cubrieron el rostro a Amán
  - cubrieron la cara de Amán
  rationale: La acción alude a una señal cortesana de condena ya efectiva. Se mantiene la frase de modo sobrio y sin explicitar en el texto principal lo que la nota puede aclarar.
  doctrine_reference: Costumbre cortesana y juicio real en la narrativa de Ester
translation_notes:
  revision_awareness: Se incorporó la revisión que prefirió una formulación más natural para el estado de Amán en contexto y una acusación verbal con mayor fuerza; en español se optó por una construcción que preserve esa intensidad sin sobreespecificar el acto. También se corrigió la anotación a fin de que el marcador de nota [a] aparezca exactamente en el texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Amán» como forma española uniforme del nombre propio.
  - Se preservó el registro narrativo formal y sobrio propio de Ester.
  - Se eligió «rostro» para el hebreo פָּנִים, evitando «cara» en el texto principal por coherencia de estilo.
