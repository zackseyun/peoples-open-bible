translation:
  language: es
  text: Mira[a], un pueblo se levanta como una leona, y se alza como un león; no se echará hasta que coma la presa y beba la sangre de los caídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». La partícula hebrea introduce una observación enfática; «Mira» conserva el tono directo y vivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Ve
  lexicon: HALOT
  rationale: La partícula introduce una observación enfática. «Mira» suena natural en español moderno y conserva el llamado de atención sin cargarlo de arcaísmo.
- source_word: עָם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - un pueblo de gente
  lexicon: HALOT
  rationale: El sustantivo colectivo se refiere al pueblo de Israel; «pueblo» preserva el sentido colectivo y suena más natural que «nación» en este poema oracular.
- source_word: כְּלָבִיא
  english_pob_choice: like a lioness
  chosen_spanish: como una leona
  alternatives_spanish:
  - como un león
  lexicon: HALOT
  rationale: Se conserva la distinción léxica frente a אֲרִי. «Leona» refleja mejor la posible especificidad de לָבִיא y mantiene el contraste poético con el siguiente «león».
- source_word: יָקוּם
  english_pob_choice: rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - surge
  - se alza
  lexicon: HALOT
  rationale: El verbo transmite aquí el acto de incorporarse o levantarse con fuerza; «se levanta» encaja bien con la imagen animal y con el español actual.
- source_word: וְכַאֲרִי
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como un gran león
  lexicon: HALOT
  rationale: Se mantiene el paralelismo y la diferencia con לָבִיא sin añadir matices de tamaño o edad que el hebreo no explicita.
- source_word: יִתְנַשָּׂא
  english_pob_choice: lifts itself up
  chosen_spanish: se alza
  alternatives_spanish:
  - se eleva
  - se yergue
  lexicon: HALOT
  rationale: En este contexto imaginario de animal, «se alza» expresa bien la postura majestuosa o amenazante sin volver abstracto el verbo.
- source_word: לֹא יִשְׁכַּב
  english_pob_choice: it will not lie down
  chosen_spanish: no se echará
  alternatives_spanish:
  - no se acostará
  - no se tenderá
  lexicon: HALOT
  rationale: «Echarse» conserva la imagen concreta de un animal que no se recuesta; es más idiomático que una forma demasiado literal de «acostarse».
- source_word: עַד יֹאכַל טֶרֶף
  english_pob_choice: until it eats the prey
  chosen_spanish: hasta que coma la presa
  alternatives_spanish:
  - hasta que devore la presa
  - hasta que se alimente de la presa
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que prefirió «eats» para acercarse al verbo comer sin intensificación innecesaria. «Presa» preserva el sentido de טֶרֶף.
- source_word: וְדַם חֲלָלִים יִשְׁתֶּה
  english_pob_choice: and drinks the blood of the slain
  chosen_spanish: y beba la sangre de los muertos
  alternatives_spanish:
  - y beba la sangre de los caídos
  - y beba la sangre de los heridos
  lexicon: HALOT
  rationale: «Muertos» refleja de manera natural el grupo de חֲלָלִים en este contexto bélico. Se conserva la crudeza de la imagen sin suavizarla.
theological_decisions:
- issue: Imagen violenta de triunfo bélico
  english_pob_reading: Retain the predatory and blood-drinking imagery as metaphorical language of military triumph and unstoppable strength.
  chosen_spanish_reading: Mantener la imagen depredadora y de beber sangre como lenguaje metafórico de triunfo militar e ímpetu irresistible.
  alternative_spanish_readings:
  - Suavizar la imagen a una simple idea de victoria
  - Parafrasear para evitar la crudeza
  rationale: El hebreo es deliberadamente fuerte; la traducción no debe diluir la tensión ni convertirla en una generalidad. La metáfora apunta a conquista y poder, no a una práctica literal.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail inglés: se optó por «come la presa» en lugar de una intensificación como «devora», para seguir más de cerca el verbo hebreo sin sobreinterpretación. También se mantuvo la distinción entre לָבִיא y אֲרִי con «leona» / «león», como en la nota léxica inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «leona» para reflejar la distinción léxica preservada por el POB inglés entre לָבִיא y אֲרִי.
  - «Muertos» conserva la fuerza del contexto bélico; no se suaviza a una formulación más neutral.
