  yaml_path: translation/nt/2_thessalonians/001/002.yaml
  text: Grace to you and peace from God our Father and the Lord Jesus Messiah[a].
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered 'Christ' or 'Messiah'; here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
translation:
  language: ko
  text: 우리 아버지 하나님과 주 예수 메시아[a]께로부터 은혜와 평강이 여러분에게 있기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_korean: 은혜
  alternatives_korean:
  - 호의
  - 은총
  lexicon: BDAG
  rationale: 바울 서신의 인사 정식에서 가장 표준적이고 관계적·신학적 무게를 함께 담는 한국어 어휘.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_korean: 평강
  alternatives_korean:
  - 평화
  - 안녕
  lexicon: BDAG
  rationale: 히브리어 שָׁלוֹם의 그림자가 짙은 εἰρήνη를 단순한 사회적 평화 이상의 안녕·온전함을 함의하는 「평강」으로 옮겨 무게를 살린다.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God our Father
  chosen_korean: 우리 아버지 하나님
  alternatives_korean:
  - 하나님 아버지
  lexicon: BDAG
  rationale: 헬라어 본문은 ἡμῶν이 명시되지 않으나, 인사 정식의 친밀한 관계적 음조를 살리고 영어 POB의 「our」 선택을 따라 「우리」를 보존한다.
- source_word: κυρίου Ἰησοῦ Χριστοῦ
  english_pob_choice: the Lord Jesus Messiah
  chosen_korean: 주 예수 메시아
  alternatives_korean:
  - 주 예수 그리스도
  lexicon: BDAG
  rationale: κύριος는 「주」, Χριστός는 칭호로서 「메시아」로 옮긴다.
theological_decisions:
- issue: 인사 정식의 Χριστοῦ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
