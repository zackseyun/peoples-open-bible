review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: dos nombres propios en secuencia genealógica con los ordinales definidos ''el cuarto'' y ''el quinto'', unidos por ''y''. No hay problema semántico en la estructura. Sin embargo, las formas españolas de los nombres (''Nohá'', ''Rafá'') están sobreadaptadas y no reflejan de manera fiel ni estable la transliteración del hebreo ni la pista auditada inglesa (''Nohah'', ''Rapha'').'
  spanish_quality_summary: La frase es legible y natural en español, pero los nombres con acento final resultan poco idiomáticos y visualmente extraños para una genealogía bíblica en español. Una transliteración más sobria y recognoscible mejora la legibilidad e interoperabilidad con otras referencias sin afectar la claridad.
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. La cuestión relevante es la política de nombres propios: conviene transliterar con fidelidad sin hispanizar en exceso. ''Nohah'' y ''Rafa'' (o ''Rapha'') serían más defendibles que ''Nohá'' y ''Rafá''; dado el rastro POB en inglés, ''Nohah'' y ''Rafa'' preservan mejor la relación con las formas auditadas y siguen siendo legibles en español.'
  issues:
  - severity: medium
    issue: '''Nohá'' añade una adaptación ortográfica innecesaria'
    rationale: El hebreo נוֹחָה se representa en el POB inglés como 'Nohah'. La forma 'Nohá' no es un exónimo español establecido y puede sugerir una pronunciación o adaptación arbitraria. Mantener 'Nohah' preserva mejor la trazabilidad del nombre propio.
  - severity: medium
    issue: '''Rafá'' es una hispanización excesiva de רָפָא'
    rationale: El inglés auditado usa 'Rapha' con alternativa 'Raphah'. En español, 'Rafá' se percibe poco bíblico y gráficamente extraño. 'Rafa' conserva mejor la base consonántica hebrea en grafía española sencilla, sin introducir un acento artificial.
  - severity: low
    issue: La nota al pie sobre 'Nohá' ya no sería necesaria con una transliteración más estable
    rationale: La nota existe para justificar una adaptación discutible. Si se normaliza la transliteración, no hace falta nota en este versículo.
  revised_spanish_text: Nohah, el cuarto, y Rafa, el quinto.
  revision_rationale: 'Se corrigen únicamente las transliteraciones de los nombres propios para evitar acentos gráficos artificiales y una hispanización innecesaria, manteniendo intacta la estructura genealógica del hebreo: nombre + ordinal definido, luego conjunción + nombre + ordinal definido. No se requieren notas al pie porque no queda una ambigüedad relevante ni una alternativa significativa que deba preservarse aquí.'
