translation:
  language: es
  text: ¿Has oído una palabra? Que muera contigo[a]; cobra ánimo[b], no te hará reventar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un asunto» o «un informe» para λόγον.
    reason: lexical_alternative
  - marker: b
    text: 'La imagen griega es muy vívida: «no te hará reventar», es decir, el secreto no te destruirá si lo guardas.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀκήκοας
  english_pob_choice: Have you heard
  chosen_spanish: ¿Has oído
  alternatives_spanish:
  - ¿Oíste
  - Has escuchado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción ya realizada con relevancia presente. En español, el perfecto compuesto «has oído» conserva mejor ese valor que un pretérito simple.
- source_word: λόγον
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un asunto
  - un informe
  - algo
  lexicon: BDAG
  rationale: λόγος aquí puede referirse a una palabra, asunto o reporte. «Una palabra» mantiene la brevedad proverbial y deja abierta la amplitud semántica sin precisar más de lo que el griego exige.
- source_word: συναποθανέτω σοι
  english_pob_choice: Let it die with you
  chosen_spanish: Que muera contigo
  alternatives_spanish:
  - Que perezca contigo
  - Que muera junto contigo
  lexicon: LSJ
  rationale: 'El imperativo de συναποθνῄσκω es figurado: lo oído no debe trascenderte. «Que muera contigo» conserva la imagen vívida y su sentido de confidencialidad.'
- source_word: θάρσει
  english_pob_choice: take courage
  chosen_spanish: cobra ánimo
  alternatives_spanish:
  - ten ánimo
  - no temas
  - ten confianza
  lexicon: BDAG
  rationale: La exhortación busca fortalecer al oyente. «Cobra ánimo» es una fórmula natural en español para un imperativo de ánimo y retiene el tono de aliento.
- source_word: οὐ μή
  english_pob_choice: will not
  chosen_spanish: 'no'
  alternatives_spanish:
  - ciertamente no
  - de ningún modo
  lexicon: BDAG
  rationale: La negación enfática griega se expresa de manera natural con «no» en esta sentencia breve; la fuerza está reforzada por el contexto proverbial.
- source_word: ῥήξει
  english_pob_choice: burst you open
  chosen_spanish: romperá
  alternatives_spanish:
  - reventará
  - te partirá
  - te desgarrará
  lexicon: LSJ
  rationale: ῥήγνυμι puede significar romper, reventar o desgarrar. En español, «romperá» comunica el efecto figurado de manera clara y publicáble sin perder del todo la imagen de ruptura corporal implícita.
translation_notes:
  revision_awareness: Se ha seguido el texto griego de Swete con apoyo del audit trail inglés. Se conserva la estructura proverbial breve y la tensión imagística de la clausula final, aunque en español se ha optado por una formulación más natural en la negación y en ῥήξει.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no la contiene.
  - Se eligió un registro sobrio y proverbial, evitando glosas intrusivas dentro del texto principal.
  - La cláusula final conserva la idea de daño/ruptura sin forzar una literalidad corporal extraña en español.
