  text: τούτων δὲ οἰκονομουμένων φήμη δυσμενὴς ἐξέκειτο κατὰ τοῦ γένους ἀνθρώποις συμφρονοῦσιν εἰς κακοποίησιν, ἀφόρμης δὲ διδομένης εἰς διάθεσιν, ὡς ἂν ἀπὸ τῶν νομίμων αὐτοὺς κωλύωνται.
