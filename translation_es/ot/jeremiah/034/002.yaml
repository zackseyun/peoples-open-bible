translation:
  language: es
  text: 'Así dice Yahvé, el Dios de Israel: Ve y habla a Sedequías, rey de Judá, y dile: «Así dice Yahvé: He aquí, yo entrego esta ciudad en manos[a] del rey de Babilonia, y la quemará con fuego».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo el poder del rey de Babilonia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - De este modo dice
  lexicon: HALOT
  rationale: La fórmula profética se reproduce con una cadencia solemne y natural en español. «Así dice» conserva el valor de anuncio autorizado sin volverse artificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrama como «Yahvé», conforme a la política del proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es una construcción posesiva directa y transparente; «el Dios de Israel» comunica bien la relación pactual sin añadir explicaciones.
- source_word: הָלֹךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve y
  lexicon: HALOT
  rationale: El infinitivo absoluto con fuerza imperativa se expresa de manera natural con el imperativo «Ve», manteniendo el mandato directo.
- source_word: וְאָמַרְתָּ ... וְאָמַרְתָּ אֵלָיו
  english_pob_choice: and speak ... and say to him
  chosen_spanish: habla ... y dile
  alternatives_spanish:
  - di ... y dile
  - habla ... y dile
  lexicon: HALOT
  rationale: Se conservan los dos verbos de comunicación del hebreo sin sobrecargar la frase. «Habla» para la instrucción general y «dile» para la cita directa resulta natural en español.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Zedequías
  lexicon: HALOT
  rationale: Se usa la forma española común del nombre propio bíblico, amplia y reconocible en contexto eclesial.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La aposición se vierte de forma natural en español con el mismo sentido regio y territorial.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Mira, yo
  - Yo, aquí
  lexicon: HALOT
  rationale: «He aquí» preserva la solemnidad profética. El pronombre «yo» se mantiene para reflejar la primera persona enfática del hebreo y enlazar con «entrego».
- source_word: נֹתֵן
  english_pob_choice: am giving
  chosen_spanish: entrego
  alternatives_spanish:
  - estoy entregando
  - voy a entregar
  lexicon: HALOT
  rationale: Aunque el participio hebreo puede tener valor inminente, en español el presente simple «entrego» transmite bien la decisión divina segura y conserva concisión profética.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - la ciudad
  lexicon: HALOT
  rationale: Traducción directa y natural del sintagma demostrativo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: En español, «en manos de» conserva el idiomatismo bíblico y comunica control o dominio con fluidez. La alternativa «bajo el poder de» se evita en el texto principal por ser más interpretativa.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  lexicon: HALOT
  rationale: Se conserva el título real con el topónimo, siguiendo el valor referencial del hebreo.
- source_word: וּשְׂרָפָהּ בָּאֵשׁ
  english_pob_choice: and he will burn it with fire
  chosen_spanish: y la quemará con fuego
  alternatives_spanish:
  - y la prenderá fuego
  - y la incendiará
  lexicon: HALOT
  rationale: El hebreo usa un verbo de quemar con complemento instrumental; en español «quemará con fuego» es fiel pero puede sonar redundante, así que «la quemará con fuego» mantiene el énfasis sin perder claridad. El sujeto implícito se entiende por el contexto.
theological_decisions:
- issue: Nombre divino del Tetragrama
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrama. Se conserva el nombre propio divino en español con «Yahvé», evitando el reemplazo por un título y manteniendo la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomático בְּיַד
  english_pob_reading: into the hand of / into the power of
  chosen_spanish_reading: en manos de
  alternative_spanish_readings:
  - bajo el poder de
  - entregado a
  rationale: La imagen de «mano» comunica dominio, control y entrega. En español, «en manos de» conserva esa metáfora bíblica con buena inteligibilidad; la lectura interpretativa «bajo el poder de» queda como alternativa implícita, no como sustitución.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Participio נֹתֵן con valor inminente
  english_pob_reading: am giving
  chosen_spanish_reading: entrego
  alternative_spanish_readings:
  - estoy entregando
  - voy a entregar
  rationale: La forma participial declara una acción segura y decretada. El presente simple español transmite la inmediatez profética sin necesidad de perífrasis, manteniendo el tono oracular.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'Coincide con la tradición auditada del inglés POB en el contenido y la estructura: fórmula profética, mandato doble, nombre divino, entrega de la ciudad y quema por Babilonia. Se ajustó la sintaxis al español natural sin perder el paralelismo ni la imagen idiomática de «en manos de».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama.
  - Se prefiere «Sedequías» como forma española del nombre propio.
  - 'Se conserva el paralelismo de dos verbos de habla: «habla ... y dile».'
  - La nota a pie de página preserva la alternativa interpretativa del idiomático bíblico «en manos de».
