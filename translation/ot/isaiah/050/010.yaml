id: ISA.50.10
reference: Isaiah 50:10
source:
  edition: WLC
  text: מִ֤י בָ/כֶם֙ יְרֵ֣א יְהוָ֔ה שֹׁמֵ֖עַ בְּ/ק֣וֹל עַבְדּ֑/וֹ אֲשֶׁ֣ר הָלַ֣ךְ חֲשֵׁכִ֗ים וְ/אֵ֥ין נֹ֨גַהּ֙ ל֔/וֹ יִבְטַח֙ בְּ/שֵׁ֣ם יְהוָ֔ה וְ/יִשָּׁעֵ֖ן בֵּ/אלֹהָֽי/ו׀׃
translation:
  text: Who among you fears Yahweh[a], listening to the voice of his servant? Let the one who walks in darkness and has no light trust in the name of Yahweh and lean on his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obeying' or 'heeding the voice of his servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי בָכֶם
  chosen: Who among you
  alternatives:
  - Who is among you that
  lexicon: HALOT
  rationale: Idiomatic interrogative introducing an appeal to the audience. 'Who among you' is natural English while preserving the direct address.
- source_word: יְרֵא יְהוָה
  chosen: fears the LORD
  alternatives:
  - reveres the LORD
  lexicon: HALOT
  rationale: ירא with God commonly denotes reverent fear/covenantal piety. 'Fears' preserves the theological weight better than the softer 'reveres.' YHWH is rendered 'the LORD' per doctrine.
- source_word: שֹׁמֵעַ בְּקוֹל עַבְדּוֹ
  chosen: listening to the voice of his servant
  alternatives:
  - obeying the voice of his servant
  - heeding the voice of his servant
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the participle describes the God-fearer as one attentive to the servant's voice. 'Listening to' keeps the auditory sense in the main text without over-specifying obedience, while obedience remains an interpretive implication.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic servant-language for the LORD's commissioned agent, 'servant' is the established and contextually fitting rendering; the bonded-status nuance is not foregrounded here.
- source_word: אֲשֶׁר הָלַךְ חֲשֵׁכִים
  chosen: the one who walks in darkness
  alternatives:
  - who has walked in dark places
  - who walks in deep darkness
  lexicon: HALOT
  rationale: The relative clause shifts from the general addressee to the specific case being exhorted. The plural חֲשֵׁכִים is an abstract/intensive plural; singular 'darkness' is the most natural English equivalent.
- source_word: וְאֵין נֹגַהּ לוֹ
  chosen: and has no light
  alternatives:
  - and has no brightness
  - and has no radiance
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness, shining, or light. 'Has no light' is idiomatic and captures the experiential sense of lacking illumination or relief.
- source_word: יִבְטַח בְּשֵׁם יְהוָה
  chosen: trust in the name of the LORD
  alternatives:
  - trust in the LORD's name
  lexicon: HALOT
  rationale: בטח is well rendered 'trust.' Preserving 'name' is important because it conveys reliance on God's revealed character and covenant identity, not merely generic confidence in God.
- source_word: וְיִשָּׁעֵן בֵּאלֹהָיו
  chosen: and lean on his God
  alternatives:
  - and rely on his God
  - and support himself on his God
  lexicon: HALOT
  rationale: שׁען literally conveys leaning/supporting oneself upon something. 'Lean on' preserves the metaphor vividly and naturally in English.
