revisions:
- from: Porque estos cuatro valientes[a] porteros[b], que eran levitas, estaban encargados de las cámaras y de los almacenes[c] de la casa de Dios.
  to: Porque estos cuatro valientes porteros, que eran levitas, estaban encargados[a] de las cámaras y de los almacenes[b] de la casa de Dios.
  rationale: Se corrige el anclaje de la nota sobre בֶאֱמוּנָה para que recaiga sobre la expresión verbal que comunica la idea de encargo confiado, en vez de sobre «valientes». También se ajusta la alternativa de אֹצְרוֹת a «tesorerías», más fiel al expediente auditado y más precisa en español.
