translation:
  language: es
  text: En aquel día el duelo en Jerusalén aumentará[a], como el duelo de Hadad-rimón en la llanura de Meguido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hadad-rimón puede referirse a un lugar cerca de Meguido, quizá asociado con el duelo por Josías (cf. 2 Crónicas 35:22–25), o a otra tradición conocida de lamentación.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese día
  - En ese día
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva con valor deíctico y escatológico. «En aquel día» es natural en español bíblico y mantiene el tono solemne sin volverse arcaizante.
- source_word: יִגְדַּל
  english_pob_choice: will become great
  chosen_spanish: se hará grande
  alternatives_spanish:
  - será grande
  - crecerá
  lexicon: HALOT
  rationale: El verbo גדל expresa hacerse o llegar a ser grande. En español, «se hará grande» conserva mejor el matiz dinámico del crecimiento/intensificación del luto que un simple «será grande».
- source_word: הַמִּסְפֵּד
  english_pob_choice: the mourning
  chosen_spanish: el luto
  alternatives_spanish:
  - el duelo
  - la lamentación
  lexicon: HALOT
  rationale: מִסְפֵּד designa duelo o lamentación pública por una muerte. «Luto» es natural, solemne y suficientemente amplio para el contexto comunitario.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo directo sin ajuste interpretativo.
- source_word: כְּמִסְפַּד
  english_pob_choice: like the mourning of
  chosen_spanish: como el luto de
  alternatives_spanish:
  - como el duelo de
  - como la lamentación de
  lexicon: HALOT
  rationale: La partícula comparativa כ exige una equivalencia comparativa clara. La construcción posesiva en español («el luto de») reproduce de manera natural la relación genitiva del hebreo.
- source_word: הֲדַדְ רִמּוֹן
  english_pob_choice: Hadad-rimmon
  chosen_spanish: Hadad-rimón
  alternatives_spanish:
  - Hadad-rimmon
  lexicon: HALOT
  rationale: Se trata de un nombre propio transliterado. En español, el acento gráfico ayuda a la pronunciación y la comprensión sin introducir interpretación adicional.
- source_word: בְּבִקְעַת מְגִדּוֹן
  english_pob_choice: in the plain of Megiddo
  chosen_spanish: en la llanura de Meguido
  alternatives_spanish:
  - en el valle de Meguido
  - en la quebrada de Meguido
  lexicon: HALOT
  rationale: בִּקְעָה puede referirse a una llanura amplia o valle abierto. «Llanura» preserva mejor la amplitud topográfica que «valle», y «Meguido» sigue una transliteración española natural del topónimo.
theological_decisions:
- issue: Identificación de Hadad-rimón
  english_pob_reading: Render as a place/name in the comparison without specifying the historical event in the main text.
  chosen_spanish_reading: Conservar Hadad-rimón como nombre propio comparativo sin resolver en el cuerpo del texto si alude a un lugar, a una tradición de duelo o al lamento por Josías.
  alternative_spanish_readings:
  - Una referencia exclusiva al duelo por Josías en Meguido
  - Una referencia a una práctica cultual asociada con Hadad-rimón
  rationale: El hebreo nombra Hadad-rimón pero no explica su identificación. Para no borrar la tensión interpretativa documentada, el texto principal mantiene el nombre propio y la nota recoge las alternativas principales.
  doctrine_reference: Preservar la tensión exegética sin imponer una identificación no explicitada por el texto.
translation_notes:
  revision_awareness: La versión española sigue el sentido y las decisiones léxicas del POB en inglés, pero adapta el comparativo y el topónimo a un español natural y publicable. Se mantiene la ambigüedad sobre Hadad-rimón mediante nota, sin añadir datos que el hebreo no explicita.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se translitera «Meguido» para mayor naturalidad en español, manteniendo el referente geográfico de Megiddo.
  - Se elige «luto» para sostener un registro bíblico claro y moderno, coherente con el hebreo מִסְפֵּד.
  - No se introduce «Cristo» ni otras equivalencias doctrinales ajenas al versículo.
