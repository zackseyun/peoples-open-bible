translation:
  language: es
  text: 'Y Eliseo les dijo: «No es este el camino, ni es esta la ciudad. Síganme[a], y los llevaré al hombre que buscan». Y los llevó a Samaria.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «vayan detrás de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino, ruta o senda. En español, «el camino» es natural y conserva el contraste deíctico del hebreo («no es este...»), sin volver demasiado técnico el sentido.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - el pueblo
  - la villa
  lexicon: HALOT
  rationale: עִיר es el término usual para «ciudad». «La ciudad» mantiene la forma definida y el paralelismo con «el camino».
- source_word: לְכוּ אַחֲרַי
  english_pob_choice: Follow me
  chosen_spanish: Seguidme
  alternatives_spanish:
  - Id detrás de mí
  - Venid tras de mí
  lexicon: HALOT
  rationale: Literalmente es «id después de mí / tras de mí». «Seguidme» comunica con naturalidad la orden y conserva la fuerza direccional del hebreo.
- source_word: וְאוֹלִיכָה אֶתְכֶם
  english_pob_choice: and I will lead you
  chosen_spanish: y os llevaré
  alternatives_spanish:
  - y os guiaré
  - y os conduciré
  lexicon: HALOT
  rationale: 'El hifil de הלך tiene valor causativo: hacer ir, conducir, llevar. «Os llevaré» es claro en español y mantiene la idea de conducción física.'
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el individuo
  lexicon: HALOT
  rationale: אִישׁ suele significar «hombre». Aquí preserva la referencia masculina singular y el matiz narrativo indirecto; «persona» suavizaría esa fuerza.
- source_word: אֲשֶׁר תְּבַקֵּשׁוּן
  english_pob_choice: whom you seek
  chosen_spanish: que buscáis
  alternatives_spanish:
  - a quien buscáis
  - que estáis buscando
  lexicon: HALOT
  rationale: בקשׁ significa «buscar, procurar». «Que buscáis» reproduce el presente habitual de la escena y evita una perífrasis más larga; el relativo sin marca explícita mantiene la fluidez en español.
- source_word: וַיֹּלֶךְ אוֹתָם
  english_pob_choice: And he led them
  chosen_spanish: Y los llevó
  alternatives_spanish:
  - Y los condujo
  - Y los guió
  lexicon: HALOT
  rationale: Se conserva la misma raíz verbal con un equivalente natural en español. «Los llevó» enlaza bien con «os llevaré» y con el movimiento narrativo hacia Samaria.
- source_word: שֹׁמְרֽוֹנָה
  english_pob_choice: to Samaria
  chosen_spanish: a Samaria
  alternatives_spanish:
  - hacia Samaria
  - hasta Samaria
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Samaria. En español, la preposición «a» expresa ese destino de forma sobria y natural.
theological_decisions:
- issue: La declaración de Eliseo a los sirios/araméos sobre el camino y la ciudad
  english_pob_reading: 'Render the statement straightforwardly without softening or moralizing: ''This is not the way, and this is not the city.'''
  chosen_spanish_reading: 'Traducir la afirmación de manera directa: «No es este el camino, ni es esta la ciudad».'
  alternative_spanish_readings:
  - «Éste no es el camino ni ésta la ciudad»
  - «No van por el camino correcto ni están en la ciudad correcta»
  rationale: El texto presenta la afirmación como parte de la escena narrativa, y la traducción debe conservar su literalidad básica sin añadir una evaluación moral o aclaración interpretativa. Así se preserva la tensión ética del pasaje.
  doctrine_reference: Preservar la tensión teológica/narrativa sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'El texto sigue la revisión final del POB inglés: se adopta el valor más natural de ''whom you seek'' con un español igualmente sobrio, sin añadir paráfrasis interpretativas. Se mantiene la línea verbal del movimiento («os llevaré / los llevó») y el cierre a Samaria.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponde, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «el camino» y «la ciudad» como equivalentes naturales de los sustantivos con artículo definido.
  - «Seguidme» conserva la ambigüedad entre seguimiento físico e instrucción de movimiento, reflejando el hebreo y la nota inglesa.
  - El objeto relativo «que buscáis» evita sobrecargar el verso con una construcción más literaria que no añade sentido.
