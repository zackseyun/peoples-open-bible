translation:
  language: es
  text: Porque el rey oirá[a], para librar a su sierva[b] de la mano del hombre que quiere destruirme a mí y a mi hijo juntos, de la heredad de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escuchará»; el hebreo puede abarcar oír, atender o dar curso a la petición.
    reason: lexical_alternative
  - marker: b
    text: O «su sirvienta»; el término hebreo es específicamente femenino.
    reason: lexical_alternative
  - marker: c
    text: La «heredad de Dios» probablemente se refiere a la herencia asignada por Dios dentro de Israel; también puede entenderse como «la herencia de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque así
  lexicon: HALOT
  rationale: En este contexto introduce la razón o confianza de la mujer; «Porque» preserva el valor explicativo de כִּי con español natural y solemne.
- source_word: יִשְׁמַע
  english_pob_choice: will hear
  chosen_spanish: oirá
  alternatives_spanish:
  - escuchará
  - hará caso
  - prestará oído
  lexicon: HALOT
  rationale: «Oirá» mantiene la correspondencia directa con שמע y deja que el infinitivo siguiente exprese la acción resultante del rey.
- source_word: לְהַצִּיל
  english_pob_choice: to deliver
  chosen_spanish: para librar
  alternatives_spanish:
  - para rescatar
  - para salvar
  - para entregar
  lexicon: HALOT
  rationale: El hifil de נצל transmite sacar/liberar de un peligro; «librar» reproduce bien esa fuerza sin volverlo demasiado interpretativo.
- source_word: אֲמָתוֹ
  english_pob_choice: his servant
  chosen_spanish: a su sierva
  alternatives_spanish:
  - a su sirvienta
  - a su esclava
  - a su servidora
  lexicon: HALOT
  rationale: El hebreo es específicamente femenino. «Sierva» conserva la marca de género y el tono reverente del habla cortesana, como documenta la nota inglesa; «esclava» sería posible pero más fuerte en español moderno.
- source_word: מִכַּף הָאִישׁ
  english_pob_choice: from the hand of the man
  chosen_spanish: de la mano del hombre
  alternatives_spanish:
  - del poder del hombre
  - del puño del hombre
  - de la presa del hombre
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de «mano» para poder/control, siguiendo la textura formal del original.
- source_word: לְהַשְׁמִיד
  english_pob_choice: who would destroy
  chosen_spanish: que quiere destruirme
  alternatives_spanish:
  - que va a destruirme
  - que destruiría
  - para destruirme
  lexicon: HALOT
  rationale: En español la subordinación relativa resulta más natural y comunica la intención hostil del sujeto; la flexión verbal «quiere» refleja el valor final/intencional del infinitivo en contexto.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - ambos
  - en conjunto
  lexicon: HALOT
  rationale: «Juntos» expresa de manera clara que madre e hijo están incluidos en el mismo destino, sin perder la concisión del adverbio hebreo.
- source_word: מִנַּחֲלַת אֱלֹהִים
  english_pob_choice: from the inheritance of God
  chosen_spanish: lejos de la heredad de Dios
  alternatives_spanish:
  - de la heredad de Dios
  - fuera de la heredad de Dios
  - de la herencia de Dios
  lexicon: HALOT
  rationale: «Heredad» es un equivalente español digno y bíblico para נַחֲלָה. Se añadió «lejos de» porque el contexto implícito expresa ser apartados/cortados de esa heredad; así se conserva la fuerza de exclusión sin borrar la imagen territorial-covenantal.
theological_decisions:
- issue: Sentido de «la heredad de Dios»
  english_pob_reading: A covenantal inheritance allotted by God within Israel, or possibly God's own inheritance.
  chosen_spanish_reading: La heredad asignada por Dios dentro de Israel, de la cual la mujer y su hijo serían apartados.
  alternative_spanish_readings:
  - La herencia de Dios
  - La posesión de Dios
  - La heredad que pertenece a Dios
  rationale: La frase debe conservar su peso pactal y comunitario. «Heredad de Dios» mantiene la referencia a la porción/inherencia dada por Dios sin decidir más de lo que el hebreo permite; «lejos de» comunica la posible exclusión de ese ámbito.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de אֲמָתוֹ en boca de la mujer
  english_pob_reading: Specifically feminine 'maidservant' with smoother English 'his servant'.
  chosen_spanish_reading: «Sierva» como femenino reverente en contexto cortesano.
  alternative_spanish_readings:
  - «Esclava»
  - «Sirvienta»
  - «Servidora»
  rationale: El texto hebreo señala género femenino. En español, «sierva» mantiene la deferencia y la precisión sin hacer sonar la frase más dura de lo necesario; no se neutraliza el marcador de género.
  doctrine_reference: Translation philosophy §2, lexical fidelity
- issue: Intensidad del verbo de destrucción
  english_pob_reading: who would destroy
  chosen_spanish_reading: que quiere destruirme
  alternative_spanish_readings:
  - que destruiría
  - que busca destruirme
  - para destruirme
  rationale: El hebreo expresa intención adversa; la forma relativa española hace la frase legible y conserva el matiz de propósito, sin suavizar la amenaza.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa más reciente, sin cambios aplicados en la última revisión. Se preservan el valor explicativo de כִּי, la imagen de «mano», la especificidad femenina de אֲמָתוֹ y la ambigüedad controlada de מִנַּחֲלַת אֱלֹהִים.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo nombra explícitamente el tetragrámaton; aquí no aparece.
  - «Heredad» se mantiene para נַחֲלָה por consistencia con el valor patrimonial/covenantal del término.
  - Se conserva la tensión entre lectura literal («mano») y sentido idiomático («poder») sin sustituirla en el texto principal.
