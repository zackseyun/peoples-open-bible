revisions:
- from: Será para señal y para testigo de Yahvé de los Ejércitos en la tierra de Egipto. Porque clamarán a Yahvé a causa de los opresores[a], y él les enviará un salvador y campeón, y los librará.
  to: Será para señal y para testigo para Yahvé de los Ejércitos en la tierra de Egipto. Porque clamarán a Yahvé a causa de los opresores, y él les enviará un salvador y campeón[a], y los librará.
  rationale: Se ajusta la preposición para reflejar mejor el לְ hebreo en «לַיהוָה צְבָאוֹת» y se reubica la nota textual al término realmente discutido, «campeón», conforme al audit trail inglés. No se requieren cambios doctrinales ni una adjudicación compleja.
  reviewer_model: gpt-5.4
