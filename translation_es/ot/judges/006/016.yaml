translation:
  language: es
  text: 'Y Yahvé le dijo[a]: «Ciertamente estaré contigo, y golpearás a Madián como un solo hombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como si fuera un solo hombre» / «como un solo hombre». El hebreo expresa un modismo que resalta una acción unificada o decisiva contra Madián.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrámaton; la política del proyecto en español pide transliterarlo como «Yahvé» para conservar el nombre personal del pacto, no ocultarlo con un sustituto titulado.
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: And ... said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - y le dijo
  - entonces le dijo
  lexicon: HALOT
  rationale: 'En español, la forma natural y fiel del avance narrativo es una cláusula breve con dativo: «le dijo». El sujeto queda explícito en «Yahvé», evitando redundancia pesada.'
- source_word: כִּי
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - seguramente
  - en verdad
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce una afirmación de seguridad/apoyo. «Ciertamente» preserva el matiz de aseguramiento sin convertirlo en una causalidad rígida.
- source_word: אֶהְיֶה עִמָּךְ
  english_pob_choice: I will be with you
  chosen_spanish: yo estaré contigo
  alternatives_spanish:
  - estaré contigo
  - yo estaré con usted
  lexicon: HALOT
  rationale: 'El imperfecto en contexto de promesa se rinde naturalmente como futuro: «estaré». «Contigo» mantiene la relación directa y personal del hebreo.'
- source_word: וְהִכִּיתָ
  english_pob_choice: and you will strike
  chosen_spanish: derrotarás
  alternatives_spanish:
  - golpearás
  - herirás
  - y golpearás
  lexicon: HALOT
  rationale: Aunque נכה puede ser literalmente «golpear», en este contexto el resultado sobre Madián es derrotarlo. «Derrotarás» comunica el valor verbal esperado en español sin perder la fuerza de acción decisiva.
- source_word: אֶת מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Midian
  - los madianitas
  lexicon: HALOT
  rationale: Se conserva el nombre bíblico del pueblo/territorio como «Madián», forma usual y clara en español bíblico, manteniendo la referencia corporativa del hebreo.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como a un solo hombre
  alternatives_spanish:
  - como un solo hombre
  - como si fuera un solo hombre
  - como una sola persona
  lexicon: HALOT
  rationale: El giro idiomático se mantiene con valor comparativo y singular masculino. «Como a un solo hombre» suena natural en español y conserva la imagen de acción unificada o decisiva.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de traducir el Nombre divino con una forma transliterada. «Yahvé» preserva el nombre del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatic force of כְּאִישׁ אֶחָד
  english_pob_reading: as one man
  chosen_spanish_reading: como a un solo hombre
  alternative_spanish_readings:
  - como un solo hombre
  - como si fuera un solo hombre
  rationale: Se conserva la imagen singular masculina del hebreo y su sentido de acción unificada. No se neutraliza el género porque aquí no se formula una tesis antropológica sino una comparación idiomática.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4, Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La versión previa falló porque el marcador de nota no aparecía en el texto. Esta revisión coloca [a] inmediatamente después de «le dijo» para anclar correctamente la nota alternativa de כְּאִישׁ אֶחָד y mantener la concordancia entre texto y aparato.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología española del proyecto para el Nombre divino.
  - Se evita «SEÑOR» como sustituto titulado.
  - «Madián» preserva el referente bíblico colectivo.
  - «Ciertamente» refleja la fuerza aseverativa de כִּי sin forzar una causalidad explícita.
  - La nota [a] está anclada en el texto y solo cubre la alternativa idiomática de la comparación final.
