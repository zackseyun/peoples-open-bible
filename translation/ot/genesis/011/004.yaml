id: GEN.11.4
reference: Genesis 11:4
source:
  edition: WLC
  text: וַ/יֹּאמְר֞וּ הָ֣בָ/ה נִבְנֶה לָּ֣/נוּ עִ֗יר וּ/מִגְדָּל֙ וְ/רֹאשׁ֣/וֹ בַ/שָּׁמַ֔יִם וְ/נַֽעֲשֶׂה לָּ֖/נוּ שֵׁ֑ם פֶּן נָפ֖וּץ עַל פְּנֵ֥י כָל הָ/אָֽרֶץ׀־־־־־׃
translation:
  text: And they said[a], “Come, let us build for ourselves a city and a tower with its top in the heavens, and let us make a name for ourselves[b], lest we be scattered over the face of the whole earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with its top reaching to the heavens.' The Hebrew literally says 'with its top in the heavens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lest we be dispersed over the face of the whole earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  chosen: Come
  alternatives:
  - Come now
  - Come on
  lexicon: HALOT
  rationale: Idiomatic interjection inviting joint action. 'Come' is natural modern English and preserves the hortatory force without adding emphasis not explicit in the Hebrew.
- source_word: נִבְנֶה לָּנוּ
  chosen: let us build ourselves
  alternatives:
  - let us build for ourselves
  - we will build for ourselves
  lexicon: HALOT
  rationale: The cohortative first person plural expresses exhortation or resolve, best rendered 'let us build.' The dative pronoun לָּנוּ is reflexive in sense here, hence 'ourselves' rather than a more wooden 'for us.'
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Standard rendering for an urban settlement; 'city' matches normal biblical English and the scale implied by the narrative.
- source_word: מִגְדָּל
  chosen: tower
  alternatives:
  - fortified tower
  lexicon: HALOT
  rationale: The basic sense is 'tower.' Nothing in the immediate context requires specifying a military function, so the simpler rendering is preferred.
- source_word: וְרֹאשׁוֹ בַשָּׁמַיִם
  chosen: with its top in the heavens
  alternatives:
  - and its top in the heavens
  - with its top in heaven
  - with its top reaching to the heavens
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head/top.' The Hebrew states location ('in the heavens') rather than explicitly adding 'reaching.' 'With its top in the heavens' preserves the vivid idiom while remaining readable. 'Heavens' is preferred over singular 'heaven' because שָּׁמַיִם is morphologically plural and often rendered that way in elevated cosmological contexts.
- source_word: וְנַעֲשֶׂה לָּנוּ שֵׁם
  chosen: and let us make a name for ourselves
  alternatives:
  - and let us make ourselves a name
  - and let us make a reputation for ourselves
  lexicon: HALOT
  rationale: The idiom 'make a name' is well established in English and closely reflects the Hebrew. 'Reputation' captures the sense but loses the intertextual and literary force of the Hebrew expression.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that we may not
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose or feared result. 'Lest' is concise and accurate, and remains understandable in modern literary English.
- source_word: נָפוּץ
  chosen: we be scattered
  alternatives:
  - we be dispersed
  - we scatter
  lexicon: HALOT
  rationale: 'The verb denotes being scattered or dispersed. An English passive best conveys the likely sense in context: fear of being spread abroad. ''Dispersed'' is possible but ''scattered'' is more idiomatic and echoes the narrative theme.'
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  chosen: over the face of the whole earth
  alternatives:
  - across the face of all the earth
  - over the surface of the whole land
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי is commonly rendered 'over the face of.' הָאָרֶץ here refers to the earth/world in the primeval narrative rather than a local 'land,' so 'whole earth' is preferred.
