  rationale: 'Se corrigen las notas para que coincidan con los términos correctos del texto y se restaura la alternativa auditada para «juicio». También se ajustan dos expresiones para acercarlas mejor al hebreo y al POB inglés: «son tragados por el vino» preserva la metáfora de נִבְלְעוּ, y «vacilan por la bebida fuerte» expresa mejor la desestabilización causada por la embriaguez en este contexto.'
