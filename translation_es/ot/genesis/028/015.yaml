revisions:
- from: Y he aquí[a], yo estoy contigo, y te guardaré en todo lugar adonde vayas, y te haré volver a esta tierra[c][b]. Porque no te dejaré hasta que haya hecho lo que te he hablado.
  to: Y he aquí[a], yo estoy contigo, y te guardaré en todo lugar adonde vayas, y te haré volver a esta tierra[c][b]. Porque no te dejaré hasta que haya hecho lo que te he dicho.
  rationale: 'Se revisa únicamente la cláusula final para lograr un español natural y fiel: «lo que te he dicho» comunica correctamente el contenido de דִּבַּרְתִּי לָךְ sin sobreinterpretarlo como promesa. Se conservan las demás decisiones del borrador, que representan bien el hebreo y el rastro POB. También se normalizan las notas para mayor claridad.'
