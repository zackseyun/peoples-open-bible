translation:
  language: es
  text: ¿Cómo, pues, puede aceptarse o suponerse que son dioses? Dioses de madera, revestidos de plata y revestidos de oro, ciertamente no podrán salvarse a sí mismos de ladrones ni de salteadores[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo, pues, ha de aceptarse o considerarse que son dioses?». El griego usa dos adjetivos verbales para intensificar la pregunta retórica.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice «dioses de madera, revestidos de plata y revestidos de oro», conservando la ironía de que esos supuestos dioses son solo objetos fabricados.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, pues?
  alternatives_spanish:
  - ¿Cómo, entonces?
  - ¿Cómo, por tanto?
  lexicon: LSJ
  rationale: La partícula inferencial οὖν queda bien representada por «pues» en una pregunta retórica, con tono natural y argumentativo en español.
- source_word: ἐκδεκτέον
  english_pob_choice: can it be accepted
  chosen_spanish: puede aceptarse
  alternatives_spanish:
  - ha de aceptarse
  - debe admitirse
  lexicon: LSJ
  rationale: El adjetivo verbal expresa la idea de algo que puede/debe ser admitido; «puede aceptarse» conserva la fuerza de posibilidad normativa sin sonar artificial.
- source_word: νομιστέον
  english_pob_choice: or supposed
  chosen_spanish: o suponerse
  alternatives_spanish:
  - o considerarse
  - o estimarse
  lexicon: LSJ
  rationale: El paralelo con ἐκδεκτέον pide otro adjetivo verbal de juicio humano; «suponerse» mantiene el matiz de tener por algo en la mente.
- source_word: ὅτι εἰσὶν θεοί
  english_pob_choice: that they are gods
  chosen_spanish: que son dioses
  alternatives_spanish:
  - que son divinos
  - que de verdad son dioses
  lexicon: LSJ
  rationale: Se conserva la afirmación directa del griego y el plural polémico «dioses», sin suavizarlo a una interpretación abstracta.
- source_word: Οὔτε ἀπὸ κλεπτῶν οὔτε ἀπὸ ληστῶν
  english_pob_choice: from thieves or robbers
  chosen_spanish: de ladrones
  alternatives_spanish:
  - de ladrones ni de salteadores
  - de ladrones o bandidos
  lexicon: LSJ
  rationale: El griego presenta dos términos cercanos; en español, «ladrones» engloba con naturalidad la idea de quienes roban o asaltan, evitando una duplicación pesada en la frase final.
- source_word: οὐ μὴ διασώσωνται
  english_pob_choice: will certainly not save themselves
  chosen_spanish: ciertamente no se salvarán
  alternatives_spanish:
  - de ningún modo se salvarán
  - no podrán salvarse en absoluto
  lexicon: LSJ
  rationale: La negación enfática οὐ μή se vierte con «ciertamente no», y el verbo medio en contexto permite «se salvarán» para expresar la incapacidad de preservarse.
- source_word: θεοὶ ξύλινοι
  english_pob_choice: Wooden gods
  chosen_spanish: Dioses de madera
  alternatives_spanish:
  - dioses de leño
  - dioses hechos de madera
  lexicon: LSJ
  rationale: Se mantiene el sustantivo «dioses» como en el griego, y «de madera» traduce el adjetivo ξύλινοι de forma natural en español.
- source_word: περιάργυροι καὶ περίχρυσοι
  english_pob_choice: overlaid with silver and overlaid with gold
  chosen_spanish: revestidos de plata y revestidos de oro
  alternatives_spanish:
  - cubiertos de plata y cubiertos de oro
  - chapados en plata y chapados en oro
  lexicon: LSJ
  rationale: Los compuestos indican recubrimiento exterior; «revestidos de» conserva la imagen de superficie aplicada y la ironía del ídolo manufacturado.
theological_decisions:
- issue: Nombrar a los ídolos como θεοί en una refutación antiidolátrica
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - ídolos
  - así llamados dioses
  rationale: La crítica del texto consiste precisamente en cuestionar la pretensión de divinidad; mantener «dioses» reproduce esa ironía sin resolverla por paráfrasis.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego coincide sustancialmente con la línea inglesa auditada; se conservó la lectura irónica de θεοί y la doble negación enfática οὐ μή, sin cambios textuales necesarios respecto del inglés POB. Los únicos ajustes fueron de naturalidad española y de puntuación.
  spanish_consistency_notes:
  - Se mantiene «dioses» en el cuerpo principal para reflejar el griego θεοί y la burla antiidolátrica.
  - «Revestidos de» se repite para las dos capas metálicas, siguiendo de cerca los compuestos περιάργυροι y περίχρυσοι.
  - Se usó «ladrones» como término general para abarcar κλεπτῶν y ληστῶν sin introducir un matiz adicional no explícito en el verso.
