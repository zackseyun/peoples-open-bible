- from: Ahora bien, David estaba sentado entre las dos puertas[a], y el centinela subió al techo de la puerta, junto al muro. Alzó los ojos y miró, y he aquí que un hombre venía corriendo solo.
  to: David estaba sentado entre las dos puertas[a], y el centinela subió al techo de la puerta, junto al muro. Alzó los ojos y miró, y he aquí, un hombre iba corriendo solo.
  rationale: Se quitó 'Ahora bien' para una apertura narrativa más natural en español. Se cambió 'venía corriendo' por 'iba corriendo' para evitar un matiz de aproximación no explícito en el hebreo, mientras se conserva la acción en curso observada por el centinela. Se mantuvo la nota léxica y el resto de las elecciones principales por ser fieles y claras.
