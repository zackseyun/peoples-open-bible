translation:
  language: es
  text: En cuanto a estos cuatro jóvenes, Dios les dio conocimiento e inteligencia en toda clase de literatura[a] y sabiduría; y Daniel tuvo entendimiento en toda visión y sueño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda clase de libros»; el hebreo probablemente se refiere de manera más amplia al aprendizaje escrito o a la literatura.
    reason: lexical_alternative
  - marker: b
    text: O «entendió toda visión y sueño».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְלָדִים
  english_pob_choice: youths
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - jóvenes varones
  lexicon: HALOT
  rationale: יְלָדִים designa aquí personas jóvenes en un contexto de formación cortesana. «Jóvenes» conserva la idea de edad juvenil sin sonar infantil como «muchachos» ni demasiado marcado por género como «jóvenes varones».
- source_word: הָאֵלֶּה אַרְבַּעְתָּם
  english_pob_choice: these four
  chosen_spanish: estos cuatro
  alternatives_spanish:
  - estos cuatro de ellos
  - aquellos cuatro
  lexicon: HALOT
  rationale: El demostrativo con el numeral se expresa naturalmente en español como «estos cuatro». No hace falta reproducir aparte el sufijo pronominal, porque el sintagma ya queda completo y claro.
- source_word: נָתַן לָהֶם הָאֱלֹהִים
  english_pob_choice: God gave them
  chosen_spanish: Dios les dio
  alternatives_spanish:
  - Dios les concedió
  lexicon: HALOT
  rationale: נתן se traduce de forma directa y natural con «dio». «Concedió» es posible, pero suaviza la acción y no aporta una ventaja clara aquí.
- source_word: מַדָּע
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría adquirida
  - aprendizaje
  lexicon: HALOT
  rationale: מַדָּע apunta al conocimiento o aprendizaje adquirido. «Conocimiento» mantiene bien el énfasis cognitivo y su relación con el término siguiente.
- source_word: וְהַשְׂכֵּל
  english_pob_choice: insight
  chosen_spanish: inteligencia
  alternatives_spanish:
  - entendimiento
  - discernimiento
  - perspicacia
  lexicon: HALOT
  rationale: La forma de שכל expresa capacidad de comprender con prudencia y perspicacia. «Inteligencia» funciona en español bíblico actual como capacidad de comprensión, y evita repetir de inmediato «entendimiento» en la cláusula siguiente.
- source_word: בְּכָל סֵפֶר
  english_pob_choice: in every kind of literature
  chosen_spanish: en toda clase de literatura
  alternatives_spanish:
  - en cada libro
  - en todos los escritos
  - en toda clase de libros
  lexicon: HALOT
  rationale: סֵפֶר puede significar «libro», pero en este contexto se refiere más ampliamente al ámbito de la instrucción escrita. «Toda clase de literatura» conserva la amplitud del término sin reducirlo a volúmenes individuales.
- source_word: וְחָכְמָה
  english_pob_choice: and wisdom
  chosen_spanish: y sabiduría
  alternatives_spanish:
  - y sabiduría práctica
  - y juicio sabio
  lexicon: HALOT
  rationale: 'חָכְמָה se vierte con el equivalente más estable y transparente: «sabiduría». Mantiene el paralelismo con «conocimiento» e «inteligencia».'
- source_word: הֵבִין
  english_pob_choice: had understanding
  chosen_spanish: tuvo entendimiento
  alternatives_spanish:
  - entendió
  - fue entendido
  - era entendido
  lexicon: HALOT
  rationale: בין en hifil expresa comprensión/discernimiento. «Tuvo entendimiento» comunica bien el estado o capacidad resultante, y permite distinguir este verbo del sustantivo anterior sin perder la conexión semántica.
- source_word: בְּכָל חָזוֹן וַחֲלֹמוֹת
  english_pob_choice: in every vision and dream
  chosen_spanish: en toda visión y sueño
  alternatives_spanish:
  - en todas las visiones y sueños
  - respecto de toda visión y sueño
  lexicon: HALOT
  rationale: חזון y חלומות se refieren aquí a medios revelatorios. «Visión» y «sueño» conservan la literalidad básica y el campo semántico profético, sin especificar más de lo que el hebreo dice.
theological_decisions:
- issue: La fuente del conocimiento y la capacidad de discernimiento
  english_pob_reading: The text explicitly attributes their knowledge and wisdom to God as a divine gift.
  chosen_spanish_reading: El texto atribuye explícitamente a Dios el conocimiento, la inteligencia y la sabiduría de los jóvenes como dones recibidos.
  alternative_spanish_readings:
  - El texto solo describe su formación natural
  - Dios simplemente los asistió providencialmente
  rationale: La construcción con sujeto divino y verbo de dar exige conservar la agencia de Dios. La traducción no rebaja esa afirmación a un desarrollo meramente natural ni la diluye en una providencia genérica.
  doctrine_reference: Translation philosophy §1; afirmación de la acción divina
- issue: El alcance de la frase sobre visiones y sueños
  english_pob_reading: Daniel is described as having understanding in interpreting/handling revelatory visions and dreams, not necessarily as receiving all such revelations at this point.
  chosen_spanish_reading: Daniel tuvo entendimiento en relación con toda visión y sueño, sin precisar aquí si los recibía o los interpretaba.
  alternative_spanish_readings:
  - Daniel recibió toda visión y sueño
  - Daniel solo conocía la literatura sobre sueños y visiones
  rationale: 'El hebreo y la lectura auditada permiten una amplitud deliberada: la frase afirma entendimiento respecto del ámbito revelatorio, pero no define el mecanismo exacto. La versión española conserva esa tensión sin sobreespecificar.'
  doctrine_reference: Translation philosophy §3; preservación de la ambigüedad textual
translation_notes:
  revision_awareness: El pasaje coincide de manera alta con la traducción inglesa auditada; no se detectaron revisiones sustantivas posteriores, y se ha mantenido la misma estructura semántica básica con ajustes naturales al español.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para הָאֱלֹהִים conforme al estándar del proyecto.
  - Se eligió «jóvenes» por su naturalidad en español y por preservar la idea de juventud sin infantilizar.
  - «Inteligencia» se usó para הַשְׂכֵּל y «entendimiento» para הֵבִין, distinguiendo el don general de la capacidad específica de comprender.
  - «Sabiduría» se conservó para חָכְמָה como equivalente estable y bíblicamente reconocible.
  - La nota sobre סֵפֶר preserva la alternativa lexical documentada por la POB inglesa sin forzar «libro» en el texto principal.
  - La frase final mantiene la ambigüedad interpretativa auditada entre comprender visiones/sueños y recibirlos, sin resolverla en exceso.
