lexical_decisions:
- source_word: יוֹדִיעַ
  english_pob_choice: made known
  chosen_spanish: hizo conocer
  alternatives_spanish:
  - dio a conocer
  - hizo saber
  lexicon: HALOT
  rationale: El hifil de ידע expresa causar conocimiento. «Hizo conocer» conserva la causatividad de forma natural en español y evita una paráfrasis excesiva.
- source_word: דְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su camino
  - su manera de actuar
  lexicon: HALOT
  rationale: «Caminos» reproduce la metáfora hebrea de דֶּרֶךְ y mantiene el sentido bíblico de la manera de obrar de Dios sin explicitarlo de más.
- source_word: לְמֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: HALOT
  rationale: La preposición marca al destinatario de la acción reveladora; en español «a Moisés» es la forma más directa y natural.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel, al pueblo de Israel
  - a los hijos del Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo en el texto principal, de acuerdo con la decisión del POB de mantener la precisión morfológica. «Hijos» resulta fiel y bíblicamente reconocible en español.
- source_word: עֲלִילֹתָיו
  english_pob_choice: his deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus hazañas
  lexicon: HALOT
  rationale: El sustantivo designa actos u obras destacadas. «Obras» es idiomático en español y suficientemente amplio para no añadir la valoración de «hazañas».
theological_decisions:
- issue: Expresión etnónima masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - el pueblo de Israel
  - los hijos de Israel / el pueblo de Israel
  rationale: Se mantiene la forma masculina plural del original en la línea principal, siguiendo la filosofía de precisión de género del POB. No se neutraliza la expresión en el texto principal, aunque «el pueblo de Israel» sería una equivalencia idiomática posible.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La fuente y el audit trail inglés muestran alta concordancia y ningún cambio aplicado en la última revisión; por ello, el borrador español sigue de cerca las decisiones léxicas ya validadas sin introducir variantes no motivadas.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para el nombre divino porque este versículo no lo contiene.
  - «Hizo conocer» preserva la fuerza causativa del hifil mejor que una simple traducción estática.
  - «Sus obras» se eligió frente a «sus hechos» para sonar natural en español, manteniendo el valor general del término hebreo.
