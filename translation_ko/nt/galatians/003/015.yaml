  text: Ἀδελφοί, κατὰ ἄνθρωπον λέγω· ὅμως ἀνθρώπου κεκυρωμένην διαθήκην οὐδεὶς ἀθετεῖ ἢ ἐπιδιατάσσεται.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/015.yaml
  text: 'Brothers[a], I am speaking in human terms: even a covenant ratified by a man[b], no one sets aside or adds to it.'
  footnotes:
  - marker: a
    text: '''Brothers'' translates the masculine plural adelphoi; Paul is addressing fellow believers, likely including women.'
    reason: cultural_note
  - marker: b
    text: 'Or ''will'' / ''testament'' for ''covenant.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분, 사람의 관례를 들어 말씀드립니다. 사람이 비준한 언약[a]일지라도 아무도 그것을 폐기하거나 거기에 더하지 않습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「유언」, 「약정」. 헬라어 διαθήκη는 신학적 「언약」과 일상적 「유언」 양쪽을 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκην
