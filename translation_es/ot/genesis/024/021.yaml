translation:
  language: es
  text: El hombre la observaba en silencio[a], para saber si Yahvé había hecho prosperar su viaje o no.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El hombre la miraba fijamente en silencio, para averiguar si Yahvé había prosperado su camino o no».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  english_pob_choice: The man
  chosen_spanish: El hombre
  alternatives_spanish:
  - el servidor
  - el siervo
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común אִישׁ, no un término explícito para ‘sirviente’. ‘El hombre’ conserva el wording de la fuente y evita introducir por adelantado la identificación contextual con el siervo de Abraham.
- source_word: מִשְׁתָּאֵה
  english_pob_choice: watched
  chosen_spanish: la observaba
  alternatives_spanish:
  - la miraba
  - la contemplaba
  - la miraba fijamente
  lexicon: HALOT
  rationale: El participio hitpael expresa observación continua. ‘La observaba’ mantiene la acción durativa y el matiz de atención sin añadir una emoción que el hebreo no exige de manera inequívoca.
- source_word: לָהּ
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - hacia ella
  lexicon: HALOT
  rationale: El complemento pronominal indica el objeto de su atención. En español, ‘la observaba’ reproduce de forma natural esa relación.
- source_word: מַחֲרִישׁ
  english_pob_choice: silently
  chosen_spanish: en silencio
  alternatives_spanish:
  - calladamente
  - sin hablar
  lexicon: HALOT
  rationale: El participio de חרשׁ significa estar callado o guardar silencio. ‘En silencio’ expresa bien el modo adverbial en español moderno y conserva la precisión del original.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - para enterarse
  lexicon: HALOT
  rationale: El infinitivo marca propósito. ‘Para saber’ es la forma más natural en español y conserva el sentido de búsqueda de información sin sobreparafrasear.
- source_word: הַהִצְלִיחַ
  english_pob_choice: had made ... successful
  chosen_spanish: había prosperado
  alternatives_spanish:
  - había hecho prosperar
  - había dado éxito a
  lexicon: HALOT
  rationale: 'El hiphil de צלח es causativo: ‘hacer prosperar / dar éxito’. ‘Había prosperado’ comunica de manera natural el resultado exitoso y sigue la solución contextual del POB inglés, aunque en nota se preserva la posibilidad más literal de ‘hacer prosperar’.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se translitera el Nombre divino como ‘Yahvé’, siguiendo la norma del proyecto para preservar el Tetragrámaton sin sustituirlo por un título.
- source_word: דַּרְכּוֹ
  english_pob_choice: his journey
  chosen_spanish: su camino
  alternatives_spanish:
  - su viaje
  - su ruta
  - su senda
  lexicon: HALOT
  rationale: En este contexto narrativo דרך puede referirse al trayecto o a la empresa emprendida. ‘Su camino’ conserva el campo semántico bíblico y suena natural en español, sin perder la posibilidad de entenderlo como misión o viaje.
- source_word: אִם לֹא
  english_pob_choice: or not
  chosen_spanish: o no
  alternatives_spanish:
  - si no
  - o si no
  lexicon: HALOT
  rationale: Tras ‘para saber’, la secuencia introduce una pregunta indirecta con valor binario. ‘O no’ reproduce el cierre idiomático de forma clara y fiel.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La lectura del POB inglés identifica el Tetragrámaton con el Nombre propio divino, no con una sustitución litúrgica. En español, ‘Yahvé’ conserva esa decisión doctrinal y la inteligibilidad eclesial del término.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de הִצְלִיחַ en la cláusula de propósito
  english_pob_reading: had made his journey successful
  chosen_spanish_reading: había prosperado su camino
  alternative_spanish_readings:
  - había hecho prosperar su camino
  - había dado éxito a su camino
  rationale: El hebreo presenta una acción causativa, pero el contexto narrativo permite una formulación natural en español que preserve el resultado sin perder la idea de prosperidad o éxito concedido por Dios.
  doctrine_reference: Sin referencia doctrinal específica; decisión de aspecto verbal y semántica causativa
- issue: Identificación del sujeto como ‘el hombre’
  english_pob_reading: The man
  chosen_spanish_reading: El hombre
  alternative_spanish_readings:
  - el siervo
  - el servidor
  rationale: Aunque el contexto mayor identifica al personaje como el siervo de Abraham, el versículo mismo usa un sustantivo común. Mantener ‘el hombre’ evita trasladar información contextual no explicitada en la línea hebrea.
  doctrine_reference: Principio de transparencia textual del POB
translation_notes:
  revision_awareness: El texto sigue de cerca el análisis del hebreo y la solución inglesa auditada. Se conserva la observación continua de מִשְׁתָּאֵה, el adverbial de silencio de מַחֲרִישׁ, la finalidad de לָדַעַת y la lectura causativa de הִצְלִיחַ. La nota reproduce la alternativa lexical principal registrada en el POB inglés, ajustada al español.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se evita ‘el Señor’ como sustitución del Nombre divino.
  - ‘Su camino’ mantiene el registro bíblico y puede abarcar ‘camino’, ‘viaje’ o ‘empresa’ según el contexto.
  - La nota a preserva la alternativa de ‘miraba fijamente’ y ‘hacer prosperar’ sin duplicar marcadores.
