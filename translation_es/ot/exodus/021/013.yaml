translation:
  language: es
  text: Pero si no estuvo al acecho[a], y Dios hizo que cayera en su mano, entonces yo te señalaré un lugar adonde pueda huir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y Dios hizo que cayera en su mano». El hebreo expresa un suceso providencial por medio de la acción del homicida, no una intención premeditada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  - Y cuando
  lexicon: HALOT
  rationale: En este contexto legal, la cláusula introduce un caso contrastante y condicional. «Pero si» comunica bien la oposición al caso anterior sin forzar una traducción demasiado literal del relativo hebreo.
- source_word: לֹא צָדָה
  english_pob_choice: did not lie in wait
  chosen_spanish: no lo acechó
  alternatives_spanish:
  - no planeó con premeditación
  - no lo cazó
  - no estuvo al acecho
  lexicon: HALOT
  rationale: צדה aquí expresa una acción intencional de emboscada o acecho, en contraste con el homicidio premeditado. «Acechó» conserva esa fuerza concreta y legal mejor que una paráfrasis más abstracta.
- source_word: וְהָאֱלֹהִים
  english_pob_choice: and God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo dice אֱלֹהִים, el contexto de la legislación del pacto y la agencia providencial favorecen la referencia al nombre divino. Según el criterio del proyecto, se usa «Yahvé» donde el texto hebreo apunta al Nombre divino y no a una categoría genérica.
- source_word: אִנָּה לְיָדוֹ
  english_pob_choice: caused it to come into his hand
  chosen_spanish: hizo que le sobreviniera por su mano
  alternatives_spanish:
  - lo hizo caer en su mano
  - hizo que ocurriera en su mano
  - lo entregó en su mano
  lexicon: HALOT
  rationale: La expresión idiomática conserva la idea de un suceso providencial que llega «a su mano», es decir, por medio de su acción sin intención previa. «Le sobreviniera por su mano» procura retener tanto la causalidad divina como la instrumentación humana sin resolver la tensión.
- source_word: וְשַׂמְתִּי לְךָ מָקוֹם
  english_pob_choice: then I will appoint for you a place
  chosen_spanish: yo te señalaré un lugar
  alternatives_spanish:
  - yo te designaré un lugar
  - yo te estableceré un lugar
  - yo te asignaré un lugar
  lexicon: HALOT
  rationale: En un contexto legal-administrativo, שׂים expresa designar o establecer formalmente. «Señalaré» mantiene naturalidad en español y comunica la determinación oficial del lugar.
- source_word: אֲשֶׁר יָנוּס שָׁמָּה
  english_pob_choice: to which he may flee
  chosen_spanish: adonde pueda huir
  alternatives_spanish:
  - donde pueda huir
  - a donde huya
  - para que huya allí
  lexicon: HALOT
  rationale: יָנוּס denota huida hacia un refugio. «Adonde pueda huir» conserva el sentido direccional y el matiz de posibilidad legal propio del texto.
theological_decisions:
- issue: Agencia divina en una muerte no premeditada
  english_pob_reading: and God caused it to come into his hand
  chosen_spanish_reading: Yahvé hizo que le sobreviniera por su mano
  alternative_spanish_readings:
  - Dios hizo que le sobreviniera por su mano
  - Yahvé causó que ocurriera en su mano
  - Yahvé lo entregó en su mano
  rationale: 'El hebreo mantiene una tensión teológica: el hecho no fue premeditado, pero tampoco queda fuera de la providencia divina. La formulación elegida preserva esa tensión en español sin convertirla en un acto moralmente imputable a Dios ni diluirla en mera casualidad.'
  doctrine_reference: Providencia divina y responsabilidad humana; mantener la tensión del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más cercana al hebreo de אִנָּה לְיָדוֹ («caused it to come into his hand»). La versión española intenta reflejar esa cercanía manteniendo una frase natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para el Nombre divino.
  - «Acechó» conserva la fuerza legal de צדה en contraste con el homicidio premeditado.
  - La nota al pie mantiene la alternativa más literal sin borrar la tensión providencial del texto.
  - «Adonde» se emplea para conservar el valor direccional de שָׁמָּה.
  - La formulación evita el calco rígido y mantiene registro jurídico claro en español.
