  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en casi todos los elementos: «Ahora bien» refleja וְעַתָּה; «por favor escucha» preserva la súplica de שְׁמַע נָא; «tú también» conserva גַם אַתָּה; «tu sierva» mantiene el género de שִׁפְחָה; la cohortativa «deja que ponga» transmite adecuadamente וְאָשִׂימָה; «Come» y la cláusula final de propósito/resultado están bien encaminadas. La principal desviación está en el uso de notas: la nota [a] en español no corresponde a la nota inglesa principal sobre «sierva/maidservant», y además faltan las alternativas documentadas para «escuchar la voz de tu sierva» y «pedazo/morsel de pan».'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, «deja que ponga» suena un poco menos idiomático que «permíteme poner» en este contexto de ruego cortés. También conviene ajustar la ubicación y contenido de las notas para que sirvan al texto y a las decisiones léxicas realmente significativas. El resto del verso se lee bien en español eclesial general.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Sierva» es apropiado para שִׁפְחָה en este contexto. No aparecen términos teológicos del glosario general que requieran corrección.
  issues:
  - severity: medium
    issue: Las notas al pie no preservan las alternativas/significados significativos documentados en la auditoría inglesa.
    rationale: El inglés conserva nota para «female servant/maidservant», otra para el modismo «listen to the voice of», y otra para «piece/morsel of bread». El borrador español en cambio dedica notas a «Ahora bien», «haya fuerza en ti» y «seguir tu camino», dejando sin documentar dos decisiones léxicas más relevantes y una alternativa de traducción útil.
  - severity: low
    issue: «deja que ponga delante de ti» es menos natural que una formulación de permiso más idiomática.
    rationale: La cohortativa hebrea expresa ofrecimiento cortés. En español bíblico natural, «permíteme poner delante de ti» comunica mejor ese matiz sin perder cercanía al original.
  revised_spanish_text: Ahora bien, por favor escucha, tú también, la voz[a] de tu sierva[b], y permíteme poner delante de ti un pedazo[c] de pan. Come, para que haya fuerza en ti, porque has de seguir tu camino.
  revised_footnotes:
