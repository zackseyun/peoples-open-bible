    rationale: El posesivo reforzado no es incorrecto, pero ‘sus asuntos’ o ‘lo suyo’ suena más natural. Dado que el inglés auditado preserva ‘your own affairs’, conviene mantener el matiz de posesión, pero con mejor fluidez si es posible.
