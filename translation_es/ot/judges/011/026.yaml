revisions:
- from: Mientras Israel ha habitado en Hesbón y en sus ciudades dependientes[a], y en Aroer y en sus ciudades dependientes, y en todas las ciudades que están a lo largo del Arnón, por trescientos años[b], ¿por qué no las recuperaste en ese tiempo?
  to: Mientras Israel ha habitado en Hesbón y en sus ciudades dependientes[a], y en Aroer y en sus ciudades dependientes, y en todas las ciudades que están a lo largo del Arnón, durante trescientos años[b], ¿por qué no las recuperaron durante ese tiempo?
  rationale: Se corrige la persona verbal de singular a plural para reflejar fielmente el hebreo 2mp. También se ajusta la expresión temporal a «durante trescientos años» y «durante ese tiempo» para mantener el valor durativo destacado en el expediente inglés y sonar más natural en español.
