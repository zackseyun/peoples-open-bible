translation:
  language: es
  text: Harás sus platos y sus fuentes, sus jarros[a] y sus tazones[b] con los que se derrama la libación; los harás de oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «flagones»; el término hebreo es raro, y versiones más antiguas suelen traducirlo así.
    reason: lexical_alternative
  - marker: b
    text: O «copas»; ambos términos se refieren a recipientes usados en el servicio de libación de la mesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְּעָרֹתָיו
  english_pob_choice: its plates
  chosen_spanish: sus platos
  alternatives_spanish:
  - sus fuentes
  - sus bandejas
  lexicon: HALOT
  rationale: קְעָרָה designa un recipiente poco profundo o una vasija plana. En español, «platos» comunica bien esa forma y mantiene la distinción con el término siguiente sin sonar arcaico.
- source_word: כַפֹּתָיו
  english_pob_choice: its dishes
  chosen_spanish: sus fuentes
  alternatives_spanish:
  - sus sartenes
  - sus cucharones
  - sus platos
  lexicon: HALOT
  rationale: כַּף puede referir a un recipiente pequeño, de forma semejante a una palma. «Fuentes» conserva la idea de recipiente amplio y distinto de los vasos para líquidos, sin confundirlo con «platos».
- source_word: קְשׂוֹתָיו
  english_pob_choice: its pitchers
  chosen_spanish: sus jarros
  alternatives_spanish:
  - sus cántaros
  - sus vasijas
  lexicon: HALOT
  rationale: El término es raro y el contexto de derramar apoya un recipiente para líquido. «Jarros» expresa esa función en español moderno mejor que el tradicional pero más arqueizante «vasos/flagones».
- source_word: מְנַקִּיֹּתָיו
  english_pob_choice: its bowls
  chosen_spanish: sus tazones
  alternatives_spanish:
  - sus copas
  - sus cuencos
  - sus bowls
  lexicon: HALOT
  rationale: El término se relaciona con recipientes usados en el servicio de libación. «Tazones» mantiene la referencia a un recipiente hondo y natural en español, sin sobrecargarlo litúrgicamente.
- source_word: אֲשֶׁר יֻסַּךְ בָּהֵן
  english_pob_choice: with which the drink offering is poured
  chosen_spanish: con los que se derrama la libación
  alternatives_spanish:
  - con los que se vierte la libación
  - con los que se derrama la ofrenda líquida
  - por los cuales se vierte
  lexicon: HALOT
  rationale: נסך aquí remite al vertido ritual de una libación. «Se derrama la libación» conserva el sentido cultual sin introducir de más; «libación» hace explícito el uso sacrificial que el hebreo da por entendido.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro limpio
  - oro fino
  lexicon: HALOT
  rationale: La fórmula material estándar se rinde de forma natural y solemne como «oro puro», equivalente directo y transparente en español bíblico contemporáneo.
- source_word: וְעָשִׂיתָ ... תַּעֲשֶׂה אֹתָם
  english_pob_choice: You shall make ... you shall make them
  chosen_spanish: Harás ... los harás
  alternatives_spanish:
  - Y harás ... harás
  - Debes hacer ... los harás
  lexicon: HALOT
  rationale: El hebreo da instrucciones en segunda masculina singular. En español, el futuro exhortativo («harás») preserva el tono directivo con fluidez y evita el calco rígido del inglés.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el auditorio inglés: conserva la lista de cuatro utensilios, explicita la libación según el verbo נסך, y mantiene la especificación final de material sin añadir contenido ajeno al versículo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y no hay referencia al tetragrámaton en este verso.
  - Se usa «libación» para reflejar el uso ritual del verbo hebreo, en línea con el contexto del servicio de la mesa.
  - «Oro puro» mantiene la fórmula cultual estándar sin introducir matices no atestiguados por la fuente.
