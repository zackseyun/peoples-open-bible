id: 1TI.6.11
reference: 1 Timothy 6:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Σὺ δέ, ὦ ἄνθρωπε ⸀θεοῦ, ταῦτα φεῦγε· δίωκε δὲ δικαιοσύνην, εὐσέβειαν, πίστιν, ἀγάπην, ὑπομονήν, ⸀πραϋπαθίαν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/011.yaml
  text: But you[a], man of God, flee these things; but pursue righteousness, godliness, faith, love, steadfastness[c][b], gentleness.
  footnotes:
  - marker: a
    text: Or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faithfulness' or 'trust.'
    reason: lexical_alternative
  - marker: c
    text: The rare Greek term may also be rendered 'meekness,' 'forbearance,' or 'patient meekness.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 그대, 하나님의 사람이여, 이것들을 피하십시오. 도리어 의[a]와 경건과 믿음[b]과 사랑과 인내와 온유함[c]을 추구하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「정의」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「신실함」 「신뢰」.
    reason: lexical_alternative
  - marker: c
    text: 드문 헬라어 πραϋπαθία는 「온유」 「관용」 「인내하는 온유」로도 옮길 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ δέ, ὦ ἄνθρωπε θεοῦ
  english_pob_choice: But you, man of God
  chosen_korean: 그러나 그대, 하나님의 사람이여
  alternatives_korean:
  - 그러나 너, 하나님의 사람아
  lexicon: BDAG
  rationale: 호격 + 합쇼체.
- source_word: ταῦτα φεῦγε
  english_pob_choice: flee these things
  chosen_korean: 이것들을 피하십시오
  alternatives_korean:
  - 이것들에서 도망하십시오
  lexicon: BDAG
  rationale: φεύγω의 「피함」.
- source_word: δίωκε
  english_pob_choice: pursue
  chosen_korean: 추구하십시오
  alternatives_korean:
  - 좇으십시오
  - 따라가십시오
  lexicon: BDAG
  rationale: διώκω의 「뒤쫓아 가다·추구하다」.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_korean: 의
  alternatives_korean:
  - 정의
  lexicon: BDAG
  rationale: 글로서리 표준 「의」.
- source_word: ὑπομονήν
  english_pob_choice: steadfastness
  chosen_korean: 인내
  alternatives_korean:
  - 견딤
  - 끈기
  lexicon: BDAG
  rationale: 한국 신학 어휘 「인내」.
- source_word: πραϋπαθίαν
  english_pob_choice: gentleness
  chosen_korean: 온유함
  alternatives_korean:
  - 관용
  - 인내하는 온유
  lexicon: BDAG
  rationale: 드문 합성어. 「온유」가 한국 신학 어휘에서 정립.
