translation:
  language: es
  text: 'Si digo[a]: “No lo mencionaré, ni hablaré más en su nombre[b]”, entonces es en mi corazón como un fuego ardiente, encerrado en mis huesos; me canso de contenerlo[c], y no puedo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “No lo recordaré”. El verbo hebreo puede significar tanto “recordar” como “mencionar”; aquí “mencionar” encaja mejor con el paralelismo de “hablar”.
    reason: lexical_alternative
  - marker: b
    text: Es decir, hablar como su representante o bajo su autoridad.
    reason: cultural_note
  - marker: c
    text: El hebreo deja implícito el referente; probablemente se refiere al mensaje de Yahvé o al impulso de anunciarlo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַרְתִּי
  english_pob_choice: If I say
  chosen_spanish: Si digo
  alternatives_spanish:
  - Y dije
  - Entonces dije
  lexicon: HALOT
  rationale: El waw + qatal introduce aquí una resolución interior o una hipótesis, no una simple secuencia narrativa. “Si digo” reproduce bien ese valor deliberativo en español.
- source_word: אֶזְכְּרֶנּוּ
  english_pob_choice: I will not mention him
  chosen_spanish: No lo recordaré[a]
  alternatives_spanish:
  - No lo mencionaré
  - No pensaré en él
  lexicon: HALOT
  rationale: זכר puede significar “recordar” o “mencionar”. Como el paralelismo sigue con “hablar… en su nombre”, el sentido de “mencionar” es fuerte; sin embargo, “recordar” conserva la amplitud semántica documentada y el matiz de la tensión lexical en español.
- source_word: אֲדַבֵּר עוֹד בִּשְׁמוֹ
  english_pob_choice: or speak any longer in his name
  chosen_spanish: ni hablaré más en su nombre
  alternatives_spanish:
  - ni hablaré otra vez en su nombre
  - ni hablaré ya en su nombre
  lexicon: HALOT
  rationale: דבר + בְּשֵׁם expresa hablar como representante o bajo la autoridad de alguien. “En su nombre” preserva el giro idiomático y la dimensión profética.
- source_word: וְהָיָה בְלִבִּי
  english_pob_choice: then in my heart it is like
  chosen_spanish: entonces en mi corazón hay como
  alternatives_spanish:
  - entonces en mi corazón es como
  - y en mi corazón está como
  lexicon: HALOT
  rationale: El hebreo presenta una construcción que en contexto se refiere a la palabra/mensaje implícito. “Hay como” suena natural en español y mantiene la imagen sin resolver explícitamente el referente.
- source_word: כְּאֵשׁ בֹּעֶרֶת
  english_pob_choice: like a burning fire
  chosen_spanish: como un fuego ardiente
  alternatives_spanish:
  - como fuego que arde
  - como un fuego encendido
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del fuego en combustión. “Fuego ardiente” comunica la fuerza del participio sin forzar un calco poco natural.
- source_word: עָצֻר בְּעַצְמֹתָי
  english_pob_choice: shut up in my bones
  chosen_spanish: encerrado en mis huesos
  alternatives_spanish:
  - reprimido en mis huesos
  - encerrado dentro de mis huesos
  lexicon: HALOT
  rationale: עצר expresa estar contenido o retenido. “Encerrado” mantiene la fuerza de la imagen corporal y el encierro interno con buena naturalidad en español.
- source_word: וְנִלְאֵיתִי כַּלְכֵּל
  english_pob_choice: I grow weary of holding it in
  chosen_spanish: me canso de contenerlo[c][b]
  alternatives_spanish:
  - me fatigo de retenerlo
  - me agoto de sostenerlo
  lexicon: HALOT
  rationale: נלאיתי expresa cansancio o agotamiento; כלכל aquí tiene la idea de contener o sostener. “Contenerlo” comunica la lucha por reprimir el impulso/mensaje con claridad y sin pérdida de fuerza.
- source_word: וְלֹא אוּכָל
  english_pob_choice: and I cannot
  chosen_spanish: y no puedo
  alternatives_spanish:
  - y no soy capaz
  - pero no puedo
  lexicon: HALOT
  rationale: La frase final expresa imposibilidad simple. “Y no puedo” conserva la coordinación y la contundencia del hebreo.
theological_decisions:
- issue: Referente de los pronombres masculinos ('lo', 'su')
  english_pob_reading: Retain the pronouns without replacing them with 'the LORD' in the main text.
  chosen_spanish_reading: Mantener los pronombres (“lo”, “su”) sin explicitar “Yahvé” en el cuerpo del versículo.
  alternative_spanish_readings:
  - No lo mencionaré, ni hablaré más en el nombre de Yahvé
  - No mencionaré a Yahvé, ni hablaré más en su nombre
  rationale: El contexto inmediato identifica el referente, pero el hebreo usa pronombres. Preservarlos evita introducir una explicitación que el texto no formula y conserva la inmediatez emotiva del habla de Jeremías.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sujeto implícito del fuego interior
  english_pob_reading: Render the clause with impersonal 'it' rather than specifying 'his word' in the main text.
  chosen_spanish_reading: Usar una construcción impersonal (“hay como un fuego ardiente”) sin especificar directamente “la palabra” o “el mensaje”.
  alternative_spanish_readings:
  - su palabra es como un fuego ardiente
  - la palabra ardía como fuego en mi corazón
  rationale: El hebreo deja implícito el referente de la acción interior; el contexto sugiere el mensaje divino, pero el texto no lo nombra. La formulación impersonal conserva esa tensión interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje tal como queda en la revisión más reciente del audit trail inglés: “If I say… then in my heart it is like a burning fire…”. Se mantiene la misma decisión de no explicitar el referente implícito en el texto principal y de conservar la intensidad de la imagen corporal y verbal.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma española estándar del nombre divino en el proyecto, pero no se introduce en el texto principal porque el hebreo aquí usa pronombres anafóricos.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La nota a refleja la tensión léxica de זכר entre “recordar” y “mencionar”; la formulación principal opta por la amplitud semántica sin perder el paralelo con “hablar”.
  - La nota b preserva el valor representativo de hablar “en su nombre”, importante para el lenguaje profético.
  - La nota c mantiene la ambigüedad deliberada sobre el referente del fuego interior, conforme al texto fuente y al audit trail inglés.
