translation:
  language: es
  text: una fuente[a] de oro, de diez siclos, llena de incienso;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una bandeja de oro' o 'una vasija de oro'. Tradicionalmente, muchas versiones dicen 'cuchara', pero el hebreo se refiere más ampliamente a un pequeño recipiente ceremonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: fuente
  alternatives_spanish:
  - plato
  - tazón
  - vasija
  lexicon: HALOT
  rationale: En este contexto de inventario ritual, כף designa un pequeño recipiente ceremonial. 'Fuente' comunica bien un recipiente ancho y poco profundo sin cargar a 'cuchara', que en español moderno sugeriría un utensilio doméstico estrecho y alargado.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: 'Concuerda en género con la forma implícita del sustantivo femenino en español: ''una fuente''.'
- source_word: עֲשָׂרָה
  english_pob_choice: ten shekels, weighing
  chosen_spanish: de diez siclos
  alternatives_spanish:
  - que pesaba diez siclos
  - de peso de diez siclos
  lexicon: HALOT
  rationale: El hebreo presenta la cifra en fórmula elíptica de peso; en español, 'de diez siclos' mantiene la concisión del original y deja que el lector entienda el valor ponderal por el contexto del pasaje.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - de oro
  lexicon: HALOT
  rationale: El material del recipiente es oro. En español, la colocación natural es 'de oro'.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - llena
  lexicon: HALOT
  rationale: '''Llena de'' reproduce de manera natural la idea predicativa del adjetivo hebreo sin añadir matices.'
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - incienso aromático
  lexicon: HALOT
  rationale: Término estándar para la sustancia aromática usada en el culto; 'incienso' es claro y fiel al uso ritual.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo de Números 7:50 y el criterio auditado de la POB en inglés: mantener el inventario ritual breve, explicitar la medida como fórmula de peso y evitar el calco engañoso ''cuchara''.'
  spanish_consistency_notes:
  - '''Siclos'' conserva la unidad de peso tradicional usada en contextos bíblicos.'
  - Se prefirió 'fuente' por claridad en español contemporáneo, manteniendo el sentido de recipiente ceremonial pequeño.
  - La puntuación con punto y coma imita el cierre de lista del hebreo y del inglés auditado.
