translation:
  language: es
  text: Sus caídos serán arrojados[a], y el hedor de sus cadáveres[b] subirá; los montes se derretirán por su sangre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echados fuera». El verbo hebreo puede traducirse «arrojados» o «echados fuera».
    reason: lexical_alternative
  - marker: b
    text: O «su hedor» o «su mal olor subirá». El hebreo permite expresar el olor de manera más directa o hacerlo explícito con referencia a los cadáveres.
    reason: lexical_alternative
  - marker: c
    text: 'Imagen profética hiperbólica de juicio: la matanza se describe de modo tan extremo que hasta los montes parecen derretirse por la sangre derramada.'
    reason: cultural_note
lexical_decisions:
- source_word: חַלְלֵיהֶם
  english_pob_choice: their slain
  chosen_spanish: sus muertos
  alternatives_spanish:
  - sus muertos en combate
  - sus caídos
  - sus asesinados
  lexicon: HALOT
  rationale: El hebreo nominal puede referirse a los caídos muertos violentamente; en español, «muertos» mantiene la referencia sin introducir una especificación bélica que el contexto ya sugiere. Evita también una repetición pesada con «cadáveres» en la segunda cola.
- source_word: יֻשְׁלָכוּ
  english_pob_choice: will be thrown out
  chosen_spanish: serán arrojados
  alternatives_spanish:
  - serán echados fuera
  - serán lanzados
  - serán sacados
  lexicon: HALOT
  rationale: El pasivo de שלך expresa arrojar/castigar con descarte. «Serán arrojados» conserva la violencia y el matiz de desecho; «echados fuera» sonaría más interpretativo en español.
- source_word: פִגְרֵיהֶם
  english_pob_choice: their corpses
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus cuerpos
  - sus carroñas
  - sus restos
  lexicon: HALOT
  rationale: פגר designa un cuerpo muerto, un cadáver. «Cadáveres» es el equivalente natural y conserva el tono sombrío del hebreo mejor que «cuerpos».
- source_word: יַעֲלֶה
  english_pob_choice: will rise
  chosen_spanish: subirá
  alternatives_spanish:
  - se elevará
  - ascenderá
  - subirá hacia arriba
  lexicon: HALOT
  rationale: Con el sustantivo olfativo implícito, עלה se expresa bien como «subirá». Mantiene la imagen direccional del hebreo sin volverla rígidamente literal con «ascenderá».
- source_word: בָאְשָׁם
  english_pob_choice: the stench of their corpses
  chosen_spanish: el hedor de sus cadáveres
  alternatives_spanish:
  - su hedor
  - el mal olor de sus cadáveres
  - su pestilencia
  lexicon: HALOT
  rationale: באש denota mal olor/hedor. «Hedor» comunica con precisión el sentido y, unido a «sus cadáveres», evita ambigüedad sobre el referente del sufijo pronominal.
- source_word: וְנָמַסּוּ
  english_pob_choice: will melt
  chosen_spanish: se derretirán
  alternatives_spanish:
  - se fundirán
  - se desharán
  - se derretirán en agua
  lexicon: HALOT
  rationale: מסס tiene el sentido de derretirse o disolverse. «Se derretirán» reproduce la fuerza imagética del hebreo y funciona con naturalidad en español.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: Aunque el hebreo dice «montañas», «montes» es un equivalente bíblico natural en español y se ajusta al registro profético sin bajar el nivel solemne.
- source_word: מִדָּמָם
  english_pob_choice: from their blood
  chosen_spanish: por su sangre
  alternatives_spanish:
  - a causa de su sangre
  - desde su sangre
  - con su sangre
  lexicon: HALOT
  rationale: La preposición מן admite fuente o causa. «Por su sangre» expresa con naturalidad la idea causal/escénica del derramamiento sin forzar una imagen física imposible, y preserva la tensión poética del texto.
theological_decisions:
- issue: Grado de literalidad de la imagen de juicio
  english_pob_reading: Retain the graphic, hyperbolic prophetic judgment imagery without softening it into metaphorical paraphrase.
  chosen_spanish_reading: Conservar la imaginería profética gráfica e hiperbólica sin suavizarla en una paráfrasis explicativa.
  alternative_spanish_readings:
  - Interpretar más libremente como que la tierra quedará empapada de sangre
  - Explicar la imagen como simple derrota militar
  rationale: El hebreo presenta una escena de juicio devastadora con lenguaje cósmico. La traducción española debe mantener esa dureza y no domesticarla mediante explicaciones que reduzcan el impacto del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo de forma directa y coherente con el audit trail inglés; no se documentan revisiones posteriores que alteren el sentido o la elección léxica.
  spanish_consistency_notes:
  - Se mantiene el registro profético solemne y moderno, sin arcaísmos innecesarios.
  - «Montes» conserva un tono bíblico natural en español y evita sobrecargar el verso con repeticiones de «montañas».
  - Las notas preservan la ambigüedad lexical relevante sin introducir interpretaciones ajenas al hebreo.
