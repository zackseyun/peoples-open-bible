revisions:
- from: 'Entonces Balaam dijo al ángel de Yahvé[a]: «He pecado, porque no sabía que estabas de pie en el camino para encontrarme. Y ahora, si es malo a tus ojos[b], me volveré».'
  to: 'Entonces Balaam dijo al ángel de Yahvé[a]: «He pecado, porque no sabía que estabas de pie en el camino para salir a mi encuentro. Y ahora, si es malo ante tus ojos[b], volveré atrás»'
  rationale: La revisión mantiene el significado fuente y las decisiones documentadas, pero mejora la naturalidad y precisión del español. «Salir a mi encuentro» representa mejor לִקְרָאתִי que «encontrarme», y «malo ante tus ojos» evita un calco preposicional torpe mientras la nota conserva el literal hebreo. «Volveré atrás» aclara el sentido de retorno de אָשׁוּבָה.
