    rationale: El relativo explicativo/restrictivo en español moderno y eclesial legible normalmente se expresa mejor con «que». No cambia el sentido, pero mejora la fluidez sin perder precisión.
  revised_spanish_text: Y Josué levantó estas doce piedras en Gilgal, que habían tomado del Jordán.
  revision_rationale: Se ajusta הֵקִים a «levantó», que refleja mejor la acción de poner en pie las piedras memoriales sin el matiz excesivamente monumental de «erigió». También se simplifica «las cuales» a «que» para un español más natural y ampliamente legible, manteniendo intacto el sentido del hebreo y del POB inglés.
