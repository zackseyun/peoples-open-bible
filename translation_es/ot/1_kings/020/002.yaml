review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: acción narrativa pasada, mensajeros humanos, destinatario Ahab y la frase direccional hacia la ciudad. Sin embargo, la colocación y puntuación de los complementos produce una lectura algo trabada en español, y el nombre propio no sigue la forma bíblica española esperable para amplia legibilidad eclesial.'
  spanish_quality_summary: El texto es comprensible, pero 'a la ciudad, a Ahab' suena menos natural que una reordenación que preserve la relación adverbial. Además, en español bíblico y church-readable, 'Acab' es preferible a 'Ahab'. La nota puede mantenerse, con leve ajuste de estilo.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. ''Mensajeros'' para מַלְאָכִים y ''rey de Israel'' son acertados. La principal cuestión léxica es el nombre propio: para español bíblico neutral conviene ''Acab'' en lugar de la forma inglesa ''Ahab''.'
  issues:
  - severity: medium
    issue: Uso de 'Ahab' en lugar de 'Acab'
    rationale: Aunque el borrador menciona una supuesta tradición de transliteración, en español bíblico ampliamente legible la forma establecida es 'Acab'. 'Ahab' se percibe anglicado y menos natural para el público meta.
  - severity: low
    issue: Orden y puntuación algo forzados en 'a la ciudad, a Ahab, rey de Israel'
    rationale: El hebreo permite entender 'hacia/ a la ciudad' como complemento de destino del envío, pero en español suena más fluido 'Envió mensajeros a Acab, rey de Israel, en la ciudad' o mejor 'a la ciudad, a Acab...' sin coma tan marcada. Dado el audit trail inglés, conviene conservar la relación 'a la ciudad' + 'a Acab' con una redacción más natural.
  - severity: low
    issue: Nota al pie mejorable en estilo
    rationale: La nota repite exactamente la superficie del texto como alternativa; puede aclararse mejor que el hebreo también puede entenderse 'hacia la ciudad' o 'a la ciudad', por el sufijo direccional.
  revised_spanish_text: Y envió mensajeros a la ciudad[a], a Acab, rey de Israel.
  revised_footnotes:
  - marker: a
    text: O «hacia la ciudad». La forma hebrea lleva un sufijo direccional en «ciudad», que indica movimiento hacia la ciudad.
    reason: lexical_alternative
