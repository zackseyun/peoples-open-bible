base_translation:
  language: en
  yaml_path: translation/ot/genesis/049/009.yaml
  text: Judah is a lion’s cub[a]; from the prey, my son, you have gone up. He crouched, he lay down like a lion[b], and like a lioness—who will rouse him?
  footnotes:
  - marker: a
    text: Or 'and like a great lion.' The Hebrew word here differs from the earlier word for 'lion,' and many translations preserve the distinction as 'lioness' or 'great lion.'
    reason: lexical_alternative
  - marker: b
    text: The lion imagery for Judah is often read typologically in connection with later royal and messianic hope, but the verse itself speaks directly of Judah in Jacob's blessing.
    reason: cross_reference
