    issue: «los celos» en el texto principal puede sonar demasiado específico o romántico
    rationale: Aunque קִנְאָה puede significar «celos», en español general «envidia» comunica mejor aquí la rivalidad dañina entre personas y evita una lectura estrecha.
  - severity: medium
    issue: «desenlace» no es la mejor opción para אַחֲרִית en este contexto
    rationale: «Desenlace» es comprensible, pero tiene un tono narrativo; «fin» o «resultado» refleja mejor el valor de «outcome/end» documentado en el expediente inglés.
  - severity: low
    issue: La nota b usa «la salida de los celos»
    rationale: «Salida» no corresponde bien a אַחֲרִית y puede confundir; conviene hablar de «fin» o «resultado».
  revised_spanish_text: Trátalo como a uno que revela un secreto[a], y no hallará modo de arruinarte; y conoce el fin de la envidia[b].
