translation:
  language: es
  text: Hijo de hombre[a], si una tierra peca contra mí actuando con infidelidad, y yo extiendo mi mano contra ella, y quiebro su provisión de pan[b], y envío hambruna sobre ella, y elimino de ella al hombre y la bestia[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hijo de hombre», fórmula profética de tratamiento en Ezequiel.
    reason: source_note
  - marker: b
    text: Literalmente, «quebrar su bastón de pan», un modismo hebreo para cortar el suministro de alimento.
    reason: lexical_alternative
  - marker: c
    text: O «personas y animales». El hebreo dice «hombre y bestia», una expresión convencional que abarca a los habitantes humanos y animales por igual.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva la fórmula profética fija de Ezequiel sin volverla explicativa en exceso. En español, 'Hijo de hombre' mantiene el tono reverencial y el carácter idiomático del vocativo.
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - la tierra
  - un país
  lexicon: HALOT
  rationale: El hebreo es indefinido; 'una tierra' conserva ese valor y evita restringirlo a una entidad política moderna.
- source_word: תֶחֱטָא לִי
  english_pob_choice: sins against me
  chosen_spanish: peca contra mí
  alternatives_spanish:
  - peca contra mí
  - me ofende
  lexicon: HALOT
  rationale: '''Peca contra mí'' reproduce con naturalidad el marco relacional del verbo con לִי, sin suavizar la dirección del pecado hacia Dios.'
- source_word: לִמְעָל מַעַל
  english_pob_choice: by acting unfaithfully
  chosen_spanish: actuando con infidelidad
  alternatives_spanish:
  - obrando con deslealtad
  - cometiendo traición
  lexicon: HALOT
  rationale: La construcción intensiva expresa quiebre de fidelidad, no solo falta moral general. 'Infidelidad' preserva ese matiz de ruptura de pacto con español claro y sobrio.
- source_word: וְנָטִיתִי יָדִי עָלֶיהָ
  english_pob_choice: and I stretch out my hand against it
  chosen_spanish: extenderé mi mano contra ella
  alternatives_spanish:
  - alargaré mi mano contra ella
  - extenderé mi mano sobre ella
  lexicon: HALOT
  rationale: Mantiene la imagen judicial hebrea y el valor adversativo de עַל con una construcción natural en español.
- source_word: וְשָׁבַרְתִּי לָהּ מַטֵּה לָחֶם
  english_pob_choice: and break its supply of bread
  chosen_spanish: quebraré su sustento de pan
  alternatives_spanish:
  - quebraré su bastón de pan
  - romperé su provisión de pan
  lexicon: HALOT
  rationale: '''Sustento de pan'' traduce el idiomático ''staff of bread'' sin perder la metáfora del apoyo que sostiene la vida. Se evita ''provisión'' como demasiado interpretativo, pero se conserva el sentido de escasez alimentaria.'
- source_word: וְהִשְׁלַחְתִּי בָהּ רָעָב
  english_pob_choice: and send famine upon it
  chosen_spanish: enviaré hambre sobre ella
  alternatives_spanish:
  - enviaré hambre contra ella
  - mandaré hambre sobre ella
  lexicon: HALOT
  rationale: '''Hambre'' comunica el juicio de רָעָב de forma directa; ''sobre ella'' refleja mejor la preposición y mantiene el tono de calamidad enviada por Dios.'
- source_word: וְהִכְרַתִּי מִמֶּנָּה
  english_pob_choice: and cut off from it
  chosen_spanish: exterminaré de ella
  alternatives_spanish:
  - cortaré de ella
  - eliminaré de ella
  lexicon: HALOT
  rationale: '''Exterminaré'' intensifica de manera fiel el efecto total del verbo en contexto judicial. Se eligió por claridad pública; ''cortaré'' puede sonar demasiado débil en español contemporáneo para este juicio devastador.'
- source_word: אָדָם וּבְהֵמָה
  english_pob_choice: man and beast
  chosen_spanish: al hombre y la bestia
  alternatives_spanish:
  - a la gente y los animales
  - al ser humano y a la bestia
  lexicon: HALOT
  rationale: Se preserva la merismo hebrea con el singular representativo 'el hombre' y 'la bestia'. En nota se aclara que la expresión abarca a humanos y animales.
theological_decisions:
- issue: Naturaleza de la infidelidad expresada por מַעַל
  english_pob_reading: covenant unfaithfulness toward God
  chosen_spanish_reading: infidelidad de pacto contra Dios
  alternative_spanish_readings:
  - pecado general
  - traición en sentido legal estrecho
  rationale: La combinación de 'peca contra mí' con el verbo-nombre intensivo apunta a una ruptura fiel-relacional, no a mera falla ética abstracta. 'Infidelidad de pacto' explicita el trasfondo sin resolverlo en una categoría más estrecha de la que el hebreo exige.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; do not flatten covenantal language.'
- issue: Alcance de 'hombre y bestia' como merismo
  english_pob_reading: standard expression for all living inhabitants, human and animal alike
  chosen_spanish_reading: expresión que incluye a seres humanos y animales
  alternative_spanish_readings:
  - personas y animales
  - humanidad y animales
  rationale: El hebreo usa un par representativo totalizante. La traducción principal lo conserva y la nota aclara el alcance inclusivo para no perder el valor retórico del merismo.
  doctrine_reference: 'DOCTRINE.md: preserve textual imagery and explain idioms in notes rather than replace them.'
translation_notes:
  revision_awareness: La edición inglesa más reciente cambió la preposición idiomática de 'send famine into it' a 'send famine upon it' para mayor naturalidad; en español se reflejó con 'enviaré hambre sobre ella'. También se mantuvo la nota de la imagen literal 'staff of bread' mediante una equivalencia idiomática en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó 'tierra' para אֶרֶץ por su amplitud semántica y por ser una fórmula profética general, no necesariamente 'país'.
  - Se preservó el paralelismo de juicio con verbos en futuro ('extenderé', 'quebraré', 'enviaré', 'exterminaré').
  - Se evitó 'SEÑOR' para el nombre divino porque en este versículo no aparece el tetragrámaton ni κύριος como sustituto.
  - '''Sustento de pan'' busca mantener la metáfora hebrea sin sonar arcaica o confusa en español actual.'
