revisions:
- from: Bienaventurado[a] el hombre que me escucha, velando a mis puertas día tras día, guardando los postes de mis entradas.
  to: Bienaventurado[a] el hombre que me escucha, velando junto a mis puertas día tras día, vigilando los postes de mis entradas.
  rationale: Se mantiene la estructura y las decisiones principales del borrador, pero se ajusta la segunda mitad para reflejar mejor el valor de vigilancia perseverante en לִשְׁמֹר y para hacer más clara la imagen arquitectónica de מְזוּזוֹת en español. «Vigilando los postes de mis entradas» preserva el paralelismo con «velando» y evita la lectura de custodiar físicamente los postes. «Junto a mis puertas» mejora levemente la naturalidad de la locución.
