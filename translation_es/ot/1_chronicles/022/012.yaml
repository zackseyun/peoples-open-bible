revisions:
- from: Solo[a], que Yahvé te conceda sabiduría[b] e inteligencia, y te dé orden acerca de Israel[c], para que guardes la ley de Yahvé tu Dios.
  to: Solo[a], que Yahvé te conceda sensatez[b] y entendimiento, y te mande respecto de Israel[c], para que guardes la ley de Yahvé tu Dios.
  rationale: Se ajusta שֵׂכֶל de «sabiduría» a «sensatez» para preservar mejor el matiz de buen juicio práctico en el par hebreo. Se cambia «te dé orden acerca de Israel» por «te mande respecto de Israel» porque es más idiomático y refleja mejor צוה sin importar indebidamente una idea de nombramiento. Se conservan «Yahvé» y «la ley de Yahvé tu Dios» conforme al proyecto. Las notas se simplifican y alinean mejor con sus anclajes.
