translation:
  language: es
  text: 'Entonces la reina Ester respondió y dijo: «Si he hallado favor en tus ojos, oh rey, y si le parece bien al rey, que mi vida me sea dada[a] en mi petición, y mi pueblo en mi ruego».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O de manera más idiomática: «concédeme la vida por mi petición, y a mi pueblo por mi ruego». Más literalmente, el hebreo dice: «que mi vida me sea dada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה en la secuencia narrativa introduce una respuesta en diálogo. «Respondió» es natural en español y conserva el tono formal del relato; se mantiene también «y dijo» para reflejar la fórmula hebrea y la redacción del POB inglés.
- source_word: הַמַּלְכָּה
  english_pob_choice: Queen
  chosen_spanish: la reina
  alternatives_spanish:
  - la reina Ester
  - Ester, la reina
  lexicon: HALOT
  rationale: El hebreo usa el título como aposición. En español, «la reina Ester» o «la reina» son equivalentes naturales; aquí se conserva «la reina» por fluidez y porque el nombre aparece inmediatamente antes.
- source_word: אִם מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: If I have found favor in your eyes
  chosen_spanish: Si he hallado favor en tus ojos
  alternatives_spanish:
  - Si he hallado gracia ante tus ojos
  - Si he hallado favor delante de ti
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «hallar favor en tus ojos», que es idiomática y transparente. «Gracia» es posible para חֵן, pero «favor» se ajusta mejor al contexto de petición cortesana, como en el POB inglés.
- source_word: הַמֶּלֶךְ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey mío
  - mi rey
  lexicon: HALOT
  rationale: Es vocativo de respeto. «Oh rey» mantiene el registro solemne sin introducir posesividad no presente en el hebreo.
- source_word: וְאִם עַל הַמֶּלֶךְ טוֹב
  english_pob_choice: and if it pleases the king
  chosen_spanish: y si le parece bien al rey
  alternatives_spanish:
  - y si agrada al rey
  - y si al rey le parece bueno
  lexicon: HALOT
  rationale: El hebreo expresa lo que es bueno/aceptable para el rey. «Le parece bien al rey» reproduce el sentido de aprobación real en español natural, como el POB inglés con «if it pleases the king».
- source_word: תִּנָּתֶן לִי נַפְשִׁי
  english_pob_choice: let my life be given me
  chosen_spanish: que mi vida me sea dada
  alternatives_spanish:
  - que se me conceda la vida
  - permítaseme la vida
  lexicon: HALOT
  rationale: Se preserva la pasiva del niphal de נתן y el matiz de don/otorgamiento. «Mi vida» refleja נֶפֶשׁ en este contexto de amenaza mortal; «alma» sería engañoso en español moderno.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ significa vida física, no alma inmortal. «Mi vida» evita una lectura doctrinal ajena al pasaje.
- source_word: בִּשְׁאֵלָתִי
  english_pob_choice: at my petition
  chosen_spanish: en mi petición
  alternatives_spanish:
  - a mi petición
  - por mi petición
  - con mi petición
  lexicon: HALOT
  rationale: שְׁאֵלָה es «petición» o «ruego». Con la preposición ב, el español más directo y natural aquí es «en mi petición», que conserva el paralelismo formal con la cláusula siguiente.
- source_word: וְעַמִּי
  english_pob_choice: and my people
  chosen_spanish: y mi pueblo
  alternatives_spanish:
  - y mi gente
  - y mi nación
  lexicon: HALOT
  rationale: עַם puede ser pueblo/people; «mi pueblo» es la correspondencia más fiel y solemne en este contexto de intercesión colectiva.
- source_word: בְּבַקָּשָׁתִי
  english_pob_choice: at my request
  chosen_spanish: en mi solicitud
  alternatives_spanish:
  - en mi ruego
  - en mi petición
  lexicon: HALOT
  rationale: Se conserva la variación léxica hebrea entre שְׁאֵלָה y בַּקָּשָׁה. «Solicitud» distingue esta segunda palabra de «petición» en la cláusula anterior y mantiene un registro formal.
translation_notes:
  revision_awareness: El borrador español sigue de cerca el texto hebreo y el POB inglés revisado, preservando la fórmula narrativa «respondió y dijo» y el pasivo de נתן con una construcción natural en español. También mantiene la distinción entre שְׁאֵלָה y בַּקָּשָׁה mediante «petición» y «solicitud», respetando la variación léxica del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el hebreo nombra el tetragrámaton; aquí no aparece.
  - Se mantiene «favor» para חֵן en coherencia con el contexto cortesano y con el audit trail en inglés.
  - «Mi vida» traduce נֶפֶשׁ por el sentido contextual de vida física, no por «alma».
  - Se conserva el paralelismo formal del hebreo sin volver la frase rígida en español.
