base_translation:
  language: en
  yaml_path: translation/ot/joshua/010/012.yaml
  text: Then Joshua spoke to Yahweh on the day when Yahweh gave the Amorites over before the sons of Israel[a], and he said in the sight of Israel, “Sun, stand still at Gibeon, and moon[c][b], in the Valley of Aijalon.”
  footnotes:
  - marker: a
    text: Or 'before the Israelites.' The Hebrew reads 'before the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Sun, be still' or 'Sun, stop.' The Hebrew verb can denote stillness or cessation.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew ''and moon, in the Valley of Aijalon,'' with the verb from the previous clause understood: ''stand still.'''
    reason: lexical_alternative
