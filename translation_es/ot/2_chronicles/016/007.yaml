translation:
  language: es
  text: 'En aquel tiempo, Hanani el vidente fue a Asa, rey de Judá, y le dijo[a]: «Porque te apoyaste en el rey de Aram y no te apoyaste en Yahvé tu Dios, por eso el ejército del rey de Aram se ha escapado de tu mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rey de Siria». El hebreo dice «Aram».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - En aquel momento
  lexicon: HALOT
  rationale: La expresión hebrea introduce un marco temporal idiomático; en español, 'En aquel tiempo' conserva la naturalidad narrativa sin cargar de más el conector inicial.
- source_word: חֲנָנִי
  english_pob_choice: Hanani
  chosen_spanish: Jananí
  alternatives_spanish:
  - Hanani
  lexicon: Transliteración estándar al español
  rationale: Se adapta el nombre propio a la ortografía española habitual, con 'J' para el sonido /h/ en español. No altera la identificación del personaje.
- source_word: הָרֹאֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: El título רֹאֶה corresponde más exactamente a 'vidente' que a 'profeta'. 'Vidente' mantiene la distinción léxica documentada por la POB en inglés.
- source_word: אָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: Asa king of Judah
  chosen_spanish: Asa, rey de Judá
  alternatives_spanish:
  - Asa rey de Judá
  lexicon: HALOT
  rationale: Se conserva la aposición real de forma clara y natural en español, sin añadir interpretación.
- source_word: בְּהִשָּׁעֶנְךָ ... וְלֹא נִשְׁעַנְתָּ
  english_pob_choice: Because you relied ... and did not rely
  chosen_spanish: Porque te apoyaste ... y no te apoyaste
  alternatives_spanish:
  - Porque dependiste ... y no dependiste
  - Porque confiaste ... y no confiaste
  lexicon: HALOT
  rationale: שׁען expresa literalmente apoyarse/recostarse, y aquí la imagen sirve para la dependencia política y teológica. 'Apoyarte' conserva la repetición verbal y la imagen de base/soporte mejor que 'confiar' o 'depender', que interpretan más que el hebreo.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: the king of Aram
  chosen_spanish: el rey de Aram
  alternatives_spanish:
  - el rey de Siria
  lexicon: HALOT
  rationale: Se mantiene el nombre geográfico del hebreo, 'Aram', como opción más transparente al texto fuente; 'Siria' se reserva como equivalente histórico tradicional, pero no como base principal.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the LORD your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - el SEÑOR tu Dios
  - el Señor tu Dios
  lexicon: POB terminology default
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: ''Yahvé''. Se conserva ''tu Dios'' para el matiz relacional del hebreo.'
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: Introduce la consecuencia de manera idiomática y natural en español, con registro sobrio.
- source_word: נִמְלַט
  english_pob_choice: has escaped
  chosen_spanish: se ha escapado
  alternatives_spanish:
  - ha escapado
  - ha sido librado
  lexicon: HALOT
  rationale: El verbo en contexto militar expresa que una fuerza quedó fuera de la mano/control de Asa. 'Se ha escapado' conserva el resultado consumado y el matiz de evasión; 'ha sido librado' suavizaría en exceso la idea.
- source_word: חֵיל מֶלֶךְ אֲרָם
  english_pob_choice: the army of the king of Aram
  chosen_spanish: el ejército del rey de Aram
  alternatives_spanish:
  - la fuerza del rey de Aram
  - el hoste del rey de Aram
  lexicon: HALOT
  rationale: חֵיל se entiende aquí como fuerza militar; 'ejército' es la equivalencia moderna más clara y natural.
- source_word: מִיָּדֶךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de tu control
  lexicon: HALOT
  rationale: Se conserva el hebraísmo espacial-metafórico 'mano', que en español también comunica dominio, posesión y control.
theological_decisions:
- issue: Nombre divino יְהוָה en el discurso profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto hebreo usa el Tetragrama directamente. La línea editorial del POB en español exige transliteración reverente y auditable del nombre divino, no un reemplazo por un título genérico. 'Yahvé' preserva la identidad pactal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre confiaron en Aram y no en Yahvé
  english_pob_reading: Because you relied on the king of Aram and did not rely on Yahweh your God
  chosen_spanish_reading: Porque te apoyaste en el rey de Aram y no te apoyaste en Yahvé tu Dios
  alternative_spanish_readings:
  - Porque confiaste en el rey de Aram y no confiaste en Yahvé tu Dios
  - Porque dependiste del rey de Aram y no dependiste de Yahvé tu Dios
  rationale: 'La repetición del verbo שׁען debe mantenerse visible para no diluir la contraposición teológica del pasaje: la acusación no es solo política, sino de apoyo/seguridad mal colocados. ''Apoyarte'' conserva mejor esa imagen y la tensión textual.'
  doctrine_reference: Lexical force of שׁען in context; no separate doctrine item
- issue: Aram frente a Siria
  english_pob_reading: the king of Aram
  chosen_spanish_reading: el rey de Aram
  alternative_spanish_readings:
  - el rey de Siria
  rationale: El hebreo nombra 'Aram'; se evita sustituirlo por el equivalente histórico tradicional cuando ello borra la transparencia al fuente. Se documenta la alternativa sin convertirla en texto principal.
  doctrine_reference: Source transparency / lexical alternative in historical geography
translation_notes:
  revision_awareness: 'Se revisó el tramo fuente y el audit trail inglés: la traducción inglesa es de alta concordancia y no requiere cambios de sentido; la única tensión relevante es la lexical entre Aram/Siria y la carga metafórica de שׁען, ambas preservadas y documentadas en español. No se introdujeron añadidos interpretativos fuera del hebreo.'
  spanish_consistency_notes:
  - Se mantiene la traducción del nombre divino como 'Yahvé' conforme al estándar del proyecto en español.
  - Se conserva la repetición de 'te apoyaste' para reflejar el paralelismo hebreo de שׁען.
  - '''Aram'' se usa en el cuerpo principal para máxima transparencia textual; la alternativa ''Siria'' queda en nota.'
  - '''Vidente'' se prefiere a ''profeta'' para reflejar הָרֹאֶה con precisión lexical.'
