revisions:
- from: El pecado de Judá está escrito con un cálamo[a] de hierro; con punta de diamante[b] está grabado en la tabla de su corazón y en los cuernos de sus altares.
  to: El pecado de Judá está escrito con un estilete de hierro; con punta de diamante[a] está grabado en la tabla de su corazón y en los cuernos de vuestros altares.
  rationale: 'Se corrige el rasgo más importante: se restituye el cambio retórico del hebreo a segunda persona plural con ''vuestros altares''. Se sustituye ''cálamo'' por ''estilete'' para reflejar mejor עֵט en contexto de grabado sobre material duro. Se elimina la duplicación de notas y se deja una sola nota léxica, correctamente anclada a ''diamante'', siguiendo la rationale del POB inglés sobre la incertidumbre de שָׁמִיר.'
