revisions:
- from: Por tanto[a], vivo yo —declara el Señor Yahvé—, actuaré contigo conforme a tu enojo y conforme a tu celos[b], que hiciste por tu odio contra ellos; y me daré a conocer entre ellos cuando te juzgue.
  to: Por tanto[a], vivo yo —declara el Señor Yahvé—, actuaré contigo conforme a tu enojo y conforme a tus celos[b], que manifestaste por tu odio contra ellos; y me daré a conocer por medio de ellos[c] cuando te juzgue.
  rationale: Se corrige el error gramatical «tu celos», se ajusta la última cláusula al matiz instrumental adoptado en la auditoría inglesa («por medio de ellos»), y se mejora la naturalidad de la relación entre las pasiones y la acción con «que manifestaste», sin apartarse del sentido hebreo ni de la terminología del proyecto.
  reviewer_model: gpt-5.4
