theological_decisions:
- issue: Relation of this Greek verse to the MT parallel in Ezra 3:2, which lacks several clauses found here
  chosen_reading: Translate the fuller Greek text as the primary witness, without harmonizing it to the shorter Hebrew parallel
  alternative_readings:
  - A harmonized rendering closer to Ezra 3:2 that omits or softens the hostility/prevailed clauses
  rationale: Project policy gives primacy to the Greek for 1 Esdras while using the MT as a control. The Greek verse contains expansion and tension not present in the approximate Hebrew parallel, so the translation preserves that fuller wording rather than collapsing it into the MT.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy §1 original-language primacy'
- issue: How to render the hostile surrounding peoples without importing later ethnic or theological categories
  chosen_reading: Use 'other nations of the land' and 'hostility' language only as stated in the Greek
  alternative_readings:
  - peoples of the land
  - foreigners
  - enemies
  rationale: The verse describes opposition, but it does not specify covenantal or ethnic judgments beyond ἔθνη and ἔχθρᾳ. The translation therefore preserves the text's tension without adding interpretive labels.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather than resolve it
