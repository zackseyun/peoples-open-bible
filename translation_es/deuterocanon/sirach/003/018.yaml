review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general apoyado por el griego, pero no sigue fielmente la revisión inglesa más reciente ni la primacía del hebreo en la primera cláusula. El hebreo מַעֵט נַפְשְׁךָ מִכָּל גְּדוּלָה fue llevado en el POB revisado a una formulación más cercana: «Make yourself small in all greatness», mientras que el español vuelve a la paráfrasis comparativa «Cuanto más grande seas…», dependiente del griego. La segunda cláusula «delante de Dios encontrarás misericordia» sí preserva correctamente לִפְנֵי אֵל תִּמְצָא רַחֲמִים.'
  spanish_quality_summary: El español es claro y natural, pero «debes humillarte a ti mismo» añade obligación modal no presente en el original y resulta algo más pesado de lo necesario. Una formulación como «Hazte pequeño en toda grandeza» conserva mejor la imagen hebrea y sigue siendo comprensible y digna en español bíblico moderno. «Ante Dios encontrarás misericordia» suena ligeramente más terso que «delante de Dios», aunque ambas son aceptables.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto en nombres divinos o términos doctrinales. «Dios» para אֵל y «misericordia» para רַחֲמִים están bien. El problema principal es de alineación con la decisión léxica/documental del POB: la primera cláusula debe reflejar el hebreo más de cerca, dejando la lectura comparativa griega en nota.'
  issues:
  - severity: high
    issue: La primera cláusula del borrador sigue la lectura comparativa griega en vez de la formulación hebrea priorizada por la revisión POB.
    rationale: El registro auditado muestra una revisión deliberada desde «The greater you are…» a «Make yourself small in all greatness». El español reintroduce la opción anterior y por eso no preserva la decisión textual principal.
  - severity: medium
    issue: «debes humillarte» añade un matiz de obligación que no está explícito en el imperativo hebreo/griego.
    rationale: El original manda directamente; «hazte pequeño» o «humíllate» bastan. «Debes» interpreta en exceso.
  - severity: low
    issue: «a ti mismo» es redundante en español con «humillarte».
    rationale: No es incorrecto, pero recarga el estilo sin aportar precisión adicional.
  revised_spanish_text: Hazte pequeño en toda grandeza[a], y ante Dios encontrarás misericordia.
  revised_footnotes:
  - marker: a
    text: 'Griego: «Cuanto más grande seas, tanto más humíllate, y delante del Señor encontrarás favor»'
    reason: alternative_reading
  revision_rationale: Se ajusta la primera cláusula para reflejar la primacía del hebreo y la revisión inglesa auditada, preservando en nota la alternativa comparativa del griego. También se elimina la adición modal «debes» y se aligera el español manteniendo un tono bíblico natural. «Ante Dios» conserva bien לִפְנֵי אֵל con estilo más fluido.
