  yaml_path: translation/ot/numbers/013/023.yaml
  text: They came to the Valley of Eshcol[a], and from there they cut down a branch with a single cluster of grapes, and two of them carried it on a pole[b]; they also took some of the pomegranates and some of the figs.
  footnotes:
  - marker: a
