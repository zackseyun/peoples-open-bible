revisions:
- from: Sobre sus manos te llevarán[a][b], para que no golpees tu pie contra una piedra.
  to: En sus manos[a] te cargarán[b], para que no golpees tu pie contra una piedra.
  rationale: Se ajusta el verbo principal a «te cargarán» para preservar mejor la imagen física de נָשָׂא en combinación con «manos/palmas». También se cambia «sobre» por «en» para una expresión más natural en español sin perder el sentido. Se conservan las alternativas léxicas en notas, reancladas de modo claro al texto revisado.
