review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: acción voluntaria del hablante, propósito de aumentar la culpabilidad del tirano al matarlo también a él, y referencia a una justicia trascendente/celestial. Sin embargo, la combinación "incurras ante la justicia celestial en castigo" no reproduce con suficiente naturalidad ni precisión la relación entre ὀφλήσῃς, τιμωρίαν y τῇ οὐρανίᾳ δίκῃ. El inglés auditado entendió la frase como ''incurr punishment from heavenly justice''; en español conviene expresar que el castigo proviene de esa justicia celestial, no que simplemente se incurre ''ante'' ella.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la locución "incurrir ante ... en castigo" suena forzada. También "por aún más actos de injusticia" es comprensible, aunque "por más actos de maldad" o "por todavía más actos de injusticia" serían algo más fluidos; no es un error grave. El ajuste principal debe centrarse en la construcción judicial para que el versículo suene idiomático y mantenga el matiz moral-legal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. "Justicia celestial" preserva adecuadamente la decisión teológica sobre τῇ οὐρανίᾳ δίκῃ. "Yo mismo", "por mi propia voluntad" y "al matarme también a mí" están bien encaminados. La revisión propuesta mantiene estas decisiones y solo mejora la relación sintáctica de "incurrir" con "castigo" y su fuente/agente.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: "incurras ante la justicia celestial en castigo"'
    rationale: En español, "incurrir en castigo" ya es marginal; añadir "ante la justicia celestial" entre el verbo y su complemento vuelve la frase torpe. Además, la fuente/agencia del castigo queda menos clara que en el análisis inglés.
  - severity: low
    issue: Nota al pie demasiado apoyada en una defensa del dativo como "ante"
    rationale: Dado que la mejor solución española expresa procedencia/agencia del castigo ("de la justicia celestial") o reestructura la oración, la nota no debería insistir en que "ante" es la opción preferible.
  revised_spanish_text: Pero yo mismo me adelanté por mi propia voluntad, para que, al matarme también a mí, incurras en castigo de la justicia celestial[a] por aún más actos de injusticia.
  revised_footnotes:
  - marker: a
    text: O «la justicia del cielo» o «el juicio celestial». El griego no nombra a Dios explícitamente aquí, sino que se refiere a una justicia trascendente asociada con el cielo.
    reason: lexical_alternative
  revision_rationale: Se revisa la sintaxis para que el español exprese con más naturalidad que el tirano llega a ser pasible de castigo procedente de la justicia celestial. Se mantiene la tensión teológica del original y la nota alternativa, pero sin sobredefender la preposición "ante", que en esta oración producía una construcción poco idiomática.
