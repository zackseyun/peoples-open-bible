translation:
  language: es
  text: 'Y el rey dijo a Hazael: «Toma en tu mano un presente[a], y ve al encuentro del hombre de Dios, y consulta a Yahvé por medio de él, diciendo: “¿Sanaré[b] de esta enfermedad?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regalo» u «ofrenda». La palabra hebrea designa aquí un presente que acompaña la consulta, no una ofrenda ritual.
    reason: lexical_alternative
  - marker: b
    text: Lit. «¿Viviré de esta enfermedad?» El hebreo dice «vivir», usado aquí con el sentido de sobrevivir o recuperarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  english_pob_choice: gift
  chosen_spanish: presente
  alternatives_spanish:
  - regalo
  - ofrenda
  - tributo
  lexicon: HALOT
  rationale: En este contexto narrativo, la מִנְחָה es un obsequio que acompaña la consulta, no una ofrenda cultual. «Presente» suena natural en español y conserva ese valor sin cargarlo de sentido litúrgico.
- source_word: בְּיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - contigo
  lexicon: HALOT
  rationale: Se conserva el giro hebreo de manera transparente. En español, «en tu mano» mantiene la imagen de llevarlo personalmente, sin perder naturalidad.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: a encontrarte con
  alternatives_spanish:
  - a recibir
  - a ir al encuentro de
  lexicon: HALOT
  rationale: La forma expresa propósito tras «ve». «A encontrarte con» comunica bien la intención de salir al encuentro del hombre de Dios, con un español fluido.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: Se conserva el título hebreo literal. «Hombre de Dios» preserva la designación narrativa y evita sustituirla por un término interpretativo como «profeta».
- source_word: וְדָרַשְׁתָּ אֶת־יְהוָה מֵאֹתוֹ
  english_pob_choice: inquire of Yahweh through him
  chosen_spanish: consulta a Yahvé por medio de él
  alternatives_spanish:
  - pregunta a Yahvé por medio de él
  - busca a Yahvé por medio de él
  lexicon: HALOT
  rationale: דרשׁ con YHWH aquí expresa pedir una respuesta/oráculo divino, y מֵאֹתוֹ indica mediación. «Consulta a Yahvé por medio de él» reproduce esa relación con claridad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal en transliteración, conforme al criterio del proyecto, en lugar de ocultarlo tras una sustitución como «el SEÑOR».
- source_word: הַאֶחְיֶה
  english_pob_choice: Will I recover
  chosen_spanish: ¿Sanaré
  alternatives_spanish:
  - ¿Viviré?
  - ¿Me recuperaré?
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «vivir», pero aquí se refiere a sobrevivir o recuperarse de la enfermedad. «¿Sanaré?» transmite el sentido idiomático de forma natural en español sin perder la tensión del original.
- source_word: מֵחֳלִי זֶה
  english_pob_choice: from this sickness
  chosen_spanish: de esta enfermedad
  alternatives_spanish:
  - de esta dolencia
  - de este mal
  lexicon: HALOT
  rationale: «Enfermedad» es claro y digno en español moderno. Conserva la referencia a la dolencia presente del rey y encaja bien con la pregunta de recuperación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la política del proyecto, se translitera como «Yahvé» para preservar el nombre propio de Dios sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de הַאֶחְיֶה en contexto de enfermedad
  english_pob_reading: Will I recover
  chosen_spanish_reading: ¿Sanaré?
  alternative_spanish_readings:
  - ¿Viviré?
  - ¿Me recuperaré?
  rationale: La pregunta no es meramente por la vida en abstracto, sino por sobrevivir a la dolencia actual. En español, «¿Sanaré?» expresa de modo breve y fiel la idea contextual de recuperación.
  doctrine_reference: 'POB lexical consistency: literal sense preserved where possible, idiomatic sense rendered clearly when context demands'
translation_notes:
  revision_awareness: 'Coincide con el pasaje inglés auditado: mantiene el nombre divino «Yahweh» → «Yahvé», conserva el título literal «man of God» → «hombre de Dios», y refleja la equivalencia idiomática de הַאֶחְיֶה como recuperación/supervivencia. No se detectaron revisiones posteriores que alteren la decisión de traducción.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יְהוָה por coherencia con el estándar del proyecto.
  - «Consulta a Yahvé por medio de él» conserva explícitamente la mediación indicada por מֵאֹתוֹ.
  - «Presente» mantiene el tono narrativo y evita asociar la מִנְחָה con una ofrenda sacrificial.
  - La pregunta final se formula en español natural, pero la nota conserva la alternativa literal «vivir» para no borrar la tensión léxica del hebreo.
