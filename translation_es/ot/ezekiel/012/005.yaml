translation:
  language: es
  text: Ante sus ojos, horada[a] el muro, y saca por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abre un boquete en el muro, y saca por él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵינֵיהֶם
  english_pob_choice: Before their eyes
  chosen_spanish: Ante sus ojos
  alternatives_spanish:
  - En su presencia
  - Delante de sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala la acción hecha públicamente, visible para los observadores. «Ante sus ojos» conserva la imagen concreta mejor que una formulación más abstracta.
- source_word: חֲתָר
  english_pob_choice: dig through
  chosen_spanish: horada
  alternatives_spanish:
  - abre un boquete en
  - perfora
  - escava a través de
  lexicon: HALOT
  rationale: El verbo describe abrir paso en una pared por medio de una acción física de ruptura o excavación. «Horada» transmite bien esa acción en español sin volverla más interpretativa de lo que permite el hebreo.
- source_word: בַקִּיר
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la pared
  - el muro de la casa
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «the wall», en español «el muro» suena natural en este mandato profético y conserva el sentido de una barrera física. «Pared» también sería posible, pero «muro» mantiene mejor la fuerza de la imagen.
- source_word: וְהוֹצֵאתָ
  english_pob_choice: bring out
  chosen_spanish: saca
  alternatives_spanish:
  - haz salir
  - lleva fuera
  lexicon: HALOT
  rationale: El causativo de יצא pide una forma verbal que exprese hacer salir o sacar. «Saca» es breve, natural y mantiene el imperativo de la instrucción.
- source_word: בּוֹ
  english_pob_choice: through it
  chosen_spanish: por él
  alternatives_spanish:
  - a través de él
  - por ahí
  lexicon: HALOT
  rationale: El pronombre retoma el muro y la salida se realiza por la abertura hecha en él. «Por él» es una manera natural y fiel de expresar ese desplazamiento por la abertura sin añadir elementos no presentes.
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo directo y el auditoría inglesa revisada, que eliminó añadidos no presentes como «for yourself» y «your baggage». El español mantiene solo la secuencia orden: ante los ojos de ellos + acción de abrir/horadar + salida por la abertura.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - Se mantuvo la repetición de la referencia al muro mediante «por él», conforme al hebreo בו.
  - La nota alternativa recoge la posibilidad de una lectura más explícita («boquete») sin convertirla en paráfrasis del texto principal.
