base_translation:
  language: en
  yaml_path: translation/ot/isaiah/014/002.yaml
  text: Peoples will take them and bring them to their place[a], and the house of Israel will possess them on the land of Yahweh as male slaves and female slaves. They will take captive those who took them captive[d][c][b], and they will rule over their oppressors.
  footnotes:
  - marker: a
    text: Or 'will inherit them' for 'will take possession of them'; the Hebrew verb can carry inheritance language.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as male slaves and female slaves'; the text explicitly marks both genders.
    reason: lexical_alternative
  - marker: c
    text: Or 'They will take captive those who took them captive.' The Hebrew uses a wordplay on the same root for 'capture.'
    reason: lexical_alternative
  - marker: d
    text: '''the LORD'' renders the divine name YHWH.'
    reason: lexical_alternative
