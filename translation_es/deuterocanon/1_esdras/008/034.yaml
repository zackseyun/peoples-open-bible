translation:
  language: es
  text: 'De los hijos de Sofotio: Zaraías, hijo de Micael[a], y con él setenta hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de 1 Esdras difiere aquí del paralelo hebreo aproximado de Esdras 8:6, que lee “de los hijos de Adín, Ebed hijo de Jonatán, y con él cincuenta varones”. Como 1 Esdras se traduce desde el testimonio griego, el texto principal sigue los nombres y el número del griego.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Entre los hijos de
  - De entre los hijos de
  lexicon: LSJ
  rationale: La preposición ἐκ con genitivo señala procedencia o selección desde un grupo. En una lista genealógica, 'De los hijos de' conserva la fórmula natural en español sin añadir más de lo que el griego expresa.
- source_word: Σοφοτίου
  english_pob_choice: Sophotius
  chosen_spanish: Sofotio
  alternatives_spanish:
  - Sofotius
  - Sopotio
  lexicon: Transliteración directa del griego
  rationale: Nombre propio transliterado desde la forma griega. 'Sofotio' refleja mejor la fonética española y mantiene la dependencia del testimonio griego, que aquí gobierna sobre el paralelo hebreo aproximado.
- source_word: Ζαραίας
  english_pob_choice: Zaraias
  chosen_spanish: Zaraías
  alternatives_spanish:
  - Zaraias
  - Zaráias
  lexicon: Transliteración directa del griego
  rationale: Se conserva el nombre propio griego sin harmonizarlo con el paralelo hebreo. 'Zaraías' es una forma española legible que reproduce de cerca la secuencia consonántica y vocálica del original.
- source_word: Μειχαήλου
  english_pob_choice: son of Michael
  chosen_spanish: hijo de Micael
  alternatives_spanish:
  - de Micael
  - hijo de Miguel
  lexicon: BDAG
  rationale: El genitivo solo en esta lista genealógica se entiende naturalmente como filiación. 'Hijo de Micael' hace explícita la relación, y 'Micael' conserva la forma cercana al griego en vez de sustituirla por la forma castellana más habitual.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  - junto con él
  lexicon: BDAG
  rationale: La expresión de acompañamiento se vierte de forma directa y natural. 'Y con él' mantiene el enlace con el número que sigue, como en la sintaxis de lista del griego.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - males
  lexicon: BDAG
  rationale: En este contexto censal/listado, 'hombres' comunica bien el sentido de varones adultos sin introducir una terminología más técnica que empobrezca la fluidez del español.
- source_word: ἑβδομήκοντα
  english_pob_choice: seventy
  chosen_spanish: setenta
  alternatives_spanish:
  - '70'
  lexicon: LSJ
  rationale: Número cardinal directo y sin ambigüedad.
translation_notes:
  revision_awareness: 'Se ha mantenido la lectura griega como texto base, conforme al expediente auditado: el paralelo hebreo es solo aproximado y presenta nombres y cifra distintos. No se introducen armonizaciones con Esdras 8:6 en el texto principal.'
  spanish_consistency_notes:
  - Se prefirió 'Sofotio' y 'Micael' para mantener una transliteración coherente y legible en español, en lugar de latinizar los nombres.
  - Se usó 'hijos de' y 'hijo de' para reflejar la estructura genealógica explícita del griego.
  - La cifra se mantuvo en palabras, siguiendo el estilo de registro bíblico en español.
