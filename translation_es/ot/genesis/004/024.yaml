translation:
  language: es
  text: Porque a Caín se le vengará siete veces[a], y a Lamec, setenta y siete veces[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será vengado»; el verbo hebreo puede entenderse como una venganza futura segura o establecida.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «setenta y siete». Algunas versiones traducen «setenta y siete veces» para hacer explícita la medida intensiva; no significa «setenta por siete».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o razón de la afirmación poética anterior; «Porque» conserva la conexión causal de manera natural en español.
- source_word: שִׁבְעָתַיִם
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete veces más
  - séptuplo
  lexicon: HALOT
  rationale: La forma intensiva expresa una medida de venganza multiplicada. En español, «siete veces» es claro y mantiene la fuerza proverbial sin forzar un tecnicismo poco natural como «séptuplo».
- source_word: יֻקַּם
  english_pob_choice: is avenged
  chosen_spanish: se le vengará
  alternatives_spanish:
  - será vengado
  - será ejecutada venganza sobre él
  lexicon: HALOT
  rationale: El pasivo del verbo נקם admite un sentido de futuro asegurado. «Se le vengará» preserva ese valor y suena más natural que un presente proverbial en español.
- source_word: קָיִן
  english_pob_choice: Cain
  chosen_spanish: Caín
  alternatives_spanish:
  - Cain
  lexicon: Transliteración tradicional
  rationale: Se usa la forma bíblica usual en español, con tilde según la acentuación normativa.
- source_word: וְלֶמֶךְ
  english_pob_choice: and Lamech
  chosen_spanish: y a Lamec
  alternatives_spanish:
  - y Lamec
  - y para Lamec
  lexicon: Transliteración tradicional
  rationale: El hebreo enlaza a Lamec con el mismo esquema de comparación. «A Lamec» mantiene el paralelismo implícito del enunciado y evita una lectura meramente coordinativa que en español sonaría menos natural.
- source_word: שִׁבְעִים וְשִׁבְעָה
  english_pob_choice: seventy-sevenfold
  chosen_spanish: setenta y siete[b]
  alternatives_spanish:
  - setenta y siete veces
  - setenta y siete veces más
  lexicon: HALOT
  rationale: El hebreo dice literalmente «setenta y siete». En español, dejar el número sin añadir un sufijo interpretativo conserva el dato textual y permite que la fuerza de intensificación quede implícita por el paralelismo con «siete veces».
theological_decisions:
- issue: Cómo rendir la fórmula numérica final sin importar Mateo 18:22
  english_pob_reading: seventy-sevenfold
  chosen_spanish_reading: setenta y siete
  alternative_spanish_readings:
  - setenta y siete veces
  - setenta por siete
  rationale: La construcción hebrea significa naturalmente «setenta y siete», no «setenta por siete». Se evita introducir la formulación de Mateo 18:22 en Génesis y se conserva la tensión textual original.
  doctrine_reference: Primacía del texto hebreo; no armonizar pasajes distintos por traducción.
- issue: Valor del pasivo de נקם en el proverbio
  english_pob_reading: is avenged
  chosen_spanish_reading: se le vengará
  alternative_spanish_readings:
  - será vengado
  - es vengado
  rationale: El perfecto/proverbial futuro del hebreo puede expresar una venganza segura o establecida. «Se le vengará» recoge esa certeza sin perder la ambigüedad temporal que el hebreo permite.
  doctrine_reference: Respeto a la aspectualidad y al uso gnómico del hebreo bíblico.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó que no había cambios necesarios. La redacción española adopta una solución idiomática que conserva el valor causal de כִּי, el pasivo seguro de יֻקַּם y la lectura numérica hebrea de שִׁבְעִים וְשִׁבְעָה sin importar la formulación de Mateo 18:22.
  spanish_consistency_notes:
  - Se mantiene «Caín» y «Lamec» como transliteraciones bíblicas estándar en español.
  - Se prefirió «Porque» para el enlace causal inicial, coherente con el uso discursivo de כִּי.
  - La nota [a] marca la alternativa verbal del pasivo hebreo; la nota [b] preserva la lectura literal del número.
  - No se usó «SEÑOR» ni terminología de armonización intrabíblica, porque el versículo no contiene el nombre divino y la cuestión central es numérica/verbal.
