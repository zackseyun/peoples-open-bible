revisions:
- from: Haré tus ciudades ruinas[a], y tú serás una desolación; entonces sabrás que yo soy Yahvé.
  to: Convertiré tus ciudades en ruinas, y tú llegarás a ser una desolación; entonces sabrás que yo soy Yahvé[a].
  rationale: Se reubica la nota al pie en «Yahvé» porque trata del nombre divino. Se mejora «Haré tus ciudades ruinas» a «Convertiré tus ciudades en ruinas» por mayor naturalidad en español sin apartarse del hebreo. Se cambia «serás» por «llegarás a ser» para reflejar mejor el matiz de transición de היה señalado en el expediente inglés.
