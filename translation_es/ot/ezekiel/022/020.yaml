base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/020.yaml
  text: As silver and bronze and iron and lead and tin are gathered into the midst of a furnace[a], to blow fire on it in order to melt it, so I will gather you in my anger and in my wrath[b], and I will place you there and melt you.
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze' (נְחֹשֶׁת).
    reason: lexical_alternative
  - marker: b
    text: The final verb continues the furnace metaphor and can also be rendered 'smelt you.'
    reason: lexical_alternative
