translation:
  language: es
  text: Yo me volví[a], yo y mi corazón, para conocer, indagar y buscar sabiduría y una explicación[b], y para saber[c] que la maldad es necedad y la necedad es locura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me di vuelta», preservando la imagen más literal de reorientación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un razonamiento», «una cuenta», «un cálculo» o «una explicación razonada» para חֶשְׁבּוֹן.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo también puede entenderse de forma más compacta: «para conocer la maldad como necedad y la necedad como locura».'
    reason: alternative_reading
lexical_decisions:
- source_word: סַבּוֹתִי
  english_pob_choice: I turned
  chosen_spanish: Yo me volví
  alternatives_spanish:
  - Yo me giré
  - Yo me di vuelta
  - Yo me volví a orientar
  lexicon: HALOT
  rationale: La raíz סבב conserva una imagen concreta de giro o reorientación. «Me volví» mantiene esa imagen en español de manera natural y transmite la decisión interior de cambiar de rumbo para investigar.
- source_word: אֲנִי וְלִבִּי
  english_pob_choice: I and my heart
  chosen_spanish: yo y mi corazón
  alternatives_spanish:
  - yo y mi mente
  - yo mismo y mi corazón
  lexicon: HALOT
  rationale: Se retiene «corazón» para preservar la antropología hebrea del centro interior de pensamiento y voluntad. «Mente» sería más explicativo, pero suaviza una distinción importante del texto fuente.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para conocer
  alternatives_spanish:
  - para saber
  - para entender
  lexicon: HALOT
  rationale: Conocer/saber ambos son posibles, pero «para conocer» conserva bien la repetición del verbo ידע y la cadencia de la búsqueda intelectual del versículo.
- source_word: לָתוּר
  english_pob_choice: to search out
  chosen_spanish: explorar
  alternatives_spanish:
  - buscar cuidadosamente
  - indagar
  - registrar
  lexicon: HALOT
  rationale: El hebreo תור implica recorrer, examinar o investigar. «Explorar» comunica esa labor de examen activo sin confundirla con el verbo siguiente «buscar» y evita una repetición demasiado rígida.
- source_word: וּבַקֵּשׁ
  english_pob_choice: to seek
  chosen_spanish: buscar
  alternatives_spanish:
  - procurar
  - buscar afanosamente
  lexicon: HALOT
  rationale: בקש es el verbo común de buscar/solicitar. «Buscar» es la equivalencia más directa y permite distinguirlo de לָתוּר, como en el auditable patrón del inglés POB.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  lexicon: HALOT
  rationale: Es el equivalente estándar y más fiel en español, sin necesidad de especificación adicional.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: an explanation
  chosen_spanish: un razonamiento
  alternatives_spanish:
  - una explicación
  - un cálculo
  - una cuenta razonada
  - un recuento
  lexicon: HALOT
  rationale: El término puede abarcar cálculo, cuenta, razonamiento o explicación. Dado el contexto de indagación intelectual, «un razonamiento» preserva el matiz de proceso mental y evita fijarlo prematuramente como una explicación cerrada.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la impiedad
  - la perversidad
  lexicon: HALOT
  rationale: «Maldad» conserva el peso moral de רֶשַׁע en español claro y no se debilita como un simple mal abstracto.
- source_word: כֶּסֶל
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - torpeza
  - insensatez
  - locura
  lexicon: HALOT
  rationale: En literatura sapiencial, כסל denota necedad moral e intelectual. «Necedad» es el término español más sobrio y fiel en este contexto.
- source_word: וְהַסִּכְלוּת
  english_pob_choice: foolishness
  chosen_spanish: la necedad
  alternatives_spanish:
  - la insensatez
  - la estupidez
  lexicon: HALOT
  rationale: Aunque el inglés POB varía entre folly/foolishness, en español conviene repetir «necedad» para mantener la cercanía semántica entre los dos términos hebreos afines y evitar introducir una gradación no garantizada por el texto.
- source_word: הוֹלֵלוֹת
  english_pob_choice: madness
  chosen_spanish: locura
  alternatives_spanish:
  - demencia
  - insania
  - delirio
  lexicon: HALOT
  rationale: El término describe irracionalidad o enajenación. «Locura» es natural, bíblicamente reconocible y suficientemente fuerte para reproducir el juicio final del versículo.
theological_decisions:
- issue: Antropología de «corazón»
  english_pob_reading: Retain 'heart' in the main text
  chosen_spanish_reading: Retener «corazón» en el texto principal
  alternative_spanish_readings:
  - usar «mente»
  - usar «entendimiento»
  rationale: El hebreo no dice «mente», sino «corazón» como sede interior del pensar y decidir. Mantenerlo preserva la antropología bíblica del pasaje y evita modernizar en exceso el concepto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación entre maldad, necedad y locura
  english_pob_reading: '''that wickedness is folly and foolishness is madness'''
  chosen_spanish_reading: «que la maldad es necedad y la necedad es locura»
  alternative_spanish_readings:
  - «que la maldad, la necedad y la locura se relacionan entre sí»
  - «que la maldad conduce a la necedad y la necedad a la locura»
  rationale: El hebreo presenta dos predicados nominales compactos. La formulación elegida hace explícita la copulativa implícita sin convertirla en una paráfrasis interpretativa más amplia que el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se sigue de cerca el último estado inglés auditado: se mantiene I turned / I and my heart / to know / to search out / seek / wisdom / explanation, y se conserva la lectura final copulativa («that wickedness is folly and foolishness is madness») frente a la variante más comprimida. En español se eligió una progresión verbal natural («conocer, explorar y buscar») y se resolvió חֶשְׁבּוֹן como «un razonamiento» para reflejar su campo semántico de cuenta, explicación o razonamiento sin fijar una sola opción demasiado estrecha.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se prefiere «corazón» para לב cuando el contexto es interioridad o reflexión.
  - Se mantiene el tono sapiencial con vocabulario sobrio y no eclesiástico.
  - Se evita «Cristo», «Señor» o fórmulas tradicionales que no pertenecen al texto.
  - La coordinación «yo y mi corazón» reproduce la estructura hebrea sin suavizarla a una sola persona interior.
