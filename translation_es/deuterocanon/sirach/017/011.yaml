translation:
  language: es
  text: Estableció con ellos un pacto eterno[a], y les mostró sus juicios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pacto perpetuo» o «un pacto de la era».
    reason: lexical_alternative
  - marker: b
    text: O «sus ordenanzas» o «sus decretos».
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκην
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - pacto de alianza
  lexicon: BDAG
  rationale: El griego de la LXX usa διαθήκη con fuerza de relación pactal. En español, «pacto» comunica mejor esa relación vinculante y bíblica que una simple «alianza», y evita sonar demasiado jurídico o contractual para este contexto sapiencial.
- source_word: αἰῶνος
  english_pob_choice: everlasting
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - de larga duración
  - de la era
  lexicon: BDAG
  rationale: La cualidad duradera del pacto se expresa naturalmente en español con «eterno». Mantiene la idea de permanencia sin añadir un matiz cronológico demasiado técnico; entre las opciones inglesas documentadas, es una correspondencia válida y estilísticamente clara.
- source_word: ἔστησεν
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - instituyó
  - puso
  - confirmó
  lexicon: BDAG
  rationale: El verbo indica fijar o instaurar algo firmemente. «Estableció» conserva la idea de una acción fundacional y durable, más precisa que «hizo» o «creó».
- source_word: μετ᾿ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - para ellos
  - entre ellos
  lexicon: BDAG
  rationale: La preposición μετά con genitivo se traduce de manera directa como «con». Esto preserva el carácter relacional del pacto.
- source_word: τὰ κρίματα αὐτοῦ
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus ordenanzas
  - sus decretos
  - sus decisiones
  lexicon: BDAG
  rationale: '«Juicios» mantiene el rango semántico de κρίματα: actos o decisiones judiciales con fuerza normativa. Es más cercano al griego que reducirlo a «ordenanzas» o «decretos», aunque esas alternativas siguen siendo posibles según contexto.'
- source_word: ὑπέδειξεν
  english_pob_choice: showed
  chosen_spanish: dio a conocer
  alternatives_spanish:
  - mostró
  - les indicó
  - les reveló
  lexicon: BDAG
  rationale: El verbo puede significar indicar o mostrar, pero en español «dio a conocer» comunica bien la idea de hacer saber algo de manera clara y respetuosa del contexto. Evita la posible frialdad de «mostró» y no exagera hasta «reveló».
theological_decisions:
- issue: Lenguaje de pacto en un texto sapiencial
  english_pob_reading: everlasting covenant
  chosen_spanish_reading: pacto eterno
  alternative_spanish_readings:
  - pacto perpetuo
  - alianza eterna
  - pacto de siempre
  rationale: El texto griego presenta claramente lenguaje de pacto, y la traducción debe conservarlo. «Pacto eterno» mantiene la fuerza teológica sin suavizarla en una expresión meramente relacional o moral.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de κρίματα en relación con el pacto
  english_pob_reading: his judgments
  chosen_spanish_reading: sus juicios
  alternative_spanish_readings:
  - sus ordenanzas
  - sus decretos
  rationale: «Juicios» preserva la amplitud semántica del término griego, que puede abarcar decisiones judiciales y normas. Esto evita estrechar el verso a un lenguaje exclusivamente legislativo.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el audit trail en inglés: διαθήκην se conserva con lenguaje de pacto, αἰῶνος con un adjetivo de permanencia, ἔστησεν con un verbo de establecimiento firme, y τὰ κρίματα αὐτοῦ con un término amplio de juicios/normas. No hay señales de revisión textual que alteren el sentido base de la línea.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico y sobrio, evitando paraphrasear el par de cláusulas.
  - «Pacto» se usa como término técnico bíblico coherente con el griego y con la decisión inglesa documentada.
  - «Juicios» conserva la ambigüedad útil del original entre decisiones judiciales y preceptos normativos.
  - La construcción «dio a conocer» refleja el valor de ὑπέδειξεν sin forzar un matiz más fuerte que el del texto fuente.
