translation:
  language: es
  text: Así también nosotros, una vez nacidos, llegamos a nuestro fin[a]; y no tuvimos ninguna señal de virtud que mostrar[b], sino que fuimos consumidos en nuestra maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasamos» o «desaparecimos» para «llegamos a nuestro fin». El verbo griego puede expresar cese o desaparición.
    reason: lexical_alternative
  - marker: b
    text: O «excelencia» para «virtud». El término griego puede denotar de manera más amplia la excelencia moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ ἡμεῖς
  english_pob_choice: So also we
  chosen_spanish: Así también nosotros
  alternatives_spanish:
  - De la misma manera también nosotros
  - Así nosotros también
  lexicon: LSJ
  rationale: Conserva la fuerza comparativa e inferencial del griego y suena natural en español, manteniendo el enlace con las imágenes previas de transitoriedad.
- source_word: γενηθέντες
  english_pob_choice: once we were born
  chosen_spanish: una vez nacidos
  alternatives_spanish:
  - habiendo llegado a ser
  - después de nacer
  lexicon: LSJ
  rationale: El participio aoristo de γίνομαι aquí apunta al llegar a existir/nacer. 'Una vez nacidos' mantiene el valor temporal y la referencia a la mortalidad sin sonar forzado.
- source_word: ἐξελίπομεν
  english_pob_choice: came to an end
  chosen_spanish: llegamos a nuestro fin
  alternatives_spanish:
  - pasamos
  - desaparecimos
  - terminamos
  lexicon: LSJ
  rationale: Ἐκλείπω expresa cesar o desaparecer. 'Llegamos a nuestro fin' preserva la idea de cese de vida con un español claro y digno, sin perder la imagen de agotamiento o desaparición.
- source_word: ἀρετῆς
  english_pob_choice: virtue
  chosen_spanish: virtud
  alternatives_spanish:
  - excelencia
  - bondad
  lexicon: LSJ
  rationale: En sabiduría griega, ἀρετή suele indicar excelencia moral. 'Virtud' conserva ese registro ético mejor que una paráfrasis más amplia.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: signo
  alternatives_spanish:
  - señal
  - indicio
  - evidencia
  lexicon: LSJ
  rationale: '''Signo'' reproduce de manera directa la idea de algo demostrable o visible; en combinación con el infinitivo ''mostrar'' conserva el matiz evidencial del griego.'
- source_word: οὐδὲν ἔσχομεν δεῖξαι
  english_pob_choice: we had no sign of virtue to show
  chosen_spanish: no tuvimos ningún signo de virtud que mostrar
  alternatives_spanish:
  - no tuvimos nada que mostrar como signo de virtud
  - no tuvimos evidencia de virtud para presentar
  lexicon: LSJ
  rationale: La construcción mantiene de cerca la sintaxis del griego y hace explícita la idea de ausencia de prueba o manifestación de virtud.
- source_word: κακίᾳ
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad moral
  - perversidad
  - miseria moral
  lexicon: LSJ
  rationale: κακία señala corrupción moral; 'maldad' comunica esa fuerza en español de forma natural y sin rebajar el juicio ético.
- source_word: κατεδαπανήθημεν
  english_pob_choice: were consumed
  chosen_spanish: fuimos consumidos
  alternatives_spanish:
  - fuimos gastados
  - fuimos agotados
  - nos consumimos
  lexicon: LSJ
  rationale: El pasivo expresa ser devorados/exhaustos por una fuerza destructiva. 'Fuimos consumidos' mantiene el peso pasivo y la imagen de desgaste total.
theological_decisions:
- issue: ἀρετή como virtud/excelencia moral en contexto sapiencial
  english_pob_reading: virtue
  chosen_spanish_reading: virtud
  alternative_spanish_readings:
  - excelencia
  - bondad
  rationale: No se trata de una virtud técnica cristiana posterior, sino de excelencia moral en un lamento sobre la fugacidad de la vida. 'Virtud' es la forma más fiel y reconocible en español.
  doctrine_reference: 'Translation philosophy: original-language primacy; lexical consistency in wisdom literature.'
- issue: La imagen final de ser 'consumidos' por la maldad
  english_pob_reading: were consumed in our wickedness
  chosen_spanish_reading: fuimos consumidos en nuestra maldad
  alternative_spanish_readings:
  - fuimos agotados en nuestra maldad
  - fuimos destruidos por nuestra maldad
  rationale: El griego presenta una consumición pasiva dentro de la esfera de la maldad; 'consumidos' conserva la tensión entre desgaste interno y juicio moral sin añadir un agente externo no explícito.
  doctrine_reference: 'Translation philosophy: preserve documented lexical/theological tension.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete 1909 y el juicio de auditoría inglés sin depender mecánicamente de la redacción inglesa. Se conserva la comparación inicial, el matiz temporal de γενηθέντες, la ausencia de evidencia moral en δεῖξαι y la imagen pasiva de consumición en κατεδαπανήθημεν.
  spanish_consistency_notes:
  - Se usa 'virtud' para ἀρετή en coherencia con el criterio sapiencial del registro moral.
  - Se usa 'maldad' para κακία por su peso ético general en español, sin suavizarlo a 'mal' genérico.
  - '''Signo'' se mantiene como sustantivo visible/demostrable, acorde con la estructura ''tener... que mostrar''.'
