translation:
  language: es
  text: Él la derramó sobre toda carne, según su voluntad[a], y se la dio a los que lo aman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido lee 'la dio' en la primera cláusula; el paralelo griego apoya 'la derramó', que se sigue aquí porque el testimonio hebreo de este verso es textualmente incierto.
    reason: textual_variant
lexical_decisions:
- source_word: κύριος αὐτὸς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: κύριος
  rationale: El griego introduce al sujeto divino de manera enfática; en español, el pronombre ‘Él’ conserva la referencia sin añadir un sustantivo que el griego no repite aquí. En esta sección la forma completa del nombre divino no es necesaria en el texto corriente porque el contexto inmediato ya identifica al agente divino.
- source_word: ἐξέχεεν
  english_pob_choice: poured her out
  chosen_spanish: la derramó
  alternatives_spanish:
  - la vertió
  - la extendió
  - la desbordó
  lexicon: BDAG
  rationale: ‘Derramar’ reproduce con naturalidad la imagen verbal de ἐξέχεεν y mantiene la fuerza metafórica aplicada a la sabiduría. ‘Vertió’ es posible, pero suena más técnico; ‘desbordó’ añade un matiz no explícito en el griego.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la sabiduría
  lexicon: Greek pronoun reference in context
  rationale: El pronombre femenino se refiere a la sabiduría. En español, ‘la’ mantiene la referencia sin repetir el sustantivo y conserva el encadenamiento del verso.
- source_word: ἐπὶ πάντα τὰ ἔργα αὐτοῦ
  english_pob_choice: upon all flesh / upon all his works
  chosen_spanish: sobre toda carne
  alternatives_spanish:
  - sobre todas sus obras
  - sobre todos sus hechos
  - sobre toda la humanidad
  lexicon: LXX phrase with Hebrew parallel
  rationale: El texto griego recibido dice ‘sobre todas sus obras’, pero el paralelo hebreo leído en la tradición transmitida expresa ‘a/sobre toda carne’. Dado el expediente de este verso, se preserva la imagen de alcance universal con ‘sobre toda carne’, que refleja mejor la línea hebrea documentada y evita desdibujar la tensión textual con una paráfrasis interpretativa.
- source_word: כִּרְצוֹנוֹ
  english_pob_choice: according to his will
  chosen_spanish: conforme a su voluntad
  alternatives_spanish:
  - según su voluntad
  - como quiso
  - a su voluntad
  lexicon: HALOT
  rationale: ‘Voluntad’ conserva el sentido de רָצוֹן como decisión/intención divina. ‘Conforme a’ suena natural en español bíblico moderno y expresa adecuadamente la relación de medida o norma.
- source_word: לְאֹהֲבָיו
  english_pob_choice: to those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - a sus amadores
  - a los que le aman
  - a sus amados
  lexicon: HALOT
  rationale: La forma participial hebrea se refiere a quienes aman a Dios. ‘A los que lo aman’ es fiel, claro y mantiene el sentido relacional sin introducir un giro devocional más antiguo que podría sonar menos directo.
theological_decisions:
- issue: Tensión textual entre el griego (‘sobre todas sus obras’) y el hebreo transmitido (‘a/sobre toda carne’)
  english_pob_reading: The English POB follows the Greek-supported sense 'poured her out' while preserving the Hebrew idea of distribution to all flesh, and notes the variant openly.
  chosen_spanish_reading: Él la derramó sobre toda carne, conforme a su voluntad, y se la dio a los que lo aman.
  alternative_spanish_readings:
  - Él la derramó sobre todas sus obras, conforme a su voluntad, y se la dio a los que lo aman.
  - Él la dio a toda carne, conforme a su voluntad, y se la dio a los que lo aman.
  rationale: El verso presenta una divergencia importante en el primer miembro. La redacción española conserva la imagen de derramamiento apoyada por el griego, pero sigue el alcance universal del hebreo transmitido con ‘toda carne’. Así se evita resolver artificialmente la tensión y se mantiene visible la base textual del pasaje.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel Greek as actual translation input; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: Se ha tenido en cuenta el estado de revisión más reciente, que marca este versículo como estable en el borrador inglés pero con una evaluación externa de issues mayores. La versión española conserva la variante textual abierta entre hebreo y griego, sin nivelarla, y mantiene el paralelismo semántico del verso.
  spanish_consistency_notes:
  - Se usa ‘derramó’ para ἐξέχεεν, en línea con el criterio POB para mantener la imagen verbal.
  - Se evita ‘SEÑOR’ como máscara tipográfica; el sujeto se deja implícito con ‘Él’ porque el contexto inmediato ya lo identifica.
  - ‘Toda carne’ se conserva para respetar la formulación hebrea transmitida y su amplitud idiomática.
  - ‘Los que lo aman’ mantiene la relación de alianza/afecto sin introducir un arcaísmo innecesario.
