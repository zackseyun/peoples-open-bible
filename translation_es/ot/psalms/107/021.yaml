translation:
  language: es
  text: Den gracias a Yahvé por su amor fiel y por sus obras maravillosas a los hijos del hombre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «a la humanidad». Hebreo: «a los hijos del hombre», una expresión genérica para los seres humanos.'
    reason: lexical_alternative
  - marker: b
    text: O «y por sus obras maravillosas» / «y por sus maravillas».
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּ
  english_pob_choice: Let them give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Que den gracias
  - Alaben
  lexicon: HALOT
  rationale: El imperfecto volitivo en el refrán poético pide una exhortación en español; «den gracias» conserva el valor de acción de gracias propio del contexto de liberación y del paralelo recurrente del salmo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יהוה; la política del proyecto pide «Yahvé» en el texto principal. En español, la preposición de destinatario de la acción de gracias se expresa naturalmente con «a».
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su amor leal
  - su misericordia
  - su amor fiel
  lexicon: HALOT
  rationale: חסד abarca amor leal, duradero y de pacto. «Amor constante» comunica continuidad y fidelidad sin reducirlo a simple emoción o a «misericordia», que no recoge bien el matiz relacional del término.
- source_word: וְנִפְלְאוֹתָיו
  english_pob_choice: and for his wondrous deeds
  chosen_spanish: y por sus obras maravillosas
  alternatives_spanish:
  - y por sus maravillas
  - y por sus hechos portentosos
  lexicon: HALOT
  rationale: נפלאות se refiere a actos extraordinarios que causan asombro. «Obras maravillosas» mantiene el carácter concreto de acciones divinas y sigue de cerca la equivalencia auditada de «wondrous deeds/ marvelous works».
- source_word: לִבְנֵי אָדָם
  english_pob_choice: to the children of man
  chosen_spanish: para los hijos de los hombres
  alternatives_spanish:
  - para la humanidad
  - para los seres humanos
  - para los hijos de la humanidad
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo «hijos de los hombres» para reflejar la expresión genérica y su colorido original. «Para» comunica mejor la idea de beneficio/destino de las obras maravillosas, que el contexto y la auditación inglesa permiten entender.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La base fuente usa el Tetragrama directamente; el proyecto adopta «Yahvé» para preservar el nombre del pacto en el texto principal en lugar de un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Expresión genérica de אָדָם en una frase idiomática
  english_pob_reading: children of man
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: Aunque la expresión es genérica, mantener el giro hebreo evita aplanar la imagen poética. En español, «los hijos de los hombres» es comprensible y conserva la fuerza representativa del plural masculino genérico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'Verso estable según el último pase de revisión: no se requirieron cambios frente al texto auditado en inglés; la versión española sigue la misma decisión de fondo, con adaptación idiomática al español y preservación del nombre divino y de la expresión hebrea genérica.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la política del proyecto para יהוה.
  - Se conservó el paralelo poético entre acción de gracias y obras maravillosas.
  - La frase idiomática «hijos de los hombres» se retuvo por fidelidad formal, con nota para la alternativa semántica de «humanidad».
