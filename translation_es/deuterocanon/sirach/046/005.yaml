translation:
  language: es
  text: Porque invocó a Dios Altísimo cuando sus enemigos lo apremiaban[a] por todos lados, y Dios Altísimo le respondió con piedras de granizo y piedras de hielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «el gran Señor lo/los oyó en piedras de granizo, con gran poder». El hebreo es el testimonio principal aquí, pero el griego sugiere una formulación más amplia de teofanía de tormenta.'
    reason: alternative_reading
lexical_decisions:
- source_word: קרא אל / ἐπεκαλέσατο
  english_pob_choice: called on
  chosen_spanish: invocó
  alternatives_spanish:
  - llamó a
  - clamó a
  - llamó sobre
  lexicon: HALOT; LXX ἐπικαλέομαι
  rationale: En este contexto el verbo expresa una llamada dirigida a Dios en busca de auxilio, no solo una mención. En español, «invocó» comunica bien la idea de apelar a Dios con sentido de súplica, y mantiene la fuerza religiosa del original.
- source_word: אל עליון / ὕψιστον δυνάστην
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - Dios, el Altísimo
  - el Dios Altísimo
  - el Altísimo
  lexicon: HALOT; uso bíblico de título divino
  rationale: El título hebreo combina la referencia a Dios con su cualidad de Altísimo. «Dios Altísimo» conserva esa estructura de manera natural en español y permite repetirla en ambas cláusulas como hace el hebreo.
- source_word: כאכפה לו אויביו מסביב / θλίψαι αὐτὸν ἐχθροὺς κυκλόθεν
  english_pob_choice: when his enemies pressed him from all around
  chosen_spanish: cuando sus enemigos lo apremiaban por todos lados
  alternatives_spanish:
  - cuando sus enemigos lo rodeaban
  - cuando sus enemigos lo oprimían por todos lados
  - cuando sus enemigos lo acosaban por todos lados
  lexicon: HALOT; contexto reforzado por el griego
  rationale: La idea central es la presión hostil ejercida desde alrededor, no solo la ubicación de los enemigos. «Apremiaban» conserva la tensión de la amenaza y evita reducir el cuadro a simple cerco físico.
- source_word: ויענהו / ἐπήκουσεν
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - lo oyó
  - le contestó
  - respondió a él
  lexicon: HALOT; LXX ἐπακούω
  rationale: El hebreo presenta una respuesta efectiva de Dios; en español, «le respondió» expresa esa acción directa y fluida. «Lo oyó» sería más débil, y «le contestó» podría sonar demasiado coloquial.
- source_word: באבני ברד
  english_pob_choice: with hailstones
  chosen_spanish: con granizo
  alternatives_spanish:
  - con piedras de granizo
  - con granizos
  - por medio de granizo
  lexicon: HALOT
  rationale: El hebreo usa un plural que designa granizo como instrumento de juicio. En español, «con granizo» es claro y natural; el plural puede explicarse en nota o mantenerse implícito sin perder el sentido.
- source_word: ואלגביש
  english_pob_choice: and ice-stones
  chosen_spanish: y piedras de hielo
  alternatives_spanish:
  - y piedras heladas
  - y granizo duro
  - y piedras de granizo
  lexicon: HALOT; rare storm-theophany term
  rationale: El término es raro y la POB inglesa lo distinguió de ברד para no fusionarlo con «hailstones». «Piedras de hielo» mantiene la imagen doble y su extrañeza poética sin forzar una equivalencia demasiado técnica.
theological_decisions:
- issue: Repetición del título divino
  english_pob_reading: Repeat 'God Most High' in both clauses
  chosen_spanish_reading: Repetir «Dios Altísimo» en ambas cláusulas
  alternative_spanish_readings:
  - usar solo «el Altísimo» en la segunda cláusula
  - variar la forma para evitar repetición
  rationale: El hebreo repite el mismo título; conservar esa repetición en español preserva el énfasis poético y la continuidad del agente divino que es invocado y que responde.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Relación entre el hebreo y el griego en la imagen del juicio por tormenta
  english_pob_reading: The Hebrew witness is primary here, but the Greek suggests a more expansive storm-theophany wording.
  chosen_spanish_reading: Dar prioridad al hebreo y dejar que la frase española conserve la doble imagen de granizo e “piedras de hielo”
  alternative_spanish_readings:
  - adoptar solo la expansión griega
  - fusionar ambos testimonios en una sola expresión
  rationale: La versión española debe seguir el testimonio hebreo principal sin borrar la tensión textual. Al mantener dos términos distintos, se respeta la imagen hebrea y también se deja espacio para la amplitud teofánica que sugiere el griego.
  doctrine_reference: 'POB textual method: primary witness with documented secondary witness note'
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo como base principal, en consonancia con el expediente de auditoría. La formulación española mantiene la repetición de «Dios Altísimo» y distingue entre «granizo» y «piedras de hielo» para no colapsar la duplicación léxica del hebreo, mientras la nota recoge la amplitud de la lectura griega.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el título divino porque aquí no aparece el Tetragrámaton como convención de máscara; el hebreo dice אל עליון.
  - «Invocó» se eligió para sostener el valor de súplica de קרא אל y armonizar con el uso bíblico en español.
  - La nota se ancla en la frase «por todos lados» porque ahí el griego aporta el matiz de rodeo/aflicción desde alrededor.
  - «Piedras de hielo» conserva la rareza del segundo término sin neutralizarlo en «granizo» o «hailstones».
