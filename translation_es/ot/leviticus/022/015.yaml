translation:
  language: es
  text: No profanarán las cosas santas de los hijos de Israel, que ellos elevan[a] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que ellos presentan» o «que ellos ofrecen» a Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַלְּלוּ
  english_pob_choice: profane
  chosen_spanish: profanarán
  alternatives_spanish:
  - contaminarán
  - deshonrarán
  - desecrarán
  lexicon: HALOT
  rationale: El piel de חלל en contexto cultual expresa tratar como común o impuro lo que es santo. «Profanar» preserva bien la oposición santo/profano sin perder el valor legal-cultual del mandato.
- source_word: קָדְשֵׁי
  english_pob_choice: holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas sagradas
  - las ofrendas santas
  - los objetos santos
  lexicon: HALOT
  rationale: «Cosas santas» conserva la amplitud del hebreo sin estrechar indebidamente a «ofrendas». En español suena natural y mantiene el referente cultual general del término.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma literal «los hijos de Israel» para respetar el etnónimo explícito del hebreo, siguiendo la política de no neutralizar sin razón de fuente.
- source_word: אֲשֶׁר יָרִימוּ
  english_pob_choice: which they lift up
  chosen_spanish: las cuales levantan
  alternatives_spanish:
  - las cuales presentan
  - las cuales ofrecen
  - las cuales alzan
  lexicon: HALOT
  rationale: «Levantan» conserva la imagen concreta del verbo הרים y permite en español la doble posibilidad de presentar/ofrecer sin cerrar prematuramente el sentido sacrificial.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se usa «Yahvé» según el estándar del proyecto para יהוה. «Para» expresa bien la dirección/destinación cultual del verbo, en armonía con el contexto sacrificial.
theological_decisions:
- issue: Tratamiento del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Conforme a la política del proyecto en español, se traduce con «Yahvé» en lugar de sustituirlo por un título velado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de קָדְשֵׁי
  english_pob_reading: holy things
  chosen_spanish_reading: cosas santas
  alternative_spanish_readings:
  - ofrendas santas
  - cosas sagradas
  rationale: El hebreo es amplio y no obliga a restringirlo solo a ofrendas. «Cosas santas» conserva el carácter consagrado y evita una interpretación más estrecha que el texto no exige.
  doctrine_reference: HALOT; Leviticus cultic context
- issue: Valor cultual de יָרִימוּ
  english_pob_reading: lift up
  chosen_spanish_reading: levantan
  alternative_spanish_readings:
  - presentan
  - ofrecen
  rationale: El verbo puede implicar presentar u অফrecer en contexto sacrificial, pero la imagen básica de «levantar» es la más cercana al hebreo y mantiene abierta la tensión léxica sin perder inteligibilidad.
  doctrine_reference: HALOT; sacrificial terminology
translation_notes:
  revision_awareness: Se siguió el audit trail inglés más reciente, que volvió de «holy offerings» a «holy things» para evitar una estrechez interpretativa. En español se reflejó esa amplitud con «cosas santas» y no con «ofrendas»; además, se conservó la imagen verbal de «levantar» con nota de alternativas sacrificiales.
  spanish_consistency_notes:
  - Se mantuvo el Nombre divino como «Yahvé», coherente con el estándar español del proyecto.
  - Se prefirió una construcción legal breve y sobria («No profanarán...») acorde con el tono legislativo de Levítico.
  - Se conservaron los «hijos de Israel» del hebreo, sin neutralización a «israelitas», porque el texto fuente es explícito y el registro cultual lo permite.
