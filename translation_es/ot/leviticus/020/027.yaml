translation:
  language: es
  text: Y un hombre o una mujer, si hay en ellos un médium[a] o un espiritista[b], ciertamente se les dará muerte; los apedrearán con piedras. Su sangre está sobre ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "un espíritu familiar" para אוֹב; el término puede denotar el espíritu asociado con la necromancia o, por extensión, el médium que lo consulta.
    reason: lexical_alternative
  - marker: b
    text: O "un adivino" para יִדְּעֹנִי; aquí se usa "espiritista" para evitar asociaciones modernas engañosas.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: "Su sangre está sobre ellos"; fórmula legal que indica que la responsabilidad de su muerte recae sobre ellos mismos.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ אֽוֹ אִשָּׁה
  english_pob_choice: And a man or a woman
  chosen_spanish: Y un hombre o una mujer
  alternatives_spanish:
  - Y un hombre o una mujer
  - Y un hombre o mujer
  - Ahora, un hombre o una mujer
  lexicon: HALOT
  rationale: La frase hebrea mantiene explícita la pareja hombre/mujer; el español conserva esa dualidad sin neutralizarla. Se usa "Y" para reflejar la conjunción inicial, con estilo natural en español bíblico contemporáneo.
- source_word: כִּי יִהְיֶה בָהֶם
  english_pob_choice: if there is in them
  chosen_spanish: si hay en ellos
  alternatives_spanish:
  - si hay entre ellos
  - si uno tiene
  lexicon: HALOT
  rationale: El hebreo usa una construcción singular con complemento pronominal plural; el español "si hay en ellos" preserva bien la idea de presencia o existencia de esa práctica en la persona, sin sobreexplicar.
- source_word: אוֹב
  english_pob_choice: a medium
  chosen_spanish: un médium
  alternatives_spanish:
  - un espíritu familiar
  - una pitonisa
  - un médium de espíritus
  lexicon: HALOT
  rationale: En este contexto el término apunta a la práctica de mediación con los muertos o espíritus, no simplemente a un "espíritu". "Médium" comunica de forma moderna y clara el sentido funcional, aunque conserva cierta tensión con el trasfondo antiguo.
- source_word: יִדְּעֹנִי
  english_pob_choice: a spiritist
  chosen_spanish: un espiritista
  alternatives_spanish:
  - un adivino
  - un hechicero
  - uno que consulta espíritus
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con אוֹב mediante un término igualmente breve. "Espiritista" evita la carga fantasiosa de "hechicero" o la ambigüedad de "adivino"; aun así, sigue siendo una aproximación contextual, no una definición técnica exhaustiva.
- source_word: מוֹת יוּמָתוּ
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente serán muertos
  alternatives_spanish:
  - serán condenados a muerte
  - deben ser ejecutados
  - morirán ciertamente
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la pena capital. "Ciertamente serán muertos" conserva la fuerza legal y el tono solemne del hebreo, evitando suavizar la sanción.
- source_word: בָּאֶבֶן יִרְגְּמ֥וּ אֹתָ֖ם
  english_pob_choice: they shall stone them with stones
  chosen_spanish: los apedrearán con piedras
  alternatives_spanish:
  - los lapidarán
  - los apedrearán
  - los apedrearán con piedras
  lexicon: HALOT
  rationale: El hebreo expresa el medio de ejecución por pedradas. "Apedrear" es el equivalente natural en español; se añade "con piedras" para conservar el instrumento explícito del original, como hace el inglés POB.
- source_word: דְּמֵיהֶם בָּם
  english_pob_choice: Their blood is on them
  chosen_spanish: Su sangre caerá sobre ellos
  alternatives_spanish:
  - Su sangre está sobre ellos
  - La culpa de su sangre recae sobre ellos
  - Su sangre pesa sobre ellos
  lexicon: HALOT
  rationale: La fórmula legal hebrea asigna responsabilidad por la propia muerte. "Caerá sobre ellos" comunica esa carga jurídica en un español bíblico claro, aunque mantiene la imagen figurada de la sangre como responsabilidad.
theological_decisions:
- issue: Cómo traducir los términos de prácticas ocultistas sin fijar una taxonomía más precisa que la del texto
  english_pob_reading: Translate אוֹב and יִדְּעֹנִי as 'medium' and 'spiritist'
  chosen_spanish_reading: Traducir אוֹב como "médium" e יִדְּעֹנִי como "espiritista"
  alternative_spanish_readings:
  - '"espíritu familiar" y "mago"'
  - '"médium de espíritus" y "necromante"'
  - '"pitonisa" y "adivino"'
  rationale: El texto condena una práctica prohibida vinculada con consulta de espíritus; no obliga a definir con precisión moderna cada categoría. "Médium" y "espiritista" comunican el sentido jurídico y religioso sin introducir imaginarios de fantasía ni archaismos innecesarios.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Conservar la formulación explícita de sexo/género del hebreo
  english_pob_reading: Keep 'a man or a woman' in the main text
  chosen_spanish_reading: Mantener "un hombre o una mujer"
  alternative_spanish_readings:
  - '"cualquiera"'
  - '"una persona"'
  rationale: El hebreo nombra explícitamente ambos sexos. La traducción conserva esa precisión, siguiendo la línea de fidelidad de la POB y evitando neutralizar un rasgo visible del texto fuente.
  doctrine_reference: Translation philosophy §4
- issue: Render the legal responsibility formula without diluting its judicial force
  english_pob_reading: Their blood is on them
  chosen_spanish_reading: Su sangre caerá sobre ellos
  alternative_spanish_readings:
  - '"Su sangre está sobre ellos"'
  - '"La culpa de su sangre recae sobre ellos"'
  - '"Ellos son responsables de su sangre"'
  rationale: La expresión hebrea es una fórmula legal de culpabilidad y responsabilidad por la propia muerte. En español, "caerá sobre ellos" mantiene la imagen de carga/judicio y es comprensible para lectores modernos, sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §§2, 7
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y el estado de revisión más reciente, que indica que no hubo cambios necesarios. La versión española procura mantener la misma lectura legal y lexical, adaptando los términos a un español bíblico claro sin perder la tensión del original hebreo.
  spanish_consistency_notes:
  - Se conserva la pareja explícita "hombre o mujer" en coherencia con la política de precisión de género del proyecto.
  - '"Médium" y "espiritista" siguen el contraste funcional de los términos hebreos, sin convertirlos en equivalencias doctrinales fijas.'
  - La fórmula final se traduce como responsabilidad legal sobre la propia muerte, no como una observación moral genérica.
  - Se evita el uso de "SEÑOR" porque este verso no contiene el tetragrámaton ni una cita directa del nombre divino.
