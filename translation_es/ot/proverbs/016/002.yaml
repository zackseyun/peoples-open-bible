translation:
  language: es
  text: Todos los caminos de un hombre son puros a sus propios ojos[a], pero Yahvé pesa los espíritus[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todos los caminos de un hombre son limpios a sus propios ojos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero Yahvé examina los espíritus» o «pero Yahvé evalúa los motivos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada
  lexicon: HALOT
  rationale: El cuantificador abarca la totalidad de lo que sigue; «Todos» es natural en español con el sintagma plural «los caminos». No se introduce una restricción que el hebreo no tiene.
- source_word: דַּרְכֵי אִישׁ
  english_pob_choice: a man's ways
  chosen_spanish: los caminos de un hombre
  alternatives_spanish:
  - un hombre sus caminos
  - los caminos de una persona
  lexicon: HALOT
  rationale: דֶּרֶךְ en literatura sapiencial suele significar conducta, curso de vida o patrones de acción. En español, «los caminos de un hombre» conserva esa amplitud sin reducirlo a trayectos literales. Se mantiene el singular masculino representativo del hebreo.
- source_word: זַךְ
  english_pob_choice: pure
  chosen_spanish: puros
  alternatives_spanish:
  - limpios
  - inocentes
  lexicon: HALOT
  rationale: «Puros» reproduce mejor el valor moral de זַךְ en este contexto. «Limpios» es posible, pero suena menos natural en español moral; «inocentes» sería demasiado jurídico y fuerte.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: en sus propios ojos
  alternatives_spanish:
  - a sus propios ojos
  - según su propia opinión
  lexicon: HALOT
  rationale: El modismo expresa evaluación subjetiva. «En sus propios ojos» conserva la imagen hebrea y el sentido reflexivo; «a sus propios ojos» también sería válido, pero la forma elegida suena más directa y bíblicamente reconocible.
- source_word: וְתֹכֵן
  english_pob_choice: weighs
  chosen_spanish: pesa
  alternatives_spanish:
  - examina
  - evalúa
  - mide
  lexicon: HALOT
  rationale: תכן puede expresar medir o pesar. «Pesa» mantiene la metáfora de balanza y el contraste sapiencial con la autoevaluación humana, sin diluirla en un verbo más interpretativo.
- source_word: רוּחוֹת
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - las disposiciones interiores
  - los motivos
  lexicon: HALOT
  rationale: En este proverbio, רוּחוֹת apunta a los espíritus o disposiciones internas de las personas. «Los espíritus» preserva la imagen del hebreo; «los motivos» explicita la implicación, pero interpreta más de lo que exige el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio en español como «Yahvé», conforme al principio del proyecto. No se sustituye por un título genérico, para preservar la transparencia del nombre revelado.
theological_decisions:
- issue: Sentido antropológico de רוּחוֹת
  english_pob_reading: human inner spirits/dispositions that the LORD assesses
  chosen_spanish_reading: los espíritus o disposiciones internas que Yahvé evalúa
  alternative_spanish_readings:
  - los motivos
  - las intenciones
  rationale: El proverbio contrapone la autopercepción humana con la evaluación divina. «Los espíritus» conserva la forma hebrea y deja abierta la amplitud antropológica; las opciones «motivos» o «intenciones» aclaran el sentido, pero estrechan el alcance del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; preservar la tensión léxica donde el texto la mantiene.
- issue: Masculino representativo de אִישׁ
  english_pob_reading: a man's ways
  chosen_spanish_reading: los caminos de un hombre
  alternative_spanish_readings:
  - los caminos de una persona
  - los caminos humanos
  rationale: El hebreo usa un singular masculino genérico. Se conserva en español para no aplanar la forma del original con lenguaje neutral donde no es necesario, aunque el proverbio siga aplicando universalmente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral).
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se registraron revisiones aplicadas y el acuerdo entre controles fue alto. Se mantiene la equivalencia óptima con la imagen de pesaje y la referencia transparente al nombre divino.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se preservó el paralelismo sapiencial entre la autoevaluación humana y la evaluación divina.
  - Se mantuvo el singular masculino representativo de אִישׁ sin neutralización innecesaria.
  - «Espíritus» conserva la ambigüedad productiva del hebreo entre interioridad, disposición y motivo.
