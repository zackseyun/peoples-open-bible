translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Di a Aarón: “Toma tu vara y extiende tu mano sobre las aguas de Egipto —sobre sus ríos, sobre sus canales, sobre sus estanques y sobre todo depósito de sus aguas— para que se conviertan en sangre. Y habrá sangre en toda la tierra de Egipto, incluso en vasos de madera y de piedra[a]”».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y en la madera y en la piedra», probablemente refiriéndose a vasos o recipientes de madera y de piedra.
    reason: lexical_alternative
  - marker: b
    text: O, «incluso en vasos de madera y de piedra».
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: conservar el nombre divino en transliteración, no sustituirlo por un título. ''Yahvé'' es la forma establecida para el texto español de la POB.'
- source_word: אֶל מֹשֶׁה ... אֱמֹר אֶל אַהֲרֹן
  english_pob_choice: Then Yahweh said to Moses, “Say to Aaron...
  chosen_spanish: 'Entonces Yahvé dijo a Moisés: «Di a Aarón...'
  alternatives_spanish:
  - 'Luego Yahvé habló a Moisés: «Habla a Aarón...'
  - 'Entonces Yahvé le dijo a Moisés: «Dile a Aarón...'
  lexicon: HALOT
  rationale: '''Dijo'' y ''di'' reproducen con naturalidad la cadena narrativa y el mandato indirecto. ''Hablar'' también sería posible, pero ''decir'' refleja mejor el hebreo אֱמֹר y la forma de introducción de discurso.'
- source_word: מַטְּךָ
  english_pob_choice: your staff
  chosen_spanish: tu vara
  alternatives_spanish:
  - tu bastón
  - tu bastón de mando
  lexicon: HALOT
  rationale: '''מַטֶּה'' puede ser ''vara'' o ''bastón''. Aquí ''vara'' mantiene el objeto concreto y la resonancia narrativa de Éxodo sin añadir matiz de mando que el contexto no exige.'
- source_word: וּנְטֵה יָדְךָ
  english_pob_choice: stretch out your hand
  chosen_spanish: extiende tu mano
  alternatives_spanish:
  - alarga tu mano
  - levanta tu mano
  lexicon: HALOT
  rationale: La locución se vierte de forma idiomática en español con 'extiende tu mano', que conserva el gesto simbólico de juicio y acción divina.
- source_word: מֵימֵי מִצְרַיִם
  english_pob_choice: the waters of Egypt
  chosen_spanish: las aguas de Egipto
  alternatives_spanish:
  - las aguas egipcias
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de forma directa y clara. 'Las aguas de Egipto' preserva la amplitud del referente y prepara la lista de subdivisiones.
- source_word: נַהֲרֹתָם
  english_pob_choice: their rivers
  chosen_spanish: sus ríos
  alternatives_spanish:
  - sus corrientes
  - sus arroyos
  lexicon: HALOT
  rationale: '''Ríos'' es el equivalente natural para נָהָר en este inventario de aguas. ''Corrientes'' sería demasiado general y menos preciso.'
- source_word: יְאֹרֵיהֶם
  english_pob_choice: their canals
  chosen_spanish: sus canales
  alternatives_spanish:
  - sus acequias
  - sus canales del Nilo
  lexicon: HALOT
  rationale: El término egipcio יְאֹר se traduce aquí como 'canales' para mantener el alcance general que refleja la revisión inglesa más reciente. Se evita especificar 'del Nilo' porque el hebreo no lo añade en esta línea.
- source_word: אַגְמֵיהֶם
  english_pob_choice: their ponds
  chosen_spanish: sus estanques
  alternatives_spanish:
  - sus pantanos
  - sus lagunas
  lexicon: HALOT
  rationale: '''Estanques'' comunica bien el sentido de aguas contenidas y es un equivalente digno en español. ''Lagunas'' o ''pantanos'' podrían inclinar el matiz más de lo necesario.'
- source_word: כָּל מִקְוֵה מֵימֵיהֶם
  english_pob_choice: every pool of their waters
  chosen_spanish: toda acumulación de sus aguas
  alternatives_spanish:
  - todo depósito de sus aguas
  - toda reserva de sus aguas
  lexicon: HALOT
  rationale: מִקְוֶה designa agua reunida o acumulada. 'Acumulación' conserva esa idea sin forzar una clase técnica de depósito; evita también reducir el alcance a un solo tipo de estanque.
- source_word: וְיִהְיוּ דָם
  english_pob_choice: that they may become blood
  chosen_spanish: para que se conviertan en sangre
  alternatives_spanish:
  - para que lleguen a ser sangre
  - y se volverán sangre
  lexicon: HALOT
  rationale: La subordinación final expresa propósito/resultando del mandato. 'Se conviertan en sangre' es natural y fiel al valor resultativo del hebreo.
- source_word: וְהָיָה דָם בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: And there will be blood throughout all the land of Egypt
  chosen_spanish: Y habrá sangre en toda la tierra de Egipto
  alternatives_spanish:
  - Y habrá sangre por toda la tierra de Egipto
  - Y la sangre estará en toda la tierra de Egipto
  lexicon: HALOT
  rationale: Se conserva el valor distributivo de בְּכָל con 'en toda'. 'Habrá sangre' corresponde bien al estado resultante descrito por el hebreo.
- source_word: וּבָעֵצִים וּבָאֲבָנִים
  english_pob_choice: even in wooden and stone vessels
  chosen_spanish: incluso en vasos de madera y de piedra
  alternatives_spanish:
  - incluso en recipientes de madera y de piedra
  - y aun en la madera y en la piedra
  lexicon: HALOT
  rationale: 'El hebreo es elíptico y probablemente metonímico: materiales por recipientes hechos de esos materiales. ''Vasos de madera y de piedra'' conserva la literalidad y la interpretación contextual sin introducir más explicaciones en el texto principal.'
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se mantiene la política del proyecto: el Tetragrama se traslada como nombre propio, no se oculta tras una sustitución litúrgica. Esto preserva la referencia personal e histórica al Dios de Israel.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretación de וּבָעֵצִים וּבָאֲבָנִים
  english_pob_reading: metonymy for wooden and stone containers holding water
  chosen_spanish_reading: metonimia de recipientes hechos de madera y de piedra
  alternative_spanish_readings:
  - literalmente, madera y piedra
  - vasos/recipientes de madera y de piedra
  rationale: En el contexto de la plaga sobre las aguas, leer 'madera' y 'piedra' como materiales de recipientes evita que el texto sugiera que la sustancia madera o piedra misma se convirtió en sangre. La formulación española conserva esa tensión interpretativa mediante 'vasos de madera y de piedra'.
  doctrine_reference: 'DOCTRINE.md: Lexical ellipsis and metonymy in Hebrew narrative'
- issue: Alcance de מֵימֵי מִצְרַיִם y la lista de aguas
  english_pob_reading: the waters of Egypt ... rivers ... canals ... ponds ... every pool of their waters
  chosen_spanish_reading: las aguas de Egipto ... sus ríos ... sus canales ... sus estanques ... toda acumulación de sus aguas
  alternative_spanish_readings:
  - aguas egipcias ... corrientes ... acequias ... lagunas ... depósitos de agua
  rationale: La serie enumera categorías amplias de agua natural y almacenada. El español sigue esa progresión sin sobreactuar la especificación y mantiene la amplitud total del juicio.
  doctrine_reference: 'DOCTRINE.md: Scope and distributive plural phrases'
translation_notes:
  revision_awareness: La redacción española sigue la versión inglesa más reciente, especialmente en la elección de 'canales', 'toda acumulación de sus aguas' y 'vasos de madera y de piedra'. También conserva la lectura interpretativa del cierre como metonimia, pero la expresa en español de manera más natural y auditable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - '''vara'' se emplea para מַטֶּה por consistencia narrativa en Éxodo.'
  - '''espiritual'' no aparece; no hay términos de רוח en este versículo.'
  - La puntuación con comillas latinas y rayas mantiene claridad para discurso directo anidado.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponde.
