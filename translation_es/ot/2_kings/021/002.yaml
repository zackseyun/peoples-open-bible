translation:
  language: es
  text: Hizo lo malo ante los ojos de Yahvé, conforme a las abominaciones de las naciones que Yahvé había expulsado de delante de los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''los hijos de Israel''; muchas versiones lo vierten más idiomáticamente como ''los israelitas''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Y realizó
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa. En español, el verbo inicial sin conjunción suena natural y conserva la secuencia narrativa del hebreo sin sobrecargarla con una coordinación innecesaria.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo evil
  lexicon: HALOT
  rationale: 'La expresión לעשות הרע funciona como fórmula evaluativa: ‘hacer lo malo / lo que es malo’. ‘Lo malo’ mantiene esa evaluación sin volverla demasiado abstracta ni perder la fuerza moral del hebreo.'
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a la vista de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: La metáfora de evaluación divina se expresa con un giro natural en español. ‘Ante los ojos de Yahvé’ conserva el valor idiomático de ‘in the sight of Yahweh’ y mantiene la imagen de percepción y juicio divinos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma de uso editorial del proyecto en español. ‘Yahvé’ evita la sustitución por un título y conserva la referencia personal del nombre revelado.
- source_word: כְּתוֹעֲבֹת
  english_pob_choice: according to the abominations
  chosen_spanish: conforme a las abominaciones
  alternatives_spanish:
  - como las abominaciones
  - según las prácticas detestables
  lexicon: HALOT
  rationale: כְ aquí expresa conformidad o patrón. ‘Conforme a’ reproduce bien ese matiz y ‘abominaciones’ conserva la carga cultual y moral fuerte del término hebreo.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico, גוים designa a los pueblos no israelitas. ‘Las naciones’ es claro, fiel y evita interpretaciones doctrinalmente cargadas que ‘gentiles’ podría introducir en español.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: que
  alternatives_spanish:
  - a quienes
  - los cuales
  lexicon: HALOT
  rationale: En español, el relativo ‘que’ funciona naturalmente con antecedente personal o colectivo en una cláusula restrictiva. Evita forzar una forma más pesada donde el sentido ya es claro.
- source_word: הוֹרִישׁ
  english_pob_choice: had driven out
  chosen_spanish: había expulsado
  alternatives_spanish:
  - había desalojado
  - había echado
  lexicon: HALOT
  rationale: El hiphil de ירש aquí tiene el sentido de desposeer/expulsar. ‘Había expulsado’ comunica bien la acción de sacar a esos pueblos de la tierra y resulta natural en español, sin diluir la fuerza del verbo.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - ante
  lexicon: HALOT
  rationale: La locución hebrea indica alejamiento ‘de delante de’ una presencia. En español, ‘de delante de’ preserva el matiz espacial/relacional con suficiente naturalidad.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filiar y masculina del hebreo. ‘Los hijos de Israel’ sigue de cerca el original y mantiene la forma que el texto usa, en lugar de neutralizarla.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El versículo emplea directamente el Tetragrámaton. Se traduce con el nombre propio divino, no con un sustituto titular, para preservar la transparencia del texto y la continuidad con la política editorial del proyecto.
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH → Yahvé'
- issue: Expresión de juicio moral en בְּעֵינֵי יְהוָה
  english_pob_reading: in the sight of Yahweh
  chosen_spanish_reading: ante los ojos de Yahvé
  alternative_spanish_readings:
  - a la vista de Yahvé
  - en la presencia de Yahvé
  rationale: La frase no describe visión física, sino evaluación moral y judicial. ‘Ante los ojos de Yahvé’ mantiene esa metáfora y evita reducirla a una mera observación externa.
  doctrine_reference: 'DOCTRINE.md: idiom and metaphor preservation'
- issue: Construcción masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la formulación masculina explícita del hebreo porque es parte del texto fuente y el proyecto prioriza la precisión gramatical cuando la forma original es significativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del paso de revisión más reciente: no introduce cambios sustantivos respecto del análisis base, y conserva las decisiones clave sobre el nombre divino, la fórmula evaluativa y la expresión filiar de ישראל.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - Se conserva ‘los hijos de Israel’ por fidelidad al hebreo, con nota para la alternativa idiomática.
  - ‘Ante los ojos de’ mantiene la metáfora bíblica sin volverla literalista en exceso.
  - ‘Conforme a’ refleja mejor el valor comparativo/conforme de כְ que un simple ‘como’ en este contexto.
