translation:
  language: es
  text: 'Y esta será la señal para ti que vendrá sobre tus dos hijos[a], Jofní y Finees: ambos morirán en un día[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que acontecerá a tus dos hijos».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en un día»; es decir, ambos morirán el mismo día.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el signo
  - la prueba
  lexicon: HALOT
  rationale: אוֹת puede designar una señal confirmatoria o un signo dado por Dios. En español, "señal" comunica bien ese valor de indicio confirmatorio sin sonar técnico ni forzado.
- source_word: אֲשֶׁר יָבֹא אֶל
  english_pob_choice: that will come upon
  chosen_spanish: que vendrá sobre
  alternatives_spanish:
  - que vendrá a
  - que acontecerá a
  lexicon: HALOT
  rationale: La imagen hebrea expresa un evento/jucio que recae sobre alguien. "Vendrá sobre" conserva esa fuerza de irrupción y es natural en español bíblico contemporáneo.
- source_word: שְׁנֵי בָנֶיךָ
  english_pob_choice: your two sons
  chosen_spanish: tus dos hijos
  alternatives_spanish:
  - ambos tus hijos
  - tus dos hijos
  lexicon: HALOT
  rationale: '"בָנִים" puede ser "hijos" en español; aquí el vínculo filial es claro y el término resulta idiomático. Mantiene la relación directa con Elí sin añadir interpretación.'
- source_word: אֶל חָפְנִי וּפִינְחָס
  english_pob_choice: Hophni and Phinehas
  chosen_spanish: Jofní y Finees
  alternatives_spanish:
  - Hofni y Finees
  - Jofni y Pinejás
  lexicon: transliteración bíblica estándar en español
  rationale: Se translitera con formas reconocibles en español bíblico. No se conserva el hebreo ni la forma inglesa para respetar la lectura en español.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: on one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - el mismo día
  lexicon: HALOT
  rationale: La frase hebrea es temporal y puede entenderse como coincidencia de tiempo. "En un solo día" conserva la literalidad y, a la vez, expresa con claridad que ambos hechos ocurren dentro del mismo día.
- source_word: יָמ֥וּתוּ שְׁנֵיהֶם
  english_pob_choice: both of them will die
  chosen_spanish: ambos morirán
  alternatives_spanish:
  - los dos morirán
  - ambos de ellos morirán
  lexicon: HALOT
  rationale: El hebreo enfatiza que los dos morirán. En español, "ambos morirán" preserva la totalidad sin redundancia pesada.
theological_decisions:
- issue: Naturaleza de la señal profética
  english_pob_reading: A confirming sign of the announced judgment on Eli's house
  chosen_spanish_reading: Una señal confirmatoria del juicio anunciado contra la casa de Elí
  alternative_spanish_readings:
  - Un simple presagio de muerte
  - Una prueba neutral sin función confirmatoria
  rationale: El contexto inmediato presenta la muerte de los hijos como validación de la palabra profética previa. "Señal" mantiene la función confirmatoria sin reducirla a un mero presagio.
  doctrine_reference: Profecía confirmada por cumplimiento; juicio divino en 1 Samuel 2:27-36
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la lectura auditada en inglés: la frase de la señal se mantiene como confirmatoria, el movimiento verbal se expresa como un evento que recae sobre los hijos, y la nota temporal conserva la literalidad de «on one day». No se detectaron revisiones posteriores que requirieran ajustes.'
  spanish_consistency_notes:
  - Se usa «señal» para הָאוֹת, en continuidad con el valor confirmatorio del contexto.
  - 'Se transliteran los nombres propios con formas españolas comunes: Jofní y Finees.'
  - Se conserva la tensión entre literalidad y naturalidad en «en un solo día», con nota explicativa.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
