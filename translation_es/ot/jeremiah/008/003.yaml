revisions:
- from: Y muerte será escogida antes que vida por todo el remanente que queda de esta familia mala[a], en todos los lugares donde el remanente queda, donde yo los he expulsado —declara Yahvé de los ejércitos.
  to: Y la muerte será escogida en vez de la vida por todo el remanente que quede de esta familia perversa[a], en todos los lugares donde el remanente quede, adonde yo los he expulsado —declara Yahvé de los ejércitos.
  rationale: 'Se hicieron reparaciones menores para mejorar fidelidad y legibilidad: «en vez de la vida» expresa de modo natural la preferencia comparativa; «familia perversa» comunica mejor el tono de juicio de רָעָה; y «adonde yo los he expulsado» clarifica el sentido locativo del exilio. Se conservan «remanente», «Yahvé» y la repetición de «quede» para respetar el énfasis del hebreo y el rastro de auditoría del POB.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:06:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: la muerte preferida sobre la vida, el remanente que queda, la dispersión por lugares de exilio y la fórmula profética final con «Yahvé». También conserva adecuadamente «remanente». Sin embargo, hay varios puntos donde la fidelidad y la naturalidad pueden mejorar: «antes que vida» suena incompleto en español; «familia mala» es demasiado coloquial para הַמִּשְׁפָּחָה הָרָעָה הַזֹּאת; y «expulsado» debilita el matiz de destierro/dispersión de הִדַּחְתִּים. La repetición de «queda» se preserva, pero conviene ajustar la redacción para que sea más legible sin perder el eco del hebreo.'
  spanish_quality_summary: 'El texto es mayormente comprensible, pero tiene giros poco naturales o poco dignos para registro bíblico: «antes que vida», «familia mala» y en menor medida «queda» repetido de forma rígida. Una revisión leve puede hacer el versículo más claro y eclesialmente legible sin apartarse del original.'
  glossary_alignment: 'Alineación general buena con el glosario del proyecto: יְהוָה → «Yahvé», שְׁאֵרִית → «remanente». No hay conflictos doctrinales serios. El principal ajuste léxico recomendado es usar una expresión más natural para la comparación («en vez de la vida») y una formulación más adecuada para juicio/exilio («adonde yo los he expulsado» o mejor «adonde yo los he arrojado/expulsado»); además, «familia perversa» o «familia malvada» comunica mejor el tono de רָעָה en este contexto profético que «familia mala».'
  issues:
  - severity: medium
    issue: «antes que vida» suena elíptico e impropio en español bíblico actual
    rationale: 'Aunque intenta reflejar la comparación de מִן, en español natural la frase pide artículo: «antes que la vida», o mejor «en vez de la vida». Sin ajuste, la lectura resulta áspera innecesariamente.'
  - severity: medium
    issue: «familia mala» es demasiado coloquial para un oráculo de juicio
    rationale: הָרָעָה aquí describe una comunidad malvada/perversa bajo juicio divino. «Mala» no es imposible, pero en español suena débil e infantil. «Malvada» o «perversa» mantiene mejor el tono profético.
  - severity: medium
    issue: «los he expulsado» no expresa del todo el sentido de dispersión/destierro
    rationale: הִדַּחְתִּים en Hifil tiene matiz de arrojar lejos, dispersar, desterrar. «Expulsado» puede funcionar, pero «adonde yo los he expulsado» mejora la relación locativa; idealmente una opción como «adonde yo los he arrojado» o «adonde yo los he dispersado» preserva mejor el contexto de exilio.
  - severity: low
    issue: La nota al pie usa «lugares restantes» pero el texto principal no refleja literalmente esa construcción
    rationale: La nota es aceptable, pero conviene mantenerla como explicación de la literalidad hebrea. No es un error grave; solo debe quedar claro que se trata de una nota de alternativa/literalidad, no de la traducción principal.
  revised_spanish_text: Y la muerte será escogida en vez de la vida por todo el remanente que quede de esta familia perversa[a], en todos los lugares donde el remanente quede, adonde yo los he expulsado —declara Yahvé de los ejércitos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «en todos los lugares restantes donde los he expulsado allí». La formulación subraya a los sobrevivientes dispersos en cada lugar de exilio.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar fidelidad y legibilidad: «en vez de la vida» expresa de modo natural la preferencia comparativa; «familia perversa» comunica mejor el tono de juicio de רָעָה; y «adonde yo los he expulsado» clarifica el sentido locativo del exilio. Se conservan «remanente», «Yahvé» y la repetición de «quede» para respetar el énfasis del hebreo y el rastro de auditoría del POB.'
