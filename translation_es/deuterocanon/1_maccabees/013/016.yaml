translation:
  language: es
  text: Y ahora envía cien talentos de plata y a dos de sus hijos como rehenes, para que, cuando sea liberado, no se rebele de nosotros[a]; y lo liberaremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se aparte de nosotros». El griego expresa separación o defección de lealtad, no necesariamente ataque directo contra ellos.
    reason: Evitar que «se rebele de nosotros» suene extraño en español, mientras se preserva en nota el sentido de ἀφʼ ἡμῶν como alejamiento/defección.
lexical_decisions:
- source_word: ἀπόστειλον
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - remite
  lexicon: LSJ
  rationale: El imperativo aoristo pide una orden directa. «Envía» es natural, claro y conserva el sentido de mandar algo a otra parte sin añadir matices ajenos.
- source_word: ἀργυρίου ἑκατὸν τάλαντα
  english_pob_choice: a hundred talents of silver
  chosen_spanish: cien talentos de plata
  alternatives_spanish:
  - cien talentos de dinero
  - cien talentos en plata
  lexicon: LSJ
  rationale: «Talentos» conserva la medida histórica; «de plata» refleja bien el genitivo de contenido/material. «Plata» es el equivalente español más natural para el metal monetario.
- source_word: ὅμηρα
  english_pob_choice: hostages
  chosen_spanish: rehenes
  alternatives_spanish:
  - hostajes
  - prendas
  lexicon: LSJ
  rationale: En español contemporáneo, «rehenes» comunica de forma precisa y comprensible la función política de personas retenidas como garantía. «Hostajes» es menos natural y «prendas» sería demasiado ambiguo.
- source_word: ἀφεθείς
  english_pob_choice: when he is released
  chosen_spanish: cuando sea puesto en libertad
  alternatives_spanish:
  - cuando sea liberado
  - cuando lo suelten
  lexicon: LSJ
  rationale: La forma participial pasiva exige una construcción pasiva en español. «Puesto en libertad» mantiene la pasividad y enlaza con «lo pondremos en libertad» al final.
- source_word: ἀποστατήσῃ
  english_pob_choice: may not revolt
  chosen_spanish: no se rebele
  alternatives_spanish:
  - no se subleve
  - no se desvíe
  lexicon: LSJ
  rationale: El verbo expresa deserción o rebelión política. «Rebelarse» conserva ese valor y funciona bien con el complemento «contra nosotros».
- source_word: ἀφʼ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - de nosotros
  - se aparte de nosotros
  lexicon: LSJ
  rationale: Aunque el griego marca separación («de» / «desde»), en español el sentido político de ruptura de lealtad se expresa con naturalidad mediante «contra nosotros». Mantiene la tensión semántica de alejamiento y oposición.
- source_word: ἀφήσομεν αὐτόν
  english_pob_choice: we will release him
  chosen_spanish: lo pondremos en libertad
  alternatives_spanish:
  - lo liberaremos
  - lo dejaremos ir
  lexicon: LSJ
  rationale: «Poner en libertad» reproduce bien el campo semántico de liberar/releasar y hace eco de la pasiva anterior. Se evita «dejar ir» por ser más coloquial y menos preciso en este contexto.
theological_decisions:
- issue: Identidad del referente pronominal
  english_pob_reading: Translate generically as 'him' without identifying the person by name in the verse itself.
  chosen_spanish_reading: Se mantiene el pronombre «lo/su» sin nombrar al referentе en el texto del versículo.
  alternative_spanish_readings:
  - nombrar explícitamente al personaje por el contexto
  rationale: El griego usa pronombres y no introduce el nombre en este versículo. Nombrarlo en la traducción excedería el alcance del texto fuente y convertiría una inferencia contextual en parte del versículo.
  doctrine_reference: Primacía del texto original y restricción a lo explícitamente atestiguado
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés auditado, conservando la estructura condicional temporal («cuando sea puesto en libertad») y el paralelismo entre la liberación inicial y la promesa final de liberar al rehén.
  spanish_consistency_notes:
  - Se usa «plata» en lugar de «silver» literal, por ser el metal monetario natural en español.
  - Se mantiene «rehenes» para ὅμηρα por precisión política y claridad moderna.
  - Se preserva la repetición de la raíz de liberar con «puesto en libertad» / «poner en libertad» para reflejar el vínculo verbal del griego y del inglés auditado.
  - No se añade nota de pie porque no hay variante textual ni alternativa interpretativa que deba quedar marcada en el versículo.
