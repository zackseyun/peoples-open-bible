translation:
  language: es
  text: Pero a los hijos de sus concubinas[b], Abraham les dio regalos, y mientras él todavía vivía los envió lejos de su hijo Isaac, hacia el oriente, a la tierra del oriente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «a la región oriental».
    reason: lexical_alternative
  - marker: b
    text: 'O: «los hijos de las concubinas de Abraham».'
    reason: previous_rendering
lexical_decisions:
- source_word: וְלִבְנֵי
  english_pob_choice: But to the sons of
  chosen_spanish: Pero a los hijos de
  alternatives_spanish:
  - Y a los hijos de
  - Asímismo a los hijos de
  lexicon: HALOT
  rationale: El prefijo conjuntivo con la preposición introduce contraste con el versículo anterior, donde Isaac queda como heredero. «Pero a» conserva ese matiz adversativo y el valor dativo del hebreo sin volverlo rígido.
- source_word: הַפִּילַגְשִׁים
  english_pob_choice: concubines
  chosen_spanish: concubinas
  alternatives_spanish:
  - esposas secundarias
  lexicon: HALOT
  rationale: «Concubinas» es el equivalente directo y sobrio del término hebreo para mujeres con estatus conyugal reconocido pero inferior. Mantiene la precisión social y legal.
- source_word: נָתַן ... מַתָּנֹת
  english_pob_choice: gave gifts
  chosen_spanish: les dio regalos
  alternatives_spanish:
  - les dio dones
  - les concedió regalos
  lexicon: HALOT
  rationale: El par verbal-sustantivo se rinde de manera natural en español con «dio regalos». «Regalos» expresa adecuadamente מַתָּנֹת en este contexto de separación patrimonial.
- source_word: וַיְשַׁלְּחֵם
  english_pob_choice: he sent them away
  chosen_spanish: los envió lejos
  alternatives_spanish:
  - los despidió
  - los mandó lejos
  lexicon: HALOT
  rationale: El verbo implica envío con separación. «Los envió lejos» conserva el movimiento y la separación respecto de Isaac; «despidió» podría sonar demasiado formal o atenuar el gesto de apartarlos.
- source_word: מֵעַל יִצְחָק בְּנוֹ
  english_pob_choice: from his son Isaac
  chosen_spanish: de su hijo Isaac
  alternatives_spanish:
  - de la presencia de su hijo Isaac
  - lejos de su hijo Isaac
  lexicon: HALOT
  rationale: La preposición puede expresar separación «de» o «de encima/de la presencia de». En español, «de su hijo Isaac» es natural y suficiente, porque la idea de apartamiento ya está en «los envió lejos».
- source_word: בְּעוֹדֶנּוּ חַי
  english_pob_choice: while he was still alive
  chosen_spanish: mientras él todavía vivía
  alternatives_spanish:
  - mientras aún vivía
  - cuando todavía estaba vivo
  lexicon: HALOT
  rationale: La expresión temporal señala que Abraham actuó antes de morir. «Todavía vivía» preserva el énfasis de continuidad vital y suena fluido en español bíblico contemporáneo.
- source_word: קֵדְמָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia el este. «Hacia el oriente» mantiene un registro bíblico claro y evita perder el matiz de dirección.
- source_word: אֶל אֶרֶץ קֶדֶם
  english_pob_choice: to the land of the east
  chosen_spanish: a la tierra del oriente
  alternatives_spanish:
  - a la tierra de oriente
  - al país del oriente
  lexicon: HALOT
  rationale: El hebreo designa una región oriental de manera idiomática. «Tierra del oriente» conserva la imagen geográfica y el paralelismo con «hacia el oriente».
theological_decisions:
- issue: El alcance de la separación de los hijos de las concubinas respecto de Isaac, heredero principal.
  english_pob_reading: Abraham gave gifts and sent them away from his son Isaac, indicating separation while he was still alive.
  chosen_spanish_reading: Abraham les dio regalos y los envió lejos de su hijo Isaac, indicando separación antes de su muerte.
  alternative_spanish_readings:
  - Abraham les dio regalos y los despidió de su hijo Isaac, antes de morir.
  - Abraham les dio regalos y los apartó de su hijo Isaac, mientras aún vivía.
  rationale: 'La formulación mantiene la tensión narrativa y jurídica: Isaac queda distinguido como hijo-here­dero, mientras los otros hijos reciben provisión y son apartados. No se suaviza el acto de separación, porque el hebreo lo marca con claridad.'
  doctrine_reference: Génesis 21; Génesis 25:5-6; Hebreos 11:17-18
translation_notes:
  revision_awareness: La traducción inglesa auditada fue ajustada una vez para suavizar la posesión doble («the sons of Abraham’s concubines» > «the sons of his concubines»), sin alterar el sentido. La presente versión española sigue esa lectura consolidada y conserva el contraste narrativo del texto hebreo.
  spanish_consistency_notes:
  - Se usa «concubinas» de forma consistente con el valor lexical del hebreo y con la terminología POB.
  - Se evita «SEÑOR» o perífrasis equivalentes, ya que no aparece el nombre divino en este versículo.
  - «Oriente» y «tierra del oriente» mantienen la duplicación direccional del hebreo sin forzar una localización moderna específica.
  - «Regalos» funciona como equivalente directo de מַתָּנֹת; no se introduce lenguaje de herencia que el verso no explicita.
