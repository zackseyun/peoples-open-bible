translation:
  language: es
  text: 'Y le dijo: «Así dice Yahvé: Por cuanto has dejado escapar de tu mano al hombre[a] que yo había destinado a destrucción, tu vida será por su vida, y tu pueblo por su pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hombre bajo mi anatema». El hebreo usa lenguaje de חֵרֶם para alguien entregado al juicio divino y destinado a destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como nombre propio, en continuidad con el criterio del proyecto en español. ‘Yahvé’ comunica el tetragrámaton sin ocultarlo mediante una convención litúrgica.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Por cuanto
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce con naturalidad la base causal de la sentencia en un registro bíblico claro y digno.
- source_word: שִׁלַּחְתָּ
  english_pob_choice: you have let the man... escape from your hand
  chosen_spanish: has dejado escapar de tu mano
  alternatives_spanish:
  - has soltado de tu mano
  - has dejado ir de tu mano
  lexicon: HALOT
  rationale: El verbo aquí expresa liberar o dejar escapar a un cautivo; ‘dejar escapar’ refleja bien el contexto militar y la frase idiomática ‘de tu mano’.
- source_word: אִישׁ חֶרְמִי
  english_pob_choice: the man devoted to destruction
  chosen_spanish: el hombre que había sido consagrado a destrucción
  alternatives_spanish:
  - el hombre dedicado a destrucción
  - el hombre bajo mi anatema
  - el hombre destinado a destrucción
  lexicon: HALOT
  rationale: ‘Consagrado a destrucción’ conserva la fuerza de חֵרֶם como una consagración bajo juicio divino. Se evita ‘anatema’ por su opacidad en español común, y se mantiene la relación posesiva de 1cs con una cláusula relativa natural.
- source_word: מִיָּד
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - fuera de tu mano
  - de tu poder
  lexicon: HALOT
  rationale: Se preserva el hebraísmo de control/custodia con una construcción natural en español.
- source_word: וְהָיְתָה נַפְשְׁךָ תַּחַת נַפְשׁוֹ
  english_pob_choice: your life shall be for his life
  chosen_spanish: tu vida será por su vida
  alternatives_spanish:
  - tu vida será en lugar de su vida
  - tu vida estará en vez de su vida
  lexicon: HALOT
  rationale: ‘Vida’ es más exacto que ‘alma’ en este contexto. ‘Por’ comunica la sustitución penal sin sobrecargar la frase.
- source_word: וְעַמְּךָ תַּחַת עַמּוֹ
  english_pob_choice: and your people for his people
  chosen_spanish: y tu pueblo por su pueblo
  alternatives_spanish:
  - y tu pueblo en lugar de su pueblo
  - y tu gente por su gente
  lexicon: HALOT
  rationale: Mantiene el paralelismo con la cláusula anterior y conserva el sentido de intercambio sustitutivo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar en español bíblico contemporáneo y suena natural sin perder solemnidad.
theological_decisions:
- issue: הֵרֶם / חֵרֶם language in a divine judgment oracle
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: consagrado a destrucción
  alternative_spanish_readings:
  - bajo mi anatema
  - destinado a destrucción
  - dedicado a destrucción
  rationale: La frase debe conservar el peso de juicio divino y no reducirse a una simple hostilidad personal. ‘Consagrado a destrucción’ intenta mantener la idea de una pertenencia bajo sentencia de Yahvé, evitando un tecnicismo oscuro pero sin suavizar el concepto.
  doctrine_reference: Josué 6–7; Deuteronomio 20:16–18; 1 Samuel 15
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió ‘let ... escape from your hand’ por encima de una traducción más literal y menos natural. En español se sigue esa decisión con ‘has dejado escapar de tu mano’. También se preservó la opción auditada de traducir חֵרֶם de manera explícita, evitando ‘SEÑOR’ para el tetragrámaton y manteniendo la lógica de sustitución en las cláusulas finales.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma estable para el nombre divino en todo el texto.
  - Se traduce נֶפֶשׁ como ‘vida’ en este contexto judicial, no como ‘alma’.
  - Se mantiene el paralelismo de ‘tu vida / su vida’ y ‘tu pueblo / su pueblo’.
  - Se evita ‘anatema’ en el texto principal por claridad pastoral, pero se documenta como alternativa.
  - El sujeto implícito de ‘le dijo’ se conserva conforme al español natural sin añadir información no presente en el hebreo.
