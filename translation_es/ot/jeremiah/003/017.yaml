revisions:
- from: En aquel tiempo llamarán a Jerusalén «el trono de Yahvé», y todas las naciones se reunirán [a] en ella, en Jerusalén, por el nombre de Yahvé [b]. Ya no andarán más tras la obstinación de su corazón malo.
  to: En aquel tiempo llamarán a Jerusalén «el trono de Yahvé[b]», y todas las naciones se reunirán a ella[a], a Jerusalén, por el nombre de Yahvé. Ya no andarán tras la obstinación de su corazón malo.
  rationale: Se corrigió el sentido direccional de la reunión de las naciones («a ella») para reflejar mejor el hebreo, se eliminó la redundancia de «ya no ... más», y se reubicó la nota cultural al sintagma que realmente explica. También se normalizó la colocación del marcador de nota según el formato del proyecto.
