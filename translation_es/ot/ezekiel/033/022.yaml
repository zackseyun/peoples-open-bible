base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/022.yaml
  text: Now the hand of Yahweh had been upon me in the evening[a], before the fugitive came, and he had opened my mouth before he came to me in the morning. So my mouth was opened, and I was no longer mute.
  footnotes:
