translation:
  language: es
  text: De repente cayó Babilonia y quedó quebrantada. ¡Giman por ella! Tomen bálsamo[a] para su dolor; quizá sea sanada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bálsamo medicinal' o 'resina medicinal'. El hebreo se refiere a una resina usada como remedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְאֹם
  english_pob_choice: Suddenly
  chosen_spanish: De repente
  alternatives_spanish:
  - Repentinamente
  - Súbitamente
  lexicon: HALOT
  rationale: Expresa la brusquedad del adverbio hebreo con un giro natural en español que conserva el impacto del anuncio.
- source_word: נָפְלָה
  english_pob_choice: has fallen
  chosen_spanish: cayó
  alternatives_spanish:
  - ha caído
  - cayó de improviso
  lexicon: HALOT
  rationale: El perfecto hebreo anuncia una caída consumada; en español, el pretérito simple suena natural y mantiene la inmediatez profética sin sobrecargar la frase.
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: standard toponym
  rationale: Nombre propio en forma española habitual para la ciudad/imperio.
- source_word: וַתִּשָּׁבֵר
  english_pob_choice: and been shattered
  chosen_spanish: quedó quebrantada
  alternatives_spanish:
  - y fue quebrada
  - y quedó rota
  lexicon: HALOT
  rationale: El nifal de שבר comunica quedar roto/quebrado. 'Quedó quebrantada' conserva la idea de ruina resultante y suena más idiomático que una traducción rígida.
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Aullad!
  alternatives_spanish:
  - ¡Gemid!
  - ¡Lamentaos!
  lexicon: HALOT
  rationale: El imperativo plural pide un lamento intenso y audible. 'Aullad' reproduce con fuerza la intensidad del hebreo, como en la alternativa inglesa 'Howl'.
- source_word: עָלֶיהָ
  english_pob_choice: over her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - por ella
  - a causa de ella
  lexicon: HALOT
  rationale: Mantiene la construcción de duelo dirigida a Babilonia personificada en femenino, como en la lectura auditada del inglés.
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Tomad
  alternatives_spanish:
  - Llevad
  - Traed
  lexicon: HALOT
  rationale: Imperativo plural directo; 'tomad' conserva la orden de recoger o aplicar el remedio.
- source_word: צֳרִי
  english_pob_choice: balm
  chosen_spanish: bálsamo
  alternatives_spanish:
  - resina medicinal
  - bálsamo curativo
  lexicon: HALOT
  rationale: צֳרִי designa una resina medicinal usada para tratamiento. 'Bálsamo' comunica bien el término y permite una nota para preservar la alternativa léxica 'balsamo/balsam' en el sentido del original.
- source_word: לְמַכְאוֹבָהּ
  english_pob_choice: for her pain
  chosen_spanish: para su dolor
  alternatives_spanish:
  - para su herida
  - para su mal
  lexicon: HALOT
  rationale: מַכְאוֹב puede abarcar dolor, sufrimiento o herida. 'Dolor' es la equivalencia más natural y amplia en español.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - puede que
  lexicon: HALOT
  rationale: Expresa la posibilidad tentativa del hebreo sin añadir certeza.
- source_word: תֵּרָפֵא
  english_pob_choice: she may be healed
  chosen_spanish: sea sanada
  alternatives_spanish:
  - sea curada
  - pueda sanar
  lexicon: HALOT
  rationale: El nifal imperfecto expresa posibilidad de sanidad/restauración. 'Sea sanada' mantiene la modalidad dudosa introducida por 'quizá' y respeta la personificación femenina.
theological_decisions:
- issue: Personificación femenina de Babilonia
  english_pob_reading: Retain feminine personification with 'her' and 'she'
  chosen_spanish_reading: Mantener 'ella' y el femenino verbal en toda la línea
  alternative_spanish_readings:
  - tratarla como 'la ciudad' o usar 'eso'
  rationale: El hebreo usa formas femeninas para Babilonia; conservarlas preserva la retórica profética y el tono de duelo dirigido a una ciudad personificada.
  doctrine_reference: Translation philosophy §5 y §6
- issue: Brusquedad de la caída y ruina
  english_pob_reading: Suddenly Babylon has fallen and been shattered
  chosen_spanish_reading: De repente cayó Babilonia y quedó quebrantada
  alternative_spanish_readings:
  - Babilonia ha caído y ha sido quebrantada
  - Babilonia cayó y fue quebrada
  rationale: La combinación de un adverbio de irrupción con dos verbos de ruina comunica tanto el golpe súbito como la devastación resultante, sin diluir la imagen profética.
  doctrine_reference: Principio de equivalencia óptima y fidelidad a la imaginería del hebreo
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota con el marcador [a] en el texto español. Se mantuvo la decisión léxica de צֳרִי con una nota que preserva la alternativa lexical documentada por el audit trail inglés.
  spanish_consistency_notes:
  - Babilonia se conserva como topónimo en forma española estándar.
  - Se mantiene el femenino singular para la personificación de Babilonia en toda la línea.
  - '''Bálsamo'' y ''sanada'' reflejan el campo semántico de tratamiento/restauración sin ampliar el sentido.'
  - La puntuación exclamativa en la línea de lamento respeta el tono profético del imperativo plural.
