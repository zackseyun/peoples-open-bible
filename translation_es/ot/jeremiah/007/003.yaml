revisions:
- from: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: Hagan bien sus caminos y sus hechos[b], y yo los haré habitar en este lugar.'
  to: 'Así dice Yahvé de los ejércitos, el Dios de Israel: Mejoren[a] sus caminos y sus hechos, y yo los dejaré habitar[b] en este lugar.'
  rationale: Se corrige la asignación de notas para que siga la auditoría inglesa y el texto hebreo. Se reemplaza 'Hagan bien...' por 'Mejoren...' para lograr español natural sin perder el sentido exhortativo de הֵיטִיבוּ, dejando 'Corrijan...' como alternativa. Se cambia 'yo los haré habitar' por 'yo los dejaré habitar' para reflejar mejor la decisión POB de permiso/permanencia condicionada en וַאֲשַׁכְּנָה אֶתְכֶם. No se requiere adjudicación adicional porque el ajuste es claro y está respaldado por la documentación existente.
