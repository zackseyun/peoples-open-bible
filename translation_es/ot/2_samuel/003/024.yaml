translation:
  language: es
  text: 'Entonces Joab vino al rey y dijo: «¿Qué has hecho? Mira, Abner vino a ti. ¿Por qué, entonces, lo dejaste ir, de modo que ya se ha ido por completo[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y fue, yendo»; forma enfática que significa que ciertamente se ha ido o que se ha ido por completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y ... vino
  - Luego ... vino
  lexicon: BDB/HALOT
  rationale: El wayyiqtol introduce avance narrativo; «entonces» comunica bien la secuencia sin repetir mecánicamente una «y» inicial en español.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - a la presencia del rey
  lexicon: BDB/HALOT
  rationale: La dirección simple del hebreo se expresa de forma natural con «al rey»; evita sobrerrepresentar una matización espacial no explícita.
- source_word: מֶה עָשִׂיתָה
  english_pob_choice: What have you done?
  chosen_spanish: ¿Qué has hecho?
  alternatives_spanish:
  - ¿Qué hiciste?
  - ¿Qué has hecho tú?
  lexicon: BDB/HALOT
  rationale: El hebreo funciona como reproche exclamativo por una acción ya realizada; el presente perfecto mantiene mejor esa fuerza acusatoria en español.
- source_word: הִנֵּה
  english_pob_choice: Look,
  chosen_spanish: Mira,
  alternatives_spanish:
  - Mira aquí,
  - He aquí,
  lexicon: BDB/HALOT
  rationale: «Mira» conserva el señalamiento enfático de הִנֵּה con naturalidad en español actual.
- source_word: בָא אַבְנֵר אֵלֶיךָ
  english_pob_choice: Abner came to you
  chosen_spanish: Abner vino a ti
  alternatives_spanish:
  - Abner ha venido a ti
  - Abner llegó a ti
  lexicon: BDB/HALOT
  rationale: El hebreo presenta el hecho destacado por Joab; «vino a ti» reproduce la relación direccional sin forzar un matiz adicional.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces,
  alternatives_spanish:
  - ¿Por qué, pues,
  - ¿Por qué razón, entonces,
  lexicon: BDB/HALOT
  rationale: La combinación tiene fuerza discursiva y acusatoria; «por qué, entonces» refleja esa carga mejor que un simple «por qué».
- source_word: שִׁלַּחְתּוֹ
  english_pob_choice: you sent him away
  chosen_spanish: lo despachaste
  alternatives_spanish:
  - lo dejaste ir
  - lo enviaste lejos
  lexicon: BDB/HALOT
  rationale: Piel de שלח aquí implica enviar fuera/despedir; «despachaste» en español transmite el acto de mandarlo fuera con matiz de dejarlo partir.
- source_word: וַיֵּלֶךְ הָלֽוֹךְ
  english_pob_choice: so that he has gone and departed
  chosen_spanish: de modo que se fue y se fue del todo
  alternatives_spanish:
  - de modo que se fue por completo
  - de modo que se ha ido y ha partido
  lexicon: BDB/HALOT
  rationale: La construcción con infinitivo absoluto intensifica el verbo finito; se traduce con redundancia natural para mantener la énfasis de «irse del todo» sin añadir contenido ajeno.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para לָמָּה זֶּה y una salida enfática para הָלוֹךְ. En español se reflejó esa decisión con «¿Por qué, entonces, ...?» y «se fue y se fue del todo», manteniendo la intensidad sin calcado rígido.
  spanish_consistency_notes:
  - Se mantiene «rey» sin mayúscula por norma de estilo español, salvo uso reverencial no necesario aquí.
  - Se preserva el reproche directo de Joab con una puntuación interrogativa y exclamativa sobria, acorde al tono del hebreo.
  - La nota [a] se ancla únicamente en «dijo[a]» para evitar marcador huérfano.
