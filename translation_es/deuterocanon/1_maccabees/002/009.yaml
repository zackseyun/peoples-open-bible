translation:
  language: es
  text: Los vasos de su gloria fueron llevados cautivos[a]; sus infantes fueron abatidos en sus calles[b], sus hombres jóvenes por la espada del enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron conducidos como cautivos». El griego expresa un traslado forzoso al cautiverio.
    reason: lexical_alternative
  - marker: b
    text: El posesivo femenino se refiere a la ciudad personificada en el contexto circundante, probablemente Jerusalén/Sion.
    reason: cross_reference
lexical_decisions:
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - vasijas
  - utensilios
  - vasos sagrados
  lexicon: LSJ
  rationale: σκεύη puede referirse a recipientes u objetos/implementos. «Vasos» conserva la imagen concreta y funciona bien en español bíblico sin especificar más de lo que el griego exige.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: LSJ
  rationale: «Gloria» reproduce el registro elevado del texto y mantiene la posible resonancia sacra del sustantivo griego.
- source_word: αἰχμάλωτα ἀπήχθη
  english_pob_choice: were carried away captive
  chosen_spanish: fueron llevados cautivos
  alternatives_spanish:
  - fueron conducidos como cautivos
  - fueron arrastrados al cautiverio
  lexicon: LSJ
  rationale: La construcción griega expresa traslado forzoso a cautiverio. «Fueron llevados cautivos» es natural en español y conserva la pasividad y la violencia de la acción.
- source_word: νήπια
  english_pob_choice: infants
  chosen_spanish: infantes
  alternatives_spanish:
  - niños pequeños
  - bebés
  lexicon: LSJ
  rationale: «Infantes» refleja la edad muy temprana del término griego y encaja con el tono solemne del lamento.
- source_word: ἀπεκτάθη
  english_pob_choice: were slain
  chosen_spanish: fueron muertos
  alternatives_spanish:
  - fueron asesinados
  - fueron masacrados
  lexicon: LSJ
  rationale: El verbo expresa muerte violenta. «Fueron muertos» mantiene la gravedad bíblica y evita añadir matices no explícitos en el griego.
- source_word: πλατείαις
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - plazas
  - anchas calles
  lexicon: LSJ
  rationale: «Calles» es la correspondencia más natural y general en español para πλατεῖαι en este contexto urbano.
- source_word: νεανίσκοι
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - jóvenes varones
  lexicon: LSJ
  rationale: «Jóvenes» comunica la edad y preserva el paralelismo con «infantes» sin forzar una especificación adicional.
- source_word: ῥομφαίᾳ
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - sable
  - gran espada
  lexicon: LSJ
  rationale: «Espada» es la equivalencia bíblica más directa y clara para ῥομφαία en este pasaje.
- source_word: ἐχθροῦ
  english_pob_choice: the enemy’s
  chosen_spanish: del enemigo
  alternatives_spanish:
  - de un enemigo
  - del adversario
  lexicon: LSJ
  rationale: El genitivo singular funciona de manera colectiva/representativa. «Del enemigo» conserva la fuerza hostil y la formulación natural en español.
theological_decisions:
- issue: Referente de los posesivos femeninos
  english_pob_reading: Retain the feminine possessive pronoun without explicating the antecedent in the verse itself.
  chosen_spanish_reading: Conservar los posesivos femeninos («su», «sus») sin identificar explícitamente el referente dentro del versículo.
  alternative_spanish_readings:
  - Explicitar Jerusalén
  - Explicitar Sion
  rationale: El griego usa repetidamente αὐτῆς y deja el antecedente al contexto. Mantener la referencia implícita preserva el tono poético del lamento y no añade una identificación que el versículo no formula.
  doctrine_reference: Preservar la tensión textual y contextual sin resolverla de forma intratextual.
translation_notes:
  revision_awareness: Se ajustó la redacción para anclar explícitamente las notas [a] y [b] en el texto español, corrigiendo la validación previa. No se introdujeron cambios de sentido respecto del griego ni del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo la persona femenina implícita mediante «su/sus» para reflejar los posesivos griegos.
  - 'Se eligió un registro sobrio y bíblico: «llevados cautivos», «fueron muertos», «del enemigo».'
  - No se explicitó Jerusalén/Sion en el texto principal para respetar el lamento personificado del original.
