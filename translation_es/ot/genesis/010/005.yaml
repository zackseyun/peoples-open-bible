- from: De estos se separaron las costas de las naciones[a], en sus tierras, cada uno según su lengua, por sus clanes[b], en sus naciones.
  to: De estos quedaron divididas las costas de las naciones[a], en sus tierras, cada uno según su lengua[b], por sus clanes, en sus naciones.
  rationale: Se ajustó la primera cláusula para que suene natural en español sin perder el sentido de separación/división del hebreo, y se corrigió la ubicación del marcador de nota para que coincida con la expresión que explica.
