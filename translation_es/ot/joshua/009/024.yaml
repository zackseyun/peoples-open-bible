translation:
  language: es
  text: 'Ellos respondieron a Josué y dijeron[a]: «Porque se les había dicho claramente a tus siervos[b], lo que Yahvé, tu Dios, había mandado a Moisés, su siervo: darles toda la tierra y destruir a todos los habitantes de la tierra de delante de ustedes. Así que temimos mucho por nuestras vidas, a causa de ustedes, e hicimos esta cosa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «porque de cierto se les había dicho a tus siervos». El hebreo usa un infinitivo absoluto con el verbo finito para expresar énfasis.
    reason: lexical_alternative
  - marker: b
    text: O, «se les había dicho con certeza a tus siervos». El hebreo usa un infinitivo absoluto con el verbo finito para expresar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ ... וַיֹּאמְרוּ
  english_pob_choice: They answered ... and said
  chosen_spanish: respondieron ... y dijeron
  alternatives_spanish:
  - contestaron ... y dijeron
  - respondieron ... y hablaron
  lexicon: HALOT
  rationale: En el relato de diálogo, ענה introduce la respuesta a Josué y אמר la fórmula narrativa de habla. «Respondieron ... y dijeron» conserva la secuencia y el tono natural en español.
- source_word: הֻגֵּד הֻגַּד
  english_pob_choice: it was clearly told
  chosen_spanish: se les había dicho claramente
  alternatives_spanish:
  - se les había dicho con certeza
  - se les había informado claramente
  lexicon: HALOT
  rationale: La combinación del pasivo con infinitivo absoluto expresa énfasis. En español, «se les había dicho claramente» conserva la idea de comunicación enfática sin sonar forzado; el pluscuamperfecto refleja la anterioridad respecto del discurso citado.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: to your servants
  chosen_spanish: a tus siervos
  alternatives_spanish:
  - a tus esclavos
  - a tus servidores
  lexicon: HALOT
  rationale: Aquí el término es una autodesignación deferente en discurso diplomático. «Siervos» mantiene la deferencia y la relación de subordinación sin cargar innecesariamente el matiz de esclavitud que el contexto no parece resaltar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en hebreo; el español del proyecto usa «Yahvé» como forma principal para preservar el nombre del pacto, no una máscara litúrgica.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: «Dios» es la equivalencia directa y estándar para אֱלֹהִים en este contexto relacional y de pacto.
- source_word: אֶת מֹשֶׁה עַבְדּוֹ
  english_pob_choice: his servant Moses
  chosen_spanish: a Moisés, su siervo
  alternatives_spanish:
  - a Moisés, su esclavo
  - a Moisés, su servidor
  lexicon: HALOT
  rationale: עבד referido a Moisés funciona como título honorífico de servicio a Dios. «Su siervo» conserva ese matiz consagrado y evita la dureza de «esclavo».
- source_word: לָתֵת לָכֶם אֶת כָּל הָאָרֶץ
  english_pob_choice: to give you all the land
  chosen_spanish: darles toda la tierra
  alternatives_spanish:
  - darles toda la tierra
  - darles toda la región
  lexicon: HALOT
  rationale: El infinitivo de propósito se vierte de manera natural en español como complemento final. «Tierra» conserva el valor territorial-covenantal de אֶרֶץ en este contexto.
- source_word: וּלְהַשְׁמִיד אֶת כָּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: and to destroy all the inhabitants of the land
  chosen_spanish: y destruir a todos los habitantes de la tierra
  alternatives_spanish:
  - y exterminar a todos los habitantes de la tierra
  - y eliminar a todos los habitantes de la tierra
  lexicon: HALOT
  rationale: השמיד denota destrucción/remoción. «Destruir» mantiene la fuerza del verbo sin añadir una carga interpretativa moderna que «exterminar» podría intensificar más allá del hebreo.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you / because of you
  chosen_spanish: delante de ustedes / a causa de ustedes
  alternatives_spanish:
  - ante ustedes / por ustedes
  - frente a ustedes / por temor a ustedes
  lexicon: HALOT
  rationale: 'El hebreo usa la misma expresión en dos cláusulas con valores distintos. En la primera, la idea es remoción de la presencia de Israel: «delante de ustedes». En la cláusula de temor, la relación causal se expresa mejor como «a causa de ustedes».'
- source_word: וַנִּירָא מְאֹד
  english_pob_choice: we greatly feared
  chosen_spanish: temimos mucho
  alternatives_spanish:
  - tuvimos mucho miedo
  - temimos en gran manera
  lexicon: HALOT
  rationale: יִרֵא expresa miedo intenso. «Temimos mucho» preserva la forma verbal y el registro narrativo; «tuvimos mucho miedo» sería más explícito pero menos cercano al hebreo.
- source_word: לְנַפְשֹׁתֵינוּ
  english_pob_choice: for our lives
  chosen_spanish: por nuestras vidas
  alternatives_spanish:
  - por nuestras almas
  - por nosotros mismos
  lexicon: HALOT
  rationale: נפש aquí se refiere a la vida concreta, a la preservación de la existencia. «Por nuestras vidas» refleja mejor el idioma bíblico que «almas».
- source_word: וַנַּעֲשֶׂה אֶת הַדָּבָר הַזֶּה
  english_pob_choice: and we did this thing
  chosen_spanish: y hicimos esto
  alternatives_spanish:
  - y hicimos esta cosa
  - y actuamos así
  lexicon: HALOT
  rationale: La frase concluye con demostrativo enfático. «Hicimos esto» preserva la referencia concreta al acto que acaban de describir, en un español más natural que «hicimos esta cosa».
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. En la línea del proyecto, el nombre propio se mantiene en español como «Yahvé» para no ocultarlo tras una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó la secuencia verbal a «had commanded» y suavizó «we feared greatly» a «we greatly feared». En español, el pluscuamperfecto «había mandado» ya refleja adecuadamente la anterioridad, y «temimos mucho» conserva el énfasis de manera idiomática sin depender del orden adverbial inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se reserva «siervo» para עבד cuando el contexto es honorífico o de subordinación deferente, no esclavitud literal.
  - «Tierra» traduce אֶרֶץ en sentido territorial-covenantal, no «mundo» ni «país».
  - 'La doble expresión de מִפְּנֵי se distingue según función: espacial/relacional en la primera cláusula y causal en la segunda.'
  - «Hicimos esto» mantiene la deixis demostrativa del hebreo sin sobreexplicar el acto.
