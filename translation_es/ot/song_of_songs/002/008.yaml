translation:
  language: es
  text: ¡El sonido de mi amado![a] Mira, aquí viene, saltando por los montes, brincando por los collados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “La voz de mi amado”. Hebreo qol puede significar tanto “sonido” como “voz”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹל
  english_pob_choice: The sound of
  chosen_spanish: La voz de
  alternatives_spanish:
  - El sonido de
  lexicon: HALOT
  rationale: קוֹל puede significar tanto “voz” como “sonido”. En español, “la voz de mi amado” es una opción natural y poética para este inicio exclamativo, y conserva la alternativa semántica documentada. Aunque el inglés POB prefirió “sound” por el contexto sensorial, en español “voz” mantiene bien la ambigüedad legítima sin sonar artificial; la nota a preserva la lectura alternativa “sonido”.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado
  - mi amante
  lexicon: HALOT
  rationale: דּוֹדִי en Cantar de los Cantares expresa afecto y relación amorosa. “Mi amado” es la equivalencia española más natural y reverente, y evita el matiz más estrecho o más explícito de “mi amante”. En español bíblico moderno, “amado” comunica bien el valor poético del término.
- source_word: הִנֵּה זֶה
  english_pob_choice: Look, here he comes
  chosen_spanish: Mira, aquí viene
  alternatives_spanish:
  - Mira, he aquí que viene
  - Mira, este viene
  lexicon: HALOT
  rationale: La combinación es deíctica e inmediata. “Mira” reproduce la fuerza exhortativa de הִנֵּה en un español vivo y reverente; “aquí viene” expresa bien זֶה בָּא en una escena de llegada visualmente presente. Otras opciones como “he aquí” son más tradicionales, pero menos naturales en español contemporáneo.
- source_word: בָּא
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - va viniendo
  - llega
  lexicon: HALOT
  rationale: El qatal funciona aquí con valor presente o vivencial en la poesía. “Viene” es la forma más idiomática en español para expresar esa inmediatez narrativa sin introducir una perífrasis innecesaria.
- source_word: מְדַלֵּג
  english_pob_choice: leaping
  chosen_spanish: saltando
  alternatives_spanish:
  - brincando
  - dando saltos
  lexicon: HALOT
  rationale: El participio describe movimiento ágil y enérgico. “Saltando” es claro y poético en español; “brincando” también es posible, pero puede sonar regional. Se mantiene el dinamismo del original.
- source_word: עַל הֶהָרִים
  english_pob_choice: over the mountains
  chosen_spanish: por los montes
  alternatives_spanish:
  - sobre los montes
  - sobre las montañas
  lexicon: HALOT
  rationale: עַל con verbos de movimiento puede implicar desplazamiento a través o por encima. “Por los montes” fluye de manera natural en español poético y conserva la imagen de tránsito; “montes” permite un registro bíblico adecuado. Se evita forzar “sobre” donde en español podría sonar más rígido.
- source_word: מְקַפֵּץ
  english_pob_choice: bounding
  chosen_spanish: brincando
  alternatives_spanish:
  - saltando
  - dando brincos
  lexicon: HALOT
  rationale: Este verbo refuerza el anterior con variación poética. “Brincando” conserva la idea de movimiento ligero y repetido, y permite una pareja sonora con “saltando”. En español, esta duplicación transmite bien la intensificación del hebreo.
- source_word: עַל הַגְּבָעוֹת
  english_pob_choice: over the hills
  chosen_spanish: por los collados
  alternatives_spanish:
  - sobre los collados
  - por las colinas
  lexicon: HALOT
  rationale: “Collados” es un término bíblico y literario apropiado para גְּבָעוֹת, y combina bien con “montes” para reproducir el paralelismo. “Colinas” sería más común, pero menos reverente y menos tradicional en el registro poético bíblico.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo con apoyo del audit trail inglés. Se conservó la exclamación inicial y la imaginería cinética (llegada, saltar/brincar) sin añadir contenido interpretativo. La principal decisión fue resolver קוֹל en español como “voz” en el cuerpo del texto, dejando la alternativa documentada en nota, mientras se mantuvo el paralelismo entre montes y collados.
  spanish_consistency_notes:
  - Se usó “mi amado” para דּוֹדִי en consonancia con el registro poético de Cantar.
  - Se prefirió “montes” y “collados” por su color bíblico y por el paralelismo del hebreo.
  - Se mantuvo un estilo moderno pero digno, evitando un calco rígido de “He aquí” en el texto principal.
