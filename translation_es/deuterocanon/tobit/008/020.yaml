translation:
  language: es
  text: Y Ragüel le dijo, bajo juramento[a], antes de que se completaran los días de la boda, que no debía irse hasta que se cumplieran los catorce días de la boda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con juramento». El adverbio griego indica que Ragüel vinculó la instrucción mediante juramento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν αὐτῷ Ῥαγουὴλ
  english_pob_choice: And Raguel said to him
  chosen_spanish: Y Ragüel le dijo
  alternatives_spanish:
  - Y Ragüel le habló
  - Entonces Ragüel le dijo
  lexicon: LSJ
  rationale: Mantiene la simple introducción narrativa y el nombre propio de forma natural en español.
- source_word: ἐνόρκως
  english_pob_choice: under oath
  chosen_spanish: bajo juramento
  alternatives_spanish:
  - con juramento
  - juramentado
  lexicon: LSJ
  rationale: La frase española comunica el valor adverbial de una acción vinculada por juramento, en paralelo con la nota inglesa sobre el vínculo formal del mandato.
- source_word: πρὶν ἢ συντελεσθῆναι
  english_pob_choice: before ... were completed
  chosen_spanish: antes de que ... se hubieran cumplido
  alternatives_spanish:
  - antes de que ... terminaran
  - antes de la conclusión de
  lexicon: BDAG
  rationale: ‘Se hubieran cumplido’ conserva el sentido de completarse/consumirse el período sin volverlo forzado en español.
- source_word: τὰς ἡμέρας τοῦ γάμου
  english_pob_choice: the days of the wedding
  chosen_spanish: los días de la boda
  alternatives_spanish:
  - los días de la boda nupcial
  - los días de la celebración nupcial
  lexicon: LSJ
  rationale: ‘Boda’ es la opción más natural y clara en español para el período festivo nupcial indicado por el griego.
- source_word: μὴ ἐξελθεῖν αὐτόν
  english_pob_choice: that he should not leave
  chosen_spanish: que no saliera
  alternatives_spanish:
  - que no se fuera
  - que no partiera
  lexicon: BDAG
  rationale: En contexto narrativo, ‘salir’ expresa bien la prohibición de abandonar el lugar antes del plazo fijado.
- source_word: ἐὰν μὴ πληρωθῶσιν
  english_pob_choice: unless ... were fulfilled
  chosen_spanish: sino hasta que se cumplieran
  alternatives_spanish:
  - a menos que se cumplieran
  - si no se cumplían
  lexicon: BDAG
  rationale: '‘Sino hasta que’ transmite con naturalidad el límite temporal de la instrucción: no abandonar hasta completar el plazo.'
- source_word: αἱ δέκα τέσσαρες ἡμέραι τοῦ γάμου
  english_pob_choice: the fourteen days of the wedding
  chosen_spanish: los catorce días de la boda
  alternatives_spanish:
  - los catorce días nupciales
  - los catorce días de la celebración
  lexicon: LSJ
  rationale: Se conserva el número explícito y la relación genitiva; ‘boda’ evita una construcción más pesada y sigue siendo fiel al período de celebración.
theological_decisions:
- issue: Duración normativa del período nupcial
  english_pob_reading: the fourteen days of the wedding were fulfilled
  chosen_spanish_reading: se cumplieran los catorce días de la boda
  alternative_spanish_readings:
  - se completaran los catorce días de la boda
  - se cumplieran los catorce días nupciales
  rationale: No hay carga doctrinal directa, pero conviene preservar que el texto regula un período completo y determinado, no una simple demora indefinida.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue el orden ajustado del texto inglés auditado, pero se apoya directamente en el griego: ἐνόρκως se coloca como modificación verbal de la declaración; πρὶν ἢ συντελεσθῆναι exige una subordinada temporal natural en español; y ἐὰν μὴ πληρωθῶσιν se expresa como límite temporal con ‘sino hasta que’ para evitar un calco duro de ‘unless’ que sonaría menos idiomático. No se introducen elementos ajenos al período nupcial de catorce días.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene «boda» para el periodo nupcial porque el griego habla de días del γάμος y no requiere un término eclesiástico.
  - Se conserva el valor jurídico de «bajo juramento» sin sustituirlo por una formulación devocional más vaga.
