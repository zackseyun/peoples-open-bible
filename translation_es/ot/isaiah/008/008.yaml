revisions:
- from: Se deslizará por Judá; desbordará y pasará por él; llegará hasta el cuello. Y la extensión de sus alas llenará la anchura de tu tierra, ¡oh, Emanuel![a]
  to: Irrumpirá en Judá; desbordará y pasará; llegará hasta el cuello. Y la extensión de sus alas llenará la anchura de tu tierra, ¡oh, Emanuel![a]
  rationale: 'Se revisa para alinear mejor el español con la fuerza del hebreo y con la justificación léxica del POB en inglés: «Irrumpirá en Judá» comunica avance invasor en vez de un mero deslizamiento; «desbordará y pasará» conserva la secuencia acuática sin añadir un pronombre ambiguo; se mantiene «la anchura de tu tierra» por fidelidad a רֹחַב y el vocativo «¡oh, Emanuel!» para preservar el enlace con Isaías 7:14. La nota se hace más idiomática en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:25:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva la estructura general del hebreo y la mayoría de las decisiones del POB en inglés: desbordamiento, paso a través, alcance hasta el cuello, alas extendidas, vocativo del nombre Emanuel con nota explicativa. Sin embargo, «se deslizará» debilita de forma importante וְחָלַף en el contexto de crecida invasora, donde el inglés auditado justificó una idea más violenta como «sweep on». Además, «por Judá» pierde el matiz direccional de בִּיהוּדָה como entrada en Judá; y «pasará por él» introduce un pronombre masculino singular no presente en el hebreo y algo ambiguo.'
  spanish_quality_summary: El español es legible y digno, pero «se deslizará» suena demasiado suave y casi sigiloso para una inundación devastadora. «Pasará por él» también resulta menos natural porque el referente de «él» no está explícito. El resto del versículo fluye bien. Conviene reforzar la imagen con «irrumpirá en Judá» o similar, y simplificar la segunda cola para evitar ambigüedad.
  glossary_alignment: No hay conflicto con los términos de glosario principales. La decisión «Emanuel» es aceptable en español eclesial para el nombre propio, con nota sobre su significado. La nota debe expresar el sentido idiomático del nombre como «Dios está con nosotros», más natural que «Dios con nosotros».
  issues:
  - severity: high
    issue: «Se deslizará» para וְחָלַף
    rationale: Contradice el razonamiento léxico auditado del POB inglés, que eligió una expresión enérgica por el contexto de inundación invasora. «Deslizarse» sugiere movimiento suave o sigiloso, no una avanzada arrolladora.
  - severity: medium
    issue: «por Judá» para בִּיהוּדָה
    rationale: 'El contexto y la decisión inglesa favorecen un matiz direccional de entrada: «into Judah». «Por Judá» enfatiza solo recorrido interno y pierde parte del avance invasor al territorio.'
  - severity: medium
    issue: «pasará por él» añade un referente no explícito
    rationale: El pronombre «él» no está en el hebreo y crea ambigüedad estilística. «Pasará» o «pasará a través» mantiene mejor la secuencia sin sobreinterpretar.
  - severity: low
    issue: 'Redacción de la nota: «Dios con nosotros»'
    rationale: Como explicación del nombre, en español suena más natural y completo «Dios está con nosotros», que además refleja mejor el valor de la expresión.
  revised_spanish_text: Irrumpirá en Judá; desbordará y pasará; llegará hasta el cuello. Y la extensión de sus alas llenará la anchura de tu tierra, ¡oh, Emanuel![a]
  revised_footnotes:
  - marker: a
    text: Emanuel significa «Dios está con nosotros».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con la fuerza del hebreo y con la justificación léxica del POB en inglés: «Irrumpirá en Judá» comunica avance invasor en vez de un mero deslizamiento; «desbordará y pasará» conserva la secuencia acuática sin añadir un pronombre ambiguo; se mantiene «la anchura de tu tierra» por fidelidad a רֹחַב y el vocativo «¡oh, Emanuel!» para preservar el enlace con Isaías 7:14. La nota se hace más idiomática en español.'
