  glossary_alignment: 'Alineado con la terminología del proyecto: יהוה -> ''Yahvé''; שְׁאָר -> ''remanente''; קְדוֹשׁ יִשְׂרָאֵל -> ''el Santo de Israel''. No hay conflictos terminológicos sustanciales. ''En verdad'' preserva correctamente la amplitud de בֶאֱמֶת.'
