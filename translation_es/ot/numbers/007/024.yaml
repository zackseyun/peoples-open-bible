translation:
  language: es
  text: El tercer día[a], el líder de los hijos de Zabulón fue Eliab, hijo de Helón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el líder para los hijos de Zabulón». La preposición hebrea puede entenderse como representación o afiliación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם
  english_pob_choice: On the ... day
  chosen_spanish: Al ... día
  alternatives_spanish:
  - En el ... día
  lexicon: HALOT
  rationale: 'La construcción con ב en esta fórmula narrativa se entiende mejor en español como una referencia temporal natural: «al tercer día». Mantiene el sentido de ubicación temporal sin calcar la preposición de forma rígida.'
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: third
  chosen_spanish: tercer
  alternatives_spanish:
  - tercero
  lexicon: HALOT
  rationale: Es el ordinal que modifica «día». En español, «tercer» es la forma apocopada y natural delante de un sustantivo masculino singular.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En Números, נָשִׂיא designa al cabeza reconocido de una tribu. «Líder» comunica esa función con claridad en español moderno y evita el matiz monárquico de «príncipe».
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - de los descendientes de
  lexicon: HALOT
  rationale: La preposición ל aquí puede expresar pertenencia o afiliación. «De los hijos de» conserva la estructura genealógica del hebreo y sigue de cerca el valor relacional documentado en el texto inglés.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Zebulún
  lexicon: Transliteración bíblica estándar en español
  rationale: Se usa la forma española bíblica establecida «Zabulón», más reconocible y natural para lectores en español, sin alterar la identidad del nombre tribal.
- source_word: אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  alternatives_spanish:
  - Eliab
  lexicon: Transliteración bíblica estándar en español
  rationale: El nombre se mantiene en transliteración estable, ya ampliamente reconocido en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La fórmula patronímica hebrea se expresa de manera directa y natural en español con «hijo de».
- source_word: חֵלֹן
  english_pob_choice: Helon
  chosen_spanish: Helón
  alternatives_spanish:
  - Helon
  lexicon: Transliteración bíblica estándar en español
  rationale: Se prefiere «Helón» para reflejar la pronunciación española bíblica habitual y conservar la forma propia del nombre.
translation_notes:
  revision_awareness: Se ha seguido el sentido y la estructura del hebreo, junto con la decisión inglesa de mantener la ambigüedad funcional de לִבְנֵי en una nota. No se requieren revisiones textuales adicionales para esta línea breve.
  spanish_consistency_notes:
  - Se ha usado «líder» para נָשִׂיא, coherente con el criterio POB de evitar «príncipe» por su posible matiz regio.
  - Se ha elegido «hijos de» para לִבְנֵי, manteniendo la relación tribal/genealógica explícita.
  - 'Los nombres propios se han normalizado a formas bíblicas usuales en español: Zabulón, Eliab, Helón.'
  - La nota [a] conserva la alternativa semántica del hebreo sin sobrecargar el texto principal.
