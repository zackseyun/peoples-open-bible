revisions:
- from: Él los alcanzó y les habló estas palabras.[a]
  to: Él los alcanzó y les dijo estas palabras.[a]
  rationale: 'Se revisa la cláusula verbal para lograr español natural y fiel: «les dijo estas palabras» evita el calco poco idiomático «les habló estas palabras». La nota se ajusta para ofrecer una alternativa española que sí refleja la opción léxica documentada para וַיַּשִּׂגֵם sin introducir el sentido inadecuado de «sobrepasó».'
