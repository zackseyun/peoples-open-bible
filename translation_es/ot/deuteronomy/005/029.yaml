revisions:
- from: ¡Oh[a], que siempre tuvieran un corazón como este, para temerme y guardar todos mis mandamientos todos los días de su vida, para que les fuera bien a ellos y a sus hijos para siempre!
  to: ¡Oh[a], que siempre tuvieran un corazón como este, para temerme y guardar todos mis mandamientos todos los días de su vida, para que les vaya bien a ellos y a sus hijos y sus hijas para siempre!
  rationale: Se mantiene la estructura y la mayor parte del borrador, pero se corrige la referencia generacional para reflejar el valor genérico de וְלִבְנֵיהֶם documentado en el audit trail inglés. También se suaviza la clausura a una forma más natural en español ('les vaya bien'). No se requiere adjudicación adicional porque el ajuste es claro y está respaldado por las decisiones ya auditadas.
