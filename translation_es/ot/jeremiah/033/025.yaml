translation:
  language: es
  text: 'Así dice Yahvé: Si no he establecido mi pacto con el día y la noche[a], el orden fijo del cielo y de la tierra—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los estatutos/ordenanzas del cielo y de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera directa y natural en español. Se mantiene «Yahvé» por la decisión doctrinal de traducir el nombre divino, no por sustitución reverencial.
- source_word: אִם לֹא
  english_pob_choice: If I have not
  chosen_spanish: Si no he
  alternatives_spanish:
  - Si no
  - A menos que no
  lexicon: HALOT
  rationale: La construcción condicional negativa reproduce el tono solemne y la forma del hebreo sin suavizarla en exceso.
- source_word: בְרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: Se eligió «pacto» como equivalente español de בְּרִית en este contexto. «Covenant» se traduce aquí con un término que conserva el peso jurídico-relacional, y evita un calco poco natural como «covenio».
- source_word: יוֹמָם וָלָיְלָה
  english_pob_choice: with day and night
  chosen_spanish: con el día y la noche
  alternatives_spanish:
  - para el día y la noche
  - del día y de la noche
  lexicon: HALOT
  rationale: La preposición «con» mantiene la relación establecida en el inglés auditado y sugiere la esfera o asociación del pacto/orden entre esos dos ámbitos.
- source_word: חֻקּוֹת
  english_pob_choice: the fixed order
  chosen_spanish: las normas fijas
  alternatives_spanish:
  - los estatutos
  - las ordenanzas
  - los decretos
  lexicon: HALOT
  rationale: En este contexto cósmico, «normas fijas» comunica mejor la idea de regularidad establecida que un vocabulario jurídico más rígido, pero conserva la tensión con la posible lectura legal de חֻקּוֹת.
- source_word: שָׁמַיִם וָאָרֶץ
  english_pob_choice: of heaven and earth
  chosen_spanish: del cielo y de la tierra
  alternatives_spanish:
  - de los cielos y de la tierra
  - del universo
  lexicon: HALOT
  rationale: Se mantiene el merismo cosmológico en una forma natural para el español. «Cielo» en singular funciona bien aquí y no borra el paralelismo con «tierra».
- source_word: לֹא שָׂמְתִּי
  english_pob_choice: I have not established
  chosen_spanish: no he establecido
  alternatives_spanish:
  - no he puesto
  - no he fijado
  - no he ordenado
  lexicon: HALOT
  rationale: «Establecer» expresa la noción de instituir o fijar un orden permanente, que es el valor contextual que el inglés auditado ya había discernido para שׂוּם.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino de acuerdo con la política doctrinal del proyecto. «Yahvé» es la forma objetivo en español para reflejar directamente el Tetragrámaton y no esconderlo detrás de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: ¿«pacto» o una formulación de orden cósmico?
  english_pob_reading: my covenant with day and night
  chosen_spanish_reading: mi pacto con el día y la noche
  alternative_spanish_readings:
  - mi pacto para el día y la noche
  - mi convenio con el día y la noche
  rationale: Aunque el contexto apunta a un orden cósmico establecido, se preserva «pacto» porque el hebreo usa בְּרִית y el propio contexto de Jeremías explota el lenguaje de pacto. Luego «normas fijas» mantiene visible la dimensión de orden establecido sin borrar la tensión lexical.
  doctrine_reference: HALOT / contexto inmediato de Jeremías 33
translation_notes:
  revision_awareness: El análisis del inglés POB y la revisión más reciente coinciden en que no se requieren cambios de fondo; la decisión principal para el español es mantener la tensión entre el lenguaje de pacto («mi pacto») y el lenguaje de orden fijo («normas fijas»), además de reflejar el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene la puntuación con dos puntos tras la fórmula profética, siguiendo el registro bíblico en español.
  - La nota al pie se ancla en «normas fijas» para preservar la alternativa lexical que el inglés POB documenta.
  - No se usa «SEÑOR» para יְהוָה, en coherencia con la terminología del proyecto.
  - «Cielo» se emplea como merismo singular natural junto con «tierra», sin perder el paralelismo cósmico.
