translation:
  language: es
  text: y mis obras serán aceptables[a], y juzgaré a tu pueblo con justicia, y seré digno de los tronos[b] de mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bien recibidas». El griego expresa que las obras serán recibidas favorablemente.
    reason: lexical_alternative
  - marker: b
    text: El griego tiene el plural «tronos», posiblemente como una manera idiomática o institucional de referirse a la realeza o al poder real. Se conserva el plural para reflejar la forma del texto fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδεκτά
  english_pob_choice: acceptable
  chosen_spanish: aceptables
  alternatives_spanish:
  - bien recibidas
  - agradables
  lexicon: LSJ
  rationale: El adjetivo expresa que las obras serán recibidas favorablemente. «Aceptables» conserva ese valor evaluativo de manera natural en español y evita añadir una cualidad moral ajena al contexto.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: LSJ
  rationale: «Obras» comunica de forma natural el conjunto de actos o realizaciones del hablante y mantiene una correspondencia amplia con el griego sin volverse demasiado abstracto.
- source_word: διακρινῶ
  english_pob_choice: I will judge
  chosen_spanish: juzgaré
  alternatives_spanish:
  - gobernaré
  - decidiré sobre
  lexicon: LSJ
  rationale: En este contexto con objeto directo «tu pueblo» y el adverbio «con justicia», el verbo tiene fuerza judicial y de gobierno. «Juzgaré» preserva esa fuerza con claridad en español.
- source_word: δικαίως
  english_pob_choice: justly
  chosen_spanish: con justicia
  alternatives_spanish:
  - justamente
  - rectamente
  lexicon: LSJ
  rationale: La expresión adverbial en español suena natural y conserva el matiz legal de la acción de juzgar sin moralizar más de lo necesario.
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  lexicon: LSJ
  rationale: «Digno» es el equivalente más natural para expresar idoneidad o fitness para la dignidad real, y mantiene el tono elevado del pasaje.
- source_word: θρόνων
  english_pob_choice: thrones
  chosen_spanish: trono[b]
  alternatives_spanish:
  - tronos
  - asientos del trono
  lexicon: LSJ
  rationale: Aunque el griego tiene plural, el español aquí suena más natural en singular para la referencia al trono real del padre. Se señala la alternativa plural en nota para no ocultar la forma fuente.
- source_word: πατρός μου
  english_pob_choice: my father's
  chosen_spanish: de mi padre
  alternatives_spanish:
  - de mi padre terrenal
  - de mi padre
  lexicon: LSJ
  rationale: La construcción posesiva se traduce de manera directa y natural. «Mi padre» evita ambigüedad innecesaria y refleja el referente humano inmediato del contexto.
theological_decisions:
- issue: Plural griego θρόνων frente a un singular más natural en español
  english_pob_reading: retain the plural as 'thrones' in the main text, with a note explaining possible idiomatic force
  chosen_spanish_reading: usar singular «trono» en el texto principal y señalar en nota que el griego tiene plural «tronos»
  alternative_spanish_readings:
  - «tronos» en el texto principal
  - «trono real»
  rationale: El texto español debe ser legible y fiel. Dado que la revisión inglesa ya reconoció que el plural es probablemente idiomático y que el sentido natural apunta a un único trono real, el singular comunica mejor el referente sin perder la transparencia textual mediante la nota.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió el final de «my father''s thrones» a «my father''s throne» por naturalidad y por el sentido probable. Esta decisión se tuvo en cuenta: el español sigue esa lectura natural, pero mantiene una nota que deja visible el plural griego original.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y se mantuvo el nombre divino fuera de este versículo, por lo que no hay ajuste terminológico de Yahvé.
  - «Juzgaré» conserva la fuerza judicial/política de διακρινῶ, en línea con la lectura inglesa auditada.
  - Se prefirió «obras» sobre «hechos» para mantener la amplitud semántica sin sonar demasiado narrativo.
  - La nota sobre el plural de θρόνων preserva la transparencia al griego sin forzar un plural poco idiomático en español.
