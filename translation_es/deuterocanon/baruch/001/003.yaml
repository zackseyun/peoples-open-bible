base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/001/003.yaml
  text: And Baruch read the words of this book in the hearing of Jeconiah son of Jehoiakim[a], king of Judah, and in the hearing of all the people who had come to the book[b],
  footnotes:
