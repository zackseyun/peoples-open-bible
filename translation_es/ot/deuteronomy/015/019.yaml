translation:
  language: es
  text: Todo primogénito macho que nazca entre tu ganado y entre tu rebaño lo consagrarás a Yahvé[a] tu Dios. No trabajarás con el primogénito de tu buey, ni esquilarás el primogénito de tu rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo el primogénito macho que nazca de tu ganado y de tu rebaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַבְּכוֹר
  english_pob_choice: Every firstborn
  chosen_spanish: Todo primogénito
  alternatives_spanish:
  - Todo el primogénito
  - Cada primogénito
  - Todo primer nacido
  lexicon: HALOT
  rationale: El distributivo de כָּל con el singular constructo se rinde de manera natural en español con 'Todo'. 'Primogénito' conserva el valor técnico de בכור sin volverlo innecesariamente pesado.
- source_word: אֲשֶׁר יִוָּלֵד
  english_pob_choice: that is born
  chosen_spanish: que nazca
  alternatives_spanish:
  - que sea nacido
  - que es nacido
  - que haya nacido
  lexicon: HALOT
  rationale: El nifal de ילד aquí expresa el nacimiento del animal; 'que nazca' es español natural y conserva la pasividad del evento sin sonar forzado.
- source_word: בִּבְקָרְךָ וּבְצֹאנְךָ
  english_pob_choice: among your herd and among your flock
  chosen_spanish: entre tu ganado y entre tu rebaño
  alternatives_spanish:
  - de tu ganado y de tu rebaño
  - entre tu hato y entre tu rebaño
  - de tu ganado y de tu rebaño
  lexicon: HALOT
  rationale: בקר y צאן distinguen ganado mayor y menor. 'Ganado' y 'rebaño' son pares naturales en español y preservan la distinción sin especificar de más las especies.
- source_word: הַזָּכָר
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - masculino
  lexicon: HALOT
  rationale: En español, cuando se habla de animales de manera bíblica y cultual, 'varón' puede sonar menos natural que 'macho', pero 'macho' puede endurecerse; 'varón' mantiene la referencia al sexo masculino en un registro digno. Aun así, se conserva la lectura de sexo, no de género humano.
- source_word: תַּקְדִּישׁ
  english_pob_choice: you shall consecrate
  chosen_spanish: lo consagrarás
  alternatives_spanish:
  - lo santificarás
  - lo dedicarás
  - lo apartarás como santo
  lexicon: HALOT
  rationale: El hifil de קדש pide un verbo cultual fuerte. 'Consagrar' preserva el sentido de poner aparte para Yahvé mejor que 'dedicar'.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: a Yahvé tu Dios
  alternatives_spanish:
  - para Yahvé tu Dios
  - a Yahvé, tu Dios
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: ''Yahvé''. La frase expresa destino/dedicación cultual, por eso ''a'' reproduce bien la dirección de la consagración.'
- source_word: לֹא תַעֲבֹד בִּבְכֹר שׁוֹרֶךָ
  english_pob_choice: You shall not work with the firstborn of your ox
  chosen_spanish: No trabajarás con el primogénito de tu buey
  alternatives_spanish:
  - No usarás para trabajo el primogénito de tu buey
  - No trabajarás el primogénito de tu buey
  - No harás trabajar al primogénito de tu buey
  lexicon: HALOT
  rationale: עבד aquí indica usar para labor. 'Trabajarás con' sigue de cerca el valor instrumental del hebreo y evita imputar al animal el papel gramatical de agente. 'Buey' traduce שׁוֹר en este contexto agrario.
- source_word: וְלֹא תָגֹז בְּכוֹר צֹאנֶךָ
  english_pob_choice: nor shear the firstborn of your flock
  chosen_spanish: ni esquilarás el primogénito de tu rebaño
  alternatives_spanish:
  - ni cortarás la lana del primogénito de tu rebaño
  - ni trasquilarás el primogénito de tu rebaño
  lexicon: HALOT
  rationale: גזז significa esquilar. 'Esquilar' es preciso y bíblicamente claro; 'rebaño' mantiene צאן sin reducirlo solo a ovejas.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se aplica la norma del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal. Esto preserva el nombre del pacto y evita el ocultamiento con un título genérico.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se siguió el auditoría inglesa de equivalencia óptima: distributivo singular de כָּל, pasivo de יִוָּלֵד, distinción ganados/rebaño, valor cultual de קדש, y las dos prohibiciones con עבד y גזז. No hubo revisiones aplicadas en el tramo inglés, y la versión española conserva esas decisiones sin suavizar la tensión léxica de ''trabajar con'' ni el nombre divino.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto.
  - '''Primogénito'' se usa de forma consistente para בכור en ambos miembros.'
  - '''Ganado''/''rebaño'' conserva la distinción entre בקר y צאן.'
  - '''Consagrar'' y ''esquilar'' mantienen registro cultual y agrícola claro.'
  - La negación doble se traduce con 'No... ni...' para reproducir la estructura coordinada del hebreo.
