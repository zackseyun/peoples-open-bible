  revision_rationale: Se corrige שְׁמוֹת a 'nombres' para mantener fidelidad léxica al hebreo y al rastro POB; se corrige la gramática a 'cuyas manos'; y se ajusta 'fueron llenadas' a 'fueron llenas' para un español más natural, conservando el modismo de ordenación visible en el texto principal con la nota explicativa.
