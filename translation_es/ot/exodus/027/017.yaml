base_translation:
  language: en
  yaml_path: translation/ot/exodus/027/017.yaml
  text: All the pillars around the courtyard shall be banded with silver[c][b][a], with their hooks of silver and their bases of bronze.
  footnotes:
  - marker: a
    text: Or 'joined with silver rods' or, in older English, 'filleted with silver.' The Hebrew term refers to the silver banding or connecting work on the pillars.
    reason: lexical_alternative
  - marker: b
    text: Or 'their sockets.' The Hebrew can refer to the metal bases into which the pillars were set.
    reason: lexical_alternative
  - marker: c
    text: '''Bronze'' may also be rendered ''copper,'' since the Hebrew term can cover copper or copper-alloy metal in ancient usage.'
    reason: lexical_alternative
