translation:
  language: es
  text: No robes al pobre porque es pobre, ni aplastes al afligido en la puerta[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, en la puerta de la ciudad, donde comúnmente se resolvían los casos legales y los juicios públicos.
    reason: cultural_note
  - marker: b
    text: 'O: «no oprimas al pobre ... ni aplastes al necesitado en el tribunal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְזָל
  english_pob_choice: rob
  chosen_spanish: robes
  alternatives_spanish:
  - despojes
  - saquees
  - robes por la fuerza
  lexicon: HALOT
  rationale: גזל expresa tomar algo por la fuerza o mediante apropiación injusta. En español, «robar» conserva bien esa fuerza jurídica y ética, y encaja naturalmente con el mandato prohibitivo.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el débil
  lexicon: HALOT
  rationale: דָּל describe a una persona baja en condición social o económica. «El pobre» es la opción más directa y comprensible en español, y mantiene la razón dada en la cláusula causal.
- source_word: כִּי דַל הוּא
  english_pob_choice: because he is poor
  chosen_spanish: porque es pobre
  alternatives_spanish:
  - pues es pobre
  - porque es necesitado
  lexicon: HALOT
  rationale: La partícula כִּי introduce aquí la causa. El español «porque es pobre» reproduce con claridad la motivación injusta que el proverbio denuncia y conserva la repetición enfática de la raíz d-l.
- source_word: תְּדַכֵּא
  english_pob_choice: crush
  chosen_spanish: aplastes
  alternatives_spanish:
  - oprimas
  - tritures
  lexicon: HALOT
  rationale: דכא en piel comunica la idea de aplastar, quebrantar u oprimir con violencia. «Aplastes» mantiene la imagen vívida del hebreo y su severidad moral, sin volverlo demasiado abstracto.
- source_word: עָנִי
  english_pob_choice: the afflicted
  chosen_spanish: el afligido
  alternatives_spanish:
  - el pobre
  - el necesitado
  - el oprimido
  lexicon: HALOT
  rationale: עָנִי puede destacar pobreza, aflicción o vulnerabilidad. «El afligido» conserva la distinción respecto de דָּל y refleja bien el matiz de persona golpeada por la necesidad o la injusticia.
- source_word: בַשָּׁעַר
  english_pob_choice: at the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en la puerta del juicio
  - en el tribunal
  lexicon: HALOT
  rationale: El hebreo alude al lugar público de juicio y administración. «En la puerta» es literal y natural en español; la nota explica su valor forense sin cargar el texto principal.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y que no eran necesarios cambios. Se conservó esa lectura, ajustando solo la formulación española para mantener naturalidad idiomática y fidelidad semántica al hebreo.
  spanish_consistency_notes:
  - 'Se mantuvo la distinción entre דָּל y עָנִי: «el pobre» / «el afligido».'
  - Se prefirió el verbo «aplastes» para conservar la fuerza metafórica de דכא.
  - La nota cultural explica que «la puerta» funciona como espacio judicial, sin sustituir el texto principal por una paráfrasis.
  - La redacción usa el imperativo negativo de segunda persona singular de manera sobria y directa, acorde con el proverbio.
