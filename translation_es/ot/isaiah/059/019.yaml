translation:
  language: es
  text: Entonces temerán el nombre de Yahvé desde el occidente, y su gloria desde la salida del sol[a]; porque vendrá como un río impetuoso[c][b], impulsado por el aliento de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «desde el este». Literalmente, «desde la salida del sol».
    reason: lexical_alternative
  - marker: b
    text: El hebreo de la cláusula final es difícil. O, «porque vendrá como un río impetuoso, impulsado por el Espíritu de Yahvé».
    reason: alternative_reading
  - marker: c
    text: 'Traducción tradicional: «cuando venga el enemigo como una inundación, el Espíritu de Yahvé levantará bandera contra él». Esto refleja una distinta construcción del hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִירְאוּ
  english_pob_choice: So they will fear
  chosen_spanish: Entonces temerán
  alternatives_spanish:
  - Y temerán
  - Así temerán
  lexicon: HALOT
  rationale: El verbo expresa temor reverente; en español, «temerán» conserva ese peso. «Entonces» reproduce naturalmente la relación discursiva de consecuencia que el inglés POB marcó con «So».
- source_word: מִמַּעֲרָב
  english_pob_choice: from the west
  chosen_spanish: desde el occidente
  alternatives_spanish:
  - desde el oeste
  - desde el poniente
  lexicon: HALOT
  rationale: El término designa el oeste o lugar de la puesta del sol. «Occidente» es claro, digno y mantiene el paralelismo poético con la segunda mitad del versículo.
- source_word: אֶת שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahweh
  - el nombre de YHWH
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma base del proyecto, «Yahvé». «Nombre» mantiene el valor bíblico de identidad revelada y reputación.
- source_word: וּמִמִּזְרַח שֶׁמֶשׁ
  english_pob_choice: from the rising of the sun
  chosen_spanish: desde el nacimiento del sol
  alternatives_spanish:
  - desde la salida del sol
  - desde donde sale el sol
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «desde el nacimiento/salida del sol». «Nacimiento del sol» preserva la imagen poética sin reducirla a un simple punto cardinal.
- source_word: אֶת כְּבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su honor
  lexicon: HALOT
  rationale: «Gloria» es la equivalencia más directa y teológicamente cargada para כָּבוֹד en este contexto de revelación divina.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la reacción universal; «porque» es la opción más natural y explícita en español.
- source_word: יָבֹא
  english_pob_choice: he will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - él vendrá
  - vendrá él
  - vendrá ello
  lexicon: HALOT
  rationale: El verbo es singular, pero el referente inmediato del final del versículo es sintácticamente difícil. En español, «vendrá» conserva la ambigüedad sin forzar un sujeto explícito que el hebreo no formula claramente.
- source_word: כַנָּהָר
  english_pob_choice: like a rushing river
  chosen_spanish: como un río impetuoso
  alternatives_spanish:
  - como un río
  - como un torrente
  lexicon: HALOT
  rationale: נהר es «río»; «impetuoso» comunica el carácter vigoroso del símil y evita introducir la lectura tradicional de «flood» que el texto hebreo no expresa de forma directa.
- source_word: צָר
  english_pob_choice: rushing
  chosen_spanish: impetuoso
  alternatives_spanish:
  - apremiante
  - estrecho
  lexicon: HALOT
  rationale: El término es difícil y probablemente describe la fuerza o presión del avance. «Impetuoso» es una solución española natural que mantiene la idea de movimiento enérgico sin fijar indebidamente el matiz exacto.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the breath of Yahweh
  chosen_spanish: el aliento de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el viento de Yahvé
  lexicon: HALOT
  rationale: רוּחַ admite «aliento, viento, espíritu». En esta imagen poética, «aliento» preserva el registro concreto elegido por el POB inglés y deja abierta la resonancia teológica.
- source_word: נֹסְסָה בוֹ
  english_pob_choice: driven by
  chosen_spanish: impulsado por
  alternatives_spanish:
  - llevado por
  - empujado por
  - levantando estandarte contra él
  lexicon: HALOT
  rationale: La cláusula final es textual y léxicamente difícil. «Impulsado por» expresa el sentido de avance provocado por el aliento de Yahvé sin inventar el detalle de un enemigo ni adoptar una reconstrucción más interpretativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El proyecto español establece «Yahvé» como forma principal para el Tetragrámaton. Se evita la sustitución por «SEÑOR» para conservar el nombre personal divino, siguiendo la política del proyecto y el audit trail en inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de רוּחַ יְהוָה
  english_pob_reading: the breath of Yahweh
  chosen_spanish_reading: el aliento de Yahvé
  alternative_spanish_readings:
  - el Espíritu de Yahvé
  - el viento de Yahvé
  rationale: El inglés POB optó por «breath» para mantener la metáfora concreta del movimiento. En español, «aliento» reproduce bien esa concreción y conserva la posibilidad de resonancia con «espíritu» sin resolverla prematuramente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Interpretación de la cláusula final difícil
  english_pob_reading: a divine advance like a rushing river, driven by the breath of the LORD
  chosen_spanish_reading: un avance divino como río impetuoso, impulsado por el aliento de Yahvé
  alternative_spanish_readings:
  - el enemigo vendrá como una inundación; el Espíritu de Yahvé levantará bandera contra él
  - vendrá como un río arrasador
  rationale: El hebreo no nombra explícitamente a un enemigo y la sintaxis permite más de una constricción. La versión principal sigue la lectura más directa del texto fuente y conserva la dificultad sin adoptar la reconstrucción tradicional que depende de una lectura distinta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje se mantiene alineado con la última revisión auditada, que no introdujo cambios. Se preserva la ambigüedad de la cláusula final y la elección del nombre divino conforme al marco doctrinal del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, en línea con la terminología del proyecto.
  - Se prefirió «aliento» para רוּחַ יְהוָה siguiendo la lectura poética concreta del POB en inglés, sin excluir la alternativa «Espíritu» en nota.
  - 'Se mantuvo el paralelismo occidental/oriental con expresiones naturales en español: «occidente» / «nacimiento del sol».'
  - Se evitó introducir «SEÑOR» o una paráfrasis interpretativa del enemigo, para no borrar la tensión textual documentada.
