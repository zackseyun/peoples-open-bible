base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/003.yaml
  text: Now Ahijah son of Ahitub[a], brother of Ichabod, son of Phinehas, son of Eli, priest of Yahweh at Shiloh, was carrying an ephod. And the people did not know that Jonathan had gone.
  footnotes:
