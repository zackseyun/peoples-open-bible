translation:
  language: es
  text: En el tercer mes, después de que los hijos de Israel[a] salieron de la tierra de Egipto, en este mismo día[b] llegaron al desierto de Sinaí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'O «en este día». La frase puede enfatizar el día exacto de su llegada: «en este mismo día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הַשְּׁלִישִׁי
  english_pob_choice: in the third month
  chosen_spanish: en el tercer mes
  alternatives_spanish:
  - en el tercer novilunio/mes
  lexicon: HALOT
  rationale: חֹדֶשׁ en fórmulas cronológicas designa normalmente «mes». «En el tercer mes» es natural en español y conserva el marco temporal del hebreo sin añadir elementos no presentes.
- source_word: לְצֵאת
  english_pob_choice: after ... had gone out
  chosen_spanish: después que ... habían salido
  alternatives_spanish:
  - cuando ... salieron
  - al salir de
  lexicon: HALOT
  rationale: El infinitivo constructo con ל marca el punto temporal de referencia. En español, «después que habían salido» expresa con claridad la anterioridad respecto al momento narrado, manteniendo el valor temporal que la POB inglesa refleja con «after ... had gone out».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos/descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación más transparente al hebreo y la preferencia de la POB por la designación masculina plural del pueblo del pacto. En español, «hijos de Israel» es natural y auditable, sin borrar la forma fuente.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra egipcia
  - de Egipto
  lexicon: HALOT
  rationale: אֶרֶץ está explícito y conviene no omitirlo. «Tierra de Egipto» preserva el sustantivo territorial del hebreo y resulta idiomático en español bíblico contemporáneo.
- source_word: בַּיּוֹם הַזֶּה
  english_pob_choice: on this very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en este día
  - en ese mismo día
  lexicon: HALOT
  rationale: El demostrativo «este» está explícito y la POB subraya la fuerza enfática con «very». «En este mismo día» reproduce bien ese énfasis sin sonar forzado en español.
- source_word: בָּאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - vinieron y llegaron
  lexicon: HALOT
  rationale: בוא puede traducirse como «venir/llegar». Aquí «llegaron» encaja mejor con el movimiento hacia el desierto de Sinaí y sigue siendo una equivalencia directa y sobria.
- source_word: מִדְבַּר סִינָי
  english_pob_choice: the wilderness of Sinai
  chosen_spanish: el desierto de Sinaí
  alternatives_spanish:
  - el desierto/sendero desértico de Sinaí
  - la estepa de Sinaí
  lexicon: HALOT
  rationale: מִדְבָּר designa un territorio de desierto o despoblado; «desierto de Sinaí» es una opción clara y ampliamente comprensible en español, manteniendo la relación constructa.
theological_decisions:
- issue: 'Designación del pueblo: בְּנֵי יִשְׂרָאֵל'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: No hay disputa doctrinal, pero sí una decisión de transparencia textual. Se conserva la designación masculina plural del hebreo, alineada con la política de precisión del proyecto y sin sustituirla por un etnónimo menos literal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Énfasis temporal de בַּיּוֹם הַזֶּה
  english_pob_reading: on this very day
  chosen_spanish_reading: en este mismo día
  alternative_spanish_readings:
  - en este día
  - aquel mismo día
  rationale: La lectura enfatiza la exactitud del momento de llegada. En español, «este mismo día» conserva ese matiz enfático y evita desplazar el deíctico a una referencia pasada más débil.
  doctrine_reference: Notas de equivalencia óptima y transparencia temporal
translation_notes:
  revision_awareness: 'La POB inglesa conserva dos decisiones relevantes: (1) el valor literal de בְּנֵי יִשְׂרָאֵל como «the sons of Israel»; (2) el énfasis de בַּיּוֹם הַזֶּה como «on this very day». La versión española sigue ambas decisiones con formulación natural y evita notas innecesarias porque no hay ambigüedad residual que requiera anclaje tipográfico.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia temporal del hebreo sin convertirla en una paráfrasis narrativa más amplia.
  - «Tierra de Egipto» preserva el sustantivo אֶרֶץ que el texto hebreo incluye explícitamente.
  - «Desierto de Sinaí» mantiene el sustantivo geográfico sin introducir matices interpretativos adicionales.
  - No se usó «SEÑOR» ni terminología de sustitución, porque el versículo no contiene el Tetragrámaton ni un problema de nombre divino.
