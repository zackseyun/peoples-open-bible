translation:
  language: es
  text: En la asamblea de los impíos[a], el fuego arde; y entre una nación impía se enciende la ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «entre una nación desobediente, se encendió la ira». El hebreo dice «nación impía».'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲדַת / ἐν συναγωγῇ
  english_pob_choice: In the assembly of
  chosen_spanish: En la asamblea de
  alternatives_spanish:
  - En la congregación de
  - En el conjunto de
  lexicon: HALOT; LXX συναγωγή
  rationale: El sustantivo señala una reunión o comunidad reunida; con la preposición locativa, el sentido es 'en'. 'Asamblea' es natural en español y conserva tanto el hebreo como el griego.
- source_word: רְשָׁעִים / ἁμαρτωλῶν
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los pecadores
  - los culpables
  lexicon: HALOT; LXX ἁμαρτωλός
  rationale: El hebreo y el griego apuntan a una clase moralmente culpable. 'Impíos' mantiene el matiz religioso-moral y funciona bien en español bíblico contemporáneo.
- source_word: יוֹקֶדֶת אֵשׁ / ἐκκαυθήσεται πῦρ
  english_pob_choice: fire burns
  chosen_spanish: arde fuego
  alternatives_spanish:
  - el fuego arde
  - un fuego arde
  - el fuego se enciende
  lexicon: HALOT; LXX ἐκκαίω
  rationale: La imagen es de fuego que arde intensamente. 'Arde fuego' suena más natural en español que una construcción pasiva, y conserva el dinamismo del verbo.
- source_word: וּבְגוֹי / ἐν ἔθνει
  english_pob_choice: among a ... nation
  chosen_spanish: entre una nación
  alternatives_spanish:
  - en una nación
  - en medio de una nación
  - entre un pueblo
  lexicon: HALOT; LXX ἔθνος
  rationale: El hebreo y el griego tienen un valor locativo. 'Entre' comunica bien la idea de que la ira se desata dentro de ese colectivo.
- source_word: חָנֵף / ἀπειθεῖ
  english_pob_choice: godless
  chosen_spanish: impía
  alternatives_spanish:
  - sin Dios
  - irreverente
  - desobediente
  lexicon: HALOT; LXX ἀπειθής
  rationale: Se preserva la lectura principal del hebreo, pero en español conviene concordar con 'nación'. 'Impía' mantiene la carga religiosa. La alternativa griega 'desobediente' se conserva en nota.
- source_word: נִצְּתָה חֵמָה / ἐξεκαύθη ὀργή
  english_pob_choice: wrath is kindled
  chosen_spanish: se enciende la ira
  alternatives_spanish:
  - se enciende la cólera
  - la ira se inflama
  - arde la ira
  lexicon: HALOT; LXX ὀργή
  rationale: La metáfora de encender/avivar la ira se reproduce con una formulación idiomática en español. 'Ira' es el equivalente más directo de חֵמָה / ὀργή.
theological_decisions:
- issue: Elegir el matiz moral principal para חָנֵף frente a la alternativa griega ἀπειθεῖ
  english_pob_reading: godless nation
  chosen_spanish_reading: nación impía
  alternative_spanish_readings:
  - nación desobediente
  - nación sin Dios
  rationale: Como el hebreo está disponible y es la base primaria de este versículo en Sirácida, se mantiene su sentido religioso-moral. La alternativa griega se preserva como variante en nota para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: prioritize extant Hebrew for Sirach while preserving meaningful Greek alternatives'
- issue: Conservar la metáfora del juicio divino en términos de fuego e ira
  english_pob_reading: fire burns; ... wrath is kindled
  chosen_spanish_reading: arde fuego; ... se enciende la ira
  alternative_spanish_readings:
  - el fuego arde; ... la ira se inflama
  - fuego arde; ... ira se enciende
  rationale: 'La imagen no se explica ni se suaviza: se deja como metáfora de juicio, coherente con el paralelismo hebreo y griego.'
  doctrine_reference: Proverbial/judgment imagery in wisdom literature
translation_notes:
  revision_awareness: 'Alineado con el control de revisión más reciente: sin cambios necesarios; el borrador mantiene la preferencia por el hebreo con la alternativa griega preservada en nota.'
  spanish_consistency_notes:
  - Se usa 'impíos/impía' para mantener el campo semántico de רְשָׁעִים / חָנֵף.
  - Se mantiene 'ira' como equivalente de חֵמָה / ὀργή para consistencia interna.
  - La nota a preserva la tensión entre el hebreo ('impía') y el griego ('desobediente') sin fusionarlos en el cuerpo principal.
