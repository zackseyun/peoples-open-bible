review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la secuencia temporal («cuando»), la postura animal de יָשֹׁחוּ («se agazapan»), y preserva los dos verbos hebreos («se agazapan» / «se sientan»). También refleja correctamente בַסֻּכָּה como cobertura natural y mantiene la nota léxica alternativa. Sin embargo, «cuevas» para בַמְּעוֹנוֹת es menos fiel al sentido general de guaridas/dens y puede sonar demasiado específico; y «para una emboscada» es algo poco idiomático en español en este contexto, donde «al acecho» o «para acechar» comunica mejor לְמוֹ אָרֶב sin perder el propósito.
  spanish_quality_summary: El español es en general claro y digno, pero «se sientan en la maleza para una emboscada» suena algo rígido y poco natural. «Guaridas» encaja mejor con el registro zoológico y «al acecho» mejora la fluidez sin borrar el paralelismo poético. La puntuación interrogativa también debe ajustarse al español con signo de apertura.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son sólidas. La revisión propuesta afina la fidelidad de מְעוֹנוֹת como «guaridas» y la naturalidad de לְמוֹ אָרֶב como «al acecho», manteniendo la nota sobre סֻכָּה.
  issues:
  - severity: medium
    issue: «cuevas» para בַמְּעוֹנוֹת
    rationale: El hebreo se refiere más ampliamente a guaridas/lugares de habitación de animales. «Cuevas» restringe innecesariamente la imagen y no es la mejor equivalencia para el contexto de leones.
  - severity: medium
    issue: «para una emboscada» suena poco idiomático
    rationale: Aunque reproduce de cerca el sustantivo «emboscada», en español la expresión resultante es forzada. «Al acecho» transmite mejor la finalidad de לְמוֹ אָרֶב en lenguaje natural y bíblico legible.
  - severity: low
    issue: Falta el signo inicial de interrogación
    rationale: Al ser una pregunta retórica en español, debe llevar «¿» al inicio.
  revised_spanish_text: ¿cuando ellos se agazapan en sus guaridas y se sientan en la maleza[a] al acecho?
