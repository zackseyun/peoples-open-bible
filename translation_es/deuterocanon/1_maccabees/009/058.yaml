  rationale: Se ajustó «se aconsejaron» a «tomaron consejo» por mejor naturalidad en español; «traeremos» a «traigamos» para reflejar la fuerza exhortativa de ἄξομεν; «Bákides» a «Báquides» por forma española más legible; y se hizo más idiomática la cláusula central con «viven tranquilos y confiados», conservando la alternativa más literal en nota al pie.
