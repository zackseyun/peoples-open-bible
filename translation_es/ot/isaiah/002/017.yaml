translation:
  language: es
  text: La altivez del hombre será abatida[a], y la exaltación de los hombres será humillada; y solo Yahvé será exaltado en aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La altivez del hombre será humillada, y el orgullo de los hombres será abatido». El hebreo usa imágenes de altura para la arrogancia humana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁח
  english_pob_choice: will be brought low
  chosen_spanish: será abatida
  alternatives_spanish:
  - será humillada
  - será bajada
  lexicon: HALOT
  rationale: El verbo expresa una caída/bajada de lo alto. «Será abatida» conserva la imagen de descenso y funciona bien con el paralelo siguiente. Aunque el inglés POB opta por una equivalencia idiomática, el español aquí mantiene con claridad la metáfora vertical del hebreo.
- source_word: גַּבְהוּת
  english_pob_choice: loftiness
  chosen_spanish: altivez
  alternatives_spanish:
  - altura
  - soberbia
  lexicon: HALOT
  rationale: El sustantivo combina altura literal e implicación de orgullo. «Altivez» conserva el matiz de elevación arrogante sin perder la imagen espacial; «altura» sería más literal pero menos natural en español en este contexto.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la persona
  lexicon: HALOT
  rationale: Se conserva el singular genérico masculino del hebreo para mantener el paralelismo con el plural posterior y la forma retórica del texto. «El hombre» reproduce mejor la tensión del pasaje que una neutralización generalizante.
- source_word: וְשָׁפֵל
  english_pob_choice: will be humbled
  chosen_spanish: será humillada
  alternatives_spanish:
  - será abatida
  - será hecha baja
  lexicon: HALOT
  rationale: La idea es de quedar rebajada desde una posición elevada. «Será humillada» comunica bien el resultado y mantiene el paralelo con el primer miembro; la forma pasiva refleja la fuerza del hebreo sin forzar el español.
- source_word: רוּם
  english_pob_choice: exaltation
  chosen_spanish: exaltación
  alternatives_spanish:
  - altura
  - orgullo
  lexicon: HALOT
  rationale: «Exaltación» preserva la metáfora de altura y el contraste con la humillación previa. Aunque puede sonar más abstracto que «orgullo», es la equivalencia más directa para el sustantivo en este contexto.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los mortales
  lexicon: HALOT
  rationale: Se mantiene el plural humano masculino del hebreo para sostener el paralelismo con «el hombre». «Los hombres» es natural en español y conserva la correspondencia formal con el texto fuente.
- source_word: וְנִשְׂגַּב
  english_pob_choice: will be exalted
  chosen_spanish: será exaltado
  alternatives_spanish:
  - será puesto en alto
  - será levantado
  lexicon: HALOT
  rationale: El nifal expresa ser puesto en alto o ser exaltado. «Será exaltado» es la opción más clara y solemne en español, y enlaza bien con la inversión de los dos miembros anteriores.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del POB en español de usar «Yahvé» para el Tetragrámaton, manteniendo el nombre divino personal sin sustituirlo por un título.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por sí solo
  lexicon: HALOT
  rationale: '«Solo» comunica exclusividad de forma breve y natural. En español el adverbio funciona bien con «será exaltado» y preserva la intención del hebreo: nadie más compartirá esa exaltación.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: HALOT
  rationale: Se conserva la fórmula profética tradicional con una forma natural en español. «Aquel día» mantiene el valor escatológico y deíctico del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La decisión doctrinal del POB es no enmascarar el Tetragrámaton. En español, «Yahvé» es la forma adoptada para preservar el nombre personal de Dios revelado a Israel, en lugar de sustituirlo por «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Paralelismo antropológico de הָאָדָם / אֲנָשִׁים
  english_pob_reading: man ... men
  chosen_spanish_reading: el hombre ... los hombres
  alternative_spanish_readings:
  - la humanidad ... las personas
  - la humanidad ... los mortales
  rationale: El hebreo usa un singular genérico seguido de un plural humano para reforzar el contraste con Yahvé. La traducción conserva esa forma para no neutralizar la retórica ni diluir la tensión entre la altivez humana y la exaltación exclusiva de Dios.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם *adam*'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés. Se conserva la inversión vertical del pasaje, el paralelismo entre singular y plural humanos, y la exclusividad final de Yahvé. No se registran revisiones posteriores en el expediente; el pasaje muestra alto acuerdo en la verificación cruzada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del proyecto para יְהוָה.
  - «El hombre / los hombres» conserva el paralelismo y la genericidad del hebreo.
  - «Altivez / exaltación» reproduce la imaginería de altura sin volverla meramente psicológica.
  - La nota al pie ofrece una alternativa léxica legítima sin alterar el texto principal.
