    text: Literalmente «a sus pies»; la expresión hebrea también puede referirse más ampliamente al área de sus pies o de la parte baja de sus piernas.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para mayor naturalidad ('se dio vuelta') y se restituye la nota léxica importante sobre 'a sus pies', que el borrador había desplazado indebidamente a 'he aquí'. También se suaviza el orden de la frase para un español más fluido sin perder la progresión narrativa del hebreo.
