translation:
  language: es
  text: —Mira[a], la plata que hallamos en la boca de nuestros sacos te la devolvimos de la tierra de Canaán. ¿Y cómo podríamos robar plata o oro de la casa de tu señor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la boca de nuestros sacos», un modismo para la abertura o la parte superior de un saco.'
    reason: cultural_note
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Observa
  - Fíjate
  lexicon: HALOT
  rationale: La partícula introduce una apelación enfática al oyente; «Mira» reproduce esa atención inmediata en español moderno sin caer en un arcaísmo como «he aquí».
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - monedas
  - dinero de plata
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «plata», en este verso la referencia es al pago devuelto; «dinero» comunica la función monetaria en español con naturalidad. Aun así, se mantiene «plata» más adelante para preservar el contraste léxico con «oro».
- source_word: בְּפִי אַמְתְּחֹתֵינוּ
  english_pob_choice: in the mouths of our sacks
  chosen_spanish: en la boca de nuestros costales
  alternatives_spanish:
  - en la boca de nuestros sacos
  - en la abertura de nuestros costales
  - en la parte superior de nuestros sacos
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea «en la boca de» para no borrar la metáfora concreta. «Costales» es una opción natural en español para los sacos de viaje/grano y evita la pesadez de una paráfrasis explicativa en el cuerpo del texto.
- source_word: הֱשִׁיבֹנוּ אֵלֶיךָ
  english_pob_choice: we brought back to you
  chosen_spanish: lo devolvimos a ti
  alternatives_spanish:
  - te lo devolvimos
  - lo regresamos a ti
  - te lo regresamos
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer volver/volver a llevar; «devolver» conserva bien ese sentido y suena natural en español. Se explicita el objeto implícito por el contexto («el dinero»).
- source_word: מֵאֶרֶץ כְּנָעַן
  english_pob_choice: from the land of Canaan
  chosen_spanish: desde la tierra de Canaán
  alternatives_spanish:
  - de la tierra de Canaán
  - desde el país de Canaán
  lexicon: HALOT
  rationale: «Desde» refleja el movimiento de retorno desde Canaán hacia Egipto y da una continuidad más idiomática en español que el simple «de».
- source_word: וְאֵיךְ נִגְנֹב
  english_pob_choice: So how could we steal
  chosen_spanish: ¿Y cómo podríamos robar?
  alternatives_spanish:
  - ¿Cómo entonces podríamos robar?
  - ¿Y cómo vamos a robar?
  - ¿Cómo podríamos robar?
  lexicon: HALOT
  rationale: La forma interrogativa retórica en español transmite la fuerza argumentativa del hebreo; se omite el objeto para no repetir innecesariamente la idea ya explicada y porque el contexto inmediatamente siguiente la especifica.
- source_word: מִבֵּית אֲדֹנֶיךָ
  english_pob_choice: from your master's house
  chosen_spanish: de la casa de tu señor
  alternatives_spanish:
  - de la casa de tu amo
  - del hogar de tu señor
  - de la casa de tu dueño
  lexicon: HALOT
  rationale: En español «señor» es la forma más natural y respetuosa para el superior humano de la escena, mientras que «amo» puede sonar más duro o esclavista de lo que exige este contexto. Se mantiene «casa» como metonimia del ámbito/propiedad de José.
- source_word: כֶּסֶף אוֹ זָהָב
  english_pob_choice: silver or gold
  chosen_spanish: plata u oro
  alternatives_spanish:
  - dinero u oro
  - plata o oro
  - metal precioso u oro
  lexicon: HALOT
  rationale: Se conserva el paralelismo material del hebreo y el contraste con «oro». En español se usa «plata» para seguir la imagen concreta del texto y evitar que se diluya la repetición de כסף.
theological_decisions:
- issue: Tratamiento de אֲדֹנֶיךָ en un contexto humano
  english_pob_reading: your master's house
  chosen_spanish_reading: la casa de tu señor
  alternative_spanish_readings:
  - la casa de tu amo
  - la casa de tu dueño
  rationale: No se trata del título divino, sino de José como superior humano. «Señor» evita confusión con la denominación de Yahvé y mantiene un registro digno, coherente con la escena de corte/administración.
  doctrine_reference: No doctrinal issue; contextual social title.
translation_notes:
  revision_awareness: El auditorio inglés mantuvo la imagen concreta de «in the mouths of our sacks» y eligió una solución idiomática. La versión española conserva la metáfora en la nota y ajusta el cuerpo del texto para que suene natural sin perder el dato cultural. También se respeta el contraste léxico de plata/oro y la fuerza retórica de la pregunta final.
  spanish_consistency_notes:
  - 'Se mantuvo el orden argumentativo del hebreo: afirmación del retorno del dinero, procedencia desde Canaán y conclusión retórica de imposibilidad de robo.'
  - Se conservó la imagen de la «boca» del saco en el texto, no solo en la nota, para evitar aplanar la metáfora.
  - «Señor» se usa solo para el superior humano aquí; no implica sustitución de Yahvé en otros contextos.
  - La elección de «plata» en el cierre preserva el eco con el objeto inicialmente devuelto, mientras «dinero» en la primera cláusula mejora la fluidez del español sin borrar la referencia material.
