translation:
  language: es
  text: Y los entregamos a la destrucción[a], tal como habíamos hecho a Sehón, rey de Hesbón, destruyendo por completo cada ciudad habitada, con las mujeres y los pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los pusimos bajo el ḥerem»; el hebreo usa el verbo חרם, un término técnico para dedicar algo o a alguien a destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנַּחֲרֵם
  english_pob_choice: we devoted them to destruction
  chosen_spanish: los entregamos a la destrucción
  alternatives_spanish:
  - los dedicamos a la destrucción
  - los pusimos bajo el ḥerem
  - los destruimos por completo
  lexicon: HALOT
  rationale: El verbo חרם en este contexto técnico de guerra santa expresa poner personas o cosas bajo ḥerem, es decir, dedicar algo a destrucción total. En español, «entregarlos a la destrucción» conserva mejor la fuerza técnica y la idea de consagración al juicio que un simple «destruirlos».
- source_word: כַּאֲשֶׁר עָשִׂינוּ
  english_pob_choice: just as we had done
  chosen_spanish: tal como habíamos hecho
  alternatives_spanish:
  - como habíamos hecho
  - tal como hicimos
  lexicon: HALOT
  rationale: El valor retrospectivo del verbo en contexto narrativo queda bien reflejado con el pluscuamperfecto «habíamos hecho», que mantiene la relación de anterioridad respecto de la acción principal.
- source_word: לְסִיחֹן מֶלֶךְ חֶשְׁבּוֹן
  english_pob_choice: to Sihon king of Heshbon
  chosen_spanish: con Sehón, rey de Hesbón
  alternatives_spanish:
  - contra Sehón, rey de Hesbón
  - a Sehón, rey de Hesbón
  lexicon: HALOT
  rationale: La preposición ל tras עשה puede marcar al objeto afectado; en español, la construcción más natural y fiel al contexto es «con» en el sentido de relación con el caso de Sehón. Se conserva el nombre propio en forma usual castellana «Sehón».
- source_word: הַחֲרֵם
  english_pob_choice: utterly destroying
  chosen_spanish: destruimos por completo
  alternatives_spanish:
  - destruíamos por completo
  - destruimos totalmente
  - devastamos por completo
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la acción previa de חרם. «Destruimos por completo» comunica en español la totalidad y el énfasis sin sonar rígido o redundante.
- source_word: כָּל עִיר
  english_pob_choice: every inhabited city
  chosen_spanish: cada ciudad habitada
  alternatives_spanish:
  - toda ciudad habitada
  - cada ciudad poblada
  - toda ciudad poblada
  lexicon: HALOT
  rationale: La revisión inglesa entiende מְתִם como «inhabited»; por eso se refleja como «habitada», conservando la modificación del sustantivo y la idea de ciudades con población.
- source_word: מְתִם
  english_pob_choice: inhabited
  chosen_spanish: habitada
  alternatives_spanish:
  - poblada
  - con habitantes
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente remite a «hombres» en un sentido distributivo, la lectura auditada del POB lo toma idiomáticamente como «habitada». En español, «habitada» reproduce esa interpretación sin perder el contraste con «las mujeres y los pequeños».
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las mujeres adultas
  lexicon: HALOT
  rationale: Correspondencia directa y transparente para el sustantivo hebreo.
- source_word: וְהַטָּף
  english_pob_choice: the little ones
  chosen_spanish: los pequeños
  alternatives_spanish:
  - los niños pequeños
  - los niños
  - los menores
  lexicon: HALOT
  rationale: טף se refiere a los niños pequeños o dependientes. «Los pequeños» conserva la brevedad y la intensidad del original mejor que una expansión más interpretativa.
theological_decisions:
- issue: Lenguaje de ḥerem en un contexto de juicio bélico
  english_pob_reading: Use 'devoted to destruction' in the main clause, with the following infinitive rendered 'utterly destroying' for readable English while preserving the technical and severe force of the Hebrew.
  chosen_spanish_reading: Usar «los entregamos a la destrucción» en la cláusula principal y «destruimos por completo» para el infinitivo absoluto, manteniendo el carácter técnico y severo del ḥerem.
  alternative_spanish_readings:
  - los destruimos completamente
  - los pusimos bajo el ban
  - los dedicamos al exterminio
  rationale: La traducción no debe suavizar la severidad del juicio ni ocultar el término técnico. «Entregar a la destrucción» conserva la idea de consagración al juicio; el complemento intensivo «por completo» refleja el absoluto hebreo sin perder legibilidad en español.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que interpreta מְתִם idiomáticamente como «inhabited» y no como «men»; por eso la frase se traduce como «cada ciudad habitada», manteniendo luego la mención explícita de «las mujeres y los pequeños».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, según la terminología del proyecto, aunque en este versículo no aparece.
  - «Sehón» y «Hesbón» siguen la forma castellana habitual para los nombres propios bíblicos.
  - Se evita «SEÑOR» como sustituto teológico, y no hay otros términos que requieran nota doctrinal adicional en este versículo.
