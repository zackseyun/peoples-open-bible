translation:
  language: es
  text: Y haré que personas[a]—mi pueblo Israel—pasen sobre ti, y ellas te poseerán, y tú serás su herencia[b], y ya no volverás a privarlos de hijos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'haré venir gente sobre ti, mi pueblo Israel'. El hebreo literalmente dice 'haré que אדם camine sobre ti', usando un singular colectivo que aquí se explica como 'mi pueblo Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'te heredarán'. El verbo puede significar 'poseer' o 'heredar' en contextos de tierra.
    reason: lexical_alternative
  - marker: c
    text: O 'despojarlos de hijos' / 'hacerlos quedar sin hijos'. El verbo puede aludir a dejar a alguien sin descendencia o privarlo de sus hijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹלַכְתִּי
  english_pob_choice: I will cause ... to walk
  chosen_spanish: haré que ... pasen
  alternatives_spanish:
  - haré que ... caminen
  - los conduciré sobre ti
  lexicon: HALOT
  rationale: El hebreo en hifil es causativo. En español, 'haré que pasen' conserva la acción causativa sobre las personas que se mueven sobre la tierra, sin sonar forzado como un calco de 'causar caminar'.
- source_word: עֲלֵיכֶם
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - encima de ti
  - sobre ustedes
  lexicon: HALOT
  rationale: El destinatario es la tierra en el contexto; en español puede tratarse como singular colectivo. 'Sobre ti' reproduce la imagen espacial y el modo de ocupación/tránsito.
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: hombres[a]
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT
  rationale: Aunque el audit trail inglés opta por 'people' por el sentido colectivo, el hebreo literalmente dice 'אָדָם' en singular genérico. 'Hombres' conserva más de cerca la forma lexical sin perder el sentido corporativo, y la nota explica que el referente es colectivo.
- source_word: עַמִּי יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: mi pueblo Israel
  alternatives_spanish:
  - mi pueblo, Israel
  - mi pueblo de Israel
  lexicon: HALOT
  rationale: '''Pueblo'' expresa bien el colectivo explicado por la aposición ''Israel'' y suena natural en español bíblico contemporáneo. ''Pueblo Israel'' mantiene la relación explicativa sin añadir artículos innecesarios.'
- source_word: וִירֵשׁוּךָ
  english_pob_choice: they will possess you
  chosen_spanish: te poseerán
  alternatives_spanish:
  - te heredarán
  - tomarán posesión de ti
  lexicon: HALOT
  rationale: ירשׁ en este contexto se refiere a poseer/ocupar la tierra. 'Te poseerán' es directo y fiel; 'heredarán' o 'tomarán posesión de ti' son alternativas posibles, pero menos concisas.
- source_word: וְהָיִיתָ לָהֶם לְנַחֲלָה
  english_pob_choice: you will be their inheritance
  chosen_spanish: serás su herencia[b]
  alternatives_spanish:
  - serás para ellos como herencia
  - serás su posesión
  lexicon: HALOT
  rationale: '''Herencia'' preserva la terminología de alianza y tierra heredada. ''Serás su herencia'' suaviza la estructura hebrea manteniendo el sustantivo clave ''נַחֲלָה''.'
- source_word: וְלֹא תוֹסִף עוֹד
  english_pob_choice: you will no longer again
  chosen_spanish: ya no volverás a
  alternatives_spanish:
  - no seguirás
  - ya no continuarás
  lexicon: HALOT
  rationale: La combinación intensifica la cesación. En español, 'ya no volverás a' comunica bien la idea de que esto no se repetirá, sin necesidad de una repetición poco natural.
- source_word: לְשַׁכְּלָם
  english_pob_choice: bereave them
  chosen_spanish: privarlos de hijos[c]
  alternatives_spanish:
  - dejarlos sin hijos
  - hacerlos quedar sin hijos
  lexicon: HALOT
  rationale: El piel de שׁכל puede significar 'privar de hijos' o 'dejar sin hijos'. 'Privarlos de hijos' hace explícito el matiz del hebreo y evita que 'bereave' se entienda demasiado genéricamente.
theological_decisions:
- issue: Terminología de herencia pactal ligada a la tierra
  english_pob_reading: you will be their inheritance
  chosen_spanish_reading: serás su herencia
  alternative_spanish_readings:
  - serás para ellos como herencia
  - serás su posesión
  rationale: '''Herencia'' conserva la resonancia teológica del don de la tierra dentro del pacto, en lugar de reducir la frase a mera posesión material.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'man' a 'people' para אָדָם y eliminó 'again' por redundancia. En español se optó por mantener el valor colectivo con 'hombres' y por reproducir la intensificación de cesación mediante 'ya no volverás a', mientras se preservan 'herencia' y el sentido de 'privar de hijos' en una formulación natural.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito solo donde el verso no lo contiene explícitamente; aquí el sujeto divino se expresa con la primera persona del discurso profético.
  - '''Herencia'' se usó para נַחֲלָה por coherencia con la terminología pactal y territorial.'
  - Se evitó 'Cristo', 'SEÑOR' u otras sustituciones no presentes en el verso.
  - '''Hombres'' se eligió para reflejar אָדָם sin borrar el referente colectivo, dado que el contexto lo aclara como ''mi pueblo Israel''.'
