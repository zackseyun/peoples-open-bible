translation:
  text: and the one they despise in scorn[a]. I am peace[c][b], and because of me
    war has come to be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening ⲁⲩⲱ can be read as simple “and.” I chose “But” to reflect probable
      contrast with a preceding reproach (the OCR hints at “you have despised…”),
      but this nuance is uncertain.
    reason: alignment_note
  - marker: b
    text: ϣⲱⲡⲉ may also be rendered “has arisen” or “has happened.” “Has come to be”
      preserves the ontic flavor common in Thunder.
    reason: lexical_alternative
  - marker: c
    text: Or 'But I am peace, and because of me war has come to be.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  lexicon: Coptic (Sahidic), common deictic first-person pronoun
  rationale: Maintains the poem’s repeated self-identification formula without smoothing.
- source_word: ϯⲣⲏⲛⲏ
  chosen: peace
  alternatives:
  - the peace
  - repose
  lexicon: Loan from Gk. εἰρήνη (eirēnē) in Coptic; standard sense “peace.”
  rationale: Plain sense fits the overt paradox with “war”; article dropped for English
    naturalness while preserving personified force.
- source_word: ⲁⲩⲱ
  chosen: But
  alternatives:
  - And
  lexicon: Coordinating conjunction; can be copulative or slightly adversative depending
    on context.
  rationale: Chosen as mildly adversative given the likely contrast with preceding
    lines (you despised me …), though alignment here is uncertain; flagged in risk
    note.
- source_word: ⲡⲡⲟⲗⲉⲙⲟⲥ
  chosen: war
  alternatives:
  - the war
  - battle
  lexicon: Loan from Gk. πόλεμος (polemos).
  rationale: Common, context-fitting gloss; article dropped for English idiom.
- source_word: ϣⲱⲡⲉ
  chosen: has come to be
  alternatives:
  - has arisen
  - has happened
  - came to be
  lexicon: Coptic verb “to become, happen, come to be.”
  rationale: Conveys emergence/occurrence, keeping the ontic nuance rather than eventive
    flattening.
- source_word: ⲉⲧⲃⲏⲏⲧ
  chosen: because of
  alternatives:
  - on account of
  - by reason of
  lexicon: Preposition meaning “for the sake of, because of.”
  rationale: Standard causal preposition retaining explicit causality central to the
    paradox.
parallelism_check: The line preserves the sharp paradox by pairing “I am peace” with
  “war has come to be because of me,” maintaining the contradictory tension without
  harmonizing. The repeated first-person self-identification aligns with Thunder’s
  antiphonal structure.
voice_check: Retains the direct, declarative first-person voice characteristic of
  Thunder’s speaker (“I am …”), with no dilution or narrativizing. The adversative
  “But” keeps the confrontational tone likely implied by the preceding rebuke.
alignment_risk_note: Alignment confidence is medium, and the OCR for the first two
  lines is fragmentary. The consult block mentions “mind” and “repose,” but the clearly
  legible items here are ϯⲣⲏⲛⲏ (peace), ⲡⲡⲟⲗⲉⲙⲟⲥ (war), ϣⲱⲡⲉ (come to be), and ⲉⲧⲃⲏⲏⲧ
  (because of). The opening conjunction ⲁⲩⲱ could be simply copulative (“and”), but
  I rendered it as mildly adversative (“But”) on contextual grounds; this nuance is
  low-confidence. The initial OCR cluster (…ⲧⲉⲧⲟⲩⲕⲁⲧⲁⲫⲣⲟⲛⲓ…) likely reads “you (pl.)
  have despised …,” but I did not translate it due to uncertainty and because the
  ‘I am’ clause clearly begins with ⲁⲛⲟⲕ.
