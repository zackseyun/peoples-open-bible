id: ISA.66.6
reference: Isaiah 66:6
source:
  edition: WLC
  text: ק֤וֹל שָׁאוֹן֙ מֵ/עִ֔יר ק֖וֹל מֵֽ/הֵיכָ֑ל ק֣וֹל יְהוָ֔ה מְשַׁלֵּ֥ם גְּמ֖וּל לְ/אֹיְבָֽי/ו׃
translation:
  text: A sound of uproar from the city[a], a sound from the temple[c][b], the sound of Yahweh repaying recompense to his enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'voice' or 'noise' for each occurrence of 'sound'; the Hebrew repeats the same word three times for rhetorical effect.
    reason: lexical_alternative
  - marker: b
    text: Or 'tumult' or 'roar' for 'uproar.'
    reason: lexical_alternative
  - marker: c
    text: '''Temple'' renders Hebrew heikhal, which can also mean ''palace'' in some contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: קוֹל broadly denotes sound, voice, or noise. Here the repeated nominal clauses introduce an auditory scene rather than spoken content, so 'sound' best fits all three occurrences and preserves the rhetorical repetition.
- source_word: שָׁאוֹן
  chosen: uproar
  alternatives:
  - tumult
  - roar
  - noise
  lexicon: HALOT
  rationale: שָׁאוֹן conveys loud commotion or tumult. 'Uproar' communicates violent public disturbance more precisely than the flatter 'noise' and fits the judgment context.
- source_word: מֵעִיר
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: HALOT
  rationale: The preposition מִן marks source. 'From the city' is natural English and preserves the image of the sound issuing from Jerusalem.
- source_word: מֵהֵיכָל
  chosen: from the temple
  alternatives:
  - from the palace
  - from the sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can mean palace or temple, but in Isaiah's Zion/judgment context and in parallel with the city, the reference is to the temple. 'Temple' is the clearest contextual rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְשַׁלֵּם
  chosen: repaying
  alternatives:
  - paying back
  - rendering
  lexicon: HALOT
  rationale: The participle of שׁלם here denotes requital. 'Repaying' preserves the active, ongoing sense and fits the judicial context.
- source_word: גְּמוּל
  chosen: recompense
  alternatives:
  - repayment
  - due reward
  - retribution
  lexicon: HALOT
  rationale: גְּמוּל refers to what is dealt out in return. 'Recompense' preserves the formal judicial tone and avoids over-specifying either positive reward or punitive retribution, though here the object 'his enemies' makes the punitive sense clear.
- source_word: לְאֹיְבָיו
  chosen: to his enemies
  alternatives:
  - against his enemies
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of repayment. 'To his enemies' is the most direct rendering; the hostile force is already conveyed by 'enemies' and the context of recompense.
