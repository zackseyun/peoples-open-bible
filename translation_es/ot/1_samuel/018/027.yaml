translation:
  language: es
  text: Entonces David se levantó y fue[a], él y sus hombres, y mató a doscientos hombres filisteos. Luego David llevó sus prepucios, y los contaron completos[b] al rey, para llegar a ser yerno del rey. Y Saúl le dio a Mical, su hija, como esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y marchó». El hebreo puede expresarse como inicio de acción o como desplazamiento enfático; aquí se refleja la progresión narrativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los presentaron en número completo al rey». El verbo hebreo es difícil y puede aludir a contarlos o a completar la cantidad requerida ante el rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en marcha
  lexicon: HALOT
  rationale: En narración hebrea, קום marca inicio de una acción decisiva. «Se levantó» conserva esa fuerza narrativa de manera natural en español.
- source_word: וַיֵּלֶךְ הוּא וַאֲנָשָׁיו
  english_pob_choice: went, he and his men
  chosen_spanish: fue, él y sus hombres
  alternatives_spanish:
  - fue con sus hombres
  - él y sus hombres fueron
  lexicon: HALOT
  rationale: Mantiene el énfasis explícito del pronombre hebreo הוּא con una construcción apposicional fluida en español.
- source_word: וַיַּךְ בַּפְּלִשְׁתִּים
  english_pob_choice: struck down ... Philistine men
  chosen_spanish: derribó a ... hombres filisteos
  alternatives_spanish:
  - mató a ... filisteos
  - hirió a ... filisteos
  lexicon: HALOT
  rationale: «Derribó» conserva el valor bélico de נכה sin cerrar innecesariamente la forma exacta del resultado más allá del contexto inmediato.
- source_word: מָאתַיִם אִישׁ
  english_pob_choice: two hundred Philistine men
  chosen_spanish: doscientos hombres filisteos
  alternatives_spanish:
  - doscientos hombres
  - doscientos de los filisteos
  lexicon: HALOT
  rationale: «Hombres filisteos» expresa el complemento étnico que el contexto exige para evitar ambigüedad en español.
- source_word: עָרְלֹתֵיהֶם
  english_pob_choice: their foreskins
  chosen_spanish: sus prepucios
  alternatives_spanish:
  - sus foreskins
  - sus partes íntimas
  lexicon: HALOT
  rationale: Se conserva el término anatómico directo. «Prepucios» es más natural y médico en español que el préstamo o una eufemización.
- source_word: וַיְמַלְאוּם
  english_pob_choice: they counted them out in full
  chosen_spanish: se los entregaron completos
  alternatives_spanish:
  - los contaron por completo
  - cumplieron el número delante del rey
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el contexto sugiere la presentación del total requerido ante el rey; esta redacción conserva la idea de completitud sin forzar un único matiz técnico.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  - ante el rey
  lexicon: HALOT
  rationale: Dativo de destinatario/ámbito normalizado en español.
- source_word: לְהִתְחַתֵּן בַּמֶּלֶךְ
  english_pob_choice: so that he might become the king’s son-in-law
  chosen_spanish: para llegar a ser yerno del rey
  alternatives_spanish:
  - para emparentar por matrimonio con el rey
  - para casarse en la familia del rey
  lexicon: HALOT
  rationale: «Llegar a ser yerno del rey» reproduce el valor relacional del hitpael de חתן de modo preciso y entendible en español.
- source_word: וַיִּתֶּן ל֥וֹ שָׁאוּל אֶת מִיכַ֥ל בִּתּ֖וֹ לְאִשָּׁה
  english_pob_choice: And Saul gave him Michal his daughter as a wife
  chosen_spanish: Y Saúl le dio a Mical, su hija, por mujer
  alternatives_spanish:
  - Y Saúl le dio a Mical, su hija, como esposa
  - Y Saúl le dio a Mical su hija por esposa
  lexicon: HALOT
  rationale: «Por mujer» conserva la fórmula marital de entrega sin introducir una glosa más interpretativa que el hebreo no exige.
translation_notes:
  revision_awareness: Se atendió la validación anterior vinculando cada nota al marcador exacto en el texto español. Se evitó dejar notas sin anclaje y se mantuvo la lectura auditada de la POB inglesa sobre la dificultad verbal de וַיְמַלְאוּם.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como estándar general del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evitó «Cristo/Mesías» por no corresponder al texto.
  - Se preservó el tono narrativo bíblico con español moderno y digno, sin calcos innecesarios.
  - Se usó «prepucios» como equivalente anatómico directo para עָרְלֹתֵיהֶם, consistente con la fuerza lexical del hebreo.
