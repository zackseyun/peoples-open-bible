translation:
  language: es
  text: 'Entonces el sacerdote hará jurar a la mujer con el juramento de la maldición[a], y el sacerdote dirá a la mujer: «Que Yahvé te convierta en maldición y juramento entre tu pueblo, cuando Yahvé haga que tu muslo[b] se marchite y tu vientre[c] se hinche.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «te convierta en un ejemplo de maldición y juramento» entre tu pueblo.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu muslo». La expresión hebrea es difícil y puede ser un eufemismo relacionado con los órganos reproductivos, o indicar el desgaste o marchitamiento de esa parte del cuerpo.
    reason: lexical_alternative
  - marker: c
    text: «Vientre» también puede traducirse «abdomen» o, según algunas interpretaciones, «matriz». El efecto físico o reproductivo exacto descrito en esta maldición es debatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבִּיעַ
  english_pob_choice: shall make ... swear
  chosen_spanish: hará jurar
  alternatives_spanish:
  - pondrá bajo juramento
  - adjurará
  lexicon: HALOT
  rationale: 'El hiphil es causativo: el sacerdote causa que la mujer jure. “Hará jurar” comunica bien esa función ritual y jurídica en español sin volverla rígida.'
- source_word: בִּשְׁבֻעַת הָאָלָה
  english_pob_choice: with the oath of the curse
  chosen_spanish: con el juramento de la maldición
  alternatives_spanish:
  - con el juramento de la imprecación
  - bajo el juramento de la maldición
  lexicon: HALOT
  rationale: La construcción une “juramento” y “maldición”. “Juramento de la maldición” conserva ambos elementos y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: לְאָלָה וְלִשְׁבֻעָה
  english_pob_choice: a curse and an oath
  chosen_spanish: maldición y juramento
  alternatives_spanish:
  - objeto de maldición y de juramento
  - maldición e imprecación
  lexicon: HALOT
  rationale: La expresión apunta a una fórmula pública invocada sobre la mujer. “Maldición y juramento” mantiene la estructura breve del hebreo; la posible fuerza idiomática queda reflejada en la nota.
- source_word: בְּתוֹךְ עַמֵּךְ
  english_pob_choice: among your people
  chosen_spanish: en medio de tu pueblo
  alternatives_spanish:
  - entre tu pueblo
  - en medio de tu gente
  lexicon: HALOT
  rationale: “En medio de tu pueblo” preserva el componente comunitario y público de la fórmula, más cercano al hebreo que una simple referencia espacial.
- source_word: בְּתֵת
  english_pob_choice: when ... makes
  chosen_spanish: cuando Yahvé haga
  alternatives_spanish:
  - al hacer Yahvé
  - mientras Yahvé haga
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia o tiempo. “Cuando Yahvé haga” da el sentido de manera idiomática y clara.
- source_word: יְרֵךְ
  english_pob_choice: thigh
  chosen_spanish: muslo
  alternatives_spanish:
  - cadera
  - loins
  - parte reproductiva
  lexicon: HALOT
  rationale: “Muslo” es el equivalente español más directo para יָרֵךְ y mantiene la imagen corporal del hebreo sin explicitar de más el posible eufemismo.
- source_word: נֹפֶלֶת
  english_pob_choice: waste away / fall away
  chosen_spanish: se consuma
  alternatives_spanish:
  - se marchite
  - se debilite
  - caiga
  lexicon: HALOT
  rationale: La forma expresa desvanecimiento o deterioro del miembro afectado. “Se consuma” recoge bien la idea de consumirse/agotarse con un tono natural en español.
- source_word: בֶּטֶן
  english_pob_choice: abdomen
  chosen_spanish: vientre
  alternatives_spanish:
  - abdomen
  - barriga
  - útero
  lexicon: HALOT
  rationale: “Vientre” es un término bíblico y suficientemente claro en español para el área corporal mencionada, sin resolver la ambigüedad hacia “útero”.
- source_word: צָבָה
  english_pob_choice: swell
  chosen_spanish: se hinche
  alternatives_spanish:
  - se inflame
  - se distienda
  - se hinche de manera anormal
  lexicon: HALOT
  rationale: “Se hinche” expresa distensión visible con naturalidad y mantiene la imagen del hebreo.
theological_decisions:
- issue: Cómo presentar la maldición corporal sin resolver su alcance médico o reproductivo
  english_pob_reading: Retain the Hebrew bodily imagery in relatively literal terms without interpreting it as a direct reference to miscarriage or infertility in the main text.
  chosen_spanish_reading: 'Mantener la imaginería corporal: “tu muslo se consuma y tu vientre se hinche”, sin especificar en el texto principal un aborto, esterilidad o diagnóstico médico concreto.'
  alternative_spanish_readings:
  - Que tu útero abort[e] y tu vientre se hinche
  - Que tu matriz caiga y tu vientre se hinche
  - Que tu muslo caiga y tu vientre se hinche
  rationale: El hebreo es difícil y debatido. La traducción principal preserva la tensión interpretativa sin importar una lectura más específica de la que el texto exige. La nota permite recordar la posible alusión reproductiva sin fijarla como única.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del audit trail inglés, que prefirió una expresión de deterioro más natural para נֹפֶלֶת. Por eso elegí “se consuma” para preservar la idea de desgaste/consunción del muslo, en lugar de una lectura más brusca como “caiga” o demasiado específica como “se marchite”.
  spanish_consistency_notes:
  - Usé “Yahvé” para יְהוָה, conforme al estándar del proyecto.
  - Mantengo “mujer” para הָאִשָּׁה y el registro legal-ritual del pasaje.
  - Conservo dos términos corporales distintos, “muslo” y “vientre”, sin colapsarlos en una sola interpretación.
  - Las notas al pie están ancladas solo donde hay una alternativa textual o idiomática real.
