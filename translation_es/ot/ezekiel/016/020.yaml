translation:
  language: es
  text: Y tomaste tus hijos y tus hijas, que me habías dado a luz, y los sacrificaste a ellos[a] para que fueran devorados. ¿Acaso fue poca cosa tu prostitución[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ellos»; el pronombre se refiere a los ídolos o dioses falsos en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «tu ramería» o «tu prostituirte». El hebreo conserva la metáfora sexual de la infidelidad al pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְחִי
  english_pob_choice: you took
  chosen_spanish: tomaste
  alternatives_spanish:
  - agarraste
  - tomaste para ti
  lexicon: HALOT
  rationale: El verbo básico de לקח en este contexto narrativo se expresa naturalmente como «tomaste». Mantiene el valor ordinario de la acción sin añadir matiz de violencia que el hebreo no exige explícitamente aquí.
- source_word: בָּנַיִךְ ... בְּנוֹתַיִךְ
  english_pob_choice: your sons and your daughters
  chosen_spanish: tus hijos y tus hijas
  alternatives_spanish:
  - tus hijos, varones y mujeres
  - tus niños y tus niñas
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente «hijos» y «hijas». En español, «hijos y hijas» preserva esa especificidad de género y es plenamente natural.
- source_word: אֲשֶׁר יָלַדְתְּ לִי
  english_pob_choice: whom you had borne to me
  chosen_spanish: que habías dado a luz para mí
  alternatives_spanish:
  - que me habías dado a luz
  - que habías parido para mí
  lexicon: HALOT
  rationale: «Dar a luz» comunica el acto de parir con dignidad idiomática en español. Se conserva la relación marcada por לִי con «para mí», que en el marco del pasaje expresa la reclamación covenantal del hablante. Se evita suavizarla a solo «por mí» o «de mí».
- source_word: וַתִּזְבָּחִים
  english_pob_choice: and sacrificed them
  chosen_spanish: y los sacrificaste
  alternatives_spanish:
  - y los inmolaste
  - y los ofreciste en sacrificio
  lexicon: HALOT
  rationale: זבח en lenguaje sacrificial admite «sacrificar» o «inmolar». «Sacrificaste» conserva la fuerza cultual del verbo y funciona con el complemento directo femenino/masculino plural del contexto.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  lexicon: HALOT
  rationale: El pronombre retoma a los destinatarios ilícitos del sacrificio, es decir, los ídolos/dioses falsos del contexto. «A ellos» respeta la preposición y deja visible la dirección del acto.
- source_word: לֶאֱכֹל
  english_pob_choice: to be devoured
  chosen_spanish: para que fueran devorados
  alternatives_spanish:
  - para comerlos
  - para ser comida
  lexicon: HALOT
  rationale: El infinitivo expresa propósito o resultado ligado al acto sacrificial. En español, «para que fueran devorados» mantiene el sentido de consumo/destrucción y reproduce el tono fuerte del pasaje sin sonar artificial.
- source_word: הַמְעַט
  english_pob_choice: too small a thing
  chosen_spanish: ¿Fue demasiado poca cosa?
  alternatives_spanish:
  - ¿Fue cosa tan poca?
  - ¿Acaso era poco?
  lexicon: HALOT
  rationale: La fórmula hebrea funciona retóricamente. «¿Fue demasiado poca cosa?» reproduce esa reprensión con un español claro y solemne, sin convertirla en mera afirmación.
- source_word: מִתַּזְנוּתֵךְ
  english_pob_choice: your prostitution
  chosen_spanish: tu prostitución
  alternatives_spanish:
  - tu fornicación
  - tu infidelidad sexual
  lexicon: HALOT
  rationale: Se conserva la metáfora sexual del hebreo, como hizo la POB inglesa con «prostitution». «Prostitución» es más transparente y menos arcaica que «harlotry», y evita reemplazar la imagen por una abstracción como «idolatría».
theological_decisions:
- issue: Metáfora sexual de la infidelidad covenantal
  english_pob_reading: Retain the sexual-infidelity metaphor as 'prostitution' rather than flattening it to 'idolatry' in the main text.
  chosen_spanish_reading: Mantener la metáfora sexual como «prostitución» en el texto principal, en vez de sustituirla por «idolatría».
  alternative_spanish_readings:
  - idolatría
  - infidelidad
  rationale: El hebreo expresa la acusación mediante imagen sexual, no solo mediante el concepto abstracto de idolatría. Conservarla preserva el filo profético y la tensión teológica del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Carácter retórico de la última pregunta
  english_pob_reading: 'Render the final clause as a rhetorical question: ''Was your prostitution too small a thing?'''
  chosen_spanish_reading: 'Traducir el final como pregunta retórica: «¿Fue demasiado poca cosa tu prostitución?».'
  alternative_spanish_readings:
  - Tu prostitución fue demasiado poca cosa.
  - Como si tu prostitución fuera demasiada poca cosa...
  rationale: La construcción hebrea con הַמְעַט en contexto acusa y reprende; la pregunta retórica comunica mejor esa fuerza que una simple afirmación.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada que prefirió una expresión más directa para לֶאֱכֹל: en español se optó por «para que fueran devorados», manteniendo el tono formal y la idea de consumo/destrucción. También se conservó la fuerza metafórica de מִתַּזְנוּתֵךְ sin suavizarla a una abstracción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie POB cuando corresponde; en este versículo el hablante implícito no aparece nombrado en el texto hebreo.
  - Se mantiene «prostitución» para זְנוּת como término técnico de la metáfora profética, en coherencia con el tratamiento POB.
  - «Para mí» se conserva para לִי porque en este pasaje refleja la relación de pertenencia/reclamación del hablante, no solo un dativo neutral.
  - La nota al pie a distingue la posible referencia de «a ellos» a los ídolos, preservando la ambigüedad contextual del hebreo y del audit trail inglés.
