revisions:
- from: ¡Oh[a], de qué modo podría yo describir las aficiones[b] filiales[c] de los padres, que imprimen la semejanza del alma y de la forma en el pequeño y admirable carácter de un niño, especialmente porque las madres hacen a los padres más compasivos[d] hacia los hijos que han nacido!
  to: ¡Oh[a], de qué modo podría yo describir los afectos[b] de los padres que aman a sus hijos[c], que imprimen la semejanza del alma y de la forma en el pequeño y admirable carácter de un niño, especialmente porque las madres hacen a los padres más sensibles[d] hacia los hijos que han nacido!
  rationale: 'Se corrigen dos problemas léxicos importantes: «aficiones» se cambia por «afectos» para representar adecuadamente πάθη, y «filiales» se sustituye por «que aman a sus hijos» para evitar la ambigüedad inversa de sentido en español. Además, «más sensibles» representa mejor συμπαθεστέρας en contexto parental. Se conservan «alma y forma» y la estructura principal del período por fidelidad al griego y al rastro de auditoría inglés.'
