translation:
  language: es
  text: ¿Quién es este que viene de Edom[a], con vestiduras carmesíes desde Bozra? Este, espléndido en su vestidura, marchando en la grandeza de su poder[b]. —Soy yo, hablando en rectitud[c], poderoso para salvar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con vestiduras teñidas de rojo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dando grandes zancadas» en la grandeza de su poder.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hablando en justicia».'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֱדוֹם
  english_pob_choice: from Edom
  chosen_spanish: de Edom
  alternatives_spanish:
  - desde Edom
  - procedente de Edom
  lexicon: HALOT
  rationale: Se conserva el nombre propio y la referencia geográfica/simbólica sin explicitar más de lo que el hebreo dice. «De Edom» es natural en español y corresponde al movimiento de origen expresado por מִן/מֵ.
- source_word: חֲמוּץ בְּגָדִים
  english_pob_choice: with crimson garments
  chosen_spanish: con vestiduras de grana
  alternatives_spanish:
  - con vestiduras teñidas de rojo
  - con vestiduras rojas
  - con vestiduras color carmesí
  lexicon: HALOT
  rationale: El inglés opta por el color intenso de la ropa, dejando abierta la causa. En español, «vestiduras de grana» preserva el registro elevado y la imaginería de color rojo intenso sin sobreexplicar el mecanismo; mantiene la tensión con la posible lectura de ropa manchada/tintada de rojo.
- source_word: מִבָּצְרָה
  english_pob_choice: from Bozrah
  chosen_spanish: desde Bozra
  alternatives_spanish:
  - desde Bozrah
  - de Bozra
  lexicon: HALOT
  rationale: Se translitera el topónimo edomita. «Desde» reproduce con naturalidad el movimiento de procedencia del hebreo y evita una calca menos fluida.
- source_word: הָד֣וּר בִּ/לְבוּשׁ֔/וֹ
  english_pob_choice: this one splendid in his clothing
  chosen_spanish: Este, espléndido en su vestidura
  alternatives_spanish:
  - Este, majestuoso en su vestidura
  - Este, glorioso en su vestidura
  - Este, adornado con esplendor en su vestidura
  lexicon: HALOT
  rationale: «Espléndido» reproduce la idea de magnificencia visible sin añadir una carga doctrinal no explícita. «Vestidura» mantiene un registro algo más solemne que «ropa» y evita repetir innecesariamente «vestiduras» del hemistiquio anterior.
- source_word: צֹעֶה בְּרֹב כֹּחוֹ
  english_pob_choice: marching in the greatness of his strength
  chosen_spanish: avanzando en la grandeza de su poder
  alternatives_spanish:
  - marchando en la grandeza de su fuerza
  - avanzando con la plenitud de su poder
  - yendo con gran poder
  lexicon: HALOT
  rationale: El verbo hebreo es difícil; el inglés POB lo entiende como movimiento solemne/impresionante. «Avanzando» comunica desplazamiento de manera natural en español y deja abierta la imagen de marcha o paso imponente. «Poder» preserva el campo semántico de כֹּחַ y funciona mejor que una repetición mecánica de «fuerza» en este contexto.
- source_word: מְדַבֵּר בִּצְדָקָה
  english_pob_choice: speaking in righteousness
  chosen_spanish: hablando en justicia
  alternatives_spanish:
  - hablando con rectitud
  - hablando en rectitud
  - hablando justamente
  lexicon: HALOT
  rationale: Se conserva la preposición con un sustantivo abstracto para mantener el peso semántico de צְדָקָה. «Justicia» preserva la posible tensión con «rectitud» y el trasfondo judicial/covenantal; además, el propio audit trail inglés señala que «justice» es una lectura viable.
- source_word: רַב לְהוֹשִׁיעַ
  english_pob_choice: mighty to save
  chosen_spanish: poderoso para salvar
  alternatives_spanish:
  - fuerte para salvar
  - capaz de salvar
  - poderoso para librar
  lexicon: HALOT
  rationale: La idea es de capacidad/abundancia para salvar. «Poderoso para salvar» es idiomático en español, mantiene la fuerza del hebreo y evita añadir una interpretación más específica que el texto no exige.
theological_decisions:
- issue: Identidad del hablante en la respuesta en primera persona
  english_pob_reading: The translation leaves the speaker's identity implicit and does not identify him in the text.
  chosen_spanish_reading: La traducción deja implícita la identidad del hablante y no la identifica en el texto principal.
  alternative_spanish_readings:
  - El Señor como guerrero divino
  - Una figura mesiánica
  - Una personificación profética
  rationale: El hebreo presenta un diálogo dramático sin nombrar al que responde. En consonancia con la filosofía de la POB, la versión española conserva la forma de primera persona sin resolver la identificación interpretativa dentro del texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de צְדָקָה
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: Aunque el término hebreo puede abarcar rectitud y justicia, se escogió «justicia» para mantener la amplitud moral y judicial del pasaje. La alternativa «rectitud» queda disponible cuando el contexto privilegia la cualidad moral; aquí el anuncio solemne del hablante sostiene bien la lectura judicial.
  doctrine_reference: Tensión semántica preservada para צְדָקָה / δικαιοσύνη en la tradición de la POB.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado más reciente del audit trail inglés: se mantiene «crimson garments» como color intenso de las vestiduras y no se introduce una glosa causal en el texto principal. También se preserva la decisión de no identificar al hablante, y se refleja en español la ambigüedad de צְדָקָה con una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Edom» y «Bozra» como nombres propios transliterados, coherentes con el proyecto.
  - Se mantiene un registro profético elevado con «vestiduras», «espléndido» y «poderoso para salvar».
  - «Justicia» se usa de forma consistente con el campo semántico covenantal/judicial y queda la alternativa «rectitud» en nota.
  - La puntuación con raya larga separa bien la pregunta del oráculo-respuesta, siguiendo el tono dramático del versículo.
