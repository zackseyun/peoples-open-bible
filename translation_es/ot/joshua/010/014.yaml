translation:
  language: es
  text: Y no hubo día como aquel, ni antes de él ni después de él[a], cuando Yahvé escuchó la voz de un hombre, porque Yahvé peleó por Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando Yahvé atendió la petición de un hombre». El hebreo dice literalmente: «escuchar a la voz de un hombre» o «escuchar la voz de un hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא הָיָה
  english_pob_choice: And there was no
  chosen_spanish: Y no hubo
  alternatives_spanish:
  - Y no existió
  - Y no había habido
  lexicon: HALOT
  rationale: El hebreo expresa una negación existencial en pasado; «no hubo» comunica con naturalidad que no se dio un día semejante, sin perder el énfasis de unicidad.
- source_word: כַּיּוֹם הַהוּא
  english_pob_choice: day like that
  chosen_spanish: día como aquel
  alternatives_spanish:
  - día semejante a aquel
  - tal día
  lexicon: HALOT
  rationale: «Como aquel» conserva la comparación directa del hebreo y su fuerza de singularidad, manteniendo un español claro y bíblico sin volverse arcaico.
- source_word: לְפָנָיו וְאַחֲרָיו
  english_pob_choice: before it or after it
  chosen_spanish: ni antes de él ni después de él
  alternatives_spanish:
  - ni antes de aquel día ni después de aquel día
  - ni antes ni después
  lexicon: HALOT
  rationale: El sufijo pronominal retoma el día, no una persona; en español conviene repetir el referente con un pronombre masculino singular para evitar ambigüedad y seguir la referencia inmediata.
- source_word: לִשְׁמֹעַ יְהוָה
  english_pob_choice: when Yahweh listened
  chosen_spanish: al escuchar Yahvé
  alternatives_spanish:
  - cuando Yahvé escuchó
  - al oír Yahvé
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la circunstancia definitoria del día. «Al escuchar» suena natural y mantiene la idea de atención/hecho de escuchar sin forzar «obedecer».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md Contested terms — YHWH
  rationale: Se sigue el término doctrinal y editorial estándar del proyecto en español para el nombre divino, evitando la convención de ocultarlo como «SEÑOR».
- source_word: בְּקוֹל אִישׁ
  english_pob_choice: to the voice of a man
  chosen_spanish: la voz de un hombre
  alternatives_spanish:
  - la voz de un varón
  - la petición de un hombre
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo «voz de un hombre». «Hombre» mantiene la referencia concreta y la fuerza lexical del sustantivo אישׁ; en español la preposición exigida por el contexto se expresa naturalmente con «al escuchar».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal del hecho extraordinario. «Porque» es el equivalente más claro y fluido en español en esta estructura narrativa.
- source_word: נִלְחָם
  english_pob_choice: fought
  chosen_spanish: peleaba
  alternatives_spanish:
  - combatía
  - luchaba
  lexicon: HALOT
  rationale: El verbo denota participación en combate por Israel. «Peleaba» comunica la acción bélica con naturalidad; el imperfecto español refleja bien el trasfondo continuo o caracterizador del acto en la explicación final.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: por Israel
  alternatives_spanish:
  - a favor de Israel
  - en favor de Israel
  lexicon: HALOT
  rationale: La preposición ל indica actuación en beneficio de Israel. «Por Israel» es conciso y fiel; «a favor de» explicita la relación, pero resulta más pesado.
theological_decisions:
- issue: Cómo expresar la acción de Yahvé en relación con «la voz de un hombre»
  english_pob_reading: the LORD listened to the voice of a man
  chosen_spanish_reading: Yahvé escuchó la voz de un hombre
  alternative_spanish_readings:
  - Yahvé oyó la voz de un hombre
  - Yahvé atendió la petición de un hombre
  - Yahvé obedeció a un hombre
  rationale: El hebreo dice literalmente «escuchar la voz de un hombre». En español, «escuchó la voz de un hombre» preserva el modismo sin cargar la frase con la idea doctrinalmente delicada de que Dios quedó subordinado al hombre. El contexto de guerra por Israel aclara que se trata de la respuesta divina a la petición de Josué.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Referencia del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La traducción española sigue el estándar confesional y editorial del proyecto para יְהוָה. Mantener el nombre evita el ocultamiento del texto fuente y conserva la transparencia auditada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios pendientes y que el acuerdo con la auditoría inglesa fue alto; por eso el borrador español sigue de cerca la lectura auditada sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para el nombre divino.
  - Se conserva el paralelismo temporal «ni antes de él ni después de él» para reflejar el hebreo con claridad natural.
  - «Peleaba por Israel» reproduce el sentido bélico-benefactivo de נִלְחָם לְיִשְׂרָאֵל sin añadir matices doctrinales ajenos.
