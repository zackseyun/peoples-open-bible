base_translation:
  language: en
  yaml_path: translation/ot/2_kings/014/011.yaml
  text: But Amaziah would not listen[a], so Jehoash king of Israel went up, and he and Amaziah king of Judah met face to face at Beth-shemesh[b], which belongs to Judah.
  footnotes:
  - marker: a
    text: Or 'did not heed' / 'did not obey.' The Hebrew verb can denote listening with responsive action, not mere hearing.
    reason: lexical_alternative
  - marker: b
    text: Literally 'saw faces,' an idiom for a direct encounter.
    reason: lexical_alternative
