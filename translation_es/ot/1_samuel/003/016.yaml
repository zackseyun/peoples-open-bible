translation:
  language: es
  text: 'Entonces Eli llamó a Samuel y dijo: «Samuel, mi hijo». Y él dijo: «Aquí estoy».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a
  - llamó en voz alta a
  - llamó por
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa un llamado verbal dirigido a Samuel. «Llamó» reproduce con naturalidad el acto de dirigirse a alguien por su nombre, sin añadir matices no presentes en el hebreo.
- source_word: עֵלִי
  english_pob_choice: Eli
  chosen_spanish: Eli
  alternatives_spanish:
  - Elí
  lexicon: Convención onomástica
  rationale: Se conserva la transliteración del nombre propio en forma ampliamente reconocible en español bíblico. La acentuación «Eli» evita una castellanización no atestiguada por el texto fuente.
- source_word: אֶת שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: a Samuel
  alternatives_spanish:
  - Samuel
  lexicon: HALOT
  rationale: El marcador de objeto directo אֶת no se traduce de manera explícita; en español el verbo ya exige la preposición «a» con objeto personal. El nombre se traduce por la forma habitual «Samuel».
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: אמר en narrativa se rinde mejor con «dijo», que es la equivalencia más natural y estable en español para introducir habla directa.
- source_word: שְׁמוּאֵל בְּנִי
  english_pob_choice: Samuel, my son
  chosen_spanish: Samuel, hijo mío
  alternatives_spanish:
  - Samuel, mi hijo
  - Samuel, muchacho
  lexicon: HALOT
  rationale: בְּנִי significa literalmente «mi hijo». «Hijo mío» mantiene el valor relacional y afectivo del vocativo en un español natural; se evita suavizarlo a «muchacho», que perdería la correspondencia léxica.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Estoy aquí
  - Presente
  lexicon: HALOT
  rationale: הִנֵּנִי es una fórmula de disponibilidad y presencia. «Aquí estoy» conserva la respuesta idiomática de manera clara en español actual; «Heme aquí» sería más tradicional, pero menos natural.
translation_notes:
  revision_awareness: 'El inglés POB usa una solución de equivalencia óptima muy estable: «called», «said», «my son», «Here I am». No hubo revisiones posteriores ni tensiones textuales documentadas; el español sigue esa misma lectura sin introducir notas innecesarias.'
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo simple y directo del hebreo, con dos comillas para el discurso directo anidado.
  - Se evita «SEÑOR» u այլ terminología teológica no pertinente, porque el versículo no contiene el Tetragrámaton ni vocabulario doctrinal delicado.
  - La partícula narrativa וַ se refleja con «Entonces» al inicio, preservando el avance secuencial sin sobrecargar el texto.
