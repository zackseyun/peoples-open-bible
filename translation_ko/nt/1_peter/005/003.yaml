  rationale: κλῆρος는 「제비뽑힌 분깃·할당된 부분」. 여기서는 「장로에게 맡겨진 신자들」을 가리키므로 「맡겨진 자들」로 옮긴다.
- source_word: τύποι γινόμενοι τοῦ ποιμνίου
