translation:
  language: es
  text: El principio de la sabiduría es el temor de Yahvé, y el conocimiento del Santo[a] es entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «santos». La forma plural suele entenderse aquí como referida a Dios; por eso se traduce «el Santo».'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּחִלַּת
  english_pob_choice: beginning of
  chosen_spanish: el principio de
  alternatives_spanish:
  - el comienzo de
  - la iniciación de
  - la primera parte de
  lexicon: HALOT
  rationale: El constructo aquí señala el punto de arranque o fundamento. En español, «el principio de» conserva bien la relación nominal sin sobreinterpretar el valor sapiencial como si fuera una explicación doctrinal adicional.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la ciencia
  - la destreza
  - el saber
  lexicon: HALOT
  rationale: En Proverbios, חָכְמָה abarca sabiduría moral y práctica. «Sabiduría» es la equivalencia más estable y natural en español bíblico contemporáneo.
- source_word: יִרְאַת
  english_pob_choice: fear of
  chosen_spanish: el temor de
  alternatives_spanish:
  - la reverencia por
  - el temor reverente de
  - la awe de
  lexicon: HALOT
  rationale: «Temor de» preserva la tensión bíblica entre reverencia, sumisión y temor real ante Dios. «Reverencia» suaviza demasiado el alcance del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el nombre divino y no un título. En español, «Yahvé» mantiene el nombre personal de Dios, conforme al criterio del proyecto.
- source_word: וְדַעַת
  english_pob_choice: and the knowledge of
  chosen_spanish: y el conocimiento de
  alternatives_spanish:
  - y el saber de
  - y el conocimiento acerca de
  lexicon: HALOT
  rationale: La forma constructa pide una relación posesiva/complementaria. «Conocimiento de» reproduce esa relación de manera natural y fiel al paralelismo hebreo.
- source_word: קְדֹשִׁים
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - los santos
  - los santos seres
  - el Santísimo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el contexto poético y el paralelismo con YHWH favorecen un referente divino singular. «El Santo» expresa ese sentido sin borrar la tensión del plural hebreo, que queda documentada en la nota.
- source_word: בִּינָה
  english_pob_choice: is understanding
  chosen_spanish: es entendimiento
  alternatives_spanish:
  - es discernimiento
  - es inteligencia
  lexicon: HALOT
  rationale: «Entendimiento» funciona bien como predicado nominal y mantiene el paralelismo con sabiduría y conocimiento. «Discernimiento» es posible, pero algo más interpretativo en español.
theological_decisions:
- issue: Referente de קְדֹשִׁים
  english_pob_reading: 'A singular divine referent: ''the Holy One'''
  chosen_spanish_reading: 'Un referente divino singular: «el Santo»'
  alternative_spanish_readings:
  - 'Un plural literal: «los santos»'
  - 'Una forma más abstracta: «lo santo»'
  rationale: La estructura de paralelismo sinónimo une «el temor de Yahvé» con «el conocimiento del Santo». Eso favorece un referente divino singular. A la vez, el plural hebreo es real y no debe desaparecer, por lo que se conserva en nota como alternativa de lectura.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
- issue: Valor de יִרְאַת יְהוָה
  english_pob_reading: The fear of Yahweh
  chosen_spanish_reading: El temor de Yahvé
  alternative_spanish_readings:
  - La reverencia por Yahvé
  - El temor reverente de Yahvé
  rationale: En la sabiduría bíblica, esta expresión no es mera ansiedad ni solo respeto social; incluye reverencia, sumisión y la seriedad de la relación con Dios. «Temor» preserva mejor esa densidad que una paráfrasis suavizada.
  doctrine_reference: Proverbios 1:7; 9:10; cf. Salmo 111:10
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo directamente y coincide con la evaluación de alta concordancia del control cruzado; no se registraron revisiones posteriores que requirieran ajustar el lema o la estructura del verso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se tradujo קְדֹשִׁים como «el Santo» en el texto principal, dejando constancia de la forma plural hebrea en nota.
  - 'La sintaxis conserva el paralelismo nominal del hebreo: principio/sabiduría; temor de Yahvé; conocimiento/entendimiento.'
  - «Entendimiento» se eligió para בִּינָה por su naturalidad en español y por su función predicativa en la cola final.
