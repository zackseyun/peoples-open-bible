id: ISA.57.11
reference: Isaiah 57:11
source:
  edition: WLC
  text: וְ/אֶת מִ֞י דָּאַ֤גְתְּ וַ/תִּֽירְאִי֙ כִּ֣י תְכַזֵּ֔בִי וְ/אוֹתִ/י֙ לֹ֣א זָכַ֔רְתְּ לֹא שַׂ֖מְתְּ עַל לִבֵּ֑/ךְ הֲ/לֹ֨א אֲנִ֤י מַחְשֶׁה֙ וּ/מֵ֣/עֹלָ֔ם וְ/אוֹתִ֖/י לֹ֥א תִירָֽאִי־־־׃
translation:
  text: And whom did you dread and fear[a], so that you lied and did not remember me, did not lay it to your heart? Was it not because I have kept silent, and that from long ago[b], that you do not fear me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not take it to heart.' The Hebrew idiom is literally 'did not set [it] upon your heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I was silent for a long time' / 'I kept silent from of old.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּאַגְתְּ
  chosen: did you dread
  alternatives:
  - were you anxious about
  - did you worry about
  lexicon: HALOT
  rationale: The verb דאג can denote anxiety or fearful concern. In parallel with ותיראי ('and feared'), 'dread' best captures the hostile-fear context and preserves the rhetorical force of the question.
- source_word: וַתִּירְאִי
  chosen: and fear
  alternatives:
  - and were afraid
  lexicon: HALOT
  rationale: 'From ירא, the common verb for fear. Rendered coordinate with the previous verb to preserve the Hebrew pairing: ''dread and fear.'''
- source_word: כִּי תְכַזֵּבִי
  chosen: so that you lied
  alternatives:
  - that you lied
  - for you dealt falsely
  lexicon: HALOT
  rationale: 'כִּי here is best taken as introducing result or consequence in the rhetorical question: their fear of others led to falsehood. The piel of כזב commonly means ''lie'' or ''deceive''; ''lied'' is the clearest modern English rendering.'
- source_word: וְאוֹתִי לֹא זָכַרְתְּ
  chosen: and did not remember me
  alternatives:
  - and did not call me to mind
  lexicon: HALOT
  rationale: זכר in this context is cognitive and covenantal remembrance. 'Remember me' is both natural English and faithful to the Hebrew.
- source_word: לֹא שַׂמְתְּ עַל לִבֵּךְ
  chosen: did not lay it to your heart
  alternatives:
  - did not take it to heart
  - did not set it on your heart
  lexicon: HALOT
  rationale: This idiom means to take something seriously or inwardly consider it. 'Lay it to your heart' preserves the Hebrew imagery while remaining understandable. The implied object is the matter of remembering God / his claims, so 'it' is supplied idiomatically in English.
- source_word: הֲלֹא
  chosen: Was it not because
  alternatives:
  - Is it not that
  - Was it not
  lexicon: HALOT
  rationale: The interrogative-negative introduces the explanation for Israel's behavior. Expanding slightly to 'Was it not because' makes the causal force clear in English.
- source_word: מַחְשֶׁה
  chosen: I have kept silent
  alternatives:
  - I was silent
  - I kept still
  lexicon: HALOT
  rationale: From חשה, 'be silent/keep silent.' The form functions predicatively after אני. 'I have kept silent' fits the explanatory sense leading into the result clause.
- source_word: וּמֵעוֹלָם
  chosen: and that from long ago
  alternatives:
  - and for a long time
  - even from of old
  lexicon: HALOT
  rationale: עוֹלָם here refers to a long duration into the past, not eternity in an abstract theological sense. 'From long ago' communicates prolonged divine silence in accessible English.
- source_word: וְאוֹתִי לֹא תִירָאִי
  chosen: that you do not fear me
  alternatives:
  - so you do not fear me
  - and you did not fear me
  lexicon: HALOT
  rationale: 'The clause states the result of God''s long silence: lack of fear toward him. Present English ''do not fear me'' works well for the gnomic/resultative sense of the imperfect in this rhetorical question.'
