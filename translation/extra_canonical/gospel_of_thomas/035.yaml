translation:
  text: Jesus said, "It is not possible for someone to enter the strong man’s house
    and take it by force unless he binds his hands; then he will overturn his house."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:15:58Z'
  footnotes:
  - marker: take it
    text: The Coptic pronoun is masculine singular and could refer either to the house
      (ⲡⲏⲉⲓ) or to the strong man (ⲡϫⲱⲱⲣⲉ, 'take him by force').
    reason: lexical_alternative
  - marker: overturn
    text: The Coptic verb ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ literally means 'to pour out' or 'to overturn,'
      a notable divergence from the canonical Synoptic parallels (Mark 3:27, Matt
      12:29) which use ⲧⲱⲣⲡ ('to plunder' or 'snatch').
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲛ̄ϭⲟⲙ⳿
  chosen: It is not possible
  rationale: Literal rendering of the negative existential with ϭⲟⲙ (power/ability).
  lexicon: Crum 815b
- source_word: ϫⲱⲱⲣⲉ
  chosen: strong man
  rationale: Substantive use of the adjective 'strong'.
  lexicon: Crum 785a
- source_word: ϫⲓⲧϥ⳿ ⲛ̄ϫⲛⲁϩ
  chosen: take it by force
  rationale: The idiom ϫⲓ ⲛϫⲛⲁϩ means 'take by force'. The suffix ϥ is masculine singular,
    referring either to the house or the strong man.
  lexicon: Crum 776b
- source_word: ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ
  chosen: overturn
  rationale: Literally 'pour out' or 'overturn', diverging from the canonical Synoptic
    'plunder' (ⲧⲱⲣⲡ).
  lexicon: Crum 264b
  alternatives:
  - empty out
  - turn upside down
  - plunder
drafter_notes: The translation preserves Thomas's distinct vocabulary (e.g., 'overturn'
  instead of 'plunder', 'take it by force' instead of 'plunder his goods') rather
  than harmonizing with the Synoptic parallels.
