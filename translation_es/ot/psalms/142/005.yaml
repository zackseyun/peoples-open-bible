translation:
  language: es
  text: 'Mira a la derecha y ve: no hay quien me reconozca; el refugio se ha perdido de mí[a]; no hay quien busque mi vida[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el escape se ha ido de mí»; el sustantivo hebreo puede significar un lugar o un medio de huida, además de «refugio».
    reason: lexical_alternative
  - marker: b
    text: O «mi alma»; aquí «alma» (hebreo nefesh) probablemente significa «vida» o «yo mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּיט
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira atentamente
  - Observa
  lexicon: HALOT
  rationale: El imperativo pide dirigir la atención de forma inmediata; en español, «mira» conserva la fuerza directa y suena natural en un lamento poético.
- source_word: יָמִין
  english_pob_choice: to the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - del lado derecho
  - hacia la derecha
  lexicon: HALOT
  rationale: El sustantivo indica el lado derecho. «A la derecha» mantiene la referencia espacial de modo claro y idiomático.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y ve
  alternatives_spanish:
  - y mira
  - y observa
  lexicon: HALOT
  rationale: El segundo imperativo refuerza el primero. «Y ve» conserva el paralelismo con un verbo breve y natural en español.
- source_word: מַכִּיר
  english_pob_choice: recognizes me
  chosen_spanish: me reconozca
  alternatives_spanish:
  - me conozca
  - me reconozca y me identifique
  lexicon: HALOT
  rationale: El participio aquí expresa reconocimiento personal, no mera posesión de información. «Reconozca» preserva mejor el matiz relacional de נכר en este contexto.
- source_word: אָבַד
  english_pob_choice: has perished
  chosen_spanish: se ha perdido
  alternatives_spanish:
  - ha perecido
  - ha desaparecido
  lexicon: HALOT
  rationale: El verbo expresa la desaparición total del recurso de escape. «Se ha perdido» es una forma natural en español que conserva la idea de pérdida irreversible sin endurecer innecesariamente el tono.
- source_word: מָנוֹס
  english_pob_choice: refuge
  chosen_spanish: el refugio
  alternatives_spanish:
  - la salida
  - el escape
  - el medio de escape
  lexicon: HALOT
  rationale: El sustantivo puede referirse al lugar o medio de huida. Dado el contexto de angustia, «refugio» comunica bien la desaparición de toda posibilidad de amparo o escape, aunque sigue abierta la alternativa semántica de «escape».
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: para mí
  alternatives_spanish:
  - de mí
  - a mi alcance
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente «de mí», en español el giro «se ha perdido el refugio para mí» expresa con naturalidad que ya no está a mi disposición. Se mantiene así la fuerza del resultado sin forzar una construcción extraña.
- source_word: דּוֹרֵשׁ
  english_pob_choice: seeks
  chosen_spanish: busque
  alternatives_spanish:
  - pregunte por
  - indague por
  - se interese por
  lexicon: HALOT
  rationale: En este lamento, דּוֹרֵשׁ con לְנַפְשִׁי retiene la idea de buscar/interesarse por la persona. «Busque» mantiene la cercanía al hebreo y sigue la revisión inglesa que volvió de «cares for» a «seeks».
- source_word: לְנַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - a mí
  - mi persona
  lexicon: HALOT
  rationale: נפש aquí apunta a la vida o al propio ser, no necesariamente a «alma» en sentido dualista. «Mi vida» evita imponer una antropología ajena al pasaje y sigue la decisión auditada en inglés.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un salmo de lamentación
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: La escena describe abandono y ausencia de apoyo, por lo que נפש se entiende mejor como vida o persona concreta. «Mi vida» preserva la tensión del hebreo sin importar una lectura espiritualizante no exigida por el texto.
  doctrine_reference: 'Antropología bíblica: evitar resolver prematuramente la relación entre vida, persona y alma; mantener la ambigüedad útil del hebreo donde corresponde.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que cambió «cares for my life» a «seeks my life», para reflejar con más precisión דּוֹרֵשׁ לְנַפְשִׁי. También se preservó la alternativa lexical documentada para מָנוֹס y la lectura de נפש como «vida».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se eligió un registro poético claro y contemporáneo, sin arcaísmos innecesarios.
  - 'Se conservó el paralelismo de dos imperativos iniciales con verbos breves: «Mira... y ve».'
