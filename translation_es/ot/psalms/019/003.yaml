translation:
  language: es
  text: Día tras día derrama expresión[a], y noche tras noche revela conocimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pronuncia expresión»; el verbo hebreo presenta la idea de un brotar o derramarse abundante, no solo de hablar.
    reason: lexical_alternative
  - marker: b
    text: O «declara conocimiento» o «da a conocer conocimiento»; el verbo hebreo puede significar revelar o declarar.
    reason: lexical_alternative
lexical_decisions:
- source_word: י֣וֹם ... לְיוֹם
  english_pob_choice: Day to day
  chosen_spanish: Un día ... a otro
  alternatives_spanish:
  - Día tras día
  - De día en día
  lexicon: HALOT
  rationale: La repetición del sustantivo con la preposición ל expresa sucesión o transmisión de un día al siguiente. En español, «un día ... a otro» conserva esa relación y mantiene el paralelismo poético sin sonar forzado.
- source_word: יַבִּ֣יעַ
  english_pob_choice: pours forth
  chosen_spanish: transmite
  alternatives_spanish:
  - derrama
  - hace brotar
  - fluye
  lexicon: HALOT
  rationale: El verbo hiphil de נבע sugiere un salir abundante, como algo que se derrama o fluye. «Transmite» evita una imagen demasiado física en español y conserva la idea de comunicación continua entre un día y el siguiente, aunque la metáfora de abundancia queda parcialmente implícita.
- source_word: אֹ֑מֶר
  english_pob_choice: speech
  chosen_spanish: palabra
  alternatives_spanish:
  - habla
  - mensaje
  - expresión
  lexicon: HALOT
  rationale: Aquí el sustantivo apunta a lo dicho o comunicado en general. «Palabra» es natural en español bíblico y permite una construcción idiomática con «transmite», sin cargar de más el sentido.
- source_word: וְ/לַ֥יְלָה לְּ/לַ֗יְלָה
  english_pob_choice: and night to night
  chosen_spanish: y una noche ... a otra
  alternatives_spanish:
  - y noche tras noche
  - y de noche en noche
  lexicon: HALOT
  rationale: La segunda cola repite la estructura de la primera; por eso conviene reproducirla de forma correlativa en español para preservar el paralelismo hebreo.
- source_word: יְחַוֶּה
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - declara
  - da a conocer
  - muestra
  lexicon: HALOT
  rationale: El piel de חוה significa hacer saber o declarar. «Revela» funciona bien en español para el contexto de la creación que comunica conocimiento, y empareja naturalmente con «conocimiento».
- source_word: דָּֽעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  - insight
  lexicon: HALOT
  rationale: El sustantivo denota conocimiento o saber. «Conocimiento» es la opción más directa y clara en español, conservando el paralelismo conceptual con «palabra» en la primera cola.
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión registrada: no se observan cambios pendientes; el verbo hebreo de abundancia en la primera cola y el paralelismo día/noche se mantienen como ejes interpretativos.'
  spanish_consistency_notes:
  - Se preserva el paralelismo hebreo con dos miembros sintácticamente semejantes.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Conocimiento» se mantiene como equivalente directo de דָּעַת sin precisar más de lo que el texto exige.
