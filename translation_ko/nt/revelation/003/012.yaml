  text: ὁ νικῶν ποιήσω αὐτὸν στῦλον ἐν τῷ ναῷ τοῦ θεοῦ μου, καὶ ἔξω οὐ μὴ ἐξέλθῃ ἔτι, καὶ γράψω ἐπ’ αὐτὸν τὸ ὄνομα τοῦ θεοῦ μου καὶ τὸ ὄνομα τῆς πόλεως τοῦ θεοῦ μου, τῆς καινῆς Ἰερουσαλήμ, ἡ ⸀καταβαίνουσα ἐκ τοῦ οὐρανοῦ ἀπὸ τοῦ θεοῦ μου, καὶ τὸ ὄνομά μου τὸ καινόν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/012.yaml
  text: 'The one who conquers—I will make him a pillar in the temple of my God[a], and he will never go out from it anymore. And I will write on him the name of my God, and the name of the city of my God, the new Jerusalem, which comes down out of heaven from my God[c][b], and my own new name.'
  footnotes:
  - marker: a
    text: Or 'The one who overcomes.' The Greek verb νικάω is a recurring term in Revelation for faithful victory.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he will certainly never go out anymore,' an emphatic negation in Greek.
    reason: lexical_alternative
  - marker: c
    text: Or 'my new name.' The Greek wording is emphatic.
    reason: lexical_alternative
translation:
  language: ko
  text: '이기는 자, 내가 그를 내 하나님의 성전에 기둥이 되게 하리니, 그는 결코 다시는 거기서 나가지 아니하리라[a]. 또 내가 그 위에 내 하나님의 이름과 내 하나님의 성, 곧 새 예루살렘—이것은 내 하나님께로부터 하늘에서 내려오는 성이다—의 이름과, 나의 새 이름을 기록하리라.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어는 「결코 다시는 나가지 아니하리라」의 강조 부정이다.'
    reason: lexical_alternative
