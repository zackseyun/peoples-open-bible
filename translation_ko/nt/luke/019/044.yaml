id: LUK.19.44
reference: Luke 19:44
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἐδαφιοῦσίν σε καὶ τὰ τέκνα σου ἐν σοί, καὶ οὐκ ἀφήσουσιν ⸂λίθον ἐπὶ λίθον ἐν σοί⸃, ἀνθ’ ὧν οὐκ ἔγνως τὸν καιρὸν τῆς ἐπισκοπῆς σου.
base_translation:
  language: en
  yaml_path: translation/nt/luke/019/044.yaml
  text: and they will level you to the ground[a], and your children within you, and they will not leave one stone upon another within you, because you did not recognize the time of your visitation.
  footnotes:
  - marker: a
    text: Or 'the time of your inspection.' The Greek term can denote a visitation or inspection, especially a divine visitation that may bring either mercy or judgment.
    reason: lexical_alternative
translation:
  language: ko
  text: 너와 네 안에 있는 네 자녀들을 땅에 메어치고 네 안에 돌 위에 돌 하나도 남겨 두지 않을 것이기 때문이다. 이는 네가 너를 돌보신 때를 알지 못했기 때문이다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: τὸν καιρὸν τῆς ἐπισκοπῆς σου의 「돌보심의 때」
  chosen_reading: 너를 돌보신 때
  alternative_readings:
  - 방문하신 때
  - 감찰하신 때
  rationale: ἐπισκοπή는 LXX에서 하나님의 자기 백성 방문(긍정적 구원 또는 부정적 심판)을 가리키는 신학어. 본문은 메시아의 도래라는 긍정적 방문을 가리키므로 「돌보신」이 자연스럽다.
  doctrine_reference: DOCTRINE.md §1 author intent
