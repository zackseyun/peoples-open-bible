translation:
  language: es
  text: 'Entonces Moisés dijo a Aarón: «Acércate al altar, y ofrece tu ofrenda por el pecado[a] y tu holocausto, y haz expiación por ti y por el pueblo. Después ofrece la ofrenda del pueblo, y haz expiación por ellos, tal como Yahvé mandó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por la purificación». El término hebreo חַטָּאת puede referirse a la ofrenda por el pecado, y en algunos contextos enfatiza la purificación de la impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרַב
  english_pob_choice: Come near
  chosen_spanish: Acércate
  alternatives_spanish:
  - Aproximaos
  - Arrímate
  lexicon: HALOT
  rationale: El imperativo cultual de קרב expresa acercamiento físico y ritual. «Acércate» mantiene la forma directa y natural en español, conservando el matiz de acceso al altar sin volverlo más interpretativo de lo que permite el hebreo.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: Es el referente cultual concreto y definido. «El altar» basta en español y no añade un calificativo que el texto no da.
- source_word: וַעֲשֵׂה
  english_pob_choice: offer
  chosen_spanish: ofrece
  alternatives_spanish:
  - haz
  - presenta
  lexicon: HALOT
  rationale: Aunque el verbo básico es «hacer», aquí el contexto sacrificial exige un verbo de ejecución cultual. «Ofrece» comunica de forma clara la acción de presentar el sacrificio y evita una traducción demasiado literal y opaca.
- source_word: חַטָּאתְךָ
  english_pob_choice: your sin offering
  chosen_spanish: tu ofrenda por el pecado
  alternatives_spanish:
  - tu ofrenda por la purificación
  - tu sacrificio por el pecado
  lexicon: HALOT
  rationale: En español, «ofrenda por el pecado» conserva la referencia tradicional del sacrificio sin fijar indebidamente solo una teoría. Se mantiene la tensión léxica entre pecado y purificación con una nota alternativa.
- source_word: עֹלָתֶךָ
  english_pob_choice: your burnt offering
  chosen_spanish: tu holocausto
  alternatives_spanish:
  - tu ofrenda totalmente quemada
  - tu ofrenda quemada
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente establecido para la ofrenda completamente consumida por el fuego. Aunque tiene asociaciones modernas particulares, sigue siendo el término bíblico más reconocible y preciso en este contexto sacrificial.
- source_word: וְכַפֵּר
  english_pob_choice: make atonement
  chosen_spanish: haz expiación
  alternatives_spanish:
  - haz propiciación
  - realiza expiación
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal puede abarcar expiación, purificación y reconciliación. «Haz expiación» es una solución formal y transparente que preserva el peso ritual sin cerrarlo a una única explicación doctrinal.
- source_word: בַּעַדְךָ וּבְעַד הָעָם
  english_pob_choice: for yourself and for the people
  chosen_spanish: por ti y por el pueblo
  alternatives_spanish:
  - en favor de ti y en favor del pueblo
  - por ti mismo y por el pueblo
  lexicon: HALOT
  rationale: La preposición בעד tiene fuerza representativa/benefactiva. «Por» funciona naturalmente en español y mantiene la idea de actuación en favor de alguien dentro del marco sacrificial.
- source_word: קָרְבַּן הָעָם
  english_pob_choice: the people's offering
  chosen_spanish: la ofrenda del pueblo
  alternatives_spanish:
  - el sacrificio del pueblo
  - la ofrenda del pueblo
  lexicon: HALOT
  rationale: קרבן designa una ofrenda presentada. «La ofrenda del pueblo» respeta la relación de constructo y suena natural en español, sin sustituirla por un término más litúrgico o más técnico de lo que exige el texto.
- source_word: בַּעֲדָם
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - en favor de ellos
  - por su causa
  lexicon: HALOT
  rationale: Se conserva la misma preposición con el mismo valor representativo. «Por ellos» es breve y coherente con el primer uso de בעד en la frase.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: just as Yahweh commanded
  chosen_spanish: tal como Yahvé mandó
  alternatives_spanish:
  - como Yahvé mandó
  - según mandó Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה con «Yahvé». «Tal como» expresa conformidad exacta con el mandato divino y mantiene el cierre obediencial del verso.
theological_decisions:
- issue: Lexical range of חַטָּאת in sacrificial context
  english_pob_reading: sin offering, with a footnote noting purification offering
  chosen_spanish_reading: ofrenda por el pecado, con nota alternativa de ofrenda por la purificación
  alternative_spanish_readings:
  - ofrenda por la purificación
  - sacrificio por el pecado
  rationale: El hebreo puede referirse al sacrificio que trata con pecado o con impureza ritual. La redacción principal conserva el sentido tradicional y ampliamente entendible, mientras la nota preserva la alternativa documentada para no borrar la tensión semántica.
  doctrine_reference: Preservar tensión léxica documentada; no resolver artificialmente un campo semántico discutido.
- issue: Force of כפר in priestly sacrificial action
  english_pob_reading: make atonement
  chosen_spanish_reading: haz expiación
  alternative_spanish_readings:
  - haz propiciación
  - purifica
  rationale: El verbo hebreo tiene fuerza ritual y relacional amplia. «Haz expiación» mantiene esa amplitud en español mejor que una paráfrasis doctrinalmente cerrada y no impone una teoría única del sacrificio.
  doctrine_reference: Evitar importar una explicación doctrinal no exigida por el texto; mantener el valor sacrificial general.
- issue: Rendering of יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se adopta el nombre divino según la norma del proyecto, preservando la referencia al Tetragrama en lugar de sustituirlo por un título. «Yahvé» es la forma establecida para la audiencia meta y mantiene la continuidad con el texto fuente.
  doctrine_reference: Transliteración del Nombre divino; evitar el reemplazo reverencial por un título.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para sustituir «the LORD» por «Yahweh», reflejando el Nombre divino del hebreo. La presente versión sigue esa revisión con «Yahvé», y conserva la nota léxica de חַטָּאת para no perder la alternativa documentada «purification offering».
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se conserva la terminología sacrificial con «ofrenda», «holocausto» y «haz expiación» para reflejar el registro levítico.
  - La voz imperativa y el paralelismo de dos acciones sacrificiales se reproducen de forma clara y ritmada.
  - «Por» se usa de manera consistente para בעד en sentido representativo/benefactivo.
