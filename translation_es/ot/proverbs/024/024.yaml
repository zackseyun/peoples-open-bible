    issue: La nota al pie añade explicación interpretativa no documentada
    rationale: La nota dice «es decir, declarar justo al malvado», lo cual parafrasea el sentido en vez de limitarse a registrar la alternativa léxica preservada por la auditoría inglesa.
  - severity: medium
    issue: «Lo repudiarán» se aleja de la elección auditada «will denounce him»
    rationale: Aunque no es erróneo, «repudiarán» enfatiza rechazo más que denuncia o reprobación pública. «Denunciarán» sigue mejor la racionalidad léxica ya documentada.
