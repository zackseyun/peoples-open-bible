  to: para recibir instrucción en prudencia, rectitud, justicia y equidad[a].
  rationale: 'Se ajusta הַשְׂכֵּל a ''prudencia'' para un español natural y fiel al sentido práctico. Se reordena la tríada ética para reflejar mejor las distinciones del hebreo y del POB inglés: צֶדֶק = ''rectitud'', מִשְׁפָּט = ''justicia'', מֵישָׁרִים = ''equidad''. Se añade una nota a ''equidad'' para preservar la alternativa documentada de ''uprightness'' en una forma natural para español.'
