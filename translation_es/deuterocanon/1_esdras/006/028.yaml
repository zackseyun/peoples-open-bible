base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/006/028.yaml
  text: and from the tribute of Coele-Syria and Phoenicia[a], support is to be given carefully to these men for sacrifice to the Lord, to Zerubbabel the governor, for bulls and rams and lambs[c][b],
  footnotes:
  - marker: a
    text: Or 'an allowance is to be given' or 'provision is to be made.' The Greek σύνταξιν δίδοσθαι refers to an official allotment or support from provincial revenues.
    reason: lexical_alternative
  - marker: b
    text: '''Coele-Syria'' is the conventional Greek provincial name for the region; literally, the term means ''Hollow Syria.'''
    reason: cultural_note
  - marker: c
    text: The syntax around 'to Zerubbabel the governor' is compressed in Greek and may indicate either the recipient/administrator of the support or an appositional identification within the decree.
    reason: alternative_reading
