base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/004/003.yaml
  text: And his hand is among the first against him[a], as if in zeal, but he himself is guilty in a variety of sinful deeds[d][c][b], in acts of self-indulgence.
  footnotes:
  - marker: a
    text: Or “his hand is at first upon him,” taking ἐν πρώτοις temporally rather than as priority among accusers.
    reason: alternative_reading
  - marker: b
    text: Or “as in zeal”; the phrase may describe apparent zeal or a claimed posture of zeal.
    reason: lexical_alternative
  - marker: c
    text: Literally “guilty in a variety of sinners, in self-indulgences”; the Greek is compressed, and “the manifold ways of sinners” is an idiomatic rendering of the sense.
    reason: lexical_alternative
  - marker: d
    text: Or 'in the manifold ways of sinners'.
    reason: previous_rendering
