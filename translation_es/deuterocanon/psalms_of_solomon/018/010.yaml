translation:
  language: es
  text: Una buena generación en el temor de Dios, en días de misericordia. Interludio.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Interludio» traduce διάψαλμα, una probable indicación litúrgica o musical; tradicionalmente, «Selah».
    reason: lexical_alternative
lexical_decisions:
- source_word: γενεὰ
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - linaje
  - pueblo
  - edad
  lexicon: BDAG
  rationale: «Generación» conserva el sentido colectivo nominal del griego y sigue de cerca la decisión inglesa, sin especificar más de lo que el texto dice.
- source_word: ἀγαθὴ
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - justa
  - noble
  - upright
  lexicon: BDAG
  rationale: «Buena» reproduce el adjetivo general ἀγαθή sin cargarlo prematuramente con una cualidad más específica que el griego no explicita.
- source_word: ἐν φόβῳ θεοῦ
  english_pob_choice: in the fear of God
  chosen_spanish: en el temor de Dios
  alternatives_spanish:
  - con reverencia por Dios
  - en reverencia a Dios
  lexicon: BDAG
  rationale: «Temor de Dios» mantiene el peso bíblico-teológico de la expresión y evita diluirla en una paráfrasis más débil; en español, «temor» es el equivalente natural para este idiomático bíblico.
- source_word: ἐν ἡμέραις ἐλέους
  english_pob_choice: in days of mercy
  chosen_spanish: en días de misericordia
  alternatives_spanish:
  - en los días de misericordia
  - durante días misericordiosos
  - en días de compasión
  lexicon: BDAG
  rationale: «Misericordia» es la forma más directa de ἔλεος y conserva el plural temporal del griego con una estructura natural en español.
- source_word: διάψαλμα
  english_pob_choice: Interlude
  chosen_spanish: '[b]'
  alternatives_spanish:
  - Interludio
  - Selah
  - pausa musical
  lexicon: LSJ
  rationale: El término funciona como notación litúrgica o musical. En español, se preserva la nota explicativa en pie de página en vez de forzar una equivalencia cerrada en el cuerpo del texto.
- source_word: '[implied copula / verbless clause]'
  english_pob_choice: '[not expressed in the final English text]'
  chosen_spanish: '[not added]'
  alternatives_spanish:
  - es
  - está
  lexicon: Syntax
  rationale: El griego es una cláusula nominal sin verbo. Como en la revisión inglesa final se prefirió mantener la concisión poética, el español también conserva la estructura nominal sin introducir una cópula explícita.
theological_decisions:
- issue: Cómo traducir φόβος θεοῦ
  english_pob_reading: Retained as "fear of God" in the main text
  chosen_spanish_reading: «temor de Dios» en el texto principal
  alternative_spanish_readings:
  - «reverencia por Dios»
  - «reverencia a Dios»
  rationale: Se preserva la tensión bíblica entre reverencia, obediencia y awe. Traducirlo solo como «reverencia» estrecharía indebidamente el alcance teológico del hebraísmobíblico subyacente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente restauró «Interlude» para διάψαλμα y mantuvo la estructura nominal sin verbo. Esta versión española sigue esa decisión: conserva la concisión del enunciado y coloca la indicación litúrgica en nota, sin añadir una cópula que el griego no expresa.'
  spanish_consistency_notes:
  - Se usó «Dios» con mayúscula para θεοῦ, conforme al estándar del proyecto.
  - Se mantuvo la estructura nominal breve para reflejar el carácter poético del griego.
  - No se añadió «el/la» ante «generación» para no sobreespecificar el sintagma griego.
  - «Misericordia» se eligió por su valor más directo para ἔλεος.
