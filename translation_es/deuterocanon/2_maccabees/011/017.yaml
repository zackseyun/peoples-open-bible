translation:
  language: es
  text: Juan y Absalón[a], que fueron enviados por ustedes, entregaron el memorándum escrito e hicieron una petición respecto de los asuntos indicados en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la comunicación escrita adjunta» o «el decreto escrito abajo». La expresión griega τὸν ὑπογεγραμμένον χρηματισμόν es documental y algo técnica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωάνης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Joanes
  lexicon: Greek proper-name tradition
  rationale: Se conserva el nombre propio en su forma española habitual, como transliteración reconocible del griego.
- source_word: Ἀβεσσαλώμ
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Abessalón
  lexicon: Greek proper-name tradition
  rationale: Se usa la forma española tradicional y reconocible del nombre propio, manteniendo la referencia al personaje.
- source_word: οἱ πεμφθέντες
  english_pob_choice: who were sent
  chosen_spanish: que fueron enviados
  alternatives_spanish:
  - los enviados
  - habiendo sido enviados
  lexicon: BDAG
  rationale: El participio aoristo pasivo se vierte de manera natural como una relativa pasiva que mantiene el matiz de comisión/envío.
- source_word: παρʼ ὑμῶν
  english_pob_choice: by you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - de ustedes
  - por vosotros
  lexicon: BDAG
  rationale: En este contexto diplomático, παρά con genitivo indica origen o comisión; 'por ustedes' expresa la agencia de manera clara en español.
- source_word: ἐπιδόντες
  english_pob_choice: delivered
  chosen_spanish: entregaron
  alternatives_spanish:
  - presentaron
  - entregaron en mano
  lexicon: BDAG
  rationale: El verbo describe la acción de pasar un documento oficial; 'entregaron' es idiomático y conserva el carácter documental.
- source_word: τὸν ὑπογεγραμμένον χρηματισμόν
  english_pob_choice: the written memorandum
  chosen_spanish: el memorándum escrito
  alternatives_spanish:
  - la comunicación escrita adjunta
  - el documento escrito
  - el decreto escrito abajo
  lexicon: BDAG
  rationale: Se preserva el tono documental sin forzar 'decreto', ya que χρηματισμός puede designar una comunicación u oficio formal; 'memorándum escrito' comunica bien el carácter administrativo.
- source_word: ἠξίουν
  english_pob_choice: made request
  chosen_spanish: pidieron
  alternatives_spanish:
  - solicitaron
  - hicieron petición
  - ruegos hicieron
  lexicon: BDAG
  rationale: En español, 'pidieron' transmite la solicitud formal del contexto diplomático sin sonar rígido; mantiene la fuerza petitoria del verbo.
- source_word: περὶ τῶν διʼ αὐτοῦ σημαινομένων
  english_pob_choice: concerning the matters indicated in it
  chosen_spanish: respecto de las cosas indicadas en él
  alternatives_spanish:
  - acerca de los asuntos significados por él
  - respecto de lo comunicado por él
  lexicon: BDAG
  rationale: Se mantiene el referente documental de αὐτοῦ y el sentido de 'indicar/manifestar' de σημαινομένων; 'cosas indicadas' refleja el contenido señalado por el escrito.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: nombres propios transliterados; el pasivo participial se mantuvo con una relativa; la frase documental τὸν ὑπογεγραμμένον χρηματισμόν se tradujo con un equivalente administrativo comprensible, conservando su posible ambigüedad técnica. No se introdujeron cambios textuales sustantivos respecto del sentido aprobado.'
  spanish_consistency_notes:
  - Se prefirió 'por ustedes' para mantener un registro general neutro y amplio.
  - '''Memorándum escrito'' conserva la cualidad documental sin convertir innecesariamente el término en un decreto legal.'
  - La nota textual ofrece alternativas donde el griego puede ser entendido como comunicación adjunta o decreto escrito debajo.
