translation:
  language: es
  text: para anunciar por la mañana tu amor constante, y por las noches[a] tu fidelidad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “noche tras noche”. El hebreo usa el plural “noches”, lo que puede expresar una alabanza repetida cada noche.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: para anunciar
  alternatives_spanish:
  - para declarar
  - para proclamar
  - para decir
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. En español, "para anunciar" conserva la idea de dar a conocer de forma pública o testimonial, con naturalidad moderna. "Declarar" sería más formal, pero suena algo más jurídico; "proclamar" intensifica más de lo que el hebreo exige aquí.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - a la mañana
  lexicon: HALOT
  rationale: La preposición ב con el sustantivo temporal indica tiempo. "Por la mañana" es una equivalencia natural en español y mantiene el contraste temporal con "por las noches".
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor constante
  alternatives_spanish:
  - tu amor leal
  - tu misericordia
  - tu amor de pacto
  lexicon: HALOT
  rationale: חֶסֶד combina benevolencia, lealtad y permanencia. "Amor constante" preserva la fuerza relacional y la continuidad sin cargar el texto con una fórmula demasiado técnica. Se evita "misericordia" por ser demasiado estrecha en este paralelismo.
- source_word: וֶאֱמוּנָתְךָ
  english_pob_choice: and your faithfulness
  chosen_spanish: y tu fidelidad
  alternatives_spanish:
  - y tu fe constante
  - y tu confiabilidad
  - y tu lealtad
  lexicon: HALOT
  rationale: אֱמוּנָה aquí señala fiabilidad y constancia. "Fidelidad" es el equivalente más natural y preciso en español bíblico contemporáneo, manteniendo el paralelismo con חֶסֶד.
- source_word: בַּלֵּילוֹת
  english_pob_choice: in the nights
  chosen_spanish: por las noches
  alternatives_spanish:
  - en las noches
  - noche tras noche
  - de noche
  lexicon: HALOT
  rationale: El hebreo está en plural, y la traducción conserva ese plural con "por las noches". Esta opción transmite bien el sentido reiterativo o habitual sin forzar una nota explicativa en el texto principal.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en la estructura: infinitivo de propósito + contraste temporal "mañana/noches" + paralelismo entre חֶסֶד y אֱמוּנָה. No hubo revisiones aplicadas en el pasaje base; por eso se mantiene la equivalencia semántica sin ampliar el contenido.'
  spanish_consistency_notes:
  - Se conserva el plural de בַּלֵּילוֹת con "por las noches" para no neutralizar el matiz del hebreo.
  - '"Amor constante" y "fidelidad" mantienen el paralelismo conceptual del original sin recurrir a una fórmula eclesiástica fija que oscurezca la relación entre los dos términos.'
  - El tono es poético y bíblico, pero con sintaxis natural para lectura pública en español.
