review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: «Y les dije / en aquel tiempo / no puedo ... yo solo». Sin embargo, «llevarlos» en el texto principal inclina más hacia transporte o conducción que hacia «cargar con / soportar la carga de» que documenta la auditoría inglesa para שְׂאֵת אֶתְכֶם. La nota intenta corregirlo, pero el texto principal debería representar mejor la fuerza metafórica de responsabilidad.'
  spanish_quality_summary: El español es claro y natural, pero «No puedo llevarlos yo solo» puede sonar a desplazarlos o guiarlos físicamente. Una formulación más fiel y también natural en español bíblico moderno es «No puedo cargar con ustedes yo solo». Esto preserva mejor la metáfora de carga/responsabilidad sin caer en la idea de mera tolerancia («soportarlos»).
  glossary_alignment: 'No hay términos del glosario mayor en juego. La principal decisión léxica es נשא: conviene evitar un verbo español demasiado físico o ambiguo. «Cargar con ustedes» alinea mejor con la justificación léxica y teológica documentada por el POB que «llevarlos».'
  issues:
  - severity: medium
    issue: El verbo principal «llevarlos» no representa con suficiente precisión el sentido metafórico de שְׂאֵת אֶתְכֶם.
    rationale: La auditoría inglesa explica que el verbo puede significar llevar/cargar en sentido literal o figurado, y aquí se refiere a que Moisés lleva la responsabilidad del pueblo. En español, «llevarlos» se oye con facilidad como transporte o conducción; «cargar con ustedes» comunica mejor la carga de responsabilidad.
  - severity: low
