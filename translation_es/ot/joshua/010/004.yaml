translation:
  language: es
  text: Suban hacia mí y ayúdenme, y ataquemos a Gabaón, porque ha hecho las paces con Josué y con los hijos de Israel[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los israelitas» o «el pueblo de Israel». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: O «ha hecho una alianza con». El verbo hebreo puede denotar entrar en relaciones pacíficas o en una paz de tratado.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֽוּ אֵלַ֣/י
  english_pob_choice: Come up to me
  chosen_spanish: Suban a mí
  alternatives_spanish:
  - Vengan a mí
  - Suban hasta mí
  lexicon: HALOT
  rationale: El imperativo plural de עלה conserva la idea de movimiento ascendente o de acercarse desde una posición inferior. En español, «Suban a mí» mantiene la dirección y la voz del hablante sin volverlo mecánico; «vengan» suaviza la verticalidad que el hebreo sí sugiere.
- source_word: וְ/עִזְרֻ֔/נִי
  english_pob_choice: and help me
  chosen_spanish: y ayúdenme
  alternatives_spanish:
  - y vengan en mi ayuda
  - y auxílienme
  lexicon: HALOT
  rationale: El verbo עזר con sufijo de 1cs pide un plural dirigido al hablante. «Ayúdenme» es natural en español y conserva la petición directa; «auxílienme» sería más formal, pero menos corriente.
- source_word: וְ/נַכֶּ֖ה
  english_pob_choice: and let us strike
  chosen_spanish: y ataquemos
  alternatives_spanish:
  - y golpeemos
  - y demos contra
  lexicon: HALOT
  rationale: El cohortativo plural expresa intención conjunta de acción militar. «Ataquemos» comunica bien el valor volitivo en español moderno, aunque pierde algo de la literalidad de נכה; se prefiere aquí por claridad idiomática sin añadir una interpretación más específica que el contexto ya justifica.
- source_word: אֶת גִּבְע֑וֹן
  english_pob_choice: Gibeon
  chosen_spanish: Gabaón
  alternatives_spanish:
  - Gibeón
  - Gabaón
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible del topónimo, sin alterar la referencia geográfica. La transliteración puede variar, pero «Gabaón» es amplia y eclesialmente inteligible.
- source_word: כִּֽי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula causal introduce el motivo de la petición. «Porque» es la opción más directa y transparente en español.
- source_word: הִשְׁלִ֥ימָה
  english_pob_choice: has made peace
  chosen_spanish: ha hecho paz
  alternatives_spanish:
  - ha concertado paz
  - ha hecho un pacto de paz
  - se ha aliado
  lexicon: HALOT
  rationale: El verbo שלם en este contexto diplomático apunta a entrar en relaciones pacíficas/tutela pactada. «Ha hecho paz» mantiene el paralelismo semántico de la decisión inglesa sin convertirla necesariamente en «alianza», que sería más interpretativo; en español suena algo más literal que «ha concertado paz», pero sigue siendo comprensible.
- source_word: וְ/אֶת בְּנֵ֥י יִשְׂרָאֵֽל
  english_pob_choice: and with the sons of Israel
  chosen_spanish: y con los hijos de Israel
  alternatives_spanish:
  - y con los israelitas
  - y con el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo בני ישראל, como hace la POB inglesa, para no neutralizarla sin necesidad. «Hijos de Israel» mantiene la correspondencia formal y la referencia al pueblo del pacto.
theological_decisions:
- issue: Renderizado de בני ישראל en un contexto histórico-nacional
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La POB inglesa preserva el matiz lexical del hebreo en vez de sustituirlo por una expresión genérica. En español, «hijos de Israel» conserva esa tensión sin perder inteligibilidad y evita borrar la forma idiomática del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de הִשְׁלִימָה en contexto de tratado/paz
  english_pob_reading: has made peace
  chosen_spanish_reading: ha hecho paz
  alternative_spanish_readings:
  - ha concertado paz
  - ha hecho un pacto
  - se ha aliado
  rationale: La escena no describe meramente una amistad ni un sometimiento, sino la entrada en una relación pacífica con implicaciones políticas. «Ha hecho paz» preserva esa ambigüedad útil entre paz y arreglo tratado, sin imponer una lectura más estrecha que el hebreo o la nota inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés: mantiene el impulso militar del imperativo plural, conserva la expresión hebrea «hijos de Israel» y refleja la ambigüedad diplomática de הִשְׁלִימָה con una frase española equivalente y transparente. No se detectaron revisiones pendientes relevantes en el expediente fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Gabaón» como topónimo español estándar, consistente con el uso bíblico en español.
  - Se prefirió «hijos de Israel» para conservar la forma hebrea del etnónimo, en línea con la política POB de precisión lexical.
  - «Ha hecho paz» se usó para no clausurar la posibilidad de pacto/alianza, dejando la tensión documentada en nota.
  - El tono general es formal y bíblico, pero con sintaxis natural en español contemporáneo.
