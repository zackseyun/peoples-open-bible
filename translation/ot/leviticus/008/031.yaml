id: LEV.8.31
reference: Leviticus 8:31
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶל אַהֲרֹ֣ן וְ/אֶל בָּנָ֗י/ו בַּשְּׁל֣וּ אֶת הַ/בָּשָׂר֮ פֶּ֣תַח אֹ֣הֶל מוֹעֵד֒ וְ/שָׁם֙ תֹּאכְל֣וּ אֹת֔/וֹ וְ/אֶ֨ת הַ/לֶּ֔חֶם אֲשֶׁ֖ר בְּ/סַ֣ל הַ/מִּלֻּאִ֑ים כַּ/אֲשֶׁ֤ר צִוֵּ֨יתִי֙ לֵ/אמֹ֔ר אַהֲרֹ֥ן וּ/בָנָ֖י/ו יֹאכְלֻֽ/הוּ־־־־׃
translation:
  text: And Moses said to Aaron and to his sons[a], “Boil the meat at the entrance of the tent of meeting, and there eat it and the bread that is in the basket of ordination offerings, just as I commanded, saying, ‘Aaron and his sons shall eat it.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the basket of consecration offerings.” The Hebrew term refers to the offerings associated with the priests’ installation rite.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשְּׁלוּ
  chosen: Boil
  alternatives:
  - Cook
  lexicon: HALOT
  rationale: The verb בשׁל in sacrificial contexts commonly means to boil/cook. 'Boil' is more specific and fits the ritual setting better than the broader 'cook.'
- source_word: הַבָּשָׂר
  chosen: the meat
  alternatives:
  - the flesh
  lexicon: HALOT
  rationale: Refers to the sacrificial animal's edible portion. 'Meat' is natural modern English in this culinary/ritual context, while 'flesh' would sound overly literal and less idiomatic.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  - at the entrance to the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'At the entrance of the tent of meeting' is clear, natural, and preserves the cultic location without unnecessary paraphrase.
- source_word: וְשָׁם תֹּאכְלוּ אֹתוֹ
  chosen: and there eat it
  alternatives:
  - and eat it there
  lexicon: HALOT
  rationale: The adverb שָׁם is emphatic for location. Fronting 'there' preserves the Hebrew emphasis while remaining readable English.
- source_word: הַלֶּחֶם
  chosen: the bread
  alternatives:
  - the loaf
  - the food
  lexicon: HALOT
  rationale: לחם here refers specifically to the bread accompanying the ordination rite. 'Bread' is the straightforward and contextually accurate rendering.
- source_word: סַל הַמִּלֻּאִים
  chosen: the basket of ordination offerings
  alternatives:
  - the basket of consecration offerings
  - the basket of fillings
  lexicon: HALOT
  rationale: מִלֻּאִים in this priestly context refers to ordination/consecration rites ('filling the hand'). 'Ordination offerings' communicates the ritual sense clearly in modern English. 'Consecration offerings' is possible, but 'ordination' better matches the installation of Aaron and his sons.
- source_word: כַּאֲשֶׁר צִוֵּיתִי לֵאמֹר
  chosen: just as I commanded, saying
  alternatives:
  - as I commanded, saying
  - just as I commanded when I said
  lexicon: HALOT
  rationale: This preserves the formal structure of the Hebrew, including the infinitive לֵאמֹר introducing the quoted command, while remaining natural in English.
- source_word: יֹאכְלֻהוּ
  chosen: shall eat it
  alternatives:
  - are to eat it
  - must eat it
  lexicon: HALOT
  rationale: The imperfect here expresses instruction/obligation within reported speech. 'Shall eat it' preserves the directive force without over-interpreting it as either mere future or stronger modal necessity.
