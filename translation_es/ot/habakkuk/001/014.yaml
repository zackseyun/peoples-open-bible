translation:
  language: es
  text: Tú haces al hombre como a los peces del mar[a], como a criaturas que se arrastran, sin gobernante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad». El hebreo אָדָם está en singular («hombre»), pero puede representar colectivamente a la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲשֶׂה
  english_pob_choice: You make
  chosen_spanish: Tú haces
  alternatives_spanish:
  - Tú haces
  - Tú has hecho
  lexicon: HALOT
  rationale: El verbo עשה, con valor de imperfecto en discurso directo a Dios, puede expresar una acción presente en la queja profética. En español, «Tú haces» comunica mejor esa fuerza actual que un pretérito, y conserva el tono de acusación/observación del original.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - los seres humanos
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en singular con valor representativo y colectivo. «El hombre» conserva esa forma singular con fuerza genérica, como en la decisión inglesa, sin borrar la tensión entre singular gramatical y referencia colectiva.
- source_word: כִּדְגֵי הַיָּם
  english_pob_choice: like the fish of the sea
  chosen_spanish: como a los peces del mar
  alternatives_spanish:
  - como los peces del mar
  - como a los peces en el mar
  lexicon: HALOT
  rationale: La construcción comparativa se mantiene de manera transparente. «Del mar» reproduce bien el genitivo hebreo y su registro poético, mientras que «a los peces» integra naturalmente la comparación con «haces» en español.
- source_word: כְּרֶמֶשׂ
  english_pob_choice: like creeping things
  chosen_spanish: como a los seres que se arrastran
  alternatives_spanish:
  - como a las criaturas que se arrastran
  - como a los reptiles
  lexicon: HALOT
  rationale: רֶמֶשׂ designa de modo amplio criaturas que se mueven arrastrándose. «Seres que se arrastran» preserva la imagen sin restringirla indebidamente a una clase zoológica específica; «reptiles» sería demasiado estrecho para el hebreo.
- source_word: לֹא מֹשֵׁל בּוֹ
  english_pob_choice: that have no ruler over them
  chosen_spanish: que no tienen gobernante sobre ellos
  alternatives_spanish:
  - que no tienen quien los gobierne
  - sin que nadie gobierne sobre ellos
  lexicon: HALOT
  rationale: מֹשֵׁל es un participio con sentido nominal de «gobernante / quien gobierna». «Gobernante» preserva ese matiz nominal mejor que un verbo parapráfrastico. Se usa plural idiomático en español («ellos») porque el referente es colectivo, aunque בּוֹ sea singular.
theological_decisions:
- issue: Sentido colectivo de אָדָם con forma singular
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: La forma hebrea es singular y representativa, no una abstracción neutra. «El hombre» mantiene la correspondencia morfológica y la decisión de precisión de género del texto fuente, al tiempo que sigue siendo claramente inclusiva por contexto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Referencia del pronombre singular בּוֹ en una comparación colectiva
  english_pob_reading: over them
  chosen_spanish_reading: sobre ellos
  alternative_spanish_readings:
  - sobre él
  - sobre esto
  rationale: Aunque el hebreo usa un singular morfológico, la comparación agrupa a la humanidad como conjunto de peces y seres que se arrastran. El plural español evita una discordancia innecesaria y expresa la referencia colectiva que ya está implícita en el contexto.
  doctrine_reference: HALOT y el paralelismo poético de la cláusula
translation_notes:
  revision_awareness: El contexto auditado de la POB inglesa no requirió cambios de fondo; se conservó la decisión central sobre אָדָם como singular representativo y la comparación poética con peces y seres que se arrastran. La redacción española ajusta la sintaxis para sonar natural sin perder el paralelismo ni la fuerza acusatoria del original.
  spanish_consistency_notes:
  - Se mantuvo «el hombre» para reflejar la singularidad morfológica de אָדָם, en línea con la política de precisión de género.
  - Se evitó «SEÑOR» porque el hebreo aquí no contiene el nombre divino, sino una queja dirigida a Dios implícitamente en la forma verbal de segunda persona.
  - «Gobernante» conserva mejor el valor nominal de מֹשֵׁל que una paráfrasis verbal.
  - 'La comparación se formuló con dos miembros paralelos en español para respetar el ritmo hebreo: peces del mar / seres que se arrastran.'
