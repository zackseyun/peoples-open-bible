translation:
  language: es
  text: 'Mi padre me hizo jurar[a], diciendo: «Mira, yo estoy muriendo. En mi sepulcro que cavé para mí en la tierra de Canaán, allí me sepultarás». Ahora, pues, te ruego que me permitas subir para sepultar a mi padre; luego volveré.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo labré para mí». El verbo hebreo literalmente significa «cavar», aunque en contextos funerarios puede referirse más ampliamente a preparar una tumba.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבִּיעַנִי
  english_pob_choice: made me swear
  chosen_spanish: me hizo jurar
  alternatives_spanish:
  - me puso bajo juramento
  - me obligó a jurar
  lexicon: HALOT
  rationale: El causativo expresa que otro impone el juramento; «me hizo jurar» reproduce esa fuerza de manera natural en español sin suavizarla hacia un simple «me pidió».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Es la fórmula introductoria de discurso directo; «diciendo» conserva el enlace sintáctico sin añadir contenido.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - He aquí
  lexicon: HALOT
  rationale: La partícula llama la atención; en español bíblico contemporáneo, «Mira» transmite mejor la apelación inmediata que un calco solemne demasiado arcaico.
- source_word: מֵת
  english_pob_choice: I am dying
  chosen_spanish: yo estoy muriendo
  alternatives_spanish:
  - estoy por morir
  - estoy muriendo
  lexicon: HALOT
  rationale: El participio en contexto expresa una muerte inminente o en curso. «Yo estoy muriendo» conserva la idea de proceso y evita convertirlo en una mera previsión.
- source_word: בְּקִבְרִי
  english_pob_choice: In my grave
  chosen_spanish: En mi sepulcro
  alternatives_spanish:
  - En mi tumba
  - En mi lugar de sepultura
  lexicon: HALOT
  rationale: קבר puede ser «sepulcro», «tumba» o «sepultura». «Sepulcro» funciona bien en registro bíblico y evita la imagen demasiado moderna de «grave»; además, es compatible con un sitio preparado para entierro.
- source_word: כָּרִיתִי לִי
  english_pob_choice: I dug for myself
  chosen_spanish: cavé para mí
  alternatives_spanish:
  - heché/escavé para mí
  - abrí para mí
  lexicon: HALOT
  rationale: El verbo literalmente es «cavar/ahondar». «Cavé para mí» preserva la concreción del acto y evita introducir «hewn out» sin base en el hebreo.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» suena natural y mantiene la referencia deíctica.
- source_word: תִּקְבְּרֵנִי
  english_pob_choice: you shall bury me
  chosen_spanish: me sepultarás
  alternatives_spanish:
  - me enterrarás
  - me darás sepultura
  lexicon: HALOT
  rationale: El imperfecto en contexto funciona como mandato/encargo. «Sepultar» conserva un registro digno y bíblico, y corresponde al campo semántico de קבר.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: HALOT
  rationale: Marca transición inferencial a la petición de José. «Ahora, pues» es idiomático y refleja bien el nexo lógico.
- source_word: אֶעֱלֶה נָּא
  english_pob_choice: please let me go up
  chosen_spanish: te ruego que subas
  alternatives_spanish:
  - por favor, sube
  - permíteme subir
  lexicon: HALOT
  rationale: עלה conserva el movimiento de subir desde Egipto a Canaán. En español, la petición a Faraón necesita un giro implícitamente suplicante; «te ruego que subas» mantiene la forma de solicitud, aunque el sujeto implícito del movimiento quede aclarado por el contexto narrativo.
- source_word: וְאֶקְבְּרָה
  english_pob_choice: and bury
  chosen_spanish: y sepultes
  alternatives_spanish:
  - y entres a sepultar
  - y entierres
  lexicon: HALOT
  rationale: La continuidad cohortativa expresa el propósito de la subida. «Sepultes» mantiene la coordinación con la petición y el registro formal de la acción funeraria.
- source_word: וְאָשׁוּבָה
  english_pob_choice: then I will return
  chosen_spanish: y después volveré
  alternatives_spanish:
  - luego volveré
  - entonces regresaré
  lexicon: HALOT
  rationale: La forma cohortativa promete retorno tras la sepultura. «Después volveré» refleja la secuencia temporal sin endurecerla innecesariamente.
translation_notes:
  revision_awareness: El auditorio inglés revisó la apertura de ‘Look’ a ‘Behold’ para ajustar el registro de הִנֵּה; en español se optó por «Mira» como equivalente de atención inmediata, pero se mantuvo un tono digno mediante «sepulcro», «sepultar» y la estructura solemne de la cita directa. También se preservó la nota léxica sobre כָּרִיתִי porque el hebreo literal es «cavar», aunque el contexto funerario admite una referencia más amplia a preparar la tumba.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto contextual.
  - Se usó «sepulcro/sepultar» para conservar registro bíblico y distinguirlo de «tumba/enterrar»; la nota aclara la alternativa léxica sin perder el sentido concreto de כּרה.
  - 'La secuencia verbal conserva el movimiento narrativo: juramento → cita directa → petición de subir → sepultura → retorno.'
