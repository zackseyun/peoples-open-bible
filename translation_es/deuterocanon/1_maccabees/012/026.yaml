translation:
  language: es
  text: 'Y envió exploradores al campamento de ellos; y volvieron y le informaron: «Así se están desplegando[a] para caer sobre ellos de noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así se están disponiendo», o «Así se están alineando para atacarles de noche». El griego τάσσονται puede sugerir disposición o despliegue en formación, no solo planificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  lexicon: LSJ
  rationale: El aoristo narrativo de ἀποστέλλω pide un pasado simple natural en español. «Envió» conserva la acción directa sin añadir matices innecesarios.
- source_word: κατασκόπους
  english_pob_choice: scouts
  chosen_spanish: espías
  alternatives_spanish:
  - reconocedores
  - exploradores
  lexicon: LSJ
  rationale: En este contexto militar, el término puede referirse a personas enviadas a observar al enemigo. Se eligió «espías» porque el español no tiene un equivalente tan idiomático y conciso como «scouts»; se conserva la función de reconocimiento sin suavizarla artificialmente.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento del ejército
  lexicon: LSJ
  rationale: La palabra griega designa aquí un campamento militar. «Campamento» comunica bien el sentido en español y mantiene la brevedad del texto.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: informaron
  alternatives_spanish:
  - reportaron
  - dieron noticia
  lexicon: LSJ
  rationale: El verbo expresa el retorno con un informe. «Informaron» suena natural en español y conserva la idea de reporte recibido por el comandante.
- source_word: Οὕτως τάσσονται
  english_pob_choice: Thus they are arraying themselves
  chosen_spanish: Así se están disponiendo
  alternatives_spanish:
  - Así se están alineando
  - Así se están ordenando en formación
  - Así se están desplegando
  lexicon: LSJ
  rationale: τάσσονται admite la idea de disponerse, alinearse o desplegarse. «Se están disponiendo» mantiene el aspecto presente y deja abierta la tensión entre arreglo/formación y preparación táctica que la nota inglesa preserva.
- source_word: ἐπιπεσεῖν
  english_pob_choice: to fall upon
  chosen_spanish: caer sobre
  alternatives_spanish:
  - atacar
  - arrojarse sobre
  lexicon: LSJ
  rationale: La imagen de hostilidad violenta se conserva con «caer sobre», que en español transmite un ataque repentino sin volverlo demasiado técnico.
- source_word: τὴν νύκτα
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - por la noche
  lexicon: LSJ
  rationale: La expresión idiomática española más natural para este valor temporal es «de noche». Mantiene el tono militar conciso del griego.
translation_notes:
  revision_awareness: 'El griego y el contexto del pasaje concuerdan con la traducción inglesa auditada: envío de agentes de reconocimiento, regreso con informe y descripción de una disposición táctica para un ataque nocturno. La decisión española sigue la revisión más reciente al reflejar τάσσονται como una disposición presente y no como mera planificación abstracta.'
  spanish_consistency_notes:
  - Se mantiene el tono militar sobrio del pasaje sin añadir elementos interpretativos.
  - «De noche» reproduce el valor temporal breve de τὴν νύκτα y combina bien con «caer sobre».
  - La cita directa se conserva para reflejar el informe reportado al comandante.
