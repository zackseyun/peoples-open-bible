id: 1CO.8.6
reference: '1 Corinthians 8:6'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλ’ ἡμῖν εἷς θεὸς ὁ πατήρ, ἐξ οὗ τὰ πάντα καὶ ἡμεῖς εἰς αὐτόν, καὶ εἷς κύριος Ἰησοῦς Χριστός, δι’ οὗ τὰ πάντα καὶ ἡμεῖς δι’ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/006.yaml
  text: yet for us there is one God[a], the Father, from whom are all things and we for him, and one Lord, Jesus the Messiah[c][b], through whom are all things and we through him.
  footnotes:
  - marker: a
    text: 'Or ''Jesus Christ.'' The Greek Χριστός can function as a title (''Messiah'') or, in some contexts, as a name-like form (''Christ'').'
    reason: alternative_reading
  - marker: b
    text: 'Or ''and we to him.'' The phrase can express direction, goal, or purpose; ''for him'' was chosen to convey that believers are oriented toward God as their end.'
    reason: lexical_alternative
  - marker: c
    text: 'The paired phrases ''from whom are all things'' and ''through whom are all things'' preserve a distinction between the Father as source and Jesus Messiah as mediating agent.'
    reason: cross_reference
translation:
  language: ko
  text: 그러나 우리에게는 한 하나님 아버지가 계시니, 모든 것이 그분에게서 났고 우리도 그분을 위하여 있습니다. 또한 한 주 예수 메시아가 계시니, 모든 것이 그분을 통하여 있고 우리도 그분을 통하여 있습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἷς θεὸς ὁ πατήρ
  english_pob_choice: one God, the Father
  chosen_korean: 한 하나님 아버지
  alternatives_korean:
  - 오직 한 분 하나님이신 아버지
  lexicon: BDAG
  rationale: 셰마의 기독화된 확장 — 한 하나님 + 한 주.
- source_word: εἷς κύριος Ἰησοῦς Χριστός
  english_pob_choice: one Lord, Jesus the Messiah
  chosen_korean: 한 주 예수 메시아
  alternatives_korean:
  - 오직 한 분 주이신 예수 메시아
  lexicon: BDAG
  rationale: 셰마의 κύριος(=YHWH)를 예수께 적용하는 결정적 본문.
- source_word: ἐξ οὗ τὰ πάντα
  english_pob_choice: from whom are all things
  chosen_korean: 모든 것이 그분에게서 났고
  alternatives_korean:
  - 모든 것이 그분에게서 비롯되었고
  lexicon: BDAG
  rationale: ἐκ + 속격의 기원.
- source_word: δι’ οὗ τὰ πάντα
  english_pob_choice: through whom are all things
  chosen_korean: 모든 것이 그분을 통하여 있고
  alternatives_korean:
  - 모든 것이 그분으로 말미암아 있고
  lexicon: BDAG
  rationale: διά + 속격의 매개. 메시아의 창조적 역할을 명시.
theological_decisions:
- issue: '8:6 기독교적 일신론 — 셰마(신 6:4)의 기독화된 확장'
  chosen_reading: 바울은 셰마의 「하나님은 한 분」을 「한 하나님 아버지 + 한 주 예수 메시아」로 확장하여, 셰마의 두 단어(θεός·κύριος)를 각각 아버지와 메시아에게 분배한다. 메시아는 한 분 하나님과 구분되되 셰마 안에 포함된 자로 선포된다
  alternative_readings:
  - 메시아를 셰마와 무관한 부수적 주(존재론적으로 하위)로 읽는 해석
  - 「한 주」를 인간 메시아의 권위 칭호로만 읽는 해석
  rationale: 본 절은 신약에서 가장 고기독론적인 본문 중 하나로, 5절의 「많은 신·많은 주」와 정확한 평행 대조를 이룬다. 셰마의 핵심 단어 κύριος(LXX에서 יהוה의 번역어)가 예수께 적용되는 동시에, 아버지의 한 분 됨이 침해되지 않는다. 한국어 번역에서 「한 하나님 아버지」 / 「한 주 예수 메시아」의 대등 구조를 명시하고, 「모든 것이 그분에게서/그분을 통하여」 두 전치사 차이를 보존한다.
  doctrine_reference: 'DOCTRINE.md §1·§5: 셈어 일신론 안에서의 기독론적 평준화; 강한 신학적 선언을 약화시키지 않는다'
