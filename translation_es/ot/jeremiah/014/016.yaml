revisions:
- from: 'Y el pueblo a quienes ellos profetizan será[n] arrojados[a] en las calles de Jerusalén, a causa del hambre y de la espada, y no habrá quien los sepulte: ellos, sus esposas, sus hijos y sus hijas. Y derramaré sobre ellos su mal.[b]'
  to: 'Y el pueblo para el que ellos profetizan será arrojado en las calles de Jerusalén, a causa del hambre y de la espada, y no habrá quien los sepulte: ellos, sus esposas, sus hijos y sus hijas. Y derramaré sobre ellos su mal.[a]'
  rationale: Se eliminan las marcas editoriales no resueltas y la nota de estilo innecesaria. Se reestructura «a quienes ellos profetizan» a «para el que ellos profetizan» para lograr una concordancia natural con «el pueblo» en singular, manteniendo el sentido direccional de נִבְּאִים לָהֶם. Se conserva la nota sobre «su mal» porque refleja correctamente la ambigüedad documentada de רָעָתָם.
