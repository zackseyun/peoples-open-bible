translation:
  language: es
  text: Él bebió algo del vino[a], se embriagó y se dejó al descubierto[b] dentro de su tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del vino». La expresión hebrea dice literalmente «de/desde el vino», probablemente con sentido partitivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quedó al descubierto» o «estaba al descubierto». El verbo hebreo también puede entenderse de manera más estativa, pero aquí la forma reflexiva se expresa mejor como autoexposición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּ֥שְׁתְּ
  english_pob_choice: He drank
  chosen_spanish: Él bebió
  alternatives_spanish:
  - Y bebió
  lexicon: HALOT
  rationale: La forma wayyiqtol expresa avance narrativo simple; en español, «bebió» comunica bien la acción sin forzar un calco innecesario del enlace consecutivo.
- source_word: מִן הַיַּיִן
  english_pob_choice: some of the wine
  chosen_spanish: algo del vino
  alternatives_spanish:
  - del vino
  - de vino
  - algo de vino
  lexicon: HALOT
  rationale: El valor partitivo de מִן con el sustantivo definido se refleja naturalmente con «algo del vino», que conserva la idea de una porción sin sonar artificial en español.
- source_word: וַיִּשְׁכָּר
  english_pob_choice: became drunk
  chosen_spanish: se embriagó
  alternatives_spanish:
  - se emborrachó
  - quedó ebrio
  - se puso ebrio
  lexicon: HALOT
  rationale: El verbo qal indica el ingreso a un estado de intoxicación. «Se embriagó» mantiene ese valor resultativo con un registro digno y claro.
- source_word: וַיִּתְגַּל
  english_pob_choice: uncovered himself
  chosen_spanish: se descubrió
  alternatives_spanish:
  - quedó descubierto
  - se desnudó
  - quedó desnudo
  lexicon: HALOT
  rationale: El hitpael es reflexivo; «se descubrió» conserva la idea de autoexposición sin añadir interpretaciones más fuertes que el hebreo. En español, evita tanto la pasividad como una explicitación sexual no presente en el texto.
- source_word: בְּתוֹךְ אָהֳלֹה
  english_pob_choice: inside his tent
  chosen_spanish: dentro de su tienda
  alternatives_spanish:
  - en medio de su tienda
  - dentro de la tienda de él
  lexicon: HALOT
  rationale: «Dentro de su tienda» transmite con claridad el sentido locativo de בְּתוֹךְ y mantiene el posesivo natural del hebreo.
theological_decisions:
- issue: Forma de describir la desnudez/exposición de Noé sin sobreinterpretar
  english_pob_reading: Translate the verse descriptively without adding interpretive language beyond the Hebrew text.
  chosen_spanish_reading: Traducir descriptivamente, sin añadir un juicio moral o una explicación sexual que el versículo no expresa.
  alternative_spanish_readings:
  - Quedó desnudo dentro de su tienda
  - Yacía descubierto en su tienda
  - Se desnudó dentro de su tienda
  rationale: El hebreo reporta bebida, embriaguez y autoexposición, pero no comenta todavía el sentido moral o social de ese estado. «Se descubrió» preserva la tensión narrativa para que el contexto siguiente la desarrolle.
  doctrine_reference: Preservar la tensión interpretativa del pasaje sin resolverla prematuramente.
translation_notes:
  revision_awareness: Coincide con el audit trail en el sentido partitivo de מִן הַיַּיִן, en el valor ingesivo/resultativo de וַיִּשְׁכָּר y en la lectura reflexiva de וַיִּתְגַּל. No se introducen elementos interpretativos ajenos al texto fuente.
  spanish_consistency_notes:
  - Se usa «vino» con artículo en la nota para reflejar el hebreo definido.
  - «Tienda» mantiene un término transparente y bíblicamente común en español, sin recurrir a una formulación más arcaica.
  - La secuencia verbal en pasado simple conserva el avance narrativo del wayyiqtol hebreo.
