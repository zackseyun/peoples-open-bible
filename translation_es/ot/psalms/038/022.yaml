translation:
  language: es
  text: No me abandones[a], Yahvé, mi Dios; no estés lejos de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El texto principal sigue el estándar del proyecto en español para el nombre divino.'
