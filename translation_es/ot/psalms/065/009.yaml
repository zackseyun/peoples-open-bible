translation:
  language: es
  text: Los que habitan en los confines de la tierra temen[a] por tus señales; tú haces gritar de alegría la aurora y el anochecer[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedan sobrecogidos por tus señales». El verbo hebreo puede expresar temor, pavor o reverente asombro.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las salidas de la mañana y del anochecer». La expresión poética se refiere al amanecer y al atardecer, o a los lugares/tiempos de donde emergen la mañana y la tarde.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  english_pob_choice: fear
  chosen_spanish: tiemblan
  alternatives_spanish:
  - temen
  - sienten temor
  - están sobrecogidos
  lexicon: HALOT
  rationale: El hebreo ירא puede abarcar temor, miedo reverente o sobrecogimiento. En español, «tiemblan» comunica una respuesta corporal y afectiva amplia, sin fijarla de antemano como solo terror ni solo reverencia. Mantiene la tensión del texto base.
- source_word: יֹשְׁבֵי קְצָוֺת
  english_pob_choice: those who dwell at the ends of the earth
  chosen_spanish: los que habitan en los confines de la tierra
  alternatives_spanish:
  - los habitantes de los confines
  - los que viven en los extremos de la tierra
  lexicon: HALOT
  rationale: «Habitan» conserva el participio sustantivado; «confines de la tierra» reproduce de modo natural el modismo de los «extremos». La adición de «de la tierra» hace clara la amplitud universal del hebreo.
- source_word: מֵאוֹתֹתֶיךָ
  english_pob_choice: because of your signs
  chosen_spanish: por tus señales
  alternatives_spanish:
  - a causa de tus señales
  - por causa de tus señales
  - ante tus señales
  lexicon: HALOT
  rationale: La preposición מִן con verbos de temor puede expresar causa o motivo. En español, «por tus señales» transmite bien ese impulso causal y es idiomático; la nota conserva la alternativa de lectura más explícita.
- source_word: אוֹתֹתֶיךָ
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - maravillas
  - prodigios
  lexicon: HALOT
  rationale: «Señales» sigue de cerca el valor básico de אוֹת como acto o manifestación que señala el poder de Dios. «Maravillas» o «prodigios» serían más interpretativos; se prefirió el término más directo.
- source_word: מוֹצָאֵי בֹקֶר וָעֶרֶב
  english_pob_choice: the dawn and the evening
  chosen_spanish: la aurora y el anochecer
  alternatives_spanish:
  - la salida de la mañana y de la tarde
  - los comienzos de la mañana y del atardecer
  - el alba y la tarde
  lexicon: HALOT
  rationale: מוֹצָאֵי significa literalmente «salidas» u «orígenes», y en este contexto poético apunta a la aparición de la mañana y la tarde. «La aurora y el anochecer» suena natural en español y preserva la referencia temporal merística.
- source_word: תַּרְנִֽין
  english_pob_choice: you make ... shout for joy
  chosen_spanish: haces gritar de alegría
  alternatives_spanish:
  - haces cantar de gozo
  - haces exclamar de alegría
  - haces resonar de júbilo
  lexicon: HALOT
  rationale: El causativo de רנן expresa provocar gritos jubilosos o canto de alegría. «Haces gritar de alegría» conserva la energía verbal y la relación causal con Dios como sujeto.
theological_decisions:
- issue: Naturaleza de la respuesta a las señales de Dios
  english_pob_reading: Rendered as universal human fear in response to divine signs without specifying whether the fear is terror or reverent awe.
  chosen_spanish_reading: Se mantiene una respuesta ambigua de temor/sobrecogimiento sin decidir si es terror o reverencia.
  alternative_spanish_readings:
  - Se traduce como «están sobrecogidos» para enfatizar reverencia.
  - Se traduce como «tiemblan de miedo» para enfatizar terror.
  rationale: El hebreo permite un espectro de sentidos. «Tiemblan» preserva la tensión entre temor y reverencia en vez de resolverla de forma prematura.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Coincide con el último pase de revisión (sin cambios) y con el cotejo de alta concordancia; no se detectaron ajustes necesarios respecto del auditorio inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se eligió «señales» para אוֹת, en línea con el valor básico del término y con el audit trail inglés.
  - Se preserva la ambigüedad teológica del verbo ירא mediante una formulación que admite temor, sobrecogimiento o reverencia.
  - «Aurora y anochecer» se usa como equivalente natural del merismo hebreo sin perder el paralelismo poético.
