  to: Repartirán la tierra por sorteo, según sus clanes. Al grupo más numeroso le aumentarán su heredad, y al grupo menos numeroso le disminuirán su heredad. Donde le caiga el sorteo[a], esa será su porción. Recibirán sus heredades según las tribus de sus padres.
  rationale: Se corrige la cláusula del sorteo para reflejar mejor el hebreo y la alternativa documentada en el POB inglés, y se mejora la naturalidad del español en las frases comparativas. Se conserva 'heredad/heredades' por su valor técnico de nַחֲלָה y 'clanes' por la precisión social-tribal de מִשְׁפָּחָה. No se requiere adjudicación especial.
