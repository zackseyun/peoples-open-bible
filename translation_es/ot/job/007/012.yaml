  - severity: medium
    issue: «para que pongas» introduce finalidad de manera demasiado fuerte para כִּי en este contexto.
    rationale: El inglés POB eligió «that», no «so that». En español, «que pongas...» preserva mejor la relación de resultado/contenido de la pregunta retórica.
  - severity: low
    issue: «pongas vigilancia sobre mí» es comprensible pero algo poco idiomático.
    rationale: Aunque transmite supervisión, suena menos natural que una formulación como «pongas guardia sobre mí», con nota alternativa para «vigilarme» o «poner vigilancia sobre mí».
