translation:
  language: es
  text: Pero los de la ciudadela seguían enviando emisarios y lo apremiaban para que viniera a ellos[a] por el desierto y les enviara provisiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «venir a él»; por el contexto, el sentido probable es «venir a ellos», es decir, a los de la ciudadela.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ ἐκ τῆς ἄκρας
  english_pob_choice: those in the citadel
  chosen_spanish: los de la acrópolis
  alternatives_spanish:
  - los de la fortaleza
  - los del alcázar
  lexicon: LSJ
  rationale: ἄκρα en 1 Macabeos suele referirse a la fortaleza/citadela de Jerusalén. En español, «acrópolis» mantiene la idea de una posición fortificada y elevada sin perder el valor técnico del término en este contexto militar.
- source_word: ἀπέστελλον πρεσβεύτας
  english_pob_choice: kept sending envoys
  chosen_spanish: seguían enviando enviados
  alternatives_spanish:
  - seguían mandando embajadores
  - seguían enviando mensajeros
  lexicon: LSJ
  rationale: El imperfecto expresa acción շարունակada; «seguían enviando» conserva ese valor. «Enviados» reproduce el sentido de πρεσβεύτας como representantes oficiales, aunque en español puede sonar un poco repetitivo; se mantiene por fidelidad semántica.
- source_word: κατεσπούδαζον
  english_pob_choice: urgently pressing
  chosen_spanish: presionándolo con insistencia
  alternatives_spanish:
  - apremiándolo con urgencia
  - insistiéndole con vehemencia
  lexicon: LSJ
  rationale: El verbo comunica insistencia intensa y continua. «Presionándolo con insistencia» transmite la fuerza del verbo y evita un giro demasiado interpretativo.
- source_word: αὐτὸν τοῦ ἐλθεῖν ... πρὸς αὐτόν
  english_pob_choice: him to come to them
  chosen_spanish: para que viniera a ellos
  alternatives_spanish:
  - para que viniera a él
  - para que fuera hacia ellos
  lexicon: LSJ
  rationale: Aunque el griego tiene una forma singular en el punto problemático, el contexto colectivo favorece el sentido plural. En español se opta por «a ellos» para reflejar el referente contextual, como en la nota inglesa.
- source_word: διὰ τῆς ἐρήμου
  english_pob_choice: through the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - a través del desierto
  - por la región desierta
  lexicon: LSJ
  rationale: «Desierto» es natural en español y conserva el sentido de ruta difícil. Se evita «wilderness» calco y se mantiene la claridad del trayecto.
- source_word: ἀποστεῖλαι αὐτοῖς τροφάς
  english_pob_choice: to send them provisions
  chosen_spanish: les enviara provisiones
  alternatives_spanish:
  - les mandara alimentos
  - les enviara víveres
  lexicon: LSJ
  rationale: τροφαί aquí se refiere a abastecimientos o sustento en contexto militar. «Provisiones» es preciso y estable en español para este tipo de necesidad.
translation_notes:
  revision_awareness: Se revisó el paralelo inglés y se siguió su decisión sobre el valor imperfectivo de los verbos, así como la nota sobre el referente colectivo de αὐτόν. No se detectaron revisiones sustanciales adicionales en el pasaje.
  spanish_consistency_notes:
  - Se mantuvo un registro militar y narrativo sobrio, adecuado para 1 Macabeos.
  - «Enviados» y «provisiones» conservan el tono administrativo-militar del pasaje.
  - La nota de pie de página marca la misma tensión textual/interpretativa que la edición inglesa, sin resolverla de manera excesiva.
