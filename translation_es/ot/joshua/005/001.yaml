translation:
  language: es
  text: Y sucedió que, cuando todos los reyes de los amorreos que estaban al otro lado del Jordán, al occidente, y todos los reyes de los cananeos que estaban junto al mar[a] oyeron que Yahvé había secado las aguas del Jordán delante de los hijos de Israel hasta que cruzamos[b], se derritieron sus corazones, y ya no hubo en ellos espíritu[c] por causa de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los reyes de los cananeos que estaban en la costa»; «junto al mar» se refiere a la región costera.'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos y versiones antiguas leen «hasta que ellos cruzaron» en lugar de «hasta que cruzamos».
    reason: textual_variant
  - marker: c
    text: 'Hebreo: «ya no hubo en ellos espíritu», un modismo para falta de valor o resolución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio. «Y sucedió» conserva la función discursiva sin sonar excesivamente arcaica en español.
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyeron
  alternatives_spanish:
  - al oír
  - apenas oyeron
  lexicon: HALOT
  rationale: El infinitivo con כ expresa circunstancia temporal. «Cuando ... oyeron» es natural y fiel al valor temporal.
- source_word: כָּל מַלְכֵי הָאֱמֹרִי
  english_pob_choice: all the kings of the Amorites
  chosen_spanish: todos los reyes de los amorreos
  alternatives_spanish:
  - todos los reyes amorreos
  lexicon: HALOT
  rationale: Se preserva el etnónimo colectivo. «Amorreos» mantiene la referencia histórica y geográfica del hebreo sin generalizarla.
- source_word: בְּעֵבֶר הַיַּרְדֵּן יָמָּה
  english_pob_choice: beyond the Jordan to the west
  chosen_spanish: al otro lado del Jordán, al occidente
  alternatives_spanish:
  - al otro lado del Jordán, hacia el mar
  - al occidente del Jordán
  lexicon: HALOT
  rationale: El giro señala el lado occidental del Jordán desde la perspectiva israelita en este contexto. «Al occidente» expresa la dirección de יָמָּה y evita ambigüedad geográfica.
- source_word: כָּל מַלְכֵי הַכְּנַעֲנִי אֲשֶׁר עַל הַיָּם
  english_pob_choice: all the kings of the Canaanites who were by the sea
  chosen_spanish: todos los reyes de los cananeos que estaban junto al mar
  alternatives_spanish:
  - todos los reyes de los cananeos que estaban en la costa
  - '... que estaban en la ribera del mar'
  lexicon: HALOT
  rationale: עַל הַיָּם designa la región costera. «Junto al mar» es una traducción cercana y clara; la precisión regional queda implícita sin sobrecargar el texto.
- source_word: הוֹבִישׁ
  english_pob_choice: had dried up
  chosen_spanish: había secado
  alternatives_spanish:
  - había hecho secar
  - había dejado secas
  lexicon: HALOT
  rationale: El hiphil de יבש indica causar que se seque. «Había secado» comunica el acto divino en español natural y mantiene el aspecto perfecto del relato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» como forma española estable y reverente del nombre divino, en vez de sustituirlo por un título.'
- source_word: מֵי הַיַּרְדֵּן
  english_pob_choice: the waters of the Jordan
  chosen_spanish: las aguas del Jordán
  alternatives_spanish:
  - las aguas del río Jordán
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de modo natural como «las aguas del Jordán».
- source_word: מִפְּנֵי בְנֵי יִשְׂרָאֵל
  english_pob_choice: before the sons of Israel
  chosen_spanish: delante de los hijos de Israel
  alternatives_spanish:
  - ante los hijos de Israel
  - frente a los hijos de Israel
  lexicon: HALOT
  rationale: «Delante de» conserva la imagen espacial de retirada de las aguas y mantiene el paralelismo con el acto divino narrado.
- source_word: עַד עברנו
  english_pob_choice: until they had crossed over
  chosen_spanish: hasta que ellos hubieron cruzado
  alternatives_spanish:
  - hasta que cruzaron
  - hasta nuestro cruce
  lexicon: HALOT
  rationale: La tradición contextual aquí favorece la lectura de tercera persona del plural, coherente con el relato. Se conserva el matiz de anterioridad con el pluscuamperfecto compuesto en español.
- source_word: וַיִּמַּס לְבָבָם
  english_pob_choice: their hearts melted
  chosen_spanish: se derritió su corazón
  alternatives_spanish:
  - se derritieron sus corazones
  - se deshizo su corazón
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo; en español, el singular «su corazón» preserva esa imagen idiomática. «Se derritió» reproduce la metáfora del colapso por temor.
- source_word: וְלֹא הָיָה בָם עוֹד רוּחַ
  english_pob_choice: there was no longer spirit in them
  chosen_spanish: ya no hubo en ellos espíritu
  alternatives_spanish:
  - ya no quedó en ellos espíritu
  - ya no tuvieron ánimo
  lexicon: HALOT
  rationale: «Espíritu» mantiene la metáfora hebrea de ruaj sin neutralizarla; en contexto, alude a coraje o resolución perdida.
- source_word: מִפְּנֵי בְנֵי יִשְׂרָאֵל
  english_pob_choice: because of the sons of Israel
  chosen_spanish: por causa de los hijos de Israel
  alternatives_spanish:
  - a causa de los hijos de Israel
  - ante los hijos de Israel
  lexicon: HALOT
  rationale: En la cláusula final, la preposición es causal en efecto. «Por causa de» comunica mejor la relación de temor que llevó a su desánimo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la política del proyecto de no ocultar el nombre del pacto detrás de «SEÑOR». «Yahvé» es la forma española estable y legible para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lectura de עַד עברנו en el cierre narrativo
  english_pob_reading: until they had crossed over
  chosen_spanish_reading: hasta que ellos hubieron cruzado
  alternative_spanish_readings:
  - hasta que nosotros hubimos cruzado
  rationale: Aunque el hebreo consonántico admite una lectura de primera persona plural, el flujo narrativo y la revisión auditada favorecen aquí la lectura de tercera persona plural. Se evita imponer una primera persona que resultaría extraña en este versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Valor idiomático de רוּחַ
  english_pob_reading: there was no longer spirit in them
  chosen_spanish_reading: ya no hubo en ellos espíritu
  alternative_spanish_readings:
  - ya no quedó en ellos ánimo
  - ya no hubo en ellos aliento
  rationale: Se conserva la imagen semítica de «espíritu» y, a la vez, su fuerza idiomática de ánimo/coraje perdido. No se sustituye por una explicación interpretativa en el cuerpo del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión reciente que prefirió la lectura de tercera persona plural en el cierre ('they had crossed over') y ajustó la concordancia de 'hearts'. La versión española sigue esa decisión revisada, pero conserva en nota la variante textual/persona porque el hebreo consonántico y la tradición manuscrita permiten una tensión real que no debe borrarse.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה.
  - Se conserva «hijos de Israel» para בְנֵי יִשְׂרָאֵל conforme a la política de mantener el plural masculino del original.
  - «Espíritu» se mantiene en sentido idiomático, sin convertirlo directamente en «ánimo» en el texto principal.
  - Las notas siguen marcadores únicos y aparecen ancladas en el texto donde corresponde.
