translation:
  language: es
  text: Pero si su padre la desautoriza el día en que lo oye[a], ninguno de sus votos ni de sus obligaciones vinculantes[b] con las que se ha obligado quedará en pie; y Yahvé la perdonará, porque su padre la desautorizó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el día de oírlo». El hebreo dice literalmente «en el día de su oír».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus ligaduras» o «sus compromisos vinculantes». El término hebreo alude a compromisos que atan a una persona, especialmente en contexto de votos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: En español, «Pero si» conserva mejor el matiz adversativo-condicional que introduce una excepción al caso anterior, sin endurecer el estilo.
- source_word: הֵנִיא
  english_pob_choice: forbids
  chosen_spanish: la prohíbe
  alternatives_spanish:
  - la restringe
  - la anula
  - la reprime
  lexicon: HALOT
  rationale: En este contexto jurídico de votos, «prohíbe» comunica una oposición efectiva del padre al voto. Mantiene la construcción personal del hebreo con objeto directo femenino.
- source_word: אָבִיהָ
  english_pob_choice: her father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de ella
  lexicon: HALOT
  rationale: La relación posesiva es clara en español con «su padre»; es natural y fiel al hebreo.
- source_word: אֹתָהּ
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El pronombre de objeto directo femenino se expresa naturalmente con «la» en español; refleja el objeto personal del verbo.
- source_word: בְּיוֹם שָׁמְעוֹ
  english_pob_choice: on the day he hears of it
  chosen_spanish: el día que lo oye
  alternatives_spanish:
  - el día en que lo oye
  - cuando lo oye
  lexicon: HALOT
  rationale: «El día que lo oye» conserva la precisión temporal del hebreo y suena natural en español. El objeto «lo» remite al voto del que se habla.
- source_word: כָּל נְדָרֶיהָ
  english_pob_choice: none of her vows
  chosen_spanish: ninguno de sus votos
  alternatives_spanish:
  - todos sus votos
  lexicon: HALOT
  rationale: 'En español, la negación debe regir naturalmente la cláusula: «ninguno de sus votos... se mantendrá». Esto preserva el alcance semántico del hebreo sin sonar forzado.'
- source_word: וֶאֱסָרֶיהָ
  english_pob_choice: her binding obligations
  chosen_spanish: sus compromisos obligantes
  alternatives_spanish:
  - sus obligaciones vinculantes
  - sus ligaduras
  lexicon: HALOT
  rationale: «אֱסָרִים» designa obligaciones o ligaduras autoimpuestas. «Compromisos obligantes» intenta conservar el peso jurídico del término sin perder inteligibilidad para lectores modernos.
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ
  english_pob_choice: by which she has bound herself
  chosen_spanish: que ella misma ha impuesto sobre su persona
  alternatives_spanish:
  - con los que ella se ha obligado
  - que ella ha atado sobre sí
  lexicon: HALOT
  rationale: La imagen de auto-obligación se conserva con una formulación clara en español. «Sobre su persona» refleja el valor de נֶפֶשׁ como la persona misma, sin reducirlo a «alma» en un contexto legal.
- source_word: לֹא יָקוּם
  english_pob_choice: shall stand
  chosen_spanish: se mantendrá
  alternatives_spanish:
  - no quedará en pie
  - no se establecerá
  lexicon: HALOT
  rationale: En un marco legal, el sentido es que la obligación no permanece vigente. «Se mantendrá» expresa el efecto jurídico en español actual. Se conserva la tensión entre «estar en pie» y validez legal sin traducir mecánicamente.
- source_word: וַֽ/יהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: «Yahvé», no una sustitución litúrgica.'
- source_word: יִֽסְלַח
  english_pob_choice: will forgive her
  chosen_spanish: la perdonará
  alternatives_spanish:
  - le perdonará
  lexicon: HALOT
  rationale: «Perdonará» es el equivalente directo de סלח. El objeto directo femenino «la» mantiene la referencia a la mujer afectada por la nulificación del voto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón causal de la absolución legal: el padre la prohibió. «Porque» es la opción más clara y directa en español.'
- source_word: הֵנִיא אָבִיהָ אֹתָהּ
  english_pob_choice: her father forbade her
  chosen_spanish: su padre la prohibió
  alternatives_spanish:
  - su padre la anuló
  - su padre la restringió
  lexicon: HALOT
  rationale: La repetición del verbo se mantiene para conservar la estructura enfática del hebreo. «La prohibió» reproduce la acción personal del padre sobre la hija, como en el inglés POB.
theological_decisions:
- issue: Perdón divino en un contexto legal de votos anulados
  english_pob_reading: The verse states that Yahweh forgives the woman because her father's timely prohibition nullifies the vow's binding force; it does not imply moral guilt beyond the legal-remedial context.
  chosen_spanish_reading: El versículo afirma que Yahvé la perdona porque la prohibición oportuna de su padre anula la fuerza obligante del voto; no amplía explícitamente el caso hacia una culpa moral más allá del marco legal-remedial.
  alternative_spanish_readings:
  - El perdón podría entenderse como absolución de toda falta moral relacionada con el voto incumplido.
  rationale: La traducción conserva la afirmación de perdón sin resolver la tensión entre obligación legal y perdón divino. Eso sigue el contexto inmediato de regulación de votos y no expande el sentido más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Valor de נֶפֶשׁ en una cláusula jurídica
  english_pob_reading: by which she has bound herself
  chosen_spanish_reading: que ella misma ha impuesto sobre su persona
  alternative_spanish_readings:
  - que ella misma ha impuesto sobre su alma
  - que ella misma se ha ligado
  rationale: En español, «persona» expresa con mayor claridad el sujeto de la auto-obligación en un contexto legal. Se evita «alma» porque aquí podría introducir una lectura no requerida por el hebreo.
  doctrine_reference: Claridad semántica sin borrar el sentido antropológico
translation_notes:
  revision_awareness: Se corrigió el problema previo anclando explícitamente cada nota al texto español con [a] y [b]. No se han añadido notas sin marca en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יהוה.
  - Se evita «SEÑOR» como sustituto del Nombre divino.
  - Se conserva el sentido legal de נדרים/אֱסָרִים con «votos» y «compromisos obligantes».
  - La frase final retiene la repetición del acto paterno para reflejar la causalidad hebrea.
