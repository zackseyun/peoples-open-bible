revisions:
- from: Porque Joab y todo Israel habían permanecido allí seis meses[a][b], hasta que había[a] exterminado a todo varón en Edom.
  to: Porque Joab y todo Israel[a] habían permanecido allí seis meses, hasta que eliminó[b] a todo varón en Edom.
  rationale: Se corrige la reutilización indebida de marcadores, se reordena el anclaje de notas según su aparición en el texto, y se mejora la naturalidad del español narrativo. También se ajusta el verbo principal a 'eliminó', que preserva mejor la severidad del hebreo sin apartarse tanto de la decisión auditada 'cut off', dejando las opciones más interpretativas en la nota lexical.
