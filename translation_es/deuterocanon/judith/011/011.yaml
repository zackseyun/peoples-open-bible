translation:
  language: es
  text: Y ahora, para que mi señor no quede[a] expulsado e ineficaz, la muerte caerá sobre ellos[b], y el pecado los ha alcanzado, con lo cual provocan a su Dios cuando cometen una falta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rechazado e ineficaz». Los términos griegos pueden subrayar ser echado fuera y quedar sin capacidad de lograr algo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la muerte caerá sobre su rostro». La expresión se vierte idiomáticamente en español como «la muerte caerá sobre ellos».
    reason: lexical_alternative
  - marker: c
    text: O «cuando cometen una impropiedad/insensatez». El sustantivo griego puede referirse a una conducta impropia, absurda o moralmente escandalosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριός μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  lexicon: LSJ
  rationale: El contexto es un trato respetuoso hacia Holofernes, no un título divino. En español, «mi señor» conserva el valor cortesano y la relación jerárquica sin introducir mayúsculas devocionales impropias.
- source_word: ἔκβολος
  english_pob_choice: an outcast
  chosen_spanish: expulsado
  alternatives_spanish:
  - echado fuera
  - desterrado
  - rechazado
  lexicon: LSJ
  rationale: El término sugiere ser echado fuera o expulsado. «Expulsado» es natural en español y preserva la idea de exclusión, sin cargar innecesariamente con matices jurídicos o políticos que el contexto no exige.
- source_word: ἄπρακτος
  english_pob_choice: ineffective
  chosen_spanish: ineficaz
  alternatives_spanish:
  - sin poder obrar
  - sin resultado
  - incapaz de actuar
  lexicon: LSJ
  rationale: La palabra apunta a no poder lograr un resultado o no poder actuar eficazmente. «Ineficaz» comunica bien esa falta de efecto en un registro claro y digno.
- source_word: ἐπιπεσεῖται θάνατος ἐπὶ πρόσωπον αὐτῶν
  english_pob_choice: death will fall upon them
  chosen_spanish: la muerte caerá sobre ellos
  alternatives_spanish:
  - la muerte vendrá sobre ellos
  - la muerte se abatirá sobre ellos
  lexicon: LSJ
  rationale: Se conserva la imagen de caída/abatimiento y se adapta la expresión a un español natural. No se fuerza la literalidad de «sobre sus rostros», porque el giro idiomático del griego ya fue interpretado en el POB inglés como una caída sobre las personas.
- source_word: κατέλαβε
  english_pob_choice: has overtaken
  chosen_spanish: los ha alcanzado
  alternatives_spanish:
  - los ha tomado
  - los ha sorprendido
  - los ha sobrecogido
  lexicon: LSJ
  rationale: El verbo puede expresar tomar, atrapar o alcanzar. «Los ha alcanzado» mantiene la idea de que el pecado ya les ha dado alcance, en línea con el efecto presente que el argumento necesita.
- source_word: ἁμάρτημα
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la falta
  - la transgresión
  lexicon: LSJ
  rationale: Dado que la cláusula siguiente habla de provocar a su Dios, conviene mantener el peso religioso-moral. «El pecado» conserva esa fuerza mejor que «falta» o «transgresión».
- source_word: παροργιοῦσιν
  english_pob_choice: provoke
  chosen_spanish: provocan
  alternatives_spanish:
  - irritan
  - provocan a ira
  lexicon: LSJ
  rationale: El verbo significa provocar, especialmente al enojo. En español, «provocan a su Dios» es breve y conserva la relación directa con Dios, sin sobreexplicar el efecto emocional.
- source_word: ἀτοπίαν
  english_pob_choice: an offense
  chosen_spanish: una falta
  alternatives_spanish:
  - una impropiedad
  - una insensatez
  - una ofensa
  lexicon: LSJ
  rationale: El sustantivo puede indicar conducta impropia, absurda o moralmente chocante. «Una falta» es suficientemente amplio y sobrio en español, sin exagerar hacia «ofensa» u «atrocidad».
theological_decisions:
- issue: Cómo traducir κύριος en un contexto social y no divino
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  rationale: Aquí el título es un tratamiento cortesano dirigido a Holofernes. «Mi señor» respeta la deferencia y evita importar la convención litúrgica de «Señor» como título divino.
  doctrine_reference: 'DOCTRINE.md: términos de tratamiento contextuales; no universalizar κύριος como título divino'
- issue: Si ἁμάρτημα debe suavizarse como mera falta o conservar peso religioso
  english_pob_reading: sin
  chosen_spanish_reading: pecado
  alternative_spanish_readings:
  - falta
  - transgresión
  rationale: La frase siguiente menciona explícitamente a Dios, así que el término debe retener fuerza teológica. «Pecado» mantiene esa carga más claramente que alternativas más débiles.
  doctrine_reference: 'DOCTRINE.md: preservar peso teológico sin paráfrasis'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que prefirió 'ineffective' para ἄπρακτος y 'offense' para ἀτοπίαν. En español se optó por 'ineficaz' para ἄπρακτος y se mantuvo la posibilidad de una alternativa más amplia en nota para ἀτοπίαν, conservando el registro sobrio y la tensión semántica del griego.
  spanish_consistency_notes:
  - Se mantuvo «mi señor» para un uso cortesano de κύριος, distinto del empleo divino de «Yahvé» en otros contextos.
  - Se evitó traducir mecánicamente el giro literal de «sobre sus rostros»; se preservó el sentido idiomático de juicio repentino.
  - «Pecado» conserva la fuerza moral requerida por la referencia explícita a Dios.
  - El estilo general es formal, bíblico moderno y apto para lectura pública.
