revisions:
- from: Pero el rey Antíoco acampó de nuevo[a] contra Dora, llevándole continuamente sus tropas y levantando máquinas de asedio[b], y encerró a Trifón para que no pudiera entrar ni salir.
  to: Pero el rey Antíoco acampó por segunda vez[a] contra Dora, manteniendo continuamente la presión contra ella[b] y construyendo máquinas de asedio, y encerró a Trifón para que no pudiera entrar ni salir.
  rationale: 'La revisión conserva el sentido del POB inglés y del griego, pero mejora dos puntos clave: explicita mejor la repetición de ἐν τῇ δευτέρᾳ con «por segunda vez» y reemplaza una frase española poco idiomática por una expresión natural que sí comunica la presión continua del asedio. También usa «construyendo» para reflejar con mayor fidelidad ποιούμενος.'
