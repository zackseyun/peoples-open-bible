translation:
  language: es
  text: Y la multitud de todas las naciones que hacen guerra contra Ariel[a], sí, todos los que hacen guerra contra ella y su fortaleza[c], y los que la afligen, será como un sueño, una visión de la noche[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ariel es el nombre poético de Jerusalén en este contexto.
    reason: cross_reference
  - marker: b
    text: 'O: «una visión nocturna».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su baluarte»; algunos entienden esto como «las obras de asedio contra ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - y será
  - y acontecerá
  lexicon: HALOT
  rationale: La forma introduce una comparación profética; en español, «será» expresa bien el valor prospectivo sin caer en un giro excesivamente arcaico.
- source_word: כַּחֲלוֹם
  english_pob_choice: like a dream
  chosen_spanish: como un sueño
  alternatives_spanish:
  - como un sueño nocturno
  - como de sueño
  lexicon: HALOT
  rationale: El כ comparativo se conserva de manera natural con «como»; «sueño» reproduce la imagen sin añadir matices no presentes.
- source_word: חֲזוֹן לַיְלָה
  english_pob_choice: a vision of the night
  chosen_spanish: una visión de la noche
  alternatives_spanish:
  - una visión nocturna
  - una visión en la noche
  lexicon: HALOT
  rationale: «Visión de la noche» sigue de cerca la construcción hebrea y mantiene el paralelismo poético con «sueño».
- source_word: הֲמוֹן כָּל הַגּוֹיִם
  english_pob_choice: the multitude of all the nations
  chosen_spanish: la multitud de todas las naciones
  alternatives_spanish:
  - el gentío de todas las naciones
  - la muchedumbre de todas las naciones
  lexicon: HALOT
  rationale: «Multitud» conserva la idea de masa numerosa y sirve bien al contexto bélico; «naciones» refleja el valor de גּוֹיִם como pueblos extranjeros.
- source_word: הַצֹּבְאִים עַל
  english_pob_choice: that wage war against
  chosen_spanish: que hacen guerra contra
  alternatives_spanish:
  - que combaten contra
  - que guerrean contra
  lexicon: HALOT
  rationale: El participio de צבא en este contexto es militar; «hacen guerra contra» reproduce con claridad la hostilidad activa sin volverse demasiado técnico.
- source_word: אֲרִיאֵל
  english_pob_choice: Ariel
  chosen_spanish: Ariel
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado en el cuerpo del texto, siguiendo la decisión del POB en inglés y evitando introducir una glosa interpretativa en la línea principal.
- source_word: וְכָל צֹבֶיהָ
  english_pob_choice: even all who wage war against her
  chosen_spanish: sí, todos los que hacen guerra contra ella
  alternatives_spanish:
  - y todos los que guerrean contra ella
  - e incluso todos los que la atacan
  lexicon: HALOT
  rationale: Se repite el mismo campo léxico de guerra para conservar la conexión con el participio anterior; «sí» refleja el valor intensivo/enfático de וְכָל en este encadenamiento poético.
- source_word: וּמְצֹדָתָהּ
  english_pob_choice: and her stronghold
  chosen_spanish: contra su fortaleza
  alternatives_spanish:
  - y su fortaleza
  - y su baluarte
  lexicon: HALOT
  rationale: Aunque la forma puede referirse a «fortaleza», el contexto de asedio permite que la frase funcione también como referencia a la fortificación; «contra su fortaleza» preserva el matiz hostil que el inglés POB dejó abierto con la nota sobre posibles «siegeworks».
- source_word: וְהַמְּצִיקִים לָהּ
  english_pob_choice: and who distress her
  chosen_spanish: y los que la afligen
  alternatives_spanish:
  - y los que la oprimen
  - y los que la acosan
  lexicon: HALOT
  rationale: El verbo admite una gama de presión hostil; «afligen» conserva amplitud semántica sin especificar indebidamente una táctica militar concreta.
theological_decisions:
- issue: Referente de Ariel
  english_pob_reading: Ariel is Isaiah's poetic name for Jerusalem in this context.
  chosen_spanish_reading: Ariel se conserva como nombre poético de Jerusalén, sin sustituirlo en el texto principal.
  alternative_spanish_readings:
  - traducirlo directamente como Jerusalén
  - explicarlo solo en nota sin conservar el nombre
  rationale: La decisión sigue el principio de transliterar nombres propios y preservar la metáfora profética de Isaías; la aclaración puede quedar en nota para no perder la referencia poética.
  doctrine_reference: Translation philosophy §2 (nombres transliterados; interpretación en nota cuando sea necesario)
- issue: Valor de la comparación final
  english_pob_reading: will be like a dream, a vision of the night
  chosen_spanish_reading: será como un sueño, una visión de la noche
  alternative_spanish_readings:
  - será como un sueño nocturno
  - será como una visión en la noche
  rationale: Se mantiene la ambivalencia poética entre sueño y visión nocturna sin resolverla en una sola expresión moderna que estreche el alcance del hebreo.
  doctrine_reference: HALOT; paralelismo poético del verso
translation_notes:
  revision_awareness: 'El registro sigue el pase más reciente sin cambios materiales (latest_revision_pass: unchanged=true; cross_check_summary: high_agreement, verdict minor-issues). Se incorporó la solución del inglés POB para mantener la metáfora de Ariel, la comparación «como un sueño» y la posible ambigüedad de מְצֹדָה.'
  spanish_consistency_notes:
  - Se usa «Ariel» como nombre propio transliterado, conforme a la política del proyecto.
  - Se evita «SEÑOR» o equivalentes porque el verso no contiene el Tetragrámaton.
  - «Hacen guerra contra» se mantiene de manera consistente para el campo semántico de צבא en este contexto.
  - «Fortaleza» se deja con nota por la posible referencia alternativa a obras de asedio, en línea con el aparato inglés.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal.
