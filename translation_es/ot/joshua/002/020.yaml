  source_alignment_summary: 'El borrador refleja bien la estructura condicional y el sentido general del hebreo: si Rahab divulga el asunto, los espías quedarán exentos del juramento. Sin embargo, hay una desviación importante en persona y número: el hebreo tiene 2ª femenina singular dirigida a Rahab, mientras que el español usa «ustedes/revelan/hicieron», lo cual altera el referente. También conviene ajustar «revelas» para concordar mejor con la 2fs y mantener el matiz de divulgar un secreto.'
  spanish_quality_summary: 'El español es claro, pero la mezcla de tratamiento plural/cortesía no corresponde al original ni al contexto narrativo. Una formulación singular directa suena natural y más fiel: «Pero si revelas este asunto nuestro… de tu juramento que nos hiciste jurar». «Asunto nuestro» es comprensible y digno; «quedaremos libres» comunica bien el idiomatismo de exención.'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. La principal cuestión léxica es conservar el valor de דָּבָר como «asunto» y de נְקִיִּם como exención/libertad de obligación. El cambio necesario es pronominal: «tu… hiciste» en vez de «su… hicieron», para alinearse con מִשְּׁבֻעָתֵךְ / הִשְׁבַּעְתָּנוּ.'
