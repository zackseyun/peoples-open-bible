translation:
  language: es
  text: si obedeces la voz[a] de Yahvé tu Dios, guardando sus mandamientos y sus estatutos, los que están escritos en este libro de la ley, si vuelves[b] a Yahvé tu Dios con todo tu corazón y con toda tu alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «obedecer la voz de Yahvé»; la expresión significa atender obedientemente lo que él dice.
    reason: lexical_alternative
  - marker: b
    text: O «te vuelves» o «te arrepientes» ante Yahvé tu Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: En este contexto, כִּי introduce una condición. «Si» reproduce mejor la estructura condicional del hebreo que «cuando» o «porque».
- source_word: תִשְׁמַע בְּקוֹל
  english_pob_choice: you obey the voice
  chosen_spanish: obedeces la voz
  alternatives_spanish:
  - escuchas la voz
  - oyes la voz
  lexicon: HALOT
  rationale: La expresión hebrea no indica solo oír, sino atender obedientemente. En español, «obedeces la voz» conserva esa fuerza idiomática de manera natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», no sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Corresponde directamente al sufijo posesivo de segunda persona singular. «Tu Dios» es la equivalencia natural y precisa.
- source_word: לִשְׁמֹר
  english_pob_choice: keeping
  chosen_spanish: guardando
  alternatives_spanish:
  - al guardar
  - para guardar
  lexicon: HALOT
  rationale: El infinitivo expresa el modo o contenido de la obediencia. «Guardando» comunica bien esa relación sin forzar la sintaxis española.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: HALOT
  rationale: «Mandamientos» es el equivalente estándar y solemne para מִצְוָה en contexto pactual.
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» distingue adecuadamente חֻקִּים de «mandamientos» y mantiene la terminología legal de la Torá.
- source_word: הַכְּתוּבָה
  english_pob_choice: written
  chosen_spanish: que están escritos
  alternatives_spanish:
  - escritos
  - inscritos
  lexicon: HALOT
  rationale: El participio femenino singular funciona colectivamente con la serie de mandamientos y estatutos; «que están escritos» refleja mejor la relación y la concordancia en español.
- source_word: בְּסֵפֶר הַתּוֹרָה הַזֶּה
  english_pob_choice: in this book of the law
  chosen_spanish: en este libro de la ley
  alternatives_spanish:
  - en este rollo de la ley
  - en el libro de esta ley
  lexicon: HALOT
  rationale: «Libro de la ley» reproduce la fórmula del documento del pacto en un español claro y fiel; «rollo» sería más histórico, pero menos natural aquí.
- source_word: כִּי תָשׁוּב
  english_pob_choice: if you return
  chosen_spanish: si vuelves
  alternatives_spanish:
  - si regresas
  - si te vuelves
  lexicon: HALOT
  rationale: Se mantiene el valor condicional y el verbo básico שׁוּב con «volver». En el contexto, incluye la idea de retorno covenantal sin resolverla prematuramente como «arrepentirse».
- source_word: אֶל יְהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: a Yahvé tu Dios
  alternatives_spanish:
  - al Yahvé tu Dios
  - al SEÑOR tu Dios
  lexicon: HALOT
  rationale: La preposición אֶל se expresa naturalmente con «a». Se conserva el nombre divino según la norma del proyecto.
- source_word: בְּכָל לְבָבְךָ
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con todo tu ser interior
  - con toda tu mente
  lexicon: HALOT
  rationale: «Corazón» reproduce el antropologismo hebreo para la voluntad, el pensamiento y los afectos, y es la forma más estable en español bíblico contemporáneo.
- source_word: וּבְכָל נַפְשֶׁךָ
  english_pob_choice: and with all your soul
  chosen_spanish: y con toda tu alma
  alternatives_spanish:
  - y con toda tu vida
  - y con todo tu ser
  lexicon: HALOT
  rationale: «Alma» mantiene la fórmula deuteronómica y la densidad teológica de נֶפֶשׁ, sin reducirla a «vida» o «ser».
theological_decisions:
- issue: שׁוּב como retorno del pacto frente a traducción explicativa de arrepentimiento
  english_pob_reading: if you return
  chosen_spanish_reading: si vuelves
  alternative_spanish_readings:
  - si te arrepientes
  - si regresas
  rationale: «Volver» conserva la metáfora bíblica de retorno a Yahvé y deja abierta la dimensión de arrepentimiento sin imponerla como única matización.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Renderizado del Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la transliteración del nombre propio divino para no ocultar el texto original bajo una sustitución titular.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se mantuvo la construcción participial «guardando» en lugar de una perífrasis con «por medio de», y se conservó la relación más directa de «que están escritos» con el hebreo. También se preservó el valor condicional de ambos כִּי y la tensión teológica de שׁוּב como retorno covenantal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme a los criterios del proyecto.
  - Se distingue «mandamientos» de «estatutos» para מִצְוֺתָיו y חֻקֹּתָיו.
  - «Corazón» y «alma» reproducen el par antropológico hebreo sin modernizarlo en exceso.
  - Las notas al pie están ancladas exactamente en el texto con [a] y [b].
