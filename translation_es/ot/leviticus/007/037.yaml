  text: This is the law for the burnt offering[a], the grain offering, the sin offering, the guilt offering, the ordination offering[d][c][b], and the sacrifice of peace offerings.
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering.' The Hebrew term can emphasize removal of impurity as well as dealing with sin.
    reason: lexical_alternative
  - marker: b
    text: Or 'reparation offering' for 'guilt offering.' The Hebrew term can stress liability and required restitution.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'ordination rites' or 'consecration offering'; the term is plural and refers to priestly installation procedures.
    reason: lexical_alternative
  - marker: d
    text: Or 'the sacrifice of fellowship offerings' or 'the sacrifice of well-being offerings.'
    reason: lexical_alternative
