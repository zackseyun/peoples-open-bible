id: JOS.7.20
reference: Joshua 7:20
source:
  edition: WLC
  text: וַ/יַּ֧עַן עָכָ֛ן אֶת יְהוֹשֻׁ֖עַ וַ/יֹּאמַ֑ר אָמְנָ֗ה אָנֹכִ֤י חָטָ֨אתִי֙ לַֽ/יהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל וְ/כָ/זֹ֥את וְ/כָ/זֹ֖את עָשִֽׂיתִי־׃
translation:
  text: Achan answered Joshua and said[a], “Truly, I have sinned against Yahweh, the God of Israel, and this is what I did:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “thus and thus I did.” The Hebrew expression is an idiom introducing the details of what he had done.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה with a direct object of the person addressed; 'answered' preserves the formal dialogue structure.
- source_word: עָכָן
  chosen: Achan
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Common narrative speech verb; retained as 'said' following English dialogue convention after 'answered.'
- source_word: אָמְנָה
  chosen: Truly
  alternatives:
  - Indeed
  - Yes, truly
  - Surely
  lexicon: HALOT
  rationale: Adverb of affirmation/intensification. 'Truly' conveys solemn acknowledgment in a confession context without sounding archaic.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis, but English can carry this naturally in the clause. The emphasis is sufficiently reflected by word order and context; 'I myself' would overstate it.
- source_word: חָטָאתִי
  chosen: have sinned
  alternatives:
  - sinned
  lexicon: HALOT
  rationale: Perfect verb in a present-result confession context. English present perfect naturally conveys acknowledged completed wrongdoing with present relevance.
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: With חטא, the preposition ל can mark the offended party; in English 'sin against' is the idiomatic and semantically clear rendering. 'the LORD' follows the doctrinal default for YHWH.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying the LORD covenantally; translated straightforwardly.
- source_word: וְכָזֹאת וְכָזֹאת
  chosen: this and that is what I did
  alternatives:
  - thus and thus I did
  - this is what I did
  - such and such is what I did
  lexicon: HALOT
  rationale: Idiomatic formula introducing the specifics of an action. A too-literal 'thus and thus' is unnatural in modern English; 'this and that is what I did' preserves the introductory, somewhat formulaic force while remaining readable.
- source_word: עָשִׂיתִי
  chosen: I did
  alternatives:
  - I have done
  lexicon: HALOT
  rationale: Simple past works well after the introductory formula and anticipates the following explanation in the next verse.
