translation:
  language: es
  text: Antes del fuego vienen el vapor del horno y el humo; así, antes del derramamiento de sangre viene la injuria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «insulto», «vituperio» o «abuso verbal»; el término griego se refiere a habla ofensiva o insultante.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - previo a
  - antes
  lexicon: LSJ
  rationale: Marca prioridad temporal en ambos miembros del proverbio; en español, «antes de» expresa con naturalidad la secuencia sin perder el paralelo.
- source_word: πυρὸς
  english_pob_choice: fire
  chosen_spanish: derramamiento de sangre
  alternatives_spanish:
  - fuego
  - incendio
  lexicon: LSJ
  rationale: Aquí el griego no describe el fuego mismo en el foco final, sino el marco comparativo de la imagen; en el primer miembro del versículo, el elemento explícito en el texto fuente es el proceso previo al fuego. El español mantiene el sentido proverbial con la comparación completa.
- source_word: ἀτμὶς
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vaho
  - vaporación
  - niebla
  lexicon: LSJ
  rationale: «Vapor» reproduce bien ἀτμίς y encaja con el paralelismo con «humo».
- source_word: καμίνου
  english_pob_choice: the furnace’s
  chosen_spanish: del horno
  alternatives_spanish:
  - de la hornaza
  - de la fragua
  - de la fundición
  lexicon: LSJ
  rationale: «Horno» es claro en español y transmite suficientemente la imagen intensificada de καμίνος sin sonar artificial.
- source_word: καπνός
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - ahumado
  - hollín
  lexicon: LSJ
  rationale: Equivalente directo y natural para καπνός.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de igual modo
  lexicon: LSJ
  rationale: Introduce la correspondencia proverbial entre la imagen física y la realidad moral.
- source_word: αἱμάτων
  english_pob_choice: bloodshed
  chosen_spanish: derramamiento de sangre
  alternatives_spanish:
  - sangre
  - violencia
  - muertes
  lexicon: LSJ
  rationale: El plural griego puede funcionar idiomáticamente como «sangre derramada» o «violencia». En español, «derramamiento de sangre» conserva mejor la fuerza idiomática sin reducirlo a «sangre» literal.
- source_word: λοιδορία
  english_pob_choice: abuse
  chosen_spanish: injuria
  alternatives_spanish:
  - insulto
  - ultraje
  - reviling
  lexicon: LSJ
  rationale: La palabra denota habla ofensiva y vituperio. «Injuria» es un término digno y suficientemente amplio para el insulto verbal cargado de agravio; además conserva el tono proverbial.
theological_decisions:
- issue: Relación entre palabra ofensiva y violencia
  english_pob_reading: The verse is rendered as a proverb stating that abusive speech precedes bloodshed, without expanding it into a broader doctrine of causation.
  chosen_spanish_reading: 'El versículo se presenta como un proverbio de secuencia: la palabra ofensiva antecede al derramamiento de sangre, sin convertirlo en una tesis determinista sobre toda violencia.'
  alternative_spanish_readings:
  - El insulto produce necesariamente violencia
  - La injuria siempre termina en muerte
  rationale: La partícula repetida πρὸ sugiere anterioridad, no una causalidad absoluta. El español conserva el aviso moral sin exagerar el alcance doctrinal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al término final con el marcador [a] dentro del texto, y se evitó crear notas sin anclaje. La redacción sigue de cerca el paralelismo del griego y la lectura auditada en inglés.
  spanish_consistency_notes:
  - Se usó «derramamiento de sangre» para αἱμάτων, manteniendo el valor idiomático señalado por el audit trail.
  - Se evitó «SEÑOR» o terminología litúrgica no pertinente; el versículo no contiene el tetragrámaton.
  - «Injuria» se eligió por su registro digno y su capacidad de abarcar insulto/ultraje sin perder naturalidad en español bíblico moderno.
