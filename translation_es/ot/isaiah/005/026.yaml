revisions:
- from: Él levantará una señal para las naciones desde lejos[a], y les silbará desde el extremo de la tierra; y he aquí, rápidamente, velozmente[c][b], viene.
  to: Él levantará una señal para las naciones desde lejos[a], y silbará para convocarlas[b] desde el extremo de la tierra; y he aquí, rápidamente, velozmente[c], viene.
  rationale: 'Se ajusta únicamente la expresión de וְשָׁרַק לּוֹ para lograr un español más natural y explícito en su función convocante: «silbará para convocarlas». Esto preserva el sentido del hebreo y del inglés auditado sin el giro algo forzado «les silbará». Se mantiene el singular final «viene» para conservar la imagen colectiva singular del hebreo. También se pule la nota [a] con un orden de alternativas más natural en español.'
  reviewer_model: gpt-5.4
