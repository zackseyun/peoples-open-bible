translation:
  language: es
  text: Entonces se levantará un rey poderoso, y ejercerá un gran dominio y hará según su voluntad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hará conforme a su voluntad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד
  english_pob_choice: Then ... will arise
  chosen_spanish: Entonces se levantará
  alternatives_spanish:
  - Y se levantará
  - Entonces surgirá
  - Y aparecerá
  lexicon: HALOT
  rationale: En este contexto profético-narrativo, עמד puede expresar la entrada en escena o el surgir de un gobernante. «Se levantará» conserva esa idea sin reducirla a «estar de pie», y «Entonces» refleja la secuencia del relato con naturalidad en español.
- source_word: מֶלֶךְ גִּבּוֹר
  english_pob_choice: a mighty king
  chosen_spanish: un rey poderoso
  alternatives_spanish:
  - un rey fuerte
  - un rey valeroso
  - un rey guerrero
  lexicon: HALOT
  rationale: גִּבּוֹר comunica fuerza, poder y capacidad; «poderoso» es amplio y natural en español, y evita estrechar el sentido hacia «guerrero», que sería más específico de lo que exige el hebreo.
- source_word: וּמָשַׁל
  english_pob_choice: and he will rule
  chosen_spanish: y dominará
  alternatives_spanish:
  - y reinará
  - y gobernará
  - y ejercerá dominio
  lexicon: HALOT
  rationale: משל implica ejercer dominio o gobierno. Aquí «dominará» enlaza bien con el sustantivo siguiente de la misma raíz y preserva la fuerza del verbo mejor que una opción más general como «gobernará».
- source_word: מִמְשָׁל רַב
  english_pob_choice: with great dominion
  chosen_spanish: con gran dominio
  alternatives_spanish:
  - con dominio grande
  - con vasto dominio
  - con gran autoridad
  lexicon: HALOT
  rationale: La construcción cognada intensifica el alcance del gobierno. «Con gran dominio» reproduce esa relación semántica de forma clara y sobria en español.
- source_word: וְעָשָׂה כִּרְצוֹנוֹ
  english_pob_choice: and do as he pleases
  chosen_spanish: y hará según su voluntad
  alternatives_spanish:
  - y hará como le plazca
  - y actuará conforme a su voluntad
  - y hará conforme a su deseo
  lexicon: HALOT
  rationale: El hebreo expresa actuar conforme a la propia voluntad. «Según su voluntad» mantiene la referencia directa al sustantivo רָצוֹן, y conserva la tensión de poder sin suavizarla hacia una simple preferencia personal.
translation_notes:
  revision_awareness: La revisión inglesa reciente mantuvo sin cambios la solución «a mighty king ... rule with great dominion ... do as he pleases», y el texto español sigue de cerca esas decisiones léxicas sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni un sustituto directo.
  - «Dominio» conserva la fuerza del cognado con משל, evitando diluir el paralelismo.
  - La nota alternativa preserva la tensión entre una formulación idiomática («según su voluntad») y otra más literal («conforme a su voluntad»).
