translation:
  language: es
  text: Mi alma ha morado por mucho tiempo[a] con uno que odia la paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha morado demasiado tiempo con uno que odia la paz». El hebreo inicial puede enfatizar duración prolongada y también puede sugerir que la duración es excesiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת
  english_pob_choice: has long
  chosen_spanish: por mucho tiempo
  alternatives_spanish:
  - mucho
  - demasiado tiempo
  - hace mucho
  lexicon: HALOT
  rationale: La forma funciona adverbialmente con el verbo siguiente para indicar duración prolongada. «Por mucho tiempo» comunica de manera natural esa prolongación sin imponer necesariamente la idea de exceso que el hebreo solo sugiere como posibilidad, no como certeza.
- source_word: שָׁכְנָה
  english_pob_choice: dwelt
  chosen_spanish: ha morado
  alternatives_spanish:
  - ha habitado
  - ha vivido
  - ha permanecido
  lexicon: HALOT
  rationale: שכן expresa residir o habitar de manera estable. «Ha morado» conserva el matiz de residencia duradera y funciona bien en registro poético y bíblico en español.
- source_word: לָּהּ
  english_pob_choice: with my soul as the subject rather than translating the pronoun separately
  chosen_spanish: Mi alma como sujeto explícito, sin traducir el sufijo por separado
  alternatives_spanish:
  - para ella
  - a ella
  - con mi alma
  lexicon: HALOT
  rationale: El sufijo pronominal femenino singular es sintácticamente difícil y en el contexto se entiende en relación con נַפְשִׁי. Siguiendo la solución auditada en inglés, el español expresa el sujeto de forma explícita para evitar una frase forzada o ambigua.
- source_word: נַפְשִׁי
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - yo
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: נפש puede significar alma, vida, persona o yo. En los Salmos, «mi alma» conserva mejor el lenguaje poético-antropológico del hebreo que una simplificación a «yo».
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto a
  lexicon: HALOT
  rationale: La preposición indica asociación o convivencia. «Con» es la equivalencia directa y natural en español.
- source_word: שׂוֹנֵא
  english_pob_choice: one who hates
  chosen_spanish: uno que odia
  alternatives_spanish:
  - el que odia
  - el odiador de
  - enemigo de
  lexicon: HALOT
  rationale: El participio describe una disposición característica. «Uno que odia» preserva la fuerza verbal sin convertirlo en un sustantivo más interpretativo como «enemigo de».
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - armonía
  lexicon: HALOT
  rationale: En este contraste de hostilidad versus relación pacífica, «paz» es la opción más clara e idiomática. El artículo definido se añade por fluidez del español sin alterar el sentido.
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético (WLC) y el audit trail inglés de POB, que entiende רַבַּת como duración prolongada y reconoce la ambigüedad de posible exceso. No hubo revisiones aplicadas en el ciclo más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término predeterminado solo cuando corresponda; este versículo no lo contiene.
  - Se evitó «Cristo» y «SEÑOR» porque no aparecen en el hebreo de este versículo.
  - Se preservó el tono poético con un verbo de residencia («ha morado») y una construcción natural para la duración («por mucho tiempo»).
