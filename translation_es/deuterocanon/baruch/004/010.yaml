translation:
  language: es
  text: Porque he aquí el cautiverio[a] de mis hijos y de mis hijas, que el Eterno[b] trajo sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el exilio». El griego αἰχμαλωσία puede denotar cautiverio en sentido amplio, incluida la deportación al exilio.
    reason: lexical_alternative
  - marker: b
    text: O «el Siempre Eterno». El griego usa un título divino, ὁ αἰώνιος, literalmente «el eterno / perdurable».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: For behold
  chosen_spanish: Porque he aquí
  alternatives_spanish:
  - He aquí
  - Mira
  - Pues he aquí
  lexicon: BDAG
  rationale: ἰδού es una partícula de llamada de atención. En español, «he aquí» conserva el tono enfático y formal; se añade «Porque» para reflejar γάρ y mantener la conexión explicativa con el contexto anterior.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Pues bien
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamento. «Porque» expresa esa relación causal/explicativa de manera clara y natural en español.
- source_word: τὴν αἰχμαλωσίαν
  english_pob_choice: the captivity
  chosen_spanish: el cautiverio
  alternatives_spanish:
  - el exilio
  - la cautividad
  - la condición de cautivos
  lexicon: BDAG
  rationale: αἰχμαλωσία designa cautiverio, con el matiz de ser llevados por la fuerza. «Cautiverio» conserva esa dureza; «exilio» sería posible, pero desplaza un poco el énfasis hacia la deportación geográfica.
- source_word: τῶν υἱῶν μου καὶ τῶν θυγατέρων
  english_pob_choice: of my sons and daughters
  chosen_spanish: de mis hijos y de mis hijas
  alternatives_spanish:
  - de mis hijos e hijas
  - de mis hijos
  - de mis descendientes
  lexicon: BDAG
  rationale: El griego nombra explícitamente a hijos e hijas. Se conserva la duplicación para mantener la precisión del texto y la política de no colapsar un binomio con matiz de género en un término genérico.
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - cual
  lexicon: BDAG
  rationale: El relativo retoma «el cautiverio». En español, «que» resulta natural y suficientemente preciso en esta estructura.
- source_word: ἐπήγαγεν
  english_pob_choice: brought upon
  chosen_spanish: trajo sobre
  alternatives_spanish:
  - hizo venir sobre
  - acarreó sobre
  - impuso sobre
  lexicon: BDAG
  rationale: ἐπάγω aquí significa causar que algo venga sobre alguien. «Trajo sobre» preserva la fuerza de imposición sin añadir interpretación excesiva.
- source_word: ὁ αἰώνιος
  english_pob_choice: the Everlasting One
  chosen_spanish: el Eterno
  alternatives_spanish:
  - el Eterno Dios
  - el Everlasting One
  - el que es eterno
  lexicon: LEH
  rationale: ὁ αἰώνιος funciona como título divino. «El Eterno» conserva el título sustantivado y evita sustituirlo por «Señor», que no está en el griego; también es un equivalente español natural y reverente.
theological_decisions:
- issue: Título divino ὁ αἰώνιος
  english_pob_reading: the Everlasting One
  chosen_spanish_reading: el Eterno
  alternative_spanish_readings:
  - el Eterno Dios
  - el Siempre Eterno
  - el Everlasting One
  rationale: El griego presenta un título para Dios, no κύριος. En español, «el Eterno» comunica de forma sobria y fiel el valor titulativo de αἰώνιος, sin introducir terminología no atestiguada en el versículo.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Translate titles'
- issue: Relación entre cautiverio y exilio
  english_pob_reading: the captivity / the exile
  chosen_spanish_reading: el cautiverio
  alternative_spanish_readings:
  - el exilio
  - la cautividad
  rationale: La POB inglesa preserva la posibilidad semántica de αἰχμαλωσία. En español, «cautiverio» mantiene mejor la coerción implícita del término y permite la lectura alternativa «exilio» en nota sin borrar la tensión lexical.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: se mantiene el valor enfático de ἰδού sin introducir verbos ausentes del griego, y se conserva la designación divina titulada de ὁ αἰώνιος en lugar de normalizarla como «Señor» o expandirla innecesariamente.'
  spanish_consistency_notes:
  - Se prefirió «cautiverio» sobre «exilio» en el cuerpo por mayor proximidad semántica al griego, pero se conserva la alternativa en nota.
  - Se usó «el Eterno» como título divino sustantivado, paralelo funcional de la decisión inglesa «the Everlasting One».
  - La estructura con «Porque he aquí» mantiene tanto el enlace causal de γάρ como el llamamiento enfático de ἰδοὺ.
