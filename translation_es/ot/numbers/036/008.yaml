review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura legal del hebreo: toda hija heredera dentro de las tribus de los hijos de Israel debe casarse dentro del marco tribal paterno para preservar la heredad ancestral. Conserva bien ‘hijos de Israel’, ‘tribu de su padre’ y el propósito final distributivo. Sin embargo, hay dos problemas de fidelidad auditiva y terminológica: la nota [b] está mal anclada y no corresponde al segmento traducido, y ‘familia’ en el texto principal debilita la distinción social entre מִשְׁפָּחָה y מַטֶּה que el propio expediente inglés quiso preservar como ‘clan’ frente a ‘tribu’.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor precisión y naturalidad jurídica. ‘Heredad’ funciona bien en este contexto. ‘Será esposa de uno de...’ es aceptable, aunque ‘será esposa de alguien del clan...’ sería más natural; no obstante, no hace falta cambiarlo si se mantiene la cercanía formal al hebreo. El ajuste principal recomendable es usar ‘clan’ en el texto principal para evitar ambigüedad con ‘familia’. También conviene corregir la puntuación retirando la coma innecesaria tras ‘Israel’.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí importa la política de exactitud legal y social: ‘hijos de Israel’ está bien retenido; ‘heredad’ es defendible para נַחֲלָה; pero para מִשְׁפָּחָה el borrador se aparta de la decisión auditada principal (‘clan’) y la relega a nota, lo cual reduce la precisión estructural frente a ‘tribu’.'
  issues:
  - severity: high
    issue: La nota [b] está mal colocada y su contenido no corresponde al texto anclado.
    rationale: En el texto, [b] aparece después de ‘uno’, pero la nota dice ‘O “de los hijos de Israel”’, que no es alternativa para לְאֶחָד sino para otra frase; esto rompe la trazabilidad del expediente y crea confusión textual.
  - severity: medium
    issue: ‘Familia’ en el texto principal pierde la distinción entre מִשְׁפָּחָה y מַטֶּה.
    rationale: El hebreo distingue clan dentro de tribu, y el POB inglés documentó ‘clan’ como opción principal. En español, ‘familia’ puede sonar a unidad doméstica o parentesco genérico, mientras ‘clan’ preserva mejor la estructura legal-tribal del versículo.
  - severity: low
    issue: Coma innecesaria antes de ‘será esposa’.
    rationale: En español fluido no se separa con coma el sujeto largo del predicado aquí; retirarla mejora la legibilidad sin afectar el sentido.
  revised_spanish_text: Y toda hija que herede una heredad[a] de entre las tribus de los hijos de Israel será esposa de uno de la clan[c] de la tribu de su padre, para que los hijos de Israel hereden cada uno[d] la heredad de sus padres.
  revised_footnotes:
  - marker: a
    text: O ‘que hereda una heredad’ / ‘que está heredando una propiedad’; el participio hebreo puede enfatizar el estado de la hija como heredera.
    reason: lexical_alternative
  - marker: c
    text: O ‘familia de la tribu de su padre’; hebreo מִשְׁפָּחָה designa un grupo de parentesco de nivel clan dentro de la tribu.
    reason: lexical_alternative
  - marker: d
    text: O ‘cada uno herede la heredad de sus padres’.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota mal anclada eliminando [b], se restituye la precisión estructural de מִשְׁפָּחָה con ‘clan’ en el texto principal, y se limpia la puntuación. No se requieren cambios doctrinales ni una relectura compleja del hebreo.
