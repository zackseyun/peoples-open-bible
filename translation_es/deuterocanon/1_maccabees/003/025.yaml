translation:
  language: es
  text: Y comenzó el temor ante Judas y sus hermanos[a], y la ruina[b] seguía cayendo sobre las naciones que los rodeaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «surgió el temor ante Judas y sus hermanos», es decir, el miedo a ellos comenzó a extenderse entre otros.
    reason: lexical_alternative
  - marker: b
    text: O «la ruina seguía cayendo sobre las naciones circundantes»; el imperfecto griego sugiere una acción continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - dio inicio
  lexicon: LSJ
  rationale: El aoristo medio de ἄρχομαι marca inicio de un estado; «comenzó» reproduce con naturalidad ese inicio en español.
- source_word: ὁ φόβος
  english_pob_choice: the fear
  chosen_spanish: el temor
  alternatives_spanish:
  - el miedo
  - el terror
  lexicon: LSJ
  rationale: «Temor» conserva el matiz de miedo reverente o intenso sin subir la intensidad a «terror»; también suena más digno en el registro bíblico español.
- source_word: Ἰούδα καὶ τῶν ἀδελφῶν αὐτοῦ
  english_pob_choice: of Judas and of his brothers
  chosen_spanish: de Judas y de sus hermanos
  alternatives_spanish:
  - de Judas y de sus hermanos
  - respecto de Judas y sus hermanos
  lexicon: LSJ
  rationale: Se mantiene la relación genitiva asociativa sin sobreinterpretarla; el español puede coordinar naturalmente con «de» en ambos miembros.
- source_word: ἡ πτῶσις
  english_pob_choice: downfall
  chosen_spanish: la ruina
  alternatives_spanish:
  - la caída
  - el derrumbe
  - la perdición
  lexicon: LSJ
  rationale: Aunque πτῶσις puede ser «caída», en este contexto militar-político «ruina» comunica mejor el efecto devastador sin perder amplitud semántica.
- source_word: ἐπίπτεν
  english_pob_choice: was falling
  chosen_spanish: seguía cayendo
  alternatives_spanish:
  - caía
  - iba cayendo
  lexicon: LSJ
  rationale: El imperfecto indica acción continua; «seguía cayendo» preserva con claridad esa progresividad mejor que un simple pretérito perfecto simple.
- source_word: ἐπὶ τὰ ἔθνη
  english_pob_choice: upon the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - contra las naciones
  - sobre los pueblos
  lexicon: LSJ
  rationale: «Sobre» conserva la imagen de algo que recae encima; «naciones» respeta el valor amplio de ἔθνη en el contexto.
- source_word: τὰ κύκλῳ αὐτῶν
  english_pob_choice: around them
  chosen_spanish: que los rodeaban
  alternatives_spanish:
  - alrededor de ellos
  - circundantes
  lexicon: LSJ
  rationale: La cláusula relativa expresa con naturalidad el entorno geográfico; «que los rodeaban» fluye mejor en español que una construcción más literal.
translation_notes:
  revision_awareness: Se corrigió el problema señalado anteriormente incorporando los marcadores de nota directamente en el texto español. También se ajustó la línea para que las notas alternativas queden ancladas a los términos relevantes y no aparezcan sin referencia en el cuerpo.
  spanish_consistency_notes:
  - Se mantuvo «naciones» para ἔθνη, en coherencia con el contexto histórico y militar de 1 Macabeos.
  - Se eligió «temor» en lugar de «miedo» para sostener un registro bíblico más natural en español sin perder el valor semántico de φόβος.
  - Se prefirió una solución dinámica-controlada («seguía cayendo») para reflejar el imperfecto ἐπίπτεν.
