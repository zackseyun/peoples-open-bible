translation:
  language: es
  text: 'Y aconteció que, cuando Yirmeyahu terminó de hablar todo lo que Yahvé le había mandado hablar a todo el pueblo, los sacerdotes y los profetas y todo el pueblo lo agarraron, diciendo: «¡Ciertamente morirás[a]!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Seguramente morirás» o «De cierto morirás». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  - Y pasó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de היה introduce un nuevo episodio. «Y aconteció» conserva el marcador hebreo de transición narrativa con tono sobrio y tradicional, sin forzar un calco rígido.
- source_word: כְּכַלּוֹת
  english_pob_choice: when ... had finished
  chosen_spanish: cuando ... terminó de
  alternatives_spanish:
  - cuando hubo terminado de
  - al terminar de
  - después de que terminó de
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal expresa circunstancia temporal anterior. En español, «cuando ... terminó de» comunica bien la secuencia y el sentido completivo.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Yirmeyahu
  chosen_spanish: Yirmeyahu
  alternatives_spanish:
  - Jeremías
  lexicon: Transliteración del nombre propio según la filosofía del proyecto
  rationale: Se conserva la forma hebrea del nombre, siguiendo el criterio de transliterar nombres propios en vez de sustituirlos por el exónimo tradicional español.
- source_word: לְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - de decir
  - para hablar
  lexicon: HALOT
  rationale: Con כְּכַלּוֹת, el infinitivo de דבר se vuelve naturalmente «terminó de hablar». Se mantiene el verbo de habla y no se sustituye por un sinónimo más débil.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: La construcción marca la totalidad del contenido. «Todo lo que» es la forma natural en español y conserva el alcance completo del original.
- source_word: צִוָּה יְהוָה
  english_pob_choice: the LORD had commanded
  chosen_spanish: Yahvé le había mandado
  alternatives_spanish:
  - Yahvé le había ordenado
  - Yahvé le había encomendado
  lexicon: HALOT
  rationale: צוה expresa mandato claro. «Mandado» mantiene la fuerza directiva sin volverlo excesivamente formal; se conserva «Yahvé» para el nombre divino según el estándar del proyecto.
- source_word: לְדַבֵּר אֶל כָּל הָעָם
  english_pob_choice: to speak to all the people
  chosen_spanish: hablar a todo el pueblo
  alternatives_spanish:
  - decirlo a todo el pueblo
  - hablar ante todo el pueblo
  lexicon: HALOT
  rationale: Se preserva la repetición de דבר como acto de habla. «Todo el pueblo» refleja bien כָּל הָעָם con sentido colectivo y evita una especificación innecesaria.
- source_word: וַיִּתְפְּשׂוּ אֹתוֹ
  english_pob_choice: seized him
  chosen_spanish: lo apresaron
  alternatives_spanish:
  - lo asieron
  - lo sujetaron
  - lo tomaron preso
  lexicon: HALOT
  rationale: תפשׂ implica echar mano de alguien. «Lo apresaron» comunica con fuerza la acción violenta y resulta natural en español, sin sobrecargar el texto con una lectura jurídica que el hebreo no exige.
- source_word: הַכֹּהֲנִים וְהַנְּבִאִים וְכָל הָעָם
  english_pob_choice: the priests and the prophets and all the people
  chosen_spanish: los sacerdotes y los profetas y todo el pueblo
  alternatives_spanish:
  - los sacerdotes, los profetas y todo el pueblo
  lexicon: HALOT
  rationale: Se conserva la coordinación acumulativa del hebreo. «Sacerdotes» y «profetas» traducen los sustantivos de rol, mientras que «todo el pueblo» mantiene la amplitud del grupo opositor.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - deciendo
  lexicon: HALOT
  rationale: Es la forma española natural para introducir el discurso directo. Mantiene la función quotativa del infinitivo sin añadir contenido interpretativo.
- source_word: מ֥וֹת תָּמֽוּת
  english_pob_choice: You must surely die
  chosen_spanish: ¡Sin duda morirás!
  alternatives_spanish:
  - ¡Morirás ciertamente!
  - ¡De cierto morirás!
  - ¡Debes morir sin falta!
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la certeza de la amenaza. «Sin duda morirás» transmite bien la fuerza enfática y conserva el tono judicial amenazante sin sonar artificial.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene la forma establecida en la política del proyecto para el nombre del pacto, en vez de ocultarlo con una sustitución editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Intensificación verbal en מוֹת תָּמוּת
  english_pob_reading: You must surely die
  chosen_spanish_reading: ¡Sin duda morirás!
  alternative_spanish_readings:
  - ¡Morirás ciertamente!
  - ¡Debes morir sin falta!
  rationale: La construcción hebrea expresa énfasis, no solo futuro simple. La traducción elegida conserva la amenaza enfática y la gravedad judicial del contexto.
  doctrine_reference: HALOT; observación del infinitivo absoluto con imperfecto en el audit trail inglés
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés como contexto, pero las elecciones españolas se hicieron desde el hebreo: se mantuvo el marcador narrativo inicial, la secuencia temporal de כְּכַלּוֹת, la repetición de דבר, la fuerza de תפשׂ y la intensificación del infinitivo absoluto en la amenaza final. No hubo revisiones previas que exigieran ajuste.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma del nombre divino, conforme al criterio del proyecto.
  - Se translitera el nombre propio Yirmeyahu en lugar de usar el exónimo tradicional.
  - La voz verbal «lo apresaron» refleja una captura violenta sin precisar formalmente un arresto.
  - La puntuación y el discurso directo siguen un registro bíblico moderno y publicable en español neutral.
