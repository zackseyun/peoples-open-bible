  text: כִּ֤י אִם עֲוֺנֹֽתֵי/כֶם֙ הָי֣וּ מַבְדִּלִ֔ים בֵּינֵ/כֶ֕ם לְ/בֵ֖ין אֱלֹֽהֵי/כֶ֑ם וְ/חַטֹּֽאותֵי/כֶ֗ם הִסְתִּ֧ירוּ פָנִ֛ים מִ/כֶּ֖ם מִ/שְּׁמֽוֹעַ־׃
