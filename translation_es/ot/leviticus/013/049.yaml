translation:
  language: es
  text: Y si la mancha es verdosa o rojiza en la ropa, o en el cuero, o en la urdimbre o en la trama[a], o en cualquier objeto de cuero, es una mancha de enfermedad cutánea[b]; y se la mostrará al sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'trama' para el hebreo עֵרֶב, el término técnico para los hilos transversales en un tejido.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente 'mancha de lepra'. El término hebreo designa en Levítico una categoría ritual y física más amplia que la lepra médica moderna.
    reason: alternative_reading
lexical_decisions:
- source_word: נֶּגַע
  english_pob_choice: spot
  chosen_spanish: mancha
  alternatives_spanish:
  - marca
  - lesión
  - plaga
  lexicon: HALOT
  rationale: En Levítico 13 el término designa una anomalía visible que puede aparecer en tela o cuero. 'Mancha' es natural en español para ese tipo de afectación observable y funciona mejor que 'plaga' o 'lesión' en materiales no humanos.
- source_word: יְרַקְרַק
  english_pob_choice: greenish
  chosen_spanish: verdosa
  alternatives_spanish:
  - verde
  - verde amarillenta
  - pálidamente verde
  lexicon: HALOT
  rationale: La forma reduplicada indica un matiz verdoso, no necesariamente un verde pleno. 'Verdosa' conserva ese valor aproximado y suena natural en español.
- source_word: אֲדַמְדָּם
  english_pob_choice: reddish
  chosen_spanish: rojiza
  alternatives_spanish:
  - roja
  - rosada
  - de tono rojizo
  lexicon: HALOT
  rationale: La reduplicación sugiere un tono rojizo más que un rojo intenso. 'Rojiza' mantiene ese matiz observacional sin exagerarlo.
- source_word: בֶּגֶד
  english_pob_choice: garment
  chosen_spanish: ropa
  alternatives_spanish:
  - vestidura
  - prenda
  - vestido
  lexicon: HALOT
  rationale: En este contexto la referencia es a un textil de uso cotidiano; 'ropa' es claro y amplio en español. Aunque 'prenda' también sería posible, 'ropa' resulta más natural en la enumeración.
- source_word: עוֹר
  english_pob_choice: leather
  chosen_spanish: cuero
  alternatives_spanish:
  - piel
  - piel curtida
  - hide
  lexicon: HALOT
  rationale: Aquí no se trata de piel viva, sino de material procesado en objetos. 'Cuero' es la opción más clara y precisa en español.
- source_word: שְׁתִי
  english_pob_choice: warp
  chosen_spanish: urdimbre
  alternatives_spanish:
  - hilos longitudinales
  lexicon: HALOT
  rationale: '''Urdimbre'' es el término técnico usual para los hilos longitudinales del tejido y preserva la distinción textil del hebreo.'
- source_word: עֵרֶב
  english_pob_choice: woof
  chosen_spanish: trama
  alternatives_spanish:
  - hilos transversales
  - tejido transversal
  lexicon: HALOT
  rationale: '''Trama'' es el término técnico natural en español para los hilos transversales. Es más transparente que ''woof'' y mantiene la oposición con ''urdimbre''.'
- source_word: כְּלִי עוֹר
  english_pob_choice: article of leather
  chosen_spanish: objeto de cuero
  alternatives_spanish:
  - utensilio de cuero
  - artefacto de cuero
  - vasija de cuero
  lexicon: HALOT
  rationale: La expresión hebrea es amplia y designa cualquier objeto hecho de cuero. 'Objeto de cuero' conserva esa amplitud en español sin restringir innecesariamente a un utensilio específico.
- source_word: צָרַעַת
  english_pob_choice: skin disease
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad cutánea
  - afección de la piel
  - sarna ritual
  lexicon: HALOT
  rationale: Aunque el auditorio moderno puede asociar 'lepra' con una enfermedad clínica específica, la tradición bíblica española usa este término para צָרַעַת. Dado que la POB inglesa optó por 'skin disease' para evitar un anacronismo médico, en español 'lepra' se mantiene solo en la frase fija tradicional y se acompaña de una nota explicativa para preservar la tensión léxica sin ocultarla.
- source_word: וְהָרְאָה אֶת הַכֹּהֵן
  english_pob_choice: it shall be shown to the priest
  chosen_spanish: y se la mostrará al sacerdote
  alternatives_spanish:
  - y será mostrada al sacerdote
  - y se presentará al sacerdote
  lexicon: HALOT
  rationale: El hebreo usa una forma pasiva/causativa que enfoca el objeto inspeccionado. En español, 'se la mostrará' mantiene ese valor impersonal y resulta idiomático.
theological_decisions:
- issue: Traducción de צָרַעַת en legislación sacerdotal
  english_pob_reading: skin disease
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad cutánea
  - afección de la piel
  rationale: El contexto de Levítico 13 muestra que la categoría puede afectar también textiles y cuero, por lo que no coincide exactamente con la lepra clínica moderna. Sin embargo, para esta sección en español se conserva 'lepra' por continuidad auditiva con la tradición bíblica y se hace explícita la nota de que se trata de una categoría ritual-diagnóstica más amplia que una enfermedad moderna.
  doctrine_reference: Principio de primacía del texto original con atención a la recepción léxica; preservación de la tensión entre tradición e ինտención semántica del hebreo.
translation_notes:
  revision_awareness: 'El auditor inglés mantuvo una revisión sin cambios y señaló acuerdo general alto, pero con cuestiones principales por el alcance de צָרַעַת. Esta versión española sigue el mismo punto de decisión: conserva la forma tradicional ''lepra'' en el cuerpo del texto, pero añade una nota para no confundirla con el diagnóstico médico moderno.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - '''Urdimbre'' y ''trama'' se usan como par técnico textil coherente con la terminología española estándar.'
  - '''Cuero'' se reserva para material procesado, no para piel viva.'
  - La nota sobre צָרַעַת preserva la tensión entre la tradición castellana y la precisión semántica del hebreo.
