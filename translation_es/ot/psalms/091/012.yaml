    text: 'Lit.: «en/sobre las palmas/manos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te llevarán» o «te alzarán».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a «te cargarán» para preservar mejor la imagen física de נָשָׂא en combinación con «manos/palmas». También se cambia «sobre» por «en» para una expresión más natural en español sin perder el sentido. Se conservan las alternativas léxicas en notas, reancladas de modo claro al texto revisado.
