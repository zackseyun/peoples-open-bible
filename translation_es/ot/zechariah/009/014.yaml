    text: Hebreo shofar, un cuerno de carnero usado como señal de guerra o trompeta ceremonial.
    reason: cultural_note
  - marker: b
    text: 'O: «en los torbellinos de Temán». «Temán» puede entenderse como nombre propio o como «el sur».'
    reason: alternative_reading
  revision_rationale: Se corrigió «se aparecerá» a «aparecerá» por naturalidad y fidelidad idiomática al nifal hebreo. También se reubicaron los marcadores de nota para que la nota cultural sobre shofar ancle a «cuerno» y la nota alternativa sobre Temán ancle a «del sur», conforme al contenido real de cada nota. El resto del texto se mantiene porque refleja adecuadamente el sentido del hebreo y la política terminológica del proyecto.
