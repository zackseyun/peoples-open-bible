id: ISA.19.11
reference: Isaiah 19:11
source:
  edition: WLC
  text: אַךְ אֱוִלִים֙ שָׂ֣רֵי צֹ֔עַן חַכְמֵי֙ יֹעֲצֵ֣י פַרְעֹ֔ה עֵצָ֖ה נִבְעָרָ֑ה אֵ֚יךְ תֹּאמְר֣וּ אֶל פַּרְעֹ֔ה בֶּן חֲכָמִ֥ים אֲנִ֖י בֶּן מַלְכֵי קֶֽדֶם־־־־־׃
translation:
  text: Surely the princes of Zoan are fools[a]; the wise counselors of Pharaoh give foolish counsel. How can you say to Pharaoh, “I am a son of wise men[b], a son of ancient kings”?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offer senseless advice'; literally, 'counsel is brutish/stupid.'
    reason: lexical_alternative
  - marker: b
    text: '''A son of wise men'' and ''a son of ancient kings'' are idioms of lineage or pedigree, not necessarily immediate sonship.'
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - indeed
  - only
  lexicon: HALOT
  rationale: Here the particle introduces an emphatic assertion, not restriction. 'Surely' best conveys the force in natural English.
- source_word: אֱוִלִים
  chosen: fools
  alternatives:
  - foolish
  - stupid men
  lexicon: HALOT
  rationale: Predicate adjective/noun describing the princes of Zoan. 'Fools' preserves the sharp evaluative force better than the softer adjectival 'foolish'.
- source_word: שָׂרֵי צֹעַן
  chosen: the princes of Zoan
  alternatives:
  - the officials of Zoan
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes princes, rulers, or officials. 'Princes' is a standard and fitting rendering in this courtly context; צֹעַן is transliterated as the place-name Zoan.
- source_word: חַכְמֵי יֹעֲצֵי פַרְעֹה
  chosen: the wise counselors of Pharaoh
  alternatives:
  - Pharaoh's wise advisers
  - the sages among Pharaoh's counselors
  lexicon: HALOT
  rationale: The phrase appositionally identifies Pharaoh's counselors as those reputed to be wise. 'Wise counselors of Pharaoh' is concise and preserves both elements.
- source_word: עֵצָה נִבְעָרָה
  chosen: give stupid counsel
  alternatives:
  - counsel has become brutish
  - offer senseless advice
  lexicon: HALOT
  rationale: 'The Hebrew is compressed: literally ''counsel is brutish/stupid.'' In English, supplying the verbal idea from the context yields a natural rendering. ''Stupid counsel'' preserves the pejorative force of נבערה.'
- source_word: נִבְעָרָה
  chosen: stupid
  alternatives:
  - brutish
  - senseless
  lexicon: HALOT
  rationale: The term conveys dullness or brutish stupidity. 'Stupid' is clear modern English; 'brutish' is possible but more archaic and potentially misleading.
- source_word: אֵיךְ תֹּאמְרוּ אֶל פַּרְעֹה
  chosen: How can you say to Pharaoh
  alternatives:
  - How do you say to Pharaoh
  - How will you say to Pharaoh
  lexicon: HALOT
  rationale: The interrogative expresses incredulity. 'How can you say' captures the rhetorical challenge better than a more wooden 'How do you say.'
- source_word: בֶּן חֲכָמִים אֲנִי
  chosen: I am a son of wise men
  alternatives:
  - I am the son of sages
  - I am descended from wise men
  lexicon: HALOT
  rationale: בֶּן can denote literal sonship or membership/descent. 'A son of wise men' preserves the idiom and the boast of pedigree without over-paraphrasing.
- source_word: בֶּן מַלְכֵי קֶדֶם
  chosen: a son of ancient kings
  alternatives:
  - a son of kings of old
  - descended from ancient kings
  lexicon: HALOT
  rationale: קֶדֶם here refers to antiquity/former times, not eastward direction. 'Ancient kings' is the most natural concise rendering while preserving the dynastic boast.
