translation:
  language: es
  text: Y la razón se ve que prevalece no solo sobre la incitación de la búsqueda del placer[a], sino también sobre todo deseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el aguijón de la autoindulgencia» o «la incitación frenética de la búsqueda del placer». La expresión griega es inusualmente comprimida y metafórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός designa la facultad de pensar y juzgar rectamente. «La razón» es la equivalencia más natural en español y conserva el sentido filosófico del término sin volverlo demasiado procesual.
- source_word: φαίνεται
  english_pob_choice: is seen
  chosen_spanish: se ve
  alternatives_spanish:
  - aparece
  - se muestra
  lexicon: LSJ
  rationale: El griego presenta una formulación de evidencia u observación. «Se ve» reproduce ese matiz impersonal y evita intensificar indebidamente la afirmación.
- source_word: ἐπικρατεῖν
  english_pob_choice: to prevail
  chosen_spanish: prevalece
  alternatives_spanish:
  - domina
  - vence
  - tiene poder sobre
  lexicon: LSJ
  rationale: El verbo indica superioridad efectiva o dominio. «Prevalece» conserva el registro argumentativo y filosófico del texto y encaja bien con «se ve».
- source_word: τὴν τῆς ἡδυπαθείας οἰστρηλασίαν
  english_pob_choice: the goading of pleasure-seeking
  chosen_spanish: el aguijón de la pasión por el placer
  alternatives_spanish:
  - el goadear de la autosatisfacción
  - la incitación de la complacencia
  - la arrebatinga de la búsqueda del placer
  lexicon: LSJ
  rationale: La expresión griega es muy comprimida y metafórica. «Aguijón» conserva la imagen de incitación o picadura implícita en οἰστρηλασία, mientras que «pasión por el placer» comunica el campo semántico de ἡδυπάθεια de manera readable en español. La combinación busca mantener el valor figurado sin oscurecer el sentido.
- source_word: ἡδυπαθεία
  english_pob_choice: pleasure-seeking
  chosen_spanish: la pasión por el placer
  alternatives_spanish:
  - la búsqueda del placer
  - la autoindulgencia
  - el amor al placer
  lexicon: LSJ
  rationale: ἡδυπάθεια puede implicar amor o búsqueda de placer con fuerza negativa. «Pasión por el placer» transmite esa inclinación afectiva y conserva la carga moral negativa sin depender de un tecnicismo poco natural.
- source_word: οἰστρηλασία
  english_pob_choice: goading
  chosen_spanish: aguijón
  alternatives_spanish:
  - incitación
  - impulso frenético
  - goading
  lexicon: LSJ
  rationale: Este término raro combina la idea de ser picado o espoleado con una noción de impulso vehemente. «Aguijón» es breve, imagética y suficientemente fiel para una construcción tan condensada.
- source_word: πάσης ἐπιθυμίας
  english_pob_choice: every desire
  chosen_spanish: todo deseo
  alternatives_spanish:
  - toda pasión
  - toda apetencia
  - cada deseo
  lexicon: LSJ
  rationale: ἐπιθυμία abarca deseo, anhelo o apetencia. «Todo deseo» preserva el alcance universal de πάσης y suena natural en español.
theological_decisions:
- issue: La afirmación antropológica sobre la superioridad de la razón frente a las pasiones
  english_pob_reading: reason is portrayed as prevailing over pleasure-driven impulse and over every desire
  chosen_spanish_reading: la razón se presenta como prevaleciendo sobre el impulso orientado al placer y sobre todo deseo
  alternative_spanish_readings:
  - la razón solo parece prevalecer
  - la razón domina únicamente algunos deseos
  - la razón vence a las pasiones en un sentido absoluto
  rationale: El pasaje sostiene la tesis característica de 4 Macabeos sobre la primacía de la razón disciplinada. La traducción conserva esa fuerza argumentativa sin convertirla en una formulación doctrinal posterior ni suavizarla a una mera apariencia retórica.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión textual y la fuerza argumentativa; equivalencia óptima'
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó la imagen hacia «the goading of pleasure-seeking» para acercarse más a τῆς ἡδυπαθείας οἰστρηλασίαν. La versión española sigue esa línea al usar «aguijón» e integrar «pasión por el placer», procurando mantener el carácter figurado e incitante del giro griego sin perder legibilidad.
  spanish_consistency_notes:
  - Se mantiene «razón» para λογισμός conforme al uso filosófico de 4 Macabeos.
  - Se conserva una estructura impersonal con «se ve» para φαίνεται.
  - «Prevalece» refleja mejor el valor de dominio efectivo de ἐπικρατεῖν que una simple noción de victoria puntual.
  - «Deseo» se usa para ἐπιθυμία como término amplio y general.
  - La nota al pie se reserva para la dificultad real de la expresión griega condensada.
