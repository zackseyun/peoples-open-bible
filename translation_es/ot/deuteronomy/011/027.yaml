    text: 'También: «la bendición que vendrá cuando obedezcan los mandamientos de Yahvé su Dios». El hebreo usa una partícula relativa con sentido condicional.'
    reason: lexical_alternative
  - marker: b
    text: «Prestar oído a» también puede traducirse «obedecer», porque en hebreo este verbo suele incluir la idea de oír con respuesta obediente.
    reason: lexical_alternative
  revision_rationale: Se revisa 'escuchan los mandamientos' a 'prestan oído a los mandamientos' para preservar la decisión del POB inglés de no convertir el verbo principal en 'obedecer', pero con una expresión española más natural y fiel al matiz de oír atentamente con obediencia implicada. También se elimina la coma en 'Yahvé su Dios' para mejorar la fluidez y ajustarse mejor al sintagma posesivo en español.
