- from: Sin embargo, si no fuera por tu afecto por el agrupamiento[a] y la necesidad[b], habrías sido privado de la vida en lugar de estas cosas.
  to: Sin embargo, si no fuera por tu afecto por la reunión[a] y por la necesidad[b], habrías sido privado de la vida en lugar de estas cosas.
  rationale: Se reemplaza «agrupamiento» por «reunión» para mejorar la naturalidad del español sin perder el rango semántico documentado para συστροφή, preservando la alternativa «multitud» en nota. Se ajusta «y la necesidad» a «y por la necesidad» para reflejar con más claridad la causalidad y el paralelismo de la construcción griega.
