    text: Or 'sought the LORD' or 'inquired of the LORD'; literally, 'sought the face of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of bloods,' an idiom for a household guilty of bloodshed.
    reason: lexical_alternative
