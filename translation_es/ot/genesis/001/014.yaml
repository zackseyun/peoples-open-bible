translation:
  language: es
  text: 'Y dijo Dios: «Haya luces[b] en la expansión[c] de los cielos para separar el día de la noche, y sean para señales, para tiempos señalados[a][d], para días y años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para temporadas». El hebreo מוֹעֲדִים a menudo significa tiempos señalados y puede incluir tiempos festivos en otros contextos.
    reason: lexical_alternative
  - marker: b
    text: O «lumbreras» para «luces».
    reason: lexical_alternative
  - marker: c
    text: O «firmamento» o «bóveda» para «expansión».
    reason: lexical_alternative
  - marker: d
    text: O «para señales y para tiempos señalados, y para días y años».
    reason: alternative_reading
lexical_decisions:
- source_word: מְאֹרֹת
  english_pob_choice: lights
  chosen_spanish: lumbreras
  alternatives_spanish:
  - luces
  - astros luminosos
  lexicon: HALOT
  rationale: El término hebreo designa portadoras o fuentes de luz. En español, «lumbreras» conserva esa referencia a cuerpos celestes luminosos con un registro digno y bíblico, sin reducirlo a una mera luz abstracta.
- source_word: רָקִיעַ
  english_pob_choice: expanse
  chosen_spanish: expansión
  alternatives_spanish:
  - firmamento
  - bóveda
  lexicon: HALOT
  rationale: «Expansión» comunica la idea de un espacio extendido sin imponer la imagen más cargada de «firmamento» ni fijar una forma demasiado específica como «bóveda».
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El hebreo es plural y en Génesis 1 suele referirse al ámbito celeste. «Los cielos» preserva mejor ese valor y su resonancia literaria que «el cielo».
- source_word: לְהַבְדִּיל
  english_pob_choice: to separate
  chosen_spanish: para separar
  alternatives_spanish:
  - para dividir
  - para distinguir
  lexicon: HALOT
  rationale: La forma infinitiva expresa propósito. «Para separar» es natural en español y reproduce bien la función de delimitación entre dos realidades.
- source_word: בֵּין הַיּוֹם וּבֵין הַלַּיְלָה
  english_pob_choice: the day from the night
  chosen_spanish: el día de la noche
  alternatives_spanish:
  - entre el día y la noche
  - el día de la noche
  lexicon: HALOT
  rationale: En español, «separar el día de la noche» es idiomático y mantiene la relación contrastiva del hebreo sin forzar la repetición de «entre... y entre...».
- source_word: לְאֹתֹת
  english_pob_choice: for signs
  chosen_spanish: para señales
  alternatives_spanish:
  - como señales
  - para signos
  lexicon: HALOT
  rationale: אות aquí denota marcadores o indicios observables. «Señales» conserva la amplitud del término y funciona con naturalidad en español bíblico actual.
- source_word: לְמוֹעֲדִים
  english_pob_choice: for appointed times
  chosen_spanish: para tiempos señalados
  alternatives_spanish:
  - para estaciones
  - para tiempos establecidos
  - para fiestas
  lexicon: HALOT
  rationale: El hebreo puede abarcar tiempos fijados o señalados, y en otros contextos tiempos festivos. «Tiempos señalados» mantiene el alcance amplio que el POB inglés preserva con «appointed times», sin restringirlo a estaciones climáticas ni a fiestas litúrgicas.
- source_word: לְיָמִים וְשָׁנִים
  english_pob_choice: for days and years
  chosen_spanish: para días y años
  alternatives_spanish:
  - para días y años
  lexicon: HALOT
  rationale: Es una correspondencia directa de las unidades temporales nombradas en el hebreo, sin necesidad de ampliar o explicar más allá del texto.
- source_word: יְהִי ... וְהָיוּ
  english_pob_choice: Let there be ... and let them be
  chosen_spanish: Haya ... y sean
  alternatives_spanish:
  - Sea ... y sean
  - Haya ... y estarán
  lexicon: HALOT
  rationale: El jussivo y el verbo siguiente expresan mandato/divina disposición. «Haya... y sean» conserva el estilo de fiat creador y su paralelismo verbal.
theological_decisions:
- issue: Sentido de מוֹעֲדִים en Génesis 1:14
  english_pob_reading: broad temporal 'appointed times' rather than specifically liturgical festivals or merely climatic seasons
  chosen_spanish_reading: tiempos señalados, con amplitud para tiempos fijados y posibles tiempos festivos según otros contextos
  alternative_spanish_readings:
  - estaciones
  - fiestas
  - tiempos establecidos
  rationale: El contexto inmediato trata del orden cósmico del tiempo, no de un calendario cultual específico. «Tiempos señalados» mantiene la amplitud semántica y deja abierta la conexión posterior con usos festivos sin imponerla aquí.
  doctrine_reference: Translation philosophy §3, §5
- issue: Puntuación de la lista final de propósitos
  english_pob_reading: for signs and for appointed times, and for days and years
  chosen_spanish_reading: para señales, para tiempos señalados, para días y años
  alternative_spanish_readings:
  - para señales y para tiempos señalados, y para días y años
  rationale: El hebreo enumera tres propósitos coordinados. La puntuación en español hace visible esa lista ternaria y evita una coordinación torpe, manteniendo la correspondencia formal con el original.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió repetir la preposición antes de «appointed times» y organizar la lista final como tres elementos coordinados. La versión española sigue esa decisión estructural con «para señales, para tiempos señalados, para días y años».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se eligió «los cielos» para conservar el plural hebreo de הַשָּׁמַיִם.
  - No se usó «SEÑOR» porque el texto hebreo dice אֱלֹהִים, no יהוה.
  - «Lumbreras» evita una equivalencia demasiado abstracta y conserva el carácter de cuerpos celestes luminosos.
  - «Tiempos señalados» preserva la amplitud de מוֹעֲדִים sin reducirla a «estaciones» o «fiestas» exclusivamente.
