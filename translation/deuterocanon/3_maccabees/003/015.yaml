theological_decisions:
- issue: Political paternalism in τιθηνήσασθαι
  chosen_reading: Retain the nurturing/rearing metaphor rather than replacing it with a neutral administrative term.
  alternative_readings:
  - should be governed
  - should be managed
  - should be treated
  rationale: The Greek depicts rule over the nations in parental or nurse-like terms. Smoothing this into mere governance would hide the source text's rhetoric. No doctrinal controversy is involved, but preserving the metaphor is important for transparency.
  doctrine_reference: Translation philosophy §1, §5
