translation:
  language: es
  text: El que guarda la ley domina su entendimiento[a]; y el cumplimiento[b] del temor de Yahvé es sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Entendimiento» también puede entenderse como «mente», «intención» o «pensamiento»; el griego ἐννόημα es compacto y admite esa amplitud.
    reason: lexical_alternative
  - marker: b
    text: O «la consumación» o «la plenitud». El griego συντέλεια indica cumplimiento o realización plena.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ φυλάσσων
  english_pob_choice: Whoever keeps
  chosen_spanish: El que guarda
  alternatives_spanish:
  - Quien guarda
  - El que observa
  - El que custodia
  lexicon: BDAG
  rationale: El participio articular tiene fuerza genérica. «El que guarda» mantiene la idea de observar fielmente la ley y suena natural en español bíblico moderno.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  lexicon: BDAG
  rationale: En este contexto sapiencial judío, el referente es el cuerpo normativo conocido; «la ley» conserva esa referencia de manera clara y sobria.
- source_word: κατακρατεῖ
  english_pob_choice: controls
  chosen_spanish: domina
  alternatives_spanish:
  - controla
  - somete
  - se apodera de
  lexicon: BDAG
  rationale: El verbo puede expresar ejercer dominio o tener ascendiente sobre algo. «Domina» comunica mejor la idea de tener gobierno sobre una facultad interior que el mero «controla», sin perder la fuerza del griego.
- source_word: τοῦ ἐννοήματος αὐτοῦ
  english_pob_choice: his understanding
  chosen_spanish: su entendimiento
  alternatives_spanish:
  - su mente
  - su intención
  - su pensamiento
  lexicon: LSJ
  rationale: ἐννόημα puede abarcar pensamiento, intención o entendimiento. En este contexto sapiencial, «entendimiento» preserva el sentido intelectual-moral y evita reducir el término a «mente» en sentido meramente psicológico.
- source_word: συντέλεια
  english_pob_choice: the fulfillment
  chosen_spanish: la culminación
  alternatives_spanish:
  - el cumplimiento
  - la consumación
  - el final
  lexicon: BDAG
  rationale: συντέλεια indica llevar algo a su medida completa o a su pleno término. «Culminación» mantiene la idea de plenitud alcanzada sin cargar el verso con matiz escatológico.
- source_word: τοῦ φόβου Κυρίου
  english_pob_choice: the fear of the Lord
  chosen_spanish: del temor de Yahvé
  alternatives_spanish:
  - del temor del Señor
  - del temor reverente hacia Yahvé
  lexicon: BDAG
  rationale: Se conserva la fórmula sapiencial «temor de Yahvé» según el criterio del proyecto para יהוה. «Temor» retiene la amplitud reverente y ética del hebreo/grecismo, no solo el miedo.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sabiduría práctica
  lexicon: BDAG
  rationale: Término sapiencial directo; «sabiduría» es la equivalencia más fiel y comprensible en español.
theological_decisions:
- issue: Relación entre guardar la ley y dominar el entendimiento en κατακρατεῖ τοῦ ἐννοήματος αὐτοῦ
  english_pob_reading: Law-keeping gives a person mastery over his understanding.
  chosen_spanish_reading: Guardar la ley otorga dominio sobre el entendimiento interior.
  alternative_spanish_readings:
  - Guardar la ley preserva su entendimiento.
  - Guardar la ley fija su intención.
  rationale: La construcción griega es compacta y admite más de una matización semántica. La redacción elegida conserva la idea de disciplina interior producida por la obediencia, sin resolver indebidamente la ambigüedad entre pensamiento, intención y entendimiento.
  doctrine_reference: Preservar la tensión lexical donde el griego es compacto; no sobre-explicar el mecanismo moral.
- issue: Sentido de συντέλεια τοῦ φόβου Κυρίου
  english_pob_reading: the fulfillment of the fear of the Lord is wisdom.
  chosen_spanish_reading: la culminación del temor de Yahvé es sabiduría.
  alternative_spanish_readings:
  - el cumplimiento del temor de Yahvé es sabiduría.
  - la plenitud del temor de Yahvé es sabiduría.
  rationale: «Culminación» refleja la idea de llegada a su punto pleno, compatible con la revisión inglesa que prefirió «fulfillment». Mantiene el valor de proceso consumado sin forzar un matiz doctrinal ajeno al proverbio.
  doctrine_reference: Conservar la relación sapiencial entre temor reverente y sabiduría sin convertirla en fórmula técnica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «completion» por «fulfillment» para συντέλεια. La presente traducción no sigue mecánicamente el inglés, sino que conserva la idea de llevar algo a su plenitud con «culminación», y mantiene la lectura sapiencial del verso sin introducir un sesgo escatológico.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Ley», «temor de Yahvé» y «sabiduría» mantienen el registro sapiencial y bíblico común en español.
  - Los corchetes de notas [a] y [b] aparecen exactamente en el texto y corresponden a las únicas notas usadas.
