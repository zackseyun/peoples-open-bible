theological_decisions:
- issue: 「나사렛 사람이라 불릴 것이다」의 구약 인용 출처
  chosen_reading: 예언자들을 통하여…말씀이 이루어지게
  alternative_readings:
  - 특정 구약 본문으로 한정
  rationale: 마태는 단일 본문이 아니라 「예언자들」(복수)을 통해 주어진 메시지로 제시한다. 사사기 13:5의 「나실인」, 이사야 11:1의 「가지(נֵצֶר)」와 음·뜻으로 연결되는 함의가 모두 가능하다. 한국어 본문도 복수 「예언자들」을 그대로 보존해 마태의 모호성을 살린다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension'
