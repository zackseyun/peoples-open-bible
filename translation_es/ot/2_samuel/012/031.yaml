  - severity: medium
    issue: La nota [a] usa 'en la sierra' en singular
    rationale: 'El POB inglés dice ''at the saw'' como alternativa literal, pero en español la serie debe reflejar mejor el paralelismo y sonar natural: ''en la sierra, en herramientas de hierro afiladas y en instrumentos de hierro para cortar'' o similar. Además conviene no mezclar singular/plural sin necesidad.'
