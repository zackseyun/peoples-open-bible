id: 1KI.1.33
reference: 1 Kings 1:33
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ לָ/הֶ֗ם קְח֤וּ עִמָּ/כֶם֙ אֶת עַבְדֵ֣י אֲדֹנֵי/כֶ֔ם וְ/הִרְכַּבְתֶּם֙ אֶת שְׁלֹמֹ֣ה בְנִ֔/י עַל הַ/פִּרְדָּ֖ה אֲשֶׁר לִ֑/י וְ/הוֹרַדְתֶּ֥ם אֹת֖/וֹ אֶל גִּחֽוֹן־־־־־׃
translation:
  text: And the king said to them[a], “Take with you the servants of your lord, and have my son Solomon ride on the mule that is mine, and bring him down to Gihon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “mount Solomon, my son, on my own mule.” The Hebrew verb is causative: the attendants are to cause Solomon to ride.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: The construct phrase עַבְדֵי אֲדֹנֵיכֶם refers to the royal attendants or officials under the authority of the addressed men's lord/king. In this court setting, 'servants' is the most natural English rendering; 'slaves' would over-specify bonded status not foregrounded here.
- source_word: אֲדֹנֵיכֶם
  chosen: your lord
  alternatives:
  - your master
  lexicon: HALOT
  rationale: Although the speaker is the king, he refers to himself in the elevated third person as 'your lord,' a common royal idiom. 'Your lord' preserves the formal court register better than 'your master' and avoids flattening the political nuance.
- source_word: וְהִרְכַּבְתֶּם
  chosen: have ... ride
  alternatives:
  - mount
  - cause ... to ride
  - set ... on
  lexicon: HALOT
  rationale: 'The Hiphil of רכב is causative: the attendants are to place Solomon on the animal. In idiomatic English, ''have my son Solomon ride on'' communicates the causative sense naturally without awkwardness.'
- source_word: הַפִּרְדָּה
  chosen: the mule
  alternatives:
  - the female mule
  - the royal mule
  lexicon: HALOT
  rationale: פִּרְדָּה denotes a mule, grammatically feminine here. English normally uses the generic species term 'mule' unless the sex is contextually important, which it is not in this verse. The definite article is retained.
- source_word: אֲשֶׁר לִי
  chosen: that is mine
  alternatives:
  - which belongs to me
  - my own
  lexicon: HALOT
  rationale: This relative clause marks the mule as specifically belonging to the king, an important sign of royal authorization. 'That is mine' is clear, direct, and preserves the emphasis.
- source_word: וְהוֹרַדְתֶּם
  chosen: bring him down
  alternatives:
  - take him down
  - lead him down
  lexicon: HALOT
  rationale: The Hiphil of ירד means to cause to go down. Because the destination is Gihon, likely lower in elevation from the palace area, 'bring him down' preserves the topographical sense better than a neutral 'take him'.
- source_word: גִּחוֹן
  chosen: Gihon
  lexicon: HALOT
  rationale: This is a proper place name and should be transliterated rather than translated, in keeping with the translation philosophy for names.
- source_word: בְנִי
  chosen: my son
  lexicon: HALOT
  rationale: The possessive is explicit and should be retained. It also underscores Solomon's filial relationship to the king in the succession context.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  chosen: And the king said
  alternatives:
  - Then the king said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And the king said' is a straightforward narrative rendering; 'Then' would also work, but 'And' stays slightly closer to the Hebrew flow.
