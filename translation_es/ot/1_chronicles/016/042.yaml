translation:
  language: es
  text: Y con ellos estaban Hemán y Jedutún, con trompetas y címbalos para hacer sonar, y con instrumentos para los cantos de Dios; y los hijos de Jedutún estaban a la puerta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porteros»; el hebreo literalmente dice «a/para la puerta», lo que puede indicar servicio asignado en la puerta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמָּהֶם
  english_pob_choice: And with them were
  chosen_spanish: Y con ellos estaban
  alternatives_spanish:
  - Y con ellos
  - Y con ellos había
  lexicon: HALOT
  rationale: La frase introductoria en español requiere un verbo copulativo para sonar natural; 'estaban' mantiene la idea de acompañamiento sin añadir contenido interpretativo fuerte.
- source_word: הֵימָן
  english_pob_choice: Heman
  chosen_spanish: Heman
  alternatives_spanish:
  - Hemán
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio con una forma española habitual y clara.
- source_word: וִידוּתוּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jeduthún
  - Yedutún
  lexicon: Transliteración estándar
  rationale: Se usa una transliteración española natural y reconocible; 'Jedutún' respeta mejor la pronunciación corriente en español que la forma inglesa.
- source_word: חֲצֹצְרוֹת
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - clarines
  - trompetas ceremoniales
  lexicon: HALOT
  rationale: '''Trompetas'' es el equivalente natural moderno para el instrumento ritual; evita un arcaísmo innecesario.'
- source_word: וּמְצִלְתַּיִם
  english_pob_choice: cymbals
  chosen_spanish: címbalos
  alternatives_spanish:
  - platillos
  - cimbalillos
  lexicon: HALOT
  rationale: '''Címbalos'' es el término bíblico y musical más preciso en español para este instrumento.'
- source_word: לְמַשְׁמִיעִים
  english_pob_choice: for sounding aloud
  chosen_spanish: para hacer oír[a]
  alternatives_spanish:
  - para sonar
  - para dar sonido
  lexicon: HALOT
  rationale: La idea causativa de שמע se expresa bien con 'hacer oír'. Conserva el énfasis en producir sonido audible sin decidir demasiado entre canto, anuncio o ejecución musical.
- source_word: וּכְלֵי שִׁיר
  english_pob_choice: instruments for the songs of God
  chosen_spanish: con instrumentos para los cantos
  alternatives_spanish:
  - con instrumentos de canto
  - con instrumentos musicales
  lexicon: HALOT
  rationale: '''כלי שיר'' es literalmente ''instrumentos de canto''; en español, ''instrumentos para los cantos'' mantiene la relación de finalidad y suena natural.'
- source_word: הָאֱלֹהִים
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - para Dios
  - divinos
  lexicon: HALOT
  rationale: Se traduce el genitivo de manera directa como 'de Dios', preservando la forma hebrea sin estrechar indebidamente el sentido.
- source_word: וּבְנֵי יְדוּתוּן
  english_pob_choice: and the sons of Jeduthun
  chosen_spanish: y los hijos de Jedutún
  alternatives_spanish:
  - y los descendientes de Jedutún
  - y los hijos de Jeduthun
  lexicon: HALOT
  rationale: '''Hijos'' corresponde de forma fiel al hebreo y encaja en el contexto levítico/genealógico.'
- source_word: לַשָּׁעַר
  english_pob_choice: were at the gate
  chosen_spanish: estaban junto a la puerta
  alternatives_spanish:
  - estaban a la puerta
  - eran porteros
  lexicon: HALOT
  rationale: El hebreo permite un sentido de asignación a la puerta. 'Junto a la puerta' conserva la imagen local sin convertir de manera explícita el sintagma en 'porteros', que sería una interpretación más cerrada.
theological_decisions:
- issue: Función de los hijos de Jedutún en לַשָּׁעַר
  english_pob_reading: were at the gate; the Hebrew literally says 'for/at the gate,' which may denote assigned gate duty
  chosen_spanish_reading: estaban junto a la puerta
  alternative_spanish_readings:
  - eran porteros
  - estaban para la puerta
  rationale: Se conserva la ambigüedad del hebreo sobre si la expresión describe ubicación o deber asignado. 'Junto a la puerta' deja abierta la lectura de servicio sin imponerla en el texto principal.
  doctrine_reference: No aplica; decisión lexical-contextual, no doctrinal.
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado para una sintaxis más fluida y para reflejar con mayor naturalidad el constructo 'instruments for the songs of God'. La versión española sigue esa línea, pero se apoya directamente en el hebreo al conservar la estructura enumerativa, los nombres propios y la ambigüedad de לַשָּׁעַר.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para הָאֱלֹהִים, conforme al estándar del proyecto.
  - Se usa 'Jedutún' como forma española consistente del nombre propio.
  - '''Címbalos'' y ''trompetas'' reflejan instrumentos cultuales conocidos sin necesidad de explicitar ''ceremoniales'' en el texto principal.'
  - La nota de pie de página solo marca la alternativa de לְמַשְׁמִיעִים; no se añade una nota separada para 'la puerta' porque la redacción principal ya preserva la ambigüedad sin sobreinterpretarla.
