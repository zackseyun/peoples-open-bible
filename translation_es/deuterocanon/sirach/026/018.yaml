    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la frase final para hacerla más idiomática y clara en español, preservando el énfasis del griego en una edad o etapa de vida caracterizada por estabilidad o asentamiento. La nota se mantiene, pero el anclaje se traslada a la frase que realmente necesita aclaración.
