  spanish_consistency_notes:
  - Se mantiene 'Mallothi' como transliteración del nombre propio.
  - Se usa 'hijos' para בנים, pero en el texto español se prefiere la forma general 'sus hijos' como equivalente natural y fiel.
  - Se conserva el orden breve de lista con punto y coma, siguiendo la estructura del hebreo y del inglés auditado.
