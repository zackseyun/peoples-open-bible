review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la pregunta retórica de πῶς τε δὴ μέλλει y el sentido general de objetos fabricados por humanos que no pueden perdurar. También conserva adecuadamente κατέλιπον como legado para generaciones posteriores. Sin embargo, «vergüenza» debilita ligeramente ὄνειδος, que en este contexto apunta más a deshonra u oprobio duradero que a una emoción interna de vergüenza. Además, «tras de sí» suena algo pesado; «dejado» o «dejado como herencia» fluye mejor en español bíblico moderno.
  spanish_quality_summary: 'El texto es claro y legible, con tono digno y natural. La sintaxis es buena, pero puede pulirse para mayor naturalidad y precisión semántica: «han dejado mentiras y deshonra» suena más limpio que «han dejado tras de sí mentiras y vergüenza».'
  glossary_alignment: No hay conflictos con la terminología proyectual principal. La elección de «hechas por ellos» preserva bien el carácter general de τὰ ὑπʼ αὐτῶν κατασκευασθέντα sin importar «ídolos» al texto. La revisión propuesta mejora la correspondencia de ὄνειδος con «deshonra».
  issues:
  - severity: medium
    issue: «vergüenza» para ὄνειδος
    rationale: ὄνειδος suele denotar reproche público, deshonra u oprobio, no solo la experiencia subjetiva de vergüenza. «Deshonra» preserva mejor la fuerza polemizante del griego y del inglés POB «disgrace».
  - severity: low
    issue: «han dejado tras de sí» es algo pesado
    rationale: Aunque es fiel a la idea de legado, en español moderno suena menos natural que «han dejado» en este contexto, especialmente porque el complemento «para los que vienen después» ya expresa el efecto posterior.
  revised_spanish_text: ¿Cómo, pues, podrán durar las cosas hechas por ellos? Porque han dejado mentiras y deshonra para los que vienen después.
  revision_rationale: Se ajusta «vergüenza» a «deshonra» para reflejar mejor ὄνειδος como reproche público duradero, y se simplifica «han dejado tras de sí» a «han dejado» para un español más natural sin pérdida del sentido de legado, ya expresado por «para los que vienen después».
