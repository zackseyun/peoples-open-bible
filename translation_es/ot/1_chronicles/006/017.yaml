    text: Or 'in song' or 'by singing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their ordinance' or 'according to their custom.'
    reason: lexical_alternative
