  yaml_path: translation/ot/joshua/020/009.yaml
  text: These were the appointed cities for all the sons of Israel and for the sojourner residing among them[c][b][a], so that anyone who struck down a person unintentionally might flee there and not die by the hand of the avenger of blood until he stood before the congregation.
  footnotes:
