revisions:
- from: El jefe de la cárcel no se ocupaba de nada de lo que estaba en su mano[a], porque Yahvé estaba con él; y todo lo que hacía[c][b], Yahvé lo hacía prosperar.
  to: El jefe de la prisión no se ocupaba de nada de lo que estaba en su mano[a], porque Yahvé estaba con él; y todo lo que hacía[b], Yahvé lo hacía prosperar[c].
  rationale: Se corrige una alternativa defectuosa en la nota a, se reubican y ajustan las notas para que correspondan con claridad a sus anclas, y se mejora ligeramente el registro con «prisión». El sentido fuente y las decisiones léxicas principales se conservan.
