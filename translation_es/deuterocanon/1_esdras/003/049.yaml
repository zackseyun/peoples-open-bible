review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: causalidad repetida con διά + acusativo, cambio de estado con ἐγένοντο, y fuerza social de δοῦλοι como «esclavos». Sin embargo, la nota al pie no preserva plenamente la alternativa documentada en el POB inglés («were led astray in their own minds»), sino que ofrece otra alternativa distinta («perdieron el sentido»). Conviene ajustar la nota para mantener la trazabilidad auditada al matiz literal de ταῖς ἰδίαις διανοίαις.'
  spanish_quality_summary: El español es claro, natural y digno. «Perdieron el juicio» funciona bien para ἀπενοήθησαν y «se hicieron esclavos» es idiomático. «Por causa de las mujeres… por causa de ellas» es fiel aunque algo pesado; aun así, la repetición refleja deliberadamente el griego y puede conservarse. La principal reparación necesaria está en la nota, no en la redacción principal.
  glossary_alignment: 'Buen alineamiento con la política del proyecto: δοῦλοι → «esclavos» correctamente, sin suavizar a «siervos». No hay términos divinos o cristológicos relevantes aquí. La decisión de condensar ἀπενοήθησαν + ταῖς ἰδίαις διανοίαις en «perdieron el juicio» es aceptable si la nota conserva la alternativa más literal auditada.'
  issues:
  - severity: medium
    issue: La nota al pie no sigue la alternativa lexical auditada en inglés
    rationale: El POB inglés documenta como alternativa «muchos fueron desviados/extraviados en sus propias mentes por causa de las mujeres». La nota española actual ofrece «perdieron el sentido», que no preserva ese matiz alternativo ni la referencia explícita a «sus propias mentes/pensamientos».
  - severity: low
    issue: 'Redacción teológica interna defectuosa en metadatos: «bondados? no»'
    rationale: No afecta el texto bíblico, pero muestra un descuido editorial en las decisiones teológicas. No requiere adjudicación compleja, solo limpieza de registro.
  revised_spanish_text: Y muchos perdieron el juicio[a] por causa de las mujeres, y se hicieron esclavos por causa de ellas;
  revised_footnotes:
  - marker: a
    text: 'O: «muchos fueron extraviados en sus propias mentes por causa de las mujeres». La expresión griega es algo idiomática y combina un verbo de perder la razón con «sus propias mentes/pensamientos».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural en español, y se corrige la nota para reflejar la alternativa lexical documentada en el POB inglés y el matiz más literal del griego.
