translation:
  language: es
  text: Será sanidad para tu cuerpo[a] y refrigerio para tus huesos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para tu ombligo». El término hebreo puede referirse específicamente al ombligo, aunque en este contexto probablemente designa de manera más amplia el bienestar físico del cuerpo.
    reason: lexical_alternative
  - marker: b
    text: O «humedad» o «nutrición» para tus huesos.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִפְאוּת
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - sanidad corporal
  lexicon: HALOT
  rationale: El sustantivo expresa el resultado de sanar o restaurar la salud. En español, «sanidad» comunica bien ese estado de salud/restauración y encaja de forma natural con la imagen proverbial.
- source_word: תְּהִי
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - habrá de ser
  - sea
  lexicon: HALOT
  rationale: La forma verbal funciona aquí como consecuencia resultante del contexto anterior. «Será» mantiene la fuerza futura/resultativa sin añadir modalidad exhortativa que el hebreo no requiere en este versículo.
- source_word: לְשָׁרֶּךָ
  english_pob_choice: to your body
  chosen_spanish: para tu cuerpo
  alternatives_spanish:
  - para tu ombligo
  - para tu interior
  lexicon: HALOT
  rationale: El término hebreo puede referirse literalmente al ombligo, pero en este contexto probablemente funciona de manera más amplia para el bienestar físico. «Tu cuerpo» preserva esa lectura amplia y evita restringir innecesariamente la imagen.
- source_word: וְשִׁקּוּי
  english_pob_choice: refreshment
  chosen_spanish: refrigerio
  alternatives_spanish:
  - humedecimiento
  - nourición
  - refresco
  lexicon: HALOT
  rationale: El sustantivo parte de la idea de dar de beber o de aportar humedad. «Refrigerio» comunica en español un efecto de alivio e invigoración corporal, manteniendo el paralelismo poético con «sanidad».
- source_word: לְעַצְמוֹתֶיךָ
  english_pob_choice: to your bones
  chosen_spanish: para tus huesos
  alternatives_spanish:
  - a tus huesos
  - para tus osamentos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «huesos», que en la antropología hebrea representa la estructura interna y la vitalidad de la persona.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: el texto fue confirmado como estable y de alta concordancia. Esta versión española sigue esa lectura estable, conservando el paralelismo poético y la ambigüedad lexical relevante del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la terminología general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» y «Cristo», que no corresponden al texto.
  - Se preserva la imagen corporal concreta («cuerpo», «huesos») y se señala en nota la alternativa literal «ombligo».
  - «Sanidad» y «refrigerio» ofrecen un registro bíblico claro en español sin endurecer el verso con calcos innecesarios.
