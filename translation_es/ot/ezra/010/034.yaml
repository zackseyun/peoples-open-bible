lexical_decisions:
- source_word: מִ/בְּנֵי
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Entre los hijos de
  - De entre los hijos de
  lexicon: HALOT
  rationale: El prefijo partitivo מִן con בְּנֵי introduce un subconjunto dentro de un linaje o lista. En español, «de los hijos de» conserva ese sentido relacional y suena natural en una enumeración genealógica.
- source_word: בָנִי
  english_pob_choice: Bani
  chosen_spanish: Bani
  alternatives_spanish:
  - Bani
  lexicon: nombre propio
  rationale: Es un nombre propio hebreo; se conserva por transliteración. No hay base para traducirlo.
- source_word: מַעֲדַי
  english_pob_choice: Maadai
  chosen_spanish: Maadai
  alternatives_spanish:
  - Maadai
  lexicon: nombre propio
  rationale: Nombre propio; se mantiene la forma transliterada sin traducción.
- source_word: עַמְרָם
  english_pob_choice: Amram
  chosen_spanish: Amram
  alternatives_spanish:
  - Amram
  lexicon: nombre propio
  rationale: Nombre propio hebreo ampliamente reconocible; se conserva transliterado.
- source_word: וְ/אוּאֵל
  english_pob_choice: and Uel
  chosen_spanish: y Uel
  alternatives_spanish:
  - y Uel
  - y U'el
  lexicon: nombre propio
  rationale: La conjunción וְ se traduce de manera directa como «y». El nombre propio אוּאֵל se translitera como «Uel», forma breve y clara en español.
translation_notes:
  revision_awareness: El texto fuente, la traducción inglesa POB y la revisión auditada muestran total acuerdo; no hay variantes textuales ni tensiones léxicas o teológicas que resolver en esta línea.
  spanish_consistency_notes:
  - Se mantiene el orden enumerativo del hebreo y del texto inglés auditado.
  - Se usa «hijos» en lugar de una paráfrasis como «descendientes» para conservar la estructura genealógica literal.
  - Los nombres propios permanecen sin adaptación a formas castellanas tradicionales distintas, porque el expediente fuente no documenta tal excepción.
