  spanish_consistency_notes:
  - Se mantiene el trato directo narrativo con «Y Daniel les dijo».
  - 'Se conserva el paralelismo de dos acciones: separar a los acusados y luego examinarlos.'
  - Se evita un calco rígido como «separen a ellos de los otros» en favor de una construcción natural en español.
  - El tono es judicial y sobrio, acorde con la escena.
