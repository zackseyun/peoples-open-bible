translation:
  language: es
  text: Después de conferenciar con el rey[a], Apolonio le informó acerca del dinero que se le había reportado. Entonces el rey nombró a Heliodoro, el encargado de los asuntos del Estado[b], y lo envió con órdenes de llevar a cabo la retirada[c] del dinero antes mencionado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al reunirse con el rey» o «al entrevistarse con el rey». El participio griego sugiere una audiencia formal o una consulta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el que está sobre los asuntos», un título administrativo para un alto funcionario encargado de negocios de estado.
    reason: cultural_note
  - marker: c
    text: O «efectuar la remoción» o «llevarse el dinero antes mencionado». El griego subraya la ejecución de su salida del lugar donde estaba guardado.
    reason: lexical_alternative
lexical_decisions:
- source_word: συμμίξας
  english_pob_choice: After conferring with
  chosen_spanish: al entrevistarse con
  alternatives_spanish:
  - después de conferenciar con
  - al reunirse con
  - tras hablar con
  lexicon: LSJ
  rationale: El participio expresa un encuentro formal y deliberativo con el rey, no solo un contacto casual. «Al entrevistarse con» conserva ese matiz de audiencia oficial en un español natural y digno.
- source_word: ἐνεφάνισεν
  english_pob_choice: informed
  chosen_spanish: le informó
  alternatives_spanish:
  - le hizo saber
  - le dio a conocer
  - le comunicó
  lexicon: LSJ
  rationale: En el contexto administrativo, el verbo comunica información al rey sobre el dinero. «Le informó» es claro y adecuado sin añadir una carga interpretativa extra.
- source_word: μηνυθέντων
  english_pob_choice: had been reported
  chosen_spanish: se le había denunciado
  alternatives_spanish:
  - se le había informado
  - se le había dado noticia
  - se le había hecho saber
  lexicon: LSJ
  rationale: El pasivo apunta a dinero previamente puesto en conocimiento de Apolonio. «Se le había denunciado» mantiene la fuerza de algo notificado formalmente y deja abierta la posible tensión de si el informe tenía tono acusatorio o simplemente oficial.
- source_word: χρημάτων
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - fondos
  - caudales
  lexicon: LSJ
  rationale: Aquí se trata de una suma concreta de dinero vinculada al templo o al tesoro. «Dinero» es la opción más directa y precisa en español actual.
- source_word: προχειρισάμενος
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - escogió
  - puso a cargo
  lexicon: LSJ
  rationale: El rey hace una designación oficial para una misión concreta. «Nombró» comunica bien la elección formal en un registro administrativo.
- source_word: τὸν ἐπὶ τῶν πραγμάτων
  english_pob_choice: who was over the affairs of state
  chosen_spanish: el encargado de los asuntos
  alternatives_spanish:
  - el que estaba sobre los asuntos
  - el administrador de los asuntos
  - el oficial a cargo de los asuntos del Estado
  lexicon: LSJ
  rationale: La frase funciona como un título administrativo. «El encargado de los asuntos» conserva la idea de responsabilidad oficial sin forzar una terminología institucional más larga que el español puede volver pesada.
- source_word: ἐκκομιδὴν
  english_pob_choice: the removal
  chosen_spanish: la retirada
  alternatives_spanish:
  - la extracción
  - el traslado
  - la sustracción
  lexicon: LSJ
  rationale: El sustantivo indica sacar algo de su lugar. «La retirada» permite expresar el movimiento de sacar el dinero del sitio donde estaba, sin decidir demasiado si la acción es meramente transportarlo o llevarlo como despojo.
- source_word: ποιήσασθαι
  english_pob_choice: to carry out
  chosen_spanish: llevar a cabo
  alternatives_spanish:
  - efectuar
  - realizar
  - hacer
  lexicon: LSJ
  rationale: Con ἐκκομιδήν, el infinitivo forma una expresión idiomática de ejecutar la remoción. «Llevar a cabo» transmite bien esa idea de ejecución efectiva en español.
- source_word: προειρημένων
  english_pob_choice: aforementioned
  chosen_spanish: antes mencionado
  alternatives_spanish:
  - ya mencionado
  - susodicho
  - previamente citado
  lexicon: LSJ
  rationale: El participio remite al dinero ya citado antes. «Antes mencionado» refleja el tono formal de referencia retrospectiva sin sonar arcaizante.
theological_decisions:
- issue: 'El oficio de Heliodoro: traducción del título administrativo'
  english_pob_reading: who was over the affairs of state
  chosen_spanish_reading: el encargado de los asuntos
  alternative_spanish_readings:
  - el oficial a cargo de los asuntos del Estado
  - el administrador de los asuntos
  rationale: El pasaje presenta un cargo político/administrativo, no una función eclesiástica ni un título doctrinal. La traducción evita términos eclesiales y mantiene el sentido estatal del original.
  doctrine_reference: No aplica; decisión de registro y cargo administrativo.
- issue: Sentido de la orden sobre el dinero
  english_pob_reading: to carry out the removal of the aforementioned money
  chosen_spanish_reading: llevar a cabo la retirada del dinero antes mencionado
  alternative_spanish_readings:
  - efectuar la sustracción del dinero antes mencionado
  - realizar la extracción del dinero antes mencionado
  rationale: El griego deja abierta la precisión entre retirar, sacar o llevarse el dinero. La redacción española conserva esa amplitud sin imponer una interpretación más específica de la que exige el texto.
  doctrine_reference: No aplica; tensión lexical sobre el alcance de ἐκκομιδήν.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; se mantiene el acuerdo alto con la fuente griega. La presente redacción sigue ese estado estable y conserva las ambigüedades lexicales relevantes en español.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» sin intervenir aquí porque el versículo no contiene referencias divinas.
  - Se conserva un registro administrativo coherente con el contexto de corte y tesoro.
  - No se sustituye el cargo por terminología eclesiástica; se prefiere un equivalente estatal neutro.
  - «Antes mencionado» mantiene la referencia formal de προειρημένων sin añadir matiz peyorativo.
