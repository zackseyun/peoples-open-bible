translation:
  language: es
  text: 'Y Yahvé me dijo: «Levántate, ve delante del pueblo[a] para la marcha, para que entren y tomen posesión de la tierra que juré a sus padres[b] darles».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al frente del pueblo».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «sus padres», es decir, sus antepasados/ancestros.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton según el criterio del proyecto, evitando la sustitución por un título genérico.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me expresó
  lexicon: HALOT
  rationale: אמר en narración directa se rinde naturalmente con «dijo»; el dativo implícito en אֵלַי se expresa con «me».
- source_word: קוּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levantaos
  - Ponte en pie
  lexicon: HALOT
  rationale: El imperativo exige un llamado urgente a actuar; «levántate» comunica bien el inicio inmediato del movimiento sin sonar artificioso.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - ve de camino
  lexicon: HALOT
  rationale: הָלַךְ en imperativo se traduce de forma directa y natural con «ve» en este contexto de mandato.
- source_word: לְמַסַּע
  english_pob_choice: for the journey
  chosen_spanish: por el camino
  alternatives_spanish:
  - para la marcha
  - para el viaje
  lexicon: HALOT
  rationale: מַסַּע denota el desplazamiento o travesía; en español, «por el camino» conserva la idea de ir al frente en la marcha de tránsito con fluidez idiomática. Se evita una calca pesada como «para el viaje».
- source_word: לִפְנֵי הָעָם
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - ante el pueblo
  - al frente del pueblo
  lexicon: HALOT
  rationale: לִפְנֵי expresa ubicación espacial y liderazgo. «Delante del pueblo» comunica ambas ideas con naturalidad en español.
- source_word: וְיָבֹאוּ
  english_pob_choice: they may go in
  chosen_spanish: entren
  alternatives_spanish:
  - vayan adentro
  - puedan entrar
  lexicon: HALOT
  rationale: 'El valor de propósito/resultativo se expresa en español con subjuntivo: «para que entren».'
- source_word: וְיִרְשׁוּ
  english_pob_choice: take possession of
  chosen_spanish: tomen posesión de
  alternatives_spanish:
  - posean
  - hereden
  lexicon: HALOT
  rationale: ירשׁ aquí no se limita a «heredar»; la forma activa «tomen posesión de» preserva el sentido de ocupar y apropiarse de la tierra prometida.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Deuteronomio, הָאָרֶץ designa la tierra prometida; «la tierra» es el equivalente sobrio y fiel.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - prometí con juramento
  - hice juramento
  lexicon: HALOT
  rationale: Con sujeto divino, שׁבע conserva el lenguaje solemne del juramento; «juré» es breve y exacto.
- source_word: לַאֲבֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres/familiares
  lexicon: HALOT
  rationale: Se mantiene el término masculino/familiar del hebreo. En español, «padres» reproduce bien la referencia patriarcal histórica sin neutralizar el término.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give to them
  chosen_spanish: darles
  alternatives_spanish:
  - dársela
  - para dársela
  lexicon: HALOT
  rationale: 'La construcción infinitiva más pronombre se vuelve natural en español con enclítico: «darles», manteniendo el referente implícito de la tierra.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el principio del proyecto de no enmascarar el Tetragrámaton con un título. «Yahvé» conserva el nombre divino y es plenamente publicable en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לִפְנֵי הָעָם
  english_pob_reading: before the people
  chosen_spanish_reading: delante del pueblo
  alternative_spanish_readings:
  - al frente del pueblo
  - ante el pueblo
  rationale: La frase puede sugerir tanto posición espacial como función de liderazgo. «Delante del pueblo» preserva ambas sin decidir en exceso entre ellas.
  doctrine_reference: POB translation notes on spatial/leadership nuance
- issue: Sentido de וְיִרְשׁוּ אֶת הָאָרֶץ
  english_pob_reading: take possession of the land
  chosen_spanish_reading: tomen posesión de la tierra
  alternative_spanish_readings:
  - posean la tierra
  - hereden la tierra
  rationale: El verbo conserva fuerza activa y jurídica de ocupación/promesa cumplida. «Tomen posesión» evita reducirlo a mera herencia pasiva.
  doctrine_reference: Lexical note on ירשׁ in covenant inheritance contexts
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: la idea no es “ir en el viaje delante del pueblo”, sino “ir delante del pueblo por el camino”, reflejando con naturalidad el orden y el sentido del hebreo. En español se resolvió con «delante del pueblo por el camino» y se mantuvo el matiz de propósito con subjuntivo en «para que entren».'
  spanish_consistency_notes:
  - Se conserva Yahvé para יְהוָה, conforme al estándar del proyecto.
  - «Padres» refleja el hebreo אָבוֹת sin neutralización, manteniendo la referencia patriarcal.
  - Se prefirió «tomen posesión de» para ירשׁ por su fuerza activa y contextual.
  - 'Los marcadores de nota aparecen anclados exactamente en el texto: [a], [b], [c].'
