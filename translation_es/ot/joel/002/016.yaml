translation:
  language: es
  text: Reúnan al pueblo; consagren la asamblea; reúnan a los ancianos[a]; reúnan a los niños, incluso a los lactantes[b]. Que salga el novio de su aposento, y la novia de su cámara[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres mayores».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los que maman de los pechos».'
    reason: lexical_alternative
  - marker: c
    text: O «de su dosel nupcial»; el término hebreo puede referirse a un dosel de boda o a una cámara nupcial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְפוּ
  english_pob_choice: Gather
  chosen_spanish: Reúnan
  alternatives_spanish:
  - Junten
  - Reúnan juntos
  - Convocan
  lexicon: HALOT
  rationale: El imperativo plural de אסף pide una convocatoria directa y repetida. «Reúnan» suena natural en español y conserva el tono exhortativo de la serie de mandatos.
- source_word: עָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo entero
  - a la gente
  - a la comunidad
  lexicon: HALOT
  rationale: En este contexto no es un colectivo genérico, sino el pueblo convocado como comunidad del pacto. «Al pueblo» es breve, claro y fiel al sentido.
- source_word: קַדְּשׁוּ
  english_pob_choice: consecrate
  chosen_spanish: consagren
  alternatives_spanish:
  - santifiquen
  - aparten
  - dediquen
  lexicon: HALOT
  rationale: 'El piel imperativo tiene fuerza cultual: poner aparte para un acto sagrado. «Consagren» preserva ese valor religioso sin sonar excesivamente arcaico.'
- source_word: קָהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la reunión
  lexicon: HALOT
  rationale: קהל designa al grupo reunido. «Asamblea» mantiene el matiz de reunión solemne y comunitaria que exige el contexto.
- source_word: זְקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  - los viejos
  lexicon: HALOT
  rationale: Aunque puede aludir a una función de liderazgo, el hebreo también tiene el sentido literal de edad. Aquí se conserva «ancianos», que es fiel y comprensible en español.
- source_word: עוֹלָלִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeñitos
  - los pequeños
  - los infantes
  lexicon: HALOT
  rationale: El término apunta a niños muy pequeños, pero la frase siguiente ya especifica a los lactantes. «Los niños» mantiene la distinción interna sin duplicar la idea de bebés.
- source_word: יֹנְקֵי שָׁדָיִם
  english_pob_choice: the nursing infants
  chosen_spanish: los lactantes
  alternatives_spanish:
  - los que maman
  - los que aún maman
  - los bebés que maman
  lexicon: HALOT
  rationale: La expresión literalmente habla de los que maman los pechos. «Lactantes» comunica la idea de bebés alimentados al pecho de manera digna y natural en español; la nota conserva la literalidad.
- source_word: יֵצֵא
  english_pob_choice: Let ... come out
  chosen_spanish: Que salga
  alternatives_spanish:
  - Deje salir
  - Debe salir
  - Salga
  lexicon: HALOT
  rationale: El imperfecto/jusivo expresa exhortación. «Que salga» reproduce bien la fuerza volitiva en español y funciona de manera paralela con el resto de imperativos.
- source_word: חָתָן
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  - el esposo joven
  lexicon: HALOT
  rationale: En español actual «novio» es el equivalente más natural del desposado en un contexto nupcial. Evita un tono demasiado formal que «bridegroom» tendría en inglés.
- source_word: מֵחֶדְרוֹ
  english_pob_choice: from his room
  chosen_spanish: de su aposento
  alternatives_spanish:
  - de su habitación
  - de su cuarto
  - de su cámara
  lexicon: HALOT
  rationale: חדר es un espacio interior privado; «aposento» conserva mejor el matiz de recinto reservado que «habitación» en este contexto solemne.
- source_word: כַלָּה
  english_pob_choice: the bride
  chosen_spanish: la novia
  alternatives_spanish:
  - la desposada
  - la esposa
  lexicon: HALOT
  rationale: «Novia» es el correlato natural de «novio» en español y mantiene la pareja léxica del pasaje.
- source_word: מֵחֻפָּתָהּ
  english_pob_choice: from her chamber / from her canopy
  chosen_spanish: de su habitación
  alternatives_spanish:
  - de su cámara nupcial
  - de su dosel
  - de su pabellón nupcial
  lexicon: HALOT
  rationale: La POB inglesa revisada simplifica a «chamber» para no ampliar interpretativamente. En español se sigue esa decisión con «habitación», dejando la ambigüedad de חֻפָּה abierta entre dosel y cámara.
theological_decisions:
- issue: Carácter sagrado de la convocatoria
  english_pob_reading: Use 'consecrate the assembly' rather than a more secular phrase
  chosen_spanish_reading: consagren la asamblea
  alternative_spanish_readings:
  - santifiquen la asamblea
  - separen la asamblea
  - preparen la asamblea
  rationale: El mandato no es meramente administrativo; llama a una reunión solemne delante de Dios. «Consagren» conserva la fuerza cultual del hebreo sin introducir detalles rituales no presentes en el texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido social de זְקֵנִים
  english_pob_reading: Render as 'elders'
  chosen_spanish_reading: ancianos
  alternative_spanish_readings:
  - viejos
  - líderes
  - presbíteros
  rationale: El contexto enumera grupos representativos de toda la comunidad. «Ancianos» mantiene la posible carga de edad y honor sin imponer explícitamente un oficio eclesiástico posterior.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés: mantiene la serie repetida de imperativos con ‘reúnan’, evita añadir interpretaciones a ‘chamber’ y conserva la referencia cultual de ‘consecrate’. También toma en cuenta la decisión de no ampliar el último miembro a ‘cámara nupcial’ en el texto principal, dejando esa posibilidad en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene la distinción entre «niños» y «lactantes» para reflejar la progresión del hebreo.
  - «Novio/novia» ofrece una pareja léxica más natural en español que «bridegroom/bride» traducidos de manera más formal, sin perder el contexto nupcial.
