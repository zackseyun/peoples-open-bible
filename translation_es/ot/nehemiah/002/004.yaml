  text: 'Entonces el rey me dijo[a]: «¿Qué estás solicitando?» Entonces oré al Dios del cielo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué estás pidiendo?»'
