    reason: lexical_alternative
  - marker: b
    text: O «mis allegados» o «los que me son cercanos» para «mis parientes cercanos».
    reason: lexical_alternative
  - marker: c
    text: O «frente a mi aflicción».
    reason: alternative_reading
