translation:
  language: es
  text: Todos los censados del campamento de Dan fueron 157,600. Saldrán al final según sus estandartes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo sus banderas». El término hebreo se refiere a los estandartes tribales o a las agrupaciones organizadas en torno a ellos en la disposición del campamento de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Todo el conjunto de
  - La totalidad de
  lexicon: HALOT
  rationale: El hebreo introduce la totalidad del grupo censado; «Todos» comunica de forma natural y completa ese sentido cuantitativo.
- source_word: הַפְּקֻדִים
  english_pob_choice: those counted
  chosen_spanish: los contabilizados
  alternatives_spanish:
  - los contados
  - los censados
  - los registrados
  lexicon: HALOT
  rationale: La forma participial pasiva de פקד remite a los inscritos/contados en el censo. «Contabilizados» mantiene el valor de recuento y evita añadir «hombres» que el hebreo de este versículo no repite explícitamente.
- source_word: לְמַחֲנֵה
  english_pob_choice: for the camp of
  chosen_spanish: para el campamento de
  alternatives_spanish:
  - del campamento de
  - pertenecientes al campamento de
  - en el campamento de
  lexicon: HALOT
  rationale: La preposición expresa pertenencia o relación con la agrupación militar. «Para el campamento de» conserva la relación funcional del resumen censal y suena natural en español.
- source_word: מְאַת אֶלֶף וְשִׁבְעָה וַחֲמִשִּׁים אֶלֶף וְשֵׁשׁ מֵאוֹת
  english_pob_choice: 157,600
  chosen_spanish: 157,600
  alternatives_spanish:
  - ciento cincuenta y siete mil seiscientos
  lexicon: HALOT
  rationale: Es el total sumado del texto hebreo. Los números en cifras son claros y exactos en español moderno, sin perder la equivalencia numérica.
- source_word: לָאַחֲרֹנָה
  english_pob_choice: last
  chosen_spanish: al último
  alternatives_spanish:
  - en último lugar
  - de último
  - por la retaguardia
  lexicon: HALOT
  rationale: El adverbio indica orden de marcha. «Al último» es una forma natural y fiel para expresar que avanzarán en la cola del desplazamiento.
- source_word: יִסְעוּ
  english_pob_choice: shall set out
  chosen_spanish: saldrán
  alternatives_spanish:
  - partirán
  - se pondrán en marcha
  - harán marcha
  lexicon: HALOT
  rationale: En contextos del desierto, נסע se refiere a ponerse en camino o salir de campamento. «Saldrán» mantiene esa idea de desplazamiento sin sobrecargar la frase.
- source_word: לְדִגְלֵיהֶם
  english_pob_choice: by their standards
  chosen_spanish: por sus estandartes
  alternatives_spanish:
  - según sus estandartes
  - bajo sus banderas
  - de acuerdo con sus banderas
  lexicon: HALOT
  rationale: דגל alude a los estandartes tribales que organizaban el campamento. «Estandartes» preserva la imagen militar/campamental; la preposición «por» reproduce de manera idiomática el orden de salida asociado a esos distintivos.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del hebreo y el criterio inglés de claridad, pero ajusta la sintaxis para un español publicable: se evita el calco de la estructura inglesa, se mantiene el valor censal de הַפְּקֻדִים y se conserva la imagen de los estandartes tribales sin sustituirla por lenguaje eclesiástico tradicional.'
  spanish_consistency_notes:
  - Se usa «campamento» para el grupo militar-tribal de Dan, en coherencia con el contexto del desierto.
  - Se conserva la cifra en formato moderno para máxima legibilidad.
  - «Estandartes» mantiene la referencia a las insignias tribales; no se ha optado por «banderas» para conservar un registro más bíblico y militar.
  - No hay notas de pie porque el español elegido no introduce una ambigüedad adicional que requiera explicación textual.
