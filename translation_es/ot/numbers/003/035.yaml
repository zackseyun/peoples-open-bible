revisions:
- from: Y el jefe de la casa paterna de las familias de Merari era Zuriel hijo de Abihail[a][b]. Acamparán al lado norte del tabernáculo.
  to: Y el jefe[a] de la casa paterna[b] de los clanes de Merari era Zuriel hijo de Abihail. Debían acampar en el lado norte del tabernáculo.
  rationale: 'La revisión ajusta el texto al valor organizativo del hebreo y a la auditoría del POB: ''clanes'' preserva mejor מִשְׁפָּחוֹת en Números; ''debían acampar'' comunica la disposición prescrita de יַחֲנוּ; ''en el lado norte'' mejora la naturalidad locativa en español. También se reordenan las notas para que sus marcadores sigan el punto exacto de anclaje en el texto.'
  reviewer_model: gpt-5.4
