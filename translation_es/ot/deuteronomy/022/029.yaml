    reason: lexical_alternative
  - marker: b
    text: «Despedirla» se refiere a desecharla o divorciarse de ella.
    reason: lexical_alternative
  revision_rationale: Se revisa 'la humilló' a 'la violó[a]' para preservar mejor la gravedad sexual contextual que el audit trail inglés quiso comunicar con 'has violated her', dejando la alternativa más literal en nota. Se explicita 'al padre de la joven' por mayor precisión legal. Se cambia 'por cuanto' a 'porque' por claridad moderna sin pérdida causal. Se ajusta 'en todos sus días' a 'todos sus días' por mejor español. Se añade nota a 'despedirla[b]' para conservar la alternativa interpretativa documentada por el inglés.
