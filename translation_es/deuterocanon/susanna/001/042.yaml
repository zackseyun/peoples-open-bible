translation:
  language: es
  text: 'Y Susana clamó a gran voz y dijo: «Oh Dios eterno, conocedor de lo oculto[a], tú que conoces todas las cosas antes de que lleguen a ser[b]»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «conocedor de secretos» para «conocedor de lo oculto».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «antes de su existencia» o «antes de que sucedan». El griego puede referirse ampliamente a las cosas antes de venir a la existencia.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνεβόησεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: LSJ
  rationale: El verbo expresa una súbita e intensa alzada de voz. En español, «exclamó» comunica bien la fuerza del grito en un contexto de oración sin sonar demasiado coloquial; «clamó» y «gritó» son posibles, pero «exclamó» resulta más natural y digno aquí.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: a gran voz
  alternatives_spanish:
  - con voz fuerte
  - en voz alta
  lexicon: LSJ
  rationale: La expresión griega es idiomática. «A gran voz» es una fórmula española natural y reverente que conserva la concreción de la voz audible, equivalente al valor de «with a loud voice».
- source_word: Ὁ θεὸς ὁ αἰώνιος
  english_pob_choice: O eternal God
  chosen_spanish: Oh Dios eterno
  alternatives_spanish:
  - Oh Dios perpetuo
  - Dios eterno
  lexicon: LSJ
  rationale: El nominativo funciona como invocación. «Oh Dios eterno» reproduce el tono orante y preserva αἰώνιος como «eterno»; se evita «SEÑOR» porque el griego aquí dice θεός, no κύριος.
- source_word: ὁ τῶν κρυπτῶν γνώστης
  english_pob_choice: knower of hidden things
  chosen_spanish: conocedor de lo oculto
  alternatives_spanish:
  - conocedor de secretos
  - el que conoce lo oculto
  lexicon: LSJ
  rationale: κρυπτά puede abarcar cosas ocultas, no solo «secretos» en sentido estrecho. «Conocedor de lo oculto» mantiene la amplitud del griego y suena natural en español, sin perder la idea de conocimiento total de lo escondido.
- source_word: ὁ εἰδὼς τὰ πάντα
  english_pob_choice: who knows all things
  chosen_spanish: tú que conoces todas las cosas
  alternatives_spanish:
  - que sabes todo
  - tú que sabes todas las cosas
  lexicon: LSJ
  rationale: La construcción participial se vuelve con naturalidad en una relativa vocativa en español. «Todas las cosas» conserva la amplitud de τὰ πάντα y mantiene el tono de invocación.
- source_word: πρὶν γενέσεως αὐτῶν
  english_pob_choice: before they come to be
  chosen_spanish: antes de que lleguen a ser
  alternatives_spanish:
  - antes de su existencia
  - antes de que sucedan
  lexicon: LSJ
  rationale: La frase puede referirse tanto a existir como a llegar a ocurrir. «Antes de que lleguen a ser» conserva esa amplitud sin fijar innecesariamente una sola acepción.
theological_decisions:
- issue: Preservación de la afirmación de la presciencia divina sin resolverla dogmáticamente
  english_pob_reading: before they come to be
  chosen_spanish_reading: antes de que lleguen a ser
  alternative_spanish_readings:
  - antes de su existencia
  - antes de que sucedan
  rationale: El griego afirma que Dios conoce todas las cosas antes de su surgimiento. La traducción conserva esa afirmación de presciencia divina sin añadir formulaciones doctrinales más desarrolladas que el versículo mismo no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El inglés POB revisado eliminó el artículo en «hidden things» para reflejar mejor τῶν κρυπτῶν. La presente versión española sigue esa misma línea al usar «lo oculto», que evita un plural demasiado concreto y conserva la amplitud del griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «SEÑOR», porque el texto fuente no usa κύριος.
  - Se elige un registro reverente y bíblico, pero con sintaxis española natural.
  - Se conserva la amplitud semántica de κρυπτά y de πρὶν γενέσεως αὐτῶν sin estrecharlas en exceso.
  - La invocación directa se marca con «Oh» para reproducir el tono de oración.
