revisions:
- from: Entonces Saúl se levantó y descendió al desierto de Zif, y con él iban tres mil hombres escogidos de Israel, para buscar a David en el desierto de Zif.
  to: Entonces Saúl se levantó y bajó al desierto de Zif, y con él estaban tres mil hombres escogidos de Israel, para buscar a David en el desierto de Zif.
  rationale: Se ajusta la cláusula de acompañamiento para reflejar mejor וְאִתּוֹ y la revisión ya documentada en el POB inglés, y se reemplaza «descendió» por «bajó» para una dicción española más natural sin pérdida de sentido. No se requieren notas al pie.
