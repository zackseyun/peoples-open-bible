translation:
  language: es
  text: 'Que los cielos se alegren, y que la tierra se alegre; y que digan entre las naciones: «¡Yahvé[a] reina!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé reina». El hebreo usa explícitamente el nombre divino «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂמְחוּ
  english_pob_choice: Let ... rejoice
  chosen_spanish: Que ... se alegren
  alternatives_spanish:
  - que ... se regocijen
  - que ... se gocen
  lexicon: HALOT
  rationale: El imperfecto qal plural de שׂמח en este contexto poético funciona con fuerza volitiva. En español, «Que ... se alegren» conserva bien el llamado exhortativo y el paralelo con la segunda cláusula.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: En poesía de alabanza, שׁמים designa el ámbito celeste. «Los cielos» preserva el plural y el tono elevado; «el cielo» reduciría indebidamente esa forma y matiz.
- source_word: וְתָגֵל
  english_pob_choice: and let ... be glad
  chosen_spanish: y que ... se goce
  alternatives_spanish:
  - y que ... se alegre
  - y que ... exulte
  lexicon: HALOT
  rationale: גיל expresa alegría/exultación. «Se goce» mantiene la fuerza volitiva y evita repetir exactamente «se alegren», respetando el paralelismo poético.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En paralelo con «los cielos», ארץ se refiere al ámbito cósmico. «La tierra» es la equivalencia natural en español y evita el sentido más localizado de «país» o «tierra» como territorio.
- source_word: וְיֹאמְרוּ
  english_pob_choice: and let them say
  chosen_spanish: y que digan
  alternatives_spanish:
  - y digan
  - y que ellos digan
  lexicon: HALOT
  rationale: El imperfecto continúa la secuencia volitiva. En español, «y que digan» reproduce la invitación exhortativa sin añadir información innecesaria.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre las naciones
  - en las naciones
  - entre los pueblos
  lexicon: HALOT
  rationale: גוֹיִם aquí se refiere a las naciones del mundo en una proclamación pública. «Entre las naciones» es idiomático y conserva el sentido de difusión entre los pueblos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino «Yahvé», conforme al criterio del proyecto para mantener visible el nombre personal de Dios y no sustituirlo por un título.
- source_word: מָלָךְ
  english_pob_choice: reigns
  chosen_spanish: reina
  alternatives_spanish:
  - reina
  - ha llegado a ser rey
  - ha reinado
  lexicon: HALOT
  rationale: El perfecto de מלך en fórmulas de entronización puede expresar realeza vigente. «Reina» es la forma más natural en español para proclamar esa realidad presente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se conserva el nombre divino en lugar de ocultarlo con una sustitución titulada. En español, «Yahvé» es la forma adoptada para el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado ya fue revisado sin cambios y mantiene acuerdo alto con el original; el español sigue esa lectura volitiva poética, conserva el nombre divino en forma visible y evita un calco mecánico al ajustar la sintaxis a un imperativo exhortativo natural en español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético con dos cláusulas volitivas y una proclamación final.
  - «Yahvé» se usa de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - «Los cielos» conserva el plural hebreo y el registro elevado del pasaje.
  - «Entre las naciones» respeta el sentido público y universal de בַגּוֹיִם.
