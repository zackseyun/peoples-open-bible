review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en los puntos principales: conserva el vocativo recurrente בֶּן־אָדָם, traduce צֹפֶה con un término de vigilancia, mantiene la coordinación de וְשָׁמַעְתָּ ... וְהִזְהַרְתָּ, y preserva la imagen concreta «de mi boca». Sin embargo, hay dos desajustes importantes con la evidencia fuente y la documentación POB: (1) la nota b está mal anclada y mal formulada, porque repite exactamente el texto principal como si fuera una alternativa, cuando en el inglés esa nota explica una formulación más formal/alternativa; (2) «de parte mía» para מִמֶּנִּי introduce un matiz representacional más interpretativo que el directo «de mí / de mi parte» documentado por el inglés, y puede suavizar el origen inmediato de la advertencia.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero necesita una reparación menor. «Atalaya» funciona bien en registro bíblico; «te he puesto» y «oirás una palabra de mi boca» son naturales. El punto más mejorable es «los amonestarás de parte mía»: suena aceptable, pero «les advertirás de mi parte» o «los advertirás de mi parte» representa mejor el sentido de advertencia y la fuente divina sin sonar forzado. Además, la presencia de la nota [b] en «Israel[b]» es engañosa porque la nota no comenta «casa de Israel» sino la segunda cláusula.'
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores. No aparece Yahvé. El tratamiento de «Hijo de hombre» es coherente con la decisión documentada. «Atalaya» es aceptable para צֹפֶה. La principal corrección es semántica y paratextual: ajustar וְהִזְהַרְתָּ / מִמֶּנִּי a una formulación española más fiel y reubicar la nota b al segmento correcto.'
  issues:
  - severity: high
    issue: La nota [b] está mal anclada y no refleja una alternativa real.
    rationale: En el texto español [b] aparece tras «Israel», pero su contenido se refiere a la cláusula «y oirás...». Además, la nota repite exactamente la redacción principal, por lo que no aporta la alternativa documentada en el expediente inglés.
  - severity: medium
    issue: «de parte mía» para מִמֶּנִּי es demasiado interpretativo.
    rationale: El hebreo y el inglés auditado mantienen el origen directo de la advertencia («from me»). «De parte mía» puede entenderse como mera representación; «de mi parte» o incluso «de mí» conserva mejor la procedencia inmediata con español natural.
  - severity: medium
    issue: «amonestarás» es posible, pero «advertirás» refleja mejor la función de צֹפֶה/הִזְהַרְתָּ en este contexto.
    rationale: El contexto de atalaya enfatiza aviso de peligro. «Amonestar» puede inclinarse hacia reprensión moral; «advertir» enlaza mejor con la imagen de vigilancia y aviso.
  - severity: low
    issue: 'Hay un error evidente en los metadatos léxicos: «te he nombrado» aparece corrupto como «te he नियुक्तado».'
    rationale: No afecta directamente el texto bíblico, pero muestra descuido editorial y conviene corregirlo en la base de datos.
  revised_spanish_text: Hijo de hombre[a], te he puesto como atalaya para la casa de Israel; y oirás una palabra de mi boca y los advertirás de mi parte[b].
  revised_footnotes:
  - marker: a
    text: O «Mortal» o «Ser humano» para «Hijo de hombre». El hebreo es un modismo recurrente de tratamiento a Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: Más formalmente, «y oirás una palabra de mi boca y los advertirás de mi parte».
    reason: alternative_reading
  revision_rationale: Se corrige el principal problema paratextual reubicando la nota b al segmento pertinente y reformulándola para que funcione como nota real. También se ajusta «amonestarás de parte mía» a «advertirás de mi parte», que refleja mejor la función de advertencia del contexto y el valor de מִמֶּנִּי sin sobreinterpretar. El resto del versículo puede mantenerse.
