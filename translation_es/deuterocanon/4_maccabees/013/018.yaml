review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: Jacob como patriarca, «los padres», la alabanza futura, la exhortación de los hermanos restantes y el matiz testimonial de ψεύσῃ. Sin embargo, dos giros españoles no preservan bien la forma y el flujo del original: «en cada uno de sus hermanos que era llevado aparte» es poco natural y además «aparte» no está bien justificado por ἀποσπωμένων en esta revisión; y «resultes falso para con» suena forzado en español.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero necesita pulido para sonar natural en español eclesial moderno. «Jacob te recibirá» es aceptable, aunque «te dará la bienvenida» habría reflejado mejor el matiz honorífico; no obstante, no es obligatorio cambiarlo. Sí conviene rehacer la cláusula distributiva y la expresión con «ψεύσῃ» para evitar español torpe.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. «Jacob», «Dios» no figuran problemáticamente. «Los padres» respeta bien la decisión auditada frente a opciones más interpretativas como «antepasados» o «patriarcas».
  issues:
  - severity: medium
    issue: «en cada uno de sus hermanos que era llevado aparte» es un giro poco idiomático
    rationale: 'ἐνὶ ἑκάστῳ funciona distributivamente: «a medida que» o «cada vez que» cada hermano era llevado. La redacción actual suena calcada y difícil de entender.'
  - severity: medium
    issue: «era llevado aparte» no refleja de manera óptima la revisión inglesa «was being taken away»
    rationale: ἀποσπωμένων puede implicar separación forzosa, pero «aparte» añade un matiz espacial innecesario y produce una frase menos natural. «Se llevaban» o «era llevado» basta mejor aquí.
  - severity: medium
    issue: «ni resultes falso para con los que murieron antes que nosotros» es poco natural en español
    rationale: Aunque intenta conservar la tensión de ψεύσῃ, la construcción «resultar falso para con» no es idiomática. Puede mantenerse el matiz testimonial con «ni les falles» o «ni seas falso a»; la primera es mucho más natural.
  revised_spanish_text: 'Y Jacob[a] te recibirá, y todos los padres te alabarán. Y a medida que se llevaban a cada uno de sus hermanos, los que quedaban decían: «No nos avergüences, hermano[b], ni les falles a los que murieron antes que nosotros».'
  revised_footnotes:
  - marker: a
    text: O «te acogerá» o «te dará la bienvenida» para «te recibirá».
    reason: lexical_alternative
  - marker: b
    text: O «ni hagas falsos a los que murieron antes que nosotros», es decir, no traiciones el testimonio de los hermanos que ya han muerto.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula distributiva para reflejar con naturalidad ἐνὶ ἑκάστῳ τῶν ἀποσπωμένων y se elimina «aparte», que sonaba innecesariamente calcado. También se reemplaza «resultes falso para con» por «les falles», que preserva el sentido testimonial de ψεύσῃ en un español claro y digno. Se mantienen «Jacob», «los padres» y la nota léxica sobre la alternativa más literal.
