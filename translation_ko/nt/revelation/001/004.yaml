id: REV.1.4
reference: 'Revelation 1:4'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἰωάννης ταῖς ἑπτὰ ἐκκλησίαις ταῖς ἐν τῇ Ἀσίᾳ· χάρις ὑμῖν καὶ εἰρήνη ⸀ἀπὸ ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος, καὶ ἀπὸ τῶν ἑπτὰ πνευμάτων ἃ ἐνώπιον τοῦ θρόνου αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/004.yaml
  text: 'John, to the seven churches in Asia: Grace to you and peace from him who is, and who was, and who is coming, and from the seven spirits who are before his throne,'
  footnotes:
  - marker: a
    text: Or, more traditionally, 'from the one who is and who was and who is to come.'
    reason: lexical_alternative
  - marker: b
    text: '''The seven spirits'' may refer symbolically to the fullness of the Holy Spirit, or to seven heavenly spirits; the Greek text itself reads ''seven spirits.'''
    reason: alternative_reading
translation:
  language: ko
  text: '요한이 아시아에 있는 일곱 회중에게 편지합니다. 이제도 계시고 전에도 계셨으며 장차 오실 분[a]께로부터, 그리고 그분의 보좌 앞에 있는 일곱 영[b]께로부터, 은혜와 평강이 여러분에게 있기를 빕니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '이 칭호는 출애굽기 3:14의 신적 이름의 헬라어적 풀이로 읽혀 온 신적 자기 호칭이다. 어순과 운율을 보존하기 위해 「이제도 계시고 전에도 계셨으며 장차 오실 분」으로 옮긴다.'
    reason: lexical_alternative
  - marker: b
    text: '「일곱 영」은 거룩하신 영의 충만함을 상징적으로 가리키는 것으로 보는 견해와, 일곱 천상의 영으로 보는 견해가 있다. 본문은 「일곱 영」이라고 쓴다.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκκλησίαις
  english_pob_choice: churches
  chosen_korean: 회중
  alternatives_korean:
  - 교회
  lexicon: BDAG
  rationale: '1세기 신자들의 모인 공동체를 가리키며, 후대 제도교회의 무게를 피해 「회중」을 채택.'
- source_word: ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος
  english_pob_choice: him who is, and who was, and who is coming
  chosen_korean: 이제도 계시고 전에도 계셨으며 장차 오실 분
  alternatives_korean:
  - 전에 계셨고 지금 계시고 장차 오실 자
  lexicon: BDAG
  rationale: '출 3:14의 신적 이름의 풀이로, 운율과 신적 칭호의 무게를 살리는 정형 표현을 채택. 본 번역의 1:4, 1:8, 4:8에서 일관되게 사용한다.'
theological_decisions:
- issue: 삼중 분사구 ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος를 신적 이름으로 인식하는 정형 운율 보존
  chosen_reading: 이제도 계시고 전에도 계셨으며 장차 오실 분
  alternative_readings:
  - 계시고 계셨고 오실 자
  rationale: '이 칭호는 출 3:14(에흐예 아셰르 에흐예) 및 LXX의 「ὁ ὤν」을 종말론적으로 확장한 신적 자기 호칭이다. 음역적 평이함을 피하고, 한국어 운율과 신적 칭호의 무게가 살아나는 정형으로 옮긴다.'
  doctrine_reference: 'DOCTRINE.md: divine names/titles 보존 원칙'
