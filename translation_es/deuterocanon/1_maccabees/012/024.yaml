  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido general del griego: Jonatán recibe la noticia de que los jefes/comandantes de Demetrio han regresado con una fuerza mayor con el propósito de hacer guerra contra él. Sin embargo, «jefes» debilita el matiz militar de οἱ ἄρχοντες Δημητρίου en este contexto, donde la evidencia y la auditoría inglesa favorecen claramente «comandantes».'
  spanish_quality_summary: El español es claro y natural, pero «Jonathan» debe adaptarse al uso español bíblico como «Jonatán». Además, «hacer guerra contra él» es fiel, aunque «hacer la guerra contra él» suena algo más idiomático; no obstante, la forma actual es aceptable. La principal mejora necesaria es terminológica y de nombre propio.
  glossary_alignment: No hay términos teológicos especiales en este versículo. Sí conviene alinear el antropónimo con el español bíblico estándar («Jonatán») y reflejar mejor el valor contextual militar de ἄρχοντες con «comandantes», en sintonía con la decisión documentada en inglés.
  issues:
  - severity: medium
    issue: Uso de «Jonathan» en lugar de «Jonatán»
    rationale: La traducción meta es español neutral y eclesialmente legible; «Jonatán» es la forma española establecida del nombre Ἰωναθάν.
  - severity: medium
    issue: «los jefes de Demetrio» es demasiado general para οἱ ἄρχοντες Δημητρίου en contexto militar
    rationale: Dado que vienen «con una fuerza mucho mayor ... para hacer guerra», el contexto exige un término de mando militar. «Comandantes» preserva mejor la función contextual que «jefes».
  revised_spanish_text: Y Jonatán oyó que los comandantes de Demetrio habían regresado con una fuerza mucho mayor que antes, para hacer guerra contra él.
  revision_rationale: Se corrige el nombre propio a la forma española normal «Jonatán» y se ajusta «jefes» a «comandantes» para reflejar mejor el sentido militar contextual de ἄρχοντες, conforme a la evidencia fuente y la auditoría inglesa. No se requieren notas.
