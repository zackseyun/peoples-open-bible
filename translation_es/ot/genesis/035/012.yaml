translation:
  language: es
  text: Y la tierra que di a Abraham y a Isaac[a] te la daré; y a tu descendencia[b] después de ti daré la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he dado» a Abraham y a Isaac.'
    reason: lexical_alternative
  - marker: b
    text: «Descendencia» traduce un singular colectivo que también puede verterse «simiente» o «descendientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En este contexto de promesa pactal a los patriarcas, אֶרֶץ se entiende mejor como 'tierra'. 'La tierra prometida' explicita una implicación contextual, pero añade más de lo que dice el hebreo.
- source_word: נָתַתִּי
  english_pob_choice: I gave
  chosen_spanish: di
  alternatives_spanish:
  - he dado
  lexicon: HALOT
  rationale: El qatal puede reflejar una acción pasada ya otorgada. 'Di' conserva la tensión temporal que el POB inglés preserva entre el don previo a Abraham e Isaac y la futura entrega a Jacob.
- source_word: לְאַבְרָהָם וּלְיִצְחָק
  english_pob_choice: to Abraham and to Isaac
  chosen_spanish: a Abraham y a Isaac
  alternatives_spanish:
  - a Abraham e Isaac
  lexicon: HALOT
  rationale: Se conserva la repetición de la preposición con valor formal y enfático, de modo natural en español.
- source_word: לְךָ אֶתְּנֶנָּה
  english_pob_choice: I will give to you
  chosen_spanish: te la daré
  alternatives_spanish:
  - te la entregaré
  - la daré a ti
  lexicon: HALOT
  rationale: El sufijo de 3ª femenina singular remite a 'la tierra'. En español, 'te la daré' es natural y mantiene el objeto explícito y la dirección personal del don.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  lexicon: HALOT
  rationale: '''Descendencia'' conserva bien el sentido colectivo singular del sustantivo hebreo y es más idiomático en español que ''simiente'', sin perder la referencia genealógica/pactual.'
- source_word: אַחֲרֶיךָ
  english_pob_choice: after you
  chosen_spanish: después de ti
  alternatives_spanish:
  - tras de ti
  - posteriormente a ti
  lexicon: HALOT
  rationale: '''Después de ti'' expresa de manera directa la posteridad temporal, manteniendo la sencillez del hebreo.'
- source_word: אֶתֵּן אֶת הָאָרֶץ
  english_pob_choice: I will give the land
  chosen_spanish: daré la tierra
  alternatives_spanish:
  - daré esta tierra
  - la tierra la daré
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo de dar y el sustantivo 'tierra' para no suavizar la reiteración promesal del hebreo.
theological_decisions:
- issue: Tensión entre el don pasado a los patriarcas y la promesa futura a Jacob
  english_pob_reading: Render נָתַתִּי as past ('I gave') and the following verbs as future ('I will give'), preserving the text's tension between prior divine grant and future realization.
  chosen_spanish_reading: Traducir נָתַתִּי como pasado ('di') y los verbos siguientes como futuro ('te la daré', 'daré'), manteniendo la tensión entre el don previo y su cumplimiento renovado.
  alternative_spanish_readings:
  - '''he dado'' para enfatizar la vigencia continua de la promesa'
  - '''ya di'' para subrayar el carácter irrevocable del don'
  rationale: El hebreo yuxtapone un don anterior con una nueva promesa. No conviene resolver esa tensión en español; la traducción debe dejar visible que Dios ya había otorgado la promesa a Abraham e Isaac y ahora la reafirma para Jacob y su descendencia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el presente borrador conserva la estructura de promesa doble del hebreo, con pasado para el don a los patriarcas y futuro para Jacob y su descendencia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque el texto no contiene el nombre divino explícito en esta cláusula.
  - Se evita 'SEÑOR' por coherencia con el proyecto cuando no hay máscara del nombre divino en el texto fuente.
  - '''Tierra'' se usa de forma uniforme para אֶרֶץ, sin introducir ''país'' ni ''territorio''.'
  - '''Descendencia'' se usa como equivalente colectivo singular de זֶרַע, preservando la amplitud genealógica y pactal.'
