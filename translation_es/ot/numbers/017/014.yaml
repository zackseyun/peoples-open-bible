translation:
  language: es
  text: Ahora, los que murieron en la plaga fueron catorce mil setecientos[a], además de los que murieron por causa de Coré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa de Coré»; la frase hebrea puede referirse a los que ya habían muerto en relación con la rebelión de Coré.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: Now ... were
  chosen_spanish: Ahora ... fueron
  alternatives_spanish:
  - Y ... fueron
  lexicon: HALOT
  rationale: El waw-consecutivo introduce el resultado narrativo y la cifra final; «Ahora» mantiene la progresión del relato con naturalidad en español, sin perder el valor secuencial.
- source_word: הַמֵּתִים
  english_pob_choice: those who died
  chosen_spanish: los que murieron
  alternatives_spanish:
  - los muertos
  lexicon: HALOT
  rationale: El participio sustantivado de מות puede ser «los muertos» o «los que murieron». Aquí se prefiere la forma verbal en español porque acompaña con más claridad el recuento de víctimas.
- source_word: בַּמַּגֵּפָה
  english_pob_choice: in the plague
  chosen_spanish: en la plaga
  alternatives_spanish:
  - por la plaga
  - durante la plaga
  lexicon: HALOT
  rationale: La preposición hebrea señala el marco de la muerte; «en la plaga» es directo y conserva la referencia a un azote devastador enviado por Dios.
- source_word: אַרְבָּעָה עָשָׂר אֶלֶף וּשְׁבַע מֵאוֹת
  english_pob_choice: fourteen thousand seven hundred
  chosen_spanish: catorce mil setecientos
  alternatives_spanish:
  - catorce mil setecientas
  lexicon: HALOT
  rationale: Es la equivalencia cardinal estándar en español. Se mantiene el valor numérico exacto sin añadir ni ajustar nada.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - sin contar
  lexicon: HALOT
  rationale: מִלְּבַד excluye del total a otro grupo ya mencionado; «además de» comunica bien la suma aparte y suena natural en español bíblico moderno.
- source_word: עַל דְּבַר קֹרַח
  english_pob_choice: on account of Korah
  chosen_spanish: por causa de Coré
  alternatives_spanish:
  - a causa de Coré
  - en relación con Coré
  - en el asunto de Coré
  lexicon: HALOT
  rationale: La expresión puede apuntar a la conexión con la rebelión de Coré sin especificar más de lo que el hebreo dice. «Por causa de Coré» conserva la relación causal/general, dejando abierta la referencia histórica implícita.
theological_decisions:
- issue: Alcance de las muertes vinculadas con Coré
  english_pob_reading: The verse distinguishes plague victims from the earlier deaths connected with Korah's rebellion without specifying further categories in the main text.
  chosen_spanish_reading: El texto distingue a los muertos en la plaga de los que murieron por causa de Coré, sin precisar en la línea principal otras categorías.
  alternative_spanish_readings:
  - los que murieron en el asunto de Coré
  - los que murieron a causa de Coré
  rationale: 'Se conserva la tensión del hebreo: hay una cifra de muertos en la plaga y además otro grupo asociado con Coré. No se resuelve ni se expande la referencia más allá del texto fuente.'
  doctrine_reference: Primacía del texto original; mantener la distinción semántica sin armonizarla indebidamente.
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó «because of Korah» por «on account of Korah» para reflejar con más precisión עַל דְּבַר קֹרַח. La redacción española sigue esa misma cautela semántica con «por causa de Coré», evitando una paráfrasis más fuerte que el hebreo no exige.
  spanish_consistency_notes:
  - Se usa «Coré» para el nombre propio, forma habitual en español bíblico.
  - Se evita «SEÑOR» u այլ sustituciones porque el versículo no contiene el Nombre divino.
  - Se mantiene «plaga» como término técnico narrativo, no como «aflicción», para conservar la referencia del contexto inmediato.
  - La nota al pie preserva la ambigüedad lexical del hebreo sin resolverla en el cuerpo principal.
