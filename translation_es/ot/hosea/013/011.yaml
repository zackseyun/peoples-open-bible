    rationale: 'La POB inglesa documenta como alternativa: «I give ... and I take him away ...». La nota española solo menciona «te doy un rey en mi ira», por lo que pierde parte del dato auditado.'
  revised_spanish_text: Te di un rey en mi ira[a], y lo quité en mi furor[b].
