translation:
  language: es
  text: al que extendió la tierra sobre las aguas[a], porque su amor leal permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al que tendió la tierra sobre las aguas»; el verbo hebreo también puede llevar el sentido concreto de «batir» o «forjar», como al aplanar metal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/רֹקַע
  english_pob_choice: to him who spread out
  chosen_spanish: al que extendió
  alternatives_spanish:
  - al que desplegó
  - al que tendió
  - al que batió
  lexicon: HALOT
  rationale: El participio con לְ introduce al destinatario de la alabanza (“al que…”). En español, “extendió” comunica de manera natural la imagen de colocar o expandir una superficie amplia, sin perder la fuerza pictórica del verbo hebreo en contexto de creación. “Batió” conserva el sentido más concreto de forjar o golpear una lámina, pero suena menos idiomático aquí.
- source_word: הָ/אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  - el suelo
  lexicon: HALOT
  rationale: En un contexto cósmico con “sobre las aguas”, אֶרֶץ se refiere a la tierra como totalidad, no a una tierra particular. “La tierra” es la forma más natural y fiel en español.
- source_word: עַל הַ/מָּיִם
  english_pob_choice: upon the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - sobre las aguas
  - encima de las aguas
  - sobre el agua
  lexicon: HALOT
  rationale: עַל expresa posición sobre/encima de. “Sobre las aguas” conserva la imaginería poética y el plural hebreo, que en español mantiene mejor la amplitud cosmológica del pasaje.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  - ya que
  lexicon: HALOT
  rationale: En este estribillo, כִּי introduce la razón de la alabanza. “Porque” es la equivalencia natural en español y mantiene la relación lógica del refrán.
- source_word: לְ/עוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para siempre
  lexicon: HALOT
  rationale: El hebreo expresa duración perpetua; en este refrán, el español puede dejar implícito el verbo como hace el original. “Para siempre” conserva la fórmula litúrgica y la concisión poética.
- source_word: חַסְדּֽ/וֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su amor fiel
  lexicon: HALOT
  rationale: חֶסֶד es un término de pacto con matiz de lealtad, amor y fidelidad. “Amor leal” preserva esa tensión sin reducirlo a mera emoción ni a una sola categoría teológica tradicional. “Misericordia” sería demasiado estrecho en este contexto.
theological_decisions:
- issue: Imagen cosmológica de creación
  english_pob_reading: Retain the poetic description 'spread out the earth upon the waters' without attempting to harmonize it with modern scientific categories.
  chosen_spanish_reading: 'Mantener la imagen poética: «extendió la tierra sobre las aguas», sin volverla una paráfrasis abstracta ni armonizarla con categorías científicas modernas.'
  alternative_spanish_readings:
  - fundó la tierra
  - puso la tierra sobre las aguas
  rationale: El versículo usa lenguaje poético antiguo sobre la creación. La traducción debe conservar esa imaginería, no suavizarla con una explicación interpretativa que el hebreo no exige.
  doctrine_reference: Primacía del texto original; no parafrasear más allá de lo que el texto fuente autoriza.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo entre revisores fue alto y estable, por lo que no se requieren ajustes al criterio de traducción.
  spanish_consistency_notes:
  - Conservo «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - He usado «amor leal» para חֶסֶד de modo consistente con el valor de pacto ya documentado en el audit trail.
  - He mantenido un registro poético y bíblico natural en español, evitando tanto el calco rígido como la paráfrasis doctrinal.
