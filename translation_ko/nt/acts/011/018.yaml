id: ACT.11.18
reference: Acts 11:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀκούσαντες δὲ ταῦτα ἡσύχασαν καὶ ⸀ἐδόξασαν τὸν θεὸν λέγοντες· ⸀Ἄρα καὶ τοῖς ἔθνεσιν ὁ θεὸς τὴν μετάνοιαν ⸂εἰς ζωὴν ἔδωκεν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/acts/011/018.yaml
  text: When they heard these things[a], they became quiet and glorified God, saying[b], “Then God has also granted to the Gentiles the change of mind that leads to life.”
  footnotes:
  - marker: a
    text: Or 'the nations.' Here ἔθνεσιν refers to non-Jews, so 'Gentiles' best fits the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'repentance unto life' or 'repentance for life.' The Greek phrase εἰς ζωήν expresses movement toward or result in life.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들이 이 말을 듣고 잠잠해진 뒤에 하나님을 영화롭게 하며 말하였습니다. 「그러면 하나님께서 이방인들에게도 생명에 이르는 회개를 주셨구나.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 이방인 포용에 대한 교회의 반응
  chosen_reading: 그러면 하나님께서 이방인들에게도 생명에 이르는 회개를 주셨구나.
  alternative_readings:
  - 그러면 하나님께서 이방인들에게도 회개를 주어 생명 얻게 하셨도다
  rationale: μετάνοιαν εἰς ζωήν을 「생명에 이르는 회개」로 직역해 회개의 목적격 방향성을 보존. 「~에게도」 첨가는 καί τοῖς ἔθνεσιν의 강조를 살린다.
  doctrine_reference: 'DOCTRINE.md: cultural-boundary collapse'
