    rationale: ἠρυθρίων alude literalmente a sonrojarse y contextualmente a vergüenza/bochorno. «Me avergoncé» conserva mejor la fuerza sin sobrecargar la frase.
  - severity: low
    issue: La nota d no corresponde del todo al valor de la frase final en el texto revisado.
    rationale: Si se ajusta la cláusula final a «todo acerca de ti es conocido», conviene que la nota alternativa refleje la variante documentada en el POB («He aquí») y una alternativa cercana al sentido completo, no «Mira, se ve claramente».
