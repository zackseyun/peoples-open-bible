translation:
  language: es
  text: 'Entonces su padre Isaac respondió y le dijo: «He aquí, tu morada será de la riqueza de la tierra y del rocío del cielo arriba[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu morada será lejos de la riqueza de la tierra y lejos del rocío del cielo arriba». La preposición hebrea puede entenderse en sentido positivo («de/desde») o privativo/separativo («lejos de»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה introduce una respuesta en contexto narrativo. En español, «respondió» mantiene el registro formal y la estructura dialogal sin sonar forzado.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre Isaac
  - el padre de él
  lexicon: HALOT
  rationale: El hebreo añade la relación posesiva; en español, «su padre» comunica naturalmente la apposición relacional ya establecida por el nombre Isaac.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - He aquí que
  lexicon: HALOT
  rationale: Como marcador discursivo de atención solemne, «Mira» es más natural en español actual que «He aquí», sin perder el tono de advertencia o énfasis.
- source_word: מִשְׁמַנֵּי הָאָרֶץ
  english_pob_choice: from the richness of the earth
  chosen_spanish: de la riqueza de la tierra
  alternatives_spanish:
  - de la abundancia de la tierra
  - de la fertilidad de la tierra
  - de la gordura de la tierra
  lexicon: HALOT
  rationale: שְׁמַנִּים expresa riqueza/fertilidad; «riqueza» evita la rusticidad de «gordura» y conserva la idea de abundancia productiva. Se mantiene la preposición en sentido partitivo/separativo como en el texto inglés revisado.
- source_word: מוֹשָׁבֶךָ
  english_pob_choice: your dwelling
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu vivienda
  - tu habitación
  - tu lugar de morada
  lexicon: HALOT
  rationale: מוֹשָׁב refiere al lugar de residencia. «Morada» es digna, bíblica y clara en español, sin volverse arcaica en exceso.
- source_word: וּמִטַּל הַשָּׁמַיִם
  english_pob_choice: and from the dew of heaven
  chosen_spanish: y del rocío de los cielos
  alternatives_spanish:
  - y del rocío del cielo
  - y del rocío de los cielos de arriba
  lexicon: HALOT
  rationale: טַל es «rocío». El plural «cielos» conserva היטב el hebreo הַשָּׁמַיִם. Se omite una repetición innecesaria de «arriba» dentro del cuerpo principal para evitar pesadez, pero se añade en la frase final por fidelidad idiomática al hebreo מֵעָל.
- source_word: מֵעָל
  english_pob_choice: above
  chosen_spanish: de arriba
  alternatives_spanish:
  - de encima
  - desde arriba
  lexicon: HALOT
  rationale: 'La locución מֵעָל funciona idiomáticamente con valor locativo: «de arriba» mantiene la imagen espacial sin sonar calcado. Se integra con «los cielos de arriba» para reflejar el patrón hebreo.'
theological_decisions:
- issue: Lectura de la preposición מִן en una frase de contraste con la bendición de Jacob
  english_pob_reading: The Hebrew preposition can be read either positively ('from/of') or privatively ('away from'). The final English text keeps the neutral 'from' while the note preserves the alternative.
  chosen_spanish_reading: Se conserva el neutral «de»/«del» en el texto principal, con nota que deja abierta la lectura positiva o separativa.
  alternative_spanish_readings:
  - «lejos de la riqueza de la tierra, y lejos del rocío de los cielos»
  - «de la riqueza de la tierra, y del rocío de los cielos»
  rationale: El contexto inmediato sugiere tensión con la bendición anterior, pero el hebreo permite más de una lectura. El español principal no debe resolver en exceso esa tensión; por eso se opta por una formulación abierta y se documenta la alternativa.
  doctrine_reference: Translation philosophy §3; preservar tensiones exegéticas documentadas sin imponer una solución no asegurada por el hebreo.
translation_notes:
  revision_awareness: El borrador sigue el estado revisado del POB en inglés, que retiró la doble repetición de «away from» y dejó una formulación más directa y neutral. La versión española conserva esa neutralidad, evita calcar mecánicamente el inglés y mantiene la tensión interpretativa mediante una nota textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando corresponda; aquí no aparece el nombre divino.
  - Se prefirió «rocío» y «cielos» para reflejar el paralelismo hebreo sin introducir lenguaje litúrgico artificial.
  - «Morada» mantiene registro bíblico digno y natural en español contemporáneo.
  - No se resolvió la ambigüedad de מִן en el cuerpo principal para no borrar una tensión lexical documentada.
