translation:
  language: es
  text: Y hicieron utensilios sagrados nuevos[a], e introdujeron el candelabro, el altar de los holocaustos y de incienso, y la mesa en el templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el altar para holocaustos e incienso». El griego relaciona ambos elementos con «altar», aunque el sentido apunta a la pareja familiar de altares del templo.
    reason: alternative_reading
  - marker: b
    text: «Templo» aquí se refiere al edificio santuario, no al complejo entero del templo.
    reason: cultural_note
lexical_decisions:
- source_word: ἐποίησαν
  english_pob_choice: they made
  chosen_spanish: hicieron
  alternatives_spanish:
  - fabricaron
  - prepararon
  lexicon: LSJ
  rationale: ποίησαν expresa una acción de producir o hacer; en español, «hicieron» es natural, sobrio y fiel al sentido de fabricar/realizar los objetos del culto sin añadir matices innecesarios.
- source_word: τὰ σκεύη τὰ ἅγια
  english_pob_choice: the holy vessels
  chosen_spanish: los utensilios santos
  alternatives_spanish:
  - los vasos santos
  - los implementos santos
  lexicon: LSJ
  rationale: σκεύη en contexto del templo abarca utensilios o implementos cultuales. «Utensilios» comunica bien la función material y evita restringirlo demasiado a «vasos»; «santos» refleja ἅγια de manera directa.
- source_word: καινά
  english_pob_choice: new
  chosen_spanish: nuevos
  alternatives_spanish:
  - recién hechos
  - frescos
  lexicon: LSJ
  rationale: καινά indica que los objetos eran nuevos, no solo reparados. «Nuevos» es la equivalencia más directa y clara en español.
- source_word: τὴν λυχνίαν
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - el candelero
  - la lámpara
  lexicon: LSJ
  rationale: En lenguaje cultual español, «candelabro» transmite el objeto ritual de siete lámparas; aunque «candelero» también es posible, «candelabro» resulta más inteligible y digno para lectores generales.
- source_word: τὸ θυσιαστήριον τῶν ὁλοκαυτωμάτων καὶ θυμιαμάτων
  english_pob_choice: the altar of burnt offerings and of incense
  chosen_spanish: el altar de los holocaustos y de incienso
  alternatives_spanish:
  - el altar de los holocaustos y del incienso
  - el altar para holocaustos e incienso
  lexicon: LSJ
  rationale: El griego vincula el altar con dos genitivos coordinados; la versión española conserva esa relación sin expandir el texto. «Holocaustos» refleja ὁλοκαυτωμάτων y mantiene el paralelismo cultual; «de incienso» preserva la coordinación con θυμιαμάτων y deja abierta la ambigüedad de si se trata del altar relacionado con ambos sacrificios o de la pareja de altares familiar.
- source_word: τὴν τράπεζαν
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - la mesa del pan de la Presencia
  lexicon: LSJ
  rationale: Aunque el referente es la mesa del santuario, el griego dice solo «la mesa». «Mesa» es fiel, natural y evita añadir una expansión no presente en este versículo.
- source_word: εἰς τὸν ναόν
  english_pob_choice: into the temple
  chosen_spanish: al templo
  alternatives_spanish:
  - al santuario
  - dentro del templo
  lexicon: LSJ
  rationale: ναός aquí designa el edificio sagrado. «Al templo» es natural en español y conserva la dirección de movimiento implícita en εἰς sin forzar una glosa más específica que el griego no da.
theological_decisions:
- issue: Si expandir la mesa o identificar explícitamente el altar dual en el texto principal
  english_pob_reading: Keep the Greek's concise list of furnishings without adding explanatory expansions in the main text.
  chosen_spanish_reading: Mantener la lista concisa de utensilios y mobiliario sagrado sin añadir «del pan de la Presencia» ni otras aclaraciones en el cuerpo del versículo.
  alternative_spanish_readings:
  - la mesa del pan de la Presencia
  - el altar para holocaustos e incienso
  rationale: El versículo presenta un inventario breve de objetos restaurados. En español, ampliar los referentes ayudaría a algunos lectores, pero también introduciría información que el griego no explicita aquí. Por fidelidad al estilo comprimido del pasaje, la traducción principal conserva la brevedad y deja las aclaraciones para nota.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: 'Ambigüedad del altar: ¿un altar único con dos funciones o la pareja de altares del culto del templo?'
  english_pob_reading: The Greek places both 'burnt offerings' and 'incense' in relation to 'altar,' though the sense is the familiar pair of temple altars.
  chosen_spanish_reading: Conservar «el altar de los holocaustos y de incienso» sin resolver la ambigüedad en la línea principal.
  alternative_spanish_readings:
  - el altar de los holocaustos y el de incienso
  - el altar para holocaustos e incienso
  rationale: El griego es comprimido y deja cierta tensión sintáctica. En español, una solución demasiado interpretativa podría borrar esa tensión. La formulación elegida mantiene la relación genitiva y permite leer la referencia como el altar asociado con ambos cultos o como la pareja conocida de altares.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El control de revisión más reciente indicó que no eran necesarias modificaciones adicionales; por eso esta versión sigue de cerca el texto griego y la decisión inglesa ya auditada, sin introducir expansiones innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el Tetragrámaton, pero este versículo no lo contiene.
  - Se usa «Mesías» solo cuando el texto lo exige; aquí no aparece ninguna referencia a Χριστός.
  - «Utensilios santos» preserva la categoría cultual sin sustituirla por una fórmula eclesiástica más tradicional.
  - La ambigüedad del altar se conserva en la traducción principal y se explica en nota, conforme al auditable del inglés.
  - Se prefiere «al templo» para ναός, en línea con el uso del POB de distinguir el edificio sagrado del recinto completo.
