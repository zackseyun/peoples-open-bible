id: 1KI.20.42
reference: 1 Kings 20:42
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר יְהוָ֔ה יַ֛עַן שִׁלַּ֥חְתָּ אֶת אִישׁ חֶרְמִ֖/י מִ/יָּ֑ד וְ/הָיְתָ֤ה נַפְשְׁ/ךָ֙ תַּ֣חַת נַפְשׁ֔/וֹ וְ/עַמְּ/ךָ֖ תַּ֥חַת עַמּֽ/וֹ־־׃
translation:
  text: 'And he said to him[a], “Thus says Yahweh: Because you have let go from your hand the man I had devoted to destruction, your life shall be for his life, and your people for his people.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the man under my ban.” The Hebrew uses חֵרֶם language for someone devoted to destruction under divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name with small-caps convention in English.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - On account of the fact that
  lexicon: HALOT
  rationale: Introduces the causal ground of the judgment succinctly and naturally.
- source_word: שִׁלַּחְתָּ
  chosen: you have let go
  alternatives:
  - you have released
  - you have sent away
  lexicon: HALOT
  rationale: In this context of a captured enemy king, the verb means to release or let escape. 'Let go' is idiomatic and fits the following phrase 'from your hand.'
- source_word: אִישׁ חֶרְמִי
  chosen: the man I had devoted to destruction
  alternatives:
  - the man under my ban
  - the man I had doomed
  - the man devoted to me for destruction
  lexicon: HALOT
  rationale: חֵרֶם language refers to something placed under the ban, devoted to destruction. To avoid opaque jargon ('ban') while preserving the theological force, this is rendered explicitly as 'devoted to destruction.' The 1cs suffix on חֶרְמִי is represented by 'I had devoted.'
- source_word: מִיָּד
  chosen: from your hand
  alternatives:
  - out of your hand
  - from your power
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom of custody/control and works naturally in English.
- source_word: וְהָיְתָה נַפְשְׁךָ תַּחַת נַפְשׁוֹ
  chosen: your life shall be for his life
  alternatives:
  - your life in place of his life
  - your life instead of his life
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life rather than soul. 'For his life' preserves the substitution idea of תַּחַת in concise English.
- source_word: וְעַמְּךָ תַּחַת עַמּוֹ
  chosen: and your people for his people
  alternatives:
  - and your people in place of his people
  - and your people instead of his people
  lexicon: HALOT
  rationale: Maintains the parallelism with the previous clause and preserves the substitution/judgment sense of תַּחַת.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula in clear modern English.
