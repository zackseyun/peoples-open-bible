translation:
  language: es
  text: 'Y de los servidores del templo[a], que David y los jefes habían asignado al servicio de los levitas: servidores del templo, doscientos veinte[b]; todos fueron registrados por nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Netinim', término técnico hebreo para los servidores del templo. El griego tiene 'servidores del templo' (ἱερόδουλοι), mientras que el paralelo hebreo usa נְתִינִים.
    reason: lexical_alternative
  - marker: b
    text: O 'todos fueron anotados por nombre'. La frase final indica un registro formal hecho por nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱεροδούλων
  english_pob_choice: temple servants
  chosen_spanish: servidores del templo
  alternatives_spanish:
  - Netinim
  - siervos del templo
  - siervos sagrados
  lexicon: LSJ
  rationale: El griego designa personas vinculadas al servicio sagrado del templo. En español, 'servidores del templo' comunica la función cultual sin imponer de entrada el tecnicismo transliterado; se conserva la posibilidad de 'Netinim' en nota por el paralelo hebreo.
- source_word: ἔδωκεν
  english_pob_choice: had assigned
  chosen_spanish: habían asignado
  alternatives_spanish:
  - habían dado
  - habían nombrado
  - habían puesto
  lexicon: BDAG
  rationale: Aunque el verbo básico es 'dar', en este contexto administrativo-cultual el sentido es de asignación para un servicio. 'Habían asignado' expresa mejor esa función que un simple 'habían dado'.
- source_word: οἱ ἡγούμενοι
  english_pob_choice: the leaders
  chosen_spanish: los jefes
  alternatives_spanish:
  - los líderes
  - los gobernantes
  - los principales
  lexicon: LSJ
  rationale: La expresión se refiere a autoridades que encabezan la administración junto con David. 'Los jefes' es natural en español bíblico y corresponde bien al matiz de oficiales principales del paralelo hebreo.
- source_word: εἰς τὴν ἐργασίαν τῶν Λευειτῶν
  english_pob_choice: to the service of the Levites
  chosen_spanish: al servicio de los levitas
  alternatives_spanish:
  - para la obra de los levitas
  - para el trabajo de los levitas
  - al trabajo de los levitas
  lexicon: LSJ
  rationale: ἐργασία puede significar trabajo o servicio. En este marco del templo, 'servicio' refleja mejor la función asistencial y litúrgico-administrativa que 'trabajo' en español.
- source_word: διακόσιοι εἴκοσι
  english_pob_choice: two hundred twenty
  chosen_spanish: doscientos veinte
  alternatives_spanish:
  - doscientos y veinte
  lexicon: LSJ
  rationale: Número directo y estándar en español contemporáneo, sin adición innecesaria.
- source_word: πάντων ἐσημάνθη ὀνοματογραφία
  english_pob_choice: all of them were listed by name
  chosen_spanish: todos fueron inscritos por nombre
  alternatives_spanish:
  - todos fueron registrados por nombre
  - todos fueron anotados por nombre
  - se hizo la inscripción de todos por nombre
  lexicon: LSJ
  rationale: La frase final apunta a una inscripción o registro formal nominal. 'Inscritos por nombre' conserva la idea administrativa y deja visible el carácter de registro que el inglés POB resolvió como 'listed by name'.
theological_decisions:
- issue: Rendición de ἱερόδουλοι / נְתִינִים sin ocultar el término técnico
  english_pob_reading: temple servants
  chosen_spanish_reading: servidores del templo
  alternative_spanish_readings:
  - Netinim
  - servidores sagrados
  - siervos del templo
  rationale: 'No hay una tensión doctrinal fuerte, pero sí una decisión terminológica: el término describe una categoría cultual especializada. Se mantiene el sentido funcional en el texto principal y se deja abierta la equivalencia técnica con el paralelo hebreo en nota, sin borrar el dato léxico.'
  doctrine_reference: Terminología cultual y correspondencia con el paralelo hebreo; no implica una doctrina específica.
- issue: Registro nominal formal al final del versículo
  english_pob_reading: all of them were listed by name
  chosen_spanish_reading: todos fueron inscritos por nombre
  alternative_spanish_readings:
  - todos fueron registrados por nombre
  - todos fueron anotados por nombre
  - se hizo la inscripción de todos por nombre
  rationale: La construcción griega sugiere un acto formal de registro, no solo una mención casual. 'Inscritos por nombre' preserva esa formalidad y evita reducirlo a una simple enumeración informal.
  doctrine_reference: Práctica administrativa de registro; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: El texto griego de Swete es la base primaria; el paralelo hebreo MT funciona como comprobación de nombres y sentido administrativo. La revisión inglesa prefirió 'listed by name' frente a 'designated by name' para expresar mejor ἐσημάνθη ὀνοματογραφία; la versión española adopta 'inscritos por nombre' para conservar esa misma formalidad en español natural.
  spanish_consistency_notes:
  - Se mantiene 'templo' en la expresión cultual para evitar una transliteración innecesaria en el cuerpo principal.
  - Se usa 'levitas' en minúscula como designación común de grupo sacerdotal-levítico en español bíblico.
  - '''Jefes'' refleja mejor el tono administrativo que ''líderes'' en este versículo breve.'
  - '''Inscritos por nombre'' conserva el matiz de registro escrito y se alinea con la revisión inglesa más reciente.'
