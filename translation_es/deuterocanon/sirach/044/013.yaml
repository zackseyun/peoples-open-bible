translation:
  language: es
  text: Su recuerdo permanecerá para siempre[a], y su rectitud no será olvidada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «Su descendencia permanecerá para siempre, y su gloria no será borrada». El rollo de Masada también lee «su descendencia/semilla», mientras que el hebreo de la Genizá de El Cairo aquí dice «su recuerdo».'
    reason: textual_variant
lexical_decisions:
- source_word: זכרם
  english_pob_choice: their remembrance
  chosen_spanish: su recuerdo
  alternatives_spanish:
  - su memoria
  - su nombre
  lexicon: HALOT
  rationale: זֵכֶר expresa la idea de recuerdo o memorial que permanece. En español, «recuerdo» comunica con naturalidad esa permanencia y evita una construcción demasiado literal que sonaría forzada. Dado que el hebreo de esta línea privilegia la noción de memoria perdurable, se mantiene esa dirección semántica.
- source_word: יעמד
  english_pob_choice: will stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá
  - durará
  lexicon: HALOT
  rationale: עמד tiene el sentido básico de «estar en pie», pero aquí funciona idiomáticamente como permanencia duradera. «Permanecerá» conserva la idea de estabilidad y duración en español, con un registro más natural que un calco literal de «estará de pie».
- source_word: עד עולם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión idiomática indica duración perpetua. «Para siempre» es la forma más clara y ampliamente inteligible en español bíblico contemporáneo, sin perder el valor de perpetuidad del hebreo.
- source_word: וצדקתם
  english_pob_choice: their righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - sus obras justas
  lexicon: HALOT
  rationale: צדקה puede abarcar justicia y rectitud. En este contexto de elogio sapiencial, «justicia» mantiene el peso moral y relacional del término y funciona bien en paralelo con el verbo pasivo «no será olvidada». Se evita «obras justas» por ser más interpretativo.
- source_word: לא תשכח
  english_pob_choice: will not be forgotten
  chosen_spanish: no será olvidada
  alternatives_spanish:
  - no se olvidará
  - no será borrada de la memoria
  lexicon: HALOT
  rationale: El pasivo refleja bien la forma verbal hebrea y el sentido de permanencia del recuerdo. «No será olvidada» es idiomático en español y mantiene el paralelismo con la primera cola del verso.
theological_decisions:
- issue: Elección entre la línea hebrea de Cairo/Genizá y la variante griega/Masada
  english_pob_reading: Their remembrance will stand forever, and their righteousness will not be forgotten.
  chosen_spanish_reading: Su recuerdo permanecerá para siempre, y su justicia no será olvidada.
  alternative_spanish_readings:
  - Su descendencia permanecerá para siempre, y su gloria no será borrada.
  rationale: 'Se traduce la lectura hebrea conservada en el testigo principal, siguiendo la política POB de priorizar el hebreo cuando está disponible. La variante griega y masadense se conserva como alternativa textual porque cambia materialmente el contenido: «descendencia/semilla» y «gloria» en lugar de «recuerdo» y «justicia».'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando sobreviva; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: El pasaje coincide con la evaluación de alta concordancia y no requiere cambios respecto al último pase revisado; se mantiene la decisión de traducir la línea hebrea principal y documentar la variante griega en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí, ya que el versículo no contiene el Tetragrámaton ni κύριος.
  - Se eligió «justicia» para צדקה, en coherencia con el registro sapiencial y con el sentido moral del contexto.
  - La nota textual conserva explícitamente la variante «descendencia/semilla» y «gloria» para no ocultar la tensión documental entre tradiciones textuales.
