  - marker: a
    text: 'O, más literalmente: «Entonces volverán y verán entre el justo y el malvado». El hebreo probablemente expresa de manera idiomática que volverán a percibir la distinción.'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido idiomático documentado por el English POB y el contraste del hebreo, pero se ajusta el pronombre a un español más natural ('le sirve') y se pule la nota para que suene menos calcada y más clara.
