translation:
  language: es
  text: El Dios de su amor constante[a] irá delante de mí[b]; Dios me dejará ver a mis enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amor constante» traduce el hebreo hesed, que a menudo denota amor o misericordia leal y pactual.
    reason: lexical_alternative
  - marker: b
    text: 'O, siguiendo otra tradición de vocalización/traducción: «Mi Dios en su amor constante irá delante de mí» o «Mi Dios de amor constante irá delante de mí».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהֵי
  english_pob_choice: The God of
  chosen_spanish: El Dios de
  alternatives_spanish:
  - Dios de
  - Mi Dios de
  lexicon: HALOT
  rationale: La forma constructa introduce la relación nominal en español de manera natural con «El Dios de». Mantiene la estructura hebrea sin añadir posesión no explicitada en el texto base.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su amor constante
  - su amor de pacto
  lexicon: HALOT
  rationale: חֶסֶד abarca amor leal, misericordia y fidelidad pactual. «Amor leal» conserva la fuerza relacional y duradera sin estrechar el sentido a una sola noción teológica. Se evita «misericordia» como reducción posible.
- source_word: יְקַדְּמֵנִי
  english_pob_choice: will go before me
  chosen_spanish: irá delante de mí
  alternatives_spanish:
  - me precederá
  - saldrá delante de mí
  - me irá delante
  lexicon: HALOT
  rationale: El valor de קדם en piel permite la idea de preceder o ir delante. «Irá delante de mí» es la forma más natural en español y preserva la iniciativa protectora/anticipada del sujeto divino.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: La repetición absoluta se conserva como «Dios» para reflejar el paralelismo hebreo y el énfasis del original, sin convertirlo en pronombre ni suavizar la reiteración.
- source_word: יַרְאֵנִי
  english_pob_choice: will let me look on
  chosen_spanish: me dejará mirar
  alternatives_spanish:
  - me hará ver
  - me dejará ver
  - me permitirá ver
  lexicon: HALOT
  rationale: El hifil de ראה es causativo. «Me dejará mirar» conserva la idea de permitir/causar ver sin introducir una lectura más interpretativa como «triunfar sobre».
- source_word: בְשֹׁרְרָי
  english_pob_choice: my enemies
  chosen_spanish: a mis enemigos
  alternatives_spanish:
  - a los que me hostigan
  - a los que me acechan
  - a mis adversarios
  lexicon: HALOT
  rationale: El sustantivo denota hostilidad y vigilancia enemiga. «Mis enemigos» es el equivalente más claro y publicable; la preposición con objeto directo en español requiere «a».
theological_decisions:
- issue: Sufijo posesivo en חַסְדּוֹ
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su amor leal
  alternative_spanish_readings:
  - mi amor leal
  - su misericordia
  rationale: Se sigue el texto consonántico/vocalizado dado, donde el sufijo es de tercera persona singular masculina. En español se preserva «su» para no borrar esa lectura. La nota recoge que existe una tradición alternativa semejante a «mi Dios en su amor leal» o «Dios de amor leal», como en el audit trail inglés.
  doctrine_reference: Primacía del original y preservación de alternativas significativas cuando la vocalización o tradición de traducción afecta el sentido.
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última revisión; no se registraron modificaciones aplicadas. Esta versión española sigue directamente el WLC proporcionado y conserva la alternativa interpretativa sobre el constructo y el sufijo posesivo mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» en la repetición de אֱלֹהִים para respetar el paralelismo.
  - Se eligió «amor leal» para חֶסֶד por ser un equivalente amplio y comprensible en español eclesial contemporáneo.
  - «Irá delante de mí» comunica la dirección/providencia anticipada sin cargar el verbo con una explicación excesiva.
  - La nota al pie usa el marcador [a] solo donde hay una alternativa textual/interpretativa real.
