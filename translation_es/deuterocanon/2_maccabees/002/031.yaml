translation:
  language: es
  text: Pero se debe conceder al que hace el epítome[a] que procure la brevedad en la expresión y que prescinda del tratamiento detallado de la materia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al que hace la abreviación»; el término griego aquí puede significar en otros contextos «traducción», pero en este pasaje se refiere al epítome del compilador de una obra más extensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντομον
  english_pob_choice: brevity
  chosen_spanish: brevedad
  alternatives_spanish:
  - concisión
  - brevedad de estilo
  lexicon: LSJ
  rationale: El griego sustantivado indica brevedad o concisión; «brevedad» es natural en español y conserva bien el contraste con una exposición más extensa.
- source_word: τῆς λέξεως
  english_pob_choice: of expression
  chosen_spanish: de la expresión
  alternatives_spanish:
  - del estilo
  - de la redacción
  - de la dicción
  lexicon: LSJ
  rationale: Aquí λέξις apunta al modo de expresarse, no a una sola palabra. «Expresión» transmite de forma clara el ámbito literario y retórico.
- source_word: μεταδιώκειν
  english_pob_choice: to pursue
  chosen_spanish: que persiga
  alternatives_spanish:
  - que busque
  - que aspire a
  - que procure
  lexicon: LSJ
  rationale: El infinitivo expresa la idea de perseguir o procurar algo. «Que persiga» conserva la fuerza dinámica del verbo sin sonar forzado en español.
- source_word: ἐξεργαστικόν
  english_pob_choice: detailed treatment
  chosen_spanish: tratamiento detallado
  alternatives_spanish:
  - elaboración detallada
  - tratamiento minucioso
  - desarrollo exhaustivo
  lexicon: LSJ
  rationale: El término señala un trabajo cuidadosamente desarrollado. «Tratamiento detallado» reproduce bien la idea de elaboración extensa sin tecnicismo innecesario.
- source_word: τῆς πραγματίας
  english_pob_choice: of the subject matter
  chosen_spanish: del asunto
  alternatives_spanish:
  - de la materia
  - del contenido
  - del tema tratado
  lexicon: LSJ
  rationale: πραγματεία se refiere al asunto o contenido que se trata. «Asunto» es amplio y natural en español para este contexto de epítome.
- source_word: παραιτεῖσθαι
  english_pob_choice: to forgo
  chosen_spanish: omita
  alternatives_spanish:
  - renuncie a
  - prescinda de
  - deje de lado
  lexicon: LSJ
  rationale: El verbo implica apartarse o dispensarse de algo. En este contexto, «omita» comunica con claridad que no se requiere una exposición completa.
- source_word: τῷ τὴν μετάφρασιν ποιουμένῳ
  english_pob_choice: the one making the epitome
  chosen_spanish: al que hace el epítome
  alternatives_spanish:
  - al que prepara el resumen
  - al que hace la abreviación
  - al que compone el compendio
  lexicon: LSJ
  rationale: Aunque μετάφρασις puede significar «traducción» en otros contextos, aquí el prólogo de 2 Macabeos describe un compendio de una obra mayor. «Epítome» preserva el sentido literario que el contexto exige.
- source_word: συγχωρητέον
  english_pob_choice: one should grant
  chosen_spanish: se debe conceder
  alternatives_spanish:
  - se debe permitir
  - debe concederse
  - hay que conceder
  lexicon: LSJ
  rationale: El adjetivo verbal expresa una concesión u अनुमति impersonal. «Se debe conceder» mantiene el tono normativo y sobrio del griego.
theological_decisions:
- issue: Sentido de μετάφρασις en el contexto de 2 Macabeos 2:31
  english_pob_reading: epitome/abridgment rather than translation
  chosen_spanish_reading: epítome/compendio y no traducción
  alternative_spanish_readings:
  - traducción
  - abreviación
  - resumen
  rationale: El marco literario del prólogo de 2 Macabeos presenta una obra abreviada de un original más extenso. Traducir μετάφρασις como «traducción» en este versículo ocultaría esa situación textual y literaria; por eso se mantiene el valor de compendio/epítome.
  doctrine_reference: Principio de primacía del texto original y atención al contexto literario
- issue: Concesión normativa de συγχωρητέον
  english_pob_reading: one should grant
  chosen_spanish_reading: se debe conceder
  alternative_spanish_readings:
  - debe permitirse
  - hay que conceder
  rationale: 'La forma verbal griega no describe doctrina sino una concesión editorial: el compilador merece margen para la brevedad. La traducción española conserva ese tono impersonal y no lo convierte en una regla teológica.'
  doctrine_reference: Principio de transparencia retórica y no doctrinalización indebida
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa revisada, que prefirió un verbo de concesión más directo para συγχωρητέον y ajustó ἐξεργαστικόν a una expresión más concreta; en español se reflejó con «se debe conceder» y «tratamiento detallado», manteniendo un registro formal y natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero no aparece en este versículo.
  - Se usa «epítome» por fidelidad al contexto literario; la nota conserva la alternativa «abreviación» para lectores que prefieran una equivalencia más explícita.
  - «Asunto» se emplea como equivalente amplio de πραγματεία sin añadir contenido doctrinal.
