translation:
  language: es
  text: 'Pero él respondió[a]: «Escrito está: “No solo de pan[b] vivirá el ser humano, sino de toda palabra que sale de la boca de Dios[c]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contestó»; el griego usa una fórmula narrativa de respuesta que en español puede expresarse con un solo verbo.
    reason: lexical_alternative
  - marker: b
    text: O «solamente de pan». El griego expresa literalmente la idea «no con solo pan», conservando el contraste entre el sustento material y la palabra de Dios.
    reason: lexical_alternative
  - marker: c
    text: El griego dice literalmente «por / por medio de la boca de Dios» (διά con genitivo). Se traduce «de la boca de Dios» por naturalidad en español, manteniendo la imagen de la palabra divina pronunciada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: he answered
  chosen_spanish: respondió
  alternatives_spanish:
  - respondió y dijo
  - contestó
  lexicon: BDAG
  rationale: La expresión narrativa semítica se puede concentrar de manera natural en español con «respondió», sin perder el valor de réplica implícito. «Y dijo» sería redundante en español moderno.
- source_word: Γέγραπται
  english_pob_choice: It is written
  chosen_spanish: Escrito está
  alternatives_spanish:
  - Está escrito
  - Se ha escrito
  lexicon: BDAG
  rationale: La fórmula tradicional «Escrito está» preserva el tono escritural y el valor de cita con autoridad permanente del perfecto griego, sin sonar forzada en español.
- source_word: ἄρτῳ
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - pan de trigo
  - alimento
  lexicon: BDAG
  rationale: «Pan» es el equivalente directo y mantiene la imagen concreta del texto griego y de la cita veterotestamentaria. «Alimento» ampliaría indebidamente el alcance.
- source_word: μόνῳ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: «Solo» reproduce de forma natural la exclusividad de μόνῳ en español y encaja con la construcción fija «no solo de pan».
- source_word: ὁ ἄνθρωπος
  english_pob_choice: Man
  chosen_spanish: el ser humano
  alternatives_spanish:
  - el hombre
  - la humanidad
  - una persona
  lexicon: BDAG
  rationale: El griego usa un masculino singular con fuerza representativa, pero en español «el ser humano» comunica mejor el sentido inclusivo sin perder la generalidad. Se conserva la tensión lexical entre forma masculina y referencia universal.
- source_word: παντὶ ῥήματι
  english_pob_choice: every word
  chosen_spanish: toda palabra
  alternatives_spanish:
  - cada palabra
  - toda expresión
  - cada dicho
  lexicon: BDAG
  rationale: «Palabra» es la equivalencia natural y bíblicamente reconocible para ῥῆμα en este contexto. «Toda» mantiene el valor distributivo de παντί mejor que una paráfrasis.
- source_word: ἐκπορευομένῳ
  english_pob_choice: proceeding
  chosen_spanish: que sale
  alternatives_spanish:
  - que procede
  - que emana
  lexicon: BDAG
  rationale: El participio describe la palabra como la que sale de la boca de Dios. «Que sale» conserva la imagen verbal con claridad en español; «que procede» sería más formal pero menos concreto.
- source_word: διὰ στόματος θεοῦ
  english_pob_choice: through the mouth of God
  chosen_spanish: de la boca de Dios
  alternatives_spanish:
  - a través de la boca de Dios
  - por la boca de Dios
  lexicon: BDAG
  rationale: Aunque διά con genitivo es literalmente «por medio de / a través de», en español la fórmula más natural y fiel a la imagen es «de la boca de Dios». La auditable tensión entre el griego literal y el español idiomático se explica en nota.
theological_decisions:
- issue: Alcance inclusivo de ὁ ἄνθρωπος
  english_pob_reading: Man
  chosen_spanish_reading: el ser humano
  alternative_spanish_readings:
  - el hombre
  - la humanidad
  - una persona
  rationale: La afirmación es universal y representativa. En español, «el ser humano» explicita el alcance inclusivo que en griego recae en el masculino singular genérico, evitando una lectura exclusivamente masculina.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Autoridad continua de Γέγραπται
  english_pob_reading: It is written
  chosen_spanish_reading: Escrito está
  alternative_spanish_readings:
  - Está escrito
  rationale: La forma perfecta griega mantiene una autoridad vigente de la Escritura citada. «Escrito está» conserva ese valor sin introducir comentarios doctrinales añadidos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «proceeding through the mouth of God» a «that proceeds from the mouth of God» para reflejar mejor el griego. La versión española evita esa ambigüedad desde el inicio con «que sale de la boca de Dios», manteniendo la imagen verbal y la claridad idiomática.
  spanish_consistency_notes:
  - Se conserva la cita en estilo bíblico con comillas angulares y el verbo introductor en pasado narrativo.
  - Se evita «SEÑOR» porque el texto griego contiene θεοῦ, no el Tetragrámaton.
  - «Ser humano» se usa aquí por la fuerza representativa universal de ὁ ἄνθρωπος, con nota que reconoce la forma masculina del griego.
  - La nota c preserva la tensión entre la literalidad de διά y la naturalidad del español.
