revisions:
- from: En aquel tiempo se traerá una ofrenda[a] a Yahvé de los ejércitos, de un pueblo alto y sin vello, de un pueblo temido por aquí y por allá, una nación de norma sobre norma y de atropello, cuya tierra dividen los ríos, al lugar del nombre de Yahvé de los ejércitos, el monte Sion.
  to: En aquel tiempo se llevará tributo[a] a Yahvé de los ejércitos, de un pueblo alto y de piel lisa, de un pueblo temido de lejos y de cerca, una nación de mandato sobre mandato[b] y de pisoteo, cuya tierra dividen los ríos, al lugar del nombre de Yahvé de los ejércitos, el monte Sion.
  rationale: 'La revisión corrige cuatro puntos principales: (1) adopta ''tributo'' para reflejar la revisión auditada del inglés y el matiz político-honorífico de שַׁי; (2) reemplaza el coloquial ''por aquí y por allá'' por ''de lejos y de cerca'', más digno y adecuado para ''far and wide''; (3) sustituye ''atropello'' por ''pisoteo'' y ajusta la frase difícil a ''mandato sobre mandato'', con nota que preserva la alternativa más literal; y (4) mejora ''sin vello'' a ''de piel lisa'' para reflejar mejor ''smooth-skinned'' en español natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:19:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y mantiene adecuadamente los referentes clave: el presente/tributo llevado a Yahvé, la serie de descriptores del pueblo, la cláusula sobre los ríos que dividen la tierra y el destino final en Sion. También respeta la decisión teológica del proyecto de traducir יהוה como ''Yahvé''. Sin embargo, varias elecciones léxicas españolas no preservan bien el matiz auditado: ''ofrenda'' debilita el giro político-honorífico de שַׁי frente al inglés revisado ''tribute''; ''por aquí y por allá'' suena coloquial y no expresa bien el alcance de מִן הוּא וָהָלְאָה; ''norma sobre norma'' y especialmente ''atropello'' no representan con suficiente fidelidad ni naturalidad ''command upon command and trampling''.'
  spanish_quality_summary: El texto es mayormente legible, pero algunas frases suenan poco bíblicas o poco naturales en español culto general. 'Por aquí y por allá' es demasiado conversacional; 'de atropello' resulta extraño e impreciso; y 'sin vello' puede sonar fisiológico o incómodo donde 'de piel lisa' o similar sería más digno. Una revisión menor mejora fidelidad y registro sin alterar la sintaxis general del versículo.
  glossary_alignment: Alinea bien con el glosario en 'Yahvé' y conserva 'de los ejércitos'. No hay conflicto con Mesías/Cristo u otros términos doctrinales. La principal desviación es שַׁי, donde el inglés POB revisado favorece 'tribute'; en español 'tributo' encaja mejor que 'ofrenda' en este contexto. Para מוֹרָט, 'de piel lisa' refleja mejor 'smooth-skinned' que 'sin vello'.
  issues:
  - severity: medium
    issue: שַׁי se vierte como 'ofrenda' en vez de 'tributo'
    rationale: Aunque 'ofrenda' es posible, el rastro auditado en inglés fue revisado específicamente de 'gift' a 'tribute' por mayor precisión contextual. En español, 'tributo' conserva mejor el matiz de presente honorífico ofrecido a un soberano.
  - severity: medium
    issue: '''por aquí y por allá'' para מִן הוּא וָהָלְאָה'
    rationale: La expresión española es demasiado coloquial y sugiere dispersión casual más que amplitud o extensión. 'de lejos y de cerca' o 'por todas partes' preserva mejor el tono elevado y el sentido amplio del inglés 'far and wide'.
  - severity: high
    issue: '''de norma sobre norma y de atropello'' es poco natural y débilmente fiel'
    rationale: '''Norma sobre norma'' no transmite bien la dureza repetitiva de la frase difícil, y ''atropello'' se asocia en español moderno con abuso o accidente más que con ''trampling/pisoteo''. ''mandato sobre mandato y de pisoteo'' o similar se acerca mejor a la decisión auditada y al hebreo.'
  - severity: low
    issue: '''sin vello'' suena menos digno que ''de piel lisa'''
    rationale: El matiz de מוֹרָט según el POB es 'smooth-skinned'. 'Sin vello' no es erróneo, pero en registro bíblico general 'de piel lisa' resulta más natural y menos corporalmente crudo.
  revised_spanish_text: En aquel tiempo se llevará tributo[a] a Yahvé de los ejércitos, de un pueblo alto y de piel lisa, de un pueblo temido de lejos y de cerca, una nación de mandato sobre mandato[b] y de pisoteo, cuya tierra dividen los ríos, al lugar del nombre de Yahvé de los ejércitos, el monte Sion.
  revised_footnotes:
  - marker: a
    text: O 'presente'. El hebreo puede referirse a un regalo o tributo ofrecido a un soberano honrado.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'línea sobre línea' o 'cordel de medir sobre cordel de medir'; la frase es difícil y puede referirse a medición repetida, mandato o dominación.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige cuatro puntos principales: (1) adopta ''tributo'' para reflejar la revisión auditada del inglés y el matiz político-honorífico de שַׁי; (2) reemplaza el coloquial ''por aquí y por allá'' por ''de lejos y de cerca'', más digno y adecuado para ''far and wide''; (3) sustituye ''atropello'' por ''pisoteo'' y ajusta la frase difícil a ''mandato sobre mandato'', con nota que preserva la alternativa más literal; y (4) mejora ''sin vello'' a ''de piel lisa'' para reflejar mejor ''smooth-skinned'' en español natural.'
