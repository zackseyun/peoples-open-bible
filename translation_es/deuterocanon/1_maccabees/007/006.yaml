  source_alignment_summary: 'El borrador español refleja fielmente el griego y el rastro de auditoría del POB inglés: «acusaron al pueblo» corresponde bien a κατηγόρησαν τοῦ λαοῦ; «ante el rey» preserva el matiz formal de πρὸς τὸν βασιλέα; y la cita reportada transmite correctamente que Judas y sus hermanos destruyeron a los «amigos» del rey y dispersaron a los acusadores de su tierra. La decisión de usar verbos plurales en español es coherente con la equivalencia óptima documentada.'
