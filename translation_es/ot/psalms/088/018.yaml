translation:
  language: es
  text: Me rodearon como agua todo el día[a]; juntos se estrecharon a mi alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me cercaron como agua...; juntos me rodearon», preservando más estrechamente el paralelismo léxico entre los dos verbos hebreos.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַבּ֣וּנִי
  english_pob_choice: they surrounded me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me circundaron
  lexicon: HALOT
  rationale: El verbo סבב en esta forma expresa un rodear hostil al hablante. «Me rodearon» conserva la imagen y suena natural en español moderno sin perder la fuerza del cerco.
- source_word: כַ֭/מַּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - como las aguas
  lexicon: HALOT
  rationale: La comparación con כַּמַּיִם pide un símil directo. «Como agua» es una equivalencia clara y fluida en español; mantiene el carácter envolvente de la imagen.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - el día entero
  lexicon: HALOT
  rationale: La expresión temporal indica duración continua. «Todo el día» transmite bien la extensión durativa sin añadir matices ajenos al hebreo.
- source_word: הִקִּ֖יפוּ
  english_pob_choice: they closed in
  chosen_spanish: se cerraron
  alternatives_spanish:
  - me cercaron
  - se acercaron en torno a mí
  lexicon: HALOT
  rationale: En paralelo con el primer verbo, la segunda forma intensifica la idea de cercamiento. «Se cerraron sobre mí» expresa esa presión colectiva y evita repetir mecánicamente el mismo verbo, aunque conserva el paralelismo semántico.
- source_word: עָלַ֣/י
  english_pob_choice: on me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - contra mí
  - encima de mí
  lexicon: HALOT
  rationale: "La preposición עַל en este contexto puede sugerir presión hostil. «Sobre mí» mantiene la imagen espacial y funciona de manera natural en español con «se cerraron».\uFEFF"
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a una
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio indica acción colectiva. «Juntos» comunica la idea de que el asedio ocurre en concierto, preservando el sentido del hebreo.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el hebreo masorético de Salmos 88:18 y toma como referencia el audit trail inglés: se preserva el símil con agua, la duración continua y el paralelismo entre los dos verbos de cerco, sin suavizar la angustia del texto.'
  spanish_consistency_notes:
  - Se usa «agua» en singular colectivo, en línea con el símil hebreo y con el español natural.
  - «Se cerraron sobre mí» busca reflejar el segundo verbo sin perder la tensión del asedio.
  - La nota alternativa conserva la tensión lexical entre dos verbos distintos de cercamiento.
