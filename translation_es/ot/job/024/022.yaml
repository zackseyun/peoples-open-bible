revisions:
- from: Sí, arrastra a los poderosos con su fuerza; se alza[a], pero no tiene seguridad de la vida.
  to: Pero arrastra a los poderosos con su poder; se alza[a], pero no tiene seguridad de seguir con vida.
  rationale: Se ajusta «con su fuerza» a «con su poder» para seguir la decisión léxica auditada para בְּכֹחוֹ; se reemplaza «no tiene seguridad de la vida» por «no tiene seguridad de seguir con vida» para lograr un español natural y fiel al sentido de falta de certeza sobre la vida; y se simplifica/mejora la nota para preservar la ambigüedad hebrea sin sonar torpe. No se requiere adjudicación adicional porque la corrección es menor y directamente sustentada por la auditoría existente.
