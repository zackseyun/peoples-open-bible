lexical_decisions:
- source_word: Βασιλεὺς
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - El rey
  lexicon: LSJ
  rationale: El título real anartro funciona aquí como encabezamiento epistolar; en español, «Rey» conserva la concisión titulár y el tono de superscripción. Se evita añadir artículo para reflejar mejor la forma de encabezamiento.
- source_word: Δημήτριος
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  lexicon: Práctica onomástica del POB
  rationale: Nombre propio transliterado de manera estándar al español bíblico-histórico.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simeón
  lexicon: Práctica onomástica del POB
  rationale: La forma usual en español para este personaje histórico es «Simón»; se conserva la referencia al mismo individuo sin forzar una forma litúrgica.
- source_word: ἀρχιερεῖ
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - sumo sacerdote
  lexicon: LSJ
  rationale: La apposición de cargo exige una forma clara en español; «sumo sacerdote» es la manera idiomática y precisa de expresar el oficio, con el artículo por la sintaxis española natural.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: LSJ
  rationale: Conjunción coordinante simple, sin matiz adicional.
- source_word: φίλῳ βασιλέων
  english_pob_choice: friend of kings
  chosen_spanish: amigo de reyes
  alternatives_spanish:
  - amigo de los reyes
  - amigo real
  lexicon: LSJ
  rationale: Se conserva el plural literal βασιλέων y el sabor honorífico de fórmula cortesana. «Amigo de reyes» mantiene mejor la titulación que una paráfrasis como «amigo real».
theological_decisions:
- issue: Superscripción/encabezamiento epistolar incompleto en esta unidad
  english_pob_reading: 'The Greek preserved here is a heading-like address formula: ''King Demetrius, to Simon the high priest and friend of kings:'' The sentence continues in the following verse.'
  chosen_spanish_reading: 'Se presenta como encabezamiento: «Rey Demetrio a Simón, el sumo sacerdote y amigo de reyes:»'
  alternative_spanish_readings:
  - 'Rey Demetrio, a Simón, el sumo sacerdote y amigo de reyes:'
  - 'Demetrio, rey, a Simón el sumo sacerdote y amigo de reyes:'
  rationale: La unidad no contiene una oración completa, sino una fórmula de dirección. La puntuación con dos puntos deja abierto el desarrollo en el versículo siguiente sin añadir material interpretativo.
  doctrine_reference: Nota de forma literaria; no aplica una doctrina específica
translation_notes:
  revision_awareness: Se ha seguido el audit trail inglés que identifica el texto como una superscripción o fórmula de dirección. Se mantuvo la estructura breve, sin coma después de «Demetrio», para reflejar el estilo de encabezamiento y la continuidad con el versículo siguiente.
  spanish_consistency_notes:
  - Se usó «Rey» con mayúscula inicial para preservar el valor titulár del griego anartro en un encabezamiento.
  - Se eligió «sumo sacerdote» como equivalente idiomático de ἀρχιερεύς/ἀρχιερεῖ en español bíblico.
  - Se conservó «amigo de reyes» como fórmula honorífica literal, evitando suavizarla a una expresión más libre.
