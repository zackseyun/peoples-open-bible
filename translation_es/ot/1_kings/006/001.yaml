base_translation:
  language: en
  yaml_path: translation/ot/1_kings/006/001.yaml
  text: And it came about in the four hundred eightieth year after the sons of Israel came out from the land of Egypt[a], in the fourth year, in the month of Ziv (that is, the second month), of Solomon’s reign over Israel[c][b], that he built the house for Yahweh.
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; many English versions render 'the Israelites' or 'the people of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Ziv was the old name of the second month in the Hebrew calendar.
    reason: cultural_note
  - marker: c
    text: Or 'he built the house for the LORD.' The Hebrew verb itself is simply 'built'; 'began to build' makes explicit the commencement sense in context.
    reason: lexical_alternative
