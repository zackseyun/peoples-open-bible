translation:
  language: es
  text: Y se puso entre los muertos y los vivos, y la plaga se detuvo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: And he stood
  chosen_spanish: Y se puso
  alternatives_spanish:
  - Y estuvo de pie
  - Y tomó su lugar
  - Y se mantuvo en pie
  lexicon: HALOT
  rationale: El hebreo עמד expresa estar de pie o colocarse en una posición. En este contexto narrativo, «se puso» comunica de manera natural el acto de situarse en un lugar, sin añadir un matiz militar o retórico no explicitado por el texto.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - en medio de ... y
  - entre ... entre
  lexicon: HALOT
  rationale: La construcción paralela indica separación espacial entre dos grupos. «Entre ... y» reproduce con claridad esa relación en español.
- source_word: הַמֵּתִים
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los muertos de
  - los que habían muerto
  lexicon: HALOT
  rationale: Como sustantivo colectivo, el hebreo señala a los que habían muerto. «Los muertos» conserva la concisión y el contraste directo con «los vivos».
- source_word: הַחַיִּים
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que estaban vivos
  - los que viven
  lexicon: HALOT
  rationale: El adjetivo sustantivado designa a los que aún vivían. «Los vivos» mantiene el paralelismo natural con «los muertos».
- source_word: וַתֵּעָצַר
  english_pob_choice: was stopped
  chosen_spanish: se detuvo
  alternatives_spanish:
  - fue detenida
  - cesó
  - quedó detenida
  lexicon: HALOT
  rationale: עצר en este pasaje indica que el avance de la plaga fue frenado. «Se detuvo» es claro, directo y conserva la idea de interrupción sin sobreexplicar la causa.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - el azote
  - la mortandad
  - la aflicción
  lexicon: HALOT
  rationale: מגפה en contextos de juicio divino refiere a una plaga o mortandad. «La plaga» es la equivalencia más sobria y transparente en español.
theological_decisions:
- issue: Carácter de la mortandad/plaga en el juicio
  english_pob_reading: the plague
  chosen_spanish_reading: la plaga
  alternative_spanish_readings:
  - el azote
  - la mortandad
  - la aflicción
  rationale: El contexto inmediato presenta una calamidad enviada por juicio; «plaga» preserva esa severidad sin añadir interpretación ajena al verso.
  doctrine_reference: Números 17:13; cf. el uso narrativo de מגפה en contextos de juicio
translation_notes:
  revision_awareness: La versión inglesa POB ya quedó sin cambios en su revisión más reciente; este borrador español sigue de cerca el sentido auditado, priorizando equivalencia óptima y claridad narrativa.
  spanish_consistency_notes:
  - Se usa «plaga» de forma consistente para מגפה en este versículo.
  - Se evita «SEÑOR» porque no aparece el nombre divino en el hebreo de este verso.
  - «Los muertos / los vivos» preserva el contraste breve y enfático del hebreo.
