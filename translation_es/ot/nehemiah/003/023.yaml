revisions:
- from: Después de él, Benjamín y Hasub[a] hicieron reparaciones frente a su casa. Después de él, Azarías, hijo de Maaseías, hijo de Ananías, hizo reparaciones junto a su casa.
  to: Después de él, Benjamín y Hasub[a] hicieron reparaciones frente a la casa de ellos. Después de él, Azarías hijo de Maaseías, hijo de Ananías, hizo reparaciones junto a su casa.
  rationale: Se ajusta el primer posesivo para reflejar el plural hebreo y evitar ambigüedad con el singular de la segunda cláusula. También se aligera la puntuación del sintagma patronímico sin alterar el sentido. La nota alternativa del nombre se conserva.
