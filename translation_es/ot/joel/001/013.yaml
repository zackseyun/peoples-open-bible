revisions:
- from: Ceñíos y lamentad, sacerdotes; aullad, ministros del altar. Entrad, pasad la noche en cilicio, ministros de mi Dios, porque se ha retenido la ofrenda vegetal y la libación de la casa de su Dios.
  to: Ceñíos y lamentad[a], sacerdotes; gemid, ministros del altar. Venid, pasad la noche en cilicio, ministros de mi Dios, porque la ofrenda de grano y la ofrenda de bebida han sido retenidas de la casa de vuestro Dios[b].
  rationale: Se corrige 'Entrad' a 'Venid' para reflejar mejor בֹּאוּ; 'su Dios' a 'vuestro Dios' para preservar la segunda persona y la distinción teológica documentada con 'mi Dios'; y la cláusula pasiva a 'han sido retenidas' para concordar naturalmente con el sujeto compuesto. También se ajusta 'aullad' a 'gemid' por mejor español eclesial, y se emplean 'ofrenda de grano' / 'ofrenda de bebida' por mayor claridad sin perder el sentido cultual. Se añaden notas que reflejan las alternativas preservadas en el inglés auditado y la literalidad de 'casa'.
  reviewer_model: gpt-5.4
