    text: O «delante de su casa» para «frente a su casa».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «trabajó» por «hizo reparaciones» para preservar el sentido técnico repetido de הֶחֱזִיק en Nehemías 3. Se mantiene «frente a su casa» como traducción principal de וְנֶגֶד בֵּיתוֹ, pero se mejora la nota alternativa a «delante de su casa», que es más natural y cuidada en español que «en frente de». No se requiere adjudicación especial.
