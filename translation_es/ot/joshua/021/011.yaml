translation:
  language: es
  text: Así les dieron Quiriat-arba (Arba fue el padre de Anac[a]), es decir, Hebrón, en la región montañosa de Judá, junto con sus pastizales alrededor de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Arba, el padre/antepasado de Anac». La expresión hebrea puede indicar paternidad inmediata o una relación de ascendencia más remota.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: So they gave
  chosen_spanish: Así les dieron
  alternatives_spanish:
  - Y les dieron
  - Entonces les dieron
  lexicon: HALOT
  rationale: El wayyiqtol marca sucesión narrativa. «Así les dieron» conserva la conexión con el relato anterior y suena natural en español sin perder el avance del evento.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los levitas
  lexicon: HALOT
  rationale: El pronombre se mantiene como objeto indirecto sin expandirlo en el texto principal; el contexto identifica a los destinatarios.
- source_word: קִרְיַת אַרְבַּע
  english_pob_choice: Kiriath-arba
  chosen_spanish: Quiriat-arba
  alternatives_spanish:
  - Quiriat Arba
  - la ciudad de Arba
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio transliterado al español. «Quiriat-arba» sigue la forma habitual en español bíblico y evita una paráfrasis del sentido literal.
- source_word: אֲבִי הָעֲנֹוק
  english_pob_choice: Arba was the father of Anak
  chosen_spanish: Arba fue el padre de Anac
  alternatives_spanish:
  - Arba fue el antepasado de Anac
  - Arba, padre de Anac
  lexicon: HALOT
  rationale: La relación genealógica se expresa de forma directa. «Padre» conserva la fuerza lexical del hebreo; se mantiene la posibilidad de una relación genealógica más amplia en nota, como en el audit trail inglés.
- source_word: הִיא חֶבְרוֹן
  english_pob_choice: that is, Hebron
  chosen_spanish: es decir, Hebrón
  alternatives_spanish:
  - o sea, Hebrón
  - esto es, Hebrón
  lexicon: HALOT
  rationale: La cláusula explicativa identifica Quiriat-arba con Hebrón. «Es decir» reproduce el valor epexegético de manera clara y natural.
- source_word: בְּהַר יְהוּדָה
  english_pob_choice: in the hill country of Judah
  chosen_spanish: en la región montañosa de Judá
  alternatives_spanish:
  - en la serranía de Judá
  - en la región de los montes de Judá
  lexicon: HALOT
  rationale: Aquí הַר designa la zona alta/accidentada, no una sola montaña. «Región montañosa de Judá» comunica el sentido geográfico con precisión en español.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus terrenos de pastoreo
  - sus praderas
  lexicon: HALOT
  rationale: מִגְרָשׁ alude al terreno abierto alrededor de la ciudad, especialmente para uso ganadero. «Pastizales» es una opción clara y bastante literal en español contemporáneo.
- source_word: סְבִיבֹתֶיהָ
  english_pob_choice: around it
  chosen_spanish: alrededor de ella
  alternatives_spanish:
  - en torno a ella
  - a su alrededor
  lexicon: HALOT
  rationale: Se conserva la referencia espacial de contorno. «Alrededor de ella» es natural y mantiene el enlace con «sus pastizales».
theological_decisions:
- issue: Referencia genealógica de Arba con relación a Anac
  english_pob_reading: Arba was the father of Anak; the Hebrew may denote immediate fatherhood or a more remote forefather relationship.
  chosen_spanish_reading: Arba fue el padre de Anac, con la posibilidad de que la expresión abarque una relación ancestral más amplia.
  alternative_spanish_readings:
  - Arba fue el antepasado de Anac
  - Arba, padre o antepasado de Anac
  rationale: El texto principal conserva la forma más directa («padre») porque esa es la lectura lexical primaria. La amplitud semántica se preserva en la nota para no borrar la tensión documentada entre paternidad inmediata y ascendencia remota.
  doctrine_reference: Génesis 10; Josué 14:15; nota lexical sobre parentesco genealógico
- issue: Topónimo Quiriat-arba identificado con Hebrón
  english_pob_reading: Kiriath-arba ... that is, Hebron
  chosen_spanish_reading: Quiriat-arba, es decir, Hebrón
  alternative_spanish_readings:
  - Quiriat-arba, o sea, Hebrón
  - la ciudad de Arba, es decir, Hebrón
  rationale: La frase epexegética se mantiene sin diluir el dato histórico-geográfico. No se sustituye el topónimo por una explicación genérica porque el texto distingue ambos nombres y los identifica.
  doctrine_reference: Josué 15:13-14; 20:7
- issue: Expresión territorial de בְּהַר יְהוּדָה
  english_pob_reading: in the hill country of Judah
  chosen_spanish_reading: en la región montañosa de Judá
  alternative_spanish_readings:
  - en la serranía de Judá
  - en los montes de Judá
  rationale: Se evita una lectura de «monte» singular que sería engañosa en español. La decisión preserva el referente territorial del hebreo.
  doctrine_reference: Josué 11:21; 14:6
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado proporcionado y el audit trail inglés sin cambios sustantivos; no se registraron revisiones aplicadas en la fuente inglesa. La formulación española intenta conservar las ambigüedades documentadas, especialmente la relación genealógica de Arba y el valor territorial de «en la región montañosa».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en otros contextos del proyecto; este versículo no lo contiene.
  - Se mantiene «Quiriat-arba» como topónimo transliterado, no como traducción literal «ciudad de Arba», para respetar el uso consolidado.
  - Se ha preferido «padre» en el cuerpo y una nota de alternativa para no borrar la tensión lexical documentada.
  - «Pastizales» se eligió por claridad; en otros contextos del proyecto puede alternar con «terrenos de pastoreo» según el valor territorial preciso.
