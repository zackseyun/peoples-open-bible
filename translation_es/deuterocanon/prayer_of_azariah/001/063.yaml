review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro auditado en los elementos principales: conserva «espíritus y almas», mantiene «Bendecid» para εὐλογεῖτε y refleja el matiz hímnico de ὑμνεῖτε. Sin embargo, «exaltadlo sobre toda medida» añade una expansión no presente explícitamente en ὑπερυψοῦτε, y «por los siglos» es fiel pero menos natural en español contemporáneo del proyecto que «para siempre», especialmente dado que la nota ya preserva la alternativa más literal.'
  spanish_quality_summary: El español es en general claro y digno, pero «Bendecid / entonad / exaltad» suena marcadamente peninsular y algo menos neutral para un objetivo latinoamericano amplio. Aun manteniendo un registro bíblico, «Bendigan / canten himnos / exáltenlo» mejora la legibilidad panhispánica. «Exaltadlo sobre toda medida» suena algo forzado; «exáltenlo en gran manera» o similar fluye mejor sin perder intensidad. También conviene alinear la nota [b] con el lugar donde aparece la frase doxológica en el texto español.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto en cuanto a κύριος -> «Señor». La decisión de mantener «espíritus y almas» está bien alineada con el rationale teológico. La principal mejora es de estilo-meta del proyecto: preferir un español neutral latinoamericano y una expresión doxológica natural («para siempre») mientras se conserva en nota la literalidad griega «por los siglos».'
  issues:
  - severity: medium
    issue: Registro verbal demasiado peninsular para el objetivo de español neutral
    rationale: «Bendecid», «entonad» y «exaltadlo» son correctos, pero el encargo pide español neutral latinoamericano / ampliamente legible en iglesia. El imperativo en -d puede sentirse regional o arcaizante.
  - severity: medium
    issue: «Exaltadlo sobre toda medida» sobretraduce ὑπερυψοῦτε
    rationale: El griego intensifica «exaltar», pero no contiene una locución equivalente a «sobre toda medida». Es mejor una intensificación más directa y menos interpretativa.
  - severity: low
    issue: La nota [b] está anclada en «justos» aunque explica la fórmula final
    rationale: El marcador debe aparecer junto a la frase relevante para evitar ambigüedad y ajustarse mejor a la disciplina de notas.
  revised_spanish_text: Bendigan al Señor, espíritus y almas de los justos; canten himnos y exáltenlo en gran manera para siempre[a].
