id: JOS.11.20
reference: Joshua 11:20
source:
  edition: WLC
  text: כִּ֣י מֵ/אֵ֣ת יְהוָ֣ה הָיְתָ֡ה לְ/חַזֵּ֣ק אֶת לִבָּ/ם֩ לִ/קְרַ֨את הַ/מִּלְחָמָ֤ה אֶת יִשְׂרָאֵל֙ לְמַ֣עַן הַֽחֲרִימָ֔/ם לְ/בִלְתִּ֥י הֱיוֹת לָ/הֶ֖ם תְּחִנָּ֑ה כִּ֚י לְמַ֣עַן הַשְׁמִידָ֔/ם כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה׀־־־־׃ס
translation:
  text: For it was from Yahweh to harden their hearts to meet Israel in battle[a], so that he might devote them to destruction, so that there would be no mercy for them, but so that he might destroy them[c][b], just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to strengthen their hearts.' Here the sense is that the LORD made them resolute in opposition, that is, hardened them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'devote them to destruction,' a technical term for placing something under the ban for judgment; alternatively, 'utterly destroy them' or 'put them under the ban.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that they would have no mercy' or 'so that there would be no supplication for them.' The Hebrew phrase is compact and may refer to the absence of any plea or grant of mercy.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  - from the LORD's hand
  lexicon: HALOT
  rationale: Expresses source/origin. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לְחַזֵּק אֶת לִבָּם
  chosen: to harden their hearts
  alternatives:
  - to strengthen their hearts
  - to make their hearts strong
  lexicon: HALOT
  rationale: Though חזק literally means 'strengthen,' in this context of divinely causing obstinacy in the face of judgment, 'harden their hearts' best captures the idiomatic force in English and the theological parallel to other hardening texts.
- source_word: לִקְרַאת הַמִּלְחָמָה אֶת יִשְׂרָאֵל
  chosen: to meet Israel in battle
  alternatives:
  - to come against Israel in battle
  - to encounter Israel for war
  lexicon: HALOT
  rationale: לִקְרַאת with warfare language indicates hostile engagement. 'Meet Israel in battle' is concise and natural while preserving the military sense.
- source_word: לְמַעַן הַחֲרִימָם
  chosen: so that he might devote them to destruction
  alternatives:
  - so that he might utterly destroy them
  - so that he might put them under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing under the ban/devoting to destruction. 'Devote them to destruction' preserves the technical covenant-judgment sense better than the flatter 'utterly destroy.'
- source_word: לְבִלְתִּי הֱיוֹת לָהֶם תְּחִנָּה
  chosen: so that there would be no plea for mercy for them
  alternatives:
  - so that they would receive no mercy
  - so that there would be no favor for them
  - so that there would be no supplication for them
  lexicon: HALOT
  rationale: תְּחִנָּה is 'supplication/plea for favor.' The phrase is difficult; this rendering preserves the noun's sense of an appeal for mercy without overinterpreting who would make the plea.
- source_word: לְמַעַן הַשְׁמִידָם
  chosen: but so that he might destroy them
  alternatives:
  - so that he might exterminate them
  - so that he might wipe them out
  lexicon: HALOT
  rationale: שמד denotes destruction/annihilation. 'Destroy' is strong, clear modern English and avoids unnecessarily loaded or colloquial alternatives.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks correspondence with prior command. Pluperfect 'had commanded' fits the narrative sequence.
