translation:
  language: es
  text: Como un hombre a quien consuela su madre[a], así yo los consolaré; y en Jerusalén serán consolados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como uno a quien consuela su madre». El hebreo dice literalmente «hombre» (אִישׁ), con lenguaje masculino representativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּאִישׁ
  english_pob_choice: As one
  chosen_spanish: Como un hombre
  alternatives_spanish:
  - Como uno
  - Como alguien
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ, un sustantivo masculino singular que introduce la comparación. En español, «un hombre» conserva con claridad la forma masculina representativa del original. «Uno» o «alguien» neutralizan más el rasgo formal del hebreo; por eso se reservan como alternativas interpretativas.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  - el cual
  lexicon: HALOT
  rationale: La relativa introduce el complemento del verbo «consuela». En español, «a quien» refleja bien la relación objetiva y suena natural en una construcción comparativa.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - su propia madre
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se expresa de forma natural en español con «su madre». El contexto hace claro que el antecedente es el «hombre» de la comparación.
- source_word: תְּנַחֲמֶנּוּ
  english_pob_choice: comforts
  chosen_spanish: consuela
  alternatives_spanish:
  - conforta
  - alivia
  lexicon: HALOT
  rationale: El verbo נחם en pi‘el expresa consuelo activo. «Consuela» es el equivalente español más natural y mantiene la repetición léxica con las demás formas del versículo.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de la misma manera
  lexicon: HALOT
  rationale: Marca la correspondencia de la comparación. «Así» es la forma más directa y fiel en español.
- source_word: אָֽנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente da énfasis al sujeto divino. En español, el sujeto explícito «yo» basta para conservar la fuerza enfática sin sobrecargar la frase.
- source_word: אֲנַחֶמְכֶם
  english_pob_choice: will comfort you
  chosen_spanish: los consolaré
  alternatives_spanish:
  - los confortaré
  - les daré consuelo
  lexicon: HALOT
  rationale: Se preserva el mismo campo léxico de נחם con «consolaré». El objeto plural de segunda persona se vierte como «los» en español latinoamericano bíblico para un grupo masculino o mixto, manteniendo la referencia colectiva del texto.
- source_word: וּבִירוּשָׁלַם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y en la ciudad de Jerusalén
  - y dentro de Jerusalén
  lexicon: HALOT
  rationale: La preposición ב indica localización. «En Jerusalén» es la equivalencia más natural y conserva el lugar concreto de la promesa.
- source_word: תְּנֻחָמוּ
  english_pob_choice: you will be comforted
  chosen_spanish: serán consolados
  alternatives_spanish:
  - recibirán consuelo
  - serán consolados y confortados
  lexicon: HALOT
  rationale: La forma pasiva/reflexiva del mismo verbo se reproduce con «serán consolados», que mantiene tanto el sentido pasivo como la repetición terminológica del versículo.
theological_decisions:
- issue: Tratamiento del lenguaje masculino representativo en la comparación
  english_pob_reading: Retain 'one' in the main text while footnoting the masculine Hebrew form
  chosen_spanish_reading: Mantener «un hombre» en el texto principal, con nota sobre el valor representativo
  alternative_spanish_readings:
  - Como uno a quien consuela su madre
  - Como alguien a quien consuela su madre
  rationale: El hebreo usa אִישׁ, un masculino singular explícito. Aunque el inglés revisado prefirió «one» por naturalidad, el español puede conservar con buena fluidez «un hombre» sin perder intelligibilidad. Así se respeta la forma del original y el valor representativo de la comparación.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto sobre exactitud de género y forma
translation_notes:
  revision_awareness: La revisión inglesa cambió de «a man» a «one» para hacer más natural e inclusivo el símil, sin alterar el sentido. La versión española mantiene la referencia masculina explícita del hebreo («un hombre») porque en español sigue siendo natural y conserva mejor la forma del original; la nota ofrece la alternativa neutral equivalente.
  spanish_consistency_notes:
  - Se conserva el verbo «consolar» en las tres apariciones del raíz נחם para reflejar la repetición del hebreo.
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí el hebreo tiene formas verbales de primera persona divina sin el tetragrámaton explícito, por lo que no aparece.
  - «Jerusalén» se mantiene como topónimo tradicional y transparente.
  - El objeto plural «los» sigue la convención bíblica en español para un grupo masculino o mixto, sin forzar un singular genérico.
