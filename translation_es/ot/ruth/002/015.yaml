  source_alignment_summary: 'El borrador conserva bien la secuencia narrativa y el sentido básico del hebreo: Rut se levanta para espigar, Booz da una orden a sus trabajadores, permite que espigue entre las gavillas y prohíbe que la traten de manera vergonzosa. Sin embargo, el anclaje y contenido de las notas no siguen fielmente la auditoría inglesa: la nota [a] repite la traducción principal en vez de reflejar la alternativa documentada para וַתָּקָם/לְלַקֵּט, y la nota [b] debería preservar la alternativa del verbo תַכְלִימוּהָ, no la de «entre/among».'
