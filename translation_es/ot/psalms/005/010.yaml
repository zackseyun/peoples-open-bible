  - 'Se prefirió terminología bíblica clara y moderna: «boca», «interior», «sepulcro», «garganta», «halagan».'
  - Se evitó el reemplazo de la imaginería corporal por paráfrasis doctrinales más abstractas para no perder el paralelismo del texto fuente.
