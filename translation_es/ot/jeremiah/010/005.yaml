base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/005.yaml
  text: They are like a scarecrow in a cucumber field[a], and they cannot speak; they must be carried, because they cannot walk. Do not fear them, for they cannot do harm[b], nor can they do good.
  footnotes:
