translation:
  language: es
  text: Es imposible pasar por alto el dominio de la razón[a], pues prevalecieron sobre la pasión y los dolores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la mente» para διάνοια. El término griego puede denotar mente o entendimiento; aquí probablemente destaca la facultad racional que gobierna las pasiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔστιν
  english_pob_choice: It is impossible
  chosen_spanish: Es imposible
  alternatives_spanish:
  - No es posible
  - No se puede
  lexicon: LSJ
  rationale: La construcción impersonal expresa imposibilidad, no mera negación. «Es imposible» reproduce con naturalidad ese valor en español.
- source_word: παριδεῖν
  english_pob_choice: to overlook
  chosen_spanish: pasar por alto
  alternatives_spanish:
  - desatender
  - ignorar
  lexicon: LSJ
  rationale: El verbo indica pasar de largo o no tomar en cuenta. «Pasar por alto» conserva la idea de no poder ignorar algo.
- source_word: ἡγεμονίαν
  english_pob_choice: the rule
  chosen_spanish: el gobierno
  alternatives_spanish:
  - el dominio
  - la soberanía
  - la autoridad rectora
  lexicon: LSJ
  rationale: En contexto la palabra apunta a la función rectora de la razón sobre las pasiones. «Gobierno» comunica esa dirección activa sin sobrecargar el verso.
- source_word: τῆς διανοίας
  english_pob_choice: of reason
  chosen_spanish: de la razón
  alternatives_spanish:
  - de la mente
  - del entendimiento
  - del pensamiento
  lexicon: LSJ
  rationale: En 4 Macabeos, διάνοια participa del argumento sobre la facultad racional que gobierna los impulsos. «Razón» es la equivalencia más precisa para esa carga ética y filosófica.
- source_word: ἐπεκράτησαν
  english_pob_choice: they prevailed over
  chosen_spanish: prevalecieron sobre
  alternatives_spanish:
  - vencieron a
  - se impusieron sobre
  - dominaron sobre
  lexicon: LSJ
  rationale: El verbo expresa superioridad o victoria sobre algo. «Prevalecieron sobre» sigue de cerca la fuerza del griego y mantiene el tono formal.
- source_word: πάθους
  english_pob_choice: passion
  chosen_spanish: la pasión
  alternatives_spanish:
  - las pasiones
  - el impulso
  - la emoción
  lexicon: LSJ
  rationale: En esta obra πάθος suele referirse a la pasión como impulso irracional. El singular español puede funcionar de modo colectivo y conserva el registro filosófico.
- source_word: πόνων
  english_pob_choice: pains
  chosen_spanish: los dolores
  alternatives_spanish:
  - los tormentos
  - los sufrimientos
  - las penas
  lexicon: LSJ
  rationale: El término alude a dolores corporales padecidos en el tormento. «Dolores» es cercano al griego y claro en español, sin añadir interpretación excesiva.
theological_decisions:
- issue: Cómo traducir διάνοια sin borrar el énfasis de 4 Macabeos en la facultad racional gobernante
  english_pob_reading: of reason
  chosen_spanish_reading: de la razón
  alternative_spanish_readings:
  - de la mente
  - del entendimiento
  rationale: La obra sostiene que la razón piadosa domina las pasiones. Traducir διάνοια como «razón» preserva mejor esa tesis que un término más amplio como «mente» y evita desplazar el argumento hacia categorías posteriores.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que afinó ἐπεκράτησαν hacia una forma más directa y natural («prevailed over»). En español, «prevalecieron sobre» conserva esa misma relación de dominio sin perder formalidad.
  spanish_consistency_notes:
  - Se mantiene «razón» para διάνοια, coherente con el énfasis filosófico-ético del libro.
  - Se evita «SEÑOR» u այլ vocabulario litúrgico porque no corresponde a este verso.
  - «Prevalecieron sobre» preserva la relación de superioridad sobre pasiones y dolores en dos ámbitos distintos.
  - La puntuación con dos miembros coordinados reproduce la estructura correlativa del griego.
