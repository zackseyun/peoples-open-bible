translation:
  language: es
  text: Y después de destruir siete naciones en la tierra de Canaán[a], les dio su tierra como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les asignó su tierra en herencia». El verbo griego puede destacar la distribución o asignación por herencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθελὼν
  english_pob_choice: after destroying
  chosen_spanish: destruir
  alternatives_spanish:
  - derrocar
  - derribar
  - vencer
  lexicon: BDAG
  rationale: En este contexto de conquista histórica, el participio aoristo expresa una acción decisiva de eliminación de los pueblos cananeos. «Destruir» conserva esa fuerza con naturalidad en español; «derrocar» o «derribar» suenan menos precisos para naciones.
- source_word: ἔθνη ἑπτὰ
  english_pob_choice: seven nations
  chosen_spanish: siete naciones
  alternatives_spanish:
  - siete pueblos
  lexicon: BDAG
  rationale: ἔθνη puede significar «naciones» o «pueblos». Aquí, como en el inglés POB, «naciones» comunica mejor el marco histórico y conser va la correspondencia directa con el plural griego.
- source_word: ἐν γῇ Χανάαν
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: BDAG
  rationale: El griego incluye explícitamente γῇ, «tierra/land», por lo que conviene conservarlo en español y no resumir simplemente a «en Canaán».
- source_word: κατεκληρονόμησεν
  english_pob_choice: he gave them their land as an inheritance
  chosen_spanish: les dio su tierra como herencia
  alternatives_spanish:
  - les repartió su tierra como herencia
  - les asignó su tierra como herencia
  lexicon: BDAG
  rationale: El verbo puede enfatizar la asignación o distribución por herencia/lote. En este contexto, la idea es que Dios entregó la tierra conquistada como herencia; el español «les dio su tierra como herencia» comunica la función hereditaria sin forzar una paráfrasis técnica.
- source_word: τὴν γῆν αὐτῶν
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra de ellos
  - su territorio
  lexicon: BDAG
  rationale: αὐτῶν se refiere a las siete naciones mencionadas. «Su tierra» es la forma más natural y directa en español, manteniendo el referente implícito.
theological_decisions:
- issue: Sujeto implícito y destinatario de la herencia
  english_pob_reading: God is the subject of both actions, and the land of the seven nations is given to Israel as an inheritance.
  chosen_spanish_reading: Dios es el sujeto implícito de ambas acciones, y la tierra de las siete naciones fue dada a Israel como herencia.
  alternative_spanish_readings:
  - él repartió su tierra
  - les asignó su tierra
  rationale: El contexto histórico de Hechos presenta las acciones de Dios en la historia de Israel. Aunque el griego no explicita el objeto indirecto, el sentido requiere entender que la tierra fue entregada a Israel; la redacción española conserva esa lectura sin añadir doctrina ajena al texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El cotejo con el contexto auditado en inglés muestra acuerdo general alto. La única tensión relevante es la forma de expresar el valor de κατακληρονομέω; se mantiene la misma solución interpretativa del POB inglés, pero en español se opta por una formulación más natural y breve («les dio su tierra como herencia») sin perder la noción de herencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se preserva «tierra de Canaán» por la presencia explícita de γῇ, evitando la reducción a un mero topónimo.
  - La nota al pie recoge la alternativa hereditaria porque el griego admite esa oscilación semántica y el inglés POB la documenta.
