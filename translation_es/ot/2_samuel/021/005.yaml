base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/021/005.yaml
  text: They said to the king[a], “The man who consumed us, and who planned against us[b], so that we should be destroyed from remaining within all the territory of Israel—”
  footnotes:
  - marker: a
    text: Or, 'who devised against us.' The Hebrew verb can carry the sense of planning or scheming.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from standing/establishing ourselves in all the territory of Israel,' that is, from continuing to have a place anywhere in Israel.
    reason: lexical_alternative
