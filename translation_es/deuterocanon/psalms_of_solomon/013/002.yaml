translation:
  language: es
  text: El brazo del Señor nos salvó de la espada que pasaba[a], de la hambruna y de la muerte de los pecadores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que pasaba por».'
    reason: lexical_alternative
  - marker: b
    text: 'O posiblemente: «la muerte para los pecadores» o «la muerte traída por los pecadores».'
    reason: alternative_reading
lexical_decisions:
- source_word: βραχίων
  english_pob_choice: arm
  chosen_spanish: brazo
  alternatives_spanish:
  - brazo
  - fuerza
  - poder
  lexicon: LSJ
  rationale: Mantiene la metáfora corporal del original, de modo natural en español bíblico, sin abstraer prematuramente a 'fuerza' o 'poder'.
- source_word: Κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  - el Dueño
  lexicon: LSJ
  rationale: '''Señor'' expresa el título divino de κύριος de forma clara y reverente en español, sin introducir una convención de mayúsculas distinta a la línea inglesa.'
- source_word: ἔσωσεν
  english_pob_choice: saved
  chosen_spanish: nos salvó
  alternatives_spanish:
  - nos libró
  - nos rescató
  lexicon: LSJ
  rationale: '''Salvar'' es la correspondencia más directa y conserva el peso religioso de la liberación divina.'
- source_word: ῥομφαίας
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  - la gran espada
  - el filo
  lexicon: LSJ
  rationale: '''Espada'' es el equivalente normal de ῥομφαία; el artículo definido conserva la referencia a una amenaza conocida o tipificada en el contexto.'
- source_word: διαπορευομένης
  english_pob_choice: passing through
  chosen_spanish: que pasaba
  alternatives_spanish:
  - que pasaba por
  - que atravesaba
  - en paso
  lexicon: LSJ
  rationale: Refleja el movimiento continuo del participio con una construcción española fluida. 'Pasaba' conserva la idea de tránsito sin forzar un giro demasiado interpretativo.
- source_word: λιμοῦ
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambre
  - hambruna
  lexicon: LSJ
  rationale: Aunque 'hambruna' puede sonar más cercano a 'famine', el singular del griego permite 'hambre' en una lista de calamidades; no obstante, la opción queda abierta en alternativa para quien prefiera mayor intensidad catastrófica.
- source_word: θανάτου
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte
  - destrucción
  lexicon: LSJ
  rationale: '''Muerte'' sigue de cerca el sentido léxico básico del sustantivo griego.'
- source_word: ἁμαρτωλῶν
  english_pob_choice: of sinners
  chosen_spanish: de los pecadores
  alternatives_spanish:
  - de los pecadores
  - para los pecadores
  - traída por los pecadores
  lexicon: LSJ
  rationale: La genitividad permanece transparente en español. 'Pecadores' es la forma natural para ἁμαρτωλῶν y evita diluir el término moral.
theological_decisions:
- issue: Genitivo compacto en 'θανάτου ἁμαρτωλῶν'
  english_pob_reading: the death of sinners
  chosen_spanish_reading: la muerte de los pecadores
  alternative_spanish_readings:
  - la muerte para los pecadores
  - la muerte traída por los pecadores
  rationale: El griego no especifica con precisión si el genitivo es posesivo, destinatario o causal/agente. La lectura principal conserva esa tensión sin resolverla, como en el texto inglés auditado.
  doctrine_reference: Preservar la ambigüedad sintáctica y teológica del genitivo sin sobreinterpretarlo.
translation_notes:
  revision_awareness: El texto inglés auditado revisó 'sweeping through' a 'passing through' para una representación más directa de διαπορευομένης. La versión española sigue esa línea con 'que pasaba', manteniendo una formulación formal y transparente. También conserva la ambigüedad del genitivo final, tal como el audit trail inglés pidió no resolverla más allá del griego.
  spanish_consistency_notes:
  - Usé 'Señor' para Κυρίου conforme al equivalente divino estándar en español, sin reemplazarlo por 'Yahvé' porque aquí el griego presenta κύριος de forma titular en una construcción fija.
  - '''Brazo'' conserva la metáfora concreta del original y armoniza con el estilo bíblico en español.'
  - Mantuve 'muerte de los pecadores' en el cuerpo del texto para respetar la ambigüedad sintáctica; las notas ofrecen alternativas sin imponer una interpretación.
