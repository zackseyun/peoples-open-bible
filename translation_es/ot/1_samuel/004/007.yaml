translation:
  language: es
  text: 'Los filisteos tuvieron miedo[a], porque dijeron: «Dios ha entrado en el campamento». Y dijeron: «¡Ay de nosotros! Porque nada como esto ha sucedido antes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un dios ha entrado en el campamento»; el sustantivo hebreo es morfológicamente plural, pero el verbo acompañante es singular, lo que apoya la lectura principal «Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּֽרְאוּ
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - temieron
  - se asustaron
  lexicon: HALOT
  rationale: La forma narrativa expresa una reacción inmediata de temor. «Tuvieron miedo» comunica con naturalidad ese estado emocional sin arcaísmo y conserva la fuerza del verbo.
- source_word: הַפְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Designación étnica estándar; en español bíblico actual es clara y natural.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la causa del miedo en el discurso narrativo. «Porque» es la opción más clara y natural en español.
- source_word: אָמְרוּ
  english_pob_choice: they said
  chosen_spanish: decían
  alternatives_spanish:
  - dijeron
  lexicon: HALOT
  rationale: El hebreo repite el habla como parte de la escena; el imperfecto español puede reflejar mejor el carácter de la proclamación en curso. «Dijeron» también sería posible, pero «decían» conserva mejor el tono narrativo repetido.
- source_word: בָּא אֱלֹהִים
  english_pob_choice: God has come
  chosen_spanish: Dios ha entrado
  alternatives_spanish:
  - Dios ha venido
  - un dios ha entrado
  - los dioses han entrado
  lexicon: HALOT
  rationale: El verbo singular de בָּא apoya un referente singular, por eso se traduce «Dios». «Ha entrado» expresa bien la llegada al campamento como entrada en un lugar, y evita la rigidez de «ha venido» en este contexto espacial. Se preserva así la tensión documentada entre la morfología plural de אֱלֹהִים y el verbo singular.
- source_word: אֶל הַמַּחֲנֶה
  english_pob_choice: into the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - al campamento
  - dentro del campamento
  lexicon: HALOT
  rationale: En español, con «entrar», la preposición simple «en» expresa de modo natural la llegada a un lugar. «En el campamento» transmite la idea de ingreso sin forzar un calco.
- source_word: א֣וֹי לָנוּ
  english_pob_choice: Woe to us!
  chosen_spanish: ¡Ay de nosotros!
  alternatives_spanish:
  - ¡Ay de nosotros!
  - ¡Ay para nosotros!
  lexicon: HALOT
  rationale: Es el equivalente idiomático español más natural para una exclamación de desventura o angustia.
- source_word: לֹא הָיְתָה כָּזֹאת
  english_pob_choice: nothing like this has happened
  chosen_spanish: nada como esto había sucedido
  alternatives_spanish:
  - no ha habido nada como esto
  - nunca había sucedido algo así
  lexicon: HALOT
  rationale: La expresión idiomática comunica la idea de un acontecimiento sin precedente. El pluscuamperfecto español encaja bien con el valor retrospectivo de «antes» al final del versículo.
- source_word: אֶתְמוֹל שִׁלְשֹׁם
  english_pob_choice: before
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - ayer o anteayer
  lexicon: HALOT
  rationale: La locución hebrea es un modismo que significa «anteriormente / antes», no una referencia literal restringida a dos días. «Antes» reproduce ese valor de manera concisa.
theological_decisions:
- issue: Renderizar אֱלֹהִים en el discurso de los filisteos
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - dioses
  rationale: El verbo singular בָּא favorece un referente singular; por eso se mantiene «Dios» en el texto principal. Al mismo tiempo, el plural morfológico de אֱלֹהִים y el hecho de que hablen filisteos justifican conservar la alternativa en nota para no borrar la tensión textual.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios de revisión pendientes; la decisión clave se mantiene en agreement alto: singular semántico para אֱלֹהִים por el verbo singular, con nota que preserva la tensión morfológica.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים cuando el verbo singular lo exige, sin borrar la posibilidad alternativa en nota.
  - Se usó un español bíblico moderno y claro, evitando calcos rígidos como «a el campamento» o fórmulas arcaizantes.
  - La exclamación «¡Ay de nosotros!» conserva el valor de lamento del hebreo.
  - «Antes» traduce el modismo temporal sin literalizar «ayer y anteayer».
