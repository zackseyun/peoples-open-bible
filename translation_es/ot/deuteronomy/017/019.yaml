translation:
  language: es
  text: Y estará con él, y leerá en él[a] todos los días de su vida, para que aprenda a temer a Yahvé su Dios, a guardar todas las palabras de esta ley y estos estatutos[b][c], para hacerlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «leer de él». El hebreo dice literalmente «leer en él».
    reason: lexical_alternative
  - marker: b
    text: O «reverenciar a Yahvé su Dios».
    reason: lexical_alternative
  - marker: c
    text: «Yahvé» traduce el nombre divino YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיְתָה עִמּוֹ
  english_pob_choice: And it shall be with him
  chosen_spanish: Y estará con él
  alternatives_spanish:
  - Y permanecerá con él
  - Y estará junto a él
  lexicon: HALOT
  rationale: El hebreo expresa posesión/presencia continua de la copia de la ley. «Estará con él» comunica esa cercanía de modo natural y mantiene la continuidad implícita sin añadir más de lo que dice el texto.
- source_word: וְקָרָא בוֹ
  english_pob_choice: and he shall read in it
  chosen_spanish: y leerá en él
  alternatives_spanish:
  - y leerá de él
  - y lo leerá
  lexicon: HALOT
  rationale: La preposición בּוֹ se conserva con «en él», reflejando de forma directa la construcción hebrea y la idea de leer dentro del rollo o copia escrita. Es fiel y comprensible en español.
- source_word: כָּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - toda su vida
  lexicon: HALOT
  rationale: Es la equivalencia más natural y exacta para la expresión hebrea de duración vitalicia, manteniendo el énfasis formal del original.
- source_word: לְמַעַן יִלְמַד
  english_pob_choice: so that he may learn
  chosen_spanish: para que aprenda
  alternatives_spanish:
  - a fin de que aprenda
  - para aprender
  lexicon: HALOT
  rationale: Expresa bien la finalidad del verbo hebreo y suena natural en español moderno, sin perder el matiz teleológico.
- source_word: לְיִרְאָה אֶת יְהוָה אֱלֹהָיו
  english_pob_choice: to fear Yahweh his God
  chosen_spanish: a temer a Yahvé su Dios
  alternatives_spanish:
  - a reverenciar a Yahvé su Dios
  - a temer y reverenciar a Yahvé su Dios
  lexicon: HALOT
  rationale: «Temer» conserva la fuerza covenantal de ירא, que incluye temor reverente y sumisión obediente. Se mantiene «Yahvé» por el valor del Nombre divino en el texto hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» es el equivalente español transparente y consistente con el texto fuente.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: a guardar
  alternatives_spanish:
  - a observar
  - a custodiar
  lexicon: HALOT
  rationale: «Guardar» es el verbo más natural y fiel en español bíblico para שׁמר en contexto legal/covenantal, conservando la idea de observar fielmente.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  english_pob_choice: all the words of this law
  chosen_spanish: todas las palabras de esta ley
  alternatives_spanish:
  - todas las palabras de esta instrucción
  - todas las palabras de esta Torá
  lexicon: HALOT
  rationale: «Ley» responde al uso de תּוֹרָה en Deuteronomio dentro del marco legal pactal y es claro para lectores en español. «Palabras» conserva דִּבְרֵי de manera literal.
- source_word: הַחֻקִּים הָאֵלֶּה
  english_pob_choice: these statutes
  chosen_spanish: estos estatutos
  alternatives_spanish:
  - estas ordenanzas
  - estos decretos
  lexicon: HALOT
  rationale: «Estatutos» mantiene el término técnico legal y su paralelismo con «ley». Es la opción más estable y transparente para חֻקִּים.
- source_word: לַעֲשֹׂתָם
  english_pob_choice: to do them
  chosen_spanish: para cumplirlos
  alternatives_spanish:
  - para hacerlos
  - para ponerlos por obra
  lexicon: HALOT
  rationale: En español, «cumplirlos» expresa de manera idiomática la idea de ejecutar/observar mandamientos. Aunque el hebreo es literalmente «hacerlos», esta elección comunica mejor la finalidad normativa sin perder el sentido.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente יְהוָה. En esta línea del proyecto, se preserva el Nombre propio con una forma española transparente en vez de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de ירא en contexto de pacto
  english_pob_reading: fear
  chosen_spanish_reading: temer
  alternative_spanish_readings:
  - reverenciar
  - sentir reverencia por
  rationale: El mandato está ligado al aprendizaje continuo de la ley. «Temer» conserva la tensión bíblica de reverencia, obediencia y temor santo; «reverenciar» suaviza demasiado el campo semántico.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Sentido jurídico de תּוֹרָה y חֻקִּים
  english_pob_reading: law / statutes
  chosen_spanish_reading: ley / estatutos
  alternative_spanish_readings:
  - instrucción / decretos
  - Torá / decretos
  rationale: En Deuteronomio, תּוֹרָה se integra bien como «ley» en este contexto pactal, y חֻקִּים como «estatutos» mantiene el par legal tradicional sin borrar su precisión semántica.
  doctrine_reference: DOCTRINE.md lexical policy on legal-covenantal terms
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada en inglés y no introduce cambios de revisión posteriores; mantiene las decisiones estables del pasaje y sólo ajusta la expresión al español natural, preservando la tensión léxica de leer «en él», temer a Yahvé y guardar/cumplir los mandamientos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la distinción entre «ley» y «estatutos» como términos legales complementarios.
  - «Temer» se usa en sentido reverente/covenantal, no como miedo meramente psicológico.
  - «Guardar» y «cumplir» reparten dos verbos hebreos distintos sin aplanarlos a una sola idea.
