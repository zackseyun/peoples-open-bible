theological_decisions:
- issue: Referent of the feminine suffix in בָּהּ ('against it/in it')
  chosen_reading: The suffix refers to Tyre from the immediate preceding context, so the clause describes Nebuchadnezzar's labor in the campaign against Tyre.
  alternative_readings:
  - The suffix refers more generally to the military service itself or to the task/work
  rationale: Verses 18–19 discuss Nebuchadnezzar's hard service against Tyre and Egypt as compensation. Reading the suffix as Tyre best fits the discourse flow and explains why Egypt is given as wages.
- issue: Agency in 'they worked for me'
  chosen_reading: Nebuchadnezzar and his forces are said to have worked for YHWH in the sense of serving as instruments of divine judgment.
  alternative_readings:
  - They acted for their own imperial aims only, with no implication of divine service
  rationale: The verse explicitly grounds Egypt as payment in the fact that 'they worked for me.' The translation preserves this theological claim without expanding it into a broader doctrine of approval or covenant relationship.
  doctrine_reference: Preserve theological tension rather than resolve it
