translation:
  language: es
  text: Entonces uno de los serafines voló hacia mí, y en su mano había una brasa encendida[a] que había tomado del altar con unas tenazas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una brasa viva». El término hebreo puede denotar una piedra caliente o un carbón encendido tomado del altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעָף
  english_pob_choice: flew
  chosen_spanish: voló
  alternatives_spanish:
  - vino volando
  - se lanzó volando
  lexicon: HALOT
  rationale: El verbo expresa movimiento volador; «voló» es la forma directa y natural en español. «Vino volando» es posible, pero añade una nota direccional que el hebreo ya marca por medio de אֵלַי.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: La preposición indica movimiento dirigido al hablante. «Hacia mí» conserva mejor la direccionalidad que el simple «a mí», sin volverlo pesado.
- source_word: אֶחָד מִן־הַשְּׂרָפִים
  english_pob_choice: one of the seraphim
  chosen_spanish: uno de los serafines
  alternatives_spanish:
  - uno de los seres ardientes
  lexicon: HALOT
  rationale: Se conserva el término establecido «serafines» para mantener la especificidad visionaria y el vínculo intertextual. La opción etimológica «seres ardientes» sería más explicativa que traductora.
- source_word: וּבְיָדוֹ
  english_pob_choice: and in his hand was
  chosen_spanish: y en su mano había
  alternatives_spanish:
  - y llevaba en su mano
  - y en su mano estaba
  lexicon: HALOT
  rationale: En español, la construcción posesiva-nominal se expresa con naturalidad mediante «había». Mantiene la imagen concreta de lo que portaba sin sobrecargar la sintaxis.
- source_word: רִצְפָּה
  english_pob_choice: a glowing coal
  chosen_spanish: una brasa encendida
  alternatives_spanish:
  - un carbón encendido
  - una brasa viva
  - una piedra encendida
  lexicon: HALOT
  rationale: El término puede referir a un objeto ardiente/brasero tomado del altar. «Brasa encendida» comunica bien el calor y la función cultual. Se evita «carbón» por sonar más específico de combustible que de objeto ritual; también se evita una paráfrasis excesiva.
- source_word: בְּמֶלְקַחַיִם
  english_pob_choice: with tongs
  chosen_spanish: con unas tenazas
  alternatives_spanish:
  - con tongs
  - con unas pinzas
  lexicon: HALOT
  rationale: El instrumento designa tenazas o pinzas de metal. «Tenazas» es el equivalente más claro y digno en español bíblico moderno; «pinzas» puede sonar demasiado doméstico o pequeño.
- source_word: לָקַח
  english_pob_choice: he had taken
  chosen_spanish: había tomado
  alternatives_spanish:
  - tomó
  - había recogido
  lexicon: HALOT
  rationale: El perfecto expresa una acción previa al vuelo del serafín. «Había tomado» preserva la secuencia temporal del hebreo y la decisión del inglés POB.
- source_word: מֵעַל הַמִּזְבֵּחַ
  english_pob_choice: from the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - de sobre el altar
  - desde encima del altar
  - de sobre el altar
  lexicon: HALOT
  rationale: «Del altar» fluye mejor en español y conserva el sentido contextual de procedencia. Las alternativas más literales son posibles, pero suenan forzadas sin aportar claridad adicional.
theological_decisions:
- issue: Conservación del término «serafines» en una visión celestial
  english_pob_reading: seraphim
  chosen_spanish_reading: serafines
  alternative_spanish_readings:
  - seres ardientes
  rationale: El texto presenta una clase de seres celestiales dentro de la visión de Isaías. Mantener «serafines» respeta la identidad literaria y no reduce el término a una glosa etimológica.
  doctrine_reference: Poética profética y terminología visionaria de Isaías 6
- issue: Naturaleza del objeto tomado del altar
  english_pob_reading: a glowing coal
  chosen_spanish_reading: una brasa encendida
  alternative_spanish_readings:
  - una brasa viva
  - un carbón encendido
  - una piedra caliente
  rationale: La escena apunta a un objeto ardiente procedente del altar, apto para la acción simbólica de purificación. «Brasa encendida» conserva la tensión entre brillo, calor y procedencia ritual sin añadir interpretaciones doctrinales posteriores.
  doctrine_reference: Purificación simbólica en Isaías 6:6
- issue: Secuencia temporal entre tomar la brasa y volar
  english_pob_reading: he had taken
  chosen_spanish_reading: había tomado
  alternative_spanish_readings:
  - tomó
  rationale: El español debe reflejar que la acción de tomar la brasa precede al vuelo hacia Isaías. El pluscuamperfecto hace explícita esa relación temporal sin alterar el contenido del texto.
  doctrine_reference: Sintaxis narrativa hebrea y claridad temporal
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada de alta concordancia del texto fuente: no se requieren ajustes adicionales. Se mantiene la equivalencia óptima del inglés POB, pero ajustada al español natural y al matiz léxico del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el griego subyacente exija el nombre divino; este versículo no lo contiene.
  - Se mantiene «serafines» como término técnico estable en la literatura profética.
  - Se prefiere la sintaxis española natural («había tomado», «del altar») sin perder la secuencia del original.
  - El marcador de nota [a] aparece en el punto exacto al que corresponde la alternativa léxica.
