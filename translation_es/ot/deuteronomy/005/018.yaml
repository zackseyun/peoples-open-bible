lexical_decisions:
- source_word: וְ/לֹא
  english_pob_choice: And ... not
  chosen_spanish: Y ... no
  alternatives_spanish:
  - 'No'
  - Ni
  lexicon: HALOT
  rationale: El hebreo conserva la coordinación con וְ, y en español bíblico legal la conjunción 'Y' reproduce mejor la cadena de mandamientos que omitirla. 'No' expresa la prohibición con fuerza normativa.
- source_word: תִּנְאָף
  english_pob_choice: you shall commit adultery
  chosen_spanish: cometerás adulterio
  alternatives_spanish:
  - adulterarás
  - serás adúltero
  lexicon: HALOT
  rationale: El verbo נאף en este contexto de ley prohibitiva se expresa de forma natural y precisa en español como 'cometer adulterio'. 'Cometerás adulterio' conserva el futuro prohibitivo y la solemnidad del mandato en segunda persona singular.
theological_decisions:
- issue: Forma prohibitiva en segunda persona singular dentro del Decálogo
  english_pob_reading: And you shall not commit adultery.
  chosen_spanish_reading: Y no cometerás adulterio.
  alternative_spanish_readings:
  - No cometerás adulterio.
  - Y no adulterarás.
  rationale: El hebreo usa segunda persona masculina singular, dirigida al miembro del pacto de manera representativa. El futuro de prohibición 'no cometerás' mantiene mejor el tono legal solemne que el imperativo directo 'no cometas'.
  doctrine_reference: Translation philosophy §§4–6
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la revisión inglesa final; no hay cambios textuales sustantivos. Se conserva la conjunción inicial del hebreo y el valor prohibitivo del verbo en forma de futuro.
  spanish_consistency_notes:
  - Se usa 'adulterio' para נאף, en consonancia con el sentido jurídico-covenantal del mandato.
  - Se conserva 'Y' al inicio para reflejar la coordinación explícita del hebreo.
  - La nota explica la alternativa más tersa sin reemplazar el texto principal.
