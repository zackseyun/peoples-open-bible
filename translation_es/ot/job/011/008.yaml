translation:
  language: es
  text: Más alto que los cielos—¿qué puedes hacer? Más profundo que el Seol[a]—¿qué puedes saber?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Seol: transliteración del término hebreo para el mundo de los muertos; también puede entenderse como «la tumba» o «el reino de los muertos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּבְהֵי שָׁמַיִם
  english_pob_choice: higher than the heavens
  chosen_spanish: Más alto que los cielos
  alternatives_spanish:
  - la altura de los cielos
  - tan alto como los cielos
  lexicon: HALOT
  rationale: El hebreo expresa una altura superlativa/comparativa en forma poética. «Más alto que los cielos» conserva el comparativo y la fuerza retórica sin sonar forzado en español.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - cómo
  lexicon: HALOT
  rationale: La partícula interrogativa introduce una pregunta retórica. «Qué» reproduce de manera directa la fuerza de la pregunta en ambos miembros del versículo.
- source_word: תִּפְעָל
  english_pob_choice: can you do
  chosen_spanish: puedes hacer
  alternatives_spanish:
  - puedes realizar
  - podrías hacer
  lexicon: HALOT
  rationale: El imperfecto qal de פעל aquí funciona retóricamente como capacidad. «Puedes hacer» expresa mejor en español la idea de posibilidad/incapacidad que un futuro simple.
- source_word: עֲמֻקָּה
  english_pob_choice: deeper
  chosen_spanish: Más profundo
  alternatives_spanish:
  - más hondo
  - profundo
  lexicon: HALOT
  rationale: El adjetivo femenino singular continúa la imagen poética de profundidad. «Más profundo» mantiene el paralelismo con «más alto» y es natural en español.
- source_word: מִשְּׁאוֹל
  english_pob_choice: than Sheol
  chosen_spanish: que el Seol
  alternatives_spanish:
  - que la tumba
  - que el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva «Seol» por su valor técnico en el hebreo bíblico y para no reducir el término a «tumba». La comparación con «que» transmite el מִן comparativo del hebreo.
- source_word: תֵּדָע
  english_pob_choice: can you know
  chosen_spanish: puedes saber
  alternatives_spanish:
  - puedes conocer
  - podrías saber
  lexicon: HALOT
  rationale: En paralelo con «puedes hacer», «puedes saber» expresa la incapacidad humana ante la profundidad divina de manera idiomática y fiel al contraste del verso.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: Se mantiene el término propio del hebreo para preservar el trasfondo conceptual del texto y evitar una reducción semántica. Una nota aclara el rango de sentido posible sin borrar la tensión terminológica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Estructura retórica de incapacidad humana
  english_pob_reading: what can you do? ... what can you know?
  chosen_spanish_reading: ¿qué puedes hacer?... ¿qué puedes saber?
  alternative_spanish_readings:
  - ¿qué podrás hacer?... ¿qué podrás saber?
  - ¿qué puedes conocer?... ¿qué puedes comprender?
  rationale: La formulación mantiene el carácter desafiante y sapiencial de las preguntas retóricas del hebreo, sin convertirlas en una simple afirmación descriptiva.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios; el español sigue de cerca el paralelismo del hebreo y conserva el término técnico Seol con nota explicativa.'
  spanish_consistency_notes:
  - Se usó «Seol» de forma consistente con la política del proyecto para términos hebreos técnicos no equivalentes a una sola palabra española.
  - Se mantuvo el paralelismo poético con dos miembros interrogativos y comparativos.
  - La puntuación con rayas reproduce la cesura retórica del verso sin añadir contenido interpretativo.
