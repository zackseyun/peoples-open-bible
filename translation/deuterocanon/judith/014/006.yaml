translation:
  text: And they called Achior out of the house of Ozias. But when he came and saw the head of Holofernes in the hand of one man in the assembly of the people[a], he fell on his face, and his spirit failed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his breath left him' / 'he lost consciousness.' The Greek says literally, 'his spirit failed,' an idiom for physical collapse or fainting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσαν
  chosen: they called
  alternatives:
  - they summoned
  lexicon: BDAG
  rationale: A straightforward past narrative verb. 'Called' is natural English and sufficiently formal; 'summoned' is possible but slightly stronger than the Greek requires here.
- source_word: τὸν Ἀχιὼρ
  chosen: Achior
  rationale: Personal name transliterated per project policy.
- source_word: ἐκ τοῦ οἴκου Ὀζεία
  chosen: out of the house of Ozias
  alternatives:
  - from Ozias's house
  lexicon: BDAG
  rationale: οἶκος commonly means 'house' or 'household.' Here the physical sense is most immediate in the narrative. 'Out of the house of Ozias' stays close to the Greek while remaining readable.
- source_word: ὡς δὲ ἦλθεν
  chosen: But when he came
  alternatives:
  - and when he came
  - when he arrived
  lexicon: BDAG
  rationale: This marks the next narrative step with mild contrast/transition. 'But when he came' reflects δέ without overtranslating it.
- source_word: ἴδεν τὴν κεφαλὴν Ὀλοφέρνου
  chosen: saw the head of Holofernes
  alternatives:
  - saw Holofernes's head
  lexicon: BDAG
  rationale: A direct and literal rendering of the object phrase; either English order works, but the chosen form stays closer to the Greek structure.
- source_word: ἐν χειρὶ ἀνδρὸς ἑνὸς
  chosen: in the hand of one man
  alternatives:
  - in one man's hand
  - in the hand of a man
  lexicon: BDAG
  rationale: The Greek is singular and explicit. 'One man' preserves ἑνός rather than smoothing it away. The phrase likely emphasizes that a single man was holding the severed head.
- source_word: ἐν τῇ ἐκκλησίᾳ τοῦ λαοῦ
  chosen: in the assembly of the people
  alternatives:
  - in the congregation of the people
  - in the people's assembly
  lexicon: BDAG
  rationale: ἐκκλησία in this pre-Christian narrative context refers to a gathered assembly, not the later technical sense 'church.' 'Assembly' is the clearest contextual rendering.
- source_word: ἔπεσεν ἐπὶ πρόσωπον
  chosen: he fell on his face
  alternatives:
  - he fell facedown
  - he fell to the ground on his face
  lexicon: BDAG
  rationale: A standard idiomatic rendering of the Greek expression, preserving the vivid bodily reaction.
- source_word: ἐξελύθη τὸ πνεῦμα αὐτοῦ
  chosen: his spirit failed
  alternatives:
  - he lost consciousness
  - his breath left him
  - his spirit gave way
  lexicon: BDAG
  rationale: The phrase denotes collapse or faintness. 'His spirit failed' preserves the Greek's wording and ambiguity better than the more interpretive 'he lost consciousness.'
