translation:
  language: es
  text: Pero los hijos de Coré no murieron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los hijos de Coré no murieron». La conjunción hebrea puede entenderse como coordinación simple; «Pero» resalta el contraste con las muertes anteriores en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: But the sons of
  chosen_spanish: Pero los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: El hebreo puede leerse con coordinación simple, pero en este contexto inmediato el matiz adversativo encaja con el contraste frente a las muertes del pasaje anterior. En español, "pero" reproduce mejor esa relación que una simple "y".
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Kóraj
  - Korah
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española habitual y fácilmente reconocible para lectores de la Biblia en español. Se mantiene la referencia personal sin añadir interpretación.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - vástagos de
  lexicon: HALOT
  rationale: En este registro genealógico, "hijos de" es el equivalente natural en español para la construcción constructa, y conserva la referencia familiar/descendencial.
- source_word: לֹא מֵתוּ
  english_pob_choice: did not die
  chosen_spanish: no murieron
  alternatives_spanish:
  - no fallecieron
  - no perecieron
  lexicon: HALOT
  rationale: La negación con el verbo en perfecto se expresa de forma natural en español con pretérito simple negativo. "Morir" conserva el sentido básico del hebreo sin cargar una matización interpretativa adicional.
theological_decisions:
- issue: Relación con el juicio previo sobre la casa de Coré
  english_pob_reading: But the sons of Korah did not die.
  chosen_spanish_reading: Pero los hijos de Coré no murieron.
  alternative_spanish_readings:
  - Y los hijos de Coré no murieron.
  - Ahora bien, los hijos de Coré no murieron.
  rationale: El contraste implícito con el contexto narrativo inmediato se refleja con "pero". No se explicita más de lo que el hebreo dice; solo se hace visible la tensión contextual que el inglés POB ya marcaba con su nota sobre la posible coordinación simple.
  doctrine_reference: Contexto narrativo de Números 26:11; nota auditada del POB inglés sobre el matiz adversativo de la conjunción.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión y fue confirmada con alto grado de acuerdo; por ello, la redacción española se alinea estrechamente con esa lectura, manteniendo la alternativa coordinante documentada en nota.
  spanish_consistency_notes:
  - Se conserva el tono sobrio y factual de un registro genealógico/narrativo breve.
  - Se evita introducir glosas como "descendientes" en el texto principal para no diluir la fórmula tradicional y el paralelismo con el hebreo.
  - La nota preserva la alternativa de coordinación simple documentada en el POB inglés y la adapta al español sin añadir nuevas ambigüedades.
