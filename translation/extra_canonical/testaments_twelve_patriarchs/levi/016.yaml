theological_decisions:
- issue: Bracketed middle section about 'a man who renews the law' and his killing appears textually complex and may reflect later expansion/interpolation.
  chosen_reading: Included the bracketed material in the main text, translated straightforwardly, with a footnote noting textual complexity.
  alternative_readings:
  - Omit the bracketed section as secondary
  - Translate more explicitly in messianic terms
  rationale: The Greek witness supplied includes the passage, and transparency requires translating what is present rather than silently excising it. Because the wording is difficult and potentially secondary, the note flags this for readers rather than harmonizing or dogmatically resolving it.
  doctrine_reference: 'PHILOSOPHY.md: translate the Greek witness honestly and use notes for likely interpolation or expansion.'
- issue: Referent of αὐτός in the final clause ('until he himself visits again')
  chosen_reading: Rendered as 'he himself' without identifying the referent in the main text.
  alternative_readings:
  - God himself visits again
  - the previously mentioned man visits again
  rationale: The Greek leaves the antecedent open enough to preserve tension. The main text keeps the ambiguity; a footnote records the interpretive options.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it.'
