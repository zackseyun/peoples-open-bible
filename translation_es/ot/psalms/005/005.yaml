translation:
  language: es
  text: Porque tú no eres un Dios que se complace en la maldad[a]; el mal no puede morar contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la persona malvada no puede habitar contigo” / “ningún malhechor puede habitar contigo”.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior; 'Porque' conserva la relación causal y funciona con naturalidad en español.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - poderoso
  lexicon: HALOT
  rationale: En este contexto es una referencia directa al Dios verdadero; en español bíblico, 'Dios' es la forma adecuada y clara.
- source_word: חָפֵץ
  english_pob_choice: delights in
  chosen_spanish: se complace en
  alternatives_spanish:
  - se deleita en
  - tiene placer en
  - quiere
  lexicon: HALOT
  rationale: Expresa el matiz afectivo de agrado o complacencia, no solo voluntad. 'Se complace en' conserva bien el valor de aprobación/placer.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la impiedad
  - la injusticia
  - la perversidad
  lexicon: HALOT
  rationale: El sustantivo abstracto denota maldad/culpabilidad moral. 'Maldad' es natural en español y mantiene el carácter abstracto del paralelo.
- source_word: יְגֻרְךָ
  english_pob_choice: may not dwell with you
  chosen_spanish: puede habitar contigo
  alternatives_spanish:
  - puede morar contigo
  - puede hospedarse contigo
  - puede permanecer contigo
  lexicon: HALOT
  rationale: El verbo גור tiene el sentido de habitar como huésped o residir. 'Habitar contigo' preserva el valor de permanencia ante la presencia de Dios. El 'no' del hebreo se refleja en la negación del verbo en la oración final.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - una persona malvada
  - el malvado
  - la maldad
  lexicon: HALOT
  rationale: El hebreo permite lectura abstracta o personal. La POB inglesa eligió 'evil' para sostener el paralelismo con 'wickedness'; en español, 'el mal' mantiene esa lectura abstracta y deja abierta la tensión interpretativa.
theological_decisions:
- issue: Si רָע debe entenderse como realidad abstracta o como persona malvada
  english_pob_reading: evil
  chosen_spanish_reading: el mal
  alternative_spanish_readings:
  - la persona malvada
  - el malvado
  - el malhechor
  rationale: La construcción hebrea admite ambas posibilidades, pero el paralelismo con 'maldad' favorece una formulación abstracta. Se evita resolver la tensión a favor de una persona específica, dejando el sentido compatible con el verso siguiente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El último pase revisado no introdujo cambios; la traducción inglesa más reciente se mantuvo igual y el consenso de revisión fue alto. Esta versión española sigue esa lectura estable y conserva la ambigüedad documentada de רָע sin forzar una interpretación personal.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֵל en lugar de 'dios' por tratarse de una referencia directa al Dios verdadero.
  - Se conserva el paralelismo abstracto 'maldad' / 'el mal', coherente con la decisión inglesa de no convertir רָע en 'malhechor' dentro del texto principal.
  - La negación de יְגֻרְךָ se expresa naturalmente en español como 'no puede habitar contigo', evitando un calco rígido y manteniendo el sentido de permanencia excluida.
