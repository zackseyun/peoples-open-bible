base_translation:
  language: en
  yaml_path: translation/ot/esther/008/013.yaml
  text: A copy of the document was to be issued as a decree in every province and province[a], being made public to all the peoples[d][c][b], so that the Jews would be ready on that day to avenge themselves on their enemies.
  footnotes:
  - marker: a
    text: Or 'in each and every province.' The Hebrew repeats 'province and province' as a distributive expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'published' or 'openly displayed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for this day.' Hebrew literally reads 'for this day,' referring to the appointed date.
    reason: lexical_alternative
  - marker: d
    text: Or 'to take vengeance on their enemies.' Some translations render more interpretively, 'to defend themselves,' but the Hebrew verb specifically means 'to avenge themselves' or 'to take vengeance.'
    reason: alternative_reading
