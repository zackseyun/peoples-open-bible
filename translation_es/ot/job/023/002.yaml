translation:
  language: es
  text: Aun hoy, mi queja es rebelde[a]; mi mano está pesada a causa de mi gemido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amarga». El término hebreo puede suavizarse contextualmente según algunos intérpretes, pero más literalmente denota rebeldía o desafío.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi mano está pesada sobre mi gemido». Algunos entienden «mano» de modo idiomático, como expresión contenida o agobiada; otros proponen una emendación para leer «su mano».'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם הַיּוֹם
  english_pob_choice: Even today
  chosen_spanish: Hasta hoy
  alternatives_spanish:
  - También hoy
  - Aun hoy
  lexicon: HALOT
  rationale: La combinación temporal expresa continuidad hasta el presente. «Hasta hoy» comunica de forma natural en español esa persistencia, sin perder el énfasis de actualidad del hebreo.
- source_word: מְרִי
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - amarga
  - rebeldía
  lexicon: HALOT
  rationale: La POB inglesa retiene el sentido más fuerte de oposición o desafío. En español, «rebelde» preserva mejor esa fuerza que «amarga», y evita suavizar la tensión teológica del verso.
- source_word: שִׂחִי
  english_pob_choice: my complaint
  chosen_spanish: mi queja
  alternatives_spanish:
  - mi lamento
  - mi meditación
  - mi discurso
  lexicon: HALOT
  rationale: En Job el término puede abarcar habla, meditación o queja. Dado el paralelismo con el gemido y el tono de lamento, «mi queja» es la opción más natural y fiel al contexto.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - su mano
  lexicon: HALOT
  rationale: 'Se conserva el sufijo de primera persona del texto masorético: «mi mano». La alternativa «su mano» corresponde a una lectura interpretativa o emendada, no al texto base.'
- source_word: כָּבְדָה
  english_pob_choice: is heavy
  chosen_spanish: está pesada
  alternatives_spanish:
  - se ha vuelto pesada
  - yace pesada
  lexicon: HALOT
  rationale: El verbo expresa pesadez o carga. «Está pesada» transmite bien el estado resultante en español y mantiene la imagen del texto.
- source_word: עַל אַנְחָתִי
  english_pob_choice: because of my groaning
  chosen_spanish: a causa de mi gemido
  alternatives_spanish:
  - sobre mi gemido
  - por mi gemido
  - por mi suspiro
  lexicon: HALOT
  rationale: La preposición hebrea es más amplia que un simple valor causal, pero en este contexto la relación entre la pesadez de la mano y el gemido se entiende naturalmente como causal. «Gemido» refleja la intensidad de אַנְחָה mejor que «suspiro».
theological_decisions:
- issue: Cómo reflejar la autoevaluación dura de Job sin atenuarla
  english_pob_reading: Retain the stronger sense 'rebellious' in the main text
  chosen_spanish_reading: Mantener «rebelde» en el texto principal
  alternative_spanish_readings:
  - «amarga»
  - «mi queja es una rebelión»
  rationale: El verso conserva la tensión de un sufrimiento justo expresado en términos que rozan la rebeldía. La traducción no debe resolver esa tensión suavizándola; por eso se mantiene el valor más fuerte en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de la imagen de la mano pesada
  english_pob_reading: Some understand 'hand' idiomatically of restrained or burdened expression; others emend to read 'his hand.'
  chosen_spanish_reading: Conservar «mi mano» y no armonizarla con una emendación
  alternative_spanish_readings:
  - «su mano»
  - «mi fuerza»
  rationale: La lectura masorética presenta una imagen difícil pero auditable. Mantener «mi mano» preserva la tensión textual y deja abierta la discusión interpretativa sin incorporarla al cuerpo del texto.
  doctrine_reference: POB translational policy on preserving documented textual tension
translation_notes:
  revision_awareness: Texto revisado con alto grado de acuerdo en el control comparativo; no se registraron cambios en la última pasada. La versión española conserva la tensión léxica principal (מְרִי / rebelde) y la ambigüedad textual de «mi mano».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; este versículo no lo contiene.
  - Se mantuvo «rebelde» para preservar la fuerza semántica de מְרִי, coherente con el enfoque de la POB.
  - «Gemido» se eligió para אַנְחָה por su tono más intenso y por su adecuación al paralelismo con la queja.
