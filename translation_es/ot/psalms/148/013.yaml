translation:
  language: es
  text: Que alaben el nombre de Yahvé[a], porque solo su nombre es enaltecido; su majestad está por encima de la tierra y del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su esplendor» o «su gloria» para «su majestad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַלְלוּ
  english_pob_choice: Let them praise
  chosen_spanish: Que alaben
  alternatives_spanish:
  - Alaben
  - Que ellos alaben
  lexicon: HALOT
  rationale: El imperfecto plural en este contexto hímnico tiene fuerza exhortativa/jusiva. «Que alaben» conserva esa convocatoria natural en español sin volverla mecánica.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre
  - fama
  - reputación
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto «nombre», como en el hebreo, porque aquí designa la identidad revelada y no solo la reputación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La convención del proyecto para el Tetragrámaton es «Yahvé», preservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del llamado a la alabanza. «Porque» expresa con claridad la base explicativa en español.
- source_word: נִשְׂגָּב
  english_pob_choice: is exalted
  chosen_spanish: es enaltecido
  alternatives_spanish:
  - está exaltado
  - es elevado
  lexicon: HALOT
  rationale: El hebreo comunica la idea de estar puesto en alto, en una esfera de majestad. «Es enaltecido» preserva la elevación con un verbo natural en español.
- source_word: שְׁמוֹ לְבַדּוֹ
  english_pob_choice: his name alone
  chosen_spanish: su nombre solo
  alternatives_spanish:
  - su nombre únicamente
  - su nombre solamente
  lexicon: HALOT
  rationale: «Solo» mantiene la exclusividad de לְבַדּוֹ sin desplazar el foco del texto desde el «nombre» hacia una paráfrasis sobre la persona.
- source_word: הוֹדוֹ
  english_pob_choice: his majesty
  chosen_spanish: su majestad
  alternatives_spanish:
  - su esplendor
  - su gloria
  lexicon: HALOT
  rationale: הוֹד puede abarcar esplendor, majestad o gloria. «Majestad» conserva el matiz de grandeza regia que la POB inglesa también destacó.
- source_word: עַל
  english_pob_choice: is above
  chosen_spanish: está sobre
  alternatives_spanish:
  - está por encima de
  - está encima de
  lexicon: HALOT
  rationale: La preposición expresa superioridad/elevación respecto de la tierra y los cielos; «está sobre» reproduce bien esa relación espacial-poética en español.
- source_word: אֶרֶץ וְשָׁמַיִם
  english_pob_choice: earth and heaven
  chosen_spanish: la tierra y los cielos
  alternatives_spanish:
  - la tierra y el cielo
  - la tierra y el firmamento
  lexicon: HALOT
  rationale: Se conserva el par merístico del orden hebreo. «Los cielos» refleja mejor el plural hebreo que el singular idiomático «cielo».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrámaton como nombre propio divino. En español, «Yahvé» es la forma coherente con esa política y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El cierre editorial en inglés quedó en estado sin cambios tras revisión cruzada de alta concordancia. No hubo revisiones aplicadas; por tanto, la versión española sigue de cerca la lectura ya estabilizada, manteniendo la misma decisión sobre el nombre divino y la ambigüedad léxica de הוֹד.
  spanish_consistency_notes:
  - 'Se preserva la progresión poética: llamado a alabar → razón → afirmación de exaltación → afirmación de majestad.'
  - Se mantiene el foco en «su nombre» dos veces, como en el hebreo, sin reexpresar el pronombre al inicio de la segunda cola.
  - El plural «los cielos» conserva mejor el hebreo וְשָׁמַיִם que un singular idiomático.
  - La nota al pie se ancla en «majestad» para reflejar las alternativas léxicas preservadas por la POB inglesa.
