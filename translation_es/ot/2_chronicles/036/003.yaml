revisions:
- from: Y el rey de Egipto lo depuso en Jerusalén e impuso sobre la tierra un tributo de cien talentos de plata y un talento de oro[a][b][c].
  to: Y el rey de Egipto lo depuso en Jerusalén e impuso al país un tributo de cien talentos de plata y un talento de oro[a][b][c].
  rationale: Se ajusta 'sobre la tierra' a 'al país' para reflejar mejor הָאָרֶץ como el reino/territorio de Judá y para lograr un español más natural en contexto de tributación. También se armoniza la nota b con esa mejora. Lo demás puede mantenerse.
