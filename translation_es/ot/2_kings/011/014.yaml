base_translation:
  language: en
  yaml_path: translation/ot/2_kings/011/014.yaml
  text: And she looked[a], and behold, the king was standing by the pillar, according to the custom, with the officers and the trumpeters beside the king, and all the people of the land were rejoicing and blowing trumpets. Then Athaliah tore her clothes and cried[b], “Conspiracy! Conspiracy!”
  footnotes:
  - marker: a
    text: Or “at the pillar.” The Hebrew preposition can be understood in more than one locative sense here.
    reason: lexical_alternative
  - marker: b
    text: Or “Treason! Treason!”
    reason: lexical_alternative
