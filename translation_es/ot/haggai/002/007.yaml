translation:
  language: es
  text: Haré temblar a todas las naciones[a], y vendrán los tesoros de todas las naciones, y llenaré de gloria esta casa, dice Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una traducción tradicional: «el deseo de todas las naciones vendrá». El hebreo también puede significar «las cosas deseables» o «los tesoros» de las naciones; el verbo plural favorece un sentido colectivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִרְעַשְׁתִּי
  english_pob_choice: I will shake
  chosen_spanish: haré temblar
  alternatives_spanish:
  - haré que tiemblen
  - sacudiré
  lexicon: HALOT
  rationale: El hifil expresa causar temblor o sacudida. En español, «haré temblar» conserva la causalidad divina y suena natural sin intensificar indebidamente el verbo.
- source_word: כָּל־הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto profético, גּוֹיִם se refiere a las naciones en general. «Naciones» mantiene el alcance amplio sin cargar el término con una categoría teológica posterior.
- source_word: וּבָאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  lexicon: HALOT
  rationale: El verbo simple en secuencia profética se vierte naturalmente en futuro. «Vendrán» conserva el movimiento hacia el sujeto implícito del complemento siguiente.
- source_word: חֶמְדַּת כָּל־הַגּוֹיִם
  english_pob_choice: the treasures of all the nations
  chosen_spanish: las riquezas de todas las naciones
  alternatives_spanish:
  - los tesoros de todas las naciones
  - lo deseable de todas las naciones
  lexicon: HALOT
  rationale: La forma hebrea es singular, pero el verbo plural favorece un sentido colectivo. «Riquezas» comunica bienes valiosos o preciados sin forzar una lectura personal singular; «tesoros» queda como alternativa cercana.
- source_word: וּמִלֵּאתִי
  english_pob_choice: I will fill
  chosen_spanish: llenaré
  alternatives_spanish:
  - llenaré por completo
  - haré pleno
  lexicon: HALOT
  rationale: El piel de מלא significa llenar. «Llenaré» es la equivalencia directa y clara en español.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  lexicon: HALOT
  rationale: Aunque el referente es el templo, «esta casa» preserva la palabra del hebreo y la imagen del profeta, como en el texto base inglés.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: HALOT
  rationale: En contextos del templo y de la presencia divina, כָּבוֹד se vierte mejor como «gloria», manteniendo su peso teológico.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - el Señor de los Ejércitos
  lexicon: HALOT
  rationale: Se conserva «Yahvé» para יְהוָה según la política del proyecto. «Ejércitos» traduce צְבָאוֹת y mantiene la fuerza marcial/cósmica del título.
theological_decisions:
- issue: Sentido de חֶמְדַּת כָּל־הַגּוֹיִם
  english_pob_reading: 'collective/material: ''the treasures of all the nations'''
  chosen_spanish_reading: 'lectura colectiva/material: «las riquezas de todas las naciones»'
  alternative_spanish_readings:
  - 'lectura personal/mesiánica: «el deseo de todas las naciones»'
  - 'lectura material más literal: «los tesoros de todas las naciones»'
  rationale: El sustantivo puede denotar cosas deseables o valiosas, y el verbo plural וּבָאוּ favorece un sentido colectivo. La traducción evita imponer una lectura mesiánica singular que el hebreo no exige de manera inequívoca, pero conserva la tensión histórica mediante la nota.
  doctrine_reference: Primacía del texto original; preservar tensión interpretativa en vez de resolverla dogmáticamente.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios respecto del consenso de alta concordancia del paquete auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, de acuerdo con la terminología del proyecto.
  - «Naciones» traduce גּוֹיִם de forma consistente con el contexto profético.
  - «Gloria» conserva la terminología teológica estándar para כָּבוֹד en contextos del templo.
  - La nota textual/semántica sobre חֶמְדַּת preserva la alternativa tradicional sin adoptarla en el cuerpo principal.
