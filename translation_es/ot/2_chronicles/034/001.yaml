- source_word: בְמָלְכֹו
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando se hizo rey
  - al reinar
  lexicon: HALOT
  rationale: La construcción verbal marca el momento de la ascensión al trono. «Cuando comenzó a reinar» reproduce ese valor temporal de manera natural en español.
- source_word: וּשְׁלֹשִׁים וְאַחַת שָׁנָה
