translation:
  language: es
  text: Escucha[a], hijo mío, y sé sabio, y endereza tu corazón en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oye, hijo mío ... y endereza tu corazón en el camino».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Oíd
  lexicon: HALOT
  rationale: El imperativo 2ms de שׁמע exige más que oír pasivamente; en español, «escucha» comunica atención obediente y suena natural en exhortación sapiencial. «Oye» es posible, pero menos enfático; «oíd» no corresponde al singular.
- source_word: בְנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío, muchacho mío
  lexicon: HALOT
  rationale: El vocativo masculino singular se conserva sin neutralizarlo. «Hijo mío» es idiomático y mantiene el tono paternal de la instrucción sapiencial. «Mi hijo» es posible, pero menos fluido en este contexto.
- source_word: וַחֲכָם
  english_pob_choice: and be wise
  chosen_spanish: y sé sabio
  alternatives_spanish:
  - y hazte sabio
  - y llega a ser sabio
  lexicon: HALOT
  rationale: El imperativo exhorta a asumir sabiduría; «sé sabio» reproduce bien la fuerza breve y directiva del hebreo. «Hazte sabio» o «llega a ser sabio» enfatizan proceso, pero suenan más explicativos que el original.
- source_word: וְאַשֵּׁר
  english_pob_choice: and direct
  chosen_spanish: y endereza
  alternatives_spanish:
  - y guía
  - y pon recto
  lexicon: HALOT
  rationale: El piel de אשר tiene el sentido de hacer recto o dirigir. «Endereza» preserva la imagen de rectitud sin introducir una abstracción excesiva; «guía» es más interpretativa y menos cercana a la metáfora verbal del hebreo.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - por el camino
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser «camino» tanto literal como metafórico. «En el camino» mantiene la imagen de conducta/andar y suena natural en español; «senda» es más literaria, pero menos común.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: לֵב incluye pensamiento, voluntad y deseo, pero el sustantivo concreto «corazón» conserva la antropología bíblica y la metáfora del texto. «Mente» o «interior» reducen o amplían indebidamente el campo semántico.
theological_decisions:
- issue: Apostrophe to the masculine singular addressee in wisdom instruction
  english_pob_reading: my son
  chosen_spanish_reading: hijo mío
  alternative_spanish_readings:
  - mi hijo
  - hijo mío, hijo
  rationale: El hebreo está dirigido a un hijo varón en singular; la traducción no debe neutralizar ese rasgo. «Hijo mío» comunica la relación exhortativa propia de Proverbios sin alterar el género gramatical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente reportó alto acuerdo y sin cambios necesarios; se mantuvo la solución óptima-equivalente ya validada, con ajuste solo al español natural y a la conservación de la metáfora de rectitud/camino.
  spanish_consistency_notes:
  - Se mantuvo «hijo mío» para conservar el vocativo masculino singular del hebreo y la pauta terminológica del POB.
  - Se prefirió «corazón» en lugar de «mente» o «interior» para no diluir la antropología bíblica del texto.
  - «Camino» se usó de forma coherente con el valor metafórico de דֶּרֶךְ en literatura sapiencial.
