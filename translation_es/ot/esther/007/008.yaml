base_translation:
  language: en
  yaml_path: translation/ot/esther/007/008.yaml
  text: The king returned from the palace garden to the house of the wine feast[a], and Haman had fallen on the couch where Esther was. Then the king said, “Will he even violate the queen while I am in the house?” As the word went out from the king’s mouth[b], they covered Haman’s face.
  footnotes:
  - marker: a
    text: Or “Will he even overpower/violate the queen with me in the house?” The Hebrew verb can mean to subdue or overpower; here it carries the king’s accusation of an outrageous assault.
    reason: lexical_alternative
  - marker: b
    text: That is, court attendants immediately veiled Haman’s face, a sign that judgment had effectively fallen on him.
    reason: cultural_note
