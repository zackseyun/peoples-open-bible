    issue: «se cubre» para יִתְעַלֶּם
    rationale: El verbo hebreo hitpael de עלם significa ‘ocultarse / esconderse / encubrirse’. «Se cubre» no expresa bien ese valor y puede implicar una acción distinta.
  - severity: medium
