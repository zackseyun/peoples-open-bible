translation:
  language: es
  text: 'Entonces Balaam se levantó por la mañana y dijo a los oficiales[a] de Balac: «Vayan a su tierra, porque Yahvé ha rehusado dejarme ir con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los príncipes de Balac» o «los líderes de Balac».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El verbo de acción narrativa se expresa de manera natural en español con «se levantó», que conserva el avance secuencial sin sonar forzado.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: «Por la mañana» es la equivalencia idiomática más natural en español y no añade un matiz de amanecer que el hebreo no exige.
- source_word: שָׂרֵי בָלָק
  english_pob_choice: Balak’s officials
  chosen_spanish: los oficiales de Balac
  alternatives_spanish:
  - los príncipes de Balac
  - los líderes de Balac
  lexicon: HALOT
  rationale: שָׂרִים puede ser «oficiales», «príncipes» o «líderes». Sigo la decisión inglesa de «officials» porque en este contexto son enviados representativos de un rey, sin cargar innecesariamente la idea de nobleza hereditaria.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Váyanse
  - Marchen
  lexicon: HALOT
  rationale: El imperativo plural queda de forma directa con «vayan». Mantiene el tono de orden y la referencia a la acción de regresar.
- source_word: אֶל אַרְצְכֶם
  english_pob_choice: to your land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su país
  - a su territorio
  lexicon: HALOT
  rationale: «Tierra» conserva el valor básico de אֶרֶץ y resulta más fiel que «país» en este marco narrativo. Uso «su» por cortesía directa en el discurso.
- source_word: מֵאֵן
  english_pob_choice: has refused
  chosen_spanish: ha rehusado
  alternatives_spanish:
  - se ha negado
  - no ha querido
  lexicon: HALOT
  rationale: El matiz es de rechazo firme a permitir la acción. «Ha rehusado» mantiene ese valor con un registro bíblico claro y no demasiado arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el Tetragrámaton se vierte como «Yahvé», conservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: לְתִתִּי
  english_pob_choice: to let me
  chosen_spanish: dejarme
  alternatives_spanish:
  - permitirme
  - darme licencia para
  lexicon: HALOT
  rationale: La construcción idiomática se expresa de modo natural con «dejarme», que comunica la idea de permitir sin forzar un calco sintáctico.
- source_word: לַהֲלֹךְ עִמָּכֶם
  english_pob_choice: go with you
  chosen_spanish: ir con ustedes
  alternatives_spanish:
  - caminar con ustedes
  - viajar con ustedes
  lexicon: HALOT
  rationale: «Ir con ustedes» reproduce el sentido de acompañar al grupo. «Ustedes» mantiene concordancia plural clara en español y es más natural que «vosotros» en el registro objetivo del proyecto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La fuente hebrea usa explícitamente el nombre propio divino. Se conserva como «Yahvé» para evitar la sustitución por un título y mantener la transparencia auditiva del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada ya había resuelto el versículo como una declaración narrativa directa con el nombre divino explícito y sin cambios pendientes en la revisión más reciente. Esta propuesta sigue esa lectura y traslada las mismas decisiones semánticas al español, ajustando solo la idiomaticidad propia del español.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de forma consistente con el estándar del proyecto.
  - «Oficiales» preserva el rango semántico amplio de שָׂרִים sin imponer «príncipes» como única lectura.
  - El imperativo plural y el pronombre de cortesía se mantienen coherentes con un discurso dirigido a varios interlocutores.
  - «Ha rehusado dejarme ir» conserva tanto la negación de permiso como la fuerza del verbo de rechazo.
