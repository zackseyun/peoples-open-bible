    rationale: La evidencia auditada mantiene la dificultad de בְּעוֹלָה y menciona varias posibilidades, incluida la lectura moral general. La nota actual presenta la principal como dependiente del inglés revisado y enumera solo variantes sacrificiales, en vez de explicar con neutralidad la ambigüedad hebrea.
