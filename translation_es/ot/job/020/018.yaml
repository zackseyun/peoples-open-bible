translation:
  language: es
  text: Él devuelve lo que obtuvo con su trabajo y no lo traga; conforme a la riqueza de su intercambio[a], no se regocija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Él restaura su esfuerzo y no lo consume; en cuanto a la riqueza obtenida por intercambio, no exulta». El hebreo de la segunda línea es compacto y admite varias traducciones muy cercanas.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵשִׁיב
  english_pob_choice: gives back
  chosen_spanish: devuelve
  alternatives_spanish:
  - da de vuelta
  - restaura
  - restituye
  lexicon: HALOT
  rationale: El participio causativo de שוב expresa hacer volver algo. «Devuelve» comunica bien la idea de hacer retornar lo obtenido y mantiene un registro natural en español.
- source_word: יָגָע
  english_pob_choice: what he labored for
  chosen_spanish: lo que trabajó
  alternatives_spanish:
  - su trabajo
  - su esfuerzo
  - lo que obtuvo con su trabajo
  lexicon: HALOT
  rationale: En este contexto el sustantivo puede apuntar al trabajo o al resultado del trabajo. «Lo que trabajó» conserva la relación con la labor realizada sin añadir una paráfrasis excesiva.
- source_word: וְלֹא יִבְלָע
  english_pob_choice: and does not swallow it down
  chosen_spanish: y no lo traga
  alternatives_spanish:
  - y no lo consume
  - y no se lo traga
  - y no lo devora
  lexicon: HALOT
  rationale: בלע es literalmente «tragar». Se conserva la imagen concreta en español para no perder la fuerza metafórica del hebreo.
- source_word: כְּחֵיל
  english_pob_choice: according to the wealth
  chosen_spanish: conforme a la riqueza
  alternatives_spanish:
  - según la riqueza
  - en proporción a la riqueza
  - como riqueza
  lexicon: HALOT
  rationale: חֵיל aquí se entiende mejor como riqueza o bienes. «Conforme a» refleja la relación comparativa o proporcional que el hebreo presenta de manera compacta.
- source_word: תְּמוּרָתוֹ
  english_pob_choice: of his exchange
  chosen_spanish: de su intercambio
  alternatives_spanish:
  - de su trueque
  - de su compensación
  - de lo adquirido en intercambio
  lexicon: HALOT
  rationale: תְּמוּרָה denota intercambio, recompensa o lo recibido a cambio. «Intercambio» preserva el núcleo léxico y deja abierta la referencia al beneficio ganado.
- source_word: וְלֹא יַעֲלֹס
  english_pob_choice: he does not rejoice
  chosen_spanish: no se regocija
  alternatives_spanish:
  - no se alegra
  - no exulta
  - no celebra
  lexicon: HALOT
  rationale: עלס significa alegrarse o exultar. «No se regocija» mantiene el matiz intensivo y un registro digno, sin perder claridad para el lector moderno.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) con la lectura auditada en inglés POB; no se registran revisiones aplicadas, y la nota alternativa preserva la ambigüedad compacta de la segunda línea.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término predeterminado en otros contextos, pero este verso no lo contiene.
  - Se evitó «SEÑOR» y también vocabulario eclesiástico no exigido por el hebreo.
  - Se conservaron imágenes concretas («traga», «intercambio») para respetar la tensión semántica del texto.
