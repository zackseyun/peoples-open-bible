translation:
  language: es
  text: 'A Hemán: los hijos de Hemán: Bucaía[a], Matanías, Uziel, Sebuel[c], y Jerimot[b], Hananías, Hanani, Eliatá, Gidalti, y Romamti-ezer, Josbecasá, Maloti, Hotir, Mahaziot.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos intérpretes han sugerido que parte de esta lista puede leerse como una frase y no solo como nombres, especialmente alrededor de 'Gidalti' y 'Romamti-ezer'; en este contexto, la traducción los trata como nombres propios en un registro.
    reason: alternative_reading
  - marker: b
    text: '''Jerimot'' también puede traducirse ''Jeremot''.'
    reason: lexical_alternative
  - marker: c
    text: '''Sebuel'' también puede traducirse ''Subael''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/הֵימָן
  english_pob_choice: To Heman
  chosen_spanish: Para Hemán
  alternatives_spanish:
  - A Hemán
  - De Hemán
  lexicon: HALOT
  rationale: El prefijo ל en este encabezado marca asignación dentro del listado; en español, 'Para' conserva mejor esa relación funcional que un posesivo simple.
- source_word: בְּנֵי הֵימָן
  english_pob_choice: the sons of Heman
  chosen_spanish: los hijos de Hemán
  alternatives_spanish:
  - los hijos de Hemán
  - los descendientes de Hemán
  lexicon: HALOT
  rationale: En contexto genealógico/listado, 'hijos' reproduce de forma directa בני sin sobreinterpretar el alcance, y es plenamente natural en español bíblico actual.
- source_word: בֻּקִּיָּהוּ
  english_pob_choice: Bukkiah
  chosen_spanish: Bucaías
  alternatives_spanish:
  - Bucquías
  - Bukkías
  lexicon: transliteración bíblica
  rationale: Se adapta el nombre al uso español convencional de nombres bíblicos, manteniendo la terminación teofórica -ías para legibilidad y reconocimiento.
- source_word: מַתַּנְיָהוּ
  english_pob_choice: Mattaniah
  chosen_spanish: Matanías
  alternatives_spanish:
  - Mataniahu
  - Matanías
  lexicon: transliteración bíblica
  rationale: Se sigue la forma española asentada para este nombre, con terminación -ías, sin perder la referencia al nombre hebreo.
- source_word: עֻזִּיאֵל
  english_pob_choice: Uzziel
  chosen_spanish: Uziel
  alternatives_spanish:
  - Uzziel
  lexicon: transliteración bíblica
  rationale: Nombre propio representado con la forma española usual y fácilmente reconocible.
- source_word: שְׁבוּאֵל
  english_pob_choice: Shebuel
  chosen_spanish: Sebuel
  alternatives_spanish:
  - Shebuel
  - Shubael
  lexicon: transliteración bíblica
  rationale: Se prefiere la forma española corriente 'Sebuel' para la pronunciación y fluidez en lectura en español, conservando la referencia al nombre hebreo.
- source_word: וִֽ/ירִימוֹת
  english_pob_choice: and Jerimoth
  chosen_spanish: y Jeriot
  alternatives_spanish:
  - y Jerimot
  - y Jerimoth
  lexicon: transliteración bíblica
  rationale: El hebreo apunta a un nombre propio; se vierte con una forma española breve y legible. Se conserva la oscilación tradicional entre formas afines del nombre propio sin forzar una etimología.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hanania
  - Hananias
  lexicon: transliteración bíblica
  rationale: Forma española consagrada y transparente del nombre hebreo.
- source_word: חֲנָנִי
  english_pob_choice: Hanani
  chosen_spanish: Hanani
  alternatives_spanish:
  - Hananí
  lexicon: transliteración bíblica
  rationale: Se conserva la forma breve del nombre, ya reconocible en español bíblico.
- source_word: אֱלִיאָתָה
  english_pob_choice: Eliathah
  chosen_spanish: Eliata
  alternatives_spanish:
  - Eliathá
  - Eliatah
  lexicon: transliteración bíblica
  rationale: Nombre propio adaptado a una forma española natural, evitando una grafía innecesariamente anglicada.
- source_word: גִדַּלְתִּי
  english_pob_choice: Giddalti
  chosen_spanish: Gidalti
  alternatives_spanish:
  - Giddalti
  lexicon: transliteración bíblica
  rationale: En una lista de nombres, se translitera como nombre propio; la forma española simplifica la duplicación consonántica inglesa sin alterar la identificación.
- source_word: וְ/רֹמַמְתִּי עֶזֶר
  english_pob_choice: and Romamti-ezer
  chosen_spanish: y Romamti-ezer
  alternatives_spanish:
  - y Romamti Ezer
  - y he exaltado ayuda
  lexicon: HALOT
  rationale: En el contexto del listado se trata como nombre compuesto, respetando la lectura tradicional de nombre propio y manteniendo visible la posible tensión con una lectura verbal.
- source_word: יָשְׁבְּקָשָׁה
  english_pob_choice: Joshbekashah
  chosen_spanish: Josbecasáh
  alternatives_spanish:
  - Joshbecasá
  - Yosbecasáh
  lexicon: transliteración bíblica
  rationale: Se adapta el nombre a ortografía española bíblica con acentuación final para facilitar lectura, sin añadir significado no atestiguado.
- source_word: מַלּוֹתִי
  english_pob_choice: Mallothi
  chosen_spanish: Maloti
  alternatives_spanish:
  - Malloti
  lexicon: transliteración bíblica
  rationale: Nombre propio renderizado en forma española breve y legible.
- source_word: הוֹתִיר
  english_pob_choice: Hothir
  chosen_spanish: Hotir
  alternatives_spanish:
  - Hotir
  - Jotir
  lexicon: transliteración bíblica
  rationale: Se vierte como nombre propio, con forma española simplificada y natural.
- source_word: מַחֲזִיאוֹת
  english_pob_choice: Mahazioth
  chosen_spanish: Mahaziot
  alternatives_spanish:
  - Mahazioth
  - Majaziot
  lexicon: transliteración bíblica
  rationale: Nombre propio transliterado de manera directa y publicable en español, sin añadir una consonante final no necesaria para la lectura.
theological_decisions:
- issue: Si la secuencia de nombres contiene una frase con sentido proposicional o sólo una lista de nombres propios
  english_pob_reading: Treat the entire sequence after 'the sons of Heman' as a list of personal names
  chosen_spanish_reading: Tratar toda la secuencia después de 'los hijos de Hemán' como una lista de nombres propios
  alternative_spanish_readings:
  - Leer parte de la secuencia como 'he engrandecido y exaltado ayuda' o una frase similar
  rationale: El contexto inmediato es un registro genealógico y de servicio musical, y la pauta morfológica/edición inglesa favorece leer estos elementos como nombres. La traducción española mantiene esa decisión para no importar una frase especulativa donde el texto funciona como roster.
  doctrine_reference: Principios POB de transparencia textual y fidelidad contextual
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la forma de 'Jerimoth' a 'Jerimoth' por mejor ajuste al hebreo וירימות; en español se optó por una forma equivalente breve ('Jeriot') coherente con la transliteración bíblica española y con la decisión de tratar toda la secuencia como nombres propios.
  spanish_consistency_notes:
  - Se mantiene 'Hemán' con tilde según norma española.
  - Se usa 'hijos' y no 'descendientes' para conservar la transparencia genealógica.
  - La lista se presenta con comas y una sola coordinación final para reflejar la estructura nominal.
  - Se preserva el nombre compuesto 'Romamti-ezer' con guion para señalar su unidad léxica.
  - Se evita 'SEÑOR' u otras sustituciones, pues el versículo no contiene el Tetragrámaton.
