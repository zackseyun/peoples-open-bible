translation:
  language: es
  text: Por la abundancia de tus iniquidades, en la injusticia de tu comercio[a], profanaste tus santuarios[b]; por eso saqué fuego de en medio de ti[c]—ese fuego te consumió—, y te reduje a cenizas sobre la tierra, a la vista de todos los que te veían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu comercio ambulante», «tu actividad comercial» o «tu tráfico comercial».
    reason: lexical_alternative
  - marker: b
    text: «Santuarios» conserva el plural del hebreo. También podría entenderse como «lugares santos».
    reason: lexical_alternative
  - marker: c
    text: Algunos traducen «saqué fuego de dentro de ti»; el hebreo describe el fuego como saliendo de en medio de ti como instrumento de juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵרֹב
  english_pob_choice: By the abundance of
  chosen_spanish: Por la abundancia de
  alternatives_spanish:
  - A causa de la abundancia de
  - Desde la abundancia de
  lexicon: HALOT
  rationale: מִן con רֹב puede expresar causa o procedencia. «Por la abundancia de» conserva la relación causal y suena natural en español sin alejarse de la estructura hebrea.
- source_word: עֲוֺנֶיךָ
  english_pob_choice: your iniquities
  chosen_spanish: tus iniquidades
  alternatives_spanish:
  - tus pecados
  - tu culpa
  lexicon: HALOT
  rationale: עָוֹן tiene fuerza moral de culpa/torcedura y en plural. «Iniquidades» mantiene el peso lexical y la pluralidad mejor que un «pecados» más general.
- source_word: בְּעֶוֶל
  english_pob_choice: in the unrighteousness of
  chosen_spanish: en la injusticia de
  alternatives_spanish:
  - en la maldad de
  - por la perversidad de
  lexicon: HALOT
  rationale: עֶוֶל denota injusticia, mal o injusticia moral. «Injusticia» reproduce bien el tono profético y permite enlazar con lo que sigue.
- source_word: רְכֻלָּתְךָ
  english_pob_choice: your trade
  chosen_spanish: tu comercio
  alternatives_spanish:
  - tu tráfico comercial
  - tu transacción comercial
  - tu mercadeo
  lexicon: HALOT
  rationale: En Ezequiel 27–28 el término se asocia con actividad mercantil. «Comercio» es claro y natural en español, y conserva el campo semántico sin introducir una connotación innecesariamente técnica.
- source_word: חִלַּלְתָּ
  english_pob_choice: you profaned
  chosen_spanish: profanaste
  alternatives_spanish:
  - deshonraste
  - desecraste
  - contaminaste
  lexicon: HALOT
  rationale: El piel de חלל se usa para profanar lo santo. «Profanaste» es la mejor correspondencia cultual y mantiene el registro sagrado del verbo.
- source_word: מִקְדָּשֶׁיךָ
  english_pob_choice: your sanctuaries
  chosen_spanish: tus santuarios
  alternatives_spanish:
  - tus lugares santos
  - tu santuario
  lexicon: HALOT
  rationale: La forma hebrea es plural, por lo que conviene retener el plural en español. «Santuarios» preserva la referencia cultual y deja abierta la tensión interpretativa del pasaje.
- source_word: וָאוֹצִא אֵשׁ מִתּוֹכְךָ
  english_pob_choice: so I brought out a fire from your midst
  chosen_spanish: por eso saqué fuego de en medio de ti
  alternatives_spanish:
  - y saqué fuego desde tu interior
  - por eso hice salir fuego de tu interior
  lexicon: HALOT
  rationale: El waw consecutivo avanza la secuencia de juicio. «Saqué fuego de en medio de ti» sigue de cerca el hebreo y evita añadir el artículo que el texto no tiene.
- source_word: הִיא אֲכָלַתְךָ
  english_pob_choice: it consumed you
  chosen_spanish: ese te consumió
  alternatives_spanish:
  - eso te consumió
  - te consumió
  - ella te consumió
  lexicon: HALOT
  rationale: El pronombre femenino remite a «fuego»; en español, un demostrativo como «ese» permite conservar la referencia sin forzar género personal sobre el fuego. «Consumió» reproduce bien la imagen de juicio.
- source_word: וָאֶתֶּנְךָ לְאֵפֶר
  english_pob_choice: I reduced you to ashes
  chosen_spanish: te reduje a ceniza
  alternatives_spanish:
  - te convertí en ceniza
  - te dejé en ceniza
  - te hice ceniza
  lexicon: HALOT
  rationale: El hebreo expresa el resultado de juicio con una fórmula idiomática de reducción. «Te reduje a ceniza» es natural y fiel al valor resultativo, y «ceniza» comunica el estado final con buena idiomaticidad en español.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra, país o suelo. Aquí la escena enfatiza humillación pública y visible; «sobre la tierra» conserva amplitud y solemnidad.
- source_word: לְעֵינֵי כָּל רֹאֶיךָ
  english_pob_choice: in the sight of all who saw you
  chosen_spanish: a la vista de todos los que te veían
  alternatives_spanish:
  - ante los ojos de todos los que te veían
  - a la vista de todos tus observadores
  lexicon: HALOT
  rationale: La expresión destaca la publicidad del juicio. «A la vista de todos los que te veían» mantiene el énfasis en los testigos oculares y suena idiomático en español.
theological_decisions:
- issue: Sentido de «tus santuarios» en una denuncia contra el rey/príncipe de Tiro
  english_pob_reading: Retain the literal cultic term 'your sanctuaries' without resolving whether the verse speaks purely of the historical ruler, the city/cult of Tyre, or a typological/supernatural figure.
  chosen_spanish_reading: Conservar «tus santuarios» en plural, sin resolver en la traducción si el referente es el gobernante histórico, la realidad de Tiro o una lectura tipológica/sobrenatural.
  alternative_spanish_readings:
  - tus lugares santos
  - tu santuario
  - tus cosas sagradas
  rationale: El hebreo usa un plural cultual claro. Traducirlo literalmente preserva la forma y mantiene la tensión interpretativa del pasaje, en vez de cerrarla con una explicación doctrinal previa.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
- issue: Imagen de fuego emergiendo «de en medio de ti»
  english_pob_reading: Some translate 'I brought out fire from within you'; the Hebrew depicts fire emerging from his midst as the instrument of judgment.
  chosen_spanish_reading: Mantener «saqué fuego de en medio de ti» como imagen de juicio que brota desde el interior o centro del personaje/ciudad.
  alternative_spanish_readings:
  - saqué fuego desde tu interior
  - saqué fuego de dentro de ti
  rationale: La formulación hebrea permite una imagen espacial directa y también puede sugerir el origen interno del juicio. La traducción conserva esa ambigüedad sin añadir una interpretación excesiva.
  doctrine_reference: 'Translation philosophy §3: Preservar la ambigüedad legítima del texto.'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa: se omite el artículo antes de «fuego» y se traduce el resultado como «te reduje a ceniza», manteniendo además el flujo causal de la secuencia de juicio.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «iniquidades» para עוֹן, manteniendo el peso moral y la pluralidad.
  - «Santuarios» conserva el plural hebreo y la tensión interpretativa documentada.
  - «Comercio» refleja רְכֻלָּה sin introducir una lectura de «tráfico» más fuerte que la del contexto inmediato.
  - «A la vista de» preserva el énfasis público de לְעֵינֵי en un español natural.
