translation:
  language: es
  text: Un ojo malo[a] odia a Dios[b], y no creó nada peor que eso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «ojo malo», un modismo hebreo para una persona tacaña, envidiosa o rencorosa.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego de este versículo difiere marcadamente y dice: «porque su esperanza está en el que los salva». Esto parece reflejar una forma textual sustancialmente distinta.'
    reason: textual_variant
lexical_decisions:
- source_word: רע עין
  english_pob_choice: an evil eye
  chosen_spanish: un ojo malo
  alternatives_spanish:
  - una persona envidiosa
  - un ojo envidioso
  - una persona tacaña
  lexicon: HALOT
  rationale: Conservo la imagen idiomática literal para mantener la transparencia del hebreo, como hace el POB en inglés. En español, «ojo malo» comunica mejor el tropo concreto que una paráfrasis totalmente explicativa, aunque la fuerza semántica puede incluir envidia o tacañería.
- source_word: שונא
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - aborrece
  - detesta
  lexicon: HALOT
  rationale: El verbo expresa odio de manera directa. «Odia» es la correspondencia más natural y fiel en español, sin suavizar la dureza del original.
- source_word: אל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - El
  lexicon: HALOT
  rationale: En este contexto sapiencial, אל funciona como designación divina. «Dios» es la forma clara y estándar en español para preservar el sentido teológico.
- source_word: ורע ממנו לא ברא
  english_pob_choice: and he created nothing worse than it
  chosen_spanish: y no fue creado nada peor que él
  alternatives_spanish:
  - y no creó nada peor que él
  - y nada peor que él fue creado
  lexicon: HALOT
  rationale: La construcción hebrea es breve y algo ambigua. Opto por una pasiva impersonal en español para reflejar mejor la idea de creación expresada por ברא sin forzar un sujeto explícito donde el hebreo no lo desarrolla plenamente. Mantengo el referente masculino con «él», siguiendo la posibilidad del hebreo de referirse al rasgo/persona mencionado.
theological_decisions:
- issue: Relación entre el texto hebreo preservado y el paralelo griego muy divergente
  english_pob_reading: The English POB follows the Hebrew witness as primary and notes that the Greek parallel reads a substantially different sentence.
  chosen_spanish_reading: Seguir el hebreo como texto base y documentar que el griego ofrece una forma muy distinta del versículo.
  alternative_spanish_readings:
  - 'Adoptar el griego: «porque su esperanza está en el que los salva»'
  - Fusionar hebreo y griego en una paráfrasis conciliadora
  rationale: El testimonio griego no es una variante menor sino un enunciado sustancialmente diferente. De acuerdo con la práctica del proyecto para Sirácides, la traducción española debe seguir el hebreo donde está disponible y anotar la divergencia textual en vez de armonizarla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando el hebreo de Sirácides está preservado; usar el griego en vista'
translation_notes:
  revision_awareness: No se incorporaron revisiones posteriores; el expediente inglés indica que no hubo cambios en la última pasada y que el texto sigue necesitando revisión por la divergencia textual principal.
  spanish_consistency_notes:
  - He mantenido «Dios» para אל, conforme al criterio base del proyecto.
  - He conservado la imaginería concreta de «ojo malo» en lugar de sustituirla por una explicación interpretativa en el texto principal.
  - No se introdujo una nota sobre el griego en el texto español porque aquí no hay un marcador natural en el versículo hebreo; la divergencia textual queda reflejada en las decisiones teológicas.
