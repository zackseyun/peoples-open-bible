    issue: La preposición en «por el Neguev» no sigue la revisión auditada del POB inglés ni el sentido direccional más cercano del hebreo.
    rationale: El expediente inglés fue corregido de «through the Negev» a «into the Negev». En español, «por el Neguev» sugiere tránsito a través de la región, mientras que la instrucción parece indicar subir hacia/entrar en esa zona como primera etapa de la ruta.
