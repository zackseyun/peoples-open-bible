  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/066/002.job-75854.json
  category: mistranslation
  tier: 2
  from: and exalted the righteous, and honored those beloved ones who were wise in
    understanding.
  to: and raised the horn of the holy ones, and exalted the righteous, and honored
    all who were wise in understanding.
  rationale: 'The draft omits an entire clause from the Syriac: "raised the horn of
    the holy ones" (w-arim qarna d-qadishe). Additionally, "beloved ones" appears
    to be a mistranslation or hallucination for "all" (khol).'
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/066/002.job-77367.json
  category: mistranslation
  from: sorcerers, diviners, and sinners
  to: sorcerers, diviners, and wizards
  rationale: The Syriac text lists three types of occult practitioners (kharashe,
    zakkure, yadu'e), corresponding to the biblical descriptions of Josiah's reforms
    (e.g., 2 Kings 23:24). The third term, 'yadu'e' (cognate to Hebrew 'yidde'onim'),
    means 'wizards', 'spiritists', or 'knowing ones'. Translating it as 'sinners'
    is a mistranslation that loses the specific category of forbidden practitioners.
