translation:
  language: es
  text: Por tanto, también esos dos fueron salvados[a], de entre seiscientos mil soldados de a pie, para introducirlos en una herencia[b], en una tierra que fluye con leche y miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo «entre los años» es difícil; puede significar que esos dos fueron preservados a través de los años o hasta la vejez. El griego paralelo, en cambio, dice más sencillamente: «siendo dos, fueron salvados».'
    reason: textual_variant
  - marker: b
    text: 'El griego paralelo continúa: «para introducirlos en una herencia, en una tierra que fluye con leche y miel». Probablemente conserva el sentido más completo del verso, donde el testimonio hebreo es más breve.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ αὐτοὶ δύο ὄντες / גם הם בשנים
  english_pob_choice: those two also / being two
  chosen_spanish: también esos dos
  alternatives_spanish:
  - ellos también, siendo dos
  - esos dos también
  lexicon: HALOT; BDAG
  rationale: La referencia dual debe quedar explícita en español. «También esos dos» reproduce el valor de גם הם / καὶ αὐτοὶ δύο sin sobrecargar la frase y mantiene la conexión con los personajes ya mencionados.
- source_word: נאצלו / διεσώθησαν
  english_pob_choice: were spared
  chosen_spanish: fueron salvados
  alternatives_spanish:
  - fueron preservados
  - fueron librados
  - fueron rescatados
  lexicon: HALOT; BDAG
  rationale: La pareja verbal hebreo-griego apunta a ser librados de destrucción y preservados para un fin posterior. En español, «fueron salvados» es natural y suficientemente amplio para conservar esa tensión sin estrecharla solo a rescate físico.
- source_word: משש מאות אלף רגלי / ἀπὸ ἑξακοσίων χιλιάδων πεζῶν
  english_pob_choice: out of six hundred thousand foot soldiers
  chosen_spanish: de entre seiscientos mil de a pie
  alternatives_spanish:
  - de entre seiscientos mil soldados de a pie
  - de entre seiscientos mil infantes
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego señalan el sentido militar de «los que iban a pie». En español, «de a pie» es idiomático, claro y conserva la imagen de contraste con los que iban a caballo o en carros.
- source_word: εἰσαγαγεῖν αὐτοὺς εἰς κληρονομίαν
  english_pob_choice: to bring them into an inheritance
  chosen_spanish: para introducirlos en una herencia
  alternatives_spanish:
  - para llevarlos a su herencia
  - para hacerlos entrar en su herencia
  lexicon: BDAG
  rationale: El griego añade la finalidad de llevarlos a la herencia prometida. «Introducirlos en una herencia» preserva el valor de entrada/ingreso y evita sustituir el lenguaje hereditaria del texto por una explicación más libre.
- source_word: εἰς γῆν ῥέουσαν γάλα καὶ μέλι
  english_pob_choice: into a land flowing with milk and honey
  chosen_spanish: en una tierra que fluye leche y miel
  alternatives_spanish:
  - en una tierra que mana leche y miel
  - a una tierra que fluye leche y miel
  lexicon: BDAG
  rationale: Se conserva el hebraísmo bíblico tradicional, pero en forma compatible con la sintaxis española. «Fluye leche y miel» mantiene la imagen del texto griego y su eco veterotestamentario.
- source_word: לכן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: Marca con claridad la inferencia desde la frase anterior. «Por tanto» es formal, natural y fiel al valor conclusivo del hebreo y del griego de apoyo.
theological_decisions:
- issue: Uso del testimonio griego para completar el hebreo breve/difícil
  english_pob_reading: Main text follows the Hebrew as primary but incorporates the Greek continuation about entering the inheritance and the land flowing with milk and honey.
  chosen_spanish_reading: El texto principal sigue el hebreo donde es legible, pero incorpora la continuación griega sobre la entrada en la herencia y la tierra de leche y miel.
  alternative_spanish_readings:
  - 'Traducir solo el hebreo conservado: «Por tanto, también esos dos fueron salvados, de entre seiscientos mil de a pie.»'
  - Reformular todo como una paráfrasis histórica del éxodo
  rationale: 'La lectura española debe reflejar la misma decisión crítica: el hebreo conservado es primario, pero el griego aporta una continuación significativa y probablemente más completa. Mantener ambos evita borrar la tensión textual y conserva el sentido de la preservación de Josué y Caleb para entrar en la tierra prometida.'
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives, with Greek parallel used alongside it'
translation_notes:
  revision_awareness: Alinear la cláusula final con la revisión inglesa más reciente, que prefirió «were spared» frente a «were delivered», y reflejar esa misma suavización semántica en español con «fueron salvados».
  spanish_consistency_notes:
  - Se conserva el estilo bíblico sobrio y no se sustituye «herencia» por explicaciones como «posesión» o «patrimonio» porque el contexto covenantal es explícito.
  - No se usa «SEÑOR» ni términos eclesiales tradicionales no motivados por el texto; la traducción sigue el contenido léxico del hebreo y del griego.
  - La expresión «de a pie» mantiene el valor de πεζῶν / רגלי sin convertirlo en una glosa militar más técnica que la del original.
