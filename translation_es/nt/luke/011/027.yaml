translation:
  language: es
  text: 'Y sucedió, mientras él decía estas cosas, que una mujer de entre la multitud levantó la voz[a] y le dijo: «Bienaventurado el vientre que te llevó[b] y los pechos que te amamantaron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alzó la voz». El modismo griego puede significar «levantó la voz» o «clamó».
    reason: lexical_alternative
  - marker: b
    text: O «que te dio a luz». El verbo griego puede expresar llevar o portar en el sentido de embarazo y parto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: BDAG
  rationale: Conserva la fórmula narrativa de transición de Lucas sin recurrir a un giro arcaizante. «Sucedió» mantiene el valor de introducción del acontecimiento en español natural.
- source_word: ἐν τῷ λέγειν αὐτὸν ταῦτα
  english_pob_choice: as he was saying these things
  chosen_spanish: mientras él decía estas cosas
  alternatives_spanish:
  - cuando él decía estas cosas
  - al decir él estas cosas
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa simultaneidad; «mientras» comunica bien la acción en curso y preserva el demostrativo «estas cosas».
- source_word: ἐπάρασά τις φωνὴν γυνὴ
  english_pob_choice: a woman ... raised her voice
  chosen_spanish: una mujer ... levantó la voz
  alternatives_spanish:
  - una mujer ... alzó la voz
  - una mujer ... gritó
  lexicon: BDAG
  rationale: Se mantiene el modismo griego de elevar la voz. «Levantó la voz» es idiomático en español y conserva el matiz de hablar en voz alta sin intensificarlo innecesariamente.
- source_word: ἐκ τοῦ ὄχλου
  english_pob_choice: from the crowd
  chosen_spanish: de entre la multitud
  alternatives_spanish:
  - de la multitud
  - desde la multitud
  lexicon: BDAG
  rationale: La expresión señala procedencia dentro del grupo. «De entre la multitud» refleja mejor la imagen espacial que un simple genitivo posesivo.
- source_word: Μακαρία
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado[a]
  alternatives_spanish:
  - Bendito[a]
  - Feliz
  lexicon: BDAG
  rationale: En un contexto de bienaventuranza/honor, «bienaventurado» preserva el registro bíblico y el valor de estado favorecido ante Dios. Se marca la concordancia con la estructura española sin alterar el sentido.
- source_word: ἡ κοιλία
  english_pob_choice: the womb
  chosen_spanish: el vientre
  alternatives_spanish:
  - el seno
  - el útero
  lexicon: BDAG
  rationale: En este contexto materno, κοιλία designa el órgano/ámbito de gestación. «Vientre» es natural en español y suficientemente preciso, sin la frialdad técnica de «útero».
- source_word: ἡ βαστάσασά σε
  english_pob_choice: that carried you
  chosen_spanish: que te llevó
  alternatives_spanish:
  - que te cargó
  - que te llevó en su seno
  lexicon: BDAG
  rationale: βαστάζω aquí alude a llevar/soportar en gestación y parto. «Te llevó» es claro en español y mantiene la posibilidad de un sentido de llevar en el embarazo sin explicitarlo en exceso.
- source_word: μαστοὶ
  english_pob_choice: the breasts
  chosen_spanish: los pechos
  alternatives_spanish:
  - los senos
  - las mamas
  lexicon: BDAG
  rationale: Se conserva el término anatómico directo. «Pechos» es comprensible y conserva la concreción corporal del griego sin introducir un eufemismo más distante.
- source_word: οὓς ἐθήλασας
  english_pob_choice: that nursed you
  chosen_spanish: que te amamantaron
  alternatives_spanish:
  - que te dieron de mamar
  - de los que mamaste
  lexicon: BDAG
  rationale: El verbo refiere a lactancia/succión. «Amamantaron» expresa de forma clara y digna la acción materna en español actual, manteniendo el vínculo con el sustento infantil.
theological_decisions:
- issue: Cómo traducir μακαρία sin resolver la fuerza honorífica del elogio
  english_pob_reading: Blessed is the womb that carried you, and the breasts that nursed you.
  chosen_spanish_reading: Bienaventurado[a] el vientre que te llevó, y los pechos que te amamantaron.
  alternative_spanish_readings:
  - Feliz el vientre...
  - Bendito[a] el vientre...
  rationale: La exclamación honra a la madre de Jesús sin desarrollar una doctrina posterior. «Bienaventurado» conserva el tono bíblico de favor y honor ante Dios, sin debilitar ni exagerar el pasaje.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Cómo reflejar el sujeto femenino de la exclamación con concordancia española
  english_pob_reading: a woman ... said to him
  chosen_spanish_reading: 'una mujer ... le dijo: «Bienaventurado[a] ...»'
  alternative_spanish_readings:
  - 'una mujer ... le dijo: «Bienaventurada ...»'
  - 'una mujer ... le dijo: «Bienaventurado ...»'
  rationale: El griego presenta una mujer como hablante, pero la bendición se formula sobre «el vientre». En español se conserva la concordancia gramatical del predicado con el sintagma nominal citado, y se marca la flexión opcional para lectura natural según el formato editorial.
  doctrine_reference: Grammatical clarity with source fidelity
translation_notes:
  revision_awareness: 'Se revisó el paralelo inglés y el griego: se mantuvo la transición narrativa, el valor simultáneo de ἐν τῷ λέγειν, el modismo de levantar la voz y la imaginería materna concreta. No se detectaron revisiones textuales que exigieran una desviación del sentido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conservó el registro bíblico con «bienaventurado», coherente con el campo semántico de μακάριος.
  - Se evitó «Cristo» porque el versículo no contiene Χριστός.
  - Se eligió «pechos» por fidelidad anatómica y por corresponder al paralelismo materno del griego.
  - La puntuación y comillas siguen normas españolas y mantienen el tono publicable.
