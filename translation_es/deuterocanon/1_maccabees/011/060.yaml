translation:
  language: es
  text: Y salió Jonatán[a], y atravesaba más allá del río y por las ciudades; y se reunieron a él todas las fuerzas de Siria como aliados[b], y llegó a Ascalón, y los hombres de la ciudad salieron a recibirlo con honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El río» no se identifica en el griego; en este contexto histórico probablemente se refiere al Éufrates.
    reason: cultural_note
  - marker: b
    text: O «para una alianza» / «en alianza». La frase griega εἰς συμμαχίαν indica que las fuerzas de Siria se reunieron en apoyo de Jonatán.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - salió de allí
  lexicon: LSJ
  rationale: El aoristo de ἐξέρχομαι expresa la salida de Jonatán; «salió» es natural en español y conserva el movimiento narrativo sin añadir matiz militar que el griego no explicita por sí mismo.
- source_word: διεπορεύετο
  english_pob_choice: traveled
  chosen_spanish: atravesaba
  alternatives_spanish:
  - iba pasando
  - recorría
  lexicon: LSJ
  rationale: El imperfecto indica acción continuada. «Atravesaba» mantiene esa continuidad y se ajusta bien al contexto de desplazamiento por una región y sus ciudades.
- source_word: πέραν τοῦ ποταμοῦ
  english_pob_choice: beyond the river
  chosen_spanish: más allá del río
  alternatives_spanish:
  - al otro lado del río
  - a la otra orilla del río
  lexicon: LSJ
  rationale: La expresión griega es general y no nombra el río; «más allá del río» conserva esa indefinición, como en el texto base inglés. No se identifica en el texto principal.
- source_word: ἐν ταῖς πόλεσιν
  english_pob_choice: through the cities
  chosen_spanish: por las ciudades
  alternatives_spanish:
  - en las ciudades
  - entre las ciudades
  lexicon: LSJ
  rationale: Aunque ἐν es literalmente «en», con verbo de movimiento el sentido es de tránsito por diversos lugares. «Por las ciudades» suena natural en español y conserva la idea de recorrido.
- source_word: ἠθροίσθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidas
  - se congregaron
  lexicon: LSJ
  rationale: El pasivo indica que las fuerzas convergieron hacia Jonatán. «Se reunieron» comunica bien esa reunión colectiva sin forzar una voz más técnica.
- source_word: δυνάμεις
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - ejércitos
  lexicon: LSJ
  rationale: En contexto militar, δυνάμεις designa cuerpos armados. «Fuerzas» preserva amplitud y evita hacer demasiado específica la unidad militar.
- source_word: εἰς συμμαχίαν
  english_pob_choice: as allies
  chosen_spanish: como aliados
  alternatives_spanish:
  - para una alianza
  - en alianza
  lexicon: LSJ
  rationale: La frase expresa la relación de apoyo/alianza respecto de Jonatán. «Como aliados» traduce el efecto de forma idiomática sin perder el sentido relacional señalado por el inglés auditado.
- source_word: Ἀσκαλῶνα
  english_pob_choice: Ashkelon
  chosen_spanish: Ascalón
  alternatives_spanish:
  - Ascalón (Ashkelon)
  - Ashkelón
  lexicon: LSJ
  rationale: Se usa la forma española tradicional y reconocible del topónimo. Es válida y más natural para lectores en español que la transliteración inglesa.
- source_word: ἀπήντησαν αὐτῷ
  english_pob_choice: met him
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo encontraron
  - salieron a recibirlo
  lexicon: LSJ
  rationale: En este contexto la simple idea de «encontrarse» lleva implícita una recepción respetuosa, que el adverbio siguiente desarrolla. «Lo recibieron» mantiene esa matización honorífica mejor que un «lo encontraron» neutro.
- source_word: ἐνδόξως
  english_pob_choice: with honor
  chosen_spanish: con honor
  alternatives_spanish:
  - honorablemente
  - gloriosamente
  lexicon: LSJ
  rationale: El adverbio señala una manera honorable o distinguida de recibirlo. «Con honor» es claro y fiel, y evita una elevación innecesaria en español.
theological_decisions:
- issue: Recepción honorífica de Jonatán por la ciudad
  english_pob_reading: the men of the city met him with honor
  chosen_spanish_reading: los hombres de la ciudad lo recibieron con honor
  alternative_spanish_readings:
  - los hombres de la ciudad lo encontraron con honor
  - los hombres de la ciudad salieron a recibirlo con honor
  rationale: No se introduce una interpretación religiosa donde el texto presenta una recepción cívica/honorífica. Se conserva la dignidad del encuentro sin sobreteologizarlo.
  doctrine_reference: Narrative historical reading; no special doctrinal claim
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete 1909 y concuerda con el audit trail inglés: salida inicial de Jonatán, movimiento continuo por regiones urbanas, reunión de fuerzas sirias en relación de alianza, llegada a Ascalón y recepción honorífica por parte de los habitantes. No se detectan revisiones previas que exijan cambios adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Jonatán» se conserva como forma española habitual del nombre propio.
  - «Ascalón» se usa como topónimo español tradicional, coherente con el registro bíblico en español.
  - «fuerzas» y «aliados» preservan el matiz militar-relacional sin convertir la frase en una formulación eclesiástica o doctrinal.
