review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: Dios prueba el corazón, se complace en la rectitud, David ha dado voluntariamente, y ve al pueblo presente ofrecer voluntariamente con alegría. Sin embargo, hay dos desajustes con la evidencia y la pista de auditoría inglesa: (1) la nota [b] se ancla en «todas estas cosas», pero la nota inglesa b explica «tu pueblo que está presente aquí» (hebreo «tu pueblo que se encuentra aquí»); (2) «se ofrece voluntariamente a ti» en español tiende a sonar como si el pueblo se ofreciera a sí mismo, no necesariamente que ofreciera dones a Dios. Conviene explicitar el objeto implícito con «presentar ofrendas» o similar, conforme al contexto cultual y al rationale documentado.'
  spanish_quality_summary: El español es claro y digno, pero «tu pueblo, el que está presente aquí» suena algo forzado; «tu pueblo que está presente aquí» o «tu pueblo presente aquí» es más natural. Además, «se ofrece voluntariamente a ti» resulta ambiguo en español. El resto del verso es legible y fiel.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: «mi Dios», «corazón», «rectitud» y «voluntariamente» están bien elegidos. La decisión de mantener «rectitud» para מֵישָׁרִים / יֹשֶׁר es defendible y coherente. La mejora principal es semántica y de nota, no de glosario.'
  issues:
  - severity: high
    issue: La nota [b] está aplicada al segmento equivocado.
    rationale: En la auditoría inglesa, la nota b corresponde a עַמְּךָ הַנִּמְצְאוּ פֹה («tu pueblo que se encuentra/presente aquí»), no a כָל אֵלֶּה («todas estas cosas»). El borrador introduce una nota nueva no respaldada por la pista y omite la nota documentada.
  - severity: medium
    issue: «Se ofrece voluntariamente a ti» es ambiguo en español.
    rationale: El hebreo לְהִתְנַדֶּב לָךְ retoma el campo semántico de ofrenda voluntaria en contexto de dones para el templo. En español, «se ofrece a ti» puede entenderse como autoentrega personal; «presentar ofrendas voluntariamente para ti» o «ofrecer voluntariamente para ti» evita esa ambigüedad.
  - severity: low
    issue: «Tu pueblo, el que está presente aquí» suena menos natural de lo necesario.
    rationale: La relativa explicativa con coma y singular colectivo complica la lectura. «Tu pueblo que está presente aquí» o «tu pueblo presente aquí» preserva el sentido con mejor fluidez.
