translation:
  language: es
  text: Y hizo el Salón del Trono[a], donde había de juzgar, el Salón de juicio; y estaba revestido de cedro, del piso al piso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, "del piso al techo". El hebreo dice literalmente "del piso al piso".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: Hall
  chosen_spanish: Salón
  alternatives_spanish:
  - Sala
  - Pabellón
  - Vestíbulo
  lexicon: HALOT
  rationale: אוּלָם designa un espacio arquitectónico amplio, tipo hall o pórtico. En español, "salón" comunica bien ese espacio formal y palaciego sin sonar tan pequeño o doméstico como "vestíbulo".
- source_word: הַכִּסֵּא
  english_pob_choice: the Throne
  chosen_spanish: el Trono
  alternatives_spanish:
  - el asiento real
  - el trono-asiento
  lexicon: HALOT
  rationale: כִּסֵּא puede significar "trono" o "asiento". En este contexto real, "el Trono" conserva la fuerza regia del término y corresponde al uso documental del POB inglés.
- source_word: אֲשֶׁר יִשְׁפָּט שָׁם
  english_pob_choice: where he was to judge
  chosen_spanish: donde él había de juzgar
  alternatives_spanish:
  - donde juzgaba
  - donde iba a juzgar
  - donde impartía juicio
  lexicon: HALOT
  rationale: El imperfecto puede expresar función prevista o habitual. "Había de juzgar" conserva ese valor de finalidad/función del recinto sin fijarlo de manera excesiva en un solo tiempo narrativo.
- source_word: אֻלָם הַמִּשְׁפָּט
  english_pob_choice: the Hall of Judgment
  chosen_spanish: el Salón del Juicio
  alternatives_spanish:
  - el salón de juicio
  - la sala de justicia
  lexicon: HALOT
  rationale: La construcción nominal nombra la estancia por su función. "Juicio" mantiene el sustantivo más cercano a מִשְׁפָּט y evita suavizarlo con "justicia", que sería más interpretativo aquí.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - construyó
  - edificó
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio, "hacer". En una descripción arquitectónica, "hizo" sigue de cerca el hebreo y resulta natural en español bíblico contemporáneo.
- source_word: וְסָפוּן בָּאֶרֶז
  english_pob_choice: and it was paneled with cedar
  chosen_spanish: y estaba revestido de cedro
  alternatives_spanish:
  - y estaba panelado con cedro
  - y estaba cubierto de cedro
  lexicon: HALOT
  rationale: סָפוּן expresa cubrir, recubrir o panelar. "Revestido de cedro" es un equivalente natural en español para un interior acabado con madera, sin perder la idea de recubrimiento.
- source_word: מֵהַקַּרְקַע עַד הַקַּרְקָע
  english_pob_choice: from floor to floor
  chosen_spanish: del piso al piso
  alternatives_spanish:
  - del suelo al suelo
  - del piso al techo
  lexicon: HALOT
  rationale: El hebreo repite literalmente "suelo/piso". El español conserva esa repetición con "del piso al piso" para respetar la forma del original y mantener abierta la tensión interpretativa del alcance vertical.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el trazado auditado del POB inglés. Se conserva la tensión de מֵהַקַּרְקַע עַד הַקַּרְקָע con una nota alternativa en vez de resolverla de forma exclusiva, tal como hace el original inglés.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - '"Salón" se usa de manera consistente para un espacio arquitectónico formal amplio; no se eligió "vestíbulo" por sonar más reducido.'
  - '"Juicio" se conserva para מִשְׁפָּט conforme al POB inglés; no se sustituyó por "justicia" en el texto principal.'
