  to: Líbrame de la espada mi vida[a], mi única[b], de la mano[c] del perro.
  rationale: Se restauró explícitamente נַפְשִׁי como «mi vida» para preservar el paralelismo y la referencia antropológica del original, en línea con la decisión del POB inglés. Se ajustó יְחִידָתִי a «mi única», que en español poético es más natural que «mi único» y mantiene la ambigüedad/intensidad del hebreo sin sobreexplicarla en el texto principal. Se reordenaron y corrigieron las notas para que correspondan al término adecuado y se mantuvo «de la mano del perro» con aclaración idiomática.
