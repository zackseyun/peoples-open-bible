translation:
  language: es
  text: ¿A quién, pues, me compararéis[a], para que yo sea su igual? dice el Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿A quién, pues, me asemejaréis, para que yo sea su igual?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל / מִי
  english_pob_choice: To whom then
  chosen_spanish: ¿A quién, pues,
  alternatives_spanish:
  - ¿A quién entonces,
  - ¿Y a quién, pues,
  lexicon: HALOT
  rationale: La preposición interrogativa exige 'a quién' en español; 'pues' comunica el valor discursivo de transición de וְ/אֶל sin sonar mecánico. Se conserva el tono retórico de pregunta abierta.
- source_word: תְדַמְּיוּנִי
  english_pob_choice: will you compare me
  chosen_spanish: me compararéis
  alternatives_spanish:
  - me haréis comparable
  - me asemejaréis
  - me likearéis
  lexicon: HALOT
  rationale: דמה en piel expresa 'comparar, asemejar'. 'Compararéis' es claro y digno en español, y mantiene la dirección verbal hacia 'me' sin añadir elementos ajenos.
- source_word: וְאֶשְׁוֶה
  english_pob_choice: that I should be equal
  chosen_spanish: para que yo sea igual
  alternatives_spanish:
  - para que yo sea comparable
  - para que yo sea equivalente
  - y que yo sea igual
  lexicon: HALOT
  rationale: שוה comunica igualdad/equivalencia. 'Para que yo sea igual' conserva la finalidad/resultadidad del giro hebreo y evita introducir un segundo referente masculino inexistente en el texto.
- source_word: יֹאמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - dice así
  - ha dicho
  lexicon: HALOT
  rationale: La fórmula profética en presente es natural en español bíblico contemporáneo; 'dice' reproduce la introducción directa de palabra divina con concisión.
- source_word: קָדוֹשׁ
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - el Santo Dios
  - el Santo de Israel
  lexicon: HALOT
  rationale: El hebreo tiene simplemente 'Santo', como título divino. 'El Santo' preserva la brevedad y evita expandir el título a 'de Israel' sin base textual en este versículo.
theological_decisions:
- issue: Incomparabilidad divina
  english_pob_reading: Render the verse as a rhetorical assertion of God's uniqueness without expanding the title or importing later doctrinal language.
  chosen_spanish_reading: Mantener la pregunta retórica como afirmación de que nadie puede ser puesto en paralelo con Yahvé.
  alternative_spanish_readings:
  - ¿Con quién me compararéis?
  - ¿A quién me asemejaréis?
  rationale: El hebreo enfatiza la singularidad e incomparabilidad de Dios. La traducción debe conservar esa tensión retórica sin suavizarla ni explicitar un sujeto ausente.
  doctrine_reference: Isaías 40:25; unicidad y santidad de Dios en la profecía.
translation_notes:
  revision_awareness: La versión española sigue la revisión auditada del inglés al preferir 'igual' en vez de una expansión interpretativa como 'como él'. También evita añadir 'him' o cualquier referente no presente en el hebreo, manteniendo la estructura retórica del texto fuente.
  spanish_consistency_notes:
  - Se usa 'Santo' como título divino breve, consistente con el hebreo y con la decisión inglesa de no expandir a 'Holy One of Israel'.
  - '''A quién'' mantiene el objeto de comparación exigido por el hebreo y el español natural.'
  - Se conserva el valor discursivo de וְ/אֶל con 'pues', en lugar de una conjunción más literal pero menos idiomática.
