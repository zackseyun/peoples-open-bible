revisions:
- from: 'Pero un mensajero llegó a Saúl[a], diciendo: «Apresúrate y ven[b], porque los filisteos han invadido la tierra».'
  to: 'Pero un mensajero llegó a Saúl, diciendo: «Apresúrate y ven[a], porque los filisteos han hecho una incursión en la tierra[b]».'
  rationale: Se corrige el verbo principal de la acción filistea para reflejar con mayor fidelidad פָשְׁטוּ como incursión/raid, no como invasión plena. Se elimina una nota redundante sobre «Saúl» que no preservaba ninguna alternativa significativa. Se conserva «ven» como decisión contextual válida, con una nota mejor enfocada.
