  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del decreto y acierta en χρῆσθαι, νόμοις y καθὰ καὶ τὸ πρότερον. También conserva correctamente la nota léxica sobre δαπανήμασιν. Sin embargo, la frase final no representa con suficiente precisión περὶ τῶν ἠγνοημένων: el griego expresa ‘con respecto a / acerca de las cosas hechas en ignorancia’, no principalmente una causalidad con ‘por’.'
  spanish_quality_summary: El español es claro y legible, con registro digno y natural. No obstante, ‘por las cosas hechas por ignorancia’ suena algo forzado y repetitivo en español. Una formulación como ‘respecto de las cosas hechas por ignorancia’ o ‘acerca de…’ mejora la naturalidad y preserva mejor la función de περὶ.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Recursos’ para δαπανήμασιν sigue la revisión inglesa auditada y funciona bien en español; ‘leyes’ para νόμοις también está bien. La única corrección necesaria es preposicional/sintáctica en la cláusula final para ajustarse mejor al griego y al audit trail inglés.
  issues:
  - severity: medium
    issue: La cláusula ‘se le moleste por las cosas hechas por ignorancia’ no refleja con precisión περὶ τῶν ἠγνοημένων.
    rationale: περὶ aquí indica referencia/asunto (‘acerca de’, ‘respecto de’, ‘concerniente a’), como también muestra el inglés POB ‘concerning’. En español, ‘por’ tiende a leerse como causa o motivo de sanción, lo cual estrecha y desplaza el sentido.
  - severity: low
    issue: La secuencia ‘por las cosas hechas por ignorancia’ resulta estilísticamente pesada.
    rationale: La repetición de ‘por’ reduce la fluidez en español. Cambiar la primera preposición a ‘respecto de’ mejora la legibilidad sin alterar el contenido.
