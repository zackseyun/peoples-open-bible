translation:
  language: es
  text: ¿Por qué ocultas tu rostro y me consideras tu enemigo[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me consideras un enemigo para ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Por qué motivo?
  lexicon: HALOT
  rationale: Interrogativo directo de causa o motivo; en español natural y reverente, «¿Por qué» comunica la misma pregunta retórica y mantiene el tono poético.
- source_word: פָנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu rostro». En español, «rostro» conserva la imagen concreta y su fuerza relacional mejor que una paráfrasis abstracta como «presencia».
- source_word: תַסְתִּיר
  english_pob_choice: do you hide
  chosen_spanish: ocultas
  alternatives_spanish:
  - escondes
  - cubres
  lexicon: HALOT
  rationale: La forma causativa de סתר pide un verbo de ocultar/esconder. «Ocultas» suena natural en español y conserva la metáfora de Dios que retira su rostro.
- source_word: וְתַחְשְׁבֵנִי
  english_pob_choice: consider me
  chosen_spanish: me consideras
  alternatives_spanish:
  - me cuentas
  - me reputas
  - me estimas
  lexicon: HALOT
  rationale: חשב puede significar pensar, contar, considerar o reputar. El contexto exige una valoración judicial o relacional; «me consideras» refleja bien ese juicio sin forzar un giro contable.
- source_word: לְאוֹיֵב
  english_pob_choice: as your enemy
  chosen_spanish: tu enemigo
  alternatives_spanish:
  - como enemigo
  - como tu enemigo
  lexicon: HALOT
  rationale: El complemento predicativo con ל se entiende como la identidad asignada a Job. En español, «tu enemigo» integra de manera natural la relación implícita por el texto hebreo y evita redundancia innecesaria.
- source_word: לָךְ
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - para ti
  - de ti
  lexicon: HALOT
  rationale: Aunque formalmente el hebreo expresa relación hacia/para ti, el sentido aquí es posesivo-relacional. En español, el posesivo «tu» reproduce la lectura adoptada por la POB inglesa y su alternativa documentada.
theological_decisions:
- issue: Mantener la imagen antropomórfica del «rostro» de Dios
  english_pob_reading: Retain the anthropomorphic expression 'hide your face' in the main text.
  chosen_spanish_reading: Conservar «ocultas tu rostro» en el texto principal.
  alternative_spanish_readings:
  - apartas tu presencia
  - te vuelves de mí
  - retiras tu favor
  rationale: El hebreo usa la metáfora concreta del rostro como expresión de presencia, favor o atención. Mantenerla en español preserva la textura poética y evita interpretar de más la imagen.
  doctrine_reference: 'Principios de traducción POB: equivalencia óptima; nota de metáfora antropomórfica'
- issue: Relación entre «enemigo» y el complemento relacional implícito por לָךְ
  english_pob_reading: '''consider me your enemy'' / alternative ''consider me an enemy to you''.'
  chosen_spanish_reading: «me consideras tu enemigo»
  alternative_spanish_readings:
  - me consideras enemigo para ti
  - me consideras un enemigo para ti
  rationale: El hebreo permite tanto una lectura posesiva como relacional. El español «tu enemigo» comunica de forma directa la acusación dolorosa sin perder la tensión entre enemistad y relación personal con Dios.
  doctrine_reference: 'Principios de traducción POB: preservar tensiones léxicas y relacionales'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la lectura inglesa revisada «consider me your enemy», evitando una mecanización de «count me» y conservando la metáfora de «tu rostro».
  spanish_consistency_notes:
  - Se usa «rostro» para פָנֶיךָ según el valor literal y poético del hebreo.
  - Se usa «enemigo» como predicado relacional, no como simple etiqueta abstracta.
  - La nota al pie preserva la alternativa relacional documentada en la POB inglesa.
  - La puntuación interrogativa española se ajusta al orden natural sin alterar el paralelismo del verso.
