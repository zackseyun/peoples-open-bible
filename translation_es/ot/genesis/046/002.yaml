translation:
  language: es
  text: 'Y Dios habló a Israel en visiones de la noche, y dijo[a]: «Jacob, Jacob». Y él dijo[b]: «Aquí estoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en visiones nocturnas».'
    reason: alternative_reading
  - marker: b
    text: 'O: «habló a Israel en visiones de la noche y dijo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El término se refiere al Dios verdadero y singular; en español, «Dios» comunica con naturalidad el referente sin perder la fuerza monoteísta del hebreo.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre narrativo «Israel» en la cláusula de contexto, siguiendo la alternancia intencional del hebreo sin armonizarla con el nombre del discurso directo.
- source_word: בְּמַרְאֹת הַלַּיְלָה
  english_pob_choice: in visions of the night
  chosen_spanish: en visiones de la noche
  alternatives_spanish:
  - en visiones nocturnas
  - en visiones de la noche
  lexicon: HALOT
  rationale: La construcción plural se mantiene de forma transparente en español. «Visiones de la noche» conserva el valor visionario y el marco nocturno sin introducir una paráfrasis más libre.
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke / said
  chosen_spanish: habló / dijo
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Se usa «habló» para el inicio del acto comunicativo y «dijo» para introducir el discurso directo, una solución natural en español que conserva la repetición verbal del hebreo sin sonar redundante.
- source_word: יַעֲקֹב יַעֲקֹב
  english_pob_choice: Jacob, Jacob
  chosen_spanish: Jacob, Jacob
  alternatives_spanish:
  - ¡Jacob, Jacob!
  lexicon: HALOT
  rationale: Se retiene la repetición exacta del nombre como vocativo enfático, ya que el hebreo enfatiza la llamada personal y urgente.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Aquí me tienes
  lexicon: HALOT
  rationale: «Aquí estoy» es el equivalente natural y digno en español para una respuesta de disponibilidad y presencia. Mantiene la fuerza relacional de la fórmula hebrea sin arcaísmo excesivo.
theological_decisions:
- issue: Alternancia entre los nombres Israel y Jacob
  english_pob_reading: Preserve 'Israel' in the narrative clause and 'Jacob' in the divine address
  chosen_spanish_reading: Conservar «Israel» en la cláusula narrativa y «Jacob» en el llamado divino
  alternative_spanish_readings:
  - Usar «Jacob» en todo el versículo
  - Usar «Israel» en todo el versículo
  rationale: El hebreo alterna deliberadamente entre el nombre pactal del narrador y el nombre personal del destinatario del llamado. La traducción conserva esa tensión literaria y teológica en lugar de resolverla por uniformidad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Uso de «habló» y «dijo» para וַיֹּאמֶר
  english_pob_reading: spoke / said
  chosen_spanish_reading: «habló» para la narración y «dijo» para la cita directa
  alternative_spanish_readings:
  - «dijo» en ambas ocurrencias
  rationale: En español, «habló» fluye bien en la cláusula introductoria y evita una acumulación demasiado mecánica de «dijo... y dijo»; al mismo tiempo, la traducción no pierde el contenido semántico del verbo אמר.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión inglesa más reciente colapsa una redacción anterior más redundante al preferir una sola mención explícita de «said» en la transición. La presente redacción española sigue ese principio de fluidez sin perder ninguno de los elementos del hebreo: sujeto divino, destinatario, ámbito visionario, vocativo repetido y respuesta de disponibilidad.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin sustituirlo por «SEÑOR», conforme al nombre divino del texto hebreo.
  - Se preserva «Israel» en la cláusula narrativa y «Jacob» en el vocativo, respetando la alternancia del original.
  - «Aquí estoy» se usa como fórmula idiomática de disponibilidad; no se arcaíza a menos que el contexto lo requiera.
  - Las comillas angulares y la puntuación siguen el uso editorial en español bíblico moderno.
