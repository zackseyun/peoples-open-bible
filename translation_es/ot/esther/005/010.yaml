  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están en línea con el proyecto, salvo que «mandó traer» sustituye indebidamente dos verbos hebreos por una sola expresión española, contrariando la racionalidad documentada del POB para וַיִּשְׁלַח.
