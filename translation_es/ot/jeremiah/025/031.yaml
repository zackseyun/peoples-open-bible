    text: 'O: «los ha entregado a la espada».'
    reason: lexical_alternative
  revision_rationale: Se revisa «pleito» a «causa» para reflejar mejor el matiz forense de רִיב en un español más sobrio y panhispánico, y se ajusta «con las naciones» a «contra las naciones» por coherencia con la construcción jurídica y el sentido adversativo del contexto. También se corrige la nota sobre «ha entregado ... a la espada» para alinearla con el hebreo y con la documentación del POB inglés.
