revisions:
- from: Pero nosotros esperaremos en Dios, nuestro Salvador[a], porque el dominio de nuestro Dios es para siempre con misericordia[d][c][b], y el reino de nuestro Dios es para siempre sobre las naciones.
  to: Pero nosotros pondremos nuestra esperanza en Dios, nuestro Salvador[a], porque el dominio de nuestro Dios es para siempre con misericordia[d][b], y el reino[c] de nuestro Dios es para siempre sobre las naciones.
  rationale: Se revisa el inicio para usar una construcción más natural en español para ἐλπιοῦμεν ἐπὶ τὸν θεόν, preservando el futuro y el sentido de esperanza confiada. Se eliminó el marcador [c] de 'misericordia' y se ancló correctamente en 'reino', ya que esa nota corresponde a βασιλεία/reign, no a μετʼ ἐλέους. El resto de la terminología principal se mantiene por su buena alineación con el griego y el rastro de auditoría inglés.
