id: JHN.16.8
reference: 'John 16:8'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν ἐκεῖνος ἐλέγξει τὸν κόσμον περὶ ἁμαρτίας καὶ περὶ δικαιοσύνης καὶ περὶ κρίσεως·
base_translation:
  language: en
  yaml_path: translation/nt/john/016/008.yaml
  text: And when that one comes[c][b][a], he will convict the world concerning sin and concerning righteousness and concerning judgment.
  footnotes:
  - marker: a
    text: Or 'he'; Greek has the emphatic demonstrative 'that one,' referring to the coming Paraclete.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.'
    reason: alternative_reading
  - marker: c
    text: Or 'And when he comes, that one'.
    reason: previous_rendering
translation:
  language: ko
  text: 그분이 오시면, 세상의 죄와 의와 심판에 대하여 책망하실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그분이」. 헬라어는 강조의 지시대명사 「저분」을 사용해 오시는 보혜사를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「정의」 (의에 대하여).
    reason: lexical_alternative
  - marker: c
    text: 또는 「그가 오실 때, 곧 그분이」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλέγξει
  english_pob_choice: convict
  chosen_korean: 책망하다
  alternatives_korean:
  - 깨우치다
  - 드러내다
  - 정죄하다
  lexicon: BDAG
  rationale: ἐλέγχω는 죄를 폭로하고 책망하여 깨닫게 함의 의미를 가진다. 한국 신약 어휘 관용에 따라 「책망하다」를 채택하되, 깨우침의 차원을 각주로 보존.
- source_word: περὶ ἁμαρτίας / δικαιοσύνης / κρίσεως
  english_pob_choice: concerning sin/righteousness/judgment
  chosen_korean: 죄와 의와 심판에 대하여
  alternatives_korean: []
  lexicon: BDAG
  rationale: 세 항목의 평행 구조를 보존.
