translation:
  language: es
  text: Pues ¿quién, mientras practica piadosamente la filosofía[a] conforme a toda la regla de la filosofía, y habiendo puesto su confianza en Dios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras vive filosóficamente de un modo piadoso conforme a toda la norma de la filosofía». El griego condensa en una frase participial tanto el modo («piadosamente») como la práctica («filosofar»/«practicar la filosofía»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: LSJ
  rationale: Introduce la relación explicativa con lo anterior. «Porque» conserva la conexión argumentativa de manera natural en español.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿qué persona?
  - ¿cuál?
  lexicon: LSJ
  rationale: Es un pronombre interrogativo retórico; «¿quién?» es la opción más idiomática y directa.
- source_word: πρὸς
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: LSJ
  rationale: Con κανόνα, πρὸς expresa conformidad con una norma. «Conforme a» mantiene la idea de ajuste a un estándar.
- source_word: ὅλον
  english_pob_choice: the whole
  chosen_spanish: toda
  alternatives_spanish:
  - la entera
  - completa
  lexicon: LSJ
  rationale: Modifica a κανόνα y refuerza la totalidad. «Toda» reproduce de forma natural el valor totalizador.
- source_word: κανόνα
  english_pob_choice: rule
  chosen_spanish: regla
  alternatives_spanish:
  - norma
  - estándar
  - canon
  lexicon: LSJ
  rationale: En este contexto moral/filosófico, κανών es una regla o norma. «Regla» es clara y conserva el sentido normativo.
- source_word: εὐσεβῶς
  english_pob_choice: devoutly
  chosen_spanish: piadosamente
  alternatives_spanish:
  - devotamente
  - reverentemente
  lexicon: LSJ
  rationale: El adverbio expresa modo piadoso. «Piadosamente» comunica la seriedad religiosa sin perder el matiz del original.
- source_word: φιλοσοφῶν
  english_pob_choice: practicing philosophy
  chosen_spanish: practica la filosofía
  alternatives_spanish:
  - filosofa
  - lleva una vida filosófica
  lexicon: LSJ
  rationale: El participio describe una manera de vivir, no mera especulación. «Practica la filosofía» sigue el criterio del POB inglés y su revisión reciente.
- source_word: πεπιστευκὼς
  english_pob_choice: having put his trust
  chosen_spanish: habiendo puesto su confianza
  alternatives_spanish:
  - habiendo creído
  - confiando
  lexicon: LSJ
  rationale: El perfecto enfatiza una confianza ya asumida y vigente. «Habiendo puesto su confianza» expresa mejor la confianza estable que un simple «haber creído».
- source_word: θεῷ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - a Dios
  - sobre Dios
  lexicon: LSJ
  rationale: Con πιστεύω, el español natural usa «en». Mantiene la dirección de la confianza hacia Dios.
theological_decisions:
- issue: πιστεύω como confianza/reliance en un contexto sapiencial-martirial
  english_pob_reading: having put his trust in God
  chosen_spanish_reading: habiendo puesto su confianza en Dios
  alternative_spanish_readings:
  - habiendo creído a Dios
  - confiando en Dios
  rationale: El contexto apunta a dependencia y lealtad confiada, no solo a asentimiento mental. «Habiendo puesto su confianza» preserva ese matiz sin cargar el texto con terminología doctrinal ajena al griego aquí.
  doctrine_reference: 'DOCTRINE.md: πίστις default ''faith'' with ''trust'' as contextual alternative'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «practicing philosophy» frente a «pursuing philosophy» para reflejar mejor φιλοσοφῶν. En español se optó por «practica la filosofía» por naturalidad y fidelidad estructural.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεῷ, conforme al estándar del proyecto.
  - Se conservó «filosofía» y «regla» para κανών/φιλοσοφία, sin reemplazarlas por lenguaje eclesiástico tradicional no atestiguado por la fuente.
  - La puntuación reproduce el tono de pregunta retórica del original griego.
