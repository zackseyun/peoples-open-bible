- from: Y muchos fueron trastornados en su propio pensamiento a causa de las mujeres[a], y se hicieron esclavos por causa de ellas;
  to: Y muchos perdieron el juicio por sus propios pensamientos a causa de las mujeres[a], y se hicieron esclavos por causa de ellas;
