translation:
  language: es
  text: Y el lado sur[a], hacia el sur, será desde Tamar hasta las aguas de Meribot-cades[b], hasta el wadi[c], hasta el Mar Grande[d]. Este es el lado sur, hacia el sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el lado meridional, hacia el sur». El hebreo repite la idea direccional para enfatizar el límite.
    reason: lexical_alternative
  - marker: b
    text: O, «Meribá-cades». La forma hebrea aquí corresponde a una variante relacionada del topónimo.
    reason: alternative_reading
  - marker: c
    text: O, «cauce»; el término hebreo designa un lecho de arroyo o curso de agua, a menudo estacional.
    reason: lexical_alternative
  - marker: d
    text: Es decir, el mar Mediterráneo.
    reason: cultural_note
lexical_decisions:
- source_word: וּפְאַת / פְאַת
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - costado
  - borde
  - extremo
  lexicon: HALOT
  rationale: En una descripción de límites, פְאַת funciona como referencia al costado o lado del territorio. «Lado» suena natural en español y conserva el valor topográfico sin introducir una imagen más técnica de «borde» que en español puede sonar menos fluida.
- source_word: נֶגֶב / תֵּימָנָה
  english_pob_choice: south side, southward
  chosen_spanish: sur, hacia el sur
  alternatives_spanish:
  - lado sur, al sur
  - lado meridional, hacia el sur
  - lado del sur, hacia el sur
  lexicon: HALOT
  rationale: La pareja intensifica la dirección. En español, «sur» y «hacia el sur» reproducen la repetición enfática sin forzar una terminología regional como «Negeb», que aquí es direccional más que un nombre propio.
- source_word: מִתָּמָר
  english_pob_choice: from Tamar
  chosen_spanish: desde Tamar
  alternatives_spanish:
  - de Tamar
  - a partir de Tamar
  lexicon: HALOT
  rationale: Se trata de un topónimo. «Desde Tamar» expresa bien el punto de partida del límite y corresponde al uso fronterizo del hebreo.
- source_word: מֵי מְרִיבוֹת קָדֵשׁ
  english_pob_choice: the waters of Meriboth-kadesh
  chosen_spanish: las aguas de Meribot-cades
  alternatives_spanish:
  - las aguas de Meribá-cades
  - las aguas de Meribot de Cades
  lexicon: HALOT
  rationale: El hebreo consonántico apoya la forma plural «Meribot». Mantengo esa huella en español para no borrar la forma documentada, y uso «Cades» como adaptación breve y reconocible del lugar.
- source_word: נַחֲלָה
  english_pob_choice: to the wadi
  chosen_spanish: hasta la quebrada
  alternatives_spanish:
  - hasta el wadi
  - hasta el cauce
  - hasta el torrente
  lexicon: HALOT
  rationale: En una secuencia de linderos, נַחֲלָה no significa «herencia». Aquí designa un cauce estacional o lecho de arroyo. «Quebrada» comunica bien esa realidad en español sin perder el matiz topográfico.
- source_word: הַיָּם הַגָּדוֹל
  english_pob_choice: the Great Sea
  chosen_spanish: el Mar Grande
  alternatives_spanish:
  - el Gran Mar
  - el mar grande
  - el mar Mediterráneo
  lexicon: HALOT
  rationale: Conservo la designación bíblica tradicional «Mar Grande» para mantener el valor geográfico del original y evitar una identificación interpretativa añadida en el texto principal.
- source_word: וְאֵת פְּאַת תֵּימָנָה נֶגְבָּה
  english_pob_choice: This is the south side, southward
  chosen_spanish: Este es el lado sur, hacia el sur
  alternatives_spanish:
  - Y este es el lado sur, hacia el sur
  - Este es el costado sur, hacia el sur
  lexicon: HALOT
  rationale: La cláusula final es resumptiva y reitera el límite ya descrito. «Este es» reproduce su función de conclusión y «lado sur» mantiene la forma más natural y precisa en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión auditada del inglés POB: usa una formulación fronteriza más literal («desde Tamar hasta... hasta la quebrada, hasta el Mar Grande») y conserva la cláusula resumptiva final. También evita traducir mecanicamente desde el inglés al preferir «Mar Grande» y «quebrada» solo donde el contexto topográfico lo justifica.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica en este pasaje.
  - Se preservó la duplicación direccional del hebreo («sur... hacia el sur») porque aporta énfasis y estructura de linde.
  - «Cades» se usa como adaptación sobria y legible de Kadesh, consistente con el registro bíblico en español.
