review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo y del POB inglés: promesa de presencia, señal futura, salida de Egipto y servicio/adoración a Dios en el monte. Sin embargo, hay un desajuste importante en el verbo תַּעַבְדוּן, que en la forma hebrea es 2ª persona plural (''ustedes/vosotros servirán/serviréis''), no 3ª plural impersonal. El español ''servirán'' desplaza el referente y debilita el vínculo directo con Moisés y el pueblo como destinatarios de la promesa.'
  spanish_quality_summary: El español es claro y digno. 'Ciertamente', 'estaré contigo' y 'la señal' funcionan bien. La principal mejora es ajustar 'servirán' a 'servirán ustedes' o, más naturalmente en español bíblico neutral, 'ustedes servirán'. También conviene mantener la nota léxica sobre 'adorarán'. La nota [a] sobre 'Y dijo' no es necesaria para el sentido, pero no es incorrecta; puede conservarse o eliminarse. Para una revisión mínima y limpia, se conserva.
  glossary_alignment: 'Alineado con la terminología del proyecto: ''Dios'' para אֱלֹהִים, ''señal'' para אוֹת, y ''servir'' con nota alternativa ''adorar'' para עבד. No hay conflicto con términos sensibles del glosario. La elección ''estaré'' para אֶהְיֶה es adecuada y natural en español.'
  issues:
  - severity: high
    issue: '''servirán'' no refleja correctamente la persona verbal de תַּעַבְדוּן'
    rationale: El hebreo está en 2ª persona plural, dirigido a Moisés y al pueblo en cumplimiento de la señal. 'Servirán' en español se oye como 3ª persona plural y altera el sujeto implícito. Debe decir 'ustedes servirán' o una forma equivalente.
  - severity: low
    issue: La nota [a] es opcional y de escaso valor para el lector final
    rationale: El inglés POB no exige nota aquí; la fórmula narrativa hebrea simple normalmente no necesita aclaración en español. Aun así, no introduce error doctrinal ni léxico.
  revised_spanish_text: 'Y él dijo[a]: «Ciertamente yo estaré contigo, y esta será la señal para ti de que yo te he enviado: cuando saques al pueblo de Egipto, ustedes servirán a Dios[b] en este monte».

    '
  revised_footnotes:
  - marker: a
    text: O «Y dijo». El hebreo introduce la respuesta de Yahvé con una fórmula narrativa simple.
    reason: source_note
  - marker: b
    text: O «adorarán a Dios». El verbo hebreo puede significar tanto «servir» como, en relación con Dios, «adorar».
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal de la cláusula final para reflejar fielmente el 2º plural hebreo תַּעַבְדוּן. 'Ustedes servirán' mantiene el sentido del POB inglés, preserva la amplitud léxica de עבד y mejora la precisión gramatical sin cambiar la estructura del versículo.
