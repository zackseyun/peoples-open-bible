translation:
  language: es
  text: Y yo también alcé mi mano a ellos en el desierto[a], para no traerlos a la tierra que les había dado, que mana leche y miel, la gloria[b] de todas las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levanté mi mano». La expresión es un giro de juramento y también puede verterse interpretativamente como «juré».
    reason: lexical_alternative
  - marker: b
    text: O «la hermosura» o «el esplendor de todas las tierras».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Yet ... also
  chosen_spanish: Sí, yo también
  alternatives_spanish:
  - Y también
  - Además, yo también
  lexicon: HALOT
  rationale: En español, el inicio retiene el valor aditivo de גַם y el matiz discursivo de continuación con énfasis personal. «Sí» transmite bien el «yet» contextual sin volver la frase demasiado adversativa.
- source_word: נָשָׂאתִי יָדִי
  english_pob_choice: raised my hand
  chosen_spanish: alcé mi mano
  alternatives_spanish:
  - levanté mi mano
  - juré
  lexicon: HALOT
  rationale: La idiomática hebrea se mantiene con una imagen concreta y transparente. «Alcé mi mano» conserva el gesto de juramento sin cerrar el sentido interpretativo a una sola paráfrasis.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto yermo
  - en el desierto/wilderness
  lexicon: HALOT
  rationale: «Desierto» es natural y claro en español bíblico contemporáneo. Aquí no se pierde el sentido de región inhóspita del marco del éxodo; el término «wilderness» del inglés se expresa idiomáticamente.
- source_word: לְבִלְתִּי הָבִיא אוֹתָם
  english_pob_choice: that I would not bring them
  chosen_spanish: para no traerlos
  alternatives_spanish:
  - para no llevarlos
  - para no introducirlos
  lexicon: HALOT
  rationale: La construcción final expresa el contenido del juramento de manera natural en español. «Traerlos» mantiene la cercanía al movimiento hacia la tierra, mientras que «no introducirlos» sería más explícito pero menos directo.
- source_word: הָאָרֶץ אֲשֶׁר נָתַתִּי
  english_pob_choice: the land that I had given them
  chosen_spanish: a la tierra que les había dado
  alternatives_spanish:
  - a la tierra que les di
  - a la tierra que les había prometido y dado
  lexicon: HALOT
  rationale: El pluscuamperfecto refleja correctamente la anterioridad discursiva del don de la tierra desde la perspectiva del juramento en el desierto. Se conserva también el dativo «les» para reflejar el objeto indirecto del hebreo.
- source_word: זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: flowing with milk and honey
  chosen_spanish: que fluye leche y miel
  alternatives_spanish:
  - que mana leche y miel
  - fluyendo leche y miel
  lexicon: HALOT
  rationale: Se mantiene la fórmula bíblica conocida y fiel al participio hebreo. «Fluye» conserva el carácter de descripción permanente sin introducir una explicación adicional.
- source_word: צְבִי
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - la belleza
  - el esplendor
  - el deleite
  lexicon: HALOT
  rationale: En este contexto, el término apunta a la excelencia o distinción de la tierra frente a todas las demás. «Gloria» preserva el registro elevado y la fuerza comparativa sin diluir el valor del sustantivo.
- source_word: הִיא לְכָל הָאֲרָצוֹת
  english_pob_choice: of all lands
  chosen_spanish: de todas las tierras
  alternatives_spanish:
  - entre todas las tierras
  - para todas las tierras
  lexicon: HALOT
  rationale: La construcción predicativa hebrea se vierte de modo natural como una comparación superlativa implícita. «Tierras» es una opción bíblicamente adecuada en español para conservar el paralelismo con el hebreo.
theological_decisions:
- issue: Sentido del gesto juramentario de נָשָׂאתִי יָדִי
  english_pob_reading: Keep the literal idiom 'raised my hand' in the main text
  chosen_spanish_reading: Conservar «alcé mi mano» en el texto principal
  alternative_spanish_readings:
  - «juré»
  - «levanté mi mano»
  rationale: La imagen corporal del juramento está presente en el hebreo y conviene conservarla. En español, «alcé mi mano» es comprensible y deja intacta la tensión entre literalidad e implicación de juramento, que puede explicarse en nota.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Relación temporal entre el juramento y el don de la tierra
  english_pob_reading: Translate as 'had given' rather than 'gave'
  chosen_spanish_reading: Traducir «les había dado» en lugar de «les di»
  alternative_spanish_readings:
  - «les di»
  - «les había prometido/dado»
  rationale: 'El pluscuamperfecto en español reproduce bien la perspectiva retrospectiva del texto: la tierra ya había sido concedida antes del juramento pronunciado en el desierto. No se introduce una distinción doctrinal ajena al hebreo; solo se respeta el orden discursivo.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «them» después de «given» para completar el objeto indirecto; el español ya lo refleja con «les había dado». También se mantuvo la solución del audit trail para preservar el gesto idiomático del juramento y la comparación final de la tierra como «la gloria de todas las tierras».
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - Se prefirió «mano»/«alcé mi mano» para mantener la imagen hebrea del juramento, sin traducirlo directamente por «juré» en el texto principal.
  - «Tierra» y «tierras» se distinguen para conservar la referencia singular a la tierra prometida y la comparación con el conjunto de las demás tierras.
  - Se mantuvo «gloria» para צְבִי, siguiendo el valor elevado del término y la decisión inglesa auditada.
