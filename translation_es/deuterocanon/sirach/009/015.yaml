translation:
  language: es
  text: No envidies a un hombre malvado[a], porque no sabes qué será de su día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego ofrece un dicho distinto: «Según tu fuerza, considera a tus prójimos y toma consejo con los sabios».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּקַנֵּא
  english_pob_choice: Do not envy
  chosen_spanish: No envidies
  alternatives_spanish:
  - No tengas envidia de
  - No celos de
  lexicon: HALOT
  rationale: La forma prohibitiva expresa una acción de envidia dirigida a otra persona; en español, «envidiar» comunica con naturalidad esa relación y conserva el tono sapiencial breve.
- source_word: בְּאִישׁ רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: a un hombre malvado
  alternatives_spanish:
  - a un hombre impío
  - a un hombre perverso
  lexicon: HALOT
  rationale: «אישׁ» se refleja con «hombre» y «רָשָׁע» con «malvado» para mantener la fuerza moral del término sin suavizarlo a un sentido meramente jurídico.
- source_word: כִּי לֹא תֵּדֵע
  english_pob_choice: for you do not know
  chosen_spanish: porque no sabes
  alternatives_spanish:
  - pues no sabes
  - ya que no sabes
  lexicon: HALOT
  rationale: «Porque» conserva la relación causal del hebreo y suena natural en español moderno con tono proverbial.
- source_word: מַה יּוֹמוֹ
  english_pob_choice: what his day will be
  chosen_spanish: cómo será su día
  alternatives_spanish:
  - qué será de su día
  - qué le deparará su día
  lexicon: HALOT
  rationale: La expresión hebrea es terse e idiomática; «cómo será su día» preserva la ambigüedad de resultado/condición sin añadir una especificación no explícita en el hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo transmitido y el testimonio griego
  english_pob_reading: 'The Greek witness reads a different saying here: ''According to your strength, consider your neighbors, and take counsel with the wise.'''
  chosen_spanish_reading: Se traduce como texto principal el hebreo conservado, con nota sobre la lectura griega diferente.
  alternative_spanish_readings:
  - Según tu fuerza, considera a tus prójimos y toma consejo con los sabios.
  - De acuerdo con tu capacidad, reflexiona sobre tus cercanos y consulta a los sabios.
  rationale: La política de Sirácides en POB privilegia el hebreo cuando está preservado. Aquí el griego no es una simple paráfrasis, sino un dicho sustancialmente distinto; por eso no debe reemplazar el hebreo, aunque sí debe quedar transparentado en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek in view'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que ajustó el final hebreo de una paráfrasis más amplia a una formulación más cercana al texto («what his day will be»). En español se refleja esa mayor cercanía con «cómo será su día», sin introducir explicaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «hombre» para reproducir el singular masculino del hebreo y la práctica documental del POB.
  - Se usa «malvado» como equivalente natural de רָשָׁע en contexto sapiencial.
  - La nota de texto alternativo deja claro que el griego no corrige ni sustituye al hebreo, sino que preserva otro dicho.
