translation:
  language: es
  text: Y cuando el joven salió, levantando su rostro hacia el cielo, en dirección a Jerusalén[a], bendijo al Rey del cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mirando hacia Jerusalén». La expresión griega señala orientación hacia Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: O «alabó al Rey del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε ἐξῆλθεν
  english_pob_choice: when ... went out
  chosen_spanish: cuando ... salió
  alternatives_spanish:
  - cuando ... se fue
  - después de ... salir
  lexicon: LSJ
  rationale: El valor temporal simple de ὅτε con ἐξέρχομαι se expresa de manera natural en español con «cuando ... salió», manteniendo el orden narrativo sin añadir matices no presentes en el griego.
- source_word: ὁ νεανίσκος
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven hombre
  lexicon: LSJ
  rationale: νεανίσκος designa a un hombre joven o joven adulto. «El joven» es la forma más natural y fiel en español, sin volverlo demasiado infantil ni introducir una relación servil que el texto no da.
- source_word: ἄρας τὸ πρόσωπον
  english_pob_choice: lifting up his face
  chosen_spanish: levantando su rostro
  alternatives_spanish:
  - alzando su rostro
  - levantando su semblante
  lexicon: LSJ
  rationale: La imagen física de la acción se conserva con una construcción participial natural en español. «Rostro» comunica mejor que un calco más literal y mantiene el gesto devocional.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo del cielo
  - hacia los cielos
  lexicon: LSJ
  rationale: En este contexto devocional οὐρανός apunta al ámbito celestial. «Hacia el cielo» suena natural en español y conserva la orientación ascendente sin perder el sentido reverente.
- source_word: ἐναντίον Ἰερουσαλήμ
  english_pob_choice: in the direction of Jerusalem
  chosen_spanish: en dirección a Jerusalén
  alternatives_spanish:
  - frente a Jerusalén
  - mirando hacia Jerusalén
  lexicon: LSJ
  rationale: La expresión griega indica orientación espacial. «En dirección a Jerusalén» explica esa orientación sin convertirla en una fórmula litúrgica más técnica de lo que el texto exige; «mirando hacia Jerusalén» sería una alternativa posible si se quisiera enfatizar la postura visual.
- source_word: εὐλόγησεν
  english_pob_choice: he blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - dio bendición a
  lexicon: LSJ
  rationale: Como el objeto es el Rey del cielo, el POB inglés conservó «blessed» por su idiomatismo bíblico. En español, «bendijo» es la equivalencia más directa y reverente; «alabó» reflejaría la alternativa interpretativa resaltada en la auditoría, pero desplaza el matiz de bendecir.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  english_pob_choice: the King of heaven
  chosen_spanish: al Rey del cielo
  alternatives_spanish:
  - al Rey celestial
  - al rey del cielo
  lexicon: LSJ
  rationale: Es un título para Dios. Se mantiene la mayúscula en «Rey» por tratarse de un título divino, y «del cielo» sigue de cerca el genitivo griego sin perder naturalidad en español.
theological_decisions:
- issue: 'Acción verbal dirigida a Dios: bendecir o alabar'
  english_pob_reading: he blessed the King of heaven
  chosen_spanish_reading: bendijo al Rey del cielo
  alternative_spanish_readings:
  - alabó al Rey del cielo
  rationale: El griego εὐλόγησεν permite tanto «bendecir» como «alabar» según el contexto. Dado que el destinatario es Dios, la elección de «bendijo» preserva el idiomatismo bíblico y la tensión devocional, mientras que «alabó» queda como lectura alternativa válida.
  doctrine_reference: 'Translation philosophy: preserve source meaning and theological texture without flattening biblical idiom.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene sin cambios la lectura base y solo preserva dos alternativas léxicas: la orientación hacia Jerusalén y el matiz de εὐλόγησεν como «bendijo» o «alabó». La redacción española refleja esas mismas tensiones sin resolverlas por paráfrasis.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí el referente es «el Rey del cielo», título de Dios, por lo que no aparece el nombre divino.
  - «Rey» se capitaliza por tratarse de un título divino.
  - Se conserva la secuencia narrativa y la imagen corporal («levantando su rostro») para mantener la forma devocional del griego.
  - «En dirección a Jerusalén» evita sobreinterpretar una fórmula litúrgica; la nota recoge la alternativa más breve.
  - «Bendijo» se mantiene para reflejar la idiomática bíblica de εὐλογέω con Dios como objeto, sin excluir la alternativa interpretativa «alabó».
