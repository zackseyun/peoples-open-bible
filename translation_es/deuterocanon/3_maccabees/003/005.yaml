- from: Y, adornando su convivencia con la buena conducta de los justos, habían quedado bien considerados por todos los hombres.
  to: Y, adornando su manera de vivir con la buena conducta de los justos, habían llegado a ser bien considerados por todas las personas.
  rationale: Se ajusta συναναστροφή a «manera de vivir» para preservar el sentido amplio de «way of life» del griego y del audit trail inglés. Se mejora la naturalidad y precisión aspectual de καθειστήκεισαν con «habían llegado a ser». Se actualiza «todos los hombres» a «todas las personas» para reflejar el sentido inclusivo de ἀνθρώποις en español neutral y legible.
