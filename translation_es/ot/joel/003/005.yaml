review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y la auditoría inglesa en casi todos los puntos clave: «Y sucederá», «todo el que invoque el nombre de Yahvé», «será librado», la explicación introducida por «porque», y la preservación de la tensión entre la invocación humana y el llamado divino. También mantiene correctamente «Yahvé» para יהוה. Sin embargo, la cláusula final «y entre los sobrevivientes, a quienes Yahvé llama» no reproduce con suficiente fidelidad la sintaxis y función de וּבַשְּׂרִידִים אֲשֶׁר יְהוָה קֹרֵא. Tal como está, queda fragmentaria y poco idiomática; además, la coma antes de la relativa debilita el valor restrictivo de «a quienes Yahvé llama».'
  spanish_quality_summary: El español es generalmente claro y digno, pero la última frase suena incompleta y algo forzada. «Habrá escape» es defendible por cercanía al singular hebreo, aunque en español suena algo rígido; aun así puede mantenerse para respetar la decisión auditada. La mejora principal necesaria es hacer fluida y gramatical la cláusula final sin perder la tensión teológica. También conviene ajustar la nota [b] para incluir «sobrevivientes escapados/remanente», ya que el hebreo פְלֵיטָה puede abarcar esa idea y la auditoría inglesa la preserva explícitamente.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה -> «Yahvé» correctamente; no hay conflicto con otros términos sensibles. «Invoque» para יִקְרָא בְשֵׁם es adecuado. «Sobrevivientes» para שְׂרִידִים es natural y fiel. El único ajuste importante es presentar la cláusula final como «entre los sobrevivientes que Yahvé llama» para conservar el carácter restrictivo y la sintaxis natural del español.'
  issues:
  - severity: medium
    issue: Cláusula final poco natural y sintácticamente débil
    rationale: «Y entre los sobrevivientes, a quienes Yahvé llama» queda como frase colgante y menos idiomática que «entre los sobrevivientes que Yahvé llama». El hebreo expresa un grupo definido por la acción de Yahvé; la relativa restrictiva sin coma lo comunica mejor.
  - severity: medium
    issue: Puntuación que altera el matiz restrictivo
    rationale: 'La coma antes de «a quienes Yahvé llama» sugiere una aposición explicativa, cuando el hebreo favorece una relativa restrictiva: los sobrevivientes a saber, los que Yahvé llama.'
  - severity: low
    issue: Nota [b] no recoge toda la amplitud documentada de פְלֵיטָה
    rationale: La auditoría inglesa preserva no solo «escape/deliverance» sino también el sentido de «escaped survivors/remnant». En español conviene reflejarlo para no estrechar innecesariamente el campo semántico.
  revised_spanish_text: Y sucederá que todo el que invoque el nombre de Yahvé[a] será librado; porque en el monte de Sion y en Jerusalén habrá escape[b], como Yahvé ha dicho[c], entre los sobrevivientes que Yahvé llama.
  revised_footnotes:
