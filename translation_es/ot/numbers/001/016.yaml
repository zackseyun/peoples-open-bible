    text: Or “those summoned from the assembly.” The Hebrew participle can denote those called, summoned, or designated.
    reason: lexical_alternative
  - marker: b
    text: “Thousands of Israel” may refer literally to groups of a thousand, or more broadly to clan or military subdivisions within Israel.
    reason: lexical_alternative
