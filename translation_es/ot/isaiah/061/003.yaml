  to: para destinar a los enlutados de Sion, para darles un tocado[a] en vez de ceniza, aceite de alegría en vez de luto, un manto de alabanza en vez de un espíritu abatido; y serán llamados robles de justicia[b], plantación de Yahvé[c], para manifestar su gloria[d].
  rationale: Se ajusta פְּאֵר a «tocado» para reflejar mejor la imagen concreta del hebreo y del expediente inglés; se elimina la nota innecesaria sobre «plantío/plantación»; se usa «plantación» por mayor naturalidad general; y se preserva una nota alternativa documentada para לְהִתְפָּאֵר. Aunque el expediente inglés también incluye una alternativa sobre «justice/righteousness», en la revisión se mantiene «justicia» en el texto principal por buena idiomaticidad española y porque el mayor problema era la omisión de alternativas documentadas; si el equipo desea máxima simetría con el inglés, podría añadirse además una nota «O ‘robles de rectitud’», pero no es indispensable para una reparación mínima.
