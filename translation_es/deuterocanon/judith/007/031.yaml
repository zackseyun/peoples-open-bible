  glossary_alignment: 'No hay términos teológicos sensibles aquí. La principal cuestión terminológica es de estilo objetivo del proyecto: evitar formulaciones regionalmente marcadas cuando no son necesarias. «Conforme a sus palabras» conserva bien κατὰ τὰ ῥήματα ὑμῶν.'
