translation:
  language: es
  text: y ellos también[a], por mi hipocresía y por esta vida breve y momentánea[b], pudieran extraviarse por causa de mí, y yo me acarrearía odio[c] y una mancha sobre mi vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fingimiento» o «disimulación» para «hipocresía». El griego describe una conducta fingida que induciría a error a los observadores.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por la breve y momentánea vida»; es decir, por causa del corto tiempo de vida que aún quedara.
    reason: lexical_alternative
  - marker: c
    text: «Odio» también puede entenderse como «aborrecimiento» o «repulsión», destacando el rechazo público.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόκρισιν
  english_pob_choice: hypocrisy
  chosen_spanish: hipocresía
  alternatives_spanish:
  - pretexto
  - disimulación
  lexicon: LSJ
  rationale: El griego se refiere a una conducta fingida o representada. «Hipocresía» conserva con fuerza ese sentido moral y religioso de falsedad deliberada; «pretexto» o «disimulación» suavizan demasiado el reproche en este contexto martirial.
- source_word: μικρὸν καὶ ἀκαριαῖον ζῆν
  english_pob_choice: this brief and momentary living
  chosen_spanish: esta vida breve y momentánea
  alternatives_spanish:
  - esta vida corta y fugaz
  - este breve y momentáneo vivir
  lexicon: LSJ
  rationale: ζῆν aquí funciona como sustantivo verbal de la vida que aún queda. «Vida breve y momentánea» suena natural en español y conserva la oposición entre una supervivencia temporal y la deshonra duradera.
- source_word: πλανηθῶσιν
  english_pob_choice: might be led astray
  chosen_spanish: pudieran extraviarse
  alternatives_spanish:
  - pudieran ser engañados
  - pudieran desviarse
  lexicon: LSJ
  rationale: El pasivo subjuntivo implica que otros quedarían desviados por el ejemplo de Eleazar. «Extraviarse» mantiene la idea de desviación moral y no reduce el verbo solo a engaño intelectual.
- source_word: μύσος
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - aborrecimiento
  - repugnancia
  lexicon: LSJ
  rationale: El término apunta a una reacción pública de rechazo o aversión. «Odio» es el equivalente más directo y fuerte en español; las alternativas comunican parte de la matiz de repulsión, pero menos bien la fuerza relacional.
- source_word: κηλῖδα
  english_pob_choice: a stain
  chosen_spanish: una mancha
  alternatives_spanish:
  - una mancha de deshonra
  - una mancha infamante
  lexicon: LSJ
  rationale: La metáfora es de una marca visible de deshonor. «Mancha» conserva la imagen concreta y funciona bien con «sobre mi vejez».
- source_word: γήρως
  english_pob_choice: my old age
  chosen_spanish: mi vejez
  alternatives_spanish:
  - mi edad avanzada
  - mis años de vejez
  lexicon: LSJ
  rationale: El genitivo depende de la imagen de la mancha y del deshonor asociado a la edad avanzada. «Mi vejez» es la forma más natural y fiel al pathos del texto.
- source_word: κατακτήσωμαι
  english_pob_choice: I would acquire
  chosen_spanish: me haría acreedor de
  alternatives_spanish:
  - adquiriría
  - obtendría para mí
  lexicon: LSJ
  rationale: El medio expresa que la deshonra recaería sobre él por su propia conducta. «Me haría acreedor de» traduce bien la idea de adquirir para sí una carga de oprobio, sin perder el matiz de auto-incurrencia.
theological_decisions:
- issue: Fuerza moral de ὑπόκρισις en contexto de martirio
  english_pob_reading: Rendered as 'hypocrisy' rather than a softer term like 'pretense.'
  chosen_spanish_reading: «hipocresía» en lugar de un término más suave como «pretexto».
  alternative_spanish_readings:
  - pretexto
  - disimulación
  rationale: El pasaje condena no solo una apariencia táctica, sino un testimonio falso que podría arrastrar a otros al error. «Hipocresía» preserva mejor la seriedad ética del razonamiento de Eleazar.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Fuerza de la cláusula final y carácter autoincurrido de la deshonra
  english_pob_reading: 'Rendered as self-incurred disgrace: ''I would acquire hatred and a stain upon my old age.'''
  chosen_spanish_reading: «me haría acreedor de odio y de una mancha sobre mi vejez».
  alternative_spanish_readings:
  - adquiriría odio y una mancha sobre mi vejez
  - me traería odio y una mancha sobre mi vejez
  rationale: El verbo medio griego señala una deshonra que él mismo se procuraría. La redacción española conserva ese carácter de culpa autoasumida sin importar categorías doctrinales ajenas al verso.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'living' por 'life' para ζῆν. En español se optó por «vida» en lugar de un calco como «vivir», manteniendo la naturalidad y la precisión del segmento. La lectura general sigue la redacción final del audit trail inglés, sin depender mecánicamente de ella.
  spanish_consistency_notes:
  - Se mantuvo «hipocresía» como término fuerte y moralmente cargado, coherente con el criterio POB documentado para ὑπόκρισις.
  - Se prefirió «vida breve y momentánea» por claridad estilística y fidelidad semántica a ζῆν.
  - Se evitó «SEÑOR» u այլ sustituciones, pues el verso no contiene el Tetragrámaton ni κύριος.
  - «Odio» y «mancha» conservan el paralelo de revulsión pública y deshonra visible del griego.
  - El giro «me haría acreedor de» intenta reflejar el medio griego κατακτήσωμαι como adquisición para sí de la deshonra.
