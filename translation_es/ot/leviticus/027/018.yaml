translation:
  language: es
  text: Pero si consagra su campo después del Jubileo[a], el sacerdote calculará para él el dinero[b] según los años que queden hasta el año del Jubileo, y se deducirá de tu valoración[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después del año del Jubileo».
    reason: lexical_alternative
  - marker: b
    text: O «el sacerdote le tasará el precio».
    reason: lexical_alternative
  - marker: c
    text: O «y se rebajará de tu valoración».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַיֹּבֵל
  english_pob_choice: after the Jubilee
  chosen_spanish: después del Jubileo
  alternatives_spanish:
  - después del año del Jubileo
  lexicon: HALOT
  rationale: אַחַר expresa secuencia temporal, y הַיֹּבֵל designa la institución/año jubilar. En español, «Jubileo» conserva ese carácter institucional y suena natural en registro bíblico.
- source_word: יַקְדִּישׁ
  english_pob_choice: consecrates
  chosen_spanish: consagra
  alternatives_spanish:
  - dedica
  - santifica
  lexicon: HALOT
  rationale: En Levítico 27, קדשׁ trata de poner algo aparte para Yahvé en un marco cultual y legal. «Consagra» mantiene mejor esa fuerza sagrada que «dedica».
- source_word: שָׂדֵהוּ
  english_pob_choice: his field
  chosen_spanish: su campo
  alternatives_spanish:
  - su terreno
  - su parcela
  lexicon: HALOT
  rationale: La construcción posesiva es directa; «campo» reproduce el referente agrícola de forma natural en español.
- source_word: וְחִשַּׁב לוֹ הַכֹּהֵן אֶת הַכֶּסֶף
  english_pob_choice: then the priest shall calculate the money for him
  chosen_spanish: el sacerdote calculará para él el dinero
  alternatives_spanish:
  - el sacerdote le tasará el precio
  - el sacerdote hará el cálculo del dinero para él
  lexicon: HALOT
  rationale: חשב en este contexto legal significa calcular/contar. «El dinero» conserva el sentido concreto de הַכֶּסֶף, evitando una paráfrasis que borre el matiz económico del texto.
- source_word: עַל פִּי הַשָּׁנִים הַנּוֹתָרֹת
  english_pob_choice: according to the years remaining
  chosen_spanish: según los años que queden
  alternatives_spanish:
  - conforme a los años restantes
  - en proporción a los años que faltan
  lexicon: HALOT
  rationale: La frase idiomática comunica una prorrata temporal. «Según los años que queden» es claro en español y mantiene el cálculo basado en el tiempo restante.
- source_word: עַד שְׁנַת הַיֹּבֵל
  english_pob_choice: until the year of Jubilee
  chosen_spanish: hasta el año del Jubileo
  alternatives_spanish:
  - hasta el año jubilar
  lexicon: HALOT
  rationale: La expresión marca el límite temporal del cálculo. «Año del Jubileo» conserva la referencia institucional y fluye bien en español.
- source_word: וְנִגְרַע
  english_pob_choice: and it shall be deducted
  chosen_spanish: y será deducido
  alternatives_spanish:
  - y será reducido
  - y será rebajado
  lexicon: HALOT
  rationale: גרע en pasivo expresa una reducción o deducción del valor estándar. «Deducido» funciona bien en el marco monetario-legal del versículo.
- source_word: מֵעֶרְכֶּךָ
  english_pob_choice: from your valuation
  chosen_spanish: de tu valoración
  alternatives_spanish:
  - de tu tasación
  - de tu valuación
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se conserva con «tu». «Valoración» refleja el término técnico previo del pasaje, y suena más natural que una forma más administrativa como «tasación».
theological_decisions:
- issue: Conservación de la segunda persona singular en מֵעֶרְכֶּךָ
  english_pob_reading: from your valuation
  chosen_spanish_reading: de tu valoración
  alternative_spanish_readings:
  - de la valoración
  - de su valoración
  rationale: El hebreo se dirige directamente al individuo con sufijo singular de 2ª persona. Mantener «tu» preserva el registro legal directo y la referencia al valor ya fijado en la ley.
  doctrine_reference: Translation philosophy §4, §5
- issue: Renderización cultual de הקדישׁ
  english_pob_reading: consecrates
  chosen_spanish_reading: consagra
  alternative_spanish_readings:
  - dedica
  - santifica
  rationale: En este contexto no se trata de una dedicación genérica, sino de apartar la propiedad para uso sagrado según la normativa levítica. «Consagra» preserva esa dimensión cultual sin añadir doctrina extra.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el análisis previo: la revisión más reciente no introdujo cambios y el veredicto de cotejo fue de alta concordancia. Se mantuvieron las decisiones léxicas principales del audit trail inglés, adaptándolas a un español natural sin perder el valor técnico-legal del texto.'
  spanish_consistency_notes:
  - Se conserva «Jubileo» como nombre institucional del año especial, coherente con el uso bíblico y con la mayúscula del audit trail inglés.
  - «Consagra» se mantiene para קדשׁ en el marco levítico, en lugar de «dedica», por la fuerza cultual del contexto.
  - «Valoración» se usa como término técnico uniforme para ערך/ערכּךָ, evitando alternar con «precio» salvo en nota alternativa.
  - Se conserva la segunda persona singular («tu») en la cláusula final, para reflejar el sufijo hebreo y la dirección legal directa.
  - «Dinero» traduce הַכֶּסֶף de forma concreta; la nota alternativa preserva la posibilidad de entenderlo como «precio».
