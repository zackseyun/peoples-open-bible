translation:
  language: es
  text: 'Y le dijo: «Dame a tu hijo». Entonces lo tomó de su seno, lo subió al aposento alto[a] donde se alojaba, y lo acostó sobre su propia cama.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el cuarto de arriba» o «el desván». El hebreo עֲלִיָּה designa una habitación elevada, normalmente en la parte superior de la casa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלֶיהָ
  english_pob_choice: And he said to her
  chosen_spanish: Y le dijo a ella
  alternatives_spanish:
  - Y le habló
  - Y le respondió
  lexicon: HALOT
  rationale: El hebreo usa un verbo de decir común; en español, «le dijo a ella» conserva la dirección explícita del discurso sin añadir matices ausentes. Mantiene el orden narrativo y la claridad del referente femenino.
- source_word: תְּנִי לִי אֶת בְּנֵךְ
  english_pob_choice: Give me your son
  chosen_spanish: Dame a tu hijo
  alternatives_spanish:
  - Entrégame a tu hijo
  - Pon a tu hijo en mis manos
  lexicon: HALOT
  rationale: El imperativo de נתן con לִי pide una acción directa; «Dame» es natural y fiel. «Hijo» conserva la precisión de בֵּן, como en el inglés POB, en lugar de generalizar a «niño» o «hijo/niña».
- source_word: מֵחֵיקָהּ
  english_pob_choice: from her bosom
  chosen_spanish: de su seno
  alternatives_spanish:
  - de su regazo
  - de sus brazos
  - de su pecho
  lexicon: HALOT
  rationale: חֵיק abarca el área del pecho/regazo y expresa cercanía de sostén maternal. «Seno» es un equivalente español formal que preserva esa amplitud semántica sin reducirlo indebidamente a «brazos».
- source_word: וַיַּעֲלֵהוּ אֶל הָעֲלִיָּה
  english_pob_choice: carried him up to the upper room
  chosen_spanish: lo subió al aposento alto
  alternatives_spanish:
  - lo llevó al aposento alto
  - lo cargó hasta el cuarto alto
  - lo hizo subir al aposento alto
  lexicon: HALOT
  rationale: עלה con objeto y destino indica movimiento ascendente; «lo subió» comunica de forma natural que Elijah ascendió llevando al niño. «Aposento alto» conserva la imagen de una habitación elevada y está en línea con el valor de עֲלִיָּה.
- source_word: אֲשֶׁר הוּא יֹשֵׁב שָׁם
  english_pob_choice: where he was staying
  chosen_spanish: donde él estaba alojando
  alternatives_spanish:
  - donde él se hospedaba
  - donde él vivía
  - donde él estaba morando
  lexicon: HALOT
  rationale: יֹשֵׁב aquí no se refiere simplemente a sentarse, sino a residir/permanecer. «Estaba alojando» sigue de cerca el valor contextual de «staying» del inglés POB, aunque suena algo más literal; se preserva así la idea de permanencia temporal sin convertirla en residencia estable.
- source_word: וַיַּשְׁכִּבֵהוּ
  english_pob_choice: laid him
  chosen_spanish: lo acostó
  alternatives_spanish:
  - lo recostó
  - lo puso a acostar
  - lo hizo acostarse
  lexicon: HALOT
  rationale: El hifil de שׁכב significa causar que alguien se acueste. «Lo acostó» es la forma española más directa y natural para ese acto.
- source_word: עַל מִטָּתוֹ
  english_pob_choice: on his own bed
  chosen_spanish: sobre su propia cama
  alternatives_spanish:
  - sobre su cama
  - en su propia cama
  lexicon: HALOT
  rationale: El sufijo de מִטָּה se refiere al sujeto masculino del contexto inmediato, es decir, a Elías. «Su propia cama» evita ambigüedad y reproduce el énfasis posesivo del inglés POB.
theological_decisions:
- issue: Referencia del posesivo en "su propia cama"
  english_pob_reading: The suffix refers back to Elijah, the subject of the surrounding verbs.
  chosen_spanish_reading: El posesivo de «su propia cama» se entiende como referido a Elías, no al niño.
  alternative_spanish_readings:
  - sobre la cama del niño
  - sobre su cama
  rationale: El hebreo marca un posesivo de tercera persona masculina singular; por el flujo verbal, el referente natural es Elías. La elección española mantiene esa referencia y evita una ambigüedad que podría desviar la escena.
  doctrine_reference: gramática narrativa y referencia pronominal del texto
- issue: Valor de חֵיקָהּ como cercanía física materna
  english_pob_reading: Or 'from her bosom.' The Hebrew term refers to the chest/lap area and conveys close maternal holding.
  chosen_spanish_reading: «De su seno» comunica la cercanía corporal y afectiva sin reducir el término a una sola postura corporal.
  alternative_spanish_readings:
  - de su regazo
  - de sus brazos
  - de su pecho
  rationale: No hay tensión doctrinal, sino semántica. Se conserva la imagen de un niño sostenido muy cerca del cuerpo de la madre, como exige el hebreo y confirma el audit trail inglés.
  doctrine_reference: semántica léxica del hebreo bíblico
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, incluyendo la revisión que prefirió un término más formal para חֵיק. En español se evaluaron «regazo», «pecho», «brazos» y «seno»; se escogió «seno» por su amplitud semántica y registro digno. También se preservó el matiz de aposento/upper room y el posesivo ambiguo resuelto por contexto a favor de Elías.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto cuando no aparece en este versículo.
  - Se usó «aposento alto» para conservar la equivalencia estable de עֲלִיָּה.
  - No se añadió puntuación interpretativa que altere el ritmo narrativo hebreo.
  - El marcador [a] se coloca en el punto del complemento indirecto para señalar la variante estilística posible.
