translation:
  language: es
  text: Se juntan estrechamente, uno a otro, y ningún aire puede entrar entre ellos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ningún viento viene entre ellos». רוּחַ puede significar «aire», «viento» o «aliento»; aquí se entiende en sentido físico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָד ... בְּאֶחָד
  english_pob_choice: one to another
  chosen_spanish: uno a otro
  alternatives_spanish:
  - uno con otro
  - cada uno al otro
  lexicon: HALOT
  rationale: La repetición distributiva de אֶחָד con בְּ expresa adyacencia mutua. «Uno a otro» mantiene el sentido relacional y el movimiento recíproco sin sonar forzado en español.
- source_word: יִגַּשׁוּ
  english_pob_choice: press close
  chosen_spanish: Se acercan
  alternatives_spanish:
  - se aprietan
  - se juntan estrechamente
  - se pegan
  lexicon: HALOT
  rationale: El contexto describe el amontonamiento compacto de las escamas de Leviatán. «Se acercan» es idiomático; el complemento «uno a otro» y la segunda cláusula sostienen la idea de proximidad cerrada.
- source_word: וְרוּחַ
  english_pob_choice: air
  chosen_spanish: aire
  alternatives_spanish:
  - viento
  - aliento
  - espíritu
  lexicon: HALOT
  rationale: Aquí רוּחַ tiene sentido físico, no espiritual. «Aire» preserva la idea de un espacio mínimo que no puede penetrar entre las escamas.
- source_word: לֹא יָבֹא
  english_pob_choice: can come
  chosen_spanish: puede entrar
  alternatives_spanish:
  - puede venir
  - entra
  - puede pasar
  lexicon: HALOT
  rationale: El hebreo expresa una imposibilidad efectiva por lo apretado del conjunto. En español, «puede entrar» comunica mejor la imposibilidad espacial que «venir».
- source_word: בֵינֵיהֶם
  english_pob_choice: between them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - entre sí
  - en medio de ellos
  lexicon: HALOT
  rationale: La forma con sufijo plural señala separación espacial entre las partes contiguas. «Entre ellos» es natural y conserva la referencia a las escamas adyacentes.
translation_notes:
  revision_awareness: 'Coincide con la evaluación más reciente: el sentido general y la elección léxica principal no requieren revisión respecto del inglés auditado; se mantiene la lectura física de רוּחַ y la imagen de proximidad extrema.'
  spanish_consistency_notes:
  - Se evita «espíritu» porque el contexto es descriptivo y corporal.
  - «Uno a otro» conserva el paralelismo distributivo mejor que una paráfrasis más libre.
  - La nota textual/léxica se ancla en «aire» para reflejar la alternativa documentada en el audit trail.
