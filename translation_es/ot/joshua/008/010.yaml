translation:
  language: es
  text: Josué se levantó muy de mañana y pasó revista al pueblo[a], y él y los ancianos de Israel subieron delante del pueblo hacia Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contó al pueblo» o «revisó al pueblo»; el verbo hebreo puede denotar contar, inspeccionar, nombrar o pasar revista, y el contexto militar favorece la idea de pasar revista.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó muy temprano
  lexicon: HALOT
  rationale: El verbo de causa/acción temprana se expresa de modo natural en español con «se levantó temprano», que conserva la idea temporal sin forzar una calca.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - esa mañana
  lexicon: HALOT
  rationale: La locución española más natural y fiel al valor temporal explícito es «por la mañana».
- source_word: וַיִּפְקֹד אֶת הָעָם
  english_pob_choice: mustered the people
  chosen_spanish: pasó revista al pueblo
  alternatives_spanish:
  - contó al pueblo
  - inspeccionó al pueblo
  - revisó al pueblo
  lexicon: HALOT
  rationale: פקד puede implicar contar, inspeccionar, revisar o organizar en contexto militar. «Pasó revista» transmite bien el matiz de inspección/ordenamiento previo a la acción, sin reducirlo solo a un conteo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el ejército
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el pueblo». En español, «pueblo» conserva ese alcance colectivo sin restringirlo indebidamente a tropas.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - avanzaron
  - marcharon
  lexicon: HALOT
  rationale: עלה se expresa de forma directa con «subir», que preserva el movimiento ascendente y el uso narrativo bíblico.
- source_word: הוּא וְזִקְנֵי יִשְׂרָאֵל
  english_pob_choice: he and the elders of Israel
  chosen_spanish: él y los ancianos de Israel
  alternatives_spanish:
  - él con los ancianos de Israel
  - él y las autoridades de Israel
  lexicon: HALOT
  rationale: La estructura hebrea incluye explícitamente a Josué y a los ancianos; «él y los ancianos de Israel» lo refleja de manera transparente y natural.
- source_word: לִפְנֵי הָעָם
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - antes del pueblo
  - en frente del pueblo
  lexicon: HALOT
  rationale: לִפְנֵי conserva el sentido espacial de ir delante o ante. «Delante del pueblo» suena natural en español y mantiene la idea de precedencia.
- source_word: הָעָי
  english_pob_choice: Ai
  chosen_spanish: Hai
  alternatives_spanish:
  - Ai
  lexicon: HALOT
  rationale: Para el topónimo se adopta la forma castellana tradicional «Hai», ampliamente reconocible en español bíblico, sin alterar el referente geográfico.
