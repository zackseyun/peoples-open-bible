base_translation:
  language: en
  yaml_path: translation/ot/esther/008/005.yaml
  text: And she said[a], “If it seems good to the king, and if I have found favor before him, and if the matter is proper before the king, and if I am pleasing in his eyes, let it be written to revoke the letters devised by Haman son of Hammedatha the Agagite[b], which he wrote to destroy the Jews who are in all the provinces of the king.”
  footnotes:
  - marker: a
    text: Or 'to reverse the letters'; the Hebrew verb can mean 'to turn back' or 'to revoke' in this administrative context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the letters, the scheme of Haman'; the translation 'letters devised by Haman' makes explicit that the letters embodied Haman's plot.
    reason: lexical_alternative
