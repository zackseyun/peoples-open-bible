review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: contraste inicial, afecto/amor de Yahvé por los padres, elección de la descendencia identificada con el auditorio presente, y separación de entre los pueblos. Sin embargo, hay dos desajustes principales: «se apegó» para חָשַׁק suena menos adecuado cuando el sujeto es Yahvé y puede sugerir dependencia más que afecto electivo; y «como hasta hoy» debilita el modismo כַּיּוֹם הַזֶּה, que apunta a una realidad observable presente, mejor expresada como «como sucede hoy» o similar.'
  spanish_quality_summary: El español es claro y legible, pero «se apegó a tus padres» no suena tan natural ni tan digno en registro bíblico como «puso su afecto en tus padres» o «puso su amor en tus padres». Además, el inciso con raya funciona, aunque conviene usar rayas españolas sin espacios excesivos. El resto es fluido y adecuado para un registro eclesial neutral.
  glossary_alignment: Se respeta correctamente «Yahvé» para יהוה. La elección de «descendencia», «eligió» y «pueblos» está bien alineada con las decisiones del proyecto. La principal excepción es חָשַׁק, donde el borrador no preserva tan bien la rationale documentada del inglés («set his affection»).
  issues:
  - severity: medium
    issue: «se apegó» para חָשַׁק
    rationale: Aunque capta idea de vínculo fuerte, en español aplicado a Yahvé suena menos idiomático y puede sugerir apego dependiente o emocionalmente desbalanceado. La rationale auditada favorece explícitamente el campo de «afecto»; «puso su afecto en» preserva mejor el matiz volitivo y relacional.
  - severity: medium
    issue: «como hasta hoy» para כַּיּוֹם הַזֶּה
    rationale: 'La frase española puede leerse como continuidad temporal vaga («hasta hoy») más que como constatación presente. El hebreo y el inglés auditado señalan una realidad verificable actual: «como sucede hoy» o «como es hoy».'
  - severity: low
    issue: Puntuación del inciso aposicional
    rationale: El inciso es correcto, pero conviene normalizarlo como «—ustedes—» en vez de « —a ustedes— »; además, el pronombre puede ir sin preposición al ser aposición identificatoria de «descendencia».
  revised_spanish_text: Sin embargo, Yahvé puso su afecto en tus padres[a], para amarlos, y eligió a su descendencia después de ellos—ustedes—de entre todos los pueblos, como sucede hoy.
  revised_footnotes:
  - marker: a
    text: 'O: «Sólo Yahvé se complació en tus padres para amarlos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta חָשַׁק a «puso su afecto en» para reflejar mejor la decisión léxica auditada y un español más natural y digno. Se cambia «como hasta hoy» por «como sucede hoy» para expresar con más precisión el valor de כַּיּוֹם הַזֶּה. También se pule el inciso aposicional para mayor naturalidad tipográfica y sintáctica en español.
