translation:
  language: es
  text: Él hace subir nubes[a] desde los confines de la tierra[b]; hace relámpagos para la lluvia; saca el viento de sus almacenes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vapores». El término hebreo puede abarcar vapor o niebla ascendentes, pero en este contexto de tormenta «nubes» expresa mejor el sentido.
    reason: lexical_alternative
  - marker: b
    text: O «desde el extremo de la tierra». El hebreo usa una forma singular con alcance colectivo; en español se puede entender como la extensión total de la tierra.
    reason: lexical_alternative
  - marker: c
    text: O «de sus tesoros». La imagen es la de Dios guardando y soltando el viento a voluntad desde sus depósitos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלֶה
  english_pob_choice: makes ... rise
  chosen_spanish: hace subir
  alternatives_spanish:
  - causa que suban
  - hace ascender
  lexicon: HALOT
  rationale: El participio hifil expresa acción causativa. En español, «hace subir» conserva bien esa causatividad y suena natural en un contexto poético.
- source_word: נְשִׂאִים
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - vapores
  - nieblas
  lexicon: HALOT
  rationale: En este contexto de lluvia, relámpagos y viento, «nubes» comunica el sentido meteorológico más claro para el lector moderno. «Vapores» sería posible, pero menos natural en español aquí.
- source_word: מִקְצֵה הָאָרֶץ
  english_pob_choice: from the ends of the earth
  chosen_spanish: desde los confines de la tierra
  alternatives_spanish:
  - desde el extremo de la tierra
  - desde los extremos de la tierra
  lexicon: HALOT
  rationale: La forma singular hebrea tiene fuerza colectiva. «Los confines de la tierra» conserva esa amplitud idiomática y es una expresión natural en español bíblico contemporáneo.
- source_word: בְּרָקִים
  english_pob_choice: lightning
  chosen_spanish: relámpagos
  alternatives_spanish:
  - rayos
  - destellos de relámpago
  lexicon: HALOT
  rationale: El hebreo usa plural; en español, el plural «relámpagos» mantiene la imagen sin forzar el idioma. «Relámpagos para la lluvia» refleja la asociación poética con la tormenta.
- source_word: לַמָּטָר
  english_pob_choice: for the rain
  chosen_spanish: para la lluvia
  alternatives_spanish:
  - con la lluvia
  - en relación con la lluvia
  lexicon: HALOT
  rationale: La preposición ל indica relación o propósito. «Para la lluvia» sigue de cerca el hebreo y sigue siendo comprensible en español.
- source_word: עָשָׂה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - hizo
  - produce
  lexicon: HALOT
  rationale: Aunque la forma verbal es qatal, en este himno funciona con valor gnómico o descriptivo. «Hace» mantiene el presente poético de la acción característica de Dios.
- source_word: מוֹצֵא
  english_pob_choice: brings out
  chosen_spanish: saca
  alternatives_spanish:
  - hace salir
  - trae fuera
  lexicon: HALOT
  rationale: El hifil de יצא implica hacer salir. «Saca» es breve, idiomático y conserva la imagen de Dios liberando el viento de un lugar guardado.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: el viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: 'El contexto inmediato es meteorológico: nubes, lluvia y relámpagos. Por eso «viento» es la lectura correcta, no «espíritu» ni «aliento».'
- source_word: מֵאֹצְרוֹתָיו
  english_pob_choice: from his storehouses
  chosen_spanish: de sus almacenes
  alternatives_spanish:
  - de sus tesoros
  - de sus depósitos
  lexicon: HALOT
  rationale: El sustantivo puede designar depósitos o tesoros. En una imagen de provisión y control cósmico, «almacenes» comunica bien la idea concreta sin volverla demasiado abstracta.
theological_decisions:
- issue: Tiempo verbal gnómico en un himno de alabanza
  english_pob_reading: Render the verse with present-tense verbs describing God's characteristic sovereign activity in creation.
  chosen_spanish_reading: Usar presente gnómico en español para describir la acción característica y continua de Dios.
  alternative_spanish_readings:
  - 'usar pasado: «hizo subir… hizo relámpagos… sacó…»'
  - usar presente histórico
  rationale: El verso presenta una descripción litúrgica y habitual del gobierno de Dios sobre la creación. El presente en español comunica mejor esa acción característica sin perder el valor del hebreo.
  doctrine_reference: Poética bíblica; equivalencia óptima con presente gnómico.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó acuerdo alto y ningún cambio necesario; la redacción española refleja la lectura aprobada sin introducir novedades interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en el pronombre «Él» por la continuidad del contexto del salmo.
  - Se evitó «SEÑOR» porque el verso no contiene el tetragrámaton explícito en este segmento; el contexto inmediato del salmo ya identifica al sujeto divino.
  - Se prefirió «almacenes» para conservar la concreción imagética del sustantivo hebreo sin añadir una carga cultual no requerida por el texto.
