- from: Así que guarden[a] todo el mandamiento que hoy[b] les estoy mandando, para que se fortalezcan[c], entren y posean la tierra que ustedes cruzan para poseerla.
  to: Así que guarden[a] todo el mandamiento que hoy les estoy mandando, para que se fortalezcan[b], entren y posean[c] la tierra a la que van a cruzar para poseerla.
  rationale: Se ajusta la cláusula final para expresar con más claridad el movimiento hacia la tierra y evitar la ambigüedad de «la tierra que ustedes cruzan». Se elimina una nota innecesaria sobre «hoy» y se añade en su lugar la alternativa léxica documentada para ירשׁ, conforme al audit trail inglés. El resto del versículo se mantiene esencialmente igual porque ya preservaba bien el singular colectivo de «mandamiento» y el propósito expresado por לְמַעַן.
