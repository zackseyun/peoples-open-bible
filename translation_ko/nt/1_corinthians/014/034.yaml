id: 1CO.14.34
reference: 1 Corinthians 14:34
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Αἱ ⸀γυναῖκες ἐν ταῖς ἐκκλησίαις σιγάτωσαν, οὐ γὰρ ⸀ἐπιτρέπεται αὐταῖς λαλεῖν· ἀλλὰ ⸀ὑποτασσέσθωσαν, καθὼς καὶ ὁ νόμος λέγει.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/034.yaml
  text: The women should keep silent in the churches[a], for they are not permitted to speak, but should be in submission[c][b], just as the law also says.
  footnotes:
  - marker: a
    text: Or "the wives should keep silent in the churches"; γυνή can mean either "woman" or "wife" depending on context.
    reason: alternative_reading
  - marker: b
    text: That is, the verse does not itself specify what kind of speaking is in view; some understand it more narrowly from the surrounding context.
    reason: lexical_alternative
  - marker: c
    text: Or "the Law"; Paul may be referring specifically to the Mosaic Law or more broadly to Scripture.
    reason: alternative_reading
translation:
  language: ko
  text: 여자들은 교회 안에서 잠잠하게 하십시오. 그들에게 말하는 것이 허락되지 않기 때문이며, 율법이 말하는 대로 그들은 복종해야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 γυνή는 「여자」 또는 「아내」로 옮길 수 있으며, 본 절의 정확한 지시 대상은 학자들 사이에서 논쟁된다.
    reason: alternative_reading
  - marker: b
    text: 34~35절은 일부 사본에서 40절 뒤에 위치하며, 후대 첨가로 보는 학자들도 있다. 본 번역은 SBLGNT의 본문 위치와 본문 그대로를 옮긴다. 텍스트 비평적 논의는 theological_decisions를 보라.
    reason: textual_variant
lexical_decisions:
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_korean: 여자들
  alternatives_korean:
  - 아내들
  lexicon: BDAG
  rationale: 본 절은 「여자」와 「아내」 둘 다로 읽힐 수 있다. 본 절 단독의 일차적 의미는 「여자들」이며 35절(자기 남편들)에서 「아내」 해석이 부각된다.
- source_word: σιγάτωσαν
  english_pob_choice: keep silent
  chosen_korean: 잠잠하다
  alternatives_korean: []
  lexicon: BDAG
  rationale: 글로사리 기본값.
- source_word: ὑποτασσέσθωσαν
  english_pob_choice: be in submission
  chosen_korean: 복종해야 합니다
  alternatives_korean:
  - 순복하게 하라
  lexicon: BDAG
  rationale: 기본 등가.
theological_decisions:
- issue: 14:34-35의 본문비평적 위치 및 해석 문제
  chosen_reading: SBLGNT 본문대로 14:33 뒤에 위치, 그대로 번역
  alternative_readings:
  - 14:40 뒤에 위치(서방 사본)
  - 후대 첨가(삽입)로 보는 견해
  - 본문 인접부의 다른 권면들과 함께 좁게 해석
  rationale: 이 두 구절은 일부 사본에서 14:40 뒤에 위치하며, 일부 학자는 후대 삽입으로 본다(Fee 등). 그러나 외증의 다수와 SBLGNT는 본문 위치를 유지한다. 또한 본문의 「잠잠」 명령은 14장 전체의 회중 안 발언 규제(혀로 말하는 자, 예언자, 통역자가 없을 때 잠잠)의 연장선상에 있으며, 11:5(여자가 예언함)와의 모순을 피하기 위해 본 절을 「예언 분별 시에 한정된 침묵」 혹은 「특정 부부 정황에서의 권면」으로 좁혀 읽는 견해들도 있다. 본 번역은 본문을 완화하지도 강화하지도 않고 SBLGNT 그대로 옮긴다. 해석은 독자에게 맡긴다.
  doctrine_reference: 'DOCTRINE.md: render the text as it stands; document text-critical and interpretive cruxes; do not soften or sharpen'
