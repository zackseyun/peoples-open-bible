theological_decisions:
- issue: 맹세 본문의 「주」를 「야훼」로 회복할지
  chosen_reading: 주께 한 맹세
  alternative_readings:
  - 야훼께 한 맹세
  rationale: 이 구절은 특정 OT 본문의 직접 인용이 아니라 율법 정신의 요약(레 19:12; 민 30:2; 신 23:21의 합성)이다. 직접 인용의 야훼 회복 규칙을 적용하지 않고 「주」를 유지한다.
  doctrine_reference: 'Glossary policy: restore 야훼 only on direct OT YHWH citations'
