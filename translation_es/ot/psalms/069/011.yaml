translation:
  language: es
  text: Cuando lloré con ayuno en mi alma[a][b], llegó a ser un oprobio para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente incluye «mi alma» después de «ayuno». La frase puede entenderse como «lloré con ayuno, mi alma» o, de manera más idiomática, «me afligí con ayuno».
    reason: lexical_alternative
  - marker: b
    text: O «Cuando lloré con ayuno».
    reason: previous_rendering
lexical_decisions:
- source_word: וָאֶבְכֶּה
  english_pob_choice: When I wept
  chosen_spanish: Cuando lloré
  alternatives_spanish:
  - Y lloré
  - Lloré
  lexicon: HALOT
  rationale: El verbo בכה se traduce naturalmente como «llorar». La waw narrativa se resuelve en español con un valor temporal/secuencial («Cuando...»), manteniendo el movimiento del texto sin forzar un calco.
- source_word: בַצּוֹם
  english_pob_choice: with fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - en ayuno
  - por medio del ayuno
  lexicon: HALOT
  rationale: צוֹם es «ayuno». La preposición ב admite valor asociativo o instrumental; «con ayuno» conserva la idea de acompañamiento del llanto de manera idiomática en español.
- source_word: נַפְשִׁי
  english_pob_choice: implicit in 'I wept with fasting'
  chosen_spanish: en mi alma
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar «alma», «vida», «ser» o la persona interior. Aquí se conserva explícitamente el elemento léxico mediante «en mi alma», siguiendo la revisión auditada que no permite omitirlo y manteniendo la tensión entre literalidad e idiomaticidad.
- source_word: וַתְּהִי
  english_pob_choice: it became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se volvió
  - fue
  lexicon: HALOT
  rationale: היה introduce el resultado de la acción anterior. «Llegó a ser» expresa con claridad el cambio de estado, sin perder el carácter resultativo del hebreo.
- source_word: לַחֲרָפוֹת
  english_pob_choice: a reproach
  chosen_spanish: un oprobio
  alternatives_spanish:
  - un reproche
  - una afrenta
  - una vergüenza
  lexicon: HALOT
  rationale: חֲרָפוֹת alude a reproche, afrenta o deshonra pública. «Oprobio» conserva mejor el peso de vergüenza/deshonra colectiva que un simple «reproche» en español contemporáneo.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - contra mí
  lexicon: HALOT
  rationale: La preposición ל marca al afectado por el resultado. «Para mí» es una solución española natural en esta construcción de devenir, equivalente funcional de «to me».
theological_decisions:
- issue: Valor de נֶפֶשׁ en un contexto de ayuno y aflicción
  english_pob_reading: The phrase may be understood as 'I wept with fasting, my soul' or more idiomatically 'I humbled myself with fasting.'
  chosen_spanish_reading: Se conserva el valor explícito de «mi alma» sin convertirlo en una paráfrasis de «me humillé».
  alternative_spanish_readings:
  - «Cuando lloré con ayuno, mi alma»
  - «Cuando me humillé con ayuno»
  rationale: La revisión auditada insiste en no omitir נַפְשִׁי. En español, «en mi alma» mantiene la tensión del hebreo y deja abierta la interpretación de interioridad/autoaflicción sin añadir un verbo que no está en el texto base.
  doctrine_reference: Antropología bíblica / semántica de נֶפֶשׁ
- issue: Resultado de la aflicción como deshonra pública
  english_pob_reading: it became a reproach to me
  chosen_spanish_reading: «llegó a ser un oprobio para mí»
  alternative_spanish_readings:
  - «se convirtió en oprobio para mí»
  - «fue un reproche para mí»
  rationale: «Oprobio» comunica con mayor fuerza la vergüenza pública y el agravio relacional implicados por חֲרָפוֹת. No se introduce ninguna lectura doctrinal nueva; solo se preserva el matiz de deshonra del hebreo.
  doctrine_reference: Teología del sufrimiento del justo / honor y vergüenza
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión: se restauró el contenido de נַפְשִׁי de forma explícita, evitando la omisión detectada en una pasada anterior, y se mantuvo el sentido resultativo de וַתְּהִי con una construcción española natural. También se preservó la singularidad idiomática de חֲרָפוֹת como deshonra pública, conforme al acuerdo alto del expediente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando corresponda, pero este verso no contiene el nombre divino.
  - Se prefirió «oProbio» para reflejar la carga de deshonra de חֲרָפוֹת y evitar una atenuación semántica.
  - «Con ayuno» mantiene la relación asociativa del hebreo ב + sustantivo.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal y solo una vez cada uno.
