translation:
  language: es
  text: 'Entonces Josué los llamó y les habló, diciendo: «¿Por qué nos engañaron, diciendo: “Estamos muy lejos de ustedes”, cuando ustedes habitan entre nosotros[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called for
  chosen_spanish: los llamó
  alternatives_spanish:
  - los convocó
  - los hizo venir
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא introduce la reunión de los gabaonitas ante Josué para recibir su reproche. En español, «los llamó» comunica de manera natural esa convocatoria sin sobrecargar el texto.
- source_word: וַיְדַבֵּר אֲלֵיהֶם לֵאמֹר
  english_pob_choice: spoke to them, saying
  chosen_spanish: les habló, diciendo
  alternatives_spanish:
  - les habló y dijo
  - les habló
  lexicon: HALOT
  rationale: La fórmula hebrea de introducción al discurso se conserva con una cadencia formal en español. «Les habló, diciendo» mantiene la estructura y el tono sin volverla rígida.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué fin
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Es la interrogativa directa natural en español y conserva el valor acusatorio de la pregunta de Josué.
- source_word: רִמִּיתֶם
  english_pob_choice: did you deceive
  chosen_spanish: nos engañaron
  alternatives_spanish:
  - nos decepcionaron
  - nos defraudaron
  lexicon: HALOT
  rationale: El pi‘el de רמה expresa engaño deliberado. «Engañaron» conserva la fuerza del acto intencional; en español la acusación suena más natural en segunda persona plural con pronombre objeto antepuesto.
- source_word: רְחוֹקִים ... מְאֹד
  english_pob_choice: very far
  chosen_spanish: muy lejos
  alternatives_spanish:
  - sumamente lejos
  - a gran distancia
  lexicon: HALOT
  rationale: «Muy lejos» reproduce la intensificación de רחוקים con מאד de forma clara y idiomática en español.
- source_word: מִכֶּם
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - lejos de ustedes
  - apartados de ustedes
  lexicon: HALOT
  rationale: Después de un adverbio de distancia, el español normaliza la relación con «de ustedes». El sentido completo de distancia queda explícito en la frase anterior.
- source_word: בְּקִרְבֵּנוּ
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - en nuestro medio
  lexicon: HALOT
  rationale: El idioma hebreo comunica presencia dentro del grupo. «Entre nosotros» es la forma más natural y fiel en español para ese valor locativo relacional.
- source_word: יֹשְׁבִים
  english_pob_choice: are living
  chosen_spanish: habitan
  alternatives_spanish:
  - viven
  - residen
  lexicon: HALOT
  rationale: El participio de ישב expresa asentamiento duradero. «Habitan» conserva mejor la idea de residencia estable que un simple «viven», y suena digno en este contexto narrativo.
theological_decisions:
- issue: No ampliar la acusación más allá del engaño geográfico
  english_pob_reading: Translate Joshua's charge as straightforward deception about geographic distance, without importing later theological commentary about the treaty.
  chosen_spanish_reading: La acusación se mantiene como un engaño acerca de la distancia y la residencia, sin añadir en el texto implicaciones adicionales sobre el pacto.
  alternative_spanish_readings:
  - Incluir en la redacción principal una referencia explícita a la violación del pacto
  - Añadir una paráfrasis que explique el trasfondo teológico
  rationale: 'El versículo en sí mismo presenta la mentira: dijeron que estaban muy lejos, pero habitaban entre Israel. La dimensión del pacto pertenece al contexto narrativo, no a esta línea.'
  doctrine_reference: 'Principio de traducción POB: no introducir en el versículo afirmaciones teológicas que el hebreo no formula aquí.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al evitar una construcción equivalente a «by saying» y conservar la fórmula directa «diciendo»; también se mantuvo la lectura auditada de la expresión locativa como alternativa marginal.
  spanish_consistency_notes:
  - Se eligió «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Josué» como forma estable del nombre propio.
  - Se mantuvo el paralelismo de discurso directo con comillas españolas y puntuación conforme al español moderno.
  - La nota al pie marca la única ambigüedad léxica relevante de בקרבנו, sin duplicar marcadores.
