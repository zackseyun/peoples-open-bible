translation:
  language: es
  text: 'Entonces Salomón dijo: «Yahvé dijo que habitaría en la espesa oscuridad[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la nube oscura». El hebreo עֲרָפֶל puede denotar oscuridad densa o nube oscura, especialmente en contextos de manifestación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel momento
  - Luego
  lexicon: HALOT
  rationale: Marca temporal y discursiva de transición narrativa; «Entonces» conserva la secuencia natural del relato en español.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: HALOT
  rationale: Verbo narrativo estándar para introducir discurso directo. En ambos casos en el versículo, «dijo» reproduce con claridad la introducción del habla.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: onomástica bíblica estándar
  rationale: Se usa la forma española bíblica y reconocible del nombre propio, manteniendo el referente sin explicación adicional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: tradición POB para el Tetragrámaton
  rationale: Se conserva el nombre divino como nombre propio, no como título, siguiendo la política del proyecto y la transparencia frente al texto hebreo.
- source_word: לִשְׁכֹּן
  english_pob_choice: would dwell
  chosen_spanish: habitaría
  alternatives_spanish:
  - moraría
  - residiría
  lexicon: HALOT
  rationale: El infinitivo constructo tras «dijo» expresa el contenido del dicho; en español, el condicional comunica naturalmente la intención o declaración futura en discurso reportado.
- source_word: בָּעֲרָפֶל
  english_pob_choice: in the thick darkness
  chosen_spanish: en la densa oscuridad
  alternatives_spanish:
  - en la espesa tiniebla
  - en la nube oscura
  lexicon: HALOT
  rationale: «עֲרָפֶל» admite la idea de oscuridad densa o nube oscura. Se elige «densa oscuridad» para conservar la carga teofánica y la ambigüedad sin reducirla a un mero fenómeno meteorológico.
theological_decisions:
- issue: Representación del lugar de la presencia divina en עֲרָפֶל
  english_pob_reading: Yahweh said that he would dwell in the thick darkness
  chosen_spanish_reading: Yahvé dijo que él habitaría en la densa oscuridad
  alternative_spanish_readings:
  - Yahvé dijo que él habitaría en la nube oscura
  - Yahvé dijo que él habitaría en la oscuridad espesa
  rationale: 'El texto preserva la paradoja teofánica: la presencia de Yahvé se asocia con oscuridad/ocultamiento, no con una imagen aclarada. «Densa oscuridad» mantiene esa tensión sin suavizarla.'
  doctrine_reference: Preservar la tensión teológica del texto en vez de resolverla
- issue: Uso del pronombre explícito «él»
  english_pob_reading: he would dwell
  chosen_spanish_reading: él habitaría
  alternative_spanish_readings:
  - habitaría
  - él moraría
  rationale: El pronombre explícito ayuda a identificar el sujeto del discurso reportado en español y evita ambigüedad sintáctica, sin alterar el referente divino implícito en el hebreo.
  doctrine_reference: Claridad referencial en discurso indirecto
translation_notes:
  revision_awareness: El inglés POB mantiene una lectura óptima-equivalente y una nota léxica para עֲרָפֶל; la versión española conserva esa ambigüedad teofánica y traslada el nombre divino como Yahvé conforme a la política del proyecto. No se detectaron revisiones posteriores que requirieran ajuste.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se conserva la distinción entre oscuridad densa y nube oscura mediante nota, sin cerrar indebidamente el sentido del hebreo.
  - La puntuación del discurso directo sigue la convención española con comillas angulares y punto final fuera de la cita.
