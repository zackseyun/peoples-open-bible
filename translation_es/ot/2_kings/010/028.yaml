translation:
  language: es
  text: Así, Jehú destruyó a Baal de Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acabó con» o «eliminó». El verbo hebreo comunica destrucción o remoción.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Baal». En español bíblico, normalmente se omite el artículo con el nombre de la deidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁמֵד
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - acabó con
  - eliminó
  - arrasó
  lexicon: HALOT
  rationale: El hiphil de שׁמד expresa causar destrucción o exterminio. «Destruyó» conserva la fuerza activa del verbo sin introducir una especificación excesiva sobre el grado de aniquilación más allá del contexto inmediato.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehu
  alternatives_spanish:
  - Jehú
  lexicon: Convención onomástica bíblica
  rationale: Se mantiene el nombre propio en forma reconocible para lector bíblico en español; «Jehu» sigue la transliteración del inglés POB y evita una normalización que no aporta claridad adicional en este versículo breve.
- source_word: הַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  - el dios Baal
  - Baal adorado
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido, pero el español bíblico suele omitirlo con el nombre de la deidad. Mantener «Baal» preserva la forma breve del original y evita una paráfrasis interpretativa como «culto a Baal».
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - fuera de Israel
  - de en medio de Israel
  lexicon: HALOT
  rationale: La preposición מִן señala separación o remoción. «De Israel» reproduce de modo directo la idea de sacar o quitar a Baal del ámbito de Israel, con español natural y conciso.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: Narrativa hebrea
  rationale: La waw narrativa introduce avance consecuencial en el relato. «Así» comunica bien el enlace narrativo en español moderno sin perder el flujo del texto.
theological_decisions:
- issue: Referente de «Baal»
  english_pob_reading: Baal is rendered as the name of the deity/cult removed from Israel, without expanding to a theological paraphrase.
  chosen_spanish_reading: Baal se presenta como el nombre de la deidad/el culto removido de Israel, sin ampliar a una paráfrasis teológica.
  alternative_spanish_readings:
  - el culto a Baal
  - la adoración de Baal
  rationale: El objeto hebreo es simplemente «el Baal». Traducirlo como «Baal» preserva la forma del texto y deja que el contexto más amplio indique que se trata de la supresión del culto a esa deidad en Israel.
  doctrine_reference: Principio de primacía del idioma original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con el audit trail inglés y no requiere revisión sustantiva; se mantuvo la concisión del versículo y las dos notas léxicas documentadas.
  spanish_consistency_notes:
  - Se conservó «Baal» sin ampliar a «culto a Baal» para no sobretraducir.
  - Se usó «de Israel» como equivalente natural de מִן con sentido de remoción.
  - Se mantuvo la voz narrativa breve con «Así» para reflejar el waw consecutivo.
