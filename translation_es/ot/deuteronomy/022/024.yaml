review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura legal del hebreo en la mayoría de los segmentos: sacar a ambos, llevarlos a la puerta de la ciudad, apedrearlos con piedras, el motivo causal para la joven por no clamar en la ciudad, y la fórmula final de purgar/remover el mal. Sin embargo, falla de manera significativa en עִנָּה al traducirlo como ''humilló'' en el texto principal, cuando el expediente inglés POB documenta ''violated'' como la mejor opción moderna en este contexto sexual-jurídico. Además, אֵשֶׁת רֵעֵהוּ debe mantenerse como ''la esposa de su prójimo'' o equivalente claramente marital, no simplemente ''la mujer de su prójimo'', que en español puede sonar ambiguo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere ajuste léxico para mayor precisión y legibilidad eclesial. 'Humilló' debilita el sentido sexual del contexto; 'violó' suena natural y fuerte en español moderno. 'La mujer de su prójimo' es menos precisa que 'la esposa de su prójimo'. La fórmula final funciona mejor como 'Así purgarás el mal de en medio de ti' para conservar la fuerza de la fórmula deuteronómica ya fijada en el POB inglés.
  glossary_alignment: 'No hay conflictos con términos troncales del glosario como Yahvé, Mesías, etc. Sí hay desalineación con la racionalidad léxico-teológica documentada para עִנָּה: el POB inglés escogió ''violated'' por claridad moderna; en español el paralelo fiel y claro es ''violó'', con nota que preserve alternativas como ''humilló'' o ''afligió''. También conviene alinear la fórmula deuteronómica con ''purgar'' en vez de ''quitar'' para retener su fuerza judicial recurrente.'
  issues:
  - severity: high
    issue: עִנָּה fue traducido como 'humilló' en el texto principal.
    rationale: En este contexto sexual-legal, 'humilló' no comunica con suficiente claridad la violación/abuso sexual que el expediente inglés decidió preservar con 'violated'. La nota puede conservar la amplitud semántica, pero el texto principal no debe debilitar el sentido.
  - severity: medium
    issue: אֵשֶׁת רֵעֵהוּ se vertió como 'la mujer de su prójimo'.
    rationale: Aunque posible, en español 'mujer de' puede ser menos preciso y más ambiguo que 'esposa de'. El hebreo se refiere a la relación marital; conviene explicitarla.
  - severity: medium
    issue: La fórmula וּבִעַרְתָּ הָרָע se vertió como 'quitarás el mal'.
    rationale: '''Quitarás'' es comprensible, pero atenúa una fórmula deuteronómica técnica y recurrente. ''Purgarás el mal de en medio de ti'' conserva mejor la solemnidad judicial y alinea con el POB inglés.'
  - severity: low
    issue: Falta la nota cultural sobre la puerta de la ciudad.
    rationale: El POB inglés preservó una nota cultural sobre la puerta como lugar público de juicio. No es estrictamente obligatoria, pero conviene mantenerla también en español, especialmente porque el texto no la explica por sí solo.
  revised_spanish_text: 'entonces sacarás a ambos a la puerta de aquella ciudad[c], y los apedrearás con piedras, y morirán: la joven[a], porque no clamó en la ciudad, y el hombre, porque violó a la esposa de su prójimo[b]. Así purgarás el mal de en medio de ti.'
  revised_footnotes:
