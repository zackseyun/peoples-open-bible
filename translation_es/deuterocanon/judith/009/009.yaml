review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: petición a Dios para que mire la arrogancia enemiga, envíe su ira sobre sus cabezas y dé poder a la acción planeada por Judit. También conserva correctamente la nota de ambigüedad sintáctica en la cláusula final. Sin embargo, la frase «por la mano de mí, una viuda» es demasiado calcada y poco idiomática en español, aunque intenta preservar la compresión del original.'
  spanish_quality_summary: 'La mayor parte del versículo es clara y digna en español bíblico moderno: «Mira su arrogancia; envía tu ira sobre sus cabezas». El problema principal es la última cláusula, donde «por la mano de mí, una viuda» suena antinatural. Puede mantenerse la imagen concreta de «mano» y la autoidentificación como viuda con una formulación más legible: «por mi mano, yo que soy viuda».'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Arrogancia», «ira» y «poder» son opciones defendibles y alineadas con el expediente inglés. No aparecen términos teológicos de la lista global que requieran ajuste especial.
  issues:
  - severity: medium
    issue: Calco antinatural en «por la mano de mí, una viuda»
    rationale: Aunque busca auditabilidad, en español esta secuencia resulta torpe y poco natural. «Por mi mano, yo que soy viuda» conserva la imagen instrumental y la autoidentificación enfática sin alejarse del sentido fuente ni de la nota inglesa.
  - severity: low
    issue: Anclaje de nota en «poder[a]»
    rationale: La nota explica la ambigüedad de toda la cláusula final, no solo de «poder». El marcador puede mantenerse ahí por economía, pero queda mejor si se entiende que abarca toda la construcción final. No es un error grave.
