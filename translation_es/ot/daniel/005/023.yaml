base_translation:
  language: en
  yaml_path: translation/ot/daniel/005/023.yaml
  text: But you have exalted yourself against the Lord of heaven[a], and the vessels of his house were brought before you, and you and your nobles, your wives, and your concubines have drunk wine from them. And you have praised the gods of silver and gold, bronze, iron, wood, and stone, which do not see or hear or know; but the God in whose hand is your breath, and whose are all your ways[c][b], you have not honored.
  footnotes:
  - marker: a
    text: Or 'the Master of heaven.' The Aramaic title can denote either 'lord' or 'master'; 'Lord' was chosen as the more natural elevated English rendering for God here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the God who holds your breath in his hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you have not glorified' or 'you have not given glory to.'
    reason: lexical_alternative
