translation:
  language: es
  text: Sin embargo, fui yo quien enseñó a Efraín a caminar[a], tomándolos en mis brazos, pero ellos no supieron que yo los sané.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tomándolos en sus brazos»; el Texto Masorético presenta una forma o sufijo de tercera persona difícil en esta cláusula. Muchos intérpretes entienden el sentido como una continuación de la voz divina en primera persona: «los tomé en mis brazos».'
    reason: textual_variant
lexical_decisions:
- source_word: תִרְגַּלְתִּי
  english_pob_choice: taught ... to walk
  chosen_spanish: enseñé a Efraín a caminar
  alternatives_spanish:
  - adiestré a Efraín a caminar
  - guié a Efraín para que caminara
  lexicon: HALOT
  rationale: El verbo en este uso presenta la imagen idiomática de entrenar a un niño a caminar. «Enseñé a caminar» conserva la escena concreta y su tono afectivo sin volverse rígido ni explicativo de más.
- source_word: לְאֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - para Efraín
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma transliterada usual en español bíblico. El ל prefijado se integra naturalmente con el verbo en español, no como «para Efraín».
- source_word: קָחָם
  english_pob_choice: taking them
  chosen_spanish: tomándolos
  alternatives_spanish:
  - los tomé
  - tomándome de ellos
  lexicon: HALOT
  rationale: La forma masorética es difícil en la cadena de primera persona. «Tomándolos» mantiene la continuidad del discurso divino en primera persona y refleja una acción concomitante sin forzar una corrección explícita en el texto principal.
- source_word: עַל זְרֹעוֹתָיו
  english_pob_choice: in my arms
  chosen_spanish: en mis brazos
  alternatives_spanish:
  - sobre mis brazos
  - en sus brazos
  lexicon: HALOT
  rationale: En español, la imagen idiomática natural es «en mis brazos» para cargar a un niño. Se sigue la revisión del audit trail que resolvió la tensión de persona hacia la primera persona del hablante divino.
- source_word: וְלֹא יָדְעוּ
  english_pob_choice: but they did not know
  chosen_spanish: pero ellos no entendieron
  alternatives_spanish:
  - pero no supieron
  - y no reconocieron
  lexicon: HALOT
  rationale: Aquí «no entendieron» comunica bien la falta de reconocimiento relacional y la ceguera espiritual del contexto, sin perder el sentido básico de desconocer.
- source_word: רְפָאתִים
  english_pob_choice: I healed them
  chosen_spanish: yo los sanaba
  alternatives_spanish:
  - yo los sané
  - yo los curaba
  lexicon: HALOT
  rationale: «Sanaba» puede expresar mejor en español el aspecto de acción continua o habitual implícito en el cuidado paternal, y también deja abierta la fuerza de restauración del verbo hebreo. Se evita «curaba» por ser menos bíblico en registro.
theological_decisions:
- issue: Imagen paternal de Dios
  english_pob_reading: 'Retain the parental image without softening it: God taught Ephraim to walk and carried them.'
  chosen_spanish_reading: 'Conservar la imagen paternal: Dios enseña a Efraín a caminar y lo carga en sus brazos.'
  alternative_spanish_readings:
  - generalizar el cuidado divino sin imagen parental
  - usar un lenguaje más abstracto de providencia
  rationale: El hebreo presenta una ternura concreta y corporal. La versión española conserva esa cercanía, evitando diluirla en una formulación más abstracta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Dificultad textual en la secuencia de persona y sufijo en la cláusula media
  english_pob_reading: Keep the main line coherent in English while preserving the notable MT wording in a footnote.
  chosen_spanish_reading: Mantener la línea coherente en primera persona, documentando la dificultad en una nota.
  alternative_spanish_readings:
  - emendar todo a primera persona explícita
  - traducir de modo más literal la irregularidad morfológica
  rationale: El testimonio masorético presenta una forma difícil en esta cláusula. El texto principal privilegia la legibilidad y la coherencia del discurso divino, mientras la nota conserva la tensión textual para auditoría.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Esta redacción sigue la revisión más reciente del audit trail al reflejar la primera persona en «mis brazos» y mantener la voz divina coherente. También preserva la dificultad masorética documentada en la cláusula media mediante nota, sin sobrecorregir el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero en este versículo no aparece el nombre divino explícito en el hebreo; la voz se deduce del discurso.
  - Se prefirió «Efraín» como nombre propio estable en español bíblico.
  - Se usó «sanaba» para respetar la dimensión de restauración y el posible valor aspectual del hebreo; si se requiere un presente histórico más puntual, la alternativa sería «sané».
  - Se conservó la imagen corporal de brazos para no diluir la metáfora parental del texto.
