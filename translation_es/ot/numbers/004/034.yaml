    text: Or 'numbered' or 'took a census of.' The Hebrew verb can also mean 'appoint' in other contexts, but here it refers to counting for service.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of the Kohathite,' that is, the Kohathite clan-group descended from Kohath.
    reason: lexical_alternative
  - marker: c
    text: '''Fathers’ houses'' is a traditional Israelite kinship term for ancestral households or family divisions.'
    reason: cultural_note
