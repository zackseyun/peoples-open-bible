translation:
  language: es
  text: No descubrirás la desnudez de la hermana de tu madre ni de la hermana de tu padre, porque ha dejado al descubierto su propia carne[a]; llevarán su iniquidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su propio pariente» / «su propia parentela». La expresión hebrea dice literalmente «su propia carne» y conserva el lenguaje de parentesco.'
    reason: lexical_alternative
  - marker: b
    text: «Llevarán su iniquidad» también puede significar «llevarán su culpa» o «cargarán con el castigo por su iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la vergüenza de
  - los genitales de
  lexicon: HALOT
  rationale: En la fórmula legal levítica, conservar «desnudez» mantiene el giro idiomático de «descubrir la desnudez de» y su red de intertextos. «La desnudez de» suena natural en español y evita explicar de más el eufemismo.
- source_word: תְגַלֶּה
  english_pob_choice: you shall not uncover
  chosen_spanish: no descubrirás
  alternatives_spanish:
  - no expondrás
  - no tendrás relaciones sexuales con
  lexicon: HALOT
  rationale: «Descubrir» reproduce el verbo ritual y jurídico del hebreo sin volverlo una paráfrasis explícita. El futuro prohibitivo en español comunica bien el valor normativo del mandamiento.
- source_word: אֲחוֹת אִמְּךָ
  english_pob_choice: your mother's sister
  chosen_spanish: la hermana de tu madre
  alternatives_spanish:
  - tu tía materna
  - la hermana de tu madre
  lexicon: HALOT
  rationale: La expresión nominal sigue de cerca el hebreo y resulta clara en español moderno. Se evita «tía materna» para no alejarse del paralelismo literal del texto fuente.
- source_word: וַאֲחוֹת אָבִיךָ
  english_pob_choice: or of your father's sister
  chosen_spanish: ni de la hermana de tu padre
  alternatives_spanish:
  - ni de tu tía paterna
  - o de la hermana de tu padre
  lexicon: HALOT
  rationale: «Ni de» conserva la coordinación negativa del hebreo dentro de una sola prohibición y suena más fluido en español que repetir «ni de la hermana de tu madre, ni de...». El parentesco se mantiene literalmente.
- source_word: שְׁאֵרוֹ
  english_pob_choice: his own flesh
  chosen_spanish: su propia carne
  alternatives_spanish:
  - su propia carne
  - su propio pariente
  - su propia parentela
  lexicon: HALOT
  rationale: «Carne» reproduce el valor figurado de שְׁאֵר y preserva la metáfora concreta de parentesco. «Su propia carne» conserva la tensión léxica documentada por la nota inglesa, en lugar de resolverla con «pariente».
- source_word: הֶעֱרָה
  english_pob_choice: has laid bare
  chosen_spanish: ha descubierto
  alternatives_spanish:
  - ha dejado al descubierto
  - ha desnudado
  lexicon: HALOT
  rationale: 'Para evitar una repetición pesada de «descubrir» dentro de la misma cláusula, se usa aquí el mismo verbo en un sentido paralelo y natural: «ha descubierto su propia carne». La duplicación mantiene el paralelismo legal del hebreo con buena legibilidad española.'
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - el castigo por su iniquidad
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral y jurídico del sustantivo hebreo. El singular posesivo español puede abarcar a los dos implicados sin perder el sentido colectivo del texto.
- source_word: יִשָּׂאוּ
  english_pob_choice: they shall bear
  chosen_spanish: llevarán
  alternatives_spanish:
  - soportarán
  - cargarán
  lexicon: HALOT
  rationale: «Llevarán» mantiene el modismo hebreo de «llevar la iniquidad» y su tono legal sin añadir explícitamente la idea de castigo, que permanece implícita como en el original.
theological_decisions:
- issue: Cambio de número entre el sujeto singular de la cláusula explicativa y el plural de la cláusula penal
  english_pob_reading: for he has laid bare his own flesh; they shall bear their iniquity
  chosen_spanish_reading: porque ha descubierto su propia carne; ellos llevarán su iniquidad
  alternative_spanish_readings:
  - porque han descubierto su propia carne; llevarán su iniquidad
  - porque él ha descubierto su propia carne; él llevará su iniquidad
  rationale: El hebreo pasa de sufijos singulares en «su propia carne / ha descubierto» a un plural en «su iniquidad / llevarán». Se conserva ese cambio en la traducción española para no ocultar la forma legal del texto y su posible referencia a más de un implicado.
  doctrine_reference: Principios de traducción POB §§1, 3, 5
translation_notes:
  revision_awareness: Verso revisado a la luz del paquete fuente hebreo, la traducción inglesa auditada y la nota léxica sobre el modismo de parentesco. Se preservaron tanto el giro legal de «descubrir la desnudez» como la tensión entre el singular explicativo y el plural penal. No se detectaron revisiones previas aplicadas en el registro fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó la terminología jurídica «desnudez» y «llevar su iniquidad» para alinearse con la coherencia interna del bloque levítico.
  - «Carne» se usa aquí en sentido de parentesco, no de σάρξ, pero conserva una equivalencia idiomática útil para futuras referencias comparables.
