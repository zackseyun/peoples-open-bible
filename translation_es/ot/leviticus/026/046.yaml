translation:
  language: es
  text: Estos son los estatutos, los juicios y las leyes que Yahvé dio entre él y los hijos de Israel en el monte Sinaí por mano de Moisés[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los israelitas”.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “por mano de Moisés”, un modismo que significa “por medio de Moisés”.'
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: La apertura deíctica introduce una síntesis concluyente; en español, ‘Estas son’ conserva el valor identificador y suena natural para una fórmula legal.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las prescripciones
  lexicon: HALOT
  rationale: חֻקִּים remite a disposiciones fijas y normativas. ‘Estatutos’ preserva el registro jurídico-covenantal y el paralelismo con los otros términos legales.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las ordenanzas
  - las decisiones judiciales
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a decisiones legales o juicios. ‘Juicios’ mantiene la cercanía formal al hebreo; ‘ordenanzas’ sería más interpretativo y menos directo.
- source_word: הַתּוֹרֹת
  english_pob_choice: the laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - las instrucciones
  - las enseñanzas
  lexicon: HALOT
  rationale: En este trío legal, תּוֹרוֹת funciona como corpus de normas/instrucción. ‘Leyes’ comunica bien ese valor en español y encaja con el registro del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino propio en la forma de uso del proyecto. ‘Yahvé’ evita la sustitución por un título y refleja la decisión doctrinal de no enmascarar el Tetragrámaton.
- source_word: בֵּינוֹ וּבֵין בְּנֵי יִשְׂרָאֵל
  english_pob_choice: between himself and the sons of Israel
  chosen_spanish: entre él y los hijos de Israel
  alternatives_spanish:
  - entre sí mismo y los hijos de Israel
  - entre él y los israelitas
  lexicon: HALOT
  rationale: ‘Entre él y…’ refleja la relación bilateral del pacto sin sobreexplicar el pronombre. ‘Hijos de Israel’ preserva la forma hebrea masculina plural; se evita neutralizarla en el texto principal.
- source_word: בְּהַר סִינַי
  english_pob_choice: at Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - en el monte de Sinaí
  - junto al monte Sinaí
  lexicon: HALOT
  rationale: ‘En el monte Sinaí’ es la equivalencia idiomática natural en español para el marco locativo del evento de revelación.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - a través de Moisés
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala mediación. ‘Por mano de Moisés’ conserva la textura formal del hebreo; la alternativa idiomática se documenta en nota.
theological_decisions:
- issue: Cómo verter el Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo nombra directamente a Yahvé, y la política del proyecto exige no sustituirlo por un título. ‘Yahvé’ mantiene el nombre propio y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La expresión בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El hebreo es explícitamente masculino plural y forma parte de una fórmula etnocovenantal. ‘Hijos de Israel’ conserva la forma fuente sin neutralizarla; una versión idiomática puede registrarse como alternativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: La cláusula final בְּיַד מֹשֶׁה
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por mano de Moisés
  alternative_spanish_readings:
  - por medio de Moisés
  - a través de Moisés
  rationale: La frase hebrea es un modismo de mediación. La traducción principal retiene la imagen original, mientras que la lectura funcional queda documentada para no perder el sentido.
  doctrine_reference: HALOT / uso idiomático del hebreo
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que volvió a la lectura literal ‘gave’ para נָתַן. En español se refleja con ‘dio’ y no con una paráfrasis como ‘estableció’ o ‘instituyó’. También se conserva la estructura trinitaria de ‘estatutos, juicios y leyes’, el nombre divino ‘Yahvé’ y la mediación idiomática ‘por mano de Moisés’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ conforme a la terminología del proyecto.
  - ‘Hijos de Israel’ preserva la forma masculina plural del hebreo y la coherencia con el registro auditable.
  - ‘Por mano de Moisés’ se conserva como modismo literal en el texto principal, con explicación en nota.
  - ‘Leyes’ se usa para תּוֹרוֹת en coherencia con el contexto legal del versículo.
