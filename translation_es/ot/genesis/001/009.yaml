translation:
  language: es
  text: 'Y dijo Dios[a]: «Reúnanse las aguas de debajo de los cielos en un solo lugar, y aparezca la tierra seca». Y fue así.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo del cielo». El hebreo שָׁמַיִם puede referirse al cielo visible o a los cielos, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Y dijo» conserva el flujo narrativo del hebreo sin añadir una relación temporal más fuerte de la que el texto exige.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En Génesis 1 el sustantivo, con verbo singular, designa al Creador único. «Dios» es la equivalencia normal y fiel al registro del pasaje.
- source_word: יִקָּווּ
  english_pob_choice: Let ... be gathered
  chosen_spanish: Reúnanse
  alternatives_spanish:
  - Júntense
  - Sean reunidas
  lexicon: HALOT
  rationale: El jussivo expresa mandato divino. En español, la pasiva refleja «Reúnanse» comunica bien la acción de ser congregadas sin perder la fuerza imperativa.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El hebreo usa plural; «las aguas» preserva esa forma y el tono elevado del relato de creación.
- source_word: מִתַּחַת הַשָּׁמַיִם
  english_pob_choice: under the heavens
  chosen_spanish: que están debajo de los cielos
  alternatives_spanish:
  - debajo de los cielos
  - bajo el cielo
  lexicon: HALOT
  rationale: «Debajo de los cielos» sigue de cerca la imagen espacial del hebreo y de la opción inglesa «under the heavens». Se añade «que están» para hacer natural en español la relación atributiva del sintagma.
- source_word: אֶל מָקוֹם אֶחָד
  english_pob_choice: into one place
  chosen_spanish: en un solo lugar
  alternatives_spanish:
  - a un solo lugar
  - en un lugar
  lexicon: HALOT
  rationale: El movimiento hacia concentración se expresa con naturalidad en español con «en un solo lugar», manteniendo «uno» como elemento explícito de אֶחָד.
- source_word: וְתֵרָאֶה
  english_pob_choice: and let ... appear
  chosen_spanish: y aparezca
  alternatives_spanish:
  - y sea vista
  - y se vea
  lexicon: HALOT
  rationale: El niphal jussivo comunica la emergencia visible de lo antes cubierto. «Aparezca» es la forma más idiomática y precisa en español.
- source_word: הַיַּבָּשָׁה
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra firme
  - el suelo seco
  lexicon: HALOT
  rationale: «La tierra seca» mantiene el sentido de tierra expuesta y preserva la distinción frente a las aguas; «tierra firme» sería posible, pero añade una asociación menos directa con el hebreo.
- source_word: וַיְהִי כֵן
  english_pob_choice: And it was so
  chosen_spanish: Y fue así
  alternatives_spanish:
  - Y así fue
  - Y sucedió así
  lexicon: HALOT
  rationale: La fórmula de cumplimiento se traduce de manera breve y solemne. «Y fue así» reproduce la concisión del hebreo y el valor de asentimiento narrativo.
theological_decisions:
- issue: שָׁמַיִם en el contexto de la creación
  english_pob_reading: heavens
  chosen_spanish_reading: cielos
  alternative_spanish_readings:
  - cielo
  - firmamento
  rationale: Aunque «cielos» puede sonar más físico que «heavens» en inglés, en español conserva bien el registro cósmico del Génesis y evita reducir el término a una lectura meteorológica. Se mantiene la amplitud semántica del hebreo sin imponer una cosmología técnica.
  doctrine_reference: Principio de primacía del texto original; conservar el registro del relato de creación sin sobreinterpretación doctrinal.
translation_notes:
  revision_awareness: 'El borrador sigue el aval de alta concordancia del audit trail inglés y no introduce cambios sustantivos respecto de la decisión revisada más reciente. Se mantuvo la equivalencia óptima: se preservan el paralelismo narrativo, el valor imperativo del jussivo y el registro elevado de Génesis 1 sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en Génesis 1, conforme al uso establecido en español bíblico y al acuerdo del audit trail.
  - «Cielos» se mantiene para שָׁמַיִם dentro del marco de creación, mientras la nota ofrece «cielo» como alternativa contextual.
  - La pasiva refleja («Reúnanse») expresa mejor en español el mandato divino que una construcción demasiado literal.
  - «Tierra seca» conserva la distinción semántica con las aguas y evita una paráfrasis más interpretativa.
