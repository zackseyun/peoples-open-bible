translation:
  language: es
  text: Y llegaron y lo sitiaron en Abel de Bet-maaca[a], y levantaron un terraplén[b] contra la ciudad, y este se alzó contra el muro exterior[c]; y todo el pueblo que estaba con Joab estaba golpeando el muro para derribarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa de lectura: «lo sitiaron» conserva el foco del hebreo en el hombre perseguido; «la sitiaron» o «sitiaron la ciudad» suavizarían la referencia pronominal, pero borrarían esa tensión textual.'
    reason: alternative_reading
  - marker: b
    text: «Terraplén» traduce la obra de asedio; también puede entenderse como «rampa de asedio» o «mota», según el matiz que se quiera destacar.
    reason: lexical_alternative
  - marker: c
    text: «Muro exterior» refleja la revisión del inglés POB para חֵל; el término puede aludir a una fortificación exterior o a una obra defensiva semejante a un parapeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: They came
  chosen_spanish: Y llegaron
  alternatives_spanish:
  - Y vinieron
  - Y acudieron
  lexicon: HALOT
  rationale: El verbo de movimiento narrativa puede traducirse naturalmente por «llegaron» en español sin perder el valor de acción sucesiva del wayyiqtol.
- source_word: וַיָּצֻרוּ עָלָיו
  english_pob_choice: besieged him
  chosen_spanish: lo sitiaron
  alternatives_spanish:
  - pusieron sitio contra él
  - lo cercaron
  lexicon: HALOT
  rationale: צור con עַל en contexto militar expresa «sitiar». Conservé el pronombre masculino singular «lo» para reflejar el foco textual sobre Seba, aunque la ciudad sea el escenario del asedio.
- source_word: בְּאָבֵלָה בֵּית הַמַּעֲכָה
  english_pob_choice: in Abel-beth-maacah
  chosen_spanish: en Abel de Bet-maaca
  alternatives_spanish:
  - en Abel-bet-maaca
  - en Abel de Bet-Maaca
  lexicon: HALOT
  rationale: Se mantiene el topónimo con una forma transparente y reconocible en español, preservando la identificación tradicional del lugar sin forzar una traducción explicativa excesiva.
- source_word: וַיִּשְׁפְּכוּ סֹלְלָה
  english_pob_choice: they cast up a siege ramp
  chosen_spanish: levantaron un terraplén
  alternatives_spanish:
  - alzaron un terraplén de asedio
  - amontonaron una rampa de sitio
  lexicon: HALOT
  rationale: שׁפך en lenguaje de asedio puede expresar la acción de amontonar tierra; סֹלְלָה es una obra de sitio. «Terraplén» comunica bien la imagen en español, aunque no agota toda la especificidad militar.
- source_word: אֶל הָעִיר
  english_pob_choice: against the city
  chosen_spanish: contra la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - sobre la ciudad
  lexicon: HALOT
  rationale: Aunque אֶל significa literalmente «a/hacia», el contexto hostil del sitio exige la preposición «contra» para reflejar el propósito bélico de la obra.
- source_word: וַתַּעֲמֹד בַּחֵל
  english_pob_choice: it stood against the outer wall
  chosen_spanish: este se puso frente al muro exterior
  alternatives_spanish:
  - se puso contra el muro exterior
  - quedó junto al muro exterior
  lexicon: HALOT
  rationale: El verbo femenino singular retoma a la סֹלְלָה, por eso en español conviene referirlo con «este» en sentido de obra de asedio. «Muro exterior» refleja mejor la decisión inglesa revisada que «rampart», sin perder la referencia a la fortificación.
- source_word: וְכָל הָעָם אֲשֶׁר אֶת יוֹאָב
  english_pob_choice: and all the people who were with Joab
  chosen_spanish: y todo el pueblo que estaba con Joab
  alternatives_spanish:
  - y toda la gente que estaba con Joab
  - y todo el ejército que estaba con Joab
  lexicon: HALOT
  rationale: La expresión es elíptica; «que estaba con Joab» mantiene la relación de asociación sin sobretraducir a «pertenecían a» o introducir un término militar no explicitado por el hebreo.
- source_word: מַשְׁחִיתִם
  english_pob_choice: were battering the wall
  chosen_spanish: estaba derribándolo
  alternatives_spanish:
  - estaban derribándolo
  - estaba destruyéndolo
  lexicon: HALOT
  rationale: El participio expresa acción continua. Opté por «derribándolo» para mantener la fuerza destructiva del verbo y su enlace con el muro en el contexto inmediato.
- source_word: לְהַפִּיל הַחוֹמָה
  english_pob_choice: to bring down the wall
  chosen_spanish: para hacer caer el muro
  alternatives_spanish:
  - para derribar el muro
  - para hacer desplomar el muro
  lexicon: HALOT
  rationale: Hifil de נפל implica causar la caída. «Hacer caer» conserva de modo bastante directo esa causatividad; «muro» es natural en español y evita una posible ambigüedad con otras partes de la fortificación.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió «outer wall» para חֵל y se explicitó el objeto final como «wall». La versión española conserva esa claridad y evita borrar la tensión entre el pronominal masculino de «lo» y el asedio sobre la ciudad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se preservó el nombre propio «Joab» sin adaptación.
  - Se optó por vocabulario militar concreto y comprensible en español, sin desplazar el valor de sitio del hebreo.
