translation:
  language: es
  text: 'Entonces Jehú dijo: «Consagren una asamblea solemne para Baal». Y la convocaron.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» expresa mejor la secuencia en español moderno que un simple «y», sin alterar el sentido.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehú
  alternatives_spanish:
  - Jehu
  lexicon: Convención onomástica bíblica
  rationale: En español bíblico, «Jehú» es la forma establecida y natural; conserva la identificación del nombre propio sin transliteración innecesaria.
- source_word: קַדְּשׁוּ
  english_pob_choice: Consecrate
  chosen_spanish: Consagren
  alternatives_spanish:
  - Santifiquen
  - Aparten
  lexicon: HALOT
  rationale: El imperativo plural exige una orden formal de dedicar el acto al ámbito cultual. «Consagren» mantiene ese peso ritual en español, mientras «santifiquen» suena más eclesiástico y «aparten» es demasiado débil.
- source_word: עֲצָרָה
  english_pob_choice: a solemn assembly
  chosen_spanish: una asamblea solemne
  alternatives_spanish:
  - una asamblea
  - una asamblea sagrada
  lexicon: HALOT
  rationale: El sustantivo denota una reunión religiosa formal con matiz solemne. «Asamblea solemne» preserva mejor ese valor que la forma genérica «asamblea».
- source_word: לַבַּעַל
  english_pob_choice: for Baal
  chosen_spanish: para Baal
  alternatives_spanish:
  - a Baal
  lexicon: HALOT
  rationale: La preposición ל expresa finalidad o relación cultual. En español, «para Baal» es más natural e identifica el destino devocional de la asamblea.
- source_word: וַיִּקְרָאוּ
  english_pob_choice: So they proclaimed it
  chosen_spanish: Y ellos la proclamaron
  alternatives_spanish:
  - Y la anunciaron
  - Y la convocaron
  lexicon: HALOT
  rationale: קרא aquí tiene fuerza de anuncio público. «La proclamaron» conserva la idea de proclamación oficial; el pronombre femenino concuerda con «asamblea».
translation_notes:
  revision_awareness: La versión revisa el error previo de anclar una nota al pie sin marcador en el texto. En esta entrega no se incluyen notas al pie, para asegurar correspondencia exacta entre marcadores y anclajes.
  spanish_consistency_notes:
  - Se mantiene «Jehú» como forma española establecida del nombre propio.
  - Se conserva el registro cultual de «consagren» y «asamblea solemne» sin introducir terminología confesional ajena al hebreo.
  - El pronombre «la» en «Y ellos la proclamaron» retoma correctamente «asamblea» como antecedente femenino singular.
