  to: Y los hijos de Benjamín vieron que habían sido derrotados. Ahora bien, los hombres de Israel habían dado lugar[a] a Benjamín, porque confiaban en la emboscada[b] que habían puesto contra Gabaa.
  rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a las palabras que explican, conforme a los requisitos del proyecto. También se cambió «Entonces» por «Ahora bien» para reflejar mejor el valor explicativo del hebreo y se adoptó «habían dado lugar» como formulación más cercana al inglés auditado y más natural que «habían cedido lugar».
