translation:
  language: es
  text: Den gracias a Yahvé; invoquen su nombre; den a conocer sus hechos entre los pueblos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre los pueblos»; alternativamente, «entre las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹד֤וּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Confiesen
  - Den alabanza
  lexicon: HALOT
  rationale: El hebreo en este contexto de adoración se entiende naturalmente como un llamado a expresar gratitud o alabanza a Dios. En español, 'Den gracias' conserva el valor cultual y es idiomático en un registro bíblico moderno sin perder precisión.
- source_word: לַֽיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política del proyecto en español pide 'Yahvé' para el nombre divino YHWH. Se evita el sustituto 'SEÑOR' para preservar el nombre del pacto de manera audible y auditable.
- source_word: קִרְא֣וּ בִשְׁמ֔וֹ
  english_pob_choice: call on his name
  chosen_spanish: invoquen su nombre
  alternatives_spanish:
  - llamen en su nombre
  - llamen a su nombre
  - invocan su nombre
  lexicon: HALOT
  rationale: Con קרא seguido de 'en/by su nombre', el sentido es de invocación dirigida a Dios. 'Invoquen su nombre' comunica esa función devocional en español de forma natural y formal.
- source_word: הוֹדִ֥יעוּ
  english_pob_choice: make known
  chosen_spanish: den a conocer
  alternatives_spanish:
  - hagan saber
  - publiquen
  - declaren
  lexicon: HALOT
  rationale: El causativo de ידע expresa hacer que otros sepan. 'Den a conocer' conserva bien la fuerza causativa y encaja con el paralelismo del versículo.
- source_word: בָעַמִּ֖ים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos de la tierra
  lexicon: HALOT
  rationale: '''Pueblos'' preserva el plural étnico de עמים sin cargarlo necesariamente con matiz político. ''Entre'' expresa el valor distributivo de la preposición hebrea.'
- source_word: עֲלִילֹתָֽי/ו
  english_pob_choice: his deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus actos
  - sus hazañas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a acciones o hechos notables. 'Obras' es una equivalencia amplia y bíblicamente natural en español; aquí mantiene el sentido de lo que Yahvé ha hecho sin añadir 'mighty' u otro matiz no explícito en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. En español del proyecto, la forma establecida es 'Yahvé', que preserva el nombre del pacto y evita la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de עֲלִילֹתָיו
  english_pob_reading: his deeds
  chosen_spanish_reading: sus obras
  alternative_spanish_readings:
  - sus hechos
  - sus actos
  - sus hazañas
  rationale: No se introduce un intensificador como 'poderosas' porque el hebreo aquí nombra las acciones/obras en general. 'Obras' mantiene la amplitud semántica y funciona bien en un mandato de proclamación.
  doctrine_reference: Principio de no añadir intensificación no explícita al texto base
translation_notes:
  revision_awareness: La versión inglesa auditada ya muestra alta concordancia y no requiere cambios sustanciales. La principal adaptación al español consiste en mantener la convención del proyecto para YHWH ('Yahvé') y en escoger equivalentes naturales para los imperativos paralelos sin perder la cadencia del hebreo.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de tres imperativos breves.
  - '''Yahvé'' se usa de forma consistente como equivalente del Tetragrámaton.'
  - '''Pueblos'' conserva el plural colectivo del hebreo sin forzar ''naciones'' en el texto principal.'
  - '''Obras'' traduce el campo semántico de acciones/deeds sin sobreinterpretación.'
