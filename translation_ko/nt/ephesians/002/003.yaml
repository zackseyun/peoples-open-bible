    text: 「진노의 자녀」(τέκνα ὀργῆς)는 「진노에 처할 운명에 매인 자」를 가리키는 셈어식 관용 표현이다. 「본성상」(φύσει)은 자라 온 상태가 아니라 타고난 상태를 가리킨다.
    reason: lexical_alternative
