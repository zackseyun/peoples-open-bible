id: 2MA.6.9
reference: 2 Maccabees 6:9
source:
  edition: lxx-swete-1909
  text: τοὺς δὲ μὴ προαιρουμένους μεταβαίνειν ἐπὶ τὰ Ἑλληνικὰ κατασφάζειν. παρῆν οὖν ὁρᾶν τὴν ἐνεστῶσαν ταλαιπωρίαν.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: But those who did not choose to adopt the Greek ways were to be slaughtered[a]. Thus one could see the present misery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to go over to Greek customs.' The Greek expression is literally 'to go over to the Greek things,' referring broadly to Hellenistic ways and practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ προαιρουμένους
  chosen: did not choose
  alternatives:
  - were unwilling
  - did not consent
  - did not prefer
  lexicon: LSJ
  rationale: προαιρέομαι denotes choosing or preferring by deliberate decision. 'Did not choose' preserves the volitional force without overinterpreting motive.
- source_word: μεταβαίνειν
  chosen: to adopt
  alternatives:
  - to go over
  - to change over
  - to transfer themselves
  lexicon: LSJ
  rationale: Literally 'to go over/change over,' but with ἐπὶ τὰ Ἑλληνικά the sense is conversion/adoption of Greek customs. 'Adopt' communicates the idiomatic force in natural English while remaining anchored to the Greek.
- source_word: ἐπὶ τὰ Ἑλληνικά
  chosen: the Greek ways
  alternatives:
  - Greek customs
  - Hellenic practices
  - Greek things
  lexicon: LSJ
  rationale: The neuter plural with article refers broadly to Greek/Hellenistic customs and mode of life, not merely ethnicity or language. 'The Greek ways' is readable and sufficiently broad.
- source_word: κατασφάζειν
  chosen: were to be slaughtered
  alternatives:
  - to butcher
  - to kill
  - to slay utterly
  lexicon: LSJ
  rationale: The verb is stronger than ordinary 'kill,' conveying violent massacre. Rendering it as 'were to be slaughtered' preserves the brutality and the infinitive's force under the decree context.
- source_word: παρῆν οὖν ὁρᾶν
  chosen: So one could see
  alternatives:
  - therefore it was possible to see
  - thus it was there to behold
  - so it was evident to see
  lexicon: LSJ
  rationale: This idiom introduces what was plainly observable. 'So one could see' is natural English that preserves the impersonal observational sense.
- source_word: τὴν ἐνεστῶσαν ταλαιπωρίαν
  chosen: the misery that had now come
  alternatives:
  - the present misery
  - the distress at hand
  - the affliction then existing
  lexicon: LSJ
  rationale: ἐνεστῶσαν means present/pressing/now existing. 'The misery that had now come' captures both the present reality and the sense of an affliction that had arrived.
