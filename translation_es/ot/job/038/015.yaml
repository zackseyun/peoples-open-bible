review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: la luz es negada a los malvados y el brazo/poder levantado queda quebrado. Sin embargo, dos decisiones importantes no siguen fielmente el audit trail: 1) la nota [a] introduce una alternativa innecesaria y confusa sobre «de los malvados» en lugar de preservar la alternativa documentada sobre el valor aspectual de תִּשָּׁבֵר; 2) «enaltecido» para רָמָה desplaza la imagen física de ‘levantado/alzado’ hacia una cualidad más abstracta de exaltación. Además, «retenida de los impíos» suena poco natural en español; el sentido de separación se expresa mejor con «a los impíos se les niega/retiene» o «les es retenida».'
  spanish_quality_summary: El texto es comprensible, pero «Su luz es retenida de los impíos» resulta forzado en español moderno eclesial. «El brazo enaltecido» también suena menos idiomático y menos imagístico que «el brazo levantado». Conviene mejorar fluidez sin perder la literalidad poética. La distribución de notas debe alinearse con el contenido real de las observaciones.
  glossary_alignment: No hay conflictos con terminología doctrinal mayor. «Impíos» es aceptable para רְשָׁעִים y «brazo» preserva correctamente la imagen literal con valor metafórico implícito. La revisión propuesta mantiene estos aciertos, pero ajusta «levantado» para reflejar mejor רָמָה y corrige la nota para conservar la alternativa documentada sobre «es/será quebrado».
  issues:
  - severity: medium
    issue: La construcción «Su luz es retenida de los impíos» es poco natural en español.
    rationale: Aunque intenta reflejar מִן como separación, en español bíblico legible suena mejor «A los impíos se les niega su luz» o «Su luz les es retenida a los impíos». La versión actual conserva el sentido solo de manera torpe.
  - severity: medium
    issue: «Enaltecido» no refleja tan bien la imagen concreta de רָמָה como «levantado» o «alzado».
    rationale: El hebreo describe un brazo elevado/levantado; «enaltecido» introduce una noción de exaltación más abstracta y menos visual que la documentada por el POB inglés.
  - severity: high
    issue: La nota [a] no corresponde al audit trail y omite la alternativa significativa.
    rationale: La nota inglesa documenta la alternativa «will be broken» por el valor del imperfecto hebreo. La nota española actual cambia eso por una falsa alternativa entre «impíos» y «malvados», que no añade valor textual relevante.
  revised_spanish_text: A los impíos se les niega su luz, y el brazo levantado[a] es quebrado[b].
