translation:
  language: es
  text: Te arrojaré al desierto[a], a ti y a todos los peces de tus canales. Caerás en el campo abierto; no serás recogido ni reunido[b]. Te he dado como alimento[c] a las bestias de la tierra y a las aves de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los peces de tus canales del Nilo»; el término hebreo para «canales» suele emplearse en contextos egipcios para el Nilo y sus aguas.'
    reason: cultural_note
  - marker: b
    text: 'O: «no serás recogido ni juntado»; el hebreo usa dos verbos casi sinónimos para intensificar que nadie recuperará ni enterrará el cuerpo.'
    reason: lexical_alternative
  - marker: c
    text: La cláusula final es literalmente «te he dado para alimento»; el perfecto profético expresa la certeza del juicio venidero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְטַשְׁתִּיךָ
  english_pob_choice: I will cast you
  chosen_spanish: Te arrojaré
  alternatives_spanish:
  - Te abandonaré
  - Te echaré
  lexicon: HALOT
  rationale: En este contexto de juicio y desplazamiento forzado, «arrojar» comunica mejor la acción violenta de desecho que una simple idea de abandono. Mantiene la fuerza punitiva del hebreo sin volverse demasiado interpretativo.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al yermo
  - al desierto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia un lugar desolado. «Desierto» es natural en español y conserva la imagen de abandono y aridez; «yermo» sería posible pero menos transparente.
- source_word: דְּגַת יְאֹרֶיךָ
  english_pob_choice: the fish of your streams
  chosen_spanish: a todos los peces de tus canales
  alternatives_spanish:
  - a todos los peces de tus corrientes
  - a todos los peces de tus ríos
  lexicon: HALOT
  rationale: «דְּגַת» es colectivo, por eso «todos los peces» refleja bien la totalidad. «יְאֹרֶיךָ» en contexto egipcio suele aludir a los canales/Nilo; «canales» expresa mejor esa red de aguas que «ríos» en español.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: on the open field
  chosen_spanish: sobre la faz del campo
  alternatives_spanish:
  - sobre el campo abierto
  - en el campo
  lexicon: HALOT
  rationale: La expresión hebrea comunica exposición visible y sin resguardo. «Faz del campo» conserva bien la imagen idiomática de superficie/exposición, con un tono bíblico comprensible en español.
- source_word: לֹא תֵאָסֵף
  english_pob_choice: you will not be gathered
  chosen_spanish: no serás recogido
  alternatives_spanish:
  - no serás juntado
  - no serás reunido
  lexicon: HALOT
  rationale: El verbo en nifal apunta a ser recogido o retirado, probablemente con implicación funeraria. «Recogido» mantiene esa ambigüedad útil en español y suena más natural que una repetición literal.
- source_word: וְלֹא תִקָּבֵץ
  english_pob_choice: or collected
  chosen_spanish: ni reunido
  alternatives_spanish:
  - ni congregado
  - ni juntado
  lexicon: HALOT
  rationale: El segundo verbo es casi sinónimo del primero y refuerza la idea de que nadie se ocupará del cadáver. «Reunido» conserva la cercanía semántica sin forzar una repetición mecánica.
- source_word: לְחַיַּת הָאָרֶץ
  english_pob_choice: to the beasts of the earth
  chosen_spanish: a las bestias de la tierra
  alternatives_spanish:
  - a los animales de la tierra
  - a las fieras de la tierra
  lexicon: HALOT
  rationale: «Bestias de la tierra» sigue de cerca la fuerza del hebreo en escenas de carroña y juicio. «Bestias» es más vívido y acorde con el registro profético que «animales».
- source_word: וּלְעוֹף הַשָּׁמַיִם
  english_pob_choice: and to the birds of the heavens
  chosen_spanish: y a las aves de los cielos
  alternatives_spanish:
  - y a las aves del cielo
  - y a las aves del firmamento
  lexicon: HALOT
  rationale: «Aves de los cielos» preserva el plural poético del hebreo y el tono elevado de la expresión. En español bíblico, «cielos» mantiene mejor la resonancia literaria que «cielo» en singular.
- source_word: נְתַתִּיךָ לְאָכְלָה
  english_pob_choice: I have given you as food
  chosen_spanish: Te he dado como alimento
  alternatives_spanish:
  - Te he dado para comer
  - Te he hecho alimento
  lexicon: HALOT
  rationale: 'El perfecto hebreo se conserva como perfecto profético: el juicio se presenta como ya decidido y seguro. «Como alimento» transmite la idea de entregarlo para ser devorado sin endurecerlo excesivamente.'
theological_decisions:
- issue: Perfecto profético en la cláusula final
  english_pob_reading: I have given you as food
  chosen_spanish_reading: Te he dado como alimento
  alternative_spanish_readings:
  - Te daré como alimento
  rationale: El hebreo usa un perfecto que puede funcionar proféticamente, presentando el juicio como cierto y prácticamente consumado. Mantener el perfecto en español preserva esa solemnidad y no aplana la declaración a un simple futuro.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo (WLC) y concuerda con el audit trail inglés en las decisiones principales: verbos de juicio («arrojar»), referencia acuática egipcia («canales»), doble verbo de no-recolección y perfecto profético final. No se detectaron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» únicamente cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se prefirió «cielos» en plural para conservar el registro bíblico y la formulación hebrea.
  - «Bestias» y «aves» mantienen el tono profético y la imaginería de carroña del pasaje.
  - Las notas a pie preservan la alternativa cultural sobre el Nilo y la intensificación de los dos verbos finales.
