translation:
  language: es
  text: '¿No has visto lo que este pueblo ha dicho, al decir: «Las dos familias[a] que Yahvé escogió, él las ha rechazado[b]»? Así desprecian a mi pueblo, para que ya no sean una nación delante de ellos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dos clanes» o «las dos casas». El hebreo no identifica explícitamente cuáles son.
    reason: lexical_alternative
  - marker: b
    text: O «él las rechazó» o «él las desechó».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «delante de ellos»; también puede entenderse como «a sus ojos» o «en su estimación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No has... ?
  alternatives_spanish:
  - ¿Acaso no has... ?
  - ¿No es cierto que has... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación; en español, «¿No has...?» conserva la fuerza directa y natural del hebreo sin añadir matiz no atestado.
- source_word: רָאִיתָ
  english_pob_choice: seen
  chosen_spanish: visto
  alternatives_spanish:
  - observado
  - notado
  lexicon: HALOT
  rationale: Es el verbo común de ver/percibir y funciona bien en la pregunta retórica.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo aquí
  - estas gentes
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo con matiz despectivo/distante. «Este pueblo» preserva ese valor mejor que pluralizarlo.
- source_word: דִּבְּרוּ לֵאמֹר
  english_pob_choice: have spoken, saying
  chosen_spanish: ha hablado, diciendo
  alternatives_spanish:
  - han dicho, diciendo
  - hablaron, diciendo
  lexicon: HALOT
  rationale: El infinitivo introductorio se conserva con «diciendo»; el perfecto «ha hablado» en español da una apertura discursiva natural para la cita.
- source_word: שְׁתֵּי הַמִּשְׁפָּחוֹת
  english_pob_choice: the two families
  chosen_spanish: las dos familias
  alternatives_spanish:
  - las dos tribus
  - las dos casas
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת puede ser familias, clanes o casas. «Familias» sigue la opción inglesa auditada y mantiene la indeterminación del referente sin resolverla prematuramente.
- source_word: אֲשֶׁר בָּחַר יְהוָה בָּהֶם
  english_pob_choice: that Yahweh chose
  chosen_spanish: que Yahvé escogió
  alternatives_spanish:
  - que Yahvé eligió
  - que Yahvé seleccionó
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el proyecto y el verbo «escogió» para el acto electivo, con registro bíblico claro y actual.
- source_word: וַיִּמְאָסֵם
  english_pob_choice: he has rejected them
  chosen_spanish: él las ha rechazado
  alternatives_spanish:
  - él las rechazó
  - él las ha desechado
  lexicon: HALOT
  rationale: מָאַס comunica rechazo fuerte; «ha rechazado» reproduce bien la decisión perfecta dentro del discurso citado. El pronombre «las» concuerda con «familias».
- source_word: וְאֶת עַמִּי יִנְאָצוּן
  english_pob_choice: Thus they despise my people
  chosen_spanish: Así desprecian a mi pueblo
  alternatives_spanish:
  - Y desprecian a mi pueblo
  - Así tratan con desprecio a mi pueblo
  lexicon: HALOT
  rationale: נָאַץ expresa desprecio/menosprecio; «desprecian» es directo y fuerte en español. «Así» refleja la conexión consecuencial del waw en contexto.
- source_word: מִהְיוֹת עוֹד גּוֹי
  english_pob_choice: so that they should no longer be a nation
  chosen_spanish: para que ya no sean una nación
  alternatives_spanish:
  - para no seguir siendo una nación
  - a fin de que dejen de ser una nación
  lexicon: HALOT
  rationale: La construcción infinitiva se vuelve una finalidad negativa natural en español. «Ya no sean una nación» conserva la cesación de estatus sin forzar una afirmación ontológica mayor.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en su presencia
  - a sus ojos
  lexicon: HALOT
  rationale: Literalmente significa «delante de ellos»; en contexto también puede implicar su estima o punto de vista. Se mantiene la forma más cercana al hebreo.
theological_decisions:
- issue: Identidad de «las dos familias»
  english_pob_reading: Rendered generically as 'the two families' without specifying Judah/Israel, David/Levi, or other identifications.
  chosen_spanish_reading: Se deja en «las dos familias» sin identificar explícitamente a cuáles se refiere.
  alternative_spanish_readings:
  - las dos tribus
  - las dos casas
  - Judá e Israel
  rationale: El versículo no nombra de forma explícita a las dos entidades; el contexto inmediato permite varias propuestas, pero la traducción no debe resolver una identificación discutida sin respaldo directo del texto.
  doctrine_reference: Preservar la tensión interpretativa y no importar una explicación no explícita en el versículo.
- issue: Fuerza de la cláusula final
  english_pob_reading: 'Expressed as the nations'' contemptuous regard: ''so that they should no longer be a nation before them.'''
  chosen_spanish_reading: 'Se expresa como el objetivo despectivo de los hablantes: «para que ya no sean una nación delante de ellos».'
  alternative_spanish_readings:
  - de modo que ya no sean una nación a sus ojos
  - para que dejen de ser una nación ante ellos
  rationale: La sintaxis hebrea apunta a una finalidad/resultado vinculado con la mirada hostil de quienes hablan. La redacción española conserva esa ambigüedad sin convertirla en una negación ontológica más fuerte que la del texto.
  doctrine_reference: Primacía del original y conservación de ambigüedad real cuando existe.
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés revisado, especialmente la última revisión de la cláusula final para reflejar con más cercanía la construcción infinitiva hebrea. Se mantiene la decisión de no especificar las dos familias y de preservar el tono de rechazo y desprecio del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se traduce el colectivo singular הָעָם הַזֶּה como «este pueblo».
  - Se conserva la tensión entre traducción literal y sentido contextual en la cláusula final sin simplificarla a una afirmación histórica absoluta.
  - La concordancia del pronombre en la cita se ajusta a «las dos familias».
