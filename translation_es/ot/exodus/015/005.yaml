translation:
  language: es
  text: Los abismos[a] los cubrieron; descendieron a las profundidades como una piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Las aguas profundas los cubrieron; se hundieron en las profundidades como una piedra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהֹמֹת
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - los fondos
  - las aguas profundas
  lexicon: HALOT
  rationale: תְּהֹמֹת es el plural de תְּהוֹם y designa las aguas profundas/abismo. En español, «abismos» conserva mejor la fuerza poética y el sentido de hondura extrema que un simple «profundidades», sin convertirlo en una explicación más amplia de la que el hebreo exige.
- source_word: יְכַסְיֻמוּ
  english_pob_choice: covered them
  chosen_spanish: los cubrieron
  alternatives_spanish:
  - los cubrieron por completo
  - los cubrieron totalmente
  - los cubrieron encima
  lexicon: HALOT
  rationale: La raíz כסה significa «cubrir». Con sufijo de tercera persona plural, el sentido directo es que las aguas los cubrieron. El orden verbal español se ajusta al hebreo sin necesidad de explicitar «por completo».
- source_word: יָרְדוּ
  english_pob_choice: they went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - se hundieron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: El qal perfecto de ירד expresa descenso. «Descendieron» mantiene la imagen verbal del texto y evita introducir una interpretación más específica como «se hundieron», aunque esa idea sea compatible con el contexto.
- source_word: בִמְצוֹלֹת
  english_pob_choice: into the depths
  chosen_spanish: a los fondos
  alternatives_spanish:
  - en los fondos
  - en las profundidades
  - a las profundidades
  lexicon: HALOT
  rationale: מְצוֹלֹת denota los fondos/profundidades del mar. Para no repetir exactamente el mismo sustantivo que en la primera hemistiquio, «fondos» conserva la paralelidad y la concreción acuática; el verbo de movimiento permite la preposición idiomática «a» en español. Se evita «abismos» aquí para no uniformar indebidamente dos términos hebreos distintos.
- source_word: כְּמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: HALOT
  rationale: Partícula comparativa estándar; «como» es la equivalencia más natural y fiel.
- source_word: אָבֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - piedra
  - un pedazo de piedra
  lexicon: HALOT
  rationale: אָבֶן significa «piedra». En español, «una piedra» conserva la imagen de peso y caída del símil con naturalidad y sin añadir matices no presentes en el hebreo.
translation_notes:
  revision_awareness: 'El texto hebreo y el paquete auditado en inglés muestran alta concordancia y no requieren revisión textual. La única decisión relevante es léxica y poética: distinguir los dos términos de profundidad sin perder la paralelidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige; este versículo no contiene el nombre divino explícito.
  - Se evita «SEÑOR» como sustituto teológico porque no aparece en el hebreo de este verso.
  - Se conserva el paralelismo entre dos vocablos hebreos distintos para «profundidad» en lugar de nivelarlos en una sola traducción uniforme.
