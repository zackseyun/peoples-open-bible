translation:
  language: es
  text: Aun el valiente de corazón entre los guerreros huirá desnudo en aquel día, declara Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aun el de corazón valiente entre los hombres poderosos huirá desnudo en aquel día»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַמִּיץ לִבּוֹ
  english_pob_choice: stouthearted
  chosen_spanish: el más valiente de corazón
  alternatives_spanish:
  - el de corazón resuelto
  - el fuerte de corazón
  - el valiente
  lexicon: HALOT
  rationale: El hebreo forma una expresión idiomática con אַמִּיץ + לִבּוֹ, literalmente ‘fuerte/valiente de su corazón’. En español, ‘valiente de corazón’ conserva la imagen de una firmeza interior sin sonar forzado. Mantiene mejor la tensión entre fortaleza interior y la huida vergonzosa que una paráfrasis más lisa.
- source_word: בַּגִּבּוֹרִים
  english_pob_choice: among the warriors
  chosen_spanish: entre los guerreros
  alternatives_spanish:
  - entre los poderosos
  - entre los valientes
  - entre los héroes
  lexicon: HALOT
  rationale: 'גִּבּוֹרִים aquí tiene sentido militar: hombres de guerra, guerreros. ‘Guerreros’ es natural y preserva el campo semántico mejor que ‘poderosos’, que podría sonar más general o abstracto en español.'
- source_word: עָרוֹם
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - naked
  - desnudo
  - despojado
  lexicon: HALOT
  rationale: La idea básica es desnudez real o humillante. ‘Desnudo’ es la forma más clara y directa en español; ‘despojado’ introduciría un matiz interpretativo que el hebreo no exige.
- source_word: יָנוּס
  english_pob_choice: will flee
  chosen_spanish: huirá
  alternatives_spanish:
  - escapará
  - tomará la fuga
  - se dará a la fuga
  lexicon: HALOT
  rationale: El verbo expresa huida en contexto de juicio. ‘Huirá’ es la forma más directa y natural en español, sin debilitar la urgencia del pasaje.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - para aquel día
  lexicon: HALOT
  rationale: La fórmula profética se rinde bien con ‘en aquel día’, que conserva el tono bíblico y la referencia escatológica sin caer en un calco rígido.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito, conforme al criterio del proyecto. ‘Declara Yahvé’ refleja la fórmula profética נְאֻם con solemnidad y naturalidad en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de manera directa. En español se conserva el nombre propio divino como ‘Yahvé’, siguiendo el criterio del proyecto y evitando el ocultamiento del nombre bajo una convención de título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Construcción idiomática de fortaleza interior
  english_pob_reading: stouthearted
  chosen_spanish_reading: valiente de corazón
  alternative_spanish_readings:
  - courageous of heart
  - de corazón valiente
  - resuelto de corazón
  rationale: La frase hebrea es idiomática y combina valor con sede interior (‘corazón’). ‘Valiente de corazón’ preserva esa fuerza sin reducir el giro a una simple cualidad moral genérica.
  doctrine_reference: HALOT, entrada para אַמִּיץ; relación constructa con לֵב
translation_notes:
  revision_awareness: 'La revisión final del contexto inglés no requirió cambios: el sentido se mantuvo estable. La cruz de acuerdo indicó alta concordancia con objeciones menores, por lo que la versión española conserva el mismo contenido semántico principal y solo ajusta la idiomaticidad natural del español.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma normal del nombre divino.
  - Se evita ‘SEÑOR’ para no ocultar el Tetragrama.
  - ‘Guerreros’ conserva el matiz militar de גִּבּוֹרִים.
  - ‘Desnudo’ mantiene la crudeza del juicio sin suavizarla.
  - El orden de la oración sigue el paralelismo del hebreo con una cadencia natural en español.
