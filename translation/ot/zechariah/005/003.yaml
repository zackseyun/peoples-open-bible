id: ZEC.5.3
reference: Zechariah 5:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י זֹ֚את הָֽ/אָלָ֔ה הַ/יּוֹצֵ֖את עַל פְּנֵ֣י כָל הָ/אָ֑רֶץ כִּ֣י כָל הַ/גֹּנֵ֗ב מִ/זֶּה֙ כָּמ֣וֹ/הָ נִקָּ֔ה וְ/כָל הַ/נִּ֨שְׁבָּ֔ע מִ/זֶּ֖ה כָּמ֥וֹ/הָ נִקָּֽה־־־־׃
translation:
  text: Then he said to me[a], “This is the curse that goes out over the face of the whole land, for everyone who steals will be purged away according to what is written on this side of it[c][b], and everyone who swears falsely will be purged away according to what is written on that side of it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “over the face of the whole earth.” Hebrew אֶרֶץ can mean either “land” or “earth.”
    reason: alternative_reading
  - marker: b
    text: Literally, “from this according to it … from that according to it,” likely referring to what is written on each side of the flying scroll.
    reason: lexical_alternative
  - marker: c
    text: Or “will be cleared away” / “will be cut off.” The Hebrew verb carries judicial force here in the context of the curse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָלָה
  chosen: the curse
  alternatives:
  - the oath
  - the sworn curse
  lexicon: HALOT
  rationale: אָלָה commonly denotes a curse, often one invoked by oath. In this vision context, the flying scroll carries covenantal judgment, so 'the curse' best fits the immediate sense while preserving the judicial force.
- source_word: הַיּוֹצֵאת
  chosen: that goes out
  alternatives:
  - that is going out
  - that goes forth
  lexicon: HALOT
  rationale: The participle marks ongoing action. 'Goes out' is natural modern English and preserves the image of the curse proceeding outward.
- source_word: עַל־פְּנֵי כָל־הָאָרֶץ
  chosen: over the face of the whole land
  alternatives:
  - over the face of the whole earth
  lexicon: HALOT
  rationale: Hebrew אֶרֶץ can mean 'land' or 'earth.' In Zechariah's post-exilic covenant context, the judgment appears directed at the community in the land rather than the entire globe, so 'land' is preferred; the broader alternative is preserved in a footnote.
- source_word: הַגֹּנֵב
  chosen: everyone who steals
  alternatives:
  - every thief
  lexicon: HALOT
  rationale: The substantival participle is generic. 'Everyone who steals' communicates the representative force clearly in modern English.
- source_word: מִזֶּה ... כָּמוֹהָ
  chosen: according to what is written on this side of it
  alternatives:
  - from here, according to it
  - on the basis of this, according to it
  lexicon: HALOT
  rationale: The phrase is elliptical and tied to the two-sided scroll in the vision. 'This side of it' makes explicit the likely reference to one side of the scroll, which explains the paired clauses in this verse.
- source_word: נִקָּה
  chosen: will be purged away
  alternatives:
  - will be cleared away
  - will be cut off
  - will be acquitted
  lexicon: HALOT
  rationale: The Niphal of נקה can mean 'be clean/innocent' or, in judicial contexts, 'be cleared.' Here the context is punitive, not exculpatory; the sense is that the offender is removed under the curse. 'Purged away' captures the judicial-removal force without implying innocence.
- source_word: הַנִּשְׁבָּע
  chosen: everyone who swears falsely
  alternatives:
  - everyone who swears
  - everyone who takes an oath falsely
  lexicon: HALOT
  rationale: Although 'falsely' is not explicit in the participle alone, the pairing with theft and the content of the scroll in the surrounding vision indicate perjurious or false oath-taking. Adding 'falsely' brings out the intended sense in idiomatic English.
- source_word: מִזֶּה ... כָּמוֹהָ
  chosen: according to what is written on that side of it
  alternatives:
  - according to what is written on this side of it
  lexicon: HALOT
  rationale: The second demonstrative phrase likely contrasts with the first, referring to the opposite side of the flying scroll. Rendering 'that side' helps English readers follow the two-sided inscription implied by the vision.
