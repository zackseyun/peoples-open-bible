revisions:
- from: Y las demás cosas que nos pertenecen desde ahora —los diezmos y los impuestos que nos pertenecen, y las lagunas de sal[a], y las coronas que nos pertenecen[b]— se las concederemos todas a ellos.
  to: Y las demás cosas que nos pertenecen de ahora en adelante—los diezmos y los impuestos que nos pertenecen, y las lagunas de sal[a], y las coronas que nos pertenecen[b]—se las concederemos todas.
  rationale: Se corrigen y normalizan las notas para que correspondan exactamente a los términos del texto y al razonamiento léxico auditado; se elimina la alternativa no idiomática «las salinas de sal». También se pule el español con «de ahora en adelante» y se simplifica la clausura a «se las concederemos todas», que mantiene plenamente el sentido del griego y suena más natural en español.
