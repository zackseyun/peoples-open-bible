revisions:
- from: La sabiduría se le adelantará como una madre[a], y lo recibirá como la esposa de su juventud.
  to: La sabiduría irá a su encuentro como una madre[a], y lo recibirá como la esposa de su juventud.
  rationale: Se reemplaza «se le adelantará» por «irá a su encuentro» para reflejar con mayor fidelidad y claridad el sentido hebreo y griego de salir al encuentro. Se conserva el resto del verso, incluida la nota sobre la variante griega, porque representa bien la decisión textual documentada por el POB.
