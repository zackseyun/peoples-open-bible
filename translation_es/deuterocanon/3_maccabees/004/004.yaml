  text: For with the bitter cruelty of a merciless spirit they were being sent out together by the generals in each city[a], so that, beyond the outrageous punishments, even some of their enemies, seeing the common pity before their eyes and considering the uncertain ruin of their life[b], were weeping over their wretched deportation.
