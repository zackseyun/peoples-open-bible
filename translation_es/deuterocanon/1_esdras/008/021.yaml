base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/021.yaml
  text: Let it be done according to the law of God for God Most High[b][a], so that wrath may not come upon the kingdom of the king and his sons.
  footnotes:
  - marker: a
    text: Or 'Let it be carried out according to the law of God for the Most High God.' The Greek imperative can emphasize full execution or completion.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Ezra 7:23 differs substantially at this point and emphasizes supplying specified amounts for temple service; 1 Esdras here preserves a shorter Greek formulation. The translation follows the Greek as the primary witness.
    reason: textual_variant
