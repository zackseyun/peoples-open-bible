translation:
  language: es
  text: Porque una voz declara desde Dan, y proclama desastre[a] desde la región montañosa[b] de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'calamidad' o 'aflicción'; la palabra hebrea también puede significar 'maldad' en otros contextos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'monte de Efraín'; la expresión probablemente se refiere a la región montañosa de Efraín.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Retiene la fuerza explicativa o causal del hebreo. 'Porque' es natural en español y conserva el enlace con el contexto inmediato.
- source_word: קֹול
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  - un clamor
  lexicon: HALOT
  rationale: '''Voz'' conserva la vivacidad personificada del anuncio profético y corresponde bien al hebreo, sin reducirlo a un mero ruido.'
- source_word: מַגִּיד
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - anuncia
  - dice
  - está declarando
  lexicon: HALOT
  rationale: El participio expresa anuncio solemne y actual. 'Declara' mantiene el tono formal y la inmediatez profética que la POB inglesa dejó en presente simple.
- source_word: מִדָּן
  english_pob_choice: from Dan
  chosen_spanish: desde Dan
  alternatives_spanish:
  - de Dan
  - desde la ciudad de Dan
  lexicon: HALOT
  rationale: '''Desde'' reproduce el valor de procedencia del prefijo hebreo y sugiere el punto de origen del anuncio o amenaza, como en la versión inglesa.'
- source_word: וּמַשְׁמִיעַ
  english_pob_choice: and proclaims
  chosen_spanish: y proclama
  alternatives_spanish:
  - y hace oír
  - y anuncia
  - y da a conocer
  lexicon: HALOT
  rationale: El causativo de שמע tiene la idea de hacer oír / anunciar públicamente. 'Proclama' comunica bien el carácter público y solemne del paralelismo.
- source_word: אָוֶן
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - trouble
  - maldad
  lexicon: HALOT
  rationale: En este contexto profético de amenaza inminente, el campo semántico favorece el sentido de ruina o calamidad. 'Desastre' es claro en español y mantiene el valor de juicio; evita fijarlo injustificadamente en el sentido moral de 'maldad'.
- source_word: מֵהַר אֶפְרָיִם
  english_pob_choice: from the hill country of Ephraim
  chosen_spanish: desde la tierra montañosa de Efraín
  alternatives_spanish:
  - desde el monte de Efraín
  - desde la región montañosa de Efraín
  - desde los montes de Efraín
  lexicon: HALOT
  rationale: El hebreo usa 'montaña/monte' en singular con sentido regional. 'Tierra montañosa' expresa de modo natural en español la región hill country, siguiendo la decisión auditada de la POB inglesa de no leerlo como un monte puntual.
translation_notes:
  revision_awareness: La redacción sigue la lectura auditada de la POB inglesa, pero vuelve al hebreo para conservar el paralelismo y la referencia geográfica. Se mantiene el valor de juicio de אָוֶן como 'desastre' y el sentido regional de הַר אֶפְרָיִם como zona montañosa, no como un monte específico.
  spanish_consistency_notes:
  - Se mantiene 'Dan' y 'Efraín' como nombres propios transliterados en forma usual en español bíblico.
  - Se evita 'SEÑOR' o sustituciones reverenciales porque el versículo no contiene el nombre divino.
  - El registro es sobrio y profético, con verbos en presente para reflejar la vividez del original.
