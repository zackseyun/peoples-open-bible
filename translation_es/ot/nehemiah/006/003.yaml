translation:
  language: es
  text: 'Así que les envié mensajeros[a], diciendo: «Estoy haciendo una gran obra, y no puedo bajar. ¿Por qué habría de detenerse la obra mientras la dejo y bajo a verlos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué habría de cesar la obra mientras la dejo y voy a verlos?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלְחָה
  english_pob_choice: So I sent
  chosen_spanish: Así que envié
  alternatives_spanish:
  - Entonces envié
  - Y envié
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción siguiente en secuencia. «Así que» comunica bien el avance narrativo en español y «envié» conserva el valor verbal simple del hebreo.
- source_word: עֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a ellos mismos
  - contra ellos
  lexicon: HALOT
  rationale: En este contexto con «mensajeros», la preposición señala dirección hacia personas, no hostilidad. «A ellos» es natural y fiel.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - ángeles
  lexicon: HALOT
  rationale: Aquí son agentes humanos que llevan un mensaje, no seres celestiales. «Mensajeros» mantiene la claridad narrativa y la referencia humana.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - con estas palabras
  lexicon: HALOT
  rationale: Es la partícula quotativa estándar que introduce la cita directa. «Diciendo» es la correspondencia más directa y natural.
- source_word: מְלָאכָה גְדוֹלָה
  english_pob_choice: a great work
  chosen_spanish: una gran obra
  alternatives_spanish:
  - un gran trabajo
  - una obra importante
  lexicon: HALOT
  rationale: «מְלָאכָה» abarca trabajo/obra/tarea. «Obra» funciona bien en este contexto de reconstrucción, y «gran» reproduce el énfasis en su importancia.
- source_word: אֲנִי עֹשֶׂה
  english_pob_choice: I am doing
  chosen_spanish: estoy haciendo
  alternatives_spanish:
  - estoy llevando a cabo
  - estoy realizando
  lexicon: HALOT
  rationale: El participio con pronombre expresa actividad en curso. «Estoy haciendo» es simple, actual y mantiene el aspecto progresivo.
- source_word: וְלֹא אוּכַל לָרֶדֶת
  english_pob_choice: and I cannot come down
  chosen_spanish: y no puedo bajar
  alternatives_spanish:
  - y no puedo descender
  - y no puedo ir abajo
  lexicon: HALOT
  rationale: «ירד» literalmente es «bajar/descender». «Bajar» conserva el movimiento espacial desde Jerusalén sin endurecer el español.
- source_word: לָמָּה תִשְׁבַּת הַמְּלָאכָה
  english_pob_choice: Why should the work stop
  chosen_spanish: ¿Por qué habría de detenerse la obra?
  alternatives_spanish:
  - ¿Por qué se detendría la obra?
  - ¿Por qué cesaría la obra?
  lexicon: HALOT
  rationale: «שׁבת» aquí significa cesar/detenerse, no guardar sábado. «Habría de detenerse» conserva el valor retórico de la pregunta y su fuerza exhortativa.
- source_word: כַּאֲשֶׁר אַרְפֶּהָ
  english_pob_choice: while I leave it
  chosen_spanish: mientras la dejo
  alternatives_spanish:
  - mientras la abandono
  - mientras la suelto
  lexicon: HALOT
  rationale: El verbo con sufijo femenino remite a «la obra». «Dejo» es idiomático en español y preserva la idea de soltar o dejar por un tiempo el trabajo.
- source_word: וְיָרַדְתִּי אֲלֵיכֶם
  english_pob_choice: and come down to you
  chosen_spanish: y bajo a ustedes
  alternatives_spanish:
  - y voy a bajar a ustedes
  - y desciendo hacia ustedes
  lexicon: HALOT
  rationale: Se repite ירד para mantener el movimiento descendente. «Bajo a ustedes» conserva la dirección del discurso directo; la forma «a ustedes» refleja con claridad el destinatario.
theological_decisions:
- issue: La expresión final plantea una alternativa de sentido entre cesar la obra y dejarla temporalmente mientras Nehemías baja a sus interlocutores.
  english_pob_reading: Why should the work stop while I leave it and come down to you?
  chosen_spanish_reading: ¿Por qué habría de detenerse la obra mientras la dejo y bajo a ustedes?
  alternative_spanish_readings:
  - ¿Por qué cesaría la obra mientras la abandono y bajo a ustedes?
  - ¿Por qué se interrumpiría la obra mientras la dejo y voy a ustedes?
  rationale: La redacción española conserva la pregunta retórica y la relación causal-temporal entre la salida de Nehemías y la detención de la obra, sin resolver excesivamente la ambigüedad del hebreo.
  doctrine_reference: Nehemías 6:3; mantenimiento del sentido narrativo y retórico del texto
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] en el texto base y manteniendo una única nota con marcador presente en la traducción.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «obra» para מְלָאכָה por coherencia con el contexto de reconstrucción y la formulación ya auditada en inglés.
  - Se mantuvo el movimiento espacial con «bajar» para ירד, respetando la perspectiva de la cita directa.
  - No se introdujo terminología eclesiástica adicional; el registro es bíblico y sobrio.
