base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/007/029.yaml
  text: And along the borders of the sons of Manasseh were Beth-shean and its daughter towns[a], Taanach and its daughter towns, Megiddo and its daughter towns, Dor and its daughter towns[b]. In these lived the sons of Joseph son of Israel.
  footnotes:
  - marker: a
    text: Or 'villages' for 'daughter towns'; the Hebrew literally says 'daughters,' a common expression for dependent settlements around a main city.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the side of the sons of Manasseh'; the Hebrew idiom can be rendered more literally, but here it refers to territorial adjacency or border.
    reason: lexical_alternative
