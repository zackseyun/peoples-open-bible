translation:
  language: es
  text: Entonces el rey Nabucodonosor envió a reunir a los sátrapas, a los prefectos y a los gobernadores, a los consejeros, a los tesoreros, a los jueces, a los magistrados y a todos los oficiales de las provincias, para que vinieran a la dedicación de la imagen[a] que el rey Nabucodonosor había erigido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la estatua". El término arameo puede referirse a una imagen en general o, en este contexto, a una estatua monumental.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió a llamar
  lexicon: HALOT
  rationale: El verbo expresa envío. En español, 'envió' conserva con precisión la acción sin añadir un matiz no requerido; la finalidad administrativa de la frase siguiente ya comunica el propósito del envío.
- source_word: לְמִכְנַשׁ
  english_pob_choice: to assemble
  chosen_spanish: a reunir
  alternatives_spanish:
  - para congregar
  - para convocar
  lexicon: HALOT
  rationale: El infinitivo indica reunir personas. 'A reunir' funciona naturalmente en la construcción española con 'envió a...' y mantiene el sentido de convocación oficial.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: satrapas
  alternatives_spanish:
  - sátrapas
  - gobernadores provinciales
  lexicon: HALOT
  rationale: Se conserva el término histórico persa para no aplanar el contexto imperial. En español, la forma común es 'sátrapas'; sin tilde se ajusta a la práctica tipográfica del texto si se decide castellanizar el plural como préstamo histórico.
- source_word: סִגְנַיָּא
  english_pob_choice: prefects
  chosen_spanish: prefectos
  alternatives_spanish:
  - subprefectos
  - funcionarios
  lexicon: HALOT
  rationale: '''Prefectos'' es un equivalente formal y claro para el cargo administrativo. Mantiene el registro oficial del listado.'
- source_word: פַחֲוָתָא
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernadores provinciales
  - autoridades
  lexicon: HALOT
  rationale: '''Gobernadores'' es el equivalente español más natural y distinguible dentro de la serie de cargos.'
- source_word: אֲדַרְגָּזְרַיָּא
  english_pob_choice: counselors
  chosen_spanish: consejeros
  alternatives_spanish:
  - asesores
  - consultores
  lexicon: HALOT
  rationale: El término designa oficiales de función consultiva; 'consejeros' comunica bien esa función sin forzar precisión donde el título exacto es incierto.
- source_word: גְדָבְרַיָּא
  english_pob_choice: treasurers
  chosen_spanish: tesoreros
  alternatives_spanish:
  - administradores del tesoro
  - financieros
  lexicon: HALOT
  rationale: '''Tesoreros'' es el equivalente directo y reconocido para funcionarios del tesoro.'
- source_word: דְּתָבְרַיָּא
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - funcionarios judiciales
  lexicon: HALOT
  rationale: El cargo remite a autoridades jurídicas; 'jueces' es el equivalente directo y transparente.
- source_word: תִּפְתָּיֵא
  english_pob_choice: magistrates
  chosen_spanish: magistrados
  alternatives_spanish:
  - funcionarios
  - juristas
  lexicon: HALOT
  rationale: Dado que el matiz exacto es debatido, 'magistrados' conserva el tono oficial/judicial del listado y se distingue de 'jueces' sin perder claridad.
- source_word: שִׁלְטֹנֵי מְדִינָתָא
  english_pob_choice: the officials of the provinces
  chosen_spanish: todos los oficiales de las provincias
  alternatives_spanish:
  - todos los gobernantes de las provincias
  - todas las autoridades de las provincias
  lexicon: HALOT
  rationale: La frase resume el conjunto de autoridades provinciales. 'Oficiales' mantiene amplitud semántica y encaja con la serie previa de cargos.
- source_word: לְמֵתֵא
  english_pob_choice: to come
  chosen_spanish: para que vinieran
  alternatives_spanish:
  - para venir
  - a venir
  lexicon: HALOT
  rationale: En español, una subordinada final con subjuntivo es más natural que un infinitivo puro en este contexto de convocatoria formal.
- source_word: חֲנֻכַּת
  english_pob_choice: the dedication
  chosen_spanish: la dedicación
  alternatives_spanish:
  - la inauguración
  - la consagración
  lexicon: HALOT
  rationale: '''Dedicación'' es la forma estándar y transparente para el acto ceremonial descrito por el sustantivo arameo.'
- source_word: צַלְמָא
  english_pob_choice: the image
  chosen_spanish: la imagen
  alternatives_spanish:
  - la estatua
  lexicon: HALOT
  rationale: Se mantiene 'imagen' para conservar la amplitud lexical del arameo y seguir la decisión documentada en inglés; 'estatua' sería una concreción posible pero más restrictiva.
- source_word: הֲקֵים
  english_pob_choice: had set up
  chosen_spanish: había erigido
  alternatives_spanish:
  - había levantado
  - había puesto
  lexicon: HALOT
  rationale: '''Había erigido'' reproduce la idea de levantar/colocar una gran imagen con un verbo español digno y preciso. Retiene el valor de acción previa consumada respecto de la convocatoria.'
- source_word: מַלְכָּא
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El título se expresa naturalmente como 'el rey' en español; la duplicación con el nombre propio queda bien en aposición con el artículo.
translation_notes:
  revision_awareness: El texto español sigue el trazado léxico del audit trail inglés y el hebreo arameo, preservando la secuencia de cargos administrativos y la relación temporal de la acción verbal; no se requieren revisiones adicionales según el resumen de concordancia alta.
  spanish_consistency_notes:
  - Se mantiene 'imagen' en lugar de 'estatua' para respetar la amplitud del término arameo y la decisión auditada en inglés.
  - La serie de cargos se ha vertido con equivalentes españoles transparentes y de registro formal.
  - Se usó 'para que vinieran' para expresar la finalidad del envío de manera natural en español, sin alterar el valor convocatorio del infinitivo arameo.
