  to: 'David no dejó con vida ni a hombre ni a mujer, para que nadie fuera llevado a Gat, diciendo: «No sea que informen sobre nosotros, diciendo: “Esto hizo David, y así fue su costumbre[a] todos los días que habitó en el territorio de los filisteos[b]”».'
  rationale: Se ajusta la cláusula de propósito para reflejar mejor el hebreo sin explicitar innecesariamente el objeto ('para que nadie fuera llevado a Gat'), se suaviza 'acerca de' a 'sobre' para mayor naturalidad, y se normaliza la puntuación de las citas. El resto del texto y las notas conservan bien el sentido y la justificación léxica del POB.
