translation:
  language: es
  text: Extenderé mi red sobre él, y será atrapado en mi trampa; luego lo llevaré a Babilonia, y allí entraré en juicio con él[a] por su traición[b], con la cual actuó traidoramente contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «allí lo juzgaré». El hebreo permite una formulación más breve, pero la redacción principal conserva el matiz jurídico de entrar en juicio con él.'
    reason: lexical_alternative
  - marker: b
    text: «Traición» también puede verterse «infidelidad» o «quebrantamiento de fe». El hebreo subraya una violación de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָרַשְׂתִּי
  english_pob_choice: I will spread
  chosen_spanish: Extenderé
  alternatives_spanish:
  - Tenderé
  - Extenderé hacia afuera
  lexicon: HALOT
  rationale: פָרַשׂ expresa la acción de extender o desplegar; en español, 'extender' conserva la imagen de desplegar una red sin sonar mecánico.
- source_word: רִשְׁתִּי
  english_pob_choice: my net
  chosen_spanish: mi red
  alternatives_spanish:
  - mi malla
  - mi red de caza
  lexicon: HALOT
  rationale: רֶשֶׁת es la red de captura. 'Red' es la equivalencia natural y transparente en español, manteniendo la imagen de atrapamiento.
- source_word: וְנִתְפַּשׂ
  english_pob_choice: he will be caught
  chosen_spanish: será atrapado
  alternatives_spanish:
  - será capturado
  - caerá
  lexicon: HALOT
  rationale: 'El nifal tiene sentido pasivo: el sujeto cae en la trampa. ''Será atrapado'' corresponde bien al campo semántico de la red y evita una resonancia militar innecesaria.'
- source_word: בִּמְצוּדָתִי
  english_pob_choice: in my snare
  chosen_spanish: en mi trampa
  alternatives_spanish:
  - en mi lazo
  - en mi snare
  lexicon: HALOT
  rationale: מְצוּדָה aquí se entiende por el paralelismo como instrumento de caza/captura. 'Trampa' es claro en español; 'snare' no es natural en español moderno.
- source_word: וַהֲבִיאוֹתִיהוּ
  english_pob_choice: then I will bring him
  chosen_spanish: luego lo llevaré
  alternatives_spanish:
  - y lo traeré
  - entonces lo haré venir
  lexicon: HALOT
  rationale: La forma narrativa con vav consecutiva se expresa de modo natural con 'luego'. 'Llevaré' comunica el traslado hacia Babilonia con fluidez en español.
- source_word: בָבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Babilonia; en español estándar se expresa como 'a Babilonia'.
- source_word: וְנִשְׁפַּטְתִּי אִתּוֹ שָׁם
  english_pob_choice: there I will enter into judgment with him
  chosen_spanish: allí entraré en juicio con él
  alternatives_spanish:
  - allí lo juzgaré
  - allí contenderé con él en juicio
  lexicon: HALOT
  rationale: '''Entrar en juicio con'' preserva la fuerza jurídica y relacional del hebreo sin reducirlo a un simple veredicto.'
- source_word: מַעֲל֖וֹ
  english_pob_choice: his treachery
  chosen_spanish: su traición
  alternatives_spanish:
  - su infidelidad
  - su quebrantamiento de fe
  lexicon: HALOT
  rationale: מַעַל implica quebranto de fidelidad, especialmente en clave de pacto; 'traición' transmite bien la gravedad del acto en español actual.
- source_word: אֲשֶׁר מָעַל בִּי
  english_pob_choice: by which he acted treacherously against me
  chosen_spanish: con la cual se portó traidoramente contra mí
  alternatives_spanish:
  - en la cual me fue infiel
  - por la cual cometió traición contra mí
  lexicon: HALOT
  rationale: La repetición verbal intensifica el mismo campo semántico. 'Se portó traidoramente contra mí' mantiene la cercanía al hebreo y la acusación directa.
theological_decisions:
- issue: Naturaleza del pecado expresado por מַעַל / מָעַל
  english_pob_reading: treachery / acted treacherously against me
  chosen_spanish_reading: traición / se portó traidoramente contra mí
  alternative_spanish_readings:
  - infidelidad / me fue infiel
  - quebrantamiento de fe / quebrantó su fe conmigo
  rationale: El contexto combina rebelión política y violación de juramento con Dios como testigo y juez. 'Traición' preserva esa gravedad sin convertir el término en una categoría exclusivamente ritual o meramente política.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Wording of וְנִשְׁפַּטְתִּי אִתּוֹ
  english_pob_reading: I will enter into judgment with him
  chosen_spanish_reading: entraré en juicio con él
  alternative_spanish_readings:
  - lo juzgaré allí
  - contenderé con él en juicio
  rationale: La construcción hebrea sugiere una confrontación judicial formal, no solo una sentencia. 'Entraré en juicio con él' conserva el tono legal-covenantal destacado por el audit trail.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El registro auditado en inglés muestra acuerdo alto y ninguna revisión aplicada en la última pasada; por ello, la redacción española sigue de cerca las decisiones léxicas y teológicas ya estabilizadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el hebreo lo exige explícitamente; en este versículo no aparece el nombre divino, así que no se introduce.
  - Se conserva el paralelismo red/atrapado/trampa para reflejar el campo de caza del hebreo.
  - '''Entrar en juicio'' preserva la dimensión jurídica que el audit trail considera importante.'
  - '''Traición'' se usa de forma consistente para מַעַל, evitando suavizar el término a mera ''infidelidad'' sin necesidad contextual.'
