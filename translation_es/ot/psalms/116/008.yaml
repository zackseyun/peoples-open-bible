translation:
  language: es
  text: Porque has librado mi alma de la muerte[a], mis ojos del llanto, mis pies de tropezar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vida» para נֶפֶשׁ; el hebreo nephesh puede denotar el alma, la vida o la persona misma.
    reason: lexical_alternative
  - marker: b
    text: O «mi pie de caer»; el hebreo singular puede funcionar de manera colectiva, y el sustantivo puede sugerir tropiezo o caída.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base o motivo del agradecimiento/predicación del salmo. En español, «Porque» conserva bien ese valor explicativo sin sonar forzado al inicio del verso.
- source_word: חִלַּצְתָּ
  english_pob_choice: have delivered
  chosen_spanish: has librado
  alternatives_spanish:
  - has rescatado
  - has salvado
  lexicon: HALOT
  rationale: El verbo piel de חלץ expresa sacar/liberar de peligro. «Librado» comunica con naturalidad la idea de liberación activa y preserva la fuerza verbal del hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí mismo
  lexicon: HALOT
  rationale: «Alma» mantiene el alcance antropológico de נפש sin reducirlo solo a vida biológica. Conserva además la resonancia poética del paralelo.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de morir
  - de la muerte
  lexicon: HALOT
  rationale: La expresión preposicional se traduce de modo directo. En español, «librar de la muerte» es natural y fiel al sentido de liberación del peligro mortal.
- source_word: אֶת עֵינַי מִן דִּמְעָה
  english_pob_choice: my eyes from tears
  chosen_spanish: mis ojos de las lágrimas
  alternatives_spanish:
  - mis ojos del llanto
  - mis ojos del llorar
  lexicon: HALOT
  rationale: El hebreo presenta el sintagma compacto con «mis ojos» y «lágrimas». «De las lágrimas» reproduce la imagen sin sobreexplicar la elipsis verbal que ya está implícita en la primera cláusula.
- source_word: דִּמְעָה
  english_pob_choice: tears
  chosen_spanish: las lágrimas
  alternatives_spanish:
  - el llanto
  - el llorar
  lexicon: HALOT
  rationale: El sustantivo designa lágrimas de manera directa. El plural español es la opción más natural y conserva el paralelismo poético.
- source_word: אֶת רַגְלִי מִדֶּחִי
  english_pob_choice: my feet from stumbling
  chosen_spanish: mis pies de tropezar
  alternatives_spanish:
  - mi pie de caer
  - mis pies de caer
  lexicon: HALOT
  rationale: דֶּחִי puede sugerir un tropiezo, caída o derrumbe. «Tropezar» transmite bien la idea de preservación del deslizamiento o caída sin añadir un matiz más fuerte que el del hebreo. El plural «pies» sigue el uso idiomático español, aunque el hebreo esté en singular colectivo.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: my soul
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - a mí
  rationale: Se conserva el término antropológico amplio sin reducirlo a mera supervivencia física. En un poema de liberación, «mi alma» mantiene la profundidad teológica y literaria del hebreo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor del tercer miembro del paralelismo
  english_pob_reading: my feet from stumbling
  chosen_spanish_reading: mis pies de tropezar
  alternative_spanish_readings:
  - mi pie de caer
  - mis pies de caer
  rationale: El hebreo presenta un término que puede abarcar tropiezo o caída. «Tropezar» evita exagerar hacia una caída más definitiva y preserva el patrón de rescate corporal-poético.
  doctrine_reference: Poetic parallelism; lexical context in HALOT
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene un alto acuerdo y no muestra revisiones aplicadas. La propuesta española sigue esa lectura estable, ajustando solo la naturalidad sintáctica del español sin perder la tríada de liberación: muerte, lágrimas y tropiezo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponda; este verso no lo contiene.
  - Se mantiene «alma» para נֶפֶשׁ según la decisión teológica auditada, con nota alternativa por la amplitud semántica.
  - «Tropezar» conserva el matiz de דֶּחִי sin sobrerinterpretar como caída definitiva.
  - El paralelo ternario se mantiene visible en español con tres miembros coordinados.
