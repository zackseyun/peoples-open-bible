translation:
  language: es
  text: Comer mucha miel no es bueno, y escudriñar la gloria de ellos[a] es gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y escudriñar la gloria de ellos es gloria». La segunda línea es difícil. Puede significar que buscar honra para uno mismo no es honorable, o que investigar asuntos de peso es honorable. Aquí se traduce de cerca el Texto Masorético.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָכֹל
  english_pob_choice: To eat
  chosen_spanish: comer
  alternatives_spanish:
  - comer en exceso
  - el comer
  lexicon: HALOT
  rationale: El infinitivo constructo funciona proverbialmente como sujeto; en español, el infinitivo simple 'comer' conserva bien ese valor gnómico sin sobrecargar la línea.
- source_word: דְּבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel de abeja
  lexicon: HALOT
  rationale: Sentido léxico directo y transparente. 'Miel' conserva la imagen proverbial sin añadir precisión no exigida por el texto.
- source_word: הַרְבּוֹת
  english_pob_choice: much
  chosen_spanish: mucha
  alternatives_spanish:
  - en exceso
  - demasiada
  lexicon: HALOT
  rationale: El valor adverbial/intensivo de la forma se expresa naturalmente en español con 'mucha' aplicado a 'miel' y con la evaluación negativa del conjunto.
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no es bueno para uno
  - no es sano
  lexicon: HALOT
  rationale: Se mantiene la evaluación breve y general del hebreo, sin especificar daño físico o moral más allá de lo que el proverbio afirma.
- source_word: וְחֵקֶר
  english_pob_choice: and searching out
  chosen_spanish: y escudriñar
  alternatives_spanish:
  - y buscar
  - y investigar
  lexicon: HALOT
  rationale: El sustantivo/acción de 'buscar/investigar' se vierte verbalmente para mantener el paralelismo con la primera colon y una lectura fluida en español.
- source_word: כְּבֹדָם
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - la gloria de ellos
  - su honor
  lexicon: HALOT
  rationale: El sufijo plural masculino se refleja con 'su' en sentido de tercera persona plural. 'Gloria' preserva la repetición léxica y el posible juego semántico con 'honor'.
- source_word: כָּבֽוֹד
  english_pob_choice: is glory
  chosen_spanish: es gloria
  alternatives_spanish:
  - es honor
  - es honorable
  lexicon: HALOT
  rationale: Se conserva el predicado nominal para reflejar la tersura y la repetición de כבד/כבוד en el hebreo. 'Gloria' mantiene la tensión interpretativa sin resolverla de modo interpretativo.
theological_decisions:
- issue: 'Ambigüedad de la segunda línea: si habla de buscar la gloria de otros / la propia gloria, o de investigar cosas honorables y pesadas.'
  english_pob_reading: The second line is difficult. It may mean that seeking honor for oneself is not honorable, or that investigating weighty matters is honorable. The Masoretic Text is rendered closely here.
  chosen_spanish_reading: 'La traducción sigue de cerca el Texto Masorético: ''escudriñar su gloria es gloria'', sin cerrar la ambigüedad.'
  alternative_spanish_readings:
  - buscar la propia honra no es honra
  - investigar asuntos graves es honorable
  rationale: El español debe conservar la tensión textual y no suprimir la dificultad del original. La forma elegida deja abiertas las dos lecturas principales documentadas en el audit trail inglés.
  doctrine_reference: Texto masorético; principio de conservar la ambigüedad legítima del pasaje.
translation_notes:
  revision_awareness: El texto inglés final revisó la segunda colon de 'and searching out their glory is glory' a 'and to search out their glory is glory' para mejorar la fluidez sin cambiar el sentido. La versión española sigue esa decisión con un infinitivo natural ('escudriñar') y conserva la estructura paralela del hebreo.
  spanish_consistency_notes:
  - Se usa 'gloria' de forma consistente para כבוד, evitando sustituirlo por 'honra' salvo en las alternativas de nota para mostrar la posible variación semántica.
  - Se mantiene la evaluación breve 'no es bueno' como fórmula proverbial general.
  - La nota al pie marca explícitamente la dificultad de la segunda línea, siguiendo el expediente auditado en inglés.
