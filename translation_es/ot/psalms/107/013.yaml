revisions:
- from: Entonces clamaron a Yahvé en su angustia[a]; él los salvó de sus aprietos.
  to: Entonces clamaron a Yahvé en su angustia; él los salvó de sus angustias[a].
  rationale: Se revisa el texto para anclar la nota al segmento hebreo correcto y para sustituir «aprietos» por «angustias» en el texto principal, logrando mejor registro bíblico, mayor cohesión con «en su angustia», y fidelidad al plural de מִמְּצֻקוֹתֵיהֶם. No se requiere adjudicación adicional.
