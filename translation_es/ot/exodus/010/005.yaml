    text: Literalmente, 'el ojo de la tierra', un modismo hebreo para la superficie visible de la tierra.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''el remanente de lo que escapó, lo que les quedó del granizo''.'
    reason: alternative_reading
  revision_rationale: 'Se hicieron reparaciones menores para reflejar con más precisión el hebreo y el rastro de auditoría inglés: se sustituyó el subjuntivo innecesario por indicativo (''escapó''), se ajustó ''después del granizo'' a ''del granizo'' para preservar מִן, se mantuvo una sintaxis española natural, y se rehízo la nota b para que sea fiel y legible.'
