translation:
  language: es
  text: cuando los pueblos y los reinos se congreguen juntos[a] para servir a Yahvé[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando los pueblos y los reinos sean congregados juntos»; la forma hebrea puede representarse con sentido activo o pasivo.'
    reason: lexical_alternative
  - marker: b
    text: «Servir» también puede entenderse aquí como «adorar» cuando Dios es el objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הִקָּבֵ֣ץ
  english_pob_choice: when ... gather
  chosen_spanish: cuando ... se congreguen
  alternatives_spanish:
  - cuando ... sean congregados
  - en el congregarse de
  lexicon: HALOT
  rationale: El infinitivo constructo con ב tiene valor temporal aquí. En español, una cláusula temporal con «cuando» transmite bien el sentido. «Se congreguen» conserva el matiz de reunión de personas sin forzar una pasiva innecesaria; la pasiva sigue siendo posible y se refleja en la nota.
- source_word: עַמִּ֣ים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y etnias
  lexicon: HALOT
  rationale: עַמִּים expresa grupos colectivos plurales; «los pueblos» preserva ese sentido mejor que «la gente» y evita estrecharlo a una categoría política moderna.
- source_word: יַחְדָּ֑ו
  english_pob_choice: together
  chosen_spanish: se congreguen
  alternatives_spanish:
  - juntos
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio marca reunión conjunta. En español, la idea queda naturalmente incluida en «se congreguen»; no hace falta duplicarla en la línea principal.
- source_word: וּ֝/מַמְלָכ֗וֹת
  english_pob_choice: and kingdoms
  chosen_spanish: y los reinos
  alternatives_spanish:
  - y los reinos también
  - e incluso los reinos
  lexicon: HALOT
  rationale: מַמְלָכוֹת se refiere a reinos/entidades regias. «Los reinos» mantiene el paralelismo con «los pueblos».
- source_word: לַ/עֲבֹ֥ד
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para adorar
  - para rendir servicio
  lexicon: HALOT
  rationale: עבד con objeto divino puede abarcar servicio cultual; «servir» es la equivalencia más directa y preserva la amplitud semántica. «Adorar» se deja como posibilidad contextual en nota, no como sustitución del verbo principal.
- source_word: אֶת יְהוָֽה
  english_pob_choice: Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». El objeto directo hebreo se expresa naturalmente con «a» en español. Se evita «SEÑOR» porque el proyecto pide el nombre divino explícito.'
theological_decisions:
- issue: Si עבד debe estrecharse a 'adorar' cuando el objeto es Dios
  english_pob_reading: to serve, with 'to worship' as an alternative contextual gloss
  chosen_spanish_reading: para servir
  alternative_spanish_readings:
  - para adorar
  - para rendir culto
  rationale: El verbo hebreo es más amplio que una sola práctica devocional. Mantener «servir» preserva la amplitud lexical y deja la dimensión cultual como implicación contextual, no como sustitución del verbo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La línea usa explícitamente el nombre propio divino. La política del proyecto pide «Yahvé» como forma principal en español, conservando la identidad del nombre del pacto y evitando la máscara litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés pasó por revisiones sobre la sintaxis de «peoples» y «kingdoms». Para el español, la solución adoptada mantiene ambos sujetos coordinados y evita separar «reinos» del acto de congregarse. También se conserva el carácter temporal de la construcción hebrea, con una cláusula natural en español.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: YHWH → Yahvé; עבד → servir; עמים → pueblos; ממלכות → reinos.'
  - La puntuación con coma antes de «y los reinos» refleja la coordinación del hebreo sin volver pesada la frase.
  - Se evita «adorar» en el cuerpo principal para no estrechar indebidamente el alcance de עבד.
