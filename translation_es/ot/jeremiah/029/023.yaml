  text: יַ֡עַן אֲשֶׁר֩ עָשׂ֨וּ נְבָלָ֜ה בְּ/יִשְׂרָאֵ֗ל וַ/יְנַֽאֲפוּ֙ אֶת נְשֵׁ֣י רֵֽעֵי/הֶ֔ם וַ/יְדַבְּר֨וּ דָבָ֤ר בִּ/שְׁמִ/י֙ שֶׁ֔קֶר אֲשֶׁ֖ר ל֣וֹא צִוִּיתִ֑/ם וְ/אָנֹכִ֛י הו ידע וָ/עֵ֖ד נְאֻם יְהוָֽה־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/029/023.yaml
  text: because they have committed a disgraceful act in Israel[a], and have committed adultery with their neighbors’ wives, and have spoken in my name a lie that I did not command them. And I am the one who knows and am a witness[c][b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'have done a disgraceful thing' or 'have committed folly.' The Hebrew נְבָלָה denotes a morally outrageous, disgraceful act.
