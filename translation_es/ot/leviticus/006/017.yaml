translation:
  language: es
  text: Y Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: Y ... habló
  alternatives_spanish:
  - Entonces ... habló
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce una nueva unidad narrativa y de habla. «Y ... habló» conserva la conexión narrativa sin forzar una secuencia más interpretativa como «entonces». Se prefiere «habló» sobre «dijo» para reflejar mejor el verbo דבר en esta fórmula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio «Yahvé», siguiendo el criterio del POB de preservar el nombre divino y no sustituirlo por un título. «Jehová» y «el SEÑOR» no se adoptan aquí por no corresponder al marco terminológico del proyecto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el receptor del discurso. En español natural y fiel al valor de dirección, «a» es la equivalencia más adecuada en esta fórmula.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshe
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio, «Moisés», por inteligibilidad y uso bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: En fórmulas de introducción al discurso, לֵאמֹר se expresa de manera natural como «diciendo», conservando la estructura formal del hebreo sin volverla áspera en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Nombre divino, no un título. En español se mantiene como «Yahvé» para preservar la referencia al nombre de pacto y evitar la sustitución tradicional por un equivalente funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requirieron cambios respecto al pasaje fuente; se conserva la fórmula narrativa simple y el tratamiento del Nombre divino conforme al POB.'
  spanish_consistency_notes:
  - 'Se mantiene el orden natural del español para la fórmula de apertura: sujeto divino + verbo + destinatario + participio introductorio.'
  - Se usa la tilde diacrítica de uso común en «Yahvé» dentro del español bíblico contemporáneo del proyecto.
  - La nota al pie marca la alternativa tradicional sin sustituirla en el texto principal.
