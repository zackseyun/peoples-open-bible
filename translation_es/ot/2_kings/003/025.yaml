base_translation:
  language: en
  yaml_path: translation/ot/2_kings/003/025.yaml
  text: They demolished the cities[a], and on every good piece of land each man threw his stone and filled it. They stopped up every spring of water and felled every good tree, until only its stones were left in Kir-hareseth[d][c][b]; then the slingers surrounded it and struck it.
  footnotes:
  - marker: a
    text: Or 'every good field.' The Hebrew חֶלְקָה refers to a parcel or portion of land.
    reason: lexical_alternative
  - marker: b
    text: Literally 'every good tree'; this may refer more specifically to valuable or productive trees.
    reason: lexical_alternative
  - marker: c
    text: Kir-hareseth is a place name, likely the principal fortified city of Moab in this context.
    reason: cultural_note
  - marker: d
    text: Or 'struck it.' The Hebrew verb is literally 'hit/strike,' here used for military assault on the city.
    reason: lexical_alternative
