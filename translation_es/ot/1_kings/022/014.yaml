translation:
  language: es
  text: 'Y dijo Micaías[a]: «Tan cierto como que Yahvé vive, todo lo que Yahvé me diga, eso diré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Vive Yahvé». Se expresa como «Tan cierto como que Yahvé vive» para comunicar de forma natural en español la fórmula solemne de juramento, conservando además el nombre divino «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y respondió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce discurso directo; en español, «Y dijo» conserva la secuencia narrativa sin añadir una relación temporal más fuerte que la del hebreo.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  - Micaiahu
  lexicon: Convención bíblica española / transliteración del nombre propio
  rationale: Se usa una transliteración española naturalizada del nombre propio, manteniendo la referencia al profeta sin mecanizar la forma hebrea.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Vive Yahvé el cual
  - Por la vida de Yahvé
  - Tan cierto como que Yahvé vive
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento solemne; «Vive Yahvé» conserva su fuerza idiomática en español. Se mantiene «Yahvé» según la norma del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme a la terminología del proyecto, preservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: כִּי אֶת אֲשֶׁר
  english_pob_choice: whatever
  chosen_spanish: que todo lo que
  alternatives_spanish:
  - que aquello que
  - cuanto
  - lo que
  lexicon: HALOT
  rationale: La construcción relativa funciona como contenido del juramento. «Que todo lo que» expresa con naturalidad en español el valor de «whatever» sin perder el alcance totalizador del hebreo.
- source_word: יֹאמַר
  english_pob_choice: says
  chosen_spanish: me diga
  alternatives_spanish:
  - me dirá
  - hable
  lexicon: HALOT
  rationale: El imperfecto hebreo es contextualmente futuro respecto al juramento. En español, «me diga» reproduce bien la subordinación y la orientación prospectiva del dicho divino.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El complemento indirecto en español transmite de forma natural la dirección del habla hacia el profeta.
- source_word: אֹתוֹ
  english_pob_choice: that
  chosen_spanish: eso
  alternatives_spanish:
  - lo
  - aquello
  lexicon: HALOT
  rationale: El pronombre resumptivo apunta a lo dicho por Yahvé; en español, «eso» evita una construcción forzada y mantiene la referencia deíctica al contenido previamente mencionado.
- source_word: אֲדַבֵּר
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - lo hablaré
  lexicon: HALOT
  rationale: «Hablaré» conserva el verbo de habla general y su solemnidad profética; en español suena más natural que una calca más literal y mantiene el paralelismo con el contenido del juramento.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה en un juramento profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo emplea el nombre propio del pacto, no un título. La forma española del proyecto es «Yahvé», que preserva esa identidad divina y evita el sustituto litúrgico tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se revisó el patrón anterior en inglés y se mantuvo la lectura estable: juramento solemne, nombre divino explícito y estructura de contenido indirecto sin añadir explicaciones no presentes en el hebreo. No se detectaron cambios de revisión aplicados en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - La puntuación de cita directa sigue el español moderno con dos puntos de apertura implícita en el discurso y comillas latinas.
  - «Micaías» se emplea como forma española legible del nombre del profeta.
  - La secuencia «que todo lo que... eso hablaré» busca reflejar el énfasis totalizador del hebreo sin volverla demasiado rígida.
