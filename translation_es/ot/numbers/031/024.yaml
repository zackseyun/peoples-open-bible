revisions:
- from: Lavarán sus vestidos el séptimo día[a], y estarán limpios[b]; después podrán entrar en el campamento.
  to: Lavarán sus vestidos el séptimo día, y quedarán limpios[a]; después podrán entrar en el campamento[b].
  rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras adecuadas del texto fuente y del historial de auditoría inglés. Además, se ajusta 'estarán limpios' a 'quedarán limpios' para reflejar mejor el valor resultativo de וּטְהַרְתֶּם en contexto de pureza ritual, sin cambiar el sentido general ni el tono del borrador.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: lavar la ropa en el séptimo día, quedar ritualmente limpio, y luego poder reingresar al campamento. También conserva correctamente la fuerza permisiva contextual de תָבֹאוּ como permiso de entrada. Sin embargo, la colocación de las notas al pie está invertida respecto de las alternativas documentadas en el inglés POB: la nota [a] debe anclarse en ''estarán limpios'' / ''quedarán limpios'' para la alternativa ''serán purificados'', y la nota [b] debe anclarse en la cláusula de entrada al campamento para la alternativa ''podrán entrar...'''
  spanish_quality_summary: El español es claro, natural y digno. 'Campamento' y 'después' funcionan bien. No obstante, 'Lavarán sus vestidos' suena algo menos directo que el hebreo; 'Laven su ropa' sería más imperativo pero implicaría un cambio mayor de modo. Como reparación mínima, conviene mantener la estructura general y corregir las notas. También 'quedarán limpios' refleja mejor el matiz resultativo de וּטְהַרְתֶּם que 'estarán limpios'.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La decisión de pureza ritual está bien encaminada; conviene mantener lenguaje de estado ('quedarán limpios') en lugar de una formulación demasiado procesual o moralizante.
  issues:
  - severity: medium
    issue: Las notas al pie [a] y [b] están ancladas en lugares equivocados.
    rationale: En el POB inglés, la alternativa 'you shall be purified' corresponde a וּטְהַרְתֶּם, mientras que la alternativa 'you may enter the camp' corresponde a תָבֹאוּ אֶל הַמַּחֲנֶה. En el borrador español, [a] se puso tras 'el séptimo día' y [b] tras 'estarán limpios', lo que desalinea texto y nota.
  - severity: low
    issue: '''Estarán limpios'' es aceptable, pero ''quedarán limpios'' expresa mejor el valor resultativo del hebreo.'
    rationale: וּטְהַרְתֶּם describe el estado que resulta después del lavado prescrito. 'Quedarán limpios' en español transmite con más precisión ese resultado ritual sin sugerir agencia reflexiva ni una simple descripción estática.
  revised_spanish_text: Lavarán sus vestidos el séptimo día, y quedarán limpios[a]; después podrán entrar en el campamento[b].
  revised_footnotes:
  - marker: a
    text: 'O: "serán purificados". El hebreo puede expresar el quedar ritualmente limpios después del lavado prescrito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "podrán entrar en el campamento". El sentido es que se permite volver a entrar una vez completada la limpieza.'
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras adecuadas del texto fuente y del historial de auditoría inglés. Además, se ajusta 'estarán limpios' a 'quedarán limpios' para reflejar mejor el valor resultativo de וּטְהַרְתֶּם en contexto de pureza ritual, sin cambiar el sentido general ni el tono del borrador.
