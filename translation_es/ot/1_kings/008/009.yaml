base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/009.yaml
  text: There was nothing in the ark except the two stone tablets that Moses had placed there at Horeb[c][b][a], where Yahweh made a covenant with the sons of Israel when they came out from the land of Egypt.
  footnotes:
