revisions:
- from: Así que fue, tomó y se lo llevó a su madre[a]; y su madre preparó comida sabrosa, tal como su padre la amaba.
  to: Entonces fue, los tomó y los llevó a su madre; y su madre preparó comida sabrosa[a], tal como le gustaba a su padre.
  rationale: Se ajusta la redacción para reflejar mejor el movimiento verbal de וַיָּבֵא, restaurar el objeto implícito plural ya presente en el contexto, usar un giro idiomático español para la preferencia culinaria de Isaac, y colocar la nota léxica sobre la expresión que realmente comenta.
