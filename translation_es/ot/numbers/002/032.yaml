translation:
  language: es
  text: Estos son los hombres contados[a] de los hijos de Israel[b], por sus casas paternas[c]. Todos los hombres contados de los campamentos, por sus divisiones[d], fueron seiscientos tres mil quinientos cincuenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los contados» o «hombres registrados» para «hombres contados».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: O «según sus casas ancestrales» o «por sus casas familiares» para «por sus casas paternas».
    reason: lexical_alternative
  - marker: d
    text: O «según sus compañías» o «según sus ejércitos» para «por sus divisiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקוּדֵי
  english_pob_choice: numbered men
  chosen_spanish: hombres contados
  alternatives_spanish:
  - los contados
  - hombres registrados
  - hombres alistados
  lexicon: HALOT
  rationale: En el contexto del censo de Números, el participio nominal se refiere a quienes fueron contados/enrolados. «Hombres contados» conserva la fuerza concreta del censo sin introducir un matiz militar más fuerte de lo que exige el hebreo aquí.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión filial del hebreo, que en este contexto censal y covenantal es más cercana al texto que una forma generalizada como «israelitas».
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por sus casas paternas
  alternatives_spanish:
  - según sus casas ancestrales
  - por sus casas familiares
  lexicon: HALOT
  rationale: «Casas paternas» refleja la estructura patrilineal del hebreo y conserva el término técnico de genealogía/censo mejor que una paráfrasis más general.
- source_word: הַמַּחֲנֹת
  english_pob_choice: the camps
  chosen_spanish: los campamentos
  alternatives_spanish:
  - los campamentos militares
  - los campamentos de batalla
  lexicon: HALOT
  rationale: «Campamentos» expresa naturalmente la disposición tribal alrededor del tabernáculo. Evita sobrecargar el sentido con guerra activa, que no es el punto principal del verso.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus compañías
  - según sus ejércitos
  - por sus tropas
  lexicon: HALOT
  rationale: «Divisiones» comunica el orden organizado de los grupos sin forzar el sentido hacia «ejércitos», aunque esa sea una posibilidad léxica del sustantivo.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף וּשְׁלֹשֶׁת אֲלָפִים וַחֲמֵשׁ מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: six hundred three thousand five hundred fifty
  chosen_spanish: seiscientos tres mil quinientos cincuenta
  alternatives_spanish:
  - 603,550
  lexicon: HALOT
  rationale: Se vierte el número en palabras para mantener el tono solemne y formal del resumen censal, como en el POB inglés.
theological_decisions:
- issue: Referencia de género en el censo
  english_pob_reading: Rendered as 'men' in keeping with the census context, even though the nominal Hebrew form itself is not a separate lexical word for 'men'.
  chosen_spanish_reading: «hombres contados»
  alternative_spanish_readings:
  - «los contados»
  - «los registrados»
  rationale: El contexto inmediato de Números 1–2 delimita a los censados como varones aptos para el servicio militar. «Hombres» mantiene esa precisión sin neutralizar el referente humano masculino que el inglés POB también hizo explícito.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y coincide con el juicio de alta concordancia del POB inglés; no se registran revisiones aplicadas en la fuente auditada.
  spanish_consistency_notes:
  - Se conserva «hijos de Israel» como fórmula bíblica formal en lugar de normalizarla a «israelitas».
  - «Casas paternas» mantiene el lenguaje genealógico técnico y puede reutilizarse de forma consistente en otras listas censales.
  - «Divisiones» evita oscilar entre traducciones militares más fuertes cuando el contexto es organizativo/censal.
