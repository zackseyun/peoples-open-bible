translation:
  language: es
  text: Y después de ellos[a], de todas las tribus de Israel, los que habían dispuesto su corazón para buscar a Yahvé, el Dios de Israel, vinieron a Jerusalén para sacrificar a Yahvé[b], el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''los que daban su corazón''; el modismo significa disponer o dedicar el corazón para buscar a Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: O 'fueron a Jerusalén'. El hebreo usa un verbo que puede significar 'venir' o 'ir' según el punto de vista narrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵיהֶם
  english_pob_choice: And after them
  chosen_spanish: Y después de ellos
  alternatives_spanish:
  - Después de ellos
  - Y tras ellos
  lexicon: HALOT
  rationale: Conserva la secuencia temporal y el valor conjuntivo de וְ. 'Y después de ellos' refleja el encadenamiento narrativo sin añadir interpretación.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de todos los tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  - de entre todas las tribus de Israel
  lexicon: HALOT
  rationale: Mantiene la idea de procedencia/composición total. Se usa 'tribus' con lectura colectiva; el hebreo marca origen desde la totalidad de Israel.
- source_word: הַנֹּתְנִים אֶת לְבָבָם
  english_pob_choice: those who set their hearts
  chosen_spanish: los que ponían su corazón
  alternatives_spanish:
  - los que daban su corazón
  - los que entregaban su corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'los que daban su corazón'. En español, 'poner el corazón en' expresa con naturalidad la orientación intencional de la voluntad sin perder la fuerza idiomática.
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek
  chosen_spanish: en buscar
  alternatives_spanish:
  - para buscar
  - a buscar
  lexicon: HALOT
  rationale: En este contexto cultual, בקש implica buscar a Dios. Se integra con 'poner el corazón en' para conservar la finalidad del infinitivo sin volver la frase rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino como nombre propio y no como sustitución titulada.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sintagma constructo, conservando el vínculo de pacto con Israel.
- source_word: בָּאוּ יְרוּשָׁלִַם
  english_pob_choice: came to Jerusalem
  chosen_spanish: fueron a Jerusalén
  alternatives_spanish:
  - vinieron a Jerusalén
  - llegaron a Jerusalén
  lexicon: HALOT
  rationale: En español, 'fueron a' comunica el desplazamiento de manera natural. Aunque el hebreo usa בוא ('venir/ir' según el punto de vista), aquí la referencia narrativa hace aceptable esta solución sin alterar el sentido.
- source_word: לִזְבּוֹחַ
  english_pob_choice: to sacrifice
  chosen_spanish: para sacrificar
  alternatives_spanish:
  - para ofrecer sacrificios
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. 'Para sacrificar' es breve y fiel al valor verbal del hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Mantiene la referencia al nombre divino en la meta del sacrificio; 'a' expresa adecuadamente el destinatario del acto sacrificial en español.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: Se preserva la fórmula de pacto con 'padres', como en el hebreo y la POB inglesa, evitando neutralizarla a 'antepasados' sin necesidad contextual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La decisión principal del texto fuente es no enmascarar el Nombre con un título. 'Yahvé' es la forma española estable del nombre propio divino en esta tradición editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula de pacto 'el Dios de sus padres'
  english_pob_reading: the God of their fathers
  chosen_spanish_reading: el Dios de sus padres
  alternative_spanish_readings:
  - el Dios de sus antepasados
  rationale: Se conserva la expresión heredada y covenantal del hebreo, sin suavizarla a una forma más neutra que perdería resonancia bíblica y precisión lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta mantiene ese estado de alta concordancia y conserva las decisiones principales del auditorio inglés, adaptándolas al español con naturalidad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrámaton.
  - Se conserva 'el Dios de Israel' y 'el Dios de sus padres' como fórmulas de pacto.
  - El sentido de búsqueda intencional se refleja con 'ponían su corazón en buscar'.
  - Las notas mantienen las alternativas semánticas relevantes del hebreo sin sobreexplicar.
