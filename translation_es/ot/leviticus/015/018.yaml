    issue: 'Forma verbal española incorrecta: ''lavaránse'''
    rationale: En español estándar moderno la colocación correcta es 'se lavarán'. La forma actual afecta la naturalidad y la calidad editorial del texto.
  - severity: medium
    issue: '''Hasta el atardecer'' es menos preciso que el patrón levítico habitual para עַד הָעָרֶב'
    rationale: El hebreo dice literalmente 'hasta la tarde/el anochecer/evening'. 'Atardecer' apunta más específicamente al momento del ocaso; 'hasta la tarde' preserva mejor la formulación repetida en leyes de pureza y coincide más de cerca con el audit trail inglés.
  - severity: low
