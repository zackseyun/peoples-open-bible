id: JOS.20.5
reference: Joshua 20:5
source:
  edition: WLC
  text: וְ/כִ֨י יִרְדֹּ֜ף גֹּאֵ֤ל הַ/דָּם֙ אַֽחֲרָ֔י/ו וְ/לֹֽא יַסְגִּ֥רוּ אֶת הָ/רֹצֵ֖חַ בְּ/יָד֑/וֹ כִּ֤י בִ/בְלִי דַ֨עַת֙ הִכָּ֣ה אֶת רֵעֵ֔/הוּ וְ/לֹֽא שֹׂנֵ֥א ה֛וּא ל֖/וֹ מִ/תְּמ֥וֹל שִׁלְשֽׁוֹם־־־־־׃
translation:
  text: And if the avenger of blood pursues him[a], they shall not hand the manslayer over into his hand, because he struck his neighbor without intent and had not hated him before, from yesterday or the day before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from yesterday and the day before,' a Hebrew idiom meaning 'previously' or 'formerly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - But if
  - Now if
  - And when
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a contingent case within the legal procedure. 'And if' preserves the flow from the previous verse while keeping the conditional sense.
- source_word: יִרְדֹּף
  chosen: pursues
  alternatives:
  - chases
  - pursue
  lexicon: HALOT
  rationale: The imperfect verb in this legal setting expresses a possible future action. 'Pursues' is natural modern English and fits the scenario of the blood avenger seeking the killer.
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood avenger
  - the redeemer of blood
  lexicon: HALOT
  rationale: This is the established legal term in the cities-of-refuge context for the family representative who avenges unlawful bloodshed. 'Avenger of blood' is transparent and accurate; 'redeemer of blood' is too wooden in English here.
- source_word: אַחֲרָיו
  chosen: him
  alternatives:
  - after him
  lexicon: HALOT
  rationale: English idiom normally says 'pursues him' rather than 'pursues after him.' The object pronoun is preserved in natural English.
- source_word: וְלֹא יַסְגִּרוּ
  chosen: they shall not hand ... over
  alternatives:
  - they shall not deliver
  - they must not surrender
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to give someone up into another's power. 'Hand over' is idiomatic and preserves the legal force. 'They' refers to the city's authorities/elders from the context.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  - the murderer
  lexicon: HALOT
  rationale: In this context the person is specifically one who has killed and fled to a refuge city, not necessarily a murderer in the culpable sense. 'Manslayer' preserves the legal distinction better than 'murderer' and is more precise than the generic 'killer'.
- source_word: בְּיָדוֹ
  chosen: into his hand
  alternatives:
  - to him
  - into his power
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'into his hand,' expressing transfer into the avenger's power. Retaining 'into his hand' keeps the legal vividness while remaining understandable.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: This clause gives the reason the manslayer must not be surrendered. 'Because' is clearer in contemporary English than 'for'.
- source_word: בִּבְלִי דַעַת
  chosen: without intent
  alternatives:
  - without knowledge
  - unintentionally
  - without awareness
  lexicon: HALOT
  rationale: The phrase denotes lack of knowing/intentionality in the act. 'Without intent' communicates the legal sense of accidental killing in clear English. 'Without knowledge' is more literal but less idiomatic in this context.
- source_word: הִכָּה
  chosen: struck
  alternatives:
  - hit
  - killed
  lexicon: HALOT
  rationale: The verb itself means 'struck'; the death outcome is supplied by the broader context, not by this verb alone. Keeping 'struck' avoids overtranslating while still fitting the legal narrative.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - the other man
  - his fellow
  lexicon: HALOT
  rationale: '''Neighbor'' is a standard and understandable rendering of רֵעַ. It preserves the interpersonal sense without implying mere geographic proximity.'
- source_word: וְלֹא שֹׂנֵא הוּא לוֹ
  chosen: and had not hated him
  alternatives:
  - and he was not hating him
  - and he was not his enemy
  lexicon: HALOT
  rationale: The clause explains absence of prior malice. English past perfect ('had not hated') fits the retrospective legal explanation better than a more wooden present-progressive form.
- source_word: מִתְּמוֹל שִׁלְשׁוֹם
  chosen: previously
  alternatives:
  - from yesterday and the day before
  - formerly
  - beforetime
  lexicon: HALOT
  rationale: The idiom literally means 'from yesterday, three days ago,' i.e., previously/in the recent past, and functions as an idiom for prior time. 'Previously' communicates the sense naturally; the more literal form can be preserved in a footnote.
