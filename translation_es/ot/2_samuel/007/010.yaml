translation:
  language: es
  text: Y pondré un lugar para mi pueblo Israel, y lo plantaré, para que habite en su propio lugar y ya no sea perturbado. Los hijos de maldad[a] no volverán a afligirlo, como antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los malvados» o «los hombres malvados». Hebreo: «hijos de maldad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: I will appoint
  chosen_spanish: pondré
  alternatives_spanish:
  - estableceré
  - asignaré
  lexicon: HALOT
  rationale: En este contexto de promesa divina con objeto 'lugar', el valor es el de disponer o asignar un sitio para el pueblo. 'Pondré' conserva el sentido básico de שׂוּם y suena natural en español sin perder la iniciativa divina.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - una morada
  lexicon: HALOT
  rationale: '''Lugar'' reproduce el sentido amplio y no sobreinterpreta como una patria o territorio técnico. ''Morada'' sería más interpretativo.'
- source_word: לְעַמִּי לְיִשְׂרָאֵל
  english_pob_choice: for my people Israel
  chosen_spanish: para mi pueblo Israel
  alternatives_spanish:
  - para mi pueblo, para Israel
  - para Israel, mi pueblo
  lexicon: HALOT
  rationale: 'La frase es appositiva: ''mi pueblo'' y ''Israel'' se explican mutuamente. Mantener ambas expresiones preserva el vínculo pactual y la identidad nacional.'
- source_word: וּנְטַעְתִּי/ו
  english_pob_choice: and plant them
  chosen_spanish: lo plantaré
  alternatives_spanish:
  - los plantaré
  - lo estableceré
  lexicon: HALOT
  rationale: El verbo נטע conserva la metáfora de plantación para hablar de establecimiento seguro. En español, con el referente colectivo 'Israel', el singular 'lo' mantiene la colectividad como entidad nacional y evita una pluralización no presente en la forma hebrea.
- source_word: וְשָׁכַן תַּחְתָּיו
  english_pob_choice: so that they may dwell in their own place
  chosen_spanish: para que habite en su propio lugar
  alternatives_spanish:
  - para que more en su lugar
  - para que habite allí
  lexicon: HALOT
  rationale: תַּחַת en contexto de asentamiento puede significar 'en su lugar' o 'en el lugar que le corresponde'. 'Su propio lugar' expresa la idea de instalación segura sin introducir una imagen de subordinación espacial.
- source_word: יִרְגַּז
  english_pob_choice: be disturbed
  chosen_spanish: sea perturbado
  alternatives_spanish:
  - sea sacudido
  - se agite
  lexicon: HALOT
  rationale: רגז aquí se refiere a quedar inquieto, sacudido o amenazado por inestabilidad externa. 'Perturbado' comunica bien esa noción en español contemporáneo.
- source_word: יֹסִיפוּ
  english_pob_choice: shall no longer
  chosen_spanish: no volverán a
  alternatives_spanish:
  - ya no seguirán
  - no continuarán
  lexicon: HALOT
  rationale: Con negación, יסף expresa la cesación de una acción repetida. 'No volverán a' transmite de modo natural la idea de no repetir ni continuar la opresión.
- source_word: בְנֵי עַוְלָה
  english_pob_choice: the sons of wickedness
  chosen_spanish: los hijos de maldad
  alternatives_spanish:
  - los hijos de perversidad
  - los malvados
  lexicon: HALOT
  rationale: Se conserva la estructura idiomática 'hijos de...' para no borrar la fuerza semítica de la expresión. 'Maldad' comunica el carácter moral negativo del grupo.
- source_word: לְעַנּוֹתוֹ
  english_pob_choice: afflict them
  chosen_spanish: afligirlo
  alternatives_spanish:
  - oprimirlo
  - humillarlo
  lexicon: HALOT
  rationale: ענה en piel puede abarcar afligir, oprimir o humillar. 'Afligir' mantiene amplitud semántica y encaja con el contexto de hostigamiento.
- source_word: כַּאֲשֶׁר בָּרִאשׁוֹנָה
  english_pob_choice: as formerly
  chosen_spanish: como antes
  alternatives_spanish:
  - como anteriormente
  - como en un tiempo pasado
  lexicon: HALOT
  rationale: La comparación temporal remite a episodios previos de opresión. 'Como antes' es breve, idiomático y fiel.
theological_decisions:
- issue: Referente colectivo de Israel con formas singulares en hebreo
  english_pob_reading: Render the collective referent with English plurals ('them,' 'they') where required for natural English
  chosen_spanish_reading: Conservar el colectivo como singular en español ('lo', 'habite', 'sea perturbado')
  alternative_spanish_readings:
  - pluralizar todo el pasaje ('los plantaré... para que habiten... y no sean perturbados')
  rationale: El hebreo trata a Israel como colectivo singular. En español, el singular puede reflejar mejor esa unidad nacional sin introducir pluralizaciones que no están en la morfología de base.
  doctrine_reference: Translation philosophy §6; §5 documented exception for context
- issue: Imagen de plantación aplicada al pueblo
  english_pob_reading: and will plant them
  chosen_spanish_reading: y lo plantaré
  alternative_spanish_readings:
  - y los plantaré
  - y lo estableceré
  rationale: La metáfora agrícola debe preservarse porque comunica establecimiento estable y arraigo otorgados por Dios. 'Plantar' es más fiel que sustituir por un verbo abstracto.
  doctrine_reference: Translation philosophy §4
- issue: ‘Hijos de maldad’ como idiomático masculino
  english_pob_reading: Preserve the literal idiom in the main text as 'sons of wickedness'
  chosen_spanish_reading: los hijos de maldad
  alternative_spanish_readings:
  - los malvados
  - los hombres malvados
  rationale: Se mantiene la expresión semítica masculina sin neutralizarla del todo, pero con un sustantivo español que comunica el contenido moral con claridad.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al mantener el paralelismo verbal claro ('pondré... y lo plantaré') y la estructura final de negación futura ('no volverán a afligirlo, como antes'). Se ha corregido el problema de validación anterior anclando la nota [a] directamente sobre 'plantaré'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca explícitamente en este versículo, sino porque aquí no se nombra al sujeto divino en la superficie española; el sujeto está implícito por el contexto inmediato del discurso divino en 2 Samuel 7.
  - Se evitó 'SEÑOR' porque el proyecto español POB prefiere transparentar el nombre divino cuando aparece; aquí no hacía falta insertar un título no presente.
  - Se preservó la metáfora de plantación y la construcción colectiva singular para respetar la imagen y la sintaxis hebreas.
  - '''Hijos de maldad'' conserva el idiomatismo de בְנֵי עַוְלָה sin imponer una paráfrasis excesiva como ''malhechores'' en el texto principal.'
