    text: O «se detuvieron». El verbo hebreo puede significar «estuvieron de pie» o, en contexto, «se detuvieron».
    reason: lexical_alternative
  - marker: b
    text: O «la Puerta de la Prisión» o «la Puerta de la Vigilancia» para «la Puerta de la Guardia».
    reason: lexical_alternative
  revision_rationale: Se corrigió el verbo final para alinearlo con la revisión auditada de POB ('stood'), se reubicaron las notas al pie en los lugares correctos, se eliminó la preposición añadida antes de las torres para seguir mejor la coordinación hebrea, y se ajustó 'Puerta de los Peces' a la forma española más idiomática 'Puerta del Pescado'.
