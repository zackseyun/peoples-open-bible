    text: La primera designación es una autodenominación deferencial ante un superior; «esclavos» después en el versículo expresa el estado de servidumbre que los hermanos se ofrecen a aceptar.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar mejor el matiz contextual de la primera ocurrencia de עבד como tratamiento deferente («tus siervos») y para conservar la segunda como «esclavos», donde el texto expresa sometimiento real. Se añade la nota correspondiente para mantener la justificación lexical presente en la auditoría inglesa. El resto del verso puede mantenerse tal como está por su cercanía al hebreo y buena legibilidad.
