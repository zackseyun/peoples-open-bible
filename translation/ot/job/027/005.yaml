id: JOB.27.5
reference: Job 27:5
source:
  edition: WLC
  text: חָלִ֣ילָ/ה לִּ/י֮ אִם אַצְדִּ֪יק אֶ֫תְ/כֶ֥ם עַד אֶגְוָ֑ע לֹא אָסִ֖יר תֻּמָּתִ֣/י מִמֶּֽ/נִּי־־־׃
translation:
  text: Far be it from me to declare you right[a]; until I die[b], I will not remove my integrity from myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to justify you' or 'to pronounce you righteous.' The Hebrew verb is forensic, meaning to declare someone to be in the right.
    reason: lexical_alternative
  - marker: b
    text: Or 'my blamelessness.' The Hebrew term can denote moral integrity or blamelessness in Job's self-defense.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לִּי
  chosen: Far be it from me
  alternatives:
  - Profane/forbidden for me
  - May it be unthinkable for me
  lexicon: HALOT
  rationale: Idiomatic expression of strong repudiation. 'Far be it from me' is natural English and preserves the force of abhorrence without woodenly rendering the underlying notion of profanation.
- source_word: אִם אַצְדִּיק אֶתְכֶם
  chosen: to declare you right
  alternatives:
  - to justify you
  - to pronounce you righteous
  lexicon: HALOT
  rationale: The Hiphil of צדק here means to declare someone in the right. 'Declare you right' communicates forensic vindication in accessible English. 'Justify' is possible but can sound overly theological or Pauline in English; 'pronounce you righteous' is too stiff in this dispute context.
- source_word: עַד אֶגְוָע
  chosen: until I die
  alternatives:
  - until I expire
  - until I breathe my last
  lexicon: HALOT
  rationale: גוע is a common verb for dying/expiring. 'Until I die' is clear, idiomatic, and appropriately solemn.
- source_word: לֹא אָסִיר
  chosen: I will not remove
  alternatives:
  - I will not take away
  - I will not let go of
  lexicon: HALOT
  rationale: The Hiphil of סור with the object 'my integrity' and complement 'from me' is literally 'remove/turn aside.' 'Remove' preserves the concrete metaphor better than the more interpretive 'let go of.'
- source_word: תֻּמָּתִי
  chosen: my integrity
  alternatives:
  - my blamelessness
  - my innocence
  lexicon: HALOT
  rationale: תם/תֻמָּה in Job often denotes moral integrity or blamelessness. 'Integrity' fits Job's insistence on uprightness in the face of accusation and reads naturally in modern English. 'Innocence' is narrower; 'blamelessness' is viable but less idiomatic here.
- source_word: מִמֶּנִּי
  chosen: from myself
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The preposition is explicit in Hebrew. 'From myself' preserves the reflexive sense created by first-person object plus first-person pronominal complement, though 'from me' is also possible. The fuller wording helps retain the Hebrew's emphasis.
