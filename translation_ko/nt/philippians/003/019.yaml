id: PHP.3.19
reference: Philippians 3:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὧν τὸ τέλος ἀπώλεια, ὧν ὁ θεὸς ἡ κοιλία καὶ ἡ δόξα ἐν τῇ αἰσχύνῃ αὐτῶν, οἱ τὰ ἐπίγεια φρονοῦντες.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/019.yaml
  text: Their end is destruction[a], their god is the belly[b], and their glory is in their shame—their minds are set on earthly things.
  footnotes:
  - marker: a
    text: Or “their god is their appetite.”
    reason: lexical_alternative
  - marker: b
    text: Or “set their minds on earthly things.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그들의 끝은 멸망이고, 그들의 신은 배[a]이며, 그들의 영광은 그들의 수치에 있습니다. 그들은 땅의 것에만 마음을 두는 자들입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그들의 신은 그들의 식욕이다」. 헬라어 κοιλία는 「배·복부」를 가리키는 구체적 비유로, 「식욕」으로 풀어 옮기면 비유가 약해진다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「땅의 것을 생각하는 자들」. 헬라어 φρονέω는 단순한 사고가 아니라 정착된 마음의 방향·지향을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέλος
  english_pob_choice: end
  chosen_korean: 끝
  alternatives_korean:
  - 결말
  - 종착점
  - 운명
  lexicon: BDAG
  rationale: 「끝」이 헬라어의 종결과 결과의 함의를 함께 살린다. 「운명」은 해석적이다.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_korean: 멸망
  alternatives_korean:
  - 파멸
  - 멸절
  lexicon: BDAG
  rationale: 「멸망」이 가장 자연스러운 한국어 종말론적 어휘이며, 한국 성서 전통의 정착된 번역이다.
- source_word: κοιλία
  english_pob_choice: belly
  chosen_korean: 배
  alternatives_korean:
  - 위장
  - 식욕
  - 복부
  lexicon: BDAG
  rationale: 헬라어의 구체적 신체 비유를 그대로 살린다. 「식욕」은 의미를 해석적으로 환원시켜 비유를 약화시킨다.
- source_word: δόξα
  english_pob_choice: glory
  chosen_korean: 영광
  alternatives_korean:
  - 자랑
  - 자긍
  lexicon: BDAG
  rationale: 「영광」이 직접적 등가어이며, 수치를 영광으로 여기는 역설을 그대로 살린다.
- source_word: αἰσχύνη
  english_pob_choice: shame
  chosen_korean: 수치
  alternatives_korean:
  - 부끄러움
  - 치욕
  lexicon: BDAG
  rationale: 「수치」가 명예 박탈과 도덕적 부끄러움을 함께 담는 표준 어휘.
- source_word: τὰ ἐπίγεια
  english_pob_choice: earthly things
  chosen_korean: 땅의 것
  alternatives_korean:
  - 세상의 것
  - 지상의 것
  lexicon: BDAG
  rationale: 「땅의 것」이 직접적이고 자연스러우며, 20절의 「하늘」과의 대조를 분명히 한다.
- source_word: φρονοῦντες
  english_pob_choice: their minds are set on
  chosen_korean: 마음을 두는 자들
  alternatives_korean:
  - 생각하는 자들
  - 마음을 쏟는 자들
  lexicon: BDAG
  rationale: φρονέω는 정착된 사고·태도·지향. 「마음을 두다」가 그 함의를 자연스럽게 담는다. 「~에만」으로 배타적 지향을 강조한다.
- source_word: ὧν ... ὧν
  english_pob_choice: their ... their
  chosen_korean: 그들의 ... 그들의
  alternatives_korean:
  - ~한 자들의
  lexicon: Greek grammar
  rationale: 반복되는 속격 관계사가 앞 절의 「많은 자들」을 가리킨다. 「그들의 ~ 그들의」로 반복 구조를 자연스럽게 살린다.
theological_decisions:
- issue: 「그들의 신은 배」 비유를 약화시키지 않음
  chosen_reading: 본문에 구체적 비유 「배」를 유지.
  alternative_readings:
  - 그들의 신은 그들의 식욕이다
  - 그들의 신은 그들의 위장이다
  rationale: 헬라어는 비루한 욕망·관능적 헌신을 신체적 비유로 강렬하게 표현한다. 비유를 유지함이 바울의 수사적 힘을 보존하며, 단일한 추상적 해석으로 미리 환원하지 않는다. 한국 성서 전통(개역개정·새번역 「배」)과도 일치.
  doctrine_reference: 'DOCTRINE.md § Original-language primacy; preserve rhetorical force.'
