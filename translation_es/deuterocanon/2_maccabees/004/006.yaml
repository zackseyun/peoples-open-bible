- from: porque veía que, sin la providencia real, era imposible alcanzar la paz en los asuntos[a], y que Simón no recibiría pausa[b] de su insensatez.
  to: porque veía que, sin la intervención real[a], era imposible que hubiera paz en la situación, y que Simón no desistiría de su insensatez[b].
