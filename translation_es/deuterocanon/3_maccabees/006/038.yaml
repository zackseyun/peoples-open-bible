translation:
  language: es
  text: Se hicieron copias[a] para ellos desde el 25 de Pachón hasta el 4 de Epifi[b], durante cuarenta días; y se dispuso su destrucción desde el 5 de Epifi hasta el 7, en tres días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego puede sugerir copias escritas o documentos oficiales preparados; el objeto no se explicita en el versículo.
    reason: lexical_alternative
  - marker: b
    text: Pachón y Epifi son nombres de meses egipcios usados en la datación administrativa de la narración.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀντιγράφονται
  english_pob_choice: Copies were made for them
  chosen_spanish: Se hicieron copias para ellos
  alternatives_spanish:
  - Se copiaron para ellos
  - Se prepararon copias para ellos
  - Se expidieron copias para ellos
  lexicon: LSJ
  rationale: El verbo griego en pasiva sugiere la preparación de copias o documentos. En español, 'Se hicieron copias' conserva el sentido documental sin especificar más de lo que el texto dice.
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para estas personas
  - para ellos, respecto de estos asuntos
  lexicon: BDAG
  rationale: El dativo simplemente identifica a los destinatarios; 'para ellos' mantiene esa referencia de manera natural.
- source_word: ἀπὸ πέμπτης τοῦ Παχὼν καὶ εἰκάδος
  english_pob_choice: from the twenty-fifth of Pachon
  chosen_spanish: desde el veinticinco de Pachón
  alternatives_spanish:
  - desde el 25 de Pachón
  - a partir del veinticinco de Pachón
  - desde el quinto y vigésimo de Pachón
  lexicon: LSJ
  rationale: La forma griega expresa la fecha del día veinticinco del mes egipcio Pachón; en español, 'desde el veinticinco de Pachón' es la manera más clara y fiel de rendirla.
- source_word: ἕως τῆς τετάρτης τοῦ Ἐπιφὶ
  english_pob_choice: until the fourth of Epiphi
  chosen_spanish: hasta el cuatro de Epifi
  alternatives_spanish:
  - hasta el cuarto de Epifi
  - hasta el cuarto día de Epifi
  - hasta el 4 de Epifi
  lexicon: LSJ
  rationale: Se conserva el nombre egipcio del mes con transliteración española ('Epifi'), y el día se expresa de forma natural en español.
- source_word: ἐπʼ ἡμέρας τεσσαράκοντα
  english_pob_choice: over forty days
  chosen_spanish: durante cuarenta días
  alternatives_spanish:
  - por cuarenta días
  - a lo largo de cuarenta días
  - sobre cuarenta días
  lexicon: BDAG
  rationale: La frase marca duración total; 'durante cuarenta días' es idiomática en español y refleja la extensión temporal sin introducir matices ajenos.
- source_word: συνίστανται
  english_pob_choice: they appointed
  chosen_spanish: se dispuso
  alternatives_spanish:
  - se fijó
  - se determinó
  - se estableció
  lexicon: BDAG
  rationale: En este contexto administrativo, el verbo indica fijar o establecer una medida. 'Se dispuso' conserva el registro formal y evita forzar una lectura demasiado moderna como 'programaron'.
- source_word: τὴν ἀπώλειαν
  english_pob_choice: their destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su ruina
  - su aniquilación
  - su perdición
  lexicon: BDAG
  rationale: ἀπώλεια aquí apunta a exterminio o ruina intencional; 'destrucción' reproduce la fuerza del término sin añadir interpretación.
- source_word: ἀπὸ πέμπτης τοῦ Ἐπιφὶ ἕως ἑβδόμης
  english_pob_choice: from the fifth of Epiphi until the seventh
  chosen_spanish: desde el cinco de Epifi hasta el siete
  alternatives_spanish:
  - desde el quinto de Epifi hasta el séptimo
  - desde el quinto día de Epifi hasta el séptimo
  - desde el 5 de Epifi hasta el 7
  lexicon: LSJ
  rationale: Se mantiene la secuencia calendárica. La omisión de 'día' es natural en español cuando el contexto ya es claramente datable.
- source_word: ἡμέραις τρισίν
  english_pob_choice: in three days
  chosen_spanish: en tres días
  alternatives_spanish:
  - por tres días
  - dentro de tres días
  - a lo largo de tres días
  lexicon: BDAG
  rationale: El dativo temporal expresa el lapso involucrado; 'en tres días' es la equivalencia más idiomática y concisa en español.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail inglés, pero reexpresa el matiz formal en español con 'se hicieron copias' y 'se dispuso' para conservar el tono administrativo sin sobrerinterpretar. Se mantuvo la cronología de meses egipcios y la duración total de cuarenta días, además del intervalo final de tres días.
  spanish_consistency_notes:
  - Se usó 'Pachón' y 'Epifi' como transliteraciones españolas consistentes de los meses egipcios del original y del audit trail inglés.
  - Se prefirió 'destrucción' para ἀπώλειαν por coherencia con la fuerza léxica documentada en el inglés POB.
  - Se evitó 'SEÑOR', 'Cristo' o vocabulario teológico no presente en el pasaje.
  - La puntuación reproduce dos segmentos temporales claramente separados por punto y coma, como en el griego.
