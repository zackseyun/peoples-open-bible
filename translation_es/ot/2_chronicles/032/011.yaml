    reason: lexical_alternative
  revision_rationale: Se corrige el nombre propio a la forma española normal «Ezequías» y se mejora la sintaxis para reflejar con mayor naturalidad y precisión la idea hebrea de ser entregados a una muerte por privación. Se conserva la nota léxica sobre מַסִּית y la terminología clave del proyecto, especialmente «Yahvé».
