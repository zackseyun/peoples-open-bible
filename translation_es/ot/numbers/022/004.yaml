base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/004.yaml
  text: And Moab said to the elders of Midian[a], “Now this multitude will lick up all that is around us[b], as the ox licks up the grass of the field.” Now Balak son of Zippor was king of Moab at that time.
  footnotes:
  - marker: a
    text: Or “this multitude will devour everything around us.” The Hebrew verb is literally “lick up,” and the main text preserves the simile’s imagery.
    reason: lexical_alternative
  - marker: b
    text: Or “the grass of the field.” The Hebrew refers more broadly to green vegetation.
    reason: lexical_alternative
