translation:
  language: es
  text: 'Y Tobías el amonita estaba junto a él, y dijo: «¡Hasta lo que ellos están construyendo! Si un zorro[b] se sube a él, derribará[a] su muro de piedras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abrirá brecha en su muro de piedras» o «derribará su muro de piedras». El verbo hebreo puede sugerir abrir brecha o derribar, y la frase forma parte de la burla de Tobías sobre la debilidad del muro.'
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea para «zorro» puede, en algunos contextos, referirse de manera más amplia a un cánido semejante al zorro, aunque «zorro» es la traducción estándar aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶצְלוֹ
  english_pob_choice: was beside him
  chosen_spanish: estaba junto a él
  alternatives_spanish:
  - estaba al lado de él
  - estaba a su lado
  lexicon: HALOT
  rationale: La preposición אצל con sufijo indica proximidad física. «Junto a él» mantiene esa cercanía de manera natural en español y conserva la escena de Tobías al lado de Sanbalat.
- source_word: גַּם אֲשֶׁר הֵם בּוֹנִים
  english_pob_choice: Even what they are building
  chosen_spanish: Aun eso que están construyendo
  alternatives_spanish:
  - Incluso lo que están construyendo
  - También eso que están construyendo
  lexicon: HALOT
  rationale: גַּם añade fuerza enfática o aditiva. En el tono burlón del pasaje, «aun eso» reproduce mejor la ironía que una simple adición neutral.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: Si
  alternatives_spanish:
  - aunque
  - aun si
  lexicon: HALOT
  rationale: La partícula introduce una condición. En español, «si» preserva la forma condicional del insulto sin sobrecargar el sentido con una paráfrasis.
- source_word: יַעֲלֶה שׁוּעָל
  english_pob_choice: a fox climbs up on it
  chosen_spanish: subiera un zorro
  alternatives_spanish:
  - subiera un zorro sobre ello
  - subiera un zorro allí
  lexicon: HALOT
  rationale: שׁוּעָל se rinde de forma estándar como «zorro». El verbo permite aquí una formulación hipotética compacta en español, y el objeto implícito se sobreentiende por el contexto de la muralla.
- source_word: וּפָרַץ
  english_pob_choice: he will break through
  chosen_spanish: derribaría
  alternatives_spanish:
  - rompería
  - abriría brecha en
  lexicon: HALOT
  rationale: פרץ puede expresar quebrantar, abrir brecha o derribar. «Derribaría» transmite bien la idea de destrucción fácil en el contexto de la burla, aunque la imagen original conserva también la noción de brecha.
- source_word: חוֹמַת אַבְנֵיהֶם
  english_pob_choice: their stone wall
  chosen_spanish: su muro de piedras
  alternatives_spanish:
  - su muro de piedra
  - su muro de piedras
  lexicon: HALOT
  rationale: La construcción hebrea literalmente significa «muro de sus piedras». «Muro de piedras» conserva el material con un español natural; se prefirió el singular posesivo «su» por la cohesión del referente en el discurso directo.
theological_decisions:
- issue: Tono de burla y fuerza del condicional
  english_pob_reading: The whole sentence is Tobiah’s mockery of the wall’s weakness.
  chosen_spanish_reading: Se mantiene el tono de burla mediante una estructura exclamativa y condicional.
  alternative_spanish_readings:
  - Se mantiene una simple narración sin marcar la burla
  - Se enfatiza más libremente la ironía con una paráfrasis
  rationale: El hebreo y la traducción inglesa muestran que la frase no es mera descripción, sino una mofa. La puntuación y el orden en español intentan preservar esa ironía sin añadir contenido ajeno.
  doctrine_reference: Nehemías 3:35; lectura contextual del discurso de Tobías
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios y confirmó una concordancia alta con el fuente hebreo; por eso el español sigue de cerca la lectura auditada sin necesidad de ajustes adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantuvo «zorro» como equivalente estándar de שׁוּעָל, coherente con la auditoría inglesa.
  - Se evitó calcar literalmente la sintaxis inglesa cuando el español requería una formulación más natural, sin perder el valor condicional y burlón del hebreo.
