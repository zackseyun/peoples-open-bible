  yaml_path: translation/ot/deuteronomy/008/003.yaml
  text: And he humbled you and let you hunger and fed you the manna[a], which you had not known, nor had your fathers known, so that he might make you know that man does not live by bread alone[b], but man lives by every word that comes from the mouth of Yahweh.
  footnotes:
