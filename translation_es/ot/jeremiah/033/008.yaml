translation:
  language: es
  text: Y los purificaré de toda su iniquidad[a], por la cual pecaron contra mí, y perdonaré todas sus iniquidades[b], por las cuales pecaron contra mí y se rebelaron contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culpa». El hebreo עָוֹן puede referirse tanto a la iniquidad como a la culpa que resulta de ella.
    reason: lexical_alternative
  - marker: b
    text: O «culpas». El hebreo usa aquí עָוֹן en plural, lo que enfatiza la multiplicidad de sus ofensas culpables.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטִהַרְתִּים
  english_pob_choice: And I will cleanse them
  chosen_spanish: Y los limpiaré
  alternatives_spanish:
  - Y los purificaré
  - Y los limpiaré de toda impureza
  lexicon: HALOT
  rationale: El piel de טהר expresa limpiar/purificar. En español, «limpiaré» comunica de forma natural la acción divina de purificación moral y cultual sin volver el texto técnico o arcaico.
- source_word: מִכָּל עֲוֺנָם
  english_pob_choice: from all their iniquity
  chosen_spanish: de toda su iniquidad
  alternatives_spanish:
  - de toda su culpa
  - de todo su pecado
  - de toda su maldad
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa y la carga culpable del pecado. Aquí se conserva «iniquidad» para mantener la correspondencia léxica con la decisión final del POB en inglés y evitar aplanar la distinción con los otros términos del versículo.
- source_word: אֲשֶׁר חָֽטְאוּ לִ֑י
  english_pob_choice: by which they have sinned against me
  chosen_spanish: por la cual pecaron contra mí
  alternatives_spanish:
  - con la cual pecaron contra mí
  - en la cual pecaron contra mí
  - por las cuales pecaron contra mí
  lexicon: HALOT
  rationale: חטא con ל significa pecar contra alguien, aquí contra Dios. «Pecaron contra mí» reproduce con claridad el sentido relacional; «por la cual» vincula la iniquidad con el acto que la ocasiona.
- source_word: וְסָלַחְתִּי
  english_pob_choice: and I will forgive
  chosen_spanish: y perdonaré
  alternatives_spanish:
  - y absolveré
  - y perdonaré su culpa
  lexicon: HALOT
  rationale: סלח es el verbo habitual de perdón divino. «Perdonaré» es la equivalencia española más clara y fiel al registro del texto.
- source_word: לְכָל עֲוֺנוֹתֵיהֶם
  english_pob_choice: all their iniquities
  chosen_spanish: todas sus iniquidades
  alternatives_spanish:
  - todos sus pecados
  - todas sus culpas
  - todos sus delitos
  lexicon: HALOT
  rationale: El plural de עָוֹן conserva el matiz de múltiples ofensas o culpas concretas. «Iniquidades» mantiene la relación con el hebreo y preserva la repetición intencional del término.
- source_word: וַאֲשֶׁר פָּשְׁעוּ בִי
  english_pob_choice: and by which they have rebelled against me
  chosen_spanish: y se rebelaron contra mí
  alternatives_spanish:
  - y se alzaron contra mí
  - y quebrantaron mi pacto
  - y se apartaron de mí en rebelión
  lexicon: HALOT
  rationale: פָּשַׁע suele expresar rebelión o transgresión contra autoridad legítima. «Se rebelaron contra mí» conserva esa fuerza relacional y covenantal sin añadir explicaciones no presentes en el hebreo.
theological_decisions:
- issue: Diferenciación de עָוֹן, חָטָא y פָּשַׁע
  english_pob_reading: 'The verse preserves layered sin-language: iniquity, sinned against me, rebelled against me.'
  chosen_spanish_reading: 'El versículo conserva lenguaje escalonado del pecado: iniquidad, pecaron contra mí, y se rebelaron contra mí.'
  alternative_spanish_readings:
  - Reducir todo a «pecado»
  - Usar solo «culpa» para עָוֹן
  rationale: 'La acumulación de términos en hebreo no es redundante sino teológicamente expresiva. La versión española mantiene esa progresión: corrupción/culpabilidad, acto de pecado y rebelión contra Dios.'
  doctrine_reference: Translation philosophy items 1, 5, and 6
- issue: Relación entre limpieza y perdón divinos
  english_pob_reading: I will cleanse ... and I will forgive ...
  chosen_spanish_reading: Los limpiaré... y perdonaré...
  alternative_spanish_readings:
  - Los purificaré... y absolveré...
  - Los limpiaré... y les perdonaré...
  rationale: Se conserva la doble acción divina, primero de purificación y luego de perdón. En español, el paralelismo comunica tanto restauración moral como remisión culpable sin introducir una distinción doctrinal ajena al texto.
  doctrine_reference: Jeremiah 33:8; HALOT on טהר and סלח
translation_notes:
  revision_awareness: La última revisión en inglés sustituyó «guilt/guilty deeds» por «iniquity/iniquities» para ajustarse más de cerca a עָוֹן y mantener coherencia léxica. La redacción española sigue esa revisión y conserva la diferenciación entre singular y plural, además del paralelismo del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca explícitamente el nombre divino; aquí el sujeto está en primera persona y no requiere sustitución nominal.
  - Se mantiene «pecaron contra mí» y «se rebelaron contra mí» para no diluir חטא y פשע en un único término.
  - «Iniquidad/iniquidades» se emplea de manera consistente para עָוֹן, evitando modernizarlo a «culpa» en el texto principal.
  - El orden y la repetición de los miembros del versículo se conservan para reflejar la estructura hebrea y la auditada en inglés.
