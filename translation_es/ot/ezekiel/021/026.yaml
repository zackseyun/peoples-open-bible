base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/021/026.yaml
  text: 'For the king of Babylon stands at the mother of the road[a], at the head of the two roads, to practice divination: he shakes the arrows, he consults the teraphim[c][b], he examines the liver.'
  footnotes:
  - marker: a
    text: Hebrew literally, 'at the mother of the road,' an idiom for the branching point or fork in the road.
    reason: lexical_alternative
  - marker: b
    text: Or 'he inquires of the household gods'; 'teraphim' refers to cultic images used for divination.
    reason: cultural_note
  - marker: c
    text: That is, he practices divination by inspecting the liver.
    reason: cultural_note
