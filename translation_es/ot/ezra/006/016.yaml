translation:
  language: es
  text: Y los hijos de Israel[a], los sacerdotes, los levitas y el resto de los hijos del exilio celebraron la dedicación de esta casa de Dios con alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse de manera más fluida: ''y el resto de los exiliados''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבַדוּ
  english_pob_choice: celebrated
  chosen_spanish: celebraron
  alternatives_spanish:
  - realizaron
  - observaron
  - hicieron
  lexicon: HALOT
  rationale: El verbo arameo se usa para llevar a cabo una celebración o acto ceremonial. En español, 'celebraron' comunica bien el sentido festivo y ritual sin volverlo un calco torpe de 'hicieron'.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La POB inglesa conserva la expresión formal 'sons of Israel'. En español, 'hijos de Israel' mantiene la cercanía estructural y sigue siendo natural en una lista solemne.
- source_word: כָּהֲנַיָּא
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  - los ministros
  lexicon: HALOT
  rationale: '''Sacerdotes'' es el equivalente directo y estándar para el grupo sacerdotal del templo.'
- source_word: וְלֵוָיֵא
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los de Leví
  lexicon: HALOT
  rationale: '''Levitas'' es la forma estable y precisa en español para los miembros de la tribu/clase levítica.'
- source_word: וּשְׁאָר בְּנֵי גָלוּתָא
  english_pob_choice: and the rest of the sons of the exile
  chosen_spanish: y el resto de los hijos del exilio
  alternatives_spanish:
  - y el resto de los exiliados
  - y el remanente de los hijos del exilio
  lexicon: HALOT
  rationale: La traducción conserva la estructura del hebreo/arameo y el matiz de pertenencia al grupo exílico. Se mantiene 'hijos del exilio' para no borrar la forma fuente que la POB inglesa también preserva.
- source_word: חֲנֻכַּת
  english_pob_choice: the dedication
  chosen_spanish: la dedicación
  alternatives_spanish:
  - la consagración
  - la ceremonia de dedicación
  lexicon: HALOT
  rationale: '''Dedicación'' es el equivalente más directo y natural para el acto de inaugurar/consagrar el edificio.'
- source_word: בֵּית אֱלָהָא דְנָה
  english_pob_choice: this house of God
  chosen_spanish: esta casa de Dios
  alternatives_spanish:
  - este templo de Dios
  - esta casa de Dios, esta
  lexicon: HALOT
  rationale: '''Casa de Dios'' reproduce de cerca la metáfora del texto y evita sustituirla por ''templo'', que sería más interpretativo.'
- source_word: בְּחֶדְוָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - gozosamente
  lexicon: HALOT
  rationale: '''Con alegría'' es idiomático en español y refleja el sustantivo arameo sin perder el tono celebrativo del verso.'
translation_notes:
  revision_awareness: 'Se respetó el estado de alta concordancia del pasaje: no se introdujeron cambios de contenido respecto al sentido ya auditado en la POB inglesa, y solo se ajustó la fluidez natural del español manteniendo la estructura enumerativa y el tono ceremonial.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' en lugar de 'SEÑOR' porque el arameo dice explícitamente 'casa de Dios'.
  - Se conservó 'hijos de Israel' para reflejar la fórmula fuente y la lista por grupos.
  - '''Con alegría'' traduce el adverbial del cierre sin añadir matices no presentes en el texto.'
