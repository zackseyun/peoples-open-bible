translation:
  language: es
  text: ¿Y dónde, entonces, está mi esperanza? Y mi esperanza, ¿quién puede verla[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿quién puede contemplarla?». El verbo hebreo admite «ver» o «contemplar», y el imperfecto puede entenderse con fuerza modal («puede») o futura («podrá»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַיֵּה
  english_pob_choice: And where
  chosen_spanish: ¿Y dónde
  alternatives_spanish:
  - ¿Dónde
  - ¿Y adónde
  lexicon: HALOT
  rationale: אַיֵּה es un interrogativo de lugar; el prefijo conjuntivo mantiene el avance discursivo del lamento de Job. En español, «¿Y dónde» conserva esa continuidad sin sonar forzado.
- source_word: אֵפוֹ
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - pues
  - ahora
  lexicon: HALOT
  rationale: אֵפוֹ añade énfasis o fuerza inferencial. «Entonces» reproduce ese matiz en español de manera natural y sobria.
- source_word: תִקְוָתִי
  english_pob_choice: my hope
  chosen_spanish: mi esperanza
  alternatives_spanish:
  - mi esperanza
  - mi expectativa
  lexicon: HALOT
  rationale: תִקְוָה denota aquí esperanza o expectativa. «Esperanza» es el equivalente más natural y fiel al contexto de la queja de Job.
- source_word: וְתִקְוָתִי
  english_pob_choice: And my hope
  chosen_spanish: Y mi esperanza
  alternatives_spanish:
  - Y mi esperanza
  - Y aun mi esperanza
  - En cuanto a mi esperanza
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo; no se suaviza la duplicación porque tiene fuerza poética y retórica.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - quién
  - qué persona
  lexicon: HALOT
  rationale: El interrogativo estándar introduce la segunda pregunta con el mismo valor personal del hebreo.
- source_word: יְשׁוּרֶנָּה
  english_pob_choice: can see it
  chosen_spanish: puede verla
  alternatives_spanish:
  - puede verla
  - la puede ver
  - puede contemplarla
  lexicon: HALOT
  rationale: El verbo שׁוּר significa 'mirar, contemplar, ver'. En español, «verla» comunica bien el referente de תִקְוָה («mi esperanza») y el matiz de posibilidad modal del imperfecto se expresa con «puede».
translation_notes:
  revision_awareness: El texto inglés POB se mantiene sin cambios sustantivos en la revisión más reciente; el consenso de revisión indica alta concordancia y no se documentan problemas textuales o teológicos que exijan ajuste adicional.
  spanish_consistency_notes:
  - Se usa «esperanza» para תִקְוָה, en coherencia con el valor principal documentado en el aparato inglés.
  - Se conserva la repetición de «mi esperanza» para reflejar el paralelismo y la intensificación del hebreo.
  - Se opta por una puntuación con dos preguntas separadas por dos puntos para reproducir el giro retórico sin añadir contenido interpretativo.
