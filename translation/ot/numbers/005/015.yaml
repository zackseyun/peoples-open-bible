id: NUM.5.15
reference: Numbers 5:15
source:
  edition: WLC
  text: וְ/הֵבִ֨יא הָ/אִ֣ישׁ אֶת אִשְׁתּ/וֹ֮ אֶל הַ/כֹּהֵן֒ וְ/הֵבִ֤יא אֶת קָרְבָּנָ/הּ֙ עָלֶ֔י/הָ עֲשִׂירִ֥ת הָ/אֵיפָ֖ה קֶ֣מַח שְׂעֹרִ֑ים לֹֽא יִצֹ֨ק עָלָ֜י/ו שֶׁ֗מֶן וְ/לֹֽא יִתֵּ֤ן עָלָי/ו֙ לְבֹנָ֔ה כִּֽי מִנְחַ֤ת קְנָאֹת֙ ה֔וּא מִנְחַ֥ת זִכָּר֖וֹן מַזְכֶּ֥רֶת עָוֺֽן־־־־־־׃
translation:
  text: 'Then the man shall bring his wife to the priest[a], and he shall bring her offering for her: a tenth of an ephah of barley flour. He shall pour no oil on it and put no frankincense on it, because it is a grain offering of jealousy[b], a memorial offering that brings iniquity to remembrance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a remembrance offering'; the Hebrew phrase may also be rendered more literally as 'an offering of remembrance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bringing guilt to remembrance'; the Hebrew עָוֹן can denote iniquity, guilt, or the liability arising from wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  chosen: shall bring
  alternatives:
  - must bring
  - is to bring
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in legal/instructional context functions with injunctive force; English future-like 'shall bring' fits legislative style without overstating modality.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the husband
  lexicon: HALOT
  rationale: The Hebrew is literally 'the man.' In context he is the husband, but retaining 'the man' preserves the source wording while the following 'his wife' makes the relationship clear.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: Standard contextual sense of אִשָּׁה with pronominal suffix in marital context is 'wife.'
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the cultic office.
- source_word: קָרְבָּנָהּ
  chosen: her offering
  alternatives:
  - her قربן / gift offering
  - the offering for her
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near. 'Her offering' reflects the feminine suffix, even though the husband physically brings it on her behalf.
- source_word: עָלֶיהָ
  chosen: for her
  alternatives:
  - on her behalf
  - concerning her
  lexicon: HALOT
  rationale: With הביא and offering language, עַל commonly indicates representation or relation. 'For her' is idiomatic and concise.
- source_word: עֲשִׂירִת הָאֵיפָה
  chosen: a tenth of an ephah
  alternatives:
  - one-tenth of an ephah
  lexicon: HALOT
  rationale: Standard measure phrase; 'ephah' is best transliterated as an ancient unit rather than approximated.
- source_word: קֶמַח שְׂעֹרִים
  chosen: barley flour
  alternatives:
  - barley meal
  - flour of barley
  lexicon: HALOT
  rationale: Construct phrase meaning flour made from barley. 'Barley flour' is natural modern English.
- source_word: לֹא יִצֹק עָלָיו שֶׁמֶן
  chosen: He shall pour no oil on it
  alternatives:
  - He shall not pour oil over it
  lexicon: HALOT
  rationale: יצק means 'pour.' The pronoun refers to the offering. 'On it' is the natural English equivalent.
- source_word: וְלֹא יִתֵּן עָלָיו לְבֹנָה
  chosen: and put no frankincense on it
  alternatives:
  - and place no frankincense on it
  lexicon: HALOT
  rationale: נתן is broad ('give/put'); 'put' is idiomatic here. לְבֹנָה is the incense resin frankincense.
- source_word: מִנְחַת קְנָאֹת
  chosen: a grain offering of jealousy
  alternatives:
  - an offering of jealousy
  - a grain offering of jealous suspicion
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial contexts is best rendered 'grain offering.' קְנָאֹת is plural abstract/intensive; 'jealousy' is the conventional and sufficiently broad rendering in this ordeal context.
- source_word: מִנְחַת זִכָּרוֹן
  chosen: a memorial offering
  alternatives:
  - a remembrance offering
  lexicon: HALOT
  rationale: Again מִנְחָה is 'offering'; זִכָּרוֹן denotes memorial/remembrance. 'Memorial offering' is established and clear.
- source_word: מַזְכֶּרֶת עָוֹן
  chosen: that brings iniquity to remembrance
  alternatives:
  - bringing guilt to remembrance
  - causing wrongdoing to be remembered
  lexicon: HALOT
  rationale: The participial form from זכר indicates causing remembrance; עָוֹן can mean iniquity/guilt. 'Brings iniquity to remembrance' preserves the formal sense without overinterpreting whether the emphasis is on sin or its liability.
