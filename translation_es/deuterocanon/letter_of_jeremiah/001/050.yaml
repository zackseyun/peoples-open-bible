translation:
  language: es
  text: Porque, como son de madera y cubiertos de oro y de plata, después de esto se sabrá que son falsos; a todas las naciones y a los reyes les será evidente que no son dioses, sino obras de manos humanas, y no hay en ellos ninguna obra de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπάρχοντα
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - están
  - existen como
  lexicon: BDAG
  rationale: El participio aquí funciona con valor predicativo y describe la condición real de los ídolos. «Son» expresa de manera natural esa identificación de naturaleza en español sin sobrecargar la forma verbal griega.
- source_word: ξύλινα
  english_pob_choice: wooden
  chosen_spanish: de madera
  alternatives_spanish:
  - maderosos
  - hechos de madera
  lexicon: LSJ
  rationale: La composición material se expresa con claridad en español mediante «de madera». Es fiel y más natural que el adjetivo «maderoso».
- source_word: περίχρυσα
  english_pob_choice: overlaid with gold
  chosen_spanish: cubiertos de oro
  alternatives_spanish:
  - recubiertos de oro
  - dorados
  lexicon: LSJ
  rationale: El prefijo indica un recubrimiento exterior, no que sean oro macizo. «Cubiertos de oro» conserva esa idea de cobertura superficial.
- source_word: περιάργυρα
  english_pob_choice: overlaid with silver
  chosen_spanish: cubiertos de plata
  alternatives_spanish:
  - recubiertos de plata
  - plateados
  lexicon: LSJ
  rationale: Se mantiene el paralelismo con «cubiertos de oro». «Cubiertos de plata» refleja el mismo matiz de recubrimiento exterior.
- source_word: γνωσθήσεται
  english_pob_choice: it will afterward be known
  chosen_spanish: se sabrá
  alternatives_spanish:
  - llegará a saberse
  - se reconocerá
  lexicon: BDAG
  rationale: El futuro pasivo apunta a un conocimiento público posterior. «Se sabrá» reproduce bien el giro impersonal en español; el adverbio temporal siguiente lleva el matiz de posterioridad.
- source_word: μετὰ ταῦτα
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - más tarde
  - luego
  lexicon: BDAG
  rationale: El valor temporal es simple y directo. «Después» mantiene la secuencia futura y resulta idiomático.
- source_word: ψευδῆ
  english_pob_choice: 'false'
  chosen_spanish: falsos
  alternatives_spanish:
  - mentirosos
  - engañosos
  lexicon: BDAG
  rationale: En el contexto de la polémica contra los ídolos, «falsos» preserva el contraste entre lo fabricado y lo que verdaderamente es Dios, sin reducirlo a mera falsedad discursiva.
- source_word: τοῖς ἔθνεσι πᾶσι τοῖς τε βασιλεῦσι
  english_pob_choice: to all the nations and to the kings
  chosen_spanish: a todas las naciones y a los reyes
  alternatives_spanish:
  - ante todas las naciones y los reyes
  - para todas las naciones y los reyes
  lexicon: BDAG
  rationale: 'El dativo con φανερὸν ἔσται se expresa naturalmente con «a» en español: el hecho resulta evidente para esos destinatarios. Se conserva la estructura inclusiva de naciones y reyes.'
- source_word: φανερὸν ἔσται
  english_pob_choice: it will be evident
  chosen_spanish: les será evidente
  alternatives_spanish:
  - será manifiesto
  - quedará claro
  lexicon: BDAG
  rationale: «Evidente» preserva la idea de visibilidad pública y claridad. El pronombre dativo implícito se expresa en español con «les» para mantener el sentido de destinatarios.
- source_word: θεοὶ
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  - seres divinos
  lexicon: BDAG
  rationale: «Dioses» es la equivalencia directa y mantiene la denuncia del culto idolátrico. Evita suavizar la afirmación con perífrasis más interpretativas.
- source_word: ἔργα χειρῶν ἀνθρώπων
  english_pob_choice: works of human hands
  chosen_spanish: obras de manos humanas
  alternatives_spanish:
  - obra de manos humanas
  - hechura de manos humanas
  lexicon: BDAG
  rationale: Se conserva la fórmula bíblica tradicional de «manos humanas», pero con el adjetivo «humanas» para reflejar con precisión ἀνθρώπων. «Obras» mantiene el plural del griego.
- source_word: οὐθὲν θεοῦ ἔργον
  english_pob_choice: no work of God
  chosen_spanish: ninguna obra de Dios
  alternatives_spanish:
  - ningún obra de Dios
  - ningún acto de Dios
  lexicon: BDAG
  rationale: La frase contrasta lo fabricado por humanos con cualquier acción/obra divina presente en los ídolos. «Ninguna obra de Dios» suena natural en español y conserva el genitivo relacional.
- source_word: ἐν αὐτοῖς ἐστίν
  english_pob_choice: is in them
  chosen_spanish: hay en ellos
  alternatives_spanish:
  - está en ellos
  - se encuentra en ellos
  lexicon: BDAG
  rationale: La construcción existencial en español se expresa mejor con «hay». Mantiene la negación de cualquier obra divina presente en su interior o en ellos mismos.
theological_decisions:
- issue: Alcance de ψευδῆ en la crítica a los ídolos
  english_pob_reading: Rendered as 'false' to describe the idols as fraudulent/non-genuine objects of worship rather than as merely 'lies' in the abstract.
  chosen_spanish_reading: Traducido como «falsos» para describir a los ídolos como no genuinos y carentes de verdad divina, no solo como mentiras abstractas.
  alternative_spanish_readings:
  - mentiras
  - engañosos
  rationale: El pasaje no solo acusa a los ídolos de engañar, sino de no ser verdaderos dioses. «Falsos» conserva esa tensión entre fraude religioso y falsedad ontológica.
  doctrine_reference: Preservar la tensión teológica del texto; equivalencia óptima.
- issue: Alcance de οὐθὲν θεοῦ ἔργον ἐν αὐτοῖς ἐστίν
  english_pob_reading: There is no work of God in them.
  chosen_spanish_reading: No hay en ellos ninguna obra de Dios.
  alternative_spanish_readings:
  - no está en ellos ninguna obra de Dios
  - no existe en ellos obra alguna de Dios
  rationale: La frase niega la presencia de cualquier obra divina en los ídolos. El español con «hay» comunica existencia/presencia con claridad, sin convertirlo en una afirmación meramente abstracta.
  doctrine_reference: Anti-idolatría bíblica; distinguir entre manufactura humana y obra divina.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que simplificó la doble repetición de 'overlaid with' para reflejar con naturalidad los dos adjetivos griegos paralelos ('gold and silver'). Por eso se optó en español por el paralelismo breve «cubiertos de oro y de plata», manteniendo el sentido de recubrimiento exterior sin duplicar innecesariamente la estructura. También se conservó la progresión temporal de γνωσθήσεται + μετὰ ταῦτα mediante «después se sabrá».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «dioses» para θεοὶ, respetando el contraste singular/plural del pasaje.
  - Se usa «obras de manos humanas» para preservar la fórmula bíblica y la precisión inclusiva de ἀνθρώπων.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto, ya que aquí no aparece el nombre divino.
  - El tono es sobrio y publicable, con sintaxis española natural sin perder el paralelismo del original.
