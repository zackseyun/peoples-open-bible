revisions:
- from: Tú estableces las tinieblas[a], y llega a ser noche; en ella se arrastran todos los animales del bosque.
  to: Tú pones las tinieblas, y se hace de noche; en ella merodean[a] todos los animales del bosque.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre el verbo pertinente y se reemplaza «se arrastran» por «merodean», que comunica mejor el movimiento nocturno general de los animales sin restringirlo a reptación literal. También se simplifica «Tú estableces» a «Tú pones» para reflejar con mayor naturalidad el hebreo תָּשֶׁת. «Y se hace de noche» preserva bien el valor resultativo de וִיהִי לָיְלָה en español idiomático.
