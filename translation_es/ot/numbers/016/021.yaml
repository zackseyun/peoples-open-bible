lexical_decisions:
- source_word: הִבָּדְלוּ
  english_pob_choice: Separate yourselves
  chosen_spanish: Sepárense
  alternatives_spanish:
  - Sepárense ustedes
  - Aparténse
  lexicon: HALOT
  rationale: 'El imperativo nifal plural tiene un matiz reflexivo: el grupo debe apartarse por sí mismo. «Sepárense» comunica ese mandato de manera natural en español y conserva la fuerza de distanciamiento.'
- source_word: מִתּוֹךְ
  english_pob_choice: from the midst of
  chosen_spanish: de en medio de
  alternatives_spanish:
  - de entre
  - del medio de
  lexicon: HALOT
  rationale: 'La expresión hebrea mantiene una imagen espacial fuerte: salir de dentro del grupo. «De en medio de» reproduce mejor esa fuerza que un simple «de entre».'
- source_word: הָעֵדָה הַזֹּאת
  english_pob_choice: this congregation
  chosen_spanish: esta congregación
  alternatives_spanish:
  - esta asamblea
  - esta comunidad
  lexicon: HALOT
  rationale: עֵדָה nombra al cuerpo reunido del pueblo. «Congregación» es el equivalente más establecido y preciso para el contexto pentateucal.
- source_word: וַאַכַלֶּה
  english_pob_choice: that I may consume
  chosen_spanish: para que yo los consuma
  alternatives_spanish:
  - y yo los consumiré
  - para consumirlos
  lexicon: HALOT
  rationale: El verbo expresa destrucción/consumo como acto real de juicio. En español, la construcción final «para que yo los consuma» conserva el valor volitivo-resultativo del hebreo sin suavizarlo.
- source_word: כְּרָגַע
  english_pob_choice: in an instant
  chosen_spanish: en un instante
  alternatives_spanish:
  - en un momento
  - al instante
  lexicon: HALOT
  rationale: רֶגַע indica brevísima duración. «En un instante» transmite bien la rapidez repentina del juicio, en línea con la opción inglesa auditada.
theological_decisions:
- issue: Intensidad de la amenaza divina
  english_pob_reading: Render the statement as a real divine intention to destroy the congregation swiftly, without softening it into mere hyperbole.
  chosen_spanish_reading: La frase se traduce como una intención divina real de consumir a la congregación con rapidez, sin rebajarla a una mera advertencia retórica.
  alternative_spanish_readings:
  - «para apartarlos»
  - «para castigarlos»
  - «para quitarlos de en medio»
  rationale: El hebreo usa un verbo fuerte de consumación/destrucción y una referencia temporal muy breve. La versión española debe preservar esa tensión teológica y no diluirla en formulaciones menos severas.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Valor imperativo-reflexivo de הִבָּדְלוּ
  english_pob_reading: Separate yourselves
  chosen_spanish_reading: Sepárense
  alternative_spanish_readings:
  - Aléjense
  - Retírense
  rationale: El mandato requiere una separación concreta del grupo bajo juicio. «Sepárense» mantiene la responsabilidad de los destinatarios y su movimiento fuera de la asamblea.
  doctrine_reference: Distinción comunitaria bajo juicio
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: se conserva el imperativo reflexivo, la imagen espacial de separación desde el centro del grupo, la fuerza de juicio del verbo «consumir» y la brevedad temporal. Se adoptó un registro formal pero natural en español.'
  spanish_consistency_notes:
  - Se usa «congregación» para עֵדָה, coherente con el uso pentateucal y con la preferencia auditada en inglés.
  - Se evita «SEÑOR» u otras sustituciones no motivadas, pues aquí no aparece el Tetragrámaton.
  - «Consumir» se mantiene por su fuerza semántica de destrucción total, en continuidad con la lectura inglesa documentada.
  - Los marcadores de nota se usan solo donde hay alternativa léxica real en el español.
