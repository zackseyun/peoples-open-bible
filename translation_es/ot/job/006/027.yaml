translation:
  language: es
  text: Hasta al huérfano[a] echarían suertes, y regatearían por vuestro amigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hasta harían caer la suerte sobre el huérfano». El hebreo literalmente dice «hacer caer sobre el huérfano», un modismo que muchos entienden como «echar suertes sobre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y cavarían una fosa para vuestro amigo». El verbo hebreo es difícil aquí; muchos lo entienden, en cambio, como negociar sobre un amigo o explotarlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: Hasta
  alternatives_spanish:
  - incluso
  - aun
  - también
  lexicon: HALOT
  rationale: אַף intensifica la acusación; «hasta» transmite en español ese carácter de escalamiento sorprendente sin sonar rígido.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el padreless
  - el huérfano sin padre
  lexicon: HALOT
  rationale: El hebreo nombra la condición social de vulnerabilidad. En español, «huérfano» comunica de forma natural esa indefensión; el matiz de «padreless» queda implícito en el contexto.
- source_word: תַּפִּילוּ
  english_pob_choice: cast lots over
  chosen_spanish: echarían suertes
  alternatives_spanish:
  - harían caer sobre
  - echarían la suerte sobre
  - repartirían por sorteo
  lexicon: HALOT
  rationale: El hebreo con עַל conserva la imagen de sorteo o reparto arbitrario sobre la persona. «Echarían suertes» es idiomático en español y mantiene la idea de tratar al vulnerable como objeto de reparto.
- source_word: תִכְרוּ
  english_pob_choice: bargain over
  chosen_spanish: regatearían por
  alternatives_spanish:
  - harían negocio por
  - cavarían una fosa para
  - traficarían con
  lexicon: HALOT
  rationale: El verbo es difícil. La lectura del POB en inglés opta por la explotación mercantil; «regatearían por» conserva esa idea de tratar a la persona como mercancía. La alternativa literal «cavarían una fosa para» se entiende menos bien en este contexto.
- source_word: רֵיעֲכֶם
  english_pob_choice: your friend
  chosen_spanish: tu amigo
  alternatives_spanish:
  - tu compañero
  - tu prójimo
  - tu vecino
  lexicon: HALOT
  rationale: En el reproche directo de Job, «tu amigo» reproduce bien la relación personal y el tono de traición implícito en el pasaje.
- source_word: עַל ... עַל
  english_pob_choice: over ... over
  chosen_spanish: al ... por
  alternatives_spanish:
  - sobre ... sobre
  - contra ... contra
  - por ... por
  lexicon: HALOT
  rationale: En español, repetir «sobre» resultaría poco natural. «Al» en el primer hemistiquio y «por» en el segundo preservan la relación de trato abusivo y de transacción que sugiere la repetición hebrea de עַל.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el audit trail inglés del POB. Mantiene la dificultad de תִכְרוּ con una opción interpretativa coherente con el paralelismo y conserva en nota la alternativa literal más conocida. No se documentan revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se usa «huérfano» para יָתוֹם por claridad natural en español, con nota para la alternativa más literal.
  - Se evita «SEÑOR» o vocabulario teológico no presente; el versículo es una acusación ética y social.
  - La repetición de עַל se refleja de manera funcional, no mecánica, para preservar fluidez sin perder el sentido de abuso repetido.
