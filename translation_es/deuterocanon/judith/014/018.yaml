translation:
  language: es
  text: Los esclavos[a] han fallado; una mujer de los hebreos ha traído vergüenza sobre la casa del rey Nabucodonosor. ¡Miren! Holofernes está tendido en el suelo, y su cabeza no está sobre su cuerpo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sirvientes». El griego δοῦλοι puede denotar sirvientes o esclavos según el contexto; aquí el sentido de condición sometida es probable.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su cabeza no está sobre él». El griego conserva una imagen corporal abrupta y concreta.
    reason: literal_clarification
lexical_decisions:
- source_word: Ἠθέτησαν
  english_pob_choice: have failed
  chosen_spanish: han fallado
  alternatives_spanish:
  - han faltado
  - han obrado con infidelidad
  - han despreciado su deber
  lexicon: LSJ
  rationale: En este contexto militar y de corte, ἠθέτησαν expresa un fracaso grave de quienes debían custodiar la situación. «Han fallado» transmite la acusación de manera natural en español sin cargarla injustificadamente con un matiz legal o de alianza.
- source_word: οἱ δοῦλοι
  english_pob_choice: the slaves
  chosen_spanish: los esclavos
  alternatives_spanish:
  - los sirvientes
  lexicon: BDAG
  rationale: Se conserva «esclavos» para mantener la fuerza léxica de δοῦλοι y la condición subordinada/sujeta de estos hombres en el relato. La alternativa «sirvientes» suaviza el término y pierde la tensión documentada por la POB inglesa.
- source_word: ἐποίησεν αἰσχύνην
  english_pob_choice: has brought shame
  chosen_spanish: ha traído vergüenza
  alternatives_spanish:
  - ha hecho una vergüenza
  - ha causado deshonra
  - ha dado vergüenza
  lexicon: LSJ
  rationale: La expresión griega es idiomática; en español, «ha traído vergüenza» conserva el efecto resultativo y público de αἰσχύνη sin sonar antinatural. «Vergüenza» aquí comunica bien la deshonra pública sobre la casa real.
- source_word: μία γυνὴ τῶν Ἑβραίων
  english_pob_choice: one woman of the Hebrews
  chosen_spanish: una mujer de los hebreos
  alternatives_spanish:
  - una hebrea
  - una de las mujeres hebreas
  lexicon: LSJ
  rationale: Se conserva la singularidad enfática («una mujer») y la identificación étnica («de los hebreos») más de cerca que la forma más fluida «una hebrea», que atenúa el relieve del original.
- source_word: εἰς τὸν οἶκον
  english_pob_choice: on the house
  chosen_spanish: sobre la casa
  alternatives_spanish:
  - contra la casa
  - en la casa
  lexicon: LSJ
  rationale: Con lenguaje de deshonra, «sobre la casa» expresa bien la vergüenza recaída sobre el linaje o la casa real. «En la casa» sería demasiado literal e inapropiado para el sentido.
- source_word: χαμαί
  english_pob_choice: lying on the ground
  chosen_spanish: tendido en el suelo
  alternatives_spanish:
  - postrado en el suelo
  - tirado en el suelo
  lexicon: LSJ
  rationale: χαμαί significa estar en el suelo/terreno. «Tendido en el suelo» preserva la imagen visible con un español natural y sobrio, sin añadir solemnidad o interpretación extra.
- source_word: ἡ κεφαλὴ οὐκ ἔστιν ἐπʼ αὐτῷ
  english_pob_choice: his head is not on him
  chosen_spanish: su cabeza no está sobre él
  alternatives_spanish:
  - no tiene cabeza
  - su cabeza ya no está sobre su cuerpo
  lexicon: LSJ
  rationale: Se mantiene la imagen concreta y chocante del griego, sin explicitar más de lo que el texto dice. «Sobre él» conserva la relación corporal literal que la POB inglesa preservó.
theological_decisions:
- issue: Renderización de δοῦλοι en un contexto narrativo de corte y guerra
  english_pob_reading: the slaves
  chosen_spanish_reading: los esclavos
  alternative_spanish_readings:
  - los sirvientes
  rationale: Se sigue la decisión POB de mantener el valor fuerte de δοῦλοι. En este contexto, el término señala dependencia sometida y no simplemente personal de servicio, por lo que «esclavos» conserva mejor el peso social del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, δοῦλος'
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que intentó suavizar δοῦλοι con «servants», pero la revisión posterior restauró «slaves» por coherencia doctrinal y lexical. Este español sigue esa restauración y conserva la fuerza de δοῦλοι como «esclavos».
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Dios/Yahvé» y la referencia humana aquí, sin introducir terminología eclesiástica ajena al texto.
  - Se conserva un registro bíblico sobrio y directo, evitando paraphraseo expansivo.
  - La puntuación reproduce el corte retórico del griego y del audit trail inglés con una pausa fuerte antes de «Porque, miren».
