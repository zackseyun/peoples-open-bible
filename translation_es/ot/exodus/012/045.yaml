  spanish_quality_summary: El español es claro, pero «de ello» suena algo rígido; aun así, es aceptable en registro legal-bíblico. La mejora principal es usar una expresión más precisa y natural para תּוֹשָׁב y corregir la colocación del marcador de la nota explicativa. «Jornalero» funciona bien para שָׂכִיר.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. La decisión problemática es léxica-contextual: para תּוֹשָׁב conviene «residente extranjero» o «forastero residente» antes que el más vago «forastero». Se conserva «jornalero» y el registro normativo «no comerá».'
