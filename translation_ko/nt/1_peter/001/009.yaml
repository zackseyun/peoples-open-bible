  rationale: 현재 분사로 1:8의 크게 기뻐함의 이유·정황을 가리킨다. 한국어로 자연스럽게 이유 어미 「~때문입니다」로 옮긴다.
- source_word: τὸ τέλος τῆς πίστεως
  english_pob_choice: the outcome of your faith
  chosen_korean: 믿음의 결국
  alternatives_korean:
  - 믿음의 결과
  - 믿음의 목적
  lexicon: BDAG
  rationale: τέλος는 결과·목적·완성을 모두 함의한다. 한국 성서 전통의 「결국」이 그 다층 의미를 가장 잘 담는다.
- source_word: σωτηρίαν ψυχῶν
  english_pob_choice: the salvation of your souls
  chosen_korean: 영혼의 구원
  alternatives_korean:
  - 너희 영혼의 구원
  lexicon: BDAG
  rationale: ψυχή의 신약적 의미(전 인격)를 「영혼」으로 옮기되, 헬라식 이원론으로 좁히지 않는다.
