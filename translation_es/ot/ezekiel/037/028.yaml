translation:
  language: es
  text: Entonces las naciones sabrán que yo soy Yahvé quien santifica a Israel, cuando mi santuario esté en medio de ellos para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: Then ... will know
  chosen_spanish: Entonces ... sabrán
  alternatives_spanish:
  - Y ... sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: El prefijo conjuntivo en discurso profético expresa aquí consecuencia o resultado. «Entonces» conserva ese valor resultativo en español y «sabrán» comunica de manera natural el verbo ידע en este contexto de reconocimiento.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: En Ezequiel, גּוֹיִם designa a los pueblos/naciones fuera de Israel. «Las naciones» es la equivalencia más directa y sobria en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración «Yahvé», siguiendo la norma del proyecto para יְהוָה y evitando la sustitución por un título.
- source_word: מְקַדֵּשׁ
  english_pob_choice: who sanctifies
  chosen_spanish: quien santifica
  alternatives_spanish:
  - quien hace santo
  - quien consagra
  lexicon: HALOT
  rationale: El participio expresa la acción característica de YHWH respecto de Israel. «Santifica» preserva el campo de santidad pactal y la conexión con el santuario mejor que una versión más explicativa.
- source_word: בִּהְיוֹת
  english_pob_choice: when ... is
  chosen_spanish: cuando ... esté
  alternatives_spanish:
  - al estar ...
  - mientras ... esté
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal; «cuando» es la forma más idiomática en español y «esté» refleja adecuadamente el valor de la cláusula.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: «Santuario» conserva el sentido amplio de lugar sagrado sin restringirlo innecesariamente a un edificio concreto, en línea con el contexto visionario de Ezequiel.
- source_word: בְּתוֹכָם
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su interior
  - entre ellos
  lexicon: HALOT
  rationale: La expresión indica presencia locativa y corporativa. «En medio de ellos» reproduce bien esa fuerza y es plenamente natural en español.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: En este contexto restaurador, «para siempre» es claro, digno y fiel al valor temporal de לְעוֹלָם.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La norma del proyecto para español es transcribirlo como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la santificación de Israel y la presencia del santuario
  english_pob_reading: who sanctifies Israel ... when my sanctuary is in their midst forever
  chosen_spanish_reading: quien santifica a Israel ... cuando mi santuario esté en medio de ellos para siempre
  alternative_spanish_readings:
  - quien hace santo a Israel
  - quien consagra a Israel
  rationale: «Santifica» mantiene el vínculo teológico entre la santidad de YHWH, Israel y la presencia del santuario. «En medio de ellos» refleja la idea comunitaria de presencia divina sin borrar el matiz de localidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo y concuerda con la revisión inglesa más reciente que unió «the LORD» con el relativo sin coma; en español se refleja igualmente como una sola unidad: «Yahvé, quien santifica a Israel».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Santuario» se conserva para מִקְדָּשׁ, evitando «templo» por ser más restrictivo.
  - «En medio de ellos» preserva la lectura locativa/comunitaria de בְּתוֹכָם.
  - No se añaden notas al pie porque no hay alternativas textuales que requieran anclaje explícito en esta redacción.
