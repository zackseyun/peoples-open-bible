translation:
  language: es
  text: Ahora bien[a], levántate de noche, tú y el pueblo que está contigo, y ponte al acecho[b] en el campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la noche». La expresión adverbial hebrea señala acción nocturna sin precisar necesariamente «esta noche».
    reason: lexical_alternative
  - marker: b
    text: O «tiende una emboscada» o «embosca». El verbo hebreo significa ponerse al acecho, a menudo con la idea de una emboscada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: Como marcador discursivo de transición e inmediatez, «Ahora pues» conserva el giro exhortativo y la fuerza de paso a una instrucción inmediata sin sonar forzado en español.
- source_word: קוּם
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - levanta
  - alza
  lexicon: HALOT
  rationale: El imperativo singular de קוּם se expresa con naturalidad como «levántate»; mantiene el tono directo de orden y resulta idiomático en español bíblico moderno.
- source_word: לַיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: La forma adverbial indica acción nocturna sin especificar necesariamente «esta noche»; «de noche» comunica bien el valor temporal sin sobreinterpretarlo.
- source_word: וְהָעָם אֲשֶׁר אִתָּךְ
  english_pob_choice: and the people who are with you
  chosen_spanish: y el pueblo que está contigo
  alternatives_spanish:
  - y la gente que está contigo
  - y las tropas que están contigo
  lexicon: HALOT
  rationale: Se conserva עָם como «pueblo» porque es la equivalencia más directa y no se exige precisar «tropas» o «hombres». «Que está contigo» reproduce de manera clara la relación de acompañamiento.
- source_word: וֶאֱרֹב
  english_pob_choice: and lie in wait
  chosen_spanish: y ponte al acecho
  alternatives_spanish:
  - y tiende una emboscada
  - y embosca
  lexicon: HALOT
  rationale: אַרַב expresa el acto de colocarse estratégicamente para emboscar. «Ponerse al acecho» conserva la idea verbal de esperar oculto antes del ataque mejor que un sustantivo como «emboscada».
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el llano
  - en la campaña
  lexicon: HALOT
  rationale: «Campo» es la opción más directa para שָׂדֶה y funciona bien en un contexto táctico sin añadir matices no presentes en el hebreo.
translation_notes:
  revision_awareness: La versión anterior falló porque incluía notas al pie sin marcar correctamente en el texto. En esta corrección, los marcadores [a] y [b] aparecen exactamente en las palabras correspondientes de la traducción.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparezca en el pasaje; aquí no ocurre.
  - «Pueblo» conserva el valor colectivo de עָם sin forzar una militarización explícita.
  - «Ponerse al acecho» preserva la tensión verbal de ארב sin reemplazarla por una formulación más interpretativa.
