translation:
  language: es
  text: Y le escribieron en tablas de bronce[a] para renovar con él la amistad y la alianza que habían establecido con Judas y Jonatán, sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘placas de bronce’. El griego se refiere a tablas escritas de bronce, probablemente para dejar constancia pública y duradera del tratado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψαν
  english_pob_choice: they wrote
  chosen_spanish: escribieron
  alternatives_spanish:
  - inscribieron
  - escribieron por escrito
  lexicon: LSJ
  rationale: El verbo básico significa ‘escribir’. En español, ‘escribieron’ comunica naturalmente el acto sin añadir especificidad que el griego no exige por sí mismo, aunque el soporte de bronce sugiera inscripción formal.
- source_word: δέλτους χαλκᾶς
  english_pob_choice: bronze tablets
  chosen_spanish: tablas de bronce
  alternatives_spanish:
  - tablillas de bronce
  - placas de bronce
  lexicon: LSJ
  rationale: δέλτος es una tablilla o tabla de escritura, y χαλκᾶς indica el material. ‘Tablas de bronce’ conserva el carácter documental y solemne; ‘tablillas’ puede sonar demasiado pequeño en español moderno, mientras que ‘placas’ enfatiza demasiado la forma física.
- source_word: τοῦ ἀνανεώσασθαι
  english_pob_choice: to renew
  chosen_spanish: para renovar
  alternatives_spanish:
  - para reanudar
  - para renovar formalmente
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad. ‘Para renovar’ reproduce bien la intención diplomática del texto, sin sobrecargarla con una paráfrasis.
- source_word: φιλίαν
  english_pob_choice: the friendship
  chosen_spanish: la amistad
  alternatives_spanish:
  - amistad
  - relaciones amistosas
  lexicon: LSJ
  rationale: En contexto diplomático, φιλία alude a una relación formal de amistad o buenas relaciones. ‘La amistad’ mantiene la formulación concreta y concisa del original.
- source_word: συμμαχίαν
  english_pob_choice: the alliance
  chosen_spanish: la alianza
  alternatives_spanish:
  - alianza militar
  - pacto de alianza
  lexicon: LSJ
  rationale: συμμαχία denota una alianza político-militar. ‘La alianza’ es el equivalente español más directo y digno, sin añadir elementos no expresados explícitamente.
- source_word: ἔστησαν
  english_pob_choice: they had established
  chosen_spanish: habían establecido
  alternatives_spanish:
  - concertaron
  - hicieron
  lexicon: LSJ
  rationale: El verbo significa establecer o concertar un acuerdo. ‘Habían establecido’ conserva la referencia a un acuerdo ya vigente que ahora se renueva.
- source_word: πρὸς αὐτόν
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - para con él
  - hacia él
  lexicon: LSJ
  rationale: En el marco de relaciones diplomáticas, πρὸς con acusativo se entiende idiomáticamente como una relación mutua. ‘Con él’ es la opción natural en español.
- source_word: Ἰούδαν καὶ Ἰωνάθαν τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: Judas and Jonathan his brothers
  chosen_spanish: Judas y Jonatán, sus hermanos
  alternatives_spanish:
  - Judas y Jonatán, los hermanos de él
  - Judas y Jonatán, sus hermanos
  lexicon: LSJ
  rationale: La frase identifica a Judas y Jonatán como hermanos del referente. En español, la colocación más clara y natural es posponer ‘sus hermanos’ después de ambos nombres, con coma explicativa.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan plenamente; no se aplicaron revisiones posteriores. Se mantuvo el sentido diplomático de ‘friendship’ y ‘alliance’ como relación formal renovada en un documento permanente de bronce.
  spanish_consistency_notes:
  - Se prefirió ‘tablas de bronce’ en el cuerpo por fidelidad al soporte documental y por fluidez en español; la nota ofrece ‘placas de bronce’ como alternativa legítima.
  - Se mantuvo ‘amistad’ y ‘alianza’ como términos diplomáticos sin sustituirlos por fórmulas eclesiásticas o más interpretativas.
  - 'Se normalizaron los nombres propios bíblicos a la forma habitual en español: Judas y Jonatán.'
