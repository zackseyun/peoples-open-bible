review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la secuencia narrativa, la forma fuente «Huram», el título «rey de Tiro», la comparación con el trato dado a David y la elipsis final explicitada como petición. Sin embargo, «para edificarle una casa donde habitar» desplaza ligeramente la relación sintáctica de לָשֶׁבֶת בּוֹ, que se refiere a la casa misma («para habitar en ella / para morar en ella»), no a un simple relativo locativo. Además, «actuaste con David» suena menos idiomático que «trataste con David» o «hiciste con David», aunque no es infiel.
  spanish_quality_summary: El texto es claro y digno, pero puede sonar más natural y preciso en español bíblico moderno. La mejora principal es ajustar «donde habitar» a «para habitar en ella», que refleja mejor el hebreo y evita una construcción algo suelta. También conviene sustituir «actuaste con David» por «trataste con David» para mayor naturalidad.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Huram» con nota a «Hiram» está bien documentado. No aparecen términos sensibles del glosario mayor.
  issues:
  - severity: medium
    issue: «actuaste con David mi padre» suena menos natural en español que otras opciones.
    rationale: Aunque עשה עם puede verterse como «actuar con», en español de registro bíblico moderno «trataste con David mi padre» comunica mejor la idea relacional sin rigidez.
  - severity: medium
    issue: «donde habitar» no refleja con suficiente precisión לָשֶׁבֶת בּוֹ.
    rationale: El hebreo expresa propósito de residir en la casa; «para habitar en ella» preserva mejor la finalidad y el referente pronominal de בּוֹ.
  revised_spanish_text: 'Entonces Salomón envió a Huram, rey de Tiro[a], diciendo: «Así como trataste con David mi padre y le enviaste cedros para edificarle una casa para habitar en ella, así haz conmigo».'
  revised_footnotes:
  - marker: a
    text: «Huram» sigue la forma hebrea de Crónicas; en 1 Reyes suele aparecer la variante «Hiram».
    reason: alternative_reading
  revision_rationale: 'Se ajusta la redacción para mayor naturalidad y precisión frente al hebreo: «trataste con» expresa mejor עשה עם en español, y «para habitar en ella» conserva con más fidelidad la finalidad de לָשֶׁבֶת בּוֹ y su referencia a la casa.'
