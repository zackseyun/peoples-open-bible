translation:
  language: es
  text: 'Y dijo[a]: «¿Acaso no fue llamado Jacob con razón? Porque me ha suplantado[a] dos veces: tomó mi primogenitura, y he aquí, ahora ha tomado mi bendición». Y dijo: «¿No has reservado una bendición para mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo hace un juego de palabras entre el nombre «Jacob» y el verbo traducido «me ha suplantado». Ese verbo también puede verterse «me ha engañado» o «me ha sobrepasado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִי
  english_pob_choice: Is he not rightly
  chosen_spanish: ¿Acaso no se le llamó ... con razón?
  alternatives_spanish:
  - ¿No se le llamó ... justamente?
  - ¿No fue llamado ... con razón?
  lexicon: HALOT
  rationale: La partícula interrogativa con כִּי aquí introduce una pregunta retórica de reproche. «¿Acaso no... con razón?» preserva el tono idiomático y la fuerza de la pregunta sin volverla demasiado mecánica.
- source_word: קָרָא שְׁמוֹ יַעֲקֹב
  english_pob_choice: named Jacob
  chosen_spanish: se le llamó Jacob
  alternatives_spanish:
  - lo nombraron Jacob
  - fue llamado Jacob
  lexicon: HALOT
  rationale: En español, la pasiva impersonal/ refleja «se le llamó» suena natural y conserva la conexión explícita entre el nombre y el comentario de Esaú.
- source_word: וַיַּעְקְבֵנִי
  english_pob_choice: he has supplanted me
  chosen_spanish: me ha suplantado
  alternatives_spanish:
  - me ha engañado
  - me ha sobrepasado
  lexicon: HALOT
  rationale: «Suplantar» mantiene el juego verbal con el nombre Jacob y expresa la idea de tomar el lugar o ventaja del otro, tal como la POB inglesa documenta. Se preserva la tensión léxica entre el nombre y el verbo.
- source_word: זֶה פַעֲמַיִם
  english_pob_choice: these two times
  chosen_spanish: dos veces
  alternatives_spanish:
  - estas dos veces
  - dos ocasiones
  lexicon: HALOT
  rationale: El español fluye mejor con «dos veces»; el énfasis de «esto / estas» en hebreo queda implícito por el contexto y la repetición enfática.
- source_word: בְּכֹרָתִי
  english_pob_choice: my birthright
  chosen_spanish: mi primogenitura
  alternatives_spanish:
  - mis derechos de primogénito
  - mi derecho de primogenitura
  lexicon: HALOT
  rationale: «Primogenitura» es el equivalente jurídico-familiar estándar y plenamente inteligible en español bíblico contemporáneo.
- source_word: לָקָח
  english_pob_choice: he took / he has taken
  chosen_spanish: me quitó / me ha quitado
  alternatives_spanish:
  - tomó
  - se llevó
  lexicon: HALOT
  rationale: En este lamento, «quitar» transmite la pérdida sufrida por Esaú con mayor naturalidad que un mero «tomar», y corresponde al valor contextual de la queja.
- source_word: וְהִנֵּה עַתָּה
  english_pob_choice: and behold, now
  chosen_spanish: y mira, ahora
  alternatives_spanish:
  - y he aquí, ahora
  - y he aquí que ahora
  lexicon: HALOT
  rationale: «Mira» refleja היטב la interjección deíctica de הִנֵּה en un español vivo y solemne a la vez; «ahora» conserva la progresión temporal.
- source_word: בִּרְכָתִי
  english_pob_choice: my blessing
  chosen_spanish: mi bendición
  alternatives_spanish:
  - mi bendición patriarcal
  - la bendición que me correspondía
  lexicon: HALOT
  rationale: «Bendición» es el sustantivo directo y suficiente en el contexto patriarcal; no requiere ampliación explicativa en el texto base.
- source_word: הֲלֹא אָצַלְתָּ לִּי בְּרָכָה
  english_pob_choice: Have you not reserved a blessing for me?
  chosen_spanish: ¿No has reservado una bendición para mí?
  alternatives_spanish:
  - ¿No has apartado una bendición para mí?
  - ¿No te has guardado una bendición para mí?
  lexicon: HALOT
  rationale: «Reservado» conserva la idea de retener o dejar aparte algo para otro, en línea con la lectura auditada de אָצַל. La formulación es natural y mantiene la súplica de Esaú.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada de la POB inglesa: se mantiene la pregunta retórica reforzada con la negación, se conserva el registro formal de «he aquí / mira» y se preserva el cierre con la idea de una bendición aún reservada para Esaú. Se traduce directamente desde el hebreo, tomando la POB inglesa como control de decisiones léxicas y no como base mecánica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se prefiere «bendición» para בִּרְכָה/בִּרְכָתִי por coherencia con el campo semántico patriarcal.
  - Se mantiene «suplantado» como equivalente principal para preservar el juego de palabras con יעקב.
  - La puntuación con comillas angulares se ajusta al uso editorial en español bíblico contemporáneo.
