revisions:
- from: Toda persona que coma sangre alguna, esa persona será cortada[a][b] de entre su pueblo.
  to: Toda persona[a] que coma cualquier sangre, esa persona será cortada[b] de entre su pueblo.
  rationale: Se ajusta «sangre alguna» a «cualquier sangre» para un español más natural y se reubican las notas para anclar mejor las decisiones léxica y teológica sin cambiar el sentido. Se conserva «será cortada» para mantener la fórmula sancionadora tradicional y su ambigüedad deliberada.
