translation:
  language: es
  text: Lo veo, pero no ahora; lo contemplo, pero no cerca. Una estrella saldrá de Jacob, y un cetro se levantará de Israel; aplastará los rincones[a] de Moab y derribará a todos los hijos de Set[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los rincones/corners de Moab», probablemente una expresión figurada por los extremos o la fuerza de Moab.'
    reason: cultural_note
  - marker: b
    text: O «todos los hijos de Seth». El hebreo שֵׁת puede leerse como el nombre propio Set/Seth; algunos lo entienden más ampliamente como una designación poética de la humanidad o de un pueblo hostil.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶרְאֶנּוּ
  english_pob_choice: I see him
  chosen_spanish: Lo veo
  alternatives_spanish:
  - Lo veré
  - Lo estoy viendo
  lexicon: HALOT
  rationale: El hebreo usa un imperfecto con sufijo de tercera persona masculina singular; en contexto profético puede expresarse con valor presente vívido en español. Conservé el referente personal con «lo» para no neutralizarlo.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - por ahora
  lexicon: HALOT
  rationale: Adverbio temporal directo. «Ahora» mantiene la oposición con «no» sin sobrerinterpretar el matiz temporal.
- source_word: אֲשׁוּרֶנּוּ
  english_pob_choice: I behold him
  chosen_spanish: lo observo
  alternatives_spanish:
  - lo contemplo
  - lo miro
  lexicon: HALOT
  rationale: שׁור tiene la idea de mirar fijamente, observar o contemplar. Elegí «observo» para conservar la segunda percepción verbal sin repetir exactamente «veo».
- source_word: קָרוֹב
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - pronto
  - próximo
  lexicon: HALOT
  rationale: En la cláusula negativa la cercanía es temporal y espacial a la vez; «cerca» conserva esa ambigüedad mejor que «pronto».
- source_word: דָּרַךְ כּוֹכָב
  english_pob_choice: A star shall come forth
  chosen_spanish: Una estrella saldrá
  alternatives_spanish:
  - Una estrella aparecerá
  - Una estrella se levantará
  lexicon: HALOT
  rationale: דָּרַךְ, aplicado a «estrella», comunica la idea de salir/avanzar/emerger. «Saldrá» es español natural y mantiene la imagen astral sin explicarla.
- source_word: כּוֹכָב
  english_pob_choice: star
  chosen_spanish: estrella
  alternatives_spanish:
  - astro
  lexicon: HALOT
  rationale: Traducción literal de la imagen; se conserva la metáfora real sin interpretarla en el texto principal.
- source_word: וְקָם שֵׁבֶט
  english_pob_choice: and a scepter shall rise
  chosen_spanish: y un cetro se levantará
  alternatives_spanish:
  - y un cetro surgirá
  - y un bastón real se levantará
  lexicon: HALOT
  rationale: שֵׁבֶט aquí funciona con sentido real de bastón/cetro. «Cetro» preserva la imagen regia de forma clara y natural para el español.
- source_word: מִיַּעֲקֹב / מִיִּשְׂרָאֵל
  english_pob_choice: from Jacob / from Israel
  chosen_spanish: de Jacob / de Israel
  alternatives_spanish:
  - desde Jacob / desde Israel
  - de parte de Jacob / de parte de Israel
  lexicon: HALOT
  rationale: La preposición מן indica origen. «De» es la forma más directa y natural en español, y mantiene el paralelismo poético.
- source_word: וּמָחַץ
  english_pob_choice: it shall crush
  chosen_spanish: aplastará
  alternatives_spanish:
  - quebrará
  - destrozará
  lexicon: HALOT
  rationale: מחץ expresa golpear con fuerza y triturar/romper. «Aplastará» comunica esa violencia con precisión y fluidez, sin imponer más especificidad que el hebreo.
- source_word: פַּאֲתֵי מוֹאָב
  english_pob_choice: the corners of Moab
  chosen_spanish: las esquinas de Moab
  alternatives_spanish:
  - los costados de Moab
  - las fronteras de Moab
  lexicon: HALOT
  rationale: פֵּאָה significa esquina, borde o lado. «Esquinas» conserva la literalidad metáforica del hebreo y la transparencia textual del audit trail.
- source_word: וְקַרְקַר
  english_pob_choice: tear down
  chosen_spanish: derribará
  alternatives_spanish:
  - destruirá
  - demolerá
  - arrasará
  lexicon: HALOT
  rationale: El verbo es raro y su sentido exacto es discutido; «derribará» recoge la idea de abatir/demoler sin afirmar más de lo seguro.
- source_word: כָּל בְּנֵי שֵׁת
  english_pob_choice: all the sons of Sheth
  chosen_spanish: a todos los hijos de Set
  alternatives_spanish:
  - a todos los hijos de Sheth
  - a todos los hijos de Seth
  lexicon: HALOT
  rationale: La consonantización permite leer el nombre propio como Set/Seth. En español, «Set» es la forma tradicional del nombre bíblico y evita una transliteración menos natural.
theological_decisions:
- issue: Fuerza mesiánica del oráculo de Balaam
  english_pob_reading: Retain the royal imagery in the main text without explicitly identifying the referent as the Messiah.
  chosen_spanish_reading: Mantener la imaginería real en el texto principal sin identificar explícitamente al referente como el Mesías.
  alternative_spanish_readings:
  - Interpretar el versículo directamente como una profecía del Mesías
  - Identificarlo de manera explícita con un rey histórico concreto
  rationale: El hebreo presenta imágenes reales y de conquista, pero no nombra al Mesías. La traducción española conserva esa tensión para no adelantar una identificación teológica que pertenece a la interpretación, no al enunciado inmediato.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Referencia del sujeto final y de los verbos de conquista
  english_pob_reading: Use personal language in the opening but allow the later symbolic subjects to stand without explicit identification.
  chosen_spanish_reading: Conservar el tono personal en la apertura («Lo veo… lo observo…») y dejar luego la imagen simbólica («estrella», «cetro») sin explicitar más.
  alternative_spanish_readings:
  - 'Hacer todo el verso explícitamente personal: «él aplastará»'
  - 'Hacer todo el verso impersonal: «aplastará» sin sujeto visible'
  rationale: La primera mitad sugiere un objeto masculino singular visto en visión; la segunda usa sujetos simbólicos. El español mantiene ambos niveles sin nivelarlos en una sola lectura.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Tomé en cuenta la revisión auditada del inglés POB que cambió los verbos principales a futuro («shall come forth», «shall rise») para reflejar mejor el sentido profético. Por eso el español usa futuro («saldrá», «se levantará», «aplastará», «derribará») y mantiene la coherencia verbal del anuncio. También preservé la tensión entre la referencia personal inicial y el simbolismo real posterior.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Conservé la imagen de «estrella» y «cetro» sin explicitar «Mesías» en el texto principal.
  - Elegí el nombre bíblico «Set» en la línea principal para fluidez española, pero dejé la alternativa transliterada en la nota.
  - Mantuve un registro sobrio y publicable, evitando paráfrasis interpretativas excesivas.
