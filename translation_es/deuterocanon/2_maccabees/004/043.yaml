translation:
  language: es
  text: Por esta causa, hirieron a muchos de ellos[a], derribaron a algunos y a todos los hicieron huir; y apresaron al mismo ladrón del templo junto al tesoro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sacrílego». El término griego puede designar a quien comete sacrilegio, especialmente robando un templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ἣν αἰτίαν
  english_pob_choice: For this reason
  chosen_spanish: Por esta causa
  alternatives_spanish:
  - Por eso
  - Por lo cual
  lexicon: LSJ
  rationale: Expresa la relación causal del griego de manera natural en español, conservando el nexo retrospectivo con el contexto previo sin añadir información.
- source_word: τραυματίας ἐποίησαν
  english_pob_choice: wounded
  chosen_spanish: hirieron
  alternatives_spanish:
  - los dejaron heridos
  - los lastimaron
  lexicon: LSJ
  rationale: El giro griego literalmente significa ‘los hicieron heridos’; en español, ‘hirieron’ comunica la herida física de forma directa y digna, más cercana al registro narrativo que ‘lastimaron’.
- source_word: κατέβαλον
  english_pob_choice: struck down
  chosen_spanish: derribaron
  alternatives_spanish:
  - derribaron al suelo
  - los abatieron
  lexicon: LSJ
  rationale: El verbo tiene la idea de hacer caer o derribar. ‘Derribaron’ conserva la fuerza violenta sin decidir explícitamente si el resultado fue la muerte.
- source_word: εἰς φυγὴν συνήλασαν
  english_pob_choice: drove them all into flight
  chosen_spanish: a todos los hicieron huir
  alternatives_spanish:
  - los pusieron en fuga
  - los hicieron retroceder en huida
  lexicon: LSJ
  rationale: La expresión griega indica forzar la huida. ‘Los hicieron huir’ es una forma natural en español que preserva el sentido de expulsión y derrota colectiva.
- source_word: τὸν ἱερόσυλον
  english_pob_choice: the temple-robber
  chosen_spanish: al mismo profanador del templo
  alternatives_spanish:
  - al mismo sacrílego
  - al mismo saqueador del templo
  lexicon: LSJ
  rationale: El término griego puede implicar sacrilegio y robo del templo. ‘Profanador del templo’ mantiene la carga religiosa y evita reducirlo solo al robo material, aunque el contexto lo presupone.
- source_word: παρὰ τὸ γαζοφυλάκιον
  english_pob_choice: beside the treasury
  chosen_spanish: junto al tesoro
  alternatives_spanish:
  - junto al tesoro del templo
  - cerca del tesoro
  lexicon: LSJ
  rationale: γαζοφυλάκιον se refiere al tesoro o cámara del tesoro. ‘Tesoro’ es suficientemente claro en español y mantiene la localización espacial de παρά sin introducir un detalle arquitectónico no explícito.
- source_word: ἐχειρώσαντο
  english_pob_choice: they seized
  chosen_spanish: apresaron
  alternatives_spanish:
  - capturaron
  - tomaron prisionero
  lexicon: LSJ
  rationale: El verbo medio expresa que lo pusieron en sus manos, es decir, lo prendieron o capturaron. ‘Apresaron’ resulta natural en español y conserva el matiz de captura inmediata.
theological_decisions:
- issue: Sentido de ἱερόσυλος en un contexto de conflicto por bienes del templo
  english_pob_reading: the temple-robber
  chosen_spanish_reading: profanador del templo
  alternative_spanish_readings:
  - sacrílego
  - saqueador del templo
  rationale: La escena no solo describe robo, sino una acción contra lo sagrado vinculada al tesoro del templo. ‘Profanador del templo’ conserva la dimensión religiosa y la tensión entre sacrilegio y expolio que el griego sugiere.
  doctrine_reference: 'Principio POB: primacía del idioma original y preservación de tensiones léxicas cuando el texto las contiene.'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvo la causalidad de διʼ ἣν αἰτίαν, la violencia no especificada hasta la muerte de κατέβαλον, y la ambigüedad sacrilegio/robo de ἱερόσυλος en una forma española publicable. No se registran revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» según corresponda; este versículo no contiene ambos términos.
  - Se conservó «tesoro» para γαζοφυλάκιον por claridad y porque el contexto ya sitúa el espacio del templo.
  - Se evitó ‘mataron’ porque el griego no lo dice explícitamente.
  - Se evitó ‘siervo’ o vocabulario eclesiástico no pertinente; el tono narrativo militar se mantuvo en español contemporáneo digno.
