translation:
  language: es
  text: Los malvados se inclinan ante los buenos[a], y los impíos, a las puertas del justo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “se postran ante los buenos”. El verbo hebreo puede expresar una inclinación muy profunda, incluso postración.
    reason: lexical_alternative
  - marker: b
    text: “A las puertas del justo” puede sugerir llegada en dependencia, súplica o reconocimiento de la posición del justo.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁחוּ
  english_pob_choice: bow down
  chosen_spanish: se inclinan
  alternatives_spanish:
  - se postran
  - se inclinan profundamente
  lexicon: HALOT
  rationale: El verbo señala una inclinación profunda o postración. En español, "se inclinan" comunica la humillación sin forzar una formulación demasiado técnica; la alternativa "se postran" conserva más fuerza literal, pero puede sonar más marcada de lo que el contexto exige.
- source_word: רָעִים
  english_pob_choice: the evil
  chosen_spanish: los malvados
  alternatives_spanish:
  - los malos
  - los malhechores
  lexicon: HALOT
  rationale: El adjetivo funciona de manera sustantivada y designa personas malvadas. "Los malvados" es natural en español y mantiene el tono proverbial y moral del hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: '"Ante" reproduce bien la relación espacial y de sometimiento implícita en la escena de inclinarse. Es más sobrio y bíblico que una paráfrasis explicativa.'
- source_word: טוֹבִים
  english_pob_choice: the good
  chosen_spanish: los buenos
  alternatives_spanish:
  - los justos
  - los rectos
  lexicon: HALOT
  rationale: El sustantivo adjetival se mantiene como grupo humano contrapuesto a "los malvados". "Los buenos" conserva la brevedad del paralelismo y la oposición proverbial.
- source_word: וּרְשָׁעִים
  english_pob_choice: and the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - y los malvados
  - y los perversos
  lexicon: HALOT
  rationale: '"Impíos" refleja bien רְשָׁעִים en contexto sapiencial y evita repetir "malvados" en la segunda cola. La variación léxica en español mantiene el paralelo sin perder el sentido.'
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: a las
  alternatives_spanish:
  - junto a las
  - en las
  lexicon: HALOT
  rationale: Con "puertas" y un verbo implícito de postura, la preposición expresa ubicación en el umbral o lugar de espera. "A las" reproduce el valor idiomático de acercamiento y dependencia.
- source_word: שַׁעֲרֵי
  english_pob_choice: the gates of
  chosen_spanish: las puertas de
  alternatives_spanish:
  - las entradas de
  - los portales de
  lexicon: HALOT
  rationale: '"Puertas" es el equivalente natural en español y puede abarcar el acceso o el espacio de entrada, como en el hebreo proverbial. Se conserva el plural formal del original.'
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - los justos
  - la persona justa
  lexicon: HALOT
  rationale: El singular adjetival sustantivado apunta a una figura representativa. "El justo" es la forma más directa y fiel en español para mantener el contraste con "los impíos".
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés. Se conserva el paralelismo proverbial, el matiz de humillación del verbo inicial y la ambigüedad cultural de estar a las puertas del justo, sin añadir explicación interpretativa al cuerpo principal.
  spanish_consistency_notes:
  - Se usó "malvados/impíos" para evitar una repetición plana y preservar el paralelismo semántico.
  - Se mantuvo "justo" en singular para reflejar el sustantivo adjetival hebreo.
  - '"Puertas" conserva el valor proverbial de umbral o lugar de acceso, no solo una entrada física.'
