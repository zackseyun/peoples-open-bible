translation:
  language: es
  text: 'Pero al rey de Judá, que los envió a consultar a Yahvé[a], así le dirán: «Así dice Yahvé, el Dios de Israel: En cuanto a las palabras que has oído—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «a buscar a Yahvé» o «a inquirir de Yahvé». El verbo hebreo puede abarcar tanto la idea de buscar como la de consultar en un contexto profético.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: But to
  chosen_spanish: Pero al
  alternatives_spanish:
  - Y al
  - Ahora bien, al
  lexicon: HALOT
  rationale: La conjunción ו con אֶל introduce aquí un giro de destinatario dentro del discurso. En español, «Pero al» conserva el matiz de transición contrastiva y la dirección del complemento sin sonar forzado.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: the king of Judah
  chosen_spanish: el rey de Judá
  alternatives_spanish:
  - Judá́'s king
  - el monarca de Judá
  lexicon: HALOT
  rationale: 'La cadena constructa se vierte de forma directa y natural en español: «el rey de Judá». Mantiene el referente político sin añadir interpretación.'
- source_word: הַשֹּׁלֵחַ אֶתְכֶם
  english_pob_choice: who sent you
  chosen_spanish: que los envió
  alternatives_spanish:
  - el que los envía
  - que los mandó
  lexicon: HALOT
  rationale: El participio con artículo identifica al rey como el que envió a la delegación. En español, la relativa simple «que los envió» transmite bien la función atributiva y el pasado del envío.
- source_word: לִדְרֹשׁ בַּיהוָה
  english_pob_choice: to inquire of Yahweh
  chosen_spanish: a consultar a Yahvé
  alternatives_spanish:
  - a inquirir de Yahvé
  - a buscar a Yahvé
  - a consultar a Yahvé
  lexicon: HALOT
  rationale: דרשׁ con ב puede abarcar buscar/consultar/inquirir en contexto profético. «Consultar a Yahvé» es una forma española clara y digna para la acción de pedir respuesta divina. Se conserva «Yahvé» por la norma del proyecto para יהוה.
- source_word: בַּיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según el estándar del proyecto como «Yahvé», no como una sustitución litúrgica.
- source_word: כֹּה תֹאמְרוּ אֵלָיו
  english_pob_choice: thus you shall say to him
  chosen_spanish: así le dirán
  alternatives_spanish:
  - de esta manera le dirán
  - esto le dirán
  lexicon: HALOT
  rationale: La fórmula mensajera profética כֹּה + אמר se preserva con «así». El plural en español concuerda con la delegación implícita en «a ustedes»/«los» y mantiene el mandato directo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se mantiene en presente, como en la estructura hebrea empleada para introducir el oráculo. «Así dice Yahvé» es la equivalencia española más estable y transparente.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Identificación covenantal estándar de YHWH; «el Dios de Israel» es la correspondencia directa y natural en español.
- source_word: הַדְּבָרִים אֲשֶׁר שָׁמָעְתָּ
  english_pob_choice: Regarding the words that you have heard—
  chosen_spanish: En cuanto a las palabras que has oído—
  alternatives_spanish:
  - Respecto de las palabras que has oído—
  - Acerca de las palabras que has oído—
  lexicon: HALOT
  rationale: La cláusula hebrea queda suspendida y continúa en el versículo siguiente. «En cuanto a» conserva la topicalización y la apertura oracular sin completar artificialmente la frase.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa explícitamente יהוה. La traducción española adopta «Yahvé» conforme al estándar editorial del proyecto, preservando el nombre propio del pacto y evitando la sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula profética de mensajero
  english_pob_reading: Thus you shall say to him / Thus says Yahweh
  chosen_spanish_reading: así le dirán / Así dice Yahvé
  alternative_spanish_readings:
  - de esta manera le dirán / Así ha dicho Yahvé
  - esto le dirán / Esto dice Yahvé
  rationale: La doble fórmula hebrea introduce mandato y oráculo. Se conserva la estructura tradicional «así... Así dice...» porque es la forma más fiel y reconocible del discurso profético sin diluir su fuerza.
  doctrine_reference: POB style guidance on prophetic formulae and discourse flow
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del paquete inglés, que afinó el arranque a «Thus» y la cláusula final a una formulación de referencia abierta. Por eso el español mantiene una transición breve («Pero al...») y una clausula suspendida («En cuanto a...—») que deja el enunciado abierto hacia el versículo siguiente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera uniforme para יהוה.
  - Se preserva la fórmula profética con «Así dice Yahvé» para mantener consistencia interversicular.
  - «Consultar a Yahvé» está anclado con nota por la alternativa semántica de דרשׁ.
  - El cierre en raya emula la suspensión del hebreo y del inglés POB revisado.
  - Se prefirió «el rey de Judá» sobre inversiones más marcadas para claridad pública.
