translation:
  language: es
  text: Mira[a], te he hecho un trillo nuevo y afilado, con dobles filos; trillarás los montes y los triturarás, y harás los collados como tamo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con muchos filos' o 'con filos dentados'; el hebreo dice literalmente 'poseedor de bocas/filos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: Como marcador discursivo profético, se traduce con una exhortación atenta y natural en español. 'Mira' conserva la fuerza de llamada de atención de 'Behold' sin sonar arcaico o forzado.
- source_word: שַׂמְתִּיךְ
  english_pob_choice: I have made you into
  chosen_spanish: te he hecho
  alternatives_spanish:
  - te he puesto como
  - te he hecho para
  lexicon: HALOT
  rationale: שׂוּם puede significar 'poner' o 'hacer'. En esta construcción metafórica, 'te he hecho' comunica transformación resultativa de manera más natural en español que una equivalencia más literal pero pesada.
- source_word: לְמוֹרַג
  english_pob_choice: a ... threshing sledge
  chosen_spanish: una nueva trilla
  alternatives_spanish:
  - un trillo nuevo
  - un trillo de trillar
  - una máquina de trillar
  lexicon: HALOT
  rationale: מוֹרַג designa un instrumento de trilla; en español, 'trilla' / 'trillo' puede comunicar mejor la imagen agrícola que 'rastra de trillar' o un tecnicismo demasiado largo. Se conserva el carácter de instrumento.
- source_word: חָרוּץ
  english_pob_choice: sharp
  chosen_spanish: aguda
  alternatives_spanish:
  - afilada
  - punzante
  - cortante
  lexicon: HALOT
  rationale: El adjetivo modifica el instrumento de trilla y comunica capacidad de corte. 'Aguda' mantiene la imagen de filo/corte de forma fluida en español.
- source_word: חָדָשׁ
  english_pob_choice: new
  chosen_spanish: nueva
  alternatives_spanish:
  - nuevo
  lexicon: HALOT
  rationale: Adjetivo directo y concordante con el sustantivo femenino implícito en 'trilla'.
- source_word: בַּעַל פִּיפִיּוֹת
  english_pob_choice: with double edges
  chosen_spanish: con dobles filos
  alternatives_spanish:
  - con muchos filos
  - con filos dentados
  - con dientes cortantes
  lexicon: HALOT
  rationale: La expresión literal apunta a 'poseedor de bocas/filos', es decir, múltiples aristas de corte. 'Dobles filos' sigue la decisión inglesa de no sobreexplicar la construcción, pero preserva la noción de capacidad cortante múltiple.
- source_word: תָּדוּשׁ
  english_pob_choice: you will thresh
  chosen_spanish: trillarás
  alternatives_spanish:
  - molerás
  - desmenuzarás
  lexicon: HALOT
  rationale: דּוּשׁ es el verbo técnico de trillar. 'Trillarás' mantiene el campo agrícola y la fuerza concreta del original.
- source_word: הָרִים
  english_pob_choice: mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: Se conserva el valor literal y poético del sustantivo en plural. 'Montes' suena natural en registro bíblico y conserva el paralelismo con 'collados'.
- source_word: וְתָדֹק
  english_pob_choice: and crush them
  chosen_spanish: los triturarás
  alternatives_spanish:
  - los harás polvo
  - los desmenuzarás
  - los aplastarás
  lexicon: HALOT
  rationale: דקק implica reducir a fragmentos o polvo. 'Triturar' refleja bien la intensidad del verbo y encaja con la imagen de trilla sin reinterpretarla.
- source_word: גְבָעוֹת
  english_pob_choice: hills
  chosen_spanish: los collados
  alternatives_spanish:
  - las colinas
  - los cerros
  lexicon: HALOT
  rationale: '''Collados'' es un término bíblico y comprensible que preserva el paralelismo poético con ''montes''.'
- source_word: כַּמֹּץ
  english_pob_choice: like chaff
  chosen_spanish: como paja
  alternatives_spanish:
  - como hojarasca
  - como tamo
  - como cascarilla
  lexicon: HALOT
  rationale: מוֹץ es técnicamente 'tamo/paja menuda' o 'cascarilla'. En español, 'paja' es más accesible, aunque algo más amplia; se opta por un término publicable y claro en el poema.
- source_word: תָּשִׂים
  english_pob_choice: you will make
  chosen_spanish: pondrás
  alternatives_spanish:
  - harás
  - volverás
  - los pondrás
  lexicon: HALOT
  rationale: שׂוּם aquí expresa hacer quedar en cierto estado. 'Pondrás' permite una construcción poética natural en español y mantiene la idea resultativa del verbo.
theological_decisions:
- issue: Metáfora agrícola aplicada al poder concedido por Dios
  english_pob_reading: Retain the concrete agricultural metaphor in the main text rather than interpretively rendering its meaning.
  chosen_spanish_reading: Conservar la imagen concreta de trilla y trituración en el texto principal.
  alternative_spanish_readings:
  - Interpretar explícitamente los montes como enemigos o naciones
  - Parafrasear como una victoria sobre obstáculos
  rationale: El hebreo presenta una imagen poética sin explicar sus referentes. Mantenerla en español preserva la tensión literaria y teológica, evitando resolver el símbolo más allá de lo que el texto dice.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y poética en lugar de resolverla interpretativamente.'
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés que simplificó la sintaxis ('I have made you a...') y mantuvo el artículo definido en 'los montes' y 'los collados'. En español se conservó el paralelismo y la imagen agrícola, pero se eligieron equivalentes naturales ('trillarás', 'triturarás', 'paja') para un registro bíblico moderno y legible.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' en otros contextos del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Montes'' y ''collados'' mantienen el paralelismo poético del hebreo.'
  - '''Trillar'' se usa en sentido técnico agrícola, coherente con la metáfora del pasaje.'
  - La nota de pie preserva la alternativa lexical documentada sobre 'filos' y 'bocas' del hebreo.
