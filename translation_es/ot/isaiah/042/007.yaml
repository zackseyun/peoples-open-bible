  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Las decisiones léxicas clave están en línea con el audit trail: «abrir», «ojos ciegos», «sacar», «un preso», «casa de prisión», «tinieblas». La mejor corrección es cambiar «confinación» por «encierro», que sigue reflejando el valor amplio de מַסְגֵּר sin imponer una estructura específica como «cárcel».'
