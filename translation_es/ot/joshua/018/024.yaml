revisions:
- from: 'Y Chefar-ammoní[a], Ofni y Geba: doce ciudades con sus aldeas.'
  to: 'Y Chefar-amoni[a], Ofni y Geba: doce ciudades con sus aldeas.'
  rationale: 'Se ajusta el primer topónimo para alinearlo con la decisión auditada del POB («Chephar-ammoni») en una forma española más natural y consistente: «Chefar-amoni». También se reemplaza la nota por una variante de transliteración real, conforme al propósito de lexical_alternative. El resto del versículo está bien y no requiere cambios.'
  reviewer_model: gpt-5.4
