translation:
  language: es
  text: Si tus hijos pecaron contra él, los entregó en manos de su transgresión.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los entregó al poder de su transgresión». El hebreo dice literalmente «en la mano de su transgresión».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Pues si
  - En caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición hipotética; «si» conserva su fuerza normal en español sin añadir causalidad que el hebreo no expresa.
- source_word: בָּנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos (varones)
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus hijos» en forma masculina plural. En español, «hijos» comunica de manera natural el referente masculino plural sin endurecer innecesariamente la lectura; la forma específica queda preservada en la nota léxica.
- source_word: חָטְאוּ
  english_pob_choice: sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - han pecado
  - cometieron pecado
  lexicon: HALOT
  rationale: «Pecaron» refleja bien el aoristo/pretérito hebreo en una cláusula condicional y evita la sobrelectura aspectual de un perfecto compuesto.
- source_word: לוֹ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - a él
  - contra Dios
  lexicon: HALOT
  rationale: Con חטא, ל marca al ofendido; en español, «pecaron contra él» reproduce el valor relacional y mantiene el referente implícito sin explicitarlo en el texto principal.
- source_word: וַיְשַׁלְּחֵם
  english_pob_choice: he gave them over
  chosen_spanish: los entregó
  alternatives_spanish:
  - los envió
  - los entregó al poder de
  lexicon: HALOT
  rationale: Aunque el verbo básico es «enviar», el giro con «en mano de» expresa una acción de entrega o abandono a una fuerza adversa. «Los entregó» conserva esa fuerza judicial mejor que una traducción meramente direccional.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en el poder de
  - en manos de
  lexicon: HALOT
  rationale: La metáfora hebrea de «mano» se mantiene para no perder el modismo. «En mano de» es más literal que «en el poder de» y conserva la imaginería del texto.
- source_word: פִּשְׁעָם
  english_pob_choice: their transgression
  chosen_spanish: su transgresión
  alternatives_spanish:
  - su rebelión
  - su pecado
  lexicon: HALOT
  rationale: «Transgresión» preserva el matiz de פשע como ruptura culpable o rebelión, más específico que el término general «pecado». El singular español puede funcionar como sustantivo colectivo/abstracto para reflejar el idiomático «su transgresión».
theological_decisions:
- issue: Referente de «él» en «pecaron contra él»
  english_pob_reading: The pronoun refers to God, while preserving the Hebrew pronoun in the main text.
  chosen_spanish_reading: El pronombre queda formalmente implícito en la referencia textual, con el antecedente entendido por el contexto como Dios.
  alternative_spanish_readings:
  - Si tus hijos pecaron contra Dios
  - Si tus hijos pecaron contra él (con nota explícita)
  rationale: En español, conservar «contra él» respeta el paralelo hebreo y evita resolver en el cuerpo del texto lo que el hebreo deja dependiente del contexto; así se mantiene la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Preservar la ambigüedad formal del antecedente cuando el contexto la sostiene; primacía del texto fuente sobre la explicitación interpretativa.
- issue: Expresión idiomática «en mano de»
  english_pob_reading: he gave them over into the hand of their transgression
  chosen_spanish_reading: los entregó en mano de su transgresión
  alternative_spanish_readings:
  - los entregó al poder de su transgresión
  - los entregó en manos de su transgresión
  rationale: La expresión mantiene el hebraísmo auditable de «mano» y, a la vez, comunica que la propia transgresión funciona como esfera o poder de su ruina. No se introduce una explicación doctrinal más específica que la que ofrece el texto.
  doctrine_reference: Conservar la tensión entre acto divino y consecuencia moral sin sobreinterpretar el mecanismo retributivo.
translation_notes:
  revision_awareness: El texto base inglés se mantuvo sin cambios en la revisión más reciente; el juicio de revisión fue de acuerdo sustancial con observaciones menores, por lo que la presente versión española sigue de cerca la solución auditada sin introducir nuevas interpretaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino explícito; aquí el referente se deja como «él» por la propia economía del hebreo.
  - Se conserva «transgresión» para פשע y no se rebaja a «pecado», a fin de respetar la distinción lexical documentada respecto de חטא.
  - Se usa «entregó» para reflejar el valor judicial del giro hebreo sin traducirlo mecánicamente como un simple «envió».
