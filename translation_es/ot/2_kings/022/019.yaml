translation:
  language: es
  text: Porque tu corazón fue tierno, y te humillaste delante de Yahvé cuando oíste lo que hablé contra este lugar y contra sus habitantes, que llegarían a ser una desolación[a] y una maldición, y porque rasgaste tus vestidos y lloraste delante de mí, yo también te he oído, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un horror y una maldición», o «un asombro y una maldición». El hebreo שַׁמָּה puede denotar desolación, horror o un objeto de asombro en contextos de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base causal de la respuesta divina. «Porque» es natural en español y conserva con claridad la relación de motivo.
- source_word: רַךְ לְבָבְךָ
  english_pob_choice: your heart was tender
  chosen_spanish: tu corazón fue tierno
  alternatives_spanish:
  - tu corazón fue suave
  - tu corazón fue sensible
  lexicon: HALOT
  rationale: El hebreo describe una disposición interior blanda/receptiva. «Tierno» mantiene la metáfora y refleja bien la respuesta contrita de Josías sin añadir fuerza interpretativa excesiva.
- source_word: וַתִּכָּנַע
  english_pob_choice: you humbled yourself
  chosen_spanish: te humillaste
  alternatives_spanish:
  - te sometiste
  - fuiste humillado
  lexicon: HALOT
  rationale: El matiz reflexivo señala una acción voluntaria delante de Dios. «Te humillaste» es idiomático y conserva la fuerza de arrepentimiento y sumisión.
- source_word: מִפְּנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La expresión con «rostro/presencia» funciona como un modismo de estar delante de Dios. Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: בְּשָׁמְעֲךָ
  english_pob_choice: when you heard
  chosen_spanish: cuando oíste
  alternatives_spanish:
  - al oír
  - cuando escuchaste
  lexicon: HALOT
  rationale: La construcción temporal se vierte de manera natural con «cuando oíste», conservando el valor circunstancial del original.
- source_word: אֲשֶׁר דִּבַּרְתִּי
  english_pob_choice: what I spoke
  chosen_spanish: lo que hablé
  alternatives_spanish:
  - lo que dije
  - aquello que hablé
  lexicon: HALOT
  rationale: Se refiere al contenido del anuncio profético. «Lo que hablé» es formal y fiel al verbo de habla profética.
- source_word: עַל הַמָּקוֹם הַזֶּה וְעַל יֹשְׁבָיו
  english_pob_choice: against this place and against its inhabitants
  chosen_spanish: contra este lugar y contra sus habitantes
  alternatives_spanish:
  - acerca de este lugar y de sus habitantes
  lexicon: HALOT
  rationale: En contextos de juicio, עַל con דבר tiene sentido adversativo. «Contra» hace explícita la fuerza amenazante del pronunciamiento.
- source_word: לִהְיוֹת לְשַׁמָּה וְלִקְלָלָה
  english_pob_choice: that they would become a desolation and a curse
  chosen_spanish: que llegarían a ser una desolación y una maldición[a]
  alternatives_spanish:
  - que llegarían a ser un horror y una maldición
  - que llegarían a ser un asombro y una maldición
  lexicon: HALOT
  rationale: Se conserva el sentido principal de שַׁמָּה como «desolación», que encaja bien en un juicio sobre el lugar y sus habitantes. Se mantiene la ambigüedad documentada mediante nota, porque el término también puede denotar horror o motivo de asombro en contextos judiciales.
- source_word: וַתִּקְרַע אֶת בְּגָדֶיךָ
  english_pob_choice: you tore your clothes
  chosen_spanish: rasgaste tus vestidos
  alternatives_spanish:
  - rasgaste tu ropa
  - desgarraste tus vestiduras
  lexicon: HALOT
  rationale: Es un gesto convencional de duelo y arrepentimiento. «Vestidos» conserva un registro digno y transparente; «vestiduras» sería más tradicional, pero menos natural en español moderno.
- source_word: וַתִּבְכֶּה לְפָנַי
  english_pob_choice: wept before me
  chosen_spanish: lloraste delante de mí
  alternatives_spanish:
  - lloraste ante mí
  - lloraste en mi presencia
  lexicon: HALOT
  rationale: «Lloraste» comunica el llanto/lamento de manera directa en español. Se preserva la relación personal de la expresión con «delante de mí».
- source_word: וְגַם אָנֹכִי שָׁמַעְתִּי
  english_pob_choice: I also have heard you
  chosen_spanish: yo también te he oído
  alternatives_spanish:
  - yo también te escuché
  - también te he oído
  lexicon: HALOT
  rationale: El pronombre enfático intensifica la respuesta divina. «Te he oído» conserva el sentido de atención y respuesta, sin perder la reciprocidad con lo que hizo Josías.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética solemne en español. «Declara Yahvé» es idiomático y preserva el cierre oracular sin ocultar el nombre divino.
theological_decisions:
- issue: Renderización de יְהוָה (nombre divino)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide representar directamente el nombre del pacto de Dios, no enmascararlo como «SEÑOR». «Yahvé» es la forma establecida en la tradición editorial del POB en español para mantener visible el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de שַׁמָּה en contexto judicial
  english_pob_reading: desolation / horror / astonishment (footnoted)
  chosen_spanish_reading: desolación (con nota de alternativa)
  alternative_spanish_readings:
  - horror
  - asombro
  - motivo de asombro
  rationale: El contexto de juicio sobre lugar e habitantes favorece «desolación», pero el hebreo admite una franja semántica más amplia. Se conserva la tensión con nota para no borrar la alternativa documentada en la tradición de auditoría.
  doctrine_reference: HALOT / nota lexical del POB
- issue: Fuerza de וַתִּכָּנַע
  english_pob_reading: you humbled yourself
  chosen_spanish_reading: te humillaste
  alternative_spanish_readings:
  - te sometiste
  - te rebajaste
  rationale: La escena presenta arrepentimiento real ante Yahvé. «Te humillaste» expresa la acción voluntaria sin convertirla en mera pasividad, y encaja con la respuesta moral de Josías.
  doctrine_reference: Uso contextual de la raíz כנע en narrativa de humillación ante Dios
translation_notes:
  revision_awareness: 'Se siguió el cierre del audit trail inglés sin cambios sustantivos: la versión revisada quedó estable (''unchanged: true'') y el veredicto de revisión fue de alto acuerdo. La única tensión lexical relevante documentada sigue siendo שַׁמָּה, que en español se conserva como «desolación» con nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «delante de» en fórmulas de presencia divina por ser claro y reverente en español.
  - «Te humillaste» y «lloraste» preservan el paralelismo de acciones de arrepentimiento y duelo en el verso.
  - La nota sobre שַׁמָּה mantiene visible la ambigüedad lexical sin sobrecargar el texto principal.
