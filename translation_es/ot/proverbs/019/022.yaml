translation:
  language: es
  text: Lo deseable en una persona es su amor leal[a][b], y un pobre es mejor que un mentiroso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El deseo de una persona es su amor leal». El hebreo de la primera línea es breve y puede leerse también como identificación del deseo de una persona con su cualidad de lealtad o bondad.'
    reason: alternative_reading
  - marker: b
    text: «Amor leal» traduce חֶסֶד, término rico que según el contexto puede significar bondad, lealtad o amor fiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּאֲוַת
  english_pob_choice: What is desired
  chosen_spanish: Deseable
  alternatives_spanish:
  - Lo que se desea
  - El deseo de
  lexicon: HALOT
  rationale: 'El hebreo es breve y admite una lectura predicativa: no tanto «el deseo de un hombre» como «lo deseable en un hombre». «Deseable» conserva la concisión proverbial y la ambigüedad productiva que el texto presenta.'
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: en el hombre
  alternatives_spanish:
  - en una persona
  - en el ser humano
  lexicon: HALOT
  rationale: En el dicho sapiencial, אָדָם funciona como singular representativo. «En el hombre» mantiene el paralelo con el inglés POB y el valor genérico sin volverlo abstracto.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su bondad
  - su lealtad amorosa
  - su amor constante
  lexicon: HALOT
  rationale: חֶסֶד reúne ideas de lealtad, bondad y amor fiel. «Amor leal» conserva la fuerza relacional y la constancia moral sin reducirlo a simple amabilidad ni cargarlo innecesariamente con un matiz técnico de pacto.
- source_word: וְטוֹב
  english_pob_choice: and ... is better
  chosen_spanish: y ... es mejor
  alternatives_spanish:
  - pero ... es mejor
  - y ... vale más
  lexicon: HALOT
  rationale: La partícula introduce el segundo hemistiquio comparativo. En español es natural explicitar «es mejor» para hacer visible la comparación que el hebreo concentra.
- source_word: רָשׁ
  english_pob_choice: a poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - un hombre pobre
  - el pobre
  lexicon: HALOT
  rationale: El sustantivo/adjetivo designa a una persona pobre. «Un pobre» es conciso y reproduce el tono proverbial del hebreo.
- source_word: מֵאִישׁ כָּזָב
  english_pob_choice: than a liar
  chosen_spanish: que un mentiroso
  alternatives_spanish:
  - que un hombre mentiroso
  - que uno que miente
  - que un falso
  lexicon: HALOT
  rationale: La construcción comparativa exige en español «que». כָּזָב puede funcionar como sustantivo de falsedad aplicada a la persona; «mentiroso» es la forma natural y breve que comunica esa caracterización personal.
theological_decisions:
- issue: 'Lectura de la primera línea: cualidad deseable en una persona vs. deseo de la persona'
  english_pob_reading: What is desired in a man is his steadfast love; the Hebrew may also be read as 'A man's desire is his steadfast love.'
  chosen_spanish_reading: Deseable en el hombre es su amor leal
  alternative_spanish_readings:
  - El deseo del hombre es su amor leal
  - Lo que se desea en el hombre es su amor leal
  rationale: 'La forma española reproduce la misma tensión que observó el POB: el hebreo puede leerse como una identificación del deseo del hombre o como una declaración sobre lo deseable en él. La opción principal favorece la lectura predicativa, sin eliminar la ambigüedad implícita.'
  doctrine_reference: Sabiduría proverbial; no hay afirmación doctrinal específica más allá de la valoración moral del carácter.
translation_notes:
  revision_awareness: El POB inglés vigente presenta alta concordancia y no requirió cambios. Mantengo la misma resolución interpretativa de la primera línea y la comparación final, adaptándolas al español con sintaxis natural y conservando la ambigüedad señalada por el aparato inglés.
  spanish_consistency_notes:
  - Conservo «amor leal» para חֶסֶד de manera consistente con el valor relacional que el POB da a «steadfast love».
  - Uso «mentiroso» para כָּזָב porque el proverbio contrasta una persona pobre con una persona falsa, no con la mera abstracción de 'falsedad'.
  - La puntuación y la sintaxis buscan mantener el paralelismo de dos hemistiquios sin introducir interpretación adicional.
