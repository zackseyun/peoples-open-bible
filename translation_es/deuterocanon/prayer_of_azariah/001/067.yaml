translation:
  language: es
  text: Bendigan al Señor[a], todos los que temen al Señor, el Dios de los dioses; canten alabanzas y den gracias, porque su misericordia es para siempre[b], y por los siglos de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los que veneran al Señor» o «todos los que adoran al Señor».
    reason: lexical_alternative
  - marker: b
    text: O «porque su amor leal es para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω admite la idea de bendecir o alabar. En español, 'Bendigan' conserva el tono litúrgico de la doxología y la estructura exhortativa del himno, sin volverlo una paráfrasis genérica.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Maestro
  lexicon: BDAG
  rationale: Se sigue la convención del proyecto para κύριος como 'Señor'. El objeto implícito de 'Bendigan' queda explicitado en español para una oración completa y natural.
- source_word: πάντες οἱ σεβόμενοι τὸν κύριον
  english_pob_choice: all you who fear the Lord
  chosen_spanish: todos los que temen al Señor
  alternatives_spanish:
  - todos los que veneran al Señor
  - todos los que adoran al Señor
  lexicon: BDAG
  rationale: Aunque σεβόμενοι procede de σέβομαι y no de φοβέω, en este contexto de adoración reverente la expresión bíblica 'temer al Señor' comunica bien la devoción reverencial sin perder la fuerza teológica del llamado.
- source_word: τὸν θεὸν τῶν θεῶν
  english_pob_choice: the God of gods
  chosen_spanish: el Dios de los dioses
  alternatives_spanish:
  - Dios sobre los dioses
  lexicon: BDAG
  rationale: La estructura de genitivo superlativo se conserva de manera transparente. 'El Dios de los dioses' mantiene el giro bíblico y la exaltación comparativa del original.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - canten un himno
  - alaben cantando
  lexicon: BDAG
  rationale: El verbo sugiere alabanza cantada. 'Canten alabanzas' expresa ese matiz musical con naturalidad en español contemporáneo.
- source_word: ἐξομολογεῖσθε
  english_pob_choice: give thanks
  chosen_spanish: den gracias
  alternatives_spanish:
  - confiesen
  - agradezcan
  lexicon: BDAG
  rationale: En contexto doxológico, el verbo se usa para expresar gratitud o alabanza agradecida. 'Den gracias' preserva ese valor sin imponer el sentido penitencial de 'confesar'.
- source_word: ὅτι εἰς τὸν αἰῶνα τὸ ἔλεος αὐτοῦ
  english_pob_choice: for his mercy is forever
  chosen_spanish: porque su misericordia es por siempre
  alternatives_spanish:
  - porque su misericordia es para siempre
  - porque su amor leal es para siempre
  lexicon: BDAG
  rationale: ἔλεος puede traducirse como 'misericordia' o, en tradición de salmos, 'amor leal'. Aquí se mantiene 'misericordia' por transparencia léxica desde el griego, y 'por siempre' comunica la duración idiomática de εἰς τὸν αἰῶνα.
- source_word: καὶ εἰς τὸν αἰῶνα τῶν αἰώνων
  english_pob_choice: even forever and ever
  chosen_spanish: sí, por los siglos de los siglos
  alternatives_spanish:
  - y por siempre jamás
  - y por toda la eternidad
  lexicon: BDAG
  rationale: La fórmula intensiva final se conserva con una expresión española litúrgicamente reconocible y fiel al doble giro de eternidad. 'Sí,' refleja el matiz enfático de καί en esta clausula final.
theological_decisions:
- issue: Tratamiento de σεβόμενοι en contexto de adoración reverente
  english_pob_reading: all you who fear the Lord
  chosen_spanish_reading: todos los que temen al Señor
  alternative_spanish_readings:
  - todos los que veneran al Señor
  - todos los que adoran al Señor
  rationale: La POB en inglés opta por 'fear the Lord' como equivalente bíblico-teológico, aunque reconoce alternativas. En español, 'temen al Señor' conserva la misma equivalencia reverencial y evita reducir el verbo a mera emoción o a un acto litúrgico aislado.
  doctrine_reference: DOCTRINE.md §Translation philosophy; tratamiento consistente de κύριος como Señor
- issue: Valor de ἔλεος en un refrán doxológico
  english_pob_reading: for his mercy is forever
  chosen_spanish_reading: porque su misericordia es por siempre
  alternative_spanish_readings:
  - porque su amor leal es por siempre
  - porque su misericordia permanece para siempre
  rationale: Se preserva la lectura más directa del griego, 'misericordia', sin ocultar que el término tiene resonancias covenantales. La alternativa de 'amor leal' queda implícitamente posible, pero no se incorpora al texto principal para no desplazar la primacía del original griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy; primacía de la fuente original sobre la tradición litúrgica
- issue: Intensificación temporal final
  english_pob_reading: even forever and ever
  chosen_spanish_reading: sí, por los siglos de los siglos
  alternative_spanish_readings:
  - y por los siglos de los siglos
  - por siempre y para siempre
  rationale: La forma española tradicional 'por los siglos de los siglos' transmite bien la intensificación de eternidad del griego. Se añade 'sí,' para reflejar el valor enfático de la conjunción final y preservar el crescendo doxológico.
  doctrine_reference: DOCTRINE.md §Translation philosophy; preservación de paralelismos y fórmulas doxológicas
translation_notes:
  revision_awareness: La redacción incorpora la revisión del audit trail inglés que añadió el objeto explícito 'the Lord' después de 'Bless'. En español se expresa de forma natural como 'Bendigan al Señor' para evitar un imperativo incompleto. También se conservó la intensificación final del doble giro de eternidad, optando por una fórmula española plenamente readable y litúrgicamente reconocible sin abandonar la base griega.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος conforme al estándar del proyecto.
  - Se traduce ἔλεος como 'misericordia' para reflejar la base léxica griega.
  - La cadencia del verso conserva la estructura de mandato + grupo vocativo + motivo doxológico.
  - '''Canten alabanzas'' y ''den gracias'' reflejan la pareja verbal del original sin añadir contenido ajeno.'
