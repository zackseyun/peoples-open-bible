translation:
  language: es
  text: Y todo Israel oirá y temerá, y no volverán a hacer este mal en medio de ti.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre ustedes». El hebreo usa una forma singular de dirección a Israel como colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: And all Israel
  chosen_spanish: Y todo Israel
  alternatives_spanish:
  - Y todo el Israel
  - Y todo Israel, como pueblo
  lexicon: HALOT
  rationale: כָּל con ישראל designa al pueblo entero como colectividad. En español, «todo Israel» conserva esa referencia corporativa de manera natural y breve.
- source_word: יִשְׁמְעוּ
  english_pob_choice: shall hear
  chosen_spanish: oirá
  alternatives_spanish:
  - escuchará
  - escuchará y oirá
  lexicon: HALOT
  rationale: El verbo שׁמע aquí tiene valor de percibir/enterarse en un contexto jurídico. «Oirá» mantiene la forma simple y formal del anuncio de consecuencia.
- source_word: וְיִרָאוּן
  english_pob_choice: and fear
  chosen_spanish: y temerá
  alternatives_spanish:
  - y tendrá temor
  - y temerán
  lexicon: HALOT
  rationale: En este contexto pactual, ירא expresa temor reverente o disuasivo ante el juicio. En español, «temerá» conserva esa fuerza sin añadir matices emocionales excesivos.
- source_word: וְלֹא יוֹסִפוּ לַעֲשׂוֹת
  english_pob_choice: and they shall not again do
  chosen_spanish: y no volverá a hacer
  alternatives_spanish:
  - y no volverán a hacer
  - y no seguirán haciendo
  lexicon: HALOT
  rationale: El Hiphil de יסף con infinitivo expresa repetición evitada o no continuación. «No volverá a hacer» reproduce bien ese valor idiomático en español.
- source_word: כַּדָּבָר הָרָע הַזֶּה
  english_pob_choice: this evil thing
  chosen_spanish: esta mala cosa
  alternatives_spanish:
  - este mal hecho
  - esta cosa mala
  lexicon: HALOT
  rationale: דָּבָר puede ser «cosa, asunto, hecho». Aquí remite al acto descrito; «mala cosa» preserva la concreción del original sin volverlo abstracto.
- source_word: בְּקִרְבֶּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - entre ustedes
  - en tu medio
  lexicon: HALOT
  rationale: La forma hebrea usa sufijo singular y dirección corporativa hacia Israel. «En medio de ti» conserva ese singular de trato colectivo; en el flujo castellano, «en medio de ti» es natural y transparente.
theological_decisions:
- issue: Singular corporativo en el cierre de la frase
  english_pob_reading: Retain singular 'your midst'
  chosen_spanish_reading: Mantener el singular corporativo con «de ti»
  alternative_spanish_readings:
  - en medio de ustedes
  - entre ustedes
  rationale: El hebreo dirige el discurso a Israel como un todo mediante sufijo singular. «De ti» respeta ese rasgo del texto fuente y preserva la tensión entre singular gramatical y referente colectivo.
  doctrine_reference: 'Éxodo/Deuteronomio: address corpus; translation philosophy §4'
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el POB inglés y no requiere revisión sustantiva; la única tensión relevante es el singular corporativo final, que se conserva en español con una nota aclaratoria.
  spanish_consistency_notes:
  - Se mantuvo «Israel» como nombre colectivo sin artículos innecesarios.
  - Se prefirió un registro sobrio y judicial compatible con Deuteronomio.
  - Se evitó «SEÑOR» u այլ masking convention because no aparece el tetragrámaton en este versículo.
  - La nota aclara la ambigüedad de «en medio de ti» sin expandir indebidamente el sentido.
