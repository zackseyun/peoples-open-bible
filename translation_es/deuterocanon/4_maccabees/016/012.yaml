translation:
  language: es
  text: Ni siquiera trató de disuadir a ninguno de ellos para que no murieran, ni se entristeció cuando estaban muriendo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐδʼ ἵνα μὴ ἀποθάνωσιν ἀπέτρεπεν αὐτῶν τινα
  english_pob_choice: Nor did she try to turn any of them away so that they might not die
  chosen_spanish: Ni siquiera intentó apartar a ninguno de ellos para que no murieran
  alternatives_spanish:
  - no trató de disuadir a ninguno de ellos para que no murieran
  - no intentó apartar a alguno de ellos para que no murieran
  lexicon: BDAG
  rationale: ἀπέτρεπεν expresa una acción de apartar, desviar o disuadir en curso o repetida; en este contexto el sentido es impedir que abandonen su camino hacia la muerte. «Intentó apartar» conserva el valor imperfectivo y el matiz de esfuerzo, sin sobrecargar con un éxito que el griego no afirma.
- source_word: αὐτῶν τινα
  english_pob_choice: any of them
  chosen_spanish: a ninguno de ellos
  alternatives_spanish:
  - a cualquiera de ellos
  - a alguno de ellos
  lexicon: BDAG
  rationale: 'La expresión partitiva distributiva se resuelve mejor en español aquí con una negación enfática: «a ninguno de ellos». Mantiene la idea de que no hubo excepción entre los hijos al que ella tratara de apartar.'
- source_word: ἵνα μὴ ἀποθάνωσιν
  english_pob_choice: so that they might not die
  chosen_spanish: para que no murieran
  alternatives_spanish:
  - a fin de que no murieran
  - para no morir
  lexicon: BDAG
  rationale: La cláusula con ἵνα + subjuntivo expresa finalidad. «Para que no murieran» preserva la intención sin sonar forzado en español; «para no morir» podría volver demasiado compacta la relación de propósito y perder claridad.
- source_word: ἐλυπήθη
  english_pob_choice: grieve
  chosen_spanish: se entristeció
  alternatives_spanish:
  - se afligió
  - se dolió
  - se lamentó
  lexicon: BDAG
  rationale: El verbo cubre tristeza o aflicción; «se entristeció» comunica el dolor interior de manera natural y sobria en español. «Se dolió» podría sonar más idiomático en algunos registros, pero aquí «se entristeció» mantiene el paralelismo con el relato sin intensificar a lamento funerario.
- source_word: ὡς ἀποθνῃσκόντων
  english_pob_choice: as they were dying
  chosen_spanish: cuando estaban muriendo
  alternatives_spanish:
  - mientras estaban muriendo
  - al estar muriendo
  lexicon: BDAG
  rationale: El participio de tiempo contemporáneo indica la circunstancia en la que ella no se entristeció. «Cuando estaban muriendo» es natural en español y preserva el valor circunstancial sin agregar interpretación adicional.
theological_decisions:
- issue: Sujeto implícito femenino
  english_pob_reading: Render the subject as 'she,' referring to the mother in the immediate context.
  chosen_spanish_reading: 'Se mantiene el sujeto implícito en la primera cláusula y se hace explícito con la desinencia verbal y el pronombre reflexivo en la segunda: «intentó...», «se entristeció».'
  alternative_spanish_readings:
  - la madre no intentó apartar a ninguno de ellos
  - no los apartó ni se entristeció
  rationale: El griego omite el sujeto, pero el contexto inmediato identifica a la madre. En español, la concordancia verbal basta para recuperar el referente sin necesidad de añadir un sustantivo explicativo, conservando fluidez y fidelidad al pasaje.
  doctrine_reference: Claridad contextual en traducción bíblica; referencia discursiva inmediata.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido auditado del inglés POB y del griego, manteniendo la progresión negativa doble, el valor purposivo de ἵνα μὴ, y el carácter durativo del imperfecto ἀπέτρεπεν sin introducir una conclusión más fuerte que la del original. No se detectaron tensiones textuales o léxicas que requirieran nota al pie.
  spanish_consistency_notes:
  - Se usa «murieran» en la subordinada de finalidad para reflejar el subjuntivo esperado tras «para que».
  - Se prefiere «se entristeció» a un calco como «se apenó» para mantener un registro digno y transparente.
  - La doble negación de la primera mitad se conserva con «ni siquiera» y «a ninguno de ellos», reproduciendo el refuerzo negativo del griego.
