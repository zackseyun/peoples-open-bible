translation:
  language: es
  text: Renueva una señal y repite un prodigio[a]; glorifica la mano y fortalece el brazo y la diestra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego en Swete difiere de manera importante aquí, con imágenes de un sello de carbunclo sobre adorno de oro y armonía musical en un banquete de vino. Como el testimonio hebreo está conservado y tiene alta confianza, la traducción sigue el hebreo; se anota el griego como variante significativa.
    reason: textual_variant
lexical_decisions:
- source_word: חדש
  english_pob_choice: Renew
  chosen_spanish: Renueva
  alternatives_spanish:
  - Haz nuevo
  - Renueva de nuevo
  lexicon: HALOT
  rationale: El imperativo pide una acción de restaurar o volver a manifestar; «renueva» conserva la fuerza verbal sin añadir paráfrasis innecesaria.
- source_word: אות
  english_pob_choice: a sign
  chosen_spanish: un signo
  alternatives_spanish:
  - una señal
  - un token
  lexicon: HALOT
  rationale: «Signo» es claro y transparente en español para אות en un contexto de manifestación divina.
- source_word: ושנה
  english_pob_choice: and repeat
  chosen_spanish: y repite
  alternatives_spanish:
  - y renueva
  - y haz otra vez
  lexicon: HALOT
  rationale: Aquí שנה expresa hacer otra vez o repetir; «repite» mantiene la relación con el paralelismo del verso.
- source_word: מופת
  english_pob_choice: a wonder
  chosen_spanish: un prodigio
  alternatives_spanish:
  - una maravilla
  - un portent
  lexicon: HALOT
  rationale: «Prodigio» comunica bien una obra extraordinaria de Dios en español moderno y conserva el tono bíblico sin sonar forzado.
- source_word: האדר
  english_pob_choice: glorify
  chosen_spanish: glorifica
  alternatives_spanish:
  - magnifica
  - engrandece
  lexicon: HALOT
  rationale: La forma imperativa pide manifestar esplendor o majestad; «glorifica» es la opción más natural y fiel en español.
- source_word: יד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - el poder
  - la fuerza
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal del hebreo, como en el audit trail inglés, para no aplanar la metáfora de la acción divina.
- source_word: ואמץ
  english_pob_choice: and strengthen
  chosen_spanish: y fortalece
  alternatives_spanish:
  - y refuerza
  - y haz fuerte
  lexicon: HALOT
  rationale: «Fortalece» expresa bien la idea de hacer firme o poderoso, con naturalidad idiomática en español.
- source_word: זרוע
  english_pob_choice: the arm
  chosen_spanish: el brazo
  alternatives_spanish:
  - el brazo extendido
  - la fuerza
  lexicon: HALOT
  rationale: En español, «brazo» preserva la metáfora bíblica de poder activo y suena más natural que un calco rígido.
- source_word: וימין
  english_pob_choice: and the right hand
  chosen_spanish: y la diestra
  alternatives_spanish:
  - y la mano derecha
  - y el lado derecho
  lexicon: HALOT
  rationale: «Diestra» es un equivalente bíblico y digno para «right hand», preservando la imagen tradicional sin perder inteligibilidad.
theological_decisions:
- issue: Imágenes corporales para la acción divina
  english_pob_reading: Retain 'hand,' 'arm,' and 'right hand' literally
  chosen_spanish_reading: Conservar «mano», «brazo» y «diestra» como metáforas corporales literales
  alternative_spanish_readings:
  - Parafrasear como «poder» o «fuerza»
  - Unificar todo como abstracción
  rationale: El verso usa imaginería corporal para la actividad poderosa de Dios. Mantenerla en español preserva la textura teológica y literaria del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Relación entre el hebreo primario y el paralelo griego
  english_pob_reading: Follow the Hebrew as primary while allowing the Greek to confirm that the verse is a petition for renewed displays of divine power
  chosen_spanish_reading: Traducir según el hebreo como testigo principal, con el griego como paralelo divergente no base
  alternative_spanish_readings:
  - Ajustar la traducción al imaginario griego de joya y banquete
  - Fundir ambos testigos en una paráfrasis amplia
  rationale: El testimonio hebreo es de alta confianza y da una secuencia clara de imperativos; el griego difiere sustancialmente, por lo que se documenta pero no gobierna la traducción principal.
  doctrine_reference: PHILOSOPHY.md 'What we are translating' y la nota textual del expediente
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y quedó sin cambios en el último control; esta propuesta mantiene esa decisión y sigue el hebreo de Kahana como texto primario, mientras registra la divergencia importante del paralelo griego.
  spanish_consistency_notes:
  - Se usa un español bíblico contemporáneo, evitando calcos innecesarios.
  - «Diestra» se emplea como equivalente natural y reverente de «right hand».
  - No se introduce terminología eclesiástica tradicional que oculte la imaginería corporal del hebreo.
  - La nota textual queda anclada al verso mediante [a], como exige el expediente.
