review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Moab está bajo destrucción, y sus pequeños/jóvenes hacen oír un clamor. También conserva correctamente la nota sobre la dificultad de צעוריה. Sin embargo, «quebrantada» es menos natural para una ciudad/nación en este contexto que «destrozada», y «han hecho oír su clamor» suena algo calcado; una formulación más idiomática puede mantener la causatividad sin rigidez.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos puntos mejorables: «Moab está quebrantada» resulta comprensible, aunque algo rígido; «Moab está destrozada» transmite mejor el resultado devastador del juicio en español natural. Además, «sus pequeños han hecho oír su clamor» es entendible, pero «sus pequeños han hecho oír su grito de angustia» o similar fluye mejor y explicita la fuerza de זעקה sin perder concisión.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Moab» está bien mantenido. No aparecen términos sensibles como Yahvé/Mesías. La decisión principal discutible es estilística-lexical: para נִשְׁבְּרָה, «destrozada» representa mejor la fuerza de ''is shattered'' que «quebrantada» en este contexto geopolítico.'
  issues:
  - severity: medium
    issue: «quebrantada» para נִשְׁבְּרָה suena menos idiomático en este contexto de juicio nacional
    rationale: Aunque es defendible, en español actual «quebrantada» suele sentirse más abstracto, moral o emocional. Para una nación/ciudad devastada, «destrozada» o «hecha pedazos» comunica mejor el valor vívido de 'is shattered' documentado en el POB inglés.
  - severity: low
    issue: «han hecho oír su clamor» es algo calcado
    rationale: Preserva la causatividad del hifil, pero en español bíblico natural puede afinarse ligeramente. «Han hecho oír su grito de angustia» mantiene la estructura y hace más transparente el sentido de זעקה como clamor de aflicción.
  revised_spanish_text: Moab está destrozada[a]; sus pequeños han hecho oír su grito de angustia.
