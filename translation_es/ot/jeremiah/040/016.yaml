translation:
  language: es
  text: 'Pero Gedalías hijo de Ahicam dijo a Johanán hijo de Carea: «No hagas este asunto, porque estás hablando falsamente[a] acerca de Ismael»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estás hablando mentira acerca de Ismael»; literalmente, el hebreo dice «hablas una mentira acerca de/con respecto a Ismael».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw narrativo avanza la acción, y en este contexto la respuesta de Gedalías contradice la afirmación y propuesta previas de Johanán; por eso 'Pero' comunica bien el matiz adversativo sin perder la progresión narrativa. 'Dijo' es el equivalente natural de אמר.
- source_word: גְּדַלְיָהוּ בֶן אֲחִיקָם
  english_pob_choice: Gedaliah son of Ahikam
  chosen_spanish: Gedalías hijo de Ahicam
  alternatives_spanish:
  - Guedalías hijo de Ahicam
  lexicon: HALOT
  rationale: Se conservan los nombres propios en forma transliterada adaptada al español, y 'ben' se vierte de manera idiomática como 'hijo de'.
- source_word: אֶל יוֹחָנָן בֶּן קָרֵחַ
  english_pob_choice: to Johanan son of Kareah
  chosen_spanish: a Johanán hijo de Carea
  alternatives_spanish:
  - a Johanan hijo de Carea
  lexicon: HALOT
  rationale: אֶל tras אמר se rinde naturalmente con 'a'. Se conserva el nombre propio en forma transliterada adaptada al español.
- source_word: אַֽל תעש
  english_pob_choice: Do not do
  chosen_spanish: No hagas
  alternatives_spanish:
  - No lleves a cabo
  - No realices
  lexicon: HALOT
  rationale: אַֽל con el imperfecto expresa prohibición. 'No hagas' reproduce de forma directa y natural la fuerza verbal del hebreo sin añadir especificación no explícita en el texto.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  lexicon: HALOT
  rationale: דָּבָר puede significar 'cosa, asunto, palabra'. Aquí apunta al acto/propuesta concreta, y 'esta cosa' mantiene cercanía formal al hebreo; 'este asunto' sería posible pero algo más interpretativo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición. 'Porque' es la manera más natural en español para una explicación causal directa.
- source_word: שֶׁקֶר
  english_pob_choice: speaking falsely
  chosen_spanish: falsamente
  alternatives_spanish:
  - con falsedad
  - mintiendo
  lexicon: HALOT
  rationale: 'Con el participio de דבר, שֶׁקֶר funciona de modo adverbial: no se trata de ''una mentira'' como objeto directo, sino de hablar de manera falsa. ''Falsamente'' preserva ese valor, siguiendo la revisión del POB inglés.'
- source_word: אַתָּה דֹבֵר
  english_pob_choice: you are speaking
  chosen_spanish: estás hablando
  alternatives_spanish:
  - hablas
  - estás diciendo
  lexicon: HALOT
  rationale: El participio con pronombre expresa acción en curso; 'estás hablando' suena natural en diálogo y mantiene el aspecto progresivo.
- source_word: אֶל יִשְׁמָעֵאל
  english_pob_choice: about Ishmael
  chosen_spanish: acerca de Ismael
  alternatives_spanish:
  - sobre Ismael
  - contra Ismael
  lexicon: HALOT
  rationale: Aunque אֶל suele ser 'a', con verbos de hablar puede marcar el referente del discurso. 'Acerca de' refleja bien que el tema del habla es Ismael, sin cargar innecesariamente el sentido con 'contra'.
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del POB inglés, especialmente la corrección de 'speaking a lie' a 'speaking falsely', y procura reflejar la misma relación adversativa y causal del hebreo con naturalidad en español.
  spanish_consistency_notes:
  - Se emplea 'Gedalías' y 'Johanán' con acentuación española para lectura pública, manteniendo transliteración transparente.
  - Se traduce 'דָּבָר' con una opción cercana y no interpretativa, evitando convertirlo en 'plan' o 'asunto' sin necesidad textual.
  - Se evita 'SEÑOR' u otra sustitución teológica, pues el versículo no contiene el Tetragrámaton ni un término divino.
  - Se preserva el valor adverbial de שֶׁקֶר, no como sustantivo aislado sino como calificación de la manera de hablar.
