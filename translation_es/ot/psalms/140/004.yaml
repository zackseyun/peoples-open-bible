  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales («aguzan», «su lengua», «veneno», «víbora», «Selah») son compatibles con la evidencia y con el estilo POB. La única corrección terminológica necesaria es reubicar la nota de alternativas léxicas para que corresponda a «víbora», no a «serpiente».
