  text: כֹּה אָמַ֣ר יְהוָה֮ לִ/מְשִׁיח/וֹ֮ לְ/כ֣וֹרֶשׁ אֲשֶׁר הֶחֱזַ֣קְתִּי בִֽ/ימִינ֗/וֹ לְ/רַד לְ/פָנָי/ו֙ גּוֹיִ֔ם וּ/מָתְנֵ֥י מְלָכִ֖ים אֲפַתֵּ֑חַ לִ/פְתֹּ֤חַ לְ/פָנָי/ו֙ דְּלָתַ֔יִם וּ/שְׁעָרִ֖ים לֹ֥א יִסָּגֵֽרוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/045/001.yaml
  text: 'Thus says Yahweh to his anointed[a], to Cyrus, whose right hand I have grasped, to subdue nations before him and to loosen the loins of kings, to open doors before him[c][b], and gates shall not be shut:'
  footnotes:
  - marker: a
    text: Hebrew 'his anointed' uses the same word family later associated with 'Messiah'; here it refers to Cyrus as one appointed by the LORD for this task.
    reason: lexical_alternative
  - marker: b
    text: Or 'to ungird the loins of kings,' an idiom for weakening or disarming them.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'doors' is a dual form, possibly 'double doors.'
    reason: lexical_alternative
