id: EZR.10.19
reference: Ezra 10:19
source:
  edition: WLC
  text: וַ/יִּתְּנ֥וּ יָדָ֖/ם לְ/הוֹצִ֣יא נְשֵׁי/הֶ֑ם וַ/אֲשֵׁמִ֥ים אֵֽיל צֹ֖אן עַל אַשְׁמָתָֽ/ם־־׃ס
translation:
  text: They pledged themselves to send away their wives[a], and being guilty[b], they offered a ram from the flock for their guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they gave their hand,' a Hebrew idiom for making a pledge or binding agreement.
    reason: lexical_alternative
  - marker: b
    text: Or, more explicitly, 'they offered a ram of the flock as a guilt offering for their guilt.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְּנוּ יָדָם
  chosen: They pledged themselves
  alternatives:
  - they gave their hand
  - they gave their pledge
  lexicon: HALOT
  rationale: The idiom literally reads 'they gave their hand,' which in context signifies giving a pledge or binding commitment. 'Pledged themselves' conveys the idiomatic force in natural English while preserving the solemnity of the act.
- source_word: לְהוֹצִיא
  chosen: to send away
  alternatives:
  - to put out
  - to dismiss
  lexicon: HALOT
  rationale: The Hiphil infinitive of יצא here means to cause to go out. In the context of divorcing/separating from foreign wives, 'send away' is the most idiomatic and contextually precise English rendering.
- source_word: נְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - their women
  lexicon: HALOT
  rationale: In this marital context, 'wives' is the clear sense, not the broader 'women.'
- source_word: וַאֲשֵׁמִים
  chosen: and being guilty
  alternatives:
  - and they were guilty
  - and as guilty ones
  lexicon: HALOT
  rationale: The adjective conveys their state of culpability. 'Being guilty' fits the syntax smoothly in English and links naturally to the following guilt offering.
- source_word: אֵיל צֹאן
  chosen: a ram from the flock
  alternatives:
  - a flock-ram
  - a ram of the flock
  lexicon: HALOT
  rationale: This phrase denotes a ram as sacrificial animal. 'A ram from the flock' is clear modern English and preserves the concrete sacrificial reference.
- source_word: עַל אַשְׁמָתָם
  chosen: for their guilt
  alternatives:
  - for their guilt-offense
  - on account of their guilt
  lexicon: HALOT
  rationale: 'The preposition plus noun expresses the basis for the offering: it is presented because of their guilt. ''For their guilt'' is concise and natural; the sacrificial sense is already implied by the preceding ram.'
