translation:
  language: es
  text: Entonces Abraham oró a Dios, y Dios sanó a Abimelec, a su esposa y a sus siervas[a], y ellas dieron a luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavas»; el término hebreo también puede referirse a mujeres esclavizadas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y ellas dieron a luz»; se mantiene la secuencia del hebreo sin explicitar una relación causal que el verso no formula de manera directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - prayó
  - intercedió
  - oró fervientemente
  lexicon: HALOT
  rationale: El hitpael de פלל significa normalmente ‘orar’. En español bíblico y contemporáneo, ‘oró’ es natural y fiel. ‘Intercedió’ expresa una implicación contextual posible, pero no está explícita en la forma verbal; se deja en la nota doctrinal implícita sin sobretraducir el verbo.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - ante Dios
  lexicon: HALOT
  rationale: La construcción hebrea con אֶל se expresa de manera idiomática en español con ‘a Dios’. ‘Al Dios’ suena forzado en este contexto; ‘ante Dios’ añade un matiz no exigido por el hebreo.
- source_word: וַיִּרְפָּא
  english_pob_choice: healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - restauró
  lexicon: HALOT
  rationale: רפא significa ‘sanar/curar’. ‘Sanó’ es claro, directo y conserva el sentido de restauración de salud o capacidad reproductiva sin precisar indebidamente el tipo de dolencia.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios verdadero; ‘Dios’ es la forma natural en español. No se requiere artículo por estilo idiomático.
- source_word: אֶת אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: a Abimelec
  alternatives_spanish:
  - a Abimelec el rey
  - a Abimélec
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración habitual en español. El objeto directo se marca con ‘a’ por claridad gramatical española.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  - a su esposa
  lexicon: HALOT
  rationale: ‘Esposa’ es más preciso y digno en español bíblico contemporáneo que ‘mujer’ en este contexto narrativo.
- source_word: אַמְהֹתָיו
  english_pob_choice: his female servants
  chosen_spanish: a sus siervas
  alternatives_spanish:
  - a sus criadas
  - a sus esclavas
  lexicon: HALOT
  rationale: אָמָה puede significar ‘sierva’ o ‘esclava femenina’. Siguiendo el criterio del POB inglés, ‘siervas’ mantiene la referencia femenina sin cargar la línea principal con una opción más dura. La alternativa más fuerte queda recogida en nota.
- source_word: וַיֵּלֵדוּ
  english_pob_choice: and they gave birth
  chosen_spanish: y ellas dieron a luz
  alternatives_spanish:
  - y dieron a luz
  - y parieron
  - y fueron capaces de dar a luz
  lexicon: HALOT
  rationale: El verbo ילד se traduce naturalmente como ‘dar a luz’ en español. Como el hebreo usa plural femenino en contexto, ‘ellas’ explicita el referente más claro sin añadir contenido ajeno. Se evita convertir la cláusula en una paráfrasis causal no requerida por el texto.
theological_decisions:
- issue: Alcance de la sanidad divina sobre la casa de Abimelec
  english_pob_reading: God healed Abimelech, his wife, and his female servants; the verse presents the restoration that leads to fertility/birth.
  chosen_spanish_reading: Dios sanó a Abimelec, a su esposa y a sus siervas, y ellas dieron a luz.
  alternative_spanish_readings:
  - Dios los sanó, y dieron a luz
  - Dios sanó a Abimelec, a su esposa y a sus siervas, de modo que dieron a luz
  rationale: El hebreo enlaza sanidad y nacimiento con waw consecutivo; el contexto inmediato del v.18 explica que se había cerrado la matriz. En español se mantiene la secuencia simple ‘y... y’ para no agregar una relación causal explícita que el texto no formula de manera gramatical directa, pero sin perder el sentido narrativo global.
  doctrine_reference: Génesis 20:18; filosofía de traducción §1, §6
- issue: Tensión semántica de אָמָה
  english_pob_reading: female servants; footnote preserves the possible stronger sense 'slave women'.
  chosen_spanish_reading: siervas
  alternative_spanish_readings:
  - esclavas
  - criadass
  rationale: ‘Siervas’ preserva el referente femenino y es idiomático en español bíblico. Sin embargo, no borra la posibilidad léxica de esclavitud; esa alternativa se conserva en nota para respetar la tensión semántica sin imponerla como lectura principal.
  doctrine_reference: Filología léxica del hebreo bíblico; HALOT
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que reemplazó una formulación causal explícita por la secuencia más literal ‘and they gave birth’. Por eso el español mantiene una coordinación simple (‘y... y’) en lugar de introducir ‘de modo que’ o ‘para que’, aunque el contexto de 20:18 explica la relación con la sanidad. También se preservó la alternativa fuerte para אָמָה en nota, siguiendo el expediente inglés.
  spanish_consistency_notes:
  - Se usa ‘Dios’ sin artículo para el referente divino verdadero, conforme al estándar del proyecto.
  - Se prefirió ‘siervas’ sobre ‘criadass’/‘esclavas’ en el texto principal por equilibrio entre claridad y fuerza léxica, pero se preserva la alternativa en nota.
  - ‘Abimelec’ sigue la transliteración española habitual; no se fuerza la grafía inglesa.
  - La coordinación final ‘y ellas dieron a luz’ refleja la revisión inglesa más reciente y evita añadir causalidad explícita no marcada en el hebreo.
