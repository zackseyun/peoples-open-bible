lexical_decisions:
- source_word: שִׁמְעָא
  english_pob_choice: Shimea
  chosen_spanish: Simea
  alternatives_spanish:
  - Shimea
  - Simea
  lexicon: HALOT
  rationale: Nombre propio; se translitera en español. Se adapta la grafía al sistema habitual del español con «Simea», manteniendo la forma breve tradicional del nombre y sin intentar traducirlo.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: La forma constructa con sufijo 3ms expresa filiación genealógica directa. En español, «su hijo» conserva la repetición formularia natural sin introducir una construcción pesada como «hijo de él».
- source_word: חַגִּיָּה
  english_pob_choice: Haggiah
  chosen_spanish: Hagías
  alternatives_spanish:
  - Haggía
  - Haggiah
  lexicon: HALOT
  rationale: Nombre propio; se translitera. La adaptación «Hagías» refleja la terminación hebrea -yāh y resulta más natural en español que una transliteración inglesa rígida, sin perder la referencia onomástica.
- source_word: עֲשָׂיָה
  english_pob_choice: Asaiah
  chosen_spanish: Asaías
  alternatives_spanish:
  - Asaiah
  - Asayah
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español con una forma reconocible y estándar. Se conserva el elemento final -ías para representar el hebreo -yāh de manera comprensible y tradicional en español bíblico.
theological_decisions:
- issue: Fórmula genealógica repetida «his son ... his son ... his son»
  english_pob_reading: Hebrew repeats the genealogical formula literally, marking successive descent in the lineage.
  chosen_spanish_reading: Se mantiene la repetición «su hijo ... su hijo ... su hijo» para marcar la descendencia sucesiva.
  alternative_spanish_readings:
  - «hijo de él ... hijo de él ... hijo de él»
  - omitir la repetición y unir los nombres
  rationale: La repetición no es redundante accidentalmente, sino un rasgo formal del hebreo genealógico. En español se conserva para reflejar con transparencia la cadena de filiación y el ritmo del texto fuente.
  doctrine_reference: Transparencia formal del texto genealógico; fidelidad al linaje
translation_notes:
  revision_awareness: El texto base y el control cruzado indican alta concordancia y no requieren revisión adicional; se conserva la estructura genealógica literal del hebreo y la transliteración de los nombres propios adaptada al español.
  spanish_consistency_notes:
  - Se usa «su hijo» de manera repetida para reflejar el hebreo sin suavizar la estructura genealógica.
  - 'Los nombres propios se adaptan al español bíblico de forma consistente: Simea, Hagías, Asaías.'
  - No se introduce puntuación o conectores ajenos al patrón enumerativo del versículo.
