base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/013/012.yaml
  text: So I said[a], ‘Now the Philistines will come down against me at Gilgal[b], and I have not sought the favor of Yahweh.’ So I forced myself and offered up the burnt offering.
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have not sought the favor of the LORD,'' literally, ''I have not entreated the face of the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'I restrained myself.' The Hebrew verb can carry the sense of holding oneself in or mastering oneself; here it likely means Saul compelled himself to act.
    reason: lexical_alternative
