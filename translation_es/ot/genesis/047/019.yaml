translation:
  language: es
  text: ¿Por qué habríamos de morir delante de tus ojos[a], tanto nosotros como nuestra tierra? Cómpranos, a nosotros y a nuestra tierra, por pan[b], y nosotros y nuestra tierra seremos esclavos[c] de Faraón. Da semilla, para que vivamos y no muramos, y la tierra no quede desolada[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante ti».
    reason: lexical_alternative
  - marker: b
    text: O «para comida»; literalmente, «por pan».
    reason: lexical_alternative
  - marker: c
    text: O «siervos». El término hebreo puede abarcar varias formas de servidumbre, pero aquí es prominente el sentido económico de dependencia.
    reason: lexical_alternative
  - marker: d
    text: O «quede arrasada» / «sea devastada».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habríamos de
  alternatives_spanish:
  - ¿Por qué
  - ¿Por qué deberíamos
  lexicon: HALOT
  rationale: La pregunta hebrea es una súplica retórica; en español, «¿Por qué habríamos de…?» conserva ese tono de protesta/apremio mejor que una pregunta desnuda.
- source_word: נָמוּת
  english_pob_choice: we die
  chosen_spanish: morir
  alternatives_spanish:
  - moriríamos
  - perecer
  lexicon: HALOT
  rationale: En la construcción retórica, el infinitivo en español funciona con naturalidad tras «habríamos de». Mantiene el sentido básico de morir sin añadir matiz.
- source_word: לְעֵינֶיךָ
  english_pob_choice: before your eyes
  chosen_spanish: delante de tus ojos
  alternatives_spanish:
  - a la vista de ti
  - en tu presencia
  lexicon: HALOT
  rationale: La imagen idiomática se preserva con una expresión natural en español que mantiene la viveza visual del hebreo.
- source_word: גַּם ... גַּם
  english_pob_choice: both ... and
  chosen_spanish: tanto ... como
  alternatives_spanish:
  - así ... como
  - ambos ... y
  lexicon: HALOT
  rationale: «Tanto ... como» expresa de forma idiomática la coordinación doble entre el pueblo y la tierra.
- source_word: אַדְמָתֵנוּ
  english_pob_choice: our land
  chosen_spanish: nuestra tierra
  alternatives_spanish:
  - nuestro suelo
  - nuestra parcela
  lexicon: HALOT
  rationale: En este contexto agrícola y económico, «tierra» es la opción más natural y suficientemente precisa para la porción cultivable/poseída.
- source_word: קְנֵה אֹתָנוּ וְאֶת אַדְמָתֵנוּ
  english_pob_choice: Buy us and our land
  chosen_spanish: Cómpranos a nosotros y a nuestra tierra
  alternatives_spanish:
  - Adquiérenos a nosotros y a nuestra tierra
  - Cómpranos y compra también nuestra tierra
  lexicon: HALOT
  rationale: קנה expresa adquisición comercial; «comprar» es la equivalencia española más directa y clara en este marco de hambre e intercambio.
- source_word: בַּלָּחֶם
  english_pob_choice: for bread
  chosen_spanish: por pan
  alternatives_spanish:
  - a cambio de pan
  - para pan
  lexicon: HALOT
  rationale: La preposición marca precio/intercambio; «por pan» conserva el término concreto y el valor de trueque que el inglés POB también retiene.
- source_word: וְנִהְיֶה
  english_pob_choice: will be
  chosen_spanish: seremos
  alternatives_spanish:
  - llegaremos a ser
  - quedaremos
  lexicon: HALOT
  rationale: El resultado de la compra se expresa en español con el futuro simple, que aquí suena más directo y fiel que una perífrasis de cambio de estado.
- source_word: עֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: HALOT
  rationale: La situación es de servidumbre económica y pérdida de libertad; «esclavos» preserva la fuerza léxica que el POB inglés documenta.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: de Faraón
  alternatives_spanish:
  - para Faraón
  - a Faraón
  lexicon: HALOT
  rationale: En español, tras «seremos esclavos», la relación de pertenencia/señorío se expresa naturalmente con «de Faraón».
- source_word: וְתֶן זֶרַע
  english_pob_choice: Give seed
  chosen_spanish: Da semilla
  alternatives_spanish:
  - Da semilla de siembra
  - Provee semilla
  lexicon: HALOT
  rationale: Aunque el contexto es agrícola, el hebreo dice literalmente «semilla»; se conserva la concreción con una forma natural en español.
- source_word: זֶרַע
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - grano para sembrar
  - semilla de siembra
  lexicon: HALOT
  rationale: «Semilla» mantiene el valor básico del sustantivo y resulta comprensible en el contexto de siembra y supervivencia del suelo.
- source_word: וְנִחְיֶה
  english_pob_choice: so that we may live
  chosen_spanish: para que vivamos
  alternatives_spanish:
  - a fin de que vivamos
  - y vivamos
  lexicon: HALOT
  rationale: La cláusula final expresa propósito; «para que» comunica claramente la finalidad sin forzar el español.
- source_word: וְלֹא נָמוּת
  english_pob_choice: and not die
  chosen_spanish: y no muramos
  alternatives_spanish:
  - y no moriremos
  - y no perezcamos
  lexicon: HALOT
  rationale: Se conserva el contraste vida/muerte con el subjuntivo dentro de la cláusula final de propósito.
- source_word: וְהָאֲדָמָה לֹא תֵשָׁם
  english_pob_choice: and the land may not become desolate
  chosen_spanish: y la tierra no quede desolada
  alternatives_spanish:
  - y la tierra no se vuelva desolada
  - y el terreno no sea arrasado
  lexicon: HALOT
  rationale: שׁמם apunta a quedar desierta/desolada; «quede desolada» es una solución natural y fiel, sin introducir violencia que el verbo no exige.
theological_decisions:
- issue: Matiz de esclavitud económica
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La petición describe dependencia legal y económica bajo Faraón; «esclavos» conserva la tensión del texto y evita suavizarla con un término menos fuerte.
  doctrine_reference: Éxodo 1:13-14; Levítico 25:42
- issue: Finalidad de la petición de semilla
  english_pob_reading: so that we may live and not die, and the land may not become desolate
  chosen_spanish_reading: para que vivamos y no muramos, y la tierra no quede desolada
  alternative_spanish_readings:
  - para vivir y no morir, y para que la tierra no quede desolada
  - a fin de que vivamos y no muramos, y la tierra no sea devastada
  rationale: 'El texto presenta dos fines unidos: preservar la vida y evitar la desolación del suelo. La redacción española mantiene ambas finalidades sin fusionarlas indebidamente.'
  doctrine_reference: Génesis 47:19
translation_notes:
  revision_awareness: 'La formulación sigue de cerca la lectura POB más reciente y su ajuste de estilo: se conserva la estructura de causa/resultado y la referencia a la tierra, pero se rehace en español para que suene natural sin perder la fuerza económica y agrícola del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto solo cuando el nombre divino aparece; aquí no aparece.
  - Se elige «Faraón» como nombre propio tradicional en español, coherente con el registro bíblico.
  - Se conserva la distinción entre «tierra» y «semilla» en el léxico agrícola para reflejar el doble foco del verso.
  - No se suaviza «esclavos», porque el contexto exige la carga semántica de dependencia servil/económica.
