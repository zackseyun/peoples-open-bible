translation:
  language: es
  text: Y para todos los que suben desde Babilonia para construir la ciudad, habrá libertad[a] para ellos y para sus hijos, y para todos los sacerdotes que suben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libertad»; en este contexto de decreto real el término puede incluir privilegios legales o exención de ciertas obligaciones, aunque el griego no define su alcance exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσβαίνουσιν
  english_pob_choice: go up
  chosen_spanish: suben
  alternatives_spanish:
  - ascienden
  - van subiendo
  - suben a Jerusalén
  lexicon: LSJ
  rationale: En este contexto de retorno y reconstrucción, el griego conserva la imagen de ascenso. En español, «suben» es natural y preserva el matiz direccional sin añadir un lugar que el verso no menciona explícitamente.
- source_word: ἀπὸ τῆς Βαβυλωνίας
  english_pob_choice: from Babylonia
  chosen_spanish: desde Babilonia
  alternatives_spanish:
  - desde Babilonia la región
  - desde Babilonia/desde Babilonia la tierra
  - desde Babilonia (Babilonia)
  lexicon: LSJ
  rationale: La forma griega es regional, pero en español «Babilonia» comunica de modo más claro y natural el punto de partida. Se conserva la referencia geográfica sin forzar un tecnicismo regional que el lector español podría percibir como pesado.
- source_word: κτίσαι τὴν πόλιν
  english_pob_choice: to build the city
  chosen_spanish: para construir la ciudad
  alternatives_spanish:
  - para edificar la ciudad
  - para reconstruir la ciudad
  - para fundar la ciudad
  lexicon: LSJ
  rationale: El griego dice literalmente construir; aunque el contexto es restaurativo, no obliga a explicitar «reconstruir». «Construir» mantiene la forma más directa y evita adelantar una inferencia que el texto no expresa.
- source_word: ὑπάρχειν τὴν ἐλευθερίαν
  english_pob_choice: there shall be freedom
  chosen_spanish: habrá libertad
  alternatives_spanish:
  - se les concederá libertad
  - habrá libertad para ellos
  - tendrán libertad
  lexicon: LSJ
  rationale: La construcción formal del decreto se vierte de manera idiomática en español con «habrá libertad». Conserva el tono de concesión oficial sin añadir un sujeto inexistente en el griego.
- source_word: ἐλευθερίαν
  english_pob_choice: freedom
  chosen_spanish: libertad
  alternatives_spanish:
  - exención
  - privilegio
  - libertad civil
  lexicon: LSJ
  rationale: «Libertad» es la correspondencia más directa y amplia. En este contexto administrativo podría incluir exención de obligaciones o privilegios legales, pero el griego no concreta ese alcance, así que se evita restringir el sentido en el texto principal.
- source_word: αὐτοῖς τε καὶ τοῖς τέκνοις αὐτῶν
  english_pob_choice: for them and for their children
  chosen_spanish: para ellos y para sus hijos
  alternatives_spanish:
  - para ellos y para sus descendientes
  - para ellos y para sus hijos e hijas
  lexicon: LSJ
  rationale: τέκνα se traduce con su sentido inmediato de «hijos». «Descendientes» ampliaría indebidamente el alcance; «hijos» conserva la referencia familiar concreta del texto.
- source_word: πᾶσι τοῖς ἱερεῦσι τοῖς προσβαίνουσιν
  english_pob_choice: for all the priests who go up
  chosen_spanish: y para todos los sacerdotes que suben
  alternatives_spanish:
  - y para todos los sacerdotes que ascienden
  - y para todos los sacerdotes que van subiendo
  lexicon: LSJ
  rationale: Se repite «que suben» para reflejar la estructura paralela del griego y mantener la conexión con el grupo de los que ascienden desde Babilonia. «Sacerdotes» traduce directamente ἱερεῦσι sin necesidad de otra mediación terminológica.
theological_decisions:
- issue: Alcance de la «libertad» concedida en el decreto
  english_pob_reading: The term may include legal privileges or exemption from certain obligations, though the Greek does not define the exact scope.
  chosen_spanish_reading: «Libertad» se deja con amplitud semántica, sin especificar si implica exención fiscal, privilegio jurídico u otra inmunidad.
  alternative_spanish_readings:
  - «exención»
  - «libertad civil»
  - «privilegio legal»
  rationale: El griego ἐλευθερίαν es deliberadamente amplio y el contexto de decreto real sugiere posibles efectos jurídicos, pero no los delimita. La versión española mantiene esa tensión sin cerrarla prematuramente.
  doctrine_reference: Lexical-theological restraint in administrative/decretal passages; avoid over-specification beyond the source.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; la lectura se alinea con el pasaje griego tal como está atestiguado y con la traducción auditada en inglés, manteniendo las decisiones léxicas clave sin añadir inferencias no documentadas.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» en el cuerpo por naturalidad española, aunque el inglés auditado distingue la forma regional «Babylonia»; no se pierde el valor geográfico del original.
  - «Suben» conserva la imagen de ascenso ritual/geográfico inherente al contexto de retorno.
  - «Libertad» se usa de forma amplia para no resolver en el texto principal la posible exención administrativa indicada en la nota.
  - Se repite la cláusula verbal «que suben» para reflejar el paralelismo del griego con los sacerdotes.
