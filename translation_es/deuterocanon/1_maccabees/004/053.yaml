revisions:
- from: Y ofrecieron sacrificio conforme a la ley sobre el altar nuevo[a] del holocausto que habían hecho.
  to: Y ofrecieron sacrificio conforme a la ley sobre el nuevo altar para holocaustos[a] que habían hecho.
  rationale: Se ajusta la frase nominal para reflejar mejor θυσιαστήριον τῶν ὁλοκαυτωμάτων y para producir un español más natural y preciso en contexto cultual. Se conserva el lenguaje sacrificial explícito del original y de la auditoría inglesa, mientras la nota alternativa mantiene la otra posibilidad cercana documentada.
