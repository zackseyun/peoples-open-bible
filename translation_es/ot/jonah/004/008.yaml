translation:
  language: es
  text: 'Cuando salió el sol[a], Dios dispuso un viento del este abrasador, y el sol azotó la cabeza de Jonás, de modo que desfalleció. Y pidió morir y dijo[b]: «Mi muerte es mejor que mi vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un viento del este sofocante» o «un viento del este vehemente». El adjetivo hebreo es raro y difícil; «abrasador» se elige porque el contexto enfatiza el calor opresivo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «Mi muerte es mejor que mi vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּזְרֹחַ הַשֶּׁמֶשׁ
  english_pob_choice: When the sun rose
  chosen_spanish: Cuando salió el sol
  alternatives_spanish:
  - Y sucedió, al salir el sol
  - Al comenzar a salir el sol
  lexicon: HALOT
  rationale: La fórmula narrativa con וַיְהִי y el infinitivo temporal comunica secuencia temporal. «Cuando salió el sol» es natural en español y conserva el valor temporal sin añadir peso interpretativo.
- source_word: וַיְמַן
  english_pob_choice: appointed
  chosen_spanish: dispuso
  alternatives_spanish:
  - ordenó
  - preparó
  - proveyó
  lexicon: HALOT
  rationale: En Jonás, el verbo describe la acción soberana de Dios al asignar medios creados. «Dispuso» mantiene la intención divina y su control narrativo con un español claro y digno.
- source_word: רוּחַ קָדִים
  english_pob_choice: east wind
  chosen_spanish: viento del este
  alternatives_spanish:
  - viento oriental
  lexicon: HALOT
  rationale: La expresión denota un viento procedente del este. «Viento del este» es la forma más natural y transparente en español.
- source_word: חֲרִישִׁית
  english_pob_choice: scorching
  chosen_spanish: abrasador
  alternatives_spanish:
  - sofocante
  - vehemente
  - silencioso
  lexicon: HALOT
  rationale: El adjetivo es difícil y raro. En este contexto, que subraya calor opresivo y el colapso de Jonás, «abrasador» comunica mejor la intensidad térmica. Se preserva así la tensión léxica sin forzar una glosa demasiado técnica.
- source_word: וַתַּךְ הַשֶּׁמֶשׁ עַל רֹאשׁ יוֹנָה
  english_pob_choice: the sun beat down on Jonah’s head
  chosen_spanish: el sol golpeó la cabeza de Jonás
  alternatives_spanish:
  - el sol cayó con fuerza sobre la cabeza de Jonás
  - el sol hirió la cabeza de Jonás
  lexicon: HALOT
  rationale: נכה transmite la imagen de golpear. «Golpeó la cabeza de Jonás» conserva la metáfora física sin recurrir a una perífrasis demasiado idiomática que diluya el impacto del original.
- source_word: וַיִּתְעַלָּף
  english_pob_choice: he grew faint
  chosen_spanish: desfalleció
  alternatives_spanish:
  - se desmayó
  - se debilitó
  - se sintió desfallecer
  lexicon: HALOT
  rationale: La forma sugiere llegar a un estado de agotamiento o desvanecimiento. «Desfalleció» mantiene el proceso y evita afirmar más de lo que el verbo exige.
- source_word: וַיִּשְׁאַל אֶת נַפְשׁוֹ לָמוּת
  english_pob_choice: he asked that he might die
  chosen_spanish: pidió morir
  alternatives_spanish:
  - rogó que lo dejaran morir
  - pidió que le dieran muerte
  - pidió la muerte
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático relacionado con su vida/alma y el morir. «Pidió morir» es breve, fiel y natural; conserva la fuerza del ruego sin explicitar innecesariamente el giro idiomático.
- source_word: טוֹב מוֹתִי מֵחַיָּי
  english_pob_choice: My death is better than my life
  chosen_spanish: Mi muerte es mejor que mi vida
  alternatives_spanish:
  - Morir me es mejor que vivir
  - Mejor es mi muerte que mi vida
  lexicon: HALOT
  rationale: La frase hebrea es una comparación escueta. «Mi muerte es mejor que mi vida» mantiene el paralelismo y la concisión del original, tal como la elección inglesa de la POB.
theological_decisions:
- issue: Agencia divina en וַיְמַן אֱלֹהִים
  english_pob_reading: God appointed
  chosen_spanish_reading: Dios dispuso
  alternative_spanish_readings:
  - Dios ordenó
  - Dios preparó
  - Dios proveyó
  rationale: El texto presenta a Dios dirigiendo activamente el viento dentro de la narrativa. «Dispuso» comunica soberanía y acción intencional sin añadir una explicación doctrinal externa al pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión inglesa auditada quedó estable en la última pasada (sin cambios). Esta propuesta mantiene la misma resolución principal: secuencia temporal natural, agencia divina expresa, y una elección contextual para el adjetivo raro חֲרִישִׁית. Se conserva además la observación sobre la concisión literal de la frase final.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa «Jonás» como forma española del nombre propio.
  - Se conserva la comparación directa de la última cláusula para respetar el tono abrupto del hebreo.
  - «Dispuso» evita un calco mecánico de «preparó» y mantiene el matiz de control soberano repetido en Jonás.
