translation:
  language: es
  text: Porque la esperanza del ingrato[a] se derretirá como escarcha invernal[b], y se irá como agua inútil[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del desagradecido». El griego ἀχάριστου puede verterse de ambas maneras; se eligió «ingrato» por su fuerza moral y su naturalidad en español.
    reason: lexical_alternative
  - marker: b
    text: 'Más literalmente: «como escarcha de invierno».'
    reason: lexical_alternative
  - marker: c
    text: O «fluirá como agua de ningún provecho».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀχάριστου
  english_pob_choice: of the ungrateful
  chosen_spanish: del ingrato
  alternatives_spanish:
  - del desagradecido
  - del desagradecido de corazón
  - del no agradecido
  lexicon: LSJ
  rationale: El genitivo adjetival funciona sustantivamente. 'Ingrato' conserva el valor moral de falta de gratitud y suena natural en español. 'Desagradecido' es viable, pero 'ingrato' es más breve y más idiomático en un registro bíblico sobrio.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - confianza
  lexicon: LSJ
  rationale: '''Esperanza'' es la correspondencia directa y mantiene el contraste sapiencial entre una expectativa falsa y su disolución.'
- source_word: χειμέριος
  english_pob_choice: wintry
  chosen_spanish: invernal
  alternatives_spanish:
  - de invierno
  - vernal
  lexicon: LSJ
  rationale: El adjetivo modifica a 'escarcha'. 'Invernal' reproduce con naturalidad la marca estacional sin sonar forzado en español.
- source_word: πάχνη
  english_pob_choice: frost
  chosen_spanish: escarcha
  alternatives_spanish:
  - helada
  - frost
  lexicon: LSJ
  rationale: '''Escarcha'' es el equivalente natural de ''frost'' o ''hoarfrost'' y preserva la imagen de algo frágil que se derrite fácilmente.'
- source_word: τακήσεται
  english_pob_choice: will melt
  chosen_spanish: se derretirá
  alternatives_spanish:
  - se derretirá por completo
  - se fundirá
  - se disolverá
  lexicon: LSJ
  rationale: El futuro de τήκω expresa derretirse/deshacerse. 'Se derretirá' comunica la imagen con claridad y sin añadir matiz técnico.
- source_word: ῥυήσεται
  english_pob_choice: will run off
  chosen_spanish: se deshará
  alternatives_spanish:
  - se escurrirá
  - fluirá
  - se irá
  lexicon: LSJ
  rationale: El verbo indica fluir/escurrirse. 'Se deshará' enlaza con la imagen anterior de derretimiento y transmite la pérdida de consistencia y permanencia. También deja implícito el movimiento de irse sin forzar un segundo verbo idéntico.
- source_word: ὕδωρ ἄχρηστον
  english_pob_choice: useless water
  chosen_spanish: agua inútil
  alternatives_spanish:
  - agua de ningún provecho
  - agua sin provecho
  - agua que no sirve
  lexicon: LSJ
  rationale: '''Ἄχρηστον'' significa inútil/no servible. ''Agua inútil'' es transparente y reproduce el valor de algo que no permanece para uso beneficioso. Se evita ''agua sin valor'' porque desplaza el énfasis funcional.'
theological_decisions:
- issue: Caracterización moral de ἀχάριστου
  english_pob_reading: the ungrateful
  chosen_spanish_reading: el ingrato
  alternative_spanish_readings:
  - el desagradecido
  - el no agradecido
  rationale: La lectura ética se conserva mejor con un sustantivo/adjetivo de carga moral fuerte. 'Ingrato' comunica falta de gratitud como rasgo de carácter, no solo como acto aislado. No se introduce una categoría doctrinal adicional; se mantiene la advertencia sapiencial del texto.
  doctrine_reference: Translation philosophy §6; mantener la fuerza ética del original con español claro y fiel.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y la decisión auditada del POB en inglés. No hubo cambios de revisión aplicados en el expediente; por eso se preserva la imagen doble de derretimiento/escurrimiento y la alternativa léxica para ἀχάριστου sin suavizar la crítica moral.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - Se evita 'Cristo' porque el pasaje no lo contiene.
  - '''Escarcha invernal'' reproduce la simetría con ''agua inútil'' sin introducir interpretación adicional.'
  - El orden y la puntuación siguen el paralelismo del griego, con una sola oración coordinada.
