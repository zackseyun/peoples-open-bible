translation:
  language: es
  text: 'Confiaste en tu perversidad; dijiste: «Nadie me ve». Tu sabiduría y tu conocimiento te desviaron, y dijiste en tu corazón: «Yo soy, y no hay nadie además de mí[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo soy, y no hay nada más». La expresión hebrea puede leerse de modo más abstracto, pero aquí probablemente pone en boca de Babilonia una afirmación de estatus sin rival.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּבְטְחִי
  english_pob_choice: you trusted
  chosen_spanish: confiabas
  alternatives_spanish:
  - confiaste
  - te apoyabas
  lexicon: HALOT
  rationale: בטח expresa confiar o apoyarse en algo. En español, el imperfecto «confiabas» comunica la actitud sostenida y acusatoria del pasaje con naturalidad, sin perder el valor de confianza en aquello en lo que se apoyaba la destinataria.
- source_word: בְרָעָתֵךְ
  english_pob_choice: in your wickedness
  chosen_spanish: en tu perversidad
  alternatives_spanish:
  - en tu maldad
  - en tu iniquidad
  - en tu calamidad
  lexicon: HALOT
  rationale: El contexto favorece el sentido moral de רָעָה, no el de calamidad. «Perversidad» comunica la carga ética con fuerza en español y evita una formulación demasiado genérica.
- source_word: אֵין רֹאָנִי
  english_pob_choice: No one sees me
  chosen_spanish: Nadie me ve
  alternatives_spanish:
  - No hay quien me vea
  - Ninguno me ve
  lexicon: HALOT
  rationale: La negación existencial con participio se vuelve una frase directa y natural en español. «Nadie me ve» preserva la idea de ocultamiento presumido sin añadir matices innecesarios.
- source_word: חָכְמָתֵךְ וְדַעְתֵּךְ
  english_pob_choice: Your wisdom and your knowledge
  chosen_spanish: Tu sabiduría y tu conocimiento
  alternatives_spanish:
  - Tu sabiduría y tu saber
  - Tu habilidad y tu conocimiento
  lexicon: HALOT
  rationale: Se conserva el paralelismo léxico con los equivalentes estándar «sabiduría» y «conocimiento», como en el inglés auditado, manteniendo la duplicación retórica del hebreo.
- source_word: הִיא שׁוֹבְבָתֶךְ
  english_pob_choice: led you astray
  chosen_spanish: te desviaron
  alternatives_spanish:
  - te extraviaron
  - te hicieron desviar
  - te descarriaron
  lexicon: HALOT
  rationale: El hebreo comunica un efecto causativo de desvío/engaño. «Te desviaron» reproduce bien la relación de causa y efecto en un español sobrio; aunque menos explícito que «te extraviaron», evita sobreactuar el matiz religioso de «descarriar».
- source_word: בְלִבֵּךְ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu interior
  - para ti misma
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo del pensamiento interior con «en tu corazón», claro y bíblicamente reconocible en español.
- source_word: אֲנִי וְאַפְסִי עוֹד
  english_pob_choice: I am, and there is no one besides me
  chosen_spanish: Yo soy, y fuera de mí no hay nadie más
  alternatives_spanish:
  - Yo soy, y no hay nadie fuera de mí
  - Yo soy, y no hay nada más
  lexicon: HALOT
  rationale: La expresión debe conservar la tensión entre una posible lectura personal y una más abstracta. «Yo soy» mantiene la autoafirmación tajante; «fuera de mí no hay nadie más» explicita el sentido personal del contexto sin borrar la resonancia con la fórmula de autoexaltación absoluta.
theological_decisions:
- issue: La frase final puede sonar como una apropiación blasfema de lenguaje reservado a Yahvé en otros pasajes de Isaías, pero el contexto inmediato habla de Babilonia personificada.
  english_pob_reading: I am, and there is no one besides me
  chosen_spanish_reading: Yo soy, y fuera de mí no hay nadie más
  alternative_spanish_readings:
  - Yo soy, y no hay nada más
  - Yo soy, y no hay nadie fuera de mí
  rationale: Se conserva la ironía teológica del texto sin resolverla artificialmente. La forma española debe reflejar el orgullo exclusivo de Babilonia y, al mismo tiempo, dejar visible la cercanía verbal con declaraciones divinas similares en Isaías.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se ha mantenido la línea de la última revisión inglesa sin introducir cambios de sentido. La traducción española sigue de cerca la audit trail: confianza en la maldad, negación de ser vista, desvío producido por sabiduría y conocimiento, y la autoafirmación final con su ambigüedad teológica preservada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferente del nombre divino en el proyecto, aunque este versículo no lo menciona explícitamente.
  - Se usa «sabiduría» / «conocimiento» para conservar el paralelismo léxico del hebreo.
  - Se opta por «perversidad» para el valor moral de רָעָה en este contexto.
  - La nota al pie conserva la alternativa abstracta documentada en el inglés y la aplica al español sin perder la lectura personal del contexto.
  - La puntuación y las comillas angulares se ajustan al uso editorial del español moderno.
