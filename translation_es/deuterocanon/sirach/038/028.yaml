translation:
  language: es
  text: Así el herrero se sienta junto al yunque y examina el hierro sin trabajar[a]; el vapor del fuego consume su carne[b], y lucha con el calor del horno de fundición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hierro sin labrar». El adjetivo griego puede indicar algo ocioso, sin usar, o todavía no trabajado.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el vapor del fuego derrite su carne». La lectura principal usa «consume» para expresar de modo natural el efecto físico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χαλκεύς
  english_pob_choice: smith
  chosen_spanish: herrero
  alternatives_spanish:
  - forjador
  - metalúrgico
  - trabajador del metal
  lexicon: LSJ
  rationale: En el contexto inmediato de yunque, hierro y horno, «herrero» es el equivalente natural y claro en español. «Metalúrgico» suena demasiado técnico o moderno; «forjador» es posible, pero menos directo para la imagen artesanal del verso.
- source_word: ἐγγὺς ἄκμονος
  english_pob_choice: near the anvil
  chosen_spanish: junto al yunque
  alternatives_spanish:
  - cerca del yunque
  - al lado del yunque
  lexicon: LSJ
  rationale: «Junto al yunque» reproduce la proximidad espacial con naturalidad en español y mantiene la imagen artesanal sin calco rígido.
- source_word: καταμανθάνων
  english_pob_choice: examines
  chosen_spanish: examina
  alternatives_spanish:
  - observa atentamente
  - estudia
  - considera
  lexicon: LSJ
  rationale: El participio expresa atención concentrada sobre el material. «Examina» sigue bien la revisión inglesa más reciente y suena natural en español sin volverlo académico en exceso.
- source_word: ἀργῷ σιδήρῳ
  english_pob_choice: the unworked iron
  chosen_spanish: el hierro sin trabajar
  alternatives_spanish:
  - el hierro no trabajado
  - el hierro en bruto
  - el hierro crudo
  lexicon: LSJ
  rationale: La decisión inglesa reciente evita sugerir más de lo que dice el griego. «Sin trabajar» conserva la idea de hierro aún no procesado, y mantiene el vínculo con el oficio del herrero.
- source_word: ἀτμὶς πυρὸς
  english_pob_choice: the vapor of the fire
  chosen_spanish: el vapor del fuego
  alternatives_spanish:
  - la exhalación del fuego
  - el humo del fuego
  - el calor del fuego
  lexicon: LSJ
  rationale: «Vapor» preserva la imagen distinta de θέρμη ('calor') que aparece después. No se fusionan ambas expresiones, porque el griego las distingue.
- source_word: τήξει
  english_pob_choice: wastes
  chosen_spanish: consume
  alternatives_spanish:
  - derrite
  - desgasta
  - agota
  lexicon: LSJ
  rationale: Con «carne» como objeto, el sentido es el efecto corporal del fuego. «Consume» comunica la acción sin imponer una literalidad de derretimiento que en español sonaría demasiado física o extraña.
- source_word: σάρκας αὐτοῦ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su carne mortal
  lexicon: LSJ
  rationale: «Carne» reproduce el valor literal del griego y conserva la vividez corporal del texto. No se suaviza a «cuerpo», porque el original es más concreto.
- source_word: ἐν θέρμῃ καμίνου
  english_pob_choice: with the heat of the furnace
  chosen_spanish: con el calor del horno
  alternatives_spanish:
  - con el calor del horno de fundición
  - en el calor del horno
  - por el calor del horno
  lexicon: LSJ
  rationale: «Horno» comunica bien el contexto metalúrgico en español; «horno de fundición» sería más específico de lo que el griego exige. «Con» permite un paralelismo natural con la acción de luchar.
- source_word: διαμαχήσεται
  english_pob_choice: he struggles
  chosen_spanish: lucha
  alternatives_spanish:
  - se esfuerza
  - contiende
  - se debate
  lexicon: LSJ
  rationale: El verbo expresa combate o esfuerzo intenso contra una fuerza opresiva. «Lucha» es breve, enérgico y fiel al tono del original.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: «studies» pasó a «examines» y «raw iron» a «unworked iron». La versión española sigue esa misma orientación, evitando una paráfrasis excesiva y manteniendo la distinción entre «vapor» y «calor» en el verso.'
  spanish_consistency_notes:
  - Se mantuvo la imaginería metalúrgica de forma transparente y accesible para lectores hispanohablantes.
  - Se evitó el uso de «SEÑOR» u otra terminología sustitutiva, porque el verso no contiene el nombre divino.
  - No se añadió mayúscula a «espíritu» ni a otros términos no presentes en el pasaje.
  - «Herrerero»/«herrero» no se cargó con sentidos doctrinales; se eligió por adecuación al oficio descrito.
