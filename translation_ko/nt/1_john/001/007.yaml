id: 1JN.1.7
reference: 1 John 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν δὲ ἐν τῷ φωτὶ περιπατῶμεν ὡς αὐτός ἐστιν ἐν τῷ φωτί, κοινωνίαν ἔχομεν μετ’ ἀλλήλων καὶ τὸ αἷμα ⸀Ἰησοῦ τοῦ υἱοῦ αὐτοῦ καθαρίζει ἡμᾶς ἀπὸ πάσης ἁμαρτίας.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/007.yaml
  text: But if we walk in the light[a], as he himself is in the light, we have fellowship with one another[b], and the blood of Jesus his Son cleanses us from every sin.
  footnotes:
  - marker: a
    text: Or 'with each other.' Some interpreters take 'with one another' to mean fellowship between believers and God, but the reciprocal Greek most naturally refers to mutual fellowship among believers.
    reason: alternative_reading
  - marker: b
    text: Or 'from all sin.' The Greek can be understood distributively ('every sin') or collectively ('all sin').
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 만일 그분 자신이 빛 가운데 계신 것처럼 우리도 빛 가운데 걸어가면, 우리는 서로 교제를 누리며, 그분의 아들 예수의 피[a]가 우리를 모든 죄에서 깨끗하게 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 αἷμα Ἰησοῦ는 예수의 십자가 죽음을 가리키는 사도적 표현으로, 그분의 희생의 효력을 강조한다.
    reason: cross_reference
lexical_decisions:
- source_word: τὸ αἷμα Ἰησοῦ
  english_pob_choice: the blood of Jesus
  chosen_korean: 예수의 피
  alternatives_korean:
  - 예수님의 피
  lexicon: BDAG
  rationale: αἷμα는 그리스도의 희생의 효력을 가리키는 사도적 핵심어. 「피」를 그대로 옮긴다(완곡어로 약화시키지 않는다).
- source_word: καθαρίζει
  english_pob_choice: cleanses
  chosen_korean: 깨끗하게 합니다
  alternatives_korean:
  - 정결케 합니다
  - 씻어 줍니다
  lexicon: BDAG
  rationale: 현재 시제 — 지속적·반복적 정화. 「깨끗하게 합니다」가 현대 한국어에서 자연스럽고 의례적 무게를 잃지 않는다.
