translation:
  language: es
  text: Y los extranjeros alzaron sus ojos y los vieron acampados frente a ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dispuestos frente a ellos» o «apostados frente a ellos». El participio griego puede indicar una colocación o alineación en lugar de un acampamiento literal; «acampados» sigue el contexto militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλόφυλοι
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - gentes de otra nación
  - enemigos extranjeros
  lexicon: LSJ
  rationale: El griego designa a los de otro pueblo o raza. «Extranjeros» conserva el valor de alteridad étnica sin identificar indebidamente a un grupo más específico. Evita también cargar el texto con una interpretación militar que no está en la palabra misma.
- source_word: ἦραν ... τοὺς ὀφθαλμοὺς αὐτῶν
  english_pob_choice: lifted up their eyes
  chosen_spanish: alzaron los ojos
  alternatives_spanish:
  - levantaron los ojos
  - miraron hacia arriba
  lexicon: LSJ
  rationale: La expresión es idiomática. En español, «alzaron los ojos» mantiene la imagen bíblica y suena natural; «levantaron los ojos» es posible, pero «alzaron» da mejor el tono solemne del relato.
- source_word: ἶδαν
  english_pob_choice: saw
  chosen_spanish: los vieron
  alternatives_spanish:
  - vieron
  - los divisaron
  - los observaron
  lexicon: LSJ
  rationale: El verbo simple aoristo se rinde de forma directa. «Los vieron» conecta de modo claro con el objeto del ver y evita añadir matices no presentes en el griego.
- source_word: ἐχομένους
  english_pob_choice: encamped
  chosen_spanish: acampados
  alternatives_spanish:
  - dispuestos
  - formados
  - apostados
  lexicon: LSJ
  rationale: El participio puede indicar estar situados o dispuestos en posición. En el contexto militar, «acampados» sigue la decisión inglesa de dar una lectura de estado posicional en un marco bélico, pero en español resulta más natural que un calco participial.
- source_word: ἐξ ἐναντίας
  english_pob_choice: opposite them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - enfrente de ellos
  - opuestos a ellos
  - delante de ellos
  lexicon: LSJ
  rationale: La locución indica posición directamente opuesta. «Frente a ellos» expresa bien la relación espacial sin forzar una lectura de hostilidad adicional más allá del contexto militar.
translation_notes:
  revision_awareness: 'Texto revisado a la luz del control cruzado: se mantuvo la solución óptima-equivalente del inglés POB, pero se ajustó el español para que el verbo y la relación espacial resulten más naturales sin perder el matiz militar del participio griego.'
  spanish_consistency_notes:
  - Se evita traducir ἀλλόφυλοι con un etnónimo específico, porque el contexto de 1 Macabeos 4 habla de fuerzas no judías en general.
  - 'Se conserva el paralelismo narrativo del griego: acción de mirar + percepción + ubicación frente a ellos.'
  - La nota de pie recoge la ambigüedad del participio ἐχομένους, que en español puede oscilar entre 'acampados', 'dispuestos' o 'apostados'.
