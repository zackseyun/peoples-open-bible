base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/027/023.yaml
  text: But David did not count them from twenty years old and under[b][a], because Yahweh had said he would multiply Israel like the stars of the heavens.
  footnotes:
  - marker: a
    text: Or, 'did not take their number.' The Hebrew idiom is literally 'did not lift up their number,' meaning 'did not count them' or 'did not take a census of them.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'like the stars of heaven.' This echoes the LORD's promise to make Israel exceedingly numerous.
    reason: cross_reference
