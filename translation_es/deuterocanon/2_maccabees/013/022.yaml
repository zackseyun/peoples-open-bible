  - marker: b
    text: Bethsura también puede traducirse “Beth-zur”, reflejando el topónimo hebreo detrás de la forma griega.
    reason: alternative_reading
  revision_rationale: 'Se corrige la alineación con el expediente inglés y con el griego: se adopta “Bethsura” como forma principal del topónimo, se mueve la nota del modismo de la diestra a la frase correcta, y se conserva la alternativa del lugar en una nota separada. También se mejora levemente la naturalidad de ἐδευτερολόγησεν con “siguió negociando”.'
