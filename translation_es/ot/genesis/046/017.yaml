    reason: lexical_alternative
  revision_rationale: Se ajustaron las transliteraciones para un español más natural y eclesialmente legible, sin alterar el sentido del hebreo ni el razonamiento del POB inglés. Se cambió 'Asher' por 'Aser' y se simplificaron formas excesivamente marcadas ('Imná/Isvá/Isví/Seráh'). Se mantuvo 'Beriá', 'Héber' y 'Malquiel' como formas españolas claras. La aposición final se expresó como 'hermana de ellos' para reflejar mejor el plural posesivo hebreo sin añadir un verbo copulativo.
