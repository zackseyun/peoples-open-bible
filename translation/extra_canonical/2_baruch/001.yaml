translation:
  text: |-
    1 In the twenty-fifth year of Jeconiah king of Judah, the word of the Lord came upon Baruch son of Neriah, and he said to him,
    2 “You have seen all that this people has done against me—the evils that these two tribes which remain have done, more than the ten tribes that were carried away captive.
    3 For the former tribes were driven by their kings to sin, but these two tribes themselves pressed and compelled their kings to sin.
    4 Therefore behold, I am bringing evil upon this city and upon its inhabitants, and it shall be taken away from before me for a time, and I will scatter this people among the nations, that it may prove useful to the nations.
    5 And my people shall be chastened, and the time will come when they will seek the prosperity of their times.”
