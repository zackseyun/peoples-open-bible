translation:
  language: es
  text: Temerás a Yahvé tu Dios[b]; a él servirás, a él te aferrarás[a], y por su nombre jurarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "te apegarás a él"; también: "te mantendrás firme junto a él". El hebreo expresa adhesión leal y perseverante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "reverenciarás". El verbo hebreo suele denotar temor con reverencia en contextos de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton con la forma española establecida en el proyecto. No se sustituye por un título; esto mantiene la transparencia hacia el hebreo y la continuidad doctrinal del texto fuente.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  lexicon: HALOT
  rationale: La forma posesiva singular de pacto se expresa naturalmente como 'tu Dios', que reproduce la relación directa y personal del hebreo sin añadir énfasis innecesario.
- source_word: תִּירָא
  english_pob_choice: you shall fear
  chosen_spanish: Temerás
  alternatives_spanish:
  - reverenciarás
  - tendrás temor de
  lexicon: HALOT
  rationale: '''Temerás'' preserva el peso directo de ירא y mantiene la tensión teológica de temor reverente; ''reverenciarás'' suaviza demasiado el verbo y pierde fuerza lexical.'
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - lo
  lexicon: HALOT
  rationale: El pronombre enfático de objeto se hace explícito con 'a él' para conservar la focalización del hebreo y sonar natural en español.
- source_word: תַעֲבֹד
  english_pob_choice: you shall serve
  chosen_spanish: servirás
  alternatives_spanish:
  - adorarás
  lexicon: HALOT
  rationale: עבד se rinde con 'servir', no con 'adorar', para preservar su sentido léxico básico y dejar que el matiz cultual emerja del contexto.
- source_word: וּבוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - en él
  lexicon: HALOT
  rationale: Aunque la preposición puede admitir la idea de adherirse 'a' o 'en' alguien, en español la construcción natural y fiel al sentido relacional es 'a él'.
- source_word: תִדְבָּק
  english_pob_choice: you shall cling
  chosen_spanish: te unirás
  alternatives_spanish:
  - te apegarás
  - te aferrarás
  lexicon: HALOT
  rationale: En español, 'te unirás' comunica la unión leal y duradera que דבק expresa en este contexto de pacto. Se evita 'te pegarás' por resultar poco natural y 'te aferrarás' por sonar más abrupto que el valor relacional buscado.
- source_word: וּבִשְׁמוֹ
  english_pob_choice: by his name
  chosen_spanish: por su nombre
  alternatives_spanish:
  - en su nombre
  lexicon: HALOT
  rationale: Con jurar, el hebreo señala el nombre como base o referencia de la fórmula de juramento. 'Por su nombre' conserva esa referencia sin forzar una calca idiomática inglesa.
- source_word: תִּשָּׁבֵעַ
  english_pob_choice: you shall swear
  chosen_spanish: jurarás
  alternatives_spanish:
  - harás juramento
  lexicon: HALOT
  rationale: El verbo niphal de שבע se traduce de forma directa como 'jurar' para mantener la fuerza legal-covenantal del mandato.
theological_decisions:
- issue: Fuerza del mandato en las formas imperfectas
  english_pob_reading: 'Use ''shall'' throughout: ''You shall fear... serve... cling... swear.'''
  chosen_spanish_reading: 'Se usa el futuro simple: ''Temerás... servirás... te unirás... jurarás.'''
  alternative_spanish_readings:
  - Teme... sirve... únete... jura...
  rationale: En español, el futuro simple transmite de manera sobria y formal el valor exhortativo/mandatorio de los imperfectos en este contexto legal-covenantal, conservando la cadencia del texto sin convertirlo en una secuencia demasiado imperativa.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological weight without paraphrase.'
- issue: Relación entre temor y reverencia
  english_pob_reading: '''you shall fear'' with note that the verb commonly denotes fear with reverence in covenant contexts'
  chosen_spanish_reading: '''Temerás'' en el texto principal, manteniendo el temor reverente sin suavizarlo'
  alternative_spanish_readings:
  - reverenciarás
  rationale: '''Temerás'' deja intacta la tensión de ירא y permite que el lector perciba tanto temor como reverencia. ''Reverenciarás'' explicita una parte del sentido, pero reduce la densidad semántica del verbo.'
  doctrine_reference: Temor de Yahvé en el lenguaje del pacto; cf. Deut 6:13, 13:4.
- issue: Sentido de דבק aplicado al pacto
  english_pob_reading: '''cling'' with note ''Or hold fast to him.'''
  chosen_spanish_reading: '''te unirás'' como equivalente relacional y de fidelidad'
  alternative_spanish_readings:
  - te aferrarás a él
  - te pegarás a él
  rationale: El hebreo presenta adhesión leal y perseverante a una persona; en español, 'unirse' comunica mejor esa permanencia relacional que una imagen física demasiado cruda. Se preserva el carácter de compromiso exclusivo con Dios.
  doctrine_reference: Lealtad de pacto; cf. Deut 10:20; Jos 23:8.
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantuvo sin cambios en su última revisión (latest_revision_pass: unchanged). La versión española sigue de cerca esa decisión, conservando la serie verbal, el paralelismo y las dos notas léxicas principales (ירא y דבק) sin introducir expansiones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estable para el nombre divino en todo el proyecto.
  - Se conserva el futuro simple para reflejar el valor exhortativo del hebreo en este tipo de contexto.
  - Se evita 'adorar' para עבד y se evita 'SEÑOR' como sustitución del Tetragrámaton.
  - Las notas se limitan a alternativas léxicas reales presentes en el audit trail y a una precisión semántica necesaria para el español.
