translation:
  language: es
  text: Porque la gracia y la misericordia reposan sobre sus escogidos[a], y la visitación sobre sus consagrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «supervisión» o «cuidado vigilante»; el término griego puede denotar visitación divina o inspección. Aquí el contexto sugiere cuidado benigno.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» conserva el peso teológico del término y su paralelismo natural con «misericordia» en este contexto sapiencial.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente directo e idiomático en español para la benevolencia divina expresada por ἔλεος.
- source_word: ἐκλεκτοῖς
  english_pob_choice: chosen ones
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - escogidos de Dios
  lexicon: BDAG
  rationale: «Escogidos» reproduce el sentido de elección sin importar todavía una terminología técnica posterior; en español permite un sustantivo natural con sentido plural.
- source_word: ἐπισκοπή
  english_pob_choice: visitation
  chosen_spanish: visitación
  alternatives_spanish:
  - supervisión
  - cuidado vigilante
  - inspección
  lexicon: BDAG
  rationale: «Visitación» preserva la amplitud léxica de ἐπισκοπή y la resonancia bíblica que el inglés POB retuvo con «visitation», sin cerrar indebidamente el sentido a mera inspección.
- source_word: ὁσίοις
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - piadosos
  - devotos
  - santos de Dios
  lexicon: BDAG
  rationale: Aquí «santos» traduce de forma compacta y reconocible ὅσιοι; aunque puede tener matices eclesiales, en español sigue siendo la forma más transparente para los consagrados o piadosos.
- source_word: ἐν
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - entre
  - para
  lexicon: BDAG
  rationale: En este paralelismo, «sobre» expresa de manera natural que gracia, misericordia y visitación reposan o se ejercen a favor de estas personas.
theological_decisions:
- issue: Sentido positivo de ἐπισκοπή
  english_pob_reading: beneficent divine visitation/care
  chosen_spanish_reading: visitación benéfica de Dios, no visita judicial
  alternative_spanish_readings:
  - supervisión divina
  - visitación de juicio
  rationale: El paralelismo con «gracia y misericordia» favorece una lectura favorable. Se conserva «visitación» para no borrar la ambivalencia lexical, pero el contexto orienta la frase hacia el cuidado activo de Dios.
  doctrine_reference: Preservar la tensión lexical sin resolverla de forma excesiva; consistencia terminológica con excepción documentada.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el criterio auditado del POB inglés: mantiene el paralelismo positivo, conserva «visitación» para ἐπισκοπή y evita sustituir «escogidos»/«santos» por formulaciones más interpretativas.'
  spanish_consistency_notes:
  - Se usa «gracia» y «misericordia» de manera estable para χάρις y ἔλεος.
  - «Escogidos» mantiene la referencia a elección sin introducir jerga doctrinal adicional.
  - «Visitación» conserva la ambigüedad lexical documentada y se aclara en nota.
  - «Santos» se elige como equivalente breve y comprensible para ὅσιοι en este contexto.
