    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que documente «Mar Rojo», que es el término relevante de יַם סוּף, y se repara la cláusula temporal eliminando el pronombre espurio «los» antes de «a ustedes». Además, se suaviza la redacción a «mientras los perseguían», que conserva el sentido del hebreo y su simultaneidad con español natural.
