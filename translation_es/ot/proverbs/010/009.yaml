translation:
  language: es
  text: Quien anda en integridad anda con seguridad[a], pero el que tuerce sus caminos será descubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegará a ser conocido» o «quedará expuesto». El hebreo puede significar que la persona torcida será reconocida por lo que es o que su conducta quedará descubierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  english_pob_choice: Whoever walks
  chosen_spanish: Quien anda
  alternatives_spanish:
  - El que anda
  - Quien camina
  lexicon: HALOT
  rationale: El participio hebreo tiene valor proverbial y general. «Quien» conserva la lectura genérica mejor que un sujeto masculino específico, y «anda» mantiene la metáfora de conducta sostenida.
- source_word: בַּתֹּם
  english_pob_choice: in integrity
  chosen_spanish: en integridad
  alternatives_spanish:
  - irreprensiblemente
  - en inocencia
  - con integridad
  lexicon: HALOT
  rationale: תֹּם expresa integridad, entereza o rectitud moral. «En integridad» preserva el sustantivo y su valor ético sin volverlo excesivamente interpretativo.
- source_word: יֵלֶךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  - va
  lexicon: HALOT
  rationale: Se mantiene el mismo campo metafórico de conducta. «Anda» funciona de manera natural en español proverbial y permite repetir el verbo sin rigidez.
- source_word: בֶּטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguro
  - sin temor
  - confiadamente
  lexicon: HALOT
  rationale: El adverbio hebreo expresa seguridad objetiva o protección. «Con seguridad» comunica esa idea de manera clara y no desplaza el sentido hacia una mera actitud subjetiva.
- source_word: וּמְעַקֵּשׁ
  english_pob_choice: but he who makes ... crooked
  chosen_spanish: pero el que hace torcidos
  alternatives_spanish:
  - pero el que pervierte
  - pero el que tuerce
  - pero el que vuelve torcido
  lexicon: HALOT
  rationale: El participio de עקשׁ indica torcer, enderezar mal o volver torcido. «Hace torcidos» conserva la acción verbal y la imagen del contraste con la integridad.
- source_word: דְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su conducta
  - su proceder
  lexicon: HALOT
  rationale: «Caminos» es la equivalencia directa y conserva la metáfora hebrea de la vida moral como camino. El plural se mantiene para reflejar el original.
- source_word: יִוָּדֵעַ
  english_pob_choice: will be found out
  chosen_spanish: será dado a conocer
  alternatives_spanish:
  - será conocido
  - será expuesto
  - quedará al descubierto
  lexicon: HALOT
  rationale: El nifal de ידע puede significar «ser conocido» o «quedar descubierto». En el contraste proverbial, la idea es que la conducta torcida no permanecerá oculta; «será dado a conocer» conserva esa ambigüedad útil entre ser reconocido y ser expuesto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo poético y la solución inglesa auditada, manteniendo el paralelismo entre caminar en integridad y hacer torcidos los caminos. Se conserva la ambigüedad de יִוָּדֵעַ mediante una nota, sin forzar una sola lectura.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se conserva la metáfora de caminar/andar para reflejar el paralelismo hebreo.
  - «Integridad» se usa como sustantivo ético paralelo a תֹּם, en lugar de una paráfrasis moral más amplia.
