translation:
  language: es
  text: Cuando los filisteos oyeron que habían ungido a David como rey sobre Israel, subieron todos los filisteos para buscar a David; y David, al oírlo, descendió a la fortaleza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al bastión». El hebreo denota un lugar fortificado o una fortaleza.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - Filisteos
  lexicon: HALOT
  rationale: Se conserva el nombre del pueblo como gentilicio bíblico usual en español, en minúscula por ser nombre de grupo étnico en el flujo narrativo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Introduce el contenido de lo que oyeron: que David había sido ungido rey sobre Israel.'
- source_word: מָשְׁחוּ
  english_pob_choice: they had anointed
  chosen_spanish: habían ungido
  alternatives_spanish:
  - ungieron
  - habían consagrado con aceite
  lexicon: HALOT
  rationale: «Ungir» comunica el acto ritual del hebreo מָשַׁח sin perder el valor técnico; el pretérito pluscuamperfecto refleja la anterioridad respecto de «oyeron».
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: como rey
  alternatives_spanish:
  - rey
  - por rey
  lexicon: HALOT
  rationale: En español, «ungir a David como rey» expresa de forma natural la función predicativa del complemento hebreo.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - de Israel
  lexicon: HALOT
  rationale: Se mantiene la idea de dominio/autoridad que aporta עַל en contexto real.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron y avanzaron
  - ascendieron
  lexicon: HALOT
  rationale: «Subieron» preserva el movimiento ascendente literal del hebreo y su posible valor geográfico/militar sin añadir matices no explícitos.
- source_word: כָל פְּלִשְׁתִּים
  english_pob_choice: all the Philistines
  chosen_spanish: todos los filisteos
  alternatives_spanish:
  - la totalidad de los filisteos
  - todo el ejército filisteo
  lexicon: HALOT
  rationale: Se conserva la totalidad explícita del hebreo; no se restringe a «ejército» porque el texto dice literalmente «todos los filisteos».
- source_word: לְבַקֵּשׁ אֶת דָּוִד
  english_pob_choice: to seek David
  chosen_spanish: para buscar a David
  alternatives_spanish:
  - para procurar a David
  - para buscar a David con intención hostil
  lexicon: HALOT
  rationale: «Buscar» es el equivalente natural de בקש y permite, como en inglés, dejar implícita la intención hostil sin sobretraducirla.
- source_word: וַיִּשְׁמַע דָּוִד
  english_pob_choice: When David heard of it
  chosen_spanish: y David, al oírlo
  alternatives_spanish:
  - y David oyó
  - cuando David lo oyó
  lexicon: HALOT
  rationale: El objeto de oír queda implícito en contexto; «al oírlo» mantiene la conexión narrativa sin añadir palabras innecesarias.
- source_word: וַיֵּרֶד
  english_pob_choice: he went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: HALOT
  rationale: «Descendió» conserva el valor direccional literal de ירד con un registro digno y bíblico.
- source_word: הַמְּצוּדָה
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el fuerte
  - la plaza fortificada
  lexicon: HALOT
  rationale: 'Se adopta la alternativa ya documentada por la nota inglesa: el término puede denotar una fortificación; «fortaleza» es natural en español y conserva la idea de lugar defensivo.'
theological_decisions:
- issue: Tratamiento del topónimo/gentilicio «filisteos» y del título real de David
  english_pob_reading: David was anointed king over Israel
  chosen_spanish_reading: David había sido ungido como rey sobre Israel
  alternative_spanish_readings:
  - había sido ungido rey sobre Israel
  - había sido consagrado rey sobre Israel
  rationale: No hay tensión doctrinal especial, pero conviene mantener «ungido» por su peso técnico en la narrativa davídica; «como rey» explicita la función predicativa sin alterar el sentido del texto.
  doctrine_reference: 2 Samuel 5; unción real en la historia de Israel
translation_notes:
  revision_awareness: Se siguió el sentido del hebreo y el audit trail inglés sin cambios relevantes respecto del análisis base; la única decisión destacable es resolver הַמְּצוּדָה como «la fortaleza», con nota alternativa al pie, en línea con la nota inglesa sobre «the stronghold / the fortress».
  spanish_consistency_notes:
  - Se usa «ungido» para מָשַׁח y no «consagrado» para conservar el valor ritual específico.
  - Se mantiene la progresión narrativa con pluscuamperfecto en «habían ungido» para reflejar anterioridad.
  - «Buscar» preserva la ambigüedad de בקש sin interpretar de más la intención filistea.
  - «Fortaleza» se usa como equivalente idiomático de מְצוּדָה, con nota que conserva la alternativa «fortaleza/fuerte».
