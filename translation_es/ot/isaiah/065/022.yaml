translation:
  language: es
  text: No edificarán y otro habitará; no plantarán y otro comerá. Porque como los días de un árbol serán los días de mi pueblo, y mis escogidos desgastarán[a] la obra de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «usarán o agotarán la obra de sus manos»; es decir, la disfrutarán durante toda su duración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְנוּ
  english_pob_choice: they will build
  chosen_spanish: edificarán
  alternatives_spanish:
  - construirán
  - edificarán
  lexicon: HALOT
  rationale: El verbo básico de construir una vivienda o estructura puede expresarse en español con «edificar» o «construir». «Edificarán» conserva el matiz de levantar algo habitable y suena natural en este contexto.
- source_word: וְאַחֵר יֵשֵׁב
  english_pob_choice: and another inhabit
  chosen_spanish: para que otro habite
  alternatives_spanish:
  - y otro habitará
  - para que otro viva allí
  - para que otro habite
  lexicon: HALOT
  rationale: 'El hebreo expresa el resultado injusto: uno construye y otro ocupa. En español, «para que otro habite» reproduce bien esa relación causal y evita una traducción demasiado mecánica.'
- source_word: יִטְּעוּ
  english_pob_choice: they will plant
  chosen_spanish: plantarán
  alternatives_spanish:
  - sembrarán
  - plantarán
  lexicon: HALOT
  rationale: «Plantarán» es la correspondencia directa y más precisa para נטע en este contexto agrícola.
- source_word: וְאַחֵר יֹאכֵל
  english_pob_choice: and another eat
  chosen_spanish: para que otro coma
  alternatives_spanish:
  - y otro comerá
  - para que otro coma
  lexicon: HALOT
  rationale: 'En español conviene explicitar la relación de finalidad implícita para conservar el contraste: el fruto del trabajo termina en manos de otro.'
- source_word: כִּי כִימֵי הָעֵץ
  english_pob_choice: For the days of a tree
  chosen_spanish: Porque como los días de un árbol
  alternatives_spanish:
  - Porque como los días del árbol
  - Porque como los días de un árbol
  lexicon: HALOT
  rationale: La comparación hebrea se conserva con «como». «Un árbol» expresa de forma natural el valor genérico del singular hebreo con artículo.
- source_word: יְמֵי עַמִּי
  english_pob_choice: the days of my people
  chosen_spanish: serán los días de mi pueblo
  alternatives_spanish:
  - serán los días de mi pueblo
  - serán los días de mi pueblo
  lexicon: HALOT
  rationale: Se mantiene la construcción posesiva sin añadir interpretación. «Mi pueblo» es la forma directa y clara de עַמִּי.
- source_word: וּמַעֲשֵׂה יְדֵיהֶם
  english_pob_choice: the work of their hands
  chosen_spanish: la obra de sus manos
  alternatives_spanish:
  - la obra de sus manos
  - el trabajo de sus manos
  - la obra de sus manos
  lexicon: HALOT
  rationale: «Obra de sus manos» conserva el hebraísmo tradicional y el sentido del producto del trabajo humano. «Trabajo» sería posible, pero «obra» suena más cercana al sustantivo hebreo מַעֲשֶׂה.
- source_word: יְבַלּוּ
  english_pob_choice: will wear out
  chosen_spanish: desgastarán
  alternatives_spanish:
  - gastarán
  - desgastarán
  - consumirán
  lexicon: HALOT
  rationale: 'La revisión inglesa volvió a un valor más directo de בלה: desgastar, usar hasta agotar con el tiempo. En español, «desgastarán» preserva esa imagen de uso prolongado sin convertirla en una paráfrasis demasiado libre.'
- source_word: בְחִירָי
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis escogidos
  - mis elegidos
  lexicon: HALOT
  rationale: «Escogidos» mantiene el valor de בחר y evita cargar el término con un tecnicismo doctrinal más fuerte que el hebreo mismo. «Elegidos» es posible, pero «escogidos» resulta más sobrio en este contexto.
theological_decisions:
- issue: Sentido de יְבַלּוּ en un contexto de bendición escatológica
  english_pob_reading: will wear out the work of their hands
  chosen_spanish_reading: desgastarán la obra de sus manos
  alternative_spanish_readings:
  - disfrutarán plenamente la obra de sus manos
  - usarán por completo la obra de sus manos
  - vivirán lo suficiente para disfrutar de la obra de sus manos
  rationale: La revisión del POB inglés optó por una traducción más directa de יבלו. En español, «desgastarán» conserva la imagen de duración prolongada y uso continuo, sin borrar la tensión semántica del verbo. Dado el contexto, la idea es que los escogidos vivirán tanto que el producto de su trabajo no será arrebatado por otro, sino sostenido hasta su pleno curso.
  doctrine_reference: 'Translation philosophy #1, #5, #6'
- issue: Relación entre la construcción, la plantación y el usufructo por otro
  english_pob_reading: They will not build and another inhabit; they will not plant and another eat.
  chosen_spanish_reading: No edificarán para que otro habite; no plantarán para que otro coma.
  alternative_spanish_readings:
  - No edificarán y otro habitará; no plantarán y otro comerá.
  - No construirán para que otro habite; no sembrarán para que otro coma.
  rationale: 'El hebreo presenta una reversión de injusticia: el fruto del trabajo no será arrebatado. El español con «para que» hace explícita la relación de desplazamiento que está implícita en la secuencia verbal, sin alterar el contenido.'
  doctrine_reference: Isaías 65:22; restauración y justicia en la bendición final
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que corrigió la cláusula final desde una paráfrasis de disfrute a una versión más directa de יבלו («will wear out»). La redacción española sigue esa revisión y evita suavizar el verbo, pero mantiene la claridad idiomática en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» según la terminología base del proyecto, aunque este versículo no lo contiene explícitamente.
  - Se traduce עַמִּי con «mi pueblo» y בְחִירַי con «mis escogidos», manteniendo la distinción entre pueblo colectivo y escogidos dentro de él.
  - La comparación con «un árbol» busca reflejar el valor genérico del hebreo sin añadir interpretación botánica o simbólica no atestiguada.
