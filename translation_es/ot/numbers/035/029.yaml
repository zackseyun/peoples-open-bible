review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: demostrativo plural, valor normativo futuro, vigencia generacional y alcance espacial. Sin embargo, dos giros no preservan bien la naturalidad ni del todo la fuerza jurídica en español: falta el artículo en «un estatuto de juicio», y «lugares de habitación» suena calcado y poco idiomático para מוֹשָׁב en este contexto legal.'
  spanish_quality_summary: 'La redacción es comprensible, pero algo rígida. «Estas serán» suena menos natural que «estas cosas serán» o mejor «esto será», pero puede mantenerse si se ajusta el resto. La mejora principal es hacer más idiomático el núcleo nominal y el complemento final: «un estatuto de juicio» y «en todos los lugares donde ustedes habiten» o «en todas sus poblaciones». Para conservar cercanía al POB y al hebreo, conviene usar una formulación formal pero clara.'
  glossary_alignment: 'No hay términos del glosario principal especialmente implicados aquí. La decisión sobre מִשְׁפָּט como «juicio» es defendible y sigue la revisión inglesa. «Estatuto» también es adecuado para חֻקָּה. La excepción necesaria es estilística: para מוֹשְׁבֹתֵיכֶם conviene apartarse de un calco demasiado literal y usar una expresión española más natural.'
  issues:
  - severity: medium
    issue: Falta artículo indefinido en «estatuto de juicio».
    rationale: En español jurídico y bíblico natural, «serán para ustedes un estatuto de juicio» fluye mejor y refleja mejor el valor predicativo de לְחֻקַּת מִשְׁפָּט.
  - severity: medium
    issue: «Lugares de habitación» es poco idiomático y suena calcado.
    rationale: Aunque intenta preservar «dwelling places», en español moderno resulta forzado. El hebreo מוֹשָׁב aquí apunta a lugares de residencia/asentamiento; una expresión como «lugares donde ustedes habiten» comunica el sentido con más claridad.
  - severity: low
    issue: La nota a está formulada como alternativa pero repite casi exactamente la lectura principal.
    rationale: Si el texto principal ya lleva «un estatuto de juicio», la nota no debe presentar esa misma formulación como alternativa; debe conservar las alternativas reales documentadas por el inglés.
  revised_spanish_text: Y estas serán para ustedes un estatuto de juicio[a] por todas sus generaciones, en todos los lugares donde ustedes habiten[b].
  revised_footnotes:
  - marker: a
    text: 'O: «un estatuto legal». La expresión hebrea combina un estatuto establecido con una decisión o procedimiento judicial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en todos sus asentamientos».'
    reason: lexical_alternative
  revision_rationale: Se añadió el artículo indefinido para una sintaxis española natural, se reemplazó el calco rígido «lugares de habitación» por «lugares donde ustedes habiten» para reflejar mejor מוֹשָׁב en español claro, y se ajustó la nota a para que preserve solo alternativas reales sin duplicar la lectura principal.
