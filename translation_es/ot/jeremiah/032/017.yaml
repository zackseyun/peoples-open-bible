  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוִה como «Yahvé», no enmascarado; no hay conflictos con otros términos clave. La decisión «Señor Yahvé» está bien justificada en este compuesto. La alternativa léxica de פלא debe conservarse en nota, pero anclada a la frase final.'
