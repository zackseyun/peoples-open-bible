base_translation:
  language: en
  yaml_path: translation/ot/2_kings/010/014.yaml
  text: And he said[a], “Capture them alive.” So they captured them alive and slaughtered them at the pit of Beth-eked, forty-two men[c][b]; he did not leave a man of them.
  footnotes:
  - marker: a
    text: Or “by the pit” or “into the pit.” The Hebrew preposition can be understood in more than one spatial sense here.
    reason: lexical_alternative
  - marker: b
    text: Beth-eked is a place name; the Hebrew may reflect an underlying meaning such as “house of binding/gathering,” but it functions here as a proper name.
    reason: cultural_note
  - marker: c
    text: Hebrew “he left not a man of them,” emphasizing that none survived.
    reason: lexical_alternative
