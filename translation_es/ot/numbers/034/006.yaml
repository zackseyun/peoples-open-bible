translation:
  language: es
  text: Y el límite occidental será para ustedes el Gran Mar como límite[a]; este será para ustedes el límite occidental.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «límite de mar» / «límite marino». En este contexto de límites territoriales, יָם («mar») también funciona como término direccional para el oeste; por eso se traduce «occidental».
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En un contexto de reparto territorial, גְּבוּל se refiere a una línea o demarcación territorial. «Límite» suena natural en español bíblico contemporáneo y conserva la idea de delimitación sin cargarla con matices políticos modernos de «frontera».
- source_word: יָם
  english_pob_choice: western
  chosen_spanish: occidental
  alternatives_spanish:
  - del mar
  - occidente
  lexicon: HALOT
  rationale: En la expresión inicial גְּבוּל יָם, el hebreo usa «mar» con fuerza direccional, es decir, el lado del oeste. «Occidental» comunica esa función direccional en español mejor que un literal «del mar» dentro de esta fórmula de linderos.
- source_word: הַיָּם הַגָּדוֹל
  english_pob_choice: the Great Sea
  chosen_spanish: el Gran Mar
  alternatives_spanish:
  - el gran mar
  - el Mar Grande
  lexicon: HALOT
  rationale: Es la designación geográfica habitual del Mediterráneo en la Biblia. Mantener «Gran Mar» conserva el valor de título geográfico y el vínculo con la formulación hebrea.
- source_word: וְהָיָה לָכֶם
  english_pob_choice: shall be for you
  chosen_spanish: será para ustedes
  alternatives_spanish:
  - les pertenecerá
  - será de ustedes
  lexicon: HALOT
  rationale: La frase introduce qué constituirá el límite del pueblo. «Será para ustedes» conserva la estructura asignativa del hebreo sin forzar un matiz de posesión absoluta que el contexto no exige.
- source_word: וּגְבוּל
  english_pob_choice: as a border
  chosen_spanish: como límite
  alternatives_spanish:
  - como borde
  - como frontera
  lexicon: HALOT
  rationale: Después de «el Gran Mar», el sustantivo retoma su función delimitadora. «Como límite» explica la relación apposicional en español de modo claro y sobrio.
- source_word: זֶה יִהְיֶה לָכֶם
  english_pob_choice: this shall be your
  chosen_spanish: este será para ustedes
  alternatives_spanish:
  - esto será para ustedes
  - este les será
  lexicon: HALOT
  rationale: La fórmula resumptiva cierra la declaración de lindes. «Este será para ustedes» preserva el tono formal y el valor resumitivo del hebreo.
- source_word: גְּבוּל יָם
  english_pob_choice: western border
  chosen_spanish: límite occidental
  alternatives_spanish:
  - límite del mar
  - límite hacia el mar
  lexicon: HALOT
  rationale: La expresión completa vuelve a referirse al lado occidental. «Límite occidental» da en español la misma lectura contextual que la traducción auditada en inglés, evitando una literalidad que oscurecería la dirección.
translation_notes:
  revision_awareness: Se siguió la lectura auditada del inglés POB, que entiende גְּבוּל יָם como expresión direccional para el oeste y trata הַיָּם הַגָּדוֹל como el Gran Mar. No hubo revisiones posteriores que alteraran esa decisión.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «límite» a «frontera» por ser más neutral y apropiado para una descripción topográfica de herencia territorial.
  - Se conservó el valor direccional de יָם en el primer segmento mediante «occidental», en paralelo con la audit trail inglesa.
  - La nota al pie mantiene la tensión léxica entre la lectura literal de «mar» y la lectura contextual de «oeste».
