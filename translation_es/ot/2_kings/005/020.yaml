translation:
  language: es
  text: 'Pero Giezi, siervo de Eliseo, el hombre de Dios, dijo: «Mira, mi señor ha dejado pasar a Naamán, este arameo[a], al no tomar de su mano lo que trajo.[b] ¡Vive Yahvé![c] Correré tras él y tomaré algo de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Naamán, este arameo»; se conserva el sentido del orden appositivo, con leve ajuste para que suene natural en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se ha abstenido de tomar de su mano lo que trajo». El hebreo enfatiza la abstención de recibir lo ofrecido.'
    reason: alternative_reading
  - marker: c
    text: 'Fórmula de juramento hebrea: «Vive Yahvé».'
    reason: cultural_note
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - muchacho
  - ayudante
  lexicon: HALOT
  rationale: En este contexto de corte/casa, el término describe la relación de dependencia de Giezi respecto de Eliseo. «Siervo» conserva la fuerza funcional sin sugerir solo edad, y en español bíblico sigue siendo claro.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta de Dios
  lexicon: HALOT
  rationale: Es un título profético estable y transparente. «El hombre de Dios» comunica bien el valor del hebreo sin sobrecargar el texto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Ve
  lexicon: HALOT
  rationale: Introduce la reacción de Giezi con fuerza discursiva. «Mira» suena natural en español moderno y conserva el tono enfático.
- source_word: חָשַׂךְ
  english_pob_choice: has spared
  chosen_spanish: ha perdonado
  alternatives_spanish:
  - se ha abstenido de
  - ha retenido de
  - ha ahorrado a
  lexicon: HALOT
  rationale: El hebreo expresa que Eliseo se abstuvo de tomar algo de Naamán; en español, «ha perdonado» comunica esa renuncia benévola y funciona bien con la frase siguiente sobre no tomar de su mano. Mantiene la tensión entre «perdonar/ahorrar» y «abstenerse» que el contexto permite.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi maestro
  lexicon: HALOT
  rationale: Aquí Giezi se refiere a su superior humano, no a Dios. «Mi señor» es el equivalente más natural y digno en español para esa relación de subordinación.
- source_word: הָאֲרַמִּי
  english_pob_choice: Aramean
  chosen_spanish: arameo
  alternatives_spanish:
  - sirio
  lexicon: HALOT
  rationale: «Arameo» refleja mejor el etnónimo hebreo que «sirio», que puede introducir una equivalencia histórica más amplia de lo que el texto dice.
- source_word: מִקַּחַת מִיָּדוֹ
  english_pob_choice: by not taking from his hand
  chosen_spanish: al no tomar de su mano
  alternatives_spanish:
  - al no recibir de su mano
  - por no tomar de su mano
  lexicon: HALOT
  rationale: La construcción infinitiva expresa la abstención de Eliseo. «Al no tomar de su mano» conserva la imagen hebrea de recibir un obsequio desde la mano del oferente y evita una paráfrasis excesiva.
- source_word: אֵת אֲשֶׁר הֵבִיא
  english_pob_choice: what he brought
  chosen_spanish: lo que había traído
  alternatives_spanish:
  - lo que trajo
  - aquello que había traído
  lexicon: HALOT
  rationale: El relativo indefinido se vierte de forma natural con «lo que había traído», manteniendo la referencia al presente ofrecido por Naamán.
- source_word: חַי יְהוָה
  english_pob_choice: As the LORD lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Vive Yahvé y…!
  - Por la vida de Yahvé
  lexicon: HALOT
  rationale: El hebreo contiene la fórmula de juramento con el nombre divino. En la política del proyecto, יְהוָה se rinde como «Yahvé», y la fórmula se expresa de modo idiomático en español con la exclamación juramentaria.
- source_word: רַצְתִּי אַחֲרָיו
  english_pob_choice: I will run after him
  chosen_spanish: correré tras él
  alternatives_spanish:
  - iré corriendo tras él
  - lo perseguiré
  lexicon: HALOT
  rationale: «Correré tras él» es fiel y natural en español. Conserva la inmediatez de la decisión de Giezi sin volverla más intensa de lo que el hebreo exige.
- source_word: מְאוּמָה
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - alguna cosa
  - nada
  lexicon: HALOT
  rationale: En este contexto, Giezi pretende obtener un regalo; «algo» reproduce la idea de una cantidad indefinida y permite mantener el matiz pragmático del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en la fórmula de juramento
  english_pob_reading: As the LORD lives
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - ¡Vive el Señor!
  - ¡Vive Yahvé y…!
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la norma del proyecto, no se sustituye por un título genérico; se translitera como «Yahvé» para preservar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Valor de חָשַׂךְ en relación con la acción de Eliseo
  english_pob_reading: has spared Naaman this Aramean by not taking from his hand what he brought
  chosen_spanish_reading: ha perdonado a Naamán este arameo, al no tomar de su mano lo que había traído
  alternative_spanish_readings:
  - se ha abstenido de tomar de su mano lo que había traído
  - ha retenido de tomar de su mano lo que había traído
  rationale: 'El hebreo enfatiza la abstención de recibir un obsequio. La formulación española mantiene esa tensión: el verbo principal sugiere la benevolencia/renuncia y la cláusula subordinada explicita el acto omitido.'
  doctrine_reference: Principio POB de mantener la fuerza léxica y no borrar tensiones semánticas documentadas
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés auditado que ajustó el orden de los apposicionales y prefirió una redacción más directa para la idea de abstención. En español, se preserva la cercanía al hebreo sin calcar el orden inglés, y se evita una formulación demasiado explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en la línea principal, conforme al estándar del proyecto.
  - Se mantiene «arameo» para הָאֲרַמִּי y no «sirio», para preservar la referencia étnico-geográfica.
  - «Mi señor» se reserva para el superior humano, no para el nombre divino.
  - La cláusula «al no tomar de su mano» conserva la imagen corporal del hebreo y su valor de recepción de obsequio.
