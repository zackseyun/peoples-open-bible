translation:
  language: es
  text: 'Él ha multiplicado a los que tropiezan; sí, cada hombre cae contra su compañero, y dicen: «Levántate, y volvamos a nuestro pueblo y a la tierra de nuestro nacimiento, lejos de la espada del opresor[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la espada de la paloma». El hebreo puede leerse literalmente así, pero en el contexto suele entenderse como «la espada del opresor» o «del violento».
    reason: alternative_reading
lexical_decisions:
- source_word: הִרְבָּה
  english_pob_choice: He has multiplied
  chosen_spanish: Él ha multiplicado
  alternatives_spanish:
  - Él ha aumentado
  - Él ha hecho crecer
  lexicon: HALOT
  rationale: El hifil de רבה conserva la idea causativa de multiplicar o aumentar. «Ha multiplicado» mantiene la fuerza verbal sin suavizarla.
- source_word: כּוֹשֵׁל
  english_pob_choice: the stumbling
  chosen_spanish: los que tropiezan
  alternatives_spanish:
  - el tropiezo
  - los que caen
  lexicon: HALOT
  rationale: El participio se usa de forma sustantiva. En español, «los que tropiezan» comunica mejor el valor humano/colectivo que un sustantivo abstracto y sigue siendo fiel al hebreo comprimido.
- source_word: גַּם
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - también
  - ciertamente
  lexicon: HALOT
  rationale: Aquí גַּם intensifica la afirmación. «Sí» funciona como refuerzo discursivo breve y natural en español.
- source_word: נָפַל אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: each man falls against his companion
  chosen_spanish: cada hombre cae contra su compañero
  alternatives_spanish:
  - uno cae sobre otro
  - cada uno cae contra su prójimo
  lexicon: HALOT
  rationale: La distribución singular de אִישׁ se expresa con «cada hombre». «Contra su compañero» conserva la imagen de colisión caótica que transmite אֶל.
- source_word: קוּמָה
  english_pob_choice: Come
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ven
  - Arriba
  lexicon: HALOT
  rationale: El imperativo suena literalmente como «Levántate/Arise». En español, el mandato encaja mejor con la exhortación colectiva si se conserva la forma literal en el diálogo.
- source_word: וְנָשֻׁבָה
  english_pob_choice: let us return
  chosen_spanish: volvamos
  alternatives_spanish:
  - regresemos
  - volvamos otra vez
  lexicon: HALOT
  rationale: La cohorte expresa resolución compartida. «Volvamos» es idiomático y conserva la dirección de שוב.
- source_word: עַמֵּנוּ
  english_pob_choice: our people
  chosen_spanish: nuestro pueblo
  alternatives_spanish:
  - nuestra gente
  - nuestra nación
  lexicon: HALOT
  rationale: En este contexto nacional/étnico, «pueblo» reproduce bien el valor colectivo de עם.
- source_word: אֶרֶץ מוֹלַדְתֵּנוּ
  english_pob_choice: the land of our birth
  chosen_spanish: la tierra de nuestro nacimiento
  alternatives_spanish:
  - la tierra de nuestra natalidad
  - nuestra patria
  lexicon: HALOT
  rationale: La construcción admite una traducción bastante literal. «Tierra de nuestro nacimiento» mantiene la relación entre הארץ y מולדת sin cargarla con un término más interpretativo como «patria».
- source_word: מִפְּנֵי
  english_pob_choice: away from
  chosen_spanish: lejos de
  alternatives_spanish:
  - de delante de
  - apartados de
  lexicon: HALOT
  rationale: La expresión indica huida ante una amenaza. «Lejos de» expresa con naturalidad el alejamiento resultante.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada de guerra
  - el filo
  lexicon: HALOT
  rationale: «Espada» es el equivalente normal y conserva la imagen militar concreta.
- source_word: הַיּוֹנָה
  english_pob_choice: the oppressor
  chosen_spanish: el opresor
  alternatives_spanish:
  - la paloma
  - el violento
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual preferida por el POB inglés: en un escenario de guerra, «el opresor» comunica la referencia entendida por el pasaje mejor que la lectura literal oscura.'
theological_decisions:
- issue: Lectura de הַיּוֹנָה en la clausula final
  english_pob_reading: the oppressor
  chosen_spanish_reading: el opresor
  alternative_spanish_readings:
  - la paloma
  - la espada de la paloma
  rationale: No es una cuestión doctrinal, sino de interpretación léxica y contextual. La lectura contextual coherente con el anuncio de huida ante la espada es «el opresor»; la lectura literal queda preservada como alternativa en la nota.
  doctrine_reference: none
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés presentan alta concordancia y sin cambios de revisión en el pasaje. Se mantuvo la misma decisión contextual para הַיּוֹנָה y se preservó la tensión lexical mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se preserva el paralelismo de huida y regreso con un español natural: «nuestro pueblo / la tierra de nuestro nacimiento».'
  - Se usa «espada» para חֶרֶב y no un término abstracto, para conservar la imagen bélica concreta.
