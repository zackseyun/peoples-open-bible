  to: Porque cuando yo lo introduzca en la tierra que juré a sus padres[a], una tierra que mana leche y miel, y coma y se sacie y engorde, entonces se volverá a otros dioses y los servirá, y me despreciarán[b] y romperá mi pacto.
  rationale: Se corrige el modismo a «mana leche y miel» para un español bíblico natural y fiel. También se restituye el cambio singular/plural documentado en la evidencia fuente, usando «me despreciarán» y ajustando la nota para reflejar con precisión ese rasgo del hebreo. Se cambia «les servirá» por «los servirá» para corresponder al objeto directo personal no introducido por preposición en español estándar con cosa/no persona; en este contexto también suena más natural con «otros dioses».
