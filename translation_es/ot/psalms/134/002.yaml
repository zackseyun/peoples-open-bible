review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien los imperativos hebreos («שְׂאוּ», «וּבָרֲכוּ») y preserva correctamente el nombre divino como «Yahvé». Sin embargo, no sigue fielmente la decisión léxica/teológica auditada en inglés respecto de קֹדֶשׁ: el English POB actual pone en el texto principal «the holy place» y reserva «toward the sanctuary / in the sanctuary» para nota, mientras que el español introduce «hacia», que añade una dirección no presente en «el lugar santo» y desplaza una alternativa de la nota al texto principal.'
  spanish_quality_summary: El español es comprensible, pero mezcla un registro peninsular/tradicional («Alzad», «vuestras», «bendecid») menos acorde con un español neutral latinoamericano amplio. Además, «hacia el lugar santo» suena algo forzado frente a una formulación más natural y más ajustada al audit trail. Una revisión menor mejora fidelidad y naturalidad.
  glossary_alignment: «Yahvé» está correctamente usado según la terminología del proyecto. «Bendecid»/«bendigan» preserva bien ברך; para neutralidad panhispánica conviene «Levanten ... y bendigan». No hay conflicto con otros términos base.
  issues:
  - severity: medium
    issue: «hacia el lugar santo» introduce un matiz direccional no reflejado por la decisión principal auditada
    rationale: El English POB actual fijó como texto principal «to the holy place», pero la documentación conserva como alternativas «toward the sanctuary» y «in the sanctuary». En español, «hacia» equivale más claramente a «toward», de modo que el borrador mueve al cuerpo una alternativa que debía quedar en nota.
  - severity: medium
    issue: La nota omite la alternativa cualitativa «santidad» preservada en la evidencia inglesa
    rationale: Tanto la nota inglesa como las decisiones léxicas/teológicas subrayan la tensión entre lugar santo y santidad. La nota española actual solo ofrece alternativas locativas («hacia/en el santuario»), perdiendo una parte importante de la ambigüedad documentada.
  - severity: low
    issue: Registro menos neutral para el español meta del proyecto
    rationale: «Alzad vuestras ... bendecid» es inteligible, pero suena marcadamente peninsular/litúrgico. «Levanten sus manos ... y bendigan» encaja mejor con un español neutral latinoamericano sin perder dignidad.
  revised_spanish_text: Levanten sus manos al lugar santo[a] y bendigan a Yahvé.
  revised_footnotes:
  - marker: a
    text: O «hacia el santuario», «en el santuario» o «en santidad». El hebreo קֹדֶשׁ puede referirse tanto a santidad como a un lugar santo.
    reason: alternative_reading
  revision_rationale: Se ajusta el texto principal para reflejar mejor la decisión auditada del English POB sobre קֹדֶשׁ («the holy place») sin introducir un matiz direccional extra; se restaura en la nota la tensión semántica completa, incluida la lectura cualitativa «en santidad»; y se mejora la neutralidad del español manteniendo un tono digno.
