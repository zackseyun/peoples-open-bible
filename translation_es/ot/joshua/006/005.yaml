revisions:
- from: Y cuando se extienda[b] el cuerno del carnero[a], cuando oigan el sonido del cuerno, todo el pueblo dará un gran grito, y el muro de la ciudad caerá hacia abajo debajo de él, y el pueblo subirá[c], cada hombre derecho delante de él.
  to: Y cuando el cuerno del carnero dé un toque prolongado[a], cuando oigan el sonido de la trompeta, todo el pueblo dará un gran grito, y el muro de la ciudad caerá en su lugar[b], y el pueblo subirá[c], cada hombre directamente hacia adelante.
  rationale: La revisión corrige calcos poco naturales y un error verbal, mientras preserva las decisiones léxicas clave de la auditoría inglesa. 'Dé un toque prolongado' expresa el modismo de בִּמְשֹׁךְ; 'sonido de la trompeta' distingue bien שׁוֹפָר; 'caerá en su lugar' evita un español defectuoso y mantiene en nota la imagen hebrea de desplome vertical; y 'directamente hacia adelante' transmite la fuerza distributiva de נֶגְדּוֹ con claridad.
