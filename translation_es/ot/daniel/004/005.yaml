translation:
  language: es
  text: 'Por fin Daniel compareció ante mí —aquel cuyo nombre era Beltsasar, según el nombre de mi dios, y en quien está el espíritu de los dioses santos[a]—, y conté el sueño delante de él:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Espíritu del Dios santo» o «el espíritu del Dios santo». El arameo puede entenderse de otro modo, pero aquí la manera de hablar del rey refleja más naturalmente su perspectiva pagana: «el espíritu de los dioses santos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַד אָחֳרֵין
  english_pob_choice: At last
  chosen_spanish: Por fin
  alternatives_spanish:
  - Al final
  - Finalmente
  - Y por fin
  lexicon: HALOT
  rationale: La expresión aramea indica demora y llegada al final de una espera; «Por fin» reproduce de forma natural esa idea de culminación temporal en español sin perder el matiz de alivio o desenlace.
- source_word: עַל קָדָמַי
  english_pob_choice: came in before me
  chosen_spanish: entró delante de mí
  alternatives_spanish:
  - vino ante mí
  - entró en mi presencia
  - compareció ante mí
  lexicon: HALOT
  rationale: La locución señala venir o entrar ante la presencia del rey. «Entró delante de mí» conserva el movimiento y el marco cortesano con un español claro y digno.
- source_word: דָּנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - —
  lexicon: Nombre propio estándar
  rationale: Se conserva el nombre propio en su forma usual en español.
- source_word: דִּי שְׁמֵהּ בֵּלְטְשַׁאצַּר
  english_pob_choice: he whose name was Belteshazzar
  chosen_spanish: aquel cuyo nombre era Beltsasar
  alternatives_spanish:
  - cuyo nombre era Beltsasar
  - el que tenía por nombre Beltsasar
  lexicon: HALOT
  rationale: La cláusula relativa identifica a Daniel por su nombre babilónico. «Aquel cuyo nombre era» mantiene la función identificadora sin forzar una paráfrasis.
- source_word: כְּשֻׁם אֱלָהִי
  english_pob_choice: after the name of my god
  chosen_spanish: como el nombre de mi dios
  alternatives_spanish:
  - según el nombre de mi dios
  - llamado por el nombre de mi dios
  lexicon: HALOT
  rationale: El giro arameo expresa correspondencia en el nombramiento. En español, «como el nombre de mi dios» refleja de modo natural la relación nominal que el rey presupone.
- source_word: וְדִי רוּחַ אֱלָהִין קַדִּישִׁין בֵּהּ
  english_pob_choice: and in whom is the spirit of the holy gods
  chosen_spanish: y en quien está el espíritu de los dioses santos
  alternatives_spanish:
  - y en quien está el espíritu del Dios santo
  - y en quien está el Espíritu del Dios santo
  lexicon: HALOT
  rationale: Se conserva la lectura pagana del hablante, con el plural «dioses» para reflejar אֱלָהִין y «santos» para קַדִּישִׁין. «Espíritu» en singular mantiene la construcción nominal del arameo sin decidir indebidamente por una persona divina.
- source_word: וְחֶלְמָא קָדָמוֹהִי אַמְרֵת
  english_pob_choice: and I told the dream before him
  chosen_spanish: y conté el sueño delante de él
  alternatives_spanish:
  - y le conté el sueño
  - y relaté el sueño en su presencia
  lexicon: HALOT
  rationale: El verbo admite el sentido de decir/contar/relatar. «Conté el sueño» mantiene la idea de narración completa, y «delante de él» conserva la escena de audiencia.
theological_decisions:
- issue: 'רוּחַ אֱלָהִין קַדִּישִׁין: plural pagano o singular reverente'
  english_pob_reading: the spirit of the holy gods
  chosen_spanish_reading: el espíritu de los dioses santos
  alternative_spanish_readings:
  - el Espíritu del Dios santo
  - el espíritu del Dios santo
  rationale: El hablante es Nabucodonosor y el arameo usa plural explícito con adjetivo plural. La traducción principal preserva esa perspectiva pagana en vez de armonizarla con una lectura monoteísta; las alternativas se conservan porque la frase puede entenderse de otra manera en contextos afines, pero aquí la voz del rey debe mantenerse.
  doctrine_reference: Preservar la tensión textual y la perspectiva del hablante; primacía del arameo sobre la armonización doctrinal.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y el arameo: conserva la demora temporal, la entrada ante la presencia real, la identificación por nombre babilónico, y especialmente la ambigüedad teológica de רוּחַ אֱלָהִין קַדִּישִׁין sin resolverla artificialmente. No se introdujeron cambios respecto al sentido base del POB inglés, solo ajustes idiomáticos necesarios para una publicación clara en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente requiera explícitamente el nombre divino; aquí no aparece.
  - Se prefirió «dioses santos» para reflejar el plural arameo y la voz de Nabucodonosor.
  - «Delante de mí / delante de él» mantiene la escena cortesana y la repetición pragmática del original.
  - «Beltsasar» sigue la forma española habitual del nombre babilónico, sin añadir equivalencias interpretativas.
