base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/056.yaml
  text: And they appointed the Levites[a], from twenty years old and upward, over the works of the Lord. Then Jeshua stood with his sons and brothers, and Kadmiel his brother, and the sons of Jeshua son of Henadad, and the sons of Judah son of Eliadun, together with their sons and brothers—all the Levites, united as supervisors of the work, carrying on the works in the house of the Lord[d][c][b]. And the builders built the temple of the Lord.
  footnotes:
  - marker: a
    text: Greek reads Damadiēl; the parallel Ezra tradition identifies this Levite as Kadmiel.
    reason: alternative_reading
  - marker: b
    text: Greek Hemadaboun likely reflects the name Henadad from the parallel Hebrew tradition.
    reason: alternative_reading
  - marker: c
    text: The phrase 'supervisors of the work' translates a rare Greek term meaning those directing or overseeing the labor.
    reason: lexical_alternative
  - marker: d
    text: Some English translations smooth 'works' to singular 'work' in this verse; the Greek uses the plural in both occurrences.
    reason: lexical_alternative
