translation:
  language: es
  text: Mi alma recuerda sin cesar, y se abate dentro de mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Recordando, recuerda; y mi alma se abate sobre mí». La repetición intensifica la acción de recordar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכוֹר תִּזְכּוֹר
  english_pob_choice: continually remembers
  chosen_spanish: recuerda sin cesar
  alternatives_spanish:
  - sigue recordando
  - recuerda continuamente
  - ciertamente recuerda
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la acción. En español, «sin cesar» comunica bien esa insistencia continua sin sonar mecánico. «Sigue recordando» y «recuerda continuamente» también son posibles, pero «recuerda sin cesar» conserva el énfasis poético con buena naturalidad.
- source_word: וְתָשִׁיחַ
  english_pob_choice: is bowed down
  chosen_spanish: se abate
  alternatives_spanish:
  - está abatida
  - se inclina hacia abajo
  - está hundida
  lexicon: HALOT
  rationale: El verbo expresa la idea de ser rebajado, doblado o derribado. «Se abate» conserva el movimiento metafórico y es idiomático en español para el estado de ánimo del alma. Otras opciones eran posibles, pero esta mantiene la imagen concreta sin endurecer el verso.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - sobre mí
  - en mí
  - encima de mí
  lexicon: HALOT
  rationale: Aunque literalmente significa «sobre mí», el contexto poético apunta al interior del sujeto y a su aflicción íntima. «Dentro de mí» expresa de manera natural el sentido idiomático que la POB inglesa también resolvió con una equivalencia óptima.
- source_word: נַפְשִׁי
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - yo mismo
  lexicon: HALOT
  rationale: «נפשׁ» puede referirse al yo, la vida o el alma. En este lamento poético, «mi alma» preserva la textura antropológica y literaria del hebreo. «Mi vida» o «mi ser» aclararían, pero perderían parte del tono tradicional y poético.
translation_notes:
  revision_awareness: La revisión inglesa eliminó la coma antes de «and» por fluidez; en español se siguió una sintaxis igualmente fluida sin coma innecesaria. Se mantuvo el valor intensivo del infinitivo absoluto con una expresión natural («sin cesar»).
  spanish_consistency_notes:
  - Se mantiene «alma» para נַפְשִׁי en coherencia con el registro poético del lamento.
  - No se sustituyó el matiz locativo por una traducción demasiado literal de עָלַי; se optó por una equivalencia idiomática natural.
  - El verbo reflexivo «se abate» conserva la imagen de una caída o humillación interior sin forzar una interpretación doctrinal.
