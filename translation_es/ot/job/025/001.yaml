lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo usa una fórmula narrativa de respuesta en diálogo. En español, «respondió» comunica de forma natural esa función conversacional y mantiene el tono formal sin añadir sentido extra.
- source_word: בִּלְדַּד
  english_pob_choice: Bildad
  chosen_spanish: Bildad
  alternatives_spanish:
  - Bildad
  lexicon: convención onomástica
  rationale: Se conserva el nombre propio en transliteración estándar, sin traducción.
- source_word: הַשֻּׁחִי
  english_pob_choice: the Shuhite
  chosen_spanish: el suhita
  alternatives_spanish:
  - el shuhita
  - el shuíta
  lexicon: HALOT
  rationale: El gentilicio señala origen o afiliación. «Suhita» conserva la referencia a Shuah/Shua con una forma española legible; se evita sustituirlo por un término más interpretativo.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - diciendo
  lexicon: HALOT
  rationale: «Y dijo» reproduce la fórmula narrativa normal del hebreo. En español es la equivalencia más clara y fiel en este contexto.
- source_word: וַ֭יַּעַן ... וַיֹּאמַר
  english_pob_choice: Then ... answered and said
  chosen_spanish: Entonces ... respondió y dijo
  alternatives_spanish:
  - Luego ... respondió y dijo
  - Entonces ... contestó y dijo
  lexicon: HALOT
  rationale: «Entonces» expresa el avance discursivo de la secuencia verbal hebrea. La combinación «respondió y dijo» preserva la fórmula completa sin redundancia excesiva en español.
