translation:
  language: es
  text: Aarón hará expiación sobre sus cuernos una vez al año[a]. Con la sangre de la ofrenda por el pecado de la expiación hará expiación por él una vez al año, a lo largo de sus generaciones. Es santísimo para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “con la sangre de la ofrenda por el pecado de la expiación”. El hebreo dice literalmente “de la sangre de la ofrenda por el pecado de las expiaciones”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר / יְכַפֵּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará propiciación
  - expiará
  - hará atonamiento
  lexicon: HALOT
  rationale: En contexto sacrificial sacerdotal, כפר no expresa solo 'cubrir', sino realizar el rito de expiación. 'Hará expiación' mantiene la fuerza cultual y es natural en español bíblico contemporáneo.
- source_word: קַרְנֹתָיו
  english_pob_choice: its horns
  chosen_spanish: sus cuernos
  alternatives_spanish:
  - sus astas
  - los cuernos de él
  lexicon: HALOT
  rationale: El sufijo posesivo refiere al altar de incienso mencionado en el contexto inmediato. En español, para un objeto inanimado, 'sus cuernos' comunica bien la referencia sin forzar el género.
- source_word: אַחַת בַּשָּׁנָה
  english_pob_choice: once a year
  chosen_spanish: una vez al año
  alternatives_spanish:
  - una vez en el año
  - una sola vez por año
  lexicon: HALOT
  rationale: Es la equivalencia idiomática más clara y fiel del valor distributivo hebreo.
- source_word: מִדַּם
  english_pob_choice: with the blood
  chosen_spanish: con la sangre
  alternatives_spanish:
  - de la sangre
  - a partir de la sangre
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente 'de/desde', en español sacrificial el instrumental se expresa mejor con 'con la sangre', que conserva el valor de medio.
- source_word: חַטַּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de expiación
  - ofrenda purificadora
  lexicon: HALOT
  rationale: En español, 'ofrenda por el pecado' es una traducción transparente y ampliamente inteligible del término cultual; evita una paráfrasis demasiado interpretativa.
- source_word: הַכִּפֻּרִים
  english_pob_choice: of atonement
  chosen_spanish: de la expiación
  alternatives_spanish:
  - de las expiaciones
  - de expiación
  lexicon: HALOT
  rationale: El plural hebreo se refleja en el sustantivo abstracto español sin sobrecargar el texto. 'De la expiación' conserva la relación nominal y suena más natural que un plural literal.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por vuestras generaciones
  alternatives_spanish:
  - para vuestras generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: '''Por vuestras generaciones'' mantiene la idea de continuidad normativa a través de las generaciones de Israel y sigue de cerca la estructura hebrea.'
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: Santísimo
  alternatives_spanish:
  - santísimo
  - muy santo
  lexicon: HALOT
  rationale: La construcción superlativa hebrea se expresa de forma natural y reverente con 'Santísimo'. Evita confundirlo con el lugar llamado 'Santo de los Santos'.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - pertenece a Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé'' en el texto principal, manteniendo el nombre divino en lugar de una sustitución por ''Señor''.'
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El proyecto español usa 'Yahvé' como representación directa del nombre divino, por lo que se evita la convención de ocultarlo tras un título. En este versículo la dedicación final del objeto es a Yahvé.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido cultual de כפר
  english_pob_reading: shall make atonement
  chosen_spanish_reading: hará expiación
  alternative_spanish_readings:
  - hará propiciación
  - hará purificación ritual
  rationale: La acción sacerdotal es un rito de expiación, no una simple cobertura. 'Expiación' preserva el contenido sacrificial y legal del pasaje.
  doctrine_reference: HALOT / contexto sacerdotal de Levítico-Éxodo
- issue: Término חטאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de expiación
  - ofrenda purificadora
  rationale: Se mantiene el valor sacrificial tradicional del término en español, sin reducirlo a la abstracción 'pecado' ni introducir un tecnicismo menos conocido sin necesidad.
  doctrine_reference: HALOT / contexto cultual
- issue: הַכִּפֻּרִים como construcción nominal
  english_pob_reading: of atonement
  chosen_spanish_reading: de la expiación
  alternative_spanish_readings:
  - de las expiaciones
  rationale: Aunque el hebreo es plural, en español la mejor forma de conservar la relación nominal sin sonar extraña es el singular abstracto 'de la expiación'.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente en el sentido natural de la construcción cultual, pero no se reprodujo mecánicamente: en español se prefirió una formulación más idiomática (''ofrenda por el pecado de la expiación'') y se conservó la tensión del hebreo mediante nota. También se mantuvo el nombre divino en la forma del proyecto español (''Yahvé'') en lugar de la convención inglesa de ''the LORD''.'
  spanish_consistency_notes:
  - Se mantuvo 'expiación' para כפר de modo consistente con el registro cultual del Pentateuco.
  - Se empleó 'Yahvé' según el estándar español del proyecto para יהוה.
  - '''Santísimo'' se eligió para קֹדֶשׁ קָדָשִים por claridad y reverencia, evitando una expresión que pudiera confundirse con el santuario interior.'
