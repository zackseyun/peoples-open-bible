translation:
  language: es
  text: 'Jonatán dijo[a]: «Mira, estamos cruzando hacia los hombres, y nos mostraremos a ellos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jonathan».
    reason: lexical_alternative
  - marker: b
    text: O «nos revelaremos a ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר introduce discurso directo de manera estándar; en español, «dijo» es la equivalencia natural y directa, sin añadir matices de respuesta que el hebreo no exige.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Convención onomástica bíblica
  rationale: Se mantiene el nombre propio con la forma española tradicional y ampliamente reconocible «Jonatán», que conserva la identificación del personaje sin depender del anglicismo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Atiende
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre el plan inmediato. «Mira» conserva la fuerza discursiva de atención de manera natural en español actual; «He aquí» sería más solemne pero menos idiomático.
- source_word: אֲנַחְנוּ
  english_pob_choice: we
  chosen_spanish: estamos
  alternatives_spanish:
  - nosotros estamos
  - vamos a
  lexicon: Pronombre personal explícito
  rationale: El hebreo explicita el sujeto «nosotros». En español, el verbo ya lo incorpora; se conserva el valor progresivo con «estamos», que comunica la acción en curso.
- source_word: עֹבְרִים
  english_pob_choice: are crossing over
  chosen_spanish: cruzando
  alternatives_spanish:
  - pasando
  - atravesando
  - vamos cruzando
  lexicon: HALOT
  rationale: El participio expresa una acción en progreso o inminente. «Cruzando» en perífrasis con «estamos» transmite bien el movimiento de pasar al otro lado, sin perder el matiz táctico del contexto.
- source_word: אֶל הָאֲנָשִׁים
  english_pob_choice: to the men
  chosen_spanish: hacia esos hombres
  alternatives_spanish:
  - a los hombres
  - hacia los hombres
  - a esos hombres
  lexicon: HALOT
  rationale: El hebreo usa אֶל con dirección hacia un grupo concreto. «Hacia» preserva la orientación espacial del movimiento; «esos hombres» refleja la referencia definida y visible en el contexto inmediato. Se evita «a los hombres» por sonar más neutro y perder un poco la dirección.
- source_word: וְנִגְלִינוּ
  english_pob_choice: we will show ourselves
  chosen_spanish: nos mostraremos
  alternatives_spanish:
  - nos revelaremos
  - nos haremos visibles
  lexicon: HALOT
  rationale: 'El nifal de גלה aquí indica hacerse visible o darse a conocer intencionalmente. Se conserva la decisión revisada en el POB inglés: «nos mostraremos» suena natural en español y mantiene la autoexposición deliberada ante el enemigo. «Nos revelaremos» sería más formal, pero menos idiomático.'
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - ante ellos
  - delante de ellos
  lexicon: HALOT
  rationale: La preposición marca el destinatario/observador de la acción de mostrarse. «A ellos» reproduce la relación básica; en español, el sentido de presencia ante ellos ya queda implicado por el verbo «mostrarnos».
theological_decisions:
- issue: Autoexposición deliberada ante el enemigo
  english_pob_reading: we will show ourselves to them
  chosen_spanish_reading: nos mostraremos a ellos
  alternative_spanish_readings:
  - nos revelaremos a ellos
  - nos haremos visibles a ellos
  rationale: 'El texto no plantea una revelación teológica, sino una maniobra táctica: presentarse intencionalmente ante los filisteos. Por eso se evita cargar el verbo con un sentido doctrinal ajeno al contexto. La formulación elegida conserva la intencionalidad y la visibilidad sin añadir más de lo que el hebreo afirma.'
  doctrine_reference: Narrativa histórica; no hay afirmación doctrinal directa en el versículo
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que pasó de «reveal ourselves» a «show ourselves» para una equivalencia más natural e idiomática. En español se reflejó esa decisión con «nos mostraremos», evitando una versión excesivamente formal.
  spanish_consistency_notes:
  - Se mantiene «Jonatán» como forma española del nombre propio, coherente con la convención bíblica en español.
  - Se conserva el movimiento direccional de אֶל con «hacia», por consistencia con la fuerza espacial del hebreo.
  - El verbo pronominal «nos mostraremos» preserva el matiz de autoexposición elegido en la revisión inglesa, sin introducir lenguaje doctrinal.
  - Se usa puntuación de apertura y cierre de comillas según norma española, y el marcador de nota se coloca junto al nombre propio para la alternativa onomástica.
