id: 2TI.2.19
reference: 2 Timothy 2:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ μέντοι στερεὸς θεμέλιος τοῦ θεοῦ ἕστηκεν, ἔχων τὴν σφραγῖδα ταύτην· Ἔγνω κύριος τοὺς ὄντας αὐτοῦ, καί· Ἀποστήτω ἀπὸ ἀδικίας πᾶς ὁ ὀνομάζων τὸ ὄνομα κυρίου.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/019.yaml
  text: 'Nevertheless, the firm foundation of God stands, having this seal: “The Lord knows those who are his,” and, “Let everyone who names the name of the Lord depart from unrighteousness.”'
translation:
  language: ko
  text: '그러나 하나님의 견고한 터는 굳게 서 있고, 그 위에 이러한 인장이 있습니다. 「주께서는 자기 사람들을 아신다.」 또 「주의 이름을 부르는 자는 누구든지 불의에서 떠나라.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ στερεὸς θεμέλιος τοῦ θεοῦ ἕστηκεν
  english_pob_choice: the firm foundation of God stands
  chosen_korean: 하나님의 견고한 터는 굳게 서 있고
  alternatives_korean:
  - 하나님의 굳건한 기초는 서 있고
  - 하나님의 견고한 토대는 서 있고
  lexicon: BDAG
  rationale: θεμέλιος는 건축의 「터·기초」. 한국 성서 전통의 「견고한 터」가 자연스럽다. ἕστηκεν(완료)의 지속적 안정성을 「굳게 서 있다」로 살린다.
- source_word: ἔχων τὴν σφραγῖδα ταύτην
  english_pob_choice: having this seal
  chosen_korean: 그 위에 이러한 인장이 있습니다
  alternatives_korean:
  - 이러한 인을 가지고 있습니다
  - 이러한 도장이 새겨져 있습니다
  lexicon: BDAG
  rationale: σφραγίς는 인장·인. 「인장」이 본문의 공식적 표식 이미지(소속을 표시함)를 자연스럽게 담는다.
- source_word: Ἔγνω κύριος τοὺς ὄντας αὐτοῦ
  english_pob_choice: The Lord knows those who are his
  chosen_korean: 주께서는 자기 사람들을 아신다
  alternatives_korean:
  - 주께서 자기에게 속한 자들을 아신다
  - 주께서는 자기 백성을 아신다
  lexicon: BDAG
  rationale: 민수기 16:5의 인용. 「자기 사람들」이 소속의 의미를 자연스럽게 담는다.
- source_word: ὀνομάζων τὸ ὄνομα κυρίου
  english_pob_choice: names the name of the Lord
  chosen_korean: 주의 이름을 부르는 자
  alternatives_korean:
  - 주의 이름을 일컫는 자
  - 주의 이름을 부르며 주께 속한다고 고백하는 자
  lexicon: BDAG
  rationale: 「이름을 부르다」는 주께 속함을 공적으로 고백하는 관용구. 한국 성서 전통의 「주의 이름을 부르는」을 보존한다.
- source_word: Ἀποστήτω ἀπὸ ἀδικίας
  english_pob_choice: Let everyone ... depart from unrighteousness
  chosen_korean: 불의에서 떠나라
  alternatives_korean:
  - 불의로부터 멀어지라
  - 불의를 멀리하라
  lexicon: BDAG
  rationale: ἀφίστημι(부정과거 명령)의 「떠나라」를 직역. 「불의」는 ἀδικία를 한국어로 가장 분명히 옮긴다.
