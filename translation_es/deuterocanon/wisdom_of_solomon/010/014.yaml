    issue: «los cetros de un reino» suena poco natural y sobrerrepresenta el plural griego
    rationale: El rastro inglés ya documentó que σκῆπτρα, aunque plural en griego, funciona mejor como singular colectivo en la lengua receptora. En español bíblico natural, «el cetro de un reino» comunica el símbolo regio sin aspereza innecesaria.
  - severity: low
    issue: Necesidad de asegurar formulación idiomática en «mostró como falsos a...»
    rationale: La idea griega ψευδεῖς ... ἔδειξεν está bien captada, pero la redacción debe quedar plenamente idiomática en español. La forma revisada conserva la estructura y evita tropiezo sintáctico.
