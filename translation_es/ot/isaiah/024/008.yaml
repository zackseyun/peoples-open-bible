translation:
  language: es
  text: El regocijo de los panderos[a] ha cesado; el ruido de los jubilosos ha cesado; el regocijo de la lira[b] ha cesado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Regocijo» traduce מְשׂוֹשׂ con un matiz de alegría festiva; también puede entenderse como «gozo» o «alegría».
    reason: lexical_alternative
  - marker: b
    text: «Lira» es más preciso para כִּנּוֹר que «arpa», aunque ambas opciones circulan en traducciones tradicionales.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבַת
  english_pob_choice: has ceased
  chosen_spanish: ha cesado
  alternatives_spanish:
  - ha parado
  - ha terminado
  lexicon: HALOT
  rationale: El qal perfecto de שׁבת expresa cese o término de una actividad. «Ha cesado» conserva bien el valor resultativo y encaja de manera natural en un lamento.
- source_word: מְשׂוֹשׂ
  english_pob_choice: mirth
  chosen_spanish: regocijo
  alternatives_spanish:
  - gozo
  - alegría
  - júbilo
  lexicon: HALOT
  rationale: El sustantivo apunta a alegría festiva o exultación. «Regocijo» preserva el matiz celebrativo y evita la posible suavización de «alegría» o el tono demasiado coloquial de otras opciones.
- source_word: תֻּפִּים
  english_pob_choice: tambourines
  chosen_spanish: panderos
  alternatives_spanish:
  - tamboriles
  - panderetas
  lexicon: HALOT
  rationale: תֹּף designa un instrumento manual de percusión. «Panderos» es una equivalencia bíblica clara en español y mantiene el instrumento sin forzar una forma moderna más específica que el hebreo no exige.
- source_word: חָדַל
  english_pob_choice: has stopped
  chosen_spanish: ha parado
  alternatives_spanish:
  - ha cesado
  - se ha detenido
  lexicon: HALOT
  rationale: חָדַל significa cesar o parar. Aquí gobierna un sustantivo auditivo («ruido»), y «ha parado» conserva la fuerza de cese con buena fluidez en español. Se mantiene la alternancia léxica respecto del primer miembro por el paralelismo del hebreo.
- source_word: שְׁאוֹן
  english_pob_choice: noise
  chosen_spanish: ruido
  alternatives_spanish:
  - estruendo
  - tumulto
  - clamor
  lexicon: HALOT
  rationale: El término puede abarcar ruido, estruendo o tumulto. «Ruido» es la opción más directa y neutra para el paralelismo con la música y la celebración.
- source_word: עַלִּיזִים
  english_pob_choice: the jubilant
  chosen_spanish: los jubilosos
  alternatives_spanish:
  - los exultantes
  - los alegres
  - los regocijados
  lexicon: HALOT
  rationale: El adjetivo sustantivado se refiere a quienes se alegran o exultan. «Los jubilosos» mantiene el sentido festivo y el tono colectivo del verso.
- source_word: כִּנּוֹר
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - arpa
  lexicon: HALOT
  rationale: כִּנּוֹר designa el antiguo instrumento de cuerdas, más propiamente «lira» que «arpa». Se conserva así la precisión instrumental que el POB inglés también documenta.
translation_notes:
  revision_awareness: Se siguió el estado revisado del inglés POB, que prefirió un término de alegría festiva para מְשׂוֹשׂ; en español se reflejó con «regocijo» en lugar de un calco rígido. También se conservó la precisión instrumental de כִּנּוֹר como «lira», alineada con la nota auditada del POB.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo del verso con dos cláusulas de cese y una cláusula final repetida.
  - «Regocijo» se usó de forma consistente para מְשׂוֹשׂ en ambas apariciones.
  - Se evitó «SEÑOR» u otra convención de ocultamiento del nombre divino porque este verso no contiene el Tetragrámaton.
  - El nivel de registro es bíblico pero contemporáneo, sin depender de formulaciones arcaicas innecesarias.
