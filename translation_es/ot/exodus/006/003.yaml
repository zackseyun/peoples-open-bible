review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: aparición a los patriarcas, título «Dios Todopoderoso», contraste con «mi nombre, Yahvé» y preservación de la tensión de לֹא נוֹדַעְתִּי. Sin embargo, la distribución de notas no sigue bien el rastro auditado en inglés: la nota alternativa principal debe anclarse a la cláusula final sobre «no fui conocido…», no a «me aparecí».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Y me aparecí» suena algo abrupto al inicio de versículo; «Y me di a conocer a Abraham… como Dios Todopoderoso» resolvería un problema de naturalidad, pero alteraría la decisión fuente sobre וָאֵרָא. Mejor conservar «me aparecí». El problema principal es «no fui conocido por ellos», que en español es gramatical pero poco natural y puede sugerir agente impropio; «no me di a conocer a ellos» sería más natural pero resolvería demasiado la ambigüedad. La mejor reparación mínima es mantener el texto principal y corregir las notas para que expliquen la tensión interpretativa donde corresponde.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: «Yahvé» para יהוה, «Dios» para אֵל, y «Dios Todopoderoso» con nota para El Shaddai. No hay conflicto terminológico mayor. La nota sobre «Yahvé» no debe funcionar como nota separada c si en realidad explica toda la cláusula final; conviene reducir a dos notas, como en el audit trail inglés.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «me aparecí» pero el audit trail inglés ancla la alternativa principal a Abraham / a la cláusula completa sobre el nombre divino.
    rationale: La nota inglesa [a] explica la alternativa «I did not make myself known…», no una alternativa de וָאֵרָא. El borrador introduce una nota distinta no sustentada por la auditoría principal.
  - severity: medium
    issue: Se añadió una tercera nota [c] innecesaria para «Yahvé», separando una explicación que en la auditoría corresponde a la cláusula final.
    rationale: 'La documentación inglesa solo requiere dos focos relevantes aquí: la alternativa para la cláusula final y la alternativa léxica de El Shaddai / God Almighty. Dividir la nota teológica en una nota sobre «Yahvé» desordena la evidencia fuente.'
  - severity: low
    issue: «No fui conocido por ellos» es algo rígido en español.
    rationale: Aun así, es defendible porque preserva la transparencia formal y la ambigüedad del nifal de ידע. No exige adjudicación mayor si se aclara con nota adecuada.
  revised_spanish_text: Y me aparecí a Abraham[a], a Isaac y a Jacob como Dios Todopoderoso[b], pero por mi nombre, Yahvé, no fui conocido por ellos.
  revised_footnotes:
