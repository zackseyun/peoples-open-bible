  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La elección ‘pilotos’ es aceptable por el audit trail inglés revisado, con ‘remeros’ retenido como alternativa. Para מִגְרֹשׁוֹת, la opción española debe evitar ‘suburbios’ en el texto principal y explicar la alternativa en nota, tal como hace el POB inglés.
