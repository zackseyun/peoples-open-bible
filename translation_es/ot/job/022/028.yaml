translation:
  language: es
  text: Tú decretarás un asunto[a], y quedará firme para ti; sobre tus caminos brillará la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «decretarás una palabra, y quedará firme para ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִגְזַר
  english_pob_choice: you will decree
  chosen_spanish: decretarás
  alternatives_spanish:
  - decidirás
  - determinarás
  lexicon: HALOT
  rationale: El verbo גזר puede implicar cortar/dividir y, por extensión, decidir o decretar. Como el POB inglés terminó en 'decree', 'decretarás' conserva mejor la fuerza formal de una pronunciación firme sin volverla más interpretativa de lo que permite el hebreo.
- source_word: אֹמֶר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - una palabra
  - un dicho
  - algo dicho
  lexicon: HALOT
  rationale: Aunque אֹמֶר puede significar 'palabra' o 'dicho', en esta construcción con גזר apunta al contenido determinado o pronunciado. 'Asunto' comunica en español ese contenido práctico sin fijarlo solo como 'palabra'.
- source_word: יָקָם
  english_pob_choice: it will be established
  chosen_spanish: se afirmará
  alternatives_spanish:
  - se establecerá
  - quedará firme
  - permanecerá
  lexicon: HALOT
  rationale: קוּם en qal puede significar levantarse o ponerse en pie, y aquí expresa que lo decretado queda confirmado. 'Se afirmará' mantiene la idea de firmeza/confirmación con buen español actual.
- source_word: דְּרָכֶיךָ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus sendas
  - tu curso
  - tu proceder
  lexicon: HALOT
  rationale: דֶּרֶךְ suele ser 'camino' y metafóricamente la conducta o curso de vida. 'Tus caminos' conserva la imagen poética y la ambigüedad productiva del hebreo.
- source_word: נָגַהּ אֹור
  english_pob_choice: light will shine
  chosen_spanish: brillará la luz
  alternatives_spanish:
  - resplandecerá la luz
  - la luz alumbrará
  - la luz fulgirá
  lexicon: HALOT
  rationale: נָגַהּ describe el resplandor de la luz. 'Brillará la luz' es natural en español, poético y fiel a la imagen de iluminación sobre los caminos.
theological_decisions:
- issue: Naturaleza de la afirmación de Elifaz en Job 22:28
  english_pob_reading: Render as a straightforward statement of expected outcome without intensifying it into an unconditional theological guarantee.
  chosen_spanish_reading: Traducirlo como una afirmación directa de resultado esperado, sin convertirla en una promesa doctrinal absoluta.
  alternative_spanish_readings:
  - como garantía incondicional de prosperidad
  - como mera posibilidad o eventualidad
  rationale: Job 22 presenta el consejo y la teología de Elifaz. El español debe reflejar su seguridad retórica sin sobrecargar el verso con una garantía universal que el contexto del libro no respalda.
  doctrine_reference: Preservar la tensión teológica del libro de Job.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: mantiene el paralelismo entre la acción verbal, su establecimiento y la imagen final de luz sobre los caminos, sin intensificar el valor teológico de la afirmación de Elifaz.'
  spanish_consistency_notes:
  - Se prefirió 'decretarás' para corresponder a la decisión final inglesa 'decree' y al valor formal de גזר.
  - '''Un asunto'' mantiene la amplitud semántica de אֹמֶר y evita restringirlo solo a ''palabra''.'
  - '''Se afirmará'' conserva la idea de establecimiento firme sin sonar excesivamente técnica.'
  - '''Tus caminos'' y ''brillará la luz'' conservan el paralelismo poético y la imagen central del versículo.'
