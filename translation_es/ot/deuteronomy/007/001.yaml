revisions:
- from: Cuando Yahvé tu Dios te introduzca en la tierra que vas a poseer[a], y expulse de delante de ti a muchas naciones —los hititas, los gergeseos, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos—, siete naciones más numerosas y más poderosas que tú[b],
  to: Cuando Yahvé tu Dios te haga entrar en la tierra a la que vas para poseerla, y expulse[a] de delante de ti a muchas naciones —los hititas, los girgaseos, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos—, siete naciones más numerosas y más poderosas que tú[b],
  rationale: Se corrige la cláusula relativa para preservar explícitamente el sentido de 'entrar' más 'poseerla', se reubica la nota [a] al verbo que realmente traduce וְנָשַׁל, y se mejora la naturalidad española con 'te haga entrar en'. También se ajusta 'girgaseos' para alinearlo mejor con el hebreo y la audit trail inglesa.
