  to: Y para el lado oriental[a], hacia el este, cincuenta codos.
  rationale: Se hizo un ajuste menor para mejorar la fluidez del español conservando la doble expresión direccional del hebreo. «Hacia el este» evita la repetición pesada de «oriente», y la nota al pie mantiene la imagen literal del hebreo de manera más natural.
