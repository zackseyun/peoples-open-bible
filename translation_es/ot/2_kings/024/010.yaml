base_translation:
  language: en
  yaml_path: translation/ot/2_kings/024/010.yaml
  text: At that time the servants of Nebuchadnezzar king of Babylon came up against Jerusalem[b][a], and the city came under siege.
  footnotes:
  - marker: a
    text: Or, more formally, 'went up to Jerusalem'; the Hebrew idiom 'went/came up' often reflects both elevation and military advance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the city was besieged.' The Hebrew more literally says 'the city came into siege,' which may emphasize the onset of the siege.
    reason: lexical_alternative
