review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: establecimiento de un cuerpo deliberativo, deliberación diaria de 320, y la finalidad de mantener buen orden respecto del cuerpo social. Sin embargo, «acerca de la multitud» suena poco natural en español cívico y «para ordenarse bien» resulta algo torpe/reflexivo de modo ambiguo. El texto inglés auditado permitió la alternativa «sobre el pueblo ... para mantenerse en buen orden», que en español comunica mejor el sentido cívico de περὶ τοῦ πλήθους ... τοῦ εὐκοσμεῖν ἑαυτούς.'
  spanish_quality_summary: 'El español es en general claro y digno, pero necesita un ajuste leve para mayor naturalidad y legibilidad eclesial: «trescientos veinte» debería idealmente ir con «y» en prosa plena («trescientos y veinte»), y la cláusula final funciona mejor como «para mantenerse en buen orden» que como «para ordenarse bien». También «con respecto al pueblo» o «acerca del pueblo» lee mejor que «acerca de la multitud» en este contexto político-social.'
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. «Consejo» para βουλευτήριον está bien alineado con el audit trail. La revisión propuesta conserva la decisión institucional y mejora solo la expresión española de πλῆθος y εὐκοσμεῖν ἑαυτούς según la nota inglesa existente.
  issues:
  - severity: medium
    issue: «acerca de la multitud» es demasiado literal y poco idiomático en español cívico
    rationale: περὶ τοῦ πλήθους se refiere al cuerpo del pueblo/la población. Aunque «multitud» es literal, en español aquí suena extraño y menos claro que «pueblo» en este contexto institucional; además la nota ya documenta esa alternativa.
  - severity: medium
    issue: «para ordenarse bien» suena torpe y ambiguo
    rationale: εὐκοσμεῖν ἑαυτούς apunta a mantenerse en buen orden. «Ordenarse bien» puede leerse como arreglarse o disciplinarse de manera poco natural. «Mantenerse en buen orden» comunica mejor el sentido reflexivo-cívico sin alejarse del griego.
  - severity: low
    issue: «trescientos veinte» es posible, pero en prosa bíblica plena suele sonar más natural «trescientos y veinte»
    rationale: No es error de sentido, pero la coordinación completa del numeral mejora la naturalidad y solemnidad del registro.
  revised_spanish_text: Y establecieron para sí un consejo[a], y cada día deliberaban trescientos y veinte, tomando continuamente consejo acerca del pueblo, para mantenerse en buen orden.
  revised_footnotes:
  - marker: a
    text: 'O: «sobre la multitud ... para ordenarse bien». El griego puede verterse de manera más literal, pero el texto principal resalta el sentido cívico en el contexto.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para expresar con mayor naturalidad el sentido cívico del griego y del audit trail inglés: «pueblo» aclara πλῆθος en contexto, «mantenerse en buen orden» comunica mejor εὐκοσμεῖν ἑαυτούς, y «trescientos y veinte» mejora la fluidez del registro. La nota se conserva, pero reequilibrada para reflejar ahora la alternativa más literal.'
