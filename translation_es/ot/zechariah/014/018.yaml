translation:
  language: es
  text: 'Y si la familia de Egipto no sube ni viene[a], la plaga no estará sobre ellos[b]: la plaga con la cual Yahvé hiere a las naciones que no suben a celebrar la Fiesta de las Cabañas[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y no viene». El hebreo usa tanto «sube» como «viene», probablemente para reforzar la idea de peregrinación a Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: 'El texto hebreo dice «la plaga no estará sobre ellos: la plaga con la cual Yahvé hiere a las naciones». Esto es difícil en contexto porque el versículo anterior habla de falta de lluvia; muchos entienden que Egipto recibiría una plaga en lugar de lluvia, ya que no depende de las lluvias de la misma manera.'
    reason: alternative_reading
  - marker: c
    text: Tradicionalmente, «la Fiesta de los Tabernáculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּחַת מִצְרַיִם
  english_pob_choice: the family of Egypt
  chosen_spanish: la familia de Egipto
  alternatives_spanish:
  - el clan de Egipto
  - la casa de Egipto
  lexicon: HALOT
  rationale: מִשְׁפָּחָה designa un grupo familiar o clánico. 'La familia de Egipto' conserva el sustantivo colectivo singular y refleja mejor la imagen del hebreo que simplemente 'Egipto'.
- source_word: תַעֲלֶה
  english_pob_choice: go up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - suba
  lexicon: HALOT
  rationale: עלה es el verbo habitual para subir en contexto de peregrinación a Jerusalén. 'Sube' conserva el sentido idiomático y es natural en español.
- source_word: וְלֹא בָאָה
  english_pob_choice: and does not come
  chosen_spanish: ni viene
  alternatives_spanish:
  - ni entra
  - ni llega
  lexicon: HALOT
  rationale: בוא significa venir o llegar. 'Ni viene' reproduce la doble formulación hebrea ('sube' / 'viene') sin reducirla a una sola idea.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - la aflicción
  - el golpe
  lexicon: HALOT
  rationale: מַגֵּפָה denota una plaga, azote o golpe punitivo. 'La plaga' es la equivalencia más natural y mantiene el vínculo con el verbo siguiente.
- source_word: יִגֹּף
  english_pob_choice: strikes
  chosen_spanish: hiere
  alternatives_spanish:
  - golpea
  - azota
  - castiga
  lexicon: HALOT
  rationale: נָגַף significa golpear, herir o azotar. 'Hiere' comunica el acto divino de castigo de manera clara y digna en español.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto profético, גּוֹיִם se refiere a las naciones en general. 'Las naciones' evita una carga confesional posterior ajena al pasaje.
- source_word: לָחֹג
  english_pob_choice: to celebrate
  chosen_spanish: a celebrar
  alternatives_spanish:
  - a guardar
  - a observar
  - a festejar
  lexicon: HALOT
  rationale: El infinitivo de חגג expresa celebrar/guardar una fiesta. 'A celebrar' es idiomático y conserva el carácter festivo del verbo.
- source_word: חַג הַסֻּכּוֹת
  english_pob_choice: the Feast of Booths
  chosen_spanish: la Fiesta de los Tabernáculos
  alternatives_spanish:
  - la Fiesta de las Cabañas
  - la Fiesta de los Booths
  lexicon: HALOT
  rationale: Aunque 'booths' sería más literal, la forma tradicional 'Tabernáculos' sigue siendo clara y reconocible en español eclesial. Se mantiene aquí por inteligibilidad litúrgica, mientras la nota preserva la alternativa más transparente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'Contested terms: יְהוָה YHWH'
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según el término estándar del proyecto en español, se traduce 'Yahvé' para preservar el nombre del pacto sin masking con 'SEÑOR'.
theological_decisions:
- issue: Tensión aparente entre este versículo y el anterior, donde Egipto no recibe lluvia
  english_pob_reading: Retain the MT wording about 'the plague' in the main text without harmonizing it away
  chosen_spanish_reading: Mantener en el texto principal 'la plaga' sin armonizarla con la falta de lluvia del versículo anterior
  alternative_spanish_readings:
  - Interpretar la cláusula como una referencia elíptica a 'no habrá lluvia sobre ellos'
  - Emendar el texto para eliminar la dificultad aparente
  rationale: El Texto Masorético dice explícitamente 'la plaga'; la traducción no debe suavizar la tensión introduciendo la idea del versículo previo ni recurriendo a una enmienda conjetural. Al preservar 'la plaga', el español respeta la dificultad textual y permite la lectura contextual propuesta por el audit trail.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Presencia del nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo emplea YHWH de forma directa. En español del POB se mantiene 'Yahvé' para reflejar el nombre del pacto y evitar la sustitución por un título encubierto.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Revisión más reciente: sin cambios; el pasaje sigue marcado con observaciones importantes en la revisión cruzada, especialmente por la tensión textual de la cláusula de la plaga y por la necesidad de decidir entre equivalencia transparente y forma litúrgica tradicional para la fiesta.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para coherencia con la terminología del proyecto.
  - '''Plaga'' conserva la tensión del Texto Masorético y el vínculo verbal con ''hiere''.'
  - '''Fiesta de los Tabernáculos'' se usa en el texto principal por claridad eclesial; la nota preserva la alternativa más literal.'
  - La estructura 'sube ni viene' intenta reproducir la duplicación hebrea sin volverla pesada en español.
