translation:
  language: es
  text: Ellos tomaron a todos los hombres y fueron a pelear contra Ismael hijo de Netanías, y lo hallaron junto a las grandes aguas[a] que están en Gabaón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «junto a las aguas abundantes» o «junto al gran estanque de Gabaón». El hebreo dice literalmente: «junto a las muchas/grandes aguas que están en Gabaón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: They took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - tomaron consigo
  lexicon: HALOT
  rationale: El contexto narrativo indica que Johanan y los suyos reunieron y llevaron consigo a los hombres mencionados antes; en español, 'tomaron' comunica bien esa acción sin sugerir captura hostil.
- source_word: כָּל הָאֲנָשִׁים
  english_pob_choice: all the men
  chosen_spanish: a todos los hombres
  alternatives_spanish:
  - a toda la gente
  - a todos los soldados
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y el contexto militar no obliga a traducirlo como 'soldados'. 'Hombres' conserva la referencia de género y el alcance total de כָּל.
- source_word: לְהִלָּחֵם עִם
  english_pob_choice: to fight against
  chosen_spanish: a pelear contra
  alternatives_spanish:
  - a combatir contra
  - a guerrear contra
  lexicon: HALOT
  rationale: La construcción expresa enfrentarse en batalla a alguien. 'Pelear contra' es natural en español y mantiene la dirección hostil que el inglés POB explícita con 'against'.
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  english_pob_choice: Ishmael son of Nethaniah
  chosen_spanish: Ismael hijo de Netanías
  alternatives_spanish:
  - Ismael, hijo de Netanías
  lexicon: conventional transliteration / patronymic
  rationale: Los nombres propios se transliteran de forma estándar al español; 'hijo de' conserva el patronímico hebreo sin añadir interpretaciones.
- source_word: וַיִּמְצְאוּ אֹתוֹ
  english_pob_choice: and they found him
  chosen_spanish: y lo hallaron
  alternatives_spanish:
  - y lo encontraron
  - y dieron con él
  lexicon: HALOT
  rationale: '''Hallaron'' es una forma natural y bíblicamente sobria en español para מצא, y evita sonar demasiado coloquial como ''encontraron'' en este contexto de persecución.'
- source_word: אֶל מַיִם רַבִּים
  english_pob_choice: by the great waters
  chosen_spanish: junto a las grandes aguas
  alternatives_spanish:
  - junto a las muchas aguas
  - al lado de las grandes aguas
  lexicon: HALOT
  rationale: La preposición y el contexto de localización justifican 'junto a'. 'Grandes aguas' preserva el paralelo semántico de מַיִם רַבִּים sin cerrar la imagen a 'estanque' o 'alberca', como hace la nota inglesa.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  english_pob_choice: that are in Gibeon
  chosen_spanish: que están en Gabaón
  alternatives_spanish:
  - que hay en Gabaón
  - que están en Gibeón
  lexicon: HALOT
  rationale: '''Están en'' refleja con naturalidad la cláusula relativa localizadora. ''Gabaón'' sigue la forma tradicional hispana del topónimo, ampliamente reconocible.'
theological_decisions:
- issue: None requiring a distinct theological rendering in this verse
  english_pob_reading: The verse is a straightforward narrative report with no doctrinally loaded term requiring a special rendering.
  chosen_spanish_reading: La traducción mantiene el sentido narrativo directo sin añadir énfasis doctrinal ajeno al hebreo.
  alternative_spanish_readings:
  - No aplica
  rationale: No hay términos como YHWH, Mesías, Espíritu o justicia que exijan una decisión teológica específica en este versículo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en alto grado: no se requirieron revisiones respecto del texto inglés POB ni del hebreo base. Se conservó la ambigüedad de מַיִם רַבִּים mediante una nota, sin resolverla de modo excesivamente interpretativo.'
  spanish_consistency_notes:
  - Se mantuvo 'hijo de' para el patronímico, en línea con la convención bíblica española y con el inglés POB.
  - Se eligió 'Gabaón' como topónimo hispano estándar; no se introdujo 'Gibeón' porque la forma tradicional es más reconocible para lectores eclesiales.
  - '''Grandes aguas'' conserva la imagen hebrea y evita reducir prematuramente el referente a un depósito específico.'
