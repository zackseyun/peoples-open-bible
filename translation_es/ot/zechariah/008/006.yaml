revisions:
- from: 'Así dice Yahvé de los ejércitos: Si es [a]maravilloso en los ojos del remanente de este pueblo en aquellos días, también ¿será maravilloso en mis ojos?, declara Yahvé de los ejércitos.'
  to: 'Así dice Yahvé de los ejércitos: Si es maravilloso[a] a los ojos del remanente de este pueblo en aquellos días, ¿también será maravilloso a mis ojos? declara Yahvé de los ejércitos.'
  rationale: La revisión no cambia el sentido ni las decisiones teológicas del borrador; solo corrige español no idiomático, puntuación y colocación de la nota. «A los ojos de» mantiene el paralelismo del hebreo con mejor naturalidad en español, y la interrogación revisada comunica correctamente la pregunta retórica implícitamente negativa.
