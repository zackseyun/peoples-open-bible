translation:
  language: es
  text: ¿Por qué saltan[a], montes de muchas cumbres, contra el monte que Dios deseó para su morada? Ciertamente Yahvé morará allí para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué miran con envidia, montes de muchas cumbres?» El verbo hebreo es raro e incierto; puede describir saltar/brincar o mirar con envidia o de soslayo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּרַצְּדוּן
  english_pob_choice: leap about
  chosen_spanish: saltan
  alternatives_spanish:
  - saltan de un lado a otro
  - brincan
  - se agitan
  lexicon: HALOT
  rationale: El verbo hebreo es raro y de sentido incierto. Dado que la revisión inglesa volvió a un valor más cercano al movimiento físico, «saltan» conserva la imagen dinámica sin forzar una interpretación psicológica más allá de lo que el texto asegura. La nota mantiene la alternativa de lectura del matiz adversativo/envidioso documentado por el POB en inglés.
- source_word: הָרִים גַּבְנֻנִּים
  english_pob_choice: many-peaked mountains
  chosen_spanish: montes de muchas cumbres
  alternatives_spanish:
  - montes escarpados
  - montes de múltiples cimas
  - montes jorobados
  lexicon: HALOT
  rationale: «גַּבְנֻנִּים» comunica la imagen de prominencias o cumbres múltiples. «De muchas cumbres» reproduce esa plasticidad sin reducirla a mera altura, y evita una expresión demasiado técnica o extraña en español.
- source_word: הָהָר
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - este monte
  - el monte aquel
  lexicon: HALOT
  rationale: Se conserva el artículo definido del hebreo sin añadir explícitamente «Sión», que el verso no menciona. «Monte» funciona con naturalidad en español bíblico y mantiene la referencia específica del contexto.
- source_word: חָמַד
  english_pob_choice: desired
  chosen_spanish: deseó
  alternatives_spanish:
  - amó
  - quiso
  - se deleitó en
  lexicon: HALOT
  rationale: El verbo expresa deseo, deleite o elección. «Deseó» sigue de cerca la fuerza léxica sin convertirla por adelantado en «eligió», aunque esa sea una implicación contextual posible.
- source_word: לְשִׁבְתּוֹ
  english_pob_choice: for his dwelling
  chosen_spanish: para su morada
  alternatives_spanish:
  - para habitar allí
  - como su lugar de habitación
  lexicon: HALOT
  rationale: 'La forma infinitiva con sufijo indica propósito: el monte es el lugar destinado para que Dios habite. «Morada» es natural en español reverente y conserva la idea de residencia/domicilio.'
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sí
  - Además
  - Incluso
  lexicon: HALOT
  rationale: Aquí el adverbio intensifica la afirmación siguiente. «Ciertamente» expresa bien la fuerza enfática en español moderno y mantiene el tono solemne del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se adopta el término de proyecto «Yahvé» para el Tetragrámaton, preservando el nombre divino en lugar de una sustitución por título. Esto sigue el criterio de traducción directa del nombre revelado.
- source_word: יִשְׁכֹּן
  english_pob_choice: will dwell
  chosen_spanish: morará
  alternatives_spanish:
  - habitará
  - permanecerá
  lexicon: HALOT
  rationale: El verbo denota habitar, establecer residencia. «Morará» suena dignificado y bíblico en español, sin caer en arcaísmo excesivo.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión indica duración indefinida y perdurable. «Para siempre» es la forma más clara y natural en español, y corresponde a la permanencia durativa del hebreo.
theological_decisions:
- issue: Si identificar explícitamente el monte como Sión
  english_pob_reading: Retain the generic expression 'the mountain' in the main text
  chosen_spanish_reading: Retener «el monte» sin nombrar Sión
  alternative_spanish_readings:
  - «el monte Sión»
  - «Sión»
  rationale: Aunque el salmo en su conjunto apunta a Sión, este versículo usa el sustantivo común con artículo. Mantener «el monte» respeta la forma del hebreo y evita introducir una precisión no dicha en la línea.
  doctrine_reference: Primacía del texto fuente y no de la tradición interpretativa
- issue: Cómo reflejar la tensión retórica entre los montes rivales y el monte elegido por Dios
  english_pob_reading: Use 'leap about' to make the rhetorical force explicit
  chosen_spanish_reading: Usar un verbo de movimiento («saltan») y dejar la ambigüedad léxica documentada en nota
  alternative_spanish_readings:
  - «miran con envidia»
  - «saltan de envidia»
  - «se agitan»
  rationale: El hebreo permite un valor físico o uno de hostilidad/envidia. El texto principal conserva el movimiento, mientras la nota registra la lectura alternativa para no borrar la tensión documentada por el POB en inglés.
  doctrine_reference: Respeto por la incertidumbre léxica documentada y claridad pública en la traducción
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió de «look with envy» a «leap about» para acercarse más al verbo hebreo, sin abandonar la nota sobre la incertidumbre léxica. La redacción española sigue esa revisión al usar un verbo de movimiento en el texto principal y conservar en nota la alternativa adversativa/envidiosa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se conserva «el monte» sin introducir «Sión», alineado con la decisión inglesa de no sobreespecificar.
  - «Morada/morará» respeta el campo semántico de habitar sin imponer un tono demasiado literalista.
  - La nota a pie conserva la doble posibilidad de lectura del verbo raro, siguiendo la cautela auditada en el inglés.
