translation:
  language: es
  text: Y si tienen hambre, levantarán el rostro hacia ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «levantarán el rostro hacia ti», una expresión griega para volverse a Dios en súplica o dependencia.
    reason: cultural_note
lexical_decisions:
- source_word: πεινάσωσιν
  english_pob_choice: are hungry
  chosen_spanish: tienen hambre
  alternatives_spanish:
  - están hambrientos
  - pasaran hambre
  lexicon: LSJ
  rationale: El aoristo subjuntivo con ἐὰν expresa una condición general futura. En español, «tienen hambre» comunica esa condición de manera natural sin intensificar indebidamente el verbo.
- source_word: ἀροῦσιν
  english_pob_choice: will lift up
  chosen_spanish: alzarán
  alternatives_spanish:
  - levantarán
  - elevarán
  lexicon: LSJ
  rationale: El futuro de αἴρω conserva la imagen concreta de levantar. «Alzarán» es natural en español y mantiene el gesto físico de la expresión.
- source_word: πρόσωπον αὐτῶν
  english_pob_choice: their faces
  chosen_spanish: su rostro
  alternatives_spanish:
  - su rostro
  - sus rostros
  - su semblante
  lexicon: LSJ
  rationale: Aunque el griego usa singular con posesivo plural, en español la expresión idiomática puede conservarse en singular colectivo. «Su rostro» mantiene la imagen sin sonar forzado; «sus rostros» sería más literal pero menos idiomático en este contexto.
- source_word: πρὸς σὲ
  english_pob_choice: to you
  chosen_spanish: hacia ti
  alternatives_spanish:
  - a ti
  - delante de ti
  lexicon: LSJ
  rationale: «Hacia ti» refleja bien la dirección de πρός y sugiere movimiento orientado a Dios. También conserva el matiz relacional de apelación o dependencia.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no registran cambios de revisión; se conserva la imagen corporal de «levantar/alzar el rostro» como gesto de apelación.
  spanish_consistency_notes:
  - Se mantuvo «tú/ti» en segunda persona para correspondencia directa con πρὸς σέ.
  - Se evitó reemplazar la imagen por una paráfrasis como «buscarán tu ayuda», porque la expresión figurada es parte del sentido recibido.
  - Se escogió un español neutro y bíblicamente digno, sin archaismos innecesarios.
