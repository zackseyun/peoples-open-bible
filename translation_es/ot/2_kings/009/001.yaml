translation:
  language: es
  text: 'Entonces Eliseo el profeta llamó a uno de los hijos[a] de los profetas y le dijo: «Ciñe tus lomos[b], toma en tu mano este frasco de aceite y ve a Ramot de Galaad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de los profetas» se refiere a miembros de un grupo o gremio profético, no necesariamente a hijos biológicos.
    reason: cultural_note
  - marker: b
    text: Literalmente, «Ciñe tus lomos», un modismo que significa prepararse para actuar o para viajar recogiéndose la ropa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶאֱלִישָׁע
  english_pob_choice: Then Elisha
  chosen_spanish: Entonces Eliseo
  alternatives_spanish:
  - Y Eliseo
  - Ahora Eliseo
  lexicon: HALOT
  rationale: La conjunción inicial avanza la narración; «Entonces» mantiene el valor secuencial de forma natural en español. «Eliseo» es la forma estable en español para el nombre propio.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Yahvé
  - el profeta
  lexicon: HALOT
  rationale: Es un título appositivo definido que identifica a Eliseo; «el profeta» reproduce directamente el hebreo sin añadir matices no presentes en el texto.
- source_word: קָרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El verbo básico es «llamar». «Llamó» conserva la sencillez narrativa sin intensificar indebidamente a «convocó».
- source_word: לְאַחַד
  english_pob_choice: one of
  chosen_spanish: a uno de
  alternatives_spanish:
  - a uno
  - a uno entre
  lexicon: HALOT
  rationale: La construcción partitiva exige en español «a uno de». Eso preserva el sentido de selección dentro de un grupo.
- source_word: מִבְּנֵי הַנְּבִיאִים
  english_pob_choice: of the sons of the prophets
  chosen_spanish: de los hijos de los profetas
  alternatives_spanish:
  - de la compañía de profetas
  - de los discípulos de los profetas
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo de manera transparente. En español, «hijos de los profetas» comunica la expresión formal y deja abierta la referencia a un grupo profético.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y le habló diciendo
  lexicon: HALOT
  rationale: Es la fórmula narrativa más natural y directa en español para introducir el discurso.
- source_word: חֲגֹר מָתְנֶיךָ
  english_pob_choice: Gird up your loins
  chosen_spanish: Ciñe tus lomos
  alternatives_spanish:
  - Ciñe tu cintura
  - Prepárate para la acción
  lexicon: HALOT
  rationale: Se mantiene el idioma concreto del hebreo, que alude a ajustarse la ropa para moverse o actuar con prontitud. «Ciñe tus lomos» conserva la imagen y el tono formal; no se sustituye por una paráfrasis que borre la tensión lexical.
- source_word: פַּךְ הַשֶּׁמֶן הַזֶּה
  english_pob_choice: this flask of oil
  chosen_spanish: este frasco de aceite
  alternatives_spanish:
  - esta vasija de aceite
  - este vial de aceite
  lexicon: HALOT
  rationale: פַּךְ designa un recipiente pequeño, adecuado para aceite. «Frasco» es natural en español moderno y suficientemente concreto, sin volverlo un término demasiado técnico.
- source_word: בְּיָדֶךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - con tu mano
  - contigo
  lexicon: HALOT
  rationale: Se preserva la concreción física del hebreo. «En tu mano» es la equivalencia directa y no se generaliza a «contigo».
- source_word: וְלֵךְ
  english_pob_choice: and go
  chosen_spanish: y ve
  alternatives_spanish:
  - y marcha
  - y anda
  lexicon: HALOT
  rationale: Imperativo simple de desplazamiento; «y ve» reproduce el valor directivo sin añadir solemnidad innecesaria.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-Galaad
  - Ramot de Galaad
  lexicon: HALOT
  rationale: Se usa la forma española usual del topónimo y se ajusta la unión genitiva para que sea natural en español. La transliteración se mantiene reconocible sin anglicismo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que prefirió «Gird up your loins» sobre una paráfrasis más suave, para reflejar con mayor fidelidad el modismo hebreo חגר מתניך. Por eso el español conserva la imagen corporal tradicional en vez de reemplazarla por una explicación dinámica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo exija; este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se conserva la imagen idiomática de «ciñe tus lomos» por coherencia con la decisión auditada de no diluir el modismo hebreo.
  - 'La forma del topónimo se adapta a un español natural: «Ramot de Galaad».'
