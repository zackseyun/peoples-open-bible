translation:
  language: es
  text: Además, al incitarlos a la tortura, buscaban que no solo despreciaran los dolores, sino que también dominaran las emociones[a] de afecto fraternal por sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las pasiones de afecto fraternal por sus hermanos'. El griego πάθη puede significar 'pasiones' o 'emociones'; aquí subraya que debían dominar incluso los afectos familiares intensos bajo la tortura.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέτι
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Por otra parte
  - Asimismo
  lexicon: LSJ
  rationale: Marca una adición argumentativa de manera natural en español, sin perder el valor de transición del adverbio griego.
- source_word: ἐπὶ τὸν αἰκισμόν
  english_pob_choice: to torture
  chosen_spanish: a la tortura
  alternatives_spanish:
  - al tormento
  - al maltrato
  lexicon: LSJ
  rationale: En este contexto martirial, el sustantivo español 'tortura' comunica mejor la dureza del acto que una opción más genérica como 'maltrato'.
- source_word: ἐποτρύνοντες
  english_pob_choice: by urging them on
  chosen_spanish: al incitarlos
  alternatives_spanish:
  - al exhortarlos
  - al espolearlos
  lexicon: LSJ
  rationale: El participio expresa acción impulsora o de estímulo hacia el suplicio; 'incitarlos' conserva ese sentido causal y la intensidad requerida.
- source_word: ὡς μὴ μόνον ... ἀλλὰ καί
  english_pob_choice: that ... not only ... but also
  chosen_spanish: que no solo ... sino que también
  alternatives_spanish:
  - de modo que no solo ... sino también
  - para que no solo ... sino que además
  lexicon: Greek grammar
  rationale: La estructura final/resultativa se expresa con la correlación española natural 'no solo... sino que también', manteniendo el paralelismo del griego.
- source_word: τῶν ἀλγηδόνων
  english_pob_choice: the pains
  chosen_spanish: los dolores
  alternatives_spanish:
  - los sufrimientos
  - las agonías
  lexicon: LSJ
  rationale: '''Dolores'' es una equivalencia directa y sobria para las molestias físicas intensas producidas por la tortura.'
- source_word: περιφρονῆσαι
  english_pob_choice: despise
  chosen_spanish: despreciaran
  alternatives_spanish:
  - desestimaran
  - miraran con desprecio
  lexicon: BDAG
  rationale: '''Despreciar'' reproduce bien el matiz de considerar algo indigno de atención o valor.'
- source_word: τῆς τῶν ἀδελφῶν φιλαδελφίας
  english_pob_choice: brotherly affection for their brothers
  chosen_spanish: de afecto fraternal por sus hermanos
  alternatives_spanish:
  - del cariño fraternal por sus hermanos
  - del amor fraternal por sus hermanos
  lexicon: LSJ
  rationale: Se conserva la redundancia intencional del griego mediante 'afecto fraternal por sus hermanos', sin convertirla en una frase más interpretativa.
- source_word: παθῶν
  english_pob_choice: the emotions
  chosen_spanish: los impulsos
  alternatives_spanish:
  - las pasiones
  - los afectos
  lexicon: LSJ
  rationale: Dado el marco moral de 4 Macabeos, 'impulsos' comunica de forma clara la fuerza interna que debe ser dominada, sin tecnicismo excesivo; se mantiene la posibilidad de una lectura alternativa más fuerte en la nota.
- source_word: κρατῆσαι
  english_pob_choice: master
  chosen_spanish: dominaran
  alternatives_spanish:
  - controlaran
  - vencieran
  - lograran dominar
  lexicon: BDAG
  rationale: '''Dominar'' expresa adecuadamente la idea de ejercer control o superioridad sobre algo interno, en paralelo al inglés ''master'' y al énfasis del libro en el gobierno de la razón.'
theological_decisions:
- issue: Cómo rendir πάθη en el marco antropológico-moral de 4 Macabeos
  english_pob_reading: the emotions
  chosen_spanish_reading: los impulsos
  alternative_spanish_readings:
  - las pasiones
  - los afectos
  rationale: El texto no exige una terminología filosófica cerrada en el cuerpo principal; 'impulsos' comunica la fuerza interna que debe someterse bajo tortura. Se preserva la alternativa más cargada en la nota para no borrar la tensión semántica del griego.
  doctrine_reference: Translation philosophy §6; consistencia antropológica en 4 Macabeos
- issue: Redundancia aparente entre 'afecto fraternal' y 'por sus hermanos'
  english_pob_reading: brotherly affection for their brothers
  chosen_spanish_reading: afecto fraternal por sus hermanos
  alternative_spanish_readings:
  - amor fraternal por sus hermanos
  - cariño fraternal por sus hermanos
  rationale: Se mantiene la reiteración del parentesco porque el griego la presenta de forma explícita; omitirla suavizaría indebidamente la insistencia del pasaje.
  doctrine_reference: Precisión semántica; fidelidad a la estructura del original
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que afinó la referencia pronominal y sustituyó 'brotherly love' por 'brotherly affection'; por eso el español conserva la relación familiar explícita sin exagerar el léxico afectivo, y evita introducir un sujeto demostrativo innecesario.
  spanish_consistency_notes:
  - Se mantiene 'tortura' para αἰκισμός en línea con la lectura inglesa y con el contexto martirial.
  - Se conserva el paralelismo 'no solo ... sino que también' para reflejar la estructura concesiva/resultativa del griego.
  - '''Yahvé'' no aplica aquí; no hay tétragramaton ni κύριος en el versículo.'
  - Se evita 'Cristo'/'Mesías' porque el pasaje no contiene terminología mesiánica.
  - La puntuación busca mantener la cadencia de una sola oración larga, como en el griego.
