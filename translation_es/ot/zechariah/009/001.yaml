review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo y sigue la línea principal del audit trail inglés: «oráculo», «palabra de Yahvé», «contra la tierra de Hadrac», la ambigüedad de «su lugar de reposo» y la lectura principal de «el ojo ... hacia Yahvé». Sin embargo, hay pequeños desajustes con el material auditado: la nota b introduce una opción («puede referirse ... a Damasco») que el POB inglés no documenta; y la redacción «está vuelto hacia» con sujeto singular compuesto («el ojo del hombre y de todas las tribus») suena algo forzada en español. También conviene alinear mejor la nota a con la opción inglesa «contra / concerniente» en vez de «con respecto a», y simplificar la sintaxis final para mayor legibilidad.'
  spanish_quality_summary: 'El español es claro y digno, pero puede pulirse para sonar más natural y preciso. «Lugar de reposo» funciona; «el ojo del hombre y de todas las tribus de Israel está vuelto hacia Yahvé» es comprensible, pero «están vueltos» no corresponde porque hay un solo núcleo («ojo»), y la construcción completa resulta rígida. «La mirada del hombre y de todas las tribus de Israel está puesta en Yahvé» sería más natural, pero perdería la metáfora de «ojo» que el audit trail quiso conservar. Una solución fiel y legible es mantener «ojo» pero reordenar: «porque hacia Yahvé están vueltos el ojo del hombre y el de todas las tribus de Israel».'
  glossary_alignment: Se respeta correctamente «Yahvé» para יְהוָה. No hay conflicto con la terminología doctrinal principal. «Oráculo» para מַשָּׂא y «el hombre» para אָדָם son defendibles dentro del proyecto. La única desviación relevante es la nota b, que amplía indebidamente las referencias posibles del sufijo más allá de lo documentado en el POB inglés.
  issues:
  - severity: medium
    issue: La nota b añade que el sufijo «puede referirse ... a Damasco».
    rationale: El audit trail inglés documenta la ambigüedad como «its/his», con posible referencia al oráculo o a Yahvé; no preserva una opción específica donde el sufijo remita a Damasco. La nota española introduce una posibilidad no auditada.
  - severity: medium
    issue: 'La cláusula final suena rígida y poco natural en español: «el ojo del hombre y de todas las tribus de Israel está vuelto hacia Yahvé».'
    rationale: Aunque es formalmente fiel, en español eclesial moderno resulta pesada. El singular «ojo» gobierna dos complementos, pero la colocación final puede mejorarse sin perder la metáfora ni la dirección hacia Yahvé.
  - severity: low
    issue: La nota a usa «con respecto a la tierra de Hadrac».
    rationale: No es incorrecto, pero «concerniente a» o «acerca de» refleja mejor la alternativa inglesa documentada y su tono profético.
  revised_spanish_text: 'Un oráculo: la palabra de Yahvé es contra la tierra de Hadrac[a], y Damasco es su lugar de reposo[d][b]; porque hacia Yahvé están vueltos el ojo del hombre[c] y el de todas las tribus de Israel.'
  revised_footnotes:
  - marker: a
    text: O «concerniente a la tierra de Hadrac». El hebreo usa literalmente la preposición «en», pero en encabezamientos proféticos puede funcionar idiomáticamente para señalar el objeto del oráculo.
    reason: alternative_reading
  - marker: b
    text: O «Damasco es su lugar de reposo». El sufijo hebreo en «su» es ambiguo.
    reason: lexical_alternative
  - marker: c
    text: O «el ojo de la humanidad y el de todas las tribus de Israel están vueltos hacia Yahvé». El hebreo אָדָם aquí probablemente tiene sentido genérico.
    reason: lexical_alternative
  - marker: d
    text: Algunos entienden la cláusula como «porque Yahvé tiene su ojo en el hombre y en todas las tribus de Israel», pero el hebreo es muy comprimido y admite más de una construcción.
    reason: alternative_reading
  revision_rationale: La revisión mantiene todas las decisiones principales del source y del POB inglés, pero corrige una nota que sobreinterpretaba la ambigüedad del sufijo, mejora la naturalidad de la cláusula final sin abandonar «ojo», y alinea mejor la nota alternativa del encabezamiento con el audit trail inglés.
