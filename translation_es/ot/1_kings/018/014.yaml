  glossary_alignment: 'La terminología está bien alineada con el proyecto: «señor» en minúscula para אָדוֹן humano, «Elías» para אֵלִיָּהוּ, y no hay conflictos con términos doctrinales mayores. «Mira» para הִנֵּה es aceptable en español moderno, manteniendo «He aquí» como alternativa en nota.'
