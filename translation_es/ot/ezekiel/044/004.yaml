    text: 'O: «a través de la puerta del norte».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa de Yahvé»; se mantiene «casa» para reflejar la expresión de Ezequiel.'
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente «llenaba» a «llenó» para ajustarse mejor a מָלֵא y a la traducción auditada «filled». Se elimina la nota redundante sobre «Yahvé», ya que no corresponde a una ambigüedad local. También se aligera la puntuación para que el español sea más natural sin perder la estructura solemne del original ni la terminología del proyecto.
