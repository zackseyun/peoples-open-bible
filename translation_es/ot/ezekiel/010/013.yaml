translation:
  language: es
  text: En cuanto a las ruedas[a], se les llamaba «la rueda giratoria» mientras yo escuchaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la rueda»; el hebreo גַּלְגַּל puede significar «rueda», pero aquí se usa «rueda giratoria» para preservar la distinción con אֹופַנִּים («ruedas»).
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאֹופַנִּים
  english_pob_choice: As for the wheels
  chosen_spanish: En cuanto a las ruedas
  alternatives_spanish:
  - Respecto a las ruedas
  - En cuanto a los anillos
  lexicon: HALOT
  rationale: El prefijo לָ aquí funciona como marcador de tópico/referencia discursiva, no como simple dirección. En español, «En cuanto a» comunica mejor el encuadre del tema que una preposición más literal y mantiene el carácter identificador de la frase.
- source_word: קוֹרָא
  english_pob_choice: were called
  chosen_spanish: se les llamaba
  alternatives_spanish:
  - eran llamadas
  - se llamaba
  lexicon: HALOT
  rationale: Aunque la forma hebrea es participial, en este contexto introduce una designación reportada. El impersonal reflexivo español transmite bien el valor pasivo/general sin forzar un sujeto explícito.
- source_word: הַגַּלְגַּל
  english_pob_choice: the whirling wheel
  chosen_spanish: la rueda giratoria
  alternatives_spanish:
  - la rueda
  - la rueda que gira
  - la rueda arremolinada
  lexicon: HALOT
  rationale: El hebreo puede referirse a «rueda», «giro» o «engranaje/rueda de movimiento». Como אֹופַנִּים ya se traduce por «ruedas», aquí conviene distinguir el segundo término con un adjetivo que preserve la imagen dinámica del giro sin borrar la diferencia léxica.
- source_word: בְּאָזְנָי
  english_pob_choice: in my hearing
  chosen_spanish: en mi oído
  alternatives_spanish:
  - en mi audición
  - mientras oía yo
  - según oí
  lexicon: HALOT
  rationale: La expresión idiomática señala que el profeta lo oyó directamente. «En mi oído» suena algo más literal que la versión inglesa, pero es comprensible y conserva el matiz de testimonio auditivo inmediato.
theological_decisions:
- issue: Distinción entre אֹופַנִּים y הַגַּלְגַּל
  english_pob_reading: The English POB preserves a distinction by using 'wheels' for אֹופַנִּים and 'whirling wheel' for הַגַּלְגַּל.
  chosen_spanish_reading: «ruedas» / «rueda giratoria»
  alternative_spanish_readings:
  - «ruedas» / «rueda»
  - «ruedas» / «rueda de giro»
  rationale: 'La decisión busca mantener la diferencia léxica que la POB documenta: no repetir el mismo sustantivo para ambos términos. No se introduce doctrina adicional; solo se preserva la tensión descriptiva del visionario hebreo.'
  doctrine_reference: Ezequiel 10:13; distinción léxica en la visión del carro/ruedas
- issue: Valor del pasivo impersonal en la designación
  english_pob_reading: '''they were called'' renders a naming/reporting sense of קרא without specifying an agent.'
  chosen_spanish_reading: «se les llamaba»
  alternative_spanish_readings:
  - «eran llamadas»
  - «las llamaban»
  rationale: El hebreo no enfatiza un agente concreto; por eso el español impersonal evita añadir uno. Se conserva así el carácter de designación reportada, no de acción puntual de un hablante identificado.
  doctrine_reference: Ezequiel 10:13; uso narrativo de קרא
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto con la POB inglesa revisada, especialmente la distinción entre אֹופַנִּים y הַגַּלְגַּל. La revisión inglesa pasó de una solución más abstracta a «the whirling wheel»; por eso el español evita «ruedaarma/engranaje» y adopta una forma dinámica y singular que refleje mejor el término hebreo.
  spanish_consistency_notes:
  - Se mantiene «ruedas» para אֹופַנִּים y una forma singular diferenciada para הַגַּלְגַּל.
  - «En cuanto a» funciona como tópico discursivo, acorde con el hebreo לָ.
  - «Se les llamaba» conserva el tono impersonal del original sin añadir sujeto agente.
  - «En mi oído» preserva la idea de testimonio auditivo directo, aunque suene más literal que otras opciones idiomáticas.
