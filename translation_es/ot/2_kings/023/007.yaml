  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Josías derriba las casas/dependencias de los qedeshim dentro de la casa de Yahvé, donde las mujeres tejían elementos textiles para la Asherá. También mantiene correctamente «Yahvé» para יְהוָה y preserva la ambigüedad de אֲשֵׁרָה con nota.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero «prostitutos de culto» suena poco idiomático y algo tosco en español eclesial general; «prostitutos rituales» comunica mejor el referente sin perder el matiz cultual. Además, «mantos» es demasiado específico y puede sugerir prendas de vestir, mientras que el hebreo/documentación apuntan a colgaduras o coberturas textiles cultuales. Conviene ajustar también la nota c: «rendido como» es un anglicismo/false friend; debe ser «traducido como».'
  glossary_alignment: 'Alineación buena en términos del proyecto: יְהוָה → «Yahvé» correctamente; אֲשֵׁרָה se mantiene como «la Asherá» con ambigüedad preservada; no hay conflictos mayores de glosario. El ajuste principal es estilístico-lexical en «prostitutos rituales» y «colgaduras».'
  issues:
  - severity: medium
    issue: «prostitutos de culto» es poco natural en español
    rationale: Aunque semánticamente entendible, la colocación suena forzada. «Prostitutos rituales» o «prostitutos cultuales» comunica mejor el valor de הַקְּדֵשִׁים en español claro y digno.
  - severity: medium
    issue: «mantos» estrecha indebidamente el sentido de בָּתִּים
    rationale: El contexto y la nota auditada apuntan a colgaduras/coberturas textiles o estructuras de tela, no a mantos como prendas. «Colgaduras» preserva mejor el campo semántico y coincide con la alternativa inglesa destacada en la revisión.
  - severity: low
    issue: La nota c usa «rendido como»
    rationale: En español bíblico/filológico natural debe decirse «traducido como» o «vertido como», no «rendido como».
