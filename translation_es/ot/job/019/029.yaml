    issue: El marcador de la nota [a] está anclado a «ustedes mismos» en vez de a la expresión final «hay juicio».
    rationale: La nota documenta lecturas alternativas de שדין, que corresponde a la cláusula final, no al dativo enfático לָכֶם. Tal como está, la nota induce a error sobre qué palabra o frase está siendo explicada.
  - severity: medium
    issue: «Teman por la espada ustedes mismos» suena poco natural en español.
    rationale: Aunque refleja los elementos hebreos, el orden y la preposición «por» producen una frase torpe. «Teman ustedes mismos a causa de la espada» expresa mejor el énfasis de לָכֶם y el valor causal de מִפְּנֵי en español idiomático.
  revised_spanish_text: Teman ustedes mismos a causa de la espada, porque la ira trae los castigos de la espada, para que sepan que hay juicio[a].
  revised_footnotes:
  - marker: a
    text: O, «que el Todopoderoso existe»; la expresión hebrea final es difícil y también se ha entendido como «que hay juicios» o «que hay un juez».
    reason: alternative_reading
