review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: posesivo singular/colectivo, símil de sepulcro abierto, totalidad del grupo y referencia masculina plural. Sin embargo, la nota [a] no funciona como alternativa real porque el texto principal ya usa «su aljaba», y además la redacción española de esa nota es defectuosa. Conviene explicitar en el texto principal el valor colectivo documentado por el POB inglés.'
  spanish_quality_summary: 'El español es mayormente natural y digno. «Aljaba», «sepulcro abierto» y «hombres valientes» son legibles y fieles. La mejora principal es cambiar «Su aljaba» por «Su aljaba de ellos» no sería natural; mejor «Su aljaba»? No: para reflejar la decisión auditada, el español debe usar «su aljaba» solo si la nota ofrece la alternativa colectiva inversa, pero eso crea ambigüedad. La opción más natural y fiel es «Su aljaba»? En español el posesivo singular puede sonar singular real. Por claridad, «Su aljaba» debe revisarse a «Su aljaba»? Mejor «Su aljaba» no resuelve el colectivo. La solución idiomática es «Sus aljabas», aunque se aparta de la morfología superficial para preservar el referente colectivo, igual que el inglés «their quiver».'
  glossary_alignment: No hay términos de glosario mayores implicados. La revisión propuesta mantiene la decisión colectiva del POB para אַשְׁפָּתוֹ, conserva «sepulcro abierto» para כְּקֶבֶר פָּתוּחַ y retiene el masculino en «hombres valientes» para גִּבּוֹרִים, con nota alternativa «guerreros».
  issues:
  - severity: medium
    issue: El posesivo principal «Su aljaba» no preserva con suficiente claridad la decisión auditada «their quiver».
    rationale: Aunque el hebreo lleva sufijo singular, la documentación del POB inglés decide traducir con referente colectivo. En español, «su aljaba» suena fácilmente a singular real; «sus aljabas» comunica mejor el colectivo distributivo de la tropa invasora.
  - severity: medium
    issue: La nota [a] está mal planteada y mal redactada.
    rationale: 'Dice «O: “su aljaba”» cuando eso ya aparece en el texto principal, así que no ofrece alternativa. Además, «tomando con más estrictamente» es español incorrecto. La nota debe invertirse: si el texto principal usa el colectivo distributivo «sus aljabas», la alternativa puede ser «su aljaba», explicando el sufijo singular hebreo con referente colectivo.'
  revised_spanish_text: Sus aljabas son como un sepulcro abierto[a]; todos ellos son hombres valientes[b].
