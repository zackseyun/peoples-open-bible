review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del rastro de auditoría inglés: comer sin saciarse, una aflicción interna, intento de quitar o apartar algo sin lograr preservarlo, y lo preservado entregado a la espada. También conserva la nota sobre la cláusula oscura יֶשְׁחֲךָ. Sin embargo, ''quitarás'' en español queda demasiado desnudo y poco idiomático en este contexto, y ''lo que logres salvar'' añade un matiz aspectual (''logres'') no exigido por el hebreo ni por el POB inglés.'
  spanish_quality_summary: El texto es claro y digno, pero puede afinarse para sonar más natural y más fiel al paralelismo verbal. 'Comerás' sin 'Tú' inicial mejora el ritmo en español bíblico moderno, y 'apartarás' funciona mejor que 'quitarás' para una acción de retirar algo a resguardo sin especificar objeto. 'Lo que salves' preserva mejor la repetición del verbo salvar sin expansión innecesaria.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La elección 'salvar' para פלט es aceptable por consistencia con el audit trail inglés, aunque 'rescatar' también sería posible. 'Vacío' conserva la decisión interpretativa documentada para la cláusula difícil.
  issues:
  - severity: medium
    issue: '''Quitarás'' para תַסֵּג suena impreciso y poco idiomático en el contexto.'
    rationale: Aunque léxicamente posible, en español 'quitar' suele pedir objeto expreso y puede sugerir simplemente remover algo, no apartarlo o retirarlo para ponerlo a salvo. 'Apartarás' mantiene mejor la apertura semántica y lee con más naturalidad en la secuencia de juicio.
  - severity: low
    issue: '''Tú comerás'' marca el pronombre de forma innecesaria.'
    rationale: El hebreo incluye pronombre explícito, pero en español el futuro simple ya expresa la persona. Omitir 'Tú' evita rigidez sin pérdida de sentido.
  - severity: low
    issue: '''Lo que logres salvar'' añade un matiz no presente en el original.'
    rationale: '''Logres'' introduce una idea de esfuerzo exitoso que no es necesaria. ''Lo que salves'' refleja mejor la repetición simple del verbo y conserva el paralelismo con ''no salvarás''.'
  revised_spanish_text: Comerás[a], pero no quedarás satisfecho, y tu vacío permanecerá dentro de ti; apartarás, pero no salvarás, y lo que salves, yo lo entregaré a la espada.
  revised_footnotes:
