translation:
  language: es
  text: En cuanto al altar de bronce[a] que estaba delante de Yahvé, lo acercó desde el frente de la casa, de entre el altar y la casa de Yahvé[b], y lo colocó al lado norte del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "altar de cobre".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "la casa de Yahvé"; es decir, el templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: the bronze altar
  chosen_spanish: el altar de bronce
  alternatives_spanish:
  - el altar de cobre
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede significar bronce o cobre. En contextos de mobiliario del templo, ‘bronce’ es la opción española más natural y tradicional sin perder el sentido material; ‘cobre’ queda como alternativa válida.
- source_word: אֲשֶׁר לִפְנֵי יְהוָה
  english_pob_choice: that was before Yahweh
  chosen_spanish: que estaba delante de Yahvé
  alternatives_spanish:
  - que estaba en presencia de Yahvé
  - que estaba ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición espacial ‘delante de / ante’. Se mantiene ‘Yahvé’ según la terminología del proyecto para יְהוָה, y ‘delante de’ preserva bien el valor locativo y cultual.
- source_word: וַיַּקְרֵב
  english_pob_choice: he brought it
  chosen_spanish: lo hizo avanzar
  alternatives_spanish:
  - lo acercó
  - lo trasladó hacia delante
  lexicon: HALOT
  rationale: El verbo קרב es literalmente ‘acercar/traer cerca’. En este contexto de reubicación de un objeto sagrado, ‘lo hizo avanzar’ comunica el traslado con claridad y conserva la idea de moverlo hacia adelante sin sonar forzado en español.
- source_word: מֵאֵת פְּנֵי הַבַּיִת
  english_pob_choice: from the front of the house
  chosen_spanish: desde la parte frontal de la casa
  alternatives_spanish:
  - desde la frente de la casa
  - desde el frente de la casa
  lexicon: HALOT
  rationale: פְּנֵי aquí designa la parte delantera del edificio. ‘Parte frontal de la casa’ evita una calca dura y mantiene la imagen espacial del hebreo.
- source_word: מִבֵּין הַמִּזְבֵּחַ וּמִבֵּין בֵּית יְהוָה
  english_pob_choice: from between the altar and the house of Yahweh
  chosen_spanish: de entre el altar y la casa de Yahvé
  alternatives_spanish:
  - de entre el altar y el templo de Yahvé
  - desde entre el altar y la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la construcción repetida de ‘de entre’ para reflejar el hebreo. ‘Casa de Yahvé’ sigue la terminología del texto y evita sustituirla por una equivalencia interpretativa como ‘templo’.
- source_word: וַיִּתֵּן אֹתוֹ
  english_pob_choice: and put it
  chosen_spanish: y lo colocó
  alternatives_spanish:
  - y lo puso
  - y lo situó
  lexicon: HALOT
  rationale: נתן en este contexto físico admite ‘poner/colocar’. ‘Lo colocó’ es natural en español y conserva la acción de ubicar el altar en un nuevo lugar.
- source_word: עַל יֶרֶךְ הַמִּזְבֵּחַ צָפוֹנָה
  english_pob_choice: on the north side of the altar
  chosen_spanish: al lado norte del altar
  alternatives_spanish:
  - en el costado norte del altar
  - sobre el lado norte del altar
  lexicon: HALOT
  rationale: יֶרֶךְ significa literalmente ‘costado/flanco’. ‘Al lado norte’ expresa la ubicación de modo claro y natural; ‘costado norte’ sería más literal, pero menos fluido en español.
theological_decisions:
- issue: Nombre divino יְהוָה en la sección
  english_pob_reading: Yahweh in the main text
  chosen_spanish_reading: Yahvé en el texto principal
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se translitera como ‘Yahvé’ para no ocultar el nombre divino bajo un título genérico y para mantener la trazabilidad al original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue la lectura inglesa auditada sin depender mecánicamente de ella: conserva el orden y la lógica espacial del hebreo, mantiene la distinción entre ‘casa’ y ‘altar’, y aplica la decisión doctrinal del proyecto para יְהוָה como ‘Yahvé’. No se documentan revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene ‘casa de Yahvé’ en lugar de ‘templo’ en el cuerpo del versículo, siguiendo la estrategia del POB de conservar la terminología hebrea donde no sea necesario explicitarla.
  - ‘Delante de Yahvé’ y ‘casa de Yahvé’ usan la misma forma del nombre divino para consistencia interna.
  - ‘Al lado norte’ transmite el valor direccional de צָפוֹנָה sin introducir una expresión más técnica que dificulte la lectura pública.
