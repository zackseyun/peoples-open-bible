translation:
  language: es
  text: Para el segundo lado del tabernáculo, en el lado norte, hizo veinte tablas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'veinte marcos'. El término hebreo puede referirse a paneles estructurales o a marcos, y la forma exacta de las piezas del tabernáculo es debatida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְצֶלַע
  english_pob_choice: For the ... side
  chosen_spanish: Para el ... lado
  alternatives_spanish:
  - Y para el ... lado
  - Para el flanco / lado
  lexicon: HALOT
  rationale: En este contexto constructivo, צֶלַע designa el costado o lado del tabernáculo. En español, 'Para el' reproduce bien la función de avance en la enumeración sin sonar forzado, y 'lado' conserva el sentido espacial básico.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda de reunión
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico del santuario portátil. 'Tabernáculo' es la equivalencia estable y más precisa en español bíblico para este pasaje.
- source_word: הַשֵּׁנִית
  english_pob_choice: second
  chosen_spanish: segundo
  alternatives_spanish:
  - otra
  - segunda
  lexicon: HALOT
  rationale: El adjetivo señala el lado correspondiente en una secuencia. 'Segundo' mantiene la referencia ordinal de manera clara y natural.
- source_word: לִפְאַת צָפוֹן
  english_pob_choice: on the north side
  chosen_spanish: al lado norte
  alternatives_spanish:
  - hacia el norte
  - en el lado norte
  lexicon: HALOT
  rationale: פֵאָה puede significar lado, borde o región; aquí, con צָפוֹן, indica orientación. 'Al lado norte' expresa la ubicación con naturalidad en español y conserva el valor direccional.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - construyó
  - fabricó
  lexicon: HALOT
  rationale: El verbo es amplio ('hacer'). En una descripción de construcción, 'hizo' es fiel, breve y acorde al registro narrativo.
- source_word: קְרָשִׁים
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tablones
  - marcos
  lexicon: HALOT
  rationale: En las descripciones del tabernáculo, קְרָשִׁים puede referirse a elementos estructurales de madera. 'Tablas' es una opción natural en español; se conserva la alternativa interpretativa de 'marcos' porque afecta la visualización de la estructura.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando la marca [a] directamente en el texto español, anclada a la opción léxica de קְרָשִׁים.
  spanish_consistency_notes:
  - Se mantuvo 'tabernáculo' como término técnico estable para מִשְׁכָּן.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el hebreo de este versículo.
  - '''Lado norte'' conserva la orientación espacial sin sobreinterpretar la preposición hebrea.'
