translation:
  language: es
  text: Y ahora, porque ustedes han hecho todas estas cosas, declara Yahvé, y les hablé, madrugando y hablando[a], pero no escucharon, y los llamé, pero no respondieron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo idiomático: «madrugando y hablando», que expresa iniciativa insistente o repetida en el hablar.'
    reason: cultural_note
  - marker: b
    text: 'O: «no contestaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el valor discursivo de transición e inferencia del hebreo, con una conjunción inicial natural en español.
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la reprensión de manera clara y natural en español.
- source_word: עֲשׂוֹתְכֶם אֶת כָּל הַמַּעֲשִׂים הָאֵלֶּה
  english_pob_choice: you have done all these deeds
  chosen_spanish: ustedes han hecho todas estas cosas
  alternatives_spanish:
  - ustedes han hecho todos estos actos
  - ustedes han cometido todas estas obras
  lexicon: HALOT
  rationale: El sintagma causal se expresa con una perfecta naturalidad en español. 'Hecho' mantiene el valor amplio de מעשים sin cargar indebidamente el matiz a un tecnicismo moral; 'estas cosas' preserva la deixis del hebreo sin forzar 'deeds' como fórmula fija.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: '''Declara'' conserva la fórmula profética solemne de נְאֻם. Se mantiene ''Yahvé'' por la decisión doctrinal del proyecto para יהוה.'
- source_word: וָאֲדַבֵּר אֲלֵיכֶם
  english_pob_choice: I spoke to you
  chosen_spanish: les hablé
  alternatives_spanish:
  - hablé con ustedes
  - les hablé a ustedes
  lexicon: HALOT
  rationale: El verbo de habla divina se vierte de forma directa y natural. El dativo 'les' conserva la relación de dirección hacia los destinatarios.
- source_word: הַשְׁכֵּם וְדַבֵּר
  english_pob_choice: rising early and speaking
  chosen_spanish: madrugando y hablando
  alternatives_spanish:
  - levantándome temprano y hablando
  - madrugando para hablar
  - insistiendo y hablando
  lexicon: HALOT
  rationale: Se preserva el idiomatismo hebreo sin resolverlo del todo en una paráfrasis interpretativa. 'Madrugando' reproduce el componente temporal de insistencia/anticipación; 'hablando' mantiene la repetición del acto de hablar.
- source_word: וְלֹא שְׁמַעְתֶּם
  english_pob_choice: you did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no hicieron caso
  lexicon: HALOT
  rationale: '''Escuchar'' en español puede sonar menos idiomático en este contexto; ''no escucharon'' preserva la metáfora auditiva y la resistencia a atender la palabra divina.'
- source_word: וָאֶקְרָא אֶתְכֶם
  english_pob_choice: I called you
  chosen_spanish: los llamé
  alternatives_spanish:
  - los convoqué
  - los llamé a ustedes
  lexicon: HALOT
  rationale: '''Llamé'' refleja directamente קרא como llamada/summons profético. El objeto directo con ''los'' es natural en el registro actual.'
- source_word: וְלֹא עֲנִיתֶם
  english_pob_choice: you did not answer
  chosen_spanish: no respondieron
  alternatives_spanish:
  - no contestaron
  - no dieron respuesta
  lexicon: HALOT
  rationale: '''Responder'' preserva la imagen dialogal de la llamada divina y evita una lectura excesivamente coloquial de ''contestar''.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa el Tetragrama directamente. El proyecto español adopta 'Yahvé' como forma transliterada y reverente, manteniendo la referencia personal al nombre divino sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de la expresión hebrea הַשְׁכֵּם וְדַבֵּר
  english_pob_reading: rising early and speaking
  chosen_spanish_reading: madrugando y hablando
  alternative_spanish_readings:
  - hablando persistentemente
  - madrugando para hablar
  - insistiendo en hablar
  rationale: Se conserva la textura semítica de la expresión, porque el texto enfatiza la iniciativa repetida y diligente de Yahvé. La traducción no elimina la imagen, pero tampoco la sobreexplica en el cuerpo principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Matiz de la respuesta humana en וְלֹא עֲנִיתֶם
  english_pob_reading: you did not answer
  chosen_spanish_reading: no respondieron
  alternative_spanish_readings:
  - no contestaron
  - no dieron respuesta
  rationale: '''Responder'' mantiene el paralelismo con la llamada divina y la relación de diálogo/juicio. En este contexto no se opta por ''obedecer'', porque el hebreo mantiene primero el plano de respuesta verbal.'
  doctrine_reference: Jeremiah 7:13 contextual reading; see HALOT on ענה
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió mantener la coordinación simple con «pero» implícito en la estructura española, sin introducir una concesión adicional. También se preservó la fuerza del idiomatismo hebreo en la cláusula «madrugando y hablando», con una nota aclaratoria en lugar de una paráfrasis completa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה.
  - Se evita 'SEÑOR' como máscara del nombre divino.
  - '''Responder'' se mantiene para ענה en el sentido dialogal de respuesta a una llamada.'
  - La cadencia profética se conserva con una sola oración amplia, cercana al hebreo.
  - Las notas a pie respetan la distinción entre textura idiomática y alternativa léxica.
