base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/010/012.yaml
  text: And now[a], Israel, what does Yahweh your God ask of you, except to fear Yahweh your God, to walk in all his ways, to love him[c][b], and to serve Yahweh your God with all your heart and with all your soul?
  footnotes:
  - marker: a
    text: Or 'require from you' for 'ask of you'; the Hebrew verb can carry the sense of asking in a way that implies obligation.
    reason: lexical_alternative
  - marker: b
    text: '''Fear'' here includes reverence, awe, and obedient devotion toward the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your life' for 'with all your soul'; Hebrew nephesh can mean soul, life, or self depending on context.
    reason: lexical_alternative
