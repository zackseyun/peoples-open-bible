translation:
  language: es
  text: Saliste para la salvación[a] de tu pueblo, para la salvación de tu ungido[b]; aplastaste la cabeza de la casa del impío, dejando al descubierto el cimiento hasta el cuello[c]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la salvación de tu ungido»; el hebreo repite «para salvación» en paralelo con «tu pueblo».
    reason: lexical_alternative
  - marker: b
    text: «Tu ungido» puede referirse al gobernante davídico, al pueblo en forma representativa o, tipológicamente, al Mesías; el hebreo no obliga a una sola interpretación.
    reason: alternative_reading
  - marker: c
    text: O «desnudando el cimiento hasta el cuello». La imaginería hebrea es difícil y puede mezclar la demolición de una casa con la exposición de un cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצָאתָ
  english_pob_choice: You went out
  chosen_spanish: Tú saliste
  alternatives_spanish:
  - Tú saliste afuera
  - Tú marchaste
  lexicon: HALOT
  rationale: El verbo יצא en qal perfecto 2ms expresa una salida decisiva de acción. «Saliste» es la equivalencia directa y natural en español; mantiene el impulso narrativo sin añadir matiz militar que el hebreo no exige explícitamente.
- source_word: לְיֵשַׁע
  english_pob_choice: for the salvation
  chosen_spanish: para la salvación
  alternatives_spanish:
  - para la liberación
  - para salvar
  lexicon: HALOT
  rationale: יֵשַׁע nombra salvación/deliverancia. «Salvación» conserva el peso teológico y el paralelismo repetido del verso mejor que una paráfrasis verbal.
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu pueblo de pacto
  lexicon: HALOT
  rationale: La forma posesiva indica el colectivo perteneciente a Yahvé. «Tu pueblo» es la opción más fiel y natural para el lenguaje bíblico español.
- source_word: לְיֵשַׁע אֶת מְשִׁיחֶךָ
  english_pob_choice: for the salvation of your anointed
  chosen_spanish: para la salvación de tu ungido
  alternatives_spanish:
  - para salvar a tu ungido
  - para la salvación de tu Mesías
  lexicon: HALOT
  rationale: Se conserva la repetición de לְיֵשַׁע con la misma construcción nominal. «Ungido» traduce מְשִׁיחֶךָ de modo descriptivo, sin imponer de antemano una identificación mesiánica más específica de la que el contexto exige.
- source_word: מְשִׁיחֶךָ
  english_pob_choice: your anointed
  chosen_spanish: tu ungido
  alternatives_spanish:
  - tu ungido real
  - tu Mesías
  lexicon: HALOT
  rationale: En este pasaje hebreo, משיח designa literalmente a alguien ungido y puede referirse al rey davídico, a un representante colectivo o, tipológicamente, al Mesías. «Ungido» preserva esa tensión sin resolverla prematuramente.
- source_word: מָחַצְתָּ
  english_pob_choice: you crushed
  chosen_spanish: heriste
  alternatives_spanish:
  - aplastaste
  - quebrantaste
  lexicon: HALOT
  rationale: Aunque el inglés usa «crushed», en español «heriste» comunica con naturalidad el golpe violento del verbo מחץ dentro de una imagen bélica, y evita sonar forzado. Se conserva la brutalidad del acto por el contexto inmediato y por la frase siguiente sobre la cabeza.
- source_word: רֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - el jefe
  - la cima
  lexicon: HALOT
  rationale: La imagen corporal debe mantenerse literalmente. «La cabeza» preserva el eco de un golpe devastador y deja intacta la imaginería del texto.
- source_word: מִבֵּית רָשָׁע
  english_pob_choice: of the house of the wicked
  chosen_spanish: de la casa del impío
  alternatives_spanish:
  - de la casa del malvado
  - de la casa del injusto
  lexicon: HALOT
  rationale: La construcción hebrea puede leerse con sentido arquitectónico o como pertenencia al ámbito del mal. «Impío» reproduce el tono bíblico de רָשָׁע sin perder el matiz de oposición a Dios.
- source_word: עָרוֹת
  english_pob_choice: laying bare
  chosen_spanish: dejando al descubierto
  alternatives_spanish:
  - desnudando
  - poniendo al descubierto
  lexicon: HALOT
  rationale: El infinitivo/participio de ערה comunica exposición o despojo. «Dejando al descubierto» funciona bien en español y mantiene abierta la imagen difícil, tal como la POB inglesa conserva la ambigüedad.
- source_word: יְסוֹד
  english_pob_choice: the foundation
  chosen_spanish: el fundamento
  alternatives_spanish:
  - la base
  - los cimientos
  lexicon: HALOT
  rationale: «Fundamento» es una opción formal y sobria para יסוד, adecuada al registro bíblico. En español también puede sugerir la base estructural de una casa, manteniendo la imagen ambigua del texto.
- source_word: עַד צַוָּאר
  english_pob_choice: up to the neck
  chosen_spanish: hasta el cuello
  alternatives_spanish:
  - hasta el cuello
  - al cuello
  lexicon: HALOT
  rationale: La expresión se traduce literalmente para conservar la rareza y fuerza de la imagen. En español, «hasta el cuello» es la forma más natural y transparente.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional porque el término sigue siendo incierto y no conviene traducirlo sin base suficiente.
theological_decisions:
- issue: Referente de «tu ungido»
  english_pob_reading: Rendered descriptively as 'your anointed' without identifying the referent more specifically.
  chosen_spanish_reading: Se traduce descriptivamente como «tu ungido» sin determinar en el texto principal si se trata del rey davídico, del pueblo en forma representativa o de una figura tipológica mesiánica.
  alternative_spanish_readings:
  - tu rey ungido
  - tu Mesías
  - tu ungido, es decir, el rey davídico
  rationale: El hebreo permite varias lecturas y no obliga a una sola identificación. La traducción española conserva esa tensión teológica, evitando imponer un título más determinado que el propio pasaje no exige.
  doctrine_reference: Principio de fidelidad semántica y de no sobreespecificar referentes no resueltos por el texto base
- issue: Imagen mixta de demolición/exposición en el final del verso
  english_pob_reading: Or 'stripping bare the foundation up to the neck.' The Hebrew imagery is difficult and may mix the picture of demolishing a house with exposing a body.
  chosen_spanish_reading: Se mantiene la imagen mixta con «dejando al descubierto el fundamento hasta el cuello», sin resolverla hacia una sola escena.
  alternative_spanish_readings:
  - desnudando el fundamento hasta el cuello
  - derribando el fundamento hasta el cuello
  rationale: El hebreo es deliberadamente difícil y combina elementos que pueden aludir tanto a una casa como a un cuerpo. La versión española conserva esa tensión imagística en lugar de aclararla en exceso.
  doctrine_reference: Principio de mantener ambigüedades documentadas por el texto fuente
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que prefirió «your anointed» sobre «your anointed one» por cercanía formal al hebreo. En español se reflejó con «tu ungido», que preserva esa correspondencia y evita un giro explicativo innecesario. También se respetó el cierre sin punto final después de Selah.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato; en este versículo no se explicita en la superficie del texto hebreo, pero el sujeto implícito es divino.
  - «Ungido» se mantiene como término técnico descriptivo, no como sustituto automático de «Cristo», para no fijar indebidamente el referente.
  - La imagen final conserva la ambigüedad textual entre casa/cuerpo y fundamento/cuello, siguiendo la cautela del audit trail inglés.
