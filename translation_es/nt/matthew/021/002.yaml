translation:
  language: es
  text: 'diciéndoles[a]: «Vayan a la aldea que está enfrente de ustedes, y enseguida encontrarán una asna atada y un pollino con ella[b]. Desátenlos[c] y tráiganmelos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “frente a ustedes” para la ubicación de la aldea.
    reason: lexical_alternative
  - marker: b
    text: ‘Pollino’ aquí designa un asno joven, como deja claro el contexto.
    reason: lexical_alternative
  - marker: c
    text: 'El griego tiene literalmente un participio, “habiendo desatado”, seguido de un imperativo, “traigan”; en español suele expresarse con dos mandatos: “Desátenlos y tráiganmelos”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων αὐτοῖς
  english_pob_choice: saying to them
  chosen_spanish: diciéndoles
  alternatives_spanish:
  - hablándoles
  - y les dijo
  lexicon: BDAG
  rationale: El participio presente introductorio se vierte naturalmente como un gerundio narrativo en español. 'Diciéndoles' conserva la relación de dependencia con el discurso siguiente sin añadir un verbo principal que no está en el griego.
- source_word: Πορεύεσθε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Vayan allá
  - Diríjanse
  lexicon: BDAG
  rationale: El imperativo plural de πορεύομαι en un contexto de mandato narrativo se expresa de forma natural con 'Vayan'. Mantiene el movimiento requerido sin sonar rígido.
- source_word: κώμην
  english_pob_choice: village
  chosen_spanish: aldea
  alternatives_spanish:
  - pueblo
  - villa
  - village
  lexicon: BDAG
  rationale: κώμη denota una población pequeña, menor que una ciudad. 'Aldea' comunica bien esa idea en español y conserva el tamaño/rango del asentamiento.
- source_word: κατέναντι ὑμῶν
  english_pob_choice: opposite you
  chosen_spanish: que está enfrente de ustedes
  alternatives_spanish:
  - opuesta a ustedes
  - frente a ustedes
  - al otro lado de ustedes
  lexicon: BDAG
  rationale: La expresión espacial marca ubicación frente a los discípulos. 'Que está enfrente de ustedes' reproduce el sentido relacional de forma clara en español y evita una calca menos natural.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: '''Enseguida'' transmite prontitud en español contemporáneo y conserva el valor temporal fuerte de εὐθέως con un tono narrativo fluido.'
- source_word: ὄνον δεδεμένην
  english_pob_choice: a donkey tied
  chosen_spanish: una asna atada
  alternatives_spanish:
  - una burra atada
  - una burra amarrada
  - una asna amarrada
  lexicon: BDAG
  rationale: El griego presenta un sustantivo femenino singular y un participio pasivo. 'Asna' preserva el género del referente, que luego resulta importante para 'con ella'; 'atada' expresa el estado resultante de δεδεμένην de manera directa.
- source_word: πῶλον
  english_pob_choice: a colt
  chosen_spanish: un pollino
  alternatives_spanish:
  - un potrillo
  - un joven asno
  - un potro
  lexicon: BDAG
  rationale: πῶλος aquí se refiere al animal joven que acompaña a la asna. 'Pollino' es un equivalente tradicional y preciso en español para un asno joven, sin perder la especificidad contextual.
- source_word: μετ’ αὐτῆς
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - junto a ella
  - al lado de ella
  lexicon: BDAG
  rationale: El pronombre femenino singular remite a la asna. 'Con ella' mantiene la referencia femenina y la relación acompañante de modo natural en español.
- source_word: λύσαντες
  english_pob_choice: Untie them
  chosen_spanish: Desátenlos
  alternatives_spanish:
  - Después de desatarlos
  - Sueltenlos
  lexicon: BDAG
  rationale: El participio aoristo circunstancial se vierte como mandato coordinado, siguiendo la equivalencia óptima que el auditorio hispano entiende con naturalidad. El plural se justifica por la presencia de dos animales y por la secuencia del mandato.
- source_word: ἀγάγετέ μοι
  english_pob_choice: bring them to me
  chosen_spanish: tráiganmelos
  alternatives_spanish:
  - llévenmelos
  - conduzcanmelos
  lexicon: BDAG
  rationale: ἄγω puede ser 'llevar/traer/conducir'. En este contexto con animales, 'tráiganmelos' es idiomático y expresa bien el resultado del mandato. El clítico doble conserva el objeto plural y el complemento indirecto 'a mí'.
translation_notes:
  revision_awareness: 'Concordancia alta con el borrador inglés auditado: se mantienen la secuencia narrativa, la localización espacial de la aldea, la prontitud de εὐθέως y la solución óptimo-equivalente para el participio de λύσαντες. Se ajustó el léxico al español con ''aldea'', ''asna'', ''pollino'' y un clítico verbal natural en ''tráiganmelos'', preservando el sentido del original sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente pero natural del mandato directo en segunda persona plural.
  - Se conservan los dos animales y la referencia femenina de αὐτῆς para evitar perder la señal contextual del griego.
  - Se prefirió un español publicado y claro, evitando calcos como 'opuesto a ustedes' o 'llevenme' que sonarían menos idiomáticos.
  - No hay decisiones teológicas específicas en este versículo; la principal cuestión es lexical y sintáctica.
