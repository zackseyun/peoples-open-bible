translation:
  language: es
  text: 'Y el hombre le decía: «Que primero quemen[a] la grasa hoy, y luego toma para ti lo que tu alma desee». Pero él le decía: «No, ahora tienes que darlo; y si no, lo tomaré por la fuerza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Que ciertamente quemen la grasa hoy; luego toma para ti lo que tu alma desee». El hebreo usa una forma verbal enfática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la persona
  lexicon: HALOT
  rationale: Se mantiene el sustantivo masculino singular definido, natural en español y fiel al referente narrativo.
- source_word: קַטֵּר יַקְטִירוּן
  english_pob_choice: Let them first burn
  chosen_spanish: Dejen primero que quemen
  alternatives_spanish:
  - Que quemen seguramente
  - Dejen que quemen completamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto expresa fuerza enfática; en español conviene conservar la orden y la prioridad temporal implícita con «primero», sin sobreexplicar.
- source_word: כַּיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - como en este día
  - ahora mismo hoy
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática; «hoy» es la forma más clara y natural.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - la grasa sacrificial
  - la parte grasa
  lexicon: HALOT
  rationale: Aquí se refiere a la porción grasa del sacrificio que debía quemarse. «Grasa» comunica el sentido básico; el contexto ritual evita ambigüedad, aunque «grasa sacrificial» sigue siendo una alternativa posible.
- source_word: וְקַח לְךָ
  english_pob_choice: and then take for yourself
  chosen_spanish: y luego toma para ti
  alternatives_spanish:
  - y toma para ti
  - entonces toma para ti
  lexicon: HALOT
  rationale: Se preserva la secuencia implícita del rito y el imperativo directo, con una construcción natural en español.
- source_word: כַּאֲשֶׁר תְּאַוֶּה נַפְשֶׁךָ
  english_pob_choice: whatever your soul desires
  chosen_spanish: lo que tu alma desee
  alternatives_spanish:
  - lo que desees
  - lo que anhele tu alma
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «alma» para respetar el giro idiomático y su fuerza expresiva, sin reemplazarla por una paráfrasis psicológica.
- source_word: וְאָמַר לוֹ
  english_pob_choice: But he would say to him
  chosen_spanish: Pero él le decía
  alternatives_spanish:
  - Y él le decía
  - Entonces él le decía
  lexicon: HALOT
  rationale: El imperfecto narrativo se vierte como acción repetida o habitual en la escena; «pero» conserva la oposición del diálogo.
- source_word: כִּי עַתָּה תִתֵּן
  english_pob_choice: No, you must give it now
  chosen_spanish: No, ahora tienes que darlo
  alternatives_spanish:
  - Más bien, ahora debes darlo
  - Ahora lo darás
  lexicon: HALOT
  rationale: Aunque el hebreo no expresa un «no» explícito, el sentido adversativo del turno de habla lo justifica en español. «Tienes que darlo» refleja con naturalidad la exigencia urgente.
- source_word: וְאִם לֹא
  english_pob_choice: and if not
  chosen_spanish: y si no
  alternatives_spanish:
  - pero si no
  - de lo contrario
  lexicon: HALOT
  rationale: Es la condición directa que introduce la amenaza.
- source_word: לָקַחְתִּי
  english_pob_choice: I will take it
  chosen_spanish: lo tomaré
  alternatives_spanish:
  - lo iba a tomar
  - lo tomaría
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, el contexto de amenaza le da valor modal/futuro; «lo tomaré» comunica mejor la intención.
- source_word: בְחָזְקָה
  english_pob_choice: by force
  chosen_spanish: por la fuerza
  alternatives_spanish:
  - a la fuerza
  - con violencia
  lexicon: HALOT
  rationale: Es una equivalencia idiomática clara y fiel para la coerción implícita.
theological_decisions:
- issue: Orden sacrificial frente al abuso de los hijos de Elí
  english_pob_reading: Render the request so that the fat is burned before the servant takes meat, reflecting the ritual order without adding explanatory theology to the main text.
  chosen_spanish_reading: Se expresa con claridad que primero debe quemarse la grasa y después tomarse lo demás, sin añadir explicación ritual en el cuerpo del verso.
  alternative_spanish_readings:
  - Traducir de manera más literal y opaca, sin explicitar la secuencia
  - Añadir una glosa explicativa sobre el sacrificio
  rationale: El contraste narrativo depende del orden correcto del sacrificio. La traducción deja ver esa secuencia sin introducir teología o comentario ajenos al texto.
  doctrine_reference: 1 Samuel 2:12-17; Levítico 3:16
- issue: Valor de נֶפֶשׁ en la expresión idiomática
  english_pob_reading: whatever your soul desires
  chosen_spanish_reading: Se conserva «alma» como equivalente idiomático principal.
  alternative_spanish_readings:
  - lo que quieras
  - lo que tu apetito desee
  rationale: «Alma» preserva la imagen hebrea y evita reducir el alcance del término a deseo meramente físico o psicológico.
  doctrine_reference: HALOT; uso idiomático bíblico de נֶפֶשׁ
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se preservó la secuencia ritual explícita, la fuerza enfática del verbo de quemar, el valor habitual del imperfecto en el diálogo y la amenaza final con futuro modal. No se registraron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se mantiene «alma» para נֶפֶשׁ por consistencia con el registro bíblico y la nota lexical.
  - La puntuación respeta el diálogo directo y el contraste adversativo del pasaje.
