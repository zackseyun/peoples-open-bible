base_translation:
  language: en
  yaml_path: translation/ot/joshua/006/020.yaml
  text: So the people shouted[a], and they blew the trumpets. And when the people heard the sound of the trumpet, the people shouted a great shout, and the wall fell down beneath it, and the people went up into the city, each man straight before him[b], and they captured the city.
  footnotes:
  - marker: a
    text: Or 'the wall fell down flat.' The Hebrew literally says 'the wall fell beneath itself,' an unusual expression that may describe the wall collapsing straight down.
    reason: lexical_alternative
  - marker: b
    text: '''Trumpet'' translates Hebrew shofar, a horn used for signaling; ''rams'' horn'' is a possible more specific rendering.'
    reason: cultural_note
