  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino en el texto principal, y «su Santo» es una forma aceptable y legible para וּקְדוֹשׁוֹ en este contexto isaiano. «Fuego», «llama», «espinos» y «zarzas» son opciones adecuadas y bien justificadas.
