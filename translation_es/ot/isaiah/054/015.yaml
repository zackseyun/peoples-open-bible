translation:
  language: es
  text: Mira[a], si alguien provoca contienda, no viene de mí[b]; quien provoque contienda contigo caerá ante ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertamente»; הֵן puede funcionar como llamada de atención o énfasis. Aquí se prefiere una forma natural de imperativo de atención.
    reason: lexical_alternative
  - marker: b
    text: O «no por mí», «aparte de mí» o «sin mí». El hebreo niega a Yahvé como fuente o autorización de la acción hostil.
    reason: lexical_alternative
  - marker: c
    text: O «caerá delante de ti», «caerá frente a ti» o, más literalmente, «caerá sobre ti». El contexto favorece la idea de derrota del agresor, no de un ataque exitoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - Ciertamente
  lexicon: HALOT
  rationale: הֵן introduce una llamada de atención o énfasis. «Mira» conserva ese valor deíctico en español actual sin sonar forzado.
- source_word: גּוֹר יָגוּר / גָר
  english_pob_choice: stirs up strife
  chosen_spanish: levanta conflicto
  alternatives_spanish:
  - se agrupa en hostilidad
  - provoca pelea
  - se instala como adversario
  lexicon: HALOT
  rationale: El hebreo usa el mismo lema con fuerza intensiva y aquí describe oposición hostil, no una simple idea de morar o reunirse. «Levanta conflicto» comunica la acción adversarial de manera natural en español y mantiene la tensión hostil del contexto.
- source_word: אֶפֶס מֵאוֹתִי
  english_pob_choice: it is not from me
  chosen_spanish: no viene de mí
  alternatives_spanish:
  - no es por mí
  - no procede de mí
  - no viene por mí
  lexicon: HALOT
  rationale: La frase niega a Yahvé como fuente u origen de la agresión. «No viene de mí» conserva el matiz de procedencia sin endurecerlo en una fórmula demasiado literal.
- source_word: מִי
  english_pob_choice: whoever
  chosen_spanish: quien
  alternatives_spanish:
  - el que
  - todo el que
  lexicon: HALOT
  rationale: Aquí מִי funciona en sentido relativo e indefinido. «Quien» reproduce bien la fuerza proverbial/condicional del hebreo.
- source_word: עָלַיִךְ יִפּוֹל
  english_pob_choice: will fall before you
  chosen_spanish: caerá delante de ti
  alternatives_spanish:
  - caerá ante ti
  - caerá frente a ti
  - caerá sobre ti
  lexicon: HALOT
  rationale: El POB inglés entiende נפל con על como derrota del agresor en relación con Sion, no como ataque exitoso. «Caerá delante de ti» preserva esa lectura y evita una imagen ambigua de agresión consumada.
theological_decisions:
- issue: Si el versículo implica que la oposición hostil contra Sion/Jerusalén proviene o está autorizada por Dios
  english_pob_reading: The verse denies that such hostile gathering is from God and promises the downfall of the aggressor.
  chosen_spanish_reading: El versículo niega que esa hostilidad proceda de Yahvé y promete la caída del agresor.
  alternative_spanish_readings:
  - niega solo que cuente con la ayuda de Yahvé
  - podría leerse como una mera ausencia de apoyo divino
  rationale: El contexto inmediato subraya protección y vindicación; por eso la traducción debe conservar la negación de origen y no rebajarla a una simple falta de ayuda. A la vez, se mantiene la tensión del texto sin resolverla más allá de lo que el hebreo exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés en la cláusula final, que prefirió una lectura de derrota del agresor («before you») frente a una lectura más causal. La traducción española refleja esa decisión con «delante de ti», manteniendo la correspondencia semántica y evitando una imagen ambigua de agresión triunfante.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma principal del nombre divino, conforme a los criterios del proyecto.
  - Se mantuvo «conflicto» para reflejar la hostilidad del hebreo גור en este contexto, sin suavizarlo a una simple reunión o morada.
  - Se conservó la negación de procedencia en «no viene de mí» para no diluir la afirmación teológica del texto.
