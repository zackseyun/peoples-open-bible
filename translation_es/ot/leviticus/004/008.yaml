    issue: '''quitará de él'' es gramatical pero poco natural en español litúrgico/procedimental.'
    rationale: El hebreo מִמֶּנּוּ significa 'de él/de eso', pero en español una construcción con dativo ético/objeto indirecto ('le quitará') expresa mejor la acción ritual sobre el animal sin sonar forzada.
  - severity: low
    issue: La secuencia inicial puede fluir mejor como 'Y le quitará toda la grosura al toro...'
    rationale: Esto conserva plenamente el sentido de יָרִים מִמֶּנּוּ y hace la referencia al toro más inmediata y natural para lectores hispanos.
  revised_spanish_text: 'Y le quitará toda la grosura al toro del sacrificio por el pecado: la grosura que cubre las entrañas y toda la grosura que está sobre las entrañas[a].'
