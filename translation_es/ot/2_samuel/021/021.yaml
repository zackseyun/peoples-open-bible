- from: Y desafió a Israel[a], y Jonatán, hijo de Simeí, hermano de David, lo hirió de muerte.
  to: Y desafió a Israel, y Jonatán, hijo de Simeí[a], hermano de David, lo abatió.
  rationale: Se reemplaza «lo hirió de muerte» por «lo abatió» para reflejar mejor וַיַּכֵּהוּ y el inglés auditado «struck him down», manteniendo la fuerza de combate sin explicitar de más el resultado. También se ancla la nota textual directamente en «Simeí», que es donde recae la variante documentada.
