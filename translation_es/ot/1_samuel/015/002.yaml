  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת פָּקַ֕דְתִּי אֵ֛ת אֲשֶׁר עָשָׂ֥ה עֲמָלֵ֖ק לְ/יִשְׂרָאֵ֑ל אֲשֶׁר שָׂ֥ם ל/וֹ֙ בַּ/דֶּ֔רֶךְ בַּ/עֲלֹת֖/וֹ מִ/מִּצְרָֽיִם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/002.yaml
  text: 'Thus says Yahweh of hosts: ‘I have taken note of what Amalek did to Israel[c][b][a], how he opposed him on the way when he came up from Egypt.’'
  footnotes:
  - marker: a
    text: Or, “I have punished for what Amalek did to Israel,” or “I have remembered what Amalek did to Israel.” The Hebrew verb can carry the sense of attending to, remembering, or visiting with judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, “how he opposed him on the way”; possibly, “how he lay in wait for him on the way.” The Hebrew expression refers to Amalek’s hostile action against Israel during the exodus journey.
    reason: lexical_alternative
  - marker: c
    text: “Him” refers to Israel as a collective singular.
    reason: cultural_note
