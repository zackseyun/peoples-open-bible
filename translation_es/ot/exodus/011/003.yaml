  language: en
  yaml_path: translation/ot/exodus/011/003.yaml
  text: And Yahweh gave the people favor in the sight of the Egyptians[a]. Moreover, the man Moses was very great in the land of Egypt[d][c][b], in the sight of Pharaoh’s servants and in the sight of the people.
  footnotes:
