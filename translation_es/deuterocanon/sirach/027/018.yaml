  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Prójimo’ para πλησίον está bien justificado; ‘amistad’ para φιλία y ‘destruido’ para ἀπώλεσεν/ἀπώλεσας preservan la fuerza léxica documentada. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
