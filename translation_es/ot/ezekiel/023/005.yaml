translation:
  language: es
  text: Oholá se prostituyó mientras estaba bajo mi autoridad[a], y se apasionó por sus amantes[b], los asirios que estaban cerca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo mí». La frase evoca la posición de Oholá bajo Yahvé dentro de la metáfora matrimonial del pasaje.
    reason: lexical_alternative
  - marker: b
    text: O «codició» / «se inclinó fuertemente hacia». El verbo hebreo expresa deseo intenso y moralmente cargado.
    reason: lexical_alternative
  - marker: c
    text: O «los asirios, los cercanos» / «los asirios, que estaban cerca».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּזֶן
  english_pob_choice: played the prostitute
  chosen_spanish: se prostituyó
  alternatives_spanish:
  - fornicó
  - se hizo ramera
  - fue infiel
  lexicon: HALOT
  rationale: זנה en el marco profético expresa inmoralidad sexual figurada para la infidelidad del pacto. «Se prostituyó» conserva el metáforo sexual con naturalidad en español y evita suavizarlo en mera infidelidad política.
- source_word: אָהֳלָה
  english_pob_choice: Oholah
  chosen_spanish: Oholá
  alternatives_spanish:
  - Oholah
  lexicon: transliteración del nombre propio
  rationale: Se mantiene el nombre propio transliterado, ajustado a ortografía española para lectura pública, sin traducirlo.
- source_word: תַּחְתַּי
  english_pob_choice: while under me
  chosen_spanish: mientras estaba bajo mí
  alternatives_spanish:
  - bajo mí
  - mientras estaba sujeta a mí
  - mientras me pertenecía
  lexicon: HALOT
  rationale: La expresión conserva la relación de autoridad/protección del pacto y del matrimonio metafórico. «Mientras estaba bajo mí» reproduce mejor el valor temporal y relacional que un posesivo más plano.
- source_word: וַתַּעְגַּב
  english_pob_choice: lusted after
  chosen_spanish: codició
  alternatives_spanish:
  - deseó con pasión
  - se apasionó por
  - se obsesionó con
  lexicon: HALOT
  rationale: עגב expresa deseo intenso con carga negativa. «Codició» comunica el impulso desordenado en un español digno y breve, manteniendo el tono moral del pasaje.
- source_word: מְאַהֲבֶיהָ
  english_pob_choice: her lovers
  chosen_spanish: sus amantes
  alternatives_spanish:
  - sus amantes ilícitos
  - los que la amaban
  lexicon: HALOT
  rationale: En la metáfora adúltera, el participio funciona sustantivamente para los vínculos ilícitos. «Sus amantes» es el equivalente natural en español y conserva la imagen.
- source_word: אֶל אַשּׁוּר
  english_pob_choice: the Assyrians
  chosen_spanish: los asirios
  alternatives_spanish:
  - Asiria
  - hacia Asiria
  - los asirios
  lexicon: HALOT
  rationale: Aunque la preposición es direccional, el contexto y el audit trail inglés muestran que se trata de los asirios como objeto del deseo. «Los asirios» preserva la referencia étnica/política sin añadir una preposición redundante.
- source_word: קְרוֹבִים
  english_pob_choice: who were nearby
  chosen_spanish: que estaban cerca
  alternatives_spanish:
  - cercanos
  - vecinos
  - próximos
  lexicon: HALOT
  rationale: El adjetivo plural describe proximidad geográfica. «Que estaban cerca» es claro en español y evita convertirlo en una relación interpersonal que el hebreo no exige.
theological_decisions:
- issue: Metáfora matrimonial/profética de infidelidad del pacto
  english_pob_reading: Retain the sexual metaphor explicitly ('played the prostitute,' 'lusted after her lovers') rather than soften it into merely political alliance language.
  chosen_spanish_reading: 'Mantener explícitamente la imagen sexual y de infidelidad: «se prostituyó» y «codició a sus amantes».'
  alternative_spanish_readings:
  - fue infiel
  - buscó alianzas extranjeras
  - se inclinó hacia Asiria
  rationale: Ezequiel usa deliberadamente un lenguaje chocante para representar la infidelidad del pacto y las alianzas indebidas. En español conviene conservar esa fuerza en vez de reducirla a política.
  doctrine_reference: 'Filosofía de traducción: primacía del original y preservación de la tensión teológica/metafórica.'
translation_notes:
  revision_awareness: 'El texto inglés revisado quitó la repetición de «after» para mayor fluidez: «the Assyrians who were nearby». La versión española sigue esa decisión y evita una repetición innecesaria de preposición, manteniendo la relación direccional y el adjetivo de proximidad.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige explícitamente; aquí el versículo no lo menciona, así que no aparece.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos como «fornicó» o «ramera» salvo que fueran necesarios; aquí «se prostituyó» es más directo y fiel al paralelo inglés.
  - Se preservó la tensión entre metáfora sexual e infidelidad covenantal sin convertirla en paráfrasis política.
  - «Oholá» sigue la transliteración española coherente para nombres hebreos propios en este proyecto.
