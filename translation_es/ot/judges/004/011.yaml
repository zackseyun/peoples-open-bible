translation:
  language: es
  text: Ahora bien, Heber el ceneo se había separado de los ceneos[a], de los hijos de Hobab, suegro de Moisés, y había tendido su tienda hasta la encina[b] en Zaanaim, que está cerca de Quedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pariente por matrimonio de Moisés'; el término hebreo puede ser más amplio que 'suegro'.
    reason: alternative_reading
  - marker: b
    text: O 'el terebinto' en Zaanaim.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/חֶ֤בֶר הַ/קֵּינִי֙
  english_pob_choice: Now Heber the Kenite
  chosen_spanish: Ahora bien, Heber el ceneo
  alternatives_spanish:
  - Y Heber el ceneo
  - Ahora, Heber el ceneo
  lexicon: HALOT
  rationale: Se conserva el nombre propio Heber y el etnónimo/ gentilicio 'ceneo' para reflejar el grupo étnico del hebreo, siguiendo la decisión inglesa de no sugerir erróneamente 'Caín'.
- source_word: נִפְרָ֣ד
  english_pob_choice: had separated
  chosen_spanish: se había separado
  alternatives_spanish:
  - se separó
  - había sido separado
  lexicon: HALOT
  rationale: El nifal de פרד expresa separación de un grupo; el pluscuamperfecto español comunica bien el trasfondo narrativo del versículo.
- source_word: מִ/קַּ֔יִן
  english_pob_choice: from the Kenites
  chosen_spanish: de los ceneos
  alternatives_spanish:
  - de Caín
  - de los queneos
  lexicon: HALOT
  rationale: Aunque la forma consonántica podría sugerir otra asociación, el contexto exige el clan de los ceneos. Se evita una lectura equivocada con 'Caín'.
- source_word: מִ/בְּנֵ֥י חֹבָ֖ב
  english_pob_choice: from the sons of Hobab
  chosen_spanish: de los hijos de Hobab
  alternatives_spanish:
  - de los descendientes de Hobab
  lexicon: HALOT
  rationale: '''Hijos de'' conserva la forma hebrea y es plenamente comprensible en español; ''descendientes'' explicita el sentido colectivo, pero suaviza la forma del texto.'
- source_word: חֹתֵ֣ן מֹשֶׁ֑ה
  english_pob_choice: the father-in-law of Moses
  chosen_spanish: suegro de Moisés
  alternatives_spanish:
  - el pariente por matrimonio de Moisés
  - el cuñado de Moisés
  lexicon: HALOT
  rationale: '''Suegro'' es la equivalencia más natural y frecuente en español para חֹתֵן, manteniendo la lectura tradicional sin cerrar del todo la amplitud relacional posible.'
- source_word: וַ/יֵּ֣ט אָהֳל֔/וֹ
  english_pob_choice: and had pitched his tent
  chosen_spanish: y había plantado su tienda
  alternatives_spanish:
  - y había acampado
  - y había tendido su tienda
  lexicon: HALOT
  rationale: נטה אהל puede expresarse en español como 'plantar la tienda' o 'tender la tienda'; 'plantado' resulta natural y fiel al gesto de establecerse.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - alrededor de
  lexicon: HALOT
  rationale: '''Hasta'' comunica la extensión espacial del asentamiento sin sobrecargar el verso.'
- source_word: אֵל֥וֹן
  english_pob_choice: the oak
  chosen_spanish: la encina
  alternatives_spanish:
  - el roble
  - el terebinto
  lexicon: HALOT
  rationale: אֵלוֹן puede ser 'roble', 'encina' o 'terebinto'; se elige 'encina' por ser una traducción botánica digna y tradicionalmente clara en español, dejando abierta la alternativa botánica en nota.
- source_word: ב/צענים
  english_pob_choice: in Zaannannim
  chosen_spanish: de Zaanaim
  alternatives_spanish:
  - en Zaanaim
  - de Zaananim
  - de Bezaanaim
  lexicon: HALOT
  rationale: Se translitera el topónimo en una forma española legible y cercana a la forma hebrea; se mantiene como nombre de lugar sin intentar explicar su etimología incierta.
- source_word: אֲשֶׁ֥ר אֶת קֶֽדֶשׁ
  english_pob_choice: which is near Kedesh
  chosen_spanish: que está cerca de Quedes
  alternatives_spanish:
  - que está junto a Quedes
  - que está en Quedes
  lexicon: HALOT
  rationale: La construcción expresa proximidad; 'cerca de' reproduce bien la relación locativa. Se usa 'Quedes' como forma hispanizada del topónimo.
theological_decisions:
- issue: Relación de parentesco en חֹתֵן מֹשֶׁה
  english_pob_reading: the father-in-law of Moses
  chosen_spanish_reading: suegro de Moisés
  alternative_spanish_readings:
  - pariente por matrimonio de Moisés
  - cuñado de Moisés
  rationale: La tradición narrativa suele entender חֹתֵן como 'suegro', y esa es la lectura más clara para el lector español. No obstante, se preserva la posibilidad semántica más amplia en la documentación porque el término hebreo puede abarcar una relación por matrimonio más general.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Identidad del grupo de origen de Heber
  english_pob_reading: from the Kenites
  chosen_spanish_reading: de los ceneos
  alternative_spanish_readings:
  - de Caín
  - de los queneos
  rationale: El contexto del relato y la decisión del POB en inglés favorecen la referencia étnica a los ceneos. Traducirlo como 'Caín' introduciría una asociación no buscada por el versículo.
  doctrine_reference: Source-driven lexical disambiguation
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo y el aparato crítico/lexical del POB en inglés sin cambios de sentido; no se registraron revisiones posteriores que alteren la formulación, y el control cruzado reportó alta concordancia con observaciones menores.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma editorial del proyecto cuando el texto la requiera; en este versículo no aparece el nombre divino explícito.
  - Se usa 'ceneo/ceneos' de manera consistente para el grupo étnico, evitando la falsa asociación con 'Caín'.
  - '''Quedes'' se hispaniza como topónimo bíblico estable para lectura eclesial amplia.'
  - Se conserva la tensión semántica de חֹתֵן mediante la nota, aunque el cuerpo principal use 'suegro'.
