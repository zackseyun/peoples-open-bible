revisions:
- from: Y el sacerdote tomará [a] parte de la sangre de la ofrenda por el pecado[b] y la pondrá sobre los postes de la puerta del templo, sobre las cuatro esquinas del altar, y sobre los postes de la puerta del atrio interior.
  to: Y el sacerdote tomará parte de la sangre de la ofrenda por el pecado[a] y la pondrá sobre los postes del templo, sobre las cuatro esquinas de la plataforma del altar, y sobre los postes de la puerta del atrio interior.
  rationale: Se movió la nota al sintagma correcto para que ancle la alternativa de חַטָּאת. Se eliminó la nota duplicada. Se revisó «las cuatro esquinas del altar» a «las cuatro esquinas de la plataforma del altar» para preservar la decisión léxica documentada de הָעֲזָרָה לַמִּזְבֵּחַ como elemento arquitectónico del altar, sin volver el español innecesariamente técnico. Se mantuvo el resto de la redacción por su claridad y fidelidad general.
  reviewer_model: gpt-5.4
