revisions:
- from: Y si toda la congregación de Israel yerra[a], y el asunto queda oculto[b] a los ojos de la asamblea, y hacen una de todas las cosas que Yahvé ha mandado que no se hagan, y quedan culpables.
  to: Y si toda la congregación de Israel peca involuntariamente[a], y el asunto queda oculto[b] a los ojos de la asamblea, y hacen una de todas las cosas que Yahvé ha mandado que no se hagan, y se hacen culpables,
  rationale: Se ajusta יִשְׁגּוּ a ‘peca involuntariamente’ para preservar la categoría legal-teológica central de Levítico 4 con claridad en español moderno. Se reaprovecha la nota [a] para incluir tanto la alternativa léxica de עֲדָה como la explicación necesaria sobre la involuntariedad del verbo, siguiendo mejor el expediente inglés. También se mejora la naturalidad jurídica de וְאָשֵׁמוּ con ‘se hacen culpables’. Se conserva ‘Yahvé’, así como la distinción ‘congregación’ / ‘asamblea’.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:26:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: condición sobre toda la congregación de Israel, falta inadvertida, ocultamiento del asunto al conocimiento de la asamblea, comisión de un acto prohibido por Yahvé y consecuente culpa. También mantiene correctamente Yahvé para יְהוָה y distingue עֲדָה de קָהָל con ‘congregación’ y ‘asamblea’. Sin embargo, ‘yerra’ por יִשְׁגּוּ no preserva con suficiente claridad la categoría legal-teológica de pecado involuntario destacada en Levítico 4; además, la nota [a] actualmente solo ofrece una alternativa para עֲדָה y no aclara la inadvertencia. ‘Quedan culpables’ es comprensible, pero ‘se hacen culpables’ o ‘incurren en culpa’ suena más natural y jurídico en español.'
  spanish_quality_summary: 'El español es mayormente legible y digno, pero hay dos asperezas: ‘yerra’ suena algo literario/arcaizante y no comunica claramente ‘peca involuntariamente’; y ‘una de todas las cosas’ resulta algo forzado en español, aunque cercano al hebreo. Una ligera reparación mejora fidelidad y naturalidad sin perder formalidad.'
  glossary_alignment: 'Alineación buena en ‘Yahvé’. La distinción terminológica entre ‘congregación’ y ‘asamblea’ está bien resuelta. El principal desajuste con la rationale documentada está en שׁגה: el proyecto enfatiza pecado involuntario/error inadvertido, y ‘yerra’ por sí solo no lo deja suficientemente claro en español contemporáneo. No hay conflicto doctrinal difícil.'
  issues:
  - severity: medium
    issue: ‘yerra’ no explicita suficientemente el valor de pecado involuntario de יִשְׁגּוּ
    rationale: En este capítulo la categoría sacrificial es la de pecado cometido por inadvertencia/error, no mera equivocación genérica. ‘Yerra’ puede entenderse como ‘se equivoca’ o sonar arcaico; ‘peca involuntariamente’ preserva mejor el sentido legal del hebreo y la decisión auditada en inglés.
  - severity: low
    issue: La nota [a] no refleja el matiz principal documentado para יִשְׁגּוּ
    rationale: La única nota sobre [a] trata la alternativa de עֲדָה (‘comunidad’), pero el inglés preserva una nota explicativa sobre la falta involuntaria. En español conviene usar [a] para aclarar ese matiz, que es más importante para la comprensión teológica del versículo.
  - severity: low
    issue: ‘quedan culpables’ es menos idiomático que otras opciones jurídicas en español
    rationale: Aunque entendible, ‘quedan culpables’ suena algo rígido. ‘Se hacen culpables’ mantiene el valor resultativo de וְאָשֵׁמוּ de manera más natural.
