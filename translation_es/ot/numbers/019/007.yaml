  text: וְ/כִבֶּ֨ס בְּגָדָ֜י/ו הַ/כֹּהֵ֗ן וְ/רָחַ֤ץ בְּשָׂר/וֹ֙ בַּ/מַּ֔יִם וְ/אַחַ֖ר יָב֣וֹא אֶל הַֽ/מַּחֲנֶ֑ה וְ/טָמֵ֥א הַ/כֹּהֵ֖ן עַד הָ/עָֽרֶב־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/019/007.yaml
  text: Then the priest shall wash his clothes and bathe his body in water[a], and afterward he may come into the camp[b]; but the priest shall be unclean until evening.
  footnotes:
  - marker: a
    text: Or 'he may enter the camp.' The Hebrew can be understood as permitted reentry after the required washing.
    reason: lexical_alternative
  - marker: b
    text: '''Unclean'' here refers to ritual impurity, not necessarily personal sin or moral fault.'
    reason: cultural_note
