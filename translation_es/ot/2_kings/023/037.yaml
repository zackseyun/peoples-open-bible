translation:
  language: es
  text: Y hizo lo malo a los ojos de Yahvé, conforme a todo lo que habían hecho sus padres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus antepasados» o «sus predecesores». El hebreo literalmente dice «sus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he did
  chosen_spanish: Y hizo
  alternatives_spanish:
  - Hizo
  - Y actuó
  lexicon: HALOT
  rationale: El waw consecutivo en narrativa hebrea avanza la acción; en español se conserva con «Y» y el verbo simple «hizo», que comunica de modo natural la secuencia narrativa sin añadir contenido.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La fórmula hebrea עשה הרע se vierte de manera idiomática en español con «hacer lo malo», que preserva el valor evaluativo sin sonar artificial.
- source_word: בְּעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - ante
  - en la vista de
  lexicon: HALOT
  rationale: La imagen hebrea de evaluación se conserva mejor con «a los ojos de», expresión natural en español y equivalente funcional de «in the sight of».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como «Yahvé», de acuerdo con la política del POB en español y sin sustituirlo por un título.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La relación de correspondencia o conformidad se expresa de forma clara y fiel con «conforme a todo lo que».
- source_word: עָשׂוּ
  english_pob_choice: had done
  chosen_spanish: habían hecho
  alternatives_spanish:
  - hicieron
  - habían realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto español reproduce bien la anterioridad de las acciones de los padres respecto al rey evaluado.
- source_word: אֲבֹתָיו
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres/antecesores
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus padres», en español «sus padres» puede sonar a progenitores inmediatos; por claridad de contexto real y dinástico se traduce «sus padres», manteniendo la literalidad básica y su posible referencia a los antecesores. La alternativa interpretativa puede explicitarse en nota si se requiere.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio de Dios en español como «Yahvé», coherente con la decisión del POB de no enmascarar el Tetragrámaton con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: no se incluyen notas al pie sin marcador anclado en el texto. Esta versión mantiene la evaluación regia y el nombre divino según el audit trail en inglés.'
  spanish_consistency_notes:
  - Se evita la sustitución litúrgica de YHWH por «SEÑOR».
  - La fórmula evaluativa hebrea se vierte con una construcción idiomática española sin perder el juicio moral.
  - No se introduce nota al pie porque no es necesaria para esta línea y se evitó el anclaje faltante.
