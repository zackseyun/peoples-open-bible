translation:
  language: es
  text: 'Y dije[a]: «¿A dónde vas?» Y él me dijo: «A medir Jerusalén[b], para ver cuán ancha es y cuán larga es».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿A dónde vas tú?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «para ver cuánto es su anchura y cuánto es su longitud», un giro idiomático que significa «para ver cuán ancha es y cuán larga es».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֖נָה
  english_pob_choice: Where / To where
  chosen_spanish: ¿A dónde
  alternatives_spanish:
  - ¿Dónde
  - ¿Hacia dónde
  lexicon: HALOT
  rationale: El hebreo pregunta por destino o dirección. En español, «¿A dónde vas?» conserva mejor ese matiz direccional que un simple «¿Dónde vas?».
- source_word: הֹלֵ֑ךְ
  english_pob_choice: are you going
  chosen_spanish: vas
  alternatives_spanish:
  - estás yendo
  - caminas
  lexicon: HALOT
  rationale: El participio con valor de movimiento se expresa naturalmente en español con el presente «vas» dentro de la pregunta de dirección, sin perder la idea de desplazamiento.
- source_word: לָ/מֹד֙
  english_pob_choice: To measure
  chosen_spanish: A medir
  alternatives_spanish:
  - Para medir
  - A tomar medidas de
  lexicon: HALOT
  rationale: מדד significa medir de manera concreta. «A medir» reproduce de forma directa la finalidad del infinitivo sin añadir matices ajenos.
- source_word: יְר֣וּשָׁלִַ֔ם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español, sin necesidad de transliteración adicional.
- source_word: לִ/רְא֥וֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para determinar
  - para averiguar
  lexicon: HALOT
  rationale: Se conserva el verbo «ver» para mantener el hebraísmo de finalidad, tal como lo hace la POB inglesa, sin convertirlo en una explicación interpretativa.
- source_word: כַּ/מָּֽה רָחְבָּ֖/הּ
  english_pob_choice: how wide it is
  chosen_spanish: cuán ancha es
  alternatives_spanish:
  - qué ancho es
  - cuál es su anchura
  lexicon: HALOT
  rationale: La construcción hebrea literalmente habla de «cuánto de anchura». En español, «cuán ancha es» conserva la idea de medida y suena más fiel y digno que una paráfrasis técnica.
- source_word: וְ/כַ/מָּ֥ה אָרְכָּֽ/הּ
  english_pob_choice: and how long it is
  chosen_spanish: y cuán larga es
  alternatives_spanish:
  - y qué larga es
  - y cuál es su longitud
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera mitad y el valor de dimensión física expresado por el hebreo.
translation_notes:
  revision_awareness: El texto español sigue el estado revisado sin cambios sustantivos indicado por el control de versiones más reciente; se ha conservado el sentido direccional de la pregunta y el paralelismo de las dos medidas sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene el paralelismo hebreo entre anchura y longitud con adjetivos concordantes en femenino singular para referirse a Jerusalén.
  - El giro inicial «Y dije» preserva la narrativa en primera persona simple y directa.
  - Las notas al pie conservan la alternativa formal señalada por la POB inglesa y explican el hebraísmo de medida.
