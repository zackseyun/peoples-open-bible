translation:
  language: es
  text: Y durmió Salomón con sus padres[a], y lo sepultaron en la ciudad de David, su padre. Y Roboam, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «durmió con sus padres», expresión habitual para la muerte y el sepultamiento entre los antepasados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo convencional de muerte en relatos regios. En español, «durmió» conserva ese valor idiomático y el paralelismo con la fórmula bíblica tradicional, sin reducirlo al sentido plano de «murió».
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres y antepasados
  lexicon: HALOT
  rationale: «Padres» reproduce el término relacional del hebreo y mantiene la fórmula dinástica. En español, «con sus padres» comunica bien la expresión heredada sin perder su carácter funerario ancestral.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El verbo hebreo es activo plural con objeto directo; «lo sepultaron» refleja bien esa forma y su registro bíblico. Se prefiere «sepultaron» por su dignidad y por conservar mejor el tono de relato real que «enterraron».
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David, su padre
  - en la ciudad de David
  lexicon: HALOT
  rationale: Es la expresión geográfica convencional del texto bíblico. «Ciudad de David» es la forma más transparente y reconocible en español, y sigue de cerca la formulación hebrea.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - su progenitor
  lexicon: HALOT
  rationale: Aquí el posesivo remite a David en relación con Salomón; «su padre» es la traducción directa y natural. No se necesita ampliar a «antepasado» porque el contexto genealógico inmediato ya aclara la referencia.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: «Reinó» reproduce la fórmula regnal estándar del hebreo de modo conciso y natural en español. Mantiene el sentido de ejercer el reino, no solo el de acceder al trono.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La preposición marca sucesión o sustitución. «En su lugar» es la equivalencia española más idiomática para una sucesión monárquica y conserva la relación de reemplazo.
translation_notes:
  revision_awareness: Alineado con el pasaje hebreo y con la decisión auditada en inglés de preservar el eufemismo funerario, la voz activa del entierro y la fórmula regnal de sucesión, sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y real del cierre de Crónicas.
  - Se preserva la fórmula bíblica de muerte y sucesión sin modernizarla en exceso.
  - «Sepultaron» y «reinó» conservan mejor el registro literario que opciones más coloquiales.
