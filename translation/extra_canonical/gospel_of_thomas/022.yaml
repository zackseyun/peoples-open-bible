  symmetry. Grammar: The temporal-potential construction ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ … ϫⲉ ϩⲟⲧⲁⲛ ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛ…
