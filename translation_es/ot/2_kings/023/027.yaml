translation:
  language: es
  text: 'Y Yahvé dijo: «También quitaré a Judá de delante de mí, así como quité a Israel; y rechazaré[a] esta ciudad que escogí —Jerusalén—, y la casa[b] de la cual dije: “Mi nombre estará allí”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y he rechazado esta ciudad que escogí —Jerusalén—». El verbo hebreo puede leerse como una acción completada, aunque aquí se vierte con fuerza futura para concordar con la declaración de juicio.
    reason: alternative_reading
  - marker: b
    text: 'O «el templo». Hebreo: «la casa», refiriéndose al templo de Jerusalén.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre divino del texto fuente según el criterio del proyecto, manteniendo el valor del nombre propio del pacto y evitando la sustitución por una convención de máscara litúrgica.
- source_word: אָסִיר / הֲסִרֹתִי (סור in Hiphil)
  english_pob_choice: remove / removed
  chosen_spanish: quitaré / quité
  alternatives_spanish:
  - retiraré / retiré
  - removeré / removí
  - alejaré / alejó
  lexicon: HALOT
  rationale: El Hifil expresa hacer salir o apartar. «Quitar» comunica con naturalidad la acción de apartar a Judá e Israel sin perder la fuerza de separación del verbo hebreo.
- source_word: מֵעַל פָּנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - de ante mi rostro
  lexicon: HALOT
  rationale: «De delante de mí» conserva el idioma relacional del hebreo y su carga de ruptura de relación/covenio sin sonar forzado en español moderno.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: Marca la correspondencia del destino de Judá con el de Israel; «también» es la equivalencia más natural en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: HALOT
  rationale: La comparación explícita entre Judá e Israel queda clara con «así como», que reproduce bien la relación de paralelismo del hebreo.
- source_word: וּמָאַסְתִּי
  english_pob_choice: I will reject
  chosen_spanish: rechazaré
  alternatives_spanish:
  - desecharé
  - repudiaré
  - despreciaré
  lexicon: HALOT
  rationale: Aunque la forma verbal puede leerse como perfecta, el contexto profético sigue con fuerza futura. «Rechazaré» expresa la repulsa pactual sin cargar el tono emotivo de «despreciaré».
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esta ciudad aquí
  - la ciudad esta
  lexicon: HALOT
  rationale: Es una correspondencia directa y sobria del demostrativo hebreo.
- source_word: אֲשֶׁר בָּחַרְתִּי
  english_pob_choice: that I chose
  chosen_spanish: que escogí
  alternatives_spanish:
  - que elegí
  - que he escogido
  lexicon: HALOT
  rationale: «Escogí» refleja la elección divina pasada de Jerusalén; «escoger» mantiene el campo semántico de elección electiva del texto.
- source_word: אֶת יְרוּשָׁלִַם
  english_pob_choice: —Jerusalem—
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - —Jerusalén—
  - a saber, Jerusalén
  lexicon: HALOT
  rationale: La apposición identifica la ciudad. En español, la coma o el inciso se vuelven opcionales; aquí el flujo natural admite el nombre sin necesidad de marcarlo con dashes.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del templo
  lexicon: HALOT
  rationale: Se preserva «casa» como equivalente literal de בַּיִת, dejando que el contexto templeño determine el referente, en lugar de sustituirlo por la explicación interpretativa «templo».
- source_word: יִהְיֶה שְׁמִי שָׁם
  english_pob_choice: My name will be there
  chosen_spanish: mi nombre estará allí
  alternatives_spanish:
  - allí estará mi nombre
  - mi nombre estará allí mismo
  lexicon: HALOT
  rationale: La frase conserva la idea bíblica de la presencia/nombre divinos en el santuario. «Estará allí» es natural en español y mantiene el valor de localización sin expandirlo más de lo warranted.
theological_decisions:
- issue: Valor temporal de וּמָאַסְתִּי en una declaración de juicio profético
  english_pob_reading: I will reject
  chosen_spanish_reading: rechazaré
  alternative_spanish_readings:
  - he rechazado
  - rechazo
  rationale: Aunque la forma hebrea admite lectura completada, el discurso profético sigue con acciones anunciadas en futuro. Traducir «rechazaré» preserva la progresión retórica del juicio sin resolver artificialmente la tensión verbal.
  doctrine_reference: Mantener la tensión aspectual/retórica del hebreo profético; equivalencia óptima
- issue: Elección de «la casa» frente a «el templo»
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: El hebreo dice literalmente «casa». Conservarlo mantiene la dicción original y el eco teológico de la morada del nombre divino; el contexto ya hace evidente que se trata del templo.
  doctrine_reference: Primacía del lenguaje fuente y consistencia terminológica
- issue: «Mi nombre estará allí» como fórmula de presencia divina
  english_pob_reading: My name will be there
  chosen_spanish_reading: mi nombre estará allí
  alternative_spanish_readings:
  - allí estará mi nombre
  - mi nombre habitara allí
  rationale: La expresión debe mantenerse sobria para no convertirla en una paráfrasis de la presencia divina. «Mi nombre estará allí» conserva la fórmula bíblica y su peso teológico.
  doctrine_reference: Teología del Nombre divino; fidelidad al giro hebreo
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se preservó el paralelismo entre Judá e Israel, la forma verbal futura en la cláusula de juicio, y la literalidad de בַּיִת como «casa», con nota explicativa para el referente templario. No se adoptaron revisiones adicionales respecto al pasaje de referencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «escogí» para בחר, coherente con la elección divina ya documentada.
  - Se conserva «casa» para בַּיִת y se aclara en nota que el referente es el templo.
  - Se evita «SEÑOR» como sustituto del tetragrámaton para no ocultar el nombre divino.
  - La puntuación con dos puntos e incisos respeta el apposición Jerusalén sin sobrecargar el español.
