translation:
  language: es
  text: Y David danzaba[a] con todo su vigor delante de Yahvé, y David llevaba un efod de lino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «giraba» o «saltaba». El hebreo presenta un movimiento corporal enérgico y celebratorio.
    reason: lexical_alternative
  - marker: b
    text: El efod era una vestidura distintiva sacerdotal o cultual; aquí se dice que David llevaba uno de lino.
    reason: cultural_note
lexical_decisions:
- source_word: מְכַרְכֵּר
  english_pob_choice: was dancing
  chosen_spanish: danzaba
  alternatives_spanish:
  - giraba
  - saltaba
  lexicon: HALOT
  rationale: El participio describe movimiento corporal vigoroso en celebración. «Danzaba» es natural en español y conserva el sentido general de movimiento festivo; «giraba» y «saltaba» son posibles, pero cada una estrecha demasiado la imagen.
- source_word: בְּכָל עֹז
  english_pob_choice: with all his might
  chosen_spanish: con todo su vigor
  alternatives_spanish:
  - con toda su fuerza
  - con todo su poder
  lexicon: HALOT
  rationale: La frase expresa intensidad o esfuerzo total. «Con todo su vigor» comunica bien la energía del acto en español moderno sin sonar rígido; «fuerza» o «poder» también son posibles, pero aquí «vigor» mantiene mejor la idea de vivacidad física y celebratoria.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי significa literalmente «antes de / delante de / en presencia de». «Delante de Yahvé» es breve, natural y conserva el marco relacional del texto; «en presencia de Yahvé» explicita más la idea, pero resulta un poco más explicativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», siguiendo la decisión doctrinal del POB en vez de sustituirlo por un título. Esta forma es clara en español y evita ocultar el Tetragrama.
- source_word: חָגוּר
  english_pob_choice: was wearing
  chosen_spanish: llevaba
  alternatives_spanish:
  - iba ceñido con
  - estaba vestido con
  lexicon: HALOT
  rationale: El participio indica que David estaba equipado o vestido con la prenda. «Llevaba» es la opción española más natural y fiel; «iba ceñido con» suena más literal pero más arcaico, y «estaba vestido con» pierde algo de la idea de portar la vestidura específica.
- source_word: אֵפוֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - vestidura sacerdotal
  - prenda ritual
  lexicon: HALOT
  rationale: «Efod» se translitera porque es un término técnico israelita sin equivalente exacto en español. Mantenerlo evita una paráfrasis interpretativa.
- source_word: בָּד
  english_pob_choice: linen
  chosen_spanish: de lino
  alternatives_spanish:
  - de lino fino
  lexicon: HALOT
  rationale: Aquí בָּד refiere al material. «De lino» expresa el sentido de manera directa y suficiente; «de lino fino» añadiría una precisión no exigida por la palabra.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrama. La decisión del POB es preservar el nombre propio divino en lugar de sustituirlo por un título. En español, «Yahvé» mantiene esa transparencia y es la forma preferida del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto español sigue el consenso del audit trail inglés: se mantiene la traducción del nombre divino como Yahvé, se conserva el término técnico «efod», y se traduce el verbo de movimiento con una opción natural en español que no borra su intensidad celebratoria. No hubo revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera coherente con la política del proyecto para יְהוָה.
  - «Efod» se mantiene como tecnicismo cultual en transliteración, no como paráfrasis.
  - La estructura narrativa repite «Y David...» como en el hebreo, para conservar el paralelismo del verso.
