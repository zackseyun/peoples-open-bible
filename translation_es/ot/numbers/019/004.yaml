review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: secuencia ritual instructiva, sujeto identificado como Eleazar el sacerdote, partitivo en «algo de su sangre», repetición deliberada de «su sangre», orientación espacial hacia la parte frontal de la tienda, y «siete veces». La nota alternativa sobre «delante de» preserva correctamente la opción menos precisa. La única desalineación relevante es léxica/estilística en «rociará», que en español puede sonar demasiado general para un rito cultual de sangre; «asperjará» refleja mejor el valor ritual de הִזָּה sin apartarse de la comprensión eclesial.'
  spanish_quality_summary: El texto es claro y natural, pero puede mejorarse en dignidad y precisión cultual. «Entonces Eleazar, el sacerdote» fluye bien. «Con su dedo» es aceptable. «Algo de su sangre» es inteligible, aunque algo más coloquial que «parte de su sangre»; no obstante, no exige cambio. El ajuste principal recomendado es «asperjará» en lugar de «rociará» para evitar una resonancia demasiado cotidiana y conservar mejor el registro ritual.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «La tienda de reunión» concuerda con la decisión auditada para אֹהֶל מוֹעֵד. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La revisión propuesta fortalece la coherencia cultual de הִזָּה mediante «asperjará».
  issues:
  - severity: medium
    issue: «rociará» es menos preciso que «asperjará» para הִזָּה en un contexto sacerdotal
    rationale: Aunque «rociar» puede comunicar la idea general de esparcir líquido, en español bíblico y litúrgico «asperjar» expresa mejor la acción ritual de esparcir sangre o agua de purificación. El hebreo נזה aquí pertenece al lenguaje cultual; la mejora es importante pero no doctrinalmente difícil.
  revised_spanish_text: Entonces Eleazar, el sacerdote, tomará con su dedo algo de su sangre y asperjará algo de su sangre siete veces hacia el frente de la tienda de reunión[a].
  revised_footnotes:
  - marker: a
    text: O «delante de la tienda de reunión». La frase hebrea indica orientación hacia el frente de la tienda.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «rociará» por «asperjará» para reflejar con mayor precisión y dignidad el verbo ritual hebreo הִזָּה en un contexto sacerdotal. Se mantienen las demás decisiones porque son fieles al hebreo, al rastro de auditoría inglés y a un español eclesial claro.
