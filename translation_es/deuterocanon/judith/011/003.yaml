lexical_decisions:
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  - y en este momento
  lexicon: LSJ
  rationale: Marca el giro inmediato del discurso. «Y ahora» suena natural en español y conserva la transición argumentativa sin añadir matiz temporal extra.
- source_word: λέγε μοι
  english_pob_choice: tell me
  chosen_spanish: dime
  alternatives_spanish:
  - háblame
  - dígame
  lexicon: LSJ
  rationale: La imperativa con dativo indirecto se expresa de forma idiomática como «dime»; mantiene la petición directa y la cercanía del habla.
- source_word: τίνος ἕνεκεν
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por qué razón
  - con qué motivo
  lexicon: LSJ
  rationale: La pregunta busca causa o motivo. «Por qué» reproduce bien la fuerza causal de la expresión griega en español natural.
- source_word: ἀπέδρας
  english_pob_choice: you fled
  chosen_spanish: huyiste
  alternatives_spanish:
  - escapaste
  - te alejaste huyendo
  lexicon: LSJ
  rationale: El aoristo expresa la acción de huir. «Huir» conserva el movimiento de alejamiento sin sobrecargar el verbo con matices no presentes.
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de parte de ellos
  - lejos de ellos
  lexicon: LSJ
  rationale: Indica separación respecto de su propio pueblo o grupo. «De ellos» es la correspondencia más directa y clara en español.
- source_word: ἦλθες πρὸς ἡμᾶς
  english_pob_choice: came to us
  chosen_spanish: viniste a nosotros
  alternatives_spanish:
  - llegaste a nosotros
  - te viniste hacia nosotros
  lexicon: LSJ
  rationale: El movimiento hacia el interlocutor se expresa con naturalidad por «viniste a nosotros». Conserva la direccionalidad sin calco rígido.
- source_word: ἥκεις
  english_pob_choice: you have come
  chosen_spanish: has venido
  alternatives_spanish:
  - has llegado
  - viniste
  lexicon: LSJ
  rationale: ἥκω enfatiza la llegada o el estado resultante de haber venido. «Has venido» preserva ese matiz resultativo mejor que un simple pretérito narrativo.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for deliverance
  chosen_spanish: para liberación
  alternatives_spanish:
  - para salvación
  - para rescate
  lexicon: LSJ
  rationale: El contexto narrativo permite una lectura de rescate o liberación más inmediata que una formulación doctrinal. «Liberación» conserva la amplitud de σωτηρία sin estrecharla indebidamente; se mantiene la alternativa teológica en nota.
theological_decisions:
- issue: Renderización de σωτηρία en un contexto narrativo no explícitamente doctrinal
  english_pob_reading: for deliverance
  chosen_spanish_reading: para liberación
  alternative_spanish_readings:
  - para salvación
  - para rescate
  rationale: Aquí el hablante parece interpretar la llegada de Judit como un movimiento hacia rescate o preservación. «Liberación» refleja σωτηρία de manera seria y suficientemente amplia, sin imponer una lectura soteriológica técnica donde el pasaje no la desarrolla.
  doctrine_reference: 'DOCTRINE.md: preserve lexical breadth of σωτηρία; avoid importing later doctrinal specificity absent from context'
translation_notes:
  revision_awareness: 'La traducción sigue el expediente inglés actualizado: la revisión reciente prefirió «deliverance» frente a «safety» para εἰς σωτηρίαν. En español se reflejó esa preferencia con «liberación», manteniendo la alternativa más literal («salvación») en nota para auditar la tensión léxica.'
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé» como norma del proyecto, pero este versículo no contiene nombres divinos.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en el texto.
  - Se eligió un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - La nota al pie conserva la alternativa semántica importante de σωτηρία para no borrar la ambigüedad de fondo.
