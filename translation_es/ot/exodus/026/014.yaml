translation:
  language: es
  text: Y harás para la tienda una cubierta de pieles de carneros teñidas de rojo, y una cubierta de pieles de tahás[a] por encima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa el término tahás, cuyo sentido exacto es incierto. Puede referirse a un animal concreto o a un cuero resistente; entre las propuestas están «cuero fino», «pieles de marsopa» o «pieles de dugongo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás tú
  - Y debes hacer
  lexicon: HALOT
  rationale: La forma verbal hebrea introduce una instrucción en secuencia; en español, «harás» conserva bien el valor directivo sin sonar artificial. Se mantiene el enlace con la oración anterior mediante «Y».
- source_word: מִכְסֶה
  english_pob_choice: a covering
  chosen_spanish: una cubierta
  alternatives_spanish:
  - una cobertura
  - un revestimiento
  lexicon: HALOT
  rationale: En el contexto de capas sobre la tienda, «cubierta» comunica una capa protectora de modo natural en español y mantiene la idea de un elemento colocado encima.
- source_word: לָאֹהֶל
  english_pob_choice: for the tent
  chosen_spanish: para la tienda
  alternatives_spanish:
  - para la tienda de reunión
  - para el tabernáculo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tienda»; por eso se conserva el sustantivo común en vez de sustituirlo por un término eclesiástico más interpretativo. «Para» refleja bien la función destinada de la cubierta.
- source_word: עֹרֹת אֵילִם מְאָדָּמִים
  english_pob_choice: rams’ skins dyed red
  chosen_spanish: pieles de carneros teñidas de rojo
  alternatives_spanish:
  - pieles de carneros rojas
  - pieles de carneros enrojecidas
  lexicon: HALOT
  rationale: La construcción hebrea combina «pieles de carneros» con un participio de אדם que indica coloración rojiza. «Teñidas de rojo» expresa con claridad el estado procesado de las pieles, siguiendo la decisión inglesa de no ocultar la idea de tratamiento del material.
- source_word: וּמִכְסֵה
  english_pob_choice: and a covering
  chosen_spanish: y una cubierta
  alternatives_spanish:
  - y otra cubierta
  - y un revestimiento
  lexicon: HALOT
  rationale: Se repite el sustantivo para reflejar la segunda capa sin añadir una interpretación como «otra» que no aparece explícitamente en el hebreo.
- source_word: עֹרֹת תְּחָשִׁים
  english_pob_choice: tahash skins
  chosen_spanish: pieles de tahás
  alternatives_spanish:
  - pieles de tejón
  - pieles de marsopa
  - pieles de dugongo
  - cuero fino
  lexicon: HALOT
  rationale: Se translitera el término incierto como «tahás» para preservar la ambigüedad léxica del original y evitar una identificación especulativa del animal o material.
- source_word: מִלְמָעְלָה
  english_pob_choice: above
  chosen_spanish: arriba
  alternatives_spanish:
  - por encima
  - desde arriba
  - encima
  lexicon: HALOT
  rationale: «Arriba» reproduce la indicación espacial de la capa superior de manera breve y fiel. Se evita añadir un demostrativo inexistente en el hebreo, en línea con la revisión inglesa que eliminó «that».
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del texto inglés: se mantuvo la transliteración de tahash/tahás por la incertidumbre del término y se evitó añadir un demostrativo equivalente a «that» después de «above/arriba», porque el hebreo solo dice «desde arriba/por encima».'
  spanish_consistency_notes:
  - Se conservó «tienda» para אֹהֶל conforme al primado del término hebreo, sin reemplazarlo por «tabernáculo» en el texto principal.
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se mantuvo la repetición de «cubierta» para reflejar las dos capas del hebreo.
  - El adjetivo de color se expresó como cualidad procesada («teñidas de rojo») para transparentar מְאָדָּמִים sin perder naturalidad en español.
