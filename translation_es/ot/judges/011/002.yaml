translation:
  language: es
  text: 'La esposa de Galaad le dio hijos varones. Y cuando los hijos varones de su esposa crecieron[a], expulsaron a Jefté y le dijeron: «No heredarás en la casa de nuestro padre, porque eres hijo de otra mujer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegaron a la madurez».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵשֶׁת גִּלְעָד
  english_pob_choice: Gilead’s wife
  chosen_spanish: la esposa de Gilead
  alternatives_spanish:
  - la mujer de Gilead
  - la esposa de Galaad
  lexicon: HALOT
  rationale: El hebreo usa una cadena constructa de posesión. «La esposa de Gilead» preserva esa relación de forma natural en español y evita interpretar más allá del texto.
- source_word: וַתֵּלֶד ... לוֹ בָּנִים
  english_pob_choice: bore him sons
  chosen_spanish: le dio a luz hijos
  alternatives_spanish:
  - le parió hijos
  - engendró hijos para él
  lexicon: HALOT
  rationale: La forma verbal indica que ella tuvo hijos para él. En español, «dar a luz» comunica bien el hecho del nacimiento sin perder el matiz relacional del objeto indirecto.
- source_word: בָּנִים / בְנֵי
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en este contexto el contraste narrativo recae en la filiación familiar. «Hijos» mantiene la naturalidad del español; el sentido masculino queda respaldado por «los hijos de su esposa» y por el contexto inmediato.
- source_word: וַיִּגְדְּלוּ
  english_pob_choice: grew up
  chosen_spanish: crecieron
  alternatives_spanish:
  - llegaron a ser adultos
  - maduraron
  lexicon: HALOT
  rationale: El verbo señala desarrollo hasta la madurez suficiente para actuar contra Jefté. «Crecieron» es fiel y natural; no se fuerza una especificación adulta que el hebreo no formula explícitamente.
- source_word: בְנֵי הָאִשָּׁה
  english_pob_choice: the sons of the wife
  chosen_spanish: los hijos de su esposa
  alternatives_spanish:
  - los hijos de la mujer
  - sus hijos
  lexicon: HALOT
  rationale: La expresión hebrea marca contraste con la otra madre de Jefté. «Su esposa» en español aclara la referencia a Gilead y conserva el efecto de exclusión familiar.
- source_word: וַיְגָרְשׁוּ
  english_pob_choice: drove ... out
  chosen_spanish: expulsaron
  alternatives_spanish:
  - echaban fuera
  - arrojaron
  lexicon: HALOT
  rationale: גרש expresa expulsión. «Expulsaron» mantiene la fuerza semántica en español y evita una atenuación demasiado general como «sacaron».
- source_word: לֹא תִנְחַל
  english_pob_choice: You will not inherit
  chosen_spanish: No heredarás
  alternatives_spanish:
  - No recibirás herencia
  - No tendrás herencia
  lexicon: HALOT
  rationale: El verbo נחל aquí conserva la idea de entrar en la porción hereditaria. En español, la forma verbal «heredarás» reproduce mejor el contraste directo del discurso que una perífrasis más explicativa.
- source_word: בְּבֵית אָבִינוּ
  english_pob_choice: in our father’s house
  chosen_spanish: en la casa de nuestro padre
  alternatives_spanish:
  - en la casa de nuestro padre común
  - en el hogar de nuestro padre
  lexicon: HALOT
  rationale: La imagen hebrea de casa/familia/linaje se preserva literalmente. «Nuestro padre» conserva el reclamo de pertenencia compartida que los hermanos usan para excluir a Jefté.
- source_word: בֶּן אִשָּׁה אַחֶרֶת
  english_pob_choice: the son of another woman
  chosen_spanish: hijo de otra mujer
  alternatives_spanish:
  - hijo de una mujer distinta
  - hijo de otra esposa
  lexicon: HALOT
  rationale: El hebreo dice «otra mujer», no «otra esposa». La traducción española conserva esa formulación, que resalta el tono despectivo y no añade un dato marital que el texto no da.
theological_decisions:
- issue: Exclusión hereditaria y filiación social
  english_pob_reading: You will not inherit in our father’s house, for you are the son of another woman.
  chosen_spanish_reading: No heredarás en la casa de nuestro padre, porque eres hijo de otra mujer.
  alternative_spanish_readings:
  - No tendrás herencia en la casa de nuestro padre
  - No recibirás herencia en la casa de nuestro padre
  rationale: El punto teológico-narrativo no es solo económico, sino la exclusión de Jefté de la casa/linaje familiar. «Heredarás» mantiene la fuerza legal y familiar del hebreo, sin suavizar la descalificación hecha por los hermanos.
  doctrine_reference: Herencia/linaje familiar en el contexto narrativo del Antiguo Testamento; cf. tema bíblico de la herencia familiar (sin cita doctrinal específica)
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB, que ajustó la referencia familiar a 'his wife' y prefirió una traducción verbal más directa de נחל. En español se mantuvo la misma claridad referencial con 'su esposa' y se tradujo con un verbo simple y directo ('heredarás') que conserva la fuerza legal del discurso.
  spanish_consistency_notes:
  - Se mantuvo «Jefté» para el nombre propio, conforme al uso español estándar.
  - Se evitó «SEÑOR» o sustituciones reverenciales, ya que este versículo no contiene el Tetragrámaton ni un título divino.
  - Se conservó «otra mujer» para no introducir la idea de 'otra esposa', que el hebreo no explicita.
  - La nota al pie marca una alternativa de sentido sobre וַיִּגְדְּלוּ sin alterar el texto principal.
