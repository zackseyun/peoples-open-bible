  - severity: low
    issue: '''he puesto delante de ustedes'' suena algo rígido'
    rationale: Aunque es fiel, 'he puesto ante ustedes' expresa el mismo sentido idiomático de לִפְנֵיכֶם con mejor fluidez en español bíblico contemporáneo.
