base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/025.yaml
  text: 'So know and understand: from the issuing of the word to restore and rebuild Jerusalem until an anointed one[a], a prince, there will be seven weeks, and for sixty-two weeks it will be restored and rebuilt, with plaza and moat[c][b], but in troubled times.'
  footnotes:
  - marker: a
    text: Or 'until Messiah, a ruler' or 'until Messiah the Prince.' The Hebrew reads 'anointed one, ruler/prince.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'seven weeks' may also be rendered 'seven sevens.' Likewise 'sixty-two weeks' may be rendered 'sixty-two sevens.'
    reason: lexical_alternative
  - marker: c
    text: Or 'square and trench.' The Hebrew term rendered 'moat' is uncertain and may denote a trench or defensive ditch.
    reason: lexical_alternative
