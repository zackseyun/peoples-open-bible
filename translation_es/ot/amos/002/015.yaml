translation:
  language: es
  text: Y el que empuña el arco[a] no se mantendrá en pie[b], el veloz de pies no escapará, y el que monta el caballo[c] no salvará su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Empuña el arco» conserva la imagen hebrea del participio «el que toma/agarrra el arco»; también puede entenderse como «el arquero».
    reason: lexical_alternative
  - marker: b
    text: 'O: «no resistirá» / «no quedará firme».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el jinete no salvará su vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹפֵשׂ הַקֶּשֶׁת
  english_pob_choice: the one who grasps the bow
  chosen_spanish: el que empuña el arco
  alternatives_spanish:
  - el arquero
  - el que toma el arco
  - el que maneja el arco
  lexicon: HALOT
  rationale: El hebreo presenta un participio concreto, «el que toma/empuña el arco». «Empuña» conserva la acción manual y la imagen sin sobredeterminar oficio; «arquero» es posible, pero hace más explícito de lo que el hebreo dice.
- source_word: לֹא יַעֲמֹד
  english_pob_choice: will not stand
  chosen_spanish: no se mantendrá firme
  alternatives_spanish:
  - no se mantendrá en pie
  - no resistirá
  - no quedará firme
  lexicon: HALOT
  rationale: En el contexto bélico, עמד expresa permanecer de pie o sostener la posición. «No se mantendrá firme» preserva la imagen de firmeza/posición y su fuerza contextual, sin perder naturalidad en español.
- source_word: קַל בְּרַגְלָיו
  english_pob_choice: the swift of foot
  chosen_spanish: el veloz de pies
  alternatives_spanish:
  - el rápido de pies
  - el que es veloz de pies
  - el veloz en sus pies
  lexicon: HALOT
  rationale: La expresión hebrea es concisa y adjetival. «El veloz de pies» mantiene la brevedad y el paralelismo, aunque suene algo más literal; es preferible a una paráfrasis más libre.
- source_word: יְמַלֵּט
  english_pob_choice: will not escape
  chosen_spanish: no escapará
  alternatives_spanish:
  - no se librará
  - no logrará escapar
  - no podrá huir
  lexicon: HALOT
  rationale: En este contexto de juicio y batalla, el verbo implica librarse del peligro. «No escapará» es la equivalencia más directa y clara en español, conservando el contraste de la cláusula.
- source_word: רֹכֵב הַסּוּס
  english_pob_choice: the rider of the horse
  chosen_spanish: el que monta el caballo
  alternatives_spanish:
  - el jinete del caballo
  - el jinete
  - el montador del caballo
  lexicon: HALOT
  rationale: El hebreo es singular y explícito, «el que monta el caballo». Se evita «jinete» para no introducir un equivalente más idiomático que puede sonar menos cercano al texto base, aunque sigue siendo una alternativa válida.
- source_word: יְמַלֵּט נַפְשׁוֹ
  english_pob_choice: will not save his life
  chosen_spanish: no salvará su vida
  alternatives_spanish:
  - no salvará su alma
  - no librará su vida
  - no escapará con vida
  lexicon: HALOT
  rationale: נפשׁ aquí se refiere a la vida de la persona. «Su vida» es la forma más natural y fiel en español para este uso; «alma» sería demasiado cargado teológicamente y menos exacto en este contexto.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con la línea auditada en inglés: mantener la imagen del arco, la imposibilidad de sostenerse, la rapidez de pies y la incapacidad de salvar la propia vida. No se requieren revisiones textuales respecto del expediente auditado.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin recurrir a «SEÑOR» ni a fórmulas eclesiásticas ajenas al hebreo.
  - 'Se preserva la tensión entre literalidad e idiomaticidad: «empuña», «se mantendrá firme» y «salvará su vida» buscan ser transparentes sin sonar mecánicos.'
  - «Vida» traduce נֶפֶשׁ en su valor contextual, evitando «alma» salvo como alternativa anotada.
  - El paralelismo de tres miembros se conserva en español con estructura coordinada y ritmo similar al hebreo.
