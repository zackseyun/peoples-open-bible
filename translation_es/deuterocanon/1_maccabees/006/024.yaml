translation:
  language: es
  text: y a seguir sus mandamientos[a], porque los de nuestro pueblo se estaban alejando de nosotros por esto, excepto los que se hallaban entre nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego está sintácticamente comprimido en la cláusula final; «excepto los que se hallaban entre nosotros» sigue de cerca la redacción, aunque también puede entenderse el matiz de afiliación como «excepto los que estaban de nuestro lado».
    reason: alternative_reading
lexical_decisions:
- source_word: κατακολουθεῖν
  english_pob_choice: to follow
  chosen_spanish: seguir
  alternatives_spanish:
  - obedecer
  - ir tras
  lexicon: LSJ
  rationale: En español, «seguir» comunica bien la idea de acatar una dirección o norma sin añadir matices no presentes en el griego. Mantiene la relación natural con el infinitivo y con el objeto «sus mandamientos».
- source_word: προστάγμασιν
  english_pob_choice: commands
  chosen_spanish: mandamientos
  alternatives_spanish:
  - órdenes
  - preceptos
  lexicon: LSJ
  rationale: Aunque el inglés opta por «commands», en español «mandamientos» resulta más preciso y natural para directrices autoritativas de este tipo, y conserva un tono normativo fuerte sin sonar excesivamente militar o administrativo. «Órdenes» también sería posible, pero menos acorde al registro bíblico español.
- source_word: οἱ τοῦ λαοῦ ἡμῶν
  english_pob_choice: those of our people
  chosen_spanish: los de nuestro pueblo
  alternatives_spanish:
  - nuestro pueblo
  - los hombres de nuestro pueblo
  lexicon: LSJ
  rationale: La construcción griega es elíptica; «los de nuestro pueblo» reproduce esa elipsis en español de manera fluida. Evita añadir «hombres», que no está en el texto, y mantiene la referencia colectiva.
- source_word: χάριν τούτου
  english_pob_choice: on account of this
  chosen_spanish: por esto
  alternatives_spanish:
  - a causa de esto
  - por esta razón
  lexicon: LSJ
  rationale: La frase expresa causa o motivo. «Por esto» es breve y natural en español, y conserva la relación causal sin sobredesarrollarla.
- source_word: ἠλλοτριοῦντο
  english_pob_choice: were becoming alienated
  chosen_spanish: se estaban alejando
  alternatives_spanish:
  - se estaban alienando
  - se estaban apartando
  lexicon: LSJ
  rationale: El imperfecto indica proceso continuo. «Se estaban alejando» preserva ese movimiento de separación social/política de manera comprensible en español; «alienando» suena más técnico y menos natural aquí.
- source_word: ἀφʼ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de nuestra parte
  - a partir de nosotros
  lexicon: LSJ
  rationale: «De nosotros» es la correspondencia directa y idiomática de separación con ἀπό. En este contexto, conserva el contraste relacional sin recargar la frase.
- source_word: πλὴν ὅσοι εὑρίσκοντο ἀφʼ ἡμῶν
  english_pob_choice: except those who were found among us
  chosen_spanish: excepto los que se hallaban entre nosotros
  alternatives_spanish:
  - excepto los que eran hallados entre nosotros
  - salvo los que estaban entre nosotros
  lexicon: LSJ
  rationale: El griego es comprimido y permite entender una pertenencia o localización. «Se hallaban entre nosotros» es una forma natural que conserva la excepción sin decidir demasiado entre ubicación física y afiliación, acorde con la nota del POB en inglés.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó una frase más pesada por una formulación más natural en la cláusula de excepción; el español sigue esa misma intención, pero conserva la ambigüedad del griego al usar «se hallaban entre nosotros» sin precisar más de lo que el texto exige.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton ni κύριος divino.
  - Se prefirió «mandamientos» sobre «órdenes» para conservar un registro bíblico claro y la fuerza normativa del término griego.
  - 'La cláusula final conserva la ambigüedad del original: puede leerse como localización («entre nosotros») o como afiliación implícita, por eso lleva nota.'
  - «Se estaban alejando» traduce el proceso imperfectivo de ἠλλοτριοῦντο sin convertirlo en una acción puntual.
