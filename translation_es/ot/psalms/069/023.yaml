translation:
  language: es
  text: Que su mesa delante de ellos se convierta en trampa, y para su bienestar[a] en lazo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ofrendas de paz»; el hebreo שְׁלוֹמִים puede entenderse aquí de manera más abstracta, aunque «ofrendas de paz» preserva el probable eco sacrificial.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... become
  chosen_spanish: Que ... se convierta
  alternatives_spanish:
  - Que ... sea
  - Ojalá ... se convierta
  lexicon: HALOT
  rationale: El jussivo expresa un deseo o imprecación. En español, «que ... se convierta» mantiene ese valor volitivo con una formulación natural y digna, sin perder el matiz de transformación implícito en el contexto.
- source_word: שֻׁלְחָנָם
  english_pob_choice: their table
  chosen_spanish: su mesa
  alternatives_spanish:
  - su mesa de comida
  - su mesa de banquete
  lexicon: HALOT
  rationale: שֻׁלְחָן es literalmente «mesa». En el contexto poético, puede sugerir provisión o banquete, pero conviene conservar la imagen concreta en el texto principal.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - frente a ellos
  - ante ellos
  lexicon: HALOT
  rationale: La expresión espacial se puede verter de forma directa en español. «Delante de ellos» conserva la ironía de que lo que está expuesto y visible llega a ser peligroso.
- source_word: לְפָח
  english_pob_choice: a trap
  chosen_spanish: trampa
  alternatives_spanish:
  - lazo
  - red
  lexicon: HALOT
  rationale: פח designa un artefacto de captura; «trampa» transmite bien el sentido y permite distinguirlo de מוֹקֵשׁ, que se rinde en el segundo hemistiquio con un término diferente.
- source_word: וְלִשְׁלוֹמִים
  english_pob_choice: for their well-being
  chosen_spanish: para su bienestar
  alternatives_spanish:
  - para su paz
  - para sus ofrendas de paz
  - para su prosperidad
  lexicon: HALOT
  rationale: שְׁלוֹמִים es semánticamente difícil. En este contexto puede entenderse de manera abstracta como «bienestar», tal como el audit trail inglés conserva la lectura no cultual. Se mantiene la ambigüedad y el posible eco sacrificial sin imponerlo en el texto principal.
- source_word: לְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: lazo
  alternatives_spanish:
  - trampa
  - presa
  lexicon: HALOT
  rationale: מוֹקֵשׁ suele significar «lazo» o «snare». Elegir «lazo» diferencia este término de פח y conserva el paralelismo poético con una variación léxica perceptible en español.
theological_decisions:
- issue: Valor de שְׁלוֹמִים en un contexto imprecatorio
  english_pob_reading: The English audit trail keeps the main text abstract as 'for their well-being' while noting the possible cultic sense of 'peace offerings'.
  chosen_spanish_reading: para su bienestar
  alternative_spanish_readings:
  - sus ofrendas de paz
  - para su paz
  - sus ofrendas de bienestar
  rationale: La evidencia del hebreo permite una lectura abstracta, y el expediente inglés revisado privilegia esa opción en el texto principal. En español, «bienestar» preserva la amplitud semántica sin cerrar la puerta al posible trasfondo sacrificial, que queda disponible para nota si se desea desarrollar.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del expediente inglés, que sustituyó «their peace offerings» por «for their well-being» para reflejar con mayor precisión לִשְׁלוֹמִים en este contexto, manteniendo la estructura imprecatoria y el paralelismo formal.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo poético con dos miembros: mesa/trampa y bienestar/lazo.'
  - Se usa «trampa» para פח y «lazo» para מוֹקֵשׁ, manteniendo distinción léxica.
  - «Bienestar» refleja la lectura abstracta aprobada por la revisión inglesa, sin borrar la posible resonancia cultual.
  - La puntuación y el orden siguen una cadencia poética natural en español, sin añadir elementos interpretativos ajenos al hebreo.
