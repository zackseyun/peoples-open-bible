translation:
  language: es
  text: Porque todos nuestros días pasan en tu ira; acabamos nuestros años como un suspiro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un murmullo» o «como un gemido». El término hebreo designa un sonido bajo; «un suspiro» se elige en el texto principal para resaltar, en el contexto, el carácter fugaz de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque así
  lexicon: HALOT
  rationale: La partícula introduce la razón o explicación del lamento anterior. «Porque» mantiene con naturalidad en español la función conectiva de la poesía hebrea sin añadir énfasis innecesario.
- source_word: כָל יָמֵינוּ
  english_pob_choice: all our days
  chosen_spanish: todos nuestros días
  alternatives_spanish:
  - todos los días de nuestra vida
  - toda nuestra vida
  lexicon: HALOT
  rationale: Conserva el plural concreto del hebreo y el paralelismo poético con «nuestros años». La opción singularizaría demasiado el referente.
- source_word: פָּנוּ
  english_pob_choice: pass away
  chosen_spanish: pasan
  alternatives_spanish:
  - se van
  - desaparecen
  - se desvanecen
  lexicon: HALOT
  rationale: En este contexto verbal, el sentido es que los días transcurren o se van. «Pasan» es breve, idiomático y no fuerza una interpretación de aniquilación.
- source_word: בְעֶבְרָתֶךָ
  english_pob_choice: in your wrath
  chosen_spanish: en tu furor
  alternatives_spanish:
  - en tu ira
  - bajo tu furor
  - en tu enojo
  lexicon: HALOT
  rationale: עֶבְרָה expresa ira desbordada o furor. «Furor» preserva mejor la intensidad que un término más suave. Se mantiene la preposición «en» para reflejar la esfera o circunstancia indicada por ב.
- source_word: כִּלִּינוּ
  english_pob_choice: we finish
  chosen_spanish: consumimos
  alternatives_spanish:
  - acabamos
  - terminamos
  - nos agotamos
  lexicon: HALOT
  rationale: El verbo piel de כלה puede expresar llevar a su fin o agotar. «Consumimos» recoge bien la idea de gastar o llevar hasta el fin nuestros años, y sostiene la cadencia poética del verso.
- source_word: שָׁנֵינוּ
  english_pob_choice: our years
  chosen_spanish: nuestros años
  alternatives_spanish:
  - los años nuestros
  - nuestra vida
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con sufijo, preservando el plural y el paralelismo con «días».
- source_word: כְמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: HALOT
  rationale: Partícula comparativa simple; «como» es el equivalente español más natural y fiel.
- source_word: הֶגֶה
  english_pob_choice: a sigh
  chosen_spanish: un suspiro
  alternatives_spanish:
  - un murmullo
  - un gemido
  - un lamento
  lexicon: HALOT
  rationale: El término hebreo puede designar un sonido bajo, como murmullo, gemido o suspiro. En este contexto de fugacidad de la vida, «suspiro» transmite la brevedad y la cualidad casi exhalada de la imagen, manteniendo la decisión de la POB inglesa de preferir una forma idiomática y sensible al contexto.
theological_decisions:
- issue: Lenguaje de la ira divina
  english_pob_reading: your wrath
  chosen_spanish_reading: tu furor
  alternative_spanish_readings:
  - tu ira
  - tu enojo
  - tu cólera
  rationale: El texto atribuye explícitamente el transcurso de la vida humana al furor divino. «Furor» conserva la fuerza teológica del hebreo עֶבְרָה y evita suavizar la afirmación; no se introduce una atenuación doctrinal ajena al verso.
  doctrine_reference: Principio de primacía del idioma original y preservación de la tensión teológica del texto poético.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo directamente y coincide sustancialmente con la solución auditada en inglés; no se requieren revisiones textuales adicionales. La única nota conserva la alternativa semántica documentada para הֶגֶה.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «días» y «años» para reflejar la poesía hebrea.
  - «Furor» se usó de manera consistente para עֶבְרָה en este verso, sin sustituirlo por un término más débil.
  - «Suspiro» funciona como equivalente idiomático de הֶגֶה en este contexto, mientras la nota preserva las alternativas léxicas.
  - Se evitó «SEÑOR» y otras máscaras, pues no aparece el Tetragrámaton en este versículo.
