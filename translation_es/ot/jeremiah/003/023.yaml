    rationale: La nota [a] da una alternativa para «el tumulto de los montes», pero en el borrador está anclada a «Ciertamente». El marcador debe aparecer junto a la frase a la que realmente comenta.
  revised_spanish_text: Ciertamente, de los collados proviene solo falsedad, el tumulto de los montes[a]; ciertamente en Yahvé nuestro Dios está la salvación de Israel.
