id: COL.1.12
reference: Colossians 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εὐχαριστοῦντες τῷ πατρὶ τῷ ἱκανώσαντι ⸀ὑμᾶς εἰς τὴν μερίδα τοῦ κλήρου τῶν ἁγίων ἐν τῷ φωτί,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/012.yaml
  text: giving thanks to the Father, who has qualified you for the share of the inheritance of the saints in the light,
translation:
  language: ko
  text: 빛 가운데 있는 성도의 기업[b]의 몫에 여러분[a]을 합당하게 하신 아버지께 감사드리며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「우리」로 읽는다.
    reason: textual_variant
  - marker: b
    text: 또는 「상속분」, 「유업」. 헬라어 κλῆρος는 분배된 몫·유업의 이미지를 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστοῦντες
  english_pob_choice: giving thanks
  chosen_korean: 감사드리며
  alternatives_korean:
  - 감사하면서
  - 감사하는 가운데
  lexicon: BDAG
  rationale: 현재 분사로 앞 절들과의 흐름을 잇는다. 합쇼체에서 「감사드리며」가 자연스럽다.
- source_word: τῷ πατρὶ
  english_pob_choice: to the Father
  chosen_korean: 아버지께
  alternatives_korean:
  - 하나님 아버지께
  lexicon: BDAG
  rationale: 헬라어는 「아버지」만 명시하므로, 「하나님」을 추가하지 않고 「아버지께」로 옮긴다.
- source_word: ἱκανώσαντι
  english_pob_choice: who has qualified
  chosen_korean: 합당하게 하신
  alternatives_korean:
  - 자격을 주신
  - 능히 ~할 수 있게 하신
  lexicon: BDAG
  rationale: ἱκανόω의 「합당·자격있게 만듦」을 「합당하게 하신」으로 옮긴다.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_korean: 여러분
  alternatives_korean:
  - 우리
  lexicon: SBLGNT
  rationale: SBLGNT는 ὑμᾶς(여러분)로 읽는다. ἡμᾶς(우리) 이독은 각주로 보존.
- source_word: εἰς τὴν μερίδα τοῦ κλήρου
  english_pob_choice: for the share of the inheritance
  chosen_korean: 기업의 몫에
  alternatives_korean:
  - 유업의 분깃에
  - 상속분의 몫에
  lexicon: BDAG
  rationale: μερίς(몫) + κλῆρος(기업)를 「기업의 몫」으로 옮긴다. 「기업」은 한국 교회의 정립된 표현으로 OT의 분배된 유업 배경을 잘 담는다.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_korean: 성도의
  alternatives_korean:
  - 거룩한 자들의
  lexicon: BDAG
  rationale: 한국 교회의 정립된 「성도」를 사용한다.
- source_word: ἐν τῷ φωτί
  english_pob_choice: in the light
  chosen_korean: 빛 가운데 있는
  alternatives_korean:
  - 빛 안에 있는
  lexicon: BDAG
  rationale: 빛은 성도들의 기업의 영역·특성을 가리킨다. 「빛 가운데 있는」으로 자연스럽게 표현한다.
