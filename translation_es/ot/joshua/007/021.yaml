translation:
  language: es
  text: Y vi entre el botín un manto hermoso[a] de Sinar, doscientos siclos de plata y una barra[b] de oro que pesaba cincuenta siclos. Los codicié y los tomé; y he aquí, están escondidos en la tierra, dentro de mi tienda[c], y la plata debajo de ella[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "una ropa fina de Sinar". El hebreo אַדֶּרֶת puede referirse a un manto, capa o prenda exterior espléndida.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente "una lengua de oro"; probablemente se refiere a una pieza de oro con esa forma, por eso aquí se traduce "barra de oro". Otras versiones tradicionales dicen "cuña de oro".
    reason: lexical_alternative
  - marker: c
    text: El hebreo puede expresarse como "dentro de mi tienda" o "en medio de mi tienda"; aquí se usa una forma natural y directa en español.
    reason: lexical_alternative
  - marker: d
    text: El pronombre final en hebreo es femenino singular y probablemente se refiere al manto; por eso aquí se traduce "debajo de ella".
    reason: lexical_alternative
lexical_decisions:
- source_word: בַשָּׁלָל
  english_pob_choice: among the spoil
  chosen_spanish: entre el botín
  alternatives_spanish:
  - en el botín
  - entre el despojo
  lexicon: HALOT
  rationale: בַשָּׁלָל señala el botín de guerra; en español, “entre el botín” conserva la relación locativa sin volver la frase rígida. “Despojo” es posible, pero menos natural en este contexto narrativo.
- source_word: אַדֶּרֶת שִׁנְעָר אַחַת טוֹבָה
  english_pob_choice: one beautiful cloak from Shinar
  chosen_spanish: un manto hermoso de Sinar
  alternatives_spanish:
  - un manto fino de Sinar
  - una capa hermosa de Sinar
  - una ropa hermosa de Sinar
  lexicon: HALOT
  rationale: אַדֶּרֶת puede ser un manto, capa o prenda exterior espléndida. “Manto” funciona bien en español bíblico moderno y evita estrechar demasiado el campo semántico. Se conserva Sinar como nombre propio con procedencia implícita por “de Sinar”. “Hermoso” refleja la evaluación de calidad/atractivo de טוֹבָה.
- source_word: וּמָאתַיִם שְׁקָלִים כֶּסֶף
  english_pob_choice: two hundred shekels of silver
  chosen_spanish: doscientos siclos de plata
  alternatives_spanish:
  - doscientos siclos de plata
  - doscientos pesos de plata
  lexicon: HALOT
  rationale: Se mantiene la unidad antigua “siclos” para respetar la medida hebrea; “plata” conserva el material como sustantivo de peso/valor.
- source_word: וּלְשׁוֹן זָהָב אֶחָד
  english_pob_choice: one bar of gold
  chosen_spanish: una barra de oro
  alternatives_spanish:
  - una lengua de oro
  - una pieza de oro con forma de lengua
  - un lingote de oro
  lexicon: HALOT
  rationale: La imagen literal es “lengua de oro”, pero el sentido del objeto es una pieza alargada de oro. “Barra” comunica el referente de manera clara y auditable, sin perder la tensión entre imagen literal y objeto funcional.
- source_word: חֲמִשִּׁים שְׁקָלִים מִשְׁקָלוֹ
  english_pob_choice: weighing fifty shekels
  chosen_spanish: de un peso de cincuenta siclos
  alternatives_spanish:
  - que pesaba cincuenta siclos
  - de peso cincuenta siclos
  lexicon: HALOT
  rationale: La construcción hebrea especifica el peso del objeto; “de un peso de cincuenta siclos” mantiene esa relación apposicional en español. Se evita sobrecargar con una perífrasis más dura, pero se conserva la medida.
- source_word: וָאֶחְמְדֵם
  english_pob_choice: I coveted them
  chosen_spanish: los codicié
  alternatives_spanish:
  - los deseé
  - los anhelé
  - los apetecí
  lexicon: HALOT
  rationale: חמד en este contexto expresa deseo culpable y se ajusta bien a “codiciar”, que en español conserva la fuerza moral del acto sin hacerlo meramente neutro.
- source_word: וָאֶקָּחֵם
  english_pob_choice: and took them
  chosen_spanish: y los tomé
  alternatives_spanish:
  - y los llevé
  - y los agarré
  lexicon: HALOT
  rationale: לקח es el verbo común “tomar”; se conserva la sencillez del hebreo y la secuencia confesional del versículo.
- source_word: וְהִנָּם
  english_pob_choice: and look, they are
  chosen_spanish: y he aquí, están
  alternatives_spanish:
  - y mira, están
  - y he aquí que están
  - y allí están
  lexicon: HALOT
  rationale: La partícula deíctica pide una forma que llame la atención. “He aquí” es sobria, bíblica y adecuada al registro narrativo.
- source_word: טְמוּנִים
  english_pob_choice: hidden
  chosen_spanish: escondidos
  alternatives_spanish:
  - ocultos
  - enterrados
  lexicon: HALOT
  rationale: El participio pasivo indica estado de ocultamiento; “escondidos” es natural en español. “Enterrados” sería demasiado específico antes de que el texto complete la localización.
- source_word: בָּאָרֶץ
  english_pob_choice: in the ground
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el suelo
  - en la tierra del suelo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere al suelo o tierra dentro de la tienda. “En la tierra” conserva la imagen más literal que “en el suelo” y se enlaza bien con “dentro de mi tienda”.
- source_word: בְּתוֹךְ הָאֳהֳלִי
  english_pob_choice: inside my tent
  chosen_spanish: dentro de mi tienda
  alternatives_spanish:
  - dentro de mi carpa
  - en medio de mi tienda
  - dentro de mi tienda de campaña
  lexicon: HALOT
  rationale: “Tienda” es el equivalente bíblico más natural en español; evita el tecnicismo moderno y mantiene el espacio narrativo.
- source_word: וְהַכֶּסֶף תַּחְתֶּיהָ
  english_pob_choice: with the silver underneath it
  chosen_spanish: y la plata debajo de él
  alternatives_spanish:
  - y la plata debajo de ella
  - y la plata debajo de eso
  lexicon: HALOT
  rationale: 'Se preserva la tensión del sufijo femenino singular: el antecedente más probable es el manto. En español, “debajo de él” mantiene la referencia singular masculina gramaticalmente cercana al “manto”, aunque la forma hebrea introduce una discordancia intencional con el antecedente probable; por eso se nota en pie.'
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y no introdujo cambios sustantivos; se mantiene la lectura auditada del inglés POB, pero se ajusta el español para conservar la imagen literal de לְשׁוֹן זָהָב como “barra de oro” y para reflejar con más naturalidad la secuencia narrativa en español.
  spanish_consistency_notes:
  - Se conserva “Yahvé” como terminología de fondo del proyecto, pero este versículo no lo contiene.
  - 'Se mantiene el patrón confesional en primera persona, con verbos simples y paralelos: vi / codicié / tomé.'
  - Se preserva la medida antigua “siclos” por coherencia con el texto fuente.
  - El marcador [a] se coloca en la prenda para señalar la alternativa léxica principal; los marcadores [b] y [c] explican ambigüedad del sintagma locativo y del pronombre final.
