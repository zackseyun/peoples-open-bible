    text: Jesus said, “The kingdom of the Father is like a woman carrying a jar filled
      with meal. As she was walking on the road, while she was still far away, the
      jar’s handle broke and the meal spilled out behind her along the road. She did
      not know it; she had not noticed the trouble. When she reached her house, she
