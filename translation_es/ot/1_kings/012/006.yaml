  to: 'Entonces el rey Roboam consultó a los ancianos que habían estado ante Salomón, su padre,[a] mientras Salomón aún vivía, diciendo: «¿Cómo me aconsejan responder a este pueblo[b]?».'
  rationale: La revisión corrige el anclaje de la nota sobre el modismo «estar ante» Salomón, aclara el referente temporal («mientras Salomón aún vivía») y mejora la naturalidad de la pregunta con «me aconsejan», en línea con la decisión auditada del POB inglés de hacer explícito el objeto implícito. No hay cambio sustancial de sentido.
