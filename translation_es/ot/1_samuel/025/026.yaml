  to: 'Ahora, mi señor, vive Yahvé y vive tu alma: puesto que Yahvé te ha impedido incurrir en culpa de sangre y vengarte con tu propia mano[a], ahora sean como Nabal[b] tus enemigos y los que buscan mal contra mi señor.'
  rationale: Se reemplaza 'de caer en sangre' por 'incurrir en culpa de sangre' para reflejar con precisión la fuerza moral-legal de מִבּוֹא בְדָמִים. Se corrige la nota [a] para que preserve una alternativa léxica real ('salvarte con tu propia mano'), en línea con el audit trail. También se ajusta ligeramente la puntuación y el orden final para mayor naturalidad en español sin alterar el sentido.
