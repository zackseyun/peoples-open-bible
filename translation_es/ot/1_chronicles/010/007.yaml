translation:
  language: es
  text: Cuando todos los hombres de Israel que estaban en el valle vieron que habían huido y que Saúl y sus hijos estaban muertos[a], abandonaron sus ciudades y huyeron[c][b]; entonces los filisteos vinieron y habitaron en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llanura» para «valle».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «todos los hombres de Israel», con lenguaje masculino y no un término neutral.
    reason: lexical_alternative
  - marker: c
    text: O «se establecieron en ellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - vieron
  - advirtieron
  lexicon: HALOT
  rationale: ראה expresa percepción visual directa. «Vieron» conserva la concreción narrativa; «advirtieron» sería más interpretativo y menos inmediato.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todos los hombres de Israel
  alternatives_spanish:
  - todo Israel
  - todos los varones de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es explícitamente masculina y distributiva. «Hombres» preserva esa fuerza; no se neutraliza a «personas» para no borrar el matiz documentado.
- source_word: אֲשֶׁר בָּעֵמֶק
  english_pob_choice: who were in the valley
  chosen_spanish: que estaban en el valle
  alternatives_spanish:
  - que estaban en la llanura
  - que se hallaban en el valle
  lexicon: HALOT
  rationale: עֵמֶק suele referirse a un valle. «Estaban en el valle» es natural en español y mantiene la referencia topográfica sin sobrerinterpretar.
- source_word: כִּי נָסוּ
  english_pob_choice: that they had fled
  chosen_spanish: que habían huido
  alternatives_spanish:
  - que huyeron
  - que Israel había huido
  lexicon: HALOT
  rationale: נוס denota huida. El pluscuamperfecto español refleja bien que la retirada ya era un hecho observado; el sujeto queda implícito como en hebreo.
- source_word: וְכִי מֵתוּ שָׁאוּל וּבָנָיו
  english_pob_choice: and that Saul and his sons were dead
  chosen_spanish: y que Saúl y sus hijos estaban muertos
  alternatives_spanish:
  - y que Saúl y sus hijos habían muerto
  lexicon: HALOT
  rationale: La construcción resultativa hebrea se rinde con naturalidad por «estaban muertos», que transmite el estado constatado en el campo de batalla; «habían muerto» también es posible, pero menos directo al hecho observado.
- source_word: וַיַּעַזְבוּ עָרֵיהֶם
  english_pob_choice: they abandoned their cities
  chosen_spanish: abandonaron sus ciudades
  alternatives_spanish:
  - dejaron sus ciudades
  - forsook their towns
  lexicon: HALOT
  rationale: עזב implica dejar atrás, con fuerza contextual de evacuación forzada. «Abandonaron» reproduce mejor esa carga que un simple «dejaron».
- source_word: וַיָּנֻסוּ
  english_pob_choice: and fled
  chosen_spanish: y huyeron
  alternatives_spanish:
  - y escaparon
  - y salieron huyendo
  lexicon: HALOT
  rationale: נוס es el verbo estándar de huir. «Huyeron» es la correspondencia más directa y formal en español bíblico moderno.
- source_word: וַיָּבֹאוּ פְלִשְׁתִּים
  english_pob_choice: then the Philistines came
  chosen_spanish: entonces los filisteos vinieron
  alternatives_spanish:
  - y los filisteos vinieron
  - entonces vinieron los filisteos
  lexicon: HALOT
  rationale: El waw consecutivo marca avance secuencial. «Entonces» explicita esa progresión sin añadir contenido; «vinieron» mantiene el movimiento narrativo.
- source_word: וַיֵּשְׁבוּ בָּהֶם
  english_pob_choice: and lived in them
  chosen_spanish: y habitaron en ellas
  alternatives_spanish:
  - y se establecieron en ellas
  - y vivieron en ellas
  lexicon: HALOT
  rationale: ישב puede significar morar, habitar o asentarse. «Habitaron» conserva un registro bíblico claro y evita la ambigüedad de «vivieron», que en español puede sonar demasiado general.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo (WLC) y es plenamente compatible con el flujo narrativo del audit trail inglés. Se preserva la secuencia observada: ver la huida y la muerte, abandonar las ciudades, huir de nuevo, y la ocupación filistea posterior. No se detectaron revisiones aplicadas en el contexto inglés; se mantuvo el acuerdo alto salvo decisiones léxicas menores propias del español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton por norma del proyecto, aunque este versículo no lo contiene.
  - «Filisteos» se mantiene como gentilicio bíblico estándar en español.
  - La frase final «habitaron en ellas» conserva la referencia a las ciudades ocupadas y evita un giro demasiado moderno.
