    issue: La nota al pie no coincide con la alternativa documentada en el POB inglés.
    rationale: 'La nota inglesa ofrece una alternativa breve: «a mockery and a taunt to those around us». La española inventa «una burla ofensiva» y añade explicación torpe; esto rompe la trazabilidad del expediente.'
  - severity: medium
    issue: La nota al pie tiene problemas de español.
    rationale: «se conserva la dobletes de desprecio» es incorrecto; además, la redacción completa es poco natural y confusa.
  - severity: low
    issue: «Irrisión» es demasiado marcada y menos legible para un público amplio.
    rationale: Aunque léxicamente posible, en español bíblico neutral «escarnio» o «mofa» preservan mejor el matiz de קֶלֶס con mayor claridad.
  - severity: low
    issue: «los que están alrededor de nosotros» suena pesado.
    rationale: «los que nos rodean» expresa el mismo sentido de לִסְבִיבוֹתֵינוּ de forma más idiomática y clara.
  revised_spanish_text: Nos hemos vuelto un oprobio ante nuestros vecinos[a], una burla y un escarnio para los que nos rodean.
