base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/014.yaml
  text: And if a sojourner is staying with you and would keep the Passover to Yahweh[a], he shall do it according to the statute of the Passover and according to its ordinance; so he shall do it. One statute shall be for you, for the sojourner[c][b], and for the native of the land.
  footnotes:
  - marker: a
    text: Or 'a stranger resides with you' or 'a foreigner lives among you.' The Hebrew ger refers to a resident foreigner living among Israel, not merely a traveler.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'does/makes the Passover,' an idiom meaning 'keeps' or 'observes' the Passover.
    reason: lexical_alternative
  - marker: c
    text: Or 'native-born of the land.'
    reason: lexical_alternative
