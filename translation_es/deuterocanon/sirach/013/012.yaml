translation:
  language: es
  text: Un hombre cruel pone un tropiezo[a] y no tiene compasión; contra las vidas de muchos maquina un plan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: la imagen es literalmente ''pone un tropiezo'' o ''da un obstáculo''. El paralelo griego tiene una redacción sustancialmente diferente en esta mitad del versículo: ''Un hombre despiadado es el que no guarda palabras, y ciertamente no perdonará en cuanto a daño y cadenas''. El texto principal sigue el hebreo conservado.'
    reason: textual_variant
  - marker: b
    text: 'O más idiomáticamente: ''trama un plan'' o ''maquina contra muchas vidas''. El hebreo repite la misma raíz para intensificar la idea: literalmente, ''trama una trama'' o ''conspira una conspiración''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַכְזָרִי
  english_pob_choice: A cruel man
  chosen_spanish: Un hombre cruel
  alternatives_spanish:
  - el cruel
  - un hombre despiadado
  - un hombre cruel y duro
  lexicon: HALOT
  rationale: אַכְזָרִי describe a una persona cruel o despiadada. En español, 'un hombre cruel' conserva la fuerza adjetival y la referencia a una persona representativa del proverbio.
- source_word: יִתֵּן כֹּשֶׂל
  english_pob_choice: gives a stumbling block
  chosen_spanish: pone un tropiezo
  alternatives_spanish:
  - da un tropiezo
  - causa tropiezo
  - pone un obstáculo
  lexicon: HALOT
  rationale: כֹּשֶׂל alude a algo que hace tropezar o caer. 'Pone un tropiezo' mantiene la imagen concreta y suena natural en español, sin perder el sentido de acción dañina.
- source_word: וְלֹא יַחְמוֹל
  english_pob_choice: does not spare
  chosen_spanish: no tiene compasión
  alternatives_spanish:
  - no perdona
  - no se apiada
  - no escatima
  lexicon: HALOT
  rationale: חמל puede significar 'apiadarse', 'tener compasión' o 'perdonar/ahorrar'. En este contexto de crueldad, 'no tiene compasión' expresa bien la falta de misericordia; se mantiene el tono proverbial sin forzar una traducción demasiado literal.
- source_word: עַל נֶפֶשׁ רַבִּים
  english_pob_choice: against the lives of many
  chosen_spanish: contra la vida de muchos
  alternatives_spanish:
  - contra las vidas de muchos
  - contra muchas vidas
  - contra la vida de muchos
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se entiende como 'vida', y el complemento introduce intención hostil. La forma singular 'la vida de muchos' conserva la construcción semítica y el plural de referencia está incluido en 'muchos'.
- source_word: קוֹשֵׂר קָשֶר
  english_pob_choice: devises a scheme
  chosen_spanish: maquina un plan
  alternatives_spanish:
  - trama una trama
  - conspira
  - diseña un plan
  lexicon: HALOT
  rationale: El hebreo usa una construcción intensiva de raíz cognada que expresa maquinación o conspiración. 'Maquina un plan' comunica esa intención con naturalidad en español y evita la rigidez de 'trama una trama'.
theological_decisions:
- issue: Texto hebreo principal frente al paralelo griego
  english_pob_reading: The main translation follows the extant Hebrew witness; the Greek parallel reflects a substantially different wording in the first half of the verse.
  chosen_spanish_reading: La traducción principal sigue el testimonio hebreo conservado; el paralelo griego presenta un verbo y una formulación distintas en la primera mitad del versículo.
  alternative_spanish_readings:
  - 'El griego podría leerse como: ''El hombre despiadado es el que no guarda palabras...'''
  - Podría armonizarse con el griego, pero se preserva el hebreo como base
  rationale: Sirach tiene una tradición textual compleja. Aquí el hebreo es el testimonio principal, mientras que el griego ofrece un paralelo que apoya el sentido general de daño sin sustituir la lectura hebrea en el cuerpo del texto.
  doctrine_reference: Texto crítico / variante textual de Sirácida
translation_notes:
  revision_awareness: Se tomó como base la revisión más reciente del inglés POB, que ajustó los verbos al presente proverbial, pasó de 'life' a 'lives' por el plural con 'many', y prefirió una formulación más natural en la clausula final. En español se conservaron esos rasgos proverbiales sin perder la literalidad auditables del hebreo.
  spanish_consistency_notes:
  - Se prefirió 'hombre cruel' por ser natural y fiel al valor representativo del sustantivo/adjetivo hebreo.
  - '''Pone un tropiezo'' mantiene la imagen física de obstáculo, frecuente en castellano bíblico contemporáneo.'
  - '''No tiene compasión'' es una equivalencia semántica de ''no spare'' adecuada al contexto de crueldad.'
  - '''Contra la vida de muchos'' conserva la referencia a vidas humanas sin introducir ''almas'' ni vocabulario doctrinal ajeno al pasaje.'
  - Se evitó 'Cristo', 'SEÑOR' o terminología eclesial no presente en el versículo.
