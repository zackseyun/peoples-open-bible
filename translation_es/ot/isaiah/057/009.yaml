translation:
  language: es
  text: Te encaminaste al rey con aceite[a], y multiplicaste tus perfumes; enviaste tus emisarios lejos[b], y te degradaste hasta el Seol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «a Moloc», si «el rey» se entiende como un título alusivo para esa deidad.
    reason: alternative_reading
  - marker: b
    text: El Seol es el ámbito de los muertos.
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּשֻׁרִי
  english_pob_choice: you journeyed
  chosen_spanish: te encaminaste
  alternatives_spanish:
  - viajaste
  - te dirigiste
  - te pusiste en camino
  lexicon: HALOT
  rationale: El verbo es difícil y el contexto apunta a moverse hacia alguien con intención de acercamiento. «Te encaminaste» conserva la idea de ir hacia el rey sin sonar rígido ni exigir una lectura más específica de la que el texto garantiza.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - a Moloc
  - al soberano
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el rey». Mantengo esa lectura en el texto principal; la posible alusión a Moloc queda reservada para nota, como en el audit trail inglés.
- source_word: בַּשֶּׁמֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - con óleo
  - con ungüento
  lexicon: HALOT
  rationale: «Aceite» es la forma natural y concreta en español para שמן. «Óleo» puede sonar más litúrgico y estrecho; «ungüento» introduce una interpretación más específica de la que el hebreo no obliga.
- source_word: וַתַּרְבִּי
  english_pob_choice: multiplied
  chosen_spanish: multiplicaste
  alternatives_spanish:
  - aumentaste
  - hiciste abundar
  lexicon: HALOT
  rationale: Rבה expresa incremento abundante. «Multiplicaste» conserva la fuerza de acumulación y mantiene el paralelismo con las otras acciones del versículo.
- source_word: רִקֻּחָיִךְ
  english_pob_choice: your perfumes
  chosen_spanish: tus perfumes
  alternatives_spanish:
  - tus aromas
  - tus ungüentos
  - tus mezclas aromáticas
  lexicon: HALOT
  rationale: La referencia es a mezclas aromáticas compuestas. «Perfumes» comunica bien el sentido en español contemporáneo y sigue el valor semántico elegido por el POB inglés.
- source_word: וַתְּשַׁלְּחִי
  english_pob_choice: you sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - despachaste
  - mandaste
  lexicon: HALOT
  rationale: Traducción directa y natural de שלח. En español, el verbo ya sugiere el envío de representantes sin necesidad de añadir más.
- source_word: צִרַיִךְ
  english_pob_choice: your envoys
  chosen_spanish: tus emisarios
  alternatives_spanish:
  - tus mensajeros
  - tus embajadores
  lexicon: HALOT
  rationale: «Emisarios» mantiene el matiz diplomático/político del término y suena más preciso que «mensajeros» en este contexto de acercamiento a distancia.
- source_word: עַד מֵרָחֹק
  english_pob_choice: far away
  chosen_spanish: muy lejos
  alternatives_spanish:
  - a lo lejos
  - lejos
  - hasta muy lejos
  lexicon: HALOT
  rationale: La expresión intensifica la distancia. «Muy lejos» es idiomática en español y conserva la idea de alcance amplio sin recargar la frase.
- source_word: וַתַּשְׁפִּילִי
  english_pob_choice: debased yourself
  chosen_spanish: te degradaste
  alternatives_spanish:
  - te humillaste
  - te rebajaste
  lexicon: HALOT
  rationale: Aquí el contexto es de descenso moral y no de humildad virtuosa. «Te degradaste» comunica la carga negativa que el inglés POB quiso preservar con «debased yourself».
- source_word: עַד שְׁאוֹל
  english_pob_choice: even to Sheol
  chosen_spanish: hasta el Seol
  alternatives_spanish:
  - hasta el reino de los muertos
  - hasta la tumba
  - hasta el sepulcro
  lexicon: HALOT
  rationale: Se conserva «Seol» como término técnico del hebreo para el ámbito de los muertos. Mantenerlo evita aplanar la imagen bíblica y sigue la decisión del POB inglés de transliterarlo.
theological_decisions:
- issue: Posible lectura alusiva de «el rey» como Moloc
  english_pob_reading: Retain 'the king' in the main text
  chosen_spanish_reading: Mantener «el rey» en el texto principal
  alternative_spanish_readings:
  - Moloc
  - el rey-idolo
  rationale: El consonántico hebreo permite la lectura simple «el rey», y esa lectura ya transmite la acusación del pasaje sin resolver prematuramente la posible alusión cultual. La nota preserva la tensión interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que prefirió un verbo de desplazamiento más explícito («journeyed») en vez de solo «went». Por eso se eligió «te encaminaste», que conserva movimiento intencional hacia el rey sin perder la naturalidad del español. También se mantuvieron sin cambios sustantivos la estructura paralela del versículo y la transliteración de Sheol/Seol.
  spanish_consistency_notes:
  - Se usa «Seol» en lugar de «Sheol» para respetar la ortografía española habitual, manteniendo el término transliterado del hebreo.
  - «Emisarios» y no «mensajeros» por el tono diplomático del contexto, en continuidad con la decisión inglesa de «envoys».
  - «Te degradaste» conserva el valor negativo de auto-abasamiento; no se suaviza a «te humillaste» porque el contexto acusa corrupción e infidelidad.
