translation:
  language: es
  text: Yo te conocí[a] en el desierto, en una tierra de severa sequía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te cuidé» o «te reconocí»; el verbo hebreo puede llevar matices relacionales o de pacto, más allá de la simple cognición.
    reason: lexical_alternative
  - marker: b
    text: O «en una tierra de calor abrasador», «en una tierra de sed» o «en una tierra reseca».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַעְתִּיךָ
  english_pob_choice: I knew you
  chosen_spanish: te conocí
  alternatives_spanish:
  - te conocí
  - te reconocí
  - te cuidé
  - te tuve en cuenta
  lexicon: HALOT
  rationale: El hebreo ידע puede expresar conocimiento relacional o de pacto además de mera cognición. En español, «te conocí» mantiene el núcleo léxico de «know» sin cerrar indebidamente la tensión interpretativa; el contexto puede sugerir cuidado o reconocimiento, pero eso se deja para la nota.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la estepa
  - en el yermo
  lexicon: HALOT
  rationale: «מִדְבָּר» puede traducirse como «wilderness» o «desert». En español, «desierto» es natural y comunica bien el entorno árido del éxodo; «wilderness» en español sería menos idiomático en este contexto.
- source_word: תַּלְאֻבוֹת
  english_pob_choice: of severe drought
  chosen_spanish: de ardiente sequedad
  alternatives_spanish:
  - de severa sequía
  - de calor abrasador
  - de sed
  - de parchedad
  lexicon: HALOT
  rationale: El término raro denota sequedad extrema, sed o calor abrasador. «Ardiente sequedad» conserva la dureza física del cuadro y permite reunir los matices de calor, aridez y desecación sin forzar una sola opción técnica.
theological_decisions:
- issue: Valor relacional/covenantal de «conocer» aplicado a Yahvé
  english_pob_reading: Relational/covenantal knowledge is left implicit in 'I knew you'
  chosen_spanish_reading: La frase principal conserva «te conocí», dejando implícita la posible relación de pacto, cuidado o reconocimiento.
  alternative_spanish_readings:
  - te cuidé
  - te reconocí
  - te tuve en cuenta
  rationale: El hebreo permite una carga relacional real, pero el texto no la explicita con un verbo distinto. Mantener «te conocí» evita resolver la tensión teológica en la traducción principal y preserva la amplitud semántica documentada por el audit trail.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el estado más reciente indica que no se requieren cambios y que la concordancia de revisión es alta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto para el nombre divino, aunque en este versículo el texto hebreo no lo explicita.
  - «Desierto» se usa como equivalente idiomático de «wilderness» para conservar la resonancia del éxodo.
  - La nota sobre ידע conserva la ambigüedad entre conocer, reconocer y cuidar, sin introducir una paráfrasis doctrinal en el texto principal.
