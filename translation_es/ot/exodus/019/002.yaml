translation:
  language: es
  text: Partieron de Refidim y llegaron al desierto de Sinaí, y acamparon en el desierto. Allí acampó Israel frente al monte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «opuesto al monte». La preposición hebrea puede indicar una posición frente a algo o delante de ello.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: נסע en este contexto narrativo expresa el dejar el campamento y ponerse en movimiento. «Partieron» conserva ese matiz de avance en la historia y suena natural en español.
- source_word: מֵרְפִידִים
  english_pob_choice: from Rephidim
  chosen_spanish: de Refidim
  alternatives_spanish:
  - desde Refidim
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera como «Refidim». La preposición מ se rinde con «de» para una relación simple de procedencia.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and came
  chosen_spanish: y llegaron
  alternatives_spanish:
  - y vinieron
  - y arribaron
  lexicon: HALOT
  rationale: בוא puede significar venir, llegar o entrar. Aquí el destino ya está explícito, por lo que «llegaron» comunica bien el movimiento completado.
- source_word: מִדְבַּר סִינַי
  english_pob_choice: the wilderness of Sinai
  chosen_spanish: el desierto de Sinaí
  alternatives_spanish:
  - el desierto del Sinaí
  - el desierto sinaítico
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «desierto/soledad». En español bíblico, «desierto de Sinaí» es claro y fiel; aquí se opta por «desierto» porque suena natural y mantiene el contraste geográfico.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and they camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y hicieron campamento
  - y se asentaron
  lexicon: HALOT
  rationale: חנה significa acampar o acampar/establecer campamento. «Acamparon» es la forma más directa y clara en español moderno.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto mismo
  - allí en el desierto
  lexicon: HALOT
  rationale: Se mantiene la misma imagen léxica que en la primera mención de מִדְבָּר, pero en español «desierto» funciona mejor por fluidez y consistencia dentro de la frase.
- source_word: וַיִּחַן
  english_pob_choice: There Israel camped
  chosen_spanish: Allí acampó Israel
  alternatives_spanish:
  - Y allí acampó Israel
  - Entonces Israel acampó allí
  lexicon: HALOT
  rationale: El verbo singular con el nombre colectivo ישראל se conserva de manera natural en español con sujeto singular colectivo. «Allí» refleja la posición de שָׁם y enlaza con el lugar señalado.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Aquí designa al colectivo nacional, no al patriarca. Se conserva «Israel» como nombre colectivo estándar.
- source_word: נֶגֶד הָהָר
  english_pob_choice: before the mountain
  chosen_spanish: frente al monte
  alternatives_spanish:
  - ante el monte
  - en oposición al monte
  - delante del monte
  lexicon: HALOT
  rationale: נֶגֶד puede significar delante de, frente a, opuesto a. «Frente al monte» preserva la relación espacial sin forzar una orientación más precisa de la que el hebreo exige.
translation_notes:
  revision_awareness: 'El texto se alinea con la versión inglesa auditada de alta concordancia y no requiere revisiones sustantivas. Se mantuvo la misma estructura narrativa: salida, llegada, campamento y ubicación frente al monte.'
  spanish_consistency_notes:
  - Se ha preferido «desierto» para מִדְבָּר en ambas apariciones, por naturalidad en español y coherencia interna.
  - Se mantiene la transliteración de los nombres propios Refidim, Sinaí e Israel.
  - «Acampó» se usa para ambos verbos de חנה, conservando el paralelismo del hebreo sin sobrecargar el español.
  - La nota al pie recoge la alternativa espacial de נֶגֶד, tal como la auditoría inglesa preserva «before/opposite».
