base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/005/003.yaml
  text: And he gave him the written note and said to him[a], “Find for yourself a man who will go with you, and I will give him wages while I live[b]; then go and get the silver.”
  footnotes:
  - marker: a
    text: Or “the money.” Greek ἀργύριον literally means “silver,” but in context it refers to the deposited funds.
    reason: lexical_alternative
  - marker: b
    text: The parallel Semitic witness points to a token or identifying document connected with the deposit; this supports translating χειρόγραφον as a written note rather than a generic letter.
    reason: cross_reference
