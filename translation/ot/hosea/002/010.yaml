id: HOS.2.10
reference: Hosea 2:10
source:
  edition: WLC
  text: וְ/הִיא֙ לֹ֣א יָֽדְעָ֔ה כִּ֤י אָֽנֹכִי֙ נָתַ֣תִּי לָ֔/הּ הַ/דָּגָ֖ן וְ/הַ/תִּיר֣וֹשׁ וְ/הַ/יִּצְהָ֑ר וְ/כֶ֨סֶף הִרְבֵּ֥יתִי לָ֛/הּ וְ/זָהָ֖ב עָשׂ֥וּ לַ/בָּֽעַל׃
translation:
  text: But she did not know that it was I who gave her the grain[a], the new wine, and the oil, and who multiplied silver for her and gold[b], which they made into Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which they made for Baal.' The Hebrew is terse and may refer either to making an image of Baal from the silver and gold or to using those gifts in Baal worship more generally.
    reason: alternative_reading
  - marker: b
    text: '''Fresh oil'' refers to olive oil as an agricultural product; many translations simply read ''oil.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִיא
  chosen: But she
  alternatives:
  - And she
  - Yet she
  lexicon: HALOT
  rationale: The conjunction plus pronoun introduces contrast with the preceding context; 'But she' captures the adversative force naturally in English while preserving the explicit feminine subject.
- source_word: לֹא יָדְעָה
  chosen: did not know
  alternatives:
  - did not acknowledge
  - was unaware
  lexicon: HALOT
  rationale: ידע in the qal commonly means 'know.' In context it includes failure to recognize or acknowledge, but 'did not know' is the most direct rendering and lets the context carry the fuller sense.
- source_word: כִּי אָֽנֹכִי
  chosen: that it was I
  alternatives:
  - that I
  - for I
  lexicon: HALOT
  rationale: כִּי here introduces the content of what she failed to know, and the independent pronoun אָנֹכִי is emphatic. 'That it was I' preserves the emphasis better than a bare 'that I.'
- source_word: נָתַתִּי לָהּ
  chosen: gave her
  alternatives:
  - gave to her
  - had given her
  lexicon: HALOT
  rationale: Straightforward past action with indirect object suffix. English idiom prefers 'gave her.'
- source_word: הַדָּגָן
  chosen: the grain
  alternatives:
  - the grain harvest
  - corn
  lexicon: HALOT
  rationale: דגן denotes grain/cereal produce generally, not specifically maize. 'The grain' is accurate and idiomatic.
- source_word: הַתִּירוֹשׁ
  chosen: the new wine
  alternatives:
  - the wine
  - the fresh wine
  lexicon: HALOT
  rationale: תירוש commonly refers to fresh/new wine rather than wine in the broadest sense. 'New wine' preserves the agricultural triad familiar in the prophets.
- source_word: הַיִּצְהָר
  chosen: the fresh oil
  alternatives:
  - the oil
  - the olive oil
  lexicon: HALOT
  rationale: יצהר refers to fresh oil, usually olive oil, as produce. 'Fresh oil' distinguishes it from more generic 'oil' and matches the harvest-list context.
- source_word: וְכֶסֶף הִרְבֵּיתִי לָהּ
  chosen: and who multiplied silver for her
  alternatives:
  - and I increased silver for her
  - and I gave her abundant silver
  lexicon: HALOT
  rationale: The hiphil of רבה means to make much/increase. 'Multiplied silver for her' preserves the causative sense and the abundance implied.
- source_word: וְזָהָב
  chosen: and gold
  alternatives:
  - and gold as well
  lexicon: HALOT
  rationale: Simple coordination with the previous object; no need to over-interpret ellipsis.
- source_word: עָשׂוּ לַבָּעַל
  chosen: which they made into Baal
  alternatives:
  - which they used for Baal
  - which they made for Baal
  - which they made into the Baal-image
  lexicon: HALOT
  rationale: The plural verb with ל plus Baal is terse and somewhat elliptical. In context, the silver and gold were fashioned into something for/idolatrously identified with Baal. 'Made into Baal' best reflects the likely sense of manufacturing an idol representing Baal, while preserving the sharpness of the accusation.
