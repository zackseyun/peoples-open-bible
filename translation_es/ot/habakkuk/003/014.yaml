translation:
  language: es
  text: Tú atravesaste la cabeza de sus guerreros[a] con sus propias varas; ellos irrumpieron como tormenta para dispersarme, su exultación como la de uno que va a devorar al pobre en secreto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la cabeza de sus aldeas' / 'la cabeza de sus hordas'; el término hebreo es difícil, y muchos lo entienden de manera más general como las bandas o los jefes del enemigo.
    reason: alternative_reading
lexical_decisions:
- source_word: נָקַבְתָּ
  english_pob_choice: you pierced
  chosen_spanish: atravesaste
  alternatives_spanish:
  - perforaste
  - horadaste
  lexicon: HALOT
  rationale: En español, 'atravesaste' comunica con naturalidad la imagen violenta de perforar o pasar de lado a lado, conservando el sentido martial de נקב sin sonar artificial. 'Perforaste' y 'horadaste' son posibles, pero menos idiomáticos en este contexto narrativo-poético.
- source_word: בְמַטָּיו
  english_pob_choice: with his own staffs
  chosen_spanish: con sus propios bastones
  alternatives_spanish:
  - con sus propias varas
  - con sus propios bastones de mando
  lexicon: HALOT
  rationale: מַטֶּה remite primariamente a 'vara' o 'bastón'. 'Bastones' mantiene el núcleo léxico y permite la ironía de que el enemigo es herido con sus propios instrumentos. 'Varas' es válido, pero 'bastones' fluye mejor en español moderno; 'bastones de mando' añade una precisión no exigida por el texto.
- source_word: רֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - el jefe
  - el líder
  lexicon: HALOT
  rationale: '''La cabeza'' conserva la imagen hebrea y deja abierta la posibilidad de referencia literal o figurada, como en la auditable decisión inglesa. ''Jefe'' o ''líder'' interpretarían más de lo que el hebreo obliga.'
- source_word: פְּרָזָיו
  english_pob_choice: his warriors
  chosen_spanish: sus guerreros
  alternatives_spanish:
  - sus aldeas
  - sus hordas
  - sus jefes
  lexicon: HALOT
  rationale: El término es difícil y discutido. En el marco bélico inmediato, 'guerreros' transmite bien el conjunto de combatientes o bandas hostiles que se avientan al ataque. Se conserva la tensión interpretiva sin cerrar el debate. '
- source_word: יִסְעֲרוּ
  english_pob_choice: they stormed out
  chosen_spanish: irrumpieron como tormenta
  alternatives_spanish:
  - avanzaron como torbellino
  - se lanzaron con furia
  lexicon: HALOT
  rationale: סער expresa tempestad, agitación y avance impetuoso. 'Irrumpieron como tormenta' preserva la fuerza dinámica y la metáfora meteorológica sin depender de una locución inglesa calca.
- source_word: לַהֲפִיצֵנִי
  english_pob_choice: to scatter me
  chosen_spanish: para dispersarme
  alternatives_spanish:
  - para esparcirme
  - para desbandarme
  lexicon: HALOT
  rationale: פוץ en hifil significa dispersar o esparcir. 'Dispersarme' es preciso y claro; también mantiene el contraste con el movimiento agresivo de los atacantes.
- source_word: עֲלִיצֻתָם
  english_pob_choice: their exultation
  chosen_spanish: su exultación
  alternatives_spanish:
  - su regocijo
  - su júbilo
  lexicon: HALOT
  rationale: '''Exultación'' conserva el tono intensificado y hasta arrogante del sustantivo hebreo. ''Júbilo'' o ''regocijo'' serían más suaves y perderían parte de esa carga.'
- source_word: כְּמוֹ לֶאֱכֹל
  english_pob_choice: like one about to devour
  chosen_spanish: como quien va a devorar
  alternatives_spanish:
  - como para devorar
  - como si fueran a devorar
  lexicon: HALOT
  rationale: La comparación expresa intención depredadora. 'Como quien va a devorar' refleja bien el impulso inminente del infinitivo y resulta natural en español.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al afligido
  - al necesitado
  lexicon: HALOT
  rationale: En este contexto de opresión y violencia, 'el pobre' es una traducción concisa que conserva la carga social del término hebreo. El singular funciona bien en la imagen comparativa.
- source_word: בַּמִּסְתָּר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - en un escondite
  - en oculto
  lexicon: HALOT
  rationale: '''En secreto'' es idiomático y transmite la clandestinidad del acto. También mantiene la relación semántica con el campo de lo oculto sin introducir una locución demasiado explicativa.'
theological_decisions:
- issue: Interpretación del sustantivo difícil פְּרָזָיו en un contexto bélico
  english_pob_reading: his warriors
  chosen_spanish_reading: sus guerreros
  alternative_spanish_readings:
  - sus aldeas
  - sus hordas
  rationale: La escena describe atacantes hostiles que irrumpen para dispersar al hablante y devorar al pobre. En ese marco, un referente militar encaja mejor y la traducción española conserva esa lectura sin borrar la ambigüedad del hebreo, que sigue siendo real y documentada.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión interpretativa cuando el original es genuinamente ambiguo.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría fue de alta concordancia y se mantiene la decisión óptima ya aprobada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término predeterminado solo cuando el texto lo exija; en este versículo no aparece el Tetragrámaton.
  - Se usa 'exultación' para conservar la intensificación léxica ya documentada en el inglés POB.
  - Se optó por 'bastones' para reflejar מַטָּיו sin introducir una glosa interpretativa excesiva.
  - La nota mantiene la alternativa tradicional documentada para פְּרָזָיו sin imponerla en el texto principal.
