translation:
  language: es
  text: 'Le enviaron un informe[a], y esto fue lo que fue escrito en él: «A Darío el rey: toda paz[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Informe» traduce aquí un término arameo que también puede significar «mensaje», «documento» o «carta» oficial.
    reason: lexical_alternative
  - marker: b
    text: «Toda paz» es una fórmula epistolar formal que significa paz completa o bienestar pleno.
    reason: cultural_note
lexical_decisions:
- source_word: פִּתְגָמָא
  english_pob_choice: report
  chosen_spanish: informe
  alternatives_spanish:
  - mensaje
  - documento
  - carta
  lexicon: HALOT
  rationale: En arameo imperial, פתגמא puede referirse a una comunicación oficial, informe o documento. En este contexto administrativo, «informe» comunica bien el carácter formal del envío sin reducirlo indebidamente a una simple «carta».
- source_word: שְׁלַחוּ
  english_pob_choice: they sent
  chosen_spanish: le enviaron
  alternatives_spanish:
  - despacharon
  - mandaron
  lexicon: HALOT
  rationale: El perfecto 3mp se rinde de manera natural con «enviaron». Se añade el clítico «le» porque el complemento de dirección está expresado en el verso y el español requiere marcar al destinatario de forma explícita.
- source_word: עֲלֹוהִי
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: HALOT
  rationale: La preposición con sufijo indica dirección al destinatario. En español, «a él» mantiene la referencia dativa sin cargar un matiz espacial que no pide el contexto.
- source_word: וְכִדְנָה
  english_pob_choice: and this was what
  chosen_spanish: y esto fue lo que
  alternatives_spanish:
  - y así fue como
  - y de esta manera
  lexicon: HALOT
  rationale: La frase introduce el contenido exacto del documento. «Y esto fue lo que» conserva el valor deíctico y suena natural en español escrito.
- source_word: כְּתִיב
  english_pob_choice: was written
  chosen_spanish: estaba escrito
  alternatives_spanish:
  - fue escrito
  - se había escrito
  lexicon: HALOT
  rationale: El pasivo arameo requiere una forma pasiva o resultativa en español. «Estaba escrito» expresa el estado del texto contenido en el informe y evita una traducción demasiado literal y menos natural como «fue escrito».
- source_word: בְּגַוֵּהּ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - en su interior
  lexicon: HALOT
  rationale: Se refiere al contenido del documento. «En él» es la manera más idiomática y mantiene la relación con el sustantivo masculino «informe».
- source_word: לְדָרְיָוֶשׁ
  english_pob_choice: To Darius
  chosen_spanish: A Darío
  alternatives_spanish:
  - Para Darío
  lexicon: HALOT
  rationale: La preposición funciona como encabezamiento epistolar dirigido al rey. En español, «A Darío» reproduce bien la fórmula de destinatario.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo funciona como título en aposición. «El rey» conserva el valor nominal y el título real en español común.
- source_word: שְׁלָמָא
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - salud
  lexicon: HALOT
  rationale: En saludos epistolares, שְׁלָמָא expresa paz o bienestar formal. «Paz» preserva el contenido léxico principal y evita interpretarlo de más como simple «saludos».
- source_word: כֹלָּא
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - completa
  - plena
  lexicon: HALOT
  rationale: El intensivo expresa plenitud o totalidad. «Toda paz» conserva la fuerza del hebraísmo/arameísmo y reproduce la fórmula formal sin explicarla en exceso.
theological_decisions:
- issue: Fórmula epistolar «all peace»
  english_pob_reading: “All peace” is a formal epistolary greeting meaning complete peace or well-being.
  chosen_spanish_reading: «Toda paz» se mantiene como saludo formal de plenitud, con la posibilidad implícita de «paz completa / bienestar pleno».
  alternative_spanish_readings:
  - paz completa
  - bienestar pleno
  - toda tranquilidad
  rationale: No hay un asunto doctrinal directo, pero sí una tensión entre literalidad y naturalidad. Se conserva la fórmula compacta para respetar el saludo arameo y su carácter administrativo; el sentido de plenitud queda disponible sin reemplazarlo por un saludo más interpretativo.
  doctrine_reference: Epistolografía bíblica / fórmula de saludo
translation_notes:
  revision_awareness: El inglés POB revisó la puntuación del saludo final, pasando de una coma a dos puntos para reflejar con más naturalidad la fórmula epistolar. En español se ha seguido esa decisión con dos puntos antes de la cita de saludo.
  spanish_consistency_notes:
  - Se mantiene «Darío» para Darius, conforme al uso bíblico en español.
  - Se usa «paz» en el saludo para conservar la fórmula aramea y su intensidad epistolar.
  - Se evita «SEÑOR» o equivalentes no presentes en el texto; no hay nombre divino en este verso.
  - El clítico dativo «le» ayuda a expresar con naturalidad el destinatario implícito del envío.
