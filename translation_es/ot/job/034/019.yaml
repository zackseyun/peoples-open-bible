translation:
  language: es
  text: que no hace acepción de personas con los príncipes, ni favorece al rico[a] sobre el pobre; porque todos ellos son obra de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no reconoce al rico antes que al pobre», es decir, no le da trato preferencial al rico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשָׂא פְּנֵי
  english_pob_choice: shows no partiality
  chosen_spanish: no hace acepción de personas
  alternatives_spanish:
  - no levanta el rostro de
  - no muestra favoritismo a
  lexicon: HALOT
  rationale: El hebreo idiomático 'levantar el rostro' expresa trato preferencial. En español, 'hacer acepción de personas' comunica de manera natural y bíblica la idea de parcialidad, sin perder el sentido legal y ético del contexto.
- source_word: שָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - nobles
  - gobernantes
  - oficiales
  lexicon: HALOT
  rationale: El término señala a personas de alto rango. 'Príncipes' conserva esa dignidad social y refleja bien el matiz del inglés POB.
- source_word: נִכַּר
  english_pob_choice: favor
  chosen_spanish: favorece
  alternatives_spanish:
  - reconoce
  - tiene consideración por
  - da preferencia a
  lexicon: HALOT
  rationale: Aquí el verbo expresa reconocer con preferencia o trato favorable, no mera percepción visual. 'Favorece' reproduce bien la fuerza relacional del hebreo y la revisión inglesa más reciente.
- source_word: שׁוֹעַ
  english_pob_choice: the rich
  chosen_spanish: el rico
  alternatives_spanish:
  - el poderoso
  - el acomodado
  - el rico y poderoso
  lexicon: HALOT
  rationale: El sustantivo puede abarcar riqueza e influencia; en este paralelismo con 'el pobre', 'el rico' es la opción más directa y natural en español.
- source_word: לִפְנֵי דָל
  english_pob_choice: over the poor
  chosen_spanish: sobre el pobre
  alternatives_spanish:
  - antes que el pobre
  - en preferencia al pobre
  - frente al pobre
  lexicon: HALOT
  rationale: El valor contextual es preferencia comparativa. 'Sobre el pobre' funciona bien en español junto con 'favorece', y mantiene el sentido de trato desigual.
- source_word: דָל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el humilde
  - el desvalido
  lexicon: HALOT
  rationale: En este contraste con 'el rico', el sentido socioeconómico es claro. 'El pobre' es la equivalencia más natural y precisa.
- source_word: מַעֲשֵׂה יָדָיו
  english_pob_choice: the work of his hands
  chosen_spanish: obra de sus manos
  alternatives_spanish:
  - el trabajo de sus manos
  - lo que sus manos hicieron
  - su hechura
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de creación. 'Obra de sus manos' preserva la imagen concreta y sugiere creación sin forzar explicaciones.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - ellos todos
  lexicon: HALOT
  rationale: 'El pronombre intensifica la universalidad: príncipes, ricos y pobres por igual. ''Todos ellos'' lo hace explícito en español.'
theological_decisions:
- issue: Referente del sufijo de 3ms en 'sus manos'
  english_pob_reading: 'God is the implied referent: all people are the work of his hands.'
  chosen_spanish_reading: 'Dios es el referente implícito: todos son obra de sus manos.'
  alternative_spanish_readings:
  - 'Lectura más genérica: ''obra de manos'' sin explicitar el referente divino'
  - Mantener la ambigüedad sin señalar a Dios
  rationale: En el contexto Eliú describe la justicia imparcial de Dios. El sufijo posesivo singular apunta naturalmente a él, y en español conviene conservar esa referencia implícita sin convertirla en paráfrasis explicativa.
  doctrine_reference: Mantener la referencia teológica del texto sin resolver más de lo que el pasaje exige.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: ''favor the rich over the poor'' frente a la opción anterior más literal ''regard the rich above the poor''. En español, ''favorece al rico sobre el pobre'' reproduce esa preferencia comparativa con naturalidad. También se tomó en cuenta la equivalencia idiomática del hebreo ''levantar el rostro'' para expresar imparcialidad.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' implícito en 'sus manos', conforme al sufijo posesivo del hebreo y al contexto de Eliú.
  - Se prefirió 'hacer acepción de personas' como equivalente idiomático de la parcialidad judicial/ética.
  - '''Príncipes'' se conserva por la jerarquía social evocada por שָׂרִים, en línea con el POB inglés.'
