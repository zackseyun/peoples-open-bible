    rationale: Aunque ἐπισκοπή puede tener sentidos de oversight/care, en este contexto poético «supervisión» no suena bíblico ni natural. Conviene conservar alternativas más elevadas y contextualmente aptas como «cuidado» u «observancia vigilante» si fuera necesario.
