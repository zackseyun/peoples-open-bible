  to: Hizo venir a todos los sacerdotes de las ciudades de Judá y profanó los lugares altos donde los sacerdotes habían quemado incienso allí, desde Guibeá hasta Beerseba. También derribó los lugares altos de las puertas[a] que estaban a la entrada de la puerta de Josué, el gobernador de la ciudad[b], que quedaban a la izquierda de un hombre en la puerta de la ciudad.
