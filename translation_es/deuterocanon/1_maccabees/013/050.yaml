revisions:
- from: Y clamaron a Simón para recibir manos derechas[a], y él se las dio, y los expulsó de allí[b], y purificó la acrópolis de sus contaminaciones.
  to: Y clamaron a Simón para que recibiera prendas de buena fe[a], y él se las dio, y los expulsó de allí[b], y limpió la ciudadela de sus contaminaciones.
  rationale: Se revisa el modismo griego a una expresión idiomática clara en español, siguiendo la decisión documentada de la POB de poner el sentido en el texto y la literalidad en nota. Se cambia «acrópolis» por «ciudadela», que refleja mejor τὴν ἄκραν en contexto y conserva «Akra» en nota como alternativa histórica. El resto de la estructura se mantiene por su buena correspondencia con el griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego y conserva la elipsis de ἔδωκεν αὐτοῖς. Sin embargo, dos elecciones principales no siguen fielmente la línea documentada de la POB inglesa ni la legibilidad española requerida: δεξιὰς λαβεῖν se dejó demasiado literal en el texto principal («manos derechas»), y τὴν ἄκραν se tradujo como «acrópolis», que no corresponde bien al valor contextual de ciudadela/fortaleza y además suena más helenizante que transparente.'
  spanish_quality_summary: El español es mayormente correcto, pero «recibir manos derechas» resulta opaco y poco natural para lectores comunes, y «acrópolis» no es la opción más clara ni más fiel aquí. «Clamaron a Simón» y «los expulsó de allí» funcionan bien. «Purificó ... de sus contaminaciones» es aceptable, aunque «limpió la ciudadela de sus profanaciones» o «impurezas» sonaría más idiomático; aun así, el punto principal de calidad está en reemplazar las dos expresiones problemáticas.
  glossary_alignment: No hay conflictos con la terminología teológica central del proyecto. Sí hay una desviación respecto de la decisión léxica auditada para δεξιὰς λαβεῖν, que en español debe expresarse idiomáticamente en el texto principal con nota para la imagen literal. También τὴν ἄκραν debe alinearse con «the citadel» y no con «acrópolis».
  issues:
  - severity: high
    issue: «para recibir manos derechas[a]» es demasiado literal y opaco en el texto principal
    rationale: El griego δεξιὰς λαβεῖν es un modismo. La POB inglesa documenta una traducción idiomática en el cuerpo del texto, dejando la literalidad para la nota. En español, «manos derechas» no comunica naturalmente «prendas/garantías de buena fe» y dificulta la lectura.
  - severity: high
    issue: «la acrópolis» no representa bien τὴν ἄκραν en este contexto
    rationale: Aquí se trata de la fortaleza/ciudadela conocida como el Akra. «Acrópolis» en español remite a otro concepto y no sigue la decisión auditada de usar un sustantivo común transparente en el texto principal con nota para «Akra».
  - severity: medium
    issue: La nota a sobreexplica con «un pacto»
    rationale: El griego y la auditoría hablan de seguridades/prendas de buena fe, no necesariamente de un pacto formal. Conviene mantener la explicación más cercana al valor idiomático sin especificar de más.
  revised_spanish_text: Y clamaron a Simón para que recibiera prendas de buena fe[a], y él se las dio, y los expulsó de allí[b], y limpió la ciudadela de sus contaminaciones.
  revised_footnotes:
  - marker: a
    text: Griego literalmente, «recibir manos derechas», un modismo para recibir seguridades o prendas de buena fe.
    reason: lexical_alternative
  - marker: b
    text: O «el Akra», la ciudadela fortificada en Jerusalén.
    reason: alternative_reading
  revision_rationale: Se revisa el modismo griego a una expresión idiomática clara en español, siguiendo la decisión documentada de la POB de poner el sentido en el texto y la literalidad en nota. Se cambia «acrópolis» por «ciudadela», que refleja mejor τὴν ἄκραν en contexto y conserva «Akra» en nota como alternativa histórica. El resto de la estructura se mantiene por su buena correspondencia con el griego.
