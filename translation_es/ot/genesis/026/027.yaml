revisions:
- from: 'Isaac les dijo[a]: «¿Por qué han venido a mí, si me odiaron y me despidieron de entre ustedes?»'
  to: 'Isaac les dijo[a]: «¿Por qué han venido a mí, si me odiaron y me enviaron lejos de entre ustedes?»'
