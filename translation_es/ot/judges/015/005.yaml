- from: Prendió fuego a las antorchas y las soltó entre las mieses de los filisteos[a]; y quemó los gavillones y la mies[b], y hasta los olivos.
  to: Prendió fuego a las antorchas y las dejó ir entre las mieses de los filisteos[a]; y quemó los gavillones y la mies en pie[b], y hasta el olivar.
  rationale: Se ajusta el texto para evitar la ambigüedad de «las soltó», que en español puede referirse erróneamente a las antorchas; se explicita «mies en pie» para conservar la distinción de קָמָה; y se cambia «los olivos» por «el olivar» para reflejar correctamente כֶּרֶם זָיִת como plantación de olivos. Se conservan el tono, la estructura y las notas léxicas del borrador con una leve limpieza tipográfica en la nota b.
