theological_decisions:
- issue: Referent of the denunciation 'The prophet is a fool; the man of the spirit is mad'
  chosen_reading: A denunciation of Israel's prophetic figures or claimed inspired spokesmen in the context of judgment
  alternative_readings:
  - A quotation of what the people say about the true prophet
  - A sarcastic characterization of false prophets only
  rationale: The plain flow of the verse after 'Israel will know it' favors the prophet/man of the spirit being exposed in the day of judgment. The Hebrew does not explicitly mark this as a quotation from the people, so the main text avoids quotation marks. Because the line is interpretively contested, alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Meaning of 'spirit' in 'man of the spirit'
  chosen_reading: Human spiritual inspiration/claim to inspiration, not explicitly the Holy Spirit
  alternative_readings:
  - A man inspired by the Spirit of God
  rationale: The context is denunciatory and parallel to 'the prophet'; capitalizing 'Spirit' would import a theological specificity not demanded by the Hebrew. Lowercase preserves ambiguity without foreclosing that some readers may understand a claim to divine inspiration.
  doctrine_reference: Do not import doctrinal claims the text does not make
