translation:
  language: es
  text: Así, todo Israel fue inscrito por genealogía[a], y he aquí, están escritos en el Libro de los reyes de Israel; y Judá fue llevado al exilio a Babilonia por su infidelidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue registrado por genealogías» o «fue inscrito en los registros genealógicos».
    reason: lexical_alternative
  - marker: b
    text: O «por su falta de fidelidad» o «por su transgresión». El hebreo implica una ruptura de lealtad de pacto, no solo una falta genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְיַחְשׂוּ
  english_pob_choice: was enrolled by genealogy
  chosen_spanish: fue inscrito por genealogía
  alternatives_spanish:
  - fue registrado por genealogía
  - fue contado por genealogías
  - fue asentado en los registros genealógicos
  lexicon: HALOT
  rationale: El hitpael de יחס expresa inscripción/registro de linaje, no simple conteo. «Inscrito por genealogía» conserva el valor administrativo-genealógico en español natural y respetable.
- source_word: וְהִנָּם
  english_pob_choice: and behold
  chosen_spanish: y, miren
  alternatives_spanish:
  - y he aquí
  - y, mirad
  - y en verdad
  lexicon: HALOT
  rationale: El marcador discursivo llama la atención sobre la afirmación siguiente. «Y, miren» conserva la fuerza presentativa sin sonar excesivamente arcaico.
- source_word: כְּתוּבִים
  english_pob_choice: they are written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - fueron escritos
  - aparecen escritos
  lexicon: HALOT
  rationale: 'El participio pasivo tiene valor estativo: ya se hallan escritos. «Están escritos» sigue de cerca el hebreo y es idiomático en español.'
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - en el registro
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», en contexto documental el español natural pide «en». «Libro» funciona como equivalente convencional de סֵפֶר para un registro oficial.
- source_word: מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - de los Reyes de Israel
  - de los monarcas de Israel
  lexicon: HALOT
  rationale: Se mantiene el genitivo normal en español. No se capitaliza «Reyes» porque el español no lo exige y podría sugerir un título distinto sin base textual adicional.
- source_word: וִיהוּדָה
  english_pob_choice: And Judah
  chosen_spanish: y Judá
  alternatives_spanish:
  - e Judá
  - y la tribu de Judá
  lexicon: HALOT
  rationale: Se conserva el nombre propio como sujeto colectivo-político, sin explicitar «tribu» porque el texto se refiere al reino/pueblo según el contexto histórico.
- source_word: הָגְלוּ
  english_pob_choice: was taken into exile
  chosen_spanish: fue llevado al exilio
  alternatives_spanish:
  - fue deportado
  - fue llevado cautivo
  - entró en exilio
  lexicon: HALOT
  rationale: El hofal indica que Judah sufrió una acción de traslado forzado. «Fue llevado al exilio» comunica pasividad y el sentido de deportación sin sobrecargar con un tecnicismo.
- source_word: לְבָבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - a la Babilonia
  - hacia Babilonia
  lexicon: HALOT
  rationale: Destino directo con el nombre propio estándar en español.
- source_word: בְּמַעֲלָם
  english_pob_choice: because of their unfaithfulness
  chosen_spanish: por su infidelidad
  alternatives_spanish:
  - por su traición
  - por su deslealtad
  - por su falta de fidelidad
  lexicon: HALOT
  rationale: מַעַל connota quebrantamiento de lealtad/fe de pacto. «Infidelidad» comunica bien la culpa relacional y covenantal en español contemporáneo.
theological_decisions:
- issue: Naturaleza del pecado de Judá en בְּמַעֲלָם
  english_pob_reading: covenantal unfaithfulness
  chosen_spanish_reading: infidelidad de pacto
  alternative_spanish_readings:
  - trespaso
  - transgresión
  - traición
  rationale: El término no describe solo error moral genérico, sino quiebra de lealtad ante Dios. «Infidelidad» preserva esa dimensión relacional y pactal sin añadir contenido no explicitado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor verbal de הָגְלוּ
  english_pob_reading: passive deportation ('was taken into exile')
  chosen_spanish_reading: pasivo de deportación ('fue llevado al exilio')
  alternative_spanish_readings:
  - fue exiliado
  - se fue al exilio
  rationale: La forma hofal señala que Judá recibe la acción, no que simplemente decide irse. Mantener esa pasividad respeta el juicio histórico-teológico del versículo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés POB que unió la última cláusula con punto y coma; en español también se mantiene una sola oración continua, con punto y coma antes de la cláusula final para reflejar mejor la estructura del hebreo y del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Judá» se conserva como sujeto colectivo-histórico, coherente con el tratamiento del inglés POB y con el contexto del exilio.
  - «Libro» se usa en sentido documental; no se traduce como «rollo» porque el contexto apunta a un registro escrito.
  - «Infidelidad» se eligió en lugar de «trespaso» para conservar la fuerza relacional/pactual del término hebreo sin perder claridad en español.
