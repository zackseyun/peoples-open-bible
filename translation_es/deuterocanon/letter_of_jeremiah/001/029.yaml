translation:
  language: es
  text: Porque, ¿cómo podrían ser llamados dioses[a], si las mujeres colocan ofrendas[b] delante de dioses de plata, de oro y de madera?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿De dónde podrían ser llamados dioses?»'
    reason: lexical_alternative
  - marker: b
    text: El verbo griego también puede renderizarse «poner delante» o «presentar a».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πόθεν
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de dónde
  - desde dónde
  lexicon: LSJ
  rationale: En la pregunta retórica, el griego expresa imposibilidad o carencia de base para llamarlos dioses; en español, 'cómo' comunica mejor esa fuerza que una traducción demasiado literal como 'de dónde'.
- source_word: κληθείησαν
  english_pob_choice: could they be called
  chosen_spanish: podrían ser llamados
  alternatives_spanish:
  - pudieran ser llamados
  - deberían ser llamados
  lexicon: LSJ
  rationale: El optativo aoristo pasivo conserva un matiz de posibilidad hipotética/imposible. 'Podrían ser llamados' reproduce bien esa fuerza en español.
- source_word: θεοί
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - ídolos
  - seres divinos
  lexicon: LSJ
  rationale: El texto griego usa 'dioses' de manera irónica/polemizante. Mantener 'dioses' preserva la ironía y el argumento del pasaje; 'ídolos' suavizaría la tensión del original.
- source_word: ὅτι
  english_pob_choice: since
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: LSJ
  rationale: '''Porque'' expresa con naturalidad la base causal de la pregunta retórica en español, sin perder el valor explicativo de la conjunción.'
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  lexicon: LSJ
  rationale: Se mantiene el referente específico de género del texto. El artículo definido ayuda a la fluidez en español.
- source_word: παρατιθέασιν
  english_pob_choice: set out offerings before
  chosen_spanish: colocan ofrendas delante de
  alternatives_spanish:
  - presentan ofrendas ante
  - ponen ofrendas delante de
  - colocan delante de
  lexicon: LSJ
  rationale: El verbo puede significar 'poner delante de' o 'presentar a'. En este contexto cultual, el español 'colocan ofrendas delante de' conserva el gesto ritual y hace explícita la acción implícita sin alejarse del griego.
- source_word: θεοῖς ἀργυροῖς καὶ χρυσοῖς καὶ ξυλίνοις
  english_pob_choice: silver and gold and wooden gods
  chosen_spanish: dioses de plata, de oro y de madera
  alternatives_spanish:
  - dioses plateados, dorados y de madera
  - dioses de plata, oro y madera
  - ídolos de plata, de oro y de madera
  lexicon: LSJ
  rationale: El griego mantiene el término 'dioses' mientras los califica por su material; en español, la construcción con 'de' refleja esa relación material de forma natural y preserva el efecto polémico del original.
theological_decisions:
- issue: Conservar el término 'dioses' en una polémica antiidolátrica
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - ídolos
  rationale: El texto no sustituye el sustantivo por una glosa interpretativa; usa 'dioses' para negar su legitimidad. Mantenerlo en español preserva la ironía argumentativa del pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo expresar el valor cultual de παρατιθέασιν
  english_pob_reading: set out offerings before
  chosen_spanish_reading: colocan ofrendas delante de
  alternative_spanish_readings:
  - presentan ofrendas ante
  - ponen ofrendas delante de
  rationale: El español necesita explicitar ligeramente el acto ritual para que no se pierda el sentido cultual del verbo griego. 'Colocan ofrendas delante de' conserva la relación espacial y sacrificial sin añadir contenido ajeno.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'for silver and gold and wooden gods' por 'before silver and gold and wooden gods' para reflejar con mayor precisión el dativo de παρατιθέασιν. La redacción española sigue esa revisión al usar 'delante de', y conserva el paralelismo entre la pregunta retórica y la acción cultual descrita.
  spanish_consistency_notes:
  - Se mantiene 'dioses' en lugar de 'ídolos' para conservar la ironía del texto griego.
  - '''Delante de'' refleja el valor espacial/cultual de παρατιθέασιν y evita una traducción demasiado abstracta.'
  - La conjunción causal se traduce con 'porque' por naturalidad y claridad en español.
  - Se preserva la especificidad de género en 'las mujeres'.
