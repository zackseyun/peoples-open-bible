  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general la secuencia y el sentido del hebreo: sepultura en la tumba de Asa en la Ciudad de David, colocación del cuerpo en un lecho funerario preparado con aromáticos, y una gran quema honorífica. Sin embargo, hay problemas de anclaje de notas y una formulación mejorable en «se había hecho cavar», que suena menos natural y algo más interpretativa que el hebreo simple «había excavado/cortado para sí».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta fallas formales importantes: la nota [a] está anclada a «tumba» aunque su contenido corresponde a «lecho/bier»; la nota [b] también trata «lecho», creando desorden; y la nota [c] no preserva la nota cultural principal del POB sobre la «quema». Además, «una muy grande quema» es comprensible pero algo rígido; «una quema muy grande» suena más natural sin perder literalidad.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones clave son en general adecuadas: «sepultaron», «Ciudad de David», «lecho», «especias», «ungüentos», «perfumista». Conviene alinear mejor la nota del lecho con el término hebreo מִשְׁכָּב y añadir la nota cultural sobre la quema honorífica, conforme al audit trail inglés.'
  issues:
  - severity: high
    issue: La nota [a] está mal anclada en «tumba».
    rationale: El contenido de la nota [a] habla de «parihuela funeraria/camilla mortuoria», que corresponde a בַּמִּשְׁכָּב («lecho/bier»), no a בְקִבְרֹתָיו («tumba»). Esto confunde la evidencia léxica y viola la disciplina de marcadores.
  - severity: medium
