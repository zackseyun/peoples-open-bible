id: 2PE.3.12
reference: 2 Peter 3:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: προσδοκῶντας καὶ σπεύδοντας τὴν παρουσίαν τῆς τοῦ θεοῦ ἡμέρας, δι’ ἣν οὐρανοὶ πυρούμενοι λυθήσονται καὶ στοιχεῖα καυσούμενα τήκεται·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/012.yaml
  text: as you wait for and hasten the coming of the day of God[a], because of which the heavens, being set on fire, will be dissolved, and the elements, burning[b], will melt.
  footnotes:
  - marker: a
    text: Or 'eagerly await the coming of the day of God.' The Greek verb can mean either 'hasten' or 'be eager for.'
    reason: alternative_reading
  - marker: b
    text: '''Elements'' may refer to the basic components of the world, or possibly the heavenly bodies.'
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님의 날의 재림[a]을 고대하며 또한 앞당기십시오. 그 날에 하늘은 불타 풀어지고, 원소들은 뜨겁게 달아올라 녹을 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 παρουσία. 3장 문맥의 종말적 도래로서 「재림」으로 옮긴다 (1:16의 「임재」와 구별).
    reason: lexical_alternative
lexical_decisions:
- source_word: παρουσίαν τῆς τοῦ θεοῦ ἡμέρας
  english_pob_choice: coming of the day of God
  chosen_korean: 하나님의 날의 재림
  alternatives_korean:
  - 하나님의 날의 도래
  lexicon: BDAG
  rationale: 3:4와 일관하여 「재림」.
- source_word: προσδοκῶντας καὶ σπεύδοντας
  english_pob_choice: wait for and hasten
  chosen_korean: 고대하며 ... 앞당기다
  alternatives_korean:
  - 기다리며 ... 재촉하다
  - 기대하며 ... 서두르다
  lexicon: BDAG
  rationale: σπεύδω는 「서두르다·재촉하다·간절히 바라다」. 신자가 그 날을 앞당기는 능동적 참여의 함의가 있다.
- source_word: στοιχεῖα
  english_pob_choice: elements
  chosen_korean: 원소들
  lexicon: BDAG
  rationale: 3:10과 일관; 용어집 표준.
- source_word: τήκεται
  english_pob_choice: will melt
  chosen_korean: 녹다
  lexicon: BDAG
  rationale: 금속이 녹듯 풀어짐.
