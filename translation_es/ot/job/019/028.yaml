revisions:
- from: 'Si decís[a]: “¿Cómo lo perseguiremos, si la raíz del asunto se halla en mí?”'
  to: 'Si dicen[a]: «¿Cómo lo perseguiremos, puesto que la raíz del asunto se halla en mí?»'
  rationale: Se cambió «decís» por «dicen» para mantener un español neutral y ampliamente legible. Se reemplazó el segundo «si» por «puesto que» para reflejar la fuerza explicativa documentada en la POB inglesa y evitar introducir una condición no presente en el sentido buscado. La nota se mantuvo sustancialmente igual, con leve ajuste estilístico para expresar mejor la alternativa semántica de רדף en español.
