translation:
  text: And Judith told her female slave to stand outside her sleeping chamber and watch for her going out[a], as on previous days, for she said that she would go out for her prayer[b]; and she spoke to Bagoas according to these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bedchamber' for 'sleeping chamber.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'as on the previous days' reflects Judith's established custom of going out to pray; more literally, 'as day by day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλῃ
  chosen: female slave
  alternatives:
  - maidservant
  - servant
  lexicon: LSJ
  rationale: From δοῦλος in the feminine dative singular. In this narrative context the bonded status is more explicit than a generic 'servant,' and the doctrine guidance allows 'slave' where bonded nature is salient. 'Female slave' preserves both gender and status.
- source_word: στῆναι
  chosen: to stand
  alternatives:
  - to remain
  - to stay
  lexicon: LSJ
  rationale: Aorist infinitive of ἵστημι. 'Stand' is the direct sense and fits the instruction to remain posted outside; broader renderings like 'stay' are possible but less literal.
- source_word: κοιτῶνος
  chosen: sleeping chamber
  alternatives:
  - bedchamber
  - room
  lexicon: LSJ
  rationale: κοίτων refers to a bedchamber or sleeping room. 'Sleeping chamber' is clear modern English without the archaic feel of 'bedchamber.'
- source_word: ἐπιτηρεῖν
  chosen: watch
  alternatives:
  - keep watch over
  - observe
  lexicon: LSJ
  rationale: The verb conveys watching attentively or keeping guard. 'Watch' is concise and natural here, with the object supplied by the following phrase.
- source_word: τὴν ἔξοδον αὐτῆς
  chosen: her going out
  alternatives:
  - her exit
  - the way out for her
  lexicon: LSJ
  rationale: ἔξοδος here refers to Judith's departure. 'Her going out' best matches the infinitival explanation that follows and avoids overly formal 'exit.'
- source_word: καθάπερ καθʼ ἡμέρας
  chosen: as on the previous days
  alternatives:
  - as every day
  - as day by day
  lexicon: LSJ
  rationale: The phrase indicates conformity with her established daily pattern. Because the context is her repeated custom, 'as on the previous days' communicates the sense more clearly than the wooden 'as according to days.'
- source_word: ἐξελεύσεσθαι
  chosen: she would go out
  alternatives:
  - she was going out
  - she would depart
  lexicon: LSJ
  rationale: Future middle infinitive after ἔφη gives the content of what she said. 'Would go out' fits reported speech naturally in English.
- source_word: προσευχὴν
  chosen: prayer
  alternatives:
  - time of prayer
  - praying
  lexicon: LSJ
  rationale: The noun directly denotes prayer. 'For her prayer' preserves the preposition ἐπί plus accusative as purpose/direction without overexpanding the phrase.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  chosen: in accordance with these words
  alternatives:
  - according to these words
  - to this effect
  lexicon: LSJ
  rationale: This phrase means in keeping with what had just been said. 'In accordance with these words' is slightly smoother than a more wooden rendering while remaining transparent to the Greek.
