translation:
  language: es
  text: Porque cualquier hombre[a] de la casa de Israel, o de entre el extranjero que mora en Israel[b], que se aparte de seguirme[c] y haga subir sus ídolos a su corazón, y ponga el tropiezo de su iniquidad delante de su rostro, y venga al profeta para consultarme por medio de él, yo, Yahvé[d], le responderé yo mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada hombre» o «cualquiera». El hebreo repite «hombre» con énfasis distributivo.'
    reason: lexical_alternative
  - marker: b
    text: «El extranjero que mora» se refiere a un no israelita que reside entre Israel; tradicionalmente, «extranjero residente».
    reason: cultural_note
  - marker: c
    text: 'Hebreo literal: «se aparta de detrás de mí», es decir, deja de seguirme o se desvía de mi camino.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «yo, Yahvé, le responderé por mí mismo» o «le responderé en persona». El hebreo es compacto y enfático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  english_pob_choice: any man
  chosen_spanish: cualquier hombre
  alternatives_spanish:
  - cada hombre
  - cualquiera
  lexicon: HALOT
  rationale: El hebreo repite אִישׁ para dar fuerza distributiva. «Cualquier hombre» conserva el singular masculino y la idea de caso individual, sin volverlo impersonal ni borrar la forma masculina del texto.
- source_word: מִבֵּית יִשְׂרָאֵל
  english_pob_choice: from the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de Israel
  - de la casa de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión de pacto «casa de Israel», más precisa que reducirla a solo «Israel».
- source_word: הַגֵּר ... יָגוּר
  english_pob_choice: the foreigner who sojourns
  chosen_spanish: el extranjero que mora
  alternatives_spanish:
  - el forastero que habita
  - el extranjero residente
  lexicon: HALOT
  rationale: גֵּר designa a un no israelita que vive entre Israel. «Extranjero que mora» comunica esa residencia sin imponer un tecnicismo ajeno al español bíblico natural.
- source_word: וְיִנָּזֵר מֵאַחֲרַי
  english_pob_choice: who separates himself from following me
  chosen_spanish: que se aparte de seguirme
  alternatives_spanish:
  - que se separe de mí
  - que se desvíe de seguirme
  lexicon: HALOT
  rationale: El nifal aquí expresa apartamiento de lealtad; «aparte de seguirme» conserva la imagen idiomática de «de detrás de mí» sin sonar forzado en español.
- source_word: וְיַעַל גִּלּוּלָיו אֶל לִבּוֹ
  english_pob_choice: and brings up his idols into his heart
  chosen_spanish: y haga subir sus ídolos a su corazón
  alternatives_spanish:
  - y suba sus ídolos a su corazón
  - y ponga sus ídolos en su corazón
  lexicon: HALOT
  rationale: El verbo עלה se conserva con «haga subir» para mantener la metáfora de elevación interna; «a su corazón» refleja el hebreo sin borrar la imagen.
- source_word: מִכְשׁוֹל עֲוֺנוֹ
  english_pob_choice: the stumbling block of his iniquity
  chosen_spanish: el tropiezo de su iniquidad
  alternatives_spanish:
  - el obstáculo de su pecado
  - la piedra de tropiezo de su culpa
  lexicon: HALOT
  rationale: «Tropiezo» reproduce con naturalidad la imagen de מִכְשׁוֹל. «Iniquidad» preserva el peso moral de עָוֹן, aunque sea un término más clásico; se evita suavizarlo a «pecado» donde el hebreo puede cargar culpa y perversidad.
- source_word: יָשִׂים נֹכַח פָּנָיו
  english_pob_choice: sets ... before his face
  chosen_spanish: ponga ... delante de su rostro
  alternatives_spanish:
  - coloque ... delante de su rostro
  - ponga ... ante su cara
  lexicon: HALOT
  rationale: La imagen deliberada de poner algo frente a uno mismo se conserva con «delante de su rostro», una forma clara y fiel al hebreo.
- source_word: וּבָא אֶל הַנָּבִיא
  english_pob_choice: and then comes to the prophet
  chosen_spanish: y venga al profeta
  alternatives_spanish:
  - y luego vaya al profeta
  - y entonces venga al profeta
  lexicon: HALOT
  rationale: El contexto ya implica la secuencia hipócrita; en español no es necesario añadir «entonces» para que la relación sea clara.
- source_word: לִדְרָשׁ לוֹ בִי
  english_pob_choice: to inquire of me through him
  chosen_spanish: para consultarme por medio de él
  alternatives_spanish:
  - para inquirir de mí por medio de él
  - para buscar de mí por medio de él
  lexicon: HALOT
  rationale: «Consultar» expresa bien דרשׁ en contexto profético. «Por medio de él» mantiene que el profeta es intermediario, no la fuente última de la respuesta.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I, Yahweh
  chosen_spanish: yo, Yahvé
  alternatives_spanish:
  - yo, Yahvé
  - yo soy Yahvé
  lexicon: HALOT
  rationale: Se conserva la fuerza enfática del pronombre antes del nombre divino. «Yahvé» sigue la norma del proyecto para יְהוָה, evitando la sustitución por «Señor».
- source_word: נַעֲנֶה לוֹ בִּי
  english_pob_choice: will answer him myself
  chosen_spanish: le responderé por mí mismo
  alternatives_spanish:
  - le responderé yo mismo
  - le responderé en persona
  lexicon: HALOT
  rationale: La expresión compacta final se vuelve natural en español con «por mí mismo», que mantiene la idea enfática de que Yahvé responde directamente, no solo por el profeta.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton, y la política del proyecto pide «Yahvé» en el texto principal. Se evita la convención de ocultarlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Respuesta directa de Yahvé frente al profeta
  english_pob_reading: will answer him myself
  chosen_spanish_reading: le responderé por mí mismo
  alternative_spanish_readings:
  - le responderé yo mismo
  - le responderé en persona
  rationale: La frase final subraya que la respuesta proviene del propio Yahvé, no meramente del profeta. «Por mí mismo» conserva el énfasis sin añadir una explicación que no está en el hebreo.
  doctrine_reference: Ezekiel 14:7 syntax and POB audit note on compact, emphatic answer
- issue: 'γ/?? no issue: distributive masculine singular in Hebrew'
  english_pob_reading: any man
  chosen_spanish_reading: cualquier hombre
  alternative_spanish_readings:
  - cada hombre
  - cualquiera
  rationale: El hebreo usa masculino singular distributivo. Se mantiene la referencia masculina singular en español, coherente con la forma y la política de precisión de género cuando el original la tiene.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incluir [a] en «cualquier hombre[a]», resolviendo el error previo de una nota sin marca visible en el texto. El resto de la redacción sigue de cerca el hebreo con apoyo del audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «casa de Israel» y «extranjero que mora» para mantener el registro bíblico y la precisión semántica.
  - «Consultar» se usa para דרשׁ en un contexto profético, evitando una paráfrasis más libre.
  - «Iniquidad» conserva el peso moral de עָוֹן y evita suavizar la expresión.
  - La clausula final mantiene el énfasis de respuesta directa divina con una formulación natural en español.
