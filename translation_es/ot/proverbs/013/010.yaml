translation:
  language: es
  text: Solo por la arrogancia viene la contienda[a], pero la sabiduría está con los que aceptan consejo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Solo por la insolencia viene la contienda, pero la sabiduría está con los bien aconsejados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: רַק limita de manera restrictiva la afirmación. «Solo» conserva en español esa fuerza de exclusión con un tono natural y proverbial.
- source_word: בְּזָדוֹן
  english_pob_choice: by arrogance
  chosen_spanish: por la arrogancia
  alternatives_spanish:
  - por la insolencia
  - por la soberbia
  - por la presunción
  lexicon: HALOT
  rationale: זָדוֹן expresa arrogancia presuntuosa o insolencia. «Arrogancia» comunica bien el matiz de autosuficiencia altiva; la preposición «por» transmite la relación causal/instrumental del hebreo.
- source_word: יִתֵּן
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - produce
  - genera
  - trae
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», el sentido proverbial es que la contienda surge de la arrogancia. «Viene» mantiene la naturalidad en español sin perder la idea causal.
- source_word: מַצָּה
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pleito
  - discordia
  - riña
  lexicon: HALOT
  rationale: מַצָּה denota conflicto o contienda. «Contienda» es un término sobrio y suficientemente amplio para el dicho sapiencial.
- source_word: וְאֶת
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y con
  - mientras que
  lexicon: HALOT
  rationale: La segunda cola es contrastiva. «Pero» reproduce mejor ese giro adversativo en español que una coordinación literal.
- source_word: נֹועָצִים
  english_pob_choice: those who take counsel
  chosen_spanish: los que toman consejo
  alternatives_spanish:
  - los bien aconsejados
  - los que reciben consejo
  - los que se aconsejan
  lexicon: HALOT
  rationale: El participio nifal de יעץ sugiere personas que aceptan o toman consejo. «Los que toman consejo» sigue de cerca la revisión inglesa y conserva el sentido de quienes consultan/aceptan consejo.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - habilidad
  lexicon: HALOT
  rationale: חָכְמָה es el término sapiencial estándar. «Sabiduría» mantiene la consistencia bíblica y el valor técnico del vocablo en Proverbios.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el rastro auditado en inglés: רַק como restricción («Solo»), בְּזָדוֹן con causalidad instrumental («por la arrogancia»), יִתֵּן como surgimiento idiomático («viene»), y נֹועָצִים según la revisión más reciente («los que toman consejo»).'
  spanish_consistency_notes:
  - Se mantiene «sabiduría» para חָכְמָה, en continuidad con el léxico sapiencial bíblico.
  - Se eligió «contienda» para מַצָּה como equivalente formal y comprensible; la nota preserva la alternativa inglesa «insolencia/contención» en caso de lectura más intensa.
  - No se introdujo terminología eclesiástica ajena al proverbio; el contraste moral queda expresado con vocabulario común y bíblico.
