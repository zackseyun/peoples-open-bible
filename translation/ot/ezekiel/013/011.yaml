id: EZK.13.11
reference: Ezekiel 13:11
source:
  edition: WLC
  text: אֱמֹ֛ר אֶל טָחֵ֥י תָפֵ֖ל וְ/יִפֹּ֑ל הָיָ֣ה גֶּ֣שֶׁם שׁוֹטֵ֗ף וְ/אַתֵּ֜נָה אַבְנֵ֤י אֶלְגָּבִישׁ֙ תִּפֹּ֔לְנָה וְ/ר֥וּחַ סְעָר֖וֹת תְּבַקֵּֽעַ־׀׃
translation:
  text: Tell those who plaster it with whitewash that it will fall[a]. There will be a flooding rain, and you, O hailstones, will fall[b], and a windstorm will break it open.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'you, hailstones, will fall,' directly addressing the hailstones for vivid effect.
    reason: lexical_alternative
  - marker: b
    text: Or 'a torrential rain' for 'a flooding rain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָחֵי תָפֵל
  chosen: those who plaster it with whitewash
  alternatives:
  - those who smear it with whitewash
  - those who plaster with flimsy coating
  lexicon: HALOT
  rationale: טָחֵי is a participle from טוח, 'to plaster/smear.' תָפֵל here refers to a superficial coating, traditionally 'whitewash.' In context (the flimsy wall of vv. 10–12), 'whitewash' best captures the deceptive, cosmetic nature of the plastering.
- source_word: וְיִפֹּל
  chosen: that it will fall
  alternatives:
  - and it will fall
  lexicon: HALOT
  rationale: The conjunction after 'Tell' introduces the content of the message. English idiom is smoother with 'that it will fall,' making explicit that the wall is the implied subject from context.
- source_word: גֶּשֶׁם שׁוֹטֵף
  chosen: a flooding rain
  alternatives:
  - an overflowing rain
  - a torrential rain
  lexicon: HALOT
  rationale: שׁוֹטֵף denotes something overflowing/sweeping away. 'Flooding rain' preserves both the heavy-rain image and the destructive force.
- source_word: וְאַתֵּנָה אַבְנֵי אֶלְגָּבִישׁ תִּפֹּלְנָה
  chosen: and you, O hailstones, will fall
  alternatives:
  - and hailstones will fall
  - and you hailstones shall fall
  lexicon: HALOT
  rationale: The independent pronoun אַתֵּנָה is feminine plural and gives vivid apostrophic force, directly addressing the hailstones. Retaining 'you, O hailstones' reflects the Hebrew emphasis better than flattening it to an impersonal clause.
- source_word: אַבְנֵי אֶלְגָּבִישׁ
  chosen: hailstones
  alternatives:
  - stones of hail
  lexicon: HALOT
  rationale: Literally 'stones of hail/crystal.' In meteorological judgment imagery, 'hailstones' is the natural English rendering.
- source_word: וְרוּחַ סְעָרוֹת
  chosen: a windstorm
  alternatives:
  - a storm wind
  - a tempestuous wind
  lexicon: HALOT
  rationale: The phrase denotes a violent storm wind. 'Windstorm' is clear modern English and preserves the destructive sense.
- source_word: תְּבַקֵּעַ
  chosen: will break it open
  alternatives:
  - will split it apart
  - will break through it
  lexicon: HALOT
  rationale: בקע in the piel conveys splitting/breaking open. Because the wall remains the implied object from context, 'break it open' makes the target explicit while preserving the force of structural rupture.
