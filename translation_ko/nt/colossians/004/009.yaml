  text: together with Onesimus, the faithful and beloved brother, who is one of you. They will make known to you everything here.
translation:
  language: ko
  text: 두기고와 함께 오네시모가 가는데, 그는 신실하고 사랑하는 형제이며 여러분 가운데 한 사람입니다. 그들이 이곳의 모든 일을 여러분에게 알릴 것입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: σὺν Ὀνησίμῳ
  english_pob_choice: together with Onesimus
  chosen_korean: 두기고와 함께 오네시모가 가는데
  alternatives_korean:
  - 오네시모와 함께
  lexicon: BDAG
  rationale: 한국어 자연성을 위해 앞 절의 「두기고」를 받아 「두기고와 함께 오네시모가 가는데」로 풀어 옮긴다.
- source_word: πιστῷ καὶ ἀγαπητῷ ἀδελφῷ
  english_pob_choice: the faithful and beloved brother
  chosen_korean: 신실하고 사랑하는 형제
  alternatives_korean:
  - 충성되고 사랑받는 형제
  lexicon: BDAG
  rationale: 표준 등가어.
- source_word: ὅς ἐστιν ἐξ ὑμῶν
  english_pob_choice: who is one of you
  chosen_korean: 여러분 가운데 한 사람
  alternatives_korean:
  - 여러분 중에서 나온 사람
  - 여러분에게서 난 사람
  lexicon: BDAG
  rationale: ἐξ ὑμῶν의 출신·소속을 「여러분 가운데 한 사람」으로 옮긴다.
- source_word: πάντα ὑμῖν γνωρίσουσιν τὰ ὧδε
  english_pob_choice: They will make known to you everything here
  chosen_korean: 그들이 이곳의 모든 일을 여러분에게 알릴 것입니다
  alternatives_korean:
  - 두 사람이 여기 일들을 여러분에게 다 알려 줄 것입니다
  lexicon: BDAG
  rationale: 미래 능동 3인칭 복수. 「이곳의 모든 일」로 자연스럽게 옮긴다.
