base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/021/023.yaml
  text: And Ornan said to David[a], “Take it for yourself, and let my lord the king do what is good in his eyes. See, I have given the oxen for burnt offerings, the threshing sledges for wood, and the wheat for the grain offering[d][c][b]. I have given it all.”
  footnotes:
  - marker: a
    text: Or, 'let my lord the king do what seems good to him.' The Hebrew idiom is literally 'what is good in his eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the oxen for burnt offerings.' The Hebrew term can refer broadly to cattle or more specifically to oxen.
    reason: lexical_alternative
  - marker: c
    text: That is, the threshing implements are offered to be used as fuel for the sacrifice.
    reason: cultural_note
  - marker: d
    text: Or 'offering' or 'tribute offering.' In sacrificial contexts, the Hebrew term commonly refers to a grain offering.
    reason: lexical_alternative
