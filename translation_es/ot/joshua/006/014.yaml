- from: Al segundo día dieron una vuelta alrededor de la ciudad una vez y regresaron al campamento[a][b]. Así hicieron durante seis días.
  to: Al segundo día dieron una vuelta a la ciudad y regresaron al campamento[a][b]. Así hicieron durante seis días.
