translation:
  language: es
  text: Sus servidores lo transportaron muerto desde Meguido y lo llevaron a Jerusalén[a], donde lo sepultaron en su sepultura. Entonces el pueblo de la tierra tomó a Jehoacaz, hijo de Josías, lo ungieron[b] y lo hicieron rey en lugar de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo hicieron montar»; el verbo hebreo dice literalmente «lo causaron a montar», aquí referido al traslado del cuerpo de Josías.'
    reason: lexical_alternative
  - marker: b
    text: «El pueblo de la tierra» es una expresión hebrea formal para la población local que actúa como cuerpo político.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְכִּבֻהוּ
  english_pob_choice: carried him
  chosen_spanish: lo transportaron
  alternatives_spanish:
  - lo llevaron
  - lo hicieron montar
  lexicon: HALOT
  rationale: El hiphil de רכב significa literalmente 'hacer montar'. En este contexto, con el complemento 'muerto desde Meguido', la idea es el traslado del cadáver; 'lo transportaron' comunica el hecho con naturalidad en español sin perder la base verbal hebrea. 'Lo hicieron montar' sería demasiado literal y chocaría con el contexto.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus siervos
  - sus criados
  - sus oficiales
  lexicon: HALOT
  rationale: El término puede referirse a servidores/funcionarios de corte. 'Servidores' conserva la amplitud del hebreo y funciona bien en un marco real; 'siervos' puede sonar más religioso y menos administrativo.
- source_word: מֵת
  english_pob_choice: dead
  chosen_spanish: muerto
  alternatives_spanish:
  - siendo muerto
  - ya muerto
  - como cadáver
  lexicon: HALOT
  rationale: El participio describe el estado de Josías durante el traslado. 'Muerto' es la forma natural y directa en español, preservando la condición de cadáver sin añadir interpretación.
- source_word: מִמְּגִדּוֹ
  english_pob_choice: from Megiddo
  chosen_spanish: desde Meguido
  alternatives_spanish:
  - de Meguido
  lexicon: HALOT
  rationale: La preposición de origen admite 'desde' o 'de'. 'Desde Meguido' destaca el movimiento de traslado y se ajusta al flujo narrativo.
- source_word: וַיְבִאֻהוּ יְרוּשָׁלַם
  english_pob_choice: brought him to Jerusalem
  chosen_spanish: lo llevaron a Jerusalén
  alternatives_spanish:
  - lo trajeron a Jerusalén
  - lo llevaron hasta Jerusalén
  lexicon: HALOT
  rationale: בוא con destino se expresa naturalmente con 'llevar'. 'Lo llevaron a Jerusalén' preserva la dirección y evita una calca innecesaria.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - lo depositaron en la tumba
  lexicon: HALOT
  rationale: קבר puede traducirse por 'enterrar' o 'sepultar'. 'Sepultar' mantiene un tono digno y funciona bien en contextos regios.
- source_word: בִּקְבֻרָתוֹ
  english_pob_choice: in his tomb
  chosen_spanish: en su sepultura
  alternatives_spanish:
  - en su tumba
  - en su lugar de sepultura
  lexicon: HALOT
  rationale: El sustantivo designa el lugar de entierro. 'Sepultura' conserva la relación formal con 'sepultar' y suena más sobria que 'tumba', aunque ambas son posibles.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la población del país
  - el pueblo del país
  - la gente de la tierra
  lexicon: HALOT
  rationale: Se conserva la expresión socio-política fija del hebreo. 'El pueblo de la tierra' suena menos interpretativo que 'la población del país' y mantiene el valor técnico de la fórmula.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - eligió
  - recogió
  - apresó
  lexicon: HALOT
  rationale: לקח es 'tomar'. Aquí introduce la acción de tomar a Jehoacaz para su instalación; 'tomó' preserva la cercanía al hebreo sin sobretraducir.
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Jehoacaz
  alternatives_spanish:
  - Joacaz
  lexicon: HALOT
  rationale: Se usa la forma castellana corriente del nombre, Jehoacaz, coherente con la tradición bíblica en español y reconocible para el lector.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: the son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - el hijo de Josías
  - Josías, su padre
  lexicon: HALOT
  rationale: La filiación se expresa de modo directo y natural en español. Se omite el artículo por estilo, sin perder la relación genealógica.
- source_word: וַיִּמְשְׁחוּ אֹתוֹ
  english_pob_choice: anointed him
  chosen_spanish: lo ungió
  alternatives_spanish:
  - lo consagró
  - lo ungieron
  lexicon: HALOT
  rationale: משח se traduce por 'ungir', término técnico para la investidura real. Se mantiene el sentido ceremonial y político del acto.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  english_pob_choice: made him king
  chosen_spanish: lo hicieron rey
  alternatives_spanish:
  - lo proclamaron rey
  - lo constituyeron rey
  lexicon: HALOT
  rationale: El hiphil de מלך indica hacer rey a alguien. 'Lo hicieron rey' reproduce con precisión la acción de entronización sin añadir una interpretación más específica que la del texto.
- source_word: תַּחַת אָבִיו
  english_pob_choice: in place of his father
  chosen_spanish: en lugar de su padre
  alternatives_spanish:
  - en vez de su padre
  - después de su padre
  lexicon: HALOT
  rationale: תחת expresa sustitución/sucesión. 'En lugar de su padre' comunica claramente la función sucesoria del giro hebreo.
theological_decisions:
- issue: Ungimiento real como acto de investidura
  english_pob_reading: anointed him
  chosen_spanish_reading: lo ungió
  alternative_spanish_readings:
  - lo consagró
  - lo nombró rey
  rationale: El texto usa el verbo técnico de unción; no debe rebajarse a una mera designación administrativa. 'Lo ungió' preserva el contenido ceremonial y monárquico del hebreo.
  doctrine_reference: 1 Samuel 10:1; 16:13; 2 Reyes 9:3
- issue: Expresión socio-política 'el pueblo de la tierra'
  english_pob_reading: The people of the land is a formal Hebrew expression for the local populace acting as a political body.
  chosen_spanish_reading: el pueblo de la tierra
  alternative_spanish_readings:
  - la gente del país
  - la población del país
  rationale: Se conserva la fórmula técnica para no diluir su posible valor político. En español, una equivalencia más explicativa introduciría interpretación no garantizada por el verso mismo.
  doctrine_reference: 2 Reyes 11:14; 21:24
- issue: Traslado del cuerpo de Josías
  english_pob_reading: carried him dead
  chosen_spanish_reading: lo transportaron muerto
  alternative_spanish_readings:
  - lo llevaron ya muerto
  - trasladaron su cuerpo
  rationale: El hebreo combina el verbo causal 'hacer montar' con la indicación de que iba muerto. La versión española evita la calca de 'hacer montar' pero mantiene el dato de que el traslado fue del cadáver, no de un vivo.
  doctrine_reference: 2 Reyes 23:30
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del auditoría inglesa sin cambios sustanciales. La principal decisión en español fue evitar una calca de 'lo hicieron montar' y optar por una expresión natural que preserve el traslado del cadáver, manteniendo nota alternativa. También se mantuvo la fórmula técnica 'el pueblo de la tierra' y el verbo técnico 'ungir'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa 'ungió' para משח y 'lo hizo rey' para מלך, manteniendo distinción entre unción e instalación.
  - '''Sepultura'' se elige por sobriedad y cohesión con ''sepultar'', aunque ''tumba'' también sería posible.'
  - '''Pueblo de la tierra'' se conserva como fórmula fija, no como referencia genérica al territorio.'
