translation:
  language: es
  text: Y fuerzas de él[a] se levantarán, y profanarán el santuario fortaleza[b], y quitarán el holocausto continuo[c], y pondrán la abominación desoladora[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «brazos» o «fuerzas militares» para «fuerzas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el santuario, la fortaleza»; posiblemente «el santuario fortificado».'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «el regular/continuo»; se refiere al holocausto diario continuo.'
    reason: lexical_alternative
  - marker: d
    text: O «la abominación que desola».
    reason: alternative_reading
lexical_decisions:
- source_word: וּזְרֹעִים
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - brazos
  - fuerzas militares
  lexicon: HALOT
  rationale: El hebreo literalmente significa «brazos», pero en contexto político-militar designa poder armado o fuerzas. «Fuerzas» comunica el valor idiomático con naturalidad en español sin perder la referencia militar.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: procedentes de él
  alternatives_spanish:
  - de él
  - por su parte
  lexicon: HALOT
  rationale: La forma pronominal apunta naturalmente al personaje previo. «Procedentes de él» conserva la procedencia y la referencia personal, con un matiz algo más fluido en español que el simple «de él».
- source_word: יַעֲמֹדוּ
  english_pob_choice: will arise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - aparecerán
  - se pondrán en pie
  lexicon: HALOT
  rationale: El verbo básico es «estar de pie», pero en una secuencia político-militar expresa surgir o presentarse para actuar. «Se levantarán» mantiene esa fuerza dinámica sin alejarse del hebreo.
- source_word: וְחִלְּלּוּ
  english_pob_choice: they will profane
  chosen_spanish: profanarán
  alternatives_spanish:
  - contaminarán
  - desacralizarán
  lexicon: HALOT
  rationale: El piel indica tratar como común o profano, especialmente en contexto del santuario. «Profanarán» es el equivalente español más directo y formal.
- source_word: הַמִּקְדָּשׁ הַמָּעוֹז
  english_pob_choice: the sanctuary fortress
  chosen_spanish: el santuario fortaleza
  alternatives_spanish:
  - el santuario fortificado
  - la fortaleza del santuario
  lexicon: HALOT
  rationale: La construcción hebrea une dos sustantivos sin resolver explícitamente la relación. «Santuario fortaleza» preserva la compresión del original y deja visible la tensión sintáctica, en vez de suavizarla excesivamente.
- source_word: וְהֵסִירוּ
  english_pob_choice: and remove
  chosen_spanish: y quitarán
  alternatives_spanish:
  - y retirarán
  - y apartarán
  lexicon: HALOT
  rationale: El hiphil significa causar que algo se vaya o sea removido. «Quitarán» es claro y natural en español, y puede abarcar la supresión del elemento cultual.
- source_word: הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - la ofrenda regular
  - el sacrificio continuo
  lexicon: HALOT
  rationale: En el contexto cultual de Daniel, הַתָּמִיד alude al sacrificio diario continuo. «Holocausto regular» explicita el referente sacrificial que el hebreo presupone, sin dejar de reflejar la idea de continuidad.
- source_word: וְנָתְנוּ
  english_pob_choice: and set up
  chosen_spanish: y pondrán
  alternatives_spanish:
  - y colocarán
  - y establecerán
  lexicon: HALOT
  rationale: Aquí el verbo puede denotar poner o instalar algo. «Pondrán» mantiene la simplicidad del original y deja abierta la naturaleza exacta del objeto, como hace el texto hebreo.
- source_word: הַשִּׁקּוּץ
  english_pob_choice: the abomination
  chosen_spanish: la abominación
  alternatives_spanish:
  - la cosa detestable
  - el ídolo abominable
  lexicon: HALOT
  rationale: «Abominación» es la traducción establecida y todavía transparente en español para algo ritualmente detestable, especialmente en Daniel.
- source_word: מְשׁוֹמֵם
  english_pob_choice: that desolates
  chosen_spanish: desoladora
  alternatives_spanish:
  - que desola
  - causante de desolación
  lexicon: HALOT
  rationale: El participio expresa la acción de provocar desolación. «Desoladora» condensa bien la fuerza adjetival en español y conserva el sentido activo del hebreo.
theological_decisions:
- issue: Relación entre הַמִּקְדָּשׁ y הַמָּעוֹז
  english_pob_reading: Render both nouns in sequence as 'the sanctuary fortress,' preserving the Hebrew appositional ambiguity.
  chosen_spanish_reading: Traducir ambos sustantivos en secuencia como «el santuario fortaleza», preservando la ambigüedad appositiva.
  alternative_spanish_readings:
  - el santuario fortificado
  - la fortaleza del santuario
  rationale: El hebreo presenta dos sustantivos yuxtapuestos sin explicitar el vínculo. La versión española mantiene esa compresión para no decidir de más entre una aposición simple y una noción de santuario fortificado.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de הַתָּמִיד
  english_pob_reading: Translate as 'the regular burnt offering' in the main text.
  chosen_spanish_reading: Traducirlo como «el holocausto regular» en el texto principal.
  alternative_spanish_readings:
  - la ofrenda regular
  - el sacrificio continuo
  rationale: Aunque el hebreo no añade el sustantivo «ofrenda» de forma explícita, el uso cultual en Daniel apunta al sacrificio diario. «Holocausto regular» explicita el referente sin perder la idea de continuidad.
  doctrine_reference: Translation philosophy §1, §6
- issue: Carácter de מְשׁוֹמֵם
  english_pob_reading: '''the abomination that desolates'''
  chosen_spanish_reading: «la abominación desoladora»
  alternative_spanish_readings:
  - la abominación que desola
  - la abominación causante de desolación
  rationale: El participio puede leerse como un calificativo activo. La forma adjetival española conserva la brevedad y la carga apocalíptica del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente en inglés eliminó la coma en «sanctuary fortress» para reflejar mejor la construcción hebrea compacta. Esta versión española sigue esa decisión con «el santuario fortaleza», sin introducir una pausa que separaría indebidamente los dos sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece explícitamente.
  - Se usa «profanarán» para חלל y «abominación» para שִׁקּוּץ, en línea con el registro apocalíptico del libro.
  - Se conserva una solución compacta para הַמִּקְדָּשׁ הַמָּעוֹז, evitando una paráfrasis que suavice la tensión sintáctica del hebreo.
  - «Holocausto regular» explicita el referente cultual implícito en הַתָּמִיד, siguiendo la claridad del audit trail inglés.
