    text: O ‘pestilencia’; el término hebreo designa una epidemia mortal que afecta al ganado.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al pie para que ancle correctamente en 'plaga', que es el término explicado por la nota. Se ajusta la lista final de animales para reflejar con mayor fidelidad בָּקָר וּבַצֹּאן y mejorar la naturalidad en español. Se usa raya para seguir más de cerca la estructura enfática del original y del audit trail inglés. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.
