translation:
  language: es
  text: Y su encargo[a] era el arca, la mesa, el candelabro, los altares, los utensilios del santuario[b] con los que ministraban, la cortina de entrada[c], y todo el servicio relacionado con ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su cargo era» o «su responsabilidad era».
    reason: lexical_alternative
  - marker: b
    text: O «los vasos sagrados» o «los utensilios del lugar santo».
    reason: lexical_alternative
  - marker: c
    text: Es decir, la cortina o colgadura de la entrada; no el velo interior.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִשְׁמַרְתָּם
  english_pob_choice: And their duty was
  chosen_spanish: Y su encargo era
  alternatives_spanish:
  - Y su cargo era
  - Y su responsabilidad era
  - Y su deber era
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת en este contexto sacerdotal/tabernacular expresa una tarea asignada, un encargo o responsabilidad, no una mera vigilancia física. «Encargo» conserva ese sentido de responsabilidad encomendada y suena natural en español.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del testimonio
  - el cofre
  lexicon: HALOT
  rationale: אָרוֹן en el contexto del tabernáculo designa el arca sagrada. «Arca» es el equivalente natural y fiel; no se añade «del testimonio» porque el hebreo aquí no lo dice.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa de los panes de la Presencia
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la mesa». En el contexto tabernacular, «mesa» comunica con claridad el mueble sagrado sin añadir especificaciones que el texto no ofrece.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - la menorá
  - el lampadario
  lexicon: HALOT
  rationale: מְנוֹרָה designa el candelabro cultual. «Candelabro» transmite el objeto en español actual; «menorá» sería transliteración menos explicativa.
- source_word: הַמִּזְבְּחֹת
  english_pob_choice: the altars
  chosen_spanish: los altares
  alternatives_spanish:
  - los altares del santuario
  - los altares rituales
  lexicon: HALOT
  rationale: El plural hebreo indica más de un altar. «Los altares» es la forma directa y transparente; el contexto ya sitúa su uso cultual.
- source_word: וּכְלֵי הַקֹּדֶשׁ
  english_pob_choice: the vessels of the sanctuary
  chosen_spanish: los utensilios del santuario
  alternatives_spanish:
  - los vasos del santuario
  - los utensilios sagrados
  - los vasos santos
  lexicon: HALOT
  rationale: כְּלִים puede significar utensilios, instrumentos o vasos. «Utensilios del santuario» mantiene el sentido de objetos de uso sagrado sin forzar el español ni introducir un término demasiado técnico.
- source_word: אֲשֶׁר יְשָׁרְתוּ בָהֶם
  english_pob_choice: with which they minister
  chosen_spanish: con los que ministraban
  alternatives_spanish:
  - con los que servían
  - con los que realizaban el servicio
  lexicon: HALOT
  rationale: שׁרת en contexto cultual se refiere al ministerio/servicio sagrado. «Ministraban» preserva ese registro litúrgico mejor que «servían», que en español puede sonar demasiado general.
- source_word: הַמָּסָךְ
  english_pob_choice: the screen
  chosen_spanish: la cortina de entrada[a]
  alternatives_spanish:
  - el telón de entrada
  - la cortina
  - el velo de entrada
  lexicon: HALOT
  rationale: מָסָךְ en el tabernáculo es una cortina o colgadura de la entrada, no el velo interior. «Cortina de entrada» aclara la función y evita confundirla con el velo del santuario interior.
- source_word: וְכָל עֲבֹדָתוֹ
  english_pob_choice: and all its service
  chosen_spanish: y todo su servicio
  alternatives_spanish:
  - y toda su labor
  - y todo el servicio relacionado con él
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto cultual significa servicio o labor sagrada. «Servicio» conserva el registro del texto y permite que el sufijo singular («su») abarque el conjunto del ministerio asociado.
theological_decisions:
- issue: Registro cultual de שׁרת / עֲבֹדָה
  english_pob_reading: Use 'minister' and 'service' to preserve sacred/tabernacle connotations without importing later ecclesiastical language.
  chosen_spanish_reading: Usar «ministraban» y «servicio» para conservar el tono cultual del tabernáculo sin introducir lenguaje eclesiástico posterior.
  alternative_spanish_readings:
  - Usar «servían» y «labor»
  - Usar «realizaban el servicio»
  rationale: El versículo es administrativo, pero su vocabulario pertenece al ámbito sacerdotal. «Ministraban» y «servicio» mantienen ese matiz sacro y siguen siendo comprensibles en español moderno.
  doctrine_reference: Consistencia terminológica en contexto sacerdotal/tabernacular; evitar anacronismos eclesiásticos.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la última revisión; no se registraron cambios aplicados. La versión española sigue de cerca las decisiones léxicas documentadas, ajustando solo la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; este versículo no lo incluye.
  - Se conservó el tono cultual con «ministraban» y «servicio», coherente con la POB inglesa.
  - «Arca», «mesa», «candelabro» y «altares» reproducen los objetos del tabernáculo sin sobreexplicar más allá del hebreo.
  - La nota sobre la «cortina de entrada» preserva la distinción entre מָסָךְ y el velo interior.
