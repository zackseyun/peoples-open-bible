translation:
  language: es
  text: Mejor es la maldad de un hombre que la bondad de una mujer[a], y una mujer vergonzosa trae reproche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La segunda mitad del versículo es difícil en hebreo; el paralelo griego se lee de manera más directa: ''y una mujer que causa vergüenza lleva al reproche'', lo que sostiene el sentido aquí reflejado.'
    reason: alternative_reading
lexical_decisions:
- source_word: κρείσσων / מטוב
  english_pob_choice: better ... than
  chosen_spanish: Mejor es ... que ...
  alternatives_spanish:
  - Más valiosa es ... que ...
  - Preferible es ... a ...
  lexicon: HALOT; LXX κρείσσων
  rationale: La comparación proverbial exige una construcción comparativa natural en español. 'Mejor es' conserva la fuerza sentenciosa sin alejarse del hebreo comparativo ni del paralelo griego.
- source_word: πονηρία / רוע
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad moral
  - maldad/wickedness
  - perversidad
  lexicon: HALOT; LSJ
  rationale: El término apunta a mal moral, no solo a 'mala conducta'. 'Maldad' es claro y sobrio en español; mantiene la oposición ética del proverbio.
- source_word: ἀνδρὸς / איש
  english_pob_choice: a man
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de un varón
  - de un marido
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego contrastan explícitamente varón y mujer. En español, 'un hombre' reproduce el contraste sin neutralizar el género ni introducir connotaciones conyugales no requeridas.
- source_word: ἀγαθοποιὸς γυνή / מטוב אשה
  english_pob_choice: a woman's goodness
  chosen_spanish: la bondad de una mujer
  alternatives_spanish:
  - la bondad de la mujer
  - la mujer buena
  - la bondad femenina
  lexicon: LSJ; HALOT
  rationale: La relación genitiva/comparativa se expresa con naturalidad como 'la bondad de una mujer'. Evita convertir el adjetivo en una descripción interpretativa ('mujer buena') que suavizaría la forma proverbial.
- source_word: καταισχύνουσα
  english_pob_choice: a shameful woman / causing shame
  chosen_spanish: una mujer que causa vergüenza
  alternatives_spanish:
  - una mujer vergonzosa
  - una mujer que avergüenza
  - una mujer que trae vergüenza
  lexicon: LSJ
  rationale: El participio activo tiene valor causativo. 'Que causa vergüenza' conserva la acción de deshonrar/avergonzar y evita reducirlo solo a una cualidad estática.
- source_word: εἰς ὀνειδισμόν / חרפת
  english_pob_choice: brings reproach
  chosen_spanish: trae reproche
  alternatives_spanish:
  - produce reproche
  - queda en reproche
  - trae deshonra
  lexicon: LSJ; HALOT
  rationale: '''Reproche'' corresponde bien a ὀνειδισμός y a חרפה. ''Trae'' reproduce el resultado del acto en un español idiomático, manteniendo el sentido de consecuencia pública y vergonzante.'
theological_decisions:
- issue: Mantener el contraste de género del proverbio sin suavizarlo
  english_pob_reading: Retain the source's gender-specific contrast ('a man' / 'a woman') without softening or universalizing.
  chosen_spanish_reading: Conservar 'un hombre' / 'una mujer' en el texto principal.
  alternative_spanish_readings:
  - una persona ... que ...
  - el ser humano ...
  - un varón ... una mujer ...
  rationale: El dicho es deliberadamente contrastivo y no conviene universalizarlo en español. La traducción debe dejar visible la dureza retórica del texto sapiencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Tratamiento de la cláusula final difícil
  english_pob_reading: Follow the Hebrew as primary while allowing the Greek parallel to clarify the sense of the difficult final clause.
  chosen_spanish_reading: Traducir el final como 'una mujer que causa vergüenza trae reproche', con el griego apoyando el sentido causativo.
  alternative_spanish_readings:
  - y una mujer vergonzosa es un reproche
  - y una mujer que avergüenza queda en reproche
  - y una mujer que causa vergüenza se vuelve un reproche
  rationale: El hebreo y el griego convergen en la idea de deshonra/reproche, aunque el hebreo es difícil. La redacción española sigue ese sentido sin fingir certeza absoluta sobre cada giro del original.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que simplificó la segunda cláusula desde una formulación más explicativa hacia una más directa ('a shameful woman brings reproach'). La versión española conserva esa línea revisada, pero mantiene explícita la causación ('causa vergüenza') para reflejar con mayor transparencia el participio griego y la dificultad del hebreo.
  spanish_consistency_notes:
  - Se usó 'maldad' para רוע / πονηρία, evitando 'maldad' en sentido meramente conductual o 'perversidad' más fuerte de lo que exige el proverbio.
  - Se prefirió 'reproche' para ὀνειδισμόν / חרפה por coherencia con el campo semántico de deshonra pública.
  - No se empleó 'SEÑOR' ni terminología cristológica; el versículo no lo requiere.
  - El texto principal evita arcaísmos innecesarios y mantiene un tono sapiencial sobrio y publicable en español latinoamericano.
