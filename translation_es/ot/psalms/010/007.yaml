translation:
  language: es
  text: Su boca está llena de maldición[a], de engaño y de opresión; debajo de su lengua hay daño y maldad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'juramento' para 'maldición'; el sustantivo hebreo también puede denotar un juramento en algunos contextos, pero aquí el contexto de habla hostil favorece 'maldición'.
    reason: lexical_alternative
  - marker: b
    text: O 'maldad e iniquidad' para 'daño y maldad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָלָה
  english_pob_choice: cursing
  chosen_spanish: maldición
  alternatives_spanish:
  - maldición jurada
  - imprecación
  - maldición/curse
  lexicon: HALOT
  rationale: En este contexto de habla hostil, el sustantivo se refiere mejor a una maldición dirigida contra otros, no a un juramento neutral. 'Maldición' comunica bien la fuerza imprecatoria sin forzar una paráfrasis.
- source_word: פִּיהוּ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - la boca de él
  lexicon: HALOT
  rationale: Conserva la imagen concreta del órgano del habla y mantiene el paralelismo hebreo de la expresión idiomática.
- source_word: מָלֵא
  english_pob_choice: is full of
  chosen_spanish: está llena de
  alternatives_spanish:
  - está llena de
  - está colmada de
  lexicon: HALOT
  rationale: Es una equivalencia natural del valor estativo del verbo, preservando la idea de abundancia.
- source_word: מִרְמוֹת
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - engaño
  lexicon: HALOT
  rationale: '''Engaño'' refleja de manera concisa la idea de falsedad o treta; funciona bien junto con ''maldición'' y ''opresión'' en español contemporáneo.'
- source_word: וָ/תֹךְ
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - fraude
  - opresión
  - opresión y dolo
  lexicon: HALOT
  rationale: En esta construcción, el término apunta a daño o abuso ejercido sobre otros. 'Opresión' conserva ese peso social y moral en español.
- source_word: תַּחַת לְשׁוֹנוֹ
  english_pob_choice: under his tongue
  chosen_spanish: debajo de su lengua
  alternatives_spanish:
  - bajo su lengua
  - debajo de su lengua
  lexicon: HALOT
  rationale: La traducción literal preserva la imagen vívida de lo oculto y guardado bajo la lengua, sin suavizarla.
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: afán
  alternatives_spanish:
  - afán
  - trabajo duro
  - miseria
  - penas
  lexicon: HALOT
  rationale: Aquí el término no designa trabajo ordinario, sino aflicción o labor dañina. 'Afán' puede expresar molestia, penuria o empeño perjudicial en un español amplio; se elige por su brevedad, aunque la nota conserva la alternativa semántica de 'trouble/mischief'.
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - iniquidad
  - maldad
  - mal
  lexicon: HALOT
  rationale: '''Maldad'' comunica el valor moral negativo del término con claridad moderna. En español, ''iniquidad'' es posible, pero ''maldad'' resulta más directo y natural en el paralelismo.'
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa POB coinciden estrechamente; no se detectaron revisiones aplicadas en el pasaje auditado. La versión española sigue la misma lectura, manteniendo el paralelismo y la distinción entre los términos de habla maligna y lo que se oculta 'debajo de su lengua'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó la secuencia tripartita 'maldición, engaño y opresión' para reflejar la acumulación hebrea.
  - '''Debajo de su lengua'' reproduce la metáfora sin interpretarla; la segunda cola queda separada por un punto y coma, como en el inglés POB.'
