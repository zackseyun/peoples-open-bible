translation:
  language: es
  text: Estoy pidiendo por ellos[a]. No estoy pidiendo por el mundo, sino por los que me has dado[b], porque son tuyos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "acerca de ellos"; la preposición griega puede expresar tanto "por" como "acerca de" en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O "ruego"; el verbo griego más literalmente significa "pido" o "solicito".
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρωτῶ
  english_pob_choice: am asking
  chosen_spanish: estoy pidiendo
  alternatives_spanish:
  - pido
  - estoy rogando
  - estoy orando
  lexicon: BDAG
  rationale: El verbo griego ἐρωτάω significa básicamente 'pedir/solicitar'. En este contexto de oración intercesora, 'estoy pidiendo' conserva la transparencia léxica mejor que una formulación más litúrgica como 'estoy orando', sin perder el sentido devocional del pasaje.
- source_word: περὶ αὐτῶν
  english_pob_choice: on their behalf
  chosen_spanish: por ellos
  alternatives_spanish:
  - a favor de ellos
  - en favor de ellos
  - por causa de ellos
  lexicon: BDAG
  rationale: La preposición περί con genitivo puede expresar 'acerca de' o 'en favor de/por'. Dado que el contexto es intercesión, 'por ellos' refleja naturalmente el valor de beneficio o representación que la POB inglesa explicitó con 'on their behalf'.
- source_word: κόσμου
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la humanidad
  - el sistema del mundo
  - el mundo incrédulo
  lexicon: BDAG
  rationale: κόσμος se mantiene como 'el mundo' para conservar la tensión joánica entre el mundo y los que el Padre ha dado al Hijo, sin resolverla interpretativamente.
- source_word: ὧν δέδωκάς μοι
  english_pob_choice: those whom you have given me
  chosen_spanish: los que me has dado
  alternatives_spanish:
  - aquellos que me has dado
  - las personas que me has dado
  lexicon: BDAG
  rationale: El relativo con el perfecto se vierte de manera personal y natural en español como 'los que me has dado'. El perfecto δέδωκάς se expresa con 'has dado' para conservar la acción pasada con validez presente.
- source_word: δέδωκάς
  english_pob_choice: have given
  chosen_spanish: has dado
  alternatives_spanish:
  - diste
  lexicon: BDAG
  rationale: El perfecto griego comunica una dádiva ya realizada con efecto continuo; 'has dado' preserva mejor ese valor que el pretérito simple 'diste'.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón de la intercesión. 'Porque' expresa con claridad la relación causal en español.
- source_word: σοί εἰσιν
  english_pob_choice: they are yours
  chosen_spanish: son tuyos
  alternatives_spanish:
  - te pertenecen
  - son de ti
  lexicon: BDAG
  rationale: La frase copulativa con dativo posesivo se vierte de forma idiomática como 'son tuyos', manteniendo la relación de pertenencia sin sobreexplicarla.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Se mantiene el pronombre explícito para reproducir el énfasis del sujeto en la estructura contrastiva del versículo.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: En español, 'sino' expresa mejor la corrección contrastiva de 'no... sino...' que el griego ἀλλά en esta construcción.
theological_decisions:
- issue: Matiz intercesorio de περὶ con ἐρωτῶ
  english_pob_reading: on their behalf
  chosen_spanish_reading: por ellos
  alternative_spanish_readings:
  - en favor de ellos
  - a favor de ellos
  - sobre ellos
  rationale: Aunque ἐρωτάω significa 'pedir', el contexto de la oración al Padre hace que περί funcione como intercesión. 'Por ellos' comunica esa función sin introducir una paraphrasis más larga que la del original.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de 'el mundo'
  english_pob_reading: the world without interpretive narrowing
  chosen_spanish_reading: el mundo
  alternative_spanish_readings:
  - la humanidad en general
  - el mundo incrédulo
  - el sistema del mundo
  rationale: Se conserva κόσμος sin definirlo más allá de la oposición textual entre el mundo y los que el Padre ha dado al Hijo. Así se preserva la tensión teológica joánica.
  doctrine_reference: Affirmations on avoiding denominational narrowing; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió una expresión intercesora ('on their behalf') para περὶ con ἐρωτῶ. El español adopta esa lectura con 'por ellos', manteniendo también la transparencia del verbo 'pedir' y el contraste explícito con 'el mundo'.
  spanish_consistency_notes:
  - Se mantuvo 'el mundo' para κόσμος, en coherencia con el uso joánico y con la práctica POB de no estrechar el campo semántico sin necesidad.
  - Se evitó 'Cristo' y se conservó la referencia personal directa a Jesús mediante el contexto del pasaje.
  - Se usó 'has dado' para el perfecto griego δέδωκάς, preservando la continuidad de la acción.
