translation:
  language: es
  text: En cuanto a la palabra que nos has dicho en nombre de Yahvé, no te escucharemos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te obedeceremos». El verbo hebreo puede implicar tanto oír como hacer caso; el texto principal conserva el sentido léxico más directo, mientras que el contexto deja clara la negativa a obedecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - el mensaje
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘cosa’. Aquí se trata de la declaración profética dirigida al pueblo, y ‘la palabra’ conserva bien la referencia al dicho concreto y suena natural en español bíblico actual.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Es la relativa restrictiva natural en español para introducir el contenido de ‘la palabra’ sin añadir matiz innecesario.
- source_word: דִּבַּרְתָּ
  english_pob_choice: you have spoken
  chosen_spanish: tú nos has hablado
  alternatives_spanish:
  - tú hablaste
  - tú dijiste
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya realizada con relevancia en el presente del discurso. ‘Nos has hablado’ mantiene el acto de comunicar dirigido a los oyentes, y evita debilitar el verbo a un simple ‘decir’.
- source_word: אֵלֵינוּ
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - contra nosotros
  lexicon: HALOT
  rationale: El complemento indirecto en español comunica de manera directa la dirección del habla (‘nos has hablado’). ‘Contra nosotros’ sería interpretativo y no necesario en el texto principal.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - por autoridad de Yahvé
  - en el nombre de Yahvé
  lexicon: HALOT
  rationale: La expresión idiomática indica hablar representando la autoridad divina. Se conserva el nombre propio ‘Yahvé’, conforme al criterio POB, en lugar de sustituirlo por un título.
- source_word: אֵינֶנּוּ שֹׁמְעִים
  english_pob_choice: we will not listen
  chosen_spanish: no te escucharemos
  alternatives_spanish:
  - no te oiremos
  - no obedeceremos
  lexicon: HALOT
  rationale: שׁמע puede implicar tanto oír como prestar atención/obedecer. ‘Escucharemos’ refleja bien el valor de atender al mensaje, y el futuro de negación expresa la firme decisión del rechazo sin introducir ‘obedecer’ en el texto principal.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: HALOT
  rationale: En español, el pronombre átono es la forma más natural para mantener la referencia directa a Jeremías y conservar la fuerza personal del rechazo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama. Según la práctica doctrinal del proyecto, se translitera como ‘Yahvé’ para preservar el nombre personal de Dios en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de שׁמע en un contexto de rechazo profético
  english_pob_reading: listen
  chosen_spanish_reading: escucharemos
  alternative_spanish_readings:
  - obedeceremos
  - haremos caso
  rationale: La traducción principal mantiene el valor léxico de ‘escuchar/prestar atención’ y deja que el contexto exprese la desobediencia implícita. ‘Obedeceremos’ sería más interpretativo y fuerte que el hebreo inmediato.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y coincide con la lectura auditada en inglés: mantiene el sustantivo ‘palabra’, la frase idiomática ‘en nombre de Yahvé’ y la negación de שׁמע como ‘no te escucharemos’, sin perder la tensión entre oír y obedecer. No se requieren revisiones adicionales según el registro de auditoría más reciente.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se evitó ‘obedeceremos’ en el texto principal para no borrar la ambigüedad lexical de שׁמע.
  - ‘Nos has hablado’ refleja mejor la relación entre el hablante y el destinatario que una traducción más plana con ‘has dicho’.
  - La estructura inicial ‘En cuanto a…’ reproduce con naturalidad el hebreo enfático de הַדָּבָר sin sobrecargar el español.
