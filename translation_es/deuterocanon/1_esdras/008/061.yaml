base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/061.yaml
  text: And after setting out from the place Thera on the twelfth day of the first month[a], they came to Jerusalem by the mighty hand of our Lord that was upon us; and he rescued us from every enemy from the outset[c][b], and they came to Jerusalem.
  footnotes:
  - marker: a
    text: The Greek names the departure point as 'Thera'; the Hebrew parallel in Ezra 8:31 reads 'the river Ahava.' Because 1 Esdras is translated from the Greek here, 'Thera' is kept in the main text.
    reason: alternative_reading
  - marker: b
    text: The Greek phrase literally reads something like 'from the approach/entrance from every enemy,' which is difficult in context. The Hebrew parallel has 'from the hand of the enemy and ambush on the way,' which supports the sense 'from every enemy encountered on the way.'
    reason: textual_variant
  - marker: c
    text: Some Greek wording here appears irregular, including a shift from 'us' to 'they came.' The translation smooths this to 'we came' to match the surrounding first-person narrative and the Hebrew parallel.
    reason: textual_variant
