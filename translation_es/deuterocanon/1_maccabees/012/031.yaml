revisions:
- from: Y Jonatán se desvió contra los árabes llamados los zabadéos, y los hirió, y tomó sus despojos.
  to: Y Jonatán se volvió contra los árabes llamados zabadeos, y los atacó, y tomó sus despojos.
  rationale: Se reemplaza "se desvió contra" por "se volvió contra" para expresar con español natural el redireccionamiento de la marcha hacia un ataque. Se cambia "los hirió" por "los atacó" para no reducir indebidamente ἐπάταξεν a solo causar heridas físicas. Se normaliza el etnónimo a "zabadeos" para una transliteración más legible en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:34:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura del griego: giro/movimiento contra un grupo árabe específico, ataque y toma de los bienes de guerra. Sin embargo, dos elecciones debilitan la fidelidad semántica: "se desvió contra" suena poco natural en español para un movimiento militar redirigido, y "los hirió" reduce ἐπάταξεν a causar heridas físicas, cuando el griego expresa más ampliamente "golpeó/atacó/derrotó en combate". '
  spanish_quality_summary: El texto es generalmente claro, pero "se desvió contra" resulta torpe en español bíblico-natural, y "los zabadéos" es una transliteración menos transparente que "zabadeos". "Los hirió" también suena algo estrecho para una acción militar. Una redacción más fluida y fiel mejora la legibilidad sin perder literalidad.
  glossary_alignment: 'No hay términos teológicos mayores en juego. La revisión propuesta mantiene un registro moderno y digno. Se conserva "despojos" como equivalente válido de σκῦλα. Se ajusta el etnónimo a una forma española más natural: "zabadeos".'
  issues:
  - severity: medium
    issue: '"se desvió contra" para ἐξέκλινεν'
    rationale: Aunque intenta conservar el matiz de "turn aside", en español suena poco idiomático con "contra" en contexto militar. "Se volvió contra" preserva el cambio de dirección hacia el ataque de manera más natural.
  - severity: medium
    issue: '"los hirió" para ἐπάταξεν'
    rationale: '"Hirió" centra el sentido en producir heridas, mientras que ἐπάταξεν en narrativa bélica es más amplio: golpear/abatir/atacar. "Los atacó" o "los golpeó" evita estrechar indebidamente el sentido.'
  - severity: low
    issue: Transliteración "zabadéos"
    rationale: La acentuación y forma escogidas no son la opción más natural en español. "Zabadeos" refleja mejor el etnónimo transliterado sin forzar una forma inusual.
  revised_spanish_text: Y Jonatán se volvió contra los árabes llamados zabadeos, y los atacó, y tomó sus despojos.
  revision_rationale: Se reemplaza "se desvió contra" por "se volvió contra" para expresar con español natural el redireccionamiento de la marcha hacia un ataque. Se cambia "los hirió" por "los atacó" para no reducir indebidamente ἐπάταξεν a solo causar heridas físicas. Se normaliza el etnónimo a "zabadeos" para una transliteración más legible en español.
