review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del audit trail inglés: ταχὺ ἐμπιστεύων se refleja adecuadamente como «confía demasiado pronto», ἁμαρτάνων como «peca», εἰς ψυχὴν αὐτοῦ como «contra su propia alma» con nota de alternativas, y πλημμελήσει como «se extraviará». La única reserva significativa está en «ligero de corazón» para κοῦφος καρδίᾳ: es formalmente cercano, pero en español suena poco natural y puede sugerir alegría o despreocupación más que superficialidad o inestabilidad moral.'
  spanish_quality_summary: La redacción es clara y digna, pero «ligero de corazón» no es la opción más legible ni idiomática en español bíblico actual. «Liviano de corazón» preserva mejor la metáfora de peso/ligereza aplicada al interior de la persona y evita una lectura afectiva equívoca. También conviene corregir en las decisiones léxicas la errata «τραχύ» por «ταχὺ», aunque eso no afecta el texto del versículo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Alma» para ψυχή está bien justificado y la nota conserva las alternativas interpretativas. No intervienen términos sensibles del glosario principal como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: «ligero de corazón» suena poco natural y potencialmente ambiguo para κοῦφος καρδίᾳ
    rationale: Aunque preserva de cerca la metáfora griega, en español puede entenderse como ‘alegre’ o ‘despreocupado’. «Liviano de corazón» mantiene la imagen de ligereza con mejor inteligibilidad sapiencial y menos riesgo de desvío semántico.
  - severity: low
    issue: Errata en la justificación léxica de ταχὺ
    rationale: La nota dice «τραχύ no aparece aquí» cuando debe decir «ταχὺ». No afecta la traducción propuesta, pero sí la calidad del registro explicativo.
  revised_spanish_text: El que confía demasiado pronto es liviano de corazón[a], y el que peca contra su propia alma se extraviará.
  revised_footnotes:
  - marker: a
    text: O «contra sí mismo» o «para su propio daño»; el griego dice literalmente «contra su propia alma».
    reason: lexical_alternative
  revision_rationale: Se revisa «ligero de corazón» a «liviano de corazón» para conservar mejor la metáfora de κοῦφος καρδίᾳ en un español más natural y menos ambiguo. Se mantiene la nota sobre «su propia alma», ya que preserva correctamente la tensión semántica de ψυχή documentada en el audit trail. No se requiere adjudicación adicional.
