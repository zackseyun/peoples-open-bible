  footnotes:
  - marker: a
    text: El griego suministrado termina truncado después de «Daniel, Daniel,» y queda un signo aislado. La continuación aquí vertida sigue la forma completa habitual del relato en Bel y el Dragón, donde Habacuc anuncia la comida enviada por Dios a Daniel.
