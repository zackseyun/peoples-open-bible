translation:
  language: es
  text: No retengas una dádiva[a] al pobre que depende de ti, y no desprecies la petición del pobre, ni le des ocasión para que te maldiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No rechaces a un suplicante en aflicción, y no apartes tu rostro del pobre». El testimonio griego es más corto y no incluye la cláusula final sobre dar ocasión para que te maldiga.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּמְנַע
  english_pob_choice: Do not withhold
  chosen_spanish: No niegues
  alternatives_spanish:
  - No retengas
  - No te abstengas de dar
  lexicon: HALOT
  rationale: מנע expresa la idea de impedir o retener algo debido; en español, «negar» aquí comunica de manera natural la negativa a entregar lo que corresponde, sin perder la fuerza ética del mandato.
- source_word: מַתָּן
  english_pob_choice: a gift
  chosen_spanish: un regalo
  alternatives_spanish:
  - un don
  - una dádiva
  lexicon: HALOT
  rationale: El sustantivo denota una dádiva o don. «Regalo» es claro y natural en español; se evita «limosna» porque estrecha indebidamente el sentido del hebreo.
- source_word: מִמִּסְכֵּנֶךָ
  english_pob_choice: from your poor man
  chosen_spanish: a tu pobre
  alternatives_spanish:
  - a tu necesitado
  - a tu pobre hombre
  lexicon: HALOT
  rationale: El hebreo conserva el posesivo de relación y responsabilidad. En español, «a tu pobre» mantiene esa cercanía sin sonar demasiado pesado o artificial; el artículo posesivo implícito preserva la referencia personal del sufijo.
- source_word: וְלֹא תִבְזֶה
  english_pob_choice: and do not despise
  chosen_spanish: y no desprecies
  alternatives_spanish:
  - y no desdignes
  - y no menosprecies
  lexicon: HALOT
  rationale: בזה implica tratar como insignificante o con desprecio. «Desprecies» reproduce bien el tono fuerte del mandato moral.
- source_word: שְׁאֵלוֹת דָּל
  english_pob_choice: the request of the poor
  chosen_spanish: la petición del pobre
  alternatives_spanish:
  - la súplica del pobre
  - las peticiones del pobre
  lexicon: HALOT
  rationale: שאלות significa peticiones o solicitudes, y דל refiere al pobre o necesitado. «Petición» conserva la idea de ruego/solicitud sin sobrecargar el verso; el singular funciona como colectivo en español.
- source_word: וְלֹא תִתֵּן לוֹ מָקוֹם
  english_pob_choice: nor give him occasion
  chosen_spanish: ni le des ocasión
  alternatives_spanish:
  - ni le des lugar
  - ni le des oportunidad
  lexicon: HALOT
  rationale: La expresión literal «dar lugar» puede sonar poco natural en español moderno; «dar ocasión» transmite adecuadamente la idea de proporcionar una oportunidad o motivo para la siguiente acción.
- source_word: לְקַלְלֶךָ
  english_pob_choice: to curse you
  chosen_spanish: de maldecirte
  alternatives_spanish:
  - de maldecirte con una maldición
  - de pronunciar maldición contra ti
  lexicon: HALOT
  rationale: קלל en este contexto es «maldecir». «Maldecirte» es la forma más directa y idiomática en español, manteniendo el aviso contra provocar una imprecación.
theological_decisions:
- issue: 'Base textual: hebreo completo frente al paralelo griego más breve'
  english_pob_reading: Translate the fuller Hebrew text as primary, while allowing the Greek to confirm the verse's concern for the distressed poor.
  chosen_spanish_reading: Traducir el hebreo completo como texto principal, manteniendo en el texto la tercera cláusula ausente del griego; el paralelo griego queda reflejado como variante breve solo en nota.
  alternative_spanish_readings:
  - No niegues a un suplicante en aflicción, y no apartes tu rostro del pobre.
  - No rechaces al que sufre, y no vuelvas tu rostro del pobre.
  rationale: La política del proyecto para Sirácides da primacía al hebreo cuando está disponible. Aquí el griego confirma el mandamiento al necesitado, pero omite la cláusula final sobre la maldición; por eso el texto principal sigue el hebreo y no reduce el contenido a la forma griega.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
translation_notes:
  revision_awareness: 'El borrador coincide con la última revisión registrada como sin cambios: el texto hebreo completo se mantiene como base, con el paralelo griego reconocido como testimonio alternativo más breve.'
  spanish_consistency_notes:
  - Se mantuvo «pobre» en singular para reflejar el posesivo hebreo «tu» y la relación directa de responsabilidad.
  - Se eligió «petición» en vez de «limosna» o «caridad» para no restringir indebidamente el hebreo שאלות.
  - Se usó «maldecirte» porque conserva la advertencia explícita del hebreo y evita una perífrasis demasiado interpretativa.
  - La nota textual se ancla en la diferencia entre el hebreo completo y el griego breve, como exige la evidencia fuente.
