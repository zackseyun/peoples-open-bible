translation:
  language: es
  text: Entonces los sacerdotes[a], los levitas, se levantaron y bendijeron al pueblo; y su voz fue oída, y su oración llegó a su santa morada[c], al cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los sacerdotes levitas". El hebreo puede leerse en aposición, identificando a los sacerdotes como levitas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "a los cielos".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "a su santa habitación".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT
  rationale: El verbo indica ponerse en pie o levantarse; en español, 'se levantaron' es natural, solemne y conserva la acción concreta previa a la bendición.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the priests, the Levites
  chosen_spanish: los sacerdotes, los levitas
  alternatives_spanish:
  - los sacerdotes levíticos
  - los sacerdotes y los levitas
  lexicon: HALOT
  rationale: Sigo la lectura apposicional del hebreo, identificando a los sacerdotes como levitas. 'Los sacerdotes, los levitas' preserva esa relación sin convertirla en dos grupos separados.
- source_word: וַיְבָרֲכוּ
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - pronunciaron bendición sobre
  - invocaron bendición sobre
  lexicon: HALOT
  rationale: ברך aquí es hablar bendición sobre el pueblo. 'Bendijeron' es conciso, fiel y idiomático en español bíblico contemporáneo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la asamblea
  lexicon: HALOT
  rationale: El sustantivo designa al pueblo reunido; 'el pueblo' conserva el sentido léxico sin añadir una especificación litúrgica que el hebreo no exige.
- source_word: וַיִּשָּׁמַע בְּקוֹלָם
  english_pob_choice: their voice was heard
  chosen_spanish: su voz fue oída
  alternatives_spanish:
  - se escuchó su voz
  - su voz fue escuchada
  lexicon: HALOT
  rationale: La pasiva del hebreo se refleja bien con 'fue oída', manteniendo la voz como sujeto gramatical y sin explicitar en el texto principal quién la oyó.
- source_word: תְפִלָּתָם
  english_pob_choice: their prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su plegaria
  - su ruego
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo plural se traduce de manera colectiva como 'su oración', natural en español y fiel al valor corporativo del contexto.
- source_word: לִמְעוֹן קָדְשׁוֹ
  english_pob_choice: to his holy dwelling
  chosen_spanish: a su santa morada
  alternatives_spanish:
  - a su santo morada
  - a su santa habitación
  - a su santa morada de residencia
  lexicon: HALOT
  rationale: '''מָעוֹן'' es un lugar de morada/habitación; ''morada'' comunica la imagen espacial sagrada. ''Santa'' reproduce el valor de קָדְשׁוֹ sin necesidad de parafrasear.'
- source_word: לַשָּׁמָיִם
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - a los cielos
  - en el cielo
  lexicon: HALOT
  rationale: La relación final se mantiene con 'al cielo', que es idiomático y respeta la apposición/precisión espacial del hebreo sin volverla más interpretativa de lo necesario.
theological_decisions:
- issue: Sujeto implícito de 'fue oída'
  english_pob_reading: Retain the passive expression 'their voice was heard' without supplying 'by God' in the main text.
  chosen_spanish_reading: Mantener la pasiva 'su voz fue oída' sin explicitar 'por Dios' en el texto principal.
  alternative_spanish_readings:
  - Dios oyó su voz
  - su voz fue oída por Yahvé
  rationale: El hebreo usa una forma pasiva y no nombra de manera explícita a Dios como sujeto de esta cláusula. Conservar la pasiva evita añadir un sujeto que el verso no enuncia, aunque el contexto claramente lo sugiera.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre 'los sacerdotes' y 'los levitas'
  english_pob_reading: 'Treat as apposition: ''the priests, the Levites.'''
  chosen_spanish_reading: 'Tratarlo como aposición: ''los sacerdotes, los levitas''.'
  alternative_spanish_readings:
  - los sacerdotes levitas
  - los sacerdotes y los levitas
  rationale: Crónicas emplea con frecuencia esta identificación de los sacerdotes como levitas. La aposición en español evita hacer de ello dos grupos distintos o borrar la especificación del hebreo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión más reciente en el contexto inglés ajustó el final para reflejar ambos elementos del hebreo: ''to his holy dwelling, to heaven'', en lugar de fusionarlos en una sola expresión. Por eso el español conserva ''a su santa morada, al cielo'' con dos complementos coordinados en la línea final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término estándar cuando aparezca el nombre divino; en este versículo no está explícito, por lo que no se introduce.
  - '''Levitas'' se conserva como sustantivo étnico/ministerial para reflejar la aposición del hebreo.'
  - La pasiva 'fue oída' preserva el matiz del hebreo sin sobreexplicar el agente.
  - '''Morada'' y ''cielo'' se mantienen separados para no colapsar la estructura final del verso.'
