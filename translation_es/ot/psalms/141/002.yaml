  text: תִּכּ֤וֹן תְּפִלָּתִ֣/י קְטֹ֣רֶת לְ/פָנֶ֑י/ךָ מַֽשְׂאַ֥ת כַּ֝פַּ֗/י מִנְחַת עָֽרֶב־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/141/002.yaml
  text: May my prayer be established before you as incense[b][a], the lifting up of my hands as the evening offering.
  footnotes:
  - marker: a
    text: Or 'be set in order' or 'be prepared' before you; the Hebrew asks that the prayer be firmly placed in God's presence.
    reason: lexical_alternative
  - marker: b
    text: '''Evening offering'' refers to the regular offering presented at evening; more specifically, the Hebrew term can denote a grain offering.'
    reason: lexical_alternative
