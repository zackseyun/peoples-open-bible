translation:
  language: es
  text: No desprecies a un hombre en amargura de espíritu; recuerda que hay quien exalta y humilla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hay quien levanta y humilla»; griego paralelo: «hay quien humilla y exalta». El texto principal sigue el orden hebreo auditado más reciente: «exalta y humilla».'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּבֶז
  english_pob_choice: Do not despise
  chosen_spanish: No desprecies
  alternatives_spanish:
  - No desprecies
  - No menosprecies
  - No desdeñes
  lexicon: HALOT
  rationale: El hebreo בזה expresa tratar a alguien con desprecio. «Despreciar» conserva ese sentido amplio de menosprecio sin reducirlo a la burla explícita que podría sugerir el griego καταγέλα.
- source_word: לֶאֱנוֹשׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a un ser humano
  lexicon: HALOT
  rationale: אֱנוֹשׁ designa a un humano con matiz de fragilidad. Se mantiene el masculino singular representativo «un hombre», acorde con la forma del hebreo y con la decisión auditada en inglés.
- source_word: בְּמַר רוּחַ
  english_pob_choice: in bitterness of spirit
  chosen_spanish: en amargura de espíritu
  alternatives_spanish:
  - en amargura de su espíritu
  - cuando su espíritu está amargado
  - en amarga aflicción
  lexicon: HALOT
  rationale: La frase une «amargura» con «espíritu». «Amargura de espíritu» conserva la construcción idiomática y refleja bien el paralelo griego ἐν πικρίᾳ ψυχῆς αὐτοῦ sin añadir una interpretación emocional más fuerte de la que el texto exige.
- source_word: זְכוֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate
  - ten presente
  lexicon: HALOT
  rationale: Imperativo directo y natural en español. «Recuerda» mantiene la fuerza exhortativa y la claridad pública del texto.
- source_word: כִּי יֵשׁ
  english_pob_choice: that there is
  chosen_spanish: que hay
  alternatives_spanish:
  - porque hay
  - pues hay
  lexicon: HALOT
  rationale: Después de «recuerda», «que hay» expresa con naturalidad la cláusula explicativa/existencial y conserva la fuerza de יֵשׁ sin sobreexplicar la relación lógica.
- source_word: מֵרִים וּמַשְׁפִּיל / Greek parallel ὁ ταπεινῶν καὶ ἀνυψῶν
  english_pob_choice: one who exalts and humbles
  chosen_spanish: uno que exalta y humilla
  alternatives_spanish:
  - uno que humilla y exalta
  - uno que levanta y abate
  lexicon: HALOT
  rationale: 'Se sigue el orden de la tradición hebrea auditada y la revisión inglesa más reciente: «exalta y humilla». Aunque el griego paralelo invierte el orden («humilla y exalta»), la frase española deja visible la tensión textual al evitar identificar explícitamente al sujeto y al conservar ambos verbos de reversión.'
theological_decisions:
- issue: Sujeto implícito de la reversión de estados humanos
  english_pob_reading: Leave the subject implicit as 'one' rather than specifying God in the main text.
  chosen_spanish_reading: Mantener el sujeto implícito como «uno» en el texto principal.
  alternative_spanish_readings:
  - el Señor que exalta y humilla
  - Dios que exalta y humilla
  rationale: Ni el hebreo ni el griego nombran explícitamente a Dios en esta cláusula. En español, «uno» preserva esa indefinición reverente y evita introducir un título que el texto no enuncia. La fuerza teológica de la soberanía divina sobre la humillación y la elevación queda intacta.
  doctrine_reference: Conservar la tensión teológica sin resolverla de forma interpretativa; no introducir afirmaciones doctrinales ausentes del texto.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente en el orden final de los verbos («exalta y humilla») para reflejar mejor el hebreo transmitido, sin perder de vista el paralelo griego que invierte ese orden. Se mantuvo la advertencia contra despreciar al afligido y el sujeto implícito del reversor de estados humanos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se conserva «amargura de espíritu» como expresión idiomática, no como paráfrasis psicológica.
  - «Uno que exalta y humilla» mantiene la indeterminación del sujeto y evita añadir «Dios» en el texto principal.
