translation:
  language: es
  text: Vamos[a], cantemos con gozo a Yahvé; aclamemos a la Roca de nuestra salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El nombre divino יְהוָה suele traducirse tradicionalmente como «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְ֭כוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan pues
  - Vamos
  lexicon: HALOT
  rationale: El imperativo plural funciona como invitación o convocatoria. En español, 'Vengan' conserva el llamado exhortativo y suena natural en un contexto de alabanza comunitaria.
- source_word: נְרַנְּנָ֣ה
  english_pob_choice: let us sing for joy
  chosen_spanish: cantemos con alegría
  alternatives_spanish:
  - alegrémonos cantando
  - cantemos jubilosamente
  lexicon: HALOT
  rationale: El cohortativo expresa alabanza jubilosa y vocal. 'Cantemos con alegría' comunica tanto el acto de cantar como el tono exultante sin forzar una paráfrasis excesiva.
- source_word: לַ/יהוָ֑ה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al Señor
  lexicon: HALOT
  rationale: La política terminológica del POB en español requiere 'Yahvé' para el nombre divino YHWH. La preposición 'a' marca el destinatario de la alabanza.
- source_word: נָ֝רִ֗יעָה
  english_pob_choice: let us shout aloud
  chosen_spanish: aclamemos
  alternatives_spanish:
  - clamemos en alta voz
  - gritemos con júbilo
  lexicon: HALOT
  rationale: El verbo en cohortativo expresa un clamor fuerte, público, de celebración o victoria. 'Aclamar' conserva esa fuerza vocal y comunitaria en español actual.
- source_word: לְ/צ֣וּר
  english_pob_choice: to the Rock
  chosen_spanish: a la Roca
  alternatives_spanish:
  - a la peña
  - al Rocío
  lexicon: HALOT
  rationale: צור se traduce literalmente como 'roca' y funciona como metáfora divina de firmeza y refugio. Se mantiene el artículo por la relación constructa con el complemento siguiente.
- source_word: יִשְׁעֵֽ/נוּ
  english_pob_choice: of our salvation
  chosen_spanish: de nuestra salvación
  alternatives_spanish:
  - de nuestra liberación
  - que nos salva
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo en construcción preserva la forma nominal. 'Salvación' mantiene la amplitud teológica de rescate y liberación sin reducirlo a una perífrasis verbal.
theological_decisions:
- issue: Nombre divino יְהוָה (YHWH)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa el Tetragrámaton directamente. La norma española del proyecto es 'Yahvé', conservando el nombre de pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje muestra un alto acuerdo entre el texto hebreo y el audit trail inglés; no hubo revisiones pendientes en el contexto más reciente y la formulación española sigue de cerca las decisiones léxicas documentadas, adaptándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se mantuvo la primera persona plural exhortativa («Vengan», «cantemos», «aclamemos») como en el hebreo cohortativo e inclusivo.
  - Se preservó «Yahvé» conforme a la terminología española del proyecto para YHWH.
  - «Roca» conserva la metáfora divina sin suavizarla ni explicarla en el cuerpo del texto.
  - La puntuación distribuye las dos invitaciones poéticas con punto y coma, reflejando la paralelística del hebreo.
