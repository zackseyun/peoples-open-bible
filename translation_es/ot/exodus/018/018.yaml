review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: la advertencia de agotamiento para Moisés y el pueblo, la razón introducida por כִּי, la metáfora de carga en כָבֵד, y la imposibilidad de hacerlo solo. Sin embargo, la omisión del matiz enfático de נָבֹל תִּבֹּל en el texto principal debilita ligeramente la fuerza del original, que el inglés POB sí preserva con ''surely''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Tanto tú como este pueblo' y 'porque el asunto es demasiado pesado para ti' funcionan bien. La frase final 'No podrás hacerlo tú solo' es idiomática, pero el orden puede ajustarse para acercarse más al flujo del original y evitar énfasis innecesario en 'tú'. El principal ajuste recomendable es reforzar el énfasis verbal inicial de manera natural en español.
  glossary_alignment: No hay términos de glosario mayor en disputa en este versículo. Las decisiones léxicas son mayormente coherentes con el expediente inglés. 'Asunto' para דָּבָר y 'pesado' para כָבֵד respetan bien la rationale documentada. La nota léxica sobre el infinitivo absoluto está bien planteada y puede conservarse.
  issues:
  - severity: medium
    issue: El texto principal no expresa con suficiente fuerza el énfasis de נָבֹל תִּבֹּל.
    rationale: El hebreo usa infinitivo absoluto + imperfecto para intensificación. Aunque la nota lo explica, el cuerpo del texto debería reflejar algo de esa certeza/enfasis, como hace el inglés POB con 'surely wear yourself out'.
  - severity: low
    issue: La colocación de 'tú' en 'No podrás hacerlo tú solo' añade un énfasis algo más marcado de lo necesario.
    rationale: El hebreo simplemente expresa 'no podrás hacerlo por ti mismo/solo'. En español más fluido y neutro, 'No podrás hacerlo solo' o 'No podrás hacerlo por ti solo' suena más natural sin perder sentido.
  revised_spanish_text: Sin duda te desgastarás[a], tanto tú como este pueblo que está contigo, porque el asunto es demasiado pesado para ti. No podrás hacerlo solo.
  revised_footnotes:
