translation:
  language: es
  text: Y cuando Apolonio venía con una tropa armada para apoderarse del dinero, aparecieron de antemano desde el cielo ángeles montados[a], fulgurando con sus armas e infundiéndoles[b] gran temor y terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ángeles a caballo». El griego presenta literalmente figuras celestiales montadas.
    reason: lexical_alternative
  - marker: b
    text: O «llenándolos de gran temor y terror».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνιόντος
  english_pob_choice: came up
  chosen_spanish: subía
  alternatives_spanish:
  - venía
  - ascendía
  lexicon: LSJ
  rationale: El genitivo absoluto expresa el avance de Apolonio hacia el objetivo; «subía» conserva el movimiento ascendente/avanzado de ἀνέρχομαι con español natural y digno.
- source_word: καθωπλισμένης στρατιᾶς
  english_pob_choice: an armed force
  chosen_spanish: una tropa armada
  alternatives_spanish:
  - un ejército armado
  - una fuerza armada
  lexicon: LSJ
  rationale: La frase destaca el carácter militar y equipado del grupo; «tropa armada» mantiene la fuerza colectiva sin sonar excesivamente técnico.
- source_word: πρὸς τὴν τῶν χρημάτων ἁρπαγήν
  english_pob_choice: to seize the money
  chosen_spanish: para saquear el dinero
  alternatives_spanish:
  - para apoderarse del dinero
  - para el saqueo del dinero
  lexicon: LSJ
  rationale: ἁρπαγή implica toma violenta o saqueo. «Saquear el dinero» refleja mejor la acción hostil que una simple toma neutral.
- source_word: οὐρανόθεν
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde el cielo
  lexicon: LSJ
  rationale: En español, «desde el cielo» conserva la procedencia sobrenatural en un registro claro y natural.
- source_word: προυφάνησαν
  english_pob_choice: appeared beforehand
  chosen_spanish: aparecieron antes
  alternatives_spanish:
  - aparecieron previamente
  - se mostraron antes
  lexicon: LSJ
  rationale: El prefijo προ- añade anticipación; «aparecieron antes» preserva esa prioridad temporal sin sobrecargar el verso.
- source_word: ἔφιπποι ἄγγελοι
  english_pob_choice: horse-mounted angels
  chosen_spanish: ángeles montados
  alternatives_spanish:
  - ángeles a caballo
  - ángeles montados a caballo
  lexicon: LSJ
  rationale: El griego identifica figuras celestiales montadas. «Ángeles montados» mantiene la imagen y la identidad angélica con fluidez en español.
- source_word: περιαστράπτοντες τοῖς ὅπλοις
  english_pob_choice: flashing around with their weapons
  chosen_spanish: fulgurando con sus armas
  alternatives_spanish:
  - resplandeciendo con sus armas
  - destellando alrededor con sus armas
  lexicon: LSJ
  rationale: El participio comunica brillo tipo relámpago alrededor de las armas; «fulgurando» conserva la intensidad visual sin calco rígido.
- source_word: ἐνιόντες
  english_pob_choice: putting ... into them
  chosen_spanish: llenándolos
  alternatives_spanish:
  - infundiéndoles
  - metiéndose en ellos
  lexicon: LSJ
  rationale: El verbo expresa introducir o infundir. En español, «llenándolos» transmite el efecto de inundarlos con temor de manera idiomática.
- source_word: φόβον τε καὶ τρόμον
  english_pob_choice: great fear and terror
  chosen_spanish: gran temor y terror
  alternatives_spanish:
  - gran miedo y terror
  - temor y temblor
  lexicon: LSJ
  rationale: La doble expresión intensifica el sobresalto; «temor y terror» conserva la pareja léxica y el énfasis del griego.
theological_decisions:
- issue: Origen celestial de la intervención angelical
  english_pob_reading: from heaven
  chosen_spanish_reading: desde el cielo
  alternative_spanish_readings:
  - del cielo
  rationale: La escena narra una intervención sobrenatural; «desde el cielo» preserva ese registro sin introducir doctrina ajena al texto.
  doctrine_reference: Narrativa de intervención divina y angelológica en 4 Macabeos 4:10
- issue: Identidad y forma de los ángeles
  english_pob_reading: horse-mounted angels
  chosen_spanish_reading: ángeles montados
  alternative_spanish_readings:
  - ángeles a caballo
  - ángeles montados a caballo
  rationale: El griego presenta ángeles con imagen militar montada. «Ángeles montados» conserva la tensión entre la figura celestial y la imaginería bélica sin suavizarla.
  doctrine_reference: Angelología narrativa; fidelidad a la imagen del texto
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió unir la idea de ángeles montados con la procedencia celestial y hacer más natural la cola participial. La versión española sigue esa solución, evitando una apposición ambigua y manteniendo la progresión narrativa del griego.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se optó por «ángeles» y no por un giro más interpretativo para mantener la imaginería del griego.
  - «Terror» se retuvo junto a «temor» para reflejar la duplicación intensificadora φόβον τε καὶ τρόμον.
  - El marcaje de nota [a] aparece en el texto principal en «ángeles montados[a]» y el marcaje [b] en «llenándolos[b]», de modo que cada nota queda anclada correctamente.
