id: GAL.4.24
reference: Galatians 4:24
source:
  edition: SBLGNT
  text: ἅτινά ἐστιν ἀλληγορούμενα· αὗται γάρ εἰσιν δύο διαθῆκαι, μία μὲν ἀπὸ ὄρους Σινᾶ, εἰς δουλείαν γεννῶσα, ἥτις ἐστὶν Ἁγάρ,
translation:
  text: 'These things are being interpreted allegorically[a], for these women are two covenants: one from Mount Sinai, bearing children for slavery[b]; she is Hagar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'which things are interpreted allegorically' or 'which things are an allegory.' The Greek expression indicates that Paul is using the preceding narrative in an allegorical way.
    reason: lexical_alternative
  - marker: b
    text: Or 'into bondage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅτινά
  chosen: These things
  alternatives:
  - which things
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring back to the preceding account of Sarah and Hagar. 'These things' is natural modern English while preserving the anaphoric force better than the more wooden 'which things.'
- source_word: ἀλληγορούμενα
  chosen: are being spoken allegorically
  alternatives:
  - are interpreted allegorically
  - are an allegory
  lexicon: BDAG
  rationale: Present passive participle with ἐστιν, indicating the narrative is being used/allegorized rather than asserting that the women simply are an allegory in essence. 'Are being spoken allegorically' preserves both the passive form and Paul's rhetorical action.
- source_word: αὗται
  chosen: these women
  alternatives:
  - these
  - these things
  lexicon: BDAG
  rationale: Feminine plural demonstrative points specifically to the two women just discussed, not to abstract matters. Supplying 'women' clarifies the antecedent in idiomatic English.
- source_word: διαθῆκαι
  chosen: covenants
  alternatives:
  - testaments
  - agreements
  lexicon: BDAG
  rationale: In Pauline and salvation-historical context, διαθήκη is best rendered 'covenant,' not 'testament.' This matches established biblical usage and the Sinai reference.
- source_word: μία μὲν
  chosen: one
  alternatives:
  - one indeed
  - one on the one hand
  lexicon: BDAG
  rationale: μέν sets up the first member of a contrast that continues in the next verse. English can naturally render it simply as 'one' here without overloading the sentence, while the contrast remains clear from context.
- source_word: ἀπὸ ὄρους Σινᾶ
  chosen: from Mount Sinai
  alternatives:
  - from the mountain Sinai
  - from Sinai
  lexicon: BDAG
  rationale: Standard English rendering of the prepositional phrase naming the covenant's origin/source.
- source_word: εἰς δουλείαν
  chosen: into slavery
  alternatives:
  - for slavery
  - to slavery
  - into bondage
  lexicon: BDAG
  rationale: εἰς marks result/direction, and δουλεία denotes slavery/bondage. 'Into slavery' clearly conveys the resultant condition and aligns with the project's preference for stronger bonded-language where salient.
- source_word: γεννῶσα
  chosen: bearing children
  alternatives:
  - giving birth
  - begetting
  - producing children
  lexicon: BDAG
  rationale: Present active participle feminine singular modifying the covenant represented by Hagar. 'Bearing children' naturally carries the maternal imagery required by the allegory better than the more generic 'producing.'
- source_word: ἥτις ἐστὶν Ἁγάρ
  chosen: she is Hagar
  alternatives:
  - which is Hagar
  - this is Hagar
  lexicon: BDAG
  rationale: Because the antecedent is the feminine singular covenant/woman figure, English personalizes the clause as 'she is Hagar' to preserve the allegorical identification in clear idiom.
