lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: took another
  chosen_spanish: tomó otra
  alternatives_spanish:
  - tomó de nuevo
  - volvió a tomar
  - añadió y tomó
  lexicon: HALOT
  rationale: El hebreo expresa una idea aditiva/repetitiva. En español, «tomó otra» comunica de modo natural que Abraham añadió una esposa más, sin perder la fuerza del verbo subyacente ni sonar forzado.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - recibió
  - tomó para sí
  lexicon: HALOT
  rationale: Con אִשָּׁה, לקח funciona como idioma para contraer matrimonio. «Tomó» conserva la cercanía al texto fuente y mantiene la coherencia con la elección inglesa auditada.
- source_word: אִשָּׁה
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa adicional
  - mujer/esposa
  lexicon: HALOT
  rationale: Aquí el contexto idiomático de לקח exige el sentido de «esposa», no simplemente «mujer». «Esposa» es claro y idiomático en español.
- source_word: וּשְׁמָהּ
  english_pob_choice: and her name was
  chosen_spanish: y su nombre fue
  alternatives_spanish:
  - y se llamaba
  - y el nombre de ella era
  lexicon: HALOT
  rationale: La cláusula nominal de identificación se vierte con una fórmula sencilla y fiel. «Su nombre fue» preserva la estructura sin sobreactuar la forma hebrea.
- source_word: קְטוּרָה
  english_pob_choice: Keturah
  chosen_spanish: Keturá
  alternatives_spanish:
  - Keturah
  lexicon: standard transliteration
  rationale: Se translitera el nombre propio con adaptación mínima al español gráfico, manteniendo reconocibilidad y lectura natural.
theological_decisions:
- issue: Cómo reflejar la fuerza aditiva de וַיֹּסֶף en relación con el matrimonio de Abraham
  english_pob_reading: Abraham took another wife
