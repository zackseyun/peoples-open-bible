review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del hebreo: Gedeón y sus cien hombres llegan al borde del campamento, al inicio de la guardia/vigilia intermedia, precisamente cuando se estaba estableciendo la guardia; luego tocan los shofarot y quiebran los recipientes que llevaban. Sin embargo, «vigilia media» suena poco idiomático en español bíblico actual, y la nota b introduce una alternativa («mientras colocaban») que debilita el matiz de acción ya realizada/recién realizada enfatizado en el hebreo y en la auditoría inglesa.'
  spanish_quality_summary: El texto es generalmente claro y digno. «Al borde del campamento», «justo cuando», y «tocaron las trompetas» funcionan bien. No obstante, «la vigilia media» resulta algo forzado; «la vigilia de en medio» o «la guardia intermedia» leen mejor. También «habían puesto a los centinelas» puede mejorarse a «acababan de apostarlos» o «acababan de poner a los centinelas» para reflejar mejor la inmediatez de אַךְ + la construcción intensiva. «Cántaros» es aceptable, aunque «vasijas» también sería posible; no requiere cambio obligatorio.
  glossary_alignment: No hay términos doctrinales sensibles en conflicto con el glosario del proyecto. «Trompetas» con nota sobre shofarot concuerda con la decisión auditada. No aparece el nombre divino ni vocabulario mesiánico.
  issues:
  - severity: medium
    issue: «vigilia media» suena poco natural en español.
    rationale: Aunque es comprensible, no es la forma más idiomática para הָאַשְׁמֹרֶת הַתִּיכוֹנָה. «La vigilia de en medio» preserva mejor el sentido y suena más natural y eclesialmente legible.
  - severity: medium
    issue: La nota b introduce «mientras colocaban a los centinelas», que altera el matiz temporal documentado.
    rationale: La auditoría inglesa explica una acción de colocación de la guardia ya efectuada o recién efectuada, con énfasis en el acto de apostar. «Mientras colocaban» desplaza el sentido hacia simultaneidad progresiva menos precisa.
  - severity: low
    issue: «habían puesto a los centinelas» es correcto pero puede reflejar mejor la inmediatez temporal.
    rationale: Dado el valor de אַךְ como 'just as', una formulación como «acababan de poner/apostar a los centinelas» comunica mejor que llegaron exactamente cuando se hacía el relevo o establecimiento de guardia.
  revised_spanish_text: Así Gedeón y los cien hombres que estaban con él llegaron al borde del campamento al comienzo de la vigilia de en medio[a], justo cuando acababan de poner a los centinelas[b]; y tocaron las trompetas[c] y rompieron los cántaros que llevaban en las manos.
  revised_footnotes:
  - marker: a
    text: O «la segunda vigilia» o «la vigilia de la mitad de la noche». El hebreo se refiere a una división de la noche.
    reason: lexical_alternative
  - marker: b
    text: O «acababan de apostar a los centinelas» o «acababan de establecer la guardia». La construcción hebrea enfatiza la acción de colocar la guardia.
    reason: lexical_alternative
  - marker: c
    text: Hebreo shofarot, tradicionalmente «trompetas», más específicamente cuernos usados para señalizar.
    reason: cultural_note
  revision_rationale: Se ajusta la expresión temporal a un español más natural («vigilia de en medio») y se corrige la nota y el verbo de la guardia para reflejar mejor la inmediatez y el énfasis verbal del hebreo, sin alterar el contenido del borrador.
