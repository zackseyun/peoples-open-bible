translation:
  language: es
  text: Todas las cosas están en pares[a], unas frente a otras, y no hizo nada a lo que le hiciera falta algo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio hebreo de Masada para esta sección también apoya el sentido de que nada fue hecho deficiente o falto, aunque la transmisión textual hebrea alrededor de estas líneas es fragmentaria y está organizada de manera distinta.
    reason: textual_variant
lexical_decisions:
- source_word: πάντα
  english_pob_choice: All things
  chosen_spanish: Todas las cosas
  alternatives_spanish:
  - Todo
  - Todo cuanto existe
  lexicon: LSJ
  rationale: El plural neutro es comprehensivo; en español, «todas las cosas» conserva mejor el alcance general y el tono sapiencial que un singular más idiomático como «todo».
- source_word: δισσὰ
  english_pob_choice: are in pairs
  chosen_spanish: están en pares
  alternatives_spanish:
  - son dobles
  - están dos a dos
  - son dos cosas
  lexicon: LSJ
  rationale: «En pares» reproduce la idea de duplicidad/pareamiento sin sugerir mera repetición. «Están» sigue la lectura estática del griego revisada en el historial inglés.
- source_word: ἐν κατέναντι τοῦ ἑνός
  english_pob_choice: one opposite the other
  chosen_spanish: una frente a la otra
  alternatives_spanish:
  - una opuesta a la otra
  - una enfrente de la otra
  - una ante la otra
  lexicon: LSJ
  rationale: La expresión griega indica oposición o correspondencia entre miembros de un par. «Una frente a la otra» comunica esa relación de manera natural en español y mantiene el valor relacional del original.
- source_word: οὐκ ἐποίησεν
  english_pob_choice: he has made
  chosen_spanish: no hizo
  alternatives_spanish:
  - no ha hecho
  - no creó
  lexicon: LSJ
  rationale: El verbo puede referirse a la acción creadora de Dios en el contexto. En español, el pretérito simple suena más natural y directo aquí, sin añadir matices ajenos al texto.
- source_word: οὐδὲν ἐκλιπόν
  english_pob_choice: nothing lacking
  chosen_spanish: nada que faltara
  alternatives_spanish:
  - nada faltante
  - nada deficiente
  - nada incompleto
  lexicon: LSJ
  rationale: ἐκλιπόν expresa lo que falta, se omite o resulta deficiente. «Nada que faltara» conserva la idea de ausencia/deficiencia sin precisar más de lo que el griego warrants.
theological_decisions:
- issue: Sujeto implícito de «hizo»
  english_pob_reading: The subject is rendered as 'he,' referring to God.
  chosen_spanish_reading: Se conserva el sujeto implícito en la forma verbal española, con referencia a Dios por el contexto.
  alternative_spanish_readings:
  - Dios no hizo nada que faltara
  - Él no hizo nada que faltara
  rationale: El griego no explicita el sujeto en la cláusula; el contexto sapiencial remite a la acción ordenada de Dios. El español puede mantener la misma economía sin introducir una formulación más interpretativa en el texto principal.
  doctrine_reference: Principio de primacía del texto original y coherencia contextual en literatura sapiencial.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que ajustó la primera cláusula a una afirmación de estado («are in pairs») en vez de acción («come in pairs»). Por eso se eligió «están en pares» en lugar de una expresión dinámica. También se conservó el sentido de plenitud final («nada que faltara») sin convertirlo en una paráfrasis más explicativa.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton ni una cita directa del griego κύριος.
  - «Pares» conserva el valor de correspondencia dual sin imponer una terminología técnica.
  - La nota textual se ancla solo en la idea de la variante hebrea, como en el inglés audit trail, sin expandir el argumento más allá de lo documentado.
