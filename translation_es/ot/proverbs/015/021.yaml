review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: contrasta la alegría del necio con la conducta recta del hombre entendido, y maneja adecuadamente el modismo לַחֲסַר לֵב mediante una nota. Sin embargo, en la segunda mitad, «endereza su camino» puede sonar algo más transitivo sobre el camino mismo que sobre el andar/conducta, y «el hombre de entendimiento» resulta menos natural en español proverbial que «el hombre entendido».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos mejoras pequeñas para mayor naturalidad y precisión sapiencial: «gozo» funciona, aunque «alegría» sería más idiomático; y «el hombre entendido» suena más natural que la repetición «de entendimiento». La estructura general es buena y no requiere reescritura mayor.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Necedad», «entendimiento» y la nota sobre «falto de corazón» están alineados con el análisis lexical del POB. La decisión de no calcar literalmente el modismo hebreo en el texto principal es correcta. Se mantiene adecuadamente el masculino representativo.
  issues:
  - severity: medium
    issue: «el hombre de entendimiento» suena poco idiomático en español
    rationale: Aunque es comprensible y cercano al inglés auditado, en español sapiencial natural «el hombre entendido» o «un hombre entendido» expresa mejor תְּבוּנָה sin perder precisión.
  - severity: low
    issue: «endereza su camino» puede afinarse a «endereza su andar»
    rationale: לָכֶת es infinitivo de ‘andar/ir’; «camino» es defendible por la metáfora, pero «andar» refleja un poco mejor el matiz verbal de la conducta. Aun así, no es error grave.
  revised_spanish_text: La necedad es gozo para el que carece de entendimiento[a], pero el hombre entendido endereza su andar.
