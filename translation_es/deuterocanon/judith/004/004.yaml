translation:
  language: es
  text: Y enviaron mensaje[a] a todo el territorio de Samaria, y a Kona, y a Bet-horón, y a Belmaim, y a Jericó, y a Choba, y a Aisora, y al valle de Salem[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘a través de todo el territorio de Samaria’; el término griego puede referirse a un borde, distrito o territorio.
    reason: lexical_alternative
  - marker: b
    text: O ‘la llanura de Salem’; αὐλών puede denotar un valle, una hondonada o una depresión semejante a una llanura.
    reason: lexical_alternative
  - marker: c
    text: Varios nombres de lugar en este versículo se conservan por transliteración porque su identificación exacta no es segura a partir de la forma griega sola.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλαν
  english_pob_choice: they sent word
  chosen_spanish: enviaron mensaje
  alternatives_spanish:
  - enviaron
  - despacharon
  lexicon: BDAG
  rationale: El griego dice simplemente ‘enviaron’, pero en este contexto la lista de lugares muestra una comunicación destinada a distintos puntos. ‘Enviaron mensaje’ conserva la función comunicativa que el audit trail inglés explicitó sin añadir contenido ajeno.
- source_word: εἰς πᾶν ὅριον Σαμαρίας
  english_pob_choice: into all the territory of Samaria
  chosen_spanish: a todo el territorio de Samaria
  alternatives_spanish:
  - a todo el borde de Samaria
  - por todo el territorio de Samaria
  - a toda la región de Samaria
  lexicon: LSJ
  rationale: ὅριον puede significar borde, distrito o territorio. Aquí el sentido regional es el que mejor encaja con el contexto; por eso ‘territorio’ conserva el alcance geográfico sin volverlo una mera línea fronteriza.
- source_word: Κωνὰ
  english_pob_choice: Kona
  chosen_spanish: Kona
  alternatives_spanish:
  - Cona
  - Koná
  lexicon: LSJ
  rationale: Es un topónimo transliterado. Se mantiene ‘Kona’ para conservar la forma griega sin identificación especulativa.
- source_word: Βαιθωρὼν
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-horón
  alternatives_spanish:
  - Beth-horón
  - Bet Horón
  lexicon: LSJ
  rationale: Se conserva el nombre del lugar con una transliteración natural al español. ‘Bet-horón’ es legible y refleja el compuesto semítico del topónimo.
- source_word: Βαιλμὰιν
  english_pob_choice: Belmaim
  chosen_spanish: Belmaim
  alternatives_spanish:
  - Bailmain
  - Baelmain
  lexicon: LSJ
  rationale: La forma griega se translitera de manera directa. No hay base suficiente para normalizar el nombre a otra forma conocida.
- source_word: Ἰερειχὼ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: LSJ
  rationale: Es el nombre bíblico usual en español. ‘Jericó’ comunica de forma natural el topónimo sin perder correspondencia con el griego.
- source_word: Χωβὰ
  english_pob_choice: Choba
  chosen_spanish: Choba
  alternatives_spanish:
  - Joba
  - Khoba
  lexicon: LSJ
  rationale: Topónimo incierto, por lo que conviene conservar una transliteración cercana al griego. ‘Choba’ evita una identificación no sustentada.
- source_word: Αἰσωρὰ
  english_pob_choice: Aisora
  chosen_spanish: Aisora
  alternatives_spanish:
  - Aisorá
  - Esora
  lexicon: LSJ
  rationale: También es un nombre de lugar de identificación incierta; se preserva la forma griega mediante transliteración directa.
- source_word: τὸν αὐλῶνα Σαλήμ
  english_pob_choice: the valley of Salem
  chosen_spanish: el valle de Salem
  alternatives_spanish:
  - la llanura de Salem
  - el hondo de Salem
  lexicon: LSJ
  rationale: αὐλών puede designar valle, hondonada o una llanura encajonada. ‘Valle’ es la opción más clara y natural en español, manteniendo el matiz geográfico general del texto.
translation_notes:
  revision_awareness: La versión griega del pasaje presenta alta concordancia con el audit trail inglés y no requiere revisiones textuales. Se mantuvo la estrategia de transliterar los topónimos inciertos y de resolver ὅριον y αὐλών por su sentido geográfico contextual.
  spanish_consistency_notes:
  - Se usa ‘Jericó’ por ser la forma asentada en español, en lugar de la transliteración inglesa ‘Jericho’.
  - Se evita ‘SEÑOR’ y no hay vocabulario divino en este versículo.
  - ‘Territorio’ mantiene el rango semántico de ὅριον mejor que una traducción puramente lineal como ‘borde’.
  - Los topónimos inciertos se dejan sin armonización con otros pasajes para no introducir identificación especulativa.
