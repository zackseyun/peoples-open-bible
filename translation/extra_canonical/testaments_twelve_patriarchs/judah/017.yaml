translation:
  text: |-
    And now I command you, my children: do not love silver, and do not set your gaze on the beauty of women; for I too, because of gold and beauty, was led astray to Besue the Canaanite woman.
    
    And I know that because of these two things my seed will come to the ruin of sexual immorality. For they will even corrupt wise men from among my sons, and they will cause the kingdom of Judah to be diminished, which the Lord gave me because of my obedience to my father Jacob.
