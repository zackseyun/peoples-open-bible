base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/001/001.yaml
  text: Now Philopator[a], having learned from those who had returned of the seizure by Antiochus of the regions under his rule, gave orders to all his infantry and cavalry forces, took along his sister Arsinoe, and set out as far as the region of Raphia, where those with Antiochus had encamped.
  footnotes:
  - marker: a
    text: Greek 'those around Antiochus,' an idiom for Antiochus' party or forces; it may include Antiochus himself.
    reason: lexical_alternative
