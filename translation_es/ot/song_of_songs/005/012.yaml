translation:
  language: es
  text: Sus ojos son como palomas junto a corrientes de agua[a], bañadas en leche, sentadas junto a la plenitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bien colocados en su engaste»; la expresión final es difícil en hebreo y puede referirse a los ojos bien colocados, o a palomas junto a una poza llena.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֵינָיו
  english_pob_choice: His eyes
  chosen_spanish: Sus ojos
  alternatives_spanish:
  - Sus fuentes
  - Sus ojos de él
  lexicon: HALOT
  rationale: עַיִן normalmente significa 'ojo'; aunque en otros contextos puede ser 'fuente/manantial', aquí el poseedor y la imagen de las palomas favorecen con claridad el sentido corporal 'ojos'.
- source_word: כְּיוֹנִים
  english_pob_choice: like doves
  chosen_spanish: como palomas
  alternatives_spanish:
  - como tórtolas
  - igual que palomas
  lexicon: HALOT
  rationale: La partícula comparativa introduce un símil. 'Como palomas' mantiene la imagen poética con español natural y no añade precisión no sustentada por el hebreo.
- source_word: עַל אֲפִיקֵי מָיִם
  english_pob_choice: beside streams of water
  chosen_spanish: junto a corrientes de agua
  alternatives_spanish:
  - junto a canales de agua
  - sobre cauces de agua
  lexicon: HALOT
  rationale: אֲפִיקִים puede denotar cauces, corrientes o canales de agua. 'Junto a corrientes de agua' preserva el entorno del símil en un español fluido, sin fijar más de lo que el hebreo exige.
- source_word: רֹחֲצוֹת
  english_pob_choice: bathed
  chosen_spanish: bañadas
  alternatives_spanish:
  - lavadas
  - sumergidas
  lexicon: HALOT
  rationale: El participio de רחץ describe una acción de lavar o bañarse. 'Bañadas' suena natural en español poético y refleja mejor la revisada inglesa 'bathed' que 'lavadas'.
- source_word: בֶּחָלָב
  english_pob_choice: in milk
  chosen_spanish: en leche
  alternatives_spanish:
  - con leche
  - dentro de leche
  lexicon: HALOT
  rationale: La preposición ב aquí se entiende mejor en sentido locativo/instrumental. 'En leche' conserva la imagen vívida de blancura/pureza sin explicar de más.
- source_word: יֹשְׁבוֹת
  english_pob_choice: sitting
  chosen_spanish: sentadas
  alternatives_spanish:
  - asentadas
  - morando
  lexicon: HALOT
  rationale: El participio de ישב literalmente es 'sentarse' o 'habitar'. 'Sentadas' conserva el concreto valor descriptivo del hebreo en una escena poética donde las palomas están imaginadas como posadas.
- source_word: עַל מִלֵּאת
  english_pob_choice: by fullness
  chosen_spanish: junto a la plenitud
  alternatives_spanish:
  - en plenitud
  - junto a lo lleno
  - en una plenitud
  lexicon: HALOT
  rationale: מִלֵּאת es difícil y probablemente alude a plenitud, a un lugar lleno o a un receptáculo colmado. 'Junto a la plenitud' preserva la ambigüedad hebrea sin sobreinterpretar el final del verso.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se prefirió una formulación equivalente a ''bathed in milk'' y se mantuvo la clausula final en una forma que refleje la preposición sin resolver indebidamente la dificultad del hebreo.'
  spanish_consistency_notes:
  - Se preservó el símil con 'como palomas' en vez de suavizarlo a una comparación más explicativa.
  - '''Bañadas en leche'' mantiene la imaginería blanca/pura sin añadir una interpretación alegórica.'
  - La frase final se dejó deliberadamente abierta, con nota, para respetar la ambigüedad textual documentada en el audit trail.
