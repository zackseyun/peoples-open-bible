translation:
  language: es
  text: Vuélvete a Yahvé y deja atrás los pecados; ora[a] ante su rostro y disminuye el tropiezo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «suplica». El griego δεήθητι tiene un matiz de petición ferviente.
    reason: lexical_alternative
  - marker: b
    text: O «el obstáculo» o «lo que hace tropezar». πρόσκομμα puede nombrar una causa de caída moral.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπίστρεφε
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Regresa
  - Vuelve
  lexicon: LSJ
  rationale: El imperativo de ἐπιστρέφω expresa volver o regresar hacia Dios. «Vuélvete» conserva el movimiento relacional y el matiz exhortativo en español natural, sin cargar de más con la terminología técnica de «arrepentirse».
- source_word: ἐπὶ Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - hacia Yahvé
  lexicon: LSJ
  rationale: El contexto apunta al nombre divino; en el marco POB se prefiere «Yahvé» para יהוה. Aunque el griego dice Κύριον, la referencia es al Dios de Israel, y el destinatario del giro queda explícito en español.
- source_word: ἀπόλειπε
  english_pob_choice: leave behind
  chosen_spanish: deja atrás
  alternatives_spanish:
  - abandona
  - deja
  lexicon: LSJ
  rationale: ἀπολείπω pide separación decisiva de los pecados. «Deja atrás» reproduce bien esa idea en español actual y evita la rigidez de un calco.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - los pecados cometidos
  - las faltas
  lexicon: LSJ
  rationale: El plural debe mantenerse en español. «Pecados» es la correspondencia directa y conserva el peso moral del término sin abstracción excesiva.
- source_word: δεήθητι
  english_pob_choice: pray
  chosen_spanish: ora
  alternatives_spanish:
  - suplica
  - ruega
  lexicon: LSJ
  rationale: El verbo denota súplica o petición ante Dios. «Ora» es claro y digno en español; el matiz de petición queda apoyado por el contexto exhortativo y por la preposición siguiente.
- source_word: κατὰ πρόσωπον
  english_pob_choice: before his face
  chosen_spanish: delante de su rostro
  alternatives_spanish:
  - en su presencia
  - ante su rostro
  lexicon: LSJ
  rationale: La imagen griega literal se conserva con una formulación natural en español. «Delante de su rostro» mantiene la fuerza antropomórfica sin ocultar la idiomática semítica del original.
- source_word: σμίκρυνον
  english_pob_choice: lessen
  chosen_spanish: disminuye
  alternatives_spanish:
  - reduce
  - haz más pequeño
  lexicon: LSJ
  rationale: El imperativo pide hacer menor o reducir. «Disminuye» comunica con precisión la acción requerida y suena natural en español contemporáneo.
- source_word: πρόσκομμα
  english_pob_choice: stumbling
  chosen_spanish: el tropiezo
  alternatives_spanish:
  - el obstáculo
  - la piedra de tropiezo
  lexicon: LSJ
  rationale: πρόσκομμα puede ser obstáculo o causa de tropiezo. En español, «tropiezo» conserva la ambigüedad entre impedimento y caída moral, como en la solución inglesa abstracta.
theological_decisions:
- issue: Nombre divino detrás de Κύριον
  english_pob_reading: to the Lord
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  - a Dios
  rationale: Aunque el griego usa κύριος, el contexto y la política terminológica del proyecto favorecen la identificación con el nombre divino. Esto evita ocultar el referente y mantiene la transparencia con el texto fuente.
  doctrine_reference: 'Proyecto POB: terminología de יהוה / YHWH'
- issue: Naturaleza de πρόσκομμα
  english_pob_reading: lessen stumbling
  chosen_spanish_reading: disminuye el tropiezo
  alternative_spanish_readings:
  - disminuye el obstáculo
  - reduce lo que hace tropezar
  rationale: La frase puede referirse a un obstáculo, una ocasión de caída o el acto mismo de tropezar. «Tropiezo» preserva esa tensión sin decidirla de manera innecesaria.
  doctrine_reference: Translation philosophy §§1, 5
- issue: κατὰ πρόσωπον como idioma de oración directa
  english_pob_reading: pray before his face
  chosen_spanish_reading: ora delante de su rostro
  alternative_spanish_readings:
  - ora en su presencia
  - ora ante su rostro
  rationale: La expresión mantiene la plasticidad antropomórfica del original y la cercanía reverente de la oración directa. No se normaliza a una forma menos vívida.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se ajustó el español para responder a la validación previa: los marcadores [a] y [b] aparecen ahora exactamente en el texto principal. También se mantuvo la decisión de traducir el giro idiomático κατὰ πρόσωπον de manera literal pero natural, y de reflejar πρόσκομμα con un término español que conserve la ambigüedad moral del original.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar POB para el nombre divino.
  - «Pecados» mantiene el plural del griego ἁμαρτίας.
  - «Delante de su rostro» preserva la imagen semítica sin perder inteligibilidad.
  - «Tropiezo» mantiene abierta la posibilidad de obstáculo o caída moral, en paralelo con el audit trail inglés.
