translation:
  language: es
  text: 'David le dijo: «¿De quién eres, y de dónde eres?» Él dijo: «Soy un joven egipcio, esclavo de un hombre amalecita[a], y mi amo me abandonó porque enfermé[b] hace tres días[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de un amalecita». El hebreo puede expresar simplemente la pertenencia étnica o relacional; se mantiene «hombre amalecita» para conservar la relación con «esclavo».
    reason: lexical_alternative
  - marker: b
    text: O «caí enfermo». El hebreo presenta la enfermedad como el motivo de su abandono.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «hoy tres [días]», un modismo hebreo que significa «hace tres días».
    reason: cultural_note
lexical_decisions:
- source_word: לְמִי אַתָּה
  english_pob_choice: To whom do you belong
  chosen_spanish: ¿De quién eres?
  alternatives_spanish:
  - ¿A quién perteneces?
  - ¿De quién eres tú?
  lexicon: HALOT
  rationale: La pregunta hebrea apunta a pertenencia o lealtad, no solo a identidad. «¿De quién eres?» es breve, natural en español y conserva esa idea de pertenencia mejor que una formulación más explicativa.
- source_word: וְאֵי מִזֶּה אָתָּה
  english_pob_choice: and where are you from
  chosen_spanish: ¿y de dónde eres?
  alternatives_spanish:
  - ¿y de dónde vienes?
  - ¿y de qué lugar eres?
  lexicon: HALOT
  rationale: La expresión pregunta por el origen. «¿De dónde eres?» es la forma más natural en español y mantiene la fuerza directa del hebreo.
- source_word: נַעַר מִצְרִי
  english_pob_choice: an Egyptian young man
  chosen_spanish: un joven egipcio
  alternatives_spanish:
  - un muchacho egipcio
  - un egipcio joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde muchacho hasta joven; aquí «joven» evita sugerir niñez y conserva la referencia a edad sin exagerarla.
- source_word: עֶבֶד
  english_pob_choice: a slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: HALOT
  rationale: Se mantiene «esclavo» porque el contexto foregrounda la relación de posesión y abandono por parte del amo, en línea con la decisión auditada del inglés POB.
- source_word: לְאִישׁ עֲמָלֵקִי
  english_pob_choice: of an Amalekite man
  chosen_spanish: de un hombre amalecita
  alternatives_spanish:
  - de un amalecita
  - perteneciente a un hombre amalecita
  lexicon: HALOT
  rationale: «Hombre amalecita» conserva tanto el valor de אִישׁ como la designación étnica. «De» mantiene la relación de dependencia con «esclavo».
- source_word: וַיַּעַזְבֵנִי אֲדֹנִי
  english_pob_choice: my master abandoned me
  chosen_spanish: mi señor me abandonó
  alternatives_spanish:
  - mi amo me abandonó
  - mi señor me dejó
  lexicon: HALOT
  rationale: En esta escena el poseedor humano es el referente de אֲדֹנִי; «señor» es idiomático en español y preserva la relación social sin forzar un tono litúrgico. «Abandonó» recoge bien el peso de עזב.
- source_word: כִּי חָלִיתִי
  english_pob_choice: because I fell sick
  chosen_spanish: porque enfermé
  alternatives_spanish:
  - porque caí enfermo
  - porque me enfermé
  lexicon: HALOT
  rationale: El verbo comunica el inicio/irrupción de la enfermedad. «Enfermé» es breve y natural; mantiene el valor eventivo mejor que un estado estático.
- source_word: הַיּוֹם שְׁלֹשָׁה
  english_pob_choice: three days ago
  chosen_spanish: hace tres días
  alternatives_spanish:
  - hoy hace tres días
  - tres días atrás
  lexicon: HALOT
  rationale: Es un modismo temporal hebreo equivalente a «hace tres días». Se opta por la forma más clara y natural en español.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי (amo/señor) como referencia humana, no divina
  english_pob_reading: my master abandoned me
  chosen_spanish_reading: mi señor me abandonó
  alternative_spanish_readings:
  - mi amo me abandonó
  - mi señor/amo me abandonó
  rationale: El contexto señala a un dueño humano amalecita, no a una referencia a Dios. «Señor» mantiene la función social del término sin introducir connotación teológica indebida.
  doctrine_reference: Contexto narrativo de 1 Samuel 30:13; distinción semántica de אֲדֹנִי en usos humanos frente a divinos.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la revisión reciente prefirió una formulación más natural de pertenencia y un verbo más formal para la enfermedad. En español se reflejan esas decisiones con «¿De quién eres?» y «enfermé». También se preservó la opción lexical de «esclavo» y la lectura idiomática temporal «hace tres días».'
  spanish_consistency_notes:
  - Se mantiene «esclavo» para עֶבֶד, en coherencia con el criterio POB cuando la relación de propiedad es central.
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; aquí no aparece.
  - «Señor» en «mi señor» es un tratamiento humano, no una sustitución del nombre divino.
  - La puntuación sigue el español editorial estándar con comillas angulares y signos de interrogación de apertura.
