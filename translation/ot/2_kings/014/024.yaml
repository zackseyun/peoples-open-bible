id: 2KI.14.24
reference: 2 Kings 14:24
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה לֹ֣א סָ֗ר מִ/כָּל חַטֹּאות֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־־־׃
translation:
  text: He did what was evil in the eyes of Yahweh. He did not turn away from any of the sins of Jeroboam son of Nebat[a], which he caused Israel to commit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who caused Israel to sin.' The Hebrew relative clause can be taken as referring directly to Jeroboam rather than instrumentally to his sins.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה introduces the narrative action. English omits the conjunction for natural style while preserving the verbal sense 'did'.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - what was bad
  lexicon: HALOT
  rationale: Idiomatic expression עשה הרע is regularly rendered 'do what is evil.' This preserves the moral evaluation without woodenly translating the article.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A standard Hebrew idiom for divine evaluation. 'In the eyes of' is transparent and close to the source. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא סָר
  chosen: He did not turn away
  alternatives:
  - He did not depart
  - He did not turn aside
  lexicon: HALOT
  rationale: סור here means to turn aside/depart from a course. 'Turn away' is natural English and fits the moral-religious context.
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - from any of
  - from the whole of
  lexicon: HALOT
  rationale: The preposition and quantifier together indicate comprehensive non-departure from the pattern of sin.
- source_word: חַטֹּאות
  chosen: the sins
  alternatives:
  - the sinful acts
  - the offenses
  lexicon: HALOT
  rationale: Common noun for sins; 'sins' is the most direct and consistent rendering.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Standard English transliteration of the proper names; construct relationship rendered naturally as 'son of.'
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - which he made Israel commit
  - with which he caused Israel to sin
  - who caused Israel to sin
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: ''cause to sin.'' The relative clause most naturally refers to Jeroboam''s sins/practices rather than merely appositionally to Jeroboam himself, so ''by which'' makes explicit the instrumental sense in English while preserving the causative force.'
