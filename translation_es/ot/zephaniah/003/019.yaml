translation:
  language: es
  text: He aquí, en aquel tiempo actuaré contra todos tus opresores[a], y salvaré a la coja[b] y reuniré a la expulsada[b], y las haré alabanza y nombre en toda tierra[c] donde fueron avergonzadas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que te afligen». La raíz hebrea puede significar afligir, oprimir o humillar.
    reason: lexical_alternative
  - marker: b
    text: O «la que cojea» y «la que fue expulsada»; el hebreo usa formas femeninas singulares, probablemente personificando a la comunidad afligida.
    reason: lexical_alternative
  - marker: c
    text: O «en toda la tierra». El hebreo también puede entenderse así; aquí la traducción principal expresa el sentido distributivo de los distintos países o territorios.
    reason: lexical_alternative
  - marker: d
    text: 'La frase final es difícil en hebreo; también puede entenderse más literalmente como «en su vergüenza». La traducción sigue el sentido contextual: «donde fueron avergonzadas».'
    reason: textual_variant
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, pues
  lexicon: HALOT
  rationale: La fórmula introduce una proclamación solemne de Yahvé. «He aquí» conserva bien el tono profético y resulta natural en español bíblico sin volverse arcaico en exceso.
- source_word: עֹשֶׂה
  english_pob_choice: I will deal with
  chosen_spanish: actuaré contra
  alternatives_spanish:
  - haré
  - tomaré acción contra
  lexicon: HALOT
  rationale: Con el objeto «todos tus opresores», el verbo expresa una acción decisiva de juicio. «Actuaré contra» mantiene el sentido sin precisar más de lo que el hebreo exige.
- source_word: מְעַנַּיִךְ
  english_pob_choice: your oppressors
  chosen_spanish: tus opresores
  alternatives_spanish:
  - los que te afligen
  - los que te humillan
  lexicon: HALOT
  rationale: La raíz admite afligir, oprimir o humillar; aquí el contexto de hostilidad y juicio favorece «opresores», que comunica mejor la fuerza del término.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: Es la fórmula profética temporal estándar. «En aquel tiempo» reproduce bien la deixis y el tono oracular.
- source_word: וְהוֹשַׁעְתִּי
  english_pob_choice: I will save
  chosen_spanish: salvaré
  alternatives_spanish:
  - libraré
  - rescataré
  lexicon: HALOT
  rationale: El verbo ישׁע se traduce con el verbo básico «salvar» para conservar la resonancia teológica y la claridad en la restauración prometida.
- source_word: הַצֹּלֵעָה
  english_pob_choice: the lame
  chosen_spanish: la coja
  alternatives_spanish:
  - la que cojea
  - la lisiada
  lexicon: HALOT
  rationale: La forma hebrea es femenina singular y puede funcionar de modo colectivo o personificar a la comunidad afligida. «La coja» conserva la imagen concreta y el paralelo con «la expulsada».
- source_word: הַנִּדָּחָה
  english_pob_choice: the outcast
  chosen_spanish: la expulsada
  alternatives_spanish:
  - la desterrada
  - la dispersada
  lexicon: HALOT
  rationale: Desde נדח, la idea es la de ser echada fuera o apartada. «La expulsada» refleja el movimiento de expulsión con brevedad y sin perder la tensión del texto.
- source_word: אֲקַבֵּץ
  english_pob_choice: gather
  chosen_spanish: reuniré
  alternatives_spanish:
  - juntar&eacute;
  - agruparé
  lexicon: HALOT
  rationale: «Reuniré» comunica el verbo de recogida/restauración con naturalidad en español y deja ver el retorno de los dispersos.
- source_word: וְשַׂמְתִּים
  english_pob_choice: I will make them
  chosen_spanish: las pondré
  alternatives_spanish:
  - las haré
  - las estableceré
  lexicon: HALOT
  rationale: El hebreo usa un verbo de poner/colocar con predicados nominales. «Las pondré» conserva la estructura verbal y permite los complementos «como alabanza y como nombre».
- source_word: לִתְהִלָּה
  english_pob_choice: a praise
  chosen_spanish: como alabanza
  alternatives_spanish:
  - como motivo de alabanza
  - como objeto de alabanza
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «alabanza» para no diluir el valor nominal del hebreo y para sostener el paralelismo con «como nombre».
- source_word: וּלְשֵׁם
  english_pob_choice: a name
  chosen_spanish: como nombre
  alternatives_spanish:
  - como renombre
  - como fama
  lexicon: HALOT
  rationale: «Nombre» conserva el hebraísmo y la idea de reputación/renombre sin explicitarla demasiado; el paralelo poético con «alabanza» se mantiene visible.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in every land
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - en toda la región
  lexicon: HALOT
  rationale: El hebreo puede tener sentido distributivo, pero aquí el POB inglés optó por «every land» para reflejar la dispersión entre naciones. En español, «toda la tierra» conserva la amplitud y el eco bíblico; la nota explica la posible lectura distributiva.
- source_word: בָּשְׁתָּם
  english_pob_choice: where they were put to shame
  chosen_spanish: donde fueron avergonzadas
  alternatives_spanish:
  - en su vergüenza
  - donde las avergonzaron
  lexicon: HALOT
  rationale: La frase final es difícil; el contexto favorece un sentido ligado a los lugares de vergüenza. «Donde fueron avergonzadas» conserva la reversión de la humillación sin resolver excesivamente la ambigüedad.
theological_decisions:
- issue: Sujeto colectivo femenino en las participios 'la coja' y 'la expulsada'
  english_pob_reading: the lame ... the outcast
  chosen_spanish_reading: la coja ... la expulsada
  alternative_spanish_readings:
  - la que cojea ... la que fue expulsada
  - la lisiada ... la desterrada
  rationale: Se conserva el femenino singular como personificación de la comunidad afligida, siguiendo la tensión observada en el hebreo y en el aparato del POB inglés. No se neutraliza el género para no borrar esa personificación textual.
  doctrine_reference: Preservar la tensión literaria y la personificación comunitaria.
- issue: Alcance de 'en toda la tierra' frente a 'en todo el mundo'
  english_pob_reading: in every land
  chosen_spanish_reading: en toda la tierra
  alternative_spanish_readings:
  - en cada tierra
  - por toda la tierra
  rationale: Aunque el inglés POB interpreta distributivamente como 'every land', el español mantiene la amplitud del hebreo con una fórmula natural. La nota de pie permite recordar la alternativa más literal 'en la tierra entera'.
  doctrine_reference: Mantener el sentido distributivo sin perder el eco hebreo.
- issue: Final difícil בָּשְׁתָּם
  english_pob_reading: where they were put to shame
  chosen_spanish_reading: donde fueron avergonzadas
  alternative_spanish_readings:
  - en su vergüenza
  - en la tierra de su vergüenza
  rationale: Se sigue el sentido contextual de reversión de la vergüenza, pero se conserva una formulación que admite la dificultad del hebreo. No se fuerza una solución demasiado cerrada.
  doctrine_reference: Preservar la dificultad textual sin borrarla.
translation_notes:
  revision_awareness: 'El borrador sigue el alto acuerdo del cotejo disponible: se mantienen la fórmula profética, el valor restaurador del verbo de salvar/reunir y la resolución contextual de la frase final difícil, sin cambios relevantes respecto del pasaje fuente y del audit trail inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» implícitamente como sujeto divino en la traducción, de acuerdo con la política del proyecto, aunque no aparece explícito en este versículo.
  - Se preservó el paralelismo nominal «como alabanza y como nombre», evitando explicaciones interpretativas en el texto principal.
  - Se mantuvo el femenino singular de los participios para reflejar la personificación comunitaria que documenta el texto fuente.
