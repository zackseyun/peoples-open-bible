  yaml_path: translation/ot/deuteronomy/022/021.yaml
  text: Then they shall bring out the young woman to the entrance of her father's house[a], and the men of her city shall stone her with stones, and she shall die, because she has committed an outrageous act in Israel by prostituting herself in her father's house[c][b]. So you shall purge the evil from your midst.
  footnotes:
  - marker: a
    text: Or 'the girl.' The Hebrew נַעַר can refer to a young female person, with nuance determined by context.
    reason: lexical_alternative
  - marker: b
    text: Or 'a disgraceful thing' or 'a vile act.' The Hebrew נְבָלָה denotes a morally shocking outrage.
    reason: lexical_alternative
  - marker: c
    text: Or 'by committing sexual immorality.' The Hebrew verb זנה literally evokes prostitution/harlotry and is often used more broadly for illicit sexual conduct.
    reason: lexical_alternative
