translation:
  language: es
  text: En total, los días de Adán[a] que vivió fueron novecientos treinta años, y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אָדָם puede significar «hombre» o «humanidad» en otros contextos, pero aquí se refiere al individuo Adán en la genealogía.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  lexicon: HALOT
  rationale: En la fórmula genealógica, el verbo expresa el total de la vida de forma idiomática. En español, «fueron» mantiene el carácter de resumen del número de años sin volver la frase artificial.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - la totalidad de los días de
  - toda la vida de
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo que cuenta la vida en «días». «Todos los días de» reproduce mejor la fórmula repetida de Génesis que una paráfrasis como «toda la vida de».
- source_word: אָדָם
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - hombre
  - humanidad
  lexicon: HALOT
  rationale: Aquí se trata del nombre propio del individuo en la genealogía, no de un uso genérico. «Adán» preserva la referencia personal y sigue la decisión auditada de transliterar nombres.
- source_word: אֲשֶׁר חַי
  english_pob_choice: that he lived
  chosen_spanish: que vivió
  alternatives_spanish:
  - durante lo cual vivió
  - que había vivido
  lexicon: HALOT
  rationale: La cláusula relativa modifica «días» y en español se expresa con naturalidad como «que vivió», sin introducir un matiz temporal que el hebreo no exige.
- source_word: תְּשַׁע מֵאוֹת ... וּשְׁלֹשִׁים שָׁנָה
  english_pob_choice: nine hundred and thirty years
  chosen_spanish: novecientos treinta años
  alternatives_spanish:
  - 930 años
  lexicon: HALOT
  rationale: Se escribe el número con letras para conservar el registro literario y formular de la genealogía. El hebreo presenta la cifra completa en forma cardinal.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - entonces murió
  - y falleció
  lexicon: HALOT
  rationale: La clausura genealógica se mantiene breve y sobria. «Y murió» conserva la fórmula repetitiva y el peso temático de la mortalidad sin suavizarla.
theological_decisions:
- issue: Referencia de אָדָם en la genealogía
  english_pob_reading: Adam as a personal name
  chosen_spanish_reading: Adán como nombre propio
  alternative_spanish_readings:
  - hombre
  - ser humano
  rationale: La sección es genealógica y apunta al individuo Adán. Traducirlo como «hombre» oscurecería la identidad personal que el contexto demanda. Se mantiene la tensión léxica de que אָדָם puede significar otras cosas en otros contextos, pero aquí predomina el nombre propio.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; respetar el contexto para אָדָם.'
- issue: Fórmula de mortalidad final
  english_pob_reading: and he died
  chosen_spanish_reading: y murió
  alternative_spanish_readings:
  - entonces murió
  - y expiró
  rationale: La fórmula concluyente de Génesis 5 subraya la mortalidad humana de modo llano y reiterado. Se preserva sin atenuación ni explicación añadida, manteniendo su fuerza teológica.
  doctrine_reference: 'DOCTRINE.md: conservar la tensión teológica y no suavizarla mediante paráfrasis.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el presente borrador sigue de cerca la decisión auditada en inglés y la adapta a un español natural y formal sin perder la fórmula genealógica.
  spanish_consistency_notes:
  - Se mantiene «Adán» como nombre propio en todo el pasaje.
  - 'Se conserva la estructura genealógica típica: «todos los días de…», número en palabras y cierre con «y murió».'
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque no aparece el Tetragrámaton en este versículo.
  - El tono es sobrio y publicable, con puntuación española estándar.
