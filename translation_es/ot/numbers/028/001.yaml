review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la fórmula hebrea: וַיְדַבֵּר = «habló», אֶל = «a», מֹשֶׁה = «Moisés», לֵאמֹר = «diciendo». También preserva correctamente el nombre divino יְהוָה como «Yahvé», en línea con la política del proyecto.'
  spanish_quality_summary: 'El texto principal en español es natural, claro y digno: «Yahvé habló a Moisés, diciendo,» funciona bien como fórmula narrativa bíblica. Sin embargo, la nota al pie contiene un problema de contenido: presenta «Yahvé» como transliteración alternativa de «YHWH», cuando ya es la forma escogida en el texto, y además no refleja con precisión la nota inglesa, que ofrece alternativas en inglés («Yahweh» o «Jehovah»).'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» en el texto principal; no se enmascara como «SEÑOR». No hay otros términos conflictivos en este versículo.'
  issues:
  - severity: medium
    issue: La nota al pie está mal formulada respecto a las alternativas del nombre divino.
    rationale: 'La nota dice: «Hebreo: “YHWH”; también podría transliterarse “Yahvé” o “Jehová”». Pero «Yahvé» no es una alternativa aquí, sino la forma ya usada en el texto principal. La nota debe indicar el hebreo base y, si conserva alternativas, ofrecer una alternativa real como «Jehová». Además conviene evitar sugerir una alternativa duplicada innecesaria.'
  - severity: low
    issue: La nota española no replica con suficiente limpieza la intención del rastro de auditoría inglés.
    rationale: La nota inglesa documenta el hebreo subyacente y menciona transliteraciones alternativas. En español, puede expresarse de forma más idiomática y precisa sin redundancia.
  revised_spanish_text: Yahvé habló a Moisés[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también se translitera «Jehová».'
    reason: alternative_reading
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota para eliminar la redundancia de presentar «Yahvé» como alternativa cuando ya es la lectura elegida en el texto, y para dejar una documentación más precisa y limpia del nombre divino.
