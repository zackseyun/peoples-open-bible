id: 2CH.21.13
reference: 2 Chronicles 21:13
source:
  edition: WLC
  text: וַ/תֵּ֗לֶךְ בְּ/דֶ֨רֶךְ֙ מַלְכֵ֣י יִשְׂרָאֵ֔ל וַ/תַּזְנֶ֤ה אֶת יְהוּדָה֙ וְ/אֶת יֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם כְּ/הַזְנ֖וֹת בֵּ֣ית אַחְאָ֑ב וְ/גַ֨ם אֶת אַחֶ֧י/ךָ בֵית אָבִ֛י/ךָ הַ/טּוֹבִ֥ים מִמְּ/ךָ֖ הָרָֽגְתָּ־־־־׃
translation:
  text: but you have walked in the way of the kings of Israel[a], and have led Judah and the inhabitants of Jerusalem into sexual immorality, as the house of Ahab led them into sexual immorality; and you have also killed your brothers of your father’s house[b], who were better than you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'made Judah and the inhabitants of Jerusalem play the prostitute,' a prophetic metaphor for covenant unfaithfulness, often expressed in idolatry.
    reason: lexical_alternative
  - marker: b
    text: '''The house of Ahab'' refers to Ahab’s ruling dynasty.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּלֶךְ בְּדֶרֶךְ
  chosen: have walked in the way of
  alternatives:
  - went in the way of
  - followed the ways of
  lexicon: HALOT
  rationale: The idiom 'walk in the way of' is common biblical language for adopting a pattern of conduct. 'Have walked' fits the English perfect in this prophetic accusation while preserving the Hebrew metaphor.
- source_word: מַלְכֵי יִשְׂרָאֵל
  chosen: the kings of Israel
  lexicon: HALOT
  rationale: Straightforward genitive construction; retained formally because the historical contrast between Judah and Israel is important.
- source_word: וַתַּזְנֶה אֶת יְהוּדָה וְאֶת יֹשְׁבֵי יְרוּשָׁלַם
  chosen: have led Judah and the inhabitants of Jerusalem into sexual immorality
  alternatives:
  - made Judah and the inhabitants of Jerusalem play the prostitute
  - caused Judah and the inhabitants of Jerusalem to commit whoredom
  - caused Judah and the inhabitants of Jerusalem to be unfaithful
  lexicon: HALOT
  rationale: זנה literally refers to prostitution/whoredom, but in prophetic and royal-apostasy contexts it commonly functions metaphorically for covenantal unfaithfulness expressed in idolatry. 'Led ... into sexual immorality' preserves the metaphor's force without archaic phrasing, while indicating causation toward Judah and Jerusalem's people.
- source_word: כְּהַזְנוֹת בֵּית אַחְאָב
  chosen: as the house of Ahab led them into sexual immorality
  alternatives:
  - as the house of Ahab practiced whoredom
  - as the house of Ahab made them play the prostitute
  lexicon: HALOT
  rationale: 'The infinitive construct with כ marks comparison: Jehoram''s action is likened to the apostasy associated with Ahab''s dynasty. Repeating the causative sense keeps the parallel with the previous clause clear in English.'
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - Ahab's house
  - Ahab's dynasty
  lexicon: HALOT
  rationale: '''House'' is retained because it is standard biblical language for a ruling dynasty and remains understandable in modern English.'
- source_word: וְגַם
  chosen: and ... also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: The additive force heightens the accusation by adding murder to apostasy; represented explicitly in English.
- source_word: אַחֶיךָ בֵית אָבִיךָ
  chosen: your brothers, your father’s house
  alternatives:
  - your brothers, your father's house
  - your kinsmen of your father's house
  lexicon: HALOT
  rationale: The appositional structure identifies the brothers as members of the royal household. Keeping both elements preserves the emphasis and familial gravity.
- source_word: הַטּוֹבִים מִמְּךָ
  chosen: who were better than you
  alternatives:
  - who were more worthy than you
  - who were better men than you
  lexicon: HALOT
  rationale: טובים with מן expresses comparative moral or personal quality. 'Better than you' is concise and preserves the rebuke without adding 'men,' which is implied but not explicit.
- source_word: הָרָגְתָּ
  chosen: you have killed
  alternatives:
  - you killed
  - you murdered
  lexicon: HALOT
  rationale: The verb means 'kill/slay.' 'Killed' is the most direct lexical equivalent; 'murdered' is interpretive, though contextually plausible. The perfect English form suits the accusatory discourse.
