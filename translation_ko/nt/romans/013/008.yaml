id: ROM.13.8
reference: Romans 13:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μηδενὶ μηδὲν ὀφείλετε, εἰ μὴ τὸ ⸂ἀλλήλους ἀγαπᾶν⸃· ὁ γὰρ ἀγαπῶν τὸν ἕτερον νόμον πεπλήρωκεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/008.yaml
  text: Owe no one anything, except to love one another; for the one who loves another has fulfilled the law.
translation:
  language: ko
  text: 아무에게도 아무것도 빚지지 마십시오. 다만 「서로 사랑하는 것」[a]은 예외입니다. 다른 사람을 사랑하는 자는 율법을 다 이루었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「다른 사람」으로도 옮길 수 있다. 헬라어 본문은 「다른 자」(τὸν ἕτερον)이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδενὶ μηδὲν ὀφείλετε
  english_pob_choice: Owe no one anything
  chosen_korean: 아무에게도 아무것도 빚지지 마십시오
  alternatives_korean:
  - 누구에게도 아무것도 빚지지 마십시오
  lexicon: BDAG
  rationale: 이중 부정의 포괄적 금지를 한국어 「아무 ... 아무것 ... 마십시오」 구조로 자연스럽게 보존한다.
- source_word: εἰ μὴ τὸ ἀλλήλους ἀγαπᾶν
  english_pob_choice: except to love one another
  chosen_korean: 다만 「서로 사랑하는 것」은 예외입니다
  alternatives_korean:
  - 서로 사랑하는 것 외에는
  lexicon: BDAG
  rationale: '정책 지시에 따라 τὸ ἀγαπᾶν ἀλλήλους를 「서로 사랑하는 것」으로 인용 부호 안에 보존한다. 관형 부정사가 가리키는 「유일한 지속 의무」를 한국어 문장 구조에 자연스럽게 옮긴다.'
- source_word: ὁ ἀγαπῶν
  english_pob_choice: the one who loves
  chosen_korean: 사랑하는 자
  alternatives_korean:
  - 사랑하는 사람
  lexicon: BDAG
  rationale: 관형 분사를 한국어 명사구로 자연스럽게 옮긴다.
- source_word: τὸν ἕτερον
  english_pob_choice: another
  chosen_korean: 다른 사람
  alternatives_korean:
  - 다른 자
  - 이웃
  lexicon: BDAG
  rationale: 본문은 「다른 자」이지 명시적 「이웃(πλησίον)」이 아니다. 「다른 사람」으로 옮겨 원어를 충실히 따른다. 13:9의 「이웃」(πλησίον)과 어휘적으로 구분을 유지한다.
- source_word: νόμον πεπλήρωκεν
  english_pob_choice: has fulfilled the law
  chosen_korean: 율법을 다 이루었다
  alternatives_korean:
  - 율법을 성취하였다
  - 율법을 완성하였다
  lexicon: BDAG
  rationale: 완료 시제로 결과 지속. 「다 이루었다」가 자연스러운 한국 성경 어휘이며 πεπλήρωκεν의 완성된 상태를 살린다.
theological_decisions:
- issue: 바울의 빚 금지의 범위
  chosen_reading: 빚지지 말라는 진술을 문언 그대로 보존하고 서로 사랑함의 예외만 분명히 한다. 모든 차용에 대한 절대 금지로 확장하지 않는다.
  alternative_readings:
  - 모든 차용에 대한 절대 금지
  - 도덕적 의무에 대한 은유로만 읽기
  rationale: 본문은 빚의 용어로 말한 뒤 사랑의 예외를 둔다. 번역은 헬라어가 진술하는 바를 넘는 윤리 논쟁을 해결하지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
