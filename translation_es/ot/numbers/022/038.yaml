translation:
  language: es
  text: 'Entonces Balaam dijo a Balac[a]: «Mira, he venido a ti ahora. ¿De veras puedo decir algo? Hablaré solo la palabra que Dios ponga en mi boca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso puedo hablar algo?» El hebreo usa una construcción enfática para expresar capacidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: Renderiza la fuerza deíctica y enfática de הִנֵּה con un imperativo natural en español. «Mira» conserva la vivacidad del arranque sin caer en un arcaísmo como «he aquí».
- source_word: בָאתִי אֵלֶיךָ עַתָּה
  english_pob_choice: I have come to you now
  chosen_spanish: he venido a ti ahora
  alternatives_spanish:
  - he venido a ti
  - aquí estoy; he venido a ti
  lexicon: HALOT
  rationale: El perfecto con עַתָּה se mantiene como acción completada con inmediatez presente. «He venido a ti ahora» suena natural y conserva la cercanía y urgencia del hebreo.
- source_word: הֲיָכוֹל אוּכַל
  english_pob_choice: Am I really able
  chosen_spanish: ¿Acaso puedo
  alternatives_spanish:
  - ¿Puedo realmente
  - ¿Puedo de veras
  lexicon: HALOT
  rationale: La construcción enfática de capacidad se reproduce con una pregunta retórica que suena idiomática en español. «Acaso» ayuda a marcar la intensidad sin explicitar de más la mecánica gramatical.
- source_word: דַּבֵּר מְאוּמָה
  english_pob_choice: to speak anything at all
  chosen_spanish: hablar algo en absoluto
  alternatives_spanish:
  - decir nada
  - hablar nada
  lexicon: HALOT
  rationale: מְאוּמָה tiene valor de «nada/alguna cosa mínima» en contexto negativo o interrogativo. «Algo en absoluto» preserva la fuerza de polaridad negativa de la pregunta sin sonar demasiado literal.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la cosa
  lexicon: HALOT
  rationale: En el contexto profético, el singular concreto apunta al dicho autorizado por Dios. «La palabra» conserva la referencia específica y la resonancia de discurso revelado.
- source_word: יָשִׂים אֱלֹהִים בְּפִי
  english_pob_choice: that God puts in my mouth
  chosen_spanish: que Dios ponga en mi boca
  alternatives_spanish:
  - que Dios coloque en mi boca
  - que Dios meta en mi boca
  lexicon: HALOT
  rationale: La metáfora hebrea de discurso dado por Dios se mantiene en español con un subjuntivo natural. «Ponga en mi boca» es idiomático y preserva la imagen de speech controlado por Dios.
- source_word: אֹתוֹ אֲדַבֵּר
  english_pob_choice: I will speak only
  chosen_spanish: Hablaré solo
  alternatives_spanish:
  - Solo hablaré
  - Y eso hablaré
  lexicon: HALOT
  rationale: 'El objeto adelantado con el verbo enfatiza exclusividad: Balaam no hablará otra cosa. «Solo» expresa esa restricción en español sin añadir elementos que el hebreo no exige.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - los dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, el contexto y el verbo singular apuntan al Dios de Israel. En español se traduce como singular para reflejar el referente real del pasaje.
theological_decisions:
- issue: Control divino sobre el habla de Balaam
  english_pob_reading: Balaam states that he can speak only what God gives him to say.
  chosen_spanish_reading: Balaam afirma que solo puede hablar lo que Dios le ponga en la boca.
  alternative_spanish_readings:
  - Balaam simplemente promete limitarse voluntariamente a lo que Dios diga
  - Balaam dice que hablará lo que Dios le permita
  rationale: La pregunta enfática y la restricción final muestran limitación real de la palabra de Balaam, no solo una cortesía voluntaria. La redacción española conserva esa tensión entre capacidad y dependencia de la palabra divina.
  doctrine_reference: Conservar la tensión teológica sin resolverla de modo excesivo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis léxico y teológico del texto hebreo y el expediente auditado en inglés, manteniendo la construcción enfática de capacidad, la metáfora de la boca y la exclusividad del discurso divinamente dado. No hubo revisiones aplicadas en el expediente inglés reciente.
  spanish_consistency_notes:
  - Se usa «Dios» como singular por el contexto y el verbo singular hebreo.
  - Se preserva «la palabra» para הַדָּבָר en un contexto profético, evitando «mensaje» por ser más interpretativo.
  - «Hablar» se mantiene para דַּבֵּר por su valor general de emitir discurso, y no se sustituye por un equivalente más específico que estrecharía el sentido.
  - La nota al pie se ancla en la pregunta enfática, siguiendo la alternativa textual preservada por el audit trail en inglés.
