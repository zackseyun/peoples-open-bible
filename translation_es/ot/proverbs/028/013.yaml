translation:
  language: es
  text: Quien encubre[a] sus transgresiones no prosperará, pero el que las confiesa y las abandona, se le mostrará misericordia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esconde» o «cubre» sus transgresiones.
    reason: lexical_alternative
  - marker: b
    text: O «obtendrá misericordia» o «recibirá misericordia». El hebreo dice literalmente, en voz pasiva, «será mostrado misericordia», es decir, «se le mostrará misericordia».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַסֶּה
  english_pob_choice: covers
  chosen_spanish: encubre
  alternatives_spanish:
  - cubre
  - esconde
  lexicon: HALOT
  rationale: El participio expresa la idea concreta de cubrir/ocultar. En español, «encubre» conserva mejor el matiz moral de ocultar una falta que «cubre», sin volverla una paráfrasis excesiva.
- source_word: פְשָׁעָיו
  english_pob_choice: his transgressions
  chosen_spanish: sus transgresiones
  alternatives_spanish:
  - sus rebeliones
  - sus faltas
  - sus pecados
  lexicon: HALOT
  rationale: פשע denota transgresión o rebeldía, no solo un mal genérico. «Transgresiones» mantiene esa fuerza covenantal y moral con buena naturalidad en español.
- source_word: יַצְלִיחַ
  english_pob_choice: will not prosper
  chosen_spanish: no prosperará
  alternatives_spanish:
  - no tendrá éxito
  - no florecerá
  - no resultará
  lexicon: HALOT
  rationale: El hifil de צלח suele expresar éxito o prosperidad. «Prosperará» conserva el lenguaje sapiencial y el contraste moral del proverbio.
- source_word: וּמוֹדֶה
  english_pob_choice: confesses
  chosen_spanish: confiesa
  alternatives_spanish:
  - reconoce
  - admite
  lexicon: HALOT
  rationale: En este contexto, con pecado como objeto implícito y en paralelo con «abandona», el valor de confesión es el más claro y fiel al hebreo.
- source_word: וְעֹזֵב
  english_pob_choice: forsakes
  chosen_spanish: abandona
  alternatives_spanish:
  - deja
  - desiste de
  - renuncia a
  lexicon: HALOT
  rationale: עזב significa dejar o abandonar. «Abandona» refleja bien la ruptura con la conducta culpable y funciona naturalmente junto a «confiesa».
- source_word: יְרֻחָם
  english_pob_choice: will be shown mercy
  chosen_spanish: será mostrado en misericordia
  alternatives_spanish:
  - recibirá misericordia
  - obtendrá misericordia
  - será tenido misericordia
  lexicon: HALOT
  rationale: El pasivo de רחם indica recibir misericordia. Se conserva la pasiva sin nombrar explícitamente al agente, en línea con la lectura auditada, aunque la formulación española requiere una adaptación idiomática.
- source_word: implicit object after וּמוֹדֶה וְעֹזֵב
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - sus transgresiones
  - ellas
  lexicon: Hebrew syntax
  rationale: El hebreo omite el objeto repetido después de «confiesa y abandona»; en español se recupera de manera natural con «las», refiriéndose a las transgresiones mencionadas antes.
- source_word: masculine singular participles/pronouns
  english_pob_choice: Whoever ... he who ... his
  chosen_spanish: Quien ... el que ... sus
  alternatives_spanish:
  - El que ...
  - Quienquiera que ...
  lexicon: Hebrew grammar
  rationale: El hebreo usa formas masculinas singulares con valor genérico. «Quien» y «el que» preservan ese singular representativo de forma natural en español.
theological_decisions:
- issue: Agente implícito en la pasiva de misericordia
  english_pob_reading: Retain passive 'will be shown mercy' without making God the explicit subject in the main text.
  chosen_spanish_reading: Conservar la pasiva «será mostrado en misericordia» sin explicitar en el texto principal quién actúa la misericordia.
  alternative_spanish_readings:
  - Dios le mostrará misericordia
  - recibirá misericordia
  - obtendrá misericordia
  rationale: El hebreo presenta una pasiva que no nombra al agente. Mantener la pasiva preserva esa reserva textual y evita introducir en el cuerpo principal un sujeto no expresado, aunque la referencia teológica apunte claramente a la misericordia divina.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza moral de פשע
  english_pob_reading: transgressions
  chosen_spanish_reading: transgresiones
  alternative_spanish_readings:
  - pecados
  - rebeldías
  - faltas
  rationale: «Transgresiones» conserva el peso de quebrantar un límite o pacto, evitando suavizar el término a una categoría demasiado general. Esto respeta la tensión moral del proverbio.
  doctrine_reference: 'Lexical consistency: covenant/moral nuance'
translation_notes:
  revision_awareness: El texto y las decisiones siguen de cerca el registro auditado del inglés POB y la fuente hebrea, sin cambios revisionarios reportados en el ciclo más reciente; se conserva la pasiva de misericordia y el paralelismo confesión/abandono con el objeto implícito recuperado en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «transgresiones» para פשע, coherente con el matiz moral-covenantal ya documentado.
  - Se conserva la pasiva de רחם para no forzar un sujeto explícito ausente en el hebreo.
  - El pronombre genérico singular se expresa con «Quien / el que», manteniendo el valor representativo del hebreo.
