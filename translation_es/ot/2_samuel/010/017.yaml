revisions:
- from: Cuando se informó a David, reunió a todo Israel, cruzó el Jordán y llegó a Helam. Entonces Aram se dispuso en formación de batalla para salir al encuentro de David y peleó con él[a].
  to: Cuando se le informó a David, reunió a todo Israel, cruzó el Jordán y llegó a Helam. Entonces Aram se dispuso en formación de batalla para salir al encuentro de David y combatieron con él[a].
  rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad del español y la fidelidad gramatical al hebreo sin alterar el sentido ni la línea del POB inglés: se añadió el dativo en «se le informó a David» y se ajustó el verbo final a plural semántico/colectivo con «combatieron con él», manteniendo «Aram» y la nota sobre el modismo hebreo.'
