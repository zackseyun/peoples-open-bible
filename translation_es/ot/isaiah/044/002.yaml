translation:
  language: es
  text: 'Así dice Yahvé, tu Hacedor y el que te formó desde el vientre, el que te ayudará: No temas, Jacob, mi siervo, Jesurún[a], a quien he escogido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jesurún es un nombre poético de Israel, probablemente con el sentido de «recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» conserva el valor del nombre del pacto y evita la máscara devocional «SEÑOR»; «Jehová» queda como alternativa tradicional menos preferida.
- source_word: עֹשֶׂךָ
  english_pob_choice: your Maker
  chosen_spanish: tu Hacedor
  alternatives_spanish:
  - el que te hizo
  - tu Creador
  lexicon: HALOT
  rationale: El participio sustantivado de עשה queda bien en español con «Hacedor», que suena natural y mantiene el matiz personal y relacional de la acción creadora sobre Israel.
- source_word: וְיֹצֶרְךָ
  english_pob_choice: and the one who formed you
  chosen_spanish: y el que te formó
  alternatives_spanish:
  - y tu Formador
  - y el que te modeló
  lexicon: HALOT
  rationale: יָצַר/יצר tiene el matiz de formar como alfarero. «Formó» conserva esa intención distinta de «hacer» y funciona con fluidez en español.
- source_word: מִבֶּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde la matriz
  lexicon: HALOT
  rationale: «Desde el vientre» mantiene la imagen corporal del hebreo y su fuerza de origen/elegimiento temprano. En español bíblico es claro y digno.
- source_word: יַעְזְרֶךָּ
  english_pob_choice: who will help you
  chosen_spanish: el que te ayudará
  alternatives_spanish:
  - que te ayudará
  - tu ayudador
  lexicon: HALOT
  rationale: El verbo en imperfecto se rinde naturalmente con futuro en español dentro de una promesa. Se conserva la serie descriptiva de participios y relativas aplicada a Yahvé.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: Es la prohibición idiomática más directa y fiel al hebreo, sin añadir intensidad ni suavizar el imperativo negativo.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  lexicon: HALOT
  rationale: Aquí el sentido pactual y vocacional de עבד es central. «Siervo» comunica pertenencia y servicio a Dios mejor que «esclavo», que sería demasiado marcado para esta designación de Israel.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como funciona en el llamado profético, manteniendo el vínculo con Israel como pueblo.
- source_word: וִישֻׁרוּן
  english_pob_choice: Jeshurun
  chosen_spanish: Jeshurún
  alternatives_spanish:
  - el recto
  - el justo
  lexicon: HALOT
  rationale: Se translitera el nombre poético para Israel, según la práctica del proyecto con nombres/títulos propios. La posible idea de «recto/upright one» queda en nota, no en el cuerpo del texto.
- source_word: בָּחַרְתִּי בֽוֹ
  english_pob_choice: whom I have chosen
  chosen_spanish: a quien he escogido
  alternatives_spanish:
  - a quien yo he elegido
  - que he escogido
  lexicon: HALOT
  rationale: La relativa española expresa bien la elección divina culminada en pasado perfecto. «Escogido» conserva el léxico de elección sin sobreinterpretar el pronombre enfático.
theological_decisions:
- issue: Pronombres singulares en un discurso corporativo dirigido a Israel
  english_pob_reading: Render the singular pronouns directly ('you') while keeping the named addressees 'Jacob' and 'Jeshurun' in apposition.
  chosen_spanish_reading: Mantener los referentes corporativos con nombres propios en aposición, sin forzar un plural explicativo en el texto.
  alternative_spanish_readings:
  - No temas, pueblo mío
  - No temas, Israel
  rationale: El hebreo usa segunda persona singular para dirigirse al pueblo como unidad representativa. En español, conservar la estructura permite oír el estilo profético sin expandir interpretativamente el sujeto.
  doctrine_reference: Translation philosophy §5
- issue: Valor de יְשֻׁרוּן como nombre poético de Israel
  english_pob_reading: Keep 'Jeshurun' in the main text and preserve the lexical sense in a footnote.
  chosen_spanish_reading: Mantener «Jeshurún» en el texto principal y explicar en nota su sentido posible de ‘recto’ o ‘upright one’.
  alternative_spanish_readings:
  - el Recto
  - el Justo
  rationale: Como nombre poético, su transliteración respeta el carácter propio del término y evita borrar la resonancia literaria. La nota conserva la tensión semántica sin imponer una sola traducción.
  doctrine_reference: Translation philosophy §2
- issue: Elección entre «siervo» y «esclavo» para עַבְדִּי
  english_pob_reading: my servant
  chosen_spanish_reading: mi siervo
  alternative_spanish_readings:
  - mi esclavo
  rationale: Aunque el proyecto suele favorecer «esclavo» por fuerza léxica, en esta designación de pacto para Israel el contexto favorece «siervo» por su tono vocacional y relacional. No se borra la idea de pertenencia, pero se evita una dureza innecesaria en español.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que eliminó una coma innecesaria después de «Maker»; la redacción española evita igualmente una pausa extra en ese punto y conserva la secuencia descriptiva continua del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino según el proyecto.
  - «Jeshurún» se translitera en el texto principal y se aclara en nota, siguiendo la política del POB para nombres poéticos.
  - «Mi siervo» se eligió por el contexto pactual de Israel, aunque la fuerza básica de עבד sigue reconocible en la traducción.
  - 'La estructura conserva la segunda persona singular del hebreo: «tu Hacedor... te formó... te ayudará... No temas».'
