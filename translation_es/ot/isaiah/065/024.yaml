translation:
  language: es
  text: Y sucederá que antes de que llamen[a], yo responderé; mientras todavía estén hablando[b], yo oiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de que clamen, yo responderé». El verbo puede referirse a llamar o clamar, incluso en súplica orante.
    reason: lexical_alternative
  - marker: b
    text: O «mientras todavía estén hablando».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un resultado futuro con fuerza profética. «Sucederá» conserva ese valor sin recurrir a un giro arcaico en español.
- source_word: טֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - previo a que
  lexicon: HALOT
  rationale: Marca prioridad temporal; «antes de que» expresa con naturalidad que la acción de clamar todavía no ha comenzado.
- source_word: יִקְרָאוּ
  english_pob_choice: they call
  chosen_spanish: clamen
  alternatives_spanish:
  - llamen
  - clamen a Dios
  lexicon: HALOT
  rationale: El verbo קרא aquí puede ser un clamor o llamado, con posible matiz de súplica. «Clamen» conserva esa amplitud y la resonancia de invocación sin especificar más de lo que el hebreo exige.
- source_word: אֶעֱנֶה
  english_pob_choice: I will answer
  chosen_spanish: yo responderé
  alternatives_spanish:
  - yo contestaré
  - yo les responderé
  lexicon: HALOT
  rationale: ענה significa responder/contestar. «Responderé» mantiene la reciprocidad entre clamar y responder, sin añadir un objeto explícito que el hebreo no expresa.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía más
  lexicon: HALOT
  rationale: Indica una acción en curso que no ha terminado. «Todavía» funciona bien en la estructura «mientras todavía estén hablando» y conserva el aspecto progresivo.
- source_word: מְדַבְּרִים
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - diciendo
  - conversando
  lexicon: HALOT
  rationale: El participio señala una acción continua. «Hablando» es la forma más directa y digna en español para este contexto solemne.
- source_word: אֶשְׁמָע
  english_pob_choice: I will hear
  chosen_spanish: oiré
  alternatives_spanish:
  - escucharé
  - prestaré oído
  lexicon: HALOT
  rationale: שמע puede implicar oír y atender. «Oiré» preserva el sentido literal y deja abierta la implicación teológica de atención favorable sin explicitarla demasiado.
theological_decisions:
- issue: Grado de explicitación del contexto de oración
  english_pob_reading: Retain the general wording 'call' and 'hear' without adding 'pray' or 'listen favorably'.
  chosen_spanish_reading: Conservar «clamen» y «oiré» sin añadir «oren» ni «escucharé favorablemente».
  alternative_spanish_readings:
  - antes de que oren, responderé
  - mientras todavía estén orando, escucharé
  rationale: El contexto ciertamente habla de la respuesta de Dios a la súplica, pero el hebreo usa verbos más amplios. Mantener esa amplitud preserva la tensión y la sobriedad del texto, sin sobreinterpretar.
  doctrine_reference: Principio de primacía del texto original y preservación de la amplitud semántica en la traducción.
translation_notes:
  revision_awareness: Revisión final sin cambios sustantivos respecto del pasaje auditado en inglés; la concordancia general fue alta y no se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiere; en este versículo no aparece el nombre divino explícito.
  - 'Se mantuvo el paralelismo verbal del hebreo: clamar / responder / hablar / oír.'
  - Se evitó introducir «orar» para no estrechar indebidamente el alcance de קרא y ענה.
  - La puntuación separa las dos cláusulas temporales para reflejar el ritmo del original.
