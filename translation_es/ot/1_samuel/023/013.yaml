base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/023/013.yaml
  text: Then David arose with his men[a], about six hundred men, and they went out from Keilah and went wherever they could go. And it was told to Saul that David had escaped from Keilah[b], so he stopped going out.
  footnotes:
  - marker: a
    text: Or 'and wandered wherever they could wander' / 'and went about wherever they went.' The Hebrew idiom emphasizes continual movement from place to place.
    reason: lexical_alternative
  - marker: b
    text: '''He stopped going out'' likely means Saul stopped going out in pursuit of David after learning David had escaped Keilah.'
    reason: cultural_note
