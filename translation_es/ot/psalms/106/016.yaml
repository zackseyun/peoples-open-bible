translation:
  language: es
  text: Tuvieron celos de Moisés en el campamento, y de Aarón, el santo de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aarón, santo para Yahvé».'
    reason: alternative_rendering_of_קְדוֹשׁ_יְהוָה
lexical_decisions:
- source_word: וַיְקַנְאוּ
  english_pob_choice: They were jealous
  chosen_spanish: Tuvieron envidia
  alternatives_spanish:
  - Estuvieron celosos
  - Fueron envidiosos
  lexicon: HALOT
  rationale: En este contexto, קנא expresa una envidia celosa dirigida contra Moisés y Aarón. «Tuvieron envidia» transmite bien el sentido relacional y evita un giro demasiado abstracto.
- source_word: לְמֹשֶׁה
  english_pob_choice: of Moses
  chosen_spanish: de Moisés
  alternatives_spanish:
  - contra Moisés
  - hacia Moisés
  lexicon: HALOT
  rationale: El ל que marca el objeto de la envidia se expresa de forma natural en español con «de».
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en la campa
  - en el recinto
  lexicon: HALOT
  rationale: מַחֲנֶה se refiere al campamento de Israel en el desierto; «campamento» es claro y fiel.
- source_word: לְאַהֲרֹן
  english_pob_choice: and of Aaron
  chosen_spanish: y de Aarón
  alternatives_spanish:
  - y hacia Aarón
  - contra Aarón
  lexicon: HALOT
  rationale: La coordinación con el primer objeto de la envidia se mantiene con «y de Aarón».
- source_word: קְדוֹשׁ יְהוָה
  english_pob_choice: the holy one of Yahweh
  chosen_spanish: el santo de Yahvé
  alternatives_spanish:
  - el consagrado de Yahvé
  - el santo perteneciente a Yahvé
  lexicon: HALOT
  rationale: La construcción identifica a Aarón como alguien apartado para Yahvé. «El santo de Yahvé» conserva la brevedad y la relación de pertenencia/consecración sin sustituirla por una frase explicativa más larga.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio como «Yahvé», conforme al criterio del proyecto y al valor explícito del Tetragrama.
theological_decisions:
- issue: Designación de Aarón como קְדוֹשׁ יְהוָה
  english_pob_reading: Aaron is 'the holy one of Yahweh,' emphasizing his consecrated status before YHWH.
  chosen_spanish_reading: Aarón es presentado como «el santo de Yahvé», una designación de consagración y pertenencia.
  alternative_spanish_readings:
  - Aarón, el consagrado de Yahvé
  - Aarón, el santo perteneciente a Yahvé
  rationale: El hebreo atribuye a Aarón un estatus especial ante Yahvé. La redacción elegida conserva esa tensión entre santidad y pertenencia, sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo con apoyo del audit trail inglés: mantiene el verbo en sentido de envidia dirigida, traduce el lugar con naturalidad, y preserva el nombre divino como Yahvé. No se incluye nota al pie porque la opción elegida no requiere alternativa textual inmediata en el verso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se conserva el paralelo sintáctico de dos objetos con «de Moisés» y «de Aarón».
  - «Santo» se deja en función nominal breve para respetar la densidad del hebreo.
  - El tono es digno y publicable, sin depender de formulaciones eclesiásticas tradicionales que oculten el nombre divino.
