translation:
  language: es
  text: Bien y mal[a], vida y muerte[c], pobreza y riqueza[b]—proceden de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como ‘adversidad’ o ‘calamidad’ para el hebreo רַע.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo termina con un pronombre: literalmente, ‘de él’. El referente probable es Dios, pero el nombre divino no aparece en esta línea.'
    reason: alternative_reading
  - marker: c
    text: 'El paralelo griego preservado en Swete para Sirácida 11:17 difiere sustancialmente: ‘El don del Señor permanece para los piadosos, y su favor prosperará para siempre’. Los testimonios hebreo y griego aquí no concuerdan de cerca.'
    reason: textual_variant
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bondad
  - lo bueno
  lexicon: HALOT
  rationale: En español, ‘bien’ funciona naturalmente como sustantivo en la serie antitética con ‘mal’, y conserva el alcance amplio del hebreo sin estrecharlo a prosperidad material.
- source_word: וְרַע
  english_pob_choice: and evil
  chosen_spanish: y mal
  alternatives_spanish:
  - y maldad
  - y adversidad
  - y calamidad
  lexicon: HALOT
  rationale: Mantiene el paralelismo directo con ‘bien’. ‘Mal’ preserva la amplitud semántica del hebreo, mientras la nota explica que también puede abarcar adversidad o calamidad.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - las vidas
  - vivir
  lexicon: HALOT
  rationale: ‘Vida’ es el equivalente idiomático y claro en español para el par vida/muerte.
- source_word: וָמָוֶת
  english_pob_choice: and death
  chosen_spanish: y muerte
  alternatives_spanish:
  - y el morir
  lexicon: HALOT
  rationale: Traducción directa y natural del contraste con ‘vida’.
- source_word: רֵישׁ
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - necesidad
  - indigencia
  - carestía
  lexicon: HALOT
  rationale: ‘Pobreza’ es el término más natural y ampliamente entendido para el contraste socioeconómico con ‘riqueza’.
- source_word: וְעֹשֶׁר
  english_pob_choice: and wealth
  chosen_spanish: y riqueza
  alternatives_spanish:
  - y riquezas
  - y bienes
  lexicon: HALOT
  rationale: ‘Riqueza’ conserva el sentido general y el paralelismo con ‘pobreza’ sin reducirlo a solo posesiones monetarias.
- source_word: מֵיי הוּא
  english_pob_choice: they are from him
  chosen_spanish: de él proceden
  alternatives_spanish:
  - proceden de él
  - son de él
  - vienen de él
  lexicon: HALOT
  rationale: El hebreo conserva un pronombre de tercera persona sin nombrar explícitamente a Dios. ‘De él proceden’ mantiene ese referente implícito sin suplir ‘Yahvé’ o ‘Dios’ en el texto principal.
theological_decisions:
- issue: Referencia del pronombre final implícito
  english_pob_reading: him
  chosen_spanish_reading: de él
  alternative_spanish_readings:
  - de Yahvé
  - de Dios
  rationale: El hebreo termina con un pronombre, no con un nombre divino explícito. La traducción española preserva esa tensión y no resuelve el referente en el cuerpo del versículo, aunque el contexto sapiencial apunta a Dios.
  doctrine_reference: Primacía del texto fuente; conservar ambigüedad teológica cuando el original la conserva.
- issue: Alcance de ‘mal’
  english_pob_reading: evil
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - adversidad
  - calamidad
  - daño
  rationale: ‘Mal’ reproduce mejor la amplitud del hebreo רַע en una serie de opuestos universales. La nota deja abierta la posibilidad de matices más situacionales sin perder la fuerza lexical.
  doctrine_reference: No suavizar el término para evitar la tensión entre soberanía divina y la realidad del mal; respetar la amplitud semántica del original.
translation_notes:
  revision_awareness: Se tuvo en cuenta el control cruzado que señaló una discrepancia mayor entre el hebreo y el paralelo griego de Sirácida 11:17. Por eso el español sigue de cerca el hebreo de Kahana en su catálogo de opuestos y conserva el pronombre implícito, sin adoptar la redacción griega (‘don del Señor... favor...’) como texto principal.
  spanish_consistency_notes:
  - Se usó ‘Bien y mal’ para reflejar el par sustantivado del hebreo טוֹב / רַע, evitando una paráfrasis de prosperidad.
  - Se evitó ‘SEÑOR’ en el texto principal porque el hebreo provisto no nombra explícitamente a Yahvé; solo se alude a él por pronombre.
  - ‘De él proceden’ funciona como cierre verbal natural en español y conserva el valor de procedencia/diversidad bajo un mismo origen.
