translation:
  language: es
  text: las que se oscurecen por el hielo[a], y sobre ellas la nieve se oculta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Se oscurecen» conserva el valor básico del participio hebreo; en este contexto puede sugerir también aguas enturbiadas por condiciones invernales, no solo oscuridad visual.
    reason: lexical_alternative
  - marker: b
    text: El hebreo expresa que la nieve «se oculta» o «se esconde»; se eligió esta forma para conservar el matiz reflexivo y la personificación poética con una expresión natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֹּדְרִים
  english_pob_choice: which are dark
  chosen_spanish: las que se oscurecen
  alternatives_spanish:
  - las que están oscuras
  - las que se vuelven turbias
  - las que ennegrecen
  lexicon: HALOT
  rationale: El participio de קדר expresa volverse oscuro o sombrío. En español, «se oscurecen» conserva el proceso visual sin forzar una traducción más interpretativa como «turbias», aunque esa alternativa sigue siendo posible por el contexto de aguas invernales.
- source_word: מִנִּי
  english_pob_choice: from
  chosen_spanish: por
  alternatives_spanish:
  - de
  - a causa de
  - por razón de
  lexicon: HALOT
  rationale: La preposición indica fuente o causa; en este contexto poético, «por el hielo» comunica naturalmente la causa del oscurecimiento.
- source_word: קָרַח
  english_pob_choice: ice
  chosen_spanish: hielo
  alternatives_spanish:
  - escarcha
  - frío
  - granizo
  lexicon: HALOT
  rationale: קָרַח designa hielo o escarcha. «Hielo» encaja mejor con la imagen paralela de la nieve y suena más natural en español bíblico que una opción más técnica.
- source_word: עָלֵימוֹ
  english_pob_choice: on them
  chosen_spanish: sobre ellas
  alternatives_spanish:
  - encima de ellas
  - sobre ellos
  - encima de ellos
  lexicon: HALOT
  rationale: El sufijo 3mp se refiere a las corrientes/zanjas mencionadas en el contexto; en español, el femenino plural concuerda con un antecedente implícito como «las corrientes» o «las aguas».
- source_word: יִתְעַלֶּם
  english_pob_choice: conceals itself
  chosen_spanish: se cubre
  alternatives_spanish:
  - se oculta
  - se esconde
  - se disimula
  lexicon: HALOT
  rationale: El hitpael de עלם expresa ocultarse/encubrirse. En español, «se cubre» mantiene la idea reflexiva y encaja de modo idiomático con la nieve como sujeto poético; «se oculta» sería una alternativa más literal, pero menos gráfica en este verso.
- source_word: שָׁלֶג
  english_pob_choice: the snow
  chosen_spanish: la nieve
  alternatives_spanish:
  - nieve
  - la nieve
  lexicon: HALOT
  rationale: 'En español, el artículo es natural en esta personificación poética: «la nieve». Conserva el referente genérico y la fluidez del verso.'
translation_notes:
  revision_awareness: 'El texto español sigue el mismo sentido revisado en el audit trail inglés: mantiene la idea reflexiva de יִתְעַלֶּם y el registro más formal de «conceals itself», sin ampliar el verso más allá de la imagen poética de hielos y nieve.'
  spanish_consistency_notes:
  - Se mantiene «hielo» para קָרַח, en paralelo con «nieve» para שָׁלֶג.
  - Se preserva la reflexividad del verbo final mediante una construcción pronominal en español.
  - El femenino plural en «ellas» se usa para concordar con el antecedente implícito de corrientes o aguas del contexto inmediato.
