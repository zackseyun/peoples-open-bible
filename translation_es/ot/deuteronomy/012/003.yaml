  glossary_alignment: No hay conflicto con la glosa de términos del proyecto. 'Dioses' para אֱלֹהֵיהֶם, 'imágenes talladas' para פְסִילֵי, y 'asheras' para אֲשֵׁרֵיהֶם son defendibles y coherentes con las decisiones documentadas. 'Borrarás su nombre' es aceptable en español para la metonimia cultual, especialmente con nota explicativa.
