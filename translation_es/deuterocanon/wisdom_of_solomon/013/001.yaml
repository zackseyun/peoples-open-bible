review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro POB en casi todos los puntos: Μάταιοι → «necios», φύσει → «por naturaleza», θεοῦ ἀγνωσία → «ignorancia de Dios», οὐκ ἴσχυσαν εἰδέναι → «no pudieron conocer», τὸν ὄντα → «al que es», τοῖς ἔργοις προσχόντες → «prestando atención a sus obras», y τὸν τεχνίτην → «al artífice». Sin embargo, «desde las cosas buenas que se ven» no refleja bien ἐκ en este contexto inferencial; en español bíblico-natural corresponde mejor «a partir de» o «por medio de».'
  spanish_quality_summary: El español es generalmente claro y digno. «Todos los seres humanos» es natural y comunica bien el universal antropológico. «Al artífice» funciona bien en registro sapiencial. La principal aspereza idiomática es «desde las cosas buenas que se ven», que suena poco natural y espacial, no inferencial. También conviene simplificar la puntuación alrededor del participio para mayor fluidez.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» es correcto para θεοῦ. No aparecen términos con políticas especiales como Yahvé/Mesías/Espíritu/esclavo. La decisión «al que es» preserva adecuadamente la carga teológica documentada para τὸν ὄντα.
  issues:
  - severity: medium
    issue: «desde las cosas buenas que se ven» para ἐκ τῶν ὁρωμένων ἀγαθῶν
    rationale: '«Desde» en español suele indicar origen espacial o temporal y aquí suena forzado. El griego ἐκ expresa base/origen inferencial: a partir de las cosas buenas visibles no lograron conocer a Dios. «A partir de las cosas buenas visibles» preserva mejor el sentido y mejora la legibilidad.'
  - severity: low
    issue: Ligera rigidez en «ni, prestando atención a sus obras, reconocieron»
    rationale: La coma tras «ni» no es necesaria y entorpece el flujo. «Ni prestando atención a sus obras reconocieron...» suena más natural sin alterar el sentido instrumental del participio.
  revised_spanish_text: Porque todos los seres humanos son por naturaleza necios[a], en quienes había ignorancia de Dios; y a partir de las cosas buenas visibles no pudieron conocer al que es[b], ni prestando atención a sus obras reconocieron al artífice[c].
  revised_footnotes:
  - marker: a
    text: O «todos los hombres» o «todas las personas»; el griego usa un masculino genérico para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «el que existe» o «el que es». La expresión griega puede funcionar como designación divina.
    reason: alternative_reading
  - marker: c
    text: O «el artesano» o «el hacedor».
    reason: lexical_alternative
  revision_rationale: Se corrige la preposición principal para reflejar mejor el valor inferencial de ἐκ y para sonar natural en español («a partir de las cosas buenas visibles»). También se alisa la puntuación del participio instrumental sin cambiar el contenido. El resto del borrador es fiel al griego y al razonamiento léxico-teológico documentado.
