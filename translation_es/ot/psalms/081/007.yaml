review_pass:
  verdict: revise
  source_alignment_summary: 'La primera cláusula transmite bien el sentido hebreo: Dios quita la carga del hombro. Sin embargo, la segunda cláusula del borrador español, «sus manos pasaron del canasto», no preserva fielmente el valor idiomático en español del hebreo תעברנה con מן. Aunque intenta mantener la literalidad de «pasar», en español resulta opaca y poco natural; no comunica claramente que las manos quedaron apartadas/libres de ese instrumento de trabajo. Además, la nota a «carga» introduce alternativas («tarea pesada») no sustentadas por el rastro inglés, mientras que falta la alternativa documentada sobre el orden sintáctico de la primera cláusula.'
  spanish_quality_summary: El español es en general claro en la primera mitad, pero «pasaron del canasto» suena antinatural y confuso para lectores hispanos. «Canasto» es posible, aunque «cesta» suele ser más neutral e idiomático en registro bíblico general; no obstante, puede mantenerse si se explica la incertidumbre léxica. Conviene ajustar las notas para reflejar mejor las alternativas auditadas y mejorar la legibilidad sin sobreinterpretar.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones para «carga», «hombro» y «manos» son adecuadas. El problema principal es estilístico-semántico en «pasaron del canasto», donde la literalidad inglesa auditada no debe copiarse si produce español deficiente. La nota sobre דּוּד debe conservar la incertidumbre léxica; la de עבר debe indicar una alternativa española más comprensible.
  issues:
