translation:
  language: es
  text: «Mi violencia y mi carne[a] sean sobre Babilonia», dice la habitante de Sion. «Y mi sangre sea sobre los habitantes de Caldea», dice Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi cuerpo». El término hebreo se entiende tradicionalmente aquí como «carne» en sentido corporal, aunque algunos han propuesto otras derivaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמָסִי
  english_pob_choice: My violence
  chosen_spanish: mi violencia
  alternatives_spanish:
  - la violencia hecha contra mí
  - el agravio hecho contra mí
  lexicon: HALOT
  rationale: En este contexto imprecatorio, חָמָס con sufijo de 1cs puede leerse como la violencia asociada a la persona que habla; el inglés POB conserva la literalidad formal. En español, «mi violencia» sigue de cerca la forma hebrea y mantiene la ambigüedad heredada del texto sin explicarla en exceso.
- source_word: וּשְׁאֵרִי
  english_pob_choice: and my flesh
  chosen_spanish: y mi carne
  alternatives_spanish:
  - y mi cuerpo
  - y mi cuerpo mortal
  lexicon: HALOT
  rationale: La opción «carne» preserva la imaginería hebrea y el paralelismo con «mi sangre» en el segundo hemistiquio. «Cuerpo» aclararía el sentido, pero suaviza la textura literal del original.
- source_word: עַל בָּבֶל
  english_pob_choice: be upon Babylon
  chosen_spanish: sean sobre Babilonia
  alternatives_spanish:
  - caigan sobre Babilonia
  - estén sobre Babilonia
  lexicon: HALOT
  rationale: La construcción imprecatoria con עַל expresa que la consecuencia recaiga sobre Babilonia. «Sean sobre» reproduce el valor idiomático de manera natural en español y conserva el tono judicial/imprecatorio.
- source_word: תֹּאמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dirá
  - decía
  lexicon: HALOT
  rationale: El imperfecto profético funciona como fórmula de introducción del discurso. «Dice» es el equivalente español más natural y mantiene el efecto performativo del hebreo.
- source_word: יֹשֶׁבֶת צִיּוֹן
  english_pob_choice: the inhabitant of Zion
  chosen_spanish: la moradora de Sion
  alternatives_spanish:
  - la habitante de Sion
  - la que habita en Sion
  lexicon: HALOT
  rationale: El participio femenino singular personifica a Sion como una mujer que habita allí. «Moradora» conserva esa personificación y suena más natural en español que un calco rígido.
- source_word: וְדָמִי
  english_pob_choice: my blood
  chosen_spanish: mi sangre
  alternatives_spanish:
  - mi sangre derramada
  - mi sangre y mi culpa de sangre
  lexicon: HALOT
  rationale: דָּם con sufijo de 1cs designa aquí sangre literal en paralelo con la violencia y la carne. «Sangre» mantiene el paralelismo y evita añadir una explicación interpretativa que el hebreo no exige.
- source_word: אֶל יֹשְׁבֵי כַשְׂדִּים
  english_pob_choice: be upon the inhabitants of Chaldea
  chosen_spanish: sea sobre los habitantes de Caldea
  alternatives_spanish:
  - caiga sobre los habitantes de Caldea
  - sea contra los habitantes de Caldea
  lexicon: HALOT
  rationale: Aunque אֶל normalmente significa «a/hacia», aquí funciona dentro de la misma lógica imprecatoria y puede verterse con «sobre» para conservar el paralelismo con el primer miembro. «Habitantes de Caldea» sigue la lectura territorial del inglés POB.
- source_word: כַשְׂדִּים
  english_pob_choice: Chaldea
  chosen_spanish: Caldea
  alternatives_spanish:
  - los caldeos
  lexicon: HALOT
  rationale: Con «habitantes de» delante, el inglés opta por el territorio («Chaldea») más que por el etnónimo. En español, «Caldea» preserva esa misma relación territorial y evita una redundancia menos natural.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español, sin necesidad de transliteración.
theological_decisions:
- issue: Mantener el carácter imprecatorio del verso sin suavizarlo en una plegaria optativa
  english_pob_reading: My violence and my flesh be upon Babylon... And my blood be upon the inhabitants of Chaldea
  chosen_spanish_reading: Mi violencia y mi carne sean sobre Babilonia... Y mi sangre sea sobre los habitantes de Caldea
  alternative_spanish_readings:
  - Que mi violencia y mi carne sean sobre Babilonia
  - Ojalá mi violencia y mi carne estén sobre Babilonia
  rationale: El hebreo usa una construcción nominal/imprecatoria; el revision pass del inglés eliminó «May the» para evitar expansión interpretativa. En español, el subjuntivo con valor desiderativo mantiene la fuerza sin añadir una perífrasis que no está en el texto.
  doctrine_reference: Salmo 137; Jeremías 51:24
- issue: Conservar la personificación poética de Sion/Jerusalén
  english_pob_reading: the inhabitant of Zion ... Jerusalem
  chosen_spanish_reading: la moradora de Sion ... Jerusalén
  alternative_spanish_readings:
  - la habitante de Sion ... Jerusalén
  - Sion, la que habita allí ... Jerusalén
  rationale: El participio femenino singular personifica a la ciudad como una mujer que habla. La formulación elegida reproduce esa figura literaria sin convertirla en una glosa.
  doctrine_reference: Jeremías 31:4; Lamentaciones 1:6
translation_notes:
  revision_awareness: 'Se siguió el auditable paso de revisión del inglés: se descartó la expansión «Que...», y se conservó la forma breve e imprecatoria del hebreo. También se respetó la decisión del inglés de mantener la imaginería de «flesh/blood» en vez de sustituirla por una explicación abstracta. El español refleja esa misma economía textual.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto cuando corresponde, pero este versículo no contiene el tetragrámaton.
  - «Sion» se mantuvo sin acento gráfico para concordar con el uso español estándar en nombres bíblicos del proyecto.
  - Se evitó «SEÑOR» y se conservaron los nombres propios territoriales «Babilonia», «Caldea» y «Jerusalén» según la fuente y el POB inglés.
