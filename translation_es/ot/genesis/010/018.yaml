translation:
  language: es
  text: y los arvaditas, los zemaritas y los hamatitas. Después, los clanes[a] de los cananeos fueron dispersados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las familias del cananeo». El hebreo usa un gentilicio singular colectivo («el cananeo») para referirse al pueblo en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַרְוָדִי
  english_pob_choice: the Arvadites
  chosen_spanish: los arvaditas
  alternatives_spanish:
  - el arvadita
  - la gente de Arvad
  lexicon: HALOT
  rationale: En este contexto genealógico/etnográfico, el gentilicio funciona colectivamente para un grupo de descendientes o clan. El plural español comunica mejor la colectividad, siguiendo la decisión del POB inglés.
- source_word: הַצְּמָרִי
  english_pob_choice: the Zemarites
  chosen_spanish: los zemaritas
  alternatives_spanish:
  - el zemarita
  - la gente de Zemar
  lexicon: HALOT
  rationale: Se trata del mismo patrón de gentilicios colectivos en la lista de naciones; el plural español mantiene la referencia a un pueblo o grupo, no a una sola persona.
- source_word: הַחֲמָתִי
  english_pob_choice: the Hamathites
  chosen_spanish: los hamatitas
  alternatives_spanish:
  - el hamatita
  - la gente de Hamat
  lexicon: HALOT
  rationale: Como en los nombres vecinos, el contexto favorece un etnónimo colectivo plural en español.
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Y después
  - Más tarde
  lexicon: HALOT
  rationale: Marca secuencia temporal. «Después» conserva la relación cronológica con la lista anterior y suena natural en español bíblico actual.
- source_word: נָפֹצוּ
  english_pob_choice: were scattered
  chosen_spanish: fueron dispersadas
  alternatives_spanish:
  - se dispersaron
  - fueron esparcidas
  lexicon: HALOT
  rationale: El nifal expresa dispersión pasiva o resultativa. «Fueron dispersadas» conserva bien ese matiz; el sujeto inmediato son las familias/clanes.
- source_word: מִשְׁפְּחוֹת
  english_pob_choice: the clans
  chosen_spanish: las familias
  alternatives_spanish:
  - los clanes
  - las casas
  lexicon: HALOT
  rationale: Aunque el POB inglés optó por «clans» por el contexto etnográfico, en español «familias» refleja de modo directo el sustantivo hebreo y la traducción posterior lo mantiene. En este pasaje, además, la frase connota agrupaciones de parentesco amplias.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: El hebreo usa un gentilicio singular colectivo con artículo, pero el contexto requiere una referencia al pueblo en plural. El plural español evita la ambigüedad de un singular genérico poco natural.
theological_decisions:
- issue: Colectivo singular hebreo aplicado a un pueblo entero
  english_pob_reading: the Canaanites / collective gentilic singular (“the Canaanite”)
  chosen_spanish_reading: los cananeos / las familias de los cananeos
  alternative_spanish_readings:
  - el cananeo
  - las familias del cananeo
  rationale: El hebreo presenta un singular gentilicio colectivo con artículo. En español, el plural etnónimo es la forma más clara y fiel para un grupo étnico completo, sin perder el valor colectivo del original.
  doctrine_reference: Ninguna; decisión etnolingüística y de traducción
- issue: Dispersión de los clanes/familias
  english_pob_reading: were scattered
  chosen_spanish_reading: fueron dispersadas
  alternative_spanish_readings:
  - se dispersaron
  - fueron esparcidas
  rationale: La forma pasiva mantiene la dirección del evento tal como aparece en el hebreo. No introduce agentes ni interpreta más allá de la acción descrita.
  doctrine_reference: Ninguna; decisión aspectual y sintáctica
translation_notes:
  revision_awareness: El texto inglés POB fue revisado recientemente y se mantiene sin cambios; la versión española sigue la misma lectura textual y conserva la nota sobre el gentilicio colectivo, adaptándola al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefieren etnónimos plurales para gentilicios colectivos en listas genealógicas.
  - «Familias» se usa en el cuerpo del texto por su correspondencia directa con מִשְׁפְּחוֹת, con nota para la alternativa etnográfica «clanes».
