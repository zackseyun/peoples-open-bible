- from: Y esta es la copia del documento que ellos transcribieron en tablas de bronce y enviaron a Jerusalén, para que allí entre ellos quede como memorial de paz y alianza.
  to: Y esta es la copia del documento que ellos copiaron en tablas de bronce y enviaron a Jerusalén, para que estuviera allí entre ellos como memorial de paz y alianza.
  rationale: Se reemplaza «transcribieron» por «copiaron» para reflejar mejor el vínculo léxico con «copia» y ajustarse a la decisión documentada del POB. También se suaviza la cláusula final con «para que estuviera allí entre ellos», que expresa con más naturalidad en español el propósito del envío sin alterar el sentido.
