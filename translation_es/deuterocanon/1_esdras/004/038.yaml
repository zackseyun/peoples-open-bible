translation:
  language: es
  text: Y la verdad permanece y es fuerte para siempre, y vive y prevalece por los siglos de los siglos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: Se conserva el artículo definido de ἡ ἀλήθεια con «la verdad», porque el griego presenta la verdad como sujeto destacado y casi personificado. En español, «la verdad» mantiene esa fuerza con naturalidad.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece
  - permanece firme
  - permanece en pie
  lexicon: BDAG
  rationale: «Permanece» reproduce la idea de continuidad estable sin sonar arcaico. Conserva el matiz de permanencia duradera que el inglés POB dio con «remains».
- source_word: ἰσχύει
  english_pob_choice: is strong
  chosen_spanish: es fuerte
  alternatives_spanish:
  - tiene fuerza
  - prevalece
  lexicon: BDAG
  rationale: Se distingue de κρατεῖ. «Es fuerte» refleja la cualidad de vigor o fuerza inherente que el griego expresa, sin fusionarla con la idea de dominio o victoria.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: BDAG
  rationale: Es una equivalencia idiomática natural en español para la duración indefinida del giro griego, manteniendo su sentido temporal continuo.
- source_word: ζῇ
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está viva
  lexicon: BDAG
  rationale: Se conserva la personificación de la verdad con un verbo de vida literal. «Vive» es directo y fiel al valor verbal del griego.
- source_word: κρατεῖ
  english_pob_choice: prevails
  chosen_spanish: prevalece
  alternatives_spanish:
  - vence
  - domina
  - triunfa
  lexicon: BDAG
  rationale: «Prevalece» comunica dominio activo o victoria, manteniéndose distinto de ἰσχύει. Evita duplicar la idea de fuerza y conserva el movimiento retórico del verso.
- source_word: εἰς τὸν αἰῶνα τοῦ αἰῶνος
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre y por siempre
  lexicon: BDAG
  rationale: Reproduce el intensificador griego con una fórmula española natural y solemne, conservando la elevación del cierre.
theological_decisions:
- issue: Personificación de la verdad
  english_pob_reading: Retain personal predicates ('lives' and 'prevails') for truth
  chosen_spanish_reading: Conservar los predicados personales de la verdad («vive» y «prevalece»).
  alternative_spanish_readings:
  - 'Depersonalizarla: «la verdad permanece y es firme para siempre»'
  - 'Reducir la personificación: «la verdad perdura y triunfa»'
  rationale: 'El griego atribuye a ἡ ἀλήθεια acciones propias de un sujeto vivo: permanece, es fuerte, vive y prevalece. La traducción española preserva esa personificación sin añadir contenido doctrinal ajeno.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: El texto griego presenta una doble afirmación paralela sobre la permanencia y la fuerza/vitalidad de la verdad, culminando en una intensificación temporal. La versión española conserva esas dos series de verbos y la diferencia entre ἰσχύει y κρατεῖ, siguiendo el audit trail inglés y sin introducir notas textuales porque no hay variante ni ambigüedad adicional que el español requiera explicitar.
  spanish_consistency_notes:
  - Se mantiene «la verdad» con artículo definido para reflejar ἡ ἀλήθεια.
  - Se distinguen cuidadosamente «es fuerte» y «prevalece» para no colapsar dos verbos griegos diferentes.
  - 'Se usa una fórmula reverente pero idiomática: «para siempre» / «por siempre y para siempre».'
  - No se introduce «Cristo», «SEÑOR» ni otras terminologías no presentes en el griego del versículo.
