revisions:
- from: Tú también[a], lleva tu vergüenza, porque pronunciaste juicio a favor de tus hermanas. Por tus pecados, en los que actuaste más abominablemente que ellas, ellas han quedado más justas que tú. Así que tú también, avergüénzate y lleva tu vergüenza[b], porque hiciste que tus hermanas parecieran justas.
  to: Tú también[a], carga con tu deshonra, porque pronunciaste juicio a favor de tus hermanas. Por tus pecados, en los que actuaste más abominablemente que ellas, han resultado más justas que tú. Así que tú también, avergüénzate y carga con tu deshonra[b], porque hiciste que tus hermanas resultaran justas.
  rationale: La revisión es menor pero necesaria para reflejar mejor el contraste léxico del hebreo entre deshonra objetiva y vergüenza afectiva, y para mejorar la naturalidad del español. «Carga con tu deshonra» preserva bien el modismo נשׂא + כלמה. «Han resultado más justas que tú» y «hiciste que tus hermanas resultaran justas» mantienen la vindicación comparativa sin afirmar justicia absoluta. También se corrigió la nota [a] para que ofrezca alternativas reales al texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: mantiene los imperativos dobles («lleva… avergüénzate y lleva»), el matiz comparativo de צדק, y el tono irónico-forense respecto de las hermanas. Sin embargo, dos elecciones debilitan la fidelidad fina: «vergüenza» para כְלִמָּתֵךְ se superpone demasiado con «avergüénzate» para בּוֹשִׁי, cuando el hebreo distingue entre la desgracia/deshonra pública y la reacción afectiva de vergüenza; y «han quedado más justas» suena menos natural que una formulación comparativa más clara en español.'
  spanish_quality_summary: 'El texto es legible y mayormente natural, pero puede mejorarse para sonar más idiomático y más nítido en registro bíblico moderno. «Lleva tu vergüenza» es comprensible, aunque «carga con tu deshonra» o «soporta tu deshonra» expresa mejor el modismo profético. «Ellas han quedado más justas que tú» es inteligible, pero algo tieso; «han resultado más justas que tú» o «son más justas que tú» comunica mejor la comparación. También conviene alinear la nota [a] con el texto principal: si el texto dice «pronunciaste juicio a favor», la nota no debe presentar esa misma opción como alternativa.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto (no aparecen Yahvé, Mesías, etc.). La decisión sobre צדק debe seguir expresando justicia relativa/comparativa, no absoluta. La distinción entre כְלִמָּה y בוש debe reflejarse mejor en español con «deshonra»/«oprobio» frente a «avergüénzate».
  issues:
  - severity: medium
    issue: כְלִמָּתֵךְ se tradujo como «tu vergüenza», mientras בּוֹשִׁי se tradujo «avergüénzate».
    rationale: 'El hebreo usa dos términos relacionados pero distintos: uno apunta a la deshonra/disgracia objetiva y pública; el otro, a la reacción subjetiva de vergüenza. Repetir «vergüenza» en ambos lugares aplana el contraste semántico que el POB inglés preservó con «disgrace» y «be ashamed».'
  - severity: medium
    issue: La nota [a] no funciona como verdadera alternativa al texto principal.
    rationale: El texto principal ya dice «pronunciaste juicio a favor de tus hermanas», pero la nota [a] ofrece exactamente esa redacción como si fuera lectura alternativa. La nota debe presentar alternativas reales, por ejemplo «juzgaste en favor de» o «intercediste por».
  - severity: low
    issue: «Ellas han quedado más justas que tú» es poco natural.
    rationale: Aunque no es incorrecto, en español suena forzado. Una opción como «han resultado más justas que tú» conserva la comparación y suena más clara y digna.
  - severity: low
    issue: «Parecieran justas» puede sugerir irrealidad hipotética más que resultado comparativo.
    rationale: El sentido es que Jerusalén, por contraste, hizo que sus hermanas aparecieran o resultaran justas. «Parecieran» es posible, pero «resultaran justas» o «aparecieran justas» expresa el efecto de modo más directo.
  revised_spanish_text: Tú también[a], carga con tu deshonra, porque pronunciaste juicio a favor de tus hermanas. Por tus pecados, en los que actuaste más abominablemente que ellas, han resultado más justas que tú. Así que tú también, avergüénzate y carga con tu deshonra[b], porque hiciste que tus hermanas resultaran justas.
  revised_footnotes:
  - marker: a
    text: 'O «juzgaste en favor de tus hermanas»; también puede entenderse como «intercediste por tus hermanas». El hebreo es irónico: los pecados de Jerusalén han terminado vindicando a sus hermanas por contraste.'
    reason: lexical_alternative
  - marker: b
    text: O «ellas son más justas que tú» o «ellas han quedado más justificadas que tú». El sentido es comparativo, no que las hermanas fueran justas en sentido absoluto.
    reason: alternative_reading
  revision_rationale: La revisión es menor pero necesaria para reflejar mejor el contraste léxico del hebreo entre deshonra objetiva y vergüenza afectiva, y para mejorar la naturalidad del español. «Carga con tu deshonra» preserva bien el modismo נשׂא + כלמה. «Han resultado más justas que tú» y «hiciste que tus hermanas resultaran justas» mantienen la vindicación comparativa sin afirmar justicia absoluta. También se corrigió la nota [a] para que ofrezca alternativas reales al texto principal.
