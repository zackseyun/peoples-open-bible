review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: triple llamado imperativo, vocativo a Jerusalén, el modismo «de la mano de Yahvé», la metáfora de la copa de ira y la idea final de haberla apurado por completo. Sin embargo, hay dos fallas de alineación audit trail/texto: el marcador [a] está mal aplicado a ambas ocurrencias de «despiértate» aunque la nota no aporta una alternativa real distinta, y «la vasija» para קֻבַּעַת debilita la imagen específica de un recipiente para beber con forma de cuenco/tazón. Además, «aturdimiento» transmite desorientación, pero «tambaleo» o «vértigo» refleja mejor el efecto de reeling/staggering documentado en la auditoría inglesa.'
  spanish_quality_summary: El español es generalmente claro y digno. «Despiértate, despiértate, levántate, Jerusalén» suena natural y fuerte. No obstante, la repetición del mismo marcador [a] viola la disciplina editorial. «La vasija» suena demasiado genérico y menos idiomático en una cadena con «la copa». Conviene usar «el cuenco» o «el tazón». También es preferible ajustar la puntuación y la colocación de notas para que el texto fluya con naturalidad.
  glossary_alignment: Se respeta correctamente «Yahvé» para יְהוָה y «ira» para חֲמָה. No hay conflicto doctrinal mayor. La principal desalineación terminológica está en קֻבַּעַת, donde el inglés auditado escogió «bowl» y el razonamiento apoya un recipiente tipo cuenco; «vasija» es demasiado amplio. Para הַתַּרְעֵלָה, el proyecto inglés favorece el efecto de tambaleo; en español «tambaleo» preserva mejor esa fuerza que «aturdimiento».
  issues:
  - severity: medium
    issue: Uso incorrecto del marcador [a] dos veces en el texto
    rationale: Las instrucciones exigen marcadores únicos y no reutilizar un mismo marcador para dos notas distintas ni anclarlo de forma redundante. Aquí [a] aparece dos veces y la nota además no añade una alternativa útil.
  - severity: medium
    issue: «La vasija» es demasiado genérico para קֻבַּעַת
    rationale: El hebreo y la auditoría inglesa apuntan a un recipiente para beber tipo bowl/goblet. «Vasija» puede ser cualquier recipiente y debilita la imagen poética concreta.
  - severity: low
    issue: «La copa del aturdimiento» no refleja tan bien el sentido de staggering/reeling
    rationale: «Aturdimiento» comunica desorientación, pero el hebreo enfatiza el efecto de tambalearse o dar traspiés. «La copa del tambaleo» preserva mejor la imaginería.
  revised_spanish_text: ¡Despiértate, despiértate, levántate, Jerusalén, tú que has bebido de la mano de Yahvé la copa de su ira; has bebido el cuenco[a], la copa del tambaleo[b]; la has vaciado hasta las heces!
  revised_footnotes:
