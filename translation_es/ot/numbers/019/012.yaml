translation:
  language: es
  text: Se purificará con ella[a] el tercer día y el séptimo día, y quedará limpio; pero si no se purifica el tercer día y el séptimo día[b], no quedará limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, con el agua de purificación preparada antes en el capítulo.
    reason: cross_reference
  - marker: b
    text: 'O: «se limpie». El verbo hebreo aquí se refiere a someterse a una purificación ritual de la impureza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְחַטָּא
  english_pob_choice: purify himself
  chosen_spanish: se purificará
  alternatives_spanish:
  - se limpiará
  - se limpiará ritualmente
  - se purgará ritualmente
  lexicon: HALOT
  rationale: En este contexto ritual de impureza por cadáver, el hitpael de חטא expresa someterse a un acto de purificación ceremonial, no pecado moral. «Se purificará» conserva el valor reflexivo y la función ritual sin introducir una paráfrasis excesiva.
- source_word: בּוֹ
  english_pob_choice: with it
  chosen_spanish: con ello
  alternatives_spanish:
  - con eso
  - con ella
  - por medio de ello
  lexicon: HALOT
  rationale: El pronombre masculino singular remite al agua de purificación mencionada antes en el capítulo. «Con ello» mantiene la referencia pronominal sin forzar el antecedente dentro del versículo principal.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: el tercer día
  alternatives_spanish:
  - en el tercer día
  - al tercer día
  lexicon: HALOT
  rationale: La frase temporal se expresa de manera natural en español con «el tercer día», que mantiene la secuencia ritual del hebreo.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: and on the seventh day
  chosen_spanish: y el séptimo día
  alternatives_spanish:
  - y en el séptimo día
  - y al séptimo día
  lexicon: HALOT
  rationale: Se conserva la coordinación y el orden litúrgico del texto hebreo con una forma idiomática y clara en español.
- source_word: יִטְהָר
  english_pob_choice: he will be clean
  chosen_spanish: quedará limpio
  alternatives_spanish:
  - será limpio
  - estará limpio
  - quedará purificado
  lexicon: HALOT
  rationale: El verbo טהר aquí denota el estado resultante de pureza ritual. «Quedará limpio» distingue ese estado del proceso expresado por יִתְחַטָּא y evita colapsar ambos verbos en una sola equivalencia.
- source_word: וְאִם לֹא
  english_pob_choice: but if he does not
  chosen_spanish: pero si no
  alternatives_spanish:
  - y si no
  - si no
  lexicon: HALOT
  rationale: «Pero si no» expresa bien el contraste y la advertencia del hebreo en español natural, manteniendo el giro condicional negativo.
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: (sujeto implícito en la forma verbal)
  alternatives_spanish:
  - él
  - esa persona
  - el hombre
  lexicon: HALOT
  rationale: El hebreo explicita el sujeto con pronombre, pero en español la forma verbal ya lo recupera con naturalidad. No se añade un sujeto explícito para evitar rigidez; el referente sigue siendo la persona impura tratada en el contexto.
theological_decisions:
- issue: Purificación ritual versus purificación moral
  english_pob_reading: Render the verse in terms of ritual purity/cleanness, not moral forgiveness or inward sanctification.
  chosen_spanish_reading: Traducir en términos de purificación ceremonial y estado de limpieza ritual, no de perdón moral ni santificación interior.
  alternative_spanish_readings:
  - ser perdonado
  - ser santificado
  - limpiarse del pecado
  rationale: El contexto inmediato es la impureza por contacto con la muerte y el agua de purificación. Por eso, «purificarse / quedar limpio» comunica mejor la categoría ritual del texto sin importar categorías posteriores ajenas al pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La traducción sigue el estado más reciente del expediente inglés, que no requirió cambios y recibió acuerdo alto (0.95) en la revisión cruzada. Se preserva la distinción léxica entre el proceso de purificación (יִתְחַטָּא) y el resultado de quedar limpio (יִטְהָר), sin introducir ampliaciones teológicas.
  spanish_consistency_notes:
  - Se mantiene «limpio» en sentido ritual, no moral.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - «Con ello» deja abierta la referencia al agua de purificación ya mencionada en el contexto inmediato.
  - La puntuación refleja una cláusula principal seguida de una condición adversativa clara en español natural.
