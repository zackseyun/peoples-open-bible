translation:
  language: es
  text: y casia, quinientos siclos según el siclo del santuario, y un hin[a] de aceite de oliva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un hin era una medida antigua de volumen; muchos lo estiman en unos 3,5 a 4 litros (aproximadamente 1 galón).
    reason: cultural_note
lexical_decisions:
- source_word: קִדָּה
  english_pob_choice: cassia
  chosen_spanish: casia
  alternatives_spanish:
  - cassia
  - aromatic bark
  - corteza aromática
  lexicon: HALOT
  rationale: El hebreo קִדָּה designa la casia, una especia aromática usada en perfumes. En español, «casia» conserva el nombre preciso y es transparente para una lista de ingredientes rituales.
- source_word: חֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred
  chosen_spanish: quinientos
  alternatives_spanish:
  - quinientas
  lexicon: morfología del numeral
  rationale: El numeral concuerda naturalmente con el sustantivo implícito de peso. En español, «quinientos» es la forma estándar y fiel al valor cardinal del hebreo.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - por el siclo del santuario
  - según el siclo sagrado
  lexicon: HALOT
  rationale: La frase hebrea fija un estándar de peso, no un lugar. «Según el siclo del santuario» expresa con claridad el valor normativo de la medida y evita la ambigüedad de una traducción más literal que sonaría menos natural.
- source_word: שֶׁמֶן זַיִת
  english_pob_choice: olive oil
  chosen_spanish: aceite de oliva
  alternatives_spanish:
  - aceite de aceituna
  lexicon: HALOT
  rationale: El hebreo constructo significa idiomáticamente «aceite de oliva». En español, «aceite de oliva» es la equivalencia natural y fiel.
- source_word: הִין
  english_pob_choice: a hin
  chosen_spanish: un hin
  alternatives_spanish:
  - un him
  lexicon: HALOT
  rationale: Se retiene la unidad antigua «hin» para preservar la medida específica del texto. El artículo indefinido comunica que se trata de una sola unidad de volumen.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática española
  rationale: La conjunción enlaza este elemento con los anteriores de la lista. «Y» reproduce de manera directa la función coordinante del hebreo.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran total acuerdo y no registran revisiones aplicadas; por eso esta redacción mantiene el contenido y las unidades del original sin introducir equivalencias modernas.
  spanish_consistency_notes:
  - Se mantiene la terminología POB «Yahvé» solo cuando aparece el nombre divino; este versículo no la requiere.
  - Se conserva la unidad antigua «hin» con nota explicativa para no perder la medida original.
  - La lista de ingredientes se presenta con sintaxis natural en español, sin suavizar la precisión del hebreo.
