revisions:
- from: Esta es la ley de la celosa[a], cuando una esposa se desvía bajo su esposo y queda contaminada[c][b].
  to: Esta es la ley de los celos[a], cuando una esposa se desvía bajo su esposo[c] y queda impura[b].
  rationale: Se corrige el error principal de sentido y de español en 'la celosa' a 'los celos', que sí representa el sustantivo técnico hebreo. Se mantiene 'bajo su esposo' por fidelidad al modismo, con nota aclaratoria. Se ajusta 'contaminada' a 'impura' para reflejar mejor el lenguaje bíblico de טמא sin explicitar adulterio. También se ordenan las notas para que cada marcador ancle exactamente la información pertinente en el texto español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:25:15Z'
