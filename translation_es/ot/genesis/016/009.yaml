translation:
  language: es
  text: 'Entonces el ángel de Yahvé le dijo[a][b][c]: «Vuélvete a tu señora y humíllate bajo su mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «el mensajero de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «bajo su mano» expresa estar bajo su autoridad.'
    reason: cultural_note
  - marker: c
    text: También puede entenderse como «humíllate» o «acéptate afligida»; el contexto favorece la idea de someterse en una relación de subordinación.
    reason: alternative_reading
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar ‘ángel’ o ‘mensajero’. En el contexto narrativo de Génesis, ‘ángel’ es la opción más natural y coherente con la escena de encuentro divino. יְהוָה se rinde como ‘Yahvé’ conforme al criterio del proyecto para el nombre divino.
- source_word: שׁוּבִי
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Regresa
  - Vuelve
  lexicon: HALOT
  rationale: Es un imperativo femenino singular de שוב. ‘Vuélvete’ conserva el movimiento de retorno y encaja bien en español bíblico sin volverse arcaico en exceso.
- source_word: גְּבִרְתֵּךְ
  english_pob_choice: your mistress
  chosen_spanish: tu señora
  alternatives_spanish:
  - tu ama
  - tu dueña
  lexicon: HALOT
  rationale: El término designa a una superiora femenina dentro de la relación social del relato. ‘Señora’ comunica esa jerarquía en español con mayor naturalidad que ‘ama’ o ‘dueña’, sin introducir una carga moderna innecesaria.
- source_word: וְהִתְעַנִּי
  english_pob_choice: humble yourself
  chosen_spanish: humíllate
  alternatives_spanish:
  - sométete
  - acéptate afligida
  lexicon: HALOT
  rationale: El hitpael imperativo de ענה aquí expresa una acción reflexiva de abajamiento o aceptación de una posición inferior. ‘Humíllate’ reproduce bien esa fuerza y coincide con la revisión inglesa más reciente.
- source_word: תַּחַת יָדֶיהָ
  english_pob_choice: under her hand
  chosen_spanish: bajo su mano
  alternatives_spanish:
  - bajo su autoridad
  - bajo su poder
  lexicon: HALOT
  rationale: La expresión es un modismo hebreo que literalmente dice ‘bajo su mano’. Mantener ‘bajo su mano’ preserva la imagen original y deja visible la relación de autoridad/subordinación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrammaton directamente. Conforme al estándar del proyecto, se translitera como ‘Yahvé’ para mantener el nombre personal de Dios y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וְהִתְעַנִּי en contexto de subordinación
  english_pob_reading: humble yourself
  chosen_spanish_reading: humíllate
  alternative_spanish_readings:
  - sométete
  - abájate
  rationale: Aunque el verbo puede abarcar la idea de afligirse o someterse, aquí el contexto relacional favorece el sentido de abajamiento voluntario bajo autoridad. ‘Humíllate’ conserva esa tensión sin borrar la posible resonancia de aflicción.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió ‘humble yourself’ frente a ‘submit yourself’, y conserva la imagen literal ‘under her hand’ mediante ‘bajo su mano’. También respeta la decisión del audit trail de traducir el nombre divino como Yahvé/Yahweh, no como una sustitución titulada.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se mantiene una formulación breve y directa, adecuada para un versículo narrativo.
  - ‘Señora’ funciona aquí como equivalente contextual de גְּבִרְתֵּךְ sin imponer un matiz moderno de cortesía social.
