  text: כִּ֤י שֶׁ֨בַע יִפּ֣וֹל צַדִּ֣יק וָ/קָ֑ם וּ֝/רְשָׁעִ֗ים יִכָּשְׁל֥וּ בְ/רָעָֽה׀׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/024/016.yaml
  text: For the righteous falls seven times and rises again[c][b][a], but the wicked stumble in calamity.
  footnotes:
  - marker: a
    text: Or 'the righteous' or 'a righteous person'; Hebrew has a masculine singular form used representatively in a proverb.
    reason: lexical_alternative
  - marker: b
    text: '''Seven'' is likely idiomatic for repeated occurrence or fullness: the righteous may fall many times, yet rise again.'
    reason: cultural_note
  - marker: c
    text: Or 'stumble in disaster' or 'are overthrown by calamity.' The Hebrew term can denote adversity or disaster rather than moral evil in this context.
    reason: lexical_alternative
