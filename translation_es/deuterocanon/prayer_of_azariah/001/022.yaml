lexical_decisions:
- source_word: γνώτωσαν
  english_pob_choice: let them know
  chosen_spanish: que sepan
  alternatives_spanish:
  - que lleguen a saber
  - que conozcan
  lexicon: BDAG
  rationale: El imperativo aoristo de tercera persona plural expresa un deseo/jussivo. En español, 'que sepan' comunica bien ese valor exhortativo sin sonar rígido.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  lexicon: BDAG
  rationale: El pronombre explícito enfatiza a Dios como sujeto; 'tú' conserva esa fuerza directa y reverencial en español bíblico moderno.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título divino tradicional y claro en español, coherente con el uso reverencial de κύριος en este contexto judío-griego.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Traducción directa y transparente del designativo divino.
- source_word: μόνος
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - único
  - solamente
  lexicon: BDAG
  rationale: '''Solo'' expresa la exclusividad de forma natural en español y preserva la tensión monoteísta de μόνος junto a Κύριος θεός.'
- source_word: ἔνδοξος
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - lleno de gloria
  - honrado
  - famoso
  lexicon: BDAG
  rationale: '''Glorioso'' reproduce el predicado adjetival de grandeza y esplendor inherente, sin reducirlo a fama o honor recibido.'
- source_word: ἐφʼ ὅλην τὴν οἰκουμένην
  english_pob_choice: over all the inhabited earth
  chosen_spanish: sobre toda la tierra habitada
  alternatives_spanish:
  - por toda la tierra habitada
  - sobre todo el mundo
  - a lo largo de toda la tierra habitada
  lexicon: BDAG
  rationale: '''Tierra habitada'' refleja el sentido de οἰκουμένη; ''sobre'' conserva el valor de ἐπί con acusativo, indicando extensión/dominio sobre toda la esfera habitada.'
theological_decisions:
- issue: Exclusividad divina expresada por μόνος con Κύριος θεὸς
  english_pob_reading: you alone are the Lord God
  chosen_spanish_reading: tú solo eres el Señor Dios
  alternative_spanish_readings:
  - eres el único Señor Dios
  - tú eres el Señor Dios solamente
