translation:
  language: es
  text: Y gritó en alta voz, con llanto y gemido y un clamor poderoso, y rasgó sus vestiduras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐβόησεν
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: BDAG
  rationale: βοάω expresa un grito o clamor en voz alta. En español, 'gritó' comunica con naturalidad la intensidad del acto sin obligar a entenderlo como habla articulada.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - con voz alta
  - en alta voz
  lexicon: BDAG
  rationale: La fórmula griega es una expresión concreta de vocalización fuerte. 'Con voz fuerte' conserva la imagen y suena natural en español bíblico moderno.
- source_word: μετὰ κλαυθμοῦ
  english_pob_choice: with weeping
  chosen_spanish: con llanto
  alternatives_spanish:
  - con lloro
  - llorando
  lexicon: BDAG
  rationale: κλαυθμός señala llanto o lamento. 'Con llanto' preserva el sustantivo y encaja bien con la serie de acciones de duelo.
- source_word: στεναγμοῦ
  english_pob_choice: groaning
  chosen_spanish: gemido
  alternatives_spanish:
  - lamento
  - suspiro
  lexicon: BDAG
  rationale: στεναγμός puede ser gemido o suspiro; en este contexto de duelo intenso, 'gemido' refleja bien el dolor audible sin suavizarlo demasiado.
- source_word: βοῆς ἰσχυρᾶς
  english_pob_choice: a mighty cry
  chosen_spanish: un clamor poderoso
  alternatives_spanish:
  - un gran clamor
  - un grito poderoso
  lexicon: BDAG
  rationale: La combinación intensifica el llanto previo. 'Clamor poderoso' mantiene la fuerza semántica de βοή + ἰσχυρός y evita reducirlo a una simple repetición de 'grito'.
- source_word: διέρρηξεν
  english_pob_choice: tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: BDAG
  rationale: El verbo describe la acción de rasgar vestiduras en señal de duelo. 'Rasgó' es preciso, idiomático y conserva el gesto ritual.
- source_word: τὰ ἱμάτια αὐτοῦ
  english_pob_choice: his garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: BDAG
  rationale: ἱμάτια designa ropa/vestiduras; 'vestidos' conserva un registro bíblico digno y comunica mejor el acto de luto que 'ropa' en este contexto.
