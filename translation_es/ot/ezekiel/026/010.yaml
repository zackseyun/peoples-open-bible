review_pass:
  verdict: revise
  source_alignment_summary: 'La base del versículo está bien encaminada: transmite la abundancia de caballos, el polvo, el estruendo militar, el temblor de los muros y la entrada por las puertas. Sin embargo, hay dos desviaciones importantes del sentido fuente y del rastro POB: (1) «como al entrar en una ciudad asolada» cambia מְבֻקָּעָה (‘brechada’, ‘abierta por brecha’, ‘whose defenses have been broken open’) por «asolada», que describe devastación general y no la imagen específica de una brecha en las defensas; (2) la nota b usa «brechada», que no es forma española recomendable para texto o nota de lectura amplia. También conviene naturalizar «te cubrirá el polvo de ellos» a «te cubrirá su polvo» sin pérdida semántica.'
  spanish_quality_summary: El borrador es mayormente legible, pero tiene cierta rigidez en «el polvo de ellos» y una elección menos precisa en «asolada». «Jinetes, ruedas y carros» funciona bien; «tus muros» es aceptable, aunque «tus murallas» también sería posible. La sintaxis mejora si se mantiene la imagen concreta del hebreo con una formulación más idiomática en español.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto en este versículo. Las decisiones léxicas principales son compatibles con el POB, salvo la pérdida del matiz de ‘ciudad abierta por brecha / con sus defensas rotas’ en כִּמְבוֹאֵי עִיר מְבֻקָּעָה.
  issues:
  - severity: high
    issue: «ciudad asolada» no refleja con precisión מְבֻקָּעָה
    rationale: El hebreo y la auditoría inglesa apuntan a una ciudad ‘breached’, es decir, abierta por brecha o con sus defensas rotas. «Asolada» desplaza la imagen desde la ruptura de defensas a la devastación general.
  - severity: medium
    issue: La nota b usa «brechada», forma poco natural en español
    rationale: Aunque intenta conservar la literalidad, «brechada» suena artificial y dificulta la comprensión. Es mejor explicar la literalidad con una frase como «las entradas de una ciudad abierta por brecha» o «de una ciudad con brecha abierta».
  - severity: low
    issue: «te cubrirá el polvo de ellos» es poco idiomático
    rationale: La referencia posesiva puede expresarse naturalmente como «su polvo» en español sin perder la relación con los caballos.
  revised_spanish_text: Por la abundancia de sus caballos te cubrirá su polvo[a]; al ruido de jinetes, de ruedas y de carros temblarán tus muros cuando él entre por tus puertas[b], como al entrar en una ciudad abierta por brecha.
  revised_footnotes:
  - marker: a
    text: 'O: «al ruido de la caballería, de ruedas y de carros».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «como las entradas de una ciudad abierta por brecha»; el sentido es entrar como en una ciudad cuyas defensas han sido abiertas o rotas.'
    reason: lexical_alternative
  revision_rationale: Se revisa para restaurar la imagen precisa de una ciudad abierta por brecha, en línea con מְבֻקָּעָה y con la explicación del POB en inglés. También se mejora la naturalidad de «el polvo de ellos» a «su polvo» y se traslada la nota al lugar relevante de la comparación final, evitando asociarla erróneamente a «tus muros».
