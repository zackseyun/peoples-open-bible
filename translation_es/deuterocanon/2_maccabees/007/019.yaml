    rationale: Refleja el participio, pero en esta frase suena menos natural. «por haber intentado» comunica bien la base causal de ἐπιχειρήσας sin alejarse del sentido.
  - severity: low
    issue: La nota alternativa usa infinitivo reflexivo («oponerte») mientras el texto principal no mantiene paralelismo sintáctico claro
    rationale: No es un error grave, pero la nota fluye mejor si se formula como «por haber intentado oponerte a Dios» para corresponder con la construcción revisada.
  revised_spanish_text: Pero tú[a], no pienses que saldrás inocente por haber intentado luchar contra Dios.
