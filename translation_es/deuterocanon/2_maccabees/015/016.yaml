review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura general: imperativo directo (Λάβε -> «Toma»), aposición («un regalo de Dios»), referencia instrumental a la espada, y futuro de resultado. Sin embargo, «por la cual» suena poco natural con antecedente arma y «quebrantarás a los adversarios» no refleja bien θραύσεις τοὺς ὑπεναντίους, que expresa hacer pedazos/abatir a personas hostiles, no ''quebrantar'' personas en español normal.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero necesita un ajuste idiomático importante: «por la cual» debe cambiarse a «con la cual» o similar, y «quebrantarás a los adversarios» resulta poco natural en español contemporáneo. Además, «santa espada» es comprensible, pero «espada santa» suena más marcada; «santa espada» puede mantenerse. «Regalo» es legible, aunque «don» o «dádiva» serían más elevados; no es necesario cambiarlo.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Dios» está correcto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «adversarios» conserva bien la tensión léxica documentada frente a «enemigos».
  issues:
  - severity: medium
    issue: «por la cual» es una elección instrumental poco idiomática aquí
    rationale: δι' ἧς es instrumental. En español con un arma, «con la cual» suena más natural y claro que «por la cual», que puede sentirse forzado o ambiguo.
  - severity: medium
    issue: «quebrantarás a los adversarios» es poco natural y semánticamente débil
    rationale: θραύσεις tiene fuerza de romper/destrozar. En español, «quebrantar» se usa más naturalmente para ánimo, ley, fuerza, etc.; aplicado a personas en contexto militar suena extraño. «harás pedazos» o «destrozarás» representa mejor la fuerza verbal.
  - severity: low
    issue: La nota b está anclada en «Dios» en lugar de «adversarios»
    rationale: La variante «enemigos» corresponde a τοὺς ὑπεναντίους, no a «Dios». El marcador debe ubicarse junto a «adversarios» en el texto para respetar la disciplina de notas.
  revised_spanish_text: Toma la santa espada[a], un regalo de Dios, con la cual harás pedazos a los adversarios[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Recibe la santa espada, un regalo de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los enemigos» por «a los adversarios».'
    reason: lexical_alternative
