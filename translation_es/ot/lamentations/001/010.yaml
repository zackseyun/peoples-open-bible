    rationale: El inglés usa una raya larga antes de «those whom you commanded...». En español, una raya o coma funciona mejor que dos puntos para mantener continuidad sintáctica y tono literario.
  - severity: low
    issue: Matiz de כִּי
    rationale: «Porque» es correcto, pero «pues» puede sonar más natural y elevado en este registro lamentativo, conservando el valor explicativo.
