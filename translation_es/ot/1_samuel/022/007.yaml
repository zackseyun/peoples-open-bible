translation:
  language: es
  text: 'Entonces Saúl dijo a sus siervos que estaban alrededor de él: «Escuchen ahora, benjaminitas[a]. ¿Acaso el hijo de Isaí también les dará a todos ustedes campos y viñas? ¿Los nombrará a todos ustedes jefes de mil y jefes de cien?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hijos de Benjamín'. El hebreo literalmente dice 'hijos de Benjamín', preservando el llamado de Saúl a la identidad tribal.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: El hebreo עבד en este contexto cortesano designa a los subordinados o asistentes de Saúl. 'Siervos' conserva la relación de servicio sin imponer 'esclavos', que sería demasiado fuerte para este pasaje y no está exigido por el contexto.
- source_word: הַנִּצָּבִים עָלָיו
  english_pob_choice: who were standing around him
  chosen_spanish: que estaban alrededor de él
  alternatives_spanish:
  - que estaban de pie junto a él
  - que estaban apostados sobre él
  lexicon: HALOT
  rationale: La imagen es de asistentes o cortesanos ubicados alrededor de Saúl. 'Alrededor de él' comunica el sentido natural en español sin perder la idea espacial del participio con עַל.
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Listen now
  chosen_spanish: Escuchen ahora
  alternatives_spanish:
  - Escuchen, por favor
  - Oigan ahora
  lexicon: HALOT
  rationale: נָא añade urgencia o ruego. 'Ahora' reproduce bien la fuerza discursiva en español contemporáneo, como en la decisión inglesa revisada, sin sonar arcaico.
- source_word: בְּנֵי יְמִינִי
  english_pob_choice: Benjaminites
  chosen_spanish: benjaminitas
  alternatives_spanish:
  - hijos de Benjamín
  - benjaminitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de Benjamín', pero aquí funciona como apelativo tribal. 'Benjaminitas' preserva la referencia étnica y suena natural en español; se mantiene la tensión retórica del llamado de Saúl a la lealtad tribal.
- source_word: בֶּן יִשַׁי
  english_pob_choice: the son of Jesse
  chosen_spanish: el hijo de Isaí
  alternatives_spanish:
  - David
  - el hijo de Jesé
  lexicon: HALOT
  rationale: Saúl evita nombrar a David y usa la designación filial. 'Isaí' es la forma española usual del nombre y conserva el tono despectivo o distanciado del original.
- source_word: שָׂדוֹת וּכְרָמִים
  english_pob_choice: fields and vineyards
  chosen_spanish: campos y viñas
  alternatives_spanish:
  - campos y viñedos
  - tierras de labranza y viñas
  lexicon: HALOT
  rationale: Son recompensas concretas de tierra y cultivo. 'Viñas' conserva la imagen agrícola directa del hebreo; 'campos' es el término general adecuado para שָׂדוֹת.
- source_word: יָשִׂים
  english_pob_choice: make
  chosen_spanish: los pondrá
  alternatives_spanish:
  - los hará
  - los nombrará
  lexicon: HALOT
  rationale: Aquí el verbo implica colocar o nombrar en un cargo. 'Los pondrá' sigue la concreción del hebreo y mantiene el paralelismo con la pregunta anterior en español.
- source_word: שָׂרֵי אֲלָפִים וְשָׂרֵי מֵאוֹת
  english_pob_choice: commanders of thousands and commanders of hundreds
  chosen_spanish: jefes de mil y jefes de cien
  alternatives_spanish:
  - comandantes de mil y comandantes de cien
  - capitanes de mil y capitanes de cien
  lexicon: HALOT
  rationale: Se trata de rangos militares-administrativos. 'Jefes de mil y jefes de cien' refleja con fidelidad la estructura hebrea y es suficientemente claro en español; se evita 'capitanes' por ser menos literal y más tradicionalizado.
theological_decisions:
- issue: Tratamiento del apelativo tribal בְּנֵי יְמִינִי
  english_pob_reading: The Hebrew literally reads 'sons of Benjamin,' preserving Saul's appeal to tribal identity.
  chosen_spanish_reading: benjaminitas, con nota que recuerda el literal 'hijos de Benjamín'
  alternative_spanish_readings:
  - hijos de Benjamín
  - benjaminitas
  rationale: 'No hay aquí una cuestión doctrinal, pero sí una tensión lexical importante: el hebreo conserva la forma filial y la apelación tribal. El texto principal usa un equivalente natural; la nota preserva el literal para que no se pierda la fuerza retórica del original.'
  doctrine_reference: No aplica; decisión lexical y retórica
- issue: Designación de los rangos militares
  english_pob_reading: commanders of thousands and commanders of hundreds
  chosen_spanish_reading: jefes de mil y jefes de cien
  alternative_spanish_readings:
  - comandantes de mil y comandantes de cien
  - capitanes de mil y capitanes de cien
  rationale: La estructura del hebreo es administrativa y militar. 'Jefes' mantiene la relación de autoridad sin introducir un matiz más técnico o más moderno del que el texto exige. No se busca uniformar con terminología eclesiástica o militar posterior.
  doctrine_reference: No aplica; decisión de equivalencia contextual
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ''Listen, please'' a ''Listen now'' y de ''sons of Benjamin'' a ''Benjaminites'' por naturalidad. En español se siguió esa misma dirección: ''Escuchen ahora'' y ''benjaminitas'', manteniendo además la referencia literal en nota para el apelativo tribal.'
  spanish_consistency_notes:
  - Se mantiene 'Saúl' y 'Isaí' con la ortografía española habitual.
  - Se eligió 'siervos' para עֲבָדָיו porque en este contexto de corte describe subordinados de Saúl; no se usó 'esclavos' por falta de apoyo contextual.
  - '''Campos y viñas'' se conserva con léxico agrícola transparente y sin suavizar la acumulación del hebreo.'
  - Los rangos 'jefes de mil y jefes de cien' siguen la repetición del original y evitan expandir innecesariamente la frase.
