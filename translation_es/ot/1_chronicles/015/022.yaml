translation:
  language: es
  text: Y Chenanías[a], jefe de los levitas, dirigió el transporte[b], porque era experto en ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dirigió el canto ... porque era experto en ello'. El hebreo מַשָּׂא suele significar 'carga' o 'llevar', pero algunos lo entienden aquí en sentido musical por las referencias cercanas a cantores y músicos.
    reason: alternative_reading
  - marker: b
    text: 'El hebreo repite el mismo sustantivo: ''en el transporte ... en el transporte''. La traducción vuelve la segunda mención idiomática como ''en ello''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְנַנְיָהוּ
  english_pob_choice: Chenaniah
  chosen_spanish: Chenanías
  alternatives_spanish:
  - Quenanías
  - Cananías
  lexicon: Nombre propio hebreo transliterado
  rationale: Se translitera el nombre propio, ajustándolo a ortografía española natural con acento final para reflejar la pronunciación aguda y mantener identificación clara sin traducir el nombre.
- source_word: שַׂר
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - oficial
  - príncipe
  lexicon: HALOT
  rationale: En este contexto administrativo/cultual, el término expresa supervisión y autoridad sobre los levitas. 'Jefe' comunica bien esa función en español moderno y conserva el valor de cargo/encargo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  - la tribu de Leví
  lexicon: HALOT
  rationale: Se mantiene la designación tribal tradicional en español bíblico, que es clara y precisa.
- source_word: בְּמַשָּׂא
  english_pob_choice: the carrying
  chosen_spanish: la carga
  alternatives_spanish:
  - el acarreo
  - el transporte
  - la pesada carga
  lexicon: HALOT
  rationale: El sustantivo puede denotar 'carga' o 'acto de llevar'. En español, 'la carga' conserva el campo semántico de peso/porte y resulta natural en una frase breve. También permite la lectura alternativa musical, que se documenta en nota.
- source_word: יָסֹר
  english_pob_choice: directed
  chosen_spanish: dirigía
  alternatives_spanish:
  - dirigió
  - supervisaba
  - tenía a su cargo
  lexicon: HALOT
  rationale: El verbo expresa dirección/oversight continuo en el contexto. 'Dirigía' transmite supervisión activa de forma idiomática y coherente con la función del cargo.
- source_word: בַּמַּשָּׂא
  english_pob_choice: at it
  chosen_spanish: en ella
  alternatives_spanish:
  - en la carga
  - en ese trabajo
  - en eso
  lexicon: HALOT
  rationale: Se conserva el enlace con el sustantivo anterior sin repetir torpemente la misma palabra. 'En ella' mantiene referencia al mismo campo semántico, en línea con la repetición hebrea del término.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de su encargo o capacidad; 'porque' es el conector más natural y claro en español actual.
- source_word: מֵבִין הוּא
  english_pob_choice: he was skillful
  chosen_spanish: era entendido
  alternatives_spanish:
  - era hábil
  - era experto
  - tenía discernimiento
  lexicon: HALOT
  rationale: La forma participial de בין aquí expresa capacidad competente, no solo comprensión intelectual. 'Era entendido' conserva la ambigüedad útil entre inteligencia y pericia, sin perder el sentido práctico del contexto. Se evita 'hábil' para no estrechar demasiado el matiz, y se evita 'entendido' moderno coloquial por el contexto bíblico, aunque la forma es plenamente comprensible aquí.
theological_decisions:
- issue: Posible lectura de מַשָּׂא como 'carga/carrying' o como 'canto/singing' en el contexto levítico
  english_pob_reading: Main text chooses 'the carrying'; footnote preserves the musical alternative.
  chosen_spanish_reading: El texto principal dice 'la carga' y la nota conserva la posibilidad de 'el canto' o 'la música' como lectura interpretativa.
  alternative_spanish_readings:
  - dirigía el canto
  - dirigía el cantar
  - dirigía la música
  rationale: La evidencia léxica favorece el sentido básico de 'carga/porte', especialmente por el uso repetido del mismo término y la referencia inmediata al traslado de objetos sagrados. Sin embargo, el contexto litúrgico permite una lectura musical que no debe eliminarse; por eso se preserva en nota.
  doctrine_reference: Hermenéutica léxica contextual; no implica diferencia doctrinal, sino una tensión interpretativa legítima del término
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión inglesa: se conserva la elección principal ''carga/carrying'' en el texto y se mantiene la alternativa musical en nota, sin introducir cambios de sentido. La redacción española ajusta la sintaxis para sonar natural y conserva la repetición hebrea mediante una referencia pronominal en la segunda ocurrencia.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'levitas' para הַלְוִיִּם, siguiendo el estándar bíblico en español.
  - '''Entendido'' se eligió por su valor de competencia práctica en registro bíblico; no debe leerse solo como conocimiento intelectual moderno.'
  - La nota alternativa evita suprimir la lectura musical documentada en el audit trail.
