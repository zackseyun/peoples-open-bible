translation:
  language: es
  text: 'Y ustedes harán como yo he hecho: no cubrirán su bigote[a], y no comerán el pan de hombres[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cubrir el bigote o el labio superior era una señal de duelo o de impureza.
    reason: cultural_note
  - marker: b
    text: O posiblemente «el pan del doliente», es decir, comida llevada por otras personas para consolar a quienes están de luto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: And you will do
  chosen_spanish: Y ustedes harán
  alternatives_spanish:
  - Y ustedes harán de manera que
  - Y ustedes harán como
  lexicon: HALOT
  rationale: El imperfecto consecutivo expresa una instrucción/proyección futura en contexto profético; en español, el futuro simple conserva ese valor. «Ustedes» hace explícito el sujeto plural sin perder naturalidad.
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  english_pob_choice: as I have done
  chosen_spanish: como yo he hecho
  alternatives_spanish:
  - tal como yo hice
  - justo como yo he hecho
  lexicon: HALOT
  rationale: La comparación remite al acto-signo previo de Ezequiel. El pretérito perfecto mantiene la vinculación con una acción ya realizada y aún relevante para la imitación futura.
- source_word: עַל שָׂפָם
  english_pob_choice: over your mustache
  chosen_spanish: su bigote
  alternatives_spanish:
  - su labio superior
  - su bigote o labio superior
  lexicon: HALOT
  rationale: שָׂפָם nombra la zona del labio superior/bigote en el contexto de duelo. «Bigote» es la forma breve más natural en español; en una nota se aclara que la referencia es al gesto cultural de cubrir esa zona del rostro.
- source_word: לֹא תַעְטוּ
  english_pob_choice: you will not cover
  chosen_spanish: no cubrirán
  alternatives_spanish:
  - no se cubrirán
  - no velarán
  lexicon: HALOT
  rationale: El verbo indica cubrir o envolverse. «No cubrirán» preserva la fuerza verbal sin introducir un objeto no explicitado; el contexto funerario queda aclarado en nota.
- source_word: לֶחֶם אֲנָשִׁים
  english_pob_choice: the bread of men
  chosen_spanish: el pan de hombres
  alternatives_spanish:
  - el pan de la gente
  - el pan del duelo
  - el alimento de otros
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión hebrea, como en la POB inglesa, para no borrar la tensión entre el giro literal y el sentido idiomático de alimento provisto por otros. La nota preserva la lectura idiomática alternativa.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you will not eat
  chosen_spanish: no comerán
  alternatives_spanish:
  - no lo comerán
  - no comerán de él
  lexicon: HALOT
  rationale: El futuro simple reproduce el valor predictivo y exhortativo del texto. La construcción directa en español mantiene el paralelismo con la cláusula anterior.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la solución inglesa auditada, preservando la doble tensión de una expresión literal («el pan de hombres») con una lectura idiomática explicada en nota. También mantiene el gesto cultural de cubrir la zona del labio superior mediante una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Pan de hombres» se deja literal en el cuerpo para respetar la ambigüedad documentada por la POB inglesa.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto en el lugar correspondiente.
