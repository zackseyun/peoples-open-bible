translation:
  language: es
  text: No comerán ni por un día[a], ni por dos días, ni por cinco días, ni por diez días, ni por veinte días,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «No comerán por un día, ni por dos días, ni por cinco días, ni por diez días, ni por veinte días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: ni
  alternatives_spanish:
  - 'no'
  - ni no
  lexicon: HALOT
  rationale: La serie hebrea repite la negación con cada duración. En español, la coordinación negativa con «ni» preserva mejor la secuencia excluida que repetir «no» de forma rígida.
- source_word: י֥וֹם אֶחָ֛ד
  english_pob_choice: one day
  chosen_spanish: un día
  alternatives_spanish:
  - un solo día
  - un día solamente
  lexicon: HALOT
  rationale: La expresión cardinal más natural en español es «un día». Mantiene la cuenta inicial y la sencillez del hebreo.
- source_word: תֹּאכְל֖וּ/ן
  english_pob_choice: you will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - ustedes comerán
  - comeréis
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa aquí una declaración prospectiva. En español, el futuro simple transmite bien el anuncio. Se omite el sujeto por ser claro en el contexto y evitar pesadez.
- source_word: יוֹמָ֑יִם
  english_pob_choice: two days
  chosen_spanish: dos días
  alternatives_spanish:
  - por dos días
  - durante dos días
  lexicon: HALOT
  rationale: El dual hebreo equivale directamente a «dos días». Se conserva la serie temporal sin añadir matices no presentes en el texto.
- source_word: חֲמִשָּׁ֣ה יָמִ֗ים
  english_pob_choice: five days
  chosen_spanish: cinco días
  alternatives_spanish:
  - por cinco días
  lexicon: HALOT
  rationale: Número cardinal + sustantivo de tiempo, traducido de forma directa para respetar el avance retórico de la enumeración.
- source_word: עֲשָׂרָ֣ה יָמִ֔ים
  english_pob_choice: ten days
  chosen_spanish: diez días
  alternatives_spanish:
  - por diez días
  lexicon: HALOT
  rationale: Se mantiene la simetría de la progresión numérica y el estilo sobrio del anuncio.
- source_word: עֶשְׂרִ֥ים יֽוֹם
  english_pob_choice: twenty days
  chosen_spanish: veinte días
  alternatives_spanish:
  - por veinte días
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular tras «veinte», en español lo normal es pluralizar el sustantivo temporal. No se fuerza un singular artificial porque no aporta claridad ni fidelidad adicional.
translation_notes:
  revision_awareness: El texto hebreo es breve y repetitivo; el borrador español sigue esa cadencia enumerativa. La principal decisión de revisión fue usar coordinación negativa natural en español («ni») para reproducir la serie de duraciones negadas sin perder el sentido del original. La nota alternativa preserva la posibilidad de una formulación más literal, como hizo el inglés POB.
  spanish_consistency_notes:
  - Se usó «un día» para יוֹם אֶחָד y «dos/cinco/diez/veinte días» para las cantidades sucesivas, manteniendo la progresión numérica.
  - La puntuación conserva la lista acumulativa del hebreo con comas y sin expansión interpretativa.
  - No se introdujeron términos teológicos particulares porque el versículo contiene solo una negación temporal.
