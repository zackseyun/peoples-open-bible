revisions:
- from: ¡Ay del malvado! Le irá mal[a], porque la retribución de sus manos se le hará.
  to: ¡Ay del malvado! Le irá mal[a], porque la obra de sus manos se le hará.
  rationale: Se reemplaza «la retribución de sus manos» por «la obra de sus manos» para alinearse con la revisión inglesa auditada y mejorar la naturalidad del español sin perder el vínculo retributivo del verso. Se conserva «se le hará» para mantener la repetición verbal de עשה y la fuerza medida-por-medida. También se suaviza la nota alternativa para que suene más natural en español y refleje mejor la opción formal basada en «evil is upon him».
