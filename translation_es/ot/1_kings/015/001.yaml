revisions:
- from: En el año dieciocho[a] del rey Jeroboam hijo de Nebat, Abijam[b] llegó a ser rey sobre Judá.
  to: En el año decimoctavo del rey Jeroboam hijo de Nebat, Abijam[a] llegó a ser rey sobre Judá.
  rationale: Se ajusta la datación regnal a un español más natural y bíblicamente estándar con «año decimoctavo», y se elimina una nota no esencial. Se conserva «Abijam» en el texto principal con la nota de alternativa «Abías», en línea con la evidencia hebrea y el rastro de auditoría en inglés.
