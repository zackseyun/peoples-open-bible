translation:
  language: es
  text: Y el día quince de este mes es la Fiesta de los Panes sin Levadura de Yahvé[a]; durante siete días comerán panes sin levadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para Yahvé'. La preposición hebrea puede expresar dedicación o pertenencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֲמִשָּׁה עָשָׂר יוֹם
  english_pob_choice: And on the fifteenth day
  chosen_spanish: Y en el día quince
  alternatives_spanish:
  - Y el quince
  - Y en el decimoquinto día
  lexicon: HALOT
  rationale: El hebreo usa una expresión calendárica idiomática. En español, 'en el día quince' comunica con naturalidad la fecha sin perder el sentido legal del original.
- source_word: לַ/חֹדֶשׁ הַ/זֶּה
  english_pob_choice: of this month
  chosen_spanish: de este mes
  alternatives_spanish:
  - en este mes
  lexicon: HALOT
  rationale: La construcción marca la fecha dentro del mes vigente. 'De este mes' es la forma más natural en español y sigue de cerca la relación calendárica del hebreo.
- source_word: חַג
  english_pob_choice: Feast
  chosen_spanish: Fiesta
  alternatives_spanish:
  - festividad
  - festín
  lexicon: HALOT
  rationale: '''חַג'' designa una celebración cultual/peregrina. ''Fiesta'' es un equivalente claro y digno en español; conserva el carácter festivo sin imponer un término eclesiástico más técnico que el texto no exige.'
- source_word: הַ/מַּצּוֹת
  english_pob_choice: Unleavened Bread
  chosen_spanish: de los Panes sin Levadura
  alternatives_spanish:
  - de los Ázimos
  - de los panes sin levadura
  lexicon: HALOT
  rationale: Como nombre establecido de la festividad, el plural hebreo se refleja mejor con 'los Panes sin Levadura'. Mantiene la referencia a la comida prescrita y funciona como título de fiesta en español bíblico.
- source_word: לַ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé[a]
  alternatives_spanish:
  - a Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: La preposición ל indica dedicación o pertenencia. En español, 'para Yahvé' conserva esa relación cultual de manera natural; se evita 'SEÑOR' porque el texto fuente usa el nombre divino explícito.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  - durante siete días
  lexicon: HALOT
  rationale: La duración queda clara por el contexto legal. En español, puede expresarse de manera directa sin sobrecargar la frase; el valor durativo se entiende con el verbo prescriptivo posterior.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - ázimos
  - panes ázimos
  lexicon: HALOT
  rationale: Aquí el sustantivo plural se conserva como plural concreto en español. 'Panes sin levadura' es claro para lectores amplios y mantiene la imagen material del alimento requerido.
- source_word: תֹּאכֵלוּ
  english_pob_choice: you shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comeréis
  - deberán comer
  lexicon: HALOT
  rationale: En material legal, el imperfecto hebreo expresa prescripción. 'Comerán' en español mantiene el tono normativo sin añadir una intensidad inexistente en el hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto fuente usa el Tetragrama de forma explícita. Siguiendo la convención del proyecto para el hebreo original, se translitera como 'Yahvé' y no se sustituye por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa más reciente, pero adapta la sintaxis a un español bíblico natural. Se conservó la tensión semántica de לַיהוָה mediante una nota porque la preposición puede leerse como dedicación o pertenencia. No se introdujeron cambios textuales adicionales respecto del consenso del audit trail.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el nombre divino cuando aparece el Tetragrama en el hebreo fuente.
  - '''Fiesta de los Panes sin Levadura'' mantiene el nombre cultual tradicional sin recurrir a ''Pascua'' o a otro título no presente aquí.'
  - '''panes sin levadura'' traduce el plural hebreo מַצּוֹת con un plural concreto en español, evitando una abstracción innecesaria.'
