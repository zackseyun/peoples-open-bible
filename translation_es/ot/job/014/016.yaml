revisions:
- from: Porque ahora tú cuentas mis pasos[a]; no vigilas mi pecado[b].
  to: Porque ahora cuentas mis pasos[a]; no mantienes vigilancia sobre mi pecado[b].
  rationale: Se ajusta el segundo hemistiquio para reflejar mejor שׁמר על y para lograr un español más natural y digno. También se reparan las alternativas de la nota b para que sean idiomáticas en español, manteniendo la gama semántica preservada por la auditoría inglesa. Se elimina «tú» por fluidez sin pérdida de sentido.
