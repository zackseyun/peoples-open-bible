translation:
  language: es
  text: Entonces me levanté y salí al valle[a]; y he aquí que allí estaba la gloria de Yahvé, como la gloria que yo había visto junto al río Quebar; y caí rostro en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llanura», para el hebreo biq‘ah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אָקוּם
  english_pob_choice: So I arose
  chosen_spanish: Así que me levanté
  alternatives_spanish:
  - Entonces me levanté
  - Y me levanté
  lexicon: HALOT
  rationale: El wayyiqtol marca sucesión narrativa. «Así que» conserva el avance de la acción de manera natural en español, y «me levanté» reproduce el movimiento puntual de קום sin sobrecargar el ritmo.
- source_word: וָ/אֵצֵא
  english_pob_choice: went out
  chosen_spanish: salí
  alternatives_spanish:
  - me dirigí fuera
  - salí de allí
  lexicon: HALOT
  rationale: יצא aquí expresa salida física hacia el lugar indicado. «Salí» es la forma más directa y natural en español, y mantiene la transición de lugar.
- source_word: הַ/בִּקְעָה
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - la llanura
  - la depresión
  lexicon: HALOT
  rationale: בִּקְעָה puede significar valle o llanura. «Valle» es una equivalencia clara y ampliamente inteligible en español; la alternativa «llanura» queda reflejada en la nota para preservar la amplitud léxica del hebreo.
- source_word: וְ/הִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y allí
  lexicon: HALOT
  rationale: La fórmula introduce una escena llamativa y solemne. «Y he aquí» conserva el tono profético y la función de deíctico discursivo mejor que una expresión más plana.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé Dios
  - la gloria de Yahvé
  lexicon: HALOT
  rationale: כָּבוֹד se refiere a la manifestación visible de la presencia divina. Se mantiene «gloria» y se usa «Yahvé» según la decisión del proyecto para el Tetragrámaton, conservando la estructura genitiva del hebreo.
- source_word: עֹמֵד
  english_pob_choice: was standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estaba de pie
  - estaba en pie
  lexicon: HALOT
  rationale: El participio describe una postura durativa. En español, «de pie» comunica con naturalidad la escena estática; «estaba de pie» es posible, pero aquí la frase breve fluye mejor tras «estaba la gloria de Yahvé».
- source_word: כַּ/כָּבֹוד
  english_pob_choice: like the glory
  chosen_spanish: como la gloria
  alternatives_spanish:
  - igual que la gloria
  - tal como la gloria
  lexicon: HALOT
  rationale: El prefijo כ- introduce comparación. «Como la gloria» expresa de forma fiel la relación comparativa con la visión anterior sin añadir matices no presentes.
- source_word: אֲשֶׁר רָאִיתִי
  english_pob_choice: that I had seen
  chosen_spanish: que yo había visto
  alternatives_spanish:
  - que vi
  - que había visto
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que la visión anterior precede a la escena actual. Se mantiene además el sujeto explícito «yo» para reproducir el énfasis personal del testigo.
- source_word: עַל נְהַר כְּבָר
  english_pob_choice: by the Kebar River
  chosen_spanish: junto al río Quebar
  alternatives_spanish:
  - a orillas del río Quebar
  - al lado del río Quebar
  lexicon: HALOT
  rationale: La preposición עַל con un río en contexto narrativo se entiende aquí como proximidad. «Junto al río» es natural en español y conserva la referencia geográfica del topónimo Quebar.
- source_word: וָ/אֶפֹּל עַל פָּנָי
  english_pob_choice: and I fell on my face
  chosen_spanish: y caí sobre mi rostro
  alternatives_spanish:
  - y caí de bruces
  - y me postré
  lexicon: HALOT
  rationale: La expresión es un gesto reverente y corporal de postración. «Caí sobre mi rostro» preserva la literalidad hebrea y el peso ceremonial; «me postré» sería más interpretativo, por eso no se adopta en el texto principal.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de transliterar el Tetragrámaton como «Yahvé», manteniendo el nombre propio de Dios y evitando la sustitución por un título. Esto conserva la referencia covenantal del texto profético.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de כְּבוֹד יְהוָה en la visión
  english_pob_reading: the glory of Yahweh
  chosen_spanish_reading: la gloria de Yahvé
  alternative_spanish_readings:
  - la presencia de Yahvé
  - el esplendor de Yahvé
  rationale: Se conserva «gloria» porque el hebreo remite a la manifestación visible y solemne de la presencia divina, sin reducirla a una abstracción. «Presencia» podría explicar el sentido teológico, pero no reemplaza de manera suficiente el término del texto.
  doctrine_reference: 'Ezequiel 1–3: la gloria visible de Yahvé'
translation_notes:
  revision_awareness: 'El borrador coincide con la última pasada revisada y con el resumen de alta concordancia: no se detectaron cambios sustantivos respecto del inglés auditado. La decisión principal que requiere explicitación en español es la traducción del Tetragrámaton como «Yahvé», conforme a la política doctrinal del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Gloria» se usa de manera estable para כָּבוֹד en este versículo.
  - «Río Quebar» preserva el topónimo tradicional en español sin alterar el referente.
  - La nota de pie de página solo marca la alternativa léxica de בִּקְעָה y no introduce una segunda interpretación en el texto principal.
