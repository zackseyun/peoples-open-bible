base_translation:
  language: en
  yaml_path: translation/ot/zechariah/003/005.yaml
  text: Then I said[a], “Let them put a clean turban on his head.” So they put the clean turban on his head and clothed him with garments[c][b], while the angel of Yahweh was standing by.
  footnotes:
  - marker: a
    text: Or 'And I said.' The Hebrew conjunction can be rendered simply 'and'; 'then' reflects the narrative flow.
    reason: lexical_alternative
  - marker: b
