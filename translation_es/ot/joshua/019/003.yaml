lexical_decisions:
- source_word: חֲצַר שׁוּעָל
  english_pob_choice: Hazar-shual
  chosen_spanish: Hazar-Sual
  alternatives_spanish:
  - Hazor-Sual
  - Aldea del zorro
  lexicon: HALOT
  rationale: Se conserva el nombre propio como topónimo transliterado, no traducido. En español, la forma con guion mantiene el carácter compuesto del nombre hebreo. Se adapta la ortografía al uso hispano con mayúscula inicial y sin modificar el sentido a una traducción semántica en el texto principal.
- source_word: בָלָה
  english_pob_choice: Balah
  chosen_spanish: Balah
  alternatives_spanish:
  - Baalah
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. La forma castellana coincide con la transliteración breve del hebreo de este versículo y evita introducir una armonización con otras formas tradicionales que no está exigida por el texto inmediato.
- source_word: עָצֶם
  english_pob_choice: Ezem
  chosen_spanish: Ezem
  alternatives_spanish:
  - Azem
  lexicon: HALOT
  rationale: También es un topónimo propio y se translitera directamente. Se prefiere Ezem porque refleja mejor la vocalización masorética del pasaje frente a la variante tradicional Azem.
- source_word: וּ / וָ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción coordinante hebrea se vierte naturalmente con 'y' en español. No hace falta 'e' porque las palabras siguientes no empiezan con sonido /i/.
translation_notes:
  revision_awareness: El pasaje es una lista breve de topónimos en Josué 19:3. No hay revisiones textuales relevantes en el paquete fuente; la decisión principal es la transliteración consistente de nombres propios y la preservación del orden enumerativo del hebreo.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y bíblico propio de una lista toponímica.
  - Se evita traducir los nombres propios para no perder la forma textual del original.
  - Se usa 'y' antes del último elemento de la lista, conforme al español natural.
  - Se conservan notas de variante donde el propio audit trail en inglés documenta formas alternativas de tradición castellana.
