translation:
  language: es
  text: Y he aquí[a], he puesto cuerdas sobre ti, y no te darás vuelta de tu costado al otro[b] hasta que hayas cumplido los días de tu asedio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira» o «ve».
    reason: lexical_alternative
  - marker: b
    text: Lit. «de tu costado a tu costado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ve
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y de llamado a la atención del hebreo en un español natural y solemne.
- source_word: נָתַתִּי עָלֶיךָ
  english_pob_choice: I have put on you
  chosen_spanish: he puesto sobre ti
  alternatives_spanish:
  - he colocado sobre ti
  - he puesto en ti
  lexicon: HALOT
  rationale: «Poner sobre» reproduce bien la construcción con עַל y mantiene el sentido físico de cargar o sujetar algo sobre la persona.
- source_word: עֲבוֹתִים
  english_pob_choice: ropes
  chosen_spanish: cuerdas
  alternatives_spanish:
  - ropes
  - lazos
  lexicon: HALOT
  rationale: «Cuerdas» es la alternativa española más natural para el registro bíblico; preserva la idea de atadura sin sonar arcaica. El inglés POB admite «cords» o «bands», por lo que «cuerdas» queda dentro del campo semántico.
- source_word: וְלֹא תֵהָפֵךְ
  english_pob_choice: and you will not turn yourself
  chosen_spanish: y no te volverás
  alternatives_spanish:
  - y no podrás volverte
  - y no te girarás
  lexicon: HALOT
  rationale: El nifal expresa el acto de volverse o darse vuelta. En español, «volverse» comunica bien el movimiento corporal sin forzar una perífrasis demasiado explicativa.
- source_word: מִצִּדְּךָ אֶל צִדֶּךָ
  english_pob_choice: from your side to your other side
  chosen_spanish: de tu costado al otro
  alternatives_spanish:
  - de un costado al otro
  - de tu lado al otro
  lexicon: HALOT
  rationale: «Costado» conserva el matiz corporal concreto de costado/lado en una escena física de estar acostado. «Al otro» evita repetir innecesariamente «costado» y suena natural en español.
- source_word: עַד כַּלּוֹתְךָ
  english_pob_choice: until you have completed
  chosen_spanish: hasta que hayas cumplido
  alternatives_spanish:
  - hasta que termines
  - hasta que completes
  lexicon: HALOT
  rationale: «Cumplir» comunica la idea de llevar a término una duración asignada, adecuada para el carácter de signo profético.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - el período de
  - los días durante
  lexicon: HALOT
  rationale: Mantiene la concreción temporal del hebreo y la cadena constructa de forma transparente.
- source_word: מְצוּרֶךָ
  english_pob_choice: your siege
  chosen_spanish: tu sitio
  alternatives_spanish:
  - tu asedio
  - tu cerco
  lexicon: HALOT
  rationale: En español bíblico, «sitio» es el término más sobrio y abarcaría el acto y la situación de asediar. Se preserva el posesivo como en el hebreo y en la POB inglesa, donde la referencia es el sitio simbólico representado por el signo profético.
theological_decisions:
- issue: Referente de «tu sitio»
  english_pob_reading: The phrase refers to the symbolic siege Ezekiel is enacting, not a literal siege against Ezekiel personally.
  chosen_spanish_reading: La frase se entiende como el sitio simbólico que Ezequiel está representando, no como un asedio literal contra el profeta.
  alternative_spanish_readings:
  - dejar simplemente «tu sitio» sin aclaración
  - explicitarlo más como «el sitio de Jerusalén»
  rationale: Conviene conservar el posesivo del hebreo y de la POB, pero en la nota teológica dejar claro el referente para evitar una lectura literal errónea. No se desarrolla el referente en el texto principal para no sobreinterpretar el versículo.
  doctrine_reference: Ezequiel 4; lectura profética del acto-símbolo
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste final de la POB inglesa: mantiene la secuencia directa «y no te volverás» en lugar de una perífrasis explicativa, y conserva la estructura corporal «de tu costado al otro» para reflejar con mayor cercanía el hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el nombre divino en el texto hebreo.
  - «Sitio» se reserva aquí para מְצוּרֶךָ por coherencia con el campo semántico de asedio/sitio en contextos militares.
  - «Cuerdas» se elige como equivalente natural de עֲבוֹתִים sin perder la fuerza de atadura.
  - Se conserva el paralelismo temporal con «hasta que hayas cumplido los días de…».
