revisions:
- from: Y mandó a ciertos hombres valientes, que estaban en su ejército, que ataran a Sadrac[a], Mesac y Abednego, para echarlos en el horno de fuego ardiente.
  to: Y mandó a ciertos guerreros valientes de su ejército atar a Sadrac[a], Mesac y Abednego, para echarlos en el horno de fuego ardiente.
  rationale: Se ajusta «hombres valientes» a «guerreros valientes» para reflejar mejor el modismo militar גִּבָּרֵי חַיִל en contexto. Se aligera la sintaxis para una lectura más natural en español digno y moderno. Se corrige la nota al pie para que preserve de manera clara la alternativa tradicional documentada en la auditoría inglesa, en vez de repetir casi la misma frase de la línea principal.
