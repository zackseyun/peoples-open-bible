    text: Or 'from the entrance of Hamath.' The Hebrew may be read as a descriptive border expression or as the place-name Lebo-hamath.
    reason: alternative_reading
  - marker: b
    text: Or 'the Wadi of Egypt.' The Hebrew term often refers to a seasonal watercourse rather than a major river.
    reason: lexical_alternative
