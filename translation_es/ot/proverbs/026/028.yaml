base_translation:
  language: en
  yaml_path: translation/ot/proverbs/026/028.yaml
  text: A lying tongue hates those it crushes[c][b][a], and a flattering mouth causes ruin.
  footnotes:
  - marker: a
    text: Or 'those wounded by it' or 'its crushed ones.' The Hebrew points to victims who have been crushed or oppressed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a smooth mouth'; that is, speech marked by flattery or deceitful smoothness.
    reason: lexical_alternative
  - marker: c
    text: Or 'causes downfall.'
    reason: lexical_alternative
