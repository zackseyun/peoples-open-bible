revisions:
- from: 'Y en cuanto a Joacim, rey de Judá[a], dirás: «Así dice Yahvé: Tú has quemado este rollo, diciendo: “¿Por qué escribiste en él, diciendo: ‘El rey de Babilonia ciertamente vendrá y destruirá esta tierra, y hará cesar de ella a hombre y bestia’?”»'
  to: 'Y en cuanto a Joacim, rey de Judá, dirás: «Así dice Yahvé: Tú has quemado este rollo, diciendo: “¿Por qué escribiste en él, diciendo: ‘El rey de Babilonia ciertamente vendrá y destruirá esta tierra, y eliminará de ella a hombre y bestia[a]’?”»'
  rationale: Se corrige el anclaje de la nota para que corresponda a la frase que explica, y se reemplaza «hará cesar de ella» por «eliminará de ella» para expresar con más naturalidad en español el sentido de depoblación total de וְהִשְׁבִּית מִמֶּנָּה, sin perder fuerza ni fidelidad.
