  text: וְ/הָ/עָ֣ם אֲשֶׁר הֵ֣מָּה נִבְּאִ֣ים לָ/הֶ֡ם יִֽהְי֣וּ מֻשְׁלָכִים֩ בְּ/חֻצ֨וֹת יְרוּשָׁלִַ֜ם מִ/פְּנֵ֣י הָ/רָעָ֣ב וְ/הַ/חֶ֗רֶב וְ/אֵ֤ין מְקַבֵּר֙ לָ/הֵ֔מָּה הֵ֣מָּה נְשֵׁי/הֶ֔ם וּ/בְנֵי/הֶ֖ם וּ/בְנֹֽתֵי/הֶ֑ם וְ/שָׁפַכְתִּ֥י עֲלֵי/הֶ֖ם אֶת רָעָתָֽ/ם־׀־׃
