- from: No tengas envidia de los hombres malos[a][b], ni desees estar con ellos.
  to: No tengas envidia de los hombres malvados[a][b], ni desees estar con ellos.
  rationale: Se ajusta «hombres malos» a «hombres malvados» para reflejar con más precisión el valor moral de רָעָה y se corrige el formato de la nota b. Por lo demás, la estructura y el sentido del borrador son fieles al hebreo y al historial léxico del POB.
