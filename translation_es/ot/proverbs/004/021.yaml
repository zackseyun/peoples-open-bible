translation:
  language: es
  text: No dejes que se aparten de tus ojos[a]; guárdalos dentro de tu corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No dejes que se aparten de tu vista».'
    reason: lexical_alternative
  - marker: b
    text: '«Corazón» aquí se refiere al ser interior: el centro del pensamiento, la voluntad y los afectos en el uso hebreo.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל / יַלִּ֥יזוּ
  english_pob_choice: Do not let them depart
  chosen_spanish: No se aparten
  alternatives_spanish:
  - No dejes que se alejen
  - No se desvíen
  - No se aparten de tu vista
  lexicon: HALOT
  rationale: El hebreo expresa prohibición con la idea de apartarse/alejarse. En español, «No se aparten» conserva la imagen de movimiento fuera del foco de atención y sigue de cerca la fuerza del mandato sin sonar rígido. Opté por plural para concordar con el objeto implícito del contexto.
- source_word: מֵעֵינֶיךָ
  english_pob_choice: from your eyes
  chosen_spanish: de tus ojos
  alternatives_spanish:
  - de tu vista
  - fuera de tu vista
  - de delante de tus ojos
  lexicon: HALOT
  rationale: La imagen concreta del hebreo es «de tus ojos». Mantener «de tus ojos» preserva la metáfora visible y la correspondencia con el texto fuente; la nota cubre la lectura idiomática más natural en español.
- source_word: שָׁמְרֵם
  english_pob_choice: keep them
  chosen_spanish: guárdalos
  alternatives_spanish:
  - guárdalos cuidadosamente
  - cuida de ellos
  - protégelos
  lexicon: HALOT
  rationale: «שמר» puede abarcar guardar, vigilar o proteger. «Guárdalos» es una opción natural en español y mantiene la amplitud semántica sin restringirla a una sola idea como «proteger».
- source_word: בְּתוֹךְ
  english_pob_choice: within
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el interior de
  - dentro
  lexicon: HALOT
  rationale: «En medio de» refleja bien la construcción hebrea de interioridad/inmersión y suena natural en español bíblico contemporáneo. También conserva la idea de una ubicación interna, no solo mental.
- source_word: לְבָבֶךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu ser interior
  - tu mente
  lexicon: HALOT
  rationale: 'El hebreo «levav» designa el centro interior de la persona: pensamiento, voluntad y afecto. «Corazón» es la equivalencia bíblica estándar en español y conserva la imagen sin desglosarla en una paráfrasis.'
theological_decisions:
- issue: Sentido de «corazón» como centro interior y no solo emoción
  english_pob_reading: '''Heart'' here refers to the inner person—the seat of thought, will, and affection in Hebrew usage.'
  chosen_spanish_reading: '«Corazón» se entiende como el centro interior de la persona: pensamiento, voluntad y afecto.'
  alternative_spanish_readings:
  - «Corazón» como mera emoción
  - «Mente» como sustituto principal
  rationale: La nota inglesa aclara que el término hebreo no se limita a emociones. En español conviene preservar «corazón» y explicar su alcance antropológico bíblico para no reducirlo ni reemplazarlo por «mente», que estrecha demasiado el sentido.
  doctrine_reference: Antropología bíblica; uso semítico de לֵב/לֵבָב
- issue: Valor idiomático de «de tus ojos»
  english_pob_reading: Or 'Do not let them out of your sight.'
  chosen_spanish_reading: «de tus ojos» se conserva literalmente, con la posibilidad idiomática de entender «fuera de tu vista».
  alternative_spanish_readings:
  - «No los pierdas de vista»
  - «No los apartes de tu vista»
  rationale: El texto fuente usa una imagen concreta que el POB inglés preserva en el texto principal. En español, mantener «de tus ojos» respeta esa imagen; la alternativa idiomática queda implícita en la nota para orientar la lectura sin reemplazar el original.
  doctrine_reference: Retórica poética hebrea; preservación de la imagen textual
translation_notes:
  revision_awareness: El texto base inglés fue revisado sin cambios y el cotejo indica alta concordancia. Por eso la versión española sigue de cerca la estructura y las imágenes del hebreo, manteniendo la prohibición, la metáfora visual y la referencia al corazón como interioridad humana, sin ampliar innecesariamente el contenido.
  spanish_consistency_notes:
  - Se usa «corazón» para לֵבָב de forma consistente con la terminología bíblica española del proyecto.
  - Se conserva la imagen concreta de los ojos en el texto principal y se ofrece una alternativa idiomática en nota.
  - Se emplea «guárdalos» para שָׁמְרֵם, evitando reducir el matiz a una sola acción como «proteger».
  - La puntuación y el tono buscan ser publicables en español neutro y reverente.
