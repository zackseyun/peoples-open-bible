translation:
  language: es
  text: Aunque yo los entrené[a] y fortalecí sus brazos, maquinan el mal contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los discipliné», «los instruí» o «los castigué»; el verbo hebreo puede llevar un matiz correctivo o formativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסַּרְתִּי
  english_pob_choice: I trained
  chosen_spanish: yo los discipliné[a]
  alternatives_spanish:
  - yo los instruí
  - yo los corregí
  - yo los castigué
  lexicon: HALOT
  rationale: El verbo יסר puede expresar disciplinar, instruir, corregir o castigar. En el contexto inmediato de «fortalecí sus brazos», el español «discipliné» conserva la idea formativa/correctiva sin reducirla a castigo puro, y permite mantener la tensión documentada por la POB inglesa entre corrección y formación.
- source_word: חִזַּקְתִּי
  english_pob_choice: strengthened
  chosen_spanish: fortalecí
  alternatives_spanish:
  - fortifiqué
  - hice fuertes
  lexicon: HALOT
  rationale: El piel de חזק significa fortalecer o hacer fuerte. «Fortalecí» es natural en español y conserva la acción directa de Dios sobre sus brazos.
- source_word: זְרֹעוֹתָם
  english_pob_choice: their arms
  chosen_spanish: sus brazos
  alternatives_spanish:
  - sus fuerzas
  - sus brazos y fuerza
  lexicon: HALOT
  rationale: 'La imagen es corporal y concreta: literalmente «brazos». En español, «sus brazos» preserva la metáfora física que acompaña la idea de fortalecer.'
- source_word: וְאֵלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - hacia mí
  - para conmigo
  - respecto de mí
  lexicon: HALOT
  rationale: La construcción hebrea puede ser literalmente «a mí/hacia mí», pero con יְחַשְּׁבוּ רָע el sentido es hostil. «Contra mí» transmite bien esa fuerza adversativa en español.
- source_word: יְחַשְּׁבוּ רָע
  english_pob_choice: they devise evil
  chosen_spanish: piensan mal
  alternatives_spanish:
  - maquinan el mal
  - traman maldad
  - planean el mal
  lexicon: HALOT
  rationale: חשב con רע puede significar idear, planear o pensar. La POB inglesa eligió «devise evil» para captar la intención hostil sin forzar una acusación técnica de conspiración. En español, «piensan mal» conserva la idea de intención mala de forma breve y fiel; no obstante, se documentan alternativas más explícitas porque el hebreo admite el matiz de «maquinar/planear».
theological_decisions:
- issue: Valor de יִסַּרְתִּי en relación con la acción previa de Dios
  english_pob_reading: beneficent formative action ('I trained') rather than punitive chastisement in the main text
  chosen_spanish_reading: acción correctiva/formativa en el texto principal ('discipliné') sin convertirla en castigo severo
  alternative_spanish_readings:
  - los instruí
  - los corregí
  - los castigué
  rationale: El paralelismo con «fortalecí sus brazos» favorece una acción que prepara y capacita, no solo una punición. «Discipliné» deja abierta la gama semántica documentada por el hebreo y por la nota inglesa, sin perder la fuerza correctiva.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el paso de revisión más reciente marca el texto como sin cambios, con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se preserva el contraste concesivo con «Aunque» para reflejar la fuerza de וַאֲנִי en el contexto.
  - Se conserva la metáfora corporal de «brazos» para mantener la imagen concreta del hebreo.
  - «Contra mí» comunica la dirección hostil que en español no siempre quedaría clara con una traducción literal de «a mí».
  - Se usa «discipliné» en el cuerpo y se documenta la alternativa «instruí/corregí/castigué» en la nota para reflejar la tensión lexical del verbo יסר.
