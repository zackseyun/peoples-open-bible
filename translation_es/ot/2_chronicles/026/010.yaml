    issue: La nota [a] está anclada a «aljibes» pero explica una alternativa para «torres».
    rationale: Las notas deben aparecer en la palabra o frase pertinente. Aquí la alternativa «torres de vigilancia» corresponde a מִגְדָּלִים, no a בֹּרוֹת.
  - severity: medium
    issue: «La Sefela» en el texto principal no sigue la decisión principal auditada del POB.
    rationale: El inglés POB eligió un equivalente común («the lowland») y reservó la forma regional para nota. En español conviene mantener esa accesibilidad en el texto principal y explicar «Sefela» en nota.
  - severity: medium
    issue: «Amaba la tierra» debilita el matiz concreto de אֲדָמָה frente a la decisión auditada «he loved the soil».
    rationale: «Tierra» puede entenderse como territorio o tierra en sentido amplio; «suelo» o «la tierra de cultivo» preserva mejor la imagen agrícola concreta sin paráfrasis excesiva.
