  rationale: Revised 'give a voice' to the more natural 'utter a sound' for Latin dabit vocem; changed 'do not know' to 'have not known' to better reflect the perfect tense nouerunt; removed the added final 'its voice' and rendered simply 'it' for a more natural and sufficiently complete translation.
