lexical_decisions:
- source_word: וְהַפֶּרַח
  english_pob_choice: the flowers
  chosen_spanish: las flores
  alternatives_spanish:
  - la flor
  - el adorno floral
  - las flores ornamentales
  lexicon: HALOT
  rationale: פֶּרַח nombra literalmente una flor o floración. En este inventario del mobiliario del templo, el plural español resulta natural para coordinar con los demás elementos listados y conserva el valor ornamental del término sin sobreexplicar.
- source_word: וְהַנֵּרוֹת
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las luces
  - los candeleros
  lexicon: HALOT
  rationale: נֵרוֹת designa lámparas o luces. 'Lámparas' es el equivalente más transparente y estable en español para este contexto cultual; evita ambigüedad y no impone un tecnicismo innecesario.
- source_word: וְהַמֶּלְקַחַיִם
  english_pob_choice: the tongs
  chosen_spanish: las tenazas
  alternatives_spanish:
  - los apagavelas
  - las pinzas para mechas
  - las pinzas
  lexicon: HALOT
  rationale: מֶלְקַחַיִם es un utensilio para tomar o manipular mechas o brasas. 'Tenazas' comunica bien el instrumento en español general; la función más específica queda implícita por el contexto, como en el inglés POB con la nota lexical.
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - de oro puro
  lexicon: HALOT
  rationale: La primera ocurrencia califica directamente los objetos. 'De oro' es la formulación natural en español para una lista de materiales y sigue de cerca la sintaxis del hebreo.
- source_word: מִכְלוֹת זָהָב
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro completamente trabajado
  - oro perfecto
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y difícil; no afirma un superlativo sino una cualidad de oro completo, acabado o refinado. 'Oro puro' comunica bien esa idea en español sin exagerar el grado.
theological_decisions:
- issue: Valor idiomático de מִכְלוֹת זָהָב
  english_pob_reading: The phrase likely indicates fully refined or perfectly finished gold; revised from 'purest gold' to 'pure gold' for lexical accuracy.
  chosen_spanish_reading: oro puro
  alternative_spanish_readings:
  - oro refinado
  - oro completo
  - oro perfectamente acabado
  rationale: 'La decisión mantiene la cautela del último ajuste editorial en inglés: no convertir la frase en un superlativo. ''Oro puro'' deja abierto el sentido de refinado/completado, que encaja con el contexto de objetos del templo hechos con esmero.'
  doctrine_reference: Inventario del templo; precisión léxica, no una afirmación doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió 'purest gold' a 'pure gold' por mayor cercanía al hebreo, así como la nota que entiende מִכְלוֹת זָהָב como un modismo de oro refinado o acabado. La versión española evita un superlativo y conserva la tensión léxica con una frase breve y publicable.
  spanish_consistency_notes:
  - Se mantiene 'oro' para זָהָב conforme al uso normal bíblico y litúrgico en español.
  - Se eligió 'tenazas' como término amplio y claro, reservando la especificación funcional para la nota.
  - El orden de la frase sigue la secuencia nominal del hebreo sin añadir verbos innecesarios.
  - La puntuación con punto y coma ayuda a reflejar la cláusula final idiomática sin cargarla de explicación en el cuerpo del texto.
