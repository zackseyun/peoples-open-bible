translation:
  language: es
  text: Dios no es hombre, para que mienta, ni hijo de hombre[b], para que cambie de parecer[a]. ¿Acaso ha dicho, y no lo hará? ¿O ha hablado, y no lo hará quedar firme[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ceder’; tradicionalmente, ‘arrepentirse’. El verbo hebreo puede denotar cambiar de rumbo o desistir, pero aquí habla de la confiabilidad de Dios, no de arrepentimiento moral.
    reason: lexical_alternative
  - marker: b
    text: ‘Hijo de hombre’ aquí es un modismo hebreo para un ser humano, no un título mesiánico.
    reason: cultural_note
  - marker: c
    text: O ‘cumplirlo’ o ‘confirmarlo’. El hebreo literalmente significa ‘hacerlo estar en pie’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - el Dios
  lexicon: HALOT
  rationale: En este contraste con ‘hombre’, אֵל se refiere al Dios de Israel. ‘Dios’ es la equivalencia natural en español y conserva el sentido teológico del pasaje.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - persona
  lexicon: HALOT
  rationale: ‘Hombre’ mantiene el contraste directo con Dios y refleja con fuerza el término masculino/antropológico del hebreo en esta formulación poética.
- source_word: וִיכַזֵּב
  english_pob_choice: that he should lie
  chosen_spanish: para que mienta
  alternatives_spanish:
  - para que diga mentira
  - para que sea falso
  lexicon: HALOT
  rationale: El verbo כזב expresa mentir o resultar falso. ‘Para que mienta’ reproduce bien el valor idiomático y el paralelo con la confiabilidad divina.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - hijo de אדם
  lexicon: HALOT
  rationale: Se conserva la forma hebrea literal para mantener el paralelismo poético con ‘hombre’. En este contexto no es título mesiánico, sino un modismo para un ser humano.
- source_word: וְיִתְנֶחָם
  english_pob_choice: that he should change his mind
  chosen_spanish: para que cambie de parecer
  alternatives_spanish:
  - para que se arrepienta
  - para que se retracte
  - para que se rinda
  lexicon: HALOT
  rationale: El hitpael de נחם aquí expresa relentar o cambiar de intención. ‘Cambie de parecer’ comunica esa idea con naturalidad en español y evita la carga moral de ‘arrepentirse’ aplicada a Dios.
- source_word: הַהוּא אָמַר
  english_pob_choice: Has he said
  chosen_spanish: ¿Acaso ha dicho?
  alternatives_spanish:
  - ¿Ha dicho?
  - ¿Dijo?
  lexicon: HALOT
  rationale: La forma retórica hebrea se vierte como pregunta natural en español, conservando el tono de desafío sobre la firmeza de la palabra divina.
- source_word: יַעֲשֶׂה
  english_pob_choice: will he not do it
  chosen_spanish: no lo hará
  alternatives_spanish:
  - no lo hará él
  - no actuará así
  lexicon: HALOT
  rationale: ‘Hará’ funciona como equivalente directo de עשה en el contexto de cumplir lo dicho. ‘Lo’ recupera el objeto implícito de la palabra pronunciada.
- source_word: וְדִבֶּר
  english_pob_choice: has he spoken
  chosen_spanish: ¿O ha hablado?
  alternatives_spanish:
  - ¿O ha dicho?
  - ¿O ha declarado?
  lexicon: HALOT
  rationale: ‘Hablado’ conserva el paralelo con ‘ha dicho’ y refleja el verbo דבר en el ámbito de pronunciar una palabra o promesa.
- source_word: יְקִימֶנָּה
  english_pob_choice: will he not establish it
  chosen_spanish: no lo hará quedar firme
  alternatives_spanish:
  - no lo establecerá
  - no lo confirmará
  - no lo hará permanecer
  lexicon: HALOT
  rationale: El hiphil de קום significa hacer estar en pie, establecer o confirmar. ‘Hacer quedar firme’ conserva la imagen concreta de poner la palabra en pie y expresa bien la idea de cumplimiento.
theological_decisions:
- issue: Cómo verter וְיִתְנֶחָם aplicado a Dios
  english_pob_reading: change his mind
  chosen_spanish_reading: cambie de parecer
  alternative_spanish_readings:
  - se arrepienta
  - se retracte
  - cambie de mente
  rationale: El texto subraya la confiabilidad de Dios, no una pretensión de arrepentimiento moral. ‘Cambie de parecer’ preserva la tensión bíblica sin imponer un matiz filosófico ajeno al pasaje.
  doctrine_reference: Divine reliability / immutability language
- issue: Si בן אדם debe leerse como título mesiánico
  english_pob_reading: ordinary idiom 'son of man' meaning a human being
  chosen_spanish_reading: hijo de hombre como modismo para un ser humano
  alternative_spanish_readings:
  - Hijo del hombre como título
  - ser humano
  rationale: En Números 23:19 la expresión es paralela a ‘hombre’ y no introduce un título mesiánico. Mantener la forma literal ayuda a preservar la poesía y evita una lectura cristológica indebida.
  doctrine_reference: Original-language primacy; avoid importing later title usage
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la paralelidad retórica, conserva ‘hijo de hombre’ para la forma idiomática hebrea, y evita traducir mecánicamente ‘repent’ por ‘arrepentirse’ en Dios sin nota explicativa. No se registraron revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ y no ‘SEÑOR’ porque el hebreo aquí dice אֵל, no el tetragrámaton.
  - ‘Cambie de parecer’ se eligió como español natural para el cambio de intención/relentimiento divino; la nota preserva la alternativa tradicional.
  - ‘No lo hará quedar firme’ intenta conservar la imagen de קום (‘hacer estar en pie’) mejor que una paráfrasis genérica.
  - Se mantienen los marcadores [a], [b] y [c] exactamente donde corresponden en el texto para sostener la trazabilidad editorial.
