base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/029.yaml
  text: And when they had finished offering[b][a], the king and all who were present with him knelt down and worshiped.
  footnotes:
  - marker: a
    text: Hebrew literally, 'when they finished offering up'; in this sacrificial context the sense is the completion of presenting the burnt offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'bowed down' / 'prostrated themselves.' The Hebrew verb can denote the physical act of bowing in reverence; here it is rendered 'worshiped' because of the temple-sacrifice context.
    reason: alternative_reading
