base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/033.yaml
  text: 'Therefore thus says Yahweh concerning the king of Assyria: He will not come into this city[a], or shoot an arrow there, or come before it with a shield[b], or heap up a siege ramp against it.'
  footnotes:
  - marker: a
    text: Or 'advance against it with a shield.' The Hebrew expression pictures assault preparations in siege warfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'build up an embankment against it.' The Hebrew literally says 'pour out a siege mound/ramp against it.'
    reason: lexical_alternative
