translation:
  language: es
  text: para que mi gloria te cante alabanzas[a] y no calle. Yahvé, Dios mío, para siempre te daré gracias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "mi ser entero te cante alabanzas". Hebreo: "mi gloria", una expresión poética que puede referirse al yo interior o a la lengua del salmista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - con el fin de que
  - a fin de que
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor de propósito/resulto del hebreo sin perder la relación causal-final.
- source_word: יְזַמֶּרְךָ
  english_pob_choice: may sing praise to you
  chosen_spanish: te cante
  alternatives_spanish:
  - te cante alabanzas
  - te haga música
  lexicon: HALOT
  rationale: El verbo piel de זמר puede implicar cantar alabanzas o hacer música; en español, 'te cante' es breve y natural, y el contexto de alabanza queda reforzado por la estructura poética.
- source_word: כָבוֹד
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi ser entero
  - mi alma
  - mi lengua
  lexicon: HALOT
  rationale: Se conserva el giro literal y poético 'mi gloria', manteniendo la tensión interpretativa del hebreo sin resolverla de forma interpretativa en el texto principal.
- source_word: וְלֹא יִדֹּם
  english_pob_choice: and not be silent
  chosen_spanish: y no calle
  alternatives_spanish:
  - y no esté en silencio
  - y no guarde silencio
  lexicon: HALOT
  rationale: El contraste con 'cantar' favorece el sentido de silencio; 'callar' es una forma natural y fiel en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio divino sin sustituirlo por un título.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: La forma posesiva vocativa se expresa de modo idiomático en español con 'Dios mío'.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: En un contexto de alabanza continua, 'para siempre' comunica bien la duración indefinida de forma natural.
- source_word: אוֹדֶךָּ
  english_pob_choice: I will give thanks to you
  chosen_spanish: te daré gracias
  alternatives_spanish:
  - te agradeceré
  - te alabaré
  lexicon: HALOT
  rationale: El hifil de ידה en este contexto es acción de gracias; 'dar gracias' preserva ese valor mejor que 'alabar'.
theological_decisions:
- issue: Sentido de כָבוֹד como sujeto de la alabanza
  english_pob_reading: Retain the literal metaphor 'my glory' in the main text
  chosen_spanish_reading: Conservar 'mi gloria' como metáfora literal
  alternative_spanish_readings:
  - mi alma
  - mi ser entero
  - mi lengua
  rationale: La metáfora es ambigua y poética; mantenerla en el texto principal respeta la primacía del hebreo y evita decidir por una glosa interpretativa sin necesidad.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se aplica el valor acordado para el nombre divino en la traducción española del proyecto, preservando el nombre propio del pacto.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión en español corrige el problema de validación anterior al anclar la nota [a] directamente en 'mi gloria' dentro del texto. Se mantiene la lectura literal principal y la alternativa explicativa queda en la nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se conservó 'mi gloria' como metáfora poética, no como glosa interpretativa en el cuerpo principal.
  - Se tradujo el cierre con una forma idiomática de agradecimiento ('te daré gracias') acorde con el contexto salmódico.
  - No se introdujeron marcas de nota sin anclaje en el texto principal.
