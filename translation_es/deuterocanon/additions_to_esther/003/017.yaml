lexical_decisions:
- source_word: ἀνθʼ ὧν
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por lo cual
  - puesto que
  lexicon: LSJ
  rationale: En este contexto confesional, la construcción expresa la causa o fundamento de la declaración siguiente. «Porque» comunica esa relación causal de forma natural y fiel al sentido del griego.
- source_word: ἐδοξάσαμεν
  english_pob_choice: we glorified
  chosen_spanish: glorificamos
  alternatives_spanish:
  - dimos gloria a
  - honramos
  lexicon: BDAG
  rationale: δοξάζω aquí tiene el valor de atribuir gloria u honor. «Glorificamos» sigue de cerca la elección inglesa revisada y conserva el paralelismo verbal sin introducir una paráfrasis más libre.
- source_word: τοὺς θεοὺς αὐτῶν
  english_pob_choice: their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - a los dioses de ellos
  - a sus deidades
  lexicon: LSJ
  rationale: El plural posesivo es directo; en español, el complemento con «a» preserva el régimen verbal de «glorificar» y mantiene el contraste polémico con Yahvé.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: BDAG
  rationale: Aunque «justo» y «righteous» son ambos posibles, «justo» es el equivalente natural y digno en español para el predicado divino en esta confesión. Conserva el sentido judicial y moral sin perder la tensión teológica.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Maestro
  lexicon: BDAG
  rationale: La vocativa κύριε se dirige a Dios; «Señor» es el equivalente establecido en español para este uso litúrgico y mantiene la relación de oración.
theological_decisions:
- issue: Predicado divino δίκαιος aplicado a Dios
  english_pob_reading: righteous
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - justo en sentido judicial
  rationale: El inglés POB preserva la ambigüedad útil entre rectitud moral y justicia judicial. En español, «justo» mantiene ambas resonancias y es más idiomático que forzar una forma técnica.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη family terms may require context-sensitive rendering; preserve alternatives in footnotes where significant.'
- issue: Vocativo κύριε dirigido al Dios de Israel
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  rationale: En este contexto de súplica/confesión, κύριε no es un título social sino una invocación divina. «Señor» es el registro normal y reverente en español.
  doctrine_reference: 'DOCTRINE.md contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que pasó de «gave glory to» a «glorified» para reflejar con mayor naturalidad ἐδοξάσαμεν. En español, «glorificamos» conserva esa actualización y la relación causal introducida por ἀνθʼ ὧν.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε conforme al patrón del proyecto para el vocativo divino.
  - Se mantiene «glorificamos» para ἐδοξάσαμεν, evitando una paráfrasis más interpretativa.
  - Se conserva la tensión entre «justo» y posibles alternativas judiciales en nota, sin borrar la ambigüedad del griego.
