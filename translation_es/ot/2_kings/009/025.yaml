base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/025.yaml
  text: 'Then he said to Bidkar his officer[a], “Lift him up and throw him onto the plot of the field of Naboth the Jezreelite[c][b], for remember: you and I were riding side by side behind Ahab his father when Yahweh laid this pronouncement against him.”'
  footnotes:
  - marker: a
    text: Or 'his third man,' possibly a technical designation for Bidkar’s rank or position.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'riding pairs'; the phrase likely means Jehu and Bidkar were riding together behind Ahab.
    reason: lexical_alternative
  - marker: c
    text: Or 'oracle' or 'burden.' The Hebrew term refers to a weighty prophetic pronouncement.
    reason: lexical_alternative
