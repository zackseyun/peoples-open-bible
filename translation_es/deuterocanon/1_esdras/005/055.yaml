translation:
  language: es
  text: Y echaron los cimientos del templo de Dios en la luna nueva del segundo mes[a], en el segundo año, después que habían venido a Judea y Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'templo de Dios'. El griego usa el término habitual para el santuario/templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεμελίωσαν
  english_pob_choice: laid the foundation
  chosen_spanish: echaron los cimientos
  alternatives_spanish:
  - pusieron los cimientos
  - fundaron
  lexicon: LSJ
  rationale: El verbo expresa la acción de poner cimientos; en español, 'echar los cimientos' es idiomático, claro y conserva el sentido constructivo del griego sin volverlo abstracto con 'fundaron'.
- source_word: τὸν ναὸν τοῦ θεοῦ
  english_pob_choice: the temple of God
  chosen_spanish: el templo de Dios
  alternatives_spanish:
  - la casa de Dios
  lexicon: LSJ
  rationale: Aunque 'ναός' puede traducirse como 'templo' o, en ciertos contextos, 'casa', el propio audit trail inglés revisado optó por 'temple of God' para mayor precisión. En español, 'templo de Dios' reproduce con fidelidad el sustantivo sagrado sin perder naturalidad.
- source_word: τῇ νουμηνίᾳ
  english_pob_choice: on the new moon
  chosen_spanish: en la luna nueva
  alternatives_spanish:
  - el día de la luna nueva
  - en la neomenia
  lexicon: LSJ
  rationale: '''νουμηνία'' nombra la luna nueva como marcador calendárico-religioso. ''En la luna nueva'' es natural en español y mantiene el valor temporal/cúltico del término.'
- source_word: τοῦ δευτέρου μηνὸς
  english_pob_choice: of the second month
  chosen_spanish: del segundo mes
  alternatives_spanish:
  - en el segundo mes
  lexicon: LSJ
  rationale: La construcción posesiva española expresa bien el genitivo griego y se integra con la fecha anterior.
- source_word: τοῦ δευτέρου ἔτους
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - del segundo año
  lexicon: LSJ
  rationale: '''En el segundo año'' conserva la fórmula cronológica directa y es la opción más natural en español.'
- source_word: ἐν τῷ ἐλθεῖν
  english_pob_choice: after they had come
  chosen_spanish: después que habían venido
  alternatives_spanish:
  - cuando vinieron
  - al venir
  lexicon: LSJ
  rationale: El infinitivo articular con ἐν funciona temporalmente. 'Después que habían venido' refleja la relación temporal ya establecida en el contexto y suena natural en español.
- source_word: εἰς τὴν Ἰουδαίαν καὶ Ἰερουσαλήμ
  english_pob_choice: into Judea and Jerusalem
  chosen_spanish: a Judea y Jerusalén
  alternatives_spanish:
  - a la Judea y Jerusalén
  - hacia Judea y Jerusalén
  lexicon: LSJ
  rationale: En español, con verbos de movimiento, 'a' funciona de manera natural para destino; evita la aspereza de 'en' y preserva el movimiento hacia el lugar nombrado. Se conserva el doble destino geográfico sin añadir matices no presentes.
theological_decisions:
- issue: ναός en un contexto de reconstrucción del templo
  english_pob_reading: temple of God
  chosen_spanish_reading: templo de Dios
  alternative_spanish_readings:
  - casa de Dios
  rationale: La decisión mantiene la precisión cultual del griego y sigue la revisión inglesa más reciente. No se introduce una lectura eclesiástica ni se atenúa el referente arquitectónico del pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: He tenido en cuenta la revisión inglesa más reciente, que corrigió 'house of God' a 'temple of God' por mayor precisión para ναός. La redacción española sigue esa decisión y evita una paráfrasis más amplia que pudiera diluir el énfasis en la construcción del templo.
  spanish_consistency_notes:
  - He usado 'templo de Dios' para mantener la correspondencia con la revisión inglesa final.
  - '''Luna nueva'' traduce el valor calendárico de νουμηνία sin recurrir a una transliteración innecesaria.'
  - He preferido 'a Judea y Jerusalén' por fluidez española; el sentido direccional de εἰς queda preservado.
  - El orden temporal 'en el segundo año, después que habían venido...' reproduce la secuencia del griego sin sobreexplicarla.
