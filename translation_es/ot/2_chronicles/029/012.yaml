translation:
  language: es
  text: 'Entonces se levantaron los levitas: Mahat hijo de Amasai y Joel hijo de Azarías[a], de los hijos de Coat; y de los hijos de Merari, Quis hijo de Abdi y Azarías hijo de Jehallelel; y de los gersonitas[b], Joac hijo de Zimma y Eden hijo de Joac.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «de los hijos de Coat ... y de los hijos de Merari». Esta redacción genealógica identifica a los hombres nombrados como representantes de esos clanes levíticos.'
    reason: cultural_note
  - marker: b
    text: 'O: «de los hijos de Gersón». El hebreo emplea aquí una designación de clan en forma colectiva, en vez de repetir exactamente la fórmula anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - aparecieron
  lexicon: HALOT
  rationale: El verbo קום en esta secuencia narrativa marca el inicio de la acción en respuesta a la orden del rey. En español, «se levantaron» comunica con naturalidad ese comienzo de acción sin perder el matiz formal del hebreo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  - los hombres levitas
  lexicon: HALOT
  rationale: Es el designativo tribal/clánico estándar. «Los levitas» es claro, natural y fiel al referente colectivo.
- source_word: מִן בְּנֵי הַקְּהָתִי
  english_pob_choice: from the sons of the Kohathites
  chosen_spanish: de los hijos de los coatitas
  alternatives_spanish:
  - de entre los coatitas
  - de los descendientes de Coat
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica literal «hijos de», porque el texto identifica a estos hombres como representantes del clan. «Coatitas» refleja el nombre del grupo y mantiene la estructura del hebreo.
- source_word: וּמִן בְּנֵי מְרָרִי
  english_pob_choice: and from the sons of Merari
  chosen_spanish: y de los hijos de Merari
  alternatives_spanish:
  - y de los meraritas
  - y de entre los descendientes de Merari
  lexicon: HALOT
  rationale: La repetición de la fórmula genealógica se conserva para respetar la estructura del pasaje. «Hijos de Merari» mantiene la correspondencia formal con el hebreo.
- source_word: וּמִן הַגֵּרְשֻׁנִּי
  english_pob_choice: and from the Gershonites
  chosen_spanish: y de los gersonitas
  alternatives_spanish:
  - y de los hijos de Gersón
  - y del clan gersonita
  lexicon: HALOT
  rationale: Aquí el hebreo usa una designación colectiva gentilicia. «Gersonitas» es la forma más idiomática en español y preserva el valor de clan.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una lista genealógica, «hijo de» es la traducción directa y transparente. No hay necesidad de ampliar a «descendiente de».
- source_word: מַחַת; עֲמָשַׂי; יוֹאֵל; עֲזַרְיָהוּ; קִישׁ; עַבְדִּי; יְהַלֶּלְאֵל; יוֹאָח; זִמָּה; עֵדֶן
  english_pob_choice: Mahath; Amasai; Joel; Azariah; Kish; Abdi; Jehallelel; Joah; Zimmah; Eden
  chosen_spanish: Mahat; Amasai; Joel; Azarías; Quis; Abdi; Jehallelel; Joac; Zimma; Eden
  alternatives_spanish:
  - Mahat; Amasay; Yoel; Azarías; Quis; Abdi; Yejallelel; Joac; Zimá; Edén
  lexicon: HALOT
  rationale: Los nombres propios se transliteran al español siguiendo formas habituales y legibles. «Azarías» y «Joac» reflejan con naturalidad las formas tradicionales españolas de esos nombres, sin alterar la identidad del referente.
theological_decisions:
- issue: Clanes levíticos expresados con la fórmula genealógica «hijos de»
  english_pob_reading: The Hebrew literally says 'from the sons of the Kohathites ... from the sons of Merari.' This genealogical wording identifies the named men as representatives of those Levitical clans.
  chosen_spanish_reading: «de los hijos de los coatitas ... y de los hijos de Merari» conserva que los nombres representan a esos clanes levíticos.
  alternative_spanish_readings:
  - «de los coatitas ... y de los meraritas»
  - «de entre los coatitas ... y de entre los meraritas»
  rationale: No se suaviza la genealogía a una etiqueta genérica, porque el texto funciona precisamente como identificación clanica de los levitas nombrados. La fórmula conserva el valor documental del pasaje.
  doctrine_reference: Números 3:17-37; 1 Crónicas 6:1-81
- issue: Designación colectiva de los gersonitas
  english_pob_reading: Or, 'from the sons of Gershon.' The Hebrew uses a clan designation here rather than repeating the exact earlier formula.
  chosen_spanish_reading: «de los gersonitas» refleja la designación colectiva del hebreo sin forzar la repetición de «hijos de Gersón».
  alternative_spanish_readings:
  - «de los hijos de Gersón»
  - «del clan gersonita»
  rationale: El hebreo cambia de fórmula y usa un gentilicio colectivo. En español conviene reflejar ese cambio, pero sin perder la referencia al mismo grupo levítico.
  doctrine_reference: Números 3:21-26; 1 Crónicas 23:7-11
translation_notes:
  revision_awareness: 'El texto base y la auditoría inglesa no muestran revisiones sustantivas: el pasaje fue retenido con alta concordancia y sin cambios en la revisión más reciente. La versión española sigue esa estabilidad, manteniendo la estructura genealógica y los nombres propios sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no está presente.
  - Se usa «hijos de» en fórmulas genealógicas por fidelidad estructural, con nota explicativa donde la forma puede sonar redundante en español.
  - «coatitas», «meraritas» y «gersonitas» funcionan como gentilicios/clan designations coherentes y legibles en español bíblico moderno.
  - Los nombres propios siguen transliteración española estándar, evitando traducciones o adaptaciones innecesarias.
