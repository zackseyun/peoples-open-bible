review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: valoración general (''טוֹב''), espera esperanzada (''יָחִיל''), silencio/quietud (''דוּמָם''), objeto de la espera (''לִתְשׁוּעַת''), y el nombre divino ''Yahvé''. También preserva correctamente la nota alternativa sobre ''esperar/esperanza'' y ''en silencio/calladamente''.'
  spanish_quality_summary: 'La redacción es comprensible y digna, pero ''Bueno es esperar en silencio...'' suena algo invertida y menos natural en español contemporáneo que ''Es bueno esperar en silencio...''. Además, conviene mantener la preposición explícita ''por'' para reflejar mejor לְ con el objeto esperado: ''esperar en silencio por la salvación de Yahvé'' resulta más claro y fiel. La nota al pie es adecuada y legible.'
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה se vierte como ''Yahvé'', no ''SEÑOR''; תְּשׁוּעָה como ''salvación'' conserva la resonancia teológica; יָחִיל como ''esperar'' es apropiado, con la alternativa de matiz esperanzado preservada en nota. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: Orden marcado 'Bueno es'
    rationale: Aunque posible, suena más literario-invertido que natural en español eclesial moderno. 'Es bueno' preserva igual de bien el predicado hebreo y mejora la fluidez.
  - severity: medium
    issue: Falta de preposición explícita antes del objeto esperado
    rationale: El hebreo לִתְשׁוּעַת expresa el objetivo de la espera. En español, 'esperar la salvación' puede entenderse también como expectativa más directa del evento, pero 'esperar por la salvación' refleja mejor la orientación de la espera sin sobreinterpretar.
  revised_spanish_text: Es bueno esperar en silencio por la salvación de Yahvé[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Es bueno esperar con esperanza y callar»; el verbo hebreo puede expresar una espera confiada, y «en silencio» también puede entenderse como «calladamente».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden a un español más natural ('Es bueno'), se hace explícita la relación final con 'por la salvación', y se conserva la nota léxica alternativa con estilo pulido y plenamente alineado con el hebreo y la convención del proyecto.
