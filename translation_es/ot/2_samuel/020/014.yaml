translation:
  language: es
  text: Pasó por todas las tribus de Israel hasta Abela y Bet-maacá, y todos los beritas[a] se reunieron y también lo siguieron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todos los beritas». Algunas traducciones leen «todos los bichritas», relacionándolo con Seba hijo de Bicri por el contexto; el texto masorético favorece más directamente «beritas».'
    reason: alternative_reading
  - marker: b
    text: 'O: «y ellos también vinieron tras él». El hebreo permite una traducción más literal de la expresión idiomática, aunque «lo siguieron» comunica mejor el sentido en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: He passed through
  chosen_spanish: Pasó por
  alternatives_spanish:
  - Fue por
  - Atravesó
  lexicon: HALOT
  rationale: עבר en esta forma narrativa expresa desplazamiento a través de un territorio; en español, «pasó por» comunica con naturalidad ese recorrido sin añadir matices no presentes en el hebreo.
- source_word: בְּכָל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: through all the tribes of Israel
  chosen_spanish: por todas las tribus de Israel
  alternatives_spanish:
  - entre todas las tribus de Israel
  - a través de todas las tribus de Israel
  lexicon: HALOT
  rationale: La preposición ב aquí tiene valor locativo/distributivo en contexto. «Por todas las tribus de Israel» mantiene la idea de tránsito por el ámbito tribal sin forzar una calca.
- source_word: אָבֵלָה
  english_pob_choice: to Abel
  chosen_spanish: Abela
  alternatives_spanish:
  - Abel
  - Abelá
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia el lugar. En español, la forma toponímica «Abela» es clara y mantiene la referencia geográfica; «Abel» puede confundirse con el nombre personal.
- source_word: וּבֵית מַעֲכָה
  english_pob_choice: and Beth-maacah
  chosen_spanish: Beth-maacah
  alternatives_spanish:
  - Bet-maacá
  - la casa de Maacá
  lexicon: HALOT
  rationale: Aquí funciona como topónimo. Se conserva la forma compuesta tradicional del lugar, pero sin convertirla en una explicación literal que el contexto no exige.
- source_word: וְכָל הַבֵּרִים
  english_pob_choice: and all the Berites
  chosen_spanish: todos los beritas
  alternatives_spanish:
  - todos los bichritas
  - todos los habitantes de Berim
  lexicon: HALOT
  rationale: La consonancia masorética apunta a un designativo étnico/plural («Berites»). En español, «beritas» preserva esa transparencia y evita resolver indebidamente la incertidumbre textual.
- source_word: וַיִּקָּהֲלוּ
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El verbo קהל indica reunirse/convocarse. «Se reunieron» es natural en español y conserva el sentido de agrupación colectiva.
- source_word: וַיָּבֹאוּ אַף אַחֲרָיו
  english_pob_choice: and also followed after him
  chosen_spanish: y también lo siguieron
  alternatives_spanish:
  - y también vinieron tras él
  - y también fueron tras él
  lexicon: HALOT
  rationale: La secuencia idiomática expresa seguir a alguien, no solo llegar detrás de él. «Lo siguieron» transmite el valor de acción continuada; «también» rinde אַף.
translation_notes:
  revision_awareness: 'Se conservó el resultado del control más reciente (sin cambios) y se siguió la misma decisión principal del POB en inglés: lectura masorética de «Berites», con nota de alternativa textual tradicional; además, se mantuvo el valor idiomático de אַף אַחֲרָיו mediante una nota de alternativa literal en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; este versículo no lo contiene.
  - Se mantuvo una transliteración controlada de topónimos para evitar fusionar «Abela» con «Beth-maacah».
  - «Beritas» conserva la incertidumbre textual del hebreo y no normaliza la lectura hacia «bichritas».
  - Se eligió un español sobrio y bíblico de registro medio, evitando calcos demasiado rígidos.
