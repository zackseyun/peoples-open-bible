translation:
  language: es
  text: ¿Quién declara su camino[a] en su presencia? Y por lo que ha hecho[b], ¿quién le retribuye?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a su cara»; literalmente, «sobre su rostro», un modismo de confrontación directa.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es breve: «y él hizo; ¿quién le retribuye?». La traducción explicita el sentido probable: «por lo que ha hecho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - Nadie
  lexicon: HALOT
  rationale: El hebreo presenta una pregunta retórica con valor negativo implícito; en español conviene conservar la forma interrogativa '¿Quién?' en vez de convertirla en una negación explícita.
- source_word: יַגִּיד
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - da a conocer
  - anuncia
  lexicon: HALOT
  rationale: El verbo הִגִּיד expresa 'decir/declarar/hacer saber'. 'Declara' conserva un tono formal y público, acorde con el desafío del contexto.
- source_word: עַל פָּנָיו
  english_pob_choice: to his face
  chosen_spanish: ante su rostro
  alternatives_spanish:
  - en su presencia
  - cara a cara
  - ante él
  lexicon: HALOT
  rationale: La imagen literal es 'sobre su rostro'; en español 'ante su rostro' mantiene la fuerza de confrontación directa sin sonar forzado. También deja visible el hebraísmo sin perder claridad.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su conducta
  - su proceder
  - su conducta de vida
  lexicon: HALOT
  rationale: '''Camino'' preserva la metáfora hebrea de conducta o curso de vida, y en español es natural y fiel al campo semántico de דֶּרֶךְ.'
- source_word: וְהוּא עָשָׂה
  english_pob_choice: for what he has done
  chosen_spanish: por lo que ha hecho
  alternatives_spanish:
  - y por lo que hizo
  - por lo que él ha hecho
  - y lo que ha hecho
  lexicon: HALOT
  rationale: El hebreo es elíptico; la adición de 'por' explicita el vínculo retributivo que el contexto exige. Se conserva el contenido mínimo sin sobreparafrasear.
- source_word: יְשַׁלֶּם לוֹ
  english_pob_choice: repays him
  chosen_spanish: ¿quién le paga?
  alternatives_spanish:
  - ¿quién le recompensa?
  - ¿quién le retribuye?
  - ¿quién le paga de vuelta?
  lexicon: HALOT
  rationale: שׁלם en piel puede significar pagar/retribuir/repagar. 'Le paga' es breve y natural en español, y puede abarcar la idea de pago-recompensa presente en el verbo.
translation_notes:
  revision_awareness: 'El texto inglés audita una solución equivalente-óptima con dos aclaraciones: el modismo de ''upon his face'' y la elipsis de ''and he has done''. La versión española sigue esas mismas decisiones, conservando el interrogativo retórico y la fuerza retributiva del cierre.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo interrogativo del hebreo con dos preguntas retóricas.
  - '''Camino'' y ''declara'' conservan el registro formal del original sin introducir vocabulario eclesiástico ajeno.'
  - La elipsis hebrea se resolvió con 'por lo que ha hecho', como explicitación mínima necesaria para la coherencia sintáctica en español.
  - '''Le paga'' se eligió por su amplitud semántica y porque no exige elegir de antemano entre pagar, retribuir o recompensar.'
