- from: El hombre de ira[a] carga con la pena; porque, si lo libras, tendrás que hacerlo de nuevo.
  to: El hombre iracundo carga con el castigo[a]; pues si lo libras, tendrás que hacerlo de nuevo.
  rationale: Se ajusta el sintagma caracterizador para un español más natural y fiel al sentido proverbial, se aclara עֹנֶשׁ con «castigo», y se suaviza la conexión causal-condicional. Se conserva la nota que documenta la alternativa más literal del hebreo.
