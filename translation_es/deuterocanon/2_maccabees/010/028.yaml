translation:
  language: es
  text: Adiós[a]. Que sea como deseamos[b]; y nosotros mismos también estamos bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa literalmente lenguaje de salud/fuerza en esta despedida: algo como «estén fuertes/bien ... y nosotros también estamos sanos». «Adiós» refleja mejor en español la fuerza idiomática de la valedicción epistolar.'
    reason: lexical_alternative
  - marker: b
    text: Este versículo parece ser una fórmula de cierre epistolar y, en muchas divisiones modernas, no continúa narrativamente con el contexto circundante; aun así, la redacción griega misma se traduce tal como está.
    reason: cultural_note
lexical_decisions:
- source_word: ἔρρωσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Salud!
  alternatives_spanish:
  - ¡Adiós!
  - ¡Paz!
  - ¡Fortaleza!
  lexicon: LSJ
  rationale: El griego usa una fórmula epistolar de despedida basada en la idea de salud/fuerza. En español, «¡Salud!» conserva ese campo semántico y funciona de manera natural como despedida breve sin borrar el matiz literal.
- source_word: εἰη ἂν
  english_pob_choice: May it be
  chosen_spanish: Que sea
  alternatives_spanish:
  - Que así sea
  - Ojalá sea
  - Sea así
  lexicon: LSJ
  rationale: La forma optativa expresa deseo o eventualidad. «Que sea» transmite bien ese valor desiderativo en español, de forma sobria y fiel.
- source_word: ὡς βούλομεθα
  english_pob_choice: as we would wish
  chosen_spanish: como deseamos
  alternatives_spanish:
  - como quisiéramos
  - como querríamos
  - como lo queremos
  lexicon: LSJ
  rationale: βούλομαι expresa querer, desear o querer que algo ocurra. «Como deseamos» preserva el sentido volitivo con un español natural; «quisiéramos» sería posible, pero aquí el presente del deseo encaja con la fórmula de cierre.
- source_word: καὶ αὐτοὶ δὲ
  english_pob_choice: and we ourselves are also
  chosen_spanish: y nosotros mismos también
  alternatives_spanish:
  - y nosotros también
  - y también nosotros mismos
  lexicon: LSJ
  rationale: La combinación añade énfasis y reciprocidad. «Nosotros mismos también» mantiene el énfasis del pronombre y la partícula adversativa/conectora δέ sin sobrerrepresentarla.
- source_word: ὑγιαίνομεν
  english_pob_choice: are also well
  chosen_spanish: estamos bien
  alternatives_spanish:
  - gozamos de buena salud
  - estamos sanos
  - estamos saludables
  lexicon: LSJ
  rationale: El verbo significa estar sano o bien de salud. «Estamos bien» es una equivalencia idiomática breve que conserva el tono de cortesía del cierre; en nota se preserva el matiz literal de salud.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en que se trata de una despedida epistolar idiomática, no de una afirmación narrativa continua. Se conservó esa función discursiva en español y se mantuvo el matiz literal de salud en nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el griego.
  - Se mantuvo un registro breve y epistolar, acorde con la fórmula de cierre.
  - «Salud» se usa aquí como despedida idiomática, no como simple sustantivo abstracto.
