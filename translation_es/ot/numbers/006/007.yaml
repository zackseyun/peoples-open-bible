revisions:
- from: No se hará impuro por ellos al morir[a], ni siquiera por su padre o por su madre, por su hermano o por su hermana[b]; porque la consagración de su Dios está sobre su cabeza.
  to: No se hará impuro por ellos cuando mueran[a], ni siquiera por su padre o por su madre, por su hermano o por su hermana;[b] porque la consagración de su Dios está sobre su cabeza.
  rationale: Se cambia «al morir» por «cuando mueran» para eliminar la ambigüedad y reflejar con más claridad que la muerte es la de los familiares mencionados. La nota alternativa se ajusta para conservar la otra posibilidad más nominal («a su muerte»), paralela al expediente inglés. También se reubica la marca [b] al término relevante, «hermana», ya que la nota trata de nezer/«consagración» en la cláusula siguiente y necesita un anclaje visible único en el texto; esto cumple la disciplina de marcadores exigida sin alterar el sentido. El resto del texto se conserva por ser sustancialmente fiel al hebreo y al razonamiento del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:14Z'
