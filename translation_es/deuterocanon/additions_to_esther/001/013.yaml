translation:
  language: es
  text: Escuchó sus planes e investigó sus intenciones, y supo que se preparaban para poner las manos sobre el rey Artajerjes[a]. Y informó al rey acerca de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «atacar al rey Artajerjes». La expresión griega dice literalmente «poner las manos sobre» él y puede señalar una acción hostil más específica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκρόασεν
  english_pob_choice: listened to
  chosen_spanish: escuchó
  alternatives_spanish:
  - dio oído a
  - prestó atención a
  lexicon: BDAG
  rationale: El verbo expresa una escucha atenta, no mera percepción auditiva. En español, 'escuchó' transmite de forma natural esa atención deliberada sin añadir matices indebidos.
- source_word: λογισμοὺς
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - razonamientos
  - esquemas
  lexicon: BDAG
  rationale: En este contexto de intriga cortesana, el término apunta a deliberaciones con finalidad práctica. 'Planes' reproduce bien ese sentido concreto mejor que 'pensamientos'.
- source_word: μερίμνας
  english_pob_choice: intentions
  chosen_spanish: intenciones
  alternatives_spanish:
  - preocupaciones
  - cuidados
  - ansiedades
  lexicon: BDAG
  rationale: La revisión inglesa pasó de 'concerns' a 'intentions' para ajustar mejor el contexto de conspiración. En español, 'intenciones' refleja esa orientación volitiva y encaja con la investigación de sus planes.
- source_word: ἐξηραύνησεν
  english_pob_choice: investigated
  chosen_spanish: investigó
  alternatives_spanish:
  - examinó cuidadosamente
  - indagó
  - escudriñó
  lexicon: BDAG
  rationale: El verbo compuesto indica averiguación diligente. 'Investigó' comunica bien la idea de pesquisa cuidadosa en un registro moderno y claro.
- source_word: ἑτοιμάζουσιν
  english_pob_choice: were preparing
  chosen_spanish: se preparaban
  alternatives_spanish:
  - estaban preparando
  - se disponían
  lexicon: BDAG
  rationale: El presente narrativo expresa una acción en curso. 'Se preparaban' mantiene ese progreso de manera idiomática en español.
- source_word: τὰς χεῖρας ἐπιβαλεῖν
  english_pob_choice: to lay hands on
  chosen_spanish: alzar la mano contra
  alternatives_spanish:
  - poner la mano sobre
  - atacar
  - poner las manos sobre
  lexicon: BDAG
  rationale: La expresión griega es idiomática y puede sugerir acción hostil. 'Alzar la mano contra' conserva el valor figurado y el matiz de agresión sin cerrar del todo la forma concreta del ataque.
- source_word: ὑπέδειξεν
  english_pob_choice: informed
  chosen_spanish: lo informó
  alternatives_spanish:
  - lo comunicó
  - dio aviso al rey
  - le informó
  lexicon: BDAG
  rationale: El verbo indica que dio a conocer el asunto al rey. 'Lo informó al rey' sigue de cerca esa relación verbal y mantiene la concisión del original.
translation_notes:
  revision_awareness: La redacción sigue la línea del POB inglés con equivalentes naturales en español y conserva la tensión del modismo griego τὰς χεῖρας ἐπιβαλεῖν mediante una nota alternativa, evitando suavizar el trasfondo hostil. También se refleja la revisión inglesa que prefirió 'intentions' para μερίμνας en este contexto de conspiración.
  spanish_consistency_notes:
  - Se mantuvo 'Artajerjes' para el nombre propio del rey, coherente con el uso bíblico en español.
  - Se prefirió 'investigó' frente a opciones más literarias para preservar claridad y auditabilidad.
  - La nota de pie de página se colocó en la frase idiomática para no perder la alternativa semántica documentada en el inglés POB.
