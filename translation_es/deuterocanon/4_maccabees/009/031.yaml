revisions:
- from: Porque yo, mediante los placeres que vienen a través de la virtud, aligero el dolor.
  to: Porque yo, mediante los placeres que proceden de la virtud, aligero el dolor.
  rationale: Se revisa únicamente la frase relativa para evitar un calco poco idiomático y una doble expresión instrumental en español. 'Que proceden de la virtud' mantiene la decisión exegética documentada en el audit trail —los placeres tienen su fuente u ocasión en la virtud— mientras mejora la claridad y naturalidad del texto. No hacen falta notas adicionales.
