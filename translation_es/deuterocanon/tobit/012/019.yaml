translation:
  language: es
  text: Todos estos días me aparecí a ustedes[a], pero no comí ni bebí; más bien, ustedes veían una visión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me aparecí a ustedes ... pero lo que ustedes veían era una visión». Los imperfectos griegos pueden expresarse con fuerza continua («me iba apareciendo», «veían continuamente») o de manera más simple como hechos pasados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσας τὰς ἡμέρας
  english_pob_choice: All these days
  chosen_spanish: Todos estos días
  alternatives_spanish:
  - Todos aquellos días
  - Durante todos estos días
  lexicon: LSJ
  rationale: La expresión temporal se mantiene de forma cercana y natural en español. «Estos» refleja bien la cercanía de la explicación en contexto, como en el ajuste final del inglés a «All these days».
- source_word: ὠπτανόμην
  english_pob_choice: I appeared
  chosen_spanish: me aparecí
  alternatives_spanish:
  - aparecí
  - me hacía visible
  - era visible para ustedes
  lexicon: LSJ
  rationale: El verbo griego apunta a una manifestación visible. «Me aparecí» conserva el matiz de presencia perceptible sin resolverla en simple ilusión ni en presencia corporal ordinaria.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - ante ustedes
  - para ustedes
  lexicon: LSJ
  rationale: La dativa de relación se expresa con naturalidad como «a ustedes» en español, manteniendo el destinatario de la aparición.
- source_word: οὐκ ἔφαγον οὐδὲ ἔπιον
  english_pob_choice: I neither ate nor drank
  chosen_spanish: no comí ni bebí
  alternatives_spanish:
  - ni comí ni bebí
  - no comí ni bebí nada
  lexicon: LSJ
  rationale: Se preserva la negación pareja del griego con una formulación idiomática y clara en español. La concisión evita añadir énfasis inexistente en el original.
- source_word: ἀλλὰ
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - en cambio
  lexicon: LSJ
  rationale: «Más bien» reproduce la fuerza correctiva/contrastiva de la conjunción griega sin sonar áspera en español.
- source_word: ὅρασιν
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - una aparición
  - un espectáculo visible
  lexicon: LSJ
  rationale: «Visión» es la correspondencia más directa y conserva la categoría sobrenatural sin rebajarla a mera percepción subjetiva.
- source_word: ὑμεῖς ἐθεωρεῖτε
  english_pob_choice: you were seeing
  chosen_spanish: ustedes veían
  alternatives_spanish:
  - ustedes estaban viendo
  - ustedes contemplaban
  lexicon: LSJ
  rationale: El imperfecto griego sugiere percepción continua; «veían» comunica esa duratividad de manera natural. No se añade «estar» para no cargar el español innecesariamente.
theological_decisions:
- issue: Naturaleza de la presencia visible de Raphael
  english_pob_reading: Raphael says his apparent human presence involved visible appearance without literal eating or drinking, and what Tobit and Tobias perceived was a vision.
  chosen_spanish_reading: Raphael afirma que su presencia fue visible y aparente, sin comer ni beber realmente, y que lo que ellos percibían era una visión.
  alternative_spanish_readings:
  - Solo parecía presente y en realidad no estaba allí
  - Ellos malinterpretaron hechos ordinarios
  rationale: 'La frase española conserva la tensión del texto: había una manifestación real para los observadores, pero no un comer o beber literal. «Visión» evita reducir el pasaje a mera apariencia psicológica o a una explicación naturalista no sustentada por el griego.'
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: El inglés auditado pasó de «All the days I was appearing to you» a «All these days I appeared to you», privilegiando naturalidad sin perder el valor aspectual general; la versión española sigue esa misma decisión y mantiene el contraste con la visión percibida por los observadores.
  spanish_consistency_notes:
  - Se mantuvo «visión» para ὅρασις, en coherencia con el contexto auditado.
  - Se evitó «Señor» u otro disfraz terminológico porque el texto no contiene el tetragrámaton ni κύριος en este versículo.
  - «Me aparecí» conserva mejor la manifestación visible que una simple traducción por «estuve» o «fui».
  - La nota [a] refleja la ambigüedad aspectual del imperfecto griego sin sobrecargar el cuerpo principal.
