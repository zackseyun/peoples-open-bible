translation:
  language: es
  text: Todas las obras de Dios[a] son buenas, y para toda necesidad provee a su debido tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Las obras del Señor son todas muy buenas, y todo mandato será cumplido en su tiempo». El testimonio hebreo, en cambio, dice «las obras de Dios» y habla de provisión para toda necesidad; el texto principal sigue el hebreo conservado, manteniendo a la vez a la vista el griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: מעשי
  english_pob_choice: the works of
  chosen_spanish: las obras de
  alternatives_spanish:
  - los hechos de
  - los actos de
  lexicon: HALOT
  rationale: מעשה denota de manera amplia lo que Dios hace o produce. «Obras» conserva el valor evaluativo y la concisión del hebreo, además de corresponder bien con ἔργα.
- source_word: אל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: El testimonio hebreo dice אל, un título divino genérico, no el Tetragrámaton. Por eso en español corresponde «Dios» y no una forma de «Señor» tomada de la tradición griega.
- source_word: כלם
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas ellas
  - todas las
  lexicon: HALOT
  rationale: El pronombre intensifica la totalidad de las obras divinas. En español, «todas» integrado con «las obras» transmite bien esa fuerza sin repetición pesada.
- source_word: טובים
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - buenas y beneficiosas
  - buenas / beneficiosas
  lexicon: HALOT
  rationale: «Buenas» reproduce el juicio positivo directo del hebreo. Se evita expandir a «beneficiosas» porque el testimonio base no lo explicita.
- source_word: לכל צורך
  english_pob_choice: for every need
  chosen_spanish: para toda necesidad
  alternatives_spanish:
  - para cada necesidad
  - para toda necesidad y necesidad
  lexicon: HALOT
  rationale: צורך expresa necesidad o requerimiento. «Para toda necesidad» suena natural en español y mantiene el sentido de provisión suficiente.
- source_word: בעתו
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en el tiempo oportuno
  lexicon: HALOT
  rationale: El sufijo remite a la necesidad o circunstancia pertinente; «en su tiempo» preserva esa relación y el giro hebreo de manera idiomática.
- source_word: יספיק
  english_pob_choice: he provides
  chosen_spanish: provee
  alternatives_spanish:
  - suministra
  - basta
  - es suficiente
  lexicon: HALOT
  rationale: El hifil de ספק comunica suplir lo suficiente. En español, «provee» hace explícita la acción divina implícita en el verbo hebreo y encaja con el contexto de provisión.
theological_decisions:
- issue: Divine name/title
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  rationale: La fuente hebrea conservada usa אל, no YHWH. Siguiendo la primacía del texto original, se mantiene «Dios» y no se importa el equivalente tradicional de la tradición griega.
  doctrine_reference: 'DOCTRINE.md: primacía de la lengua original sobre la tradición de traducción; no se activa la convención de YHWH/Kyrios porque el hebreo lee אל.'
translation_notes:
  revision_awareness: La versión española sigue el testimonio hebreo conservado como texto principal, pero deja constancia del paralelo griego en nota, igual que el audit trail inglés. No se detectaron revisiones aplicadas en el pase más reciente; el veredicto de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Dios» por fidelidad al hebreo אל, no «el Señor», aunque el paralelo griego tenga Κυρίου.
  - «Obras» conserva la correspondencia con ἔργα y evita reducir el alcance a «hechos» o «actos».
  - «Provee» traduce el sentido de suministro suficiente de יספיק sin añadir una formulación doctrinal más amplia que el contexto no exige.
