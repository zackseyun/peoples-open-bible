translation:
  language: es
  text: Porque, junto con la piedad, hacía que el amor fraternal fuera más deseable para ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σὺν
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al mismo tiempo que
  lexicon: LSJ
  rationale: La preposición expresa acompañamiento o concomitancia. «Junto con» comunica bien esa relación en español sin perder naturalidad.
- source_word: εὐσεβείᾳ
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - reverencia
  lexicon: LSJ
  rationale: En 4 Macabeos, εὐσέβεια apunta a una actitud de fidelidad devota hacia Dios. «Piedad» conserva ese matiz religioso y funciona de manera clara en español, aunque es un poco más tradicional que «devoción».
- source_word: ποθεινοτέραν
  english_pob_choice: more desirable
  chosen_spanish: más deseable
  alternatives_spanish:
  - más amada
  - más anhelada
  - más querida
  lexicon: LSJ
  rationale: El comparativo transmite algo hecho más digno de deseo o anhelo. «Más deseable» refleja con precisión esa fuerza comparativa sin añadir intensificación no expresada en el griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - entre ellos
  lexicon: LSJ
  rationale: 'El dativo señala referencia o beneficio: la fraternidad se volvía más deseable en su evaluación. «Para ellos» reproduce ese sentido de manera natural en español.'
- source_word: κατεσκεύαζεν
  english_pob_choice: she made
  chosen_spanish: hacía
  alternatives_spanish:
  - preparaba
  - formaba
  - cultivaba
  lexicon: LSJ
  rationale: El imperfecto indica acción շարունակada en el pasado. «Hacía» es breve y fiel en esta construcción; el matiz de formación o cultivo queda sugerido por el conjunto de la frase.
- source_word: φιλαδελφίαν
  english_pob_choice: brotherly love
  chosen_spanish: amor fraternal
  alternatives_spanish:
  - amor entre hermanos
  - afecto fraternal
  lexicon: LSJ
  rationale: El término designa el afecto entre hermanos. «Amor fraternal» es la equivalencia española más natural y preserva la especificidad familiar del contexto.
theological_decisions:
- issue: εὐσεβείᾳ como virtud orientada a Dios en 4 Macabeos
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - reverencia
  rationale: El libro subraya la fidelidad religiosa y la virtud devota. «Piedad» mantiene la orientación hacia Dios sin volver el texto pesado o excesivamente arcaico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: La revisión inglesa eliminó «even» porque no está expresado en el griego. La versión española no añade ningún intensificador equivalente; conserva la comparación simple con «más deseable».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto griego no contiene el nombre divino ni su sustituto kýríos.
  - Se usa «amor fraternal» para φιλαδελφία conforme al contexto de hermanos literales.
  - La frase mantiene el imperfecto narrativo con «hacía» para reflejar acción continuada.
