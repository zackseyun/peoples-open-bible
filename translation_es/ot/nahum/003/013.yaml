review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo: anuncio enfático, imagen de debilidad militar, puertas abiertas y cerrojos consumidos por fuego. Sin embargo, se aparta innecesariamente del rastro auditado del POB en dos puntos importantes: עַמֵּךְ se llevó al texto principal como «tu pueblo» aunque la decisión inglesa contextualizada fue «your troops», dejando «your people» como alternativa en nota; y פָּתוֹחַ נִפְתְּחוּ se debilitó con «les quedan abiertas», que no preserva con suficiente claridad la construcción enfática de ‘abiertas de par en par / completamente abiertas’.'
  spanish_quality_summary: El español es generalmente natural y legible, pero hay detalles mejorables. «Tu pueblo son mujeres» suena algo menos ajustado al contexto militar que «tus tropas son mujeres». «A tus enemigos les quedan abiertas» es entendible, pero resulta más rebuscado y menos directo que «están abiertas de par en par para tus enemigos» o «ante tus enemigos». El resto del verso fluye bien; «el fuego ha consumido tus cerrojos» es claro y digno.
  glossary_alignment: 'No hay conflictos con términos teológicos del proyecto. La principal cuestión léxica es de alineación con la decisión contextual del POB para עַמֵּךְ: conviene reflejar «tus tropas» en el texto principal y reservar «tu pueblo» para la nota, tal como documenta la auditoría. «Mujeres» se preserva correctamente. «Cerrojos» es aceptable para בְּרִיחָיִךְ, con alternativas en nota.'
  issues:
  - severity: medium
    issue: עַמֵּךְ se tradujo en el texto principal como «tu pueblo» en vez de la opción contextual «tus tropas».
    rationale: Aunque עם puede significar «pueblo», el rastro auditado del POB decidió que aquí se refiere probablemente a los defensores de Nínive. En español, «tus tropas» preserva mejor la fuerza militar inmediata del contexto sin salir del campo semántico documentado.
  - severity: medium
    issue: פָּתוֹחַ נִפְתְּחוּ quedó atenuado en «les quedan abiertas».
    rationale: La construcción de infinitivo absoluto + verbo finito intensifica la idea. «Les quedan abiertas» expresa resultado, pero no comunica tan claramente la apertura enfática y total como «están abiertas de par en par» o equivalente.
  - severity: low
    issue: La relación con לְאֹיְבַיִךְ puede sonar más idiomática con «para/ante tus enemigos» en esta construcción.
    rationale: «A tus enemigos les quedan abiertas» no es incorrecto, pero es más pesado. En español bíblico claro, «están abiertas de par en par para tus enemigos» preserva mejor la imagen de exposición frente al adversario.
  - severity: low
    issue: La nota [b] contiene comillas y puntuación poco pulidas.
    rationale: Empieza con una comilla simple innecesaria antes de «Hebreo». Conviene normalizarla para claridad editorial.
