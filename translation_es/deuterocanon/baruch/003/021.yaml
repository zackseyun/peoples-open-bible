translation:
  language: es
  text: Ni comprendieron sus senderos, ni se aferraron a ella; sus hijos se alejaron de su camino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más idiomática: «sus hijos se fueron lejos del camino». La redacción griega de la cláusula final es algo áspera, por eso el texto principal se mantiene cerca de la forma atestiguada mientras esta nota expresa un sentido más fluido.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνῆκαν
  english_pob_choice: understand
  chosen_spanish: comprendieron
  alternatives_spanish:
  - entendieron
  - percibieron
  lexicon: BDAG
  rationale: El griego expresa captar o entender. «Comprendieron» conserva bien la idea cognitiva y suena natural en español bíblico moderno.
- source_word: τρίβους
  english_pob_choice: paths
  chosen_spanish: senderos
  alternatives_spanish:
  - caminos
  - sendas
  lexicon: LSJ
  rationale: τρίβος puede significar camino abierto por el uso, senda o sendero. «Senderos» preserva la imagen de recorridos concretos y funciona bien con el paralelismo de ὁδός.
- source_word: ἀντελάβοντο
  english_pob_choice: take hold of
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - la tomaron
  - la alcanzaron
  - la agarraron
  lexicon: BDAG
  rationale: El verbo puede significar agarrar, aferrarse o apoderarse, según el contexto. Aquí la imagen es de apropiarse o aferrarse a la sabiduría implícita en el pronombre, por lo que «se apoderaron de» mantiene la fuerza sin volverlo demasiado literal.
- source_word: οἱ υἱοὶ αὐτῶν
  english_pob_choice: their sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus varones
  - sus hijos varones
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «sus hijos varones / sus hijos (masculino plural)», en español «sus hijos» comunica de forma natural la referencia masculina sin forzar una expresión redundante. No se neutraliza con «hijos e hijas» porque el texto no lo dice.
- source_word: πόρρω ἐγενήθησαν
  english_pob_choice: became far from
  chosen_spanish: se alejaron
  alternatives_spanish:
  - quedaron lejos
  - se hicieron remotos
  lexicon: LSJ
  rationale: La construcción literal es «llegaron a estar lejos». En español, «se alejaron» transmite bien el desplazamiento resultante y evita una calca pesada.
- source_word: ἀπὸ τῆς ὁδοῦ αὐτῶν
  english_pob_choice: from their way
  chosen_spanish: de su camino
  alternatives_spanish:
  - de su senda
  - de su andar
  lexicon: BDAG
  rationale: El griego tiene un posesivo plural algo áspero en la cláusula final; en español, «de su camino» es la forma más clara y idiomática. Se conserva la referencia al camino propio sin suavizar más de lo que permite el texto.
theological_decisions:
- issue: Imagen de sabiduría como camino/senderos
  english_pob_reading: its paths
  chosen_spanish_reading: sus senderos
  alternative_spanish_readings:
  - sus caminos
  - sus sendas
  rationale: El contexto presenta un lenguaje de camino para la sabiduría. «Senderos» mantiene la metáfora sin explicitarla de forma interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Cláusula final con forma griega áspera
  english_pob_reading: their sons became far from their way
  chosen_spanish_reading: sus hijos se alejaron de su camino
  alternative_spanish_readings:
  - sus hijos fueron alejados de su camino
  - sus hijos quedaron lejos de su camino
  rationale: La fuente griega es sintácticamente algo difícil. La versión española conserva el sentido básico de alejamiento sin introducir una reconstrucción más libre en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
translation_notes:
  revision_awareness: El contexto auditado indica una coincidencia alta con la traducción inglesa POB y no registra revisiones aplicadas; la cláusula final conserva la aspereza del griego, con una nota para la alternativa más idiomática.
  spanish_consistency_notes:
  - Se mantiene el lenguaje de camino/senderos para la metáfora de la sabiduría.
  - Se preserva la referencia masculina del griego con «sus hijos», sin ampliar a un referente neutral.
  - No se traduce el pronombre implícito de manera que borre la relación con el antecedente femenino implícito del pasaje griego.
