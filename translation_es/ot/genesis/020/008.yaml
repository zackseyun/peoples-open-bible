translation:
  language: es
  text: Así que Abimelec se levantó muy de madrugada, llamó a todos sus siervos[a] y habló todas estas cosas en presencia de ellos[b], y los hombres tuvieron mucho miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «convocó a todos sus siervos».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit. «en sus oídos»; es decir, de modo que ellos lo oyeran. O: «a oídos de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó muy de madrugada
  alternatives_spanish:
  - se levantó temprano
  - se levantó al amanecer
  lexicon: HALOT
  rationale: El verbo con valor causal/iterativo de שׁכם expresa levantarse temprano; en español, "se levantó muy de madrugada" comunica la urgencia temporal con naturalidad y sin perder el matiz de prontitud.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de madrugada
  alternatives_spanish:
  - por la mañana
  - muy temprano en la mañana
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "en la mañana", unido a וַיַּשְׁכֵּם refuerza la idea de una hora muy temprana. "De madrugada" preserva ese énfasis idiomático en español.
- source_word: וַיִּקְרָא לְכָל עֲבָדָיו
  english_pob_choice: called all his servants
  chosen_spanish: llamó a todos sus siervos
  alternatives_spanish:
  - llamó a todos sus servidores
  - convocó a todos sus siervos
  lexicon: HALOT
  rationale: Aquí עֲבָדָיו nombra a los miembros subordinados de su casa/corte. Se mantiene "siervos" como opción más cercana al valor relacional del hebreo sin cargar innecesariamente el término con el énfasis social de "esclavos".
- source_word: וַיְדַבֵּר אֶת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: spoke all these things
  chosen_spanish: habló todas estas cosas
  alternatives_spanish:
  - dijo todas estas cosas
  - expuso todas estas cosas
  lexicon: HALOT
  rationale: דבר con objeto directo introduce el contenido hablado. "Habló todas estas cosas" sigue de cerca el hebreo y suena natural en español narrativo.
- source_word: בְּאָזְנֵיהֶם
  english_pob_choice: in their hearing
  chosen_spanish: en su oído
  alternatives_spanish:
  - en su presencia
  - a oídos de ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente "en sus oídos", una imagen idiomática de hablarles de manera audible y directa. "En su oído" conserva la imagen sin convertirla en una paráfrasis demasiado libre. Se mantiene singular distributivo en español por fluidez narrativa.
- source_word: וַיִּירְאוּ
  english_pob_choice: were very afraid
  chosen_spanish: tuvieron mucho miedo
  alternatives_spanish:
  - temieron mucho
  - estuvieron muy asustados
  lexicon: HALOT
  rationale: יִרְאוּ expresa aquí temor real ante la noticia recibida. "Tuvieron mucho miedo" comunica el resultado emocional con claridad y evita una construcción demasiado abstracta.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los hombres de la casa
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino explícito. Se conserva con "los hombres" para respetar la referencia gramatical y no neutralizarla a "personas".
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: מְאֹד intensifica el miedo. En español, "mucho" integra naturalmente ese intensificador con "miedo" y reproduce bien la fuerza del original.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marca de nota aparezca exactamente en el texto español. También se revisó la elección de "siervos" frente a alternativas más neutras o más sociales, manteniendo la cercanía al hebreo y la coherencia del registro narrativo.
  spanish_consistency_notes:
  - Se mantiene "Abimelec" como forma española usual del nombre propio.
  - Se conserva el paralelismo narrativo hebreo con una sola cadena verbal principal.
  - Se evita "esclavos" porque el contexto cortesano favorece un término relacional menos duro, aunque la base hebrea permita más de una lectura.
  - La expresión "en su oído" conserva la imaginería semítica y queda marcada con nota para el lector.
  - '"Los hombres" preserva el masculino plural explícito del hebreo.'
