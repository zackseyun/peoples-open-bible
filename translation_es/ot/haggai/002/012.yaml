    issue: «Suponga[a]» como arranque principal
    rationale: Aunque reproduce el valor hipotético de הֵן, en español bíblico continuo suena más a mandato directo singular que a planteamiento ilustrativo. «Supongamos que» o «Si» fluyen mejor; «Supongamos que» conserva bien la fuerza hipotética sin endurecerla.
  - severity: medium
    issue: «¿se vuelve santo?» para alimentos
