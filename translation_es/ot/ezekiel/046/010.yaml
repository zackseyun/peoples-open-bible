translation:
  language: es
  text: Y el príncipe irá entre ellos[a]; cuando entren, él entrará, y cuando salgan, él saldrá con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: נָשִׂיא es un título técnico en Ezequiel 40–48 para la autoridad civil vinculada al culto. «Príncipe» preserva ese uso contextual mejor que opciones más generales como «líder» o «gobernante».
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su interior
  lexicon: HALOT
  rationale: La expresión literalmente apunta a estar «en medio de»; «entre ellos» comunica con naturalidad en español la cercanía y presencia del príncipe dentro del grupo.
- source_word: בְּבוֹאָם
  english_pob_choice: when they enter
  chosen_spanish: cuando ellos entren
  alternatives_spanish:
  - al entrar
  - cuando entren
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se vierte mejor en español con una subordinada temporal. Se mantiene el sujeto plural para reflejar el hebreo.
- source_word: יָבֹוא
  english_pob_choice: he shall enter
  chosen_spanish: él entrará
  alternatives_spanish:
  - él debe entrar
  - él ha de entrar
  lexicon: HALOT
  rationale: El imperfecto en este contexto regulativo expresa acción esperada o prescrita. «Entrará» conserva el valor directivo sin volverlo excesivamente interpretativo.
- source_word: וּבְצֵאתָם
  english_pob_choice: and when they go out
  chosen_spanish: y cuando ellos salgan
  alternatives_spanish:
  - y al salir
  - y cuando salgan
  lexicon: HALOT
  rationale: Se conserva la relación temporal y el plural del hebreo. «Salir» mantiene la simetría verbal con «entrar».
- source_word: יֵצֵאוּ
  english_pob_choice: he shall go out
  chosen_spanish: él saldrá
  alternatives_spanish:
  - saldrá con ellos
  - él saldrá con ellos
  lexicon: HALOT
  rationale: La forma hebrea es plural, pero el contexto y la revisión inglesa señalan que el príncipe sale con ellos. En español se evita forzar un plural explícito y se conserva la tensión textual con la frase precedente, dejando que el sentido de acompañamiento quede implícito en el conjunto.
theological_decisions:
- issue: Identidad y estatus del príncipe en la visión del templo
  english_pob_reading: Render נָשִׂיא as 'prince' without importing messianic or royal-theological claims.
  chosen_spanish_reading: Traducir נָשִׂיא como «príncipe» sin cargar el texto con una identificación mesiánica o una teología realista adicional.
  alternative_spanish_readings:
  - líder
  - gobernante
  rationale: El pasaje da una instrucción procedimental sobre el movimiento del príncipe junto con el pueblo. La traducción debe conservar el título de la visión de Ezequiel sin resolver la identidad del personaje más allá de lo que el texto afirma.
  doctrine_reference: Primacía del texto original y preservación de la tensión teológica/documental.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: la cláusula final se entiende con verbo singular referido al príncipe, no como un plural de acción conjunta añadido al final. Por eso el español refleja «él saldrá» sin explicitar un plural adicional.'
  spanish_consistency_notes:
  - Se mantiene «príncipe» como título técnico, coherente con la terminología POB para Ezequiel 40–48.
  - Se conserva el paralelismo verbal «entrar/salir» para reflejar la estructura hebrea.
  - La nota a pie de página solo marca la alternativa léxica documentada para בְּתוֹכָם.
  - El español evita el calco duro de la construcción infinitiva hebrea, pero permanece muy cercano al texto fuente.
