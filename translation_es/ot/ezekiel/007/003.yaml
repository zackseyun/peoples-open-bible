revisions:
- from: Ahora el fin está sobre ti[a], y enviaré mi ira contra ti. Te juzgaré conforme a tus caminos, y pondré sobre ti todas tus abominaciones.
  to: Ahora el fin ha venido sobre ti[a], y enviaré mi ira contra ti. Te juzgaré conforme a tus caminos, y haré recaer sobre ti todas tus abominaciones.
  rationale: Se ajusta «está sobre ti» a «ha venido sobre ti» para reflejar mejor el carácter dinámico e inminente del anuncio profético. Se cambia «pondré sobre ti» por «haré recaer sobre ti» para expresar con naturalidad el modismo hebreo de juicio, manteniendo en la nota la alternativa más literal. También se pule la redacción de la nota al pie.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:40:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: inmediatez temporal («Ahora»), anuncio de juicio («el fin»), ira divina, juicio según los caminos y la imposición de las consecuencias de las abominaciones. Sin embargo, «está sobre ti» debilita el valor dinámico de עָלַיִךְ aquí, donde el hebreo comunica que el fin ha venido/caído sobre la destinataria, no simplemente que reposa sobre ella. Además, «pondré sobre ti todas tus abominaciones» es comprensible, pero «haré recaer sobre ti» expresa mejor en español el sentido idiomático de וְנָתַתִּי עָלַיִךְ sin sugerir torpemente una colocación física de las abominaciones mismas.'
  spanish_quality_summary: 'El español es claro y digno, pero puede sonar algo calcado en dos puntos: «el fin está sobre ti» y «pondré sobre ti todas tus abominaciones». Una revisión menor mejora la naturalidad y mantiene mejor la fuerza profética y judicial. El resto del verso es sólido: «enviaré mi ira contra ti», «Te juzgaré conforme a tus caminos» y «abominaciones» son adecuados y fieles.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ira», «juzgaré» y «abominaciones» preservan bien el peso teológico. No intervienen términos sensibles como Yahvé/Mesías/espíritu. La revisión propuesta solo afina la idiomaticidad y la fuerza semántica del hebreo.
  issues:
  - severity: medium
    issue: «el fin está sobre ti» suena estático y algo calcado
    rationale: עַתָּה הַקֵּץ עָלַיִךְ anuncia que el fin ha llegado/caído sobre la destinataria. En español bíblico-natural, «ha venido sobre ti» o «ha caído sobre ti» transmite mejor el evento inminente que «está sobre ti».
  - severity: medium
    issue: «pondré sobre ti todas tus abominaciones» es demasiado literal para el modismo
    rationale: Aunque el hebreo literalmente dice «dar/poner sobre ti», el sentido es hacer recaer sobre la destinataria las consecuencias de sus abominaciones. «Haré recaer sobre ti» o «traeré sobre ti» comunica mejor ese valor en español, mientras la nota puede preservar la literalidad.
  - severity: low
    issue: La nota al pie inicia con comillas y puntuación algo torpes
    rationale: 'La formulación actual («''O: ...») no sigue una puntuación española limpia. Conviene normalizarla para legibilidad y consistencia editorial.'
  revised_spanish_text: Ahora el fin ha venido sobre ti[a], y enviaré mi ira contra ti. Te juzgaré conforme a tus caminos, y haré recaer sobre ti todas tus abominaciones.
  revised_footnotes:
