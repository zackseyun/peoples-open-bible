theological_decisions:
- issue: Metaphorical warfare imagery
  chosen_reading: Retain the imagery of devouring, plundering, and captivity as covenantal/judicial reversal against Zion's enemies.
  alternative_readings:
  - Flatten the imagery into generic punishment language
  rationale: 'The verse''s theology is expressed through reversal imagery: those who consumed, oppressed, and looted God''s people will themselves suffer the same. Preserving the metaphors avoids importing a less vivid or less judicial reading than the Hebrew warrants.'
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not paraphrase beyond what the source warrants.'
