translation:
  language: es
  text: Tus gobernantes son rebeldes y compañeros de ladrones[a]; cada uno ama el soborno y persigue pagos[b]. No defienden al huérfano[c], y la causa de la viuda no llega ante ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «príncipes». שַׂר puede referirse a un gobernante, oficial o príncipe; se eligió «gobernantes» por claridad contextual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «persigue recompensas / gratificaciones». שַׁלְמֹנִים puede aludir a pagos, recompensas o provechos obtenidos por corrupción; «pagos» mantiene abierta la ambigüedad del hebreo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «No hacen justicia al huérfano». El hebreo usa un verbo judicial que puede traducirse como juzgar, defender o hacer justicia; aquí se eligió «defienden» para reflejar la decisión principal auditada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרַיִךְ
  english_pob_choice: your rulers
  chosen_spanish: tus gobernantes
  alternatives_spanish:
  - tus príncipes
  - tus oficiales
  lexicon: HALOT
  rationale: שַׂר puede designar un líder, gobernante u oficial. En español, 'gobernantes' comunica bien la función política y judicial del contexto, con un registro claro y natural. 'Príncipes' sería más tradicional, pero puede sonar más restringido o aristocrático que el hebreo aquí.
- source_word: סוֹרְרִים
  english_pob_choice: rebels
  chosen_spanish: rebeldes
  alternatives_spanish:
  - rebeldes obstinados
  - recalcitrantes
  lexicon: HALOT
  rationale: La forma expresa oposición y desafío moral/político. 'Rebeldes' conserva esa fuerza de manera concisa en español; 'obstinados' sola no basta para el matiz de deslealtad.
- source_word: וְחַבְרֵי גַּנָּבִים
  english_pob_choice: companions of thieves
  chosen_spanish: compañeros de ladrones
  alternatives_spanish:
  - asociados de ladrones
  - socios de ladrones
  lexicon: HALOT
  rationale: La construcción indica asociación cómplice con ladrones. 'Compañeros de ladrones' mantiene el golpe acusatorio del hebreo sin sobreinterpretar la relación exacta.
- source_word: כֻּלּוֹ
  english_pob_choice: every one
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todos ellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo, el sentido distributivo es colectivo. 'Todos' funciona naturalmente en español y conserva la idea de participación generalizada.
- source_word: אֹהֵב שֹׁחַד
  english_pob_choice: loves a bribe
  chosen_spanish: aman el soborno
  alternatives_spanish:
  - aman un soborno
  - aman los sobornos
  lexicon: HALOT
  rationale: שֹׁחַד significa 'soborno'. En español, el plural o el singular genérico pueden sonar naturales; aquí 'aman el soborno' conserva el carácter abstracto/generativo del vicio y evita una literalidad extraña.
- source_word: וְרֹדֵף שַׁלְמֹנִים
  english_pob_choice: pursues payments
  chosen_spanish: persiguen pagos
  alternatives_spanish:
  - buscan pagos
  - persiguen recompensas
  lexicon: HALOT
  rationale: רָדַף es 'perseguir'. שַׁלְמֹנִים puede aludir a pagos, recompensas o gratificaciones indebidas. 'Persiguen pagos' sigue de cerca la lectura auditada y mantiene abierta la ambigüedad sin fijar demasiado el sentido.
- source_word: יָתוֹם
  english_pob_choice: the orphan
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado
  - el padre/madre ausente
  lexicon: HALOT
  rationale: '''Huérfano'' es el equivalente natural y bíblicamente reconocible en español. Aquí no conviene sustituirlo por una paráfrasis más amplia, porque el término apunta a la vulnerabilidad social concreta.'
- source_word: לֹא יִשְׁפֹּטוּ
  english_pob_choice: do not defend
  chosen_spanish: no hacen justicia
  alternatives_spanish:
  - no juzgan
  - no defienden
  lexicon: HALOT
  rationale: שׁפט en contexto judicial puede significar impartir o asegurar justicia. 'No hacen justicia' preserva esa fuerza jurídica y deja abierta la doble idea de juzgar y proteger al vulnerable.
- source_word: וְרִיב אַלְמָנָה
  english_pob_choice: and the widow’s case
  chosen_spanish: la causa de la viuda
  alternatives_spanish:
  - el pleito de la viuda
  - la disputa de la viuda
  lexicon: HALOT
  rationale: רִיב puede ser 'causa', 'pleito' o 'litigio'. 'La causa de la viuda' suena natural en español bíblico moderno y mantiene el matiz legal sin sonar demasiado técnico.
- source_word: לֹא יָבֹא אֲלֵיהֶם
  english_pob_choice: does not come before them
  chosen_spanish: no llega ante ellos
  alternatives_spanish:
  - no viene ante ellos
  - no se presenta ante ellos
  lexicon: HALOT
  rationale: La idiomática hebrea indica que el caso no comparece ante el tribunal. 'No llega ante ellos' conserva el sentido procesal en español sin añadir un sujeto inexistente.
translation_notes:
  revision_awareness: 'El texto español sigue el sentido revisado del audit trail inglés: colectivo distributivo en כֻּלּוֹ, tono formal con ''persiguen'', y mantenimiento de la ambigüedad de שַׁלְמֹנִים sin concretarla excesivamente. También se preserva la opción judicial de לֹא יִשְׁפֹּטוּ y רִיב אַלְמָנָה.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se optó por 'gobernantes' en vez de 'príncipes' en el texto principal, pero se documentó la alternativa tradicional en nota.
  - '''Huérfano'' y ''causa de la viuda'' conservan el campo semántico jurídico-social del hebreo.'
  - No se introdujo terminología doctrinal ajena al versículo; el foco permanece en la corrupción judicial y social.
