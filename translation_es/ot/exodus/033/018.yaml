translation:
  language: es
  text: 'Entonces dijo[a]: «Por favor, muéstrame tu gloria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «déjame ver tu esplendor». El verbo hebreo es literalmente «hazme ver», y «gloria» también puede denotar esplendor manifiesto u honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: Then he said
  chosen_spanish: Entonces él dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Entonces» conserva la secuencia, y «él» hace explícito el sujeto en español sin alterar el sentido del hebreo.
- source_word: הַרְאֵנִי
  english_pob_choice: show me
  chosen_spanish: muéstrame
  alternatives_spanish:
  - déjame ver
  - hazme ver
  lexicon: HALOT
  rationale: El verbo causativo de ראה expresa literalmente ‘hazme ver’. En español, «muéstrame» comunica de forma natural la petición directa sin perder la fuerza causativa.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula נא marca ruego o cortesía. «Por favor» es la equivalencia contemporánea más clara y digna en español.
- source_word: כְּבֹדֶךָ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu esplendor
  - tu honra
  - la plenitud de tu presencia
  lexicon: HALOT
  rationale: כבוד puede abarcar gloria, honor o esplendor manifiesto. Se conserva «gloria» para mantener la amplitud teológica y evitar restringir el término a solo brillo visible o presencia, como hace la lectura auditada en inglés.
theological_decisions:
- issue: Alcance de «tu gloria» en la petición de Moisés
  english_pob_reading: 'Render concretely but without over-specifying: ''your glory'''
  chosen_spanish_reading: 'Traducir de manera concreta pero sin precisar de más: «tu gloria»'
  alternative_spanish_readings:
  - tu esplendor
  - la plenitud de tu presencia
  rationale: El hebreo no determina si Moisés pide ver resplandor visible, majestad divina o una manifestación de la presencia de Dios. Para preservar esa tensión teológica, se mantiene «gloria» en vez de resolver el sentido con una paráfrasis más específica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el último pase indicó que no se necesitaban cambios y que hubo alta concordancia entre revisores.
  spanish_consistency_notes:
  - Se mantiene «gloria» como término principal para כבוד, en coherencia con el criterio POB auditado.
  - Se usa «Por favor» para נא, evitando formas arcaicas como «te ruego» salvo que el contexto requiera mayor solemnidad.
  - La puntuación con comillas angulares sigue la convención española y conserva la separación narrativa del discurso directo.
