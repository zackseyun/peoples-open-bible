base_translation:
  language: en
  yaml_path: translation/ot/1_kings/010/029.yaml
  text: And a chariot was imported from Egypt for six hundred shekels of silver[a], and a horse for a hundred and fifty[c][b]; and so they exported them to all the kings of the Hittites and to the kings of Aram by their hand.
  footnotes:
  - marker: a
    text: 'Hebrew: ''by their hand,'' that is, through them or through their agents.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was brought up from Egypt ... and they brought them out.' The Hebrew uses movement verbs that in this trade context refer to import and export.
    reason: lexical_alternative
  - marker: c
    text: That is, the kings of the Arameans; traditionally 'Syria.'
    reason: alternative_reading
