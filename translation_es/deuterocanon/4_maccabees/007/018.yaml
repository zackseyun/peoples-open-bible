translation:
  language: es
  text: Pero todos los que se ocupan de la piedad con todo el corazón, solo ellos pueden dominar las pasiones de la carne.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλλʼ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: LSJ
  rationale: El valor adversativo se conserva mejor en español con «Pero», que introduce contraste directo sin añadir matices no presentes en el griego.
- source_word: ὅσοι
  english_pob_choice: all who
  chosen_spanish: todos los que
  alternatives_spanish:
  - quienes
  - los que
  lexicon: LSJ
  rationale: La expresión plural inclusiva se reproduce de forma natural con «todos los que», manteniendo el alcance de la clase de personas.
- source_word: τῆς εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción
  - la reverencia
  lexicon: LSJ
  rationale: En este contexto moral-religioso, εὐσέβεια expresa devoción fiel a Dios; «piedad» es la opción más estable en español para ese campo semántico, aunque puede sonar más tradicional que «devoción».
- source_word: προνοοῦσιν
  english_pob_choice: care for
  chosen_spanish: se ocupan de
  alternatives_spanish:
  - cuidan de
  - prestan atención a
  - se preocupan por
  lexicon: LSJ
  rationale: El verbo implica atención activa y propósito. «Se ocupan de» comunica preocupación deliberada sin sonar forzado con el complemento abstracto «la piedad».
- source_word: ἐξ ὅλης καρδίας
  english_pob_choice: with their whole heart
  chosen_spanish: con todo el corazón
  alternatives_spanish:
  - de todo corazón
  - con su corazón entero
  lexicon: LSJ
  rationale: La locución española «con todo el corazón» reproduce de manera clara y idiomática la idea de entrega total; el matiz posesivo se entiende de forma natural en español.
- source_word: οὗτοι μόνοι
  english_pob_choice: these alone
  chosen_spanish: estos solos
  alternatives_spanish:
  - solo estos
  - ellos solos
  lexicon: LSJ
  rationale: «Estos solos» preserva el énfasis restrictivo y la cercanía deíctica del griego, manteniendo la estructura argumentativa.
- source_word: δύνανται κρατεῖν
  english_pob_choice: are able to master
  chosen_spanish: pueden dominar
  alternatives_spanish:
  - son capaces de controlar
  - pueden vencer
  lexicon: LSJ
  rationale: κρατεῖν aquí implica ejercer dominio sobre algo; «dominar» transmite mejor esa idea de control firme que «controlar», sin exagerar más allá del texto.
- source_word: τῶν τῆς σαρκὸς παθῶν
  english_pob_choice: the passions of the flesh
  chosen_spanish: las pasiones de la carne
  alternatives_spanish:
  - los impulsos de la carne
  - las pasiones carnales
  - los padecimientos de la carne
  lexicon: LSJ
  rationale: «Pasiones» refleja πάθη en su sentido moral-afectivo, no como sufrimientos. «La carne» mantiene σάρξ como término antropológico y evita imponer «naturaleza humana» o «naturaleza pecaminosa» sin base suficiente en este verso.
theological_decisions:
- issue: Cómo renderizar εὐσέβεια en un contexto de virtud religiosa
  english_pob_reading: godliness
  chosen_spanish_reading: la piedad
  alternative_spanish_readings:
  - la devoción
  - la reverencia
  rationale: La frase describe una orientación devota hacia Dios y su voluntad. «Piedad» conserva la fuerza religiosa del término sin reducirlo a mera emotividad ni ampliar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md: Virtud y devoción — εὐσέβεια'
- issue: Cómo tratar σάρξ en un contexto ético-antropológico
  english_pob_reading: flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - el cuerpo
  - la naturaleza pecaminosa
  - la naturaleza humana
  rationale: El griego usa el término concreto σάρξ y el audit trail inglés prefirió «flesh» para preservar el léxico original. En español, «carne» mantiene esa correspondencia y deja la implicación moral al contexto, sin cargar el texto con una interpretación doctrinal más fuerte de la necesaria.
  doctrine_reference: 'DOCTRINE.md: Términos controvertidos — σάρξ'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia en la revisión más reciente y no requiere cambios textuales según el audit trail; se conserva el sentido adversativo, la idea de devoción total y la restricción enfática de la capacidad de dominar las pasiones.
  spanish_consistency_notes:
  - 'Se mantiene la terminología teológica básica del proyecto: εὐσέβεια > piedad y σάρξ > carne.'
  - El orden de la cláusula final en español sigue la progresión lógica del griego y del inglés auditado.
  - No se añadieron notas al pie porque el español elegido no introduce una ambigüedad nueva que el audit trail exija desdoblar.
