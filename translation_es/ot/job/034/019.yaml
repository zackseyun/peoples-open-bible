- from: que no hace acepción de personas entre los príncipes, ni favorece al rico[a] sobre el pobre; porque todos ellos son obra de sus manos.
  to: que no hace acepción de personas con los príncipes, ni favorece al rico[a] sobre el pobre; porque todos ellos son obra de sus manos.
  rationale: Se corrige únicamente la construcción 'entre los príncipes' por 'con los príncipes' para reflejar mejor el sentido de mostrar favoritismo hacia personas de alto rango y evitar una lectura equívoca. Se conserva el resto por su buena fidelidad al hebreo y al rastro de auditoría inglés.
