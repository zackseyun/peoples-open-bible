    issue: La nota al pie está anclada a «miró» en vez de documentar la alternativa léxica de רְצָפִים.
    rationale: El rastro inglés conserva una nota para «cake baked on hot stones» / «on coals». Para fidelidad editorial, el español debe conservar esa misma incertidumbre léxica principal.
  - severity: low
    issue: «a la cabecera había» suena algo forzado en español actual.
    rationale: Aunque comprensible, una formulación como «junto a su cabeza había» conserva mejor el sentido espacial de מְרַאֲשֹׁתָיו con mayor naturalidad.
  - severity: low
    issue: «vasija de agua» es demasiado amplio frente a un recipiente más específico.
    rationale: צַפַּחַת denota un contenedor concreto; «jarra de agua» resulta más claro y natural en español general sin perder precisión.
  revised_spanish_text: Él miró, y he aquí, junto a su cabeza había una torta cocida sobre piedras calientes[a] y una jarra de agua. Comió y bebió y volvió a acostarse.
  revised_footnotes:
