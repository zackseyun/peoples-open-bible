translation:
  language: es
  text: De él[a] lavaron Moisés, Aarón y sus hijos sus manos y sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con él»; el hebreo dice más literalmente «de él», refiriéndose al lavacro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחֲצוּ
  english_pob_choice: washed
  chosen_spanish: se lavarán
  alternatives_spanish:
  - lavaron
  - se lavaron
  - lavarán
  lexicon: HALOT
  rationale: El hebreo narra la acción de lavarse con valor secuencial en el contexto ritual; en español, «se lavarán» conserva la acción sin forzar un calco áspero y mantiene el orden narrativo del versículo.
- source_word: מִמֶּנּוּ
  english_pob_choice: From it
  chosen_spanish: de él
  alternatives_spanish:
  - con él
  - desde él
  lexicon: HALOT
  rationale: Como el inglés auditado, el hebreo usa מן con sufijo, cuya fuerza básica es procedencia. En español, «de él» reproduce esa relación de origen respecto de la pileta/lavacro sin convertirlo en instrumento.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: transliteration
  rationale: Nombre propio estándar en español bíblico.
- source_word: וְאַהֲרֹן
  english_pob_choice: and Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - y Aarón
  lexicon: transliteration
  rationale: Nombre propio estándar en español bíblico; el conector ya está incluido en la coordinación de la frase.
- source_word: וּבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus hijos
  lexicon: HALOT
  rationale: בנים con sufijo en este contexto sacerdotal se refiere a los descendientes masculinos de Aarón. En español, «hijos» es natural y preciso; «hijos varones» sería más explicativo de lo que exige el hebreo.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: La construcción posesiva plural se expresa de manera directa en español con «sus manos».
- source_word: רַגְלֵיהֶם
  english_pob_choice: and their feet
  chosen_spanish: y sus pies
  alternatives_spanish:
  - y los pies de ellos
  lexicon: HALOT
  rationale: Se conserva el par de miembros corporales especificado por el hebreo; la coordinación resulta natural en español.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no cambió el contenido del versículo; el español sigue el mismo análisis auditado: acción de lavarse en secuencia, procedencia marcada por מן, y referencia específica al lavacro.'
  spanish_consistency_notes:
  - Se conservó «Moisés» y «Aarón» como nombres propios estándar en español.
  - Se usó «sus hijos» para בנים en el marco sacerdotal, siguiendo la precisión del análisis inglés.
  - Se mantuvo la relación semántica de procedencia en «de él», con nota para la alternativa interpretativa «con él».
