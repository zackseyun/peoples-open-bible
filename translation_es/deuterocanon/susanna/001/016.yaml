translation:
  language: es
  text: Y después de volver, llegaron al mismo lugar[a], y, preguntándose unos a otros la razón, confesaron su deseo; entonces, juntos acordaron un momento en que podrían encontrarla sola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegaron juntos»; la frase griega ἐπὶ τὸ αὐτό puede enfatizar la reunión en un mismo lugar o simplemente que llegaron en compañía.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνακάμψαντες
  english_pob_choice: after turning back
  chosen_spanish: volviéndose atrás
  alternatives_spanish:
  - después de volver
  - después de regresar
  lexicon: LSJ
  rationale: El participio expresa un retorno o giro hacia atrás. «Volviéndose atrás» conserva el movimiento verbal y el orden participial sin sonar rígido en español.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: to the same place
  chosen_spanish: al mismo lugar
  alternatives_spanish:
  - al mismo sitio
  - juntos
  lexicon: BDAG
  rationale: En este contexto narrativo la frase señala convergencia espacial. «Al mismo lugar» refleja esa reunión concreta; la lectura «juntos» queda como posibilidad interpretativa, pero es menos precisa aquí.
- source_word: ἀνετάζοντες
  english_pob_choice: questioned
  chosen_spanish: preguntándose
  alternatives_spanish:
  - interrogándose
  - examinándose
  lexicon: LSJ
  rationale: El verbo describe una averiguación mutua sobre la causa. «Preguntándose» es natural en español y conserva la interacción recíproca sin imponer un tono judicial que el contexto no exige.
- source_word: τὴν αἰτίαν
  english_pob_choice: the reason
  chosen_spanish: la razón
  alternatives_spanish:
  - la causa
  - el motivo
  lexicon: BDAG
  rationale: Aquí αἰτία refiere la razón del comportamiento. «La razón» es la opción más clara y directa en español, compatible con la pregunta mutua del relato.
- source_word: ὡμολόγησαν
  english_pob_choice: they confessed
  chosen_spanish: confesaron
  alternatives_spanish:
  - admitieron
  - reconocieron
  lexicon: BDAG
  rationale: El verbo implica un reconocimiento abierto. «Confesaron» mantiene el peso moral de la revelación en el contexto narrativo.
- source_word: τὴν ἐπιθυμίαν αὐτῶν
  english_pob_choice: their desire
  chosen_spanish: su deseo
  alternatives_spanish:
  - su lujuria
  - su apetito
  lexicon: BDAG
  rationale: ἐπιθυμία puede ser deseo en general, pero aquí el contexto narrativo lo carga de sentido ilícito. Se conserva «su deseo» para no sobredeterminar el matiz, dejando que el contexto aporte la fuerza moral; «su lujuria» sería más explícito pero más interpretativo.
- source_word: κοινῇ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en común
  - de común acuerdo
  lexicon: LSJ
  rationale: El adverbio subraya acción compartida. «Juntos» es natural y preserva la idea de colaboración conspirativa.
- source_word: συνετάξαντο
  english_pob_choice: arranged
  chosen_spanish: concertaron
  alternatives_spanish:
  - acordaron
  - planearon
  - fijaron
  lexicon: LSJ
  rationale: El verbo medio indica que establecieron algo para su propio fin. «Concertaron» comunica bien la idea de coordinar y fijar un plan conjunto; «acordaron» o «planearon» son posibles, pero menos precisos sobre la fijación del momento.
- source_word: καιρὸν
  english_pob_choice: a time
  chosen_spanish: un tiempo
  alternatives_spanish:
  - una oportunidad
  - un momento
  lexicon: BDAG
  rationale: καιρός puede ser tiempo oportuno o momento señalado. «Un tiempo» mantiene la forma simple del texto griego, y el sentido oportunista queda sostenido por el contexto de la cita.
- source_word: δυνήσονται εὑρεῖν
  english_pob_choice: they would be able to find
  chosen_spanish: podrían encontrar
  alternatives_spanish:
  - serían capaces de encontrar
  - lograrían encontrar
  lexicon: BDAG
  rationale: La construcción expresa capacidad en futuro proyectado dentro de la narración. «Podrían encontrar» es natural en español y conserva la posibilidad planificada.
- source_word: μόνην
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - sin compañía
  - sola ella
  lexicon: BDAG
  rationale: El adjetivo indica ausencia de acompañantes. «Sola» es la forma más breve y fiel en español.
theological_decisions:
- issue: La carga moral de ἐπιθυμία en contexto narrativo
  english_pob_reading: '''Their desire'' here carries the sense of illicit sexual desire in the narrative context; ''their lust'' is a possible more explicit rendering.'
  chosen_spanish_reading: «su deseo» conserva el término base, con el contexto narrativo señalando su carácter ilícito; «su lujuria» queda como alternativa explícita.
  alternative_spanish_readings:
  - su lujuria
  - su deseo ilícito
  rationale: La POB inglesa opta por no forzar un término demasiado interpretativo en el cuerpo principal. En español se mantiene esa prudencia textual, sin borrar la tensión moral del pasaje, que queda apoyada por el contexto inmediato.
  doctrine_reference: Ética bíblica; lectura contextual del deseo desordenado
