translation:
  language: es
  text: Y aconteció que el sexto día recogieron doble porción de pan[a], dos ómeres para cada uno, y vinieron todos los jefes de la congregación y se lo dijeron a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un ómer era una medida seca usada en el antiguo Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa introduce un nuevo acontecimiento; «aconteció» conserva ese valor discursivo sin ser tan arcaico como «y fue».
- source_word: בַּיּוֹם הַשִּׁשִּׁי
  english_pob_choice: on the sixth day
  chosen_spanish: en el sexto día
  alternatives_spanish:
  - el sexto día
  - en día sexto
  lexicon: HALOT
  rationale: La expresión temporal es directa; «en el sexto día» es natural y fiel al hebreo.
- source_word: לָקְטוּ
  english_pob_choice: they gathered
  chosen_spanish: recogieron
  alternatives_spanish:
  - juntaron
  - recolectaron
  lexicon: HALOT
  rationale: En el contexto del maná, el verbo expresa reunir la provisión; «recogieron» comunica bien la acción concreta sin perder la sencillez del hebreo.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «pan» para preservar la formulación del texto, aunque el referente sea el maná.
- source_word: מִשְׁנֶה
  english_pob_choice: double
  chosen_spanish: doble
  alternatives_spanish:
  - en doble cantidad
  - por duplicado
  lexicon: HALOT
  rationale: El sustantivo indica duplicación o porción doble; «pan doble» sigue de cerca la construcción hebrea y la revisión inglesa reciente.
- source_word: שְׁנֵי הָעֹמֶר
  english_pob_choice: two omers
  chosen_spanish: dos gomeres
  alternatives_spanish:
  - dos omeres
  - dos medidas
  lexicon: HALOT
  rationale: Se translitera la unidad de medida para no perder la referencia cultural del hebreo; «gomeres» adapta el término para lectura española.
- source_word: לָאֶחָד
  english_pob_choice: for each one
  chosen_spanish: para cada uno
  alternatives_spanish:
  - por cada uno
  - a cada uno
  lexicon: HALOT
  rationale: La expresión distributiva se vierte de manera natural en español como «para cada uno».
- source_word: כָּל נְשִׂיאֵי הָעֵדָה
  english_pob_choice: all the leaders of the congregation
  chosen_spanish: todos los jefes de la congregación
  alternatives_spanish:
  - todos los líderes de la congregación
  - todos los príncipes de la congregación
  lexicon: HALOT
  rationale: «נשיאים» aquí designa a los dirigentes; «jefes» mantiene el matiz de autoridad sin imponerse con terminología eclesiástica más cargada.
- source_word: וַיַּגִּידוּ לְמֹשֶׁה
  english_pob_choice: came and told Moses
  chosen_spanish: vinieron ... y se lo informaron a Moisés
  alternatives_spanish:
  - vinieron y le dijeron a Moisés
  - se presentaron y dijeron a Moisés
  lexicon: HALOT
  rationale: 'Se conserva la secuencia de acciones: primero vinieron, luego comunicaron el hecho. «Informaron» refleja bien el valor de נגד en este contexto.'
theological_decisions:
- issue: Medida cultural 'omer'
  english_pob_reading: An omer was a unit of dry measure used in ancient Israel.
  chosen_spanish_reading: gomer como unidad de medida seca de Israel antiguo
  alternative_spanish_readings:
  - omer como unidad de medida seca
  - medida de grano
  rationale: Se mantiene la transliteración para conservar la referencia cultural e histórica, y se explicita que se trata de una medida de capacidad seca.
  doctrine_reference: Éxodo 16:36; notas culturales de medida en la Torá
- issue: Bread/maná terminology
  english_pob_reading: they gathered double the bread
  chosen_spanish_reading: recogieron pan doble
  alternative_spanish_readings:
  - recogieron doble pan
  - recogieron doble ración de pan
  rationale: Se conserva «pan» para seguir el hebreo y la tradición del pasaje, sin sustituirlo por una explicación interpretativa más amplia.
  doctrine_reference: Éxodo 16:4, 15, 31-35
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente que prefirió una formulación más cercana a «double the bread» y «each one». Por eso la versión española usa «pan doble» y «para cada uno», manteniendo además la secuencia verbal del hebreo.
  spanish_consistency_notes:
  - «Y aconteció» conserva el valor narrativo de וַיְהִי sin forzar un giro arcaico.
  - «Congregación» mantiene la continuidad terminológica con el hebreo עֵדָה.
  - La transliteración «gomer» queda explicada en la nota cultural y marcada en el texto, evitando una equivalencia moderna imprecisa.
