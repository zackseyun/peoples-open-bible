    text: Or “the cup.” The Greek has “a cup” without the article, though the meal context may make the referent definite.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has “Drink of it, all of you.” The Greek πάντες most naturally means “all of you,” addressing the whole group.
    reason: lexical_alternative
  - marker: c
    text: Or 'And taking a cup, and after giving thanks,'.
    reason: previous_rendering
