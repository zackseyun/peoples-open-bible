    rationale: El inglés auditado final dice «the scepter of your kingdom is a scepter of uprightness». El borrador español mantiene el orden anterior («cetro de rectitud es el cetro de tu reino»), que en español suena más forzado y no refleja la decisión editorial ya documentada.
