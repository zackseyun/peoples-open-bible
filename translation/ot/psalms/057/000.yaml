theological_decisions:
- issue: Nature of the superscription
  chosen_reading: Translate the entire verse as a psalm superscription rather than as part of the poetic body.
  alternative_readings:
  - Treat elements such as 'Do Not Destroy' as part of the poem rather than metadata
  rationale: 'The Hebrew consists entirely of conventional superscriptional elements: musical direction, tune/title, Davidic attribution, genre label, and historical setting. Presenting it as a heading best reflects its literary function in the Masoretic text.'
- issue: Rendering of uncertain genre term מִכְתָּם
  chosen_reading: Preserve as transliteration 'miktam.'
  alternative_readings:
  - inscription
  - golden psalm
  - secret psalm
  rationale: Because the term's meaning is disputed, transliteration preserves the textual data without importing a speculative interpretation. This aligns with the project's commitment to original-language primacy and transparency where meaning is uncertain.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
