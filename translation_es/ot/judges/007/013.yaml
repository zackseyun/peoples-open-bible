base_translation:
  language: en
  yaml_path: translation/ot/judges/007/013.yaml
  text: 'When Gideon came[a], behold, a man was telling a dream to his companion. He said, “Look, I dreamed a dream: behold, a round loaf of barley bread was tumbling into the camp of Midian, and it came to the tent and struck it so that it fell, and turned it upside down, and the tent fell.”'
  footnotes:
  - marker: a
    text: Or “a cake of barley bread” or “a barley loaf.” The Hebrew term translated “round loaf” is rare, and likely refers to a round cake or loaf.
    reason: lexical_alternative
