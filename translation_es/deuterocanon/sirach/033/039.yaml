translation:
  language: es
  text: Y hay un amigo que se vuelve hostil[a], y sacará a la luz una disputa para tu vergüenza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se vuelve enemistad» o «se vuelve hostilidad»; el griego usa el sustantivo abstracto «enemistad», no la palabra personal «enemigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «revelará una disputa como reproche contra ti». La frase griega es compacta y puede destacar tanto la disputa misma como la vergüenza que produce.'
    reason: alternative_reading
lexical_decisions:
- source_word: φίλος
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  lexicon: LSJ
  rationale: ‘Amigo’ conserva el valor relacional ordinario del sustantivo griego y es natural en español. No se requiere un término más técnico aquí.
- source_word: μεταβαλλόμενος
  english_pob_choice: changes into
  chosen_spanish: se vuelve
  alternatives_spanish:
  - cambia en
  - se transforma en
  - se convierte en
  lexicon: LSJ
  rationale: El participio expresa un cambio de estado. ‘Se vuelve’ transmite ese proceso de manera clara y natural, sin perder la idea de transición.
- source_word: εἰς ἔχθραν
  english_pob_choice: into enmity
  chosen_spanish: enemistad
  alternatives_spanish:
  - hostilidad
  - odio
  - se vuelve enemigo
  lexicon: LSJ
  rationale: El griego usa un sustantivo abstracto, no ‘enemigo’. ‘Enemistad’ conserva mejor la forma nominal y el contraste relacional del texto.
- source_word: μάχην
  english_pob_choice: a quarrel
  chosen_spanish: una disputa
  alternatives_spanish:
  - una querella
  - un pleito
  - una riña
  lexicon: LSJ
  rationale: En este contexto sapiencial, el término apunta a conflicto verbal o social más que a combate físico. ‘Disputa’ es fiel y comprensible en español actual.
- source_word: ὀνειδισμοῦ
  english_pob_choice: to your disgrace
  chosen_spanish: para tu vergüenza
  alternatives_spanish:
  - para tu oprobio
  - como reproche contra ti
  - para tu deshonra
  lexicon: LSJ
  rationale: El genitivo comunica la deshonra producida por la divulgación del conflicto. ‘Vergüenza’ expresa bien el resultado honorífico/infamante en español natural.
- source_word: ἀποκαλύψει
  english_pob_choice: he will expose
  chosen_spanish: descubrirá
  alternatives_spanish:
  - revelará
  - pondrá al descubierto
  - desvelará
  lexicon: LSJ
  rationale: ‘Descubrirá’ mantiene la idea de quitar el velo y hacer visible algo oculto. En español suena menos duro que ‘exponerá’ y sigue siendo fiel al verbo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un alto grado de acuerdo y no requieren revisión sustantiva; se mantiene la misma tensión léxica entre el sustantivo abstracto ‘enemistad’ y el efecto vergonzoso del conflicto revelado.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ y no hay términos divinos en este versículo.
  - Se preserva la abstracción de ἔχθρα con ‘enemistad’, en lugar de concretarla como ‘enemigo’.
  - ‘Disputa’ refleja el conflicto social sugerido por μάχην sin volverlo un combate físico.
  - La construcción ‘para tu vergüenza’ conserva el matiz de deshonra del genitivo ὀνειδισμοῦ.
