translation:
  language: es
  text: Estas son las familias de los hijos de Noé[a], según sus generaciones, en sus naciones[b]; y de estos se separaron las naciones sobre la tierra después del diluvio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «clanes» para «familias».
    reason: lexical_alternative
  - marker: b
    text: O «según sus generaciones, por sus naciones».
    reason: previous_rendering
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  english_pob_choice: families
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En este contexto genealógico, el sustantivo apunta a agrupaciones de parentesco. «Familias» es natural en español y conserva la transparencia del resumen genealógico; «clanes» sería posible, pero suena más antropológico y menos directo para lectores generales.
- source_word: לְתוֹלְדֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - según su genealogía
  - según sus descendientes
  lexicon: HALOT
  rationale: תּוֹלְדוֹת puede referirse a generaciones, descendencia o línea genealógica. Aquí funciona como fórmula de cierre del cuadro de naciones; «según sus generaciones» mantiene el valor formal y genealógico sin añadir una paráfrasis excesiva.
- source_word: בְּגוֹיֵהֶם
  english_pob_choice: by their nations
  chosen_spanish: por sus naciones
  alternatives_spanish:
  - en sus naciones
  - entre sus naciones
  lexicon: HALOT
  rationale: El hebreo usa la preposición ב con גוֹי en sentido asociativo o de marco. «Por sus naciones» refleja esa relación y conserva la segunda frase paralela del hebreo; «en sus naciones» también sería viable, pero puede sonar menos natural en español dentro de esta construcción resumitiva.
- source_word: נִפְרְדוּ
  english_pob_choice: were separated
  chosen_spanish: se separaron
  alternatives_spanish:
  - fueron separadas
  - se dividieron
  - se dispersaron
  lexicon: HALOT
  rationale: El nifal de פרד expresa separación/división. En español, «se separaron» reproduce bien el valor medio/pasivo sin forzar una pasiva perifrástica; «se dividieron» también es posible, pero hace más visible la idea de división que la de separación.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  lexicon: HALOT
  rationale: En Génesis 10, גוֹיִם designa los grupos nacionales resultantes de la descendencia de Noé. «Naciones» es el equivalente más preciso y el más consistente con el marco del texto.
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el mundo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ tiene alcance global dentro del relato postdiluviano. «Sobre la tierra» comunica bien esa amplitud en español bíblico moderno; «en la tierra» también sería posible, pero puede sonar más local o menos idiomático en esta frase.
- source_word: אַחַר הַמַּבּוּל
  english_pob_choice: after the flood
  chosen_spanish: después del diluvio
  alternatives_spanish:
  - tras el diluvio
  lexicon: HALOT
  rationale: Es una equivalencia directa e idiomática del marcador temporal que remite al episodio ya narrado. «Diluvio» conserva el referente narrativo tradicional sin añadir interpretación.
theological_decisions:
- issue: Alcance de אֶרֶץ en la dispersión posdiluviana
  english_pob_reading: global 'earth' rather than local 'land'
  chosen_spanish_reading: global «tierra» en lugar de una «tierra» local o territorial
  alternative_spanish_readings:
  - la tierra local
  - el país
  rationale: Génesis 10 presenta la tabla de las naciones y resume la distribución de los descendientes de Noé después del diluvio. Traducir אֶרֶץ con un valor global mantiene el alcance universal del pasaje y evita reducirlo a una región específica.
  doctrine_reference: Génesis 10:1, 10:32; la unidad y dispersión de la humanidad posdiluviana
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del audit trail: se mantiene «generaciones» para תּוֹלְדוֹת y se refleja el valor más directo de נִפְרְדוּ con «se separaron». También se conserva la estructura paralela de los dos sintagmas preposicionales hebreos sin sobrerreformularla.'
  spanish_consistency_notes:
  - Se usa «Noé» para נֹחַ conforme al uso bíblico estándar en español.
  - Se mantiene «naciones» para גוֹיִם y no «pueblos», para conservar la precisión del cuadro de Génesis 10.
  - «Tierra» se entiende aquí en sentido universal, no como territorio local.
  - La puntuación con punto y coma reproduce la pausa fuerte entre la caracterización genealógica y la conclusión sobre la separación de las naciones.
