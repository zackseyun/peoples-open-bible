translation:
  language: es
  text: Y ahora[a], por favor bendigan a Yahvé, el Dios de Israel, que hace cosas maravillosas en la tierra, que engrandece a una persona desde el vientre y actúa con ella conforme a su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y actúa con nosotros conforme a su misericordia» en lugar de «y actúa con ella conforme a su voluntad».'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרְכוּ נָא
  english_pob_choice: please bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - por favor, bendigan
  - bendigan, les ruego
  lexicon: HALOT
  rationale: El plural imperativo con נָא añade exhortación apremiante o cortesía; en español, el sentido queda bien expresado con un imperativo directo en un contexto litúrgico. Se evita una muletilla excesiva en la línea principal, pero se conserva la fuerza exhortativa en el arranque 'Y ahora'.
- source_word: יְהֹוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el nombre divino: ''Yahvé'' en lugar de un reemplazo reverencial. Esto mantiene la visibilidad del Tetragrámaton en español.'
- source_word: הַמַּפְלִיא לַעֲשׂוֹת / πάντῃ
  english_pob_choice: who does wondrous things on the earth
  chosen_spanish: que hace cosas maravillosas en la tierra
  alternatives_spanish:
  - que obra maravillas en la tierra
  - que hace cosas prodigiosas en la tierra
  lexicon: HALOT
  rationale: La combinación expresa acción extraordinaria divina. 'Cosas maravillosas' suena natural en español y conserva el valor laudatorio; 'en la tierra' sigue el alcance del hebreo y es compatible con el tono universal del griego.
- source_word: הַמְגַדֵּל אָדָם / τὸν ὑψοῦντα ἡμέρας ἡμῶν
  english_pob_choice: who makes a person great from the womb
  chosen_spanish: que engrandece al hombre desde el vientre
  alternatives_spanish:
  - que exalta al ser humano desde el vientre
  - que hace grande al hombre desde el vientre
  lexicon: HALOT
  rationale: El hebreo מגדל y el griego ὑψοῦντα apuntan a 'hacer grande/exaltar'. 'Engrandece' recoge bien esa elevación. Se conserva 'el hombre' como singular representativo de אָדָם, y 'desde el vientre' sigue la imagen hebrea y el paralelo griego μήτρας.
- source_word: וַיַּעֲשֵׂהוּ בִּרְצוֹנוֹ / καὶ ποιοῦντα μεθʼ ἡμῶν κατὰ τὸ ἔλεος αὐτοῦ
  english_pob_choice: and acts toward him according to his will
  chosen_spanish: y actúa con él conforme a su voluntad
  alternatives_spanish:
  - y lo trata conforme a su voluntad
  - y obra con él según su voluntad
  lexicon: HALOT
  rationale: '''Actúa con él'' conserva la relación verbal directa de ויעשהו sin sobrecargarla con interpretación. ''Conforme a su voluntad'' sigue el hebreo ברצונו. Se evita adoptar en el texto principal la variante griega ''según su misericordia'', pero se preserva su relevancia en nota.'
theological_decisions:
- issue: Tensión textual entre el hebreo y el griego en la cláusula final
  english_pob_reading: according to his will, with Greek alternative 'according to his mercy'
  chosen_spanish_reading: conforme a su voluntad
  alternative_spanish_readings:
  - según su misericordia
  - conforme a su misericordia
  rationale: La lectura principal sigue el hebreo conservado, que tiene primacía donde sobrevive. Sin embargo, el griego introduce una variante teológicamente significativa ('misericordia' frente a 'voluntad'), por lo que se mantiene en nota para no borrar la tensión documental.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach translated from Hebrew where it survives; textual transparency'
- issue: אָדָם como sustantivo singular representativo
  english_pob_reading: a person / man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - la humanidad
  rationale: Se conserva el singular representativo del hebreo אָדָם, que apunta al ser humano en general. 'El hombre' es formalmente fiel y funciona de manera natural en español bíblico sin ocultar el valor genérico.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: Se tomó como base la prioridad del hebreo preservado en Sirácides y se contrastó con el paralelo griego de Swete. Se respetó la tensión final entre 'voluntad' y 'misericordia' mediante una nota, sin fusionar indebidamente ambas lecturas en el texto principal. También se atendió la revisión inglesa que prefirió un sujeto humano más general para אָדָם, expresándolo en español con 'el hombre' como singular representativo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene un registro bíblico digno pero comprensible para lectores contemporáneos.
  - No se armonizó la variante griega en el texto principal para evitar borrar la evidencia textual.
  - '''Desde el vientre'' conserva la imagen corporal del hebreo y el paralelo griego, en vez de una paráfrasis abstracta.'
