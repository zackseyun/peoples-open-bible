revisions:
- from: Entonces el sacerdote mandará que vacíen la casa antes de que el sacerdote entre[a] a inspeccionar la afección, para que no se vuelva impuro[b] nada de lo que hay en la casa; y después el sacerdote entrará a inspeccionar la casa.
  to: Entonces el sacerdote mandará que vacíen la casa antes de que el sacerdote entre a inspeccionar[a] la zona afectada[b], para que no quede impuro[c] todo lo que hay en la casa; y después el sacerdote entrará a inspeccionar la casa.
  rationale: La revisión corrige la ubicación de la nota sobre «inspeccionar», hace más concreto הַנֶּגַע con «zona afectada» conforme al expediente inglés y al contexto levítico, y mejora la naturalidad de la cláusula de impureza sin alterar el sentido fuente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia procedimental del hebreo: mandato del sacerdote, vaciado previo de la casa, propósito de evitar que el contenido quede ritualmente impuro, y posterior entrada del sacerdote para inspeccionar. «Inspeccionar» refleja adecuadamente לִרְאוֹת en contexto ritual. Sin embargo, «la afección» para הַנֶּגַע es menos concreto que el inglés auditado y que el hebreo contextual, que apunta al área/marca afectada bajo inspección; conviene una opción más visible y específica. Además, «impuro» en singular con «nada de lo que hay» suena algo forzado; es mejor reestructurar para concordar con «todo lo que hay en la casa» y preservar con mayor naturalidad el sentido de כָּל אֲשֶׁר בַּבָּיִת.'
  spanish_quality_summary: 'El texto es mayormente claro y legible, pero puede sonar más natural en español bíblico moderno con dos ajustes: quitar la nota [a] sobre «entre», que en realidad ancla a «inspeccionar», y reformular la cláusula de impureza para evitar la construcción negativa menos fluida «no se vuelva impuro nada de lo que hay». La redacción revisada mantiene dignidad y mejora fluidez.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Sacerdote» y «casa» están bien. Para טמא, «quede impuro» funciona mejor que «se vuelva impuro» en esta construcción. Para הַנֶּגַע, «la zona afectada» se alinea mejor con la justificación inglesa de ‘diseased area’ que «la afección».
  issues:
  - severity: medium
    issue: Renderización de הַנֶּגַע como «la afección»
    rationale: «Afección» puede sugerir condición abstracta más que el punto o zona visible inspeccionada por el sacerdote. El expediente inglés documenta ‘diseased area’ y alternativas como ‘mark’/‘infection’; en español conviene una expresión concreta como «la zona afectada».
  - severity: low
    issue: Anclaje y contenido de la nota [a]
    rationale: La nota está colocada tras «entre», pero comenta לִרְאוֹת/«inspeccionar». El marcador debe aparecer junto al término relevante para no crear confusión.
  - severity: low
    issue: Construcción «para que no se vuelva impuro nada de lo que hay en la casa»
    rationale: Es comprensible, pero menos natural que «para que no quede impuro todo lo que hay en la casa» o «para que no quede impuro nada de lo que hay...». La revisión propuesta mejora la fluidez y la concordancia.
  revised_spanish_text: Entonces el sacerdote mandará que vacíen la casa antes de que el sacerdote entre a inspeccionar[a] la zona afectada[b], para que no quede impuro[c] todo lo que hay en la casa; y después el sacerdote entrará a inspeccionar la casa.
  revised_footnotes:
