  yaml_path: translation/ot/numbers/005/014.yaml
  text: and a spirit of jealousy comes over him[a], and he is jealous of his wife, and she has defiled herself; or if a spirit of jealousy comes over him, and he is jealous of his wife, though she has not defiled herself[b],
