review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del hebreo: exclamación de grado, estado interno del corazón, fórmula profética, circunstancia temporal, totalidad de los actos y metáfora de prostitución descarada. Sin embargo, hay dos desajustes importantes con el expediente: (1) אֲמֻלָה fue auditado en inglés como ''weak'', y el español ''desfallecido'' aplicado a ''corazón'' suena menos natural y algo más físico; ''débil'' preserva mejor el valor fuente y la legibilidad. (2) La nota al pie no preserva la alternativa significativa documentada para שַׁלָּטֶת (''domineering''); en español conviene mantener una nota léxica sobre ''dominante'' además de ''descarada''.'
  spanish_quality_summary: El texto es claro y digno, pero 'desfallecido está tu corazón' suena algo forzado en español general. '¡Qué débil es tu corazón...!' es más natural y mantiene la intensidad retórica. La fórmula 'declara el Señor Yahvé' es aceptable y acorde con la política del proyecto sobre Yahvé. 'las obras de una prostituta descarada' lee bien.
  glossary_alignment: 'Alineación general buena: יְהוָה se vierte como ''Yahvé''; אִשָּׁה זוֹנָה como ''prostituta''; לֵב como ''corazón''. No hay conflicto con la terminología principal. La única mejora léxica recomendada es usar ''débil'' para אֲמֻלָה y añadir nota para la alternativa de שַׁלָּטֶת (''dominante'', ''imperiosa'', ''desvergonzada'').'
  issues:
  - severity: medium
    issue: '''desfallecido'' para אֲמֻלָה'
    rationale: Aunque semánticamente cercano, con 'corazón' resulta menos idiomático en español y puede sugerir un desmayo o agotamiento físico. 'Débil' reproduce mejor la decisión auditada y la lectura natural del reproche.
  - severity: medium
    issue: La nota al pie actual se ancla en la palabra equivocada
    rationale: El expediente inglés conserva una nota léxica para שַׁלָּטֶת ('domineering prostitute'). El borrador pone una nota en 'desfallecido' sobre alternativas de אֲמֻלָה, pero omite la alternativa significativa documentada del adjetivo final.
  - severity: low
    issue: Falta reflejar explícitamente la alternativa léxica de שַׁלָּטֶת
    rationale: Dado que el inglés la preserva en nota, el español debería hacer lo mismo para mantener la trazabilidad del razonamiento léxico.
  revised_spanish_text: ¡Qué débil es tu corazón, declara el Señor Yahvé, cuando haces todas estas cosas, las obras de una prostituta descarada[a]!
  revised_footnotes:
  - marker: a
    text: O «una prostituta dominante»; el adjetivo hebreo puede transmitir una conducta audaz, imperiosa o desvergonzada.
    reason: lexical_alternative
  revision_rationale: Se ajusta אֲמֻלָה a 'débil' por fidelidad al expediente y mejor naturalidad en español. Se elimina la nota sobre 'desfallecido' y se restituye la nota léxica requerida para שַׁלָּטֶת, preservando la alternativa documentada ('dominante') y su campo semántico.
