translation:
  language: es
  text: 'Entonces Ismael, hijo de Netanías, se levantó con los diez hombres que estaban con él[a], e hirieron a Gedalías, hijo de Ahicam, hijo de Safán, con la espada, y lo mataron: al que el rey de Babilonia había puesto sobre el país.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hirieron a Gedalías ... con la espada y le dieron muerte». El hebreo usa dos verbos en secuencia para el ataque y su desenlace fatal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se sublevó
  lexicon: HALOT
  rationale: En este contexto narrativo hostil, קום inicia una acción agresiva. 'Se levantó' conserva el impulso del hebreo y funciona de modo natural en español sin añadir más especificación de la que exige el texto.
- source_word: וַעֲשֶׂרֶת הָאֲנָשִׁים
  english_pob_choice: the ten men
  chosen_spanish: los diez hombres
  alternatives_spanish:
  - diez hombres
  - los diez varones
  lexicon: HALOT
  rationale: El artículo definido del hebreo se refleja con 'los'. 'Hombres' traduce de forma directa אַנָשִׁים y evita una formulación más técnica o forzada.
- source_word: אֲשֶׁר הָיוּ אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que lo acompañaban
  - que iban con él
  lexicon: HALOT
  rationale: La cláusula relativa se mantiene simple y transparente. 'Estaban con él' preserva la relación de compañía o alianza sin añadir matices no explicitados por el hebreo.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: mataron
  alternatives_spanish:
  - hirieron
  - golpearon
  lexicon: HALOT
  rationale: El verbo נכה en este contexto se desarrolla en un acto homicida. En español, 'mataron' comunica directamente el resultado fatal, aunque el hebreo presenta también la secuencia del golpe.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - con la espada
  - por la espada
  lexicon: HALOT
  rationale: '''A espada'' es una construcción natural en español bíblico y contemporáneo, y conserva el valor instrumental del hebreo sin sonar rígida.'
- source_word: וַיָּמֶת אֹתוֹ
  english_pob_choice: and killed him
  chosen_spanish: y lo mataron
  alternatives_spanish:
  - y le dieron muerte
  - y lo pusieron a muerte
  lexicon: HALOT
  rationale: El hebreo usa dos verbos en secuencia para el acto y su desenlace fatal. Aquí se conserva esa fuerza acumulativa con 'mataron' repetido, mientras la nota deja abierta la alternativa de traducir el segundo verbo de modo más explícito como resultado.
- source_word: אֲשֶׁר הִפְקִיד
  english_pob_choice: whom ... had appointed
  chosen_spanish: al que ... había puesto
  alternatives_spanish:
  - a quien ... había nombrado
  - a quien ... había nombrado como responsable
  lexicon: HALOT
  rationale: En este contexto administrativo, הפקיד implica colocar a alguien en una función de autoridad. 'Había puesto' es fiel y sobrio; 'nombrado' sería posible, pero 'puesto sobre la tierra' expresa mejor la relación de gobierno del pasaje.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilónico
  lexicon: HALOT
  rationale: Se mantiene la designación histórica estándar y clara, sin sustituirla por un adjetivo que perdería la estructura constructa del hebreo.
- source_word: בָּאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el país
  lexicon: HALOT
  rationale: Dado el verbo que rige la frase, el sentido es de autoridad y encargo, no mera localización. 'Sobre la tierra' conserva ese valor de jurisdicción, en paralelo con la elección inglesa.
- source_word: גְּדַלְיָהוּ בֶן אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: Gedaliah son of Ahikam, son of Shaphan
  chosen_spanish: Gedalías, hijo de Ahicam, hijo de Safán
  alternatives_spanish:
  - Gedalías, hijo de Ahicam, hijo de Safán
  - Gedalías, hijo de Ahicam, nieto de Safán
  lexicon: HALOT
  rationale: Se transliteran los nombres con una ortografía española coherente y reconocible. Se preserva la cadena patronímica tal como aparece, porque sirve para identificar al personaje con precisión.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura optimal-equivalence y no muestra revisiones posteriores; la versión española sigue esa línea, conservando la secuencia verbal del hebreo pero optando por una formulación natural en español. Se mantiene también la nota de alternativa para reflejar la tensión lexical documentada entre 'golpear/ herir' y 'matar'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto en este proyecto, pero el versículo no contiene el nombre divino.
  - '''a espada'' se eligió por fluidez idiomática; la alternativa ''con la espada'' queda implícita en la nota como posibilidad equivalente.'
  - 'Los nombres propios siguen una transliteración española estable: Ismael, Netanías, Gedalías, Ahicam y Safán.'
  - Se preserva 'sobre la tierra' para reflejar la función de gobierno concedida por el rey de Babilonia.
