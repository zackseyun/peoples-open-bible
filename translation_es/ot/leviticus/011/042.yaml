    text: 'O: "se arrastra sobre su vientre".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "el ser pululante que pulula", una forma repetida que enfatiza esta clase de criaturas.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "son una abominación".'
    reason: lexical_alternative
  revision_rationale: Se corrige la omisión del pronombre objeto en la prohibición ('no los comerán') para reflejar el sufijo hebreo. También se ajusta la clasificación de הַשֶּׁרֶץ הַשֹּׁרֵץ para conservar mejor la repetición cognada documentada por la auditoría inglesa, evitando el doble verbo 'se arrastran y pululan'. Se mantiene 'detestables' como equivalente adecuado de שֶׁקֶץ y se reubica la nota de alternativa de 'abominación' junto a ese término.
