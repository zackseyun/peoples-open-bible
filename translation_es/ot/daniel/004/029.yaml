  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Altísimo', 'hombres', 'bestias del campo', 'hierba', 'bueyes' y 'reino' están bien alineados con el origen y con la decisión inglesa. No aparecen términos sensibles del glosario mayor como Yahvé/Mesías.
