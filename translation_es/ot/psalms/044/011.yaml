translation:
  language: es
  text: Tú nos haces retroceder delante del enemigo,[a] y los que nos odian saquean para sí.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú nos vuelves atrás ante el enemigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y los que nos odian han tomado botín para sí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשִׁיבֵנוּ
  english_pob_choice: You make us turn back
  chosen_spanish: Tú nos haces retroceder
  alternatives_spanish:
  - Tú nos vuelves atrás
  - Tú nos haces volver
  - Tú nos haces dar la vuelta
  lexicon: HALOT
  rationale: 'El hifil de שוב es causativo: no solo «volver», sino «hacer volver / hacer retroceder». «Haces retroceder» comunica bien la retirada forzada en un contexto militar y suena natural en español.'
- source_word: אָחוֹר
  english_pob_choice: back
  chosen_spanish: retroceder
  alternatives_spanish:
  - atrás
  - hacia atrás
  - a la retaguardia
  lexicon: HALOT
  rationale: El sustantivo/adverbio funciona como complemento de movimiento hacia atrás. En español, «retroceder» integra de forma natural la idea de «volver atrás» sin perder la dirección del movimiento.
- source_word: מִנִּי צָר
  english_pob_choice: from the foe
  chosen_spanish: ante el enemigo
  alternatives_spanish:
  - frente al enemigo
  - del enemigo
  - ante el adversario
  lexicon: HALOT
  rationale: La construcción expresa retirada en relación con un oponente hostil. «Ante el enemigo» mantiene la escena de combate y coincide con la alternativa reconocida en el audit trail inglés («before the enemy»), sin forzar un calco.
- source_word: מְשַׂנְאֵינוּ
  english_pob_choice: those who hate us
  chosen_spanish: los que nos odian
  alternatives_spanish:
  - nuestros odiadores
  - nuestros enemigos
  - los que nos aborrecen
  lexicon: HALOT
  rationale: 'El participio se rinde mejor de forma verbal: no solo una etiqueta nominal, sino hostilidad activa. «Los que nos odian» conserva esa fuerza y evita borrar la relación verbal del hebreo.'
- source_word: שָׁסוּ
  english_pob_choice: plunder
  chosen_spanish: saquean
  alternatives_spanish:
  - han saqueado
  - despojan
  - hacen presa
  lexicon: HALOT
  rationale: El verbo se refiere a tomar botín. «Saquean» es el equivalente español más natural en un lamento bélico y conserva la imagen de despojo violento.
- source_word: לָמוֹ
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - en provecho propio
  - para su beneficio
  lexicon: HALOT
  rationale: El dativo señala beneficio propio. «Para sí» es breve, idiomático y mantiene la idea de ventaja personal presente en el hebreo y en la opción inglesa.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el audit trail inglés: se mantiene la fuerza causativa de שוב, el matiz bélico de צָר, la participación verbal de מְשַׂנְאֵינוּ, y la ambigüedad de שָׁסוּ/לָמוֹ se conserva en una nota alternativa. No se introdujeron cambios de sentido respecto del registro revisado más reciente.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso no contiene el nombre divino.
  - Se prefirió «enemigo» en singular colectivo para reflejar el tono poético del hebreo y la alternativa inglesa «before the enemy».
  - «Saquean para sí» preserva la ventaja reflexiva del dativo לָמוֹ sin añadir información doctrinal.
