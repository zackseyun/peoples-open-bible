base_translation:
  language: en
  yaml_path: translation/ot/zechariah/011/006.yaml
  text: For I will no longer have compassion on the inhabitants of the land[a], declares Yahweh. Behold, I am handing over the people, each into the hand of his neighbor and into the hand of his king, and they will crush the land[c][b], and I will not deliver it from their hand.
  footnotes:
  - marker: a
    text: Or 'the inhabitants of the earth' if הָאָרֶץ is taken universally rather than locally.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'each man into the hand of his neighbor and into the hand of his king'; the wording depicts each person being given over to another's power.
    reason: lexical_alternative
  - marker: c
    text: Or 'I will not rescue [them/the land] from their hand.' The Hebrew object is not explicit in the final clause and is supplied in English from the context.
    reason: lexical_alternative
