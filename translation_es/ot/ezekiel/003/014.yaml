translation:
  language: es
  text: Y el Espíritu[a] me levantó y me llevó, y yo fui con amargura, en el ardor de mi espíritu[b], mientras la mano de Yahvé era fuerte sobre mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu me levantó»; también es posible «viento» para la palabra hebrea traducida aquí como «Espíritu».'
    reason: alternative_reading
  - marker: b
    text: La expresión «en el ardor de mi espíritu» también puede entenderse como «en la ira de mi espíritu» o «en el furor de mi espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְר֥וּחַ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - un espíritu
  - el viento
  lexicon: HALOT
  rationale: En este contexto visionario y profético, la lectura principal es el Espíritu divino. En español, "el Espíritu" conserva la referencia personal y la mayúscula transmite adecuadamente la entidad divina sin convertir el texto en una paráfrasis.
- source_word: נְשָׂאַ֖תְנִי
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me cargó
  lexicon: HALOT
  rationale: El verbo hebreo expresa levantar o alzar con imagen concreta de traslado. "Me levantó" es natural en español y mantiene la acción de elevación previa al movimiento.
- source_word: וַתִּקָּחֵ֑נִי
  english_pob_choice: took me away
  chosen_spanish: me llevó lejos
  alternatives_spanish:
  - me tomó
  - me apartó
  lexicon: HALOT
  rationale: El hebreo continúa la idea de traslado. "Me llevó lejos" explicita el desplazamiento implícito en la secuencia sin añadir una coerción más fuerte de la que exige el texto.
- source_word: וָאֵלֵ֥ךְ
  english_pob_choice: I went
  chosen_spanish: yo fui
  alternatives_spanish:
  - anduve
  - partí
  lexicon: HALOT
  rationale: '"Fui" funciona como equivalente narrativo breve y natural en español. Conserva la primera persona y la progresión del relato.'
- source_word: מַר֙
  english_pob_choice: in bitterness
  chosen_spanish: con amargura
  alternatives_spanish:
  - en amargura
  - amargamente
  lexicon: HALOT
  rationale: El adjetivo hebreo describe el estado interior del profeta. "Con amargura" es idiomático en español y mantiene el matiz emocional sin diluirlo.
- source_word: בַּ/חֲמַ֣ת
  english_pob_choice: in the heat of
  chosen_spanish: en el ardor de
  alternatives_spanish:
  - en la ira de
  - en el furor de
  lexicon: HALOT
  rationale: חֵמָה puede expresar calor, ira o furor. "Ardor" preserva la metáfora térmica y deja visible la tensión afectiva que la POB inglesa también conservó con "heat".
- source_word: רוּחִ֔/י
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi ánimo
  - mi ser interior
  lexicon: HALOT
  rationale: Aquí רוּחַ se refiere al interior del profeta, no al Espíritu divino del inicio. "Mi espíritu" conserva la repetición léxica y la tensión entre la acción divina y la reacción humana.
- source_word: וְ/יַד יְהוָ֥ה עָלַ֖/י חָזָֽקָה
  english_pob_choice: while the hand of Yahweh was strong upon me
  chosen_spanish: mientras la mano de Yahvé estaba fuerte sobre mí
  alternatives_spanish:
  - y la mano de Yahvé era fuerte sobre mí
  - mientras la mano de Yahvé pesaba sobre mí
  lexicon: HALOT
  rationale: La expresión idiomática "mano de Yahvé" debe preservarse por su fuerza profética. "Estaba fuerte sobre mí" reproduce la idea de presión o influencia poderosa sin convertirla en una explicación interpretativa más allá del hebreo.
theological_decisions:
- issue: Referente de רוּחַ al inicio del versículo
  english_pob_reading: the divine Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - un espíritu
  - el viento
  rationale: El contexto inmediato describe transporte visionario y profético; por ello, la lectura más coherente es el Espíritu divino. La traducción conserva esa decisión sin cerrar innecesariamente el rango semántico del hebreo en el aparato de notas.
  doctrine_reference: Translation philosophy §1, §3
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, y la norma del proyecto pide "Yahvé" en el texto principal. Se mantiene el nombre propio divino y no se lo sustituye por una forma de ocultamiento.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de la expresión "la mano de Yahvé"
  english_pob_reading: the hand of Yahweh was strong upon me
  chosen_spanish_reading: la mano de Yahvé estaba fuerte sobre mí
  alternative_spanish_readings:
  - la mano de Yahvé pesaba sobre mí
  - la mano de Yahvé me oprimía
  rationale: La frase hebrea comunica una influencia intensa y potente sobre el profeta. "Estaba fuerte sobre mí" preserva la imagen corporal y evita convertir la expresión en una interpretación psicológica o doctrinal no explicitada por el texto.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Con base en el paquete fuente y el control de revisiones más reciente, no se requieren cambios respecto al acuerdo alto del revisor; la redacción española sigue la lectura principal sobre el Espíritu divino, conserva la ambigüedad léxica de חֵמָה con una nota, y mantiene Yahvé para el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" para יְהוָה, conforme al estándar del proyecto.
  - Se usó "Espíritu" con mayúscula para la lectura divina inicial y "mi espíritu" en la segunda ocurrencia para preservar la distinción semántica.
  - Se preservó la metáfora de la "mano de Yahvé" sin sustituirla por una explicación conceptual.
  - La traducción evita un tono arcaizante innecesario, pero conserva un registro bíblico digno y publicable.
