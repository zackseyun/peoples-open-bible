translation:
  language: es
  text: Después de haber recogido sus armas y recogido el botín de los enemigos, se dedicaron al sábado[a], bendiciendo abundantemente y dando gracias al Señor, que los había preservado hasta este día, habiéndoles señalado un comienzo de misericordia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se ocupaban con la observancia del sábado». La expresión griega περὶ τὸ σάββατον ἐγίνοντο es algo idiomática y puede referirse a que orientaban su atención a guardar el sábado conforme se acercaba o llegaba ese día.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiéndoles concedido un comienzo de misericordia» o «un primer signo de misericordia». El griego puede indicar que esta liberación marcó el inicio de un favor divino renovado.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁπλολογήσαντες
  english_pob_choice: had collected their weapons
  chosen_spanish: haber recogido sus armas
  alternatives_spanish:
  - haber juntado sus armas
  - haber reunido sus armas
  lexicon: LSJ
  rationale: El participio sugiere recoger/reunir armas tras la batalla. «Recogido sus armas» conserva la acción concreta sin añadir elementos ajenos al griego.
- source_word: τὰ σκῦλα ἐκδύσαντες
  english_pob_choice: stripped the spoils
  chosen_spanish: despojado el botín
  alternatives_spanish:
  - tomado el botín
  - arrancado el botín
  lexicon: LSJ
  rationale: «Despojado» mantiene la imagen vívida de ἐκδύσαντες y, con «el botín», comunica el acto de quitar los despojos al enemigo derrotado.
- source_word: τῶν πολεμίων
  english_pob_choice: from the enemies
  chosen_spanish: de los enemigos
  alternatives_spanish:
  - de sus enemigos
  - a los enemigos
  lexicon: LSJ
  rationale: El genitivo depende de «botín»; «de los enemigos» es la relación más directa y natural en español.
- source_word: περὶ τὸ σάββατον ἐγίνοντο
  english_pob_choice: they devoted themselves to the Sabbath
  chosen_spanish: se dedicaron al sábado
  alternatives_spanish:
  - se ocuparon del sábado
  - se entregaron al sábado
  lexicon: LSJ
  rationale: La expresión es idiomática y no describe un rito específico. «Se dedicaron al sábado» reproduce la idea de orientarse hacia la observancia del sábado sin sobreinterpretar el detalle.
- source_word: περισσῶς
  english_pob_choice: abundantly
  chosen_spanish: abundantemente
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: LSJ
  rationale: El adverbio intensifica la bendición y la gratitud; «abundantemente» conserva ese énfasis con un español claro.
- source_word: εὐλογοῦντες
  english_pob_choice: blessing
  chosen_spanish: bendiciendo
  alternatives_spanish:
  - alabando
  - diciendo bien de
  lexicon: LSJ
  rationale: «Bendiciendo» es el equivalente bíblico directo y funciona bien con Dios como destinatario implícito.
- source_word: ἐξομολογούμενοι
  english_pob_choice: giving thanks
  chosen_spanish: dando gracias
  alternatives_spanish:
  - confesando
  - alabando abiertamente
  lexicon: LSJ
  rationale: Aunque el verbo puede incluir la idea de confesar, aquí el contexto es de gratitud y alabanza a Dios por la liberación; «dando gracias» expresa mejor ese sentido.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  - al Maestro
  lexicon: LSJ
  rationale: En contexto bíblico-teológico, κύριος se vierte como «Señor». Aquí se refiere al Dios de Israel.
- source_word: τῷ διασώζοντι εἰς τὴν ἡμέραν ταύτην
  english_pob_choice: who had preserved them to this day
  chosen_spanish: que los había preservado hasta este día
  alternatives_spanish:
  - que los había salvado hasta este día
  - que los había traído a salvo hasta este día
  lexicon: LSJ
  rationale: El participio expresa acción preservadora continuada hasta el presente. «Preservado» mantiene esa idea con una formulación natural en español.
- source_word: ἀρχὴν ἐλέους τάξαντος αὐτοῖς
  english_pob_choice: having appointed for them the beginning of mercy
  chosen_spanish: habiéndoles asignado un comienzo de misericordia
  alternatives_spanish:
  - habiéndoles concedido un primer signo de misericordia
  - habiéndoles establecido el principio de misericordia
  lexicon: LSJ
  rationale: La frase es teológicamente cargada y algo abierta. «Un comienzo de misericordia» conserva la tensión de que la liberación es un inicio, no una restauración completa, y «asignado» refleja el matiz de τάξαντος como ordenar/establecer.
theological_decisions:
- issue: Sentido de ἀρχὴν ἐλέους τάξαντος αὐτοῖς
  english_pob_reading: This victory is described as the beginning of God's mercy toward the people, not the full restoration itself.
  chosen_spanish_reading: Esta liberación se presenta como un comienzo de misericordia de parte de Dios, no como la restauración completa.
  alternative_spanish_readings:
  - primer signo de misericordia
  - primera muestra de misericordia
  rationale: 'Conviene preservar la tensión: el texto no dice que la misericordia haya culminado, sino que ha comenzado. La traducción evita cerrar el sentido más de lo que permite el griego.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «occupied themselves with the Sabbath» por «devoted themselves to the Sabbath» para lograr una formulación más natural y exacta; la versión española adopta ese mismo sentido sin perder el matiz idiomático del griego. Se mantuvo la apertura semántica de ἀρχὴν ἐλέους τάξαντος αὐτοῖς.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto cuando el texto fuente lo requiera; aquí κύριος se refiere al Dios de Israel y, por el audit trail inglés, se traduce como «Señor» en esta fórmula doxológica.
  - Se mantuvo «misericordia» para ἔλεος, conservando el valor teológico de favor compasivo.
  - «Sábado» traduce σάββατον en sentido de observancia del día, sin convertirlo en una glosa litúrgica más específica.
  - No se introdujo lenguaje de «Cristo/Mesías» porque no aparece en el pasaje.
