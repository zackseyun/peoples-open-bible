lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Así era
  lexicon: HALOT
  rationale: El hebreo introduce una continuación/resumen del patrón descrito; «Así» conserva esa fuerza demostrativa de forma natural en español.
- source_word: יִהְיֶה תָמִיד
  english_pob_choice: it was continually
  chosen_spanish: era continuamente
  alternatives_spanish:
  - estaba continuamente
  - era siempre
  - permanecía constantemente
  lexicon: HALOT
  rationale: El imperfecto hebreo con תָמִיד expresa una condición habitual y duradera en el relato; «era continuamente» mantiene el valor durativo sin volverlo mecánico.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube aquella
  - esa nube
  lexicon: HALOT
  rationale: Es un sustantivo definido y conocido en el contexto inmediato del tabernáculo; «la nube» es la forma más natural y fiel en español.
- source_word: יְכַסֶּנּוּ
  english_pob_choice: would cover it
  chosen_spanish: lo cubría
  alternatives_spanish:
  - lo cubriría
  - lo cubría continuamente
  - lo cubría por completo
  lexicon: HALOT
  rationale: El verbo significa «cubrir, ocultar»; el sufijo de 3ms se entiende mejor como referente al tabernáculo/dwelling en el contexto, y el pretérito imperfecto español reproduce el hábito narrativo.
- source_word: וּמַרְאֵה אֵשׁ
  english_pob_choice: and the appearance of fire
  chosen_spanish: y la apariencia de fuego
  alternatives_spanish:
  - y lo que parecía fuego
  - y un aspecto de fuego
  lexicon: HALOT
  rationale: מַרְאֶה apunta a apariencia visible. «Apariencia de fuego» conserva el matiz de lo observable sin decidir más de lo que el hebreo afirma.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: por la noche
  alternatives_spanish:
  - de noche
  - durante la noche
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática; «por la noche» es claro y natural en español bíblico contemporáneo.
theological_decisions:
- issue: Referente del sufijo en יְכַסֶּנּוּ
  english_pob_reading: the cloud would cover it, referring to the tabernacle/dwelling
  chosen_spanish_reading: la nube lo cubría, refiriéndose al tabernáculo/la morada
  alternative_spanish_readings:
  - la nube lo cubría, refiriéndose a él
  - la nube lo cubría, refiriéndose a la tienda
  rationale: El contexto narrativo inmediato trata de la tienda/morada del testimonio; en español, «lo» evita personificar el referente y sigue mejor la lectura contextual del POB en inglés.
  doctrine_reference: Contexto narrativo de la presencia de Yahvé en el tabernáculo; no hay implicación doctrinal adicional más allá de la cobertura continua de la nube.
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más reciente del POB en inglés, que mantiene la lectura habitual y no requiere cambios textuales. Se conserva la ambigüedad controlada de מַרְאֵה al reflejarla como «apariencia», y se mantiene el referente neutro «lo» para el sufijo pronominal.
  spanish_consistency_notes:
  - Se usa «la nube» con artículo definido para reflejar el referente conocido del contexto.
  - Se conserva «apariencia de fuego» para no estrechar indebidamente el alcance de מַרְאֵה.
  - «Por la noche» mantiene el valor temporal adverbial sin arcaísmo.
  - El pronombre «lo» sigue la decisión contextual del POB y evita introducir una lectura masculina personal donde el contexto apunta al tabernáculo/morada.
