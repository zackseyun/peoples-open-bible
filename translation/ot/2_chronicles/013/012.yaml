id: 2CH.13.12
reference: 2 Chronicles 13:12
source:
  edition: WLC
  text: וְ/הִנֵּה֩ עִמָּ֨/נוּ בָ/רֹ֜אשׁ הָ/אֱלֹהִ֧ים וְ/כֹהֲנָ֛י/ו וַ/חֲצֹצְר֥וֹת הַ/תְּרוּעָ֖ה לְ/הָרִ֣יעַ עֲלֵי/כֶ֑ם בְּנֵ֣י יִשְׂרָאֵ֗ל אַל תִּלָּֽחֲמ֛וּ עִם יְהוָ֥ה אֱלֹהֵֽי אֲבֹתֵי/כֶ֖ם כִּי לֹ֥א תַצְלִֽיחוּ׀־־־־׃
translation:
  text: And behold[a], God is with us at our head, and his priests with the trumpets for the battle cry, to sound the alarm against you. Sons of Israel, do not fight against Yahweh, the God of your fathers, for you will not succeed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Children of Israel.' The Hebrew reads 'sons of Israel,' a masculine plural form used here as a direct address to the Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse marker drawing attention emphatically to what follows. 'Behold' preserves the rhetorical force of Abijah's speech better than a flatter 'look' or omission.
- source_word: עִמָּנוּ
  chosen: with us
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating divine presence on Judah's side.
- source_word: בָרֹאשׁ
  chosen: at our head
  alternatives:
  - as our leader
  - in front of us
  lexicon: HALOT
  rationale: Literally 'at the head.' Here it conveys leadership and vanguard position. 'At our head' keeps the metaphor while remaining natural English.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Definite reference to Israel's God in context; rendered simply 'God' in apposition with the preceding phrase.
- source_word: וְכֹהֲנָיו
  chosen: and his priests
  alternatives:
  - and the priests belonging to him
  lexicon: HALOT
  rationale: The 3ms suffix refers back to God. 'His priests' is concise and preserves the covenantal claim that these priests serve God.
- source_word: וַחֲצֹצְרוֹת הַתְּרוּעָה
  chosen: with the trumpets for the battle cry
  alternatives:
  - and the trumpets of alarm
  - and the signal trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת are cultic/silver trumpets; תְּרוּעָה denotes a loud signal/shout/alarm. The phrase refers to trumpets used to raise the war signal. 'For the battle cry' captures martial context while avoiding overtechnical wording.
- source_word: לְהָרִיעַ עֲלֵיכֶם
  chosen: to sound the alarm against you
  alternatives:
  - to raise a shout against you
  - to blow a signal against you
  lexicon: HALOT
  rationale: 'Hiphil of רוע here is causative: to raise/sound a signal. In military context ''sound the alarm against you'' communicates the hostile signal clearly in English.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: Sons of Israel
  alternatives:
  - Children of Israel
  - People of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine plural construct per project philosophy. It is a direct form of address to the northern Israelites, not merely a generic population label.
- source_word: אַל תִּלָּחֲמוּ
  chosen: do not fight
  alternatives:
  - do not wage war
  lexicon: HALOT
  rationale: Jussive prohibition. 'Do not fight' is direct and idiomatic.
- source_word: עִם יְהוָה
  chosen: against the LORD
  alternatives:
  - with the LORD
  lexicon: HALOT
  rationale: Although עִם often means 'with,' after לחם it idiomatically means 'fight against/with.' English requires 'against' to make the adversative sense explicit. YHWH is rendered 'the LORD' per doctrine.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - your fathers' God
  lexicon: HALOT
  rationale: Standard covenantal expression; this wording is both clear and traditional without being archaic.
- source_word: כִּי לֹא תַצְלִיחוּ
  chosen: for you will not succeed
  alternatives:
  - for you will not prosper
  - because you will not prevail
  lexicon: HALOT
  rationale: Hiphil of צלח often means prosper/succeed. In this military warning, 'succeed' is broad enough to include military outcome without overnarrowing to economics or simple victory.
