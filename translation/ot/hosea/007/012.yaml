id: HOS.7.12
reference: Hosea 7:12
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֣ר יֵלֵ֗כוּ אֶפְר֤וֹשׂ עֲלֵי/הֶם֙ רִשְׁתִּ֔/י כְּ/ע֥וֹף הַ/שָּׁמַ֖יִם אֽוֹרִידֵ֑/ם אַיְסִרֵ֕/ם כְּ/שֵׁ֖מַע לַ/עֲדָתָֽ/ם׃ס
translation:
  text: As they go[a], I will spread my net over them; like the birds of the heavens I will bring them down[b]. I will chasten them according to the report to their assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will chasten them' or 'I will punish them.' The Hebrew verb can denote corrective discipline or punitive chastisement.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. It may also mean 'according to what was proclaimed in their assembly' or 'as their congregation has heard.'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a temporal clause. 'As they go' preserves the immediate, ongoing sense better than the more punctiliar 'when they go.'
- source_word: יֵלֵכוּ
  chosen: they go
  alternatives:
  - they walk
  - they depart
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' In context of Ephraim's political/religious movement, 'go' is the most natural English rendering.
- source_word: אֶפְרוֹשׂ ... רִשְׁתִּי
  chosen: I will spread my net
  alternatives:
  - I will spread out my net
  - I will cast my net
  lexicon: HALOT
  rationale: פרשׂ with רשת conveys spreading a net over prey. 'Spread my net' is idiomatic and preserves the trapping image.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: The preposition על with a net naturally becomes 'over them' in English.
- source_word: כְּעוֹף הַשָּׁמַיִם
  chosen: like the birds of the heavens
  alternatives:
  - like birds of the sky
  - like the birds of the air
  lexicon: HALOT
  rationale: The singular collective עוֹף is well represented by plural 'birds.' 'Of the heavens' is slightly more formal but still natural, and it preserves the Hebrew imagery without importing the more traditional but less literal 'air.'
- source_word: אוֹרִידֵם
  chosen: I will bring them down
  alternatives:
  - I will bring them down to the ground
  - I will make them come down
  lexicon: HALOT
  rationale: ירד in Hiphil means to cause to go down. 'Bring them down' is concise and fits the bird-trapping metaphor.
- source_word: אַיְסִרֵם
  chosen: I will discipline them
  alternatives:
  - I will chasten them
  - I will bind them
  - I will punish them
  lexicon: HALOT
  rationale: יסר in Hiphil commonly means discipline/chasten. 'Discipline' best captures corrective judgment without overstating toward mere penal punishment. 'Bind' is possible only if connected to a different root, but the Masoretic pointing supports יסר.
- source_word: כְּשֵׁמַע
  chosen: according to the report
  alternatives:
  - according to what was heard
  - when they are heard of
  - as was proclaimed
  lexicon: HALOT
  rationale: שֵׁמַע denotes hearing/report/news. The phrase is difficult, but 'according to the report' preserves the noun sense and leaves the exact referent open.
- source_word: לַעֲדָתָם
  chosen: to their assembly
  alternatives:
  - to their congregation
  - against their assembly
  - for their community
  lexicon: HALOT
  rationale: עֵדָה is assembly/congregation. 'Assembly' is clear modern English and avoids over-ecclesial coloring. The prefixed ל can be rendered flexibly here; 'to their assembly' keeps the Hebrew form most transparently in a difficult clause.
