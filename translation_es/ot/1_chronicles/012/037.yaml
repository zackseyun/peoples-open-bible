translation:
  language: es
  text: Y de Aser, cuarenta mil que salían para el servicio militar, para ponerse en formación[a] para la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para alinearse para la batalla». El hebreo combina la idea de salir para el servicio militar con un verbo que significa ordenar o disponer en formación de combate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/אָשֵׁר
  english_pob_choice: And from Asher
  chosen_spanish: Y de Aser
  alternatives_spanish:
  - Y desde Aser
  - Y de la tribu de Aser
  lexicon: HALOT
  rationale: La preposición y la conjunción se expresan naturalmente como 'Y de'. Se conserva el nombre propio tribal 'Aser' sin expandir a 'tribu de' porque el contexto ya enumera contingentes tribales.
- source_word: יוֹצְאֵי
  english_pob_choice: who went out
  chosen_spanish: que salían
  alternatives_spanish:
  - que iban saliendo
  - que salieron
  - los que salían
  lexicon: HALOT
  rationale: El participio expresa a los que estaban saliendo o salían; en español, el imperfecto mantiene el valor de pertenencia al grupo de combatientes sin volverlo demasiado puntual.
- source_word: צָבָא
  english_pob_choice: for military service
  chosen_spanish: para el servicio militar
  alternatives_spanish:
  - para el ejército
  - para la guerra
  - para el servicio
  lexicon: HALOT
  rationale: '''Servicio militar'' comunica mejor en español la función organizada y apta para combate que ''ejército'' o ''guerra'' solos, preservando el matiz funcional del término.'
- source_word: לַ/עֲרֹךְ
  english_pob_choice: to array themselves
  chosen_spanish: para ordenarse
  alternatives_spanish:
  - para disponerse
  - para alinearse
  - para ponerse en orden
  lexicon: HALOT
  rationale: '''Ordenarse'' conserva la idea de disponerse en formación sin forzar una formulación más larga. En este contexto militar, evita perder el matiz de preparación táctica.'
- source_word: מִלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - para combatir
  lexicon: HALOT
  rationale: '''Batalla'' es la equivalencia más natural aquí y mantiene la concreción militar del hebreo en la combinación con לערך.'
- source_word: אַרְבָּעִים אָלֶף
  english_pob_choice: forty thousand
  chosen_spanish: cuarenta mil
  alternatives_spanish:
  - '40.000'
  lexicon: HALOT
  rationale: Traducción directa del número cardinal, sin cambios de estilo que alteren la sobriedad del registro.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió 'array themselves for battle' por sobre 'draw up for battle'; en español se reflejó con 'ordenarse para la batalla', manteniendo un tono formal y natural.
  spanish_consistency_notes:
  - Se mantuvo 'Aser' como transliteración del nombre tribal.
  - '''Servicio militar'' preserva la función de צָבָא en este contexto de reclutamiento/contingente.'
  - La nota [a] está anclada explícitamente en 'ordenarse' para cumplir la consistencia del marcador.
