translation:
  language: es
  text: Una mujer agraciada[a] obtiene honor; los hombres violentos obtienen riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una mujer de gracia se aferra al honor ... y los hombres violentos se aferran a la riqueza». El verbo hebreo en ambos miembros significa literalmente «sostener» o «aferrarse», pero aquí probablemente expresa la idea de asegurar u obtener.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת חֵן
  english_pob_choice: a gracious woman
  chosen_spanish: la mujer graciosa
  alternatives_spanish:
  - una mujer de gracia
  - una mujer amable
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente 'mujer de favor/gracia'. En español, 'graciosa' aquí conserva el rasgo de favor/gracia moral y relacional que el proverbio contrapone con la violencia y la riqueza; 'mujer de gracia' suena más literal pero menos natural.
- source_word: תִּתְמֹךְ
  english_pob_choice: obtains
  chosen_spanish: obtiene
  alternatives_spanish:
  - se aferra a
  - retiene
  - sostiene
  lexicon: HALOT
  rationale: El verbo básico es 'sostener/aferrar'. Como en el paralelo poético el sentido es llegar a poseer o asegurar algo, 'obtiene' comunica el resultado de modo idiomático en español sin perder la fuerza de apropiarse o alcanzar.
- source_word: כָּבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - estima
  lexicon: HALOT
  rationale: En literatura sapiencial, כבוד suele referirse al honor social o a la estima. 'Honor' mantiene ese valor y conserva el contraste con 'riqueza'.
- source_word: עָרִיצִים
  english_pob_choice: ruthless men
  chosen_spanish: los hombres violentos
  alternatives_spanish:
  - los hombres crueles
  - los tiranos
  lexicon: HALOT
  rationale: El término puede abarcar idea de violencia, crueldad u opresión. 'Hombres violentos' preserva el campo semántico amplio y suena natural en español; 'tiranos' sería demasiado específico.
- source_word: יִתְמְכוּ
  english_pob_choice: obtain
  chosen_spanish: obtienen
  alternatives_spanish:
  - se aferran a
  - retienen
  - sostienen
  lexicon: HALOT
  rationale: Se repite el mismo verbo en el segundo miembro. Como en el primero, aquí el sentido contextual es adquirir o asegurar lo que se busca; 'obtienen' conserva el paralelismo.
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: HALOT
  rationale: '''Riqueza'' es la equivalencia más clara y natural en español para la abundancia material del proverbio, y equilibra bien el paralelo con ''honor''.'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: conserva el paralelismo verbal, pero usa un español idiomático (''obtiene/obtienen'') porque el sentido contextual del verbo תִּתְמֹךְ / יִתְמְכוּ es asegurar o adquirir, no solo sostener físicamente. No hubo revisiones aplicadas en el antecedente inglés; el acuerdo de revisión fue alto y sin problemas.'
  spanish_consistency_notes:
  - Se mantuvo 'honor' y no 'gloria' para conservar el contraste sapiencial con 'riqueza'.
  - Se eligió 'mujer graciosa' como equivalente natural de 'a gracious woman', sin convertirlo en un comentario sobre apariencia.
  - '''Hombres violentos'' conserva el alcance semántico de עָרִיצִים sin restringirlo a una categoría política específica.'
  - La nota de pie de página preserva la alternativa literal de 'sostener' para reflejar la tensión léxica documentada en el inglés POB.
