translation:
  language: es
  text: Él da alimento a los animales[a], y a los polluelos de cuervo[b] que claman[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las bestias».
    reason: lexical_alternative
  - marker: b
    text: O «a las crías del cuervo»; más literalmente, «a los hijos del cuervo».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «que llaman»; el texto no dice explícitamente a quién claman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹתֵן
  english_pob_choice: He gives
  chosen_spanish: Él da
  alternatives_spanish:
  - Él provee
  - da
  lexicon: HALOT
  rationale: El participio qal se entiende de manera habitual y presente en el contexto de alabanza; en español, «Él da» conserva la acción continua con una forma natural y sobria.
- source_word: לִבְהֵמָה
  english_pob_choice: to the animals
  chosen_spanish: a los animales
  alternatives_spanish:
  - a las bestias
  - al ganado
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animal/fauna en general; como el paralelismo con los cuervos no restringe a ganado doméstico, «animales» comunica mejor el alcance sin empobrecer el término.
- source_word: לַחְמָהּ
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - pan
  - comida
  lexicon: HALOT
  rationale: Aunque literalmente es «su pan», aquí el sentido es el sustento dado a los animales. «Alimento» conserva la idea de provisión sin inducir una lectura demasiado literal de pan.
- source_word: לִבְנֵי עֹרֵב
  english_pob_choice: to the young ravens
  chosen_spanish: a los polluelos de cuervo
  alternatives_spanish:
  - a los jóvenes cuervos
  - a los hijos del cuervo
  lexicon: HALOT
  rationale: בְּנֵי + nombre de animal suele indicar sus crías. «Polluelos de cuervo» es idiomático en español y mantiene la imagen de dependencia filial.
- source_word: אֲשֶׁר יִקְרָאוּ
  english_pob_choice: that cry out
  chosen_spanish: que claman
  alternatives_spanish:
  - que llaman
  - que gritan
  lexicon: HALOT
  rationale: קרא puede significar llamar o clamar; en este salmo, «claman» conserva el tono expresivo y no añade explícitamente un destinatario, como en el hebreo y en la POB inglesa.
theological_decisions:
- issue: Si especificar el destinatario del clamor de los cuervos
  english_pob_reading: 'Leave the object implicit: ''that cry out'''
  chosen_spanish_reading: 'Dejar implícito el destinatario: «que claman»'
  alternative_spanish_readings:
  - que claman a él
  - que claman a Dios
  rationale: El hebreo no menciona explícitamente a quién claman. Mantener la omisión evita introducir una precisión teológica no expresada en el texto, aunque el contexto de providencia divina la sugiera.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa coinciden en una lectura estable: el participio נתן funciona con sentido habitual; בְּהֵמָה se entiende de manera amplia; לֶחֶם se traslada por su sentido general de sustento; y אֲשֶׁר יִקְרָאוּ deja indeterminado el destinatario del clamor. No se registran revisiones posteriores que alteren esa base.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito sin añadirlo, siguiendo la sintaxis del hebreo y la decisión inglesa de no explicitar el destinatario del clamor.
  - Se usa «alimento» en singular colectivo por naturalidad castellana y por equivalencia semántica con לַחְמָהּ.
  - «Polluelos de cuervo» evita la literalidad dura de «hijos del cuervo» sin perder la estructura filial del hebreo.
