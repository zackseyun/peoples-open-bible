translation:
  language: es
  text: 'Entonces enviaron y reunieron a todos los señores[a] de los filisteos, y dijeron: «Saquen el arca del Dios de Israel y que vuelva a su lugar, para que no nos mate a nosotros y a nuestro pueblo». Porque había un pánico mortal[b] en toda la ciudad; la mano de Dios[c] pesaba muchísimo allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernantes», «príncipes». El término hebreo designa a los jefes filisteos.
    reason: lexical_alternative
  - marker: b
    text: O «una confusión de muerte», «un tumulto mortal»; el hebreo describe una agitación intensa con amenaza de muerte.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «la mano de Dios pesaba muchísimo allí», una metáfora de intenso juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי
  english_pob_choice: lords
  chosen_spanish: señores
  alternatives_spanish:
  - gobernantes
  - príncipes
  lexicon: HALOT
  rationale: El término designa a los dirigentes filisteos reconocidos. «Señores» conserva el rango político con naturalidad en español y evita volverlo demasiado genérico.
- source_word: שַׁלְּחוּ
  english_pob_choice: Send away
  chosen_spanish: Saquen
  alternatives_spanish:
  - Envíen
  - Despídanlo
  lexicon: HALOT
  rationale: El imperativo pide retirar el arca de la ciudad; «Saquen» comunica mejor la fuerza expulsiva que un simple «envién».
- source_word: אֲרוֹן אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the ark of the God of Israel
  chosen_spanish: el arca del Dios de Israel
  alternatives_spanish:
  - el arca del Dios de Israel
  - el arca de Israel, el Dios de Israel
  lexicon: HALOT
  rationale: «Arca del Dios de Israel» preserva la relación posesiva del hebreo y el peso teológico de que el arca pertenece al Dios de Israel.
- source_word: וְיָשֹׁב לִמְקֹמוֹ
  english_pob_choice: and let it return to its place
  chosen_spanish: que vuelva a su lugar
  alternatives_spanish:
  - que regrese a su lugar
  - y que vuelva a su lugar
  lexicon: HALOT
  rationale: El jussivo después del imperativo se expresa de forma natural con «que vuelva». «Su lugar» mantiene la referencia al sitio propio del arca.
- source_word: וְלֹא יָמִית אֹתִי וְאֶת עַמִּי
  english_pob_choice: so that it may not kill us and our people
  chosen_spanish: para que no nos mate a nosotros y a nuestro pueblo
  alternatives_spanish:
  - para que no nos mate y a nuestro pueblo
  - para que no mate a mí y a mi pueblo
  lexicon: HALOT
  rationale: El hebreo tiene sufijos singulares, pero el contexto habla de una voz representativa/plural. En español, «nos» y «nuestro pueblo» evita la discordancia y comunica el sentido contextual sin perder el tono de la súplica.
- source_word: מְהוּמַת מָוֶת
  english_pob_choice: a deadly panic
  chosen_spanish: un pánico mortal
  alternatives_spanish:
  - una confusión de muerte
  - un tumulto mortal
  lexicon: HALOT
  rationale: La expresión apunta a terror/convulsión con efecto letal. «Pánico mortal» es idiomático y conserva la intensidad semántica de la frase.
- source_word: בְּכָל הָעִיר
  english_pob_choice: throughout the whole city
  chosen_spanish: en toda la ciudad
  alternatives_spanish:
  - por toda la ciudad
  - en toda la urbe
  lexicon: HALOT
  rationale: «En toda la ciudad» expresa la amplitud distributiva con naturalidad en español.
- source_word: כָּבְדָה מְאֹד יַד הָאֱלֹהִים
  english_pob_choice: the hand of God was very heavy
  chosen_spanish: la mano de Dios estaba muy pesada
  alternatives_spanish:
  - la mano de Dios pesaba mucho
  - la mano de Dios era muy pesada
  lexicon: HALOT
  rationale: Se conserva la metáfora de la «mano» divina y el matiz de carga/juzgamiento. «Estaba muy pesada» sigue de cerca la construcción hebrea y mantiene el impacto de la imagen.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la divinidad
  lexicon: HALOT
  rationale: En este contexto se refiere al Dios de Israel ya nombrado en el versículo, por lo que «Dios» es la forma más natural y fiel en español.
theological_decisions:
- issue: Preservar la metáfora de la mano divina en vez de explicitarla solo como poder o castigo
  english_pob_reading: the hand of God was very heavy there
  chosen_spanish_reading: la mano de Dios estaba muy pesada allí
  alternative_spanish_readings:
  - el poder de Dios oprimía fuertemente allí
  - Dios los castigó severamente allí
  rationale: El hebreo usa una imagen antropomórfica clásica de acción judicial divina. Mantener «la mano de Dios» conserva la textura bíblica y evita desactivar la metáfora.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Resolver el cambio entre la forma singular del hebreo y el referente contextual plural de la voz que habla
  english_pob_reading: so that it may not kill us and our people
  chosen_spanish_reading: para que no nos mate a nosotros y a nuestro pueblo
  alternative_spanish_readings:
  - para que no me mate a mí y a mi pueblo
  - para que no nos mate
  rationale: El texto hebreo tiene sufijos singulares, pero el contexto del discurso colectivo favorece una referencia plural en español. Se conserva la intención narrativa sin perder la función representativa del hablante.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que pasó de una lectura singular a una plural en la frase «us and our people». En español se adoptó la lectura plural contextual desde el inicio, y se mantuvo la metáfora de «la mano de Dios» conforme al último estado estable del texto inglés y a la evidencia hebrea.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el Tetragrámaton; aquí el texto dice אֱלֹהִים, por lo que corresponde «Dios».
  - Se mantiene «arca» para אֲרוֹן y no se sustituye por un término eclesiástico más interpretativo.
  - Se conserva la metáfora bíblica de la mano divina sin traducirla por una abstracción, para respetar la imaginería del hebreo.
  - «Señores» refleja el rango de סַרְנֵי en un registro natural para lectores hispanohablantes.
  - La puntuación intenta reflejar el discurso directo y la causalidad del hebreo con estilo publicable en español.
