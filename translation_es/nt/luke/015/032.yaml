translation:
  language: es
  text: Pero era necesario celebrar y alegrarse[a], porque este hermano tuyo estaba muerto y ha vuelto a la vida[b]; estaba perdido y ha sido hallado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «era apropiado celebrar y alegrarse».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «vivió»; aquí la expresión es probablemente metafórica, de restauración dentro de la parábola.
    reason: theological_note
  - marker: c
    text: O «fue hallado».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐφρανθῆναι
  english_pob_choice: to celebrate
  chosen_spanish: celebrar
  alternatives_spanish:
  - hacer fiesta
  - regocijarse
  lexicon: BDAG
  rationale: El infinitivo en esta construcción impersonal con ἔδει expresa lo que era debido o apropiado; en español, «celebrar» comunica bien el matiz festivo del contexto de la parábola sin caer en una paráfrasis amplia.
- source_word: χαρῆναι
  english_pob_choice: rejoice
  chosen_spanish: alegrarse
  alternatives_spanish:
  - regocijarse
  - gozarse
  lexicon: BDAG
  rationale: Conserva el segundo verbo de gozo, distinto de «celebrar», para reflejar la duplicación enfática del griego. «Alegrarse» es natural en español y mantiene un registro digno.
- source_word: ἔδει
  english_pob_choice: it was necessary
  chosen_spanish: era necesario
  alternatives_spanish:
  - era fitting
  - había que
  lexicon: BDAG
  rationale: La impersonalidad y la fuerza de obligación se preservan mejor con «era necesario». En español suena sobrio y no introduce un sujeto inexistente.
- source_word: ὁ ἀδελφός σου οὗτος
  english_pob_choice: this brother of yours
  chosen_spanish: este hermano tuyo
  alternatives_spanish:
  - tu hermano este
  - este hermano de ti
  lexicon: BDAG
  rationale: «Este» retiene el demostrativo enfático, y el posesivo pospuesto «tuyo» refleja el griego σου sin perder naturalidad en español.
- source_word: νεκρὸς ἦν
  english_pob_choice: was dead
  chosen_spanish: estaba muerto
  alternatives_spanish:
  - era muerto
  - estuvo muerto
  lexicon: BDAG
  rationale: Para el estado descrito por el predicado, «estaba muerto» es más idiomático en español y preserva el contraste vida/muerte del pasaje.
- source_word: ἔζησεν
  english_pob_choice: has come to life again
  chosen_spanish: ha vuelto a la vida
  alternatives_spanish:
  - ha vivido de nuevo
  - ha cobrado vida otra vez
  lexicon: BDAG
  rationale: El griego dice literalmente «vivió», pero en el paralelismo de la parábola la idea es de restauración. «Ha vuelto a la vida» comunica esa tensión sin resolverla doctrinalmente y mantiene el eco con la frase anterior.
- source_word: ἀπολωλὼς
  english_pob_choice: was lost
  chosen_spanish: estaba perdido
  alternatives_spanish:
  - había estado perdido
  - se había perdido
  lexicon: BDAG
  rationale: El participio perfecto describe un estado resultante. «Estaba perdido» preserva ese estado y es la forma más natural en español para la imagen de la parábola.
- source_word: εὑρέθη
  english_pob_choice: has been found
  chosen_spanish: ha sido hallado
  alternatives_spanish:
  - ha sido encontrado
  - fue hallado
  lexicon: BDAG
  rationale: «Hallado» mantiene un registro bíblico claro sin ocultar la pasiva del griego. La forma compuesta conserva la relevancia presente del hallazgo, como en la decisión inglesa.
theological_decisions:
- issue: El sentido metafórico de ἔζησεν dentro de la parábola
  english_pob_reading: has come to life again
  chosen_spanish_reading: ha vuelto a la vida
  alternative_spanish_readings:
  - ha vivido de nuevo
  - ha cobrado vida otra vez
  rationale: La parábola usa lenguaje de muerte/vida para expresar restauración y regreso. Se conserva esa tensión metafórica sin convertirla en una afirmación doctrinal sobre resurrección corporal en este punto del relato.
  doctrine_reference: Mantener la tensión literaria y narrativa del texto; no resolverla por anticipado.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente mantuvo sin cambios la lectura óptima-equivalente. La versión española sigue esa línea: conserva la duplicación verbal, la fuerza impersonal de ἔδει, y el paralelismo muerto/vivo, perdido/hallado, sin añadir explicaciones al texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefiere «esclavo» solo cuando el original lo exija; en este versículo no aplica.
  - «Mesías/Cristo» no aparece aquí; no hay decisión terminológica correspondiente.
  - La pasiva compuesta «ha sido hallado» mantiene la voz pasiva del griego y la relevancia narrativa presente.
  - La duplicación «celebrar y alegrarse» preserva dos verbos cercanos como en el griego, en vez de fusionarlos en una sola idea.
