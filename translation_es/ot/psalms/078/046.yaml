- from: Él dio su produce[a] a la langosta devoradora, y su trabajo[b] a la langosta swarming.
  to: Él dio sus cosechas[a] a la langosta devoradora, y su labor[b] a la langosta migratoria.
  rationale: Se corrige el anglicismo «swarming» con «migratoria», una manera natural en español de distinguir אַרְבֶּה sin sobreprecisar taxonomía. Se reemplaza «su produce» por «sus cosechas», que expresa bien יְבוּלָם en español natural. Se conservan la concisión y el paralelismo del hebreo, y se ajustan las notas para reflejar las alternativas léxicas relevantes del expediente inglés.
