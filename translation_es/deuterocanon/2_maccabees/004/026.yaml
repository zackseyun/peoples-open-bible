revisions:
- from: Y Jasón[a], que había suplantado a su propio hermano, habiendo sido él mismo suplantado por otro, huyó y se fue al país de los amonitas.
  to: Y Jasón[a], que había suplantado a su propio hermano, después de ser él mismo suplantado por otro, huyó y se refugió en la tierra de los amonitas.
  rationale: La revisión mantiene intacto el sentido fuente y la decisión léxica principal «suplantar», pero mejora la naturalidad del español. «Después de ser» evita el calco pesado del gerundio compuesto pasivo; «se refugió en» expresa mejor la huida hacia un territorio; y «la tierra de los amonitas» corresponde mejor al registro bíblico y a χώρα. Se conserva la nota por la alternativa «minado» y por la observación sobre la repetición del mismo verbo.
