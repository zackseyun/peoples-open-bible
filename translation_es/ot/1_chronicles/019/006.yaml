review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: los amonitas reconocen que se volvieron ofensivos para David, y Hanún con los amonitas envían plata para contratar fuerzas de Aram-naharaim, Aram-maacá y Zobá. Sin embargo, hay varios ajustes léxicos y de estilo necesarios para reflejar mejor el registro militar y la naturalidad del español bíblico.'
  spanish_quality_summary: 'El texto es legible, pero tiene problemas de ortografía y de elección léxica: ''ammonitas'' no es la forma española preferible; ''alquilar'' suena impropio para contratar tropas; y la nota al pie introduce una paráfrasis literal poco precisa (''habían hecho mal olor''). También conviene uniformar la transliteración de nombres propios con minúscula tras guion.'
  glossary_alignment: 'No hay términos teológicos mayores en juego. Se debe alinear mejor la onomástica y la terminología militar: ''amonitas'' en vez de ''ammonitas''; ''contratar'' en vez de ''alquilar'' para לִשְׂכֹּר; mantener ''Hanún'', ''Aram-naharaim'', ''Aram-maacá'' y ''Zobá''. ''Carros y jinetes'' es aceptable y fiel al hebreo.'
  issues:
  - severity: medium
    issue: Uso de 'ammonitas'
    rationale: En español bíblico general y neutral la forma preferible es 'amonitas'. La grafía con doble m resulta ajena y menos natural para lectores hispanos.
  - severity: medium
    issue: Uso de 'alquilar' para לִשְׂכֹּר en contexto militar
    rationale: Aunque literalmente puede relacionarse con alquiler/contratación, en este contexto de mercenarios y tropas 'contratar' expresa mejor el sentido y evita una lectura material impropia.
  - severity: low
    issue: Nota al pie literal poco precisa
    rationale: 'La explicación ''habían hecho mal olor'' no refleja bien la forma reflexiva/idiomática hebrea. Es mejor conservar la nota auditada: literalmente, ''se habían hecho apestosos'' a David, un modismo para volverse ofensivos o detestables.'
  - severity: low
    issue: Capitalización/transliteración inconsistente en topónimo compuesto
    rationale: '''Aram-Maacá'' sería más uniforme como ''Aram-maacá'' si se sigue el modelo inglés transliterado compuesto; esto mejora consistencia editorial.'
  revised_spanish_text: Cuando los amonitas vieron que se habían hecho odiosos[a] a David, Hanún y los amonitas enviaron mil talentos de plata para contratar para sí carros y jinetes de Aram-naharaim, de Aram-maacá y de Zobá.
  revised_footnotes:
