- from: 'David consultó a Dios[a], diciendo: «¿Debo subir contra los filisteos, y los entregarás en mi mano?» Yahvé le respondió: «Sube, y yo los entregaré en tu mano».'
  to: 'David consultó a Dios[a], diciendo: «¿Debo subir contra los filisteos, y los entregarás en mis manos?». Y Yahvé le dijo: «Sube, y yo los entregaré en tus manos».'
