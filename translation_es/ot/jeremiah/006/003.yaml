translation:
  language: es
  text: A ella vendrán pastores con sus rebaños; levantarán tiendas contra ella alrededor de ella; cada uno pastoreará su lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cada uno pastoreará su mano». La expresión es idiomática y probablemente significa que cada uno pastoreará o consumirá la zona que le corresponde.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיהָ
  english_pob_choice: To her
  chosen_spanish: A ella
  alternatives_spanish:
  - Contra ella
  - Hacia ella
  lexicon: HALOT
  rationale: El hebreo marca dirección con אֶל; el contexto hostil se desarrolla después con עָלֶיהָ. «A ella» conserva el sentido básico de acercamiento sin anticipar demasiado la hostilidad.
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores de ganado
  - herederos
  lexicon: HALOT
  rationale: Se preserva la metáfora pastoral del hebreo y del texto inglés auditado. «Pastores» es el equivalente natural en español y mantiene la imagen que continúa con «rebaños» y «pastoreará».
- source_word: וְעֶדְרֵיהֶם
  english_pob_choice: with their flocks
  chosen_spanish: con sus rebaños
  alternatives_spanish:
  - y sus rebaños
  - con sus tropas
  lexicon: HALOT
  rationale: La preposición y el sustantivo permiten una lectura de acompañamiento. «Rebaños» conserva la metáfora pastoral; «tropas» explicitaría el referente, pero iría más allá de la forma visible del hebreo.
- source_word: תָּקְעוּ
  english_pob_choice: will pitch
  chosen_spanish: levantarán
  alternatives_spanish:
  - plantarán
  - acamparán
  lexicon: HALOT
  rationale: Con «tiendas» como objeto, el verbo expresa la acción de instalar un campamento. «Levantarán tiendas» es natural en español y mantiene la imagen militar/nomádica.
- source_word: עָלֶיהָ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - encima de ella
  lexicon: HALOT
  rationale: En contexto de asedio, עַל tiene fuerza adversativa. «Contra ella» hace explícita la oposición sin perder el valor relacional del hebreo.
- source_word: אֹהָלִים סָבִיב
  english_pob_choice: tents ... all around
  chosen_spanish: tiendas ... alrededor
  alternatives_spanish:
  - campamentos ... alrededor
  - tiendas en derredor
  lexicon: HALOT
  rationale: «Alrededor» reproduce la idea de cerco y rodeo. «Tiendas» conserva el objeto concreto del texto y sugiere el despliegue de un sitio.
- source_word: רָעוּ
  english_pob_choice: will pasture
  chosen_spanish: pastoreará
  alternatives_spanish:
  - apacentará
  - se alimentará
  lexicon: HALOT
  rationale: Se mantiene el verbo pastoral para conservar la continuidad de la metáfora. En español, «pastoreará» comunica bien la acción figurada sin domesticarla.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: El distributivo hebreo funciona idiomáticamente. «Cada uno» es claro y natural en español, y evita una redundancia innecesaria con «pastores».
- source_word: אֶת יָדוֹ
  english_pob_choice: his own place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su propia parte
  - su propia porción
  - su mano
  lexicon: HALOT
  rationale: El inglés auditado ya interpreta el modismo en sentido idiomático. En español, «su lugar» comunica la idea de la zona asignada o ocupada por cada uno, manteniendo la ambigüedad controlada del original sin literalismo oscuro.
translation_notes:
  revision_awareness: El inglés POB revisó la última cláusula de «his own portion» a «his own place» para acercarse más al hebreo idiomático. La versión española sigue ese ajuste con «su lugar», conservando el valor idiomático y la naturalidad sintáctica. En el resto del versículo, la estructura y la imaginería pastoral coinciden estrechamente con el texto auditado.
  spanish_consistency_notes:
  - Se conservó el campo léxico pastoral con «pastores», «rebaños» y «pastoreará» para reflejar la metáfora unificada del hebreo.
  - Se usó «contra ella» para explicitar el matiz hostil de עָלֶיהָ en contexto militar.
  - La última frase se tradujo de forma idiomática como «su lugar» para evitar un calco opaco de «su mano», tal como ya hizo el texto inglés auditado con «his own place».
