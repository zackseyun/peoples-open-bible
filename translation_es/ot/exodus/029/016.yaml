review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia verbal y el sentido general del hebreo: matar ritualmente el carnero, tomar su sangre y aplicarla alrededor del altar. Sin embargo, dos elecciones no preservan con suficiente precisión el matiz documentado en la evidencia fuente y en el rastro POB: זָרַק se describe mejor como una acción más enérgica que «rociar», y עַל הַמִּזְבֵּחַ en este contexto sacrificial queda mejor como aplicación «contra/al altar» que simplemente «sobre el altar».'
  spanish_quality_summary: El español es claro y legible, pero «rociarás sobre el altar» suaviza demasiado la acción ritual y puede sonar como una aspersión ligera. «Salpicarás contra el altar» o formulación equivalente suena más precisa y todavía natural en español eclesial moderno. El resto del verso es fluido y digno.
  glossary_alignment: No hay conflictos con los términos doctrinales del proyecto. «Carnero» es correcto para הָאָיִל. La principal cuestión léxica es mantener la fuerza de זָרַק y el valor espacial de עַל con el altar en este contexto.
  issues:
  - severity: high
    issue: «la rociarás» debilita demasiado זָרַק
    rationale: La evidencia auditada explica que el verbo denota una aplicación ritual más vigorosa que el español común «rociar» y el inglés final escogió «splash». En español, «salpicarás» preserva mejor esa fuerza sin volverse torpe.
  - severity: high
    issue: «sobre el altar» no refleja bien la aplicación contra el altar
    rationale: La decisión inglesa documenta «against the altar» para comunicar que la sangre se aplica a sus lados/superficie, no meramente encima. «Contra el altar» expresa mejor ese valor en español.
  - severity: medium
    issue: La nota al pie queda innecesariamente subordinada a una traducción principal menos precisa
    rationale: La alternativa más fiel está relegada a la nota, cuando debería estar en el texto principal. La nota puede conservar la opción más tradicional «rociarás» como alternativa si se desea.
  revised_spanish_text: Y sacrificarás el carnero, y tomarás su sangre y la salpicarás contra el altar, todo alrededor.[a]
  revised_footnotes:
  - marker: a
    text: O «la rociarás sobre el altar, todo alrededor». El verbo hebreo puede denotar una aplicación ritual más enérgica que el español ordinario «rociar».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a «salpicarás» para reflejar mejor la fuerza ritual de זָרַק, y se cambia «sobre el altar» por «contra el altar» para preservar el matiz espacial documentado en el rastro POB. La alternativa más tradicional se conserva en nota.
