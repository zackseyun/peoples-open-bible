revisions:
- from: Pero la madre fue especialmente admirable y digna[a] de memoria honorable; al ver perecer a sus siete hijos en un solo día, lo soportó con valentía por sus esperanzas en Yahvé.
  to: Pero la madre era especialmente admirable y digna[a] de honorable memoria; al ver perecer a sus siete hijos en un solo día, lo soportó con valentía por las esperanzas que tenía puestas en Yahvé.
  rationale: 'Se hicieron solo ajustes de estilo y naturalidad: «era» en lugar de «fue» para una caracterización narrativa más idiomática; «digna de honorable memoria» para mejor fluidez; y «por las esperanzas que tenía puestas en Yahvé» para conservar el plural griego y expresar con naturalidad la esperanza dirigida a Dios. No hay cambio doctrinal ni de sentido.'
