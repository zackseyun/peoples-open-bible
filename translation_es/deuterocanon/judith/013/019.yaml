review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: fórmula doxológica («bendito»), creación de «los cielos y la tierra», y la agencia divina al orientar a Judit hacia el golpe contra la cabeza del líder enemigo. Sin embargo, «te dirigió para herir» suena menos natural en español y no representa tan bien la combinación de κατεύθυνέν + εἰς como una forma más idiomática como «te guió a herir» o «te encaminó a herir».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Yahvé Dios» sin artículo resulta algo duro en español bíblico corriente, y «te dirigió para herir» suena calcado. «Jefe» comunica la idea, pero «gobernante» o «líder» se alinea mejor con ἄρχοντος en registro bíblico. También hay un problema tipográfico en la nota al pie («hiri­miento»).
  glossary_alignment: Se respeta bien la convención del proyecto al usar «Yahvé». «Bendito», «creó», «los cielos y la tierra» y «enemigos» están bien alineados. La principal mejora es ajustar κατεύθυνέν a un español más natural («guió») y ἄρχοντος a «gobernante», que preserva mejor el matiz de ruler sin rebajarlo a mero «jefe».
  issues:
  - severity: medium
    issue: «te dirigió para herir» suena poco natural en español
    rationale: Aunque es cercano al griego, en español moderno bíblico «dirigir a alguien para herir» resulta forzado. «Te guió a herir» conserva la agencia divina y el sentido telic de εἰς con mejor fluidez.
  - severity: medium
    issue: «del jefe» es menos preciso para ἄρχοντος
    rationale: ἄρχων denota gobernante o dirigente. «Jefe» puede sonar demasiado coloquial o militarmente limitado; «gobernante» preserva mejor el valor político y narrativo.
  - severity: low
    issue: «Yahvé Dios» carece de artículo y suena algo abrupto
    rationale: «Y bendito es Yahvé Dios» es comprensible, pero «Y bendito es Yahvé, Dios…» mejora la lectura appositiva en español y refleja mejor Κύριος ὁ θεός.
  - severity: low
    issue: Error tipográfico en la nota al pie
    rationale: «hiri­miento» contiene una grafía defectuosa; debe corregirse a «herimiento» o reformularse mejor.
  revised_spanish_text: Y bendito es Yahvé, Dios[a], que creó los cielos y la tierra, que te guió a herir la cabeza del gobernante de nuestros enemigos.
  revised_footnotes:
  - marker: a
    text: 'O «te guió para el herimiento de la cabeza del gobernante de nuestros enemigos». El griego es más literal: «te dirigió hacia/para una herida de la cabeza».'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la fidelidad idiomática al griego y la naturalidad del español: «te guió» expresa mejor κατεύθυνέν en contexto; «gobernante» representa más precisamente ἄρχοντος; y la puntuación en «Yahvé, Dios» aclara la aposición. También se corrigió la nota al pie.'
