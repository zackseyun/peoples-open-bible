review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia y el sentido básico del hebreo: Jacob va a Raquel también, la ama más que a Lea, y continúa sirviendo siete años más. Sin embargo, hay dos puntos de ajuste para mayor fidelidad y español natural: el hebreo idiomático ויבא אל en contexto matrimonial se expresa mejor en español como «se unió a» o similar, no «entró a», y la nota al pie actual no corresponde al lugar marcado en el texto, pues comenta מִלֵּאָה pero está anclada en «Raquel».'
  spanish_quality_summary: El texto es generalmente claro, pero «entró también a Raquel» suena poco natural en español bíblico moderno y puede resultar torpe o ambiguo. «Sirvió con él» es algo rígido pero defendible porque preserva עִמּוֹ; no obstante, en combinación con el resto de la frase sigue siendo legible. La nota al pie necesita reanclarse al segmento comparativo para evitar confusión.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. «Raquel», «Lea» y el lenguaje de servicio están bien. La decisión de conservar el matiz comparativo de מִן como «más que a Lea» concuerda con la auditoría inglesa.
  issues:
  - severity: medium
    issue: «entró también a Raquel» es una formulación poco natural para el modismo matrimonial hebreo
    rationale: Aunque intenta preservar el eufemismo de בוא + אל, en español «entrar a una persona» no funciona bien idiomáticamente. «Se unió también a Raquel» mantiene el carácter sobrio/eufemístico y comunica la consumación matrimonial con mayor naturalidad.
  - severity: medium
    issue: La nota al pie está anclada en «Raquel» pero comenta la frase comparativa «más que a Lea»
    rationale: El marcador debe aparecer en el lugar exacto del texto al que la nota se refiere. Tal como está, induce a pensar que la nota explica «Raquel» o la acción de entrar, no la comparación de amor.
  revised_spanish_text: Así que se unió también a Raquel, y amó a Raquel más que a Lea[a]; y sirvió con él por otros siete años.
  revised_footnotes:
  - marker: a
    text: 'O: «amó a Raquel antes que a Lea» o «en lugar de Lea». El hebreo puede marcar comparación; aquí el sentido más natural es «más que a Lea».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el modismo matrimonial a un español más natural y digno («se unió a») sin perder el eufemismo del hebreo, y se corrige la ubicación de la nota al pie para que explique correctamente la frase comparativa מִלֵּאָה.
