revisions:
- from: Quien guarda su boca y su lengua, guarda su vida[a] de las angustias.
  to: Quien guarda su boca y su lengua guarda su vida[a] de problemas.
  rationale: Se mantiene la fidelidad al hebreo y a la auditoría inglesa, pero se reemplaza «angustias» en el texto principal por «problemas» para lograr un español más natural con «guarda su vida», mientras se conserva en la nota la alternativa más literal ligada a «angustias». También se corrige la redacción de la nota para que suene idiomática en español.
  reviewer_model: gpt-5.4
