    text: Or 'from across the Euphrates'; the Hebrew reads simply 'from beyond the River.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'Syria/Syrians'; Hebrew 'Aram/Arameans.'
    reason: lexical_alternative
