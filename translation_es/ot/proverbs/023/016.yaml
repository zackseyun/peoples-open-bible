translation:
  language: es
  text: y mi ser más íntimo se alegrará cuando tus labios hablen lo recto[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «mis riñones», hebraísmo que designa el yo interior o las emociones más profundas.
    reason: cultural_note
  - marker: b
    text: 'O: «cuando tus labios hablen lo que es justo / correcto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַעְלֹזְנָה
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - exultará
  - se gozará
  lexicon: HALOT
  rationale: El verbo expresa gozo intenso o exultación. En español, «se alegrará» comunica bien la respuesta afectiva futura sin sonar arcaico, y conserva el tono natural del contexto sapiencial.
- source_word: כִלְיוֹתַי
  english_pob_choice: my inmost being
  chosen_spanish: mi ser más íntimo
  alternatives_spanish:
  - mis riñones
  - mi interior
  - mis entrañas
  lexicon: HALOT
  rationale: Literalmente significa «mis riñones», pero en español esa imagen resulta opaca. «Mi ser más íntimo» transmite el sentido antropológico de profundidad emocional sin reducirlo indebidamente a «corazón».
- source_word: בְּדַבֵּר
  english_pob_choice: when ... speak
  chosen_spanish: cuando ... hablen
  alternatives_spanish:
  - al hablar
  - mientras hablen
  - en hablar
  lexicon: HALOT
  rationale: La preposición con infinitivo introduce aquí una relación temporal. En español, «cuando» reproduce con claridad la idea de ocasión temporal y encaja de forma idiomática con el verbo principal.
- source_word: שְׂפָתֶיךָ
  english_pob_choice: your lips
  chosen_spanish: tus labios
  alternatives_spanish:
  - tu boca
  - tu habla
  - lo que dices
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de los labios, como en el hebreo. «Tus labios» mantiene el paralelismo poético y evita una abstracción innecesaria.
- source_word: מֵישָׁרִים
  english_pob_choice: what is upright
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo derecho
  - lo correcto
  lexicon: HALOT
  rationale: El sustantivo apunta a rectitud/lo recto en sentido moral. «Lo recto» conserva la imagen lexical de «straightness» y funciona bien con «hablen» en español.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante-vocalizado de WLC y el auditable inglés POB. No se detectaron revisiones textuales relevantes ni cambios de sentido en el pasaje; la principal decisión fue conservar la imaginería hebrea de los «riñones» mediante una equivalencia idiomática española.
  spanish_consistency_notes:
  - Se mantuvo «mi ser más íntimo» para כִלְיוֹתַי, alineado con la estrategia POB de preservar el sentido antropológico sin literalismo opaco.
  - Se tradujo מֵישָׁרִים como «lo recto», manteniendo la noción de rectitud moral y evitando una paráfrasis más amplia.
  - El plural verbal «hablen» sigue el sujeto plural implícito «tus labios», en concordancia con el hebreo.
