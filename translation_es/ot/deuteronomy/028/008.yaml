translation:
  language: es
  text: Yahvé mandará la bendición sobre ti en tus almacenes[a] y en todo el trabajo de tu mano[b], y te bendecirá en la tierra que Yahvé tu Dios te está dando[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tus graneros» o «en tus depósitos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en todo el envío de tu mano», un modismo para todo tu trabajo o tus emprendimientos.'
    reason: lexical_alternative
  - marker: c
    text: O «te da» o «te dará». El participio hebreo puede entenderse de más de una manera aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del pacto, conforme al criterio del POB en inglés. En español, «Yahvé» es la transliteración más estable y reconocible para el Tetragrama, y evita la sustitución por un título.
- source_word: יְצַו
  english_pob_choice: will command
  chosen_spanish: mandará
  alternatives_spanish:
  - ordenará
  - decretará
  lexicon: HALOT
  rationale: El verbo expresa la acción de disponer o ordenar que la bendición recaiga sobre el destinatario. «Mandará» conserva la fuerza directiva del hebreo sin sonar forzado en español.
- source_word: הַבְּרָכָה
  english_pob_choice: the blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - bendición
  lexicon: HALOT
  rationale: Se conserva el artículo, porque el texto habla de la bendición concreta prometida por Dios, no de una noción genérica.
- source_word: בַּאֲסָמֶיךָ
  english_pob_choice: in your storehouses
  chosen_spanish: en tus graneros
  alternatives_spanish:
  - en tus almacenes
  - en tus bodegas
  lexicon: HALOT
  rationale: אָסָם designa un lugar de almacenamiento de grano o provisiones. «Graneros» refleja bien el contexto agrícola y es una alternativa válida al más amplio «almacenes».
- source_word: וּבְכֹל מִשְׁלַח יָדֶךָ
  english_pob_choice: in all the work of your hand
  chosen_spanish: en todo el trabajo de tu mano
  alternatives_spanish:
  - en todo lo que emprendas
  - en toda la obra de tu mano
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo, que literalmente alude a lo que la mano pone en marcha o envía a hacer. «Trabajo de tu mano» mantiene la metáfora y sigue siendo natural en español.
- source_word: וּבֵרַכְךָ
  english_pob_choice: and he will bless you
  chosen_spanish: y te bendecirá
  alternatives_spanish:
  - y te bendiga
  - y él te bendecirá
  lexicon: HALOT
  rationale: El sujeto sigue siendo Yahvé; en español, el objeto clítico basta para dar continuidad verbal sin añadir un pronombre enfático innecesario.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: «Tierra» preserva la resonancia pactal de Deuteronomio y evita debilitar el matiz teológico con «país».
- source_word: נֹתֵן לָךְ
  english_pob_choice: is giving you
  chosen_spanish: te está dando
  alternatives_spanish:
  - te da
  - te dará
  lexicon: HALOT
  rationale: El participio hebreo puede expresar una acción en curso o inminente. «Te está dando» reproduce bien ese aspecto sin cerrar indebidamente el sentido temporal.
theological_decisions:
- issue: Nombre divino del pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre personal de Dios, como hace el POB en inglés, evitando la sustitución tradicional por un título. Esto mantiene visible la identidad del Dios del pacto en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido pactal de «la tierra»
  english_pob_reading: in the land
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en el país
  - en la tierra prometida
  rationale: Deuteronomio usa «la tierra» como término de pacto. Se conserva esa carga sin introducir una glosa interpretativa en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el análisis del POB en inglés y conserva las mismas tensiones léxicas: el nombre divino, el modismo de la mano, la imagen agrícola de los graneros y el valor aspectual del participio final. No se introdujeron cambios doctrinales ni se suavizó el lenguaje del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, según el estándar del proyecto.
  - Se mantiene «la tierra» para conservar el matiz pactal de Deuteronomio.
  - Se preserva la metáfora de la mano en lugar de reemplazarla por una paráfrasis totalmente dinámica.
  - Las notas al pie señalan alternativas reales sin duplicar marcadores ni introducir glosas no sustentadas.
