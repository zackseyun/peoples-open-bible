translation:
  language: es
  text: Ahora tomen para ustedes siete toros y siete carneros, y vayan a mi siervo Job, y ofrezcan por ustedes un holocausto. Y mi siervo Job orará por ustedes, porque yo lo aceptaré[a], para no hacer con ustedes algo vergonzoso[b]. Porque no han hablado rectamente acerca de mí[c], como mi siervo Job.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «levantaré su rostro»; es un modismo hebreo que significa «lo aceptaré» o «le mostraré favor».
    reason: lexical_alternative
  - marker: b
    text: O «para no hacer con ustedes una cosa vergonzosa». El sustantivo hebreo puede denotar insensatez, vergüenza o una acción indignante.
    reason: lexical_alternative
  - marker: c
    text: O «a mí». El hebreo puede entenderse como «hablado a mí» o, por el sentido del contexto, «hablado acerca de mí».
    reason: alternative_reading
lexical_decisions:
- source_word: קְחוּ לָכֶם
  english_pob_choice: take for yourselves
  chosen_spanish: tomen para ustedes
  alternatives_spanish:
  - tomen
  - consigan para ustedes
  lexicon: HALOT
  rationale: El imperativo con el dativo reflexivo/benefactivo pide en español una forma que conserve la idea de apropiarse o conseguir los animales para su uso en el rito. «Para ustedes» mantiene ese matiz sin sonar forzado.
- source_word: שִׁבְעָה פָרִים וְשִׁבְעָה אֵילִים
  english_pob_choice: seven bulls and seven rams
  chosen_spanish: siete toros y siete carneros
  alternatives_spanish:
  - siete toros jóvenes y siete carneros
  - siete bueyes y siete carneros
  lexicon: HALOT
  rationale: פָרִים nombra ganado macho; en español «toros» comunica bien la fuerza del término sin añadir «jóvenes», que no es necesario aquí. אֵילִים son carneros.
- source_word: עַבְדִּי אִיּוֹב
  english_pob_choice: my servant Job
  chosen_spanish: mi siervo Job
  alternatives_spanish:
  - mi servidor Job
  - mi esclavo Job
  lexicon: HALOT
  rationale: Aquí עֶבֶד funciona como título relacional de servicio leal a Dios. «Siervo» conserva mejor el valor honorífico y el uso bíblico en este contexto que «esclavo».
- source_word: וְהַעֲלִיתֶם עוֹלָה
  english_pob_choice: offer up a burnt offering
  chosen_spanish: ofrezcan ... un holocausto
  alternatives_spanish:
  - suban ... un holocausto
  - presenten ... un holocausto
  lexicon: HALOT
  rationale: El hebreo usa el giro sacrificial normal de העלה con עוֹלָה. «Holocausto» es el equivalente tradicional y transparente para el sacrificio totalmente consumido.
- source_word: בַּעַדְכֶם
  english_pob_choice: for yourselves
  chosen_spanish: por ustedes
  alternatives_spanish:
  - en favor de ustedes
  - para ustedes
  lexicon: HALOT
  rationale: En contexto sacrificial la preposición indica referencia benefactiva o sustitutiva. «Por ustedes» es natural en español y deja abierta esa relación ritual.
- source_word: יִתְפַּלֵּל עֲלֵיכֶם
  english_pob_choice: will pray for you
  chosen_spanish: orará por ustedes
  alternatives_spanish:
  - intercederá por ustedes
  - rezará por ustedes
  lexicon: HALOT
  rationale: El verbo expresa oración con fuerza intercesora. «Orará por ustedes» es claro y respetuoso; la idea de intercesión queda implícita por el contexto.
- source_word: כִּי אִם פָּנָיו אֶשָּׂא
  english_pob_choice: for I will accept him
  chosen_spanish: porque yo lo aceptaré[a]
  alternatives_spanish:
  - porque mostraré favor hacia él
  - porque levantaré su rostro
  lexicon: HALOT
  rationale: La expresión idiomática «levantar el rostro» se entiende aquí como aceptar o mostrar favor. «Lo aceptaré» comunica bien el sentido en español, y la nota preserva la imagen literal y la alternativa semántica.
- source_word: לְבִלְתִּי עֲשׂוֹת עִמָּכֶם נְבָלָה
  english_pob_choice: so that I may not deal with you disgracefully
  chosen_spanish: para no tratarlos con deshonra[b]
  alternatives_spanish:
  - para no hacerles una cosa vergonzosa
  - para no obrar con ustedes de manera vergonzosa
  lexicon: HALOT
  rationale: נְבָלָה puede referirse a conducta vergonzosa, insensata o indignante. «Con deshonra» capta la fuerza de vergüenza pública sin sugerir que Dios actúe moralmente mal.
- source_word: לֹא דִבַּרְתֶּם אֵלַי נְכוֹנָה
  english_pob_choice: you have not spoken rightly about me
  chosen_spanish: no han hablado rectamente acerca de mí[c]
  alternatives_spanish:
  - no han hablado rectamente a mí
  - no han hablado correctamente sobre mí
  lexicon: HALOT
  rationale: El hebreo permite entender «a mí» o, por el sentido del contexto, «acerca de mí». «Acerca de mí» expresa con claridad que el problema es lo que dijeron sobre Dios.
- source_word: כְּעַבְדִּי אִיּוֹב
  english_pob_choice: as my servant Job has
  chosen_spanish: como mi siervo Job
  alternatives_spanish:
  - como mi siervo Job lo ha hecho
  - tal como mi siervo Job
  lexicon: HALOT
  rationale: El hebreo cierra con una elipsis; en español puede quedar implícita sin añadir demasiado. La comparación contrasta su palabra con la de Job.
theological_decisions:
- issue: Sentido de la aceptación divina en relación con la mediación de Job
  english_pob_reading: God accepts Job as intercessor, and Job's prayer is the means by which judgment on the friends is withheld.
  chosen_spanish_reading: Dios acepta a Job como intercesor, y su oración es el medio por el cual se evita el juicio inmediato contra los amigos.
  alternative_spanish_readings:
  - Dios simplemente muestra favor personal a Job sin destacar su función mediadora
  - Dios escucha a Job, pero sin implicar intercesión
  rationale: La secuencia mandato-sacrificio-oración-aceptación muestra que Job cumple una función mediadora. La traducción mantiene esa relación sin importar categorías posteriores ajenas al texto.
  doctrine_reference: Translation philosophy §3
- issue: Fuerza de נְבָלָה en la acción divina
  english_pob_reading: The phrase is rendered as God not dealing with them according to their folly rather than implying God himself would act disgracefully.
  chosen_spanish_reading: La frase se vierte como que Dios no los tratará con deshonra, evitando sugerir impropiedad moral en Dios.
  alternative_spanish_readings:
  - que Dios no hará con ustedes una cosa vergonzosa
  - que Dios no actuará vergonzosamente con ustedes
  rationale: El sustantivo puede aludir a vergüenza, insensatez o conducta indignante. En este contexto judicial, «con deshonra» conserva la idea de vergüenza y evita atribuir una acción moralmente impropia a Dios.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la idea de נְבָלָה desde «according to your folly» hacia «disgracefully», y también la nota que conserva la ambigüedad de «about me / to me» en la cláusula final. La versión española refleja esa actualización con «con deshonra» y mantiene la alternativa de sentido en nota.
  spanish_consistency_notes:
  - Se preserva «Yahvé» cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «siervo» para עֶבֶד según el criterio establecido del POB en este contexto.
  - «Holocausto» se conserva como término sacrificial estándar y transparente en español.
  - La nota sobre «acerca de mí» preserva la tensión de traducción entre dirección personal y contenido del discurso.
  - La puntuación sigue el orden y la cadencia del texto fuente sin añadir explicaciones al cuerpo principal.
