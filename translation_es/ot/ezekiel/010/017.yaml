translation:
  language: es
  text: Cuando ellos se detenían, éstos se detenían; y cuando ellos eran levantados, éstos eran levantados con ellos, porque el espíritu[a] del ser viviente estaba en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el espíritu de vida», si הַחַיָּה se toma de manera más abstracta; el hebreo también permite el matiz de «aliento» o «viento» para «espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָמְדָם
  english_pob_choice: when they stood still
  chosen_spanish: cuando ellos se detenían
  alternatives_spanish:
  - cuando ellos estaban de pie
  - al estar ellos en pie
  lexicon: HALOT
  rationale: El valor temporal-circunstancial de la construcción se expresa naturalmente con «cuando». «Se detenían» comunica el matiz estativo/movimiento suspendido que el contexto exige, sin sonar mecánico en español.
- source_word: יַעֲמֹדוּ
  english_pob_choice: these stood still
  chosen_spanish: éstos se detenían
  alternatives_spanish:
  - éstos estaban de pie
  - éstos se paraban
  lexicon: HALOT
  rationale: El imperfecto hebreo continúa la acción correlativa. En español, el imperfecto refleja bien la simultaneidad y repetición del vínculo entre los seres vivientes y las ruedas. «Éstos» distingue el sujeto implícito del antecedente anterior.
- source_word: וּבְרוֹמָם
  english_pob_choice: when they were lifted up
  chosen_spanish: cuando ellos se alzaban
  alternatives_spanish:
  - cuando ellos eran levantados
  - cuando ellos subían
  lexicon: HALOT
  rationale: En el contexto de visión del trono, el movimiento es físico, no honorífico. «Se alzaban» conserva el ascenso sin introducir una lectura de exaltación.
- source_word: יֵרוֹמּוּ אֹתָם
  english_pob_choice: these were lifted up with them
  chosen_spanish: éstos se alzaban con ellos
  alternatives_spanish:
  - éstos eran levantados con ellos
  - éstos subían con ellos
  lexicon: HALOT
  rationale: El hebreo presenta una forma pasiva/reflexiva que en español se expresa con naturalidad por medio de una construcción pronominal. «Con ellos» preserva la relación de acompañamiento que el hebreo marca y que el contexto visual explica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón explicativa del movimiento coordinado. «Porque» es claro, natural y plenamente compatible con el registro bíblico en español.
- source_word: רוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el viento
  lexicon: HALOT
  rationale: En este contexto visionario, «espíritu» conserva la amplitud semántica sin reducir el término a mera física. La nota mantiene abierta la alternativa de «aliento» o «viento» cuando se toma el sustantivo de forma más abstracta.
- source_word: הַחַיָּה
  english_pob_choice: the living creature
  chosen_spanish: del ser viviente
  alternatives_spanish:
  - de la criatura viviente
  - del ser vivo
  lexicon: HALOT
  rationale: «Ser viviente» mantiene el término técnico de la visión y evita estrecharlo a «animal». El singular hebreo puede ser colectivo; el español conserva esa ambigüedad sin resolverla artificialmente.
- source_word: בָּהֶם
  english_pob_choice: was in them
  chosen_spanish: estaba en ellos
  alternatives_spanish:
  - estaba dentro de ellos
  - estaba en su interior
  lexicon: HALOT
  rationale: La preposición locativa se vierte de manera directa y natural. «En ellos» es suficiente y fiel para la referencia a las ruedas o al conjunto coordinado del pasaje.
theological_decisions:
- issue: Sentido de רוּחַ en la visión
  english_pob_reading: the spirit of the living creature
  chosen_spanish_reading: el espíritu del ser viviente
  alternative_spanish_readings:
  - el aliento del ser viviente
  - el viento del ser viviente
  - el espíritu de vida
  rationale: La traducción mantiene el misterio visionario y la función causal del término sin cerrarlo a una sola explicación física. «Espíritu» conserva la lectura principal del audit trail, mientras que la nota permite la alternativa semántica reconocida en hebreo.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: El borrador sigue el pasaje tal como quedó en el audit trail inglés, sin cambios de revisión aplicados. Se mantiene la lectura principal «espíritu» y la alternativa léxica documentada en la nota, con concordancia entre sujeto implícito, paralelismo y causa explicativa.
  spanish_consistency_notes:
  - Se evita «Señor» porque no aparece YHWH ni una cita directa de κύριος en este versículo.
  - Se usa «ser viviente» como término técnico coherente con el contexto de Ezequiel.
  - Se conserva la repetición paralela «cuando... cuando...» para reflejar la estructura hebrea.
  - La construcción pronominal «se alzaban» transmite el valor pasivo/reflexivo del hebreo sin sobrecargar el español.
