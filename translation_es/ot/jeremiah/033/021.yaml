translation:
  language: es
  text: Entonces mi pacto con David, mi siervo, también podrá ser roto[a], de modo que él no tenga un hijo que reine sobre su trono, y con los sacerdotes levitas, mis ministros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: "y con los levitas, los sacerdotes, mis ministros".'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - también
  lexicon: HALOT
  rationale: גַּם añade correspondencia con la afirmación previa; 'también' conserva el valor aditivo y funciona de manera natural al inicio de la cláusula en español.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi pacto
  lexicon: HALOT
  rationale: '''Pacto'' comunica bien el valor jurídico-teológico de בְּרִית en español bíblico contemporáneo y evita una lectura excesivamente eclesiástica de ''alianza'' en este contexto.'
- source_word: תֻפַר
  english_pob_choice: may ... be broken
  chosen_spanish: podrá ser roto
  alternatives_spanish:
  - podrá ser quebrantado
  - podrá ser anulado
  - podrá ser roto
  lexicon: HALOT
  rationale: El pasivo de פרר expresa ser roto o invalidado; 'podrá ser roto' mantiene la imagen de ruptura y el matiz potencial/condicional del texto.
- source_word: אֶת דָּוִד עַבְדִּי
  english_pob_choice: with David my servant
  chosen_spanish: con David, mi siervo
  alternatives_spanish:
  - con David, mi siervo
  - respecto de David, mi siervo
  lexicon: HALOT
  rationale: Aunque אֶת puede marcar objeto directo, con בְּרִית el sentido relacional es natural en español como 'con David'. 'Siervo' conserva el título covenantal sin debilitarlo.
- source_word: מִהְיוֹת ל֥וֹ
  english_pob_choice: so that he would not have
  chosen_spanish: de modo que él no tenga
  alternatives_spanish:
  - para que no tenga
  - de modo que él no tenga
  lexicon: HALOT
  rationale: La construcción con מִן + infinitivo expresa resultado/consecuencia. 'De modo que' refleja bien ese valor en español, y la negación siguiente preserva el sentido resultante.
- source_word: בֵן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo
  - un descendiente
  - un heredero
  lexicon: HALOT
  rationale: '''Hijo'' reproduce el término concreto del hebreo y conserva la fuerza dinástica sin abstraerla.'
- source_word: מֹלֵךְ
  english_pob_choice: reigning
  chosen_spanish: que reine
  alternatives_spanish:
  - que reine
  - reinando
  lexicon: HALOT
  rationale: El participio expresa realeza en curso; 'que reine' es una subordinada natural y precisa en español.
- source_word: עַל כִּסְא֑וֹ
  english_pob_choice: on his throne
  chosen_spanish: sobre su trono
  alternatives_spanish:
  - sobre su trono
  - en su trono
  lexicon: HALOT
  rationale: '''Sobre su trono'' conserva la preposición de dominio propia del hebreo y su valor regio.'
- source_word: וְאֶת הַלְוִיִּם הַכֹּהֲנִים
  english_pob_choice: and with the Levitical priests
  chosen_spanish: y con los levitas, los sacerdotes
  alternatives_spanish:
  - y con los levitas, los sacerdotes
  - y con los sacerdotes levitas
  lexicon: HALOT
  rationale: El hebreo puede leerse appositivamente. Mantener 'los levitas, los sacerdotes' deja visible la tensión léxica y preserva la alternativa literal que la POB inglesa anotó.
- source_word: מְשָׁרְתָי
  english_pob_choice: my ministers
  chosen_spanish: mis ministros
  alternatives_spanish:
  - mis ministros
  - los que me sirven
  lexicon: HALOT
  rationale: '''Ministros'' conserva el sentido formal de servicio cultual y se alinea con el uso bíblico de servicio ministerial ante Dios sin reducirlo a ''siervos'' de manera genérica.'
theological_decisions:
- issue: Promesa dinástica davídica
  english_pob_reading: Retain the concrete dynastic language 'a son reigning on his throne' rather than abstracting it to a generalized royal line.
  chosen_spanish_reading: 'Conservar el lenguaje concreto: ''un hijo que reine sobre su trono''.'
  alternative_spanish_readings:
  - un descendiente que reine sobre su trono
  - un heredero que reine sobre su trono
  rationale: El hebreo subraya la filiación real, y el español debe conservar esa concreción para no diluir la fuerza del pacto davídico en una formulación más abstracta.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Identificación del grupo sacerdotal
  english_pob_reading: Render הַלְוִיִּם הַכֹּהֲנִים as 'the Levitical priests' in the main text, while preserving the more formal appositional alternative in a footnote.
  chosen_spanish_reading: 'Traducir la frase de forma appositiva: ''los levitas, los sacerdotes''.'
  alternative_spanish_readings:
  - los sacerdotes levitas
  - los levitas sacerdotes
  rationale: El hebreo permite una lectura en aposición; en español, la forma appositiva hace visible esa posibilidad y evita cerrar prematuramente la relación entre 'levitas' y 'sacerdotes'.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Última revisión registrada: acuerdo alto (0.95), sin cambios necesarios; se conserva la decisión de mantener la tensión léxica entre una lectura más idiomática y la alternativa más literal sobre el grupo levítico-sacerdotal.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí porque el versículo no contiene el nombre divino.
  - '''Pacto'' se usó para בְּרִית por su peso jurídico-teológico en español contemporáneo.'
  - La puntuación separa con comas la aposición 'los levitas, los sacerdotes' para hacer visible la posible relación literal del hebreo.
  - Se evita 'SEÑOR' como sustituto del nombre divino, conforme al criterio del proyecto, aunque no aparece en este verso.
