translation:
  language: es
  text: Pero cuando sucedió que había pasado algún tiempo, y el sol resplandeció, aunque había estado nublado[a], se encendió un gran fuego, de modo que todos se maravillaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras estaba nublado». La expresión griega ἐπινεφὴς ὤν puede entenderse más literalmente como «estando cubierto de nubes».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς δὲ ἐγένετο
  english_pob_choice: But when it happened that
  chosen_spanish: Pero cuando sucedió que
  alternatives_spanish:
  - Y cuando ocurrió que
  - Ahora bien, cuando sucedió que
  lexicon: LSJ
  rationale: Conserva la transición narrativa de δέ y el matiz idiomático de ἐγένετο sin sonar demasiado rígido en español.
- source_word: χρόνος διῆλθεν
  english_pob_choice: time had passed
  chosen_spanish: pasó el tiempo
  alternatives_spanish:
  - había pasado el tiempo
  - transcurrió el tiempo
  lexicon: LSJ
  rationale: Expresa con naturalidad la idea de tiempo transcurrido; el pretérito en español funciona bien para la secuencia narrativa.
- source_word: ὅ τε ἥλιος ἀνέλαμψεν
  english_pob_choice: and the sun shone out
  chosen_spanish: el sol resplandeció
  alternatives_spanish:
  - el sol brilló
  - el sol salió con brillo
  lexicon: LSJ
  rationale: ἀνέλαμψεν indica que el sol brilló o resplandeció; 'resplandeció' conserva un registro elevado y claro.
- source_word: ἐπινεφὴς ὤν
  english_pob_choice: though it had been overcast
  chosen_spanish: aunque había estado nublado
  alternatives_spanish:
  - aunque estaba cubierto de nubes
  - siendo nublado
  lexicon: LSJ
  rationale: La concesiva refleja bien el valor de ἐπινεφής como 'cubierto de nubes' u 'overcast'. 'Nublado' es la opción más natural en español actual.
- source_word: ἀνήφθη πυρὰ μεγάλη
  english_pob_choice: a great fire was kindled
  chosen_spanish: se encendió un gran fuego
  alternatives_spanish:
  - se prendió un gran fuego
  - fue encendido un gran fuego
  lexicon: LSJ
  rationale: Mantiene la pasiva y el sentido de ignición. 'Gran fuego' sigue de cerca πυρὰ μεγάλη sin introducir una especificación interpretativa como 'sacrificial' en el texto principal.
- source_word: ὥστε θαυμάσαι πάντας
  english_pob_choice: so that everyone marveled
  chosen_spanish: de modo que todos se maravillaron
  alternatives_spanish:
  - así que todos se asombraron
  - con el resultado de que todos se maravillaron
  lexicon: LSJ
  rationale: La construcción de resultado con ὥστε se expresa con claridad; 'todos' mantiene el alcance universal de πάντας.
theological_decisions:
- issue: Si πυρά debe especificarse como fuego sacrificial
  english_pob_reading: Translate generically as 'fire' rather than specifying 'sacrificial fire' in the main text
  chosen_spanish_reading: Traducirlo como 'fuego' sin añadir 'sacrificial' en el texto principal
  alternative_spanish_readings:
  - un fuego sacrificial
  - el fuego del sacrificio
  rationale: El griego dice simplemente πυρὰ μεγάλη. Aunque el contexto amplio es cultual, el texto no explicita la clase de fuego; por eso el cuerpo principal preserva la neutralidad semántica y evita una precisión interpretativa no expresada directamente.
  doctrine_reference: 'Translation philosophy: no paraphrase beyond what the source warrants; preserve tension where the source does not resolve it.'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail, que indica que no hubo cambios necesarios en la última revisión; la versión española conserva la decisión de mantener πυρά como 'fuego' genérico y de leer ἐπινεφὴς ὤν con una concesiva natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Dios' no aplicable en este versículo; no hay términos para θεός o YHWH.
  - Se conserva un registro bíblico sobrio sin arcaísmos innecesarios.
  - La nota [a] marca la alternativa lexical documentada para ἐπινεφὴς ὤν y no introduce una nueva ambigüedad.
