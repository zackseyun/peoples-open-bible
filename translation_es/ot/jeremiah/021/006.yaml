revisions:
- from: Y golpearé a los habitantes de esta ciudad, tanto al hombre como a la bestia; morirán de una gran pestilencia.
  to: Y heriré a los habitantes de esta ciudad, tanto al hombre como a la bestia; morirán por una gran pestilencia.
