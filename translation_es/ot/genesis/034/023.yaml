translation:
  language: es
  text: ¿No serán nuestros el ganado de ellos, su propiedad[a] y todos sus animales? Solo estemos de acuerdo con ellos[b], y habitarán con nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra hebrea puede entenderse también como "sus posesiones" o "sus bienes"; el español "propiedad" conserva la amplitud económica del término.
    reason: lexical_alternative
  - marker: b
    text: 'O: "consintamos con ellos". El hebreo expresa consentimiento o acuerdo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֵהֶם
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - su livestock
  - sus reses
  - sus animales de cría
  lexicon: HALOT
  rationale: מִקְנֶה designa el ganado o el conjunto de animales de cría/posesión económica. En español, "ganado" comunica bien el valor ganadero sin sonar técnico o forzado.
- source_word: קִנְיָנָם
  english_pob_choice: their property
  chosen_spanish: su propiedad
  alternatives_spanish:
  - sus posesiones
  - sus bienes
  - su patrimonio
  lexicon: HALOT
  rationale: קִנְיָן apunta a bienes adquiridos o posesión material. "Propiedad" conserva la idea de posesión económica y mantiene el paralelismo con el término anterior.
- source_word: כָל בְּהֶמְתָּם
  english_pob_choice: all their animals
  chosen_spanish: todos sus animales
  alternatives_spanish:
  - todas sus bestias
  - todo su ganado
  - todos sus semovientes
  lexicon: HALOT
  rationale: בְּהֵמָה es amplio y puede abarcar animales domésticos o de carga. "Animales" preserva la amplitud del término sin repetir innecesariamente "ganado".
- source_word: הֲלוֹא לָנוּ הֵם
  english_pob_choice: Will not ... be ours?
  chosen_spanish: ¿No serán nuestros... ?
  alternatives_spanish:
  - ¿No nos pertenecerán?
  - ¿No serán de nosotros?
  - ¿No serán para nosotros?
  lexicon: HALOT
  rationale: La interrogación retórica espera afirmación y en español se expresa con naturalidad como "¿No serán nuestros...?". Mantiene el tono persuasivo del hablante.
- source_word: נֵאֹתָה
  english_pob_choice: let us agree with them
  chosen_spanish: hagamos que estén de acuerdo con ellos
  alternatives_spanish:
  - aceptemos su acuerdo
  - consintamos con ellos
  - estemos de acuerdo con ellos
  lexicon: HALOT
  rationale: La forma de אוה aquí transmite consentimiento/aceptación. Se optó por una paráfrasis que preserve la idea de lograr un acuerdo en el contexto de negociación, sin perder la noción de consentimiento.
- source_word: וְיֵשְׁבוּ אִתָּנוּ
  english_pob_choice: and they will dwell with us
  chosen_spanish: y ellos habitarán con nosotros
  alternatives_spanish:
  - y vivirán con nosotros
  - y se quedarán con nosotros
  - y se establecerán con nosotros
  lexicon: HALOT
  rationale: יָשַׁב significa habitar, vivir o establecerse. "Habitarán" conserva dignidad y el matiz de residencia estable que sugiere el verbo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. También se mantuvo [b] anclado en la frase correspondiente para que cada nota tenga su marca exacta en la traducción.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" y no hay vocabulario divino en el versículo.
  - Se prefirió "ganado" para מִקְנֶה y "propiedad" para קִנְיָן conforme al sentido económico del pasaje.
  - '"Habitarán" conserva el valor de residencia estable de יֵשְׁבוּ.'
  - Los marcadores de nota aparecen exactamente una vez cada uno en el texto español.
