translation:
  language: es
  text: Inclina tu oído, Yahvé, y oye; abre tus ojos, Yahvé, y mira; y oye todas las palabras de Senaquerib, que ha enviado para reprochar[a] al Dios vivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desafiar» o «burlarse de» al Dios vivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  english_pob_choice: Incline
  chosen_spanish: Inclina
  alternatives_spanish:
  - Vuelve
  - Dobla
  lexicon: HALOT
  rationale: El imperativo con אָזֶן/‘oído’ es una imagen idiomática de atención. «Inclina» conserva la metáfora y su tono orante sin volverlo rígido en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tus oídos
  lexicon: HALOT
  rationale: El hebreo está en singular y forma parte del paralelismo antropomórfico. En español, «oído» suena más natural que «oreja» para este uso solemne y mantiene el singular.
- source_word: וּשְׁמָע
  english_pob_choice: and hear
  chosen_spanish: y oye
  alternatives_spanish:
  - y escucha
  - y atiende
  lexicon: HALOT
  rationale: «Oye» reproduce el imperativo directo y permite mantener el paralelismo con la repetición de שׁמע en la línea siguiente.
- source_word: פְּקַח
  english_pob_choice: open
  chosen_spanish: abre
  alternatives_spanish:
  - despierta
  - descubre
  lexicon: HALOT
  rationale: Con «ojos», el sentido natural y fiel del verbo es «abrir». Preserva la imagen corporal sin explicar o suavizar el ruego.
- source_word: עֵינֶךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu ojo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo, el español idiomático exige el plural en este par natural «ojos»; conserva la pareja antropomórfica con «oído».},{
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura fuente usa יְהוָה de manera directa. En español del proyecto, el nombre propio se expresa como «Yahvé» para preservar la referencia al nombre revelado de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Preserve the anthropomorphic imperatives literally
  chosen_spanish_reading: Conservar literalmente el ruego de oído y ojos
  alternative_spanish_readings:
  - parafrasear como «presta atención» y «mira»
  - neutralizar la imagen corporal
  rationale: El texto hebreo apela a oído y ojos de forma intencional. Se mantiene la tensión teológica y retórica en lugar de abstraerla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: לְחָרֵף
  english_pob_reading: to reproach
  chosen_spanish_reading: para reprochar
  alternative_spanish_readings:
  - para insultar
  - para desafiar
  - para burlarse de
  rationale: «Reprochar» sigue la decisión revisada del audit trail y cubre el matiz de ofensa/afrentamiento contra Dios mejor que «burlarse».
  doctrine_reference: 'Revision pass 2026-04-23T10:50:45Z: changed ''mock'' to ''reproach'' for closer lexical accuracy'
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que ajusta לְחָרֵף desde una idea demasiado ligera de burla hacia «reprochar», con el fin de reflejar mejor el tono de afrenta contra Dios. También se preservó el nombre divino como Yahvé, conforme al criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo «oído / ojos» para reflejar la estructura hebrea.
  - Se evitó «SEÑOR» como sustitución del nombre divino.
  - «Oye» se repite para conservar la reiteración de שמע.
  - La preposición «para» en «para reprochar» refleja el valor final de לְ.
  - Se prefirió «Dios vivo» frente a ampliaciones explicativas para conservar la fórmula bíblica breve.
