    rationale: «Maldad» en español inclina al lector hacia perversidad moral intrínseca de la tierra. El expediente inglés revisado prefiere «evil» y conserva la ambigüedad; «todo el mal de la tierra» lo hace mejor en español.
  - severity: medium
    issue: «Reunió» es menos fiel que «convocó» para συνεκάλεσεν.
    rationale: El verbo compuesto implica llamar juntos con autoridad. «Reunió» describe el resultado; «convocó» conserva mejor el acto de mandar comparecer.
