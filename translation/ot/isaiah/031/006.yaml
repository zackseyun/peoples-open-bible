id: ISA.31.6
reference: Isaiah 31:6
source:
  edition: WLC
  text: שׁ֗וּבוּ לַ/אֲשֶׁ֛ר הֶעְמִ֥יקוּ סָרָ֖ה בְּנֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: Return to him from whom the sons of Israel have deeply revolted[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Return to the one against whom the sons of Israel have deeply rebelled.' The Hebrew relative phrase is compressed and may be rendered in more than one way in English.
    reason: alternative_reading
  - marker: b
    text: '''The sons of Israel'' is a more literal rendering of the Hebrew than the traditional ''children of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבוּ
  chosen: Return
  alternatives:
  - Turn back
  lexicon: HALOT
  rationale: Imperative plural of שוב, calling for repentance/restoration. 'Return' is concise modern English and fits prophetic covenantal summons better than the slightly more idiomatic 'turn back,' while preserving the directional sense.
- source_word: לַאֲשֶׁר
  chosen: to him from whom
  alternatives:
  - to the one against whom
  - to him against whom
  lexicon: HALOT
  rationale: The phrase combines ל with אֲשֶׁר and is idiomatically difficult. In context, with the following 'have deeply revolted,' it points to the one against whom Israel rebelled, while the imperative 'return' naturally supplies movement back toward that person. English 'to him from whom' captures both the return and the prior estrangement without over-paraphrasing. The referent is God from context, but the Hebrew uses a relative expression rather than the divine name here.
- source_word: הֶעְמִיקוּ
  chosen: have deeply
  alternatives:
  - have gone deep
  - have made deep
  lexicon: HALOT
  rationale: Hiphil of עמק literally means 'make deep' or 'go deep.' With the cognate noun סָרָה, the idiom means to deepen rebellion/revolt. Rendering it adverbially as 'deeply' produces natural English while preserving the intensifying force.
- source_word: סָרָה
  chosen: revolted
  alternatives:
  - rebelled
  - turned aside in rebellion
  - apostatized
  lexicon: HALOT
  rationale: סָרָה denotes defection, rebellion, or apostasy. 'Revolted' conveys active covenantal rebellion and pairs well with the intensifier from הֶעְמִיקוּ. 'Apostatized' is too technical for the stated readability goal; 'rebelled' is possible but slightly flatter.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate policy, the masculine plural construct is retained as 'sons of Israel.' Although it refers corporately to Israel, this rendering stays closer to the Hebrew form than the traditional but less literal 'children of Israel.'
