revisions:
- from: Entonces los hombres de Israel y de Judá se levantaron y gritaron, y persiguieron a los filisteos hasta Gai[a] y hasta las puertas de Ecrón. Los filisteos muertos cayeron por el camino de Shaaraim[b], hasta Gat y hasta Ecrón.
  to: Entonces los hombres de Israel y de Judá se levantaron y gritaron, y persiguieron a los filisteos hasta Gai[a] y hasta las puertas de Ecrón. Los filisteos caídos yacían por el camino hacia Shaaraim, hasta Gat y hasta Ecrón.
  rationale: Se conservan las decisiones textuales principales del POB, especialmente «Gai», pero se mejora el español con una formulación más natural para חַלְלֵי פְלִשְׁתִּים y una expresión más clara de la ruta hacia Shaaraim. También se elimina una nota [b] que no estaba bien sustentada por el rastro auditado y que introducía confusión innecesaria.
