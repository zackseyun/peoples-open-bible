translation:
  language: es
  text: Y sobre ellos había tres altos funcionarios[a], de los cuales Daniel era uno, para que estos sátrapas les rindieran cuenta y el rey no sufriera pérdida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les presentaran un informe»; la expresión aramea puede significar dar cuenta o presentar un informe en sentido administrativo.
    reason: lexical_alternative
  - marker: b
    text: O «el rey no fuera perjudicado»; aquí probablemente se trata de que el rey no sufriera una pérdida administrativa o financiera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעֵלָּא
  english_pob_choice: And over them were
  chosen_spanish: Y sobre ellos había
  alternatives_spanish:
  - Y por encima de ellos había
  - Y sobre ellos estaban
  lexicon: HALOT
  rationale: La idea administrativa de superioridad se expresa naturalmente en español con «sobre ellos había», conservando la relación jerárquica sin forzar una construcción más literal y pesada.
- source_word: סָרְכִין תְּלָתָא
  english_pob_choice: three high officials
  chosen_spanish: tres altos funcionarios
  alternatives_spanish:
  - tres presidentes
  - tres comisionados
  - tres administradores
  lexicon: HALOT
  rationale: «Altos funcionarios» comunica rango y función administrativa. Evita un título institucional moderno como «presidentes», sin perder el sentido de supervisores superiores a los sátrapas.
- source_word: דִּי דָנִיֵּאל חַד מִנְּהוֹן
  english_pob_choice: of whom Daniel was one
  chosen_spanish: de los cuales Daniel era uno
  alternatives_spanish:
  - siendo Daniel uno de ellos
  - uno de los cuales era Daniel
  lexicon: HALOT
  rationale: La relativa identifica a Daniel como uno entre los tres. «De los cuales Daniel era uno» es natural en español y conserva la precisión relacional del arameo.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: HALOT
  rationale: «Sátrapas» mantiene el título persa histórico y su valor cultural. Es el equivalente usual en español y preserva el trasfondo imperial.
- source_word: יָהֲבִין לְהוֹן טַעְמָא
  english_pob_choice: might give account to them
  chosen_spanish: les rindieran cuenta
  alternatives_spanish:
  - les dieran cuenta
  - les reportaran
  - les presentaran un informe
  lexicon: HALOT
  rationale: La expresión aramea tiene un sentido administrativo de rendición de cuentas o informe. «Rindieran cuenta» conserva esa responsabilidad jerárquica mejor que un simple «reportaran».
- source_word: וּמַלְכָּא לָא לֶהֱוֵא נָזִק
  english_pob_choice: and the king might suffer no loss
  chosen_spanish: y el rey no sufriera daño
  alternatives_spanish:
  - y el rey no padeciera pérdida
  - y el rey no sufriera perjuicio
  lexicon: HALOT
  rationale: נזק puede referirse a daño o detrimento; en el contexto administrativo puede incluir pérdida material o perjuicio al rey. «No sufriera daño» es una forma sobria y amplia en español, aunque deja abierta la posibilidad de una pérdida administrativa o financiera.
theological_decisions:
- issue: Sentido de נזק aplicado al rey
  english_pob_reading: the king might suffer no loss
  chosen_spanish_reading: el rey no sufriera daño
  alternative_spanish_readings:
  - el rey no sufriera pérdida
  - el rey no padeciera perjuicio
  rationale: 'No hay una cuestión doctrinal directa, pero sí una tensión semántica: el texto puede apuntar a daño general o a pérdida administrativa/financiera. «Daño» mantiene esa amplitud sin reducirlo indebidamente a lo físico.'
  doctrine_reference: No aplica; decisión semántico-contextual.
translation_notes:
  revision_awareness: Se sigue el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la traducción española conserva la estructura administrativa, el título histórico «sátrapas» y la ambigüedad controlada de טַעְמָא / נָזִק mediante notas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantiene «sátrapas» como título persa histórico, coherente con el tratamiento habitual de terminología administrativa antigua.
  - «Rindieran cuenta» preserva la fuerza administrativa de la frase aramea sin convertirla en un simple «informar».
