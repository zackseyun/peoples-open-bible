translation:
  language: es
  text: Pero ustedes pueden escribir acerca de los judíos como les parezca bien[a], en nombre del rey, y sellarlo con el anillo de sello del rey; porque un documento escrito en nombre del rey y sellado con el anillo de sello del rey no puede ser revocado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a lo que les parezca bueno». El hebreo dice literalmente: «como es bueno en sus ojos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no puede ser revertido». La expresión hebrea significa que tal documento real no puede ser retirado ni rescindido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Ahora ustedes
  lexicon: HALOT
  rationale: El hebreo introduce un contraste con el decreto anterior; «Pero» conserva con naturalidad el valor adversativo. «Ustedes» mantiene el plural explícito.
- source_word: כִּתְבוּ
  english_pob_choice: may write
  chosen_spanish: pueden escribir
  alternatives_spanish:
  - escriban
  - tienen permiso de escribir
  lexicon: HALOT
  rationale: En este contexto de autorización real, el imperativo plural funciona como permiso/mandato habilitante. «Pueden escribir» expresa bien la autorización sin cargarlo innecesariamente como obligación.
- source_word: עַל הַיְּהוּדִים
  english_pob_choice: concerning the Jews
  chosen_spanish: acerca de los judíos
  alternatives_spanish:
  - sobre los judíos
  - en favor de los judíos
  lexicon: HALOT
  rationale: עַל introduce el asunto del escrito. «Acerca de» conserva la amplitud del hebreo sin imponer que la redacción sea solo «en favor de».
- source_word: כַּטּוֹב בְּעֵינֵיכֶם
  english_pob_choice: as seems good in your eyes
  chosen_spanish: conforme a lo que les parezca bueno[a]
  alternatives_spanish:
  - como les parezca bien
  - según les parezca mejor
  lexicon: HALOT
  rationale: Se preserva el sentido idiomático de valoración/jucio personal. La nota recoge la imagen literal hebrea «bueno en sus ojos», que el español no suele usar de forma natural.
- source_word: בְּשֵׁם הַמֶּלֶךְ
  english_pob_choice: in the king’s name
  chosen_spanish: en nombre del rey
  alternatives_spanish:
  - con el nombre del rey
  - bajo la autoridad del rey
  lexicon: HALOT
  rationale: La fórmula administrativa española más natural y fiel es «en nombre del rey», que mantiene la referencia nominal sin perder la idea de autoridad.
- source_word: וְחִתְמוּ
  english_pob_choice: and seal it
  chosen_spanish: y sellarlo
  alternatives_spanish:
  - y sellen
  - y ponerle sello
  lexicon: HALOT
  rationale: El español requiere un objeto implícito; el infinitivo coordinado funciona con fluidez en esta secuencia directiva y mantiene el acto de sellar el documento.
- source_word: בְּטַבַּעַת הַמֶּלֶךְ
  english_pob_choice: with the king’s signet ring
  chosen_spanish: con el anillo de sello del rey[b]
  alternatives_spanish:
  - con el sello del rey
  - con el anillo del rey
  lexicon: HALOT
  rationale: טַבַּעַת en este contexto apunta al anillo usado para sellar decretos. «Anillo de sello» hace explícita su función administrativa y evita perder el detalle material.
- source_word: כְתָב
  english_pob_choice: a document
  chosen_spanish: un documento
  alternatives_spanish:
  - un escrito
  - una escritura
  lexicon: HALOT
  rationale: El término hebreo es amplio y administrativo. «Documento» es el equivalente español más claro y general sin volverlo más específico de lo que exige el texto.
- source_word: אֲשֶׁר נִכְתָּב
  english_pob_choice: that is written
  chosen_spanish: que se escribe
  alternatives_spanish:
  - que ha sido escrito
  - que está escrito
  lexicon: HALOT
  rationale: En la formulación legal general, el presente impersonal en español transmite bien el carácter normativo/típico del principio.
- source_word: וְנַחְתּוֹם
  english_pob_choice: and sealed
  chosen_spanish: y se sella
  alternatives_spanish:
  - y ha sido sellado
  - y sellado
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «se escribe» y se expresa la condición legal general del documento sellado.
- source_word: אֵין לְהָשִׁיב
  english_pob_choice: cannot be revoked
  chosen_spanish: no puede ser revocado
  alternatives_spanish:
  - no puede ser revertido
  - no puede ser anulado
  lexicon: HALOT
  rationale: La fórmula expresa la imposibilidad de rescindir un decreto real. «Revocado» es el equivalente legal más preciso en español para este contexto administrativo.
theological_decisions:
- issue: Alcance jurídico de la frase final sobre un decreto real
  english_pob_reading: cannot be revoked
  chosen_spanish_reading: no puede ser revocado
  alternative_spanish_readings:
  - no puede ser anulado
  - no puede ser revertido
  rationale: No hay una tensión doctrinal aquí, pero sí una decisión semántica/legal. «Revocado» conserva el matiz de rescisión formal de un edicto emitido con autoridad real.
  doctrine_reference: No aplica; decisión de registro jurídico-administrativo.
translation_notes:
  revision_awareness: La versión inglesa auditada sigue una equivalencia óptima estable y no muestra revisiones aplicadas ni tensiones textuales. El español se alinea con esa lectura, conservando la estructura legal y el contraste inicial sin añadir inferencias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «judíos» para הַיְּהוּדִים, en sentido étnico-político del contexto persa.
  - Se usa lenguaje jurídico («documento», «revocado», «sellado») para reflejar el registro administrativo del hebreo.
  - La nota de «anillo de sello» preserva el componente material del objeto sin oscurecer su función oficial.
