revisions:
- from: Levantarán contra ti una asamblea[a], te apedrearán y te atravesarán con sus espadas[b].
  to: Harán subir contra ti una asamblea[a], te apedrearán y te harán pedazos con sus espadas[b].
  rationale: Se reemplaza «levantarán» por «harán subir» para conservar mejor la imagen verbal de הֶעֱלוּ sin la torpeza de «levantar una asamblea», dejando en nota la alternativa más idiomática «traerán contra ti». Se sustituye «te atravesarán» por «te harán pedazos» para reflejar adecuadamente el sentido violento de בתק, en línea con la alternativa documentada del POB inglés. Se mantienen «asamblea», «te apedrearán» y «con sus espadas» por su fidelidad y naturalidad.
