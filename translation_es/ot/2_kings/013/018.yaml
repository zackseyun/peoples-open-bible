translation:
  language: es
  text: 'Entonces él dijo[a]: «Toma las flechas», y las tomó. Y dijo al rey de Israel: «Golpea el suelo», y lo golpeó tres veces y se detuvo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y estuvo de pie»; el verbo hebreo dice literalmente «estuvo de pie», pero aquí funciona idiomáticamente para indicar que dejó de golpear después de tres veces.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Tome
  - Recibe
  lexicon: HALOT
  rationale: El imperativo singular directo pide una orden inmediata; «toma» reproduce bien la fuerza natural y la brevedad del hebreo en español.
- source_word: הַחִצִּים
  english_pob_choice: the arrows
  chosen_spanish: las flechas
  alternatives_spanish:
  - las saetas
  - las flechas
  lexicon: HALOT
  rationale: El sustantivo definido plural se traduce con artículo. «Flechas» es claro y natural en español moderno; «saetas» sería más literario y menos usual.
- source_word: וַיִּקָּח
  english_pob_choice: and he took them
  chosen_spanish: y las tomó
  alternatives_spanish:
  - y tomó las flechas
  - y las tomó
  lexicon: HALOT
  rationale: El hebreo omite el objeto explícito por el contexto; en español se recupera con el pronombre «las» para evitar aspereza y mantener la referencia inmediata.
- source_word: לְמֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: to the king of Israel
  chosen_spanish: al rey de Israel
  alternatives_spanish:
  - al rey de Israel
  - al rey israelita
  lexicon: HALOT
  rationale: La frase indirecta se expresa de forma directa y solemne en español con «al rey de Israel»; conserva la referencia política y narrativa sin sobreinterpretación.
- source_word: הַךְ
  english_pob_choice: Strike
  chosen_spanish: Golpea
  alternatives_spanish:
  - Golpea
  - Pega
  lexicon: HALOT
  rationale: Aquí נכה funciona como mandato de golpear una superficie; «golpea» comunica la orden con naturalidad. «Strike» sería más solemne en inglés, pero en español «golpea» evita rigidez sin perder fuerza.
- source_word: אַרְצָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra
  - el terreno
  lexicon: HALOT
  rationale: La forma direccional de אֶרֶץ indica golpear hacia abajo, sobre la superficie del suelo; «la tierra» conserva el valor básico del término hebreo y funciona bien en español bíblico. «El suelo» aclara el referente, pero reduce la amplitud léxica de אֶרֶץ.
- source_word: וַיַּךְ
  english_pob_choice: and he struck it
  chosen_spanish: y la golpeó
  alternatives_spanish:
  - y la golpeó
  - y la golpeó a ella
  lexicon: HALOT
  rationale: Se conserva el mismo verbo de acción y se explicita el objeto con pronombre femenino concordante con «la tierra». No se añade más contenido del que el contexto permite.
- source_word: שָׁלֹשׁ פְּעָמִים
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - tres veces
  lexicon: HALOT
  rationale: La combinación numeral + «veces» tiene equivalente idiomático directo en español; no requiere ampliación.
- source_word: וַיַּעֲמֹד
  english_pob_choice: and stopped
  chosen_spanish: y se detuvo
  alternatives_spanish:
  - y se detuvo
  - y se quedó quieto
  - y quedó de pie
  lexicon: HALOT
  rationale: 'Se mantiene la lectura idiomática marcada por el contexto: después de golpear tres veces, dejó de actuar. «Se detuvo» comunica el sentido narrativo sin borrar que el hebreo literalmente dice «estuvo/estuvo de pie».'
translation_notes:
  revision_awareness: La versión inglesa POB mantiene el sentido idiomático de וַיַּעֲמֹד como «and stopped» y anota la posibilidad literal «stood still». En español se preserva esa decisión con «se detuvo» y una nota que deja visible la alternativa literal sin imponerla en el texto principal.
  spanish_consistency_notes:
  - Se conserva «Israel» como nombre propio del reino, siguiendo el hebreo y el registro narrativo.
  - Se usa «la tierra» para mantener la correspondencia con אֶרֶץ, sin forzar «suelo» salvo en nota explicativa.
  - El pronombre objeto «las» recupera naturalmente «las flechas» y mantiene la fluidez del español.
  - La puntuación reproduce la alternancia narrativa y discurso directo con comillas angulares propias del español editorial.
