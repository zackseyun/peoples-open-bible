  text: וְ/עֵ֤ין נֹאֵ֨ף שָׁ֤מְרָֽה נֶ֣שֶׁף לֵ֭/אמֹר לֹא תְשׁוּרֵ֣/נִי עָ֑יִן וְ/סֵ֖תֶר פָּנִ֣ים יָשִֽׂים׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/024/015.yaml
  text: The eye of the adulterer waits for twilight[a], saying, ‘No eye will see me’[b]; and he puts a covering over his face.
  footnotes:
  - marker: a
    text: Or 'dusk' for 'twilight.' The Hebrew noun can refer to the dim light at day's end, fitting the context of secret sin.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and a concealment of face he puts.' The Hebrew expression means that he covers or disguises his face to avoid recognition.
    reason: lexical_alternative
