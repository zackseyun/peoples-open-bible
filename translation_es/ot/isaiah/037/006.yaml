  text: וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ יְשַֽׁעְיָ֔הוּ כֹּ֥ה תֹאמְר֖וּ/ן אֶל אֲדֹנֵי/כֶ֑ם כֹּ֣ה אָמַ֣ר יְהוָ֗ה אַל תִּירָא֙ מִ/פְּנֵ֤י הַ/דְּבָרִים֙ אֲשֶׁ֣ר שָׁמַ֔עְתָּ אֲשֶׁ֧ר גִּדְּפ֛וּ נַעֲרֵ֥י מֶלֶךְ אַשּׁ֖וּר אוֹתִֽ/י־׀־־׃
