translation:
  language: es
  text: Pero si no escuchan[a], mi alma llorará en secreto[b] a causa del orgullo[c]; mis ojos llorarán amargamente[d], y correrán lágrimas de ellos, porque el rebaño de Yahvé ha sido llevado cautivo[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «oigan» u «obedezcan»; el verbo hebreo puede abarcar oír y atender.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en lugares ocultos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a causa de la arrogancia».'
    reason: lexical_alternative
  - marker: d
    text: 'El hebreo intensifica el verbo: «llorando, llorará» o «llorará y llorará».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «el rebaño del Señor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁמָעוּהָ
  english_pob_choice: you will not listen
  chosen_spanish: no escuchan
  alternatives_spanish:
  - no oigan
  - no obedezcan
  lexicon: HALOT
  rationale: שׁמע puede expresar oír, escuchar o obedecer. En español, «escuchar» conserva el valor auditivo y deja implícita la respuesta obediente que el contexto profético exige, sin añadir un objeto explícito que el hebreo no pone aquí.
- source_word: בְּמִסְתָּרִים
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - en lugares ocultos
  - ocultamente
  lexicon: HALOT
  rationale: La forma hebrea significa literalmente «en lugares ocultos», pero «en secreto» comunica bien el matiz de lamento escondido con un español más natural y reverente.
- source_word: נַפְשִׁי
  english_pob_choice: my soul will weep
  chosen_spanish: mi alma llorará
  alternatives_spanish:
  - yo lloraré
  - mi ser interior llorará
  lexicon: HALOT
  rationale: «Alma» preserva נֶפֶשׁ/נַפְשִׁי como centro personal de emoción y sufrimiento. Mantenerlo evita reducir la imagen a un simple «yo».
- source_word: גֵוָה
  english_pob_choice: because of pride
  chosen_spanish: a causa del orgullo
  alternatives_spanish:
  - a causa de la arrogancia
  - por el orgullo
  lexicon: HALOT
  rationale: El sustantivo señala la causa del lamento. «Orgullo» es la opción más directa y natural en español; «arrogancia» es posible, pero un poco más interpretativa.
- source_word: וְדָמֹעַ תִּדְמַע
  english_pob_choice: will weep bitterly
  chosen_spanish: llorarán amargamente
  alternatives_spanish:
  - llorarán y llorarán
  - llorarán sin cesar
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo. «Llorarán amargamente» reproduce en español el valor enfático sin sonar rígido o repetitivo.
- source_word: וְתֵרַד עֵינִי דִּמְעָה
  english_pob_choice: my eyes will weep bitterly and run down with tears
  chosen_spanish: mis ojos llorarán amargamente y derramarán lágrimas
  alternatives_spanish:
  - mis ojos derramarán lágrimas
  - de mis ojos correrán lágrimas
  lexicon: HALOT
  rationale: El hebreo usa la imagen de un ojo singular que «desciende» en lágrimas. En español, el plural «mis ojos» es más idiomático; «derramarán lágrimas» conserva el cuadro de lágrimas que caen/fluye sin añadir una paráfrasis excesiva.
- source_word: נִשְׁבָּה
  english_pob_choice: has been taken captive
  chosen_spanish: ha sido llevado cautivo
  alternatives_spanish:
  - ha sido capturado
  - ha ido al cautiverio
  lexicon: HALOT
  rationale: El nifal de שׁבה indica haber sido hecho cautivo. «Llevado cautivo» suena natural en español bíblico actual y mantiene el valor pasivo sin ampliar indebidamente a «exilio».
- source_word: עֵדֶר יְהוָה
  english_pob_choice: the flock of Yahweh
  chosen_spanish: el rebaño de Yahvé
  alternatives_spanish:
  - el rebaño de Yahvé
  - el rebaño del SEÑOR
  lexicon: HALOT
  rationale: «Rebaño» comunica bien la metáfora pastoral de עֵדֶר en español moderno. Se mantiene «Yahvé» por la política textual del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La decisión del proyecto es transliterar el nombre divino como «Yahvé» para preservar el nombre personal del pacto en vez de sustituirlo por un título.
theological_decisions:
- issue: Objeto implícito de «escuchar» en תִשְׁמָעוּהָ
  english_pob_reading: The hear/listen/obey nuance refers to the prophetic warning just given
  chosen_spanish_reading: «Escuchar» deja implícita la advertencia profética recién pronunciada sin añadir un objeto inexistente en el texto
  alternative_spanish_readings:
  - «escucharla»
  - «obedecerla»
  rationale: El hebreo sugiere una advertencia o palabra ya mencionada, pero la revisión inglesa retiró el objeto explícito. En español conviene respetar esa sobriedad y no forzar un pronombre que el verso final no expresa de manera directa.
  doctrine_reference: Preservar la restricción del texto y la tensión entre oír y obedecer.
- issue: Voz de lamento y pathos profético
  english_pob_reading: The speaker is Jeremiah expressing personal grief over Judah's pride and coming captivity
  chosen_spanish_reading: Se conserva la primera persona de lamento profético sin resolver si también refleja el dolor divino a través del profeta
  alternative_spanish_readings:
  - Solo el dolor personal de Jeremías
  - Una voz plenamente divina sin mediación profética
  rationale: La primera persona es inequívocamente del profeta, pero el contexto no obliga a separar o fusionar del todo el pathos humano y el divino. La traducción mantiene esa tensión.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se incorporó la revisión del auditor inglés que eliminó el objeto explícito «to it» / «la» en el verbo de escuchar. También se mantuvo la lectura óptima que conserva la imagen pastoral y el intensificador hebreo, con español más natural que el calco literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefirió «escuchar» en vez de «oír» o «obedecer» para no cerrar el matiz semántico del hebreo.
  - «Alma» conserva נַפְשִׁי como centro personal de dolor; no se aplanó a un simple pronombre.
  - «Rebaño» traduce mejor la metáfora de עֵדֶר en un registro bíblico actual y claro.
