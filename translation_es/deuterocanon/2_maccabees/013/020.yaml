translation:
  language: es
  text: Pero Judas seguía haciéndoles llegar dentro[a] lo necesario a los que estaban dentro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguía enviando dentro lo necesario». El imperfecto griego puede indicar una acción continua o repetida.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῖς δὲ ἔνδον
  english_pob_choice: to those inside
  chosen_spanish: a los de dentro
  alternatives_spanish:
  - a los que estaban dentro
  - a los de adentro
  lexicon: LSJ
  rationale: ἔνδον funciona aquí como referencia espacial a quienes se hallan dentro del lugar sitiado. «A los de dentro» conserva esa relación sin añadir información no expresada en el griego, y suena natural en español bíblico actual.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: En 2 Macabeos se trata del nombre propio del personaje, no del territorio de Judá. Por eso se conserva la transliteración tradicional «Judas».
- source_word: τὰ δέοντα
  english_pob_choice: what was needed
  chosen_spanish: lo que necesitaban
  alternatives_spanish:
  - las cosas necesarias
  - los necesarios suministros
  lexicon: LSJ
  rationale: El giro neutro plural señala las cosas necesarias sin especificarlas. «Lo que necesitaban» mantiene esa amplitud y evita concretar indebidamente en provisiones u otros bienes.
- source_word: εἰσεπέμπεν
  english_pob_choice: kept sending in
  chosen_spanish: seguía enviando
  alternatives_spanish:
  - seguía mandando
  - enviaba continuamente
  lexicon: LSJ
  rationale: El imperfecto griego presenta una acción continua o repetida. «Seguía enviando» reproduce mejor ese valor aspectual en español que un pretérito simple.
translation_notes:
  revision_awareness: La revisión disponible indica que no hubo cambios; el texto se ajusta al griego de Swete y al audit trail inglés sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Judas» como nombre propio, en coherencia con el uso del libro.
  - Se conserva la referencia espacial «los de dentro» para reflejar ἔνδον sin añadir sujetos masculinos explícitos.
  - «Lo que necesitaban» preserva la indefinición de τὰ δέοντα y evita especificar provisiones no mencionadas.
