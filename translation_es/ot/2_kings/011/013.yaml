    text: Or 'the runners,' likely referring to the royal guard or bodyguard corps.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound' or 'the voice' of the guards and the people.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the house of the LORD'; that is, the temple precincts.
    reason: lexical_alternative
