base_translation:
  language: en
  yaml_path: translation/ot/nahum/003/010.yaml
  text: Yet she too went into exile[a], into captivity; her children too were dashed to pieces at the head of every street. They cast lots for her honored men[d][c][b], and all her great men were bound in chains.
