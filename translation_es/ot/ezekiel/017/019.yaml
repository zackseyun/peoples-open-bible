revisions:
- from: 'Por tanto, así dice el Señor Yahvé: ¡Vivo yo![a] Ciertamente, mi juramento, que él menospreció, y mi pacto, que quebrantó, los pondré sobre su propia cabeza.'
  to: 'Por tanto, así dice el Señor Yahvé: Tan cierto como que vivo[a], ciertamente mi juramento que él menospreció y mi alianza que quebrantó, los pondré sobre su propia cabeza.'
  rationale: Se conserva el sentido fuente y la terminología clave, pero se corrige la fórmula de juramento para un español más natural y solemne, se aligera la puntuación, y se sustituye 'pacto' por 'alianza' por mejor legibilidad bíblica en español general.
