  text: ὃν ἔπεμψα πρὸς ὑμᾶς εἰς αὐτὸ τοῦτο ἵνα ⸀γνῶτε τὰ περὶ ⸀ἡμῶν καὶ παρακαλέσῃ τὰς καρδίας ὑμῶν,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/008.yaml
  text: 'I sent him to you for this very purpose: that you may know how we are, and that he may encourage your hearts.'
translation:
  language: ko
  text: 내가 그를 바로 이 목적으로 여러분에게 보냈으니, 곧 여러분이 우리의 형편[a]을 알게 하고 그가 여러분의 마음을 위로하게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「우리가 여러분의 형편을 알게」로 읽는다.
    reason: textual_variant
lexical_decisions:
- source_word: ἔπεμψα πρὸς ὑμᾶς
  english_pob_choice: I sent him to you
  chosen_korean: 내가 그를 ... 여러분에게 보냈으니
  alternatives_korean:
  - 그를 보냈습니다
  lexicon: BDAG
  rationale: 부정과거 직설법. 「보냈으니」로 다음 절과 연결.
- source_word: εἰς αὐτὸ τοῦτο
  english_pob_choice: for this very purpose
  chosen_korean: 바로 이 목적으로
  alternatives_korean:
  - 다른 무엇도 아닌 이 목적으로
  - 이 일 자체를 위하여
  lexicon: BDAG
  rationale: 강조 αὐτὸ τοῦτο를 「바로 이」로 옮긴다.
- source_word: ἵνα γνῶτε τὰ περὶ ἡμῶν
  english_pob_choice: that you may know how we are
  chosen_korean: 여러분이 우리의 형편을 알게 하고
  alternatives_korean:
  - 너희가 우리의 사정을 알게 하려고
  lexicon: BDAG
  rationale: τὰ περὶ ἡμῶν의 「우리에 관한 일들」을 「우리의 형편」으로 옮긴다.
- source_word: παρακαλέσῃ τὰς καρδίας ὑμῶν
  english_pob_choice: he may encourage your hearts
  chosen_korean: 그가 여러분의 마음을 위로하게 하려는 것
  alternatives_korean:
  - 그가 여러분의 마음을 격려하게
  - 너희 마음을 강하게 하려는 것
  lexicon: BDAG
  rationale: παρακαλέω의 「위로·격려」를 「위로」로 옮긴다(한국 교회의 정립된 표현).
