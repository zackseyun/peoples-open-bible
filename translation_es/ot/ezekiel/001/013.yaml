translation:
  language: es
  text: Y en cuanto a la semejanza de los seres vivientes, su apariencia era como brasas de fuego que ardían[a], como la apariencia de antorchas; esto se movía entre los seres vivientes[b], y el fuego tenía resplandor[c], y del fuego salían relámpagos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «como brasas de fuego resplandecientes» o «como brasas ardientes de fuego».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «iba y venía entre los seres vivientes».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «y resplandor para el fuego»; la idea es que el fuego era radiante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  english_pob_choice: as for the likeness of
  chosen_spanish: en cuanto a la semejanza de
  alternatives_spanish:
  - la semejanza de
  - y la semejanza de
  - en cuanto a la apariencia de
  lexicon: HALOT
  rationale: דְמוּת introduce una comparación o semejanza visionaria; 'en cuanto a' refleja bien el giro enfático del hebreo sin convertirlo en una mera coordinación. 'Semejanza' conserva el valor relacional de likeness mejor que 'apariencia' en este punto, y evita confundirlo con מַרְאֶה en la cláusula siguiente.
- source_word: הַחַיּוֹת
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - los seres vivos
  - los seres animados
  lexicon: HALOT
  rationale: La fórmula de Ezequiel 1 suele designar los seres visionarios del trono; 'seres vivientes' es suficientemente literal y natural en español. 'Criaturas vivientes' también es posible, pero 'seres vivientes' evita una resonancia demasiado zoológica en este contexto.
- source_word: מַרְאֵיהֶם
  english_pob_choice: their appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - la apariencia de ellos
  - lo que parecían
  - su aspecto
  lexicon: HALOT
  rationale: El sufijo plural se expresa de manera natural con 'su' en español. 'Apariencia' conserva el sustantivo de visión/observación ligado a מַרְאֶה y permite mantener la relación con la comparación que sigue.
- source_word: כְּגַחֲלֵי אֵשׁ בֹּעֲרוֹת
  english_pob_choice: like burning coals of fire
  chosen_spanish: como brasas de fuego que ardían
  alternatives_spanish:
  - como brasas de fuego encendidas
  - como carbones encendidos de fuego
  - como brasas ardientes
  lexicon: HALOT
  rationale: גַּחֲלֵי אֵשׁ se rinde de forma directa como 'brasas de fuego'. בֹּעֲרוֹת añade la acción de arder, por eso se expresa con la relativa 'que ardían' para conservar el carácter verbal y no perder la vivacidad del hebreo.
- source_word: כְּמַרְאֵה הַלַּפִּדִים
  english_pob_choice: like the appearance of torches
  chosen_spanish: como la apariencia de antorchas
  alternatives_spanish:
  - como el aspecto de antorchas
  - como la visión de antorchas
  - como la apariencia de teas
  lexicon: HALOT
  rationale: לַפִּידִים son antorchas/teas; 'antorchas' es claro y ampliamente inteligible. 'Apariencia de' reproduce la estructura comparativa del hebreo y mantiene el paralelismo con la frase anterior.
- source_word: הִיא
  english_pob_choice: it
  chosen_spanish: ella
  alternatives_spanish:
  - ello
  - esto
  - era
  lexicon: HALOT
  rationale: El hebreo usa un pronombre femenino singular que puede apuntar a la realidad ígnea/visionaria descrita, no a un ser personal individual. 'Ella' preserva la concordancia con el antecedente femenino implícito de 'semejanza/apariencia' y mantiene la tensión del referente sin resolverla artificialmente con un neutro poco natural en español.
- source_word: מִתְהַלֶּכֶת
  english_pob_choice: was moving about
  chosen_spanish: se movía
  alternatives_spanish:
  - iba y venía
  - se desplazaba
  - andaba
  lexicon: HALOT
  rationale: El hitpael de הלך indica movimiento continuo o repetido. 'Se movía' es sobrio y natural en español; evita una expansión interpretativa y deja abierta la idea de desplazamiento activo en la visión.
- source_word: בֵּין הַחַיּוֹת
  english_pob_choice: among the living creatures
  chosen_spanish: entre los seres vivientes
  alternatives_spanish:
  - en medio de los seres vivientes
  - entre las criaturas vivientes
  lexicon: HALOT
  rationale: '''Entre'' reproduce de manera directa בֵּין y funciona bien con el plural. Aunque ''en medio de'' también sería posible, ''entre'' es más breve y mantiene mejor la correspondencia estructural.'
- source_word: וְנֹגַהּ לָאֵשׁ
  english_pob_choice: the fire had brightness
  chosen_spanish: y el fuego tenía resplandor
  alternatives_spanish:
  - y había resplandor para el fuego
  - y el fuego era resplandeciente
  - y el fuego tenía brillo
  lexicon: HALOT
  rationale: נֹגַהּ denota resplandor, brillo, fulgor. El dativo lamed puede expresar relación o posesión; 'tenía resplandor' conserva la idea de pertenencia sin forzar un giro demasiado literal. 'Resplandor' eleva el registro y evita la banalidad de 'brillo'.
- source_word: וּמִן הָאֵשׁ יוֹצֵא בָרָק
  english_pob_choice: from the fire lightning was coming forth
  chosen_spanish: y del fuego salía relámpago
  alternatives_spanish:
  - y del fuego salía un relámpago
  - y del fuego venía relámpago
  - y del fuego surgía relámpago
  lexicon: HALOT
  rationale: בָּרָק se traduce naturalmente como 'relámpago'. El participio יוֹצֵא expresa salida en curso; 'salía' mantiene ese dinamismo en español. Se omite el artículo para conservar el valor casi genérico/fenoménico del hebreo.
theological_decisions:
- issue: Referente de הִיא ('ella')
  english_pob_reading: It refers to the fiery appearance/fire moving among the living creatures, not to one creature individually.
  chosen_spanish_reading: Se deja el referente abierto dentro de la realidad de la semejanza/apariencia ígnea, sin identificarlo con un ser viviente particular.
  alternative_spanish_readings:
  - se refería a la apariencia
  - se refería al fuego
  - se refería a una de las criaturas
  rationale: El contexto inmediato sigue describiendo el fuego, su resplandor y el relámpago que sale de él. Traducir con 'ella' conserva la ambigüedad del pronombre femenino hebreo sin imponer una identificación que el texto no fija. Esto mantiene la tensión visionaria y evita resolver indebidamente el referente.
  doctrine_reference: Preservar la ambigüedad textual; no forzar una resolución interpretativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que reforzó la relación entre דְמוּת y מַרְאֵיהֶם con 'as for the likeness of' / 'their appearance', y conservó el registro formal de 'coming forth'. En español se reflejan esos ajustes con 'En cuanto a la semejanza de...' y 'salía', manteniendo un tono sobrio y visionario.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'seres vivientes' de forma coherente con Ezequiel 1 y con el registro visionario.
  - '''Relámpago'' traduce בָּרָק con el valor estándar y evita términos más interpretativos.'
  - Se conserva la ambigüedad del pronombre femenino en 'ella' para no perder la tensión del hebreo.
