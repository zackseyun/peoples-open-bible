translation:
  language: es
  text: 'A mí claman[a]: «¡Dios mío, nosotros—Israel—te conocemos[b]!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gritan». El verbo hebreo puede subrayar un clamor urgente de auxilio.'
    reason: lexical_alternative
  - marker: b
    text: «Te conocemos» puede llevar un trasfondo de relación de pacto, no solo de conocimiento intelectual.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִי
  english_pob_choice: To me
  chosen_spanish: A mí
  alternatives_spanish:
  - Para mí
  - A mí se dirige
  lexicon: HALOT
  rationale: 'La preposición ל con sufijo de 1.ª persona singular expresa aquí dirección hacia el hablante divino: el clamor va dirigido a Yahvé. «A mí» es natural en español y conserva esa orientación directa sin añadir matices ajenos.'
- source_word: יִזְעָקוּ
  english_pob_choice: they cry
  chosen_spanish: claman
  alternatives_spanish:
  - claman con fuerza
  - gritan
  - suplican
  lexicon: HALOT
  rationale: זעק puede expresar un clamor urgente o un grito de auxilio. «Claman» mantiene la intensidad sin forzar una imagen más específica que la del hebreo en este contexto.
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - ¡Dios mío!
  - mi Dios
  lexicon: HALOT
  rationale: El sustantivo con sufijo de 1.ª persona funciona como apelación directa. «Dios mío» reproduce bien la relación vocativa en español y evita una paráfrasis más interpretativa.
- source_word: יְדַעֲנוּךָ
  english_pob_choice: we know you
  chosen_spanish: te conocemos
  alternatives_spanish:
  - te hemos conocido
  - te reconocemos
  lexicon: HALOT
  rationale: ידע en qal conserva el valor básico de «conocer», con posible peso relacional/covenantal. «Te conocemos» mantiene la afirmación breve y directa, sin expandirla a una explicación teológica en el texto principal.
- source_word: יִשְׂרָאֵל
  english_pob_choice: we—Israel—
  chosen_spanish: nosotros—Israel—
  alternatives_spanish:
  - Israel
  - nosotros, Israel
  lexicon: HALOT
  rationale: ישראל aparece en aposición enfática tras el verbo en primera persona plural. «Nosotros—Israel—» preserva el golpe retórico de la autoidentificación abrupta, en paralelo al inglés auditado.
theological_decisions:
- issue: Fuerza de «conocer» en contexto de pacto
  english_pob_reading: Retain the simple relational claim 'we know you' without expanding it to covenantal obedience in the main text.
  chosen_spanish_reading: Conservar «te conocemos» sin explicitar en el texto principal «te reconocemos» o «estamos en pacto contigo».
  alternative_spanish_readings:
  - te reconocemos
  - estamos en pacto contigo
  rationale: En Oseas, «conocer» puede implicar relación de pacto y obediencia, pero el valor léxico básico sigue siendo «conocer». El español debe dejar esa tensión visible sin resolverla por interpretación excesiva.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Representación del habla directa de Israel
  english_pob_reading: 'Use quotation marks and direct speech: ''To me they cry, “My God, we—Israel—know you!”'''
  chosen_spanish_reading: Usar comillas y discurso directo, con el nombre «Israel» incrustado enfáticamente en la confesión.
  alternative_spanish_readings:
  - 'A mí claman: «Dios mío, nosotros, Israel, te conocemos»'
  - 'A mí claman: «Dios mío, Israel, te conocemos»'
  rationale: El hebreo se entiende mejor como habla directa dirigida a Dios; «Israel» funciona como autoidentificación enfática, no como nuevo destinatario. La puntuación en español intenta conservar esa brusquedad retórica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios; este borrador sigue de cerca el texto fuente hebreo y el trazado de decisiones del POB en inglés, conservando el tono directo y la tensión de «conocer» en Oseas 8:2.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando el Tetragrámaton esté presente; en este versículo el texto hebreo no contiene יהוה, así que no se introduce.
  - Se mantiene «Dios» para אֱלֹהַי por ser la forma natural y fiel del vocativo en español.
  - «Nosotros—Israel—» preserva la aposición enfática; no se normaliza a una sintaxis más suave para no perder la fuerza retórica.
