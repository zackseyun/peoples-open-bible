  language: en
  yaml_path: translation/ot/1_kings/006/006.yaml
  text: The lowest story was five cubits wide[a], the middle one six cubits wide, and the third seven cubits wide; for he made offsets around the outside of the temple[b], so that the beams would not be inserted into the walls of the temple.
  footnotes:
  - marker: a
