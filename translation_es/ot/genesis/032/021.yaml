review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y las decisiones auditadas del POB en cuanto a כפר en sentido interpersonal, la repetición de פנים en ''veré su rostro'' y el modismo final explicado en nota. Sin embargo, falla en un punto léxico importante: עַבְדְּךָ aquí fue documentado por el POB inglés como ''your servant'' por su registro diplomático, y ''tu esclavo'' en español endurece innecesariamente el sentido social. Además, la nota [a] está mal anclada: corresponde a ''Apaciguaré su rostro'', no a ''dirán''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay detalles de naturalidad y presentación que requieren ajuste. 'Y ustedes dirán' es aceptable, aunque 'Y también dirán' refleja mejor גם. 'Tu esclavo' suena demasiado fuerte y menos idiomático en esta escena diplomática; 'tu siervo' o 'tu servidor' encaja mejor, y dado el audit trail, 'tu siervo' es la mejor opción. El resto fluye bien y mantiene la textura literaria con 'rostro'.
  glossary_alignment: 'Sin términos del glosario mayor en juego como Yahvé/Mesías. La decisión relevante del proyecto sobre עבד es contextual: aunque ''esclavo'' puede ser preferible cuando el POB inglés usa ''slave'', aquí el audit trail documenta explícitamente ''servant'' por razón de registro. Por tanto, el español debe seguir esa excepción contextual con ''siervo'', no ''esclavo''.'
  issues:
  - severity: high
    issue: עַבְדְּךָ se tradujo como 'tu esclavo' en vez de reflejar la decisión auditada 'your servant'.
    rationale: El POB inglés documentó explícitamente que en este contexto diplomático 'servant' preserva mejor el registro de humildad ante Esaú. 'Esclavo' introduce una fuerza social distinta y no sigue la justificación contextual dada.
  - severity: high
    issue: La nota [a] está colocada sobre 'dirán' pero su contenido explica 'Apaciguaré su rostro'.
    rationale: Los marcadores deben aparecer exactamente en el punto textual relevante. La ubicación actual crea una discordancia entre texto y nota.
  - severity: medium
    issue: גם no está representado con claridad en la apertura.
    rationale: El hebreo dice 'y también dirán'. 'Y ustedes dirán' omite el matiz aditivo; conviene incluir 'también'.
  revised_spanish_text: 'Y también dirán: “Mira, tu siervo Jacob viene detrás de nosotros”, porque dijo: “Apaciguaré[a] su rostro con el presente que va delante de mí, y después veré su rostro[b]; quizá me acepte”.'
  revised_footnotes:
