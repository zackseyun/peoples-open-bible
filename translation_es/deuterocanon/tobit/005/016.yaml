translation:
  language: es
  text: Y además les añadiré más al salario[a], si regresan sanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «si regresan estando sanos». El griego subraya el bienestar corporal en el viaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - todavía
  - aún
  - más todavía
  lexicon: LSJ
  rationale: En la construcción con προσθήσω, el adverbio intensifica la promesa de un pago adicional. «Más» conserva esa idea de incremento de manera natural en español.
- source_word: προσθήσω
  english_pob_choice: I will add
  chosen_spanish: añadiré
  alternatives_spanish:
  - sumaré
  - agregaré
  - daré además
  lexicon: LSJ
  rationale: El futuro de προστίθημι expresa una adición a lo ya acordado. «Añadiré» es directo y idiomático en español, sin perder el sentido de incremento.
- source_word: ἐπὶ τὸν μισθόν
  english_pob_choice: to your wages
  chosen_spanish: al salario
  alternatives_spanish:
  - a tu salario
  - a tu paga
  - sobre el salario
  lexicon: LSJ
  rationale: μισθός designa remuneración por trabajo; «salario» comunica bien ese valor en español. Se evita forzar un posesivo que no está explícito en el griego, aunque el dativo σοι deja claro que la promesa va dirigida a él.
- source_word: ὑγιαίνοντες
  english_pob_choice: in good health
  chosen_spanish: sanos
  alternatives_spanish:
  - en buena salud
  - sanos y salvos
  - bien
  lexicon: LSJ
  rationale: El participio significa literalmente «estando sanos/íntegros». «Sanos» preserva la referencia corporal del viaje y es más breve y natural que una expansión explicativa en el texto principal.
- source_word: ἐπιστρέψητε
  english_pob_choice: you return
  chosen_spanish: regresan
  alternatives_spanish:
  - vuelven
  - retornan
  - regresen
  lexicon: LSJ
  rationale: En contexto de viaje, el verbo expresa regreso. Se eligió una forma verbal natural en español; la lectura condicional del griego queda visible por la estructura «si regresan».
theological_decisions:
- issue: Condición de seguridad corporal en el retorno
  english_pob_reading: if you return in good health
  chosen_spanish_reading: si regresan sanos
  alternative_spanish_readings:
  - si regresan en buena salud
  - si vuelven sanos y salvos
  rationale: La cláusula del griego destaca el estado físico al volver. «Sanos» conserva esa tensión sin añadir matices de rescate o peligro que el texto no explicita.
  doctrine_reference: No aplica; lectura lexical/contextual.
translation_notes:
  revision_awareness: La versión griega de Swete coincide con el paquete fuente y con la traducción inglesa auditada; no se registran revisiones aplicadas. La decisión española sigue la misma lectura de condicionalidad y bienestar corporal, ajustando solo la idiomaticidad natural del español.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - «Salario» se usa aquí como equivalente funcional de μισθός en un contexto de paga acordada.
  - La nota al pie conserva la alternativa literal sin desplazar el texto principal.
  - No se introdujo «Cristo», «Señor» ni otras terminologías no presentes en el versículo.
