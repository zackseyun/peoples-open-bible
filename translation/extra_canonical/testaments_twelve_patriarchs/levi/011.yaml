id: T12P.LEV.11
reference: Testament of Levi 11
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: XI. Ὅτε οὖν *ἔλαβον γυναῖκα, ἐγὼ εἴκοσι καὶ ὀκτὼ ἐτῶν ὑπῆρχον², *ἦν δὲ αὐτῇ ὄνομα Μελχά³. 2. Καὶ συλλαβοῦσα ἔτεκεν υἱόν⁴, καὶ ἐκάλεσα⁵ τὸ ὄνομα αὐτοῦ⁶ Γηρσάμ⁷, ὅτι *ἐν γῇ παροικίας ἦμεν⁸. 3. *Καὶ εἶδον⁹ περὶ αὐτόν¹⁰, ὅτι οὐκ ἔστιν¹¹ ἐν τῇ¹² πρώτῃ τάξει. 4. Καὶ¹³ ὁ Καὰθ¹⁴ ἐγεννήθη *ἐν τῷ¹⁵ τριακοστῷ πέμπτῳ¹⁶ ἔτει¹⁷ ⸢τῆς ζωῆς μου¹⁸⸥ *πρὸς ἀνατολὰς ἡλίου¹⁹. 5. *Καὶ εἶδον ἐν ὁράματι· μέσος ἐν ὑψηλοῖς ἵστατο πάσης τῆς συναγωγῆς²⁰. 6. *Διὰ τοῦτο ἐκάλεσα τὸ ὄνομα αὐτοῦ Καάθ²¹, [ὅ ἐστιν ἀρχὴ μεγαλείου καὶ συμβιβασμός]²². 7. Καὶ *τρίτον υἱὸν²³ ἔτεκέν μοι τὸν Μεραρεῖ²⁴ τῷ²⁵ τεσσαρακοστῷ²⁶ ἔτει²⁷ *τῆς ζωῆς μου²⁸, καὶ ἐπειδὴ²⁹ ἐδυστόκησεν ἡ μήτηρ αὐτοῦ ἐκάλεσα³⁰ αὐτὸν³¹ Μεραρεῖ³² ὅ ἐστι³³ *πικριασμός³⁴. 8. Ἡ δὲ Ἰωχαβέδ³⁵ *ἐγεννήθη ἐν Αἰγύπτῳ τῷ ἑξηκοστῷ τετάρτῳ μου ἔτει³⁶, *ἔνδοξος γὰρ ἦν τότε ἐν μέσῳ τῶν ἀδελφῶν μου³⁷.
  language: Greek
  source_pages:
  - 116
  - 117
  - 118
translation:
  text: 1[11:6]. When I took a wife, I was twenty-eight years old, and her name was Melcha. 2. And she conceived and bore a son, and I called his name Gersam, because we were in a land of sojourning. 3. And I saw concerning him that he was not in the first rank. 4. And Kohath was born in the thirty-fifth year of my life, and I saw in a vision, toward the sunrise, 5. that he stood in the midst of the congregation[11:8], in the heights. 6. Therefore I called his name Kohath, which is, beginning of majesty and assembly. 7. And a third son, Merari, was born to me in the fortieth year of my life; and because his mother bore him with difficulty, I called him Merari, which is bitterness. 8. And Jochebed was born in Egypt, in the sixty-fourth year of my life, for at that time I was illustrious among my brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '11:6'
    text: The explanatory phrase attached to Kohath's name is textually difficult in the Greek witness; the rendering follows the surviving sense without attempting to reconstruct a smoother text.
    reason: textual_variant
  - marker: '11:8'
    text: Some textual elements around this verse are compressed or unstable in the witness; the main line clearly states that Jochebed was born in Egypt in Levi's sixty-fourth year.
    reason: textual_variant
lexical_decisions:
- source_word: ἔλαβον γυναῖκα
  chosen: took a wife
  alternatives:
  - married
  - took a woman
  lexicon: LSJ
  rationale: A standard idiom for marrying; 'took a wife' preserves the testamentary and biblical register better than the flatter 'married,' while remaining clear.
- source_word: παροικίας
  chosen: sojourning
  alternatives:
  - exile
  - temporary residence
  - alien residence
  lexicon: LSJ
  rationale: The noun denotes living as a resident alien. 'Sojourning' preserves the patriarchal/biblical resonance and explains the naming of Gersam without over-paraphrase.
- source_word: πρώτῃ τάξει
  chosen: first rank
  alternatives:
  - first order
  - foremost place
  lexicon: LSJ
  rationale: τάξις here suggests rank or order. 'First rank' is concise and preserves the evaluative nuance of status or precedence in Levi's vision.
- source_word: ἐν ὁράματι
  chosen: in a vision
  alternatives:
  - in a dream-vision
  - in the vision
  lexicon: LSJ
  rationale: The phrase marks revelatory sight. 'In a vision' is the most natural English equivalent; verse 5 repeats the phrase, and the repetition is preserved.
- source_word: ἐν ὑψηλοῖς
  chosen: in the heights
  alternatives:
  - on high
  - in high places
  lexicon: LSJ
  rationale: The plural adjective used substantivally suggests exalted or heavenly heights. 'In the heights' preserves the elevated, visionary tone without forcing a fully cosmological interpretation.
- source_word: συναγωγῆς
  chosen: congregation
  alternatives:
  - assembly
  - gathering
  lexicon: LSJ
  rationale: Both 'congregation' and 'assembly' are possible. 'Congregation' fits the sacred communal setting of the vision, while 'assembly' is retained in verse 6's explanatory phrase to reflect the textual texture.
- source_word: ἀνατολὰς ἡλίου
  chosen: toward the sunrise
  alternatives:
  - eastward
  - toward the east
  lexicon: LSJ
  rationale: Literally 'the risings of the sun.' 'Toward the sunrise' preserves the vividness of the Greek better than the more abstract 'eastward.'
- source_word: ἀρχὴ μεγαλείου
  chosen: beginning of majesty
  alternatives:
  - rule of greatness
  - origin of greatness
  lexicon: LSJ
  rationale: The explanatory gloss attached to Kohath's name is textually difficult, but this rendering stays close to the surviving Greek and preserves its elevated diction.
- source_word: πικριασμός
  chosen: bitterness
  alternatives:
  - affliction
  - embitterment
  lexicon: LSJ
  rationale: The naming explanation for Merari is tied to difficult childbirth. 'Bitterness' is the plain lexical sense and matches the etymological explanation given in the text.
- source_word: ἔνδοξος
  chosen: illustrious
  alternatives:
  - glorious
  - honored
  lexicon: LSJ
  rationale: The adjective denotes being held in honor or distinction. 'Illustrious' fits Levi's retrospective, elevated style without sounding overly theological.
