translation:
  language: es
  text: 'Y dirás al pueblo de la tierra[a]: «Así ha dicho el Señor Yahvé acerca de los habitantes de Jerusalén en la tierra de Israel: comerán su pan con angustia y beberán su agua con horror[b], para que su tierra quede desolada[c] a causa de la violencia de todos los que habitan en ella»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pueblo de la tierra'. La expresión hebrea puede aludir a los habitantes del territorio sin precisar una categoría social técnica.
    reason: lexical_alternative
  - marker: b
    text: O 'con desolación' o 'con espanto'. El término hebreo puede expresar tanto horror sobrecogedor como desolación devastadora.
    reason: lexical_alternative
  - marker: c
    text: O 'despojada de su plenitud' o 'despojada de todo lo que la llena'. El hebreo también puede expresarse como que la tierra queda desolada al ser vaciada de su plenitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el pueblo del país
  lexicon: HALOT
  rationale: Conserva la expresión hebrea de modo cercano y natural en español. En este contexto no hace falta convertirla en una clase social técnica; por eso se mantiene la referencia amplia a los habitantes del territorio.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino como 'Yahvé', conforme al estándar del proyecto, y se traduce אֲדֹנָי como 'Señor'. La combinación evita el doblete opaco 'Señor SEÑOR' y mantiene la fuerza del título solemne.
- source_word: לְיוֹשְׁבֵי יְרוּשָׁלַם אֶל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: concerning the inhabitants of Jerusalem in the land of Israel
  chosen_spanish: acerca de los habitantes de Jerusalén, en la tierra de Israel
  alternatives_spanish:
  - para los habitantes de Jerusalén, en la tierra de Israel
  - contra los habitantes de Jerusalén, en la tierra de Israel
  lexicon: HALOT
  rationale: '''Acerca de'' refleja el valor discursivo de אֶל en esta fórmula profética, donde la palabra divina se dirige a unos para anunciar juicio sobre otros. ''Tierra de Israel'' conserva אַדְמַת como término territorial sin forzarlo a ''suelo''.'
- source_word: לַחְמָם
  english_pob_choice: their bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  lexicon: HALOT
  rationale: '''Pan'' es el equivalente directo y mantiene la imagen concreta del sustento. No se amplía a ''alimento'' porque el texto conserva la especificidad del término.'
- source_word: בִּדְאָגָה
  english_pob_choice: with anxiety
  chosen_spanish: con angustia
  alternatives_spanish:
  - con ansiedad
  - con preocupación
  lexicon: HALOT
  rationale: '''Angustia'' comunica bien el peso afectivo de דְאָגָה en español bíblico moderno y evita la frialdad de un calco literal. ''Con ansiedad'' sería posible, pero suena más técnico que pastoral.'
- source_word: וּמֵימֵיהֶם
  english_pob_choice: their water
  chosen_spanish: su agua
  alternatives_spanish:
  - sus aguas
  lexicon: HALOT
  rationale: Aunque el hebreo usa plural, en español el sustantivo massivo singular es el más natural. Se mantiene el paralelismo con 'su pan'.
- source_word: בְּשִׁמָּמוֹן
  english_pob_choice: with horror
  chosen_spanish: con horror
  alternatives_spanish:
  - con desolación
  - con espanto
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más reciente que subrayó el matiz de impacto devastador y de espanto. 'Con horror' conserva la fuerza emocional del término sin perder su vínculo con la ruina del contexto inmediato.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Introduce con naturalidad la relación de finalidad/resultado en español y mantiene la sintaxis profética del hebreo.
- source_word: תֵּשַׁם אַרְצָהּ
  english_pob_choice: her land may be made desolate
  chosen_spanish: su tierra sea hecha desolada
  alternatives_spanish:
  - su tierra quede desolada
  - su tierra sea desolada
  lexicon: HALOT
  rationale: '''Sea hecha desolada'' conserva el pasivo resultativo y el paralelismo con el juicio pronunciado. ''Hecha desolada'' evita trivializar שׁמם como mero estado y mantiene la acción judicial implícita.'
- source_word: מִמְּלֹאָהּ
  english_pob_choice: of its fullness
  chosen_spanish: de su plenitud
  alternatives_spanish:
  - de todo lo que la llena
  - de su abundancia
  lexicon: HALOT
  rationale: '''Plenitud'' reproduce la imagen de lo que llena la tierra y permite un español elevado y claro. También deja visible la relación con la pérdida de abundancia sin explicarla de más.'
- source_word: מֵחֲמַס
  english_pob_choice: because of the violence
  chosen_spanish: a causa de la violencia
  alternatives_spanish:
  - por la violencia
  - debido a la violencia
  lexicon: HALOT
  rationale: '''A causa de'' expresa con claridad el valor causal de מִן en este contexto judicial. ''Violencia'' mantiene el peso moral del término חָמָס.'
- source_word: כָּל הַיֹּשְׁבִים בָּהּ
  english_pob_choice: all who dwell in it
  chosen_spanish: todos los que habitan en ella
  alternatives_spanish:
  - todos sus habitantes
  - todos los que viven en ella
  lexicon: HALOT
  rationale: La forma participial se conserva con 'los que habitan', y el femenino 'ella' retoma la tierra con naturalidad en español. 'Habitan' mantiene un registro algo más bíblico que 'viven'.
theological_decisions:
- issue: Rendering of the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: Se sigue la norma del proyecto de traducir יְהוָה como 'Yahvé'. En el compuesto con אֲדֹנָי, 'Señor Yahvé' conserva ambos elementos sin ocultar el nombre del pacto ni recurrir al enmascaramiento litúrgico tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de בְּשִׁמָּמוֹן en paralelo con דְאָגָה
  english_pob_reading: with horror
  chosen_spanish_reading: con horror
  alternative_spanish_readings:
  - con desolación
  - con espanto
  rationale: La revisión inglesa reciente privilegió el matiz de espanto/ruina, y el español 'horror' comunica bien esa carga sin borrar la relación semántica con desolación. Se conserva así la tensión entre afecto y devastación del término hebreo.
  doctrine_reference: HALOT; revisión audit trail 2026-04-23
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que pasó de 'in desolation' a 'with horror' y de 'be laid desolate' a 'be made desolate'. La redacción española adopta 'con horror' y 'sea hecha desolada' para reflejar esos ajustes sin perder el paralelismo semántico del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'Señor' para אֲדֹנָי y no 'Soberano' ni 'Señor Dios' para conservar solemnidad y claridad.
  - Se prefiere el singular 'agua' por naturalidad del español, manteniendo el paralelismo con 'pan'.
  - Se conserva el tono profético formal, con puntuación y comillas aptas para publicación.
