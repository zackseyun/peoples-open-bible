  yaml_path: translation/ot/1_samuel/022/017.yaml
  text: Then the king said to the runners who were standing around him[a], “Turn and kill the priests of Yahweh, because their hand also is with David[b], and because they knew that he was fleeing and did not disclose it to me.” But the king’s servants were not willing to put out their hand to strike the priests of Yahweh.
  footnotes:
