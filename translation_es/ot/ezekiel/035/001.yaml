lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: En la fórmula narrativa profética, וַיְהִי introduce la secuencia del relato. En español, 'Y vino' conserva la cadencia breve del hebreo y del inglés POB sin recurrir a una perífrasis más explicativa como 'aconteció' o 'sucedió'.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - el mensaje
  lexicon: HALOT
  rationale: En דְבַר יְהוָה, 'la palabra' mantiene la fórmula profética fija y la referencia a una comunicación divina concreta. 'Mensaje' sería posible, pero diluye la terminología recurrente del texto fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' en el texto español principal, conforme al criterio del proyecto para preservar el nombre propio divino y evitar la sustitución tradicional por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa naturalmente como 'a mí'. Es la opción más transparente y fiel al valor relacional del hebreo en esta fórmula profética.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - con estas palabras,
  lexicon: HALOT
  rationale: לֵאמֹר introduce el discurso directo. 'Diciendo,' es el equivalente español más directo y conserva la transición a la cita sin añadir contenido interpretativo.
- source_word: דְבַר יְהוָה ... אֵלַי
  english_pob_choice: the word of Yahweh came to me
  chosen_spanish: la palabra de Yahvé vino a mí
  alternatives_spanish:
  - la palabra de Yahvé llegó a mí
  - la palabra de Yahvé me vino
  lexicon: HALOT
  rationale: La cláusula completa es una fórmula profética estable. 'Vino a mí' reproduce bien el movimiento del hebreo y evita una reescritura más libre como 'llegó a mí' o una inversión menos natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. La forma española 'Yahvé' preserva el nombre propio divino según la convención del proyecto y evita la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta revisiones textuales ni cambios de última pasada; la traducción española sigue la lectura estable y conserva la fórmula profética sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve con 'Y vino ... la palabra de Yahvé a mí, diciendo,'.
  - Se usa 'Yahvé' de forma consistente con el estándar terminológico del proyecto para el Tetragrámaton.
  - La nota al pie marca la alternativa tradicional 'el SEÑOR' solo como observación de traducción, no como preferencia del texto principal.
