translation:
  language: es
  text: Y vivió Sem quinientos años después de haber engendrado a Arpaksad, y engendró hijos e hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió durante
  lexicon: HALOT
  rationale: En relatos genealógicos, el wayyiqtol de חיה expresa la continuación de la vida por un período determinado; «vivió» es natural en español y conserva ese valor temporal.
- source_word: שֵׁם
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: convención onomástica española
  rationale: Se usa la forma usual en español para el nombre propio, sin alterar la identidad referencial del texto hebreo.
- source_word: אֲחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: La preposición temporal marca el período posterior al engendramiento de Arpajshad; «después de» lo expresa con claridad y fidelidad.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado
  alternatives_spanish:
  - haber engendrado a
  - haber sido padre de
  lexicon: HALOT
  rationale: El hiphil de ילד en genealogías indica engendrar/fecundar en sentido paterno. En español, el infinitivo compuesto mantiene la relación temporal tras «después de» y evita una paráfrasis más amplia.
- source_word: חֲמֵשׁ מֵאוֹת שָׁנָה
  english_pob_choice: five hundred years
  chosen_spanish: quinientos años
  alternatives_spanish:
  - quinientos años de vida
  - cincocientos años
  lexicon: HALOT
  rationale: La expresión numérica estándar se vierte de manera directa y natural como duración de vida.
- source_word: וַיּוֹלֶד
  english_pob_choice: and he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - y tuvo
  - y fue padre de
  lexicon: HALOT
  rationale: Se conserva la repetición genealógica del verbo ילד con un término español que mantiene la fuerza generativa del hebreo.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - varones y mujeres
  - niños y niñas
  lexicon: HALOT
  rationale: Aunque el hebreo distingue masculino y femenino, en español «hijos e hijas» comunica de forma natural la descendencia de ambos sexos sin perder el paralelo del original.
theological_decisions:
- issue: Descendencia masculina/femenina explícita en la genealogía
  english_pob_reading: sons and daughters
  chosen_spanish_reading: hijos e hijas
  alternative_spanish_readings:
  - hijos
  - descendencia
  rationale: El texto especifica ambos sexos; mantener la doble mención evita neutralizar una distinción explícita del hebreo.
  doctrine_reference: Precisión genealógica del texto bíblico; no implica una decisión doctrinal especial.
translation_notes:
  revision_awareness: Se corrigió el problema de validación previo eliminando cualquier pie de nota sin anclaje en el texto. No se requieren notas textuales ni alternativas adicionales para esta breve cláusula genealógica.
  spanish_consistency_notes:
  - Se preserva el tono genealógico y sobrio del registro.
  - Se evita «Cristo/SEÑOR» u otra terminología no pertinente al pasaje.
  - «Sem» se adopta como forma española habitual para el nombre propio, mientras «Arpajshad» mantiene una transliteración cercana al hebreo conforme al registro del proyecto.
