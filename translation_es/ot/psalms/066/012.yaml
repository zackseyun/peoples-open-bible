    text: O «un hombre»; el hebreo tiene el singular «un hombre», que aquí puede funcionar de manera colectiva.
    reason: lexical_alternative
  - marker: b
    text: O «a alivio», «a plenitud» o «a un lugar de abundancia»; el hebreo sugiere también la idea de saciedad o de abundancia.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para que el español suene natural y siga fiel al hebreo y al rastro de auditoría inglés: se cambió ‘a abundancia’ por ‘a un lugar de abundancia’, que expresa mejor el destino de לָרְוָיָה, y se corrigió la nota [a] para que preserve correctamente la alternativa singular hebrea frente al texto principal plural.'
