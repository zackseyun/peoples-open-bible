review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la superscripción hebrea como parte del versículo canónico y preserva los elementos musicales e históricos: לַמְנַצֵּחַ = «Para el director del coro», עַל como introducción de título/melodía = «según», לְדָוִד = «De David», מִכְתָּם transliterado, y בֶּאֱחֹז...בְּגַת = «cuando los filisteos lo capturaron en Gat». El punto principal a corregir es la nota [a]: actualmente repite el texto principal en vez de preservar la alternativa documentada en el rastro inglés («La Paloma del silencio lejano / de distante silencio», con incertidumbre sobre el sentido exacto).'
  spanish_quality_summary: El español es claro y digno, pero «Lugares Lejanos» en mayúsculas dentro del título suena algo innecesariamente acartonado; en español de títulos citados conviene minúscula interna salvo nombre propio. También conviene que la nota [a] refleje una alternativa real, no una repetición del texto principal. El resto del encabezado fluye bien y es legible para uso eclesial amplio.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «De David», «miktam», «filisteos» y «Gat» están bien alineados. No aparece el nombre divino ni otros términos sensibles del glosario. La transliteración de מִכְתָּם es correcta y la incertidumbre léxica se conserva apropiadamente en nota.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica documentada en el audit trail inglés.
    rationale: La nota inglesa registra como alternativa hebrea «The Dove of Distant Silence», mientras que la nota española repite esencialmente la lectura principal. Debe reflejar la alternativa o al menos la incertidumbre lexical concreta de אֵלֶם y רְחֹקִים.
  - severity: low
    issue: 'Capitalización poco natural dentro del título citado: «Lugares Lejanos».'
    rationale: En español, dentro de comillas y sin tratarse de nombre propio, «lugares lejanos» se lee más natural y moderno. No afecta el sentido, pero mejora la calidad estilística.
  - severity: low
    issue: Punto de puntuación respecto a «De David[a]».
    rationale: La nota anclada en «David» es posible, pero la versión inglesa no requiere nota aquí. No es error grave; se puede conservar si se desea mantener la aclaración sobre la incertidumbre del título anterior, aunque el contenido de [a] debe corresponder claramente al título citado.
  revised_spanish_text: 'Para el director del coro: según «La Paloma Silenciosa de lugares lejanos».[a] De David. Un miktam[b], cuando los filisteos lo capturaron en Gat.'
  revised_footnotes:
