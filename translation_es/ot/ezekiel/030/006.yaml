revisions:
- from: 'Así dice Yahvé: Los sostenedores de Egipto caerán, y el orgullo de su fuerza descenderá. De Migdol hasta Siene caerán por la espada dentro de ella, declara el Señor Yahvé.'
  to: 'Así dice Yahvé: Los que sostienen a Egipto caerán, y el orgullo de su fuerza descenderá. De Migdol hasta Siene caerán por la espada dentro de ella, declara el Señor Dios, Yahvé.'
  rationale: Se reemplazó «sostenedores» por «los que sostienen» para una expresión más natural y fiel al participio hebreo. También se ajustó la fórmula final a «el Señor Dios, Yahvé» para representar con mayor claridad אֲדֹנָי יְהוִה en español, manteniendo la política del proyecto de no ocultar el nombre divino.
