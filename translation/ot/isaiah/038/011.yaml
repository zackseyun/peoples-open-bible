id: ISA.38.11
reference: Isaiah 38:11
source:
  edition: WLC
  text: אָמַ֨רְתִּי֙ לֹא אֶרְאֶ֣ה יָ֔הּ יָ֖הּ בְּ/אֶ֣רֶץ הַ/חַיִּ֑ים לֹא אַבִּ֥יט אָדָ֛ם ע֖וֹד עִם י֥וֹשְׁבֵי חָֽדֶל־־־׃
translation:
  text: I said[a], “I will not see Yah, Yah in the land of the living[b]; I will no longer look on man among the inhabitants of cessation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Yah, Yah,' the short poetic form of the divine name; many translations render this 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: Or 'I will no longer look on any man with the inhabitants of Hadel'; the final expression is difficult, with חָדֶל carrying the sense of ceasing, frailty, or the realm cut off from ordinary life.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  lexicon: HALOT
  rationale: Qal perfect 1cs of אמר, introducing Hezekiah's lament in direct speech. 'I said' is the plain sense; 'I thought' is possible idiomatically but less direct.
- source_word: לֹא אֶרְאֶה
  chosen: I will not see
  alternatives:
  - I shall not see
  lexicon: HALOT
  rationale: Qal imperfect 1cs of ראה with negation expresses anticipated deprivation. Future English best fits the lament's outlook.
- source_word: יָהּ יָהּ
  chosen: Yah, Yah
  alternatives:
  - the LORD, the LORD
  - Yahweh
  lexicon: HALOT
  rationale: The Hebrew repeats the divine short form יָהּ for emphasis. Because the source text has Yah rather than the full tetragrammaton, I preserved the form by transliteration rather than substituting 'the LORD.' The repetition is retained.
- source_word: בְּאֶרֶץ הַחַיִּים
  chosen: in the land of the living
  alternatives:
  - in the land of life
  lexicon: HALOT
  rationale: A standard Hebrew idiom for the realm of the living as opposed to death/Sheol. 'Land of the living' is both natural and faithful.
- source_word: לֹא אַבִּיט
  chosen: I will no longer look on
  alternatives:
  - I will not gaze upon
  - I will not behold
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs of נבט can mean 'look at, behold.' In parallel with 'see,' 'look on' gives slight variation while preserving the visual motif. 'No longer' brings out the force with עוֹד later in the clause.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - any person
  - people
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered 'man / humankind' by context. Here it is singular and parallels the speaker's loss of human society; 'man' preserves the Hebrew's gender-accurate representative singular better than the plural 'people.'
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - again
  - anymore
  lexicon: HALOT
  rationale: 'With the negated verb, עוד conveys continuation no more: ''no longer'' is idiomatic English.'
- source_word: עִם
  chosen: among
  alternatives:
  - with
  lexicon: HALOT
  rationale: Though literally 'with,' in English 'look on man among the inhabitants...' better expresses social location within the community of the living.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those who dwell in
  - the dwellers of
  lexicon: HALOT
  rationale: Qal participle plural construct of ישב, used substantivally. 'Inhabitants of' is natural English for the construct relation.
- source_word: חָדֶל
  chosen: cessation
  alternatives:
  - the world of the dead
  - the place of ceasing
  - the transient world
  lexicon: HALOT
  rationale: The noun is difficult and rare, related to ceasing/frailty. I chose a formally transparent rendering to avoid importing an interpretation not explicit in the word itself, while preserving the stark contrast with 'the land of the living.'
