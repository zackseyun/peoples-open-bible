revisions:
- from: Entonces el rey subió a la casa de Yahvé[a], y con él todos los hombres de Judá, y todos los habitantes de Jerusalén, los sacerdotes y los profetas, todo el pueblo, desde el pequeño hasta el grande[c][b]; y leyó en sus oídos todas las palabras del Libro del Pacto que había sido hallado en la casa de Yahvé.
  to: Entonces el rey subió a la casa de Yahvé[b], y con él todos los hombres de Judá[a], y todos los habitantes de Jerusalén, y los sacerdotes, y los profetas, y todo el pueblo, desde el pequeño hasta el grande[c]; y leyó a oídos de ellos todas las palabras del Libro del Pacto que había sido hallado en la casa de Yahvé.
  rationale: Se corrige la ubicación de la nota [a] para que corresponda a כָל אִישׁ יְהוּדָה, se mejora la naturalidad de בְאָזְנֵיהֶם con «a oídos de ellos», y se reemplaza la alternativa defectuosa de la nota [c] por una opción idiomática y fiel. También se racionalizan las notas para que coincidan con el rastro auditado del POB y con el texto español revisado.
