    text: Kartah también aparece como «Kartha» en algunas traducciones.
    reason: lexical_alternative
  revision_rationale: Se corrige el topónimo final para reflejar fielmente קַרְתָּה y la decisión auditada en inglés. También se reubica la nota al pie en el nombre correspondiente. El resto del versículo puede mantenerse, pues transmite adecuadamente la sintaxis y el sentido distributivo del hebreo.
