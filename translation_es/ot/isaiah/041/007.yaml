translation:
  language: es
  text: 'El artesano fortalece al orfebre; el que alisa con el martillo fortalece al que golpea el yunque, diciendo de la soldadura[a]: «Es buena»; y lo fija con clavos para que no se tambalee[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la unión», «del ensamblaje», o, menos probablemente, «del pegamento». El término hebreo puede referirse al material o al proceso por el cual se unen las partes del objeto trabajado.
    reason: lexical_alternative
  - marker: b
    text: O «para que no sea movido» o «para que no se derrumbe».
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרָשׁ
  english_pob_choice: craftsman
  chosen_spanish: artesano
  alternatives_spanish:
  - oficial
  - técnico
  lexicon: HALOT
  rationale: חרש es un término general para un trabajador experto. «Artesano» conserva esa amplitud en español sin reducirlo a un oficio demasiado específico.
- source_word: צֹרֵף
  english_pob_choice: goldsmith
  chosen_spanish: orfebre
  alternatives_spanish:
  - platero
  - fundidor
  - joyero
  lexicon: HALOT
  rationale: צֹרֵף puede referirse a quien trabaja o refina metales, y el contexto de fabricación permite una referencia a metal precioso. «Orfebre» es más natural y preciso en español que una traducción demasiado amplia o demasiado restringida.
- source_word: מַחֲלִיק פַּטִּישׁ
  english_pob_choice: he who smooths with the hammer
  chosen_spanish: el que alisa con el martillo
  alternatives_spanish:
  - el que pule con el martillo
  - el que suaviza con el martillo
  lexicon: HALOT
  rationale: El participio de חלק aquí sugiere alisar o pulir una pieza trabajada. «Alisa con el martillo» conserva la imagen artesanal y suena natural en español.
- source_word: הוֹלֶם פָּעַם
  english_pob_choice: him who strikes the anvil
  chosen_spanish: el que golpea el yunque
  alternatives_spanish:
  - el que da golpes al yunque
  - el que bate el yunque
  lexicon: HALOT
  rationale: הולם expresa golpear o martillar; en este contexto, «yunque» comunica bien la escena de taller. La fórmula mantiene el paralelismo con la cláusula anterior.
- source_word: לַדֶּבֶק
  english_pob_choice: the soldering
  chosen_spanish: el ensamblaje
  alternatives_spanish:
  - la unión
  - la soldadura
  - el pegamento
  lexicon: HALOT
  rationale: דבק puede referirse al material o al proceso de unión. «Ensamblaje» evita imponer una sola técnica (soldadura o pegamento) y preserva la ambigüedad lexical documentada en el POB inglés.
- source_word: טוֹב הוּא
  english_pob_choice: It is good
  chosen_spanish: Es bueno
  alternatives_spanish:
  - Está bien
  - Es satisfactorio
  lexicon: HALOT
  rationale: La evaluación directa del trabajo se expresa de manera breve y literal. «Es bueno» conserva la sencillez del hebreo.
- source_word: וַיְחַזְּקֵהוּ בְמַסְמְרִים
  english_pob_choice: then he fastens it with nails
  chosen_spanish: y lo afirma con clavos
  alternatives_spanish:
  - y lo sujeta con clavos
  - y lo fija con clavos
  lexicon: HALOT
  rationale: חזק en esta cláusula describe asegurar físicamente el objeto. «Afirma con clavos» mantiene la fuerza del verbo y una elipsis natural en español.
- source_word: לֹא יִמּוֹט
  english_pob_choice: so that it will not totter
  chosen_spanish: para que no se tambalee
  alternatives_spanish:
  - para que no se mueva
  - para que no se caiga
  lexicon: HALOT
  rationale: מוט en niphal expresa vacilar, tambalearse o ser sacudido. «Se tambalee» preserva la imagen de un objeto que necesita estabilidad, en línea con la ironía profética.
theological_decisions:
- issue: Satira profética sobre la fabricación de ídolos sin introducir una glosa interpretativa innecesaria
  english_pob_reading: The verse is rendered to emphasize the cooperative fabrication and stabilization of an idol without adding interpretive language such as 'idol' into the main text.
  chosen_spanish_reading: El verso describe la cooperación técnica y la estabilización del objeto sin añadir «ídolo» en el texto principal.
  alternative_spanish_readings:
  - Insertar «ídolo» para mayor claridad
  - Parafrasear la escena como fabricación de una imagen pagana
  rationale: El contexto inmediato hace evidente el blanco de la sátira, pero el hebreo del verso nombra acciones y oficios, no el objeto de forma explícita. Mantener esa sobriedad preserva la ironía y evita ampliar el texto más allá de lo que la fuente muestra.
  doctrine_reference: Principio de primacía del texto original; no paraphrase beyond what the source warrants.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «goldsmith» frente a «metalworker» y ajustó el paralelismo de la segunda cláusula; en español se mantuvo esa precisión con «orfebre» y una estructura paralela natural. También se conservó la nota semántica sobre דבק como término ambiguo de unión/ensamblaje, y la opción de מוט como inestabilidad física.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma editorial del proyecto cuando aparezca el nombre divino, aunque en este versículo no figura.
  - Se usa un registro moderno y solemne, evitando arcaísmos innecesarios.
  - Se conserva el paralelismo de oficios y acciones para que la ironía profética permanezca visible.
