  - severity: medium
    issue: 'La nota b contiene un anglicismo sin traducir: «blamelessness»'
    rationale: Las notas deben ser plenamente legibles en español. Debe decir «intachabilidad» o expresión equivalente, no dejar el término inglés.
  - severity: low
