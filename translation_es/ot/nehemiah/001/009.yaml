  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: retorno a Dios, guardar y hacer los mandamientos, dispersión extrema, reunión y traslado al lugar escogido, y la fórmula teológica del nombre que habita. Sin embargo, hay un problema gramatical importante: el hebreo está en segunda persona plural en toda la prótasis y el español pasa a singular en ‘vuelves… guardas’, mientras luego conserva plural posesivo en ‘tus desterrados’. También la nota [a] está anclada al lugar equivocado: en el POB inglés la nota léxica corresponde a ‘outcasts’, no a ‘commandments’.'
