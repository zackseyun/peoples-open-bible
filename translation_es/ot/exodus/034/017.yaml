translation:
  language: es
  text: No te harás dioses de metal fundido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dioses fundidos» o «dioses de fundición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - ídolos
  - seres divinos
  lexicon: HALOT
  rationale: En este contexto prohibitivo, el plural constructo se refiere concretamente a objetos de culto ilícito; 'dioses' conserva la fuerza del sustantivo y evita suavizarlo a una mera descripción abstracta.
- source_word: מַסֵּכָה
  english_pob_choice: cast-metal
  chosen_spanish: de fundición
  alternatives_spanish:
  - fundidos
  - molten
  - de metal fundido
  lexicon: HALOT
  rationale: La palabra denota algo vertido o fundido en metal. 'De fundición' comunica el proceso/material sin añadir 'imagen' donde el hebreo ya dice 'dioses'.
- source_word: לֹא תַעֲשֶׂה
  english_pob_choice: You shall not make
  chosen_spanish: No te harás
  alternatives_spanish:
  - No harás
  - No debes hacer
  lexicon: HALOT
  rationale: En español jurídico y prohibitivo, 'No te harás' refleja bien la prohibición dirigida a la persona y conserva el valor de mandato del imperfecto en contexto legal.
- source_word: לָּךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu propio uso
  lexicon: HALOT
  rationale: La preposición con sufijo expresa interés personal; 'para ti' es natural en español y mantiene el matiz reflexivo sin sobrecargar la frase.
theological_decisions:
- issue: 'Objeto prohibido: ídolos metálicos, no solo imágenes genéricas'
  english_pob_reading: The verse forbids manufacturing idols, rendered 'cast-metal gods.'
  chosen_spanish_reading: La prohibición recae sobre 'dioses de fundición', manteniendo el referente idolátrico y la cualidad material.
  alternative_spanish_readings:
  - No te harás imágenes fundidas para ti.
  - No te harás ídolos de metal para ti.
  rationale: El hebreo une 'dioses' con el material/proceso de fundición; traducirlo como 'dioses de fundición' preserva ambos elementos y evita reducir el texto a una prohibición más general de imágenes.
  doctrine_reference: Éxodo 20:23; Deuteronomio 27:15
translation_notes:
  revision_awareness: La redacción sigue la revisión del POB inglés que desplazó 'for yourself' al final para reflejar mejor el hebreo. En español, se conserva ese orden natural con 'para ti' al final de la cláusula.
  spanish_consistency_notes:
  - Se mantiene 'dioses' para אֱלֹהֵי en un contexto de prohibición de idolatría, conforme al valor concreto del constructo.
  - '''De fundición'' evita el calco crudo de ''molten'' y sigue la decisión inglesa de retener el proceso material de la metalurgia.'
  - La forma negativa reflexiva 'No te harás' comunica bien el matiz de interés personal de לָּךְ sin introducir una paráfrasis más fuerte.
