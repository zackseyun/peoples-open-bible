    rationale: La nota explica la lectura alternativa de «sobre cuya cabeza...», no una variante de «manto real». Debe anclarse donde surge la ambigüedad del referente pronominal.
  - severity: medium
    issue: El texto de la nota dice «También puede traducirse» y luego repite la misma redacción del texto principal en lugar de la alternativa literal documentada.
    rationale: 'El audit trail inglés preserva una alternativa más literal: «y sobre cuya cabeza / sobre su cabeza fue puesta una corona real», con aclaración de que el pronombre probablemente refiere al caballo aunque algunos lo entienden del rey. La nota española actual no comunica bien esa función.'
