translation:
  language: es
  text: 'Entonces el faraón llamó a Abram y le dijo: «¿Qué es esto que me has hecho? ¿Por qué no me dijiste que ella es tu esposa?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a
  - citó
  lexicon: HALOT
  rationale: קרא con לְ más persona puede significar llamar o hacer venir. En español, «llamó a Abram» expresa bien la acción narrativa sin añadir la fuerza más específica de «mandó llamar» o «citó».
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: El título real se conserva como nombre común propio en español bíblico; el artículo hace natural la sintaxis española sin alterar la referencia.
- source_word: לְאַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: HALOT
  rationale: Se translitera el nombre propio siguiendo el texto fuente y la tradición POB de conservar los nombres bíblicos en forma reconocible.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: Aunque el hebreo usa el verbo general «decir», en español la presencia de complemento directo indirecto se expresa mejor con «le dijo», manteniendo el flujo narrativo y la relación con Abram.
- source_word: מַה זֹּאת
  english_pob_choice: What is this
  chosen_spanish: ¿Qué es esto?
  alternatives_spanish:
  - ¿Qué es lo que has hecho?
  - ¿Qué es esto que has hecho?
  lexicon: HALOT
  rationale: Se conserva el valor demostrativo de la expresión hebrea antes de la reproche explícito del verbo siguiente, igual que en el audit trail inglés.
- source_word: עָשִׂיתָ לִּי
  english_pob_choice: you have done to me
  chosen_spanish: me has hecho
  alternatives_spanish:
  - me hiciste
  - has hecho contra mí
  lexicon: HALOT
  rationale: El hebreo expresa un agravio personal con לִי; en español, «me has hecho» comunica con naturalidad la recriminación sin sobrecargar el texto. La idea de agravio queda implícita en el contexto.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español.
- source_word: לֹא הִגַּדְתָּ לִּי
  english_pob_choice: did you not tell me
  chosen_spanish: no me dijiste
  alternatives_spanish:
  - no me informaste
  - no me lo dijiste
  lexicon: HALOT
  rationale: נגד en hifil significa declarar o dar a conocer; «decir» es la forma más natural y fiel en español. Se mantiene el objeto indirecto «me» para reproducir la queja personal del hablante.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido omitido, no una explicación causal. En español, «que» funciona como complementizador directo y mantiene la estructura de la acusación.
- source_word: אִשְׁתְּךָ הִוא
  english_pob_choice: she is your wife
  chosen_spanish: ella es tu esposa
  alternatives_spanish:
  - es tu esposa
  - ella es tu mujer
  lexicon: HALOT
  rationale: El nominal hebreo con pronombre enfatiza el referente; «ella es tu esposa» lo reproduce con claridad. Se evita «mujer» por su posible ambigüedad en español contemporáneo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo cruzado reporta alto acuerdo; por eso se mantiene la estructura narrativa y el valor retórico del reproche sin añadir glosas interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Abram» conforme al texto fuente y a la etapa narrativa de Génesis 12.
  - Se usa «faraón» en minúscula por función común en español, salvo en encabezados o formatos que requieran capitalización propia.
  - Se conserva la secuencia de reproche en dos preguntas, reflejando el hebreo y el audit trail inglés sin fusionarlas en una sola paráfrasis.
