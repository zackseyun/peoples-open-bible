translation:
  language: es
  text: Señor, todo mi deseo[a] está delante de ti, y mi gemido[b] no está escondido de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi anhelo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi suspiro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Mi Señor
  - Señor Dios
  lexicon: HALOT
  rationale: En español, el vocativo directo y natural para אֲדֹנָי dirigido a Dios es «Señor». Mantiene la función de адресo sin introducir la convención de «Yahvé», que aquí no corresponde porque el hebreo no usa el nombre divino YHWH sino el título אדני.
- source_word: נֶגְדְּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - frente a ti
  lexicon: HALOT
  rationale: La expresión comunica que el deseo está expuesto ante la vista de Dios. «Delante de ti» conserva esa presencia abierta con un español claro y reverente.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - entero
  lexicon: HALOT
  rationale: 'Se conserva la totalización explícita del hebreo: no solo una parte, sino la totalidad del deseo del salmista.'
- source_word: תַּאֲוָתִי
  english_pob_choice: my desire
  chosen_spanish: mi deseo
  alternatives_spanish:
  - mi anhelo
  - mi longing
  lexicon: HALOT
  rationale: En este lamento, תַּאֲוָה expresa un fuerte deseo o anhelo. «Deseo» es amplio y fiel; «anhelo» queda como alternativa válida, pero «deseo» suena más natural en español sin perder el matiz de urgencia.
- source_word: וְאַנְחָתִי
  english_pob_choice: and my groaning
  chosen_spanish: y mi gemido
  alternatives_spanish:
  - y mi suspirar
  - y mi lamento
  lexicon: HALOT
  rationale: אַנְחָה apunta a una expresión audible de aflicción. «Gemido» reproduce bien el registro de dolor corporal o emocional; «suspirar» sería menos intenso en español actual.
- source_word: מִמְּךָ
  english_pob_choice: from you
  chosen_spanish: te
  alternatives_spanish:
  - de ti
  - ante ti
  lexicon: HALOT
  rationale: 'Con la pasiva «no te es oculto», el complemento puede expresarse de forma natural en español como dativo de referencia: «no te es oculto». Así se mantiene la idea de que Dios es el destinatario ante quien nada queda escondido.'
- source_word: לֹא נִסְתָּרָה
  english_pob_choice: is not hidden
  chosen_spanish: no te es oculto
  alternatives_spanish:
  - no está oculto
  - no queda escondido
  lexicon: HALOT
  rationale: El nifal de סתר expresa un estado pasivo de ocultamiento. La formulación impersonal «no te es oculto» conserva el sentido y suena más idiomática y digna en español que una simple calca.
theological_decisions:
- issue: Tratamiento de אֲדֹנָי como título divino y no como el nombre YHWH
  english_pob_reading: Lord, not the LORD
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - Señor Dios
  rationale: La fuente hebrea usa אֲדֹנָי, no el tetragrámaton. Por eso se evita cualquier convención reservada al nombre YHWH y se mantiene el título como vocativo directo. En español, «Señor» comunica adecuadamente la relación de súplica del salmista con Dios.
  doctrine_reference: 'DOCTRINE.md: Distinción entre YHWH → Yahvé y títulos divinos vocativos; no aplicar sustitución reverencial cuando el texto no contiene el nombre divino.'
translation_notes:
  revision_awareness: 'El texto base inglés ya estaba en acuerdo alto con el original y no requirió cambios de fondo en la última revisión. La propuesta española sigue el mismo análisis léxico: אֲדֹנָי como vocativo divino, נֶגְדְּךָ como presencia visible, תַּאֲוָה como deseo/anhelo, y אַנְחָה como gemido/suspirar. Se ajustó la sintaxis para sonar natural en español sin perder la tensión del lamento.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para אֲדֹנָי, no «Yahvé», porque el hebreo aquí no usa YHWH.
  - «Delante de ti» conserva la imagen de exposición ante Dios.
  - «No te es oculto» traduce idiomáticamente el pasivo hebreo con el mismo contenido semántico.
  - «Gemido» preserva el tono de aflicción del lamento mejor que un término más suave.
