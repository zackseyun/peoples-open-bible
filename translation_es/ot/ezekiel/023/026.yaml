review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: despojar de las prendas y tomar los objetos de esplendor. Sin embargo, «tus vestidos» en plural puede sonar en español moderno como ‘dresses’ más que como ropa en general, y la nota al pie introduce «artefactos», que no corresponde bien al sentido de כְּלֵי en este contexto de adornos personales.'
  spanish_quality_summary: La frase es clara y digna, pero puede mejorarse para una lectura más natural y precisa en español neutral. «Tus ropas» comunica mejor el sentido general de בְּגָדָיִךְ que «tus vestidos». «Tus adornos espléndidos» es aceptable, aunque «tus espléndidos adornos» suena un poco más natural; no obstante, mantengo la primera opción por cercanía al análisis léxico ya documentado.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. La elección «adornos» para כְּלֵי תִפְאַרְתֵּךְ está alineada con la justificación auditada y evita una paráfrasis demasiado específica como «joyas».
  issues:
  - severity: medium
    issue: «tus vestidos» puede malinterpretarse en español actual
    rationale: Aunque puede funcionar en registro bíblico, en español general suele asociarse a prendas femeninas específicas (‘vestidos’), mientras que בְּגָדָיִךְ significa ropa/garmentos en general.
  - severity: low
    issue: La nota al pie usa «artefactos»
    rationale: «Artefactos» suena mecánico e inadecuado para adornos personales; «objetos» o «artículos» refleja mejor la amplitud semántica de כְּלֵי sin desviar el sentido.
  revised_spanish_text: Te despojarán de tus ropas y tomarán tus adornos espléndidos[a].
  revised_footnotes:
