    issue: «para hacer con él» es poco idiomático en español
    rationale: Aunque reproduce de cerca el singular colectivo hebreo, en español suena torpe y puede distraer o confundir. El objetivo del POB inglés fue conservar el dato gramatical en nota pero traducir naturalmente el sentido colectivo.
  - severity: low
    issue: «te es dada» suena algo rígido
    rationale: No es incorrecto, pero «te es dada» tiene un tono más calco que español natural. «te es entregada» o «se te da» serían más fluidos; aun así, no es un error grave.
  - severity: low
    issue: La nota [a] sobre «Haman» no aporta una alternativa necesaria
    rationale: El audit trail inglés no preserva una nota sobre el nombre propio. En español «Amán» es la forma habitual y no requiere nota salvo necesidad editorial especial.
