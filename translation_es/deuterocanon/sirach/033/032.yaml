  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: una instrucción temporal al final de la vida y el mandato de dar una herencia. Sin embargo, ''En el día en que se cumplan...'' mezcla dos giros posibles (''en el día'' y ''el día en que'') y suena menos natural que una formulación española directa. Además, ''el tiempo de la muerte'' es comprensible pero algo rígido; ''el momento de la muerte'' expresa mejor καιρῷ τελευτῆς en español sin perder precisión.'
  spanish_quality_summary: La comprensión es buena, pero la redacción necesita un ajuste de naturalidad y fluidez. 'El día en que se cumplan los días de tu vida' mantiene fielmente la estructura temporal, evita un calco torpe y sigue siendo digno y claro. 'En el momento de la muerte' mejora la idiomaticidad. 'Da una herencia' es fiel, aunque algo escueto; se puede mantener por cercanía al original.
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. 'Herencia' alinea bien con κληρονομίαν y con la decisión auditada del POB inglés. No se detectan choques con terminología doctrinal del proyecto.
  issues:
  - severity: medium
    issue: 'Construcción temporal poco natural: ''En el día en que se cumplan...'''
    rationale: El griego ἐν ἡμέρᾳ puede representarse en español como 'el día en que' o 'en el día de', pero el borrador combina ambas opciones de forma redundante. Esto afecta la legibilidad sin aportar fidelidad adicional.
  - severity: low
    issue: '''el tiempo de la muerte'' suena rígido en español'
    rationale: Aunque es semánticamente correcto para καιρῷ τελευτῆς, 'el momento de la muerte' es más idiomático y mantiene el sentido de tiempo señalado/final de vida.
  - severity: low
    issue: La decisión léxica para ἐν ἡμέρᾳ justifica 'En el día' como natural en español
    rationale: Esa justificación no encaja del todo con el mejor resultado español en este contexto. La forma revisada muestra mejor la equivalencia funcional.
  revised_spanish_text: El día en que se cumplan los días de tu vida[a], y en el momento de la muerte, da una herencia.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: "en el día del cumplimiento de los días de tu vida".'
    reason: lexical_alternative
  revision_rationale: Se corrige la construcción temporal para que el español sea natural y fiel al griego, evitando la mezcla poco idiomática de 'en el día' con 'en que'. También se ajusta 'el tiempo de la muerte' a 'el momento de la muerte' por claridad y fluidez, sin alterar el sentido fuente. Se conserva 'da una herencia' por su cercanía al imperativo griego y a la decisión léxica auditada.
