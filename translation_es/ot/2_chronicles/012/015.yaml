translation:
  language: es
  text: Los hechos de Roboam[a], los primeros y los últimos, ¿no están escritos en los registros del profeta Semaías y del vidente Iddo, según el registro genealógico? Y hubo guerras entre Roboam y Jeroboam todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los registros genealógicos», o «para el registro genealógico». La frase hebrea es difícil y puede describir la forma o el propósito del material fuente asociado con Iddo.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - palabras
  - asuntos
  - eventos
  lexicon: HALOT
  rationale: En fórmulas historiográficas reales, דִבְרֵי suele abarcar hechos o acontecimientos del reinado, no solo palabras. «Hechos» mantiene ese valor narrativo en español sin volverlo demasiado interpretativo.
- source_word: הָרִאשֹׁנִים וְהָאֲחַרוֹנִים
  english_pob_choice: the first and the last
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - los anteriores y los posteriores
  - desde el principio hasta el fin
  lexicon: HALOT
  rationale: La fórmula hebrea señala la totalidad del período de Roboam. «Los primeros y los últimos» conserva la estructura y el alcance total, con buena naturalidad en español.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos?
  alternatives_spanish:
  - ¿no están registrados?
  - ciertamente están escritos
  lexicon: HALOT
  rationale: La pregunta retórica de introducción a una fuente se expresa bien con «¿no están escritos?», que conserva el tono formal y la referencia documental.
- source_word: בְּדִבְרֵי
  english_pob_choice: in the records of
  chosen_spanish: en los registros de
  alternatives_spanish:
  - en las palabras de
  - en el relato de
  - en las crónicas de
  lexicon: HALOT
  rationale: Aquí דִבְרֵי introduce material escrito. «Registros» comunica mejor el carácter documental/historiográfico que una traducción literal como «palabras».
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta inspirado
  lexicon: HALOT
  rationale: Renderización estándar y exacta de נָבִיא; no hay razón contextual para variar.
- source_word: הַחֹזֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el visionario
  lexicon: HALOT
  rationale: חֹזֶה es un título profético distinto de נָבִיא. «Vidente» preserva esa distinción en español y corresponde al valor de la forma.
- source_word: לְהִתְיַחֵשׂ
  english_pob_choice: according to genealogical enrollment
  chosen_spanish: según el registro genealógico
  alternatives_spanish:
  - en registros genealógicos
  - para el registro genealógico
  - para ser inscrito por genealogía
  lexicon: HALOT
  rationale: La expresión es difícil. «Según el registro genealógico» conserva la idea de un material ordenado o relacionado con inscripción genealógica sin sobreparafrasear ni decidir más de lo que el hebreo garantiza.
- source_word: וּמִלְחֲמ֧וֹת
  english_pob_choice: And there were wars
  chosen_spanish: Y hubo guerras
  alternatives_spanish:
  - y las guerras de
  - y guerras
  lexicon: HALOT
  rationale: El hebreo presenta un sintagma nominal; en español, hacer explícita la cópula produce una frase natural sin alterar el contenido.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all their days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - continuamente
  - durante todos sus días
  lexicon: HALOT
  rationale: Con dos reyes nombrados, el idiomático español «todos sus días» comunica la duración de sus vidas/reinados y reproduce bien la fuerza del hebreo.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés de la POB, manteniendo la estructura retórica de la cita de fuentes y la distinción entre «profeta» y «vidente». El principal ajuste al español fue hacer natural la predicación implícita en «Y hubo guerras» y condensar la frase difícil de לְהִתְיַחֵשׂ sin perder su ambigüedad documental.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se preservó la distinción terminológica entre «profeta» y «vidente», sin fusionarlas.
  - «hechos» se eligió para דִבְרֵי por el género historiográfico del contexto, no como traducción de «palabras».
  - La nota al pie conserva la ambigüedad del hebreo y refleja la misma dificultad observada en el audit trail inglés.
