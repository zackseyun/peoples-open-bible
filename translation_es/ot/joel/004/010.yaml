    rationale: La decisión inglesa auditada eligió «Beat» precisamente para conservar la imagen de martillar herramientas hasta convertirlas en armas. «Forjad» introduce una elaboración más interpretativa que el verbo hebreo no exige.
  - severity: high
    issue: «Valiente soy» para גִּבּוֹר no refleja suficientemente el contexto militar.
    rationale: El rastro léxico inglés documenta que aquí el contexto favorece «warrior». «Valiente» puede describir disposición moral, pero no comunica tan claramente la militarización del pasaje.
  - severity: medium
