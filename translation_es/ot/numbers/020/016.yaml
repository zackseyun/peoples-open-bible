base_translation:
  language: en
  yaml_path: translation/ot/numbers/020/016.yaml
  text: And we cried out to Yahweh[a], and he heard our voice and sent a messenger and brought us out of Egypt. And behold, we are in Kadesh, a city at the edge of your border.
  footnotes:
