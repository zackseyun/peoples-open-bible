    issue: «de todo lo que le pertenece» vuelve impersonal una referencia contextual a personas
    rationale: 'Aunque אֲשֶׁר לוֹ es posesivo general, aquí el complemento siguiente («el que orina contra la pared» = varón) delimita el referente a personas masculinas del grupo de Nabal. La traducción auditada en inglés ya personaliza correctamente: «of all who belong to him».'
  - severity: low
    issue: «dejo con vida» explicita de más el verbo אַשְׁאִיר
    rationale: El hebreo significa «dejar / dejar quedar». En contexto implica supervivencia, pero esa inferencia puede dejarse al lector sin añadir «con vida», manteniendo mayor cercanía formal al original.
  revised_spanish_text: Que así haga Dios a los enemigos de David[b], y aun añada más, si para la mañana dejo siquiera a un solo varón[a] de entre todos los que le pertenecen.
