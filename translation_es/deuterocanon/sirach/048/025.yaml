translation:
  language: es
  text: Declaró lo que sería para siempre, y las cosas ocultas antes de que sucedieran.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עד עולם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - hasta la eternidad
  - por siempre
  - hasta el fin de la era
  lexicon: HALOT
  rationale: La frase hebrea expresa una duración ilimitada; el griego ἕως τοῦ αἰῶνος confirma un alcance temporal abierto. En español, «para siempre» comunica con naturalidad ese span sin forzar una fórmula más rígida.
- source_word: הגיד
  english_pob_choice: declared
  chosen_spanish: declaró
  alternatives_spanish:
  - dijo
  - anunció
  - hizo saber
  lexicon: HALOT
  rationale: «Declaró» conserva el tono solemne y público del verbo hebreo, adecuado al elogio profético del contexto, sin debilitarlo a un simple «dijo».
- source_word: נהיות
  english_pob_choice: what would be
  chosen_spanish: lo que sería
  alternatives_spanish:
  - las cosas que vendrían
  - los acontecimientos futuros
  - lo que iba a suceder
  lexicon: HALOT
  rationale: El sustantivo apunta a lo venidero; «lo que sería» mantiene la referencia al futuro de manera breve y natural en español, en línea con τὰ ἐσόμενα.
- source_word: ונסתרות
  english_pob_choice: hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - las cosas escondidas
  - los secretos
  - las cosas secretas
  lexicon: HALOT
  rationale: La forma plural describe cosas ocultas o encubiertas. «Las cosas ocultas» conserva el sentido sin cargarlo con matices técnicos posteriores asociados a «apócrifos».
- source_word: לפני בואן
  english_pob_choice: before they came
  chosen_spanish: antes de que vinieran
  alternatives_spanish:
  - antes de su venida
  - antes de que llegaran
  - antes de que ocurrieran
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «antes de su venir»; en español, «antes de que vinieran» reproduce con fluidez la relación temporal y el referente plural de los eventos/personas implícitos.
theological_decisions:
- issue: Alcance temporal de la revelación profética
  english_pob_reading: He declared what would be forever, and hidden things before they came.
  chosen_spanish_reading: Él declaró lo que sería para siempre, y las cosas ocultas antes de que vinieran.
  alternative_spanish_readings:
  - Él declaró lo que sería hasta la eternidad, y las cosas ocultas antes de que vinieran.
  - Él declaró lo que sería para siempre, y las cosas secretas antes de que vinieran.
  rationale: La línea celebra una capacidad profética de revelar futuro y oculto; la traducción debe conservar ese alcance sin convertirlo en una tesis de omnisciencia exhaustiva. «Para siempre» mantiene la amplitud temporal de עד עולם / ἕως τοῦ αἰῶνος con naturalidad española.
  doctrine_reference: Preservar la tensión del texto poético-propético; primacía del hebreo con apoyo del griego paralelo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas al pie no ancladas en el texto. La redacción actual integra el valor de las alternativas léxicas dentro de las decisiones, sin marcar notas externas.
  spanish_consistency_notes:
  - Se mantuvo el sujeto implícito en tercera persona singular («Él») por coherencia con el elogio a la figura profética del contexto.
  - Se prefirió «cosas ocultas» en lugar de «secretos» para evitar un giro menos transparente y para respetar el paralelismo con el griego τὰ ἀπόκρυφα.
  - No se usó «SEÑOR» ni terminología eclesiástica ajena al verso; el pasaje no contiene el nombre divino.
  - La construcción «antes de que vinieran» conserva el valor temporal anterior del hebreo y del griego sin añadir matices doctrinales.
