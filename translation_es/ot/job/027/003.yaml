  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: duración continuada (''כָל עוֹד''), ''mi aliento en mí'', y la segunda cola con ''el espíritu de Dios''. También preserva correctamente la alternativa léxica para רוּחַ en nota. Sin embargo, ''Porque'' suena más causal de lo que exige כאן/כִּי en este contexto solemne, y ''en mis narices'' resulta poco natural y algo impropio para el sentido físico de אַף aquí, donde ''en mis fosas nasales'' o ''en mis narices'' puede entenderse, pero la primera es más clara y digna.'
  spanish_quality_summary: 'El español es mayormente comprensible, pero necesita un pequeño ajuste para mayor naturalidad y dignidad eclesial: ''Pues'' fluye mejor que ''Porque'' al inicio de una afirmación solemne, y ''fosas nasales'' evita la aspereza coloquial de ''narices''. La sintaxis con subjuntivo (''esté'') es aceptable tras ''mientras''.'
  glossary_alignment: No hay conflicto con los términos base del proyecto. 'Dios' y 'espíritu' están alineados con la política terminológica y con el audit trail inglés revisado. Las notas léxicas son apropiadas; conviene mantener la de רוּחַ y puede mantenerse la de נִשְׁמָה.
  issues:
  - severity: medium
    issue: Inicio con 'Porque'
    rationale: Aunque posible, 'Porque' introduce un matiz causal más fuerte; el hebreo כִּי aquí funciona mejor como enlace discursivo/solemne. 'Pues' o 'Porque' podrían usarse, pero 'Pues' suena más natural en español bíblico moderno.
  - severity: medium
    issue: '''en mis narices'' suena poco natural'
    rationale: אַף aquí se refiere al órgano de respirar. 'Narices' en plural es entendible, pero en español contemporáneo suena más coloquial que poético-digno. 'En mis fosas nasales' comunica con precisión el sentido físico sin perder fidelidad.
  revised_spanish_text: Pues, mientras todavía esté mi aliento en mí[a], y el espíritu de Dios[b] en mis fosas nasales,
  revised_footnotes:
