    text: «En antimonio» probablemente alude a un material decorativo o de engaste para las piedras; algunos lo entienden como un mortero oscuro o una incrustación.
    reason: cultural_note
  revision_rationale: 'La revisión conserva el sentido del hebreo y alinea el español con el expediente POB: se restaura la nota léxica sobre «zafiros», se mantiene la nota cultural de «antimonio» con anclaje correcto, se eleva el registro de הִנֵּה a «he aquí», y se reemplaza la colocación poco natural «fundaré tus cimientos» por «asentaré tus cimientos».'
