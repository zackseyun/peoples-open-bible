revisions:
- from: Salmo de Asaf. Dios[a], las naciones han venido contra tu heredad; han profanado tu santo templo; han hecho de Jerusalén un montón de ruinas.
  to: Salmo de Asaf. Dios, las naciones han entrado en tu heredad; han profanado tu santo templo; han hecho de Jerusalén un montón de ruinas.[a]
  rationale: Se corrige 'contra tu heredad' a 'han entrado en tu heredad' para ajustarse al hebreo בְּנַחֲלָתֶךָ y preservar la imagen de invasión dentro de la posesión de Dios. Se mantiene 'heredad', 'profanado tu santo templo' y 'un montón de ruinas'. La nota se reasigna al último segmento, donde sí existe una alternativa léxica relevante documentable.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:14:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del versículo y acierta en 'Salmo de Asaf', 'Dios' como vocativo, 'han profanado tu santo templo' y 'han hecho de Jerusalén un montón de ruinas'. Sin embargo, el punto principal a corregir es בָּאוּ ... בְּנַחֲלָתֶךָ, que significa 'han entrado/venido a/en tu heredad', no 'han venido contra tu heredad'. El matiz hostil ya se deduce del contexto, pero 'contra' cambia la preposición y desplaza la imagen de invasión dentro de la heredad.
  spanish_quality_summary: El español es claro, natural y digno. 'Heredad' es una buena opción por su resonancia bíblica. 'Un montón de ruinas' suena bien y transmite la imagen del plural hebreo. La puntuación con 'Dios,' funciona. La nota al pie actual ya apunta a una alternativa más cercana al hebreo, por lo que conviene incorporarla al texto principal.
  glossary_alignment: 'Alineado con la terminología del proyecto: אֱלֹהִים -> ''Dios''; no hay motivo para introducir ''Yahvé''. La elección ''heredad'' para נַחֲלָה es adecuada. No hay conflicto con otros términos del glosario.'
  issues:
  - severity: medium
    issue: '''han venido contra tu heredad'' no refleja con precisión בְּנַחֲלָתֶךָ'
    rationale: La preposición בְ indica entrada/en la heredad, no oposición 'contra'. El contexto comunica hostilidad sin necesidad de alterar la relación espacial del hebreo.
  - severity: low
    issue: La nota al pie lexical alternativa preserva mejor el sentido base que el texto principal
    rationale: Cuando la alternativa es más fiel al original que la redacción principal, conviene promoverla al texto y dejar la alternativa secundaria solo si añade valor real.
  revised_spanish_text: Salmo de Asaf. Dios, las naciones han entrado en tu heredad; han profanado tu santo templo; han hecho de Jerusalén un montón de ruinas.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «han hecho de Jerusalén ruinas». Lit. «han puesto a Jerusalén en montones de ruinas»; el hebreo expresa una imagen acumulativa de desolación.'
    reason: lexical_alternative
  revision_rationale: Se corrige 'contra tu heredad' a 'han entrado en tu heredad' para ajustarse al hebreo בְּנַחֲלָתֶךָ y preservar la imagen de invasión dentro de la posesión de Dios. Se mantiene 'heredad', 'profanado tu santo templo' y 'un montón de ruinas'. La nota se reasigna al último segmento, donde sí existe una alternativa léxica relevante documentable.
