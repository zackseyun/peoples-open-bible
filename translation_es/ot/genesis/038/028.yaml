translation:
  language: es
  text: 'Y cuando ella estaba dando a luz[a], él sacó una mano[b], y la partera tomó la mano y le ató un hilo de escarlata[c] en la mano, diciendo: «Este salió primero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras daba a luz». El hebreo literalmente dice «en su dar a luz», una expresión temporal que describe el proceso del parto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una mano salió». El hebreo literalmente dice «y dio una mano», un modismo que describe la mano del bebé emergiendo durante el parto.'
    reason: lexical_alternative
  - marker: c
    text: El hilo de escarlata se usó aquí como una marca visible para identificar cuál de los mellizos apareció primero.
    reason: cultural_note
lexical_decisions:
- source_word: בְלִדְתָּהּ
  english_pob_choice: when she was giving birth
  chosen_spanish: cuando ella estaba dando a luz
  alternatives_spanish:
  - cuando estaba dando a luz
  - mientras daba a luz
  lexicon: HALOT
  rationale: La expresión temporal con ב + infinitivo constructo indica circunstancia durante el parto. En español, «estaba dando a luz» conserva el proceso en curso con naturalidad y dignidad narrativa.
- source_word: וַיִּתֶּן יָד
  english_pob_choice: he put out a hand
  chosen_spanish: él sacó una mano
  alternatives_spanish:
  - él puso una mano
  - una mano salió
  lexicon: HALOT
  rationale: El hebreo usa literalmente «dio una mano», un giro idiomático que describe la aparición de la mano del bebé durante el parto. «Sacó una mano» comunica esa emergencia de manera natural en español sin perder el sentido corporal del hebreo.
- source_word: הַמְיַלֶּדֶת
  english_pob_choice: the midwife
  chosen_spanish: la partera
  alternatives_spanish:
  - la comadrona
  - la mujer que asistía el parto
  lexicon: HALOT
  rationale: El participio designa a la mujer que asiste el nacimiento. «Partera» es el equivalente normal y claro en español; «comadrona» sería también posible, pero «partera» suena más ampliamente reconocible en el registro bíblico moderno.
- source_word: עַל יָדוֹ שָׁנִי
  english_pob_choice: tied a scarlet thread on his hand
  chosen_spanish: le ató un hilo de escarlata en la mano
  alternatives_spanish:
  - le ató una cinta de escarlata en la mano
  - le ató un cordón escarlata en la mano
  lexicon: HALOT
  rationale: שָׁנִי denota material escarlata; el español requiere completar el sustantivo implícito. «Hilo» refleja bien el marcador visible y evita sobredimensionar el objeto como si fuera un cordón ceremonial.
- source_word: זֶה יָצָא רִאשֹׁנָה
  english_pob_choice: This one came out first
  chosen_spanish: Éste salió primero
  alternatives_spanish:
  - Éste salió antes
  - Éste fue el primero en salir
  lexicon: HALOT
  rationale: El demostrativo más el verbo de salir y el adverbio ordinal indican al niño que emergió primero, sin introducir el estatus técnico de «primogénito». «Éste salió primero» conserva la identificación inmediata del texto.
translation_notes:
  revision_awareness: 'El audit trail inglés confirma una lectura de equivalencia óptima: se conserva el sentido idiomático de וַיִּתֶּן יָד, la identificación temporal del parto y el marcador escarlata, sin forzar un calco que suene extraño en español. No se introduce ninguna revisión textual adicional, porque el contexto auditado no muestra cambios sustantivos pendientes para este versículo.'
  spanish_consistency_notes:
  - Se usa «escarlata» para שָׁנִי, manteniendo el color/trazador visible del texto.
  - Se evita «SEÑOR» o cualquier terminología teológica ajena, porque el versículo no contiene el nombre divino ni un título cristológico.
  - Se prefiere «partera» por claridad y registro bíblico natural.
  - El demostrativo «Éste» preserva la referencia al niño que emerge primero sin convertirlo en una designación técnica como «primogénito».
