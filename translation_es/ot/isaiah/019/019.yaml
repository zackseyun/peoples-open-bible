translation:
  language: es
  text: En aquel día habrá un altar para Yahvé en medio de la tierra de Egipto[a], y un pilar para Yahvé junto a su frontera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y una piedra erguida para Yahvé junto a su frontera». El hebreo מַצֵּבָה puede designar una piedra erigida o un pilar; «pilar» se usa en el texto principal por ser la forma más natural y breve.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva con una expresión natural y solemne en español. «Aquel» mantiene el valor de distancia retórica y registro escatológico.
- source_word: יִהְיֶה
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirá
  - será
  lexicon: HALOT
  rationale: Es un uso existencial de היה; en español, «habrá» comunica de forma natural la existencia de los objetos introducidos.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: El sentido normal es un altar de culto/sacrificio. No hay razón para ampliar o suavizar el término.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: HALOT
  rationale: La preposición ל expresa dedicación/pertenencia. En español, «para Yahvé» comunica de manera idiomática que el altar está consagrado a él.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - dentro de
  lexicon: HALOT
  rationale: «En medio de» preserva la localización interna dentro de Egipto sin sonar forzado. Mantiene el matiz de presencia en el interior del país.
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» refleja el constructo hebreo y conserva el tono bíblico del original mejor que simplemente «Egipto».
- source_word: וּמַצֵּבָה
  english_pob_choice: and a pillar
  chosen_spanish: y un pilar
  alternatives_spanish:
  - y una piedra erguida
  - y una piedra memorial
  lexicon: HALOT
  rationale: Se mantiene el valor léxico básico de מַצֵּבָה como una piedra/elemento erguido. «Pilar» es conciso y reproduce bien la elección inglesa, sin borrar la tensión cultual del término.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - cerca de
  - al lado de
  lexicon: HALOT
  rationale: Indica proximidad espacial concreta. «Junto a» es natural y preciso en español.
- source_word: גְּבוּלָהּ
  english_pob_choice: its border
  chosen_spanish: su frontera
  alternatives_spanish:
  - su límite
  - su borde
  lexicon: HALOT
  rationale: «Frontera» es el equivalente más idiomático en español para un límite nacional o territorial. Conserva el referente femenino a la tierra de Egipto.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: HALOT
  rationale: La repetición se mantiene para reflejar que tanto el altar como el pilar están dedicados a Yahvé. La misma solución evita inconsistencias terminológicas.
theological_decisions:
- issue: Representación del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto requiere transliterar el nombre divino con una forma reconocible en español. «Yahvé» preserva el nombre personal de Dios en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido positivo de מַצֵּבָה
  english_pob_reading: pillar
  chosen_spanish_reading: pilar
  alternative_spanish_readings:
  - piedra erguida
  - piedra memorial
  rationale: Aunque מַצֵּבָה suele tener connotaciones cultuales polémicas en otros contextos, aquí el texto la presenta positivamente como algo dedicado a Yahvé. «Pilar» conserva la forma léxica sin neutralizar la tensión teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier marcador sin anclaje. Ahora solo aparece la nota [a], y está colocada exactamente en el lugar correspondiente en el texto español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, conforme a la política del proyecto.
  - «Pilar» traduce מַצֵּבָה sin borrar su posible sentido alternativo de «piedra erguida», preservado en la nota.
  - Se preserva la repetición de «para Yahvé» para reflejar el énfasis del hebreo.
  - «Tierra de Egipto» respeta mejor la estructura del hebreo que una simplificación a «Egipto».
