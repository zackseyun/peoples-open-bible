translation:
  language: es
  text: 'Porque una palabra vino a mí por la palabra de Yahvé: «No comerás pan, ni beberás agua allí; no volverás por el camino por el que viniste[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «no volverás por el mismo camino por el que viniste». El hebreo dice más literalmente: «no volverás por ir por el camino por el que fuiste».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de lo dicho antes. En español, «Porque» conserva bien el valor explicativo-causal del hebreo y fluye naturalmente en el diálogo narrativo.
- source_word: דָבָר אֵלַי
  english_pob_choice: a word came to me
  chosen_spanish: una palabra me fue dada
  alternatives_spanish:
  - me llegó una palabra
  - una palabra vino a mí
  lexicon: HALOT
  rationale: El hebreo usa el idioma de recepción de una comunicación profética. «Me fue dada» mantiene el carácter de revelación recibida y evita una paráfrasis más libre como «mensaje».
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por medio de la palabra de Yahvé
  - por la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la repetición de דָבָר/«palabra» para reflejar el juego léxico del hebreo. «Por» expresa bien el medio o autoridad de la comunicación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» en lugar de la sustitución litúrgica «SEÑOR», preservando el nombre propio divino.'
- source_word: לֹא תֹאכַל לֶחֶם
  english_pob_choice: You shall not eat bread
  chosen_spanish: No comerás pan
  alternatives_spanish:
  - No comerás alimento
  - No has de comer pan
  lexicon: HALOT
  rationale: «Pan» reproduce el sustantivo concreto del hebreo. En español también funciona de manera natural como metonimia de comida/mesa sin diluir la textura original.
- source_word: וְלֹא תִשְׁתֶּה שָׁם מָיִם
  english_pob_choice: and you shall not drink water there
  chosen_spanish: ni beberás agua allí
  alternatives_spanish:
  - y no beberás agua allí
  - ni has de beber agua allí
  lexicon: HALOT
  rationale: Se mantiene la prohibición y el adverbio locativo «allí», que hace específica la restricción al lugar.
- source_word: לֹא תָשׁוּב לָלֶכֶת
  english_pob_choice: you shall not return by the way that you came
  chosen_spanish: no volverás por el camino por el que fuiste
  alternatives_spanish:
  - no regresarás por el camino por el que fuiste
  - no volverás por el mismo camino
  lexicon: HALOT
  rationale: El hebreo combina «volver» con un infinitivo de «ir». Se opta por una forma española natural que aún conserva la idea de no desandar la ruta.
- source_word: בַּדֶּרֶךְ אֲשֶׁר הָלַכְתָּ בָּהּ
  english_pob_choice: the way that you came
  chosen_spanish: el camino por el que fuiste
  alternatives_spanish:
  - el camino por el que viniste
  - el mismo camino
  lexicon: HALOT
  rationale: «Fuiste» sigue de cerca el verbo de movimiento del hebreo sin imponer de inmediato la perspectiva de retorno («viniste»), aunque esa sea la implicación contextual.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre propio del pacto en transliteración española, conforme al criterio del proyecto y a la decisión auditada del texto inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el packet hebreo y la solución auditada en inglés, pero adapta la última cláusula a un español natural y fiel: se evita el calco pesado de «por el camino por el que fuiste» y se conserva el sentido de no regresar por la misma ruta. La nota recoge la alternativa idiomática documentada por el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el criterio del proyecto.
  - Se conserva la repetición léxica de «palabra» para reflejar דָבָר/בִּדְבַר.
  - Se usa «pan» como equivalente concreto del hebreo, no «alimento», para preservar la textura del original.
  - La frase final se formula de modo idiomático en español, sin perder la restricción de no repetir la ruta.
