review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: sujeto colectivo singular (''Egipto''), circunstancia temporal (''cuando salieron'') y causa introducida por כִּי. También refleja adecuadamente el pluscuamperfecto explicativo en ''había caído''. Sin embargo, el pronombre final ''sobre él'' no preserva bien el sentido del hebreo ni produce español claro: עֲלֵיהֶם es plural explícito (''sobre ellos''), refiriéndose a los egipcios, aunque el sujeto previo sea el colectivo singular מִצְרַיִם. El texto español actual altera ese referente y suena forzado.'
  spanish_quality_summary: 'El español es en general natural, pero ''cuando ellos salieron'' y ''el temor de ellos ... sobre él'' generan pesadez y ambigüedad. En español bíblico legible, conviene omitir el pronombre sujeto innecesario y resolver el complemento final con plural explícito para reflejar el referente real. ''Temor de ellos'' es comprensible, pero ''temor a ellos'' expresa mejor en español el sentido objetivo/genitival: el temor que los egipcios sentían hacia Israel.'
  glossary_alignment: 'No hay términos de glosario mayor en disputa. La decisión ''Egipto'' para מִצְרַיִם es aceptable. ''Se alegró'' para שָׂמַח y ''porque'' para כִּי son adecuados. La principal corrección necesaria es sintáctico-semántica: עֲלֵיהֶם debe representarse en español como plural (''sobre ellos''), y פַּחְדָּם se expresa mejor como ''temor a ellos'' que como ''temor de ellos'' para evitar ambigüedad.'
  issues:
  - severity: high
    issue: El borrador traduce עֲלֵיהֶם como 'sobre él'.
    rationale: El hebreo tiene sufijo plural 3mp, no singular. Aunque מִצְרַיִם sea colectivo singular, la cláusula final dice literalmente que el miedo cayó 'sobre ellos', es decir, sobre los egipcios. 'Sobre él' cambia el número y enturbia el sentido.
  - severity: medium
    issue: '''El temor de ellos'' es ambiguo en español.'
    rationale: Puede entenderse como el temor que ellos sienten, no el temor que otros les tienen. Dado que el hebreo indica temor causado por Israel, 'temor a ellos' comunica mejor la relación objetiva.
  - severity: low
    issue: '''Cuando ellos salieron'' suena más pesado de lo necesario.'
    rationale: 'El pronombre ''ellos'' no es necesario en español y puede omitirse sin pérdida de claridad: ''cuando salieron''.'
  - severity: low
    issue: La nota al pie conserva la misma ambigüedad y el mismo problema de número.
    rationale: La alternativa debe corregirse en paralelo para no documentar una opción española menos fiel que el texto revisado.
  revised_spanish_text: Egipto se alegró cuando salieron[a], porque el temor a ellos había caído sobre ellos.
  revised_footnotes:
  - marker: a
    text: 'O: «Egipto se regocijó al salir ellos, porque el temor a ellos había caído sobre ellos».'
    reason: lexical_alternative
  revision_rationale: Se corrige el referente y número de עֲלֵיהֶם con 'sobre ellos', se aclara el sentido objetivo de פַּחְדָּם con 'temor a ellos', y se aligera el español quitando el pronombre sujeto innecesario. Se conserva 'Egipto' como sujeto colectivo singular, en línea con el hebreo y el rastro de auditoría inglés.
