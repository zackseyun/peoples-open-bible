    text: Literally, 'a donkey, bread'—that is, a donkey carrying or loaded with bread.
    reason: lexical_alternative
  - marker: b
    text: Or 'through David his son'; Hebrew 'by the hand of David his son' is an idiom for agency or delivery.
    reason: lexical_alternative
