translation:
  language: es
  text: Y en la parte superior del soporte había un borde redondo todo alrededor, de medio codo de alto; y en la parte superior del soporte, sus soportes[a] y sus paneles[b] eran de una sola pieza con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus agarraderas'; el hebreo יְדֹתֶיהָ literalmente significa 'sus manos' y puede referirse a partes proyectantes del soporte.
    reason: lexical_alternative
  - marker: b
    text: O 'sus marcos' para 'sus paneles'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרֹאשׁ הַמְּכוֹנָה
  english_pob_choice: on the top of the stand
  chosen_spanish: en la parte superior del soporte
  alternatives_spanish:
  - sobre la parte superior del soporte
  - en la cima del soporte
  lexicon: HALOT
  rationale: רֹאשׁ expresa la parte superior o cima; en español, 'parte superior' comunica con naturalidad el valor espacial sin perder precisión. מְכוֹנָה en este contexto arquitectónico designa el soporte/base de bronce, por lo que 'soporte' es adecuado y transparente.
- source_word: חֲצִי הָאַמָּה קוֹמָה
  english_pob_choice: half a cubit high
  chosen_spanish: de medio codo de alto
  alternatives_spanish:
  - con una altura de medio codo
  - medio codo de altura
  lexicon: HALOT
  rationale: קוֹמָה indica altura. 'De medio codo de alto' es una forma natural en español y conserva la medida y su función descriptiva.
- source_word: עָגֹל סָבִיב
  english_pob_choice: a round rim all around
  chosen_spanish: un borde redondo todo alrededor
  alternatives_spanish:
  - un aro redondo todo alrededor
  - un reborde circular alrededor
  lexicon: HALOT
  rationale: El inglés POB precisó la estructura como 'rim' y el hebreo describe un elemento redondo que rodea la pieza. 'Borde redondo' transmite la forma sin introducir una figura más técnica de lo que exige el hebreo.
- source_word: יְדֹתֶיהָ
  english_pob_choice: its supports
  chosen_spanish: sus salientes
  alternatives_spanish:
  - sus soportes
  - sus agarraderas
  lexicon: HALOT
  rationale: La raíz יָד puede referirse literalmente a 'manos', pero aquí apunta a partes proyectantes de la pieza. 'Salientes' conserva esa ambigüedad estructural sin fijar indebidamente la función; se mantiene la nota de alternativa posible en el aparato.
- source_word: וּמִסְגְּרֹתֶיהָ
  english_pob_choice: its panels
  chosen_spanish: sus paneles
  alternatives_spanish:
  - sus marcos
  - sus encuadres
  lexicon: HALOT
  rationale: מִסְגְּרוֹת en esta descripción de mobiliario/estructura alude a secciones enmarcadas. 'Paneles' corresponde bien al español actual y sigue la decisión inglesa revisada.
- source_word: מִמֶּנָּה
  english_pob_choice: were of one piece with it
  chosen_spanish: eran de una sola pieza con él
  alternatives_spanish:
  - salían de él
  - eran parte de él
  lexicon: HALOT
  rationale: El מן con sufijo expresa integración material, no mera procedencia. 'De una sola pieza con él' hace explícita esa unión estructural que el inglés POB también quiso dejar clara.
translation_notes:
  revision_awareness: Se siguió el pasaje del texto hebreo WLC y el auditorio inglés POB, incorporando la revisión más reciente que precisó 'rim' como 'borde'. Se mantuvo la relación integral de las piezas con el soporte según מִמֶּנָּה, y se conservaron las alternativas léxicas documentadas para יְדֹתֶיהָ y מִסְגְּרֹתֶיהָ.
  spanish_consistency_notes:
  - Se usó 'soporte' para מְכוֹנָה por coherencia con un objeto arquitectónico/ornamental, sin forzar terminología eclesiástica.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - '''De una sola pieza con él'' mantiene la fuerza de integración material del hebreo y del inglés auditado.'
  - La puntuación sigue el español moderno con separación clara de miembros coordinados y medida insertada con comas y punto y coma.
