translation:
  language: es
  text: Y pondrás aceite sobre ella[a], y pondrás sobre ella incienso puro; es una ofrenda de cereal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «y darás aceite sobre ella ... y pondrás incienso sobre ella». Los verbos hebreos son términos comunes para colocar o aplicar los elementos sobre la ofrenda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  english_pob_choice: put / give / set
  chosen_spanish: pondrás
  alternatives_spanish:
  - darás
  - colocarás
  - pondrás sobre
  lexicon: HALOT
  rationale: נתן es amplio ('dar, poner, colocar'). En una instrucción ritual, «pondrás» comunica de forma natural la acción de aplicar el aceite sobre la ofrenda sin perder el sentido de colocación física.
- source_word: עָלֶיהָ
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de ella
  - sobre ella
  - encima de él
  lexicon: HALOT
  rationale: La preposición על con sufijo femenino se refiere a la ofrenda. En español, «ofrenda» es femenina, pero aquí «él» evita una repetición poco fluida del referente implícito con el sustantivo colectivo/técnico entendido en el contexto; se mantiene la idea de superposición con «sobre».
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite
  lexicon: HALOT
  rationale: En español bíblico, «aceite» es el equivalente natural de «oil». El hebreo no especifica oliva, así que no se añade esa precisión.
- source_word: וְשַׂמְתָּ
  english_pob_choice: place / set
  chosen_spanish: le añadirás
  alternatives_spanish:
  - pondrás
  - colocarás
  - le pondrás
  lexicon: HALOT
  rationale: שׂים puede significar 'poner, colocar, añadir'. Aquí se expresa como «le añadirás» para reflejar la segunda acción ritual y evitar una repetición demasiado mecánica de «pondrás».
- source_word: לְבֹנָה
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - olíbano
  - incienso puro
  lexicon: HALOT
  rationale: לבנה se refiere específicamente al frankincense. En español, «incienso» es la designación más comprensible y natural en contextos cultuales; «olíbano» sería más técnico pero menos accesible.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda de grano
  - ofrenda vegetal
  - oblación
  lexicon: HALOT
  rationale: מנחה en Levítico designa la ofrenda de cereal/grano, no una ofrenda general. «Ofrenda de cereal» comunica el sentido cultual con claridad en español y evita una lectura demasiado amplia.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es ella
  alternatives_spanish:
  - es eso
  - es esta
  lexicon: HALOT
  rationale: El pronombre retoma la ofrenda mencionada y mantiene la predicación simple del hebreo. «Ella» concuerda con el sustantivo femenino implícito en español y conserva la identificación directa.
theological_decisions:
- issue: Naturaleza de מנחה en el contexto sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda de cereal
  alternative_spanish_readings:
  - ofrenda de grano
  - oblación
  - ofrenda vegetal
  rationale: El contexto de Levítico requiere una designación sacrificial específica, no un término genérico. «Ofrenda de cereal» preserva la función cultual y evita confundirla con una simple 'ofrenda' indefinida.
  doctrine_reference: Levítico 2; HALOT s.v. מנחה
translation_notes:
  revision_awareness: La fuente hebrea y el audit trail inglés están en alto acuerdo; no hubo cambios textuales relevantes en la revisión más reciente. Se conservó la secuencia ritual de dos acciones con aceite e incienso y la identificación final de la ofrenda como מנחה.
  spanish_consistency_notes:
  - Se usa «aceite» para שֶׁמֶן y «incienso» para לְבֹנָה, manteniendo claridad natural en español sin perder precisión cultual.
  - Se prefirió «ofrenda de cereal» para מִנְחָה, siguiendo el valor sacrificial específico documentado por el audit trail.
  - El pronombre final se expresó como «ella» para concordar con el sustantivo femenino implícito en español y conservar la simple identificación del hebreo.
