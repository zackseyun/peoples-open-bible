translation:
  language: es
  text: para distinguir entre el justo y el pecador[a], para retribuir a los pecadores para siempre[b] según sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «separar al justo del pecador».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «para el siglo»; aquí probablemente significa de manera duradera o para siempre.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαστεῖλαι
  english_pob_choice: distinguish
  chosen_spanish: distinguir
  alternatives_spanish:
  - separar
  - hacer distinción entre
  lexicon: BDAG
  rationale: El verbo expresa una diferenciación clara entre dos categorías morales. «Distinguir» conserva bien el valor judicial/discriminador sin reducirlo a una separación meramente espacial.
- source_word: ἀνὰ μέσον
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - en distinción entre
  lexicon: BDAG
  rationale: Es la forma natural en español para marcar contraste o separación entre dos elementos.
- source_word: δικαίου
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  lexicon: BDAG
  rationale: El singular funciona de manera genérica como tipo moral. «El justo» preserva esa fuerza representativa con claridad en español.
- source_word: ἁμαρτωλοῦ
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el hombre pecador
  - el impío
  lexicon: BDAG
  rationale: El contraste con δικαίου se conserva mejor con «el pecador», que es directo y corresponde al término moral del original.
- source_word: ἀποδοῦναι
  english_pob_choice: repay
  chosen_spanish: retribuir
  alternatives_spanish:
  - repagar
  - pagar en retorno
  - dar en pago
  lexicon: BDAG
  rationale: En este contexto judicial, «retribuir» comunica correspondencia retributiva y mantiene el matiz de pago o recompensa por lo hecho.
- source_word: ἁμαρτωλοῖς
  english_pob_choice: sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - los pecadores
  - para los pecadores
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente con la preposición «a» tras «retribuir», manteniendo la referencia del destinatario de la acción.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por el siglo
  lexicon: BDAG
  rationale: En este contexto punitivo, la frase denota continuidad duradera. «Para siempre» es la equivalencia natural en español y evita una literalidad opaca.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  english_pob_choice: according to their deeds
  chosen_spanish: según sus obras
  alternatives_spanish:
  - de acuerdo con sus obras
  - conforme a sus obras
  - según lo que han hecho
  lexicon: BDAG
  rationale: «Obras» conserva el término moral y judicial del original; «según» reproduce bien la norma de correspondencia del griego.
theological_decisions:
- issue: Singulares genéricos en contraste moral
  english_pob_reading: Rendered δικαίου and ἁμαρτωλοῦ as class-representative terms (“the righteous” / “the sinner”) rather than individualized male figures.
  chosen_spanish_reading: Se tradujeron como «el justo» y «el pecador» para conservar el contraste moral genérico sin convertirlo en dos personas concretas.
  alternative_spanish_readings:
  - el justo y el hombre pecador
  - el justo y el impío
  rationale: Los singulares griegos funcionan como categorías representativas en un contexto de juicio. Esta traducción mantiene la tensión moral del texto sin forzar una lectura individualizante.
  doctrine_reference: Precisión semántica y representación genérica
- issue: Valor temporal de εἰς τὸν αἰῶνα
  english_pob_reading: Literally “for the age”; here likely meaning enduringly or forever.
  chosen_spanish_reading: «Para siempre» recoge el sentido duradero sin ocultar la nota de perpetuidad del juicio.
  alternative_spanish_readings:
  - por el siglo
  - para la era
  rationale: La expresión griega puede leerse literalmente como «para el siglo», pero en este contexto la POB la entiende idiomáticamente como duración indefinida o perpetua. El español debe ser claro y fiel al sentido contextual.
  doctrine_reference: Duración del castigo / temporalidad idiomática
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete y armoniza con la decisión auditada de la POB inglesa: distinguir/separar, singulares genéricos para las categorías morales, y εἰς τὸν αἰῶνα entendido idiomáticamente como duración perpetua. No se introdujeron lecturas textuales alternativas ni cambios de sentido respecto del registro inglés auditado.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Obras» se usó para conservar la correspondencia moral/judicial del griego; no se sustituyó por «méritos» ni otro término interpretativo.
  - La nota de pie a[b] se ancla en el texto porque el valor de εἰς τὸν αἰῶνα merece aclaración en español igual que en el audit trail inglés.
  - La opción «el pecador» conserva el paralelismo con «el justo» y no masculiniza innecesariamente más allá del singular genérico ya presente en el griego.
