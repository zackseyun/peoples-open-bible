translation:
  language: es
  text: 'Pero la higuera les dijo[a]: «¿Habré de dejar de producir mi dulzura y mi buen fruto, para ir a cernearme sobre los árboles?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a gobernar sobre los árboles». El verbo hebreo significa literalmente «moverse» o «cernearse/mecerse», preservando la imagen del árbol y, al mismo tiempo, sugiriendo dominio en la fábula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw narrativo avanza la escena; en español, «Pero» conserva el contraste ya presente en la fábula y fluye de manera natural sin perder continuidad.
- source_word: הַתְּאֵנָה
  english_pob_choice: the fig tree
  chosen_spanish: la higuera
  alternatives_spanish:
  - la higuera de higos
  - el árbol de higos
  lexicon: HALOT
  rationale: En español bíblico, «higuera» comunica con precisión la persona parlante de la fábula sin necesidad de ampliar a «árbol de higos».
- source_word: הֶחֳדַלְתִּי
  english_pob_choice: Should I stop producing
  chosen_spanish: ¿Habré de dejar de producir
  alternatives_spanish:
  - ¿Dejaré de producir?
  - ¿He de cesar de producir?
  - ¿Debería dejar de producir?
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí con fuerza deliberativa en pregunta retórica. «Habré de dejar de» mantiene la idea de decisión/propuesta más que un simple pasado o una orden.
- source_word: מָתְקִי
  english_pob_choice: my sweetness
  chosen_spanish: mi dulzura
  alternatives_spanish:
  - mi dulzura dulce
  - mi dulce sabor
  - mi dulzura/fruto dulce
  lexicon: HALOT
  rationale: El sustantivo apunta a la cualidad de dulzura. «Mi dulzura» conserva el lenguaje figurado de la personificación; «fruto dulce» sería más explicativo que el hebreo.
- source_word: תְּנוּבָתִי הַטּוֹבָה
  english_pob_choice: my good fruit
  chosen_spanish: mi buen fruto
  alternatives_spanish:
  - mi buena cosecha
  - mi buen producto
  - mi buen rendimiento
  lexicon: HALOT
  rationale: תְּנוּבָה puede ser produce/yield/fruit. En una higuera, «fruto» es la equivalencia contextual más natural; «buen» conserva el adjetivo sin forzar una interpretación técnica.
- source_word: לָנוּעַ
  english_pob_choice: to sway over
  chosen_spanish: a mecerme
  alternatives_spanish:
  - a moverme
  - a oscilar
  - a balancearme
  - a tener dominio
  lexicon: HALOT
  rationale: נוע describe moverse/swaying. En español, «mecerme» preserva la imagen arbórea y la ambigüedad entre movimiento literal e insinuación de gobierno, como en la POB inglesa.
- source_word: עַל הָעֵצִים
  english_pob_choice: over the trees
  chosen_spanish: sobre los árboles
  alternatives_spanish:
  - entre los árboles
  - por encima de los árboles
  - sobre los demás árboles
  lexicon: HALOT
  rationale: «Sobre los árboles» mantiene la preposición espacial y la imagen de la fábula; evita convertir demasiado pronto la metáfora en una explicación de dominio.
theological_decisions:
- issue: 'La metáfora del verbo לָנוּעַ: movimiento literal vs. insinuación de reinar/gobernar'
  english_pob_reading: to sway over the trees; footnote allows 'to rule over the trees' as lexical alternative
  chosen_spanish_reading: a mecerme sobre los árboles[a]
  alternative_spanish_readings:
  - a gobernar sobre los árboles
  - a ejercer dominio sobre los árboles
  - a moverme sobre los árboles
  rationale: 'La POB inglesa preserva primero la imaginería física («sway») y deja la lectura de autoridad como alternativa. El español «mecerme» reproduce ese balance: conserva el movimiento literal y no borra la posibilidad de alusión a dominio, que se aclara en la nota.'
  doctrine_reference: None
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran alta concordancia y sin revisiones aplicadas; se mantiene la decisión central de preservar la metáfora arbórea del verbo לָנוּעַ, sin introducir una traducción interpretativa de reinar en el texto principal.
  spanish_consistency_notes:
  - Se conserva «higuera» para el personaje vegetal, en paralelo con la POB inglesa «fig tree».
  - «Mi dulzura» y «mi buen fruto» mantienen el paralelismo semántico del hebreo sin fusionar ambos miembros.
  - La nota al pie recoge la alternativa de gobierno/dominio porque el español, como el inglés, puede oscurecer la doble fuerza de la imagen si se traduce solo con un verbo de movimiento.
