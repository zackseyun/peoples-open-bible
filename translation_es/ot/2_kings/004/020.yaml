revisions:
- from: Y lo cargó y lo llevó a su madre[a], y estuvo sentado sobre sus rodillas hasta el mediodía; entonces murió.
  to: Y lo cargó y lo llevó a su madre[a], y se sentó sobre sus rodillas hasta el mediodía; entonces murió.
  rationale: 'Se hace una reparación menor: «se sentó» representa mejor el valor simple de וַיֵּשֶׁב y suena más natural en español, mientras se conserva la literalidad de «sobre sus rodillas» y la nota alternativa «en su regazo». No se requiere adjudicación adicional.'
