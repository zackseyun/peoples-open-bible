translation:
  language: es
  text: 'Y la semejanza de sus rostros eran los mismos rostros que había visto junto al río Quebar: sus apariencias[a] y ellos mismos. Cada uno iba directamente hacia adelante[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus apariencias y ellos mismos», subrayando que se trataba de los mismos seres vistos antes junto al río Quebar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cada uno iba hacia el lado de su rostro», un modismo que significa que avanzaban sin girar ni apartarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  english_pob_choice: And the likeness
  chosen_spanish: Y la semejanza
  alternatives_spanish:
  - Y la apariencia
  - Y la forma
  lexicon: HALOT
  rationale: דְּמוּת expresa semejanza, forma o apariencia. «Semejanza» conserva el vínculo con el lenguaje visionario de Ezequiel y evita reducirlo a una simple percepción visual.
- source_word: פְּנֵיהֶם / הַפָּנִים
  english_pob_choice: their faces ... the faces
  chosen_spanish: sus rostros ... los rostros
  alternatives_spanish:
  - su rostro ... el rostro
  - su apariencia ... la apariencia
  lexicon: HALOT
  rationale: פָּנִים significa literalmente «rostro/cara». «Rostros» preserva la imagen concreta de los seres vivientes y mantiene el plural del hebreo.
- source_word: מַרְאֵיהֶם וְאוֹתָם
  english_pob_choice: their appearances and themselves
  chosen_spanish: sus apariencias y ellos mismos
  alternatives_spanish:
  - su apariencia y ellos mismos
  - su forma y ellos
  lexicon: HALOT
  rationale: El hebreo concentra identidad y reencuentro en una expresión compacta. «Sus apariencias y ellos mismos» conserva el plural y la fuerza enfática, sin suavizar la repetición.
- source_word: אִישׁ אֶל עֵבֶר פָּנָיו יֵלֵכוּ
  english_pob_choice: Each one went straight ahead
  chosen_spanish: Cada uno iba derecho hacia adelante
  alternatives_spanish:
  - Cada uno iba hacia la dirección de su rostro
  - Cada uno avanzaba sin desviarse
  lexicon: HALOT
  rationale: La construcción es idiomática y literalmente alude a ir hacia el lado/frente de su rostro. En español, «iba derecho hacia adelante» transmite con claridad la idea de avanzar sin girar.
- source_word: עַל נְהַר כְּבָר
  english_pob_choice: by the Kebar River
  chosen_spanish: junto al río Quebar
  alternatives_spanish:
  - por el río Quebar
  - a orillas del río Quebar
  lexicon: HALOT
  rationale: La preposición con río se expresa de modo natural en español con «junto a», manteniendo la referencia geográfica propia del relato.
theological_decisions:
- issue: Conservación de la identidad de la visión anterior
  english_pob_reading: their appearances and themselves emphasizes that these were the same beings Ezekiel had seen earlier by the Kebar River.
  chosen_spanish_reading: sus apariencias y ellos mismos enfatiza que eran los mismos seres que Ezequiel había visto antes junto al río Quebar.
  alternative_spanish_readings:
  - su apariencia y ellos mismos
  - sus formas y ellos mismos
  rationale: El hebreo y la nota inglesa insisten en la identidad entre la visión presente y la anterior. La formulación española mantiene esa repetición para no diluir la conexión visionaria.
  doctrine_reference: Ezequiel 10:22; continuidad de la visión en Ezequiel 1 y 10
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del inglés POB, que ajustó el plural de «appearances» para reflejar con mayor precisión la pluralidad del hebreo. La versión española conserva ese plural con «apariencias» y mantiene la construcción enfática completa.
  spanish_consistency_notes:
  - Se emplea «Quebar» como transliteración del nombre propio del río, en línea con una tradición transliterada clara.
  - Se usa «rostros» en plural para reflejar el hebreo פָּנִים y evitar la singularización innecesaria.
  - «Iba derecho hacia adelante» traduce el modismo sin recurrir a una paráfrasis excesiva.
