translation:
  language: es
  text: Con las espadas de hombres valientes haré caer tu multitud, todos ellos, los crueles[a] de las naciones. Saquearán el orgullo de Egipto[b], y toda su multitud será destruida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los tiranos de las naciones»; el hebreo puede referirse a personas crueles, violentas o tiránicas.
    reason: lexical_alternative
  - marker: b
    text: O «la majestad de Egipto»; el hebreo puede denotar tanto orgullo como grandeza o esplendor.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַרְבוֹת
  english_pob_choice: By the swords of
  chosen_spanish: Con las espadas de
  alternatives_spanish:
  - Por las espadas de
  - Mediante las espadas de
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental; en español, «con» conserva el medio de acción sin sonar forzado. Mantiene la imagen bélica del hebreo.
- source_word: גִּבּוֹרִים
  english_pob_choice: mighty men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - guerreros
  - hombres poderosos
  lexicon: HALOT
  rationale: El término designa guerreros fuertes o valientes. «Hombres valientes» preserva la fuerza militar y es natural en español; «guerreros» sería posible, pero menos literal al sustantivo adjetivado del hebreo.
- source_word: אַפִּיל
  english_pob_choice: I will make ... fall
  chosen_spanish: haré caer
  alternatives_spanish:
  - haré que caiga
  - derribaré
  lexicon: HALOT
  rationale: El causativo de נפל pide una forma que exprese acción provocada. «Haré caer» conserva la causatividad y el efecto de abatimiento.
- source_word: הֲמוֹנֶךָ
  english_pob_choice: your multitude
  chosen_spanish: tu multitud
  alternatives_spanish:
  - tu muchedumbre
  - tu tropel
  lexicon: HALOT
  rationale: «Multitud» reproduce bien הָמוֹן en este contexto profético de masa humana o militar y mantiene la repetición del término en el verso.
- source_word: עָרִיצֵי גוֹיִם כֻּלָּם
  english_pob_choice: all of them the ruthless ones of the nations
  chosen_spanish: todos ellos, los crueles de las naciones
  alternatives_spanish:
  - todos ellos, los tiranos de las naciones
  - todos ellos, los violentos de las naciones
  lexicon: HALOT
  rationale: עָרִיץ puede expresar dureza, crueldad o tiranía. «Crueles» preserva el tono opresivo sin introducir una especificación política que el hebreo no exige; se mantiene el enlace apposicional con «todos ellos».
- source_word: וְשָׁדְדוּ
  english_pob_choice: They will plunder
  chosen_spanish: Saquearán
  alternatives_spanish:
  - Despojarán
  - Plantearán
  lexicon: HALOT
  rationale: El verbo שׁדד en contexto bélico significa saquear o despojar. «Saquearán» es claro y transmite la acción militar de manera natural en español.
- source_word: גְּא֣וֹן מִצְרַ֔יִם
  english_pob_choice: the pride of Egypt
  chosen_spanish: el orgullo de Egipto
  alternatives_spanish:
  - la majestad de Egipto
  - la grandeza de Egipto
  lexicon: HALOT
  rationale: גָּאוֹן puede abarcar orgullo, altivez o grandeza. «Orgullo» sigue la lectura de juicio del POB y conserva la ambigüedad entre lo que Egipto se atribuye y su esplendor ostentoso.
- source_word: וְנִשְׁמַד
  english_pob_choice: will be destroyed
  chosen_spanish: será destruida
  alternatives_spanish:
  - será aniquilada
  - perecerá
  lexicon: HALOT
  rationale: El nifal de שׁמד expresa destrucción total. «Será destruida» es una equivalencia directa, sobria y suficientemente fuerte para el oráculo.
- source_word: כָּל הֲמוֹנָהּ
  english_pob_choice: all her multitude
  chosen_spanish: toda su multitud
  alternatives_spanish:
  - toda su muchedumbre
  - todo su tropel
  lexicon: HALOT
  rationale: La repetición de הָמוֹן se refleja con «multitud» otra vez, preservando el paralelismo retórico del hebreo y el referente femenino de Egipto.
theological_decisions:
- issue: Sentido de גְּאוֹן en un oráculo de juicio
  english_pob_reading: the pride of Egypt
  chosen_spanish_reading: el orgullo de Egipto
  alternative_spanish_readings:
  - la majestad de Egipto
  - la grandeza de Egipto
  rationale: En este contexto de humillación, el término puede leerse como el orgullo arrogante de Egipto o como aquello en lo que Egipto se gloría. «Orgullo» conserva la lectura de juicio del POB sin borrar la posible amplitud semántica del hebreo.
  doctrine_reference: Éxodo 14; Isaías 13–14; Ezequiel 30–32 (tema del abatimiento de la soberbia de las naciones)
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y el auditorio inglés POB. No se detectaron cambios de revisión relevantes en el expediente; la redacción española mantiene la imagen bélica, la repetición de הָמוֹן y la ambigüedad semántica de גָּאוֹן documentada por el POB inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» únicamente cuando el texto lo requiriera; en este versículo no aparece el tetragrámaton.
  - Se usó «orgullo» para גְּאוֹן y no «SEÑOR» ni una paráfrasis, preservando la tensión entre orgullo y grandeza.
  - «Multitud» se repite para הָמוֹן en ambos lugares, siguiendo el paralelismo del hebreo.
  - Se prefirió un registro bíblico moderno y claro, sin depender de formulaciones tradicionales que oculten el matiz del original.
