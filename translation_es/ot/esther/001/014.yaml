translation:
  language: es
  text: Y los más cercanos a él fueron Carshena, Setar, Admata, Tarsis, Meres, Marsena y Memucán, los siete oficiales de Persia y Media, que veían el rostro[a] del rey y ocupaban el primer lugar en el reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que veían el rostro del rey», una expresión de la corte persa para quienes tenían acceso directo a la presencia del rey.
    reason: cultural_note
  - marker: b
    text: O «y ocupaban los puestos más altos en el reino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַקָּרֹב אֵלָיו
  english_pob_choice: And those closest to him were
  chosen_spanish: Y los más cercanos a él fueron
  alternatives_spanish:
  - Y el más cercano a él fue
  - Y los cercanos a él fueron
  lexicon: HALOT
  rationale: Aunque el hebreo presenta una forma singular, el contexto introduce una lista de siete personajes de la corte; por eso, en español suena más natural y fiel al sentido colectivo decir 'los más cercanos a él'. Mantiene el valor relacional de קָרוֹב sin forzar un singular artificial.
- source_word: כַּרְשְׁנָא שֵׁתָר אַדְמָתָא תַרְשִׁישׁ מֶרֶס מַרְסְנָא מְמוּכָן
  english_pob_choice: Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan
  chosen_spanish: Carshena, Setar, Admata, Tarsis, Meres, Marsena y Memucán
  alternatives_spanish:
  - Carshena, Shetar, Admata, Tarsis, Meres, Marsena y Memucán
  lexicon: HALOT
  rationale: Son nombres propios, así que se transliteran. En español se ajusta la grafía a formas más naturales y reconocibles, conservando el referente nominal sin convertirlos en apelativos.
- source_word: שִׁבְעַת שָׂרֵי
  english_pob_choice: the seven officials
  chosen_spanish: los siete[a] oficiales
  alternatives_spanish:
  - los siete príncipes
  - los siete principales funcionarios
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a altos dignatarios o funcionarios de corte. 'Oficiales' expresa bien el rango administrativo sin cargar el término con una nobleza hereditaria que no está exigida por el hebreo.
- source_word: פָּרַס וּמָדַי
  english_pob_choice: of Persia and Media
  chosen_spanish: de Persia y Media
  alternatives_spanish:
  - de los persas y los medos
  lexicon: HALOT
  rationale: La construcción nombra la esfera político-imperial; 'de Persia y Media' preserva la referencia histórica directa y funciona con naturalidad en español.
- source_word: רֹאֵי פְּנֵי הַמֶּלֶךְ
  english_pob_choice: who saw the king’s face
  chosen_spanish: que veían el rostro del rey
  alternatives_spanish:
  - que tenían acceso a la presencia del rey
  - admitidos a la presencia del rey
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo ('ver el rostro') porque es una fórmula cortesana significativa. La lectura idiomática de acceso privilegiado queda implícita en la frase, y puede explicarse en nota.
- source_word: הַיֹּשְׁבִים רִאשֹׁנָה בַּמַּלְכֻת
  english_pob_choice: and sat first in the kingdom
  chosen_spanish: y ocupaban el primer lugar en el reino
  alternatives_spanish:
  - y se sentaban en primer lugar en el reino
  - y ocupaban los primeros puestos en el reino
  lexicon: HALOT
  rationale: La expresión combina asiento y precedencia jerárquica. 'Ocupaban el primer lugar' transmite con claridad el sentido de rango principal sin sonar demasiado literal o ambiguo en español.
theological_decisions:
- issue: Expresión cortesana 'ver el rostro del rey' como fórmula de acceso privilegiado
  english_pob_reading: Literally, 'who saw the king’s face,' a Persian court expression for those with direct access to the king’s presence.
  chosen_spanish_reading: que veían el rostro del rey
  alternative_spanish_readings:
  - que tenían acceso a la presencia del rey
  - admitidos a la presencia del rey
  rationale: Se conserva la metáfora original en el texto principal para no borrar la coloración histórica del hebreo. La nota aclara que se trata de un modismo de corte persa, equivalente a acceso directo al monarca.
  doctrine_reference: No aplica; es una decisión de fórmula histórica y semántica, no doctrinal.
- issue: Término de rango para שָׂרֵי
  english_pob_reading: the seven officials
  chosen_spanish_reading: los siete oficiales
  alternative_spanish_readings:
  - los siete príncipes
  - los siete principales funcionarios
  rationale: '''Oficiales'' evita imponer una lectura nobiliaria que el hebreo no exige. Se mantiene la idea de altos cargos de gobierno, consistente con el contexto imperial.'
  doctrine_reference: No aplica; decisión léxica de administración/corte.
translation_notes:
  revision_awareness: Se siguió el último pase revisado sin cambios sustantivos (agreement alto, sin revisiones aplicadas). La decisión principal fue mantener el modismo cortesano en el cuerpo del texto y explicarlo en nota, junto con una traducción española natural de la lista y de la jerarquía imperial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - Se mantuvo la transliteración de los nombres propios persas sin intentar traducirlos.
  - '''Oficiales'' se usa para שָׂרֵי en coherencia con la práctica POB de captar rango administrativo/cortesano.'
  - '''Ver el rostro del rey'' se conserva por fidelidad al modismo semítico y se aclara con nota cultural.'
