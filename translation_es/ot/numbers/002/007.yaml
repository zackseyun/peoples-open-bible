translation:
  language: es
  text: 'La tribu de Zabulón, y el jefe de los hijos de Zabulón[a]: Eliab hijo de Helón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para los hijos de Zabulón». La preposición hebrea ל puede expresar relación estrecha en esta fórmula tribal-administrativa y admite más de una equivalencia cercana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - bastón
  - ramo
  lexicon: HALOT
  rationale: En contextos de organización tribal y censal en Números, מַטֵּה designa una división tribal, no un objeto físico. 'Tribu' es el equivalente natural en español y conserva el valor administrativo del término.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Zebulún
  lexicon: Nombre propio bíblico
  rationale: Nombre propio tribal. 'Zabulón' es la forma más asentada en español bíblico y resulta más natural para lectores de iglesia que la transliteración inglesa.
- source_word: וְנָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el líder
  alternatives_spanish:
  - y el jefe
  - y el príncipe
  lexicon: HALOT
  rationale: En este contexto administrativo, נָשִׂיא señala al cabeza reconocido de la tribu. 'Líder' comunica el sentido sin la carga monárquica de 'príncipe'.
- source_word: לִבְנֵי זְבוּלֻן
  english_pob_choice: of the sons of Zebulun
  chosen_spanish: de los hijos de Zabulón
  alternatives_spanish:
  - para los hijos de Zabulón
  - de la gente de Zabulón
  lexicon: HALOT
  rationale: La preposición ל con בני expresa relación con los miembros de la tribu. 'De los hijos de Zabulón' mantiene de cerca la construcción hebrea y conserva el idioma tribal.
- source_word: אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  lexicon: Nombre propio bíblico
  rationale: Nombre propio, se translitera sin traducción.
- source_word: בֶּן חֵלֹן
  english_pob_choice: son of Helon
  chosen_spanish: hijo de Helón
  alternatives_spanish:
  - el hijo de Helón
  lexicon: Patronímico hebreo
  rationale: La construcción patronímica se vierte directamente con 'hijo de'. 'Helón' refleja la vocalización española habitual del nombre propio.
theological_decisions:
- issue: Uso de 'hijos' para בני en una fórmula tribal
  english_pob_reading: of the sons of Zebulun
  chosen_spanish_reading: de los hijos de Zabulón
  alternative_spanish_readings:
  - para los hijos de Zabulón
  - de la tribu de Zabulón
  rationale: Se conserva el lenguaje genealógico-tribal del hebreo sin neutralizarlo. En esta fórmula, 'hijos' funciona como designación colectiva del grupo tribal y no se sustituye por un término más abstracto.
  doctrine_reference: No aplica; decisión lexical/estructural del texto patrimonial.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la lectura de alta concordancia y no registra revisiones aplicadas; por eso el español sigue de cerca la solución principal sin introducir variantes textuales adicionales.
  spanish_consistency_notes:
  - Se usa 'Zabulón' como forma española estable del nombre tribal.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - '''Líder'' se mantiene para נָשִׂיא en su sentido administrativo, evitando ''príncipe''.'
  - Se conserva 'hijos' por fidelidad a בני en la fórmula tribal.
  - La nota al pie marca la alternativa preposicional que el hebreo permite en esta construcción.
