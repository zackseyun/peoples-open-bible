translation:
  language: es
  text: investigando cantos según norma[a], y llevando proverbios por escrito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «según estatuto/regla» es difícil; el paralelo griego dice «buscando cantos o piezas musicales», lo que apoya la idea de canto ordenado o elaborado.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «proverbios», pero el paralelo griego es más amplio y puede significar «dichos» o «expresiones» por escrito.
    reason: alternative_reading
lexical_decisions:
- source_word: חוקרי
  english_pob_choice: investigating
  chosen_spanish: investigando
  alternatives_spanish:
  - indagando
  - investigando en
  lexicon: HALOT
  rationale: El participio expresa una actividad continua de búsqueda o examen. «Investigando» conserva la fuerza dinámica de חקר y encaja bien con ἐκζητοῦντες.
- source_word: מזמור
  english_pob_choice: song
  chosen_spanish: cantos
  alternatives_spanish:
  - canciones
  - salmos
  lexicon: HALOT
  rationale: Aquí el término apunta a piezas poéticas o musicales; «cantos» es amplio, natural y evita sobreespecificar un sentido litúrgico que el contexto no exige. El paralelo griego μέλη μουσικῶν favorece esta amplitud.
- source_word: על חוק
  english_pob_choice: according to rule
  chosen_spanish: conforme a estatuto
  alternatives_spanish:
  - según norma
  - de acuerdo con regla
  - según estatuto
  lexicon: HALOT
  rationale: חוק denota una norma fija, estatuto u orden prescrito. «Conforme a estatuto» mantiene el tono formal y la idea de orden/regularidad que el inglés audita como difícil pero deliberada.
- source_word: נושאי
  english_pob_choice: bearing
  chosen_spanish: llevando
  alternatives_spanish:
  - portando
  - trayendo
  - llevando consigo
  lexicon: HALOT
  rationale: El verbo נשא literalmente es «llevar/cargar». «Llevando» preserva la imagen verbal y permite entender la producción o presentación de dichos sapienciales en forma escrita.
- source_word: משל
  english_pob_choice: proverbs
  chosen_spanish: proverbios
  alternatives_spanish:
  - parábolas
  - sentencias
  - máximas
  lexicon: HALOT
  rationale: En un contexto sapiencial, «proverbios» es la equivalencia más natural. Se conserva la amplitud semántica sin forzar el término hacia «parábolas» o un tecnicismo distinto.
- source_word: בכתב
  english_pob_choice: in writing
  chosen_spanish: en escritura
  alternatives_spanish:
  - por escrito
  - en escrito
  - en forma escrita
  lexicon: HALOT
  rationale: La expresión hebrea y el paralelo griego ἐν γραφῇ remiten a un medio escrito. «En escritura» mantiene el sustantivo y la relación preposicional de forma directa, aunque «por escrito» sería una alternativa idiomática.
translation_notes:
  revision_awareness: 'La versión inglesa revisó «the structure of song according to rule» a «songs according to statute» para acercarse más a מזמור y חוק. La redacción española sigue esa misma dirección: prefiere «cantos» sobre una paráfrasis de la estructura, y «conforme a estatuto» para reflejar el carácter prescriptivo de חוק sin perder la ambigüedad artística señalada por el paralelo griego.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y cualquier lenguaje de sustitución teológica, porque este versículo no contiene el Tetragrámaton ni alusiones al nombre divino.
  - Se prefirió «proverbios» por el valor sapiencial del hebreo, pero se documenta que el griego es más amplio.
  - «En escritura» conserva el medio escrito de בכתב y la correspondencia con ἐν γραφῇ; podría sonar más idiomático «por escrito», pero se eligió una forma más pegada al texto fuente.
