  glossary_alignment: 'Alinea bien con la terminología del proyecto: ''Yahvé'' para יהוה, ''ley'' para תּוֹרָה con alternativa ''Torá/instrucción'', y preserva el femenino personificado de la Sabiduría. No hay conflicto teológico mayor; solo ajustes de anclaje y naturalidad.'
