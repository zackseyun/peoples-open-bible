base_translation:
  language: en
  yaml_path: translation/ot/job/028/001.yaml
  text: Surely there is a mine for silver[b][a], and a place where they refine gold.
  footnotes:
  - marker: a
    text: Or 'there is a source for silver.' The Hebrew מוֹצָא can mean 'source' or 'place of origin'; 'mine' is chosen here because the surrounding context concerns mining and metal extraction.
    reason: lexical_alternative
  - marker: b
    text: Or 'a place for gold where they smelt it.' The verb can denote refining or smelting precious metal.
    reason: lexical_alternative
