translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: Porque te hiciste alto en estatura, y pusiste tu copa entre las ramas densas[a], y su corazón se ensoberbeció en su altura,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre el ramaje espeso». El hebreo admite el matiz de espesura o ramas gruesas dentro de la metáfora arbórea.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahveh
  lexicon: HALOT
  rationale: 'En español, el par de títulos se conserva como dos elementos reales del hebreo: אֲדֹנָי como «Señor» y יְהוִה como «Yahvé». Se evita la sustitución por una máscara tradicional como «SEÑOR» para mantener la transparencia auditiva del nombre divino.'
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Dado que
  lexicon: HALOT
  rationale: La combinación causal introduce el motivo del juicio; «Porque» comunica de forma natural y fiel la fuerza explicativa sin arcaísmo.
- source_word: גָּבַהְתָּ
  english_pob_choice: you grew tall
  chosen_spanish: te hiciste alto
  alternatives_spanish:
  - creciste alto
  - te elevaste
  lexicon: HALOT
  rationale: El verbo expresa hacerse alto/levantarse en altura. En un contexto de metáfora arbórea, «te hiciste alto» conserva la imagen física sin volverla demasiado abstracta.
- source_word: בְּקוֹמָה
  english_pob_choice: in stature
  chosen_spanish: en estatura
  alternatives_spanish:
  - en altura
  - en talla
  lexicon: HALOT
  rationale: קוֹמָה apunta a estatura o altura; «en estatura» es la equivalencia más transparente y digna en español.
- source_word: וַיִּתֵּן
  english_pob_choice: and set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso a
  lexicon: HALOT
  rationale: En esta construcción, נתן funciona como «poner/colocar». «Puso» refleja bien el acto de situar la copa/top del árbol en un lugar alto.
- source_word: צַמַּרְתּוֹ
  english_pob_choice: your top
  chosen_spanish: tu copa
  alternatives_spanish:
  - tu copa superior
  - tu treta
  lexicon: HALOT
  rationale: El término nombra la parte superior del árbol; en español, «copa» es un equivalente natural y reconocido para la parte alta del árbol. Se prefiere aquí a «treta» o a una perífrasis pesada. El cambio a posesivo de segunda persona sigue la dirección del hebreo, aun cuando la cláusula siguiente pasa a tercera persona.
- source_word: אֶל בֵּין עֲבוֹתִים
  english_pob_choice: among the thick boughs
  chosen_spanish: entre las ramas densas
  alternatives_spanish:
  - entre los espesos ramajes
  - entre las ramas espesas
  lexicon: HALOT
  rationale: עֲבוֹתִים puede denotar espesura, ramaje denso o ramas gruesas. «Ramas densas» transmite el sentido léxico inmediato y conserva la imagen arbórea; se evita «nubes» porque el texto hebreo favorece la lectura de espesura/ramaje en esta revisión auditada.
- source_word: וְרָם לְבָבוֹ
  english_pob_choice: and his heart was lifted up
  chosen_spanish: y su corazón se ensoberbeció
  alternatives_spanish:
  - y su corazón se exaltó
  - y su corazón fue levantado
  lexicon: HALOT
  rationale: La idiomática hebrea expresa orgullo interior. «Se ensoberbeció» comunica con claridad la tensión teológica de la elevación interior sin perder la metáfora de altivez.
- source_word: בְּגָבְהוֹ
  english_pob_choice: in his height
  chosen_spanish: en su altura
  alternatives_spanish:
  - por su altura
  - en su elevación
  lexicon: HALOT
  rationale: La frase conecta el orgullo con la condición de altura. «En su altura» preserva la relación formal entre elevación externa y soberbia interior.
theological_decisions:
- issue: Cambio de persona dentro del versículo
  english_pob_reading: Retain the shift from second person ('you grew tall ... your top') to third person ('his heart was lifted up').
  chosen_spanish_reading: Mantener el paso de segunda persona («te hiciste alto... tu copa») a tercera persona («su corazón se ensoberbeció»).
  alternative_spanish_readings:
  - Regularizar todo a segunda persona
  - Regularizar todo a tercera persona
  rationale: El hebreo cambia de persona y ese rasgo debe quedar visible. La traducción no suaviza la oscilación porque forma parte del tejido retórico del texto profético y de la metáfora del árbol/rey.
  doctrine_reference: Primacía del texto fuente; preservar tensiones formales y retóricas sin armonizarlas artificialmente.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada que corrigió la lectura previa de 'clouds' a 'thick boughs'/ramaje denso, y se preservó deliberadamente el cambio pronominal del hebreo en la última cláusula.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה, conforme al estándar del proyecto.
  - Se mantiene la metáfora arbórea con «copa» y «ramas densas» para reflejar la altura y la espesura del contexto.
  - Se conserva la oscilación de persona del hebreo para no ocultar la forma original del versículo.
  - «Se ensoberbeció» comunica el orgullo interior con registro bíblico y español natural.
