translation:
  language: es
  text: 'Entonces Zebul le dijo[a]: «¿Dónde está ahora tu boca, tú que dijiste: “¿Quién es Abimelec, para que le sirvamos?” ¿No es este el pueblo a quien despreciaste? Sal ahora y pelea contra ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «¿Dónde está ahora tu boca?»; es un modismo burlón que ridiculiza su anterior osadía al hablar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה אֵפוֹא
  english_pob_choice: Where ... now
  chosen_spanish: ¿Dónde está ahora
  alternatives_spanish:
  - ¿Dónde está, pues, ahora
  - ¿Dónde quedó ahora
  lexicon: HALOT
  rationale: La combinación hebrea funciona como un desafío burlón. En español, «¿Dónde está ahora?» conserva el tono de mofa y la idea de la ausencia del valor anterior, sin añadir paráfrasis excesiva.
- source_word: פִּיךָ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu boca/tu hablar
  - tus palabras
  lexicon: HALOT
  rationale: Se mantiene la imagen literal del hebreo para preservar el insulto vívido. «Tu boca» en español puede expresar tanto el órgano como la manera de hablar, igual que en el auditorio bíblico.
- source_word: אֲשֶׁר תֹּאמַר
  english_pob_choice: you who said
  chosen_spanish: tú que dijiste
  alternatives_spanish:
  - tú que habías dicho
  - el que dijiste
  lexicon: HALOT
  rationale: La cláusula relativa identifica directamente a Gaal como el autor de la frase anterior. «Tú que dijiste» es natural en español y mantiene el enlace directo con su discurso previo.
- source_word: מִי אֲבִימֶלֶךְ כִּי נַעַבְדֶנּוּ
  english_pob_choice: Who is Abimelech, that we should serve him?
  chosen_spanish: ¿Quién es Abimelec, para que le sirvamos?
  alternatives_spanish:
  - ¿Quién es Abimelec, para que lo sirvamos?
  - ¿Quién es Abimelec, para servirle?
  lexicon: HALOT
  rationale: Se conserva la estructura retórica del hebreo. «Sirvamos» refleja la fuerza deliberativa/subjuntiva del original y mantiene la burla de la pregunta.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - ese pueblo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «the people», en español «el pueblo» comunica con naturalidad el colectivo mencionado en el contexto militar, sin perder la referencia grupal.
- source_word: מָאַסְתָּה בּוֹ
  english_pob_choice: whom you despised
  chosen_spanish: a quien despreciaste
  alternatives_spanish:
  - a quien rechazaste
  - a quien desdeñaste
  lexicon: HALOT
  rationale: El verbo expresa rechazo con desprecio; «despreciaste» conserva bien la carga despectiva del reproche. Se usa «a quien» por la sintaxis normal del español con antecedente personal/colectivo.
- source_word: צֵא נָא עַתָּה
  english_pob_choice: Go out now
  chosen_spanish: Sal ahora
  alternatives_spanish:
  - Sal, pues, ahora
  - Sal de una vez ahora
  lexicon: HALOT
  rationale: «Sal» reproduce el imperativo de salida al combate. Se evita «por favor» porque נָא aquí intensifica o urge, no atenúa cortesmente. «Ahora» conserva la inmediatez.
- source_word: וְהִלָּחֶם בּוֹ
  english_pob_choice: and fight against them
  chosen_spanish: y pelea contra ellos
  alternatives_spanish:
  - y lucha contra ellos
  - y combate contra ellos
  lexicon: HALOT
  rationale: En este contexto bélico, «pelea contra ellos» es claro y fiel. Se toma el plural «ellos» para concordar con «el pueblo» y con la corrección de la revisión auditada del inglés POB.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que corrigió el pronombre final de singular a plural («them») para concordar con «the people». En español se reflejó con «ellos».
  spanish_consistency_notes:
  - Se usó «Abimelec» con la forma usual en español, manteniendo el nombre propio sin adaptación adicional.
  - Se preservó el tono sarcástico del discurso de Zebul mediante una pregunta retórica y vocabulario despectivo moderado.
  - No se introdujo «SEÑOR» ni terminología teológica ajena al versículo; el texto es narrativo y militar.
  - La puntuación de cita en español sigue el uso editorial moderno con comillas angulares para el diálogo interno y marca de nota [a] en el segmento correspondiente.
