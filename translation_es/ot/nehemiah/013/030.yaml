translation:
  language: es
  text: Así los purifiqué de todo lo extranjero, y asigné funciones[a] para los sacerdotes y para los levitas, cada uno en su tarea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guardias», «turnos» o «servicios asignados» para los sacerdotes y los levitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטִהַרְתִּים
  english_pob_choice: So I cleansed them
  chosen_spanish: Así los purifiqué
  alternatives_spanish:
  - Y los purifiqué
  - Así los limpié
  lexicon: HALOT
  rationale: טהר en piel expresa limpiar o purificar. En español, «purifiqué» conserva el sentido ritual/covenantal que encaja con el contexto de la reforma de Nehemías. «Así» reproduce bien el flujo resultativo del waw inicial, como consecuencia de las acciones previas.
- source_word: מִכָּל נֵכָר
  english_pob_choice: from everything foreign
  chosen_spanish: de toda impureza extraña
  alternatives_spanish:
  - de todo lo extranjero
  - de toda cosa extraña
  - de todo elemento extranjero
  lexicon: HALOT
  rationale: נֵכָר designa lo extranjero o ajeno. En este contexto, el español necesita evitar una lectura demasiado restrictiva de «personas extranjeras»; «impureza extraña» comunica la idea de contaminación/mezcla ajena sin sobreespecificar más de lo que el hebreo dice. Se reconoce, sin embargo, que la expresión hebrea es amplia y admite también un matiz de «lo extranjero».
- source_word: וָאַעֲמִידָה
  english_pob_choice: and I assigned
  chosen_spanish: y establecí
  alternatives_spanish:
  - y asigné
  - y nombré
  - y dispuse
  lexicon: HALOT
  rationale: 'La forma causativa de עמד tiene sentido administrativo: poner, establecer, disponer. «Establecí» es natural en español y mantiene la idea de ordenar oficialmente las funciones.'
- source_word: מִשְׁמָרוֹת
  english_pob_choice: duties
  chosen_spanish: turnos
  alternatives_spanish:
  - guardias
  - funciones
  - servicios
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת puede significar guardias, turnos, encargos o servicios. Dado el contexto sacerdotal y levítico, «turnos» comunica bien las rotaciones u ordenamientos de servicio; la alternativa inglesa «watches» queda reflejada mejor así que con un término más abstracto.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  english_pob_choice: for the priests and for the Levites
  chosen_spanish: para los sacerdotes y para los levitas
  alternatives_spanish:
  - para los sacerdotes y los levitas
  lexicon: HALOT
  rationale: Se conserva la duplicación de la preposición para reflejar la estructura hebrea y la distribución entre ambos grupos.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  - uno por uno
  lexicon: HALOT
  rationale: Aunque אִישׁ es formalmente masculino singular, aquí funciona distributivamente. «Cada uno» transmite esa fuerza sin forzar un marcado masculino innecesario en español.
- source_word: בִּמְלַאכְתּוֹ
  english_pob_choice: in his work
  chosen_spanish: en su tarea
  alternatives_spanish:
  - en su obra
  - en su trabajo
  - en su servicio
  lexicon: HALOT
  rationale: מְלָאכָה puede ser trabajo, ocupación, tarea o servicio. «Tarea» es natural y suficientemente preciso en español para la asignación ritual/administrativa, sin perder el matiz de responsabilidad concreta.
theological_decisions:
- issue: Alcance de «de toda impureza extraña»
  english_pob_reading: The verse speaks of cleansing the relevant community from foreign elements/defilement in the context of Nehemiah's covenant reforms, without specifying ethnicity alone.
  chosen_spanish_reading: El versículo habla de una purificación de elementos extraños o contaminantes dentro del marco de las reformas del pacto, sin reducirlo simplemente a una referencia étnica.
  alternative_spanish_readings:
  - de todos los extranjeros
  - de toda persona extranjera
  - de toda extranjería
  rationale: El hebreo es más amplio que una referencia exclusiva a personas. La formulación española conserva la tensión entre extranjería e impureza ritual/covenantal, evitando una restricción no garantizada por el texto.
  doctrine_reference: Primacía del texto original y preservación de la amplitud semántica sin importar interpretaciones posteriores.
- issue: Valor distributivo de אִישׁ
  english_pob_reading: each in his work
  chosen_spanish_reading: cada uno en su tarea
  alternative_spanish_readings:
  - cada hombre en su tarea
  - cada uno en su servicio
  rationale: La lectura distributiva se expresa en español con «cada uno», evitando que el masculino singular del hebreo se sobreinterprete como énfasis de género en la traducción.
  doctrine_reference: Principio de precisión gramatical y claridad idiomática en español, manteniendo el valor distributivo del hebreo.
translation_notes:
  revision_awareness: El inglés POB lee מִכָּל נֵכָר de manera amplia como «everything foreign» y nota la alternativa «watches» o «service assignments» para מִשְׁמָרוֹת. La presente versión conserva esa amplitud con una opción española que evita reducir el referente a «extranjeros» únicamente y mantiene el sentido administrativo/ritual de מִשְׁמָרוֹת como «turnos».
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros pasajes cuando corresponde; aquí no aparece el tetragrámaton.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en el versículo.
  - «Purifiqué» y «impureza» mantienen el campo léxico ritual de טהר y נֵכָר sin introducir un matiz doctrinal ajeno.
  - La estructura distributiva se conserva con «cada uno en su tarea», que es natural en español y fiel al hebreo.
