  text: וְ/הִנֵּה זֶ֥ה בָא֙ רֶ֣כֶב אִ֔ישׁ צֶ֖מֶד פָּֽרָשִׁ֑ים וַ/יַּ֣עַן וַ/יֹּ֗אמֶר נָפְלָ֤ה נָֽפְלָה֙ בָּבֶ֔ל וְ/כָל פְּסִילֵ֥י אֱלֹהֶ֖י/הָ שִׁבַּ֥ר לָ/אָֽרֶץ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/021/009.yaml
  text: And look[a], here comes a chariot, a man with a pair of horsemen. And he answered and said, “Fallen, fallen is Babylon[c][b], and all the carved images of her gods he has shattered to the ground.”
  footnotes:
  - marker: a
    text: Or 'a pair of horsemen'; the Hebrew phrase is compressed and may describe the approaching force more idiomatically than the English can fully reproduce.
    reason: lexical_alternative
  - marker: b
    text: Or 'the idols of her gods.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'he has shattered,' with the subject left unstated; the agent may be understood from context.
    reason: alternative_reading
