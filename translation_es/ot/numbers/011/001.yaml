review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa, conserva «Yahvé» para יְהוָה y comunica adecuadamente la queja, la reacción divina y el fuego en el borde del campamento. Sin embargo, dos puntos requieren ajuste para alinearse mejor con el hebreo y con el rastro de auditoría inglés: (1) «de la desgracia» suena menos natural y menos preciso que «por la adversidad» o «por dificultades» para רַע en este contexto; (2) la nota sobre בְּאָזְנֵי debe corresponder más estrechamente al plural idiomático hebreo («a los oídos de Yahvé» / «en oídos de Yahvé») aunque el texto principal use una forma natural en español. Además, conviene evitar la ligera ambigüedad de «al borde del campamento» sin nota suficientemente clara sobre «extremo/periferia».'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. «Ahora el pueblo estaba…» funciona, aunque algo rígido; el resto fluye bien. «Su furor se encendió» es aceptable, pero «su ira ardió» o «su ira se encendió» sonaría algo más bíblico-natural. La principal mejora necesaria es léxica: «quejas por la adversidad» o «se quejaban por la adversidad» lee mejor que «se quejan de la desgracia».'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con términos doctrinales mayores. La atribución directa «el fuego de Yahvé» se preserva correctamente. El ajuste propuesto no afecta doctrina, sino precisión léxica y naturalidad española.'
  issues:
  - severity: medium
    issue: «de la desgracia» para רַע
    rationale: Aunque intenta evitar el sentido moral de «mal», «desgracia» en español suena menos idiomático con «quejarse de» y puede sugerir un evento puntual más que adversidad/dificultad general. «Por la adversidad» comunica mejor el valor contextual documentado en el POB inglés («of hardship»).
  - severity: low
    issue: Nota b no refleja del todo el plural idiomático hebreo
    rationale: El hebreo dice literalmente «en los oídos de Yahvé». El texto principal puede mantenerse idiomático, pero la nota debería mencionar más exactamente la forma hebrea plural para conservar la evidencia fuente.
  - severity: low
    issue: Falta la alternativa inglesa sobre «fuego de Yahvé» / «fuego de parte de Yahvé»
    rationale: El POB inglés preserva una nota alternativa para la construcción genitiva. No es estrictamente obligatoria en español, pero dado que el inglés la conserva, conviene mantenerla también en nota para reflejar el mismo expediente auditado.
  revised_spanish_text: Ahora el pueblo estaba como quienes se quejan por la adversidad[a] a oídos de Yahvé[b]; Yahvé lo oyó, y su furor se encendió, y el fuego de Yahvé[c] ardió entre ellos y consumió a algunos al borde del campamento[d].
