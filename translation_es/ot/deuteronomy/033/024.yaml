translation:
  language: es
  text: 'Y de Aser dijo: «El más bendito de los hijos es Aser[a]; sea favorecido por sus hermanos[b], y que moje su pie en aceite[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bendito por encima de los hijos es Aser». La comparación hebrea puede leerse como comparativa o superlativa.'
    reason: lexical_alternative
  - marker: b
    text: «Sus hermanos» probablemente se refiere a las demás tribus de Israel.
    reason: cultural_note
  - marker: c
    text: La imagen de «mojar su pie en aceite» probablemente expresa abundancia o prosperidad, pero el hebreo se deja literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאָשֵׁר
  english_pob_choice: And of Asher
  chosen_spanish: Y de Aser
  alternatives_spanish:
  - Y para Aser
  - Y acerca de Aser
  lexicon: HALOT
  rationale: La fórmula introductoria marca el siguiente oráculo tribal; en español, «de Aser» es natural y conserva el enlace discursivo del hebreo sin añadir interpretación.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: HALOT
  rationale: Es el verbo narrativo normal de la fórmula de bendición. «Dijo» mantiene la sencillez y el tono solemne sin sobrerrepresentar la fuerza del verbo.
- source_word: בָּרוּךְ מִבָּנִים
  english_pob_choice: Most blessed of sons
  chosen_spanish: Bendito más que los hijos
  alternatives_spanish:
  - Bendito entre los hijos
  - Bendito sobre los hijos
  - El más bendito de los hijos
  lexicon: HALOT
  rationale: El hebreo admite lectura comparativa o superlativa. «Más que los hijos» conserva esa tensión comparativa sin forzar una glosa explicativa; se mantiene «hijos» para reflejar con fidelidad la forma hebrea.
- source_word: אָשֵׁר
  english_pob_choice: is Asher
  chosen_spanish: es Aser
  alternatives_spanish:
  - Aser
  lexicon: HALOT
  rationale: Nombrar de nuevo a Aser reproduce la apposición enfática del poema. En español se expresa de manera natural con el verbo copulativo implícito en la alabanza.
- source_word: יְהִי
  english_pob_choice: may he be
  chosen_spanish: sea
  alternatives_spanish:
  - que sea
  - ojalá sea
  lexicon: HALOT
  rationale: En una bendición, el jussivo pide una formulación optativa. «Sea» funciona bien en español bíblico y mantiene la fuerza de deseo sin exceso de paráfrasis.
- source_word: רְצוּי
  english_pob_choice: favored
  chosen_spanish: favorecido
  alternatives_spanish:
  - aceptado
  - agradable
  - amado
  lexicon: HALOT
  rationale: El término expresa ser recibido con favor. «Favorecido» es claro en español contemporáneo y conserva la relación interpersonal sugerida por el texto.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - las otras tribus
  lexicon: HALOT
  rationale: La forma hebrea es masculina plural y, en contexto tribal, apunta a los demás descendientes de Israel. Se conserva «hermanos» y se deja esa referencia abierta en nota.
- source_word: וְטֹבֵל
  english_pob_choice: and may he dip
  chosen_spanish: y que moje
  alternatives_spanish:
  - y que sumerja
  - y que remoje
  lexicon: HALOT
  rationale: El participio en paralelo poético continúa el impulso desiderativo. «Que moje» comunica el movimiento literal sin volver demasiado técnico el verbo ni interpretar de más la imagen.
- source_word: בַּשֶּׁמֶן
  english_pob_choice: in oil
  chosen_spanish: en aceite
  alternatives_spanish:
  - en óleo
  - en aceite de oliva
  - en rico aceite
  lexicon: HALOT
  rationale: «Aceite» es el equivalente más natural en español y mantiene la imagen concreta. No se especifica «de oliva» porque el hebreo no lo dice explícitamente.
- source_word: רַגְלוֹ
  english_pob_choice: his foot
  chosen_spanish: su pie
  alternatives_spanish:
  - sus pies
  lexicon: HALOT
  rationale: El singular hebreo se conserva en singular para respetar la metáfora concreta. «Su pie» mantiene la imagen corporal y la posible connotación de abundancia o prosperidad.
theological_decisions:
- issue: Interpretación de la imagen de mojar el pie en aceite
  english_pob_reading: Retain the literal metaphor of abundance/prosperity without specifying a symbolic meaning in the main text.
  chosen_spanish_reading: Conservar la metáfora literal de abundancia/prosperidad sin explicarla en el cuerpo principal.
  alternative_spanish_readings:
  - Referirla a riqueza agrícola, especialmente al aceite de oliva
  - Entenderla como imagen de lujo, seguridad o prosperidad territorial
  rationale: La imagen hebrea es vívida, pero no se explicita su alcance simbólico. La traducción principal la deja intacta para no resolver lo que el texto mantiene sugerente; la interpretación queda para una nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión aprobada del POB inglés: se prefirió una fórmula más literal para מִבָּנִים, manteniendo la ambigüedad comparativa/superlativa. También se preservó la imagen concreta de «mojar el pie en aceite» sin explicitar su simbolismo en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usó «Aser» como forma del nombre propio, consistente con el estilo bíblico en español.
  - Se prefirió «aceite» y no «óleo» para un registro moderno y claro, sin perder fidelidad semántica.
  - La construcción optativa «sea / que moje» reproduce el tono de bendición sin sonar arcaica.
  - Se mantuvo el singular «su pie» para respetar el hebreo y la fuerza de la imagen.
