  - severity: medium
    issue: '''Comenzaron a herir'' debilita la fuerza de לְהַכּוֹת en un contexto de bajas mortales.'
    rationale: Aunque נכה puede ser 'herir/golpear', aquí el complemento y la cifra de muertos favorecen una formulación más fuerte como 'derribar' o 'matar'.
  - severity: medium
