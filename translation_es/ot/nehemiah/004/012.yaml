translation:
  language: es
  text: Y los edificadores, cada uno tenía su espada ceñida a su costado mientras edificaban[a]; y el que tocaba la trompeta estaba junto a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el que tocaba el shofar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹנִים / וּבוֹנִים
  english_pob_choice: the builders / while they built
  chosen_spanish: los constructores / mientras edificaban
  alternatives_spanish:
  - los que estaban construyendo
  - y edificaban
  lexicon: HALOT
  rationale: El participio funciona primero como sustantivo colectivo y luego como verbo en contexto. En español, «los constructores» conserva el valor nominal, y «mientras edificaban» expresa con naturalidad la simultaneidad del hebreo sin perder la repetición del verbo.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - un hombre
  - cada hombre
  lexicon: HALOT
  rationale: Aquí el sustantivo tiene valor distributivo. «Cada uno» comunica mejor la idea de individualidad de los constructores que una traducción más literal y menos idiomática.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - la espada de él
  - su arma
  lexicon: HALOT
  rationale: La referencia posesiva es directa. «Espada» es la equivalencia normal y precisa; «su espada» mantiene la relación sin añadir énfasis innecesario.
- source_word: אֲסוּרִים
  english_pob_choice: strapped
  chosen_spanish: ceñida
  alternatives_spanish:
  - atada
  - asegurada
  - ajustada
  lexicon: HALOT
  rationale: El participio pasivo de אסר expresa algo atado o sujeto. En el contexto de un arma lista para el trabajo, «ceñida» conserva la imagen de portar la espada preparada y resulta natural en español bíblico contemporáneo.
- source_word: עַל מָתְנָיו
  english_pob_choice: at his side
  chosen_spanish: a su costado
  alternatives_spanish:
  - a su cintura
  - a sus lomos
  - a su lado
  lexicon: HALOT
  rationale: Literalmente es «sobre sus lomos/waist». «A su costado» evita la dureza de un calco corporal y expresa bien la posición del arma lista para usar, como en el inglés auditado.
- source_word: וְהַתּוֹקֵעַ בַּשּׁוֹפָר
  english_pob_choice: the one blowing the trumpet
  chosen_spanish: el que tocaba la trompeta
  alternatives_spanish:
  - el trompetero
  - el que hacía sonar el cuerno
  lexicon: HALOT
  rationale: El participio de תקע con שופר designa a quien hace sonar el instrumento. «Tocaba la trompeta» mantiene el valor verbal, es claro en español y deja implícito que se trata del shofar, como en la nota auditada.
- source_word: אֶצְלִי
  english_pob_choice: beside me
  chosen_spanish: junto a mí
  alternatives_spanish:
  - cerca de mí
  - a mi lado
  lexicon: HALOT
  rationale: La preposición indica proximidad inmediata. «Junto a mí» es una forma natural y fiel para expresar la cercanía del trompetero.
theological_decisions:
- issue: Instrumento del שופר / shofar
  english_pob_reading: 'the one blowing the trumpet; footnote: Hebrew: ''the one blowing the shofar.'''
  chosen_spanish_reading: 'el que tocaba la trompeta; nota: hebreo: «el que tocaba el shofar»'
  alternative_spanish_readings:
  - el que hacía sonar el cuerno
  - el trompetero
  rationale: La lectura principal usa «trompeta» por claridad en español, pero la nota conserva el término técnico hebreo «shofar» para no borrar la especificidad del instrumento. Así se preserva la tensión entre inteligibilidad y precisión lexical.
  doctrine_reference: None
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo, con acuerdo alto respecto al audit trail inglés. Se conservó la estructura distributiva de los constructores, la imagen de la espada ceñida y la especificidad del shofar sin sobretraducirla ni ocultarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «trompeta» en el texto principal por claridad, con nota para «shofar».
  - «Construían/edificaban» se expresó con un imperfecto de simultaneidad para reflejar וּבוֹנִים.
  - No se introdujeron términos eclesiásticos ajenos al contexto militar de la escena.
