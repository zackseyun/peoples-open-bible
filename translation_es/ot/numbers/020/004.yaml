translation:
  language: es
  text: ¿Y por qué han traído a la asamblea de Yahvé a esta región desolada[a], para que nosotros y nuestro ganado muramos allí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este desierto»; hebreo «este wilderness / despoblado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  english_pob_choice: And why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - ¿Por qué
  lexicon: HALOT
  rationale: La conjunción inicial וְ se conserva con «Y», y el interrogativo causal se expresa naturalmente en español con «¿y por qué?», manteniendo el tono de queja y la continuidad discursiva.
- source_word: הֲבֵאתֶם
  english_pob_choice: have you brought
  chosen_spanish: han traído
  alternatives_spanish:
  - trajeron
  - habéis traído
  lexicon: HALOT
  rationale: El verbo causativo de בוא se vierte como «traer». En español, el perfecto compuesto «han traído» comunica una acción ya realizada con efecto presente, sin perder la fuerza acusatoria del hebreo.
- source_word: קְהַל יְהוָה
  english_pob_choice: the assembly of Yahweh
  chosen_spanish: la asamblea de Yahvé
  alternatives_spanish:
  - la congregación de Yahvé
  - la comunidad de Yahvé
  lexicon: HALOT
  rationale: קהל designa al pueblo reunido; «asamblea» es un equivalente claro y no excesivamente eclesiástico. Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto.
- source_word: הַמִּדְבָּר הַזֶּה
  english_pob_choice: this wilderness
  chosen_spanish: este desierto
  alternatives_spanish:
  - este desierto
  - esta región desértica
  - este yermo
  lexicon: HALOT
  rationale: מִדְבָּר puede referirse a «desierto» o «despoblado». Aquí «este desierto» resulta natural en español y refleja bien el lugar inhóspito señalado por el demostrativo.
- source_word: לָמוּת
  english_pob_choice: that ... should die
  chosen_spanish: para que ... muramos
  alternatives_spanish:
  - para morir
  - a fin de que ... muramos
  lexicon: HALOT
  rationale: El infinitivo לָמוּת expresa propósito o resultado; en español, «para que muramos» reproduce con claridad ese valor final/resultativo.
- source_word: אֲנַחְנוּ וּבְעִירֵנוּ
  english_pob_choice: we and our livestock
  chosen_spanish: nosotros y nuestro ganado
  alternatives_spanish:
  - nosotros y nuestros animales
  - nosotros y nuestro rebaño
  lexicon: HALOT
  rationale: בְעִיר puede designar ganado/livestock. «Ganado» es el término colectivo más natural y amplio en español bíblico contemporáneo, y conserva el contraste humano-animal del texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva la transliteración del nombre propio divino como «Yahvé», en lugar de sustituirlo por un título, para mantener la transparencia auditiva del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de קָהָל / קהל
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - comunidad reunida
  rationale: No hay una carga doctrinal que obligue a una fórmula litúrgica. «Asamblea» conserva el sentido de pueblo reunido y evita desplazar el término hacia un registro eclesiástico no requerido por el hebreo.
  doctrine_reference: HALOT / uso contextual de קהל
translation_notes:
  revision_awareness: La versión inglesa auditada revisó la cláusula final de «for us and our livestock to die there» a «that we and our livestock should die there» para expresar más directamente el valor final/resultativo. La redacción española «para que nosotros y nuestro ganado muramos allí» sigue esa misma lectura sin añadir matices no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se eligió «asamblea» para קהל por claridad y fidelidad al matiz de reunión colectiva.
  - «Desierto» se usa como equivalente natural de מִדְבָּר; aquí no se requirió distinguir entre desierto físico y despoblado.
  - «Ganado» traduce בְעִירֵנוּ de manera colectiva y comprensible en español contemporáneo.
