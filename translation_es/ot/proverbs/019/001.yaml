base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/001.yaml
  text: Better is a poor man who walks in his integrity than one who is crooked in his speech and is a fool[a][b].
  footnotes:
  - marker: a
    text: Or, 'than a fool who is crooked in speech.' The Hebrew syntax allows the final phrase 'and he is a fool' to identify the contrasted person more compactly.
    reason: alternative_reading
  - marker: b
    text: Literally, 'walks in his integrity.' 'Walk' is a Hebrew metaphor for one's manner of life.
    reason: lexical_alternative
