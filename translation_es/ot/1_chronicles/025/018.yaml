lexical_decisions:
- source_word: עַשְׁתֵּי עָשָׂר
  english_pob_choice: the twelfth
  chosen_spanish: el duodécimo
  alternatives_spanish:
  - doce
  - el doce
  lexicon: HALOT
  rationale: En esta lista de turnos o suertes, el contexto exige un valor ordinal, no cardinal. En español, «el duodécimo» reproduce de manera natural la función enumerativa del hebreo y del inglés POB.
- source_word: עֲזַרְאֵל
  english_pob_choice: Azarel
  chosen_spanish: Azarel
  alternatives_spanish:
  - Azareel
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Se conserva «Azarel» como forma habitual y transparente en español, coherente con la decisión inglesa documentada.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo significa literalmente «sus hijos». En español, «sus hijos» mantiene la referencia filial sin añadir una precisión de sexo que el contexto inmediato ya sugiere por la estructura genealógica/organizativa.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: Se conserva «hermanos» porque es la equivalencia más directa y auditable. Aunque el término puede abarcar parientes cercanos o asociados, no hay base suficiente aquí para ampliar el sentido en el texto principal.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  lexicon: HALOT
  rationale: El numeral final expresa el total del grupo. En español, «doce» funciona de forma natural al final de la cláusula, como total implícito del grupo de Azarel.
translation_notes:
  revision_awareness: El paquete fuente y el audit trail inglés no muestran cambios aplicados; la propuesta sigue la lectura estable de 1 Crónicas 25:18 y resuelve la forma hebrea ordinal de manera idiomática en español sin perder el valor de enumeración.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios sin castellanización innecesaria.
  - Se preserva la sintaxis breve de inventario/registro propia de la lista.
  - «Duodécimo» se usa como ordinal por el contexto de sorteo y enumeración, no como simple cardinal.
