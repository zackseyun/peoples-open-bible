translation:
  language: es
  text: Los impíos han desenvainado la espada y tensado su arco[a], para derribar al pobre y al necesitado[b], para masacrar a los rectos de camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los rectos en conducta" / "los rectos en su camino". Hebreo: "los rectos de camino".'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción anterior de la frase final: "los rectos de camino".'
    reason: previous_rendering
lexical_decisions:
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  - espada
  lexicon: HALOT
  rationale: Mantiene el sentido básico del arma y el valor genérico habitual en español bíblico sin forzar un artículo enfático que no está explícito en hebreo.
- source_word: פָּתְחוּ
  english_pob_choice: have drawn
  chosen_spanish: han desenvainado
  alternatives_spanish:
  - han sacado
  - han abierto
  - han desenvainado la espada
  lexicon: HALOT
  rationale: Con un arma, el verbo hebreo expresa la acción idiomática de sacar o desenvainar la espada; 'desenvainado' comunica con precisión el gesto militar en español.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: '''Impíos'' conserva la categoría moral y religiosa del hebreo y es un término natural en registro bíblico español.'
- source_word: וְדָרְכוּ
  english_pob_choice: and bent
  chosen_spanish: y tensado
  alternatives_spanish:
  - y han tensado
  - y armado
  - y doblado
  lexicon: HALOT
  rationale: Con 'arco', el verbo alude a tensar el arco para disparar. 'Tensado' reproduce la imagen sin calco incómodo.
- source_word: קַשְׁתָּם
  english_pob_choice: their bow
  chosen_spanish: su arco
  alternatives_spanish:
  - sus arcos
  - su arco
  lexicon: HALOT
  rationale: El hebreo usa singular con sufijo plural, con valor colectivo; en español, 'su arco' conserva esa formalidad y fluidez.
- source_word: לְהַפִּיל
  english_pob_choice: to bring down
  chosen_spanish: para derribar
  alternatives_spanish:
  - para hacer caer
  - para abatir
  lexicon: HALOT
  rationale: '''Derribar'' transmite bien la causalidad de hacer caer a alguien en un contexto de violencia y preserva la fuerza del verbo causativo.'
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al afligido
  - al humilde
  lexicon: HALOT
  rationale: Siguiendo el paralelismo con 'necesitado', 'pobre' mantiene la vulnerabilidad socioeconómica destacada por el hebreo y por la POB en inglés.
- source_word: אֶבְיוֹן
  english_pob_choice: and needy
  chosen_spanish: y al necesitado
  alternatives_spanish:
  - y al menesteroso
  - y al desvalido
  lexicon: HALOT
  rationale: '''Necesitado'' conserva la distinción cercana pero no idéntica a ''pobre'' y resulta claro en español moderno.'
- source_word: לִטְבֹחַ
  english_pob_choice: to slaughter
  chosen_spanish: para matar
  alternatives_spanish:
  - para degollar
  - para degüellar
  - para sacrificar
  lexicon: HALOT
  rationale: Aunque el hebreo puede ser más crudo, en español 'matar' evita una redundancia forzada con 'derribar' y mantiene el contexto violento sin añadir una imagen no explicitada con precisión ritual.
- source_word: יִשְׁרֵי דָרֶךְ
  english_pob_choice: those upright in way
  chosen_spanish: los rectos de camino
  alternatives_spanish:
  - los rectos en su camino
  - los de conducta recta
  - los íntegros en su andar
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'los rectos de camino'. En español, 'rectos de camino' conserva la dureza y la relación constructa, mientras que el sentido moral queda claro por el adjetivo 'rectos'.
theological_decisions:
- issue: Cómo rendir la expresión final יִשְׁרֵי דָרֶךְ sin borrar su ambigüedad lexical
  english_pob_reading: those upright in way / those upright in conduct / the upright of way
  chosen_spanish_reading: los rectos de camino
  alternative_spanish_readings:
  - los rectos en su conducta
  - los que andan rectamente
  - los de conducta recta
  rationale: La POB inglesa preserva la literalidad del hebreo y deja en nota las opciones interpretativas. En español, 'los rectos de camino' conserva esa estructura y también deja abierta la lectura ética de conducta/camino, sin sustituirla por una paráfrasis que elimine la tensión del texto.
  doctrine_reference: Salmo 37:14; cf. la tensión entre rectitud moral y metáfora del camino en la poesía sapiencial
translation_notes:
  revision_awareness: La POB inglesa revisó la frase final para mantener una literalidad más cercana al hebreo ('those upright in way'). Esta versión española sigue esa misma decisión revisada con una construcción igualmente cercana ('los rectos de camino'), evitando una normalización excesiva y preservando la ambigüedad poética documentada por la nota inglesa.
  spanish_consistency_notes:
  - He usado 'Yahvé' no aplica aquí, pues el versículo no contiene el nombre divino.
  - He mantenido 'impíos' y 'rectos' como categorías morales de registro bíblico, coherentes con el tono sapiencial del salmo.
  - La pareja 'pobre / necesitado' reproduce el paralelismo hebreo y la elección inglesa 'poor / needy'.
  - La puntuación y el orden de frases siguen el paralelismo poético del hebreo sin mecanizar el sintagma final.
