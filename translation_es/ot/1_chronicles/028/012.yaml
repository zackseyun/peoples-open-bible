review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y preserva correctamente la tensión de בָרוּחַ עִמּוֹ con nota alternativa. También mantiene las expresiones ''casa de Yahvé'' y ''casa de Dios'' de forma fiel. Sin embargo, hay dos desajustes léxicos importantes: אֹצְרוֹת significa los lugares de almacenamiento/tesorería, no ''tesoros'' como contenido; y לְּשָׁכוֹת se entiende mejor como ''cámaras'' o ''dependencias'', pero conviene combinarlo con un adjetivo natural (''circundantes'') en vez de ''alrededor''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'tesoros de la casa de Dios' suena como objetos valiosos, no como recintos o dependencias. 'Cámaras alrededor' resulta algo torpe; 'cámaras circundantes' o 'dependencias alrededor' fluye mejor. 'Diseño' es aceptable, aunque 'plano' refleja mejor el contexto arquitectónico y el inglés auditado 'plan'.
  glossary_alignment: Se alinea bien con el glosario del proyecto en 'Yahvé', 'Dios' y 'Espíritu'. No hay conflicto terminológico mayor salvo que 'tesoros' no refleja la decisión auditada 'treasuries'; en español debe renderizarse como 'tesorerías' o 'depósitos/almacenes', preferiblemente 'tesorerías' en este contexto cultual.
  issues:
  - severity: high
    issue: אֹצְרוֹת fue traducido como 'tesoros' en ambas ocurrencias.
    rationale: El hebreo se refiere a tesorerías, depósitos o cámaras de almacenamiento, no a los tesoros mismos. La traducción actual cambia el referente.
  - severity: medium
    issue: '''cámaras alrededor'' suena poco natural en español.'
    rationale: Aunque transmite la idea básica de סָבִיב, la formulación es rígida. 'Cámaras circundantes' expresa mejor que las cámaras rodeaban la estructura.
  - severity: medium
    issue: '''diseño'' es menos preciso que ''plano'' en este contexto arquitectónico.'
    rationale: תַבְנִית en una lista de elementos del templo apunta a un plano o disposición arquitectónica. 'Plano' suena más concreto y fiel al campo semántico aquí.
  revised_spanish_text: 'y el plano de todo lo que estaba en el Espíritu con él: para los atrios de la casa de Yahvé[a], para todas las cámaras circundantes, para las tesorerías de la casa de Dios y para las tesorerías de las cosas santas.'
  revised_footnotes:
  - marker: a
    text: 'O: «todo lo que estaba en su espíritu con él», es decir, lo que estaba en la mente o el corazón de David.'
    reason: alternative_reading
  revision_rationale: Se ajusta אֹצְרוֹת a 'tesorerías' para reflejar correctamente lugares de almacenamiento, se mejora la naturalidad de לְּשָׁכוֹת סָבִיב con 'cámaras circundantes', y se afina תַבְנִית a 'plano' por el contexto arquitectónico. Se conserva sin cambio la nota sobre la ambigüedad de 'en el Espíritu con él'.
