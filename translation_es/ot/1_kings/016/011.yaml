revisions:
- from: Y aconteció que, cuando comenzó a reinar[a], al sentarse en su trono, golpeó a toda la casa de Baasa. No le dejó un solo varón[b], ni a sus parientes ni a sus amigos.
  to: Y aconteció que, cuando comenzó a reinar, apenas se sentó en su trono, derribó a toda la casa de Baasa. No le dejó un solo varón[a], ni a sus parientes[b] ni a sus amigos.
  rationale: Se ajusta la expresión temporal para reflejar la inmediatez del hebreo, se reemplaza «golpeó» por «derribó» para comunicar mejor la acción letal en contexto, se corrige el anglicismo de la nota, y se añade la nota faltante para גֹאֲלָיו conforme al expediente POB.
