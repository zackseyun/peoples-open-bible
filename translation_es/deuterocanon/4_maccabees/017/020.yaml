translation:
  language: es
  text: y que el tirano sea castigado y la patria sea purificada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpiada». El griego puede sugerir purificación en sentido ritual, moral o nacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: τύραννον
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el déspota
  lexicon: LSJ
  rationale: τύραννος suele designar a un gobernante con poder opresivo o absoluto. En este contexto polémico y evaluativo, 'tirano' conserva bien la carga moral del griego y suena natural en español.
- source_word: τιμωρηθῆναι
  english_pob_choice: should be punished
  chosen_spanish: sea castigado
  alternatives_spanish:
  - deba ser castigado
  - sea vengado
  - reciba castigo
  lexicon: LSJ
  rationale: El infinitivo pasivo aoristo expresa que el tirano recibe castigo. 'Sea castigado' reproduce ese valor sin añadir explícitamente la idea de venganza, aunque la retribución queda implícita.
- source_word: πατρίδα
  english_pob_choice: the homeland
  chosen_spanish: la patria
  alternatives_spanish:
  - la tierra natal
  - el país
  - la tierra patria
  lexicon: LSJ
  rationale: πατρίς / πατρίδα alude a la tierra de los antepasados o al lugar de pertenencia nacional. 'Patria' es un equivalente natural en español y conserva el matiz patriótico y afectivo.
- source_word: καθαρισθῆναι
  english_pob_choice: should be purified
  chosen_spanish: sea purificada
  alternatives_spanish:
  - sea limpiada
  - sea очищada
  - sea purificada de impureza
  lexicon: LSJ
  rationale: καθαρίζω puede referirse a limpieza ritual, moral o nacional. 'Purificada' mantiene el registro elevado y deja abierta esa amplitud de sentido, como en el texto inglés auditado.
theological_decisions:
- issue: Alcance de la purificación de la patria
  english_pob_reading: '''the homeland should be purified'' preserves possible ritual and moral-national dimensions without narrowing the sense.'
  chosen_spanish_reading: '''la patria sea purificada'' conserva la amplitud ritual, moral y nacional sin concretarla demasiado.'
  alternative_spanish_readings:
  - la patria sea limpiada
  - la patria sea purificada de su impureza
  rationale: El verbo griego admite más de una dimensión de limpieza. En 4 Macabeos, el contexto de martirio y expiación favorece no cerrar el sentido a una sola lectura.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto griego transmitido por Swete y con el consenso del repaso posterior: no se detectaron cambios necesarios en la lectura inglesa de base ni en la dirección interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Tirano'' conserva el tono peyorativo del griego y del inglés POB.'
  - '''Patria'' se usa aquí por naturalidad en español y por su cercanía semántica a ''homeland'' sin perder el matiz identitario.'
