translation:
  language: es
  text: 'Entonces Sansón dijo al joven que lo llevaba de la mano[a]: «Déjame, y guíame hasta los pilares sobre los cuales descansa la casa, para que pueda apoyarme en ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «que le sujetaba la mano». Más literalmente, la petición de Sansón puede entenderse como: «Déjame, y llévame a los pilares…». El hebreo puede expresarse de forma más literal, pero el sentido en contexto es que pide ser colocado junto a los pilares de soporte para poder apoyarse en ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el servidor
  lexicon: HALOT
  rationale: נַעַר suele designar a un joven o asistente masculino. 'El joven' conserva el matiz de edad sin imponer 'servidor', que no está explícito en el hebreo.
- source_word: הַמַּחֲזִיק בְּיָדוֹ
  english_pob_choice: who was holding his hand
  chosen_spanish: que le estaba sosteniendo la mano
  alternatives_spanish:
  - que lo llevaba de la mano
  - que le sujetaba la mano
  lexicon: HALOT
  rationale: 'La forma participial expresa una acción continua: el muchacho mantenía a Sansón sujeto de la mano. ''Le estaba sosteniendo la mano'' es natural en español y respeta la imagen física.'
- source_word: הַנִּיחָה אוֹתִי
  english_pob_choice: Let me feel
  chosen_spanish: Déjame tocar
  alternatives_spanish:
  - Déjame sentir
  - Ponme junto a
  lexicon: HALOT
  rationale: La revisión inglesa señala que el verbo apunta a hacer contacto físico con los pilares, no a 'descansar' o simplemente 'dejar'. En español, 'tocar' comunica mejor esa acción concreta y mantiene la tensión del contexto.
- source_word: וְהִימְשֵׁנִי
  english_pob_choice: so that I may lean against them
  chosen_spanish: para que yo pueda apoyarme en ellos
  alternatives_spanish:
  - y condúceme hacia ellos
  - para que yo me apoye en ellos
  lexicon: HALOT
  rationale: 'El verbo tiene fuerza causativa de mover o poner en posición. La frase final en español debe expresar el propósito corporal: que Sansón se sostenga en los pilares.'
- source_word: הָעַמֻּדִים
  english_pob_choice: the pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - las columnas
  lexicon: HALOT
  rationale: '''Pilares'' es el término arquitectónico bíblico más claro y conserva el peso estructural del hebreo.'
- source_word: אֲשֶׁר הַבַּיִת נָכוֹן עֲלֵיהֶם
  english_pob_choice: on which the house stands
  chosen_spanish: sobre los cuales se apoya la casa
  alternatives_spanish:
  - en los que se sostiene la casa
  - sobre los que la casa está establecida
  lexicon: HALOT
  rationale: נָכוֹן transmite algo firme, establecido. 'Se apoya la casa' evita una traducción excesivamente literal y conserva la idea de soporte estructural.
- source_word: וְאֶשָּׁעֵן עֲלֵיהֶם
  english_pob_choice: so that I may lean against them
  chosen_spanish: para que yo pueda apoyarme en ellos
  alternatives_spanish:
  - y pueda recostarme en ellos
  - para que me sostenga en ellos
  lexicon: HALOT
  rationale: שׁען es apoyarse físicamente. 'Apoyarme' es la forma más natural y precisa en español para este gesto corporal.
theological_decisions:
- issue: 'Naturaleza de la petición de Sansón: tocar vs. solo ser llevado hasta los pilares'
  english_pob_reading: 'The main text reflects the likely sense in context: he asks to be positioned at the supporting pillars so he can lean on them.'
  chosen_spanish_reading: Sansón pide que lo acerquen para tocar y apoyarse en los pilares.
  alternative_spanish_readings:
  - Sansón pide ser llevado hasta los pilares para apoyarse en ellos.
  - Sansón pide que lo dejen junto a los pilares.
  rationale: La revisión auditada corrige una lectura que sonaba a 'descansar' o mera conducción. El hebreo permite una acción más concreta de contacto y apoyo corporal, importante para la escena narrativa.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que reemplazó una formulación de 'rest'/'guide me to' por 'feel' para reflejar mejor el hebreo. El español sigue esa corrección y evita una paráfrasis que suavice la acción física del versículo.
  spanish_consistency_notes:
  - Se mantuvo 'Sansón' como forma propia del nombre.
  - Se usó 'pilares' y no 'columnas' para conservar el registro bíblico usual y la función estructural del hebreo.
  - Se eligió 'apoyarse' para שׁען, consistente con un apoyo corporal directo.
  - La nota al pie preserva la alternativa literal relevante sin duplicar innecesariamente el sentido principal.
