base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/001/021.yaml
  text: Mountains of Gilboa[a], let there be no dew or rain upon you, nor fields of offerings; for there the shield of the mighty was defiled, the shield of Saul[b], not anointed with oil.
  footnotes:
  - marker: a
    text: Or 'nor bounteous fields,' 'nor fields of firstfruits,' or 'nor fields of heave offerings.' The Hebrew phrase is difficult, and תְּרוּמוֹת often refers to offerings set apart for God.
    reason: lexical_alternative
  - marker: b
    text: The final phrase may refer to Saul's shield as no longer rubbed with oil, a customary preparation for battle, rather than to Saul himself as 'the anointed.'
    reason: cultural_note
