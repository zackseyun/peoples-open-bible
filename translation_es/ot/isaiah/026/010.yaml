  language: en
  yaml_path: translation/ot/isaiah/026/010.yaml
  text: Though favor is shown to the wicked[a], he does not learn righteousness; in a land of uprightness he acts unjustly[e][d][c][b], and he does not see the majesty of Yahweh.
  footnotes:
