translation:
  language: es
  text: Y aconteció que, cuando el rey Alejandro oyó estas palabras, siguió honrando a Jonatán, y le envió un broche[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una hebilla»; el término griego denota un adorno de sujeción o cierre.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο ὡς
  english_pob_choice: And it happened that when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y cuando
  - Y sucedió que, cuando
  lexicon: LSJ
  rationale: La fórmula narrativa introduce un nuevo desarrollo de la acción. «Aconteció que» conserva bien el valor de transición de ἐγένετο sin sonar demasiado moderno, y «cuando» refleja ὡς en la relación temporal.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró de
  lexicon: BDAG
  rationale: En este contexto de recepción de un informe, «oyó» es natural y fiel al verbo de percepción auditiva. «Se enteró de» explicita el sentido, pero se aleja más de la forma griega.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este mensaje
  - estos asuntos
  lexicon: LSJ
  rationale: «Palabras» mantiene la cercanía formal con λόγοι y funciona bien en español. «Mensaje» interpreta el contenido, pero la traducción base de la POB conserva la referencia verbal directa.
- source_word: προσέθετο δοξάσαι
  english_pob_choice: continued to honor
  chosen_spanish: siguió honrando
  alternatives_spanish:
  - continuó honrando
  - procedió a honrar
  - añadió a honrar
  lexicon: LSJ
  rationale: La construcción idiomática expresa continuidad o acción adicional. «Siguió honrando» comunica de forma natural que Alejandro mantuvo y aumentó su honra a Jonatán, preservando el matiz de προσέθετο + infinitivo.
- source_word: δοξάσαι
  english_pob_choice: honor
  chosen_spanish: honrar
  alternatives_spanish:
  - glorificar
  - dar honra a
  lexicon: LSJ
  rationale: En un contexto real y político, «honrar» es el equivalente más natural y preciso. «Glorificar» sería demasiado teológico en español y podría deformar el registro.
- source_word: πόρπην
  english_pob_choice: a clasp
  chosen_spanish: un broche
  alternatives_spanish:
  - una hebilla
  - un broche de prendedor
  - un broche de cierre
  lexicon: LSJ
  rationale: πόρπη designa un adorno de sujeción o cierre. «Broche» es una equivalencia idiomática aceptable en español y cubre la función ornamental y de sujeción sin precisar excesivamente la forma.
translation_notes:
  revision_awareness: La base inglesa revisada cambió de «went on to honor» a «continued to honor» para reflejar mejor προσέθετο δοξάσαι; la versión española adopta «siguió honrando» para conservar ese sentido de acción continuada o añadida. No se detectan otros cambios textuales relevantes respecto del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponde al Tetragrámaton; aquí no aparece ningún nombre divino.
  - «Jonatán» se conserva con ortografía española estándar.
  - El orden de las cláusulas sigue el flujo narrativo del griego y del texto inglés auditado.
  - Se usa puntuación española estándar con coma tras la subordinada temporal.
