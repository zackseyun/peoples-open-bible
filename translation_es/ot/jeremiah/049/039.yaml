translation:
  language: es
  text: Pero en los últimos días restauraré la prosperidad de Elam[a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la cautividad» o «los cautivos» de Elam. La fórmula hebrea de restauración puede referirse específicamente al regreso del cautiverio o, más ampliamente, a la restauración de la condición de Elam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הָיָה
  english_pob_choice: But it will happen / But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y sucederá
  - Y acontecerá
  lexicon: HALOT
  rationale: La frase introduce un giro profético tras el juicio anterior. En español, «Pero» comunica mejor la transición adversativa sin forzar una fórmula impersonal pesada.
- source_word: בְּ/אַחֲרִית הַ/יָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los postreros días
  - en días venideros
  lexicon: HALOT
  rationale: Es un giro profético idiomático. «Últimos días» conserva el peso temporal y la posible carga escatológica sin especificarla más de lo que el hebreo exige.
- source_word: אשוב
  english_pob_choice: I will restore
  chosen_spanish: restauraré
  alternatives_spanish:
  - haré volver
  - volveré a
  lexicon: HALOT
  rationale: En esta fórmula con el objeto «la fortuna / la cautividad», שׁוּב expresa una acción restauradora. «Restauraré» comunica el sentido idiomático con naturalidad en español.
- source_word: אֶת שבית
  english_pob_choice: the fortunes
  chosen_spanish: la fortuna
  alternatives_spanish:
  - la cautividad
  - los cautivos
  lexicon: HALOT
  rationale: La construcción hebrea admite el sentido de «cautividad/cautivos», pero también el más amplio de restauración de la condición. «La fortuna» mantiene esa amplitud; en español, el singular funciona como equivalente idiomático de «fortunes».
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  lexicon: HALOT
  rationale: Nombre propio geográfico/nacional; se translitera sin traducir.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un verbo solemne y actual. Se conserva el nombre divino como «Yahvé» según el criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre personal divino conforme al estándar del proyecto y a la evidencia del texto fuente.
theological_decisions:
- issue: Alcance de la fórmula de restauración אשוב את שבית
  english_pob_reading: Understood as a broad restoration of Elam's fortunes.
  chosen_spanish_reading: Se entiende como una restauración amplia de la suerte/fortuna de Elam.
  alternative_spanish_readings:
  - como regreso de Elam del cautiverio
  - como retorno de los cautivos de Elam
  rationale: El hebreo admite un rango semántico entre cautividad y prosperidad restaurada. «Fortuna» preserva esa amplitud sin cerrar el pasaje a una sola interpretación.
  doctrine_reference: Preservar la tensión lexical y teológica del original; primacía del texto fuente.
- issue: Peso profético de בְּאַחֲרִית הַיָּמִים
  english_pob_reading: Rendered as 'in the latter days' without specifying a detailed eschatological scheme.
  chosen_spanish_reading: Se mantiene una expresión temporal profética sin fijar un esquema escatológico preciso.
  alternative_spanish_readings:
  - en los últimos tiempos
  - en los días postreros
  rationale: El hebreo puede tener resonancias escatológicas, pero el versículo por sí solo no obliga a precisar una cronología doctrinal. La traducción conserva esa abertura.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto principal junto a la frase a la que corresponde.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se prefirió «últimos días» como equivalente idiomático de la expresión profética hebrea.
  - Se mantuvo «restauraré» para reflejar el valor idiomático de שׁוּב en la fórmula de restauración.
  - La nota [a] está anclada directamente a «Elam» y no queda suelta.
