theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered address בְּנֵי יִשְׂרָאֵל
  chosen_reading: Sons of Israel
  alternative_readings:
  - Children of Israel
  - People of Israel
  rationale: The Hebrew is grammatically masculine plural and functions as a direct ethnic/covenantal address. Per translation philosophy, gender-accurate rendering is preferred over neutralization, while a more familiar alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
