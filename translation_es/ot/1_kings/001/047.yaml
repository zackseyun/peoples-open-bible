translation:
  language: es
  text: 'Y también vinieron los siervos del rey para bendecir a nuestro señor, el rey David, diciendo: «Que tu Dios haga más grande el nombre de Salomón que el tuyo[a], y que haga mayor su trono que tu trono». Y el rey se postró en la cama[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «nombre» lleva el sentido de reputación o renombre.
    reason: lexical_alternative
  - marker: b
    text: O, «el rey adoró en la cama». El verbo hebreo puede significar «se postró» o «adoró», según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And ... also
  chosen_spanish: Y también
  alternatives_spanish:
  - Y además
  - Además
  lexicon: HALOT
  rationale: La conjunción y el adverbio refuerzan una adición narrativa. «Y también» conserva ese valor acumulativo en español natural.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - fueron
  lexicon: HALOT
  rationale: En relato histórico, «vinieron» comunica bien el movimiento hacia David sin introducir matices innecesarios.
- source_word: עַבְדֵי הַמֶּלֶךְ
  english_pob_choice: the king’s servants
  chosen_spanish: los siervos del rey
  alternatives_spanish:
  - los servidores del rey
  - los oficiales del rey
  lexicon: HALOT
  rationale: Aquí עבד señala a los que pertenecen al ámbito real y prestan servicio; «siervos» mantiene la amplitud del término y evita reducirlo solo a funcionarios.
- source_word: לְבָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: para bendecir
  alternatives_spanish:
  - para bendecirlo
  - para pronunciar bendición
  lexicon: HALOT
  rationale: La forma verbal expresa una bendición dicha sobre David; «bendecir» conserva el peso lexical y teológico del verbo.
- source_word: אֲדֹנֵינוּ הַמֶּלֶךְ דָּוִד
  english_pob_choice: our lord King David
  chosen_spanish: nuestro señor el rey David
  alternatives_spanish:
  - nuestro señor, el rey David
  - nuestro señor rey David
  lexicon: HALOT
  rationale: «Señor» reproduce bien el honorífico אדון en contexto cortesano. Se mantiene «el rey David» para no perder la identificación plena del destinatario.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - con estas palabras
  lexicon: HALOT
  rationale: Introducción estándar del discurso directo; «diciendo» es transparente y fiel.
- source_word: יֵיטֵב אֱלֹהֶיךָ
  english_pob_choice: May your God make
  chosen_spanish: Que tu Dios haga mejor
  alternatives_spanish:
  - Que tu Dios haga prosperar
  - Que tu Dios haga bien
  lexicon: HALOT
  rationale: El verbo en este contexto tiene fuerza causativa con sentido de mejorar/prosperar. «Haga mejor» conserva la comparación implícita sin forzar una paráfrasis más distante.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - renombre
  - reputación
  lexicon: HALOT
  rationale: Se mantiene «nombre» para conservar la imagen hebrea, dejando abierta la noción de prestigio o fama que el contexto sugiere.
- source_word: מִשְּׁמֶךָ
  english_pob_choice: than your name
  chosen_spanish: que tu nombre
  alternatives_spanish:
  - que tu renombre
  - que el tuyo
  lexicon: HALOT
  rationale: La comparación se expresa de modo directo en español con «que tu nombre», equivalente funcional de la comparación hebrea.
- source_word: וִיגַדֵּל
  english_pob_choice: and may he make ... greater
  chosen_spanish: y que haga mayor
  alternatives_spanish:
  - y que engrandezca
  - y que haga más grande
  lexicon: HALOT
  rationale: גדל en causativo pide una idea de aumento. «Haga mayor» es breve, claro y mantiene la comparación del original.
- source_word: כִּסְא֖וֹ מִכִּסְאֶךָ
  english_pob_choice: his throne greater than your throne
  chosen_spanish: su trono que tu trono
  alternatives_spanish:
  - su trono más grande que tu trono
  - su trono por encima del tuyo
  lexicon: HALOT
  rationale: «Trono» conserva la imagen real y dinástica. La comparación se expresa de forma sobria y fiel al hebreo.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: And the king bowed himself
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - adoró
  lexicon: HALOT
  rationale: El verbo puede abarcar postración reverente o adoración. Aquí, para preservar la tensión sin resolverla, «se postró» comunica el gesto físico con suficiente amplitud.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - David
  - el monarca
  lexicon: HALOT
  rationale: En el cierre, el sujeto queda simplemente como «el rey»; el español lo deja igual de manera natural.
- source_word: עַל הַמִּשְׁכָּב
  english_pob_choice: on the bed
  chosen_spanish: sobre la cama
  alternatives_spanish:
  - sobre el lecho
  - en la cama
  lexicon: HALOT
  rationale: «Cama» es claro y contemporáneo. «Sobre» refleja bien la relación espacial del hebreo.
theological_decisions:
- issue: 'Sentido de וַיִּשְׁתַּחוּ: postración física o adoración explícita'
  english_pob_reading: Rendered as 'the king bowed himself'
  chosen_spanish_reading: se postró
  alternative_spanish_readings:
  - adoró
  - se inclinó
  rationale: El hebreo permite tanto reverencia física como adoración según el contexto. En esta escena, el texto no especifica el objeto del acto; «se postró» conserva la ambigüedad y el gesto visible sin resolver la cuestión teológica más allá de lo dicho.
  doctrine_reference: Preservar la tensión textual sin cerrar indebidamente el sentido.
translation_notes:
  revision_awareness: El texto y las decisiones siguen de cerca el audit trail inglés de la POB. Se conservó la ambigüedad reconocida en el verbo final y el valor idiomático de «nombre» sin desdibujar la imagen hebrea.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término de norma en el proyecto, pero en este versículo el hebreo no contiene el nombre divino explícito.
  - Se prefirió «siervos» para עבד en el contexto cortesano, coherente con el valor amplio del término en este pasaje.
  - Se mantuvo la comparación de «nombre» y «trono» para respetar la paralelía del hebreo.
  - La nota [a] marca la alternativa de traducción del verbo final sin imponerla en el texto principal.
