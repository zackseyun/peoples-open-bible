translation:
  language: es
  text: 'Cuando los hombres llegaron a él, dijeron: «Juan el Bautista nos ha enviado a ti, diciendo: “¿Eres tú el que ha de venir[a], o debemos esperar a otro?”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que viene».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενοι
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: BDAG
  rationale: El participio aoristo introduce la llegada de los mensajeros para iniciar la escena. «Llegaron» transmite el movimiento y es natural en español narrativo sin añadir matices no explícitos.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - ante él
  - hacia él
  lexicon: BDAG
  rationale: La preposición πρός con acusativo expresa dirección hacia la persona. «A él» es directo y fiel; en español, colocar «a él» tras «llegaron» comunica la misma orientación relacional.
- source_word: οἱ ἄνδρες
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los mensajeros
  lexicon: BDAG
  rationale: ἀνήρ aquí designa a los varones enviados. «Los hombres» conserva la referencia masculina sin explicitar “mensajeros”, que sería una expansión interpretativa.
- source_word: εἶπαν
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - le dijeron
  - respondieron
  lexicon: BDAG
  rationale: Verbo narrativo básico de habla. «Dijeron» reproduce con sobriedad el valor del griego; no se introduce «le» porque el destinatario ya está claro por el contexto y la estructura de la cita.
- source_word: Ἰωάννης ὁ βαπτιστής
  english_pob_choice: John the Baptist
  chosen_spanish: Juan el Bautista
  alternatives_spanish:
  - Juan el Bautizador
  lexicon: BDAG
  rationale: Es el título convencional y transparente en español. «Bautizador» sería formalmente posible, pero menos idiomático y menos reconocido.
- source_word: ἀπέστειλεν
  english_pob_choice: has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - envió
  - nos mandó
  lexicon: BDAG
  rationale: El aoristo en discurso referido se conserva bien con perfecto español, destacando la relevancia presente del envío en el momento de hablar. «Ha enviado» mantiene esa conexión sin perder temporalidad narrativa.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con este mensaje
  - preguntando
  lexicon: BDAG
  rationale: El participio introduce el contenido de la comisión. «Diciendo» conserva la relación sintáctica del griego y evita parafrasear el encargo.
- source_word: Σὺ εἶ
  english_pob_choice: Are you
  chosen_spanish: ¿Eres tú?
  alternatives_spanish:
  - ¿Eres tú el?
  - ¿Tú eres?
  lexicon: BDAG
  rationale: El español requiere inversión interrogativa. Se conserva el énfasis del pronombre con «tú» en posición explícita y natural.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: the one who is to come
  chosen_spanish: el que ha de venir
  alternatives_spanish:
  - el que viene
  - el que está por venir
  lexicon: BDAG
  rationale: La expresión funciona como designación esperada/escatológica. «El que ha de venir» mantiene la fuerza de futuro esperado y es una fórmula española clara y reverente; evita resolver la tensión en un título más interpretativo.
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - otro
  - algún otro
  lexicon: BDAG
  rationale: Tras «esperar» en español, el objeto se expresa de forma natural con «a otro». Conserva la referencia indefinida del griego sin añadir especificación.
- source_word: προσδοκῶμεν
  english_pob_choice: should we expect
  chosen_spanish: debemos esperar
  alternatives_spanish:
  - hemos de esperar
  - debemos aguardar
  lexicon: BDAG
  rationale: προσδοκάω expresa expectativa o esperar a alguien. «Debemos esperar» es idiomático en esta pregunta y mantiene el sentido de expectativa activa, no solo de demora pasiva.
theological_decisions:
- issue: Valor mesiánico de ὁ ἐρχόμενος
  english_pob_reading: the one who is to come
  chosen_spanish_reading: el que ha de venir
  alternative_spanish_readings:
  - el que viene
  - el esperado
  rationale: La frase alude a una figura esperada de carácter escatológico/mesiánico, pero el texto aún la formula como pregunta. «El que ha de venir» conserva la ambigüedad significativa y la carga de expectativa sin imponer una identificación más explícita que la del pasaje mismo.
  doctrine_reference: La traducción debe preservar la tensión mesiánica del texto sin resolverla por anticipado.
translation_notes:
  revision_awareness: El audit trail inglés pasó de una formulación titulada (“the Coming One”) a una más formal y natural (“the one who is to come”). En español se siguió esa revisión con una construcción equivalente y menos nominalizada, manteniendo la fuerza escatológica sin convertirla en un título más interpretativo.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «Juan el Bautista» como forma establecida y reconocible en español.
  - Se evitó traducir mecánicamente desde el inglés cuando el español pedía una estructura más natural, especialmente en la pregunta final.
  - La nota al pie marca una alternativa real de traducción para ὁ ἐρχόμενος, sin resolver la tensión interpretativa del pasaje.
