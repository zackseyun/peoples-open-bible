translation:
  language: es
  text: Al que hirió a Egipto en sus primogénitos[a], porque su amor fiel permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en sus primogénitos", "entre sus primogénitos" o, más explícitamente, "al herir a sus primogénitos". El hebreo dice literalmente "en/con sus primogénitos".
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַכֵּה
  english_pob_choice: To him who struck
  chosen_spanish: Al que hirió
  alternatives_spanish:
  - Al que golpeó
  - Al que pegó
  lexicon: HALOT
  rationale: El participio con ל introduce la fórmula de alabanza dirigida a Yahvé. "Hirió" comunica con claridad el acto de juicio histórico y conserva un registro bíblico natural en español sin suavizar la acción.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre geográfico/nacional estándar; en español basta "Egipto".
- source_word: בִּבְכוֹרֵיהֶם
  english_pob_choice: in their firstborn
  chosen_spanish: en sus primogénitos
  alternatives_spanish:
  - con sus primogénitos
  - entre sus primogénitos
  - por medio de sus primogénitos
  lexicon: HALOT
  rationale: La preposición ב admite sentido locativo/instrumental aquí. "En sus primogénitos" sigue de cerca la construcción hebrea y conserva la tensión semántica sin añadir explicación interpretativa en el texto principal. "Primogénitos" es el correlato natural de "firstborn" en español bíblico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En el estribillo de Salmo 136, כי introduce la razón de la alabanza; "porque" expresa bien esa relación causal en español.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: En el refrán litúrgico, la fuerza durativa se expresa de forma natural con "para siempre". La formulación evita una perifrasi innecesaria y mantiene el ritmo del estribillo.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor leal
  - su amor fiel
  - su bondad
  lexicon: HALOT
  rationale: חסד denota amor leal/covenantal. Aquí se eligió "misericordia" como forma bíblica tradicional y ampliamente comprensible en español; aun así, la nota mantiene abierta la alternativa de "amor leal" para preservar mejor el matiz de fidelidad pactal si se requiere en el aparato.
theological_decisions:
- issue: El texto celebra un acto de juicio divino sin atenuarlo
  english_pob_reading: Retain the direct statement of God's striking Egypt through/in their firstborn within the praise refrain.
  chosen_spanish_reading: Mantener la afirmación directa de que Yahvé hirió a Egipto en sus primogénitos dentro del estribillo de alabanza.
  alternative_spanish_readings:
  - Suavizar el juicio con una paráfrasis menos directa
  - Añadir explicaciones como "al dar muerte a" en el texto principal
  rationale: El hebreo presenta con sobriedad el juicio sobre Egipto y el poema lo inserta en una doxología. La traducción debe conservar esa tensión entre juicio y amor permanente sin amortiguar el hecho narrado.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente ajustó la relación de ב desde una posible idea instrumental ("through") a una lectura más directa y cercana al hebreo ("in"). Por eso el español mantiene "en sus primogénitos" y la nota recoge alternativas locativas e instrumentales sin convertirlas en paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino según el estándar del proyecto.
  - Se mantiene un registro bíblico sobrio y litúrgico acorde con el paralelismo del Salmo 136.
  - '"Misericordia" refleja una opción tradicional en español; la nota preserva el matiz de חסד como amor leal o fiel.'
