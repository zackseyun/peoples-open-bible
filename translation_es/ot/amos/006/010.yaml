translation:
  language: es
  text: 'Entonces lo sacará su tío[a], el que lo quema[b], para sacar los huesos de la casa; y dirá al que está en lo más interior de la casa: «¿Todavía hay alguien contigo?». Y él dirá: «Nadie». Entonces dirá[c]: «¡Silencio! Porque no debemos mencionar el nombre de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «su pariente»; el término hebreo puede designar a un familiar varón cercano, aunque «tío» encaja bien con el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «el que lo quema». La expresión es inusual y puede aludir a la quema asociada con la disposición del cadáver en un tiempo de juicio.'
    reason: cultural_note
  - marker: c
    text: O, «No mencionen el nombre de Yahvé». La expresión hebrea es breve y puede entenderse como una prohibición directa o como una necesidad impuesta por la situación.
    reason: alternative_reading
lexical_decisions:
- source_word: דּוֹדוֹ
  english_pob_choice: his uncle
  chosen_spanish: su tío
  alternatives_spanish:
  - su pariente
  - su allegado
  lexicon: HALOT
  rationale: El hebreo דּוֹד puede referirse a un pariente cercano varón; en este contexto funerario, 'tío' comunica bien la relación familiar concreta que el audit trail inglés consideró más probable. 'Pariente' es posible, pero menos específico.
- source_word: וּמְסָרְפוֹ
  english_pob_choice: the one who burns him
  chosen_spanish: el que lo quema
  alternatives_spanish:
  - su quemador
  - el que lo incinera
  lexicon: HALOT
  rationale: El participio de שׂרף expresa quemar de forma directa. Mantener 'el que lo quema' conserva la rareza del cuadro de juicio sin suavizarlo a lenguaje genérico de sepultura.
- source_word: לְהוֹצִיא עֲצָמִים
  english_pob_choice: to bring the bones out
  chosen_spanish: para sacar los huesos
  alternatives_spanish:
  - para remover los huesos
  - para sacar los restos
  lexicon: HALOT
  rationale: עֲצָמִים significa literalmente 'huesos'. 'Sacar los huesos' es claro y conserva la concreción del hebreo. 'Restos' sería más fluido, pero borra la imagen.
- source_word: בְּיַרְכְּתֵי הַבַּיִת
  english_pob_choice: in the innermost part of the house
  chosen_spanish: en el rincón más interior de la casa
  alternatives_spanish:
  - en lo más recóndito de la casa
  - en la parte más apartada de la casa
  lexicon: HALOT
  rationale: יַרְכָּה expresa la parte remota o interior. 'Rincón más interior' comunica el espacio reservado de manera natural en español, sin perder el matiz de ocultamiento.
- source_word: הַעוֹד עִמָּךְ
  english_pob_choice: Is there still anyone with you?
  chosen_spanish: ¿Todavía hay alguien contigo?
  alternatives_spanish:
  - ¿Queda alguien contigo?
  - ¿Aún hay alguien contigo?
  lexicon: HALOT
  rationale: La pregunta hebrea busca saber si queda alguien presente. En español, '¿Todavía hay alguien contigo?' conserva la idea de supervivientes remanentes con naturalidad.
- source_word: אָפֶס
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguno
  - No hay nadie
  lexicon: HALOT
  rationale: אָפֶס funciona aquí como negación elíptica. 'Nadie' es la respuesta más natural y fiel en español.
- source_word: הָס
  english_pob_choice: Hush!
  chosen_spanish: ¡Calla!
  alternatives_spanish:
  - ¡Silencio!
  - ¡Sss!
  lexicon: HALOT
  rationale: El imperativo abrupto pide silencio inmediato. '¡Calla!' transmite mejor el tono urgente y temeroso que una formulación más explicativa.
- source_word: לֹא לְהַזְכִּיר בְּשֵׁם יְהוָה
  english_pob_choice: we must not mention the name of Yahweh
  chosen_spanish: no debemos mencionar el nombre de Yahvé
  alternatives_spanish:
  - no debemos invocar el nombre de Yahvé
  - el nombre de Yahvé no debe mencionarse
  lexicon: HALOT
  rationale: El infinitivo con לֹא expresa prohibición o necesidad; 'no debemos mencionar' preserva esa fuerza. Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el proyecto establece 'Yahvé' como forma principal para preservar el nombre propio divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the prohibition in כִּי לֹא לְהַזְכִּיר בְּשֵׁם יְהוָה
  english_pob_reading: For we must not mention the name of Yahweh
  chosen_spanish_reading: Porque no debemos mencionar el nombre de Yahvé
  alternative_spanish_readings:
  - Porque no se debe mencionar el nombre de Yahvé
  - Porque no mencionaremos el nombre de Yahvé
  rationale: La frase hebrea es breve y con cierto carácter elíptico. 'No debemos mencionar' conserva la fuerza prohibitiva sin añadir una explicación ajena al pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Ambiguity of the closing hush
  english_pob_reading: Hush!
  chosen_spanish_reading: ¡Calla!
  alternative_spanish_readings:
  - ¡Silencio!
  - ¡Calla, pues!
  rationale: El hebreo הָס es una interjección imperativa y brusca. '¡Calla!' preserva la inmediatez del mandato y el temor implícito de la escena.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo y el audit trail inglés sin cambios de contenido relevantes; se ha conservado la tensión de la cláusula final y la rareza de la referencia al quemador, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה en conformidad con el estándar del proyecto.
  - Se mantiene un registro sobrio y literal donde el hebreo resulta extraño, especialmente en 'el que lo quema'.
  - La pregunta y respuesta breves ('¿Todavía hay alguien contigo?' / 'Nadie') conservan la economía del diálogo hebreo.
  - Se evita sustituir por lenguaje eclesiástico tradicional cuando el hebreo pide concreción narrativa.
