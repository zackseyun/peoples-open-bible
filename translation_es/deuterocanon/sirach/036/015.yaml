translation:
  language: es
  text: Ten compasión de la ciudad de tu santuario[a], Jerusalén, la ciudad de tu morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ten misericordia de la ciudad de tu santuario, Jerusalén, la ciudad de tu morada».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκτείρησον
  english_pob_choice: Have compassion
  chosen_spanish: Ten compasión
  alternatives_spanish:
  - Muestra misericordia
  - Ten misericordia
  - Apiádate
  lexicon: BDAG
  rationale: El imperativo pide una respuesta de compasión activa; «ten compasión» conserva ese matiz emocional y suena natural en español actual. «Apiádate» es posible, pero puede sonar más marcado. «Ten misericordia» es tradicional, pero menos transparente para lectores modernos.
- source_word: πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - ciudad
  lexicon: LSJ
  rationale: Aunque el griego no lleva artículo aquí, la referencia a Jerusalén la vuelve definida en español. Se mantiene como «la ciudad» para reflejar la identificación apposicional.
- source_word: ἁγιάσματός
  english_pob_choice: your sanctuary
  chosen_spanish: tu santuario
  alternatives_spanish:
  - tu lugar santo
  - tu lugar consagrado
  - tu santuario sagrado
  lexicon: LSJ
  rationale: ἁγίασμα designa un lugar santo o consagrado. «Santuario» es breve, idiomático y suficientemente preciso en español, sin perder la asociación con la presencia santa de Dios.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Transliteración estándar
  rationale: Se usa la forma española establecida del topónimo bíblico.
- source_word: καταπαύματός
  english_pob_choice: your dwelling place
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu lugar de descanso
  - tu habitación
  - tu lugar de reposo
  lexicon: LSJ
  rationale: El sustantivo puede expresar un lugar de descanso o de habitación. Dado que la revisión inglesa prefirió «dwelling place», «morada» comunica con naturalidad la idea de habitar y evita sonar demasiado literal o ambiguo.
theological_decisions:
- issue: Cómo expresar las dos descripciones de Jerusalén
  english_pob_reading: Jerusalem is both the city of God's sanctuary and the city of God's dwelling place.
  chosen_spanish_reading: Jerusalén es la ciudad de tu santuario y la ciudad de tu morada.
  alternative_spanish_readings:
  - Jerusalén, tu ciudad santa, tu morada
  - la ciudad donde está tu santuario y tu morada
  rationale: 'El griego presenta dos genitivos en aposición que describen a Jerusalén desde dos ángulos: lugar santo y lugar de habitación divina. La traducción conserva ambas imágenes sin fusionarlas en una sola paráfrasis, manteniendo la tensión devocional del texto.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «resting place» a «dwelling place» para καταπαύματός. La propuesta española sigue esa revisión con «morada», que expresa mejor la idea de habitación divina sin perder la concreción del término griego.
  spanish_consistency_notes:
  - Se mantiene «santuario» para ἁγίασμα, en línea con el valor de lugar santo documentado por la fuente.
  - Se evita «SEÑOR» porque el texto griego no contiene κύριος; el poseedor implícito se expresa con «tu».
  - Se conserva la doble caracterización de Jerusalén con paralelismo cercano al griego.
  - La nota alternativa refleja la tensión léxica entre compasión y misericordia, como en el audit trail inglés.
