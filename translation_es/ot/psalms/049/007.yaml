lexical_decisions:
- source_word: הַבֹּטְחִים
  english_pob_choice: those who trust
  chosen_spanish: los que confían
  alternatives_spanish:
  - los que se apoyan
  - los que ponen su confianza
  lexicon: HALOT
  rationale: El participio sustantivado expresa una acción habitual o característica. «Los que confían» suena natural en español y conserva el sentido de dependencia continua.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - en/contra
  lexicon: HALOT
  rationale: Con בָּטַח, la preposición marca el objeto de la confianza; en español «confiar en» reproduce bien esa relación idiomática.
- source_word: חֵילָם
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - su fuerza
  - sus recursos
  - su fortuna
  lexicon: HALOT
  rationale: Aunque חַיִל puede significar fuerza o recursos, el paralelismo con «la abundancia de sus riquezas» favorece claramente el ámbito material. «Riqueza» evita una redundancia excesiva y mantiene el sentido económico.
- source_word: וּבְרֹב
  english_pob_choice: and in the abundance of
  chosen_spanish: y en la abundancia de
  alternatives_spanish:
  - y en la grandeza de
  - y en la multitud de
  lexicon: HALOT
  rationale: רֹב denota abundancia o gran cantidad. «La abundancia de» conserva el paralelismo poético y resulta claro en español.
- source_word: עָשְׁרָם
  english_pob_choice: their riches
  chosen_spanish: sus riquezas
  alternatives_spanish:
  - su riqueza
  lexicon: HALOT
  rationale: עֹשֶׁר significa riquezas/riqueza. Se mantiene el plural «riquezas» para reflejar el paralelo poético y evitar homogeneizar ambos miembros con la misma forma.
- source_word: יִתְהַלָּלוּ
  english_pob_choice: boast
  chosen_spanish: se glorían
  alternatives_spanish:
  - se jactan
  - se enorgullecen
  lexicon: HALOT
  rationale: El hitpael de הלל aquí expresa jactancia o glorificación en algo. «Se glorían» preserva la posible oscilación entre «gloriarse» y «jactarse» que la nota inglesa documenta, sin perder naturalidad en español.
theological_decisions:
- issue: Tensión léxica de חֵילָם entre «fuerza/recursos/riqueza» y el paralelo con «riquezas»
  english_pob_reading: Hebrew חַיִל can also mean 'strength' or 'resources,' but here the parallel with 'riches' indicates material wealth.
  chosen_spanish_reading: Se traduce como «riqueza» porque el paralelo poético apunta a bienes materiales.
  alternative_spanish_readings:
  - «fuerza»
  - «recursos»
  - «fortuna»
  rationale: 'No se borra la amplitud semántica del hebreo: se registra como alternativa. Pero el contexto inmediato inclina la lectura hacia la prosperidad material, por lo que la traducción principal debe reflejar esa decisión contextual.'
  doctrine_reference: Salmos 49:7; cf. el uso contextual de חַיִל en léxicos como HALOT
translation_notes:
  revision_awareness: El control de revisión indica high_agreement (1.0) y no hubo cambios en la última pasada; por tanto, el borrador sigue la decisión establecida y no introduce revisiones nuevas.
