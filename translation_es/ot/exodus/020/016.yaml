lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La partícula de negación introduce una prohibición directa; en español, «no» reproduce de manera natural y precisa ese valor prohibitivo.
- source_word: תַעֲנֶה
  english_pob_choice: you shall bear witness
  chosen_spanish: darás testimonio
  alternatives_spanish:
  - testificarás
  - responderás
  lexicon: HALOT
  rationale: En contexto legal-forense, ענה puede significar responder o testificar. «Dar testimonio» expresa bien la función jurídica sin caer en un calco rígido de «bear witness».
- source_word: בְרֵעֲךָ
  english_pob_choice: against your neighbor
  chosen_spanish: contra tu prójimo
  alternatives_spanish:
  - contra tu vecino
  - respecto de tu prójimo
  lexicon: HALOT
  rationale: רֵעַ designa al cercano, al compañero o prójimo. En este mandato, la preposición con valor forense se refleja mejor con «contra». «Prójimo» conserva el alcance relacional más amplio que «vecino».
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  lexicon: HALOT
  rationale: Aunque עֵד puede referirse al testigo, en esta construcción el foco recae en el acto o contenido del testimonio. «Dar testimonio» mantiene el sentido jurídico y evita una redundancia menos natural en español.
- source_word: שָׁקֶר
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - mentiroso
  - engañoso
  lexicon: HALOT
  rationale: שָׁקֶר expresa falsedad o mentira. En español, «falso» encaja de forma idiomática en la expresión fija «falso testimonio» y conserva el registro legal.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con la lectura estable de la base inglesa auditada y con el consenso alto de los revisores.
  spanish_consistency_notes:
  - Se mantiene «prójimo» para רֵעַ en coherencia con un uso relacional amplio y bíblicamente reconocible, evitando restringirlo a «vecino».
  - Se usa «dar testimonio» para reflejar la función jurídica del mandato, en línea con la lectura forense del hebreo.
  - La nota preserva la alternativa léxica documentada por la POB inglesa sin sobrecargar el texto principal.
