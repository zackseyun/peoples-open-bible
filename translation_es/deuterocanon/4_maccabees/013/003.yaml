translation:
  language: es
  text: Pero ahora no es así; antes bien[a], por el razonamiento aprobado por Dios, vencieron a las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la razón aprobada por Dios». El término griego puede traducirse como «razón», «razonamiento» o «juicio racional».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Pero en este momento
  - Pero ahora bien
  lexicon: LSJ
  rationale: Conserva el contraste adversativo y la referencia temporal inmediata de manera natural en español.
- source_word: οὐχ οὕτως
  english_pob_choice: it is not so
  chosen_spanish: no es así
  alternatives_spanish:
  - no es de ese modo
  - no es así como antes
  lexicon: LSJ
  rationale: Mantiene la brevedad y la elipsis del griego sin añadir una comparación más específica de la que el texto da.
- source_word: ἀλλὰ
  english_pob_choice: rather
  chosen_spanish: antes bien
  alternatives_spanish:
  - sino
  - más bien
  lexicon: LSJ
  rationale: En español, "antes bien" expresa con claridad la corrección contrastiva después de la negación.
- source_word: τῷ ἐπαινουμένῳ λογισμῷ
  english_pob_choice: by the reasoning that is praised by God
  chosen_spanish: por el razonamiento aprobado por Dios
  alternatives_spanish:
  - por el razonamiento alabado por Dios
  - por la razón aprobada por Dios
  - por el juicio racional aprobado por Dios
  lexicon: LSJ
  rationale: '"Razonamiento" conserva el matiz activo y deliberativo de λογισμός. "Aprobado por Dios" refleja bien el participio pasivo ἐπαινουμένῳ en un español natural, sin forzar una perífrasis extensa.'
- source_word: παρὰ θεῷ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - delante de Dios
  - a los ojos de Dios
  - con Dios
  lexicon: LSJ
  rationale: En esta construcción con el participio, la idea es que el razonamiento recibe la aprobación divina; "por Dios" comunica de forma directa esa fuente de aprobación.
- source_word: περιεγένοντο
  english_pob_choice: they overcame
  chosen_spanish: vencieron
  alternatives_spanish:
  - prevalecieron
  - salieron victoriosos
  - se impusieron sobre
  lexicon: LSJ
  rationale: '"Vencieron" expresa la idea de superar o dominar una fuerza opuesta con naturalidad en español.'
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: a las pasiones
  alternatives_spanish:
  - sobre las pasiones
  - contra las pasiones
  - los impulsos
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη alude a las pasiones que deben ser dominadas por la razón; "pasiones" preserva ese vocabulario filosófico-teológico.
theological_decisions:
- issue: λόγισμος como término programático de la obra
  english_pob_reading: reasoning
  chosen_spanish_reading: razonamiento
  alternative_spanish_readings:
  - razón
  - juicio racional
  rationale: La obra destaca la actividad racional disciplinada; "razonamiento" conserva la dimensión dinámica y moral del término mejor que una simple facultad abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Relación entre ἐπαινουμένῳ y παρὰ θεῷ
  english_pob_reading: praised by God
  chosen_spanish_reading: aprobado por Dios
  alternative_spanish_readings:
  - alabado por Dios
  - comendado por Dios
  - aprobado delante de Dios
  rationale: '"Aprobado" en español comunica adecuadamente la idea de evaluación favorable sin introducir más contenido del que exige el griego. Mantiene la tensión entre alabanza y aprobación divina presente en el audit trail.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El contexto inglés fue revisado y se mantuvo sin cambios; la versión española sigue de cerca el griego y el audit trail, conservando la oposición entre la situación presente y el triunfo de la razón aprobada por Dios sobre las pasiones.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se prefirió «razonamiento» para λογισμός, manteniendo el valor filosófico del término en 4 Macabeos.
  - Se tradujo πάθη como «pasiones», no como «sufrimientos», porque el contexto inmediato es moral y antropológico.
