  text: וַ/יָּעַר֩ אֱלֹהֵ֨י יִשְׂרָאֵ֜ל אֶת ר֣וּחַ פּ֣וּל מֶֽלֶךְ אַשּׁ֗וּר וְ/אֶת ר֨וּחַ֙ תִּלְּגַ֤ת פִּלְנֶ֨סֶר֙ מֶ֣לֶךְ אַשּׁ֔וּר וַ/יַּגְלֵ/ם֙ לָ/ראוּבֵנִ֣י וְ/לַ/גָּדִ֔י וְ/לַ/חֲצִ֖י שֵׁ֣בֶט מְנַשֶּׁ֑ה וַ֠/יְבִיאֵ/ם לַ/חְלַ֨ח וְ/חָב֤וֹר וְ/הָרָא֙ וּ/נְהַ֣ר גּוֹזָ֔ן עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׀־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/005/026.yaml
  text: So the God of Israel stirred up the spirit of Pul king of Assyria[a], even the spirit of Tilgath-pilneser king of Assyria, and he took the Reubenites, the Gadites, and the half-tribe of Manasseh into exile, and brought them to Halah, Habor, Hara, and the river Gozan[b], to this day.
  footnotes:
  - marker: a
    text: Or, 'the spirit of Pul king of Assyria and the spirit of Tilgath-pilneser king of Assyria,' taking the two names as separate rulers rather than two names for the same king.
    reason: alternative_reading
  - marker: b
    text: '''Tilgath-pilneser'' reflects the Hebrew form here; the more familiar English form is ''Tiglath-pileser.'''
    reason: lexical_alternative
