  glossary_alignment: No hay términos teológicos mayores en juego. En nombres propios, el proyecto favorece transliterar según la forma fuente cuando así lo documenta el POB inglés. Por eso debe preferirse 'Shaul' sobre 'Saúl'. 'Simeón', 'Nemuel', 'Jamín', 'Jarib' y 'Zérah' son aceptables en contexto.
  issues:
