id: 2TI.1.5
reference: 2 Timothy 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὑπόμνησιν ⸀λαβὼν τῆς ἐν σοὶ ἀνυποκρίτου πίστεως, ἥτις ἐνῴκησεν πρῶτον ἐν τῇ μάμμῃ σου Λωΐδι καὶ τῇ μητρί σου Εὐνίκῃ, πέπεισμαι δὲ ὅτι καὶ ἐν σοί.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/005.yaml
  text: having been reminded of the sincere faith in you, which first lived in your grandmother Lois and your mother Eunice, I am persuaded that it is also in you.
translation:
  language: ko
  text: 그대 안에 있는 거짓 없는 믿음이 떠오릅니다. 그 믿음은 먼저 그대의 외할머니 로이스와 그대의 어머니 유니게 안에 살아 있었고, 그대 안에도 있음을 나는 확신합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπόμνησιν λαβὼν
  english_pob_choice: having been reminded
  chosen_korean: 떠오릅니다
  alternatives_korean:
  - 기억이 새로워집니다
  - 다시 떠올리게 됩니다
  lexicon: BDAG
  rationale: 「상기·기억을 받음」을 직역하면 한국어 흐름이 무거우므로, 자연스러운 한국어 종결문 「떠오릅니다」로 옮긴다. 헬라어의 수동적 뉘앙스(그대의 믿음이 바울의 마음에 떠올라옴)를 한국어 「떠오르다」가 잘 살린다.
- source_word: ἀνυποκρίτου πίστεως
  english_pob_choice: sincere faith
  chosen_korean: 거짓 없는 믿음
  alternatives_korean:
  - 진실한 믿음
  - 위선 없는 믿음
  lexicon: BDAG
  rationale: ἀνυπόκριτος는 「위선 없는·꾸밈 없는」을 뜻하며, 한국어 「거짓 없는」이 그 부정형(ἀν-)과 진정성의 의미를 동시에 살린다.
- source_word: ἐνῴκησεν
  english_pob_choice: lived in
  chosen_korean: 살아 있었고
  alternatives_korean:
  - 거하였고
  - 자리잡았고
  lexicon: BDAG
  rationale: ἐνοικέω는 「거주·내주」를 뜻하며, 믿음을 인격적 손님처럼 묘사하는 본문의 이미지를 한국어 「살아 있다」로 자연스럽게 옮긴다.
- source_word: μάμμῃ
  english_pob_choice: grandmother
  chosen_korean: 외할머니
  alternatives_korean:
  - 할머니
  lexicon: BDAG
  rationale: μάμμη는 단순히 「할머니」이나, 본문 흐름상 어머니 유니게의 어머니이므로 한국어 친족 호칭으로는 「외할머니」가 정확하다.
- source_word: Λωΐδι
  english_pob_choice: Lois
  chosen_korean: 로이스
  alternatives_korean:
  - 로이
  lexicon: BDAG
  rationale: 외래어 표기법 및 한국 성서 전통에 따라 「로이스」로 음역한다.
- source_word: Εὐνίκῃ
  english_pob_choice: Eunice
  chosen_korean: 유니게
  alternatives_korean:
  - 에우니케
  lexicon: BDAG
  rationale: 한국 성서 전통(개역개정)을 따라 「유니게」로 옮긴다.
- source_word: πέπεισμαι δὲ ὅτι καὶ ἐν σοί
  english_pob_choice: I am persuaded that it is also in you
  chosen_korean: 그대 안에도 있음을 나는 확신합니다
  alternatives_korean:
  - 그대 안에도 있음을 나는 믿어 의심치 않습니다
  lexicon: BDAG
  rationale: πέπεισμαι의 완료형이 가져오는 「확정된 확신」을 한국어 「확신합니다」로 살린다.
