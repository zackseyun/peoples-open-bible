translation:
  language: es
  text: Pero Abner hijo de Ner[a], el comandante del ejército de Saúl, tomó a Is-bóset, hijo de Saúl, y lo llevó al otro lado, a Mahanaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Is-bóset es llamado Eshbaal en 1 Crónicas 8:33 y 9:39.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַבְנֵר
  english_pob_choice: But Abner
  chosen_spanish: Pero Abner
  alternatives_spanish:
  - Y Abner
  - Ahora bien, Abner
  lexicon: HALOT
  rationale: El waw narrativo aquí contrasta con el versículo anterior; en español, «Pero» comunica mejor ese giro que «Y», manteniendo la relación discursiva señalada por la POB inglesa.
- source_word: בֶּן נֵר
  english_pob_choice: son of Ner
  chosen_spanish: hijo de Ner
  alternatives_spanish:
  - hijo de Nér
  lexicon: HALOT
  rationale: Construcción filial estándar; «hijo de Ner» es natural y fiel al hebreo. Se conserva «Ner» como nombre propio transliterado.
- source_word: שַׂר צָבָא אֲשֶׁר לְשָׁאוּל
  english_pob_choice: the commander of Saul’s army
  chosen_spanish: el comandante del ejército de Saúl
  alternatives_spanish:
  - el capitán del ejército de Saúl
  - el jefe militar de Saúl
  lexicon: HALOT
  rationale: שַׂר צָבָא designa un alto oficial militar; «comandante del ejército» expresa bien la función y mantiene la relación posesiva con Saúl sin volverla pesada en español.
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - llevó consigo
  lexicon: HALOT
  rationale: El verbo básico es «tomar». Aquí no exige un matiz más fuerte como «apoderarse de»; «tomó» reproduce con sobriedad la acción narrada.
- source_word: אֶת אִישׁ בֹּשֶׁת
  english_pob_choice: Ish-bosheth
  chosen_spanish: a Is-bóset
  alternatives_spanish:
  - a Is-boset
  - a Ish-bóset
  lexicon: HALOT
  rationale: Se conserva el nombre propio conforme al texto hebreo. En español se adapta la forma al uso transliterado con acentuación para lectura natural. La nota preserva la variante alternativa documentada en Crónicas.
- source_word: וַ/יַּעֲבִרֵ/הוּ
  english_pob_choice: brought him over
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo hizo pasar
  - lo condujo
  lexicon: HALOT
  rationale: El hifil de עבר indica hacer pasar o llevar al otro lado. Dado que el texto no especifica el medio ni el trayecto, «lo llevó» conserva la idea básica sin sobreinterpretar «cruzó».
- source_word: מַחֲנָיִם
  english_pob_choice: Mahanaim
  chosen_spanish: Mahanaim
  alternatives_spanish:
  - Mahanaim
  lexicon: HALOT
  rationale: Nombre de lugar transliterado de manera estándar.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés; no se introdujeron revisiones textuales ni cambios de sentido respecto de la POB inglesa, y se mantuvo la misma nota de variante onomástica en forma adaptada al español.
  spanish_consistency_notes:
  - Se mantiene el contraste narrativo inicial con «Pero», acorde con la lectura discursiva de la POB inglesa.
  - Se evita «SEÑOR» para YHWH porque no aparece en este versículo.
  - «Llevar» se eligió en lugar de «trasladar» o «hacer pasar» para no inferir explícitamente un cruce geográfico no expresado en el hebreo.
  - La nota al pie se ancla en el nombre del personaje y preserva la variante Eshbaal documentada por la POB inglesa.
