translation:
  language: es
  text: Porque en otro tiempo la llama fue[a] apaciguada, para que no consumiera a los seres vivos enviados contra los impíos; pero ellos mismos, al verla, pudieran saber que eran perseguidos por el juicio de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue domada', 'fue suavizada' o 'fue contenida' para ἡμεροῦτο; la idea es que la llama fue moderada, no extinguida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεροῦτο
  english_pob_choice: was subdued
  chosen_spanish: fue[a] apagada
  alternatives_spanish:
  - fue domada
  - fue sosegada
  - fue aplacada
  lexicon: LSJ
  rationale: ἡμεροῦτο expresa que la llama fue hecha mansa o contenida. En español, 'apagada' comunica una restricción fuerte pero no necesariamente extinción total cuando se lee en contexto; el matiz de contención queda reforzado por la finalidad del versículo. Se deja constancia de la alternativa interpretativa en nota.
- source_word: φλόξ
  english_pob_choice: flame
  chosen_spanish: llama
  alternatives_spanish:
  - fuego
  - resplandor
  - llama de fuego
  lexicon: LSJ
  rationale: φλόξ designa específicamente la llama. 'Llama' conserva mejor la imagen singular y concreta que 'fuego'.
- source_word: καταφλέξῃ
  english_pob_choice: burn up
  chosen_spanish: consumiera
  alternatives_spanish:
  - quemara
  - arrasara con fuego
  - devorara
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de quemar hasta destruir. 'Consumiera' reproduce ese valor destructivo de manera natural en español.
- source_word: τὰ ἐπʼ ἀσεβεῖς ἀπεσταλμένα ζῷα
  english_pob_choice: the creatures sent against the ungodly
  chosen_spanish: los seres vivos enviados contra los impíos
  alternatives_spanish:
  - los animales enviados contra los impíos
  - las criaturas enviadas contra los impíos
  - los seres vivientes enviados contra los impíos
  lexicon: LSJ
  rationale: ζῷα puede abarcar animales o seres vivos. 'Seres vivos' preserva la amplitud del término sin forzar una especie concreta. 'Enviados contra' refleja el valor hostil de ἐπʼ ἀσεβεῖς.
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los malvados
  - los impíos
  lexicon: LSJ
  rationale: En Wisdom, ἀσεβής es un término moral-religioso fuerte. 'Impíos' conserva mejor esa fuerza que 'malvados'.
- source_word: βλέποντες
  english_pob_choice: seeing it
  chosen_spanish: al verla
  alternatives_spanish:
  - viéndola
  - al observarla
  - al contemplarla
  lexicon: LSJ
  rationale: El participio es circunstancial. 'Al verla' resulta natural en español y retiene la referencia implícita a la llama.
- source_word: εἴδωσιν
  english_pob_choice: might know
  chosen_spanish: pudieran saber
  alternatives_spanish:
  - llegaran a saber
  - pudieran conocer
  - advirtieran
  lexicon: LSJ
  rationale: El verbo pasa de la percepción a la comprensión. 'Pudieran saber' mantiene ese resultado cognitivo sin sobreinterpretar.
- source_word: θεοῦ κρίσει
  english_pob_choice: by the judgment of God
  chosen_spanish: por el juicio de Dios
  alternatives_spanish:
  - por el juicio de Dios
  - por la sentencia de Dios
  - por el juicio divino
  lexicon: LSJ
  rationale: κρίσις aquí conserva su peso judicial. 'Juicio de Dios' es la forma más clara y fiel en español, manteniendo la dimensión forense-teológica.
- source_word: ἐλαύνονται
  english_pob_choice: were being pursued
  chosen_spanish: eran perseguidos
  alternatives_spanish:
  - eran impulsados
  - eran acosados
  - eran llevados
  lexicon: LSJ
  rationale: ἐλαύνω puede expresar impulso o persecución. 'Eran perseguidos' sigue la opción inglesa revisada ('pursued') y comunica la presión activa del juicio sobre ellos sin añadir detalles ajenos al texto.
theological_decisions:
- issue: Relación entre la llama y el juicio divino
  english_pob_reading: 'God judicially directs events: the flame is restrained while the ungodly are nevertheless pursued by God''s judgment.'
  chosen_spanish_reading: 'Dios dirige judicialmente los acontecimientos: la llama es contenida mientras los impíos, al verla, llegan a saber que son perseguidos por el juicio de Dios.'
  alternative_spanish_readings:
  - la providencia divina ordena las circunstancias sin énfasis judicial explícito
  - el juicio de Dios actúa solo como trasfondo general
  rationale: θεοῦ κρίσει es explícito y no debe diluirse en mera circunstancia. La traducción conserva el lenguaje judicial y la tensión del pasaje sin expandirlo hacia una doctrina más amplia de causalidad.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió 'subdued' y 'pursued' frente a soluciones más interpretativas. En español se optó por una equivalencia óptima que mantiene la contención de la llama y la presión activa del juicio divino, sin traducir mecánicamente ni neutralizar la carga judicial del pasaje.
  spanish_consistency_notes:
  - Se usó 'Dios' para θεοῦ y 'juicio de Dios' para θεοῦ κρίσει, manteniendo el valor forense del término.
  - Se prefirió 'impíos' para ἀσεβεῖς por ser el equivalente bíblico más natural y teológicamente cargado en español.
  - '''Seres vivos'' conserva la amplitud de ζῷα y evita especificar indebidamente ''animales'' si el contexto de la versión fuente admite un sentido más amplio.'
  - La nota a la llama marca la tensión entre 'apagada' y 'domada/sosegada', sin eliminar la posibilidad de una restricción sin extinción.
