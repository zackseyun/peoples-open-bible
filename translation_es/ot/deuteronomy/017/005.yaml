translation:
  language: es
  text: Entonces sacarás a las puertas de tu ciudad[a] a ese hombre o a esa mujer que hicieron esta cosa mala[b], a ese hombre o a esa mujer, y los apedrearás con piedras, y morirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Las puertas de tu ciudad» alude a las puertas de la ciudad, el lugar acostumbrado de juicio y de procedimientos legales en el antiguo Israel.
    reason: cultural_note
  - marker: b
    text: O «este asunto malo». El hebreo דָּבָר puede significar «cosa» o «asunto» en un contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתָ
  english_pob_choice: then you shall bring out
  chosen_spanish: Entonces sacarás
  alternatives_spanish:
  - y sacarás
  - luego sacarás
  lexicon: HALOT
  rationale: La forma consecutiva en un mandato legal se rinde bien con «Entonces» para conservar el valor secuencial y procesal del texto, sin volverlo pesado en español.
- source_word: הָאִישׁ ... הָאִשָּׁה
  english_pob_choice: that man or that woman
  chosen_spanish: ese hombre o esa mujer
  alternatives_spanish:
  - aquel hombre o aquella mujer
  - el hombre o la mujer
  lexicon: HALOT
  rationale: El hebreo usa artículo + demostrativo; «ese/esa» comunica la especificidad y mantiene la referencia deictica del original. Se conserva la distinción de sexo explícita del texto.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: who did
  chosen_spanish: que hayan hecho
  alternatives_spanish:
  - que hicieron
  - que hicieron haber
  lexicon: HALOT
  rationale: En español, dentro de una relativa dependiente de un antecedente indefinido, el subjuntivo compuesto suena natural y mantiene la idea de una acción ya cometida en el marco legal.
- source_word: הַדָּבָר הָרָע הַזֶּה
  english_pob_choice: this evil thing
  chosen_spanish: esta cosa mala
  alternatives_spanish:
  - este asunto malo
  - este mal asunto
  - esta mala cosa
  lexicon: HALOT
  rationale: «דבר» puede ser «cosa» o «asunto/materia». Aquí se preserva la concreción con «cosa», como en la lectura inglesa; «mala» reproduce el adjetivo sin intensificarlo a «malvada» o «maligna».
- source_word: אֶל שְׁעָרֶיךָ
  english_pob_choice: to your gates
  chosen_spanish: a tus puertas
  alternatives_spanish:
  - a tus puertas de la ciudad
  - a las puertas de tu ciudad
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de «puertas» y la referencia posesiva de segunda persona. En español, «puertas» comunica el lugar judicial sin requerir una expansión interpretativa en el cuerpo del versículo.
- source_word: וּסְקַלְתָּם בָּאֲבָנִים
  english_pob_choice: and you shall stone them with stones
  chosen_spanish: y los apedrearás con piedras
  alternatives_spanish:
  - y los lapidarás con piedras
  - y los apedrearás
  lexicon: HALOT
  rationale: «Apedrear» es el verbo natural en español bíblico para el castigo con piedras. Se conserva «con piedras» para no suavizar la formulación concreta del hebreo, tal como hace la traducción inglesa.
- source_word: וָמֵתוּ
  english_pob_choice: and they shall die
  chosen_spanish: y morirán
  alternatives_spanish:
  - y morirán así
  - y así morirán
  lexicon: HALOT
  rationale: La cláusula final expresa el resultado de la ejecución; «morirán» es una equivalencia directa, sobria y jurídicamente adecuada en español.
theological_decisions:
- issue: Formulación judicial con género explícito
  english_pob_reading: that man or that woman
  chosen_spanish_reading: ese hombre o esa mujer
  alternative_spanish_readings:
  - esa persona
  - el culpable o la culpable
  rationale: El hebreo nombra expresamente varón y mujer. Se evita neutralizar a «persona» para conservar la precisión sexoespecífica del texto legal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Lugar de juicio en las puertas
  english_pob_reading: to your gates
  chosen_spanish_reading: a tus puertas
  alternative_spanish_readings:
  - a las puertas de tu ciudad
  - al lugar de juicio
  rationale: Se conserva la concreción del término hebreo y su función judicial. La explicación cultural queda implícita en el lenguaje y no se sustituye el término por una paráfrasis interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Tipo de maldad descrita
  english_pob_reading: this evil thing
  chosen_spanish_reading: esta cosa mala
  alternative_spanish_readings:
  - este asunto malo
  - este hecho malo
  rationale: El texto hebreo habla de un «dābār» calificado como malo; no se eleva el término a una carga moral distinta de la del original. La redacción española preserva la tensión entre «cosa» y «asunto/materia».
  doctrine_reference: DOCTRINE.md lexical nuance on דָּבָר
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el trazado auditado en inglés. Se mantiene la estructura condicional/procesal del mandato, el paralelismo «hombre o mujer», la referencia concreta a las puertas y la pena de apedreamiento. La única adaptación principal es idiomática: «los apedrearás con piedras» y el subjuntivo en «que hayan hecho», para sonar natural en español sin perder la literalidad de base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no aparece ningún nombre divino.
  - Se conserva «cosa mala» para reflejar el campo semántico de דָּבָר sin forzar una interpretación más abstracta.
  - «Puertas» se mantiene en plural como en el hebreo, aunque el sentido sea colectivo/judicial.
  - El verbo «apedrear» se elige por su registro bíblico y claridad contemporánea, sin reemplazar el acto legal concreto.
