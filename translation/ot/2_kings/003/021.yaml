id: 2KI.3.21
reference: 2 Kings 3:21
source:
  edition: WLC
  text: וְ/כָל מוֹאָב֙ שָֽׁמְע֔וּ כִּֽי עָל֥וּ הַ/מְּלָכִ֖ים לְ/הִלָּ֣חֶם בָּ֑/ם וַ/יִּצָּעֲק֗וּ מִ/כֹּ֨ל חֹגֵ֤ר חֲגֹרָה֙ וָ/מַ֔עְלָ/ה וַ/יַּעַמְד֖וּ עַֽל הַ/גְּבֽוּל־־־׃
translation:
  text: Now all Moab heard that the kings had come up to fight against them[a], and they were summoned together, from every man old enough to put on a belt and upward[b], and they stood at the border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from every one girding a belt and upward,' an idiom for those of military age and older.
    reason: cultural_note
  - marker: b
    text: Or 'they were called together' / 'they were mustered.' The Hebrew verb here likely refers to mobilization rather than simply crying out.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל מוֹאָב
  chosen: Now all Moab
  alternatives:
  - And all Moab
  - all the Moabites
  lexicon: HALOT
  rationale: The collective proper name מוֹאָב can denote the nation/people as a whole. 'All Moab' preserves the Hebrew collective expression more closely than 'all the Moabites,' while 'Now' renders the narrative waw idiomatically in English.
- source_word: שָׁמְעוּ
  chosen: heard
  alternatives:
  - found out
  - learned
  lexicon: HALOT
  rationale: The verb שמע in the qal commonly means 'hear' and by extension 'hear/report.' 'Heard' is the most direct rendering and fits the report context.
- source_word: כִּי עָלוּ הַמְּלָכִים
  chosen: that the kings had come up
  alternatives:
  - that the kings had gone up
  - that the kings had advanced
  lexicon: HALOT
  rationale: עלה literally means 'go up/come up.' In military movement it can indicate marching up against a target. 'Had come up' is natural in English narrative and preserves the directional nuance without overinterpreting.
- source_word: לְהִלָּחֶם בָּם
  chosen: to fight against them
  alternatives:
  - to wage war against them
  - to battle them
  lexicon: HALOT
  rationale: The niphal/infinitive of לחם with ב conveys engaging in battle against someone. 'Fight against them' is clear and sufficiently formal.
- source_word: וַיִּצָּעֲקוּ
  chosen: they were summoned together
  alternatives:
  - they cried out
  - they were called together
  - they were mustered
  lexicon: HALOT
  rationale: In this context the verb cannot mean merely 'cried out'; it refers to a mobilization in response to invasion. The passive-like sense 'were summoned together' best fits the following phrase describing who was gathered. 'Mustered' is possible but slightly more interpretive/military than the Hebrew itself.
- source_word: מִכֹּל חֹגֵר חֲגֹרָה וָמַעְלָה
  chosen: from every man old enough to put on a belt and upward
  alternatives:
  - from everyone who girded on a belt and upward
  - from every belt-girding man and upward
  - from every man able to bear arms and upward
  lexicon: HALOT
  rationale: Literally, 'from every girding of a belt and upward.' The idiom marks those of fighting age and older. 'Old enough to put on a belt' preserves the concrete image while making the age-threshold sense intelligible. 'Able to bear arms' captures the implication but loses the Hebrew imagery.
- source_word: וַיַּעַמְדוּ עַל הַגְּבוּל
  chosen: and they stood at the border
  alternatives:
  - and they took their stand on the border
  - and they stationed themselves at the boundary
  lexicon: HALOT
  rationale: עמד על with הגבול describes taking position at the frontier/border. 'Stood at the border' is straightforward; the military nuance is clear from context without needing a more expanded rendering.
