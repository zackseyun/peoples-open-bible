translation:
  language: es
  text: Y para la reconstrucción y la renovación de las obras del santuario[a], el gasto se dará por orden del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las cosas santas»; el griego puede referirse a las cosas o a los lugares sagrados del templo.
    reason: lexical_alternative
  - marker: b
    text: O «de la palabra del rey». La expresión griega también puede entenderse administrativamente como «desde la cuenta del rey», pero aquí se ha tomado con el sentido de orden o mandato real.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομηθῆναι
  english_pob_choice: the rebuilding
  chosen_spanish: la reconstrucción
  alternatives_spanish:
  - la edificación
  - el construir
  lexicon: LSJ
  rationale: El infinitivo articular funciona como sustantivo y se refiere al acto/proyecto de edificar. En español, «reconstrucción» conserva bien la idea de obra de restauración en un contexto de templo y evita una formulación demasiado literal o torpe.
- source_word: ἐπικαινισθῆναι
  english_pob_choice: the renovation
  chosen_spanish: la renovación
  alternatives_spanish:
  - la restauración
  - la reedificación
  lexicon: LSJ
  rationale: El verbo expresa hacer nuevo de nuevo o renovar. «Renovación» reproduce esa fuerza mejor que una opción ceremonial como «dedicación» y se ajusta al paralelo con la reconstrucción.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las estructuras
  - las labores
  lexicon: LSJ
  rationale: «Obras» es la correspondencia natural y amplia del plural griego, y preserva la referencia a los trabajos de construcción/restauración sin especificar más de lo que el texto dice.
- source_word: τῶν ἁγίων
  english_pob_choice: of the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - de las cosas santas
  - de los lugares santos
  lexicon: LSJ
  rationale: En este contexto del templo, el genitivo plural puede referirse al recinto sagrado. «Santuario» hace explícita la referencia cultual y evita una traducción demasiado abstracta como «cosas santas».
- source_word: ἡ δαπάνη
  english_pob_choice: the expense
  chosen_spanish: el gasto
  alternatives_spanish:
  - el costo
  - la erogación
  lexicon: LSJ
  rationale: Se trata del desembolso económico para la obra. «Gasto» es claro, moderno y conserva el sentido financiero del sustantivo griego.
- source_word: δοθήσεται
  english_pob_choice: will be given
  chosen_spanish: será dado
  alternatives_spanish:
  - será provisto
  - será pagado
  lexicon: LSJ
  rationale: La pasiva futura se conserva de manera directa. «Será dado» mantiene la estructura del griego; en español suena algo más formal, pero sigue siendo natural en un registro bíblico.
- source_word: ἐκ τοῦ λόγου τοῦ βασιλέως
  english_pob_choice: by order of the king
  chosen_spanish: por orden del rey
  alternatives_spanish:
  - de la orden del rey
  - según el mandato del rey
  - desde la cuenta del rey
  lexicon: LSJ
  rationale: λόγος en contextos administrativos puede significar orden, disposición o cuenta. La revisión inglesa optó por «by order of the king»; en español, «por orden del rey» refleja bien esa lectura administrativa y evita introducir una imagen contable no explícita en la revisión final.
theological_decisions:
- issue: Referencia de τὰ ἔργα τῶν ἁγίων en contexto del templo
  english_pob_reading: “the works of the sanctuary” referring here to the sacred temple complex.
  chosen_spanish_reading: «las obras del santuario»
  alternative_spanish_readings:
  - «las obras de las cosas santas»
  - «las obras de los lugares santos»
  rationale: No hay una afirmación doctrinal especial, pero sí una decisión interpretativa sobre el alcance cultual de la expresión. «Santuario» comunica de forma clara y fiel el referente del templo sin perder el matiz sagrado.
  doctrine_reference: Temple/sanctuary terminology in the Deuterocanonical historical narrative
translation_notes:
  revision_awareness: Seguí la revisión más reciente del inglés POB, que pasó de una lectura contable («from the king’s account») a una administrativa/de mandato («by order of the king»). Por eso el español evita una fórmula de tesorería y adopta «por orden del rey», manteniendo el sentido del suministro de fondos y la dependencia de la autoridad real.
  spanish_consistency_notes:
  - Usé «Yahvé» solo donde correspondería el nombre divino; aquí no aparece.
  - Mantuve «santuario» como término cultual claro para τὰ ἔργα τῶν ἁγίων, coherente con el contexto del templo.
  - Elegí un registro bíblico moderno pero digno, evitando calcos innecesarios.
  - Conservé la pasiva futura «será dado» para respetar la estructura del griego.
