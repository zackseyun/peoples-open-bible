translation:
  language: es
  text: 'Entonces concibió de nuevo y dio a luz un hijo, y dijo: «Porque Yahvé ha escuchado que yo soy odiada[a], me ha dado también a este». Por eso lo llamó[b] Simeón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «que yo soy no amada» o «que soy menos amada». El hebreo dice literalmente «odiada», pero en contexto puede indicar rechazo o menor amor.'
    reason: lexical_alternative
  - marker: b
    text: «Simeón» suena parecido al hebreo para «ha escuchado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר עוֹד
  english_pob_choice: Then she conceived again
  chosen_spanish: Entonces concibió de nuevo
  alternatives_spanish:
  - Y concibió otra vez
  - Entonces quedó encinta de nuevo
  lexicon: HALOT
  rationale: וַ- avanza la narración y עוֹד marca repetición. «Concibió de nuevo» comunica el mismo valor aspectual con un español natural y sobrio.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y parió un hijo
  - y alumbró un hijo
  lexicon: HALOT
  rationale: «Dar a luz» es el equivalente español claro y digno para ילד en un relato de nacimiento. «Hijo» conserva el sustantivo explícito del hebreo.
- source_word: כִּי שָׁמַע יְהוָה
  english_pob_choice: Because Yahweh has heard
  chosen_spanish: Porque Yahvé ha escuchado
  alternatives_spanish:
  - Porque Yahvé oyó
  - Pues Yahvé ha escuchado
  lexicon: HALOT
  rationale: כִּי aquí introduce la explicación de Lea, por eso «porque». יְהוָה se mantiene como «Yahvé» según el criterio del proyecto. «Ha escuchado» preserva el sentido básico de שָׁמַע con un perfecto español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traslada con el nombre propio «Yahvé», no con una sustitución por título. Esto conserva la referencia al nombre divino revelado en el texto fuente.
- source_word: כִּי שְׂנוּאָה אָנֹכִי
  english_pob_choice: that I am hated
  chosen_spanish: que yo soy odiada
  alternatives_spanish:
  - que no soy amada
  - que soy menos amada
  lexicon: HALOT
  rationale: La forma hebrea expresa literalmente «odiada»; en el texto principal se conserva esa fuerza lexical sin suavizarla. Aunque el contexto puede sugerir rechazo o menor amor, el POB inglés decidió no diluir la tensión, y el español sigue esa decisión.
- source_word: וַיִּתֶּן לִי גַּם אֶת זֶה
  english_pob_choice: he has given me this one also
  chosen_spanish: me ha dado también a este
  alternatives_spanish:
  - me ha dado este también
  - también me ha dado a este
  lexicon: HALOT
  rationale: La construcción נתן + ל expresa «dar a» en español. «A este» mantiene el deíctico y el matiz de una persona recién nacida sin añadir información no explícita.
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: So she called his name
  chosen_spanish: Así llamó su nombre
  alternatives_spanish:
  - Y llamó su nombre
  - Entonces llamó su nombre
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal hebrea «llamar su nombre», que es más cercana al texto que «nombró», pero sigue siendo inteligible en español.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: HALOT
  rationale: Se usa la forma castellana establecida «Simeón», que refleja el nombre propio bíblico tradicional y mantiene la asociación sonora con שָׁמַע («ha escuchado»).
theological_decisions:
- issue: 'Cómo expresar el estado de Lea: שְׂנוּאָה אָנֹכִי'
  english_pob_reading: I am hated
  chosen_spanish_reading: yo soy odiada
  alternative_spanish_readings:
  - no soy amada
  - soy menos amada
  rationale: La redacción principal mantiene el peso semántico fuerte del hebreo y no lo atenúa interpretativamente. En contexto puede aludir a rechazo o a menor amor, pero el texto fuente usa el término directo, y la traducción conserva esa tensión narrativa.
  doctrine_reference: Translation philosophy §3, §5
- issue: Cómo tratar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo nombra explícitamente a YHWH. El proyecto exige no enmascararlo con un título. «Yahvé» es la forma española adoptada para conservar el nombre propio divino en el texto principal.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pass más reciente; el acuerdo de revisión fue alto y el texto quedó sin cambios sustantivos. La presente propuesta sigue ese estado estable y conserva las decisiones auditadas del inglés POB.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con el estándar del proyecto.
  - «Odidada» se conserva en el cuerpo del texto para no suavizar la fuerza lexical del hebreo; la nota ofrece la alternativa contextual sin reemplazar el original.
  - El nombre propio se presenta como «Simeón», forma bíblica usual en español y coherente con la etimología señalada por el juego de sonido con שָׁמַע.
  - La fórmula narrativa «Así llamó su nombre» mantiene la estructura hebrea sin caer en un calco difícil de entender.
