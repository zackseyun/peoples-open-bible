revisions:
- from: Pero si es demasiado pobre para tu valuación[a], entonces será presentado delante del sacerdote, y el sacerdote lo evaluará[b]; el sacerdote lo evaluará conforme a lo que alcance la mano del que hace el voto.
  to: Pero si es demasiado pobre para tu tasación[a], entonces será presentado ante el sacerdote, y el sacerdote lo tasará[b]; el sacerdote lo tasará según lo que pueda pagar el que hace el voto.
  rationale: Se reemplazó 'valuación' por 'tasación' para mayor naturalidad y precisión técnica en el contexto legal de Levítico 27. También se naturalizó el modismo hebreo de capacidad económica en el texto principal ('lo que pueda pagar'), preservando la literalidad en la nota, en línea con el audit trail inglés. Se mantuvo la estructura jurídica del versículo y la coherencia verbal con 'tasará'.
