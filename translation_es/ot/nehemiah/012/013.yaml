lexical_decisions:
- source_word: לְ/עֶזְרָא
  english_pob_choice: for Ezra
  chosen_spanish: para Ezra
  alternatives_spanish:
  - de Ezra
  - a Ezra
  lexicon: HALOT
  rationale: El ל prefijado en esta lista sacerdotal indica pertenencia o representación dentro del orden de nombres. En español, "para" comunica bien la correspondencia representativa que el audit trail inglés preserva con "for"; "de" suena más posesivo, y "a" menos natural en este contexto enumerativo.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Meshullam
  lexicon: HALOT
  rationale: Nombre propio; se translitera para mantener la forma hebrea y la continuidad con la lista genealógica/sacerdotal.
- source_word: לַ/אֲמַרְיָה
  english_pob_choice: for Amariah
  chosen_spanish: para Amariah
  alternatives_spanish:
  - de Amariah
  - a Amariah
  lexicon: HALOT
  rationale: Como en la primera cláusula, el prefijo ל señala la casa o representante correspondiente. "Para" conserva la relación funcional de correspondencia sin forzar una posesión que el hebreo no exige.
- source_word: יְהוֹחָנָן
  english_pob_choice: Jehohanan
  chosen_spanish: Jehohanan
  alternatives_spanish:
  - Johanan
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma más plena "Jehohanan" para reflejar con transparencia la base hebrea יְהוֹ-, en vez de simplificarla a "Johanan".
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el control de revisión más reciente: no se detectaron cambios necesarios; se mantuvo el valor auditado de la relación representativa del prefijo ל y la transliteración plena de los nombres propios.'
  spanish_consistency_notes:
  - Se mantuvo "para" para reproducir la función relacional del hebreo en una lista de casas sacerdotales.
  - Se conservaron nombres propios transliterados sin adaptar a formas eclesiásticas tradicionales.
  - La puntuación reproduce la brevedad enumerativa del original y del texto auditado en inglés.
