translation:
  language: es
  text: Y haré pasar a tus enemigos a una tierra que no has conocido[a], porque se ha encendido un fuego en mi ira; arderá contra ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo algunas versiones antiguas y el paralelo de Jeremías 17:4: «Y haré que sirvas a tus enemigos en una tierra que no has conocido». El texto consonántico hebreo dice «tus enemigos», pero podría subyacer otra vocalización o una Vorlage distinta.'
    reason: textual_variant
lexical_decisions:
- source_word: וְהַעֲבַרְתִּי
  english_pob_choice: I will make ... pass into
  chosen_spanish: haré pasar
  alternatives_spanish:
  - haré que pasen
  - los llevaré
  - haré cruzar
  lexicon: HALOT
  rationale: El verbo hifil de עבר expresa causación de movimiento. En español, «haré pasar» conserva esa fuerza causal sin añadir contenido ajeno ni sonar forzado.
- source_word: אֶת אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - a tus adversarios
  - a tus hostiles
  lexicon: HALOT
  rationale: El objeto directo plural con sufijo de 2ms se traduce de forma directa como «tus enemigos», manteniendo la referencia y la tensión de persona del hebreo.
- source_word: בְּאֶרֶץ לֹא יָדָעְתָּ
  english_pob_choice: into a land you have not known
  chosen_spanish: a una tierra que no has conocido
  alternatives_spanish:
  - en una tierra que no conoces
  - a una tierra desconocida para ti
  lexicon: HALOT
  rationale: Con un verbo de traslado, el ב puede tener sentido direccional; por eso «a una tierra» comunica mejor el movimiento que «en una tierra». «No has conocido» preserva el valor experiencial del perfecto hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del juicio; «porque» es natural en español y conserva la relación explicativa.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - una llama
  - un incendio
  lexicon: HALOT
  rationale: Se conserva la imagen literal. «Un fuego» es claro en español y no diluye el simbolismo profético.
- source_word: קָדְחָה
  english_pob_choice: has been kindled
  chosen_spanish: se ha encendido
  alternatives_spanish:
  - ha sido encendido
  - ha prendido
  - se ha inflamado
  lexicon: HALOT
  rationale: El verbo comunica la iniciación del fuego. «Se ha encendido» expresa bien el aspecto perfecto y evita una pasiva menos natural en español.
- source_word: בְאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - en mi furor
  - por mi ira
  lexicon: HALOT
  rationale: אַף es un hebraísmo para «ira/enojo». «Ira» mantiene el registro profético y la fuerza solemne del original.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - encima de ustedes
  lexicon: HALOT
  rationale: Con un fuego de juicio, la preposición se expresa naturalmente como «contra». Se usa «ustedes» para reflejar el plural hebreo y la dirección del ataque.
- source_word: תּוּקָד
  english_pob_choice: it will burn
  chosen_spanish: arderá
  alternatives_spanish:
  - será encendido
  - seguirá ardiendo
  - se encenderá
  lexicon: HALOT
  rationale: El verbo denota quemarse/arder. «Arderá» es la forma más natural en español para el efecto continuo del fuego ya encendido.
theological_decisions:
- issue: Variación de número y destinatario en el versículo
  english_pob_reading: 'Retain the singular and plural as represented in English idiom: singular possessive in the first clause, generic ''you'' in the final clause'
  chosen_spanish_reading: Conservar el singular posesivo en «tus enemigos» y el plural en «contra ustedes»
  alternative_spanish_readings:
  - Regularizar todo en singular
  - Regularizar todo en plural
  rationale: El hebreo conserva una oscilación entre el destinatario singular y el colectivo. La traducción no armoniza artificialmente esa tensión, sino que la deja visible en español.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail en inglés: «pass into» en lugar de «pass through into», manteniendo la dirección del movimiento sin sobrecargar la frase. También conserva la tensión textual entre singular y plural en los destinatarios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el nombre divino.
  - «Ira» se mantiene como término profético estable para בְאַפִּי, sin suavizarlo a un matiz meramente emocional.
  - «Arderá» traduce el efecto del fuego sin introducir una pasiva innecesaria.
  - La nota textual se ancla en el primer miembro del versículo para reflejar la variante documentada en el audit trail inglés.
