  - severity: low
    issue: Matiz habitual de תָּבֹאנָה
    rationale: '''Llegaban'' es aceptable, pero ''solían llegar'' deja más explícito el carácter iterativo/habitual del imperfecto hebreo, en línea con el inglés ''would come''.'
