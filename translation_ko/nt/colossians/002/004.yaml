  - 나는 이것을 말합니다
  - 내가 이렇게 말함은
  lexicon: BDAG
  rationale: 한국어에서 「내가 이 말을 하는 것은 ~ 위함입니다」 구조가 자연스럽다.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: ~ 못하게 하려는 것입니다
