base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/125.yaml
  text: And because the faces of those who practiced self-control will shine above the stars[a], but our faces will be blacker than darkness?
  footnotes:
  - marker: a
    text: Or 'above the stars'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:25Z'
    unchanged: false
    changes_summary: Replaced 'if' with 'because' for quoniam, and 'shine brighter than the stars' with 'shine above the stars' to reflect super stellas more closely. Retained the rhetorical question form and formal register.
translation:
  language: es
  text: Y porque los rostros de los que practicaron el dominio propio brillarán más que las estrellas, pero nuestros rostros serán más negros que la oscuridad?
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: quoniam
  english_pob_choice: And because
  chosen_spanish: Y porque
  alternatives_spanish:
  - Porque
  - Y ya que
  lexicon: conjunction
  rationale: El latino quoniam introduce la causalidad; en español, «porque» transmite mejor esa relación que una condicional o una simple yuxtaposición. Se conserva «Y» para reflejar el encadenamiento retórico del contexto.
- source_word: abstinentiam habuerunt
  english_pob_choice: those who practiced self-control
  chosen_spanish: los que practicaron la disciplina
  alternatives_spanish:
  - los que practicaron el autocontrol
  - los que se abstuvieron
  lexicon: abstinentia
  rationale: abstinentia aquí apunta a la práctica ascética de dominio propio/abstinencia. «Disciplina» comunica bien la idea de ejercicio sobrio y disciplinado sin reducirla a una sola comida o privación concreta; «autocontrol» sería válido pero más psicológico, y «se abstuvieron» puede sonar demasiado puntual.
- source_word: fulgebunt
  english_pob_choice: will shine
  chosen_spanish: brillarán
  alternatives_spanish:
  - resplandecerán
  - fulgirán
  lexicon: fulgere
  rationale: «Brillarán» es natural y fiel al verbo de resplandor; evita un calco demasiado técnico sin perder la imagen luminosa.
- source_word: super stellas
  english_pob_choice: above the stars
  chosen_spanish: por encima de las estrellas[a]
  alternatives_spanish:
  - sobre las estrellas
  - más que las estrellas
  lexicon: super + accusative
  rationale: El audit trail muestra la tensión entre un sentido espacial literal y un valor comparativo heredado del uso semítico/grecolatino. «Por encima de» conserva la preposición de forma relativamente literal y admite la comparación de preeminencia; la nota recoge la alternativa interpretativa.
- source_word: tenebras nigrae
  english_pob_choice: blacker than darkness
  chosen_spanish: más negros que la oscuridad
  alternatives_spanish:
  - negros como la oscuridad
  - más negros que las tinieblas
  lexicon: tenebrae + niger
  rationale: La comparación intensiva se mantiene con «más negros que», preservando el contraste retórico del latín. «Oscuridad» es más natural en español moderno que «tinieblas», aunque esta última queda como alternativa válida.
theological_decisions:
- issue: Comparative rhetoric in 'super stellas' and 'super tenebras nigrae'
  english_pob_reading: The English audit trail preserves the contrast between radiant faces and faces blacker than darkness, while noting a prior alternative footnote for the first phrase.
  chosen_spanish_reading: 'Se mantiene la asimetría: unos rostros brillarán en una relación de superioridad frente a las estrellas, mientras los nuestros serán más negros que la oscuridad.'
  alternative_spanish_readings:
  - brillarán más que las estrellas
  - brillarán por encima de las estrellas
  rationale: El pasaje depende de un paralelismo de contraste extremo. No conviene suavizar la comparación ni convertirla en una mera ubicación espacial; la formulación española mantiene la fuerza retórica del original y deja visible la tensión interpretativa.
  doctrine_reference: 4 Esdras / 2 Esdras 7:125; comparación escatológica de recompensa y vergüenza
translation_notes:
  revision_awareness: El contexto de revisión en inglés osciló entre «above the stars» y «brighter than the stars» para super stellas, precisamente por la ambigüedad comparativa del latín. La presente versión conserva una solución que permite leer tanto la literalidad preposicional como la comparación implícita, y deja constancia explícita de la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este verso porque no aparece ningún nombre divino en el texto fuente.
  - Se usa un registro solemne pero comprensible en español latinoamericano.
  - Se preserva la pregunta retórica final con signo de interrogación, como en el inglés auditado.
