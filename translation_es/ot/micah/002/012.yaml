translation:
  language: es
  text: Ciertamente reuniré a todo Jacob; ciertamente congregaré al remanente de Israel. Juntos los pondré como las ovejas de Bosra[a], como un rebaño en medio de su pastizal; harán bullicio con gente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como ovejas en un redil'. El hebreo בָּצְרָה se lee tradicionalmente como el nombre de lugar 'Bosra', pero algunos lo entienden como una palabra relacionada con un recinto o redil.
    reason: lexical_alternative
  - marker: b
    text: O 'harán bullicio por causa de la gente' / 'se agolparán con gente'. La expresión hebrea es difícil.
    reason: alternative_reading
lexical_decisions:
- source_word: אָסֹף אֶאֱסֹף
  english_pob_choice: I will surely gather
  chosen_spanish: ciertamente reuniré
  alternatives_spanish:
  - sin duda reuniré
  - ciertamente juntaré
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la acción; 'ciertamente' conserva ese énfasis sin sonar forzado en español. 'Reuniré' comunica la idea de juntar a un pueblo disperso.
- source_word: יַעֲקֹב כֻּלָּךְ
  english_pob_choice: all of you, Jacob
  chosen_spanish: a todo ti, Jacob
  alternatives_spanish:
  - a todos ustedes, Jacob
  - a Jacob, a todos ustedes
  lexicon: HALOT
  rationale: La forma es una dirección singular con sentido colectivo. En español, 'todo ti' no es idiomático; se resuelve como una apelación directa a Jacob entendido corporativamente. La nota en inglés preserva la tensión entre singular gramatical y plural colectivo.
- source_word: קַבֵּץ אֲקַבֵּץ
  english_pob_choice: I will surely assemble
  chosen_spanish: ciertamente congregaré
  alternatives_spanish:
  - ciertamente reuniré
  - ciertamente asentaré
  lexicon: HALOT
  rationale: El segundo par de intensificación paralela se rinde con otro verbo de reunión. 'Congregaré' mantiene un matiz más solemne y eclesial, pero aquí se usa como equivalente formal de 'assemble' sin perder el sentido de reunir dispersos.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  english_pob_choice: the remnant of Israel
  chosen_spanish: el remanente de Israel
  alternatives_spanish:
  - el resto de Israel
  - los sobrevivientes de Israel
  lexicon: HALOT
  rationale: '''Remanente'' es el equivalente establecido para el sentido profético de los que quedan y serán restaurados. Conserva el peso teológico del término mejor que un mero ''resto''.'
- source_word: יַחַד
  english_pob_choice: Together
  chosen_spanish: Juntos
  alternatives_spanish:
  - Juntamente
  - En conjunto
  lexicon: HALOT
  rationale: Adverbio natural en español para expresar la acción conjunta de la reunificación.
- source_word: אֲשִׂימֶנּוּ
  english_pob_choice: I will set them
  chosen_spanish: los pondré
  alternatives_spanish:
  - los colocaré
  - los situaré
  lexicon: HALOT
  rationale: '''Poner'' es una forma natural y directa de traducir el verbo de colocación aquí. El plural español refleja el referente colectivo del remanente, aunque la forma hebrea esté morfológicamente singular con sufijo.'
- source_word: כְּצֹאן בָּצְרָה
  english_pob_choice: like the sheep of Bozrah
  chosen_spanish: como las ovejas de Bosra
  alternatives_spanish:
  - como ovejas en un redil
  - como el rebaño de Bosra
  lexicon: HALOT
  rationale: Se conserva el topónimo Bosra/Bosra[he] (normalizado como 'Bosra' en español) en el texto principal, siguiendo la preferencia de primacía del original. La lectura alternativa de 'redil/ovejas en un cierre' se mantiene implícita en la justificación textual, porque el audit trail inglés ya documenta la ambigüedad.
- source_word: כְּעֵדֶר בְּתוֹךְ הַדָּבְרוֹ
  english_pob_choice: like a flock in the midst of its pasture
  chosen_spanish: como un rebaño en medio de su pastizal
  alternatives_spanish:
  - como un rebaño en medio de su redil
  - como un hato en medio de su pasto
  lexicon: HALOT
  rationale: '''Pastizal'' refleja el sentido pastoral contextual que el audit trail inglés privilegia para דָּבָר. Evita el falso amigo ''palabra'' y mantiene la imagen de animales en su lugar de pastoreo.'
- source_word: תְּהִימֶנָה
  english_pob_choice: they will be noisy
  chosen_spanish: harán ruido
  alternatives_spanish:
  - estarán en bullicio
  - producirán alboroto
  lexicon: HALOT
  rationale: El verbo describe tumulto o conmoción sonora. 'Hacer ruido' en español es un equivalente claro para el efecto auditivo de una multitud o rebaño numeroso, aunque algo más llano que otras opciones.
- source_word: מֵאָדָם
  english_pob_choice: with people
  chosen_spanish: por causa de la gente
  alternatives_spanish:
  - con gente
  - a causa de la gente
  lexicon: HALOT
  rationale: El hebreo es difícil y puede expresar causa o acompañamiento. 'Por causa de la gente' toma el valor causal que el audit trail inglés adoptó en la revisión final ('because of people') y suena natural en español.
theological_decisions:
- issue: Alcance restaurador de Jacob/Israel
  english_pob_reading: The verse is rendered as a divine promise of regathering the whole of Jacob and the remnant of Israel without narrowing the referent beyond the text.
  chosen_spanish_reading: El versículo se vierte como una promesa divina de reunir a todo Jacob y al remanente de Israel, sin restringir el referente más allá del texto.
  alternative_spanish_readings:
  - Una promesa solo espiritualizada de restauración interior
  - Una lectura exclusivamente escatológica desligada del pueblo histórico de Israel
  rationale: El hebreo nombra directamente a Jacob e Israel y usa lenguaje de reunión/restauración. La traducción conserva ese alcance pactual e histórico sin imponer un sistema teológico posterior.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Tratamiento del nombre divino ausente en este versículo
  english_pob_reading: No explicit divine name appears in the verse; the promise is spoken in first person.
  chosen_spanish_reading: No aparece el nombre divino explícito; la promesa se expresa en primera persona.
  alternative_spanish_readings:
  - Introducir 'Yahvé' como sujeto explícito
  - Suavizar la primera persona con una forma impersonal
  rationale: El texto hebreo presenta al hablante en primera persona sin יהוה explícito. No se debe añadir un sujeto divino en español que el versículo no da.
  doctrine_reference: 'Source fidelity; Translation philosophy #1'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una revisión menor: ''collect'' se cambió a ''assemble'' para el segundo verbo de reunión, y ''men'' a ''people'' para la cláusula final. La versión española refleja esa revisión con ''congregaré'' en el segundo verbo y ''gente'' en lugar de una forma marcada por sexo; además, conserva la tensión léxica de בָּצְרָה mediante la nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene 'remanente' como término profético establecido.
  - Se evita 'SEÑOR' porque en este versículo no aparece יהוה explícitamente.
  - '''Bosra'' se normaliza sin tilde en español; la nota conserva la alternativa de ''redil''.'
  - La cláusula final se traduce de modo dinámico pero controlado, por la dificultad reconocida del hebreo.
  - Se preserva la pluralidad de sentido colectivo en Jacob/Israel sin explicitarla de forma doctrinal.
