translation:
  language: es
  text: 'Ahora bien, estos son los jefes de sus casas paternas[a], y su genealogía, de los que subieron conmigo de Babilonia, en el reinado del rey Artajerjes:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su registro genealógico» o «los inscritos por genealogía». El término hebreo se refiere a un registro o inscripción genealógica, no solo a la ascendencia en abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estos son
  alternatives_spanish:
  - Y estos son
  - Estos son
  lexicon: HALOT
  rationale: La partícula conjuntiva con demostrativo abre una nueva lista o sección. «Ahora bien» conserva el valor discursivo introductorio sin sonar forzado en español.
- source_word: רָאשֵׁי
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - principales
  lexicon: HALOT
  rationale: En el sintagma de casas paternas, el hebreo designa representantes principales del grupo. «Jefes» comunica bien la función de liderazgo sin perder el valor administrativo del hebreo.
- source_word: אֲבֹתֵיהֶם
  english_pob_choice: their fathers’ houses
  chosen_spanish: sus casas paternas
  alternatives_spanish:
  - sus casas de los padres
  - sus familias paternas
  lexicon: HALOT
  rationale: La expresión refiere a la unidad familiar/clánica paterna. «Casas paternas» es una forma bíblica española clara y fiel al uso idiomático.
- source_word: וְהִתְיַחְשָׂם
  english_pob_choice: their genealogy
  chosen_spanish: su genealogía
  alternatives_spanish:
  - su registro genealógico
  - su inscripción genealógica
  - los inscritos por genealogía
  lexicon: HALOT
  rationale: El término señala una genealogía registrada o documentada, no solo ascendencia abstracta. «Genealogía» sigue de cerca la revisión inglesa más natural y mantiene la referencia al registro.
- source_word: הָעֹלִים
  english_pob_choice: those who went up
  chosen_spanish: de los que subieron
  alternatives_spanish:
  - de los que ascendieron
  - de los que iban subiendo
  lexicon: HALOT
  rationale: En este contexto, עלה es el verbo técnico de subir desde el exilio a Judá/Jerusalén. «Subieron» conserva esa carga idiomática en español.
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  lexicon: HALOT
  rationale: Correspondencia directa del sufijo de primera persona singular.
- source_word: בְּמַלְכוּת
  english_pob_choice: in the reign of
  chosen_spanish: en el reinado de
  alternatives_spanish:
  - durante el reino de
  - bajo el reinado de
  lexicon: HALOT
  rationale: La referencia marca el periodo del gobierno real. «En el reinado de» es el equivalente español idiomático más natural.
- source_word: אַרְתַּחְשַׁסְתְּא
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artajerxes
  lexicon: HALOT
  rationale: Se emplea la forma española usual del nombre propio, ampliamente reconocible en contexto bíblico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: En español, el título funciona naturalmente en aposición como «rey Artajerjes». Mantiene la referencia honorífica sin rigidez sintáctica.
- source_word: מִבָּבֶל
  english_pob_choice: from Babylon
  chosen_spanish: desde Babilonia
  alternatives_spanish:
  - de Babilonia
  lexicon: HALOT
  rationale: «Desde» reproduce mejor el movimiento de salida implícito en el regreso y conserva el matiz direccional del hebreo.
theological_decisions:
- issue: Valor de la expresión genealógica
  english_pob_reading: their genealogy / those enrolled by genealogy
  chosen_spanish_reading: su genealogía
  alternative_spanish_readings:
  - su registro genealógico
  - los inscritos por genealogía
  rationale: La frase hebrea puede aludir a una genealogía como registro. En español, «su genealogía» mantiene la ambigüedad legítima sin sobrecargar el verso; la nota explica que no se trata solo de ascendencia abstracta.
  doctrine_reference: Uso lexical y administrativo del texto, sin implicación doctrinal directa.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «their genealogical record» por «their genealogy» para hacer más natural la frase sin perder el sentido. La redacción española sigue esa misma decisión, escogiendo «su genealogía» y dejando explícita en nota la posibilidad de un registro genealógico.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo corresponde al nombre divino; aquí no aparece.
  - «Artajerjes» sigue la forma española estándar de nombres persas bíblicos.
  - Se mantiene el lenguaje genealógico con «casas paternas» y «genealogía» para conservar el marco administrativo del pasaje.
  - El orden general del verso sigue de cerca el hebreo y la versión inglesa auditada, con sintaxis española natural.
