translation:
  language: es
  text: ¿Por eso seguirá vaciando su red y continuamente masacrando naciones sin piedad[a][b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no perdonará». El verbo hebreo puede traducirse más literalmente como «perdonar», «ahorrar» o «tener compasión».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su red de arrastre». El sustantivo se refiere a un arte de pesca; aquí «red» se usa por naturalidad en español dentro de la metáfora ampliada del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַל כֵּן
  english_pob_choice: Will he therefore
  chosen_spanish: ¿Por eso…?
  alternatives_spanish:
  - ¿Entonces…?
  - ¿Acaso por eso…?
  lexicon: HALOT
  rationale: La combinación interrogativa + inferencial se expresa de forma natural con «¿Por eso…?», que conserva la pregunta retórica y la idea de consecuencia lógica del contexto anterior.
- source_word: יָרִיק
  english_pob_choice: keep emptying
  chosen_spanish: vaciará siempre
  alternatives_spanish:
  - seguirá vaciando
  - irá vaciando
  lexicon: HALOT
  rationale: El valor imperfectivo se expresa con una continuidad verbal en español. «Vaciará siempre» mantiene la imagen del vaciado repetido del arte de pesca sin sonar forzado.
- source_word: חֶרְמוֹ
  english_pob_choice: his net
  chosen_spanish: su red
  alternatives_spanish:
  - su red de pesca
  - su trasmallo
  lexicon: HALOT
  rationale: «Red» es la forma más natural en español dentro de la metáfora pesquera del contexto inmediato. No se especifica más que el hebreo ni se introduce un tecnicismo innecesario.
- source_word: וְתָמִיד
  english_pob_choice: and continually
  chosen_spanish: y seguirá
  alternatives_spanish:
  - y continuamente
  - y sin cesar
  lexicon: HALOT
  rationale: La continuidad adverbial se conserva con una construcción verbal progresiva natural en español. «Seguirá» expresa la idea de acción repetida y persistente.
- source_word: לַהֲרֹג
  english_pob_choice: slaughtering
  chosen_spanish: matando
  alternatives_spanish:
  - asesinando
  - dando muerte a
  lexicon: HALOT
  rationale: El infinitivo de finalidad indica matar de manera masiva y violenta. «Matando» conserva la fuerza verbal sin sobrecargar el español; el matiz de brutalidad queda sostenido por el contexto, no por un término más interpretativo.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: «Naciones» mantiene el sentido político-colectivo de gôyim en este marco profético y evita el sesgo religioso de «gentiles».
- source_word: לֹא יַחְמֹל
  english_pob_choice: without mercy
  chosen_spanish: sin piedad
  alternatives_spanish:
  - sin compasión
  - y no perdonará
  lexicon: HALOT
  rationale: El hebreo expresa no ahorrar ni mostrar compasión. «Sin piedad» es una equivalencia idiomática clara y fiel; evita suavizar el verbo hebreo y preserva la dureza del juicio.
translation_notes:
  revision_awareness: Se corrigió el anclaje de las notas para que ambos marcadores aparezcan exactamente en el texto español, y se conservó la lectura revisada de la POB inglesa («slaughtering») en una forma verbal española natural.
  spanish_consistency_notes:
  - Se mantuvo «naciones» para גּוֹיִם por coherencia con el valor colectivo-político del contexto.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el versículo.
  - Se conservó el tono retórico de la pregunta del hebreo con una construcción interrogativa inicial.
  - Las notas a y b están ancladas en palabras/frases del texto para cumplir la disciplina editorial.
