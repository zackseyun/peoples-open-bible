translation:
  language: es
  text: 'Cuando Saúl vio a David saliendo al encuentro del filisteo, dijo a Abner, el comandante del ejército: «¿Hijo de quién es este joven, Abner?». Y Abner respondió: «Tan cierto como que vives[a], oh rey, no lo sé»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Fórmula de juramento hebrea: literalmente, «Vive tu alma»; más idiomáticamente, «Tan cierto como que vives».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִ/רְא֨וֹת
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y cuando ... vio
  - Ahora cuando ... vio
  lexicon: HALOT
  rationale: La construcción con infinitivo expresa una acción temporal; en español, «Cuando Saúl vio» comunica la secuencia de forma natural y fiel sin cargarla de artificio.
- source_word: יֹצֵא
  english_pob_choice: going out
  chosen_spanish: saliendo
  alternatives_spanish:
  - saliendo hacia fuera
  - yendo
  - saliendo a salir
  lexicon: HALOT
  rationale: El participio presenta la acción en curso; «saliendo» conserva ese valor progresivo y resulta idiomático en español.
- source_word: לִ/קְרַ֣את
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrarse con
  - a enfrentar
  lexicon: HALOT
  rationale: «Al encuentro de» reproduce la idea de movimiento hacia la confrontación sin introducir una interpretación más fuerte que la del hebreo.
- source_word: הַ/פְּלִשְׁתִּ֔י
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  - el filisteo campeón
  lexicon: HALOT
  rationale: El hebreo sólo dice el etnónimo con artículo; no conviene añadir «campeón» u otro calificativo que no está en esta cláusula.
- source_word: שַׂ֣ר הַ/צָּבָ֔א
  english_pob_choice: the commander of the army
  chosen_spanish: el comandante del ejército
  alternatives_spanish:
  - el jefe del ejército
  - el capitán del ejército
  lexicon: HALOT
  rationale: «Comandante del ejército» expresa el cargo militar con claridad contemporánea y preserva el sentido oficial del título.
- source_word: בֶּן מִי זֶ֥ה הַ/נַּ֖עַר
  english_pob_choice: Whose son is this young man
  chosen_spanish: ¿Hijo de quién es este joven?
  alternatives_spanish:
  - ¿De quién es hijo este joven?
  - ¿Quién es el padre de este joven?
  lexicon: HALOT
  rationale: La pregunta hebrea es literalmente «hijo de quién es este joven»; en español, la inversión «¿Hijo de quién es este joven?» mantiene la forma semítica sin perder claridad.
- source_word: חֵֽי נַפְשְׁ/ךָ
  english_pob_choice: As your soul lives
  chosen_spanish: ¡Vive tu alma!
  alternatives_spanish:
  - ¡Por tu vida!
  - ¡Tan cierto como vive tu alma!
  lexicon: HALOT
  rationale: Se conserva la fórmula de juramento con su fuerza semítica. «Vive tu alma» refleja el hebreo con suficiente naturalidad; una opción más idiomática se deja como alternativa.
- source_word: אִם יָדָֽעְתִּי
  english_pob_choice: I do not know
  chosen_spanish: que no lo sé
  alternatives_spanish:
  - si lo supiera
  - no lo sé
  lexicon: HALOT
  rationale: En esta respuesta juramentada, la partícula condicional funciona de manera elíptica con valor negativo. «Que no lo sé» reproduce el sentido de la fórmula de juramento en un español breve y oral.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail inglés. Se preserva el título militar y la fórmula de juramento sin suavizarlos, y se evita añadir rasgos no presentes como «campeón».
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; no aplica el tratamiento del nombre divino.
  - Se mantiene «filisteo» como etnónimo singular con artículo, sin ampliar el referente.
  - La fórmula de juramento se conserva de manera semíticas; la breve negación final sigue la fuerza de אִם en contexto.
  - «Joven» traduce נַעַר con un registro neutral y adecuado al contexto militar.
