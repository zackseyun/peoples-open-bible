translation:
  language: es
  text: Todas las ciudades de los gersonitas, por sus familias, fueron trece ciudades[a], con sus ejidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y sus ejidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - La totalidad de
  - Todas
  lexicon: HALOT
  rationale: El cuantificador introduce el total de las ciudades asignadas; en español, 'Todos' conserva la idea de totalidad de forma natural y concisa.
- source_word: עָרֵי
  english_pob_choice: cities
  chosen_spanish: pueblos
  alternatives_spanish:
  - ciudades
  - aldeas
  lexicon: HALOT
  rationale: עִיר puede abarcar asentamiento urbano o poblado; en un contexto de reparto territorial, 'pueblos' suena más natural en español que 'ciudades' sin perder el valor de asentamiento. Se mantiene una nota por la alternativa más literal.
- source_word: הַגֵּרְשֻׁנִּי
  english_pob_choice: the Gershonites
  chosen_spanish: los gersonitas
  alternatives_spanish:
  - la familia gersonita
  - los descendientes de Gersón
  lexicon: HALOT
  rationale: El gentilicio colectivo con artículo funciona como nombre del clan descendiente de Gersón. 'Gersonitas' reproduce ese valor colectivo con un etnónimo natural en español.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their families
  chosen_spanish: por sus familias
  alternatives_spanish:
  - según sus familias
  - para sus familias
  lexicon: HALOT
  rationale: La lamed de distribución/clasificación expresa el desglose por unidades familiares; 'por sus familias' comunica ese reparto de manera directa y fiel.
- source_word: שְׁלֹשׁ עֶשְׂרֵה עִיר
  english_pob_choice: thirteen cities
  chosen_spanish: trece ciudades
  alternatives_spanish:
  - trece pueblos
  lexicon: HALOT
  rationale: La combinación numeral + sustantivo se invierte naturalmente en español. Aquí se conserva 'ciudades' porque el texto cuenta unidades del reparto levítico y esa correspondencia es la más transparente.
- source_word: וּמִגְרְשֵׁיהֶן
  english_pob_choice: with their pasturelands
  chosen_spanish: con sus ejidos
  alternatives_spanish:
  - y sus ejidos
  - con sus pastizales
  - con sus tierras de alrededor
  lexicon: HALOT
  rationale: מִגְרָשׁ en estos pasajes designa el terreno abierto vinculado a la ciudad, no simplemente 'pastura'. 'Ejidos' es un término español establecido para ese espacio comunal/periférico y preserva mejor la función territorial que 'pastizales'.
translation_notes:
  revision_awareness: La versión inglesa publicada dice 'cities' y 'pasturelands'; en español se optó por 'pueblos' y 'ejidos' para mantener naturalidad y precisión territorial, sin alterar el contenido del reparto levítico. Se conserva la alternativa más literal en la nota.
  spanish_consistency_notes:
  - Se usa 'gersonitas' para el clan de Gersón, coherente con un etnónimo colectivo.
  - '''Ejidos'' se emplea aquí en sentido territorial bíblico de terreno abierto asociado a una ciudad; no pretende introducir una lectura municipal moderna.'
  - Se evita 'SEÑOR' o sustituciones de nombre divino porque no aparecen en este versículo.
