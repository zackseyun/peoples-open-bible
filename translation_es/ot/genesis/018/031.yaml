translation:
  language: es
  text: 'Entonces dijo: «Mira ahora, me he atrevido[a] a hablar con mi Señor. Quizá se encuentren allí veinte». Y dijo: «No la destruiré por causa de los veinte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me he tomado la libertad de hablar con mi Señor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  english_pob_choice: See now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - Mira ahora bien
  - Por favor, mira
  lexicon: HALOT
  rationale: La combinación funciona como una llamada cortés de atención; «Mira ahora» conserva la inmediatez de הִנֵּה y el matiz suave de נָא sin sonar rígido en español.
- source_word: הוֹאַלְתִּי
  english_pob_choice: I have undertaken
  chosen_spanish: me he atrevido
  alternatives_spanish:
  - me he tomado la libertad
  - me he aventurado
  - he osado
  lexicon: HALOT
  rationale: El verbo expresa tomar la libertad o atreverse a hablar con deferencia. «Me he atrevido» comunica bien la humildad respetuosa de Abraham sin perder la tensión lexical del hebreo.
- source_word: לְדַבֵּר אֶל אֲדֹנָי
  english_pob_choice: to speak to my Lord
  chosen_spanish: hablar con mi Señor
  alternatives_spanish:
  - hablar a mi Señor
  - dirigirme a mi Señor
  - hablar con mi Señor
  lexicon: HALOT
  rationale: En español, «hablar con» suena natural para el acto de dirigirse a alguien. Se mantiene «mi Señor» para reflejar אֲדֹנָי como título reverente, no como simple «señor» humano.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: «Quizá» preserva la cautela respetuosa y la incertidumbre de Abraham con un registro sobrio y actual.
- source_word: יִמָּצְאוּן שָׁם עֶשְׂרִים
  english_pob_choice: twenty will be found there
  chosen_spanish: allí se encuentren veinte
  alternatives_spanish:
  - se hallen allí veinte
  - se encuentren allí veinte
  - habrá allí veinte
  lexicon: HALOT
  rationale: El niphal de מצא pide una pasiva/reflexiva natural en español. «Se encuentren» conserva la idea de ser hallados y el orden enfático del número sin forzar una pasiva artificial.
- source_word: לֹא אַשְׁחִית
  english_pob_choice: I will not destroy it
  chosen_spanish: No la destruiré
  alternatives_spanish:
  - No destruiré la ciudad
  - No la arruinaré
  lexicon: HALOT
  rationale: «Destruir» reproduce היטב el valor del verbo en este contexto. Se antepone «la» para recuperar el objeto implícito de la ciudad/región en discusión, como hace el inglés POB.
- source_word: בַּעֲבוּר
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - en atención a
  - por amor a
  lexicon: HALOT
  rationale: «Por causa de» expresa el motivo o fundamento de la no destrucción, manteniendo la lógica intercesora del pasaje sin introducir un tono excesivamente explicativo.
- source_word: הָעֶשְׂרִים
  english_pob_choice: the twenty
  chosen_spanish: los veinte
  alternatives_spanish:
  - los veinte hombres
  - aquellos veinte
  - veinte
  lexicon: HALOT
  rationale: Se conserva el artículo por la fuerza referencial del hebreo. «Los veinte» suena natural en español y mantiene la especificidad del grupo contada en la escena.
theological_decisions:
- issue: Tratamiento de אֲדֹנָי en la voz de Abraham
  english_pob_reading: my Lord
  chosen_spanish_reading: mi Señor
  alternative_spanish_readings:
  - mi señor
  - Señor mío
  rationale: Aquí el interlocutor es el visitante divino dentro del relato. Se conserva la mayúscula reverencial en «Señor» para reflejar el título, sin sustituirlo por Yahvé, que no aparece en este versículo.
  doctrine_reference: Distinción entre el nombre divino y los títulos de reverencia; uso contextual de κύριος/אֲדֹנָי como «Señor».
- issue: Objeto implícito de «No la destruiré»
  english_pob_reading: I will not destroy it
  chosen_spanish_reading: No la destruiré
  alternative_spanish_readings:
  - No destruiré aquello
  - No lo destruiré
  rationale: El contexto inmediato apunta a la ciudad o a la región en juicio. El pronombre femenino «la» es el ajuste más natural en español para recuperar ese referente sin explicitar más de lo que el texto exige.
  doctrine_reference: Coherencia referencial en traducción bíblica cuando el antecedente es implícito pero claro por el contexto narrativo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que prefirió «have undertaken» sobre «have ventured» para הוֹאַלְתִּי. En español, la versión adoptada busca conservar ese matiz de iniciativa respetuosa con un giro natural: «me he atrevido». También se respetó la revisión que estabilizó la frase inicial como una fórmula integrada de cortesía, de modo que «Mira ahora» refleja esa unidad sin calco innecesario.'
  spanish_consistency_notes:
  - Se mantiene «Señor» con mayúscula para אֲדֹנָי en contexto divino.
  - Se usa un registro moderno y reverente, evitando arcaísmos innecesarios.
  - La pasiva/reflexiva española «se encuentren» conserva mejor el hebreo niphal que una estructura más literal.
  - El pronombre «la» se deja como recuperación contextual del referente implícito, en línea con el sentido narrativo del pasaje.
