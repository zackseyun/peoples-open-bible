translation:
  language: es
  text: Maldición[a], mentira, asesinato, robo y adulterio se desatan; derramamiento de sangre sigue a derramamiento de sangre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maldición» también puede entenderse como violación de juramento o falso juramento en este contexto de litigio pactual.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo, literalmente: «sangres tocan sangres»; es un modismo que indica que los actos de derramamiento de sangre vienen uno tras otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָלֹה
  english_pob_choice: Cursing
  chosen_spanish: Maldición
  alternatives_spanish:
  - maldecir
  - juramento falso
  - quebrantamiento de juramento
  lexicon: HALOT
  rationale: En este contexto de lista de vicios, el término hebreo puede abarcar maldición o juramento profano/falso. «Maldición» es breve, natural y conserva la fuerza de una práctica verbal prohibida sin restringirla indebidamente a un solo matiz jurídico.
- source_word: כַחֵשׁ
  english_pob_choice: lying
  chosen_spanish: mentira
  alternatives_spanish:
  - mentir
  - falsedad
  - engaño
  lexicon: HALOT
  rationale: El verbo expresa falsear o mentir. «Mentira» mantiene el paralelismo nominal de la lista y suena natural en español dentro de una enumeración breve.
- source_word: רָצֹחַ
  english_pob_choice: murder
  chosen_spanish: asesinato
  alternatives_spanish:
  - homicidio
  - matar
  - asesinar
  lexicon: HALOT
  rationale: El hebreo designa matar de manera ilícita o violenta; «asesinato» preserva el peso moral de «murder» y funciona bien en la serie de sustantivos.
- source_word: גָנֹב
  english_pob_choice: theft
  chosen_spanish: robo
  alternatives_spanish:
  - hurtar
  - hurtos
  - robar
  lexicon: HALOT
  rationale: La forma puede expresarse como sustantivo para mantener el catálogo breve. «Robo» conserva la paralelismo con los demás sustantivos y comunica claramente la idea de hurto.
- source_word: נָאֹף
  english_pob_choice: adultery
  chosen_spanish: adulterio
  alternatives_spanish:
  - adulterar
  - cometer adulterio
  lexicon: HALOT
  rationale: El verbo se refiere específicamente al adulterio. El sustantivo «adulterio» preserva la compacta forma de lista y el alcance sexual/moral del término.
- source_word: פָּרָצוּ
  english_pob_choice: break out
  chosen_spanish: se desatan
  alternatives_spanish:
  - estallan
  - irrumpen
  - se desencadenan
  lexicon: HALOT
  rationale: El hebreo sugiere irrupción o explosión de conductas. «Se desatan» comunica una expansión súbita y descontrolada en español, sin añadir un objeto que el hebreo no explicita.
- source_word: דָמִים
  english_pob_choice: bloodshed
  chosen_spanish: sangre
  alternatives_spanish:
  - derramamiento de sangre
  - sangrías
  - culpa de sangre
  lexicon: HALOT
  rationale: En la expresión fija de este versículo, el plural hebreo funciona como idiomático de violencia sanguinaria. Se puede mantener el sustantivo «sangre» por economía y por la imagen directa, dejando el sentido idiomático claro en la nota textual.
- source_word: בְּדָמִים נָגָעוּ
  english_pob_choice: follows bloodshed
  chosen_spanish: sangre sigue a sangre
  alternatives_spanish:
  - sangre toca sangre
  - derramamiento de sangre sigue a derramamiento de sangre
  - sangre con sangre se mezcla
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «sangres tocan sangres», una idiomática sucesión de violencia. «Sangre sigue a sangre» conserva la repetición y el efecto acumulativo, mientras que la nota explica la imagen literal del hebreo.
theological_decisions:
- issue: Sentido de אָלֹה en un contexto de pleito pactual
  english_pob_reading: '''Cursing'' may also be understood as oath-violation or false swearing in this covenant-lawsuit context.'
  chosen_spanish_reading: «Maldición» puede abarcar también juramento falso o violación de juramento en este contexto de litigio pactual.
  alternative_spanish_readings:
  - juramento falso
  - quebrantamiento de juramento
  - imprecación
  rationale: 'El texto hebreo y la nota inglesa muestran una tensión semántica real: no se trata solo de insultos, sino posiblemente de fórmulas de juramento o de su violación. La redacción principal adopta el término más amplio, y la nota preserva la alternativa jurídica sin cerrarla.'
  doctrine_reference: Éxodo 20:7; Levítico 19:12; Oseas 4:1-2
- issue: Carácter idiomático de 'bloods touch bloods'
  english_pob_reading: bloodshed follows bloodshed
  chosen_spanish_reading: «sangre sigue a sangre» expresa la sucesión continua de violencia.
  alternative_spanish_readings:
  - sangre toca sangre
  - derramamiento de sangre sigue a derramamiento de sangre
  - una sangre sucede a otra
  rationale: La imagen hebrea es fuerte y poética. La traducción principal conserva la repetición y el ritmo; la nota explica que el hebreo habla literalmente de ‘sangres’ que se tocan, es decir, actos de violencia que se encadenan.
  doctrine_reference: Génesis 4:10; Oseas 4:2
translation_notes:
  revision_awareness: El pasaje inglés auditado está en alta concordancia y no recibió revisiones aplicadas; por eso la versión española sigue de cerca la decisión léxica principal del inglés, pero ajusta el ritmo y la naturalidad al español manteniendo las tensiones semánticas documentadas.
  spanish_consistency_notes:
  - Se mantuvo una lista nominal compacta para reproducir el estilo acumulativo del hebreo y del inglés POB.
  - Se evitó 'SEÑOR' para YHWH porque este versículo no lo contiene.
  - '''Sangre'' se usa de forma idiomática en la frase final, con aclaración en nota para no perder el hebraísmo.'
  - El marcador [a] en el texto se corresponde con la nota sobre el hebraísmo; [b] con el alcance semántico de «Maldición».
