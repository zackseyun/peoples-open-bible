translation:
  language: es
  text: Josué capturó todas las ciudades de estos reyes, y a todos sus reyes; los mató a filo de espada. Los consagró[a] a la destrucción, tal como Moisés, siervo de Yahvé, había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los destruyó por completo»; el hebreo usa el verbo técnico para poner personas o cosas bajo el ḥerem, es decir, consagrarlas irrevocablemente a la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: the cities of these kings
  chosen_spanish: las ciudades de estos reyes
  alternatives_spanish:
  - estas ciudades reales
  - todas las ciudades de estos reyes
  lexicon: HALOT
  rationale: El hebreo forma una cadena constructa que relaciona las ciudades con los reyes mencionados; en español, «las ciudades de estos reyes» preserva esa relación sin añadir la idea de «reales», que sería interpretativa.
- source_word: לָכַד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto de conquista, «capturó» es la equivalencia natural y mantiene el sentido militar de la acción.
- source_word: וַיַּכֵּם
  english_pob_choice: he struck them down
  chosen_spanish: los hirió
  alternatives_spanish:
  - los derribó
  - los golpeó
  lexicon: HALOT
  rationale: El verbo נכה es amplio; aquí va con «con el filo de la espada», por lo que el español debe expresar violencia letal sin sonar arcaico. «Los hirió» conserva la acción directa del hebreo, mientras que el contexto completa el sentido.
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la espada
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «a la boca de la espada»; la equivalencia española tradicional y clara es «con el filo de la espada», que conserva la imagen concreta sin volverla opaca.
- source_word: הֶחֱרִים
  english_pob_choice: He devoted them to destruction
  chosen_spanish: Los dedicó al anatema
  alternatives_spanish:
  - Los consagró a la destrucción
  - Los exterminó por completo
  lexicon: HALOT
  rationale: חרם es un término técnico de consagración irrevocable a destrucción. «Anatema» reproduce la fuerza técnica y cultual del término mejor que una simple paráfrasis de destrucción; la traducción mantiene la tensión teológica del acto bajo juicio.
- source_word: כַּאֲשֶׁר צִוָּה
  english_pob_choice: just as ... had commanded
  chosen_spanish: tal como ... había mandado
  alternatives_spanish:
  - como ... mandó
  - según ... había ordenado
  lexicon: HALOT
  rationale: «Tal como» expresa adecuadamente la conformidad con el mandato previo. «Había mandado» refleja mejor el orden narrativo, ya que el mandato de Moisés antecede a la acción de Josué.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: siervo de Yahvé
  alternatives_spanish:
  - servidor de Yahvé
  - esclavo de Yahvé
  lexicon: HALOT
  rationale: En este título honorífico y covenantal para Moisés, «siervo» comunica función y dignidad. «Esclavo» sería demasiado duro en español para este uso titulado, aunque se reserva en otros contextos cuando el léxico lo exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española establecida en el proyecto, sin sustituirlo por un título. Esto preserva el valor del Tetragrámaton y la coherencia terminológica del POB.
theological_decisions:
- issue: Término técnico חרם / ḥerem en contexto de conquista
  english_pob_reading: He devoted them to destruction
  chosen_spanish_reading: Los dedicó al anatema
  alternative_spanish_readings:
  - Los consagró a la destrucción
  - Los exterminó por completo
  rationale: El hebreo usa lenguaje técnico de ḥerem, no solo un verbo genérico de destruir. «Anatema» mantiene el valor ritual-jurídico del término y evita borrar su carga teológica, aunque suene más marcado que una simple paráfrasis.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; principio de documentar términos controvertidos
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio de Dios en la línea del auditable POB, en lugar de esconderlo tras una sustitución titular. Esto mantiene la referencia explícita al pacto y a la revelación del nombre divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El inglés auditado no presenta revisiones aplicadas y la última pasada de revisión quedó sin cambios; por eso el español sigue de cerca la lectura estable, manteniendo las decisiones léxicas y teológicas ya documentadas en el POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evita «Cristo» porque el pasaje no trata el título mesiánico.
  - «Anatema» se reserva aquí como término técnico equivalente al ḥerem; no se usa como maldición genérica.
  - La estructura de la frase sigue el orden narrativo del hebreo sin volverla literalista en exceso.
