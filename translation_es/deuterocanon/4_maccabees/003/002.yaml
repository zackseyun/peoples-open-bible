translation:
  language: es
  text: Por ejemplo[a], la razón no puede cortar de raíz alguno de tus deseos, pero la razón puede hacer posible que uno no sea esclavo del deseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «la razón puede hacer posible que uno no sea esclavo del deseo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷον
  english_pob_choice: For example
  chosen_spanish: Por ejemplo
  alternatives_spanish:
  - Por caso
  - Por instancia
  - Tal como
  lexicon: LSJ
  rationale: Introduce un caso ilustrativo dentro del argumento; «Por ejemplo» conserva el valor ejemplificador de οἷον en un español natural y sobrio.
- source_word: ἐπιθυμίαν
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - deseo
  - ansias
  - apetitos
  lexicon: BDAG/LSJ
  rationale: Aunque el griego usa singular genérico, el plural español fluye mejor en «ninguno de tus deseos» y mantiene el sentido general sin intensificar indebidamente el término.
- source_word: ἐκκόψαι
  english_pob_choice: cut off
  chosen_spanish: cortar
  alternatives_spanish:
  - arrancar
  - eliminar
  - suprimir
  lexicon: BDAG/LSJ
  rationale: «Cortar» conserva la imagen vívida y metafórica de ἐκκόψαι. Se evita suavizarla con verbos más abstractos.
- source_word: δουλωθῆναι
  english_pob_choice: be enslaved
  chosen_spanish: ser esclavizado
  alternatives_spanish:
  - ser dominado
  - ser sometido
  - ser hecho esclavo
  lexicon: BDAG/LSJ
  rationale: La metáfora de esclavitud es explícita en el griego; «ser esclavizado» la preserva sin reemplazarla por una formulación atenuada.
- source_word: τῇ ἐπιθυμίᾳ
  english_pob_choice: to desire
  chosen_spanish: por el deseo
  alternatives_spanish:
  - al deseo
  - a la pasión
  - por la pasión
  lexicon: BDAG/LSJ
  rationale: La referencia vuelve al mismo campo léxico de ἐπιθυμία. «Por el deseo» expresa la relación de sujeción de manera clara en español y mantiene la conexión terminológica.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - la facultad racional
  - el pensamiento racional
  lexicon: BDAG/LSJ
  rationale: En 4 Macabeos, λογισμός designa la facultad racional o el juicio reflexivo. «La razón» es breve, idiomática y fiel al registro filosófico del pasaje.
- source_word: παρασχέσθαι
  english_pob_choice: make it possible
  chosen_spanish: hacer posible
  alternatives_spanish:
  - permitir
  - procurar
  - dar lugar a
  lexicon: BDAG/LSJ
  rationale: «Hacer posible» refleja bien la idea de que la razón puede proveer la capacidad o condición para no quedar esclavizado, sin exagerar la fuerza del verbo.
theological_decisions:
- issue: Relación entre razón y deseo
  english_pob_reading: Reason does not eradicate desire itself but can prevent a person from becoming enslaved to it.
  chosen_spanish_reading: La razón no elimina los deseos en sí, pero puede impedir que uno quede esclavizado por ellos.
  alternative_spanish_readings:
  - La razón no suprime ningún deseo, pero puede librar a la persona de su esclavitud.
  - La razón no arranca los deseos, pero puede hacer posible la libertad frente al deseo.
  rationale: 'El versículo mantiene una tensión moral-filosófica: la razón no destruye el deseo, sino que puede ordenar la conducta para que el deseo no domine. La redacción española preserva esa distinción sin convertirla en un principio estoico más fuerte de lo que el texto permite.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó «enable one» a «make it possible» para reflejar mejor παρασχέσθαι. La versión española sigue esa decisión con «hacer posible». También se preservó la distinción entre cortar deseos y no quedar esclavizado por ellos.
  spanish_consistency_notes:
  - Se mantiene «la razón» para λογισμός de forma consistente con el registro filosófico del libro.
  - Se conserva el campo léxico de ἐπιθυμία con «deseo/deseos» en lugar de cambiarlo a «pasión», para no intensificar el término sin base textual.
  - Se preserva la metáfora de esclavitud con «esclavizado», coherente con la política POB sobre δοῦλος y derivados.
  - «Por ejemplo» funciona como equivalente natural de οἷον y conserva el tono argumentativo del pasaje.
