translation:
  language: es
  text: Y él seleccionó de inmediato a Nicanor, que había llegado a ser comandante de los elefantes, y lo nombró general[a] sobre Judea, y lo envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «general de Judea» o «gobernador militar de Judea». El título griego στρατηγός puede denotar tanto un comandante militar como un funcionario gobernante regional, y el contexto probablemente incluye ambas funciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: προχειρισάμενος
  english_pob_choice: selected
  chosen_spanish: seleccionó
  alternatives_spanish:
  - escogió
  - designó
  lexicon: LSJ
  rationale: El participio expresa una acción de elegir o asignar para una función. «Seleccionó» conserva la idea de elección deliberada y evita duplicar innecesariamente el matiz formal del verbo siguiente («nombró»).
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - inmediatamente
  - enseguida
  lexicon: LSJ
  rationale: La locución española transmite prontitud clara y natural en registro moderno, con el mismo valor adverbial de rapidez.
- source_word: τὸν γενόμενον ἐλεφαντάρχην
  english_pob_choice: who had become commander of the elephants
  chosen_spanish: que había llegado a ser comandante de los elefantes
  alternatives_spanish:
  - que había sido comandante de los elefantes
  - que se había convertido en comandante de los elefantes
  - que había llegado a ser jefe de los elefantes
  lexicon: LSJ
  rationale: «Llegado a ser» conserva el valor de γενόμενον como cambio de estado sin forzar una lectura técnica; «comandante de los elefantes» mantiene el cargo militar sin sustituirlo por una paráfrasis más amplia.
- source_word: στρατηγὸν
  english_pob_choice: general
  chosen_spanish: general
  alternatives_spanish:
  - comandante
  - jefe militar
  - gobernador militar
  lexicon: LSJ
  rationale: Se mantiene «general» porque el audit trail inglés revisó la opción de «governor» y fijó «general» para reflejar mejor στρατηγόν en la construcción con Judea. En español, «general sobre Judea» reproduce bien el valor militar y el matiz de cargo regional.
- source_word: ἀναδείξας
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - estableció
  - lo puso como
  lexicon: LSJ
  rationale: El verbo denota designación pública para un oficio. «Nombró» es el equivalente más natural y solemne en español, con suficiente fuerza oficial.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent him out
  chosen_spanish: lo envió
  alternatives_spanish:
  - lo despachó
  - lo mandó fuera
  - lo envió de allí
  lexicon: LSJ
  rationale: El verbo compone la idea básica de envío. En español, «lo envió» mantiene la sencillez del cierre sin introducir un matiz espacial que no sea explícito en el griego.
theological_decisions:
- issue: Título στρατηγός aplicado a Judea
  english_pob_reading: general over Judea / military governor of Judea
  chosen_spanish_reading: general sobre Judea
  alternative_spanish_readings:
  - gobernador de Judea
  - gobernador militar de Judea
  - general de Judea
  rationale: El contexto puede incluir funciones militares y administrativas. La forma elegida conserva la ambigüedad documentada por el POB en inglés, sin reducir el término a una sola función que el griego no exige de manera exclusiva.
  doctrine_reference: None
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que corrigió «governor of Judea» a «general over Judea» para reflejar mejor στρατηγός y la construcción τῆς Ἰουδαίας. Por eso el español conserva «general sobre Judea» y no sustituye ese matiz por «gobernador».
  spanish_consistency_notes:
  - Se mantiene «Nicanor» como forma castellanizada habitual del nombre propio, en correspondencia con la transliteración inglesa auditada.
  - Se usa «elefantes» en genitivo de oficio para evitar una paráfrasis innecesaria y respetar el título militar.
  - La secuencia verbal («seleccionó... y lo nombró... y lo envió») sigue la cadencia del griego y del inglés auditado, sin añadir explicaciones narrativas.
