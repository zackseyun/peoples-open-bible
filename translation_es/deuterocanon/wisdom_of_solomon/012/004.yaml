translation:
  language: es
  text: porque, a causa de las obras más aborrecibles que practicaban —hechicerías y ritos impíos—[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'artes mágicas' para φαρμακειῶν; el término griego puede abarcar prácticas mágicas en general y, en algunos contextos, el uso de pócimas o venenos.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'ritos' como 'ceremonias' o 'ritos de iniciación'; τελετάς puede referirse a observancias cultuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισήσας
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - porque
  - por haber
  lexicon: LSJ
  rationale: El participio aoristo se entiende causalmente por el contexto. En español, 'a causa de' conserva bien esa relación sin forzar una subordinada interpretativa que añada contenido no explicitado en el verso.
- source_word: ἐπὶ τῷ
  english_pob_choice: because
  chosen_spanish: a causa de
  alternatives_spanish:
  - porque
  - por
  - en razón de
  lexicon: LSJ
  rationale: La construcción expresa base o motivo. 'A causa de' comunica la relación causal de forma natural y sobria en español.
- source_word: ἔχθιστα
  english_pob_choice: the most hateful
  chosen_spanish: más aborrecibles
  alternatives_spanish:
  - los más odiosos
  - los más detestables
  - los más odiosos y repugnantes
  lexicon: LSJ
  rationale: El superlativo intensivo de ἐχθρός pide una carga fuerte. 'Más aborrecibles' mantiene el tono valorativo sin sonar demasiado calcado o redundante con 'hateful'.
- source_word: πράσσειν
  english_pob_choice: practiced
  chosen_spanish: practicaban
  alternatives_spanish:
  - hacían
  - realizaban
  - cometían
  lexicon: LSJ
  rationale: '''Practicar'' expresa con naturalidad acciones repetidas o ritualizadas, especialmente en un contexto de prácticas prohibidas.'
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - deeds
  lexicon: LSJ
  rationale: '''Obras'' conserva la sustantivación concreta del griego y encaja bien con el genitivo que sigue.'
- source_word: φαρμακειῶν
  english_pob_choice: sorceries
  chosen_spanish: hechicerías
  alternatives_spanish:
  - sorcerías
  - artes mágicas
  - magias
  lexicon: LSJ
  rationale: El campo semántico incluye prácticas mágicas, pociones o venenos. 'Hechicerías' comunica el sentido ocultista de condena religiosa en español, mientras la nota preserva la amplitud léxica.
- source_word: τελετὰς
  english_pob_choice: rites
  chosen_spanish: ritos
  alternatives_spanish:
  - ceremonias
  - ritos de iniciación
  - misterios
  lexicon: LSJ
  rationale: '''Ritos'' mantiene el sentido cultual general del término sin limitarlo indebidamente a un tipo específico de observancia.'
- source_word: ἀνοσίους
  english_pob_choice: unholy
  chosen_spanish: impíos
  alternatives_spanish:
  - profanos
  - irreligiosos
  - sin santidad
  lexicon: LSJ
  rationale: ἀνόσιος denota lo contrario de la piedad o santidad. 'Impíos' es un equivalente natural y teológicamente claro en español bíblico contemporáneo.
theological_decisions:
- issue: Referente implícito del participio causal
  english_pob_reading: The verse is rendered causally, with the abhorrent practices explaining divine rejection of them in context.
  chosen_spanish_reading: Se conserva la causalidad explícita con 'a causa de', sin añadir un sujeto interpretativo en el texto principal.
  alternative_spanish_readings:
  - porque ellos practicaban
  - porque Dios aborrecía
  rationale: El griego, leído en contexto, expresa causa, pero el participio aislado no exige explicitar más en el verso español. La redacción evita añadir una glosa que no está en esta línea y respeta la tensión sintáctica del original.
  doctrine_reference: Preservar la relación causal sin sobreinterpretar el referente; equivalencia óptima
- issue: Valoración fuerte de ἔχθιστα y ἀνοσίους
  english_pob_reading: the most hateful ... unholy
  chosen_spanish_reading: las obras más aborrecibles ... ritos impíos
  alternative_spanish_readings:
  - las obras más odiosas ... ritos profanos
  - las obras más detestables ... ritos irreligiosos
  rationale: La combinación de superlativo y adjetivo moral debe sonar intensa en español. 'Aborrecibles' e 'impíos' conservan el juicio negativo sin importar una terminología eclesiástica extraña al pasaje.
  doctrine_reference: Mantener el juicio moral del texto sin neutralizarlo
translation_notes:
  revision_awareness: 'El texto griego ofrece una cláusula causal breve y condensada. La versión inglesa auditada pasó de una formulación más interpretativa a otra más ajustada al valor causal. En español se siguió esa revisión, evitando añadir una glosa equivalente a ''things you hated'' y conservando solo los elementos léxicos claramente presentes: causa, obras, prácticas mágicas y ritos impíos.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé fuera del texto porque este versículo no contiene el nombre divino explícito; la causalidad queda impersonal en la línea tal como lo permite el contexto.
  - Se prefirió 'hechicerías' y 'ritos' como términos transparentes y de amplia inteligibilidad eclesial.
  - La puntuación con rayas ayuda a reflejar la aposición enumerativa del griego sin recargar la sintaxis española.
