translation:
  language: es
  text: ¿Qué descendencia es honrada? La descendencia humana[a]. ¿Qué descendencia es honrada? Los que temen a Dios[b]. ¿Qué descendencia es honrada? Los que guardan el mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¿Qué descendencia es deshonrosa? La descendencia humana». El testimonio hebreo, en cambio, lee: «¿Qué descendencia es honrada? Los que guardan el mandamiento».'
    reason: textual_variant
  - marker: b
    text: El griego dice «los que temen al Señor», mientras que el hebreo lee «los que temen a Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: זֶרַע / σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - prole
  - linaje
  lexicon: HALOT; BDAG
  rationale: «Descendencia» conserva el sentido colectivo de grupo procedente de una misma raíz familiar y suena natural en español bíblico contemporáneo. Evita el calco vegetal de «simiente» y el matiz demasiado genealógico de «linaje».
- source_word: נִכְבָּד / ἔντιμον
  english_pob_choice: honorable
  chosen_spanish: honorable
  alternatives_spanish:
  - noble
  - estimada
  - distinguida
  lexicon: HALOT; BDAG
  rationale: El término expresa valor, honra o reputación. «Honorable» mantiene el tono sapiencial y la repetición retórica del verso sin introducir una idea de nobleza social hereditaria.
- source_word: מַה / ποῖον
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué clase de
  - qué tipo de
  lexicon: HALOT; BDAG
  rationale: La pregunta es clasificatoria y retórica. «Qué» reproduce de forma natural la fórmula interrogativa sin sobrecargar el verso con explicaciones perifrásticas.
- source_word: לֶאֱנוֹשׂ / ἀνθρώπου
  english_pob_choice: human
  chosen_spanish: humana
  alternatives_spanish:
  - de hombre
  - de la humanidad
  - humana, de seres humanos
  lexicon: HALOT; BDAG
  rationale: La forma del español exige concordancia con «descendencia»; por eso se vierte como adjetivo femenino plural implícito en «descendencia humana». Conserva el sentido genérico antropológico sin sonar masculino por defecto.
- source_word: יְרֵא אֱלֹהִים / οἱ φοβούμενοι τὸν κύριον
  english_pob_choice: those who fear God
  chosen_spanish: los que temen a Dios
  alternatives_spanish:
  - los que reverencian a Dios
  - los que temen al Señor
  - los temerosos de Dios
  lexicon: HALOT; BDAG
  rationale: Se sigue el hebreo primario extantado, que dice «Dios». «Los que temen a Dios» conserva la fuerza bíblica de ירא sin suavizarla a una simple reverencia. La alternativa griega «al Señor» se preserva en nota.
- source_word: שׂוֹמֵר מִצְוָה
  english_pob_choice: those who keep the commandment
  chosen_spanish: los que guardan el mandamiento
  alternatives_spanish:
  - los que obedecen el mandamiento
  - los que guardan los mandamientos
  - los que observan el mandamiento
  lexicon: HALOT
  rationale: El hebreo está en singular, por lo que se mantiene «el mandamiento». «Guardar» es el equivalente bíblico natural de שׁמר y conserva el matiz de custodiar/obedecer, no solo cumplir externamente.
theological_decisions:
- issue: Desacuerdo textual entre el hebreo conservado y el paralelo griego en la última cola del verso
  english_pob_reading: The English POB follows the Hebrew witness in the main text and preserves the Greek contrastive line in a footnote.
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «los que guardan el mandamiento».'
  alternative_spanish_readings:
  - «¿Qué descendencia es deshonrosa? La descendencia humana.»
  - «¿Qué descendencia es honorable? Los que temen al Señor.»
  rationale: Como en el audit trail inglés, el hebreo extantado se toma como texto principal para este versículo, pero la discrepancia con el griego es material y no debe ocultarse. Por eso el texto español mantiene la lectura hebrea y registra la alternativa griega en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde existe en Sirácida; preservar honestamente la incertidumbre textual.'
- issue: Elección entre «Dios» y «Señor» en la cláusula de los que temen a Dios
  english_pob_reading: Greek has 'those who fear the Lord' where the Hebrew reads 'those who fear God.'
  chosen_spanish_reading: «los que temen a Dios»
  alternative_spanish_readings:
  - «los que temen al Señor»
  - «los temerosos del Señor»
  rationale: La base hebrea dice explícitamente אֱלֹהִים, así que la traducción principal sigue esa forma. La variante griega se conserva para que el lector vea la tensión textual sin que la traducción la borre.
  doctrine_reference: 'Terminología divina del proyecto POB: Yahvé para יהוה; aquí no aplica porque el hebreo dice אֱלֹהִים y el griego κύριος funciona como paralelo textual, no como cita directa del nombre divino.'
translation_notes:
  revision_awareness: Se revisó el versículo frente al hebreo de Sirácida 10:19 y al paralelo griego de Swete. La versión final sigue el hebreo conservado como texto principal, pero mantiene la variante griega en nota para no perder la tensión textual documentada. No se aplicaron revisiones posteriores en el registro inglés más allá de confirmar alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «descendencia» como equivalente de σπέρμα/זֶרַע para conservar el paralelismo retórico y evitar el sesgo de género o de botánica que puede tener «simiente».
  - Se usa «mandamiento» en singular porque el hebreo es singular; no se generaliza a «mandamientos» sin apoyo textual.
  - Se evita «Señor» en el texto principal porque el hebreo base dice «Dios»; la forma griega queda documentada en nota.
  - La estructura triple de la pregunta se conserva para reflejar el ritmo sapiencial del original.
