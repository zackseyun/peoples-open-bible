  language: en
  yaml_path: translation/ot/isaiah/049/023.yaml
  text: Kings will be your foster fathers[a], and their princesses your nursing mothers. With faces to the ground they will bow down to you, and they will lick the dust of your feet. Then you will know that I am Yahweh[b]; those who wait for me will not be put to shame.
  footnotes:
