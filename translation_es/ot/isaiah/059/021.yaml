translation:
  language: es
  text: 'Y en cuanto a mí, esta es mi alianza con ellos, dice Yahvé: mi Espíritu que está sobre ti, y mis palabras que he puesto en tu boca no se apartarán de tu boca, ni de la boca de tu descendencia[a], ni de la boca de la descendencia de tu descendencia, dice Yahvé[b], desde ahora y para siempre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu simiente» y «la simiente de tu simiente». El hebreo usa el sustantivo colectivo «simiente» para descendencia/posteridad.
    reason: lexical_alternative
  - marker: b
    text: O «desde ahora en adelante y para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And as for me
  chosen_spanish: Y en cuanto a mí
  alternatives_spanish:
  - Y yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La forma hebrea abre con un pronombre enfático y contrastivo; en español, «Y en cuanto a mí» preserva mejor ese giro discursivo que un simple «Y yo».
- source_word: זֹאת בְּרִיתִי אוֹתָם
  english_pob_choice: this is my covenant with them
  chosen_spanish: esta es mi alianza con ellos
  alternatives_spanish:
  - este es mi pacto con ellos
  - esta es mi alianza para ellos
  lexicon: HALOT
  rationale: «בְּרִית» puede traducirse por «pacto» o «alianza»; aquí se elige «alianza» como equivalente bíblico claro y natural en español, manteniendo la relación personal indicada por el objeto pronominal.
- source_word: רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  - mi aliento
  lexicon: HALOT
  rationale: En el contexto profético-covenantal, el sentido es el Espíritu divino; la mayúscula ayuda a distinguirlo de «espíritu» humano sin cambiar el referente.
- source_word: אֲשֶׁר עָלֶיךָ
  english_pob_choice: that is upon you
  chosen_spanish: que está sobre ti
  alternatives_spanish:
  - que reposa sobre ti
  - que está encima de ti
  lexicon: HALOT
  rationale: La preposición עַל se expresa con naturalidad en español como «sobre»; «está sobre ti» conserva la idea de investidura o presencia encima de la persona.
- source_word: וּדְבָרַי אֲשֶׁר שַׂמְתִּי בְּפִיךָ
  english_pob_choice: and my words that I have put in your mouth
  chosen_spanish: y mis palabras que he puesto en tu boca
  alternatives_spanish:
  - y mi palabra que he puesto en tu boca
  - y mis dichos que he puesto en tu boca
  lexicon: HALOT
  rationale: El plural hebreo דְבָרַי se conserva como «mis palabras»; el perfecto se vierte de modo natural como «he puesto» para mantener el efecto de resultado perdurable.
- source_word: לֹא יָמוּשׁוּ
  english_pob_choice: shall not depart
  chosen_spanish: no se apartarán
  alternatives_spanish:
  - no se moverán
  - no saldrán
  lexicon: HALOT
  rationale: El verbo expresa apartarse o retirarse; «no se apartarán» transmite el valor idiomático mejor que una traducción más literal pero menos natural.
- source_word: מִפִּיךָ
  english_pob_choice: from your mouth
  chosen_spanish: de tu boca
  alternatives_spanish:
  - desde tu boca
  - fuera de tu boca
  lexicon: HALOT
  rationale: En la repetición fórmulaica, «de tu boca» es la opción más natural en español y conserva la relación de procedencia.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus hijos
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo; «descendencia» preserva ese valor colectivo y evita la oscuridad o literalidad extraña de «simiente» en el cuerpo principal.
- source_word: זֶרַע זַרְעֲךָ
  english_pob_choice: your offspring’s offspring
  chosen_spanish: la descendencia de tu descendencia
  alternatives_spanish:
  - tu descendencia de descendencia
  - la descendencia de tus hijos
  lexicon: HALOT
  rationale: La cadena constructa expresa continuidad generacional; esta versión conserva la progresión sin introducir interpretación adicional.
- source_word: מֵעַתָּה וְעַד עוֹלָם
  english_pob_choice: from now and forever
  chosen_spanish: desde ahora y para siempre
  alternatives_spanish:
  - desde ahora en adelante y para siempre
  - desde este momento y para siempre
  lexicon: HALOT
  rationale: La fórmula temporal se traduce con una secuencia española estable y clara que mantiene la duración continua desde el presente hacia adelante.
theological_decisions:
- issue: Identidad del destinatario del segundo singular («tu» / «ti» / «tu boca»)
  english_pob_reading: Retained as singular 'you' without interpretive expansion
  chosen_spanish_reading: Se mantiene el singular «ti/tu» sin especificar más al destinatario
  alternative_spanish_readings:
  - el profeta
  - Sión/Israel personificada
  - el siervo o la comunidad redimida
  rationale: El hebreo conserva la referencia en singular dentro de un marco más amplio; para no resolver indebidamente la tensión interpretativa, la traducción mantiene el singular tal como está.
  doctrine_reference: Preservar la tensión teológica sin imponer una identificación interpretativa.
- issue: Uso de «Yahvé» para el nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para YHWH, manteniendo el nombre divino visible en el texto español.
  doctrine_reference: Terminología del proyecto para el nombre divino.
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo con la revisión auditada en inglés; no se detectan cambios sustanciales necesarios respecto del sentido del original hebreo y se conservan las decisiones léxicas clave: énfasis inicial, alianza/pacto, Espíritu, palabras, y la fórmula temporal final.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de una sustitución por «SEÑOR» para seguir la norma del proyecto.
  - Se eligió «alianza» como equivalente bíblico de בְּרִית, coherente con el registro del texto y legible en español.
  - Se conservó la mayúscula en «Espíritu» por contexto divino.
  - Se tradujo el colectivo hebreo זֶרַע con un término colectivo español («descendencia») para reflejar la progresión generacional.
  - La versión final evita arcaísmos innecesarios y conserva un tono bíblico digno.
