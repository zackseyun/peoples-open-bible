translation:
  language: es
  text: Su abertura se extendía hacia arriba desde dentro del capitel por un codo[a], y su abertura era redonda, como la obra de un pedestal[b], un codo y medio; y también sobre su abertura había tallas[c], y sus paneles eran cuadrados, no redondos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘boca’; el hebreo usa una metáfora arquitectónica para la abertura.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea es técnicamente difícil; también puede entenderse como ‘como la hechura de un pedestal’ o ‘como la obra de una base’.
    reason: lexical_alternative
  - marker: c
    text: O ‘grabados’, ‘guirnaldas’ o ‘guirnaldas talladas’ para el término ornamental aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִיהוּ / פִיהָ
  english_pob_choice: opening
  chosen_spanish: abertura
  alternatives_spanish:
  - abertura
  - apertura
  - boca
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el hebreo usa la metáfora de ‘boca’ para la abertura de la pieza. ‘Abertura’ mantiene la referencia estructural sin volverla literal de manera extraña en español; ‘boca’ se preserva como alternativa posible por el valor metafórico del hebreo.
- source_word: מִבֵּית לַכֹּתֶרֶת
  english_pob_choice: from within the capital
  chosen_spanish: dentro del capitel
  alternatives_spanish:
  - desde dentro del capitel
  - desde el interior del capitel
  - dentro de la corona/capitel
  lexicon: HALOT
  rationale: El sintagma indica procedencia espacial desde el interior del elemento superior. ‘Capitel’ es la forma más clara en español para el elemento arquitectónico; se evita una glosa excesiva porque el texto ya es descriptivo.
- source_word: וָמַעְלָה
  english_pob_choice: projected upward
  chosen_spanish: se extendía hacia arriba
  alternatives_spanish:
  - subía
  - se alzaba
  - se proyectaba hacia arriba
  lexicon: HALOT
  rationale: El hebreo expresa extensión ascendente; en español, ‘se extendía hacia arriba’ comunica la idea sin añadir una imagen demasiado interpretativa. ‘Se proyectaba hacia arriba’ queda como alternativa más cercana al inglés auditado.
- source_word: בָּאַמָּה
  english_pob_choice: by a cubit
  chosen_spanish: por un codo
  alternatives_spanish:
  - de un codo
  - un codo
  - a la medida de un codo
  lexicon: HALOT
  rationale: La medida se conserva con ‘codo’, equivalente tradicional y comprensible. ‘Por un codo’ refleja el alcance de la extensión y mantiene el tono técnico de la descripción.
- source_word: עָגֹל
  english_pob_choice: round
  chosen_spanish: redonda
  alternatives_spanish:
  - circular
  - redondo
  lexicon: HALOT
  rationale: El adjetivo describe la forma de la abertura; en español concuerda con ‘abertura’ y mantiene el paralelismo de la frase.
- source_word: מַעֲשֵׂה כֵן
  english_pob_choice: like the work of a pedestal
  chosen_spanish: como la obra de un pedestal
  alternatives_spanish:
  - como el trabajo de un pedestal
  - como la hechura de un pedestal
  - como la obra de una base
  lexicon: HALOT
  rationale: 'Se conserva la dificultad técnica del hebreo: la frase compara la forma con la ‘obra’ de un soporte/base. ‘Obra’ reproduce con fidelidad el sustantivo del hebreo y evita resolver indebidamente la ambigüedad.'
- source_word: אַמָּה וַחֲצִי הָאַמָּה
  english_pob_choice: a cubit and a half
  chosen_spanish: un codo y medio
  alternatives_spanish:
  - un codo y medio de alto
  - uno y medio codos
  lexicon: HALOT
  rationale: Se mantiene la medida estándar con la forma natural del español bíblico contemporáneo.
- source_word: מִקְלָעוֹת
  english_pob_choice: carvings
  chosen_spanish: tallas
  alternatives_spanish:
  - tallados
  - relieves
  - grabados
  lexicon: HALOT
  rationale: El término refiere a trabajo ornamental ejecutado sobre la superficie. ‘Tallas’ conserva la idea de ornamentación trabajada sin sobreespecificar el motivo, como hace el inglés auditado con ‘carvings’.
- source_word: מִסְגְּרֹתֵיהֶם
  english_pob_choice: their panels
  chosen_spanish: sus paneles
  alternatives_spanish:
  - sus marcos
  - sus bordes
  - sus encuadres
  lexicon: HALOT
  rationale: En esta descripción técnica, ‘paneles’ transmite la idea de secciones enmarcadas y mantiene bien la oposición formal con ‘cuadrados, no redondos’.
- source_word: מְרֻבָּעוֹת לֹא עֲגֻלּוֹת
  english_pob_choice: square, not round
  chosen_spanish: cuadrados, no redondos
  alternatives_spanish:
  - cuadradas, no redondas
  - rectangulares, no redondas
  lexicon: HALOT
  rationale: La oposición de formas se expresa de modo directo y natural en español. Se usa la concordancia femenina en ‘abertura’ y el plural masculino genérico en ‘paneles’.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directamente y toma como guía el audit trail inglés: conserva la metáfora arquitectónica de פֶּה como ‘abertura’, la relación espacial ‘desde dentro del capitel’, la medida ascendente, y la dificultad técnica de מַעֲשֵׂה כֵן sin resolverla de forma excesiva. También mantiene la última revisión inglesa que prefirió ‘like the work of a pedestal’ sobre ‘made like a pedestal’.'
  spanish_consistency_notes:
  - Se usa ‘codo’ para la unidad de medida de forma consistente con el lenguaje bíblico en español.
  - Se mantiene ‘capitel’ como término arquitectónico principal para כֹּתֶרֶת.
  - Se conserva la tensión lexical de מִקְלָעוֹת con una nota alternativa porque el motivo ornamental exacto no es seguro.
  - Se usa ‘abertura’ en lugar de ‘boca’ en el cuerpo del texto para mayor naturalidad, pero se documenta la metáfora hebrea en nota.
