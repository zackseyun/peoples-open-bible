review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Yahvé rocía agua limpia, el pueblo queda limpio, y Dios lo limpia de sus impurezas e ídolos. También mantiene la distinción importante entre el estado resultante («serán limpios») y la acción divina posterior («los limpiaré»). Sin embargo, la nota al pie está mal anclada y mal formulada: el marcador [a] aparece en «agua limpia», pero la nota explica el término para «ídolos» (גִּלּוּלִים), no el agua. Además, «sus ídolos-desechos» es español torpe y gramaticalmente incorrecto en la nota.'
  spanish_quality_summary: 'El texto principal es claro y legible en español eclesial neutral. «Rociaré sobre ustedes agua limpia» suena natural, aunque «rociaré sobre ustedes agua limpia» puede mantenerse tal cual. La frase completa fluye bien. La principal falla de calidad está en la nota: debe ir junto a «ídolos», y la alternativa debe expresarse en español más idiomático, por ejemplo «ídolos de estiércol» o equivalente explicado.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto en este versículo. Las decisiones «rociaré», «agua limpia», «serán limpios», «impurezas», «ídolos» y «los limpiaré» concuerdan con el expediente inglés y con el hebreo. Se preserva correctamente el matiz ritual/moral sin imponer una lectura sacramental.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «agua limpia» pero comenta «ídolos» (גִּלּוּלֵיכֶם).
    rationale: Esto induce al lector a pensar que la nota explica «agua limpia», cuando en realidad documenta el matiz despectivo del término hebreo para «ídolos». Debe moverse al sintagma correcto en el texto principal.
  - severity: medium
    issue: La formulación de la nota «de todas sus ídolos-desechos» es incorrecta y poco natural en español.
    rationale: Hay discordancia de género y una construcción híbrida no idiomática. La nota debe expresar el sentido más literal/despectivo de manera comprensible, por ejemplo «de todos sus ídolos de estiércol», con explicación de que Ezequiel usa un término deliberadamente despreciativo.
  revised_spanish_text: Y rociaré sobre ustedes agua limpia, y serán limpios; de todas sus impurezas y de todos sus ídolos[a] los limpiaré.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «de todos sus ídolos de estiércol»; Ezequiel usa con frecuencia un término deliberadamente despectivo para los ídolos.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto porque representa fielmente el hebreo y el expediente inglés. Solo se corrige la ubicación de la nota para que corresponda al término hebreo גִּלּוּלִים («ídolos»), y se reescribe la alternativa literal en un español comprensible y gramatical.
