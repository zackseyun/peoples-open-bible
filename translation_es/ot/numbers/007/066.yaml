lexical_decisions:
- source_word: בַּיּוֹם
  english_pob_choice: On the ... day
  chosen_spanish: Al ... día
  alternatives_spanish:
  - En el ... día
  lexicon: HALOT
  rationale: La preposición ב con יוֹם en esta lista narrativa expresa tiempo. En español, «Al ... día» comunica esa relación temporal de forma natural y fiel, sin la rigidez de «En el ... día».
- source_word: הָעֲשִׂירִי
  english_pob_choice: tenth
  chosen_spanish: décimo
  alternatives_spanish:
  - diez
  lexicon: HALOT
  rationale: Es un adjetivo ordinal que modifica «día». «Décimo» conserva el valor ordinal del hebreo de manera directa y clara.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En Números, נָשִׂיא designa al representante o cabeza reconocida de una tribu. «Líder» evita las connotaciones monárquicas de «príncipe» y suena natural en español moderno.
- source_word: לִבְנֵי דָן
  english_pob_choice: of the sons of Dan
  chosen_spanish: de los hijos de Dan
  alternatives_spanish:
  - de los danitas
  - para los hijos de Dan
  lexicon: HALOT
  rationale: La expresión hebrea conserva la forma familiar/tribal בני. «Hijos de Dan» mantiene esa transparencia formal mejor que una etiqueta étnica más interpretativa como «danitas».
- source_word: אֲחִיעֶזֶר
  english_pob_choice: Ahiezer
  chosen_spanish: Ahiezer
  lexicon: Nombre propio
  rationale: Nombre אישי transliterado, sin traducción semántica.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: Construcción patronímica estándar en español bíblico contemporáneo; comunica de forma directa la filiación.
- source_word: עַמִּישַׁדָּי
  english_pob_choice: Ammishaddai
  chosen_spanish: Ammisaddai
  alternatives_spanish:
  - Ammishaddai
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio; la forma «Ammisaddai» ajusta la ortografía española para una lectura más fluida, sin alterar la identificación del referente.
translation_notes:
  revision_awareness: El texto fuente y el auditor inglés muestran alta concordancia; no hay notas textuales ni variantes relevantes. La decisión principal fue mantener la transparencia tribal de בני como «hijos» y evitar sobreinterpretar נָשִׂיא con un título monárquico.
  spanish_consistency_notes:
  - Se mantiene «hijos de Dan» para conservar la fórmula tribal hebrea.
  - Se usa una puntuación con dos puntos al final, en paralelo al formato enumerativo del original.
  - Los nombres propios se transliteran, con ligera adaptación ortográfica solo en Ammisaddai para la fluidez del español.
