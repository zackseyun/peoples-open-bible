translation:
  language: es
  text: Al amanecer[a], se levanta el asesino; mata al pobre y al necesitado[b], y de noche es como un ladrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al salir la luz» / «Con la luz»; el hebreo se refiere literalmente a la llegada de la luz, probablemente al amanecer.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «asesina al pobre y al necesitado»; el hebreo usa aquí un verbo distinto de «asesino», de modo que el texto principal conserva esa diferencia con «mata».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאוֹר
  english_pob_choice: At dawn
  chosen_spanish: Al salir la luz
  alternatives_spanish:
  - Al amanecer
  - Con la luz
  - Con el día
  lexicon: HALOT
  rationale: La expresión hebrea literalmente apunta a 'la luz' que llega, con sentido temporal de inicio del día. 'Al salir la luz' conserva esa imagen sin forzar un término interpretativo más cerrado que el hebreo.
- source_word: יָקוּם
  english_pob_choice: rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - se pone en pie
  - se alza
  - se despierta
  lexicon: HALOT
  rationale: El verbo denota levantarse para iniciar la acción. 'Se levanta' es natural en español y mantiene el movimiento inicial del cuadro poético.
- source_word: רוֹצֵחַ
  english_pob_choice: the murderer
  chosen_spanish: el asesino
  alternatives_spanish:
  - el homicida
  - el homicida asesino
  - el matador
  lexicon: HALOT
  rationale: Se trata de un participio sustantivado que caracteriza al sujeto. 'Asesino' comunica mejor en español la fuerza criminal del término que una forma más técnica o menos idiomática.
- source_word: יִקְטָל
  english_pob_choice: he kills
  chosen_spanish: mata
  alternatives_spanish:
  - hiere y mata
  - da muerte
  - asesina
  lexicon: HALOT
  rationale: El hebreo usa un verbo distinto de רצח; el POB inglés preserva esa distinción con 'kills'. En español, 'mata' mantiene la diferencia léxica respecto de 'asesino' sin cargar el verbo con una repetición innecesaria de 'asesina'.
- source_word: עָנִי וְאֶבְיוֹן
  english_pob_choice: the poor and needy
  chosen_spanish: el pobre y al necesitado
  alternatives_spanish:
  - el pobre y el necesitado
  - el afligido y el necesitado
  - el pobre y el indigente
  lexicon: HALOT
  rationale: La pareja hebrea describe a personas socialmente vulnerables. Se conserva la dualidad con sustantivos claros en español; la segunda forma en acusativo responde al ritmo de la oración y al paralelismo con el verbo.
- source_word: וּבַלַּיְלָה
  english_pob_choice: and in the night
  chosen_spanish: y de noche
  alternatives_spanish:
  - y en la noche
  - y por la noche
  - y durante la noche
  lexicon: HALOT
  rationale: La preposición con artículo marca una segunda escena temporal. 'De noche' es la forma más natural en español y conserva el contraste poético con 'Al salir la luz'.
- source_word: יְהִי
  english_pob_choice: he is
  chosen_spanish: es
  alternatives_spanish:
  - se vuelve
  - actúa como
  - se comporta como
  lexicon: HALOT
  rationale: Con כ, היה expresa comparación o modo. 'Es como' reproduce la relación comparativa de manera directa y sobria.
- source_word: כַגַּנָּב
  english_pob_choice: like a thief
  chosen_spanish: como un ladrón
  alternatives_spanish:
  - como ladrón
  - igual que un ladrón
  lexicon: HALOT
  rationale: La comparación simple כ pide 'como'. 'Ladrón' es el equivalente natural en español y preserva la imagen del símil sin suavizarla.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al borrador inglés. El contexto de control cruzado indica alto acuerdo y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se preservó la distinción léxica entre רוצח ('asesino') y יקטל ('mata') para no borrar la tensión documentada por el audit trail inglés.
  - Se optó por un español natural y público-readable sin sustituir la imagen temporal de 'la luz' por una paráfrasis excesivamente interpretativa.
  - 'El paralelismo poético se mantuvo con dos miembros temporales: inicio del día y noche.'
