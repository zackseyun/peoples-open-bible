translation:
  language: es
  text: Ha cercado[a] mis caminos con piedra labrada[b]; ha torcido[c] mis sendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha vallado mis caminos».
    reason: lexical_alternative
  - marker: b
    text: O «con piedra cortada» o «con piedra tallada».
    reason: lexical_alternative
  - marker: c
    text: O «ha hecho torcidas mis sendas» o «ha retorcido mis sendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדַר
  english_pob_choice: has walled in
  chosen_spanish: ha cercado
  alternatives_spanish:
  - ha amurallado
  - ha cercado con cerca
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de cerrar o rodear con un cerco, un muro o una cerca. «Ha cercado» conserva la imagen concreta de encierro/obstáculo sin añadir más de lo que exige el texto, y funciona de manera natural en español poético.
- source_word: דְּרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis vías
  - mis sendas
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino, ruta o manera. En este contexto poético, «mis caminos» mantiene la amplitud literal e imagen de avance bloqueado. «Mis sendas» también sería posible, pero «caminos» resulta más directo y claro en español.
- source_word: בְּגָזִית
  english_pob_choice: with hewn stone
  chosen_spanish: con piedra labrada
  alternatives_spanish:
  - con piedra tallada
  - con piedra cortada
  - con piedra de sillería
  lexicon: HALOT
  rationale: גָּזִית designa piedra trabajada, hewn/dressed stone. «Piedra labrada» comunica bien la idea de piedra preparada artificialmente y suena natural en español. Mantiene la imagen de una barrera sólida y construida deliberadamente.
- source_word: נְתִיבֹתַי
  english_pob_choice: my paths
  chosen_spanish: mis sendas
  alternatives_spanish:
  - mis caminos
  - mis veredas
  lexicon: HALOT
  rationale: נְתִיבָה es senda, ruta o camino trazado. Aquí conviene distinguir ligeramente de דְּרָכַי, por eso se vierte «mis sendas», conservando el paralelismo poético sin repetir exactamente el mismo término.
- source_word: עִוָּה
  english_pob_choice: has made crooked
  chosen_spanish: ha torcido
  alternatives_spanish:
  - ha hecho torcidas
  - ha retorcido
  - ha desviado
  lexicon: HALOT
  rationale: El verbo significa torcer, inclinar o hacer torcido. «Ha torcido» expresa de forma breve y natural la acción sobre los caminos. En español, «ha hecho crooked» sería artificial; «ha torcido» preserva la imagen sin cargar un matiz moral indebido.
translation_notes:
  revision_awareness: La revisión más reciente indica que no fueron necesarios cambios; el testimonio inglés presenta acuerdo alto con el hebreo. La redacción española sigue ese mismo equilibrio, conservando la imagen concreta de obstáculo y la segunda línea de caminos torcidos sin suavizarla ni moralizarla.
  spanish_consistency_notes:
  - Se distingue entre דְּרָכַי y נְתִיבֹתַי con «caminos» y «sendas» para reflejar el paralelismo hebreo.
  - Se prefirió un verbo concreto («ha cercado») para גָּדַר, manteniendo la idea de encierro físico.
  - «Piedra labrada» refleja el sentido de גָּזִית sin introducir tecnicismos innecesarios.
  - «Ha torcido» preserva el valor espacial del hebreo y evita una paráfrasis interpretativa.
