translation:
  language: es
  text: Si estos hombres mueren como muere toda la humanidad, y la suerte[a] de toda la humanidad les sobreviene, entonces Yahvé no me ha enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la visitación de toda la humanidad les sobreviene»; el hebreo repite la raíz פקד, que puede expresar visitación, designación o lo que le sobreviene a alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si en verdad
  - Si sucede que
  lexicon: HALOT
  rationale: La partícula introduce una prótasis condicional simple; «Si» es la forma natural y fiel en español.
- source_word: כְּמוֹת
  english_pob_choice: die the death of
  chosen_spanish: mueren la muerte de
  alternatives_spanish:
  - mueren como
  - mueren de la misma manera que
  lexicon: HALOT
  rationale: La construcción hebrea es enfática y conserva el eco idiomático de «morir la muerte de». En español, «mueren la muerte de» mantiene esa fuerza sin perder inteligibilidad.
- source_word: כָּל הָאָדָם
  english_pob_choice: all mankind
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - toda la humanidad
  - todo ser humano
  lexicon: HALOT
  rationale: אָדָם aquí tiene sentido genérico/colectivo. «Todos los hombres» comunica el colectivo humano, aunque en español puede sonar más masculino; por eso se deja constancia de alternativas posibles.
- source_word: יְמֻתוּן אֵלֶּה
  english_pob_choice: these men die
  chosen_spanish: estos hombres mueren
  alternatives_spanish:
  - estos mueren
  - estas personas mueren
  lexicon: HALOT
  rationale: El demostrativo se refiere a Coré y su grupo; se explicita «hombres» para naturalidad y referencia personal, sin exceder el alcance del texto.
- source_word: וּפְקֻדַּת
  english_pob_choice: the fate
  chosen_spanish: la suerte
  alternatives_spanish:
  - la visita
  - la visitación
  - el destino
  lexicon: HALOT
  rationale: פְּקֻדָּה admite los valores de visitación, disposición o lo que sobreviene. En este contexto judicial, «la suerte» reproduce el resultado que les toca sin cerrar prematuramente el matiz léxico de visitación.
- source_word: יִפָּקֵד עֲלֵיהֶם
  english_pob_choice: is visited on them
  chosen_spanish: cae sobre ellos
  alternatives_spanish:
  - es visitada sobre ellos
  - les sobreviene
  - se les impone
  lexicon: HALOT
  rationale: El nifal de פקד expresa lo que se cierne o se hace efectivo sobre alguien. «Cae sobre ellos» suena natural en español y conserva la idea de que ese trato les sobreviene.
- source_word: לֹא יְהוָה שְׁלָחָנִי
  english_pob_choice: the LORD has not sent me
  chosen_spanish: Yahvé no me ha enviado
  alternatives_spanish:
  - Yahvé no me envió
  - Yahvé no me mandó
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» conforme a la norma del proyecto para יְהוָה. El perfecto compuesto español expresa adecuadamente la comisión concluida con relevancia presente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. En el español del proyecto se traduce como «Yahvé» para preservar el nombre propio del Dios del pacto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor colectivo de אָדָם
  english_pob_reading: mankind
  chosen_spanish_reading: todos los hombres
  alternative_spanish_readings:
  - toda la humanidad
  - todo ser humano
  rationale: La expresión apunta a la condición humana general, no a varones individuales. «Todos los hombres» conserva el alcance colectivo; se señalan alternativas más inclusivas por si el comité prefiere una formulación menos marcada.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context)'
- issue: Tensión léxica de פקד / פְּקֻדָּה
  english_pob_reading: the fate ... is visited on them
  chosen_spanish_reading: la suerte ... cae sobre ellos
  alternative_spanish_readings:
  - la visitación ... es visitada sobre ellos
  - el trato ... les sobreviene
  rationale: El hebreo repite פקד, lo que deja abierta la idea de visitación, disposición o lo que acontece a alguien. La versión española conserva la ambigüedad útil con «suerte» y «cae sobre ellos», sin borrar el posible trasfondo de visitación.
  doctrine_reference: POB lexical note on פקד / פְקֻדָּה
translation_notes:
  revision_awareness: Se revisó el pasaje con alta concordancia editorial; no se requirieron cambios de fondo respecto del último pase. La presente redacción ajusta únicamente la salida al español, preservando la tensión léxica de פקד y la referencia al nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene la repetición conceptual de muerte/suerte para reflejar el paralelismo hebreo.
  - «Todos los hombres» se conserva como traducción del colectivo אָדָם, con nota sobre alternativas más inclusivas.
