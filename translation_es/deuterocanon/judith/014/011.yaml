translation:
  language: es
  text: Y cuando despuntó el alba[a], colgaron la cabeza de Holofernes desde el muro, y todo hombre de Israel tomó sus armas y salieron en compañías hacia las subidas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Despuntó el alba» conserva la imagen del griego, que literalmente dice que «subió» la aurora o el alba.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacia las ascensiones» o «hacia las subidas»; probablemente se refiere a los accesos en subida o pasos elevados.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡνίκα
  english_pob_choice: when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Cuando
  - Y al tiempo que
  lexicon: LSJ
  rationale: La conjunción temporal introduce el cambio de escena de manera directa; «cuando» conserva la relación temporal sin añadir matices no presentes en el griego.
- source_word: ὁ ὄρθρος ἀνέβη
  english_pob_choice: dawn came up
  chosen_spanish: despuntó el alba
  alternatives_spanish:
  - amaneció
  - subió el alba
  - llegó el alba
  lexicon: LSJ
  rationale: El griego dice literalmente que «el alba subió/ascendió». «Despuntó el alba» conserva la imagen de comienzo visible del día y suena natural en español sin perder el movimiento metafórico.
- source_word: ἐκρέμασαν
  english_pob_choice: they hung
  chosen_spanish: colgaron
  alternatives_spanish:
  - suspendieron
  - exhibieron colgada
  lexicon: LSJ
  rationale: El aoristo activo simple pide un verbo directo. «Colgaron» mantiene el acto y la exhibición pública implicada por el contexto.
- source_word: τὴν κεφαλὴν Ὀλοφέρνου
  english_pob_choice: the head of Holofernes
  chosen_spanish: la cabeza de Holofernes
  alternatives_spanish:
  - la cabeza de Holofernes
  - la cabeza perteneciente a Holofernes
  lexicon: LSJ
  rationale: 'La construcción es transparente: objeto directo con genitivo de posesión. En español, «la cabeza de Holofernes» expresa fielmente la relación sin sobreexplicar.'
- source_word: ἐκ τοῦ τείχους
  english_pob_choice: from the wall
  chosen_spanish: desde el muro
  alternatives_spanish:
  - desde la muralla
  - del muro
  - sobre el muro
  lexicon: LSJ
  rationale: La preposición ἐκ con este contexto puede señalar el punto de suspensión y de exhibición. «Desde el muro» conserva la relación espacial literal y evita interpretar que estaba simplemente encima del muro.
- source_word: πᾶς ἀνὴρ Ἰσραήλ
  english_pob_choice: every man of Israel
  chosen_spanish: todo hombre de Israel
  alternatives_spanish:
  - cada hombre de Israel
  - todos los hombres de Israel
  - todo israelita varón
  lexicon: LSJ
  rationale: El griego es distributivo y masculino singular. «Todo hombre de Israel» preserva esa fuerza y la referencia masculina explícita sin neutralizarla.
- source_word: ἀνέλαβεν
  english_pob_choice: took up
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó las armas
  - empuñó
  - levantó
  lexicon: LSJ
  rationale: El verbo militar puede traducirse como «tomó» o «tomó las armas». Para evitar redundancia con el objeto inmediato y mantener fluidez, «tomó sus armas» transmite el sentido de prepararse para la acción.
- source_word: τὰ ὅπλα αὐτοῦ
  english_pob_choice: his weapons
  chosen_spanish: sus armas
  alternatives_spanish:
  - sus armas
  - sus armas de guerra
  - su armamento
  lexicon: LSJ
  rationale: ὅπλα designa armas en sentido amplio. «Sus armas» es claro y suficientemente literal para el español actual.
- source_word: ἐξήλθοσαν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salieron
  - marchó
  - se dirigió
  lexicon: LSJ
  rationale: Aunque el sujeto colectivo es plural en sentido distributivo, el griego usa una construcción coordinada que puede sonar natural en español con un sujeto distributivo. No obstante, la forma más transparente sería «salieron»; se opta por «salió» si se toma la lectura distributiva y el estilo narrativo compacto, pero la concordancia plural puede ser preferible en revisión. En el texto final se mantiene la lectura natural plural implícita mediante el sujeto distributivo 'todo hombre' y la acción colectiva.
- source_word: κατὰ σπείρας
  english_pob_choice: in companies
  chosen_spanish: en compañías
  alternatives_spanish:
  - en grupos
  - en destacamentos
  - en escuadras
  lexicon: LSJ
  rationale: La frase indica agrupaciones organizadas o por secciones. «En compañías» conserva el valor militar-organizativo que documenta el inglés POB, sin añadir tecnicismo excesivo.
- source_word: ἐπὶ τὰς ἀναβάσεις
  english_pob_choice: to the ascents
  chosen_spanish: hacia las alturas
  alternatives_spanish:
  - hacia las subidas
  - hacia las ascensiones
  - hacia los accesos en cuesta
  lexicon: LSJ
  rationale: «Las ascensiones» sería demasiado abstracto y calcado. «Las alturas» comunica la dirección ascendente y puede abarcar los accesos elevados o pasos sin especificarlos más de lo que el griego permite.
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés POB que prefirió «to the ascents» frente a una especificación interpretativa como «mountain passes». Por eso el español evita concretar la geografía y usa una expresión direccional más general. También se evitó introducir equivalentes tradicionales no documentados para ὅπλα, τείχος o ἀναβάσεις.
  spanish_consistency_notes:
  - Se mantuvo «Holofernes» como nombre propio transliterado estándar y se evitó hispanizarlo.
  - Se conservó el registro narrativo sobrio y militar del pasaje.
  - Se prefirió una solución natural en español para el movimiento del alba sin perder la imagen ascendente del griego.
  - No se introdujeron términos eclesiásticos ajenos al contexto narrativo.
  - 'La sintaxis intenta seguir de cerca la secuencia griega: alba -> exhibición de la cabeza -> preparación militar -> salida organizada.'
