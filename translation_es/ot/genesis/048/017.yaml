translation:
  language: es
  text: Cuando José vio que su padre había puesto su mano derecha sobre la cabeza de Efraín, le desagradó[a], y sostuvo la mano de su padre para quitarla de la cabeza de Efraín y ponerla sobre la cabeza de Manasés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «fue malo/desagradable en sus ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When Joseph saw
  chosen_spanish: Cuando José vio
  alternatives_spanish:
  - Y José vio
  - Al ver José
  lexicon: HALOT
  rationale: La forma con valor narrativo introductorio se expresa naturalmente en español con «Cuando», conservando la secuencia temporal del relato sin perder el avance del waw-consecutivo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Introduce el contenido de lo que José vio: que su padre había puesto la mano. «Que» es la correspondencia natural y evita una lectura causal.'
- source_word: יָשִׁית
  english_pob_choice: had placed
  chosen_spanish: había puesto
  alternatives_spanish:
  - estaba poniendo
  - puso
  lexicon: HALOT
  rationale: El verbo שׁית/שׂים significa poner/colocar. El pluscuamperfecto español refleja bien la anterioridad desde la perspectiva de José.
- source_word: יַד יְמִינוֹ
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - la mano de su derecha
  - su diestra
  lexicon: HALOT
  rationale: Es una frase idiomática de movimiento físico concreto. «Mano derecha» comunica el gesto de bendición con claridad y evita un calco forzado.
- source_word: עַל רֹאשׁ אֶפְרַיִם
  english_pob_choice: on Ephraim’s head
  chosen_spanish: sobre la cabeza de Efraín
  alternatives_spanish:
  - encima de la cabeza de Efraín
  - en la cabeza de Efraín
  lexicon: HALOT
  rationale: «Sobre» preserva la imagen espacial exacta del gesto y su valor ritual sin volver la frase innecesariamente rígida.
- source_word: וַיֵּרַע בְּעֵינָיו
  english_pob_choice: it was displeasing in his sight
  chosen_spanish: le pareció mal[a] en sus ojos
  alternatives_spanish:
  - le desagradó
  - le pareció malo
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea de «en sus ojos» para no borrar la imagen textual. «Le pareció mal» expresa el juicio de desaprobación sin convertirlo en una valoración moral absoluta.
- source_word: וַיִּתְמֹךְ
  english_pob_choice: he took hold of
  chosen_spanish: tomó la mano
  alternatives_spanish:
  - agarró la mano
  - sujetó la mano
  lexicon: HALOT
  rationale: En este contexto תמך describe una acción física para dirigir la mano del padre. «Tomó la mano» es una solución natural en español que mantiene la acción de sujetar y redirigir.
- source_word: יַד אָבִיו
  english_pob_choice: his father’s hand
  chosen_spanish: la mano de su padre
  alternatives_spanish:
  - la mano paterna
  - la mano de su padre
  lexicon: HALOT
  rationale: La construcción posesiva es directa y clara en español. Se preserva la referencia relacional sin añadir matiz interpretativo.
- source_word: לְהָסִיר אֹתָהּ
  english_pob_choice: to remove it
  chosen_spanish: para quitarla
  alternatives_spanish:
  - para retirarla
  - para apartarla
  lexicon: HALOT
  rationale: הסיר es «quitar/retirar/apartar». «Quitarla» es breve y natural para el movimiento de la mano en la escena.
- source_word: מֵעַל רֹאשׁ אֶפְרַיִם
  english_pob_choice: from Ephraim’s head
  chosen_spanish: de sobre la cabeza de Efraín
  alternatives_spanish:
  - de encima de la cabeza de Efraín
  - de la cabeza de Efraín
  lexicon: HALOT
  rationale: La preposición compuesta reproduce el punto de partida del gesto, manteniendo el desplazamiento físico de la mano.
- source_word: עַל רֹאשׁ מְנַשֶּׁה
  english_pob_choice: to Manasseh’s head
  chosen_spanish: sobre la cabeza de Manasés
  alternatives_spanish:
  - a la cabeza de Manasés
  - encima de la cabeza de Manasés
  lexicon: HALOT
  rationale: Se conserva la meta del movimiento con la misma imagen espacial que en la primera mitad del versículo.
theological_decisions:
- issue: La expresión idiomática hebrea וַיֵּרַע בְּעֵינָיו
  english_pob_reading: it was displeasing in his sight
  chosen_spanish_reading: le pareció mal en sus ojos
  alternative_spanish_readings:
  - le desagradó
  - le pareció malo
  rationale: La decisión preserva la metáfora de los «ojos» como sede de evaluación, tal como el inglés POB mantiene «in his sight/eyes». Se evita neutralizar por completo la imagen idiomática, pero también se evita un giro que sugiera maldad moral del hecho mismo.
  doctrine_reference: Hebreo idiomático y semántica contextual; sin implicación doctrinal directa, pero relevante para la fidelidad textual.
translation_notes:
  revision_awareness: El texto inglés final revisó «in his eyes» a «in his sight» por naturalidad, pero el hebreo conserva la imagen de «sus ojos». En español se mantuvo la metáfora («en sus ojos») para reflejar el original, añadiendo una nota que admite la opción más suave «le desagradó». También se siguió la revisión que simplifica el destino final del gesto, expresándolo con movimiento claro hacia la cabeza de Manasés.
  spanish_consistency_notes:
  - Se usa «José», «Efraín» y «Manasés» de forma consistente con la tradición bíblica en español.
  - Se mantuvo «mano derecha» en lugar de «diestra» para un registro claro y contemporáneo.
  - Se conservó la imagen corporal de «en sus ojos» por coherencia con el hebreo y con la decisión auditada del POB inglés.
