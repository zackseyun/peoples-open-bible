translation:
  language: es
  text: ¿Quién me llevará a la ciudad fortificada? ¿Quién me conducirá a Edom?[a][b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién me llevará a Edom?». El segundo verbo puede entenderse con valor futuro, en paralelo con el primero, aunque formalmente el hebreo usa un perfecto («me ha conducido»).'
    reason: lexical_alternative
  - marker: b
    text: «La ciudad fortificada» puede referirse a una fortaleza edomita específica, tradicionalmente identificada por muchos como Sela/Petra, aunque el texto hebreo no nombra la ciudad.
    reason: cultural_note
  - marker: c
    text: 'O: «me ha conducido».'
    reason: previous_rendering
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién será el que
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, suficiente para mantener el tono retórico del hebreo sin añadir peso explicativo innecesario.
- source_word: יֹבִלֵנִי
  english_pob_choice: will bring me
  chosen_spanish: me llevará
  alternatives_spanish:
  - me traerá
  - me conducirá
  lexicon: HALOT
  rationale: El hifil de יבל expresa llevar/conducir a alguien hacia un destino. 'Me llevará' conserva la direccionalidad y el futuro modal del cuestionamiento poético; 'me traerá' suena menos preciso aquí.
- source_word: עִיר מִבְצָר
  english_pob_choice: the fortified city
  chosen_spanish: la ciudad fortificada
  alternatives_spanish:
  - la ciudad amurallada
  - la ciudad fuerte
  lexicon: HALOT
  rationale: La cadena constructa significa literalmente 'ciudad de fortaleza/fortificación'. En español, 'ciudad fortificada' transmite el valor adjetival con naturalidad y sin perder la imagen militar.
- source_word: נָחַנִי
  english_pob_choice: will lead me
  chosen_spanish: me conducirá
  alternatives_spanish:
  - me llevará
  - me guiará
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecto, el contexto poético y la decisión auditada en inglés favorecen un valor futuro/modal coordinado con el primer colon. 'Conducirá' preserva el sentido de dirigir hacia un objetivo y evita un pasado engañoso en español.
- source_word: עַד אֱדֽוֹם
  english_pob_choice: to Edom
  chosen_spanish: hasta Edom
  alternatives_spanish:
  - a Edom
  - hasta la región de Edom
  lexicon: HALOT
  rationale: עַד marca límite o extensión. 'Hasta Edom' refleja mejor ese matiz que un simple 'a Edom' y mantiene el paralelismo con el verso anterior. Se conserva el nombre propio 'Edom' por transliteración estándar.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado más reciente del contexto en inglés: se evitó el pasado en el segundo colon por la revisión que favorece un sentido futuro/modal paralelo. También se respetó la última decisión editorial de traducir עַד אֱדוֹם de forma más directa como un destino hacia Edom, manteniendo el registro poético y la transparencia fuente-texto.'
  spanish_consistency_notes:
  - Se usó 'Edom' de manera consistente como nombre propio transliterado.
  - Se evitó 'SEÑOR' u otra sustitución teológica, porque el verso no contiene el Tetragrámaton ni un equivalente directo.
  - '''Ciudad fortificada'' conserva mejor la imagen del hebreo que ''ciudad fuerte'' en español bíblico contemporáneo.'
  - Se mantuvo la estructura interrogativa paralela de dos miembros para reflejar la retórica del original.
