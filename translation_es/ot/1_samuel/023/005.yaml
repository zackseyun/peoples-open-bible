revisions:
- from: Así David y sus hombres fueron a Keila y combatieron contra los filisteos[a], y les arrebató su ganado y los hirió con un gran golpe[b]. Así David salvó a los habitantes de Keila[c].
  to: Así David y sus hombres fueron a Keila y combatieron contra los filisteos, y se llevó su ganado[a] y les asestó un gran golpe[b]. Así David salvó[c] a los habitantes de Keila.
  rationale: Se ajustó el verbo de נהג a 'se llevó' para evitar una sobreinterpretación y mejorar la naturalidad del español, y se cambió 'los hirió con un gran golpe' por 'les asestó un gran golpe' para reflejar mejor el modismo militar hebreo. También se reubicó la primera nota al término relacionado con מִקְנֶה, donde la alternativa léxica es realmente relevante.
