    reason: lexical_alternative
  revision_rationale: Se ajusta «hirió» a «golpeó» para reflejar mejor נכה en un contexto militar colectivo con un español más natural, y se cambia «de la mano de» por «de manos de» para mayor fluidez idiomática sin perder el valor de מִיַּד. Se conserva la nota del modismo «sus hijas».
