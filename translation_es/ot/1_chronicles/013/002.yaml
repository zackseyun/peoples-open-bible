base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/013/002.yaml
  text: And David said to all the assembly of Israel[a], “If it seems good to you, and if it is from Yahweh our God, let us send word to our brothers who remain in all the lands of Israel, and also to the priests and Levites with them in the cities of their pasturelands[d][c][b], that they may gather to us.”
  footnotes:
  - marker: a
    text: Hebrew literally, 'let us break out; let us send.' The expression likely means to send out broadly or widely.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to fellow Israelites in a representative sense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'regions of Israel'; Hebrew has the plural 'lands.'
    reason: lexical_alternative
  - marker: d
    text: That is, the open lands or pasturelands belonging to their cities.
    reason: cultural_note
