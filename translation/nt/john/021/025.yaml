id: JHN.21.25
reference: John 21:25
source:
  edition: SBLGNT
  text: ἔστιν δὲ καὶ ἄλλα πολλὰ ⸀ἃ ἐποίησεν ὁ Ἰησοῦς, ἅτινα ἐὰν γράφηται καθ’ ἕν, οὐδ’ αὐτὸν οἶμαι τὸν κόσμον ⸀χωρήσειν τὰ γραφόμενα ⸀βιβλία.
translation:
  text: Now there are also many other things that Jesus did[a], which, if they were written down one by one, I suppose that not even the world itself would have room for the books being written.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'would contain the books that would be written.' The Greek verb can mean 'have room for' or 'contain,' and the participle may be rendered more idiomatically as a future-result idea.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: Rendered as a mild discourse transition. 'Now' fits English style at the close of the Gospel better than a wooden 'and' while preserving continuity.
- source_word: ἄλλα πολλὰ
  chosen: many other things
  alternatives:
  - many more things
  - other many things
  lexicon: BDAG
  rationale: Natural English order for the neuter plural phrase; preserves both plurality and the sense of additional deeds beyond those recorded.
- source_word: ἃ ἐποίησεν
  chosen: that Jesus did
  alternatives:
  - which Jesus did
  - that Jesus made/did
  lexicon: BDAG
  rationale: ποιέω here refers broadly to actions/deeds. 'Did' is the most natural and sufficiently broad rendering.
- source_word: ἅτινα
  chosen: which
  alternatives:
  - and these
  - things which
  lexicon: BDAG
  rationale: Introduces an explanatory relative clause referring back to the many other things. 'Which' is concise and natural in English.
- source_word: ἐὰν γράφηται
  chosen: if they were written down
  alternatives:
  - if they were written
  - if one were to write them
  lexicon: BDAG
  rationale: Passive present subjunctive with ἐάν expresses a hypothetical condition. 'Written down' is idiomatic English and makes explicit the recording sense without adding content.
- source_word: καθ’ ἕν
  chosen: one by one
  alternatives:
  - individually
  - in detail
  lexicon: BDAG
  rationale: The phrase literally means 'according to one,' idiomatically 'one by one' or 'individually.' 'One by one' best preserves the distributive force.
- source_word: οὐδ’ αὐτὸν ... τὸν κόσμον
  chosen: not even the world itself
  alternatives:
  - not even the world
  - the world itself not even
  lexicon: BDAG
  rationale: αὐτόν is intensive here, not reflexive. 'The world itself' captures the emphasis.
- source_word: οἶμαι
  chosen: I suppose
  alternatives:
  - I think
  - I imagine
  lexicon: BDAG
  rationale: Retains the author's personal rhetorical aside. 'I suppose' sounds natural and preserves the modest, reflective tone.
- source_word: χωρήσειν
  chosen: would have room for
  alternatives:
  - would contain
  - would make room for
  lexicon: BDAG
  rationale: χωρέω can mean 'have room for' or 'contain.' 'Would have room for' best matches the spatial imagery of the hyperbole.
- source_word: τὰ γραφόμενα βιβλία
  chosen: the books being written
  alternatives:
  - the books that would be written
  - the written books
  lexicon: BDAG
  rationale: γραφόμενα is a present passive participle, literally 'being written.' This preserves the Greek form more closely, though in context it points to the hypothetical books that would result from writing everything down.
