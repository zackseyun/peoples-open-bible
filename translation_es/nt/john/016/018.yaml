translation:
  language: es
  text: ‘Entonces decían: «¿Qué es esto que dice: “Un poco”? No sabemos lo que dice»’
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: ellos decían
  alternatives_spanish:
  - ellos estaban diciendo
  - ellos seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego sugiere una acción continuada o reiterada. «Decían» conserva ese aspecto de forma natural en español; «estaban diciendo» es posible, pero suena más pesado.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuación lógica respecto del contexto anterior. «Así que» mantiene la conexión discursiva sin forzar un tono demasiado formal.
- source_word: Τί ἐστιν τοῦτο
  english_pob_choice: What is this
  chosen_spanish: ¿Qué es esto?
  alternatives_spanish:
  - ¿Qué significa esto?
  - ¿Qué cosa es esto?
  lexicon: BDAG
  rationale: La pregunta griega es directa y expresa desconcierto. «¿Qué es esto?» sigue de cerca la forma del original; «¿Qué significa esto?» interpreta más de lo que dice el griego.
- source_word: ὃ λέγει μικρόν
  english_pob_choice: that he says, ‘A little while’
  chosen_spanish: 'que dice: ‘Dentro de un poco’'
  alternatives_spanish:
  - 'que dice: ‘Un poco más’'
  - 'que dice: ‘Un poco de tiempo’'
  lexicon: BDAG
  rationale: El relativo introduce la expresión que Jesús pronunció. «Dentro de un poco» comunica en español la idea temporal de μικρόν con naturalidad; se mantiene la cita porque el texto enfoca la frase que desconcierta a los discípulos.
- source_word: μικρόν
  english_pob_choice: A little while
  chosen_spanish: dentro de un poco
  alternatives_spanish:
  - por un poco
  - por un breve tiempo
  lexicon: BDAG
  rationale: En este contexto funciona adverbialmente para un lapso corto. «Dentro de un poco» es idiomático en español y conserva la brevedad del tiempo mencionado.
- source_word: οὐκ οἴδαμεν
  english_pob_choice: We do not know
  chosen_spanish: No sabemos
  alternatives_spanish:
  - No conocemos
  - No entendemos
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento; en español, «no sabemos» es la equivalencia más directa y natural. «No entendemos» desplaza el sentido hacia comprensión interpretativa.
- source_word: τί λαλεῖ
  english_pob_choice: what he is saying
  chosen_spanish: lo que dice
  alternatives_spanish:
  - lo que está diciendo
  - lo que habla
  lexicon: BDAG
  rationale: La revisión inglesa volvió a una forma más literal para λαλεῖ. En español, «lo que dice» conserva esa literalidad sin repetir innecesariamente la estructura previa; «lo que está diciendo» es también posible, pero más largo.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «what he is talking about» a «what he is saying» para reflejar más de cerca λαλεῖ. En español se siguió esa preferencia por una forma más literal y se evitó interpretar la frase como explicación del significado, manteniendo el desconcierto de los discípulos.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - Se evitó «Cristo/Mesías» porque no aparece en el texto.
  - Se mantuvo un registro sobrio y bíblico, pero con sintaxis española natural.
  - La cita dentro de la pregunta se conservó para reflejar la estructura del griego y el énfasis en la frase «Dentro de un poco».
