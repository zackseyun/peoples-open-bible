revisions:
- from: Y si un hombre golpea a su esclavo[a] o a su esclava con una vara[b], y muere bajo su mano, será sin duda vengado[c].
  to: Y si un hombre golpea a su esclavo o a su esclava con una vara[a], y el esclavo muere bajo su mano, deberá ser vengado sin falta[b].
  rationale: Se explicita «el esclavo» para resolver la ambigüedad del sujeto, en línea con la revisión documentada del POB inglés. También se ajusta la cláusula final a una formulación española más clara y jurídicamente natural, conservando la pasiva y la intensidad de נָקֹם יִנָּקֵם, con «castigado» mantenido solo como alternativa en nota. Se elimina la nota sobre «esclavo varón» por ser redundante en español.
