translation:
  language: es
  text: 'Por esto serán puestos a prueba: por vida de Faraón, no saldrán de este lugar[a] a menos que venga aquí su hermano más joven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “si salen de aquí”; en esta construcción de juramento, “si” expresa una negación enfática: “no saldrán de aquí”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּזֹאת
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Con esto
  - Mediante esto
  lexicon: HALOT
  rationale: El ב instrumental con זאת introduce el criterio o medio de prueba; “Por esto” mantiene la función instrumental de forma natural en español y evita un calco rígido.
- source_word: תִּבָּחֵנוּ
  english_pob_choice: you will be tested
  chosen_spanish: serán puestos a prueba
  alternatives_spanish:
  - serán examinados
  - serán probados
  lexicon: HALOT
  rationale: El nifal de בחן expresa ser sometido a prueba/examen. “Puestos a prueba” conserva el sentido de verificación sin sonar técnico o escolar.
- source_word: חֵי פַרְעֹה
  english_pob_choice: as Pharaoh lives
  chosen_spanish: ¡vive Faraón!
  alternatives_spanish:
  - por la vida de Faraón
  - ¡por vida de Faraón!
  lexicon: HALOT
  rationale: La fórmula es un juramento que invoca la vida de Faraón. En español, “¡vive Faraón!” preserva la exclamación juramentaria breve y sonora; la nota aclara la literalidad del hebreo.
- source_word: אִם תֵּצְאוּ מִזֶּה
  english_pob_choice: you shall not leave this place
  chosen_spanish: no saldrán de este lugar
  alternatives_spanish:
  - si salen de aquí
  - saldrán de aquí solo si no
  lexicon: HALOT
  rationale: Después de un juramento, אִם puede funcionar como negación enfática elíptica. La POB inglesa opta por reflejar la fuerza negativa; en español, “no saldrán” comunica esa fuerza de manera natural.
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - salvo que
  - excepto que
  lexicon: HALOT
  rationale: La secuencia introduce la única excepción a la negativa. “A menos que” es la equivalencia más natural y fiel al valor exceptivo.
- source_word: בְּבוֹא
  english_pob_choice: comes
  chosen_spanish: venga
  alternatives_spanish:
  - cuando venga
  - al venir
  lexicon: HALOT
  rationale: El infinitivo constructo con ב indica la circunstancia bajo la cual se permite salir. En español, una cláusula con subjuntivo tras “a menos que” expresa bien la condición.
- source_word: אֲחִיכֶם הַקָּטֹן
  english_pob_choice: your youngest brother
  chosen_spanish: su hermano menor
  alternatives_spanish:
  - su hermano pequeño
  - su hermano más joven
  - su hermano menor de edad
  lexicon: HALOT
  rationale: El hebreo literalmente dice “el pequeño/menor de ustedes” en contexto fraternal. En español, “hermano menor” comunica la referencia a Benjamín sin introducir una precisión no necesaria como “más joven”.
- source_word: הֵנָּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - hasta aquí
  - hacia aquí
  lexicon: HALOT
  rationale: El adverbio direccional mantiene el valor de movimiento al lugar de habla. “Aquí” es la forma más idiomática y breve en español.
theological_decisions:
- issue: Valor del juramento con la vida de Faraón
  english_pob_reading: as Pharaoh lives
  chosen_spanish_reading: ¡vive Faraón!
  alternative_spanish_readings:
  - por la vida de Faraón
  - ¡por vida de Faraón!
  rationale: No se trata de una referencia devocional sino de una fórmula juramentaria egipcia. La traducción conserva el peso retórico del juramento sin suavizarlo a una simple muletilla.
  doctrine_reference: N/A
- issue: Sentido negativo de אִם tras juramento
  english_pob_reading: you shall not leave this place
  chosen_spanish_reading: no saldrán de este lugar
  alternative_spanish_readings:
  - si salen de este lugar
  - ustedes no saldrán de este lugar
  rationale: El hebreo usa una construcción elíptica en contexto de juramento que funciona como negación enfática. La lectura española sigue el sentido pragmático señalado por la POB inglesa y evita una condicional literal que oscurecería el sentido.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión reciente del POB inglés concluyó sin cambios, con alta concordancia entre revisores. Por ello, esta versión española sigue de cerca la lectura establecida: preserva la fuerza del juramento, la negación enfática de אִם y la excepción introducida por כִּי אִם, sin añadir glosa interpretativa innecesaria.'
  spanish_consistency_notes:
  - Se mantiene “Faraón” con mayúscula como nombre propio.
  - Se usa “hermano menor” para reflejar el valor contextual de הַקָּטֹן sin sobreexplicar.
  - La puntuación separa la fórmula juramentaria con punto y coma para reproducir la pausa retórica del hebreo y del inglés POB.
