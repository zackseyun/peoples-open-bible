translation:
  language: es
  text: Pues cuando Antíoco y sus amigos iban con ella al lugar[a], lo llevaban allí para apoderarse del dinero[b], con el pretexto de una inspección.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este versículo es sintácticamente difícil en el texto transmitido, y hay incertidumbre en los detalles de sujeto, objeto y referencia pronominal.
    reason: textual_variant
  - marker: b
    text: 'O: «para tomar posesión de la suma mayor de dinero, con motivo de inspección».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνοικῶν
  english_pob_choice: were accompanying
  chosen_spanish: iban con ella
  alternatives_spanish:
  - acompañaban a ella
  - iban acompañándola
  lexicon: LSJ
  rationale: El participio transmite estar yendo juntamente; en español, «iban con ella» reproduce la relación de acompañamiento sin forzar un sentido literal de «vivir con». La forma evita una solución demasiado mecánica y encaja con el movimiento narrativo.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - a él
  - a ello
  lexicon: Greek grammar
  rationale: El griego transmitido presenta un dativo femenino. Se conserva «ella» en el texto español para no normalizar silenciosamente la referencia pronominal, que forma parte de la dificultad sintáctica documentada.
- source_word: παρῆγεν εἰς τὸν τόπον
  english_pob_choice: were bringing him there to the place
  chosen_spanish: la llevaban allí
  alternatives_spanish:
  - lo conducían al lugar
  - la conducían al lugar
  lexicon: LSJ
  rationale: παρῆγεν admite el valor de traer o llevar. Dado el sujeto plural y la marcha hacia un lugar concreto, «la llevaban allí» conserva el sentido de traslado y el vínculo con el pronombre femenino del texto transmitido.
- source_word: οἱ σὺν αὐτῷ φίλοι
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus compañeros
  - los amigos que estaban con él
  lexicon: LSJ
  rationale: «Sus amigos» es la forma natural y fiel para este grupo asociado a Antíoco. Mantiene la relación posesiva y evita una paráfrasis innecesaria.
- source_word: κύριον τὸ λαβεῖν
  english_pob_choice: to gain control
  chosen_spanish: apoderarse
  alternatives_spanish:
  - ganar control
  - tomar posesión
  lexicon: LSJ
  rationale: La expresión apunta a obtener dominio o control efectivo, no solo a recibir o tomar físicamente. «Apoderarse» comunica esa fuerza con naturalidad en español.
- source_word: τὰ χρήματα πλείονα
  english_pob_choice: the money
  chosen_spanish: del dinero
  alternatives_spanish:
  - de la mayor suma de dinero
  - del mayor monto de dinero
  lexicon: LSJ
  rationale: El sintagma griego sugiere una suma mayor, pero la sintaxis es difícil. «Del dinero» mantiene el núcleo semántico en un español publicable, dejando la precisión cuantitativa para la nota alternativa.
- source_word: εἰς ἐφορῆς λόγον
  english_pob_choice: under the pretext of inspection
  chosen_spanish: con el pretexto de una inspección
  alternatives_spanish:
  - a título de inspección
  - con motivo de supervisión
  lexicon: LSJ
  rationale: La frase expresa una razón alegada o pretexto vinculado con inspección/supervisión. «Con el pretexto de una inspección» conserva el matiz idiomático y la sospecha implícita del contexto.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir un verbo de traslado más natural para παρῆγεν, y se mantuvo el resto de la solución en línea con el contexto de dificultad sintáctica señalado por el texto inglés. La decisión española conserva la ambigüedad del griego transmitido, especialmente en la referencia pronominal femenina y en el matiz de control sobre el dinero.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece un término divino en este versículo.
  - Se usó «inspección» para mantener la relación con ἐφορῆς sin convertirla en una explicación interpretativa más amplia.
  - Se preservó la ambigüedad textual documentada en la nota a, sin resolverla por conjetura.
  - «Apoderarse» se prefirió por su fuerza semántica frente a opciones más débiles como «tomar» o más técnicas como «tomar posesión».
