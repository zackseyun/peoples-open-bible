revisions:
- from: 'Entonces los oficiales de los hijos de Israel los vieron en apuro cuando se les dijo[a]: «No deben reducir[b] el número de sus ladrillos, la cuota diaria, día tras día».'
  to: 'Entonces los oficiales de los hijos de Israel se vieron en apuros cuando se les dijo[a]: «No deben reducir el número de sus ladrillos, la cuota de cada día[b]».'
  rationale: Se corrigió la referencia de אֹתָם con una construcción reflexiva natural en español («se vieron en apuros»), se mejoró la idiomaticidad de «en apuros», y se ajustó la cláusula final para reflejar el sentido de cuota diaria de דְּבַר יוֹם בְּיוֹמוֹ sin introducir el matiz de duración de «día tras día». También se alineó la nota con el modismo hebreo relevante.
