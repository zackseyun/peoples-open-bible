translation:
  text: and he was called by his name[a]. And from these[b], those who were searched for in the genealogical record in the enrollment, and were not found, were excluded from serving as priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was named after his name.' The Greek opening clause is compressed and its immediate referent is not fully explicit in this verse alone.
    reason: lexical_alternative
  - marker: b
    text: That is, they could not verify their ancestry in the official genealogical register and so were disqualified from priestly service.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκλήθη
  chosen: was called
  alternatives:
  - was named
  - was summoned
  lexicon: LSJ
  rationale: The passive of καλέω with ἐπὶ τῷ ὀνόματι naturally means 'was called/named by the name.' 'Was summoned' is possible for καλέω generally, but the following phrase about the name points to naming/identification, not summoning.
- source_word: ἐπὶ τῷ ὀνόματι αὐτοῦ
  chosen: by his name
  alternatives:
  - in his name
  - after his name
  lexicon: LSJ
  rationale: This phrase most naturally indicates designation or identification by a name. 'By his name' preserves the Greek closely while remaining intelligible. The referent is somewhat compressed in Greek, so a more expansive rendering would risk overinterpretation.
- source_word: ἐζητήθησαν
  chosen: were searched for
  alternatives:
  - were sought
  - were investigated
  lexicon: LSJ
  rationale: The passive indicates that these persons were looked for in the record. 'Were searched for' keeps the procedural sense in context of documentary verification.
- source_word: τῆς γενικῆς γραφῆς
  chosen: the genealogical record
  alternatives:
  - the family register
  - the ancestral document
  lexicon: LSJ
  rationale: Given the priestly eligibility context and the parallel in Ezra/Nehemiah, the phrase refers to a genealogical register. 'Genealogical record' is clear modern English and preserves the documentary sense of γραφή.
- source_word: ἐν τῷ καταλοχισμῷ
  chosen: in the enrollment
  alternatives:
  - in the registration
  - in the muster
  lexicon: LSJ
  rationale: The noun denotes arrangement by list or enrollment. 'Enrollment' fits the administrative context and avoids overly military connotations that 'muster' might suggest here.
- source_word: μὴ εὑρεθείσης
  chosen: were not found
  alternatives:
  - not having been found
  - was not found
  lexicon: LSJ
  rationale: The genitive absolute is rendered idiomatically in English with a finite passive clause. The sense is that their names/records were not found in the register.
- source_word: ἐχωρίσθησαν
  chosen: were excluded
  alternatives:
  - were separated
  - were removed
  lexicon: LSJ
  rationale: In this context the verb indicates disqualification from priestly service. 'Were excluded' communicates the practical result more clearly than the more literal 'were separated.'
- source_word: τοῦ ἱερατεύειν
  chosen: from serving as priests
  alternatives:
  - from the priesthood
  - from ministering as priests
  lexicon: LSJ
  rationale: The infinitive expresses priestly service rather than merely abstract status. 'From serving as priests' is both accurate and readable.
