base_translation:
  language: en
  yaml_path: translation/ot/leviticus/015/026.yaml
  text: Every bed on which she lies during all the days of her discharge shall be to her like the bed of her menstruation[a], and every vessel on which she sits shall be unclean[b], like the uncleanness of her menstruation.
  footnotes:
  - marker: a
    text: Or 'like the bed of her menstrual impurity.' The Hebrew term נִדָּה can denote the menstrual state with its associated ritual separation.
    reason: lexical_alternative
  - marker: b
    text: '''Vessel'' is a broad term here for an article or object she sits on, not only a container.'
    reason: lexical_alternative
