translation:
  language: es
  text: Por eso los sacerdotes de Dagón y todos los que entran en la casa de Dagón en Asdod no pisan el umbral de Dagón hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Expresa bien la consecuencia del relato anterior en un español natural y mantiene el valor causal/consecutivo del hebreo.
- source_word: לֹא יִדְרְכוּ
  english_pob_choice: do not tread
  chosen_spanish: no pisan
  alternatives_spanish:
  - no pisan con el pie
  - no pisan sobre
  - no transitan
  lexicon: HALOT
  rationale: דרך significa 'pisar/tropear'. En español, 'no pisan' comunica con naturalidad la práctica evitada; con 'umbral' evita una construcción pesada.
- source_word: כֹהֲנֵי דָגוֹן
  english_pob_choice: the priests of Dagon
  chosen_spanish: los sacerdotes de Dagon
  alternatives_spanish:
  - los sacerdotes de Dagón
  - los sacerdotes de Dagn
  lexicon: HALOT
  rationale: Se conserva el nombre del ídolo/dios filisteo como nombre propio. La forma 'Dagon' coincide con el contexto bíblico y evita una adaptación innecesaria.
- source_word: וְכָל הַבָּאִים בֵּית דָּגוֹן
  english_pob_choice: and all who enter the house of Dagon
  chosen_spanish: y todos los que entran en la casa de Dagón
  alternatives_spanish:
  - y todos los que entran en el templo de Dagón
  - y todos los que van a la casa de Dagón
  lexicon: HALOT
  rationale: '''Casa'' sigue de cerca el hebreo בֵּית y preserva la forma del texto; ''templo'' sería una aclaración interpretativa que el audit trail permite, pero aquí se prefiere fidelidad léxica.'
- source_word: עַל מִפְתַּן דָּגוֹן
  english_pob_choice: on the threshold of Dagon
  chosen_spanish: el umbral de Dagón
  alternatives_spanish:
  - el dintel de Dagón
  - el umbral de Dagon
  lexicon: HALOT
  rationale: מִפְתָּן es 'umbral'. En español, 'pisar el umbral de Dagón' refleja la imagen con precisión y naturalidad; el poseído explícito ayuda a evitar ambigüedad.
- source_word: בְּאַשְׁדּוֹד
  english_pob_choice: in Ashdod
  chosen_spanish: en Asdod
  alternatives_spanish:
  - en Ashdod
  lexicon: HALOT
  rationale: Se usa la forma española tradicional Asdod, ampliamente reconocible y transparente para lectores de Biblia en español.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Reproduce la fórmula narrativa hebrea con una expresión natural y clara en español contemporáneo.
theological_decisions:
- issue: Naturaleza del edificio de Dagón
  english_pob_reading: house of Dagon rendered as 'house' for lexical fidelity, despite shrine context
  chosen_spanish_reading: casa de Dagón
  alternative_spanish_readings:
  - templo de Dagón
  - santuario de Dagón
  rationale: Se mantiene la literalidad de בֵּית ('casa') porque el texto hebreo no usa un término técnico para templo. El contexto cultual queda claro por sí mismo.
  doctrine_reference: No aplica; decisión léxica/cultural sin carga doctrinal.
translation_notes:
  revision_awareness: Se siguió el ajuste reciente del audit trail que prioriza la secuencia del hebreo y prefiere 'house'/'house of Dagon' por fidelidad léxica. En español, esa fidelidad se conserva con 'casa de Dagón' en vez de 'templo', manteniendo además la mención explícita del umbral y el marcador temporal final.
  spanish_consistency_notes:
  - Se mantuvo 'Dagón' de forma consistente para el nombre propio del ídolo.
  - '''Asdod'' se emplea como forma hispana tradicional del topónimo.'
  - '''Umbral'' traduce directamente מִפְתָּן y evita sobreinterpretar la imagen.'
  - La oración conserva el valor narrativo de hábito vigente 'hasta el día de hoy'.
