translation:
  language: es
  text: Entonces los hijos de Israel partieron y acamparon en Oboth[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel». Muchas versiones españolas traducen este etnónimo como «los israelitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: set out
  chosen_spanish: partieron
  alternatives_spanish:
  - salieron
  - se pusieron en marcha
  - viajaron
  lexicon: HALOT
  rationale: En el contexto del itinerario del desierto, נסע expresa reanudar el camino al romper el campamento. «Partieron» comunica bien ese avance narrativo en español y evita un calco áspero.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: La POB inglesa conservó la expresión literal y documentó la alternativa idiomática. En español, «los hijos de Israel» preserva la forma hebrea con transparencia y resulta comprensible como etnónimo colectivo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - levantaron campamento
  - se establecieron
  lexicon: HALOT
  rationale: חנה es el verbo típico de hacer campamento en las rutas del desierto. «Acamparon» reproduce el sentido de instalar campamento sin elevar el registro de manera innecesaria.
- source_word: בְּאֹבֹת
  english_pob_choice: at Oboth
  chosen_spanish: en Obot
  alternatives_spanish:
  - en Obot
  - a Obot
  lexicon: HALOT
  rationale: Obot es un topónimo y debe conservarse transliterado. En español, con verbos de campamento e itinerario, «en Obot» fluye naturalmente y mantiene la localización.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: Gramática narrativa hebrea
  rationale: La waw narrativa marca secuencia. «Entonces» expresa el avance del relato de manera clara y sobria en español.
translation_notes:
  revision_awareness: El texto base inglés y la comparación de revisiones no muestran cambios sustantivos; la decisión española sigue el mismo sentido itinerario y conserva el etnónimo literal documentado en la POB.
  spanish_consistency_notes:
  - 'Se mantuvo el orden narrativo breve del hebreo: movimiento, campamento, lugar.'
  - Se evitó sustituir el etnónimo por una forma más idiomática sin dejar constancia, porque la POB inglesa documenta la alternativa.
  - No hay implicaciones teológicas directas en este versículo; la principal decisión es lexical y de estilo narrativo.
