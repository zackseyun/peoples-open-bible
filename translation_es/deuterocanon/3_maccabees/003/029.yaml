translation:
  language: es
  text: Pero todo lugar donde se descubra a un judío[a] escondido, sea hecho inaccesible e incendiado, y quede demostrado como completamente inútil para toda criatura mortal para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde se detecte a un judío mientras está oculto». El griego en torno a τὸ σύνολον σκεπαζόμενος es difícil; el sentido probable es que cualquier lugar que albergue a un judío escondido sea tratado como maldito y destruido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ... τόπος
  english_pob_choice: every place
  chosen_spanish: todo lugar
  alternatives_spanish:
  - cada lugar
  - todo sitio
  lexicon: LSJ
  rationale: La distribución universal del decreto se expresa con claridad natural en español mediante «todo lugar», manteniendo el alcance total del griego.
- source_word: οὗ ἐὰν φωραθῇ
  english_pob_choice: where ... is discovered
  chosen_spanish: donde se descubra
  alternatives_spanish:
  - donde sea encontrado
  - donde se detecte
  lexicon: LSJ
  rationale: φωράω implica ser descubierto o delatado; «se descubra» conserva la idea de exposición de algo oculto en un registro legal/decretal.
- source_word: τὸ σύνολον σκεπαζόμενος
  english_pob_choice: in hiding / while being concealed
  chosen_spanish: escondido
  alternatives_spanish:
  - oculto
  - encubierto
  lexicon: LSJ
  rationale: La construcción es difícil y el audit trail inglés la entiende como un estado de ocultamiento. «Escondido» expresa de forma idiomática esa condición sin sobreinterpretar la sintaxis.
- source_word: Ἰουδαῖος
  english_pob_choice: a Jew
  chosen_spanish: un judío
  alternatives_spanish:
  - un judeano
  lexicon: LSJ
  rationale: En 3 Macabeos el término designa al pueblo judío perseguido; «judío» es la equivalencia clara y contextual en español.
- source_word: ἄβατος
  english_pob_choice: inaccessible
  chosen_spanish: inaccesible
  alternatives_spanish:
  - intransitable
  - no apto para entrar
  lexicon: LSJ
  rationale: «Inaccesible» reproduce bien la idea de lugar vedado o inhabitable que resulta de la maldición/decreto.
- source_word: πυριφλεγής
  english_pob_choice: set on fire
  chosen_spanish: consumido por el fuego
  alternatives_spanish:
  - prendido fuego
  - puesto en llamas
  lexicon: LSJ
  rationale: El adjetivo señala fuego abrasador. «Consumido por el fuego» comunica el resultado con dignidad y mantiene la fuerza destructiva del original.
- source_word: πάσῃ θνητῇ φύσει
  english_pob_choice: every mortal creature
  chosen_spanish: toda naturaleza mortal
  alternatives_spanish:
  - todo ser mortal
  - toda criatura mortal
  lexicon: LSJ
  rationale: La frase griega es amplia y literalmente dice «toda naturaleza mortal». En español, esa forma preserva mejor la amplitud conceptual que restringirla a «criatura» o «ser».
- source_word: καθʼ ἅπαν ἄχρηστος
  english_pob_choice: altogether useless
  chosen_spanish: completamente inútil
  alternatives_spanish:
  - del todo inútil
  - totalmente inútil
  lexicon: LSJ
  rationale: «Completamente inútil» transmite la intensificación de ἄχρηστος con naturalidad moderna y mantiene el tono jurídico de despojo total de valor.
- source_word: φανήσεται
  english_pob_choice: it shall be shown
  chosen_spanish: será mostrado
  alternatives_spanish:
  - aparecerá
  - quedará demostrado
  lexicon: LSJ
  rationale: La forma pasiva futura puede rendirse como «será mostrado»; en español suena formal y refleja la pasividad del original según el audit trail revisado.
- source_word: εἰς τὸν ἀεὶ χρόνον
  english_pob_choice: for all time
  chosen_spanish: por todo el tiempo
  alternatives_spanish:
  - para siempre
  - por siempre
  lexicon: LSJ
  rationale: «Por todo el tiempo» conserva la idea de permanencia absoluta con un tono solemne y cercano al griego.
theological_decisions:
- issue: alcance colectivo del castigo
  english_pob_reading: any place harboring a concealed Jew is to be treated as cursed and destroyed
  chosen_spanish_reading: todo lugar donde se descubra a un judío escondido será tratado como inutilizable y destruido por el fuego
  alternative_spanish_readings:
  - todo lugar donde haya un judío oculto
  - todo lugar que albergue a un judío escondido
  rationale: El griego y el audit trail no hablan simplemente de presencia, sino de un lugar asociado con la ocultación de un judío. La formulación española conserva ese carácter colectivo y punitivo sin suavizarlo.
  doctrine_reference: Principio de primacía del texto fuente y preservación de la tensión léxica y retórica del pasaje
translation_notes:
  revision_awareness: 'El texto inglés revisado pasó de una formulación más literal («while being concealed») a una más natural («in hiding»), de «burned with fire» a «set on fire», y de «it shall appear» a «it shall be shown». La versión española sigue ese estado más reciente: usa una expresión idiomática para el ocultamiento, mantiene la violencia del fuego con un giro fluido («consumido por el fuego»), y refleja el pasivo de φανήσεται con «será mostrado».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o fórmulas de sustitución no pertinentes; no aparece tetragrámaton en este versículo.
  - Se mantiene «judío» por el valor étnico-religioso contextual en 3 Macabeos.
  - «Naturaleza mortal» conserva la amplitud del griego y evita restringir indebidamente el referente a solo personas o criaturas.
