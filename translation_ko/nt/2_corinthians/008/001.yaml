id: 2CO.8.1
reference: '2 Corinthians 8:1'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Γνωρίζομεν δὲ ὑμῖν, ἀδελφοί, τὴν χάριν τοῦ θεοῦ τὴν δεδομένην ἐν ταῖς ἐκκλησίαις τῆς Μακεδονίας,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/001.yaml
  text: Now we make known to you[a], brothers, the grace of God that has been given among the churches of Macedonia[b],
translation:
  language: ko
  text: 형제 여러분[a], 우리는 마게도냐의 교회들에게 주신 하나님의 은혜[b]를 여러분에게 알려 드립니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매들」. 헬라어 ἀδελφοί는 문법상 남성형이지만 회중 전체를 가리키는 호칭으로 자주 쓰인다.
    reason: lexical_alternative
  - marker: b
    text: 여기서 「하나님의 은혜」는 하나님의 호의 자체이자 그 호의가 마게도냐 교회들 안에 빚어 낸 관대한 베풂을 함께 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_korean: 은혜
  lexicon: BDAG
  rationale: χάρις는 바울 신학의 핵심어이며, 8-9장 헌금 문맥에서도 추상적 은혜와 그 은혜가 빚어 낸 구체적 베풂을 동시에 가리킨다. 「은혜」가 그 신학적 폭을 가장 잘 보존한다.
  alternatives_korean:
  - 호의
  - 은총
- source_word: ἐκκλησίαις
  english_pob_choice: churches
  chosen_korean: 교회들
  lexicon: BDAG
  rationale: 마게도냐 그리스도인 회중을 가리키는 정형 표현. 한국어 「교회」가 바울 서신에서 표준 등가어이며 본문 의미가 분명하다.
  alternatives_korean:
  - 회중
- source_word: ἐν
  english_pob_choice: among
  chosen_korean: ~에게
  lexicon: BDAG
  rationale: 전치사 ἐν이 「교회들」과 함께 활동의 장(場)을 가리키므로 한국어로는 수여 대상의 의미를 살려 「~에게 주신」으로 자연스럽게 옮긴다.
  alternatives_korean:
  - ~안에서
theological_decisions:
- issue: 8-9장 헌금 문맥의 χάρις 처리
  chosen_reading: 은혜 (필요에 따라 「은혜로운 베풂」 함의를 각주로 표시)
  alternative_readings:
  - 선물
  - 호의
  rationale: 8-9장에서 χάρις는 하나님의 은혜와 예루살렘 헌금이라는 구체적 행위를 동시에 가리키는 기술 용어로 기능한다. 「은혜」를 일관되게 유지하여 신학적 텍스처를 보존하되, 본문이 분명히 「베푸는 행위」를 가리키는 곳에서는 각주로 보충한다.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5 (consistency of key terms)'
