    changes_summary: Removed the second 'to' before 'Esau' for more natural English apposition ('my lord Esau'), and changed 'have remained' to 'have stayed' as a more natural rendering of the verb while preserving the sense.
translation:
  language: es
  text: 'Y él les dio esta orden[a], diciendo[b]: “Así dirán a mi señor Esaú: ‘Así dice tu siervo Jacob[c]: con Labán he vivido como extranjero[d] y me he quedado hasta ahora.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les ordenó». «Les dio esta orden» expresa claramente la fuerza de mandato del hebreo.
    reason: lexical_alternative
  - marker: b
    text: Fórmula de introducción de discurso; «diciendo» mantiene la estructura del hebreo y enlaza la cita de forma natural.
    reason: spanish_style_note
  - marker: c
    text: «Tu siervo» reproduce la auto-designación deferente de Jacob; no implica necesariamente esclavitud literal en este intercambio diplomático.
    reason: cultural_note
  - marker: d
    text: O «he residido con Labán» o «he vivido como forastero con Labán». El verbo puede enfatizar residir como alguien de fuera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: he commanded
  chosen_spanish: los mandó
  alternatives_spanish:
  - les dio la orden
  - los encargó
  lexicon: HALOT
  rationale: צוה expresa una orden o mandato; en español, «mandó» conserva bien la fuerza directiva sin sonar artificial.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se refleja naturalmente con «diciendo», manteniendo la relación sintáctica del hebreo.
- source_word: כֹּה תֹאמְרוּן
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirán
  alternatives_spanish:
  - Esto dirán
  - De esta manera dirán
  lexicon: HALOT
  rationale: כֹּה introduce la cita exacta del mensaje; «Así dirán» preserva el carácter de fórmula de mensajero con español claro y directo.
- source_word: לַאדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi amo
  - a mi dueño
  lexicon: HALOT
  rationale: Aquí «señor» traduce el título de respeto interpersonal dirigido a Esaú; no se trata del título divino, y «amo» sonaría demasiado duro en este contexto diplomático.
- source_word: לְעֵשָׂו
  english_pob_choice: to Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - a Esaú
  - para Esaú
  lexicon: HALOT
  rationale: El nombre propio se mantiene transliterado en español; la apposición con el título de respeto se entiende naturalmente como «mi señor Esaú».
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula de mensajero en presente es la más idiomática en español y conserva el valor performativo del hebreo.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: El contexto es una auto-designación deferente ante Esaú; «siervo» conserva la subordinación respetuosa mejor que «esclavo», sin borrar totalmente la carga de dependencia del término.
- source_word: גַּרְתִּי
  english_pob_choice: I have sojourned
  chosen_spanish: he vivido como extranjero
  alternatives_spanish:
  - he sojuzgado
  - he residido
  lexicon: HALOT
  rationale: גּור puede enfatizar vivir como forastero o residente temporal; la versión española explicita ese matiz con naturalidad. «He vivido como extranjero» preserva la nota de no pertenencia que el POB inglés quiso retener con «sojourned».
- source_word: וָאֵחַר
  english_pob_choice: and have stayed
  chosen_spanish: y me he demorado
  alternatives_spanish:
  - y me he quedado
  - y he permanecido
  lexicon: HALOT
  rationale: Aquí el verbo indica que Jacob se ha extendido en el tiempo hasta el presente; «me he demorado» comunica bien la permanencia prolongada sin reducirlo a mera tardanza puntual.
- source_word: עַד עָתָּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta el presente
  lexicon: HALOT
  rationale: Expresión temporal estándar; «hasta ahora» es la equivalencia española más natural y transparente.
translation_notes:
  revision_awareness: 'La revisión inglesa final simplificó la puntuación del discurso indirecto y ajustó el verbo final a una forma más natural («have stayed») sin cambiar el sentido. La versión española sigue esa línea: usa una estructura clara de mensaje de mensajero, evita una cascada de comillas y refleja el valor durativo de וָאֵחַר con «me he demorado».'
  spanish_consistency_notes:
  - Se conserva Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene el tratamiento deferente «mi señor Esaú / tu siervo Jacob» para reproducir la etiqueta diplomática del hebreo.
  - La elección «he vivido como extranjero» explicita el matiz de גַּרְתִּי sin forzar un tecnicismo poco natural en español.
