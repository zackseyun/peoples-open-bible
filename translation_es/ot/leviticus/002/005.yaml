  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ofrenda de grano' es aceptable, aunque 'ofrenda de cereal' también sería posible. 'Plancha' refleja bien el sentido de מַחֲבַת y la nota alternativa está bien orientada. No hay temas teológicos sensibles.
