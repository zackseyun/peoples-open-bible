translation:
  language: es
  text: Entonces murió José, y todos sus hermanos, y toda aquella generación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: Then ... died
  chosen_spanish: Entonces ... murió
  alternatives_spanish:
  - Y ... murió
  - Ahora ... murió
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la narración con valor secuencial de pasado. «Entonces» conserva mejor ese avance que un simple «y», y «murió» expresa el evento de forma natural en español.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: Convención bíblica española
  rationale: En español bíblico estándar el nombre propio se adapta como «José». Mantiene identificación inmediata y es la forma idiomática y ampliamente reconocible.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - y cada uno de
  - y todo
  lexicon: HALOT
  rationale: Aquí כָּל tiene sentido colectivo. «Todos» transmite la totalidad del grupo en español de modo natural y conciso.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos de sangre
  lexicon: HALOT
  rationale: El sustantivo אָח con sufijo 3ms se refiere a los hermanos de José. «Hermanos» conserva el referente masculino plural sin sobreespecificar.
- source_word: הַדּוֹר הַהוּא
  english_pob_choice: that generation
  chosen_spanish: aquella generación
  alternatives_spanish:
  - esa generación
  - toda aquella generación
  lexicon: HALOT
  rationale: דּוֹר se refiere a un grupo humano de la misma época. «Aquella generación» es la equivalencia natural; el demostrativo mantiene la distancia temporal del hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado no introduce notas ni variantes textuales; la versión española sigue de cerca el hebreo y conserva la progresión narrativa y la referencia colectiva sin añadir ampliaciones.
