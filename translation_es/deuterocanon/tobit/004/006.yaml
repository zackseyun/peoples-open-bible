  rationale: Se mantiene la estructura lograda del borrador, pero se corrige δικαιοσύνην a «rectitud» para seguir la decisión lexical y teológica ya documentada por el POB inglés en este pasaje. «Justicia» se conserva como alternativa en nota. También se simplifica la nota sobre ἔργα para mejorar naturalidad y economía.
