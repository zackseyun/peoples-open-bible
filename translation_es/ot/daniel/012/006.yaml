review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: narración simple, referente definido («al hombre»), atuendo de lino, ubicación sobre las aguas del río, y pregunta por la duración hasta el fin. Sin embargo, la pregunta principal pierde la fuerza idiomática prospectiva de עַד מָתַי al omitir un verbo o giro equivalente a «será/llegará», y una nota al pie está mal orientada respecto del inglés auditado.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «¿Hasta cuándo el fin de estas maravillas?» suena incompleto y poco natural en español bíblico moderno. «¿Hasta cuándo será el fin...?» sigue siendo algo tosco; «¿Hasta cuándo será el fin de estas maravillas?» o mejor «¿Cuánto falta para el fin de estas maravillas?» serían naturales, pero conviene conservar la cercanía formal con el hebreo. También la nota «vestido sobre lino» es incorrecta y confusa en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hombre», «lino», «río» y «maravillas» son compatibles con las decisiones documentadas. No aplica terminología de Yahvé/Mesías/etc. La decisión de no introducir identificaciones teológicas adicionales se conserva correctamente.
  issues:
  - severity: medium
    issue: La pregunta «¿Hasta cuándo el fin de estas maravillas?» es poco natural e incompleta en español.
    rationale: Aunque reproduce de cerca el hebreo, en español necesita un verbo o construcción equivalente para expresar la duración restante hasta el fin. Sin eso, la frase suena elíptica de manera impropia y puede dificultar la comprensión.
  - severity: high
    issue: La nota [a] «O “vestido sobre lino”» es errónea y no corresponde al sentido ni al audit trail inglés.
    rationale: El hebreo לְבוּשׁ הַבַּדִּים significa «vestido de lino / vestido con lino», no «sobre lino». Además, la nota alternativa del inglés para este punto no trata de la ropa, sino de «above/over the waters».
  - severity: low
    issue: La distribución de las notas no sigue la lógica del audit trail inglés.
    rationale: En el inglés, la alternativa en torno a «over/above» corresponde a la cláusula de posición sobre las aguas, y la alternativa sobre «astonishing things» corresponde a הַפְּלָאוֹת. En español conviene reflejar esa estructura o, si no se conserva exactamente, al menos no introducir una nota incorrecta.
  revised_spanish_text: 'Y le dijo al hombre vestido de lino, que estaba sobre las aguas del río[a]: «¿Hasta cuándo será el fin de estas maravillas?[b]»'
  revised_footnotes:
