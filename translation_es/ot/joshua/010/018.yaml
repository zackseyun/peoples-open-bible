  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: mandato de rodar piedras grandes a la abertura de la cueva y asignar hombres para custodiar. Conserva acertadamente «la boca de la cueva» con nota alternativa. Sin embargo, el verbo וְהַפְקִידוּ tiene mejor fuerza de asignación/comisión que el más débil «pongan», y la nota sobre לְשָׁמְרָם debería presentar con más precisión que el hebreo dice literalmente «guardarlos» y que la traducción adopta la revisión singular.'
  spanish_quality_summary: El español es claro y legible, pero «pongan hombres sobre ella» suena algo rígido y poco idiomático en español actual. «Asignen hombres para que la custodien» o similar mejora la naturalidad sin perder el sentido. También conviene usar un registro un poco más fluido que conserve dignidad bíblica.
  glossary_alignment: No hay términos de glosario mayores en juego aparte del nombre «Josué», que está bien. La metáfora «boca de la cueva» está bien preservada con nota. La decisión sobre el sufijo plural debe documentarse mejor en nota, porque el hebreo plural no coincide de forma directa con «guardarla».
  issues:
  - severity: medium
    issue: «pongan hombres sobre ella» es poco natural
    rationale: Aunque reproduce parcialmente על + הפקידו, en español suena forzado. «Asignen hombres sobre ella» o mejor «asignen hombres para custodiarla» transmite mejor la comisión de vigilancia.
  - severity: medium
    issue: La nota [b] describe de manera imprecisa la evidencia hebrea
    rationale: Debe decir claramente que el hebreo tiene literalmente «guardarlos»/objeto plural, y que la traducción sigue la revisión singular. La formulación actual sobre 'referente inmediato' no explica bien la tensión gramatical.
  - severity: low
    issue: Razón de la nota [b] mejor como alternativa léxica que como variante textual
    rationale: No se trata de una variante textual entre manuscritos, sino de una decisión de referencia/pronombre frente al hebreo plural.
