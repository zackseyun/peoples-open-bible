translation:
  language: es
  text: ¡Levántate, Yahvé; sálvame, Dios mío! Porque has golpeado a todos mis enemigos en la mejilla[a]; has quebrado los dientes de los impíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque has golpeado a todos mis enemigos en la quijada; has quebrado los dientes de los impíos». El hebreo לֶחִי puede significar «mejilla» o «quijada», y los verbos perfectos pueden entenderse como acción ya cumplida.'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֘וּמָה
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántate
  alternatives_spanish:
  - ¡Alzate
  - ¡Levántate ya
  lexicon: HALOT
  rationale: El imperativo dirigido a Dios pide intervención activa. «Levántate» es natural en español bíblico moderno y conserva el tono enérgico sin volverse arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título.'
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - líbrame
  - rescátame
  lexicon: HALOT
  rationale: El sentido básico de ישׁע en este contexto es pedir rescate/salvación. «Sálvame» mantiene la amplitud semántica y la cadencia poética.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: La forma posesiva se expresa de manera idiomática en español con «Dios mío», que conserva la apelación personal.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base de la súplica. «Porque» expresa con claridad la relación causal/explanatoria del hebreo.
- source_word: הִכִּיתָ
  english_pob_choice: have struck
  chosen_spanish: has golpeado
  alternatives_spanish:
  - has herido
  - has pegado
  lexicon: HALOT
  rationale: El perfecto hebreo puede leerse con valor de acción ya realizada o segura. «Has golpeado» reproduce esa fuerza verbal y encaja con la imagen corporal del verso.
- source_word: אֶת כָּל אֹיְבַי
  english_pob_choice: all my enemies
  chosen_spanish: a todos mis enemigos
  alternatives_spanish:
  - a todos mis adversarios
  lexicon: HALOT
  rationale: «Enemigos» es la equivalencia natural de אֹיֵב; el acusativo con «a» se expresa según el uso español cuando el complemento es personal.
- source_word: לֶחִי
  english_pob_choice: on the cheek
  chosen_spanish: en la mejilla
  alternatives_spanish:
  - en la quijada
  - en la mandíbula
  lexicon: HALOT
  rationale: «Mejilla» es la opción más idiomática en español para la imagen de humillación/derrota. La posible referencia a «mandíbula» queda documentada en la nota textual.
- source_word: שִׁנֵּי רְשָׁעִים
  english_pob_choice: the teeth of the wicked
  chosen_spanish: los dientes de los impíos
  alternatives_spanish:
  - los dientes de los malvados
  - los colmillos de los impíos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta. «Impíos» traduce bien רְשָׁעִים en registro bíblico y mantiene el tono moral/judicial del hebreo.
- source_word: שִׁבַּרְתָּ
  english_pob_choice: have broken
  chosen_spanish: has quebrado
  alternatives_spanish:
  - has roto
  - has destrozado
  lexicon: HALOT
  rationale: «Quebrado» mantiene la fuerza de שׁבר y conserva el paralelismo con el miembro anterior. Es suficientemente literal y natural en español.
theological_decisions:
- issue: Valor aspectual de los perfectos hebreos en un verso de súplica
  english_pob_reading: The Hebrew perfects can be understood as completed action; the English audit trail preserves this with perfect tense and notes the alternative reading
  chosen_spanish_reading: 'Perfecto compuesto: «has golpeado... has quebrado»'
  alternative_spanish_readings:
  - 'presente profético: «golpeas... quiebras»'
  - 'pretérito perfecto simple: «golpeaste... quebraste»'
  rationale: El español puede reflejar con claridad la certeza o acción ya cumplida que sugiere el hebreo en poesía. El perfecto compuesto mantiene la lectura de acción consumada sin borrar la tensión entre súplica y confianza.
  doctrine_reference: Translation philosophy §3, preservar la tensión textual sin resolverla artificialmente
- issue: Imágenes corporales violentas contra los enemigos
  english_pob_reading: Retain the concrete imagery of striking the cheek and breaking teeth
  chosen_spanish_reading: 'Se conserva la imaginería corporal: mejilla y dientes'
  alternative_spanish_readings:
  - 'defección abstracta: «has vencido a mis enemigos»'
  - suavización metafórica
  rationale: La metáfora corporal forma parte del sentido poético y de la humillación descrita. Traducirla literalmente evita perder el impacto del original.
  doctrine_reference: Translation philosophy §1, primacía del lenguaje original
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó el inglés de presente a perfecto para reflejar mejor el aspecto hebreo; por eso el español usa perfecto compuesto («has golpeado», «has quebrado») y no presente. También se preservó la nota alternativa sobre לֶחִי.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantuvo «Dios mío» para אֱלֹהַי por naturalidad y fidelidad.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - Se conservó la imagen física del verso sin paráfrasis abstracta.
  - El marcador de nota [a] aparece solo una vez y corresponde a la alternativa léxica/textual documentada.
