  glossary_alignment: '«Yahvé» está alineado con la política del proyecto para יהוה. «Los impíos» es una buena elección para רְשָׁעִים. El problema principal es יַעֲלֹזוּ: la auditoría inglesa privilegia «exult» sobre «rejoice», pero mantiene el campo semántico de gozo exuberante; en español «se jactarán» no preserva ese núcleo léxico con suficiente fidelidad.'
