revisions:
- from: 'La voz de Yahvé clama a la ciudad, y la sabiduría sana[a] ve tu nombre: oíd la vara y a quien la ha designado.'
  to: 'La voz de Yahvé clama a la ciudad, y la sabiduría sana ve tu nombre[a]: oigan la vara y a quien la designó.'
  rationale: Se ajusta el imperativo a un español neutral latinoamericano («oigan»), se aligera la última cláusula con un pretérito simple más natural («la designó»), y se corrige la nota para que preserve alternativas reales frente al texto principal, en línea con el audit trail inglés y la dificultad reconocida del hebreo.
  reviewer_model: gpt-5.4
