translation:
  language: es
  text: Y pondré a muchachos por sus príncipes[a], y niños caprichosos dominarán sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «niños», «infantes» o «bebés»; el término hebreo puede destacar tanto la juventud como un comportamiento infantil y caprichoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré que
  alternatives_spanish:
  - Y daré
  - Y नियुक्तaré / Y nombraré
  - Y pondré
  lexicon: HALOT
  rationale: 'נתן tiene aquí un sentido causativo/appointive: Yahvé establece gobernantes sobre el pueblo. En español, «haré que» reproduce bien esa causación sin sonar rígido ni introducir una fórmula administrativa demasiado técnica.'
- source_word: נְעָרִים
  english_pob_choice: youths
  chosen_spanish: muchachos
  alternatives_spanish:
  - jóvenes
  - mozos
  - niños
  lexicon: HALOT
  rationale: נְעָרִים denota muchachos o jóvenes varones. «Muchachos» conserva la idea de inmadurez y falta de experiencia; evita volverlo demasiado adulto como «jóvenes» y demasiado infantil como «niños».
- source_word: שָׂרֵיהֶם
  english_pob_choice: their princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus gobernantes
  - sus jefes
  - sus oficiales
  lexicon: HALOT
  rationale: שַׂר puede significar príncipe, jefe u պաշտոն. «Príncipes» mantiene el valor de rango y gobierno que la POB inglesa conservó con «princes».
- source_word: וְתַעֲלוּלִים
  english_pob_choice: capricious children
  chosen_spanish: niños caprichosos
  alternatives_spanish:
  - niños
  - infantes
  - bebés
  - caprichosos
  lexicon: HALOT
  rationale: 'תַעֲלוּלִים es un término difícil y puede apuntar a niñez, inmadurez o conducta caprichosa. La combinación «niños caprichosos» conserva la ambigüedad relevante: edad y comportamiento torcido/voluble.'
- source_word: יִמְשְׁלוּ בָם
  english_pob_choice: will rule over them
  chosen_spanish: gobernarán sobre ellos
  alternatives_spanish:
  - reinarán sobre ellos
  - dominarán sobre ellos
  - mandarán sobre ellos
  lexicon: HALOT
  rationale: משל con ב indica ejercer dominio o gobierno sobre alguien. «Gobernarán sobre ellos» es natural en español y mantiene el sentido de autoridad sobre el pueblo.
theological_decisions:
- issue: Imagen de juicio mediante gobernantes inmaduros
  english_pob_reading: The verse depicts divine judgment by installing immature and unstable rulers, whether literally young rulers or figuratively childish ones.
  chosen_spanish_reading: El versículo presenta juicio divino mediante la imposición de gobernantes inmaduros e inestables, ya sea entendidos literalmente como jóvenes o figuradamente como personas infantiles y caprichosas.
  alternative_spanish_readings:
  - Solo referencia literal a gobernantes de corta edad
  - Solo referencia metafórica a gobernantes incompetentes
  rationale: El hebreo permite una tensión interpretativa entre edad y conducta. La traducción española conserva esa ambigüedad en lugar de resolverla de manera unilateral.
  doctrine_reference: Conservar la tensión interpretativa en lenguaje profético.
translation_notes:
  revision_awareness: 'El registro inglés revisado no requirió cambios: la traducción española sigue la misma lectura óptima, manteniendo la ambigüedad léxica de תַעֲלוּלִים y el valor causativo de וְנָתַתִּי sin sobreexplicarlos en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» implícitamente en la decisión lexical de וְנָתַתִּי; el versículo en sí no contiene el nombre divino explícito, así que no se añadió al texto.
  - «Príncipes» se mantuvo por coherencia con el valor de שַׂר y con la POB inglesa.
  - Se evitó «SEÑOR» y «Cristo», que no corresponden a este versículo.
  - La nota al pie marca la alternativa léxica principal para תַעֲלוּלִים, preservando la tensión semántica documentada en la fuente.
