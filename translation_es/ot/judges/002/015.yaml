translation:
  language: es
  text: Dondequiera que salían[a], la mano de Yahvé estaba contra ellos para daño[b], tal como Yahvé había dicho y tal como Yahvé les había jurado, y quedaron muy angustiados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Siempre que salían», con posible referencia a salir para campaña o combate.
    reason: lexical_alternative
  - marker: b
    text: O «para calamidad»; el hebreo רָעָה aquí se refiere a desgracia o perjuicio, no necesariamente a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹל אֲשֶׁר יָצְאוּ
  english_pob_choice: Wherever they went out
  chosen_spanish: Dondequiera que salían
  alternatives_spanish:
  - Siempre que salían
  - Dondequiera que marchaban
  lexicon: HALOT
  rationale: La construcción hebrea expresa un alcance general de sus salidas o campañas. «Dondequiera que salían» conserva esa amplitud y suena natural en español sin precisar indebidamente que se trate solo de guerra, aunque el contexto lo sugiera.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahweh
  - el poder de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal hebrea «mano» para mantener la fuerza idiomática y la agencia divina activa. «Yahvé» sigue el criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» conforme al estándar del proyecto en español, evitando la sustitución por un título.
- source_word: הָיְתָה בָּם לְרָעָה
  english_pob_choice: was against them for harm
  chosen_spanish: estaba contra ellos para mal
  alternatives_spanish:
  - estaba contra ellos para daño
  - estaba sobre ellos para calamidad
  lexicon: HALOT
  rationale: «Para mal» reproduce con sobriedad el valor adverso de רָעָה en este contexto de calamidad/jucio, sin cargarlo con la idea de mal moral. «Estaba contra ellos» explicita la oposición implícita de בָּם.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: just as Yahweh had spoken
  chosen_spanish: tal como Yahvé había dicho
  alternatives_spanish:
  - justo como Yahvé había hablado
  - tal como Yahvé había hablado
  lexicon: HALOT
  rationale: El perfecto mira hacia una palabra previa de Yahvé. «Había dicho» es natural en español y conserva la referencia retrospectiva sin perder la formalidad del enunciado.
- source_word: וְכַאֲשֶׁר נִשְׁבַּע יְהוָה לָהֶם
  english_pob_choice: and just as Yahweh had sworn to them
  chosen_spanish: y tal como Yahvé les había jurado
  alternatives_spanish:
  - y tal como Yahvé había jurado a ellos
  - y tal como Yahvé se lo había jurado
  lexicon: HALOT
  rationale: «Juró»/«había jurado» expresa el contenido del juramento en español de forma idiomática. El dativo «les» refleja el לָהֶם hebreo y preserva la dirección personal del juramento.
- source_word: וַיֵּצֶר לָהֶם מְאֹד
  english_pob_choice: and they were greatly distressed
  chosen_spanish: y quedaron muy angustiados
  alternatives_spanish:
  - y fueron muy afligidos
  - y estuvieron en gran angustia
  lexicon: HALOT
  rationale: 'La forma verbal comunica el resultado: padecieron una angustia intensa. «Quedaron muy angustiados» suena natural en español y conserva el énfasis de מְאֹד.'
theological_decisions:
- issue: La oposición activa de Yahvé como juicio pactual
  english_pob_reading: the hand of Yahweh was against them for harm
  chosen_spanish_reading: la mano de Yahvé estaba contra ellos para mal
  alternative_spanish_readings:
  - la mano de Yahvé estaba contra ellos para daño
  - la mano de Yahvé trajo calamidad sobre ellos
  rationale: 'La frase mantiene la tensión teológica del texto: Yahvé actúa activamente en juicio contra Israel, pero la traducción no debe sugerir que Dios comete mal moral. «Para mal» comunica calamidad/adversidad y preserva la dureza del pasaje sin suavizarla indebidamente.'
  doctrine_reference: Mantener la tensión entre juicio divino y el uso idiomático de רָעָה; renderización del nombre divino según el estándar del proyecto.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto hebreo y la versión inglesa final; no se registraron revisiones posteriores que alteren decisiones léxicas o teológicas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conserva la metáfora «mano» para יַד, evitando una paráfrasis abstracta.
  - «Para mal» se usa con sentido de calamidad/adversidad, no de mal moral.
  - El paralelismo con «tal como» reproduce la doble cláusula hebrea de modo claro y solemne.
