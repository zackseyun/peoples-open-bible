translation:
  language: es
  text: ¡Oh madre de la nación[a], vengadora de la ley, defensora de la piedad y triunfadora en la lucha por medio de los afectos maternales[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madre del pueblo» o «madre de la raza»; ἔθνος puede denotar una nación, un pueblo o un grupo étnico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «triunfadora del combate por medio de las entrañas»; el griego evoca una victoria en una contienda marcada por los afectos profundos, aquí la compasión materna.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - madre
  - matriarca
  lexicon: LSJ
  rationale: Vocativo directo y natural; «madre» conserva el tono solemne sin añadir matices ajenos al texto.
- source_word: ἔθνους
  english_pob_choice: of the nation
  chosen_spanish: de la nación
  alternatives_spanish:
  - del pueblo
  - de la raza
  lexicon: LSJ
  rationale: ἔθνος puede significar nación, pueblo o grupo étnico. «Nación» mantiene el sentido público y representativo que documenta la POB en inglés.
- source_word: ἔκδικε
  english_pob_choice: avenger
  chosen_spanish: vengadora
  alternatives_spanish:
  - defensora
  - vindicadora
  lexicon: LSJ
  rationale: El término expresa a quien hace justicia o venganza en favor de otro. «Vengadora» conserva la fuerza judicial y retributiva del vocativo griego.
- source_word: τοῦ νόμου
  english_pob_choice: of the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - por la ley
  lexicon: LSJ
  rationale: 'El genitivo se vierte de modo más natural como posesión o relación: la ley como aquello cuya causa se vindica.'
- source_word: ὑπερασπίστεια
  english_pob_choice: defender
  chosen_spanish: defensora
  alternatives_spanish:
  - protectora
  - campeona
  lexicon: LSJ
  rationale: El sustantivo alude a quien protege o aboga en favor de algo. «Defensora» es claro, natural y mantiene el paralelismo honorífico.
- source_word: τῆς εὐσεβείας
  english_pob_choice: of godliness
  chosen_spanish: de la piedad
  alternatives_spanish:
  - de la devoción a Dios
  - de la reverencia
  lexicon: LSJ
  rationale: En este contexto judío, εὐσέβεια denota devoción reverente a Dios expresada en conducta fiel. «Piedad» es la equivalencia española más sobria; se evita una formulación demasiado explicativa en el texto principal.
- source_word: διὰ σπλάγχνων
  english_pob_choice: through motherly affections
  chosen_spanish: por medio de las entrañas maternales
  alternatives_spanish:
  - a través de la compasión materna
  - por la ternura materna
  lexicon: LSJ
  rationale: σπλάγχνα remite literalmente a las entrañas y figuradamente a los afectos profundos. «Por medio de las entrañas maternales» preserva la metáfora corporal sin diluirla en una paráfrasis psicológica.
- source_word: ἀγῶνος
  english_pob_choice: struggle
  chosen_spanish: lucha
  alternatives_spanish:
  - combate
  - contienda
  lexicon: LSJ
  rationale: ἀγών puede referirse a contienda agonística o prueba moral. «Lucha» comunica el conflicto y la perseverancia en español actual.
- source_word: ἀθλοφόρε
  english_pob_choice: prizewinner
  chosen_spanish: vencedora
  alternatives_spanish:
  - ganadora del premio
  - campeona
  lexicon: LSJ
  rationale: El término señala a quien lleva el premio de la contienda. «Vencedora» mantiene la imagen de triunfo con una forma fluida en español; se deja constancia de la metáfora competitiva en la nota.
theological_decisions:
- issue: Cómo verter εὐσέβεια en contexto de martirio y fidelidad a la ley
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - reverencia
  rationale: La palabra expresa fidelidad reverente a Dios y conducta consecuente. «Piedad» es la opción española más estable y comprensible; se evita cargar el texto principal con una explicación doctrinal más larga.
  doctrine_reference: Translation philosophy §5; consistencia terminológica
- issue: Cómo preservar la tensión de διὰ σπλάγχνων ἀγῶνος
  english_pob_reading: through motherly affections
  chosen_spanish_reading: por medio de las entrañas maternales
  alternative_spanish_readings:
  - en la lucha de los afectos maternales
  - a través de la compasión materna
  rationale: 'La imagen griega es comprimida y retórica: la lucha pasa por/mediante los afectos viscerales maternos. La formulación elegida mantiene la tensión corporal y afectiva sin sustituirla por una paráfrasis interpretativa.'
  doctrine_reference: Translation philosophy §1 y §3
- issue: Tono honorífico y vocativo exaltado
  english_pob_reading: O mother of the nation...
  chosen_spanish_reading: ¡Oh madre de la nación...!
  alternative_spanish_readings:
  - Oh madre del pueblo...
  - ¡Oh madre de la raza...!
  rationale: Se conserva el vocativo solemne y la amplitud semántica documentada para ἔθνος. «Nación» evita estrechar el sentido a una etnia aislada o a una fraseología eclesiástica tradicional.
  doctrine_reference: Consistencia léxica POB para ἔθνος
translation_notes:
  revision_awareness: La redacción sigue la lectura auditada de la POB en inglés, pero ajusta el último miembro para conservar con más transparencia la imagen corporal de διὰ σπλάγχνων y el tono agonístico de ἀγῶνος/ἀθλοφόρε. También se mantiene la ambigüedad controlada de ἔθνος con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto original lo exija; aquí no aparece.
  - Se mantiene «piedad» para εὐσέβεια en el texto principal, con nota explicativa para evitar una lectura meramente tradicional.
  - «Vencedora» conserva el honorífico de triunfo; la nota explicita la metáfora atlética sin sobrecargar el verso.
  - La puntuación y el vocativo siguen el tono laudatorio del griego y de la POB en inglés.
