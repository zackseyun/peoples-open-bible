base_translation:
  language: en
  yaml_path: translation/ot/job/037/018.yaml
  text: Can you[a], with him, spread out the skies[c][b], hard as a cast metal mirror?
  footnotes:
  - marker: a
    text: Or 'beat out the skies' or 'stretch out the skies.' The Hebrew verb can evoke hammering metal thin as well as spreading something out.
    reason: lexical_alternative
  - marker: b
    text: Or 'the heavens' or 'the clouds.' The Hebrew שׁחקים is a poetic term that can refer to the skies/heavens and, in some contexts, clouds.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'like a cast mirror.' The image is of the sky as solid and gleaming like metalwork.
    reason: cultural_note
