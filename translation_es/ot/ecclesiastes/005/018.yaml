base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/005/018.yaml
  text: Also[a], every man to whom God has given wealth and possessions, and has empowered him to eat from them, and to take his portion[c][b], and to rejoice in his labor—this is the gift of God.
  footnotes:
  - marker: a
    text: Or 'everyone' / 'every person.' The Hebrew reads 'every man' with a masculine singular noun used generically for human beings.
    reason: lexical_alternative
  - marker: b
    text: Or 'has given him power' or 'has enabled him.' The Hebrew verb emphasizes God-given ability to enjoy what one possesses.
    reason: lexical_alternative
  - marker: c
    text: Or 'to receive his lot' or 'to take his share.' 'Portion' is a key Ecclesiastes term for one's allotted share in life.
    reason: lexical_alternative
