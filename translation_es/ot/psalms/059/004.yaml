translation:
  language: es
  text: Porque he aquí[a], acechan mi vida; hombres feroces[b] se agrupan contra mí, sin transgresión mía ni pecado mío[c], oh Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como ‘mi alma’; aquí se prefiere ‘mi vida’ por el contexto de peligro mortal.
    reason: lexical_alternative
  - marker: b
    text: ‘Hombres feroces’ puede verterse también ‘hombres fuertes’ o ‘los poderosos’; el contexto hostil favorece el matiz de violencia.
    reason: lexical_alternative
  - marker: c
    text: La frase hebrea afirma literalmente ausencia de ‘transgresión’ y de ‘pecado’ míos; también puede leerse como ‘aunque no hay transgresión mía ni pecado mío’.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la súplica y mantiene la relación lógica con el contexto inmediato sin sobrecargar el tono.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: HALOT
  rationale: ‘He aquí’ conserva el valor deíctico y el énfasis vívido del hebreo en un registro bíblico natural en español.
- source_word: אָֽרְב֡וּ
  english_pob_choice: lie in wait
  chosen_spanish: acechan
  alternatives_spanish:
  - están al acecho
  - tienden una emboscada
  lexicon: HALOT
  rationale: El verbo expresa una hostilidad continua y oculta; ‘acechan’ es breve, claro y fiel al sentido de emboscada/lurking.
- source_word: לְנַפְשִׁי
  english_pob_choice: for my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi propia vida
  lexicon: HALOT
  rationale: En este contexto de peligro mortal, נֶפֶשׁ refiere a la vida concreta de la persona. En español, ‘mi vida’ evita una lectura antropológica más estrecha que ‘mi alma’.
- source_word: יָגוּרוּ
  english_pob_choice: gather
  chosen_spanish: se juntan
  alternatives_spanish:
  - se congregan
  - se agrupan
  lexicon: HALOT
  rationale: גור aquí tiene fuerza de reunirse o bandarse contra alguien. ‘Se juntan’ mantiene la idea de concentración hostil sin introducir una paráfrasis excesiva.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - en mi contra
  lexicon: HALOT
  rationale: Con un verbo hostil, la preposición expresa oposición directa; ‘contra mí’ es la opción más natural y transparente.
- source_word: עַזִים
  english_pob_choice: fierce men
  chosen_spanish: hombres feroces
  alternatives_spanish:
  - los fuertes
  - los poderosos
  lexicon: HALOT
  rationale: El término apunta a fuerza, pero en este contexto comunica agresividad y amenaza; ‘feroces’ recoge bien esa violencia sin perder el matiz de vigor.
- source_word: לֹא פִשְׁעִי
  english_pob_choice: there is no transgression of mine
  chosen_spanish: sin transgresión mía
  alternatives_spanish:
  - sin mi rebelión
  - sin culpa de mi parte
  lexicon: HALOT
  rationale: La construcción nominal hebrea afirma ausencia de culpa. ‘Sin transgresión mía’ conserva la relación posesiva y el matiz legal-moral de פשע.
- source_word: וְלֹא חַטָּאתִי
  english_pob_choice: and no sin of mine
  chosen_spanish: ni pecado mío
  alternatives_spanish:
  - ni falta mía
  - ni culpa mía
  lexicon: HALOT
  rationale: חטאת corresponde a ‘pecado’ en el registro moral-religioso del salmo. La coordinación con ‘ni’ mantiene la parataxis negativa del hebreo.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino como transliteración en la forma adoptada por el proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La lectura española conserva el nombre propio del pacto, coherente con la política del proyecto y sin enmascararlo como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נֶפֶשׁ en לְנַפְשִׁי
  english_pob_reading: for my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: El contexto describe una amenaza física inminente; por eso ‘vida’ comunica mejor el peligro concreto que una traducción más interiorizada como ‘alma’.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
- issue: Lectura de la cláusula negativa final
  english_pob_reading: though there is no transgression or sin of mine
  chosen_spanish_reading: sin transgresión mía ni pecado mío
  alternative_spanish_readings:
  - aunque no hay transgresión mía ni pecado mío
  - pues no hay transgresión ni pecado mío
  rationale: La hebrea es una afirmación nominal de inocencia; ‘sin… ni…’ reproduce con economía la ausencia de culpa sin introducir una concesión o causalidad explícita que el hebreo no verbaliza.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, syntax close to source
translation_notes:
  revision_awareness: 'El inglés auditado pasó por ajustes de registro y sintaxis: de una versión más coloquial (‘look’) a ‘behold’, y de una cláusula causal/concesiva más larga a una formulación más concisa de inocencia. La versión española sigue la forma más sobria y cercana al hebreo, preservando el paralelismo y la fuerza de la acusación injusta.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene ‘mi vida’ para נֶפֶשׁ en un contexto de amenaza física.
  - Se evita ‘siervo’, ‘SEÑOR’ y otras sustituciones tradicionales que borrarían el nombre divino o el sentido léxico del hebreo.
  - La cláusula final conserva el paralelismo negativo nominal (‘sin… ni…’) para no convertirla en una paráfrasis verbalizada.
