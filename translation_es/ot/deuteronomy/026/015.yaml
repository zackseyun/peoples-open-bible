translation:
  language: es
  text: Mira desde arriba, desde tu santa morada[a], desde el cielo, y bendice a tu pueblo Israel y la tierra que nos has dado, como juraste a nuestros padres[b], una tierra que fluye con leche y miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habitación santa'. La expresión hebrea puede referirse a la morada o residencia divina.
    reason: lexical_alternative
  - marker: b
    text: O 'nuestros antepasados'. El hebreo dice 'nuestros padres', refiriéndose a los patriarcas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁקִיפָה
  english_pob_choice: Look down
  chosen_spanish: Mira desde arriba
  alternatives_spanish:
  - Mira
  - Mira hacia abajo
  - Observa desde arriba
  lexicon: HALOT
  rationale: El imperativo pide que Yahvé atienda desde lo alto la situación del pueblo. En español, 'Mira desde arriba' comunica la dirección vertical implícita sin sonar tan literal o áspero como 'Mira hacia abajo'.
- source_word: מִמְּעוֹן קָדְשְׁךָ
  english_pob_choice: from your holy dwelling
  chosen_spanish: desde tu santa morada
  alternatives_spanish:
  - desde tu santa habitación
  - desde tu santa morada celestial
  lexicon: HALOT
  rationale: מָעוֹן designa un lugar de morada o habitación; 'morada' es natural y mantiene la idea de residencia divina. 'Santa' conserva el matiz de קָדְשְׁךָ.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde el cielo(s)
  lexicon: HALOT
  rationale: El hebreo usa un plural formal; 'los cielos' preserva mejor esa forma, sin perder la referencia al ámbito celestial.
- source_word: וּבָרֵךְ
  english_pob_choice: and bless
  chosen_spanish: y bendice
  alternatives_spanish:
  - y bendiga
  - y concede tu bendición a
  lexicon: HALOT
  rationale: Se trata de un imperativo directo. 'Bendice' es la equivalencia más natural y transparente en español.
- source_word: עַמְּךָ אֶת יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: a tu pueblo Israel
  alternatives_spanish:
  - a tu pueblo, Israel
  - a tu pueblo, es decir, Israel
  lexicon: HALOT
  rationale: La estructura hebrea une posesión y aposición. 'Tu pueblo Israel' conserva ambas relaciones de manera breve y clara.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra cultivable
  lexicon: HALOT
  rationale: Aunque אֲדָמָה puede significar 'suelo', aquí la referencia es la tierra prometida. 'La tierra' sigue la revisión inglesa y encaja con el contexto de la promesa.
- source_word: אֲשֶׁר נָתַתָּה לָנוּ
  english_pob_choice: that you have given us
  chosen_spanish: que nos has dado
  alternatives_spanish:
  - que nos diste
  - la cual nos has dado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una dádiva ya otorgada con vigencia presente. El presente perfecto español reproduce bien ese valor.
- source_word: כַּאֲשֶׁר נִשְׁבַּעְתָּ לַאֲבֹתֵינוּ
  english_pob_choice: as you swore to our fathers
  chosen_spanish: como juraste a nuestros padres
  alternatives_spanish:
  - como juraste a nuestros antepasados
  - tal como juraste a nuestros padres
  lexicon: HALOT
  rationale: Se conserva la fórmula pactual y el término masculino del hebreo. 'Padres' mantiene la referencia patriarcal del texto.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: una tierra que fluye leche y miel
  alternatives_spanish:
  - una tierra que mana leche y miel
  - una tierra rebosante de leche y miel
  lexicon: HALOT
  rationale: La expresión idiomática de abundancia y fertilidad se mantiene con su forma tradicional. 'Fluye' reproduce el participio hebreo de manera fiel y natural.
theological_decisions:
- issue: ‘Yahvé’ implícito en el vocativo a Dios
  english_pob_reading: The verse addresses God directly from his heavenly dwelling.
  chosen_spanish_reading: Se mantiene la súplica directa a Yahvé, aunque el texto hebreo usa aquí pronombres y formas verbales de segunda persona sin el nombre divino explícito.
  alternative_spanish_readings:
  - Señor
  - Dios
  rationale: No hay Tetragrámaton en este verso, pero sí invocación directa al Dios del pacto. La traducción conserva la oración dirigida a él sin introducir un título no presente en el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §2
- issue: ‘Nuestros padres’ como fórmula patriarcal del pacto
  english_pob_reading: our fathers, referring to the patriarchs.
  chosen_spanish_reading: nuestros padres, entendido como los patriarcas.
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros ancestros
  rationale: El hebreo dice literalmente 'nuestros padres'. Mantener esa forma conserva la fórmula bíblica y su resonancia pactual; el sentido puede explicitarse en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'ground' por 'land' para reflejar mejor אֲדָמָה en este contexto. La draft española sigue esa revisión y evita 'suelo' o 'terreno' aislados, porque aquí el sentido es la tierra prometida, no la tierra agrícola en general.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para no ocultar el uso directo del lenguaje de segunda persona en esta petición.
  - '''Cielos'' preserva el plural formal hebreo mejor que ''cielo'' y encaja con el registro litúrgico.'
  - '''Tierra'' se usa para הָאֲדָמָה según la revisión auditada en inglés, porque el referente es la tierra prometida.'
  - '''Padres'' conserva la fórmula pactual estándar; la nota aclara el sentido patriarcal sin sustituir el texto base.'
