translation:
  language: es
  text: y establezcamos que ellos anden conforme a sus propias leyes[a], como antes; porque fue a causa de sus leyes, que dejamos de lado[b], que se enojaron e hicieron todas estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sus costumbres» o «sus leyes». El griego literalmente dice «andar/ir por sus leyes», un modismo para ordenar la vida conforme a ellas.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego es más literalmente «dispersamos» o «esparcimos»; aquí se refiere a apartar, suprimir o desmantelar sus prácticas legales.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσωμεν
  english_pob_choice: let us establish
  chosen_spanish: establezcamos
  alternatives_spanish:
  - confirmemos
  - fijemos
  - decretémos
  lexicon: LSJ
  rationale: El aoristo subjuntivo en construcción exhortativa pide una propuesta colectiva. «Establezcamos» transmite bien la idea de poner en vigor una disposición para ellos y mantiene el tono decisorio del pasaje.
- source_word: τοῦ πορεύεσθαι
  english_pob_choice: that they may walk according to / live by
  chosen_spanish: el andar conforme a
  alternatives_spanish:
  - que vivan conforme a
  - el caminar según
  - que se conduzcan según
  lexicon: LSJ
  rationale: Con objeto de leyes, πορεύεσθαι funciona idiomáticamente como vivir/andar conforme a una norma. «El andar conforme a» conserva la imagen verbal y su fuerza ética sin volverlo rígido en español.
- source_word: τοῖς νομίμοις αὐτῶν
  english_pob_choice: their own laws
  chosen_spanish: sus propias leyes
  alternatives_spanish:
  - sus costumbres
  - sus leyes ancestrales
  - sus ordenanzas
  lexicon: LSJ
  rationale: En este contexto macabeo se trata de práctica legal-religiosa judía. «Leyes» es el equivalente principal más claro; «propias» conserva el matiz de pertenencia explícito del griego.
- source_word: ὡς τὸ πρότερον
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como anteriormente
  - como antes de esto
  - como de costumbre
  lexicon: LSJ
  rationale: Es una comparación temporal directa que restaura una condición previa. «Como antes» es natural y fiel.
- source_word: χάριν
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - por razón de
  - debido a
  lexicon: LSJ
  rationale: Aquí introduce causalidad, no beneficio. «A causa de» expresa con claridad la relación causal sin oscurecerla con un giro más interpretativo.
- source_word: διεσκεδάσαμεν
  english_pob_choice: we set aside
  chosen_spanish: dejamos de lado
  alternatives_spanish:
  - dispersamos
  - disgregamos
  - suprimimos
  lexicon: LSJ
  rationale: El verbo literalmente puede sugerir dispersar/dispersión, pero en contexto alude a apartar o desmantelar sus prácticas legales. «Dejamos de lado» mantiene la idea de apartar sin endurecerla excesivamente como «abolir».
- source_word: ὠργίσθησαν
  english_pob_choice: they became angry
  chosen_spanish: se enojaron
  alternatives_spanish:
  - se enfurecieron
  - se irritaron
  - se airaron
  lexicon: LSJ
  rationale: El verbo expresa el volverse airado. «Se enojaron» es correcto, claro y suficientemente fuerte para el contexto narrativo.
- source_word: ἐποίησαν ταῦτα πάντα
  english_pob_choice: did all these things
  chosen_spanish: hicieron todas estas cosas
  alternatives_spanish:
  - hicieron todo esto
  - cometieron todas estas acciones
  - realizaron todas estas cosas
  lexicon: LSJ
  rationale: La frase resume el conjunto de acciones referidas en el contexto. «Hicieron todas estas cosas» conserva el alcance inclusivo de πάντα y suena natural en español.
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión del texto inglés auditado: se evita una paráfrasis demasiado libre de πορεύεσθαι y se refleja διεσκεδάσαμεν con una expresión menos absoluta que «abolimos», manteniendo el sentido causal del pasaje.'
  spanish_consistency_notes:
  - Se usa «leyes» para νόμιμα en consonancia con el contexto macabeo de práctica legal-religiosa.
  - Se evita «SEÑOR» u otro término de sustitución divina porque el versículo no contiene el Tetragrámaton ni κύριος con función divina.
  - «Se enojaron» conserva la reacción de ὠργίσθησαν sin añadir intensidad no exigida por el griego.
  - El estilo mantiene un registro bíblico moderno y digno, sin depender de formulaciones tradicionales ajenas al texto fuente.
