translation:
  text: 'and she who has no image among the barbarians[1].

    I am the one they have hated in many places,

    and I am the one they have loved in many places[b][a][3][2].

    I am the one they call “Death,”

    and I am the one they call “the Law.”'
  philosophy: optimal-equivalence
