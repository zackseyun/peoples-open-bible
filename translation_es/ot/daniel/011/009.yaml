translation:
  language: es
  text: Entonces entrará en el reino del rey del Sur[a], pero regresará a su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y entrará en el reino del rey del Sur, y regresará a su tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: Then he will enter
  chosen_spanish: Entonces entrará
  alternatives_spanish:
  - Y entrará
  - Luego entrará
  lexicon: HALOT
  rationale: El waw + qatal en esta secuencia narrativa-profética expresa acción futura sucesiva. «Entonces» reproduce bien la progresión del discurso sin añadir contenido, y «entrará» conserva el sentido direccional del verbo dentro del contexto militar-político.
- source_word: בְּמַלְכוּת
  english_pob_choice: into the realm
  chosen_spanish: en el reino
  alternatives_spanish:
  - en el dominio
  - en el reino de
  lexicon: HALOT
  rationale: מַלְכוּת puede denotar reino, reinado o dominio. En este contexto territorial, «reino» comunica de forma clara el ámbito político. El valor direccional de בְּ con el verbo de movimiento queda expresado naturalmente en español con «entrará en».
- source_word: מֶלֶךְ הַנֶּגֶב
  english_pob_choice: the king of the South
  chosen_spanish: el rey del Sur
  alternatives_spanish:
  - el rey del Neguev
  - el rey meridional
  lexicon: HALOT
  rationale: En Daniel 11, esta expresión funciona como designación geopolítica estable. En español, «Sur» conserva la referencia direccional y evita confundirla con el topónimo «Neguev», que aquí no es el sentido principal del título.
- source_word: וְשָׁב
  english_pob_choice: but he will return
  chosen_spanish: pero regresará
  alternatives_spanish:
  - y regresará
  - entonces regresará
  lexicon: HALOT
  rationale: El waw puede ser simple coordinación, pero la relación discursiva aquí es de reversión después de la incursión. «Pero» refleja esa contraposición natural en español sin introducir una idea ajena al hebreo; «regresará» expresa el movimiento de vuelta de manera idiomática.
- source_word: אֶל אַדְמָתוֹ
  english_pob_choice: to his own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a su suelo
  lexicon: HALOT
  rationale: אַדְמָה literalmente es «tierra/suelo». En este contexto político-militar, «tierra» es la forma más natural y fiel. «Propia» explicita el sufijo posesivo de manera idiomática en español, como hace el inglés POB con «his own land».
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «come into» por «enter» para mayor naturalidad formal; la traducción española sigue esa elección con «entrará» y mantiene el resto del verso conforme al mismo sentido. No hay discrepancias textuales relevantes entre el hebreo WLC y la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantuvo «rey del Sur» como designación geopolítica estable de Daniel 11.
  - Se evitó «SEÑOR» o fórmulas de mayúsculas no aplicables; no aparece el tetragrámaton en este versículo.
  - «Tierra» traduce aquí el valor territorial de אַדְמָה, no el suelo físico en sentido agrícola.
