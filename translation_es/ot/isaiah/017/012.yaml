translation:
  language: es
  text: ¡Ah[a], el estruendo de muchos pueblos! Rugen como el estruendo de los mares[b]; y el estrépito de naciones, braman como el estrépito de aguas impetuosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «¡Ay!» o «¡Ay de la multitud de muchos pueblos…!». La interjección hebrea הוֹי puede introducir lamento, advertencia o una exclamación de atención.'
    reason: alternative_reading
  - marker: b
    text: El hebreo repite términos de sonido tumultuoso ('estruendo/ruido' y verbos como 'rugen'/'braman') para intensificar la imagen de naciones caóticas como mares tormentosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de!
  lexicon: HALOT
  rationale: En español, «¡Ah!» conserva el valor exclamativo de atención/clamor sin imponer de entrada un tono exclusivamente de amenaza. «¡Ay!» o «¡Ay de!» podrían sugerir lamento o juicio más marcado; por eso se dejan como alternativas.
- source_word: הֲמוֹן
  english_pob_choice: roar
  chosen_spanish: estruendo
  alternatives_spanish:
  - rugido
  - tumulto
  lexicon: HALOT
  rationale: La raíz apunta a un ruido confuso y fuerte, no solo a cantidad. «Estruendo» mantiene la fuerza auditiva y funciona bien con el paralelo de las aguas. «Tumulto» y «rugido» son posibles, pero «estruendo» evita una imagen demasiado animalizada.
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - pueblos numerosos
  lexicon: HALOT
  rationale: «Pueblos» conserva el sentido colectivo-étnico de עַמִּים y «muchos» reproduce רַבִּים de forma natural en español. «Naciones» también es viable, pero puede desplazar el matiz hacia unidades políticas más abstractas.
- source_word: כַּהֲמוֹת יַמִּים
  english_pob_choice: like the roaring of the seas
  chosen_spanish: como el de los mares
  alternatives_spanish:
  - como el rugido de los mares
  - como el estruendo de los mares
  lexicon: HALOT
  rationale: El hebreo compara el estruendo de los pueblos con el de los mares. En español, para evitar una repetición pesada y mantener fluidez, «como el de los mares» retoma el sustantivo implícito desde «estruendo»; el sentido comparativo queda claro por el contexto. Las alternativas explícitas mantienen más visible la imagen sonora.
- source_word: יֶהֱמָיוּן
  english_pob_choice: they roar
  chosen_spanish: estruendo
  alternatives_spanish:
  - rugen
  - hacen estruendo
  lexicon: HALOT
  rationale: El verbo de la raíz המה expresa producir un ruido fuerte y tumultuoso. En español, la segunda aparición se integra en la frase «estruendo...», dejando el verbo implícito para evitar un calco torpe y conservar el paralelismo poético.
- source_word: וּשְׁאוֹן
  english_pob_choice: and the rushing
  chosen_spanish: el estrépito
  alternatives_spanish:
  - el ruido
  - el fragor
  lexicon: HALOT
  rationale: שְׁאוֹן puede significar ruido, estrépito, din o rugido. «Estrépito» comunica bien el clamor sonoro y permite una buena correspondencia con el siguiente miembro del verso. Se evita «rushing» como traducción literal, porque aquí el énfasis hebreo sigue siendo acústico.
- source_word: לְאֻמִּים
  english_pob_choice: of nations
  chosen_spanish: de naciones
  alternatives_spanish:
  - de pueblos
  lexicon: HALOT
  rationale: A diferencia de עַמִּים, לְאֻמִּים puede conservarse como «naciones» en español para mantener el paralelismo con la primera línea y distinguir los dos términos colectivos.
- source_word: כִּשְׁאוֹן מַיִם כַּבִּירִים
  english_pob_choice: like the rushing of mighty waters
  chosen_spanish: como el estrépito de aguas impetuosas
  alternatives_spanish:
  - como el ruido de aguas poderosas
  - como el fragor de aguas abundantes
  lexicon: HALOT
  rationale: «Aguas impetuosas» expresa bien la fuerza de מַיִם כַּבִּירִים sin sonar artificial. «Estrépito» mantiene el campo sonoro de שְׁאוֹן y evita duplicar «estruendo» de manera innecesaria.
- source_word: יִשָּׁאוּן
  english_pob_choice: they rush
  chosen_spanish: se precipitan
  alternatives_spanish:
  - se lanzan
  - avanzan con estrépito
  lexicon: HALOT
  rationale: El verbo combina sonido y movimiento. «Se precipitan» transmite el avance impetuoso de las aguas y conserva la energía del paralelo poético en español.
theological_decisions:
- issue: Valor de la interjección inicial הוֹי
  english_pob_reading: Attention-getting cry with possible lament or warning; not necessarily a direct curse
  chosen_spanish_reading: Exclamación de atención y lamento potencial, sin fijarla de entrada como imprecación
  alternative_spanish_readings:
  - ¡Ay de!
  - ¡Ay!
  rationale: El hebreo permite más de un matiz. En español, «¡Ah!» es suficientemente abierto para no cerrar el sentido a una sola lectura, preservando la tensión documentada por el audit trail.
  doctrine_reference: Isaías 17:12; uso exclamativo profético de הוֹי
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y no requiere revisiones documentadas adicionales; se mantiene la tensión semántica de הוֹי y la repetición sonora del hebreo mediante equivalentes españoles naturales.
  spanish_consistency_notes:
  - Se usó «pueblos» para עַמִּים y «naciones» para לְאֻמִּים, conservando la distinción del hebreo.
  - Se mantuvo el campo semántico del ruido con «estruendo» y «estrépito» para reflejar la repetición intensificadora.
  - «Aguas impetuosas» busca preservar el carácter poderoso de מַיִם כַּבִּירִים sin forzar una traducción literal poco idiomática.
