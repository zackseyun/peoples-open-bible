translation:
  language: es
  text: Sin embargo, no se apartaron de los pecados de la casa de Jeroboam, con los cuales hizo pecar a Israel; en ellos anduvo, y aun la Aserá[a] permaneció en pie en Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el poste de Aserá'; el término hebreo puede referirse a la diosa cananea Aserá o, como probablemente aquí, al objeto cultual asociado con su adoración. El contexto de que 'permaneció en pie' favorece este segundo sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: Expresa bien el contraste concesivo con lo anterior en un español natural y digno, conservando la fuerza adversativa del hebreo.
- source_word: סָרוּ
  english_pob_choice: did not turn away
  chosen_spanish: no se apartaron
  alternatives_spanish:
  - no se desviaron
  - no dejaron
  lexicon: HALOT
  rationale: Con מִן, el verbo comunica alejarse o apartarse de algo; 'apartarse' preserva esa idea de abandono moral/religioso sin sonar forzado.
- source_word: מֵחַטֹּאות
  english_pob_choice: from the sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de las culpas
  - de los delitos
  lexicon: HALOT
  rationale: El plural se refiere a prácticas pecaminosas, no a sacrificios por el pecado; 'pecados' es la equivalencia más directa y clara.
- source_word: בֵּית יָרָבְעָם
  english_pob_choice: the house of Jeroboam
  chosen_spanish: la casa de Jeroboam
  alternatives_spanish:
  - la dinastía de Jeroboam
  lexicon: HALOT
  rationale: Se conserva la expresión formal del hebreo. 'Casa' funciona bien en español bíblico para la línea o legado político-cultual de Jeroboam.
- source_word: אֲשֶׁר החטי אֶת יִשְׂרָאֵל
  english_pob_choice: by which he caused Israel to sin
  chosen_spanish: con los cuales hizo pecar a Israel
  alternatives_spanish:
  - por los cuales hizo pecar a Israel
  - que hicieron pecar a Israel
  lexicon: HALOT
  rationale: '''Hacer pecar'' reproduce bien el Hiphil de חטא. Se usa ''los cuales'' porque en español el antecedente inmediato queda mejor recogido en plural, dado que se habla de ''pecados''.'
- source_word: בָּהּ הָלָךְ
  english_pob_choice: in them he walked
  chosen_spanish: en ellos anduvo
  alternatives_spanish:
  - en ellos caminó
  - los siguió
  lexicon: HALOT
  rationale: '''Anduvo en ellos'' preserva el modismo hebreo de conducta habitual. El plural español concuerda con ''pecados'' y mantiene el sentido de vivir conforme a ese patrón.'
- source_word: וְגַם
  english_pob_choice: and even
  chosen_spanish: y aun
  alternatives_spanish:
  - y también
  - incluso
  lexicon: HALOT
  rationale: Añade énfasis al último dato, como en el inglés auditado, sin sobrecargar el registro.
- source_word: הָאֲשֵׁרָה
  english_pob_choice: the Asherah
  chosen_spanish: la Aserá
  alternatives_spanish:
  - la Ashera
  - el poste de Aserá
  lexicon: HALOT
  rationale: Se conserva el término hebreo/transliterado para no estrechar indebidamente su sentido. En español, 'Aserá' mantiene la tensión documentada entre deidad y objeto cultual.
- source_word: עָמְדָה
  english_pob_choice: remained standing
  chosen_spanish: permaneció en pie
  alternatives_spanish:
  - quedó en pie
  - seguía en pie
  lexicon: HALOT
  rationale: La imagen literal de 'estar de pie' se mantiene, pero 'permaneció en pie' expresa mejor la permanencia del objeto cultual en un español idiomático.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en la capital Samaria
  lexicon: HALOT
  rationale: Equivalencia locativa directa y natural para el topónimo.
theological_decisions:
- issue: Referente de הָאֲשֵׁרָה
  english_pob_reading: Rendered as 'the Asherah' in the main text, understood as the cult object associated with Asherah worship.
  chosen_spanish_reading: Se traduce como 'la Aserá' en el texto principal, entendida aquí como el objeto cultual asociado con su culto.
  alternative_spanish_readings:
  - la Aserá (la diosa)
  - el poste de Aserá
  rationale: El contexto narrativo de que 'permaneció en pie en Samaria' favorece un objeto cultual visible, no solo la referencia a la deidad. Mantener el término sin expandirlo en el cuerpo principal preserva la tensión semántica documentada por el POB inglés.
  doctrine_reference: Cultic terminology / idolatria en la narrativa histórica de Israel
- issue: Valor del Hiphil de חטא
  english_pob_reading: by which he caused Israel to sin
  chosen_spanish_reading: con los cuales hizo pecar a Israel
  alternative_spanish_readings:
  - por los cuales hizo pecar a Israel
  - que hicieron pecar a Israel
  rationale: La formulación conserva la causalidad moral explícita del hebreo sin suavizarla. 'Hizo pecar' refleja con fuerza el causativo y evita diluir la culpa en una mera consecuencia.
  doctrine_reference: Responsabilidad moral y pecado nacional en el relato deuteronomista
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió 'in them he walked' para evitar ambigüedad. En español se refleja como 'en ellos anduvo', manteniendo la referencia plural a los pecados y el matiz de conducta continuada. También se preservó la decisión del POB de retener 'Asherah' como término no resuelto en el cuerpo principal.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - '''Casa de Jeroboam'' se mantuvo sin ''dinastía'' para respetar la expresión tradicional del hebreo y el audit trail.'
  - Se usó 'pecados' y no 'ofrendas por el pecado', ya que el contexto excluye el sentido sacrificial.
  - El plural español 'los cuales' y 'en ellos' responde a la referencia colectiva a los pecados/acciones, aun cuando el hebreo use un sufijo singular en una construcción colectiva.
