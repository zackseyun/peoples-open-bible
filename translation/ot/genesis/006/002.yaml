theological_decisions:
- issue: Identity of 'the sons of God'
  chosen_reading: Retain the literal phrase 'the sons of God' without specifying whether these are angelic beings, rulers, or the Sethite line.
  alternative_readings:
  - angels or heavenly beings
  - human rulers/nobles
  - the godly line of Seth
  rationale: The Hebrew phrase is interpretively contested, and the verse itself does not resolve the referent. Per the translation philosophy, theological tension should be preserved rather than resolved in translation. A footnote records major interpretive alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
