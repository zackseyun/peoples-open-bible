  text: Salum fue padre de Jecamía, y Jecamía fue padre de Elisama.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Saalún
  alternatives_spanish:
  - Salún
  - Shalún
  lexicon: nombre propio
  rationale: Es un nombre propio hebreo; se translitera en español manteniendo una forma legible y coherente. 'Saalún' conserva mejor la estructura vocálica del nombre que una adaptación más castellana, y evita confundirlo con otros nombres similares.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: fue padre de
  alternatives_spanish:
  - engendró
  - engendró a
  lexicon: HALOT
  rationale: En contexto genealógico, el verbo indica paternidad biológica/lineal. 'Fue padre de' comunica con naturalidad en español la relación genealógica sin usar un arcaísmo; además preserva el sentido relacional del hebreo mejor que un calco rígido.
- source_word: יְקַמְיָה
  english_pob_choice: Jekamiah
  chosen_spanish: Jecamías
  alternatives_spanish:
  - Yecamías
  - Jekamía
  lexicon: nombre propio
  rationale: Nombre propio transliterado. 'Jecamías' sigue una adaptación española entendible y consistente con la pronunciación aproximada del hebreo, sin cambiar el nombre por un equivalente no documentado.
- source_word: וִיקַמְיָה
  english_pob_choice: and Jekamiah
  chosen_spanish: y Jecamías
  alternatives_spanish:
  - y Yecamías
  - y Jekamía
  lexicon: HALOT
  rationale: Se mantiene la repetición del nombre como en el hebreo, porque forma parte de la secuencia genealógica. La conjunción 'y' traduce el waw coordinante sin añadir información.
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elishamá
  alternatives_spanish:
  - Elisama
  - Elishama
  lexicon: nombre propio
  rationale: Nombre propio transliterado. 'Elishamá' ofrece una forma española fluida y reconocible, conservando la base hebrea del nombre.
theological_decisions:
- issue: Verbo genealógico y fuerza de filiación
  english_pob_reading: fathered
  chosen_spanish_reading: fue padre de
  alternative_spanish_readings:
  - engendró
  - engendró a
  - fue progenitor de
  rationale: 'No hay una cuestión doctrinal compleja, pero sí una decisión semántica: la genealogía hebrea usa un verbo de causación/paternidad que el español puede expresar de varias maneras. ''Fue padre de'' mantiene el vínculo filial de forma clara y evita tanto el tono arcaico de ''engendró'' como una generalización excesiva.'
  doctrine_reference: Genealogía bíblica; paternidad/filiación en listas genealógicas
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran plena concordancia y no registran revisiones ni notas; por eso no se introducen variantes textuales ni notas de crítica textual.
  spanish_consistency_notes:
  - Se conservó la repetición del nombre Jecamías/Jecamías tal como en el hebreo y en la traducción inglesa auditada.
  - Se eligió una formulación genealógica natural en español para evitar arcaísmos, sin perder precisión semántica.
  - Los nombres propios se transliteraron de manera uniforme y publicable en español.
