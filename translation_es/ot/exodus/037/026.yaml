revisions:
- from: 'Lo recubrió de oro puro: su parte superior[a], sus lados alrededor y sus cuernos; y le hizo un moldura de oro alrededor.'
  to: 'Lo recubrió de oro puro: su parte superior, sus lados alrededor y sus cuernos; y le hizo una moldura[a] de oro alrededor.'
  rationale: Se corrige el artículo femenino en «una moldura» y, sobre todo, se mueve la nota [a] al término correcto («moldura»), ya que la alternativa «corona» corresponde a זֵר y no a «su parte superior». Se conserva el resto del texto porque representa fielmente el hebreo y las decisiones léxicas auditadas.
