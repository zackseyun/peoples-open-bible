    rationale: Si se conservan ambas notas relevantes, los marcadores deben aparecer en orden único en el texto español conforme a la convención del proyecto.
  revised_spanish_text: Porque sus posesiones eran demasiado grandes para habitar juntos,[a] y la tierra de su residencia temporal[b] no podía sostenerlos[a] a causa de su ganado.
