  yaml_path: translation/ot/leviticus/013/028.yaml
  text: But if the bright spot remains in its place and has not spread in the skin[a], and it is faded, it is the swelling from the burn, and the priest shall pronounce him clean, for it is the scar of the burn.
  footnotes:
