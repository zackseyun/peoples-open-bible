lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de la familia de
  lexicon: HALOT
  rationale: En este listado genealógico, el plural constructo de בֵּן expresa pertenencia de linaje o clan. «Los hijos de» conserva la forma formal del hebreo y es idiomático en español bíblico; las alternativas suavizan el sentido hacia descendencia o grupo familiar.
- source_word: רְאָיָה
  english_pob_choice: Reaiah
  chosen_spanish: Reaía
  alternatives_spanish:
  - Raía
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. «Reaía» sigue de cerca la forma hebrea y mantiene la regularidad de transliteración en la sección.
- source_word: רְצִין
  english_pob_choice: Rezin
  chosen_spanish: Rezín
  alternatives_spanish:
  - Rezin
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve y reconocible en español, con acentuación gráfica para lectura natural sin alterar el nombre.
- source_word: נְקוֹדָא
