translation:
  language: es
  text: 'Pero Jacob dijo a Rebeca, su madre[a]: «Mira, Esaú mi hermano es hombre velludo[b], y yo soy hombre sin vello[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase identifica a Rebeca como madre de Jacob, como en el hebreo. En español podría omitirse por redundante, pero se conserva para mantener el apunte relacional del texto fuente.
    reason: source_note
  - marker: b
    text: '''Velludo'' aquí se refiere al vello corporal de Esaú, en contraste con Jacob; no describe un rasgo de personalidad.'
    reason: cultural_note
  - marker: c
    text: Literalmente, 'hombre liso'. Aquí significa que Jacob carecía de vello corporal, en contraste con Esaú.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But Jacob said
  chosen_spanish: Pero Jacob dijo
  alternatives_spanish:
  - Y Jacob dijo
  - Entonces Jacob dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la escena, y en este contexto la objeción de Jacob hace natural el giro adversativo 'Pero' en español, sin perder la conexión narrativa.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de forma natural con 'a' en español cuando introduce el destinatario del habla.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - su mamá
  - la madre de él
  lexicon: HALOT
  rationale: Se conserva la relación explicativa de Rebeca con Jacob, como en el hebreo y en la traducción inglesa auditada, sin redundancia innecesaria en español.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  lexicon: HALOT
  rationale: La partícula introduce una objeción con fuerza de llamada de atención. 'Mira' reproduce ese valor discursivo en español actual mejor que una forma más arcaica.
- source_word: אִישׁ שָׂעִר
  english_pob_choice: a hairy man
  chosen_spanish: hombre velludo
  alternatives_spanish:
  - hombre peludo
  - hombre con mucho vello
  lexicon: HALOT
  rationale: '''Velludo'' mantiene la referencia corporal y el contraste con Esaú, y en español resulta más sobrio que ''peludo''. La opción evita interpretar el rasgo como carácter o metafórica, siguiendo el contexto físico.'
- source_word: וְאָנֹכִי
  english_pob_choice: and I am
  chosen_spanish: y yo soy
  alternatives_spanish:
  - pero yo soy
  - mientras que yo soy
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza el contraste con Esaú. 'Y yo soy' conserva la sencillez de la estructura hebrea y deja que el contraste se perciba en el contexto inmediato.
- source_word: אִישׁ חָלָק
  english_pob_choice: a smooth man
  chosen_spanish: hombre liso
  alternatives_spanish:
  - hombre sin vello
  - hombre lampiño
  lexicon: HALOT
  rationale: '''Liso'' preserva la imagen directa del hebreo, en paralelo con ''velludo'', y evita introducir una interpretación más explícita que el texto no exige. En español, la expresión puede sonar algo insólita, pero esa tensión refleja el contraste literal del original.'
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo de Génesis 27:11 y con la traducción inglesa auditada. No se documentan cambios textuales ni tensiones teológicas especiales en este versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término base para el nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se conserva el contraste físico entre Esaú y Jacob sin suavizarlo a un equivalente más interpretativo.
  - La elección de 'liso' para חָלָק preserva la simetría con 'velludo' y la literalidad mínima necesaria.
