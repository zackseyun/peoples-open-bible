  to: 'Pero Yahvé se enojó conmigo por causa de ustedes y no me escuchó[a], y Yahvé me dijo: «¡Basta![b] No me hables más de este asunto»'
  rationale: Se mantiene la fidelidad al hebreo y a las decisiones del POB, pero se mejora la naturalidad del español en la fórmula de rechazo רַב לָךְ con «¡Basta!», dejando en nota la literalidad hebrea «Basta para ti». También se corrige la nota [a] para usar alternativas idiomáticas en español.
