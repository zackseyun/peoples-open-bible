  to: 'E Isaías dijo: «Tomen una torta de higos». La tomaron y la pusieron sobre el forúnculo[a], y él se recuperó[b].'
  rationale: Se ajusta הַשְּׁחִין a «forúnculo» para reflejar mejor la decisión lexical auditada («boil») y sus alternativas. Se mejora la naturalidad del español al quitar el pronombre explícito innecesario y se simplifica el aparato de notas eliminando una nota no sustantiva sobre el orden de palabras.
