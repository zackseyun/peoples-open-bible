    text: 'O, más literalmente: «dejaremos ... que nuestros asuntos queden establecidos»; la frase griega es algo comprimida, y el sentido es que, después de castigar a estas personas, los asuntos del reino permanecerán asentados para el futuro.'
    reason: lexical_alternative
