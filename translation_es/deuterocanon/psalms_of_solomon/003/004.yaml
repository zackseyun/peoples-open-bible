translation:
  language: es
  text: El justo no menospreciará recibir la disciplina del Señor[a]; su complacencia[b] está siempre ante el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega transmitida en el paquete aparece irregular; el sentido aceptado por la revisión textual es «el justo».
    reason: textual_variant
  - marker: b
    text: O «su buena voluntad» o «su favor». El expediente inglés reciente favorece «su deleite» para εὐδοκία, pero en español «su complacencia» expresa mejor aquí una disposición favorable continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ὀλιγωρήσει
  english_pob_choice: will not disdain / will not neglect
  chosen_spanish: no menospreciará
  alternatives_spanish:
  - no despreciará
  - no tendrá en poco
  - no hará caso omiso de
  lexicon: BDAG
  rationale: ὀλιγωρέω expresa tratar algo como de poca importancia. En español, «menospreciar» comunica bien esa actitud de rebajar o tener en poco, y encaja con el tono proverbial del verso.
- source_word: δίκαιας / δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el hombre justo
  alternatives_spanish:
  - el justo
  - los justos
  - el hombre recto
  lexicon: BDAG
  rationale: La tradición textual recibida en el paquete muestra una forma irregular, pero el sentido contextual y la revisión crítica apuntan al sujeto «el justo / the righteous man». «El hombre justo» mantiene la referencia personal y evita una abstracción excesiva.
- source_word: παιδευόμενους / παιδευόμενος
  english_pob_choice: being disciplined
  chosen_spanish: ser disciplinado
  alternatives_spanish:
  - ser corregido
  - recibir disciplina
  - ser reprendido
  lexicon: BDAG
  rationale: παιδεύω aquí es corrección formativa bajo la mano del Señor, no simple instrucción. «Ser disciplinado» conserva ese matiz correctivo y suena natural en español moderno.
- source_word: ὑπὸ τοῦ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - por Yahvé
  - por el Señor Dios
  lexicon: BDAG
  rationale: Según la política del proyecto, κύριος se vierte normalmente «Señor» en español cuando funciona como equivalente de Lord en la tradición textual griega. Aquí la frase es claramente teológica y mantiene la referencia reverente a Dios.
- source_word: ἡ εὐδοκία αὐτοῦ
  english_pob_choice: his delight / his good pleasure
  chosen_spanish: su deleite
  alternatives_spanish:
  - su buena voluntad
  - su favor
  - su complacencia
  lexicon: BDAG
  rationale: εὐδοκία admite «favor», «buena voluntad» y «deleite». En este verso, la revisión inglesa reciente favorece «delight», y «deleite» es la opción española más natural para expresar esa disposición interior o agrado continuo.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  - en todo tiempo
  lexicon: BDAG
  rationale: La expresión denota duración continua. «Continuamente» reproduce bien ese valor adverbial con un registro elevado pero fluido.
- source_word: ἔναντι Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - en la presencia del Señor
  lexicon: BDAG
  rationale: «Delante del Señor» conserva la imagen relacional y espacial del griego, a la vez que suena idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Renderizado de κύριος en un contexto referencial a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Maestro
  rationale: El texto griego usa κύριος para una referencia divina. En español, «Señor» preserva la continuidad bíblica del término sin introducir una lectura más específica que la que exige el verso. Se evita «Maestro», que no corresponde al uso teológico aquí.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord / Señor'
- issue: Relación entre la corrección divina y el agrado del justo
  english_pob_reading: his delight is continually before the Lord
  chosen_spanish_reading: su deleite está continuamente delante del Señor
  alternative_spanish_readings:
  - su buena voluntad está continuamente delante del Señor
  - su favor está continuamente delante del Señor
  rationale: La revisión crítica del expediente indica que el segundo hemistiquio pertenece al justo, no a la «favor» divina como sujeto. «Su deleite» conserva la lectura revisada y evita borrar la tensión textual/documental sobre la forma transmitida.
  doctrine_reference: Textual criticism note tied to applied revisions / OCR correction
translation_notes:
  revision_awareness: 'El expediente inglés y la revisión aplicada señalan una corrección importante del texto base: el paquete griego presenta una forma irregular/OCR en la primera mitad, pero la lectura revisada entiende «el justo» como sujeto y reserva εὐδοκία para el segundo hemistiquio. La versión española sigue esa revisión crítica y no reproduce la lectura errónea que hacía de «su favor» el sujeto de la primera cláusula.'
  spanish_consistency_notes:
  - He usado «Señor» para κύριος de manera consistente en ambos miembros del verso.
  - He preferido «el hombre justo» para mantener la referencia personal y el tono proverbial.
  - «Ser disciplinado» y «delante del Señor» conservan el paralelismo y la imagen relacional del griego.
  - No se ha introducido terminología eclesiástica más marcada que la exigida por el texto.
