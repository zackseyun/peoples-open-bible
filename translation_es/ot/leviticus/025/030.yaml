base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/030.yaml
  text: But if it is not redeemed before a full year is completed for it[a], then the house that is in a city that has no wall shall pass permanently to the one who bought it, throughout his generations[b]; it shall not go out in the Jubilee.
  footnotes:
  - marker: a
    text: Or more literally, 'shall stand permanently.' The Hebrew idiom expresses that the sale remains legally fixed.
    reason: lexical_alternative
  - marker: b
    text: '''It shall not go out in the Jubilee'' means the house does not revert to the original family at the Jubilee year.'
    reason: lexical_alternative
