  to: Entonces el pueblo envió a Silo, y llevaron de allí el arca del pacto de Yahvé de los ejércitos[a], que está entronizado sobre los querubines. Y los dos hijos de Elí, Jofní y Finees[b], estaban allí con el arca del pacto de Dios.
  rationale: Se corrigió el verbo a 'llevaron' para reflejar mejor וַיִּשְׂאוּ ('carried'), y se reubicó la nota [a] al título divino para que corresponda al audit trail léxico de צְבָאוֹת. También se normalizó 'Silo' por mayor naturalidad en español bíblico. El resto del texto conserva fielmente la sintaxis, la teología del nombre divino y la fórmula de entronización del hebreo.
