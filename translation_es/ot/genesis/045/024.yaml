translation:
  language: es
  text: 'Entonces despidió a sus hermanos, y se fueron; y les dijo: «No riñan[a] en el camino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No se alteren», «No se enojen» o «No tengan miedo en el camino». El verbo hebreo puede denotar diversas clases de perturbación emocional; «No riñan» encaja bien en el contexto inmediato de los hermanos viajando juntos después de la revelación de José.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: he sent ... away
  chosen_spanish: los envió lejos
  alternatives_spanish:
  - los envió
  - los despidió
  lexicon: HALOT
  rationale: El piel de שׁלח aquí expresa hacer que salgan de su presencia. «Los envió lejos» conserva la idea de alejamiento que está en el inglés auditado y resulta natural en español.
- source_word: אֶת־אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - los hermanos de él
  - sus hermanos varones
  lexicon: HALOT
  rationale: El sustantivo hebreo es literal y el contexto narrativo se refiere a los hermanos de José; «sus hermanos» es la forma más directa y fiel en español.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: they departed
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - se fueron de allí
  lexicon: HALOT
  rationale: Después de «los envió lejos», «se fueron» comunica de modo natural la salida efectiva. «Partieron» también es posible, pero «se fueron» suena más idiomático sin perder el movimiento narrativo.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: and he said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y les habló
  - y les dijo a ellos
  lexicon: HALOT
  rationale: 'La fórmula verbal estándar se mantiene de manera transparente: «les dijo» reproduce claramente la dirección del discurso.'
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No se
  - No deberían
  lexicon: HALOT
  rationale: La partícula prohibitiva se expresa de forma natural con «No» en español, manteniendo el valor de mandato negativo.
- source_word: תִּרְגְּזוּ
  english_pob_choice: quarrel
  chosen_spanish: se alteren
  alternatives_spanish:
  - riñan
  - se irriten
  - se angustien
  lexicon: HALOT
  rationale: רגז puede abarcar agitación, enojo, temor o perturbación emocional. El contexto permite una advertencia para que no se perturben durante el viaje; «se alteren» preserva esa amplitud sin imponer solo la idea de disputa. El sentido alternativo de «quarrel» queda abierto en la nota.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la ruta
  - durante el viaje
  lexicon: HALOT
  rationale: «En el camino» es la equivalencia más natural y directa para דרך en este contexto de viaje de regreso.
theological_decisions:
- issue: 'Alcance semántico de תִּרְגְּזוּ: disputa interpersonal versus agitación emocional'
  english_pob_reading: Do not quarrel on the way, with a note preserving broader options such as agitated, angry, or afraid.
  chosen_spanish_reading: No se alteren en el camino, con nota que preserve alternativas como no riñan, no se angustien o no tengan miedo.
  alternative_spanish_readings:
  - No riñan en el camino
  - No se angustien en el camino
  - No tengan miedo en el camino
  rationale: El hebreo admite varias perturbaciones emocionales. La POB inglesa privilegia «quarrel» por el contexto, pero conserva la amplitud en una nota. En español, «se alteren» mantiene mejor esa amplitud semántica, mientras la nota expone que también podría entenderse como riña, angustia o temor.
  doctrine_reference: Lexical/theological nuance of רגז in context; no doctrinal dispute.
translation_notes:
  revision_awareness: No se identificaron revisiones aplicadas en el expediente inglés; se siguió la lectura auditada de alta concordancia y se ajustó la formulación al español con el mismo alcance semántico documentado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto cuando no aparece el nombre divino en este versículo, por lo que no fue necesario aplicarlo aquí.
  - Se evitó traducir mecánicamente «quarrel» como «riñan» en el texto principal porque el verbo hebreo es más amplio y el propio expediente inglés preserva alternativas más allá de la disputa.
  - La puntuación y las comillas siguen el uso editorial en español bíblico moderno.
