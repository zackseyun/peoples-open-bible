translation:
  language: es
  text: 'Así dice Yahvé: Tengan cuidado de ustedes mismos[a], y no lleven una carga[b] en el día de reposo, ni la introduzcan por las puertas de Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tengan cuidado por sus vidas» / «Presten atención a ustedes mismos». El hebreo usa un modismo que literalmente habla de «sus almas/vidas» y expresa vigilancia personal cuidadosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «bulto» en vez de «carga». Aquí el sentido probablemente es un objeto físico transportado en sábado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  lexicon: HALOT
  rationale: Fórmula profética estándar; 'Así dice' conserva el tono solemne y directo sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' según la convención del proyecto para preservar el nombre propio divino y no sustituirlo por un título.
- source_word: הִשָּׁמְרוּ בְּנַפְשׁוֹתֵיכֶם
  english_pob_choice: Take care for yourselves
  chosen_spanish: Tengan cuidado por sus vidas
  alternatives_spanish:
  - Cuídense mucho
  - Tengan cuidado de ustedes mismos
  - Guárdense en cuanto a sus vidas
  lexicon: HALOT
  rationale: La expresión hebrea literalmente involucra 'sus almas/vidas' y aquí pide vigilancia cuidadosa sobre uno mismo; 'por sus vidas' refleja esa fuerza idiomática sin volverlo demasiado literal o oscuro.
- source_word: תִּשְׂאוּ
  english_pob_choice: carry
  chosen_spanish: lleven
  alternatives_spanish:
  - carguen
  - porten
  lexicon: HALOT
  rationale: '''Llevar'' expresa con naturalidad la acción física de transportar en este contexto sabático.'
- source_word: מַשָּׂא
  english_pob_choice: a load
  chosen_spanish: una carga
  alternatives_spanish:
  - un bulto
  - un peso
  lexicon: HALOT
  rationale: En este contexto de transporte material en sábado, 'carga' es concreto y adecuado; mantiene la posible oscilación entre 'carga' y 'burden' sin forzar una metáfora.
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día de reposo
  alternatives_spanish:
  - en sábado
  - en el día de sábado
  lexicon: HALOT
  rationale: '''Día de reposo'' comunica claramente el sentido del shabbat en español bíblico y eclesial sin perder la referencia temporal.'
- source_word: וַהֲבֵאתֶם
  english_pob_choice: or bring it in
  chosen_spanish: ni la introduzcan
  alternatives_spanish:
  - ni la metan
  - ni la traigan
  lexicon: HALOT
  rationale: En español, tras una prohibición, 'ni' coordina naturalmente la segunda acción prohibida. 'Introduzcan' conserva la dirección de llevar algo al interior de la ciudad.
- source_word: בְּשַׁעֲרֵי יְרוּשָׁלִָם
  english_pob_choice: through the gates of Jerusalem
  chosen_spanish: por las puertas de Jerusalén
  alternatives_spanish:
  - por los portones de Jerusalén
  - a través de las puertas de Jerusalén
  lexicon: HALOT
  rationale: '''Puertas'' es el término bíblico y urbano más natural en español; ''por'' reproduce el valor de entrada mediante las puertas de la ciudad.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio divino conforme a la política del POB en español, evitando la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «Guard yourselves» a «Take care for yourselves» para reflejar mejor el modismo hebreo. La versión española adopta esa misma orientación idiomática con «Tengan cuidado por sus vidas». También se mantiene la distinción entre la carga material y el acto de introducirla a la ciudad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Día de reposo'' conserva el referente de שַׁבָּת de manera clara y tradicionalmente inteligible.'
  - Se mantiene el paralelo entre 'una carga' y 'ni la introduzcan' para no perder la segunda acción prohibida.
  - Los corchetes de notas se aplican solo donde hay alternativa lexical real en el texto español.
