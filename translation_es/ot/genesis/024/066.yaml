revisions:
- from: Y el esclavo[a] contó a Isaac todas las cosas[b] que había hecho.
  to: Y el siervo[a] le contó a Isaac todo lo que había hecho[b].
  rationale: Se ajusta עֶבֶד a la decisión contextual auditada del POB, usando «siervo» en el texto principal y dejando «esclavo» como alternativa en nota. También se mejora la naturalidad del español con «todo lo que había hecho», mientras se preserva en nota la amplitud léxica de דְּבָרִים y su literal más cercana.
