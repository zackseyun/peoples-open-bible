translation:
  language: es
  text: Tu morada está en medio del engaño[a]; mediante engaño se niegan a conocerme[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo pasa aquí de un singular (“tu morada”) a un verbo plural (“se niegan”), probablemente por el uso profético del pueblo o la ciudad como entidad colectiva y luego de sus habitantes.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: “con engaño han rehusado conocerme”.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁבְתְּךָ
  english_pob_choice: Your dwelling
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu vivienda
  - tu habitación
  - tu estancia
  lexicon: HALOT
  rationale: El sustantivo derivado de ישׁב con sufijo de 2ms funciona aquí como ‘morada/abode’ en sentido colectivo o representativo. ‘Tu morada’ conserva el valor de residencia y suena natural en español sin reducirlo a un calco como ‘tu sentarte’.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el centro de
  - en medio
  lexicon: HALOT
  rationale: La expresión comunica inmersión en una condición circundante. ‘En medio de’ reproduce bien ese matiz relacional y espacial en español.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - traición
  lexicon: HALOT
  rationale: מִרְמָה señala engaño, falsedad o decepción moral. ‘Engaño’ es natural en español y preserva la fuerza ética del término. Se evita ‘fraude’ por ser demasiado técnico, y ‘traición’ por ser más específico de lo que el hebreo exige.
- source_word: בְּמִרְמָה
  english_pob_choice: through deceit
  chosen_spanish: por engaño
  alternatives_spanish:
  - mediante engaño
  - con engaño
  - a causa de engaño
  lexicon: HALOT
  rationale: El prefijo ב aquí es mejor entendido instrumental o causalmente. ‘Por engaño’ mantiene la repetición del sustantivo y el sentido de medio por el cual se produce la negativa a conocer a Yahvé.
- source_word: מֵאֲנוּ
  english_pob_choice: they refuse
  chosen_spanish: ellos se niegan
  alternatives_spanish:
  - se niegan
  - rehúsan
  - han rehusado
  lexicon: HALOT
  rationale: מֵאֲנוּ expresa negativa voluntaria. En español, ‘se niegan’ transmite bien la voluntad resistente y permite conservar el cambio de número del hebreo sin forzar una corrección estilística.
- source_word: דַעַת
  english_pob_choice: to know
  chosen_spanish: conocerme
  alternatives_spanish:
  - conocer
  - saber de mí
  - reconocerme
  lexicon: HALOT
  rationale: El infinitivo de ידע en este contexto tiene valor relacional y de reconocimiento del pacto. ‘Conocerme’ refleja mejor esa relación personal que un simple ‘saber’.
- source_word: אוֹתִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Pronombre de objeto directo de primera persona singular, correctamente expresado como ‘me’.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - declara el Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como ‘Yahvé’ según el criterio del proyecto. ‘Declara Yahvé’ reproduce la fórmula profética solemne sin sustituirla por ‘SEÑOR’.
theological_decisions:
- issue: 'Número gramatical: singular colectivo y luego plural'
  english_pob_reading: Singular collective address ('Your dwelling') followed by plural predicate ('they refuse')
  chosen_spanish_reading: Se mantiene el singular colectivo en ‘tu morada’ y el plural en ‘ellos se niegan’
  alternative_spanish_readings:
  - Regularizar todo al singular
  - Regularizar todo al plural
  rationale: El hebreo pasa de una segunda persona singular a un verbo plural. La traducción conserva esa tensión en vez de nivelarla, porque probablemente refleja el tratamiento profético del pueblo como una unidad y, luego, de sus habitantes.
  doctrine_reference: Principios de fidelidad formal y de respeto a la tensión del texto fuente
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto de reproducir el nombre de pacto como ‘Yahvé’, no como un título sustitutivo. Esto conserva la referencia explícita al Tetragrámaton del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador coincide con el pasaje fuente y con el auditorio inglés en las decisiones clave: mantiene la imagen de morada/engaño, conserva el cambio singular-plural y traduce el nombre divino como Yahvé. No se detectaron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - ‘Conocerme’ conserva el valor relacional del infinitivo hebreo sin agregar explicaciones al cuerpo del verso.
  - ‘Por engaño’ mantiene la repetición léxica de מִרְמָה en dos miembros paralelos.
  - La nota a marca la tensión de número sin suavizarla en el texto principal.
