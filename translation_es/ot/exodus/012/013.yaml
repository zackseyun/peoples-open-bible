translation:
  language: es
  text: Y la sangre les servirá de señal sobre las casas donde estén ustedes. Cuando vea la sangre, pasaré sobre ustedes[a], y no habrá sobre ustedes plaga para destrucción cuando hiera la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los libraré» o «los protegeré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: les servirá
  alternatives_spanish:
  - será
  - estará
  lexicon: HALOT
  rationale: En este contexto, la construcción introduce el efecto/función de la sangre; en español, 'les servirá de' comunica de forma natural esa función resultativa y evita una rigidez innecesaria.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - esa sangre
  - la sangre derramada
  lexicon: HALOT
  rationale: Se mantiene el referente definido y ya conocido en el contexto de la institución pascual.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: HALOT
  rationale: El dativo de beneficio/referencia se expresa naturalmente con pronombre átono en español dentro de 'les servirá de señal'.
- source_word: לְאֹת
  english_pob_choice: a sign
  chosen_spanish: señal
  alternatives_spanish:
  - como señal
  - por señal
  lexicon: HALOT
  rationale: '''Señal'' expresa el valor de marca protectora sin añadir paráfrasis. Se omite el artículo por fluidez española, aunque el sentido permanece equivalente.'
- source_word: עַל הַבָּתִּים
  english_pob_choice: on the houses
  chosen_spanish: en las casas
  alternatives_spanish:
  - sobre las casas
  - encima de las casas
  lexicon: HALOT
  rationale: En español, 'en' transmite mejor la ubicación visible de la sangre aplicada a las casas que un calco con 'sobre'.
- source_word: אֲשֶׁר אַתֶּם שָׁם
  english_pob_choice: where you are
  chosen_spanish: donde estén ustedes
  alternatives_spanish:
  - donde ustedes están
  - en las que ustedes están
  lexicon: HALOT
  rationale: La relativa se vierte de manera idiomática y respetando el plural; 'estén' preserva el valor situacional de permanencia en el lugar.
- source_word: וְרָאִיתִי אֶת הַדָּם
  english_pob_choice: When I see the blood
  chosen_spanish: Cuando vea la sangre
  alternatives_spanish:
  - Y cuando vea la sangre
  - Al ver la sangre
  lexicon: HALOT
  rationale: La secuencia temporal se conserva de forma natural en español con 'cuando vea', sin forzar un enlace coordinante literal.
- source_word: וּפָסַחְתִּי עֲלֵכֶם
  english_pob_choice: I will pass over you
  chosen_spanish: pasaré sobre ustedes[a]
  alternatives_spanish:
  - pasaré por encima de ustedes
  - los libraré
  lexicon: HALOT
  rationale: Se preserva la conexión léxica y canónica con Pascua mediante 'pasaré sobre ustedes'. Se evita resolver de más la carga semántica del verbo, manteniendo la tensión documentada entre pasar por encima, pasar de largo y la idea de preservar.
- source_word: וְלֹא יִהְיֶה בָכֶם נֶגֶף
  english_pob_choice: and no plague will be among you
  chosen_spanish: y no habrá entre ustedes plaga
  alternatives_spanish:
  - y no habrá plaga en ustedes
  - y no caerá sobre ustedes ninguna plaga
  lexicon: HALOT
  rationale: '''Entre ustedes'' reproduce bien la referencia comunitaria de בָכֶם sin sonar extraña en español. ''Plaga'' conserva נֶגֶף como golpe devastador o azote.'
- source_word: לְמַשְׁחִית
  english_pob_choice: to destroy
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para el destructor
  - como destructor
  lexicon: HALOT
  rationale: Se sigue la lectura verbal/purposiva del POB inglés para no introducir un agente personal no exigido por la sintaxis. 'Para destrucción' mantiene la ambigüedad del hebreo respecto al efecto destructivo.
- source_word: בְּהַכֹּתִי
  english_pob_choice: when I strike
  chosen_spanish: cuando hiera
  alternatives_spanish:
  - cuando golpee
  - al herir
  lexicon: HALOT
  rationale: La forma temporal se expresa con una construcción natural en español; 'hiera' conserva el tono solemne y la fuerza del acto divino.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - la tierra de Egipto
  - en Egipto
  lexicon: HALOT
  rationale: '''Tierra'' conserva el paralelismo bíblico y el alcance territorial del juicio, reflejando fielmente el hebreo.'
theological_decisions:
- issue: Sentido de וּפָסַחְתִּי עֲלֵכֶם en el marco de Pascua
  english_pob_reading: I will pass over you
  chosen_spanish_reading: pasaré sobre ustedes
  alternative_spanish_readings:
  - los libraré
  - los protegeré
  - pasaré de largo ante ustedes
  rationale: Se mantiene el vínculo textual y teológico con la Pascua sin cerrar la discusión semántica. La frase principal conserva el valor literal suficiente para la auditoría y la lectura eclesial, mientras las alternativas comunican el efecto interpretativo.
  doctrine_reference: Conservar la tensión lexical y la resonancia canónica de la Pascua.
- issue: Posible personalización de לְמַשְׁחִית
  english_pob_reading: to destroy
  chosen_spanish_reading: para destrucción
  alternative_spanish_readings:
  - para el destructor
  - como destructor
  rationale: No se introduce en el texto principal un 'destructor' personal porque el hebreo permite una lectura de finalidad/resultado. La formulación elegida evita añadir una figura que no está explícita en esta cláusula.
  doctrine_reference: No importar al texto principal una entidad no exigida por la sintaxis hebrea.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma como guía la revisión inglesa más reciente, que prefirió una formulación formal de finalidad para לְמַשְׁחִית. En español se reflejó esa decisión con «para destrucción», evitando una personalización no necesaria, y se preservó la tensión semántica de פָסַח mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton cuando aparezca en el contexto inmediato; en este versículo no se requiere.
  - Se mantiene «plaga» para נֶגֶף, coherente con el léxico POB.
  - Se prefirió «ustedes» por registro neutral latinoamericano y concordancia con el plural del hebreo.
  - La nota a se ancla en 'pasaré sobre ustedes' para preservar la alternativa interpretativa documentada.
