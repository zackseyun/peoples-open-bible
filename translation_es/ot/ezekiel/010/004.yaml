translation:
  language: es
  text: Y la gloria de Yahvé se alzó de sobre el querubín[a] hasta el umbral de la casa[b], y la casa se llenó de la nube, y el atrio se llenó del resplandor de la gloria de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde encima del querubín'. El hebreo usa aquí el singular 'querubín'.
    reason: lexical_alternative
  - marker: b
    text: O 'hasta el umbral del templo'. El hebreo 'casa' en este contexto se refiere al santuario o edificio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh / the glory of the LORD
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria del SEÑOR
  - la gloria de Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma española de la política del proyecto, 'Yahvé', y se traduce כְּבוֹד con 'gloria' como manifestación visible/presente de Dios. La construcción en español mantiene el genitivo sin volverlo más explicativo de lo que permite el hebreo.
- source_word: וַיָּרָם
  english_pob_choice: rose up
  chosen_spanish: se alzó
  alternatives_spanish:
  - subió
  - fue levantada
  lexicon: HALOT
  rationale: El verbo denota movimiento ascendente de la gloria divina. 'Se alzó' conserva el movimiento sin introducir una pasiva que no está explícita en el hebreo y suena natural en español bíblico contemporáneo.
- source_word: מֵעַל הַכְּרוּב
  english_pob_choice: from above the cherub
  chosen_spanish: de sobre el querubín
  alternatives_spanish:
  - de encima del querubín
  - desde arriba del querubín
  lexicon: HALOT
  rationale: La preposición compuesta indica desplazamiento desde una posición superior. Se mantiene el singular 'querubín' porque el hebreo usa el singular en este contexto visionario, siguiendo la observación auditada del POB en inglés.
- source_word: עַל מִפְתַּן הַבָּיִת
  english_pob_choice: to the threshold of the house
  chosen_spanish: hasta el umbral de la casa
  alternatives_spanish:
  - al umbral de la casa
  - sobre el umbral de la casa
  - hasta el umbral del templo
  lexicon: HALOT
  rationale: מִפְתָּן es 'umbral'. En español, 'hasta' expresa bien la llegada/movimiento hacia ese punto. Se conserva 'casa' por fidelidad al hebreo, aunque el contexto sea el santuario.
- source_word: וַיִּמָּלֵא הַבַּיִת אֶת הֶעָנָן
  english_pob_choice: the house was filled with the cloud
  chosen_spanish: la casa se llenó de la nube
  alternatives_spanish:
  - la casa fue llenada con la nube
  - la casa se llenó con la nube
  lexicon: HALOT
  rationale: El binyán y el sentido contextual permiten un pasivo/medio en español. 'Se llenó de' es idiomático y preserva el contenido de llenura. Se retiene 'la nube' con artículo definido, como en el inglés POB, por el carácter teofánico específico.
- source_word: וְהֶחָצֵר
  english_pob_choice: and the court
  chosen_spanish: y el atrio
  alternatives_spanish:
  - y la corte
  - y el patio
  lexicon: HALOT
  rationale: חָצֵר en el marco del templo se rinde mejor como 'atrio' en español eclesial y arquitectónico. 'Atrio' comunica el espacio del templo sin perder la referencia espacial del texto.
- source_word: מָלְאָה
  english_pob_choice: was filled
  chosen_spanish: se llenó
  alternatives_spanish:
  - quedó lleno
  - fue lleno
  lexicon: HALOT
  rationale: La forma verbal describe el estado resultante de llenura. 'Se llenó' mantiene la estructura natural del español y reproduce el valor resultativo sin sobreinterpretar la voz.
- source_word: נֹגַהּ
  english_pob_choice: brightness
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - luminosidad
  - claridad
  lexicon: HALOT
  rationale: נֹגַהּ apunta a brillo/radiación luminosa. 'Resplandor' es un equivalente español digno y preciso, y armoniza mejor con 'gloria' en el cierre del versículo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El proyecto español establece 'Yahvé' como forma principal para יְהוָה. Se evita la máscara litúrgica 'SEÑOR' y se conserva el nombre pactual del texto conforme a la política del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Singular 'querubín' en un contexto visionario
  english_pob_reading: the cherub
  chosen_spanish_reading: el querubín
  alternative_spanish_readings:
  - los querubines
  rationale: El hebreo usa el singular, y el audit trail en inglés lo señala explícitamente. Se mantiene el singular en español para no armonizar indebidamente con usos plurales más comunes.
  doctrine_reference: Ezekiel 10:4 lexical note on singular כְּרוּב
- issue: Espacio del templo traducido como 'casa'
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - santuario
  - casa del templo
  rationale: Aunque el referente contextual es el santuario, el inglés POB retiene 'house' y anota la referencia. En español se conserva 'casa' en el texto principal para respetar el hebreo y se deja la posibilidad contextual en la nota.
  doctrine_reference: English POB footnote b on lexical alternative
translation_notes:
  revision_awareness: 'El texto sigue de cerca el cierre auditado del inglés POB y sus notas léxicas: conserva el singular de ''querubín'', mantiene ''casa'' con nota contextual, y reproduce la secuencia de llenura de la nube y del atrio con un español natural. No se detectaron revisiones recientes que exijan ajuste adicional; la traducción está alineada con el pass más reciente marcado como unchanged.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - Se mantiene la distinción entre 'casa' y 'atrio' como elementos arquitectónicos del templo.
  - '''Resplandor'' se reserva aquí para נֹגַהּ, mientras que ''gloria'' traduce כָּבוֹד.'
  - 'El orden de las acciones sigue el hebreo: ascenso de la gloria, llegada al umbral, llenura de la casa, y llenura del atrio.'
