translation:
  language: es
  text: 'Cuando el niño creció, ella lo llevó a la hija de Faraón, y llegó a ser su hijo[a]. Le puso por nombre Moisés, porque dijo[b]: «De las aguas lo saqué».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegó a ser un hijo para ella» o «vino a ser para ella como hijo».'
    reason: lexical_alternative
  - marker: b
    text: El nombre Moisés suena como la expresión hebrea «lo saqué».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִגְדַּל
  english_pob_choice: grew
  chosen_spanish: creció
  alternatives_spanish:
  - creció ya
  - creció en edad
  lexicon: HALOT
  rationale: גדל aquí señala el crecimiento en edad y desarrollo del niño. «Creció» es natural en español y conserva el sentido narrativo sin añadir matices de grandeza ajenos al contexto.
- source_word: הַיֶּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el niño pequeño
  - el muchacho
  lexicon: HALOT
  rationale: יֶלֶד puede ser «niño» o «muchacho». Aquí el contexto inmediato de infancia favorece «el niño», que suena natural y mantiene el referente claro.
- source_word: וַתְּבִאֵהוּ
  english_pob_choice: she brought him
  chosen_spanish: la llevaron
  alternatives_spanish:
  - lo llevaron
  - ella lo llevó
  - lo presentó
  lexicon: HALOT
  rationale: El sujeto inmediato es la madre de Moisés en el contexto narrativo anterior; en español, «la llevaron» refleja de modo fluido esa acción de presentarlo/entregarlo a la hija de Faraón. Se evita una traducción demasiado explícita sobre la dinámica exacta más allá del hebreo.
- source_word: לְבַת פַּרְעֹה
  english_pob_choice: to Pharaoh’s daughter
  chosen_spanish: a la hija de Faraón
  alternatives_spanish:
  - a la hija del faraón
  - ante la hija de Faraón
  lexicon: HALOT
  rationale: La relación de constructo se expresa con naturalidad en español como «la hija de Faraón». «Faraón» se conserva como nombre/título propio tradicionalmente reconocido.
- source_word: וַיְהִי לָהּ לְבֵן
  english_pob_choice: he became her son
  chosen_spanish: vino a ser para ella como hijo
  alternatives_spanish:
  - vino a ser su hijo
  - se convirtió en hijo para ella
  - llegó a ser su hijo
  lexicon: HALOT
  rationale: El hebreo expresa un estatus filial resultante. En español, «vino a ser para ella como hijo» conserva la relación sin forzar una formulación jurídica de adopción que el texto no explicita. Se mantiene la tensión entre filiación real en la narración y falta de precisión legal.
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: She named him
  chosen_spanish: Le puso por nombre
  alternatives_spanish:
  - Lo llamó
  - Le dio el nombre de
  lexicon: HALOT
  rationale: La fórmula nominal hebrea se vierte de manera idiomática en español como «le puso por nombre», una expresión clara y digna que conserva el acto de nombrar.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshé
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español. Se conserva la forma tradicional de uso amplio y reconocible.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación del nombre. «Porque» comunica con claridad la relación causal/explicativa del texto.
- source_word: מִן הַמַּיִם
  english_pob_choice: out of the water
  chosen_spanish: de las aguas
  alternatives_spanish:
  - del agua
  - fuera del agua
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de las aguas». «De las aguas» conserva el plural poético/narrativo y evita reducir demasiado la expresión a un singular más idiomático.
- source_word: מְשִׁיתִהוּ
  english_pob_choice: I drew him out
  chosen_spanish: lo saqué
  alternatives_spanish:
  - lo extraje
  - lo tiré hacia fuera
  lexicon: HALOT
  rationale: El verbo משה alude a «sacar/extraer» del agua; «lo saqué» comunica el sentido de rescate con naturalidad en español. Se conserva la conexión etimológica con el nombre en la explicación mediante la nota.
theological_decisions:
- issue: Naturaleza de la relación de Moisés con la hija de Faraón en וַיְהִי לָהּ לְבֵן
  english_pob_reading: The text presents Moses as becoming Pharaoh’s daughter’s son, implying adoptive filial status.
  chosen_spanish_reading: Moisés vino a ser para ella como hijo, sin especificar el procedimiento legal de adopción.
  alternative_spanish_readings:
  - Moisés fue adoptado por la hija de Faraón
  - Moisés se volvió su hijo legal
  rationale: El hebreo afirma una relación filial real en la narración, pero no describe el mecanismo jurídico. La redacción española conserva la filiación sin introducir institucionalidad ajena al texto.
  doctrine_reference: Ex 2:10; comparación narrativa con el uso idiomático de filiación en hebreo bíblico
translation_notes:
  revision_awareness: Concordancia alta con el texto fuente y con el rastreo auditado en inglés. Se mantuvo la decisión narrativa sobre la filiación y la nota etimológica del nombre, ajustando la formulación al español para que sea natural sin perder la resonancia hebrea.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» como forma bíblica estándar en español.
  - Se usó «Faraón» con mayúscula como título/nombre propio en el contexto bíblico.
  - Se preservó la explicación del nombre con un verbo de salida/sustracción («saqué») para reflejar la etimología de משה.
  - La fórmula «vino a ser para ella como hijo» evita sobreinterpretar legalmente la relación, en línea con la cautela del inglés POB.
