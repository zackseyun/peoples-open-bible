base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/033/021.yaml
  text: He chose the first part for himself[a], because there the portion of the lawgiver was reserved. He came with the heads of the people; he carried out the righteousness of Yahweh[b], and his judgments with Israel.
  footnotes:
