revisions:
- from: No verás el asno de tu hermano o su buey caídos en el camino y les harás caso omiso[a]; ciertamente los levantarás con él.
  to: No verás el asno de tu hermano o su buey caídos en el camino y harás caso omiso de ellos; ciertamente los levantarás con él.[a]
  rationale: Se hizo una reparación mínima para corregir la locución española impropia ‘les harás caso omiso’ a la forma idiomática ‘harás caso omiso de ellos’, preservando el sentido de omitir deliberadamente la situación. Además, se reubicó la nota al final de ‘con él’ para anclarla exactamente en la frase explicada por la nota, en conformidad con la disciplina de marcadores.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en casi todos los elementos: ‘de tu hermano’, ‘asno’, ‘buey’, ‘caídos’, ‘en el camino’ y ‘con él’ reflejan adecuadamente אָחִיךָ, חֲמוֹר, שׁוֹרוֹ, נֹפְלִים, בַּדֶּרֶךְ y עִמּוֹ. También mantiene la intensificación de הָקֵם תָּקִים con ‘ciertamente’. Sin embargo, ‘les harás caso omiso’ no es una correspondencia bien formada en español para וְהִתְעַלַּמְתָּ מֵהֶם en este contexto, porque la locución idiomática normal es ‘hacer caso omiso de’.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero ‘y les harás caso omiso’ suena anómalo y poco natural. Una reparación mínima a ‘y harás caso omiso de ellos’ o mejor ‘y te desentenderás de ellos’/‘y los ignorarás’ resolvería el problema. Dado que el hebreo lleva מֵהֶם, la formulación con ‘de ellos’ conserva bien la estructura y resulta natural. El resto del versículo lee bien en español eclesial neutral.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. ‘Hermano’, ‘asno’, ‘buey’ y ‘con él’ están alineados con las decisiones auditadas. La única corrección necesaria es idiomática en la representación de וְהִתְעַלַּמְתָּ מֵהֶם.
  issues:
  - severity: medium
    issue: ‘les harás caso omiso’ es una construcción impropia en español estándar
    rationale: La locución estable es ‘hacer caso omiso de alguien/algo’, no ‘hacerle caso omiso’. Así, aunque la intención semántica coincide con ‘ignore them’, la frase actual afecta la naturalidad y precisión idiomática del español.
  revised_spanish_text: No verás el asno de tu hermano o su buey caídos en el camino y harás caso omiso de ellos; ciertamente los levantarás con él.[a]
  revised_footnotes:
  - marker: a
    text: Literalmente, «con él», subrayando que la acción debe hacerse junto al dueño y no dejarlo sin ayuda.
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación mínima para corregir la locución española impropia ‘les harás caso omiso’ a la forma idiomática ‘harás caso omiso de ellos’, preservando el sentido de omitir deliberadamente la situación. Además, se reubicó la nota al final de ‘con él’ para anclarla exactamente en la frase explicada por la nota, en conformidad con la disciplina de marcadores.
