revisions:
- from: En aquel tiempo Yahvé apartó la tribu de Leví para llevar el arca del pacto de Yahvé, para estar en pie delante de Yahvé, para ministrarle y para bendecir en su nombre, hasta el día de hoy.
  to: En aquel tiempo Yahvé apartó la tribu de Leví para llevar el arca del pacto de Yahvé, para estar delante de Yahvé, para ministrarle y para bendecir en su nombre, hasta el día de hoy.
  rationale: Se hace una reparación menor de naturalidad española en la locución sacerdotal «estar en pie delante de», reduciéndola a «estar delante de», que sigue siendo fiel al hebreo y al inglés auditado pero evita un calco rígido. No se requieren notas.
