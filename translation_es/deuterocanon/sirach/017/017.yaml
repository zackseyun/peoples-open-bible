revisions:
- from: Sus injusticias no estuvieron ocultas de él[a], y todo pecado de ellos estuvo delante del Señor.
  to: Sus injusticias no estuvieron ocultas para él[a], y cada pecado de ellos estuvo delante del Señor.
  rationale: Se hicieron reparaciones menores para mejorar la naturalidad del español sin apartarse del griego ni del razonamiento documentado por el POB. «Para él» evita un calco extraño; «cada pecado de ellos» representa mejor el distributivo singular.
