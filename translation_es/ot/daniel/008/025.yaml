translation:
  language: es
  text: Por su sagacidad hará prosperar el engaño en su mano; y en su corazón se engrandecerá. En un tiempo de seguridad destruirá a muchos[a], y se levantará contra el Príncipe de príncipes; pero será quebrantado sin mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin mano humana», es decir, no por poder humano ordinario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂכְלוֹ
  english_pob_choice: his shrewdness
  chosen_spanish: su sagacidad
  alternatives_spanish:
  - su entendimiento
  - su astucia
  - su habilidad
  lexicon: HALOT
  rationale: En este contexto hostil, el término debe conservar inteligencia con matiz problemático o ambiguo. 'Sagacidad' comunica habilidad mental sin volverlo innecesariamente peyorativo como 'astucia', y mantiene el vínculo con el éxito del engaño.
- source_word: וְהִצְלִיחַ
  english_pob_choice: he will make deceit prosper
  chosen_spanish: hará prosperar el engaño
  alternatives_spanish:
  - hará que el engaño tenga éxito
  - hará prosperar su fraude
  lexicon: HALOT
  rationale: El verbo en causativo exige que el sujeto haga prosperar algo; aquí el objeto es 'engaño'. La forma española conserva la causatividad y no lo reduce a un simple éxito personal.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - fraude
  - treta
  - falsedad
  lexicon: HALOT
  rationale: '''Engaño'' es el equivalente más natural y amplio en español para la fuerza moral del sustantivo en este pasaje.'
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - por su mano
  - bajo su poder
  lexicon: HALOT
  rationale: La expresión mantiene la imagen hebrea de esfera de control o agencia. 'En su mano' es literal y comprensible en español sin perder el valor idiomático.
- source_word: וּבִלְבָבוֹ יַגְדִּיל
  english_pob_choice: in his heart he will magnify himself
  chosen_spanish: en su corazón se engrandecerá
  alternatives_spanish:
  - en su corazón se exaltará
  - se engrandecerá en su corazón
  - en su corazón se hará grande
  lexicon: HALOT
  rationale: El hebreo expresa orgullo interior y autoexaltación. En español, la forma reflexiva 'se engrandecerá' preserva גדל sin introducir una paráfrasis excesiva.
- source_word: וּבְשַׁלְוָה
  english_pob_choice: in a time of security
  chosen_spanish: en tiempo de seguridad
  alternatives_spanish:
  - en paz
  - mientras estén confiados
  - en tranquilidad
  lexicon: HALOT
  rationale: '''Seguridad'' captura mejor que ''paz'' la idea de un estado de calma o confianza que vuelve vulnerables a los muchos.'
- source_word: יַשְׁחִית רַבִּים
  english_pob_choice: he will destroy many
  chosen_spanish: destruirá a muchos
  alternatives_spanish:
  - arruinará a muchos
  - corromperá a muchos
  lexicon: HALOT
  rationale: En este contexto apocalíptico-político, el sentido más directo del causativo de שׁחת es 'destruir'. La preposición 'a' naturaliza el complemento directo humano en español.
- source_word: שַׂר שָׂרִים
  english_pob_choice: the Prince of princes
  chosen_spanish: el Príncipe de príncipes
  alternatives_spanish:
  - el príncipe de príncipes
  - el soberano de los soberanos
  - el jefe de príncipes
  lexicon: HALOT
  rationale: La cadena constructa es jerárquica/superlativa. Se conserva el título elevado y la mayúscula en 'Príncipe' para reflejar su carácter titulado en el contexto.
- source_word: יַעֲמֹד
  english_pob_choice: he will rise up against
  chosen_spanish: se levantará contra
  alternatives_spanish:
  - se pondrá contra
  - se opondrá a
  - estará contra
  lexicon: HALOT
  rationale: Con עַל, el verbo tiene fuerza de oposición hostil. 'Se levantará contra' es idiomático en español y reproduce esa adversidad.
- source_word: וּבְאֶפֶס יָד
  english_pob_choice: without hand
  chosen_spanish: sin mano
  alternatives_spanish:
  - sin mano humana
  - sin intervención humana
  - por ninguna mano
  lexicon: HALOT
  rationale: La expresión se mantiene breve y literal para conservar el hebraísmo. La nota explica el sentido interpretativo de ausencia de poder humano ordinario.
- source_word: יִשָּׁבֵר
  english_pob_choice: he will be broken
  chosen_spanish: será quebrantado
  alternatives_spanish:
  - será quebrado
  - será destruido
  - será hecho pedazos
  lexicon: HALOT
  rationale: 'El niphal expresa pasividad: quedar quebrado/roto. ''Quebrantado'' preserva la metáfora de ruptura y suena natural y solemne en español bíblico contemporáneo.'
theological_decisions:
- issue: 'Título final: שַׂר שָׂרִים'
  english_pob_reading: the Prince of princes
  chosen_spanish_reading: el Príncipe de príncipes
  alternative_spanish_readings:
  - el príncipe de príncipes
  - el soberano de los soberanos
  rationale: La capitalización en español señala que funciona como título exaltado, sin cerrar del todo la identidad exacta más allá de lo que el pasaje permite. Esto preserva la tensión teológica del texto.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: וּבְאֶפֶס יָד
  english_pob_reading: but he will be broken without hand
  chosen_spanish_reading: pero será quebrantado sin mano
  alternative_spanish_readings:
  - pero será quebrantado sin mano humana
  - pero será destruido sin intervención humana
  rationale: El hebreo es deliberadamente elíptico. La traducción principal retiene la frase desnuda para no sustituir el texto por una explicación, mientras la nota preserva la implicación interpretativa de una acción no humana/ordinaria.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el expediente inglés POB: mantiene la secuencia causal de ''su sagacidad'' → ''hará prosperar el engaño'', conserva la imagen de ''en su mano'' y traduce el cierre como ''sin mano'' para sostener la tensión del hebraísmo. Se adapta el registro al español natural sin introducir glosas innecesarias.'
  spanish_consistency_notes:
  - Se mantiene 'Príncipe de príncipes' como título capitalizado, en paralelo al tratamiento inglés.
  - '''Engaño'' conserva la amplitud semántica de מִרְמָה y evita estrecharlo a un solo matiz técnico.'
  - '''Sin mano'' se deja literal en el texto principal, con explicación en nota para no perder la forma idiomática del hebreo.'
  - La voz verbal futura y la serie de acciones mantienen el carácter profético del verso.
