id: 1KI.11.31
reference: 1 Kings 11:31
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ לְ/יָֽרָבְעָ֔ם קַח לְ/ךָ֖ עֲשָׂרָ֣ה קְרָעִ֑ים כִּ֣י כֹה֩ אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל הִנְ/נִ֨י קֹרֵ֤עַ אֶת הַ/מַּמְלָכָה֙ מִ/יַּ֣ד שְׁלֹמֹ֔ה וְ/נָתַתִּ֣י לְ/ךָ֔ אֵ֖ת עֲשָׂרָ֥ה הַ/שְּׁבָטִֽים־־׃
translation:
  text: 'And he said to Jeroboam[a], “Take for yourself ten pieces, for this is what Yahweh, the God of Israel, says: ‘Look, I am tearing the kingdom out of the hand of Solomon, and I will give you ten tribes.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “ten torn pieces.” The Hebrew noun refers to pieces produced by tearing, matching Ahijah’s symbolic action with the garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח לְךָ
  chosen: Take for yourself
  alternatives:
  - Take
  - Take for yourself
  lexicon: HALOT
  rationale: The imperative קַח means 'take.' The dative לְךָ adds a reflexive/personal nuance ('for yourself'), which is worth preserving in natural English without over-literalism.
- source_word: קְרָעִים
  chosen: pieces
  alternatives:
  - pieces
  - tears
  - strips
  lexicon: HALOT
  rationale: From the root קרע ('tear'), the noun refers to torn pieces of the garment in the enacted sign. 'Pieces' is the most natural English in context; 'tears' is less idiomatic as a count noun here, and 'strips' is too specific.
- source_word: כִּי כֹה אָמַר
  chosen: for this is what ... says
  alternatives:
  - for thus says
  - for this is what ... says
  lexicon: HALOT
  rationale: This prophetic formula is formally 'for thus says,' but 'this is what ... says' preserves the sense in readable modern English, fitting optimal equivalence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: 'Standard construct phrase identifying YHWH covenantally. Including the article in English yields natural phrasing: ''the God of Israel.'''
- source_word: הִנְנִי
  chosen: Look, I am
  alternatives:
  - Behold, I am
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: הִנְנִי is a deictic attention-getter plus self-reference. 'Look, I am' preserves the immediacy without archaic 'behold.'
- source_word: קֹרֵעַ
  chosen: tearing
  alternatives:
  - tearing
  - about to tear
  - rending
  lexicon: HALOT
  rationale: The participle conveys imminent or vivid ongoing action in prophetic speech. 'I am tearing' captures the vividness better than a simple future, while remaining natural.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingdom
  - the royal kingdom
  lexicon: HALOT
  rationale: The noun plainly denotes the kingdom/realm. 'Kingdom' is the standard and sufficient rendering here.
- source_word: מִיַּד שְׁלֹמֹה
  chosen: out of Solomon’s hand
  alternatives:
  - from Solomon
  - out of Solomon's hand
  lexicon: HALOT
  rationale: The idiom 'from the hand of' denotes removal from someone's power or possession. Preserving 'hand' retains the Hebrew imagery and political force.
- source_word: וְנָתַתִּי לְךָ
  chosen: and I will give you
  alternatives:
  - and I will give to you
  - and I will give you
  lexicon: HALOT
  rationale: Straightforward future with indirect object; idiomatic English contracts naturally to 'give you.'
- source_word: עֲשָׂרָה הַשְּׁבָטִים
  chosen: ten tribes
  alternatives:
  - ten tribes
  - the ten tribes
  lexicon: HALOT
  rationale: Although the Hebrew has the article on 'tribes,' English idiom after a numeral normally omits it. The phrase refers to the ten tribal units to be given to Jeroboam.
