base_translation:
  language: en
  yaml_path: translation/deuterocanon/bel_and_the_dragon/001/033.yaml
  text: And Habakkuk the prophet was in Judea[a], and he had cooked a stew and crumbled bread into a bowl[c][b], and was going to the field to bring it to the reapers.
  footnotes:
  - marker: a
    text: Or 'Judah.' The Greek Ἰουδαία can denote the region of Judea or, in some contexts, Judah.
    reason: lexical_alternative
  - marker: b
    text: Literally 'boiled food'; 'stew' is a natural English rendering for the prepared dish.
    reason: lexical_alternative
  - marker: c
    text: Greek 'loaves'; English uses 'bread' idiomatically here.
    reason: lexical_alternative
