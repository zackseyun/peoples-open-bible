translation:
  language: es
  text: y te volverás a Yahvé tu Dios y obedecerás su voz[a], conforme a todo lo que yo te mando hoy, tú y tus hijos e hijas[b], con todo tu corazón y con toda tu alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y escucharás su voz». El hebreo suele llevar aquí el sentido más fuerte de «obedecer».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tus hijos». Aquí se traduce «tus hijos e hijas» para expresar explícitamente el sentido genérico de descendencia en este contexto de pacto; el término hebreo puede funcionar de manera inclusiva para la prole.'
    reason: lexical_alternative
  - marker: c
    text: O «con toda tu vida» o «con todo tu ser» para «con toda tu alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתָּ
  english_pob_choice: and you return
  chosen_spanish: y te volverás
  alternatives_spanish:
  - y volverás
  - y te regresarás
  - y volverás de nuevo
  lexicon: HALOT
  rationale: שׁוּב expresa la idea concreta de volver/retornar. En español, «te volverás» comunica bien el movimiento de regreso sin introducir de manera obligatoria el matiz técnico de «arrepentirte», que sería posible pero más interpretativo en este contexto de pacto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton con la forma usada por defecto en el proyecto: «Yahvé». Mantiene la distinción frente a un título sustitutivo y es el equivalente español estandarizado dentro de esta línea de traducción.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios personal
  - tu Dios propio
  lexicon: HALOT
  rationale: La relación posesiva de segunda persona singular se expresa naturalmente con «tu Dios». No hace falta ampliar el sentido; el hebreo es directo y relacional.
- source_word: וְשָׁמַעְתָּ בְקֹלוֹ
  english_pob_choice: and obey his voice
  chosen_spanish: y obedecerás su voz
  alternatives_spanish:
  - y escucharás su voz
  - y oirás su voz
  lexicon: HALOT
  rationale: שמַע con בְּקוֹל suele implicar atender obedeciendo, no solo oír. «Obedecerás su voz» conserva esa fuerza idiomática mejor que «escucharás», sin borrar la imagen auditiva de la voz divina.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La frase indica conformidad plena con el contenido del mandato. «Conforme a todo lo que» es natural en español y mantiene el alcance total de la expresión hebrea.
- source_word: אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: I am commanding you today
  chosen_spanish: yo te mando hoy
  alternatives_spanish:
  - yo te estoy mandando hoy
  - yo te ordeno hoy
  lexicon: HALOT
  rationale: El participio/forma verbal aquí comunica una acción en curso o vigente. En español, «yo te mando hoy» es sobrio y fiel, y el adverbio temporal «hoy» conserva el énfasis del texto.
- source_word: אַתָּה וּבָנֶיךָ
  english_pob_choice: you and your children
  chosen_spanish: tú y tus hijos
  alternatives_spanish:
  - tú y tus niños
  - tú y tu descendencia
  lexicon: HALOT
  rationale: Aunque בנים puede ser genérico para descendencia, el español aquí funciona bien con «hijos» como heredero semántico natural de la forma masculina plural, sin perder el alcance familiar del pacto. «Tus hijos» es más cercano al ritmo del hebreo que «tu descendencia».
- source_word: בְּכָל לְבָבְךָ
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - de todo tu corazón
  lexicon: HALOT
  rationale: «Corazón» conserva el sentido hebreo del centro interior de voluntad, pensamiento y afecto. La preposición «con» reproduce la formulación tradicional del paralelismo del versículo en español natural.
- source_word: וּבְכָל נַפְשֶׁךָ
  english_pob_choice: and with all your soul
  chosen_spanish: y con toda tu alma
  alternatives_spanish:
  - y con toda tu vida
  - y con todo tu ser
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o ser. «Alma» mantiene la pareja bíblica clásica con «corazón» y es suficientemente comprensible; en nota se preserva la alternativa semántica amplia.
theological_decisions:
- issue: Nombre divino del pacto (יְהוָה)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El hebreo usa directamente el nombre propio del Dios del pacto. Se evita sustituirlo por un título como «el SEÑOR», porque eso ocultaría el dato textual que la línea POB busca transparentar.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Alcance de בָנֶיךָ
  english_pob_reading: your children
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus niños
  - tus descendientes
  rationale: La forma masculina plural puede abarcar descendencia en un marco de pacto. En esta frase, «tus hijos» conserva la relación generacional sin restringir innecesariamente el referente a varones adultos ni ampliar demasiado a una abstracción.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de שׁמע con בְקול
  english_pob_reading: and obey his voice
  chosen_spanish_reading: y obedecerás su voz
  alternative_spanish_readings:
  - y escucharás su voz
  - y oirás su voz
  rationale: La construcción hebrea no describe solo percepción auditiva. La lectura elegida mantiene la tensión entre escuchar y obedecer, y evita diluir el imperativo relacional del pacto.
  doctrine_reference: HALOT, שׁמע + בְּקוֹל
translation_notes:
  revision_awareness: La versión final concuerda con el último pase de revisión, que no propuso cambios y fue marcado como de alta concordancia. Se conservó la decisión de traducir el nombre divino como Yahvé/Yahveh en lugar de una sustitución por título, y se mantuvo la lectura idiomática de שׁמע בְּקוֹל como obediencia. No se introdujeron cambios textuales respecto del consenso del audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en este proyecto; no se alterna con «SEÑOR».
  - Se mantiene la coordinación bíblica «con todo tu corazón y con toda tu alma» para conservar el paralelismo hebreo.
  - La primera persona en «yo te mando hoy» se expresa de modo natural en español sin perder el énfasis del presente mandatorio.
  - Se eligió «tus hijos» por fidelidad contextual y fluidez en español, sin forzar lenguaje técnico de descendencia.
  - Las notas preservan las alternativas semánticas pertinentes, especialmente para שׁמע, בנים y נפש.
