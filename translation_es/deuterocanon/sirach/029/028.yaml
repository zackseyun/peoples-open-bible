  spanish_quality_summary: El español es generalmente digno y comprensible, pero «gravosas» y «discernimiento» son algo formales; eso aún es aceptable en registro sapiencial. La principal dificultad de legibilidad es «reprensión de una casa», que resulta extraña. «Hogar» o «familia» mejora la naturalidad sin apartarse del sentido. También conviene ajustar la nota para evitar el anglicismo «renderizaciones» y para reflejar mejor la alternativa contextual.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones clave son léxicas y estilísticas: mantener la distinción entre ἐπιτίμησις y ὀνειδισμός, conservar la imagen de carga de βαρέα, y representar οἰκίας de forma idiomática en español como esfera doméstica. «Acreedor» encaja mejor que «prestamista» con el matiz social del contexto y con la alternativa documentada en la auditoría inglesa.'
  issues:
