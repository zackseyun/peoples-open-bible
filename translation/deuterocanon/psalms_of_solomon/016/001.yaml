id: PSS.16.1
reference: Psalms of Solomon 16:1
source:
  edition: lxx-swete-1909
  text: Ἐν τῷ συστάξαι ψυχήν μου ἀπὸ Κυρίου, παρὰ μικρὸν ὠλίσθησα ἐν καταφορᾷ ὕπνου.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: When my soul was departing from the Lord[c][b][a], I almost slipped in the descent of sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When my soul was apart from the Lord.'
    reason: alternative_reading
  - marker: b
    text: The phrase rendered 'the downward plunge of sleep' may also mean 'the heaviness' or 'stupor of sleep.'
    reason: lexical_alternative
  - marker: c
    text: Or 'When my soul gathered itself'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἐν τῷ συστάξαι
  chosen: When ... gathered itself
  alternatives:
  - When ... was joined
  - When ... composed itself
  - In the gathering
  lexicon: LSJ
  rationale: The aorist infinitive with ἐν τῷ is temporal, best rendered 'when.' συστάξαι here likely conveys being set together or gathered into a condition; with ψυχήν μου as object, 'my soul gathered itself' preserves the reflexive sense implied in context without over-paraphrasing.
- source_word: ψυχήν μου
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: LSJ
  rationale: ψυχή can mean soul, life, or self, but in this poetic and devotional context 'soul' best preserves the interior, spiritual resonance of the Greek.
- source_word: ἀπὸ Κυρίου
  chosen: away from the Lord
  alternatives:
  - from the Lord
  - apart from the Lord
  lexicon: LSJ
  rationale: ἀπό marks separation or departure. 'Away from the Lord' makes the relational distancing explicit and fits the warning tone of the line.
- source_word: παρὰ μικρόν
  chosen: almost
  alternatives:
  - for a little
  - by a little
  lexicon: LSJ
  rationale: This idiom commonly means 'almost' or 'within a little,' and idiomatic English is preferable here.
- source_word: ὠλίσθησα
  chosen: I slipped
  alternatives:
  - I stumbled
  - I was made to slip
  lexicon: LSJ
  rationale: The verb denotes slipping or losing footing. 'I slipped' is vivid, natural, and suitably close to the Greek image.
- source_word: ἐν καταφορᾷ ὕπνου
  chosen: into the downward plunge of sleep
  alternatives:
  - in the heaviness of sleep
  - into sleep's descent
  - in a sleepy stupor
  lexicon: LSJ
  rationale: καταφορά can denote a downward motion, sinking, or drowsy onset. Because the image follows 'I slipped,' a rendering that preserves descent imagery is preferable. 'The downward plunge of sleep' keeps the metaphorical force without flattening it into mere tiredness.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: 'Per project doctrine, κύριος defaults to ''Lord.'' With ἀπό, the article is natural in English: ''away from the Lord.'''
