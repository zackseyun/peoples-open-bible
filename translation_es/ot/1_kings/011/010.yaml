translation:
  language: es
  text: y le había mandado respecto de este asunto[a], para no ir tras otros dioses, pero no guardó lo que Yahvé había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “ir tras otros dioses”, un modismo de pacto para apartarse de Yahvé y rendir culto a otras deidades.'
    reason: cultural_note
lexical_decisions:
- source_word: וְצִוָּה
  english_pob_choice: and had commanded
  chosen_spanish: y le había mandado
  alternatives_spanish:
  - y mandó
  - y había ordenado
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto narra una acción anterior a la falta descrita después; en español, el pluscuamperfecto expresa bien esa anterioridad. 'Mandar' mantiene el valor de צוה como dar una orden con autoridad.
- source_word: אֵלָיו
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: En español, el dativo átono 'le' reproduce naturalmente el complemento indirecto sin perder la relación personal del mandamiento.
- source_word: עַל הַדָּבָר הַזֶּה
  english_pob_choice: concerning this matter
  chosen_spanish: respecto de este asunto
  alternatives_spanish:
  - con respecto a este asunto
  - sobre este asunto
  lexicon: HALOT
  rationale: דָּבָר aquí designa el tema o asunto mencionado, no una mera 'palabra'. 'Asunto' comunica ese sentido con naturalidad en español; 'respecto de' refleja bien עַל en registro formal.
- source_word: לְבִלְתִּי לֶכֶת
  english_pob_choice: not to go
  chosen_spanish: para que no fuera
  alternatives_spanish:
  - para no ir
  - a fin de no ir
  lexicon: HALOT
  rationale: La construcción expresa propósito/prohibición. En español, 'para que no fuera' conserva esa relación causal-final con una forma idiomática y clara.
- source_word: אַחֲרֵי אֱלֹהִים אֲחֵרִים
  english_pob_choice: after other gods
  chosen_spanish: tras dioses ajenos
  alternatives_spanish:
  - tras otros dioses
  - detrás de dioses ajenos
  lexicon: HALOT
  rationale: Se conserva el idiomático 'ir tras' como equivalencia de seguimiento/culto idolátrico. 'Ajenos' expresa היטב la alteridad y extranjería religiosa de אֲחֵרִים y evita una reiteración innecesaria de 'otros'.
- source_word: וְלֹא שָׁמַר
  english_pob_choice: but he did not keep
  chosen_spanish: pero no guardó
  alternatives_spanish:
  - y no guardó
  - pero no obedeció
  lexicon: HALOT
  rationale: שָׁמַר en contextos de mandamiento suele significar observar/guardar/obedecer. 'Guardar' es una opción bíblica y precisa que conserva el matiz de fidelidad al mandato.
- source_word: אֵת אֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: what Yahweh had commanded
  chosen_spanish: lo que Yahvé había mandado
  alternatives_spanish:
  - lo que Yahvé había ordenado
  - lo que había mandado Yahvé
  lexicon: HALOT
  rationale: El relativo sustantivado 'lo que' fluye bien en español. Se mantiene 'Yahvé' conforme a la política del proyecto para יְהוָה, y 'mandado' preserva la fuerza del mandato divino.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre divino. Conforme al criterio del proyecto, se translitera como 'Yahvé' y no se sustituye por un título, preservando el nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomática de fidelidad al mandamiento
  english_pob_reading: did not keep what Yahweh had commanded
  chosen_spanish_reading: no guardó lo que Yahvé había mandado
  alternative_spanish_readings:
  - no obedeció lo que Yahvé había mandado
  - no observó lo que Yahvé había mandado
  rationale: שמר en un contexto de mandato tiene una fuerte carga de guardar/observar fielmente. 'Guardar' conserva ese matiz covenantal sin borrar la desobediencia implícita en el contexto.
  doctrine_reference: Lexical-theological note on covenant obedience in command contexts
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la secuencia narrativa anterior al incumplimiento con pluscuamperfecto y respetando la revisión que volvió más formal la relación con el asunto tratado. También conserva la nota cultural sobre el modismo 'ir tras otros dioses' mediante un pie de página en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene 'dioses ajenos'/'tras dioses ajenos' para reflejar el modismo covenantal sin domesticarlo a una paráfrasis religiosa más genérica.
  - '''Guardar'' se conserva para שָׁמַר en clave de obediencia al mandato.'
  - El registro es bíblico y sobrio, evitando arcaísmos innecesarios pero preservando la dignidad del texto.
