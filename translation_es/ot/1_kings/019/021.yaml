translation:
  language: es
  text: Entonces él volvió de seguirlo, tomó el par de bueyes[a] y los sacrificó. Con el equipo de los bueyes[b] coció la carne y la dio al pueblo, y comieron. Luego se levantó, fue tras Elías y le sirvió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el yugo de bueyes».
    reason: lexical_alternative
  - marker: b
    text: O «el yugo de los bueyes» o «los implementos de los bueyes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב מֵאַחֲרָיו
  english_pob_choice: Then he turned back from following him
  chosen_spanish: Entonces él volvió de seguirlo[a]
  alternatives_spanish:
  - Entonces él regresó de detrás de él
  - Entonces él se volvió de seguirlo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente equivale a 'volvió de detrás de él / de seguirlo'. En español, 'volvió de seguirlo' conserva el valor direccional y el hecho de que venía detrás de Elías, sin sonar forzado.
- source_word: צֶמֶד הַבָּקָר
  english_pob_choice: the pair of oxen
  chosen_spanish: el yugo de bueyes
  alternatives_spanish:
  - la pareja de bueyes
  - el par de bueyes
  lexicon: HALOT
  rationale: צֶמֶד puede significar un par unido, y también un yugo de bueyes. Aquí el contexto del arado y de los utensilios favorece el sentido de 'yugo' como unidad de trabajo; por eso se refleja la alternativa documentada en la nota.
- source_word: וַיִּזְבָּחֵהוּ
  english_pob_choice: and sacrificed them
  chosen_spanish: los sacrificó
  alternatives_spanish:
  - los degolló
  - los inmoló
  lexicon: HALOT
  rationale: זבח puede tener color sacrificial, no solo la idea neutral de matar. 'Los sacrificó' conserva esa tensión cultual sin afirmar más de lo que el pasaje dice sobre un rito formal específico.
- source_word: וּבִכְלִי הַבָּקָר
  english_pob_choice: With the oxen’s equipment
  chosen_spanish: Con el equipo de los bueyes[b]
  alternatives_spanish:
  - Con el yugo de los bueyes
  - Con los implementos de los bueyes
  lexicon: HALOT
  rationale: 'כְּלִי es amplio: utensilio, implemento, equipo. ''Equipo'' es natural en español y preserva la amplitud; la nota recoge la lectura más específica, como en el audit trail inglés.'
- source_word: בִּשְּׁלָם הַבָּשָׂר
  english_pob_choice: he boiled the flesh
  chosen_spanish: coció la carne
  alternatives_spanish:
  - hirvió la carne
  - cocinó la carne
  lexicon: HALOT
  rationale: בשל admite 'cocer/cocinar/hervir'. En español, 'coció la carne' comunica el resultado culinario sin hacer demasiado técnico el proceso, y mantiene la concreción de בשר como 'carne'.
- source_word: לָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a los presentes
  lexicon: HALOT
  rationale: עָם aquí designa al grupo local que participó de la comida; 'pueblo' es natural y más concordante con el registro bíblico en español.
- source_word: וַיָּקָם
  english_pob_choice: Then he arose
  chosen_spanish: Luego se levantó
  alternatives_spanish:
  - Luego se alzó
  - Entonces se puso de pie
  lexicon: HALOT
  rationale: En español, 'se levantó' es la manera más clara y natural de reproducir el movimiento narrativo de וַיָּקָם sin sobrecargar el registro.
- source_word: וַיֵּלֶךְ אַחֲרֵי אֵלִיָּהוּ
  english_pob_choice: and went after Elijah
  chosen_spanish: fue tras Elías
  alternatives_spanish:
  - siguió a Elías
  - fue detrás de Elías
  lexicon: HALOT
  rationale: '''Fue tras Elías'' conserva la imagen espacial de ir detrás de alguien, coherente con la frase anterior, y evita una repetición demasiado plana de ''seguir''.'
- source_word: וַיְשָׁרְתֵהוּ
  english_pob_choice: and served him
  chosen_spanish: y le sirvió
  alternatives_spanish:
  - y fue su servidor
  - y le ministró
  lexicon: HALOT
  rationale: שרת denota servicio personal o asistencia. 'Le sirvió' es directo, digno y suficientemente amplio para el papel de asistente que el contexto sugiere.
theological_decisions:
- issue: Mantener el matiz sacrificial de זבח sin especificar un rito cultual formal
  english_pob_reading: Rendered as 'sacrificed them'
  chosen_spanish_reading: '''los sacrificó'''
  alternative_spanish_readings:
  - '''los degolló'''
  - '''los mató'''
  rationale: El verbo hebreo lleva una carga sacrificial real, y el contexto de la comida comunitaria después del llamado de Elías favorece conservar esa resonancia. No se añade un altar, sacerdote ni destinatario del sacrificio, porque el texto no lo explicita.
  doctrine_reference: No doctrinal claim beyond lexical-theological sense; cf. use of זבח in narrative and cultic contexts.
translation_notes:
  revision_awareness: El texto inglés revisado eliminó 'their' antes de 'flesh' por naturalidad; en español se evitó igualmente cualquier posesivo redundante. También se mantuvo la ambigüedad de צֶמֶד/כְּלִי mediante una traducción principal y una nota alternativa, como en el audit trail.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto lo exija; este versículo no lo contiene.
  - '''Bueyes'' se usa de forma consistente para הַבָּקָר.'
  - Se conservó el paralelismo narrativo de acciones sucesivas con 'Entonces/Luego' para reflejar la cadena wayyiqtol.
  - No se introdujo 'Cristo' ni terminología eclesiástica ajena al pasaje.
