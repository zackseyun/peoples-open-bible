    text: 'O: «toda la comunidad de los israelitas». El hebreo dice «la congregación de los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: «Extranjero residente» designa a un no israelita que vive entre Israel bajo las leyes y protecciones de la comunidad.
    reason: cultural_note
  - marker: c
    text: 'O: «porque todo el pueblo estuvo en error». La cláusula final en hebreo es breve y admite una formulación más literal de ese modo.'
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis principal para que el pasivo/impersonal de וְנִסְלַח suene natural y correcto en español («se le perdonará a toda la congregación»). Se mantiene «congregación», «hijos de Israel» y «extranjero residente» por fidelidad al expediente léxico. También se suaviza la cláusula final con «se hizo por inadvertencia», que conserva el carácter compacto y corporativo del hebreo mejor que «fue hecho». Se ajusta la nota a para alinearla mejor con la alternativa documentada en inglés, y la nota c se acerca más a la alternativa auditada («all the people were in error»).
