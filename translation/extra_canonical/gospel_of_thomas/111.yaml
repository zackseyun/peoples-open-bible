translation:
  text: Jesus said[Does not Jesus say], "The heavens will roll up, and the earth,
    in your presence, and the one who lives from the living one will not see death."
    Does not Jesus say, "Whoever finds himself[finds himself], the world is not worthy
    of him"?
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T11:09:45Z'
  footnotes:
  - marker: Does not Jesus say
    text: The text abruptly shifts into the third person, quoting Jesus as an external
      authority. This meta-commentary is unique in the Gospel of Thomas and strongly
      suggests a compiler's gloss or a later redactional layer that has been incorporated
      into the text.
    reason: textual_variant
  - marker: finds himself
    text: Coptic ⲁϩⲉ ⲉⲣⲟϥ ⲟⲩⲁⲁϥ. The word ⲟⲩⲁⲁϥ functions grammatically as a reflexive
      ('himself'), but given Thomas's theology of the solitary (monachos), it also
      carries the resonance of 'finds himself alone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ϭⲱⲗ
  chosen: roll up
  rationale: 'Crum 809a: ''fold up, roll up''. Often used in apocalyptic contexts
    for the heavens rolling up like a scroll (e.g., Isaiah 34:4).'
  lexicon: Crum
- source_word: ⲙ̄ⲧⲟ ⲉⲃⲟⲗ
  chosen: presence
  rationale: 'Crum 188b: ''presence''. With the possessive prefix ⲡⲉⲧⲛ- (your), it
    means ''in your presence'' or ''before you''.'
  lexicon: Crum
- source_word: ⲟⲩⲭ ϩⲟⲧⲓ
  chosen: Does not...?
  rationale: Greek loanword οὐχ ὅτι. While in Greek it typically means 'not that',
    in Coptic it functions as an interrogative particle expecting an affirmative answer
    ('is it not that...?'), equivalent to οὐχί (Crum 384a).
  lexicon: Crum
- source_word: ⲁϩⲉ ⲉⲣⲟϥ ⲟⲩⲁⲁϥ
  chosen: finds himself
  rationale: ⲁϩⲉ ⲉⲣⲟ- means 'to find' (Crum 20a). The addition of ⲟⲩⲁⲁϥ ('alone' /
    'self') functions grammatically to make the pronoun reflexive ('himself').
  lexicon: Crum
- source_word: ⲙ̄ⲡϣⲁ
  chosen: worthy
  rationale: 'Crum 181a: ''be worthy''.'
  lexicon: Crum
theological_decisions:
- issue: Capitalization of 'living one'
  chosen_reading: living one
  rationale: Kept lowercase to preserve the ambiguity of whether it refers to the
    Father, the Living Jesus, or the divine source generally, avoiding over-specifying
    the theology with modern capitalization conventions.
drafter_notes: The saying combines an apocalyptic-sounding declaration (which Thomas
  immediately subverts by placing the eschaton 'in your presence' rather than in the
  future) with a meta-commentary quoting Jesus in the third person. The translation
  preserves the exact Coptic word order for the rolling up of the heavens and the
  earth, and maintains the third-person interjection exactly as it appears in the
  manuscript.
