translation:
  language: es
  text: Se apartarán[a] los celos de Efraín, y serán cortados los adversarios de Judá; Efraín no tendrá celos de Judá, y Judá no hostigará[b] a Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la envidia de Efraín se apartará»; el hebreo קנא/קנאה puede denotar celos o envidia/rivalidad en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «no será hostil a Efraín» o «no oprimirá a Efraín»; el hebreo puede expresar enemistad, hostigamiento u opresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/סָ֨רָה֙
  english_pob_choice: will depart
  chosen_spanish: desaparecerá
  alternatives_spanish:
  - se apartará
  - cesará
  - se irá
  lexicon: HALOT
  rationale: El hebreo expresa que la envidia/rivalidad de Efraín se aparta o se retira. «Desaparecerá» comunica bien el cese del estado y suena natural en español, sin perder la imagen de que algo deja de estar presente.
- source_word: קִנְאַ֣ת
  english_pob_choice: the jealousy
  chosen_spanish: la envidia
  alternatives_spanish:
  - los celos
  - la celosa rivalidad
  - el celo
  lexicon: HALOT
  rationale: En este contexto de rivalidad entre Efraín y Judá, la POB inglesa nota la posibilidad de 'envy' además de 'jealousy'. «Envidia» funciona muy bien en español para esa rivalidad interpersonal o intertribal y evita el matiz excesivamente emocional de «celos».
- source_word: אֶפְרַ֔יִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: Nombre propio hebreo transcrito según uso español bíblico común.
  rationale: Se conserva el nombre propio con la forma española usual «Efraín», manteniendo la referencia histórica y poética sin expandir interpretativamente el referente.
- source_word: וְ/צֹרְרֵ֥י יְהוּדָ֖ה
  english_pob_choice: the adversaries of Judah
  chosen_spanish: los adversarios de Judá
  alternatives_spanish:
  - los enemigos de Judá
  - los hostiles a Judá
  - los opresores de Judá
  lexicon: HALOT
  rationale: «Adversarios» reproduce bien el sentido amplio de hostilidad de צרר sin restringirlo a guerra formal ni a opresión específica. «De Judá» conserva el constructo hebreo.
- source_word: יִכָּרֵ֑תוּ
  english_pob_choice: will be cut off
  chosen_spanish: serán cortados
  alternatives_spanish:
  - serán eliminados
  - serán destruidos
  - serán arrancados
  lexicon: HALOT
  rationale: La forma nifal de כרת mantiene la imagen de ser cortados. En español, «serán cortados» es fiel y suficientemente transparente, aunque algo idiomático; evita sustituir la metáfora por una paráfrasis más abstracta.
- source_word: לֹֽא יְקַנֵּ֣א אֶת יְהוּדָ֔ה
  english_pob_choice: will not be jealous of Judah
  chosen_spanish: no tendrá envidia de Judá
  alternatives_spanish:
  - no envidiará a Judá
  - no sentirá celos de Judá
  - no rivalizará con Judá
  lexicon: HALOT
  rationale: El paralelo con la primera cola sugiere mantener el campo semántico de קנא/קנאה. «No tendrá envidia de Judá» conserva esa repetición temática y suena natural en español.
- source_word: וִֽ/יהוּדָ֖ה
  english_pob_choice: and Judah
  chosen_spanish: y Judá
  alternatives_spanish:
  - e Judá
  lexicon: Nombre propio hebreo transcrito según uso español bíblico común.
  rationale: Se conserva el nombre propio con la forma española usual «Judá», manteniendo el paralelismo.
- source_word: לֹֽא יָצֹ֥ר אֶת אֶפְרָֽיִם
  english_pob_choice: will not harass Ephraim
  chosen_spanish: no hostigará a Efraín
  alternatives_spanish:
  - no oprimirá a Efraín
  - no será hostil a Efraín
  - no atacará a Efraín
  lexicon: HALOT
  rationale: El verbo puede abarcar hostilidad, acoso o agresión. «Hostigará» preserva la idea de antagonismo activo sin precisar innecesariamente una escena militar; por eso corresponde bien a la observación de la POB inglesa.
theological_decisions:
- issue: Referente de Efraín y Judá
  english_pob_reading: Retain the tribal/national names 'Ephraim' and 'Judah' rather than interpretively expanding them to 'the northern kingdom' and 'the southern kingdom.'
  chosen_spanish_reading: Conservar los nombres tribales «Efraín» y «Judá» en lugar de expandirlos interpretativamente a «el reino del norte» y «el reino del sur».
  alternative_spanish_readings:
  - el reino del norte ... el reino del sur
  - Israel ... Judá
  rationale: El hebreo nombra directamente a Efraín y Judá. Mantener esos nombres preserva el tejido poético e histórico del verso y deja que el contexto exprese la referencia corporativa más amplia.
  doctrine_reference: 'Principio de primacía del original: transliterar nombres propios y no expandir el texto más allá de lo que el hebreo afirma.'
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés de la POB y el hebreo masorético, sin cambios de revisión reportados en el pass más reciente; se mantuvo la lectura de nombres tribales y la alternancia semántica de קנא/קנאה y צרר/hostilidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque el Tetragrámaton no aparece en este versículo.
  - 'Se conservan los nombres propios bíblicos con formas españolas habituales: Efraín, Judá.'
  - «Envidia» se eligió para קנאה por el contexto de rivalidad intertribal; no se impone «celos» salvo que el contexto lo exija.
  - «Hostigará» mantiene el rango semántico de la hostilidad sin introducir un detalle militar no presente en el hebreo.
