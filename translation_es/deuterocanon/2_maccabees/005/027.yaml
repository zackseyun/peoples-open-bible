translation:
  language: es
  text: Pero Judas[a], también llamado Macabeo, habiendo quedado como uno de unos diez y habiéndose retirado, vivía en los montes como una fiera con los que estaban con él, y seguían alimentándose de alimento vegetal para no participar en la impureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más explícitamente: «habiéndose hecho uno de unos diez», es decir, reducido a un grupo de alrededor de diez hombres. La frase griega es comprimida y aproximada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας ... ὁ καὶ Μακκαβαῖος
  english_pob_choice: Judas, who was also called Maccabeus
  chosen_spanish: Judas, que también era llamado Macabeo
  alternatives_spanish:
  - Judas, también llamado Macabeo
  - Judas, de sobrenombre Macabeo
  lexicon: LSJ
  rationale: ὁ καὶ introduce un nombre alternativo o designación adicional. ‘También era llamado’ conserva esa función sin imponer un matiz litúrgico o eclesial. ‘Macabeo’ sigue de cerca la forma griega Μακκαβαῖος.
- source_word: δέκατός που γενηθεὶς
  english_pob_choice: having become about the tenth
  chosen_spanish: habiéndose convertido en uno de unos diez
  alternatives_spanish:
  - siendo como el décimo
  - habiéndose hecho uno de unos diez
  - habiendo quedado como uno de unos diez
  lexicon: LSJ
  rationale: La frase griega es abreviada y aproximada. La lectura ‘uno de unos diez’ expresa la idea de un grupo reducido de alrededor de diez hombres, manteniendo la ambigüedad del griego y la aproximación marcada por που.
- source_word: ἀναχωρήσας
  english_pob_choice: having withdrawn
  chosen_spanish: habiéndose retirado
  alternatives_spanish:
  - habiendo huido
  - habiendo abandonado el lugar
  - habiéndose apartado
  lexicon: LSJ
  rationale: El participio puede indicar retirada estratégica o apartamiento de la presencia pública. ‘Retirado’ es suficientemente amplio y no fuerza una especificación militar que el griego no exige.
- source_word: ἐν τοῖς ὄρεσι
  english_pob_choice: in the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - en las montañas
  - en el monte
  lexicon: LSJ
  rationale: ‘Montes’ es natural en español bíblico y reproduce bien ὄρεσι sin perder claridad; evita sonar demasiado geográfico o poético frente al plural griego.
- source_word: θηρίων τρόπον διέζη
  english_pob_choice: lived ... like a wild animal
  chosen_spanish: vivía ... como una fiera
  alternatives_spanish:
  - vivía ... como un animal salvaje
  - vivía ... a la manera de las fieras
  - sobrevivía ... como una fiera
  lexicon: LSJ
  rationale: θῆριον denota bestia salvaje; ‘fiera’ conserva la fuerza del símil y su tono bíblico, aunque en español moderno ‘animal salvaje’ también sería posible. Se eligió ‘fiera’ para mantener el contraste rudo de la imagen.
- source_word: σὺν τοῖς μετʼ αὐτοῦ
  english_pob_choice: with those who were with him
  chosen_spanish: con los que estaban con él
  alternatives_spanish:
  - con sus compañeros
  - con los hombres que estaban con él
  lexicon: LSJ
  rationale: El griego es deliberadamente general. La traducción mantiene esa apertura sin añadir una precisión social o militar que no aparece en el texto.
- source_word: τὴν χορτώδη τροφὴν
  english_pob_choice: vegetation
  chosen_spanish: vegetación
  alternatives_spanish:
  - hierba
  - alimento vegetal
  - verdes hierbas
  lexicon: LSJ
  rationale: La expresión se refiere a comida de tipo herbáceo o de plantas. ‘Vegetación’ reproduce la amplitud del campo semántico y evita limitar el sentido a una sola planta o hierba.
- source_word: σιτούμενοι διετέλουν
  english_pob_choice: they continued feeding on
  chosen_spanish: seguían alimentándose de
  alternatives_spanish:
  - continuaban comiendo de
  - persistían en alimentarse de
  lexicon: LSJ
  rationale: La construcción perifrástica tiene valor durativo. ‘Seguían alimentándose de’ expresa continuidad de manera fluida en español y conserva el aspecto progresivo.
- source_word: πρὸς τῷ μὴ μετασχεῖν τοῦ μολυσμοῦ
  english_pob_choice: so as not to share in the defilement
  chosen_spanish: para no participar en la contaminación
  alternatives_spanish:
  - a fin de no participar en la impureza
  - para no tener parte en la contaminación
  - con el fin de no compartir la impureza
  lexicon: LSJ
  rationale: μετασχεῖν implica ‘tener parte en, participar en’; ‘participar’ reproduce bien ese valor. μολυσμός puede abarcar contaminación ritual y deshonra religiosa; ‘contaminación’ preserva la amplitud sin reducirla solo a impureza ceremonial.
theological_decisions:
- issue: Sentido de μολυσμός en el contexto de 2 Macabeos 5
  english_pob_reading: defilement with likely cultic and moral force
  chosen_spanish_reading: contaminación con fuerza posiblemente ritual y moral
  alternative_spanish_readings:
  - impureza ritual solamente
  - corrupción o contaminación general
  rationale: En el contexto de la persecución antioquena, la separación busca evitar participación en prácticas prohibidas y en la presión hacia la apostasía. ‘Contaminación’ deja abierta la tensión entre impureza ritual y corrupción moral/religiosa, sin resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que solo eliminó una coma antes de la cláusula final; no afecta el contenido semántico, así que la redacción española conserva una sola oración continua con valor final claro.
  spanish_consistency_notes:
  - Se mantuvo ‘Macabeo’ para Μακκαβαῖος, en línea con una transliteración cercana y uniforme para nombres propios.
  - Se eligió ‘Yahvé’ como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se preservó el matiz de aproximación en δέκατός που γενηθεὶς mediante ‘uno de unos diez’, evitando convertirlo en un número exacto.
  - ‘Contaminación’ y no ‘impureza’ se usó para dejar abierta la posible mezcla de sentido cultual y moral del término griego μολυσμός.
