translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «be restored to your own people» a «join your own people» para evitar añadir la idea interpretativa de restauración. En español se siguió esa revisión evitando «restaurados» o equivalentes más interpretativos, y se optó por una formulación más directa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - Se conserva un registro bíblico moderno y digno, evitando calcos innecesarios.
  - La elipsis de «τοὺς ἰδίους» se refleja de forma controlada y se explica en nota para no borrar la tensión lexical.
  - No se introdujo vocabulario eclesiástico tradicional no atestiguado por el texto.
