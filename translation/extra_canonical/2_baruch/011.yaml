  from: '11 Then I[a], Baruch, say: Have I come into the world for this, to see the distress of my mother? Not for this did I come, to see the destruction of my people. 12 But I will say this as I think: Blessed are those who have not been born, or those who have been born and have died. 13 But we who live—woe to us, because we have seen the afflictions of Zion and what has befallen Jerusalem. 14 I will call the Sirens from the sea, and you[b], Lilin, come from the desert, and you, demons and dragons from the forests: awake and gird up your loins for mourning, and take up with me dirges, and make lament with me.'
