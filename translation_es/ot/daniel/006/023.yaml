base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/023.yaml
  text: My God sent his angel and shut the mouths of the lions[a], and they have not harmed me, because innocence was found in me before him; and also before you, O king[c][b], I have done no harm.
  footnotes:
