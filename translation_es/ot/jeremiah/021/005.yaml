    issue: Falta de artículos en la expresión corporal
    rationale: El hebreo permite la construcción anartrosa, pero en español «con una mano extendida y un brazo fuerte» suena más natural y preserva mejor la expresión fija sin dureza calca.
  - severity: low
    issue: Alineación de notas al pie
    rationale: La documentación inglesa pone dos notas en la frase de «mano/ brazo» y en «great fury». En español basta una nota cruzada sobre la expresión fija en «brazo fuerte[a]» y una nota léxica en el cierre «gran ira[b]», pero conviene confirmarlo explícitamente en el texto revisado.
