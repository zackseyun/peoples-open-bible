translation:
  language: es
  text: que iba delante de ustedes por el camino, para buscarles un lugar para acampar[a], en fuego por la noche para mostrarles el camino por el cual debían ir[b], y en la nube de día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para explorar un lugar para acampar».
    reason: lexical_alternative
  - marker: b
    text: Lit. «para mostrarles en el camino por el cual irían».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהֹלֵךְ
  english_pob_choice: who went
  chosen_spanish: que iba delante de ustedes
  alternatives_spanish:
  - que fue delante de ustedes
  - que iba caminando delante de ustedes
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera relativa y describe al sujeto de forma continua. 'Iba delante de ustedes' conserva la guía en marcha y suena natural en español sin perder el valor direccional de la imagen.
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - antes de ustedes
  - frente a ustedes
  lexicon: HALOT
  rationale: La expresión espacial pide una relación de guía y precedencia. 'Delante de ustedes' comunica mejor esa función en español actual.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - sobre el camino
  lexicon: HALOT
  rationale: Aquí דֶּרֶךְ refiere al trayecto de viaje. 'Por el camino' mantiene el sentido de desplazamiento y es idiomático en español.
- source_word: לָתוּר
  english_pob_choice: to search out
  chosen_spanish: para buscarles
  alternatives_spanish:
  - para explorar
  - para reconocer
  lexicon: HALOT
  rationale: תור implica buscar/explorar con el fin de identificar un lugar adecuado. 'Buscarles' conserva el propósito y el destinatario sin introducir un matiz demasiado técnico.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un punto
  lexicon: HALOT
  rationale: '''Lugar'' es la equivalencia más natural y concreta para מָקוֹם en este contexto de campamento.'
- source_word: לַחֲנֹתְכֶם
  english_pob_choice: for you to camp
  chosen_spanish: donde acampar
  alternatives_spanish:
  - para que acamparan
  - para que se alojen
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa finalidad. 'Donde acampar' comunica el propósito del lugar con fluidez; 'acampar' preserva la idea de habitar temporalmente en el desierto.
- source_word: בָּאֵשׁ לַיְלָה
  english_pob_choice: in fire by night
  chosen_spanish: en fuego de noche
  alternatives_spanish:
  - en la columna de fuego de noche
  - con fuego por la noche
  lexicon: HALOT
  rationale: Se mantiene la imaginería del fuego como medio de guía nocturna. 'De noche' reproduce el complemento temporal y evita añadir elementos no explícitos en el hebreo.
- source_word: לַרְאֹתְכֶם
  english_pob_choice: to show you
  chosen_spanish: para mostrarles
  alternatives_spanish:
  - para hacerles ver
  - para que vieran
  lexicon: HALOT
  rationale: El hifil de ראה tiene fuerza causativa. 'Mostrarles' es la forma más natural en español y conserva el sentido de guía reveladora.
- source_word: בַּדֶּרֶךְ אֲשֶׁר תֵּלְכוּ בָהּ
  english_pob_choice: the way in which you should go
  chosen_spanish: el camino por el cual debían ir
  alternatives_spanish:
  - el camino por donde debían ir
  - la senda que debían seguir
  lexicon: HALOT
  rationale: El hebreo identifica la ruta indicada. 'Debían ir' refleja el valor direccional con una obligación implícita de guía, sin convertirlo en un mandato moral ajeno al contexto.
- source_word: וּבֶעָנָן יוֹמָם
  english_pob_choice: and in the cloud by day
  chosen_spanish: y en la nube de día
  alternatives_spanish:
  - y en la nube durante el día
  - y en una nube de día
  lexicon: HALOT
  rationale: Se conserva 'nube' como imagen del guía divino diurno. En español, 'de día' reproduce la oposición con 'de noche' y mantiene el paralelismo del versículo.
theological_decisions:
- issue: Sujeto implícito procedente del contexto previo
  english_pob_reading: Retained the relative clause 'who went before you...' without repeating 'the LORD' in this verse.
  chosen_spanish_reading: Mantener la cláusula relativa 'que iba delante de ustedes...' sin repetir 'Yahvé' en el versículo.
  alternative_spanish_readings:
  - '''Yahvé, que iba delante de ustedes...'''
  - '''el que iba delante de ustedes...'''
  rationale: El hebreo depende sintácticamente del contexto inmediato donde ya se nombró a Yahvé. En español también puede mantenerse la continuidad discursiva sin añadir un sujeto que no aparece en este versículo. La omisión conserva la dependencia textual y evita sobreexplicación.
  doctrine_reference: Continuidad contextual y referencia anafórica del sujeto divino en el discurso bíblico.
translation_notes:
  revision_awareness: Sin cambios respecto al último pase de revisión en el contexto inglés; la presente redacción sigue la misma decisión de sentido general y solo adapta la formulación al español con equivalencia óptima auditable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término base del proyecto cuando el sujeto divino se explicita; aquí el versículo depende del contexto inmediato, por lo que no se repite en el texto principal.
  - Se preserva el paralelismo 'de noche' / 'de día' para reflejar la estructura del hebreo.
  - '''Camino'' y ''lugar'' se usan con sentido concreto de viaje y campamento, evitando paraphraseo interpretativo.'
