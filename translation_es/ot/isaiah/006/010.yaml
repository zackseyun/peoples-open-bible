translation:
  language: es
  text: Embota el corazón de este pueblo, y haz pesados sus oídos, y ciega[a] sus ojos, no sea que vea con sus ojos, y oiga con sus oídos, y entienda con su corazón, y se vuelva[b][c], y sea sanado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cierra sus ojos’ o ‘cubre sus ojos’; el verbo hebreo transmite la idea de volver los ojos no receptivos.
    reason: lexical_alternative
  - marker: b
    text: O ‘regrese’; el verbo puede denotar volver o retornar en sentido general y, en contexto, puede incluir arrepentimiento.
    reason: lexical_alternative
  - marker: c
    text: El hebreo tiene el singular colectivo ‘este pueblo’ con verbos singulares en la cláusula final; el español conserva ese singular para reflejar la forma del texto.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְׁמֵן
  english_pob_choice: Make ... dull
  chosen_spanish: Haz insensible
  alternatives_spanish:
  - Haz grueso
  - Embota
  - Haz duro
  lexicon: HALOT
  rationale: El hebreo en hifil con לֵב no apunta a ‘engordar’ literalmente, sino a volver insensible o no receptivo el centro interior. ‘Haz insensible’ conserva el efecto idiomático sin perder la fuerza del mandato.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - corazón/mente
  lexicon: HALOT
  rationale: ‘Corazón’ es el equivalente natural en español bíblico para לֵב como sede del pensar, querer y decidir. Mantiene la antropología bíblica sin volverla meramente psicológica.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: ‘Pueblo’ refleja bien el singular colectivo hebreo הָעָם הַזֶּה y su tono profético. ‘Esta gente’ suena menos solemne; ‘esta nación’ añade un matiz no exigido por el texto.
- source_word: הַכְבֵּד
  english_pob_choice: make ... heavy
  chosen_spanish: haz pesados
  alternatives_spanish:
  - endurece
  - haz duros
  - haz graves
  lexicon: HALOT
  rationale: Se conserva la imagen de peso que el hebreo usa para los oídos. ‘Haz pesados’ evita reemplazar la metáfora por ‘endurece’, que sería una intensificación interpretativa distinta.
- source_word: הָשַׁע
  english_pob_choice: blind
  chosen_spanish: ciega
  alternatives_spanish:
  - cierra
  - tapa
  - embadurna
  lexicon: HALOT
  rationale: El verbo expresa dejar los ojos sin respuesta efectiva; ‘ciega’ comunica con claridad el resultado en español. Las alternativas ‘cierra’ o ‘embadurna’ son posibles, pero menos directas para lectura pública.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español actual ‘para que no’ expresa de manera natural la fuerza preventiva de פֶּן. Se evita ‘lest’, que no es idiomático en español.
- source_word: יִרְאֶה ... יִשְׁמַע ... יָבִין
  english_pob_choice: they see ... hear ... understand
  chosen_spanish: vea ... oiga ... entienda
  alternatives_spanish:
  - vean ... oigan ... entiendan
  - vea ... oiga ... comprenda
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo con verbos singulares en español, como en la fuente, para respetar la concordancia textual. ‘Entienda’ mantiene el paralelo con la percepción y no sustituye innecesariamente ‘comprenda’.
- source_word: וּלְבָבוֹ
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su corazón (de ellos)
  - su corazón colectivo
  lexicon: HALOT
  rationale: El sufijo singular se mantiene como ‘su’, que en español puede referir de modo colectivo a ‘este pueblo’. Así se conserva el vínculo con el singular colectivo sin sobrecargar la frase.
- source_word: וָשָׁב
  english_pob_choice: turn back
  chosen_spanish: se vuelva
  alternatives_spanish:
  - vuelva
  - regrese
  - se arrepienta
  lexicon: HALOT
  rationale: שׁוב significa ‘volver/volverse/retornar’. ‘Se vuelva’ conserva el movimiento de retorno sin especificar todavía ‘arrepentirse’, aunque esa dimensión puede estar implícita en contexto.
- source_word: וְרָפָא לוֹ
  english_pob_choice: be healed
  chosen_spanish: sea sanado
  alternatives_spanish:
  - sea curado
  - reciba sanidad
  - quede sanado
  lexicon: HALOT
  rationale: ‘Sea sanado’ expresa el resultado pasivo sin añadir sujeto explícito. ‘Sanado’ es una opción clara y digna en español bíblico contemporáneo.
theological_decisions:
- issue: Mandato de endurecimiento judicial
  english_pob_reading: 'Render the imperatives directly as a commission from God to Isaiah: ''Make... make... blind...'' while preserving the purpose clause ''lest...'' without softening it.'
  chosen_spanish_reading: 'Traducir los imperativos de forma directa como comisión divina: ‘Haz... haz... ciega...’, conservando la cláusula final ‘para que no...’ sin suavizarla.'
  alternative_spanish_readings:
  - Deja que el corazón se vuelva insensible
  - Haz que el corazón quede insensible
  rationale: El hebreo presenta imperativos en segunda persona masculina singular, dirigidos al profeta. La versión española debe mantener esa dureza judicial sin resolver la tensión teológica mediante una formulación permisiva o meramente resultativa.
  doctrine_reference: Translation philosophy §3
- issue: Singular colectivo y concordancia española
  english_pob_reading: Use singular 'this people' with plural pronouns thereafter.
  chosen_spanish_reading: 'Conservar el singular colectivo ‘este pueblo’ y dejar los verbos en singular: ‘vea... oiga... entienda... se vuelva... sea sanado’.'
  alternative_spanish_readings:
  - este pueblo ... vean ... oigan ... entiendan ... se vuelvan ... sean sanados
  - este pueblo ... vea ... oiga ... entienda ... se vuelva ... sea sanado, con nota explicativa
  rationale: El hebreo mantiene un sujeto colectivo singular con verbos singulares. El español puede reproducir esa concordancia sin pérdida de claridad, evitando introducir pluralizaciones que debiliten la forma del texto.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión final en inglés, sin cambios textuales requeridos por la evidencia disponible. Se preservan la metáfora de peso, la fuerza del mandato y el singular colectivo del hebreo, trasladados a español natural.
  spanish_consistency_notes:
  - Se mantiene ‘este pueblo’ como singular colectivo, con verbos singulares en toda la serie.
  - Se conserva la metáfora de peso en ‘haz pesados sus oídos’ en lugar de sustituirla por ‘endurece’.
  - ‘Corazón’ se usa para לֵב como término antropológico bíblico estándar en español.
  - No se usa ‘SEÑOR’ ni ‘Cristo’; no aplican a este versículo.
  - La nota de ‘ciega’ marca la alternativa hebrea posible sin imponer una sola imagen en el cuerpo principal.
