revisions:
- from: 'Y te regocijarás[a] delante de Yahvé tu Dios: tú, tu hijo, tu hija, tu esclavo[b] y tu esclava, el levita que está dentro de tus ciudades, y el forastero[c], el huérfano y la viuda que están entre ustedes, en el lugar que Yahvé tu Dios escogerá para hacer morar allí su nombre.'
  to: 'Y te regocijarás[a] delante de Yahvé tu Dios: tú, tu hijo, tu hija, tu esclavo[b] y tu esclava, el levita que está dentro de tus puertas, y el residente extranjero[c], el huérfano y la viuda que están entre ti, en el lugar que Yahvé tu Dios escogerá para hacer morar allí su nombre.'
  rationale: 'Se corrigen tres puntos principales: 1) se restaura el modismo deuteronómico «dentro de tus puertas» para reflejar mejor בִּשְׁעָרֶיךָ y alinearse con la decisión auditada de no sobreinterpretarlo como «ciudades» en el texto principal; 2) se unifica la segunda persona singular con «entre ti» para corresponder al hebreo בְּקִרְבֶּךָ; 3) se reemplaza «forastero» por «residente extranjero» como mejor equivalente de גֵּר en este contexto legal-social, dejando la alternativa en nota. El resto del verso puede mantenerse, incluyendo «Yahvé», «esclavo / esclava» y «hacer morar allí su nombre».'
