  text: תְּלָמֶ֣י/הָ רַ֭וֵּה נַחֵ֣ת גְּדוּדֶ֑י/הָ בִּ/רְבִיבִ֥ים תְּ֝מֹגְגֶ֗/נָּה צִמְחָ֥/הּ תְּבָרֵֽךְ׃
base_translation:
