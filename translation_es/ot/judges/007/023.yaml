translation:
  language: es
  text: Y los hombres[b] de Israel fueron convocados[a] de Neftalí, de Aser y de todo Manasés, y persiguieron a Madián[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “fueron llamados”, “fueron reunidos” o, más literalmente, “clamaron”. El verbo hebreo es difícil aquí; en este contexto, se refiere a Israel siendo reunido para la persecución.
    reason: lexical_alternative
  - marker: b
    text: Hebreo “el hombre de Israel”, una expresión colectiva que significa “los hombres de Israel” o “los israelitas”.
    reason: lexical_alternative
  - marker: c
    text: “Madián” representa a las fuerzas madianitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּעֵק
  english_pob_choice: were called out
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron convocados
  - fueron reunidos
  - fueron alistados
  lexicon: HALOT
  rationale: El verbo hebreo es difícil y, en este contexto militar, describe a los israelitas siendo reunidos para la persecución, no un “clamar” de parte de ellos. En español, “fueron llamados” conserva la pasividad del hebreo y la idea de convocatoria sin forzar una interpretación más específica que el texto no exige.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - el hombre de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, funciona colectivamente; el verbo plural posterior confirma el sentido de grupo. “Los hombres de Israel” preserva el matiz colectivo masculino y evita diluirlo con una generalización más abstracta.
- source_word: מִנַּפְתָּלִי
  english_pob_choice: from Naphtali
  chosen_spanish: de Neftalí
  alternatives_spanish:
  - desde Neftalí
  lexicon: HALOT
  rationale: El מן indica origen procedencial; en español, la preposición simple “de” es la forma más natural para introducir la procedencia tribal.
- source_word: וּמִן אָשֵׁר
  english_pob_choice: from Asher
  chosen_spanish: de Aser
  alternatives_spanish:
  - y de Aser
  lexicon: HALOT
  rationale: Se continúa la lista de procedencia tribal. En español la coordinación ya queda implicada por la enumeración, por lo que “de Aser” resulta fluido y fiel.
- source_word: וּמִן כָּל מְנַשֶּׁה
  english_pob_choice: from all Manasseh
  chosen_spanish: de todo Manasés
  alternatives_spanish:
  - de toda la tribu de Manasés
  - de la totalidad de Manasés
  lexicon: HALOT
  rationale: כָּל intensifica la amplitud de la participación. “De todo Manasés” conserva esa amplitud de manera breve y natural; “tribu” es posible pero amplía explícitamente lo que el hebreo deja implícito.
- source_word: וַיִּרְדְּפוּ
  english_pob_choice: they pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - dieron persecución a
  - los siguieron
  lexicon: HALOT
  rationale: רדף en narrativa militar significa perseguir a un enemigo. “Persiguieron” es el equivalente directo y formal, adecuado al registro narrativo.
- source_word: אַחֲרֵי מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: a Madián
  alternatives_spanish:
  - tras Madián
  - a los madianitas
  lexicon: HALOT
  rationale: 'La construcción hebrea con רדף se expresa naturalmente en español con objeto directo: “persiguieron a…”. Se mantiene el nombre propio “Madián” porque el texto hebreo nombra el territorio/poder enemigo y, por metonimia, sus fuerzas.'
theological_decisions:
- issue: Valor colectivo de אִישׁ יִשְׂרָאֵל
  english_pob_reading: Hebrew 'the man of Israel' as a collective expression meaning 'the men of Israel' or 'the Israelites.'
  chosen_spanish_reading: “los hombres de Israel” como colectivo natural
  alternative_spanish_readings:
  - “el hombre de Israel”
  - “los israelitas”
  rationale: La forma hebrea singular con sentido colectivo debe conservarse como grupo masculino humano, ya que el verbo plural posterior lo confirma. “Los israelitas” sería posible, pero borra la forma colectiva del original.
  doctrine_reference: Observación gramatical y de sentido colectivo del hebreo bíblico, no una cuestión doctrinal.
translation_notes:
  revision_awareness: El inglés auditado pasó de “were summoned” a “were called out” para reflejar con más directo la idea de movilización militar. La versión española sigue esa lectura pasiva y colectiva, sin convertir el verbo en un acto de clamor de parte de Israel.
  spanish_consistency_notes:
  - Se usa “Madián” para el nombre propio, en línea con la adaptación española estándar del topónimo.
  - Se mantiene la pasividad de וַיִּצָּעֵק con una forma española natural (“fueron llamados”), evitando una paráfrasis activa.
  - La coordinación de la lista tribal se simplifica de manera idiomática sin perder la acumulación de procedencias.
