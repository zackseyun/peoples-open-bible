  - severity: low
    issue: Nota [b] sobre «ten valor»
    rationale: La auditoría inglesa no conserva una nota en θάρσει, y en español «ten ánimo» no crea una ambigüedad nueva que exija nota. Mantener solo la nota sobre «hermano/pariente» preserva mejor la disciplina editorial.
