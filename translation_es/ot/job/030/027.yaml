translation:
  language: es
  text: Mis entrañas hierven y no descansan[a]; me salen al encuentro los días de aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mis entrañas se agitan y no están quietas; los días de miseria me salen al encuentro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis interiores
  - mis insides
  - mi corazón
  lexicon: HALOT
  rationale: מֵעֶה designa literalmente las partes internas/entrañas y, en poesía, el interior emocional de la persona. «Entrañas» conserva mejor la imaginería visceral que una paráfrasis más abstracta, y en español bíblico es una opción natural y digna.
- source_word: רֻתְּחוּ
  english_pob_choice: boil
  chosen_spanish: hierven
  alternatives_spanish:
  - se agitan
  - están inflamadas
  - hierven intensamente
  lexicon: HALOT
  rationale: El verbo expresa hervir o sebre/estar en ebullición. «Hierven» mantiene la metáfora corporal y el sentido de agitación interna con un español claro y directo.
- source_word: וְלֹא דָמּוּ
  english_pob_choice: and do not rest
  chosen_spanish: y no descansan
  alternatives_spanish:
  - y no están quietas
  - y no cesan
  - y no se callan
  lexicon: HALOT
  rationale: דמם puede significar estar quieto, callarse o cesar. En este contexto de órganos personificados en turbulencia interna, «no descansan» comunica bien la continuidad de la agitación sin abandonar el campo semántico del original.
- source_word: קִדְּמֻנִי
  english_pob_choice: confront me
  chosen_spanish: me salen al encuentro
  alternatives_spanish:
  - me confrontan
  - me encuentran
  - me preceden
  lexicon: HALOT
  rationale: קדם aquí presenta los días de aflicción como algo que llega antes y sale al encuentro del hablante. «Me salen al encuentro» conserva esa imagen de personificación y encuentro hostil mejor que una opción más abstracta.
- source_word: יְמֵי עֹנִי
  english_pob_choice: days of affliction
  chosen_spanish: los días de aflicción
  alternatives_spanish:
  - los días de miseria
  - los días de sufrimiento
  - los días de pobreza
  lexicon: HALOT
  rationale: עֹנִי puede significar aflicción, miseria o pobreza. En el lamento de Job, «aflicción» recoge el sentido amplio del sufrimiento, no solo la carencia material.
translation_notes:
  revision_awareness: El hebreo muestra una paralela intensificación de imagen corporal e irruptión temporal hostil; la versión española conserva ambos movimientos sin suavizar la personificación. La opción «hierven» sigue el verbo de ebullición, y «me salen al encuentro» reproduce la dirección activa de קדם.
  spanish_consistency_notes:
  - Se usó «entrañas» para la fuerza visceral del hebreo, en lugar de un eufemismo más abstracto.
  - Se mantuvo «aflicción» como término principal para עֹנִי, siguiendo el alcance semántico indicado por el análisis fuente.
  - La nota al pie ofrece la alternativa léxica documentada sin cambiar el sentido base del verso.
