review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura genealógica del hebreo: dos encabezados con «los hijos de», la lista de nombres de Cus y luego la subrama de Raamá. No añade ni omite contenido. Sin embargo, hay un error importante de alineación onomástica: שְׁבָא (Sheba) se ha vertido como «Seba», confundiéndolo con el nombre distinto סְבָא (Seba) ya presente al inicio del versículo. Además, las notas no reflejan fielmente el rastro auditado inglés: falta la alternativa tradicional de «Sabtah» para Sabta, y la nota de Raama no preserva la observación sobre la forma «Ramah» como nombre distinto/confundible.'
  spanish_quality_summary: El español es legible y digno. «Los hijos de» y «Y los hijos de» funcionan bien en una genealogía. «Cus» es una forma bíblica española normal. Algunas adaptaciones acentuales como «Havilá» y «Dedán» pueden ser defendibles en español, pero no exigen cambio aquí. La reparación necesaria es principalmente onomástica y de notas, no de fluidez.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El tratamiento de nombres propios generalmente sigue el criterio del proyecto de transliterar con naturalidad en español. No obstante, debe distinguirse claramente entre «Seba» (סְבָא) y «Seba/Saba» no; aquí שְׁבָא corresponde al nombre tradicionalmente reconocido en español como «Seba» no es adecuado porque colapsa dos nombres hebreos distintos del mismo versículo. Para preservar la distinción del fuente y del audit trail inglés, conviene usar «Sheba» con nota española sobre la forma tradicional «Saba», o una solución equivalente que no iguale ambos nombres.
  issues:
  - severity: high
    issue: 'Confusión de dos nombres distintos: שְׁבָא se tradujo como «Seba».'
    rationale: El versículo contiene tanto סְבָא (Seba) como שְׁבָא (Sheba). Aunque se parezcan, el hebreo los distingue y el POB inglés también. Usar «Seba» para ambos borra una distinción de la fuente.
  - severity: medium
    issue: La nota de Sabta no conserva la alternativa tradicional documentada en el audit trail inglés.
    rationale: El POB inglés preserva «Sabtah» como alternativa léxica. La revisión española debe reflejar esa decisión o una adaptación española equivalente, no omitirla por completo.
  - severity: medium
    issue: La nota de Raama es incompleta.
    rationale: Además de «Raamah», el audit trail inglés advierte sobre posible confusión con el nombre distinto «Ramah». Esa rationale debe preservarse en español, al menos de forma resumida, porque afecta la identificación del nombre.
  - severity: low
    issue: La nota actual de Seba[a] depende del inglés en vez de explicar una alternativa española relevante.
    rationale: Las notas deben servir al lector español y reflejar alternativas textuales/lexicales pertinentes, no remitir a que corresponde al inglés POB.
