base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/020/021.yaml
  text: That is not the matter[a]. Rather, a man from the hill country of Ephraim, Sheba son of Bichri by name, has raised his hand against the king, against David. Hand him over alone, and I will withdraw from the city.” And the woman said to Joab, “Look[b], his head will be thrown to you over the wall.”
  footnotes:
