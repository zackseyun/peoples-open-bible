revisions:
- from: ¡Ve, pueblo mío! Entra en tus habitaciones y cierra tus puertas detrás de ti; escóndete por un poco de tiempo, hasta que pase la ira.
  to: Ve[a], mi pueblo, entra en tus habitaciones y cierra tus puertas detrás de ti; escóndanse[b] por un breve momento, hasta que pase la ira[c].
  rationale: Se ajusta el imperativo final al sentido colectivo documentado por el POB, se mejora la naturalidad y solemnidad de la expresión temporal, y se restituyen en español las alternativas léxicas y teológicas preservadas en el expediente inglés. También se prefiere «mi pueblo» por fluidez natural sin pérdida del matiz de alianza.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia imperativa del hebreo y preserva el sentido básico de refugiarse hasta que pase el juicio. Sin embargo, pierde dos matices del expediente POB: (1) חֲבִי se resolvió como singular reflexivo («escóndete»), mientras que el inglés auditado explicitó el valor colectivo de «my people» con plural («hide yourselves»); en español conviene reflejar ese sentido colectivo. (2) כִמְעַט רֶגַע queda más fiel como «por un breve momento» o equivalente compacto, no «por un poco de tiempo», que suena más suelto y menos solemne. Además, faltan las notas que el POB conserva para la alternativa de «cámaras» y para el valor colectivo de «escóndanse».'
  spanish_quality_summary: El español es claro y legible, pero «pueblo mío» suena algo más literario que el más natural «mi pueblo» en esta exhortación profética. «Escóndete» choca con el resto de los posesivos plurales («tus habitaciones… tus puertas») y con el referente colectivo; «escóndanse» mejora la coherencia y la inteligibilidad eclesial. «Por un poco de tiempo» es comprensible pero menos idiomático y menos elegante que «por un breve momento».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Ira» para זָעַם es aceptable y preserva la tensión teológica sin explicitar agente. No aparece el nombre divino ni otros términos de glosario prioritario. La revisión propuesta mantiene la lógica léxica documentada en el POB y añade en español las notas pertinentes para alternativas preservadas en inglés.
  issues:
  - severity: medium
    issue: חֲבִי se tradujo «escóndete» en singular.
    rationale: El expediente inglés justificó explícitamente el plural reflexivo por el carácter colectivo de «mi pueblo». En español, el singular genérico aquí resulta menos natural y atenúa una decisión de traducción ya documentada.
  - severity: low
    issue: כִמְעַט רֶגַע se vertió «por un poco de tiempo».
    rationale: La frase comunica duración breve, pero es menos compacta y solemne que el hebreo y que el POB auditado. «Por un breve momento» preserva mejor forma y tono.
  - severity: medium
    issue: Faltan notas para alternativas léxicas preservadas por el POB.
    rationale: El inglés conserva nota para «chambers» y para la posibilidad singular/colectiva de חֲבִי. En español conviene mantener esas alternativas donde siguen siendo relevantes.
  revised_spanish_text: Ve[a], mi pueblo, entra en tus habitaciones y cierra tus puertas detrás de ti; escóndanse[b] por un breve momento, hasta que pase la ira[c].
  revised_footnotes:
  - marker: a
    text: O «tus cámaras». El término hebreo puede referirse a habitaciones interiores o cámaras privadas.
    reason: lexical_alternative
  - marker: b
    text: O «escóndete». El hebreo se dirige a «mi pueblo» como un colectivo, por eso «escóndanse» hace explícito en español el sentido colectivo.
    reason: lexical_alternative
  - marker: c
    text: O «hasta que pase la indignación».
    reason: alternative_reading
  revision_rationale: Se ajusta el imperativo final al sentido colectivo documentado por el POB, se mejora la naturalidad y solemnidad de la expresión temporal, y se restituyen en español las alternativas léxicas y teológicas preservadas en el expediente inglés. También se prefiere «mi pueblo» por fluidez natural sin pérdida del matiz de alianza.
