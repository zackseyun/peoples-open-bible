translation:
  language: es
  text: Como antes[a], estando en formación de combate y teniendo al aliado venido del cielo[b], porque el Señor les había mostrado misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anteriormente, estando preparados», si ἐν διασκευῇ se entiende de manera más general como disposición o preparación, y no específicamente como formación militar.
    reason: lexical_alternative
  - marker: b
    text: 'El griego es algo compacto: literalmente, «teniendo al aliado desde el cielo, habiéndoles mostrado misericordia el Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ πρόηγον
  english_pob_choice: as before
  chosen_spanish: Como antes
  alternatives_spanish:
  - Anteriormente
  - como en la ocasión anterior
  - antes
  lexicon: LSJ
  rationale: La expresión funciona de modo adverbial y comparativo, remitiendo a una situación previa. «Como antes» conserva esa relación con el episodio anterior sin volverla demasiado rígida o literaria.
- source_word: ἐν διασκευῇ
  english_pob_choice: in battle array
  chosen_spanish: estando en formación de combate
  alternatives_spanish:
  - en orden de batalla
  - en disposición de combate
  - preparados para el combate
  lexicon: LSJ
  rationale: διασκευή puede aludir a preparación, equipo o disposición. En este contexto militar, la idea de una disposición ordenada para luchar queda mejor expresada en español con «formación de combate», sin reducir el sentido a mera preparación general.
- source_word: σύμμαχον
  english_pob_choice: ally
  chosen_spanish: aliado
  alternatives_spanish:
  - ayudante
  - campeón
  - apoyo
  lexicon: LSJ
  rationale: 'σύμμαχος conserva un matiz marcadamente militar: alguien que lucha junto a otro. «Aliado» mantiene ese valor más que «ayudante» y evita suavizar el lenguaje bélico del pasaje.'
- source_word: τὸν ἀπʼ οὐρανοῦ σύμμαχον
  english_pob_choice: the ally from heaven
  chosen_spanish: el aliado del cielo
  alternatives_spanish:
  - el aliado celestial
  - el ayudante del cielo
  - el aliado venido del cielo
  lexicon: LSJ
  rationale: La preposición ἀπό con οὐρανοῦ se mantiene de forma directa con «del cielo», que en español suena natural y cercana al griego. Se conserva el registro militar-teológico sin explicitar más de lo que dice el texto.
- source_word: ἔχοντες
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - con
  - poseyendo
  lexicon: BDAG
  rationale: El participio se vierte de manera simple para enlazar la condición de ellos con la cláusula causal siguiente. «Teniendo» mantiene la sintaxis compacta del griego.
- source_word: ἐλεήσαντος
  english_pob_choice: had shown ... mercy
  chosen_spanish: les había mostrado misericordia
  alternatives_spanish:
  - había tenido misericordia de ellos
  - les había compadecido
  lexicon: BDAG
  rationale: La forma genitiva absoluta explica la situación de ayuda divina. «Mostrar misericordia» es idiomático en español y conserva el motivo de misericordia sin forzar una glosa más interpretativa.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - el Señor
  lexicon: LSJ
  rationale: En este contexto judío-griego, κύριος se entiende reverencialmente de Dios. «El Señor» sigue la convención teológica del texto fuente inglés y es natural en español bíblico, sin sustituir el referente por un nombre distinto.
theological_decisions:
- issue: Relación entre la ayuda celestial y la misericordia divina
  english_pob_reading: Retain the military metaphor 'the ally from heaven' without specifying more than the Greek states.
  chosen_spanish_reading: Conservar la metáfora militar «el aliado del cielo» sin identificarlo de forma más explícita que el griego.
  alternative_spanish_readings:
  - el ayudante celestial
  - Dios como su aliado del cielo
  rationale: 'El pasaje atribuye la ayuda a la misericordia del Señor, pero el sustantivo σύμμαχος mantiene una imagen bélica. La traducción preserva esa tensión: asistencia divina real, expresada con un término militar, sin convertirlo en una explicación doctrinal más amplia que la del texto.'
  doctrine_reference: 'DOCTRINE.md §§1, 3; Contested terms: κύριος → Señor'
- issue: Valor de κύριος en contexto judío-helenístico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el señor
  - Yahvé
  rationale: Aunque en el proyecto la convención general para יהוה es «Yahvé», aquí el texto griego usa κύριος en una fórmula reverencial. Seguir con «el Señor» respeta el dato inmediato del griego y la lectura teológica heredada en este contexto.
  doctrine_reference: DOCTRINE.md §§1, 3
translation_notes:
  revision_awareness: Se tomó en cuenta el pasaje griego de Swete 1909 y el audit trail inglés. La revisión inglesa más reciente no introdujo cambios, pero el informe cruzado marca necesidad de revisión por un posible desajuste de claridad. La redacción española conserva la estructura breve del original y explicita solo lo necesario para una lectura natural.
  spanish_consistency_notes:
  - Se mantuvo el tono bíblico sobrio y la metáfora militar del original.
  - Se evitó traducir mecánicamente desde el inglés cuando el español requería una sintaxis más natural.
  - Se conservó la referencia reverencial a κύριος como «el Señor», coherente con el contexto judío del pasaje.
  - Los marcadores de nota a y b aparecen en el texto exactamente donde corresponden.
