translation:
  language: es
  text: La misericordia es hermosa en tiempo de su angustia[a][b], como nubes cargadas de lluvia en tiempo de sequía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La misericordia es conveniente en tiempo de angustia». El adjetivo puede enfatizar belleza, agradabilidad o adecuación.
    reason: lexical_alternative
  - marker: b
    text: El griego tiene un pronombre masculino singular («su»), usado aquí en sentido sapiencial general.
    reason: cultural_note
lexical_decisions:
- source_word: ὡραῖον
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - agradable
  - apropiada
  - oportuna
  lexicon: LSJ
  rationale: ὡραῖον puede expresar belleza, agradabilidad o conveniencia. En español, «hermosa» conserva mejor el valor apreciativo e imagístico que una opción más plana como «buena», y evita reducir el matiz a mera oportunidad.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - bondad
  lexicon: BDAG/LSJ
  rationale: ἔλεος denota misericordia o ayuda compasiva. «Misericordia» es el equivalente más directo y solemne en español, y funciona bien en el contexto sapiencial de ayuda ofrecida al necesitado.
- source_word: ἐν καιρῷ
  english_pob_choice: in the time of
  chosen_spanish: en el tiempo de
  alternatives_spanish:
  - cuando
  - en el momento de
  - al tiempo de
  lexicon: LSJ
  rationale: La expresión señala una ocasión o momento oportuno. «En el tiempo de» reproduce con claridad la estructura repetida del verso y su sentido temporal sin añadir interpretación.
- source_word: θλίψεως
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - problema
  lexicon: BDAG/LSJ
  rationale: θλῖψις puede significar presión, aflicción o distress. «Angustia» es natural en español moderno y comunica bien la idea de presión dolorosa sin cargar el término con un tecnicismo posterior.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de uno
  - de la persona
  lexicon: LSJ
  rationale: El griego usa un pronombre masculino singular en sentido representativo. En español, «su» mantiene esa referencia sin forzar una explicitación innecesaria y conserva la fluidez del proverbio.
- source_word: νεφέλαι ὑετοῦ
  english_pob_choice: rain clouds
  chosen_spanish: nubes de lluvia
  alternatives_spanish:
  - nubes lluviosas
  - nubes de agua
  - nubes de aguacero
  lexicon: LSJ
  rationale: El genitivo describe nubes asociadas con la lluvia. «Nubes de lluvia» es natural en español y preserva la imagen con claridad.
- source_word: ἀβροχίας
  english_pob_choice: a time without rain
  chosen_spanish: un tiempo sin lluvia
  alternatives_spanish:
  - sequía
  - falta de lluvia
  - tiempo de sequía
  lexicon: LSJ
  rationale: ἀβροχία significa ausencia de lluvia. «Un tiempo sin lluvia» sigue de cerca la construcción del griego y mantiene el paralelo con «en el tiempo de su angustia».
theological_decisions:
- issue: Pronombre masculino singular en sabiduría general
  english_pob_reading: Rendered as 'his' in the main text
  chosen_spanish_reading: Conservado como «su» en el texto principal
  alternative_spanish_readings:
  - suya
  - de uno
  - de la persona
  rationale: El griego usa una forma masculina singular con valor genérico. No hay presión contextual para neutralizarla; «su» permite conservar la referencia sin añadir una paráfrasis explicativa en el cuerpo del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción española sigue de cerca el ajuste revisado del inglés POB («the time of his distress») mediante «en el tiempo de su angustia», manteniendo el paralelismo con «en un tiempo sin lluvia» y la imagen de las nubes de lluvia. Se preservó la tensión léxica de ὡραῖον como belleza/adecuación mediante una nota alternativa, sin diluirla en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «misericordia» como término principal para ἔλεος, conforme al valor bíblico habitual y al audit trail en inglés.
  - Se evitó «SEÑOR» u otros reemplazos no pertinentes; el verso no contiene el nombre divino.
  - La repetición de «tiempo» en ambas mitades del verso reproduce el paralelismo del griego.
  - «Angustia» y «un tiempo sin lluvia» conservan un registro claro y digno, apto para lectura eclesial amplia.
