base_translation:
  language: en
  yaml_path: translation/ot/isaiah/006/010.yaml
  text: Make the heart of this people dull[a], and make their ears heavy, and blind their eyes, lest they see with their eyes, and hear with their ears, and understand with their heart, and turn back[c][b], and be healed.
  footnotes:
  - marker: a
    text: Or 'shut their eyes' or 'smear over their eyes'; the Hebrew verb conveys making the eyes unresponsive.
    reason: lexical_alternative
  - marker: b
    text: Or 'return'; the verb can denote turning back generally, and in context may include repentance.
    reason: lexical_alternative
  - marker: c
    text: Hebrew has a collective singular ('this people') with singular verbs in the latter clause; English renders the sense with plural pronouns.
    reason: cultural_note
