translation:
  language: es
  text: 'Y Araúna dijo[a]: «¿Por qué ha venido mi señor el rey a su siervo?» Y David dijo: «Para comprarte la era, para edificar un altar a Yahvé, para que la plaga sea detenida y quitada de sobre el pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu siervo». El hebreo literalmente dice «su siervo», reflejando una auto-referencia cortesana formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: La narración hebrea usa la fórmula simple de habla; «Y ... dijo» conserva la secuencia narrativa sin añadir matiz interpretativo.
- source_word: אֲרַוְנָה
  english_pob_choice: Araunah
  chosen_spanish: Araúna
  alternatives_spanish:
  - Arauná
  - Araunah
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con adaptación mínima a la ortografía y acentuación españolas para lectura fluida.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿A causa de qué
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español; preserva la pregunta causal sin explicitar más de lo que el hebreo dice.
- source_word: בָּא
  english_pob_choice: has ... come
  chosen_spanish: ha venido
  alternatives_spanish:
  - vino
  - está viniendo
  lexicon: HALOT
  rationale: El perfecto en discurso directo se vierte naturalmente como pretérito perfecto compuesto en español para la situación inmediata.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi soberano el rey
  lexicon: HALOT
  rationale: Conserva el tono cortesano y el doble honorífico del hebreo sin recurrir a fórmulas eclesiásticas ajenas al registro del pasaje.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  - tu siervo
  lexicon: HALOT
  rationale: Aquí el hebreo usa tercera persona posesiva en auto-humillación cortesana; «su siervo» refleja con precisión la forma literal, mientras que «tu siervo» explicita el sentido pragmático pero no la forma.
- source_word: לִקְנוֹת
  english_pob_choice: to buy
  chosen_spanish: para comprar
  alternatives_spanish:
  - para adquirir
  - para comprarlo
  lexicon: HALOT
  rationale: Verbo de compra directo y transparente; en español el infinitivo final funciona bien como complemento de finalidad.
- source_word: מֵעִמְּךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu mano
  - de parte tuya
  lexicon: HALOT
  rationale: En contexto transaccional, la preposición más natural en español es «de ti», que conserva la procedencia personal de la compra.
- source_word: הַגֹּרֶן
  english_pob_choice: the threshing floor
  chosen_spanish: la era
  alternatives_spanish:
  - la era de trillar
  - el lugar de trillar
  lexicon: HALOT
  rationale: «Era» es el equivalente español tradicional y claro para el espacio de trilla; evita una expresión más larga sin perder precisión.
- source_word: לִבְנוֹת מִזְבֵּחַ
  english_pob_choice: to build an altar
  chosen_spanish: para edificar un altar
  alternatives_spanish:
  - para construir un altar
  - para levantar un altar
  lexicon: HALOT
  rationale: «Edificar» mantiene un registro bíblico digno y reproduce bien la finalidad del infinitivo hebreo; «construir» sería igualmente posible pero menos marcado.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, con la preposición adecuada al contexto de dedicación del altar.'
- source_word: וְתֵעָצַר
  english_pob_choice: so that ... may be stopped
  chosen_spanish: para que ... sea detenida
  alternatives_spanish:
  - para que ... se detenga
  - y ... sea detenida
  lexicon: HALOT
  rationale: El nifal expresa pasividad/resultativo; «sea detenida» preserva la voz pasiva y el sentido de cese provocado.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - la epidemia
  - el azote
  lexicon: HALOT
  rationale: «Plaga» es el equivalente más natural y sobrio para el castigo mortífero del contexto narrativo.
- source_word: מֵעַל הָעָם
  english_pob_choice: from being upon the people
  chosen_spanish: de sobre el pueblo
  alternatives_spanish:
  - de encima del pueblo
  - de estar sobre el pueblo
  lexicon: HALOT
  rationale: Se conserva el modismo espacial hebreo «sobre» sin volverlo pesado; «de sobre» comunica mejor la idea de remoción desde encima del pueblo.
theological_decisions:
- issue: Traducción del nombre divino יהוה en esta cláusula
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; se mantiene la forma del proyecto en español, «Yahvé», en vez de sustituirla por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עַבְדּוֹ en la fórmula cortesana
  english_pob_reading: his servant
  chosen_spanish_reading: su siervo
  alternative_spanish_readings:
  - tu siervo
  - su esclavo
  rationale: Se preserva la tensión formal del hebreo, que usa tercera persona posesiva en un gesto de cortesía; «su siervo» deja visible esa forma literal sin cancelar el sentido deferente.
  doctrine_reference: 'DOCTRINE.md: Courtly self-reference and possessive form in direct speech'
translation_notes:
  revision_awareness: 'La traducción española sigue de cerca el texto hebreo y el audit trail inglés: conserva la pregunta causal, el saludo cortesano literal con la tensión de «su siervo», el infinitivo final de finalidad y el modismo espacial del cierre. Se adopta «Yahvé» conforme a la política del proyecto para יהוה, y se prefiere una cláusula final natural en español sin perder la pasiva del nifal ni el movimiento de remoción de la plaga.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, en coherencia con los criterios del proyecto.
  - Se usa «siervo» para reflejar la fórmula cortesana literal de עַבְדּוֹ, con nota alternativa para el sentido pragmático.
  - «Era» se emplea como equivalente bíblico natural de הַגֹּרֶן.
  - La clausula final conserva la imagen espacial hebrea con «de sobre el pueblo», evitando una neutralización excesiva.
