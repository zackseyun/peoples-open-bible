translation:
  language: es
  text: Después de esto[a], David golpeó a los filisteos y los sometió, y tomó Gat y sus ciudades dependientes de manos de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus hijas», un modismo que alude a las ciudades o aldeas menores dependientes de Gat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego de esto
  - Y aconteció después de esto
  lexicon: HALOT
  rationale: Es una fórmula narrativa de transición. «Después de esto» conserva el sentido temporal sin añadir un calco innecesario de «y aconteció».
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derrotó
  lexicon: HALOT
  rationale: En contexto militar, נכה conserva el valor concreto de herir/golpear. «Hirió» mantiene la fuerza verbal sin convertir prematuramente el acto en una interpretación resumida como «derrotó».
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: a los filisteos
  alternatives_spanish:
  - a los filisteos
  - a los filisteos
  lexicon: HALOT
  rationale: Es el etnónimo estándar y directo para el grupo pueblo-político designado por el hebreo.
- source_word: וַיַּכְנִיעֵם
  english_pob_choice: subdued them
  chosen_spanish: los sometió
  alternatives_spanish:
  - los subyugó
  - los puso en sujeción
  lexicon: HALOT
  rationale: כנע en causativo expresa poner bajo sujeción. «Sometió» es natural en español y conserva el sentido político-militar de dominio.
- source_word: וַיִּקַּח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: לקח aquí indica tomar posesión/control de territorio. «Tomó» sigue de cerca el hebreo y funciona bien en español sin sobreinterpretar.
- source_word: גַּת
  english_pob_choice: Gath
  chosen_spanish: Gat
  alternatives_spanish:
  - Gat
  lexicon: HALOT
  rationale: Se conserva la transliteración habitual del topónimo filisteo.
- source_word: וּבְנֹתֶיהָ
  english_pob_choice: its surrounding towns
  chosen_spanish: sus ciudades dependientes
  alternatives_spanish:
  - sus ciudades hijas
  - sus poblados dependientes
  lexicon: HALOT
  rationale: El hebreo literal dice «sus hijas», un modismo para asentamientos subordinados a una ciudad principal. «Ciudades dependientes» comunica el sentido idiomático con claridad en español.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de manos de
  lexicon: HALOT
  rationale: La expresión idiomática se conserva en español para mantener la imaginería y la estructura semítica del texto fuente.
translation_notes:
  revision_awareness: Se corrigió el problema de validación agregando el anclaje [a] en el texto principal junto a la expresión correspondiente, manteniendo la nota léxica sobre el modismo de «sus hijas».
  spanish_consistency_notes:
  - Se mantuvo el tiempo narrativo simple y la secuencia de acciones como en el hebreo.
  - Se prefirió «filisteos» y «Gat» por consistencia con la transliteración bíblica estándar.
  - «De la mano de» conserva la imagen idiomática hebrea sin suavizarla a una paráfrasis más abstracta.
