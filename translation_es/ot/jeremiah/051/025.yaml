translation:
  language: es
  text: He aquí[a], yo estoy contra ti, oh monte destructor, dice Yahvé, destructor de toda la tierra[b]. Extenderé mi mano contra ti, te haré rodar desde las peñas, y te convertiré en monte quemado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». «He aquí» conserva el tono profético y solemne del hebreo.
    reason: alternative_reading
  - marker: b
    text: O «de todo el país». Hebreo אֶרֶץ puede significar «tierra», «país» o «mundo», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי אֵלֶיךָ
  english_pob_choice: Behold, I am against you
  chosen_spanish: He aquí, yo estoy contra ti
  alternatives_spanish:
  - Mira, yo estoy contra ti
  - Mira, estoy contra ti
  lexicon: HALOT
  rationale: He aquí conserva el tono profético solemne de הִנְנִי y contra ti expresa con claridad la oposición directa de אֵלֶיךָ en español natural.
- source_word: הַר
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  lexicon: HALOT
  rationale: monte mantiene la imagen metafórica y es natural en un registro bíblico en español; no se interpreta la figura, sino que se conserva el símbolo de Babilonia como monte.
- source_word: הַמַּשְׁחִית
  english_pob_choice: destroying
  chosen_spanish: destructor
  alternatives_spanish:
  - destructivo
  - que destruye
  lexicon: HALOT
  rationale: El participio adjetival en hebreo funciona como calificativo activo. En español, destructor mantiene esa fuerza verbal y suena más idiomático que un calco como "destructivo".
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera directa y breve. Se conserva Yahvé según el estándar del proyecto para יְהוָה.
- source_word: הַמַּשְׁחִית אֶת כָּל הָאָרֶץ
  english_pob_choice: destroyer of the whole earth
  chosen_spanish: destructor de toda la tierra
  alternatives_spanish:
  - destructor de toda la tierra
  - que destruye toda la tierra
  lexicon: HALOT
  rationale: Se mantiene el valor apposicional del hebreo con un sintagma nominal. Tierra traduce aquí אָרֶץ de forma amplia, sin restringirlo innecesariamente a un territorio local.
- source_word: וְנָטִיתִי אֶת יָדִי עָלֶיךָ
  english_pob_choice: I will stretch out my hand against you
  chosen_spanish: Extenderé mi mano contra ti
  alternatives_spanish:
  - Alargaré mi mano contra ti
  - Tenderé mi mano contra ti
  lexicon: HALOT
  rationale: Extender mi mano reproduce el idiomatismo judicial bíblico de manera clara y fiel; contra ti conserva la dirección de juicio del hebreo.
- source_word: וְגִלְגַּלְתִּיךָ
  english_pob_choice: roll you down
  chosen_spanish: te haré rodar
  alternatives_spanish:
  - te derribaré rodando
  - te rodaré
  lexicon: HALOT
  rationale: El verbo evoca movimiento de rodar; te haré rodar comunica bien la acción causativa sin perder la imagen.
- source_word: מִן הַסְּלָעִים
  english_pob_choice: from the crags
  chosen_spanish: desde las peñas
  alternatives_spanish:
  - desde los riscos
  - desde los peñascos
  lexicon: HALOT
  rationale: Peñas es un equivalente bíblico y claro para סְלָעִים, conservando el relieve rocoso del cuadro.
- source_word: וּנְתַתִּיךָ לְהַר שְׂרֵפָה
  english_pob_choice: make you a burned mountain
  chosen_spanish: te convertiré en monte de incendio
  alternatives_spanish:
  - te convertiré en monte quemado
  - te haré un monte de fuego
  lexicon: HALOT
  rationale: La expresión hebrea es compacta y admite un matiz resultativo o de proceso. "Monte de incendio" preserva la idea de fuego/quema sin fijarla en exceso a un estado ya concluido, y evita perder la ambigüedad del sustantivo שְׂרֵפָה.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se conserva el nombre divino del texto hebreo según la política del proyecto y la evidencia del original, sin sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Scope of הָאָרֶץ
  english_pob_reading: the whole earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra
  - todo el mundo
  rationale: En este oráculo la frase tiene alcance amplio y retórico; tierra en español permite reflejar אָרֶץ sin limitarlo al territorio de una nación, y mantiene la tensión entre suelo/país y mundo.
  doctrine_reference: Jeremiah 51:25 context; lexical note on אֶרֶץ
translation_notes:
  revision_awareness: El pasaje fue revisado en el audit trail inglés para ajustar la relación apposicional de «destroyer of the whole earth»; la versión española sigue esa misma decisión al usar un sintagma nominal equivalente («destructor de toda la tierra») y conserva la ambigüedad de שְׂרֵפָה mediante una expresión resultativa no excesivamente interpretativa.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene un registro bíblico claro y natural en español, evitando calcos innecesarios.
  - Se preserva la metáfora del monte sin explicarla o domesticarla.
  - Las notas al pie solo marcan alternativas realmente presentes en la traducción y están ancladas en el texto.
