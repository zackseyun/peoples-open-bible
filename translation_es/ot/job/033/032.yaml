review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: condición («Si»), invitación a responder («respóndeme; habla») y razón explicativa («porque/for»). «Tienes palabras» refleja adecuadamente יֵשׁ מִלִּין, y «respóndeme; habla» preserva con fidelidad los dos imperativos. El único desajuste serio está en «justificártelo», que añade un pronombre de objeto no presente en el hebreo y produce una construcción no idiomática para צַדְּקֶךָ.'
  spanish_quality_summary: El español es claro en la primera mitad, pero «deseo justificártelo» suena incorrecto y poco natural en español general. La reparación mínima y fiel es «deseo justificarte». También conviene ajustar la nota para quitar comillas y puntuación innecesariamente calcadas del inglés.
  glossary_alignment: No hay términos del glosario maestro particularmente conflictivos aquí. La decisión de conservar el vínculo léxico con צדק mediante «justificarte» es defendible, siempre que se preserve la alternativa «vindicarte / declararte justo» en nota. «Porque» es plenamente natural en español para כִּי en este contexto.
