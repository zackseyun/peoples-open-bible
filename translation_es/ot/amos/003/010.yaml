translation:
  language: es
  text: No saben cómo hacer lo recto —oráculo de Yahvé— los que almacenan violencia y destrucción en sus ciudadelas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saqueo» para שֹׁד.
    reason: lexical_alternative
  - marker: b
    text: O «palacios» para אַרְמְנֹתֵיהֶם.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדְעוּ
  english_pob_choice: do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no han aprendido
  - no entienden
  lexicon: HALOT
  rationale: ידע aquí expresa incapacidad moral/práctica para obrar correctamente, no solo falta de información. En español, «no saben» mantiene esa fuerza y conserva la naturalidad del giro con infinitivo.
- source_word: עֲשׂוֹת נְכֹחָה
  english_pob_choice: to do what is right
  chosen_spanish: hacer lo recto
  alternatives_spanish:
  - obrar rectamente
  - hacer lo justo
  lexicon: HALOT
  rationale: נְכֹחָה comunica rectitud o conducta correcta. «Hacer lo recto» preserva la imagen de rectitud de manera idiomática y breve.
- source_word: נְאֻם יְהוָה
  english_pob_choice: oracle of Yahweh
  chosen_spanish: oráculo de Yahvé
  alternatives_spanish:
  - declaración de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética formal. «Oráculo de Yahvé» conserva el registro solemne y sigue la decisión POB de renderizar el Tetragrámaton como «Yahvé».
- source_word: הָאֹצְרִים
  english_pob_choice: those who store up
  chosen_spanish: los que almacenan
  alternatives_spanish:
  - los que acumulan
  - los que atesoran
  lexicon: HALOT
  rationale: El participio caracteriza a los dirigentes como personas que amasan continuamente lo que sigue. «Almacenan» reproduce bien la idea de acumular/guardar con intención.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia violenta
  lexicon: HALOT
  rationale: חָמָס suele denotar violencia o abuso. «Violencia» es la equivalencia directa y más transparente en español.
- source_word: וָשֹׁד
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - plunder
  - devastación
  lexicon: HALOT
  rationale: Aunque el inglés POB había conservado la alternativa «plunder/devastation», la revisión más reciente fijó «destruction» como lectura principal. En español, «destrucción» mantiene esa correspondencia más directa con שֹׁד.
- source_word: בְּאַרְמְנֹתֵיהֶם
  english_pob_choice: in their citadels
  chosen_spanish: en sus fortalezas
  alternatives_spanish:
  - en sus palacios
  - en sus ciudadelas
  lexicon: HALOT
  rationale: אַרְמוֹן puede ser palacio, residencia fortificada o ciudadela. En este contexto de crítica a élites poderosas, «fortalezas» comunica bien el matiz de seguridad fortificada sin perder la referencia a sus residencias de poder.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto en español pide transliterar el Nombre divino. «Yahvé» es la forma establecida en el marco del POB español y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Fuerza moral de la acusación
  english_pob_reading: They do not know how to do what is right
  chosen_spanish_reading: No saben cómo hacer lo recto
  alternative_spanish_readings:
  - No saben hacer lo recto
  - No conocen cómo hacer lo recto
  rationale: El hebreo denuncia más que ignorancia intelectual; señala una incapacidad moral aprendida. «No saben cómo hacer lo recto» conserva esa tensión entre conocimiento y práctica sin exagerar la absolución o la culpa.
  doctrine_reference: Amós 3:10; lectura ética del verbo ידע con infinitivo complementario
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del auditorio inglés, que sustituyó la opción más interpretativa de שֹׁד por «destruction»/«destrucción» para reflejar con mayor precisión el hebreo y su paralelismo con חָמָס. También conserva el marco profético formal de נְאֻם y la decisión doctrinal de rendir יהוה como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, coherente con el POB español.
  - Se eligió una construcción natural en español («No saben cómo hacer lo recto») que preserva la fuerza moral del hebreo sin volverla explicativa en exceso.
  - «Fortalezas» funciona como término de amplio campo semántico para אַרְמְנֹתֵיהֶם y queda aclarado con nota sobre «palacios».
