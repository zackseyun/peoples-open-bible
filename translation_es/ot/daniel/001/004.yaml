translation:
  language: es
  text: jóvenes en quienes no había ningún defecto[a], de buena apariencia, hábiles en toda sabiduría, conocedores de conocimiento, entendidos en aprendizaje, y que tenían capacidad para presentarse en el palacio del rey[b], y para enseñarles la literatura[c] y la lengua de los caldeos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin defecto alguno»; literalmente, «en quienes no había ningún defecto».
    reason: lexical_alternative
  - marker: b
    text: O «servir en el palacio del rey» o «asistir en la corte del rey»; literalmente, «estar de pie en el palacio del rey».
    reason: lexical_alternative
  - marker: c
    text: «Literatura» traduce un término que más literalmente puede significar «escritura», «libro» o formación escribal.
    reason: lexical_alternative
  - marker: d
    text: «Caldeos» puede abarcar en contexto a los babilonios, pero el hebreo usa el etnónimo específico.
    reason: cultural_note
lexical_decisions:
- source_word: יְלָדִים
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - jóvenes varones
  - niños
  lexicon: HALOT
  rationale: En este contexto de selección cortesana, el hebreo apunta a varones jóvenes aptos para servicio real; «jóvenes» comunica esa franja etaria sin infantilizar como «niños».
- source_word: אֵין בָּהֶם כָּל מְאוּם
  english_pob_choice: in whom there was no defect at all
  chosen_spanish: en quienes no había ningún defecto
  alternatives_spanish:
  - sin ninguna mancha
  - en quienes no había nada malo
  - sin defecto alguno
  lexicon: HALOT
  rationale: «Defecto» conserva la ausencia total de imperfección física o cualificación visible; el indefinido negativo expresa bien la fuerza de כָּל מְאוּם en español natural.
- source_word: טוֹבֵי מַרְאֶה
  english_pob_choice: good in appearance
  chosen_spanish: de buena apariencia
  alternatives_spanish:
  - hermosos
  - apuestos
  - de buen parecer
  lexicon: HALOT
  rationale: La frase evalúa su aspecto exterior. «De buena apariencia» mantiene el juicio descriptivo sin volverlo demasiado coloquial o más interpretativo que el hebreo.
- source_word: מַשְׂכִּילִים בְּכָל חָכְמָה
  english_pob_choice: skillful in all wisdom
  chosen_spanish: hábiles en toda sabiduría
  alternatives_spanish:
  - diestros en toda sabiduría
  - aptos en toda sabiduría
  - expertos en toda sabiduría
  lexicon: HALOT
  rationale: El participio de שכל comunica aptitud competente; «hábiles» preserva la idea de capacidad demostrada y sigue el efecto acumulativo de la lista.
- source_word: יֹדְעֵי דַעַת
  english_pob_choice: knowing knowledge
  chosen_spanish: conocedores de conocimiento
  alternatives_spanish:
  - sabiendo saber
  - poseedores de conocimiento
  - conocedores de saber
  lexicon: HALOT
  rationale: La repetición sustantivo-participio es intencional en hebreo. «Conocedores de conocimiento» conserva esa tensión literal sin forzar una paráfrasis explicativa.
- source_word: מְבִינֵי מַדָּע
  english_pob_choice: understanding learning
  chosen_spanish: entendidos en aprendizaje
  alternatives_spanish:
  - comprensivos en conocimiento
  - discernidores de instrucción
  - entendidos en saber
  lexicon: HALOT
  rationale: La segunda pareja complementa a la anterior con matiz de comprensión/discernimiento. «Entendidos en aprendizaje» sigue la forma compacta y respeta la cercanía semántica del hebreo.
- source_word: כֹּחַ בָּהֶם
  english_pob_choice: had the ability
  chosen_spanish: había fuerza para
  alternatives_spanish:
  - tenían capacidad para
  - tenían fuerza para
  - había capacidad en ellos para
  lexicon: HALOT
  rationale: כֹּחַ puede ser fuerza o capacidad. Aquí el contexto es idoneidad para el servicio real; «había fuerza para» preserva la literalidad y la noción de aptitud.
- source_word: לַעֲמֹד בְּהֵיכַל הַמֶּלֶךְ
  english_pob_choice: to stand in the king’s palace
  chosen_spanish: estar en el palacio del rey
  alternatives_spanish:
  - estar ante el rey en su palacio
  - servir en el palacio del rey
  - estar de pie en el palacio del rey
  lexicon: HALOT
  rationale: Aunque la imagen literal es «estar de pie», en español puede sonar forzada. «Estar en el palacio del rey» conserva el sentido de presencia/servicio cortesano, que el inglés POB también anota como alternativa idiomática.
- source_word: הֵיכַל
  english_pob_choice: palace
  chosen_spanish: palacio
  alternatives_spanish:
  - corte
  - salón
  lexicon: HALOT
  rationale: En este marco real babilónico, הֵיכַל no es templo sino residencia/palacio del rey; «palacio» es el equivalente contextual más claro.
- source_word: לְלַמְּדָם
  english_pob_choice: to teach them
  chosen_spanish: para enseñarles
  alternatives_spanish:
  - para instruirlos
  lexicon: HALOT
  rationale: El verbo es pedagógico directo. «Enseñarles» es natural en español y mantiene el propósito del infinitivo.
- source_word: סֵפֶר
  english_pob_choice: the literature
  chosen_spanish: la literatura
  alternatives_spanish:
  - la escritura
  - los libros
  - la instrucción escrita
  lexicon: HALOT
  rationale: Aquí el término apunta a formación scribal/literaria. «Literatura» sigue la decisión auditada del inglés POB y es comprensible para el lector moderno.
- source_word: לְשׁוֹן כַּשְׂדִּים
  english_pob_choice: language of the Chaldeans
  chosen_spanish: la lengua de los caldeos
  alternatives_spanish:
  - la lengua caldea
  - el idioma de los caldeos
  - la lengua de los babilonios
  lexicon: HALOT
  rationale: «Lengua» corresponde bien al hebreo לָשׁוֹן y conserva el registro bíblico. Se mantiene «caldeos» porque el texto hebreo usa específicamente ese etnónimo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma como guía el audit trail inglés, pero ajusta la sintaxis para que el español suene publicable. Se conservó la serie acumulativa de cualidades y la frase literal del servicio real, con una nota para la posible lectura idiomática. También se mantuvo el etnónimo «caldeos» por fidelidad al original.
  spanish_consistency_notes:
  - Se usó «jóvenes» para יְלָדִים en consonancia con el contexto cortesano.
  - Se preservó la repetición conceptual de דַּעַת / מַדָּע con soluciones distintas en español para evitar aplanar el paralelismo.
  - Se prefirió «palacio» en lugar de una traducción eclesiástica o templaria, porque el contexto es real y administrativo.
  - Se mantuvo «literatura» siguiendo la decisión auditada del inglés POB y para reflejar la formación escrita/scribal.
  - Se conservaron los nombres étnicos según el hebreo, sin sustituirlos por equivalentes más interpretativos.
