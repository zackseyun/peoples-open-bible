    text: «Bethulia» es la forma tradicional en español; el texto sigue la transliteración griega Betyloua.
    reason: lexical_alternative
  - marker: b
    text: La expresión «los hijos de Israel» reproduce de manera literal el giro griego y se refiere corporativamente al pueblo de Israel.
    reason: lexical_alternative
  revision_rationale: 'Se corrige un error importante de anclaje de nota al pie, reubicando [a] en el topónimo pertinente. Además, se mejora la naturalidad y precisión del español: «capturaran» expresa mejor συλλαβεῖν que «aprehendieran», «junto a él» representa mejor παρεστηκότες que la imagen demasiado literal «de pie», y «Ajior» hispaniza el nombre para lectura española sin alterar el referente.'
