translation:
  language: es
  text: Y así, en el asunto de los enviados de los príncipes de Babilonia, que fueron mandados a él para indagar acerca de la señal[a] que había ocurrido en el país, Dios lo dejó, para probarlo, para conocer todo lo que había en su corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señal» también puede entenderse como «prodigio», «portento» o «maravilla».
    reason: lexical_alternative
  - marker: b
    text: Se mantiene la expresión «conocer todo lo que había en su corazón» para preservar la tensión narrativa; también podría entenderse como «revelar» o «poner al descubierto» lo que había en su corazón.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de esta manera
  - Y entonces
  - Y asimismo
  lexicon: HALOT
  rationale: La conjunción introduce una continuación o consecuencia narrativa. «Y así» conserva el enlace y el matiz inferencial sin sonar rígido en español.
- source_word: בִּמְלִיצֵי
  english_pob_choice: in the matter of the envoys
  chosen_spanish: en el asunto de los enviados
  alternatives_spanish:
  - con respecto a los enviados
  - en la cuestión de los enviados
  - acerca de los enviados
  lexicon: HALOT
  rationale: El prefijo בִּ- marca esfera o circunstancia. «En el asunto de» reproduce bien el valor idiomático y es natural en español.
- source_word: שָׂרֵי בָּבֶל
  english_pob_choice: the princes of Babylon
  chosen_spanish: los príncipes de Babilonia
  alternatives_spanish:
  - los oficiales de Babilonia
  - los gobernantes de Babilonia
  lexicon: HALOT
  rationale: שָׂרִים puede ser «príncipes», «oficiales» o «gobernantes». «Príncipes» conserva el matiz político elevado del hebreo y coincide con la elección auditada en inglés.
- source_word: הַמְשַׁלְּחִים עָלָיו
  english_pob_choice: who had been sent to him
  chosen_spanish: que habían sido enviados a él
  alternatives_spanish:
  - que lo enviaban
  - que fueron enviados a él
  - que habían mandado a él
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es activa, funciona idiomáticamente como pasiva respecto de los emisarios. El español natural es pasivo: «habían sido enviados». '
- source_word: לִדְרֹשׁ
  english_pob_choice: to inquire about
  chosen_spanish: para preguntar acerca de
  alternatives_spanish:
  - para inquirir sobre
  - para averiguar acerca de
  - para investigar sobre
  lexicon: HALOT
  rationale: En este contexto diplomático, דרש expresa la acción de buscar información. «Preguntar acerca de» es claro y fiel; «inquirir» sería más formal, pero menos corriente.
- source_word: הַמּוֹפֵת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el prodigio
  - el portento
  - la maravilla
  lexicon: HALOT
  rationale: מוֹפֵת puede significar señal, prodigio o portento. «Señal» mantiene la amplitud semántica y sigue la decisión auditada de no estrecharlo innecesariamente.
- source_word: אֲשֶׁר הָיָה בָאָרֶץ
  english_pob_choice: that had happened in the land
  chosen_spanish: que había ocurrido en la tierra
  alternatives_spanish:
  - que había sucedido en la tierra
  - que estaba en la tierra
  lexicon: HALOT
  rationale: La construcción se refiere a un acontecimiento notable. «Había ocurrido» expresa el sentido eventivo de forma natural y fiel al hebreo.
- source_word: עֲזָבוֹ
  english_pob_choice: left him
  chosen_spanish: lo dejó
  alternatives_spanish:
  - lo abandonó
  - lo desamparó
  - lo dejó solo
  lexicon: HALOT
  rationale: עזב puede ser dejar, abandonar o desamparar. «Lo dejó» preserva la tensión narrativa sin intensificar más de lo que el texto exige.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Se trata del Dios de Israel; el español estándar y claro es «Dios».
- source_word: לְנַסּוֹתוֹ
  english_pob_choice: to test him
  chosen_spanish: para probarlo
  alternatives_spanish:
  - para examinarlo
  - para ponerlo a prueba
  lexicon: HALOT
  rationale: נסה admite «probar», «examinar» o «poner a prueba». Aquí «probarlo» conserva la fuerza evaluativa y la conexión con la lectura inglesa sin forzar un tecnicismo.
- source_word: לָדַעַת כָּל בִּלְבָבוֹ
  english_pob_choice: to know all that was in his heart
  chosen_spanish: para conocer todo lo que había en su corazón
  alternatives_spanish:
  - para saber todo lo que había en su corazón
  - para conocer todo su corazón
  - para revelar todo lo que había en su corazón
  lexicon: HALOT
  rationale: לבב designa el interior, pensamientos y motivaciones. «Corazón» mantiene el modismo hebreo en español; «conocer todo lo que había en su corazón» conserva la tensión narrativa de la fuente, sin resolverla con una paráfrasis explicativa.
theological_decisions:
- issue: Lenguaje de prueba divina y conocimiento
  english_pob_reading: God left him, to test him, to know all that was in his heart
  chosen_spanish_reading: Dios lo dejó, para probarlo, para conocer todo lo que había en su corazón
  alternative_spanish_readings:
  - Dios lo dejó para revelar todo lo que había en su corazón
  - Dios se apartó de él para ponerlo a prueba y sacar a luz lo que había en su corazón
  rationale: El hebreo afirma directamente que Dios lo dejó con el propósito de probarlo y de conocer todo lo que había en su corazón. La redacción española conserva esa formulación y su tensión teológica en lugar de suavizarla con una explicación que atenúe el alcance del texto.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el análisis auditado en inglés; no hubo revisiones posteriores sustantivas y se conservó la tensión teológica principal.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para הָאֱלֹהִים y no una perífrasis.
  - Se eligió «señal» para הַמּוֹפֵת, siguiendo la decisión inglesa y dejando la alternativa en nota.
  - Se prefirió «príncipes» para שָׂרֵי בָּבֶל por su rango político elevado.
  - 'Se conservó el paralelismo verbal de finalidad: «para probarlo, para conocer...».'
