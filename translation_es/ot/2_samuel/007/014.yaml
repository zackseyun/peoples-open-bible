revisions:
- from: Yo seré para él un padre[a], y él será para mí un hijo. Cuando cometa iniquidad, lo disciplinaré con vara de hombres y con golpes de hijos de hombre.
  to: Yo seré para él un padre, y él será para mí un hijo. Cuando cometa iniquidad, lo disciplinaré con la vara de hombres y con golpes de seres humanos[a].
  rationale: 'Se conserva la fidelidad al hebreo y a la filosofía del POB, pero se corrigen dos detalles editoriales y de legibilidad: se reubica la nota a la frase que realmente explica y se reemplaza la construcción española demasiado rígida ''golpes de hijos de hombre'' por ''golpes de seres humanos'', que mantiene el sentido genérico humano sin oscurecer el texto. También se añade el artículo en ''la vara de hombres'' para mejorar la naturalidad.'
