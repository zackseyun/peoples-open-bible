revisions:
- from: En el primer mes[a], el día catorce del mes, es la Pascua de Yahvé.
  to: En el primer mes, el día catorce del mes, es la Pascua de Yahvé[a].
  rationale: Se conserva la traducción principal porque es fiel al hebreo y al audit trail inglés, pero se mueve la nota al sintagma 'de Yahvé', que es donde realmente recae la alternativa léxica 'para Yahvé'. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:49:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido básico del hebreo: la ubicación temporal (''en el primer mes''), la fórmula de fecha, ''Pascua'' para פֶּסַח y ''Yahvé'' para יהוה conforme al proyecto. También sigue correctamente la revisión del audit trail inglés al preferir un genitivo relacional (''de Yahvé'') en vez de una lectura más direccional.'
  spanish_quality_summary: 'La redacción es clara y comprensible, pero ''el día catorce del mes'' suena menos idiomático y menos digno que ''el día catorce del mes'' / ''a los catorce días del mes''; sin embargo, el problema principal es la nota textual: el anclaje [a] en ''mes'' no corresponde al lugar semántico de la variante, que pertenece a ''de Yahvé''. Además, en español bíblico natural conviene mantener la misma estructura pero anclar la nota donde realmente afecta la alternativa léxica.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → ''Yahvé''; פֶּסַח → ''Pascua''. No hay conflicto doctrinal serio. La alternativa ''para Yahvé'' en nota es válida como alternativa al valor de לַ, pero debe anclarse en la frase final, no en ''primer mes''.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'primer mes' aunque la alternativa nota el valor de לַיהוָה.
    rationale: El pie de nota explica una alternativa para 'de Yahvé' / 'para Yahvé', no para 'primer mes'. Tal como está, el anclaje induce a error sobre qué elemento del texto tiene variante.
  - severity: low
    issue: La formulación de la fecha puede afinarse levemente para mayor naturalidad bíblica en español.
    rationale: '''El día catorce del mes'' es entendible, pero ''el día catorce del mes'' funciona mejor si se conserva la coma y el flujo; no requiere reescritura mayor. La revisión necesaria es mínima y se centra en el anclaje de nota.'
  revised_spanish_text: En el primer mes, el día catorce del mes, es la Pascua de Yahvé[a].
  revised_footnotes:
  - marker: a
    text: O ‘para Yahvé’. El hebreo con lamed puede expresar dedicación o pertenencia.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal porque es fiel al hebreo y al audit trail inglés, pero se mueve la nota al sintagma 'de Yahvé', que es donde realmente recae la alternativa léxica 'para Yahvé'. No se requiere adjudicación adicional.
