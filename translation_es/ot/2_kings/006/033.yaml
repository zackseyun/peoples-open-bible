translation:
  language: es
  text: 'Mientras aún estaba hablando con ellos, he aquí, el mensajero bajó adonde él y dijo: «He aquí, este mal viene de Yahvé. ¿Por qué habría de seguir esperando a Yahvé[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué he de esperar de Yahvé ya?». El verbo hebreo puede significar tanto «esperar» como «poner la esperanza en».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדֶנּוּ מְדַבֵּר
  english_pob_choice: while he was still speaking
  chosen_spanish: Mientras aún estaba hablando
  alternatives_spanish:
  - Todavía estaba hablando
  - Mientras seguía hablando
  lexicon: HALOT
  rationale: La combinación idiomática expresa acción en curso, no solo simultaneidad puntual. «Mientras aún estaba hablando» conserva el valor durativo y suena natural en español bíblico moderno.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  - con el grupo
  lexicon: HALOT
  rationale: La preposición más directa y transparente en español es «con ellos»; mantiene la referencia al grupo presente sin añadir matices no atestiguados.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el ángel
  lexicon: HALOT
  rationale: En este contexto narrativo, el referente parece ser un emisario humano, no un ser celestial. «Mensajero» evita introducir una lectura angélica que el contexto no requiere.
- source_word: יֹרֵד אֵלָיו
  english_pob_choice: came down to him
  chosen_spanish: descendía hacia él
  alternatives_spanish:
  - bajó hacia él
  - venía descendiendo hacia él
  lexicon: HALOT
  rationale: El participio de movimiento marca acción en desarrollo; «descendía hacia él» preserva ese matiz mejor que un perfecto simple, y mantiene la dirección del movimiento.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - mira
  lexicon: HALOT
  rationale: «He aquí» reproduce la fuerza deíctica e interjectiva de הִנֵּה en una forma digna y reconocible para lectura pública.
- source_word: זֹאת הָרָעָה
  english_pob_choice: this evil
  chosen_spanish: este mal
  alternatives_spanish:
  - esta calamidad
  - este desastre
  lexicon: HALOT
  rationale: «Mal» conserva la carga ética y afectiva del término hebreo sin convertirlo de forma automática en una simple desgracia. La expresión sigue siendo comprensible en español.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: viene de Yahvé
  alternatives_spanish:
  - proviene de Yahvé
  - es de Yahvé
  lexicon: HALOT
  rationale: El hebreo atribuye origen o procedencia a Yahvé. «Viene de Yahvé» es una formulación natural en español y deja abierta la fuerza causal/agentiva del hebreo.
- source_word: מָה אוֹחִיל לַיהוָה עוֹד
  english_pob_choice: Why should I wait for Yahweh any longer?
  chosen_spanish: ¿Por qué habría de esperar todavía a Yahvé?
  alternatives_spanish:
  - ¿Por qué habría de esperar a Yahvé todavía?
  - ¿Por qué seguiría esperando a Yahvé?
  lexicon: HALOT
  rationale: «Esperar» recoge la amplitud semántica de יחל con el sentido práctico dominante en el lamento del rey. «Todavía» traduce עוֹד de modo natural y mantiene la idea de continuidad temporal.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La política del proyecto para el Tetragrámaton es usar «Yahvé» en el texto principal. Mantiene el nombre propio del pacto sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de יחל en la queja del rey
  english_pob_reading: Why should I wait for Yahweh any longer?
  chosen_spanish_reading: ¿Por qué habría de esperar todavía a Yahvé?
  alternative_spanish_readings:
  - ¿Por qué habría de seguir esperando a Yahvé?
  - ¿Por qué debería esperar/poner mi esperanza en Yahvé todavía?
  rationale: El verbo admite tanto «esperar» como «esperar con esperanza». En el contexto, la frase expresa cansancio y rechazo de seguir aguardando intervención divina; «esperar» conserva la tensión sin resolverla artificialmente.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Ambigüedad de הָרָעָה como mal moral o calamidad
  english_pob_reading: this evil
  chosen_spanish_reading: este mal
  alternative_spanish_readings:
  - esta calamidad
  - este desastre
  rationale: La formulación hebrea puede sonar acusatoria y no solo descriptiva. «Mal» preserva esa dureza semántica y evita suavizar el juicio del hablante.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustanciales; este borrador sigue la lectura de alta concordancia del hebreo y mantiene la tensión léxica de יחל con una nota alternativa en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la norma del proyecto para יְהוָה.
  - Se mantiene «mensajero» en lugar de «ángel» por coherencia contextual y para no introducir una lectura sobrenatural no requerida.
  - «He aquí» se conserva como fórmula deíctica en ambas ocurrencias de הִנֵּה.
  - La nota al pie mantiene la alternativa semántica de יחל sin desplazar el texto principal.
  - El texto principal evita arcaísmos innecesarios, pero conserva solemnidad bíblica y claridad pública.
