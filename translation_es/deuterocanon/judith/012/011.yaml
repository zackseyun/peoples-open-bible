translation:
  language: es
  text: 'Y dijo a Bagoas, el eunuco[a], que estaba encargado de todo lo suyo[b]: «Ve ahora y convence a la mujer hebrea que está contigo para que venga a nosotros y coma y beba con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oficial de la corte»; aquí se conserva «eunuco» porque el griego usa el término literal.
    reason: lexical_alternative
  - marker: b
    text: O «que estaba puesto sobre todo lo suyo»; la frase griega indica administración o supervisión delegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βαγώᾳ
  english_pob_choice: Bagoas
  chosen_spanish: Bagoas
  alternatives_spanish:
  - Bagóas
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre propio por transliteración, como en el contexto auditado en inglés, sin hispanizarlo innecesariamente.
- source_word: εὐνούχῳ
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - oficial de la corte
  lexicon: BDAG
  rationale: El griego usa el término literal, y aquí no hay base suficiente para suavizarlo a un cargo cortesano. «Eunuco» mantiene la fuerza léxica del original.
- source_word: ἐφεστηκὼς ἐπὶ πάντων τῶν αὐτοῦ
  english_pob_choice: who was in charge of all that belonged to him
  chosen_spanish: que estaba encargado de todo lo suyo
  alternatives_spanish:
  - que estaba a cargo de todo lo que le pertenecía
  - que supervisaba todos sus asuntos
  lexicon: BDAG
  rationale: La frase participial expresa supervisión o administración delegada. «Encargado de todo lo suyo» reproduce bien esa autoridad sin sonar demasiado expansivo.
- source_word: Πεισὸν
  english_pob_choice: persuade
  chosen_spanish: persuade
  alternatives_spanish:
  - convéncela
  - trúale de venir
  - insta
  lexicon: BDAG
  rationale: «Persuade» preserva el matiz causativo de inducirla a venir, tal como lo refleja el audit trail inglés.
- source_word: τὴν γυναῖκα τὴν Ἑβραίαν
  english_pob_choice: the Hebrew woman
  chosen_spanish: la mujer hebrea
  alternatives_spanish:
  - la mujer judía
  - la esposa hebrea
  lexicon: BDAG
  rationale: γυνή aquí significa «mujer», no «esposa», y Ἑβραίαν se rinde mejor como «hebrea» para seguir de cerca el etnónimo del griego.
- source_word: ἣ ἔστιν παρὰ σοὶ
  english_pob_choice: who is with you
  chosen_spanish: que está contigo
  alternatives_spanish:
  - que está en tu presencia
  - que está a tu lado
  lexicon: BDAG
  rationale: La expresión indica cercanía o compañía. «Está contigo» es natural en español y conserva el sentido relacional del texto.
- source_word: τοῦ ἐλθεῖν πρὸς ἡμᾶς
  english_pob_choice: to come to us
  chosen_spanish: para que venga a nosotros
  alternatives_spanish:
  - para venir a nosotros
  - a fin de venir a nosotros
  lexicon: BDAG
  rationale: En español, la finalidad del imperativo se expresa con claridad mediante «para que venga a nosotros», sin agregar contenido ajeno.
- source_word: φαγεῖν καὶ πιεῖν μεθʼ ἡμῶν
  english_pob_choice: eat and drink with us
  chosen_spanish: coma y beba con nosotros
  alternatives_spanish:
  - coma y beba con nosotros en la mesa
  - cena y beba con nosotros
  lexicon: BDAG
  rationale: Se mantiene la referencia directa a comer y beber juntos, sin introducir «cenar» ni otros matices no presentes en el griego.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y concuerda con el audit trail inglés sin cambios sustantivos; se mantiene la decisión de traducir εὐνούχῳ literalmente y de expresar ἐφεστηκὼς ἐπὶ πάντων τῶν αὐτοῦ como autoridad administrativa delegada.
  spanish_consistency_notes:
  - Se usa el nombre propio transliterado «Bagoas» de forma consistente con la política del proyecto.
  - «Hebrea» se emplea como etnónimo y no como gentilicio interpretativo más amplio.
  - Se conserva el paralelismo verbal «coma y beba» para reflejar el griego y el contexto de banquete.
