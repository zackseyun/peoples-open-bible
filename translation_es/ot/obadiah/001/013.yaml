    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] al verbo «mires», que es el lugar correcto según la evidencia y la auditoría inglesa. Se mejoró «aun tú» a «incluso tú» por naturalidad. Se cambió «no alargues la mano contra sus bienes» por «no pongas mano sobre sus bienes», que suena más idiomático en español y refleja mejor la idea de apoderarse de los bienes en contexto de saqueo.
