translation:
  language: es
  text: El sacerdote mojará su dedo en la sangre y rociará parte de la sangre siete veces delante de Yahvé[a], frente al velo del santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante del velo del Lugar Santo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטָבַל
  english_pob_choice: shall dip
  chosen_spanish: mojará
  alternatives_spanish:
  - sumergirá
  - empapará
  lexicon: HALOT
  rationale: El verbo describe aquí la acción ritual de introducir el dedo en la sangre. En español, «mojar» comunica de forma natural esa inmersión breve; «sumergirá» es posible, pero sugiere mayor extensión de la acción.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: El referente es el oficiante del rito. «Sacerdote» es el término bíblico claro y natural en español; «presbítero» no corresponde al hebreo de este contexto.
- source_word: אֶצְבָּעוֹ
  english_pob_choice: his finger
  chosen_spanish: su dedo
  alternatives_spanish:
  - su índice
  - el dedo de él
  lexicon: HALOT
  rationale: El hebreo indica singular con sufijo masculino; en español la posesión se expresa de manera natural con «su dedo».
- source_word: בַּדָּם
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - dentro de la sangre
  - en la sangre misma
  lexicon: HALOT
  rationale: El valor instrumental/local de ב aquí se expresa con naturalidad en español como «en la sangre», manteniendo la imagen ritual sin forzar «dentro de».
- source_word: וְהִזָּה
  english_pob_choice: sprinkle
  chosen_spanish: rociará
  alternatives_spanish:
  - esparcirá
  - asperjará
  lexicon: HALOT
  rationale: En contexto cultual, נזה en hiphil se refiere al gesto ritual de salpicar o asperjar. «Rociará» es un equivalente idiomático y comprensible; «asperjará» es más técnico, pero menos transparente para lectores generales.
- source_word: מִן־הַדָּם
  english_pob_choice: some of the blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - algo de la sangre
  - de la sangre
  lexicon: HALOT
  rationale: El partitivo מִן se expresa con «parte de» para conservar la idea de una porción tomada de la sangre sin volver la frase pesada.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - en siete ocasiones
  lexicon: HALOT
  rationale: Expresión numérica directa y estable en español, sin necesidad de expansión.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la pauta del proyecto y se traduce לִפְנֵי con «delante de», que mantiene el matiz cultual/espacial.
- source_word: אֶת פְּנֵי פָּרֹכֶת
  english_pob_choice: in front of the curtain
  chosen_spanish: enfrente del velo
  alternatives_spanish:
  - delante del velo
  - frente al velo
  lexicon: HALOT
  rationale: פָּרֹכֶת designa el velo o cortina del santuario; «velo» es la forma tradicional y precisa en español bíblico. «Enfrente de» preserva la orientación espacial del hebreo.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: of the sanctuary / Holy Place
  chosen_spanish: del santuario
  alternatives_spanish:
  - del Lugar Santo
  - de lo santo
  lexicon: HALOT
  rationale: El término puede referirse al espacio santo asociado al velo. «Santuario» es claro y sobrio en español; «Lugar Santo» es una alternativa válida pero más técnica y menos fluida aquí.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre del pacto en español de forma legible y estable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Cultic phrase אֶת פְּנֵי פָּרֹכֶת הַקֹּדֶשׁ
  english_pob_reading: in front of the curtain of the sanctuary
  chosen_spanish_reading: enfrente del velo del santuario
  alternative_spanish_readings:
  - delante del velo del santuario
  - enfrente de la cortina del santuario
  - ante el velo del Lugar Santo
  rationale: La combinación conserva tanto el objeto cultual como su ubicación. «Velo» mantiene la terminología bíblica tradicional sin perder inteligibilidad; «santuario» evita una distinción arquitectónica más técnica de la que el versículo exige.
  doctrine_reference: Lexical/cultic rendering informed by priestly usage
- issue: Partitive force of מִן הַדָּם
  english_pob_reading: some of the blood
  chosen_spanish_reading: parte de la sangre
  alternative_spanish_readings:
  - algo de la sangre
  - de la sangre
  rationale: Se mantiene la fuerza partitiva sin sugerir una cantidad indeterminada demasiado vaga. En un rito, «parte de la sangre» comunica mejor una porción tomada para rociar.
  doctrine_reference: Priestly ritual context, partitive מן
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado más reciente del expediente inglés, que no registra cambios aplicados y fue confirmada con alto grado de acuerdo. Se conservan las decisiones léxicas y cultuales principales: verbo ritual de inmersión/aspersión, partitivo de la sangre, orientación delante de Yahvé y localización frente al velo del santuario.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, de acuerdo con la terminología del proyecto.
  - «Sacerdote» y no «sacerdote oficiante» mantiene la naturalidad sin perder precisión.
  - Se eligió «velo» para פָּרֹכֶת por coherencia con el vocabulario bíblico español, aunque «cortina» queda recogido en la nota alternativa.
  - La puntuación y el orden de la frase buscan sonar naturales en español sin alejarse del hebreo ritual secuencial.
