  to: 'Entonces Amán contó a Zeres, su esposa, y a todos sus amigos todo lo que le había acontecido. Entonces sus sabios y Zeres, su esposa, le dijeron[a]: «Si Mardoqueo, delante de quien has comenzado a caer, es de la descendencia de los judíos, no prevalecerás sobre él, porque ciertamente caerás delante de él».'
