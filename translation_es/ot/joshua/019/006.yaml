translation:
  language: es
  text: 'Bet-lebaot y Sharuhén: trece ciudades[a], con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Sharuhén; Josué 15:32 presenta el nombre variante Silhim en una lista paralela.
