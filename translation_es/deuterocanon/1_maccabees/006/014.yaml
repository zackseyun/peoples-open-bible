review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: el rey expresa su ruina/muerte inminente en aflicción, estando en tierra extranjera; luego llama a Felipe y lo pone con autoridad sobre todo su reino. Sin embargo, dos elecciones principales no preservan bien el matiz fuente: «me estoy perdiendo» no comunica naturalmente ἀπόλλυμαι en este contexto de agonía real, y «sobre todo su reino» suena poco idiomático para autoridad delegada en español. También «Entonces» añade una conexión temporal no explícita en el griego, donde basta «Y».'
  spanish_quality_summary: 'El texto es comprensible, pero presenta giros poco naturales o poco precisos: «me estoy perdiendo» resulta extraño en español bíblico y general; «sobre todo su reino» es menos idiomático que «sobre todo su reino» con verbo más adecuado o mejor «lo puso al frente de todo su reino» / «lo nombró sobre todo su reino». Para mantener cercanía al POB y claridad española, conviene usar «estoy pereciendo» y una formulación más natural para la investidura. Las notas están bien planteadas y útiles.'
  glossary_alignment: No hay términos del glosario teológico principal en juego. La transliteración «Felipe» es correcta. «Amigos» preserva adecuadamente φίλων con la nota cultural. La revisión propuesta mantiene la decisión literal principal con mejor español.
  issues:
  - severity: high
    issue: «me estoy perdiendo» para ἀπόλλυμαι
    rationale: En español neutral, «me estoy perdiendo» suele significar desorientación o pérdida metafórica, no 'perecer/morir'. Distorsiona el sentido en un contexto de últimas palabras del rey.
  - severity: medium
    issue: «Entonces» añade una transición temporal no marcada
    rationale: El griego tiene simplemente καὶ. «Y» basta y es más fiel; «Entonces» introduce una secuencia interpretativa no necesaria.
  - severity: medium
    issue: «lo nombró sobre todo su reino» es poco idiomático
    rationale: Aunque comprensible, la combinación suena calcada. Una formulación como «lo nombró para que estuviera sobre todo su reino» sería más pesada; la opción más natural y fiel es «lo puso al frente de todo su reino» o «lo nombró gobernador de todo su reino», pero esta última sobreespecifica. «Lo puso al frente de todo su reino» expresa bien κατέστησεν ... ἐπὶ.
  revised_spanish_text: Mira[a], estoy pereciendo en gran dolor en tierra extranjera. Y llamó a Felipe, uno de sus amigos[b], y lo puso al frente de todo su reino.
  revised_footnotes:
  - marker: a
    text: 'O: «estoy muriendo en gran tristeza». El griego ἀπόλλυμαι puede expresar perecer o morir, y λύπη puede entenderse como dolor, tristeza o aflicción.'
    reason: lexical_alternative
  - marker: b
    text: «Uno de sus amigos» también puede reflejar un título cortesano para un asociado real o cortesano, no solo un amigo privado.
    reason: cultural_note
  revision_rationale: Se reemplaza «me estoy perdiendo» por «estoy pereciendo» para reflejar con naturalidad ἀπόλλυμαι en contexto de muerte inminente. Se cambia «Entonces» por «Y» para seguir más de cerca el simple καὶ del griego. Se ajusta «lo nombró sobre todo su reino» a «lo puso al frente de todo su reino», que expresa mejor en español la instalación formal en autoridad sin sobreinterpretar el cargo.
