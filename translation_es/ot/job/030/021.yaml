translation:
  language: es
  text: Te has vuelto cruel conmigo[a]; con la fuerza de tu mano, estás contra mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te has vuelto despiadado conmigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me atacas» o «me hostigas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּהָפֵךְ
  english_pob_choice: have turned
  chosen_spanish: te has vuelto
  alternatives_spanish:
  - te has tornado
  - has cambiado
  lexicon: HALOT
  rationale: El nifal de הפך expresa un cambio de estado. En español, «te has vuelto» comunica bien esa transformación sin forzar una lectura reflexiva excesiva y suena natural con el predicado siguiente.
- source_word: לְאַכְזָר
  english_pob_choice: cruel
  chosen_spanish: cruel
  alternatives_spanish:
  - despiadado
  - misericordioso no
  lexicon: HALOT
  rationale: אַכְזָר denota dureza cruel o falta de misericordia. «Cruel» es la equivalencia más directa y clara en español para el juicio del hablante.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - hacia mí
  - contra mí
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente relacional («a mí»), en español «conmigo» fluye mejor en esta acusación dirigida a Job y conserva la orientación personal del reclamo sin endurecerla artificialmente.
- source_word: בְּעֹצֶם
  english_pob_choice: with the might of
  chosen_spanish: con la fuerza de
  alternatives_spanish:
  - con el poder de
  - con la vigorosa fuerza de
  lexicon: HALOT
  rationale: עֹצֶם expresa fuerza, poder o vigor. «Con la fuerza de» mantiene el instrumental hebreo y resulta idiomático en español.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  lexicon: HALOT
  rationale: Se conserva «mano» para mantener la imagen concreta y antropomórfica del hebreo, en lugar de abstraerla como «poder».
- source_word: תִשְׂטְמֵנִי
  english_pob_choice: you oppose me
  chosen_spanish: me opones
  alternatives_spanish:
  - me atacas
  - me hostigas
  - me odias
  lexicon: HALOT
  rationale: שׂטם puede abarcar hostilidad, enemistad o agresión. «Me opones» refleja bien la hostilidad activa del contexto y evita restringir el verbo a una persecución prolongada o a un odio meramente interior.
theological_decisions:
- issue: Habla directa y antropomorfismo aplicado a Dios
  english_pob_reading: Retain the direct second-person accusation and the concrete image 'your hand' without softening.
  chosen_spanish_reading: Mantener la acusación en segunda persona y la imagen concreta de «tu mano» sin suavizarla.
  alternative_spanish_readings:
  - Tu poder está contra mí.
  - Has actuado contra mí.
  rationale: 'El lamento de Job preserva la tensión teológica del discurso: habla a Dios con lenguaje directo y corporal. La traducción debe conservar esa aspereza sin resolverla por paráfrasis abstractas.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La revisión inglesa final prefirió «oppose me» sobre «persecute me» para reflejar mejor la hostilidad activa sin implicar necesariamente una persecución prolongada. El español sigue esa decisión con «me opones», manteniendo además el cambio de estado del primer miembro con un verbo natural y cercano al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando el tetragrámaton aparezca explícitamente; este versículo no contiene el nombre divino.
  - «Tu mano» se conserva de forma literal para respetar el antropomorfismo del hebreo.
  - La relación preposicional de לִי se adapta a una construcción natural en español («conmigo») sin perder la dirección personal del reclamo.
