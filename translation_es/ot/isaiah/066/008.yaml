revisions:
- from: ¿Quién ha oído tal cosa? ¿Quién ha visto cosas semejantes? ¿Puede nacer una tierra en un solo día? ¿Puede nacer una nación de una vez? Porque Sión estaba de parto y también dio a luz a sus hijos[a].
  to: ¿Quién ha oído tal cosa? ¿Quién ha visto cosas semejantes? ¿Puede nacer un país en un solo día? ¿Puede nacer una nación de una vez? Porque Sión estaba de parto y también dio a luz a sus descendientes[a].
  rationale: Se ajusta «tierra» a «país» para reflejar mejor el valor territorial-político de אֶרֶץ en paralelo con «nación». Se cambia «sus hijos» por «sus descendientes» para expresar en el texto principal el sentido colectivo de בָּנֶיהָ, como hizo la auditoría inglesa con «her children», y se conserva la alternativa más literal en nota. El resto del verso ya era fiel, claro y natural.
  reviewer_model: gpt-5.4
