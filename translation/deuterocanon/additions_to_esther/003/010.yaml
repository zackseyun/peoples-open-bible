id: ESG.3.10
reference: Additions to Esther 3:10
source:
  edition: lxx-swete-1909
  text: κουσον τῆς δεήσεώς μου καὶ ἱλάσθητι τῷ κλήρῳ σου, καὶ στρέψον τὸ πένθος ἡμῶν εἰς εὐφροσύνην, ἵνα ζῶντες ὑμνῶμεν σου τὸ ὄνομα, Κύριε, καὶ μὴ ἀφανίσῃς στόμα αἰνούντων σου. Β καὶ πᾶς Ἰσραὴλ ἐκέκραξαν ἐξ ἰσχύος αὐτῶν, ὅτι θάνατος αὐτῶν ἐν ὀφθαλμοῖς αὐτῶν.
  language: Greek
  pages:
  - 782
