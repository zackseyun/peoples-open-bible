review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la estructura sacrificial, el nombre divino «Yahvé», y la enumeración de animales. Sin embargo, hay un desajuste gramatical importante: וְהִקְרַבְתֶּם es 2ª persona plural («ustedes presentarán/ofrecerán»), pero el español dice «presentarás» en singular. También conviene ajustar «como aroma agradable» a una formulación más idiomática y cercana al valor de לְרֵיחַ נִיחֹחַ en español bíblico moderno.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero el cambio a singular afecta la fidelidad. «Dos novillos del ganado» es entendible, aunque «dos toros del ganado» o «dos novillos del rebaño/hato» no son necesarios para corregir el verso. «Como aroma agradable» suena algo calcado; «como aroma grato» o «de aroma grato» lee mejor en registro bíblico digno.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה → «Yahvé» correctamente; עוֹלָה → «holocausto» es aceptable dentro de la terminología sacrificial española; no hay conflictos con términos teológicos mayores. La nota alternativa sobre לְרֵיחַ נִיחֹחַ puede pulirse para evitar repetición poco útil.'
  issues:
  - severity: high
    issue: Cambio indebido de número gramatical en el verbo principal
    rationale: El hebreo וְהִקְרַבְתֶּם es segunda persona masculina plural; «presentarás» lo convierte en singular y altera el sujeto del mandato/instrucción cultual.
  - severity: medium
    issue: Expresión «como aroma agradable» algo poco idiomática
    rationale: Aunque comprensible, suena más calca del inglés que español bíblico natural. «Como aroma grato» o «de aroma grato» comunica mejor la fórmula sacrificial sin perder sentido.
  - severity: low
    issue: Nota al pie mejorable en su alternativa principal
    rationale: La nota dice «O “de aroma agradable”», que apenas reformula la misma idea. Es preferible conservar una alternativa semánticamente distinta documentada, como «para un aroma de sosiego/grato».
  revised_spanish_text: 'Y presentarán un holocausto como aroma grato[a] a Yahvé: dos novillos del ganado, un carnero y siete corderos machos de un año.'
  revised_footnotes:
  - marker: a
    text: O «para un aroma de sosiego». La fórmula hebrea לְרֵיחַ נִיחֹחַ también puede traducirse «como aroma agradable/grato».
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo a plural para reflejar fielmente el hebreo. Se mejora la naturalidad de la fórmula sacrificial con «aroma grato», manteniendo la nota con una alternativa léxica real y útil. El resto del verso puede mantenerse porque conserva bien la referencia sacrificial y la terminología del proyecto.
