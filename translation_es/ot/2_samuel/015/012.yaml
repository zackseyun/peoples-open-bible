  text: וַ/יִּשְׁלַ֣ח אַ֠בְשָׁלוֹם אֶת אֲחִיתֹ֨פֶל הַ/גִּֽילֹנִ֜י יוֹעֵ֣ץ דָּוִ֗ד מֵֽ/עִיר/וֹ֙ מִ/גִּלֹ֔ה בְּ/זָבְח֖/וֹ אֶת הַ/זְּבָחִ֑ים וַ/יְהִ֤י הַ/קֶּ֨שֶׁר֙ אַמִּ֔ץ וְ/הָ/עָ֛ם הוֹלֵ֥ךְ וָ/רָ֖ב אֶת אַבְשָׁלֽוֹם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/012.yaml
  text: And Absalom sent for Ahithophel the Gilonite[a], David’s counselor, from his city, from Giloh, while he was offering the sacrifices. And the conspiracy grew strong[c][b], and the people kept increasing with Absalom.
  footnotes:
  - marker: a
    text: Or 'sent Ahithophel'; the Hebrew verb can be rendered more literally, but in context it likely means Absalom summoned him to join the revolt.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plot grew strong.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the people were going and becoming many with Absalom,' an idiom for steadily increasing support.
    reason: lexical_alternative
