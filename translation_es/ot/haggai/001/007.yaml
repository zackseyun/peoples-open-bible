translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: Pongan su corazón en[a] sus propios caminos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Pongan su corazón sobre sus caminos».
