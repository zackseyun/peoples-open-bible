translation:
  language: es
  text: Por tanto, su camino les será como lugares resbaladizos en la oscuridad; serán arrastrados y caerán en ella, porque yo traeré sobre ellos calamidad en el año de su castigo[a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el año de su visitación'. La expresión hebrea puede referirse al tiempo en que Dios los visita para juicio o rendición de cuentas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Marca una conclusión inferida del juicio anterior; 'Por tanto' conserva el valor consecuencial sin sonar excesivamente coloquial.
- source_word: דַרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su manera de vivir
  lexicon: HALOT
  rationale: '''Camino'' conserva la metáfora bíblica de conducta, curso y destino. ''Su camino'' mantiene el poseedor plural y la imagen de itinerario peligroso.'
- source_word: כַּחֲלַקְלַקּוֹת
  english_pob_choice: like slippery places
  chosen_spanish: como lugares resbaladizos
  alternatives_spanish:
  - como terrenos resbalosos
  - como sitios resbaladizos
  lexicon: HALOT
  rationale: El plural hebreo sugiere puntos o tramos traicioneros; 'lugares resbaladizos' preserva la imagen plural y es natural en español.
- source_word: בָּאֲפֵלָה
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en la penumbra
  lexicon: HALOT
  rationale: '''Oscuridad'' reproduce bien el campo semántico de ocultamiento y peligro, con español claro y digno.'
- source_word: יִדַּחוּ
  english_pob_choice: they will be driven along
  chosen_spanish: serán arrastrados
  alternatives_spanish:
  - serán impulsados
  - serán empujados
  lexicon: HALOT
  rationale: El nifal comunica ser lanzados o empujados por una fuerza externa. 'Serán arrastrados' conserva la pasividad y el avance forzado, aunque no especifica más de lo que exige el hebreo.
- source_word: וְנָפְלוּ בָהּ
  english_pob_choice: and fall in it
  chosen_spanish: y caerán en él
  alternatives_spanish:
  - y caerán allí
  - y tropezarán en él
  lexicon: HALOT
  rationale: El sufijo femenino de בָּהּ remite al ámbito/metáfora anterior; 'en él' preserva la referencia sin forzar un antecedente más interpretativo. 'Caerán' mantiene el paralelismo con el movimiento anterior.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - desastre
  lexicon: HALOT
  rationale: En contexto judicial, רָעָה señala mal sobrevenido como juicio, no mal moral. 'Calamidad' es fiel y solemne, y evita la ambigüedad ética de 'mal'.
- source_word: שְׁנַת פְּקֻדָּתָם
  english_pob_choice: in the year of their punishment
  chosen_spanish: en el año de su castigo
  alternatives_spanish:
  - en el año de su visitación
  - en el año de su rendición de cuentas
  lexicon: HALOT
  rationale: פְּקֻדָּה puede ser visitación, examen o castigo. En este pasaje de juicio, 'castigo' expresa bien la consecuencia penal, sin ocultar la tensión semántica del término.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según el criterio del proyecto. 'Dice Yahvé' reproduce la fórmula profética breve y natural en español.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton y el criterio del proyecto pide rendirlo como 'Yahvé'. Se evita el reemplazo tradicional por 'SEÑOR' para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: רָעָה como juicio divino
  english_pob_reading: disaster
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - mal
  - desgracia
  rationale: En contexto de juicio, רָעָה se entiende como calamidad enviada por Dios, no como mal moral. 'Calamidad' mantiene la severidad del acto judicial sin atribuir a Dios maldad ética.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: פְּקֻדָּה en contexto de juicio
  english_pob_reading: punishment
  chosen_spanish_reading: castigo
  alternative_spanish_readings:
  - visitación
  - rendición de cuentas
  rationale: El hebreo admite 'visitación' o 'visita' como tensión lexical, pero el contexto inmediato de amenaza favorece 'castigo'. Se conserva la lectura judicial sin borrar la ambigüedad básica del término.
  doctrine_reference: HALOT; DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto al estado previo y que el acuerdo con la auditoría inglesa es alto (1.0). La redacción española sigue esa lectura estable, manteniendo las tensiones léxicas relevantes de רָעָה y פְּקֻדָּה sin suavizarlas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se preserva la metáfora de 'camino' y el paralelismo de movimiento/caída.
  - '''Calamidad'' y ''castigo'' mantienen el tono judicial del pasaje sin introducir terminología eclesiástica ajena al hebreo.'
