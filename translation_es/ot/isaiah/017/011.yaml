    rationale: '''En el día de tu siembra'' reproduce la forma nominal hebrea, pero en español suena más rígido de lo necesario. Dado que el POB inglés ya justificó un ajuste verbal óptimo, ''El día que siembras'' comunica el mismo sentido con mejor fluidez.'
  - severity: medium
