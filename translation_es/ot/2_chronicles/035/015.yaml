translation:
  language: es
  text: Y los cantores, los hijos de Asaf, estaban en sus puestos, conforme al mandamiento de David, de Asaf, de Hemán y de Jedutún, el vidente[a] del rey; y los porteros estaban en cada puerta. No tenían que apartarse de su servicio[b], porque sus hermanos los levitas les habían preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «el vidente del rey» se entiende más naturalmente de Jedutún.
    reason: lexical_alternative
  - marker: b
    text: 'O: «No debían apartarse de su servicio». El hebreo puede entenderse con mayor fuerza, aunque la cláusula siguiente favorece el sentido de que no necesitaban dejarlo porque los levitas habían preparado para ellos.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמְשֹׁרֲרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los músicos
  lexicon: HALOT
  rationale: El participio de שׁיר se refiere a quienes cantan. En español, "cantores" conserva el oficio litúrgico y suena natural; "músicos" amplía demasiado el término, y "cantantes" es menos propio del registro cultual.
- source_word: בְּנֵי אָסָף
  english_pob_choice: the sons of Asaph
  chosen_spanish: los hijos de Asaf
  alternatives_spanish:
  - los descendientes de Asaf
  - la casa de Asaf
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "hijos de Asaf". Se conserva esa forma porque funciona bien en español y mantiene la referencia al linaje o gremio asociado con Asaf.
- source_word: עַל מַעֲמָדָם
  english_pob_choice: were at their stations
  chosen_spanish: estaban en sus puestos
  alternatives_spanish:
  - estaban en su lugar
  - estaban en su turno
  lexicon: HALOT
  rationale: מַעֲמָד designa una posición asignada o lugar de servicio. "En sus puestos" transmite bien la idea de ubicación fija y deber organizado sin volverla demasiado técnica.
- source_word: כְּמִצְוַת
  english_pob_choice: according to the command of
  chosen_spanish: conforme al mandamiento de
  alternatives_spanish:
  - según el mandamiento de
  - de acuerdo con la orden de
  lexicon: HALOT
  rationale: מִצְוָה aquí es una orden o mandato autoritativo. "Conforme al mandamiento de" es fiel y digno de registro bíblico, sin perder la fuerza normativa.
- source_word: חוֹזֵה הַמֶּלֶךְ
  english_pob_choice: the king’s seer
  chosen_spanish: el vidente del rey
  alternatives_spanish:
  - el vidente real
  - el profeta del rey
  lexicon: HALOT
  rationale: 'חוֹזֶה es el término técnico "vidente", que conserva una distinción útil frente a "profeta". El sintagma se entiende naturalmente como un apuesto a Jedutún: "Jedutún, el vidente del rey".'
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los guardianes
  lexicon: HALOT
  rationale: En contexto del templo, שֹׁעֲרִים son los encargados de las puertas. "Porteros" es un equivalente tradicional y claro en español eclesial; "guardianes" sería demasiado general.
- source_word: לְשַׁעַר וָשָׁעַר
  english_pob_choice: at each gate
  chosen_spanish: a cada puerta
  alternatives_spanish:
  - puerta por puerta
  - en cada puerta
  lexicon: HALOT
  rationale: La construcción distributiva indica cada puerta individualmente. "A cada puerta" es natural y refleja la distribución sin sobreexplicar.
- source_word: אֵין לָהֶם לָסוּר
  english_pob_choice: They had no need to depart
  chosen_spanish: No tenían que apartarse
  alternatives_spanish:
  - no debían apartarse
  - no necesitaban retirarse
  lexicon: HALOT
  rationale: La frase expresa ausencia de necesidad más que prohibición directa. "No tenían que apartarse" conserva ese matiz y permite que la cláusula siguiente explique la razón.
- source_word: מֵעַל עֲבֹדָתָם
  english_pob_choice: from their service
  chosen_spanish: de su servicio
  alternatives_spanish:
  - de su labor
  - de su ministerio
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto cultual es "servicio". Se evita "ministerio" por ser más interpretativo y "labor" por ser menos preciso en el ámbito del templo.
- source_word: אֲחֵיהֶם הַלְוִיִּם
  english_pob_choice: their brothers the Levites
  chosen_spanish: sus hermanos los levitas
  alternatives_spanish:
  - sus hermanos, los levitas
  - sus hermanos levitas
  lexicon: HALOT
  rationale: El hebreo dice explícitamente "sus hermanos" y luego appone "los levitas". Se mantiene esa relación sin neutralizarla, porque forma parte del tejido familiar y tribal del pasaje.
- source_word: הֵכִינוּ לָהֶם
  english_pob_choice: prepared for them
  chosen_spanish: les habían preparado todo
  alternatives_spanish:
  - les habían preparado
  - les habían provisto
  lexicon: HALOT
  rationale: הכין significa preparar o dejar listo. En el contexto, el complemento se sobreentiende; "les habían preparado todo" expresa con naturalidad que otros suplían lo necesario, sin afirmar más de lo que el hebreo dice de manera explícita.
theological_decisions:
- issue: Alcance de חוֹזֵה הַמֶּלֶךְ
  english_pob_reading: 'The phrase most naturally refers to Jeduthun: ''Jeduthun the king’s seer.'''
  chosen_spanish_reading: 'La frase se toma como aposición a Jedutún: "Jedutún, el vidente del rey".'
  alternative_spanish_readings:
  - el vidente del rey podría referirse al conjunto de nombres anteriores
  - Jedutún del rey, el vidente
  rationale: La forma singular y la cercanía sintáctica hacen que la aposición con Jedutún sea la lectura más natural. No es una decisión doctrinal, sino gramatical e histórica.
  doctrine_reference: Gramática del texto y uso cronístico paralelo
- issue: Fuerza de אֵין לָהֶם לָסוּר
  english_pob_reading: They had no need to depart from their service.
  chosen_spanish_reading: No tenían que apartarse de su servicio.
  alternative_spanish_readings:
  - No debían apartarse de su servicio
  - No era necesario que se apartaran de su servicio
  rationale: 'La construcción hebrea expresa falta de necesidad, y la cláusula causal siguiente explica por qué: los levitas les habían preparado. Por eso se evita convertirla en prohibición estricta.'
  doctrine_reference: Principios de equivalencia óptima y sintaxis hebrea
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el dictamen de alta concordancia y la revisión más reciente sin cambios: no se aplicaron revisiones adicionales. La solución española sigue de cerca el análisis léxico y sintáctico del texto hebreo y respeta las notas alternativas del POB en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se conserva la distinción cultual de «cantores», «porteros» y «levitas» para mantener el marco del templo.
  - Se traduce el valor de necesidad de אֵין לָהֶם לָסוּר con una expresión no imperativa en español.
  - La aposición de «el vidente del rey» se presenta de modo que pueda leerse naturalmente como referencia a Jedutún.
  - Se evita modernizar en exceso el lenguaje del servicio levítico, pero también se evita un calco rígido.
