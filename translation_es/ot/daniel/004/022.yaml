revisions:
- from: Y te expulsarán[a] de entre los hombres, y tu morada será con las bestias del campo. Comerás hierba como los toros, y serás empapado con el rocío del cielo, y siete tiempos pasarán sobre ti[b], hasta que sepas que el Altísimo gobierna en el reino de los hombres y lo da a quien él quiere.
  to: Y serás expulsado de entre los hombres, y tu morada será con las bestias del campo. Te harán comer hierba como los bueyes, y serás empapado con el rocío del cielo, y siete tiempos[a] pasarán sobre ti, hasta que sepas que el Altísimo gobierna en el reino de los hombres y lo da a quien él quiere.
  rationale: Se corrige el verbo de alimentación para reflejar la fuerza causativa del arameo y la decisión auditada del POB inglés. Se sustituye 'toros' por 'bueyes' para alinearse mejor con כְתוֹרִין / 'oxen'. Se elimina la nota innecesaria sobre la voz verbal en la primera cláusula al resolverse el español con una pasiva natural y fiel. Se conserva la nota sobre 'siete tiempos' porque preserva la ambigüedad documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura general y gran parte del sentido del arameo, incluyendo la oposición entre los hombres y las bestias del campo, el rocío del cielo, los siete tiempos y la soberanía del Altísimo. Sin embargo, pierde un matiz importante en יְטַעֲמוּן, cuya fuerza causativa fue preservada por el POB inglés ('you will be made to eat') y no debe reducirse a un simple 'comerás'. También conviene alinear כְתוֹרִין con 'bueyes' en lugar de 'toros', porque el inglés auditado escogió 'oxen' precisamente para evitar una especificación masculina o reproductiva.
  spanish_quality_summary: El español es claro, digno y en general natural. 'Morada', 'bestias del campo', 'rocío del cielo' y 'el Altísimo gobierna' funcionan bien. No obstante, 'como los toros' suena menos preciso que 'como los bueyes' en este contexto de pastar, y 'comerás' debilita innecesariamente la humillación impuesta del pasaje. La frase revisada sigue siendo fluida en español sin volverse pesada.
  glossary_alignment: No hay conflictos con terminología principal del proyecto. 'Altísimo' es adecuado para עִלָּיָא. 'Los hombres' concuerda con la decisión documentada para אֲנָשָׁא. La revisión propuesta mejora la alineación con las decisiones léxicas auditadas para כְתוֹרִין y יְטַעֲמוּן.
  issues:
  - severity: medium
    issue: Pérdida del matiz causativo en יְטַעֲמוּן
    rationale: El arameo expresa que Nabucodonosor será hecho comer hierba; 'comerás' reduce una acción impuesta a una acción simple. 'Te harán comer' preserva mejor el sentido fuente y el razonamiento documentado del POB inglés.
  - severity: medium
    issue: '''Toros'' no reproduce tan bien כְתוֹרִין como ''bueyes'''
    rationale: La auditoría inglesa eligió 'oxen' para evitar la especificación de 'bulls'. En español, 'bueyes' encaja mejor con el cuadro de animales que comen hierba y conserva mejor la intención léxica documentada.
  - severity: low
    issue: La nota [a] está anclada en el lugar equivocado respecto a su contenido
    rationale: La nota explica la alternancia entre forma impersonal/pasiva y activa para טָרְדִין; si se adopta una redacción pasiva o impersonal, la nota deja de ser necesaria. Mantener una nota allí sin necesidad añade ruido.
  revised_spanish_text: Y serás expulsado de entre los hombres, y tu morada será con las bestias del campo. Te harán comer hierba como los bueyes, y serás empapado con el rocío del cielo, y siete tiempos[a] pasarán sobre ti, hasta que sepas que el Altísimo gobierna en el reino de los hombres y lo da a quien él quiere.
  revised_footnotes:
  - marker: a
    text: 'O: «siete períodos»; muchos entienden esto como «siete años».'
    reason: alternative_reading
  revision_rationale: Se corrige el verbo de alimentación para reflejar la fuerza causativa del arameo y la decisión auditada del POB inglés. Se sustituye 'toros' por 'bueyes' para alinearse mejor con כְתוֹרִין / 'oxen'. Se elimina la nota innecesaria sobre la voz verbal en la primera cláusula al resolverse el español con una pasiva natural y fiel. Se conserva la nota sobre 'siete tiempos' porque preserva la ambigüedad documentada.
