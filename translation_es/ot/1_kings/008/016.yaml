source:
  edition: WLC
  text: מִן הַ/יּ֗וֹם אֲשֶׁ֨ר הוֹצֵ֜אתִי אֶת עַמִּ֣/י אֶת יִשְׂרָאֵל֮ מִ/מִּצְרַיִם֒ לֹֽא בָחַ֣רְתִּי בְ/עִ֗יר מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל לִ/בְנ֣וֹת בַּ֔יִת לִ/הְי֥וֹת שְׁמִ֖/י שָׁ֑ם וָ/אֶבְחַ֣ר בְּ/דָוִ֔ד לִֽ/הְי֖וֹת עַל עַמִּ֥/י יִשְׂרָאֵֽל־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/016.yaml
  text: From the day that I brought my people Israel out of Egypt[a], I have not chosen a city from all the tribes of Israel to build a house for my name to be there[b], but I chose David to be over my people Israel.
  footnotes:
  - marker: a
    text: 'Or, ''and I chose David.'' The Hebrew conjunction can be read coordinately, but the context favors a contrast: no city had been chosen, whereas David had been chosen.'
    reason: lexical_alternative
  - marker: b
    text: '''A house for my name'' is a Hebrew idiom for a sanctuary associated with the LORD''s name and presence; that is, the temple.'
    reason: cultural_note
