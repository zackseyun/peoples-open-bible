translation:
  language: es
  text: Cuando pasa la tormenta[a], el impío[b] ya no existe, pero el justo es fundamento eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Cuando pasa el torbellino» o «Al pasar la tormenta».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «y no hay impío». El sentido es que el impío desaparece o perece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּעֲבוֹר
  english_pob_choice: When ... passes
  chosen_spanish: Cuando pasa
  alternatives_spanish:
  - Al pasar
  - Cuando haya pasado
  lexicon: HALOT
  rationale: El prefijo כ con el infinitivo constructo de עבר expresa aquí una relación temporal. «Cuando pasa» comunica de modo natural la secuencia proverbial sin forzar una estructura demasiado literal.
- source_word: סוּפָה
  english_pob_choice: storm
  chosen_spanish: tormenta
  alternatives_spanish:
  - torbellino
  - tempestad
  - tormenta violenta
  lexicon: HALOT
  rationale: סוּפָה designa un temporal violento; «tormenta» es claro, natural y suficientemente amplio para conservar la imagen destructiva. «Torbellino» sería posible, pero menos general en español.
- source_word: וְאֵין
  english_pob_choice: are no more
  chosen_spanish: ya no existe
  alternatives_spanish:
  - ya no hay
  - desaparece
  - se extingue
  lexicon: HALOT
  rationale: La expresión hebrea indica ausencia resultante, incluso desaparición o perecimiento. «Ya no existe» mantiene esa fuerza sin sonar artificial en español.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el malhechor
  - los impíos
  lexicon: HALOT
  rationale: Aunque el hebreo es singular representativo, en español conviene un sustantivo que exprese la clase de personas. «El impío» conserva el valor proverbial y la referencia general sin limitarlo a un individuo.
- source_word: וְצַדִּיק
  english_pob_choice: but the righteous
  chosen_spanish: pero el justo
  alternatives_spanish:
  - y el justo
  - mas el justo
  lexicon: HALOT
  rationale: La conjunción marca contraste en el paralelismo; «pero» lo explicita de manera natural. «El justo» preserva el singular representativo y la categoría colectiva del proverbio.
- source_word: יְסוֹד
  english_pob_choice: foundation
  chosen_spanish: cimiento
  alternatives_spanish:
  - fundamento
  - base
  - fundación
  lexicon: HALOT
  rationale: יְסוֹד es base o fundamento; «cimiento» funciona bien en español para una imagen de estabilidad estructural. «Fundamento» también sería válido, pero «cimiento» suena más concreto y proverbial.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: eterno
  alternatives_spanish:
  - perdurable
  - duradero
  - para siempre
  lexicon: HALOT
  rationale: עוֹלָם califica la permanencia duradera del justo como base. «Eterno» comunica la idea de duración sin fin de forma natural y digna en español.
theological_decisions:
- issue: Singular representativo en la sabiduría hebrea
  english_pob_reading: Render class terms generically as 'the wicked' and 'the righteous' rather than explicitly masculine singular forms.
  chosen_spanish_reading: 'Traducir con sustantivos genéricos de clase: «el impío» y «el justo», entendidos proverbially, no como individuos aislados.'
  alternative_spanish_readings:
  - el impío ... el justo
  - los impíos ... los justos
  rationale: El hebreo usa singulares representativos para afirmar una verdad general. El español conserva esa fuerza proverbial con formas que siguen siendo inclusivas de la clase completa, sin masculinizar indebidamente el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo base y con la decisión inglesa auditada; no se requirieron revisiones del contenido, solo ajustes naturales de equivalencia para español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este verso no contiene el nombre divino.
  - «Justo» y «impío» preservan el paralelismo sapiencial con valor de clase representativa.
  - El orden y la puntuación siguen el contraste poético del hebreo sin añadir interpretación doctrinal extra.
