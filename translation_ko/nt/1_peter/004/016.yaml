source:
  edition: SBLGNT
  text: εἰ δὲ ὡς Χριστιανός, μὴ αἰσχυνέσθω, δοξαζέτω δὲ τὸν θεὸν ἐν τῷ ὀνόματι τούτῳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/016.yaml
  text: 'But if as a Christian, let him not be ashamed, but let him glorify God in this name.'
translation:
  language: ko
  text: '그러나 그리스도인으로서 고난을 받는다면 부끄러워하지 말고, 도리어 이 이름으로 하나님께 영광을 돌리게 하십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Χριστιανός
  english_pob_choice: a Christian
  chosen_korean: 그리스도인
  alternatives_korean:
  - 메시아인
  - 크리스천
  lexicon: BDAG
  rationale: Χριστιανός는 신약 단 세 번(행 11:26; 26:28; 본 절) 등장하는 외부에서 붙인 별칭. 한국어로 굳은 「그리스도인」을 채택. 본문 외 다른 곳에서 Χριστός를 「메시아」로 옮긴 정책과 별개로, 이 명사는 외부 호칭으로서 정착된 음역.
- source_word: ἐν τῷ ὀνόματι τούτῳ
  english_pob_choice: in this name
  chosen_korean: 이 이름으로
  alternatives_korean:
  - 이 이름 안에서
  - 이 호칭으로
  lexicon: BDAG
  rationale: 일부 사본은 ἐν τῷ μέρει τούτῳ(이 일에서)로 읽지만, 「이 이름으로」가 더 잘 입증됨.
