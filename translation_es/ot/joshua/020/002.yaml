translation:
  language: es
  text: 'Habla a los hijos de Israel, diciendo: «Designen para ustedes las ciudades de refugio, de las cuales les hablé por medio de Moisés[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de Moisés», un modismo que significa «por medio de Moisés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo piel de דבר pide una orden directa. «Habla» conserva el tono mandato sin añadir matices interpretativos innecesarios.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar masculina del hebreo, en lugar de neutralizarla con «israelitas», para reflejar con mayor precisión la forma del original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - en estos términos
  lexicon: HALOT
  rationale: Es la fórmula quotativa normal y en español se expresa con naturalidad como «diciendo».
- source_word: תְּנוּ לָכֶם
  english_pob_choice: Appoint for yourselves
  chosen_spanish: Designen para ustedes
  alternatives_spanish:
  - Pongan para ustedes
  - Señalen para ustedes
  - Designen para ustedes
  lexicon: HALOT
  rationale: En este contexto administrativo, נתן implica asignar o establecer. «Designen» comunica mejor la función legal de las ciudades que un simple «den».
- source_word: עָרֵי הַמִּקְלָט
  english_pob_choice: the cities of refuge
  chosen_spanish: las ciudades de refugio
  alternatives_spanish:
  - las ciudades de refugio
  - las ciudades-refugio
  - las ciudades de asilo
  lexicon: HALOT
  rationale: «Ciudades de refugio» es la equivalencia establecida y fiel para el término técnico legal del pasaje.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֲלֵיכֶם
  english_pob_choice: about which I spoke to you
  chosen_spanish: de las cuales les hablé
  alternatives_spanish:
  - sobre las cuales les hablé
  - acerca de las cuales les hablé
  lexicon: HALOT
  rationale: El relativo hebreo se vierte de forma natural en español con «de las cuales». Se evita una paráfrasis más libre, manteniendo la referencia directa a lo ya dicho.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por Moisés
  - por la mano de Moisés
  - por medio de Moisés
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica mediación. «Por medio de Moisés» conserva esa mediación con claridad y dignidad, sin perder el trasfondo literal del idiomismo.
theological_decisions:
- issue: Designación covenantal masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se preserva la forma masculina/familiar del hebreo como designación convencional del pueblo del pacto. No hay razón textual para neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Mediación profética en בְּיַד מֹשֶׁה
  english_pob_reading: through Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - por la mano de Moisés
  - por Moisés
  rationale: No se resuelve una tensión doctrinal, sino una cuestión de agencia. «Por medio de Moisés» expresa que la instrucción llegó mediada por Moisés, en consonancia con la lectura auditada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo masorético y toma en cuenta el cierre revisado del POB inglés: «about which I spoke to you through Moses». Se mantuvo la idea de mediación con una formulación española natural y formal, sin diluir el valor idiomático de בְּיַד.'
  spanish_consistency_notes:
  - Se usó «los hijos de Israel» conforme al criterio de conservar la forma familiar masculina del hebreo cuando funciona como designación convencional del pueblo.
  - «Ciudades de refugio» se mantuvo como término técnico estable; no se sustituyó por «asilo» para evitar una modernización semántica innecesaria.
  - La cita directa se cerró con comillas españolas y puntuación acorde al español estándar.
  - El pie de nota se ancló en «Israel[a]» para documentar la diferencia entre el sentido literal hebreo y la equivalencia idiomática en español.
