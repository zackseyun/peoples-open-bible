translation:
  language: es
  text: Al final de cada tres años[b], sacarás todo el diezmo de tu producción en ese año y lo depositarás dentro de tus puertas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «dentro de tus puertas» se refiere a tus ciudades o asentamientos locales bajo tu jurisdicción.
    reason: cultural_note
  - marker: b
    text: O «cada tercer año».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה
  english_pob_choice: At the end of
  chosen_spanish: Al final de
  alternatives_spanish:
  - Al término de
  - Al cabo de
  lexicon: HALOT
  rationale: La expresión marca el punto temporal al que se llega, no simplemente una posterioridad vaga. «Al final de» conserva bien el valor temporal del hebreo y suena natural en español bíblico contemporáneo.
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: every three years
  chosen_spanish: cada tres años
  alternatives_spanish:
  - de tres en tres años
  - cada tercer año
  lexicon: HALOT
  rationale: El contexto pide una práctica recurrente trienal. «Cada tres años» expresa esa iteración de forma clara y fiel. Se deja la alternativa de «cada tercer año» por la nota, porque también refleja el valor distributivo.
- source_word: תּוֹצִיא
  english_pob_choice: you shall bring out
  chosen_spanish: sacarás
  alternatives_spanish:
  - traerás fuera
  - harás salir
  lexicon: HALOT
  rationale: El hiphil de יצא indica hacer salir o sacar. «Sacarás» conserva la acción concreta de extraer el diezmo de donde esté guardado para su uso designado.
- source_word: כָּל מַעְשַׂר
  english_pob_choice: all the tithe
  chosen_spanish: todo el diezmo
  alternatives_spanish:
  - el diezmo entero
  - la totalidad del diezmo
  lexicon: HALOT
  rationale: «Todo el diezmo» reproduce de manera natural el énfasis de כָּל sobre la totalidad requerida. En español suena más directo que un giro más técnico.
- source_word: תְּבוּאָתְךָ
  english_pob_choice: your produce
  chosen_spanish: tu produce
  alternatives_spanish:
  - tu cosecha
  - tu rendimiento
  lexicon: HALOT
  rationale: Se conserva el sentido amplio de תְּבוּאָה como producción agrícola. «Produce» es entendible en español bíblico moderno y evita restringir el término solo a grano o a una cosecha puntual.
- source_word: בַּשָּׁנָה הַהִוא
  english_pob_choice: in that year
  chosen_spanish: en ese año
  alternatives_spanish:
  - en aquel año
  - para ese año
  lexicon: HALOT
  rationale: La frase especifica el año al que pertenece el diezmo. «En ese año» es la correspondencia más natural y precisa.
- source_word: וְהִנַּחְתָּ
  english_pob_choice: and lay it up
  chosen_spanish: y lo pondrás
  alternatives_spanish:
  - y lo depositarás
  - y lo almacenarás
  lexicon: HALOT
  rationale: El verbo puede sugerir poner, depositar o dejar. Aquí se eligió «lo pondrás» por su sencillez y porque el contexto inmediato ya aclara el destino del diezmo. La nota preserva la imagen de ubicación «dentro de tus puertas».
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - dentro de tus ciudades
  - en tus poblados
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo «puertas», que en español puede sonar más literal y auditable. La nota explica el valor idiomático de referencia a las poblaciones o asentamientos bajo jurisdicción local.
theological_decisions:
- issue: Valor idiomático de «tus puertas» como referencia comunitaria local
  english_pob_reading: Hebrew 'within your gates' refers to one's local towns or settlements under one's jurisdiction.
  chosen_spanish_reading: «Dentro de tus puertas» mantiene la imagen literal, con la nota de que se refiere a tus ciudades o asentamientos locales bajo tu jurisdicción.
  alternative_spanish_readings:
  - en tus ciudades
  - en tus poblados
  - dentro de tu jurisdicción local
  rationale: La traducción principal conserva la metáfora hebrea sin disolverla. La nota comunica el sentido cultural e histórico que el lector necesita para entender que no se trata solo de puertas físicas.
  doctrine_reference: Notas culturales y de traducción del texto hebreo
- issue: Distribución temporal de la obligación trienal
  english_pob_reading: Or 'each third year.'
  chosen_spanish_reading: «Cada tres años» en el texto, con la alternativa «cada tercer año» preservada como posibilidad de lectura.
  alternative_spanish_readings:
  - cada tercer año
  - en el tercer año de cada ciclo
  rationale: Ambas opciones reflejan el hebreo; «cada tres años» suena más natural y comunica mejor la periodicidad. Se conserva la alternativa para auditar la equivalencia con el valor distributivo del original.
  doctrine_reference: Precisión temporal del mandato legal
- issue: 'Destino del diezmo: almacenamiento o depósito'
  english_pob_reading: and lay it up within your gates
  chosen_spanish_reading: «y lo pondrás dentro de tus puertas» mantiene la dirección del mandato sin imponer una imagen específica de almacenamiento.
  alternative_spanish_readings:
  - y lo depositarás dentro de tus puertas
  - y lo guardarás dentro de tus puertas
  rationale: El hebreo permite la idea de poner/depositar. En español, «poner» es más neutral y evita cargar el texto con una explicación que la frase siguiente no exige. La combinación con la imagen de las puertas conserva el espacio local donde queda el diezmo.
  doctrine_reference: Mandato económico y comunitario del Pentateuco
translation_notes:
  revision_awareness: El presente borrador sigue el pasaje hebreo masorético (WLC) y está alineado con el audit trail inglés de la POB, sin cambios respecto al pasaje de referencia ni necesidad de revisión textual adicional.
  spanish_consistency_notes:
  - Se mantiene «diezmo» para מַעְשַׂר, en continuidad con el sentido legal-cultual del término.
  - Se conserva la metáfora espacial «puertas» y se aclara con nota su valor idiomático.
  - «En ese año» refleja el deíctico הַהִוא sin añadir ni omitir información.
  - El registro es formal y readable para una audiencia eclesial amplia, sin depender de giros arcaizantes.
