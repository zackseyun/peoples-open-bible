translation:
  language: es
  text: Y yo extenderé mi mano y heriré a Egipto con todas mis maravillas que haré en medio de Egipto[a]; y después de eso los enviará fuera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de él». El hebreo usa un sufijo singular que puede referirse a Egipto como entidad colectiva.
    reason: lexical_alternative
  - marker: b
    text: O «los dejará salir». El hebreo dice más literalmente «los enviará fuera».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלַחְתִּי אֶת־יָדִי
  english_pob_choice: I will stretch out my hand
  chosen_spanish: extenderé mi mano
  alternatives_spanish:
  - alargaré mi mano
  - enviaré mi mano
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de acción divina con la mano. En español, «extenderé mi mano» conserva la metáfora corporal con naturalidad y sin volverla abstracta; «enviaré mi mano» suena más literal pero menos idiomático.
- source_word: וְהִכֵּיתִי
  english_pob_choice: and strike
  chosen_spanish: y heriré
  alternatives_spanish:
  - y golpearé
  - y heriré de golpe
  lexicon: HALOT
  rationale: נכה puede ser «golpear», «herir» o «abatir». «Heriré» mantiene la fuerza de juicio sin sugerir necesariamente exterminio total, y funciona bien en un contexto de plagas.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - a los egipcios
  lexicon: HALOT
  rationale: El objeto es la entidad nacional como colectivo. «Egipto» conserva el referente corporativo mejor que una referencia solo a individuos.
- source_word: בְּכֹל נִפְלְאֹתַי
  english_pob_choice: with all my wonders
  chosen_spanish: con todas mis maravillas
  alternatives_spanish:
  - con todas mis obras maravillosas
  - con todos mis prodigios
  lexicon: HALOT
  rationale: נפלאות señala actos extraordinarios que provocan asombro. «Maravillas» es una equivalencia bíblica clara en español y mantiene el sentido de hechos portentosos.
- source_word: אֲשֶׁר אֶעֱשֶׂה
  english_pob_choice: that I will do
  chosen_spanish: que haré
  alternatives_spanish:
  - que voy a hacer
  - que realizaré
  lexicon: HALOT
  rationale: La cláusula relativa es simple y directa; «haré» preserva la sencillez del verbo עשה sin añadir matices interpretativos.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: in its midst
  chosen_spanish: en medio de él
  alternatives_spanish:
  - dentro de él
  - en su interior
  lexicon: HALOT
  rationale: El sufijo singular remite a Egipto como entidad colectiva. «En medio de él» mantiene la imagen espacial y la referencia singular; aunque «Egipto» es un nombre normalmente singular en español, aquí se conserva la forma del hebreo.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: and after that
  chosen_spanish: y después de eso
  alternatives_spanish:
  - y luego
  - y después
  lexicon: HALOT
  rationale: La expresión marca secuencia temporal. «Después de eso» es natural y mantiene el enlace narrativo sin sobretraducir.
- source_word: יְשַׁלַּח אֶתְכֶם
  english_pob_choice: he will send you out
  chosen_spanish: él los dejará salir
  alternatives_spanish:
  - él los enviará fuera
  - él los sacará
  lexicon: HALOT
  rationale: El hebreo dice literalmente «os enviará», pero en español «los dejará salir» comunica con claridad la liberación resultante y evita una formulación rígida. Se mantiene el matiz de expulsión/liberación implícito en el contexto.
theological_decisions:
- issue: Metáfora corporal aplicada a la acción divina
  english_pob_reading: Retain the bodily metaphor 'stretch out my hand'
  chosen_spanish_reading: Conservar «extenderé mi mano» como imagen concreta de intervención divina
  alternative_spanish_readings:
  - expresaré mi poder
  - ejerceré mi poder
  rationale: El texto hebreo presenta una imagen antropomórfica deliberada. En español conviene conservarla porque es parte del sentido y del estilo del pasaje; no hace falta abstraerla a «poder».
  doctrine_reference: Principio de primacía del texto original; conservar el sentido llano sin reinterpretación doctrinal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés de la POB y conserva sus decisiones clave: la metáfora de la mano extendida, la fuerza de נכה, el colectivo «Egipto», «maravillas» para נפלאות, la secuencia temporal y el verbo final con matiz de expulsión/liberación. No se reportan revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por política general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa un registro moderno y digno, con vocabulario bíblico reconocible sin depender de fórmulas tradicionales que oculten el hebreo.
  - Se conserva la tensión entre literalidad y fluidez en el final, donde el hebreo permite tanto «enviar» como «dejar salir».
