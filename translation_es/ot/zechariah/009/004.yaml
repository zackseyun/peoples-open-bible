translation:
  language: es
  text: He aquí, el Señor la despojará, y golpeará[a] su riqueza en el mar, y ella será consumida por el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su fuerza», «su ejército» o «su poder»; el término hebreo puede denotar riqueza, recursos o poder militar. Aquí «riqueza» encaja mejor con el contexto inmediato de las riquezas de Tiro en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y profética del anuncio. En español, «He aquí» es solemne y natural en registro bíblico, sin caer en un calco demasiado rígido.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aquí se trata del título Adonai, no del Tetragrámaton. En español, «el Señor» reproduce el título divino de forma idiomática y reverente.
- source_word: יוֹרִשֶׁנָּה
  english_pob_choice: will dispossess her
  chosen_spanish: la despojará de sus bienes
  alternatives_spanish:
  - la despojará
  - la hará perder su posesión
  - la echará fuera
  lexicon: HALOT
  rationale: El Hifil de ירש puede implicar desposesión o toma de posesión. En este contexto de Tiro y sus riquezas inmediatas, «despojará de sus bienes» preserva el sentido de privación sin fijarlo indebidamente en una sola imagen militar.
- source_word: וְהִכָּה
  english_pob_choice: and strike
  chosen_spanish: y arrojará
  alternatives_spanish:
  - y golpeará
  - y herirá
  - y arrojará
  lexicon: HALOT
  rationale: El verbo נכה puede expresar golpear/herir, pero en combinación con «al mar» el español fluye mejor con una construcción que exprese el resultado de la acción. «Arrojará» sigue la línea interpretativa del audit trail inglés, que entiende el acto como lanzamiento o derribo de la riqueza al mar.
- source_word: בַּיָּם
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - en el mar
  - al mar
  lexicon: HALOT
  rationale: «Al mar» refleja la dirección resultativa del hebreo y suena natural en español.
- source_word: חֵילָהּ
  english_pob_choice: her wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus riquezas
  - su fuerza
  - su ejército
  lexicon: HALOT
  rationale: La entrada hebrea puede significar riqueza, recursos, fuerza o poder militar. El contexto inmediato de Tiro y sus metales preciosos favorece «su riqueza», que mantiene la decisión contextual del POB inglés.
- source_word: וְהִיא
  english_pob_choice: and she
  chosen_spanish: y ella
  alternatives_spanish:
  - y ella
  - y eso
  lexicon: HALOT
  rationale: Se mantiene la personificación femenina de la ciudad, como en el inglés auditado. «Ella» conserva la referencia literaria y profética mejor que un impersonal.
- source_word: בָּאֵשׁ
  english_pob_choice: by fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - por el fuego
  - con fuego
  lexicon: HALOT
  rationale: El español suele expresar el medio o agente de destrucción con «por el fuego»; preserva bien el valor resultativo del pasivo.
- source_word: תֵּאָכֵל
  english_pob_choice: will be consumed
  chosen_spanish: será consumida
  alternatives_spanish:
  - será consumida
  - será devorada
  - será quemada
  lexicon: HALOT
  rationale: El nifal de אכל se usa como idiomático de ser consumido/devorado. «Será consumida» mantiene la metáfora sin forzar una lectura meramente física.
theological_decisions:
- issue: Referente femenino de la ciudad
  english_pob_reading: The feminine forms refer to the city addressed in context, rendered as a personified 'her/she.'
  chosen_spanish_reading: Las formas femeninas se refieren a la ciudad mencionada en el contexto, representada como «ella».
  alternative_spanish_readings:
  - Se podría traducir de modo impersonal con «la» o «eso»
  - Se podría evitar la personificación
  rationale: El hebreo usa femenino singular, y el español puede conservar esa personificación sin pérdida de claridad. Esto mantiene el tono profético-literario del pasaje.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se siguió el sentido contextual ya documentado en el auditor inglés: la frase apunta a la desposesión de Tiro, al manejo de su riqueza y a su destrucción por fuego. No se introdujeron cambios doctrinales ni se atenuó la personificación femenina.'
  spanish_consistency_notes:
  - Se usó «el Señor» para Adonai, no como sustituto del Nombre divino YHWH.
  - Se mantuvo «ella» para la ciudad conforme a la personificación presente en el hebreo y en el audit trail inglés.
  - «su riqueza» sigue la decisión contextual de 'wealth' frente a alternativas militares o de poder.
