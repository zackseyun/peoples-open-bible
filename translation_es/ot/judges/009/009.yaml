base_translation:
  language: en
  yaml_path: translation/ot/judges/009/009.yaml
  text: But the olive tree said to them[a], ‘Should I stop producing my oil, by which gods and men are honored[b], and go to sway over the trees?’
  footnotes:
  - marker: a
    text: Or, 'by which God and men are honored.' Many translations take אֱלֹהִים here as referring to the true God, since olive oil was used in worship; the Hebrew form itself is plural.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'my fatness,' a figurative expression for the olive tree's rich produce.
    reason: lexical_alternative
