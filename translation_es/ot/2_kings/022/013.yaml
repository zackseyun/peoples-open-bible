translation:
  language: es
  text: Vayan[a], consulten a Yahvé por mí, por el pueblo y por todo Judá[b], acerca de las palabras de este libro que ha sido hallado. Porque grande es la ira de Yahvé, que se ha encendido contra nosotros, pues nuestros padres no escucharon las palabras de este libro, para hacer de acuerdo con todo lo que está escrito respecto de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «busquen a Yahvé» o «inquieran de Yahvé». El verbo hebreo puede abarcar la idea de buscar a Dios en general o de consultarlo para recibir guía; aquí el contexto favorece una consulta formal.
    reason: lexical_alternative
  - marker: b
    text: O «nuestros antepasados». Se mantiene «nuestros padres» porque el hebreo es explícitamente masculino y alude a los padres nacionales.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִרְשׁוּ אֶת־יְהוָה
  english_pob_choice: inquire of Yahweh
  chosen_spanish: consulta a Yahvé
  alternatives_spanish:
  - busca a Yahvé
  - inquiere de Yahvé
  - consulta a Yahvé
  lexicon: HALOT
  rationale: דרשׁ con Dios como objeto aquí expresa buscar orientación o un oráculo, no solo devoción general. En español, «consulta a Yahvé» comunica bien esa función de pedir dirección divina y suena natural en contexto profético/cortesano.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva el nombre del pacto sin reemplazarlo por un título genérico.
- source_word: בַּעֲדִי וּבְעַד הָעָם וּבְעַד כָּל־יְהוּדָה
  english_pob_choice: for me, and for the people, and for all Judah
  chosen_spanish: por mí, por el pueblo y por todo Judá
  alternatives_spanish:
  - en favor de mí, del pueblo y de todo Judá
  - por mí, por el pueblo y por toda Judá
  lexicon: HALOT
  rationale: בעד expresa representación o intercesión. «Por» conserva el sentido intercesor con español claro y sobrio; «todo Judá» refleja el alcance total del colectivo.
- source_word: עַל דִּבְרֵי הַסֵּפֶר הַנִּמְצָא הַזֶּה
  english_pob_choice: concerning the words of this book that has been found
  chosen_spanish: acerca de las palabras de este libro que ha sido hallado
  alternatives_spanish:
  - con respecto a las palabras de este libro que fue hallado
  - sobre las palabras de este libro encontrado
  lexicon: HALOT
  rationale: עַל con דִּבְרֵי introduce el asunto de la consulta. «Acerca de» mantiene el foco del contenido textual; «ha sido hallado» reproduce el valor resultativo del participio sin forzar el estilo.
- source_word: חֲמַת יְהוָה
  english_pob_choice: the wrath of Yahweh
  chosen_spanish: la ira de Yahvé
  alternatives_spanish:
  - el furor de Yahvé
  - la furia de Yahvé
  lexicon: HALOT
  rationale: חֵמָה denota ira ardiente o furor. «Ira» es la opción más estable y comprensible en español bíblico, y conserva el peso judicial del contexto.
- source_word: נִצְּתָה בָנוּ
  english_pob_choice: has been kindled against us
  chosen_spanish: se ha encendido contra nosotros
  alternatives_spanish:
  - ha sido encendida contra nosotros
  - ha ardido contra nosotros
  lexicon: HALOT
  rationale: El verbo comunica la imagen de fuego prendido. «Se ha encendido contra nosotros» conserva la metáfora y su dirección hostil, con naturalidad en español.
- source_word: לֹא שָׁמְעוּ אֲבֹתֵינוּ
  english_pob_choice: our fathers have not listened
  chosen_spanish: nuestros padres no escucharon
  alternatives_spanish:
  - nuestros antepasados no escucharon
  - nuestros padres no obedecieron
  lexicon: HALOT
  rationale: שׁמע aquí conserva su valor de oír con atención frente a las palabras del libro. «Escucharon» deja abierta la implicación de obediencia que el infinitivo siguiente desarrolla.
- source_word: לַעֲשׂוֹת כְּכָל־הַכָּתוּב
  english_pob_choice: to do according to all that is written
  chosen_spanish: para hacer conforme a todo lo que está escrito
  alternatives_spanish:
  - para hacer según todo lo que está escrito
  - para cumplir todo lo que está escrito
  lexicon: HALOT
  rationale: 'El infinitivo expresa propósito: no escucharon para hacer. «Conforme a todo lo que está escrito» conserva la fuerza de כְּכָל sin reducirla a una sola obediencia parcial.'
- source_word: עָלֵינוּ
  english_pob_choice: concerning us
  chosen_spanish: respecto de nosotros
  alternatives_spanish:
  - sobre nosotros
  - contra nosotros
  - para nosotros
  lexicon: HALOT
  rationale: La frase final apunta a la aplicabilidad del texto al pueblo presente. «Respecto de nosotros» mantiene esa referencia sin decidir de antemano si se trata de juicio o de otra clase de cumplimiento.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragramatón. La forma del proyecto es traducirlo como «Yahvé» en el texto principal, preservando el nombre del pacto en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Referencia masculina en אֲבֹתֵינוּ
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El plural hebreo es masculino y apunta a los padres/fundadores nacionales. Se conserva esa concreción en vez de neutralizarla sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura aprobada en inglés y no requiere revisiones sustanciales respecto del último pase. Se conserva la imagen de la ira encendida, la función intercesora de בעד y la aplicabilidad de lo escrito a la comunidad presente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה en conformidad con el estándar del proyecto.
  - «Escucharon» se reserva para שׁמע en su sentido de oír/atender, dejando la obediencia explícita en «para hacer».
  - «Respecto de nosotros» evita intensificar prematuramente el matiz a juicio o amenaza, aunque el contexto inmediato lo haga ominoso.
