translation:
  language: es
  text: Un trono será establecido en amor fiel[a][b], y uno se sentará sobre él en fidelidad[c], en la tienda de David, juzgando y buscando justicia, y pronto para obrar con rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él se sentará sobre él»; el hebreo deja implícito el sujeto.'
    reason: alternative_reading
  - marker: b
    text: «Amor fiel» traduce חֶסֶד, término que suele incluir lealtad de pacto, misericordia y amor constante.
    reason: lexical_alternative
  - marker: c
    text: 'O: «en verdad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּכַן
  english_pob_choice: will be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - será preparado
  - será afirmado
  lexicon: HALOT
  rationale: El hophal de כון expresa ser puesto en firmeza o establecido. «Será establecido» mantiene la pasiva/resultativa y suena natural en español.
- source_word: בַּחֶסֶד
  english_pob_choice: in steadfast love
  chosen_spanish: en amor fiel
  alternatives_spanish:
  - en misericordia
  - por amor leal
  - en lealtad pactal
  lexicon: HALOT
  rationale: חֶסֶד puede abarcar amor leal, misericordia y fidelidad de pacto. «Amor fiel» conserva el vínculo entre afecto y lealtad sin perder legibilidad en español.
- source_word: כִּסֵּא
  english_pob_choice: a throne
  chosen_spanish: un trono
  alternatives_spanish:
  - el trono
  lexicon: HALOT
  rationale: El hebreo no lleva artículo; «un trono» refleja mejor la forma indefinida del original.
- source_word: וְיָשַׁב עָלָיו
  english_pob_choice: and one will sit on it
  chosen_spanish: y uno se sentará sobre él
  alternatives_spanish:
  - y él se sentará sobre él
  - y alguien se sentará sobre él
  lexicon: HALOT
  rationale: El verbo está en tercera persona masculina singular sin sujeto explícito. «Uno» preserva la indefinición del hebreo sin forzar una identificación gramatical.
- source_word: בֶּאֱמֶת
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - en verdad
  - fielmente
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, confiabilidad o fidelidad. En un contexto real/judicial, «fidelidad» comunica mejor la idea de gobierno confiable.
- source_word: בְּאֹהֶל דָּוִד
  english_pob_choice: in the tent of David
  chosen_spanish: en la tienda de David
  alternatives_spanish:
  - en la casa de David
  - en el tabernáculo de David
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en la tienda de David». Se conserva esa imagen para no aplanar el texto hacia una expresión dinástica más abstracta.
- source_word: שֹׁפֵט
  english_pob_choice: judging
  chosen_spanish: juzgando
  alternatives_spanish:
  - como juez
  - que juzga
  lexicon: HALOT
  rationale: El participio describe la función continua del gobernante. «Juzgando» mantiene esa forma verbal en español.
- source_word: וְדֹרֵשׁ מִשְׁפָּט
  english_pob_choice: and seeking justice
  chosen_spanish: y buscando justicia
  alternatives_spanish:
  - y procurando justicia
  - y exigiendo justicia
  lexicon: HALOT
  rationale: דָרַשׁ con מִשְׁפָּט expresa buscar o procurar activamente justicia. «Buscando justicia» es claro y respeta la fuerza ética/judicial.
- source_word: וּמְהִר צֶדֶק
  english_pob_choice: and swift to do righteousness
  chosen_spanish: y pronto para hacer rectitud
  alternatives_spanish:
  - y veloz en rectitud
  - y apresurado para la justicia
  - y rápido para obrar rectitud
  lexicon: HALOT
  rationale: מְהִר denota rapidez o prontitud. La frase hebrea es comprimida; «pronto para hacer rectitud» conserva el sentido de disposición rápida a obrar con rectitud sin perder claridad en español.
theological_decisions:
- issue: Referencia davídica y posible lectura mesiánica
  english_pob_reading: Retain the verse as a prophetic description of an ideal Davidic ruler without explicitly identifying the figure in the translation.
  chosen_spanish_reading: Mantener el verso como descripción profética de un gobernante davídico ideal, sin identificarlo explícitamente en la traducción.
  alternative_spanish_readings:
  - El Mesías
  - Cristo
  - un rey histórico de la casa de David
  rationale: El hebreo nombra el trono y la tienda de David, pero no explicita el título mesiánico. La traducción debe conservar esa restricción textual y dejar abierta la lectura teológica para la interpretación del lector.
  doctrine_reference: Afirmaciones; preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del contexto inglés: se prefirió una formulación final más natural y clara («pronto para hacer rectitud») en lugar de una calca menos idiomática. También se mantuvo la indefinición del sujeto de וְיָשַׁב y la imagen concreta de «la tienda de David».'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo» o «Mesías» en el cuerpo para no sobreinterpretar el hebreo; la posible lectura mesiánica queda en la nota teológica.
  - '«Justicia» y «rectitud» se diferenciaron: מִשְׁפָּט quedó como «justicia» y צֶדֶק como «rectitud», siguiendo la distinción semántica del inglés POB y del hebreo.'
  - «Amor fiel» se eligió como solución española para חֶסֶד, manteniendo la tensión entre misericordia, lealtad y amor de pacto.
