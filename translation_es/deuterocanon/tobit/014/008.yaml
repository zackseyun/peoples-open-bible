- from: Y ahora, niño[a], sal de Nínive, porque sin duda sucederá lo que el profeta Jonás habló.
  to: Y ahora,[a] hijo, sal de Nínive, porque sin duda sucederá lo que el profeta Jonás dijo.
  rationale: Se ajusta el vocativo a «hijo» por ser la apelación filial más natural y digna en español para τέκνον en este contexto, manteniendo «niño» como alternativa en nota. Se reemplaza «habló» por «dijo» para evitar un calco poco idiomático y expresar naturalmente el contenido de la palabra profética. El resto del versículo se conserva porque transmite bien el mandato y la certeza enfática del griego.
