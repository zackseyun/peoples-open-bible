translation:
  language: es
  text: Me pondré en mi puesto de guardia y tomaré posición sobre la muralla[a]; velaré para ver qué hablará en mí[b], y qué responderé acerca de mi queja[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la fortificación" o "el baluarte".
    reason: alternative_reading
  - marker: b
    text: O "qué me dirá"; el hebreo literalmente puede significar una palabra hablada "en mí", quizá refiriéndose a una comunicación profética interior.
    reason: alternative_reading
  - marker: c
    text: O "mi reprensión", "mi protesta" o "mi causa/argumento".
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁמַרְתִּי
  english_pob_choice: my guard post
  chosen_spanish: mi puesto de guardia
  alternatives_spanish:
  - mi vigilia
  - mi guardia
  - mi puesto
  lexicon: HALOT
  rationale: El sustantivo designa el lugar o función de vigilancia. 'Puesto de guardia' conserva la imagen concreta de un centinela y suena natural en español bíblico contemporáneo.
- source_word: אֶעֱמֹדָה
  english_pob_choice: I will stand
  chosen_spanish: me pondré
  alternatives_spanish:
  - estaré
  - me mantendré
  - me pararé
  lexicon: HALOT
  rationale: La forma expresa decisión y postura resuelta. En español, 'me pondré' comunica bien la intención de colocarse deliberadamente en actitud de espera vigilante.
- source_word: וְאֶתְיַצְּבָה
  english_pob_choice: and station myself
  chosen_spanish: y me instalaré
  alternatives_spanish:
  - y me colocaré
  - y tomaré mi puesto
  - y me afirmaré
  lexicon: HALOT
  rationale: El hitpael añade la idea de situarse firmemente. 'Me instalaré' evita simple repetición de 'me pondré' y conserva la noción de fijarse en un lugar.
- source_word: מָצוֹר
  english_pob_choice: the rampart
  chosen_spanish: la muralla
  alternatives_spanish:
  - el baluarte
  - la fortificación
  - el terraplén
  lexicon: HALOT
  rationale: En este contexto la palabra refiere a una altura o estructura defensiva para vigilar. 'Muralla' es clara y suficientemente amplia para el lector español, sin imponer una precisión arquitectónica no segura.
- source_word: וַאֲצַפֶּה
  english_pob_choice: I will keep watch
  chosen_spanish: velaré
  alternatives_spanish:
  - estaré atento
  - vigilaré
  - esperaré atento
  lexicon: HALOT
  rationale: '''Velaré'' expresa vigilancia continua y expectativa, y conserva el matiz de espera atenta mejor que un simple ''miraré''.'
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para observar
  - a fin de ver
  lexicon: HALOT
  rationale: La construcción de propósito es directa en español. 'Para ver' mantiene la sencillez del hebreo sin sobrecargar el verso.
- source_word: מַה יְדַבֶּר בִּי
  english_pob_choice: what he will speak in me
  chosen_spanish: qué me hablará
  alternatives_spanish:
  - qué hablará en mí
  - qué dirá en mí
  - qué me dirá
  lexicon: HALOT
  rationale: El hebreo permite tanto discurso dirigido al profeta como habla interior. El texto principal se inclina por una formulación natural en español, mientras la nota preserva la alternativa literal 'en mí' para no borrar la tensión interpretativa.
- source_word: אָשִׁיב
  english_pob_choice: I should answer
  chosen_spanish: responderé
  alternatives_spanish:
  - debo responder
  - habré de responder
  - daré respuesta
  lexicon: HALOT
  rationale: El verbo puede significar 'responder' o 'traer de vuelta una respuesta'. 'Responderé' transmite bien la resolución del profeta sin hacer la frase artificialmente modal en español.
- source_word: עַל תּוֹכַחְתִּי
  english_pob_choice: concerning my complaint
  chosen_spanish: acerca de mi queja
  alternatives_spanish:
  - por mi reprensión
  - acerca de mi protesta
  - sobre mi causa
  lexicon: HALOT
  rationale: תּוֹכַחַת puede ser reprensión, protesta, argumento o queja. 'Queja' comunica de modo natural el contexto de la lamentación de Habacuc, y la nota conserva las otras posibilidades semánticas.
theological_decisions:
- issue: Valor de בִּי en 'what he will speak in me'
  english_pob_reading: directed speech to the prophet ('in me' footnoted as alternative)
  chosen_spanish_reading: qué me hablará
  alternative_spanish_readings:
  - qué hablará en mí
  - qué me dirá
  rationale: El contexto inmediato presenta a Habacuc esperando la respuesta divina a su protesta anterior, por lo que la lectura principal es discurso dirigido a él. Sin embargo, el hebreo admite una lectura interior/inspirada; por eso la nota conserva 'en mí' como alternativa sin resolver la ambigüedad.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica y exegética donde el original la permite.'
- issue: Sentido de תּוֹכַחְתִּי
  english_pob_reading: my complaint
  chosen_spanish_reading: mi queja
  alternative_spanish_readings:
  - mi reprensión
  - mi protesta
  - mi argumento
  rationale: El pasaje sigue el reclamo audaz de Habacuc y anticipa la respuesta de Dios. 'Queja' es la manera más natural de expresar ese discurso en español moderno, mientras las alternativas conservan la fuerza forense o polémica del término.
  doctrine_reference: 'Principio de la POB: no ocultar la tensión retórica del texto profético.'
translation_notes:
  revision_awareness: 'El diseño del verso sigue de cerca el audit trail inglés de la POB: mantiene la postura deliberada del profeta, conserva la imagen de vigilancia y respeta la ambigüedad de בִּי mediante nota, pero adopta español natural (''puesto de guardia'', ''muralla'', ''velaré'', ''mi queja'') para una lectura publica y digna.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se evita 'SEÑOR' como sustituto aquí porque el verso no lo requiere.
  - '''Queja'' conserva el tono de protesta sin convertirlo en terminología eclesiástica ajena al contexto.'
  - '''Muralla'' mantiene una imagen defensiva comprensible sin sobreespecificar la arquitectura del hebreo.'
