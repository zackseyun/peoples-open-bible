translation:
  language: es
  text: ¿Por qué fue arrastrado tu poderoso[a]? No se mantuvo en pie, porque Yahvé lo rechazó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus poderosos'; la forma hebrea también puede entenderse como 'tu toro', posiblemente en alusión a Apis, el toro sagrado de Egipto.
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué?
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Es la equivalencia natural del interrogativo hebreo en una pregunta retórica. Mantiene el tono directo del texto sin añadir paráfrasis.
- source_word: נִסְחַף
  english_pob_choice: has ... been swept away
  chosen_spanish: fue arrastrado
  alternatives_spanish:
  - fue llevado
  - fue barrido
  - fue arrebatado
  lexicon: HALOT
  rationale: El verbo expresa la idea de ser arrastrado o llevado por fuerza, con imagen de derrota. 'Fue arrastrado' conserva la pasividad y la fuerza de la acción en español.
- source_word: אַבִּירֶיךָ
  english_pob_choice: your mighty one
  chosen_spanish: tu poderoso
  alternatives_spanish:
  - tu poderoso[s]
  - tus poderosos
  - tu toro
  lexicon: HALOT
  rationale: La forma hebrea admite lectura singular o plural, pero el contexto sintáctico inmediato favorece una referencia singular. 'Poderoso' conserva el valor léxico de fuerza sin forzar explícitamente 'toro' en el texto principal.
- source_word: לֹא עָמַד
  english_pob_choice: He did not stand
  chosen_spanish: No se mantuvo en pie
  alternatives_spanish:
  - No estuvo firme
  - No pudo mantenerse en pie
  - No permaneció en pie
  lexicon: HALOT
  rationale: En español, 'mantenerse en pie' comunica bien la idea idiomática de no resistir o no sostener la posición, sin perder la imagen corporal/bélica del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Introduce la causa de la caída. 'Porque' es el equivalente más claro y natural en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino transliterado según la convención del proyecto para el Tetragrámaton, en lugar de sustituirlo por una designación titulativa.
- source_word: הֲדָפוֹ
  english_pob_choice: drove him away
  chosen_spanish: lo derribó
  alternatives_spanish:
  - lo empujó
  - lo rechazó
  - lo repelió
  lexicon: HALOT
  rationale: El verbo puede expresar empujar, rechazar o derribar. 'Lo derribó' funciona bien en el paralelo de derrota y caída, y evita sonar demasiado abstracto en español.
theological_decisions:
- issue: Referente de אַבִּירֶיךָ en el oráculo contra Egipto
  english_pob_reading: '''your mighty one'' in the main text, with a footnote allowing ''your mighty ones'' or ''your bull'' (possibly Apis)'
  chosen_spanish_reading: '''tu poderoso'' en el texto principal, con nota para ''tus poderosos'' o ''tu toro'' (posible alusión a Apis)'
  alternative_spanish_readings:
  - tus poderosos
  - tu toro
  rationale: La sintaxis con verbos singulares favorece una lectura singular, pero el hebreo permite una ambigüedad legítima. Se conserva esa tensión en la nota sin convertir la alusión histórica en una afirmación obligatoria del texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece en el texto español exactamente donde corresponde, y la nota asociada queda anclada a esa frase. No se introdujeron cambios de contenido fuera de la coherencia textual ya auditada.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según la convención del proyecto para יְהוָה.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino.
  - '''Poderoso'' conserva la ambigüedad singular/plural del hebreo sin resolverla indebidamente en el texto principal.'
  - La nota conserva la alternativa 'toro' como posibilidad histórica/lexical, sin imponerla como única lectura.
