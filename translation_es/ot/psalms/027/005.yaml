translation:
  language: es
  text: Porque él me esconderá en su refugio[a] en el día de angustia[b]; me ocultará en el lugar secreto de su tienda; me pondrá en alto sobre una roca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su choza», «en su pabellón» o «en su tabernáculo». El término hebreo denota una estructura de abrigo y puede tener matices de santuario.
    reason: lexical_alternative
  - marker: b
    text: O «en el día de mal» o «en el día de calamidad».
    reason: lexical_alternative
  - marker: c
    text: O «me exaltará» o «me levantará en alto».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: La partícula introduce la razón o fundamento de la confianza expresada antes; «Porque» conserva bien ese valor explicativo en español sin forzar una conclusión excesiva.
- source_word: יִצְפְּנֵנִי
  english_pob_choice: he will hide me
  chosen_spanish: me esconderá
  alternatives_spanish:
  - me ocultará
  - me guardará oculto
  lexicon: HALOT
  rationale: צפן comunica esconder/proteger. «Me esconderá» es natural y mantiene la idea de amparo; luego «me ocultará» evita una repetición exacta en el segundo hemistiquio.
- source_word: בְּסֻכּוֹ
  english_pob_choice: in his shelter
  chosen_spanish: en su refugio
  alternatives_spanish:
  - en su cabaña
  - en su pabellón
  - en su tienda
  lexicon: HALOT
  rationale: El hebreo nombra una estructura de cobertura, pero en este contexto poético funciona como imagen de protección. «Refugio» comunica esa función sin reducirlo a un término cultual más estrecho de lo que exige el texto.
- source_word: בְּיוֹם רָעָה
  english_pob_choice: in the day of trouble
  chosen_spanish: en el día de angustia
  alternatives_spanish:
  - en el día de calamidad
  - en el día de aflicción
  - en el día de mal
  lexicon: HALOT
  rationale: רָעָה aquí apunta a adversidad o desastre, no a mal moral. «Angustia» expresa bien el sentido situacional en un español bíblico claro; por eso no se tradujo como «mal».
- source_word: יַסְתִּרֵנִי
  english_pob_choice: he will conceal me
  chosen_spanish: me ocultará
  alternatives_spanish:
  - me esconderá
  - me mantendrá oculto
  lexicon: HALOT
  rationale: סתר refuerza la idea de ocultar/proteger. «Me ocultará» conserva el paralelismo con el primer verbo sin calcarlos de forma pesada.
- source_word: בְּסֵתֶר
  english_pob_choice: in the secret place
  chosen_spanish: en lo secreto
  alternatives_spanish:
  - en el lugar secreto
  - en el escondite
  lexicon: HALOT
  rationale: El sustantivo denota un lugar oculto o secreto. «En lo secreto» mantiene la imagen locativa y suena más natural que una fórmula rígida en español.
- source_word: אָהֳלוֹ
  english_pob_choice: of his tent
  chosen_spanish: de su tienda
  alternatives_spanish:
  - de su tabernáculo
  - de su pabellón
  - de su morada
  lexicon: HALOT
  rationale: אֹהֶל es literalmente «tienda». Se conserva esa concreción, que en poesía puede sugerir cobertura y presencia sin imponer de entrada un tecnicismo eclesiástico.
- source_word: בְּצוּר
  english_pob_choice: upon a rock
  chosen_spanish: sobre una roca
  alternatives_spanish:
  - sobre un peñasco
  - en una roca
  - sobre un risco
  lexicon: HALOT
  rationale: צוּר designa roca/peñasco como lugar firme y seguro. «Sobre una roca» preserva la imagen vertical de exaltación y seguridad.
- source_word: יְרוֹמְמֵנִי
  english_pob_choice: he will lift me high
  chosen_spanish: me pondrá en alto
  alternatives_spanish:
  - me exaltará
  - me levantará en alto
  lexicon: HALOT
  rationale: רום expresa elevar/poner en alto. «Me pondrá en alto» comunica el resultado de protección y elevación con naturalidad en español; «exaltará» puede sonar más abstracto de lo que pide la imagen.
theological_decisions:
- issue: Matiz de refugio/santuario en סֻכּוֹ y אָהֳלוֹ
  english_pob_reading: Render the imagery as protective shelter and tent without making the verse explicitly about the tabernacle sanctuary.
  chosen_spanish_reading: Traducir con imágenes de refugio y tienda, sin convertir el versículo en una afirmación explícita sobre el santuario/tabernáculo.
  alternative_spanish_readings:
  - usar «tabernáculo»
  - usar «pabellón»
  - usar vocabulario cultual más explícito
  rationale: El hebreo usa sustantivos concretos de cobertura y habitación. En este contexto poético, su fuerza principal es la protección divina; por eso se evita estrechar el sentido a un marco litúrgico no exigido por el texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de רָעָה en בְּיוֹם רָעָה
  english_pob_reading: Adversity/calamity ('trouble') rather than moral evil.
  chosen_spanish_reading: Adversidad/aflicción («angustia») en lugar de mal moral.
  alternative_spanish_readings:
  - mal
  - maldad
  - calamidad
  rationale: En este verso la expresión señala un tiempo de crisis o desastre. «Angustia» transmite esa circunstancia de aflicción con claridad en español y evita introducir una connotación moral ajena al contexto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El texto inglés auditado muestra acuerdo alto y no registra revisiones aplicadas; esta propuesta mantiene ese marco y conserva las tres imágenes poéticas del hebreo: esconder, ocultar y elevar.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo la progresión verbal del hebreo con tres acciones distintas para no aplanar la paralelismo.
  - «Refugio», «lo secreto» y «tienda» se eligieron para reflejar la imaginería concreta sin introducir tecnicismos innecesarios.
