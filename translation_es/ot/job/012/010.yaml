translation:
  language: es
  text: En cuya mano está la vida de todo ser viviente[a], y el espíritu de toda la carne humana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el alma de todo ser viviente, y el espíritu de toda la carne humana».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: In whose
  chosen_spanish: En cuya
  alternatives_spanish:
  - cuyo
  - en el que está
  lexicon: HALOT
  rationale: El relativo introduce aquí una oración que se refiere a Yahvé; «en cuya» conserva la relación posesiva del hebreo y suena natural en español con el sustantivo siguiente «mano».
- source_word: בְּיָדוֹ
  english_pob_choice: in whose hand
  chosen_spanish: está ... mano
  alternatives_spanish:
  - en cuya mano
  - en su mano
  - por cuya mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para autoridad o control. En español, «en cuya mano está» preserva la metáfora de dominio sin explicar el sentido figurado.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - vida-breath
  - ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ describe la vida animada de los seres vivientes. «Vida» evita cargar el término con una antropología posterior de «alma» y mantiene el paralelismo con el término siguiente.
- source_word: כָּל חָי
  english_pob_choice: every living thing
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo lo que vive
  lexicon: HALOT
  rationale: La frase abarca a los seres vivientes en general. «Todo ser viviente» es natural en español y conserva el alcance universal de la expresión.
- source_word: וְרוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el viento
  lexicon: HALOT
  rationale: El contexto poético puede leerse como «espíritu» o como «aliento». Dado el texto base y la revisión inglesa más reciente, «espíritu» refleja mejor la decisión auditada sin perder la posibilidad de una resonancia vital.
- source_word: כָּל בְּשַׂר אִישׁ
  english_pob_choice: all human flesh
  chosen_spanish: toda carne humana
  alternatives_spanish:
  - todo ser humano
  - toda la carne del hombre
  - toda carne de hombre
  lexicon: HALOT
  rationale: La expresión hebrea combina «carne» y «hombre» para denotar la humanidad en su condición mortal. «Toda carne humana» conserva esa fuerza literal y formal mejor que una paráfrasis más suelta.
theological_decisions:
- issue: נֶפֶשׁ y רוּחַ en paralelismo antropológico
  english_pob_reading: Rendered as 'life' and 'spirit' rather than 'soul' and 'spirit.'
  chosen_spanish_reading: «vida» y «espíritu» en vez de «alma» y «espíritu».
  alternative_spanish_readings:
  - «alma» y «espíritu»
  - «vida» y «aliento»
  rationale: El versículo subraya que Yahvé tiene soberanía sobre la vida de los seres y sobre el principio vital del ser humano. Traducir נֶפֶשׁ como «alma» podría sugerir una división cuerpo-alma que el hebreo no obliga aquí; «vida» respeta mejor el paralelismo y la tensión semántica.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Referencia humana genérica en אִישׁ
  english_pob_reading: Rendered collectively as 'human flesh' / 'mankind.'
  chosen_spanish_reading: «carne humana» como colectivo genérico de la humanidad.
  alternative_spanish_readings:
  - «el hombre»
  - «los hombres»
  - «la humanidad»
  rationale: אִישׁ es masculino en forma, pero aquí funciona de manera representativa y colectiva. «Carne humana» preserva la literalidad de בְּשַׂר אִישׁ y la idea de humanidad mortal sin introducir una formulación demasiado interpretativa.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió de «breath» a «spirit» para רוּחַ y de «all mankind» a «all human flesh». La redacción española refleja esa revisión al usar «espíritu» y «carne humana», aunque deja visible en nota la alternativa léxica tradicional de «alma» para נֶפֶשׁ.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la terminología española del proyecto para el nombre divino.
  - Se evitó «SEÑOR» como máscara del nombre divino.
  - «espíritu» se reservó para רוּחַ en coherencia con la revisión auditada.
  - «carne humana» conserva la literalidad de בְּשַׂר אִישׁ sin suavizar el matiz antropológico.
