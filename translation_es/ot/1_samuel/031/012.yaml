translation:
  language: es
  text: Entonces se levantaron todos los hombres valientes y anduvieron toda la noche[a], y tomaron el cuerpo de Saúl y los cuerpos de sus hijos de la muralla de Bet-seán[b], y llegaron a Jabés y los quemaron allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cadáver» y «cadáveres». El término hebreo se refiere específicamente a cuerpos muertos.
    reason: lexical_alternative
  - marker: b
    text: Aquí «Jabés» se refiere a Jabés de Galaad en el contexto más amplio.
    reason: cross_reference
lexical_decisions:
- source_word: כָּל אִישׁ חַיִל
  english_pob_choice: all the valiant men
  chosen_spanish: todos los hombres valientes
  alternatives_spanish:
  - todos los hombres de valor
  - todos los guerreros valientes
  - todos los valientes
  lexicon: HALOT
  rationale: La expresión hebrea designa a hombres capaces y valerosos en un contexto militar. «Hombres valientes» conserva el plural masculino colectivo y su fuerza narrativa sin volverla demasiado técnica o arcaica.
- source_word: וַיָּק֜וּמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - partieron
  - se pusieron en marcha
  lexicon: HALOT
  rationale: En español, «se levantaron» comunica bien el inicio de la acción y mantiene el valor narrativo del verbo hebreo sin sonar forzado.
- source_word: וַיֵּלְכ֣וּ כָל הַּלַּיְלָה
  english_pob_choice: went all night
  chosen_spanish: fueron toda la noche
  alternatives_spanish:
  - anduvieron toda la noche
  - caminaron toda la noche
  - viajaron toda la noche
  lexicon: HALOT
  rationale: La frase indica desplazamiento continuo durante la noche. «Fueron toda la noche» es natural en español y no especifica más de lo que el hebreo dice.
- source_word: גְּוִיַּת ... גְּוִיֹּת
  english_pob_choice: the body ... the bodies
  chosen_spanish: el cuerpo ... los cuerpos
  alternatives_spanish:
  - el cadáver ... los cadáveres
  - los restos ... los restos
  lexicon: HALOT
  rationale: El hebreo se refiere específicamente a cuerpos muertos. En español, «cuerpo/cuerpos» es más sobrio y legible que «cadáver/cadáveres», aunque la referencia a un cuerpo muerto queda preservada por el contexto y la nota.
- source_word: מֵחוֹמַת
  english_pob_choice: from the wall
  chosen_spanish: de la muralla
  alternatives_spanish:
  - de la pared
  - desde la muralla
  - de la muralla de la ciudad
  lexicon: HALOT
  rationale: «Muralla» expresa mejor el elemento defensivo de una ciudad fortificada que «pared» y sigue de cerca el hebreo sin añadir información innecesaria.
- source_word: בֵּית שָׁן
  english_pob_choice: Beth-shan
  chosen_spanish: Bet-seán
  alternatives_spanish:
  - Beth-shan
  - Bet Shan
  - Beit-shean
  lexicon: HALOT
  rationale: Se conserva el topónimo en transliteración castellana estándar. «Bet-seán» es claro para lector hispanohablante y respeta la forma bíblica del nombre.
- source_word: יָבֵשָׁה
  english_pob_choice: to Jabesh
  chosen_spanish: Jabés
  alternatives_spanish:
  - Jabes
  - Jabesh-galaad
  - Jabés de Galaad
  lexicon: HALOT
  rationale: El hebreo dice simplemente «Jabesh» con dirección. «Jabés» es una transliteración castellana fluida; el contexto inmediato identifica el lugar, por lo que no es necesario expandir el nombre en el texto principal.
- source_word: וַיִּשְׂרְפ֥וּ אֹתָ֖ם שָׁם
  english_pob_choice: and burned them there
  chosen_spanish: y los quemaron allí
  alternatives_spanish:
  - y los incendiaron allí
  - y los quemaron ahí
  lexicon: HALOT
  rationale: El verbo hebreo significa simplemente «quemaron». «Los quemaron allí» reproduce de modo directo la acción y el marcador locativo sin sobreinterpretar el procedimiento.
theological_decisions:
- issue: Expresión masculina colectiva para los rescatadores
  english_pob_reading: all the valiant men
  chosen_spanish_reading: todos los hombres valientes
  alternative_spanish_readings:
  - todas las personas valientes
  - todos los valientes
  rationale: El hebreo usa formas masculinas y describe a combatientes varones. Mantener «hombres» preserva la especificidad del texto y evita una neutralización no justificada por la fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Tratamiento del término para los cuerpos muertos
  english_pob_reading: the body ... the bodies
  chosen_spanish_reading: el cuerpo ... los cuerpos
  alternative_spanish_readings:
  - el cadáver ... los cadáveres
  - los restos ... los restos
  rationale: La decisión española busca equilibrio entre fidelidad lexical y legibilidad. Aunque «גְּוִיָּה» puede equivaler a «cadáver», «cuerpo» mantiene la referencia al objeto físico sin cargar el texto de dureza adicional; la nota preserva la alternativa léxica.
  doctrine_reference: HALOT, גְּוִיָּה
- issue: Nombre de lugar con uso contextual simplificado
  english_pob_reading: Jabesh here refers to Jabesh-gilead in the broader context.
  chosen_spanish_reading: Jabés
  alternative_spanish_readings:
  - Jabés de Galaad
  - Jabes-galaad
  rationale: El hebreo de este versículo nombra solo «Jabesh». Por eso el texto principal conserva la forma breve y una nota aclara la identificación contextual con Jabés de Galaad.
  doctrine_reference: 1 Samuel 31:11–13, contexto narrativo
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y concuerda con la revisión inglesa POB de alta coincidencia; no se detectaron cambios posteriores relevantes en el audit trail, por lo que la redacción española mantiene las mismas decisiones léxicas y contextuales principales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino y la terminología bíblica según las normas del proyecto, aunque este versículo no contiene referencias directas a Yahvé o Mesías.
  - «Muralla» se usa para reflejar mejor חוֹמָה en un contexto urbano fortificado.
  - «Cuerpo/cuerpos» se eligió como equivalente principal de גְּוִיָּה, con nota de alternativa más técnica.
  - 'Se conserva la secuencia verbal narrativa con estilo natural en español: «se levantaron... fueron... tomaron... llegaron... los quemaron».'
