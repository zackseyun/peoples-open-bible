translation:
  language: es
  text: ¡Sean avergonzados todos los que odian a Sión, y retrocedan[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todos los que odian a Sión serán avergonzados y retrocederán». Los verbos hebreos también pueden leerse como una declaración futura, no solo como una petición.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: sean avergonzados
  alternatives_spanish:
  - sean puestos en vergüenza
  - sean cubiertos de vergüenza
  - se avergüencen
  lexicon: HALOT
  rationale: El verbo בוש expresa vergüenza o deshonra; en este contexto imprecatorio, el pasivo deseable en español se comunica bien con 'sean avergonzados', que conserva el valor resultativo y la fuerza de deseo/oración. 'Se avergüencen' podría sonar reflexivo y menos claramente pasivo.
- source_word: וְיִסֹּגוּ
  english_pob_choice: and turned backward
  chosen_spanish: sean echados atrás
  alternatives_spanish:
  - retrocedan
  - sean hechos retroceder
  - vuelvan atrás
  lexicon: HALOT
  rationale: El verbo sugiere retroceder, retirarse o volver atrás. 'Sean echados atrás' mantiene la idea de desplazamiento hacia atrás y armoniza con el paralelismo de la línea, sin forzar una agencia explícita que el hebreo no exige.
- source_word: אָחוֹר
  english_pob_choice: backward
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - al retroceso
  lexicon: HALOT
  rationale: 'אָחוֹר funciona como adverbio de dirección: ''atrás'' es natural en español y reproduce la relación con el verbo precedente sin introducir material adicional.'
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: El cuantificador כולל debe mantenerse de forma directa; 'todos' es la equivalencia natural en español para el grupo completo.
- source_word: שֹׂנְאֵי
  english_pob_choice: who hate
  chosen_spanish: los que odian
  alternatives_spanish:
  - los que aborrecen
  - enemigos de
  lexicon: HALOT
  rationale: 'El participio denota acción continua o caracterización: ''los que odian'' conserva el sentido relacional y es idiomático en español. ''Enemigos de'' sería más interpretativo.'
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zión
  - Sion
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico en su forma española establecida 'Sión', que es clara y reconocible para lectores en español.
theological_decisions:
- issue: Fuerza imprecatoria/jussiva de los verbos
  english_pob_reading: May all who hate Zion be put to shame and turned backward.
  chosen_spanish_reading: ¡Sean avergonzados todos los que odian a Sión, y sean echados atrás!
  alternative_spanish_readings:
  - Que todos los que odian a Sión sean avergonzados y echados atrás.
  - Todos los que odian a Sión serán avergonzados y echados atrás.
  rationale: El hebreo permite entender los yiqtol como deseo/oración o como afirmación futura. En español, la forma exhortativa/subjuntiva con '¡Sean...' preserva mejor la fuerza imprecatoria del salmo, sin eliminar la posibilidad alternativa documentada de lectura futura.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'turned back' a 'turned backward' para reflejar con más precisión אָחוֹר ('atrás/hacia atrás'). En español, 'echados atrás' conserva esa direccionalidad sin sonar forzado, y mantiene la relación paralela con 'sean avergonzados'.
  spanish_consistency_notes:
  - Se usa 'Sión' de manera consistente como nombre propio bíblico.
  - Se conserva la fuerza imprecatoria con subjuntivo exhortativo, coherente con la lectura poética/jussiva del hebreo.
  - '''Los que odian'' reproduce el participio hebreo de manera natural sin convertirlo en un sustantivo más duro o técnico.'
