  glossary_alignment: No hay conflicto con la terminología del proyecto. ‘Satanás’ es aceptable aquí por la decisión léxica documentada; no aplica el default de ‘Mesías/Cristo’ ni otros términos sensibles. El uso de ‘Yahvé’ en la nota es correcto según la política del proyecto.
