translation:
  language: es
  text: Y hicieron granadas[a] de material azul, púrpura y escarlata, torcido[b], en el dobladillo del manto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «granadas ornamentales». El hebreo dice simplemente «granadas», usando la forma del objeto como nombre.
    reason: lexical_alternative
  - marker: b
    text: El hebreo enumera material azul, púrpura y escarlata, y «torcido» describe el trabajo textil; se sobreentiende un sustantivo como «material» o «hilo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: And they made
  chosen_spanish: Y hicieron
  alternatives_spanish:
  - Y hicieron
  - Y fabricaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de עשה se vierte de forma directa como «hicieron». Mantiene el tono simple y operativo del texto, sin añadir matiz interpretativo innecesario.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: Con שׁוּלֵי הַמְּעִיל, la preposición marca ubicación física en la prenda; «sobre» conserva bien esa relación espacial en español.
- source_word: שׁוּלֵי
  english_pob_choice: the hem of
  chosen_spanish: el dobladillo de
  alternatives_spanish:
  - el borde de
  - el ribete de
  lexicon: HALOT
  rationale: El sustantivo se refiere al borde inferior de una vestidura. «Dobladillo» es la equivalencia más natural y clara en español para este contexto.
- source_word: הַמְּעִיל
  english_pob_choice: the robe
  chosen_spanish: el manto
  alternatives_spanish:
  - la túnica
  - la vestidura
  lexicon: HALOT
  rationale: מְעִיל nombra una prenda exterior; en el contexto sacerdotal, «manto» comunica bien la idea de una vestidura externa sin forzar una terminología eclesiástica tradicional.
- source_word: רִמּוֹנֵי
  english_pob_choice: pomegranates
  chosen_spanish: granadas
  alternatives_spanish:
  - granadas ornamentales
  - figuras de granada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «granadas». En español se conserva el nombre simple de la fruta, dejando la forma ornamental implícita, como hace el original.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul
  - azul violeta
  lexicon: HALOT
  rationale: Se trata del tinte/material azul característico de los textiles del santuario. «Azul» es el equivalente más directo y natural en español.
- source_word: וְאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - púrpura
  - morado
  lexicon: HALOT
  rationale: Como término de color/material de santuario, «púrpura» conserva mejor el registro y la precisión tradicional que «morado».
- source_word: וְתוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: escarlata
  alternatives_spanish:
  - escarlata
  - escarlata tejido
  - hilo escarlata
  lexicon: HALOT
  rationale: El hebreo designa material teñido de escarlata. En español, el color basta para reflejar el conjunto sin sobrecargar el texto con «hilo» cuando el versículo ya enumera los materiales por color.
- source_word: מָשְׁזָר
  english_pob_choice: twisted
  chosen_spanish: torcidas
  alternatives_spanish:
  - torcidas
  - torcidas de hilo
  - trenzadas
  lexicon: HALOT
  rationale: El participio describe la elaboración retorcida o torcida del material. «Torcidas» permite mantener el valor descriptivo del original de manera breve y comprensible.
theological_decisions:
- issue: Traducción de la prenda sacerdotal מְעִיל
  english_pob_reading: the robe
  chosen_spanish_reading: el manto
  alternative_spanish_readings:
  - la túnica
  - la vestidura
  rationale: No hay un conflicto doctrinal, pero sí una decisión terminológica. «Manto» preserva el carácter de prenda exterior y evita confundir esta vestidura con una túnica común.
  doctrine_reference: Éxodo 28–39; vestiduras sacerdotales
- issue: Tratamiento de רִמּוֹנֵי como sustantivo simple
  english_pob_reading: pomegranates
  chosen_spanish_reading: granadas
  alternative_spanish_readings:
  - granadas ornamentales
  - figuras de granada
  rationale: Se conserva la literalidad del hebreo, que nombra el adorno por su forma. Esto mantiene la tensión lexical del original entre fruta y ornamento.
  doctrine_reference: Principios de traducción lexical; Éxodo 28:33–34
- issue: Color/material en תְּכֵלֶת, אַרְגָּמָן y תּוֹלַעַת שָׁנִי
  english_pob_reading: blue, purple and scarlet yarn
  chosen_spanish_reading: azul, púrpura y escarlata
  alternative_spanish_readings:
  - azul, púrpura y escarlata
  - hilo azul, púrpura y escarlata
  rationale: El hebreo enumera materiales teñidos; el español puede dejar implícito «hilo» como en el original, evitando añadir un sustantivo no expresado aquí.
  doctrine_reference: Éxodo 39:24; comparación con la formulación del original hebreo
translation_notes:
  revision_awareness: 'Se revisó la validación previa y se corrigió el problema de anclaje: ahora los marcadores [a] y [b] aparecen exactamente en el texto español. La redacción conserva la literalidad del hebreo y al mismo tiempo hace explícita la relación entre los colores/materiales y la elaboración torcida, sin introducir «hilo» en el cuerpo del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» y la terminología eclesiástica tradicional porque no son pertinentes aquí.
  - «Granadas» refleja el sustantivo hebreo simple; la posible lectura ornamental queda en nota.
  - «Escarlata» se usa como color/material, coherente con el hebreo y con la forma en que el verso enumera textiles.
  - «Manto» y «dobladillo» son términos españoles naturales para la prenda y su borde inferior en este contexto.
