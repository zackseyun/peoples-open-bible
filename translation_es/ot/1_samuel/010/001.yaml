revisions:
- from: 'Entonces Samuel tomó el frasco de aceite, lo derramó sobre su cabeza, lo besó[a] y dijo: «¿No es que Yahvé te ha ungido como gobernante sobre su herencia?»'
  to: 'Entonces Samuel tomó el frasco de aceite, lo derramó sobre su cabeza, lo besó y dijo: «¿Acaso no te ha ungido Yahvé como gobernante[a] sobre su herencia?»'
  rationale: Se eliminó la nota interpretativa sobre «lo besó» porque el hebreo es directo y no requiere aclaración. Se reemplazó «¿No es que…?» por «¿Acaso no…?» para reflejar la fuerza retórica de הֲלוֹא כִּי con español más natural. Se añadió una nota léxica sobre «gobernante» para preservar las alternativas documentadas del inglés y el matiz de נָגִיד frente a «rey».
