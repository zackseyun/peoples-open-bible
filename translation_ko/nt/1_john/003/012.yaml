  text: 가인처럼 되지 맙시다. 그는 악한 자에게 속하였고 자기 형제를 살해하였습니다. 그러면 왜 그를 살해하였습니까? 자기 행위들은 악하였고 그의 형제의 행위들은 의로웠기 때문입니다.
