base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/031.yaml
  text: 'And this will not be a cause of grief to you or a stumbling block of heart to my lord: either that you have shed blood without cause or that my lord has avenged himself[a]. And when Yahweh has dealt well with my lord[d][c][b], then remember your servant.'
  footnotes:
  - marker: a
    text: Or 'a cause of offense' / 'an occasion for remorse'; the Hebrew term is rare and may denote something that later causes painful regret.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a stumbling block of heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by my lord saving himself'; in context the phrase refers to David taking vengeance into his own hands.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'your maidservant,' a humble self-designation used by Abigail.
    reason: lexical_alternative
