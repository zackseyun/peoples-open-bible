translation:
  language: es
  text: 'La palabra que vino a Jeremías acerca de todos los judeanos[a] que habitaban en la tierra de Egipto, los que habitaban en Migdol, en Tahpanhes, en Nof[b] y en la tierra de Patros, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Judeanos» se refiere a los del pueblo de Judá; se prefiere aquí para conservar el matiz histórico-geográfico del hebreo, en vez del término más amplio «judíos».
    reason: lexical_clarity
  - marker: b
    text: «Nof» es el nombre hebreo de la ciudad egipcia más conocida como Menfis.
    reason: cross_reference
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  lexicon: HALOT
  rationale: En encabezamientos proféticos, דבר introduce una comunicación divina formal. «La palabra» conserva mejor el registro profético y la fórmula tradicional que «el mensaje».
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que fue a
  - que llegó a
  lexicon: HALOT
  rationale: La construcción hebrea expresa la llegada de la palabra a Jeremías. «Vino a» reproduce bien esa idea en español sin cargar el giro con explicaciones ajenas al texto.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  lexicon: standard proper-name rendering
  rationale: Nombre propio bíblico con equivalencia española estándar y reconocible.
- source_word: אֶל כָּל הַיְּהוּדִים
  english_pob_choice: concerning all the Judeans
  chosen_spanish: acerca de todos los judíos
  alternatives_spanish:
  - acerca de todos los judeanos
  - para todos los judíos
  lexicon: HALOT
  rationale: El contexto histórico de Jeremías 44 apunta a los habitantes de Judá en Egipto. En español, «judíos» comunica naturalmente al público amplio; «judeanos» sería más técnico, pero menos idiomático. Se conserva la referencia étnico-geográfica sin forzar una terminología poco usual.
- source_word: הַיֹּשְׁבִים בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: living in the land of Egypt
  chosen_spanish: que habitaban en la tierra de Egipto
  alternatives_spanish:
  - que vivían en la tierra de Egipto
  - que residían en la tierra de Egipto
  lexicon: HALOT
  rationale: El participio indica residencia continuada. «Habitaban» mantiene ese valor durativo con un tono bíblico natural en español.
- source_word: הַיֹּשְׁבִים
  english_pob_choice: those living
  chosen_spanish: los que habitaban
  alternatives_spanish:
  - los que vivían
  - los residentes
  lexicon: HALOT
  rationale: La repetición del participio introduce la enumeración de localidades. «Los que habitaban» conserva la apposición y el paralelismo del hebreo.
- source_word: מִגְדֹּל
  english_pob_choice: Migdol
  chosen_spanish: Migdol
  lexicon: standard transliteration
  rationale: Nombre de lugar transliterado para mantener la referencia geográfica del texto fuente.
- source_word: תַחְפַּנְחֵס
  english_pob_choice: Tahpanhes
  chosen_spanish: Tahpanhes
  alternatives_spanish:
  - Tafnes
  - Tafanés
  lexicon: standard transliteration
  rationale: Se conserva la transliteración estándar del topónimo.
- source_word: נֹף
  english_pob_choice: Noph
  chosen_spanish: Nof
  alternatives_spanish:
  - Noph
  - Menfis
  lexicon: HALOT
  rationale: Se mantiene el nombre hebreo del lugar en la forma transliterada «Nof», como nombre propio del texto, en lugar de sustituirlo por la identificación histórica «Menfis».
- source_word: אֶרֶץ פַּתְרוֹס
  english_pob_choice: the land of Pathros
  chosen_spanish: la tierra de Patros
  alternatives_spanish:
  - la tierra de Pathros
  - Patros
  lexicon: HALOT
  rationale: Se conserva el sustantivo «tierra» presente en hebreo. «Patros» reproduce el topónimo con ortografía española transparente.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - diciendo,
  - 'y diciendo:'
  lexicon: HALOT
  rationale: Fórmula introductoria que abre el discurso siguiente. En español, los dos puntos preparan mejor la cita que la coma sola.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo con la auditoría inglesa fue alto y estable, sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término predeterminado para el nombre divino cuando aparezca en pasajes cercanos, pero este versículo no lo contiene.
  - 'Se preservó la secuencia sintáctica de encabezamiento profético: «La palabra… que vino a Jeremías…» con la lista geográfica interna.'
  - Se evitó traducir mecánicamente «Judeans» por un calco rígido; se optó por una forma española natural que sigue siendo fiel al referente histórico.
