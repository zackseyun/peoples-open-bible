review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Galaad al otro lado del Jordán, Dan reprendido por quedarse con las naves, y Aser instalado en la costa. También conserva adecuadamente el valor poético de «se sentó» para יָשַׁב. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: (1) la nota [a] está anclada al lugar equivocado, pues explica בְּעֵבֶר הַיַּרְדֵּן y no «Jordán» aislado; (2) «se detuvo junto a las naves» debilita el matiz de יָגוּר (‘morar/sojornar/residir temporalmente’) que la revisión inglesa decidió preservar con más formalidad. Además, «bahías» es posible, pero «puertos» o «ensenadas» se ajusta mejor al paralelo marítimo de מִפְרָצָיו.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad y precisión semántica. «Al otro lado del Jordán» suena bien. «Se detuvo» resulta demasiado puntual para un verbo de residencia/estancia; «moraba» o «residía» comunica mejor la permanencia reprochada. La colocación de la nota debe corregirse. «En sus bahías» es comprensible, pero «junto a sus puertos» fluye mejor en español bíblico moderno y encaja con el campo semántico costero del contexto.
  glossary_alignment: No hay términos del glosario mayor en conflicto. Los nombres propios «Galaad», «Dan» y «Aser» están bien. La revisión propuesta busca alinear más de cerca יָגוּר con la decisión POB de ‘sojourn’ y מִפְרָצָיו con la explicación de ‘harbors/inlets’.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Jordán» en vez de en la frase locativa completa.
    rationale: La alternativa «más allá del Jordán» explica בְּעֵבֶר הַיַּרְדֵּן, no solo el sustantivo «Jordán». Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase relevante.
  - severity: medium
    issue: «Se detuvo» no preserva bien el matiz de יָגוּר.
    rationale: El verbo hebreo expresa morar/sojornar/residir, no simplemente parar un momento. La auditoría inglesa revisó explícitamente a «sojourn» para acercarse más al hebreo.
  - severity: low
    issue: «Bahías» es posible, pero no es la mejor opción contextual.
    rationale: מִפְרָצָיו en este contexto marítimo apunta a puertos/ensenadas/inletos. «Puertos» comunica con más claridad el sentido probable en español actual sin sobreinterpretar.
  revised_spanish_text: Galaad permaneció [a]al otro lado del Jordán; y Dan, ¿por qué moraba entre las naves? Aser se sentó a la orilla del mar y permaneció junto a sus puertos[b].
  revised_footnotes:
