id: COL.1.10
reference: Colossians 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀περιπατῆσαι ἀξίως τοῦ κυρίου εἰς πᾶσαν ἀρεσκείαν ἐν παντὶ ἔργῳ ἀγαθῷ καρποφοροῦντες καὶ αὐξανόμενοι ⸂τῇ ἐπιγνώσει⸃ τοῦ θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/010.yaml
  text: so as to walk worthily of the Lord, to all pleasing, bearing fruit in every good work and growing in the knowledge of God,
translation:
  language: ko
  text: 곧 주께 합당하게 행하여 모든 일에서 기쁘시게 해 드리고[a], 모든 선한 일에서 열매를 맺으며 하나님을 아는 지식 안에서 자라나는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 εἰς πᾶσαν ἀρεσκείαν은 「모든 기쁘시게 함을 향하여」(목적 대상이 명시되지 않음). 문맥상 「주」를 함의로 두고 「기쁘시게 해 드리고」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιπατῆσαι
  english_pob_choice: to walk
  chosen_korean: 행하여
  alternatives_korean:
  - 살아가서
  - 걸어가서
  lexicon: BDAG
  rationale: περιπατέω의 「삶의 방식」 비유를 한국어 「행하다」로 살린다. 한국 교회 전통의 정립된 표현이다.
- source_word: ἀξίως τοῦ κυρίου
  english_pob_choice: worthily of the Lord
  chosen_korean: 주께 합당하게
  alternatives_korean:
  - 주께 합당하도록
  - 주께 마땅한 자로서
  lexicon: BDAG
  rationale: 부사 ἀξίως와 속격 τοῦ κυρίου를 「주께 합당하게」로 자연스럽게 결합한다.
- source_word: εἰς πᾶσαν ἀρεσκείαν
  english_pob_choice: to all pleasing
  chosen_korean: 모든 일에서 기쁘시게 해 드리고
  alternatives_korean:
  - 모든 기쁘게 함을 위하여
  - 어느 모로나 기쁘시게 함으로
  lexicon: BDAG
  rationale: ἀρεσκεία는 「기쁘게 함」을 의미한다. 본문은 목적어를 명시하지 않으나 문맥상 「주」가 함의된다. 한국어 자연성을 위해 「기쁘시게 해 드리고」로 옮기고, 직역 가능성은 각주로 둔다.
- source_word: ἐν παντὶ ἔργῳ ἀγαθῷ
  english_pob_choice: in every good work
  chosen_korean: 모든 선한 일에서
  alternatives_korean:
  - 모든 선한 행위로
  lexicon: BDAG
  rationale: 분배적 πᾶς를 「모든」으로, 도덕적 ἀγαθός를 「선한」으로 보존한다.
- source_word: καρποφοροῦντες
  english_pob_choice: bearing fruit
  chosen_korean: 열매를 맺으며
  alternatives_korean:
  - 결실하며
  lexicon: BDAG
  rationale: 1:6의 동일 동사와 어휘적 일관성을 유지한다.
- source_word: αὐξανόμενοι τῇ ἐπιγνώσει τοῦ θεοῦ
  english_pob_choice: growing in the knowledge of God
  chosen_korean: 하나님을 아는 지식 안에서 자라나는
  alternatives_korean:
  - 하나님에 대한 앎으로 자라나는
  - 하나님을 아는 지식으로 자라나는
  lexicon: BDAG
  rationale: 여격 τῇ ἐπιγνώσει를 영역·관계의 여격으로 본 영어 POB의 결정을 따라 「~안에서」로 옮긴다.
