  verdict: revise
  source_alignment_summary: El hebreo שְׂעִיר עִזִּים אֶחָד לְחַטָּאת significa literalmente una unidad contada de macho cabrío para una ofrenda por el pecado. El borrador acierta en el animal y en el conteo, pero 'para expiación' no preserva bien el sustantivo sacrificial חַטָּאת, que en este contexto de inventario cultual designa una ofrenda específica, no solo el resultado o efecto de expiar.
  spanish_quality_summary: '''Un macho cabrío'' es natural y claro en español bíblico moderno. En cambio, ''para expiación'' suena más abstracto y menos preciso que la fórmula sacrificial esperable en una lista de ofrendas. ''Para una ofrenda por el pecado'' mantiene fidelidad y buena legibilidad.'
  glossary_alignment: No hay términos del glosario mayor implicados salvo la necesidad de conservar la fuerza cultual de חַטָּאת. La revisión propuesta se alinea mejor con la filosofía POB y con la decisión inglesa documentada 'for a sin offering'.
  issues:
