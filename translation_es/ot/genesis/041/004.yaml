translation:
  language: es
  text: Entonces las vacas feas de aspecto y flacas de carne se comieron a las siete vacas hermosas de aspecto y gordas[a], y Faraón despertó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘malas de aspecto ... y saludables’; el hebreo usa términos que también pueden traducirse más literalmente como ‘malas’ y ‘saludables/rechonchas’, pero el contexto favorece el contraste físico de feas/flacas frente a hermosas/gordas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאכַלְנָה
  english_pob_choice: Then ... ate
  chosen_spanish: Entonces ... devoraron
  alternatives_spanish:
  - Entonces ... comieron
  - Y ... comieron
  lexicon: HALOT
  rationale: El verbo básico es ‘comer’, pero en este contexto onírico de vacas que se tragan a otras, ‘devoraron’ comunica con claridad el acto consumptivo sin añadir una interpretación ajena. ‘Entonces’ conserva la progresión narrativa del wayyiqtol.
- source_word: הַפָּרוֹת
  english_pob_choice: the cows
  chosen_spanish: las vacas
  alternatives_spanish:
  - el ganado
  lexicon: HALOT
  rationale: פָּרוֹת es plural femenino de ‘vaca’; ‘vacas’ es más preciso que ‘ganado’ y conserva la imaginería concreta del sueño.
- source_word: רָעוֹת הַמַּרְאֶה
  english_pob_choice: ugly in appearance
  chosen_spanish: feas de aspecto
  alternatives_spanish:
  - malas de aspecto
  - feas en apariencia
  lexicon: HALOT
  rationale: El hebreo usa literalmente ‘malas’ junto con ‘el aspecto’, pero el contexto visual favorece un sentido de apariencia desagradable. ‘Feas de aspecto’ mantiene la relación semántica entre la cualidad y el aspecto, sin sonar forzado en español.
- source_word: וְדַקֹּת הַבָּשָׂר
  english_pob_choice: and thin in flesh
  chosen_spanish: y flacas de carne
  alternatives_spanish:
  - y delgadas de carne
  - y enjutas
  lexicon: HALOT
  rationale: ‘Flacas’ reproduce bien la idea de delgadez corporal y ‘de carne’ conserva la imagen hebrea de בָּשָׂר. ‘Enjutas’ es posible, pero menos transparente para un lector moderno.
- source_word: יְפֹת הַמַּרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: hermosas de aspecto
  alternatives_spanish:
  - bellas de aspecto
  - hermosas en apariencia
  lexicon: HALOT
  rationale: Se preserva el paralelismo con ‘feas de aspecto’. ‘Hermosas’ es natural y digno en español, y mantiene el contraste estético del texto.
- source_word: וְהַבְּרִיאֹת
  english_pob_choice: and fat
  chosen_spanish: y gordas
  alternatives_spanish:
  - y saludables
  - y bien alimentadas
  lexicon: HALOT
  rationale: בְּרִיאֹת puede significar ‘saludables’ o ‘gordas/plump’. Aquí el contraste con ‘flacas de carne’ favorece el sentido físico concreto, por eso se traduce ‘gordas’.
- source_word: וַיִּיקַץ פַּרְעֹה
  english_pob_choice: and Pharaoh awoke
  chosen_spanish: y Faraón despertó
  alternatives_spanish:
  - y Faraón se despertó
  lexicon: HALOT
  rationale: ‘Despertó’ es breve, formal y fiel al verbo; ‘Faraón’ conserva el título bíblico tradicional en español para el gobernante egipcio.
theological_decisions:
- issue: 'Término descriptivo de las vacas en el sueño: valor físico vs. moral'
  english_pob_reading: ugly in appearance ... thin in flesh ... beautiful in appearance ... fat
  chosen_spanish_reading: feas de aspecto ... flacas de carne ... hermosas de aspecto ... gordas
  alternative_spanish_readings:
  - malas de aspecto ... delgadas de carne ... bellas de aspecto ... saludables
  rationale: No se moraliza ‘malas’ como si describiera carácter; el contexto es visual y corporal. Por eso se conserva el contraste físico y aparente, tal como el audit trail inglés lo resalta.
  doctrine_reference: Hermenéutica contextual; cuidado de evitar atribuir maldad moral donde el texto describe apariencia.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue de cerca el análisis auditado en inglés, manteniendo el paralelismo visual y la oposición corporal del sueño sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando corresponda; aquí no aparece.
  - ‘Faraón’ se conserva como título narrativo convencional y claro en español.
  - Se evita ‘cattle/ganado’ porque el hebreo y el contexto onírico especifican ‘vacas’.
  - El contraste ‘feas de aspecto / hermosas de aspecto’ preserva la simetría hebrea y el tono literario.
