- from: Y Judas dio órdenes de proclamar en el campamento que cada uno acampase en el lugar donde se encontraba[a].
  to: Y Judas dio órdenes de proclamar en el campamento que cada uno permaneciera acampado en el lugar donde se encontraba[a].
  rationale: Se ajusta «acampase» a «permaneciera acampado» para hacer explícito en español el matiz contextual de permanecer en el puesto actual, ya documentado en la auditoría inglesa. Se conserva la alternativa más literal en nota al pie y se mejora su redacción para un español más natural.
