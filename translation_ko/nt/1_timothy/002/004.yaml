id: 1TI.2.4
reference: 1 Timothy 2:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς πάντας ἀνθρώπους θέλει σωθῆναι καὶ εἰς ἐπίγνωσιν ἀληθείας ἐλθεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/004.yaml
  text: who desires all people to be saved and to come to the knowledge of the truth[a][b].
  footnotes:
  - marker: a
    text: Or 'wills all people to be saved.' The Greek verb can also be rendered 'wills' or 'wants'; 'desires' was chosen to avoid resolving theological debates beyond the wording of the text.
    reason: lexical_alternative
  - marker: b
    text: Or 'to come to full knowledge of the truth.' The noun can carry the nuance of fuller or more complete knowledge.
    reason: lexical_alternative
translation:
  language: ko
  text: 그분은 모든 사람이 구원받고 진리의 지식[b]에 이르기를 원하십니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「뜻하십니다」. 헬라어 동사 θέλω는 「뜻하다·원하다」의 폭을 가지며, 본 번역은 본문이 결정짓지 않는 신학 논쟁을 풀지 않기 위해 「원하다」를 택한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「진리에 대한 충만한 지식」. ἐπίγνωσις는 보다 완전한 인식을 함의할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντας ἀνθρώπους
  english_pob_choice: all people
  chosen_korean: 모든 사람
  alternatives_korean:
  - 모든 인류
  lexicon: BDAG
  rationale: 1절과 일관.
- source_word: θέλει σωθῆναι
  english_pob_choice: desires to be saved
  chosen_korean: 구원받기를 원하십니다
  alternatives_korean:
  - 구원받기를 뜻하십니다
  - 구원받게 되시기를 바라십니다
  lexicon: BDAG
  rationale: θέλω의 어감 폭을 「원하다」로 유지하여 신학 논쟁을 본문 차원에서 풀지 않는다.
- source_word: εἰς ἐπίγνωσιν ἀληθείας ἐλθεῖν
  english_pob_choice: to come to the knowledge of the truth
  chosen_korean: 진리의 지식에 이르기를
  alternatives_korean:
  - 진리에 대한 충만한 지식에 이르기를
  - 진리를 깨닫는 자리에 이르기를
  lexicon: BDAG
  rationale: ἐπίγνωσις의 「충만한 지식」 어감은 각주에 두고, 본문은 절제된 「진리의 지식」.
