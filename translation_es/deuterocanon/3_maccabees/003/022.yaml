  source_alignment_summary: 'El borrador refleja bien la estructura participial y el sentido general del griego: expectativa opuesta, rechazo de lo bueno por una maldad innata, y orientación continua hacia lo moralmente bajo. Sin embargo, ἀπωσάμενοι tiene una fuerza de repulsión más activa que ''apartaron'', y ἐκνεύοντες se acerca más a ''desviarse/volverse'' que a ''inclinarse'', que puede sonar demasiado débil o neutral.'
