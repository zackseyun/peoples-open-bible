  yaml_path: translation/ot/daniel/011/012.yaml
  text: And when the multitude is carried away[a], his heart will be lifted up, and he will cast down tens of thousands[c][b], but he will not prevail.
  footnotes:
  - marker: a
    text: Or 'And the multitude will be lifted up/taken away.' The Hebrew verb can be understood as 'be lifted up' or 'be carried away/removed'; the context of military defeat favors 'carried away.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his heart will be lifted up,' an idiom for becoming proud.
    reason: cultural_note
  - marker: c
    text: Or 'he will not become strong.' The Hebrew may emphasize either failure to prevail or failure to consolidate strength.
    reason: lexical_alternative
