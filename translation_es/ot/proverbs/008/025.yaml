review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura temporal paralela del hebreo y la imaginería de origen de חוֹלָלְתִּי. «Los montes fueran asentados» representa adecuadamente הָטְבָּעוּ como fijación/emplazamiento. Sin embargo, «antes de las colinas» queda elíptico de manera menos natural en español y conviene explicitar el verbo en paralelo con la primera cola para preservar mejor el sentido temporal completo del hebreo.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «antes de las colinas» suena truncado; una repetición verbal mejora la fluidez y el paralelismo poético. «Yo fui dada a luz» es comprensible, pero en español bíblico y natural suena mejor sin el pronombre expreso: «fui dada a luz». La nota al pie necesita una pequeña corrección idiomática: «fui nacida» no es español natural; «nací» o «fui dada a luz»/«fui engendrada» serían opciones mejores.'
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé o Mesías. La decisión clave חוֹלָלְתִּי está bien orientada al mantener imaginería de origen sin cargarla doctrinalmente. «Montes» y «colinas» son opciones válidas y legibles.
  issues:
  - severity: medium
    issue: La segunda cola «antes de las colinas» omite el verbo y suena poco natural en español.
    rationale: 'Aunque el hebreo permite elipsis en paralelismo poético, en español aquí resulta más claro y fiel repetir el verbo: «antes de que existieran las colinas» o similar.'
  - severity: low
    issue: El pronombre «yo» es innecesario en «yo fui dada a luz».
    rationale: El español no lo requiere y la línea fluye mejor sin esa explicitación, salvo que se busque énfasis especial no marcado en el hebreo.
  - severity: medium
    issue: La nota al pie incluye «fui nacida», que no es una alternativa idiomática en español.
    rationale: Debe reemplazarse por una opción natural como «nací»; así la nota preserva mejor las alternativas léxicas documentadas.
  revised_spanish_text: Antes que los montes fueran asentados[a], antes de que existieran las colinas, fui dada a luz.
  revised_footnotes:
  - marker: a
    text: 'O: «nací» o «fui engendrada». El hebreo usa imaginería de nacimiento/origen para la Sabiduría personificada.'
    reason: lexical_alternative
  revision_rationale: Se conserva la elección central «fui dada a luz» por su fidelidad a la imaginería de origen sin imponer una lectura doctrinal más fuerte. Se repara la segunda cola para que el paralelismo temporal sea natural y completo en español, y se corrige la nota al pie para usar alternativas idiomáticas.
