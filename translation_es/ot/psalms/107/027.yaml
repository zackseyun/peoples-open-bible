  source_alignment_summary: 'El borrador intenta seguir el hebreo y la auditoría inglesa, pero falla en puntos importantes: «Reelgan» no es español estándar y no representa bien יָחֹגּוּ para un lector común; además «como borracho» suena incompleto sin artículo en este registro, y la nota al pie está anclada al lugar equivocado, pues comenta la segunda cláusula, no el símil. La segunda cláusula sí preserva en general el sentido de חָכְמָתָם תִּתְבַּלָּע.'
  spanish_quality_summary: 'La legibilidad del español es deficiente por el neologismo/anglicismo «Reelgan». «Tambalean» también queda más natural en forma pronominal en este contexto poético: «se tambalean». «Es tragada» es comprensible, pero «es tragada por completo» no está en el texto; por tanto basta mantener la metáfora simple. La frase revisada debe sonar natural y digna.'
  glossary_alignment: No hay términos del glosario mayor en juego. «Sabiduría» alinea bien con la revisión inglesa documentada para חָכְמָה, aunque una nota puede explicar el matiz de pericia práctica/navegación. No hay problema teológico especial.
  issues:
  - severity: high
    issue: «Reelgan» no es una forma española aceptable
    rationale: Proviene de un calco del inglés «reel» y perjudica gravemente la naturalidad y comprensión. El hebreo pide un verbo de movimiento inestable; «se tambalean», «vacilan» o «dan tumbos» serían opciones naturales.
  - severity: medium
    issue: La construcción «como borracho» es poco idiomática en este registro
    rationale: En español bíblico moderno suena más natural «como un borracho» o «como un ebrio», preservando el singular comparativo hebreo.
  - severity: high
