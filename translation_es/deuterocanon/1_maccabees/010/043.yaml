translation:
  language: es
  text: Y todos los que huyan[a] al santuario en Jerusalén y en todos sus confines, debiendo impuestos reales o cualquier otra obligación, sean liberados[b], junto con todo lo que les pertenece en mi reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se refugien». El griego puede entenderse como huida hacia un lugar de asilo; la traducción mantiene «huyan» para conservar el movimiento del verbo.
    reason: lexical_alternative
  - marker: b
    text: O «queden libres». La expresión puede abarcar exención de tributos, deudas o cualquier reclamo legal.
    reason: alternative_reading
lexical_decisions:
- source_word: φύγωσιν
  english_pob_choice: flee
  chosen_spanish: huya
  alternatives_spanish:
  - escape
  - se refugie
  lexicon: LSJ
  rationale: El griego expresa huida; en español, «huya» conserva ese movimiento. En este contexto de asilo, no se pierde la idea de buscar amparo, pero se evita añadir una paráfrasis que sobrepase el verbo griego.
- source_word: ἱερὸν
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - recinto sagrado
  lexicon: LSJ
  rationale: «Santuario» comunica mejor el espacio sagrado con función de asilo, sin reducirlo solo al edificio. Mantiene la amplitud del ἱερόν señalada en la auditoría inglesa.
- source_word: ὁρίοις
  english_pob_choice: borders
  chosen_spanish: confines
  alternatives_spanish:
  - límites
  - territorio
  - fronteras
  lexicon: LSJ
  rationale: «Confines» suena natural en español y conserva la idea de límites o ámbito jurisdiccional. Evita precisar indebidamente si se trata del recinto del templo o del territorio asociado.
- source_word: ὀφείλων
  english_pob_choice: owing
  chosen_spanish: debiendo
  alternatives_spanish:
  - adeudando
  - estando obligado por
  lexicon: LSJ
  rationale: El participio indica estar bajo obligación. «Debiendo» reproduce esa condición de manera formal y mantiene abierto si la obligación es fiscal, legal o ambas.
- source_word: βασιλικὰ
  english_pob_choice: royal taxes
  chosen_spanish: impuestos reales
  alternatives_spanish:
  - tributos reales
  - dádivas reales
  lexicon: LSJ
  rationale: En este contexto fiscal, «impuestos reales» hace explícita la referencia a cargas debidas al rey. «Reales» conserva el vínculo con la corona sin oscurecer la función tributaria.
- source_word: πᾶν πρᾶγμα
  english_pob_choice: any other obligation
  chosen_spanish: cualquier otra obligación
  alternatives_spanish:
  - cualquier otro asunto
  - cualquier otra deuda
  - cualquier otro reclamo
  lexicon: LSJ
  rationale: La expresión es amplia y, según la auditoría inglesa, no debe restringirse solo a «deuda». «Obligación» mantiene la amplitud jurídica sin perder el nexo con las cargas mencionadas antes.
- source_word: ἀπολελύσθωσαν
  english_pob_choice: let them be released
  chosen_spanish: sea liberado
  alternatives_spanish:
  - queden libres
  - sean eximidos
  - sean liberados
  lexicon: LSJ
  rationale: El imperativo pasivo comunica liberación de una carga o vínculo legal. En español, «sea liberado» conserva el tono de decreto y permite entender la exención administrativa, no solo una liberación física.
- source_word: πάντα ὅσα ἐστὶν αὐτοῖς
  english_pob_choice: everything that belongs to them
  chosen_spanish: todo lo que les pertenece
  alternatives_spanish:
  - todo cuanto es suyo
  - todas sus posesiones
  lexicon: LSJ
  rationale: La frase es amplia y no conviene estrecharla demasiado. «Todo lo que les pertenece» es claro, abarca bienes y pertenencias, y respeta el alcance general del griego.
- source_word: ἐν τῇ βασιλείᾳ μου
  english_pob_choice: in my kingdom
  chosen_spanish: en mi reino
  alternatives_spanish:
  - dentro de mi reino
  - en mi dominio
  lexicon: LSJ
  rationale: «Reino» es la equivalencia directa y natural para βασιλεία en este contexto monárquico. Mantiene el marco territorial de la concesión.
theological_decisions:
- issue: Alcance del asilo y de la exención concedida por el decreto
  english_pob_reading: The decree grants release from royal taxes and other claims to those who flee to the sanctuary in Jerusalem and its associated borders.
  chosen_spanish_reading: El decreto concede liberación de impuestos reales y otras obligaciones a quienes huyan al santuario en Jerusalén y en sus confines.
  alternative_spanish_readings:
  - El decreto concede solo exención fiscal, con «cualquier otra obligación» en sentido más general.
  - «En todos sus confines» podría referirse a Jerusalén en general, no solo al santuario.
  rationale: La sintaxis vincula la huida al santuario con la liberación de las cargas descritas. Dado que ὀφείλων rige tanto βασιλικὰ como πᾶν πρᾶγμα, la lectura más natural es la remisión de obligaciones. Se mantiene un lenguaje amplio para no cerrar indebidamente el alcance administrativo de «sus confines».
  doctrine_reference: 1 Macabeos 10:43; decreto real de asilo/remisión
- issue: Naturaleza de πᾶν πρᾶγμα
  english_pob_reading: any other obligation
  chosen_spanish_reading: cualquier otra obligación
  alternative_spanish_readings:
  - cualquier otro asunto
  - cualquier otra deuda
  rationale: La revisión inglesa corrigió «debt» por «obligation» para reflejar mejor πᾶν πρᾶγμα. En español, «obligación» preserva esa amplitud y evita restringir el término a una deuda monetaria específica.
  doctrine_reference: LSJ; auditoría inglesa revisada
- issue: ἱερὸν como espacio de asilo
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - templo
  - recinto sagrado
  rationale: «Santuario» transmite tanto el carácter sagrado como la función de amparo que el texto presupone. No se fuerza la referencia a un edificio únicamente, ni se pierde la dimensión cultual.
  doctrine_reference: Uso contextual de ἱερόν
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó «debt» por «obligation» para reflejar mejor πᾶν πρᾶγμα. La redacción española sigue ese ajuste y conserva la amplitud semántica sin reducir el pasaje a una simple condonación monetaria.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino en el versículo.
  - «Santuario» se usó de forma consistente para ἱερὸν, siguiendo el valor de asilo resaltado en la auditoría.
  - «Impuestos reales» y «obligación» preservan la distinción entre βασιλικὰ y πᾶν πρᾶγμα sin fusionarlas.
  - Se evitó «siervo» o lenguaje eclesiástico no presente en el texto fuente.
  - La puntuación sigue el orden solemne del decreto griego y el estilo de POB.
