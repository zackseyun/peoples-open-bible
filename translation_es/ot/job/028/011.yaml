translation:
  language: es
  text: Él represa los manantiales de los ríos[a], y saca a la luz lo oculto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él contiene las filtraciones de los ríos»; el término hebreo traducido «manantiales» es raro y también puede evocar la idea de agua que rezuma o «llora».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּכִי
  english_pob_choice: the sources of
  chosen_spanish: los manantiales de
  alternatives_spanish:
  - los surgimientos de
  - las filtraciones de
  - las fuentes de
  lexicon: HALOT
  rationale: El hebreo es raro y en el contexto de Job 28 alude a agua que brota o se filtra. «Manantiales» comunica bien la idea de origen de agua y mantiene la imagen hidrológica sin forzar una interpretación más técnica que el español común no necesita.
- source_word: נְהָרוֹת
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - los cauces
  - las corrientes
  - los arroyos
  lexicon: HALOT
  rationale: Es el plural normal de «río». En español, «los ríos» conserva de forma clara la referencia a corrientes de agua en plural.
- source_word: חִבֵּשׁ
  english_pob_choice: dams up
  chosen_spanish: represó
  alternatives_spanish:
  - ató
  - contuvo
  - obturó
  lexicon: HALOT
  rationale: El verbo hebreo expresa sujetar o restringir; en este contexto de control de aguas, «represó» transmite de manera idiomática el efecto práctico sin perder la idea de contener el flujo.
- source_word: תַּעֲלֻמָהּ
  english_pob_choice: what is hidden
  chosen_spanish: lo oculto
  alternatives_spanish:
  - lo escondido
  - lo secreto
  - lo encubierto
  lexicon: HALOT
  rationale: El sustantivo denota algo oculto o escondido. «Lo oculto» preserva la amplitud semántica que la POB inglesa mantuvo con «what is hidden».
- source_word: יֹצִא
  english_pob_choice: brings out
  chosen_spanish: sacó a la luz
  alternatives_spanish:
  - hizo salir
  - trajo fuera
  - puso de manifiesto
  lexicon: HALOT
  rationale: La forma causativa pide la idea de hacer salir. «Sacó a la luz» encaja naturalmente con el contraste de oculto/luz y reproduce bien el movimiento verbal.
- source_word: אוֹר
  english_pob_choice: to the light
  chosen_spanish: a la luz
  alternatives_spanish:
  - a la claridad
  - en la luz
  - para la luz
  lexicon: HALOT
  rationale: La expresión española fija el mismo contraste idiomático entre ocultamiento y exposición que el hebreo y la versión inglesa.
translation_notes:
  revision_awareness: 'La versión sigue el estado revisado sin cambios del apunte inglés: se mantiene el sentido de control de aguas en contexto minero y la antítesis entre lo oculto y la luz, sin introducir lecturas adicionales no sustentadas por el texto.'
  spanish_consistency_notes:
  - Se preserva «lo oculto» para mantener la amplitud del hebreo תַּעֲלֻמָהּ y del inglés «what is hidden».
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - «Represó» se eligió por naturalidad y fuerza contextual en español, sin desplazar la imagen de contención del verbo hebreo.
