translation:
  language: es
  text: 'Solo mira esto: he encontrado que Dios hizo al hombre[a] recto, pero ellos buscaron muchas intrigas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «a la humanidad»: «Dios hizo a la humanidad recta, pero ellos buscaron muchas intrigas».'
    reason: alternative_reading
  - marker: b
    text: O «muchos planes», «muchos cálculos» o «muchos artificios» para «muchas intrigas».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: Expresa la función de limitación o resumen del hebreo de forma natural en español, sin sonar arcaico.
- source_word: רְאֵה
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - mira
  - considera
  - ve
  lexicon: HALOT
  rationale: Como imperativo de atención, 'mira' comunica la llamada directa al oyente con naturalidad en español.
- source_word: זֶה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esto solo
  - esta cosa
  lexicon: HALOT
  rationale: El demostrativo apunta a la conclusión del hablante; 'esto' conserva esa deixis sin sobreactuar.
- source_word: מָצָאתִי
  english_pob_choice: I have found
  chosen_spanish: he encontrado
  alternatives_spanish:
  - encontré
  - he hallado
  lexicon: HALOT
  rationale: El perfecto hebreo con relevancia presente se expresa bien con el pretérito perfecto compuesto en español.
- source_word: עָשָׂה ... אֶת־הָאָדָם יָשָׁר
  english_pob_choice: made man upright
  chosen_spanish: hizo al hombre recto
  alternatives_spanish:
  - hizo al ser humano recto
  - hizo a la humanidad recta
  - hizo al hombre justo
  lexicon: HALOT
  rationale: '''Recto'' conserva la fuerza ética y de integridad de יָשָׁר. Se usa ''al hombre'' para mantener el singular genérico del hebreo, con nota alternativa para ''humankind''/''ser humano''.'
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Correspondencia estándar y directa del nombre común divino en este contexto.
- source_word: וְהֵמָּה
  english_pob_choice: they
  chosen_spanish: pero ellos
  alternatives_spanish:
  - y ellos
  - mientras ellos
  lexicon: HALOT
  rationale: El contraste adversativo está implícito por el giro de la sentencia; 'pero' ayuda a reflejar la oposición entre el acto original de Dios y la búsqueda humana posterior.
- source_word: בִקְשׁוּ
  english_pob_choice: have sought out
  chosen_spanish: buscaron
  alternatives_spanish:
  - han buscado
  - se empeñaron en buscar
  lexicon: HALOT
  rationale: '''Buscaron'' expresa la acción resultante de manera clara y fiel, evitando añadir matices no explicitados en el hebreo.'
- source_word: חִשְּׁבֹנוֹת רַבִּים
  english_pob_choice: many schemes
  chosen_spanish: muchos designios
  alternatives_spanish:
  - muchos planes
  - muchos cálculos
  - muchas artimañas
  lexicon: HALOT
  rationale: '''Designios'' conserva el rango semántico de contrivances/plans/calculations y mantiene un registro bíblico claro; en español evita que ''esquemas'' suene demasiado técnico o moderno.'
theological_decisions:
- issue: Lectura genérica de הָאָדָם
  english_pob_reading: man, with footnoted alternative 'humankind'
  chosen_spanish_reading: al hombre, con alternativa 'a la humanidad'
  alternative_spanish_readings:
  - al ser humano
  - a la humanidad
  - a la gente
  rationale: El singular con artículo funciona genéricamente en hebreo para referirse a la humanidad. Se mantiene 'el hombre' como lenguaje representativo, y se preserva una alternativa en nota para evitar una lectura exclusivamente masculina en español moderno.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Relación entre la acción creadora de Dios y la desviación humana
  english_pob_reading: God made man upright, but they have sought out many schemes.
  chosen_spanish_reading: Dios hizo al hombre recto, pero ellos buscaron muchos designios.
  alternative_spanish_readings:
  - Dios hizo a la humanidad recta, pero ellos buscaron muchos designios.
  - Dios hizo al hombre recto, pero la humanidad buscó muchos designios.
  rationale: Se conserva el paralelismo entre la rectitud original otorgada por Dios y la iniciativa humana de buscar múltiples contrivances. El plural 'ellos' respeta el cambio colectivo del hebreo וְהֵמָּה sin borrar la tensión teológica entre el origen recto y la desviación posterior.
  doctrine_reference: Eclesiastés 7:29; antropología bíblica y responsabilidad humana
translation_notes:
  revision_awareness: 'La versión inglesa revisada permaneció estable en el último pase (unchanged: true) y fue considerada de alta concordancia. La única tensión relevante ya auditada es la lectura genérica de הָאָדָם y la amplitud semántica de חִשְּׁבֹנוֹת רַבִּים, ambas preservadas en español con nota.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin máscara litúrgica porque el hebreo usa הָאֱלֹהִים y no hay indicio de cita directa de YHWH.
  - '''Recto'' se usa para יָשָׁר por su valor moral y de integridad, más preciso que ''derecho'' en español bíblico contemporáneo.'
  - '''Designios'' preserva el abanico de sentidos de חִשְּׁבֹנוֹת sin reducirlo solo a ''planes'' o solo a ''cálculos''.'
  - El plural 'ellos' refleja el sujeto colectivo del hebreo y evita forzar una lectura singular en español.
  - La puntuación con dos puntos sigue la función discursiva de introducción de la conclusión del sabio.
