translation:
  language: es
  text: Pero yo te diré lo que está consignado en la escritura de la verdad[a]. Y no hay nadie que se mantenga firme conmigo contra estos, sino Miguel[b], su príncipe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo que está escrito en la escritura de la verdad.'
    reason: lexical_alternative
  - marker: b
    text: O 'que me apoya en estos asuntos'. La expresión hebrea puede significar ponerse firmemente al lado de alguien, y 'estos' puede referirse tanto a potencias hostiles como a los asuntos en discusión.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲבָל
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  lexicon: HALOT
  rationale: La partícula adversativa introduce contraste directo con lo anterior; 'Pero' es natural en español y conserva la fuerza del giro.
- source_word: אַגִּיד לְךָ
  english_pob_choice: I will tell you
  chosen_spanish: yo te diré
  alternatives_spanish:
  - yo te declararé
  - yo te haré saber
  lexicon: HALOT
  rationale: El hiphil de נגד expresa decir o dar a conocer; 'te diré' es claro y fiel, y el pronombre explícito refuerza la dirección personal del discurso.
- source_word: הָרָשׁוּם
  english_pob_choice: what is recorded
  chosen_spanish: lo que está consignado
  alternatives_spanish:
  - lo que está escrito
  - lo inscrito
  lexicon: HALOT
  rationale: El participio pasivo funciona como sustantivo y se refiere a algo oficialmente puesto por escrito; 'consignado' comunica bien la idea de registro formal sin perder el matiz de documento.
- source_word: בִּכְתָב אֱמֶת
  english_pob_choice: in the writing of truth
  chosen_spanish: en la escritura de la verdad
  alternatives_spanish:
  - en el escrito de la verdad
  - en la escritura verdadera
  lexicon: HALOT
  rationale: כְּתָב puede ser 'escritura' o 'escrito'; se eligió 'escritura' para reflejar el singular documental del hebreo y conservar la relación genitiva con אֱמֶת sin convertirla en una paráfrasis de 'libro'.
- source_word: וְאֵין אֶחָד
  english_pob_choice: there is no one
  chosen_spanish: no hay nadie
  alternatives_spanish:
  - no existe uno
  - no hay ninguno
  lexicon: HALOT
  rationale: La construcción existencial se vierte de manera natural en español con 'no hay nadie', manteniendo la negación absoluta.
- source_word: מִתְחַזֵּק עִמִּי
  english_pob_choice: who stands firmly with me
  chosen_spanish: que se mantenga firme conmigo
  alternatives_spanish:
  - que se fortalezca conmigo
  - que permanezca fuerte conmigo
  - que me apoye
  lexicon: HALOT
  rationale: El hitpael de חזק tiene un matiz reflexivo de ponerse/mostrarse fuerte; 'mantenerse firme' preserva esa idea en español y evita reducirlo simplemente a 'apoyar'.
- source_word: עַל אֵלֶּה
  english_pob_choice: against these
  chosen_spanish: contra estas cosas
  alternatives_spanish:
  - sobre estas
  - en estas cosas
  lexicon: HALOT
  rationale: En el contexto de conflicto de Daniel 10, עַל se entiende adversativamente; 'contra estas cosas' conserva la referencia abierta del hebreo, que puede abarcar potencias hostiles o los asuntos mencionados.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: HALOT
  rationale: La construcción exceptiva tras la negación se expresa naturalmente con 'sino' en español.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Micael
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio, sin alterar la identidad del referente.
- source_word: שַׂרְכֶם
  english_pob_choice: your prince
  chosen_spanish: vuestro príncipe
  alternatives_spanish:
  - vuestro jefe
  - vuestro gobernante
  - vuestro príncipe principal
  lexicon: HALOT
  rationale: שַׂר denota príncipe, jefe o gobernante; en este contexto angélico-nacional, 'príncipe' conserva el título sin añadir una precisión que el verso no explicita.
theological_decisions:
- issue: Título de Miguel y alcance del texto
  english_pob_reading: Michael is rendered as 'your prince,' preserving the text's portrayal of him as a heavenly prince associated with Daniel's people without importing later doctrinal elaboration.
  chosen_spanish_reading: Miguel, vuestro príncipe
  alternative_spanish_readings:
  - Miguel, arcángel
  - Miguel, príncipe principal
  rationale: El verso solo lo identifica como príncipe vinculado al pueblo de Daniel; se evita introducir 'arcángel' u otra formulación no presente en el hebreo, preservando la tensión interpretativa.
  doctrine_reference: Mantener la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que prefirió 'writing of truth' sobre 'book of truth' para reflejar mejor el singular hebreo כְּתָב. La redacción española evita 'libro' y usa 'escritura' para respetar ese ajuste y conservar un registro formal y publicable.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando corresponda, pero en este versículo no aparece el nombre divino.
  - Se eligió 'Miguel' como forma española del nombre propio; 'príncipe' se conservó por ser el título contextual del hebreo שַׂר.
  - '''Contra estas cosas'' conserva la ambigüedad referencial del hebreo y del audit trail: puede aludir a poderes hostiles o a los asuntos tratados.'
  - La nota a refleja la alternativa léxica principal entre 'consignado' y 'escrito', siguiendo el sentido documental del participio.
