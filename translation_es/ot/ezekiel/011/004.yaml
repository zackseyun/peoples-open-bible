  - mortal
  rationale: En Ezequiel esta expresión funciona como fórmula recurrente de llamada divina hacia el profeta, destacando su condición humana. Se conserva la forma tradicional y literal para no diluir el patrón intertextual del libro.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave; fidelidad formal cuando preserva una fórmula recurrente.'
