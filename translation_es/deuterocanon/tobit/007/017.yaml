translation:
  language: es
  text: Ten ánimo[a], hija; que el Señor del cielo y de la tierra te conceda favor[b] en lugar de esta tristeza tuya. Ten ánimo, hija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ten valor»; el griego Θάρσει es una exhortación a cobrar valor o aliento.
    reason: lexical_alternative
  - marker: b
    text: O «gracia»; χάρις puede significar «favor» o «gracia» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θάρσει
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Ánimo
  - Ten valor
  - Ten courage
  lexicon: LSJ
  rationale: El imperativo exhortativo de θαρσέω pide una expresión natural de aliento. «Ten ánimo» conserva el tono directo y animador sin sonar arcaico.
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo mío
  - hijo/a
  - niño
  lexicon: LSJ
  rationale: En este contexto de trato familiar en español, «hijo» funciona como vocativo afectuoso y breve; el siguiente «hija» muestra que τέκνον abre el saludo de manera general antes de especificarse el género.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: LSJ
  rationale: Aquí κύριος funciona como título divino en un contexto de bendición judía; «Señor» es la equivalencia española estable y reverente.
- source_word: τοῦ οὐρανοῦ καὶ τῆς γῆς
  english_pob_choice: of heaven and earth
  chosen_spanish: del cielo y de la tierra
  alternatives_spanish:
  - del cielo y la tierra
  - de los cielos y de la tierra
  lexicon: LSJ
  rationale: Se conserva el merismo bíblico habitual en español, que expresa soberanía universal sin añadir explicación.
- source_word: δῴη
  english_pob_choice: may ... grant
  chosen_spanish: te conceda
  alternatives_spanish:
  - te dé
  - te otorgue
  lexicon: LSJ
  rationale: El optativo expresa deseo o bendición; «te conceda» comunica bien la súplica benedictoria y encaja con «favor».
- source_word: σοι χάριν
  english_pob_choice: you favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  - bondad
  lexicon: LSJ
  rationale: En este contexto de bendición, χάρις puede entenderse como beneficio/gracia. Se mantiene «favor» por su claridad idiomática, sin borrar la posibilidad alternativa de «gracia».
- source_word: ἀντὶ τῆς λύπης σου ταύτης
  english_pob_choice: instead of this sorrow of yours
  chosen_spanish: en lugar de esta tu tristeza
  alternatives_spanish:
  - en vez de esta tu aflicción
  - a cambio de esta tristeza tuya
  lexicon: LSJ
  rationale: ἀντί expresa intercambio o sustitución. «En lugar de» conserva ese valor; «tu tristeza» reproduce la cercanía afectiva del posesivo.
- source_word: θύγατερ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - hija mía
  lexicon: LSJ
  rationale: Se traduce explícitamente el vocativo femenino final para marcar el cambio desde el más general τέκνον y mantener la suavidad del saludo.
theological_decisions:
- issue: cómo rendir χάρις en una bendición dirigida a Dios
  english_pob_reading: favor
  chosen_spanish_reading: favor
  alternative_spanish_readings:
  - gracia
  rationale: El contexto no es una exposición doctrinal sino una bendición familiar. «Favor» expresa mejor el beneficio gracioso pedido para la persona, mientras que «gracia» queda como posibilidad léxica reconocida pero menos precisa aquí.
  doctrine_reference: Translation philosophy §1, §6; tabla de términos controvertidos sobre χάρις
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; no se registran ajustes posteriores. La versión española sigue de cerca el griego de Swete y preserva la repetición exhortativa final.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος como título divino en un contexto judío de bendición.
  - Se conserva el merismo «cielo y tierra» por ser la fórmula bíblica natural en español.
  - Se evita endurecer τέκνον como «niño» o «hijo mío» para no añadir un matiz posesivo no explícito en el griego, pero «hijo»/«hija» conserva el tono afectuoso.
  - La nota sobre χάρις se deja abierta porque el español también admite «gracia»; se elige «favor» por claridad contextual.
