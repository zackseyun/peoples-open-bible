translation:
  language: ko
  text: 하나님의 나라를 선포하고 주 예수 메시아에 관한 일들을 가르치되, 온전한 담대함으로 거침없이 그렇게 하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦ κυρίου Ἰησοῦ Χριστοῦ
  english_pob_choice: the Lord Jesus Messiah
  chosen_korean: 주 예수 메시아
  alternatives_korean:
  - 주 예수 그리스도
  lexicon: BDAG
  rationale: '글로사리: 칭호 Χριστός→메시아; κύριος(예수)→주. 사도행전의 결론 구절이므로 정형을 보존.'
theological_decisions:
- issue: '사도행전의 열린 결말: 「거침없이」 선포되는 복음'
  chosen_reading: 온전한 담대함으로 거침없이 그렇게 하였습니다
  alternative_readings:
  - 모든 담대함으로 막힘 없이
  rationale: ἀκωλύτως(거침없이)는 본 책의 마지막 헬라어 단어로, 복음 선포가 어떤 외부 권세에도 제지되지 않음을 천명하는 신학적 결론. 한국어에서도 이 종결의 무게를 보존하여 「거침없이」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve narrative closure force'
