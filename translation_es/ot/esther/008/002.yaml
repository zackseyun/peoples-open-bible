translation:
  language: es
  text: Entonces el rey se quitó su anillo de sello, que había quitado de Hamán, y se lo dio a Mardoqueo. Y Ester puso a Mardoqueo sobre la casa de Hamán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la familia de Hamán» o «la hacienda de Hamán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - retiró
  - sacó
  lexicon: HALOT
  rationale: El hebreo en Hiphil expresa hacer que algo se aparte o se retire. En español, para un anillo que se quita de la mano, «quitó» suena natural y conserva la acción concreta mejor que una formulación más abstracta.
- source_word: טַבַּעְתּוֹ
  english_pob_choice: his signet ring
  chosen_spanish: su anillo
  alternatives_spanish:
  - su anillo de sello
  - su sello real
  lexicon: HALOT
  rationale: Aunque el contexto cortesano sugiere un anillo de autoridad, el hebreo usa literalmente «anillo». Como el texto fuente no explicita aquí la función de sello, «anillo» evita sobreespecificar; la nota mantiene la alternativa funcional.
- source_word: אֲשֶׁר הֶעֱבִיר מֵהָמָן
  english_pob_choice: which he had taken away from Haman
  chosen_spanish: que había tomado de Hamán
  alternatives_spanish:
  - que había quitado a Hamán
  - que había retirado de Hamán
  lexicon: HALOT
  rationale: הֶעֱבִיר puede significar quitar, hacer pasar o transferir. En este contexto narrativo, «había tomado de Hamán» comunica con naturalidad la confiscación y reasignación sin introducir una precisión administrativa que el hebreo no exige.
- source_word: וַיִּתְּנָהּ לְמָרְדֳּכָי
  english_pob_choice: and gave it to Mordecai
  chosen_spanish: y se lo dio a Mardoqueo
  alternatives_spanish:
  - y lo dio a Mardoqueo
  - y lo entregó a Mardoqueo
  lexicon: HALOT
  rationale: נתן es el verbo común «dar». El pronombre clítico «se lo» refleja correctamente el objeto femenino (el anillo) y mantiene la fluidez del español.
- source_word: וַתָּשֶׂם אֶסְתֵּר אֶת מָרְדֳּכַי עַל
  english_pob_choice: And Esther appointed Mordecai over
  chosen_spanish: Y Ester puso a Mardoqueo sobre
  alternatives_spanish:
  - Y Ester nombró a Mardoqueo sobre
  - Y Ester colocó a Mardoqueo sobre
  lexicon: HALOT
  rationale: שׂוּם con עַל puede significar poner, colocar o nombrar/poner en cargo. La POB inglesa eligió «appointed» para el sentido administrativo; en español, «puso sobre» conserva la imagen hebrea y la relación de autoridad sin forzar un tecnicismo ajeno al verbo base.
- source_word: בֵּית הָמָן
  english_pob_choice: the house of Haman
  chosen_spanish: la casa de Hamán
  alternatives_spanish:
  - la casa de su casa
  - el hogar de Hamán
  - la hacienda de Hamán
  lexicon: HALOT
  rationale: בַּיִת puede significar casa, casa-hogar, casa/linaje o patrimonio. «La casa de Hamán» preserva la expresión hebrea y permite el alcance de familia, casa o bienes que el contexto sugiere.
theological_decisions:
- issue: Sentido de autoridad al poner a Mardoqueo sobre la casa de Hamán
  english_pob_reading: And Esther appointed Mordecai over the house of Haman.
  chosen_spanish_reading: Y Ester puso a Mardoqueo sobre la casa de Hamán.
  alternative_spanish_readings:
  - Y Ester nombró a Mardoqueo sobre la casa de Hamán.
  - Y Ester estableció a Mardoqueo sobre la casa de Hamán.
  rationale: No se debe diluir el componente de investidura administrativa presente en el hebreo. «Puso sobre» conserva la estructura verbal concreta; el contexto de Esther 8:1-2 permite entender una asignación de autoridad sobre la propiedad y/o la administración de Hamán.
  doctrine_reference: No aplica; decisión narrativa-administrativa.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés, sin introducir añadidos explicativos fuera de lo que el contexto inmediato warrants. Se preserva la ambigüedad útil de בֵּית הָמָן mediante «casa de Hamán», mientras la nota ofrece la alternativa funcional asociada al anillo.
  spanish_consistency_notes:
  - Se usa «Hamán» y «Mardoqueo» de forma consistente en la ortografía española tradicional del libro de Ester.
  - Se mantiene «Ester» sin tilde, conforme al uso español habitual para el nombre bíblico.
  - Se conserva la relación objeto-pronombre en «se lo dio» para reflejar el femenino implícito del hebreo.
  - El verbo «puso» conserva la concreción hebrea de שׂוּם y deja abierta la interpretación administrativa sin traducirla de manera excesivamente técnica.
