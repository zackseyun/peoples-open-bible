translation:
  language: es
  text: Los profetas profetizan falsamente[a], y los sacerdotes gobiernan por su autoridad, y a mi pueblo le gusta que sea así. Pero ¿qué harán cuando llegue su fin?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los sacerdotes gobiernan bajo su dirección» o «los sacerdotes gobiernan por sus manos». La frase hebrea es difícil.'
    reason: alternative_reading
  - marker: b
    text: 'O: «¿qué harán al final de ella?». El sufijo femenino hebreo puede referirse a la situación, la tierra o la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְּאוּ בַשֶּׁקֶר
  english_pob_choice: prophesy falsely
  chosen_spanish: profetizan falsamente
  alternatives_spanish:
  - profetizan mentiras
  - profetizan por falsedad
  lexicon: HALOT
  rationale: La combinación verbal más natural y fiel en español es 'profetizan falsamente'. Conserva la acusación de falsedad sin suavizarla ni volverla una paráfrasis excesiva.
- source_word: יִרְדּוּ
  english_pob_choice: rule
  chosen_spanish: gobiernan
  alternatives_spanish:
  - rigen
  - dominan
  - ejercen dominio
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa ejercicio de poder o gobierno. 'Gobiernan' comunica bien esa función en español moderno, aunque se mantiene la nota de ambigüedad del hebreo en la frase siguiente.
- source_word: עַל יְדֵיהֶם
  english_pob_choice: by their authority
  chosen_spanish: por su autoridad
  alternatives_spanish:
  - bajo su dirección
  - por sus manos
  - según ellos
  lexicon: HALOT
  rationale: El hebreo es difícil. 'Por su autoridad' refleja una dependencia o mediación del gobierno sacerdotal respecto de los profetas, en un español idiomático, sin decidir de manera excesiva entre las posibles relaciones exactas.
- source_word: כֵן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de tal manera
  lexicon: HALOT
  rationale: '''Así'' reproduce el adverbio breve y mantiene la respuesta irónica del pueblo que aprueba esta situación.'
- source_word: לְאַחֲרִיתָהּ
  english_pob_choice: when its end comes
  chosen_spanish: cuando llegue su fin
  alternatives_spanish:
  - al final de ello
  - cuando llegue el fin de esto
  - cuando llegue su término
  lexicon: HALOT
  rationale: El sufijo femenino se conserva de forma no marcada como 'su', pues el referente puede ser la situación corrupta, la tierra o la ciudad. 'Cuando llegue su fin' mantiene la advertencia sin forzar un antecedente concreto.
- source_word: וּמַה תַּעֲשׂוּ
  english_pob_choice: But what will you do
  chosen_spanish: Pero ¿qué harán?
  alternatives_spanish:
  - ¿Y qué harán?
  - Entonces, ¿qué harán?
  - Pero ¿qué harán ustedes?
  lexicon: HALOT
  rationale: El giro retórico exige un contraste fuerte; 'Pero' conserva la fuerza adversativa. Se omite un sujeto explícito porque el contexto ya lo identifica y el español lo permite naturalmente.
theological_decisions:
- issue: Referente del sufijo femenino en לְאַחֲרִיתָהּ
  english_pob_reading: The suffix refers to the corrupt state of affairs just described, rendered impersonally as 'its end.'
  chosen_spanish_reading: 'El sufijo se vierte de manera impersonal: ''su fin''.'
  alternative_spanish_readings:
  - '''su fin'' referido a la situación corrupta'
  - '''el fin de ella'' si se entiende la ciudad o la tierra'
  - '''el fin de esto'' con referencia más abstracta'
  rationale: La advertencia culmina en el resultado de la corrupción descrita. El español puede conservar la vaguedad del hebreo con 'su fin' sin imponer un antecedente específico que el texto no explicita.
  doctrine_reference: Lectura contextual del antecedente; no afecta doctrina, sino la referencia discursiva del cierre profético.
- issue: Valor de עַל יְדֵיהֶם
  english_pob_reading: The priests rule by their authority.
  chosen_spanish_reading: Los sacerdotes gobiernan por su autoridad.
  alternative_spanish_readings:
  - los sacerdotes gobiernan bajo su dirección
  - los sacerdotes gobiernan por sus manos
  - los sacerdotes gobiernan según ellos
  rationale: 'Se mantiene la tensión textual: los sacerdotes ejercen gobierno, pero en una relación dependiente de los profetas. ''Por su autoridad'' preserva esa mediación sin resolver demasiado la frase difícil.'
  doctrine_reference: No doctrinal; es una decisión léxica sobre una construcción hebrea ambigua.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente del POB en inglés, que no introdujo cambios sustanciales tras el último pase. La redacción española conserva la tensión del hebreo difícil en עַל יְדֵיהֶם y la ambigüedad del sufijo femenino final, de acuerdo con el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'profetas'/'sacerdotes' de forma consistente con el registro bíblico en español.
  - Se prefiere 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - '''falsamente'' mantiene el paralelo adverbial directo con el hebreo.'
  - '''su fin'' conserva la ambigüedad del antecedente femenino sin sobreexplicar.'
  - La puntuación reproduce el contraste profético entre la descripción y la pregunta retórica final.
