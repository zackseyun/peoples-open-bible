revisions:
- from: Al que derrotó a reyes grandes[a], porque para siempre es su amor leal[b].
  to: Al que hirió a reyes grandes[a], porque su amor leal[b] permanece para siempre.
  rationale: Se ajusta מַכֵּה a «hirió» para evitar la sobreinterpretación de «derrotó» y se vuelve más natural el refrán con «permanece para siempre», que refleja mejor el valor durativo documentado de לְעוֹלָם חַסְדּוֹ. Se conservan las notas y la terminología teológica útil del borrador.
  reviewer_model: gpt-5.4
