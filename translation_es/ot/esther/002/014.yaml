    text: O, de manera más interpretativa, «el segundo harén». El hebreo dice literalmente «la segunda casa de las mujeres».
    reason: lexical_alternative
  - marker: b
    text: «Entrar ante el rey» reproduce un modismo hebreo para acceder a la presencia/cámara del rey; el contexto implica acceso sexual sin decirlo de manera explícita.
    reason: cultural_note
  revision_rationale: 'Se corrigieron dos puntos necesarios para fidelidad y buen español: el modismo hebreo no puede verterse como «entrar al rey», por lo que se ajustó a «entrar ante el rey»; y חָפֵץ בָּהּ se expresó como «el rey se complaciera en ella», que preserva el sentido de favor/agrado en español natural. También se armonizó la nota cultural con el texto revisado. Se mantuvo «por nombre» por su cercanía al original y su inteligibilidad en un registro bíblico digno.'
