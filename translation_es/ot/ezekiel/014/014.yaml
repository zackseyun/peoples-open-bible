translation:
  language: es
  text: aun si estos tres hombres estuvieran en medio de ella—Noé, Daniel[a] y Job—, ellos librarían solo a sí mismos por su justicia, declara el Señor Dios, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo דנאל puede también transliterarse «Danel»; algunos entienden aquí al antiguo héroe del Cercano Oriente antiguo Danel más que al Daniel bíblico.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: even if ... were
  chosen_spanish: aun si ... estuvieran
  alternatives_spanish:
  - y estuvieran
  - si ... estuvieran
  lexicon: HALOT
  rationale: En este contexto oracular de juicio, la forma verbal funciona de modo concesivo/condicional. «Aun si» comunica bien esa fuerza en español sin volver mecánica la coordinación.
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these three men
  chosen_spanish: esos tres hombres
  alternatives_spanish:
  - estos tres hombres
  - esas tres personas
  lexicon: HALOT
  rationale: El hebreo usa אֲנָשִׁים, «hombres», y se conserva el valor masculino plural. «Esos» encaja naturalmente con una referencia contextual a personas ya mencionadas en el discurso.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in its midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - en medio de ésta
  lexicon: HALOT
  rationale: La referencia femenina singular apunta al lugar bajo juicio; «en medio de ella» conserva la imagen locativa de forma clara y natural en español.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: tradicional bíblico español
  rationale: Nombre propio bíblico en su forma usual del español.
- source_word: דנאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - Danel
  lexicon: tradicional bíblico español
  rationale: Se mantiene la identificación tradicional del nombre en la línea principal; la posible lectura alternativa «Danel» se preserva en nota para no borrar la tensión textual/documental.
- source_word: וְאִיּוֹב
  english_pob_choice: and Job
  chosen_spanish: y Job
  alternatives_spanish:
  - e Job
  lexicon: tradicional bíblico español
  rationale: Conserva la coordinación simple del hebreo y el nombre bíblico estándar en español.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - éstos
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; en español queda bien representado por la estructura enfática del verso y el pronombre sujeto implícito/expreso «ellos».
- source_word: בְצִדְקָתָם
  english_pob_choice: by their righteousness
  chosen_spanish: por su justicia
  alternatives_spanish:
  - por su rectitud
  - por su justicia/rectitud
  lexicon: HALOT
  rationale: צְדָקָה puede ser «justicia» o «rectitud». Aquí se refiere a la condición moral/relacional de los tres, y «por su justicia» conserva la fuerza legal y ética del término. «Por» expresa el medio/causa instrumental.
- source_word: יְנַצְּלוּ
  english_pob_choice: would deliver
  chosen_spanish: librarían
  alternatives_spanish:
  - rescatarían
  - salvarían
  lexicon: HALOT
  rationale: נצל comunica librar/rescatar/liberar de peligro. «Librarían» funciona bien en español bíblico sin desplazar el sentido hacia una salvación más teológica que contextual.
- source_word: נַפְשָׁם
  english_pob_choice: only themselves
  chosen_spanish: solo a sí mismos
  alternatives_spanish:
  - solo sus vidas
  - únicamente a sí mismos
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí apunta a la propia vida/persona; «solo a sí mismos» conserva la exclusividad que el contexto exige y evita una literalidad menos natural.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: Se conserva el fórmula profética con «declara». YHWH se rinde como «Yahvé» según la norma del proyecto, y אֲדֹנָי + יְהוִה se formula como «el Señor Yahvé» para evitar la duplicación artificial y mantener el título compuesto.
theological_decisions:
- issue: Identificación de דנאל
  english_pob_reading: Daniel, with a note that Danel is possible
  chosen_spanish_reading: Daniel, con nota alternativa sobre Danel
  alternative_spanish_readings:
  - Danel
  rationale: La tradición bíblica española identifica naturalmente el nombre como Daniel, pero la grafía hebrea admite la discusión sobre Danel. Se preserva esa tensión en una nota sin resolverla artificialmente.
  doctrine_reference: Preservar tensión textual y lecturas alternativas cuando el hebreo las permite.
- issue: Representación del nombre divino יְהוִה en la fórmula final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: La política del proyecto exige traducir YHWH como «Yahvé». En la fórmula con אֲדֹנָי, «el Señor Yahvé» conserva el nombre divino y el título reverencial sin ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se consultó el audit trail inglés y la revisión más reciente, que no introdujo cambios. La redacción española sigue la decisión concesiva de la cláusula inicial, conserva la identificación tradicional de Noé, Daniel y Job, y mantiene la tensión documentada sobre דנאל/Danel y sobre la fórmula divina final.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme a la terminología del proyecto para el Tetragrámaton.
  - Se mantuvo el tono profético formal con «declara».
  - Se evitó «salvarían» para no cargar el verbo con un matiz soteriológico ajeno al contexto inmediato.
  - Se conservó la referencia masculina plural «hombres» por fidelidad al hebreo.
