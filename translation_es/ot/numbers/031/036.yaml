    issue: La frase 'fue en número de 337.500 ovejas' es poco idiomática en español.
    rationale: Aunque calca de cerca 'was in number', en español bíblico moderno suena forzada. 'fue, en número, 337.500 ovejas' o 'sumó 337.500 ovejas' expresa mejor מִסְפַּר sin apartarse del sentido.
  - severity: low
    issue: La nota al pie no ofrece una alternativa útil al anclaje '[a]'.
    rationale: El texto principal ya dice 'la mitad, la porción de los que salieron a la guerra'; la nota debería corresponder al valor de חֵלֶק como alternativa más idiomática, por ejemplo 'la parte de los que salieron a la guerra' o 'la parte que correspondía...'.
