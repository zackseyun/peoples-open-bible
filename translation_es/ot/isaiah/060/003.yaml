translation:
  language: es
  text: Las naciones vendrán a tu luz[a][b], y los reyes al resplandor de tu amanecer[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «irán a tu luz» o «caminarán hacia tu luz».'
    reason: lexical_alternative
  - marker: b
    text: «Naciones» también puede traducirse «gentiles» en algunos contextos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «a la radiancia de tu amanecer» o «al resplandor de tu surgir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  english_pob_choice: will come
  chosen_spanish: irán
  alternatives_spanish:
  - vendrán
  - caminarán
  - irán hacia
  lexicon: HALOT
  rationale: הלך puede significar 'andar/ir'; en este contexto de movimiento hacia un destino, el español natural 'irán' conserva la dirección sin forzar un calco. 'Vendrán' también sería posible, pero 'irán' refleja mejor la imagen de desplazamiento hacia la luz.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: גוֹיִם suele referirse a 'naciones' o 'pueblos'. 'Las naciones' sigue la decisión del POB en inglés y mantiene amplitud sin estrecharlo indebidamente a 'gentiles'.
- source_word: לְאוֹרֵךְ
  english_pob_choice: to your light
  chosen_spanish: a tu luz
  alternatives_spanish:
  - hacia tu luz
  - a la luz tuya
  lexicon: HALOT
  rationale: אור es 'luz'; el sufijo femenino singular se conserva con 'tu'. En español, 'a tu luz' reproduce la dirección de לְ con una forma natural y breve.
- source_word: וּמְלָכִים
  english_pob_choice: and kings
  chosen_spanish: y los reyes
  alternatives_spanish:
  - y reyes
  - y los gobernantes
  lexicon: HALOT
  rationale: מְלָכִים significa literalmente 'reyes'. Se conserva el artículo por fluidez española y por concordancia con el sustantivo plural definido en este contexto poético.
- source_word: לְנֹגַהּ
  english_pob_choice: to the brightness
  chosen_spanish: al resplandor
  alternatives_spanish:
  - a la brillantez
  - a la radiancia
  - a la claridad
  lexicon: HALOT
  rationale: נֹגַהּ expresa brillo, resplandor o radiación. 'Resplandor' suena natural en español bíblico contemporáneo y mantiene la cualidad luminosa sin exagerar el matiz técnico.
- source_word: זַרְחֵךְ
  english_pob_choice: of your rising
  chosen_spanish: de tu amanecer
  alternatives_spanish:
  - de tu salida
  - de tu salir
  - de tu surgimiento
  lexicon: HALOT
  rationale: De זרח, 'salir/brillar como la aurora'. 'Amanecer' capta bien la imagen poética y evita una construcción extraña como 'tu rising'; conserva la metáfora de la irrupción de la luz.
theological_decisions:
- issue: Referencia de los sufijos femeninos de segunda persona
  english_pob_reading: Addressed to Zion/Jerusalem personified as a woman
  chosen_spanish_reading: Dirigido a Sion/Jerusalén personificada como mujer
  alternative_spanish_readings:
  - Dirigido de modo más general al pueblo de Dios
  rationale: El capítulo 60 de Isaías usa de manera inmediata la personificación femenina de Sion. La traducción mantiene el 'tu' sin resolver la referencia hacia una lectura eclesiológica más amplia, preservando la tensión literaria del texto.
  doctrine_reference: Mantener la tensión literaria y referencial sin sobreinterpretar
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con el control cruzado es alto; por eso se mantiene una solución sobria, alineada con el audit trail inglés y sin introducir reajustes no motivados.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene la imagen poética sin sustituirla por una explicación interpretativa.
  - Se privilegian equivalentes españoles naturales que respetan la dirección, la persona gramatical y la metáfora luminosa del hebreo.
