    reason: lexical_alternative
  revision_rationale: Se cambia «esos hombres» por «los hombres» para evitar una especificación deíctica no expresada en el hebreo, mientras se mantiene la dirección con «hacia». Se conserva «nos mostraremos a ellos» por fidelidad al POB revisado y buen español, y se recoloca el marcador de nota en la frase exacta a la que corresponde.
