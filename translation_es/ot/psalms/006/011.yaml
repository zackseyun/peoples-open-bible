review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: dos jussivos iniciales, el intensificador מְאֹד, el sujeto ''todos mis enemigos'', el giro יָשֻׁבוּ como repliegue, la repetición de בוש, y el adverbial final de inmediatez. Sin embargo, ''muy aterrados'' suena menos idiomático en coordinación con ''queden avergonzados'' que una forma verbal plena, y ''de repente'' es fiel pero pierde un poco la puntualidad de רָגַע que el POB auditó como ''in an instant''.'
  spanish_quality_summary: 'El español es claro y digno, pero requiere un ajuste menor para mayor naturalidad y precisión rítmica: ''queden avergonzados y se aterren mucho'' evita la secuencia algo rígida ''queden avergonzados y muy aterrados''; ''en un instante'' comunica mejor la inmediatez súbita del cierre. El resto del verso lee bien en español eclesial contemporáneo.'
  glossary_alignment: No hay términos de glosario mayor implicados aparte del léxico verbal. 'Avergonzados' preserva bien בוש; 'vuelvan atrás' mantiene שוב; no hay conflicto con terminología de Yahvé/Mesías/etc. La nota alternativa debe seguir reflejando la opción pasiva 'sean avergonzados' y una alternativa para שוב.
  issues:
  - severity: medium
    issue: '''y muy aterrados'' es gramaticalmente posible pero poco natural en esta coordinación poética.'
    rationale: El hebreo tiene un segundo verbo jussivo; en español, repetir un verbo ('se aterren mucho') o usar una estructura verbal equivalente suena más fluido y conserva mejor el paralelismo verbal.
  - severity: low
    issue: '''de repente'' comunica súbitamente, pero no tan claramente la idea de ''en un instante''.'
    rationale: רָגַע fue auditado como marcador adverbial de inmediatez; 'en un instante' preserva mejor la puntualidad temporal sin perder naturalidad.
  revised_spanish_text: Queden avergonzados y se aterren mucho[a] todos mis enemigos; vuelvan atrás y queden avergonzados en un instante.
