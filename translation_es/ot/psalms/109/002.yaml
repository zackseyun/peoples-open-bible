translation:
  language: es
  text: Porque la boca del malvado y la boca del engaño han abierto contra mí[a]; me han hablado con lengua mentirosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y una boca engañosa ha abierto contra mí». El hebreo repite literalmente «boca», lo que permite tanto «la boca del engaño» como la opción más idiomática «una boca engañosa».
    reason: lexical_alternative
  - marker: b
    text: O «han hablado conmigo con una lengua de falsedad». Probablemente el sentido es habla hostil dirigida al salmista; por eso el texto principal dice «me han hablado».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del clamor del salmista con valor causal. «Porque» conserva la fuerza explicativa del hebreo y suena natural en español bíblico contemporáneo.
- source_word: פִי רָשָׁע
  english_pob_choice: the mouth of the wicked
  chosen_spanish: la boca del malvado
  alternatives_spanish:
  - la boca del impío
  - la boca del perverso
  lexicon: HALOT
  rationale: El sustantivo singular con adjetivo sustantivado se vierte de forma directa y idiomática. «Malvado» comunica el valor moral fuerte sin forzar un tecnicismo más eclesiástico.
- source_word: וּפִי מִרְמָה
  english_pob_choice: and the mouth of deceit
  chosen_spanish: y la boca del engaño
  alternatives_spanish:
  - y una boca engañosa
  - y la boca de la mentira
  lexicon: HALOT
  rationale: Se mantiene el paralelismo hebreo con la repetición de «boca». «Engaño» conserva el sustantivo abstracto de מִרְמָה y refleja el giro constructo sin convertirlo en adjetivo.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - en mi contra
  lexicon: HALOT
  rationale: Con פָּתָחוּ en contexto hostil, la lectura adversativa es la más natural en español y corresponde al sentido adoptado por la POB en inglés.
- source_word: פָּתָחוּ
  english_pob_choice: have opened
  chosen_spanish: se han abierto
  alternatives_spanish:
  - han abierto
  - fueron abiertos
  lexicon: HALOT
  rationale: El hebreo perfecto se traduce con presente perfecto para una acción concluida con relevancia actual. En español, la forma pronominal expresa de modo claro que se trata de abrir la boca para hablar.
- source_word: דִּבְּרוּ אִתִּי
  english_pob_choice: they have spoken to me
  chosen_spanish: han hablado conmigo
  alternatives_spanish:
  - me han hablado
  - han hablado contra mí
  lexicon: HALOT
  rationale: Se preserva la referencia relacional de אִתִּי sin duplicar innecesariamente la hostilidad ya expresada por עָלַי. «Conmigo» sigue la nota de la POB de que el giro probablemente alude a habla dirigida al salmista.
- source_word: לְשׁוֹן שָׁקֶר
  english_pob_choice: with a lying tongue
  chosen_spanish: con lengua mentirosa
  alternatives_spanish:
  - con una lengua de mentira
  - con lengua de falsedad
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «lengua» y el sentido de falsedad personal. «Mentirosa» es más natural que una abstracción pesada y mantiene el valor adjetival de שָׁקֶר.
translation_notes:
  revision_awareness: Se siguió el sentido y las notas del texto base en inglés sin cambios sustantivos frente al último pase; la redacción española intenta preservar el paralelismo hebreo y la ambigüedad hostil señalada por la POB.
  spanish_consistency_notes:
  - Se mantuvo «boca» dos veces para reflejar el hebreo repetido y la decisión auditada de la POB.
  - Se usó «contra mí» para עָלַי y no se duplicó esa hostilidad en la segunda cláusula, siguiendo el análisis contextual del audit trail.
  - «Con lengua mentirosa» conserva la concreción idiomática de לְשׁוֹן שָׁקֶר sin convertirlo en mero adverbio.
