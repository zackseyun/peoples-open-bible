translation:
  language: es
  text: Líbrame de mis enemigos, Dios mío; ponme en alto sobre los que se levantan contra mí.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ponme bien en alto». El hebreo también puede enfatizar la idea de ser puesto en un lugar alto e inaccesible, y por tanto protegido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Sálvame
  lexicon: HALOT
  rationale: El hiphil de נצל expresa sacar o librar de peligro. «Líbrame» comunica con naturalidad la petición de ser sacado del peligro sin cargar el verbo con un matiz soteriológico más amplio que «sálvame».
- source_word: מֵאֹיְבַי
  english_pob_choice: from my enemies
  chosen_spanish: de mis enemigos
  alternatives_spanish:
  - de los que me son hostiles
  - de quienes me adversan
  lexicon: HALOT
  rationale: 'אֹיֵב es el sustantivo común para «enemigo». La preposición marca separación: ser librado alejándolo de ellos.'
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: oh Dios mío
  alternatives_spanish:
  - mi Dios
  - Dios mío
  lexicon: HALOT
  rationale: Con el sufijo de primera persona singular, el hebreo presenta una invocación personal. «Oh Dios mío» mantiene el tono vocativo y es natural en español litúrgico y moderno.
- source_word: מִּמִתְקוֹמְמַי
  english_pob_choice: above those who rise up against me
  chosen_spanish: sobre los que se levantan contra mí
  alternatives_spanish:
  - de los que se levantan contra mí
  - por encima de los que se levantan contra mí
  - sobre mis adversarios
  lexicon: HALOT
  rationale: El participio reflexivo/intensivo de קום describe a quienes se alzan contra el hablante. En español, «los que se levantan contra mí» conserva el movimiento hostil sin simplificarlo a una mera etiqueta como «adversarios».
- source_word: תְּשַׂגְּבֵנִי
  english_pob_choice: set me on high
  chosen_spanish: ponme en alto
  alternatives_spanish:
  - ponme en alto y protégeme
  - exáltame
  - colócame en un lugar alto
  lexicon: HALOT
  rationale: שגב tiene la idea concreta de poner en un lugar alto e inaccesible, con el efecto de protección. «Ponme en alto» preserva la metáfora espacial sin añadir una explicitación innecesaria, y funciona bien con la frase siguiente.
theological_decisions:
- issue: Dirección de la metáfora de protección en relación con el enemigo
  english_pob_reading: Deliver me from my enemies; set me on high above those who rise up against me.
  chosen_spanish_reading: Líbrame de mis enemigos; ponme en alto sobre los que se levantan contra mí.
  alternative_spanish_readings:
  - Líbrame de mis enemigos; protégeme de los que se levantan contra mí.
  - Rescátame de mis enemigos; ponme a salvo sobre los que se levantan contra mí.
  rationale: La imagen hebrea une liberación y elevación. No conviene disolver la metáfora en una glosa puramente abstracta como «protégeme», aunque esa idea está implícita. «Ponme en alto» conserva la figuración de seguridad inaccesible.
  doctrine_reference: Salmo poético; preferencia por mantener la imagen bíblica sin sobreexplicarla.
- issue: Tratamiento del vocativo divino con sufijo posesivo
  english_pob_reading: my God
  chosen_spanish_reading: oh Dios mío
  alternative_spanish_readings:
  - mi Dios
  - Dios mío
  rationale: No hay tensión doctrinal; sí una cuestión de tono. El sufijo posesivo expresa apelación personal directa. «Oh Dios mío» refleja esa invocación sin sonar forzado.
  doctrine_reference: Uso devocional y poético del vocativo.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y el audit trail inglés. Se evitó trasladar mecánicamente «set me on high» como una expresión idiomática española menos transparente; se prefirió conservar la imagen espacial bíblica. También se evitó añadir «seguramente» o «con seguridad», porque el propio verbo implica la idea de refugio elevado. La traducción inglesa revisada de 'set me securely on high' a 'set me on high' confirma que la concisión es preferible.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים con vocativo posesivo, conforme al estándar del proyecto.
  - Se mantiene el lenguaje de elevación/protección sin sustituirlo por un término eclesiástico tradicional que borre la metáfora.
  - Los marcadores de nota se colocan solo donde hay una alternativa real en español.
