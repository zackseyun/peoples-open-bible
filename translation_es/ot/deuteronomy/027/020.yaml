base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/027/020.yaml
  text: Cursed is the one who lies with his father's wife[a], because he has uncovered his father's skirt. And all the people shall say[b], ‘Amen.’
  footnotes:
  - marker: a
    text: Or, 'has uncovered his father's nakedness'; the Hebrew literally says 'his father's covering,' using a sexual euphemism related to the language of Leviticus 18:8 and 20:11.
    reason: lexical_alternative
  - marker: b
    text: '''His father''s wife'' may in context refer to his stepmother, but the Hebrew does not explicitly use that term.'
    reason: lexical_alternative
