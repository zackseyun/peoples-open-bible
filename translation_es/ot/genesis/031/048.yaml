translation:
  language: es
  text: 'Y Laban dijo: «Este montón es testigo entre mí y ti hoy». Por eso lo llamó Galeed[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Galeed» suena como el hebreo para «montón de testimonio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Y ... dijo» reproduce ese movimiento de forma natural en español sin añadir matiz temporal no requerido.
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Laban
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio conforme al criterio del proyecto.
- source_word: הַגַּל
  english_pob_choice: this heap
  chosen_spanish: esta peña
  alternatives_spanish:
  - este montón
  - este túmulo
  lexicon: HALOT
  rationale: En este contexto, el término designa un montón de piedras como señal; «peña» comunica bien una masa de piedras y es natural en español bíblico sin perder el sentido material.
- source_word: עֵד
  english_pob_choice: a witness
  chosen_spanish: testigo
  alternatives_spanish:
  - un testigo
  - testimonio
  lexicon: HALOT
  rationale: La función del montón es servir como testimonio entre las partes. «Testigo» conserva el valor jurídico-covenantal y suena idiomático en español.
- source_word: בֵּינִי וּבֵינְךָ
  english_pob_choice: between me and you
  chosen_spanish: entre yo y tú
  alternatives_spanish:
  - entre mí y ti
  - entre nosotros
  lexicon: HALOT
  rationale: Se mantiene la mención explícita de las dos personas, como en el hebreo. La forma gramatical puede sonar marcada en español, pero preserva la fuerza directa del original; «entre mí y ti» sería más natural, pero aquí se prioriza la transparencia formal.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y precisa del adverbio temporal.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: HALOT
  rationale: La fórmula introduce la explicación del nombre. «Por eso» expresa de manera clara y directa la relación causal.
- source_word: קָרָא שְׁמוֹ
  english_pob_choice: he called its name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - puso su nombre
  - lo nombró
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal hebrea con una sintaxis natural en español. «Llamó su nombre» refleja de cerca el giro original y la acción de nombrar.
- source_word: גַּלְעֵד
  english_pob_choice: Galeed
  chosen_spanish: Galaad
  alternatives_spanish:
  - Galeed
  lexicon: Nombre propio / juego de palabras
  rationale: Se adopta la forma tradicional española del topónimo, suficientemente reconocible para lectura eclesial. La relación etimológica con el hebreo queda implícita en la nota.
theological_decisions:
- issue: Relación entre el montículo y el testimonio pactal
  english_pob_reading: This heap is a witness between me and you today.
  chosen_spanish_reading: Esta peña es testigo entre yo y tú hoy.
  alternative_spanish_readings:
  - Esta peña es un testigo entre mí y ti hoy
  - Esta peña sirve de testimonio entre nosotros hoy
  rationale: El texto no describe una metáfora decorativa sino un marcador de pacto o frontera testimonial. «Testigo» mantiene el valor legal-relacional sin espiritualizarlo.
  doctrine_reference: Génesis 31:48; testimonio/pacto entre partes
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y la auditoría inglesa, pero ajusta la última cláusula al español bíblico natural. En particular, se conserva la explicación causal del nombre y se mantiene el juego etimológico en nota; la forma del nombre propio se adapta a la tradición española sin borrar el vínculo con el hebreo.
  spanish_consistency_notes:
  - Se conserva el nombre divino no presente en este versículo, sin intervención.
  - Se opta por un registro bíblico claro y digno, evitando calco excesivo excepto donde la fórmula de nombrar lo justifica.
  - La secuencia narrativa se mantiene con «Y ... dijo» y «Por eso», en correspondencia con el hebreo y la auditoría inglesa.
  - La construcción «entre yo y tú» se mantiene por transparencia formal; podría leerse como marcada, pero está intencionalmente preservada como eco del hebreo.
