translation:
  language: es
  text: Entonces Jeremías el profeta dijo a Hananías el profeta delante de los sacerdotes y delante de todo el pueblo que estaban de pie en la casa de Yahvé.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante los sacerdotes y ante todo el pueblo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa de Yahvé»; es decir, el templo.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw-consecutiva avanza la narración; «Entonces» preserva esa secuencia en español con naturalidad y sin añadir contenido.
- source_word: יִרְמְיָה
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico estándar en español.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: Se conserva el título definido en ambos casos para reflejar la simetría retórica del hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: En introducción de habla directa, «a» expresa de forma natural la dirección del discurso.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hananías
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico estándar en español.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - a la vista de
  lexicon: HALOT
  rationale: La idea es pública y ante testigos; «delante de» mantiene ese matiz sin sonar tan rígido como una traducción literal de «a los ojos de».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: Equivalente directo y natural en español para el grupo sacerdotal.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo
  - toda la gente
  lexicon: HALOT
  rationale: «Pueblo» conserva mejor el sentido comunitario/covenantal que «gente».
- source_word: הָעֹמְדִים
  english_pob_choice: who were standing
  chosen_spanish: que estaba de pie
  alternatives_spanish:
  - que estaban de pie
  - de pie
  lexicon: HALOT
  rationale: La forma participial describe a los presentes; se mantiene con una construcción natural. El singular concuerda con «pueblo» como colectivo.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa de Yahvé
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se traduce בַּיִת como «casa» para preservar la expresión hebrea, y se usa «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el proyecto pide «Yahvé» en el texto principal en lugar de enmascararlo como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de בֵּית יְהוָה
  english_pob_reading: house of Yahweh
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - templo de Yahvé
  - casa del SEÑOR
  rationale: Se conserva la imagen literal de «casa», aunque el referente contextual sea el templo; esto sigue la transparencia del audit trail inglés.
  doctrine_reference: Jeremiah 28:5 lexical note on בַּיִת
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el audit trail inglés; se mantiene la lectura aprobada con agreement alto y sin cambios en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la repetición de «el profeta» para reflejar la simetría del hebreo.
  - «Delante de» reproduce la publicidad del acto y permite la alternativa textual marcada en la nota.
  - «Casa de Yahvé» preserva la imagen hebrea, con aclaración cultural sobre su referencia al templo.
