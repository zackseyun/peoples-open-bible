lexical_decisions:
- source_word: καὶ διείχετο
  english_pob_choice: And the flame spread
  chosen_spanish: Y la llama se extendía
  alternatives_spanish:
  - Y la llama se propagaba
  - Y la llama se alargaba
  lexicon: LSJ
  rationale: διείχετο describe una extensión continua; en español, «se extendía» conserva la imagen de propagación sin introducir una idea más mecánica de movimiento.
- source_word: ἡ φλὸξ
  english_pob_choice: the flame
  chosen_spanish: la llama
  alternatives_spanish:
  - el fuego
  - el resplandor
  lexicon: LSJ
  rationale: «Llama» reproduce con precisión el singular griego y mantiene la viveza visual del pasaje.
- source_word: ἐπάνω τῆς καμίνου
  english_pob_choice: above the furnace
  chosen_spanish: sobre el horno
  alternatives_spanish:
  - encima del horno
  - por encima del horno
  lexicon: LSJ
  rationale: ἐπάνω con genitivo indica posición superior; «sobre» es natural en español y conserva la relación espacial directa. «Horno» sigue la terminología del contexto para καμίνου.
- source_word: ἐπὶ πήχεις τεσσαράκοντα ἐννέα
  english_pob_choice: for forty-nine cubits
  chosen_spanish: por cuarenta y nueve codos
  alternatives_spanish:
  - a cuarenta y nueve codos
  - hasta cuarenta y nueve codos
  lexicon: LSJ
  rationale: La frase expresa la extensión de la llama. «Por» comunica mejor la medida de alcance/extensión que «a» o «hasta», y «codos» preserva la unidad antigua sin convertirla.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «to forty-nine cubits» a «for forty-nine cubits» para expresar con más naturalidad la extensión o altura indicada por el griego; el español adopta «por cuarenta y nueve codos» para reflejar esa misma función extensiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando el texto lo requiera; aquí no aparece.
  - Se conserva el término concreto «llama» en lugar de una paráfrasis como «fuego» para no debilitar la imagen griega.
  - «Codos» se deja sin conversión métrica, conforme al tratamiento del POB para unidades antiguas.
