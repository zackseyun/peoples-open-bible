translation:
  language: es
  text: Y después de golpear a Egipto, Antíoco regresó en el año ciento cuarenta y tres; y subió contra Israel y Jerusalén con una gran multitud[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una gran fuerza» o «con un gran ejército». El griego dice literalmente «con una multitud pesada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - retornó
  lexicon: BDAG
  rationale: El verbo griego expresa regreso físico tras una campaña. «Regresó» es natural en español y mantiene el valor narrativo de retorno sin sobrecargar el estilo.
- source_word: μετὰ τὸ πατάξαι
  english_pob_choice: after striking
  chosen_spanish: después de haber golpeado
  alternatives_spanish:
  - después de haber derrotado
  - después de haber herido
  lexicon: BDAG
  rationale: La construcción indica anterioridad temporal, y πατάσσω significa literalmente «golpear/derribar». «Golpeado» conserva la fuerza verbal del griego sin afirmar más de lo que el texto dice.
- source_word: Αἴγυπτον
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: nombre geográfico estándar
  rationale: Se conserva el nombre geográfico estándar en español.
- source_word: ἐν τῷ ἑκατοστῷ καὶ τεσσερακοστῷ καὶ τρίτῳ ἔτει
  english_pob_choice: in the one hundred forty-third year
  chosen_spanish: en el año ciento cuarenta y tres
  alternatives_spanish:
  - en el año 143
  lexicon: número ordinal / fórmula cronológica
  rationale: La fórmula cronológica se vierte de manera clara y cercana al griego, manteniendo el estilo histórico-secuencial del pasaje.
- source_word: ἀνέβη
  english_pob_choice: went up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - avanzó contra
  - marchó contra
  lexicon: BDAG
  rationale: ἀναβαίνω conserva la idea literal de «subir», y en contexto militar lleva un sentido hostil. «Subió contra» retiene ambos rasgos y es idiomático en español bíblico.
- source_word: ἐπὶ Ἰσραὴλ καὶ Ἱεροσόλυμα
  english_pob_choice: against Israel and Jerusalem
  chosen_spanish: contra Israel y Jerusalén
  alternatives_spanish:
  - hacia Israel y Jerusalén
  - contra la tierra de Israel y Jerusalén
  lexicon: BDAG
  rationale: Con ἐπί + acusativo en contexto militar, el valor adversativo es el más probable. Se mantiene tanto la referencia al pueblo/territorio como a la ciudad.
- source_word: ἐν ὄχλῳ βαρεῖ
  english_pob_choice: with a great multitude
  chosen_spanish: con una gran multitud
  alternatives_spanish:
  - con una multitud pesada
  - con una gran muchedumbre
  - con un gran host
  lexicon: LEH
  rationale: ὄχλος puede ser multitud, muchedumbre o masa de tropas; βαρεῖ literalmente es «pesado», pero en español «gran multitud» comunica el sentido contextual de número/fuerza sin sonar artificial. Se preserva la amplitud semántica documentada por la POB inglesa.
translation_notes:
  revision_awareness: La POB inglesa revisó «heavy multitude» a «great multitude» por naturalidad, aunque el griego conserva la imagen literal de «pesado». La versión española sigue esa revisión y mantiene en nota la alternativa más literal para no perder la tensión léxica.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma general del proyecto cuando corresponda.
  - Se mantuvo el valor militar de ἐπὶ con acusativo como «contra», en coherencia con el audit trail inglés.
  - «Gran multitud» evita introducir un término militar más específico que ὄχλος no exige explícitamente.
