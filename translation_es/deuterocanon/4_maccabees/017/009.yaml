translation:
  language: es
  text: Aquí yacen sepultados un sacerdote anciano, y una mujer anciana, y siete hijos, a causa de la violencia de un tirano, que quería abolir la vida comunitaria[a] de los hebreos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la constitución de los hebreos» u «el orden de vida de los hebreos». El término griego incluye la idea de la vida comunal ordenada de un pueblo, no solo su creencia privada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐντάφθα
  english_pob_choice: Here
  chosen_spanish: Aquí
  alternatives_spanish:
  - Aquí mismo
  - En este lugar
  lexicon: LSJ
  rationale: Adverbio deíctico de ubicación en un texto epitáfico. «Aquí» es natural en español y conserva la inmediatez del lugar de sepultura.
- source_word: γέρων ἱερεύς
  english_pob_choice: an aged priest
  chosen_spanish: un sacerdote anciano
  alternatives_spanish:
  - un sacerdote viejo
  - un sacerdote de edad avanzada
  lexicon: LSJ
  rationale: γέρων expresa vejez avanzada; «anciano» conserva dignidad funeraria mejor que «viejo». ἱερεύς se rinde con «sacerdote», el equivalente directo y claro en español.
- source_word: γυνὴ γεραιά
  english_pob_choice: an aged woman
  chosen_spanish: una mujer anciana
  alternatives_spanish:
  - una mujer vieja
  - una mujer de edad avanzada
  lexicon: LSJ
  rationale: Se mantiene el paralelismo solemne con el sintagma anterior. «Anciana» reproduce bien el tono conmemorativo.
- source_word: ἑπτὰ παῖδες
  english_pob_choice: seven children
  chosen_spanish: siete niños
  alternatives_spanish:
  - siete hijos
  - siete muchachos
  - siete hijos varones
  lexicon: LSJ
  rationale: El audito inglés revisado corrigió «sons» a «children» para reflejar παῖδες con mayor precisión. En español, «niños» conserva esa amplitud semántica; aunque en contexto narrativo se trata de los hijos de la mujer, la forma no los restringe innecesariamente a «hijos varones».
- source_word: ἐγκεκήδευνται
  english_pob_choice: lie buried
  chosen_spanish: yacen sepultados
  alternatives_spanish:
  - están sepultados
  - reposan enterrados
  lexicon: LSJ
  rationale: El perfecto pasivo describe un estado presente resultante del entierro. «Yacen sepultados» reproduce ese estado de forma idiomática y con tono de epitafio.
- source_word: διὰ τυράννου βίαν
  english_pob_choice: because of a tyrant’s violence
  chosen_spanish: a causa de la violencia de un tirano
  alternatives_spanish:
  - por la violencia de un tirano
  - a causa de la brutalidad de un tirano
  lexicon: LSJ
  rationale: διά con acusativo expresa causa; «a causa de» lo hace explícito. «Violencia» traduce βία de manera directa y sobria.
- source_word: τὴν Ἑβραίων πολιτίαν
  english_pob_choice: the commonwealth of the Hebrews
  chosen_spanish: la commonwealth de los hebreos
  alternatives_spanish:
  - la comunidad política de los hebreos
  - la constitución de los hebreos
  - el orden de vida de los hebreos
  lexicon: LSJ
  rationale: 'πολιτεία tiene un campo semántico amplio: orden cívico, constitución, vida comunitaria. Dado que el inglés POB conserva «commonwealth» para no reducirlo a una simple religión o costumbre, se mantiene ese término en cursiva/forma citada como préstamo explicativo, con una nota que aclara su sentido.'
- source_word: καταλῦσαι
  english_pob_choice: to abolish
  chosen_spanish: abolir
  alternatives_spanish:
  - destruir
  - derrocar
  - poner fin a
  lexicon: LSJ
  rationale: El infinitivo expresa el propósito del tirano respecto de la πολιτεία. «Abolir» funciona bien con objetos institucionales y preserva la fuerza política del verbo.
- source_word: θέλοντος
  english_pob_choice: who wanted
  chosen_spanish: que quería
  alternatives_spanish:
  - que deseaba
  - mientras quería
  lexicon: LSJ
  rationale: El participio genitivo modifica a «tirano» indicando intención. «Que quería» ofrece una relación clara y natural en español.
theological_decisions:
- issue: Sentido de πολιτεία en un contexto judío martirial
  english_pob_reading: the commonwealth of the Hebrews
  chosen_spanish_reading: la commonwealth de los hebreos
  alternative_spanish_readings:
  - la constitución de los hebreos
  - el orden de vida de los hebreos
  - la comunidad política de los hebreos
  rationale: En 4 Macabeos, πολιτεία no se limita a la religión privada ni a una mera norma civil aislada; alude al orden comunal, legal y pactal del pueblo. Mantener «commonwealth» conserva esa amplitud sin estrechar el sentido a una sola noción española.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tratamiento de παῖδες en el contexto de la familia de la mártir
  english_pob_reading: seven children
  chosen_spanish_reading: siete niños
  alternative_spanish_readings:
  - siete hijos
  - siete hijos varones
  rationale: El inglés revisado ya evitó una especificación de sexo. En español, «niños» es la opción más neutra y fiel al valor amplio de παῖδες, sin introducir una restricción no garantizada por el griego.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete y toma como contexto auditado la revisión inglesa que corrigió «sons» a «children» para ἑπτὰ παῖδες. También conserva la tensión interpretativa de πολιτεία sin reducirla a una sola equivalencia estrecha.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa «anciano/anciana» para el tono memorial, no «viejo/vieja», por consistencia estilística.
  - «commonwealth» se conserva como término técnico heredado del audit trail inglés para no perder el matiz político-comunitario de πολιτεία.
  - La puntuación imita el paralelismo del epitafio griego con acumulación coordinada y cierre causal-final.
