translation:
  language: es
  text: No añadas un segundo pecado,[a] porque por uno solo no quedarás sin castigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no serás absuelto» o «no quedarás limpio». El hebreo y el griego pueden expresar también un sentido forense, además de la idea de no escapar del castigo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / μὴ
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No cometas
  lexicon: HALOT; LSJ
  rationale: La prohibición directa se expresa de forma natural en español con 'No'. Mantiene el tono sapiencial exhortativo del hebreo y del griego sin añadir una perífrasis innecesaria.
- source_word: תִּקְשׁוֹר / καταδεσμεύσῃς
  english_pob_choice: add
  chosen_spanish: amontones
  alternatives_spanish:
  - atesores
  - amarres
  - ligues
  lexicon: HALOT; LSJ
  rationale: 'El hebreo y el griego literalmente dicen ''atar/ligar'', pero el audit trail inglés revisado optó por ''add sin a second time'' para captar el sentido idiomático: no repetir ni acumular pecado. En español, ''amontones'' comunica mejor la idea de añadir carga o agravar la falta, sin perder del todo la imagen de acumulación implícita.'
- source_word: לְשָׁנוֹת / δὶς
  english_pob_choice: a second time
  chosen_spanish: un segundo
  alternatives_spanish:
  - por segunda vez
  - otra vez
  - dos veces
  lexicon: HALOT; LSJ
  rationale: La expresión marca repetición. 'Un segundo' conserva la idea de una nueva ocurrencia de manera breve y natural en español, en consonancia con 'a second time' del POB inglés.
- source_word: חֵטְ / ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - ofensa
  - maldad
  lexicon: HALOT; LSJ
  rationale: '''Pecado'' es la correspondencia directa y transparente para חֵטְ y ἁμαρτίαν. Mantiene la fuerza moral y teológica del texto sapiencial.'
- source_word: בְאַחַת / ἐν γὰρ τῇ μιᾷ
  english_pob_choice: for even for one
  chosen_spanish: porque por uno solo
  alternatives_spanish:
  - porque aun por uno
  - pues por uno solo
  - porque aun en uno
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego señalan que incluso un solo caso no queda libre de consecuencias. 'Por uno solo' conserva la restricción cuantitativa y suena natural en español; 'porque' expresa la causa introducida por כִּי / γάρ.
- source_word: לֹא תִנָּקֶה / οὐκ ἀθῷος ἔσῃ
  english_pob_choice: you will not go unpunished
  chosen_spanish: no quedarás sin castigo
  alternatives_spanish:
  - no serás absuelto
  - no serás declarado inocente
  - no quedarás limpio
  lexicon: HALOT; LSJ
  rationale: La construcción hebrea y la cláusula griega pueden implicar tanto absolución forense como la idea práctica de castigo evitado o recibido. En español, 'no quedarás sin castigo' comunica con claridad la advertencia sapiencial y mantiene abierta la tensión entre quedar limpio/ser absuelto y no sufrir pena.
theological_decisions:
- issue: Tensión entre sentido forense ('ser absuelto/limpio') y penal ('quedar sin castigo') en la cláusula final
  english_pob_reading: for even for one you will not go unpunished
  chosen_spanish_reading: porque por uno solo no quedarás sin castigo
  alternative_spanish_readings:
  - porque por uno solo no serás absuelto
  - porque por uno solo no quedarás limpio
  - porque por uno solo no serás declarado inocente
  rationale: El contexto sapiencial enfatiza la consecuencia real del pecado más que un tecnicismo jurídico, pero tanto el hebreo נקה como el griego ἀθῷος permiten una lectura forense. La redacción elegida prioriza el aviso de consecuencia sin cerrar la posibilidad semántica de 'limpio/absuelto', que queda documentada en las alternativas.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Cómo reflejar la imagen verbal de 'atar/ligar' sin contradecir la revisión inglesa que adoptó 'add'
  english_pob_reading: Do not add sin a second time
  chosen_spanish_reading: No amontones un segundo pecado
  alternative_spanish_readings:
  - No añadas un segundo pecado
  - No amarres un segundo pecado
  - No cometas de nuevo pecado
  rationale: El hebreo תִּקְשׁוֹר y el griego καταδεσμεύσῃς conservan una imagen física de atadura, pero el registro final inglés interpretó esa imagen como acumulación/reiteración de pecado. En español se optó por una metáfora de acumulación ('amontones') que deja visible la idea de aumentar la falta sin perder la fuerza idiomática del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El inglés POB revisó 'bind sin a second time' a 'add sin a second time' para hacer más natural la imagen; también ajustó 'in one' a 'for one' para reflejar mejor que se trata de una sola falta. La redacción española sigue esa revisión en la idea de acumulación y en 'por uno solo', mientras conserva la advertencia sapiencial y la posible tensión forense en nota.
  spanish_consistency_notes:
  - Se usa 'pecado' para חֵטְ/ἁμαρτίαν de forma consistente con el valor moral directo del término.
  - Se evita 'SEÑOR' o vocabulario eclesiástico ajeno, porque no aparece el nombre divino en este versículo.
  - '''No quedarás sin castigo'' mantiene el matiz de consecuencia sin suprimir la posibilidad alternativa de ''ser absuelto''.'
  - La puntuación sigue la norma española con coma antes de la causal.
  - El marcador [a] está anclado en la expresión final para documentar la alternativa forense.
