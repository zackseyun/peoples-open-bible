translation:
  language: es
  text: Y el hombre prosperó muchísimo, y llegó a tener muchos rebaños, esclavas[a] y esclavos[a], camellos y asnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''siervas y siervos''. Los términos hebreos pueden traducirse más generalmente como personal de servicio doméstico, pero aquí aparecen enumerados entre las posesiones adquiridas, por lo que se eligió ''esclavas y esclavos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְרֹץ
  english_pob_choice: became exceedingly prosperous
  chosen_spanish: se enriqueció muchísimo
  alternatives_spanish:
  - prosperó enormemente
  - creció muchísimo
  - aumentó muchísimo
  lexicon: HALOT
  rationale: El hebreo literalmente sugiere 'estallar/brotar' con valor idiomático de aumento notable. En español, 'se enriqueció muchísimo' comunica el resultado económico con naturalidad y conserva la intensidad del doble מְאֹד מְאֹד sin calcar la imagen verbal.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la persona
  lexicon: HALOT
  rationale: Se mantiene el sustantivo común del hebreo sin explicitar a Jacob, como hace el POB inglés. 'El hombre' es claro y respetuoso del texto.
- source_word: מְאֹד מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: muchísimo
  alternatives_spanish:
  - en gran manera
  - excesivamente
  - muy, muy
  lexicon: HALOT
  rationale: La duplicación intensifica fuertemente. 'Muchísimo' expresa esa intensidad en español actual de forma concisa y natural.
- source_word: וַיְהִי לוֹ
  english_pob_choice: he came to have
  chosen_spanish: llegó a tener
  alternatives_spanish:
  - tuvo
  - llegó a poseer
  - llegó a contar con
  lexicon: HALOT
  rationale: La construcción de resultado/presupuesto se refleja mejor con 'llegó a tener', que conserva el desarrollo narrativo sin volverlo plano.
- source_word: צֹאן רַבּוֹת
  english_pob_choice: many flocks
  chosen_spanish: muchos rebaños
  alternatives_spanish:
  - gran cantidad de rebaños
  - mucho ganado menor
  - muchos hatos
  lexicon: HALOT
  rationale: צֹאן designa ganado menor, especialmente ovejas y cabras. 'Rebaños' es una equivalencia natural en español bíblico moderno; el plural 'muchos' sigue רַבּוֹת.
- source_word: שְׁפָחוֹת
  english_pob_choice: female slaves
  chosen_spanish: esclavas
  alternatives_spanish:
  - siervas
  - criados femeninos
  - mujeres de servicio
  lexicon: HALOT
  rationale: El POB inglés preserva la fuerza social del término como esclavitud doméstica/bondada. 'Esclavas' mantiene esa realidad mejor que 'siervas' o 'sirvientas'.
- source_word: עֲבָדִים
  english_pob_choice: male slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  - sirvientes
  lexicon: HALOT
  rationale: El masculino paralelo a שְׁפָחוֹת se traduce con el mismo valor fuerte. 'Esclavos' preserva la simetría y la carga social del texto.
- source_word: גְמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - camellos de carga
  lexicon: HALOT
  rationale: Equivalente estándar y directo en español.
- source_word: חֲמֹרִים
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - jumentos
  - caballos
  lexicon: HALOT
  rationale: '''Asnos'' es una equivalencia bíblica precisa y sobria; ''burros'' es más coloquial. Se conserva un registro digno y tradicionalmente inteligible.'
theological_decisions:
- issue: Traducir שְׁפָחוֹת / עֲבָדִים como esclavitud doméstica y no suavizar a 'siervos'
  english_pob_reading: female slaves and male slaves
  chosen_spanish_reading: esclavas y esclavos
  alternative_spanish_readings:
  - siervas y siervos
  - sirvientas y sirvientes
  - criados y criadas
  rationale: El contexto enumera bienes adquiridos de Jacob, por lo que el texto presenta una realidad de dependencia servil/bondada. Mantener 'esclavas y esclavos' evita atenuar la fuerza social del hebreo y sigue la decisión auditable del POB inglés.
  doctrine_reference: Translation philosophy §1, §5
- issue: Expresar la prosperidad como resultado de incremento material sin introducir una interpretación adicional
  english_pob_reading: became exceedingly prosperous
  chosen_spanish_reading: se enriqueció muchísimo
  alternative_spanish_readings:
  - prosperó enormemente
  - creció muchísimo
  rationale: El hebreo no añade una explicación causal; sólo describe un aumento extraordinario. 'Se enriqueció muchísimo' comunica el resultado económico implícito en el contexto inmediato sin expandir el sentido.
  doctrine_reference: HALOT; contexto narrativo de Génesis 30
translation_notes:
  revision_awareness: Tomé en cuenta el historial de revisión del POB inglés, incluyendo la oscilación entre 'servants' y 'slaves'. La decisión final del proyecto en inglés restaura 'slaves', y la redacción española sigue esa lectura para preservar la fuerza social del texto. También respeté la forma polisindética de la lista, aunque en español se hace más fluida con comas mínimas.
  spanish_consistency_notes:
  - Mantuve 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Conservé 'esclavos/esclavas' por coherencia con la política lexical documentada para δοῦλος y con el paralelo hebreo en este contexto.
  - Usé 'asnos' en lugar de 'burros' por registro bíblico más uniforme y publicación-readable.
  - La nota al pie marca sólo una alternativa relevante del verbo principal; no añadí notas innecesarias para los sustantivos ya explicados en decisiones léxicas.
