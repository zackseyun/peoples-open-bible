translation:
  language: es
  text: 'Esto es lo que harán: un tercio de ustedes, los que entran el sábado, de los sacerdotes y de los levitas, serán porteros de los umbrales[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «vigilarán los umbrales». La expresión hebrea combina «porteros/guardianes de entrada» con «umbrales», enfatizando la vigilancia de los accesos.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה הַדָּבָר אֲשֶׁר תַּעֲשׂוּ
  english_pob_choice: This is what you shall do
  chosen_spanish: Esto es lo que harán
  alternatives_spanish:
  - Esto es lo que ustedes deben hacer
  - Esto es lo que ustedes harán
  lexicon: WLC / HALOT
  rationale: La fórmula introductoria en español suena más natural con «Esto es lo que harán»; conserva el valor directivo del hebreo y del POB en inglés sin volverla rígidamente literal.
- source_word: הַשְּׁלִשִׁית
  english_pob_choice: one third
  chosen_spanish: un tercio
  alternatives_spanish:
  - la tercera parte
  - un tercio de ustedes
  lexicon: HALOT
  rationale: El hebreo expresa una porción fraccional. «Un tercio» comunica de forma clara y fiel la distribución de la tropa/turno.
- source_word: מִכֶּם
  english_pob_choice: of you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de entre ustedes
  - de vosotros
  lexicon: HALOT
  rationale: 'Se mantiene el valor partitivo del hebreo: la fracción se toma del grupo al que se habla.'
- source_word: בָּאֵי הַשַּׁבָּת
  english_pob_choice: who come in on the Sabbath
  chosen_spanish: los que entren en sábado
  alternatives_spanish:
  - los que entran en sábado
  - los que llegan en sábado
  lexicon: HALOT
  rationale: «Entrar» refleja el participio de ingreso para servicio/guardia, y «en sábado» reproduce el marco temporal sin añadir explicaciones.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  english_pob_choice: of the priests and of the Levites
  chosen_spanish: de los sacerdotes y de los levitas
  alternatives_spanish:
  - entre los sacerdotes y los levitas
  - de parte de los sacerdotes y de los levitas
  lexicon: HALOT
  rationale: Se conserva la identificación del subgrupo procedente del personal entrante. «Sacerdotes» y «levitas» son los equivalentes españoles establecidos y transparentes.
- source_word: לְשֹׁעֲרֵי הַסִּפִּים
  english_pob_choice: gatekeepers of the thresholds
  chosen_spanish: porteros de los umbrales
  alternatives_spanish:
  - guardianes de los umbrales
  - porteros de los dinteles
  lexicon: HALOT
  rationale: «שֹׁעֲרֵי» designa porteros/guardianes de acceso; «umbrales» traduce הַסִּפִּים de manera concreta y conserva la imagen de la entrada del templo. «Porteros de los umbrales» sigue la revisión inglesa que acercó más la construcción hebrea.
theological_decisions:
- issue: Función cultual de acceso y guardia en el templo
  english_pob_reading: gatekeepers of the thresholds
  chosen_spanish_reading: porteros de los umbrales
  alternative_spanish_readings:
  - guardianes de los umbrales
  - porteros de las puertas
  rationale: 'No hay cambio doctrinal, pero sí una decisión de terminología: el hebreo combina la idea de guardia de acceso con la mención concreta de los umbrales. «Porteros de los umbrales» preserva esa tensión sin suavizarla a un término más general.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa ajustó la relación sintáctica de la expresión final desde una formulación más libre a «gatekeepers of the thresholds». El español sigue esa dirección con «porteros de los umbrales», evitando una paráfrasis espacial demasiado interpretativa.
  spanish_consistency_notes:
  - Se usa «sábado» para שַּׁבָּת, manteniendo el valor calendárico del texto y el paralelismo con el POB en inglés.
  - Se prefiere «porteros» sobre «guardianes» porque reproduce mejor la función de acceso/entrada del contexto cultual y es natural en español bíblico.
  - No se introduce ningún equivalente tradicional que oculte la concreción de «umbrales»; se mantiene la imagen arquitectónica del hebreo.
