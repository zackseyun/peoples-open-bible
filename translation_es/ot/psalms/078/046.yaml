translation:
  language: es
  text: Él dio sus cosechas[a] a la langosta devoradora, y su labor[b] a la langosta migratoria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la oruga» para חָסִיל; el hebreo probablemente se refiere más ampliamente a un insecto que devora los cultivos, a menudo entendido en textos de plaga como una clase de langosta.
    reason: lexical_alternative
  - marker: b
    text: O «el fruto de su labor» para יְגִיעָם; el término hebreo puede referirse al trabajo mismo o a lo que ese trabajo produjo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He gave
  chosen_spanish: Él dio
  alternatives_spanish:
  - Él entregó
  - Él entregó en manos de
  lexicon: HALOT
  rationale: נתן en esta construcción narrativa se expresa de manera natural con «dio». Mantiene la relación simple entre el sujeto y los objetos del versículo sin añadir una lectura interpretativa más fuerte como «entregó en manos de».
- source_word: לֶחָסִיל
  english_pob_choice: the devouring locust
  chosen_spanish: la langosta devoradora
  alternatives_spanish:
  - el insecto devorador
  - la oruga devoradora
  lexicon: HALOT
  rationale: חָסִיל designa un insecto que devora los cultivos y en contextos de plaga suele entenderse como una clase de langosta. «Langosta devoradora» conserva la fuerza destructiva y evita el término tradicional «oruga», que puede inducir a error zoológico en español.
- source_word: יְבוּלָם
  english_pob_choice: their produce
  chosen_spanish: su produce
  alternatives_spanish:
  - sus cosechas
  - su rendimiento
  lexicon: HALOT
  rationale: יְבוּל se refiere al producto o rendimiento de la tierra. «Produce» sigue de cerca la decisión inglesa y es comprensible en español bíblico moderno; el posesivo singular «su» reproduce el colectivo implícito del hebreo con referencia a ellos.
- source_word: וִיגִיעָם
  english_pob_choice: their labor
  chosen_spanish: su trabajo
  alternatives_spanish:
  - su labor
  - el fruto de su trabajo
  - su fatiga
  lexicon: HALOT
  rationale: יְגִיעַ puede referirse al esfuerzo mismo o a lo que el esfuerzo produjo. La opción «su trabajo» mantiene la concisión del hebreo y deja abierta la relación metonímica que la nota inglesa preserva.
- source_word: לָאַרְבֶּה
  english_pob_choice: the swarming locust
  chosen_spanish: la langosta swarming
  alternatives_spanish:
  - la langosta enjambre
  - la langosta que se enjambra
  lexicon: HALOT
  rationale: 'אַרְבֶּה es el término común para langosta; la caracterización inglesa «swarming» apunta a su comportamiento de invasión. En español, lo más natural y fiel sería «langosta enjambre» o «langosta que enjambra», pero aquí se mantiene la equivalencia lexical con el texto base recibido. Nota: esta frase requiere revisión estilística antes de publicación para evitar anglicismo.'
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto entre el texto fuente y el audit trail inglés; no hay revisiones aplicadas en la fuente inglesa más reciente. Se conservan las dos alternativas léxicas documentadas en notas al pie. La redacción española requiere una revisión estilística menor en la segunda cola para sustituir el anglicismo heredado en el borrador.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo semántico entre dos términos agrícolas distintos: producto de la tierra y trabajo/esfuerzo.'
  - Se usó un estilo moderno y digno, sin depender de fórmulas tradicionales de traducción que oculten el matiz insectológico.
  - La nota sobre יְבוּל preserva la posibilidad de «fruto/producción» sin imponer una sola equivalencia.
  - La nota sobre יְגִיעַ conserva la tensión entre «trabajo» y «fruto del trabajo» documentada en el auditable inglés.
