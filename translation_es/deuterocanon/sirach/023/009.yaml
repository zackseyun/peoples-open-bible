translation:
  language: es
  text: No acostumbres tu boca a un juramento[a], ni te habitúes a invocar por nombre al Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te acostumbres a invocar el santo nombre». El griego ὀνομασίᾳ τοῦ ἁγίου puede entenderse como nombrar o invocar al Santo, con la idea de uso irreverente del nombre divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅρκῳ
  english_pob_choice: to an oath
  chosen_spanish: a un juramento
  alternatives_spanish:
  - a un voto
  - a jurar
  - al juramento
  lexicon: BDAG
  rationale: El dativo con ἐθίζω expresa la práctica a la que uno se acostumbra. «Juramento» preserva el sustantivo y el carácter de advertencia contra el uso habitual del jurar, con un español natural y digno.
- source_word: μὴ ἐθίσῃς
  english_pob_choice: Do not accustom
  chosen_spanish: No acostumbres
  alternatives_spanish:
  - No entrenes
  - No te acostumbres
  lexicon: LSJ
  rationale: ἐθίζω significa acostumbrar o habituar. El imperativo prohibitivo se rinde bien con «No acostumbres», conservando el matiz causativo sobre «tu boca».
- source_word: τὸ στόμα σου
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu habla
  - tu lengua
  lexicon: BDAG
  rationale: La imagen corporal es parte de la ética sapiencial del habla; «tu boca» es literal, clara y fiel al griego.
- source_word: ὀνομασίᾳ
  english_pob_choice: invoking / naming
  chosen_spanish: invocar
  alternatives_spanish:
  - nombrar
  - mencionar por nombre
  lexicon: LSJ
  rationale: El sustantivo puede referirse al acto de usar el nombre. «Invocar» comunica el uso reverente o irreverente del nombre divino en el habla, en línea con la nota auditada en inglés.
- source_word: τοῦ ἁγίου
  english_pob_choice: the Holy One
  chosen_spanish: al Santo
  alternatives_spanish:
  - al Santo Dios
  - al Santo Nombre
  - al Santo Uno
  lexicon: LSJ
  rationale: La frase probablemente alude reverencialmente a Dios como título. «El Santo» / «al Santo» mantiene ese valor sin expandir el texto a «nombre santo» en el cuerpo principal; la alternativa interpretativa queda preservada en la nota.
- source_word: μὴ συνεθισθῇς
  english_pob_choice: do not become accustomed
  chosen_spanish: ni te habitúes
  alternatives_spanish:
  - ni te acostumbres
  - ni te formes el hábito
  lexicon: LSJ
  rationale: El verbo compuesto intensifica la idea de quedar plenamente habituado. «Te habitúes» reproduce con precisión el matiz de hábito reiterado y distingue el segundo miembro del primero.
theological_decisions:
- issue: Referente de «el Santo» en un aviso sobre el habla
  english_pob_reading: Treat τοῦ ἁγίου as a reverential divine title, yielding 'the Holy One.'
  chosen_spanish_reading: 'Entender τοῦ ἁγίου como título reverencial divino: «el Santo».'
  alternative_spanish_readings:
  - «el santo nombre»
  - «lo santo»
  - «el Santo Uno»
  rationale: En contexto, el versículo advierte contra el jurar habitual y el uso irreverente del lenguaje sagrado. Traducir «el Santo» preserva el probable referente divino sin resolver de antemano la ambigüedad lexical, que se conserva en la nota.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Alcance de la prohibición
  english_pob_reading: The verse forbids habitual oath-taking and habitual invocation of God's name, not every possible solemn oath in every context.
  chosen_spanish_reading: La prohibición recae sobre la práctica habitual y descuidada, no sobre toda forma posible de juramento solemne en todo contexto.
  alternative_spanish_readings:
  - Prohibición absoluta de todo juramento
  - Solo prohibición del abuso verbal, no del juramento mismo
  rationale: La doble idea de habituarse / habituarse plenamente en el griego concentra el reproche en la repetición y la familiaridad irreverente. La redacción española mantiene ese foco sin ampliar la norma más allá de lo que dice el verso.
  doctrine_reference: Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete: dos prohibiciones paralelas con ἐθίζω / συνεθίζω. Se adoptó un español natural que conserva el paralelismo y la tensión lexical del segundo miembro. La nota reproduce la alternativa interpretativa del audit trail inglés para ὀνομασίᾳ τοῦ ἁγίου, sin borrar la ambigüedad entre nombrar e invocar.'
  spanish_consistency_notes:
  - Se usa «Santo» como título divino, coherente con la política de la POB de no ocultar el referente del nombre sagrado.
  - Se evita «SEÑOR» porque el texto griego no usa κύριος aquí.
  - «Juramento» se mantiene por la fuerza lexical del sustantivo singular, en lugar de generalizar a «jurar».
