translation:
  language: es
  text: Y la mujer dio a luz un hijo y le puso por nombre Sansón. Y el muchacho creció, y Yahvé lo bendijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: El verbo hebreo de parto narra el nacimiento de un hijo; en español, 'dio a luz' es natural, digno y fiel al sentido narrativo sin introducir rudeza ni solemnidad innecesaria.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - su mujer
  - la esposa
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'la mujer', y en este contexto remite a la esposa de Manoa. Mantener 'la mujer' conserva la forma narrativa sin añadir información.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un niño
  lexicon: HALOT
  rationale: Aquí בֵּן designa un descendiente masculino recién nacido. 'Un hijo' es natural en español y preserva el valor relacional del término.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  english_pob_choice: called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso por nombre
  - lo nombró
  lexicon: HALOT
  rationale: La fórmula hebrea es literalmente 'llamó su nombre'. En español, 'llamó su nombre' conserva mejor la estructura formal del original que 'le puso por nombre', aunque esta última sea una alternativa idiomática viable.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Samson
  lexicon: HALOT
  rationale: El nombre propio sigue la convención española tradicional 'Sansón', que es plenamente reconocible y no altera el referente.
- source_word: וַיִּגְדַּל
  english_pob_choice: grew
  chosen_spanish: creció
  alternatives_spanish:
  - fue creciendo
  - creció y se hizo grande
  lexicon: HALOT
  rationale: גדל expresa desarrollo/maduración. 'Creció' reproduce ese avance de manera breve y natural, sin sobretraducir 'se hizo grande'.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נער abarca un rango amplio; después del nacimiento, 'el muchacho' mantiene la referencia a la etapa infantil sin forzar una edad exacta.
- source_word: וַיְבָרְכֵהוּ
  english_pob_choice: blessed him
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - lo prosperó
  - lo favoreció
  lexicon: HALOT
  rationale: ברך conserva su sentido teológico de bendecir. 'Lo bendijo' es la traducción directa y adecuada; 'lo favoreció' debilita el peso religioso del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como 'Yahvé' conforme al criterio del proyecto, preservando el nombre divino propio en lugar de sustituirlo por un título.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo usa el nombre propio del pacto, no un mero título. En español, 'Yahvé' conserva esa referencia personal y sigue el criterio editorial del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: El texto inglés POB no presenta notas ni variantes en este versículo; la redacción española sigue de cerca el sentido hebreo y la decisión establecida para el nombre divino sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se mantuvo 'la mujer' para conservar la referencia inmediata del hebreo.
  - Se usó 'Sansón' como forma española estable del nombre propio.
  - Se evitó 'SEÑOR' para no ocultar el Tetragrámaton, conforme al criterio del proyecto.
  - 'La cadencia narrativa en dos oraciones refleja el paralelismo del hebreo: nacimiento, nombramiento, crecimiento y bendición.'
