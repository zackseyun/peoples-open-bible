translation:
  language: es
  text: Hice del saco mi ropa[a], y llegué a ser para ellos objeto de burla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi vestidura'.
    reason: lexical_alternative
  - marker: b
    text: O 'un proverbio' o 'un refrán'; el hebreo también puede referirse a un dicho proverbial, pero aquí el contexto de escarnio favorece el sentido de objeto de burla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה
  english_pob_choice: I made
  chosen_spanish: Puse
  alternatives_spanish:
  - Hice
  - Puse como
  lexicon: HALOT
  rationale: נתן puede significar 'dar', 'poner' o 'hacer/convertir' según el complemento. Con 'mi ropa' y 'saco' en función predicativa, en español natural 'puse' comunica que el salmista se vistió de saco como atuendo de duelo, sin perder la fuerza intencional del verbo.
- source_word: לְבוּשִׁי
  english_pob_choice: my clothing
  chosen_spanish: mi ropa
  alternatives_spanish:
  - mi vestidura
  - mi vestimenta
  lexicon: HALOT
  rationale: El término hebreo se refiere a lo que se lleva puesto. 'Mi ropa' es claro, idiomático y suficientemente cercano al valor posesivo y concreto del original.
- source_word: שָׂק
  english_pob_choice: sackcloth
  chosen_spanish: saco
  alternatives_spanish:
  - tela áspera
  - cilicio
  lexicon: HALOT
  rationale: En español bíblico 'saco' transmite el material/vestimenta de duelo con menos tecnicismo que 'cilicio', que puede sugerir penitencia posterior. Se mantiene la connotación de luto y humillación.
- source_word: וָאֱהִי
  english_pob_choice: I became
  chosen_spanish: llegué a ser
  alternatives_spanish:
  - fui
  - me volví
  lexicon: HALOT
  rationale: היה aquí describe un estado resultante. 'Llegué a ser' conserva el cambio de condición y evita una lectura meramente copulativa.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - ante ellos
  - a ellos
  lexicon: HALOT
  rationale: La relación marcada por la preposición se expresa bien con 'para ellos' en español, indicando la orientación del desprecio hacia los observadores.
- source_word: לְמָשָׁל
  english_pob_choice: a byword
  chosen_spanish: un [a]
  alternatives_spanish:
  - un proverbio
  - una burla
  lexicon: HALOT
  rationale: El contexto de lamento y escarnio favorece 'byword'/'objeto de burla' sobre el sentido neutral de 'proverbio'. En español, para no suavizar la carga negativa, se deja un marcador de nota en el texto y se explicita la alternativa semántica en la nota.
theological_decisions:
- issue: Sentido de מָשָׁל en contexto de vergüenza pública
  english_pob_reading: a byword / a proverb with mockery implied
  chosen_spanish_reading: un objeto de burla / un dicho proverbial despectivo
  alternative_spanish_readings:
  - un proverbio
  - una burla
  rationale: El hebreo puede abarcar 'proverbio', pero aquí el paralelismo con el desprecio recibido muestra que el sentido principal es el de alguien citado como ejemplo de vergüenza. La redacción evita neutralizar el escarnio.
  doctrine_reference: Salmo de lamentación; lenguaje de aflicción y oprobio
- issue: Valor resultativo de היה
  english_pob_reading: I became
  chosen_spanish_reading: llegué a ser
  alternative_spanish_readings:
  - fui
  - me convertí
  rationale: La forma verbal expresa un cambio de condición, no solo estado estático. La traducción mantiene esa progresión experiencial.
  doctrine_reference: Hebreo narrativo/poético
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente que corrigió la tendencia a 'proverbio' como lectura principal. En español se evitó esa neutralización y se optó por una formulación que conserve el sentido de escarnio del contexto, dejando la alternativa semántica en nota.
  spanish_consistency_notes:
  - Se usó 'saco' para שָׂק por consistencia con la vestimenta de duelo bíblica y para evitar el tecnicismo de 'cilicio' si no se especifica penitencia ascética.
  - Se evitó 'SEÑOR' porque el verso no contiene el nombre divino.
  - Se mantuvo un registro sobrio y poético, adecuado al paralelismo hebreo.
  - La nota [a] está anclada al segmento final para señalar la ambigüedad de מָשָׁל sin sobrecargar el texto principal.
