translation:
  language: es
  text: 'Presentó su ofrenda: un plato[a] de plata, que pesaba ciento treinta siclos; un cuenco[b] de plata, de setenta siclos, según el siclo del santuario[c]; ambos llenos de flor de harina mezclada con aceite, para una ofrenda de grano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘fuente de plata’ para ‘plato de plata’ (קַעֲרַת כֶּסֶף).
    reason: lexical_alternative
  - marker: b
    text: O ‘tazón’ para ‘cuenco’ (מִזְרָק).
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘según el siclo del santuario’, indicando la medida sagrada estándar de peso.'
    reason: cultural_note
lexical_decisions:
- source_word: הִקְרִב
  english_pob_choice: presented
  chosen_spanish: presentó
  alternatives_spanish:
  - ofreció
  - llevó
  lexicon: HALOT
  rationale: En el contexto ceremonial de una lista de dedicaciones, ‘presentó’ conserva la idea de acercar/presentar la ofrenda sin volver redundante la construcción con ‘ofrenda’.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su don
  - su oblación
  lexicon: HALOT
  rationale: El término sacrificial pide ‘ofrenda’ en español para reflejar el valor cultual de קרבן sin suavizarlo a un regalo genérico.
- source_word: קַעֲרַת כֶּסֶף
  english_pob_choice: silver plate
  chosen_spanish: plato de plata
  alternatives_spanish:
  - fuente de plata
  - disco de plata
  lexicon: HALOT
  rationale: La vasija parece un recipiente llano y ceremonial; ‘plato’ es natural en español y mantiene la alternativa abierta de ‘dish’ documentada en el inglés.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - con un peso de ciento treinta siclos
  - pesaba ciento treinta siclos
  lexicon: HALOT
  rationale: La frase hebrea expresa el peso de manera explícita; ‘de peso de’ preserva el estilo de inventario y el referente del sustantivo femenino implícito en el hebreo.
- source_word: מִזְרָק
  english_pob_choice: basin
  chosen_spanish: tazón
  alternatives_spanish:
  - taza
  - cuenco
  lexicon: HALOT
  rationale: Aunque el inglés opta por ‘basin’, en español ‘tazón’ comunica bien un recipiente ritual sin sonar demasiado moderno ni técnico; conserva la opción alternativa de ‘bowl’ del audit trail.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - por el siclo del santuario
  - conforme al siclo del santuario
  lexicon: HALOT
  rationale: ‘Según’ expresa la norma de medición indicada por la frase hebrea y suena natural en español para una especificación de peso estandarizado.
- source_word: שְׁנֵיהֶם מְלֵאִים
  english_pob_choice: both of them full of
  chosen_spanish: ambos llenos de
  alternatives_spanish:
  - los dos llenos de
  - ambos estaban llenos de
  lexicon: HALOT
  rationale: ‘Ambos llenos de’ reproduce la referencia dual y el estado de plenitud sin añadir material explicativo innecesario.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina refinada
  lexicon: HALOT
  rationale: ‘Flor de harina’ es la equivalencia española estable y plenamente comprensible para סֹלֶת en contexto sacrificial.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - mecida con aceite
  lexicon: HALOT
  rationale: ‘Amasada con aceite’ conserva la idea de preparación de la ofrenda vegetal y evita una literalidad seca; mantiene el sentido material de la mezcla sin exagerarlo.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para una ofrenda vegetal
  alternatives_spanish:
  - para una ofrenda de cereal
  - para una oblación
  lexicon: HALOT
  rationale: ‘Ofrenda vegetal’ refleja la categoría cultual de מנחה y evita reducirla solo a ‘grano’; mantiene la especificidad sacrificial sin depender de una tradición litúrgica fija.
theological_decisions:
- issue: Terminología sacrificial de מִנְחָה
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para una ofrenda vegetal
  alternative_spanish_readings:
  - para una ofrenda de cereal
  - para una oblación
  rationale: La POB en inglés opta por ‘grain offering’ para especificar el tipo de ofrenda. En español, ‘ofrenda vegetal’ comunica la misma categoría ritual de manera clara y evita la ambigüedad de ‘ofrenda’ sola, que sería demasiado general.
  doctrine_reference: Levítico 2; Números 7:13-19
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail en inglés, conservando la estructura de inventario ceremonial, la especificación del peso y la fórmula cultual final. Se evitó calcar mecánicamente el inglés cuando una equivalencia española más natural mantenía mejor la referencia ritual.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando el tetragrámaton aparezca; en este versículo no está presente.
  - ‘Siclo’ se usa de forma consistente para שֶׁקֶל en contexto bíblico de peso.
  - ‘Ofrenda vegetal’ se eligió para preservar la categoría cultual de מִנְחָה sin perder inteligibilidad en español.
