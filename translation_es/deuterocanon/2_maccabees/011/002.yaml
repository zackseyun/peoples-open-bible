translation:
  language: es
  text: Después de reunir unos ochenta mil hombres y toda la caballería[a], avanzó contra los judíos, con la intención de convertir la ciudad en morada para griegos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». El griego Ἰουδαίους puede denotar al pueblo judío o a la población de Judea, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: συναθροίσας
  english_pob_choice: After gathering
  chosen_spanish: Después de reunir
  alternatives_spanish:
  - habiendo reunido
  - después de haber reunido
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa a la principal; «Después de reunir» preserva esa secuencia en un español natural y digno.
- source_word: περὶ τὰς ὀκτὼ μυριάδας
  english_pob_choice: about eighty thousand men
  chosen_spanish: unos ochenta mil hombres
  alternatives_spanish:
  - alrededor de ochenta mil
  - cerca de ochenta mil hombres
  lexicon: LSJ
  rationale: μυριάς equivale a diez mil, y ocho μυριάδες a ochenta mil; «unos» reproduce la aproximación de περὶ. «Hombres» es una adición idiomática razonable en un contexto militar.
- source_word: τὴν ἵππον ἅπασαν
  english_pob_choice: all the cavalry
  chosen_spanish: toda la caballería
  alternatives_spanish:
  - toda la fuerza de caballería
  - todos los jinetes
  lexicon: LSJ
  rationale: ἵππος aquí es colectivo militar, no solo «caballos». «Caballería» conserva el sentido técnico de tropa montada.
- source_word: παρεγένετο ἐπὶ τοὺς Ἰουδαίους
  english_pob_choice: he advanced against the Jews
  chosen_spanish: avanzó contra los judíos
  alternatives_spanish:
  - vino contra los judíos
  - se dirigió contra los judíos
  lexicon: LSJ
  rationale: La construcción con ἐπί + acusativo expresa movimiento hostil. «Avanzó contra» comunica mejor la intención bélica que un simple «vino».
- source_word: λογιζόμενος
  english_pob_choice: intending
  chosen_spanish: con la intención de
  alternatives_spanish:
  - pensando en
  - planeando
  lexicon: LSJ
  rationale: El participio no describe solo reflexión interna, sino propósito. «Con la intención de» recoge esa fuerza final sin sobreinterpretar.
- source_word: τὴν μὲν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - esa ciudad
  lexicon: LSJ
  rationale: La frase queda abierta por el μέν, que anticipa la contraposición del versículo siguiente. «La ciudad» es la forma más limpia en español.
- source_word: Ἕλλησιν
  english_pob_choice: for Greeks
  chosen_spanish: para griegos
  alternatives_spanish:
  - para los griegos
  - de griegos
  lexicon: LSJ
  rationale: El dativo funciona aquí con valor de finalidad/beneficio en la construcción con οἰκητήριον ποιήσειν. El anartro «griegos» refleja mejor el griego que una forma más marcada por artículo.
- source_word: οἰκητήριον ποιήσειν
  english_pob_choice: to make a dwelling place
  chosen_spanish: convertir ... en morada
  alternatives_spanish:
  - hacer de ... un lugar de habitación
  - volver ... un asentamiento
  lexicon: LSJ
  rationale: La construcción significa «hacer de algo una vivienda/habitación». «Convertir ... en morada» suena natural en español y conserva la idea de transformación del lugar.
theological_decisions:
- issue: Ἰουδαίους como designación étnico-religiosa o geográfica
  english_pob_reading: the Jews / or 'the Judeans'
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - el pueblo judío
  rationale: En este contexto de conflicto militar, la referencia al grupo étnico-religioso es la lectura más natural en español. Se conserva la alternativa documental «Judeans» como posibilidad contextual, sin imponerla en el texto principal.
  doctrine_reference: Principio de primacía del original y preservación de alternativas significativas en la documentación
translation_notes:
  revision_awareness: El texto sigue de cerca el acuerdo de alto consenso del audit trail en inglés, sin cambios textuales detectados en la revisión más reciente. Se mantuvo la secuencia participial previa al verbo principal, el valor militar de ἵππον como «caballería», y la apertura sintáctica del μέν con una frase final que queda pendiente para el versículo siguiente.
  spanish_consistency_notes:
  - Se emplea «judíos» en la línea principal y se documenta «judeanos» como alternativa, en coherencia con el expediente inglés.
  - «Caballería» mantiene el sentido colectivo militar de ἵππος.
  - Se evita traducir mecánicamente la estructura griega cuando el español exige una formulación más natural, pero sin añadir contenido no sustentado por el texto.
