translation:
  language: es
  text: Y Dios retribuyó sobre sus propias cabezas todo el mal de los hombres de Siquem, y vino sobre ellos la maldición de Jotam hijo de Jerobaal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הֵשִׁיב
  english_pob_choice: repaid
  chosen_spanish: hizo volver
  alternatives_spanish:
  - retribuyó
  - devolvió
  lexicon: HALOT
  rationale: El verbo causativo de שוב aquí expresa que Dios hizo que el mal regresara sobre los culpables. En español, "hizo volver" conserva la imagen de retorno y la agencia divina sin imponer un término más interpretativo que el hebreo no exige.
- source_word: רָעַת
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - maldad
  lexicon: HALOT
  rationale: El contexto señala el mal cometido por los hombres de Siquem. "Mal" mantiene la amplitud semántica del hebreo y evita forzar una abstracción moral más técnica que el texto inmediato.
- source_word: בְּרֹאשָׁם
  english_pob_choice: on their own heads
  chosen_spanish: sobre sus propias cabezas
  alternatives_spanish:
  - sobre sus cabezas
  - en sus cabezas
  lexicon: HALOT
  rationale: La imagen idiomática de retribución se conserva con una expresión natural en español. "Sus propias cabezas" mantiene el valor reflexivo del hebreo y la fuerza judicial de la frase.
- source_word: אַנְשֵׁי שְׁכֶם
  english_pob_choice: the men of Shechem
  chosen_spanish: los hombres de Siquem
  alternatives_spanish:
  - la gente de Siquem
  - los habitantes de Siquem
  lexicon: HALOT
  rationale: El hebreo dice literalmente "hombres de Siquem". Se mantiene el valor masculino explícito del sustantivo, como en el audit trail inglés, sin convertirlo en una expresión más genérica.
- source_word: קִלֲלַת
  english_pob_choice: the curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - el anatema
  - la imprecación
  lexicon: HALOT
  rationale: Se trata de la maldición pronunciada por Jotam en el capítulo anterior. "Maldición" es la equivalencia española más natural y precisa para ese acto verbal con efecto judicial.
- source_word: וַתָּבֹא אֲלֵיהֶם
  english_pob_choice: came upon them
  chosen_spanish: vino sobre ellos
  alternatives_spanish:
  - cayó sobre ellos
  - llegó a ellos
  lexicon: HALOT
  rationale: La fórmula de cumplimiento y juicio en español se expresa con naturalidad mediante "vino sobre ellos", que conserva la metáfora de movimiento del hebreo y el efecto de realización del juicio.
- source_word: יוֹתָם בֶּן יְרֻבָּעַל
  english_pob_choice: Jotham son of Jerubbaal
  chosen_spanish: Jotam hijo de Jerobaal
  alternatives_spanish:
  - Jotam, hijo de Jerobaal
  lexicon: transliteración onomástica
  rationale: Los nombres propios se transliteran según la práctica del proyecto. Se conserva la relación filial de forma directa para mantener la identificación narrativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים gobierna un verbo singular y se refiere al Dios de Israel como agente del juicio. "Dios" reproduce con claridad esa referencia sin necesidad de rodeos.
theological_decisions:
- issue: Agencia divina en el juicio retributivo
  english_pob_reading: God actively repaid the evil of the men of Shechem on their own heads.
  chosen_spanish_reading: Dios hizo volver sobre sus propias cabezas todo el mal de los hombres de Siquem.
  alternative_spanish_readings:
  - Dios permitió que su mal volviera sobre ellos
  - Dios retribuyó el mal de los hombres de Siquem
  rationale: El hebreo presenta a Dios como sujeto activo de הֵשִׁיב. La traducción conserva esa agencia sin suavizarla en permiso pasivo; al mismo tiempo, "hizo volver" respeta la imagen de retorno del texto.
  doctrine_reference: Preservar la tensión teológica del juicio divino en la narración; primacía del texto original sobre una mitigación interpretativa.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. El versículo se entrega sin footnotes porque el hebreo y el audit trail inglés no requieren una alternativa textual o lexical que deba marcarse explícitamente en esta línea.
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלֹהִים en concordancia con el audit trail inglés.
  - Se usa "Siquem" para el topónimo y "Jotam"/"Jerobaal" como transliteraciones coherentes con el proyecto.
  - Se conserva el tono judicial del versículo con un español natural y no arcaizante.
  - No se introduce "SEÑOR" como sustituto del nombre divino porque el texto hebreo usa אֱלֹהִים.
