translation:
  language: es
  text: 'Y le contó el sueño a su padre y a sus hermanos, y su padre lo reprendió y le dijo: «¿Qué sueño es este que has soñado? ¿Acaso vendremos realmente yo, tu madre y tus hermanos a postrarnos[a] hasta el suelo delante de ti?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «postrarnos delante de ti». El verbo hebreo puede referirse a una profunda reverencia; aquí expresa una inclinación de sumisión, no necesariamente adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  english_pob_choice: he told it
  chosen_spanish: le contó el sueño
  alternatives_spanish:
  - se lo relató
  - le refirió el sueño
  lexicon: HALOT
  rationale: ספר en piel significa ‘contar/relatar’. En español, «le contó el sueño» es natural y conserva el contenido implícito sin añadir material ajeno al hebreo.
- source_word: אָבִיו ... אֶחָיו
  english_pob_choice: his father ... his brothers
  chosen_spanish: su padre ... sus hermanos
  alternatives_spanish:
  - su padre ... sus hermanos varones
  - su padre ... sus hermanos
  lexicon: HALOT
  rationale: Son términos de parentesco directos. «Hermanos» preserva el plural masculino del hebreo y es idiomático en español.
- source_word: וַיִּגְעַר בּוֹ
  english_pob_choice: rebuked him
  chosen_spanish: lo reprendió
  alternatives_spanish:
  - lo regañó
  - lo recriminó
  lexicon: HALOT
  rationale: גער expresa una reprensión verbal fuerte. «Reprendió» mantiene esa fuerza mejor que un simple «regañó» y suena digno en español bíblico moderno.
- source_word: מָה הַחֲלוֹם הַזֶּה אֲשֶׁר חָלָמְתָּ
  english_pob_choice: What is this dream that you have dreamed?
  chosen_spanish: ¿Qué sueño es este que has soñado?
  alternatives_spanish:
  - ¿Qué es este sueño que soñaste?
  - ¿Qué sueño es este que soñaste?
  lexicon: HALOT
  rationale: La pregunta retórica mantiene la repetición hebrea de ‘sueño’/‘soñar’ sin volverse mecánica en español. «Has soñado» conserva el perfecto compuesto natural en el registro bíblico actual.
- source_word: הֲבוֹא נָבוֹא
  english_pob_choice: Shall I and your mother and your brothers indeed come
  chosen_spanish: ¿Acaso vendremos realmente
  alternatives_spanish:
  - ¿De veras iremos
  - ¿Acaso iremos en verdad
  lexicon: HALOT
  rationale: La construcción hebrea de infinitivo absoluto + imperfecto intensifica la acción. «¿Acaso vendremos realmente?» transmite la sorpresa e intensidad sin sobreexplicar.
- source_word: אֲנִי וְאִמְּךָ וְאַחֶיךָ
  english_pob_choice: I and your mother and your brothers
  chosen_spanish: yo, tu madre y tus hermanos
  alternatives_spanish:
  - yo y tu madre y tus hermanos
  - yo, tu madre y tus hermanos
  lexicon: HALOT
  rationale: El orden hebreo enumera los sujetos uno por uno. En español, la coordinación con pausa tras «yo» reproduce la lista con claridad y fluidez.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to bow down before you
  chosen_spanish: a postrarnos en tierra delante de ti
  alternatives_spanish:
  - a prosternarnos delante de ti
  - a inclinarnos delante de ti
  lexicon: HALOT
  rationale: השתחוה aquí denota acto de reverencia/obeisancia, no adoración cultual. «Postrarnos en tierra delante de ti» expresa con precisión la postura corporal y conserva el matiz de sumisión familiar.
- source_word: אָרְצָה
  english_pob_choice: to the ground
  chosen_spanish: en tierra
  alternatives_spanish:
  - al suelo
  - a tierra
  lexicon: HALOT
  rationale: La forma direccional indica orientación ‘hacia la tierra/suelo’. «En tierra» funciona bien en español junto con «postrarnos» y refleja el resultado físico del gesto.
theological_decisions:
- issue: Valor de השתחוה en contexto no cultual
  english_pob_reading: bow down before you
  chosen_spanish_reading: postrarnos en tierra delante de ti
  alternative_spanish_readings:
  - adorarte
  - prosternarnos ante ti
  rationale: El contexto es familiar y profético, no de culto. La versión española conserva la idea de sumisión corporal sin introducir adoración religiosa que el texto no exige.
  doctrine_reference: 'Translation philosophy: no importar afirmaciones doctrinales que el texto no hace.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no modificó el versículo y el cruce de verificación mostró alto acuerdo; por eso la redacción española sigue de cerca el análisis auditado sin introducir nuevas decisiones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según el estándar del proyecto; este versículo no contiene ninguno de esos términos.
  - Se usa «reprendió» para גער y «postrarnos en tierra» para השתחוה con coherencia respecto del valor no cultual ya documentado en el audio-trazado inglés.
  - La nota al pie se ancla en «[a]» para preservar la alternativa lexical sin duplicar marcadores.
