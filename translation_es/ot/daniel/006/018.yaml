translation:
  language: es
  text: Entonces trajeron una piedra y la pusieron sobre la boca del foso[a], y el rey la selló con su anillo de sello y con los anillos de sello de sus nobles, para que nada respecto de Daniel pudiera ser cambiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que el asunto relativo a Daniel no pudiera ser alterado». El arameo צְבוּ puede referirse a un asunto, una intención o una decisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן חֲדָה
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una sola piedra
  - una piedra determinada
  lexicon: HALOT
  rationale: חֲדָה expresa la idea de ‘una’ o ‘una sola’. En español, ‘una piedra’ transmite de forma natural el objeto único sin añadir énfasis innecesario; ‘una sola piedra’ sería posible, pero suena más marcado que el hebreo/aramaico del contexto.
- source_word: וְשֻׂמַת עַל פֻּם גֻּבָּא
  english_pob_choice: placed over the mouth of the pit
  chosen_spanish: puesta sobre la boca del foso
  alternatives_spanish:
  - colocada sobre la boca de la fosa
  - puesta sobre la abertura del foso
  lexicon: HALOT
  rationale: פֻּם es literalmente ‘boca’, y en español esa imagen funciona bien para la abertura. גֻּבָּא designa un hoyo/foso; ‘foso’ mantiene la concreción del término y es idiomático en este pasaje de Daniel.
- source_word: וְחַתְמַהּ מַלְכָּא
  english_pob_choice: the king sealed it
  chosen_spanish: el rey lo selló
  alternatives_spanish:
  - el rey puso su sello sobre ello
  - el rey lo aseguró con un sello
  lexicon: HALOT
  rationale: 'El verbo significa sellar; ‘lo selló’ conserva la sencillez del acto. El objeto queda entendido por el contexto inmediato: la piedra sobre la boca del foso.'
- source_word: בְּעִזְקְתֵהּ
  english_pob_choice: with his signet ring
  chosen_spanish: con su anillo de sello
  alternatives_spanish:
  - con su sello
  - con su anillo signet
  lexicon: HALOT
  rationale: עִזְקְתָא es un anillo usado para sellar. ‘Anillo de sello’ expresa el instrumento con claridad en español y evita la ambigüedad de ‘sello’, que podría referirse al emblema más que al objeto.
- source_word: וּבְעִזְקָת רַבְרְבָנֹוהִי
  english_pob_choice: and with the signet rings of his nobles
  chosen_spanish: y con los anillos de sello de sus nobles
  alternatives_spanish:
  - y con los sellos de sus nobles
  - y con los anillos de sello de sus oficiales
  lexicon: HALOT
  rationale: רַבְרְבָנִין/רַבְרְבָנֹוהִי se refiere a los grandes hombres o nobles de la corte. ‘Nobles’ sigue el matiz cortesano del arameo; repetir ‘anillos de sello’ conserva la correspondencia con el sustantivo anterior.
- source_word: דִּי לָא תִשְׁנֵא צְבוּ בְּדָנִיֵּאל
  english_pob_choice: so that nothing concerning Daniel might be changed
  chosen_spanish: para que nada concerniente a Daniel pudiera ser cambiado
  alternatives_spanish:
  - para que nada sobre Daniel pudiera ser alterado
  - para que el asunto relativo a Daniel no pudiera ser cambiado
  lexicon: HALOT
  rationale: צְבוּ puede significar ‘asunto’, ‘voluntad’, ‘intención’ o ‘decisión’. La formulación amplia ‘nada concerniente a Daniel’ conserva esa amplitud sin estrechar el sentido a un solo aspecto; ‘pudiera ser cambiado’ sigue el pasivo del original.
- source_word: וְהֵיתָיִת
  english_pob_choice: Then ... was brought
  chosen_spanish: Entonces fue traída
  alternatives_spanish:
  - Y fue traída
  - Luego fue traída
  lexicon: HALOT
  rationale: La forma introduce la secuencia narrativa. ‘Entonces’ comunica bien el avance de la escena en español y mantiene el valor consecutivo del arameo.
theological_decisions:
- issue: Alcance de צְבוּ al final del versículo
  english_pob_reading: nothing concerning Daniel might be changed
  chosen_spanish_reading: nada concerniente a Daniel pudiera ser cambiado
  alternative_spanish_readings:
  - que el asunto relativo a Daniel no pudiera ser cambiado
  - que nada sobre Daniel pudiera ser alterado
  rationale: El arameo permite entender צְבוּ como ‘asunto’, ‘intención’ o ‘decisión’. La redacción elegida evita resolver demasiado pronto la ambigüedad y conserva el sentido legal/cortesano de la clausura del decreto.
  doctrine_reference: Daniel 6:18; lectura contextual del arameo צְבוּ según HALOT y el auditable POB inglés.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó ‘single’ de ‘a single stone’ para volver a la simpleza de ‘a stone’. La redacción española sigue esa misma decisión: ‘una piedra’ sin énfasis adicional, manteniendo la naturalidad y la precisión del numeral implícito.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto base lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - ‘Foso’ conserva el valor del arameo גֻּבָּא en este contexto de la fosa de los leones, sin introducir una paráfrasis más interpretativa.
  - ‘Anillo de sello’ se mantiene de manera consistente para עִזְקְתָא y evita alternar con ‘sello’ como objeto abstracto.
