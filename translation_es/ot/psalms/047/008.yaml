translation:
  language: es
  text: Porque Dios es el Rey de toda la tierra; canten con entendimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canten con habilidad», «canten un salmo con entendimiento», o posiblemente «canten un Maskil» (término musical/literario).
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la base o razón del llamado previo a alabar. «Porque» conserva bien el valor causal/explicativo de כִּי y suena natural en español bíblico moderno.
- source_word: מֶלֶךְ
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: HALOT
  rationale: Es un sustantivo predicativo aplicado a Dios. «Rey» es la equivalencia directa y más transparente en español.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - de la tierra entera
  lexicon: HALOT
  rationale: La construcción expresa el alcance universal del reinado de Dios. «De toda la tierra» mantiene cercanía formal y claridad idiomática.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí el plural formal toma sentido singular y se refiere al Dios de Israel. «Dios» es la equivalencia natural en español.
- source_word: זַמְּרוּ
  english_pob_choice: sing
  chosen_spanish: canten
  alternatives_spanish:
  - canten alabanzas
  - hagan música
  lexicon: HALOT
  rationale: El imperativo plural llama a cantar en alabanza. «Canten» conserva la fuerza verbal simple del hebreo y encaja con el contexto poético.
- source_word: מַשְׂכִּיל
  english_pob_choice: a psalm with understanding
  chosen_spanish: un salmo con entendimiento
  alternatives_spanish:
  - un salmo con inteligencia
  - un salmo de entendimiento
  - un maskil
  lexicon: HALOT
  rationale: El término es ambiguo y puede funcionar como indicación musical/literaria o como adverbio de comprensión/arte. La frase «con entendimiento» sigue de cerca la revisión inglesa y preserva la tensión lexical sin imponer una sola solución.
theological_decisions:
- issue: Alcance universal del reinado divino
  english_pob_reading: God is the King of all the earth in a universal sense.
  chosen_spanish_reading: Dios es el Rey de toda la tierra en sentido universal.
  alternative_spanish_readings:
  - Dios reina sobre la tierra
  - Dios es Rey sobre toda la tierra
  rationale: El hebreo presenta el reinado divino sin restringirlo a un territorio particular. «De toda la tierra» conserva ese alcance universal sin añadir matices no presentes en el texto.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without narrowing it beyond the Hebrew.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «sing a skillful psalm» a «sing a psalm with understanding» para reflejar מַשְׂכִּיל con mayor precisión. La redacción española sigue esa revisión y evita fijar prematuramente el término como título técnico exclusivo.
  spanish_consistency_notes:
  - Se usa «Dios» sin máscara reverencial porque el hebreo tiene אֱלֹהִים con sentido singular.
  - Se evita «SEÑOR» porque este versículo habla de Dios como Rey y no contiene יהוה en el texto fuente.
  - «Con entendimiento» preserva la ambigüedad del hebreo entre comprensión, habilidad y posible designación técnico-musical.
  - La puntuación con punto y coma refleja la división natural entre la afirmación teológica y el llamado a cantar.
