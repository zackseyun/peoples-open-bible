translation:
  language: es
  text: Y todo Moab oyó que los reyes habían subido para pelear contra ellos, y se reunieron[a], todos los que podían ceñirse un cinturón[b] y mayores, y tomaron posición en la frontera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''se movilizaron'' / ''fueron convocados''. El verbo hebreo aquí probablemente expresa una reunión militar, no solo una llamada o un grito.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, 'desde todo el que se ciñe un cinturón y hacia arriba', un modismo para los de edad militar y mayores.
    reason: cultural_note
lexical_decisions:
- source_word: וְכָל מוֹאָב
  english_pob_choice: Now all Moab
  chosen_spanish: Y todo Moab
  alternatives_spanish:
  - Y todos los moabitas
  - Todo Moab
  lexicon: HALOT
  rationale: מוֹאָב funciona aquí como nombre colectivo del pueblo/nación. ‘Todo Moab’ conserva mejor esa expresión colectiva que ‘los moabitas’. Se omite un equivalente explícito de ‘Now’ porque en español el enlace narrativo con ‘Y’ resulta natural y suficiente.
- source_word: שָׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: שׁמע en qal significa primariamente ‘oír’, y el contexto de noticia militar favorece ese sentido directo. En español, ‘oyó’ mantiene la relación simple entre el verbo y el reporte recibido.
- source_word: כִּי עָלוּ הַמְּלָכִים
  english_pob_choice: that the kings had come up
  chosen_spanish: que los reyes habían subido
  alternatives_spanish:
  - que los reyes habían ido contra ellos
  - que los reyes habían avanzado
  lexicon: HALOT
  rationale: עלה conserva su valor literal de ‘subir/ascender’, que en contexto militar implica marcha de invasión. ‘Habían subido’ preserva esa imagen sin forzar una explicación interpretativa en el texto principal.
- source_word: לְהִלָּחֶם בָּם
  english_pob_choice: to fight against them
  chosen_spanish: para pelear contra ellos
  alternatives_spanish:
  - para guerrear contra ellos
  - para combatirlos
  lexicon: HALOT
  rationale: ללחם con ב expresa entrar en combate contra un adversario. ‘Pelear contra ellos’ es claro, natural y suficientemente directo para este registro narrativo.
- source_word: וַיִּצָּעֲקוּ
  english_pob_choice: they gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron convocados
  - se alistaron
  - se movilizaron
  lexicon: HALOT
  rationale: La POB inglesa ya decidió que el verbo aquí apunta a movilización/reunión, no a un simple clamor. ‘Se reunieron’ transmite esa acción colectiva de forma directa en español, aunque el matiz militar de convocatoria queda implícito por el contexto y la nota.
- source_word: מִכֹּל חֹגֵר חֲגֹרָה וָמַעְלָה
  english_pob_choice: everyone who could put on a belt and upward
  chosen_spanish: todos los que podían ponerse un cinturón y en adelante
  alternatives_spanish:
  - todos los que se ceñían un cinturón y en adelante
  - todos los capaces de ceñirse un cinturón y más
  - todos los de edad para ponerse un cinturón y en adelante
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para los de edad militar y mayores. ‘Ponerse un cinturón’ conserva la imagen concreta de חֹגֵר חֲגֹרָה, mientras ‘y en adelante’ reproduce וָמַעְלָה (‘y hacia arriba / y mayores’). Aunque suena algo literal, es fiel y comprensible junto a la nota explicativa.
- source_word: וַיַּעַמְדוּ עַל הַגְּבוּל
  english_pob_choice: and they stood at the border
  chosen_spanish: y se apostaron junto a la frontera
  alternatives_spanish:
  - y se pusieron de pie en la frontera
  - y tomaron posición en la frontera
  - y se quedaron junto al límite
  lexicon: HALOT
  rationale: עמד על con הַגְּבוּל describe la toma de posición en el borde/frontera; en contexto bélico español ‘se apostaron’ expresa mejor el matiz militar que ‘estuvieron’. ‘Frontera’ es una equivalencia natural de גְּבוּל en este contexto.
theological_decisions:
- issue: No hay decisión doctrinal directa, pero sí un matiz de traducción sobre el alcance militar de la movilización
  english_pob_reading: they gathered together / they were mustered, with an idiom for those of military age and older
  chosen_spanish_reading: se reunieron, todos los que podían ponerse un cinturón y en adelante
  alternative_spanish_readings:
  - fueron convocados, todos los que podían ponerse un cinturón y en adelante
  - se movilizaron, todos los que podían ponerse un cinturón y en adelante
  rationale: El versículo no formula una enseñanza doctrinal; la única cuestión interpretativa importante es cómo reflejar la movilización militar. Se eligió una redacción que no borra el sentido bélico ni añade un tecnicismo ajeno al texto, dejando la aclaración idiomática para la nota.
  doctrine_reference: None
- issue: Imagen idiomática de edad/madurez para la guerra
  english_pob_reading: everyone who could put on a belt and upward
  chosen_spanish_reading: todos los que podían ponerse un cinturón y en adelante
  alternative_spanish_readings:
  - todos los que se ceñían un cinturón y en adelante
  - todos los de edad para ponerse un cinturón y en adelante
  rationale: La frase hebrea no debe espiritualizarse ni suavizarse como simple ‘adultos’; el texto usa una imagen concreta ligada a capacidad militar. La traducción conserva esa imagen para que la nota explique el valor idiomático sin perder el color original.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La versión inglesa más reciente reemplazó ‘were summoned together’ por ‘gathered together’ y simplificó la imagen idiomática a ‘everyone who could put on a belt and upward’. Esta línea española sigue esa revisión: usa un verbo de reunión directa (‘se reunieron’) y mantiene la imagen del cinturón sin sobreexplicarla en el texto principal, reservando el sentido idiomático para la nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘Moab’ como nombre colectivo, no ‘los moabitas’, para conservar la forma hebrea.
  - ‘Yahvé’ no aparece en este versículo.
  - Se prefirió ‘frontera’ para גְּבוּל por su naturalidad en español bíblico cuando el contexto es militar.
  - Se evitó ‘Siervo/siervos’ y otros términos no presentes; no hay vocabulario cristológico ni de pacto en este versículo.
