review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general y conserva la tensión teológica correcta entre la percepción del salmista y la respuesta real de Dios. Sin embargo, hay dos desajustes importantes en el aparato: los marcadores de notas están invertidos respecto de las palabras que comentan, y «apartado» debilita la fuerza de נִגְרַזְתִּי («cortado/removido/excluido») más de lo deseable. También conviene mejorar «clamé a ti» a un español más natural.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta pequeños problemas de naturalidad y precisión: «en mi alarma» suena algo calcado aunque aceptable; «estoy apartado» resulta demasiado suave; y «clamé a ti» se lee menos natural que «clamé a ti» en algunas regiones, pero «clamé a ti pidiendo ayuda» o «clamé a ti por ayuda» funciona mejor si se mantiene el registro. La puntuación y el tono son adecuados.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. El verso no contiene nombres divinos ni términos glosarios sensibles. La decisión teológica principal está bien preservada. La revisión propuesta solo afina precisión léxica y legibilidad.
  issues:
  - severity: high
    issue: Los marcadores de las notas al pie no corresponden a las expresiones que explican.
    rationale: La nota [a] habla de «en mi prisa», que corresponde a «en mi alarma» (בְחָפְזִי), pero en el texto [a] está colocado tras «En cuanto a mí». La nota [b] habla de «de tu vista», que corresponde a «de delante de tus ojos» (מִנֶּגֶד עֵינֶיךָ), pero en el texto [b] está colocado tras «alarma». Esto incumple la disciplina requerida de anclar cada nota exactamente en la frase pertinente.
  - severity: medium
    issue: «Estoy apartado» suaviza demasiado נִגְרַזְתִּי.
    rationale: El hebreo expresa ser cortado/removido de delante de los ojos de Dios. «Apartado» puede sonar meramente separado o puesto a un lado, mientras que el contexto pide una percepción más aguda de exclusión. «He sido excluido» o «he sido cortado» refleja mejor la fuerza sin volverse ininteligible.
  - severity: low
    issue: La expresión «cuando clamé a ti por ayuda» puede afinarse levemente para fluidez.
    rationale: Es comprensible, pero «cuando clamé a ti pidiendo ayuda» suena algo más natural en español general manteniendo la explicitación permitida del valor de שׁוע. No es un error grave.
  revised_spanish_text: 'En cuanto a mí, yo dije en mi alarma[a]: «He sido excluido de delante de tus ojos[b]». Pero tú escuchaste la voz de mis ruegos cuando clamé a ti por ayuda.'
  revised_footnotes:
