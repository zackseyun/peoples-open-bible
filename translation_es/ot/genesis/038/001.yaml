translation:
  language: es
  text: En ese tiempo[a], Judá bajó de entre sus hermanos y se desvió hacia un adulamita, cuyo nombre era Hirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y sucedió en ese tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בָּעֵת הַהִוא
  english_pob_choice: At that time
  chosen_spanish: En ese tiempo
  alternatives_spanish:
  - Y aconteció en ese tiempo
  - Y sucedió en aquel tiempo
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo episodio. «En ese tiempo» mantiene el valor temporal y suena natural en español sin añadir una calca demasiado rígida de la partícula inicial.
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - se fue
  lexicon: HALOT
  rationale: El verbo hebreo conserva la idea de movimiento hacia abajo. «Bajó» es la opción más directa y natural en español, preservando el sentido direccional del original.
- source_word: מֵאֵת אֶחָיו
  english_pob_choice: from his brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de sus hermanos
  - alejándose de sus hermanos
  lexicon: HALOT
  rationale: La expresión señala separación del grupo fraternal. «De entre sus hermanos» conserva mejor la idea de salida del conjunto que un simple «de sus hermanos».
- source_word: וַיֵּט
  english_pob_choice: turned aside
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se volvió aparte
  lexicon: HALOT
  rationale: Aquí נטה indica desviarse o dirigirse aparte hacia alguien. «Se apartó» transmite bien el movimiento de desviación y evita una literalidad extraña.
- source_word: עַד אִישׁ עֲדֻלָּמִי
  english_pob_choice: to a certain Adullamite
  chosen_spanish: hasta un adulamita
  alternatives_spanish:
  - a un adulamita
  - hasta un hombre de Adulam
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que eliminó «man», pues el hebreo puede presentar al personaje por su procedencia. En español, «un adulamita» funciona de modo natural como identificación personal y conserva la ambigüedad del hebreo entre origen y persona concreta.
- source_word: וּשְׁמוֹ חִירָה
  english_pob_choice: whose name was Hirah
  chosen_spanish: cuyo nombre era Hirá
  alternatives_spanish:
  - y su nombre era Hirá
  - llamado Hirá
  lexicon: HALOT
  rationale: «Cuyo nombre era» sigue de cerca la estructura identificadora del hebreo y mantiene el estilo narrativo. El nombre se translitera como «Hirá» por convención estándar.
- source_word: חִירָה
  english_pob_choice: Hirah
  chosen_spanish: Hirá
  alternatives_spanish:
  - Hirah
  lexicon: standard transliteration
  rationale: Se adapta la transliteración al uso español con acento gráfico final para reflejar la pronunciación llana aguda en la forma castellana adoptada por el proyecto.
translation_notes:
  revision_awareness: La versión inglesa revisada conserva la fórmula temporal pero prefirió omitir «man» en «Adullamite» por naturalidad; el español sigue esa misma decisión y usa una construcción igualmente natural, sin añadir elementos ajenos al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se evita «Cristo» porque no hay terminología mesiánica en el versículo.
  - «Hirá» sigue la transliteración española coherente con nombres propios del corpus.
  - La nota a conserva la alternativa formal de la fórmula narrativa, como en el audit trail inglés.
