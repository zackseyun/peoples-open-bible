    text: O «cortina del testimonio».
    reason: lexical_alternative
  - marker: b
    text: O «lo pondrá en orden» o «lo ordenará».
    reason: lexical_alternative
  - marker: c
    text: «Continuamente» aquí se refiere a la observancia regular y continua del rito, especificada por «desde la tarde hasta la mañana».
    reason: cultural_note
  - marker: d
    text: O «un estatuto perpetuo» o «una ordenanza perpetua».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el anclaje de notas para que cada marcador sea único y pertinente; se reemplaza «esto» por «lo» para reflejar mejor אֹתוֹ; se ajusta «para sus generaciones» a «por todas sus generaciones» para preservar con más claridad לְדֹרֹתֵיכֶם; y se suaviza la puntuación. También se uniforma la cláusula final con una opción principal muy natural en español bíblico moderno: «estatuto permanente».'
