translation:
  language: es
  text: Casa de Israel[a], bendigan a Yahvé; casa de Aarón, bendigan a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR»; alternativamente, se translitera «Yahvé».'
