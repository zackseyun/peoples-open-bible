revisions:
- from: ¡Qué hermosas son tus amores[a], hermana mía, esposa mía! ¡Cuánto mejores son tus amores que el vino[b], y el aroma de tus ungüentos que todas las especias!
  to: ¡Qué hermoso es tu amor[a], hermana mía, esposa mía! ¡Cuánto mejor es tu amor que el vino, y la fragancia de tus aceites[b] que todas las especias!
  rationale: Se ajusta דֹדַיִךְ a «tu amor» para seguir la decisión principal del POB y evitar la ambigüedad de «tus amores» en español. Se restituye «tus aceites» para conservar la imaginería concreta del hebreo y del texto inglés, mientras la nota explica el probable sentido de aceites perfumados/ungüentos. También se corrige el anclaje de la nota cultural al sintagma pertinente.
