    text: Or 'Do not lose heart.' The Hebrew idiom is literally 'Do not let your heart grow faint/soft,' referring to a collapse of courage.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not fear, and do not be thrown into panic, and do not be terrified before them.' The three prohibitions intensify the command against fear in battle.
