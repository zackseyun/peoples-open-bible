revisions:
- from: 'Pero él se negó y dijo: «No comeré». Sin embargo, sus siervos, junto con la mujer, le insistieron, y él escuchó su voz[a][b]. Entonces se levantó de la tierra y se sentó en la cama[c].'
  to: 'Pero él se negó y dijo: «No comeré». Sin embargo, sus siervos, junto con la mujer, le insistieron[a], y él escuchó lo que le decían[b]. Entonces se levantó del suelo y se sentó en la cama[c].'
  rationale: Se ajusta la expresión sobre לְקֹלָם para evitar un español torpe y potencialmente ambiguo, manteniendo la literalidad en nota. También se mejora «de la tierra» a «del suelo» por claridad contextual. Se conserva «le insistieron», «sus siervos» y «la cama» por ser fieles y naturales.
