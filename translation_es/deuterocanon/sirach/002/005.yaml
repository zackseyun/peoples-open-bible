revisions:
- from: Porque el oro es probado en el fuego[a], y los hombres aceptables en el horno de la aflicción.
  to: Pues el oro es probado en el fuego, y los hombres aceptados[a] en el horno de la aflicción.
  rationale: Se reubica la nota al lugar donde realmente existe la dificultad textual y se sustituye «hombres aceptables» por «hombres aceptados» para expresar de forma más natural y precisa en español el sentido de personas aprobadas/aceptadas que emerge del paralelo griego y de la justificación lexical del POB. También se ajusta «Porque» a «Pues» por mejor fluidez sapiencial, sin cambiar el sentido.
