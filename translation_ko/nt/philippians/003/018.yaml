id: PHP.3.18
reference: Philippians 3:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πολλοὶ γὰρ περιπατοῦσιν οὓς πολλάκις ἔλεγον ὑμῖν, νῦν δὲ καὶ κλαίων λέγω, τοὺς ἐχθροὺς τοῦ σταυροῦ τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/018.yaml
  text: For many walk[a], whom I often told you about, and now even weeping I say, are enemies of the cross of Messiah,
  footnotes:
  - marker: a
    text: Or, 'the cross of Christ.'
    reason: alternative_reading
translation:
  language: ko
  text: 왜냐하면 많은 자들이 메시아의[a] 십자가의 원수로 걸어가고 있기 때문입니다. 내가 여러분에게 그들에 관하여 여러 번 말하였고, 이제 또한 눈물을 흘리며 말합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도의 십자가」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_korean: 많은 자들
  alternatives_korean:
  - 여럿
  - 많은 사람
  lexicon: BDAG
  rationale: 형용사가 명사화되어 복수의 사람을 가리킨다. 「많은 자들」이 자연스럽고 격식에 맞는다.
- source_word: γὰρ
  english_pob_choice: For
  chosen_korean: 왜냐하면 ~ 때문입니다
  alternatives_korean:
  - 곧
  - 이는 ~ 이라
  lexicon: BDAG
  rationale: 앞 절의 권면(본받음)에 대한 근거를 제시한다. 「왜냐하면 ~ 때문이다」로 인과 관계를 분명히 한다.
- source_word: περιπατοῦσιν
  english_pob_choice: walk
  chosen_korean: 걸어가고 있기
  alternatives_korean:
  - 살고 있기
  - 행하고 있기
  lexicon: BDAG
  rationale: 17절과 일관되게 바울의 「걷다」 비유를 보존한다.
- source_word: πολλάκις ἔλεγον ὑμῖν
  english_pob_choice: I often told you
  chosen_korean: 여러 번 말하였고
  alternatives_korean:
  - 자주 일러 주었고
  - 누차 말했고
  lexicon: BDAG
  rationale: 미완료 ἔλεγον과 πολλάκις가 반복된 과거 행위를 표현. 「여러 번 말하였고」가 자연스럽다.
- source_word: νῦν δὲ καὶ κλαίων λέγω
  english_pob_choice: now even weeping I say
  chosen_korean: 이제 또한 눈물을 흘리며 말합니다
  alternatives_korean:
  - 이제는 울면서 말합니다
  - 지금 또한 눈물로 말합니다
  lexicon: BDAG
  rationale: 현재 분사 κλαίων이 화자의 감정을 동반한 동작. 「눈물을 흘리며 말하다」가 한국어로 가장 자연스럽고 격식 있는 표현.
- source_word: ἐχθροὺς
  english_pob_choice: enemies
  chosen_korean: 원수
  alternatives_korean:
  - 적
  - 적대자
  lexicon: BDAG
  rationale: 「원수」가 한국 성서 전통의 정착된 어휘이며, 격식과 어조 모두에 맞는다.
- source_word: σταυροῦ
  english_pob_choice: cross
  chosen_korean: 십자가
  lexicon: BDAG
  rationale: 「십자가」는 정착된 한국 성서 어휘이며 신학적 함의도 그대로 담는다.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 일관 원칙에 따라 칭호 Χριστός는 「메시아」. 「메시아의 십자가」 구절에서도 칭호의 무게가 살아 있다.
theological_decisions:
- issue: Χριστοῦ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 절은 이름형이 아니므로 본 번역의 기본 정책이 적용된다. 영어 전통(「Christ」)을 관성적으로 따르지 않고 칭호의 의미를 보존한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms; Χριστός → Messiah (where title; Christ where name-like).'
