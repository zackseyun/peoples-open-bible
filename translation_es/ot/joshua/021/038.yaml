    issue: '''Pastizales'' para מִגְרָשֶׁהָ'
    rationale: Aunque comunica una idea de pasto, no preserva con suficiente precisión el sentido técnico de terreno circundante asignado a la ciudad. En este tipo de listas levíticas, 'tierras de pasto' o similar refleja mejor el uso territorial y comunal.
  - severity: low
    issue: Notas b y c parcialmente redundantes
    rationale: La nota cultural y la nota de alternativa léxica explican casi el mismo punto. Puede mantenerse una nota cultural más clara y una nota separada con alternativas más directas.
