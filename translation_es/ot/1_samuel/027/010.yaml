translation:
  language: es
  text: 'Entonces Aquis dijo[a]: «¿Dónde hiciste hoy una incursión?» Y David dijo: «Contra el Néguev de Judá, contra el Néguev de los jerajmielitas[b] y contra el Néguev de los queneos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto hebreo literalmente dice algo como «¿No hiciste hoy una incursión?», pero el sentido en contexto es interrogativo: «¿Dónde hiciste hoy una incursión?»'
    reason: textual_variant
  - marker: b
    text: 'O: «el sur de Judá... el sur de los jerajmielitas... el sur de los queneos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל פְּשַׁטְתֶּם הַיּוֹם
  english_pob_choice: Where have you made a raid today?
  chosen_spanish: ¿Dónde hiciste hoy una incursión?
  alternatives_spanish:
  - ¿No hiciste hoy una incursión?
  - ¿Dónde asaltaste hoy?
  lexicon: HALOT
  rationale: El hebreo con אַל puede leerse literalmente como negación, pero el audit trail inglés ya documenta la fuerza interrogativa contextual. En español, «¿Dónde hiciste hoy una incursión?» conserva la pregunta y el sentido militar sin sonar forzado. «Incursión» comunica el acto de ataque/saqueo con suficiente precisión y dignidad.
- source_word: נֶגֶב
  english_pob_choice: Negev
  chosen_spanish: Néguev
  alternatives_spanish:
  - sur
  - región del sur
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico como topónimo cuando el inglés POB también lo hace. «Néguev» mantiene el valor territorial concreto mejor que «sur», que sería demasiado general en este contexto.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - hacia
  - en la zona de
  lexicon: HALOT
  rationale: Dado que David informa de objetivos de incursión, la preposición española adecuada es «contra», que expresa hostilidad y no mera localización.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio territorial/tribal estándar en español bíblico. «Judá» es la forma natural y fiel.
- source_word: הַיַּרְחְמְאֵלִי
  english_pob_choice: the Jerahmeelites
  chosen_spanish: los jerajmielitas
  alternatives_spanish:
  - los jerameelitas
  - el territorio de Jerahmeel
  lexicon: HALOT
  rationale: El hebreo es un gentilicio plural; por eso se traduce con un plural de pueblo/clan. «Jerajmielitas» conserva la base nominal y evita sustituirlo por una paráfrasis geográfica. Se prefiere esta transliteración coherente en español para reflejar el nombre propio del clan.
- source_word: הַקֵּינִי
  english_pob_choice: the Kenites
  chosen_spanish: los queneos
  alternatives_spanish:
  - los ceneos
  - el territorio de los queneos
  lexicon: HALOT
  rationale: Es un gentilicio. «Queneos» reproduce de manera clara y natural el nombre del pueblo en español contemporáneo. «Ceneos» es una variante tradicional posible, pero aquí se privilegia una forma más transparente y uniforme.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - preguntó
  lexicon: HALOT
  rationale: El verbo básico es «decir». Aunque el contexto incluye una pregunta, el hebreo usa el verbo común de habla, y «dijo» respeta esa simplicidad narrativa sin sobreinterpretar el tipo de acto de habla.
theological_decisions:
- issue: Tratamiento del nombre divino en este versículo
  english_pob_reading: No aparece YHWH in the surface English line, though the Hebrew geography includes a territorial name with YHWH elsewhere in the chapter; this verse itself does not require a divine-name decision.
  chosen_spanish_reading: No se introduce ninguna forma de nombre divino en el texto de este versículo.
  alternative_spanish_readings:
  - Yahvé
  rationale: El versículo no contiene el Tetragrámaton ni una cita directa donde deba decidirse entre máscara o nombre divino. Por fidelidad al pasaje, no se agrega ningún término teológico innecesario.
  doctrine_reference: Sola scriptura textual / fidelidad al texto base
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios pendientes en el pasaje base y el control cruzado indicó alta concordancia, con solo una observación menor ya absorbida en la elección interrogativa de la primera cláusula.'
  spanish_consistency_notes:
  - Se mantiene un español bíblico moderno y legible, sin ocultar el nombre divino donde no aparece en el texto.
  - 'Se conserva la distinción entre topónimos y gentilicios: Néguev como nombre geográfico, jerajmielitas y queneos como pueblos/clanes.'
  - Se evita la paráfrasis expansiva; la primera cláusula sigue la tensión hebrea entre negación y pregunta, resuelta en una nota.
  - 'El estilo verbal es narrativo directo: «dijo» para וַיֹּאמֶר, sin añadir matices no exigidos por el hebreo.'
