source:
  edition: SBLGNT
  text: τοῦτο γάρ ἐστιν θέλημα τοῦ θεοῦ, ὁ ἁγιασμὸς ὑμῶν, ἀπέχεσθαι ὑμᾶς ἀπὸ τῆς πορνείας,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/003.yaml
  text: 'For this is the will of God: your sanctification—that you abstain from sexual immorality[a][b].'
  footnotes:
  - marker: a
    text: Or 'your holiness.'
    reason: lexical_alternative
  - marker: b
    text: Greek porneia; a broad term for illicit sexual conduct. Traditionally, 'fornication.'
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님의 뜻은 바로 이것이니, 곧 여러분의 거룩함[a]입니다. 여러분이 음행[b]에서 떠나는 것이며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분의 성화」. 헬라어 ἁγιασμός는 거룩한 상태와 거룩하게 되어가는 과정 모두를 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 πορνεία는 부정한 성적 행위 전반을 가리키는 광의의 어휘. 전통적 옮김은 「음행」.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλημα τοῦ θεοῦ
  english_pob_choice: the will of God
  chosen_korean: 하나님의 뜻
