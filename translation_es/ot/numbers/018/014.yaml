    issue: '''consagrado'' es demasiado general para חֵרֶם'
    rationale: חֵרֶם en este contexto legal-sacerdotal es un término técnico de dedicación irrevocable, no simplemente algo consagrado en sentido amplio. 'Lo consagrado' puede diluir la carga legal/cultual preservada por el inglés 'devoted thing'.
  - severity: low
