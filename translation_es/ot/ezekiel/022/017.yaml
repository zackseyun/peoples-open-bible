lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... sucedió
  - Y ... aconteció
  lexicon: HALOT
  rationale: En esta fórmula profética, el wayyiqtol de היה funciona como introducción narrativa/secuencial. En español, 'vino' conserva la llegada de la revelación sin volver la frase artificialmente literal con 'sucedió'.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la expresión fija דְבַר יְהוָה, 'la palabra' preserva la fórmula profética y la referencia a un acto de revelación, no solo a un contenido abstracto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: El hebreo trae directamente el nombre divino, no un título. 'Yahvé' mantiene la forma del nombre propio en español y evita la sustitución por 'SEÑOR'.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa de manera natural con 'a mí' en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo; 'diciendo' conserva el tono formal profético y prepara la cita que sigue.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: 'La elección sigue el criterio del texto fuente: aparece el Tetragrámaton y no un título. ''Yahvé'' preserva el nombre personal del Dios del pacto, en línea con la política del POB.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética de introducción
  english_pob_reading: And the word ... came to me, saying,
  chosen_spanish_reading: Y la palabra ... vino a mí, diciendo,
  alternative_spanish_readings:
  - Y vino a mí la palabra ... diciendo,
  - Y la palabra ... me fue dirigida, diciendo,
  rationale: La construcción reproduce la fórmula hebrea y mantiene la relación entre la palabra recibida y el habla divina sin añadir explicaciones no presentes en el texto.
  doctrine_reference: Profetic revelation formula in Hebrew narrative
- issue: Puntuación y cadencia del discurso directo
  english_pob_reading: saying,
  chosen_spanish_reading: diciendo,
  alternative_spanish_readings:
  - y dijo,
  - con estas palabras,
  rationale: '''Diciendo,'' conserva la apertura al discurso directo y el registro sobrio del hebreo narrativo; no desplaza el contenido a una paráfrasis interpretativa.'
  doctrine_reference: Narrative/direct-speech convention
translation_notes:
  revision_awareness: El pasaje es una fórmula profética breve y de alta concordancia con el texto fuente; no hubo revisiones relevantes en el audit trail, y la versión española sigue esa estabilidad con una equivalencia óptima y terminología consistente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al criterio editorial del proyecto.
  - '''La palabra'' mantiene la fórmula profética fija de דְבַר יְהוָה.'
  - '''Diciendo'' conserva el encabezado de discurso directo sin añadir contenido.'
  - La puntuación con coma final reproduce la apertura de cita del original.
