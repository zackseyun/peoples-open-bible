translation:
  language: es
  text: Como canela y aspalato[a], di un aroma de especias; y como mirra escogida, derramé fragancia; como gálbano, onycha[b] y estacte, y como humo de incienso en el tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aspálato». La identificación exacta de ἀσπάλαθος es incierta; se conserva un transliterado para no fingir precisión botánica.
    reason: lexical_alternative
  - marker: b
    text: El griego ὄνυξ, en esta lista de incienso, se entiende tradicionalmente como «onycha», un ingrediente aromático, no la piedra preciosa ónice.
    reason: lexical_alternative
lexical_decisions:
- source_word: κιννάμωμον
  english_pob_choice: cinnamon
  chosen_spanish: canela
  alternatives_spanish:
  - cinamomo
  - cinnamon
  lexicon: LSJ
  rationale: El griego designa la especia aromática conocida como cinnamon; en español, 'canela' es el equivalente natural y ampliamente inteligible. 'Cinamomo' suena más técnico y menos transparente para un lector general.
- source_word: ἀσπάλαθος
  english_pob_choice: aspalathus
  chosen_spanish: aspalato
  alternatives_spanish:
  - aspálato
  - arbusto aromático
  lexicon: LSJ
  rationale: La identificación botánica es incierta. Conservé un transliterado españolizado para no fingir precisión donde el griego no la ofrece. 'Aspalato' mantiene la referencia específica y la tensión léxica documentada por la POB inglesa.
- source_word: ἀρωμάτων
  english_pob_choice: of spices
  chosen_spanish: de especias
  alternatives_spanish:
  - de aromas
  - de perfumes
  lexicon: LSJ
  rationale: El genitivo funciona con 'olor/aroma' en el contexto. 'De especias' preserva el sentido del genitivo y el registro poético sin volverlo explicativo en exceso.
- source_word: δέδωκα ὀσμήν
  english_pob_choice: I gave forth a scent
  chosen_spanish: di aroma
  alternatives_spanish:
  - di un olor
  - derramé aroma
  lexicon: LSJ
  rationale: En español, 'di aroma' conserva la idea de emisión/perfume con brevedad poética. Evité 'olor' porque suena menos culto y más neutro en español actual.
- source_word: σμύρνα ἐκλεκτή
  english_pob_choice: choice myrrh
  chosen_spanish: mirra escogida
  alternatives_spanish:
  - mirra selecta
  - mirra excelente
  lexicon: LSJ
  rationale: '''Escogida'' reproduce ἐκλεκτή con naturalidad y mantiene la calidad selecta del sustantivo. Es más bíblico y directo que opciones más técnicas.'
- source_word: διέδωκα εὐωδίαν
  english_pob_choice: I spread fragrance
  chosen_spanish: derramé fragancia
  alternatives_spanish:
  - difundí fragancia
  - esparcí fragancia
  lexicon: LSJ
  rationale: '''Derramar'' en español puede usarse poéticamente para un perfume o fragancia que se expande. Conserva el dinamismo del verbo griego sin necesidad de añadir ''dulce'' o ''agradable''.'
- source_word: χαλβάνη
  english_pob_choice: galbanum
  chosen_spanish: galbano
  alternatives_spanish:
  - galbano aromático
  lexicon: LSJ
  rationale: '''Galbano'' es el nombre español asentado para la resina. Mantiene la correspondencia directa con la lista de ingredientes de incienso.'
- source_word: ὄνυξ
  english_pob_choice: onycha
  chosen_spanish: ónice
  alternatives_spanish:
  - onycha
  - ónice
  lexicon: LSJ
  rationale: El término griego en listas de incienso suele referirse al ingrediente aromático tradicionalmente vertido como 'onycha'; sin embargo, en español 'ónice' conserva la forma etimológica y la familiaridad léxica. Aquí se conserva la tensión interpretativa mediante una transliteración asentada, sin cerrar artificialmente la identificación.
- source_word: στακτή
  english_pob_choice: stacte
  chosen_spanish: estacte
  alternatives_spanish:
  - stacte
  - estacta
  lexicon: LSJ
  rationale: '''Estacte'' reproduce el término tradicional para la sustancia aromática y es reconocible en contexto bíblico. Es preferible a una paráfrasis genérica como ''resina aromática''.'
- source_word: λίβανου ἀτμὶς
  english_pob_choice: the smoke of frankincense
  chosen_spanish: humo de incienso
  alternatives_spanish:
  - vaho de incienso
  - vapor de incienso
  lexicon: LSJ
  rationale: El referente es el incienso al arder, por lo que 'humo' es la opción más natural en español. 'Incienso' expresa aquí el material ritual, y el complemento evita tener que sobrecargar el verso con una especificación artificial.
- source_word: ἐν σκηνῇ
  english_pob_choice: in the tabernacle
  chosen_spanish: en el tabernáculo
  alternatives_spanish:
  - en la tienda
  - en la tienda sagrada
  lexicon: LSJ
  rationale: Aunque σκηνή significa literalmente 'tienda', en este contexto cultual la referencia es al Tabernáculo. Seguí la decisión auditada de la POB inglesa porque el marco de incienso del versículo apunta claramente a ese espacio sagrado.
theological_decisions:
- issue: Referente cultual de σκηνή
  english_pob_reading: in the tabernacle
  chosen_spanish_reading: en el tabernáculo
  alternative_spanish_readings:
  - en la tienda
  - en la carpa
  rationale: La secuencia de ingredientes del incienso remite al culto del santuario, por lo que 'tabernáculo' comunica mejor la referencia bíblica que una traducción meramente literal de 'tienda'. En este caso no se pierde tensión teológica, porque el contexto la resuelve de forma suficiente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Imágenes aromáticas en primera persona
  english_pob_reading: I gave forth a scent / I spread fragrance
  chosen_spanish_reading: di aroma / derramé fragancia
  alternative_spanish_readings:
  - di un perfume
  - difundí fragancia
  rationale: El texto presenta a la Sabiduría hablando en imagen poética. Mantener verbos de emisión y expansión preserva la metáfora sin añadir interpretaciones devocionales ajenas al griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB en dos puntos clave: mantiene la secuencia cultual de ingredientes aromáticos y preserva ''tabernáculo'' para σκηνή. También evita añadir ''dulce'' a fragancia, en consonancia con la revisión que retiró ese matiz interpretativo. En español, además, se optó por una solución más natural para εὐωδίαν (''fragancia'') y para ἀτμὶς (''humo''), sin debilitar el registro litúrgico.'
  spanish_consistency_notes:
  - 'Se unificó el tratamiento de los aromáticos con sustantivos concretos y naturales en español: canela, mirra, galbano, estacte.'
  - Se mantuvo un transliterado para ἀσπάλαθος por la incertidumbre léxica documentada.
  - Se prefirió 'tabernáculo' sobre 'tienda' por la fuerte señal cultual del contexto.
  - Se evitó 'Cristo', 'SEÑOR' o fórmulas interpretativas no presentes en el verso.
  - El texto resultante conserva paralelismo poético y lista ritual sin sobreexplicar.
