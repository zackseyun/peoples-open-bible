  to: Ahora no había alimento[a] en toda la tierra, porque la hambruna era muy severa; y la tierra de Egipto y la tierra de Canaán languidecían[b] a causa de la hambruna.
  rationale: Se ajusta לֶחֶם a «alimento» en el texto principal para reflejar su uso metonímico contextual, dejando «pan» en nota como alternativa literal. Se cambia הָרָעָב a «hambruna» para expresar mejor la calamidad regional. Se conserva «languidecían» por buena fidelidad al hebreo figurado y a la revisión auditada en inglés, y se reubica la nota correspondiente al verbo para que el anclaje sea correcto.
