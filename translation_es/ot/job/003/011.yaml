translation:
  language: es
  text: ¿Por qué no morí desde el vientre,[a] y salí de las entrañas[b] y expiré?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el seno materno»; el hebreo usa dos términos corporales maternos relacionados pero distintos en paralelo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del vientre»; el hebreo usa aquí un término distinto del anterior, aunque ambos se refieren al cuerpo materno en contexto de nacimiento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y morí» o «y exhalé mi último aliento»; el verbo hebreo aquí es distinto del anterior y puede enfatizar el expirar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Para qué razón?
  lexicon: HALOT
  rationale: Interrogativo natural de causa en español; conserva el tono de lamento y la pregunta retórica del hebreo.
- source_word: מֵרֶחֶם
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde la matriz
  lexicon: HALOT
  rationale: רֶחֶם denota el órgano materno. En español, 'vientre' comunica la imagen corporal concreta con buena fluidez; la nota preserva la alternativa más literal 'seno materno' para reflejar el lenguaje corporal del hebreo.
- source_word: אָמ֑וּת
  english_pob_choice: did I die
  chosen_spanish: morí
  alternatives_spanish:
  - debí morir
  - habría muerto
  lexicon: HALOT
  rationale: En esta queja poética, el imperfecto hebreo funciona como pregunta lamentosa sobre la no-ocurrencia de la muerte; 'morí' en la interrogación mantiene la fuerza idiomática sin añadir perífrasis excesiva.
- source_word: מִבֶּטֶן
  english_pob_choice: from the belly
  chosen_spanish: del seno
  alternatives_spanish:
  - del vientre
  - del útero
  lexicon: HALOT
  rationale: בֶּטֶן puede referirse a barriga/vientre. Se eligió 'seno' para diferenciarlo de רֶחֶם dentro del paralelismo, manteniendo el campo maternal sin repetir exactamente la misma palabra española.
- source_word: יָצָאתִי
  english_pob_choice: did I come out
  chosen_spanish: salí
  alternatives_spanish:
  - salí al mundo
  - emergí
  lexicon: HALOT
  rationale: El verbo expresa salir/emerger; 'salí' conserva la sencillez concreta del hebreo y funciona bien en paralelismo con el nacimiento implícito.
- source_word: וְאֶגְוָע
  english_pob_choice: and expire
  chosen_spanish: y expiré
  alternatives_spanish:
  - y exhalé mi último aliento
  - y morí
  lexicon: HALOT
  rationale: גוע suele matizar la muerte como expirar/breath one's last. 'Expiré' preserva la distinción semántica respecto de אָמוּת en español.
theological_decisions:
- issue: Diferencia entre dos términos maternos paralelos (רֶחֶם / בֶּטֶן)
  english_pob_reading: The Hebrew uses two related but distinct maternal-body terms in parallel.
  chosen_spanish_reading: El hebreo usa dos términos corporales maternos relacionados pero distintos en paralelo.
  alternative_spanish_readings:
  - El hebreo repite el mismo sentido con palabras distintas.
  - 'El hebreo usa dos imágenes del nacimiento: vientre y seno.'
  rationale: Se conserva la tensión léxica del paralelismo y no se nivela ambos vocablos a una sola palabra española, porque el audit trail subraya una diferencia intencional.
  doctrine_reference: Poética hebrea; paralelismo semántico
- issue: Distinción verbal entre 'morir' y 'expirar'
  english_pob_reading: The verb here is distinct from the earlier 'die' and may emphasize expiring.
  chosen_spanish_reading: Se distingue 'morí' de 'expiré' para reflejar que el segundo verbo sugiere el último aliento.
  alternative_spanish_readings:
  - y morí
  - y perecí
  rationale: La traducción mantiene la diferencia verbal señalada por el POB inglés y evita borrar el matiz de גוע.
  doctrine_reference: Lexicografía bíblica; matiz verbal en poesía hebrea
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó una segunda repetición de ''Why did I'' para dejar una sola interrogativa inicial con cláusulas paralelas. La redacción española sigue esa estructura: un solo ''¿Por qué'' al inicio y luego dos miembros coordinados.'
  spanish_consistency_notes:
  - Se mantiene el tono poético y lamentativo sin añadir explicaciones interpretativas al texto principal.
  - '''Vientre'' y ''seno'' se usan de forma diferenciada para conservar el paralelismo observado en el hebreo.'
  - '''Expiré'' conserva la diferencia semántica frente a ''morí'' y evita homogeneizar los dos verbos.'
  - La puntuación con coma antes de la segunda cláusula refleja una sola pregunta de lamento con coordinación interna.
