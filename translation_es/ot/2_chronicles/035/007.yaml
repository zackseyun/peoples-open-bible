translation:
  language: es
  text: Josías dio al pueblo animales del rebaño[a], corderos y cabritos; todo ello para las ofrendas de Pascua[b], para todos los que estaban presentes, en número de treinta mil, y tres mil de ganado vacuno. Estas eran de las posesiones del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Animales del rebaño» refleja el colectivo hebreo צֹאן; también puede entenderse como «ganado menor».
    reason: lexical_alternative
  - marker: b
    text: El plural hebreo פְּסָחִים puede referirse colectivamente a los animales u ofrendas de Pascua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶם
  english_pob_choice: contributed
  chosen_spanish: contribuyó
  alternatives_spanish:
  - dio
  - ofreció
  - presentó
  - aportó
  lexicon: HALOT
  rationale: El hifil de רום aquí expresa el acto de proveer o hacer una contribución, no la idea literal de “levantar”. «Contribuyó» comunica bien el suministro real de Josías sin convertirlo en una acción sacrificial personal.
- source_word: לִבְנֵי הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a los hijos del pueblo
  - a la gente
  - a los laicos
  - a la población
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a los hijos del pueblo», pero el audit trail inglés ya reconoció que la expresión apunta al pueblo reunido y no exige conservar la forma filial en español. «Al pueblo» suena natural y mantiene el sentido colectivo sin perder la referencia al conjunto de participantes no levíticos.
- source_word: צֹאן
  english_pob_choice: from the flock
  chosen_spanish: con ganado menor
  alternatives_spanish:
  - del rebaño
  - con pequeños animales de ganado
  - con ovinos y caprinos
  lexicon: HALOT
  rationale: צֹאן es un colectivo de ganado menor; en español «ganado menor» conserva el valor colectivo y evita restringir innecesariamente a ovejas solamente. Se adapta bien al paralelismo con «corderos y cabritos».
- source_word: כְּבָשִׂים וּבְנֵי עִזִּים
  english_pob_choice: lambs and young goats
  chosen_spanish: corderos y cabritos
  alternatives_spanish:
  - corderos y cabras jóvenes
  - ovejas y cabritos
  - corderos y cabritos jóvenes
  lexicon: HALOT
  rationale: כְּבָשִׂים designa corderos/ovejas jóvenes y בְנֵי עִזִּים literalmente «hijos de cabras», es decir, cabritos. «Cabritos» es el equivalente natural y fiel en español; «corderos» preserva el valor sacrificial y etario.
- source_word: הַכֹּל לַפְּסָחִים
  english_pob_choice: all of them for the Passover offerings
  chosen_spanish: todo ello para las ofrendas de Pascua
  alternatives_spanish:
  - todo para los sacrificios de Pascua
  - todo ello para los Pascuas
  - todo ello para los animales de Pascua
  lexicon: HALOT
  rationale: El plural פְּסָחִים puede referirse a las ofrendas/animales pascuales en conjunto. «Ofrendas de Pascua» comunica la función cultual sin caer en un plural extraño en español como «Pascuas».
- source_word: לְכָל הַנִּמְצָא
  english_pob_choice: for all who were present
  chosen_spanish: para todos los que estaban presentes
  alternatives_spanish:
  - para todos los presentes
  - para todos los hallados allí
  - para cuantos se encontraban allí
  lexicon: HALOT
  rationale: El participio nifal de מצא aquí se entiende como los reunidos o presentes. «Que estaban presentes» conserva el sentido contextual y es claro en español bíblico moderno.
- source_word: לְמִסְפַּר שְׁלֹשִׁים אֶלֶף
  english_pob_choice: to the number of thirty thousand
  chosen_spanish: en número de treinta mil
  alternatives_spanish:
  - por número de treinta mil
  - para un total de treinta mil
  - sumando treinta mil
  lexicon: HALOT
  rationale: La frase hebrea da el total de animales suministrados. «En número de» refleja bien la construcción y suena natural en español formal.
- source_word: וּבָקָר שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: and three thousand cattle
  chosen_spanish: y tres mil reses vacunas
  alternatives_spanish:
  - y tres mil cabezas de ganado
  - y tres mil bovinos
  - y tres mil cabezas de res
  lexicon: HALOT
  rationale: בָּקָר es ganado vacuno/cattle. «Reses vacunas» mantiene precisión semántica y registro digno; evita sobreinterpretar como toros u oxen, y preserva el carácter colectivo del término.
- source_word: מֵרְכוּשׁ הַמֶּלֶךְ
  english_pob_choice: from the king’s possessions
  chosen_spanish: de las posesiones del rey
  alternatives_spanish:
  - de la propiedad del rey
  - de los bienes del rey
  - de la hacienda del rey
  lexicon: HALOT
  rationale: רְכוּשׁ denota bienes, posesiones o propiedad. «Posesiones» es claro y directo, y conserva la idea de recursos reales empleados para el culto.
translation_notes:
  revision_awareness: El texto español sigue de cerca la revisión inglesa más reciente que prefirió «the people» sobre «the sons of the people», pero conserva el matiz hebreo en la nota al pie mediante «ganado menor» para צֹאן y explica el plural cultual de פְּסָחִים. La formulación fue ajustada para sonar natural en español sin perder la contabilidad precisa de animales ni el origen real de los recursos.
  spanish_consistency_notes:
  - Se mantuvo «Pascua» para פֶּסַח/פְּסָחִים conforme al uso bíblico en español, pero se evitó traducir el plural de forma mecánica como «Pascuas».
  - Se usó «corderos» y «cabritos» para reflejar la especificación etaria/cultual del hebreo, en armonía con el valor del inglés POB.
  - «Posesiones del rey» conserva el sentido patrimonial de רְכוּשׁ sin introducir una connotación jurídica más fuerte que la requerida por el texto.
