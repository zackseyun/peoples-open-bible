translation:
  language: es
  text: Porque de Hesbón ha salido fuego, una llama de la ciudad de Sihón; ha consumido a Ar de Moab, a los señores[a] de los lugares altos[b] del Arnón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dueños/poseedores de los lugares altos del Arnón». La expresión «señores de» refleja de forma más directa el hebreo בַּעֲלֵי.
    reason: alternative_reading
  - marker: b
    text: O «las alturas del Arnón». La frase hebrea puede referirse a los lugares altos asociados con la región del Arnón o, en sentido más general, a sus alturas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa/causal del dicho poético anterior. «Porque» conserva bien el valor de fundamento en español bíblico moderno sin sonar forzado.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: HALOT
  rationale: Equivale de manera directa al sustantivo hebreo y mantiene el paralelismo con «llama» en el segundo hemistiquio.
- source_word: יָצְאָה
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido de
  - ha emergido
  lexicon: HALOT
  rationale: El perfecto poético comunica una acción ya desatada. «Ha salido» conserva la imagen de algo que se expande desde un lugar de origen.
- source_word: מֵחֶשְׁבּוֹן
  english_pob_choice: from Heshbon
  chosen_spanish: de Heshbón
  alternatives_spanish:
  - desde Heshbón
  lexicon: HALOT
  rationale: Topónimo transliterado según el uso bíblico en español; «de» reproduce la relación de procedencia del hebreo.
- source_word: לֶהָבָה
  english_pob_choice: a flame
  chosen_spanish: una llama
  alternatives_spanish:
  - una flama
  - una llamarada
  lexicon: HALOT
  rationale: «Llama» es el correlato natural de «fuego» y preserva el paralelismo poético sin intensificar más de lo que el texto exige.
- source_word: מִקִּרְיַת סִיחֹן
  english_pob_choice: from the city of Sihon
  chosen_spanish: de la ciudad de Sihón
  alternatives_spanish:
  - de Quiriat de Sihón
  - de la ciudad de Sijón
  lexicon: HALOT
  rationale: קִרְיָה significa «ciudad», y el contexto pide la referencia descriptiva. Se evita «Quiriat» para no oscurecer el sustantivo común en esta construcción.
- source_word: אָכְלָה
  english_pob_choice: it has consumed
  chosen_spanish: ha consumido
  alternatives_spanish:
  - ha devorado
  - ha comido
  lexicon: HALOT
  rationale: La metáfora del fuego que «come» se expresa de forma natural con «ha consumido», manteniendo el sentido destructivo del verbo.
- source_word: עָר מוֹאָב
  english_pob_choice: Ar of Moab
  chosen_spanish: Ar de Moab
  alternatives_spanish:
  - la ciudad de Moab
  lexicon: HALOT
  rationale: Se toma עָר como topónimo propio, no como el sustantivo «ciudad», siguiendo la lectura auditada del POB en inglés.
- source_word: בַּעֲלֵי
  english_pob_choice: the lords of
  chosen_spanish: los señores de
  alternatives_spanish:
  - los dueños de
  - los poseedores de
  lexicon: HALOT
  rationale: «Señores de» preserva el matiz de autoridad/posesión que refleja בַּעַל en plural constructo y mantiene el registro poético.
- source_word: בָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos
  - los lugares elevados
  lexicon: HALOT
  rationale: Aunque el sentido léxico puede ser «lugares altos» o «alturas», en español «lugares altos» conserva la ambigüedad geográfica y evita una traducción que suene demasiado técnica o rígida.
- source_word: אַרְנֹן
  english_pob_choice: the Arnon
  chosen_spanish: el Arnón
  alternatives_spanish:
  - Arnón
  lexicon: HALOT
  rationale: Se conserva el nombre del wadi/río con artículo en español, conforme al uso geográfico habitual y a la lectura inglesa auditada.
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantiene sin cambios en la última revisión; el borrador español sigue esa línea y conserva las dos decisiones de ambigüedad documentadas: בָּמוֹת y בַּעֲלֵי.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se transliteran los nombres propios Heshbón, Sihón, Moab y Arnón de manera consistente con el español bíblico estándar.
  - Se preserva el paralelismo poético «fuego/llama» y la fuerza verbal consumativa de אָכְלָה con «ha consumido».
  - Se evita «Cristo», «SEÑOR» u այլ masking conventions porque no corresponden al hebreo de este versículo.
  - La elección «señores» deja visible la tensión lexical de בַּעֲלֵי sin resolverla por interpretación.
