translation:
  language: es
  text: Guardaron duelo, lloraron y ayunaron hasta la tarde por Saúl, por Jonatán, su hijo[a], por el pueblo de Yahvé y por la casa de Israel, porque habían caído a espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Jonatán su hijo», identificando específicamente a Jonatán como hijo de Saúl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְפְּדוּ
  english_pob_choice: they mourned
  chosen_spanish: hicieron duelo
  alternatives_spanish:
  - guardaron luto
  - lamentaron
  lexicon: HALOT
  rationale: ספד expresa duelo formal por los muertos. En español, «hicieron duelo» conserva el sentido de lamento fúnebre sin volverse demasiado interpretativo; «guardaron luto» puede sonar más a un estado social prolongado que al acto mismo.
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - sollozaron
  - se lamentaron llorando
  lexicon: HALOT
  rationale: בכה significa llorar/llorar amargamente. «Lloraron» mantiene la sencillez y distingue esta acción del duelo expresado por el verbo anterior.
- source_word: וַיָּצֻמוּ
  english_pob_choice: fasted
  chosen_spanish: ayunaron
  alternatives_spanish:
  - se abstuvieron de comer
  - guardaron ayuno
  lexicon: HALOT
  rationale: צום se refiere al ayuno como acto de aflicción o devoción. «Ayunaron» es la correspondencia natural y directa en español.
- source_word: עַד הָעָרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: La expresión marca el límite temporal del duelo. «Hasta la tarde» es clara en español y preserva el valor de duración sin añadir más precisión de la que da el hebreo.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En esta serie, עַל introduce a quienes son objeto del duelo. «Por» es la forma más natural en español para expresar duelo en favor de o a causa de alguien.
- source_word: יְהוֹנָתָן בְּנוֹ
  english_pob_choice: Jonathan his son
  chosen_spanish: Jonatán, su hijo
  alternatives_spanish:
  - Jonatán, hijo de él
  - Jonatán, hijo de Saúl
  lexicon: HALOT
  rationale: La construcción hebrea identifica específicamente a Jonatán como hijo de Saúl. «Jonatán, su hijo» preserva la aposición y mantiene la relación familiar explícita; una nota aclara la identificación.
- source_word: עַם יְהוָה
  english_pob_choice: the people of Yahweh
  chosen_spanish: el pueblo de Yahvé
  alternatives_spanish:
  - el pueblo de Yahvé
  - el pueblo del SEÑOR
  lexicon: HALOT
  rationale: עַם יְהוָה significa el pueblo perteneciente a Yahvé. Se conserva «Yahvé» conforme a la terminología del proyecto, manteniendo el nombre divino y la relación de pertenencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se vierte con el nombre divino transliterado. En español, «Yahvé» conserva la decisión doctrinal del POB y evita la sustitución por un título.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el hogar de Israel
  - la familia de Israel
  lexicon: HALOT
  rationale: La expresión idiomática designa al conjunto del pueblo de Israel. «Casa de Israel» reproduce el giro bíblico de forma transparente.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la causa de la acción previa. «Porque» expresa de manera directa la razón del duelo.
- source_word: נָפְל֖וּ
  english_pob_choice: they had fallen
  chosen_spanish: habían caído
  alternatives_spanish:
  - cayeron
  - habían sucumbido
  lexicon: HALOT
  rationale: נפל en contexto bélico puede implicar muerte en combate. «Habían caído» conserva la formulación bíblica y el valor retrospectivo del relato.
- source_word: בֶּחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - en combate
  lexicon: HALOT
  rationale: La expresión hebrea usa la espada como metonimia de muerte violenta en batalla. «A espada» es una forma natural y fiel en español; mantiene la imagen sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Cómo traducir el nombre divino יְהוָה en esta unidad
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto menciona explícitamente el nombre propio divino, no un simple título. Se mantiene la transliteración tradicional del POB en español para preservar la decisión lexical-teológica y la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail en inglés, sin cambios revisionales pendientes; la decisión clave ya asentada es la transliteración de יְהוָה como «Yahvé» y la preservación de la aposición «Jonatán, su hijo».
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal con tres acciones coordinadas: duelo, llanto y ayuno.'
  - «A espada» conserva la imagen concreta del hebreo y la lectura de muerte violenta en combate.
  - Se prefirió «casa de Israel» por ser una expresión bíblica estable y transparente.
  - La puntuación separa con comas los destinatarios del duelo para reflejar la enumeración hebrea.
