review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: recuerdo/mención de la bondad de Dios seguido por canto jubiloso por su צדקה. Sin embargo, se aparta del rastro auditado del POB en dos puntos significativos: (1) cambia el matiz principal de רַב de «abundante» a «gran», cuando el audit trail favorece explícitamente la idea de abundancia/plenitud; (2) invierte la decisión teológica/lexical principal para וְצִדְקָתְךָ, poniendo «justicia» en el texto y «rectitud» en nota, mientras que el POB inglés fijó «righteousness» como lectura principal y «justice» como alternativa. Además, la nota [a] repite esencialmente el texto principal en vez de preservar la alternativa documentada.'
  spanish_quality_summary: El español es legible y digno, pero «harán brotar el recuerdo» suena algo forzado. «Derramarán el recuerdo» también sería raro; una solución más natural es «harán brotar el recuerdo» o «proclamarán el recuerdo», pero dado el énfasis del POB en la metáfora de נבע, puede mantenerse «harán brotar» aunque no sea la opción más idiomática. «Cantarán con gozo» es correcto. La mayor mejora de legibilidad y fidelidad es ajustar «gran bondad» a «bondad abundante» y «justicia» a «rectitud» en el texto principal.
  glossary_alignment: 'No hay conflicto con términos de glosario mayores como Yahvé/Mesías. Sí hay desalineación con la política del proyecto para términos de justicia/rectitud: debe preservarse la tensión semántica sin colapsar el término, y aquí el rastro inglés ya resolvió que la lectura principal sea «righteousness». En español, «rectitud» preserva mejor esa amplitud que «justicia» como principal, dejando «justicia» en nota.'
  issues:
  - severity: high
    issue: La lectura principal de וְצִדְקָתְךָ no sigue la decisión auditada del POB.
    rationale: El inglés POB estableció «your righteousness» como texto principal y «your justice» como alternativa. El español invierte esto sin justificación suficiente, alterando una decisión teológica/lexical significativa.
  - severity: medium
    issue: La nota [a] no preserva la alternativa documentada.
    rationale: El texto principal ya dice «el recuerdo de tu gran bondad», y la nota [a] repite lo mismo. La alternativa auditada era esencialmente «la remembranza/el recuerdo» frente a «la memoria», no una duplicación del texto.
  - severity: medium
    issue: «gran bondad» debilita el matiz de abundancia en רַב.
    rationale: Aunque «gran bondad» es posible, el rastro lexical del POB prefirió explícitamente «abundant». «Bondad abundante» refleja mejor la plenitud cuantitativa/expansiva del hebreo.
  - severity: low
    issue: «harán brotar el recuerdo» es algo rígido en español.
    rationale: Preserva la metáfora de נבע, pero suena menos natural. Aun así, no es un error grave y puede aceptarse si se prioriza la vividez metafórica.
  revised_spanish_text: Ellos harán brotar el recuerdo de tu bondad abundante[a], y cantarán con gozo de tu rectitud[b].
  revised_footnotes:
