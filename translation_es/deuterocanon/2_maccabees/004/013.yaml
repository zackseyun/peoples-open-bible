    issue: '''intensificación de las costumbres extranjeras'' traduce de manera imprecisa πρόσβασις ἀλλοφυλισμοῦ'
    rationale: πρόσβασις en contexto apunta a aumento, avance o incursión/propagación de prácticas foráneas. 'Intensificación' desplaza el foco hacia una abstracción de grado y no hacia la expansión de dichas costumbres.
  - severity: low
    issue: La nota al pie usa 'invasión', mientras el texto principal usa 'intensificación'
    rationale: La relación entre texto y nota queda menos coherente de lo ideal. Si el texto principal se ajusta a 'aumento', la nota alternativa 'invasión de costumbres extranjeras' funciona mejor como matiz más fuerte.
  revised_spanish_text: Y hubo así un auge del helenismo y un aumento de las costumbres extranjeras, a causa de la desmedida desvergüenza de Jasón[a], que era impío y no el sumo sacerdote.
