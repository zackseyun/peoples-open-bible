revisions:
- from: 'Será un estatuto perpetuo[a] por todas sus generaciones, en todos sus lugares de habitación: no comerán grasa ni sangre.'
  to: 'Será un estatuto perpetuo[a] a lo largo de sus generaciones, en todas sus moradas: no comerán grasa ni sangre.'
  rationale: Se conserva la fidelidad léxica y teológica del borrador, pero se mejora la naturalidad y legibilidad del español. «A lo largo de sus generaciones» expresa mejor la continuidad de לְדֹרֹתֵיכֶם, y «en todas sus moradas» reemplaza una expresión poco idiomática sin pérdida de sentido respecto de בְּכֹל מוֹשְׁבֹתֵיכֶם.
