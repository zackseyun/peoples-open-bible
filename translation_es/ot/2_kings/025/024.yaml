  yaml_path: translation/ot/2_kings/025/024.yaml
  text: Gedaliah swore to them and to their men[a], and said to them, “Do not be afraid of the servants of the Chaldeans. Live in the land and serve the king of Babylon[b], and it will go well for you.”
