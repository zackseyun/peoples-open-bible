translation:
  language: es
  text: Cualquiera que toque un cadáver[a] de cualquier persona[b] quedará impuro durante siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un cuerpo muerto’ o, más literalmente, ‘el muerto’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘de toda persona/alma de hombre’, es decir, cualquier ser humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּגֵעַ
  english_pob_choice: Whoever touches
  chosen_spanish: Cualquiera que toque
  alternatives_spanish:
  - El que toque
  - Quien toque
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera sustantiva y general. En español, 'Cualquiera que toque' conserva el valor legal/generérico y suena natural en registro bíblico contemporáneo.
- source_word: בְּמֵת
  english_pob_choice: a dead body
  chosen_spanish: un cadáver
  alternatives_spanish:
  - un cuerpo muerto
  - el muerto
  lexicon: HALOT
  rationale: Después de 'toque', 'un cadáver' comunica con claridad la realidad concreta del contacto ritual. En español es más natural que una calca como 'el muerto', y mantiene el referente físico del hebreo.
- source_word: לְכָל נֶפֶשׁ אָדָם
  english_pob_choice: of any person
  chosen_spanish: de una persona
  alternatives_spanish:
  - de cualquier ser humano
  - de cualquier persona
  lexicon: HALOT
  rationale: La construcción hebrea especifica el alcance humano general. 'De una persona' mantiene la referencia a un ser humano sin introducir masculinidad genérica, coherente con el sentido legal del pasaje.
- source_word: וְטָמֵא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - y será impuro
  lexicon: HALOT
  rationale: El valor consecuente/futuro del perfecto con waw en contexto legal se expresa bien con 'quedará impuro'. Conserva la consecuencia ritual prescrita sin sonar forzado.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - siete días
  - durante siete días
  lexicon: HALOT
  rationale: La duración temporal se expresa de forma idiomática en español con 'por siete días', que mantiene la extensión del estado de impureza.
theological_decisions:
- issue: אדם como referente humano genérico
  english_pob_reading: person
  chosen_spanish_reading: persona
  alternative_spanish_readings:
  - hombre
  - ser humano
  rationale: El hebreo אָדָם aquí amplía el alcance a cualquier ser humano, no a un varón específico. 'Persona' preserva esa amplitud sin perder naturalidad en español.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el análisis auditado coincide con el texto base y no requiere ajuste adicional.'
  spanish_consistency_notes:
  - Se mantiene impuro para טָמֵא en contexto ritual/legal.
  - Se evita 'SEÑOR' u otros equivalentes no pertinentes; el versículo no contiene el nombre divino.
  - '''Persona'' se usa para אָדָם en sentido genérico humano, evitando masculinidad implícita.'
  - Las notas al pie conservan las alternativas léxicas relevantes del auditable inglés POB y explican el hebreo subyacente.
