translation:
  language: es
  text: Él te ha dicho, Oh hombre[a], qué es bueno; y ¿qué exige Yahvé de ti, sino hacer justicia, amar el amor leal[b], y andar humildemente con tu Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa «hombre» en singular como dirección representativa a un oyente humano.
    reason: cultural_note
  - marker: b
    text: O «amar la misericordia», «amar la bondad» o «amar la fidelidad de pacto». El hebreo חֶסֶד abarca el sentido de amor leal y firme dentro de la relación de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגִּיד
  english_pob_choice: He has told
  chosen_spanish: te ha declarado
  alternatives_spanish:
  - te ha dicho
  - te ha hecho saber
  - te ha anunciado
  lexicon: HALOT
  rationale: הִגִּיד comunica hacer saber o declarar. En español, "te ha declarado" conserva la idea de revelación previa con vigencia presente y suena natural en un registro bíblico digno.
- source_word: אָדָם
  english_pob_choice: O man
  chosen_spanish: oh hombre
  alternatives_spanish:
  - oh ser humano
  - humanidad
  - oh humano
  lexicon: HALOT
  rationale: El hebreo usa un singular representativo y masculino. "Oh hombre" preserva esa dirección singular y la fuerza retórica sin neutralizar el término.
- source_word: מַה טּוֹב
  english_pob_choice: what is good
  chosen_spanish: qué es bueno
  alternatives_spanish:
  - qué es lo bueno
  - qué cosa es buena
  lexicon: HALOT
  rationale: טוֹב es un término moral amplio. "Qué es bueno" reproduce con naturalidad la pregunta del texto sin estrecharla indebidamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. "Yahvé" preserva el nombre propio sin sustituirlo por una máscara litúrgica.
- source_word: דּוֹרֵשׁ מִמְּךָ
  english_pob_choice: require of you
  chosen_spanish: exige de ti
  alternatives_spanish:
  - requiere de ti
  - demanda de ti
  - te pide
  lexicon: HALOT
  rationale: דרש con מן expresa lo que se requiere o se exige. "Exige de ti" mantiene el peso ético del contexto y resulta idiomático en español.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - excepto que
  - más que
  - sino más bien
  lexicon: HALOT
  rationale: 'En esta construcción exceptiva, "sino" reproduce bien el giro retórico: no pregunta en abstracto, sino que delimita lo requerido por contraste.'
- source_word: עֲשׂוֹת מִשְׁפָּט
  english_pob_choice: to do justice
  chosen_spanish: hacer justicia
  alternatives_spanish:
  - practicar la justicia
  - obrar justicia
  - hacer lo justo
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí es justicia en sentido ético. "Hacer justicia" es una equivalencia española directa, fiel y ampliamente inteligible.
- source_word: אַהֲבַת חֶסֶד
  english_pob_choice: to love steadfast love
  chosen_spanish: amar la misericordia
  alternatives_spanish:
  - amar el amor leal
  - amar la bondad
  - amar la fidelidad de pacto
  lexicon: HALOT
  rationale: חֶסֶד tiene un rango amplio; en español, "misericordia" es la alternativa tradicional más clara y natural, aunque no agota el trasfondo de lealtad de pacto. La nota conserva esa tensión semántica sin borrarla.
- source_word: הַצְנֵעַ לֶכֶת
  english_pob_choice: to walk humbly
  chosen_spanish: andar humildemente
  alternatives_spanish:
  - caminar humildemente
  - vivir con humildad
  - andar con modestia
  lexicon: HALOT
  rationale: La expresión adverbial pide una conducta de humildad. "Andar humildemente" mantiene el verbo de movimiento/andar y el matiz ético de la frase hebrea.
- source_word: עִם אֱלֹהֶיךָ
  english_pob_choice: with your God
  chosen_spanish: con tu Dios
  alternatives_spanish:
  - ante tu Dios
  - junto a tu Dios
  lexicon: HALOT
  rationale: עִם se traduce con "con" para conservar la relación cercana y covenantal del texto. "Tu Dios" respeta la segunda persona singular.
theological_decisions:
- issue: Rango semántico de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor leal
  - bondad
  - fidelidad de pacto
  rationale: La POB inglesa preserva la tensión entre amor leal y afecto misericordioso. En español, "misericordia" es la forma más reconocible para lectura pública, pero la nota mantiene abiertas las alternativas para no reducir el alcance covenantal del término.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Dirección representativa de אָדָם
  english_pob_reading: O man
  chosen_spanish_reading: oh hombre
  alternative_spanish_readings:
  - humanidad
  - ser humano
  rationale: El vocativo singular masculino funciona representativamente para el oyente humano. Se conserva la forma masculina singular por fidelidad al hebreo y a la decisión doctrinal de no neutralizar el término cuando el texto lo marca así.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'require from you' a 'require of you' por naturalidad. En español se adoptó una equivalencia igualmente idiomática ('exige de ti') sin perder el valor interrogativo-exceptivo de כִּי אִם ni el peso ético del mandato.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la segunda persona singular en todo el verso para reflejar el hebreo.
  - Se prefirió un registro bíblico claro y publicable, evitando arcaísmos innecesarios.
  - La ambigüedad de חֶסֶד se conserva con nota, en vez de fijarla reductivamente a una sola opción.
