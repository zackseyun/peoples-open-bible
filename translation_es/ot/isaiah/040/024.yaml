translation:
  language: es
  text: Apenas son plantados[a], apenas son sembrados, apenas su tallo ha echado raíces en la tierra; y aun sopla sobre ellos, y se secan, y una tormenta[b] los lleva como rastrojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Difícilmente son plantados... difícilmente su tallo ha echado raíces en la tierra». La repetición hebrea intensifica cuán pronto queda deshecho su ascenso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un torbellino» en lugar de «una tormenta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף בַּל
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - difícilmente
  - ni siquiera
  lexicon: HALOT
  rationale: 'La combinación repetida expresa negación enfática con sentido temporal: algo ocurre y casi de inmediato queda deshecho. En español, «apenas» reproduce bien esa rapidez y el énfasis progresivo mejor que una negación plana.'
- source_word: נִטָּעוּ
  english_pob_choice: are planted
  chosen_spanish: son plantados
  alternatives_spanish:
  - han sido plantados
  lexicon: HALOT
  rationale: Es pasivo de נטע. El presente pasivo conserva la secuencia poética y el valor proverbial/imagen de establecimiento de reyes o poderosos como si fueran árboles recién puestos.
- source_word: זֹרָעוּ
  english_pob_choice: are sown
  chosen_spanish: son sembrados
  alternatives_spanish:
  - han sido sembrados
  lexicon: HALOT
  rationale: Mantiene el paralelismo agrícola con «son plantados». «Sembrados» es el equivalente natural en español para el pasivo de זרע.
- source_word: שֹׁרֵשׁ
  english_pob_choice: has taken root
  chosen_spanish: ha echado raíces
  alternatives_spanish:
  - se ha enraizado
  - ha enraizado
  lexicon: HALOT
  rationale: Aunque la forma hebrea es poco usual en contexto, el sentido es que el tallo/tronco aún no está firmemente establecido. «Ha echado raíces» es idiomático en español y conserva la imagen de consolidación.
- source_word: גִּזְעָם
  english_pob_choice: their stem
  chosen_spanish: su tronco
  alternatives_spanish:
  - su tallo
  - su estirpe
  lexicon: HALOT
  rationale: גזע puede ser tronco, stock o tallo. En español, «tronco» mantiene la imagen vegetal sin forzar una precisión arbórea excesiva; el sufijo plural se refleja con «su» en sentido colectivo.
- source_word: נָשַׁף
  english_pob_choice: blows
  chosen_spanish: sopla
  alternatives_spanish:
  - exhala
  - hace soplar
  lexicon: HALOT
  rationale: El verbo significa soplar o respirar. «Sopla sobre ellos» conserva la acción mínima y directa atribuida al sujeto implícito, sin introducir más intensidad de la que el hebreo exige.
- source_word: וַיִּבָשׁוּ
  english_pob_choice: they wither
  chosen_spanish: se secan
  alternatives_spanish:
  - se marchitan
  - se agostan
  lexicon: HALOT
  rationale: יבש puede significar secarse o marchitarse. «Se secan» conserva la imagen vegetal y el efecto inmediato del soplo; también enlaza con la paja del final.
- source_word: סְעָרָה
  english_pob_choice: a storm
  chosen_spanish: un torbellino
  alternatives_spanish:
  - una tormenta
  - un vendaval
  - un huracán
  lexicon: HALOT
  rationale: El sustantivo puede denotar tormenta, tempestad o torbellino. «Torbellino» preserva mejor el sentido de fuerza arrebatadora que puede sugerir también «whirlwind», una alternativa destacada en el aparato inglés.
- source_word: כַּקַּשׁ
  english_pob_choice: like stubble
  chosen_spanish: como paja
  alternatives_spanish:
  - como rastrojo
  - como caña seca
  lexicon: HALOT
  rationale: קשׁ es residuo vegetal seco de cosecha. En español, «paja» es más accesible y mantiene la imagen de material liviano y fácilmente arrastrable; «rastrojo» sería más técnico.
- source_word: תִּשָּׂאֵם
  english_pob_choice: carries them away
  chosen_spanish: los lleva
  alternatives_spanish:
  - los arrastra
  - los arrebata
  lexicon: HALOT
  rationale: נשא aquí tiene la idea de llevar o alzar lejos. «Los lleva» es simple y fiel; en contexto, el complemento «como paja» ya comunica el desarraigo y la facilidad con que son removidos.
theological_decisions:
- issue: Sujeto implícito de «él sopla sobre ellos»
  english_pob_reading: God is the implied subject
  chosen_spanish_reading: Dios es el sujeto implícito conservado por el pronombre «él»
  alternative_spanish_readings:
  - sopla sobre ellos un viento impersonal
  - él = el viento
  rationale: En el contexto inmediato, el mismo agente que rebaja a los gobernantes sigue actuando. Mantener «él» en español preserva la agencia personal divina sin añadir el nombre divino donde el hebreo no lo repite explícitamente.
  doctrine_reference: Isaías 40:23–24; soberanía divina sobre los poderosos
- issue: Valor de la repetición «apenas... apenas... apenas...»
  english_pob_reading: The Hebrew repetition intensifies how quickly their rise is undone.
  chosen_spanish_reading: La repetición intensifica lo breve y frágil de su establecimiento
  alternative_spanish_readings:
  - solo... solo... solo...
  - ni bien... ni bien... ni bien...
  rationale: La triple repetición no es mera redundancia; subraya que su ascenso queda deshecho casi antes de afirmarse. «Apenas» preserva ese efecto retórico sin suavizar la tensión poética.
  doctrine_reference: Poética hebrea; Isaías 40:24
- issue: Metáfora vegetal aplicada a gobernantes
  english_pob_reading: Metaphorical rulers as plants/stems
  chosen_spanish_reading: La metáfora vegetal se conserva en plantados, sembrados, tronco y raíces
  alternative_spanish_readings:
  - interpretación abstracta sin imagen vegetal
  - traducción literal rígida
  rationale: La imagen de poderosos tratados como vegetación es parte del argumento del pasaje. Conservarla en español evita perder la ironía y el contraste entre aparente firmeza y fragilidad real.
  doctrine_reference: Isaías 40:23–24; soberanía y futilidad del poder humano
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios, con alta concordancia entre el texto inglés POB y el control cruzado. Por eso no se introdujeron ajustes textuales adicionales más allá de la adaptación al español y la conservación de la fuerza poética del hebreo.
  spanish_consistency_notes:
  - Se usó «apenas» de forma repetida para reflejar אַף בַּל sin borrar la intensificación.
  - Se mantuvo la metáfora agrícola/arbórea con «plantados», «sembrados», «tronco» y «raíces».
  - Se preservó el sujeto implícito divino con «él», conforme al contexto de Isaías 40:23–24.
  - Se eligió «torbellino» para recoger la fuerza de סְעָרָה y la variante tradicional «whirlwind» reconocida en el aparato inglés.
  - No se reemplazó «paja» por un término más técnico porque el español aquí gana claridad y naturalidad sin perder la imagen de residuo ligero.
