translation:
  language: es
  text: Y en el tercer año de su reinado[a], envió a sus oficiales—Ben-hail, Obadías, Zacarías, Netanel y Micaías—para enseñar en las ciudades de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus príncipes' o 'sus líderes'; el término hebreo puede denotar funcionarios reales o administrativos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת שָׁלֹושׁ
  english_pob_choice: And in the third year
  chosen_spanish: Y en el tercer año
  alternatives_spanish:
  - Ahora bien, en el tercer año
  - En el tercer año
  lexicon: HALOT
  rationale: La secuencia narrativa queda natural en español con 'Y en'. 'Tercer año' conserva la referencia temporal directa sin añadir matices no presentes en el hebreo.
- source_word: לְמָלְכ֗וֹ
  english_pob_choice: of his reign
  chosen_spanish: de su reinado
  alternatives_spanish:
  - de su realeza
  - de su gobierno
  lexicon: HALOT
  rationale: '''Reinado'' expresa bien el período en que gobierna un rey y es el equivalente idiomático de la frase hebrea con sufijo pronominal. Mantiene el sentido real sin volverse técnico en exceso.'
- source_word: שָׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: '''Envió'' es el verbo más directo y natural para שׁלח en este contexto de comisión oficial.'
- source_word: לְשָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: a sus oficiales
  alternatives_spanish:
  - a sus príncipes
  - a sus líderes
  lexicon: HALOT
  rationale: '''שַׂר'' puede abarcar príncipe, jefe o funcionario. Dado el contexto administrativo y la misión de enseñanza, ''oficiales'' conserva la función sin sugerir nobleza hereditaria. Se sigue la lectura preferida del POB en inglés.'
- source_word: לְבֶן חַיִל
  english_pob_choice: Ben-hail
  chosen_spanish: Ben-hail
  alternatives_spanish:
  - Ben-Hail
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera, no se traduce. Se conserva la forma con guion por claridad onomástica.
- source_word: וּלְעֹבַדְיָה וְלִזְכַרְיָה וְלִנְתַנְאֵל וּלְמִיכָיָהוּ
  english_pob_choice: Obadiah, Zechariah, Nethanel, and Micaiah
  chosen_spanish: Obadías, Zacarías, Netanel y Micaías
  alternatives_spanish:
  - Obadiah, Zechariah, Nethanel y Micaiah
  - Abdías, Zacarías, Natanael y Miqueas
  lexicon: HALOT
  rationale: Se transliteran los nombres propios según uso español bíblico sobrio y reconocible. 'Netanel' conserva la forma hebrea del texto, en lugar de normalizarla a 'Natanael', para no borrar la forma específica del מקור.
- source_word: לְלַמֵּד
  english_pob_choice: to teach
  chosen_spanish: para enseñar
  alternatives_spanish:
  - para instruir
  - a enseñar
  lexicon: HALOT
  rationale: '''למד'' en piel aquí significa enseñar. En español, ''para enseñar'' es natural y comunica la finalidad de la comisión. ''Instruir'' sería posible, pero menos directo.'
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - por las ciudades de Judá
  - en las urbes de Judá
  lexicon: HALOT
  rationale: La preposición local se conserva con 'en'. 'Judá' mantiene el topónimo bíblico usual en español, y 'ciudades' refleja el plural geográfico sin sobreinterpretar la extensión distributiva.
theological_decisions:
- issue: Término para los enviados de la corte
  english_pob_reading: his officials; the Hebrew term can denote royal or administrative officials
  chosen_spanish_reading: sus oficiales
  alternative_spanish_readings:
  - sus príncipes
  - sus líderes
  rationale: El hebreo שׂרים admite varias cargas semánticas. En esta escena de organización educativa, 'oficiales' comunica mejor la función administrativa. No se convierte en 'príncipes' para evitar una lectura demasiado aristocrática que el contexto no exige.
  doctrine_reference: Uso semántico contextual del hebreo שַׂר; no implica una doctrina específica, sino precisión léxica histórica.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con la solución inglesa aprobada y no requiere ampliaciones interpretativas. Se conserva la estructura narrativa, la comisión nominal y el propósito didáctico, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo exija explícitamente; en este versículo no aparece el nombre divino.
  - Se preserva 'Judá' como topónimo estándar y no se añade glosa geográfica.
  - Los nombres propios se transliteran de forma consistente y no se sustituyen por equivalentes más conocidos cuando eso borraría la forma hebrea concreta.
  - '''Oficiales'' refleja la función administrativa destacada por el POB inglés y evita una equivalencia eclesiástica no motivada.'
