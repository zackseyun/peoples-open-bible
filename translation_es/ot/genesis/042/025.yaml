base_translation:
  language: en
  yaml_path: translation/ot/genesis/042/025.yaml
  text: Then Joseph gave orders to fill their containers with grain[a], to return each man's silver to his sack, and to give them provisions for the journey[d][c][b]. And so it was done for them.
  footnotes:
  - marker: a
    text: Or, 'their vessels'; the Hebrew term is broader than 'sack,' which appears later in the verse as a different word.
    reason: lexical_alternative
  - marker: b
    text: '''Silver'' can also mean ''money'' in context.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'And he did so for them.' The Hebrew does not emphasize the agent as strongly as English often does.
    reason: lexical_alternative
  - marker: d
    text: Or 'And it was done for them that way.'.
    reason: previous_rendering
