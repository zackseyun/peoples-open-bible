translation:
  language: es
  text: 'David dijo a Aquis[a]: «Entonces sabrás lo que hará tu siervo». Y Aquis dijo a David: «Muy bien[b], te pondré por guardián de mi cabeza todos tus días».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «lo que hará tu siervo». La formulación de David es deliberadamente ambigua: puede oírse como lo que hará, sin precisar todavía en qué consistirá su acción.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «guardián de mi cabeza»; es decir, un protector personal o guardia de cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT
  rationale: El sustantivo עבד puede designar esclavo o servidor, pero el POB inglés ya documenta la opción más fuerte para preservar el valor léxico. En español, «esclavo» mantiene esa fuerza semántica y evita suavizar el término más allá de lo que permite el hebreo, aunque el contexto sea de cortesía.
- source_word: תֵדַע
  english_pob_choice: you will know
  chosen_spanish: sabrás
  alternatives_spanish:
  - conocerás
  - llegarás a saber
  lexicon: HALOT
  rationale: ידע expresa «saber/conocer». Dado que el hebreo enfatiza al sujeto con אַתָּה, el español simple «sabrás» conserva la claridad y la fuerza directa sin añadir un pronombre innecesario.
- source_word: אֲשֶׁר יַעֲשֶׂה
  english_pob_choice: what ... will do
  chosen_spanish: lo que hará
  alternatives_spanish:
  - lo que hará tu esclavo
  - lo que tu esclavo hará
  lexicon: HALOT
  rationale: El POB revisado prefirió una traducción más cercana al hebreo, pero el contexto sigue dejando una ambigüedad pragmática sobre acción/capacidad. «Lo que hará» refleja el futuro verbal del hebreo; la ambigüedad se conserva sin forzar «podrá hacer».
- source_word: לָכֵן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Como marcador discursivo de respuesta, לָכֵן funciona aquí de manera inferencial y prospectiva. «Entonces» suena natural en español y mantiene el avance del diálogo.
- source_word: שֹׁמֵר
  english_pob_choice: keeper of my head
  chosen_spanish: guardián
  alternatives_spanish:
  - guarda
  - custodio
  - protector
  lexicon: HALOT
  rationale: שֹׁמֵר es literalmente «guarda/guardián». Aquí se combina con לְרֹאשִׁי y designa una función de protección personal; «guardián» conserva el sentido básico sin introducir la especificación interpretativa de «guardaespaldas».
- source_word: לְרֹאשִׁי
  english_pob_choice: keeper of my head
  chosen_spanish: de mi cabeza
  alternatives_spanish:
  - de mi persona
  - de mí
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «para mi cabeza». El POB inglés revisado decidió volver a la literalidad; el español mantiene esa imagen con «de mi cabeza», porque el giro idiomático puede conservarse sin perder inteligibilidad.
- source_word: אֲשִׂימְךָ
  english_pob_choice: I will make you
  chosen_spanish: te pondré
  alternatives_spanish:
  - te haré
  - te nombraré
  - te colocaré
  lexicon: HALOT
  rationale: שׂים significa «poner, establecer, nombrar». «Te pondré» reproduce bien la imagen de asignación de un cargo, y evita sobreinterpretar una ceremonia formal que el texto no explicita.
- source_word: כָּל הַיָּמִים
  english_pob_choice: for all your days
  chosen_spanish: todos los días
  alternatives_spanish:
  - por todos tus días
  - para siempre
  - siempre
  lexicon: HALOT
  rationale: Literalmente, «todos los días». En español puede expresarse de forma compacta y natural como «todos los días», preservando la duratividad; el contexto de servicio continuo lo hace suficientemente claro.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: en David, se mantuvo la forma más cercana al hebreo («lo que hará»), y en Aquis se prefirió la literalidad de שֹׁמֵר לְרֹאשִׁי («guardián de mi cabeza») en vez de una paráfrasis interpretativa como «guardaespaldas».'
  spanish_consistency_notes:
  - Se conserva «Aquis» para el nombre propio siguiendo la convención española habitual derivada del hebreo.
  - Se usa «esclavo» para עבד por la decisión léxica del proyecto cuando se busca fuerza semántica, aun en un contexto cortesano.
  - No se introduce «Señor» ni otras sustituciones litúrgicas; el verso no contiene el Tetragrámaton ni κύριος.
  - La puntuación y comillas siguen el uso español moderno con diálogo directo claro.
