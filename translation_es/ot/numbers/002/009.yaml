- from: Todos los contados para el campamento de Judá fueron 186.400, por sus divisiones. Saldrán primero.
  to: Todos los registrados para el campamento de Judá fueron 186.400, por sus divisiones. Se pondrán en marcha primero.
  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad contextual: ''registrados'' comunica mejor el sentido de censo de הַפְּקֻדִים que ''contados'', y ''se pondrán en marcha'' refleja mejor יִסָּעוּ en el marco del orden de marcha del campamento. No hacen falta notas adicionales porque las alternativas del inglés no crean nueva ambigüedad obligatoria en español.'
