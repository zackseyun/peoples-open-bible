    text: Hebrew literally, “a daughter of Levi.” In genealogical contexts, “daughter” can sometimes function more broadly for a female descendant.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “whom she bore to Levi in Egypt,” with the mother left implicit.
    reason: lexical_alternative
