  rationale: Se corrigen las notas para que coincidan con las decisiones léxicas documentadas y con sus anclajes reales en el texto. También se aligera «sino que» a «pero» para reflejar mejor la coordinación hebrea sin sobreinterpretar. Se mantiene «bestia feroz», «por ella» y «los redimidos» porque preservan adecuadamente el sentido fuente y la distinción teológica documentada.
