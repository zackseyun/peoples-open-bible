base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/014.yaml
  text: Then David said to all his servants who were with him in Jerusalem[a], “Arise, and let us flee, for there will be no escape for us from Absalom. Hurry to depart[c][b], lest he quickly overtake us and bring disaster upon us and strike the city with the edge of the sword.”
  footnotes:
  - marker: a
    text: Or 'Hurry to leave.' The Hebrew is literally 'Hurry to go,' an urgent command to depart at once.
    reason: lexical_alternative
  - marker: b
    text: Or 'bring evil upon us.' Here 'evil' refers to calamity or disaster, not moral evil.
    reason: lexical_alternative
  - marker: c
    text: Literally 'with the mouth of the sword,' a Hebrew idiom meaning death by the sword.
    reason: lexical_alternative
