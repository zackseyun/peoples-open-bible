base_translation:
  language: en
  yaml_path: translation/ot/zechariah/013/003.yaml
  text: And it will happen that if a man still prophesies[a], his father and his mother who bore him will say to him, ‘You shall not live, because you have spoken lies in the name of Yahweh’[b]; and his father and his mother who bore him will pierce him through when he prophesies.
  footnotes:
  - marker: a
    text: Or 'when a man again prophesies.' The Hebrew עוֹד can indicate continued or renewed action.
    reason: lexical_alternative
  - marker: b
    text: Or 'will stab him' or 'will thrust him through.' The Hebrew verb denotes piercing with a weapon.
    reason: lexical_alternative
