translation:
  language: es
  text: Por un poco de tiempo[a], como por un instante, está quieto en vano; luego, por los terrores de su corazón[b], es sacudido, como quien huye de delante de un perseguidor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de la segunda mitad del versículo es difícil. La lectura de la Geniza de El Cairo compara al que duerme con quien huye de un perseguidor; el paralelo griego, de manera similar, dice: «como quien ha escapado de la faz de la guerra».'
    reason: textual_variant
  - marker: b
    text: 'El testimonio hebreo continúa en algunas divisiones de línea con redacción adicional sobre una visión del alma; el paralelo griego amplía la idea con «en sueños, como en día de guardia». La traducción principal sigue el sentido compartido más claro: el reposo es breve y el terror interior vuelve pronto.'
    reason: alternative_reading
lexical_decisions:
- source_word: מעט
  english_pob_choice: for a little while
  chosen_spanish: por un poco
  alternatives_spanish:
  - por un breve tiempo
  - por un poco de tiempo
  lexicon: HALOT
  rationale: El hebreo expresa brevedad temporal. «Por un poco» conserva la idea de duración mínima sin volverla demasiado explicativa.
- source_word: לריק
  english_pob_choice: in vain
  chosen_spanish: casi nada
  alternatives_spanish:
  - en vano
  - para nada
  lexicon: HALOT
  rationale: El contexto transmite una quietud breve y vacía; «casi nada» intenta reflejar esa vaciedad con naturalidad en español, sin perder el matiz de inutilidad/insuficiencia.
- source_word: כרגע
  english_pob_choice: like a moment
  chosen_spanish: como un instante
  alternatives_spanish:
  - como un momento
  - por un instante
  lexicon: HALOT
  rationale: La comparación apunta a instantaneidad. En la frase completa, la idea queda absorbida en «por un poco»; se mantiene el valor adverbial breve en el ritmo de la línea.
- source_word: ישקוט
  english_pob_choice: he is quiet
  chosen_spanish: en reposo
  alternatives_spanish:
  - está quieto
  - permanece en calma
  lexicon: HALOT
  rationale: El verbo denota quietud/reposo. «En reposo» es natural en español y mantiene el estado temporal de calma descrito por el hebreo y corroborado por el griego con ἐν ἀναπαύσει.
- source_word: ומבין
  english_pob_choice: then, from
  chosen_spanish: y desde eso
  alternatives_spanish:
  - y desde allí
  - y a partir de eso
  lexicon: HALOT
  rationale: El hebreo es difícil y el testimonio griego sugiere transición desde el reposo hacia otra experiencia. «Y desde eso» intenta conservar la referencia anafórica y la transición, sin forzar una interpretación más precisa de la que el texto permite.
- source_word: בהלות לבו
  english_pob_choice: the terrors of his heart
  chosen_spanish: la turbación de su corazón
  alternatives_spanish:
  - los terrores de su corazón
  - los espantos de su corazón
  lexicon: HALOT
  rationale: בהלות puede expresar terrores, alarmas o pánico. «Turbación» suena natural en español y preserva la agitación interior; la nota de sentido se mantiene en la frase siguiente y en la evidencia griega de una visión interior perturbadora.
- source_word: נרעש
  english_pob_choice: he is shaken
  chosen_spanish: turbado
  alternatives_spanish:
  - sacudido
  - estremecido
  lexicon: HALOT
  rationale: El verbo hebreo implica agitación o sacudimiento. «Turbado» comunica esa perturbación interior y funciona bien con el sujeto implícito de la línea.
- source_word: כשריד בורח מפני רודף
  english_pob_choice: like one fleeing from before a pursuer
  chosen_spanish: como quien ha escapado de delante de la guerra
  alternatives_spanish:
  - como un sobreviviente que huye de un perseguidor
  - como quien huye de un perseguidor
  lexicon: HALOT
  rationale: La tradición hebrea es textual y léxicamente difícil en esta cola; el griego paralelo dice «como quien ha escapado de la faz de la guerra». Por eso se traduce con una imagen de huida y escape sin sobreprecisar si el trasfondo exacto es un perseguidor humano o la guerra misma.
theological_decisions:
- issue: Imagen de descanso breve frente a perturbación interior
  english_pob_reading: Rest is brief and inward terror quickly returns.
  chosen_spanish_reading: El reposo es brevísimo y la turbación interior vuelve enseguida.
  alternative_spanish_readings:
  - El descanso es vano y muy breve
  - La quietud apenas dura un instante
  rationale: 'No hay doctrina polémica aquí, pero sí una tensión literaria: el texto contrasta reposo momentáneo con miedo interno recurrente. La redacción española conserva esa tensión sin suavizarla en exceso.'
  doctrine_reference: Sabiduría/antropología bíblica en Sirácida; sin referencia doctrinal específica
translation_notes:
  revision_awareness: 'La versión inglesa POB optó por una equivalencia óptima que simplifica el hebreo difícil y armoniza con el paralelo griego. Esta versión española sigue la misma línea de cautela: conserva la brevedad del reposo, la irrupción de la turbación interior y la imagen final de huida, sin resolver en exceso las ambigüedades textuales.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo» fuera del versículo porque no aparecen en este pasaje.
  - Se prefirió «turbado/turbación» para conservar un español natural donde el hebreo permite varios matices de agitación.
  - Se usó «guerra» en la nota y la traducción para reflejar el griego πολέμου, mientras que el cuerpo principal conserva la imagen de huida sin imponer un referente único.
