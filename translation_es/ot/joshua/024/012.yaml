translation:
  language: es
  text: Y envié delante de ustedes[a] al avispón, y expulsó de delante de ustedes a los dos reyes de los amorreos, no con tu espada ni con tu arco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente una expresión figurada para pánico o terror enviados por Dios, en lugar de un avispón literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  english_pob_choice: And I sent
  chosen_spanish: Y envié
  alternatives_spanish:
  - Entonces envié
  - Envié
  lexicon: HALOT
  rationale: El wayyiqtol de 1cs narra una acción pasada de Yahvé. «Y envié» conserva la secuencia narrativa sin añadir matiz temporal no exigido por el hebreo.
- source_word: לִפְנֵיכֶם
  english_pob_choice: ahead of you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - por delante de ustedes
  lexicon: HALOT
  rationale: La expresión idiomática hebrea significa ir/pasar antes de la presencia de alguien. En español, «delante de ustedes» comunica bien esa idea en un registro natural y claro.
- source_word: הַצִּרְעָה
  english_pob_choice: the hornet
  chosen_spanish: la avispa
  alternatives_spanish:
  - el avispón
  - el enjambre de avispas
  - el terror
  lexicon: HALOT
  rationale: El término designa un insecto de la familia de las avispas/avispones. «Avispa» conserva el valor léxico concreto sin sustituirlo por una interpretación. Se mantiene la posibilidad figurada en nota.
- source_word: וַתְּגָרֶשׁ
  english_pob_choice: and it drove them out
  chosen_spanish: y ella los expulsó
  alternatives_spanish:
  - y los echó
  - y los arrojó fuera
  lexicon: HALOT
  rationale: El verbo גרשׁ expresa expulsar o echar fuera. «Ella» refleja el sujeto femenino singular («la avispa») y «expulsó» mantiene la fuerza del verbo con un español sobrio y preciso.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de ante ustedes
  lexicon: HALOT
  rationale: Con גרשׁ, el hebreo indica remoción de la presencia de Israel. «De delante de ustedes» conserva el giro idiomático y su fuerza direccional.
- source_word: שְׁנֵי מַלְכֵי הָאֱמֹרִי
  english_pob_choice: the two kings of the Amorites
  chosen_spanish: a los dos reyes de los amorreos
  alternatives_spanish:
  - a los dos reyes amorreos
  - a los dos reyes del amorreo
  lexicon: HALOT
  rationale: La construcción en hebreo identifica a dos reyes concretos pertenecientes al pueblo amorreo. «De los amorreos» es natural en español y conserva la referencia étnica/cultural sin forzar una perífrasis.
- source_word: לֹא בְחַרְבְּךָ
  english_pob_choice: not by your sword
  chosen_spanish: no con tu espada
  alternatives_spanish:
  - no por tu espada
  - no mediante tu espada
  lexicon: HALOT
  rationale: El ב instrumental se expresa de forma natural en español con «con». Se mantiene el singular posesivo para reflejar la dirección individual del discurso.
- source_word: וְלֹא בְקַשְׁתֶּךָ
  english_pob_choice: and not by your bow
  chosen_spanish: ni con tu arco
  alternatives_spanish:
  - ni por tu arco
  - ni mediante tu arco
  lexicon: HALOT
  rationale: La coordinación negativa paralela se reproduce con «ni», que suena más natural en español que repetir «y no». «Arco» conserva el instrumento militar del texto.
theological_decisions:
- issue: ¿Traducir הַצִּרְעָה literalmente o interpretarla como terror/pánico divinamente enviado?
  english_pob_reading: The main text keeps 'the hornet' and a footnote notes the figurative possibility.
  chosen_spanish_reading: El texto principal conserva «la avispa» como término concreto, con nota para la posible lectura figurada.
  alternative_spanish_readings:
  - el terror
  - el pánico
  - un envío de terror
  rationale: La forma léxica concreta está atestiguada por el hebreo y no conviene reemplazarla por una interpretación. La nota preserva la tensión exegética documentada y deja abierta la posibilidad de que el término funcione figuradamente.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el borrador inglés y el hebreo; no se requieren revisiones sustanciales. Se mantuvo el valor concreto de צִּרְעָה con nota de alternativa figurada, y se ajustó la instrumentación hebrea al español natural con «con» y la coordinación negativa con «ni».
  spanish_consistency_notes:
  - Se usó «Yahvé» implícitamente por tratarse de la voz divina en primera persona; el versículo no lo nombra explícitamente en el hebreo de esta línea.
  - Se evitó «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto.
  - «Avispa» se eligió como equivalente léxico principal para mantener el referente concreto sin eliminar la ambigüedad interpretativa.
  - Se prefirió «de los amorreos» por ser más natural que el calco rígido «amorreo» en español.
  - «Espada» y «arco» conservan el paralelismo militar y la negación enfática del texto fuente.
