  - severity: low
    issue: '''He aquí'' suena más arcaizante de lo necesario'
    rationale: El hebreo הֵן es una partícula de atención. En español eclesial moderno, 'Miren' conserva mejor esa fuerza deíctica con mayor naturalidad que 'He aquí'.
  - severity: medium
