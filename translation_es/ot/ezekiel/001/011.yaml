    reason: lexical_alternative
  - marker: b
    text: Literalmente, "para cada uno, dos estaban unidas, cada una con la de la otra, y dos cubrían sus cuerpos". La frase hebrea es distributiva y compacta.
    reason: lexical_alternative
  revision_rationale: Se rehízo la cláusula inicial para evitar la discordancia de género/número del borrador y para expresar con español natural la idea de separación/extensión hacia arriba que el hebreo permite. Se mantuvo el contenido semántico y se afinó la nota b para reflejar mejor la reciprocidad distributiva del original.
