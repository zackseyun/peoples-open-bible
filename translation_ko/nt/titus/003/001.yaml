id: TIT.3.1
reference: Titus 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὑπομίμνῃσκε αὐτοὺς ⸀ἀρχαῖς ἐξουσίαις ὑποτάσσεσθαι πειθαρχεῖν, πρὸς πᾶν ἔργον ἀγαθὸν ἑτοίμους εἶναι,
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/001.yaml
  text: Remind them to be subject to rulers and authorities[a], to be obedient, to be ready for every good work,
  footnotes:
  - marker: a
    text: Or 'to submit to rulers and authorities, to obey.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그들에게 통치자들과 권세자들에게 복종하고[a] 순응하며, 모든 선한 일에 준비되어 있어야 함을 일깨워 주십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「통치자들과 권세자들에게 굴복하고 순종하라」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπομίμνῃσκε
  english_pob_choice: Remind
  chosen_korean: 일깨워 주십시오
  alternatives_korean:
  - 상기시키십시오
  - 기억하게 하십시오
  lexicon: BDAG
  rationale: ὑπομιμνῄσκω는 「기억하게 하다·상기시키다」. 합쇼체 명령형 「일깨워 주십시오」가 자연스럽고 권면적 어감이 살아 있다.
- source_word: ἀρχαῖς ἐξουσίαις
  english_pob_choice: rulers and authorities
  chosen_korean: 통치자들과 권세자들
  alternatives_korean:
  - 정사와 권세
  - 권력자들과 당국자들
  lexicon: BDAG
  rationale: ἀρχή는 「통치」, ἐξουσία는 「권세·권한」. 시민 권력 문맥. 「통치자들과 권세자들」이 명료한 한국어 등가어.
- source_word: ὑποτάσσεσθαι
  english_pob_choice: be subject to
  chosen_korean: 복종하고
  alternatives_korean:
  - 순복하고
  - 굴복하고
  lexicon: BDAG
  rationale: ὑποτάσσομαι의 표준 등가어 「복종」.
- source_word: πειθαρχεῖν
  english_pob_choice: be obedient
  chosen_korean: 순응하며
  alternatives_korean:
  - 순종하며
  - 따르며
  lexicon: BDAG
  rationale: πειθαρχέω는 「설득되어 따르다」. ὑποτάσσομαι와 구분하여 「순응」으로 옮긴다.
- source_word: πρὸς πᾶν ἔργον ἀγαθὸν ἑτοίμους εἶναι
  english_pob_choice: be ready for every good work
  chosen_korean: 모든 선한 일에 준비되어 있어야
  alternatives_korean:
  - 모든 선한 일에 채비된 자가 되어야
  - 어떤 선한 일이든 할 준비가 되어 있어야
  lexicon: BDAG
  rationale: 1:16의 πᾶν ἔργον ἀγαθόν과 일관되게 「모든 선한 일」.
