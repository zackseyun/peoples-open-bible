translation:
  language: es
  text: y el altar del holocausto, con todos sus utensilios, y la fuente[a] con su soporte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el lavacro con su base'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar de la ofrenda quemada
  - el altar del sacrificio quemado
  - el altar del holocausto
  lexicon: HALOT
  rationale: מִזְבַּח es 'altar' y הָעֹלָה nombra la ofrenda totalmente consumida por fuego. En español bíblico, 'holocausto' transmite de manera estable esa ofrenda quemada por completo; evita una paráfrasis más larga y conserva la fuerza sacrificial del término.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus implementos
  - todos sus objetos
  lexicon: HALOT
  rationale: כְּלִי tiene un campo amplio, pero en el contexto del altar la referencia concreta son los instrumentos o piezas de servicio. 'Utensilios' es natural en español moderno y mantiene la concreción del original. El posesivo se refiere al altar.
- source_word: הַכִּיֹּר
  english_pob_choice: the basin
  chosen_spanish: el lavacro
  alternatives_spanish:
  - la pila
  - la fuente
  - la artesa
  lexicon: HALOT
  rationale: כִּיּוֹר puede rendirse como 'basin' o 'laver'. Dado que en español 'laver' no es transparente, 'lavacro' conserva el término tradicional del mobiliario del santuario y sigue siendo comprensible en registro bíblico. Se prefiere aquí por fidelidad terminológica y claridad litúrgica.
- source_word: כַּנּוֹ
  english_pob_choice: its stand
  chosen_spanish: su base
  alternatives_spanish:
  - su soporte
  - su pedestal
  - su pie
  lexicon: HALOT
  rationale: כֵּן designa el apoyo o fundamento del lavacro. 'Base' reproduce bien la función del objeto y coincide con la alternativa documentada en el audit trail inglés; 'soporte' o 'pedestal' serían posibles, pero menos directos.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - y también
  lexicon: HALOT
  rationale: El marcador de objeto con conjunción se vierte naturalmente como 'y' en español. No se intenta reproducir el marcador sintáctico hebreo, sino su función coordinadora en la lista de objetos santificados.
translation_notes:
  revision_awareness: El texto sigue de cerca la segmentación del hebreo y coincide con el sentido verificado en el audit trail inglés. Se conservó la lista de objetos del santuario con el paralelismo coordinado y se mantuvo la alternativa tradicional para כִּיּוֹר en nota, ya que el español puede oscilar entre 'lavacro' y 'lavatorio/basin' según registro.
  spanish_consistency_notes:
  - Se usó 'holocausto' para הָעֹלָה, en continuidad con el uso bíblico español de ofrenda totalmente quemada.
  - '''Utensilios'' conserva el alcance amplio de כֵּלִים sin volverlo abstracto.'
  - '''Lavacro'' y ''base'' mantienen una terminología de santuario comprensible y alineada con la alternativa textual del audit trail.'
