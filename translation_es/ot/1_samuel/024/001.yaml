  text: Entonces David subió de allí y se quedó en las fortalezas de En-guedí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente; en español narrativo, «subió» conserva de forma natural ese sentido direccional sin perder precisión.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de ahí
  lexicon: HALOT
  rationale: Es un adverbio deíctico simple; «de allí» es la opción más natural y fiel en español.
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - se estableció
  - vivió
  lexicon: HALOT
  rationale: ישב puede significar sentarse, permanecer o habitar. En una secuencia de desplazamiento, «se quedó» comunica que permaneció allí por un tiempo sin sugerir de inmediato residencia permanente.
- source_word: בִּמְצָדוֹת
  english_pob_choice: in the strongholds
  chosen_spanish: en las fortalezas
  alternatives_spanish:
  - en los refugios
  - en las fortalezas montañosas
  - en las defensas
  lexicon: HALOT
  rationale: מְצָדוֹת se refiere a lugares defensivos. «Fortalezas» mantiene el valor de refugio fortificado y es una equivalencia idiomática aceptable en español.
- source_word: עֵין גֶּדִי
  english_pob_choice: En-gedi
  chosen_spanish: En-gadi
  alternatives_spanish:
  - En Gadi
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y debe transliterarse. «En-gadi» respeta la forma usual en español para este topónimo.
translation_notes:
  revision_awareness: El texto inglés auditado está en alta concordancia con la fuente hebrea y no muestra revisiones textuales relevantes; por eso el español sigue de cerca la sintaxis narrativa básica sin añadir información.
  spanish_consistency_notes:
  - Se mantiene la toponimia como nombre propio transliterado.
  - Se evita «habitar» porque podría sugerir una residencia más permanente que el hebreo en este contexto narrativo.
  - «Fortalezas» traduce el plural de מְצָדוֹת sin intensificar innecesariamente a una imagen militar distinta.
