revisions:
- from: Y él será para ti un restaurador de la vida y un sustentador de tu vejez[a], porque tu nuera, que te ama[c][b], le ha dado a luz; ella que es mejor para ti que siete hijos.
  to: Y él será para ti un restaurador de vida[a] y un sustentador de tu vejez[b], porque tu nuera, que te ama[c], lo ha dado a luz, ella que es mejor para ti que siete hijos varones.
