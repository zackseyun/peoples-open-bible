translation:
  language: es
  text: Redime a Israel[a], oh Dios, de todas sus tribulaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus problemas», tomando «Israel» como un pueblo colectivo en vez de conservar de manera estricta la forma gramatical singular del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּדֵה
  english_pob_choice: Redeem
  chosen_spanish: Redime
  alternatives_spanish:
  - Rescata
  - Libra
  - Redime
  lexicon: HALOT
  rationale: El hebreo es un imperativo de פדה, verbo de redención/ransom/liberación. «Redime» conserva mejor el peso covenantal y teológico que un simple «libra», y en español suena natural en una súplica dirigida a Dios.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים funciona como vocativo después del imperativo; en español conviene marcar la apelación directa con «oh Dios».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel colectivo
  lexicon: HALOT
  rationale: Es el nombre propio del pueblo del pacto. No se necesita explicación adicional en el texto principal.
- source_word: מִכֹּל
  english_pob_choice: from all
  chosen_spanish: de todas
  alternatives_spanish:
  - de todos
  lexicon: HALOT
  rationale: La construcción con מִן + כֹּל expresa separación respecto de la totalidad de las angustias; «de todas» es la forma más natural en español.
- source_word: צָרוֹתָיו
  english_pob_choice: his troubles
  chosen_spanish: sus angustias
  alternatives_spanish:
  - sus aflicciones
  - sus tribulaciones
  - sus problemas
  lexicon: HALOT
  rationale: צָרוֹת designa angustias, aflicciones o adversidades. «Angustias» comunica bien el sentido en español bíblico contemporáneo y mantiene el plural del hebreo.
theological_decisions:
- issue: Pronombre singular implícito sobre Israel como colectivo
  english_pob_reading: Retain singular 'his troubles'
  chosen_spanish_reading: Mantener el posesivo singular implícito en «sus angustias» junto con la referencia colectiva a Israel
  alternative_spanish_readings:
  - de sus angustias (con lectura colectiva pluralizada)
  - de sus angustias (sin marcar la singularidad gramatical)
  rationale: El hebreo trata a Israel como colectivo singular y usa un sufijo masculino singular en «sus angustias». En español, «sus» permite conservar la referencia a un sujeto colectivo sin forzar una singularidad extraña; la ambigüedad de número queda aceptablemente preservada sin borrar el dato del texto fuente.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral) and §5 (consistency/documented exception)
translation_notes:
  revision_awareness: 'El borrador sigue el alto acuerdo del control cruzado: no se registraron revisiones y el texto inglés auditado permanece estable. La decisión principal en español es conservar la redención como «Redime» y reflejar el plural de צָרוֹת con «angustias», mientras el posesivo «sus» deja intacta la lectura colectiva de Israel.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en vocativo, conforme al estándar del proyecto.
  - Se usa «Redime» para פדה, evitando reducir el verbo a una liberación genérica.
  - «Angustias» da un registro bíblico claro y cubre el campo semántico de צרות sin suavizarlo.
