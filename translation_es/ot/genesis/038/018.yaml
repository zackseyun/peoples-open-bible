translation:
  language: es
  text: 'Él dijo: «¿Qué prenda te daré?». Y ella dijo: «Tu sello[a], tu cordón y tu vara que está en tu mano». Entonces se los dio, se llegó a ella[b] y ella quedó encinta de él[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu signete». El hebreo no especifica la forma exacta del objeto usado para sellar.'
    reason: lexical_alternative
  - marker: b
    text: «Se llegó a ella» conserva el eufemismo hebreo para la relación sexual; otras traducciones explicitan «tuvo relaciones con ella».
    reason: lexical_alternative
  - marker: c
    text: 'O: «concibió de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵרָבוֹן
  english_pob_choice: pledge
  chosen_spanish: prenda
  alternatives_spanish:
  - garantía
  - depósito
  - respaldo
  lexicon: HALOT
  rationale: El hebreo designa un objeto dado como seguridad hasta cumplir lo prometido. En español, "prenda" conserva bien esa idea concreta de algo entregado como garantía sin introducir un matiz bancario o jurídico excesivo.
- source_word: חֹתָמְךָ
  english_pob_choice: your seal
  chosen_spanish: tu sello
  alternatives_spanish:
  - tu signet
  - tu anillo-sello
  lexicon: HALOT
  rationale: '"Sello" es amplio y fiel al hebreo, que no especifica la forma exacta del objeto. Evita añadir "anillo" sin apoyo explícito del texto.'
- source_word: פְתִילֶךָ
  english_pob_choice: your cord
  chosen_spanish: tu cordón
  alternatives_spanish:
  - tu cuerda
  - tu hilo
  lexicon: HALOT
  rationale: '"Cordón" reproduce de manera natural el elemento unido al sello y mantiene una imagen concreta y sobria.'
- source_word: מַטְּךָ
  english_pob_choice: your staff
  chosen_spanish: tu vara
  alternatives_spanish:
  - tu bastón
  - tu cayado
  lexicon: HALOT
  rationale: '"Vara" es un equivalente directo y digno para el objeto personal llevado en la mano. "Bastón" o "cayado" son posibles, pero pueden sugerir un contexto distinto.'
- source_word: אֲשֶׁר בְּיָדֶךָ
  english_pob_choice: that is in your hand
  chosen_spanish: que está en tu mano
  alternatives_spanish:
  - que llevas en la mano
  - que tienes en la mano
  lexicon: HALOT
  rationale: La construcción conserva la imagen concreta del hebreo sin sobreexplicarla.
- source_word: וַיִּתֶּן לָּהּ
  english_pob_choice: he gave them to her
  chosen_spanish: se los dio a ella
  alternatives_spanish:
  - los dio a ella
  - se los entregó
  lexicon: HALOT
  rationale: El español requiere un dativo redundante natural con el objeto plural implícito. "Se los dio" expresa con claridad que los tres objetos fueron entregados.
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: went in to her
  chosen_spanish: se llegó a ella
  alternatives_spanish:
  - entró a ella
  - tuvo relaciones con ella
  lexicon: HALOT
  rationale: Se conserva el eufemismo hebreo con una fórmula reverente y tradicional en español bíblico. "Tuvo relaciones con ella" explicita el sentido, pero pierde el registro figurado del original.
- source_word: וַתַּהַר לוֹ
  english_pob_choice: she conceived by him
  chosen_spanish: concibió de él
  alternatives_spanish:
  - quedó encinta de él
  - quedó embarazada de él
  lexicon: HALOT
  rationale: '"Concibió" refleja el verbo hebreo con registro formal y preciso, en línea con la revisión inglesa más reciente.'
theological_decisions:
- issue: Eufemismo sexual en וַיָּבֹא אֵלֶיהָ
  english_pob_reading: Went in to her is a Hebrew euphemism for sexual intercourse.
  chosen_spanish_reading: Se llegó a ella conserva el eufemismo sin volverlo explícito.
  alternative_spanish_readings:
  - Tuvo relaciones con ella
  - entró a ella
  rationale: La frase española mantiene el pudor narrativo del hebreo y evita una paraphrasis más interpretativa. El sentido queda accesible por contexto y por la nota textual si se requiere aclaración.
  doctrine_reference: Decoro bíblico y equivalencia idiomática; no hay afirmación doctrinal añadida
- issue: Relación entre el acto y la concepción en וַתַּהַר לוֹ
  english_pob_reading: she conceived by him
  chosen_spanish_reading: concibió de él
  alternative_spanish_readings:
  - quedó encinta de él
  - quedó embarazada de él
  rationale: La lectura mantiene la referencia causal/personal del hebreo con un español formal. "De él" conserva la relación marcada por el original sin introducir formulaciones modernas innecesarias.
  doctrine_reference: Transparencia narrativa del relato; sin implicación doctrinal adicional
translation_notes:
  revision_awareness: La base inglesa revisó la última cláusula de «became pregnant by him» a «conceived by him» para un registro más formal y cercano al hebreo; la redacción española sigue esa revisión con «concibió de él». También se preservó la preferencia del POB por un eufemismo en la cláusula verbal intermedia, evitando una explicitación innecesaria.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el texto.
  - Se usa «sello» en lugar de «anillo-sello» para no añadir un detalle no especificado por el hebreo.
  - «Prenda» se eligió como equivalente natural de הָעֵרָבוֹן en un contexto narrativo, no comercial.
