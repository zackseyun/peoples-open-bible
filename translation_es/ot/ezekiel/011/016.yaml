translation:
  language: es
  text: 'Por tanto, di: «Así dice el Señor Yahvé: Aunque los alejé entre las naciones, y aunque los dispersé entre las tierras, he sido para ellos un pequeño santuario[a] en las tierras adonde han ido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un santuario por un poco de tiempo». La expresión hebrea puede describir ya sea un santuario pequeño o una presencia santuarial temporal.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la inferencia profética que enlaza con el contexto inmediato sin añadir matiz causal indebido.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: di
  alternatives_spanish:
  - diles
  - habla
  lexicon: HALOT
  rationale: El imperativo directo a Ezequiel en español suena más natural como 'di' dentro de la fórmula profética.
- source_word: כֹה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Esto dice
  lexicon: HALOT
  rationale: Conserva la fórmula mensajera profética con dignidad literaria; 'ha dicho' mantiene bien la declaración solemne en español bíblico moderno.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se preserva el Nombre divino como 'Yahvé' según el estándar del proyecto, evitando el ocultamiento por 'SEÑOR'; 'Señor' traduce אֲדֹנָי en la fórmula fija.
- source_word: כִּי ... וְכִי
  english_pob_choice: Though ... and though
  chosen_spanish: Aunque ... y aunque
  alternatives_spanish:
  - Porque ... y porque
  - Pues ... y pues
  lexicon: HALOT
  rationale: Los dos כִּי tienen fuerza concesiva aquí; 'aunque ... y aunque' reproduce mejor la tensión del hebreo frente a la promesa posterior.
- source_word: הִרְחַקְתִּים
  english_pob_choice: I removed them far off
  chosen_spanish: los alejé
  alternatives_spanish:
  - los aparté lejos
  - los hice ir lejos
  lexicon: HALOT
  rationale: El hiphil de רחק implica causar distancia; 'los alejé' conserva la agencia divina y el sentido espacial de forma idiomática en español.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: '''Naciones'' mantiene el valor histórico-exílico del término; ''entre'' refleja la dispersión en medio de ellas con fluidez natural.'
- source_word: הֲפִיצוֹתִים
  english_pob_choice: I scattered them
  chosen_spanish: los dispersé
  alternatives_spanish:
  - los esparcí
  - los distribuí
  lexicon: HALOT
  rationale: '''Dispersé'' reproduce bien el verbo de esparcimiento exílico y es claro en español contemporáneo.'
- source_word: בָּאֲרָצוֹת
  english_pob_choice: among the lands
  chosen_spanish: entre las tierras
  alternatives_spanish:
  - en las tierras
  - por las tierras
  lexicon: HALOT
  rationale: Se conserva el plural hebreo y el paralelismo con 'entre las naciones'; 'tierras' evita reducir el alcance geográfico.
- source_word: וָאֱהִי לָהֶם
  english_pob_choice: yet I have been for them
  chosen_spanish: he sido para ellos
  alternatives_spanish:
  - fui para ellos
  - he estado para ellos
  lexicon: HALOT
  rationale: El perfecto hebreo tiene relevancia presente; 'he sido' mantiene la continuidad de la presencia divina en el exilio.
- source_word: לְמִקְדָּשׁ מְעַט
  english_pob_choice: a little sanctuary
  chosen_spanish: un pequeño santuario
  alternatives_spanish:
  - un santuario pequeño
  - un santuario por un poco de tiempo
  lexicon: HALOT
  rationale: 'La lectura principal es cualitativa: un santuario reducido/limitado pero real. ''Pequeño santuario'' conserva la tensión sin decidirla temporalmente.'
- source_word: בָּאֲרָצוֹת אֲשֶׁר בָּאוּ שָׁם
  english_pob_choice: in the lands where they have gone
  chosen_spanish: en las tierras adonde han ido
  alternatives_spanish:
  - en las tierras a las que han llegado
  - en las tierras donde han ido
  lexicon: HALOT
  rationale: '''Adonde han ido'' expresa el movimiento de llegada a las tierras del exilio sin forzar un giro más interpretativo que el hebreo.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה dentro de אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: La pauta del proyecto exige traducir יְהוָה como 'Yahvé' y no ocultarlo tras 'SEÑOR'. Se mantiene 'Señor' para אֲדֹנָי, respetando la fórmula de respeto y la distinción entre títulos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de מְעַט en לְמִקְדָּשׁ מְעַט
  english_pob_reading: a little sanctuary
  chosen_spanish_reading: un pequeño santuario
  alternative_spanish_readings:
  - un santuario por un poco de tiempo
  - un santuario temporal
  rationale: 'Se conserva la tensión documentada: puede aludir a un santuario pequeño/limitado o a una presencia santuarial por poco tiempo. La redacción principal no resuelve silenciosamente esa ambigüedad.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Presencia de Dios en el exilio como santuario
  english_pob_reading: I have been for them a little sanctuary in the lands where they have gone
  chosen_spanish_reading: he sido para ellos un pequeño santuario en las tierras adonde han ido
  alternative_spanish_readings:
  - he sido para ellos un santuario por un poco de tiempo en las tierras adonde han ido
  - he estado para ellos como santuario
  rationale: La frase se entiende como presencia real de Dios para su pueblo en tierra extraña, sin sustituir esa imagen por categorías eclesiásticas posteriores. Se conserva la metáfora cultual del texto.
  doctrine_reference: Ez 11:16; cf. sanctuary-presence motif in exile
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés, que ajustó el final al presente perfecto ('he sido') y al presente temporal equivalente ('han ido'), preservando la relevancia actual del perfecto hebreo. También se mantuvo la lectura principal de מְעַט como cualitativa, dejando la alternativa temporal en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto, y 'Señor' para אֲדֹנָי dentro de la fórmula fija.
  - Se conserva el paralelismo concesivo con 'aunque ... y aunque' para reflejar los dos כִּי del hebreo.
  - '''Tierras'' y ''naciones'' mantienen el plural del original y el trasfondo exílico.'
  - '''Pequeño santuario'' evita interpretar de modo exclusivo la frase מְעַט como temporal o espacial.'
  - El registro es bíblico moderno, con puntuación española y comillas angulares para cita directa.
