translation:
  language: es
  text: 'Y esta es la respuesta que nos devolvieron[a], diciendo: «Nosotros somos siervos del Dios del cielo y de la tierra, y estamos reconstruyendo la casa que fue edificada hace muchos años[b], la cual un gran rey de Israel edificó y completó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y así fue el mensaje que nos devolvieron».'
    reason: alternative_reading
  - marker: b
    text: 'O: «y estamos edificando la casa»; el participio arameo puede expresar acción en curso, y «reconstruyendo» deja explícito que el templo ya existía antes.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּכְנֵמָא פִתְגָמָא
  english_pob_choice: And this is the answer
  chosen_spanish: Y así fue la respuesta
  alternatives_spanish:
  - Y así fue el mensaje
  - Y así fue la contestación
  lexicon: HALOT
  rationale: La expresión aramea introduce el contenido de la réplica. En español, «respuesta» comunica de modo natural la función discursiva del sintagma sin perder el valor de «mensaje» o «palabra» que también puede tener פִתְגָם.
- source_word: הֲתִיבוּנָא
  english_pob_choice: they returned to us
  chosen_spanish: que nos dieron
  alternatives_spanish:
  - que nos respondieron
  - que nos devolvieron
  lexicon: HALOT
  rationale: El verbo literalmente contiene la idea de «volver/traer de regreso», pero en contexto funciona como introducir una réplica. «Nos dieron» suena natural en español y mantiene la idea de una respuesta entregada a quienes preguntan.
- source_word: עַבְדוֹהִי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - servidores
  lexicon: HALOT
  rationale: Aunque el término puede tener fuerza de esclavitud, aquí es una designación de pertenencia y lealtad a Dios. «Siervos» preserva mejor esa relación sin imponer una lectura de servidumbre chattel que el contexto no enfatiza.
- source_word: אֱלָהּ שְׁמַיָּא וְאַרְעָא
  english_pob_choice: the God of heaven and earth
  chosen_spanish: el Dios del cielo y de la tierra
  alternatives_spanish:
  - el Dios de los cielos y de la tierra
  - el Dios del cielo y de la tierra
  lexicon: HALOT
  rationale: Se conserva la fórmula de soberanía universal. En español, el singular «cielo» es idiomático y fiel al sentido del título arameo sin oscurecer que el texto fuente usa una forma plural.
- source_word: וּבָנַיִן
  english_pob_choice: and we are rebuilding
  chosen_spanish: y estamos reconstruyendo
  alternatives_spanish:
  - y estamos edificando
  - y edificamos
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Reconstruyendo» explicita correctamente que el edificio ya había existido antes, como lo indica el contexto, y conserva la idea de trabajo en progreso.
- source_word: בַּיְתָא
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la vivienda
  lexicon: HALOT
  rationale: Literalmente es «casa». Aunque el referente es el templo, se mantiene la palabra del original para no reemplazarla por una glosa interpretativa; el contexto ya aclara de qué casa se trata.
- source_word: דִּי הֲוָא בְנֵה
  english_pob_choice: that was built
  chosen_spanish: que fue edificada
  alternatives_spanish:
  - que había sido edificada
  - que fue construida
  lexicon: HALOT
  rationale: La cláusula relativa remite a la construcción anterior del edificio. «Edificada» mantiene el registro sobrio y bíblico, y «fue» refleja el pasado del estado descrito.
- source_word: מִקַּדְמַת דְּנָה שְׁנִין שַׂגִּיאָן
  english_pob_choice: many years ago
  chosen_spanish: hace muchos años
  alternatives_spanish:
  - desde hace muchos años
  - de tiempos antiguos
  lexicon: HALOT
  rationale: La secuencia aramea significa literalmente «antes de esto, muchos años». «Hace muchos años» expresa con naturalidad la antigüedad del edificio sin añadir precisión cronológica que el texto no da.
- source_word: וּמֶלֶךְ לְיִשְׂרָאֵל רַב
  english_pob_choice: a great king of Israel
  chosen_spanish: un gran rey de Israel
  alternatives_spanish:
  - un rey poderoso de Israel
  - un rey importante de Israel
  lexicon: HALOT
  rationale: El arameo caracteriza al rey por su grandeza, que identifica a Salomón sin nombrarlo. «Gran» conserva esa amplitud de sentido mejor que opciones que solo enfatizan poder político.
- source_word: בְּנָהִי וְשַׁכְלְלֵהּ
  english_pob_choice: built and completed
  chosen_spanish: edificó y completó
  alternatives_spanish:
  - construyó y terminó
  - edificó y terminó
  lexicon: HALOT
  rationale: Los dos verbos distinguen la construcción inicial y su culminación. «Completó» refleja mejor שׁכלל en este contexto de obra terminada que «terminó», aunque ambas son posibles.
theological_decisions:
- issue: Título divino en correspondencia imperial
  english_pob_reading: the God of heaven and earth
  chosen_spanish_reading: el Dios del cielo y de la tierra
  alternative_spanish_readings:
  - el Dios de los cielos y de la tierra
  rationale: Se mantiene la fórmula como una afirmación de soberanía universal sobre toda la creación. No se sustituye por una expresión litúrgica de ocultamiento; el texto habla de manera directa del Dios al que sirven.
  doctrine_reference: Afirmaciones; política de traducción POB sobre nombres divinos
translation_notes:
  revision_awareness: 'El texto inglés POB reciente permanece sin cambios en la revisión más reciente: mantiene la lectura óptima-equivalente de la respuesta como discurso reportado y conserva «rebuilding» para explicitar la reconstrucción de un edificio previo. La propuesta española sigue esa misma línea, pero ajusta la naturalidad sintáctica del español con «Y así fue la respuesta que nos dieron».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se usa «siervos» para עבד, siguiendo la decisión contextual del POB inglés de no forzar «esclavos» cuando el sentido es de pertenencia y servicio a Dios.
  - «Casa» se mantiene para בַּיְתָא, porque el texto fuente no dice explícitamente «templo» aunque el referente lo sea.
  - «Completó» se eligió para שׁכלל por su valor de culminación de una obra, evitando una paráfrasis más libre.
