translation:
  language: es
  text: 'Y Simón respondió[a]: «Maestro, hemos trabajado duro toda la noche y no hemos pescado nada; pero por tu palabra[b] echaré las redes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contestó». El griego usa una fórmula narrativa de respuesta; en español se expresa naturalmente con un verbo finito.
    reason: lexical_alternative
  - marker: b
    text: O «en atención a tu palabra» / «porque tú lo dices». La construcción griega expresa la base o motivo de la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondiendo
  alternatives_spanish:
  - respondió
  lexicon: BDAG
  rationale: El participio introductorio funciona como fórmula narrativa de respuesta previa a la cita directa. En español, «respondiendo ... dijo» conserva el valor idiomático del griego sin volverlo pesado con una traducción más mecánica.
- source_word: Ἐπιστάτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Jefe
  - Señor
  lexicon: BDAG
  rationale: En este contexto, el vocativo expresa autoridad reconocida de Jesús sin usar κύριος. «Maestro» transmite el trato respetuoso y la relación de autoridad sin introducir la carga teológica de «Señor» donde el griego no la usa aquí.
- source_word: δι’ ὅλης νυκτός
  english_pob_choice: all night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - durante toda la noche
  - por toda la noche
  lexicon: BDAG
  rationale: La expresión señala duración completa. «Toda la noche» es natural en español y conserva la totalidad temporal del original.
- source_word: κοπιάσαντες
  english_pob_choice: worked hard
  chosen_spanish: hemos trabajado
  alternatives_spanish:
  - hemos tenido mucho trabajo
  - hemos fatigado
  lexicon: BDAG
  rationale: El verbo enfatiza esfuerzo intenso. En español, el matiz se conserva mejor con la estructura completa «hemos trabajado toda la noche», mientras el contexto ya comunica el cansancio; no se perdió el énfasis por la oración paralela de resultado infructuoso.
- source_word: οὐδὲν ἐλάβομεν
  english_pob_choice: caught nothing
  chosen_spanish: no hemos capturado nada
  alternatives_spanish:
  - no hemos obtenido nada
  - no hemos sacado nada
  lexicon: BDAG
  rationale: En contexto de pesca, λαμβάνω alude a obtener/capturar la presa. «No hemos capturado nada» es claro y conserva la referencia implícita sin añadir contenido extraño.
- source_word: ἐπὶ δὲ τῷ ῥήματί σου
  english_pob_choice: but at your word
  chosen_spanish: pero por tu palabra
  alternatives_spanish:
  - pero a tu palabra
  - pero sobre tu palabra
  lexicon: BDAG
  rationale: La construcción con ἐπί marca base o motivo. «Por tu palabra» comunica naturalmente la idea de actuar con fundamento en la orden de Jesús; en español suena más fluido que una calca como «a tu palabra».
- source_word: χαλάσω
  english_pob_choice: I will let down
  chosen_spanish: echaré
  alternatives_spanish:
  - bajaré
  - soltaré
  lexicon: BDAG
  rationale: En lenguaje de pesca, «echar las redes» expresa con naturalidad el acto de bajarlas al agua. Aunque «bajaré» refleja la acción física, «echaré las redes» es la equivalencia idiomática más fiel en español.
- source_word: τὰ δίκτυα
  english_pob_choice: the nets
  chosen_spanish: las redes
  alternatives_spanish:
  - las mallas
  - los aparejos
  lexicon: BDAG
  rationale: δίκτυα es plural y en español la forma más natural en contexto de pesca es «redes». Se preserva el plural, como en el texto griego.
theological_decisions:
- issue: Título de Jesús Ἐπιστάτα
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Jefe
  rationale: 'Se mantiene la distinción entre ἐπιστάτης y κύριος: aquí Simón se dirige a Jesús con un título de autoridad práctica, no con la forma habitual de confesión cristológica. «Maestro» refleja esa autoridad relacional sin desplazar la progresión narrativa del evangelio.'
  doctrine_reference: Principio de primacía del texto original; no fusionar títulos distintos de Jesús en una sola equivalencia devocional.
- issue: Valor de ἐπὶ τῷ ῥήματί σου
  english_pob_reading: but at your word
  chosen_spanish_reading: pero por tu palabra
  alternative_spanish_readings:
  - pero en atención a tu palabra
  - pero a causa de tu palabra
  rationale: La frase no se limita a una localización espacial; expresa fundamento u obediencia basada en la palabra de Jesús. «Por tu palabra» conserva ese valor causal/instrumental sin sobreinterpretarlo.
  doctrine_reference: Lectura semántica de la construcción preposicional griega ἐπί con dativo en contexto de obediencia/confianza.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que eliminó una concesiva (“though”) para reflejar mejor la coordinación griega. Por eso la versión española evita una concesiva implícita y conserva la yuxtaposición simple: esfuerzo prolongado, resultado nulo, luego obediencia. También se preservó el plural de «redes», acorde con τὰ δίκτυα, y se tradujo Ἐπιστάτα por un título de autoridad no idéntico a «Señor».'
  spanish_consistency_notes:
  - Se mantiene «Maestro» para Ἐπιστάτα en lugar de «Señor», en coherencia con el valor contextual del término.
  - Se conserva el plural «redes» para τὰ δίκτυα.
  - La relación entre esfuerzo y fracaso se expresa con coordinación simple, no con concesión, siguiendo la revisión auditada del inglés.
  - «Por tu palabra» se usa como equivalente idiomático de la base/causa expresada por ἐπὶ τῷ ῥήματί σου.
