revisions:
- from: Cuando el príncipe[a] entre, entrará por el vestíbulo[b] de la puerta, y saldrá por el mismo camino.
  to: Cuando el príncipe entre, entrará por el pórtico de la puerta, y saldrá por el mismo camino[a].
  rationale: Se corrige el anclaje de la nota para que corresponda a la expresión que realmente explica. También se simplifica el aparato de notas eliminando una nota no imprescindible, y se ajusta «vestíbulo» a «pórtico» para reflejar con más precisión el valor arquitectónico de אוּלָם y alinearse mejor con el rastro léxico del POB inglés sin perder naturalidad en español.
