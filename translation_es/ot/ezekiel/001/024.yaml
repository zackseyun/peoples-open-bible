base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/001/024.yaml
  text: And I heard the sound of their wings[a], like the sound of many waters, like the sound of the Almighty when they went, a sound of tumult like the sound of an army camp. When they stood still[b], they lowered their wings.
  footnotes:
  - marker: a
    text: Or 'like the sound of Shaddai.' The Hebrew uses the divine title שַׁדַּי, traditionally rendered 'the Almighty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like the sound of a camp'; the Hebrew מַחֲנֶה often refers to a military camp, hence 'army camp.'
    reason: lexical_alternative
