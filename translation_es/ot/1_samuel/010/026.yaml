revisions:
- from: Saúl también fue a su casa en Gabaatá[a], y con él fueron los valientes[b] cuyas corazones Dios había tocado.
  to: Saúl también fue a su casa en Guibeá[a], y con él fueron los valientes[b] cuyos corazones Dios había tocado[c].
  rationale: Se corrige el error gramatical 'cuyas corazones' por 'cuyos corazones', se adopta 'Guibeá' como forma principal más natural y reconocible en español bíblico, y se añade la nota idiomática que preserva la explicación documentada en el POB inglés sobre la acción divina en el corazón de estos hombres.
