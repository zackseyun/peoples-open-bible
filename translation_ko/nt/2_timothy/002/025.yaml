id: 2TI.2.25
reference: 2 Timothy 2:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν πραΰτητι παιδεύοντα τοὺς ἀντιδιατιθεμένους, μήποτε ⸀δώῃ αὐτοῖς ὁ θεὸς μετάνοιαν εἰς ἐπίγνωσιν ἀληθείας,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/025.yaml
  text: correcting those who oppose him with gentleness, in case God may grant them repentance leading to the knowledge of the truth,
translation:
  language: ko
  text: 또 반대하는 자들을 온유함으로 바로잡아야 합니다. 어쩌면 하나님께서 그들에게 회개를 베푸셔서 진리를 깨닫게 하실지도 모릅니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν πραΰτητι παιδεύοντα
  english_pob_choice: correcting ... with gentleness
  chosen_korean: 온유함으로 바로잡아야
  alternatives_korean:
  - 온유함으로 가르쳐
  - 부드럽게 훈계하여
  lexicon: BDAG
  rationale: παιδεύω는 「교육·교정」을 뜻한다. 본 문맥(반대자 교정)에서는 「바로잡다」가 자연스럽다. πραΰτης는 신약의 핵심 미덕이며 「온유함」이 한국 성서 전통의 어휘.
- source_word: τοὺς ἀντιδιατιθεμένους
  english_pob_choice: those who oppose him
  chosen_korean: 반대하는 자들
  alternatives_korean:
  - 대적하는 자들
  - 반박하는 자들
  lexicon: BDAG
  rationale: ἀντιδιατίθημι는 「반대의 입장에 섬·맞서 자기 입장을 정함」. 「반대하는 자들」이 자연스럽다.
- source_word: μήποτε δώῃ αὐτοῖς ὁ θεὸς μετάνοιαν
  english_pob_choice: in case God may grant them repentance
  chosen_korean: 어쩌면 하나님께서 그들에게 회개를 베푸셔서
  alternatives_korean:
  - 혹시 하나님께서 그들에게 회개를 주셔서
  - 하나님이 회개를 허락하시기를 바라며
  lexicon: BDAG
  rationale: μήποτε + 가정법은 「혹시 ~지도 모름·바라건대 ~하기를」의 소망적·조건적 의미. 「어쩌면 ~지도 모릅니다」가 자연스럽다.
- source_word: εἰς ἐπίγνωσιν ἀληθείας
  english_pob_choice: leading to the knowledge of the truth
  chosen_korean: 진리를 깨닫게 하실지도 모릅니다
  alternatives_korean:
  - 진리를 알게 하실지도 모릅니다
  - 진리에 대한 충만한 지식에 이르게 하실지도 모릅니다
  lexicon: BDAG
  rationale: ἐπίγνωσις의 강조된 「깊은 인식·깨달음」을 한국어 「깨닫다」로 옮긴다.
