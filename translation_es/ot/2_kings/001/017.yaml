  yaml_path: translation/ot/2_kings/001/017.yaml
  text: So he died[a], according to the word of Yahweh that Elijah had spoken. And Jehoram became king in his place in the second year of Jehoram son of Jehoshaphat, king of Judah, because he had no son.
  footnotes:
  - marker: a
    text: Or, 'And he died ... And Jehoram reigned in his place.' The Hebrew verbs are simple narrative forms; 'became king' highlights accession, while 'reigned' is a more formal alternative.
