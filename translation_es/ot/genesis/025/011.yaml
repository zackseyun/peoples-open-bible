translation:
  language: es
  text: Y sucedió que, después de la muerte de Abraham, Dios bendijo a Isaac su hijo, e Isaac vivió junto a Beer-lajai-roí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beer-lajai-roí es el nombre de un pozo; el nombre hebreo ya fue introducido antes en Génesis 16:14.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y fue así que
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo desarrollo. «Y sucedió que» conserva ese valor secuencial en un español natural y digno, sin recurrir a una fórmula demasiado arcaica.
- source_word: אַחֲרֵי מוֹת אַבְרָהָם
  english_pob_choice: after Abraham’s death
  chosen_spanish: después de la muerte de Abraham
  alternatives_spanish:
  - tras la muerte de Abraham
  - después de que Abraham murió
  lexicon: HALOT
  rationale: El hebreo expresa una relación temporal simple. En español, la construcción nominal «después de la muerte de Abraham» es la más clara y fiel, y evita una paráfrasis excesiva.
- source_word: וַיְבָרֶךְ אֱלֹהִים
  english_pob_choice: God blessed
  chosen_spanish: Dios bendijo
  alternatives_spanish:
  - Dios otorgó bendición
  - Dios dio su bendición
  lexicon: HALOT
  rationale: בָּרַךְ aquí tiene el sentido directo de bendecir. «Dios bendijo» es la equivalencia más natural y transparente para este acto divino.
- source_word: אֶת יִצְחָק בְּנוֹ
  english_pob_choice: Isaac his son
  chosen_spanish: a Isaac, su hijo
  alternatives_spanish:
  - a Isaac, hijo suyo
  - a su hijo Isaac
  lexicon: HALOT
  rationale: Se conserva la identificación explícita de Isaac como hijo de Abraham. El orden español «a Isaac, su hijo» refleja el relieve del hebreo sin sonar forzado.
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  lexicon: HALOT
  rationale: יָשַׁב puede significar morar, habitar o establecerse. Para una referencia a residencia junto a un lugar nombrado, «habitó» conserva mejor la noción de asentamiento que «vivió», que sería más general.
- source_word: עִם
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - cerca de
  - al lado de
  lexicon: HALOT
  rationale: En esta construcción locativa, עִם comunica proximidad. «Junto a» expresa de forma natural la cercanía a un lugar geográfico en español, sin implicar compañía personal.
- source_word: בְּאֵר לַחַי רֹאִי
  english_pob_choice: Beer-lahai-roi
  chosen_spanish: Beer-lajai-roí
  alternatives_spanish:
  - Beer-lahai-roi
  - Beer Lahai Roi
  lexicon: HALOT
  rationale: Se translitera el nombre propio ya establecido en Génesis, manteniendo la referencia al pozo conocido en el texto bíblico. La forma con «j» y acentos sigue una adaptación hispana legible sin traducir el topónimo.
theological_decisions:
- issue: Referencia a אֱלֹהִים en un contexto narrativo no polémico
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - la Deidad
  - el Dios
  rationale: No hay tensión doctrinal especial en el versículo; el sujeto es el Dios de la narración bíblica. «Dios» es la forma más clara y fiel en español.
  doctrine_reference: Primacía del texto original; claridad pública sin eufemismos no requeridos.
- issue: Relación entre Abraham muerto y la bendición sobre Isaac
  english_pob_reading: after Abraham’s death ... God blessed Isaac his son
  chosen_spanish_reading: después de la muerte de Abraham, Dios bendijo a Isaac, su hijo
  alternative_spanish_readings:
  - tras la muerte de Abraham, Dios bendijo a Isaac, su hijo
  - después de la muerte de Abraham, Dios bendijo a Isaac, hijo suyo
  rationale: La sintaxis preserva la secuencia temporal y el vínculo filial entre Abraham e Isaac, que es relevante en el contexto del relato sucesorio. No se introduce ninguna interpretación adicional.
  doctrine_reference: Lectura narrativa directa del pasaje; continuidad del pacto en el relato de Génesis.
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del informe de revisión y no hubo cambios sustanciales respecto del texto fuente y la decisión inglesa auditada. La única adaptación relevante fue la hispanización moderada del topónimo para legibilidad en español, manteniendo su identidad como nombre propio establecido en el texto bíblico.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en contexto narrativo sin matiz litúrgico.
  - Se usa «habitó» para reflejar la residencia estable indicada por וַיֵּשֶׁב.
  - El topónimo se conserva como nombre propio transliterado, no traducido.
  - Se preserva el orden de la cláusula temporal y la mención explícita de Isaac como hijo de Abraham.
