translation:
  language: es
  text: Él se aferró[a] a Yahvé; no se apartó de seguirlo, y guardó sus mandamientos, que Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se aferró» o «se mantuvo firme junto a»; el verbo expresa una fuerte lealtad de alianza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדְבַּק
  english_pob_choice: held fast
  chosen_spanish: se mantuvo fiel
  alternatives_spanish:
  - se aferró
  - se pegó a
  - se adhirió a
  lexicon: HALOT
  rationale: En contexto de alianza y lealtad, דבק expresa adhesión firme más que simple contacto físico. «Se mantuvo fiel» conserva esa fuerza relacional y suena natural en español bíblico contemporáneo.
- source_word: בַּיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino יְהוָה; por la norma del proyecto, se conserva «Yahvé» en el texto principal.
- source_word: לֹא סָר מֵאַחֲרָיו
  english_pob_choice: he did not turn away from following him
  chosen_spanish: no se apartó de seguirlo
  alternatives_spanish:
  - no se desvió de seguirlo
  - no dejó de seguirlo
  - no se apartó de detrás de él
  lexicon: HALOT
  rationale: סור con מן + אחרי comunica abandonar la senda de seguimiento o lealtad. «No se apartó de seguirlo» mantiene la idea de discipulado/alineación sin un calco torpe.
- source_word: וַיִּשְׁמֹר
  english_pob_choice: he kept
  chosen_spanish: guardó
  alternatives_spanish:
  - observó
  - cumplió
  lexicon: HALOT
  rationale: שׁמר aplicado a mandamientos puede traducirse como guardar/observar. «Guardó» conserva bien el registro de obediencia activa.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: HALOT
  rationale: מִצְוָה es un término normativo de mandamiento. «Mandamientos» es la forma más estable y adecuada en español.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: which Yahweh had commanded Moses
  chosen_spanish: que Yahvé había mandado a Moisés
  alternatives_spanish:
  - que Yahvé mandó a Moisés
  - que Yahvé había ordenado a Moisés
  lexicon: HALOT
  rationale: צוה aquí expresa dar mandato. «Había mandado» refleja bien la relación temporal respecto de la obediencia de Ezequías y mantiene el vínculo con Moisés.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El original contiene el Tetragrámaton y el marco del proyecto exige conservarlo como «Yahvé» en la traducción principal, sin sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de lealtad de דבק y seguimiento en סור מֵאַחֲרָיו
  english_pob_reading: held fast / did not turn away from following him
  chosen_spanish_reading: se mantuvo fiel / no se apartó de seguirlo
  alternative_spanish_readings:
  - se aferró / no se desvió de él
  - se adhirió / no dejó de seguirlo
  rationale: La combinación de verbos describe lealtad de alianza y perseverancia en el seguimiento. La formulación española conserva ambos matices sin diluir la tensión semántica en una sola idea genérica.
  doctrine_reference: Lexical-theological note from covenant loyalty usage in Deuteronomistic history
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador [a] aparece explícitamente en el texto español, anclado en «seguirlo[a]». No se añadieron notas sin anclaje. La redacción sigue de cerca el hebreo y coincide con la auditoría inglesa en los puntos léxicos y teológicos principales.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la política del proyecto para יְהוָה.
  - «Mandamientos» mantiene el registro normativo de מצוות.
  - La construcción «no se apartó de seguirlo» evita un calco demasiado literal de «detrás de él» y conserva el sentido de lealtad/seguimiento.
  - El tiempo verbal compuesto «había mandado» ayuda a mostrar la anterioridad del mandato de Yahvé a Moisés respecto de la obediencia de Ezequías.
