translation:
  language: es
  text: Y toma este cayado[a] en tu mano, con el cual harás las señales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vara». El hebreo מַטֶּה puede denotar tanto una vara como un cayado; aquí «cayado» encaja mejor con el contexto de Moisés como pastor.
    reason: lexical_alternative
  - marker: b
    text: O «las señales milagrosas». El hebreo dice simplemente «las señales», dejando que el contexto precise su carácter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - También
  lexicon: HALOT
  rationale: El hebreo enlaza esta instrucción con la anterior; en español, «Y» conserva esa continuidad sin sobrecargar el tono.
- source_word: הַמַּטֶּה
  english_pob_choice: staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - cayado
  - bastón
  lexicon: HALOT
  rationale: מַטֶּה puede ser «vara» o «bastón/vara». Aquí elegí «bastón» por ser natural en español y suficientemente amplio para el objeto de Moisés, sin perder la idea de un instrumento portátil.
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - tal
  lexicon: HALOT
  rationale: El demostrativo señala un objeto ya identificado; «este» reproduce la referencia específica de forma simple y directa.
- source_word: תִּקַּח
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - tomarás
  - has de tomar
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecto 2ms con valor exhortativo, en español la forma imperativa expresa con naturalidad la instrucción.
- source_word: בְּיָדֶךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en la mano
  - con tu mano
  lexicon: HALOT
  rationale: La expresión es idiomática y se traduce de modo directo; «en tu mano» mantiene el sentido instrumental y posesivo del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: with which
  chosen_spanish: con el cual
  alternatives_spanish:
  - con que
  - por medio del cual
  lexicon: HALOT
  rationale: El relativo introduce la relación instrumental del bastón con las señales; «con el cual» suena claro y formal en español.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you will perform
  chosen_spanish: harás
  alternatives_spanish:
  - realizarás
  - efectuarás
  - harás
  lexicon: HALOT
  rationale: עָשָׂה aquí va con «las señales» y en español «harás» conserva la sencillez del verbo hebreo sin añadir una interpretación más específica de la necesaria.
- source_word: בּוֹ
  english_pob_choice: with which
  chosen_spanish: con el cual
  alternatives_spanish:
  - con él
  - por medio del cual
  lexicon: HALOT
  rationale: La preposición indica instrumento; en español se integra naturalmente en el relativo, evitando una repetición torpe del pronombre.
- source_word: הָאֹתֹת
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - las señales milagrosas
  lexicon: HALOT
  rationale: «Señales» comunica el valor confirmatorio del hebreo אֹת, mientras evita añadir en el texto principal la cualidad milagrosa que el hebreo no explicita de manera directa.
theological_decisions:
- issue: Naturaleza de las "señales"
  english_pob_reading: Or 'the miraculous signs.' The Hebrew simply says 'the signs,' leaving the nature of the signs to the context.
  chosen_spanish_reading: las señales
  alternative_spanish_readings:
  - las señales milagrosas
  - los signos
  rationale: Conservo la amplitud del hebreo y no incorporo «milagrosas» en el texto principal. La referencia al carácter extraordinario queda en la interpretación contextual, no en la palabra base.
  doctrine_reference: Éxodo 4:1-9; señal confirmatoria del llamado de Moisés.
translation_notes:
  revision_awareness: El texto base inglés ya fue revisado y quedó sin cambios; este borrador español sigue ese acuerdo de alta concordancia, conservando la estructura, el valor instrumental del relativo y la ambigüedad controlada de «señales».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» por no ser relevante en este pasaje.
  - «Señales» se usa en sentido de confirmación, no como simple «signos» matemáticos o gráficos.
  - La sintaxis conserva el mandato directo del hebreo sin volverlo una paráfrasis explicativa.
