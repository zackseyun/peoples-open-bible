lexical_decisions:
- source_word: ἔτυχεν
  english_pob_choice: we have attained
  chosen_spanish: hemos alcanzado
  alternatives_spanish:
  - hemos obtenido
  - hemos logrado
  - hemos llegado a disfrutar
  lexicon: LSJ
  rationale: El verbo transmite haber llegado a poseer o disfrutar algo. «Hemos alcanzado» conserva el valor de obtención/posesión sin sonar artificial en español.
- source_word: φιλανθρωπίας
  english_pob_choice: goodwill
  chosen_spanish: benevolencia
  alternatives_spanish:
  - bondad
  - buena disposición
  - humanidad
  lexicon: LSJ
  rationale: Aquí el término expresa una disposición favorable hacia otros pueblos. «Benevolencia» comunica esa actitud de favor sin perder el matiz cortesano del contexto.
- source_word: πρὸς πᾶν ἔθνος
  english_pob_choice: toward every nation
  chosen_spanish: hacia toda nación
  alternatives_spanish:
  - para toda nación
  - hacia todo pueblo
  - para todos los pueblos
  lexicon: LSJ
  rationale: La preposición con acusativo marca dirección o relación. «Hacia toda nación» preserva ese movimiento relacional y mantiene el alcance universal del giro.
- source_word: ἐπὶ τοσοῦτον ὥστε
  english_pob_choice: such ... that
  chosen_spanish: tal ... que
  alternatives_spanish:
  - hasta tal punto que
  - de tal manera que
  - tan ... que
  lexicon: LSJ
  rationale: Es un giro consecutivo de resultado. «Tal ... que» es idiomático en español y refleja bien la relación de consecuencia.
- source_word: ἀναγορεύεσθαι
  english_pob_choice: is proclaimed
  chosen_spanish: se le proclama
  alternatives_spanish:
  - se le declara públicamente
  - se le anuncia
  - se le nombra
  lexicon: LSJ
  rationale: El verbo sugiere proclamación pública o designación formal. La forma impersonal «se le proclama» conserva el registro oficial y evita añadir un sujeto no expresado.
- source_word: πατέρα
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - protector
  - patrón
  lexicon: LSJ
  rationale: El griego dice literalmente «padre». Se mantiene el título familiar en español para no borrar el matiz político-retórico del original.
- source_word: προσκυνούμενον
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - postrado ante
  - rendido homenaje por
  - venerado
  lexicon: LSJ
  rationale: En este contexto de corte persa, el verbo puede implicar homenaje deferente más que adoración divina. «Honrado» comunica respeto sin imponer una lectura cultual que el contexto no exige.
- source_word: τὸ δεύτερον τοῦ Βασιλικοῦ θρόνου πρόσωπον
  english_pob_choice: the second person to the royal throne
  chosen_spanish: la segunda persona del trono real
  alternatives_spanish:
  - la segunda en relación con el trono real
  - el segundo personaje del trono real
  - la segunda figura del trono real
  lexicon: LSJ
  rationale: La construcción es muy cortesana y algo áspera en griego. «La segunda persona del trono real» conserva el valor de rango y proximidad al trono sin exagerar la paráfrasis.
- source_word: διατελεῖν
  english_pob_choice: continuing
  chosen_spanish: continuando
  alternatives_spanish:
  - permaneciendo
  - siguiendo
  - persistiendo
  lexicon: LSJ
  rationale: El infinitivo añade fuerza durativa al estado descrito. «Continuando» enlaza naturalmente con la frase anterior y refleja el aspecto continuo del texto.
theological_decisions:
- issue: Alcance de προσκυνούμενον en un contexto real
  english_pob_reading: honored by all
  chosen_spanish_reading: honrado por todos
  alternative_spanish_readings:
  - postrado ante por todos
  - rendido homenaje por todos
  - venerado por todos
  rationale: El contexto es de corte imperial, no de culto divino. Se conserva la tensión semántica del verbo en una nota, pero el texto principal evita una traducción que pudiera sugerir adoración religiosa no explícita.
  doctrine_reference: Mantener la distinción entre homenaje cortesano y adoración religiosa sin resolver artificialmente la ambigüedad.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail, especialmente la colocación de la idea durativa en «continuando» junto con la frase de rango cortesano, y mantiene el carácter formal del título «la segunda persona del trono real».
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra máscara, porque este versículo no contiene el Nombre divino.
  - Se conserva «padre» en sentido honorífico-político, no como parentesco literal.
  - «Honrado por todos» preserva la ambigüedad entre homenaje cortesano y postración física, ampliada en nota.
  - El registro es solemne y apto para publicación, sin caer en calco excesivamente rígido.
