base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/023.yaml
  text: Then he made the cast sea[a], ten cubits from brim to brim, round all around; its height was five cubits[c][b], and a line of thirty cubits went around it all around.
  footnotes:
  - marker: a
    text: Or 'the basin.' The Hebrew calls this large temple vessel 'the sea,' a formal designation preserved in the main text.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a line of thirty cubits'; that is, its circumference measured thirty cubits.
    reason: cultural_note
  - marker: c
    text: The written form here is קוה ('line'), traditionally read with the sense of measuring cord; compare the parallel in 2 Chronicles 4:2.
    reason: textual_variant
