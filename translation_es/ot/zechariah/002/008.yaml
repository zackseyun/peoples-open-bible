translation:
  language: es
  text: 'Y le dijo: “Corre, habla a aquel joven, diciendo: ‘Jerusalén será habitada como poblados sin murallas[a], por la multitud de gente[b] y de ganado dentro de ella.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Jerusalén habitará como poblados sin murallas.”'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “אָדָם”, literalmente “hombre”; aquí se usa de manera colectiva para la población humana, en contraste con el ganado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֻץ
  english_pob_choice: Run
  chosen_spanish: Corre
  alternatives_spanish:
  - Apresúrate
  lexicon: HALOT
  rationale: Imperativo directo de rapidez; “Corre” conserva la urgencia y la vivacidad del mandato sin añadir más de lo que exige el hebreo.
- source_word: דַּבֵּר
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - dile
  lexicon: HALOT
  rationale: El imperativo de דבר pide expresar verbalmente el mensaje. “Habla” mantiene el acto de comunicación sin estrecharlo a simple reporte.
- source_word: הַנַּעַר הַלָּז
  english_pob_choice: that young man
  chosen_spanish: aquel joven
  alternatives_spanish:
  - ese joven
  - aquel muchacho
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde muchacho hasta joven. “Aquel joven” preserva el demostrativo y suena natural en español bíblico contemporáneo.
- source_word: פְּרָזוֹת
  english_pob_choice: open country / unwalled villages
  chosen_spanish: aldeas sin muros
  alternatives_spanish:
  - pueblos sin murallas
  - aldeas abiertas
  - campiñas sin murallas
  lexicon: HALOT
  rationale: El sustantivo plural describe asentamientos abiertos, sin defensa de muro. “Aldeas sin muros” conserva la imagen de asentamiento no fortificado y es más claro en español que una calca como “campo abierto”.
- source_word: תֵּשֵׁב
  english_pob_choice: will be inhabited
  chosen_spanish: será habitada
  alternatives_spanish:
  - dormirá
  - morará
  lexicon: HALOT
  rationale: יָשַׁב en este contexto expresa residencia/ocupación. “Será habitada” refleja el estado resultante y evita el riesgo de “vivirá” o “morará” como formulaciones menos precisas para la ciudad.
- source_word: מֵרֹב
  english_pob_choice: because of the multitude of
  chosen_spanish: por la multitud
  alternatives_spanish:
  - a causa de la multitud
  - debido a la multitud
  lexicon: HALOT
  rationale: La preposición con רֹב expresa causa o motivo. “Por la multitud” comunica la relación causal de manera breve y natural en español.
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: gente
  alternatives_spanish:
  - personas
  - humanidad
  lexicon: HALOT
  rationale: Aquí אָדָם es colectivo y contrasta con el ganado. “Gente” transmite el sentido colectivo sin forzar un singular genérico poco natural en español.
- source_word: וּבְהֵמָה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales domésticos
  - bestias
  lexicon: HALOT
  rationale: בְהֵמָה se refiere a animales domésticos en un contexto de poblamiento. “Ganado” es el equivalente español más natural y suficientemente amplio.
- source_word: בְּתוֹכָהּ
  english_pob_choice: within her
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - en su interior
  lexicon: HALOT
  rationale: La referencia femenina es a Jerusalén. “Dentro de ella” conserva la personificación y la idea locativa del hebreo.
theological_decisions:
- issue: Lectura de אָדָם como colectivo humano
  english_pob_reading: people
  chosen_spanish_reading: gente
  alternative_spanish_readings:
  - personas
  - humanidad
  rationale: Se preserva el valor colectivo del término sin imponer un singular masculino en español, dado que el contexto contrasta humanos con ganado. La forma “gente” mantiene el sentido poblacional y la fluidez del verso.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Metáfora urbana de פְּרָזוֹת
  english_pob_reading: unwalled villages
  chosen_spanish_reading: aldeas sin muros
  alternative_spanish_readings:
  - pueblos sin murallas
  - aldeas abiertas
  rationale: La frase no pretende decir que Jerusalén se convierte literalmente en un conjunto de aldeas, sino que se extenderá como asentamiento no fortificado. “Aldeas sin muros” preserva la tensión metafórica y la imagen de ausencia de fortificación.
  doctrine_reference: HALOT on פרז and context of settlement expansion
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada que prefirió una lectura idiomática de תֵּשֵׁב como “will be inhabited” y ajustó אָדָם a un colectivo natural. En español se optó por “será habitada” y “gente” para preservar precisión y naturalidad, manteniendo además la alternativa de la imagen ‘aldeas sin muros’ en nota.
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' como sujeto femenino con el pronombre implícito 'ella'.
  - Se usa 'Y' inicial para conservar el enlace narrativo del hebreo y del inglés POB.
  - No se emplea 'SEÑOR' ni 'Cristo'; no aplican aquí.
  - Se evita 'siervo' o términos teológicos no pertinentes.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal y no se reutilizan para otros sentidos.
