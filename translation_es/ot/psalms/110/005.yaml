translation:
  language: es
  text: El Señor[a] a tu derecha; quebrantará a los reyes en el día de su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «el señor a tu derecha» puede referirse al rey/Mesías al que se dirige el salmo; otros entienden aquí «El Señor» como Dios actuando en juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - el señor
  - mi Señor
  lexicon: HALOT
  rationale: La forma vocalizada אֲדֹנָי se entiende como título reverencial, no como el nombre Yahvé. En español, «El Señor» conserva ese valor titular y corresponde al uso tradicional de un título elevado sin introducir un término distinto al del hebreo.
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - junto a
  - en
  lexicon: HALOT
  rationale: Con «tu derecha» la expresión es locativa e idiomática. En español, «a tu derecha» comunica de manera natural la posición adyacente que el hebreo expresa con עַל.
- source_word: יְמִינְךָ
  english_pob_choice: your right hand
  chosen_spanish: tu derecha
  alternatives_spanish:
  - tu mano derecha
  - tu lado derecho
  lexicon: HALOT
  rationale: El sustantivo es literalmente «mano derecha», pero en español bíblico y moderno la referencia corporal puede expresarse de forma más natural como «tu derecha», manteniendo la imagen de posición y honor sin sonar forzado.
- source_word: מָחַץ
  english_pob_choice: will shatter
  chosen_spanish: quebrantará
  alternatives_spanish:
  - aplastará
  - desmenuzará
  - destrozará
  lexicon: HALOT
  rationale: El verbo describe un golpear contundente con efecto de derrota decisiva. «Quebrantar» conserva esa fuerza en español y evita una paráfrasis demasiado libre; también mantiene la resonancia judiciaria del contexto.
- source_word: בְּיוֹם
  english_pob_choice: on the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - cuando
  lexicon: HALOT
  rationale: La construcción temporal se conserva de manera directa. «En el día de» mantiene el valor preposicional y la solemnidad de la formulación hebrea.
- source_word: אַפּוֹ
  english_pob_choice: his wrath
  chosen_spanish: su ira
  alternatives_spanish:
  - su furor
  - su enojo
  - su ira ardiente
  lexicon: HALOT
  rationale: Aunque el hebreo está ligado literalmente a «nariz»/«hocico», en el idioma bíblico la expresión significa ira. «Ira» es la opción más natural y fiel en español para el contexto de juicio.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - reyes
  - monarcas
  - los reyes
  lexicon: HALOT
  rationale: El sustantivo significa «reyes» sin necesidad de suavizarlo. El objeto directo explícito en español ayuda a que la frase conserve claridad sintáctica y el impacto del juicio sobre los gobernantes.
theological_decisions:
- issue: Referente de «El Señor» en el versículo
  english_pob_reading: The Lord is at your right hand, with a footnote preserving the alternative that the phrase may refer to the king/Messiah addressed in the psalm or to God acting in judgment.
  chosen_spanish_reading: «El Señor» se deja intencionalmente ambiguo, con nota que conserva la alternativa de que se trate del rey/Mesías o de Dios actuando en juicio.
  alternative_spanish_readings:
  - «el señor» en minúscula para un referente no identificado
  - «Yahvé» como lectura explícita del nombre divino
  - «el rey/Mesías a tu derecha» como identificación directa
  rationale: El hebreo usa אֲדֹנָי y el audit trail inglés preserva la tensión interpretativa. En español conviene mantener esa ambigüedad sin resolverla doctrinalmente, porque el texto admite más de una lectura y la POB documenta ambas.
  doctrine_reference: Preservar la tensión interpretativa documentada sin cerrarla en la traducción.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: no se requieren revisiones adicionales; se conserva la ambigüedad del referente y la fuerza judicial del verbo.'
  spanish_consistency_notes:
  - Se evitó «Yahvé» porque el hebreo aquí no usa el nombre divino sino אֲדֹנָי.
  - Se eligió «El Señor» con mayúscula para reflejar el título reverencial del texto base.
  - «Su ira» mantiene el sentido idiomático de אַפּוֹ sin introducir una explicación figurativa innecesaria.
  - La sintaxis española sigue el orden natural de la frase sin perder la paralelidad del hebreo.
