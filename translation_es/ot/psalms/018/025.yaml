translation:
  language: es
  text: Yahvé me retribuyó[a] conforme a mi justicia, conforme a la limpieza de mis manos[b] ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «me recompensó» o «me devolvió». El verbo hebreo puede expresar devolver o retribuir en correspondencia con la conducta de uno.'
    reason: lexical_alternative
  - marker: b
    text: «La limpieza de mis manos» es un modismo hebreo para una conducta inocente o recta.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: repaid
  chosen_spanish: recompensó
  alternatives_spanish:
  - me devolvió
  - me pagó
  - me retribuyó
  lexicon: HALOT
  rationale: El hebreo hifil de שוב aquí expresa devolver en sentido transaccional o retributivo. En español, «recompensó» conserva bien la idea de correspondencia por conducta sin sonar mecánico. «Devolvió» puede resultar demasiado literal; «pagó» suena más coloquial; «retribuyó» es correcto pero menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: «Yahvé». Preserva el nombre divino revelado en el texto hebreo, en vez de sustituirlo por un título.'
- source_word: כְצִדְקִי
  english_pob_choice: according to my righteousness
  chosen_spanish: conforme a mi justicia
  alternatives_spanish:
  - conforme a mi rectitud
  - según mi justicia
  - de acuerdo con mi rectitud
  lexicon: HALOT
  rationale: צֶדֶק/צִדְקָה aquí expresa la cualidad moral del salmista. «Justicia» mantiene la correspondencia con el hebreo y su fuerza forense/moral. «Rectitud» también es posible, pero en español bíblico «justicia» preserva mejor el peso del término.
- source_word: כְּבֹר יָדַי
  english_pob_choice: according to the cleanness of my hands
  chosen_spanish: conforme a la limpieza de mis manos
  alternatives_spanish:
  - conforme a la pureza de mis manos
  - conforme a la inocencia de mis manos
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de «limpieza» aplicada a las manos. «Limpieza» conserva el carácter concreto e idiomático; «pureza» y «inocencia» interpretan más el sentido que la imagen.
- source_word: לְנֶגֶד עֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - en su presencia
  - a la vista de él
  - ante sus ojos
  lexicon: HALOT
  rationale: «Delante de sus ojos» reproduce con claridad la imagen hebrea y funciona bien en español. Retiene la antropomorfía del texto, como hace el inglés POB con «before his eyes».
theological_decisions:
- issue: Mantener la afirmación de retribución según la justicia y manos limpias sin suavizarla
  english_pob_reading: Retain the straightforward statement of recompense according to the psalmist's righteousness and clean hands
  chosen_spanish_reading: Conservar la declaración directa de que Yahvé recompensó al salmista conforme a su justicia y a la limpieza de sus manos
  alternative_spanish_readings:
  - Parafrasear hacia fidelidad del pacto o inocencia relativa sin decir «justicia»
  - Suavizar el lenguaje para evitar una afirmación de justicia personal
  rationale: El hebreo afirma explícitamente la correspondencia entre la acción divina y la conducta del salmista. La traducción debe conservar esa tensión teológica en lugar de resolverla o atenuarla. En el contexto del salmo, la afirmación pertenece a la evaluación del caso concreto y no debe ser diluida.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que marcó el texto como sin cambios necesarios. No hubo revisiones aplicadas en el paquete inglés, por lo que la versión española se construye directamente desde el hebreo con el auditable criterio del POB en inglés como apoyo contextual.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se preservó «justicia» para צִדְקִי y «limpieza» para בֹר para mantener la metáfora y la tensión moral del versículo.
  - Se mantuvo la imagen corporal de «manos» y «ojos» sin sustituirla por abstracciones.
  - La puntuación y el orden de la cláusula siguen el paralelismo hebreo de correspondencia.
