review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y acierta en «joven», «la casa de su padre» y «veintidós comandantes». Sin embargo, debilita גִּבּוֹר חָיִל al reducirlo a «valiente», omitiendo la fuerza de «mighty/valor». Además, la nota [a] introduce una alternativa inglesa transliterada innecesaria y no refleja una alternativa léxica del hebreo.
  spanish_quality_summary: El español es claro y legible, pero «un joven valiente» queda algo insuficiente para el registro militar. «Poderoso en valor» sería demasiado calco; una solución más natural y fiel es «un joven, poderoso y valiente». También conviene corregir las notas para que sirvan a ambigüedades reales y no a variantes ortográficas no justificadas.
  glossary_alignment: No hay términos teológicos clave en este versículo. La transliteración del nombre puede mantenerse como «Zadoc» si esa es la política onomástica española del proyecto, aunque la nota alternativa «Zadok» no aporta valor aquí. El resto del vocabulario militar está bien alineado con las decisiones del POB.
  issues:
  - severity: medium
    issue: «valiente» no representa plenamente גִּבּוֹר חָיִל
    rationale: La expresión hebrea combina fuerza/capacidad y valor marcial. «Valiente» solo conserva el componente de valentía y pierde la idea de poder o destreza destacada.
  - severity: medium
    issue: La nota [a] es inapropiada
    rationale: «O “Zadok”» no refleja una alternativa léxica del texto fuente; es solo una variante de transliteración y no una nota necesaria salvo que el proyecto documente expresamente dos políticas onomásticas concurrentes.
  - severity: low
    issue: La nota [b] incluye una opción poco natural
    rationale: «un joven valiente en valor» es español torpe y no ayuda al lector. La alternativa debería reflejar de manera idiomática la opción documentada, como «un hombre valiente» o «un guerrero valiente» si se quisiera notar la variante.
  revised_spanish_text: Y Zadoc, un joven, poderoso y valiente[a], y de la casa de su padre, veintidós comandantes.
  revised_footnotes:
  - marker: a
    text: O «un hombre valiente».
    reason: lexical_alternative
  revision_rationale: Se elimina la nota onomástica innecesaria y se fortalece la traducción de גִּבּוֹר חָיִל para conservar tanto la idea de fuerza como la de valor en un español natural. Se mantiene «la casa de su padre» por fidelidad al modismo hebreo y «comandantes» por el contexto militar.
