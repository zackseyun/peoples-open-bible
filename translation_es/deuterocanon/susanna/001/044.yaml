translation:
  language: es
  text: Y el Señor oyó su voz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰσήκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - atendió
  - oyó favorablemente
  lexicon: BDAG
  rationale: El verbo griego εἰσακούω puede significar oír o escuchar, a menudo con el matiz de escuchar favorablemente. En español, «oyó» conserva la sencillez narrativa del original y evita sobreinterpretar una respuesta explícita que el texto todavía no formula.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto griego deuterocanónico, el título divino se vierte naturalmente como «Señor». En español, la forma con artículo («el Señor») sería más explicativa, pero «Señor» mantiene mejor la sobriedad del griego y el registro litúrgico estándar.
- source_word: φωνῆς
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - clamor
  - ruego
  - súplica
  lexicon: BDAG
  rationale: φωνή significa literalmente «voz» o «sonido». La traducción «voz» preserva la forma verbal exacta del texto griego; aunque el contexto sugiere una petición, el término concreto del original no obliga a explicitar «clamor» o «súplica».
theological_decisions:
- issue: Si traducir el verbo como respuesta favorable a la oración
  english_pob_reading: Render as 'the Lord heard her voice' without expanding to 'answered her prayer.'
  chosen_spanish_reading: «Y el Señor oyó su voz» sin añadir «respondió a su oración»
  alternative_spanish_readings:
  - Y el Señor respondió a su súplica.
  - Y el Señor escuchó favorablemente su oración.
  rationale: El griego afirma que el Señor oyó su voz; no especifica todavía la forma de la respuesta divina. Mantener el verbo simple preserva la reserva narrativa y no adelanta una interpretación más desarrollada de la acción de Dios.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Cómo verter Κύριος en griego deuterocanónico
  english_pob_reading: Use 'Lord' rather than 'the LORD.'
  chosen_spanish_reading: Usar «Señor» y no una convención tipográfica equivalente a «SEÑOR»
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: El testimonio fuente es griego y usa Κύριος, no un sustituto editorial del nombre divino hebreo. En español, «Señor» comunica adecuadamente el título divino sin introducir una convención que el texto griego no requiere.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se registran cambios aplicados y el estado de acuerdo cruzado es alto. La formulación española mantiene la misma simplicidad y restraint del texto inglés auditado.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κύριος, conforme al criterio del proyecto para griego deuterocanónico.
  - Se conserva «voz» para φωνή, evitando expandir a «clamor» o «súplica» sin apoyo explícito del texto.
  - Se evita «SEÑOR» porque aquí no hay un trasfondo hebreo explícito en el testimonio citado.
