    reason: cultural_note
  - marker: b
    text: O ‘según lo que exigía el juicio’ / ‘conforme a la ordenanza’.
    reason: lexical_alternative
  revision_rationale: Se movió la nota [a] al lugar correcto para que comente la expresión que realmente explica. También se cambió ‘corriendo subió’ por ‘corriendo hacia él’ para evitar añadir una noción de ascenso no exigida por δραμὼν, manteniendo la rapidez de la acción y un español más natural. El resto del texto conserva fielmente las decisiones léxicas y teológicas del audit trail.
