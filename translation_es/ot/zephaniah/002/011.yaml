    text: Or 'will famish all the gods of the earth.' The Hebrew verb literally refers to becoming lean or emaciated.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the islands of the nations.' 'Coastlands' is a common prophetic term for distant maritime peoples and regions.
    reason: lexical_alternative
