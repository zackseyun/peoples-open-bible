translation:
  language: es
  text: Por tanto[a], puesto que también preferimos que esta nación esté libre de perturbación, decidimos que el templo les sea restaurado y que vivan conforme a las costumbres de sus antepasados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ordenen su vida común conforme a las costumbres de tiempos de sus antepasados»'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρούμενοι
  english_pob_choice: since we also choose
  chosen_spanish: puesto que también queremos
  alternatives_spanish:
  - puesto que también elegimos
  - ya que también preferimos
  lexicon: LSJ
  rationale: El participio medio expresa una decisión o preferencia de política. En español, 'puesto que' conserva el valor causal del contexto, y 'queremos' comunica la voluntad deliberada sin volver rígida la sintaxis.
- source_word: ἐκτὸς ταραχῆς
  english_pob_choice: free from disturbance
  chosen_spanish: libre de perturbación
  alternatives_spanish:
  - sin turbación
  - libre de tumulto
  - libre de disturbio
  lexicon: LSJ
  rationale: La expresión apunta a quedar apartado de agitación o desorden. 'Perturbación' mantiene el sentido amplio de trastorno civil o público que el contexto administrativo sugiere.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - grupo étnico
  lexicon: LSJ
  rationale: En este contexto real y administrativo, ἔθνος designa al colectivo judío como cuerpo nacional. 'Nación' reproduce mejor ese valor político-comunitario que 'pueblo'.
- source_word: κρίνομεν
  english_pob_choice: we decide
  chosen_spanish: decidimos
  alternatives_spanish:
  - juzgamos
  - decretamos
  - determinamos
  lexicon: LSJ
  rationale: El verbo puede significar juzgar, decidir o determinar. 'Decidimos' conserva el tono de resolución gubernamental sin forzar un tecnicismo jurídico que el griego no exige.
- source_word: τὸ ἱερὸν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el lugar sagrado
  lexicon: LSJ
  rationale: Aunque literalmente alude al lugar sagrado, en 2 Macabeos se refiere naturalmente al templo de Jerusalén. 'Templo' es la equivalencia más clara y fiel en español.
- source_word: ἀποκατασταθῆναι
  english_pob_choice: should be restored
  chosen_spanish: sea restaurado
  alternatives_spanish:
  - sea restablecido
  - sea reinstalado
  lexicon: LSJ
  rationale: El infinitivo pasivo indica devolución a un estado anterior adecuado. 'Sea restaurado' transmite esa restauración institucional y respeta el matiz pasivo de la construcción.
- source_word: πολιτεύεσθαι
  english_pob_choice: they should live
  chosen_spanish: vivan
  alternatives_spanish:
  - se conduzcan en su vida común
  - ordenen su vida común
  lexicon: LSJ
  rationale: El verbo puede aludir a la vida comunitaria o cívica. 'Vivan conforme a' comunica con naturalidad en español la conducta habitual del pueblo bajo sus normas ancestrales.
- source_word: κατὰ τὰ ἐπὶ τῶν προγόνων αὐτῶν ἔθη
  english_pob_choice: according to the customs of their ancestors
  chosen_spanish: conforme a las costumbres de sus antepasados
  alternatives_spanish:
  - conforme a las costumbres de sus padres
  - según las costumbres en tiempos de sus antepasados
  lexicon: LSJ
  rationale: La frase remite a prácticas heredadas de los antepasados, con posible matiz temporal. 'Antepasados' y 'costumbres' conservan bien la referencia ancestral sin añadir una paráfrasis excesiva.
theological_decisions:
- issue: Alcance de πολιτεύεσθαι
  english_pob_reading: Render broadly as communal life ordered by ancestral customs, not narrowly as political self-rule.
  chosen_spanish_reading: Traducirlo como vida comunitaria regida por costumbres ancestrales, no como autonomía política plena.
  alternative_spanish_readings:
  - gobernarse según las costumbres de sus antepasados
  - vivir como cuerpo cívico según las costumbres de sus antepasados
  rationale: El contexto concede restauración del templo y permiso para la práctica ancestral; el modificador siguiente delimita el sentido. En español conviene mantener el alcance comunitario y no introducir independencia política que el texto no afirma explícitamente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios sustantivos; se mantiene la resolución de tomar πολιτεύεσθαι en sentido comunitario y no como concesión de autogobierno político.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se usa 'templo' por el referente específico de τὸ ἱερὸν en 2 Macabeos.
  - Se conserva un registro formal y legible en español, sin calco excesivo.
  - La nota al pie recoge la alternativa auditada sobre πολιτεύεσθαι, con matiz de vida común/cívica.
