translation:
  language: es
  text: 'Pero Jesús, al oír esto, le respondió: «No temas; solamente cree[a], y ella será salvada[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ten fe» o «confía».
    reason: lexical_alternative
  - marker: b
    text: O «será sanada» o «será curada». El verbo griego puede significar salvar, rescatar o sanar, y en este contexto incluye la restauración de la niña desde el borde de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: hearing this
  chosen_spanish: al oír esto
  alternatives_spanish:
  - habiendo oído esto
  - cuando lo oyó
  lexicon: BDAG
  rationale: El participio aoristo antecede a la respuesta de Jesús. «Al oír esto» expresa con naturalidad esa acción previa y conserva el objeto implícito sin añadir más contenido que el contexto no exige.
- source_word: ἀπεκρίθη αὐτῷ
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - le contestó
  - respondió a él
  lexicon: BDAG
  rationale: La construcción con dativo se vuelve en español un dativo natural («le»). «Le respondió» es idiomático y conserva la relación directa con el interlocutor.
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No tengas temor
  lexicon: BDAG
  rationale: El imperativo negativo se traduce con una prohibición directa y sobria. «No temas» es breve, solemne y fiel al tono de Jesús.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solamente
  alternatives_spanish:
  - solo
  - únicamente
  lexicon: BDAG
  rationale: μόνον restringe la orden siguiente. «Solamente» mantiene la exclusividad con un registro claro y digno en español.
- source_word: πίστευσον
  english_pob_choice: believe
  chosen_spanish: cree
  alternatives_spanish:
  - ten fe
  - confía
  lexicon: BDAG
  rationale: El imperativo aoristo de πιστεύω se puede verter por «creer» en español. Aquí «cree» conserva la fuerza verbal directa; «ten fe» y «confía» son alternativas legítimas que resaltan la dimensión relacional de la confianza.
- source_word: σωθήσεται
  english_pob_choice: she will be saved
  chosen_spanish: será salvada
  alternatives_spanish:
  - será sanada
  - será restaurada
  lexicon: BDAG
  rationale: Se preserva el verbo de la familia de σῴζω con «salvada», evitando reducirlo de antemano solo a sanidad física. En este contexto narrativo, la referencia apunta a la restauración de la niña, pero la forma verbal mantiene la amplitud semántica de 'salvar/rescatar/sanar'.
theological_decisions:
- issue: Alcance de πιστεύω en la orden de Jesús
  english_pob_reading: believe
  chosen_spanish_reading: cree
  alternative_spanish_readings:
  - ten fe
  - confía
  rationale: El griego pide una respuesta de fe activa. En español, «cree» conserva el mandato sin convertirlo en una explicación doctrinal; «ten fe» y «confía» quedan como alternativas porque enfatizan, respectivamente, la fe y la dependencia personal.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy #3'
- issue: Alcance de σωθήσεται en un contexto de muerte cercana
  english_pob_reading: she will be saved
  chosen_spanish_reading: será salvada
  alternative_spanish_readings:
  - será sanada
  - será restaurada
  rationale: La decisión mantiene la tensión del verbo σῴζω, que puede abarcar salvar, rescatar o sanar. Aunque el contexto inmediato sugiere restauración a la vida, la traducción principal conserva el campo semántico amplio en lugar de estrecharlo solo a una curación física.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3 and #5'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente griego y coincide con el auditor de inglés en las decisiones principales: ἀκούσας como acción previa, ἀπεκρίθη αὐτῷ como respuesta directa, μή + imperativo como prohibición, μόνον como restricción y σωθήσεται con su amplitud semántica. No se hicieron cambios respecto de la última pasada de revisión reportada como sin modificaciones.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y sujeto explícito al inicio para claridad narrativa.
  - «Le respondió» preserva el dativo indirecto sin sobrecargar la sintaxis.
  - «No temas» conserva el tono imperativo sobrio del original.
  - «Solamente» mantiene la restricción de μόνον sin añadir matiz extra.
  - «Será salvada» deja abierta la relación entre salvación y sanidad, conforme al audit trail.
  - Los corchetes de nota se usan solo donde aparece una alternativa lexical real en el texto principal.
