review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: observación gnómica de que los sabios mueren, el necio y el bruto perecen, y dejan su riqueza a otros. Sin embargo, «el hombre brutal» desplaza el sentido de בַעַר hacia crueldad/violencia en español, cuando el hebreo apunta más a torpeza senseless/beastlike. También «juntamente» es comprensible pero menos natural que «juntos» o «por igual» en este contexto.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y precisión léxica. «Los sabios» funciona bien para חֲכָמִים. «Porque ve» y «mueren» son naturales. La principal debilidad es «hombre brutal», que en español moderno suele significar violento o cruel, no necesariamente insensato o bestial. La nota b intenta corregirlo, pero el texto principal debe cargar mejor el sentido fuente.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La decisión sobre masculinos representativos está bien preservada con «los sabios» y un singular masculino para בַעַר. Conviene ajustar el equivalente de בַעַר a «hombre bestial» o «insensato»; «bestial» preserva mejor la rationale inglesa de 'brutish' y permite la nota explicativa.
  issues:
  - severity: high
    issue: «el hombre brutal» no representa bien בַעַר
    rationale: En español, «brutal» suele comunicar violencia, dureza o intensidad, no principalmente torpeza irracional o animalidad. El hebreo בַעַר en paralelo con כְּסִיל señala a una persona insensata, torpe o bestial.
  - severity: medium
    issue: «juntamente» suena algo acartonado
    rationale: Es entendible, pero «juntos» o «por igual» sería más natural en español contemporáneo sin pérdida de sentido.
  - severity: low
    issue: La nota b es más interpretativa de lo necesario
    rationale: Puede simplificarse para explicar que «bestial» describe a una persona insensata o embrutecida, más alineado con la nota inglesa auditada.
  revised_spanish_text: Porque ve que los sabios mueren[a]; juntos, el necio y el hombre bestial[b] perecen, y dejan su riqueza[c] a otros.
  revised_footnotes:
  - marker: a
    text: O «los sabios». El hebreo usa formas masculinas para tipos humanos representativos.
    reason: lexical_alternative
  - marker: b
    text: «Hombre bestial» se refiere a una persona insensata o embrutecida, de comportamiento semejante al de una bestia.
    reason: lexical_alternative
  - marker: c
    text: O «sus riquezas» o «sus bienes».
    reason: lexical_alternative
  revision_rationale: 'Se revisa principalmente בַעַר: «hombre bestial» conserva mejor la idea hebrea de persona senseless/beastlike que «hombre brutal», que en español moderno suele sugerir crueldad o violencia. También se ajusta «juntamente» a «juntos» para mayor naturalidad sin cambiar el sentido de יַחַד. Se mantienen la estructura, el masculino representativo y las alternativas léxicas documentadas.'
