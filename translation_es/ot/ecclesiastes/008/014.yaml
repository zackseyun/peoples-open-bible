  yaml_path: translation/ot/ecclesiastes/008/014.yaml
  text: 'There is a vanity that is done on the earth: there are righteous people to whom it happens according to the deeds of the wicked[a], and there are wicked people to whom it happens according to the deeds of the righteous. I said that this too is vanity.'
  footnotes:
  - marker: a
    text: Or 'futility' or 'vapor.' The Hebrew הֶבֶל is a key term in Ecclesiastes for what is fleeting, elusive, or frustratingly incongruous.
