translation:
  language: es
  text: Así que hubo gran alegría en Jerusalén, pues desde los días de Salomón, hijo de David, rey de Israel, no había habido nada semejante en Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: So there was
  chosen_spanish: Así hubo
  alternatives_spanish:
  - Y hubo
  - Entonces hubo
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva avanza el relato; en español, «Así hubo» comunica el resultado de lo previo con fluidez natural, sin perder el valor consecutivo.
- source_word: שִׂמְחָה גְדוֹלָה
  english_pob_choice: great joy
  chosen_spanish: gran alegría
  alternatives_spanish:
  - gran gozo
  - gran regocijo
  lexicon: HALOT
  rationale: El sintagma nombra una alegría intensa y pública. «Gran alegría» es claro, natural y fiel al matiz de intensidad sin sobreinterpretar el sustantivo.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición ב marca ubicación; «en Jerusalén» es la equivalencia española directa e idiomática.
- source_word: מִימֵי
  english_pob_choice: since the days of
  chosen_spanish: desde los días de
  alternatives_spanish:
  - desde los tiempos de
  lexicon: HALOT
  rationale: La expresión compara con un período anterior que se extiende hasta el presente del relato. «Desde los días de» conserva ese marco temporal de comparación.
- source_word: שְׁלֹמֹה בֶן דָּוִיד
  english_pob_choice: Solomon son of David
  chosen_spanish: Salomón, hijo de David
  alternatives_spanish:
  - Salomón hijo de David
  - Salomón, el hijo de David
  lexicon: HALOT
  rationale: «Hijo de» reproduce la relación constructa de manera natural en español. Se mantiene el nombre tradicional «Salomón» por claridad y reconocimiento, sin alterar la relación genealógica.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: Es un título apposicional de identificación; «rey de Israel» conserva el valor titular sin añadir determinación innecesaria.
- source_word: לֹא כָזֹאת
  english_pob_choice: there had been nothing like this
  chosen_spanish: no había habido nada semejante
  alternatives_spanish:
  - no había existido nada igual
  - no se había visto nada así
  lexicon: HALOT
  rationale: La negación comparativa requiere suplir el evento implícito en español. «Nada semejante» comunica el comparativo sin exceder el alcance del hebreo.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - allí, en Jerusalén
  lexicon: HALOT
  rationale: La repetición final conserva el énfasis retórico del hebreo, que enmarca la comparación en la misma ciudad.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue de cerca el valor narrativo y comparativo del hebreo, con adaptación idiomática mínima para lectura pública.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa «Salomón» como forma española establecida para el nombre propio, sin cambiar la relación filial del hebreo.
  - Se preserva la repetición de «en Jerusalén» al inicio y al final para reflejar el paralelismo del versículo.
