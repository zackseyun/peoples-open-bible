translation:
  language: es
  text: Yahvé abrirá para ti su buen depósito[a], los cielos, para dar la lluvia de tu tierra en su tiempo y para bendecir toda la obra de tu mano. Prestarás a muchas naciones, pero tú no pedirás prestado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "su buen tesoro". El término hebreo puede denotar un depósito o tesoro; "depósito" encaja mejor con el contexto de lluvia y cosecha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el criterio del proyecto para el Nombre divino, con una forma española reverente y directa que mantiene el nombre del pacto en vez de velarlo con un título.
- source_word: יִפְתַּח
  english_pob_choice: will open
  chosen_spanish: abrirá
  alternatives_spanish:
  - abre
  - abrirá
  lexicon: HALOT 6605
  rationale: El imperfecto qal tiene sentido futuro en esta promesa; 'abrirá' conserva la imagen concreta de abrir el depósito del cielo.
- source_word: אוֹצָרוֹ הַטּוֹב
  english_pob_choice: his good storehouse
  chosen_spanish: su buen granero
  alternatives_spanish:
  - su buen almacén
  - su buena tesorería
  - su buen tesoro
  lexicon: HALOT 214, 2896
  rationale: El sustantivo puede referir a depósito o tesorería, pero el contexto agrícola de lluvia favorece una imagen de almacenamiento de grano. 'Granero' comunica bien la función sin perder la idea de un depósito; el adjetivo 'bueno' se mantiene literal.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT 8064
  rationale: Se conserva el plural hebreo y el registro bíblico. 'Los cielos' funciona como aposición al 'granero' de Yahvé y evita reducirlo a un cielo meteorológico.
- source_word: לָתֵת מְטַר אַרְצְךָ
  english_pob_choice: to give the rain of your land
  chosen_spanish: para dar la lluvia de tu tierra
  alternatives_spanish:
  - para dar lluvia a tu tierra
  - para enviar la lluvia sobre tu tierra
  lexicon: HALOT 5414, 4306, 776
  rationale: La construcción final expresa propósito. 'La lluvia de tu tierra' sigue de cerca la relación genitiva hebrea y resulta natural en español, sin añadir más que lo requerido.
- source_word: בְּעִתּוֹ
  english_pob_choice: in its season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en su temporada
  - en su debido tiempo
  lexicon: HALOT 6256
  rationale: '''Tiempo'' refleja el sentido temporal y agrícola del sufijo; preserva la referencia a la estación o momento apropiados para la lluvia.'
- source_word: וּלְבָרֵךְ
  english_pob_choice: and to bless
  chosen_spanish: y para bendecir
  alternatives_spanish:
  - y bendecir
  - y para favorecer
  lexicon: HALOT 1288
  rationale: Se mantiene el paralelismo con 'para dar'. 'Bendecir' es el equivalente normal y conserva el matiz de conferir prosperidad bajo la acción divina.
- source_word: כָּל מַעֲשֵׂה יָדֶךָ
  english_pob_choice: all the work of your hand
  chosen_spanish: toda la obra de tu mano
  alternatives_spanish:
  - todo el trabajo de tu mano
  - todo lo que hagas
  lexicon: HALOT 4639, 3027
  rationale: '''Obra de tu mano'' respeta el idiomatismo hebreo y el singular de ''mano''. ''Obra'' es amplio y digno, abarcando el trabajo y sus resultados.'
- source_word: וְהִלְוִיתָ גּוֹיִם רַבִּים
  english_pob_choice: You will lend to many nations
  chosen_spanish: Prestarás a muchas naciones
  alternatives_spanish:
  - Darás préstamo a muchas naciones
  - Hacerás que muchas naciones te pidan prestado
  lexicon: HALOT 3867, 1471, 7227
  rationale: El verbo en hifil expresa prestar. 'Prestarás' es claro y natural, y 'naciones' conserva el sentido colectivo-político de גּוֹיִם.
- source_word: וְאַתָּה לֹא תִלְוֶה
  english_pob_choice: but you will not borrow
  chosen_spanish: pero tú no pedirás prestado
  alternatives_spanish:
  - y tú no pedirás prestado
  - pero no pedirás prestado
  lexicon: HALOT 3867
  rationale: En qal, el verbo significa pedir prestado. 'Pedirás prestado' es más natural en español que 'tomarás prestado'; el 'pero' expresa bien el contraste del par.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el Nombre personal del pacto, siguiendo la política del proyecto y evitando la sustitución por un título. La forma 'Yahvé' es la opción española estándar en este marco.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen de 'storehouse / treasury' aplicada a los cielos
  english_pob_reading: his good storehouse, the heavens
  chosen_spanish_reading: su buen granero, los cielos
  alternative_spanish_readings:
  - su buena tesorería, los cielos
  - su buen almacén, los cielos
  rationale: La tensión léxica se resuelve a favor de la imagen agrícola exigida por el contexto de lluvia y cosecha, sin eliminar que el hebreo también puede sugerir tesoro o depósito. 'Granero' comunica la función contextual; 'los cielos' mantiene la aposición textual.
  doctrine_reference: HALOT 214; contexto inmediato de lluvia y bendición de la tierra
translation_notes:
  revision_awareness: Se revisó la redacción a partir del audit trail inglés y no se detectaron cambios posteriores sustantivos; la coincidencia alta con la revisión más reciente confirma que no hacían falta ajustes textuales.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para el Nombre divino, conforme al estándar del proyecto.
  - Se preservó el paralelismo verbal con 'para dar' / 'y para bendecir' para reflejar la estructura de propósito del hebreo.
  - Se eligió un español natural pero cercano al original, evitando tanto la paráfrasis como el calco excesivamente rígido.
