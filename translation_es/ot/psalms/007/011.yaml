translation:
  language: es
  text: Mi escudo[a][b] está con Dios, que salva a los rectos de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi escudo está con Dios».'
    reason: previous_rendering
  - marker: b
    text: 'También puede entenderse: «Dios es mi escudo». El hebreo es compacto y permite esa reestructuración interpretativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: מָגִנִּי
  english_pob_choice: My shield
  chosen_spanish: Mi escudo
  alternatives_spanish:
  - Mi protección
  - Mi defensor
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de “escudo”, que el hebreo usa metafóricamente. “Protección” suavizaría la metáfora; “defensor” desplaza la figura a otra categoría semántica.
- source_word: עַל אֱלֹהִים
  english_pob_choice: is with God
  chosen_spanish: está con Dios
  alternatives_spanish:
  - está sobre Dios
  - descansa sobre Dios
  - está en Dios
  lexicon: HALOT
  rationale: El hebreo es compacto y admite una relación de dependencia o localización respecto de Dios. “Está con Dios” conserva la transparencia del hebreo y resulta natural en español, sin forzar una paráfrasis más explicativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, aquí designa al único Dios de Israel y en español se traduce de manera normal por “Dios”.
- source_word: מוֹשִׁיעַ
  english_pob_choice: who saves
  chosen_spanish: que salva
  alternatives_spanish:
  - el que salva
  - salvador de
  lexicon: HALOT
  rationale: El participio expresa una acción característica. En español, la relativa “que salva” conserva bien ese valor descriptivo y suena natural.
- source_word: יִשְׁרֵי
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  - los rectos de corazón
  lexicon: HALOT
  rationale: La raíz ישר comunica rectitud/linealidad moral. “Rectos” mantiene mejor el campo léxico que “justos”, que puede desplazar el matiz hacia un lenguaje más jurídico o forense.
- source_word: לֵב
  english_pob_choice: in heart
  chosen_spanish: de corazón
  alternatives_spanish:
  - en corazón
  - en su corazón
  lexicon: HALOT
  rationale: El hebreo usa “corazón” como sede de la interioridad. En español, “de corazón” reproduce la cualidad interna con naturalidad y evita una construcción más rígida.
theological_decisions:
- issue: Relación sintáctica de la primera cola
  english_pob_reading: My shield is with God, without collapsing the phrase into a more interpretive statement.
  chosen_spanish_reading: Mi escudo está con Dios.
  alternative_spanish_readings:
  - Dios es mi escudo.
  - Mi escudo descansa sobre Dios.
  rationale: El hebreo carece de verbo explícito y permite varias lecturas. La forma elegida conserva la compactación original y deja visible la relación entre el escudo del salmista y Dios, sin reemplazarla por una explicación más desarrollada.
  doctrine_reference: Poética bíblica; traducción transparente frente a paráfrasis interpretiva
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión más reciente del inglés POB, que volvió a la formulación literal y natural “is with God”. En español se refleja esa misma decisión con “está con Dios”, manteniendo la imagen y la ambigüedad controlada del hebreo.
  spanish_consistency_notes:
  - Se preserva el título de Dios como “Dios”, no como “SEÑOR”, porque el hebreo aquí usa אֱלֹהִים.
  - Se mantiene “escudo” como metáfora concreta, en coherencia con el valor léxico del sustantivo.
  - “Rectos de corazón” conserva el paralelismo interno y el idioma bíblico sin sonar arcaizante.
