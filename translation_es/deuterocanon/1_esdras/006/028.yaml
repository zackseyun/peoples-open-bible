  rationale: Se reubicó la nota [a] al sintagma que realmente explica («una provisión»), se ajustó «Señor» a «Yahvé» conforme a la pauta terminológica española del proyecto en contexto cultual israelita, y se mejoró levemente la naturalidad del español sin apartarse del sentido ni del audit trail inglés.
