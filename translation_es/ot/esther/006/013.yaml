review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa y el sentido básico del hebreo: Amán relata lo sucedido, sus sabios y Zeres responden, y se mantiene el paralelismo de la caída ante Mardoqueo. También conserva adecuadamente la alternativa léxica para מִזֶּרַע הַיְּהוּדִים. Sin embargo, hay un ajuste importante de fidelidad léxica y naturalidad: לֹא תוּכַל לוֹ se documentó en la POB inglesa como ''no prevalecerás contra él'', y en español suena más natural y preciso ''no prevalecerás sobre él'' que ''contra él''.'
  spanish_quality_summary: El texto es claro, digno y mayormente natural en español eclesial moderno. 'Contó', 'sus amigos', 'todo lo que le había acontecido' y 'sus sabios' son aceptables. No obstante, 'prevalecer contra él' suena algo forzado; 'prevalecerás sobre él' o 'no podrás vencerlo' sería más idiomático. Conviene además simplificar el futuro con 'no prevalecerás' para mayor fluidez y fuerza profética.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios Amán, Zeres y Mardoqueo están bien. No aparecen términos teológicos sensibles del glosario general. La decisión 'descendencia de los judíos' se alinea con la rationale documentada para זֶרַע, y la nota alternativa 'origen judío' preserva la opción más fluida.
  issues:
  - severity: medium
    issue: 'Expresión poco idiomática: ''no podrás prevalecer contra él'''
    rationale: Aunque transmite el sentido básico de לֹא תוּכַל לוֹ, en español bíblico natural 'prevalecer sobre él' expresa mejor la idea de no poder imponerse o vencerlo. Además, evita una calca innecesaria del inglés 'prevail against'.
  revised_spanish_text: 'Entonces Amán contó a Zeres, su esposa, y a todos sus amigos todo lo que le había acontecido. Entonces sus sabios y Zeres, su esposa, le dijeron[a]: «Si Mardoqueo, delante de quien has comenzado a caer, es de la descendencia de los judíos, no prevalecerás sobre él, porque ciertamente caerás delante de él».'
  revised_footnotes:
  - marker: a
    text: 'O: «es de origen judío».'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión del español en una expresión adversativa clave: ''no prevalecerás sobre él'' comunica mejor el sentido de incapacidad para imponerse a Mardoqueo, manteniendo la decisión léxica documentada por la POB inglesa sin sonar calcado.'
