- from: La angustia y la aflicción lo aterrorizan[a]; lo dominan como un rey listo para la batalla.
  to: La angustia y la aflicción lo aterrorizan[a]; lo vencen como un rey preparado para la batalla.
  rationale: Se ajusta «lo dominan» a «lo vencen» para reflejar mejor la fuerza de תקף en contexto, y «listo» a «preparado» para mantener un registro más digno y coherente con la nota léxica. También se pule levemente la redacción de la nota al pie con «traducido aquí como» para mayor naturalidad en español.
