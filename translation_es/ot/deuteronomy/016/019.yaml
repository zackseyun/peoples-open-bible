translation:
  language: es
  text: No pervertirás la justicia; no harás distinción de personas[a]; y no aceptarás soborno, porque el soborno ciega los ojos de los sabios y tuerce las palabras de los justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «reconocer rostros», un hebraísmo que significa mostrar favoritismo o parcialidad.
    reason: lexical_alternative
  - marker: b
    text: 'O: «distorsiona las palabras o la causa de los justos». El hebreo puede referirse a sus palabras o, en un contexto jurídico, a su caso.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַטֶּה מִשְׁפָּט
  english_pob_choice: pervert justice
  chosen_spanish: pervertir la justicia
  alternatives_spanish:
  - torcer la justicia
  - desviar el juicio
  lexicon: HALOT
  rationale: El verbo hebreo de inclinar/desviar junto con מִשְׁפָּט en contexto judicial pide una expresión forense fuerte. «Pervertir la justicia» conserva el sentido legal y resulta natural en español jurídico actual.
- source_word: תַכִּיר פָּנִים
  english_pob_choice: show partiality
  chosen_spanish: hacer distinción de personas
  alternatives_spanish:
  - mostrar parcialidad
  - reconocer rostros
  - ser parcial
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente significa algo como «reconocer rostros». En español, «hacer distinción de personas» comunica con claridad la idea de favoritismo judicial sin perder el marco legal.
- source_word: שֹׁחַד
  english_pob_choice: bribe
  chosen_spanish: soborno
  alternatives_spanish:
  - coima
  - mordida
  - regalo
  lexicon: HALOT
  rationale: En este contexto legal, שֹׁחַד es un pago corruptor. «Soborno» es la equivalencia española precisa y mantiene la fuerza moral del término.
- source_word: יְעַוֵּר עֵינֵי חֲכָמִים
  english_pob_choice: blinds the eyes of the wise
  chosen_spanish: ciega los ojos de los sabios
  alternatives_spanish:
  - ciega a los sabios
  - hace ciegos los ojos de los sabios
  lexicon: HALOT
  rationale: La imagen hebrea se conserva de forma directa y natural en español; mantiene la metáfora de ceguera causada por el soborno.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los entendidos
  - los prudentes
  lexicon: HALOT
  rationale: El plural hebreo funciona de manera general para personas sabias, no sólo varones. «Los sabios» respeta el matiz y suena idiomático.
- source_word: וִיסַלֵּף דִּבְרֵי צַדִּיקִם
  english_pob_choice: twists the words of the righteous
  chosen_spanish: tuerce las palabras de los justos
  alternatives_spanish:
  - distorsiona las palabras de los justos
  - subvierte la causa de los justos
  - tuerce los dichos de los justos
  lexicon: HALOT
  rationale: סלף expresa torcer o distorsionar. Dִּבְרֵי admite «palabras» y, en contexto legal, también la causa o el caso; aquí se mantiene «palabras» como en la tradición auditada, con un español claro y sobrio.
- source_word: צַדִּיקִם
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los inocentes
  lexicon: HALOT
  rationale: En este pasaje, צַדִּיקִם apunta a quienes están en lo recto o en lo correcto, también con posible resonancia legal. «Los justos» es fiel, amplio y natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se registraron revisiones posteriores que alteraran el sentido. La versión española mantiene la estructura legal tripartita y conserva la imagen metafórica de «ciega» y «tuerce» para reflejar el paralelismo hebreo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» sólo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se mantiene el registro jurídico y proverbial del hebreo, evitando paraphraseo innecesario.
  - «Justicia», «soborno», «sabios» y «justos» preservan un campo semántico coherente con la lectura auditada.
