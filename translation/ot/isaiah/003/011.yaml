theological_decisions:
- issue: Representative masculine singular in judgment saying
  chosen_reading: Rendered with singular 'him' while keeping 'the wicked' as a representative singular category.
  alternative_readings:
  - them
  - the wicked man ... him
  rationale: The Hebrew is grammatically singular and presents a representative case. Following the project's gender-accurate policy, the singular is preserved rather than pluralized for generic English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Retributive justice phrasing
  chosen_reading: 'Expressed the verse as reciprocal recompense: ''what his hands have done will be done to him.'''
  alternative_readings:
  - '''the recompense of his hands will be given him'''
  - '''he will be paid back for what he has done'''
  rationale: The Hebrew emphasizes measure-for-measure judgment without importing a more technical doctrinal formulation. The chosen wording preserves the text's own logic of recompense and the repetition of עשה.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
