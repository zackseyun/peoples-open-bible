translation:
  language: es
  text: 'Por tanto[a], hombres de entendimiento, escúchenme: lejos esté de Dios hacer maldad[b], y del Todopoderoso hacer injusticia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hombres de corazón», un modismo para hombres con entendimiento o discernimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lejos de Dios la maldad, y del Todopoderoso la injusticia». El hebreo expresa que tal mal es inconcebible en relación con Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Marca una conclusión lógica a partir del argumento previo. «Por tanto» conserva el valor inferencial con un tono natural y solemne en español.
- source_word: אַנֲשֵׁי לֵבָב
  english_pob_choice: men of understanding
  chosen_spanish: hombres de entendimiento
  alternatives_spanish:
  - hombres de corazón
  - hombres sensatos
  - sabios
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «hombres de corazón», pero aquí «corazón» funciona como sede del discernimiento. «Hombres de entendimiento» comunica el sentido idiomático sin perder el masculino plural del original.
- source_word: שִׁמְעוּ לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen lo que digo
  lexicon: HALOT
  rationale: El imperativo con el pronombre objeto exige una exhortación directa y atenta. «Escúchenme» es la forma natural y fuerte en español.
- source_word: חָלִילָה
  english_pob_choice: far be it
  chosen_spanish: lejos esté
  alternatives_spanish:
  - ¡de ninguna manera!
  - Dios nos libre
  - nunca tal
  lexicon: HALOT
  rationale: La expresión hebrea es una fuerte repulsión idiomática ante algo inconcebible. «Lejos esté» conserva la solemnidad y la negación enfática sin introducir un giro ajeno al texto.
- source_word: לָאֵל
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - para Dios
  - respecto de Dios
  lexicon: HALOT
  rationale: Con חָלִילָה, la preposición señala la relación en la que algo resulta inconcebible. En español, «de Dios» transmite de forma natural que la maldad está excluida en relación con Dios.
- source_word: מֵרֶשַׁע
  english_pob_choice: to do wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - hacer maldad
  - obrar mal
  lexicon: HALOT
  rationale: El hebreo expresa separación/exclusión de la maldad; el inglés lo completa verbalmente. En español, el sustantivo «maldad» mantiene la idea sin forzar una perícopa verbal artificial.
- source_word: וְשַׁדַּי
  english_pob_choice: and from the Almighty
  chosen_spanish: y del Todopoderoso
  alternatives_spanish:
  - y de Shaddai
  lexicon: HALOT
  rationale: שַׁדַּי es un título divino, no un nombre propio aquí. «Todopoderoso» reproduce el valor titular en un español bíblico comprensible, como en Job, sin transliterar innecesariamente.
- source_word: מֵעָוֶל
  english_pob_choice: to do wrong
  chosen_spanish: la injusticia
  alternatives_spanish:
  - el agravio
  - la perversidad
  - hacer injusticia
  lexicon: HALOT
  rationale: עָוֶל puede significar mal, injusticia o deshonestidad. «Injusticia» preserva el paralelo con «maldad» y mantiene la fuerza ética/legal del término.
theological_decisions:
- issue: Cómo expresar la imposibilidad moral atribuida a Dios
  english_pob_reading: far be it from God to do wickedness, and from the Almighty to do wrong
  chosen_spanish_reading: lejos esté de Dios la maldad, y del Todopoderoso la injusticia
  alternative_spanish_readings:
  - de ninguna manera haría Dios maldad ni injusticia
  - lejos de Dios está la maldad y la injusticia
  rationale: El texto no solo niega una acción, sino que declara algo inconcebible respecto de Dios. «Lejos esté» conserva esa repulsión moral e idiomática sin suavizarla ni convertirla en una mera afirmación abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Source-grounded equivalence)
- issue: Título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: Como título divino, se traduce para que el lector reciba su fuerza semántica en español. En el contexto de Job, el título subraya el poder soberano de Dios.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Translate titles; transliterate names)
- issue: Expresión masculina אַנֲשֵׁי לֵבָב
  english_pob_reading: men of understanding
  chosen_spanish_reading: hombres de entendimiento
  alternative_spanish_readings:
  - personas de entendimiento
  - los entendidos
  rationale: La forma hebrea es masculina plural. Se conserva esa marca de género, mientras se traduce el modismo de «corazón» como entendimiento, según el uso semántico bíblico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se documentaron cambios y el control cruzado mostró alto acuerdo. La redacción española conserva ese mismo perfil sin introducir reajustes interpretativos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada para el nombre divino, pero este versículo usa el título «Dios» y el equivalente titular «Todopoderoso», no el nombre propio.
  - Se conserva el paralelismo moral entre «maldad» e «injusticia», evitando suavizar ambos términos con una sola palabra genérica.
  - La frase «hombres de entendimiento» refleja el hebraísmo «hombres de corazón» sin neutralizar el género gramatical del original.
