translation:
  language: es
  text: 'Pero nadie dice: «¿Dónde está Dios, mi Hacedor[a], que da cánticos en la noche?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene «mis hacedores» (forma plural), usado aquí para referirse al único Dios; por eso, «mi Hacedor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But no one
  chosen_spanish: Pero nadie
  alternatives_spanish:
  - Y no
  - Pero no
  lexicon: HALOT
  rationale: La negación con וְ aquí tiene fuerza adversativa en el contexto; en español, «Pero nadie» expresa con naturalidad el contraste y el sujeto implícito que en la oración se sobreentiende.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - decía
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es perfecta, aquí funciona como observación general/habitual. «Dice» comunica mejor ese valor gnómico en español.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde
  lexicon: HALOT
  rationale: La pregunta de existencia o localización se expresa de manera natural en español como «¿Dónde está?».
- source_word: אֱלֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  lexicon: HALOT
  rationale: Es el título singular para la deidad en Job; «Dios» es el equivalente claro y reverente en español.
- source_word: עֹשָׂי
  english_pob_choice: my Maker
  chosen_spanish: mi Hacedor
  alternatives_spanish:
  - mis hacedores
  - el que me hizo
  lexicon: HALOT
  rationale: El hebreo tiene forma plural con sufijo de primera persona, pero el referente es el Dios único. «Mi Hacedor» conserva el sentido personal y evita una lectura politeísta; la pluralidad formal queda señalada en nota.
- source_word: נֹתֵן
  english_pob_choice: who gives
  chosen_spanish: que da
  alternatives_spanish:
  - que otorga
  - dando
  lexicon: HALOT
  rationale: El participio describe una acción característica de Dios; «que da» es una relativa natural y fiel al valor habitual.
- source_word: זְמִרוֹת
  english_pob_choice: songs
  chosen_spanish: cánticos
  alternatives_spanish:
  - canciones
  - cánticos de alabanza
  lexicon: HALOT
  rationale: El sustantivo puede referirse a cantos y, por el contexto poético, a cantos de alabanza. «Cánticos» conserva dignidad y deja abierta la implicación cultual sin forzarla.
- source_word: בַּלָּיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - durante la noche
  lexicon: HALOT
  rationale: «En la noche» reproduce bien la imagen poética y es idiomático en español; evita una paráfrasis excesiva.
theological_decisions:
- issue: Forma plural de עֹשָׂי aplicada a Dios
  english_pob_reading: 'singular sense: ''my Maker'' with note preserving the plural form'
  chosen_spanish_reading: 'sentido singular: «mi Hacedor», con nota sobre la forma plural del hebreo'
  alternative_spanish_readings:
  - «mis hacedores»
  - «el que me hizo»
  rationale: La forma hebrea es morfológicamente plural, pero el referente es el único Dios. Traducir en singular evita confusión doctrinal y preserva la tensión textual en nota, conforme al principio de primacía del original.
  doctrine_reference: Monoteísmo bíblico; fidelidad al dato morfológico sin inducir pluralidad de dioses
translation_notes:
  revision_awareness: 'El texto sigue de cerca el acuerdo alto del expediente inglés: mantiene el contraste adversativo de וְלֹא, el valor habitual de אָמַר, la pregunta existencial de אַיֵּה, el título divino singular אֱלוֹהַּ, y conserva la tensión de la forma plural de עֹשָׂי mediante una nota. No se detectaron revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלוֹהַּ, conforme al valor singular del término en Job.
  - Se usa «mi Hacedor» como término reverente y transparente; no se reemplaza por «Creador» porque el expediente inglés privilegia el sustantivo relacional de «Maker».
  - «Cánticos» mantiene un registro bíblico sobrio y, en español, puede abarcar el matiz de canto poético o de alabanza sin necesidad de explicitarlo en el texto principal.
  - La puntuación y comillas siguen el uso editorial español, con interrogación de apertura y cierre dentro de la cita directa.
