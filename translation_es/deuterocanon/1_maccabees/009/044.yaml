translation:
  language: es
  text: 'Y dijo Jonatán a sus hermanos: «Levantémonos ahora y peleemos por nuestras vidas, porque hoy no es como ayer y el día anterior[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no es hoy como ayer y el tercer día»; se trata de un modismo temporal que significa «como ayer y el día anterior».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναστῶμεν
  english_pob_choice: Let us rise
  chosen_spanish: Levantémonos
  alternatives_spanish:
  - Levantémonos de inmediato
  - Pongámonos en pie
  lexicon: LSJ
  rationale: Es un exhortativo a una acción inmediata. «Levantémonos» conserva el impulso de ponerse en acción sin reducirlo solo a la postura física, y funciona con naturalidad en español.
- source_word: πολεμήσωμεν
  english_pob_choice: fight
  chosen_spanish: peleemos
  alternatives_spanish:
  - hagamos guerra
  - combatamos
  lexicon: LSJ
  rationale: El verbo expresa entrar en combate. «Peleemos» es claro, directo y suficientemente fuerte para el contexto bélico sin sonar artificial.
- source_word: ὑπὲρ τῶν ψυχῶν ἡμῶν
  english_pob_choice: for our lives
  chosen_spanish: por nuestras vidas
  alternatives_spanish:
  - por nuestras almas
  - por nosotros mismos
  lexicon: LSJ
  rationale: Aquí ψυχαί se refiere a la vida/supervivencia en contexto de batalla. «Por nuestras vidas» preserva ese sentido y evita espiritualizar indebidamente el término.
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - compañeros
  - parientes
  lexicon: LSJ
  rationale: El griego dice literalmente «hermanos». En español, «hermanos» conserva el vínculo fraternal y también puede abarcar a los compañeros de lucha en este marco comunitario.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  lexicon: LSJ
  rationale: Adverbio temporal directo; «hoy» es la equivalencia natural y precisa en español.
- source_word: ὡς ἐχθὲς καὶ τρίτην ἡμέραν
  english_pob_choice: as yesterday and the day before
  chosen_spanish: como ayer y el día anterior
  alternatives_spanish:
  - como ayer y el tercer día
  - como ayer y antes de ayer
  lexicon: LSJ
  rationale: 'Se sigue el valor idiomático reconocido por la POB en inglés: no una referencia literal a «el tercer día», sino a los dos días previos. «El día anterior» comunica mejor esa relación temporal en español.'
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una equivalencia óptima y una nota sobre el modismo temporal. El español sigue esa misma solución, conservando el sentido de ψυχή como «vidas» en contexto militar y explicando en nota el giro idiomático de la cláusula final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece ningún tetragrámaton ni equivalente directo en el texto fuente.
  - Se prefirió «hermanos» para ἀδελφοῖς siguiendo el valor literal del griego y el contexto de exhortación comunitaria.
  - La puntuación con comillas angulares y nota al pie reproduce un estilo bíblico legible en español moderno.
