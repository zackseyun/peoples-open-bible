revisions:
- from: Pero ¿cómo podré recibir el dinero[a], si no lo conozco?[b]
  to: Pero ¿cómo podré recoger el dinero[a], si no conozco a ese hombre?[b]
  rationale: Se ajusta «recibir» a «recoger» para reflejar mejor la idea de recuperar fondos depositados. Se reemplaza «no lo conozco» por «no conozco a ese hombre» para evitar ambigüedad pronominal y reforzar la relación causal/práctica de la objeción. La nota [b] se armoniza con la formulación principal sin perder el valor del testimonio semítico paralelo.
