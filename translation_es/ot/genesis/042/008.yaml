translation:
  language: es
  text: José reconoció[a] a sus hermanos, pero ellos no lo reconocieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el mismo verbo en ambas cláusulas: José reconoció a sus hermanos, pero ellos no lo reconocieron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּר
  english_pob_choice: recognized
  chosen_spanish: reconoció
  alternatives_spanish:
  - conoció
  - identificó
  lexicon: HALOT
  rationale: El hifil de נכר aquí expresa reconocer o identificar a alguien ya conocido. «Reconoció» conserva la repetición verbal con la segunda cláusula y suena natural en español.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: Nombre propio bíblico
  rationale: El nombre propio se vierte de forma estándar al español bíblico como «José».
- source_word: אֶת אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  - a sus hermanos
  lexicon: HALOT
  rationale: אָח en plural masculino con sufijo de tercera persona singular se refiere aquí a los hermanos varones de José; el objeto directo personal en español se expresa naturalmente con «a».
- source_word: וְהֵם
  english_pob_choice: but they
  chosen_spanish: pero ellos
  alternatives_spanish:
  - y ellos
  lexicon: Conjunctional contrast
  rationale: 'Aunque la partícula ו es literalmente «y», el sentido narrativo es adversativo: José los reconoce, pero ellos no lo reconocen. «Pero» comunica mejor el contraste.'
- source_word: לֹא הִכִּרֻהוּ
  english_pob_choice: did not recognize him
  chosen_spanish: no lo reconocieron
  alternatives_spanish:
  - no lo identificaron
  - no lo conocieron
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo con la misma raíz semántica que en la primera cláusula. «No lo reconocieron» preserva la ironía narrativa y la repetición lexical.
translation_notes:
  revision_awareness: El texto sigue el patrón auditado del inglés POB y conserva la repetición verbal de נכר con contraste narrativo explícito. No se detectaron revisiones sustantivas en el contexto auditado.
  spanish_consistency_notes:
  - Se usa «José» para el nombre propio, en línea con el uso bíblico español común.
  - Se mantiene «reconoció/reconocieron» para reflejar la repetición del verbo hebreo.
  - 'Se usa el objeto directo con «a» ante personas: «a sus hermanos».'
