translation:
  language: es
  text: Y los que hayan quedado[a] sabrán que nada es mejor que el temor de Yahvé, y nada es más dulce que hacer caso a[b] los mandamientos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sobrevivientes» o «los que han quedado». El griego dice literalmente «los que han sido dejados».
    reason: lexical_alternative
  - marker: b
    text: O «que atender a». El griego sugiere una atención responsiva y obediente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνώσονται
  english_pob_choice: will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - llegarán a saber
  - reconocerán
  - conocerán plenamente
  lexicon: BDAG
  rationale: El futuro medio de ἐπιγινώσκω puede expresar conocimiento claro o pleno. «Sabrán» es natural en español y conserva la idea de una convicción adquirida por experiencia y reconocimiento posterior.
- source_word: οἱ καταλειφθέντες
  english_pob_choice: those who are left behind
  chosen_spanish: los que queden
  alternatives_spanish:
  - los que han sido dejados
  - los sobrevivientes
  - el remanente
  lexicon: LSJ
  rationale: El participio pasivo literalmente dice «los que han sido dejados». «Los que queden» mantiene la idea de quedar atrás o permanecer después de otros, sin precisar más de lo que el griego dice.
- source_word: οὐδὲν κρεῖττον
  english_pob_choice: nothing is better
  chosen_spanish: nada es mejor
  alternatives_spanish:
  - nada es superior
  - no hay nada mejor
  lexicon: BDAG
  rationale: La comparación absoluta se expresa de forma directa y idiomática en español con «nada es mejor».
- source_word: φόβου Κυρίου
  english_pob_choice: the fear of the Lord
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - el temor reverente de Yahvé
  lexicon: LSJ
  rationale: Se conserva la expresión sapiencial, pero con el nombre divino «Yahvé» según la pauta del proyecto. «Temor» mantiene la amplitud de reverencia, awe y obediencia implícita sin reducirla a una sola idea.
- source_word: γλυκύτερον
  english_pob_choice: sweeter
  chosen_spanish: más dulce
  alternatives_spanish:
  - más agradable
  - más deleitoso
  lexicon: LSJ
  rationale: «Más dulce» preserva la metáfora gustativa del texto y su tono sapiencial-poético.
- source_word: τοῦ προσέχειν
  english_pob_choice: heeding
  chosen_spanish: atender a
  alternatives_spanish:
  - hacer caso a
  - prestar atención a
  - guardar atención a
  lexicon: BDAG
  rationale: El infinitivo articular de προσέχω implica atención dirigida y respuesta obediente. «Atender a» conserva esa idea de atención activa sin sonar forzado en español.
- source_word: ἐντολαῖς Κυρίου
  english_pob_choice: the commandments of the Lord
  chosen_spanish: los mandamientos de Yahvé
  alternatives_spanish:
  - los mandamientos del Señor
  - los mandatos de Yahvé
  lexicon: BDAG
  rationale: ἐντολή puede ser «mandamiento» o «mandato». «Mandamientos» mantiene el registro bíblico y el paralelismo con la fórmula sapiencial anterior.
theological_decisions:
- issue: φόβου Κυρίου como expresión sapiencial
  english_pob_reading: Retain 'the fear of the Lord' as a theological wisdom formula.
  chosen_spanish_reading: Conservar «el temor de Yahvé» como fórmula sapiencial plena, no reducirla a «reverencia».
  alternative_spanish_readings:
  - la reverencia de Yahvé
  - el temor reverente de Yahvé
  - la piedad hacia Yahvé
  rationale: La expresión reúne reverencia, asombro y obediencia. Traducirla como «temor» preserva la densidad teológica y la forma proverbial del dicho.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms; יהוה → Yahvé'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: προσέχειν se prefirió como «heeding», es decir, atención obediente; en español se reflejó como «atender a» para mantener esa fuerza activa y formal. También se evitó calcar «SEÑOR» para יהוה, siguiendo la pauta del proyecto de usar «Yahvé».'
  spanish_consistency_notes:
  - Se mantuvo la fórmula sapiencial «el temor de Yahvé» por consistencia terminológica y fidelidad al griego Κυρίου en contexto de nombre divino.
  - «Atender a» conserva el matiz de atención obediente de προσέχειν sin endurecer el español ni diluir la exigencia del texto.
  - Se eligió «mandamientos» para ἐντολαῖς por su naturalidad bíblica en español y su correspondencia con el plural del griego.
