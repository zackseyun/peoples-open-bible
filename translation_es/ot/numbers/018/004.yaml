  timestamp: '2026-05-07T21:45:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: unión a Aarón, guarda de la función del tabernáculo, y prohibición de acercamiento para quien no tiene autorización. Sin embargo, dos elecciones debilitan la precisión del sentido fuente y del rastro POB: ''responsabilidad'' pierde el matiz cultual/técnico de מִשְׁמֶרֶת, y ''ningún extraño'' en español puede sonar étnico o genérico, cuando זָר aquí significa alguien no autorizado para esa función sagrada.'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para sonar más natural y más preciso en contexto cultual. 'Guardar la responsabilidad' no es una combinación idiomática tan fuerte como 'cumplir/guardar el encargo' o 'guardar la obligación', y la nota actual está anclada en una palabra cuya traducción principal conviene mejorar. El resto del verso fluye bien.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías ni otros términos globales. Sí hay una cuestión de alineación conceptual con el POB en זָר: conviene reflejar explícitamente ''persona ajena/no autorizada'' en nota, y preferiblemente evitar que ''extraño'' cargue el sentido principal. Para מִשְׁמֶרֶת, una opción como ''encargo'' preserva mejor el valor de deber encomendado que ''responsabilidad''.'
  issues:
  - severity: medium
    issue: מִשְׁמֶרֶת traducido como 'responsabilidad'
    rationale: Aunque comunica deber asignado, suena abstracto y menos técnico en español bíblico. En combinación con 'guardarán', 'guardarán la responsabilidad' resulta menos idiomático que 'guardarán/cumplirán el encargo' o similar.
  - severity: medium
    issue: זָר traducido como 'ningún extraño' sin nota específica sobre autorización cultual
    rationale: En español 'extraño' puede entenderse como desconocido, ajeno en general, o incluso extranjero. El inglés POB explicitó con nota que no se trata de etnia sino de falta de autorización sagrada; esa aclaración debe preservarse.
  revised_spanish_text: Se unirán a ti y guardarán el encargo[a] del tabernáculo de reunión para todo el servicio del tabernáculo; pero ninguna persona ajena[b] se acercará a ustedes.
  revised_footnotes:
  - marker: a
    text: O ‘la custodia’. El hebreo מִשְׁמֶרֶת puede referirse a un encargo o deber asignado, y también a una guarda o custodia establecida.
    reason: lexical_alternative
  - marker: b
    text: O ‘ninguna persona no autorizada’. El hebreo זָר aquí se refiere a alguien fuera del papel permitido en el santuario, no necesariamente a un extranjero por etnia.
    reason: lexical_alternative
  revision_rationale: Se cambia 'responsabilidad' por 'encargo' para reflejar mejor el sentido cultual de מִשְׁמֶרֶת y mejorar la naturalidad de 'guardarán el encargo'. Se sustituye 'ningún extraño' por 'ninguna persona ajena' y se añade nota para conservar explícitamente la decisión léxica del POB sobre זָר como exclusión por autorización cultual, no por nacionalidad. El resto del texto se mantiene por ser fiel y claro.
