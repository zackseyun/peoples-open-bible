revisions:
- from: 'Les informaron a David[a], diciendo: «Uría no había bajado a su casa». Entonces David dijo a Uría[b]: «¿No vienes de un viaje? ¿Por qué no has bajado a tu casa?»'
  to: 'Le informaron a David[a], diciendo: «Urías no bajó a su casa». Entonces David le dijo a Urías[b]: «¿No has venido de un viaje? ¿Por qué no bajaste a tu casa?»'
  rationale: 'Se corrige el clítico erróneo «Les» por «Le», se ajusta el nombre a «Urías» para la forma española más normal, y se mejoran los tiempos verbales para reflejar con más naturalidad la secuencia narrativa hebrea: reporte simple («no bajó»), llegada reciente («has venido»), y acción no realizada tras esa llegada («no bajaste»). Se mantienen «bajar» y «casa» para preservar el idiomatismo y la repetición del original.'
  reviewer_model: gpt-5.4
