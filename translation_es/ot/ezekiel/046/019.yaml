translation:
  language: es
  text: Entonces me llevó junto a la entrada que estaba al lado de la puerta, a las cámaras santas para los sacerdotes, las cuales daban al norte; y he aquí, allí había un lugar en el extremo occidental más alejado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «en su parte más remota, hacia el occidente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Y me llevó
  - Luego me llevó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide una secuencia pasada; «Entonces» conserva el avance del relato visionario. «Me llevó» mantiene el matiz causativo de בוא con sufijo de 1ª persona.
- source_word: בַמָּבוֹא
  english_pob_choice: by the entrance
  chosen_spanish: por la entrada
  alternatives_spanish:
  - junto a la entrada
  - a través de la entrada
  lexicon: HALOT
  rationale: מָבוֹא designa una entrada o acceso. En este contexto arquitectónico, «por la entrada» comunica el paso por esa vía sin forzar un giro más mecánico como «a través de».
- source_word: אֲשֶׁר עַל כֶּתֶף הַשַּׁעַר
  english_pob_choice: that was at the side of the gate
  chosen_spanish: que estaba al lado de la puerta
  alternatives_spanish:
  - que estaba en el costado de la puerta
  - que estaba en el hombro de la puerta
  lexicon: HALOT
  rationale: כֶּתֶף significa literalmente «hombro», pero en arquitectura funciona como «lado/costado». «Al lado de la puerta» suena natural en español y preserva la relación espacial. Se usa «puerta» para הַשַּׁעַר en sentido arquitectónico.
- source_word: אֶל הַלִּשְׁכוֹת הַקֹּדֶשׁ
  english_pob_choice: to the holy chambers
  chosen_spanish: a las cámaras santas
  alternatives_spanish:
  - a las cámaras sagradas
  - a los aposentos santos
  lexicon: HALOT
  rationale: לִשְׁכָּה es una cámara o cuarto de edificio; «cámaras» mantiene el referente arquitectónico. «Santas» reproduce el valor de הַקֹּדֶשׁ con un registro bíblico claro en español.
- source_word: אֶל הַכֹּהֲנִים
  english_pob_choice: for the priests
  chosen_spanish: para los sacerdotes
  alternatives_spanish:
  - de los sacerdotes
  - a los sacerdotes
  lexicon: HALOT
  rationale: 'Aquí la relación es de destinación o asignación funcional: las cámaras están destinadas al uso sacerdotal. «Sacerdotes» es la equivalencia directa de כֹּהֲנִים; se evita «sacerdotes» como lectura tradicional cargada y se mantiene el sentido funcional con «para».'
- source_word: הַפֹּנוֹת צָפֹונָה
  english_pob_choice: which faced north
  chosen_spanish: las cuales miraban al norte
  alternatives_spanish:
  - que daban al norte
  - orientadas al norte
  lexicon: HALOT
  rationale: El participio de פנה con dirección expresa orientación. «Miraban al norte» es idiomático y conserva la imagen espacial de la fachada o apertura orientada hacia el norte.
- source_word: וְהִנֵּה שָׁם מָקוֹם
  english_pob_choice: and behold, there was a place there
  chosen_spanish: y he aquí que allí había un lugar
  alternatives_spanish:
  - y he aquí, allí había un lugar
  - 'y miré: allí había un lugar'
  lexicon: HALOT
  rationale: וְהִנֵּה introduce una llamada de atención propia de la visión profética. «He aquí que» preserva esa fuerza deíctica sin volver el español rígido.
- source_word: בְיַרְכְתָם
  english_pob_choice: at the far western end
  chosen_spanish: en su extremo occidental
  alternatives_spanish:
  - en el fondo occidental
  - en la parte más alejada hacia el occidente
  lexicon: HALOT
  rationale: יַרְכָּה/יַרְכְתַיִם puede referirse al extremo o parte remota. «Extremo occidental» comunica el valor arquitectónico y espacial de modo claro; el posesivo «su» se entiende por el referente inmediato de las cámaras.
- source_word: יָמָּה
  english_pob_choice: western
  chosen_spanish: occidental
  alternatives_spanish:
  - hacia el occidente
  - al oeste
  lexicon: HALOT
  rationale: יָמָּה deriva de יָם y en uso direccional significa «al oeste / hacia el occidente». «Occidental» evita una repetición pesada y mantiene la orientación geográfica precisa.
theological_decisions:
- issue: Lenguaje del espacio sagrado y función sacerdotal
  english_pob_reading: the holy chambers for the priests
  chosen_spanish_reading: las cámaras santas para los sacerdotes
  alternative_spanish_readings:
  - las cámaras sagradas para los sacerdotes
  - los aposentos santos de los sacerdotes
  rationale: 'No hay aquí una afirmación doctrinal compleja, pero sí una relación cultual precisa: el espacio es santo y está asignado al servicio sacerdotal. «Cámaras santas» conserva el carácter arquitectónico y ritual sin sustituirlo por una formulación eclesiástica ajena al texto.'
  doctrine_reference: Ezekiel 40–48; santidad del espacio del templo y orden sacerdotal
- issue: Orientación occidental del lugar
  english_pob_reading: there was a place there at the far western end
  chosen_spanish_reading: allí había un lugar en su extremo occidental
  alternative_spanish_readings:
  - allí había un lugar en el extremo occidental
  - allí había un lugar al fondo hacia el occidente
  rationale: Se mantiene la tensión entre el hebreo, que literalmente dice «en su parte trasera / en sus lomos, al occidente», y la claridad del español. «Extremo occidental» conserva la orientación sin borrar la imagen de la parte remota del recinto.
  doctrine_reference: Ezekiel 46:19; significado espacial de יַרְכְתָם + יָמָּה
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste de la última revisión inglesa: se evita un calco tipo «through the entrance» y se opta por una formulación espacial más alineada con el hebreo. También se refleja la decisión de no añadir un posesivo explícito innecesario al final; en español, «su extremo occidental» funciona por referencia contextual y mantiene la fluidez. Se preserva la secuencia visionaria y la orientación arquitectónica sin sobreinterpretar el pasaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presenta el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene «sacerdotes» para כֹּהֲנִים como término técnico del templo.
  - Se evita «SEÑOR» porque no hay sustitución del nombre divino en el texto base.
  - Se conserva un registro bíblico sobrio, con «he aquí» para וְהִנֵּה, coherente con la prosa visionaria de Ezequiel.
