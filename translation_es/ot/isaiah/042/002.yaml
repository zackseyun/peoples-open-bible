translation:
  language: es
  text: No clamará ni alzará su voz[a], ni hará oír su voz en la calle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No alzará ni hará oír su voz fuera»; el hebreo permite omitir el objeto con el verbo ‘alzar’, y בַּחוּץ puede traducirse como «afuera» o «en público».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִצְעַק
  english_pob_choice: cry out
  chosen_spanish: clamará
  alternatives_spanish:
  - gritará
  - vociferará
  - clamará en voz alta
  lexicon: HALOT
  rationale: צעק expresa un grito o clamor audible; en español, «clamar» conserva el sentido de alzar la voz con intensidad sin sonar tan coloquial como «gritar» ni más fuerte de lo que exige el contexto.
- source_word: יִשָּׂא
  english_pob_choice: raise his voice
  chosen_spanish: alzará su voz
  alternatives_spanish:
  - levantará su voz
  - elevará su voz
  - alzará
  lexicon: HALOT
  rationale: El verbo נשׂא aquí es idiomático y se entiende por el contexto como «levantar/alzar» la voz. «Alzará su voz» mantiene la elipsis del hebreo y su paralelismo con la cláusula anterior; el añadido «su voz» evita ambigüedad en español.
- source_word: יַשְׁמִיעַ
  english_pob_choice: make his voice heard
  chosen_spanish: hará oír su voz
  alternatives_spanish:
  - la hará oír
  - hará que se oiga su voz
  - dará a oír su voz
  lexicon: HALOT
  rationale: 'El hifil de שׁמע es causativo: «hacer oír». «Hará oír su voz» reproduce bien esa causatividad en español y preserva el paralelo con las dos primeras negaciones.'
- source_word: בַּחוּץ
  english_pob_choice: in the street
  chosen_spanish: en la calle
  alternatives_spanish:
  - afuera
  - en público
  - en la plaza
  lexicon: HALOT
  rationale: חוּץ designa el espacio exterior o público. «En la calle» comunica naturalmente la escena de proclamación pública y coincide con el valor espacial del término en este contexto poético.
- source_word: קוֹלוֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  lexicon: HALOT
  rationale: קוֹל suele significar «voz» cuando se refiere al habla humana. Repetir «su voz» conserva el énfasis del hebreo y el vínculo con la segunda cláusula.
- source_word: לֹא ... וְלֹא ... וְלֹא
  english_pob_choice: will not ... or ... or
  chosen_spanish: No ... ni ... ni ...
  alternatives_spanish:
  - No ... o ... o ...
  - No ... y no ... y no ...
  lexicon: Hebrew syntax
  rationale: La cadena de negaciones expresa una serie paralela. En español, «ni ... ni ... ni ...» reproduce mejor esa coordinación acumulativa y suena natural en un registro bíblico moderno.
theological_decisions:
- issue: Valor aspectual de los imperfectos en un texto profético sobre el Siervo
  english_pob_reading: future-like descriptive rendering ('He will not ...')
  chosen_spanish_reading: futuro descriptivo ('No clamará...')
  alternative_spanish_readings:
  - presente habitual ('No clama...')
  rationale: En el marco profético de Isaías 42, los imperfectos describen rasgos del Siervo con fuerza prospectiva. El futuro en español transmite ese perfil programático y mantiene la lectura discursiva del POB inglés.
  doctrine_reference: Isaías 42:1–4; perfil del Siervo en el canto del Siervo
translation_notes:
  revision_awareness: El texto sigue el pass más reciente del POB inglés, que se mantuvo sin cambios tras revisión y mostró alta concordancia. La draft en español conserva la estructura tripartita negativa y la imagen pública de la escena sin introducir explicaciones ajenas al hebreo.
  spanish_consistency_notes:
  - Se eligió «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «voz» en ambas ocurrencias de קוֹל para reflejar el paralelismo hebreo.
  - La puntuación con comas separa las cláusulas paralelas sin debilitar la cadencia poética.
