    rationale: El expediente inglés conserva tanto «I will make mention of your name» como «I will remember your name». La nota española solo incluye «haré mención de», y pierde la alternativa simple «recordaré tu nombre», que aunque no es preferida sí forma parte del rastro de auditoría léxica.
  - severity: low
    issue: La expresión final «por siempre y para siempre» es comprensible pero menos idiomática en español.
    rationale: La construcción transmite intensificación, pero suena algo inflada. «Por siempre jamás» preserva bien la duración enfática de לְעוֹלָם וָעֶד con mejor naturalidad en español eclesial amplio.
