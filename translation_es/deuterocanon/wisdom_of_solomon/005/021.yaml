translation:
  language: es
  text: Saldrán proyectiles de relámpagos bien apuntados, y como desde un arco bien curvado de nubes[a] volarán al blanco[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘desde el arco bien curvado de las nubes’; la imagen puede evocar el arco de tormenta o el arcoíris, pero el griego dice más literalmente ‘arco de nubes’.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘serán lanzados al blanco’ o ‘se precipitarán al blanco’. El verbo griego es vívido y algo difícil; la idea es de movimiento rápido hacia el objetivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: πορεύσονται
  english_pob_choice: will go forth
  chosen_spanish: saldrán
  alternatives_spanish:
  - irán
  - saldrán adelante
  lexicon: LSJ
  rationale: El futuro medio de πορεύομαι expresa movimiento de salida o avance; en español, ‘saldrán’ conserva el dinamismo poético y el matiz de irrupción mejor que una simple traducción literal como ‘irán’.
- source_word: εὔστοχοι
  english_pob_choice: well-aimed
  chosen_spanish: bien apuntadas
  alternatives_spanish:
  - acertadas
  - bien dirigidas
  lexicon: LSJ
  rationale: El adjetivo indica precisión para dar en el blanco. ‘Bien apuntadas’ mantiene la imagen de puntería y resulta natural en español actual sin perder el sentido técnico-militar del griego.
- source_word: βολίδες
  english_pob_choice: bolts
  chosen_spanish: flechas
  alternatives_spanish:
  - dardos
  - proyectiles
  - saetas
  lexicon: LSJ
  rationale: En español, ‘bolts’ no tiene un equivalente idiomático fuerte para este contexto; ‘flechas’ comunica la imagen de proyectil veloz y punzante. ‘Saetas’ sería posible, pero ‘flechas’ es más transparente para lectura pública. Se preserva la metáfora bélica-poética sin sobrecargarla con terminología moderna.
- source_word: ἀστραπῶν
  english_pob_choice: of lightning
  chosen_spanish: de relámpago
  alternatives_spanish:
  - de fulgor
  - de rayos
  lexicon: LSJ
  rationale: El genitivo plural de ἀστραπή se refiere al fenómeno del relámpago/fulgor. ‘De relámpago’ mantiene la fuerza visual y evita la necesidad de pluralizar innecesariamente en español.
- source_word: εὐκύκλου τόξου τῶν νεφῶν
  english_pob_choice: a well-curved bow of clouds
  chosen_spanish: un arco bien curvado de nubes
  alternatives_spanish:
  - un arco bien redondeado de nubes
  - un arco de nubes bien curvado
  lexicon: LSJ
  rationale: εὐκύκλου alude a algo bien curvado o bien redondeado. ‘Arco bien curvado’ conserva la forma y la imagen sin introducir explícitamente ‘arcoíris’; ‘de nubes’ mantiene el genitivo griego y su ambigüedad evocadora.
- source_word: ἐπὶ σκοπόν
  english_pob_choice: to the target
  chosen_spanish: al blanco
  alternatives_spanish:
  - al objetivo
  - a la diana
  lexicon: LSJ
  rationale: σκοπός es ‘blanco/objetivo/target’. ‘Al blanco’ es la expresión española más idiomática para un tiro certero y retiene el registro de precisión del pasaje.
- source_word: ἁλοῦνται
  english_pob_choice: they will fly
  chosen_spanish: volarán
  alternatives_spanish:
  - serán lanzadas
  - se precipitarán
  - irán volando
  lexicon: LSJ
  rationale: El verbo es vívido y difícil; el audit trail inglés opta por el movimiento rápido hacia el blanco. ‘Volarán’ transmite esa rapidez y el impulso proyectil sin convertir el verso en una explicación demasiado prosaica.
theological_decisions:
- issue: Posible alusión al arcoíris o arco de tormenta en τῶν νεφῶν
  english_pob_reading: Rendered generically as 'bow of clouds' in the main text
  chosen_spanish_reading: arco bien curvado de nubes
  alternative_spanish_readings:
  - arcoíris
  - arco de las nubes
  - arco de tormenta
  rationale: El griego dice literalmente ‘arco de nubes’ y no exige identificarlo como arcoíris. Mantener una formulación general preserva la ambigüedad literaria del original y evita importar una identificación interpretativa que el texto no explicita.
  doctrine_reference: Primacía del texto original; conservar ambigüedad cuando el griego no la resuelve.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego de Swete (1909) y toma en cuenta la revisión inglesa más reciente: se prefirió una solución que preserve el ímpetu de ‘go forth / fly’ y la literalidad controlada de ‘bow of clouds’, sin traducir mecánicamente desde el inglés ni convertir la imagen en ‘arcoíris’ en el texto principal.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - ‘Blanco’ se eligió por su naturalidad en el español bíblico y su equivalencia con σκοπός en contexto de puntería.
  - Se evitó ‘Cristo/Mesías’ porque no aparece en el versículo.
  - Se mantuvo la metáfora bélica-poética con léxico claro y publicable en español.
