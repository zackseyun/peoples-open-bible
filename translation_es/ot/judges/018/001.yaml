review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del hebreo: la fórmula temporal repetida, la ausencia de rey, la búsqueda continua de una porción territorial por parte de la tribu de Dan y la razón dada. Sin embargo, las notas al pie están desancladas e intercambiadas respecto del contenido fuente y del rastro de auditoría inglés. La nota [a] está colocada sobre ''Israel'' pero habla de una alternativa para שֵׁבֶט הַדָּנִי; la [b] está colocada sobre ''Dan'' pero explica נַחֲלָה. Además, el inglés conserva una nota sobre el modismo ''no le había caído heredad'', que en español conviene preservar explícitamente.'
  spanish_quality_summary: El español es generalmente claro y digno. 'No había rey en Israel', 'buscaba para sí', y 'hasta aquel día' son naturales. 'Heredad' funciona bien en registro bíblico, aunque su repetición es un poco pesada; aun así, es aceptable por fidelidad semántica. 'Para habitar' es comprensible, pero 'para establecerse' o 'donde habitar' sería algo más idiomático; no es un problema mayor. La reparación principal necesaria es de aparato crítico y anclaje de notas.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Cristo o δοῦλος. La elección 'heredad' para נַחֲלָה concuerda con la racionalidad documentada de preservar el matiz de porción territorial heredada. 'La tribu de Dan' es aceptable como alternativa documentada a 'la tribu de los danitas', pero entonces la nota debe reflejar la alternativa correcta y anclarse a esa frase.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas y su contenido no corresponde al marcador en el texto.
    rationale: La nota [a] aparece en 'Israel[a]' pero explica 'la tribu de Dan'; la nota [b] aparece en 'Dan[b]' pero explica 'una heredad'. Esto rompe la trazabilidad del aparato crítico y no preserva fielmente el audit trail.
  - severity: medium
    issue: Falta en español una nota explícita para el modismo 'no le había caído heredad', que el inglés documenta como idiomático.
    rationale: El rastro inglés preserva la explicación de נָפְלָה ... נַחֲלָה como expresión de adjudicación territorial. En español, aunque 'caído heredad' es defendible, conviene mantener la nota aclaratoria correspondiente.
  - severity: low
    issue: La formulación de la nota sobre נַחֲלָה en el borrador no refleja bien la nota inglesa preservada.
    rationale: 'La nota actual dice ''Literalmente: una heredad'', pero el asunto notable no es que נַחֲלָה signifique simplemente ''heredad'', sino el modismo completo ''no le había caído heredad'' referido al reparto tribal.'
  revised_spanish_text: En aquellos días no había rey en Israel. Y en aquellos días la tribu de Dan[a] buscaba para sí una heredad para habitar, porque hasta aquel día no le había caído heredad[b] en medio de las tribus de Israel.
  revised_footnotes:
