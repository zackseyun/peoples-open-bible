translation:
  language: es
  text: Tal es la generación de los que lo buscan[a], de los que buscan tu rostro, oh Dios de Jacob. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «los que buscan tu rostro, Jacob». El hebreo tiene simplemente «tu rostro, Jacob», y puede ser elíptico; por eso el texto principal entiende «Dios de Jacob». Otra posibilidad es que «Jacob» represente al pueblo que lo busca.'
    reason: alternative_reading
lexical_decisions:
- source_word: זֶה
  english_pob_choice: Such is
  chosen_spanish: Tal es
  alternatives_spanish:
  - Esto es
  - Así es
  lexicon: HALOT
  rationale: El demostrativo introduce una caracterización del tipo de gente descrito; «Tal es» reproduce naturalmente ese valor clasificatorio en español sin perder cercanía al hebreo.
- source_word: דּוֹר
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - edad
  - grupo
  - clase
  lexicon: HALOT
  rationale: Aquí denota una clase o grupo humano, no una edad cronológica; «generación» conserva el uso bíblico normal y el paralelismo del verso.
- source_word: דֹּרְשׁוֹ
  english_pob_choice: those who seek him
  chosen_spanish: los que lo buscan
  alternatives_spanish:
  - los que lo procuran
  - los que inquieren de él
  - los que lo buscan diligentemente
  lexicon: HALOT
  rationale: El participio sustantivado con sufijo de 3ms expresa a quienes buscan a Dios; «los que lo buscan» es natural en español y mantiene la relación con el verbo paralelo siguiente.
- source_word: מְבַקְשֵׁי
  english_pob_choice: who seek
  chosen_spanish: los que buscan
  alternatives_spanish:
  - los que procuran
  - los que desean
  lexicon: HALOT
  rationale: Se conserva «buscar» para reflejar el paralelismo léxico con דֹּרְשׁוֹ y el tono activo de la búsqueda.
- source_word: פָנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu rostro». En español, «rostro» mantiene la concreción idiomática y permite preservar la imagen bíblica sin volverla abstracta.
- source_word: יַעֲקֹב
  english_pob_choice: O Jacob
  chosen_spanish: oh Jacob
  alternatives_spanish:
  - Jacob
  - oh, Dios de Jacob
  lexicon: HALOT
  rationale: El texto consonántico hebreo tal como está transmitido deja una dificultad sintáctica real. La versión principal conserva el nombre como vocativo, siguiendo el audit trail inglés y evitando suplir palabras que no están en el hebreo; al mismo tiempo, se documenta la lectura alternativa tradicional en la nota.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional porque su función exacta es incierta y traducirla añadiría más certeza de la que ofrece el texto.
theological_decisions:
- issue: Interpretación de יַעֲקֹב en la frase final
  english_pob_reading: Main text reads 'who seek your face, O Jacob,' while footnote preserves the possible ellipsis 'O God of Jacob' and the appositional reading.
  chosen_spanish_reading: El texto principal mantiene la lectura vocativa «oh Jacob»; la nota preserva la posibilidad de un elíptico «oh Dios de Jacob» o de una lectura apposicional.
  alternative_spanish_readings:
  - «los que buscan tu rostro, oh Dios de Jacob»
  - «los que buscan tu rostro, Jacob» como apposición
  rationale: La evidencia hebrea no incluye explícitamente «Dios de». Para no borrar la tensión textual documentada por el POB inglés, la línea principal conserva la forma difícil y la nota presenta las lecturas alternativas más discutidas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El expediente inglés pasó de una solución más interpretativa («O Dios de Jacob») a una revisión que volvió a la forma más cercana al hebreo («O Jacob») para preservar la dificultad del texto. La redacción española sigue esa revisión y evita resolver la ambigüedad en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero en este versículo el texto hebreo usa un sufijo pronominal de tercera persona y no el nombre divino; por eso el español emplea «lo» y no introduce «Yahvé».
  - Se conserva el paralelismo verbal con «buscar» en ambos miembros.
  - «Selah» se deja transliterado por consistencia con el tratamiento POB de este término técnico-litúrgico.
  - No se sustituye «rostro» por «presencia» para preservar la concreción poética del hebreo.
