base_translation:
  language: en
  yaml_path: translation/ot/2_kings/014/009.yaml
  text: Then Jehoash king of Israel sent to Amaziah king of Judah[a], saying, “The thornbush that was in Lebanon sent to the cedar that was in Lebanon, saying[b], ‘Give your daughter to my son as a wife.’ And a wild beast that was in Lebanon passed by and trampled the thornbush.”
