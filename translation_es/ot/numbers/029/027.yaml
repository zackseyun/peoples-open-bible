translation:
  language: es
  text: y junto con sus ofrendas de cereal y sus libaciones, para los toros, para los carneros y para los corderos, según su número, según la ordenanza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme al modo prescrito». El hebreo כַּמִּשְׁפָּט se refiere al procedimiento establecido para estas ofrendas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  english_pob_choice: their grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de cereal
  - su ofrenda de grano
  - su oblación vegetal
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה designa la ofrenda que acompaña al sacrificio principal. En español, 'ofrenda vegetal' conserva el valor cultual tradicional y evita el calco demasiado técnico, manteniendo la precisión de una ofrenda no animal.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas líquidas
  - sus ofrendas de bebida
  lexicon: HALOT
  rationale: נֶסֶךְ se refiere a ofrendas derramadas, normalmente de vino. 'Libaciones' es el equivalente español más preciso y culto; 'ofrendas líquidas' es explicativo pero menos natural.
- source_word: לַפָּרִים
  english_pob_choice: for the bulls
  chosen_spanish: para los toros
  alternatives_spanish:
  - para los bueyes
  - con los toros
  lexicon: HALOT
  rationale: El sustantivo פָּרִים se refiere aquí a toros para sacrificio. 'Toros' es claro y adecuado en español bíblico; 'bueyes' puede sonar más doméstico y menos cultual.
- source_word: לָאֵילִם
  english_pob_choice: for the rams
  chosen_spanish: para los carneros
  alternatives_spanish:
  - para los machos de oveja
  - con los carneros
  lexicon: HALOT
  rationale: אֵילִים corresponde a carneros. 'Carneros' es el término bíblico y sacrificial estándar en español, más preciso que la paráfrasis zoológica.
- source_word: וְלַכְּבָשִׂים
  english_pob_choice: and for the lambs
  chosen_spanish: y para los corderos
  alternatives_spanish:
  - y para los borregos
  - y con los corderos
  lexicon: HALOT
  rationale: כְּבָשִׂים designa corderos en este inventario sacrificial. 'Corderos' es el equivalente más transparente y tradicionalmente comprensible.
- source_word: בְּמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - de acuerdo con su número
  - conforme a su número
  lexicon: HALOT
  rationale: La expresión indica proporcionalidad respecto al número de animales. 'Según su número' reproduce con naturalidad la relación cuantitativa del hebreo sin sobrecargar la frase.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según la ordenanza
  - según el orden prescrito
  - conforme al reglamento
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí apunta al procedimiento normativo ya establecido para estas ofrendas. 'Estatuto' conserva el matiz legal/cultual y evita reducirlo a mera 'norma' administrativa. Se mantiene la tensión entre orden establecido y prescripción ritual.
theological_decisions:
- issue: Sentido de כַּמִּשְׁפָּט en contexto ritual
  english_pob_reading: according to the ordinance
  chosen_spanish_reading: conforme al estatuto
  alternative_spanish_readings:
  - según el reglamento
  - según la ordenanza
  - como se ha prescrito
  rationale: El hebreo no describe una opinión o sentencia judicial, sino el modo establecido para realizar las ofrendas. 'Estatuto' preserva el carácter normativo y sagrado del rito, coherente con el inventario sacerdotal de Números 29.
  doctrine_reference: Levítico 6–7; Números 28–29
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el acuerdo de auditoría es alto y no se requieren ajustes adicionales. La versión española sigue de cerca la estructura del hebreo y la decisión inglesa de explicitar la dependencia de las ofrendas acompañantes.
  spanish_consistency_notes:
  - 'Se conservó el registro cultual de Números 29 con términos españoles estables: ofrenda vegetal, libaciones, toros, carneros y corderos.'
  - Se evitó traducir מִשְׁפָּט como 'juicio' porque aquí la referencia es normativa y ritual, no forense.
  - La coordinación inicial 'y junto con' refleja la dependencia sintáctica de esta frase respecto de la lista anterior de sacrificios.
