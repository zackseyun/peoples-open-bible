translation:
  language: es
  text: Pero en las cumbres de los montes y en las grietas de los barrancos y en los huecos de los árboles y en sus partes más altas[a], al hacer nidos, da a luz y aleja al que se acerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus extremidades»; literalmente, «sus partes más altas/extremidades», refiriéndose a las zonas elevadas o externas de estos lugares.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ δὲ κατὰ τὰς κορυφὰς ὀρέων
  english_pob_choice: in the peaks of mountains
  chosen_spanish: en las cumbres de los montes
  alternatives_spanish:
  - en las cimas de los montes
  - en las cumbres de las montañas
  lexicon: LSJ
  rationale: La locución κατά con acusativo aquí es locativa/distributiva; «en las cumbres» conserva la imagen de altura y funciona con naturalidad en español. «Montes» mantiene el tono más bíblico y concreto del paisaje.
- source_word: φαράγγων ἀπορρῶγας
  english_pob_choice: the clefts of ravines
  chosen_spanish: las grietas de los barrancos
  alternatives_spanish:
  - las hendiduras de los barrancos
  - las grietas de las quebradas
  lexicon: LSJ
  rationale: ἀπορρῶγας expresa hendiduras, grietas o peñas desgajadas. «Grietas» recoge bien la fuerza visual; «barrancos» comunica el terreno abrupto de manera natural en español.
- source_word: δένδρων ὀπὰς
  english_pob_choice: the hollows of trees
  chosen_spanish: los huecos de los árboles
  alternatives_spanish:
  - los hollos de los árboles
  - las cavidades de los árboles
  lexicon: LSJ
  rationale: ὀπή significa hoyo, abertura o cavidad. «Huecos» es el equivalente español más claro y común para un lugar de anidación.
- source_word: τὰς τούτων ἄκρας
  english_pob_choice: their tops
  chosen_spanish: sus extremos
  alternatives_spanish:
  - sus cimas
  - sus partes más altas
  - sus bordes
  lexicon: LSJ
  rationale: El texto griego puede referirse literalmente a las «cimas/extremos» de esos lugares. La revisión inglesa optó por «their tops/extremities»; en español, «sus extremos» conserva esa amplitud semántica sin forzar una referencia exclusiva a la parte superior. Se mantiene la ambigüedad útil del original.
- source_word: νοσσοποιούμενα
  english_pob_choice: making nests
  chosen_spanish: al hacer nidos
  alternatives_spanish:
  - anidando
  - haciendo su nido
  lexicon: LSJ
  rationale: El participio describe la acción de nidificar. «Al hacer nidos» refleja el proceso de anidación con claridad y evita añadir una idea de reproducción explícita que el griego aquí no desarrolla de forma separada.
- source_word: ἀποτίκτει
  english_pob_choice: it gives birth
  chosen_spanish: da a luz
  alternatives_spanish:
  - pare
  - echa crías
  lexicon: LSJ
  rationale: El verbo significa traer al mundo o dar a luz. «Da a luz» es una traducción natural y fiel en español, manteniendo el sentido de nacimiento que la imagen pretende.
- source_word: τὸν προσιόντα
  english_pob_choice: the one who approaches
  chosen_spanish: al que se acerca
  alternatives_spanish:
  - al que se aproxima
  - al que llega
  lexicon: LSJ
  rationale: El participio singular tiene valor genérico. «Al que se acerca» conserva ese matiz sin volver la frase excesivamente abstracta.
- source_word: κωλύει
  english_pob_choice: keeps away
  chosen_spanish: aleja
  alternatives_spanish:
  - impide el acceso a
  - rechaza
  lexicon: LSJ
  rationale: En el contexto de un nido, κωλύει comunica la acción de apartar o impedir el acercamiento. «Aleja» es breve, natural y preserva la fuerza práctica del verbo.
translation_notes:
  revision_awareness: La versión inglesa revisada restituyó «and their tops/extremities» para τὰς τούτων ἄκρας y eliminó una interpretación adverbial previa. La presente traducción conserva esa amplitud con «sus extremos», evitando reducir el sentido a una sola imagen. También sigue la revisión al mantener el sujeto singular implícito y una secuencia verbal breve y directa.
  spanish_consistency_notes:
  - Se mantiene un registro digno y bíblico sin calcos duros.
  - «Montes» y «barrancos» sostienen un paisaje abrupto acorde al griego.
  - «Da a luz» se usa aquí por el sentido literal del verbo y no implica una lectura teológica adicional.
  - La nota al pie preserva la alternativa léxica importante para «extremos».
