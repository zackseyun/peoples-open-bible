revisions:
- from: Que el rey nombre oficiales en todas las provincias de su reino[a], y que reúnan a toda joven virgen[b] de hermoso aspecto, en Susa la ciudadela, en la casa de las mujeres, bajo el cuidado de Hegai, eunuco del rey y guardián de las mujeres; y que se les den sus ungüentos[c].
  to: Que el rey nombre oficiales en todas las provincias de su reino, y que reúnan a toda joven virgen de hermoso aspecto, a Susa la ciudadela, a la casa de las mujeres[a], bajo la custodia de Hegai, eunuco del rey y guardián de las mujeres; y que se les den sus cosméticos[b].
  rationale: Se corrige un error importante de anclaje de nota, se mejora la naturalidad de las preposiciones direccionales, se refuerza el matiz de custodia de אֶל יַד, y se sustituye «ungüentos» por «cosméticos» como opción española más natural y mejor alineada con la decisión POB, manteniendo la amplitud semántica en nota.
  reviewer_model: gpt-5.4
