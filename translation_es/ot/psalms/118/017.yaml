translation:
  language: es
  text: No moriré[a], sino que viviré y contaré las obras de Yah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yah», forma poética abreviada del nombre divino; muchas versiones la vierten más generalmente como «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La partícula de negación se conserva de forma directa y natural en español. 'No' mantiene la negación inmediata del verbo siguiente sin añadir intensidad no presente en el hebreo.
- source_word: אָמ֥וּת
  english_pob_choice: I will die
  chosen_spanish: moriré
  alternatives_spanish:
  - he de morir
  - voy a morir
  lexicon: HALOT
  rationale: El imperfecto qal de מות en este paralelo poético expresa futuro/confianza; 'moriré' es la forma más natural y fiel en español. Evita una perífrasis innecesaria.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - mas
  - porque
  lexicon: HALOT
  rationale: Aquí כִּי funciona en contraste adversativo según la revisión inglesa. En español, 'sino que' expresa mejor la oposición entre 'no moriré' y 'viviré' que un simple 'pero'.
- source_word: אֶֽחְיֶ֑ה
  english_pob_choice: I will live
  chosen_spanish: viviré
  alternatives_spanish:
  - seguiré viviendo
  - he de vivir
  lexicon: HALOT
  rationale: El imperfecto qal de חיה se traduce con futuro en paralelo con 'moriré'. 'Viviré' preserva la fuerza afirmativa y la simetría poética.
- source_word: וַ֝/אֲסַפֵּ֗ר
  english_pob_choice: and recount
  chosen_spanish: y contaré
  alternatives_spanish:
  - y relataré
  - y declararé
  - y narraré
  lexicon: HALOT
  rationale: El piel de ספר puede significar contar, relatar o declarar. 'Contaré' es idiomático en español y mantiene el sentido de narrar las acciones divinas.
- source_word: מַֽעֲשֵׂ֥י
  english_pob_choice: the deeds
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  - las obras hechas
  lexicon: HALOT
  rationale: El constructo plural de מַעֲשֶׂה se refiere a acciones/hechos/obras. 'Obras' es una equivalencia natural y suficientemente solemne en español bíblico sin cargar una connotación doctrinal ajena al contexto.
- source_word: יָֽהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - el SEÑOR
  - Yavé
  lexicon: HALOT
  rationale: Se conserva la forma poética abreviada del nombre divino como transliteración. No se normaliza a 'SEÑOR' porque el hebreo no usa כאן el tetragrámaton completo sino יָהּ.
theological_decisions:
- issue: Forma abreviada del nombre divino יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - el SEÑOR
  - Yavé
  rationale: La decisión inglesa distingue la forma poética abreviada de יְהוָה. En español se preserva esa distinción transliterando 'Yah' para respetar la forma del texto fuente y no borrar el matiz poético.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §2; Contested terms table for divine name forms'
translation_notes:
  revision_awareness: 'La versión inglesa pasó por una revisión que cambió la relación de כִּי de ''for'' a ''but'' para reflejar mejor el contraste adversativo. Por eso la redacción española usa ''sino que'' en lugar de una causalidad explícita, manteniendo el paralelismo: negación de la muerte, afirmación de la vida y propósito de contar las obras de Yah.'
  spanish_consistency_notes:
  - Se mantiene 'Yah' como forma abreviada del nombre divino, coherente con el criterio del proyecto para יָהּ.
  - '''Obras'' reproduce de manera natural מַעֲשֵי sin convertirlo en un término técnico teológico distinto.'
  - La puntuación con coma antes de 'sino que' ayuda a reflejar el contraste poético del hebreo sin sobreinterpretarlo.
