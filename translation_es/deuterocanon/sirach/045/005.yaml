revisions:
- from: Lo hizo oír su voz[a], y lo introdujo en la nube oscura. Puso en su mano el mandamiento, una ley de vida y entendimiento, para enseñar a Jacob sus estatutos[b], y a Israel sus testimonios y sus juicios.
  to: Le hizo oír su voz, y lo acercó a la nube oscura. Puso en su mano el mandamiento[a], una ley de vida y entendimiento, para enseñar a Jacob sus estatutos[b], y a Israel sus testimonios y sus juicios.
  rationale: Se reubica la nota [a] sobre «el mandamiento», porque esa variante no corresponde a «su voz». Además, se mejora la naturalidad española con «Le hizo oír» y se corrige el verbo teofánico a «lo acercó a la nube oscura» para reflejar mejor el hebreo primario y el audit trail inglés.
