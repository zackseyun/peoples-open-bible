base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/027/024.yaml
  text: They were your merchants in choice wares[a], in wraps of blue and embroidered cloth, and in treasuries of multicolored fabrics, bound with cords and secured[b], among your merchandise.
  footnotes:
  - marker: a
    text: Or 'in chests of cedar' / 'cedar-lined'; the Hebrew term is difficult, and some understand it from the word for 'cedar' rather than as another description of how the goods were packed.
    reason: alternative_reading
  - marker: b
    text: The phrase rendered 'treasuries of multicolored fabrics' is uncertain; it may refer to valuable stores, chests, or bundles of richly colored textiles.
    reason: lexical_alternative
