id: REV.14.10
reference: Revelation 14:10
source:
  edition: SBLGNT
  text: καὶ αὐτὸς πίεται ἐκ τοῦ οἴνου τοῦ θυμοῦ τοῦ θεοῦ τοῦ κεκερασμένου ἀκράτου ἐν τῷ ποτηρίῳ τῆς ὀργῆς αὐτοῦ, καὶ βασανισθήσεται ἐν πυρὶ καὶ θείῳ ἐνώπιον ⸂ἀγγέλων ἁγίων⸃ καὶ ἐνώπιον τοῦ ἀρνίου.
translation:
  text: he also will drink from the wine of God's wrath[a], mixed undiluted in the cup of his anger[b], and he will be tormented with fire and sulfur before the holy angels and before the Lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'mixed undiluted in the cup of his anger.' The Greek combines the ideas of prepared/mixed wine and wine that is undiluted, stressing judgment in its full strength.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''with fire and brimstone.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: he also
  alternatives:
  - he himself also
  - that one also
  lexicon: BDAG
  rationale: The pronoun is emphatic and resumes the individual described in the previous verse. 'He also' captures both the personal reference and the additive force without sounding wooden.
- source_word: πίεται
  chosen: will drink
  alternatives:
  - shall drink
  lexicon: BDAG
  rationale: Future middle of πίνω is naturally rendered 'will drink.' English does not need to mark the middle voice here.
- source_word: ἐκ τοῦ οἴνου
  chosen: from the wine
  alternatives:
  - of the wine
  lexicon: BDAG
  rationale: The preposition ἐκ is best represented explicitly as 'from,' preserving the image of drinking from a source.
- source_word: θυμοῦ
  chosen: wrath
  alternatives:
  - fury
  - passion
  lexicon: BDAG
  rationale: In Revelation, θυμός in judgment contexts denotes intense divine wrath. 'Wrath' is the most natural and theologically weighty English equivalent.
- source_word: τοῦ θεοῦ
  chosen: God's
  alternatives:
  - of God
  lexicon: BDAG
  rationale: The possessive form is idiomatic English and preserves the genitival relationship.
- source_word: τοῦ κεκερασμένου ἀκράτου
  chosen: poured full strength
  alternatives:
  - mixed undiluted
  - mixed full strength
  - prepared undiluted
  lexicon: BDAG
  rationale: The perfect participle of κεράννυμι refers to prepared/mixed wine, while ἄκρατος means undiluted. Because 'mixed undiluted' sounds contradictory in English though it reflects ancient wine preparation idiom, 'poured full strength' communicates the sense that the wine is prepared and yet undiluted, i.e., not weakened.
- source_word: ἐν τῷ ποτηρίῳ
  chosen: into the cup
  alternatives:
  - in the cup
  lexicon: BDAG
  rationale: Although ἐν normally means 'in,' with the participial idea of preparation the phrase is naturally rendered 'into the cup' in English to express the wine being poured/prepared there. This avoids awkwardness while preserving the imagery.
- source_word: τῆς ὀργῆς αὐτοῦ
  chosen: of his anger
  alternatives:
  - of his wrath
  lexicon: BDAG
  rationale: Using 'anger' here helps preserve the distinction between θυμός and ὀργή rather than flattening both to 'wrath.' The genitive refers to God's own cup of anger.
- source_word: βασανισθήσεται
  chosen: will be tormented
  alternatives:
  - will be tortured
  - will be in torment
  lexicon: BDAG
  rationale: The future passive denotes severe punitive suffering. 'Will be tormented' is the standard, clear rendering in this apocalyptic judgment context.
- source_word: ἐν πυρὶ καὶ θείῳ
  chosen: with fire and sulfur
  alternatives:
  - in fire and sulfur
  - with fire and brimstone
  lexicon: BDAG
  rationale: θείον is sulfur; 'brimstone' is traditional but archaic for modern readers. 'With fire and sulfur' is clear, contemporary, and preserves the allusion to divine judgment imagery.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise and accurately conveys being in the sight/presence of the following parties.'
- source_word: ἀγγέλων ἁγίων
  chosen: the holy angels
  alternatives:
  - holy angels
  lexicon: BDAG
  rationale: The anarthrous Greek phrase is definite enough in context; English idiom favors 'the holy angels' when referring to the known heavenly host.
- source_word: τοῦ ἀρνίου
  chosen: the Lamb
  alternatives: []
  lexicon: BDAG
  rationale: In Revelation, ἀρνίον is a christological title for Jesus. It should be translated, not transliterated, and capitalized as a title.
