translation:
  language: es
  text: 'Entonces los hombres de Israel se volvieron en la batalla, y Benjamín comenzó a abatir a algunos de los hombres de Israel, unos treinta hombres, pues dijeron: «Ciertamente está completamente derrotado[a] ante nosotros, como en la primera batalla»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo singular: probablemente se refiere a Israel como colectivo; también podría traducirse «están completamente derrotados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Benjamín comenzó a abatir como a treinta hombres de entre los hombres de Israel». La frase hebrea con «los muertos/caídos» es breve e idiomática en contexto de batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  english_pob_choice: turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - giraron
  - se dieron vuelta
  lexicon: HALOT
  rationale: En este contexto narrativo de combate, el verbo expresa un cambio de dirección o de movimiento. «Se volvieron» suena natural en español y conserva la idea de giro/repliegue sin añadir matices no presentes en el hebreo.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - Israel
  - cada hombre de Israel
  lexicon: HALOT
  rationale: La forma singular hebrea funciona colectivamente. «Los hombres de Israel» refleja el sentido militar colectivo y evita forzar un singular poco natural en español.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en el combate
  - en la lucha
  lexicon: HALOT
  rationale: La expresión sitúa la acción dentro del enfrentamiento ya en curso. «Batalla» es claro, digno y acorde con el contexto.
- source_word: וּבִנְיָמִן
  english_pob_choice: and Benjamin
  chosen_spanish: y Benjamín
  alternatives_spanish:
  - y los benjaminitas
  lexicon: HALOT
  rationale: El nombre tribal se mantiene como en el hebreo. El sentido colectivo está determinado por el contexto bélico, por lo que no hace falta explicitar «los benjaminitas» en el texto principal.
- source_word: הֵחֵל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: HALOT
  rationale: Es el equivalente natural del valor ingresivo del verbo y conserva el tono narrativo.
- source_word: לְהַכּוֹת
  english_pob_choice: to strike down
  chosen_spanish: a derribar
  alternatives_spanish:
  - a golpear
  - a matar
  lexicon: HALOT
  rationale: En contexto militar, el verbo implica abatir o derribar a enemigos en combate. «Derribar» transmite la violencia de la acción sin cerrar el sentido a una sola formulación demasiado técnica.
- source_word: בְּאִישׁ יִשְׂרָאֵל
  english_pob_choice: among the men of Israel
  chosen_spanish: a algunos de los hombres de Israel
  alternatives_spanish:
  - entre los hombres de Israel
  - de entre los hombres de Israel
  lexicon: HALOT
  rationale: El hebreo presenta a los caídos como tomados del grupo. La solución española busca naturalidad y claridad, y se alinea con la revisión inglesa que evitó una construcción más rígida.
- source_word: כִּשְׁלֹשִׁים אִישׁ
  english_pob_choice: about thirty men
  chosen_spanish: unos treinta hombres
  alternatives_spanish:
  - alrededor de treinta hombres
  - como treinta hombres
  lexicon: HALOT
  rationale: El prefijo כ indica aproximación. «Unos treinta» es la manera más natural en español para expresar esa aproximación.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: muertos
  alternatives_spanish:
  - los caídos
  - los muertos en combate
  lexicon: HALOT
  rationale: En español, «unos treinta hombres muertos» funciona como aposición explicativa que refleja el hebreo elíptico y su carácter idiomático de guerra. «Los caídos» sería posible, pero menos directo aquí.
- source_word: כִּי אָמְרוּ
  english_pob_choice: for they said
  chosen_spanish: pues dijeron
  alternatives_spanish:
  - porque dijeron
  - ya que dijeron
  lexicon: HALOT
  rationale: La conjunción introduce la razón de su confianza y avance. «Pues» mantiene la relación causal sin sonar excesivamente formal.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - Sin duda
  lexicon: HALOT
  rationale: Expresa la fuerza enfática de la partícula, en un registro sobrio y natural para el español bíblico contemporáneo.
- source_word: נִגּוֹף נִגָּף הוּא
  english_pob_choice: he is utterly defeated
  chosen_spanish: está completamente derrotado
  alternatives_spanish:
  - ha sido derrotado por completo
  - está totalmente vencido
  lexicon: HALOT
  rationale: La intensidad del infinitivo absoluto más la forma verbal se conserva con «completamente derrotado». Se mantiene el singular porque el hebreo lo presenta así, aunque refiere colectivamente a Israel.
- source_word: לְפָנֵינוּ
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - frente a nosotros
  lexicon: HALOT
  rationale: La locución idiomática comunica presencia y derrota ante el enemigo. «Delante de nosotros» o «ante nosotros» serían también válidas, pero «delante de nosotros» resulta muy natural en español.
- source_word: כַּמִּלְחָמָה הָרִאשֹׁנָה
  english_pob_choice: as in the first battle
  chosen_spanish: como en la primera batalla
  alternatives_spanish:
  - como en el primer combate
  - como en la batalla anterior
  lexicon: HALOT
  rationale: El texto remite al enfrentamiento previo del capítulo. «Primera batalla» conserva mejor la referencia interna y la forma concisa del hebreo.
theological_decisions:
- issue: Referente singular de «he is utterly defeated» aplicado colectivamente a Israel
  english_pob_reading: The Hebrew uses a singular form, likely referring to Israel collectively; it could also be rendered 'they are utterly defeated.'
  chosen_spanish_reading: Se conserva el singular implícito en la idea «está completamente derrotado», entendido de manera colectiva respecto de Israel.
  alternative_spanish_readings:
  - están completamente derrotados
  - Israel está completamente derrotado
  rationale: El hebreo presenta una forma singular, pero el referente es el colectivo Israel. El español principal mantiene la intensidad verbal y deja intacta la tensión entre forma singular y referencia colectiva, sin resolverla artificialmente.
  doctrine_reference: Colectivo singular en el hebreo narrativo; observación gramatical, no doctrinal.
translation_notes:
  revision_awareness: 'La versión inglesa revisada reemplazó una formulación más pesada sobre los caídos por una construcción que refleja mejor el hebreo: ‘some of the men of Israel, about thirty men slain’. El español sigue esa revisión con «a algunos de los hombres de Israel, unos treinta hombres muertos». También se mantuvo la forma singular en la derrota («está completamente derrotado») para reflejar la lectura auditada del POB y la tensión gramatical del original.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - «Benjamín» se conserva como nombre tribal sin añadir explicaciones en el texto principal.
  - Se prefirió un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Los marcadores de nota coinciden exactamente con el texto principal y se usan solo donde hay una alternativa o tensión documentada.
