translation:
  language: es
  text: Samuel se acostó hasta la mañana; luego abrió las puertas de la casa de Yahvé[a]. Pero Samuel tenía miedo de contar la visión a Eli.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la aparición'; el hebreo mar'ah puede designar una aparición o una revelación visionaria. Aquí 'visión' encaja mejor con el contexto de la revelación nocturna de Samuel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - se tendió
  - se echó
  lexicon: HALOT
  rationale: שׁכב expresa aquí la acción de yacer o acostarse, no necesariamente dormir. En español, 'se acostó' comunica de manera natural el valor narrativo sin añadir la idea de sueño.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta que amaneció
  lexicon: HALOT
  rationale: La frase temporal se vierte de forma natural en español como 'hasta la mañana', manteniendo la referencia al fin de la noche sin introducir un matiz no explícito.
- source_word: וַיִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - fue y abrió
  - desplegó
  lexicon: HALOT
  rationale: El verbo indica la acción simple de abrir dentro de la secuencia narrativa; 'abrió' preserva esa sobriedad sin sobretraducir movimiento.
- source_word: דַּלְת֣וֹת
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las hojas de las puertas
  - los batientes
  lexicon: HALOT
  rationale: Aunque el hebreo es plural y puede sugerir hojas o batientes, 'puertas' es el equivalente español más claro y publicable para el acceso del recinto.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con el estándar del proyecto, 'Yahvé', y se traduce בית como 'casa' en vez de 'templo', porque el contexto de Samuel no exige la especificidad posterior de 'templo'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el Tetragrámaton con el equivalente del proyecto en español, 'Yahvé', en lugar de enmascararlo con una convención litúrgica.
- source_word: יָרֵא
  english_pob_choice: was afraid
  chosen_spanish: tenía miedo
  alternatives_spanish:
  - estaba atemorizado
  - temía
  lexicon: HALOT
  rationale: La construcción española expresa con naturalidad el estado de temor de Samuel; 'tenía miedo' conserva el valor afectivo y es idiomático.
- source_word: מֵ/הַגִּ֥יד
  english_pob_choice: to tell
  chosen_spanish: de contar
  alternatives_spanish:
  - de decir
  - de comunicar
  lexicon: HALOT
  rationale: La preposición con el infinitivo marca temor respecto de realizar la acción. 'De contar' reproduce el sentido funcional en español, con un matiz narrativo acorde al contexto de informar a Eli.
- source_word: הַמַּרְאָה
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la aparición
  - la revelación
  lexicon: HALOT
  rationale: Aunque מראה puede significar 'aparición', el contexto de una revelación nocturna favorece 'visión' como traducción principal, siguiendo la decisión auditada del texto base inglés.
- source_word: אֶל עֵלִי
  english_pob_choice: to Eli
  chosen_spanish: a Eli
  alternatives_spanish:
  - para Eli
  lexicon: HALOT
  rationale: 'La dirección del verbo ''contar'' se expresa normalmente con ''a'' en español: ''contar ... a Eli''.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue la política del proyecto de no ocultar el Nombre divino tras 'SEÑOR'. 'Yahvé' es la forma establecida en el texto español para preservar el valor del Tetragrámaton con legibilidad eclesial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El control cruzado del original y del registro inglés muestra alta concordancia y no introduce revisiones pendientes; se ha mantenido la decisión clave de traducir יְהוָה con el nombre divino explícito y de verter מראה como 'visión' por el contexto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה en todo el versículo.
  - '''La casa de Yahvé'' conserva la estructura hebrea sin anacronismo de ''templo''.'
  - '''Tenía miedo de contar'' refleja adecuadamente el infinitivo con מִן sin volverlo literalista.'
  - La nota de pie de página preserva la alternativa semántica de מראה sin duplicar el sentido principal en el cuerpo del texto.
