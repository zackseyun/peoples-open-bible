translation:
  language: es
  text: Algunos de los gaditas se apartaron hacia David, a la fortaleza en el desierto[a]; hombres poderosos y valientes, hombres entrenados para la guerra, capaces de manejar escudo y lanza[b], cuyos rostros eran como rostros de león, y que eran veloces como gacelas sobre los montes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la fortaleza en el desierto». La secuencia preposicional hebrea puede entenderse como movimiento hacia la fortaleza o llegada a ella.
    reason: alternative_reading
  - marker: b
    text: Lit. «disponiendo escudo y lanza». La expresión señala hombres preparados y hábiles para el combate.
    reason: lexical_alternative
  - marker: c
    text: O «como gacelas sobre los montes, rápidas para moverse». El hebreo resalta la rapidez y la agilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַגָּדִי
  english_pob_choice: Some of the Gadites
  chosen_spanish: Algunos de los gaditas
  alternatives_spanish:
  - Y de los gaditas
  - De Gad
  lexicon: HALOT
  rationale: מן con el gentilicio indica procedencia tribal; en español, «algunos de» conserva que se trata de un subconjunto, no de toda la tribu.
- source_word: נִבְדְּלוּ
  english_pob_choice: separated themselves
  chosen_spanish: se separaron
  alternatives_spanish:
  - se apartaron
  - se pusieron aparte
  lexicon: HALOT
  rationale: El nifal de בדל expresa separación/reflexividad. «Se separaron» mantiene el sentido sin añadir motivación que el texto no explicita.
- source_word: אֶל דָּוִיד
  english_pob_choice: to David
  chosen_spanish: para ir a David
  alternatives_spanish:
  - hacia David
  - a David
  lexicon: HALOT
  rationale: El hebreo marca dirección hacia David; en español, «para ir a David» hace explícito el movimiento implícito en el contexto narrativo sin forzar una paráfrasis mayor.
- source_word: לַמְצַד מִדְבָּרָה
  english_pob_choice: at the stronghold in the wilderness
  chosen_spanish: al refugio en el desierto
  alternatives_spanish:
  - a la fortaleza en el desierto
  - al baluarte en el desierto
  lexicon: HALOT
  rationale: מְצַד puede ser «fortaleza/fortín/refugio». Aquí, por la combinación con David y el desierto, «refugio» comunica bien el lugar fortificado sin perder la idea de resguardo; «al» deja abierta la ambigüedad direccional del hebreo con אֶל.
- source_word: גִּבֹּרֵי הַחַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - guerreros poderosos
  - hombres poderosos de valor
  lexicon: HALOT
  rationale: La expresión militar hebrea enfatiza fuerza probada y valentía. «Hombres valientes» es natural en español y mantiene el valor bélico sin sobrecargar con una formulación arcaizante.
- source_word: אַנְשֵׁי צָבָא לַמִּלְחָמָה
  english_pob_choice: men trained for battle
  chosen_spanish: hombres entrenados para la guerra
  alternatives_spanish:
  - hombres de guerra
  - soldados para la guerra
  lexicon: HALOT
  rationale: La frase intensifica su perfil militar. «Entrenados» conserva la idea funcional de preparación para el combate que el inglés POB entendió en el participio y el sustantivo.
- source_word: עֹרְכֵי צִנָּה וָרֹמַח
  english_pob_choice: able to handle shield and spear
  chosen_spanish: capaces de manejar escudo y lanza
  alternatives_spanish:
  - dispuestos con escudo y lanza
  - preparados escudo y lanza
  lexicon: HALOT
  rationale: ערך en contexto militar puede implicar disponer/ordenar armas para el combate. En español, «capaces de manejar» comunica competencia práctica sin el calco rígido «ordenando» o «alineando».
- source_word: וּפְנֵי אַרְיֵה פְּנֵיהֶם
  english_pob_choice: whose faces were like the faces of lions
  chosen_spanish: cuyos rostros eran como rostros de león
  alternatives_spanish:
  - con rostros de león
  - cuyos rostros eran leoninos
  lexicon: HALOT
  rationale: Se preserva la repetición de «rostros» para reflejar el énfasis hebreo. «Como rostros de león» mantiene la comparación literal del original.
- source_word: וְכִצְבָאִים
  english_pob_choice: as swift as gazelles
  chosen_spanish: veloces como gacelas
  alternatives_spanish:
  - como gacelas
  - ágiles como gacelas
  lexicon: HALOT
  rationale: צְבָאִים alude a gacelas y el infinitivo siguiente subraya rapidez. «Veloces como gacelas» integra la idea de rapidez de forma natural en español.
- source_word: עַל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - en los montes
  - por los montes
  lexicon: HALOT
  rationale: «Montes» es una equivalencia española natural para los plural hebreo הָרִים en este contexto de movimiento ágil en altura. «Sobre» conserva la imagen de desplazamiento por la superficie del relieve.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que afinó גִּבֹּרֵי הַחַיִל hacia «mighty men of valor» y אַנְשֵׁי צָבָא לַמִּלְחָמָה hacia una formulación más natural; la versión española sigue esa dirección semántica, pero mantiene la fuerza militar del hebreo y la ambigüedad direccional de אֶל/לַמְצַד mediante «al refugio» con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «David» como nombre propio sin artículo.
  - Se usa «gaditas» para el gentilicio tribal, coherente con el original hebreo.
  - «Gacelas» traduce el valor comparativo de צְבָאִים sin introducir una especie distinta.
  - No se emplea «SEÑOR» ni terminología litúrgica ajena al versículo.
  - Las notas a, b y c están ancladas explícitamente en el texto español.
