    issue: «Al Tigris» omite «río» presente en ποταμόν
    rationale: No constituye una infidelidad, porque «Tigris» normalmente se entiende como río en contexto y el español resultante es natural. Sin embargo, «al río Tigris» reflejaría más explícitamente el sustantivo griego.
