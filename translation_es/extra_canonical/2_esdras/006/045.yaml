lexical_decisions:
- source_word: quarta autem die
  english_pob_choice: On the fourth day
  chosen_spanish: Al cuarto día
  alternatives_spanish:
  - En el cuarto día
  - El cuarto día
  lexicon: Latin quarta die
  rationale: «Al cuarto día» reproduce de forma natural la referencia temporal del original sin añadir matices innecesarios.
- source_word: imperasti
  english_pob_choice: you commanded
  chosen_spanish: mandaste
  alternatives_spanish:
  - ordenaste
  - mandaste que
  lexicon: Latin imperare
  rationale: «Mandaste» expresa con claridad el acto de mandar del original; con la cláusula subordinada mantiene el sentido imperativo directo en español.
- source_word: fieri
  english_pob_choice: to be made
  chosen_spanish: que se hicieran
  alternatives_spanish:
  - que fueran hechos
  - para ser hechas
  lexicon: Latin fieri
  rationale: El infinitivo pasivo latino se vierte mejor con una pasiva refleja plural para abarcar la lista completa de elementos que debían hacerse.
- source_word: solis splendorem
  english_pob_choice: the brightness of the sun
  chosen_spanish: el resplandor del sol
  alternatives_spanish:
  - la brillantez del sol
  - el brillo del sol
  lexicon: Latin splendor
  rationale: «Resplandor» conserva la fuerza visual y poética de splendor mejor que un calco más técnico; «brillantez» suena más abstracto.
- source_word: lunae lumen
  english_pob_choice: the light of the moon
  chosen_spanish: la luz de la luna
  alternatives_spanish:
  - el resplandor de la luna
  - la claridad de la luna
  lexicon: Latin lumen
  rationale: «La luz de la luna» es la equivalencia más directa y natural para lumen en este contexto cósmico.
- source_word: stellarum dispositionem
  english_pob_choice: the arrangement of the stars
  chosen_spanish: la disposición de las estrellas
  alternatives_spanish:
  - el orden de las estrellas
  - la colocación de las estrellas
  lexicon: Latin dispositio
  rationale: «Disposición» conserva el sustantivo abstracto del original y sugiere ordenamiento cósmico sin sobreinterpretar el término.
theological_decisions:
- issue: Cosmic creation sequence and divine command
  english_pob_reading: you commanded ... to be made
  chosen_spanish_reading: mandaste que se hicieran ...
  alternative_spanish_readings:
  - ordenaste que se hicieran ...
  - mandaste que fueran hechas ...
  rationale: El versículo presenta la creación de los luminares como resultado de un mandato divino; la formulación española mantiene esa relación causal y volitiva sin añadir contenido doctrinal externo.
  doctrine_reference: Génesis 1:14-18 (creación de luminares por mandato divino)
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la colocación de «to be made» para que gobernara toda la lista y no solo el primer miembro. La versión española sigue esa sintaxis global con «que se hicieran», evitando dejar colgados los dos elementos posteriores.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» sin necesidad aquí, pues el verso solo contiene un mandato implícito en segunda persona sin nombre divino explícito.
  - Se conserva el ritmo enumerativo del original mediante una serie coordinada clara en español.
  - El marcador [a] está anclado en el primer miembro de la lista para reflejar la alternativa sintáctica documentada en el audit trail.
