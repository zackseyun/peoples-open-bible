    text: Or 'four notable ones'; the Hebrew term describes what is visible or prominent, and English supplies 'horns' from the context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under it'; here the sense is 'in its place' or 'instead of it.'
    reason: lexical_alternative
