  glossary_alignment: No hay conflictos con la terminología base del proyecto. La principal cuestión léxica es mantener טהר/מטהר en clave ritual sin moralizarlo y sin volverlo reflexivo. 'El que está siendo purificado' o 'el que está siendo limpiado' se alinea mejor con la decisión POB 'the one being cleansed'.
