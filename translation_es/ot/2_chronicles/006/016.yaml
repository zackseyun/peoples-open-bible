  text: וְ/עַתָּ֞ה יְהוָ֣ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל שְׁ֠מֹר לְ/עַבְדְּ/ךָ֨ דָוִ֤יד אָבִ/י֙ אֵת֩ אֲשֶׁ֨ר דִּבַּ֤רְתָּ לּ/וֹ֙ לֵ/אמֹ֔ר לֹא יִכָּרֵ֨ת לְ/ךָ֥ אִישׁ֙ מִ/לְּ/פָנַ֔/י יוֹשֵׁ֖ב עַל כִּסֵּ֣א יִשְׂרָאֵ֑ל רַ֠ק אִם יִשְׁמְר֨וּ בָנֶ֜י/ךָ אֶת דַּרְכָּ֗/ם לָ/לֶ֨כֶת֙ בְּ/ת֣וֹרָתִ֔/י כַּ/אֲשֶׁ֥ר הָלַ֖כְתָּ לְ/פָנָֽ/י׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/006/016.yaml
  text: And now[a], Yahweh, God of Israel, keep for your servant David my father what you have spoken to him, saying, ‘You shall not lack a man before me to sit on the throne of Israel, if only your sons keep their way[b], to walk in my law as you have walked before me.’
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'You shall not lack a man before me to sit on the throne of Israel.' The Hebrew is literally, 'A man ... shall not be cut off from you.'
    reason: lexical_alternative
  - marker: b
    text: '''My law'' may also be rendered ''my instruction.'''
    reason: lexical_alternative
