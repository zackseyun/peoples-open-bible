translation:
  language: es
  text: Porque los labios de una mujer prohibida destilan miel[a], y su paladar es más suave que el aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «una mujer extraña», «una mujer extranjera» o «una adúltera». En Proverbios, el término suele referirse a una mujer fuera de los límites de una relación sexual legítima.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introducción causal/explanatoria que enlaza naturalmente con la advertencia del contexto; «Porque» conserva la relación lógica sin forzar un matiz adversativo o meramente inferencial.
- source_word: נֹפֶת
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel de panal
  - panal
  - miel que destila
  lexicon: HALOT
  rationale: El hebreo nֹפֶת alude a miel, con posible matiz de miel que fluye. «Miel» es la solución más natural en español; el matiz de fluidez queda reforzado por el verbo siguiente.
- source_word: תִּטֹּפְנָה
  english_pob_choice: drip
  chosen_spanish: destilan
  alternatives_spanish:
  - gotean
  - derraman
  - chorrean
  lexicon: HALOT
  rationale: El verbo expresa la idea de gotear/derramarse. «Destilan» mantiene la imagen de un fluido que cae gota a gota y suena más digno y poético en español que un calco demasiado literal.
- source_word: שִׂפְתֵי
  english_pob_choice: the lips of
  chosen_spanish: los labios de
  alternatives_spanish:
  - los labios
  - las bocas de
  lexicon: HALOT
  rationale: Construcción en estado constructo que pide complemento; «los labios de» es claro y formalmente cercano al hebreo.
- source_word: זָרָה
  english_pob_choice: a forbidden woman
  chosen_spanish: una mujer prohibida
  alternatives_spanish:
  - una mujer extraña
  - una mujer ajena
  - una adúltera
  lexicon: HALOT
  rationale: En Proverbios, el término suele designar a la mujer sexualmente ilícita, no simplemente a una extranjera étnica. «Mujer prohibida» conserva la fuerza moral y evita estrechar indebidamente el sentido a «adúltera» en todos los casos.
- source_word: וְחָלָק
  english_pob_choice: and ... is smoother
  chosen_spanish: es más suave
  alternatives_spanish:
  - y es más suave
  - y suave
  - es más lisa
  lexicon: HALOT
  rationale: En contexto comparativo con מִן, la forma adjetival funciona predicativamente. «Es más suave» expresa la comparación de modo natural en español y conserva el sentido sensorial.
- source_word: מִשֶּׁמֶן
  english_pob_choice: than oil
  chosen_spanish: que el aceite
  alternatives_spanish:
  - que el aceite de oliva
  - que el óleo
  lexicon: HALOT
  rationale: La partícula comparativa marca el estándar de comparación. «Aceite» es suficiente e idiomático; no es necesario especificar «de oliva» en el texto principal.
- source_word: חִכָּהּ
  english_pob_choice: her palate
  chosen_spanish: su paladar
  alternatives_spanish:
  - su boca
  - su lengua
  - su paladar
  lexicon: HALOT
  rationale: El sentido literal es «paladar», y el audit trail inglés corrigió de «mouth» a «palate» por mayor precisión. En español, «paladar» mantiene la imagen corporal y evita interpretar prematuramente como «boca» o «habla».
theological_decisions:
- issue: Sentido de זָרָה en lenguaje sapiencial
  english_pob_reading: a forbidden woman
  chosen_spanish_reading: una mujer prohibida
  alternative_spanish_readings:
  - una mujer extraña
  - una mujer extranjera
  - una adúltera
  rationale: La categoría sapiencial apunta a una relación sexual fuera del marco permitido. «Mujer prohibida» comunica la carga moral sin limitarla innecesariamente a etnicidad o estado civil específico.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «mouth» por «palate» para reflejar con más precisión חִכָּהּ; la presente versión española sigue esa decisión con «paladar». También se mantuvo la imagen de miel que destila, evitando suavizar la metáfora.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió «mujer prohibida» para conservar el valor sapiencial de זָרָה sin importar una connotación exclusivamente étnica.
  - «Paladar» mantiene la precisión anatómica y la imagen metonímica que el inglés POB preservó con «palate».
  - «Destilan» conserva el movimiento de goteo/flujo de תִּטֹּפְנָה sin volver la frase mecánica.
