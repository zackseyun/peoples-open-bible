translation:
  language: es
  text: Yahvé obra rectitud y justicia para todos los oprimidos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé hace obras rectas y juicios para todos los oprimidos»'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  english_pob_choice: works
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  - hace obras de
  lexicon: HALOT
  rationale: El participio qal de עשה describe la acción característica de Yahvé. En español, 'hace' conserva el sentido verbal continuo sin sonar forzado; 'obra' sería posible, pero aquí 'hace justicia y rectitud' mantiene bien la línea poética.
- source_word: צְדָק֣וֹת
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - obras de justicia
  - rectitudes
  lexicon: HALOT
  rationale: El plural de צדקה puede apuntar a actos/manifestaciones de justicia. Como el versículo ya incluye מִשְׁפָּטִים con 'justicia', 'rectitud' ayuda a no borrar la distinción semántica entre ambos miembros y evita repetir 'justicia' dos veces.
- source_word: יְהוָ֑ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española establecida por el proyecto, en lugar de sustituirlo por un título. 'Yahvé' refleja el Tetragrama y mantiene la decisión doctrinal del POB.
- source_word: וּ֝מִשְׁפָּטִ֗ים
  english_pob_choice: and justice
  chosen_spanish: y justicia
  alternatives_spanish:
  - y juicios
  - y actos de justicia
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a juicios o decisiones judiciales, pero en este contexto poético 'justicia' comunica bien la idea y conserva el paralelo con el primer hemistiquio. El plural queda representado colectivamente.
- source_word: לְכָל
  english_pob_choice: for all
  chosen_spanish: para todos
  alternatives_spanish:
  - para cada uno de
  - a todos
  lexicon: HALOT
  rationale: La preposición ל con כל marca beneficiarios. 'Para todos' es natural en español y mantiene el alcance inclusivo del enunciado.
- source_word: עֲשׁוּקִים
  english_pob_choice: who are oppressed
  chosen_spanish: los oprimidos
  alternatives_spanish:
  - los que son oprimidos
  - los explotados
  - los que sufren opresión
  lexicon: HALOT
  rationale: El participio pasivo de עשק nombra a personas sometidas a opresión. 'Los oprimidos' es una forma idiomática y fiel en español, sin perder el matiz pasivo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La base textual presenta el Tetragrama directamente. La traducción española del proyecto usa 'Yahvé' como transliteración del nombre revelado, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción entre צְדָקוֹת y מִשְׁפָּטִים
  english_pob_reading: righteousness and justice
  chosen_spanish_reading: rectitud y justicia
  alternative_spanish_readings:
  - justicia y justicia
  - obras de justicia y juicios
  - justicia y rectitud
  rationale: Para preservar la tensión léxica del hebreo, no se colapsan ambos términos en una sola palabra. 'Rectitud' para צְדָקוֹת permite distinguirla de מִשְׁפָּטִים, que se traduce como 'justicia'.
  doctrine_reference: Principio POB de conservar distinciones léxicas cuando el hebreo las mantiene en paralelo poético
translation_notes:
  revision_awareness: El contexto de auditoría inglesa muestra acuerdo alto y sin cambios recientes en la revisión final. Se mantiene la decisión de no traducir יְהוָה como 'el SEÑOR', y se preserva la distinción entre צְדָקוֹת y מִשְׁפָּטִים mediante 'rectitud' y 'justicia'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para el Tetragrama.
  - La frase verbal conserva el paralelismo poético hebreo sin añadir información interpretativa.
  - No se introduce vocabulario eclesiástico tradicional que oscurezca el valor léxico del texto.
