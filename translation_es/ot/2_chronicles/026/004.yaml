translation:
  language: es
  text: Hizo lo recto a los ojos de Yahvé[a], conforme a todo lo que había hecho Amasías su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la vista de»; la expresión hebrea conserva la metáfora de evaluación personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Él hizo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa; en español natural, el verbo inicial basta y el sujeto queda implícito por la forma verbal. Se evita un calco innecesario de la conjunción inicial.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo que era recto
  lexicon: HALOT
  rationale: La expresión עשׂה הישׁר es idiomática. 'Lo recto' conserva el valor moral y la brevedad del hebreo sin forzar una perífrasis más pesada.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a la vista de
  - ante
  lexicon: HALOT
  rationale: 'La metáfora hebrea de evaluación personal se mantiene en español con una correspondencia igualmente transparente: ''a los ojos de''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino en transliteración, según el criterio del proyecto para יהוה, en lugar de sustituirlo por un título genérico.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  - tal como todo lo que
  lexicon: HALOT
  rationale: La construcción expresa conformidad con un patrón previo. 'Conforme a todo lo que' conserva el alcance total de כֹּל y la idea comparativa de כְּ en un español natural.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español aclara la anterioridad de las acciones de Amasías respecto del reinado descrito, algo que el perfecto hebreo permite por contexto.
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre propio para mayor legibilidad e identificación bíblica.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su progenitor
  - su padre biológico
  lexicon: HALOT
  rationale: El contexto histórico inmediato muestra que se refiere al padre literal de Uzías; 'su padre' es preciso y natural en español.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en forma transliterada, coherente con la política del proyecto de no ocultar el Tetragrámaton. 'Yahvé' es la forma estándar en español para este marco editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés no muestra revisiones sustantivas ni cambios pendientes; la correspondencia es alta y la decisión principal se concentra en conservar el nombre divino y la metáfora hebrea sin volverla opaca.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se usó 'Yahvé' de manera consistente con la política del proyecto para יהוה.
  - '''Amasías'' conserva la forma española bíblica habitual del nombre propio.'
  - La metáfora 'a los ojos de' se preserva con una nota alternativa para transparencia textual.
