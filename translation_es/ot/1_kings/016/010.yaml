translation:
  language: es
  text: Entonces Zimrí entró, lo golpeó y lo mató, en el año vigésimo séptimo de Asa, rey de Judá; y reinó en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came in
  chosen_spanish: Entonces ... entró
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: El hebreo בוא puede significar 'venir' o 'entrar'. En este contexto de asalto palaciego, 'entró' comunica con naturalidad que Zimrí irrumpió en el lugar, sin añadir detalles no explícitos. 'Entonces' refleja la secuencia narrativa del waw consecutivo.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimrí
  alternatives_spanish:
  - Zimri
  lexicon: Transliteración estándar
  rationale: Se translitera el nombre propio en forma española corriente, con acento ortográfico para adaptarlo a la pronunciación en español.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo golpeó
  alternatives_spanish:
  - lo hirió
  - lo atacó
  lexicon: HALOT
  rationale: נכה significa 'golpear/derrotar/herir'. Como el verbo siguiente ya dice que lo mató, en español conviene mantener una acción violenta previa pero sin repetir innecesariamente la idea de muerte. 'Lo golpeó' conserva la fuerza del golpe inicial.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: and killed him
  chosen_spanish: y lo mató
  alternatives_spanish:
  - y lo hizo morir
  - y le dio muerte
  lexicon: HALOT
  rationale: מות en causativo significa 'hacer morir, matar'. 'Lo mató' es la forma más directa y natural en español moderno, equivalente al valor verbal del hebreo.
- source_word: בִּשְׁנַת עֶשְׂרִים וָשֶׁבַע
  english_pob_choice: in the twenty-seventh year
  chosen_spanish: en el año vigésimo séptimo
  alternatives_spanish:
  - durante el año vigésimo séptimo
  lexicon: HALOT
  rationale: Se conserva la fórmula cronológica regnal de manera idiomática en español. 'Vigésimo séptimo' expresa el ordinal con registro bíblico claro y sobrio.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - de Asa, el rey de Judá
  lexicon: HALOT
  rationale: La preposición ל marca el punto de referencia del cómputo cronológico. En español, 'de Asa, rey de Judá' reproduce bien esa relación de datación y mantiene el orden sobrio del hebreo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: and he reigned
  chosen_spanish: y reinó
  alternatives_spanish:
  - y comenzó a reinar
  - y llegó a reinar
  lexicon: HALOT
  rationale: מלך puede significar 'reinar' o 'llegar a ser rey'. Aquí, junto con 'en su lugar', el sentido de sucesión está claro; 'reinó' conserva el verbo hebreo sin sobreexplicar la entronización.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - en su sitio
  lexicon: HALOT
  rationale: תחתיו en contextos reales significa suceder a alguien. 'En su lugar' es la manera más transparente y natural de expresar esa sucesión en español.
translation_notes:
  revision_awareness: El texto hebreo y la audición inglesa muestran plena concordancia en este versículo. No se requieren revisiones textuales ni ajustes de sentido respecto del POB inglés; la decisión principal es idiomática en español, manteniendo la secuencia verbal y la fórmula cronológica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'rey' en minúscula como título común dentro de la fórmula cronológica.
  - La sucesión real se expresa con 'en su lugar', coherente con el valor de תחתיו en contextos dinásticos.
