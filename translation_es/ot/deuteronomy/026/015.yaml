revisions:
- from: 'Mira desde tu santa morada[a], desde los cielos, y bendice a tu pueblo Israel y la tierra que nos has dado, como juraste a nuestros padres: una tierra que fluye leche y miel.'
  to: Mira desde arriba, desde tu santa morada[a], desde el cielo, y bendice a tu pueblo Israel y la tierra que nos has dado, como juraste a nuestros padres[b], una tierra que fluye con leche y miel.
  rationale: Se corrigió el texto para reflejar mejor הַשְׁקִיפָה con 'Mira desde arriba', se hizo más natural e idiomático מִן הַשָּׁמַיִם como 'desde el cielo', se añadió la nota preservada sobre 'nuestros padres', y se reparó la expresión final a 'una tierra que fluye con leche y miel', que es gramatical y fiel al modismo fuente.
