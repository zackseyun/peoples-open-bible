translation:
  language: es
  text: No seas hipócrita[a] entre los hombres, y presta atención a tus labios.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «en las bocas de los hombres»; la expresión griega probablemente alude al ámbito público o social del habla.'
    reason: lexical_alternative
  - marker: b
    text: 'El renglón hebreo conservado en el testigo proporcionado dice: «Escucha todas mis palabras y cúmplelas, y serás escrito en el libro de la vida», pero parece no corresponder a este versículo; por eso aquí se sigue el texto griego.'
    reason: textual_variant
lexical_decisions:
- source_word: μὴ ὑποκριθῇς
  english_pob_choice: Do not be hypocritical
  chosen_spanish: No seas hipócrita
  alternatives_spanish:
  - No finjas
  - No actúes con hipocresía
  - No seas fingido
  lexicon: BDAG
  rationale: 'El griego usa una forma del verbo ὑποκρίνομαι con valor ético: evitar la pretensión o la conducta hipócrita. En español, «No seas hipócrita» comunica de modo natural y fiel la fuerza moral del mandato sin volverlo demasiado técnico.'
- source_word: ἐν στόμασιν ἀνθρώπων
  english_pob_choice: in the mouths of men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - en la boca de los hombres
  - delante de la gente
  - en medio de la gente
  lexicon: LSJ
  rationale: La imagen literal «en las bocas de los hombres» suena forzada en español. Dado el propio audit trail en inglés, la expresión se entiende como un ámbito público o social de habla; por eso se vierte de forma idiomática como «entre los hombres», manteniendo la referencia humana y pública sin perder el sentido.
- source_word: πρόσεχε
  english_pob_choice: watch your lips
  chosen_spanish: presta atención a tus labios
  alternatives_spanish:
  - guarda tus labios
  - vigila tus labios
  - cuida tus labios
  lexicon: BDAG
  rationale: El imperativo πρόσεχε exhorta a una atención cuidadosa sobre el habla. «Presta atención a tus labios» conserva la imagen corporal del griego y resulta claro en español moderno; evita el tono más duro de «vigila» y el giro más interpretativo de «cuida».
theological_decisions:
- issue: Relación entre la imagen de ‘boca/labios’ y la advertencia ética
  english_pob_reading: The Greek literally says 'in the mouths of men' ... pair[s] with the second colon about lips.
  chosen_spanish_reading: Mantener el contraste entre un ámbito humano de habla y la vigilancia de los labios.
  alternative_spanish_readings:
  - Reducir todo a una admonición general sobre el comportamiento
  - Suavizar la imagen corporal y traducir solo ‘no seas hipócrita y habla con cuidado’
  rationale: El texto griego combina una imagen pública (‘bocas de hombres’) con una imagen física (‘labios’). La traducción española procura conservar ese paralelismo, porque forma parte del efecto retórico del verso y evita borrar la tensión léxica entre habla pública y control de la lengua.
  doctrine_reference: 'PHILOSOPHY.md: conservar imágenes del original cuando son parte del sentido y del paralelismo poético.'
translation_notes:
  revision_awareness: El paquete fuente presenta una tensión importante entre el hebreo suministrado, que parece corresponder a otra línea, y el paralelo griego, que sí coincide con Sirach 1:28. Para esta muestra se siguió el griego como base textual, en continuidad con el audit trail en inglés que documenta el desajuste hebreo. La formulación española refleja esa decisión y preserva las imágenes del griego.
  spanish_consistency_notes:
  - Se usó ‘hipócrita’ para reproducir el valor ético de ὑποκριθῇς.
  - Se evitó ‘Señor’/terminología no pertinente porque no hay nombres divinos en este verso.
  - ‘Labios’ se mantuvo por su concreción corporal, coherente con el paralelo griego.
  - La nota al pie marca la alternativa más literal para la primera cola sin duplicar marcadores.
