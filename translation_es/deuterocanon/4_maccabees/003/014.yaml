translation:
  language: es
  text: Y después de encontrar valientemente el manantial[a], llenaron de él la bebida del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llenaron de él una bebida para el rey». El dativo griego τῷ βασιλεῖ puede entenderse más literalmente como «para el rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνευράμενοι
  english_pob_choice: after finding
  chosen_spanish: después de encontrar
  alternatives_spanish:
  - habiendo encontrado
  - luego de encontrar
  lexicon: LSJ
  rationale: El participio aoristo medio expresa una acción previa a la principal; en español, «después de encontrar» conserva esa secuencia sin forzar una construcción demasiado técnica.
- source_word: θαρραλέως
  english_pob_choice: courageously
  chosen_spanish: con valentía
  alternatives_spanish:
  - valientemente
  - con arrojo
  lexicon: LSJ
  rationale: El adverbio subraya coraje o audacia. «Con valentía» comunica bien ese matiz en español natural y digno.
- source_word: τὴν πηγὴν
  english_pob_choice: the spring
  chosen_spanish: la fuente
  alternatives_spanish:
  - el manantial
  - la fuente de agua
  lexicon: LSJ
  rationale: πηγή puede ser «manantial», «fuente» o «fountain». Aquí «la fuente» es claro y bíblicamente sobrio; en español puede abarcar la idea de un surgimiento de agua sin perder naturalidad.
- source_word: ἐξ αὐτῆς
  english_pob_choice: from it
  chosen_spanish: desde ella
  alternatives_spanish:
  - de ella
  - a partir de ella
  lexicon: LSJ
  rationale: El pronombre vuelve a la fuente. «Desde ella» conserva el movimiento de salida de ἐξ y suena natural en español.
- source_word: ἐγέμισαν
  english_pob_choice: they filled
  chosen_spanish: llenaron
  alternatives_spanish:
  - llenaron de
  - colmaban
  lexicon: LSJ
  rationale: El aoristo simple se rinde bien con el pretérito perfecto simple «llenaron», sin añadir aspecto no requerido.
- source_word: τῷ βασιλεῖ
  english_pob_choice: the king’s / for the king
  chosen_spanish: para el rey
  alternatives_spanish:
  - del rey
  - al rey
  lexicon: LSJ
  rationale: El dativo puede indicar destinatario/beneficiario. En español, «para el rey» conserva esa función sin convertir la frase en posesiva donde el griego no lo exige.
- source_word: τὸ ποτόν
  english_pob_choice: drink
  chosen_spanish: la bebida
  alternatives_spanish:
  - la bebida para beber
  - el trago
  lexicon: LSJ
  rationale: ποτόν significa lo bebible o la bebida. «La bebida» es natural en español y evita restringir innecesariamente el sentido a agua o a una bebida específica.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el rastro auditado en inglés. No hubo revisiones aplicadas en la última pasada; la divergencia principal quedó en el valor del dativo τῷ βασιλεῖ, que en español se vierte de manera idiomática como destinatario/beneficiario.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, evitando calcos duros como «la bebida del rey» cuando el griego permite un dativo de destinatario.
  - «Fuente» se eligió frente a «manantial» por claridad y fluidez, aunque ambas opciones son válidas según el contexto.
  - No se introdujo terminología teológica adicional porque el versículo es narrativo y no presenta una tensión doctrinal específica.
