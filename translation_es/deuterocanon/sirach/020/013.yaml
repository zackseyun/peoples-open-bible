    rationale: Aunque el inglés revisado dice «goodness», en español «bondad» sugiere con más fuerza una cualidad moral positiva. Dado el contexto sapiencial y la nota de ironía, esto introduce una lectura demasiado favorable de los necios.
  - severity: low
