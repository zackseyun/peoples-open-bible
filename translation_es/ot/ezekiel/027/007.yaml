translation:
  language: es
  text: Lino fino bordado de Egipto era tu vela, para servirte de estandarte[b]; azul y púrpura de las costas[a] de Elishá era tu cobertura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las islas de Elishá». El hebreo puede referirse a islas o a costas.
    reason: lexical_alternative
  - marker: b
    text: O «para ser tu bandera/tu señal». El hebreo נֵס puede significar bandera, estandarte o señal visible desde lejos.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad
  lexicon: HALOT
  rationale: שֵׁשׁ designa lino de alta calidad; «lino fino» conserva el matiz de lujo y sigue de cerca la decisión inglesa sin sonar forzado en español.
- source_word: בְּרִקְמָה
  english_pob_choice: embroidered
  chosen_spanish: bordado
  alternatives_spanish:
  - con bordado
  - ricamente trabajado
  lexicon: HALOT
  rationale: רִקְמָה apunta a labor de bordado o tejido trabajado; «bordado» es natural en español y mantiene la idea de una tela ornamentada.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: Marca de procedencia geográfica directa; «de Egipto» es la forma más clara y sobria en español.
- source_word: מִפְרָשֵׂךְ
  english_pob_choice: your sail
  chosen_spanish: tu vela
  alternatives_spanish:
  - tu vela desplegada
  - tu lienzo de vela
  lexicon: HALOT
  rationale: En el contexto náutico de la queja contra Tiro, מִפְרָשֵׂךְ se entiende mejor como la vela del barco; «tu vela» es la opción más idiomática y fiel.
- source_word: לִהְיוֹת לָךְ לְנֵס
  english_pob_choice: serving as your banner
  chosen_spanish: para servirte de estandarte
  alternatives_spanish:
  - para serte una señal
  - para ser tu bandera
  lexicon: HALOT
  rationale: נֵס puede ser bandera, estandarte o señal visible; «estandarte» conserva el valor emblemático y solemne que la traducción inglesa quiso preservar.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - azul púrpura
  lexicon: HALOT
  rationale: תְּכֵלֶת denota un color azul o azul violáceo; «azul» es claro y suficientemente preciso para el par cromático del verso.
- source_word: וְאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura rojizo
  lexicon: HALOT
  rationale: אַרְגָּמָן es el tinte púrpura clásico; «púrpura» mantiene la referencia al color/tinte de prestigio.
- source_word: מֵאִיֵּי אֱלִישָׁה
  english_pob_choice: from the coasts of Elishah
  chosen_spanish: de las costas de Elisa
  alternatives_spanish:
  - de las islas de Elisa
  - de las costas de Elishá
  lexicon: HALOT
  rationale: אִיִּים puede significar islas o costas; aquí sigo la lectura de «costas» por el contexto comercial marítimo. Conservo el nombre propio como «Elisa» para una forma española fluida y reconocible.
- source_word: מְכַסֵּךְ
  english_pob_choice: your covering
  chosen_spanish: tu cobertura
  alternatives_spanish:
  - tu cubrimiento
  - lo que te cubría
  lexicon: HALOT
  rationale: מְכַסֵּךְ alude a algo que cubre en la imagen del barco; «cobertura» preserva la metáfora sin añadir tecnicismos no explicitados.
theological_decisions:
- issue: Valor de נֵס como emblema visible frente a una mera señal
  english_pob_reading: serving as your banner
  chosen_spanish_reading: para servirte de estandarte
  alternative_spanish_readings:
  - para serte una señal
  - para ser tu bandera
  rationale: El verso no trata solo de una marca funcional, sino de una pieza que representa visibilidad y prestigio. «Estandarte» conserva esa fuerza simbólica sin borrar la ambigüedad del hebreo.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se documentaron cambios requeridos y el cotejo externo quedó en alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se evita «Cristo» porque no aparece en el texto base.
  - Se preserva el paralelismo de textiles y colores con sintaxis española natural.
  - «Elisa» se usa como transliteración española fluida del topónimo אֱלִישָׁה, manteniendo la referencia geográfica sin añadir interpretación no sustentada.
