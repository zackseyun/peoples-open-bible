revisions:
- from: Ahora bien, el resto de los hechos de Jotam[a], y todas sus guerras y sus caminos—miren[b], están escritos en el libro de los reyes de Israel y de Judá.
  to: Y el resto de los hechos de Jotam[a], y todas sus guerras y sus caminos—he aquí[b], están escritos en el Libro de los Reyes de Israel y Judá.
  rationale: Se reemplaza «miren» por «he aquí» para conservar la fuerza deíctica de הִנָּם sin introducir un imperativo ajeno al original. Se ajusta el inicio a «Y el resto de...» por mayor sobriedad y cercanía a la fórmula hebrea. Se capitaliza «Libro de los Reyes de Israel y Judá» como referencia documental titulada. Se mantienen las dos notas existentes, con anclajes correctos en el texto revisado.
