review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del mensaje divino y mantiene correctamente «Yahvé». Sin embargo, se aparta de la evidencia fuente y del rastro POB en dos puntos importantes: (1) לְעַבְדִּי aplicado a David fue documentado en el POB como designación pactual/honorífica, por lo que «mi esclavo» sobrerrealiza el sentido y no sigue la decisión auditada; (2) la nota [b] está anclada en «rebaño», pero su contenido explica una alternativa para מִן הַנָּוֶה («pasture/sheepfold»), no para מֵאַחַר הַצֹּאן. También conviene ajustar «de detrás del rebaño» a una formulación española más natural que preserve la imagen de seguir al rebaño.'
  spanish_quality_summary: El texto es comprensible y digno, pero «mi esclavo David» suena impropio en este contexto y «de detrás del rebaño» resulta algo torpe. «Para que fueras» es posible, pero «para ser» es más directo y refleja mejor el infinitivo hebreo. La puntuación y el registro general son buenos.
  glossary_alignment: Alineación parcial. «Yahvé» cumple la terminología del proyecto. Pero la preferencia contextual para עבד aquí debe ser «siervo», no «esclavo», por la racionalidad lexical y teológica ya documentada. «נָגִיד» como «gobernante» es aceptable, aunque «gobernante» o «líder» quedan como alternativas; no requiere cambio obligatorio. La nota lexical sobre הַנָּוֶה debe moverse al lugar correspondiente.
  issues:
  - severity: high
    issue: «mi esclavo David» para לְעַבְדִּי לְדָוִד
    rationale: El expediente inglés documenta explícitamente que aquí עבד funciona como designación pactual/honorífica de David ante Yahvé, no enfatizando estatus servil. «Esclavo» contradice esa decisión contextual y suena teológicamente desajustado en español eclesial.
  - severity: high
    issue: La nota [b] está colocada en la frase equivocada
    rationale: La nota explica una alternativa para מִן הַנָּוֶה («pastizal / aprisco / majada»), pero el ancla está en «rebaño», que corresponde a הַצֹּאן. Esto desinforma al lector sobre qué palabra hebrea se está aclarando.
  - severity: medium
    issue: «de detrás del rebaño» es poco natural en español
    rationale: Aunque refleja literalmente «de detrás», el POB privilegia una equivalencia óptima legible. «de seguir al rebaño» o «de andar siguiendo el rebaño» preserva la imagen pastoral con mejor español.
  - severity: low
    issue: «para que fueras» es más interpretativo que necesario
    rationale: לִהְיוֹת se traduce más directamente como «para ser». El cambio mejora la cercanía formal sin perder naturalidad.
  revised_spanish_text: 'Ahora, pues, así dirás a mi siervo David: Así dice Yahvé de los ejércitos: Yo te tomé del pastizal[a], de seguir al rebaño, para ser gobernante sobre mi pueblo Israel.[b]'
  revised_footnotes:
  - marker: a
    text: O «del aprisco» o «de la majada». El sustantivo hebreo puede referirse a un lugar de pasto o al sitio donde se guarda el rebaño.
    reason: lexical_alternative
  - marker: b
    text: O «líder» o «príncipe» por «gobernante». El término hebreo denota a alguien designado para gobernar, no necesariamente con el título específico de «rey».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «esclavo» por «siervo» para seguir la decisión lexical y teológica documentada para עבד en referencia a David. Se reubica la nota sobre הַנָּוֶה al término correspondiente («pastizal») y se añade la alternativa preservada por el POB para נָגִיד. También se mejora la naturalidad de «de seguir al rebaño» y se simplifica «para ser» para reflejar mejor el infinitivo hebreo.
