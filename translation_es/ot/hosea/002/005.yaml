translation:
  language: es
  text: de lo contrario, la despojaré de sus vestidos y la presentaré desnuda, como en el día en que nació[a]; la pondré como el desierto, la haré como tierra árida[b], y la haré morir de sed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no sea que la despoje de sus vestidos». La partícula hebrea también puede traducirse de manera más formal como «no sea que», introduciendo la consecuencia amenazada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tierra seca» o «tierra reseca». El hebreo es más literalmente causativo: «causarla a morir por sed».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: or else
  chosen_spanish: o, si no
  alternatives_spanish:
  - de lo contrario
  - si no
  lexicon: HALOT
  rationale: Introduzco la consecuencia amenazante con una locución natural en español que conserva el valor advertencia/resultado del hebreo sin arcaizar con «no sea que» en una estructura que aquí funciona como amenaza.
- source_word: אַפְשִׁיטֶנָּה
  english_pob_choice: I will strip her
  chosen_spanish: la despojaré de sus vestidos
  alternatives_spanish:
  - la desnudaré
  - la quitaré sus vestidos
  lexicon: HALOT
  rationale: El verbo hebreo comunica despojar de ropa; «despojaré de sus vestidos» conserva la fuerza de desnudamiento y sugiere deshonra pública con buena naturalidad en español.
- source_word: עֲרֻמָּה
  english_pob_choice: naked
  chosen_spanish: al descubierto
  alternatives_spanish:
  - desnuda
  - nuda
  lexicon: HALOT
  rationale: Después de «despojaré de sus vestidos», repetir «desnuda» sería posible, pero «al descubierto» evita redundancia y mantiene la imagen de exposición vergonzosa que sigue en el verso.
- source_word: וְהִצַּגְתִּיהָ
  english_pob_choice: and set her forth
  chosen_spanish: la pondré al descubierto
  alternatives_spanish:
  - la presentaré
  - la exhibiré
  lexicon: HALOT
  rationale: El verbo tiene la idea de colocar delante, exponer. En español, «poner al descubierto» comunica bien la exhibición pública sin perder el matiz de vergüenza judicial.
- source_word: כְּיוֹם הִוָּלְדָהּ
  english_pob_choice: as on the day she was born
  chosen_spanish: como en el día en que nació
  alternatives_spanish:
  - como el día de su nacimiento
  - como el día en que fue nacida
  lexicon: HALOT
  rationale: Mantengo la comparación temporal de forma directa y natural; el sentido es la desnudez/indefensión originaria del nacimiento.
- source_word: וְשַׂמְתִּיהָ כַמִּדְבָּר
  english_pob_choice: and make her like the wilderness
  chosen_spanish: y la pondré como el desierto
  alternatives_spanish:
  - y la haré como el desierto
  - y la pondré como un desierto
  lexicon: HALOT
  rationale: «Desierto» en español comunica de manera clara el campo semántico de מִדְבָּר y conserva el tono bíblico de desolación; evito «naturaleza salvaje» por demasiado interpretativo.
- source_word: וְשַׁתִּהָ כְּאֶרֶץ צִיָּה
  english_pob_choice: and make her like a parched land
  chosen_spanish: y la haré como tierra árida
  alternatives_spanish:
  - y la haré como tierra reseca
  - y la pondré como tierra seca
  lexicon: HALOT
  rationale: צִיָּה subraya sequedad intensa. «Tierra árida» conserva esa intensificación y suena más idiomático en español que una traducción demasiado literal de «parched land».
- source_word: וַהֲמִתִּיהָ בַּצָּמָא
  english_pob_choice: and put her to death with thirst
  chosen_spanish: y la haré morir de sed
  alternatives_spanish:
  - y la mataré de sed
  - y la haré morir por la sed
  lexicon: HALOT
  rationale: 'El hebreo es causativo: hacer morir por sed. «Haré morir de sed» conserva el resultado y resulta más natural que una formulación más dura o más literal en español.'
theological_decisions:
- issue: Imagen de juicio corporal y vergüenza pública
  english_pob_reading: Retain the concrete bodily and wilderness imagery without softening it into abstract punishment language.
  chosen_spanish_reading: Conservar la imagen concreta de despojo, exhibición, desolación y muerte por sed, sin convertirla en una paráfrasis abstracta.
  alternative_spanish_readings:
  - reducirlo a humillación y privación en general
  - parafrasear como castigo simbólico
  rationale: El peso teológico del versículo depende del lenguaje material y judicial del juicio del pacto. Mantenerlo visible en español evita diluir la severidad del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en dos puntos: mantiene la fuerza de la consecuencia amenazante de פֶּן con una forma española idiomática, y conserva el valor causativo de וַהֲמִתִּיהָ al traducirlo como «la haré morir de sed», evitando una lectura meramente permisiva.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» en otros contextos del proyecto; este versículo no lo contiene.
  - 'Se mantiene el paralelismo verbal del hebreo con tres acciones consecutivas: despojar, poner al descubierto, hacer como desierto/tierra árida, y hacer morir de sed.'
  - «Desierto» y «tierra árida» se usan como imágenes de desolación, no como traducciones técnicas de un mismo término geográfico.
