revisions:
- from: Al séptimo día examinará[a] la lesión, y si la lesión se ha extendido en la ropa, o en la urdimbre, o en la trama, o en el cuero, en cualquier cosa para la cual se hace el cuero para trabajo, es una sarna[b] destructiva la lesión; es impura.
  to: Al séptimo día examinará la lesión, y si la lesión se ha extendido en la ropa, o en la urdimbre, o en la trama[a], o en el cuero, en cualquier objeto hecho de cuero para uso, la lesión es una enfermedad cutánea[b] destructiva; es impura.
  rationale: Se reemplazó «sarna» por «enfermedad cutánea» para ajustarse a la rationale auditada y evitar un término médico demasiado estrecho. Se reformuló la cláusula final sobre el cuero para que sea clara y natural en español, preservando el alcance legal del hebreo. También se mejoró el orden sintáctico de la frase final. Se mantuvo «lesión», «urdimbre», «trama» y «cuero» por fidelidad y claridad.
