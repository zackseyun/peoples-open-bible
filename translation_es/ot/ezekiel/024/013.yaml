  text: בְּ/טֻמְאָתֵ֖/ךְ זִמָּ֑ה יַ֤עַן טִֽהַרְתִּי/ךְ֙ וְ/לֹ֣א טָהַ֔רְתְּ מִ/טֻּמְאָתֵ/ךְ֙ לֹ֣א תִטְהֲרִי ע֔וֹד עַד הֲנִיחִ֥/י אֶת חֲמָתִ֖/י בָּֽ/ךְ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/024/013.yaml
  text: In your uncleanness is lewdness[a]. Because I cleansed you, but you were not cleansed from your uncleanness[b], you will not be cleansed anymore until I have satisfied my wrath against you.
  footnotes:
  - marker: a
    text: 'Or ''Because I cleansed you'' or ''Though I cleansed you.'' The Hebrew can be taken more formally, but the main text reflects the sense demanded by the following clause: ''but you were not cleansed.'''
    reason: lexical_alternative
  - marker: b
    text: Literally 'until I cause my wrath to rest in/on you,' an idiom meaning that God's wrath is fully spent.
    reason: lexical_alternative
