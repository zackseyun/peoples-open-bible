revisions:
- from: He aquí[a], los estoy reuniendo de todas las tierras adonde los arrojé en mi enojo, en mi furor y en gran indignación[b], y los haré volver a este lugar y los haré habitar en seguridad.
  to: He aquí[a], los estoy reuniendo de todas las tierras adonde los arrojé en mi enojo y en mi furor y en gran indignación[b], y los haré volver a este lugar y los haré habitar seguros.
  rationale: Se mantiene la base del borrador, pero se ajusta la coordinación para reflejar mejor la triple acumulación hebrea de términos de juicio y se sustituye la clausura por una formulación más idiomática en español ('habitar seguros') que conserva tanto el sentido de לָבֶטַח como la fuerza causativa de וְהֹשַׁבְתִּים.
