translation:
  text: Do not abandon an old friend, for a new one is not equal to him; a new friend is like new wine—when it grows old, you will drink it with gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Hebrew line in Zone 1 appears to belong to a different saying and does not match Sirach 9:10. The translation therefore follows the Greek witness for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: Μὴ ἐγκαταλίπης
  chosen: Do not abandon
  alternatives:
  - Do not forsake
  - Do not leave
  lexicon: LSJ
  rationale: The Hebrew in Zone 1 appears to reflect a different verse and is not usable for Sirach 9:10 as transmitted in the Greek parallel. Since the Greek parallel gives the well-attested sense for this verse, ἐγκαταλίπης is rendered 'abandon' to convey relational desertion in natural modern English.
- source_word: φίλον ἀρχαῖον
  chosen: an old friend
  alternatives:
  - a longtime friend
  - an ancient friend
  lexicon: LSJ
  rationale: ἀρχαῖον here refers to longstanding duration, not antiquity in a literal historical sense. 'Old friend' is idiomatic and preserves the comparison with a 'new friend'.
- source_word: πρόσφατος
  chosen: new
  alternatives:
  - recent
  - newly acquired
  lexicon: LSJ
  rationale: Although πρόσφατος can mean 'recent,' the contrast with ἀρχαῖον and the wine proverb favors the simple and natural 'new'.
- source_word: οὐκ ἔστιν ἔφισος αὐτῷ
  chosen: is not equal to him
  alternatives:
  - does not compare with him
  - is not his match
  lexicon: LSJ
  rationale: This keeps the comparative force explicit and stays close to the Greek structure while remaining readable.
- source_word: οἶνος νέος φίλος νέος
  chosen: a new friend is like new wine
  alternatives:
  - new wine, new friend
  - a new friend, like new wine
  lexicon: LSJ
  rationale: The Greek presents a terse proverb-like apposition. English benefits from making the comparison explicit with 'is like' while preserving the aphoristic force.
- source_word: ἐὰν παλαιωθῇ
  chosen: when it grows old
  alternatives:
  - when it ages
  - if it becomes old
  lexicon: LSJ
  rationale: The conditional particle here carries a general proverbial sense. 'When it grows old' reads naturally in English and fits the wine metaphor.
- source_word: μετ’ εὐφροσύνης πίεσαι αὐτόν
  chosen: you will drink it with gladness
  alternatives:
  - you will drink it gladly
  - you will drink it with delight
  lexicon: LSJ
  rationale: The future/middle sense in proverbial context is well conveyed by 'you will drink it with gladness.' 'Gladness' preserves the noun εὐφροσύνη more directly than an adverb.
