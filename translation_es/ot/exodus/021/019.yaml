translation:
  language: es
  text: Si se levanta y camina afuera apoyado en su bastón[a], entonces el que lo golpeó quedará exento de responsabilidad; solo deberá pagar por el tiempo que perdió[b] y hacer que lo curen por completo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre su bastón»; la frase hebrea dice literalmente «sobre su bastón», indicando una marcha sostenida con apoyo como evidencia de recuperación parcial.
    reason: lexical_alternative
  - marker: b
    text: «El tiempo que perdió» se refiere a la compensación por el período de incapacidad del herido, es decir, el tiempo en que no puede trabajar normalmente.
    reason: cultural_note
  - marker: c
    text: La expresión enfática hebrea dice literalmente «sanar sanará», es decir, debe procurar una recuperación completa, probablemente cubriendo el tratamiento médico.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - En caso de que
  - Cuando
  lexicon: HALOT
  rationale: La partícula condicional introduce un caso legal; «Si» reproduce con naturalidad esa apertura casuística en español.
- source_word: יָקוּם
  english_pob_choice: he gets up
  chosen_spanish: se levanta
  alternatives_spanish:
  - se pone de pie
  - se incorpora
  lexicon: HALOT
  rationale: En este contexto denota recuperación suficiente para levantarse de la cama o del lecho de enfermedad; «se levanta» es claro y fiel.
- source_word: וְהִתְהַלֵּךְ
  english_pob_choice: and walks about
  chosen_spanish: y camina
  alternatives_spanish:
  - y anda
  - y se pasea
  lexicon: HALOT
  rationale: El hitpael expresa movilidad recuperada y no un solo paso; «camina» comunica la acción sin sobrerrepresentar un matiz de paseo.
- source_word: בַּחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - al aire libre
  - en público
  lexicon: HALOT
  rationale: En el caso legal señala movimiento fuera del encierro; «afuera» es natural en español y conserva la evidencia de recuperación visible.
- source_word: עַל מִשְׁעַנְתּוֹ
  english_pob_choice: on his staff
  chosen_spanish: apoyado en su bastón
  alternatives_spanish:
  - sobre su bastón
  - apoyándose en su bastón
  lexicon: HALOT
  rationale: La frase hebrea literalmente dice «sobre su bastón», pero el sentido es caminar con apoyo. En español, «apoyado en su bastón» explicita la fuerza evidencial sin perder la imagen.
- source_word: וְנִקָּה
  english_pob_choice: shall be cleared
  chosen_spanish: quedará libre
  alternatives_spanish:
  - será absuelto
  - quedará exento de culpa
  lexicon: HALOT
  rationale: En contexto jurídico significa quedar libre de responsabilidad o pena. «Quedará libre» conserva la fuerza legal sin sonar demasiado técnico ni forzar una absolución formal de tribunal.
- source_word: הַמַּכֶּה
  english_pob_choice: the one who struck him
  chosen_spanish: el que lo golpeó
  alternatives_spanish:
  - el golpeador
  - el agresor
  lexicon: HALOT
  rationale: Es un participio sustantivado que identifica al responsable del golpe; «el que lo golpeó» reproduce la referencia concreta del caso.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - excepto que
  lexicon: HALOT
  rationale: La partícula restringe la obligación restante del agresor; «solo» comunica bien esa limitación.
- source_word: שִׁבְתּוֹ
  english_pob_choice: his lost time
  chosen_spanish: su tiempo perdido
  alternatives_spanish:
  - su tiempo de incapacidad
  - su tiempo sin trabajo
  - su ocio
  lexicon: HALOT
  rationale: Aunque el hebreo se relaciona etimológicamente con «sentarse/permanecer», aquí alude al período de incapacidad y la pérdida laboral asociada. «Su tiempo perdido» sigue de cerca la equivalencia auditada en inglés y sigue siendo inteligible en español; se preserva el sentido de compensación por el tiempo sin poder trabajar.
- source_word: יִתֵּן
  english_pob_choice: he must pay
  chosen_spanish: deberá pagar
  alternatives_spanish:
  - tendrá que dar
  - deberá compensar
  lexicon: HALOT
  rationale: En lenguaje legal de restitución, «pagar» transmite la obligación compensatoria mejor que un simple «dar».
- source_word: וְרַפֹּא יְרַפֵּא
  english_pob_choice: have him thoroughly healed
  chosen_spanish: hacer que sea completamente sanado
  alternatives_spanish:
  - hacer que lo sanen por completo
  - encargarse de su curación
  - asegurar su curación completa
  lexicon: HALOT
  rationale: La construcción intensiva con infinitivo absoluto y verbo finito expresa obligación de procurar una sanidad completa. «Hacer que sea completamente sanado» conserva la fuerza causativa y la formalidad del registro; se evita reducirlo solo a una acción médica directa del agresor.
translation_notes:
  revision_awareness: 'Se siguió el último estado revisado del inglés POB: se mantuvo la formulación formal con causativo («have him thoroughly healed»), reflejada en español mediante «hacer que sea completamente sanado», y se respetó la equivalencia jurídica de la cláusula de exoneración y compensación.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «bastón» para מִשְׁעַנְתּוֹ por coherencia con el valor de apoyo físico visible, evitando «cayado» por su asociación más pastoral/tradicional.
  - «Quedará libre» preserva la idea jurídica de quedar exento de responsabilidad sin introducir terminología doctrinal ajena al caso.
  - La estructura de caso legal se mantuvo compacta y formal, acorde con el estilo de POB para legislación de Éxodo.
