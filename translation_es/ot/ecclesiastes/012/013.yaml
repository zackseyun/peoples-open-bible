revisions:
- from: 'El fin del asunto, cuando todo ha sido oído: teme a Dios y guarda sus mandamientos, porque esto es el todo del hombre[a].'
  to: 'El fin del asunto, cuando todo se ha oído: teme a Dios y guarda sus mandamientos, porque esto es todo del ser humano[a].'
  rationale: Se ajusta la redacción para lograr un español natural y claro sin apartarse del hebreo ni de la rationale documentada. «cuando todo se ha oído» mejora la fluidez manteniendo el valor de נִשְׁמָע. La cláusula final evita el calco ininteligible «el todo del hombre», pero sigue sin introducir «deber» en el texto principal; esa interpretación, junto con la literalidad hebrea y la lectura inclusiva, queda preservada en la nota.
