translation:
  language: es
  text: Así fueron sometidos los hijos de Israel en aquel tiempo, y los hijos de Judá prevalecieron, porque se apoyaron en Yahvé, el Dios de sus padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּכָּנְעוּ
  english_pob_choice: were subdued
  chosen_spanish: fueron sometidos
  alternatives_spanish:
  - fueron humillados
  - fueron abatidos
  - fueron derrotados
  lexicon: HALOT
  rationale: El nifal de כנע expresa ser puestos en sujeción o quedar sometidos; en este contexto militar, «fueron sometidos» conserva mejor la idea de subyugación que una simple derrota.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación transparente del hebreo y el paralelo con «los hijos de Judá». En español, «hijos de Israel» es comprensible y mantiene la forma del texto fuente.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: HALOT
  rationale: Es el equivalente temporal natural en español y mantiene el valor narrativo de referencia temporal.
- source_word: וַיֶּאֶמְצוּ
  english_pob_choice: prevailed
  chosen_spanish: prevalecieron
  alternatives_spanish:
  - se hicieron fuertes
  - resultaron más fuertes
  - triunfaron
  lexicon: HALOT
  rationale: אמץ en este contexto bélico comunica fuerza que conduce a la victoria. «Prevalecieron» refleja ese resultado de manera natural en español y preserva la relación con la fortaleza.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los hombres de Judá
  - Judá
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «los hijos de Israel» y la expresión hebrea directa. «Los hombres de Judá» sería más interpretativo.
- source_word: נִשְׁעֲנ֔וּ עַל
  english_pob_choice: relied on
  chosen_spanish: se apoyaron en
  alternatives_spanish:
  - confiaron en
  - reposaron sobre
  lexicon: HALOT
  rationale: שען con עַל tiene la imagen literal de apoyarse/recostarse y, por extensión, confiar o depender. «Se apoyaron en» conserva mejor la metáfora subyacente que «confiaron en».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - su Dios ancestral
  lexicon: HALOT
  rationale: Es una traducción natural y fiel de la cadena posesiva, con resonancia de pacto y continuidad ancestral. «Padres» mantiene la forma tradicional del hebreo sin perder claridad en español.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. La práctica editorial del POB pide conservarlo como nombre propio, no enmascararlo como título. En español, «Yahvé» es la forma coherente con esa decisión.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue el sentido del hebreo masorético y la lectura inglesa auditada sin cambios de revisión registrados; no se detectan variantes textuales ni enmiendas aplicadas que requieran ajuste del español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo formal «los hijos de Israel / los hijos de Judá».
  - Se conserva el Nombre divino como «Yahvé» conforme a la norma del proyecto.
  - No se introduce léxico eclesiástico sustitutorio; el texto permanece cercano a la sintaxis y semántica del hebreo con español natural.
