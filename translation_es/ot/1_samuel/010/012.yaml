    reason: alternative_reading
  revision_rationale: La revisión hace explícita en el texto principal la lectura plural del hebreo masorético, tal como la documenta el POB inglés, y deja la lectura singular tradicional como alternativa en nota. También mejora la naturalidad y claridad del español de la nota.
