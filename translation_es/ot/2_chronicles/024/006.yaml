base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/024/006.yaml
  text: Then the king called Jehoiada the chief and said to him[b][a], “Why have you not required the Levites to bring from Judah and from Jerusalem the levy of Moses the servant of Yahweh and of the assembly of Israel for the tent of the testimony?”
  footnotes:
  - marker: a
    text: Or “the levy” or “the contribution” of Moses. The Hebrew term refers to an imposed payment for sanctuary purposes.
    reason: lexical_alternative
  - marker: b
    text: That is, the sanctuary, literally “the tent of the testimony.”
    reason: cultural_note
