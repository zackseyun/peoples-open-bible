base_translation:
  language: en
  yaml_path: translation/ot/joshua/005/012.yaml
  text: And the manna ceased on the next day[a], after they had eaten from the produce of the land. There was no longer manna for the sons of Israel[b], and they ate from the yield of the land of Canaan that year.
  footnotes:
  - marker: a
    text: Or 'from the old produce of the land.' The Hebrew term may refer more specifically to stored produce from the previous year's crop.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Israel'' is the more literal rendering of the Hebrew; many English versions have ''people of Israel'' or ''Israelites.'''
    reason: lexical_alternative
