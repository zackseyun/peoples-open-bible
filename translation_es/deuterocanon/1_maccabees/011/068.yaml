translation:
  language: es
  text: Y he aquí[a], un campamento de extranjeros le salió al encuentro en la llanura, y tendieron una emboscada contra él en los montes, mientras ellos mismos avanzaban desde el frente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «y tendieron una emboscada contra él en los montes, mientras ellos mismos le salían al encuentro de frente». La última cláusula, de manera más literal, es «ellos mismos salieron al encuentro desde la parte opuesta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campo
  - encampamento
  lexicon: LSJ
  rationale: El término griego designa un campamento o fuerza acampada, con matiz militar. «Campamento» es natural en español y conserva ese sentido.
- source_word: ἀλλοφύλων
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - gentes de otra nación
  - filisteos
  lexicon: LSJ
  rationale: El griego significa literalmente gente de otra tribu o pueblo. En este contexto macabeo conviene un término genérico; «extranjeros» preserva la referencia amplia sin identificar indebidamente a filisteos.
- source_word: ἀπήντα αὐτῷ
  english_pob_choice: met him
  chosen_spanish: le salió al encuentro
  alternatives_spanish:
  - lo encontró
  - se encontró con él
  - lo fue a encontrar
  lexicon: LSJ
  rationale: La idea es de encuentro o salida al encuentro. En español, «le salió al encuentro» mantiene el movimiento narrativo y suena idiomático.
- source_word: ἐν τῷ πεδίῳ
  english_pob_choice: in the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en el campo
  - en la planicie
  - sobre la llanura
  lexicon: LSJ
  rationale: El contraste con «en los montes» favorece una zona abierta y nivelada. «Llanura» transmite mejor ese contraste geográfico que «campo».
- source_word: ἐξέβαλον ἔνεδρον
  english_pob_choice: set an ambush
  chosen_spanish: tendieron una emboscada
  alternatives_spanish:
  - pusieron una emboscada
  - prepararon una emboscada
  - montaron una emboscada
  lexicon: LSJ
  rationale: La expresión idiomática implica colocar/deployar una emboscada. «Tender una emboscada» es una solución clara y bíblica en buen español.
- source_word: ἐπʼ αὐτὸν
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - en su contra
  lexicon: LSJ
  rationale: En contexto hostil, la preposición expresa dirección adversaria. «Contra él» es la forma más directa y natural.
- source_word: ἐν τοῖς ὄρεσιν
  english_pob_choice: in the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - en las montañas
  - en la región montañosa
  - en los cerros
  lexicon: LSJ
  rationale: Aunque «montañas» es posible, «montes» conserva bien el plural locativo y el contraste con la llanura en un registro bíblico sobrio.
- source_word: αὐτοὶ δὲ ἀπήντησαν ἐξ ἐναντίας
  english_pob_choice: while they themselves advanced from the front
  chosen_spanish: pero ellos mismos se le enfrentaron de frente
  alternatives_spanish:
  - pero ellos mismos lo enfrentaron de frente
  - y ellos mismos vinieron por el frente
  - pero ellos mismos se presentaron de la parte opuesta
  lexicon: LSJ
  rationale: La frase enfatiza el contraste táctico y la oposición frontal. «Se le enfrentaron de frente» comunica esa fuerza sin perder la idea de oposición contenida en ἐξ ἐναντίας.
translation_notes:
  revision_awareness: 'El texto griego y el trazado inglés concuerdan de forma alta. La única variación relevante es estilística: se escogió «le salió al encuentro» y «se le enfrentaron de frente» para expresar con naturalidad el juego táctico entre el encuentro en la llanura, la emboscada en los montes y el avance frontal del segundo grupo. No se introducen lecturas textuales nuevas.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero con sintaxis española natural.
  - «Extranjeros» preserva el valor étnico-genérico de ἀλλοφύλων sin especificación indebida.
  - «Montes» conserva la oposición espacial con «llanura» y evita una modernización excesiva.
