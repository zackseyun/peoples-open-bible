    text: Hebrew 'any life of a human/man.' The phrase refers to a human person or human life, not specifically to an immaterial 'soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'kills any person.' The Hebrew verb is literally 'strikes,' but here it refers to a lethal blow.
    reason: lexical_alternative
