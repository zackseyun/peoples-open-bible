id: 1TI.6.13
reference: 1 Timothy 6:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: παραγγέλλω σοι ἐνώπιον τοῦ θεοῦ τοῦ ⸀ζῳογονοῦντος τὰ πάντα καὶ Χριστοῦ Ἰησοῦ τοῦ μαρτυρήσαντος ἐπὶ Ποντίου Πιλάτου τὴν καλὴν ὁμολογίαν,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/013.yaml
  text: I charge you before God[a], who gives life to all things, and Messiah Jesus, who testified to the good confession before Pontius Pilate[c][b],
  footnotes:
  - marker: a
    text: Or 'who preserves all things alive' or 'who makes all things alive.' The Greek participle ζῳογονοῦντος can emphasize either preserving life or giving life.
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: c
    text: Or 'who testified the good confession'.
    reason: previous_rendering
translation:
  language: ko
  text: 나는 만물에게 생명을 주시는[a] 하나님 앞에서, 그리고 본디오 빌라도 앞에서 그 선한 고백으로 증언하신[c] 메시아[b] 예수 앞에서 그대에게 명합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「만물을 살아 있게 보존하시는」 「만물을 살리시는」. 헬라어 분사 ζῳογονέω는 생명을 보존함과 생명을 부여함 두 가지를 모두 강조할 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그리스도」. 본 번역은 칭호의 무게를 살려 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: c
    text: 또는 「그 선한 고백을 증언하신」.
    reason: previous_rendering
lexical_decisions:
- source_word: παραγγέλλω σοι ἐνώπιον τοῦ θεοῦ
  english_pob_choice: I charge you before God
  chosen_korean: 나는 ~ 하나님 앞에서 ~ 그대에게 명합니다
  alternatives_korean:
  - 나는 그대에게 분부합니다
  lexicon: BDAG
  rationale: 5:21 διαμαρτύρομαι와 어휘 변화. παραγγέλλω는 「명함」.
- source_word: τοῦ ζῳογονοῦντος τὰ πάντα
  english_pob_choice: who gives life to all things
  chosen_korean: 만물에게 생명을 주시는
  alternatives_korean:
  - 만물을 살리시는
  - 만물을 살아 있게 보존하시는
  lexicon: BDAG
  rationale: ζῳογονέω의 두 어감(생명 부여/생명 보존) 중 본 절은 「생명을 주시는」 어감을 본문에 두고 폭은 각주.
- source_word: τοῦ μαρτυρήσαντος ... τὴν καλὴν ὁμολογίαν
  english_pob_choice: who testified to the good confession
  chosen_korean: 그 선한 고백으로 증언하신
  alternatives_korean:
  - 그 선한 고백을 증언하신
  lexicon: BDAG
  rationale: 12절 ὁμολογία와 어휘 연결. 빌라도 앞에서의 그리스도의 증언이 디모데의 신앙 고백의 모범임을 보여 준다.
- source_word: Ποντίου Πιλάτου
  english_pob_choice: Pontius Pilate
  chosen_korean: 본디오 빌라도
  alternatives_korean:
  - 폰티우스 필라투스
  lexicon: BDAG
  rationale: 한국 교회 정립 표기 「본디오 빌라도」.
