revisions:
- from: 'Ahab habló a Nabot, diciendo: “Entrégame tu viña, para que me sirva de huerto de verduras[a], porque está cerca de mi casa; y en su lugar te daré una mejor viña que ella. O, si te parece bien[b], te daré su precio en plata”.'
  to: 'Ahab habló a Nabot, diciendo: “Dame tu viña, para que me sirva de huerto de verduras, porque está cerca de mi casa; y en su lugar te daré una viña mejor que la tuya. O, si te parece bien[a], te daré su precio en plata”.'
  rationale: 'La revisión hace ajustes menores de fidelidad y naturalidad: ''Dame'' reproduce mejor el imperativo simple; ''una viña mejor que la tuya'' expresa el comparativo de manera idiomática; y se conserva solo la nota realmente necesaria del modismo hebreo documentado por el POB inglés.'
