    prompt_sha256: b51e522a6db0084b40def8e48bdd848c1e932b8894be02a1ef7505589d8853ab
    timestamp: '2026-04-19T20:21:42Z'
    output_hash: c3a1d64529a95af0024a1a073fcc751ea6fd41f6523ce5af536218abf133967d
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:14:21Z'
    unchanged: false
    changes_summary: Changed 'every man' to 'all the men' for more natural collective sense of כָּל אִישׁ; changed 'turned back' to 'returned' to match וַיָּשֻׁבוּ more directly and avoid redundancy with 'to return.'
translation:
  language: es
  text: Entonces volvieron todos los hombres de Judá y de Jerusalén, con Josafat a su cabeza, para volver a Jerusalén con alegría, porque Yahvé los había alegrado sobre sus enemigos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por sus enemigos». El hebreo puede expresar la relación de la alegría con los enemigos derrotados; aquí el sentido es de regocijo en triunfo sobre ellos, no meramente «por causa de» ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - retornaron
  - regresaron
  lexicon: HALOT
  rationale: El wayyiqtol de שוב expresa el regreso narrativo del grupo. «Volvieron» es natural en español y conserva el movimiento de retorno sin sobrecargar la frase.
- source_word: כָּל אִישׁ יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: all the men of Judah and Jerusalem
  chosen_spanish: todos los hombres de Judá y de Jerusalén
  alternatives_spanish:
  - cada hombre de Judá y de Jerusalén
  - toda la gente de Judá y de Jerusalén
  lexicon: HALOT
  rationale: Se preserva el valor distributivo y masculino de אִישׁ con un sustantivo plural explícito. «Todos los hombres» comunica mejor el colectivo que un neutralizador como «toda la gente».
- source_word: וִיהוֹשָׁפָט בְּרֹאשָׁם
  english_pob_choice: with Jehoshaphat at their head
  chosen_spanish: con Josafat a su cabeza
  alternatives_spanish:
  - con Josafat al frente
  - con Josafat encabezándolos
  lexicon: HALOT
  rationale: בְּרֹאשָׁם es idiomático de liderazgo o posición al frente. «A su cabeza» conserva la metáfora con claridad y buen español.
- source_word: לָשׁוּב אֶל יְרוּשָׁלַם
  english_pob_choice: to go back to Jerusalem
  chosen_spanish: para volver a Jerusalén
  alternatives_spanish:
  - para regresar a Jerusalén
  - para ir de vuelta a Jerusalén
  lexicon: HALOT
  rationale: El infinitivo repite שוב para enfatizar el movimiento de regreso. «Para volver» mantiene esa repetición sin sonar torpe en español.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegres
  lexicon: HALOT
  rationale: שִׂמְחָה se puede expresar con «alegría» en español contemporáneo, de forma natural y digna. «Gozo» sería también posible, pero «alegría» resulta más transparente.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal del retorno gozoso. «Porque» es la forma más directa y clara en español.
- source_word: שִׂמְּחָם
  english_pob_choice: had made them rejoice
  chosen_spanish: los había alegrado
  alternatives_spanish:
  - los había hecho regocijarse
  - les había dado alegría
  lexicon: HALOT
  rationale: El piel de שמח es causativo. «Los había alegrado» preserva esa causación de modo idiomático; «hecho regocijarse» sería más explícito pero menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, usando la transliteración «Yahvé» en el texto principal.
- source_word: מֵאֹיְבֵיהֶם
  english_pob_choice: over their enemies
  chosen_spanish: por causa de sus enemigos
  alternatives_spanish:
  - sobre sus enemigos
  - a costa de sus enemigos
  lexicon: HALOT
  rationale: El מן con verbo de alegrarse puede marcar ocasión o referencia. En este contexto se expresa la causa de la alegría al haber vencido a sus enemigos; «por causa de» evita una interpretación demasiado forzada de dominio en español.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton. Se mantiene el nombre propio divino en español según la política del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor colectivo de כָּל אִישׁ
  english_pob_reading: all the men
  chosen_spanish_reading: todos los hombres
  alternative_spanish_readings:
  - cada hombre
  - toda la gente
  rationale: Se conserva el matiz masculino y distributivo del hebreo sin convertirlo en una expresión neutra que suavice la forma original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La versión inglesa reciente ajustó la frase para hacer más natural la repetición de שוב. En español se opta por «volvieron... para volver» para reflejar ese énfasis hebreo sin producir una redundancia extraña. También se evita traducir mecánicamente la preposición final como «sobre» si el contexto causal de מן se expresa mejor en español con «por causa de».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene la relación verbal de שוב con «volvieron... para volver».
  - Se conserva el masculino plural de אִישׁ como «los hombres».
  - «Josafat» sigue la forma castellana habitual del nombre propio.
