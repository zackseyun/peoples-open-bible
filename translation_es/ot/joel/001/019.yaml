translation:
  language: es
  text: A ti[a], Yahvé, clamo, porque el fuego ha devorado los pastizales[b] del desierto, y la llama ha chamuscado[c] todos los árboles del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: O «lugares de pastoreo» para «pastizales».
    reason: lexical_alternative
  - marker: c
    text: O «ha quemado» para «ha chamuscado».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיךָ
  english_pob_choice: To you
  chosen_spanish: A ti
  alternatives_spanish:
  - Para ti
  - A ti mismo
  lexicon: HALOT
  rationale: La preposición direccional אֶל con sufijo de segunda persona masculina singular expresa el destino del clamor dirigido a Yahvé; en español, «A ti» conserva la dirección y suena natural en un contexto de oración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme al criterio POB; «Yahvé» es la forma española establecida para la transliteración del nombre, no una sustitución por título.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: clamo
  alternatives_spanish:
  - llamo
  - grito
  - clamo a
  lexicon: HALOT
  rationale: En contexto de plegaria, קרא puede expresar llamar o clamar. «Clamo» comunica mejor el tono de súplica intensa sin abandonar el valor léxico básico de la raíz.
- source_word: אֵשׁ אָכְלָה
  english_pob_choice: fire has devoured
  chosen_spanish: fuego ha devorado
  alternatives_spanish:
  - fuego ha consumido
  - un fuego ha devorado
  lexicon: HALOT
  rationale: «Devorado» conserva la imagen vívida de אכל como consumo destructivo por fuego. «Fuego» sin artículo mantiene el paralelismo poético y es idiomático en español.
- source_word: נְאוֹת מִדְבָּר
  english_pob_choice: the pastures of the wilderness
  chosen_spanish: los pastizales del desierto
  alternatives_spanish:
  - los pastos del desierto
  - los lugares de pastoreo del desierto
  - las pasturas del desierto
  lexicon: HALOT
  rationale: El inglés POB opta por «pastures» con nota de posible «grazing places». En español, «pastizales» recoge mejor el sentido de terrenos de pastoreo abiertos que «pasturas» en lectura amplia. «Desierto» representa aquí מִדְבָּר como zona árida/estepa, no necesariamente un desierto arenoso.
- source_word: וְלֶהָבָה
  english_pob_choice: and flame
  chosen_spanish: y la llama
  alternatives_spanish:
  - y llama
  - y una llama
  lexicon: HALOT
  rationale: «Llama» mantiene la coordinación poética con «fuego». Se añade artículo por fluidez del español sin alterar la imagen paralela.
- source_word: לִהֲטָה
  english_pob_choice: has scorched
  chosen_spanish: ha chamuscado
  alternatives_spanish:
  - ha quemado
  - ha abrasado
  - ha scorched
  lexicon: HALOT
  rationale: La raíz להט implica arder con calor intenso; «chamuscado» distingue este segundo hemistiquio del «devorado» anterior y conserva la fuerza de daño por calor, aunque es algo más concreto en español.
- source_word: כָּל עֲצֵי הַשָּׂדֶה
  english_pob_choice: all the trees of the field
  chosen_spanish: todos los árboles del campo
  alternatives_spanish:
  - cada árbol del campo
  - todos los árboles de la tierra
  lexicon: HALOT
  rationale: «Árboles del campo» sigue de cerca el hebreo literal y resulta claro en español. «Campo» mantiene la referencia a la zona cultivada o abierta.
theological_decisions:
- issue: Nombre divino YHWH en el verso
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La lectura española mantiene el nombre propio divino para preservar el dato del original y la política terminológica POB; no se sustituye por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor semántico de מִדְבָּר
  english_pob_reading: wilderness
  chosen_spanish_reading: desierto
  alternative_spanish_readings:
  - estepa
  - campo abierto
  rationale: En Joel 1:19 el paralelo agrícola favorece una zona seca o de pastoreo abierto. «Desierto» comunica esa amplitud árida en español sin forzar una imagen de arena impropia del contexto.
  doctrine_reference: 'HALOT: מִדְבָּר como región despoblada / open range'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo consonante y coincide en sustancia con la revisión inglesa más reciente, que no requirió cambios. Se mantiene el nombre divino como Yahvé y se conserva el paralelismo poético de fuego/llama, con una distinción léxica en español entre «devorado» y «chamuscado».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa un registro bíblico claro y moderno, evitando calcos demasiado rígidos.
  - Se conserva la fuerza poética del paralelismo hebreo sin añadir explicaciones al cuerpo del versículo.
