review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: los asdoditas madrugan, encuentran a Dagón caído delante del arca de Yahvé, y lo vuelven a poner en su sitio. También conserva correctamente יְהוָה como ''Yahvé''. La única desalineación relevante es la expresión ''sobre su rostro al suelo'', que resulta poco natural en español y no refleja con claridad la postura idiomática del hebreo.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero 'he aquí' y 'sobre su rostro al suelo' juntos producen una frase algo tiesa. 'He aquí' es admisible, pero la secuencia corporal necesita una reparación para sonar natural en español sin perder la imagen de humillación. 'Caído rostro en tierra' mantiene mejor el registro bíblico y la claridad.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: ''Yahvé'' para יְהוָה, ''arca'' para אֲרוֹן, ''Dagón'' como nombre propio. No hay conflictos teológicos ni léxicos mayores fuera de la mejora estilístico-semántica de la postura de caída.'
  issues:
  - severity: medium
    issue: La frase 'había caído sobre su rostro al suelo' es poco idiomática en español.
    rationale: Aunque intenta seguir de cerca 'on his face to the ground', en español suena forzada y puede entorpecer la comprensión. El hebreo describe una postura postrada; 'había caído rostro en tierra' o 'de bruces en tierra' la expresa con más claridad. Dado el registro buscado, 'rostro en tierra' preserva mejor la dignidad y cercanía formal al original.
  revised_spanish_text: Cuando los asdoditas se levantaron temprano al día siguiente, he aquí, Dagón había caído rostro en tierra delante del arca de Yahvé. Entonces tomaron a Dagón y lo devolvieron a su lugar.
  revision_rationale: Se ajusta únicamente la expresión de la postura de Dagón para lograr un español natural y bíblicamente digno, sin perder la fuerza humillante del hebreo. El resto del versículo está bien alineado con la fuente y con la terminología del proyecto.
