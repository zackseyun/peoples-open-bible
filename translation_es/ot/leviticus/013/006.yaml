  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Lo declarará limpio' preserva correctamente el sentido ritual/jurídico de וְטִהֲרוֹ. 'Erupción escamosa' refleja bien מִסְפַּחַת y la nota alternativa está justificada. 'Infección' sigue el POB inglés, aunque en español podría sonar más médico de lo necesario; aun así es aceptable por alineación con el audit trail.
