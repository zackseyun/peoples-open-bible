translation:
  language: es
  text: 'Cuando el siervo[a] del hombre de Dios se levantó temprano y salió, he aquí que un ejército con caballos y carros de guerra rodeaba la ciudad. Y su siervo le dijo: «¡Ay[b], mi señor! ¿Qué haremos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo נַעַר puede significar «joven», «siervo» o «servidor». Aquí se traduce «siervo» por claridad contextual.
    reason: lexical_alternative
  - marker: b
    text: O «¡Ah!»; la interjección hebrea expresa alarma o angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se alzó temprano
  - se levantó muy de mañana
  lexicon: HALOT
  rationale: El verbo transmite la idea de comenzar la jornada temprano. «Se levantó temprano» es natural en español y conserva el matiz temporal sin añadir solemnidad arcaica innecesaria.
- source_word: מְשָׁרֵת
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - asistente
  - sirviente
  lexicon: HALOT
  rationale: En este contexto narrativo designa a una persona que sirve a otra. «Siervo» mantiene la relación de subordinación y funciona bien en español bíblico sin perder claridad.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el siervo de Dios
  lexicon: HALOT
  rationale: Es un título profético establecido. «El hombre de Dios» lo refleja de manera directa y conserva su resonancia bíblica.
- source_word: לָקוּם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: En la secuencia narrativa, el infinitivo contribuye a la acción de levantarse. En español, repetir «se levantó» resulta natural y fiel al flujo del hebreo.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - se fue fuera
  lexicon: HALOT
  rationale: «Salió» expresa con precisión el movimiento desde el interior al exterior y evita redundancia en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La fórmula introduce una escena repentina y sorprendente. «He aquí que» conserva ese valor discursivo con registro bíblico natural.
- source_word: חַיִל
  english_pob_choice: an army
  chosen_spanish: un ejército
  alternatives_spanish:
  - una fuerza
  - tropas
  lexicon: HALOT
  rationale: En contexto militar, el término se refiere a una fuerza armada. «Un ejército» es la equivalencia más clara y natural en español.
- source_word: סוֹבֵב
  english_pob_choice: was surrounding
  chosen_spanish: rodeaba
  alternatives_spanish:
  - estaba rodeando
  - circundaba
  lexicon: HALOT
  rationale: El participio presenta la acción como una situación en curso. «Rodeaba» comunica bien esa escena continua en un español fluido.
- source_word: וְסוּס וָרָכֶב
  english_pob_choice: with horses and chariots
  chosen_spanish: con caballos y carros
  alternatives_spanish:
  - y caballos y carros
  - con caballos y carruajes
  lexicon: HALOT
  rationale: La expresión enumera recursos militares. «Caballos y carros» es la manera natural de expresarlo en español y conserva el paralelismo del hebreo.
- source_word: נַעֲרוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su joven
  - su ayudante
  - su criado
  lexicon: HALOT
  rationale: Aunque נַעַר puede implicar juventud, en este versículo el contexto ya identifica al personaje como servidor; «su siervo» mantiene la referencia más directa y evita forzar un matiz etario no explícito en esta línea final.
- source_word: אֲהָהּ
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ah!
  - ¡Ay de mí!
  - ¡Oh no!
  lexicon: HALOT
  rationale: La interjección expresa alarma y angustia. «¡Ay!» reproduce bien ese tono en español bíblico y contemporáneo.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi maestro
  - mi amo
  lexicon: HALOT
  rationale: Es un tratamiento respetuoso dirigido a un superior humano. «Mi señor» es natural y solemne en español, sin cargarlo de sentido divino.
- source_word: אֵיכָה נַעֲשֶׂה
  english_pob_choice: What shall we do?
  chosen_spanish: ¿Qué haremos?
  alternatives_spanish:
  - ¿Cómo haremos?
  - ¿Qué vamos a hacer?
  lexicon: HALOT
  rationale: La pregunta busca el curso de acción ante el peligro. «¿Qué haremos?» es breve, idiomática y plenamente fiel al hebreo.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que mantiene «servant of the man of God» como «the servant of the man of God» y simplifica la referencia posterior a «his servant». Aquí se reflejó esa misma coherencia al traducir ambos miembros con «siervo», sin introducir una distinción etaria que el versículo no exige en esta forma.
  spanish_consistency_notes:
  - Se mantiene «hombre de Dios» como título profético estable.
  - Se conserva «siervo» para el mismo personaje en ambas menciones, evitando confusión.
  - «He aquí que» reproduce el giro hebreo וְהִנֵּה con tono narrativo solemne.
  - No se introduce «Cristo», «SEÑOR» ni otras convenciones ajenas al texto de 2 Reyes 6:15.
