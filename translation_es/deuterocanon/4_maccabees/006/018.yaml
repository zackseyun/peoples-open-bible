translation:
  language: es
  text: Porque sería en verdad irracional que, después de haber vivido nuestra vida hasta la vejez en la verdad y haber conservado conforme a la ley la reputación basada en ella, cambiáramos ahora de rumbo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄλογιστον
  english_pob_choice: irrational
  chosen_spanish: irracional
  alternatives_spanish:
  - irrazonable
  - insensato
  lexicon: LSJ
  rationale: El adjetivo apunta a lo contrario de lo razonable o del juicio recto. «Irracional» conserva mejor la fuerza temática de la obra sobre la razón que alternativas más débiles como «irrazonable».
- source_word: πρὸς ἀλήθειαν
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - conforme a la verdad
  - verdaderamente
  lexicon: LSJ
  rationale: La expresión sugiere una vida orientada o conforme a la verdad. «En la verdad» mantiene esa orientación moral y filosófica con naturalidad en español.
- source_word: ζήσαντες
  english_pob_choice: after living
  chosen_spanish: después de haber vivido
  alternatives_spanish:
  - habiendo vivido
  - tras vivir
  lexicon: LSJ
  rationale: Es un participio aoristo que antecede al verbo principal; «después de haber vivido» deja clara la secuencia temporal sin perder fluidez.
- source_word: τὸν μέχρι γήρως βίον
  english_pob_choice: our life up to old age
  chosen_spanish: nuestra vida hasta la vejez
  alternatives_spanish:
  - nuestra vida hasta llegar a la vejez
  - el curso de nuestra vida hasta la vejez
  lexicon: LSJ
  rationale: La frase señala el tramo completo de la vida que llega a la vejez. «Nuestra vida hasta la vejez» es natural y conserva la amplitud temporal del griego.
- source_word: τὴν ἐπ’ αὐτῶν δόξαν
  english_pob_choice: the reputation based on it
  chosen_spanish: la reputación basada en ella
  alternatives_spanish:
  - la reputación fundada en ella
  - la honra basada en ella
  lexicon: LSJ
  rationale: Aquí δόξα es reputación o estima social, no gloria divina. «Basada en ella» reproduce bien la relación con la vida en la verdad mencionada antes.
- source_word: νομίμως
  english_pob_choice: lawfully
  chosen_spanish: legítimamente
  alternatives_spanish:
  - conforme a la ley
  - legalmente
  lexicon: LSJ
  rationale: El adverbio expresa conformidad con la ley o con la norma debida. «Legítimamente» suena más natural en español moderno y mantiene la dimensión normativa sin perder el matiz legal.
- source_word: φυλάσσοντες
  english_pob_choice: preserving
  chosen_spanish: preservado
  alternatives_spanish:
  - guardado
  - conservado
  lexicon: LSJ
  rationale: 'El participio indica mantener o custodiar algo ya poseído. En la construcción española funciona mejor con verbo compuesto: «haber preservado».'
- source_word: μεταβαλοίμεθα
  english_pob_choice: change course
  chosen_spanish: cambiáramos ahora de rumbo
  alternatives_spanish:
  - cambiáramos
  - nos desviáramos
  - alteráramos nuestra postura
  lexicon: LSJ
  rationale: El verbo implica cambio o alteración de posición; «cambiar de rumbo» expresa bien la reversión moral sugerida por el contexto sin exceder el sentido.
theological_decisions:
- issue: Tensión entre «gloria» y «reputación» para δόξα
  english_pob_reading: the reputation based on it
  chosen_spanish_reading: la reputación basada en ella
  alternative_spanish_readings:
  - la gloria basada en ella
  - la honra basada en ella
  rationale: En este pasaje δόξα no designa gloria divina sino estima pública o reputación. «Reputación» evita una lectura teológica impropia y sigue la decisión auditada del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: lexical transparency; deuterocanonical historical context'
- issue: Carga moral de ἄλογιστον en un libro centrado en la razón
  english_pob_reading: irrational
  chosen_spanish_reading: irracional
  alternative_spanish_readings:
  - insensato
  - irrazonable
  rationale: 4 Macabeos vincula fiel perseverancia con dominio racional. «Irracional» preserva mejor ese eje conceptual que equivalentes más generales.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, especialmente el ajuste de la frase temporal a una formulación más compacta y la claridad de 'based on it'; por eso se optó por una estructura española igualmente directa y sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «irracional» para ἄλογιστον en coherencia con el énfasis del libro en la razón.
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se traduce δόξα como «reputación», no como «gloria», porque el contexto es social y no doxológico.
  - Se conserva una sintaxis condicional clara y sobria para reflejar el razonamiento retórico del versículo.
