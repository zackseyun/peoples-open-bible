lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  lexicon: HALOT
  rationale: En contextos genealógicos, בְּנֵי puede abarcar descendientes, pero la forma fija «hijos de» reproduce mejor el estilo de Crónicas y mantiene el paralelismo genealógico sin añadir interpretación.
- source_word: יָוָן
  english_pob_choice: Javan
  chosen_spanish: Javan
  alternatives_spanish:
  - Grecia
  - los griegos
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera, no se interpreta como un topónimo o etnónimo general. Así se conserva el valor genealógico del hebreo.
- source_word: אֱלִישָׁה
  english_pob_choice: Elishah
  chosen_spanish: Elisa
  alternatives_spanish:
  - Elishah
  lexicon: HALOT
  rationale: Se conserva el nombre propio, pero en español se adapta la terminación a una forma más natural de lectura pública. El contexto no exige distinguir aquí entre formas inglesas del transliterado.
- source_word: תַּרְשִׁישָׁה
  english_pob_choice: Tarshish
  chosen_spanish: Tarshish
  alternatives_spanish:
  - Tarsis
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional del nombre propio. «Tarsis» sería una adaptación española posible, pero la forma 'Tarshish' preserva mejor la conexión con la auditoría inglesa y con la forma hebrea registrada.
- source_word: כִּתִּים
  english_pob_choice: Kittim
  chosen_spanish: Quitim
  alternatives_spanish:
  - Kittim
  - Chittim
  lexicon: HALOT
  rationale: Se elige una adaptación al español que refleje la pronunciación aproximada y la ortografía hispana. «Quitim» conserva la identidad del etnónimo mejor que una mera transliteración inglesa.
- source_word: וְרוֹדָנִים
  english_pob_choice: and Rodanim
  chosen_spanish: y Rodanim
  alternatives_spanish:
  - y Dodanim
  lexicon: HALOT
  rationale: El texto masorético de Crónicas lee רוֹדָנִים, por lo que se traduce «Rodanim» en el texto principal. Se preserva la forma conocida en la tradición textual y no se sustituye por la variante de Génesis.
theological_decisions:
- issue: Variante textual entre Crónicas y Génesis en el nombre final
  english_pob_reading: Genesis 10:4 reads “Dodanim” instead of “Rodanim,” reflecting a textual variation in the name.
  chosen_spanish_reading: Génesis 10:4 lee «Dodanim» en lugar de «Rodanim», reflejando una variante textual del nombre.
  alternative_spanish_readings:
  - Génesis 10:4 tiene «Dodanim» en vez de «Rodanim»
  - La forma de Génesis 10:4 es «Dodanim», mientras que Crónicas tiene «Rodanim»
  rationale: La lectura principal sigue al texto de Crónicas; sin embargo, la nota mantiene la variante paralela de Génesis, porque la diferencia entre dalet y resh es relevante para la crítica textual y para el lector que compara pasajes.
  doctrine_reference: Crítica textual / paralelos canónicos (Génesis 10:4; 1 Crónicas 1:7)
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa de alta concordancia: se sigue el texto masorético de 1 Crónicas 1:7, se conserva la variante textual en nota y no se requieren revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico breve y formular de Crónicas.
  - Se usa «Javan» como nombre propio sin interpretación geográfica.
  - «Quitim» se adapta al español, mientras «Rodanim» conserva la forma del nombre transmitida en Crónicas.
  - La nota textual está anclada solo en el nombre final, como en el audit trail inglés.
