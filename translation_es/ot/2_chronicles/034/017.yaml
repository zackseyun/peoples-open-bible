translation:
  language: es
  text: Han vaciado[a] la plata que fue hallada en la casa de Yahvé, y la han entregado en manos de los supervisores y en manos de los que realizaban la obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han vaciado la plata»; el verbo hebreo puede indicar sacar o distribuir el dinero, no necesariamente fundirlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּתִּיכוּ
  english_pob_choice: have emptied out
  chosen_spanish: han vaciado
  alternatives_spanish:
  - han vertido
  - han fundido
  - han desocupado
  lexicon: HALOT
  rationale: El verbo admite en contexto la idea de vaciar o sacar el dinero para su distribución. En español, «han vaciado» conserva bien la imagen de sacar el contenido y evita la lectura de metal fundido, que aquí no encaja con el contexto administrativo.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  lexicon: HALOT
  rationale: כֶּסֶף puede significar «plata» y por extensión «dinero». Aquí se trata de fondos del templo, así que «la plata» mantiene la forma concreta del hebreo y sigue siendo natural en español.
- source_word: הַנִּמְצָא
  english_pob_choice: that was found
  chosen_spanish: que fue hallada
  alternatives_spanish:
  - que había sido hallada
  - hallada
  lexicon: HALOT
  rationale: El participio pasivo señala lo que fue encontrado. «Que fue hallada» reproduce esa relación y concuerda con «la plata».
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahvé Dios
  lexicon: HALOT
  rationale: Se conserva la expresión «casa de Yahvé» para reflejar la fórmula hebrea y el uso del nombre divino según la política terminológica del proyecto. «Casa» evita sustituir de antemano por una explicación interpretativa como «templo».
- source_word: וַיִּתְּנֻהוּ
  english_pob_choice: have delivered it
  chosen_spanish: la han entregado
  alternatives_spanish:
  - la han dado
  - la han puesto
  lexicon: HALOT
  rationale: En este contexto de transferencia administrativa, «entregar» expresa mejor la acción de pasar fondos a otra autoridad que un simple «dar».
- source_word: עַל יַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en las manos de
  - bajo la responsabilidad de
  - a cargo de
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y se conserva con «en mano de», que suena bíblico y respeta la imagen de consignación o encargo.
- source_word: הַמֻּפְקָדִים
  english_pob_choice: the overseers
  chosen_spanish: los supervisores
  alternatives_spanish:
  - los encargados
  - los inspectores
  - los administradores
  lexicon: HALOT
  rationale: El participio pasivo apunta a quienes han sido puestos sobre la tarea. «Supervisores» comunica bien esa función sin perder el matiz de autoridad delegada.
- source_word: עוֹשֵׂי הַמְּלָאכָה
  english_pob_choice: those doing the work
  chosen_spanish: los que hacían la obra
  alternatives_spanish:
  - los que trabajaban
  - los obreros
  - los que realizaban el trabajo
  lexicon: HALOT
  rationale: «Obra» encaja mejor en un contexto de reparación del templo que un genérico «trabajo». «Los que hacían la obra» mantiene el sentido del participio y la referencia al proyecto en curso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. En español, la forma preferida del proyecto es «Yahvé», que preserva el nombre propio sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de «poured out» a «emptied out» y luego a «delivered», con ajuste del idiomático singular «into the hand of». La versión española sigue esa dirección revisada: usa un verbo de vaciar para וַיַּתִּיכוּ y un verbo de transferencia administrativa para וַיִּתְּנֻהוּ, conservando la imagen de consignación en mano de los encargados.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto.
  - 'Se conserva el orden de ideas del hebreo: vaciar la plata, luego entregarla a los supervisores y a los que hacían la obra.'
  - «En mano de» se usa deliberadamente para reflejar la locución hebrea, aunque en español corriente podría sonar más natural «a cargo de».
