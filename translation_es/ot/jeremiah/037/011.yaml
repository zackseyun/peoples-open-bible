translation:
  language: es
  text: Ahora bien, cuando el ejército de los caldeos[a] había salido[b] de Jerusalén por causa del ejército del faraón,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «caldeos» conserva el etnónimo del hebreo; en el contexto histórico se refiere a la fuerza imperial babilónica, pero la traducción mantiene el término fuente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «había subido». En contexto militar, la expresión alude a que el ejército levantó el sitio y se retiró por causa del ejército del faraón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Now ...
  chosen_spanish: Ahora bien, ...
  alternatives_spanish:
  - Y sucedió que ...
  - Entonces ...
  lexicon: HALOT
  rationale: La partícula narrativa introduce un nuevo desarrollo; en español, «Ahora bien» comunica transición discursiva con naturalidad sin caer en fórmula arcaica.
- source_word: בְּהֵעָלוֹת
  english_pob_choice: when ... had gone up
  chosen_spanish: había subido
  alternatives_spanish:
  - había salido
  - había ascendido
  - se había retirado
  lexicon: HALOT
  rationale: El infinitivo constructo de עלה con valor temporal se refleja de manera directa con «había subido». Aunque el contexto militar sugiere retirada, la decisión del POB en inglés fue conservar más de cerca el verbo fuente; en español se mantiene esa tensión sin suavizarla demasiado.
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - tropas
  lexicon: HALOT
  rationale: Aquí חֵיל designa una fuerza militar organizada; «ejército» es el equivalente más natural y preciso en español.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del hebreo como «caldeos», siguiendo la decisión del POB inglés de no sustituirlo por un equivalente contextual más interpretativo.
- source_word: מֵעַל יְרוּשָׁלִָם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - de encima de Jerusalén
  - de sobre Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «de sobre Jerusalén», en español una formulación literal suena forzada. «De Jerusalén» mantiene la dirección del movimiento y la escena de sitio sin perder inteligibilidad.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa del
  alternatives_spanish:
  - por
  - debido al
  lexicon: HALOT
  rationale: La preposición expresa motivo causal; «a causa del» comunica con claridad que el movimiento ocurrió por la presión del ejército del faraón.
- source_word: חֵיל פַּרְעֹה
  english_pob_choice: Pharaoh’s army
  chosen_spanish: el ejército del faraón
  alternatives_spanish:
  - el ejército de Faraón
  lexicon: HALOT
  rationale: La relación constructa se vierte de forma natural en español con posesión analítica. Se prefirió «faraón» en minúscula por tratarse del título egipcio, no de un nombre propio aquí.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB en inglés: se optó por una formulación que conserva el verbo de movimiento de עלה más directamente que «retirado», sin perder el sentido contextual de levantamiento del sitio. Se mantuvo también la estructura temporal inicial y la causalidad final.'
  spanish_consistency_notes:
  - Se usó «caldeos» para el etnónimo, en consonancia con la política POB de preservar el término fuente cuando no hay razón explícita para sustituirlo por «babilonios».
  - «Faraón» se conservó como título histórico propio de la referencia, con artículo posesivo analítico en español.
  - La frase conserva la tensión entre literalidad verbal («había subido») y sentido contextual de retirada militar, sin explicitarla en el cuerpo principal más allá de la nota.
  - La puntuación sigue el flujo narrativo de una cláusula temporal inicial seguida de la causa final, adecuada para lectura bíblica en español.
