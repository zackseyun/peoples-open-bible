translation:
  language: es
  text: El documento que ustedes nos enviaron ha sido leído claramente ante mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La carta que ustedes nos enviaron ha sido leída claramente ante mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁתְּוָנָא
  english_pob_choice: the document
  chosen_spanish: el documento
  alternatives_spanish:
  - la carta
  - el escrito oficial
  lexicon: HALOT
  rationale: En el contexto administrativo imperial, el arameo se refiere a una comunicación escrita formal. «Documento» conserva esa amplitud y la carga oficial mejor que «carta», que en español es más estrecho.
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Introducción de una relativa que modifica «documento». En español, «que» es la forma natural y fiel al vínculo sintáctico.
- source_word: שְׁלַחְתּוּן
  english_pob_choice: you sent
  chosen_spanish: ustedes nos enviaron
  alternatives_spanish:
  - ustedes nos han enviado
  - ustedes enviaron
  lexicon: HALOT
  rationale: El perfecto arameo se vierte naturalmente como pasado simple en español. «Nos enviaron» refleja el hecho cumplido sin forzar una aspectualidad ajena al español.
- source_word: עֲלֶינָא
  english_pob_choice: to us
  chosen_spanish: a nosotros / nos
  alternatives_spanish:
  - contra nosotros
  - sobre nosotros
  lexicon: HALOT
  rationale: En este contexto epistolar-cortesano, la preposición expresa destino del envío, no hostilidad. El clítico «nos» preserva la naturalidad española sin perder el valor de destinatario.
- source_word: מְפָרַשׁ
  english_pob_choice: plainly
  chosen_spanish: claramente
  alternatives_spanish:
  - distintamente
  - explícitamente
  lexicon: HALOT
  rationale: El participio/adverbio expresa claridad en la lectura o en la exposición del contenido. «Claramente» comunica bien esa claridad sin decidir de más entre «traducido» o «explicado».
- source_word: קֱרִי
  english_pob_choice: has been read
  chosen_spanish: ha sido leído
  alternatives_spanish:
  - fue leído
  - ha sido proclamado
  lexicon: HALOT
  rationale: La pasiva encaja de forma natural en español con «ha sido leído». Mantiene el énfasis en la acción completada y en la respuesta inmediata del rey.
- source_word: קָדָמָי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: Fórmula cortesana estándar para una acción realizada ante el rey. «Delante de mí» es transparente y suena natural en español contemporáneo reverente.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el sentido del arameo y el audit trail inglés: se conservó la referencia al escrito como comunicación oficial, la pasiva de «ha sido leído» y el adverbio de claridad, evitando sobreinterpretar si la claridad se refiere a la lectura, a la traducción o a la explicación.'
  spanish_consistency_notes:
  - Se usó «ustedes» para el plural de segunda persona, acorde con el destinatario implícito del arameo y con un español reverente y claro.
  - Se prefirió «documento» en el texto principal, manteniendo la alternativa «carta» en nota porque el término arameo admite ambas posibilidades según el registro administrativo.
  - «Delante de mí» preserva la fórmula de corte sin introducir una equivalencia demasiado interpretativa.
