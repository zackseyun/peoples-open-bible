review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Jehoiadá colocó a los encargados de las puertas en las puertas de la casa de Yahvé, con el propósito de impedir la entrada de cualquier persona ritualmente impura. Sin embargo, «a la entrada de las puertas» es redundante y menos fiel a עַל שַׁעֲרֵי, que se expresa mejor como «en las puertas» o «junto a las puertas». Además, la nota al pie actual sobre «la casa de Yahvé» no preserva la alternativa significativa documentada en el POB inglés para לְכָל דָּבָר.'
  spanish_quality_summary: El español es en general claro, pero «a la entrada de las puertas» suena torpe y poco natural. «Puso a los porteros en las puertas» es más idiomático y preciso. «Ningún impuro en manera alguna» se entiende, pero «ninguno ritualmente impuro por ninguna causa» o «ninguno impuro por nada» sería demasiado pesado; conviene mantener una redacción fluida en el texto principal y trasladar la literalidad a una nota. También debe eliminarse la nota innecesaria sobre «la casa de Yahvé», ya que el texto principal ya lo expresa claramente.
  glossary_alignment: 'Alineación general buena: «Yahvé» sigue la política del proyecto; «casa de Yahvé» conserva בֵּית יְהוָה; «porteros» es aceptable para הַשּׁוֹעֲרִים en contexto cultual. «Impuro» es una opción válida y moderna para טָמֵא. La principal mejora es reflejar mejor el modismo לְכָל דָּבָר mediante una nota léxica, como hace el POB inglés.'
  issues:
  - severity: medium
    issue: «a la entrada de las puertas» traduce de forma torpe עַל שַׁעֲרֵי
    rationale: El hebreo indica ubicación en/ante las puertas, no literalmente «la entrada de las puertas». La frase española resulta redundante y menos natural.
  - severity: medium
    issue: La nota al pie actual no corresponde a una alternativa significativa
    rationale: 'Anotar «Literalmente: “la casa de Yahvé”» no aporta información útil porque eso ya está en el texto principal. La nota necesaria en el expediente inglés explica el modismo לְכָל דָּבָר.'
  - severity: low
    issue: La amplitud idiomática de לְכָל דָּבָר no queda documentada en español
    rationale: «En manera alguna» comunica bien el sentido amplio, pero conviene preservar la alternativa más literal en nota para transparencia exegética.
  revised_spanish_text: Puso a los porteros en las puertas de la casa de Yahvé, para que no entrara ningún impuro[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, «ningún impuro por ninguna cosa entrará», un modismo que significa que no debía entrar nadie impuro en ningún sentido o por ninguna causa de impureza.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase de ubicación para que suene natural y refleje mejor עַל שַׁעֲרֵי; se elimina una nota redundante; y se añade una nota útil que preserva la literalidad y el valor idiomático de לְכָל דָּבָר, en línea con el expediente inglés.
