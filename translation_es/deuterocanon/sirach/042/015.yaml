translation:
  language: es
  text: Ahora recordaré las obras de Dios[a], y lo que he visto lo relataré. En la palabra de Dios está su voluntad, y su obra realiza su beneplácito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Recordaré las obras del Señor, y lo que he visto lo relataré; en las palabras del Señor están sus obras». El final hebreo es difícil, por lo que el texto principal sigue el sentido probable del testimonio hebreo y deja constancia de la lectura griega alternativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: אזכור נא
  english_pob_choice: Now I will remember
  chosen_spanish: Ahora recordaré
  alternatives_spanish:
  - Permítaseme ahora recordar
  - Ciertamente recordaré ahora
  lexicon: HALOT
  rationale: נא funciona mejor aquí como marcador discursivo de transición que como ruego; «Ahora recordaré» conserva la fluidez de apertura y el tono poético del pasaje.
- source_word: מעשי אל
  english_pob_choice: the works of God
  chosen_spanish: las obras de Dios
  alternatives_spanish:
  - las obras de Dios
  - los hechos de Dios
  lexicon: HALOT
  rationale: מעשים abarca obras/hechos. «Obras» es natural en español bíblico y mantiene el registro doxológico del contexto.
- source_word: וזה חזיתי ואספרה
  english_pob_choice: and what I have seen I will recount
  chosen_spanish: y lo que he visto lo relataré
  alternatives_spanish:
  - y esto he visto y lo contaré
  - y lo que he visto lo declararé
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida; «lo que he visto» refleja bien el relativo implícito que también sugiere el paralelo griego, y «relataré» conserva el acto de narrar sin exceso interpretativo.
- source_word: באומר אלהים
  english_pob_choice: At the word of God
  chosen_spanish: A la palabra de Dios
  alternatives_spanish:
  - Al hablar de Dios
  - Por la palabra de Dios
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil, pero el paralelo griego apoya una referencia al habla/palabra divina. «A la palabra de Dios» conserva el valor instrumental/orientado del sintagma sin forzar una explicación adicional.
- source_word: רצונו
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su querer
  - lo que él quiere
  lexicon: HALOT
  rationale: רצון suele significar voluntad, favor o agrado. «Voluntad» es la equivalencia más directa y sobria en español.
- source_word: ופועל רצונו לקחו
  english_pob_choice: and his work accomplishes his pleasure
  chosen_spanish: y su obra realiza su beneplácito
  alternatives_spanish:
  - y su obra cumple su voluntad
  - y su obra ejecuta su querer
  lexicon: HALOT
  rationale: El final hebreo es textualmente difícil; «realiza su beneplácito» preserva el campo semántico de רצון como agrado/beneplácito y mantiene una formulación reverente sin afirmar más de lo que la transmisión permite.
theological_decisions:
- issue: Divine title in the Hebrew/Greek tension (אל / Κυρίου)
  english_pob_reading: God in the Hebrew-led main text, with a footnoted Greek parallel to 'the Lord'
  chosen_spanish_reading: Dios en el texto principal hebreo, con nota sobre el paralelo griego «el Señor»
  alternative_spanish_readings:
  - el Señor
  rationale: Como el testimonio principal aquí es hebreo y lee אל, el texto principal usa «Dios». La variante griega Κυρίου se preserva en nota para no borrar la tensión textual entre los testigos.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo cuando se conserva; DOCTRINE.md: tratar con honestidad los títulos divinos en variantes textuales'
- issue: Tratamiento del colon final difícil y parcialmente incierto
  english_pob_reading: and his work accomplishes his pleasure
  chosen_spanish_reading: y su obra realiza su beneplácito
  alternative_spanish_readings:
  - y su obra cumple su voluntad
  - y su obra ejecuta su querer
  - una versión más literal pero oscura del final
  rationale: El hebreo final es problemático; la traducción busca un equivalente claro y digno en español sin fingir una precisión que los testigos no garantizan. Se mantiene la tensión semántica entre voluntad/agrado en רצון.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión textual y teológica; PHILOSOPHY.md: honestidad frente a la incertidumbre de la fuente'
translation_notes:
  revision_awareness: La redacción sigue el criterio revisado de «At the word of God» del audit trail inglés, pero lo adapta al español como «A la palabra de Dios» por naturalidad y por mantener el valor instrumental/orientado del hebreo. También conserva la decisión de no sobreprecisar el final difícil, expresándolo como una afirmación general sobre la acción divina y su voluntad.
  spanish_consistency_notes:
  - Se emplea «Dios» en el texto principal conforme al hebreo conservado, y la nota recoge el paralelo griego con «el Señor» sin desplazar el texto base.
  - Se prefirió «obra/obras» para מעשים, coherente con el registro sapiencial y litúrgico del pasaje.
  - «Beneplácito» se usa solo en el final difícil para reflejar רצון en su posible matiz de agrado; no se fuerza en otros contextos.
  - La construcción «lo que he visto lo relataré» evita añadir sujetos o conectores no presentes en la fuente.
  - La nota usa un marcador único y enlaza con el punto textual realmente incierto, sin ampliar innecesariamente el aparato crítico.
