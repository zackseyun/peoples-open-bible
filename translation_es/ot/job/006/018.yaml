- from: Los senderos de su camino se desvían[a]; suben por la desolación y perecen.
  to: Los senderos de su camino se desvían[a]; suben al yermo y perecen.
  rationale: Se ajusta «por la desolación» a «al yermo» para reflejar mejor el movimiento direccional y el sentido de תֹהוּ en contexto. Se mejora la nota al pie para que sea natural en español y más fiel a las alternativas registradas en la auditoría inglesa, preservando la ambigüedad entre senderos/cauces y caravanas.
