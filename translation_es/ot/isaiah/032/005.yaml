translation:
  language: es
  text: Ya no se llamará noble al necio[a][b], ni se llamará generoso al ruin[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre indigno» para נָבָל; el término hebreo subraya bajeza moral además de necedad.
    reason: lexical_alternative
  - marker: b
    text: O «principesco» o «generoso» para נָדִיב.
    reason: lexical_alternative
  - marker: c
    text: O «avaro» o «mezquino» para כִּילַי.
    reason: lexical_alternative
  - marker: d
    text: O «noble», «rico» o «importante» para שׁוֹעַ.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִקָּרֵא עוֹד
  english_pob_choice: No longer will ... be called
  chosen_spanish: No se volverá a llamar
  alternatives_spanish:
  - Ya no se llamará
  - No será llamado más
  lexicon: HALOT
  rationale: El hebreo usa una pasiva verbal con לֹא + עוֹד para indicar cesación; en español, «no se volverá a llamar» comunica bien la idea de que esa designación ya no ocurrirá, con un tono formal y natural.
- source_word: נָבָל
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el hombre vil
  - el indigno
  lexicon: HALOT
  rationale: En este contexto, נָבָל no es solo falta de inteligencia, sino torpeza moral o bajeza. «Necio» conserva una carga ética fuerte y suena natural en español bíblico; «insensato» sería una alternativa más débil en tono moral.
- source_word: נָדִיב
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - príncipe
  - generoso
  - de linaje noble
  lexicon: HALOT
  rationale: La voz hebrea puede señalar nobleza, condición honorable o generosidad. Dado que el verso trata de títulos o designaciones sociales falsas, «noble» es la opción más directa y paralela a la primera cláusula.
- source_word: וּ/לְ/כִילַי
  english_pob_choice: the scoundrel
  chosen_spanish: el avaro
  alternatives_spanish:
  - el miserable
  - el mezquino
  - el ruin
  lexicon: HALOT
  rationale: כִּילַי apunta a una persona mezquina o codiciosa, con matiz de tacañería moral. «Avaro» recoge bien ese campo semántico en español, aunque deja abierta la dimensión de bajeza moral presente en el término hebreo.
- source_word: שׁוֹעַ
  english_pob_choice: generous
  chosen_spanish: generoso
  alternatives_spanish:
  - noble
  - rico
  - importante
  lexicon: HALOT
  rationale: שׁוֹעַ puede referirse a alguien de posición, riqueza o nobleza, pero en contraste con כִּילַי la equivalencia más clara en español es «generoso». Así se preserva la antítesis ética-social que la traducción inglesa también destacó.
- source_word: יִקָּרֵא
  english_pob_choice: will be called
  chosen_spanish: se llamará
  alternatives_spanish:
  - será llamado
  - será designado
  lexicon: HALOT
  rationale: El nifal de קרא expresa designación por nombre o título. «Se llamará» mantiene la pasiva y la brevedad del hebreo, y funciona bien en el paralelismo de la cláusula.
- source_word: יֵאָמֵר
  english_pob_choice: will be called
  chosen_spanish: se llamará
  alternatives_spanish:
  - será dicho
  - se dirá de
  lexicon: HALOT
  rationale: Aunque el verbo es אמר, aquí también funciona en pasiva impersonal de designación. Repetir «se llamará» reproduce el paralelismo formal del hebreo y sigue la revisión inglesa que prefirió «be called» por encima de una paráfrasis más libre.
theological_decisions:
- issue: Tipo de contraste en el verso
  english_pob_reading: A social-moral reversal in which people are no longer misidentified with honorable titles.
  chosen_spanish_reading: 'Un vuelco social y moral: ya no se otorgarán títulos honorables a personas moralmente torcidas.'
  alternative_spanish_readings:
  - Una afirmación principalmente escatológica sobre la era mesiánica
  - Un proverbio general sobre el lenguaje verdadero
  rationale: El hebreo habla directamente de nombrar o designar a personas con títulos que no les corresponden. La traducción española conserva ese alcance sin imponer una interpretación escatológica explícita, aunque el contexto mayor pueda sugerirla.
  doctrine_reference: Conservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió una paráfrasis de 'be spoken of as' a 'be called' para ajustarse mejor al paralelismo hebreo. La traducción española sigue esa revisión con un pasivo directo y breve («se llamará»), evitando expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto, aunque este versículo no contiene el tetragrámaton.
  - «Necio» y «avaro» conservan la tensión moral del hebreo sin volverla meramente psicológica o económica.
  - El paralelismo verbal se preserva con la repetición de «se llamará» en ambas mitades del verso.
  - Las notas al pie distinguen entre la opción elegida y alternativas semánticas reales del hebreo, sin sobrecargar el texto principal.
