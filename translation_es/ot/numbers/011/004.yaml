translation:
  language: es
  text: 'Ahora el populacho[a] que estaba entre ellos[b] sintió un deseo intenso[c], y también los hijos de Israel se volvieron y lloraron, y dijeron: «¿Quién nos dará de comer[d] carne?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la multitud mezclada». El hebreo es raro y despectivo, y se refiere a un grupo no principal dentro de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «en medio de ellos». La expresión hebrea indica ubicación dentro del grupo o campamento.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «desearon un deseo», una construcción enfática que intensifica el anhelo.
    reason: lexical_alternative
  - marker: d
    text: O «¿Quién nos alimentará con carne?»
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָסַפְסֻף
  english_pob_choice: the rabble
  chosen_spanish: el populacho
  alternatives_spanish:
  - la chusma
  - la multitud mezclada
  - el rabble
  lexicon: HALOT
  rationale: אָסַפְסֻף es un sustantivo raro y despectivo para una masa no principal dentro de Israel. «Populacho» comunica el tono peyorativo y el carácter colectivo de forma natural en español, sin suavizarlo a un término neutral.
- source_word: אֲשֶׁר בְּקִרְבּוֹ
  english_pob_choice: among them
  chosen_spanish: que estaba entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su interior
  - que estaba en su midst
  lexicon: HALOT
  rationale: La frase señala ubicación relacional dentro del campamento o del grupo. «Que estaba entre ellos» conserva esa relación sin forzar la tensión singular/plural del hebreo.
- source_word: הִתְאַוּוּ תַּאֲוָה
  english_pob_choice: had a strong craving
  chosen_spanish: tuvo un gran deseo
  alternatives_spanish:
  - anhelaron con intensidad
  - sintieron un deseo vehemente
  - codiciaron intensamente
  lexicon: HALOT
  rationale: El hebreo usa un verbo con un sustantivo cognado para intensificar el deseo. En español, «tuvo un gran deseo» transmite la fuerza del impulso sin caer en una calca torpe; mantengo la intensidad, aunque no reproduzco el cognado de manera artificial.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron a hacerlo
  - regresaron
  - volvieron
  lexicon: HALOT
  rationale: Aquí שׁוּב tiene el valor de reanudar o volver a una actitud/acción. «Se volvieron» permite conservar el movimiento verbal y encaja bien con el contexto de lamentación renovada.
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - lloraron amargamente
  - se pusieron a llorar
  - sollozaron
  lexicon: HALOT
  rationale: בכה se expresa de modo directo con «lloraron». Es claro, sobrio y fiel al registro narrativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filiar del hebreo, que el inglés POB también preserva en su decisión base. «Los hijos de Israel» es reconocible y transparente en un texto bíblico.
- source_word: מִי יַאֲכִלֵנוּ בָּשָׂר
  english_pob_choice: Who will feed us meat?
  chosen_spanish: ¿Quién nos dará carne?
  alternatives_spanish:
  - ¿Quién nos alimentará con carne?
  - ¿Quién nos dará de comer carne?
  - ¿Quién hará que comamos carne?
  lexicon: HALOT
  rationale: El hiphil de אכל puede significar causar a comer o alimentar. En español, «¿Quién nos dará carne?» es natural y fiel al sentido de provisión pedido, mientras que «carne» conserva el valor alimentario de בשר sin introducir una paráfrasis excesiva.
theological_decisions:
- issue: Valor despectivo y social de הָאָסַפְסֻף
  english_pob_reading: the rabble / mixed multitude; a rare pejorative collective noun for a non-core crowd within Israel
  chosen_spanish_reading: el populacho
  alternative_spanish_readings:
  - la multitud mezclada
  - la chusma
  rationale: No conviene neutralizar el término. «Populacho» conserva la carga social negativa y la idea de grupo heterogéneo/marginal dentro del campamento, sin imponer una tradición eclesiástica que borre la aspereza del hebreo.
  doctrine_reference: Lexical transparency; narrative characterization in Numbers 11:4
- issue: Construcción intensiva de deseo
  english_pob_reading: had a strong craving; Hebrew 'craved a craving,' an emphatic cognate expression for intense desire
  chosen_spanish_reading: tuvo un gran deseo
  alternative_spanish_readings:
  - deseó intensamente
  - sintió un deseo vehemente
  rationale: El POB inglés revisado optó por una formulación más natural, pero la nota auditada reconoce la intensidad del hebreo. En español, «tuvo un gran deseo» comunica esa fuerza sin obligar al lector a una calca poco idiomática. No se pierde la intensidad, solo se expresa con naturalidad.
  doctrine_reference: Hebrew idiom and narrative emphasis
- issue: Identidad colectiva de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel also / the Israelites also
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  rationale: Se mantiene la expresión hebrea visible porque es una designación étnica estable en el texto fuente. Aunque «los israelitas» sería más fluido, «los hijos de Israel» conserva mejor la forma del original y su resonancia bíblica.
  doctrine_reference: Ethnic/covenant designation in the Hebrew narrative
- issue: Sentido de meat/flesh en בָּשָׂר
  english_pob_reading: meat
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - carne para comer
  - carne como alimento
  rationale: Aquí בשר designa alimento animal, no una idea teológica de «carne». «Carne» es el equivalente básico y natural en español; no hace falta añadir explicaciones al cuerpo del versículo.
  doctrine_reference: Lexical sense of בשר as food
translation_notes:
  revision_awareness: 'El inglés POB revisó su primera redacción más literal (''craved a craving'') hacia ''had a strong craving'' por naturalidad y precisión. Esta propuesta española sigue ese mismo ajuste: evita una calca dura, conserva la intensidad del hebreo y mantiene el resto de la cláusula estrechamente alineado con el texto fuente y con el audit trail.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - 'Se conservan traducciones sobrias y bíblicas: «carne», «lloraron», «hijos de Israel».'
  - No se reemplaza el matiz peyorativo de הָאָסַפְסֻף por un término neutral.
  - Las notas a pie distinguen claramente entre alternativas léxicas y observaciones sobre el hebreo enfático.
