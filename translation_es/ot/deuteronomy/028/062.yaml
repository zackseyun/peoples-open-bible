review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: juicio que deja al pueblo en pequeño número, contraste con la multiplicación previa, y causa pactal por no escuchar la voz de Yahvé. También respeta el singular colectivo final y el nombre divino Yahvé. Sin embargo, introduce una discordancia importante de número/persona al pasar a singular en la primera cláusula (''quedarás'') y en la subordinada (''habías llegado a ser''), donde el hebreo tiene plural; solo la cláusula final cambia a singular. Además, ''reducido a muy pocos'' añade un matiz de reducción explícita que no está directamente en וְנִשְׁאַרְתֶּם, cuyo foco es ''ser dejado/quedar''.'
  spanish_quality_summary: 'El español es legible y digno, pero la alternancia de número está mal distribuida: debe mantenerse plural en la primera mitad del versículo y singular colectivo solo en la cláusula final, para reflejar el hebreo y evitar incoherencia interna. ''Quedarán pocos en número'' o ''quedaréis pocos en número'' suena más fiel que ''quedarás reducido a muy pocos''. También conviene ajustar la nota a para explicar el modismo hebreo sin glosar una frase española que ya no sería la mejor opción.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé', 'Dios', y en mantener 'escuchar la voz' en vez de aplanarlo a 'obedecer'. No hay conflicto con otros términos doctrinales. La principal corrección es gramatical y de fidelidad a la distribución hebrea de plural/singular.
  issues:
  - severity: high
    issue: Cambio indebido a singular en la primera cláusula
    rationale: וְנִשְׁאַרְתֶּם y הֱיִיתֶם son formas plurales; el borrador usa 'quedarás' y 'habías llegado', creando una alteración del patrón retórico del hebreo. El singular debe reservarse para לֹא שָׁמַעְתָּ al final.
  - severity: medium
    issue: '''Reducido a muy pocos'' sobreinterpreta el verbo principal'
    rationale: נשאר expresa 'ser dejado/quedar' como remanente; 'reducido' añade más explícitamente la idea del proceso de disminución que ya se infiere del contexto, pero no es el verbo principal.
  - severity: low
    issue: La nota a depende de una formulación española menos recomendable
    rationale: La nota explica bien el modismo מתי מעט, pero conviene anclarla a 'pocos en número' y no a 'quedarás reducido a muy pocos', que debería revisarse.
  revised_spanish_text: Y quedaréis pocos en número[a], aunque habíais llegado a ser como las estrellas de los cielos en multitud[b], porque no escuchaste[c] la voz de Yahvé tu Dios.
  revised_footnotes:
