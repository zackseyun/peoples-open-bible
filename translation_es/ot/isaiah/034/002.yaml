translation:
  language: es
  text: Porque Yahvé tiene indignación contra todas las naciones, y furor contra toda su hueste[a]; los ha destinado a la destrucción[b]; los ha entregado a la matanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «su hueste» también puede traducirse «sus ejércitos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «los ha puesto bajo anatema»; el verbo hebreo lleva la idea de dedicar algo a destrucción bajo juicio divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del anuncio previo. «Porque» conserva la fuerza explicativa de manera natural en español.
- source_word: קֶצֶף
  english_pob_choice: indignation
  chosen_spanish: indignación
  alternatives_spanish:
  - ira
  - furor
  - enojo
  lexicon: HALOT
  rationale: El término expresa enojo divino en sentido judicial. «Indignación» distingue este primer sustantivo de חֵמָה, como en la audición inglesa.
- source_word: לַיהוָה
  english_pob_choice: the LORD has
  chosen_spanish: Yahvé tiene
  alternatives_spanish:
  - Yahvé guarda
  - Yahvé muestra
  lexicon: HALOT
  rationale: El hebreo presenta una construcción nominal; en español se expresa con verbo de posesión/estado. Se conserva el nombre divino como «Yahvé» conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término normalizado del proyecto en español para el Tetragrámaton, manteniendo el nombre propio y no sustituyéndolo por un título.
- source_word: עַל כָּל הַגּוֹיִם
  english_pob_choice: against all the nations
  chosen_spanish: contra todas las naciones
  alternatives_spanish:
  - sobre todas las naciones
  - contra todos los pueblos
  lexicon: HALOT
  rationale: Con lenguaje de ira/juicio, עַל se vierte naturalmente «contra». «Naciones» conserva el alcance amplio de גּוֹיִם.
- source_word: וְחֵמָה
  english_pob_choice: and wrath
  chosen_spanish: y furor
  alternatives_spanish:
  - y ira
  - y cólera
  lexicon: HALOT
  rationale: Para no duplicar «indignación», aquí se elige «furor», que transmite la intensidad ardiente del término hebreo y mantiene la distinción semántica.
- source_word: צְבָאָם
  english_pob_choice: their host
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - todo su host
  - toda su hueste
  lexicon: HALOT
  rationale: צָבָא puede significar ejército/hueste/host. «Ejército» es claro en español y preserva el matiz militar; el singular colectivo del hebreo queda reflejado en «todo su».
- source_word: הֶחֱרִימָם
  english_pob_choice: he has devoted them to destruction
  chosen_spanish: los ha consagrado a la destrucción
  alternatives_spanish:
  - los ha dedicado a la destrucción
  - los ha puesto bajo anatema
  lexicon: HALOT
  rationale: Se conserva el sentido de חרם como entrega solemne a destrucción bajo juicio divino. «Consagrado» refleja la idea de apartar para una finalidad sagrada/judicial, evitando una paráfrasis demasiado libre.
- source_word: נְתָנָם
  english_pob_choice: he has given them over
  chosen_spanish: los ha entregado
  alternatives_spanish:
  - los ha dado
  - los ha entregado en manos
  lexicon: HALOT
  rationale: נתן en contexto judicial expresa entrega o dejamiento para un fin. «Los ha entregado» comunica bien la acción de ponerlos a merced de la muerte.
- source_word: לַטָּבַח
  english_pob_choice: to the slaughter
  chosen_spanish: al degüello
  alternatives_spanish:
  - a la matanza
  - al sacrificio
  lexicon: HALOT
  rationale: טֶבַח significa matanza/slaughter. «Degüello» reproduce con fuerza el carácter violento de la imagen y mantiene el sentido de muerte infligida.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español se adopta la forma estable del proyecto, «Yahvé», para preservar el nombre personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido judicial de הֶחֱרִימָם
  english_pob_reading: he has devoted them to destruction
  chosen_spanish_reading: los ha consagrado a la destrucción
  alternative_spanish_readings:
  - los ha destruido totalmente
  - los ha puesto bajo el ban
  rationale: La raíz חרם en hifil implica apartar para destrucción bajo juicio divino. «Consagrado a la destrucción» conserva tanto la idea de dedicación como la de sentencia, sin perder la tensión teológica del ḥerem.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
- issue: Distinción entre קֶצֶף y חֵמָה
  english_pob_reading: indignation ... and wrath
  chosen_spanish_reading: indignación ... y furor
  alternative_spanish_readings:
  - ira ... y cólera
  - enojo ... y furor
  rationale: Se mantienen dos términos distintos en español para reflejar que el hebreo acumula dos sustantivos de ira con matiz propio. «Indignación» y «furor» conservan la progresión retórica y judicial.
  doctrine_reference: HALOT + source-context lexical distinction
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la auditoría inglesa es alto. Esta redacción sigue ese estado estable, conservando las dos distinciones léxicas clave: קֶצֶף/חֵמָה y הֶחֱרִימָם/נְתָנָם.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene la distinción «indignación» / «furor» para no fusionar dos términos hebreos distintos.
  - «Ejército» traduce צְבָא con claridad natural en español, sin perder el matiz colectivo.
  - «Consagrado a la destrucción» busca reflejar la fuerza de חרם sin neutralizar su contenido de juicio.
  - «Degüello» conserva la imagen violenta de טֶבַח con mayor intensidad que «matanza».
