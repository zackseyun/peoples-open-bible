translation:
  language: es
  text: Pero los hijos de Israel no expulsaron[a] a los gesuritas ni a los maacatitas, y Gesur y Maacat habitan en medio de Israel hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Expulsaron’ traduce aquí la fuerza causal del hebreo הוֹרִישׁוּ; también puede entenderse como ‘desposeyeron’, con un matiz más jurídico sobre la pérdida de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁוּ
  english_pob_choice: did not drive out
  chosen_spanish: no expulsaron
  alternatives_spanish:
  - no desposeyeron
  - no echaron fuera
  lexicon: HALOT
  rationale: El hifil de ירשׁ aquí expresa causar que otros salgan o sean removidos de la posesión de la tierra. En español, 'expulsaron' comunica con naturalidad esa fuerza de remoción territorial sin volver el texto demasiado técnico. 'Desposeyeron' preserva más el matiz jurídico, pero suena más marcado; 'echaron fuera' es posible, pero menos preciso en el contexto de conquista.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica del hebreo. 'Hijos de Israel' refleja con fidelidad la forma original y mantiene la lectura inclusiva del grupo, mientras que 'israelitas' suaviza el vínculo léxico con el hebreo.
- source_word: הַגְּשׁוּרִי
  english_pob_choice: the Geshurites
  chosen_spanish: los guesuritas
  alternatives_spanish:
  - los gesuritas
  - el pueblo guesurita
  lexicon: HALOT
  rationale: Se elige una transliteración castellanizada para el gentilicio colectivo. 'Guesuritas' conserva mejor la pronunciación aproximada del hebreo y resulta legible en español bíblico; 'gesuritas' también sería posible, pero menos transparente para la vocal inicial con guímel.
- source_word: הַמַּעֲכָתִי
  english_pob_choice: the Maacathites
  chosen_spanish: los maacatitas
  alternatives_spanish:
  - los maacatitas
  - el pueblo maacatita
  lexicon: HALOT
  rationale: Como en el término anterior, se mantiene el gentilicio colectivo con transliteración española. 'Maacatitas' reproduce de manera clara el nombre étnico y evita un giro explicativo innecesario.
- source_word: וַיֵּשֶׁב
  english_pob_choice: dwell
  chosen_spanish: habitan
  alternatives_spanish:
  - habitan
  - habitaron
  - se establecen
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es wayyiqtol, el contexto y la traducción inglesa revisada señalan un efecto de estado vigente 'hasta este día'. En español, 'habitan' expresa bien esa residencia presente-resultativa sin forzar un pasado simple que debilitaría el sentido contextual.
- source_word: גְּשׁוּר וּמַעֲכָת
  english_pob_choice: Geshur and Maacath
  chosen_spanish: Guesur y Maacat
  alternatives_spanish:
  - Guesur y Maacat
  - Guesur y Maacat, los dos territorios
  lexicon: HALOT
  rationale: Se retienen los nombres propios como en el hebreo, funcionando metonímicamente por sus poblaciones. La forma castellanizada ayuda a la fluidez y a la lectura pública, sin añadir explicaciones que el texto no exige.
- source_word: בְּקֶרֶב יִשְׂרָאֵל
  english_pob_choice: among Israel
  chosen_spanish: entre Israel
  alternatives_spanish:
  - en medio de Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: '''Entre Israel'' conserva la idea de presencia en el seno del pueblo o de su territorio con una formulación natural en español. ''En medio de Israel'' es más literal, pero algo más pesada; ''dentro de Israel'' puede sonar demasiado territorial y menos relacional.'
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Se mantiene la fórmula temporal tradicional y transparente. 'Hasta este día' sigue de cerca el hebreo y es plenamente comprensible en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La base inglesa pasó de 'lived' a 'dwell' en una revisión para reflejar mejor el valor de estado vigente del wayyiqtol en este contexto. La versión española sigue esa decisión con 'habitan', evitando un pretérito que debilitaría la permanencia indicada por 'hasta este día'. No hay otros cambios relevantes en la línea revisada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa una transliteración castellanizada de los etnónimos para preservar claridad y continuidad con la práctica bíblica en español.
  - 'La relación entre el verbo de remoción (''expulsaron'') y la residencia continuada (''habitan'') conserva la tensión narrativa del texto: Israel no removió plenamente a esos pueblos, y estos permanecieron en medio de Israel.'
