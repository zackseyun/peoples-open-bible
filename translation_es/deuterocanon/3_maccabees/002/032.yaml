  yaml_path: translation/deuterocanon/3_maccabees/002/032.yaml
  text: But most of them[a], strengthening themselves with noble courage, did not depart from piety by exchanging their possessions for life[b], but boldly considered themselves able to save themselves from the registration lists.
  footnotes:
