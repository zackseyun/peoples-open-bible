    text: 'O: «esta misma noche».'
    reason: lexical_alternative
  - marker: b
    text: «Visitará» puede implicar también intervención activa o cuidado, no solo una visita en sentido ordinario.
    reason: lexical_alternative
  revision_rationale: Se reemplazó el voseo plural peninsular por formas neutrales («ustedes», «dijeron», «entregarían») para ajustarse al español meta del proyecto. Se suavizó el calco temporal a «dentro de los días tras los cuales», que conserva la secuencia del griego pero lee mejor en español. Se mantuvo «mi sierva», «visitará» y «por mi mano» por fidelidad léxica y tono bíblico. Se conservó «el Señor» por depender aquí de κύριος en la fuente griega y del criterio documentado en el audit trail inglés.
