base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/010/005.yaml
  text: She also[a], when the nations were thrown into confusion in their wicked conspiracy, found the righteous man and kept him blameless before God[c][b], and kept him strong against his compassion for his child.
  footnotes:
  - marker: a
    text: Or 'in wicked unanimity' or 'in evil concord.' The phrase describes the nations' shared evil purpose.
    reason: lexical_alternative
  - marker: b
    text: '''The righteous man'' likely refers to Abraham in context, but the Greek does not name him here.'
    reason: cross_reference
  - marker: c
    text: Or 'kept him steadfast despite his tender feelings for his son.' The Greek speaks of inward affections or compassion for a child.
    reason: lexical_alternative
