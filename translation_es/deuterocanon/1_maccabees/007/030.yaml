translation:
  language: es
  text: Y Judas supo[a] que había venido contra él con engaño; y se alarmó por causa de él, y ya no quiso ver su rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la noticia llegó a Judas» o «el asunto llegó a ser conocido por Judas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώσθη
  english_pob_choice: became known
  chosen_spanish: se dio a conocer
  alternatives_spanish:
  - llegó a saberse
  - se supo
  lexicon: LSJ
  rationale: El pasivo aoristo comunica que la información llegó a Judas; «se dio a conocer» preserva ese carácter impersonal sin introducir un informante no explicitado.
- source_word: ὁ λόγος
  english_pob_choice: the matter
  chosen_spanish: la noticia
  alternatives_spanish:
  - el asunto
  - el informe
  lexicon: LSJ
  rationale: Aquí λόγος designa la información sobre la emboscada o el plan, no «palabra» en sentido estrecho. «La noticia» funciona bien en español y mantiene el valor de reporte.
- source_word: μετὰ δόλου
  english_pob_choice: with deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - con treta
  - con dolo
  lexicon: LSJ
  rationale: La preposición expresa modo. «Con engaño» conserva la fuerza moral de δόλος y suena natural; «con dolo» sería más técnico y menos transparente para lectura pública.
- source_word: ἦλθεν ἐπ’ αὐτόν
  english_pob_choice: had come against him
  chosen_spanish: había venido contra él
  alternatives_spanish:
  - había caído sobre él
  - había ido contra él
  lexicon: LSJ
  rationale: La construcción hostil de ἐπ’ αὐτόν pide una dirección adversa. «Había venido contra él» refleja el sentido de ataque o aproximación hostil, sin suavizarlo.
- source_word: ἐπτοήθη
  english_pob_choice: was alarmed
  chosen_spanish: se alarmó
  alternatives_spanish:
  - tuvo miedo
  - se espantó
  lexicon: LSJ
  rationale: El verbo indica sobresalto o alarma más que terror pleno. «Se alarmó» conserva esa intensidad moderada y el cambio de estado psicológico.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: because of him
  chosen_spanish: por causa de él
  alternatives_spanish:
  - a causa de él
  - por él
  lexicon: LSJ
  rationale: El valor causal se expresa claramente en español con «por causa de él», manteniendo la relación de origen del temor/alarma.
- source_word: οὐκ ἠβουλήθη ἔτι
  english_pob_choice: no longer wished
  chosen_spanish: no quiso ya
  alternatives_spanish:
  - ya no quiso
  - no quiso más
  lexicon: LSJ
  rationale: ἠβουλήθη expresa voluntad/querer. «No quiso ya» conserva el giro de cese a partir de ese momento y suena fluido en español bíblico contemporáneo.
- source_word: ἰδεῖν τὸ πρόσωπον αὐτοῦ
  english_pob_choice: to see his face
  chosen_spanish: ver su rostro
  alternatives_spanish:
  - ver su cara
  - mirar su rostro
  lexicon: LSJ
  rationale: El hebraísmo/idioma de «ver el rostro» se mantiene en español con «ver su rostro», preservando la personalización de la ruptura sin caer en calco torpe.
translation_notes:
  revision_awareness: Texto revisado conforme al pasaje griego de Swete LXX 1909 y al auditoria inglés POB; no se detectaron cambios sustantivos respecto del sentido base, solo ajustes de naturalidad y precisión léxica en español.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, pues el pasaje no contiene el tetragrámaton ni κύριος con función divina.
  - Se mantiene «rostro» para reproducir el valor idiomático de πρόσωπον sin perder legibilidad en español.
  - «Con engaño» conserva la tensión ética de δόλος sin intensificarla a «traición»; la opción queda explícita en las decisiones léxicas.
