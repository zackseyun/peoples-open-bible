review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente la estructura y el sentido del hebreo: fórmula resumitiva demostrativa, נַחֲלַת como ‘herencia’, מַטֵּה como ‘tribu’, בְנֵי דָן como ‘hijos de Dan’, לְמִשְׁפְּחֹתָם como ‘según sus clanes’, y cierre territorial con ‘estas ciudades con sus aldeas’. También conserva bien la alternativa de tiempo verbal para זֹאת. Sin embargo, falta preservar en nota la alternativa léxica principal documentada en el audit trail para נַחֲלַת (‘allotment’), que en español conviene representar como ‘porción asignada’ o ‘asignación’.'
  spanish_quality_summary: El español es claro, natural y digno. ‘Esta fue la herencia...’ funciona bien en contexto. ‘Clanes’ es una elección sólida y más precisa que ‘familias’. La puntuación es correcta. El único ajuste necesario es completar la documentación de la alternativa léxica de ‘herencia’; además, puede simplificarse la distribución de notas para que correspondan mejor a las dos principales alternativas preservadas por el POB inglés.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. ‘Herencia’, ‘tribu’, ‘hijos de Dan’, ‘clanes’, ‘ciudades’ y ‘aldeas’ están alineados con el sentido fuente y con la racionalidad léxica documentada. La excepción a corregir es la omisión de la alternativa española para נַחֲלַת.
  issues:
  - severity: medium
    issue: Falta una nota léxica para ‘herencia’ que preserve la alternativa de נַחֲלַת
    rationale: El POB inglés documenta explícitamente la alternativa ‘allotment’. El borrador español tiene nota en ‘herencia’, pero solo para el tiempo verbal de זֹאת; eso deja sin reflejar una decisión léxica significativa del sustantivo principal.
  - severity: low
    issue: La nota sobre el tiempo verbal está anclada a ‘herencia’ en vez de a la fórmula ‘Esta fue’
    rationale: No es un error de traducción, pero el anclaje actual puede crear ligera confusión, porque la variante ‘Esta es’ depende de זֹאת y de la fórmula completa, no del sustantivo ‘herencia’ aislado.
  revised_spanish_text: 'Esta fue[a] la herencia[b] de la tribu de los hijos de Dan, según sus clanes: estas ciudades con sus aldeas.'
  revised_footnotes:
  - marker: a
    text: 'También puede traducirse: ‘Esta es ...’; el demostrativo hebreo permite presente o pasado en este tipo de fórmula resumida.'
    reason: lexical_alternative
  - marker: b
    text: O ‘la porción asignada’. En este contexto, el término hebreo puede resaltar tanto la porción distribuida como su carácter de herencia.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal del borrador, pero se reubica la nota verbal al segmento correcto (‘Esta fue’) y se añade la alternativa léxica exigida por el audit trail para נַחֲלַת. La nota sobre ‘clanes’ no es necesaria aquí porque el POB inglés no la preservó en nota y la traducción principal ya comunica adecuadamente el sentido.
