translation:
  language: es
  text: Él extenderá su mano contra el norte y destruirá a Asiria, y convertirá a Nínive en una desolación, seca como el yermo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como el desierto’. El hebreo midbar puede denotar desierto, estepa o terreno baldío, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵט
  english_pob_choice: he will stretch out
  chosen_spanish: extenderá
  alternatives_spanish:
  - estirará
  - tenderá
  lexicon: HALOT
  rationale: נטה con ‘mano’ expresa una acción dirigida y enérgica. En español, ‘extenderá su mano’ conserva la imagen sin sonar forzado; ‘estirará’ puede resultar menos natural en registro bíblico, y ‘tenderá’ es posible pero algo más ambiguo.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su brazo
  - su poder
  lexicon: HALOT
  rationale: Se conserva el antropomorfismo del hebreo. ‘Mano’ mantiene la imagen concreta de acción judicial divina.
- source_word: עַל צָפוֹן
  english_pob_choice: against the north
  chosen_spanish: contra el norte
  alternatives_spanish:
  - sobre el norte
  - hacia el norte
  lexicon: HALOT
  rationale: En el contexto hostil y de juicio, עַל funciona mejor como oposición o ataque. ‘Contra’ comunica con claridad la intención adversativa.
- source_word: וִיאַבֵּד
  english_pob_choice: destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - aniquilará
  - hará perecer
  lexicon: HALOT
  rationale: El hifil de אבד expresa causar ruina o destrucción. ‘Destruirá’ es directo, fuerte y fiel al valor verbal.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  lexicon: HALOT
  rationale: En el marco profético se refiere al imperio/territorio, no solo al nombre ancestral. ‘Asiria’ es la forma española estándar para la entidad geopolítica.
- source_word: וְיָשֵׂם
  english_pob_choice: he will make
  chosen_spanish: convertirá
  alternatives_spanish:
  - hará
  - pondrá
  lexicon: HALOT
  rationale: שׂים con complemento resultativo puede expresarse en español como ‘convertir en’. ‘Convertirá a Nínive en una desolación’ conserva la estructura causal y el resultado final de forma natural.
- source_word: נִינְוֵה
  english_pob_choice: Nineveh
  chosen_spanish: Nínive
  alternatives_spanish:
  - Ninivé
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y ampliamente reconocible del topónimo.
- source_word: לִשְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - en ruina
  lexicon: HALOT
  rationale: El sustantivo שְׁמָמָה nombra el estado de devastación. ‘Una desolación’ preserva el valor nominal del hebreo después de ‘convertirá en’.
- source_word: צִיָּה
  english_pob_choice: dry
  chosen_spanish: seca
  alternatives_spanish:
  - árida
  - reseca
  lexicon: HALOT
  rationale: El término expresa sequedad o tierra árida. ‘Seca’ funciona con naturalidad en español y mantiene la idea de desecación.
- source_word: כַּמִּדְבָּר
  english_pob_choice: like the wilderness
  chosen_spanish: como el desierto
  alternatives_spanish:
  - como el desierto árido
  - como el yermo
  lexicon: HALOT
  rationale: מִדְבָּר puede abarcar ‘wilderness’ o ‘desert’. En español, ‘desierto’ comunica mejor la imagen de tierra inhóspita y seca en una comparación breve y clara.
theological_decisions:
- issue: Imagen antropomórfica de juicio divino
  english_pob_reading: Retain the concrete image 'he will stretch out his hand'
  chosen_spanish_reading: Él extenderá su mano
  alternative_spanish_readings:
  - actuará contra el norte
  - intervendrá contra el norte
  rationale: El hebreo presenta una acción corporal de Dios para subrayar su juicio. Mantener ‘su mano’ conserva la fuerza retórica y evita abstraerla demasiado.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo base y con el audit trail inglés; no se documentan revisiones textuales ni cambios de última pasada que requieran ajuste.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el hebreo usa el nombre divino explícito; aquí no aparece, por lo que no se introduce.
  - 'Se conservan nombres propios bíblicos en formas españolas estándar: Asiria, Nínive.'
  - La comparación final se formula de manera idiomática en español sin perder la tensión lexical entre ‘desolación’, ‘seca’ y ‘desierto’.
