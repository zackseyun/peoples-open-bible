lexical_decisions:
- source_word: ostendere mihi
  english_pob_choice: to show me
  chosen_spanish: para mostrarme
  alternatives_spanish:
  - para enseñarme
  - para hacerme ver
  lexicon: mostrar
  rationale: El latín expresa un propósito con infinitivo; «para mostrarme» conserva la relación directa y el valor explicativo sin añadir matices no presentes.
- source_word: temporum finem
  english_pob_choice: the end of the times
  chosen_spanish: el fin de los tiempos
  alternatives_spanish:
  - el término de los tiempos
  - el final de los tiempos
  lexicon: fin
  rationale: «Fin» reproduce bien el valor de culminación/terminación temporal del latín; «tiempos» mantiene el plural de temporum y su sentido escatológico.
- source_word: temporum nouissima
  english_pob_choice: the last things of the times
  chosen_spanish: las cosas últimas de los tiempos
  alternatives_spanish:
  - los últimos acontecimientos de los tiempos
  - las últimas cosas de los tiempos
  lexicon: novissimus
  rationale: Se conserva la estructura del latín con «cosas últimas», más cercana al valor nominal de nouissima que una paráfrasis demasiado interpretativa. En español suena algo más natural que calcar «los últimos de los tiempos».
- source_word: dixit ad me
  english_pob_choice: he said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - dijo a mí
  lexicon: dico
  rationale: La forma española normal y clara expresa el mismo acto de habla directo sin perder la referencia personal.
- source_word: Haec est interpretatio uisionis huius
  english_pob_choice: This is the interpretation of this vision
  chosen_spanish: Esta es la interpretación de esta visión
  alternatives_spanish:
  - Ésta es la explicación de esta visión
  lexicon: interpretatio
  rationale: «Interpretación» reproduce con fidelidad el sustantivo latino y el registro expositivo del pasaje; «explicación» sería posible, pero más libre.
theological_decisions:
- issue: 'Lenguaje escatológico: “fin de los tiempos” y “cosas últimas”'
  english_pob_reading: the end of the times and the last things of the times
  chosen_spanish_reading: el fin de los tiempos y las cosas últimas de los tiempos
  alternative_spanish_readings:
  - el fin de los tiempos y los últimos acontecimientos de los tiempos
  - el término de los tiempos y las últimas cosas de los tiempos
  rationale: 'El latín presenta dos expresiones coordinadas: una sobre el fin temporal y otra sobre los elementos postreros asociados a esos tiempos. Mantener ambas evita borrar la segunda cláusula, cuya omisión fue corregida en la revisión auditada.'
  doctrine_reference: Escatología bíblica general; fidelidad a la coordinación del texto fuente.
- issue: Límite de versículo y continuidad textual
  english_pob_reading: And he said to me, “This is the interpretation of this vision that
  chosen_spanish_reading: 'Y me dijo: «Esta es la interpretación de esta visión que'
  alternative_spanish_readings:
  - 'Y me dijo: «Esta es la explicación de esta visión que'
  rationale: La revisión auditada mostró que esta cláusula pertenece al texto de 2 Esdras 12:9 según el paquete fuente proporcionado, aunque algunas tradiciones versifican la continuación en el versículo siguiente. El español debe reflejar fielmente la secuencia transmitida por el archivo fuente.
  doctrine_reference: Crítica textual / versificación del apócrifo latino.
translation_notes:
  revision_awareness: El inglés auditado fue corregido para incluir la segunda mitad de la cláusula latina omitida en un borrador previo. El español sigue esa revisión y conserva la continuidad del enunciado hasta «que», reflejando que el archivo fuente de este versículo incluye la apertura de la interpretación en la misma unidad textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se usa «visión» e «interpretación» con registro sobrio y bíblico, sin añadir explicaciones ajenas al latín.
  - La nota al pie se ancla en «dijo» para reflejar la continuidad textual auditada, aunque la alternativa se refiere al segmento escatológico previo.
