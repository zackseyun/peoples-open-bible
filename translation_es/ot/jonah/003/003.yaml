    reason: lexical_alternative
  revision_rationale: Se conservó la traducción sustancial del borrador porque es fiel y natural, pero se corrigió la ubicación de los marcadores para que correspondan a las expresiones explicadas en las notas. También se suavizó ligeramente la última frase a 'de camino de tres días' por mayor naturalidad en español sin alterar el sentido.
