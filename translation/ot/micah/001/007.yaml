theological_decisions:
- issue: Metaphor of prostitution for idolatry and illicit wealth
  chosen_reading: Retain the prostitution language explicitly in the main text
  alternative_readings:
  - Soften to 'immoral gain' or 'idolatrous earnings'
  rationale: The Hebrew repeatedly uses אֶתְנַן and זוֹנָה, and Micah's prophetic rhetoric intentionally links idolatry with prostitution. Softening the metaphor would mute the force of the judgment oracle and import interpretation into translation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referent of the feminine pronouns
  chosen_reading: Use 'her' throughout, referring to Samaria personified as a woman/city
  alternative_readings:
  - Replace with 'its' for the city
  rationale: The Hebrew uses feminine forms consistently, and the personified-city imagery is integral to the prophetic metaphor. 'Her' preserves the source-text imagery better than the more impersonal 'its.'
  doctrine_reference: Translation philosophy §§1, 4
