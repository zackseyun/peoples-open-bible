translation:
  language: es
  text: Pero la multitud de tus extranjeros[a] será como polvo fino, y la multitud de los crueles como paja que pasa[b]; y sucederá de repente, en un instante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “tus forasteros”. El término hebreo puede denotar extraños o extranjeros; en este contexto son invasores hostiles.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “como tamo que pasa”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: shall become / it shall happen
  chosen_spanish: será / sucederá
  alternatives_spanish:
  - llegará a ser / acontecerá
  - se convertirá en / ocurrirá
  lexicon: HALOT
  rationale: En la primera cláusula, con comparaciones metafóricas, 'será' comunica bien el resultado; en la última, 'sucederá' refleja mejor el valor eventivo del hebreo y evita forzar una sola equivalencia mecánica para ambos usos de היה.
- source_word: כְּאָבָק דַּק
  english_pob_choice: like fine dust
  chosen_spanish: como polvo fino
  alternatives_spanish:
  - como polvo muy fino
  - como polvo menudísimo
  lexicon: HALOT
  rationale: '''אָבָק'' es ''polvo'' y ''דַּק'' intensifica la finura o pequeñez. ''Polvo fino'' conserva la imagen y suena natural en español.'
- source_word: הֲמוֹן
  english_pob_choice: multitude
  chosen_spanish: multitud
  alternatives_spanish:
  - muchedumbre
  - gran masa
  lexicon: HALOT
  rationale: '''Multitud'' mantiene el registro elevado y reproduce bien el sustantivo colectivo hebreo sin rebajarlo a una expresión demasiado coloquial.'
- source_word: זָרָיִךְ
  english_pob_choice: your strangers
  chosen_spanish: tus extranjeros
  alternatives_spanish:
  - tus forasteros
  - tus extraños
  lexicon: HALOT
  rationale: '''זָר'' puede denotar extranjeros o extraños. En español, ''extranjeros'' comunica la idea de personas de fuera; en este contexto hostil, el matiz adversarial emerge por el pasaje mismo. Evita traducirlo como ''enemigos'', que iría más allá del término hebreo.'
- source_word: וּכְמֹץ עֹבֵר
  english_pob_choice: and ... like passing chaff
  chosen_spanish: como paja que pasa
  alternatives_spanish:
  - como tamo que pasa
  - como paja que vuela
  lexicon: HALOT
  rationale: '''מֹץ'' es chaff/tamo/paja trillada; ''paja'' es una opción comprensible y bíblicamente natural en español. ''Que pasa'' intenta reproducir el participio ''עֹבֵר'' sin añadir una paráfrasis más libre.'
- source_word: עָרִיצִים
  english_pob_choice: the ruthless
  chosen_spanish: los crueles
  alternatives_spanish:
  - los violentos
  - los tiranos
  lexicon: HALOT
  rationale: El hebreo apunta a opresores violentos o despiadados. 'Crueles' es claro y transmite la dureza moral del término; 'tiranos' sería más interpretativo y 'violentos' enfatizaría solo un aspecto.
- source_word: לְפֶתַע פִּתְאֹם
  english_pob_choice: suddenly, in an instant
  chosen_spanish: de repente, en un instante
  alternatives_spanish:
  - súbitamente, en un instante
  - de pronto, en seguida
  lexicon: HALOT
  rationale: Los dos adverbios hebreos refuerzan la misma idea de irrupción inesperada. 'De repente, en un instante' mantiene la doble intensificación y resulta idiomático en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el auditable inglés POB: conserva la doble comparación, distingue los dos usos de היה y mantiene la intensificación final con dos adverbios. Se adoptó ''extranjeros'' en vez de ''forasteros'' o ''enemigos'' por fidelidad léxica y claridad contextual.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo 'multitud' para הֲמוֹן en ambos casos por consistencia terminológica.
  - '''Crueles'' se prefirió a ''tiranos'' para no sobrerinterpretar el matiz moral-político del hebreo.'
  - La puntuación conserva la estructura en dos miembros comparativos y la clausula final enfática.
