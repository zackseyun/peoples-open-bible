revisions:
- from: Y sucederá que, el día en que reparta su herencia a sus hijos, no podrá dar la primacía al hijo de la amada[a] sobre el hijo de la aborrecida, que es el primogénito.
  to: Y el día que reparta su herencia a sus hijos, no podrá tratar al hijo de la esposa amada[a] como el primogénito sobre el hijo de la esposa aborrecida, que es el primogénito.
  rationale: Se ajusta el texto para reflejar con mayor precisión el sentido jurídico de בכר ('tratar ... como el primogénito') y para eliminar la ambigüedad española añadiendo 'esposa', conforme al contexto y al audit trail inglés. También se suaviza la fórmula inicial a una construcción más natural en español legal-narrativo. La nota se alinea mejor con las alternativas documentadas en inglés.
