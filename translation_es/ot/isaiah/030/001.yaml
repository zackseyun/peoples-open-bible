  text: ה֣וֹי בָּנִ֤ים סֽוֹרְרִים֙ נְאֻם יְהוָ֔ה לַ/עֲשׂ֤וֹת עֵצָה֙ וְ/לֹ֣א מִ/נִּ֔י וְ/לִ/נְסֹ֥ךְ מַסֵּכָ֖ה וְ/לֹ֣א רוּחִ֑/י לְמַ֛עַן סְפ֥וֹת חַטָּ֖את עַל חַטָּֽאת־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/001.yaml
  text: Woe to the rebellious children[a], declares Yahweh, who carry out a plan, but not from me, and who pour out a libation, but not by my Spirit, so as to add sin to sin.
  footnotes:
