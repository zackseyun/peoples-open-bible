translation:
  language: es
  text: Que sus hijos varones queden sin padre[a], y su esposa quede viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huérfanos». El hebreo puede denotar niños privados de padre; aquí «sin padre» encaja mejor con el paralelismo con «su esposa quede viuda».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִֽהְיוּ
  english_pob_choice: May ... be
  chosen_spanish: Que ... queden
  alternatives_spanish:
  - Que ... sean
  - Ojalá ... queden
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/imprecación en forma jussiva. En español, «Que ... queden» transmite mejor esa fuerza optativa que un futuro simple, y mantiene el tono de maldición del salmo sin volverlo meramente descriptivo.
- source_word: בָנָ֥יו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: Aunque el término hebreo es literalmente «sus hijos/varones», en español «hijos» comunica de forma natural la descendencia masculina aquí sin perder el referente posesivo. «Hijos varones» sería más explícito, pero menos fluido en esta línea paralela.
- source_word: יְתוֹמִ֑ים
  english_pob_choice: fatherless
  chosen_spanish: sin padre
  alternatives_spanish:
  - huérfanos
  - desamparados
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de no reducirlo a «huérfanos» sin matiz, porque el paralelismo con «viuda» apunta a la pérdida del padre/hombre de la casa. «Sin padre» conserva esa precisión social y relacional en español.
- source_word: וְאִשְׁתּוֹ
  english_pob_choice: and his wife
  chosen_spanish: y su esposa
  alternatives_spanish:
  - y su mujer
  - y su mujer legítima
  lexicon: HALOT
  rationale: «Esposa» es la forma más clara y digna en español para אִשָּׁה con sufijo posesivo en este contexto, donde el sentido es marital. «Mujer» sería posible, pero más ambiguo y menos natural en registro bíblico actual.
- source_word: אַלְמָנָה
  english_pob_choice: a widow
  chosen_spanish: viuda
  alternatives_spanish:
  - una viuda
  - viuda
  lexicon: HALOT
  rationale: 'En español, el predicativo funciona naturalmente sin artículo explícito en esta construcción: «su esposa, viuda». Esto evita rigidez y preserva el paralelismo con la primera cola.'
theological_decisions:
- issue: Fuerza imprecatoria/jussiva del verbo
  english_pob_reading: 'Render as a wish/prayer: ''May his sons be fatherless, and his wife a widow.'''
  chosen_spanish_reading: 'Renderizado como deseo/imprecación: «Que sus hijos queden sin padre, y su esposa, viuda.»'
  alternative_spanish_readings:
  - «Sus hijos serán sin padre, y su esposa será viuda»
  - «Ojalá sus hijos queden sin padre...»
  rationale: El hebreo y el contexto literario favorecen una lectura imprecatoria, no una simple profecía en futuro. El español «Que ...» conserva esa tensión orante y maldiciente sin suavizarla ni resolverla.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el cotejo más reciente indica alta concordancia y cambios innecesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; aquí no aparece.
  - «Sin padre» conserva la fuerza social del hebreo y evita neutralizar el paralelo con «viuda».
  - La puntuación con coma antes de «viuda» refleja el predicativo elíptico del segundo hemistiquio.
