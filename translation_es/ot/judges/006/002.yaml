translation:
  language: es
  text: Y la mano de Madián prevaleció contra Israel[a]. Por causa de Madián, los hijos de Israel se hicieron las guaridas[b] que están en los montes, las cuevas y las fortalezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el poder de Madián». El hebreo dice literalmente «la mano de Madián».
    reason: lexical_alternative
  - marker: b
    text: O «los escondrijos». El término hebreo es raro; también se ha traducido «las cuevas» o «las guaridas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּעָז
  english_pob_choice: prevailed
  chosen_spanish: prevaleció
  alternatives_spanish:
  - se fortaleció
  - fue más fuerte
  lexicon: HALOT
  rationale: En contexto hostil, el hebreo expresa que la fuerza de Madián se impuso sobre Israel. «Prevaleció» conserva la idea de dominio eficaz, como en el inglés POB, sin reducirlo a mera fuerza física.
- source_word: יַד מִדְיָן
  english_pob_choice: the hand of Midian
  chosen_spanish: la mano de Madián
  alternatives_spanish:
  - el poder de Madián
  - Madián
  lexicon: HALOT
  rationale: Se conserva la metáfora de «mano» para mantener la imagen hebrea de poder o control, tal como hace el POB en inglés.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  - encima de Israel
  lexicon: HALOT
  rationale: El contexto es de opresión hostil; «contra» expresa mejor esa agresión que una preposición más espacial.
- source_word: מִפְּנֵי מִדְיָן
  english_pob_choice: Because of Midian
  chosen_spanish: Por causa de Madián
  alternatives_spanish:
  - A causa de Madián
  - Por temor a Madián
  lexicon: HALOT
  rationale: La frase hebrea introduce la reacción motivada por la amenaza de Madián. «Por causa de» reproduce la relación causal sin añadir explícitamente «temor», que está implícito pero no dicho.
- source_word: עָשׂוּ לָהֶם
  english_pob_choice: made for themselves
  chosen_spanish: se hicieron para sí
  alternatives_spanish:
  - se prepararon
  - se hicieron
  lexicon: HALOT
  rationale: El reflexivo español comunica que los israelitas se procuraron estos refugios para su propio uso, manteniendo el sentido de construcción/adaptación del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos varones de Israel
  lexicon: HALOT
  rationale: Se conserva la forma explícita del hebreo y la solución del POB, con una traducción natural en español bíblico contemporáneo.
- source_word: הַמִּנְהָרוֹת
  english_pob_choice: the dens / the mountain hideouts
  chosen_spanish: las cuevas
  alternatives_spanish:
  - los escondrijos
  - las guaridas
  - las cuevas de los montes
  lexicon: HALOT
  rationale: El término es raro y el contexto enumera lugares de refugio. En español, «cuevas» es claro y natural, y se complementa con la relativa «que están en los montes» para conservar la localización del hebreo. Frente a «guaridas» o «escondrijos», evita una connotación demasiado animal o demasiado interpretativa.
- source_word: אֲשֶׁר בֶּהָרִים
  english_pob_choice: that are in the mountains
  chosen_spanish: que están en los montes
  alternatives_spanish:
  - que están en las montañas
  - en los montes
  lexicon: HALOT
  rationale: La relativa mantiene la precisión locativa del hebreo. «Montes» suena más bíblico y fluido en español que una repetición pesada de «montañas».
- source_word: הַמְּעָרוֹת
  english_pob_choice: the caves
  chosen_spanish: las cavernas
  alternatives_spanish:
  - las cuevas
  - las grutas
  lexicon: HALOT
  rationale: Se distingue este término del anterior para preservar la lista de refugios. «Cavernas» es natural y permite reflejar una segunda categoría de oquedad o refugio subterráneo.
- source_word: הַמְּצָדוֹת
  english_pob_choice: the strongholds
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los baluartes
  - las fortificaciones
  - las plazas fuertes
  lexicon: HALOT
  rationale: «Fortalezas» transmite bien la idea de lugares defendibles o fortificados y es un equivalente claro para lectores bíblicos en español.
theological_decisions:
- issue: La relación entre la «mano» de Madián y la opresión sobre Israel
  english_pob_reading: The hand of Midian prevailed against Israel
  chosen_spanish_reading: La mano de Madián prevaleció contra Israel
  alternative_spanish_readings:
  - Madián prevaleció contra Israel
  - El poder de Madián prevaleció contra Israel
  rationale: Se mantiene la metáfora de la «mano» porque el texto la usa como imagen de poder efectivo. Evitarla empobrecería el paralelismo y la tensión del versículo.
  doctrine_reference: 'Éxodo/Jueces: lenguaje bíblico de dominio y liberación divina; cf. uso idiomático de «mano» como poder o control.'
- issue: El valor de «los hijos de Israel» frente a una traducción colectiva
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos varones de Israel
  rationale: El hebreo es explícitamente masculino plural; la traducción conserva esa forma, aunque en español «los israelitas» sería una opción más idiomática. Aquí se prioriza la fidelidad formal documentada por el POB.
  doctrine_reference: Principio de transparencia formal respecto a formas del original, sin borrar el marcado masculino del hebreo cuando es relevante al texto.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente, que volvió a la formulación más cercana al hebreo para el elemento de refugios: «the dens that are in the mountains». Por eso la versión española conserva la localización explícita («que están en los montes») y evita una generalización como «escondrijos en los montes». También mantiene la enumeración de tres refugios con una pequeña diferenciación léxica («cuevas», «cavernas», «fortalezas») para reflejar la serie hebrea sin forzar un calco redundante.'
  spanish_consistency_notes:
  - Se usó «Madián» para el nombre propio, siguiendo la forma usual en español bíblico.
  - Se conservó «la mano» como metáfora de poder para no neutralizar la imagen hebrea.
  - Se eligió «montes» en lugar de «montañas» por fluidez bíblica y consistencia con el registro del versículo.
  - La lista final mantiene tres elementos de refugio, como en el hebreo, evitando fusionarlos o explicarlos en exceso.
  - No se introdujo una nota teológica adicional sobre miedo porque el hebreo de este verso comunica causalidad más que un término explícito para temor.
