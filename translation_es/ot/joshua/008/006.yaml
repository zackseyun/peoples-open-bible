  text: וְ/יָצְא֣וּ אַחֲרֵ֗י/נוּ עַ֣ד הַתִּיקֵ֤/נוּ אוֹתָ/ם֙ מִן הָ/עִ֔יר כִּ֣י יֹֽאמְר֔וּ נָסִ֣ים לְ/פָנֵ֔י/נוּ כַּ/אֲשֶׁ֖ר בָּ/רִֽאשֹׁנָ֑ה וְ/נַ֖סְנוּ לִ/פְנֵי/הֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/008/006.yaml
  text: And they will come out after us until we have drawn them away from the city[a], for they will say[b], ‘They are fleeing before us as at the first,’ and we will flee before them.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'until we have lured them away from the city.' The Hebrew verb means to draw or pull away; 'lure' makes the tactic explicit.
    reason: lexical_alternative
  - marker: b
    text: '''As at the first'' refers to Israel''s earlier retreat before Ai (see Joshua 7:4–5).'
    reason: cross_reference
  ai_draft:
