translation:
  language: es
  text: que comen la carne de mi pueblo, les arrancan la piel de encima[a], les rompen los huesos en pedazos y los trocean como lo que está en una olla, como carne[b] dentro de un caldero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los desuellan".'
    reason: lexical_alternative
  - marker: b
    text: Hebreo "carne" antes en el versículo; aquí "carne" encaja en la imagen culinaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכְלוּ
  english_pob_choice: eat
  chosen_spanish: comen
  alternatives_spanish:
  - han comido
  - devoran
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'comen'. En español, el presente mantiene el tono profético de denuncia viva y evita añadir un aspecto perfecto que el texto no exige.
- source_word: שְׁאֵר עַמִּי
  english_pob_choice: the flesh of my people
  chosen_spanish: la carne de mi pueblo
  alternatives_spanish:
  - el cuerpo de mi pueblo
  - el resto de mi pueblo
  lexicon: HALOT
  rationale: Aquí שְׁאֵר se entiende por el contexto anatómico inmediato como 'carne', no como 'resto'. La secuencia 'piel', 'huesos' y la imagen de cocina confirman ese sentido corporal.
- source_word: וְעוֹרָם
  english_pob_choice: their skin
  chosen_spanish: la piel
  alternatives_spanish:
  - el cuero
  - su piel
  lexicon: HALOT
  rationale: עוֹר refiere a la piel en sentido humano. 'Piel' es la opción natural y fiel; 'cuero' sonaría animalizante en español.
- source_word: מֵעֲלֵיהֶם הִפְשִׁיטוּ
  english_pob_choice: strip their skin from off them
  chosen_spanish: les arrancan la piel de encima
  alternatives_spanish:
  - les desuellan
  - les quitan la piel
  lexicon: HALOT
  rationale: La preposición hebrea indica 'de encima de ellos' y el verbo expresa despojar/arrancar. 'De encima' preserva la espacialidad del hebreo mejor que un simple 'de ellos'.
- source_word: וְאֶת עַצְמֹתֵיהֶם פִּצֵּחוּ
  english_pob_choice: break their bones in pieces
  chosen_spanish: les rompen los huesos en pedazos
  alternatives_spanish:
  - les quiebran los huesos
  - les despedazan los huesos
  lexicon: HALOT
  rationale: פִּצֵּחַ intensifica la ruptura violenta. 'En pedazos' comunica el quebrantamiento sin forzar un verbo más interpretativo que el hebreo.
- source_word: וּפָרְשׂוּ
  english_pob_choice: chop them up
  chosen_spanish: los trocean
  alternatives_spanish:
  - los parten
  - los cortan en trozos
  lexicon: HALOT
  rationale: A la luz de la imagen culinaria, el verbo apunta a cortar en porciones, como carne para cocinar. 'Trocean' conserva la idea de cortar en piezas sin añadir un matiz ajeno.
- source_word: כַּאֲשֶׁר בַּסִּיר
  english_pob_choice: like what is in a pot
  chosen_spanish: como lo que está en una olla
  alternatives_spanish:
  - como en una olla
  - como lo que hay en un caldero
  lexicon: HALOT
  rationale: El hebreo es elíptico. La expansión mínima 'lo que está en una olla' hace comprensible la comparación sin adelantar explícitamente el sustantivo 'carne' que sigue después.
- source_word: וּכְבָשָׂר
  english_pob_choice: like meat
  chosen_spanish: como carne
  alternatives_spanish:
  - como carne de res
  - como carne para comer
  lexicon: HALOT
  rationale: En español, 'carne' mantiene la oposición entre la carne humana mencionada antes y la carne destinada a cocinarse. 'Carne' es suficientemente natural y fiel al paralelismo.
- source_word: בְּתוֹךְ קַלָּחַת
  english_pob_choice: within a cauldron
  chosen_spanish: dentro de un caldero
  alternatives_spanish:
  - en un caldero
  - en una olla grande
  lexicon: HALOT
  rationale: קַלָּחַת designa un recipiente de cocción. 'Caldero' conserva la imagen fuerte y antigua del texto; 'dentro de' refleja el valor locativo de בְּתוֹךְ.
theological_decisions:
- issue: Carácter de la imagen canibalística
  english_pob_reading: Metaphorical depiction of ruthless exploitation and violence by Israel's leaders
  chosen_spanish_reading: Imagen metafórica de explotación despiadada y violencia por parte de los líderes de Israel
  alternative_spanish_readings:
  - descripción de canibalismo literal
  - hipérbole poética sin referencia social concreta
  rationale: El hebreo acumula imágenes anatómicas y culinarias para denunciar la depredación de los dirigentes. La traducción mantiene la crudeza de la metáfora sin suavizarla ni convertirla en una afirmación histórica de canibalismo literal.
  doctrine_reference: Poética profética; fidelidad semántica al género de denuncia
- issue: Relación entre 'carne' humana y 'carne' de cocina
  english_pob_reading: Hebrew 'flesh' earlier in the verse; here 'meat' fits the cooking image
  chosen_spanish_reading: '''Carne'' sirve tanto para la carne humana como para la carne de la imagen culinaria, con el cambio de contexto indicado por la secuencia'
  alternative_spanish_readings:
  - usar 'carne' en ambos casos sin distinción
  - cambiar a 'carne' y luego 'carne cocida'
  rationale: El español no necesita dos palabras distintas para el juego de sentidos; el contexto ya distingue entre el cuerpo agredido y el alimento en cocción. Mantener 'carne' en ambos lugares preserva la relación léxica del hebreo.
  doctrine_reference: Coherencia lexical y preservación del paralelismo
- issue: Preposición espacial en 'de encima de ellos'
  english_pob_reading: strip their skin from off them
  chosen_spanish_reading: les arrancan la piel de encima
  alternative_spanish_readings:
  - les arrancan la piel de ellos
  - les desuellan
  rationale: La preposición hebrea מֵעֲלֵיהֶם aporta la idea de quitar algo que está sobre ellos. 'De encima' conserva esa espacialidad y evita perder un matiz que el inglés POB también quiso preservar.
  doctrine_reference: Precisión semántica del texto hebreo
translation_notes:
  revision_awareness: 'La redacción española sigue el último estado del POB inglés en los puntos donde hubo revisión: conserva ''from off them'' en una solución equivalente con valor espacial (''de encima'') y mantiene la imagen de cocción con un recipiente fuerte (''caldero''), aunque aquí se optó por ''olla'' en la primera comparación para hacer explícita la elipsis hebrea. También se preserva la tensión entre carne humana y carne para cocinar mediante la repetición de ''carne''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se evita 'siervo' o vocabulario eclesiástico ajeno al contexto; el tono es de denuncia profética.
  - '''Carne'' se mantiene de manera consistente para שְׁאֵר y בָּשָׂר, ya que el contexto aclara el cambio de referente.'
  - '''Caldero'' en la nota conserva la fuerza imagética del inglés POB y del hebreo para el recipiente de cocción.'
