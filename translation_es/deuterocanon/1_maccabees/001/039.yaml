review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: el santuario queda devastado, las fiestas pasan a luto, los sábados a afrenta y el honor a menosprecio. Sin embargo, hay dos puntos mejorables para mayor fidelidad y naturalidad: «se volvieron duelo» suena poco idiomático en español y no refleja tan bien el estado resultante como «se convirtieron en luto»; además, la puntuación elíptica de las dos últimas parejas nominales puede mantenerse, pero conviene una formulación más fluida en español.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «El santuario de ella» suena forzado en español bíblico natural; la personificación se preserva mejor con «Su santuario». Asimismo, «se volvieron duelo» es duro e impropio; «se convirtieron en luto» lee mejor. «Sus sábados, oprobio; su honor, desprecio» es comprensible, pero mejora con verbos repetidos para claridad y ritmo.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Santuario», «fiestas», «sábados», «honor» y «desprecio/menosprecio» concuerdan con las decisiones auditadas. La principal mejora es estilística y de fidelidad idiomática en la expresión de transformación.
  issues:
  - severity: medium
    issue: «El santuario de ella» suena antinatural
    rationale: Aunque intenta conservar el posesivo femenino explícito, en español la personificación de Jerusalén se expresa con más naturalidad mediante «Su santuario», sin pérdida de sentido.
  - severity: medium
    issue: «se volvieron duelo» es poco idiomático
    rationale: El griego ἐστράφησαν εἰς πένθος expresa transformación a un estado de luto. En español, «se convirtieron en luto» o «se volvieron luto» sería mejor, pero «se convirtieron en luto» es claramente natural y fiel.
  - severity: low
    issue: Elipsis excesiva en las dos últimas cláusulas
    rationale: 'La secuencia nominal «sus sábados, oprobio, su honor, desprecio» reproduce la compresión del original, pero en español moderno resulta más clara con el verbo repetido: «sus sábados en oprobio, su honor en menosprecio».'
  revised_spanish_text: Su santuario fue arrasado como un desierto; sus fiestas se convirtieron en luto, sus sábados en oprobio, su honor en menosprecio.
  revision_rationale: Se ajusta el posesivo para un español más natural («Su santuario»), se corrige una expresión poco idiomática («se convirtieron en luto»), y se clarifica la serie final manteniendo la estructura de transformación del griego («en oprobio… en menosprecio»). No se requieren notas al pie.
