translation:
  language: es
  text: Con tu fuerza adquiere a tu amigo[a][b], y asóciate con los sabios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según tu capacidad». El hebreo puede denotar fuerza en el sentido de capacidad o medios.'
    reason: lexical_alternative
  - marker: b
    text: 'El verbo hebreo aquí es poco común en esta forma; el paralelo griego lee más específicamente: «toma consejo con los sabios».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכֹחֲךָ
  english_pob_choice: by your strength
  chosen_spanish: con tu fuerza
  alternatives_spanish:
  - según tu capacidad
  - con tus medios
  lexicon: HALOT
  rationale: El hebreo expresa literalmente fuerza o capacidad; el paralelo griego κατὰ τὴν ἰσχύν σου confirma una acción proporcionada a la capacidad propia. En español, «con tu fuerza» conserva la imagen y suena natural; las alternativas recogen el matiz de capacidad o medios.
- source_word: קְנֵה
  english_pob_choice: acquire
  chosen_spanish: adquiere
  alternatives_spanish:
  - gana
  - consigue
  lexicon: HALOT
  rationale: El verbo puede significar adquirir o comprar, pero aquí no es comercial. «Adquiere» mantiene la cercanía formal al hebreo y deja abierto el sentido relacional de obtener o ganar un amigo.
- source_word: רֵעֶךָ
  english_pob_choice: your friend
  chosen_spanish: a tu amigo
  alternatives_spanish:
  - a tu compañero
  - a tu prójimo
  lexicon: HALOT
  rationale: El término puede abarcar amigo, compañero o prójimo. Dado el contexto inmediato y la línea hebrea, «amigo» comunica bien la relación personal sin estrechar indebidamente el alcance.
- source_word: וְעִם חֲכָמִים
  english_pob_choice: with the wise
  chosen_spanish: con los sabios
  alternatives_spanish:
  - con los sabios varones
  - con los sabios y prudentes
  lexicon: HALOT
  rationale: El plural masculino hebreo funciona aquí como clase representativa. «Los sabios» es natural en español y conserva el valor de grupo de personas caracterizadas por sabiduría.
- source_word: תִּסְתַּיָּד
  english_pob_choice: associate yourself
  chosen_spanish: asóciate
  alternatives_spanish:
  - trata con
  - consulta con
  lexicon: HALOT
  rationale: La forma hebrea es rara; el paralelo griego μετὰ σοφῶν συμβούλευον apunta a relacionarse y tomar consejo con los sabios. «Asóciate» recoge la fuerza relacional sin imponer únicamente la idea de «tomar consejo».
theological_decisions:
- issue: Alcance del plural masculino חֲכָמִים
  english_pob_reading: the wise
  chosen_spanish_reading: los sabios
  alternative_spanish_readings:
  - los sabios varones
  - los sabios y prudentes
  rationale: Se mantiene el valor genérico-representativo del plural masculino, sin introducir una restricción masculina no exigida por el contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Sin cambios respecto al último pase revisado; el consenso de control cruzado fue de acuerdo moderado con observaciones menores, sin necesidad de alterar el contenido base.
  spanish_consistency_notes:
  - Se mantiene «sabios» para חֲכָמִים, en línea con el principio de lenguaje representativo.
  - Se evita «SEÑOR» o «Cristo» porque este verso no contiene esos títulos ni una cita que los requiera.
  - «Con tu fuerza» preserva la fuerza imagística del hebreo y armoniza con el paralelo griego sin traducir de modo mecánico.
  - Se usa «adquiere» para reflejar la carga verbal de קְנֵה sin convertirlo en una compra literal.
