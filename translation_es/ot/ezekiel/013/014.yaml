  yaml_path: translation/ot/ezekiel/013/014.yaml
  text: I will tear down the wall that you plastered with whitewash[a], and bring it down to the ground, so that its foundation is laid bare. It will fall, and you will perish in its midst. Then you will know that I am Yahweh.
