translation:
  language: es
  text: 'Pero ahora recuerdo los males que hice en Jerusalén: tomé todos los vasos de plata y los vasos de oro que había en ella, y envié órdenes para destruir a los habitantes de Judá sin causa.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μιμνήσκομαι
  english_pob_choice: I remember
  chosen_spanish: recuerdo
  alternatives_spanish:
  - me acuerdo
  - traigo a la memoria
  lexicon: LSJ
  rationale: El presente medio expresa una memoria actual y reflexiva; «recuerdo» suena natural en español y conserva la admisión personal del hablante.
- source_word: τῶν κακῶν
  english_pob_choice: the evils
  chosen_spanish: los males
  alternatives_spanish:
  - las maldades
  - las cosas malas
  lexicon: LSJ
  rationale: Aquí κακά designa actos moralmente malos. «Males» mantiene la carga ética sin sonar excesivamente interpretativo como «maldades» en este contexto confesional.
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - utensilios
  - vasijas
  lexicon: LSJ
  rationale: En contexto de despojo del templo, «vasos» reproduce la referencia concreta a objetos cultuales valiosos; es un equivalente clásico y comprensible en español bíblico.
- source_word: τὰ ἀργυρᾶ καὶ τὰ χρυσᾶ
  english_pob_choice: the silver vessels and the gold vessels
  chosen_spanish: los vasos de plata y los vasos de oro
  alternatives_spanish:
  - los vasos de plata y oro
  - los vasos plateados y dorados
  lexicon: LSJ
  rationale: El griego substantiva los adjetivos con σκεύη implícito; repetir «vasos» evita ambigüedad y preserva el inventario del saqueo.
- source_word: ἐξαπέστειλα
  english_pob_choice: I sent orders
  chosen_spanish: envié órdenes
  alternatives_spanish:
  - despaché órdenes
  - mandé
  lexicon: LSJ
  rationale: El verbo expresa envío, y el infinitivo de propósito aclara que se trató de una orden. «Envié órdenes» comunica de forma idiomática la acción mandataria.
- source_word: τοῦ ἐξᾶραι
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arrasar
  - para exterminar
  lexicon: LSJ
  rationale: El infinitivo indica extirpación o destrucción de los habitantes. «Destruir» es más formal y fiel que opciones más coloquiales o más fuertes que el griego permita con seguridad.
- source_word: τοὺς κατοικοῦντας Ἰούδα
  english_pob_choice: the inhabitants of Judah
  chosen_spanish: a los habitantes de Judá
  alternatives_spanish:
  - a los que habitaban en Judá
  - al pueblo que habitaba en Judá
  lexicon: LSJ
  rationale: La construcción participial se refiere a quienes vivían en la región. «Habitantes de Judá» es conciso, natural y conserva la referencia geográfica.
- source_word: διὰ κενῆς
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - por nada
  - en vano
  - sin motivo
  lexicon: LSJ
  rationale: La locución idiomática expresa ausencia de causa o fundamento. «Sin causa» reproduce bien el sentido y coincide con la revisión más natural del audit trail.
theological_decisions:
- issue: Caracterización moral de las acciones del hablante
  english_pob_reading: Rendered κακῶν as 'evils'
  chosen_spanish_reading: Traducir κακά como «males»
  alternative_spanish_readings:
  - maldades
  - cosas malas
  rationale: La frase presenta una confesión de culpa moral, no solo un error político. «Males» mantiene esa evaluación ética sin añadir una glosa doctrinal externa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado del texto inglés POB: se evita una expresión demasiado coloquial para ἐξᾶραι y se traduce διὰ κενῆς como «sin causa», no como «por nada» o «en vano». No se incluye nota al pie porque no hay marcador requerido en el texto final.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Judá» se conserva como topónimo/región según el contexto del participio κατοικοῦντας.
  - No se usa «Cristo», «Señor» ni otras equivalencias no presentes en el verso.
  - La puntuación reproduce el ritmo confesional de dos miembros coordinados por dos puntos.
