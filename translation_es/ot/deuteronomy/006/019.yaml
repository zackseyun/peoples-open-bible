review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: propósito (''para...''), expulsión/remoción de los enemigos, totalidad (''a todos tus enemigos''), el modismo מִפָּנֶיךָ, y el nombre divino ''Yahvé''. También preserva correctamente la fuerza no excesivamente interpretativa de דִּבֶּר como ''ha hablado''. Sin embargo, la nota b está mal formulada: presenta como alternativa exactamente la misma lectura principal (''ha hablado'') cuando, según la auditoría inglesa, la alternativa es ''habló''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Para expulsar de delante de ti a todos tus enemigos' suena bien y conserva el modismo con buena legibilidad. La puntuación y el registro son adecuados. La única falla real es editorial/paratextual en la nota b.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → ''Yahvé''; דִּבֶּר no se sobreinterpreta como ''prometió''; el modismo מִפָּנֶיךָ se mantiene con apoyo de nota. No hay conflicto con los términos doctrinales principales.'
  issues:
  - severity: medium
    issue: La nota b repite la lectura principal en vez de dar una alternativa real.
    rationale: 'El texto principal dice ''como Yahvé ha hablado[b]'', pero la nota b empieza ''O: «ha hablado»''. Según la auditoría inglesa, la alternativa es ''habló'', mientras ''ha hablado'' es la lectura principal escogida para expresar vigencia continua.'
  revised_spanish_text: para expulsar de delante de ti[a] a todos tus enemigos, como Yahvé ha hablado[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «de delante de ti», un modismo para quitar a los enemigos del camino o de la esfera de acción de alguien.'
    reason: cultural_note
  - marker: b
    text: 'O: «habló»; el verbo hebreo es literalmente «habló», con el sentido de una palabra divina previa que permanece en vigor.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota b para que presente una alternativa genuina y coincida con la evidencia fuente y la auditoría inglesa.
