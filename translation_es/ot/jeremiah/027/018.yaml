translation:
  language: es
  text: Pero si son profetas[a], y si la palabra de Yahvé está con ellos, que ahora rueguen a Yahvé de los ejércitos para que los utensilios restantes en la casa de Yahvé, en la casa del rey de Judá[c], y en Jerusalén no vayan a Babilonia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intercedan ante». El verbo hebreo puede significar rogar, suplicar o interceder.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «vengan a Babilonia»; en español se expresa con naturalidad como «vayan a Babilonia» desde la perspectiva del hablante.'
    reason: lexical_alternative
  - marker: c
    text: O «el palacio del rey de Judá» para «la casa del rey de Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: El hebreo introduce una condición en contraste con la afirmación anterior; «Pero si» conserva el matiz adversativo y el condicional.
- source_word: נְבִאִים
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - vaticinadores
  - nabíes
  lexicon: HALOT
  rationale: Es el equivalente natural y fiel para נביאים en español bíblico contemporáneo.
- source_word: דְּבַר יְהוָה אִתָּם
  english_pob_choice: the word of Yahweh is with them
  chosen_spanish: la palabra de Yahvé está con ellos
  alternatives_spanish:
  - tienen la palabra de Yahvé
  - la palabra de Yahvé está realmente con ellos
  lexicon: HALOT
  rationale: «Está con ellos» sigue de cerca la expresión hebrea y evita suavizarla a una formulación más interpretativa.
- source_word: יִפְגְּעוּ נָא בַּיהוָה צְבָאוֹת
  english_pob_choice: let them now plead with the LORD of hosts
  chosen_spanish: que ahora rueguen a Yahvé de los ejércitos
  alternatives_spanish:
  - que ahora intercedan ante Yahvé de los ejércitos
  - que ahora suplican a Yahvé de los ejércitos
  lexicon: HALOT
  rationale: פגע con ב puede significar rogar, suplicar o interceder. «Rueguen» comunica bien la petición urgente y mantiene el sentido intercesor sin tecnicismo innecesario. «Ahora» refleja נָא.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término del proyecto para el nombre divino en español.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: Se conserva la imagen bélica/celestial de צבאות. «De los ejércitos» es claro y corresponde al título.
- source_word: לְבִלְתִּי בֹאוּ
  english_pob_choice: that ... may not go
  chosen_spanish: para que ... no vayan
  alternatives_spanish:
  - para impedir que ... vayan
  - a fin de que ... no vayan
  lexicon: HALOT
  rationale: La construcción de finalidad negativa se expresa con naturalidad en español mediante «para que ... no vayan».
- source_word: הַכֵּלִים הַנּוֹתָרִים
  english_pob_choice: the vessels remaining
  chosen_spanish: los utensilios restantes
  alternatives_spanish:
  - los vasos restantes
  - los objetos restantes
  lexicon: HALOT
  rationale: כֵּלִים abarca utensilios, vasos o vasijas según el contexto. «Utensilios» preserva amplitud referencial y funciona bien para objetos del templo y del palacio.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: «Casa» mantiene la correspondencia formal con בֵּית; «templo» sería más interpretativo.
- source_word: וּבֵית מֶלֶךְ יְהוּדָה
  english_pob_choice: in the house of the king of Judah
  chosen_spanish: en la casa del rey de Judá
  alternatives_spanish:
  - en el palacio del rey de Judá
  lexicon: HALOT
  rationale: Se conserva la repetición de «casa» del hebreo; «palacio» es una alternativa contextual posible, pero menos ajustada al paralelismo.
- source_word: וּבִירוּשָׁלַם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y desde Jerusalén
  lexicon: HALOT
  rationale: Es una coordinación locativa directa y transparente.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  lexicon: HALOT
  rationale: La he direccional se expresa de forma idiomática en español con «a Babilonia».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. En el español del proyecto se adopta «Yahvé» para preservar el nombre pactual sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: יִפְגְּעוּ נָא בַּיהוָה צְבָאוֹת
  english_pob_reading: let them now plead with the LORD of hosts
  chosen_spanish_reading: que ahora rueguen a Yahvé de los ejércitos
  alternative_spanish_readings:
  - que ahora intercedan ante Yahvé de los ejércitos
  - que ahora le supliquen a Yahvé de los ejércitos
  rationale: El desafío del versículo pide una súplica eficaz; «rueguen» retiene el sentido de petición/intercesión sin cargar el pasaje con un tecnicismo eclesiástico ajeno al hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se reportaron cambios necesarios y el veredicto de concordancia fue alto. Se mantuvo la estructura condicional, el valor intercesor de פגע y la direccionalidad de בָּבֶלָה con adaptación idiomática al español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton y «Yahvé de los ejércitos» para el título divino.
  - Se conserva «casa» para בֵּית por paralelismo formal en ambos lugares.
  - «Utensilios» se usa como término amplio para כֵּלִים, compatible con objetos del templo y del palacio.
  - La dirección hacia Babilonia se expresa con «a», como equivalente idiomático de la he direccional hebrea.
