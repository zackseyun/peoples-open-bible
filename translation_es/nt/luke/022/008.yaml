translation:
  language: es
  text: 'Y envió a Pedro y a Juan[a], diciendo: «Vayan y preparen para nosotros la Pascua, para que la comamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cena de Pascua»; el griego puede referirse a la Pascua en sentido más amplio, aunque aquí el contexto de preparación y de comer apunta a la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El verbo básico de ἀποστέλλω aquí expresa el envío de dos discípulos; «envió» reproduce con naturalidad esa acción narrativa sin añadir matiz de autoridad excesivo. «Mandó» podría sonar más directivo que el griego, y «despachó» resulta poco natural en español bíblico contemporáneo.
- source_word: εἰπών
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el discurso dependiente. «Diciendo» conserva la relación participial del griego y es idiomático en español; «y dijo» suaviza la estructura, pero desplaza el enlace sintáctico que el texto fuente mantiene.
- source_word: Πορευθέντες
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan al ir
  - Después de ir
  - Pónganse en camino
  lexicon: BDAG
  rationale: Aunque formalmente es un participio aoristo, aquí funciona como mandato concomitante. En español, «Vayan» comunica mejor el valor imperativo que «habiendo ido» o «después de ir», que resultarían forzados. «Pónganse en camino» añade una orientación no explícita en el griego.
- source_word: ἑτοιμάσατε
  english_pob_choice: prepare
  chosen_spanish: preparen
  alternatives_spanish:
  - alisten
  - dejen listo
  lexicon: BDAG
  rationale: El imperativo pide preparación concreta para la comida ritual. «Preparen» es claro, sobrio y suficientemente amplio. «Alisten» y «dejen listo» son posibles, pero son menos precisos o más coloquiales.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros todos
  - en favor nuestro
  lexicon: BDAG
  rationale: El dativo de beneficio se expresa naturalmente con «para nosotros». No conviene ampliar a «todos» porque el griego no lo explicita; «en favor nuestro» es correcto pero menos directo en este contexto.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la cena de Pascua
  - el cordero de Pascua
  lexicon: BDAG
  rationale: En español, «Pascua» es la forma más natural y fiel para πάσχα. Como en el texto inglés, se preserva la amplitud del término sin decidir de antemano si se refiere al conjunto pascual o al alimento específico; el contexto de preparación y de comer orienta hacia la comida, pero el término se mantiene abierto.
- source_word: ἵνα φάγωμεν
  english_pob_choice: so that we may eat it
  chosen_spanish: para que la comamos
  alternatives_spanish:
  - para que podamos comerla
  - a fin de comerla
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. «Para que la comamos» comunica esa finalidad con fluidez y mantiene el referente implícito de la Pascua. «Para que podamos comerla» explicita posibilidad/permiso, pero el griego aquí enfatiza propósito más que capacidad.
theological_decisions:
- issue: Alcance de τὸ πάσχα
  english_pob_reading: the Passover, without specifying whether this denotes the meal as a whole or a narrower sacrificial element.
  chosen_spanish_reading: la Pascua, sin especificar si abarca la fiesta, la comida o el elemento sacrificial concreto.
  alternative_spanish_readings:
  - la cena de Pascua
  - el cordero de Pascua
  rationale: El término griego puede abarcar más de una referencia dentro del marco pascual. Mantener «la Pascua» preserva la tensión documental y evita resolver prematuramente lo que el contexto inmediato sugiere pero no define de forma exclusiva.
  doctrine_reference: 'Principio POB: conservar la amplitud semántica donde el texto la mantiene.'
- issue: Relación entre el mandato y el propósito
  english_pob_reading: Go and prepare ... so that we may eat it.
  chosen_spanish_reading: Vayan y preparen ... para que la comamos.
  alternative_spanish_readings:
  - Vayan, preparen ... para comerla
  - Vayan y alístense ...
  rationale: El griego enlaza un mandato de acción con una finalidad explícita. La redacción española conserva ambos elementos sin convertir el propósito en simple explicación narrativa ni desplazar el foco a la preparación de los discípulos mismos.
  doctrine_reference: 'Principio POB: reflejar la estructura del texto fuente cuando sea posible y natural.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren ajustes de revisión; se conserva la lectura abierta de πάσχα y la función de propósito de ἵνα sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se usa «Pascua» para πάσχα, en coherencia con el estilo POB y con la amplitud semántica observada en el audit trail inglés.
  - Se usa «Vayan» para el participio Πορευθέντες, siguiendo su valor de mandato concomitante y evitando una traducción participial rígida.
  - Se evita «Cristo», «SEÑOR» u otros sustitutos no presentes en el versículo.
  - La nota textual se ancla en «Pascua» porque ese es el punto de ambigüedad lexical documentado en el audit trail.
