- from: La altivez del hombre será abatida[a], y la exaltación de los hombres será humillada; y Yahvé será exaltado solo en aquel día.
  to: La altivez del hombre será abatida[a], y la exaltación de los hombres será humillada; y solo Yahvé será exaltado en aquel día.
  rationale: Se conserva el texto principal casi intacto porque es fiel al hebreo y al POB, pero se mejora la colocación de «solo» para expresar con más claridad la exclusividad de Yahvé. Además, se corrige la nota al pie para que refleje realmente la alternativa léxica documentada en el inglés POB, introduciendo «orgullo» como equivalente explicativo del matiz de arrogancia humana.
