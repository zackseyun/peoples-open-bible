translation:
  language: es
  text: A la sombra de Hesbón se quedan parados, sin fuerzas, los fugitivos[a], porque un fuego ha salido de Hesbón, y una llama de en medio de Sihón[b]; ha consumido el extremo de Moab[c] y la coronilla de los hijos de tumulto[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se detuvieron por falta de fuerzas». El hebreo puede entenderse también como pasado, y la expresión indica falta de fuerza.
    reason: lexical_alternative
  - marker: b
    text: O «de entre Sihón». «Sihón» puede funcionar metonímicamente por la ciudad o el reino asociado con él.
    reason: lexical_alternative
  - marker: c
    text: O «el borde de Moab». El hebreo «esquina» es una imagen poética para un extremo o límite.
    reason: lexical_alternative
  - marker: d
    text: O «los hijos de estruendo» / «los hijos de ruido».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֵל
  english_pob_choice: in the shadow of
  chosen_spanish: A la sombra de
  alternatives_spanish:
  - Bajo la sombra de
  - En la sombra de
  lexicon: HALOT
  rationale: צֵל designa sombra o sombra/protección. «A la sombra de» conserva la imagen concreta del hebreo y suena natural en español bíblico contemporáneo.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Hesbón
  alternatives_spanish:
  - Heshbón
  lexicon: Nombre propio bíblico
  rationale: Se translitera el nombre propio en forma reconocible para el lector hispanohablante, manteniendo la referencia geográfica.
- source_word: עָמְדוּ
  english_pob_choice: stand
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - estuvieron en pie
  - se quedaron
  lexicon: HALOT
  rationale: El perfecto qal puede leerse de modo vívido en un contexto poético. En español, «se detuvieron» comunica la imagen de los fugitivos que quedan parados, sin forzar un presente extraño.
- source_word: מִכֹּחַ
  english_pob_choice: without strength
  chosen_spanish: '[a] sin fuerzas'
  alternatives_spanish:
  - por falta de fuerzas
  - exhaustos
  lexicon: HALOT
  rationale: La construcción expresa privación de fuerza. «Sin fuerzas» reproduce la fuerza idiomática con naturalidad, sin perder la lectura alternativa de falta de capacidad.
- source_word: נָסִים
  english_pob_choice: the fugitives
  chosen_spanish: los fugitivos
  alternatives_spanish:
  - los que huían
  - los refugiados
  lexicon: HALOT
  rationale: El participio de נוס señala a quienes huyen. «Los fugitivos» mantiene el valor lexical y el tono judicial/poético del pasaje.
- source_word: אֵשׁ יָצָא מֵחֶשְׁבּוֹן
  english_pob_choice: a fire has gone out from Heshbon
  chosen_spanish: un fuego ha salido de Hesbón
  alternatives_spanish:
  - un fuego salió de Hesbón
  - un fuego ha brotado de Hesbón
  lexicon: HALOT
  rationale: יצא conserva la imagen de algo que sale o se expande desde un lugar. «Ha salido» sigue de cerca el hebreo y funciona bien en español profético.
- source_word: וְלֶהָבָה
  english_pob_choice: and a flame
  chosen_spanish: y una llama
  alternatives_spanish:
  - y un resplandor de fuego
  - y una hoguera
  lexicon: HALOT
  rationale: לֶהָבָה es una llama o lengüeta de fuego. «Llama» es la equivalencia más directa y clara en español.
- source_word: מִבֵּין סִיחוֹן
  english_pob_choice: from the midst of Sihon
  chosen_spanish: de en medio de Sihón[b]
  alternatives_spanish:
  - del medio de Sihón
  - de entre Sihón[b]
  lexicon: HALOT
  rationale: מִבֵּין puede ser «de en medio de» o «de entre». Se conserva la imagen espacial del hebreo y la posible referencia metonímica al reino o ciudad asociada con Sihón.
- source_word: וַתֹּאכַל
  english_pob_choice: it has consumed
  chosen_spanish: ha consumido
  alternatives_spanish:
  - consumió
  - ha devorado
  lexicon: HALOT
  rationale: El verbo de fuego expresa destrucción total. «Ha consumido» mantiene el paralelismo y el aspecto resultativo que la traducción inglesa también privilegió.
- source_word: פְּאַת מוֹאָב
  english_pob_choice: the corner of Moab
  chosen_spanish: el extremo de Moab[c]
  alternatives_spanish:
  - la esquina de Moab[c]
  - el borde de Moab[c]
  lexicon: HALOT
  rationale: פֵּאָה puede significar esquina, borde o extremidad. «Extremo» comunica bien la idea poética de un límite o confín sin sonar artificial en español.
- source_word: וְקָדְקֹד
  english_pob_choice: the crown of the head
  chosen_spanish: la coronilla
  alternatives_spanish:
  - la cima de la cabeza
  - la parte alta de la cabeza
  lexicon: HALOT
  rationale: קָדְקֹד designa la coronilla o parte superior de la cabeza. «Coronilla» es breve, idiomático y visual.
- source_word: בְּנֵי שָׁאוֹן
  english_pob_choice: the sons of tumult
  chosen_spanish: los hijos de tumulto[d]
  alternatives_spanish:
  - los hijos de estruendo[d]
  - los hijos de algarabía[d]
  lexicon: HALOT
  rationale: Se conserva el paralelismo figurado del hebreo, traduciendo literalmente בְּנֵי שָׁאוֹן. «Tumulto» mantiene el sentido de ruido, agitación y estruendo sin trivializar la imagen.
theological_decisions:
- issue: Renderizar el lenguaje de juicio poético sin suavizar su alcance destructivo
  english_pob_reading: A fire has gone out from Heshbon, and a flame from the midst of Sihon; it has consumed the corner of Moab and the crown of the head of the sons of tumult.
  chosen_spanish_reading: un fuego ha salido de Hesbón, y una llama de en medio de Sihón; ha consumido el extremo de Moab y la coronilla de los hijos de tumulto.
  alternative_spanish_readings:
  - un fuego salió de Hesbón...
  - ha devorado...
  rationale: El verso es una imagen profética de devastación. «Ha consumido» conserva el carácter total del juicio sin intensificarlo más allá del hebreo, y mantiene el tono poético del pasaje.
  doctrine_reference: Profecía de juicio; lenguaje figurado de devastación en Jeremías
- issue: Mantener la posible lectura metonímica de Sihón
  english_pob_reading: from the midst of Sihon; Sihon may stand metonymically for the city or realm associated with him.
  chosen_spanish_reading: de en medio de Sihón
  alternative_spanish_readings:
  - de entre Sihón
  - desde Sihón
  rationale: El hebreo permite que Sihón nombre no solo a la persona, sino la esfera o ciudad vinculada con él. La traducción conserva la ambigüedad sin resolverla de manera interpretativa.
  doctrine_reference: Lectura poética/metonímica del nombre propio
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés, manteniendo las cuatro tensiones léxicas principales del verso: מִכֹּחַ, מִבֵּין סִיחוֹן, פְּאַת, y בְּנֵי שָׁאוֹן. No se introdujeron revisiones adicionales respecto del texto base inglés; la formulación española busca equivalencia óptima con estilo bíblico moderno.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el Tetragrámaton.
  - Se prefirió «Hesbón» y «Sihón» como transliteraciones consistentes en español.
  - Se conservó el carácter figurado de la poesía hebrea sin convertirla en prosa explicativa.
  - Los marcadores de nota [a]-[d] están anclados en el texto exactamente donde opera la ambigüedad léxica.
