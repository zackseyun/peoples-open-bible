    rationale: El expediente léxico inglés privilegia ‘contribution’ para distinguir estos materiales de una ofrenda sacrificial. En español, ‘contribución’ preserva mejor el matiz de aportes para la obra del tabernáculo, mientras que ‘ofrenda’ puede sonar más cultual de lo que exige el contexto inmediato.
