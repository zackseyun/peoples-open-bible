translation:
  language: es
  text: En el tercer año de Ciro, rey de Persia, una palabra fue revelada a Daniel, que también era llamado Beltsasar. La palabra era verdadera, y se refería a un gran conflicto[a]; y él comprendió la palabra y tuvo entendimiento en la visión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'y una gran guerra'. La frase hebrea también puede verterse de manera más formal en términos militares.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - un asunto
  lexicon: HALOT
  rationale: 'דָּבָר tiene un campo semántico amplio: ''palabra'', ''mensaje'' y ''asunto''. Aquí introduce el contenido revelado, así que ''una palabra'' conserva el paralelismo con el hebreo y con la decisión inglesa, sin perder naturalidad en español.'
- source_word: נִגְלָה
  english_pob_choice: was revealed
  chosen_spanish: fue revelada
  alternatives_spanish:
  - fue dada a conocer
  - fue descubierta
  lexicon: HALOT
  rationale: El nifal de גלה expresa algo que queda descubierto o revelado. 'Fue revelada' es la forma más directa y fiel para una comunicación divina.
- source_word: נִקְרָא שְׁמוֹ
  english_pob_choice: who was called
  chosen_spanish: a quien se llamaba
  alternatives_spanish:
  - cuyo nombre era
  - que era llamado
  lexicon: HALOT
  rationale: La construcción pasiva identifica a Daniel por su nombre babilónico. 'A quien se llamaba' suena natural en español y conserva el sentido del pasivo nominal.
- source_word: בֵּלְטְשַׁאצַּר
  english_pob_choice: Belteshazzar
  chosen_spanish: Beltsasar
  alternatives_spanish:
  - Belsasar
  lexicon: Convención de transliteración bíblica
  rationale: Se translitera el nombre propio conforme al uso español bíblico habitual, manteniendo la identificación del personaje sin adaptar el nombre a una forma interpretativa.
- source_word: וֶאֱמֶת הַדָּבָר
  english_pob_choice: The word was true
  chosen_spanish: La palabra era verdadera
  alternatives_spanish:
  - El mensaje era verdadero
  - El asunto era verdadero
  lexicon: HALOT
  rationale: La cláusula afirma la veracidad de la revelación. 'Era verdadera' conserva la concisión hebrea y mantiene visible el repetido דָּבָר.
- source_word: וְצָבָא גָדוֹל
  english_pob_choice: it concerned a great conflict
  chosen_spanish: se refería a un gran conflicto
  alternatives_spanish:
  - y una gran guerra
  - y una gran hostilidad
  - y un gran ejército
  lexicon: HALOT
  rationale: צָבָא puede significar ejército, guerra, servicio militar o, por extensión, conflicto. En este contexto apocalíptico, 'gran conflicto' expresa bien la carga del pasaje sin forzar un término militar demasiado estrecho. La alternativa más formal queda reflejada implícitamente en las opciones.
- source_word: וּבִין
  english_pob_choice: he understood
  chosen_spanish: él comprendió
  alternatives_spanish:
  - él discernió
  - él entendió
  lexicon: HALOT
  rationale: El qal de בין aquí indica captar o discernir el mensaje. 'Comprendió' es natural en español y conserva la fuerza cognitiva.
- source_word: וּבִינָה ל֖וֹ
  english_pob_choice: had understanding
  chosen_spanish: tuvo entendimiento
  alternatives_spanish:
  - recibió entendimiento
  - había entendimiento para él
  lexicon: HALOT
  rationale: La combinación nominal expresa posesión o recepción de entendimiento. 'Tuvo entendimiento' refleja de manera directa el hebreo y evita una paráfrasis demasiado libre.
- source_word: בַּמַּרְאֶה
  english_pob_choice: in the vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en la apariencia
  - mediante la visión
  lexicon: HALOT
  rationale: En el contexto profético de Daniel, מַרְאֶה se entiende mejor como 'visión'. Esa elección coincide con el uso bíblico natural en español y con el contexto revelatorio.
theological_decisions:
- issue: Sentido de צָבָא גָדוֹל en una revelación apocalíptica
  english_pob_reading: it concerned a great conflict
  chosen_spanish_reading: se refería a un gran conflicto
  alternative_spanish_readings:
  - y una gran guerra
  - y un gran ejército
  rationale: El hebreo es semánticamente difícil. En Daniel 10–12 el foco está en una lucha prolongada, tanto celestial como terrenal; por eso 'gran conflicto' comunica mejor el sentido global de la revelación que un sustantivo militar rígido. Se evita convertir el término en 'ejército' porque eso estrecharía indebidamente el alcance del pasaje.
  doctrine_reference: Daniel 10–12; lectura contextual apocalíptica
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB al mantener el final como una afirmación directa de comprensión en la visión. También conserva la decisión interpretativa de traducir צָבָא גָדוֹל como 'gran conflicto', en vez de una formulación exclusivamente militar.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando aparezca el nombre divino; aquí no ocurre.
  - '''Beltsasar'' se mantiene como transliteración española consistente del nombre babilónico.'
  - Se conserva la repetición de 'palabra' para reflejar el hebreo דָּבָר en dos miembros del versículo.
  - La puntuación separa claramente la cláusula de veracidad y la de conflicto, siguiendo la estructura del hebreo y del audit trail inglés.
