revisions:
- from: Y al oírlo[a], se enojó. Pero en cuanto lo oyó, levantó el campamento y fue a Ptolemaida, y escribió a Jonatán que no siguiera el sitio, sino que lo encontrara en Ptolemaida lo antes posible[b], para conferenciar con él.
  to: Y al oírlo, se indignó. Pero en cuanto lo oyó, inmediatamente levantó el campamento y fue a Ptolemaida, y escribió a Jonatán que no continuara el asedio[a], sino que fuera a encontrarse con él en Ptolemaida lo antes posible[b], para conferenciar con él.
  rationale: Se revisa para preservar explícitamente εὐθέως (‘inmediatamente’), para expresar con más precisión la convocatoria a una reunión (‘fuera a encontrarse con él’) y para usar ‘asedio’, que comunica mejor el sentido militar de περικαθῆσθαι en español general. También se corrigen las notas para alinearlas con las decisiones léxicas documentadas en el POB inglés.
  reviewer_model: gpt-5.4
