translation:
  language: es
  text: En el año trigésimo séptimo de Joás, rey de Judá[a], comenzó a reinar Jehoás, hijo de Jehoacaz, sobre Israel en Samaria, y reinó dieciséis años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo distingue al rey de Judá יוֹאָשׁ (Joás) del rey de Israel יְהוֹאָשׁ (Jehoás); en la tradición española ambos nombres pueden confundirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים וָ/שֶׁ֨בַע֙ שָׁנָ֔ה
  english_pob_choice: In the thirty-seventh year
  chosen_spanish: En el año treinta y siete
  alternatives_spanish:
  - En el año treinta y siete de reinado
  - En el año trigésimo séptimo
  lexicon: HALOT
  rationale: La fórmula hebrea es una datación de sincronismo real. En español natural, ‘En el año treinta y siete’ reproduce el valor idiomático sin forzar una paráfrasis excesiva; ‘trigésimo séptimo’ también es posible, pero menos directo en este contexto.
- source_word: לְ/יוֹאָשׁ מֶ֣לֶךְ יְהוּדָ֑ה
  english_pob_choice: of Joash king of Judah
  chosen_spanish: de Joás, rey de Judá
  alternatives_spanish:
  - de Jehoás, rey de Judá
  - del rey Joás de Judá
  lexicon: HALOT
  rationale: El hebreo usa ל para marcar el punto de referencia del sincronismo. ‘De Joás, rey de Judá’ expresa esa relación de manera natural. Se conserva ‘Joás’ aquí para la forma tradicional del rey de Judá, siguiendo la distinción auditada con el nombre del rey de Israel.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - reinó
  - se hizo rey
  lexicon: HALOT
  rationale: El verbo en fórmulas regnales suele tener sentido ingresivo. ‘Comenzó a reinar’ refleja mejor el inicio del gobierno que un simple ‘reinó’.
- source_word: יְהוֹאָ֨שׁ בֶּן יְהוֹאָחָ֤ז
  english_pob_choice: Jehoash son of Jehoahaz
  chosen_spanish: Jehoás, hijo de Jehoacaz
  alternatives_spanish:
  - Joás, hijo de Jehoacaz
  - Jehoás hijo de Jehoacaz
  lexicon: HALOT
  rationale: El nombre hebreo del rey de Israel distingue יְהוֹאָשׁ del יוֹאָשׁ de Judá. En español, ‘Jehoás’ ayuda a preservar esa distinción auditada por el POB inglés. ‘Jehoacaz’ sigue la forma usual para el padre.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - para Israel
  lexicon: HALOT
  rationale: Con מלך, עַל indica dominio o realeza sobre el pueblo. ‘Sobre Israel’ es la correspondencia más directa y mantiene la fuerza relacional del hebreo.
- source_word: בְּ/שֹׁ֣מְר֔וֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en Samaría
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. ‘En Samaria’ es claro y fiel, y conserva el nombre geográfico como centro del reino del norte.
- source_word: שֵׁ֥שׁ עֶשְׂרֵ֖ה שָׁנָֽה
  english_pob_choice: sixteen years
  chosen_spanish: por dieciséis años
  alternatives_spanish:
  - dieciséis años
  - durante dieciséis años
  lexicon: HALOT
  rationale: La frase final expresa duración de reinado. En español, ‘por dieciséis años’ comunica esa duración de manera natural y congruente con un aviso regnal.
theological_decisions:
- issue: Distinción entre los dos reyes llamados Joás/Jehoás
  english_pob_reading: English POB uses a footnote to preserve the Hebrew distinction between the Judean Joash and the Israelite Jehoash.
  chosen_spanish_reading: Se mantiene ‘Joás’ para el rey de Judá y ‘Jehoás’ para el rey de Israel, con nota explicativa.
  alternative_spanish_readings:
  - Usar ‘Joás’ para ambos
  - Usar ‘Jehoás’ para ambos
  rationale: La distinción no es doctrinal, pero sí textual e ისტორico-literaria; el POB la documenta para evitar confusión. La nota preserva la tensión onomástica del hebreo sin sobrecargar el cuerpo del texto.
  doctrine_reference: Nota lexical/textual sobre onomástica real
- issue: Valor ingresivo de מָלַךְ en fórmula de acceso al trono
  english_pob_reading: became king
  chosen_spanish_reading: comenzó a reinar
  alternative_spanish_readings:
  - reinó
  - fue hecho rey
  rationale: 'La lectura ingresiva respeta la función narrativa del verbo en la fórmula cronológica: señala el inicio del reinado, no solo la condición de rey.'
  doctrine_reference: Ninguna; decisión de aspecto verbal y fórmula histórica
translation_notes:
  revision_awareness: El contexto inglés indica alta concordancia y sin revisiones aplicadas; por ello la versión española sigue de cerca la estructura del hebreo y la decisión auditada del POB inglés, manteniendo la distinción nominal y el valor ingresivo de la fórmula regnal.
  spanish_consistency_notes:
  - Se usa ‘Joás’ para el rey de Judá y ‘Jehoás’ para el rey de Israel, manteniendo una diferencia visible en español.
  - ‘Comenzó a reinar’ conserva el inicio del reinado que el inglés POB captó con ‘became king’.
  - ‘Sobre Israel’ mantiene el sentido de dominio de עַל con מלך.
  - La duración final se expresa con ‘por dieciséis años’ para sonar natural en español bíblico contemporáneo.
