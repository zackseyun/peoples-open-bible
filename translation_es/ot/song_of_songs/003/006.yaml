- from: ¿Quién es esta que sube del desierto[a], como columnas de humo, perfumada con mirra y con incienso, desde todo polvo aromático del mercader?
  to: ¿Quién es esta que sube de la soledad[c], como columnas de humo[a], perfumada con mirra e incienso, con toda clase de polvos aromáticos del mercader?[b]
