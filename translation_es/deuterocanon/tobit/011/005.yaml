translation:
  language: es
  text: Y Ana estaba sentada mirando el camino por su hijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión griega es muy comprimida: literalmente, «mirando el camino, su hijo». El sentido es que Ana estaba pendiente del regreso de su hijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάθητο
  english_pob_choice: sat
  chosen_spanish: estaba sentada
  alternatives_spanish:
  - se sentaba
  - permanecía sentada
  lexicon: LSJ
  rationale: El imperfecto de κάθημαι expresa una acción/estado continuo. En español, «estaba sentada» comunica bien la postura sostenida sin sonar forzado; conserva la idea de permanencia más que un simple pretérito perfecto puntual.
- source_word: περιβλεπομένη
  english_pob_choice: watching
  chosen_spanish: mirando
  alternatives_spanish:
  - vigilando
  - observando
  - mirando alrededor
  lexicon: LSJ
  rationale: El participio sugiere una mirada atenta y expectante. «Mirando» es suficientemente amplio y natural en español; «vigilando» añadiría una intensidad no explicitada, y «mirando alrededor» desplazaría el énfasis hacia un movimiento espacial no requerido por el contexto.
- source_word: εἰς τὴν ὁδόν
  english_pob_choice: the road
  chosen_spanish: el camino
  alternatives_spanish:
  - la carretera
  - la ruta
  - el sendero
  lexicon: LSJ
  rationale: ὁδός aquí designa el trayecto por donde regresaría su hijo. «El camino» es la opción más natural y abarca tanto la idea de vía como de ruta sin modernizar en exceso ni estrechar el sentido a una carretera literal.
- source_word: τὸν παῖδα αὐτῆς
  english_pob_choice: for her son
  chosen_spanish: para su hijo
  alternatives_spanish:
  - por su hijo
  - a su hijo
  - por su muchacho
  lexicon: LSJ
  rationale: παῖς puede significar hijo, niño o muchacho. En este contexto, Tobías es su hijo varón que regresa de viaje, por lo que «su hijo» es la lectura contextual más clara. La preposición «para» reproduce bien la idea comprensiva de esperar con la mirada el retorno de él en el camino, como ya refleja el inglés auditado.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el pasaje mantiene un alto grado de acuerdo con la fuente griega; por eso la redacción sigue de cerca el texto de Swete, preservando la compresión sintáctica con una solución natural en español.
  spanish_consistency_notes:
  - Se usa «Ana» con ortografía española estándar para el nombre propio, concordando con el referente del texto.
  - Se mantiene la imagen concreta de «camino» para ὁδός, evitando abstraerlo como «la vía» o espiritualizarlo.
  - Se conserva el matiz expectante de la escena con un participio progresivo en español («estaba sentada, mirando»).
