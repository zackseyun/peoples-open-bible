translation:
  language: es
  text: Que Dios ensanche a Jafet[a], y que él habite en las tiendas de Sem, y que Canaán sea esclavo para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y que Dios habite en las tiendas de Sem»; alternativamente: «y que Jafet habite en las tiendas de Sem». El hebreo deja sin expresar el sujeto de «habite».'
    reason: alternative_reading
lexical_decisions:
- source_word: יַפְתְּ
  english_pob_choice: enlarge
  chosen_spanish: engrandezca
  alternatives_spanish:
  - haga grande
  - dé amplitud a
  lexicon: HALOT
  rationale: El jussivo expresa un deseo o bendición; «engrandezca» conserva la idea de ampliar o dar espacio y también mantiene el juego de palabras con el nombre Jafet mejor que una paráfrasis más vaga.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El verbo es singular y el contexto apunta al único Dios; en español, «Dios» es la forma natural y fiel.
- source_word: לְיֶפֶת
  english_pob_choice: Japheth
  chosen_spanish: a Jafet
  alternatives_spanish:
  - para Jafet
  - sobre Jafet
  lexicon: HALOT
  rationale: La preposición lamed se puede expresar idiomáticamente en español con «a» en este tipo de bendición/jussivo; se conserva el nombre propio en su forma habitual en español, Jafet.
- source_word: וְיִשְׁכֹּן
  english_pob_choice: may he dwell
  chosen_spanish: que él habite
  alternatives_spanish:
  - y que habite
  - que habite
  lexicon: HALOT
  rationale: El hebreo deja ambigua la identidad del sujeto; «que él habite» mantiene esa ambigüedad sin resolverla y suena natural en español de bendición.
- source_word: בְּאָהֳלֵי שֵׁם
  english_pob_choice: in the tents of Shem
  chosen_spanish: en las tiendas de Sem
  alternatives_spanish:
  - entre las tiendas de Sem
  - en los campamentos de Sem
  lexicon: HALOT
  rationale: «Tiendas» conserva la imagen concreta del hebreo y posibles resonancias relacionales; «Sem» es la forma usual en español.
- source_word: וִיהִי
  english_pob_choice: and let ... be
  chosen_spanish: y que sea
  alternatives_spanish:
  - y sea
  - y que llegue a ser
  lexicon: HALOT
  rationale: La forma jussiva continúa la secuencia volitiva; «y que sea» reproduce con naturalidad el sentido desiderativo.
- source_word: כְנַעַן
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canaan
  lexicon: HALOT
  rationale: Nombre propio en su forma castellana tradicional y reconocible.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: Se mantiene la fuerza lexical de עבד como relación de sujeción; «esclavo» evita suavizar el término y coincide con la elección auditada en inglés.
- source_word: לָמוֹ
  english_pob_choice: to them
  chosen_spanish: de ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: El sufijo plural se entiende mejor en español con referencia a los dos destinatarios del contexto inmediato; «de ellos» refleja la dependencia/subordinación expresada por la construcción en esta formulación castellana.
theological_decisions:
- issue: Sujeto ambiguo de «habite en las tiendas de Sem»
  english_pob_reading: The main text preserves the ambiguity with 'may he dwell,' without specifying whether the subject is God or Japheth.
  chosen_spanish_reading: El texto principal conserva la ambigüedad con «que él habite», sin especificar si el sujeto es Dios o Jafet.
  alternative_spanish_readings:
  - Que Dios habite en las tiendas de Sem.
  - Que Jafet habite en las tiendas de Sem.
  rationale: El hebreo permite ambas lecturas y la auditoría inglesa opta por no resolver la ambigüedad. En español se preserva la tensión con un pronombre impersonal; las alternativas se documentan en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; la presente versión sigue la auditoría inglesa y conserva la ambigüedad sintáctica del hebreo sin resolverla.
  spanish_consistency_notes:
  - Se usa «Jafet» y «Sem» como formas españolas habituales de los nombres propios.
  - Se mantiene «esclavo» para preservar la fuerza de עבד, conforme al criterio POB.
  - La nota a pie de página documenta la ambigüedad del sujeto del verbo «habite» para no ocultar una tensión real del texto.
  - La formulación volitiva con «Que...»/«y que...» reproduce el tono de bendición del hebreo.
