    issue: Sobretraducción de לָךְ como 'contra ti'
    rationale: El hebreo לָךְ en esta construcción se entiende mejor como dativo 'a ti'/'te'. 'Contra ti' añade una hostilidad explícita que el expediente inglés rechazó como sobreinterpretación contextual.
  - severity: medium
    issue: Marcador de nota en lugar incorrecto
    rationale: La nota [a] explica גִּלּוּלִים ('ídolos'), pero el marcador está puesto tras 'contra ti'. Debe anclarse en 'ídolos[a]'.
  - severity: low
    issue: Plural 'prostituciones' menos natural en español
    rationale: Aunque puede defenderse por intensidad, el hebreo puede verterse idiomáticamente en español con singular abstracto 'prostitución', que suena más natural y sigue el razonamiento del POB inglés.
