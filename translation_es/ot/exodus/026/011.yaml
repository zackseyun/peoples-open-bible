translation:
  language: es
  text: Harás cincuenta broches[a] de bronce, y pondrás los broches en las presillas[b], y unirás la tienda, de modo que sea una sola[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'broches de cobre'. El hebreo נְחֹשֶׁת puede referirse a cobre o a bronce, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'en los lazos'. El hebreo se refiere a los bucles o presillas donde encajan las piezas de sujeción.
    reason: lexical_alternative
  - marker: c
    text: Es decir, las partes separadas han de formar una sola tienda unificada.
    reason: cultural_note
lexical_decisions:
- source_word: קַרְסֵי נְחֹשֶׁת
  english_pob_choice: bronze clasps
  chosen_spanish: broches de bronce
  alternatives_spanish:
  - grapas de bronce
  - abrazaderas de bronce
  - ganchos de bronce
  lexicon: HALOT
  rationale: קַרְסִים son piezas de sujeción para unir las cortinas; en español, 'broches' comunica mejor la función de fijación que 'ganchos', y mantiene naturalidad en el contexto constructivo. נְחֹשֶׁת puede ser cobre o bronce; aquí se conserva 'bronce' por la opción contextual tradicional en la metalistería del tabernáculo.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - '50'
  lexicon: Valor cardinal básico
  rationale: Se conserva el número cardinal de forma directa y natural en español.
- source_word: וְהֵבֵאתָ אֶת הַקְּרָסִים בַּלֻּלָאֹת
  english_pob_choice: put the clasps into the loops
  chosen_spanish: pondrás los broches en los anillos
  alternatives_spanish:
  - meterás los broches en los anillos
  - insertarás los broches en los anillos
  - pondrás los broches en los lazos
  lexicon: HALOT
  rationale: El hebreo expresa llevar/colocar las piezas en su lugar. 'Pondrás' es el equivalente español más natural y suficiente. Para לֻלָאֹת, 'anillos' es la opción más prudente y legible en castellano, aunque 'lazos' o 'ojales' también podrían sugerir la idea de loops; se evita forzar una imagen más específica de la que el contexto inmediato garantiza.
- source_word: וְחִבַּרְתָּ אֶת הָאֹהֶל
  english_pob_choice: join the tent together
  chosen_spanish: unirás la tienda
  alternatives_spanish:
  - juntarás la tienda
  - fijarás la tienda
  - unirás el tabernáculo
  lexicon: HALOT
  rationale: חבר indica unir o conectar. 'Tienda' traduce הָאֹהֶל de forma directa y coherente con el texto hebreo; 'tabernáculo' sería más interpretativo y menos literal en esta cláusula. Se evita redundar con 'juntos' porque 'unirás' ya comunica la acción de ensamblaje.
- source_word: וְהָיָה אֶחָד
  english_pob_choice: so that it may be one
  chosen_spanish: de modo que sea una sola
  alternatives_spanish:
  - y será uno
  - para que sea uno
  - y quedará unida
  lexicon: HALOT
  rationale: La frase hebrea expresa el resultado de la unión de las piezas. En español, 'de modo que' hace explícita la relación de परिणाम/resultado sin añadir contenido ajeno. 'Una sola' mantiene la idea de unidad de la estructura en un castellano idiomático.
theological_decisions:
- issue: Unidad resultante de las partes de la tienda
  english_pob_reading: That is, the separate sections are to form one unified tent.
  chosen_spanish_reading: Es decir, las partes separadas han de formar una sola tienda unificada.
  alternative_spanish_readings:
  - para que quede una sola
  - para que sea una sola
  rationale: 'El hebreo concluye con una unidad resultante, no con una abstracción doctrinal. Se conserva la idea técnica de ensamblaje: múltiples secciones llegan a constituir una sola estructura. La formulación evita interpretar más allá del propio texto.'
  doctrine_reference: Exodo 26:11; unidad estructural del tabernáculo
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, manteniendo la función de sujeción de קַרְסִים, la ambigüedad material de נְחֹשֶׁת, el valor resultativo de וְהָיָה אֶחָד y el sentido constructivo de unir las piezas en una sola estructura.
  spanish_consistency_notes:
  - Se usa 'tienda' para הָאֹהֶל por fidelidad al hebreo y coherencia con el texto constructivo.
  - Se usa 'broches' como término funcional para קַרְסִים, evitando 'ganchos' por ser menos preciso en este contexto.
  - Se mantiene 'bronce' como renderización contextual de נְחֹשֶׁת, con nota que preserva la alternativa 'cobre'.
  - Se conserva una sintaxis natural en español sin perder la secuencia de acciones del original.
