  lexicon: nombre propio
  rationale: 'Es un nombre propio hebreo y se translitera, no se traduce. Se adapta a la ortografía y acentuación española para facilitar la lectura: la forma inglesa ''Ishpan'' se vuelve ''Ispán'', manteniendo la base sonora aproximada del hebreo.'
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Éber
