translation:
  language: es
  text: 'Los guardas de las puertas: los hijos de Sallum[a], los hijos de Ater, los hijos de Talmón, los hijos de Acub, los hijos de Hatita, los hijos de Sobai, 138.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En hebreo, 'hijos de' puede designar una línea familiar o clan, no solo hijos varones inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: The gatekeepers
  chosen_spanish: Los guardas de las puertas
  alternatives_spanish:
  - Los porteros
  - Los guardianes de las puertas
  lexicon: HALOT
  rationale: En este contexto de lista censal/comunitaria, el hebreo se refiere a quienes custodian las puertas. 'Guardas de las puertas' conserva la función y suena natural en español bíblico moderno; 'porteros' puede sugerir solo un oficio doméstico, y 'guardianes' es más general.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la familia de
  lexicon: HALOT
  rationale: Sigue de cerca la estructura genealógica del hebreo. En listas postexílicas, 'hijos de' puede abarcar más que hijos inmediatos, pero mantiene la forma del registro original.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Sallum
  alternatives_spanish:
  - Shallum
  lexicon: convención onomástica bíblica en español
  rationale: Se adopta la forma tradicional en español 'Sallum', bien establecida en uso bíblico. La aspiración inicial no suele mantenerse en español para este nombre.
- source_word: אָטֵר
  english_pob_choice: Ater
  chosen_spanish: Ater
  lexicon: convención onomástica bíblica en español
  rationale: Nombre propio transliterado de manera estándar y reconocible en español.
- source_word: טַלְמֹן
  english_pob_choice: Talmon
  chosen_spanish: Talmón
  alternatives_spanish:
  - Talmon
  lexicon: convención onomástica bíblica en español
  rationale: Se mantiene el nombre propio con acento gráfico para reflejar la prosodia española y evitar lectura errónea.
- source_word: עַקּוּב
  english_pob_choice: Akkub
  chosen_spanish: Acub
  alternatives_spanish:
  - Akkub
  lexicon: convención onomástica bíblica en español
  rationale: Se usa la forma hispánica habitual 'Acub', más natural en español bíblico que la duplicación consonántica inglesa.
- source_word: חֲטִיטָא
  english_pob_choice: Hatita
  chosen_spanish: Hatita
  alternatives_spanish:
  - Jatita
  lexicon: convención onomástica bíblica en español
  rationale: Se conserva la transliteración simple del nombre; 'Jatita' sería una adaptación fonética menos transparente frente al hebreo.
- source_word: שֹׁבָי
  english_pob_choice: Shobai
  chosen_spanish: Sobai
  alternatives_spanish:
  - Shobai
  lexicon: convención onomástica bíblica en español
  rationale: Se adapta la inicial שׁ al uso español sin 'sh', resultando en una forma más natural y legible.
- source_word: מֵאָה שְׁלֹשִׁים וּשְׁמֹנָה
  english_pob_choice: '138'
  chosen_spanish: '138'
  alternatives_spanish:
  - ciento treinta y ocho
  lexicon: HALOT
  rationale: El hebreo suma 138. En una lista censal, la cifra arábiga es clara y fiel; la forma en palabras también sería válida, pero menos compacta.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría; la versión inglesa reciente se mantiene sin cambios y el acuerdo de revisión es alto.
  spanish_consistency_notes:
  - Se mantiene la estructura enumerativa del hebreo sin expandirla con explicaciones en el texto principal.
  - Se conserva el numeral final en cifras, como corresponde a una lista de censo.
  - Los nombres propios se hispanizan solo cuando existe una forma bíblica española asentada o una adaptación clara de lectura.
  - La nota sobre 'hijos de' preserva la tensión lexical del hebreo sin convertirla en paráfrasis.
