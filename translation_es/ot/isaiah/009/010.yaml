translation:
  language: es
  text: Yahvé levantó[a] a los adversarios de Rezín contra él, y agitó a sus enemigos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo fuerte», «puso en alto» o «exaltó» a los adversarios de Rezín contra él.
    reason: lexical_alternative
  - marker: b
    text: El hebreo conserva el pronombre singular («contra él ... sus enemigos»); el contexto amplio identifica al destinatario como el reino del norte/Efraín.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׂגֵּב
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - exaltó
  - fortaleció
  - puso en alto
  lexicon: HALOT
  rationale: El verbo causativo de שׂגב admite la idea de hacer fuerte, poner en alto o exaltar. En este contexto de juicio, con sujetos hostiles como objeto, «levantó» comunica mejor que Yahvé los hizo surgir o los impulsó contra él, sin sugerir honor.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: צָרֵי רְצִין
  english_pob_choice: the adversaries of Rezin
  chosen_spanish: los adversarios de Rezín
  alternatives_spanish:
  - los enemigos de Rezín
  - los opositores de Rezín
  lexicon: HALOT
  rationale: La construcción expresa literalmente los adversarios o enemigos de Rezín. «Adversarios» evita repetir «enemigos» de inmediato y mantiene el matiz hostil.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - en su contra
  lexicon: HALOT
  rationale: Con acción hostil, עַל suele equivaler a «contra». Se conserva el pronombre singular masculino para no especificar más de lo que dice el hebreo.
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - sus foes
  lexicon: HALOT
  rationale: Es la equivalencia natural de אויבים con sufijo posesivo. «Sus enemigos» suena claro y directo en español contemporáneo.
- source_word: יְסַכְסֵךְ
  english_pob_choice: stirred up
  chosen_spanish: agitó
  alternatives_spanish:
  - incitó
  - provocó
  - instigó
  lexicon: HALOT
  rationale: El verbo סכסך denota incitar, provocar o sembrar conflicto. «Agitó» conserva la idea de impulsar hostilidad y funciona bien en español, sin perder fuerza judicial.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio de Dios en vez de una sustitución reverencial, siguiendo la política del proyecto para יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referente del pronombre singular
  english_pob_reading: Retain the Hebrew singular pronoun as 'him/his' without expanding to a named referent in the main text.
  chosen_spanish_reading: Conservar «él / sus» sin explicitar el referente en el texto principal.
  alternative_spanish_readings:
  - contra Israel
  - contra Efraín
  - contra él, es decir, Israel/Efraín
  rationale: El hebreo conserva pronombres singulares; aunque el contexto amplio apunta al reino del norte/Efraín, el versículo no lo nombra. Mantener la ambigüedad evita añadir información no explícita en la fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve ambiguity where the source is genuinely ambiguous'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje se mantiene en alto acuerdo con el audit trail en inglés. Se conservaron la ambigüedad del pronombre singular y la elección no sustitutiva del nombre divino.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton, de acuerdo con la terminología base del proyecto.
  - Se prefirió «adversarios» para צָרֵי y «enemigos» para אֹיְבָיו para evitar una repetición innecesaria.
  - El par verbal «levantó ... agitó» busca reflejar dos acciones causativas distintas del hebreo.
  - Se mantuvo el pronombre singular «él» sin expandirlo en el texto principal.
  - La puntuación y acentuación siguen normas del español actual, con tono bíblico digno pero no arcaizante.
