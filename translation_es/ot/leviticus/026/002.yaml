    issue: «respetarán» debilita תִּירָאוּ
    rationale: ירא en relación con el santuario expresa temor reverente/awe, no mera cortesía o consideración. «Respetar» en español moderno puede sonar demasiado débil y secular frente al peso cultual del mandato.
  - severity: low
    issue: Coma antes de «y»
    rationale: En español normal no se requiere coma en esta coordinación simple; quitarla mejora naturalidad.
