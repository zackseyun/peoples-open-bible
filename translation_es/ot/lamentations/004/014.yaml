revisions:
- from: Se tambalearon ciegos por las calles[a], contaminados con sangre[b], de modo que no pudieron tocar sus vestidos.
  to: Vagaron ciegos por las calles[a], contaminados con sangre[b], de modo que no pudieron tocar sus ropas.
  rationale: Se ajusta נָעוּ a 'vagaron', que preserva mejor el sentido de movimiento errante o desorientado sin sobreespecificar tambaleo físico. Se cambia 'vestidos' por 'ropas' para mayor naturalidad y amplitud semántica en español. Se mantienen la contaminación por sangre y el sujeto plural de la cláusula final, en conformidad con el hebreo y la revisión inglesa auditada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:58Z'
