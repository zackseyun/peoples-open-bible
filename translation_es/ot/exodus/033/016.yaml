translation:
  language: es
  text: Porque, ¿cómo se sabrá entonces que he hallado favor ante ti, yo y tu pueblo? ¿No es por ir tú con nosotros, y así seremos distinguidos[a], yo y tu pueblo, de todo pueblo que está sobre la faz de la tierra?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apartados» o «hechos extraordinarios». El verbo hebreo puede expresar ser marcados como distintos, extraordinarios o separados de otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַמֶּה
  english_pob_choice: For how
  chosen_spanish: Porque, ¿en qué
  alternatives_spanish:
  - Y por qué
  - ¿De qué manera
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica con valor de enlace lógico. «Porque, ¿en qué…?» conserva la transición argumentativa y el matiz interrogativo en español natural.
- source_word: יִוָּדַע
  english_pob_choice: will it be known
  chosen_spanish: se sabrá
  alternatives_spanish:
  - será conocido
  - llegará a saberse
  lexicon: HALOT
  rationale: El nifal expresa una pasiva/reflexiva natural. «Se sabrá» comunica bien el sentido impersonal sin sonar forzado.
- source_word: אֵפוֹא
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - pues
  - así
  lexicon: HALOT
  rationale: La partícula añade fuerza inferencial. «Entonces» reproduce ese valor en español contemporáneo.
- source_word: כִּי מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: that I have found favor in your sight
  chosen_spanish: que he hallado favor en tus ojos
  alternatives_spanish:
  - que he hallado gracia en tus ojos
  - que he encontrado favor ante ti
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo con «favor en tus ojos», que es claro y conserva la relación personal del juicio favorable.
- source_word: אֲנִי וְעַמֶּךָ
  english_pob_choice: I and your people
  chosen_spanish: yo y tu pueblo
  alternatives_spanish:
  - yo con tu pueblo
  - yo y tu gente
  lexicon: HALOT
  rationale: Se conserva la pareja explícita del hebreo, porque el hablante se incluye junto con el pueblo en la petición.
- source_word: הֲלוֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No será
  alternatives_spanish:
  - ¿No es acaso
  - ¿No es verdad que
  lexicon: HALOT
  rationale: La pregunta retórica espera acuerdo. «¿No será…?» conserva el matiz interrogativo y la expectativa de respuesta afirmativa.
- source_word: בְּלֶכְתְּךָ עִמָּנוּ
  english_pob_choice: by your going with us
  chosen_spanish: por ir tú con nosotros
  alternatives_spanish:
  - al ir tú con nosotros
  - porque vas con nosotros
  lexicon: HALOT
  rationale: El infinitivo con preposición expresa medio o circunstancia. «Por ir tú con nosotros» suena natural y mantiene el valor causal/explicativo.
- source_word: וְנִפְלֵינוּ
  english_pob_choice: so that I and your people are distinguished
  chosen_spanish: para que yo y tu pueblo seamos distinguidos
  alternatives_spanish:
  - para que seamos apartados
  - para que yo y tu pueblo seamos separados
  lexicon: HALOT
  rationale: El nifal de פלא aquí comunica ser marcados como distintos/extraordinarios. «Distinguidos» preserva la idea sin borrar la tensión entre separación y singularidad señalada por el audit trail.
- source_word: מִכָּל הָעָם
  english_pob_choice: from every people
  chosen_spanish: de todo pueblo
  alternatives_spanish:
  - de cada pueblo
  - de toda gente
  lexicon: HALOT
  rationale: Aunque el hebreo es singular colectivo, el sentido distributivo es claro. «Todo pueblo» mantiene esa amplitud.
- source_word: אֲשֶׁר עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: who are on the face of the earth
  chosen_spanish: que hay sobre la faz de la tierra
  alternatives_spanish:
  - que están sobre la faz de la tierra
  - que están sobre la superficie de la tierra
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se vierte con una fórmula natural en español. «Tierra» comunica mejor el alcance global que «suelo» o «tierra» localista.
theological_decisions:
- issue: La señal de la distinción del pueblo
  english_pob_reading: God's presence with his people is presented as the defining mark that distinguishes them from all other peoples.
  chosen_spanish_reading: La presencia de Dios con su pueblo es el rasgo decisivo que los distingue de todos los demás pueblos.
  alternative_spanish_readings:
  - La distinción de Israel proviene principalmente de la ley
  - La diferencia se entiende sobre todo por la identidad étnica o la tierra
  rationale: La cláusula final se rinde de forma causal y resultativa para dejar claro que la distinción no se atribuye a mérito humano, sino a la compañía de Dios con ellos.
  doctrine_reference: Éxodo 33:16; cf. la teología bíblica de la presencia divina con el pueblo del pacto
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura aprobada en inglés y conserva la misma tensión léxica de וְנִפְלֵינוּ: «distinguidos» comunica tanto la separación como la singularidad. No se añadieron notas textuales porque el paquete fuente no presenta variantes relevantes ni revisiones posteriores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino explícito, por lo que se mantiene «Dios» implícito en el contexto sin introducir una forma no presente.
  - Se mantiene el registro reverente pero moderno, con preguntas retóricas naturales en español.
  - «Favor en tus ojos» conserva el modismo hebreo y evita sustituirlo por una paráfrasis excesiva como «gracia» o «beneplácito» sin necesidad contextual.
