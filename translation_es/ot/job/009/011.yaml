translation:
  language: es
  text: Mira[a], pasa junto a mí[b], y no lo veo; sigue adelante, y no lo percibo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «He aquí».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «pasa sobre mí» o «pasa por mí».'
    reason: lexical_alternative
  - marker: c
    text: 'También: «no lo entiendo»; el hebreo puede denotar discernimiento o comprensión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  - He aquí
  lexicon: HALOT
  rationale: El hebreo introduce una observación enfática. «Mira» conserva la fuerza deíctica y la inmediatez del inglés POB «Look» con un español natural y digno; «He aquí» sería más tradicional, pero menos conversacional.
- source_word: יַעֲבֹר עָלַי
  english_pob_choice: passes by me
  chosen_spanish: pasa junto a mí
  alternatives_spanish:
  - pasa sobre mí
  - pasa por mí
  - va de paso junto a mí
  lexicon: HALOT
  rationale: Con עבר + עלי, el POB entendió un paso cercano a la persona sin forzar la imagen de atropello o de mero tránsito abstracto. «Junto a mí» transmite cercanía y movimiento paralelo; «sobre mí» podría sonar demasiado físico o teológico en español.
- source_word: אֶרְאֶה
  english_pob_choice: I do not see him
  chosen_spanish: no lo veo
  alternatives_spanish:
  - no lo alcanzo a ver
  - no lo puedo ver
  lexicon: HALOT
  rationale: La forma hebrea expresa simple negación de la visión. «No lo veo» es directo y fiel; «no lo puedo ver» añadiría una idea de incapacidad que el hebreo no explicita.
- source_word: יַחֲלֹף
  english_pob_choice: moves on
  chosen_spanish: sigue adelante
  alternatives_spanish:
  - pasa adelante
  - sigue pasando
  - se aleja
  lexicon: HALOT
  rationale: חלף señala continuar el movimiento o pasar más allá. «Sigue adelante» distingue este verbo del primero y conserva el paralelismo sin introducir una imagen demasiado idiomática o interpretativa.
- source_word: אָבִין לוֹ
  english_pob_choice: I do not perceive him
  chosen_spanish: no lo percibo
  alternatives_spanish:
  - no lo entiendo
  - no lo discierno
  - no lo capto
  lexicon: HALOT
  rationale: בין puede significar entender, discernir o percibir. En este contexto de la presencia divina que pasa sin ser aprehendida, «no lo percibo» mantiene la amplitud semántica mejor que una lectura puramente intelectual como «no lo entiendo».
theological_decisions:
- issue: Referencia del sujeto y de los pronombres de tercera persona
  english_pob_reading: The subject and pronouns refer to God.
  chosen_spanish_reading: El sujeto implícito y los pronombres se refieren a Dios.
  alternative_spanish_readings:
  - 'Se refiere a un sujeto impersonal: «uno» pasa'
  - La referencia queda deliberadamente indeterminada
  rationale: El contexto inmediato de Job 9:10–12 trata de la actividad inescrutable de Dios. Mantener el referente personal implícito en español evita añadir un título divino que no aparece en el verso, pero preserva la referencia contextual que el audit trail inglés documenta.
  doctrine_reference: Job 9:10–12; lectura contextual del sujeto
- issue: Matiz de בין en la clausula final
  english_pob_reading: the Hebrew can denote discernment or understanding.
  chosen_spanish_reading: El hebreo puede denotar discernimiento o comprensión, por eso «no lo percibo» conserva esa amplitud.
  alternative_spanish_readings:
  - no lo entiendo
  - no lo discierno
  rationale: 'La traducción española debe reflejar la tensión lexical: בין no es solo ''entender'' en sentido abstracto, sino también discernir/percibir. «No lo percibo» evita reducir el verbo a una sola faceta y mantiene el carácter experiencial del verso.'
  doctrine_reference: HALOT; uso contextual de בין
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el último pase de revisión: no hubo cambios requeridos y el control cruzado informó alta concordancia. La redacción española sigue la misma decisión interpretativa del audit trail inglés: dos verbos de paso diferenciados y una clausula final que conserva la amplitud de בין sin estrecharla a ''entender'' exclusivamente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la lectura contextual, sin añadirlo al texto para no superar el hebreo.
  - Se conserva la diferencia entre «pasa junto a mí» y «sigue adelante» para reflejar el paralelismo verbal.
  - «No lo percibo» se usa como término amplio para discernimiento/entendimiento, en línea con el POB inglés.
  - El texto evita arcaísmos innecesarios y conserva un tono bíblico sobrio y publicable.
