translation:
  language: es
  text: 'En aquellos días, Judá será salvada, y Jerusalén habitará segura[a]; y esto es lo que será llamada: «Yahvé es nuestra justicia».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y este es el nombre con que será llamada».'
    reason: lexical_alternative
  - marker: b
    text: Jeremías 23:6 aplica el título estrechamente relacionado «Yahvé es nuestra justicia» al rey davídico venidero; aquí la gramática lo aplica a Jerusalén, probablemente en eco de esa promesa anterior.
    reason: cross_reference
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: HALOT
  rationale: La fórmula temporal profética se conserva de manera natural en español con «En aquellos días», que refleja el valor idiomático de introducción futura sin añadir matiz innecesario.
- source_word: תִּוָּשַׁע
  english_pob_choice: will be saved
  chosen_spanish: será salvada
  alternatives_spanish:
  - será liberada
  - será rescatada
  lexicon: HALOT
  rationale: El nifal de ישׁע expresa ser salvado/liberado; «será salvada» mantiene el pasivo y la resonancia soteriológica. Se evita restringirlo solo a liberación política.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וִירוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: תִּשְׁכּוֹן לָבֶטַח
  english_pob_choice: will dwell securely
  chosen_spanish: habitará segura
  alternatives_spanish:
  - habitará con seguridad
  - vivirá segura
  lexicon: HALOT
  rationale: שׁכן implica habitar/residir; en español, «habitará segura» conserva la idea de permanencia con seguridad. Se evita una paráfrasis más amplia que borre el matiz de asentamiento.
- source_word: וְזֶה אֲשֶׁר
  english_pob_choice: and this is what
  chosen_spanish: y este será el nombre con que
  alternatives_spanish:
  - y esto es lo que
  - y así será llamada
  lexicon: HALOT
  rationale: La frase introductoria prepara una designación nominal. En español, «este será el nombre con que» refleja mejor la función onomástica que una traducción demasiado literal o vaga.
- source_word: יִקְרָא לָהּ
  english_pob_choice: she will be called
  chosen_spanish: será llamada
  alternatives_spanish:
  - la llamarán
  - se la llamará
  lexicon: HALOT
  rationale: El hebreo usa una forma impersonal/mediopasiva de nombramiento; en español, «será llamada» comunica con naturalidad la designación de la ciudad femenina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton según la convención del proyecto en español: «Yahvé». No se sustituye por un título como «el SEÑOR».'
- source_word: צִדְקֵנוּ
  english_pob_choice: is our righteousness
  chosen_spanish: es nuestra justicia
  alternatives_spanish:
  - es nuestra rectitud
  - es nuestra justicia/rectitud
  lexicon: HALOT
  rationale: צדק en este contexto nominal tiene fuerza forense/covenantal; «justicia» es la equivalencia principal en español. Se mantiene la estructura predicativa con «es» para reflejar la fórmula de nombre.
theological_decisions:
- issue: Aplicación del nombre de YHWH en la fórmula nominal
  english_pob_reading: Yahweh is our righteousness
  chosen_spanish_reading: Yahvé es nuestra justicia
  alternative_spanish_readings:
  - Yahvé es nuestra rectitud
  - Yahvé es nuestra justicia
  rationale: El texto hebreo nombra a Yahvé explícitamente; la traducción debe preservar el nombre divino. «Justicia» mantiene la carga covenantal y legal de צדק sin disolverla en un sentido meramente moral.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación intertextual con Jeremías 23:6
  english_pob_reading: The name is applied here to Jerusalem ('she will be called')
  chosen_spanish_reading: La fórmula se aplica gramaticalmente a Jerusalén, y el eco de Jeremías 23:6 queda insinuado en nota
  alternative_spanish_readings:
  - El título se entiende directamente como referido a la ciudad sin referencia al rey
  - La expresión fusiona a Jerusalén con el título mesiánico anterior
  rationale: La terminación femenina לָהּ apunta a Jerusalén; por fidelidad al gramático del verso, la traducción principal debe reflejar esa referencia. El vínculo con Jeremías 23:6 es importante, pero debe preservarse como tensión intertextual, no resolverse en la traducción.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del auditor inglés, que no requirió cambios tras revisión. Se mantiene el acuerdo alto entre los pases de control y se conserva la tensión interpretativa sobre el sujeto de la fórmula nominal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton, conforme a la política del proyecto en español.
  - Se traduce צדק con «justicia» en la fórmula nominal, evitando sustituirlo por un término más débil o meramente moralizante.
  - La referencia femenina a Jerusalén se conserva con «será llamada», alineada con el sufijo pronominal femenino del hebreo.
  - La nota intertextual preserva el eco con Jeremías 23:6 sin desplazar la gramática del versículo presente.
