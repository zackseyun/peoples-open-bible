translation:
  language: es
  text: 'Así dice el Señor Yahvé: Porque dicen de ti: «Devoras gente[a] y has dejado sin hijos a tu nación[b]»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «devoradora de hombre»; aquí «hombre» funciona con sentido colectivo, es decir, gente o humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «has dejado sin hijos a tu pueblo» / «has enlutado a tu pueblo».
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Así dice
  lexicon: HALOT
  rationale: Usa la fórmula profética breve y natural en español sin perder el tono formal de उद्घcción oracular.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva el título compuesto y el nombre divino en la forma de proyecto, evitando el reemplazo por mayúsculas encubridoras. 'Señor' corresponde a אֲדֹנָי y 'Yahvé' a יְהוִה.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce con claridad la cláusula causal en español corriente.
- source_word: אֹמְרִים לָכֶם
  english_pob_choice: they say of you
  chosen_spanish: dicen de ti
  alternatives_spanish:
  - dicen acerca de ti
  - te dicen
  lexicon: HALOT
  rationale: El hebreo expresa una acusación formulada sobre el destinatario; 'dicen de ti' reproduce bien ese matiz idiomático.
- source_word: אֹכֶלֶת
  english_pob_choice: devours
  chosen_spanish: devoras
  alternatives_spanish:
  - devora
  - consumes
  lexicon: HALOT
  rationale: Se mantiene la imagen fuerte de devorar. En español se ajusta al singular femenino implícito del destinatario (la tierra) sin añadir explícitamente más que el hebreo no diga.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: gente
  alternatives_spanish:
  - personas
  - humanidad
  lexicon: HALOT
  rationale: El colectivo hebreo aquí funciona genéricamente; 'gente' comunica el sentido humano colectivo con naturalidad en español.
- source_word: וּמְשַׁכֶּלֶת
  english_pob_choice: has bereaved
  chosen_spanish: has dejado sin hijos
  alternatives_spanish:
  - has dejado huérfana
  - has hecho estéril
  lexicon: HALOT
  rationale: '''Dejar sin hijos'' transmite el valor de bereaving/making childless de manera clara y directa para el lector español, sin forzar a una sola imagen técnica.'
- source_word: גּוֹיִךְ
  english_pob_choice: your nation
  chosen_spanish: tu nación
  alternatives_spanish:
  - tu pueblo
  - tus habitantes
  lexicon: HALOT
  rationale: '''Nación'' preserva el sentido corporativo del sustantivo y la sufijación de 2fs, coherente con la tierra/persona colectiva a la que se dirige el versículo.'
theological_decisions:
- issue: Representación del nombre divino en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Se sigue la directriz del proyecto para יְהוִה → Yahvé, y se conserva la distinción entre אֲדֹנָי y el nombre propio divino. Esto evita la convención de ocultarlo con 'SEÑOR' y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la frase añadida 'a land that' por no estar explícita en el hebreo y mantuvo el paralelo acusatorio directo. En español se evita también añadir 'tierra' o 'la tierra' para no introducir un sustantivo ausente; se conserva la acusación breve con el sujeto implícito del hebreo y la imagen verbal intensa.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del nombre divino según la política del proyecto.
  - '''Devoras'' conserva el valor metafórico fuerte de אכל en contexto de acusación.'
  - '''Has dejado sin hijos'' refleja la ambigüedad entre ''dejar sin hijos'' y ''hacer estéril'' sin decidir más de lo que el contexto obliga.'
  - Los marcadores [a] y [b] aparecen exactamente en el texto base y no se reutilizan.
