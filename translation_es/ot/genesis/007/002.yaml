translation:
  language: es
  text: De todo animal limpio tomarás para ti siete parejas[a], un macho y su hembra; y del animal que no es limpio, dos[b], un macho y su hembra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «siete siete, un macho y su hembra»; esto probablemente significa siete parejas, aunque algunos lo entienden como siete animales individuales.'
    reason: alternative_reading
  - marker: b
    text: 'O «animales impuros». El hebreo dice literalmente: «del animal que no es limpio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל
  english_pob_choice: From every
  chosen_spanish: De todo
  alternatives_spanish:
  - De cada
  - De entre todo
  lexicon: HALOT
  rationale: La preposición מִן con כֹּל marca origen o extracción distributiva. En español, «de todo» expresa de manera natural esa relación sin perder el valor de conjunto del hebreo.
- source_word: הַבְּהֵמָה
  english_pob_choice: animal / animals
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  - animal/animales
  lexicon: HALOT
  rationale: Aquí בְּהֵמָה designa una categoría de cuadrúpedos en sentido amplio. «Animal» es claro y sobrio en español contemporáneo; «ganado» sería demasiado restringido y «bestia» resulta menos natural en este contexto.
- source_word: הַטְּהוֹרָה
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  - ceremonialmente limpio
  lexicon: HALOT
  rationale: El contraste del versículo es con «no son limpios», por lo que «limpio» conserva el paralelo léxico. «Puro» sería menos preciso en este marco de pureza ritual.
- source_word: תִּקַּח לְךָ
  english_pob_choice: you shall take for yourself
  chosen_spanish: tomarás para ti
  alternatives_spanish:
  - tomarás
  - tomarás para ti mismo
  lexicon: HALOT
  rationale: El imperfecto funciona como instrucción. «Tomarás para ti» refleja לְךָ sin sobrecargar el sentido; conserva el matiz de beneficio o destino personal presente en el hebreo.
- source_word: שִׁבְעָה שִׁבְעָה
  english_pob_choice: seven pairs
  chosen_spanish: siete parejas
  alternatives_spanish:
  - siete y siete
  - siete cada uno
  - siete, macho y hembra
  lexicon: HALOT
  rationale: La repetición numeral es idiomática. En este contexto, seguida de «un macho y su hembra», la lectura más probable es «siete parejas». «Parejas» comunica el valor distributivo de modo claro en español.
- source_word: אִישׁ וְאִשְׁתּוֹ
  english_pob_choice: a male and its mate
  chosen_spanish: un macho y su hembra
  alternatives_spanish:
  - un varón y su mujer
  - macho y hembra
  lexicon: HALOT
  rationale: Aunque literalmente dice «un hombre y su mujer», aplicado a animales es un modismo de emparejamiento sexual. «Un macho y su hembra» evita una antropomorfización engañosa y preserva el sentido zoológico.
- source_word: וּמִן הַבְּהֵמָה אֲשֶׁר לֹא טְהֹרָה הִוא
  english_pob_choice: and from the animals that are not clean
  chosen_spanish: y de los animales que no son limpios
  alternatives_spanish:
  - y de los animales impuros
  - y de los animales que no están limpios
  lexicon: HALOT
  rationale: 'El hebreo expresa la negación analíticamente: «que no es limpia». En español, «no son limpios» conserva esa estructura y evita sustituirla sin necesidad por un término técnico («impuros») que no aparece explícitamente en el texto.'
- source_word: שְׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos animales
  - una pareja
  lexicon: HALOT
  rationale: El numeral es simplemente «dos». Como el siguiente sintagma ya precisa la pareja sexuada, conviene mantener la brevedad del original.
theological_decisions:
- issue: Sentido del número para los animales limpios
  english_pob_reading: seven pairs of clean animals
  chosen_spanish_reading: siete parejas de animales limpios
  alternative_spanish_readings:
  - siete animales limpios
  - siete y siete
  rationale: 'La secuencia «siete siete, un macho y su hembra» apunta con fuerza a unidades emparejadas. Por eso se expresa como «siete parejas». Se conserva así la tensión textual: el hebreo es más literal y la interpretación más probable queda señalada por el contexto inmediato.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se ha seguido el último pase revisado como estable, sin cambios sustanciales respecto del contexto inglés. La decisión principal es conservar la lectura interpretativa «siete parejas» y mantener en español la negación analítica «no son limpios» para reflejar de cerca el hebreo.
  spanish_consistency_notes:
  - Se usó «limpios/no son limpios» para mantener el contraste léxico del pasaje.
  - Se evitó «SEÑOR» u այլ masking terminology porque no corresponde a este versículo.
  - «Macho y hembra» se prefirió sobre «varón y mujer» por la referencia zoológica inmediata.
  - La puntuación reproduce una cadencia cercana al hebreo sin volverla arcaizante.
