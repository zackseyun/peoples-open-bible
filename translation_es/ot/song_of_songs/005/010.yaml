translation:
  language: es
  text: Mi amado es radiante y rojizo[a], distinguido entre diez mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «conspicuo entre diez mil» o, más literalmente, «enarbolado entre diez mil».
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado
  - mi amor
  - mi amante
  lexicon: HALOT
  rationale: En Cantar de los Cantares, דּוֹדִי designa al amado en un marco poético y afectivo. 'Mi amado' conserva dignidad literaria y la relación amorosa sin volverlo demasiado explícito como 'mi amante'.
- source_word: צַח
  english_pob_choice: radiant
  chosen_spanish: radiante
  alternatives_spanish:
  - brillante
  - resplandeciente
  - claro
  lexicon: HALOT
  rationale: '''Radiante'' comunica bien la idea de brillo visible y evita la ambigüedad de ''claro'', que en español puede referirse a color, pureza o inteligencia.'
- source_word: וְאָדוֹם
  english_pob_choice: and ruddy
  chosen_spanish: y rojizo
  alternatives_spanish:
  - y rubicundo
  - y rojo
  - y sonrosado
  lexicon: HALOT
  rationale: אָדוֹם expresa color rojo. 'Rojizo' mantiene la referencia cromática en español moderno; 'rubicundo' o 'sonrosado' añaden una tonalidad más específica que no está exigida por el hebreo.
- source_word: דָּגוּל
  english_pob_choice: distinguished
  chosen_spanish: distinguido
  alternatives_spanish:
  - señalado
  - sobresaliente
  - enarbolado
  lexicon: HALOT
  rationale: El término probablemente indica ser señalado o destacado entre otros. 'Distinguido' recoge esa idea de prominencia de forma natural en español; 'enarbolado' sería demasiado literal y oscuro.
- source_word: מֵרְבָבָה
  english_pob_choice: among ten thousand
  chosen_spanish: entre diez mil
  alternatives_spanish:
  - entre una multitud
  - de entre diez mil
  - por encima de diez mil
  lexicon: HALOT
  rationale: La preposición con רְבָבָה expresa comparación dentro de una multitud. 'Entre diez mil' reproduce el valor comparativo y mantiene la fuerza poética sin sobreinterpretar la cifra.
translation_notes:
  revision_awareness: El texto base en inglés mantiene la imagen poética de brillo, color rojizo y prominencia; no hubo revisiones posteriores que alteraran la lectura, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se evitó 'Cristo' y 'SEÑOR' porque el versículo no contiene ni presupone esos títulos.
  - Se prefirió 'mi amado' por coherencia con el léxico poético del Cantar y con el inglés auditado.
  - '''Radiante'' y ''rojizo'' conservan la tensión entre luminosidad y color del original hebreo sin convertirla en paráfrasis.'
