translation:
  language: es
  text: ¡Oh sacerdote, digno del sacerdocio, no contaminaste tus dientes sagrados, ni hiciste partícipe a tu estómago, que albergaba la piedad y la pureza, con alimento contaminante![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni participaste en comer contaminante». El griego puede referirse a tomar parte en alimento que produce impureza ritual o moral, o en el acto mismo de comer de manera contaminante.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ ἄξιε τῆς ἱερωσύνης ἱερεῦ
  english_pob_choice: O priest, worthy of the priesthood
  chosen_spanish: ¡Oh sacerdote, digno del sacerdocio!
  alternatives_spanish:
  - ¡Oh sacerdote, digno de tu oficio sacerdotal!
  - ¡Oh sacerdote, digno del sacerdocio!
  lexicon: LSJ
  rationale: Conservo el vocativo enfático y la duplicación retórica entre ἱερεῦ e ἱερωσύνης. En español, «sacerdote» comunica mejor que un calco más técnico y «digno del sacerdocio» mantiene la valoración explícita.
- source_word: ἐμίανας
  english_pob_choice: defile
  chosen_spanish: contaminaste
  alternatives_spanish:
  - manchaste
  - profanaste
  lexicon: LSJ
  rationale: El contexto es de impureza cultual y moral. «Contaminaste» conserva la idea de volver impuro sin sonar demasiado abstracto; «manchaste» sería menos preciso en el registro ritual.
- source_word: τοὺς ἱεροὺς ὀδόντας
  english_pob_choice: your sacred teeth
  chosen_spanish: tus dientes sagrados
  alternatives_spanish:
  - tus dientes santos
  - tus dientes consagrados
  lexicon: LSJ
  rationale: Mantengo la imagen corporal concreta. «Sagrados» preserva el registro cultual mejor que «santos», y evita suavizar la expresión llamativa del griego.
- source_word: θεοσέβειαν
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción a Dios
  - la reverencia a Dios
  lexicon: LSJ
  rationale: Aquí el término apunta a devoción reverente hacia Dios. «Piedad» es idiomático en español bíblico y conserva el matiz moral-religioso; «devoción a Dios» sería más explicativo.
- source_word: καθαρισμὸν
  english_pob_choice: purity
  chosen_spanish: la pureza
  alternatives_spanish:
  - la limpieza
  - la purificación
  lexicon: LSJ
  rationale: En paralelo con θεοσέβειαν, el sustantivo expresa un estado de pureza moral/cultual. «Pureza» es el equivalente más natural y fiel.
- source_word: χωρήσασαν γαστέρα
  english_pob_choice: your stomach—which had room for
  chosen_spanish: tu vientre, que tenía cabida para
  alternatives_spanish:
  - tu vientre, que albergaba
  - tu estómago, que tenía cabida para
  lexicon: LSJ
  rationale: «Vientre» reproduce mejor el valor corporal del griego que «estómago», y «tenía cabida para» conserva la metáfora de espacio/recepción sin volverla plana.
- source_word: ἐκοινώνησας
  english_pob_choice: make ... a partner in
  chosen_spanish: hiciste partícipe a
  alternatives_spanish:
  - compartiste con
  - asociaste a
  lexicon: LSJ
  rationale: El verbo expresa participación asociativa. «Hiciste partícipe a» refleja con naturalidad la estructura causativa del original y evita perder el matiz relacional.
- source_word: μιεροφαγίᾳ
  english_pob_choice: defiling food
  chosen_spanish: en comida que contamina
  alternatives_spanish:
  - en alimento impuro
  - en comer contaminado
  lexicon: LSJ
  rationale: El compuesto sugiere aquello que contamina por el comer. «Comida que contamina» conserva el carácter de impureza ligada a la ingesta sin sobretraducir el compuesto raro.
theological_decisions:
- issue: Imagen cultual aplicada a partes del cuerpo y a la ingestión
  english_pob_reading: Retain the concrete imagery of 'sacred teeth' and a stomach associated with godliness and purity
  chosen_spanish_reading: Mantener la imaginería concreta de «dientes sagrados» y un «vientre» asociado con la piedad y la pureza
  alternative_spanish_readings:
  - Generalizar como rechazo a comida impura
  - Reducir la imagen corporal a una referencia moral abstracta
  rationale: El griego es deliberadamente vívido y corporal. La traducción conserva esa fuerza retórica para no diluir la fidelidad dietética y cultual del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden sustancialmente; no se requieren revisiones adicionales. Se preservó la imagen corporal fuerte y la ambigüedad de μιεροφαγίᾳ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se prefirió «piedad» y «pureza» para mantener el paralelo conceptual con θεοσέβειαν καὶ καθαρισμόν.
  - Se conservó el registro cultual con «sacerdote», «sagrado» y «contamina» sin recurrir a formulaciones eclesiásticas tradicionales que suavicen el griego.
