base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/031/012.yaml
  text: Foreigners[a], the ruthless of the nations, cut it down and left it. Its branches fell on the mountains and in every valley, and its boughs were broken in all the channels of the land[c][b]. Then all the peoples of the earth went down from its shade and left it.
  footnotes:
  - marker: a
    text: Or 'abandoned it' for the repeated verb 'left it' (וַיִּטְּשֻׁהוּ) in both clauses.
    reason: lexical_alternative
  - marker: b
    text: '''Channels of the land'' may also be rendered ''watercourses of the land'' or ''ravines of the earth.'''
    reason: lexical_alternative
  - marker: c
    text: The fallen tree represents Assyria and its ruler in the larger metaphor of the chapter; English 'it' preserves the tree image, though 'him' is possible if the political referent is foregrounded.
    reason: alternative_reading
