translation:
  language: es
  text: 'Los levitas: los hijos de Jesúa y Kadmiel, de los hijos de Hodavías[a], setenta y cuatro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hodavías»; el paralelo en Nehemías 7:43 tiene «Hodevá».'
    reason: textual_variant
lexical_decisions:
- source_word: הַלְוִיִּם
  english_pob_choice: The Levites
  chosen_spanish: Los levitas
  alternatives_spanish:
  - Asunto de los levitas
  - En cuanto a los levitas
  lexicon: HALOT
  rationale: El artículo definido hebreo introduce una categoría censal. En español, «Los levitas» conserva esa función de encabezado y suena natural y sobrio.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: HALOT
  rationale: En listas genealógicas y censales, «hijos de» reproduce bien la fórmula de pertenencia/clan y corresponde al uso del hebreo en este contexto.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Josué
  lexicon: HALOT
  rationale: Se conserva la forma postexílica del nombre propio, no la forma bíblica más conocida de Josué. «Jesúa» es la transliteración usual en español para Ezra/Nehemías.
- source_word: וְקַדְמִיאֵל
  english_pob_choice: and Kadmiel
  chosen_spanish: y de Cadmiel
  alternatives_spanish:
  - y Kadmiel
  lexicon: HALOT
  rationale: Es un nombre propio transliterado; en español puede mantenerse sin más. La preposición repetida «de» refleja mejor la serie genealógica del hebreo en esta construcción.
- source_word: לִבְנֵי הוֹדַוְיָה
  english_pob_choice: of the sons of Hodaviah
  chosen_spanish: de los hijos de Hodavías
  alternatives_spanish:
  - de los descendientes de Hodavías
  lexicon: HALOT
  rationale: La lamed relacional se entiende aquí de modo clasificatorio/genealógico. «De los hijos de» conserva la relación del texto y evita simplificarla indebidamente.
- source_word: הוֹדַוְיָה
  english_pob_choice: Hodaviah
  chosen_spanish: Hodavías
  alternatives_spanish:
  - Hodavía
  lexicon: HALOT
  rationale: Se sigue la forma del hebreo de este versículo. La variante «Hodevah» queda para nota, como en el POB inglés, por el paralelo de Nehemías 7:43.
- source_word: שִׁבְעִים וְאַרְבָּעָה
  english_pob_choice: seventy-four
  chosen_spanish: setenta y cuatro
  alternatives_spanish:
  - setenta y cuatro
  lexicon: HALOT
  rationale: El cardinal se vierte de forma idiomática en español; no hay razón para una forma arcaizante.
theological_decisions:
- issue: Tratamiento de nombres propios postexílicos y variantes textuales
  english_pob_reading: Jeshua and Kadmiel ... Hodaviah, with a note that Nehemiah 7:43 has Hodevah.
  chosen_spanish_reading: Jesúa y de Cadmiel ... Hodavías, con nota de variante respecto de Nehemías 7:43 («Hodevá»/«Hodevah»).
  alternative_spanish_readings:
  - Josué y Cadmiel ... Hodavías
  - Jesúa y Kadmiel ... Hodavía
  rationale: 'No hay una cuestión doctrinal en sentido estricto, pero sí una decisión de fidelidad textual: el texto masorético de Esdras debe reflejarse en la forma del nombre que aparece aquí, mientras que la variante del paralelo se preserva en nota para no borrar la tensión documental.'
  doctrine_reference: Crítica textual / fidelidad al texto base
translation_notes:
  revision_awareness: 'Se ha verificado el contexto auditado en inglés y el estado de revisión final: no se registran cambios aplicados y el cotejo reporta alta concordancia. La versión española mantiene esa lectura estable, incorporando la variante textual en nota sin alterar el texto base de Esdras.'
  spanish_consistency_notes:
  - Se conserva «Jesúa» para el nombre postexílico, evitando confundirlo con «Josué».
  - Se usa «hijos de» en el valor genealógico/censal, coherente con listas de linaje.
  - Se mantiene la variante textual de Hodavías en nota, sin armonizar el texto principal con Nehemías.
