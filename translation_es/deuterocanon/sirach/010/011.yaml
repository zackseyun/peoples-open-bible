translation:
  language: es
  text: A la muerte de un hombre, su herencia es gusanos y lombrices, mosquitos[a] y seres que se arrastran[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo כִּנִּים también puede traducirse como “piojos” o, más generalmente, “alimañas”; el insecto exacto es incierto.
    reason: lexical_alternative
  - marker: b
    text: 'El griego paralelo dice más ampliamente: “heredará seres que se arrastran y bestias, gusanos”, y difiere de la lista hebrea de criaturas.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּמוֹת / ἐν ... τῷ ἀποθανεῖν
  english_pob_choice: At a man's death
  chosen_spanish: En la muerte de un hombre
  alternatives_spanish:
  - Cuando muere un hombre
  - Al morir un hombre
  lexicon: HALOT; LXX ἀποθανεῖν
  rationale: La construcción temporal se vierte de forma natural como una frase nominal en español. 'En la muerte de un hombre' conserva el valor circunstancial del hebreo y resulta más sobrio y formal que una perífrasis verbal.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  lexicon: HALOT
  rationale: El singular hebreo es genérico pero masculino; 'un hombre' mantiene esa forma sin neutralizarla. En este dicho sapiencial, el masculino singular funciona representativamente.
- source_word: יִנְחַל
  english_pob_choice: his inheritance is
  chosen_spanish: su herencia es
  alternatives_spanish:
  - hereda
  - le toca en herencia
  lexicon: HALOT
  rationale: El verbo expresa recibir como herencia. La formulación nominal 'su herencia es' sigue la revisión inglesa y suena natural en español, preservando la idea de posesión final al morir.
- source_word: רִמָּה
  english_pob_choice: maggots
  chosen_spanish: gusanos
  alternatives_spanish:
  - mofas
  - larvas
  lexicon: HALOT
  rationale: El término hebreo puede referir criaturas de descomposición asociadas al cadáver. 'Gusanos' comunica bien esa imagen en español sin sonar demasiado técnico; 'larvas' sería más preciso biológicamente pero menos idiomático aquí.
- source_word: תוֹלֵעָה
  english_pob_choice: worms
  chosen_spanish: lombrices
  alternatives_spanish:
  - gusanos
  - gusano
  lexicon: HALOT
  rationale: Se mantiene una segunda designación de criatura similar para reflejar la pareja hebrea. 'Lombrices' distingue este término del anterior y conserva el tono concreto de descomposición.
- source_word: כִּנִּים
  english_pob_choice: gnats
  chosen_spanish: insectos
  alternatives_spanish:
  - piojos
  - alimañas
  lexicon: HALOT
  rationale: El hebreo es incierto; el audit trail inglés nota la ambigüedad y el posible sentido de 'lice' o 'vermin'. 'Insectos' es un término amplio y prudente en español para no fijar indebidamente una especie concreta.
- source_word: וָרֶמֶשׂ
  english_pob_choice: and creeping things
  chosen_spanish: y reptiles
  alternatives_spanish:
  - y seres que se arrastran
  - y criaturas que se arrastran
  lexicon: HALOT
  rationale: רֶמֶשׂ designa seres que se arrastran. 'Reptiles' es una opción tradicional y comprensible, aunque más amplia o biológicamente cargada; por eso se deja constancia de la alternativa literal 'seres que se arrastran'.
theological_decisions:
- issue: Uso del masculino singular genérico en אָדָם
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - el ser humano
  rationale: Se conserva la forma masculina singular del original, sin convertirla en un genérico neutral. Esto sigue el criterio de precisión morfológica del proyecto y mantiene el paralelismo sapiencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Preferencia del hebreo como testigo principal con el griego como control
  english_pob_reading: Translate the extant Hebrew directly, while allowing the Greek to confirm the general sense of postmortem possession by low creatures.
  chosen_spanish_reading: Traducir directamente el hebreo conservado, dejando que el griego confirme el sentido general de la posesión póstuma de criaturas bajas.
  alternative_spanish_readings:
  - 'Ajustar más la traducción al griego: ''heredará reptiles y bestias, gusanos'''
  rationale: Dado que aquí se conserva el hebreo, el texto español sigue ese testigo principal. La lista de criaturas del griego difiere, así que se preserva el sentido común sin sustituir el inventario hebreo.
  doctrine_reference: PHILOSOPHY.md §What we are translating
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés, que prefirió una apertura nominal (“At a man''s death”) y una clausula formal (“his inheritance is”). En español se adoptó una solución equivalente y más natural: “En la muerte de un hombre, su herencia es...”, manteniendo el tono formal y la estructura sapiencial.'
  spanish_consistency_notes:
  - Se mantiene 'hombre' para אָדָם conforme al valor masculino singular del hebreo.
  - Se evita 'SEÑOR' u otras convenciones no pertinentes porque no aparece el nombre divino en este versículo.
  - '''Reptiles'' se usa como equivalente comprensible de ''creeping things'', aunque la nota reconoce la posibilidad de una traducción más literal.'
  - La secuencia de criaturas se presenta en dos parejas para reflejar el hebreo y dejar visible la acumulación poética.
