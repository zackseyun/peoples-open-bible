translation:
  language: es
  text: Y el saliente[a] tenía catorce codos de largo por catorce codos de ancho, en sus cuatro lados[b]; y el borde que lo rodeaba era de medio codo, y su base[c] era de un codo todo alrededor; y sus gradas daban al oriente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el estrado» o «la plataforma» para הָעֲזָרָה, un término técnico para un nivel estructural del altar.
    reason: lexical_alternative
  - marker: b
    text: O «a sus cuatro cuartos»; la expresión hebrea indica que la medida de catorce por catorce se aplicaba uniformemente a los cuatro lados.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente «su canal» para הַחֵיק, si el término se entiende como una cavidad o zanja perimetral en la base del altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲזָרָה
  english_pob_choice: the ledge
  chosen_spanish: la plataforma
  alternatives_spanish:
  - el saliente
  - el estrado
  - la grada superior
  lexicon: HALOT
  rationale: En este contexto arquitectónico del altar, el término nombra un nivel o sección estructural, no un patio. 'Plataforma' comunica bien una parte horizontal y técnica sin cargar un matiz eclesiástico ajeno. Mantiene la tensión entre una traducción funcional y la posibilidad de un término técnico específico.
- source_word: אֹרֶךְ ... רֹחַב
  english_pob_choice: long by ... wide
  chosen_spanish: de largo por ... de ancho
  alternatives_spanish:
  - en longitud ... en anchura
  - largo por ... ancho
  lexicon: HALOT
  rationale: Es la forma natural y precisa en español para medidas dimensionales, preservando la estructura paralela del hebreo y del inglés POB.
- source_word: אֶל אַרְבַּעַת רְבָעֶיהָ
  english_pob_choice: at its four sides
  chosen_spanish: en sus cuatro lados
  alternatives_spanish:
  - hacia sus cuatro cuartos
  - para sus cuatro lados
  lexicon: HALOT
  rationale: La frase expresa que la medida se aplica uniformemente a los cuatro lados. 'En sus cuatro lados' es claro y evita una literalidad confusa de 'cuartos' en español, sin perder la idea distributiva.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el borde
  alternatives_spanish:
  - el límite
  - la moldura
  - la orla
  lexicon: HALOT
  rationale: '''Borde'' conserva el sentido de elemento perimetral alrededor de la estructura y mantiene cercanía con la revisión inglesa que prefirió ''border'' sobre ''rim''.'
- source_word: חֲצִי הָאַמָּה
  english_pob_choice: half a cubit
  chosen_spanish: medio codo
  alternatives_spanish:
  - un medio codo
  - media codo
  lexicon: HALOT
  rationale: Es la equivalencia natural y estándar en español para la unidad antigua, conservando la medida sin convertirla.
- source_word: הַחֵיק
  english_pob_choice: its base
  chosen_spanish: su base
  alternatives_spanish:
  - su fondo
  - su cavidad
  - su canal
  lexicon: HALOT
  rationale: En el contexto del altar, la lectura arquitectónica favorece 'base', como en el inglés auditado. Es más comprensible que alternativas como 'garganta' o 'cavidad' y no impone la imagen de un 'gutter' como lectura principal.
- source_word: מַעֲלֹתֵהוּ
  english_pob_choice: its steps
  chosen_spanish: sus gradas
  alternatives_spanish:
  - sus escalones
  - su subida
  lexicon: HALOT
  rationale: '''Gradas'' es una opción sobria y arquitectónica, compatible con la descripción de acceso del altar. ''Escalones'' también sería posible, pero ''gradas'' suena más técnico y evita una imagen demasiado doméstica.'
- source_word: פְּנוֹת קָדִים
  english_pob_choice: faced east
  chosen_spanish: daban al oriente
  alternatives_spanish:
  - miraban al oriente
  - estaban orientadas al este
  - daban hacia el oriente
  lexicon: HALOT
  rationale: '''Daban al oriente'' expresa de manera natural la orientación de las gradas. ''Oriente'' se usa aquí por su registro digno y bíblico; ''este'' sería igualmente correcto pero menos litúrgico en español contemporáneo.'
theological_decisions:
- issue: Término técnico del altar para הָעֲזָרָה
  english_pob_reading: technical structural tier of the altar ('the ledge')
  chosen_spanish_reading: plataforma
  alternative_spanish_readings:
  - saliente
  - estrado
  - grada superior
  rationale: No se trata de un patio del templo sino de una sección del altar. 'Plataforma' preserva el valor estructural y evita confundir al lector con un espacio abierto. La alternativa 'grada superior' también es posible, pero 'plataforma' sigue más de cerca la neutralidad del dato dimensional.
  doctrine_reference: Descripción del altar en Ezequiel 43; precisión arquitectónica del santuario
- issue: Orientación de las gradas hacia el oriente
  english_pob_reading: its steps faced east
  chosen_spanish_reading: sus gradas daban al oriente
  alternative_spanish_readings:
  - sus escalones miraban al oriente
  - sus gradas estaban orientadas al este
  rationale: La dirección tiene valor descriptivo en la visión del templo. 'Daban al oriente' mantiene el sentido funcional sin añadir interpretación simbólica no explicitada por el texto.
  doctrine_reference: Visión del templo en Ezequiel 40–48
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'rim' por 'border' para ajustarse más a גְּבוּל; en español se siguió esa revisión con 'borde'. También se conservó la decisión del POB de leer הָעֲזָרָה como un término técnico arquitectónico del altar, no como un patio.
  spanish_consistency_notes:
  - Se mantiene 'codo' para אַמָּה, sin conversión métrica, por fidelidad al texto fuente.
  - Se usa 'oriente' de modo consistente con el registro bíblico y con el valor direccional del hebreo.
  - No se introduce 'SEÑOR' ni terminología de sustitución para el nombre divino, porque este versículo no contiene el Tetragrámaton.
