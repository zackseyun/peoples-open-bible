review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: imperativo a Moisés, ''los hijos de Israel'', נֶפֶשׁ como ''una persona'', pecado involuntario, referencia a los mandamientos de Yahvé, y la cláusula final sobre hacer una de las cosas prohibidas. Sin embargo, el anclaje de la nota [b] está puesto sobre ''peca'' cuando la variación léxica y la explicación corresponden a בִשְׁגָגָה (''por inadvertencia''), no al verbo ''peca''. Además, ''en cualquiera de los mandamientos'' suena menos natural y menos preciso en español que ''respecto de cualquiera de los mandamientos'' o similar, dado el valor relacional de מִן en este contexto.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero requiere un ajuste menor para mejorar naturalidad formal y coherencia de notas. ''que no deben hacerse'' es aceptable, aunque ''que no se deben hacer'' suena más idiomático en español actual. La nota [a] contiene una alternativa impropia: ''los niños de Israel'' no es una buena opción para בְּנֵי יִשְׂרָאֵל en este contexto; ''los hijos de Israel'', ''los israelitas'' o ''los hijos del pueblo de Israel'' serían opciones mejores. El resto del registro es legible y fiel.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה -> ''Yahvé''; נֶפֶשׁ -> ''una persona''; בִשְׁגָגָה -> ''por inadvertencia''. No hay conflicto doctrinal importante. La principal corrección es de colocación/anclaje de nota y de una alternativa española deficiente en la nota [a].'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en 'peca' pero explica 'por inadvertencia'.
    rationale: El contenido de la nota trata sobre בִשְׁגָגָה ('por inadvertencia', 'por error', 'sin intención'), no sobre תֶחֱטָא ('peca'). Debe moverse al sintagma correspondiente para preservar trazabilidad léxica.
  - severity: medium
    issue: La nota [a] ofrece 'los niños de Israel' como alternativa.
    rationale: '''Niños'' distorsiona el sentido de בְּנֵי יִשְׂרָאֵל, que en español bíblico/legal corresponde a ''hijos'', ''hijos del pueblo de Israel'' o, de forma más idiomática, ''israelitas''.'
  - severity: low
    issue: '''en cualquiera de los mandamientos de Yahvé'' suena poco natural en español formal.'
    rationale: Aunque intenta reflejar el valor relacional de la construcción, 'respecto de cualquiera de los mandamientos de Yahvé' o 'en cuanto a cualquiera de los mandamientos de Yahvé' comunica mejor el sentido sin perder fidelidad.
  - severity: low
    issue: '''que no deben hacerse'' es comprensible pero algo menos idiomático que ''que no se deben hacer''.'
    rationale: La segunda formulación mantiene el valor impersonal y fluye mejor en español general contemporáneo.
  revised_spanish_text: 'Habla a los hijos de Israel[a], diciendo: Si una persona peca por inadvertencia[b] respecto de cualquiera de los mandamientos de Yahvé, acerca de cosas que no se deben hacer, y hace una de ellas,'
  revised_footnotes:
  - marker: a
    text: O 'los israelitas'; el hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'por error' o 'sin intención'; el hebreo indica un pecado cometido inadvertidamente y no de manera desafiante.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores sin cambiar el sentido: se movió la nota [b] a ''por inadvertencia'' para que corresponda al término hebreo correcto; se eliminó la alternativa inadecuada ''los niños de Israel'' de la nota [a]; se mejoró la naturalidad formal con ''respecto de cualquiera de los mandamientos de Yahvé'' y ''cosas que no se deben hacer''.'
