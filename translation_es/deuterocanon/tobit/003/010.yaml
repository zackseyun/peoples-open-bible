translation:
  language: es
  text: 'Al oír estas cosas, se angustió muchísimo, hasta el punto de querer ahorcarse. Y dijo: «Soy la única hija de mi padre. Si hago esto, será para él una deshonra, y llevaré su vejez al Hades[a] con dolor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “al reino de los muertos” o “a la tumba”. El griego dice “al Hades”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα ἀκούσασα
  english_pob_choice: When she heard these things
  chosen_spanish: Al oír estas cosas
  alternatives_spanish:
  - Cuando oyó estas cosas
  - Al escuchar estas cosas
  lexicon: LSJ
  rationale: La frase griega funciona como participio temporal; en español, «Al oír» comunica la simultaneidad de forma natural y digna. «Estas cosas» conserva el demostrativo sin precisar más allá del texto.
- source_word: ἐλυπήθη σφόδρα
  english_pob_choice: she was deeply grieved
  chosen_spanish: se angustió muchísimo
  alternatives_spanish:
  - se afligió profundamente
  - sintió un dolor muy grande
  lexicon: LSJ
  rationale: λύπη expresa dolor emocional, pena o aflicción. En este contexto, «se angustió» transmite con claridad la intensidad de σφόδρα y se ajusta al tono dramático del pasaje.
- source_word: ὥστε ἀπάγξασθαι
  english_pob_choice: so that she wanted to hang herself
  chosen_spanish: hasta el punto de querer ahorcarse
  alternatives_spanish:
  - de manera que quiso ahorcarse
  - como para querer ahorcarse
  lexicon: LSJ
  rationale: El infinitivo con ὥστε indica resultado o tendencia hacia una acción contemplada. «Hasta el punto de querer ahorcarse» preserva esa fuerza sin convertirla en una decisión ya ejecutada.
- source_word: Μία μέν εἰμι τῷ πατρί μου
  english_pob_choice: I am my father’s only child
  chosen_spanish: Soy la única hija de mi padre
  alternatives_spanish:
  - Soy la única de mi padre
  - Soy la única hija para mi padre
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «una/única», el contexto exige el sentido filial. En español, «única hija» comunica de modo claro y natural lo que el inglés POB resolvió como «only child».
- source_word: ὄνειδος αὐτῷ ἔσται
  english_pob_choice: it will be a disgrace to him
  chosen_spanish: será para él una deshonra
  alternatives_spanish:
  - será para él un oprobio
  - le traerá vergüenza
  lexicon: LSJ
  rationale: ὄνειδος designa reproche, vergüenza pública o deshonra. «Deshonra» conserva el peso social y honorífico del término en un registro natural para el español bíblico contemporáneo.
- source_word: τὸ γῆρας αὐτοῦ κατάξω
  english_pob_choice: I will bring his old age down
  chosen_spanish: llevaré su vejez
  alternatives_spanish:
  - haré descender su vejez
  - conduciré su vejez
  lexicon: LSJ
  rationale: El verbo griego conserva un movimiento metafórico de descenso. En español, «llevaré su vejez» funciona con la continuación «al Hades» y mantiene la imagen sin forzar un calco poco natural.
- source_word: μετʼ ὀδύνης
  english_pob_choice: with sorrow
  chosen_spanish: con dolor
  alternatives_spanish:
  - con pena
  - con aflicción
  lexicon: LSJ
  rationale: ὀδύνη puede referirse tanto a dolor físico como a angustia anímica. Aquí, por el contexto familiar y funerario, «con dolor» deja abierta la carga afectiva sin sobreinterpretarla.
- source_word: εἰς ᾅδου
  english_pob_choice: to Hades
  chosen_spanish: al Hades
  alternatives_spanish:
  - al reino de los muertos
  - a la tumba
  lexicon: LSJ
  rationale: Se conserva el nombre propio griego ᾅδης, siguiendo la primacía del original y evitando sustituirlo por «infierno» o «sepulcro». «Al Hades» permite al lector reconocer la referencia del texto fuente.
theological_decisions:
- issue: Mantenimiento de ᾅδης en español
  english_pob_reading: Hades
  chosen_spanish_reading: al Hades
  alternative_spanish_readings:
  - al reino de los muertos
  - a la tumba
  rationale: El texto griego nombra ᾅδης explícitamente. Traducirlo por «infierno» introduciría una carga doctrinal no garantizada por el pasaje; «al Hades» conserva la tensión lexical y la deja visible para el lector.
  doctrine_reference: Original-language primacy; avoid collapsing ᾅδης into later doctrinal categories.
- issue: Alcance de ὥστε ἀπάγξασθαι
  english_pob_reading: she wanted to hang herself
  chosen_spanish_reading: hasta el punto de querer ahorcarse
  alternative_spanish_readings:
  - se dispuso a ahorcarse
  - quería ahorcarse
  rationale: La construcción expresa resultado tendente a la acción, no necesariamente ejecución consumada. «Hasta el punto de querer ahorcarse» preserva esa tensión y evita afirmar más de lo que el griego muestra.
  doctrine_reference: Respect for aspect and resultative nuance in the source text.
translation_notes:
  revision_awareness: Se revisó la redacción para mantener la primacía del griego de Swete, conservar la referencia explícita a ᾅδης y reflejar el matiz resultativo de ὥστε ἀπάγξασθαι sin sobrerreconstruir la acción.
  spanish_consistency_notes:
  - Se usa «Hades» de forma consistente para ᾅδης, conforme al criterio del proyecto.
  - Se prefirió «deshonra» para ὄνειδος por su fuerza honorífica en español bíblico actual.
  - Se mantuvo un registro sobrio y legible, evitando arcaísmos innecesarios.
  - La traducción evita convertir el griego en una lectura doctrinal cerrada sobre el destino de los muertos.
