translation:
  language: es
  text: Y me volveré hacia ustedes, y los haré fecundos y los multiplicaré[a], y estableceré mi alianza con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los miraré con favor». El hebreo dice literalmente «me volveré hacia ustedes», lo cual en este contexto implica favor divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָנִיתִי
  english_pob_choice: I will turn toward
  chosen_spanish: me volveré hacia
  alternatives_spanish:
  - me volveré a
  - me dirigiré hacia
  - los miraré con favor
  lexicon: HALOT
  rationale: פנה conserva la imagen concreta de volverse/dirigirse hacia alguien. «Me volveré hacia» mantiene esa dirección sin convertirla de entrada en una paráfrasis de favor, aunque el contexto sí implica benevolencia.
- source_word: אֲלֵיכֶם
  english_pob_choice: toward you
  chosen_spanish: hacia ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT
  rationale: La preposición expresa dirección hacia los destinatarios. «Hacia ustedes» conserva mejor la imagen del movimiento verbal en español actual.
- source_word: וְהִפְרֵיתִי
  english_pob_choice: make you fruitful
  chosen_spanish: los haré fecundos
  alternatives_spanish:
  - los haré fructificar
  - los haré fructíferos
  - los haré fértiles
  lexicon: HALOT
  rationale: El verbo hiphil de פרה es causativo. «Haré fecundos» conserva el valor de producir fruto y funciona de forma natural en español sin perder el eco bíblico de bendición.
- source_word: וְהִרְבֵּיתִי
  english_pob_choice: multiply you
  chosen_spanish: los multiplicaré
  alternatives_spanish:
  - los haré numerosos
  - aumentaré su número
  lexicon: HALOT
  rationale: רבה en hiphil significa hacer numerosos/multiplicar. «Los multiplicaré» sigue de cerca la fuerza verbal y preserva la fórmula de bendición «ser fecundos y multiplicarse».
- source_word: וַהֲקִימֹתִי
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - confirmaré
  - sostendré
  - haré firme
  lexicon: HALOT
  rationale: Con בְּרִית, קום en hiphil suele significar establecer o confirmar un pacto. «Estableceré» es claro, directo y conserva el valor pactual.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: En español bíblico, «pacto» comunica bien el término técnico בְּרִית y evita asociaciones eclesiásticas más cargadas que «alianza» en algunos contextos.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - junto con ustedes
  lexicon: HALOT
  rationale: La relación pactual se expresa de modo directo con «con ustedes». Se mantiene la proximidad del hebreo sin añadir matices no explícitos.
theological_decisions:
- issue: Whether to make the favorable sense of God's turning explicit
  english_pob_reading: Retain the concrete expression 'I will turn toward you' in the main text
  chosen_spanish_reading: 'Retener la imagen concreta: «me volveré hacia ustedes»'
  alternative_spanish_readings:
  - los miraré con favor
  - me mostraré favorable a ustedes
  rationale: El hebreo usa el verbo ordinario «volver(se)/dirigir(se)». En este contexto implica favor divino, pero la imagen concreta es fuente primaria; por eso no se explicita el favor en el cuerpo del texto.
  doctrine_reference: Principio de transparencia al texto fuente; no paraphrase beyond what the source warrants.
- issue: Rendering the covenant formula of fruitfulness and multiplication
  english_pob_reading: Use 'make you fruitful and multiply you'
  chosen_spanish_reading: «los haré fecundos y los multiplicaré»
  alternative_spanish_readings:
  - los haré fértiles y los haré numerosos
  - los haré fructificar y los aumentaré
  rationale: La fórmula conserva el paralelismo y el eco bíblico de bendición del Pentateuco. «Fecundos» y «multiplicaré» mantienen la secuencia verbal sin banalizarla como mero crecimiento demográfico.
  doctrine_reference: Consistencia terminológica en fórmulas de bendición/pacto; fidelidad a la imagen bíblica tradicional.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador español sigue la lectura inglesa auditada y la confirma con una formulación natural en español, manteniendo la imagen verbal de פנה y la fórmula pactual de fecundidad/multiplicación.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el tetragrámaton.
  - Se mantiene «pacto» para בְּרִית por coherencia terminológica con la tradición POB en contextos pactuales.
  - «Hacia ustedes» y «con ustedes» respetan el plural de segunda persona y la relación comunitaria del pasaje.
  - La nota al pie conserva la alternativa semántica principal sin sustituir la imagen concreta del texto en el cuerpo.
