translation:
  language: es
  text: Hizo lo malo ante los ojos de Yahvé. No se apartó[a] de los pecados de Jeroboam hijo de Nabat, quien hizo pecar a Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No se apartó de los pecados de Jeroboam hijo de Nabat»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quien hizo pecar a Israel»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - E hizo
  lexicon: HALOT
  rationale: El verbo עשה en esta fórmula regnal se expresa de manera natural en español con un verbo simple en pasado. Se omite la conjunción inicial para la fluidez, como en el audit trail inglés.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de evaluación moral. En español, 'hizo lo malo' comunica la fórmula sin volverla mecánica, manteniendo el juicio ético.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Conservo el idiomático 'ojos' para reflejar la evaluación divina directa. 'Ante' suena natural en español y preserva el paralelismo con la fórmula hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: ''Yahvé'' mantiene el nombre personal divino y evita la sustitución por un título.'
- source_word: לֹא סָר
  english_pob_choice: He did not turn away
  chosen_spanish: No se apartó
  alternatives_spanish:
  - No se desvió
  - No volvió atrás
  lexicon: HALOT
  rationale: סור aquí comunica apartarse de una conducta establecida. 'No se apartó' es el equivalente español más natural y mantiene la fuerza negativa de permanencia en el mismo rumbo.
- source_word: מֵחַטֹּאות
  english_pob_choice: from the sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de las pecados
  - de las faltas
  lexicon: HALOT
  rationale: El plural 'pecados' preserva la referencia a prácticas culpables concretas vinculadas con Jeroboam. En español, 'pecados' suena más idiomático que una transliteración conceptual más rígida.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  - Jeroboam hijo de Nebat
  lexicon: HALOT
  rationale: Se transliteran los nombres propios según uso bíblico en español. 'Hijo de' conserva el patronímico hebreo con naturalidad.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: who caused Israel to sin
  chosen_spanish: quien hizo pecar a Israel
  alternatives_spanish:
  - quien causó que Israel pecara
  - quien llevó a Israel a pecar
  lexicon: HALOT
  rationale: El Hiphil de חטא es causativo. 'Hizo pecar' es una forma española directa que conserva la agencia causativa sin añadir matices interpretativos excesivos.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de modo explícito. El proyecto pide 'Yahvé' en el texto principal, preservando el nombre propio de Dios en lugar de un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene una fórmula regnal evaluativa y dos notas alternativas: una para לֹא סָר (''He did not turn away'' / ''did not depart'') y otra para el causativo הֶחֱטִיא (''caused Israel to sin'' / ''made Israel sin''). No se reportan revisiones aplicadas; el consenso del control cruzado es alto y coincide con la lectura base.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente con la política del proyecto para יְהוָה.
  - Se eligió 'hizo pecar' como causativo natural en español, equivalente al Hiphil hebreo.
  - '''No se apartó'' conserva la alternativa lexical documentada sin introducir una diferencia doctrinal.'
