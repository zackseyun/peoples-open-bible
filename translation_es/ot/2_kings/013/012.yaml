translation:
  language: es
  text: Ahora, el resto de los hechos[a] de Joás, y todo lo que hizo, y su poderío, con el cual combatió contra Amasías rey de Judá, ¿no están escritos en el Libro de las Crónicas[b] de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus asuntos» o «sus palabras»; דִּבְרֵי en la fórmula regnal de Reyes puede abarcar «hechos», «palabras» o «asuntos». Aquí se entiende como la reseña histórica de sus actos.'
    reason: lexical_alternative
  - marker: b
    text: Esta expresión se refiere a una fuente real de anales citada en Reyes, no al libro bíblico de Crónicas.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Lo demás de
  lexicon: HALOT
  rationale: En esta fórmula regnal, יֶתֶר introduce lo restante de la reseña del rey. «Ahora» da el giro narrativo del hebreo inicial sin perder el valor de transición.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - palabras
  - asuntos
  - acciones
  lexicon: HALOT
  rationale: Aunque el sentido literal es «palabras/asuntos», en la fórmula historiográfica de Reyes apunta a la conducta y acciones del rey; «hechos» comunica bien ese valor en español.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: La construcción hebrea es amplia y totalizante. «Todo lo que hizo» mantiene esa amplitud sin añadir matices ajenos.
- source_word: וּגְבוּרָתוֹ
  english_pob_choice: and his might
  chosen_spanish: y su valor
  alternatives_spanish:
  - y su fuerza
  - y su valentía
  - y sus hazañas
  lexicon: HALOT
  rationale: גְבוּרָה puede abarcar fuerza, valor o proezas. Aquí introduce la acción militar que sigue, por lo que «valor» conserva la idea de capacidad marcial sin convertirla en una paráfrasis excesiva.
- source_word: אֲשֶׁר נִלְחַם עִם
  english_pob_choice: with which he fought against
  chosen_spanish: con el cual combatió contra
  alternatives_spanish:
  - con el cual peleó contra
  - que usó al combatir contra
  - con el que guerreó contra
  lexicon: HALOT
  rationale: El hebreo vincula la «gבורָה» con el combate. «Con el cual» refleja esa relación instrumental y «combatió contra» expresa mejor que un simple «luchó con» el valor adversarial de עִם en este contexto militar.
- source_word: אֲמַצְיָה מֶלֶךְ יְהוּדָה
  english_pob_choice: Amaziah king of Judah
  chosen_spanish: Amasías rey de Judá
  alternatives_spanish:
  - Amasías, rey de Judá
  - Amasías, el rey de Judá
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma española común y se conserva el título real sin artículos innecesarios.
- source_word: הֲלוֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no está escrito
  alternatives_spanish:
  - ¿no están escritos
  - ¿no se hallan escritos
  - ¿acaso no está escrito
  lexicon: HALOT
  rationale: 'La pregunta retórica final en español fluye de modo natural con singular impersonal: el referente es el contenido de la fuente citada, no los elementos aislados. Se conserva la función retórica de la fórmula.'
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the Book of the Chronicles
  chosen_spanish: en el Libro de las Crónicas
  alternatives_spanish:
  - en el libro de los anales
  - en el libro de los hechos de los días
  lexicon: HALOT
  rationale: La expresión designa una fuente real de anales. «Libro de las Crónicas» conserva la fórmula tradicional en español y su sentido archivístico, sin identificarla con el libro canónico de Crónicas.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - perteneciente a los reyes de Israel
  lexicon: HALOT
  rationale: El complemento relacional לְ en este título fuente se expresa de manera natural con «de». Se mantiene la referencia a los reyes de Israel como poseedores/relacionados con el registro.
theological_decisions:
- issue: 'Identidad de la fuente citada: anales reales, no el libro bíblico de Crónicas'
  english_pob_reading: This 'Book of the Chronicles of the Kings of Israel' refers to a royal annalistic source cited in Kings, not the biblical book of Chronicles.
  chosen_spanish_reading: «Libro de las Crónicas de los reyes de Israel» se entiende como una fuente real de anales citada en Reyes, no como el libro canónico de Crónicas.
  alternative_spanish_readings:
  - «Libro de los hechos de los días de los reyes de Israel»
  - «Libro de los anales de los reyes de Israel»
  rationale: La frase es un título de fuente historiográfica. Mantener la formulación tradicional evita confundirla con el libro bíblico posterior, pero la nota aclara la referencia documental.
  doctrine_reference: Historiografía deuteronomista; uso de fuentes regias en 1–2 Reyes
- issue: Valor de עִם en el contexto bélico
  english_pob_reading: The Hebrew preposition is literally 'with,' but in this military context it denotes hostile engagement.
  chosen_spanish_reading: «con el cual combatió contra» refleja el valor instrumental del relativo y el sentido hostil de עִם en contexto militar.
  alternative_spanish_readings:
  - «contra el cual combatió»
  - «con el que guerreó contra»
  - «al combatir contra»
  rationale: La preposición hebrea es literalmente «con», pero en una escena de guerra apunta a enfrentamiento con un enemigo. «Contra» hace explícito ese valor sin borrar la relación gramatical con «su valor».
  doctrine_reference: No doctrinal; decisión semántica y sintáctica
translation_notes:
  revision_awareness: 'Se tomó en cuenta el ajuste reciente del audit trail inglés: el relativo sobre גְּבוּרָתוֹ no debe diluirse en una simple paráfrasis de «cómo peleó», sino conservar la relación entre «su valor» y el combate, mientras que עִם se vuelve naturalmente hostil en español con «contra».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requeriría explícitamente; este versículo no lo contiene.
  - Se mantuvo «reyes de Israel» en minúscula común para el cargo plural, según estilo español bíblico sobrio.
  - Se prefirió «hechos» para דִּבְרֵי en la nota, pero el texto principal usa «hechos» para una lectura más natural sin perder la fórmula regnal.
  - No se introdujo terminología litúrgica ajena al registro histórico de Reyes.
