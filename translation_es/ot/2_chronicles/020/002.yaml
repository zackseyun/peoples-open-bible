  language: en
  yaml_path: translation/ot/2_chronicles/020/002.yaml
  text: Then they came and reported to Jehoshaphat[a], saying, “A great multitude is coming against you from beyond the sea, from Aram; and behold, they are in Hazazon-tamar” (that is[b], En-gedi).
