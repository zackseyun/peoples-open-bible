translation:
  language: es
  text: 'Entonces el rey dijo a Joab[a]: «Mira ahora, he hecho esta cosa. Ve, haz volver al joven Absalón»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira ahora, he concedido esta petición; ve, haz volver al joven Absalón». El hebreo, de manera más literal, dice: «he hecho esta cosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» conserva la secuencia de manera natural en español.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  - el rey David
  lexicon: HALOT
  rationale: El hebreo usa el título definido, no el nombre propio. «Rey» es la forma natural y fiel en español.
- source_word: הִנֵּה נָא
  english_pob_choice: Behold now
  chosen_spanish: He aquí, ahora
  alternatives_spanish:
  - Mira ahora
  - Ve ahora
  - He aquí
  lexicon: HALOT
  rationale: «He aquí» preserva la fuerza de atención de הִנֵּה; «ahora» refleja נָא como partícula que añade urgencia o énfasis.
- source_word: עָשִׂיתִי אֶת הַדָּבָר הַזֶּה
  english_pob_choice: I have done this thing
  chosen_spanish: he hecho esta cosa
  alternatives_spanish:
  - he hecho esto
  - he concedido esta petición
  - he hecho lo que pediste
  lexicon: HALOT
  rationale: Se conserva el literal hebreo «he hecho esta cosa» sin convertirlo explícitamente en «he concedido esta petición», porque el texto hebreo es más amplio y el contexto no obliga a explicitar más.
- source_word: וְלֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Y ve
  - Entonces ve
  lexicon: HALOT
  rationale: El mandato queda breve e imperativo como en hebreo; se evita añadir una conexión más fuerte de la que exige la forma.
- source_word: הָשֵׁב
  english_pob_choice: bring back
  chosen_spanish: trae de vuelta
  alternatives_spanish:
  - haz volver
  - devuelve
  - restaura
  lexicon: HALOT
  rationale: El causativo de שוב se expresa bien con «trae de vuelta», que en español transmite la acción de hacer regresar a alguien.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  - el joven hombre
  lexicon: HALOT
  rationale: «Na'ar» puede abarcar muchacho, joven o siervo; aquí «el joven» conserva la dignidad y la relativa cercanía afectiva del término sin sobreespecificar edad.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Transliteration standard from Hebrew
  rationale: Se usa la forma española tradicional y reconocible del nombre propio, manteniendo la referencia inequívoca al personaje.
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde una versión con «Look now ... So go» a la forma final más literal y sobria «Behold now ... Go», eliminando «So» por no estar exigido explícitamente por el hebreo. La propuesta española sigue esa misma cautela: conserva la literalidad de «he hecho esta cosa» y evita añadir una causalidad explícita no marcada en el texto.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo en pasado con verbo principal en perfecto simple/compuesto según el español natural.
  - 'Se conserva el orden hebreo básico: declaración del rey, fórmula de atención, autoafirmación, mandato.'
  - El nombre de Absalón se adapta a la ortografía española tradicional, consistente con el uso bíblico en español.
  - La nota al pie recoge la alternativa interpretativa que el contexto sugiere sin borrar la literalidad del hebreo.
