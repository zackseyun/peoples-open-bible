review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura distributiva de πᾶν κλῆμα, el lenguaje joánico de «en mí», el contraste entre αἴρει y καθαίρει, y el propósito de ἵνα… φέρῃ. Sin embargo, la nota [a] no preserva fielmente la alternativa inglesa «takes away», porque «la toma» no expresa bien ‘take away/remove’ en español; suena incompleta y puede confundir. Conviene ajustar esa nota a «la quita» o «se la lleva».
  spanish_quality_summary: ‘El texto principal es natural, claro y digno: «Toda rama en mí que no da fruto, la quita; y toda rama que da fruto, la poda para que dé más fruto». La sintaxis y puntuación funcionan bien en español. Las notas son comprensibles, pero la formulación «El verbo traducido ‘la poda’» es menos precisa que referirse al verbo base «podar».’
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «rama», «fruto», «en mí» y «poda» son adecuadas. La elección principal para αἴρει como «quita» está alineada con la POB inglesa y con la racionalidad teológica documentada.
  issues:
  - severity: medium
    issue: La nota [a] usa «la toma» como alternativa de αἴρει.
    rationale: La POB inglesa preserva «takes away» como alternativa a «removes». En español, «la toma» no comunica de forma natural ‘quitar/se llevar’ y puede sugerir simplemente ‘agarrar’. Debe reemplazarse por una alternativa idiomática fiel, como «la quita» o «se la lleva».
  - severity: low
    issue: La nota [b] cita «la poda» en vez del verbo léxico base.
    rationale: En notas léxicas suena más limpio y preciso decir «El verbo traducido ‘podar’…» o reformular la nota para evitar que parezca una cita de una forma flexionada con pronombre.
  revised_spanish_text: Toda rama en mí que no da fruto, la quita[a]; y toda rama que da fruto, la poda[b] para que dé más fruto.
  revised_footnotes:
  - marker: a
    text: O «se la lleva»; algunos entienden aquí αἴρει como «la levanta».
    reason: alternative_reading
  - marker: b
    text: El verbo traducido «la poda» también puede significar «la limpia»; la expresión encaja con la imagen de la viña y anticipa el lenguaje de «limpios» en el versículo siguiente.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural. Se corrige la nota [a] para preservar una alternativa idiomática real para αἴρει en español, en lugar de la poco natural «la toma». Se conserva la nota [b] con cambios mínimos, aunque podría también estilizarse más en una pasada editorial.
