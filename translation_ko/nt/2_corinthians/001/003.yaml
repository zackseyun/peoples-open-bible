id: 2CO.1.3
reference: 2 Corinthians 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ πατὴρ τῶν οἰκτιρμῶν καὶ θεὸς πάσης παρακλήσεως,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/003.yaml
  text: Blessed be the God and Father of our Lord Jesus Messiah, the Father of mercies and God of all comfort,
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'Master' for 'Lord.'
    reason: lexical_alternative
  - marker: c
    text: Or 'compassions.'
    reason: lexical_alternative
  - marker: d
    text: Or 'encouragement' or 'consolation.'
    reason: lexical_alternative
translation:
  language: ko
  text: 찬송하리로다, 우리 주 예수 메시아의 하나님이시요 아버지시며, 자비의 아버지시요 모든 위로의 하나님이신 분께!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed be
  chosen_korean: 찬송하리로다
  alternatives_korean:
  - 송축하리로다
  - 복되시도다
  lexicon: BDAG
  rationale: 히브리어 ברוך 송영 정형의 헬라어 번역으로, 한국어 「찬송하리로다」가 송영의 전통과 무게를 보존한다.
- source_word: οἰκτιρμῶν
  english_pob_choice: mercies
  chosen_korean: 자비
  alternatives_korean:
  - 긍휼
  lexicon: BDAG
  rationale: οἰκτιρμοί는 깊은 연민을 가리킨다. 「자비」가 한국어에서 가장 자연스러우며, 「긍휼」도 가능하다.
- source_word: παρακλήσεως
  english_pob_choice: comfort
  chosen_korean: 위로
  alternatives_korean:
  - 격려
  - 권면
  lexicon: BDAG
  rationale: 본 장(1:3-7) 다섯 차례 반복되는 παράκλησις의 핵심 의미는 환난 가운데 임하는 「위로」이다. 본 단락 전체에서 「위로」로 일관되게 옮긴다.
theological_decisions:
- issue: 1:3-7 παράκλησις 연쇄어휘의 일관된 한국어 번역
  chosen_reading: 위로 (5회 반복 모두 「위로」로 통일)
  alternative_readings:
  - 격려
  - 권면
  - 위로/격려 혼용
  rationale: παράκλησις는 본 단락에서 환난(θλῖψις) 가운데 하나님이 베푸시는 위안의 신학적 무게를 담고 있다. 5절에 걸친 반복 자체가 수사적 강조이므로, 한국어에서도 동일 어휘 반복으로 옮겨 본문의 리듬과 신학적 강조를 보존한다. 「격려」나 「권면」으로 변주하면 반복의 효과가 무너진다.
  doctrine_reference: DOCTRINE.md §1 source-primacy; preserve repetition where the source repeats
