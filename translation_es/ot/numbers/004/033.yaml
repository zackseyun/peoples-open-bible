translation:
  language: es
  text: Este es el servicio de los clanes de los hijos de Merari, para todo su servicio en la tienda de reunión[a], bajo la dirección de Itamar hijo de Aarón el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «por la mano de Itamar», un modismo para indicar supervisión o dirección administrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Esto es
  - Esta es
  lexicon: HALOT
  rationale: La demostrativa femenina introduce una declaración resumidora; en español, «Este es» da una oración completa y natural, sin perder el valor deíctico del hebreo.
- source_word: עֲבֹדַת
  english_pob_choice: the service of
  chosen_spanish: el servicio de
  alternatives_spanish:
  - la labor de
  - el trabajo de
  lexicon: HALOT
  rationale: En este contexto levítico-cultual, עֲבֹדָה designa servicio asignado u oficio, no trabajo genérico. «Servicio» conserva la terminología repetida del versículo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the clans of
  chosen_spanish: las familias de
  alternatives_spanish:
  - los clanes de
  - las estirpes de
  lexicon: HALOT
  rationale: Aunque «clanes» sería más preciso en términos antropológicos, «familias» es el término español más natural y legible para un público eclesial amplio; aquí sigue refiriendo a unidades genealógicas dentro de la tribu.
- source_word: בְּנֵי מְרָרִי
  english_pob_choice: the sons of Merari
  chosen_spanish: los hijos de Merari
  alternatives_spanish:
  - los descendientes de Merari
  lexicon: HALOT
  rationale: Se conserva la forma genealógica hebrea «hijos de» por su transparencia y porque identifica al grupo corporativo de manera directa.
- source_word: לְכָל עֲבֹדָתָם
  english_pob_choice: for all their service
  chosen_spanish: para todo su servicio
  alternatives_spanish:
  - para todas sus labores
  - según todo su servicio
  lexicon: HALOT
  rationale: La ל expresa relación respecto del conjunto de sus funciones. «Para todo su servicio» reproduce la totalidad de las tareas asignadas sin volver la frase pesada en español.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la Tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la Tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» es la designación bíblica habitual en español para אֹהֶל מוֹעֵד y evita introducir una paráfrasis no requerida.
- source_word: בְּיַד
  english_pob_choice: under the direction of
  chosen_spanish: bajo la dirección de
  alternatives_spanish:
  - bajo la supervisión de
  - en manos de
  lexicon: HALOT
  rationale: El hebreo literalmente dice «por la mano de», pero el modismo expresa supervisión o administración. «Bajo la dirección de» comunica fielmente ese valor idiomático en español natural.
- source_word: אִיתָמָר בֶּן אַהֲרֹן הַכֹּהֵן
  english_pob_choice: Ithamar son of Aaron the priest
  chosen_spanish: Itamar, hijo de Aarón el sacerdote
  alternatives_spanish:
  - Itamar, hijo de Aarón, el sacerdote
  lexicon: HALOT
  rationale: Se translitera el nombre propio como «Itamar» y se mantiene la apposición final que identifica a Aarón como sacerdote. La coma ayuda a la lectura en español sin alterar la relación sintáctica.
translation_notes:
  revision_awareness: La fuente inglesa y el texto hebreo están en alta concordancia; no se registran revisiones sustantivas en el audit trail, por lo que el borrador español sigue de cerca la equivalencia óptima ya validada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «Tienda de reunión» para אֹהֶל מוֹעֵד, consistente con el registro bíblico del proyecto.
  - Se conserva la terminología de servicio levítico con «servicio» para עֲבֹדָה.
  - El nombre propio se translitera como «Itamar», coherente con la ortografía española del nombre bíblico.
