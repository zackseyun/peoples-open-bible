revisions:
- from: Mientras la carne aún estaba entre sus dientes[a], antes de que fuera consumida, el furor de Yahvé se encendió contra el pueblo, y Yahvé hirió al pueblo con una plaga muy severa.
  to: Mientras la carne aún estaba entre sus dientes, antes de que fuera consumida[a], la ira de Yahvé se encendió contra el pueblo, y Yahvé hirió al pueblo con una plaga muy severa.
  rationale: Se movió el marcador de nota al pie para anclarlo al término que la nota realmente explica (יִכָּרֵת, 'consumida / cortada'). Además, se ajustó 'furor' a 'ira' para una expresión más estándar y transparente del modismo hebreo en español bíblico moderno, sin cambiar el sentido.
  reviewer_model: gpt-5.4
