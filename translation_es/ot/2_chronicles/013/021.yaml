revisions:
- from: Y Abías se hizo fuerte[a], y tomó para sí catorce mujeres[b], y engendró veintidós hijos y dieciséis hijas.
  to: Y Abías se hizo fuerte[a], y tomó para sí catorce esposas[b], y engendró veintidós hijos y dieciséis hijas.
  rationale: Se cambia «mujeres» por «esposas» para preservar mejor en español el sentido matrimonial del modismo hebreo נשא ... נשים, manteniendo a la vez la cercanía formal de «tomó para sí». El resto del versículo puede permanecer igual porque refleja adecuadamente el hebreo y el enfoque del POB.
