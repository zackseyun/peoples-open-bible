base_translation:
  language: en
  yaml_path: translation/ot/isaiah/054/010.yaml
  text: For the mountains may depart and the hills may be removed[a], but my steadfast love will not depart from you, and my covenant of peace will not be removed, says Yahweh[c][b], who has compassion on you.
  footnotes:
  - marker: a
    text: Or 'be removed' for 'depart' (both occurrences of the verb מוּשׁ).
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates חֶסֶד, a term that can also carry the sense of loyal or covenant love.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my covenant of well-being'; 'peace' (shalom) includes wholeness and welfare, not only the absence of conflict.
    reason: lexical_alternative
