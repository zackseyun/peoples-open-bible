translation:
  language: es
  text: Él partió el mar y los hizo pasar[a][b]; hizo que las aguas se alzaran como un montón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dividió el mar».
    reason: lexical_alternative
  - marker: b
    text: O «los hizo cruzar».
    reason: lexical_alternative
  - marker: c
    text: O «como un muro»; el hebreo dice «como un montón», destacando que las aguas quedaron amontonadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּקַע
  english_pob_choice: split
  chosen_spanish: partió
  alternatives_spanish:
  - dividió
  - abrió
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de abrir o partir en dos. «Partió» conserva la fuerza concreta y natural del original en español moderno, sin perder el sentido de ruptura del mar.
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el mar del éxodo
  lexicon: HALOT
  rationale: En poesía hebrea el sustantivo es genérico, pero en el contexto del éxodo alude al mar atravesado por Israel. «Mar» es una equivalencia natural en español y evita añadir una identificación más específica que el texto no da aquí.
- source_word: וַיַּעֲבִירֵם
  english_pob_choice: made them pass through
  chosen_spanish: los hizo pasar
  alternatives_spanish:
  - los condujo a través
  - los hizo cruzar
  lexicon: HALOT
  rationale: 'El hiphil tiene valor causativo: Dios hizo que pasaran. «Los hizo pasar» preserva de manera transparente esa causatividad en español y evita suavizarla con un verbo menos explícito.'
- source_word: וַיַּצֶּב
  english_pob_choice: made ... stand
  chosen_spanish: hizo que ... se detuvieran
  alternatives_spanish:
  - los puso en pie
  - hizo que ... quedaran firmes
  lexicon: HALOT
  rationale: El verbo comunica establecer o hacer quedar firme. En español, para las aguas, «se detuvieran» comunica bien la imagen de quedar suspendidas o retenidas, dentro del paralelo poético con «como un montón».
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo sugiere las aguas como masa poética. «Las aguas» conserva el plural y el tono bíblico, mejor que singularizarlo como «el agua».
- source_word: כְּמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  lexicon: HALOT
  rationale: Partícula comparativa directa; «como» es la opción natural y fiel en español.
- source_word: נֵד
  english_pob_choice: a heap
  chosen_spanish: un montón
  alternatives_spanish:
  - un montón
  - un montón de agua
  - un cúmulo
  lexicon: HALOT
  rationale: El sustantivo denota algo amontonado o apilado. «Un montón» reproduce la imagen de una masa acumulada sin importar la interpretación de «muro», que el POB inglés reservó como alternativa textual.
theological_decisions:
- issue: Imagen concreta del milagro del mar
  english_pob_reading: Retain the concrete image 'the waters stand like a heap' without explaining mechanism.
  chosen_spanish_reading: 'Conservar la imagen concreta: «las aguas se detuvieron como un montón».'
  alternative_spanish_readings:
  - las aguas se alzaron como un muro
  - las aguas quedaron retenidas
  rationale: La línea poética presenta la acción salvadora de Dios con una imagen física y vívida. Mantenerla sin explicarla preserva la fuerza teológica del texto y evita resolver indebidamente la forma del milagro.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios y la evaluación interna mostró acuerdo alto con el inglés auditado.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético de dos miembros con causa divina explícita.
  - Se prefirió «mar» y «aguas» en español para reflejar el hebreo sin añadir especificaciones ausentes.
  - Se conservó la tensión entre la imagen de «montón» y la alternativa interpretativa «muro» en nota, como en el audit trail inglés.
