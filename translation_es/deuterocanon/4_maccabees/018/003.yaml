translation:
  language: es
  text: Por esta razón[a], a causa de su piedad, cuando aquellos hombres entregaron sus cuerpos a aquellos sufrimientos, no solo fueron admirados por los hombres, sino que también fueron considerados dignos de una porción divina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una porción de Dios» o «una participación en lo divino». La frase griega es breve y puede referirse tanto a una recompensa asignada por Dios como a una participación en una porción divina.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνθʼ ὧν
  english_pob_choice: For this reason
  chosen_spanish: Por esto
  alternatives_spanish:
  - Por esta razón
  - Por lo cual
  lexicon: LSJ
  rationale: El giro introduce una consecuencia o inferencia respecto del contexto previo. «Por esto» conserva la fuerza causal-consecutiva en español natural y breve, sin volverlo más explicativo de lo que permite el griego.
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: because of their godliness
  chosen_spanish: porque de su piedad
  alternatives_spanish:
  - a causa de su piedad
  - por su devoción a Dios
  - por su reverencia
  lexicon: BDAG
  rationale: εὐσέβεια en 4 Macabeos apunta a devoción reverente a Dios. «Piedad» es un equivalente digno y comprensible en español; se evita una paráfrasis más amplia que atenúe el contenido religioso.
- source_word: προεμενοι
  english_pob_choice: gave up
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - cedieron
  - ofrecieron
  lexicon: LSJ
  rationale: En este contexto martirial, el participio expresa el acto de entregar los cuerpos a los sufrimientos. «Dieron» mantiene la idea de entrega sin añadir un matiz sacrificial que el griego no obliga a explicitar.
- source_word: τὰ σώματα
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - sus propios cuerpos
  - su cuerpo
  lexicon: BDAG
  rationale: Es la correspondencia directa y natural del objeto griego. El posesivo plural se entiende por el contexto y se conserva sin sobrecargar la frase.
- source_word: τοῖς πόνοις ἐκείνοι
  english_pob_choice: to those sufferings
  chosen_spanish: a aquellos sufrimientos
  alternatives_spanish:
  - a aquellos dolores
  - a aquellas penas
  - a esos sufrimientos
  lexicon: BDAG
  rationale: πόνοι puede significar dolores o sufrimientos; aquí el campo martirial favorece «sufrimientos». «Aquellos» reproduce el demonstrativo enfático que remite a las pruebas ya narradas.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino que también
  alternatives_spanish:
  - no solamente ... sino también
  - no solo ... sino además
  lexicon: BDAG
  rationale: Se conserva la correlación contrastiva del griego con una construcción idiomática y clara en español.
- source_word: ὑπὸ τῶν ἀνθρώπων
  english_pob_choice: by men
  chosen_spanish: por los hombres
  alternatives_spanish:
  - por la gente
  - por los seres humanos
  lexicon: BDAG
  rationale: Se mantiene el contraste humano-divino del pasaje. «Los hombres» refleja el griego de manera directa; aquí funciona de modo inclusivo como referente humano general, no como restricción masculina.
- source_word: ἐθαυμάσθησαν
  english_pob_choice: were admired
  chosen_spanish: fueron admirados
  alternatives_spanish:
  - fueron objeto de admiración
  - fueron tenidos en admiración
  - causaron admiración
  lexicon: BDAG
  rationale: El pasivo expresa la reacción de observadores humanos. «Fueron admirados» es idiomático y conserva el sentido de asombro/aprecio sin diluirlo.
- source_word: θείας μερίδος
  english_pob_choice: a divine share
  chosen_spanish: una porción divina
  alternatives_spanish:
  - una parte divina
  - una porción de Dios
  - una participación en lo divino
  lexicon: LSJ
  rationale: '«Porción divina» conserva la concisión y la ambigüedad del griego: puede aludir a una asignación procedente de Dios o a participación en lo divino. Se evita fijar el sentido en una sola dirección doctrinal.'
- source_word: κατηξιώθησαν
  english_pob_choice: were counted worthy of
  chosen_spanish: fueron considerados dignos de
  alternatives_spanish:
  - fueron tenidos por dignos de
  - se les consideró dignos de
  - fueron juzgados dignos de
  lexicon: BDAG
  rationale: El verbo expresa evaluación de dignidad. «Fueron considerados dignos de» preserva el valor declarativo y el tono elevado del texto.
theological_decisions:
- issue: Sentido de θείας μερίδος
  english_pob_reading: a divine share
  chosen_spanish_reading: una porción divina
  alternative_spanish_readings:
  - una porción de Dios
  - una participación en lo divino
  - una porción procedente de Dios
  rationale: El griego es comprimido y permite tanto una recompensa otorgada por Dios como una participación en un orden/división divina. «Una porción divina» deja abierta esa tensión teológica, siguiendo el criterio POB de no resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del original.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y el trazado auditado en inglés. Se mantiene la ambigüedad de θείας μερίδος sin convertirla en «recompensa celestial» ni en lenguaje doctrinal más interpretativo. No se detectaron revisiones previas aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece.
  - «Piedad» se emplea para εὐσέβεια como virtud religiosa reverente, no como mero formalismo.
  - «Porción divina» mantiene la ambigüedad teológica señalada por el audit trail.
  - «Los hombres» conserva el contraste humano/divino del pasaje y refleja el griego de manera directa.
