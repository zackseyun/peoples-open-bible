review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: niega que el poder/divinio de Dios dependa de la multitud o de los fuertes, y preserva la cadena nominal de predicados divinos aplicada a grupos vulnerables. Sin embargo, hay dos desajustes importantes en el aparato: las notas al pie están ancladas en palabras equivocadas. La nota sobre ἀπεγνωσμένων (''los desamparados'' / alternativa ''los desesperados'') aparece marcada en ''multitud'', y la nota sobre σωτήρ (''salvador'' / alternativa ''libertador'') aparece marcada en ''desamparados''. Además, ''ayudador'' suena menos natural y eclesialmente legible que ''auxiliador'' o ''ayuda'', aunque no es un error de sentido.'
  spanish_quality_summary: El español es generalmente claro y digno, con buena cadencia litánica. 'Porque tu poder no está en una multitud' y 'ni tu dominio entre los fuertes' son comprensibles, aunque el segundo miembro fluye mejor con 'está'. La principal debilidad estilística es 'ayudador', que resulta poco natural en español bíblico general; 'auxiliador' conserva la forma nominal y el tono elevado sin sonar forzado. El resto —'sostenedor', 'refugio', 'salvador'— es legible y fiel.
  glossary_alignment: No hay conflictos con la terminología proyectual principal. 'Dios' para θεός y 'salvador' para σωτήρ están alineados. La decisión 'los humildes' para ταπεινῶν es aceptable, aunque 'los humildes' inclina algo más hacia la virtud interior que 'los abatidos/los de condición humilde'; no exige adjudicación. La revisión propuesta mantiene la cadena compacta del POB y corrige solo anclajes de notas y naturalidad léxica menor.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en lugares incorrectos del texto.
    rationale: La nota [a] explica una alternativa para 'los desamparados' (ἀπεγνωσμένων), pero está colocada en 'multitud'. La nota [b] explica una alternativa para 'salvador' (σωτήρ), pero está colocada en 'desamparados'. Esto distorsiona el aparato crítico y debe corregirse.
  - severity: medium
    issue: '''Ayudador'' suena poco natural en español bíblico general.'
    rationale: Aunque transmite βοηθός como sustantivo personal, 'ayudador' es menos idiomático que 'auxiliador', que conserva el registro elevado y la función nominal de manera más natural y eclesialmente legible.
  - severity: low
    issue: Asimetría verbal en 'ni tu dominio entre los fuertes'.
    rationale: Elipsis comprensible, pero 'ni tu dominio está entre los fuertes' refleja con mayor claridad el paralelismo con la primera cláusula sin añadir significado.
  revised_spanish_text: Porque tu poder no está en una multitud, ni tu dominio está entre los fuertes; más bien, tú eres Dios de los humildes, auxiliador de los menores, sostenedor de los débiles, refugio de los desamparados[a], salvador[b] de los que no tienen esperanza.
  revised_footnotes:
  - marker: a
    text: O «los desesperados» para «los desamparados»; el griego puede referirse a personas dadas por perdidas o en desesperación.
    reason: lexical_alternative
  - marker: b
    text: O «libertador» para «salvador».
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas al pie para que correspondan a las palabras pertinentes del texto, se mejora la naturalidad de βοηθός con 'auxiliador', y se explicita 'está' en la segunda cláusula para un paralelismo español más claro sin alterar el sentido.
