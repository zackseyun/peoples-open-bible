  to: 'Pero el olivo les dijo: «¿He de dejar de producir mi aceite[a], por el cual son honrados los dioses[b] y los hombres, y ponerme a mecerme sobre los árboles?»'
  rationale: 'Se corrige la decisión principal sobre אֱלֹהִים para alinearla con la evidencia hebrea y el audit trail del POB: «los dioses» en el texto principal y «Dios» en nota. Se mejora la naturalidad y el tono retórico con «¿He de dejar de producir...?» y se reemplaza «ondular» por «mecerme», que conserva mejor la imagen arbórea y el matiz irónico de לָנוּעַ. Se elimina la nota innecesaria sobre el orden de palabras y se conservan solo notas significativas y ancladas.'
