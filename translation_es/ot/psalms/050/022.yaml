translation:
  language: es
  text: Entiendan esto[a], por favor, ustedes que olvidan a Dios, no sea que los desgarre, y no haya quien los rescate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no sea que desgarre, y no haya rescatador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּֽינוּ
  english_pob_choice: Understand
  chosen_spanish: Comprendan
  alternatives_spanish:
  - Entiendan
  - Consideren
  - Presten atención
  lexicon: HALOT
  rationale: Es un imperativo plural de בין con sentido de discernir/comprender. «Comprendan» comunica con naturalidad la exhortación urgente y mantiene el valor intelectual y exhortativo del verbo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - ahora
  - les ruego
  lexicon: HALOT
  rationale: La partícula añade súplica o urgencia, no simple tiempo. «Por favor» conserva el tono de ruego en español moderno sin sobreactuar.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta advertencia
  - este asunto
  lexicon: HALOT
  rationale: El demostrativo remite a la advertencia inmediata previa. «Esto» es lo suficientemente literal y evita especificar indebidamente el referente.
- source_word: שֹׁכְחֵי אֱלֹהַּ
  english_pob_choice: you who forget God
  chosen_spanish: ustedes que olvidan a Dios
  alternatives_spanish:
  - los que olvidan a Dios
  - ustedes que se olvidan de Dios
  lexicon: HALOT
  rationale: El participio funciona vocativamente. «Ustedes que olvidan a Dios» preserva la apelación directa y la fuerza durativa del participio sin volverlo excesivamente arcaico.
- source_word: אֱלֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: Es el título divino singular estándar; no hay base aquí para expandirlo. «Dios» conserva la neutralidad y la referencia directa.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: Introduce una advertencia de consecuencia negativa. «No sea que» transmite bien el valor precautorio y solemne en español bíblico actual.
- source_word: אֶטְרֹף
  english_pob_choice: I tear you apart
  chosen_spanish: los despedace
  alternatives_spanish:
  - los raje
  - los destroce
  - los despedace por completo
  lexicon: HALOT
  rationale: טרף conserva la imagen violenta de desgarrar/despedazar. «Los despedace» mantiene la fuerza del verbo y la metáfora de juicio sin suavizarla a «destruir».
- source_word: וְ/אֵין מַצִּיל
  english_pob_choice: and there be no one to rescue
  chosen_spanish: y no haya quien rescate
  alternatives_spanish:
  - y no haya quien libre
  - y no exista rescate
  lexicon: HALOT
  rationale: La construcción existencial niega la presencia de un salvador/rescatador. «No haya quien rescate» es natural en español y conserva la ausencia absoluta de auxilio.
theological_decisions:
- issue: Imagen judicial de despedazamiento en אֶטְרֹף
  english_pob_reading: 'Retain the predatory metaphor as a direct statement of God’s judgment: ''I tear you apart.'''
  chosen_spanish_reading: 'Mantener la metáfora violenta como amenaza directa: «los despedace».'
  alternative_spanish_readings:
  - los destruya
  - los arranque
  - los raje
  rationale: El hebreo usa una imagen vívida de desgarrar/predar. Suavizarla eliminaría la tensión teológica del juicio expresado en el texto. «Despedace» conserva la severidad sin introducir una interpretación ajena.
  doctrine_reference: Principio de primacía del texto original; preservación de imágenes de juicio sin domesticarlas.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés de POB: mantiene el imperativo plural, la partícula de ruego, la advertencia con פֶּן y la imagen fuerte de טרף. No se identificaron revisiones posteriores que exijan ajustes adicionales.'
  spanish_consistency_notes:
  - Se usa «Dios» de manera uniforme para אֱלֹהַּ.
  - Se conserva un registro bíblico digno pero comprensible para lectores modernos.
  - Se evita sustituir la imagen de juicio por un verbo más abstracto como «destruir», para no perder la tensión semántica del original.
