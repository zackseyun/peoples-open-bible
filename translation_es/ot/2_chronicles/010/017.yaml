translation:
  language: es
  text: Pero Roboam reinó sobre los hijos de Israel que habitaban en las ciudades de Judá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel que habitaban en las ciudades de Judá».'
