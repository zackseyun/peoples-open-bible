revisions:
- from: Y sucedió que, cuando Zimri vio que la ciudad había sido capturada, entró en la ciudadela de la casa del rey y quemó la casa del rey sobre sí con fuego[a], y murió.
  to: Cuando Zimri vio que la ciudad había sido capturada, entró en la ciudadela[a] de la casa del rey y quemó la casa del rey sobre sí mismo con fuego[b], y murió.
  rationale: Se eliminó «Y sucedió que» para mejorar la naturalidad del español sin alterar la función temporal del hebreo. Se reubicó la nota sobre «ciudadela» en el término correcto y se añadió la nota literal/cultural que el inglés ya documentó para la construcción «sobre sí mismo con fuego», necesaria también en español.
