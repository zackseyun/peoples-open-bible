review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la secuencia y el sentido del hebreo: גִּבּוֹר, אִישׁ מִלְחָמָה, שׁוֹפֵט, נָבִיא, קֹסֵם, זָקֵן. Mantiene bien el carácter catalogal de oficios/figuras sociales que Yahvé quitará. La principal desviación está en la nota al pie, que conserva indebidamente el inglés «soothsayer» en vez de una alternativa española. Además, «anciano» es posible, pero «el anciano» tiende a sonar más etario que institucional en español; «el líder anciano» sería demasiado interpretativo, mientras que «el anciano» sigue siendo aceptable. No hay problema teológico con «adivino».'
  spanish_quality_summary: El español es claro y natural. «El valiente y el hombre de guerra, el juez y el profeta, el adivino y el anciano» fluye bien y evita calcos toscos. La única falla clara de legibilidad/calidad es la nota con un término inglés incrustado. Conviene también ajustar la nota para que use una alternativa idiomática española como «el agorero» o «el adivinador», manteniendo la explicación de la práctica de adivinación.
  glossary_alignment: No hay términos del glosario de proyecto especialmente implicados salvo la política general de fidelidad léxica. «Adivino» representa bien קֹסֵם, en línea con la decisión inglesa «diviner». «Valiente» preserva adecuadamente la distinción respecto de «hombre de guerra». No hay conflicto con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: La nota al pie usa el término inglés «soothsayer».
    rationale: El proyecto requiere español natural y legible; una nota española no debe conservar un lexema inglés. Debe sustituirse por una alternativa española real, idealmente una que refleje el matiz de adivinación.
  - severity: low
    issue: «Anciano» puede percibirse más como edad que como oficio/estatus.
    rationale: Aunque es una traducción defendible y frecuente, el inglés auditado subraya el matiz institucional de זָקֵן. Aquí no exige cambio porque «el anciano» aún puede abarcar ese valor en contexto, pero conviene reconocer la ligera pérdida potencial de matiz.
  revised_spanish_text: el valiente y el hombre de guerra, el juez y el profeta, el adivino[a] y el anciano.
  revised_footnotes:
  - marker: a
    text: O «el agorero». El término hebreo se refiere a quien practica adivinación.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, claro y bien alineado con el hebreo y la auditoría inglesa. Solo se corrige la nota al pie para eliminar el anglicismo «soothsayer» y reemplazarlo por una alternativa española adecuada.
