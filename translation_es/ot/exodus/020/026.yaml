  - severity: low
    issue: El orden «para que no se descubra en él tu desnudez» suena algo trabado en español.
    rationale: El hebreo expresa la finalidad de evitar la exposición de la desnudez; en español moderno, reordenar la frase produce una lectura más natural sin alterar el sentido.
