lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: El demostrativo plural introduce el total del censo; en español natural se expresa con cópula para una formulación publicable y clara.
- source_word: פְּקוּדֵי
  english_pob_choice: the numbered men
  chosen_spanish: los hombres registrados
  alternatives_spanish:
  - los contados
  - los inscritos
  - el total del censo
  lexicon: HALOT
  rationale: En este contexto censal, פְּקוּדֵי refiere a personas contabilizadas/registradas, no solo a un número abstracto. 'Registrados' conserva la idea de inscripción censal y evita una expresión demasiado literal que sonaría rara en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar del hebreo. 'Hijos de Israel' es una equivalencia natural y fiel en español, con el valor corporativo del pueblo.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף וָאָלֶף שְׁבַע מֵאוֹת וּשְׁלֹשִׁים
  english_pob_choice: six hundred one thousand seven hundred thirty
  chosen_spanish: seiscientos mil mil, setecientos treinta
  alternatives_spanish:
  - seiscientos un mil setecientos treinta
  - seiscientos mil, mil setecientos treinta
  - seiscientos un mil, setecientos treinta
  lexicon: HALOT
  rationale: La secuencia hebrea suma 600,000 + 1,000 + 700 + 30. En español, la forma más transparente para conservar la suma es separar el millar adicional con puntuación. Se evita una reformulación que pudiera ocultar el valor aditivo del texto fuente.
theological_decisions:
- issue: Valor corporativo de 'בְּנֵי יִשְׂרָאֵל'
  english_pob_reading: of the sons of Israel
  chosen_spanish_reading: de los hijos de Israel
  alternative_spanish_readings:
  - de los israelitas
  - de los hijos de Israel
  rationale: Se conserva el lenguaje genealógico del hebreo sin reducirlo a un etnónimo abstracto. En español, 'hijos de Israel' mantiene la referencia al pueblo como descendencia/linaje de Israel y funciona de modo congregacional y bíblico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido censal de פְּקוּדֵי
  english_pob_reading: the numbered men
  chosen_spanish_reading: los hombres registrados
  alternative_spanish_readings:
  - los contados
  - los inscritos
  - el total del censo
  rationale: El verso no solo da una cifra; identifica a los varones que han sido pasados por el censo. 'Registrados' preserva el acto administrativo de contar/inscribir y evita convertir el sustantivo en un mero número.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión disponible indica que no hubo cambios necesarios en el pasaje fuente; se mantiene la lectura censal y el total aditivo del hebreo sin introducir armonización ni corrección interpretativa fuera del testimonio dado.
  spanish_consistency_notes:
  - Se usa 'hijos de Israel' de manera consistente con el hebreo familiar/corporativo.
  - Se preserva el matiz censal de פְּקוּדֵי con un término de registro humano, no solo con una cifra.
  - La suma numérica se expresa en forma separada para reflejar la adición hebrea de 1.000 + 700 + 30.
