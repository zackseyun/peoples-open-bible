translation:
  language: es
  text: 'Y dijo[a]: «Sigue tu camino, Daniel, porque las palabras están ocultas y selladas hasta el tiempo del fin.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerradas y selladas». El hebreo usa dos participios pasivos para describir las palabras como inaccesibles hasta el tiempo del fin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol avanza la escena de modo secuencial; en español, «Y dijo» conserva esa progresión de manera natural y sobria.
- source_word: לֵךְ
  english_pob_choice: Go your way
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Ve tu camino
  lexicon: HALOT
  rationale: El imperativo de הלך pide una orden directa. En este contexto, el complemento idiomático «tu camino» no es necesario en español para captar el tono de despedida o cierre, y «Ve» resulta más natural y fiel.
- source_word: דָּנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la orden; «porque» expresa con claridad la causalidad del hebreo en español moderno.
- source_word: סְתֻמִים
  english_pob_choice: concealed
  chosen_spanish: ocultas
  alternatives_spanish:
  - cerradas
  - selladas
  - ocultas
  lexicon: HALOT
  rationale: El participio pasivo de סתם señala que las palabras no están accesibles. «Ocultas» comunica esa inaccesibilidad de forma natural; «selladas» por sí sola no cubre completamente este matiz.
- source_word: וַחֲתֻמִים
  english_pob_choice: and sealed
  chosen_spanish: y selladas
  alternatives_spanish:
  - y cerradas
  - y ocultas
  lexicon: HALOT
  rationale: חָתַם alude al acto de sellar un documento. «Selladas» preserva con precisión la imagen documental y, junto con «ocultas», mantiene la doble pasiva del hebreo.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas
  - los asuntos
  lexicon: HALOT
  rationale: Aquí דְּבָרִים se refiere al mensaje revelado; «las palabras» es claro y directo en español, sin perder la referencia al contenido comunicado.
- source_word: עַד עֵת קֵץ
  english_pob_choice: until the time of the end
  chosen_spanish: hasta el tiempo del fin
  alternatives_spanish:
  - hasta el tiempo del final
  - hasta el fin
  lexicon: HALOT
  rationale: La expresión mantiene la estructura formal y la carga escatológica de Daniel. «Tiempo del fin» conserva la tensión teológica sin precisar más de lo que el hebreo dice.
theological_decisions:
- issue: Tensión escatológica de עֵת קֵץ
  english_pob_reading: the time of the end
  chosen_spanish_reading: el tiempo del fin
  alternative_spanish_readings:
  - el fin
  - el final
  rationale: Se conserva la fórmula daniélica con su peso apocalíptico, evitando suavizarla con expresiones más interpretativas.
  doctrine_reference: Preservar la tensión teológica y la consistencia terminológica dentro de Daniel.
- issue: 'Doble pasivo: סְתֻמִים וַחֲתֻמִים'
  english_pob_reading: concealed and sealed
  chosen_spanish_reading: ocultas y selladas
  alternative_spanish_readings:
  - selladas y ocultas
  - cerradas y selladas
  rationale: El hebreo acumula dos participios pasivos para subrayar que el contenido permanece inaccesible hasta el momento señalado. La traducción refleja esa acumulación sin resolverla en una sola idea.
  doctrine_reference: Mantener la fuerza retórica del texto fuente y su restricción revelacional.
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión del POB inglés de preservar el doble pasivo hebreo («concealed and sealed») y la fórmula escatológica («the time of the end»), pero ajusta la primera pareja de términos para que suene natural en español sin perder la idea de inaccesibilidad.
  spanish_consistency_notes:
  - Se mantiene «Daniel» como nombre propio estándar.
  - «Tiempo del fin» conserva la terminología apocalíptica usada en Daniel.
  - La combinación «ocultas y selladas» refleja dos matices distintos y evita sustituirlos por un único equivalente.
  - La puntuación con comillas angulares sigue la convención tipográfica del español.
