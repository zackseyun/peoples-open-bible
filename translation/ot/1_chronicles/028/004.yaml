theological_decisions:
- issue: Force of לְעוֹלָם in David's kingship
  chosen_reading: Rendered 'forever' to preserve the dynastic and covenantal horizon of the statement.
  alternative_readings:
  - for a long duration
  - perpetually in a hyperbolic royal sense
  rationale: In context David recounts the LORD's choice within Judah and his father's house, language tied to the enduring Davidic line rather than merely his personal reign. The translation preserves that theological tension without explicating later messianic fulfillment in the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering נָגִיד
  chosen_reading: Rendered as 'ruler' rather than 'prince.'
  alternative_readings:
  - prince
  - leader
  rationale: The term can carry official leadership nuance without necessarily implying a lesser office than king. 'Ruler' communicates authority clearly in modern English while avoiding importing a technical distinction the verse itself does not press.
