translation:
  language: es
  text: Sal tras ella en busca, y acecha[a] en todas sus entradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más enérgicamente: «embóscate en todas sus entradas»; el paralelo griego presenta la imagen de emboscar o estar al acecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָצֵאת
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Sal fuera
  - Ve tras ella
  lexicon: HALOT
  rationale: El infinitivo con sentido exhortativo pide en español un imperativo natural y directo. «Sal» conserva el impulso de movimiento sin añadir matices innecesarios.
- source_word: אַחֲרֶיהָ
  english_pob_choice: after her
  chosen_spanish: tras ella
  alternatives_spanish:
  - detrás de ella
  - en pos de ella
  lexicon: HALOT
  rationale: Mantiene la imagen de seguimiento y respeta el pronombre femenino que retoma a la sabiduría personificada.
- source_word: בְחֵקֶר
  english_pob_choice: in search
  chosen_spanish: en busca
  alternatives_spanish:
  - con búsqueda
  - por investigación
  - como investigador
  lexicon: HALOT
  rationale: «En busca» da en español una formulación idiomática para la idea de búsqueda/investigación. La alternativa más literal «por investigación» suena menos natural y demasiado abstracta.
- source_word: מְבוֹאֶיהָ
  english_pob_choice: her entrances
  chosen_spanish: sus entradas
  alternatives_spanish:
  - sus accesos
  - sus puertas de entrada
  - sus umbrales
  lexicon: HALOT
  rationale: «Entradas» conserva la imagen concreta de accesos o puntos de ingreso, en paralelo con el griego εἰσόδοις.
- source_word: יְרַצֵּד
  english_pob_choice: lurk
  chosen_spanish: acecha
  alternatives_spanish:
  - anda al acecho
  - espera en emboscada
  - vigila
  lexicon: HALOT
  rationale: El hebreo es raro y su campo semántico se aclara con el paralelo griego ἐνέδρευε, que sugiere ponerse al acecho/emboscar. «Acecha» conserva esa fuerza verbal sin volverse excesivamente prolijo.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine pronouns ('her')
  chosen_spanish_reading: Conservar los femeninos («ella», «sus»)
  alternative_spanish_readings:
  - repetir «la sabiduría»
  - usar formulación neutral
  rationale: El hebreo usa sufijos femeninos singulares y el contexto inmediato personifica a la sabiduría. En español, conservar «ella» y «sus» preserva esa textura literaria y teológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Intensidad del verbo final de vigilancia/acecho
  english_pob_reading: Render as 'lurk' in the main text
  chosen_spanish_reading: «acecha» en el texto principal
  alternative_spanish_readings:
  - «vigila»
  - «espía»
  - «está al acecho»
  rationale: La combinación de hebreo y griego favorece una imagen de acecho activo. «Acecha» transmite mejor esa intensidad que una simple vigilancia, y evita diluir la metáfora.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que desplazó la solución inglesa desde una vigilancia neutral hacia un verbo más fuerte ('lurk') para reflejar mejor יְרַצֵּד. En español, «acecha» recoge esa decisión y se ajusta también al paralelo griego ἐνέδρευε.
  spanish_consistency_notes:
  - Se mantuvo el femenino singular para la sabiduría personificada.
  - Se evitó «SEÑOR» y otras sustituciones teológicas no presentes en este versículo.
  - «Entradas» se conserva como imagen espacial concreta, no como abstracción.
  - El tono es exhortativo y literario, no explicativo.
