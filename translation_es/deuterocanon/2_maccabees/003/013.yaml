translation:
  language: es
  text: Pero el otro[a], porque tenía órdenes reales, seguía insistiendo en que estas cosas debían ser llevadas al tesoro real.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al tesoro del rey». El griego εἰς τὸ βασιλικὸν puede referirse al fisco o tesoro real en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δ᾽ ἕτερος
  english_pob_choice: But the other
  chosen_spanish: Pero el otro
  alternatives_spanish:
  - Pero el otro hombre
  - Pero el otro lado
  lexicon: LSJ
  rationale: ἕτερος introduce contraste con la parte anterior; en español, «el otro» preserva esa oposición sin añadir un sustantivo que el griego no expresa.
- source_word: δι᾽ ἃς εἶχεν βασιλικὰς ἐντολάς
  english_pob_choice: because he had royal orders
  chosen_spanish: por las órdenes reales que tenía
  alternatives_spanish:
  - porque tenía órdenes reales
  - a causa de las instrucciones reales que tenía
  lexicon: LSJ
  rationale: La construcción con διά + relativo expresa la base causal. «Por las órdenes reales que tenía» mantiene la causalidad y suena natural en español; «reales» conserva el matiz de procedencia regia de βασιλικὰς.
- source_word: πάντως ἔλεγεν
  english_pob_choice: kept insisting
  chosen_spanish: insistía de todos modos
  alternatives_spanish:
  - insistía con firmeza
  - seguía diciendo con insistencia
  lexicon: LSJ
  rationale: πάντως intensifica la afirmación y el imperfecto ἔλεγεν marca insistencia reiterada. «Insistía de todos modos» conserva el tono enfático y continuado sin cargar demasiado la frase.
- source_word: εἰς τὸ βασιλικὸν
  english_pob_choice: into the royal treasury
  chosen_spanish: al tesoro real
  alternatives_spanish:
  - al tesoro del rey
  - al fisco real
  lexicon: LSJ
  rationale: En este contexto financiero, βασιλικόν funciona como un sustantivo neutro para el tesoro o fisco del rey. «Tesoro real» expresa bien esa institución en español; «del rey» queda como alternativa interpretativa.
- source_word: ἀναλημπτέα
  english_pob_choice: were to be taken
  chosen_spanish: debían ser llevadas
  alternatives_spanish:
  - había que llevarlas
  - tenían que ser retiradas
  lexicon: LSJ
  rationale: El adjetivo verbal expresa obligación o necesidad. «Debían ser llevadas» preserva ese valor y concreta el movimiento implícito del contexto de confiscación o traslado.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - éstas
  - estos bienes
  lexicon: LSJ
  rationale: El demostrativo plural se refiere a los objetos en discusión. «Estas cosas» es fiel y claro en español; «bienes» sería más interpretativo que el griego por sí solo.
translation_notes:
  revision_awareness: Base revisada conforme al texto griego de Swete (1909) y el audit trail en inglés; no se detectaron cambios sustantivos respecto de la lectura inglesa aprobada, salvo ajustes naturales al español para conservar el matiz causal, la insistencia y el valor institucional de βασιλικὸν.
  spanish_consistency_notes:
  - Se mantuvo «real» para βασιλικὸς en lugar de «regio» por claridad y uso más natural en español bíblico contemporáneo.
  - Se evitó «SEÑOR» o terminología teológica no pertinente; el pasaje es administrativo y financiero.
  - «Debían ser llevadas» reproduce la obligación del verbal adjetivo sin introducir una fuerza modal excesiva.
