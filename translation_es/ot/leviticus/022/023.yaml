translation:
  language: es
  text: Pero un buey o una oveja que tenga una extremidad demasiado larga o demasiado corta, podrás ofrecerlo como ofrenda voluntaria[a]; pero para un voto no será aceptado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más general, «deforme o atrofiado». Los términos hebreos probablemente describen dos clases opuestas de desproporción corporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשׁוֹר
  english_pob_choice: an ox
  chosen_spanish: un buey
  alternatives_spanish:
  - un toro
  - un buey de labor
  lexicon: HALOT
  rationale: שׁוֹר designa un bovino macho o, más ampliamente, un buey/novillo en contexto sacrificial. 'Buey' es natural en español bíblico y conserva la referencia al animal bovino sin especificar de más.
- source_word: וָשֶׂה
  english_pob_choice: or a sheep
  chosen_spanish: o una oveja
  alternatives_spanish:
  - o un cordero
  - o un animal del rebaño
  lexicon: HALOT
  rationale: שֶׂה puede abarcar una res menor del rebaño, pero aquí el contraste con שׁוֹר favorece 'oveja' como equivalente claro y fluido en español.
- source_word: שָׂרוּעַ
  english_pob_choice: that has a limb too long
  chosen_spanish: que tenga una extremidad demasiado larga
  alternatives_spanish:
  - que tenga una parte demasiado larga
  - deforme
  lexicon: HALOT
  rationale: El término sugiere desproporción por algo extendido o alargado. 'Extremidad demasiado larga' conserva la imagen corporal específica y evita una generalización excesiva.
- source_word: וְקָלוּט
  english_pob_choice: or too short
  chosen_spanish: o demasiado corta
  alternatives_spanish:
  - o atrofiada
  - o contraída
  lexicon: HALOT
  rationale: El par con שָׂרוּעַ apunta al contraste de desproporción opuesta. 'Demasiado corta' preserva esa oposición de manera comprensible en español.
- source_word: נְדָבָה
  english_pob_choice: a freewill offering
  chosen_spanish: ofrenda voluntaria
  alternatives_spanish:
  - ofrenda de libre voluntad
  - ofrenda voluntaria
  lexicon: HALOT
  rationale: נְדָבָה es una ofrenda dada libremente, no por obligación. 'Ofrenda voluntaria' transmite bien el sentido cultual y es natural en español.
- source_word: תַּעֲשֶׂה אֹתוֹ
  english_pob_choice: you may make it
  chosen_spanish: la harás
  alternatives_spanish:
  - puedes hacerla
  - la ofrecerás
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'harás', en este contexto sacrificial puede sonar natural en español sin perder el enlace con la acción de destinar/presentar la ofrenda. Se conserva la cercanía verbal con el original.
- source_word: וּלְנֵדֶר
  english_pob_choice: but for a vow
  chosen_spanish: pero para un voto
  alternatives_spanish:
  - pero para una promesa votiva
  - pero en voto
  lexicon: HALOT
  rationale: נֵדֶר es un voto u obligación votiva. 'Voto' es el equivalente más claro y bíblicamente reconocido en español, manteniendo el contraste con la ofrenda voluntaria.
- source_word: לֹא יֵרָצֶה
  english_pob_choice: it will not be accepted
  chosen_spanish: no será aceptado
  alternatives_spanish:
  - no será agradable
  - no será aceptable
  lexicon: HALOT
  rationale: El nifal de רצה en contexto sacrificial expresa aceptación favorable. 'No será aceptado' es una formulación idiomática y fiel para español.
theological_decisions:
- issue: Naturaleza de los defectos físicos en los términos שָׂרוּעַ y קָלוּט
  english_pob_reading: that has a limb too long or too short
  chosen_spanish_reading: que tenga una extremidad demasiado larga o demasiado corta
  alternative_spanish_readings:
  - deforme o atrofiada
  - con una parte demasiado grande o demasiado pequeña
  rationale: El contexto trata de aceptabilidad cultual de animales con defectos. La traducción mantiene la idea de desproporción opuesta sin decidir más allá de lo que el hebreo permite con certeza.
  doctrine_reference: Levítico 22:20-25; Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del POB en inglés, que prefirió mantener la forma verbal más cercana a «make it» frente a una paráfrasis más libre. Se ha conservado el contraste entre ofrenda voluntaria y voto, y la nota alternativa se mantiene para la ambigüedad léxica de los defectos físicos.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en coherencia con el estándar del proyecto; en este versículo no aparece explícitamente en el texto hebreo.
  - '''Voto'' se emplea como término cultual breve y estable; no se expandió a ''ofrenda votiva'' en el texto principal para no cargar la línea.'
  - '''Ofrenda voluntaria'' conserva la terminología POB y la oposición con ''voto''.'
  - Se evitó 'siervo' o fórmulas eclesiásticas tradicionales, porque el versículo trata de una categoría sacrificial técnica.
