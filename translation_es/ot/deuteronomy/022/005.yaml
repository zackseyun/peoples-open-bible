translation:
  language: es
  text: La mujer no llevará algo de hombre[a], ni el hombre se pondrá una prenda de mujer, porque todo el que hace estas cosas es una abominación para Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una prenda de hombre»; el hebreo del primer miembro usa un término más amplio que el del segundo, que sí se refiere a una prenda de vestir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלִי גֶבֶר
  english_pob_choice: a man's article
  chosen_spanish: un artículo de hombre
  alternatives_spanish:
  - una prenda de hombre
  - un objeto de hombre
  - un atuendo de hombre
  lexicon: HALOT
  rationale: כְלִי es más amplio que una prenda de vestir; puede referirse a artículo, utensilio, implemento o equipo. En español, «artículo» conserva esa amplitud mejor que «prenda», y deja visible la distinción con la segunda cláusula, donde sí aparece un término específico para vestidura.
- source_word: עַל אִשָּׁה
  english_pob_choice: wear a woman
  chosen_spanish: la mujer no llevará
  alternatives_spanish:
  - la mujer no tendrá sobre sí
  - la mujer no usará
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática de estar sobre la persona, con sentido de llevar puesto o portar. «Llevará» comunica esa idea con naturalidad en español sin perder el matiz de portar sobre el cuerpo.
- source_word: יִלְבַּשׁ
  english_pob_choice: put on
  chosen_spanish: se pondrá
  alternatives_spanish:
  - vestirá
  - se revestirá
  lexicon: HALOT
  rationale: El verbo expresa vestirse o ponerse una prenda. «Se pondrá» es el equivalente español más natural y conserva la diferencia con la primera cláusula.
- source_word: שִׂמְלַת אִשָּׁה
  english_pob_choice: a woman's garment
  chosen_spanish: una prenda de mujer
  alternatives_spanish:
  - una vestidura de mujer
  - una ropa de mujer
  - un vestido de mujer
  lexicon: HALOT
  rationale: שִׂמְלָה denota una prenda o vestidura, sin precisar una pieza concreta. «Prenda» es suficientemente formal y no restringe indebidamente el término a un tipo específico de ropa.
- source_word: גֶּבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - macho
  lexicon: HALOT
  rationale: גֶּבֶר contrasta aquí con אִשָּׁה en términos humanos y de género. «Hombre» mantiene ese contraste de manera clara y natural en español.
- source_word: אִשָּׁה
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - fémina
  - hembra
  lexicon: HALOT
  rationale: El término contrasta con גֶּבֶר como mujer en sentido ordinario. «Mujer» es la equivalencia española más natural y precisa.
- source_word: תוֹעֲבַת יְהוָה
  english_pob_choice: an abomination to Yahweh
  chosen_spanish: una abominación para Yahvé
  alternatives_spanish:
  - una cosa detestable para Yahvé
  - algo abominable para Yahvé
  - una abominación ante Yahvé
  lexicon: HALOT
  rationale: תוֹעֵבָה es un término fuerte de repugnancia/covenantalidad ante Dios. «Abominación» preserva la fuerza semántica y el juicio moral del texto. «Para Yahvé» mantiene el nombre divino según el estándar del proyecto.
- source_word: כָּל עֹשֵׂה אֵלֶּה
  english_pob_choice: everyone who does these things
  chosen_spanish: cualquiera que hace estas cosas
  alternatives_spanish:
  - todo el que hace estas cosas
  - quienquiera que haga estas cosas
  - todos los que hacen estas cosas
  lexicon: HALOT
  rationale: La construcción participial tiene valor generalizador. «Cualquiera que hace estas cosas» expresa de manera clara y bíblica la universalidad del enunciado sin introducir un giro más interpretativo.
theological_decisions:
- issue: Alcance de la primera prohibición (כְלִי גֶבֶר)
  english_pob_reading: Render broadly as 'a man's article' rather than narrowly as 'man's clothing.'
  chosen_spanish_reading: «un artículo de hombre» mantiene la amplitud del hebreo y no lo reduce a ropa.
  alternative_spanish_readings:
  - «una prenda de hombre»
  - «ropa de hombre»
  - «equipo de hombre»
  rationale: El primer miembro usa un sustantivo más amplio que el segundo, que sí nombra una prenda específica. La traducción conserva esa tensión lexical en vez de resolverla de antemano como si ambos miembros hablaran exactamente de vestimenta.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Contraste de género en la prohibición
  english_pob_reading: Use 'woman' and 'man' rather than gender-neutral terms.
  chosen_spanish_reading: «mujer» y «hombre» conservan el contraste de género explícito del hebreo.
  alternative_spanish_readings:
  - persona
  - alguien
  - ser humano
  rationale: El hebreo contrasta términos masculinos y femeninos de forma directa. Traducir con formas neutrales oscurecería ese contraste y debilitaría la correspondencia con el texto fuente.
  doctrine_reference: Translation philosophy §4
- issue: Fuerza de תוֹעֵבָה
  english_pob_reading: an abomination to Yahweh
  chosen_spanish_reading: «una abominación para Yahvé» conserva el peso moral y cultual de la expresión.
  alternative_spanish_readings:
  - «detestable para Yahvé»
  - «abominable para Yahvé»
  - «una cosa repugnante para Yahvé»
  rationale: En este contexto, el término no es solo 'desagrado' subjetivo sino una calificación fuerte de repulsión moral/covenantal. «Abominación» mantiene esa fuerza en español bíblico contemporáneo.
  doctrine_reference: HALOT; Translation philosophy §5
translation_notes:
  revision_awareness: 'El audit trail inglés indica alta concordancia y sin cambios sustantivos en la revisión más reciente. La versión española sigue esa lectura estable: mantiene la distinción lexical entre כְלִי y שִׂמְלָה, preserva el contraste hombre/mujer, y conserva la fuerza de תוֹעֵבָה con la forma ya auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para יְהוָה.
  - Se mantiene «hombre/mujer» para reflejar el contraste de género del hebreo.
  - «Artículo de hombre» se eligió para no colapsar el primer miembro con la segunda cláusula.
  - La puntuación reproduce una sola frase con dos prohibiciones coordinadas y una causal final.
