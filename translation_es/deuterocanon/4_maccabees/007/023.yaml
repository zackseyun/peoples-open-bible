  source_alignment_summary: 'El griego afirma una máxima exclusiva: «solo el sabio y sensato/autocontrolado es valiente, señor/master de las pasiones». El borrador conserva bien μόνος, σοφός, ἀνδρεῖος y τῶν παθῶν, pero se aparta del expediente POB en dos puntos significativos: reemplaza el masculino genérico sustantivado por una perífrasis («el que se domina»), y usa esa misma perífrasis para σώφρων, con lo que se pierde la estructura coordinada «sabio y autocontrolado» y se desdibuja la decisión auditada sobre el masculino singular genérico.'
  spanish_quality_summary: El español es legible, pero «el sabio y el que se domina» suena desequilibrado y menos elegante que una coordinación adjetival. Además, «señor de las pasiones» en español puede sonar algo ambiguo o demasiado calcado; «dueño de las pasiones» o «amo de las pasiones» comunican mejor el dominio no divino, y «dueño» es el más natural y digno aquí.
  glossary_alignment: 'No hay conflicto con terminología mayor del proyecto. La principal desalineación es doctrinal/estilística con la política de género-accurate del English POB: debe conservarse el masculino singular genérico con nota, mejor como «hombre» en esta máxima. Para κύριος en contexto no divino, «dueño» se alinea mejor con la rationale documentada que «señor», evitando resonancias de título.'
  issues:
  - severity: high
    issue: Se reemplazó el masculino singular genérico por una perífrasis neutra.
    rationale: El expediente inglés documenta explícitamente «man» por la forma masculina singular sustantivada, con nota que preserve alternativas. «El que se domina» no mantiene esa decisión y además absorbe otro término griego.
  - severity: medium
    issue: σώφρων quedó como «el que se domina» en vez de un adjetivo coordinado.
    rationale: La frase griega coordina «sabio» y «autocontrolado/sobrio/sensato». La perífrasis rompe el paralelismo y hace menos nítida la máxima.
  - severity: medium
    issue: κύριος se tradujo «señor» en un contexto no divino.
    rationale: Aunque posible, en español bíblico y eclesial «señor de las pasiones» puede sonar menos natural o rozar resonancias titulales. «Dueño de las pasiones» expresa mejor dominio no divino y conserva la fuerza nominal.
  revised_spanish_text: Porque solo el sabio y dueño de sí mismo, el hombre[a], es valiente, dueño de las pasiones.
