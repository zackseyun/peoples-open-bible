translation:
  language: es
  text: El que vuelve atrás de la justicia al pecado, el Señor lo preparará para la espada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que se hace volver de la justicia al pecado». El participio griego puede sugerir más literalmente ‘traer de vuelta’ o ‘hacer volver’, pero aquí describe el retroceso moral desde un camino justo hacia el pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπανάγων
  english_pob_choice: turns back
  chosen_spanish: se aparta
  alternatives_spanish:
  - vuelve atrás
  - retrocede
  - se vuelve
  lexicon: LSJ
  rationale: El participio puede sugerir literalmente ‘llevar de vuelta’ o ‘hacer volver’, pero en esta construcción expresa un giro moral desde el camino recto hacia el pecado. ‘Se aparta’ comunica bien la desviación sin sonar forzado en español y mantiene la idea de reorientación ética que el contexto exige.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia de Dios
  lexicon: LSJ
  rationale: Aquí el contraste es entre una conducta justa y el pecado. En español, ‘justicia’ conserva mejor la fuerza moral general del término; ‘rectitud’ también sería posible, pero ‘justicia’ mantiene un registro bíblico claro y natural.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la falta
  - el mal
  lexicon: LSJ
  rationale: El sustantivo apunta al mal moral en contraste directo con ‘justicia’. ‘Pecado’ es la correspondencia más directa y estable en español bíblico.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el dueño
  lexicon: LSJ
  rationale: El contexto de Sirácides presenta a Dios como actor del juicio. Aunque el proyecto prefiere ‘Yahvé’ para el nombre divino en el texto principal cuando aparece el Tetragrámaton, aquí el griego dice κύριος; ‘el Señor’ preserva el valor reverencial y coincide con el sujeto explícito del juicio en el enunciado griego.
- source_word: ἑτοιμάσει
  english_pob_choice: will prepare
  chosen_spanish: lo preparará
  alternatives_spanish:
  - lo pondrá listo
  - lo dispondrá
  - lo dejará preparado
  lexicon: LSJ
  rationale: ‘Preparará’ reproduce el futuro simple del verbo y deja abierta la manera precisa en que se ejecuta el juicio. El objeto directo se expresa de forma natural en español mediante ‘lo’.
- source_word: εἰς ῥομφαίαν
  english_pob_choice: for the sword
  chosen_spanish: para la espada
  alternatives_spanish:
  - para la espada grande
  - para el filo de la espada
  - hacia la espada
  lexicon: LSJ
  rationale: ῥομφαία designa una espada grande o una espada de guerra. ‘Espada’ es el equivalente bíblico natural en español; ‘para la espada’ conserva la relación de destino o preparación sin especificar más allá del griego. En nota puede recordarse la fuerza violenta del término.
theological_decisions:
- issue: Agencia divina en el juicio contra el que se desvía de la justicia
  english_pob_reading: A statement of divine judgment against one who reverts from righteousness to sin.
  chosen_spanish_reading: Una afirmación de juicio divino contra quien se aparta de la justicia hacia el pecado.
  alternative_spanish_readings:
  - Una consecuencia providencial más general
  - Una advertencia impersonal sobre el destino del malhechor
  rationale: El griego presenta al Señor como sujeto de la acción futura, así que la traducción mantiene esa agencia. No se suaviza a una mera consecuencia impersonal, pero tampoco se amplía el alcance doctrinal más allá de la frase.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: 'Se ha mantenido la lectura ya corroborada por el control cruzado: no hubo cambios necesarios en la última revisión, y la versión española sigue la misma decisión semántica general del texto inglés auditado.'
  spanish_consistency_notes:
  - Se conserva el contraste moral justicia/pecado en lugar de introducir vocabulario más técnico o eclesiástico.
  - ‘El Señor’ se usa para κύριος porque el texto griego no contiene el Tetragrámaton y el contexto exige sujeto divino explícito.
  - ‘Espada’ mantiene la imagen de juicio sin ampliar innecesariamente el alcance de ῥομφαία.
  - La nota alternativa conserva la tensión lexical de ἐπανάγων sin imponer una sola paráfrasis.
