translation:
  language: es
  text: Los leones jóvenes rugen por la presa[a], y buscan de Dios su alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los leones rugen por la presa»; el término hebreo denota más específicamente a leones jóvenes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּפִירִים
  english_pob_choice: the young lions
  chosen_spanish: los cachorros de león
  alternatives_spanish:
  - los leones
  - los leoncillos
  lexicon: HALOT
  rationale: כְּפִיר suele denotar leones jóvenes o vigorosos. En español, «cachorros de león» comunica con naturalidad la especificidad de la imagen sin borrar el matiz de juventud; «los leones» sería demasiado general y «leoncillos» puede sonar menos idiomático en registro bíblico poético.
- source_word: שֹׁאֲגִים
  english_pob_choice: roar
  chosen_spanish: rugen
  alternatives_spanish:
  - están rugiendo
  - braman
  lexicon: HALOT
  rationale: El participio expresa acción característica y continua. «Rugen» mantiene el valor descriptivo y funciona con naturalidad en poesía española; «braman» es posible, pero menos preciso para leones en este contexto.
- source_word: לַטָּרֶף
  english_pob_choice: for prey
  chosen_spanish: por la presa
  alternatives_spanish:
  - para la presa
  - por alimento
  lexicon: HALOT
  rationale: טֶרֶף apunta a lo capturado como presa. «Por la presa» conserva la imagen de caza mejor que «por alimento», y suena más natural en español que una simple calca.
- source_word: וּלְבַקֵּשׁ
  english_pob_choice: and seek
  chosen_spanish: y buscan
  alternatives_spanish:
  - y buscan obtener
  - y para buscar
  lexicon: HALOT
  rationale: El infinitivo con vav coordinado continúa la acción con valor de propósito o resultado. Dado el paralelismo poético, «y buscan» transmite bien la secuencia verbal y evita una construcción demasiado técnica en español.
- source_word: מֵאֵל
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de El
  - de Dios mismo
  lexicon: HALOT
  rationale: אֵל aquí es el título divino común, no un nombre propio. En español, «de Dios» es claro y fiel; «de El» sonaría innecesariamente técnico o ambiguo.
- source_word: אָכְלָם
  english_pob_choice: their food
  chosen_spanish: su comida
  alternatives_spanish:
  - su alimento
  - lo que comen
  lexicon: HALOT
  rationale: אָכְלָם significa literalmente «su comida / lo que comen». «Su comida» refleja el sentido directo sin repetir «presa», preservando la variación léxica del hebreo.
theological_decisions:
- issue: Providencia divina sobre los animales salvajes
  english_pob_reading: Even the young lions seek their food from God.
  chosen_spanish_reading: Aun los cachorros de león dependen de Dios para hallar su sustento.
  alternative_spanish_readings:
  - Buscan su comida de Dios.
  - Reciben de Dios su alimento.
  rationale: La línea poética no atribuye piedad consciente a los animales, sino dependencia providencial. La redacción principal evita sobreteologizar el verso y mantiene la idea de provisión de Dios en la creación.
  doctrine_reference: Providencia divina en la creación; lectura poética literal sin alegorización.
translation_notes:
  revision_awareness: La revisión inglesa añadió la conjunción explícita «and» y prefirió una forma verbal directa («seek») para reflejar el paralelo hebreo. En español se mantuvo ese paralelismo con «y buscan», conservando la coordinación y el ritmo poético.
  spanish_consistency_notes:
  - Se preservó la variación léxica hebrea entre טָּרֶף («presa») y אָכְלָם («su comida») sin fusionarlas.
  - «Dios» se usa para אֵל conforme al criterio POB cuando el contexto es de provisión creadora.
  - El plural «cachorros de león» refleja el valor específico de כְּפִירִים sin caer en una generalización excesiva.
