translation:
  language: es
  text: No ignorará el clamor del huérfano[a], ni el de la viuda cuando multiplica su queja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea suministrada para este versículo dice: «No ignorará el clamor del huérfano, ni el de la viuda cuando multiplica su queja», pero no coincide con la redacción griega paralela de este lugar y probablemente refleja un desajuste de línea en los datos de origen.'
    reason: textual_variant
lexical_decisions:
- source_word: ὁ φοβούμενος
  english_pob_choice: One who fears
  chosen_spanish: El que teme
  alternatives_spanish:
  - Quien teme
  - El que reverencia
  lexicon: BDAG
  rationale: El participio articulado funciona aquí como un sujeto genérico; en español, 'el que teme' conserva la forma representativa natural sin volverlo demasiado técnico. 'Reverencia' sería posible en algunos contextos, pero aquí el temor reverente queda mejor recogido por 'teme' en combinación con 'Señor'.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se mantiene la designación divina con artículo, como en el inglés auditado. En español, 'Señor' es la forma idiomática y reverente para κύριος en este contexto.
- source_word: οὐ μὴ πτοηθῇ
  english_pob_choice: will not be shaken
  chosen_spanish: no será sacudido
  alternatives_spanish:
  - no será aterrorizado
  - no será perturbado
  lexicon: BDAG
  rationale: πτοέω puede expresar sobresalto o desestabilización por miedo. 'No será sacudido' conserva esa idea de conmoción interior sin añadir una intensidad psicológica excesiva. La voz pasiva en español mantiene el valor de seguridad prometida.
- source_word: οὐ μὴ δειλιάσῃ
  english_pob_choice: will not be afraid
  chosen_spanish: ni se acobardará
  alternatives_spanish:
  - ni tendrá miedo
  - ni perderá el valor
  lexicon: BDAG
  rationale: δειλιάω enfatiza miedo que lleva a falta de ánimo o valentía. 'Acobardarse' expresa bien esa pérdida de firmeza, complementando 'no será sacudido' con un matiz de cobardía vencida.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - espera
  lexicon: BDAG
  rationale: '''Esperanza'' es la correspondencia más directa y transparente en español, y mantiene el valor teológico de apoyo confiado que el texto atribuye al Señor.'
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - el mismo Señor
  - él mismo
  lexicon: BDAG
  rationale: El pronombre se refiere naturalmente al Señor como antecedente inmediato. 'Él es su esperanza' conserva la sencillez del griego y la claridad referencial en español.
theological_decisions:
- issue: Base textual para Sirach 34:14 ante la discrepancia entre el hebreo suministrado y el griego paralelo
  english_pob_reading: Translate the Greek reading as the main text for Sirach 34:14; preserve the divergent Hebrew as a transparency note.
  chosen_spanish_reading: 'Traducir el griego como texto principal: ''El que teme al Señor no será sacudido ni se acobardará, porque él es su esperanza.'''
  alternative_spanish_readings:
  - '''He will not ignore the cry of the orphan, or the widow when she pours out her complaint.'''
  - '''No ignorará el clamor del huérfano, ni de la viuda cuando derrama su queja.'''
  rationale: El paquete de fuentes marca una descoincidencia mayor entre el hebreo de Kahana y el paralelo griego, y el propio audit trail inglés opta por el griego como base textual defendible para este versículo. Para una edición española transparente, conviene seguir ese mismo criterio y no mezclar dos líneas distintas en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: para Sirácida, traducir del hebreo donde se conserve y del griego donde no; la incertidumbre textual debe preservarse honestamente.'
translation_notes:
  revision_awareness: El texto español sigue la revisión final que privilegia el griego paralelo para Sirach 34:14, en vez del borrador anterior alineado con el hebreo suministrado. Se conserva la transparencia de la discrepancia textual mediante nota.
  spanish_consistency_notes:
  - Se emplea 'Señor' para κύριος como título divino, en línea con la política del proyecto en español.
  - '''Esperanza'' se mantiene como sustantivo central para ἐλπὶς, evitando una paráfrasis que diluya el apoyo confiado del texto.'
  - El par 'no será sacudido / ni se acobardará' procura reflejar dos verbos griegos distintos sin fundirlos en una sola idea.
