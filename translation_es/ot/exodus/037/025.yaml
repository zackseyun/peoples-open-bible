translation:
  language: es
  text: Hizo el altar del incienso de madera de acacia. Su longitud era de un codo[a], y su anchura de un codo; era cuadrado, y su altura era de dos codos. Sus cuernos eran de una sola pieza con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el altar de incienso».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  lexicon: HALOT
  rationale: El verbo narrativo expresa acción pasada; en español, 'hizo' es natural y conserva la secuencia sin forzar una coordinación inicial innecesaria.
- source_word: מִזְבַּח הַקְּטֹרֶת
  english_pob_choice: the altar of incense
  chosen_spanish: el altar del incienso
  alternatives_spanish:
  - el altar de incienso
  - el altar del incienso aromático
  lexicon: HALOT
  rationale: Mantiene la función cultual del sustantivo compuesto y suena natural en español bíblico moderno. 'Del incienso' refleja bien el constructo hebreo sin tecnicismo excesivo.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de madera de shittim
  - de acacias
  lexicon: HALOT
  rationale: '''Madera de acacia'' comunica el referente botánico de forma clara en español contemporáneo. Se evita la transliteración por no aportar claridad al lector general.'
- source_word: אַמָּה
  english_pob_choice: cubit
  chosen_spanish: codo
  alternatives_spanish:
  - aproximadamente 45 centímetros
  lexicon: HALOT
  rationale: Se conserva la unidad antigua para mantener correspondencia formal con el texto fuente y evitar una precisión moderna que el hebreo no da.
- source_word: אָרְכּוֹ ... רָחְבּוֹ
  english_pob_choice: Its length ... its width
  chosen_spanish: su longitud ... su anchura
  alternatives_spanish:
  - su largo ... su ancho
  lexicon: HALOT
  rationale: '''Longitud'' y ''anchura'' preservan el registro descriptivo y técnico del objeto, alineado con la medida arquitectónica del pasaje.'
- source_word: רָבוּעַ
  english_pob_choice: it was square
  chosen_spanish: era cuadrado
  alternatives_spanish:
  - era de forma cuadrada
  lexicon: HALOT
  rationale: La forma predicativa se expresa naturalmente en español con un adjetivo copulativo breve y fiel.
- source_word: וְאַמָּתַיִם קֹמָתוֹ
  english_pob_choice: and its height was two cubits
  chosen_spanish: y su altura de dos codos
  alternatives_spanish:
  - y su altura era de dos codos
  lexicon: HALOT
  rationale: Se mantiene la medición y se permite una construcción elíptica corriente en español descriptivo; el sentido dimensional permanece claro.
- source_word: מִמֶּנּוּ הָיוּ קַרְנֹתָיו
  english_pob_choice: Its horns were of one piece with it
  chosen_spanish: Sus cuernos eran de una sola pieza con él
  alternatives_spanish:
  - Sus cuernos eran parte de él
  - Sus cuernos salían de él
  lexicon: HALOT
  rationale: La elección conserva la idea de integridad material, no de adición separada. 'De una sola pieza con él' comunica de forma precisa la construcción integral indicada por el hebreo.
translation_notes:
  revision_awareness: El texto coincide con el sentido y el nivel de detalle del audit trail inglés, sin cambios revisionales en el pasaje de base. Se mantuvo la equivalencia óptima para una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se conserva 'codo' como unidad tradicional, en paralelo al inglés 'cubit'.
  - Se usa 'incienso' en lugar de una perífrasis explicativa, porque el hebreo nombra el altar por su uso litúrgico.
  - La formulación 'de una sola pieza con él' evita una interpretación meramente espacial y refleja la construcción integral del objeto.
