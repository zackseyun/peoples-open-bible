translation:
  language: es
  text: Mejor es el hombre que oculta su necedad que el hombre que oculta su sabiduría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mejor es una persona que oculta su necedad que una persona que oculta su sabiduría». El griego ἄνθρωπος puede tener sentido genérico (''persona''), pero el texto principal conserva la forma masculina singular del proverbio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσων
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: LSJ
  rationale: El comparativo proverbial se conserva con una fórmula breve y natural en español. 'Mejor es' mantiene la fuerza sentenciosa del griego.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - alguien
  lexicon: LSJ
  rationale: El griego usa ἄνθρωπος en singular genérico con forma masculina. En español, 'el hombre' preserva el paralelismo del proverbio y la referencia representativa, sin introducir una paráfrasis más amplia.
- source_word: ἀποκρύπτων
  english_pob_choice: who hides
  chosen_spanish: que oculta
  alternatives_spanish:
  - que esconde
  - que disimula
  lexicon: LSJ
  rationale: El participio presente se vierte con una relativa simple y natural. 'Oculta' mantiene la idea de mantener algo escondido sin exagerar el matiz.
- source_word: μωρίαν
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - foolishness
  - locura
  - insensatez
  lexicon: LSJ
  rationale: μωρία expresa necedad/follía moral. 'Necedad' es una opción bíblica y digna en español, más precisa que 'locura' y menos dura que 'estupidez'.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - buen juicio
  lexicon: LSJ
  rationale: '''Sabiduría'' conserva el término clave de Sirácida y refleja de manera directa σοφία, sin suavizar el peso sapiencial del sustantivo.'
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo la estructura proverbial y no introdujo cambios textuales. La versión española sigue de cerca el griego y conserva el paralelismo entre 'oculta su necedad' y 'oculta su sabiduría', sin expandir el sentido más allá de la evidencia fuente.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para σοφία de forma consistente con el vocabulario sapiencial del libro.
  - '''Necedad'' evita una equivalencia demasiado coloquial y preserva el tono proverbial.'
  - '''El hombre'' refleja el masculino genérico del griego; la nota registra la alternativa inclusiva sin desplazar el texto principal.'
