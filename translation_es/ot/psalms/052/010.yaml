  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «olivo» están bien. Para חֶסֶד, «amor leal» es defendible en español si se corrige el artículo y se explica su matiz pactual/fiel; también puede mantenerse la nota con alternativas. No hay términos como Yahvé/Mesías/Espíritu que requieran ajuste especial.
