translation:
  language: es
  text: y trescientos escudos de oro batido[a]; tres minas de oro se aplicaban a cada escudo[b]. Y el rey los puso en la Casa del Bosque del Líbano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oro martillado» o «oro batido en láminas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «tres minas de oro subían sobre el escudo uno», es decir, cada escudo tenía aplicadas tres minas de oro.'
    reason: lexical_alternative
  - marker: c
    text: La Casa del Bosque del Líbano era un edificio real con nombre propio, asociado al complejo palaciego de Salomón (cf. 1 R 7:2).
    reason: cross_reference
lexical_decisions:
- source_word: מָגִנִּים
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - escudos grandes
  - escudos defensivos
  lexicon: HALOT
  rationale: מָגֵן designa un escudo de defensa; en español, «escudos» es la opción natural y fiel. «Bucklers» no tiene equivalente idiomático común en español moderno, y «escudos defensivos» resulta redundante.
- source_word: זָהָב שָׁחוּט
  english_pob_choice: beaten gold
  chosen_spanish: oro batido
  alternatives_spanish:
  - oro martillado
  - oro batido en láminas
  lexicon: HALOT
  rationale: שָׁחוּט expresa oro trabajado por golpeo/martillado para hacerlo delgado. «Oro batido» conserva la imagen técnica y es idiomático; la alternativa «oro martillado» también es válida, pero «batido» sigue más de cerca el valor lexical usado en la POB inglesa.
- source_word: שְׁלֹשֶׁת מָנִים
  english_pob_choice: three minas
  chosen_spanish: tres minas
  alternatives_spanish:
  - tres manehs
  - tres manas
  lexicon: HALOT
  rationale: מָנֶה es una unidad de peso. Se conserva «mina» por ser el equivalente más reconocible en español bíblico, evitando una transliteración menos transparente como «maneh».
- source_word: יַעֲלֶה עַל
  english_pob_choice: went onto
  chosen_spanish: subían sobre
  alternatives_spanish:
  - subieron sobre
  - iban sobre
  - se aplicaban sobre
  lexicon: HALOT
  rationale: El hebreo dice literalmente que el oro «subía sobre» cada escudo. «Subían sobre» preserva la imagen concreta y la lectura distributiva sin volverla demasiado interpretativa.
- source_word: הַמָּגֵן הָאֶחָת
  english_pob_choice: each shield
  chosen_spanish: cada escudo
  alternatives_spanish:
  - el único escudo
  - el uno escudo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el sentido distributivo es claro. En español, «cada escudo» comunica mejor que una calca como «el uno escudo».
- source_word: וַיִּתְּנֵם
  english_pob_choice: put them
  chosen_spanish: los puso
  alternatives_spanish:
  - los colocó
  - los dejó
  lexicon: HALOT
  rationale: נתן aquí indica colocación/ubicación. «Los puso» es la opción directa y natural para expresar que el rey los depositó en un lugar.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  english_pob_choice: the House of the Forest of Lebanon
  chosen_spanish: la Casa del Bosque del Líbano
  alternatives_spanish:
  - la Casa del Bosque de Líbano
  - el Palacio del Bosque del Líbano
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicionalmente entendido como un edificio real. «Casa» refleja mejor el hebreo בֵּית que «palacio», y «Bosque del Líbano» mantiene la forma del designación compuesta.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el trazado auditado de la POB inglesa. Se preserva la imagen concreta del oro que ‘subía sobre’ cada escudo, junto con una nota explicativa para la construcción distributiva. No se detectan revisiones posteriores que exijan ajustar la redacción.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - Se usa «mina» como unidad de peso, coherente con el estándar del proyecto para מָנֶה.
  - Se evita «SEÑOR» como sustituto no pertinente y se conserva el nombre propio del edificio sin normalizarlo a «palacio».
