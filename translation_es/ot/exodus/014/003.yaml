translation:
  language: es
  text: 'Porque el faraón dirá de los hijos de Israel[a]: «Están confundidos[b] en el país; el desierto los ha encerrado[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Israel». O: «los israelitas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desconcertados», «desorientados» o «enredados». El participio hebreo puede expresar confusión, perplejidad o quedar atrapados.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el desierto los ha cercado» o «los ha acorralado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: For Pharaoh will say
  chosen_spanish: Porque el faraón dirá
  alternatives_spanish:
  - Y dirá el faraón
  - Pues el faraón dirá
  lexicon: HALOT
  rationale: El waw + qatal tiene valor futuro en el contexto profético-narrativo. En español, “Porque” conserva el matiz explicativo de la frase frente al discurso previo, mientras “dirá” expresa bien el futuro anticipado.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: Nombre/título histórico
  rationale: En español bíblico es natural usar el título con artículo definido. Mantiene la referencia al gobernante egipcio sin alterar el sentido del original.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - acerca de los hijos de Israel
  - de los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea “hijos de Israel” por fidelidad lexical y porque la POB inglesa la preserva. “De” refleja bien el valor de ל con אמר como objeto del habla.
- source_word: נְבֻכִים
  english_pob_choice: confused
  chosen_spanish: confundidos
  alternatives_spanish:
  - desconcertados
  - perplejos
  - desorientados
  lexicon: HALOT
  rationale: La revisión inglesa prefirió “confused” sobre “wandering in confusion” para no añadir la idea de deambular. “Confundidos” es la equivalencia más directa y sobria en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: “Tierra” mantiene el alcance amplio de אֶרֶץ y suena natural en español bíblico. “País” sería más restrictivo y “región” demasiado interpretativo.
- source_word: סָגַר עֲלֵיהֶם
  english_pob_choice: has shut them in
  chosen_spanish: los ha encerrado
  alternatives_spanish:
  - los ha cerrado dentro
  - los ha cercado
  - los ha tenido atrapados
  lexicon: HALOT
  rationale: El idiomatismo expresa confinamiento o atrapamiento. “Ha encerrado” transmite con claridad la imagen del desierto como agente de cierre, sin añadir explicaciones.
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto
  - la estepa
  - el yermo
  lexicon: HALOT
  rationale: Aunque “wilderness” suele corresponder a “desierto”, en español “desierto” comunica mejor el escenario de éxodo y el encierro físico sugerido por el texto. Se evita “yermo” por ser más literario y menos transparente.
theological_decisions:
- issue: La preposición לִ con אמר y la expresión “hijos de Israel”
  english_pob_reading: of the sons of Israel
  chosen_spanish_reading: de los hijos de Israel
  alternative_spanish_readings:
  - acerca de los hijos de Israel
  - contra los hijos de Israel
  rationale: El hebreo marca a quién se refiere la declaración de Faraón, no necesariamente un discurso “a” ellos. “De los hijos de Israel” preserva la estructura del POB inglés y evita cargar el verso con una inferencia que el hebreo no exige.
  doctrine_reference: Gramática hebrea; uso de ל con אמר
- issue: El estado descrito por נְבֻכִים
  english_pob_reading: confused
  chosen_spanish_reading: confundidos
  alternative_spanish_readings:
  - desconcertados
  - perplejos
  - atrapados
  rationale: La revisión inglesa descartó “wandering in confusion” por añadir movimiento no explícito. “Confundidos” preserva la ambigüedad de desorientación/perplejidad sin borrar la posibilidad contextual de estar atrapados.
  doctrine_reference: Lexicografía hebrea (HALOT); revisión textual POB
- issue: סָגַר עֲלֵיהֶם הַמִּדְבָּר
  english_pob_reading: the wilderness has shut them in
  chosen_spanish_reading: el desierto los ha encerrado
  alternative_spanish_readings:
  - el desierto los ha cerrado dentro
  - el desierto los ha cercado
  - el desierto los tiene atrapados
  rationale: El hebreo presenta al desierto como factor de confinamiento. “Encerrado” conserva la imagen y la fuerza del cierre, sin convertir el enunciado en una mera explicación interpretativa.
  doctrine_reference: Imagen narrativa del Éxodo; semántica de סגר
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que sustituyó “wandering in confusion” por “confused” para no introducir la idea de vagar. Por eso el español evita cualquier verbo de movimiento y concentra el sentido en el estado de confusión/perplejidad. También se respetó la decisión estable de conservar la expresión “sons of Israel”/“hijos de Israel” en lugar de simplificarla a “israelitas”.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” por defecto cuando corresponda al nombre divino; aquí no aparece.
  - Se conservó “hijos de Israel” como forma bíblica transparente, consistente con el tratamiento POB del hebreo.
  - Se prefirió “desierto” para הַמִּדְבָּר por transparencia y naturalidad en español bíblico.
  - No se introdujo “Cristo/Mesías” ni vocabulario doctrinal ajeno al verso.
  - La puntuación y comillas siguen el uso editorial del español moderno, manteniendo la estructura de cita directa.
