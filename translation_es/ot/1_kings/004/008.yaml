translation:
  language: es
  text: 'Y estos son sus nombres: Ben-hur[a], en la región montañosa de Efraín;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hijo de Hur», si se toma como patronímico y no como nombre personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these
  chosen_spanish: Y estos
  alternatives_spanish:
  - Ahora estos
  - Y estos son
  lexicon: HALOT
  rationale: El demostrativo con la conjunción introduce una lista administrativa. «Y estos» conserva la simpleza del hebreo y el enlace narrativo sin añadir matices no presentes en la fuente.
- source_word: שְׁמוֹתָם
  english_pob_choice: were their names
  chosen_spanish: eran sus nombres
  alternatives_spanish:
  - son sus nombres
  - sus nombres eran
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal; en español, «eran sus nombres» suena natural en una enumeración retrospectiva y mantiene el sentido de listado sin forzar una perífrasis más pesada.
- source_word: בֶּן חוּר
  english_pob_choice: Ben-hur
  chosen_spanish: Ben-hur
  alternatives_spanish:
  - el hijo de Hur
  lexicon: HALOT
  rationale: Sigo la decisión del POB inglés de tratarlo como nombre propio en el contexto de una lista de gobernadores, sin convertirlo automáticamente en una afirmación patronímica.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la serranía de Efraín
  - en el monte de Efraín
  lexicon: HALOT
  rationale: הַר en expresiones territoriales suele referirse al relieve alto o zona montañosa, no a un monte aislado. «Región montañosa» comunica ese valor geográfico de manera natural en español.
translation_notes:
  revision_awareness: El pasaje coincide en sustancia con la versión auditada en inglés; no se reportan revisiones aplicadas y el control cruzado indicó alta concordancia.
  spanish_consistency_notes:
  - Se usa «Efraín» para el topónimo, en línea con el uso bíblico estándar en español.
  - Se mantiene «Ben-hur» como forma transliterada, evitando una paráfrasis genealógica en el cuerpo principal.
  - La puntuación con dos puntos reproduce bien la introducción de lista del hebreo y del inglés auditado.
