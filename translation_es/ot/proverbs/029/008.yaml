    issue: «Los hombres de burla» es poco idiomático en español.
    rationale: Aunque intenta reflejar la estructura hebrea, en español suena forzado y menos claro que «los burladores», que preserva mejor el tipo de persona denunciado en Proverbios.
  - severity: low
