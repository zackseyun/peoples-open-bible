translation:
  language: es
  text: con panderos y flautas[a]. Y todos sus hermanos estaban tocando[b], y los hizo subir con aquellos hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pífanos» o «flautas de caña» para αὐλῶν. El griego puede referirse más ampliamente a instrumentos de viento de lengüeta o de caña.
    reason: lexical_alternative
  - marker: b
    text: El griego es abrupto y dependiente del contexto; «tocando» refleja el sentido musical probable de παίζοντες junto a los instrumentos, y «aquellos hombres» explicita el demostrativo ἐκείνων a partir del contexto narrativo.
    reason: alternative_reading
lexical_decisions:
- source_word: τυμπάνων
  english_pob_choice: tambourines
  chosen_spanish: tambores
  alternatives_spanish:
  - pandero
  - panderos
  - timbales
  lexicon: LSJ
  rationale: τύμπανον designa un instrumento de percusión de mano o tipo tamborín; en español, ‘tambores’ comunica el instrumento de forma natural en un contexto festivo, sin forzar una equivalencia más específica de lo que el griego garantiza. ‘Pandero’ sería posible, pero puede sonar demasiado estrecho o litúrgico según el contexto.
- source_word: αὐλῶν
  english_pob_choice: flutes
  chosen_spanish: flautas
  alternatives_spanish:
  - pífanos
  - flautas de caña
  - flautas o pífanos
  lexicon: LSJ
  rationale: αὐλός se refiere a un instrumento de viento; ‘flautas’ es una solución clara y natural en español, coherente con la opción inglesa ‘flutes’. Se mantiene la amplitud semántica sin fijar innecesariamente ‘pitos’ o ‘pífanos’.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - consanguíneos
  - compatriotas
  lexicon: BDAG
  rationale: El plural masculino del griego se conserva como ‘hermanos’. No se neutraliza a un término colectivo porque el texto es explícitamente masculino y el proyecto prefiere preservar esa fuerza cuando el contexto no exige otra cosa.
- source_word: παίζοντες
  english_pob_choice: were playing
  chosen_spanish: estaban tocando
  alternatives_spanish:
  - estaban jugando
  - estaban danzando
  - estaban haciendo música
  lexicon: LSJ
  rationale: En este contexto, junto a instrumentos, παίζοντες tiene sentido musical/festivo. ‘Estaban tocando’ expresa mejor en español la acción de ejecutar instrumentos que el más general ‘estaban jugando’, sin añadir la idea de danza que no aparece explícita.
- source_word: ἐποίησεν αὐτοῖς συναναβῆναι
  english_pob_choice: he made them go up
  chosen_spanish: los hizo subir
  alternatives_spanish:
  - los obligó a subir
  - los hizo ascender
  - hizo que subieran
  lexicon: LSJ
  rationale: La construcción causativa se vierte de manera directa como ‘los hizo subir’, que conserva el valor de ἐποίησεν + infinitivo. Se evita una formulación demasiado interpretativa (‘los obligó’) porque el griego solo afirma causación, no necesariamente coerción.
- source_word: μετʼ ἐκείνων
  english_pob_choice: with those men
  chosen_spanish: con aquellos hombres
  alternatives_spanish:
  - con ellos
  - con esos hombres
  - con aquellos
  lexicon: LSJ
  rationale: Se conserva la fuerza demostrativa de ἐκείνων con ‘aquellos’, y el sustantivo ‘hombres’ ayuda a hacer explícito el referente que el griego deja implícito en el contexto narrativo. Esto sigue la decisión inglesa de no aplanar el demostrativo a un simple pronombre.
translation_notes:
  revision_awareness: La revisión inglesa más reciente reforzó ἐποίησεν ... συναναβῆναι como una causación directa (‘made them go up’). En español se reflejó con ‘los hizo subir’, manteniendo la fuerza causal sin añadir coerción no explícita. También se preservó la nota sobre la amplitud semántica de αὐλῶν y la ambigüedad contextual de μετʼ ἐκείνων.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preservó la distinción entre un valor literal de ‘subir’ y la relación acompañante de ‘con aquellos hombres’.
  - No se introdujeron términos eclesiásticos tradicionales que oscurecieran los instrumentos griegos.
  - Las notas a y b están ancladas en el texto y corresponden a alternativas reales documentadas por el audit trail inglés.
