translation:
  language: es
  text: Ezequiel será para ustedes una señal[a]; conforme a todo lo que él hizo, ustedes harán. Cuando esto[b] suceda, sabrán que yo soy el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un portento». מוֹפֵת puede significar señal, portento o maravilla; aquí se entiende como una señal simbólica de la acción profética de Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: O «cuando suceda». La expresión hebrea dice literalmente «en/cuando su venida», refiriéndose a la llegada del acontecimiento anunciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - llegará a ser
  lexicon: HALOT
  rationale: El imperfecto profético introduce un resultado futuro; en español, «será» conserva la función predictiva de forma natural y solemne.
- source_word: יְחֶזְקֵאל
  english_pob_choice: Ezekiel
  chosen_spanish: Ezequiel
  alternatives_spanish:
  - Ezequiel
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: לְמוֹפֵת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un portent
  - una maravilla
  lexicon: HALOT
  rationale: מֹופֵת puede abarcar señal, portento o maravilla. Aquí funciona como ejemplo simbólico de la acción profética; «señal» comunica bien ese valor sin sobrecargar el verso.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  english_pob_choice: according to all that he has done
  chosen_spanish: conforme a todo lo que él hizo
  alternatives_spanish:
  - según todo lo que él hizo
  - como todo lo que él hizo
  lexicon: HALOT
  rationale: «Conforme a todo lo que él hizo» mantiene la relación de correspondencia del hebreo y su alcance total, sin volverlo demasiado rígido en español.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you will do
  chosen_spanish: harán ustedes
  alternatives_spanish:
  - ustedes harán
  - lo harán
  lexicon: HALOT
  rationale: El imperfecto aquí es predictivo; «harán ustedes» conserva el futuro y enfatiza el sujeto plural implícito del contexto.
- source_word: בְּבֹאָהּ
  english_pob_choice: When this comes
  chosen_spanish: Cuando esto suceda
  alternatives_spanish:
  - Cuando llegue
  - Cuando venga
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «en/cuando su venida»; en español, «cuando esto suceda» expresa con claridad el evento anunciado sin perder la referencia temporal.
- source_word: וִידַעְתֶּם
  english_pob_choice: then you will know
  chosen_spanish: sabrán ustedes
  alternatives_spanish:
  - entonces sabrán
  - y sabrán
  lexicon: HALOT
  rationale: El conocimiento resulta de lo que ocurre; el futuro simple en español ya puede implicar la secuencia consecutiva, y se preserva la claridad del resultado profético.
- source_word: אֲנִי אֲדֹנָי יְהוִה
  english_pob_choice: I am the Lord YHWH
  chosen_spanish: yo soy el Señor Yahvé
  alternatives_spanish:
  - yo soy el Señor Dios
  - yo soy el Señor YHWH
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el título compuesto con «Señor» para אֲדֹנָי y se traduce el nombre divino como «Yahvé», conforme a la directriz del proyecto, sin ocultarlo tras una convención tipográfica.
theological_decisions:
- issue: Cómo renderizar el título divino compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord YHWH
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: El texto distingue el título reverencial אֲדֹנָי del nombre del pacto יְהוָה. En español, «Señor Yahvé» preserva ambas capas sin sustituir el nombre divino por un equivalente genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés revisado cambió «for you» por «to you», «it» por «this» y «the Lord GOD» por «the Lord YHWH». La versión española sigue esa revisión al usar «para ustedes» evitado en favor de la relación natural de la señal con sus destinatarios mediante «una señal», emplear «esto» para hacer explícito el referente del suceso, y traducir el nombre divino como «Yahvé» según la pauta doctrinal actual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con la directriz del proyecto.
  - Se usa «Señor» para אֲדֹנָי y no se fusiona con el nombre divino.
  - «Señal» se eligió por claridad; la nota conserva la alternativa «portento».
  - Se conserva el tono profético y la secuencia causal/temporal del hebreo.
