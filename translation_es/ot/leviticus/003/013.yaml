review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte la secuencia y referencias del hebreo: imposición de una mano, degüello de la víctima, ubicación delante del lugar sagrado y acción sacerdotal con la sangre alrededor del altar. Sin embargo, falla en un punto léxico importante: וְזָרְקוּ no debe suavizarse como «rociarán», porque el inglés auditado documenta que זרק aquí implica arrojar/aplicar la sangre contra el altar, no una aspersión ligera. Además, «sobre el altar» pierde parte de la fuerza espacial de עַל con זרק, mejor reflejada como «contra el altar».'
  spanish_quality_summary: El español es claro y generalmente natural, pero «tabernáculo de reunión» suena más tradicional que el inglés auditado «tent of meeting» y puede mantenerse solo si se prioriza terminología eclesial establecida; aun así, «tienda de reunión» representa mejor la referencia concreta del hebreo. La frase «alrededor sobre el altar» es poco natural en español y se mejora con «contra el altar, por todos lados» o «alrededor». También conviene conservar la nota léxica del verbo de la sangre, ya que el inglés la preserva.
  glossary_alignment: 'No hay conflictos con los términos teológicos principales del proyecto. El ajuste clave es léxico-ritual: שׁחט bien como «degollará»; וזרקו requiere «arrojarán» y no «rociarán». «Los hijos de Aarón» está bien. «Tienda de reunión» se alinea mejor con אֹהֶל מוֹעֵד que «tabernáculo de reunión», aunque esta última es una opción tradicional comprensible.'
