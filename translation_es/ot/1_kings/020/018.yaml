translation:
  language: es
  text: 'Y dijo[a]: «Si han salido en son de paz, captúrenlos vivos; y si han salido a la batalla, captúrenlos vivos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si han salido pacíficamente … si han salido para la guerra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce discurso directo. «Y dijo» conserva el flujo hebreo sin añadir una relación temporal o causal más fuerte que la del texto.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT
  rationale: Es la partícula condicional que introduce cada escenario alternativo. «Si» es la equivalencia natural y precisa en español.
- source_word: לְשָׁלוֹם
  english_pob_choice: for peace
  chosen_spanish: para paz
  alternatives_spanish:
  - en paz
  - pacíficamente
  - con intención pacífica
  lexicon: HALOT
  rationale: El hebreo combina לְ + שָׁלוֹם, lo que apunta a finalidad o propósito. «Para paz» conserva esa fuerza teleológica; se evita reducirlo solo a un adverbio que podría suavizar el matiz.
- source_word: יָצָאוּ
  english_pob_choice: have come out
  chosen_spanish: han salido
  alternatives_spanish:
  - salieron
  - han salido afuera
  lexicon: HALOT
  rationale: El verbo describe que han salido de un lugar, probablemente de la ciudad. «Han salido» comunica bien el resultado presente del perfecto hebreo y es natural en español.
- source_word: תִּפְשׂוּם
  english_pob_choice: seize them
  chosen_spanish: captúrenlos
  alternatives_spanish:
  - agárrenlos
  - aprécenlos
  - tómenlos
  lexicon: HALOT
  rationale: En contexto militar, תפשׂ expresa prender o capturar. «Captúrenlos» es fuerte y claro en español sin perder el carácter de mandato. Se evita «esclavizar» u otra expansión no indicada.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - con vida
  - vivos, sin matarlos
  lexicon: HALOT
  rationale: Como complemento adverbial de estado, «vivos» reproduce el sentido de חַיִּים con naturalidad en español.
- source_word: וְאִם
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - pero si
  - y en caso de que
  lexicon: HALOT
  rationale: La conjunción hebrea simplemente enlaza el segundo caso con el primero. «Y si» preserva esa coordinación sin introducir contraste adicional.
- source_word: לְמִלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para batalla
  alternatives_spanish:
  - para guerra
  - con intención de combatir
  lexicon: HALOT
  rationale: מִלְחָמָה denota guerra o combate. «Para batalla» mantiene el paralelismo con «para paz» y refleja el campo semántico militar del texto.
- source_word: חַיִּים תִּפְשׂוּם
  english_pob_choice: seize them alive
  chosen_spanish: captúrenlos vivos
  alternatives_spanish:
  - tómenlos vivos
  - préndanlos vivos
  lexicon: HALOT
  rationale: Se preserva la repetición enfática del mandato final en español, sin suavizarla. El orden natural del español exige colocar el verbo primero, pero «vivos» mantiene la cualidad requerida por el hebreo.
translation_notes:
  revision_awareness: Se siguió de cerca el hebreo WLC y el auditable inglés POB, especialmente en la repetición enfática del mandato y en el contraste paralelo entre לְשָׁלוֹם y לְמִלְחָמָה. No se detectaron revisiones textuales ni variantes que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantuvo un registro militar directo y sobrio acorde con el contexto narrativo.
  - Se prefirió «captúrenlos» por la fuerza de תִּפְשׂוּם y por ser más natural que un calco como «seízanlos».
  - La nota[a] conserva la alternativa semántica documentada en el POB inglés, adaptada al español sin ampliar indebidamente el sentido.
  - Se evitó usar «SEÑOR» o terminología teológica no presente en el versículo.
