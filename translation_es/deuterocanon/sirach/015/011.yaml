translation:
  language: es
  text: 'No digas[a]: «Mi transgresión proviene de Dios», porque él no ha hecho lo que odia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No digas: “Por el Señor me aparté”, porque no harás lo que él odió». El griego refleja una redacción relacionada, pero no idéntica, al hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No digas para ti
  - Nunca digas
  lexicon: HALOT
  rationale: El imperativo negativo es directo y proverbial; «No digas» preserva la prohibición sin añadir un matiz reflexivo que no está en el texto.
- source_word: מֵאֵל
  english_pob_choice: from God
  chosen_spanish: proviene de Dios
  alternatives_spanish:
  - viene de Dios
  - es de Dios
  - por Dios
  lexicon: HALOT
  rationale: El hebreo expresa fuente u origen; «proviene de Dios» conserva esa idea y evita sugerir mera ocasión o motivo.
- source_word: פִּשְׁעִי
  english_pob_choice: my transgression
  chosen_spanish: mi transgresión
  alternatives_spanish:
  - mi rebelión
  - mi ofensa
  - mi pecado
  lexicon: HALOT
  rationale: «Transgresión» refleja la fuerza moral de פשע y mantiene el matiz de acto culpable y deliberado sin volverlo más técnico de lo necesario.
- source_word: אֶת אֲשֶׁר שָׂנֵא
  english_pob_choice: what he hates
  chosen_spanish: lo que él odia
  alternatives_spanish:
  - aquello que él odia
  - la cosa que él odia
  lexicon: HALOT
  rationale: En español, «odiar» comunica de manera natural la intensidad del hebreo שָׂנֵא. «Lo que él odia» conserva la construcción relativa de forma fluida.
- source_word: לֹא עָשָה
  english_pob_choice: he has not done
  chosen_spanish: no hará
  alternatives_spanish:
  - no ha hecho
  - no hace
  lexicon: HALOT
  rationale: 'Aunque el hebreo puede leerse como perfecto gnómico, el paralelo griego usa futuro («no harás»). «No hará» deja visible esa tensión tradicional sin apartarse del sentido general: Dios no realizará lo que aborrece.'
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego respecto a la procedencia del pecado
  english_pob_reading: The main text uses 'from God,' denying that one's transgression originates in God; the Greek parallel preserves a related but not identical wording.
  chosen_spanish_reading: El texto principal mantiene que la transgresión no tiene su origen en Dios; la nota señala la lectura griega relacionada («por medio del Señor» / «a través del Señor»).
  alternative_spanish_readings:
  - Mi transgresión es por Dios
  - Me aparté a través del Señor
  rationale: La tradición hebrea es la base principal y expresa con claridad origen/fuente. La nota preserva la tensión con el griego, sin fusionar ambas lecturas en una sola paráfrasis.
  doctrine_reference: Primacía de la fuente original y preservación de variantes significativas
- issue: Cómo expresar el cierre gnómico sobre lo que Dios detesta
  english_pob_reading: for he has not done what he hates
  chosen_spanish_reading: porque no hará lo que él odia
  alternative_spanish_readings:
  - porque no ha hecho lo que él odia
  - porque no hace lo que él odia
  rationale: 'La forma elegida armoniza con el griego futuro y sigue siendo inteligible en español. No borra la advertencia proverbial: Dios no realiza lo que odia.'
  doctrine_reference: Tensión textual hebreo-griego preservada en traducción y nota
translation_notes:
  revision_awareness: 'Se revisó el equilibrio hebreo-griego: el hebreo se tomó como texto principal por su claridad sobre la fuente del pecado, mientras que el paralelo griego se conservó como lectura alternativa significativa en la nota. Se ajustó el cierre verbal para que el español pudiera reflejar la tensión entre el perfecto hebreo y el futuro griego sin perder naturalidad.'
  spanish_consistency_notes:
  - Se usó «Dios» para אֵל/אֱלֹהִים conforme al criterio del proyecto.
  - Se prefirió «transgresión» para פשע por su fuerza moral y su correspondencia con la decisión inglesa.
  - Se mantuvo una formulación que permite leer la frase como atribución de origen, no como simple circunstancia.
  - La nota con [a] está anclada en el punto donde la traducción inglesa también documenta una variante griega relevante.
