review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la estructura principal: mantiene el énfasis de los infinitivos absolutos, conserva el singular colectivo de זַרְעֲךָ con ''descendencia'', refleja ''las estrellas de los cielos'' y mantiene la imagen literal de ''la puerta''. Sin embargo, no preserva adecuadamente la decisión auditada sobre el singular gramatical en la cláusula final: el inglés POB explicitó ''his enemies'' como decisión teológica/lexical importante, mientras que el español ''sus enemigos'' resulta ambiguo y no deja visible que el hebreo usa singular corporativo.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Como la arena que está en la orilla del mar' es fiel, aunque 'a la orilla del mar' suena más idiomático. La principal debilidad de legibilidad/fidelidad está en 'sus enemigos', que en español naturalmente se oye plural/distributivo y borra la tensión singular-colectiva que el proyecto quiso conservar.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Descendencia' para זֶרַע y 'poseerá' para וְיִרַשׁ concuerdan con la rationale documentada. La revisión propuesta solo ajusta la cláusula final y pule la naturalidad de 'orilla del mar' sin alterar el sentido.
  issues:
  - severity: medium
    issue: La frase 'sus enemigos' no hace visible el singular gramatical de אֹיְבָיו
    rationale: 'El expediente inglés documenta como decisión significativa preservar el singular colectivo: ''your offspring ... his enemies''. En español, ''sus'' con antecedente colectivo no comunica por sí mismo esa singularidad y puede leerse simplemente como plural distributivo. Conviene explicitar ''los enemigos de él'' o anclar una nota alternativa.'
  - severity: low
    issue: '''En la orilla del mar'' suena menos natural que ''a la orilla del mar'''
    rationale: Ambas opciones son comprensibles, pero 'a la orilla del mar' es más idiomática en español general y sigue reflejando bien שְׂפַת הַיָּם junto con la relativa 'que está'.
  - severity: medium
    issue: La nota c actual no corresponde a la alternativa auditada más importante
    rationale: La nota inglesa b conserva la alternativa 'their enemies' frente al texto principal singular. La nota española c actualmente comenta 'tomará posesión de', que no es el contraste principal preservado por la auditoría. La nota debe reflejar la alternativa plural, y la explicación metonímica puede mantenerse en la razón o integrarse en la redacción de la nota.
  revised_spanish_text: que ciertamente te bendeciré[a], y ciertamente multiplicaré tu descendencia[b] como las estrellas de los cielos y como la arena que está a la orilla del mar; y tu descendencia poseerá la puerta de los enemigos de él[c].
