revisions:
- from: 'Por tanto, el Señor mismo les dará una señal: miren[a], la joven está encinta y está dando a luz un hijo[d][c][b], y le pondrá por nombre Immanuel.'
  to: 'Por tanto, el Señor mismo les dará una señal: miren[a], la joven está encinta y va a dar a luz un hijo[d][b], y ella le pondrá por nombre Immanuel[c].'
  rationale: 'La revisión mantiene las decisiones teológicas centrales del expediente —''la joven'' en el texto principal y la tradición ''la virgen'' en nota— pero corrige dos problemas: reemplaza ''está dando a luz'' por ''va a dar a luz'' para evitar una simultaneidad extraña en español mientras se conserva el matiz de embarazo presente con nacimiento inminente, y restituye el sujeto femenino singular en ''ella le pondrá por nombre'' para reflejar mejor וְקָרָאת según la decisión POB. También se ajusta la nota textual para que realmente presente una alternativa distinta del texto principal.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:29:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: consecuencia (''Por tanto''), énfasis en אֲדֹנָי הוּא (''el Señor mismo''), plural dativo (''les''), ''una señal'', y mantiene la lectura principal ''la joven'' con nota sobre ''la virgen''. También conserva la nota sobre el nombre Immanuel. Sin embargo, en dos puntos se aparta de decisiones importantes del expediente POB: 1) וְקָרָאת fue traducido en el texto como ''le pondrá por nombre'', que borra el sujeto femenino singular explícitamente preservado en el inglés (''she will call'') y además duplica en la nota la misma redacción; 2) ''está dando a luz'' para וְיֹלֶדֶת en combinación con ''está encinta'' suena en español demasiado simultáneo e inmediato, y no comunica bien el matiz de estado presente + proceso/resultado inminente que el expediente quiso conservar. Requiere ajuste menor, no replanteamiento doctrinal.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''miren'' para הִנֵּה cambia el registro deíctico a un imperativo plural algo coloquial; ''he aquí'' o ''miren'' son posibles, aunque ''miren'' es aceptable. El principal problema de calidad es idiomático-semántico: ''está encinta y está dando a luz'' sugiere a la vez embarazo y parto, lo que en español resulta chocante. Además, ''le pondrá por nombre'' evita innecesariamente el sujeto femenino y debilita la fidelidad. Una redacción como ''la joven está encinta y dará a luz un hijo ..., y ella llamará su nombre Immanuel'' sería demasiado calcada; mejor una solución natural que mantenga el sujeto: ''la joven está encinta y va a dar a luz un hijo..., y ella lo llamará Immanuel'' o ''y ella le pondrá por nombre Immanuel''.'
  glossary_alignment: 'Sin conflicto con el glosario principal: אֲדֹנָי como ''el Señor'' está bien; no aparece Yahvé. No hay problema con ''Immanuel'' como transliteración con nota de significado. ''La joven'' concuerda con la decisión teológica documentada. La excepción necesaria es alinear mejor וְקָרָאת con la decisión POB de sujeto femenino singular en el texto principal.'
  issues:
  - severity: medium
    issue: La traducción de וְקָרָאת como 'le pondrá por nombre' omite el sujeto femenino singular que el expediente inglés preserva en el texto principal.
    rationale: El hebreo masorético fue evaluado y decidido como 'she will call'. La versión española debe mantener esa decisión significativa; evitar el sujeto en español no es necesario y reduce fidelidad.
  - severity: medium
    issue: La secuencia 'está encinta y está dando a luz' suena impropia en español y sobre-resuelve el participio hacia un parto simultáneo.
    rationale: El expediente quiso evitar el futuro tradicional 'concebirá y dará a luz', pero en español 'está dando a luz' junto con 'está encinta' crea una imagen temporal extraña. Conviene una formulación más natural que conserve la fuerza aspectual sin choque semántico.
  - severity: low
    issue: La nota c repite prácticamente la misma expresión del texto principal en vez de reflejar la alternativa documentada ('tú/ustedes le pondrán por nombre' o equivalente).
    rationale: La nota debe registrar la variante textual/versional, no una simple duplicación del texto adoptado.
  revised_spanish_text: 'Por tanto, el Señor mismo les dará una señal: miren[a], la joven está encinta y va a dar a luz un hijo[d][b], y ella le pondrá por nombre Immanuel[c].'
  revised_footnotes:
  - marker: a
    text: O ‘la virgen’. El hebreo usa עַלְמָה (‘joven’); la Septuaginta griega lo vierte con un término que a menudo se entiende como ‘virgen’, y Mateo 1:23 cita el versículo en esa forma.
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: ‘concebirá y dará a luz un hijo’. El hebreo, de manera más literal, describe a la mujer como ya encinta y en proceso de dar a luz.'
    reason: lexical_alternative
  - marker: c
    text: O ‘tú le pondrás por nombre’, reflejado en algunas tradiciones antiguas; Mateo 1:23 tiene ‘le llamarán por nombre’.
    reason: textual_variant
  - marker: d
    text: Immanuel significa ‘Dios con nosotros’.
    reason: cultural_note
  revision_rationale: 'La revisión mantiene las decisiones teológicas centrales del expediente —''la joven'' en el texto principal y la tradición ''la virgen'' en nota— pero corrige dos problemas: reemplaza ''está dando a luz'' por ''va a dar a luz'' para evitar una simultaneidad extraña en español mientras se conserva el matiz de embarazo presente con nacimiento inminente, y restituye el sujeto femenino singular en ''ella le pondrá por nombre'' para reflejar mejor וְקָרָאת según la decisión POB. También se ajusta la nota textual para que realmente presente una alternativa distinta del texto principal.'
