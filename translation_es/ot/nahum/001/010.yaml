translation:
  language: es
  text: Porque están enredados como espinos, y como borrachos[a], están borrachos; son consumidos[b] como rastrojo completamente seco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil: esta cláusula también puede entenderse como «y como borrachos, borrachos con su bebida» o «y como su juerga embriagada».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serán consumidos». En poesía profética el perfecto puede expresar una certeza futura.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la explicación o fundamento de lo anterior; en español, «Porque» comunica bien esa relación discursiva sin forzar un matiz exclamativo.
- source_word: סִירִים
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - zarzas
  - cardos
  lexicon: HALOT
  rationale: El sustantivo nombra vegetación espinosa. «Espinos» conserva la imagen botánica general y funciona con naturalidad en el símil.
- source_word: סְבֻכִים
  english_pob_choice: tangled
  chosen_spanish: enredados
  alternatives_spanish:
  - entrelazados
  - enmarañados
  lexicon: HALOT
  rationale: El participio pasivo describe algo trenzado o atrapado entre sí. «Enredados» es idiomático y mantiene la fuerza visual del hebreo.
- source_word: וּכְסָבְאָם
  english_pob_choice: and like drunkards they are drunk
  chosen_spanish: y como borrachos están borrachos
  alternatives_spanish:
  - y como bebedores están embriagados
  - y como quienes beben en exceso están ebrios
  - y como su embriaguez
  lexicon: HALOT
  rationale: El hebreo es difícil y alude al grupo en estado de embriaguez o saturación de bebida. La repetición «borrachos… borrachos» refleja la redundancia enfática del texto y evita suavizarla.
- source_word: סְבוּאִים
  english_pob_choice: drunk
  chosen_spanish: borrachos
  alternatives_spanish:
  - ebrios
  - embriagados
  - saturados de bebida
  lexicon: HALOT
  rationale: El término expresa estar bebido o saturado de bebida. «Borrachos» es el equivalente más directo y claro en español, y preserva la intensidad de la imagen.
- source_word: אֻכְּלוּ
  english_pob_choice: they are consumed
  chosen_spanish: serán consumidos
  alternatives_spanish:
  - son consumidos
  - serán devorados
  - serán devoradas
  lexicon: HALOT
  rationale: En poesía profética el perfecto puede expresar certeza futura. «Serán consumidos» comunica el juicio inminente de manera natural en español.
- source_word: כְּקַשׁ
  english_pob_choice: like fully dry stubble
  chosen_spanish: como rastrojo seco
  alternatives_spanish:
  - como paja seca
  - como hojarasca seca
  - como rastrojo completamente seco
  lexicon: HALOT
  rationale: קשׁ suele referirse a material vegetal seco y combustible. «Rastrojo» transmite bien la idea de residuo agrícola fácilmente destruible.
- source_word: מָלֵא
  english_pob_choice: fully
  chosen_spanish: seco
  alternatives_spanish:
  - completamente seco
  - totalmente seco
  lexicon: HALOT
  rationale: El hebreo intensifica la sequedad; en español, la combinación «rastrojo seco» ya comunica esa cualidad. La intensidad se conserva en el conjunto del símil sin sobrecargar la frase.
theological_decisions:
- issue: Relación causal del versículo con el contexto anterior
  english_pob_reading: For ...
  chosen_spanish_reading: Porque ...
  alternative_spanish_readings:
  - Pues ...
  - Ya que ...
  rationale: El versículo funciona como fundamento de la declaración previa; «Porque» mantiene esa conexión causal sin introducir una interpretación adicional.
  doctrine_reference: Poetic discourse / contextual flow
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que corrigió la primera cláusula para reflejar mejor la simple causalidad («For») y ajustó la segunda para conservar la repetición enfática del hebreo («like drunkards they are drunk»). La versión española imita esa fidelidad sintáctica y retiene la redundancia expresiva sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «consumidos» para reflejar el verbo de destrucción total, evitando «devorados» salvo que el contexto inmediato exija un matiz más concreto.
  - Se conserva la repetición enfática en la frase sobre la embriaguez, porque el hebreo la presenta de forma marcada y el POB inglés la preserva.
  - «Espinos» y «rastrojo» se eligieron por claridad y naturalidad en español; ambos sostienen la imaginería de combustión rápida.
