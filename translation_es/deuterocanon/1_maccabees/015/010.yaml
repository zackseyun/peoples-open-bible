translation:
  language: es
  text: En el año ciento setenta y cuatro, Antíoco salió a la tierra de sus padres, y todas las fuerzas se reunieron con él, de modo que pocos estaban con Trifón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔτους τετάρτου καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: In the one hundred seventy-fourth year
  chosen_spanish: En el año ciento setenta y cuatro
  alternatives_spanish:
  - En el año 174
  - En el año ciento setenta y cuarto
  lexicon: LSJ
  rationale: La fórmula cronológica se vierte como datación normal en español, conservando el valor histórico sin añadir interpretación. "Año ciento setenta y cuatro" refleja el ordinal de manera natural en una crónica bíblica.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se encaminó
  - marchó
  - partió
  lexicon: LSJ
  rationale: '"Salió" preserva el sentido básico de ἐξῆλθεν sin forzar una connotación militar más explícita de la que ofrece el verbo por sí solo.'
- source_word: εἰς τὴν γῆν τῶν πατέρων αὐτοῦ
  english_pob_choice: into the land of his fathers
  chosen_spanish: a la tierra de sus padres
  alternatives_spanish:
  - a la tierra de sus antepasados
  - a su tierra ancestral
  - a la tierra de sus mayores
  lexicon: LSJ
  rationale: En español, "a la tierra de sus padres" conserva la literalidad de γῆ τῶν πατέρων αὐτοῦ y mantiene el matiz ancestral sin paraphrasear en exceso.
- source_word: συνῆλθον πρὸς αὐτόν
  english_pob_choice: gathered to him
  chosen_spanish: se reunieron con él
  alternatives_spanish:
  - se juntaron con él
  - se congregaron con él
  - se agruparon junto a él
  lexicon: LSJ
  rationale: La construcción expresa acercamiento y adhesión en un contexto militar-político. "Se reunieron con él" comunica la idea de alianza sin añadir un matiz técnico no presente en el griego.
- source_word: πᾶσαι αἱ δυνάμεις
  english_pob_choice: all the forces
  chosen_spanish: todas las fuerzas
  alternatives_spanish:
  - todas las tropas
  - todos los ejércitos
  - todas las huestes
  lexicon: LSJ
  rationale: '"Fuerzas" es suficientemente amplio para δυνάμεις en narrativa bélica y conserva la amplitud del término griego mejor que una opción más específica.'
- source_word: ὥστε ὀλίγους εἶναι σὺν Τρύφωνι
  english_pob_choice: so that few were with Tryphon
  chosen_spanish: de modo que pocos estaban con Trifón
  alternatives_spanish:
  - de modo que pocos quedaban con Trifón
  - así que pocos estaban con Trifón
  - de manera que pocos estaban con Trifón
  lexicon: LSJ
  rationale: La frase final se mantiene tersa para reflejar la construcción resultativa del griego. "Pocos estaban con Trifón" reproduce sin expansión el resultado de adhesión minoritaria, evitando introducir la idea de que "quedaron" o "solo" pocos, que sería más explícita de lo que exige el texto.
translation_notes:
  revision_awareness: El inglés POB revisó la clausula final para quitar "only" y "were left" y acercarse más al griego ὀλίγους εἶναι σὺν Τρύφωνι. La versión española sigue esa revisión y evita tanto "solo" como cualquier giro que añada la idea de "quedaron"; por eso usa "pocos estaban con Trifón".
  spanish_consistency_notes:
  - Se usa "Antíoco" para Ἀντίοχος y "Trifón" para Τρύφων.
  - Se mantiene un registro histórico sobrio y bíblico, sin arcaísmos innecesarios.
  - No se introduce nota de pie porque el matiz resultativo final puede expresarse en español sin ambigüedad textual adicional.
