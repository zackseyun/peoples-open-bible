translation:
  language: es
  text: Entonces surgió un profeta como fuego[a], y sus palabras eran como un horno ardiente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Entonces surgió Elías, el profeta, como fuego». El hebreo aquí dice simplemente «un profeta surgió como fuego», aunque el contexto trata claramente de Elías.'
    reason: alternative_reading
  - marker: b
    text: 'Griego paralelo: «su palabra ardía como una antorcha». Hebreo: «sus palabras eran como un horno ardiente».'
    reason: textual_variant
lexical_decisions:
- source_word: עד אשר / καὶ ἀνέστη
  english_pob_choice: Then / arose
  chosen_spanish: Entonces se levantó
  alternatives_spanish:
  - Luego se alzó
  - Entonces surgió
  lexicon: HALOT; LXX ἀνίστημι
  rationale: '"Entonces" expresa bien la transición narrativa. "Se levantó" comunica de forma natural y digna la aparición de la figura profética, y mantiene la fuerza idiomática de ''arose'' / ἀνέστη sin volverlo forzado en español.'
- source_word: נביא / Ἠλίας προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - el profeta
  - Elías, el profeta
  lexicon: HALOT; LXX παράλληλο
  rationale: La base hebrea conserva la forma indefinida 'un profeta', y en español conviene mantenerla en el texto principal. El nombre de Elías se reserva para la nota, siguiendo la primacía del testimonio hebreo sin perder la identificación de la tradición griega.
- source_word: כאש / ὡς πῦρ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como fuego ardiente
  - como una llama
  lexicon: HALOT; LXX πῦρ
  rationale: '"Como fuego" es una comparación directa, clara y fiel tanto al hebreo como al griego, sin añadir matices no presentes en el original.'
- source_word: ודבריו / ὁ λόγος αὐτοῦ
  english_pob_choice: and his words
  chosen_spanish: y sus palabras
  alternatives_spanish:
  - y su palabra
  - y lo que dijo
  lexicon: HALOT; LXX λόγος
  rationale: Se conserva el plural hebreo 'palabras', que la tradición griega singulariza. En español, el plural mantiene mejor el paralelismo poético y la evidencia principal del hebreo.
- source_word: כתנור בוער / ὡς λαμπὰς ἐκαίετο
  english_pob_choice: like a burning furnace
  chosen_spanish: como un horno ardiente
  alternatives_spanish:
  - como un horno en llamas
  - como un horno que ardía
  lexicon: HALOT; LXX λαμπάς
  rationale: '"Horno ardiente" reproduce con naturalidad el hebreo תַּנּוּר בּוֹעֵר y mantiene la imagen de calor y combustión. Se evita armonizar con el griego ''antorcha'' porque la lectura hebrea es la primaria en el texto base.'
theological_decisions:
- issue: Identificación explícita de la figura con Elías
  english_pob_reading: Do not insert the name in the main text; preserve Elijah in a footnote.
  chosen_spanish_reading: No insertar 'Elías' en el texto principal; preservarlo en una nota.
  alternative_spanish_readings:
  - Entonces se levantó Elías, el profeta, como fuego
  - Entonces se levantó el profeta Elías como fuego
  rationale: La lectura hebrea base no nombra a Elías en este verso, aunque la tradición griega sí lo hace. Mantener 'un profeta' en el cuerpo del texto respeta la prioridad del testimonio hebreo y preserva la tensión textual, mientras la nota informa la identificación griega.
  doctrine_reference: Primacía de la fuente original; transparencia textual
- issue: 'Imagen del segundo hemistiquio: horno frente a antorcha'
  english_pob_reading: Retain the Hebrew image 'his words were like a burning furnace.'
  chosen_spanish_reading: Mantener la imagen hebrea 'sus palabras eran como un horno ardiente'.
  alternative_spanish_readings:
  - y su palabra ardía como una antorcha
  - y su palabra era como una antorcha encendida
  rationale: El hebreo y el griego divergen de modo real en la imagen. La traducción española mantiene el horno ardiente del hebreo, porque es la evidencia primaria y no debe ser nivelada con la versión griega.
  doctrine_reference: Primacía del original; preservación de variantes significativas
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del POB inglés al preferir 'burning furnace' sobre 'blazing furnace', y conserva la tensión textual entre el hebreo (profeta / palabras / horno ardiente) y el griego (Elías / palabra / antorcha).
  spanish_consistency_notes:
  - Se mantuvo 'un profeta' en lugar de introducir 'Elías' en el texto principal, coherente con la primacía del hebreo.
  - Se usó 'sus palabras' en plural para respetar el hebreo ודבריו, aunque el griego usa singular λόγος.
  - Se evitó 'SEÑOR' u otras convenciones no pertinentes; no hay términos divinos en este verso.
  - El registro es sobrio y poético, apto para lectura pública y consistente con el estilo POB.
