  yaml_path: translation/deuterocanon/wisdom_of_solomon/017/007.yaml
  text: And the tricks of magical art were laid low[b][a], and the boast of understanding was disgracefully rebuked.
  footnotes:
  - marker: a
    text: Or 'mockeries/deceptions of magical craft lay prostrate.' The Greek ἐμπαίγματα can suggest deceptive displays or mockeries, and κατέκειτο can be rendered more literally as 'lay low' or 'lay prostrate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the humiliating refutation of the boast in understanding.' The Greek ἔλεγχος is a noun ('refutation,' 'exposure'), and φρόνησις may also be translated 'understanding' or 'prudence.'
    reason: lexical_alternative
