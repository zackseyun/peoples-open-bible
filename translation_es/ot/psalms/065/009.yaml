revisions:
- from: Los que habitan en los confines de la tierra tiemblan[a] por tus señales[b]; tú haces gritar de alegría la aurora y el anochecer.
  to: Los que habitan en los confines de la tierra temen[a] por tus señales; tú haces gritar de alegría la aurora y el anochecer[b].
  rationale: Se cambió «tiemblan» por «temen» para conservar mejor el rango semántico de ירא sin añadir una imagen corporal no exigida por el texto. Se corrigió la nota [b] para reflejar fielmente que el literal corresponde a מוֹצָאֵי בֹקֶר וָעֶרֶב, no a «tus salidas». Se mantuvo el resto porque transmite bien el sentido poético y es natural en español.
