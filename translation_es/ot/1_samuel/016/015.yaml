revisions:
- from: 'Y los servidores de Saúl le dijeron[a]: «Mira ahora, un espíritu malo de parte de Dios te aterra».'
  to: 'Y los siervos de Saúl le dijeron[a]: «Mira ahora, un espíritu malo de parte de Dios te aterra».'
  rationale: Se hace una reparación menor para mejorar la naturalidad bíblica de 'siervos' y para alinear la nota léxica con la alternativa inglesa documentada ('harmful/distressing') sin alterar el sentido principal ni la tensión teológica del versículo.
