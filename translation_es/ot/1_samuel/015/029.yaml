review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura hebrea y conserva adecuadamente el título elevado נֵצַח יִשְׂרָאֵל como 'la Gloria de Israel', con nota de alternativas. También mantiene la repetición de נחם en ambos miembros. Sin embargo, la elección principal 'se arrepentirá' se aleja del sentido contextual documentado por la POB inglesa ('relent') y en español introduce con más fuerza la idea de arrepentimiento moral. Además, la nota b mezcla alternativas para dos segmentos distintos del versículo bajo un solo anclaje en 'hombre', lo que crea desalineación entre ancla y contenido.
  spanish_quality_summary: El español es generalmente claro y digno, pero 'ni se arrepentirá' suena teológicamente más cargado y menos preciso en este contexto que 'ni cederá' o 'ni cambiará de parecer'. 'Para que se arrepienta' también resulta menos natural que una construcción comparativa como 'para cambiar de parecer'. Conviene además ajustar las notas para que correspondan exactamente al punto anclado en el texto.
  glossary_alignment: 'No hay conflicto con los términos globales principales del proyecto. La cuestión central es la coherencia con la decisión auditada sobre נחם: la POB inglesa eligió ''relent'' para evitar sobreleer arrepentimiento moral. En español, ''cambiar de parecer'' preserva mejor esa cautela contextual que ''arrepentirse''. ''La Gloria de Israel'' está bien alineada con la auditoría y sus alternativas deben conservarse en nota.'
  issues:
  - severity: medium
    issue: '''se arrepentirá'' para יִנָּחֵם sobretraduce el matiz contextual'
    rationale: Aunque נחם puede a veces rendirse como 'arrepentirse', aquí la auditoría inglesa prefirió 'relent' para evitar implicar arrepentimiento moral o error en Dios. En español, 'arrepentirse' activa más fuertemente esa lectura que en inglés.
  - severity: medium
    issue: La nota b combina alternativas para 'no es hombre' y para לְהִנָּחֵם bajo un solo anclaje
    rationale: El anclaje [b] está en 'hombre', pero la nota también comenta 'para que cambie de parecer' / 'para que ceda', que corresponde al verbo final. Esto dificulta la trazabilidad entre texto y nota.
  - severity: low
    issue: La cláusula final suena más natural como comparación de capacidad/disposición que como propósito
    rationale: '''para que se arrepienta'' es entendible, pero ''para cambiar de parecer'' o ''para ceder'' fluye mejor en español y refleja bien el infinitivo comparativo sin sugerir finalidad estricta.'
  revised_spanish_text: Además[a], la Gloria de Israel no mentirá, ni cambiará de parecer[b], porque no es hombre[c] para cambiar de parecer.
