    text: Or 'languishing' for 'weak'; the Hebrew describes a state of wasting or feebleness.
    reason: lexical_alternative
  - marker: b
    text: Or 'my bones are troubled' / 'my bones are dismayed'; 'bones' expresses deep bodily or inner distress.
    reason: lexical_alternative
