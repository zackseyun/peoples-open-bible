translation:
  language: es
  text: Los días de nuestros años son setenta años[a], o, si por fortaleza, ochenta años; pero lo más sobresaliente de ellos es trabajo arduo y aflicción, porque pronto pasa[b], y salimos volando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero lo mejor de ellos es trabajo arduo y aflicción». El término hebreo también puede traducirse más literalmente como «su orgullo» y puede referirse a lo más impresionante, vigoroso o sobresaliente de esos años.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque pasa rápidamente» o «porque es cortado rápidamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמֵי שְׁנוֹתֵינוּ
  english_pob_choice: The days of our years
  chosen_spanish: Los días de nuestros años
  alternatives_spanish:
  - Los años de nuestra vida
  - Nuestro lapso de vida
  lexicon: HALOT
  rationale: Conservo el idiomismo hebreo de manera natural en español. "Los días de nuestros años" mantiene el paralelo poético y la cadencia del original, como la versión inglesa POB.
- source_word: שִׁבְעִים שָׁנָה
  english_pob_choice: seventy years
  chosen_spanish: setenta años
  lexicon: HALOT
  rationale: Equivalencia numérica directa y transparente.
- source_word: וְאִם בִּגְבוּרֹת
  english_pob_choice: or if by strength
  chosen_spanish: o, si por fortaleza
  alternatives_spanish:
  - o con fortaleza
  - o, si con vigor
  lexicon: HALOT
  rationale: '"Fortaleza" comunica la idea de vigor físico o resistencia que prolonga la vida. Mantengo el matiz condicional excepcional sin forzar un giro más idiomático que borre el hebreo.'
- source_word: שְׁמֹונִים שָׁנָה
  english_pob_choice: eighty years
  chosen_spanish: ochenta años
  lexicon: HALOT
  rationale: Equivalencia numérica directa.
- source_word: וְרָהְבָּם
  english_pob_choice: their pride
  chosen_spanish: su orgullo
  alternatives_spanish:
  - su jactancia
  - lo más imponente de ellos
  - su mejor parte
  lexicon: HALOT
  rationale: Conservo "orgullo" porque preserva la fuerza léxica del término y la tensión interpretativa señalada por la POB inglesa. En español también puede referir a lo más sobresaliente o imponente de esos años, sin resolver prematuramente la ambigüedad.
- source_word: עָמָל וָאָוֶן
  english_pob_choice: toil and trouble
  chosen_spanish: trabajo arduo y aflicción
  alternatives_spanish:
  - fatiga y aflicción
  - trabajo y aflicción
  - fatiga y dolor
  lexicon: HALOT
  rationale: '"עָמָל" combina labor con fatiga o dureza; "trabajo arduo" preserva el esfuerzo penoso. "אָוֶן" aquí describe aflicción o penuria vivida, no iniquidad moral, por lo que "aflicción" comunica bien el contexto sin moralizar el término.'
- source_word: כִּי גָז חִישׁ
  english_pob_choice: for it is soon gone
  chosen_spanish: porque pronto pasa
  alternatives_spanish:
  - porque pasa pronto
  - porque en breve se va
  - porque rápidamente es cortado
  lexicon: HALOT
  rationale: Opto por una forma natural en español que conserve la rapidez y el sentido de desaparición/corte del hebreo. "Pasa" mantiene la brevedad sin añadir una imagen ajena al verso.
- source_word: וַנָּעֻפָה
  english_pob_choice: and we fly away
  chosen_spanish: y volamos
  alternatives_spanish:
  - y volamos lejos
  - y nos vamos volando
  - y volamos away
  lexicon: HALOT
  rationale: El hebreo evoca el vuelo/alejamiento. En español, "y volamos" conserva la imagen poética y el plural inclusivo. Evito una paráfrasis como "desaparecemos" para no perder la metáfora.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no cambió el contenido; se mantiene la lectura estable de la POB para este versículo, con preservación de la ambigüedad léxica en "וְרָהְבָּם" y del verbo breve de desaparición en "כִּי גָז חִישׁ".
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo porta el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro poético, sobrio y directamente basado en el hebreo, evitando el lenguaje eclesiástico arcaizante cuando no aporta precisión.
  - '"Orgullo" se conserva como término ambivalente para respetar la tensión lexical documentada por la POB inglesa.'
