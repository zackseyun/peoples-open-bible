  yaml_path: translation/nt/2_corinthians/011/009.yaml
  text: And when I was present with you and was in need[a], I was not a burden to anyone; for the brothers who came from Macedonia supplied what I lacked. And in everything I kept myself from being a burden
    to you[b], and will keep doing so.
translation:
  language: ko
  text: 내가 여러분과 함께 있으면서 궁핍할 때에도 아무에게도 짐이 되지 않았습니다. 마게도냐에서 온 형제들이 내가 부족한 것을 채워 주었기 때문입니다. 나는 모든 일에서 여러분에게 짐이 되지 않도록 나 자신을 지켰고, 또 그렇게 지킬 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
