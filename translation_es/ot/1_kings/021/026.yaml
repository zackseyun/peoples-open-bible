    rationale: 'El texto principal usa correctamente «Yahvé», pero en las decisiones léxicas aparece «chosen_spanish: Yahweh». Aunque no afecta directamente la línea traducida, sí contradice la norma terminológica del proyecto y debe corregirse en revisión editorial.'
