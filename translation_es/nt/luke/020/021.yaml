translation:
  language: es
  text: 'Y le preguntaron, diciendo: «Maestro, sabemos que hablas y enseñas con rectitud, y no muestras parcialidad[a], sino que enseñas verdaderamente[b] el camino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «recibir rostro», un idiomatismo que significa «mostrar parcialidad» o «dejarse influir por las apariencias».
    reason: lexical_alternative
  - marker: b
    text: 'O: «en verdad enseñas el camino de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησαν
  english_pob_choice: questioned
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le cuestionaron
  - le interrogaron
  lexicon: BDAG
  rationale: En español, «preguntaron» expresa de forma natural la acción de hacer una consulta deliberada; evita la dureza de «interrogaron» y el matiz más técnico de «cuestionaron», manteniendo el carácter intencional del contexto.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Teacher (sin traducir)
  - Rabí
  lexicon: BDAG
  rationale: «Maestro» comunica bien el vocativo y es natural en el registro bíblico en español. «Rabí» sería más específico pero introduce una forma semítica no necesaria aquí; «Teacher» no corresponde al español.
- source_word: ὀρθῶς
  english_pob_choice: rightly
  chosen_spanish: con rectitud
  alternatives_spanish:
  - rectamente
  - correctamente
  lexicon: BDAG
  rationale: «Con rectitud» conserva el valor de corrección y también el matiz de conducta adecuada. «Rectamente» es posible, pero puede sonar más rígido; «correctamente» reduce el tono valorativo.
- source_word: λέγεις καὶ διδάσκεις
  english_pob_choice: you speak and teach
  chosen_spanish: hablas y enseñas
  alternatives_spanish:
  - dices y enseñas
  - hablas y doblas enseñanza
  lexicon: BDAG
  rationale: Se mantiene la coordinación de dos verbos en español. «Hablas y enseñas» suena natural y preserva la amplitud retórica del elogio sin reducirlo a una sola idea.
- source_word: οὐ λαμβάνεις πρόσωπον
  english_pob_choice: you do not show partiality
  chosen_spanish: no muestras parcialidad
  alternatives_spanish:
  - no recibes rostro
  - no te dejas llevar por las apariencias
  - no favoreces a nadie
  lexicon: BDAG
  rationale: La expresión griega es un idiomatismo sobre favoritismo. «No muestras parcialidad» es el equivalente español más claro y fiel al sentido; se evita la literalidad oscura de «recibes rostro».
- source_word: ἐπ’ ἀληθείας
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - en verdad
  - de verdad
  lexicon: BDAG
  rationale: «Verdaderamente» reproduce bien el adverbio de modo y combina con «enseñas» sin sonar coloquial. Mantiene el énfasis en la conformidad con la verdad.
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  english_pob_choice: the way of God
  chosen_spanish: el camino de Dios
  alternatives_spanish:
  - la senda de Dios
  - la vía de Dios
  lexicon: BDAG
  rationale: «Camino» es el equivalente español más natural para ὁδός y conserva la resonancia bíblica del original. «De Dios» mantiene la estructura del genitivo sin sustituirla por una paráfrasis.
theological_decisions:
- issue: Traducción del idiomatismo de imparcialidad
  english_pob_reading: Rendered οὐ λαμβάνεις πρόσωπον as 'you do not show partiality'
  chosen_spanish_reading: no muestras parcialidad
  alternative_spanish_readings:
  - no te dejas llevar por las apariencias
  - no favoreces a nadie
  rationale: El griego usa una imagen literal de «recibir rostro» para expresar favoritismo. En español, la formulación idiomática «no muestras parcialidad» comunica con claridad la afirmación ética y evita oscurecer el sentido con una literalidad impropia.
  doctrine_reference: 'Translation philosophy §1 y §6: primacía del original y español moderno claro'
- issue: Valor de ἐπ’ ἀληθείας
  english_pob_reading: '''in truth teach the way of God'''
  chosen_spanish_reading: enseñas verdaderamente el camino de Dios
  alternative_spanish_readings:
  - enseñas en verdad el camino de Dios
  - enseñas con verdad el camino de Dios
  rationale: La frase puede leerse como adverbio de modo que modifica «enseñas»; por eso «verdaderamente» es una buena solución. Se preserva la alternativa de entenderla como «en verdad» para no borrar la ambigüedad semántica del original.
  doctrine_reference: 'Translation philosophy §1: fidelidad al alcance semántico del texto base'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota en el texto español. También se mantuvo la distinción entre el idiomatismo de imparcialidad y la posible ambigüedad de ἐπ’ ἀληθείας, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando el texto fuente lo exige explícitamente; aquí aparece θεοῦ, por lo que corresponde «Dios».
  - Se preservó la coordinación verbal del griego («hablas y enseñas») para no fusionar los dos predicados.
  - «Parcialidad» reproduce mejor el idiomatismo de πρόσωπον que una traducción literal oscura.
  - Se mantuvo el registro bíblico natural en español sin recurrir a calcos innecesarios.
  - Los marcadores de nota [a] y [b] aparecen exactamente en los lugares anclados del texto.
