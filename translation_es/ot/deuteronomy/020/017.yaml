review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: contraste inicial, mandato intensificado de חרם, lista de pueblos y cláusula final con Yahvé como nombre divino. Sin embargo, la nota [a] no representa fielmente כִּי, porque mezcla valores (''porque / en verdad'') y además arrastra parte del verbo siguiente; el foco documentado en el audit trail es adversativo (''Instead''). También conviene ajustar la puntuación del inciso para un español más natural.'
  spanish_quality_summary: El español es claro y ampliamente legible. 'En cambio' y 'destruirlos por completo' funcionan bien. La enumeración étnica está en formas bíblicas reconocibles en español. El único problema de calidad notable es la puntuación con raya de cierre seguida de coma ('—, como'), que suena poco natural; en esta oración fluye mejor sin esa coma. La nota [a] también resulta confusa para el lector.
  glossary_alignment: 'Se alinea bien con los términos del proyecto: יְהוָה -> ''Yahvé'', אֱלֹהֶיךָ -> ''tu Dios''. La decisión sobre חרם como ''destruirlos por completo'' es aceptable si se conserva la nota explicativa sobre la prohibición/devoción total. No hay conflicto con la terminología doctrinal principal.'
  issues:
  - severity: medium
    issue: La nota [a] interpreta כִּי de manera imprecisa
    rationale: El hebreo כִּי aquí, según el propio audit trail inglés, tiene fuerza contrastiva contextual ('Instead'), no 'porque / en verdad'. Además la glosa citada incluye indebidamente el verbo siguiente, por lo que no preserva limpiamente la decisión léxica documentada.
  - severity: low
    issue: Puntuación poco natural en '—, como'
    rationale: En español, tras cerrar el inciso con raya, la coma antes de 'como Yahvé...' no es necesaria y entorpece la lectura.
  revised_spanish_text: En cambio[a], deberás destruirlos por completo[b]—los hititas, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos— como Yahvé tu Dios te ha mandado.
  revised_footnotes:
