translation:
  language: es
  text: Porque mira[a], el invierno ha pasado; la lluvia ha cesado y se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la estación lluviosa». El término hebreo para «invierno» puede referirse más específicamente a la estación de lluvias.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la explicación o motivo de la exhortación previa; «Porque» conserva esa fuerza causal de manera natural en español.
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: mira[a]
  alternatives_spanish:
  - mira
  - mira pues
  - ve
  lexicon: HALOT
  rationale: Es una partícula deíctica que llama la atención. «Mira» reproduce el llamado directo con un tono natural y contemporáneo, equivalente al «look» del POB inglés.
- source_word: הַסְּתָו
  english_pob_choice: the winter
  chosen_spanish: el invierno
  alternatives_spanish:
  - la estación lluviosa
  - el otoño
  lexicon: HALOT
  rationale: El término puede abarcar la estación invernal o lluviosa. «El invierno» es la opción más clara y usual en español, y el contexto inmediato de la lluvia mantiene visible la posible referencia estacional más amplia.
- source_word: עָבָר
  english_pob_choice: has passed
  chosen_spanish: ha pasado
  alternatives_spanish:
  - pasó
  - ha transcurrido
  lexicon: HALOT
  rationale: El perfecto expresa una acción concluida con relevancia presente, como en el inglés auditado.
- source_word: הַגֶּשֶׁם
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la lluvia fuerte
  - el aguacero
  lexicon: HALOT
  rationale: «Lluvia» es el equivalente directo y mantiene el referente general del sustantivo sin añadir intensidad no especificada por el hebreo.
- source_word: חָלַף
  english_pob_choice: is over
  chosen_spanish: se ha ido
  alternatives_spanish:
  - ha pasado
  - ha cesado
  lexicon: HALOT
  rationale: El verbo tiene el sentido de desaparecer o alejarse. «Se ha ido» transmite bien el movimiento de salida y evita repetir exactamente «ha pasado».
- source_word: הָלַךְ לוֹ
  english_pob_choice: and gone
  chosen_spanish: y ha desaparecido
  alternatives_spanish:
  - y se fue
  - y se ha ido
  lexicon: HALOT
  rationale: 'La locución intensifica la idea anterior: no solo cesó, sino que se fue por completo. «Ha desaparecido» comunica esa culminación con naturalidad en español.'
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios sustanciales; se mantuvo la equivalencia óptima con atención al paralelismo poético y a la posibilidad semántica del término hebreo para la estación lluviosa.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal de dos miembros: primero la estación, luego la lluvia.'
  - Se evitó el calco «y ido»; en su lugar, «y ha desaparecido» preserva el refuerzo final del hebreo.
  - Se usó «mira» para reflejar la deixis enfática de הִנֵּה sin arcaísmo.
