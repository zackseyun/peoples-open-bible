revisions:
- from: Por eso, me horroriza estar delante de él[a]; cuando reflexiono[b], siento temor de él.
  to: Por eso, me aterro ante él[a]; cuando lo considero[b], le tengo miedo.
  rationale: La revisión elimina el añadido «estar», corrige «me horroriza» por un verbo que sí expresa terror experimentado por el hablante, y hace más directa la segunda cola. «Ante él» mantiene bien el valor de מִפָּנָיו, mientras que «cuando lo considero» refleja de cerca el matiz reflexivo de אֶתְבּוֹנֵן y conserva un español natural y digno.
