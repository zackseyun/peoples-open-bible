id: COL.1.23
reference: Colossians 1:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴ γε ἐπιμένετε τῇ πίστει τεθεμελιωμένοι καὶ ἑδραῖοι καὶ μὴ μετακινούμενοι ἀπὸ τῆς ἐλπίδος τοῦ εὐαγγελίου οὗ ἠκούσατε, τοῦ κηρυχθέντος ἐν ⸀πάσῃ κτίσει τῇ ὑπὸ τὸν οὐρανόν, οὗ ἐγενόμην ἐγὼ Παῦλος διάκονος.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/023.yaml
  text: if indeed you continue in the faith, grounded and steadfast, and not moved away from the hope of the gospel that you heard, which has been proclaimed in all creation under heaven, of which I, Paul, became a servant.
translation:
  language: ko
  text: 곧 여러분이 그 믿음 안에 계속 머무르되, 터 위에 굳게 서서 흔들리지 않고, 여러분이 들은 복음의 소망에서 떠나지 않는다면 그러합니다. 그 복음은 하늘 아래 모든 피조물[a]에 선포되었으며, 나 바울은 그 복음의 일꾼[b]이 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하늘 아래 모든 피조물에게」. 헬라어 κτίσις는 「창조」 또는 「피조물」을 함께 담는다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「봉사자」, 「사역자」. 헬라어 διάκονος는 후대의 「집사」 직제 함의를 피하기 위해 「일꾼」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  english_pob_choice: if indeed
  chosen_korean: 곧 ... 한다면 그러합니다
  alternatives_korean:
  - 만일 진실로 ~한다면
  - 다만 ~한다면
  lexicon: BDAG
  rationale: 조건적 εἰ에 강조의 γε가 더해진 형태. 한국어에서는 「곧 ~한다면 그러합니다」로 앞 절(22절)과의 연결을 자연스럽게 한다.
- source_word: ἐπιμένετε
  english_pob_choice: you continue
  chosen_korean: 계속 머무르되
  alternatives_korean:
  - 계속 거하되
  - 지속하되
  lexicon: BDAG
  rationale: 현재 시제의 지속적 머무름을 「계속 머무르되」로 옮긴다.
- source_word: τῇ πίστει
  english_pob_choice: in the faith
  chosen_korean: 그 믿음 안에
  alternatives_korean:
  - 믿음 안에
  - 그 신앙에
  lexicon: BDAG
  rationale: 정관사를 보존하여 「그 믿음」으로 옮겨 기독교 신앙·복음의 신앙을 가리킴을 살린다.
- source_word: τεθεμελιωμένοι καὶ ἑδραῖοι
  english_pob_choice: grounded and steadfast
  chosen_korean: 터 위에 굳게 서서 흔들리지 않고
  alternatives_korean:
  - 기초가 세워지고 견고하며
  - 터를 잡고 굳건히 서서
  lexicon: BDAG
  rationale: 완료 수동 분사 τεθεμελιωμένοι(터 위에 세워진)와 형용사 ἑδραῖοι(굳건한)를 「터 위에 굳게 서서」로 자연스럽게 옮긴다.
- source_word: μὴ μετακινούμενοι
  english_pob_choice: not moved away
  chosen_korean: 흔들리지 않고 ... 떠나지 않는다면
  alternatives_korean:
  - 옮겨지지 않고
  - 자리를 떠나지 않고
  lexicon: BDAG
  rationale: 현재 분사로 지속적 견고함을 가리킨다. 앞 절과 결합하여 자연스러운 한국어 흐름으로 풀어 옮긴다.
- source_word: ἀπὸ τῆς ἐλπίδος τοῦ εὐαγγελίου
  english_pob_choice: from the hope of the gospel
  chosen_korean: 복음의 소망에서
  alternatives_korean:
  - 복음이 주는 소망에서
  lexicon: BDAG
  rationale: 속격 관계를 「복음의 소망」으로 보존한다.
- source_word: τοῦ κηρυχθέντος
  english_pob_choice: which has been proclaimed
  chosen_korean: 선포되었으며
  alternatives_korean:
  - 전파되었으며
  - 알려진
  lexicon: BDAG
  rationale: 부정과거 수동 분사. 「선포」는 공적 알림의 어감을 보존한다.
- source_word: ἐν πάσῃ κτίσει τῇ ὑπὸ τὸν οὐρανόν
  english_pob_choice: in all creation under heaven
  chosen_korean: 하늘 아래 모든 피조물에
  alternatives_korean:
  - 하늘 아래 온 창조에
  - 하늘 아래 모든 피조물에게
  lexicon: BDAG
  rationale: κτίσις를 분배적 「모든 피조물」로 옮긴다. 복음의 광범위한 선포에 대한 수사적 보편 표현이다.
- source_word: οὗ ἐγενόμην ἐγὼ Παῦλος διάκονος
  english_pob_choice: of which I, Paul, became a servant
  chosen_korean: 나 바울은 그 복음의 일꾼이 되었습니다
  alternatives_korean:
  - 내가, 곧 바울이 그 복음의 일꾼이 되었습니다
  - 나 바울이 사역자가 되었습니다
  lexicon: BDAG
  rationale: 관계대명사 οὗ는 「복음」을 받는다. διάκονος는 후대 「집사」 직제 의미를 피하기 위해 「일꾼」으로 옮긴다.
theological_decisions:
- issue: εἴ γε 조건절의 신학적 함의
  chosen_reading: 현실 조건문(「~한다면」)으로 보존, 견인·배교 신학을 본문에서 결정하지 않음
  alternative_readings:
  - 「실로 ~하므로」(상황적 인과로 해석)
  rationale: 본 절은 믿음 안에 머무름의 조건을 명시하나, 견인 신학 논쟁을 직접 해소하지 않는다. 본 번역은 조건적 긴장을 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
