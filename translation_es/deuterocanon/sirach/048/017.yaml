base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/048/017.yaml
  text: Hezekiah fortified his city[a], and brought water into its midst; he cut through rock like bronze[b], and dammed up a reservoir in the mountains.
  footnotes:
  - marker: a
    text: Hebrew 'with bronze/copper' is difficult here; the Greek witness reads 'with iron,' which fits the context of cutting through rock and is followed in the main text.
    reason: textual_variant
  - marker: b
    text: The final Hebrew phrase is compressed and may also be understood as 'he blocked up a reservoir in the mountains' or, with the Greek, more generally 'he built water sources/reservoirs.'
    reason: alternative_reading
