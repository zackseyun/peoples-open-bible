translation:
  language: es
  text: 'Estos fueron los hijos de Galaad: de Iezer[a], el clan de los iezeritas; de Helek, el clan de los helekitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo 'hijos de Galaad' puede referirse a descendientes por línea masculina o a clanes constituidos, no solo a hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  - Estos
  lexicon: HALOT
  rationale: La fórmula introductoria de una lista genealógica/clánica se expresa de manera natural en pasado en español, manteniendo el valor demostrativo de la forma hebrea sin forzar un presente temporal.
- source_word: בְּנֵי גִלְעָד
  english_pob_choice: the sons of Gilead
  chosen_spanish: los hijos de Gilead
  alternatives_spanish:
  - los descendientes de Gilead
  - los hijos de Galaad
  lexicon: HALOT
  rationale: Se conserva 'hijos' como reflejo directo del constructo hebreo, que aquí funciona como lenguaje genealógico para descendientes varoniles y fundadores de clanes. Se mantiene el nombre propio según la forma del texto fuente proporcionado.
- source_word: אִיעֶזֶר
  english_pob_choice: Iezer
  chosen_spanish: Iezer
  alternatives_spanish:
  - Jeezer
  lexicon: HALOT
  rationale: Nombre propio transliterado, sin adaptar semánticamente. Se conserva la forma auditada 'Iezer' para alineación con la tradición de la POB en este pasaje.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: el clan de
  alternatives_spanish:
  - la familia de
  - el linaje de
  lexicon: HALOT
  rationale: En Números 26 el término designa una subdivisión tribal, por lo que 'clan' comunica mejor el valor social y genealógico que 'familia', demasiado amplio en español.
- source_word: הָאִיעֶזְרִי
  english_pob_choice: the Iezerites
  chosen_spanish: los iezeritas
  alternatives_spanish:
  - los iezeríes
  - el clan iezerita
  lexicon: HALOT
  rationale: El gentilicio hebreo se vierte con el plural español '-itas', equivalente natural para un grupo/clan derivado de un antepasado. Se preserva la relación con Iezer sin añadir interpretación extra.
- source_word: לְחֵלֶק
  english_pob_choice: of Helek
  chosen_spanish: de Helek
  alternatives_spanish:
  - para Helek
  - a Helek
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula genealógica introduce el siguiente fundador/clan. En español, 'de' reproduce con claridad la relación de pertenencia o procedencia.
- source_word: הַחֶלְקִי
  english_pob_choice: the Helekites
  chosen_spanish: los helekitas
  alternatives_spanish:
  - el clan de Helek
  - los helquitas
  lexicon: HALOT
  rationale: Se mantiene el patrón gentilicio con '-itas' para uniformidad en la lista. La forma 'helekitas' conserva la transparencia del nombre base Helek y evita una adaptación innecesaria.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto hebreo masorético y con la auditoría inglesa: lista genealógica/clánica, transliteraciones consistentes y uso de ''clan'' para מִשְׁפַּחַת. No se detectan variantes textuales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se conservó 'Gilead' y no 'Galaad' para alineación con la forma auditada del nombre en esta unidad.
  - Se usó 'los iezeritas' y 'los helekitas' como gentilicios regulares en español, manteniendo paralelismo y legibilidad.
  - La nota [a] se ancla en 'hijos' para reflejar la ambigüedad genealógica documentada en la POB inglesa.
