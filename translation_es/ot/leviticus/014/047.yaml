translation:
  language: es
  text: Y el que se acueste[a] en la casa lavará su ropa, y el que coma en la casa lavará su ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien duerma en la casa». El verbo hebreo puede significar «acostarse» o «dormir»; aquí se prefiere «se acueste» por ser más amplio y ajustarse al contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשֹּׁכֵב
  english_pob_choice: and whoever lies down
  chosen_spanish: el que se acueste
  alternatives_spanish:
  - quien se acueste
  - el que se tienda
  - quien duerma
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera sustantiva y expresa una persona cualquiera en un marco legal. «El que se acueste» conserva ese valor genérico y la fuerza normativa. «Dormir» sería más restrictivo; el verbo hebreo puede abarcar el acto de echarse o acostarse, no necesariamente el sueño.
- source_word: בַּבַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - dentro de la casa
  - en la casa misma
  lexicon: HALOT
  rationale: La expresión locativa es directa. «En la casa» es natural en español y suficientemente precisa para el contexto legal.
- source_word: יְכַבֵּס
  english_pob_choice: shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - deberá lavar
  - ha de lavar
  lexicon: HALOT
  rationale: En español, el futuro simple comunica bien la obligación prescriptiva en material legal. Evita una paráfrasis más pesada y mantiene el registro normativo.
- source_word: אֶת־בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus ropajes
  lexicon: HALOT
  rationale: «בֶּגֶד» puede abarcar ropa o vestimenta; «vestidos» conserva un tono bíblico y suficientemente amplio. Se mantiene el sufijo singular masculino con «sus», como en el hebreo, sin convertirlo en plural inclusivo moderno.
- source_word: וְהָאֹכֵל
  english_pob_choice: and whoever eats
  chosen_spanish: y el que coma
  alternatives_spanish:
  - y quien coma
  - y el que esté comiendo
  - y quien esté comiendo
  lexicon: HALOT
  rationale: Como participio sustantivado con sentido genérico, se traduce de forma paralela al primer miembro. «El que coma» mantiene la estructura legal y la genericidad.
theological_decisions:
- issue: Género gramatical masculino singular en sentido legal genérico
  english_pob_reading: Use 'whoever ... his clothes'
  chosen_spanish_reading: 'Uso de singulares masculinos genéricos: «el que ... sus vestidos»'
  alternative_spanish_readings:
  - quien ... sus vestidos
  - quien ... sus prendas
  - la persona que ... sus vestidos
  rationale: El hebreo usa participios y sufijo masculino singular en un sentido representativo. Se conserva esa forma gramatical sin restringir el mandato a varones, pero tampoco se reemplaza por una pluralización moderna que borre el dato textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y sin revisiones aplicadas; la versión española sigue el mismo sentido base, conservando la ambigüedad lexical de שׁכב con una solución amplia («se acueste») y el paralelismo legal del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva el paralelismo entre los dos miembros con la misma fórmula verbal («lavará sus vestidos»).
  - «Vestidos» se usa como equivalente bíblico natural de בְּגָדִים sin introducir un tecnicismo ajeno al registro del pasaje.
