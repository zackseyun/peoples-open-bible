    text: 'O «casi»: «Uno del pueblo casi habría yacido con tu esposa».'
    reason: lexical_alternative
  revision_rationale: Se corrige «con nosotros» a «nos has hecho» para reflejar correctamente לָּנוּ como objeto afectado. Se cambia «dormido con» por «yacido con» para expresar con mayor claridad y dignidad el modismo sexual hebreo שָׁכַב ... אֶת, en línea con la rationale del POB en inglés. Se conserva «por poco» como equivalente natural de כִּמְעַט y «culpa sobre nosotros» para אָשָׁם. La nota se ajusta para mantener la misma precisión léxica que el texto principal.
