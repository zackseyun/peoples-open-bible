    issue: '''de secreto'' es poco idiomático en español'
    rationale: Aunque intenta reflejar la compresión nominal hebrea, en español suena antinatural y opaco. 'En secreto' comunica mejor la idea de ocultamiento sin introducir 'comido' ni otra acción.
  - severity: medium
    issue: La nota al pie está anclada en la palabra equivocada
    rationale: La nota discute alternativas para 'pan ... secreto/oculto', no para 'dulces'. Debe marcarse en la segunda cláusula.
  - severity: low
    issue: '''Las aguas robadas'' es menos natural que ''El agua robada'''
    rationale: El hebreo מַיִם, aunque formalmente plural, suele funcionar como nombre de masa. El propio expediente inglés prefirió singular por idiomaticidad; en español 'el agua robada' suena más natural y preserva el sentido.
  revised_spanish_text: El agua robada es dulce, y el pan en secreto[a] es agradable.
