base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/012/005.yaml
  text: And he said to them[a], “Yahweh is witness against you, and his anointed is witness this day, that you have found nothing in my hand.” And they said[c][b], “He is witness.”
  footnotes:
  - marker: a
    text: 'Or, more literally, “The LORD is witness among/with you.” The sense in context is forensic: the LORD stands as witness in the case concerning them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew “his anointed,” referring here to the king (Saul), not directly to the later messianic title.
    reason: cultural_note
  - marker: c
    text: The final Hebrew verb is singular (“and he said”), but in context it functions as a collective response, hence “they said.”
    reason: textual_variant
