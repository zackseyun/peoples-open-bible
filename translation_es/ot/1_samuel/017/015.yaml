review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: movimiento repetido entre Saúl y Belén, propósito de cuidar el rebaño de su padre, y ubicación en Belén. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el POB inglés para הֹלֵךְ וָשָׁב; la nota actual repite «pastorear» en vez de registrar la alternativa más formal «fue y volvió / iba y volvía» y «apacentar».'
  spanish_quality_summary: El español es claro y natural. «Iba y venía» suena bien para el valor iterativo. «De junto a Saúl» es comprensible, pero algo menos natural que «de donde estaba con Saúl» o el más conciso «de Saúl». Aun así, no distorsiona el sentido. El problema principal es la nota al pie mal anclada y mal formulada.
  glossary_alignment: No hay conflicto con la terminología teológica del proyecto. «Pastorear», «rebaño», «Saúl» y «Belén» son adecuados. La decisión «de junto a Saúl» es aceptable como matiz idiomático de מֵעַל שָׁאוּל, aunque no necesaria.
  issues:
  - severity: medium
    issue: La nota al pie no corresponde a la alternativa preservada en el rastro de auditoría inglés.
    rationale: 'La nota inglesa documenta una alternativa más formal para toda la secuencia verbal y el infinitivo: «David went and returned from Saul to pasture his father''s flock at Bethlehem». La nota española actual solo dice «O, más formalmente, “pastorear el rebaño de su padre”», lo cual omite el componente principal de la alternativa y no añade información útil.'
  - severity: low
    issue: El anclaje de la nota en «pastorear[a]» es demasiado estrecho para una alternativa que afecta a toda la cláusula.
    rationale: La alternativa formal afecta sobre todo a «iba y venía» y también a «pastorear». Conviene anclar la nota en la cláusula verbal principal o reformular la nota para abarcar la oración relevante.
  revised_spanish_text: Ahora David iba y venía[a] de junto a Saúl para pastorear el rebaño de su padre en Belén.
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «David iba y volvía de Saúl para apacentar el rebaño de su padre en Belén».
    reason: lexical_alternative
