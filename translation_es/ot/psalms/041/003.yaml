  to: Yahvé lo guardará y preservará su vida[a]; será bendito[b] en la tierra, y no lo entregues[c] a la voluntad[d] de sus enemigos.
  rationale: Se ajusta «bendecido» a «bendito» por mayor naturalidad y mejor correspondencia con el posible matiz declarativo de יאשר en español eclesial legible. Se corrigen y ordenan las notas para separar la alternativa de cláusula completa de la alternativa léxica de «voluntad/deseo», además de eliminar el error ortográfico.
