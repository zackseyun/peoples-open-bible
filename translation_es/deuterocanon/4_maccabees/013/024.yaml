translation:
  language: es
  text: Porque tuvieron una concordia[a] más firme entre sí; pues, habiendo sido formados por la misma ley, habiendo practicado las mismas virtudes y habiendo sido criados en un modo de vida recto[b], fueron unidos más estrechamente entre sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una armonía más firme entre sí».
    reason: lexical_alternative
  - marker: b
    text: La cláusula final del griego es condensada; el sentido es que su formación compartida en la ley, las virtudes y un modo de vida recto los unió más estrechamente entre sí.
    reason: alternative_reading
lexical_decisions:
- source_word: θέστερον
  english_pob_choice: firmer
  chosen_spanish: más firme
  alternatives_spanish:
  - más fuerte
  - más sólida
  lexicon: LSJ
  rationale: El comparativo expresa mayor estabilidad o solidez de la relación. «Más firme» conserva la fuerza comparativa sin sonar artificial en español.
- source_word: ὁμόνοιαν
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - concordia
  - unidad
  - armonía de ánimo
  lexicon: LSJ
  rationale: El término implica acuerdo de mente y concordia mutua. «Armonía» comunica bien la relación mutua y funciona de manera natural en español actual.
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: LSJ
  rationale: En 4 Macabeos, el término suele referirse a la ley judía/Torá. «Ley» es la traducción más transparente y mantiene la referencia de fondo sin explicitarla en el texto principal.
- source_word: παιδευθέντες
  english_pob_choice: having been trained
  chosen_spanish: habiendo sido formados
  alternatives_spanish:
  - habiendo sido instruidos
  - habiendo sido disciplinados
  lexicon: LSJ
  rationale: El participio pasivo incluye instrucción y formación moral. «Habiendo sido formados» recoge esa amplitud mejor que una opción demasiado restrictiva.
- source_word: ἐξασκήσαντες
  english_pob_choice: having practiced
  chosen_spanish: habiendo ejercitado
  alternatives_spanish:
  - habiendo practicado
  - habiendo cultivado
  lexicon: LSJ
  rationale: El verbo apunta al ejercicio activo y disciplinado de las virtudes. «Habiendo ejercitado» conserva esa idea de práctica deliberada.
- source_word: ἀρετάς
  english_pob_choice: virtues
  chosen_spanish: virtudes
  alternatives_spanish:
  - excelencias
  lexicon: LSJ
  rationale: En el lenguaje moral helenístico, el plural se refiere a virtudes o excelencias morales. «Virtudes» es la equivalencia más clara y natural.
- source_word: τῷ δικαίῳ ... βίῳ
  english_pob_choice: in a righteous way of life
  chosen_spanish: en una vida justa
  alternatives_spanish:
  - en una vida recta
  - en un modo de vida justo
  lexicon: LSJ
  rationale: La frase describe la esfera o forma de su crianza/vida. «Vida justa» conserva el sentido moral y evita una perífrasis excesiva; el adjetivo «justa» refleja δικαίῳ sin forzar una lectura más forense que el contexto.
- source_word: συντραφέντες
  english_pob_choice: having been brought up
  chosen_spanish: habiendo sido criados
  alternatives_spanish:
  - habiendo sido criados juntos
  - habiendo sido nutridos
  lexicon: LSJ
  rationale: El verbo alude a ser criados o nutridos. «Habiendo sido criados» es natural en español; la idea de formación compartida queda reforzada por el contexto y por «entre sí».
- source_word: μᾶλλον ἐφʼ αὐτοὺς ἤγαγον
  english_pob_choice: they were drawn more closely together
  chosen_spanish: fueron atraídos más estrechamente unos hacia otros
  alternatives_spanish:
  - los llevó más hacia sí mismos
  - se acercaron más entre sí
  lexicon: LSJ
  rationale: 'El griego es comprimido y expresa el resultado de la formación compartida: mayor cercanía mutua. La pasiva en español mantiene el efecto sin añadir agentes no presentes.'
theological_decisions:
- issue: Sentido de «ley» en un texto judío helenístico de martirio
  english_pob_reading: '''the same law'' refers to the shared Jewish law that formed the brothers'
  chosen_spanish_reading: «la misma ley» se deja en el texto, con la lectura de la ley judía compartida y formadora de fondo
  alternative_spanish_readings:
  - una ley moral genérica
  - la Torá
  rationale: El contexto de 4 Macabeos favorece la ley ancestral judía. Mantener «ley» respeta el texto fuente; una nota explicativa no es necesaria en el verso principal porque la referencia se infiere bien del contexto.
  doctrine_reference: 'DOCTRINE.md: primacía de la fuente original; consistencia terminológica'
- issue: La cláusula final comprimida del griego
  english_pob_reading: their shared formation in law, virtue, and righteous living drew them into closer mutual unity
  chosen_spanish_reading: la formación común en ley, virtudes y vida justa los hizo más cercanos entre sí
  alternative_spanish_readings:
  - todo eso los unió más
  - fueron llevados a una unidad mutua más estrecha
  rationale: El griego presenta una relación causal comprimida. La traducción principal conserva la pasiva y la idea de acercamiento mutuo, sin convertirla en una paráfrasis excesiva ni perder la tensión sintáctica.
  doctrine_reference: 'DOCTRINE.md: transparencia textual y respeto por la sintaxis original'
translation_notes:
  revision_awareness: 'Se revisó el borrador a la luz del cierre griego comprimido y del auditorio English POB: se evitó una traducción mecánica, pero también se evitó expandir el sentido más allá de la causalidad y el movimiento mutuo que el griego sí expresa. La versión española conserva la secuencia de participios y el resultado final de cercanía entre ellos.'
  spanish_consistency_notes:
  - Se mantuvo «ley» para νόμος, en línea con el uso técnico de 4 Macabeos y sin sustituirlo por terminología eclesiástica.
  - Se usó «virtudes» para ἀρετάς en plural, preservando el carácter moral helenístico del pasaje.
  - Se prefirió «vida justa» para τῷ δικαίῳ βίῳ por claridad natural en español, evitando una calca como «vida recta» si sonara menos fluida.
  - La pasiva «fueron atraídos» preserva la dirección del cierre griego sin introducir un sujeto agente inexistente.
