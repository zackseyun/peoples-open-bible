    issue: El modismo «desde el más pequeño hasta el más grande» suena demasiado literal y puede sugerir tamaño físico.
    rationale: לְמִקָּטֹן וְעַד גָּדוֹל es una expresión idiomática de totalidad humana/social. En español, «desde el menor hasta el mayor» preserva mejor el sentido sin introducir la imagen de tamaño.
  revised_spanish_text: Entonces llamó a Johanán hijo de Carea, a todos los comandantes de las fuerzas que estaban con él, y a todo el pueblo, desde el menor hasta el mayor,
  revision_rationale: Se ajusta el modismo final para reflejar mejor el sentido idiomático hebreo en español natural y eclesialmente legible, evitando una lectura de tamaño físico.
