translation:
  language: es
  text: En un pleito[a], ellos estarán de pie para juzgar; lo juzgarán conforme a mis juicios. Guardarán mis leyes y mis estatutos en todos mis tiempos señalados[b], y santificarán mis sábados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «caso», «controversia» o «litigio» para רִיב.
    reason: lexical_alternative
  - marker: b
    text: «Mis tiempos señalados» también puede rendirse «mis fiestas señaladas» o «mis tiempos establecidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיב
  english_pob_choice: dispute
  chosen_spanish: pleito
  alternatives_spanish:
  - disputa
  - controversia
  - litigio
  lexicon: HALOT
  rationale: רִיב en este contexto es un conflicto o caso jurídico. «Pleito» conserva el matiz legal y resulta natural en español bíblico contemporáneo; evita reducirlo a una discusión meramente verbal.
- source_word: יַעַמְדוּ
  english_pob_choice: shall stand
  chosen_spanish: se pondrán de pie
  alternatives_spanish:
  - se mantendrán en pie
  - tomarán su puesto
  - comparecerán
  lexicon: HALOT
  rationale: עמד significa literalmente «estar de pie». «Se pondrán de pie» conserva la imagen forense de presentarse para ejercer juicio sin diluirla en una paráfrasis más abstracta.
- source_word: לשפט
  english_pob_choice: to judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - para dar juicio
  - para sentenciar
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Para juzgar» es directo y mantiene la repetición verbal con el verbo siguiente.
- source_word: במשפטי
  english_pob_choice: according to my judgments
  chosen_spanish: conforme a mis juicios
  alternatives_spanish:
  - según mis juicios
  - de acuerdo con mis decretos
  - conforme a mis sentencias
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a juicios, decisiones legales u ordenanzas. «Juicios» conserva el campo legal y la relación con la función judicial del pasaje.
- source_word: ושפטהו
  english_pob_choice: they shall judge it
  chosen_spanish: lo juzgarán
  alternatives_spanish:
  - juzgarán ese pleito
  - lo decidirán
  - pronunciarán juicio sobre él
  lexicon: HALOT
  rationale: El sufijo retoma el pleito/caso. «Lo juzgarán» mantiene la repetición léxica de שפט y la referencia anafórica implícita.
- source_word: תורותי
  english_pob_choice: my laws
  chosen_spanish: mis leyes
  alternatives_spanish:
  - mis instrucciones
  - mis enseñanzas
  - mi ley
  lexicon: HALOT
  rationale: תּוֹרוֹת puede significar instrucción o ley. En este marco sacerdotal-legal, «leyes» comunica la fuerza normativa sin borrar la pluralidad.
- source_word: חקותי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis preceptos
  - mis ordenanzas
  lexicon: HALOT
  rationale: חֻקּוֹת denota estatutos o disposiciones prescritas. «Estatutos» mantiene la distinción frente a «leyes».
- source_word: בכל מועדי
  english_pob_choice: at all my appointed times
  chosen_spanish: en todos mis tiempos señalados
  alternatives_spanish:
  - en todas mis fiestas señaladas
  - en todas mis citas señaladas
  - en todas mis festividades señaladas
  lexicon: HALOT
  rationale: מוֹעֵד puede ser tiempo señalado, cita sagrada o fiesta. «Tiempos señalados» conserva la amplitud del término; «en» funciona naturalmente con la esfera temporal/cultual del mandato.
- source_word: ישמרו
  english_pob_choice: they shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  - mantendrán
  lexicon: HALOT
  rationale: שמר implica guardar, observar, custodiar. «Guardarán» permite abarcar la obediencia ritual y la custodia fiel de las normas.
- source_word: שבתותי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de reposo
  - mis días de sábado
  lexicon: HALOT
  rationale: El plural hebreo es explícito. «Sábados» mantiene la pluralidad y la forma tradicional del término, sin añadir una explicación que el texto no exige.
- source_word: יקדשו
  english_pob_choice: they shall keep holy
  chosen_spanish: santificarán
  alternatives_spanish:
  - los harán santos
  - los consagrarán
  - los tratarán como sagrados
  lexicon: HALOT
  rationale: קדש en piel significa santificar, hacer santo o tratar como santo. «Santificarán» es la opción más fiel y transparente en español; el contexto sabático ya sugiere la observancia reverente.
theological_decisions:
- issue: Conservación de la distinción legal entre juicios, leyes y estatutos
  english_pob_reading: Use distinct legal terms ('judgments,' 'laws,' 'statutes') rather than collapsing them into a single English category.
  chosen_spanish_reading: 'Mantener términos distintos: «juicios», «leyes» y «estatutos».'
  alternative_spanish_readings:
  - unificar todo como «normas»
  - usar solo «mandamientos»
  rationale: El hebreo apila vocabulario jurídico relacionado pero no idéntico. En español, conservar la distinción ayuda a no aplanar la textura legal del pasaje y respeta la transparencia fuente-meta.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Sentido cultual de מוֹעֲדַי
  english_pob_reading: '''My appointed times'' may also be rendered ''my appointed festivals'' or ''my set times.'''
  chosen_spanish_reading: «Mis tiempos señalados» con nota de posibles fiestas o citas sagradas.
  alternative_spanish_readings:
  - «mis fiestas señaladas»
  - «mis tiempos designados»
  - «mis convocaciones señaladas»
  rationale: El término hebreo es más amplio que «fiestas». «Tiempos señalados» preserva esa amplitud; la nota permite reconocer la posible lectura festiva sin imponerla como única.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y el tramo inglés auditado. Se conservó la secuencia forense «pleito / se pondrán de pie / juzgarán» y la tríada normativa «leyes / estatutos / tiempos señalados», ajustando solo la preposición temporal para que el español resulte natural sin perder la amplitud de מוֹעֵד. También se mantuvo la pluralidad de שַׁבְּתוֹתַי con «mis sábados», y se tradujo יְקַדֵּשׁוּ con el verbo cultual transparente «santificarán».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el tetragrámaton aparezca explícitamente; este versículo no lo contiene.
  - Se mantuvo el registro legal-cultual con términos distintos para רִיב, מִשְׁפָּט, תּוֹרָה, חֻקָּה y מוֹעֵד.
  - «Sábados» preserva el plural hebreo y evita singularizar indebidamente el término.
