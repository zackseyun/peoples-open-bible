translation:
  language: es
  text: 'Pero ellos dijeron[a]: «No beberemos vino, porque Jonadab hijo de Recab, nuestro padre[b], nos ordenó: “Ustedes no beberán vino, ni sus hijos[c], para siempre”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ellos dijeron». La conjunción hebrea puede traducirse como simple continuación narrativa; «pero» refleja la contraposición con la invitación anterior a beber.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «nuestro padre», es decir, su antepasado o patriarca Jonadab.'
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «sus hijos», específicamente descendientes varones, no el término más general «hijos e hijas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: But they said
  chosen_spanish: Pero ellos dijeron
  alternatives_spanish:
  - Y ellos dijeron
  lexicon: HALOT
  rationale: El waw narrativo puede ser coordinante simple o contrastivo. Dado el contexto inmediato de una invitación a beber, ‘pero’ expresa bien la contraposición que también señaló el audit trail inglés, sin abandonar el valor narrativo de la conjunción.
- source_word: לֹא נִשְׁתֶּה יָּיִן
  english_pob_choice: We will not drink wine
  chosen_spanish: No beberemos vino
  alternatives_spanish:
  - No bebemos vino
  lexicon: HALOT
  rationale: El imperfecto en discurso directo expresa decisión futura o negativa resuelta. En español, el futuro simple transmite mejor esa resolución que el presente habitual.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de su negativa; ‘porque’ es natural en español y mantiene la relación causal.
- source_word: יוֹנָדָב
  english_pob_choice: Jonadab
  chosen_spanish: Jonadab
  alternatives_spanish:
  - Jehonadab
  lexicon: HALOT
  rationale: Se conserva la transliteración breve usada por el POB inglés; la forma más larga existe en otros pasajes, pero aquí el texto consonántico apoya ‘Jonadab’.
- source_word: בֶּן רֵכָב
  english_pob_choice: son of Rechab
  chosen_spanish: hijo de Recab
  alternatives_spanish:
  - hijo de Rechab
  lexicon: HALOT
  rationale: Se mantiene la relación patronímica con transliteración española consistente. ‘Recab’ sigue la ortografía hispana habitual del nombre.
- source_word: אָבִינוּ
  english_pob_choice: our father
  chosen_spanish: nuestro padre[b]
  alternatives_spanish:
  - nuestro antepasado[b]
  - nuestro padre/antepasado[b]
  lexicon: HALOT
  rationale: Se conserva la literalidad ‘nuestro padre’, que en este clan designa al antepasado Jonadab. La nota explica la fuerza genealógica sin reemplazar el término bíblico por una paráfrasis.
- source_word: צִוָּה עָלֵינוּ
  english_pob_choice: commanded us
  chosen_spanish: nos mandó
  alternatives_spanish:
  - nos ordenó
  - nos dio este mandato
  lexicon: HALOT
  rationale: El hebreo expresa una orden impuesta ‘sobre’ ellos; en español, ‘mandó’ comunica con claridad la obligación y conserva un tono directo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es el introductorio quotativo estándar. ‘Diciendo’ mantiene la conexión formal con la cita.
- source_word: לֹא תִשְׁתּוּ יַיִן
  english_pob_choice: You shall not drink wine
  chosen_spanish: No beberán vino ustedes
  alternatives_spanish:
  - No beberán vino
  lexicon: HALOT
  rationale: El mandato en segunda persona plural se vierte de modo explícito para conservar el énfasis del hebreo y la revisión inglesa que preserva ambos destinatarios.
- source_word: אַתֶּם וּבְנֵיכֶם
  english_pob_choice: you or your sons
  chosen_spanish: ustedes ni sus hijos[c]
  alternatives_spanish:
  - ustedes y sus hijos[c]
  - ustedes ni sus descendientes[c]
  lexicon: HALOT
  rationale: El hebreo distingue a los oyentes y a sus hijos; en español, ‘ustedes ni sus hijos’ reproduce esa enumeración dentro de la prohibición sin borrar la tensión entre los dos grupos.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa duración indefinida continua. ‘Para siempre’ es natural en español y transmite el alcance del hebreo.
theological_decisions:
- issue: Alcance genealógico de 'nuestro padre'
  english_pob_reading: Hebrew 'our father,' meaning their forefather or ancestor Jonadab.
  chosen_spanish_reading: '''nuestro padre'' como antepasado/clan paterno, sin convertirlo en un padre inmediato.'
  alternative_spanish_readings:
  - nuestro antepasado
  - nuestro patriarca
  rationale: El español conserva la expresión literal y evita desdibujar la carga histórica y genealógica del término. La nota aclara que se trata de un ancestro del grupo recabita.
  doctrine_reference: Historia de Israel / genealogía del clan recabita
- issue: Forma del mandato a los descendientes
  english_pob_reading: '''You shall not drink wine, you or your sons,'' preserving both addressees explicitly.'
  chosen_spanish_reading: '''No beberán vino ustedes ni sus hijos'', preservando los dos destinatarios dentro del mandato.'
  alternative_spanish_readings:
  - No beberán vino, ustedes y sus hijos
  - No beberán vino ustedes y sus hijos
  rationale: La redacción española debe reflejar que el hebreo nombra tanto a los oyentes como a sus hijos. La forma con 'ni' conserva la exclusión de ambos grupos sin suavizar la prohibición.
  doctrine_reference: Lectura sintáctica del mandato en discurso directo
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que ajustó la cita a 'you or your sons' para reflejar con mayor precisión el hebreo. La versión española preserva esa doble referencia mediante 'ustedes ni sus hijos' y mantiene el contraste narrativo de la conjunción inicial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - 'Se conserva transliteración coherente de nombres propios: Jonadab, Recab.'
  - Se evita 'siervo' porque el pasaje trata de una orden familiar/clánica, no de δοῦλος.
  - El registro busca ser publicable y bíblico sin depender de formulaciones tradicionales que oculten matices del hebreo.
