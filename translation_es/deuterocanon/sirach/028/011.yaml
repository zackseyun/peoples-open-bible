translation:
  language: es
  text: Una riña apresurada enciende fuego[a], y una pelea apresurada derrama sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Una riña precipitada enciende fuego, y una pelea emprendida con precipitación derrama sangre». El griego subraya mediante los participios que el conflicto es empujado hacia delante con demasiada rapidez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρις
  english_pob_choice: quarrel
  chosen_spanish: pelea
  alternatives_spanish:
  - riña
  - discordia
  - contienda
  lexicon: LSJ
  rationale: ἔρις designa conflicto o disputa entre personas o partes. En español, "pelea" comunica con naturalidad un conflicto interpersonal visible sin volver la frase demasiado abstracta.
- source_word: κατασπευδομένη
  english_pob_choice: hastened
  chosen_spanish: apresurada
  alternatives_spanish:
  - precipitada
  - apurada
  - acelerada
  lexicon: LSJ
  rationale: El participio comunica algo impulsado o empujado hacia delante con prisa. "Apresurada" conserva ese matiz de conflicto llevado demasiado rápido, con un registro idiomático en español.
- source_word: ἐκκαίει
  english_pob_choice: kindles
  chosen_spanish: enciende
  alternatives_spanish:
  - prende
  - aviva
  - inflama
  lexicon: LSJ
  rationale: El verbo significa encender o prender fuego. "Enciende" mantiene la metáfora de manera clara y directa en español.
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: LSJ
  rationale: '"Fuego" es la equivalencia literal y natural, y preserva la imagen de destrucción creciente.'
- source_word: μάχη
  english_pob_choice: fight
  chosen_spanish: lucha
  alternatives_spanish:
  - pelea
  - combate
  - batalla
  lexicon: LSJ
  rationale: En este dicho sapiencial, μάχη alude a un conflicto violento. "Lucha" funciona bien en español y evita sonar demasiado militar donde el contexto es relacional.
- source_word: κατασπεύδουσα
  english_pob_choice: hastened
  chosen_spanish: apresurada
  alternatives_spanish:
  - precipitada
  - apurada
  - acelerada
  lexicon: LSJ
  rationale: Como en la primera cláusula, el participio expresa una acción impulsada con prisa. Se mantiene la correspondencia verbal al traducirlo igualmente como "apresurada".
- source_word: ἐκχέει αἷμα
  english_pob_choice: pours out blood
  chosen_spanish: derrama sangre
  alternatives_spanish:
  - vierte sangre
  - saca sangre
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente "derrama/vierte sangre", en español "derrama sangre" conserva la imagen y es una expresión natural; refleja la fuerza destructiva del original sin suavizarla.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó el segundo participio de 'hasty' a 'hastened' para reflejar con más precisión la fuerza verbal de κατασπεύδουσα. La redacción española mantiene esa correspondencia con 'apresurada' en ambas cláusulas.
  spanish_consistency_notes:
  - Se conservó un paralelismo claro entre las dos cláusulas para reflejar la repetición de los participios griegos.
  - Se evitó 'SEÑOR' u այլ terminología no pertinente porque el verso no contiene lenguaje divino.
  - '"Derrama sangre" mantiene la imagen corporal y violenta del griego sin convertirla en eufemismo.'
