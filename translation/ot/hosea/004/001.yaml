id: HOS.4.1
reference: Hosea 4:1
source:
  edition: WLC
  text: שִׁמְע֥וּ דְבַר יְהוָ֖ה בְּנֵ֣י יִשְׂרָאֵ֑ל כִּ֣י רִ֤יב לַֽ/יהוָה֙ עִם יוֹשְׁבֵ֣י הָ/אָ֔רֶץ כִּ֠י אֵין אֱמֶ֧ת וְֽ/אֵין חֶ֛סֶד וְ/אֵֽין דַּ֥עַת אֱלֹהִ֖ים בָּ/אָֽרֶץ־־־־־׃
translation:
  text: Hear the word of Yahweh[a], sons of Israel, for Yahweh has a case against the inhabitants of the land, because there is no truth, no faithfulness[d][c][b], and no knowledge of God in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Israel.' The Hebrew is literally 'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD has a lawsuit against' or 'the LORD has a controversy with.'
    reason: lexical_alternative
  - marker: c
    text: Or 'steadfast love,' 'loyalty,' or 'mercy' for 'covenant faithfulness.'
    reason: lexical_alternative
  - marker: d
    text: '''Land'' may refer specifically to the land of Israel; some translate ''earth.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons and biblical resonance without unnecessary expansion.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the formal linkage to prophetic speech; YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: sons of Israel
  alternatives:
  - children of Israel
  - people of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine plural construct is preferred by the stated philosophy. 'Sons of Israel' is formally precise and preserves the covenantal-national designation.
- source_word: רִיב
  chosen: has a case
  alternatives:
  - has a controversy
  - has a lawsuit
  - has a charge
  lexicon: HALOT
  rationale: רִיב here carries covenant-lawsuit/juridical force. 'Has a case' communicates the legal sense in clear modern English better than the archaic 'controversy,' while avoiding overtechnical wording in the main text.
- source_word: עִם יוֹשְׁבֵי הָאָרֶץ
  chosen: against the inhabitants of the land
  alternatives:
  - with the inhabitants of the land
  - against those who dwell in the land
  lexicon: HALOT
  rationale: Although עִם is literally 'with,' in legal dispute contexts English idiom naturally uses 'against.' 'Inhabitants of the land' is a smooth rendering of the participial phrase.
- source_word: הָאָרֶץ / בָּאָרֶץ
  chosen: the land / in the land
  alternatives:
  - the earth / in the earth
  - the country / in the country
  lexicon: HALOT
  rationale: In Hosea's covenantal setting, 'land' most naturally refers to the land of Israel rather than the whole earth. Consistent rendering preserves the local, covenantal focus.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: '''Truth'' is the most direct rendering and fits the triad of absent covenant virtues. The semantic overlap with ''faithfulness'' is acknowledged, but ''truth'' best distinguishes it from חֶסֶד in this verse.'
- source_word: חֶסֶד
  chosen: covenant faithfulness
  alternatives:
  - steadfast love
  - loyalty
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד is broader than mere 'mercy' and in Hosea often carries covenant-loyal overtones. 'Covenant faithfulness' makes that relational-ethical dimension explicit without flattening it to emotion alone.
- source_word: דַּעַת אֱלֹהִים
  chosen: knowledge of God
  alternatives:
  - knowledge of gods
  - acknowledgment of God
  lexicon: HALOT
  rationale: Construct phrase naturally means relational and moral knowledge of God, not mere information. 'God' is singular in sense here despite the plural form אֱלֹהִים.
