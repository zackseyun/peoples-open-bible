    issue: בָּנִים se vertió como 'los hijos'
    rationale: El expediente inglés decidió 'children' y añadió nota porque el hebreo formalmente dice 'sons' pero aquí probablemente significa 'children' en sentido amplio. 'Los hijos' en español puede leerse como literal o más masculino, y no preserva tan bien la decisión semántica auditada.
  - severity: medium
    issue: Falta una nota que refleje la alternativa lexical documentada para בָּנִים
    rationale: La única nota b está anclada en 'fruto del vientre', pero el POB inglés ubica la nota b en 'children' para explicar el hebreo 'sons'. Esa información debe conservarse en español.
  - severity: low
