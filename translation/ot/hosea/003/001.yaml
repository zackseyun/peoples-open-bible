id: HOS.3.1
reference: Hosea 3:1
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י ע֚וֹד לֵ֣ךְ אֱֽהַב אִשָּׁ֔ה אֲהֻ֥בַת רֵ֖עַ וּ/מְנָאָ֑פֶת כְּ/אַהֲבַ֤ת יְהוָה֙ אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/הֵ֗ם פֹּנִים֙ אֶל אֱלֹהִ֣ים אֲחֵרִ֔ים וְ/אֹהֲבֵ֖י אֲשִׁישֵׁ֥י עֲנָבִֽים־־־׃
translation:
  text: And Yahweh said to me again[a], “Go, love a woman loved by another and committing adultery, just as Yahweh loves the children of Israel[b], though they turn to other gods and love raisin cakes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wife loved by another and committing adultery.' The Hebrew אִשָּׁה can mean 'woman' or 'wife,' and רֵעַ can mean 'companion,' 'associate,' or in context possibly 'husband.'
    reason: lexical_alternative
  - marker: b
    text: '''Raisin cakes'' likely refers to pressed cakes of raisins, possibly associated with celebratory or idolatrous practices.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the doctrinal default for the divine name, preserving the traditional small-caps covenantal rendering rather than transliteration.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - once more
  lexicon: HALOT
  rationale: 'In this narrative command context, עוֹד most naturally modifies the speech-act/command sequence as a renewed instruction: ''again''.'
- source_word: לֵךְ אֱהַב
  chosen: Go, love
  alternatives:
  - Go, show love to
  - Go again, love
  lexicon: HALOT
  rationale: Keeps the two imperatives distinct and direct. 'Love' preserves the lexical link with the comparison clause about the LORD's love.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean either 'woman' or 'wife.' Here 'woman' is retained in the main text because the phrase is indefinite and the syntax does not explicitly mark possession, while the marital nuance is preserved by context and footnote.
- source_word: אֲהֻבַת רֵעַ
  chosen: loved by another man
  alternatives:
  - loved by a companion
  - loved by her husband
  - having a lover
  lexicon: HALOT
  rationale: The passive participial construction means 'loved by a companion/associate.' 'Another man' communicates the relational contrast clearly in English without over-specifying 'husband,' which the Hebrew does not explicitly state.
- source_word: וּמְנָאָפֶת
  chosen: and committing adultery
  alternatives:
  - and an adulteress
  - yet adulterous
  lexicon: HALOT
  rationale: The participle describes ongoing adulterous conduct. Rendering it verbally in English reads naturally while preserving the active sense.
- source_word: כְּאַהֲבַת יְהוָה אֶת בְּנֵי יִשְׂרָאֵל
  chosen: just as the LORD loves the children of Israel
  alternatives:
  - according to the LORD's love for the children of Israel
  - as the LORD loves the people of Israel
  lexicon: HALOT
  rationale: Expresses the comparison plainly and preserves the lexical repetition of אהב ('love'). 'Children of Israel' is kept rather than smoothing to 'people of Israel' for closer correspondence.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: A more formal rendering that preserves the covenantal-national expression of the Hebrew.
- source_word: וְהֵם פֹּנִים אֶל אֱלֹהִים אֲחֵרִים
  chosen: though they turn to other gods
  alternatives:
  - while they are turning to other gods
  - and they turn to other gods
  lexicon: HALOT
  rationale: The participle conveys characteristic action. 'Though' brings out the concessive force implied by the contrast with the LORD's love.
- source_word: אֲשִׁישֵׁי עֲנָבִים
  chosen: raisin cakes
  alternatives:
  - cakes of raisins
  - grape cakes
  lexicon: HALOT
  rationale: This is the standard sense of the expression in context, likely associated with festive or cultic consumption. 'Raisin cakes' is idiomatic modern English.
- source_word: וְאֹהֲבֵי אֲשִׁישֵׁי עֲנָבִים
  chosen: and love raisin cakes
  alternatives:
  - and are lovers of raisin cakes
  lexicon: HALOT
  rationale: Uses a natural English verbal construction while preserving the participial idea and the repeated love vocabulary.
