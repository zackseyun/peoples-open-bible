id: PHM.1.4
reference: Philemon 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐχαριστῶ τῷ θεῷ μου πάντοτε μνείαν σου ποιούμενος ἐπὶ τῶν προσευχῶν μου,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/004.yaml
  text: I always thank my God[a], making mention of you in my prayers,
  footnotes:
  - marker: a
    text: Or 'remembering you in my prayers.' The Greek more literally says 'making mention of you.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 나의 기도 중에 그대를 언급하며[a] 늘 나의 하나님께 감사드립니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그대를 기억하며」. 헬라어는 좀 더 직역하면 「그대의 언급을 만들면서」, 곧 기도 중에 빌레몬의 이름을 입에 올리는 행위를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  english_pob_choice: I thank
  chosen_korean: 감사드립니다
  alternatives_korean:
  - 감사합니다
  lexicon: BDAG
  rationale: 현재 능동 직설법 1인칭 단수. 합쇼체 격식과 하나님을 대상으로 한 경어 어감을 함께 살리기 위해 「감사드립니다」를 택한다.
- source_word: τῷ θεῷ μου
  english_pob_choice: my God
  chosen_korean: 나의 하나님께
  alternatives_korean:
  - 내 하나님께
  lexicon: BDAG
  rationale: 여격을 「께」로 표시하여 대상 경의를 살린다. 「나의」는 바울의 개인적 친밀함을 보존한다.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_korean: 늘
  alternatives_korean:
  - 항상
  - 언제나
  lexicon: BDAG
  rationale: 감사 정식의 시간 부사로 「늘」이 합쇼체 산문에서 간결하면서도 자연스럽다.
- source_word: μνείαν σου ποιούμενος
  english_pob_choice: making mention of you
  chosen_korean: 그대를 언급하며
  alternatives_korean:
  - 그대를 기억하며
  - 그대를 언급할 때마다
  lexicon: BDAG
  rationale: μνείαν ποιέω는 「언급하다」의 정형 표현이며, 본문이 명시적으로 기도와 하나님 앞의 회상 문맥이므로 단순히 「기억하며」보다 「언급하며」가 행위의 구체성을 보존한다. 빌레몬은 본 서신의 주 수신자이며 단수 σου이므로 합쇼체에서 「그대」로 옮긴다.
- source_word: ἐπὶ τῶν προσευχῶν μου
  english_pob_choice: in my prayers
  chosen_korean: 나의 기도 중에
  alternatives_korean:
  - 나의 기도 가운데
  - 나의 기도 시간에
  lexicon: BDAG
  rationale: ἐπί + 속격은 관용적으로 「~중에/~동안」을 나타낸다. 「기도 중에」가 한국어로 가장 자연스럽다.
