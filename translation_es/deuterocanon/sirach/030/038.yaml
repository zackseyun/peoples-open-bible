translation:
  language: es
  text: Ponlo a trabajar, según convenga para él; y si no obedece, haz pesados sus grillos. Pero no seas excesivo con carne alguna[a], y no hagas nada sin juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «con ningún ser humano» / «hacia ninguna persona». Literalmente: «con toda carne»; aquí «carne» es una manera semítica de referirse a los seres humanos en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἔργα κατάστησον
  english_pob_choice: Put him to work
  chosen_spanish: Ponlo a trabajar
  alternatives_spanish:
  - Asígnalo a tareas
  - Destínalo al trabajo
  lexicon: LSJ
  rationale: La expresión griega tiene sentido causativo e imperativo; «ponlo a trabajar» conserva la fuerza directa y el contexto laboral sin volverlo rígido o técnico en español.
- source_word: καθὼς πρέπει αὐτῷ
  english_pob_choice: as is fitting for him
  chosen_spanish: según convenga para él
  alternatives_spanish:
  - como le conviene
  - como es apropiado para él
  lexicon: LSJ
  rationale: πρέπει comunica lo que es debido o adecuado. «Según convenga para él» conserva la idea de adecuación/propriedad con español natural.
- source_word: κἂν μὴ πειθαρχῇ
  english_pob_choice: if he does not obey
  chosen_spanish: si no obedece
  alternatives_spanish:
  - si no es obediente
  - si rehúsa obedecer
  lexicon: LSJ
  rationale: πειθαρχέω implica obediencia a una autoridad o regla; el audit trail inglés revisó y simplificó la frase. En español, «si no obedece» refleja bien el verbo sin añadir «disciplina» que no está explícita en el griego final auditado.
- source_word: βάρυνον τὰς πέδας αὐτοῦ
  english_pob_choice: make his fetters heavy
  chosen_spanish: haz pesadas sus cadenas
  alternatives_spanish:
  - haz más pesados sus grillos
  - carga sus cadenas
  lexicon: LSJ
  rationale: πέδαι son cadenas/fetters para los pies. «Cadenas» es comprensible y digno en español; «haz pesadas» sigue de cerca el imperativo βάρυνον sin introducir una acción no especificada.
- source_word: μὴ περισσεύσῃς
  english_pob_choice: do not be excessive
  chosen_spanish: no seas excesivo
  alternatives_spanish:
  - no te excedas
  - no vayas demasiado lejos
  lexicon: LSJ
  rationale: La prohibición apunta al exceso. «No seas excesivo» reproduce la advertencia moral de manera fluida y cercana al inglés POB.
- source_word: ἐν πάσῃ σαρκί
  english_pob_choice: with any flesh
  chosen_spanish: con ningún ser humano
  alternatives_spanish:
  - con toda carne
  - con cualquier carne
  - con cualquier persona
  lexicon: LSJ
  rationale: σάρξ aquí es un semitismo para seres humanos en general. El inglés POB conservó «flesh» y añadió nota; en español, «ser humano» comunica el sentido idiomático sin perder la nota explicativa sobre el trasfondo literal de «carne».
- source_word: ἄνευ κρίσεως
  english_pob_choice: without judgment
  chosen_spanish: sin juicio
  alternatives_spanish:
  - sin discernimiento
  - sin decisión
  lexicon: LSJ
  rationale: κρίσις puede ser juicio, decisión o discernimiento. «Sin juicio» es la forma más directa y breve; en español bíblico suena natural y mantiene la cautela sapiencial.
- source_word: μὴ ποιήσῃς μηδέν
  english_pob_choice: do nothing
  chosen_spanish: no hagas nada
  alternatives_spanish:
  - no hagas absolutamente nada
  - no realices nada
  lexicon: LSJ
  rationale: La doble negación intensifica la prohibición. «No hagas nada» es idiomático y conserva la fuerza del mandato.
theological_decisions:
- issue: σάρξ como metáfora de humanidad general
  english_pob_reading: with any flesh
  chosen_spanish_reading: con ningún ser humano
  alternative_spanish_readings:
  - con toda carne
  - con cualquier persona
  rationale: El texto sapiencial advierte contra el exceso en el trato con personas. Mantener «ser humano» hace inteligible la metáfora semítica para lectores actuales; la nota puede preservar la literalidad de «carne» como trasfondo del griego.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, σάρξ'
translation_notes:
  revision_awareness: 'Seguí el estado revisado del texto inglés: la frase final usa «if he does not obey» sin añadir «discipline». Por eso el español no introduce ningún equivalente de «disciplina» y traduce de manera directa la obediencia. También respeté la decisión auditada sobre σάρξ, trasladando el sentido idiomático a «ser humano» en el cuerpo principal y preservando la literalidad en nota.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece.
  - Mantuve un registro sobrio y bíblico, evitando calcos innecesarios.
  - Opté por «cadenas» como equivalente natural de πέδαι, sin forzar «grillos» o «esposas» que sonarían más estrechos o modernos de más.
