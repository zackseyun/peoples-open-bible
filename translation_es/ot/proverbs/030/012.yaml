translation:
  language: es
  text: Hay una generación pura[a] en sus propios ojos, y sin embargo no ha sido lavada de su inmundicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpia».
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea puede significar «inmundicia», «estiércol» o «excremento»; la imagen es deliberadamente vívida.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - gente
  - clase
  - linaje
  lexicon: HALOT
  rationale: דּוֹר designa una generación o un grupo humano caracterizado por cierto rasgo. «Generación» conserva el valor lexical y el patrón proverbial, y funciona bien en español bíblico actual.
- source_word: טָהוֹר
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - pura en sentido ritual
  lexicon: HALOT
  rationale: El hebreo puede ser ritual o moralmente limpio. Aquí la imagen contrasta con estar sin lavar de la inmundicia; «pura» mantiene la autopercepción sin reducirla a una limpieza meramente física.
- source_word: בְּעֵינָיו
  english_pob_choice: in its own eyes
  chosen_spanish: en sus propios ojos
  alternatives_spanish:
  - a sus propios ojos
  - en su propia opinión
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para la autoevaluación. Dado que דּוֹר es colectivo, «sus propios ojos» conserva la referencia corporativa y el sentido reflexivo.
- source_word: וּמִצֹּאָתוֹ
  english_pob_choice: from its filth
  chosen_spanish: de su inmundicia
  alternatives_spanish:
  - de su suciedad
  - de su excremento
  - de su estiércol
  lexicon: HALOT
  rationale: צֹאָה puede significar suciedad, estiércol o excremento. «Inmundicia» comunica la imagen fuerte y también su resonancia moral, sin volver la frase demasiado técnica o grosera para lectura pública.
- source_word: לֹא רֻחָץ
  english_pob_choice: is not washed
  chosen_spanish: no ha sido lavada
  alternatives_spanish:
  - no está lavada
  - no es lavada
  lexicon: HALOT
  rationale: El pasivo hebreo de רחץ presenta el estado resultante de no haber sido lavada. «No ha sido lavada» preserva ese matiz sin especificar agente.
theological_decisions:
- issue: Alcance de la pureza y la inmundicia
  english_pob_reading: The verse exposes self-perceived purity contrasted with actual uncleanness, without narrowing the image to ritual or moral impurity only.
  chosen_spanish_reading: El versículo expone una pureza solo aparente frente a una inmundicia real, sin limitar la imagen a una impureza exclusivamente ritual o exclusivamente moral.
  alternative_spanish_readings:
  - pureza ritual
  - pureza moral
  rationale: El hebreo permite ambas resonancias y el contexto proverbial sugiere una crítica de la autojustificación. La traducción conserva la tensión en lugar de resolverla a favor de una sola esfera.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: The English POB audit trail shows high agreement and no applied revisions; this Spanish draft follows the same interpretive decisions and preserves the proverb’s rhetorical contrast.
  spanish_consistency_notes:
  - Se mantiene «generación» para דּוֹר, en línea con la serie proverbial del contexto.
  - Se evita «SEÑOR» y no hay referencia al nombre divino en este versículo.
  - «Inmundicia» transmite la crudeza de צֹאָה con naturalidad en español bíblico contemporáneo.
