translation:
  language: es
  text: 'Y a los dos hombres que habían espiado la tierra, Josué dijo: «Entren en la casa de la prostituta y saquen de allí a la mujer y todo lo que le pertenece, tal como le juraron».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וְלִשְׁנַיִם הָאֲנָשִׁים
  english_pob_choice: And to the two men
  chosen_spanish: Y a los dos hombres
  alternatives_spanish:
  - Luego, a los dos hombres
  - Ahora, a los dos hombres
  lexicon: HALOT
  rationale: El hebreo introduce un destinatario indirecto con וְ + לְ; en español, «Y a los dos hombres» conserva la conexión narrativa y la dirección del habla sin añadir matices que el texto no exige.
- source_word: הַמְרַגְּלִים אֶת הָאָרֶץ
  english_pob_choice: who had spied out the land
  chosen_spanish: que habían espiado[a] la tierra
  alternatives_spanish:
  - que habían explorado la tierra
  - los que estaban espiando la tierra
  lexicon: HALOT
  rationale: רגל en este contexto es reconocimiento militar; «espiar» transmite bien la acción de reconocimiento. El perfecto compuesto español refleja que la misión ya había ocurrido antes del momento del diálogo.
- source_word: אָמַר יְהוֹשֻׁעַ
  english_pob_choice: Joshua said
  chosen_spanish: Josué dijo
  alternatives_spanish:
  - Josué habló
  - Josué les dijo
  lexicon: HALOT
  rationale: אָמַר es el verbo narrativo estándar para introducir discurso directo; «dijo» es la equivalencia más directa y natural en español.
- source_word: בֹּאוּ
  english_pob_choice: Go into
  chosen_spanish: Entren en
  alternatives_spanish:
  - Vayan a
  - Entran a
  lexicon: HALOT
  rationale: En español, el imperativo plural de movimiento hacia el interior se expresa mejor con «Entren en». Mantiene la dirección ordenada por Josué sin forzar un calco de «venir/ir».
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el hogar de
  - la casa
  lexicon: HALOT
  rationale: El referente inmediato es la vivienda de Rahab, no primariamente su unidad familiar. «Casa de» conserva la relación posesiva del hebreo de forma natural.
- source_word: הָאִשָּׁה הַזּוֹנָה
  english_pob_choice: the prostitute
  chosen_spanish: la prostituta
  alternatives_spanish:
  - la ramera
  - la mujer prostituta
  lexicon: HALOT
  rationale: זונה designa de manera directa a una prostituta; en español moderno «prostituta» es claro y no arcaizante. Aunque el hebreo repite «la mujer, la prostituta», el español no necesita esa duplicación para ser fiel y legible.
- source_word: וְהוֹצִיאוּ מִשָּׁם
  english_pob_choice: and bring out from there
  chosen_spanish: y saquen de allí
  alternatives_spanish:
  - y la saquen de allí
  - y la traigan de allí
  lexicon: HALOT
  rationale: El hifil de יצא expresa hacer salir; «saquen de allí» reproduce la fuerza causal y mantiene la referencia espacial de מִשָּׁם.
- source_word: אֶת הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - la mujer
  - a ella
  lexicon: HALOT
  rationale: El hebreo repite «la mujer» en vez de usar solo pronombre. En español, el artículo con acusativo personal implícito («a la mujer») conserva la referencia explícita sin sonar forzado.
- source_word: וְאֶת כָּל אֲשֶׁר לָהּ
  english_pob_choice: and all that belongs to her
  chosen_spanish: y todo lo que le pertenece
  alternatives_spanish:
  - y todo lo que es suyo
  - y todo lo que ella tiene
  lexicon: HALOT
  rationale: La frase abarca pertenencias y todo lo que está bajo su protección. «Le pertenece» es amplio y natural, y preserva la posesión total implícita en el hebreo.
- source_word: כַּאֲשֶׁר נִשְׁבַּעְתֶּם לָהּ
  english_pob_choice: just as you swore to her
  chosen_spanish: tal como se lo juraron
  alternatives_spanish:
  - tal como le juraron
  - como le habían jurado
  lexicon: HALOT
  rationale: El hebreo apela al juramento hecho a ella. «Se lo juraron» reproduce la relación indirecta en español y mantiene el valor solemne del compromiso.
theological_decisions:
- issue: Tratamiento de זוֹנָה respecto de Rahab
  english_pob_reading: prostitute
  chosen_spanish_reading: prostituta
  alternative_spanish_readings:
  - ramera
  - mujer prostituta
  rationale: La evidencia léxica favorece un término directo sin eufemismo. Se evita «ramera» por arcaizante y se conserva la referencia moral/social que el hebreo sí expresa, sin agregar juicios extra al texto.
  doctrine_reference: Principios de primacía del texto original y claridad léxica
- issue: Conservación de la repetición hebrea «la mujer»
  english_pob_reading: the woman
  chosen_spanish_reading: a la mujer
  alternative_spanish_readings:
  - la mujer
  - ella
  rationale: El hebreo repite el sustantivo para énfasis y claridad. En español, mantener una referencia nominal explícita conserva ese efecto sin producir torpeza sintáctica.
  doctrine_reference: Principios de equivalencia óptima y respeto de la forma semítica cuando es comunicativamente útil
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa, que eliminó la redundancia innecesaria tras «prostitute» pero conservó el sentido completo. Aquí se reflejó esa misma decisión en español: se mantiene la referencia a «la prostituta» sin duplicar «mujer» en ese primer sintagma, y se conserva el énfasis hebreo en «la mujer» dentro de la acción de sacarla. No se detectan otros cambios relevantes en el pasaje.'
  spanish_consistency_notes:
  - Se usó «Josué» para el nombre propio conforme al estándar bíblico español.
  - Se prefirió «prostituta» por claridad moderna y fidelidad léxica.
  - Se mantuvo un registro formal pero natural, adecuado para lectura eclesial.
  - La puntuación con comillas angulares y la coma vocativa siguen normas del español.
  - El marcador [a] se ancla en «espiado» para ofrecer una alternativa léxica documentada.
