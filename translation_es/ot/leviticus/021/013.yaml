revisions:
- from: Y él tomará una esposa[a] en su virginidad.
  to: Y él tomará mujer[a] por esposa, en su virginidad.
  rationale: Se mantiene el modismo legal de לקח ('tomará') y el valor matrimonial de אִשָּׁה, pero se ajusta la frase a un español más natural y claramente matrimonial. 'Mujer por esposa' conserva la textura formal del hebreo mejor que 'una esposa', mientras que la nota sigue preservando la alternativa documentada para בִּבְתוּלֶיהָ. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
