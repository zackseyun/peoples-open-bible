translation:
  language: es
  text: Y les di una tierra en la cual no habían trabajado,[a] y ciudades que no habían edificado, y ustedes habitan en ellas. Ustedes comen de los viñedos y de los olivos[b] que no plantaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "en la cual / sobre la cual no habían trabajado"; se conserva el sentido de labor agrícola o esfuerzo previo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "olivos / árboles de olivo"; se eligió "olivos" para mantener la referencia directa al cultivo productivo en paralelo con "viñedos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  english_pob_choice: And I gave
  chosen_spanish: Y yo les di
  alternatives_spanish:
  - Y di
  - Y yo he dado
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada de Yahvé; el perfecto simple en español comunica con naturalidad la acción ya realizada. Se añade 'yo' para conservar el énfasis del sujeto divino implícito en el hebreo.
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - una tierra
  - la tierra
  - un país
  lexicon: HALOT
  rationale: '''Tierra'' es el equivalente más natural y fiel en español para este contexto de don territorial; ''país'' sonaría menos bíblico y ''la tierra'' perdería la indefinición del hebreo.'
- source_word: אֲשֶׁר לֹא יָגַעְתָּ בָּהּ
  english_pob_choice: on which you had not labored
  chosen_spanish: en la cual no habían trabajado
  alternatives_spanish:
  - en la cual no habían laborado
  - en la cual no habían trabajado en ella
  lexicon: HALOT
  rationale: יָגַע denota trabajar con esfuerzo; 'trabajado' es natural en español y conserva la idea de labor previa. Se usa plural histórico/corporativo ('habían') por el destinatario colectivo Israel, manteniendo el sentido sin forzar el singular morfológico.
- source_word: וְעָרִים
  english_pob_choice: and cities
  chosen_spanish: y ciudades
  alternatives_spanish:
  - y poblaciones
  - y pueblos
  lexicon: HALOT
  rationale: '''Ciudades'' corresponde directamente a עיר y preserva su valor lexical normal; ''poblaciones'' o ''pueblos'' rebajarían o desplazarían ese sentido.'
- source_word: אֲשֶׁר לֹא בְנִיתֶם
  english_pob_choice: that you had not built
  chosen_spanish: que no habían edificado
  alternatives_spanish:
  - que no habían construido
  - que no habían levantado
  lexicon: HALOT
  rationale: '''Edificado'' mantiene un registro digno y bíblico para בנה, sin perder claridad. El pasado perfecto ayuda a mostrar la anterioridad respecto al acto de habitar.'
- source_word: וַתֵּשְׁבוּ בָּהֶם
  english_pob_choice: and you dwell in them
  chosen_spanish: y ustedes habitan en ellas
  alternatives_spanish:
  - y ustedes moran en ellas
  - y ustedes viven en ellas
  - y ustedes se establecieron en ellas
  lexicon: HALOT
  rationale: ישב en este contexto expresa residencia/ocupación estable; 'habitan' conserva el valor de permanencia con un registro formal. Se prefiere el femenino plural 'ellas' por concordar con 'ciudades'.
- source_word: כְּרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - parras
  lexicon: HALOT
  rationale: Aunque כרם puede referir a viñedos, 'viñas' resulta natural en español bíblico y en el paralelismo con cultivos alimentarios; evita una expresión demasiado técnica.
- source_word: וְזֵיתִים
  english_pob_choice: olive trees
  chosen_spanish: olivos
  alternatives_spanish:
  - olivos
  - aceitunas
  - olivares
  lexicon: HALOT
  rationale: El hebreo puede referirse a árboles de olivo o al producto asociado; en español 'olivos' es la forma más directa y transparente, y mantiene el paralelismo con 'viñas'. Se evita 'olivares' porque introduce una imagen de plantación más interpretativa.
- source_word: אֲשֶׁר לֹא נְטַעְתֶּם
  english_pob_choice: that you did not plant
  chosen_spanish: que no plantaron
  alternatives_spanish:
  - que no habían plantado
  - que ustedes no plantaron
  lexicon: HALOT
  rationale: נטע significa plantar; el pretérito simple español es suficiente porque el contexto ya establece la relación temporal con la posesión recibida. Se omite el pronombre explícito por ser innecesario en español.
- source_word: אַתֶּם אֹכְלִים
  english_pob_choice: You eat from
  chosen_spanish: Ustedes comen de
  alternatives_spanish:
  - Ustedes están comiendo de
  - Ustedes comen
  lexicon: HALOT
  rationale: El participio con pronombre expresa acción presente/en desarrollo y énfasis; en español, el presente simple comunica bien el estado actual resultante. 'De' se añade por ser idiomático con el origen de frutos y productos.
theological_decisions:
- issue: Referencia corporativa de segunda persona con mezcla morfológica singular/plural en el hebreo
  english_pob_reading: Render all second-person forms as English 'you' addressed to Israel corporately
  chosen_spanish_reading: Mantener el destinatario corporativo como 'ustedes'
  alternative_spanish_readings:
  - Conservar un singular literal en algunas formas
  - Alternar singular y plural según la morfología
  rationale: El discurso de Josué se dirige a Israel como pueblo del pacto. En español, 'ustedes' preserva la referencia corporativa con naturalidad y evita una oscilación artificial entre singular y plural que oscurecería la lectura.
  doctrine_reference: Principios de consistencia de traducción y claridad del destinatario corporativo en el pacto
- issue: 'Sentido de la última cláusula: presencia de producto cultivado versus árboles como recurso'
  english_pob_reading: olive trees / olive groves as cultivated agricultural resources
  chosen_spanish_reading: olivos
  alternative_spanish_readings:
  - olivares
  - aceitunas
  rationale: La forma hebrea admite la referencia a árboles de olivo como plantación productiva. 'Olivos' es fiel y sobrio en español; evita ampliar innecesariamente a 'olivares' o reducirlo a 'aceitunas'.
  doctrine_reference: Fidelidad lexical y preservación de la imagen agraria del texto
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail en cuanto a registro formal, presente simple para el resultado actual y correspondencia más directa con la referencia a olivos/árboles de olivo. Se adapta al español con 'habitan' y 'comen' para mantener un tono digno y natural, y se explicita el sujeto divino y el destinatario corporativo donde el hebreo lo permite.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el sujeto implícito de la acción divina, coherente con la política del proyecto.
  - Se mantiene el tratamiento corporativo en segunda persona plural ('ustedes') por la dirección al pueblo en conjunto.
  - 'Se conserva un registro formal pero claro: ''tierra'', ''edificadas'', ''habitan'', ''olivos''.'
  - Las notas al pie marcan alternativas léxicas reales del hebreo sin sobreexplicar el versículo.
