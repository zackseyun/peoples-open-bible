  language: en
  yaml_path: translation/ot/exodus/030/016.yaml
  text: You shall take the atonement money from the sons of Israel and give it for the service of the tent of meeting[a], and it shall be for the sons of Israel as a memorial before Yahweh[b], to make atonement for your lives.
