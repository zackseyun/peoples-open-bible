review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue la estructura del hebreo y conserva bien la lista de utensilios y la repetición enfática de ''oro, oro / plata, plata''. Sin embargo, varias elecciones léxicas se apartan innecesariamente de las decisiones documentadas del POB inglés: הַמַּחְתּוֹת se llevó a ''incensarios'' en vez del más concreto ''braseros'', הַמִּזְרָקוֹת a ''tazas'' en vez de un equivalente de ''basins'', y הַכַּפּוֹת a ''cuencos'', reordenando distinciones que el inglés buscó preservar entre términos vecinos. También falta en español la nota sobre la repetición hebrea y la alternativa para רַב טַבָּחִים si se quiere reflejar el aparato auditado.'
  spanish_quality_summary: 'El español es legible y digno, pero algunos términos suenan menos naturales o menos adecuados al inventario cultual: ''pucheros'' tiene sabor doméstico y coloquial; ''candelabros'' puede evocar velas más que lámparas de aceite; ''vasijas'' es demasiado general para הַסִּפִּים. Una revisión menor puede mejorar precisión y mantener claridad eclesial amplia.'
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Las cuestiones son principalmente léxicas: conviene acercar el español a las distinciones del POB entre ''bowls / basins / cups / vessels for pouring'' y mantener una formulación más cercana al hebreo en ''todo lo que era oro, oro...'' en vez de suavizar con ''de''.'
  issues:
  - severity: medium
    issue: הַסִּפִּים como 'las vasijas'
    rationale: Es demasiado genérico frente al inglés auditado 'the bowls' con alternativa 'cups'. 'Cuencos' o 'tazones' preserva mejor el tipo de recipiente y la distinción dentro de la lista.
  - severity: medium
    issue: הַמַּחְתּוֹת como 'los incensarios'
    rationale: El POB eligió 'firepans' por concreción y dejó 'censers' como alternativa. En español, 'braseros' refleja mejor esa decisión; 'incensarios' es más interpretativo.
  - severity: high
    issue: הַמִּזְרָקוֹת como 'las tazas' y הַכַּפּוֹת como 'los cuencos'
    rationale: Invierte y borra distinciones que el expediente inglés quiso mantener entre 'basins' y 'cups'. Conviene usar 'las fuentes' o 'los tazones' para מִזְרָקוֹת y reservar 'las copas' o 'las tazas' para כַּפּוֹת.
  - severity: low
    issue: הַסִּירוֹת como 'los pucheros'
    rationale: Aunque posible, suena coloquial/doméstico en español general. 'Las ollas' es más neutro y claro.
  - severity: low
    issue: הַמְּנֹרוֹת como 'los candelabros'
    rationale: No es imposible, pero 'los soportes de las lámparas' sería pesado; 'los candelabros' puede aceptarse. No requiere cambio forzoso si se prioriza legibilidad.
  - severity: medium
    issue: Faltan notas equivalentes del POB sobre la repetición 'oro, oro / plata, plata' y la alternativa del título oficial
    rationale: La revisión española debería preservar las alternativas significativas del aparato inglés cuando siguen siendo pertinentes en español.
