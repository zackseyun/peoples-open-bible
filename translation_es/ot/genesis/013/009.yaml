translation:
  language: es
  text: ¿No está toda la región delante de ti? Sepárate, por favor, de mí. Si a la izquierda[a], yo iré a la derecha; y si a la derecha, yo iré a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es elíptico en las cláusulas condicionales: literalmente, «si la izquierda» / «si la derecha». El español añade la preposición direccional para hacer explícita la relación espacial sin ampliar el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No está... ?
  alternatives_spanish:
  - ¿Acaso no está... ?
  - ¿No es que... ?
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento. En español, la forma negativa interrogativa conserva el tono de invitación a confirmar sin sonar arcaica.
- source_word: כָל הָאָרֶץ
  english_pob_choice: the whole land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la región
  - todo el país
  lexicon: HALOT
  rationale: Aquí אָרֶץ se refiere al territorio disponible para la separación, no al planeta. 'Tierra' mantiene el alcance amplio del hebreo y es natural en español bíblico.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - a tu vista
  lexicon: HALOT
  rationale: La imagen espacial indica disponibilidad y cercanía. 'Delante de ti' conserva el giro sin forzar un calco poco natural.
- source_word: הִפָּרֶד נָא מֵעָלַי
  english_pob_choice: Please separate yourself from me
  chosen_spanish: sepárate de mí
  alternatives_spanish:
  - aléjate de mí
  - sepárate, por favor, de mí
  lexicon: HALOT
  rationale: El nifal reflexivo pide una separación entre personas. En español, el imperativo pronominal expresa bien la acción reflexiva; 'por favor' comunica נָא sin redundancia excesiva junto a la fórmula imperativa.
- source_word: אִם הַשְּׂמֹאל
  english_pob_choice: If to the left
  chosen_spanish: Si a la izquierda
  alternatives_spanish:
  - Si tomas la izquierda
  - Si hacia la izquierda
  lexicon: HALOT
  rationale: El hebreo es elíptico y no repite un verbo. El español puede sostener la misma concisión con una frase direccional breve, sin añadir explícitamente 'ir' donde el hebreo lo omite.
- source_word: וְאֵימִנָה
  english_pob_choice: then I will go to the right
  chosen_spanish: yo iré a la derecha
  alternatives_spanish:
  - entonces iré a la derecha
  - me iré a la derecha
  lexicon: HALOT
  rationale: La forma direccional implica movimiento hacia la derecha. Se explicita 'iré' para completar la elipsis en español, manteniendo el paralelismo del ofrecimiento.
- source_word: וְאִם הַיָּמִין
  english_pob_choice: and if to the right
  chosen_spanish: y si a la derecha
  alternatives_spanish:
  - y si tomas la derecha
  - y si hacia la derecha
  lexicon: HALOT
  rationale: Como en la primera cláusula, el hebreo es breve y elíptico. La preposición 'a' reproduce la orientación espacial sin sobreinterpretar la frase.
- source_word: וְאַשְׂמְאִילָה
  english_pob_choice: then I will go to the left
  chosen_spanish: yo iré a la izquierda
  alternatives_spanish:
  - entonces iré a la izquierda
  - me iré a la izquierda
  lexicon: HALOT
  rationale: La forma direccional opuesta se expresa con el mismo verbo implícito del paralelo anterior. 'Iré a la izquierda' conserva la simetría y la claridad en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y la revisión inglesa más reciente, especialmente en las cláusulas condicionales concisas («if to the left / if to the right») y en el matiz reflexivo de «sepárate de mí». Se evita añadir una verbalización innecesaria en la primera condición, pero se completa la elipsis con 'iré' en las respuestas para que el paralelo resulte natural en español.
  spanish_consistency_notes:
  - Se usa «tierra» para אָרֶץ en sentido territorial, no cosmológico.
  - Se mantiene la elipsis hebrea con una nota breve, en vez de expandir innecesariamente el texto principal.
  - Se conserva un registro bíblico claro y moderno, evitando fórmulas arcaizantes como «apartarte» o «mudarte».
  - La simetría de izquierda/derecha se refleja con estructuras paralelas y el mismo verbo de movimiento implícito/expreso.
