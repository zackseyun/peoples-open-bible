translation:
  language: es
  text: 'Entonces los siervos de Saúl hablaron estas palabras de modo que David las oyera[a], y David dijo: «¿Les parece cosa pequeña[b] llegar a ser yerno del rey, siendo yo un hombre pobre y poco estimado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en presencia de David». El hebreo es literalmente «en los oídos de David», es decir, de manera que él pudiera oírlas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Consideran insignificante emparentar por matrimonio con el rey?». El hebreo usa una pregunta retórica con el matiz de pequeñez o insignificancia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - hablaron
  lexicon: HALOT
  rationale: En un contexto narrativo con sujeto plural, el hebreo indica una acción de comunicación oral. «Hablaron» conserva ese acto sin añadir matices de formalidad que no están en el texto.
- source_word: בְּאָזְנֵי דָוִד
  english_pob_choice: in David’s hearing
  chosen_spanish: al oído de David
  alternatives_spanish:
  - en la audición de David
  - ante David
  lexicon: HALOT
  rationale: La imagen hebrea es literal («en los oídos de David»), pero en español «al oído de» comunica de forma natural que le hablaron de manera que David lo oyera, manteniendo el valor idiomático.
- source_word: אֶת־הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: «Palabras» reproduce bien el sustantivo en este contexto de discurso directo y conserva la concreción del hebreo.
- source_word: הַנְקַלָּה
  english_pob_choice: Does it seem to you a small thing
  chosen_spanish: ¿Les parece cosa pequeña
  alternatives_spanish:
  - ¿Les parece algo insignificante?
  - ¿Es poca cosa para ustedes?
  lexicon: HALOT
  rationale: El hebreo usa una pregunta retórica con el campo semántico de קלל/קלה. En español, «cosa pequeña» preserva la valoración de pequeñez/insignificancia sin endurecer el matiz más allá de lo que el texto exige.
- source_word: בְעֵינֵיכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a sus ojos
  - para ustedes
  lexicon: HALOT
  rationale: La idiomática hebrea de valoración personal se vuelve natural en español con «les parece», que expresa la evaluación desde el punto de vista de los oyentes.
- source_word: הִתְחַתֵּן בַּמֶּלֶךְ
  english_pob_choice: to become the king’s son-in-law
  chosen_spanish: llegar a ser yerno del rey
  alternatives_spanish:
  - casarse con la familia del rey
  - emparentarse por matrimonio con el rey
  lexicon: HALOT
  rationale: El hitpael de חתן en este contexto apunta a entrar en relación de afinidad con el rey. «Llegar a ser yerno del rey» es preciso, transparente y evita suavizar la referencia concreta al vínculo matrimonial.
- source_word: וְאָנֹכִי
  english_pob_choice: since I am
  chosen_spanish: siendo yo
  alternatives_spanish:
  - y yo soy
  - puesto que yo soy
  lexicon: HALOT
  rationale: La conjunción introduce el fundamento de la pregunta de David. «Siendo yo» expresa con naturalidad la causa o circunstancia aducida por David.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: Aquí David habla de sí mismo en masculino singular; «un hombre» conserva ese rasgo y funciona de modo natural en español.
- source_word: רָשׁ
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - empobrecido
  lexicon: HALOT
  rationale: «Pobre» es la equivalencia más directa y sobria para la condición social/económica que David se atribuye.
- source_word: וְנִקְלֶה
  english_pob_choice: lightly esteemed
  chosen_spanish: de poca estima
  alternatives_spanish:
  - tenido en poco
  - despreciado
  lexicon: HALOT
  rationale: La expresión hebrea señala ser considerado livianamente o con poca importancia. «De poca estima» mantiene la idea de valoración social baja sin sobredimensionarla hacia «despreciado».
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó de «when I am» a «since I am» para un sentido causal más natural, y de «lightly regarded» a «lightly esteemed» por registro. En español se reflejó esa misma preferencia causal con «siendo yo» y se optó por «de poca estima», que conserva la idea de baja consideración con un tono digno y formal.
  spanish_consistency_notes:
  - Se mantuvo «Saúl» y «David» según la nomenclatura bíblica estándar del proyecto.
  - Se usó «yerno del rey» para preservar el vínculo matrimonial explícito del hebreo, en vez de una formulación más amplia que diluya el punto de David.
  - No se introdujo «Cristo» ni lenguaje teológico ajeno al versículo.
  - La pregunta retórica se dejó en forma interrogativa para conservar el tono y la presión argumentativa del hebreo.
