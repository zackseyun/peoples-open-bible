translation:
  language: es
  text: 'Entonces él dijo[a]: «En este tiempo señalado, el año próximo, tendrás en tus brazos a un hijo». Pero ella dijo: «No, mi señor, hombre de Dios; no engañes a tu sierva».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «como en este tiempo de vida»; es decir, a esta misma época el año próximo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמּוֹעֵד הַזֶּה
  english_pob_choice: at this appointed time
  chosen_spanish: para este tiempo señalado
  alternatives_spanish:
  - para este tiempo appointed
  - en este tiempo fijado
  - para esta sazón
  lexicon: HALOT
  rationale: מועֵד comunica una cita o tiempo fijado; «tiempo señalado» conserva la idea de un momento designado sin sonar técnico o eclesiástico. «Para» reproduce bien la orientación temporal futura del hebreo y del audit trail en inglés.
- source_word: כָּעֵת חַיָּה
  english_pob_choice: next year
  chosen_spanish: el año próximo
  alternatives_spanish:
  - para esta misma época del año próximo
  - aproximadamente por esta época
  - al tiempo de vida
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático que en contexto apunta al mismo momento del año siguiente. «El año próximo» expresa con naturalidad el sentido principal; el matiz más literal queda recogido en la nota.
- source_word: אתי
  english_pob_choice: you
  chosen_spanish: estarás
  alternatives_spanish:
  - tú estarás
  - estarás tú
  lexicon: HALOT
  rationale: El pronombre enfático no es necesario en español para transmitir la predicción. La segunda persona futura ya queda clara por la forma verbal.
- source_word: חֹבֶקֶת
  english_pob_choice: embracing
  chosen_spanish: abrazando
  alternatives_spanish:
  - estrechando
  - teniendo en brazos
  - abrazando a
  lexicon: HALOT
  rationale: El participio denota abrazar o estrechar entre los brazos. «Abrazando» es natural en español y conserva la imagen corporal de tener al hijo cercano.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un varón
  - un niño
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijo», en español «un hijo» suena más fluido que «un hijo varón» y mantiene el valor sexual específico sin perder claridad.
- source_word: אַל
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No, por favor
  - nada de eso
  lexicon: HALOT
  rationale: Aquí אַל introduce una negativa afectiva, no una prohibición. «No» comunica bien la reacción de rechazo o incredulidad de la mujer.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor mío
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: Como trato respetuoso hacia Eliseo, «mi señor» preserva la deferencia sin cargar con resonancias divinas. «Mi amo» sería demasiado duro en el registro español contemporáneo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: man of God
  chosen_spanish: hombre de Dios
  alternatives_spanish:
  - varón de Dios
  - siervo de Dios
  lexicon: HALOT
  rationale: «Hombre de Dios» es la equivalencia estable y transparente del título profético hebreo. Se conserva el carácter honorífico y profético del apelativo.
- source_word: תְּכַזֵּב
  english_pob_choice: do not deceive
  chosen_spanish: no engañes
  alternatives_spanish:
  - no mientas
  - no resultes falso
  - no me decepciones
  lexicon: HALOT
  rationale: El verbo puede significar mentir, engañar o resultar falso. En esta súplica, el sentido emocional es que no haga falsa una esperanza; «no engañes» reproduce esa fuerza en español.
- source_word: בְּשִׁפְחָתֶךָ
  english_pob_choice: your servant
  chosen_spanish: a tu sierva
  alternatives_spanish:
  - a tu criada
  - a tu esclava
  - a tu servidora
  lexicon: HALOT
  rationale: La forma hebrea es femenina y expresa humildad. «Sierva» mantiene el matiz de servicio personal y el respeto deferente; «criada» sería menos solemne y «esclava» más áspera para este contexto de cortesía.
theological_decisions:
- issue: Título de respeto humano frente a lenguaje divino en אֲדֹנִי
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - señor mío
  rationale: El interlocutor es Eliseo, no Dios; por eso se preserva un tratamiento honorífico humano. «Mi señor» conserva la distancia reverente sin introducir lenguaje devocional impropio.
  doctrine_reference: Translation philosophy §6 (registro moderno legible) y §5 (consistencia terminológica con excepciones documentadas)
- issue: Valor de אַל en la respuesta de la mujer
  english_pob_reading: 'No'
  chosen_spanish_reading: 'No'
  alternative_spanish_readings:
  - No, por favor
  - nada de eso
  rationale: Aquí la partícula no funciona como mandato, sino como negativa espontánea. Traducirla como «No» evita domesticar la emoción del hebreo y conserva la tensión de incredulidad/súplica.
  doctrine_reference: Nota lexical y principio de no suavizar una tensión expresiva documentada
- issue: Sentido idiomático de כָּעֵת חַיָּה
  english_pob_reading: next year
  chosen_spanish_reading: el año próximo
  alternative_spanish_readings:
  - para esta misma época del año próximo
  - aproximadamente por esta época
  rationale: La expresión hebrea tiene un valor idiomático en contextos de anuncio de nacimiento. En español, la lectura natural es «el año próximo», mientras la nota preserva el matiz más literal y auditable.
  doctrine_reference: Adhesión al sentido contextual sin borrar la alternativa literal preservada por la POB inglesa
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la versión auditada en inglés. La única decisión visible de estilo fue mantener una equivalencia óptima en español para la idiomática כָּעֵת חַיָּה, conservando la lectura contextual «el año próximo» y documentando la alternativa más literal en nota. No se detectan cambios de fondo respecto del expediente inglés reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - Se mantuvo «hombre de Dios» como título profético fijo, en coherencia con la audit trail inglesa.
  - Se eligió «sierva» para reflejar el femenino de בְּשִׁפְחָתֶךָ y la humildad del discurso directo.
  - Se evitó «esclava» porque el tono de cortesía en español contemporáneo queda mejor con «sierva», aunque se preserva la fuerza de dependencia personal del hebreo.
  - La nota al pie conserva la tensión entre la traducción idiomática y la literal del hebreo sin duplicar el marcador en otros lugares.
