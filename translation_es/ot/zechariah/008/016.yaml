    text: Or 'speak the truth, each one to his neighbor.' The Hebrew has 'each man,' using a representative singular.
    reason: lexical_alternative
  - marker: b
    text: '''In your gates'' refers to the city gates, the customary place where legal cases were heard and judgments were rendered.'
    reason: cultural_note
  - marker: c
    text: Or 'judge true and peaceable judgment in your gates.'
    reason: alternative_reading
