review_pass:
  verdict: revise
  source_alignment_summary: El borrador español preserva bien el sentido general del hebreo y sigue de cerca las decisiones del POB en cuanto a la ciudad desolada, el símil de viuda, la grandeza anterior entre las naciones/provincias y la nota léxica sobre מַס. Sin embargo, «se sienta» para יָשְׁבָה resulta poco natural y en español puede sonar volitivo o impropio en este contexto poético; una forma más fiel al valor descriptivo vívido del hebreo es «está sentada» o «se encuentra sentada».
  spanish_quality_summary: La redacción es clara y digna, pero «¡Cómo se sienta sola…!» suena antinatural en español bíblico contemporáneo. El resto del verso fluye bien y mantiene el tono poético. «Ha quedado sometida a trabajos forzados» es idiomático y claro, aunque «ha llegado a estar sometida» o «ha quedado sujeta» también serían posibles.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen nombres divinos ni términos cristológicos. «Naciones», «princesa», «provincias» y «trabajos forzados» están bien alineados con el análisis léxico documentado.
  issues:
  - severity: medium
    issue: «se sienta» para יָשְׁבָה
    rationale: Aunque intenta reflejar el presente vívido del hebreo, en español «se sienta» normalmente expresa acción ingresiva/volitiva ('toma asiento') y no estado descriptivo. Esto debilita la imagen de desolación estable que comunica el verso.
  - severity: low
    issue: Anclaje de nota al pie en «sola»
    rationale: La nota trata de מַס / «trabajos forzados», no de «sola». El marcador debe colocarse donde corresponde para mantener la disciplina editorial y evitar confusión del lector.
