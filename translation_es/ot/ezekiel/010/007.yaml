translation:
  language: es
  text: Entonces el querubín extendió su mano de entre los querubines hacia el fuego que estaba entre los querubines[a], y lo alzó y lo puso en las palmas del que estaba vestido de lino[b], quien lo tomó y salió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «de entre los querubines» ... «el fuego que estaba entre los querubines».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en las palmas del que estaba vestido de lino»; en el contexto se trata de la misma figura llamada antes «el hombre vestido de lino» (Ez 10:2, 10:6).
    reason: cross_reference
lexical_decisions:
- source_word: הַכְּרוּב
  english_pob_choice: the cherub
  chosen_spanish: el querubín
  alternatives_spanish:
  - el querub
  - el ser alado
  lexicon: HALOT
  rationale: El hebreo usa singular con artículo y presenta a un solo querubín actuando. «Querubín» conserva el ser celestial específico sin generalizarlo.
- source_word: וַיִּשְׁלַח
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - estiró
  - alargó
  lexicon: HALOT
  rationale: Con «su mano», el verbo describe la acción de sacar la mano hacia adelante. «Extendió» es natural en español y mantiene la imagen física sin forzar el calco.
- source_word: מִבֵּינוֹת לַכְּרוּבִים
  english_pob_choice: from among the cherubim
  chosen_spanish: desde entre los querubines
  alternatives_spanish:
  - de entre los querubines
  - de en medio de los querubines
  lexicon: HALOT
  rationale: La expresión señala procedencia espacial dentro del conjunto de los querubines. «Desde entre» conserva ese matiz de salida desde su medio y suena idiomático en español.
- source_word: הָאֵשׁ אֲשֶׁר בֵּינוֹת הַכְּרֻבִים
  english_pob_choice: the fire that was among the cherubim
  chosen_spanish: el fuego que estaba entre los querubines
  alternatives_spanish:
  - el fuego que estaba de entre los querubines
  - el fuego que estaba en medio de los querubines
  lexicon: HALOT
  rationale: Se mantiene el fuego definido y la localización repetida. «Entre» reproduce bien la referencia espacial plural del hebreo y es claro en español.
- source_word: וַיִּשָּׂא
  english_pob_choice: he lifted it up
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo levantó
  - lo alzó
  lexicon: HALOT
  rationale: El verbo puede implicar levantar o alzar, pero en esta secuencia la acción inmediata culmina en la transferencia del fuego. «Lo tomó» evita introducir un detalle físico innecesario y se coordina con el siguiente verbo.
- source_word: וַיִּתֵּן
  english_pob_choice: put it into
  chosen_spanish: lo puso en
  alternatives_spanish:
  - lo colocó en
  - lo metió en
  lexicon: HALOT
  rationale: El hebreo expresa una acción concreta de depositar el objeto en las manos. «Lo puso en» reproduce con claridad el movimiento sin añadir énfasis interpretativo.
- source_word: חָפְנֵי
  english_pob_choice: the palms
  chosen_spanish: las palmas
  alternatives_spanish:
  - las manos ahuecadas
  - las manos
  lexicon: HALOT
  rationale: El sustantivo alude a las cavidades o palmas de las manos. «Las palmas» conserva la concreción anatómica mejor que «las manos».
- source_word: לְבֻשׁ הַבַּדִּים
  english_pob_choice: the one clothed in linen
  chosen_spanish: el que estaba vestido de lino
  alternatives_spanish:
  - el hombre vestido de lino
  - el vestido de lino
  lexicon: HALOT
  rationale: El hebreo de este versículo no repite «hombre», aunque el personaje ya fue identificado así en el contexto inmediato. Por eso la forma principal evita añadir un sustantivo no presente aquí, pero mantiene plena claridad.
- source_word: וַיִּקַּח וַיֵּצֵא
  english_pob_choice: who took it and went out
  chosen_spanish: y él lo tomó y salió
  alternatives_spanish:
  - y tomó y salió
  - y se fue
  lexicon: HALOT
  rationale: Se conserva la secuencia final de acciones en español directo. El pronombre explícito ayuda a seguir el referente de la escena y mantiene el movimiento narrativo.
theological_decisions:
- issue: Identidad del recipiente del fuego
  english_pob_reading: the one clothed in linen
  chosen_spanish_reading: el que estaba vestido de lino
  alternative_spanish_readings:
  - el hombre vestido de lino
  - el vestido de lino
  rationale: El texto hebreo de este versículo nombra solo a «el vestido de lino». La redacción principal sigue esa forma mínima; la identificación tradicional del personaje como «el hombre vestido de lino» queda preservada solo como alternativa contextual, sin sobretraducir el versículo.
  doctrine_reference: Trasparencia textual y contexto inmediato (Ez 10:2, 10:6)
- issue: Fuerza espacial de «entre / de entre»
  english_pob_reading: from among the cherubim / among the cherubim
  chosen_spanish_reading: desde entre los querubines / entre los querubines
  alternative_spanish_readings:
  - de entre los querubines / en medio de los querubines
  - entre los querubines / entre los querubines
  rationale: El hebreo repite una localización interna y no conviene aplanarla. La traducción principal mantiene la tensión espacial sin convertirla en una paráfrasis general.
  doctrine_reference: Precisión semántica del texto fuente
- issue: Objeto implícito en la secuencia verbal
  english_pob_reading: he lifted it up and put it into
  chosen_spanish_reading: lo tomó y lo puso en
  alternative_spanish_readings:
  - lo levantó y lo puso en
  - lo alzó y lo puso en
  rationale: El hebreo no explicita en esta cláusula un objeto diferente del fuego tomado. «Lo» preserva la referencia implícita sin añadir «brasas» o «carbones» que el versículo no dice.
  doctrine_reference: Fidelidad al grado de explicitud del original
translation_notes:
  revision_awareness: Se siguió la revisión que eliminó cualquier añadido no explícito como «some» en inglés; por eso el español usa solo «lo» sin precisar cantidad adicional. También se mantuvo la acción final como una secuencia breve y directa, sin introducir elementos ausentes en el hebreo.
  spanish_consistency_notes:
  - Se usa «querubín/querubines» de forma consistente para הַכְּרוּב.
  - Se evita «SEÑOR» u otras sustituciones no aplicables; este versículo no contiene el nombre divino.
  - Se mantiene «lino» sin expandir a «vestiduras de lino», porque el hebreo dice «vestido de lino».
  - Se conserva el paralelismo espacial «entre los querubines» para ambas ocurrencias del hebreo.
  - La puntuación respeta el flujo narrativo con una sola oración larga, acorde con el hebreo encadenado por waw consecutivas.
