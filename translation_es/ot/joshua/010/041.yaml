translation:
  language: es
  text: Y Josué los derrotó[a] desde Cades-barnea hasta Gaza, y toda la tierra de Gosén, hasta Gabaón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los golpeó». El verbo hebreo puede señalar un golpe militar o una derrota, sin precisar siempre el modo exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  english_pob_choice: struck them
  chosen_spanish: los hirió
  alternatives_spanish:
  - los golpeó
  - los derrotó
  - los hirió de muerte
  lexicon: HALOT
  rationale: El verbo נכה admite en este contexto un golpe militar o una derrota. «Los hirió» conserva la acción concreta sin añadir necesariamente el resultado final, y evita un calco menos natural en español.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  english_pob_choice: from Kadesh-barnea
  chosen_spanish: desde Cades-barnea
  alternatives_spanish:
  - desde Cades Barnea
  - de Cades-barnea
  lexicon: HALOT
  rationale: La preposición hebrea marca el punto de partida del alcance territorial. «Desde» reproduce mejor ese valor espacial en español que un simple «de».
- source_word: וְעַד עַזָּה
  english_pob_choice: as far as Gaza
  chosen_spanish: hasta Gaza
  alternatives_spanish:
  - así como Gaza
  - a Gaza
  lexicon: HALOT
  rationale: עַד expresa extensión o límite; en español «hasta» comunica con naturalidad el alcance geográfico de la campaña.
- source_word: וְאֵת כָּל אֶרֶץ גֹּשֶׁן
  english_pob_choice: and all the land of Goshen
  chosen_spanish: y toda la tierra de Gosén
  alternatives_spanish:
  - e incluso toda la tierra de Gosén
  - y todo el territorio de Gosén
  lexicon: HALOT
  rationale: Se conserva la coordinación simple del hebreo y el sustantivo הארץ con «tierra», un equivalente tradicional y claro para el territorio nombrado.
- source_word: וְעַד גִּבְעוֹן
  english_pob_choice: as far as Gibeon
  chosen_spanish: hasta Gabaón
  alternatives_spanish:
  - hasta Gibeón
  - a Gabaón
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico en forma habitual en español, con la misma preposición de alcance que en la primera cláusula.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español junto al verbo correspondiente. No se hicieron cambios textuales adicionales del contenido fuente.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reflejar el enlace narrativo del hebreo, pero con sintaxis española fluida.
  - 'Se mantuvo la serie geográfica en orden y con preposiciones de extensión consistentes: «desde… hasta…, y… hasta…».'
  - «Cades-barnea», «Gosén» y «Gabaón» se presentan con grafía española usual y sin alterar la referencia toponímica.
