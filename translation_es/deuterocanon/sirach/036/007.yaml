translation:
  language: es
  text: ¿Por qué un día supera a otro[a], si toda la luz de cada día del año proviene del sol?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué un día es superior a otro, si toda la luz de cada día del año proviene del sol?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué se debe que
  - ¿Por qué razón
  lexicon: LSJ
  rationale: La pregunta griega introduce una búsqueda de causa o fundamento; «¿Por qué» es natural en español y conserva ese valor interrogativo sin añadir explicación implícita.
- source_word: ἡμέρα ἡμέρας ὑπερέχει
  english_pob_choice: does one day surpass another
  chosen_spanish: un día supera a otro
  alternatives_spanish:
  - un día es superior a otro
  - un día sobresale de otro
  lexicon: LSJ
  rationale: El genitivo comparativo expresa contraste entre días; «supera a otro» mantiene la fuerza comparativa de ὑπερέχει en español contemporáneo sin cargar el enunciado con una evaluación moral o cultual.
- source_word: πᾶν φῶς ἡμέρας
  english_pob_choice: every daylight
  chosen_spanish: toda la luz del día
  alternatives_spanish:
  - toda la luz de cada día
  - la luz de cada día
  lexicon: LSJ
  rationale: El griego habla de la luz perteneciente a cada día. En español, «la luz del día» expresa de forma natural esa referencia, y «toda» conserva el matiz distributivo que el inglés POB quiso mantener con «every».
- source_word: ἐνιαυτοῦ
  english_pob_choice: of the year
  chosen_spanish: del año
  alternatives_spanish:
  - a lo largo del año
  - en el año
  lexicon: LSJ
  rationale: La expresión delimita el conjunto de días en cuestión; «del año» es la forma más directa y fiel para el alcance temporal.
- source_word: ἀφ᾽ ἡλίου
  english_pob_choice: comes from the sun
  chosen_spanish: proviene del sol
  alternatives_spanish:
  - viene del sol
  - deriva del sol
  lexicon: LSJ
  rationale: La preposición de origen pide una relación de procedencia. «Proviene» preserva esa fuente causal en español con registro digno y claro.
theological_decisions:
- issue: Comparación entre días y su evaluación
  english_pob_reading: surpass another
  chosen_spanish_reading: un día supera a otro
  alternative_spanish_readings:
  - un día es superior a otro
  - un día sobresale de otro
  rationale: El verso formula una pregunta sapiencial sobre por qué hay distinción entre días si comparten la misma fuente solar. Se evita intensificar la comparación hacia una valoración doctrinal o litúrgica que el griego no explicita.
  doctrine_reference: Preservar la tensión sapiencial sin resolverla más allá del texto.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la base griega y el audit trail inglés; no se detectaron revisiones que alteren el sentido. La decisión principal fue cómo representar en español el comparativo ὑπερέχει y la frase distributiva πᾶν φῶς ἡμέρας, manteniendo la ambigüedad sapiencial sin sobre-interpretación.
  spanish_consistency_notes:
  - Se usa «Dios» y no aplica aquí la terminología de YHWH, Mesías o Cristo.
  - Se preserva el comparativo con «supera» para mantener la tensión del texto.
  - «Luz del día» funciona como equivalente natural de φῶς ἡμέρας sin perder la referencia al resplandor diurno.
