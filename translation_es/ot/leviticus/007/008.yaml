translation:
  language: es
  text: Y el sacerdote que presenta la ofrenda quemada de un hombre tendrá para sí la piel[a] de la ofrenda quemada que presentó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cuero».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la ofrenda quemada de un hombre»; se conserva el singular masculino en vez de generalizarlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote cultual
  lexicon: HALOT
  rationale: כֹּהֵן en legislación sacrificial se refiere al sacerdote; en español, «sacerdote» es la equivalencia natural y fiel. Mantiene el artículo definido del hebreo.
- source_word: הַמַּקְרִיב / הִקְרִיב
  english_pob_choice: presents / has presented
  chosen_spanish: presenta / haya presentado
  alternatives_spanish:
  - ofrece / haya ofrecido
  - trae cerca / haya traído cerca
  lexicon: HALOT
  rationale: El hifil de קרב tiene aquí sentido cultual de presentar u ofrecer. «Presenta» conserva el matiz ritual sin sonar forzado; el perfecto relativo se refleja con «haya presentado» para indicar la acción ya realizada.
- source_word: עֹלַת אִישׁ
  english_pob_choice: a man's burnt offering
  chosen_spanish: la ofrenda quemada de un hombre
  alternatives_spanish:
  - la ofrenda quemada de una persona
  - la ofrenda quemada de alguien
  lexicon: HALOT
  rationale: עֹלָה suele rendirse en español bíblico como «ofrenda quemada», que comunica el carácter sacrificial de manera clara. Se conserva אִישׁ como «de un hombre» para respetar el singular masculino documentado por la POB inglesa, sin neutralizarlo.
- source_word: עֹור
  english_pob_choice: the skin
  chosen_spanish: la piel
  alternatives_spanish:
  - el cuero
  - el pellejo
  lexicon: HALOT
  rationale: עֹור designa la piel/hide del animal. «Piel» es natural en español contemporáneo; «cuero» o «pellejo» sonarían más especializados o menos dignos en este contexto.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: la ofrenda quemada
  alternatives_spanish:
  - el holocausto
  - la ofrenda ascendente
  lexicon: HALOT
  rationale: Se mantiene la misma traducción de עֹלָה que al inicio del versículo para consistencia. «Ofrenda quemada» es más transparente y evita el posible desvío semántico de «holocausto» en español moderno.
- source_word: אֲשֶׁר הִקְרִיב
  english_pob_choice: that he has presented
  chosen_spanish: que haya presentado
  alternatives_spanish:
  - que presentó
  - que ofreció
  lexicon: HALOT
  rationale: La relativa identifica la ofrenda específica ya presentada por el sacerdote. El subjuntivo perfecto español expresa adecuadamente la anterioridad relativa sin perder naturalidad.
- source_word: לַכֹּהֵן לוֹ יִהְיֶה
  english_pob_choice: shall have it for himself
  chosen_spanish: tendrá para sí
  alternatives_spanish:
  - será del sacerdote
  - le pertenecerá
  lexicon: HALOT
  rationale: La hebrea dice literalmente «será para el sacerdote, para él». En español, «tendrá para sí» comunica la posesión asignada al sacerdote oficiante y conserva el énfasis reflexivo de לוֹ.
theological_decisions:
- issue: Preservación del masculino singular en אִישׁ
  english_pob_reading: a man's burnt offering
  chosen_spanish_reading: la ofrenda quemada de un hombre
  alternative_spanish_readings:
  - la ofrenda quemada de alguien
  - la ofrenda quemada de una persona
  rationale: La POB inglesa conserva el masculino singular del hebreo en vez de generalizarlo. La versión española sigue esa decisión para no borrar una restricción morfológica y para mantener la transparencia del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Terminología de עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: ofrenda quemada
  alternative_spanish_readings:
  - holocausto
  - ofrenda ascendente
  rationale: Aunque «holocausto» es una opción tradicional, en español actual puede sugerir asociaciones ajenas al contexto bíblico. «Ofrenda quemada» comunica con claridad el sentido ritual y preserva la categoría sacrificial de la ley levítica.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: La redacción sigue el orden y la estructura de la revisión inglesa más reciente, evitando una interrupción innecesaria y manteniendo en una sola cláusula la asignación de la piel al sacerdote. Se decidió usar «ofrenda quemada» de manera uniforme para עֹלָה, y «tendrá para sí» para reflejar el hebreo idiomático ל֥וֹ יִהְיֶה de forma natural en español.
  spanish_consistency_notes:
  - Se usa «ofrenda quemada» para עֹלָה en todo el versículo por consistencia terminológica.
  - Se conserva «hombre» para אִישׁ, de acuerdo con la decisión auditada de preservar el singular masculino.
  - «Sacerdote» se emplea para כֹּהֵן, sin introducir terminología eclesiástica posterior.
  - La nota a pie de página distingue la alternativa léxica de עֹור sin alterar el cuerpo del texto.
  - La nota b documenta la decisión de no neutralizar el singular masculino del original.
