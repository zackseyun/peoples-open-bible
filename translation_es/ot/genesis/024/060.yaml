translation:
  language: es
  text: 'Y bendijeron a Rebeca y le dijeron: «Nuestra hermana, que llegues a ser miles de decenas de millar[a], y que tu descendencia posea la puerta de los que los odian[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miríadas» o «multitudes innumerables»; literalmente, «miles de decenas de millar».
    reason: lexical_alternative
  - marker: b
    text: O «herede la puerta de sus enemigos». El hebreo literalmente dice «posea la puerta de los que los odian», usando «puerta» como imagen de la fuerza y el control de una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֲכוּ
  english_pob_choice: they blessed
  chosen_spanish: la bendijeron
  alternatives_spanish:
  - la colmaron de bendición
  - le pronunciaron una bendición
  lexicon: HALOT
  rationale: El verbo piel de ברך expresa aquí la acción de bendecir a Rebeca; en español, «la bendijeron» es directo, natural y conserva la formalidad del acto sin expansión innecesaria.
- source_word: רִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebekah
  lexicon: Convención onomástica bíblica
  rationale: En español bíblico, «Rebeca» es la forma estándar y reconocible del nombre; mantiene la identificación clara sin alterar el referente hebreo.
- source_word: אֲחֹתֵנוּ
  english_pob_choice: Our sister
  chosen_spanish: Nuestra hermana
  alternatives_spanish:
  - Hermana nuestra
  - Nuestra hermana querida
  lexicon: HALOT
  rationale: La forma vocativa se entiende por el contexto. «Nuestra hermana» conserva el tono familiar y afectuoso del hebreo, con un orden natural en español.
- source_word: הֲיִי
  english_pob_choice: may you become
  chosen_spanish: que llegues a ser
  alternatives_spanish:
  - que seas
  - llegas a ser
  lexicon: HALOT
  rationale: En una fórmula de bendición, el matiz desiderativo es importante. «Que llegues a ser» expresa deseo y futuro bendecido mejor que un imperativo llano.
- source_word: לְאַלְפֵי רְבָבָה
  english_pob_choice: thousands of ten thousands
  chosen_spanish: miles de miríadas
  alternatives_spanish:
  - miles de diez millares
  - miles de miles por miríadas
  - miríadas de miles
  lexicon: HALOT
  rationale: La expresión hebrea combina términos numéricos de forma idiomática e hiperbólica. «Miles de miríadas» conserva la estructura cuantitativa y la intensidad sin reducirla a una paraphrase interpretativa.
- source_word: וְיִירַשׁ
  english_pob_choice: may ... possess
  chosen_spanish: posea
  alternatives_spanish:
  - herede
  - tome posesión de
  lexicon: HALOT
  rationale: ירש puede significar heredar o poseer. En este contexto de control victorioso de una ciudad o territorio, «posea» mantiene el sentido concreto y evita cargar el texto con una equivalencia demasiado técnica.
- source_word: זַרְעֵךְ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus hijos
  lexicon: HALOT
  rationale: «Descendencia» refleja bien el valor colectivo singular del sustantivo hebreo y es claro en español contemporáneo. «Simiente» sería más literal pero menos natural.
- source_word: שַׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - la puerta fortificada
  - la entrada
  lexicon: HALOT
  rationale: Aunque «puerta» puede sonar más general que «gate», en español transmite el acceso defendido y permite conservar la imagen concreta del poder urbano sin recurrir a una glosa extensa.
- source_word: שֹׂנְאָיו
  english_pob_choice: those who hate them
  chosen_spanish: de los que la odian
  alternatives_spanish:
  - de sus enemigos
  - de los que los odian
  lexicon: HALOT
  rationale: El participio expresa literalmente «los que odian». Mantener «los que la odian» respeta el hebreo y, en español, el singular femenino concuerda con Rebeca como referente inmediato del pronombre implícito en la bendición, sin borrar la referencia colectiva de la descendencia.
theological_decisions:
- issue: Número gramatical del pronombre final en la cláusula sobre los enemigos/odiadores
  english_pob_reading: The Hebrew literally says “possess the gate of those who hate them,” using a collective reference to the offspring.
  chosen_spanish_reading: «de los que la odian»
  alternative_spanish_readings:
  - de los que los odian
  - de sus enemigos
  rationale: El hebreo alterna entre la referencia colectiva a la descendencia y la forma verbal/participial del odiar. En español, se preserva la transparencia del texto usando el singular femenino que sigue al referente inmediato de Rebeca y manteniendo la nota para la referencia colectiva a la descendencia; así no se borra la tensión textual.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final desde un singular genérico a un plural más natural para la descendencia colectiva. En español, el texto mantiene la referencia colectiva mediante «tu descendencia», pero conserva la forma literal del participio en el complemento («de los que la odian») para no aplanar la imagen hebrea ni perder la cohesión con el referente inmediato de Rebeca; la nota explica la alternativa plural y la lectura idiomática de «puerta».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a יהוה; este versículo no lo contiene.
  - Se mantiene «descendencia» para זרע como término de promesa genealógica.
  - Se evita «Cristo/Mesías» por no ser pertinente.
  - La puntuación y el uso de comillas angulares siguen la convención española.
