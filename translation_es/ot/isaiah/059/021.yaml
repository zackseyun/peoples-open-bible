  yaml_path: translation/ot/isaiah/059/021.yaml
  text: 'And as for me[a], this is my covenant with them, says Yahweh: my Spirit that is upon you, and my words that I have put in your mouth, shall not depart from your mouth, or from the mouth of your offspring, or from the mouth of your offspring’s offspring, says Yahweh[b], from now and forever.'
  footnotes:
