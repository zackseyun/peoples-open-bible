id: PHP.2.3
reference: Philippians 2:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μηδὲν κατ’ ἐριθείαν ⸂μηδὲ κατὰ⸃ κενοδοξίαν, ἀλλὰ τῇ ταπεινοφροσύνῃ ἀλλήλους ἡγούμενοι ὑπερέχοντας ἑαυτῶν,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/003.yaml
  text: 'Do nothing from selfish ambition or empty conceit, but in humility regard one another as more important than yourselves,'
translation:
  language: ko
  text: 이기적 야망에서나 헛된 자만에서[a] 무엇이든 행하지 마십시오. 도리어 겸손함으로 서로를 자기보다 더 중하게 여기십시오[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「허영」, 「공허한 영광」. 헬라어 κενοδοξία는 문자적으로 「빈 영광」이다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「자기보다 뛰어난 자로 여기십시오」.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲν
  english_pob_choice: Do nothing
  chosen_korean: 무엇이든 ~지 마십시오
  alternatives_korean:
  - 아무것도
  - 어떤 것도
  lexicon: BDAG
  rationale: 한국어 부정 명령은 동사 어미로 풀어 표현하는 것이 자연스럽다. 「무엇이든 행하지 마십시오」가 합쇼체에 가장 부합한다.
- source_word: κατ’ ἐριθείαν
  english_pob_choice: from selfish ambition
  chosen_korean: 이기적 야망에서
  alternatives_korean:
  - 당파심에서
  - 자기 추구에서
  lexicon: BDAG
  rationale: ἐριθεία는 단순한 경쟁이 아니라 당파적·이기적 야망을 가리킨다. 「이기적 야망」이 영어 POB의 의미를 가장 자연스럽게 담는다.
- source_word: κατὰ κενοδοξίαν
  english_pob_choice: or empty conceit
  chosen_korean: 헛된 자만에서
  alternatives_korean:
  - 헛된 영광에서
  - 허영에서
  - 공허한 자랑에서
  lexicon: BDAG
  rationale: κενοδοξία는 문자적으로 「빈 영광」이다. 한국어 「헛된 자만」이 자기 과시의 공허함을 자연스럽게 전달한다.
- source_word: τῇ ταπεινοφροσύνῃ
  english_pob_choice: in humility
  chosen_korean: 겸손함으로
  alternatives_korean:
  - 겸손으로
  - 겸비함으로
  lexicon: BDAG
  rationale: 양태/수단의 여격을 「~함으로」로 옮겨 자연스럽게 표현한다.
- source_word: ἡγούμενοι
  english_pob_choice: regard
  chosen_korean: 여기다
  alternatives_korean:
  - 간주하다
  - 생각하다
  lexicon: BDAG
  rationale: ἡγέομαι는 인지적·평가적 의미. 「여기다」가 관계적 어조를 살리면서 합쇼체에 적합하다.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_korean: 서로
  alternatives_korean:
  - 서로서로
  lexicon: BDAG
  rationale: 표준 상호 대명사. 「서로」가 가장 간결하고 자연스럽다.
- source_word: ὑπερέχοντας ἑαυτῶν
  english_pob_choice: as more important than yourselves
  chosen_korean: 자기보다 더 중하게
  alternatives_korean:
  - 자기보다 뛰어난 자로
  - 자기보다 낫게
  lexicon: BDAG
  rationale: ὑπερέχω는 「뛰어남」의 비교 의미. 영어 POB와 같이 존재론적 우월이 아닌 평가적 비교를 살리기 위해 「더 중하게」를 택한다.
