translation:
  language: es
  text: Oh, Yahvé, por tu favor hiciste que mi monte[a] se mantuviera firme; cuando ocultaste tu rostro, quedé consternado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estableciste fuerza para mi monte'; el hebreo es compacto y también puede entenderse como una imagen de prosperidad segura o estabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Yahvé
  - Oh Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del hebreo y la vocación directa del salmo. 'Oh' reproduce el tono vocativo de la interpelación poética, y 'Yahvé' sigue el estándar del proyecto para יְהוָה.
- source_word: בִּרְצוֹנְךָ
  english_pob_choice: by your favor
  chosen_spanish: por tu favor
  alternatives_spanish:
  - en tu favor
  - por tu buena voluntad
  lexicon: HALOT
  rationale: רָצוֹן aquí expresa favor, benevolencia o aceptación. 'Por tu favor' conserva el valor instrumental de la preposición y suena natural en español bíblico contemporáneo.
- source_word: הֶעֱמַדְתָּה
  english_pob_choice: you made ... stand
  chosen_spanish: afirmaste
  alternatives_spanish:
  - hiciste que se mantuviera
  - estableciste
  - pusiste en pie
  lexicon: HALOT
  rationale: El causativo de עמד comunica hacer que algo permanezca firme. 'Afirmaste' recoge esa fuerza de estabilidad sin perder naturalidad en español.
- source_word: לְהַרְרִי
  english_pob_choice: my mountain
  chosen_spanish: mi monte
  alternatives_spanish:
  - mi montaña
  - para mi monte
  lexicon: HALOT
  rationale: Se preserva la imagen de la 'montaña/monte' como metáfora poética de estabilidad o elevación. 'Monte' resulta un poco más natural en español poético, sin resolver la metáfora.
- source_word: עֹז
  english_pob_choice: strong
  chosen_spanish: con fuerza
  alternatives_spanish:
  - fuerte
  - en fortaleza
  - con poder
  lexicon: HALOT
  rationale: El hebreo puede funcionar predicativamente con la imagen del monte. En español, 'con fuerza' transmite la idea de firmeza/solidez sin forzar una construcción adjetival poco fluida.
- source_word: הִסְתַּרְתָּ פָנֶיךָ
  english_pob_choice: you hid your face
  chosen_spanish: ocultaste tu rostro
  alternatives_spanish:
  - escondiste tu rostro
  - apartaste tu rostro
  - ocultaste tu faz
  lexicon: HALOT
  rationale: Se mantiene el idiomático hebreo sobre el retiro del favor o presencia divina. 'Rostro' es claro en español moderno; 'faz' sería más tradicional pero menos natural.
- source_word: נִבְהָל
  english_pob_choice: dismayed
  chosen_spanish: consternado
  alternatives_spanish:
  - dismayado
  - alarmado
  - aterrorizado
  lexicon: HALOT
  rationale: Niphal de בהל expresa perturbación, sobresalto o desconcierto. 'Consternado' comunica bien ese impacto emocional sin excederlo hacia 'aterrorizado'.
theological_decisions:
- issue: Rendición del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto de traducir יְהוָה como 'Yahvé', preservando el nombre del pacto y evitando el sustitutivo litúrgico 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen de 'mi monte'
  english_pob_reading: Retain the metaphor/image 'my mountain' in the main text
  chosen_spanish_reading: Mantener la imagen de 'mi monte'
  alternative_spanish_readings:
  - mi prosperidad
  - mi fortaleza
  - mi refugio
  rationale: El hebreo es compacto y poético, y la POB inglesa retiene la metáfora. En español, 'mi monte' conserva la tensión textual y deja abierta la lectura de estabilidad o seguridad sin interpretarla de antemano.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
- issue: Sentido de 'ocultaste tu rostro'
  english_pob_reading: you hid your face
  chosen_spanish_reading: ocultaste tu rostro como idiomática retirada de favor/presencia
  alternative_spanish_readings:
  - te alejaste
  - retiraste tu presencia
  rationale: Se conserva el idiomático bíblico porque el texto salmódico usa el ocultamiento del rostro como señal de desagrado o retiro de favor; la traducción debe mantener esa carga teológica.
  doctrine_reference: Salmos 30:7-8, uso idiomático del rostro divino
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión: no hubo cambios aplicados y el control cruzado informó alta concordancia. La redacción española conserva la metáfora de ''mi monte'' y la idiomaticidad de ''ocultaste tu rostro'' según el expediente auditado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יְהוָה.
  - Se evita 'SEÑOR' como sustituto no transparente.
  - '''Monte'' preserva la metáfora fuente; no se la interpreta como ''prosperidad'' o ''fortaleza'' en el texto principal.'
  - '''Ocultaste tu rostro'' conserva el hebraísmo teológico sin suavizarlo.'
  - El registro es bíblico contemporáneo, digno y comprensible para lectores hispanohablantes de amplio alcance.
