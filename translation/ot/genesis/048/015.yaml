id: GEN.48.15
reference: Genesis 48:15
source:
  edition: WLC
  text: וַ/יְבָ֥רֶךְ אֶת יוֹסֵ֖ף וַ/יֹּאמַ֑ר הָֽ/אֱלֹהִ֡ים אֲשֶׁר֩ הִתְהַלְּכ֨וּ אֲבֹתַ֤/י לְ/פָנָי/ו֙ אַבְרָהָ֣ם וְ/יִצְחָ֔ק הָֽ/אֱלֹהִים֙ הָ/רֹעֶ֣ה אֹתִ֔/י מֵ/עוֹדִ֖/י עַד הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: And he blessed Joseph and said[a], “The God before whom my fathers Abraham and Isaac walked[b], the God who has shepherded me from my beginning to this day,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the God who has been my shepherd” or “the God who has fed me.” The Hebrew verb carries the imagery of a shepherd’s ongoing care and provision.
    reason: lexical_alternative
  - marker: b
    text: Or “all my life.” The Hebrew expression literally points to the earliest part of Jacob’s life, emphasizing God’s care from the very beginning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ אֶת יוֹסֵף
  chosen: And he blessed Joseph
  alternatives:
  - And he blessed Yosef
  lexicon: HALOT
  rationale: Retains the straightforward narrative clause. Although the blessing is spoken over Joseph's sons in context, the Hebrew explicitly says Joseph, likely because blessing the sons is mediated through/blessing Joseph's line; the translation preserves the wording rather than harmonizing to the broader context.
- source_word: הָאֱלֹהִים
  chosen: The God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The article is present and the phrase is part of a formal invocation identifying the true God by his acts toward the patriarchs. 'The God' preserves the Hebrew definiteness and solemnity better than the bare 'God'.
- source_word: אֲשֶׁר הִתְהַלְּכוּ אֲבֹתַי לְפָנָיו
  chosen: before whom my fathers ... walked
  alternatives:
  - whom my fathers followed
  - in whose presence my fathers lived
  lexicon: HALOT
  rationale: הלך in the hithpael with לפני conveys conducting one's life before God, i.e., living in faithful relationship under his gaze. 'Walked before' is a natural English rendering that preserves the covenantal idiom.
- source_word: אַבְרָהָם וְיִצְחָק
  chosen: Abraham and Isaac
  rationale: Standard English transliterations of the patriarchal names.
- source_word: הָרֹעֶה אֹתִי
  chosen: who has shepherded me
  alternatives:
  - who has been my shepherd
  - who has fed me
  - who shepherds me
  lexicon: HALOT
  rationale: רעה can denote shepherding, tending, or feeding. 'Has shepherded me' preserves the pastoral metaphor explicitly and fits the participle's durative sense as describing God's ongoing care up to the present. It also avoids flattening the image into merely 'provided for me.'
- source_word: מֵעוֹדִי
  chosen: from my beginning
  alternatives:
  - all my life
  - from my youth
  - ever since I existed
  lexicon: HALOT
  rationale: The phrase denotes the earliest stage of Jacob's life/existence. 'From my beginning' is slightly more literal than 'all my life' and preserves the sense of God's care from the outset, without overcommitting to 'youth' specifically.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew temporal expression, preserving the continuity from life's beginning to the present moment.
