translation:
  language: es
  text: Ahora, levántense y crucen el wadi Zered[a]. Entonces cruzamos el wadi Zered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el arroyo Zered» o «el valle de Zered». El hebreo נחל puede referirse a un wadi, barranco o lecho de arroyo, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Entonces
  - En este momento
  lexicon: HALOT
  rationale: Marca temporal y discursiva que introduce la acción inmediata; «Ahora» es natural en español y conserva la urgencia del hebreo sin añadir contenido.
- source_word: קֻמוּ
  english_pob_choice: rise up
  chosen_spanish: levántense
  alternatives_spanish:
  - puestos de pie
  - alzaos
  lexicon: HALOT
  rationale: Imperativo plural de קום. En español, «levántense» comunica el mandato de ponerse en movimiento con dignidad y claridad, sin caer en arcaísmo.
- source_word: וְעִבְרוּ
  english_pob_choice: cross over
  chosen_spanish: crucen
  alternatives_spanish:
  - pasen
  - crucen al otro lado
  lexicon: HALOT
  rationale: עבר en este contexto de desplazamiento geográfico significa atravesar de un lado a otro. «Crucen» conserva el sentido básico y la dirección del acto; el «over» inglés se expresa naturalmente sin repetir una preposición pesada.
- source_word: לָכֶם
  english_pob_choice: for yourselves / ethical dative absorbed
  chosen_spanish: para ustedes
  alternatives_spanish:
  - por ustedes
  - para sí
  lexicon: HALOT
  rationale: El dativo ético aporta énfasis al mandato. En español puede expresarse de modo natural como «para ustedes», aunque también puede dejarse implícito; aquí se mantiene un matiz de beneficio/participación sin volverlo rígido.
- source_word: נַחַל
  english_pob_choice: Wadi
  chosen_spanish: wadi
  alternatives_spanish:
  - arroyo
  - quebrada
  - valle
  lexicon: HALOT
  rationale: נחל puede referirse a un cauce estacional, barranco o lecho de arroyo. «Wadi» preserva la referencia geográfica precisa y la distinción lexical que el POB inglés ya documentó.
- source_word: זָרֶד
  english_pob_choice: Zered
  chosen_spanish: Zered
  alternatives_spanish:
  - Sared
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar. Se conserva la misma forma para mantener continuidad con el texto fuente y la tradición de transliteración del POB.
- source_word: וַנַּעֲבֹר
  english_pob_choice: So we crossed over
  chosen_spanish: Así cruzamos
  alternatives_spanish:
  - Y cruzamos
  - Entonces cruzamos
  lexicon: HALOT
  rationale: La forma wayyiqtol en primera persona plural narra el cumplimiento de la orden. «Así cruzamos» expresa bien la secuencia y el resultado narrativo en español.
translation_notes:
  revision_awareness: El texto inglés revisado se mantuvo sin cambios en la última pasada (high_agreement; minor-issues). La versión española sigue esa lectura y preserva la repetición del topónimo y del verbo de cruce, con la única adaptación necesaria para la sintaxis natural del español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se conserva la distinción geográfica de נחל mediante «wadi», con nota alternativa para lectores que prefieran equivalentes españoles más generales.
  - 'Se mantiene el paralelismo entre el mandato y su cumplimiento: «levántense y crucen... / Así cruzamos...».'
