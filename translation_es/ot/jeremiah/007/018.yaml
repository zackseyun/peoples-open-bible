translation:
  language: es
  text: Los hijos recogen leña, los padres avivan el fuego, y las mujeres amasan masa para hacer tortas para la Reina del Cielo[a] y para derramar libaciones a otros dioses, para provocar mi ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea מְלֶכֶת הַשָּׁמַיִם se entiende tradicionalmente como «la Reina del Cielo», probablemente un título para una diosa adorada por Judá. Algunos han propuesto «la obra del cielo», pero el contexto aquí favorece una deidad personal que recibe ofrendas.
    reason: alternative_reading
lexical_decisions:
- source_word: מְלַקְּטִים
  english_pob_choice: gather
  chosen_spanish: recogen
  alternatives_spanish:
  - reúnen
  - juntan
  lexicon: HALOT
  rationale: El participio describe la acción de juntar material; en español, 'recogen' suena natural con el objeto 'leña' y conserva el movimiento concreto del texto.
- source_word: עֵצִים
  english_pob_choice: wood
  chosen_spanish: leña
  alternatives_spanish:
  - madera
  - palos
  lexicon: HALOT
  rationale: En este contexto doméstico y ritual, 'leña' comunica mejor la madera preparada para el fuego; 'madera' es más general y 'palos' demasiado restringido.
- source_word: מְבַעֲרִים אֶת הָאֵשׁ
  english_pob_choice: kindle the fire
  chosen_spanish: avivan el fuego
  alternatives_spanish:
  - encienden el fuego
  - prenden el fuego
  lexicon: HALOT
  rationale: El verbo expresa hacer arder o avivar. 'Avivan el fuego' conserva la acción sin sonar forzado en español y corresponde bien al uso doméstico.
- source_word: לָשׁוֹת בָּצֵק
  english_pob_choice: knead dough
  chosen_spanish: amasan masa
  alternatives_spanish:
  - amasan el pan
  - mezclan masa
  lexicon: HALOT
  rationale: '''Amasan'' reproduce con precisión el verbo; ''masa'' es el equivalente más natural de ''dough'' en español y mantiene la concreción del gesto.'
- source_word: כַּוָּנִים
  english_pob_choice: cakes
  chosen_spanish: tortas
  alternatives_spanish:
  - pasteles
  - panes
  lexicon: HALOT
  rationale: '''Tortas'' es una forma clara y sobria para estas piezas preparadas con fin cultual; ''pasteles'' sería anacrónico y ''panes'' borra su forma específica.'
- source_word: מְלֶכֶת הַשָּׁמַיִם
  english_pob_choice: the Queen of Heaven
  chosen_spanish: la Reina del Cielo
  alternatives_spanish:
  - la obra del cielo
  lexicon: HALOT
  rationale: Se conserva el título personal tradicional y contextual, pues el pasaje describe ofrendas dirigidas a una deidad. 'La Reina del Cielo' preserva la polémica profética contra ese culto.
- source_word: וְהַסֵּךְ נְסָכִים
  english_pob_choice: and to pour out drink offerings
  chosen_spanish: y para derramar libaciones
  alternatives_spanish:
  - y para ofrecer libaciones
  - y para verter ofrendas líquidas
  lexicon: HALOT
  rationale: '''Libaciones'' es el equivalente culto más preciso para נְסָכִים; ''derramar'' reproduce bien el aspecto concreto del acto ritual.'
- source_word: נְסָכִים
  english_pob_choice: drink offerings
  chosen_spanish: libaciones
  alternatives_spanish:
  - ofrendas líquidas
  - ofrendas de bebida
  lexicon: HALOT
  rationale: '''Libaciones'' mantiene el sentido sacrificial específico y es un término reconocido en español bíblico, sin perder la idea de derramar líquido.'
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros ídolos
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente 'otros dioses'; 'otros dioses' conserva la formulación directa y la oposición teológica del pasaje.
- source_word: לְמַעַן הַכְעִסֵנִי
  english_pob_choice: so as to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - para irritarme
  - para hacerme enojar
  lexicon: HALOT
  rationale: La construcción expresa finalidad/resultado. 'Provocarme a ira' conserva el tono bíblico y la fuerza causal del verbo sin exagerar ni suavizarlo.
theological_decisions:
- issue: Identificación de מְלֶכֶת הַשָּׁמַיִם
  english_pob_reading: the Queen of Heaven
  chosen_spanish_reading: la Reina del Cielo
  alternative_spanish_readings:
  - la obra del cielo
  rationale: El contexto inmediato trata de ritos domésticos idolátricos ofrecidos a una entidad personal; por eso se mantiene un título de deidad en el texto principal. La alternativa se preserva como posibilidad discutida sin desplazar el sentido dominante del pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto actual coincide con el consenso alto del control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino; la referencia pronominal final se traduce de forma natural con «me».
  - Se usó «Reina del Cielo» de manera consistente con el audit trail inglés y se dejó la lectura alternativa en nota para no borrar la tensión textual.
  - Se prefirió un español bíblico claro y actual («libaciones», «provocarme a ira») sin recurrir a fórmulas arcaizantes innecesarias.
