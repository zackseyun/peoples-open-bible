translation:
  language: es
  text: Ellos pastorearán la tierra de Asiria con la espada, y la tierra de Nimrod en sus entradas[b]; y él nos librará de Asiria[a] cuando venga a nuestra tierra, y cuando pise dentro de nuestro territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el asirio» en la cláusula final; el hebreo puede personificar a Asiria como el enemigo invasor.
    reason: alternative_reading
  - marker: b
    text: O «en sus puertas»; el hebreo dice literalmente «en sus entradas/aperturas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָעוּ
  english_pob_choice: they will shepherd
  chosen_spanish: pastorearán
  alternatives_spanish:
  - gobernarán
  - apacentarán
  - pastorearán como pastores
  lexicon: HALOT
  rationale: Mantiene la imagen básica de רעה como acción de pastorear, sin borrar la fuerza de sometimiento militar que da el contexto de la espada. En español, «pastorearán» conserva el vínculo con el tema del pastor/gobernante sin volverla una paráfrasis más interpretativa.
- source_word: אֶרֶץ אַשּׁוּר
  english_pob_choice: the land of Assyria
  chosen_spanish: la tierra de Asiria
  alternatives_spanish:
  - Asiria
  - el país de Asiria
  lexicon: HALOT
  rationale: Conserva la construcción territorial explícita de אֶרֶץ y el nombre geográfico. «Tierra» reproduce mejor la estructura del hebreo que un simple nombre propio aislado.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: La preposición instrumental se expresa naturalmente con «con». «Espada» mantiene la imagen concreta del medio de conquista militar.
- source_word: אֶרֶץ נִמְרֹד
  english_pob_choice: the land of Nimrod
  chosen_spanish: la tierra de Nimrod
  alternatives_spanish:
  - la tierra de Nمرod
  - Nimrod
  lexicon: HALOT
  rationale: Conserva el nombre alusivo y la relación territorial del hebreo. No se simplifica a solo «Nimrod» para no perder el paralelismo con «la tierra de Asiria».
- source_word: בִּפְתָחֶיהָ
  english_pob_choice: at its entrances
  chosen_spanish: en sus entradas
  alternatives_spanish:
  - en sus puertas
  - en sus accesos
  lexicon: HALOT
  rationale: «Entradas» refleja de manera directa פתח como «entrada/apertura» y evita introducir «puertas», que sería más interpretativo. En español suena natural y mantiene la posible ambigüedad deliberada del hebreo.
- source_word: וְהִצִּיל
  english_pob_choice: and he will deliver us
  chosen_spanish: y él nos librará
  alternatives_spanish:
  - y nos rescatará
  - y él nos salvará
  lexicon: HALOT
  rationale: «Librará» comunica con claridad el valor de הִצִּיל en contexto de liberación de un enemigo. Se mantiene el sujeto singular «él» para respetar el cambio de sujeto del hebreo.
- source_word: מֵאַשּׁוּר
  english_pob_choice: from Assyria
  chosen_spanish: de Asiria
  alternatives_spanish:
  - del asirio
  - de la Asiria
  lexicon: HALOT
  rationale: La lectura principal sigue el sentido nacional/geográfico de Asiria en paralelo con «la tierra de Asiria». En español, «de Asiria» es la opción más limpia y directa.
- source_word: כִּי יָב֣וֹא בְאַרְצֵנוּ
  english_pob_choice: when he comes into our land
  chosen_spanish: cuando venga a nuestra tierra
  alternatives_spanish:
  - cuando entre en nuestra tierra
  - porque vendrá a nuestra tierra
  lexicon: HALOT
  rationale: «Cuando» expresa bien el valor temporal de כִּי en este contexto. «Venga» conserva el matiz de eventualidad o acción futura próxima del hebreo.
- source_word: וְכִי יִדְרֹךְ בִּגְבוּלֵנוּ
  english_pob_choice: and when he treads within our border
  chosen_spanish: y cuando pise dentro de nuestro territorio
  alternatives_spanish:
  - y cuando marche dentro de nuestro territorio
  - y cuando pise en nuestro límite
  lexicon: HALOT
  rationale: «Pise» conserva la imagen concreta de דָּרַךְ como pisar/trotar. «Territorio» hace claro el sentido de גבול en español contemporáneo, sin estrecharlo indebidamente a una sola línea fronteriza.
theological_decisions:
- issue: Cambio de sujeto de plural a singular en la frase final
  english_pob_reading: 'Retain the Hebrew shift: ''They will shepherd ... and he will deliver us'''
  chosen_spanish_reading: Ellos pastorearán ... y él nos librará
  alternative_spanish_readings:
  - Ellos nos librarán ...
  - Él pastoreará ... y él nos librará
  rationale: Se conserva la oscilación intencional del hebreo entre plural y singular, sin armonizarla. Esto respeta la tensión textual y permite que el lector perciba la transición desde los líderes/actores plurales al libertador singular.
  doctrine_reference: Translation philosophy §3
- issue: Referencia de אַשּׁוּר en la cláusula final
  english_pob_reading: Render as 'Assyria' in the main text while allowing personified 'the Assyrian' as an alternative
  chosen_spanish_reading: Asiria
  alternative_spanish_readings:
  - el asirio
  - el asirio invasor
  rationale: El versículo mezcla lenguaje territorial con lenguaje de invasión, por lo que puede leerse como la nación o como el enemigo personificado. La traducción principal conserva «Asiria»; la alternativa personificada se deja como nota para no borrar la tensión semántica.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y sin cambios sustanciales; se mantiene la solución de equivalencia óptima con la separación conservada entre el plural inicial y el singular final, y con la alternativa personificada de Asiria preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «Mesías» solo cuando el texto lo requiere; aquí no aparece.
  - Se conserva «Asiria» como nombre territorial principal, siguiendo la lectura auditada del inglés POB.
  - «Territorio» se eligió para גבול por claridad natural en español, sin eliminar la imagen de frontera.
  - La puntuación reproduce la cadencia de dos miembros paralelos unidos por punto y coma, seguida de una cláusula temporal final.
