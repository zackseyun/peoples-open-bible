  rationale: Se corrige el verbo principal para reflejar 'escuchar/hacer caso' en vez de permiso, se mejora la naturalidad y precisión contextual con 'al casarnos con mujeres extranjeras', y se reubica la nota literal al segmento que realmente explica.
