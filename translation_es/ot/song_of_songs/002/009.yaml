  yaml_path: translation/ot/song_of_songs/002/009.yaml
  text: My beloved is like a gazelle or a young stag[a]. Look—there he stands behind our wall, gazing through the windows[b], peering through the lattice.
  footnotes:
  - marker: a
    text: Or 'a fawn of the deer' for 'a young stag.' The Hebrew phrase refers to a young member of the deer family; the translation chooses the masculine-specific image to match the Hebrew wording and the beloved's portrayal.
    reason: lexical_alternative
  - marker: b
    text: '''Lattice'' refers to a screened or slatted opening in the wall or window area, not necessarily a separate modern window fixture.'
    reason: cultural_note
