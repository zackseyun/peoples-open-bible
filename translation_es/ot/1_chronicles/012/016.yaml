translation:
  language: es
  text: Estos son los hombres que cruzaron el Jordán en el primer mes, cuando se desbordaba por todas sus riberas, y pusieron en fuga a todos los que estaban en los valles[a], hacia el oriente y hacia el occidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'todos los valles'; el sentido es la gente que estaba en los valles, porque el verbo significa 'hacer huir' o 'poner en fuga'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה הֵם
  english_pob_choice: These are the men
  chosen_spanish: Estos son los hombres
  alternatives_spanish:
  - Estos son ellos
  - Estos son los que
  lexicon: BDB / HALOT
  rationale: La fórmula demostrativa con pronombre es una identificación enfática. En español, 'Estos son los hombres' mantiene esa identificación de manera natural y fiel al contexto militar; 'hombres' está implícito en el pasaje inmediato y no añade un sentido extraño.
- source_word: אֲשֶׁר עָבְרוּ אֶת הַיַּרְדֵּן
  english_pob_choice: who crossed the Jordan
  chosen_spanish: que cruzaron el Jordán
  alternatives_spanish:
  - que pasaron el Jordán
  - que atravesaron el Jordán
  lexicon: BDB / HALOT
  rationale: עָבַר aquí significa cruzar o pasar. 'Cruzar el Jordán' es idiomático en español y conserva la imagen concreta del movimiento al otro lado del río.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - durante el primer mes
  lexicon: BDB / HALOT
  rationale: Es una expresión temporal directa. 'En el primer mes' reproduce con claridad la referencia cronológica del hebreo.
- source_word: וְהוּא מְמַלֵּא עַל כָּל גְּדִיתָיו
  english_pob_choice: when it was overflowing all its banks
  chosen_spanish: cuando estaba desbordado sobre todas sus riberas
  alternatives_spanish:
  - cuando se desbordaba sobre todas sus riberas
  - mientras llenaba todas sus riberas
  lexicon: BDB / HALOT
  rationale: El hebreo describe el Jordán en estado de crecida. 'Desbordado sobre todas sus riberas' comunica el sentido de מְמַלֵּא עַל con naturalidad en español y conserva la imagen física del río en inundación.
- source_word: וַיַּבְרִיחוּ
  english_pob_choice: and they put to flight
  chosen_spanish: y pusieron en fuga
  alternatives_spanish:
  - y los hicieron huir
  - y los dispersaron
  lexicon: BDB / HALOT
  rationale: El verbo causativo implica hacer huir a otros. 'Pusieron en fuga' es un equivalente militar preciso y sobrio en español, sin añadir matices de derrota total que el hebreo no exige.
- source_word: אֶת כָּל הָעֲמָקִים
  english_pob_choice: all those in the valleys
  chosen_spanish: a todos los de los valles
  alternatives_spanish:
  - a todos los habitantes de los valles
  - a todos los valle-dwellers
  lexicon: BDB / HALOT
  rationale: El hebreo dice literalmente 'todos los valles', pero por el verbo causativo el sentido es el de las personas que estaban en ellos. 'A todos los de los valles' conserva la metonimia sin volverla áspera en español. La tensión entre literalidad y sentido está documentada en la POB inglesa.
- source_word: לַמִּזְרָח וְלַמַּעֲרָב
  english_pob_choice: to the east and to the west
  chosen_spanish: hacia el oriente y hacia el occidente
  alternatives_spanish:
  - al oriente y al occidente
  - hacia el este y hacia el oeste
  lexicon: BDB / HALOT
  rationale: '''Oriente/occidente'' mantiene el registro bíblico sin perder inteligibilidad. Se conserva la orientación direccional como extensión del alcance de la huida.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustanciales; el punto principal estable auditado es la metonimia de 'all the valleys' entendida como sus habitantes, por lo que la versión española la preserva explícitamente.
  spanish_consistency_notes:
  - Se mantiene 'Jordán' como nombre propio del río y 'Yahvé' no aparece en este versículo.
  - Se usa 'oriente/occidente' de forma consistente con un registro bíblico sobrio y claro.
  - La nota [a] acompaña la única decisión léxica con alternativa semántica relevante, siguiendo el audit trail inglés.
