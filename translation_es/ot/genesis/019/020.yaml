translation:
  language: es
  text: Mira, por favor, esta ciudad está lo bastante cerca para huir allá, y es pequeña. Por favor, déjame escapar allá—¿no es pequeña? Entonces viviré[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y mi vida/alma vivirá». El hebreo usa נֶפֶשׁ de manera idiomática para referirse a la propia persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: Expresa la llamada de atención urgente del hebreo con un verbo natural en español contemporáneo. «He aquí» sería más tradicional, pero menos directo en este contexto de súplica.
- source_word: נָא (first occurrence)
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  - por favor te pido
  lexicon: HALOT
  rationale: La partícula funciona como ruego cortés e insistente; «por favor» comunica bien la urgencia respetuosa sin sonar arcaico.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - este pueblo
  lexicon: HALOT
  rationale: El sustantivo עִיר pide «ciudad», y el demostrativo cercano se expresa de modo directo con «esta».
- source_word: קְרֹבָה לָנוּס שָׁמָּה
  english_pob_choice: is near enough to flee there
  chosen_spanish: está cerca para huir allí
  alternatives_spanish:
  - está cerca como para huir allí
  - está próxima para refugiarme allí
  - está cerca de modo que pueda huir allí
  lexicon: HALOT
  rationale: Conserva la idea de proximidad orientada al escape sin forzar un giro demasiado literario. «Huir allí» mantiene el valor locativo de שָׁמָּה.
- source_word: וְהִיא מִצְעָר
  english_pob_choice: and it is small
  chosen_spanish: y es pequeña
  alternatives_spanish:
  - y es pequeña de tamaño
  - y es poca cosa
  - y es insignificante
  lexicon: HALOT
  rationale: מִצְעָר indica pequeñez; «pequeña» es el equivalente más natural y fiel. «Insignificante» carga una valoración que el hebreo no exige aquí.
- source_word: אִמָּלְטָה נָּא שָׁמָּה
  english_pob_choice: Please let me escape there
  chosen_spanish: Por favor, déjame escapar allí
  alternatives_spanish:
  - Por favor, permíteme huir allí
  - Déjame librarme allí, por favor
  - Te ruego que me escapes allí
  lexicon: HALOT
  rationale: El cohortativo expresa petición de refugio; «déjame escapar allí» es claro y conserva la súplica. «Escapar» mantiene la fuerza del verbo sin introducir una lectura más teológica de «librarme».
- source_word: הֲלֹא מִצְעָר הִוא
  english_pob_choice: is it not small?
  chosen_spanish: ¿no es pequeña?
  alternatives_spanish:
  - ¿acaso no es pequeña?
  - ¿no es poca cosa?
  - ¿no es insignificante?
  lexicon: HALOT
  rationale: La repetición de מִצְעָר se preserva con «pequeña», evitando perder la conexión léxica del argumento.
- source_word: וּתְחִי נַפְשִׁי
  english_pob_choice: Then my life will live
  chosen_spanish: Entonces viviré
  alternatives_spanish:
  - y viviré
  - para que yo viva
  - así viviré
  lexicon: HALOT
  rationale: La reseña inglesa documenta que נֶפֶשׁ funciona idiomáticamente como referencia a la persona misma. En español, «viviré» transmite el sentido sin la tautología literal «mi vida vivirá», que sonaría forzada y oscurecería el idiomismo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo de Génesis 19:20 y toma en cuenta el expediente inglés: se conserva la urgencia de הִנֵּה y נָא, la repetición de מִצְעָר como «pequeña», y la cláusula final se resuelve como idiomática en español («Entonces viviré») en línea con la revisión auditada que rechazó la lectura literal torpe. También se evita endurecer «flee there» con un calco innecesario y se mantiene la súplica de Lot en registro natural y reverente.'
  spanish_consistency_notes:
  - Se emplea «Mira» para הִנֵּה en vez de «He aquí», siguiendo un registro moderno pero digno.
  - Se usa «por favor» para נָא por ser la mejor equivalencia pragmática en español neutral.
  - «Pequeña» mantiene visible la repetición léxica de מִצְעָר en ambas ocurrencias.
  - La nota final deja constancia de que el hebreo usa נֶפֶשׁ idiomáticamente, sin introducir lenguaje doctrinal ajeno al pasaje.
  - No se introduce «Señor», «Cristo» ni terminología teológica ajena al texto, porque el versículo no lo requiere.
