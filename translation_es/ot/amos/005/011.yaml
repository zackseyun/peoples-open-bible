translation:
  language: es
  text: Por tanto[a], porque pisotean al pobre y le cobran un tributo de grano, han edificado casas de piedra labrada[b], pero no habitarán en ellas; han plantado viñas agradables[c], pero no beberán su vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por eso». La expresión hebrea introduce una consecuencia judicial a partir del pecado denunciado.
    reason: lexical_alternative
  - marker: b
    text: O «casas de piedra cortada». El hebreo se refiere a piedra trabajada, de construcción costosa.
    reason: lexical_alternative
  - marker: c
    text: O «viñas selectas» o «viñas deseables». El hebreo puede expresar algo deseable o exquisito.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Por tanto
  lexicon: HALOT
  rationale: Marca la consecuencia judicial del anuncio profético. «Por tanto» conserva el tono formal de conclusión y juicio mejor que una simple coordinación.
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - porque
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la sentencia. «Porque» es natural en español y preserva la fuerza causal del hebreo.
- source_word: בּוֹשַׁסְכֶם עַל דָּל
  english_pob_choice: you trample on the poor
  chosen_spanish: aplastan al pobre
  alternatives_spanish:
  - pisotean al pobre
  - oprimen al pobre
  - aplastan al pobre
  lexicon: HALOT
  rationale: El verbo tiene un valor de violencia gráfica; «aplastan» conserva la metáfora concreta del abuso. Se mantiene «al pobre» porque דָּל aquí designa al necesitado/vulnerable en singular colectivo.
- source_word: וּמַשְׂאַת בַּר תִּקְחוּ מִמֶּנּוּ
  english_pob_choice: and take a grain tax from him
  chosen_spanish: y le cobran un tributo de grano
  alternatives_spanish:
  - y le exigen una carga de grano
  - y le toman un tributo de grano
  - y le cobran un tributo de grano
  lexicon: HALOT
  rationale: La expresión refiere a una imposición/carga en grano. «Tributo de grano» conserva el carácter de exacción; «le cobran» comunica la acción impuesta sobre la persona singular sin volverla demasiado técnica.
- source_word: בָּתֵּי גָזִית
  english_pob_choice: houses of cut stone
  chosen_spanish: casas de piedra labrada
  alternatives_spanish:
  - casas de piedra cortada
  - casas de piedra labrada
  - casas de piedra hewn
  lexicon: HALOT
  rationale: גָזִית alude a piedra tallada/dimensionada. «Piedra labrada» es natural y digna en español, y preserva la idea de construcción costosa y refinada.
- source_word: וְלֹא תֵשְׁבוּ בָם
  english_pob_choice: but you will not dwell in them
  chosen_spanish: pero no habitarán en ellas
  alternatives_spanish:
  - pero no vivirán en ellas
  - pero no morarán en ellas
  - pero no habitarán en ellas
  lexicon: HALOT
  rationale: «Habitar» mantiene el registro formal y el sentido de residencia estable del hebreo en un contexto de juicio, más preciso que «vivir».
- source_word: כַּרְמֵי חֶמֶד
  english_pob_choice: pleasant vineyards
  chosen_spanish: viñas agradables
  alternatives_spanish:
  - viñas agradables
  - viñas deleitosas
  - viñas selectas
  lexicon: HALOT
  rationale: חֶמֶד expresa algo deseable/agradable. «Agradables» evita intensificar demasiado el matiz y sigue de cerca la ambigüedad del hebreo, como hace el POB al preferir una opción intermedia.
- source_word: נְטַעְתֶּם
  english_pob_choice: you have planted
  chosen_spanish: han plantado
  alternatives_spanish:
  - han plantado
  - plantaron
  - habéis plantado
  lexicon: HALOT
  rationale: Se conserva el perfecto con valor de acción completa vinculada a la consecuencia futura. En español, el pretérito perfecto compuesto es natural y mantiene la continuidad con el anuncio profético.
- source_word: וְלֹא תִשְׁתּוּ אֶת יֵינָם
  english_pob_choice: but you will not drink their wine
  chosen_spanish: pero no beberán su vino
  alternatives_spanish:
  - pero no beberán su vino
  - pero no beberán el vino de ellas
  - pero no tomarán su vino
  lexicon: HALOT
  rationale: «Beberán su vino» reproduce la ironía de la pérdida del fruto esperado. Se conserva el posesivo plural referido a las viñas, como en el hebreo.
theological_decisions:
- issue: Carácter del anuncio profético
  english_pob_reading: 'A prophetic announcement of covenantal reversal: exploitative wealth will not be enjoyed'
  chosen_spanish_reading: 'Un anuncio profético de reversión: la riqueza obtenida por abuso no será disfrutada'
  alternative_spanish_readings:
  - Un proverbio moral general sobre la injusticia
  - Una simple denuncia social sin juicio futuro
  rationale: El versículo no funciona como máxima ética abstracta, sino como oráculo de juicio contra Israel. La traducción mantiene la segunda persona implícita y la privación futura, para reflejar la reversión pactual sin suavizarla.
  doctrine_reference: Amós 5:11; contexto profético de juicio en la alianza
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, especialmente el paso de una formulación más libre a «dwell/pleasant». En español se optó por «habitar» y «agradables» para reflejar ese ajuste hacia un registro más formal y una equivalencia más natural del hebreo. También se preservó la secuencia causal-judicial («Por tanto, porque...»), la exacción en grano y la ironía final de la privación.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando aparece el Tetragrámaton; aquí no aparece.
  - Se mantiene «pobre» en singular como representación del singular hebreo con valor representativo/colectivo.
  - «Tributo de grano» conserva la tensión entre impuesto, carga y exacción del hebreo מַשְׂאַת בַּר.
  - «Habitar» se usa para mantener el tono de sentencia y residencia estable, en línea con la revisión inglesa.
  - «Viñas agradables» evita sobretraducir el adjetivo hebreo y conserva una ambigüedad válida entre agradable, deseable y selecta.
