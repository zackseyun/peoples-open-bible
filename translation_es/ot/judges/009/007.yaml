base_translation:
  language: en
  yaml_path: translation/ot/judges/009/007.yaml
  text: And they told Jotham[a], and he went and stood on the top of Mount Gerizim, and he lifted up his voice and called out and said to them, “Listen to me, leaders of Shechem[b], that God may listen to you.”
  footnotes:
  - marker: a
    text: Or 'leaders of Shechem.' The Hebrew is literally 'lords/masters of Shechem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and may God listen to you.'
    reason: alternative_reading
