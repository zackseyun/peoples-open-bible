translation:
  language: es
  text: Así que Moisés salió de la presencia de Faraón y suplicó a Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rogó con insistencia a Yahvé». El verbo hebreo comunica súplica urgente o ruego apremiante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: El qal wayyiqtol de יצא expresa salida o alejamiento físico. «Salió» es natural en español y mantiene la secuencia narrativa sin añadir matices innecesarios.
- source_word: מֵעִם
  english_pob_choice: from
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: Aunque el inglés POB simplifica con «from Pharaoh», la preposición con עִם puede implicar separación de la presencia o compañía. En español, «de la presencia de Faraón» explicita ese matiz sin sobretraducir el texto.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: uso estándar bíblico
  rationale: «Faraón» es el equivalente bíblico directo y funciona como nombre/título propio en español.
- source_word: וַיֶּעְתַּר
  english_pob_choice: pleaded
  chosen_spanish: suplicó
  alternatives_spanish:
  - rogó
  - imploró
  - oró con insistencia
  lexicon: HALOT
  rationale: El verbo עתר en este contexto denota ruego intenso o súplica urgente más que una simple oración genérica. «Suplicó» conserva bien esa fuerza en español.
- source_word: אֶל
  english_pob_choice: with
  chosen_spanish: a
  alternatives_spanish:
  - ante
  - hacia
  lexicon: HALOT
  rationale: El hebreo usa אֶל literalmente «a/ hacia». Con «suplicó a Yahvé» el español expresa de forma natural la dirección del ruego, sin copiar el giro inglés «with».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino en la forma adoptada por el proyecto en español, «Yahvé», en lugar de sustituirlo por un título.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton y el proyecto POB lo vierte como nombre propio, no como sustitución honorífica. «Yahvé» mantiene la referencia al nombre del pacto revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of וַיֶּעְתַּר
  english_pob_reading: pleaded
  chosen_spanish_reading: suplicó
  alternative_spanish_readings:
  - oró fervientemente
  - rogó
  rationale: La lectura del inglés POB subraya la súplica urgente. En español, «suplicó» comunica ese carácter insistente y evita reducir el verbo a una oración genérica.
  doctrine_reference: HALOT; English POB lexical note on urgent entreaty
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del hebreo y coincide con la decisión auditada del inglés POB de mantener el nombre divino y reflejar la fuerza intensiva del verbo final. No se requieren revisiones adicionales respecto del paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - «Faraón» se mantiene como título/nombre bíblico tradicional y claro en español.
  - «Suplicó» conserva la intensidad de עתר sin introducir un comentario interpretativo excesivo.
  - La construcción «de la presencia de Faraón» comunica de manera natural el valor separativo de מֵעִם.
