translation:
  language: es
  text: Salomón reinó en días de paz[a], y Dios le dio reposo alrededor, para que edificara una casa para su nombre y preparara un santuario para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado es más breve: «Salomón reinó en días de paz, y Dios le dio reposo alrededor». El paralelo griego añade la cláusula de propósito sobre edificar una casa para su nombre y preparar un santuario para siempre.'
    reason: textual_variant
lexical_decisions:
- source_word: שְׁלֹמֹה / Σαλωμὼν
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: uso bíblico estándar
  rationale: Se usa el nombre propio bíblico normal en español. «Salomón» es la forma más reconocible y estable en la tradición hispana, sin perder fidelidad al original.
- source_word: מלך / ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: uso bíblico estándar; sentido verbal de reinar
  rationale: El verbo expresa acción regia concreta. «Reinó» conserva el aspecto verbal del hebreo y del griego mejor que una perífrasis nominal.
- source_word: בימי שלוה / ἐν ἡμέραις εἰρήνης
  english_pob_choice: in days of peace
  chosen_spanish: en días de paz
  alternatives_spanish:
  - en días pacíficos
  - en tiempos de paz
  lexicon: uso idiomático bíblico
  rationale: La frase temporal se rinde de forma natural y sobria en español. «Días de paz» preserva el valor idiomático sin alargar el sintagma.
- source_word: ואל הניח לו מסביב / ᾧ ὁ θεὸς κατέπαυσεν κυκλόθεν
  english_pob_choice: and God gave him rest all around
  chosen_spanish: y Dios le dio reposo por todos lados
  alternatives_spanish:
  - y Dios le dio descanso por todos lados
  - y Dios lo hizo reposar por todos lados
  lexicon: uso bíblico estándar; correspondencia con מסביב / κυκλόθεν
  rationale: «Reposo» mantiene el registro bíblico y el sentido de quietud concedida por Dios. «Por todos lados» refleja la idea espacial de rodeo total que expresan el hebreo y el griego.
- source_word: ἵνα στήσῃ οἶκον ἐπʼ ὀνόματι αὐτοῦ
  english_pob_choice: so that he might build a house for his name
  chosen_spanish: para que edificara una casa para su nombre
  alternatives_spanish:
  - para que construyera una casa para su nombre
  - para que levantara una casa para su nombre
  lexicon: LSJ; lenguaje templo-casa
  rationale: «Edificara» reproduce bien el propósito y el tono bíblico de construcción solemne. «Casa para su nombre» conserva la expresión reverente del original, asociada al templo.
- source_word: καὶ ἑτοιμάσῃ ἁγίασμα εἰς τὸν αἰῶνα
  english_pob_choice: and prepare a sanctuary forever
  chosen_spanish: y preparara un santuario para siempre
  alternatives_spanish:
  - y preparara un lugar santo para siempre
  - y dispusiera un santuario para la eternidad
  lexicon: LSJ; uso bíblico estándar
  rationale: «Santuario» es la mejor equivalencia de ἁγίασμα en este contexto cultual. «Para siempre» preserva εἰς τὸν αἰῶνα de manera directa y comprensible en español.
theological_decisions:
- issue: Inclusión de la cláusula de propósito presente en el griego, aunque el hebreo transmitido es más breve
  english_pob_reading: Include the Greek clause in the main text; footnote notes the shorter extant Hebrew line
  chosen_spanish_reading: Incluir la cláusula griega en el texto principal; la nota señala que el hebreo conservado es más breve
  alternative_spanish_readings:
  - 'Traducir solo el hebreo conservado: «Salomón reinó en días de paz, y Dios le dio reposo por todos lados.»'
  rationale: El expediente auditado indica que el hebreo conservado es más corto, mientras que el griego aporta una continuación coherente con el contexto de Salomón y el templo. Como la consigna pide usar el paralelo griego como input real de traducción, el texto español incluye esa cláusula y deja constancia de la variante textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde sobrevive; usar el paralelo griego cuando forma parte del input asignado por la tarea.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que prefirió «all around» por una equivalencia más natural de מסביב; en español se optó por «por todos lados», que conserva la imagen espacial total sin sonar rígido. También se mantuvo la cláusula griega en el cuerpo principal, conforme al encargo y a la lectura auditada.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y una construcción reverente, sin ocultar la variante textual.
  - «Casa para su nombre» conserva el eco cultual bíblico y la referencia al templo.
  - «Santuario para siempre» evita expandir el significado más allá del alcance del griego.
  - El registro es bíblico pero en español natural, sin calcos innecesarios.
