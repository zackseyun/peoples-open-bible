translation:
  language: es
  text: Sin embargo, yo soy Yahvé, tu Dios, de la tierra de Egipto; otra vez te haré habitar en tiendas, como en los días de la fiesta señalada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tiempo señalado» o «la festividad». La expresión puede aludir a la Fiesta de los Tabernáculos, cuando Israel habitaba en refugios temporales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָנֹכִי
  english_pob_choice: Yet I
  chosen_spanish: Sin embargo, yo
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: אָנֹכִי funciona como pronombre enfático de primera persona, y la conjunción inicial expresa contraste con el contexto anterior. «Sin embargo, yo» preserva tanto la oposición como el énfasis del sujeto sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino en lugar de sustituirlo por un título, conforme al criterio del proyecto y a la referencia directa al Tetragrámaton.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu propio Dios
  lexicon: HALOT
  rationale: La forma posesiva de segunda persona masculina singular expresa la relación de pacto de manera natural y directa en español.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: desde la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: «Desde la tierra de Egipto» conserva el valor de origen y la referencia histórica al éxodo sin añadir matices temporales no explícitos en el hebreo.
- source_word: עֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  lexicon: HALOT
  rationale: Aquí modifica la acción futura de manera repetitiva. «Otra vez» reproduce con naturalidad el sentido de repetición que la POB inglesa señaló con «again».
- source_word: אוֹשִׁיבְךָ
  english_pob_choice: I will make you dwell
  chosen_spanish: te haré habitar
  alternatives_spanish:
  - te haré morar
  - te haré vivir
  lexicon: HALOT
  rationale: El causativo de ישב se conserva con una construcción causativa en español. «Habitar» es más natural que una glosa pesada, y mantiene el efecto de hacer residir/dwell.
- source_word: בָאֳהָלִים
  english_pob_choice: in tents
  chosen_spanish: en tiendas
  alternatives_spanish:
  - en carpas
  - en tabernáculos
  lexicon: HALOT
  rationale: «Tiendas» es un equivalente bíblico natural y transparente para בָאֳהָלִים. Evita introducir de inmediato la terminología tradicional de «tabernáculos» en el texto principal.
- source_word: כִּימֵי
  english_pob_choice: as in the days of
  chosen_spanish: como en los días de
  alternatives_spanish:
  - igual que en los días de
  lexicon: HALOT
  rationale: La comparación temporal se expresa de forma directa y estándar en español.
- source_word: מוֹעֵד
  english_pob_choice: the appointed feast
  chosen_spanish: la fiesta señalada
  alternatives_spanish:
  - el tiempo señalado
  - la fiesta establecida
  lexicon: HALOT
  rationale: «Moed» puede referirse a tiempo señalado o a fiesta. Dado el contexto de habitar en tiendas, «la fiesta señalada» mantiene la ambigüedad cultual sin cerrarla del todo y resulta comprensible para el lector español.
theological_decisions:
- issue: Si la referencia final debe resolverse como promesa, amenaza o alusión festiva específica
  english_pob_reading: Render the statement straightforwardly without resolving whether the return to tents is restorative or punitive.
  chosen_spanish_reading: Se traduce de forma directa sin decidir si volver a tiendas es restauración, castigo o una alusión cultual concreta.
  alternative_spanish_readings:
  - Promesa de renovación en el desierto
  - Amenaza de humillación y desposesión
  - Alusión explícita a la Fiesta de los Tabernáculos
  rationale: El hebreo no marca de manera explícita el valor evaluativo del enunciado. La versión española conserva la tensión teológica, evitando forzar una interpretación que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final coincide con el acuerdo alto del control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se prefirió «tiendas» en el texto principal y se reservó «tabernáculos» para nota, para no importar terminología litúrgica tradicional sin necesidad.
  - La construcción «te haré habitar» preserva el valor causativo del verbo hebreo.
  - La ambigüedad de מוֹעֵד se mantiene mediante «fiesta señalada» y la nota alternativa.
