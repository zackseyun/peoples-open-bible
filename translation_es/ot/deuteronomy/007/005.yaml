  language: en
  yaml_path: translation/ot/deuteronomy/007/005.yaml
  text: 'But this is what you shall do to them: you shall tear down their altars[a], shatter their pillars, cut down their Asherah poles[c][b], and burn their carved images with fire.'
  footnotes:
