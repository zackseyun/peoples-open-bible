id: LEV.14.57
reference: Leviticus 14:57
source:
  edition: WLC
  text: לְ/הוֹרֹ֕ת בְּ/י֥וֹם הַ/טָּמֵ֖א וּ/בְ/י֣וֹם הַ/טָּהֹ֑ר זֹ֥את תּוֹרַ֖ת הַ/צָּרָֽעַת׃ס
translation:
  text: to instruct about the day of uncleanness and the day of cleanness[a]. This is the law of the skin disease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'leprosy.' The Hebrew term refers more broadly to a range of skin-related impurity conditions, not necessarily modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/הוֹרֹת
  chosen: to instruct about
  alternatives:
  - to teach
  - to give instruction concerning
  - to make a ruling about
  lexicon: HALOT
  rationale: 'The Hiphil infinitive of ירה here expresses the purpose of the preceding legislation: giving instruction or direction. ''To instruct about'' is natural English and preserves the didactic/legal force without over-specifying judicial nuance.'
- source_word: בְּ/י֥וֹם
  chosen: about the day of
  alternatives:
  - in the day of
  - on the day of
  - for the day of
  lexicon: HALOT
  rationale: The preposition ב with 'day' is idiomatic in Hebrew. In English, after 'instruct,' 'about the day of' best conveys the sense of instruction regarding circumstances/times of uncleanness and cleanness rather than a strictly temporal 'on the day.'
- source_word: הַ/טָּמֵא
  chosen: uncleanness
  alternatives:
  - the unclean
  - what is unclean
  - the day when one is unclean
  lexicon: HALOT
  rationale: Although formally an adjective ('the unclean'), in this construction with 'day of' it functions substantivally. Rendering it abstractly as 'uncleanness' produces clear English and matches the ritual-purity context.
- source_word: וּ/בְ/י֣וֹם הַ/טָּהֹר
  chosen: and the day of cleanness
  alternatives:
  - and the day of purity
  - and the clean day
  - and the day when one is clean
  lexicon: HALOT
  rationale: This balances the previous phrase and preserves the ritual-purity terminology. 'Cleanness' is slightly more literal to the purity system than the broader 'purity,' though both are possible.
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  - Such is
  lexicon: HALOT
  rationale: Standard demonstrative introducing a concluding summary formula.
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction for
  - the regulation for
  lexicon: HALOT
  rationale: תורה in priestly material often means instruction/regulation, but 'This is the law of...' is a well-established and accurate summary formula in Leviticus. It preserves the formal legal tone.
- source_word: הַ/צָּרָעַת
  chosen: the skin disease
  alternatives:
  - the diseased condition
  - the leprous disease
  - the defiling skin disease
  lexicon: HALOT
  rationale: צָרַעַת does not correspond precisely to modern Hansen's disease ('leprosy'). 'Skin disease' avoids misleading medical specificity while fitting the context of Leviticus 13–14. The article is retained in English by the phrase 'the skin disease' as a category label.
