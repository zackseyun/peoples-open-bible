review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: informaron a David, él respondió enviando a su encuentro, la razón fue la profunda vergüenza de los hombres, y el rey les ordenó quedarse en Jericó hasta que creciera su barba y luego volver. Sin embargo, el anclaje de la nota [a] está colocado sobre «David», cuando la nota explica נִכְלָמִים מְאֹד («muy humillados/avergonzados»), no el nombre David. Además, la nota [b] está colocada sobre «barba», pero explica la frase anterior «envió a recibirlos».'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Quédense en Jericó» y «luego regresen» leen bien. «Muy avergonzados» es aceptable, aunque «muy humillados» o «profundamente humillados» representaría con más fuerza el matiz pasivo y público de נִכְלָמִים; no obstante, la nota ya compensa esa posibilidad. La revisión necesaria es principalmente de colocación correcta de notas.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. La decisión «envió a recibirlos» respeta el razonamiento auditado de no sobreespecificar «mensajeros». «Los hombres» y «Jericó» están bien. La elección «muy avergonzados» es compatible, aunque algo menos fuerte que «muy humillados».
  issues:
  - severity: high
    issue: La nota [a] está anclada en «David» en vez de en la expresión de vergüenza/humillación.
    rationale: La nota explica alternativas para נִכְלָמִים מְאֹד, no para לְדָוִד. El anclaje actual induce a error sobre qué palabra comenta la nota.
  - severity: high
    issue: La nota [b] está anclada en «barba» pero su contenido comenta «envió a recibirlos».
    rationale: El texto de la nota trata la construcción וַיִּשְׁלַח לִקְרָאתָם. Debe aparecer junto a «envió a recibirlos» para que el lector entienda correctamente la observación lexical.
  - severity: low
    issue: «Muy avergonzados» atenúa ligeramente el matiz de humillación pública del hebreo.
    rationale: נִכְלָמִים sugiere ser avergonzados/humillados públicamente. La nota ya preserva ese matiz, así que no es necesario forzar un cambio, pero «humillados» sería algo más preciso.
  revised_spanish_text: 'Cuando se lo dijeron a David, él envió a recibirlos[b], porque los hombres estaban muy avergonzados[a]. Y el rey dijo: «Quédense en Jericó hasta que les crezca la barba, y luego regresen».'
  revised_footnotes:
