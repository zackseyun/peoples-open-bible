translation:
  language: es
  text: Así Yahvé envió entre el pueblo las serpientes ardientes[a], y mordieron al pueblo, y murieron muchos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serpientes venenosas» o «serpientes abrasadoras». El hebreo dice literalmente: «las serpientes, las ardientes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח / sent
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió
  lexicon: HALOT
  rationale: El verbo causativo en la secuencia narrativa expresa el envío de algo. 'Envió' mantiene la acción directa del hebreo y su registro natural en español bíblico actual.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma exigida por el proyecto en español. 'Yahvé' preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: בָּעָם / among the people
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - contra el pueblo
  - en medio del pueblo
  lexicon: HALOT
  rationale: La preposición con עַם es locativa en el contexto narrativo. 'Entre el pueblo' transmite la idea de ubicación sin convertirla en una lectura polémica de hostilidad.
- source_word: הַנְּחָשִׁים הַשְּׂרָפִים / the fiery serpents
  english_pob_choice: the fiery serpents
  chosen_spanish: las serpientes ardientes
  alternatives_spanish:
  - las serpientes ígneas
  - las serpientes venenosas
  - las serpientes abrasadoras
  lexicon: HALOT
  rationale: '''Ardientes'' conserva la imagen hebrea de שׂרָפִים y resulta natural en español. Se evita reducirlo a ''venenosas'', porque el hebreo preserva una metáfora de fuego/ardor además del efecto del mordisco.'
- source_word: וַיְנַשְּׁכוּ / they bit
  english_pob_choice: they bit
  chosen_spanish: mordieron
  alternatives_spanish:
  - picaron
  - hirieron al morder
  lexicon: HALOT
  rationale: El verbo נשׁך significa 'morder'. 'Mordieron' es la equivalencia más directa y clara en español.
- source_word: עַם רָב מִיִּשְׂרָאֵל / many from Israel
  english_pob_choice: many from Israel
  chosen_spanish: muchos de Israel
  alternatives_spanish:
  - muchos de entre Israel
  - una gran multitud de Israel
  lexicon: HALOT
  rationale: La frase hebrea combina cantidad con procedencia grupal. 'Muchos de Israel' conserva la relación con Israel sin redundar en 'pueblo' dos veces.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La decisión del POB en inglés es transliterar el nombre divino, no sustituirlo. En español, la forma establecida del proyecto es 'Yahvé', que mantiene el valor del nombre propio revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Meaning of הַשְּׂרָפִים in context
  english_pob_reading: fiery serpents
  chosen_spanish_reading: serpientes ardientes
  alternative_spanish_readings:
  - serpientes venenosas
  - serpientes abrasadoras
  rationale: Se conserva la tensión lexical del hebreo entre la imagen del fuego/ardor y el efecto de las mordeduras. 'Ardientes' evita una paráfrasis explicativa que diluya la metáfora original.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Scope of עַם רָב מִיִּשְׂרָאֵל
  english_pob_reading: many from Israel died
  chosen_spanish_reading: muchos de Israel murieron
  alternative_spanish_readings:
  - muchos del pueblo de Israel murieron
  - murió una gran multitud de Israel
  rationale: La construcción final indica cantidad de personas dentro de Israel, no necesariamente 'muchos israelitas' como etnia abstracta. 'Muchos de Israel' conserva brevedad y fidelidad a la relación partitiva.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés al evitar la redundancia de repetir 'pueblo' en la cláusula final. También conserva la decisión auditada de mantener el nombre divino como transliteración y de traducir el giro de הַנְּחָשִׁים הַשְּׂרָפִים con una imagen cercana al hebreo, no con una explicación interpretativa.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' para el Tetragrámaton, conforme al estándar español del proyecto.
  - Se usa un español bíblico claro y contemporáneo, evitando 'SEÑOR' como sustituto del nombre divino.
  - '''Ardientes'' conserva la imagen semántica de שׂרָפִים sin cerrar el sentido a una sola explicación.'
  - La estructura final evita la repetición innecesaria de 'pueblo' y mantiene el paralelismo narrativo del hebreo.
