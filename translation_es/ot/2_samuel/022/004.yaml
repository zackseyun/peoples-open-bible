translation:
  language: es
  text: Invoco a Yahvé[a], que es digno de alabanza, y soy salvo de mis enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabado» / «digno de ser alabado». El participio hebreo describe a Yahvé como uno que debe ser alabado; «digno de alabanza» hace explícito el sentido en español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהֻלָּל
  english_pob_choice: who is worthy of praise
  chosen_spanish: digno de alabanza
  alternatives_spanish:
  - alabado
  - que debe ser alabado
  - digno de ser alabado
  lexicon: HALOT
  rationale: El participio pasivo funciona predicativamente con el nombre divino. En español, 'digno de alabanza' comunica la fuerza adjetival y evita el orden poco natural 'alabado invoco'. 'Que debe ser alabado' mantiene más explícitamente la obligación, pero suena más pesado.
- source_word: אֶקְרָא
  english_pob_choice: I call on
  chosen_spanish: Invoco
  alternatives_spanish:
  - llamo
  - clamo a
  - invoco a
  lexicon: HALOT
  rationale: קרא con el nombre divino expresa llamar/invocar al Señor, no meramente pronunciar un nombre. 'Invoco' concentra bien el sentido de oración dirigida a Dios y resulta natural en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la convención del proyecto en español. 'Yahvé' es la forma establecida para el Tetragrámaton y corresponde al inglés POB 'Yahweh'.
- source_word: וּמֵאֹיְבַי
  english_pob_choice: and from my enemies
  chosen_spanish: de mis enemigos
  alternatives_spanish:
  - y de mis enemigos
  - y librado de mis enemigos
  - de la mano de mis enemigos
  lexicon: HALOT
  rationale: La preposición con prefijo marca el origen o la esfera desde la cual ocurre la liberación. En español, 'librado de mis enemigos' expresa con claridad el resultado sin añadir 'mano' que no está en el hebreo.
- source_word: אִוָּשֵׁעַ
  english_pob_choice: I am saved
  chosen_spanish: soy librado
  alternatives_spanish:
  - soy salvo
  - seré salvado
  - soy rescatado
  lexicon: HALOT
  rationale: El nifal de ישׁע puede referirse a salvación o liberación. Aquí, por el paralelo con 'mis enemigos', 'soy librado' comunica mejor la idea concreta de ser rescatado de peligro, aunque 'soy salvo' conserva la conexión léxica con 'salvar'.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios en lugar de sustituirlo por un título. Esto sigue la convención doctrinal del proyecto y evita ocultar el Tetragrámaton del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la salvación al final del versículo
  english_pob_reading: I am saved
  chosen_spanish_reading: soy librado
  alternative_spanish_readings:
  - soy salvo
  - seré salvado
  - me salvo
  rationale: El contexto poético inmediato habla de enemigos concretos; por eso 'librado' expresa de modo más directo la liberación resultante de invocar a Yahvé. Se mantiene, sin embargo, la tensión entre salvación y liberación propia de ישׁע.
  doctrine_reference: 'DOCTRINE.md: Salvación y liberación en poesía hebrea'
translation_notes:
  revision_awareness: Sin cambios previos aplicados; la redacción sigue de cerca el hebreo y el audio trail inglés, manteniendo la tensión entre la alabanza debida a Yahvé y la liberación de los enemigos.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evita «SEÑOR» como sustituto editorial.
  - «Invoco» conserva el valor oracional de קרא con el nombre divino.
  - «soy librado» refleja la liberación concreta implícita en el paralelo poético.
