translation:
  language: es
  text: Pero todo el ganado y el botín de las ciudades nos lo quedamos como botín[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y todo el ganado y el botín de las ciudades lo saqueamos para nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: But all
  chosen_spanish: Pero todo
  alternatives_spanish:
  - Y todo
  - Ahora todo
  lexicon: HALOT
  rationale: La conjunción waw aquí retoma lo anterior con un matiz adversativo leve; 'Pero' conserva esa oposición contextual. 'Todo' traduce כָּל sin atenuarlo.
- source_word: הַ/בְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales
  - el ganado doméstico
  lexicon: HALOT
  rationale: En este contexto militar y económico, בְּהֵמָה se refiere a animales domesticados pertenecientes a la población. 'Ganado' es natural en español y mantiene la referencia a animales de valor para posesión y botín.
- source_word: וּ/שְׁלַל
  english_pob_choice: and the spoil
  chosen_spanish: y el botín
  alternatives_spanish:
  - y el despojo
  - y la presa
  lexicon: HALOT
  rationale: שָׁלָל designa bienes capturados en guerra. 'Botín' es el equivalente español más directo y claro para ese campo semántico.
- source_word: הֶ/עָרִים
  english_pob_choice: of the cities
  chosen_spanish: de las ciudades
  alternatives_spanish:
  - de esas ciudades
  - procedente de las ciudades
  lexicon: HALOT
  rationale: El constructo hebreo expresa el botín perteneciente a las ciudades o tomado de ellas. 'De las ciudades' conserva la relación nominal sin añadir interpretación innecesaria.
- source_word: בַּזּ֥וֹנוּ
  english_pob_choice: we took as plunder
  chosen_spanish: lo tomamos como botín
  alternatives_spanish:
  - lo despojamos
  - lo saqueamos
  lexicon: HALOT
  rationale: El verbo de בזז expresa saquear o tomar como botín. 'Lo tomamos como botín' comunica la acción de manera clara en español sin perder el sentido militar.
- source_word: לָֽ/נוּ
  english_pob_choice: for ourselves
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros mismos
  - como cosa nuestra
  lexicon: HALOT
  rationale: La preposición con pronombre de primera persona plural marca beneficiarios. 'Para nosotros' reproduce bien el valor idiomático y evita sobreexplicar.
translation_notes:
  revision_awareness: El texto inglés POB y el análisis cruzado coinciden plenamente en el sentido general; solo se ajustó la salida al español natural manteniendo el matiz adversativo, el lenguaje militar de 'botín' y la acción de tomar/saquear implícita en el verbo hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'botín' para שָׁלָל y para la idea verbal de בָּזַז, evitando una paráfrasis que diluya el paralelismo hebreo.
  - '''Ganado'' se usa como equivalente funcional de ''livestock'' en español bíblico contemporáneo, sin forzar una traducción zoológica más amplia.'
  - 'La nota alternativa conserva la tensión léxica: el hebreo admite tanto un sustantivo (''botín'') como una verbalización más explícita (''despojar/saquear'').'
