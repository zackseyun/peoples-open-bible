translation:
  language: es
  text: 'Oráculo acerca del desierto del mar: como torbellinos en el Negueb[a][b], al pasar, viene[c] del desierto, de tierra temible.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el desierto junto al mar". La expresión hebrea es inusual y puede funcionar como una designación geográfica poética.
    reason: lexical_alternative
  - marker: b
    text: O "como tormentas en el sur, que pasan". "Negueb" puede referirse a la región meridional o simplemente a "sur".
    reason: lexical_alternative
  - marker: c
    text: El sujeto de "viene" es implícito en hebreo y puede referirse a la fuerza semejante a tormenta que acaba de describirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: Oráculo
  alternatives_spanish:
  - Carga
  - Pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא introduce una palabra de juicio o anuncio. "Oráculo" es el equivalente español más natural y conserva el valor de encabezamiento sin sugerir una carga física.
- source_word: מִדְבַּר יָם
  english_pob_choice: the wilderness of the sea
  chosen_spanish: el desierto del mar
  alternatives_spanish:
  - el desierto junto al mar
  - el desierto-mar
  lexicon: HALOT
  rationale: La cadena constructa se conserva en español para mantener visible la expresión hebrea inusual. "Desierto del mar" reproduce la tensión poética y no resuelve prematuramente su sentido geográfico.
- source_word: כְּסוּפוֹת
  english_pob_choice: like whirlwinds
  chosen_spanish: como torbellinos
  alternatives_spanish:
  - como tempestades
  - como remolinos
  lexicon: HALOT
  rationale: סוּפוֹת describe vientos violentos; "torbellinos" comunica bien la fuerza y el movimiento brusco en español, con un registro digno y claro.
- source_word: בַּנֶּגֶב
  english_pob_choice: in the Negev
  chosen_spanish: en el Negueb
  alternatives_spanish:
  - en el sur
  - por el sur
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado para mantener el color geográfico del texto y evitar reducirlo solo a una dirección cardinal. La forma "Negueb" es la adaptación española más transparente del hebreo נֶגֶב.
- source_word: לַחֲלֹף
  english_pob_choice: sweeping through
  chosen_spanish: al pasar
  alternatives_spanish:
  - pasando
  - al atravesar
  lexicon: HALOT
  rationale: El infinitivo expresa movimiento de tránsito. "Al pasar" mantiene la idea de desplazamiento rápido y encaja con la comparación de tormenta sin sobrecargar el verso.
- source_word: מִמִּדְבָּר בָּא
  english_pob_choice: it comes from the wilderness
  chosen_spanish: viene del desierto
  alternatives_spanish:
  - sale del desierto
  - llega del desierto
  lexicon: HALOT
  rationale: El verbo hebreo es singular con sujeto implícito. En español, "viene" conserva la ambigüedad del sujeto y sigue el impulso de movimiento del contexto.
- source_word: מֵאֶרֶץ נוֹרָאָה
  english_pob_choice: from a fearful land
  chosen_spanish: de tierra temible
  alternatives_spanish:
  - de una tierra terrible
  - de una tierra espantosa
  lexicon: HALOT
  rationale: נוֹרָאָה expresa algo que inspira temor. "Temible" mantiene la fuerza afectiva y suena más sobrio que alternativas más cargadas como "espantosa".
theological_decisions:
- issue: Mantener la ambigüedad poética del encabezamiento
  english_pob_reading: Retain the poetic phrase 'the wilderness of the sea' rather than resolving it to a specific nation in the main text.
  chosen_spanish_reading: Conservar "el desierto del mar" sin identificarlo en el cuerpo del verso.
  alternative_spanish_readings:
  - el desierto junto al mar
  - el desierto del mar, es decir, Babilonia
  rationale: El hebreo presenta una fórmula enigmática. La traducción debe preservar esa tensión y no incorporar una identificación interpretativa que el texto no explicita.
  doctrine_reference: Principio de primacía del original; preservar tensión interpretativa cuando el hebreo la deja abierta.
- issue: Sujeto implícito de "viene"
  english_pob_reading: The subject of 'comes' is implicit in Hebrew and may refer to the storm-like force just described.
  chosen_spanish_reading: Dejar "viene" sin sujeto explícito.
  alternative_spanish_readings:
  - viene la tormenta
  - él viene
  rationale: El hebreo permite un sujeto implícito. En español, mantener la impersonalidad relativa ayuda a no fijar indebidamente el referente y conserva el ritmo del verso.
  doctrine_reference: Respeto de la ambigüedad sintáctica del original; no añadir sujetos no marcados.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se conservaron la ambigüedad de מִדְבַּר יָם, el movimiento rápido del símil de tormenta y el sujeto implícito de בָּא, sin introducir una identificación histórica o geográfica no explicitada en el versículo.
  spanish_consistency_notes:
  - Se usó "Yahvé" solo cuando el texto lo requiera; en este versículo no aparece.
  - Se evitó "SEÑOR" por convención de ocultamiento, coherente con el proyecto.
  - '"Oráculo" mantiene el valor profético de מַשָּׂא en español.'
  - '"Negueb" se translitera para conservar el topónimo y la imagen regional.'
