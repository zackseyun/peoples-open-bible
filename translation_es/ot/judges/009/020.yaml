    text: O «los señores de Siquem». El hebreo designa a los hombres prominentes o gobernantes de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: Bet-milo también puede traducirse «la casa de Milo», probablemente un lugar o grupo asociado con Siquem.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el equivalente principal de בַּעֲלֵי שְׁכֶם para alinearlo con la decisión lexical auditada del POB inglés: «líderes» comunica mejor autoridad cívica en español moderno, mientras que «señores» queda como alternativa en nota. También se ajustó la nota correspondiente para que coincida con el texto revisado. El resto del versículo preserva adecuadamente la sintaxis, el paralelismo y la imagen imprecatoria del hebreo.'
