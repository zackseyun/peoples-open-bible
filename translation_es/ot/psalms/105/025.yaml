review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: agencia divina directa, singular colectivo de «corazón», odio hacia el pueblo de Dios y conducta engañosa contra sus siervos. Sin embargo, la sintaxis española puede ajustarse mejor al valor idiomático de בַּעֲבָדָיו después de לְהִתְנַכֵּל, y las notas duplican la misma observación sobre «su corazón».'
  spanish_quality_summary: «Él volvió su corazón» es comprensible, pero «volvió» suena menos natural en español bíblico actual que «cambió» o «volvió el corazón de ellos». Además, «tratar con engaño a sus siervos» es aceptable, pero «proceder engañosamente contra sus siervos» o «actuar con engaño contra sus siervos» refleja mejor la hostilidad del hitpael y el matiz adversativo del complemento. Las dos notas actuales son redundantes y conviene reducirlas a una sola nota clara.
  glossary_alignment: No hay conflicto con los términos de proyecto principales. «Siervos» para עֲבָדָיו está justificado contextualmente. No aparece el nombre divino. La decisión teológica de mantener la agencia divina directa debe conservarse.
  issues:
  - severity: medium
    issue: Notas al pie duplicadas sobre «su corazón»
    rationale: El inglés conserva una sola nota sobre el singular colectivo; el español introduce dos notas esencialmente equivalentes, lo cual añade ruido innecesario y no cumple bien la disciplina de notas significativas y no redundantes.
  - severity: medium
    issue: La frase «tratar con engaño a sus siervos» debilita el matiz adversativo
    rationale: El hebreo לְהִתְנַכֵּל בַּעֲבָדָיו expresa obrar astuta u hostilmente contra sus siervos; «tratar con engaño a» puede sonar más neutral en español que «actuar/proceder engañosamente contra».
  - severity: low
    issue: «Volvió su corazón» suena algo forzado en español
    rationale: Aunque es defendible léxicamente, en español bíblico corriente «cambió el corazón de ellos» o «volvió el corazón de ellos» resulta más claro. El ajuste mejora legibilidad sin suavizar la agencia divina ni perder el singular colectivo.
  revised_spanish_text: Él cambió el corazón[a] de ellos para odiar a su pueblo, para actuar con engaño contra sus siervos.
  revised_footnotes:
  - marker: a
    text: Hebreo «su corazón» (singular), una expresión colectiva para el pueblo como un todo.
    reason: lexical_alternative
  revision_rationale: Se elimina la duplicación de notas y se conserva una sola nota que explica el singular colectivo de לִבָּם. «Cambió el corazón de ellos» suena más natural y claro en español que «volvió su corazón», sin reducir la fuerza de la agencia divina. «Actuar con engaño contra sus siervos» expresa mejor el sentido hostil y astuto de לְהִתְנַכֵּל בַּעֲבָדָיו que «tratar con engaño a sus siervos».
