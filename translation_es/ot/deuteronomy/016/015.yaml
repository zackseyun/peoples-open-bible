translation:
  language: es
  text: Por siete días celebrarás una fiesta para Yahvé tu Dios en el lugar que Yahvé escogerá, porque Yahvé tu Dios te bendecirá en toda tu producción y en toda la obra de tus manos, y estarás totalmente gozoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estarás solo gozoso» o «ciertamente te regocijarás». La expresión hebrea enfatiza un gozo pleno, sin mezcla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּחֹג
  english_pob_choice: shall celebrate a feast
  chosen_spanish: celebrarás fiesta
  alternatives_spanish:
  - guardarás la fiesta
  - celebrarás la fiesta
  lexicon: HALOT
  rationale: חָגַג expresa la celebración de una fiesta de peregrinación; en español, «celebrar fiesta» conserva el carácter festivo sin reducirlo a una mera alegría interior.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el culto de Yahvé
  lexicon: HALOT
  rationale: La preposición marca orientación o dedicación de la fiesta a Yahvé. «Para Yahvé» suena natural en español y preserva esa dirección cultual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino como «Yahvé», conforme al criterio del proyecto, evitando la sustitución por un título.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: in the place that Yahweh will choose
  chosen_spanish: en el lugar que Yahvé escogerá
  alternatives_spanish:
  - en el lugar que Yahvé elegirá
  - en el sitio que Yahvé escogerá
  lexicon: HALOT
  rationale: La expresión designa el sitio de culto escogido por Dios. «En el lugar» refleja ב + מקום con naturalidad; «escogerá» conserva la elección soberana del verbo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la celebración y del gozo; «porque» es la equivalencia causal más clara y directa en español.
- source_word: יְבָרֶכְךָ
  english_pob_choice: will bless you
  chosen_spanish: te bendecirá
  alternatives_spanish:
  - te prosperará
  - te colmará de bendición
  lexicon: HALOT
  rationale: El pi‘el de ברך es la fórmula habitual de bendición pactal. «Te bendecirá» conserva la fuerza teológica y evita estrechar el sentido a prosperidad material.
- source_word: תְּבוּאָתְךָ
  english_pob_choice: your produce
  chosen_spanish: tu fruto
  alternatives_spanish:
  - tu cosecha
  - tu producción
  lexicon: HALOT
  rationale: תְּבוּאָה abarca el rendimiento agrícola de manera amplia. «Tu fruto» es idiomático en español bíblico y mantiene la amplitud del término sin limitarlo solo al grano.
- source_word: מַעֲשֵׂה יָדֶיךָ
  english_pob_choice: the work of your hands
  chosen_spanish: la obra de tus manos
  alternatives_spanish:
  - el trabajo de tus manos
  - todo lo que hagas con tus manos
  lexicon: HALOT
  rationale: El hebreo expresa un modismo de labor y sus resultados. «La obra de tus manos» preserva el giro idiomático y su resonancia bíblica en español.
- source_word: וְהָיִיתָ
  english_pob_choice: and you shall be
  chosen_spanish: y estarás
  alternatives_spanish:
  - y serás
  - y quedarás
  lexicon: HALOT
  rationale: Aquí introduce el estado resultante de la bendición. «Estarás» comunica bien el estado resultante en español y se ajusta al predicado adjetival siguiente.
- source_word: אַךְ
  english_pob_choice: altogether
  chosen_spanish: totalmente
  alternatives_spanish:
  - solo
  - únicamente
  - completamente
  lexicon: HALOT
  rationale: אַךְ intensifica la plenitud del estado final, no una restricción simple. «Totalmente» reproduce la idea de gozo sin mezcla de modo natural en español.
- source_word: שָׂמֵחַ
  english_pob_choice: joyful
  chosen_spanish: gozoso
  alternatives_spanish:
  - alegre
  - regocijado
  lexicon: HALOT
  rationale: Como adjetivo predicativo, describe el estado de la persona. «Gozoso» expresa alegría plena y mantiene un registro digno y bíblico en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El versículo repite el Tetragrama como nombre propio del Dios del pacto. Se conserva «Yahvé» para no ocultar el nombre detrás de un título y mantener la coherencia del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza final de וְהָיִיתָ אַךְ שָׂמֵחַ
  english_pob_reading: and you shall be altogether joyful
  chosen_spanish_reading: y estarás totalmente gozoso
  alternative_spanish_readings:
  - y estarás solo gozoso
  - y estarás completamente gozoso
  - y te regocijarás
  rationale: El hebreo admite un matiz de totalidad o de exclusividad. En este contexto, tras la bendición en la cosecha y el trabajo, la lectura más natural es la de gozo pleno y sin mezcla; «totalmente gozoso» preserva esa intensificación sin borrar la ambigüedad.
  doctrine_reference: HALOT / English POB audit note on אַךְ and שָׂמֵחַ
translation_notes:
  revision_awareness: 'La revisión más reciente del POB en inglés no introdujo cambios: el texto base permanece con el mismo análisis léxico y teológico, y el consenso de revisión fue de alta concordancia sin observaciones. La presente versión española sigue ese estado estable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para el Tetragrama.
  - Se preserva la distinción entre celebración cultual y simple emoción con «celebrar fiesta».
  - «Fruto» se usó para תְּבוּאָה por amplitud semántica; no se estrechó solo a «cosecha».
  - «La obra de tus manos» conserva el modismo hebreo sin explicitarlo en exceso.
  - El cierre se traduce como gozo pleno, respetando la tensión entre «solo» y «plenamente» documentada en la fuente.
