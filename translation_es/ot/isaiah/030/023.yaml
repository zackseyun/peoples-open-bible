base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/023.yaml
  text: And he will give rain for your seed with which you sow the ground[a], and bread from the produce of the ground; and it will be rich and plentiful[b]. On that day your livestock will graze in a broad pasture.
  footnotes:
