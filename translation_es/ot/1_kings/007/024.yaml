revisions:
- from: Y había calabazas[a] debajo de su borde, alrededor, rodeándolo; diez por codo, circundando el Mar alrededor. Las calabazas estaban en dos hileras, fundidas en una sola pieza con él.
  to: Había calabazas[a] debajo de su borde, alrededor, rodeándolo; diez por codo, rodeando el Mar por todos lados. Las calabazas estaban en dos hileras, fundidas en una sola pieza con este.
  rationale: 'Se hicieron ajustes menores de estilo y naturalidad en español sin cambiar el sentido fuente: se eliminó el «Y» inicial, se reemplazó la redundancia menos idiomática «circundando el Mar alrededor» por «rodeando el Mar por todos lados» para conservar el énfasis hebreo de manera natural, y se suavizó el pronombre final a «con este» para referirse al Mar como objeto fundido sin aspereza gramatical. La nota léxica y las decisiones principales se mantienen.'
