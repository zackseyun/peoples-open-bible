translation:
  language: es
  text: Grande en consejo y poderoso en hechos, cuyos ojos están abiertos sobre todos los caminos de los hijos del hombre[a], para dar a cada hombre según sus caminos y según el fruto de sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre todos los caminos de la humanidad». La expresión hebrea «hijos del hombre» es colectiva y se refiere a los seres humanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדֹל הָעֵצָה
  english_pob_choice: great in counsel
  chosen_spanish: Grande en consejo
  alternatives_spanish:
  - grande en plan
  - grande en propósito
  lexicon: HALOT
  rationale: עֵצָה puede significar consejo, plan o propósito. «Consejo» conserva la idea de sabiduría deliberativa e intención, y en español suena natural en una alabanza a la acción soberana de Dios.
- source_word: רַב הָעֲלִילִיָּה
  english_pob_choice: mighty in deed
  chosen_spanish: poderoso en obras
  alternatives_spanish:
  - grande en acción
  - abundante en obras
  lexicon: HALOT
  rationale: עֲלִילִיָּה refiere a acción, hecho o realización. «Poderoso en obras» mantiene el paralelismo con «en consejo» y expresa con dignidad la eficacia de Dios sin sobreexplicar.
- source_word: עֵינֶיךָ פְקֻחוֹת
  english_pob_choice: whose eyes are open
  chosen_spanish: cuyos ojos están abiertos
  alternatives_spanish:
  - tus ojos están abiertos
  - que ve todo
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica de ojos abiertos para reflejar la omnisciencia activa de Dios. «Cuyos» reproduce bien la cláusula relativa del hebreo sin volverla abstracta.
- source_word: עַל כָּל דַּרְכֵי בְּנֵי אָדָם
  english_pob_choice: upon all the ways of the sons of man
  chosen_spanish: sobre todos los caminos de los hijos de Adán
  alternatives_spanish:
  - sobre todos los caminos de la humanidad
  - sobre todos los caminos de los seres humanos
  lexicon: HALOT
  rationale: דַּרְכֵי se traduce como «caminos» en el sentido de conducta o manera de vivir. בְּנֵי אָדָם conserva la forma colectiva masculina del hebreo con «hijos de Adán»; su sentido inclusivo queda implícito por el contexto y por el empleo representativo del hebreo.
- source_word: לָתֵת לְאִישׁ
  english_pob_choice: to give to each man
  chosen_spanish: para dar a cada hombre
  alternatives_spanish:
  - para dar a cada persona
  - para retribuir a cada uno
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. אִישׁ es singular distributivo; «cada hombre» preserva esa fuerza representativa mejor que una forma más general, sin perder claridad en español.
- source_word: כִּדְרָכָיו
  english_pob_choice: according to his ways
  chosen_spanish: según sus caminos
  alternatives_spanish:
  - según su manera de vivir
  - conforme a su conducta
  lexicon: HALOT
  rationale: Se mantiene el plural «caminos» para reproducir la metáfora hebrea y el eco con el sintagma anterior. En español comunica bien la idea de conducta o curso de vida.
- source_word: וְכִפְרִי מַעֲלָלָיו
  english_pob_choice: and according to the fruit of his deeds
  chosen_spanish: y según el fruto de sus obras
  alternatives_spanish:
  - y según el resultado de sus acciones
  - y según el fruto de sus hechos
  lexicon: HALOT
  rationale: פְּרִי se conserva como «fruto» para mantener la metáfora bíblica. מַעֲלָלִים son actos u obras con peso moral; «obras» es claro y digno en español y conserva la relación retributiva del texto.
theological_decisions:
- issue: Imagen antropomórfica para la omnisciencia divina
  english_pob_reading: Retain the concrete expression 'whose eyes are open' rather than abstracting to 'who sees everything.'
  chosen_spanish_reading: Conservar «cuyos ojos están abiertos» en vez de convertirlo en «que todo lo ve».
  alternative_spanish_readings:
  - que ve todo
  - que observa todos los caminos humanos
  rationale: El hebreo usa imagen corporal para expresar la conciencia exhaustiva de Dios. Mantener la imagen protege la fuerza literaria del versículo y evita una abstracción que el texto no exige.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Lenguaje humano colectivo con forma masculina
  english_pob_reading: Use 'sons of man' and 'each man' in the main text.
  chosen_spanish_reading: Usar «hijos de Adán» y «cada hombre» en el texto principal.
  alternative_spanish_readings:
  - humanidad
  - cada persona
  rationale: El hebreo presenta expresiones masculinas representativas y colectivas. Se conserva esa forma en el texto principal, porque el pasaje enfatiza el trato individual de Dios dentro de la humanidad.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'La revisión más reciente informó que no hacía falta ningún cambio: el acuerdo con el texto fuente y con el expediente inglés es alto, con solo observaciones menores. Esta propuesta conserva ese perfil y traduce directamente desde el hebreo con apoyo del audit trail en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca en el contexto inmediato; aquí el versículo habla a Dios mediante el pronombre y la imagen antropomórfica, por lo que no se inserta el nombre.
  - «Consejo / obras / caminos / fruto» mantiene el paralelismo hebreo y evita sustituirlo por paráfrasis teológicas más amplias.
  - Se preserva el singular distributivo de אִישׁ con «cada hombre», coherente con el expediente inglés y con la forma representativa del hebreo.
