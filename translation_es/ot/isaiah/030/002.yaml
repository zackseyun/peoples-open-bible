    text: 'O «pero no han preguntado por mi consejo» o «pero no me han consultado»; el hebreo dice literalmente: «pero a mi boca no han preguntado».'
    reason: lexical_alternative
  - marker: b
    text: O «para fortalecerse en la fortaleza de Faraón»; la expresión hebrea puede destacar tanto la búsqueda de protección como de fuerza.
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a las expresiones que explican. También se cambió «a mi boca» por «de mi boca» para conservar la imagen hebrea con una formulación más natural y más cercana al sentido auditado «asked at my mouth». Se mantuvo el resto del texto porque es fiel al hebreo y claro en español.
