revisions:
- from: En el tercer año de su reinado[a], dio un banquete para todos sus oficiales y servidores —el ejército de Persia y Media, los nobles[b] y los oficiales de las provincias, delante de él[c].
  to: 'En el tercer año de su reinado, dio un banquete[a] para todos sus oficiales y servidores: el ejército de Persia y Media,[b] los nobles y los oficiales de las provincias, en su presencia[c].'
  rationale: Se reubicó la nota sobre מִשְׁתֶּה al sustantivo «banquete», se restauró una nota que refleje la alternativa de segmentación documentada en el inglés para el sintagma persa, y se reformuló el cierre como «en su presencia» para que לְפָנָיו modifique claramente a toda la enumeración, no solo al último grupo.
