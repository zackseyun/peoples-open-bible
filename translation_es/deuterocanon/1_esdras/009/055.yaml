translation:
  language: es
  text: Porque también fueron imbuidos en las palabras en las cuales habían sido instruidos[a][b], y fueron reunidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego aquí es poco común y también puede entenderse más literalmente como «imbuidos» o «inspirados»; el paralelo hebreo sugiere la idea de adquirir comprensión en las palabras de la Ley.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo en Nehemías 8:13 dice de manera más directa que se reunieron para comprender las palabras de la Ley. 1 Esdras presenta la escena en una forma griega condensada.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La conjunción introduce una explicación causal o de resultado; «porque» comunica bien esa relación en español sin volver la frase artificial.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - incluso
  lexicon: BDAG
  rationale: Conserva el valor aditivo de la partícula griega dentro de la cláusula, en paralelo con el inglés POB «also».
- source_word: ἐνεφυσιώθησαν
  english_pob_choice: were inspired
  chosen_spanish: fueron imbuidos
  alternatives_spanish:
  - fueron inspirados
  - fueron instruidos
  - fueron llenados
  lexicon: LSJ
  rationale: El verbo es raro y el inglés POB señala una tensión entre «imbued» e «inspired». «Imbuidos» preserva mejor la imagen poco común y evita reducir demasiado el matiz a mera enseñanza; la nota explica la alternativa de comprensión instruccional apoyada por el paralelo hebreo.
- source_word: ἐν τοῖς ῥήμασιν
  english_pob_choice: in the words
  chosen_spanish: por las palabras
  alternatives_spanish:
  - en las palabras
  - en los dichos
  - en los asuntos
  lexicon: BDAG
  rationale: En español, «imbuidos por las palabras» expresa con naturalidad la relación instrumental o de influencia del texto sobre los oyentes, manteniendo el sustantivo «palabras» que refleja ῥήματα.
- source_word: οἷς ἐδιδάχθησαν
  english_pob_choice: in which they had been instructed
  chosen_spanish: en las cuales habían sido instruidos
  alternatives_spanish:
  - que les habían enseñado
  - en que habían sido enseñados
  - de las cuales habían sido instruidos
  lexicon: BDAG
  rationale: Se conserva el relativo y la pasiva, siguiendo de cerca la forma griega y el sentido de instrucción recibida.
- source_word: ἐπισυνήχθησαν
  english_pob_choice: they were gathered together
  chosen_spanish: fueron reunidos juntos
  alternatives_spanish:
  - fueron congregados
  - se reunieron
  - fueron juntados
  lexicon: BDAG
  rationale: La pasiva griega se refleja con «fueron reunidos»; «juntos» refuerza el valor colectivo de ἐπισυνήχθησαν sin introducir un verbo eclesiástico más cargado que el texto no exige.
theological_decisions:
- issue: Relación entre la lectura griega y el paralelo hebreo sobre la comprensión de la Ley
  english_pob_reading: The Greek verb rendered 'were instructed' is uncommon here and could be understood more literally as being 'imbued' or 'inspired'; the Hebrew parallel supports the sense of gaining understanding in the words of the law.
  chosen_spanish_reading: «Imbuidos» mantiene la rareza del verbo griego, pero la nota permite entenderlo también como una recepción de comprensión en las palabras de la Ley, en línea con el paralelo hebreo.
  alternative_spanish_readings:
  - fueron instruidos
  - fueron inspirados
  - adquirieron comprensión
  rationale: La POB inglesa preserva una tensión lexical entre influencia interior y aprendizaje. En español, «imbuidos» deja espacio para esa ambigüedad y la nota aclara el apoyo del paralelo hebreo sin borrar la especificidad griega.
  doctrine_reference: Nehemías 8:13; 1 Esdras 9:55
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una solución más natural para ἐνεφυσιώθησαν y ἐπισυνήχθησαν, pero conserva en español la tensión entre inspiración e instrucción mediante el verbo poco común «imbuidos» y una nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «palabras» para ῥήματα, en consonancia con el contexto de estudio de la Ley.
  - Se conserva la pasiva griega en «fueron reunidos» para ἐπισυνήχθησαν.
  - No se sustituye la rareza de ἐνεφυσιώθησαν por una paráfrasis explicativa dentro del texto principal; la explicación queda en nota.
  - El texto evita terminología eclesiástica como «congregados» o «asamblea» porque el griego aquí habla de reunión, no de institución litúrgica.
