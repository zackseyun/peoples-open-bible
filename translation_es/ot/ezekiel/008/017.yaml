base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/008/017.yaml
  text: Then he said to me[a], “Have you seen, son of man? Is it too trivial a thing for the house of Judah to do the abominations that they have done here, that they should also fill the land with violence and turn again to provoke me? And behold[b], they are putting the branch to their nose.”
  footnotes:
  - marker: a
    text: Or, following some ancient witnesses, “they are putting the branch to my nose.” The Hebrew text reads “their nose.”
    reason: textual_variant
  - marker: b
    text: The phrase “putting the branch to their nose” is obscure and may refer to an idolatrous ritual gesture.
    reason: cultural_note
