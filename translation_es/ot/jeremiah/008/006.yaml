translation:
  language: es
  text: 'He prestado atención y he escuchado: no hablan rectamente[a]. Ningún hombre se arrepiente de su maldad, diciendo: «¿Qué he hecho?». Cada uno sigue su propia carrera[c][b], como un caballo que se precipita a la batalla.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hablan lo que es recto». Literalmente: «no así hablan».'
    reason: lexical_alternative
  - marker: b
    text: «Hombre» traduce אישׁ, una forma masculina singular usada aquí de manera representativa.
    reason: lexical_alternative
  - marker: c
    text: 'O: «cada uno vuelve a su propia carrera o curso». La expresión hebrea pinta una perseverancia precipitada en el camino escogido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשַׁ֤בְתִּי
  english_pob_choice: I have paid attention
  chosen_spanish: He prestado atención
  alternatives_spanish:
  - He escuchado con atención
  - He dado oído
  lexicon: HALOT
  rationale: קשׁב expresa atención deliberada, no solo oír. «He prestado atención» conserva el matiz de vigilancia y cuidado del hablante.
- source_word: וָאֶשְׁמָע
  english_pob_choice: and listened
  chosen_spanish: y he escuchado
  alternatives_spanish:
  - y he oído
  - y he prestado oído
  lexicon: HALOT
  rationale: שׁמע puede significar oír o escuchar. Junto con הִקְשַׁבְתִּי, «he escuchado» mantiene la idea de recepción atenta, no mera percepción auditiva.
- source_word: לוֹא כֵן יְדַבֵּרוּ
  english_pob_choice: they do not speak rightly
  chosen_spanish: no hablan rectamente
  alternatives_spanish:
  - no hablan así
  - no dicen lo que es recto
  lexicon: HALOT
  rationale: La expresión literal es «no así hablan». En contexto evalúa la calidad moral o veraz de su խոս, y «rectamente» conserva el juicio sin volverlo excesivamente explicativo.
- source_word: אֵין אִישׁ
  english_pob_choice: No man
  chosen_spanish: Ningún hombre
  alternatives_spanish:
  - No hay nadie
  - Ninguna persona
  lexicon: HALOT
  rationale: אִישׁ es un singular masculino representativo. «Ningún hombre» conserva la forma del hebreo y su fuerza genérica, siguiendo la decisión de mantener el valor masculino representativo cuando el texto lo usa.
- source_word: נִחָם
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - se lamenta
  - se desdice
  lexicon: HALOT
  rationale: En este contexto נִחָם apunta al pesar que conduce a un cambio interior respecto del mal cometido. «Se arrepiente» comunica mejor esa fuerza moral y volitiva en español.
- source_word: עַל רָעָתוֹ
  english_pob_choice: of his evil
  chosen_spanish: de su maldad
  alternatives_spanish:
  - de su mal
  - de su maldad cometida
  lexicon: HALOT
  rationale: רָעָה aquí tiene peso ético, no solo desgracia. «Maldad» transmite con claridad la dimensión moral del pecado, sin suavizarla.
- source_word: לֵאמֹר מֶה עָשִׂיתִי
  english_pob_choice: saying, ‘What have I done?’
  chosen_spanish: 'diciendo: «¿Qué he hecho?»'
  alternatives_spanish:
  - 'diciendo: «¿Qué he hecho mal?»'
  lexicon: HALOT
  rationale: La autoinculpación hebrea es directa. Mantener la frase breve evita añadir interpretaciones no explícitas en el texto.
- source_word: כֻּלֹּה
  english_pob_choice: Every one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Todos
  - Todo hombre
  lexicon: HALOT
  rationale: 'El sentido distributivo es importante: se señala a cada individuo. «Cada uno» lo expresa con naturalidad en español.'
- source_word: שָׁב
  english_pob_choice: turns
  chosen_spanish: vuelve
  alternatives_spanish:
  - se vuelve
  - retorna
  lexicon: HALOT
  rationale: שׁוב puede significar volver o retornar. Aquí no describe conversión positiva sino un volver a su propio rumbo; «vuelve» evita sugerir arrepentimiento.
- source_word: ב/מרצות/ם
  english_pob_choice: in his own course
  chosen_spanish: por su propio curso
  alternatives_spanish:
  - en su propia carrera
  - por su propio correr
  lexicon: HALOT
  rationale: מרוצה denota carrera o curso de correr. «Por su propio curso» suena natural en español y conserva la idea de trayectoria propia y persistente.
- source_word: כְּ/ס֥וּס שׁוֹטֵ֖ף בַּ/מִּלְחָמָֽה
  english_pob_choice: like a horse rushing into battle
  chosen_spanish: como un caballo que se lanza de lleno a la batalla
  alternatives_spanish:
  - como un caballo que irrumpe en la batalla
  - como un caballo que embiste en la batalla
  lexicon: HALOT
  rationale: שוטף comunica impulso violento y precipitado. «Se lanza de lleno» reproduce la imagen de avance impetuoso sin perder naturalidad en español.
theological_decisions:
- issue: Valor representativo de אישׁ
  english_pob_reading: No man renders Hebrew אישׁ, a masculine singular form used here representatively.
  chosen_spanish_reading: Ningún hombre conserva el singular masculino representativo del hebreo.
  alternative_spanish_readings:
  - Nadie
  - Ninguna persona
  rationale: Se mantiene el valor formal del singular masculino porque el hebreo lo usa de manera representativa. Así se evita neutralizar una señal gramatical que el texto presenta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Sentido de נִחָם en contexto moral
  english_pob_reading: repents
  chosen_spanish_reading: se arrepiente
  alternative_spanish_readings:
  - se lamenta
  - cambia de parecer
  rationale: El contexto trata del reconocimiento del mal y de una posible vuelta interior. «Se arrepiente» comunica el giro moral sin diluirlo en simple pesar emocional.
  doctrine_reference: Uso contextual de נִחָם / arrepentimiento en textos proféticos
translation_notes:
  revision_awareness: El contexto de auditoría en inglés indica alta concordancia y sin revisiones sustantivas; por eso el español sigue de cerca las decisiones léxicas ya validadas, conservando la tensión entre la literalidad de la expresión hebrea y la fluidez idiomática del español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «arrepiente» para נִחָם por coherencia con el valor moral reconocido en el contexto.
  - Se usa «caballo» en singular para el símil, reflejando el hebreo y el estilo del POB inglés.
  - Las comillas angulares se usan para el discurso directo en español.
  - Los marcadores de nota [a], [b], [c] aparecen en el texto exactamente donde corresponde su nota alternativa.
