translation:
  language: es
  text: 'Entonces el rey dijo: «Tráiganme una espada». Y trajeron la espada ante el rey.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva bien esa secuencia en español sin volver la frase mecánica.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Sustantivo definido directo; «rey» es la equivalencia natural y fiel en español.
- source_word: קְחוּ לִי
  english_pob_choice: Bring me
  chosen_spanish: Tráiganme
  alternatives_spanish:
  - Llévenme
  - Traigan para mí
  lexicon: HALOT
  rationale: Aunque el verbo base puede significar «tomar», aquí funciona idiomáticamente como petición de traer algo. «Tráiganme» expresa mejor la fuerza contextual y respeta el plural imperativo.
- source_word: חָרֶב
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  lexicon: HALOT
  rationale: El sustantivo aparece sin artículo la primera vez, por lo que conviene un indefinido en español.
- source_word: וַיָּבִאוּ
  english_pob_choice: So they brought
  chosen_spanish: Y le llevaron
  alternatives_spanish:
  - Entonces le llevaron
  - Y trajeron
  lexicon: HALOT
  rationale: El verbo puede rendirse naturalmente como «llevaron» en este contexto de traer algo ante alguien; el objeto indirecto «le» refleja que la espada se lleva al rey.
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  lexicon: HALOT
  rationale: La forma con artículo retoma claramente el arma pedida antes; por eso se conserva la definitud.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: «Delante de» es una correspondencia natural para el marco espacial/cortesano de לִפְנֵי sin perder la idea de presentación ante la autoridad.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran un verso narrativo directo sin variantes textuales ni tensiones léxicas especiales; la traducción española mantiene la secuencia, la indefinitud inicial de חָרֶב y la referencia definida posterior a la misma espada.
  spanish_consistency_notes:
  - Se preserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se mantiene la repetición de «espada» para reflejar la cohesión del hebreo entre la primera y la segunda mención.
  - «Delante del rey» se entiende en sentido de presentación en corte, acorde con el contexto narrativo.
