  source_alignment_summary: 'El borrador refleja bien la estructura comprimida del hebreo: dos descripciones pasivas seguidas por un verbo plural, y mantiene la literalidad de «tu rostro». Sin embargo, «ante la reprensión» debilita el valor causal/originario de מִן en מִגַּעֲרַת, y el anclaje de la nota [a] está colocado sobre «fuego» aunque la alternativa corresponde a toda la frase final.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «está quemado por el fuego» suena algo pesado y menos idiomático que «está quemado con fuego», que además sigue mejor la decisión inglesa auditada («with fire»). «Está cortado» es aceptable, aunque algo llano; se puede conservar por fidelidad a la compresión. La frase final mejora en naturalidad y precisión con «por la reprensión de tu rostro».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Rostro» preserva correctamente פני/face frente a la alternativa «presencia» en nota. No aparecen términos de glosario sensibles adicionales.
  issues:
  - severity: medium
    issue: «ante la reprensión» no representa bien מִגַּעֲרַת
    rationale: El מן hebreo aquí expresa fuente/causa. «Ante» sugiere mera proximidad o circunstancia, mientras que el audit trail documenta «from/at the rebuke» con sentido causal. En español «por la reprensión» o «a causa de la reprensión» preserva mejor ese valor.
  - severity: low
    issue: «por el fuego» es menos natural que «con fuego» en este contexto
    rationale: Para בָאֵשׁ, «con fuego» suena más idiomático en español bíblico actual y refleja mejor el instrumental simple del hebreo y la decisión inglesa «with fire».
  - severity: medium
    issue: La nota [a] está anclada en «fuego», pero su contenido explica una alternativa para la cláusula final
    rationale: La nota habla de «por la reprensión de tu presencia perecen» / «de la reprensión de tu rostro», no de «fuego». El marcador debe colocarse junto a la frase final relevante, no en un segmento no relacionado.
