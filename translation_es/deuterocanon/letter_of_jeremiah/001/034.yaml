translation:
  language: es
  text: Asimismo, no pueden dar ni riqueza ni bronce[a]; si alguien les hace un voto y no lo cumple, no lo exigirán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cobre', quizá insinuando dinero o valores hechos de bronce.
    reason: lexical_alternative
  - marker: b
    text: O 'no lo buscarán'. El griego dice literalmente 'buscarán' o 'lo buscarán'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Asimismo
  alternatives_spanish:
  - Igualmente
  - Del mismo modo
  lexicon: BDAG
  rationale: Marca la continuidad con el ejemplo anterior sin sonar rígido; en español natural, 'Asimismo' conserva el valor de conexión argumentativa de ὡσαύτως.
- source_word: πλοῦτον
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: BDAG
  rationale: πλοῦτον designa riqueza en sentido amplio; 'riqueza' reproduce bien el sustantivo abstracto y suena natural en español bíblico contemporáneo.
- source_word: χαλκὸν
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - metal
  lexicon: BDAG
  rationale: Se mantiene el metal nombrado por el griego. 'Bronce' conserva la forma más transparente del texto fuente, aunque en contexto pueda sugerir también valor monetario o bienes de metal.
- source_word: οὐ μὴ δύνωνται δοῦναι
  english_pob_choice: they are not able to give
  chosen_spanish: no pueden dar
  alternatives_spanish:
  - no son capaces de dar
  - de ninguna manera pueden dar
  lexicon: BDAG
  rationale: La doble negación enfática del griego se expresa de manera natural sin añadir énfasis innecesario en español; 'no pueden dar' comunica la incapacidad real atribuida a los ídolos.
- source_word: ἐάν τις αὐτοῖς εὐχὴν εὐξάμενος
  english_pob_choice: if someone makes a vow to them
  chosen_spanish: si alguien les hace un voto
  alternatives_spanish:
  - si alguno les promete un voto
  - si alguien hace un voto a ellos
  lexicon: BDAG
  rationale: La construcción cognada εὐχὴν εὐξάμενος se entiende idiomáticamente como hacer un voto. 'Les hace un voto' preserva el destinatario y la naturaleza votiva sin calcar el griego.
- source_word: μὴ ἀποδῷ
  english_pob_choice: does not pay it
  chosen_spanish: no lo cumple
  alternatives_spanish:
  - no lo paga
  - no lo entrega
  lexicon: BDAG
  rationale: Con votos, ἀποδίδωμι puede significar cumplir o realizar lo prometido. 'No lo cumple' evita una lectura demasiado económica y comunica bien la obligación incumplida.
- source_word: οὐ μὴ ἐπιζητήσωσιν
  english_pob_choice: they will certainly not demand it
  chosen_spanish: no lo reclamarán
  alternatives_spanish:
  - no lo exigirán
  - no lo buscarán
  lexicon: BDAG
  rationale: ἐπιζητέω puede implicar buscar o reclamar/exigir. En este contexto la idea es que los ídolos no piden cuentas por el voto incumplido; 'no lo reclamarán' preserva esa fuerza sin sonar forzado.
theological_decisions:
- issue: Impotencia de los ídolos frente a bienes materiales y votos
  english_pob_reading: The verse states that idols neither bestow material benefit nor hold worshipers accountable for unfulfilled vows.
  chosen_spanish_reading: El versículo afirma que los ídolos no pueden otorgar bienes materiales ni hacer valer el voto incumplido.
  alternative_spanish_readings:
  - no pueden dar ni riqueza ni bronce, y tampoco reclamar el voto incumplido
  - no conceden bienes ni exigen cumplimiento de votos
  rationale: 'La redacción española conserva las dos afirmaciones del griego: incapacidad de dar y falta de exigencia ante votos no cumplidos. Se mantiene la tensión textual sin expandirla más allá de lo que dice el pasaje.'
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y la primacía de la fuente original.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés. Se adopta una equivalencia óptima: se conserva ''bronce'' para χαλκὸν y se vierte ἐπιζητήσωσιν con ''reclamarán'' para reflejar mejor el contexto de un voto incumplido, en línea con la revisión más reciente del expediente inglés.'
  spanish_consistency_notes:
  - Se usa 'voto' de manera consistente para εὐχὴν, no 'promesa' ni 'oración', porque el contexto exige una obligación votiva.
  - '''Bronce'' se mantiene como metal nombrado por el texto; la nota recoge la posible extensión semántica a dinero o valores.'
  - '''No pueden dar'' respeta la negación fuerte sin sobrerrepresentarla con adverbios redundantes.'
  - '''No lo reclamarán'' evita la traducción demasiado literal de ''buscar'' y expresa el matiz de exigir cuentas en contexto.'
  - Se evita el lenguaje eclesiástico tradicional innecesario para conservar la transparencia hacia el original.
