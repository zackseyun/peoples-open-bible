translation:
  language: es
  text: y los primogénitos de nuestros hijos y de nuestro ganado[a], como está escrito en la Ley, y los primogénitos de nuestro ganado vacuno y de nuestros rebaños[b], para llevar a la casa de nuestro Dios, a los sacerdotes que ministran en la casa de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, conforme a los mandamientos de la Torá acerca de los primogénitos de personas y animales.
    reason: cross_reference
  - marker: b
    text: O «los primogénitos de nuestro ganado vacuno y de nuestras ovejas/cabras».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹרוֹת בָּנֵינוּ
  english_pob_choice: the firstborn of our sons
  chosen_spanish: los primogénitos de nuestros hijos
  alternatives_spanish:
  - los primogénitos entre nuestros hijos
  lexicon: HALOT
  rationale: בְּכֹרוֹת designa a los primogénitos; en español, «primogénitos» mantiene el sentido técnico y natural. «De nuestros hijos» conserva la relación genitiva del hebreo sin añadir precisión no explicitada por el texto.
- source_word: וּבְהֶמְתֵּינוּ
  english_pob_choice: of our livestock
  chosen_spanish: de nuestro ganado
  alternatives_spanish:
  - de nuestros animales
  - de nuestro ganado doméstico
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animales domésticos en general. «Ganado» es un equivalente bíblico y claro en español; aquí funciona bien junto con la especificación posterior de vacuno y rebaños.
- source_word: כַּכָּתוּב בַּתּוֹרָה
  english_pob_choice: as it is written in the Law
  chosen_spanish: como está escrito en la Ley
  alternatives_spanish:
  - según está escrito en la Ley
  - como está escrito en la Torá
  lexicon: HALOT
  rationale: La fórmula remite a la instrucción escrita de la Torá. «Ley» conserva el referente bíblico habitual sin perder la conexión con la Torá; se mantiene el tono formular y textual.
- source_word: בְּכוֹרֵי בְקָרֵינוּ וְצֹאנֵינוּ
  english_pob_choice: the firstborn of our herds and of our flocks
  chosen_spanish: los primogénitos de nuestro ganado vacuno y de nuestros rebaños
  alternatives_spanish:
  - los primogénitos de nuestros hatos y de nuestros rebaños
  - los primogénitos de nuestro ganado y de nuestros rebaños
  lexicon: HALOT
  rationale: בְקָרִים se refiere al ganado vacuno; צֹאן al ganado menor, especialmente ovejas y cabras. «Ganado vacuno» y «rebaños» distinguen con claridad las dos categorías animales, preservando el paralelismo sin volverlo rígido.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: para traerlos
  alternatives_spanish:
  - para llevarlos
  - para presentarlos
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Traerlos» se ajusta al contexto de llevar ofrendas al templo y enlaza naturalmente con los objetos plurales ya mencionados.
- source_word: לְבֵית אֱלֹהֵינוּ
  english_pob_choice: to the house of our God
  chosen_spanish: a la casa de nuestro Dios
  alternatives_spanish:
  - al templo de nuestro Dios
  - a la casa de nuestro Dios
  lexicon: HALOT
  rationale: «Casa de nuestro Dios» reproduce con fidelidad la expresión hebrea y evita sustituirla por «templo», que sería más interpretativo. La preposición «a» refleja adecuadamente el movimiento hacia ese lugar.
- source_word: לַכֹּהֲנִים הַמְשָׁרְתִים
  english_pob_choice: to the priests who minister
  chosen_spanish: a los sacerdotes que ministran
  alternatives_spanish:
  - a los sacerdotes que sirven
  - a los sacerdotes ministrantes
  lexicon: HALOT
  rationale: הַמְשָׁרְתִים describe un servicio ritual continuo. «Ministran» conserva el matiz cultual y es comprensible en español eclesial contemporáneo.
- source_word: בְּבֵית אֱלֹהֵינוּ
  english_pob_choice: in the house of our God
  chosen_spanish: en la casa de nuestro Dios
  alternatives_spanish:
  - en la casa de nuestro Dios
  - en el templo de nuestro Dios
  lexicon: HALOT
  rationale: La repetición del hebreo se conserva para mantener el énfasis del texto. «En la casa de nuestro Dios» respeta el paralelismo y la terminología de la primera ocurrencia.
theological_decisions:
- issue: 'Cómo rendir בֵּית אֱלֹהֵינוּ: «casa» o «templo»'
  english_pob_reading: house of our God
  chosen_spanish_reading: casa de nuestro Dios
  alternative_spanish_readings:
  - templo de nuestro Dios
  rationale: El hebreo dice literalmente «casa de nuestro Dios». Aunque el referente es el templo, conservar «casa» preserva el vínculo verbal con la fuente y evita una ampliación interpretativa innecesaria.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si explicitar en el texto principal que los primogénitos están vinculados con el cumplimiento de la Torá
  english_pob_reading: retain the broader term 'firstborn' without adding explanatory wording
  chosen_spanish_reading: mantener «primogénitos» sin añadir explicación legal en el cuerpo del versículo
  alternative_spanish_readings:
  - los primogénitos destinados a redención
  - los primogénitos para ofrenda
  rationale: El versículo alude a mandatos de la Ley, pero no desarrolla aquí el mecanismo de redención u ऑफrenda. La traducción conserva esa reserva del texto en lugar de importar detalles legales de otros pasajes.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y la última revisión indicó que no hubo cambios necesarios. Se ha mantenido la estructura del verso, la repetición de «casa de nuestro Dios» y la restricción interpretativa sobre los primogénitos.
  spanish_consistency_notes:
  - Se emplea «Ley» para traducir la referencia a la Torá, siguiendo el uso bíblico convencional y el audit trail en inglés.
  - Se conserva «casa de nuestro Dios» en ambas ocurrencias para reflejar el paralelismo hebreo.
  - «Ministran» se usa en sentido cultual, no meramente administrativo, para הַמְשָׁרְתִים.
  - «Ganado vacuno» / «rebaños» distingue mejor בְקָרִים y צֹאן en español que un solo término genérico.
