base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/006/026.yaml
  text: He also ordered Sisinnes[a], governor of Syria and Phoenicia, and Sathrabuzanes and their associates and the appointed governors in Syria and Phoenicia, to keep away from the place, but to leave Zerubbabel, the servant of the Lord and governor of Judea, and the elders of the Jews alone.
  footnotes:
