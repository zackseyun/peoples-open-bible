translation:
  language: es
  text: 'Por tanto, al llegar a Apolonio, el gobernador[a] de Siria, Fenicia y Cilicia, decía:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «general» o «gobernador militar» para στρατηγόν; el término puede denotar un comandante militar, pero aquí probablemente se refiere a Apolonio en su función de gobierno provincial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - De ahí que
  lexicon: LSJ
  rationale: Aquí ὅθεν funciona de manera inferencial, conectando con la situación previa más que señalando lugar. «Por tanto» mantiene ese enlace discursivo en un español natural y solemne.
- source_word: ἥκων
  english_pob_choice: coming
  chosen_spanish: al llegar
  alternatives_spanish:
  - habiendo llegado
  - llegando
  - cuando llegó
  lexicon: LSJ
  rationale: El participio expresa acción concomitante o antecedente al verbo principal. «Al llegar» reproduce el flujo de la frase sin forzar un calco pesado.
- source_word: πρὸς Ἀπολλώνιον
  english_pob_choice: to Apollonius
  chosen_spanish: a Apolonio
  alternatives_spanish:
  - ante Apolonio
  - hacia Apolonio
  lexicon: BDAG
  rationale: Con un verbo de movimiento, πρὸς indica dirección hacia una persona. En español, «a Apolonio» comunica esa relación de forma idiomática.
- source_word: στρατηγόν
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - general
  - comandante
  - gobernador militar
  lexicon: LSJ
  rationale: En este contexto administrativo sobre varias regiones, στρατηγός señala una autoridad provincial más que un simple jefe militar. «Gobernador» transmite mejor esa función en español.
- source_word: Συρίας τε καὶ Φοινίκης καὶ Κιλικίας
  english_pob_choice: of Syria and Phoenicia and Cilicia
  chosen_spanish: de Siria, Fenicia y Cilicia
  alternatives_spanish:
  - sobre Siria, Fenicia y Cilicia
  - de Siria y de Fenicia y de Cilicia
  lexicon: LSJ
  rationale: Los genitivos dependen de στρατηγόν y designan las regiones bajo su autoridad. Se conserva la lista territorial con puntuación natural en español.
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: decía
  alternatives_spanish:
  - estaba diciendo
  - solía decir
  - iba diciendo
  lexicon: BDAG
  rationale: El imperfecto marca acción en curso o de fondo. «Decía» preserva esa imperfectividad con menos peso que «estaba diciendo», que en español podría sonar más enfático de lo necesario.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «he came» a «coming» para reflejar más de cerca el participio ἥκων; la frase española sigue esa misma decisión participial con «al llegar». También se mantuvo la relación inferencial de ὅθεν con «Por tanto».
  spanish_consistency_notes:
  - Se usa «Apolonio» como forma española del nombre propio.
  - Se evita «SEÑOR» u otra sustitución porque no hay aquí un término divino a matizar.
  - La coma tras «Por tanto» ayuda a reproducir el arranque inferencial y la fluidez del griego.
