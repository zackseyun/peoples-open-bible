    changes_summary: Changed 'belts of kings' to 'loins of kings' for closer lexical accuracy to the Hebrew while retaining formal register; otherwise left the draft unchanged.
translation:
  language: es
  text: 'Así dice Yahvé a su ungido[a], a Ciro, cuya mano derecha he tomado, para someter naciones delante de él y desatar[c] los lomos de reyes, para abrir delante de él puertas[b], y los portones no serán cerrados:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo ''su ungido'': aquí se refiere a Ciro como gobernante comisionado por Yahvé; no debe leerse automáticamente como el título mesiánico escatológico posterior.'
    reason: theological_note
  - marker: b
    text: Hebreo 'puertas' es una forma dual y puede sugerir 'puertas dobles'.
    reason: lexical_alternative
  - marker: c
    text: La expresión 'desatar los lomos de reyes' conserva el hebraísmo del original, que alude a debilitarlos, desarmarlos o llenarlos de temor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor propio del nombre divino con la forma española establecida en el proyecto. Conserva la referencia al nombre del pacto sin ocultarla detrás de un sustituto convencional.
- source_word: לִמְשִׁיחוֹ
  english_pob_choice: his anointed
  chosen_spanish: su ungido
  alternatives_spanish:
  - su Mesías
  - su escogido
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su ungido'. En este contexto se refiere a Ciro como persona comisionada por Yahvé; 'ungido' preserva el sentido lexical sin importar el título mesiánico posterior.
- source_word: לְכוֹרֶשׁ
  english_pob_choice: to Cyrus
  chosen_spanish: a Ciro
  alternatives_spanish:
  - a Cyrus
  lexicon: HALOT
  rationale: Se usa la forma española convencional del nombre propio para una lectura natural y eclesialmente legible.
- source_word: הֶחֱזַקְתִּי בִימִינוֹ
  english_pob_choice: whose right hand I have grasped
  chosen_spanish: a quien tomé de la mano derecha
  alternatives_spanish:
  - cuya mano derecha tomé
  - a quien sostuve de la mano derecha
  lexicon: HALOT
  rationale: La imagen concreta es la de tomar la mano derecha para sostener/fortalecer. 'Tomé de la mano derecha' es natural en español y mantiene la acción corporal del hebreo.
- source_word: לְרַד
  english_pob_choice: to subdue
  chosen_spanish: para someter
  alternatives_spanish:
  - para subyugar
  - para dominar
  lexicon: HALOT
  rationale: En este contexto militar-político, 'someter' comunica la subyugación de naciones con un registro claro y bíblico sin exagerar el matiz de tiranía.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: El contexto es geopolítico; 'naciones' es la equivalencia más directa y natural.
- source_word: וּמָתְנֵי מְלָכִים אֲפַתֵּחַ
  english_pob_choice: and to loosen the loins of kings
  chosen_spanish: y desatar los lomos de reyes
  alternatives_spanish:
  - y aflojar los lomos de reyes
  - y desceñir a los reyes
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo y el valor idiomático documentado por la traducción inglesa. 'Desatar los lomos' deja visible la tensión metafórica sin suavizarla a una explicación.
- source_word: לִפְתֹּחַ לְפָנָיו דְּלָתַיִם
  english_pob_choice: to open doors before him
  chosen_spanish: para abrir delante de él puertas
  alternatives_spanish:
  - para abrir puertas delante de él
  - para abrir ante él puertas
  lexicon: HALOT
  rationale: '''Puertas'' reproduce el dual hebreo sin forzar una construcción técnica en el texto principal. La preposición ''delante de él'' conserva el movimiento del hebreo y el orden narrativo.'
- source_word: וּשְׁעָרִים לֹא יִסָּגֵרוּ
  english_pob_choice: and gates shall not be shut
  chosen_spanish: y las puertas no serán cerradas
  alternatives_spanish:
  - y los portones no serán cerrados
  - y las puertas no se cerrarán
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'puertas' y el sentido pasivo/resultativo del hebreo. 'No serán cerradas' suena más formal y litúrgico en español que una forma estrictamente reflexiva.
theological_decisions:
- issue: לִמְשִׁיחוֹ aplicado a Ciro
  english_pob_reading: his anointed
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  - su elegido
  rationale: Aunque el término comparte familia léxica con 'Mesías', aquí designa a un rey extranjero al que Yahvé ha apartado para una tarea histórica. Traducir 'ungido' conserva la tensión teológica del pasaje y evita resolverla prematuramente en clave cristológica.
  doctrine_reference: Translate titles; preserve lexical/theological tension.
- issue: El valor idiomático de 'los lomos de reyes'
  english_pob_reading: to loosen the loins of kings
  chosen_spanish_reading: desatar los lomos de reyes
  alternative_spanish_readings:
  - aflojar la fuerza de los reyes
  - quebrar la resistencia de los reyes
  rationale: La imagen hebrea alude a debilidad, desarme o terror. Se conserva el hebraísmo en español porque el texto poético lo soporta y porque la versión inglesa también preserva la imagen en lugar de explicarla por completo.
  doctrine_reference: Retain figurative diction when the source text is intentionally vivid.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que prefirió 'loins of kings' frente a 'belts of kings' por mayor cercanía léxica al hebreo. En español se optó por 'lomos' para mantener esa precisión y el registro poético. También se respetó la lectura de Ciro como sujeto histórico del término 'ungido', sin convertirlo en 'Mesías'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de acuerdo con el estándar del proyecto para el nombre divino.
  - Se conserva 'ungido' y no 'Mesías' por la referencia histórica a Ciro.
  - Se mantiene la imaginería corporal ('mano derecha', 'lomos') porque el hebreo es deliberadamente concreto.
  - '''Puertas'' traduce el dual hebreo sin introducir una explicación en el texto principal; la nota recoge la posibilidad de ''puertas dobles''.'
