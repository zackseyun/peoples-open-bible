lexical_decisions:
- source_word: אִם אַיִן
  english_pob_choice: If not
  chosen_spanish: Si no
  alternatives_spanish:
  - De lo contrario
  - Si no es así
  lexicon: HALOT
  rationale: La combinación introduce una condición contraria a la invitación anterior. «Si no» reproduce con naturalidad en español la fuerza condicional breve de «If not» sin añadir contenido ajeno.
- source_word: שְׁמַע לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - oye
  - escúchame atentamente
  lexicon: HALOT
  rationale: שׁמע con ל expresa atención dirigida al hablante. «Escúchame» conserva el imperativo y suena natural en español moderno y digno.
- source_word: הַחֲרֵשׁ
  english_pob_choice: be silent
  chosen_spanish: guarda silencio
  alternatives_spanish:
  - calla
  - mantente en silencio
  lexicon: HALOT
  rationale: El imperativo de חרש pide silencio. «Guarda silencio» mantiene la fuerza de la orden sin sonar abrupto en exceso.
- source_word: וַאֲאַלֶּפְךָ
  english_pob_choice: and I will teach you
  chosen_spanish: y yo te enseñaré
  alternatives_spanish:
  - y te instruiré
  - y yo te instruiré
  lexicon: HALOT
  rationale: El verbo en piel de אלף significa enseñar o instruir. «Te enseñaré» reproduce de forma directa el valor verbal, y el pronombre explícito «yo» ayuda a reflejar el énfasis del hebreo y la progresión del discurso.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - instrucción sabia
  lexicon: HALOT
  rationale: חכמה es el término estándar para «sabiduría». «Sabiduría» conserva el vocabulario temático de la literatura sapiencial sin expansión innecesaria.
translation_notes:
  revision_awareness: El contexto editorial inglés quedó en alta concordancia y sin cambios en la revisión más reciente; por eso la versión española sigue de cerca la sintaxis y las decisiones léxicas ya auditadas, sin introducir lecturas alternativas no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con español moderno.
  - No se añadieron notas al pie porque el pasaje no requiere una alternativa textual o lexical obligatoria para el español.
  - Se evitó «señor»/«SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Sabiduría» conserva la terminología sapiencial habitual y transparente.
