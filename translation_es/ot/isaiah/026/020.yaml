translation:
  language: es
  text: Ve[a], mi pueblo, entra en tus habitaciones y cierra tus puertas detrás de ti; escóndanse[b] por un breve momento, hasta que pase la ira[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus cámaras». El término hebreo puede referirse a habitaciones interiores o cámaras privadas.
    reason: lexical_alternative
  - marker: b
    text: O «escóndete». El hebreo se dirige a «mi pueblo» como un colectivo, por eso «escóndanse» hace explícito en español el sentido colectivo.
    reason: lexical_alternative
  - marker: c
    text: O «hasta que pase la indignación».
    reason: alternative_reading
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: ¡Ve!
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: HALOT
  rationale: El imperativo breve conserva el tono de mandato directo del hebreo. «Ve» es natural en español y mantiene la fuerza de la exhortación.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  - mi nación
  lexicon: HALOT
  rationale: «Pueblo mío» suena más natural en español bíblico y conserva el matiz relacional y de alianza del original. «Mi pueblo» también es posible, pero aquí la inversión enfática mejora la cadencia.
- source_word: בֹּא
  english_pob_choice: enter
  chosen_spanish: Entra
  alternatives_spanish:
  - Ven
  - Pasa
  lexicon: HALOT
  rationale: El imperativo de בוא requiere una entrada a un espacio cerrado. «Entra» expresa esa dirección con claridad en español.
- source_word: בַחֲדָרֶיךָ
  english_pob_choice: your rooms
  chosen_spanish: tus habitaciones
  alternatives_spanish:
  - tus cuartos
  - tus cámaras
  lexicon: HALOT
  rationale: חדר puede referirse a una pieza interior o habitación privada. «Habitaciones» comunica bien el sentido sin forzar un registro arcaico; «cámaras» se reserva como alternativa más tradicional.
- source_word: וּסְגֹר
  english_pob_choice: and shut
  chosen_spanish: y cierra
  alternatives_spanish:
  - y sella
  - y tranca
  lexicon: HALOT
  rationale: «Cerrar» reproduce de forma natural el acto de clausurar la puerta. El hebreo exige una acción concreta de bloqueo; en español «cierra» es idiomático y suficientemente fuerte.
- source_word: דלתיך
  english_pob_choice: your doors
  chosen_spanish: tus puertas
  alternatives_spanish:
  - tus portones
  - tus puertas
  lexicon: HALOT
  rationale: דלת designa puertas. «Puertas» es la equivalencia directa y clara.
- source_word: בַּעֲדֶךָ
  english_pob_choice: behind you
  chosen_spanish: detrás de ti
  alternatives_spanish:
  - tras de ti
  - a tus espaldas
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera natural como «detrás de ti». Conserva la imagen de cerrar la puerta al entrar.
- source_word: חֲבִי
  english_pob_choice: hide yourselves
  chosen_spanish: escóndete
  alternatives_spanish:
  - escóndanse
  - refúgiate
  lexicon: HALOT
  rationale: Aunque el hebreo tiene una forma singular gramatical, el contexto colectivo («pueblo mío») admite un imperativo plural o un singular colectivo. Se eligió «escóndete» por fluidez y porque el español puede usar el singular genérico en una exhortación dirigida al pueblo como unidad.
- source_word: כִמְעַט רֶגַע
  english_pob_choice: for a little moment
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - por un breve momento
  - por un instante
  lexicon: HALOT
  rationale: La combinación de מעט y רגע señala una duración muy breve. «Por un poco de tiempo» transmite bien el valor temporal sin sonar forzado.
- source_word: עַד יעבור
  english_pob_choice: until ... has passed by
  chosen_spanish: hasta que pase
  alternatives_spanish:
  - hasta que haya pasado
  - hasta que haya pasado de largo
  lexicon: HALOT
  rationale: El imperfecto de עבר marca un límite temporal. En español, «hasta que pase» es natural y conserva la idea de espera hasta el fin del peligro.
- source_word: זָעַם
  english_pob_choice: the wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - la indignación
  - el furor
  lexicon: HALOT
  rationale: זעם expresa indignación/ira judicial. «Ira» es la opción más directa y comprensible en español, manteniendo el peso teológico del juicio sin añadir un agente explícito.
theological_decisions:
- issue: Referencia de la ira en זָעַם
  english_pob_reading: the wrath, leaving the agent implicit while allowing the prophetic context to suggest divine judgment.
  chosen_spanish_reading: «la ira», dejando implícito el sujeto y permitiendo que el contexto profético la entienda como juicio divino.
  alternative_spanish_readings:
  - la indignación
  - el furor
  rationale: El hebreo no nombra explícitamente a quién pertenece la ira. La traducción conserva esa apertura interpretativa y evita especificar «de Yahvé» sin apoyo explícito en la cláusula. Así se mantiene la tensión teológica del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura establecida por el control POB en inglés, sin añadir expansión explicativa. Se preserva la estructura imperativa en serie y el final temporal con valor de espera breve hasta que pase la ira.
  spanish_consistency_notes:
  - Se emplea un español moderno y digno, evitando un calco excesivamente literal de la sintaxis hebrea.
  - Se unificó el tono exhortativo con imperativos directos en segunda persona singular, como permite el hebreo y exige la fluidez española.
  - «Pueblo mío» se usa como equivalente natural de la invocación profética.
  - No se introdujo nota al pie porque no se requirió una alternativa textual o lexical imprescindible en el versículo más allá de opciones ya incorporadas en la redacción.
