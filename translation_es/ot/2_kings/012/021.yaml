    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante. Aquí el lector recibe una explicación de ubicación en un lugar semánticamente no relacionado con el ancla actual.
  - severity: low
    issue: El orden 'Y se levantaron sus siervos' suena algo menos natural que 'Y sus siervos se levantaron'.
    rationale: No es incorrecto, pero el orden revisado mejora la fluidez del español sin alterar el sentido.
  - severity: low
