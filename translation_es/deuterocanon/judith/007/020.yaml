translation:
  language: es
  text: Y todo el campamento de Asiria permaneció alrededor de ellos —los soldados de a pie, los carros y sus jinetes— por treinta y cuatro días; y se vaciaron[a] todos los recipientes de agua de todos los habitantes de Betulia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «todas sus vasijas de agua». La frase puede referirse concretamente a los recipientes en que se guardaba el agua y, por implicación, al suministro disponible de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμεινεν
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - estuvo
  lexicon: BDAG / LSJ
  rationale: ἔμεινεν expresa permanencia o estancia continuada. «Permaneció» conserva ese sentido durativo en español sin añadir una interpretación más específica que el griego no exige.
- source_word: κύκλῳ αὐτῶν
  english_pob_choice: around them
  chosen_spanish: alrededor de ellos
  alternatives_spanish:
  - en torno a ellos
  - rodeándolos
  lexicon: LSJ
  rationale: La expresión indica posición circundante. «Alrededor de ellos» suena natural en español y preserva la imagen del cerco sin volverla más verbal de lo que es en griego.
- source_word: πᾶσα παρεμβολὴ Ἀσσούρ
  english_pob_choice: the whole camp of Assyria
  chosen_spanish: todo el campamento de Asiria
  alternatives_spanish:
  - todo el campamento asirio
  - todo el campamento de los asirios
  lexicon: LSJ
  rationale: παρεμβολή en contexto militar es «campamento». «Campamento de Asiria» sigue la construcción del genitivo y mantiene la referencia colectiva al ejército enemigo.
- source_word: οἱ πεζοὶ
  english_pob_choice: the foot soldiers
  chosen_spanish: los soldados de a pie
  alternatives_spanish:
  - la infantería
  - los soldados de infantería
  lexicon: LSJ
  rationale: πεζοί son tropas que van a pie. «Soldados de a pie» es claro y fiel, y evita el tecnicismo de «infantería» donde no es necesario.
- source_word: ἅρματα
  english_pob_choice: chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de guerra
  - los carros bélicos
  lexicon: LSJ
  rationale: Aunque el contexto es militar, el griego dice simplemente «carros». En español, «carros» reproduce el término básico; el contexto de asedio ya aporta la función bélica.
- source_word: οἱ ἱππεῖς αὐτῶν
  english_pob_choice: their horsemen
  chosen_spanish: sus jinetes
  alternatives_spanish:
  - su caballería
  - sus hombres a caballo
  lexicon: LSJ
  rationale: ἱππεῖς son jinetes o caballería montada. «Sus jinetes» mantiene la concreción del original y la posesión explícita de αὐτῶν.
- source_word: ἡμέρας τριάκοντα τέσσαρες
  english_pob_choice: for thirty-four days
  chosen_spanish: por treinta y cuatro días
  alternatives_spanish:
  - durante treinta y cuatro días
  - treinta y cuatro días
  lexicon: LSJ
  rationale: El acusativo de duración se expresa naturalmente con «por» o «durante». «Por treinta y cuatro días» es directo y coincide con el valor temporal del griego.
- source_word: ἐξέλιπεν
  english_pob_choice: were emptied
  chosen_spanish: se agotaron
  alternatives_spanish:
  - se vaciaron
  - quedaron vacíos
  - se consumieron
  lexicon: BDAG
  rationale: En este contexto el verbo expresa el agotamiento completo del suministro. «Se agotaron» comunica bien la extinción de la provisión de agua sin atribuir la acción a las personas mismas.
- source_word: ἅπαντας τοὺς κατοικοῦντας Βαιτυλουά
  english_pob_choice: all the inhabitants of Bethulia
  chosen_spanish: todos los habitantes de Betulia
  alternatives_spanish:
  - todos los que vivían en Betulia
  - todos los moradores de Betulia
  lexicon: LSJ
  rationale: La frase se refiere de manera global a los residentes de la ciudad. «Habitantes» es preciso y claro; «Betulia» es la transliteración española estándar.
- source_word: πάντα τὰ ἀγγεῖα αὐτῶν τῶν ὑδάτων
  english_pob_choice: all the water containers
  chosen_spanish: todos los recipientes de agua
  alternatives_spanish:
  - todos sus vasos de agua
  - todos los depósitos de agua
  - todos los cántaros de agua
  lexicon: LSJ
  rationale: El griego habla literalmente de «recipientes» o «vasijas» de agua. «Recipientes de agua» conserva la imagen concreta sin limitarla indebidamente a un tipo específico como «cántaros».
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: el énfasis recae en que se agotaron los recipientes/vasijas de agua, no en que se «acabaran» las personas. También se conservó la descripción militar simple («campamento», «soldados de a pie», «carros», «jinetes») sin ampliar innecesariamente el léxico.'
  spanish_consistency_notes:
  - Se mantiene «Asiria» para Ἀσσούρ siguiendo la convención española estándar del topónimo en contexto histórico-bíblico.
  - Se usa «Betulia» como forma tradicional y legible en español.
  - No se introduce «SEÑOR» ni terminología teológica ajena al versículo; el texto es descriptivo y militar.
  - La puntuación con raya ayuda a reproducir el inciso explicativo del griego y del POB inglés sin añadir contenido.
