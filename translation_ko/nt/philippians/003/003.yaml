id: PHP.3.3
reference: Philippians 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡμεῖς γάρ ἐσμεν ἡ περιτομή, οἱ πνεύματι θεοῦ λατρεύοντες καὶ καυχώμενοι ἐν Χριστῷ Ἰησοῦ καὶ οὐκ ἐν σαρκὶ πεποιθότες,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/003.yaml
  text: For we are the circumcision[a], who worship by the Spirit of God and boast in Messiah Jesus and put no confidence in the flesh[c][b],
  footnotes:
  - marker: a
    text: Or, with a textual variant, “who worship God in spirit.”
    reason: textual_variant
  - marker: b
    text: “Messiah” translates the title Christos.
    reason: lexical_alternative
  - marker: c
    text: “Flesh” here refers to bodily or human grounds for confidence, such as circumcision or status.
    reason: cultural_note
translation:
  language: ko
  text: 우리야말로 그 할례 받은 자들입니다[a]. 곧 하나님의 영으로 예배하고, 메시아 예수[b] 안에서 자랑하며, 육체[c]를 신뢰하지 않는 우리입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 본문 이문에 따라 「영으로 하나님을 예배하는 자들」. SBLGNT 본문이 따르는 「하나님의 영(πνεύματι θεοῦ)」 독법에 따른다.
    reason: textual_variant
  - marker: b
    text: 헬라어 칭호 Χριστός를 「메시아」로 옮긴다. 본 번역의 일관된 원칙에 따라 칭호의 무게를 보존한다.
    reason: lexical_alternative
  - marker: c
    text: 여기 「육체(σάρξ)」는 할례·혈통·신분 등 사람의 자랑거리가 되는 육적·외적 근거를 가리킨다. 도덕적 의미의 「죄성」으로 좁히지 않는다.
    reason: cultural_note
lexical_decisions:
- source_word: ἡ περιτομή
  english_pob_choice: the circumcision
  chosen_korean: 그 할례 받은 자들
  alternatives_korean:
  - 그 할례
  - 참된 할례를 받은 자들
  - 하나님의 할례 받은 백성
  lexicon: BDAG
  rationale: 헬라어 정관사 단수 추상명사를 한국어로 직역하면 「그 할례」가 되나, 술어가 「우리」를 가리키므로 의미가 「할례 받은 자들」로 환유된다. 한국어 자연성과 바울의 대조 논리를 위해 「그 할례 받은 자들」로 옮긴다.
- source_word: πνεύματι θεοῦ
  english_pob_choice: by the Spirit of God
  chosen_korean: 하나님의 영으로
  alternatives_korean:
  - 하나님의 영 안에서
  - 영으로 하나님을
  lexicon: BDAG
  rationale: 'SBLGNT θεοῦ 독법에 따라 「하나님의 영」으로 옮기되, 정관사 없이 「영」을 쓴다(글로사리 정책: πνεῦμα는 분명한 성령 지시 외에는 기본형 「영」). 본 절은 그 자체로 신적 영의 행위를 분명히 지시하므로 「하나님의 영」이 자연스럽다.'
- source_word: λατρεύοντες
  english_pob_choice: worship
  chosen_korean: 예배하고
  alternatives_korean:
  - 섬기고
  - 거룩한 예배를 드리고
  lexicon: BDAG
  rationale: λατρεύω는 하나님께 드리는 종교적 봉사를 가리킨다. 「예배하다」가 가장 자연스럽고 예전적 헌신의 의미도 함께 담는다.
- source_word: καυχώμενοι
  english_pob_choice: boast
  chosen_korean: 자랑하며
  alternatives_korean:
  - 영광스러워하며
  - 자긍하며
  lexicon: BDAG
  rationale: 바울의 「자랑」 신학은 신뢰의 근거를 어디 두는가의 문제이다. 「자랑하다」는 메시아 안에서의 자랑과 육체의 자랑의 대비를 살린다.
- source_word: Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 칭호로 살아 있는 Χριστός를 「메시아」로 옮기는 본 번역의 일관 원칙에 따른다.
- source_word: σαρκί
  english_pob_choice: flesh
  chosen_korean: 육체
  alternatives_korean:
  - 죄성
  - 사람의 신분
  - 몸
  lexicon: BDAG
  rationale: 본 절의 대조는 할례·혈통 등 외적·인간적 자랑거리와의 대조이므로, 좁은 「죄성」 의미를 피하고 본래의 육·외적 함의를 「육체」로 보존한다.
- source_word: πεποιθότες
  english_pob_choice: put no confidence
  chosen_korean: 신뢰하지 않는
  alternatives_korean:
  - 의지하지 않는
  - 확신하지 않는
  lexicon: BDAG
  rationale: 완료 분사로 정착된 의지의 상태를 가리킨다. 「신뢰하지 않는」이 「육체」와 자연스럽게 결합한다.
- source_word: γάρ
  english_pob_choice: For
  chosen_korean: ('우리야말로'의 야말로로 강조 흡수)
  alternatives_korean:
  - 곧
  - 왜냐하면
  lexicon: BDAG
  rationale: 앞 절의 경고를 근거 짓는 설명적 연결사. 한국어에서 명시적 「왜냐하면」 대신 강조의 「야말로」로 자연스럽게 흡수하여 흐름을 살린다.
theological_decisions:
- issue: σάρξ의 의미를 「육체」로 유지(「죄성」으로 좁히지 않음)
  chosen_reading: 육체
  alternative_readings:
  - 죄성
  rationale: 빌립보서 3장의 직후 문맥(할례, 혈통, 율법, 지위)이 보여 주듯, 여기 「육체」는 외적·인간적 자랑거리이지 바울의 다른 곳에서 말하는 내주하는 죄의 원리가 아니다.
  doctrine_reference: 'Contested terms: σάρξ rendered contextually (literal flesh / sinful nature).'
- issue: πνεύματι θεοῦ의 신적 영 지시
  chosen_reading: 하나님의 영
  alternative_readings:
  - 사람의 영
  - 영으로 하나님을
  rationale: SBLGNT 본문 θεοῦ에 따라 본 절의 「영」은 신적 영을 가리키며, 참 언약 정체성의 표지가 외적 의례가 아니라 영의 예배임을 강조한다.
