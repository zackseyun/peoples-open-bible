review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: mantiene la doble orden ''profetiza'', el sentido adversativo de עַל como ''contra'', la metáfora de ''pastores'' y la pregunta retórica final. También preserva correctamente el sentido reflexivo de אֲשֶׁר הָיוּ רֹעִים אוֹתָם. Sin embargo, hay dos desajustes importantes con la evidencia auditada y con la disciplina de notas: la nota [a] está anclada en ''Hijo de hombre'' pero comenta una alternativa que en realidad pertenece a la cláusula reflexiva (''que se alimentan a sí mismos''), y falta esa nota en el lugar correspondiente del texto. Además, ''Así dice el Señor Yahvé'' es comprensible, pero en español bíblico natural y conforme al criterio del proyecto sobre יהוה conviene ''el Señor, Yahvé'' para distinguir mejor título y nombre sin sonar fusionado como un solo apelativo.'
  spanish_quality_summary: El español es claro y digno, pero hay detalles de naturalidad y precisión editorial que conviene corregir. 'Diles a ellos' suena redundante; 'diles' basta, aunque la aposición 'a los pastores' puede mantenerse. 'Se han estado apacentando a sí mismos' comunica bien el progresivo/resultativo, pero es algo pesado; 'se han apacentado a sí mismos' es más limpio sin perder sentido. La puntuación con coma en 'Así dice el Señor, Yahvé' mejora la legibilidad litúrgica. La nota [a] actual no solo está mal ubicada, sino que introduce una alternativa ajena al audit trail inglés.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה se vierte como ''Yahvé''; ἄ/רוֹעֵי se conserva metafóricamente como ''pastores''; הַצֹּאן se vierte con el colectivo ''rebaño''. La principal corrección terminológica es presentar אֲדֹנָי יְהוִה como ''el Señor, Yahvé'' en vez de ''el Señor Yahvé'', para reflejar mejor los dos elementos. También debe restaurarse la nota lexical alternativa sobre el verbo reflexivo de pastoreo, no sobre ''Hijo de hombre''.'
  issues:
  - severity: high
    issue: La nota [a] está aplicada al segmento equivocado y su contenido no corresponde al audit trail.
    rationale: En el inglés, la nota [a] explica la alternativa de אֲשֶׁר הָיוּ רֹעִים אוֹתָם ('who feed themselves'), no בֶּן אָדָם. En español, [a] se ancla en 'Hijo de hombre' y ofrece 'que representa a la humanidad', alternativa no respaldada por la evidencia dada.
  - severity: medium
    issue: Falta una nota lexical alternativa en la cláusula reflexiva sobre 'apacentando a sí mismos'.
    rationale: El POB inglés preservó explícitamente la alternativa 'who feed themselves'. Dado que el español usa 'apacentarse', debe conservarse una nota equivalente en ese punto para documentar la decisión léxica.
  - severity: medium
    issue: '''El Señor Yahvé'' necesita mejor puntuación/segmentación.'
    rationale: Aunque no es doctrinalmente erróneo, 'el Señor Yahvé' puede leerse como un nombre compuesto poco natural. 'El Señor, Yahvé' refleja mejor אֲדֹנָי יְהוִה en español y sigue la preferencia del proyecto por exponer el nombre divino.
  - severity: low
    issue: '''diles a ellos'' suena redundante en español.'
    rationale: 'El pronombre explícito replica el hebreo, pero en español natural puede omitirse sin pérdida de sentido: ''diles, a los pastores''.'
