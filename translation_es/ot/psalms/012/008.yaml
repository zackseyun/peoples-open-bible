translation:
  language: es
  text: Tú[a], oh, Yahvé, los guardarás; lo guardarás de esta generación para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia de plural en «los guardarás» a singular en «lo guardarás». Algunas traducciones armonizan la segunda cláusula como «los guardarás».
    reason: alternative_reading
lexical_decisions:
- source_word: אַתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente de 2ª masculina singular va al frente para énfasis. En español, «Tú» comunica ese relieve de forma natural sin añadir una partícula explicativa.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh SEÑOR
  - oh el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título. «oh» mantiene el tono vocativo poético del hebreo y del audit trail en inglés.
- source_word: תִּשְׁמְרֵם
  english_pob_choice: will keep them
  chosen_spanish: los guardarás
  alternatives_spanish:
  - los preservarás
  - los velarás
  lexicon: HALOT
  rationale: שׁמר admite «guardar / vigilar / preservar». «Guardar» es el equivalente más directo y mantiene el paralelismo con el verbo siguiente. El plural pronominal se refleja con «los».
- source_word: תִּצְּרֶנּוּ
  english_pob_choice: will guard us
  chosen_spanish: nos guardarás
  alternatives_spanish:
  - nos protegerás
  - nos preservarás
  - lo guardarás
  lexicon: HALOT
  rationale: נצר se rinde bien como «guardar / proteger». Dado que el contexto auditado incluye una revisión que adoptó la lectura plural en inglés, el español la sigue con «nos» para reflejar esa decisión de lectura, manteniendo también la naturalidad de la línea poética. Aunque el hebreo masorético presenta tensión pronominal, esta redacción sigue la última decisión auditada del expediente inglés.
- source_word: מִן
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - de entre
  lexicon: HALOT
  rationale: En español poético, «de esta generación» expresa de manera natural el separativo de מִן sin perder claridad.
- source_word: הַדּוֹר זּוּ
  english_pob_choice: this generation
  chosen_spanish: esta generación
  alternatives_spanish:
  - esta era
  - este tiempo
  lexicon: HALOT
  rationale: דּוֹר significa «generación» en su sentido más inmediato. Se conserva esa equivalencia directa para mantener el contraste histórico-moral del salmo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es la forma idiomática y solemne en español para לעולם en poesía y oración, sin añadir una precisión doctrinal que el hebreo no explicita aquí.
theological_decisions:
- issue: Tensión pronominal entre plural y singular en el hebreo frente a la revisión inglesa que armoniza a plural
  english_pob_reading: The latest audited English revision changed the second clause to 'you will guard us' to reflect the ketiv/qere issue and the common reading of the suffix, while earlier audit trail preserved the singular 'him' to keep the Masoretic tension visible.
  chosen_spanish_reading: nos guardarás
  alternative_spanish_readings:
  - lo guardarás
  - los guardarás
  - guardarás a cada uno de ellos
  rationale: El español sigue la revisión más reciente del expediente inglés, que optó por la lectura plural en la segunda cláusula. Aunque el hebreo masorético conserva una tensión real entre plural y singular, aquí se refleja la decisión textual ya adjudicada en el audit trail, en vez de reintroducirla en la línea principal.
  doctrine_reference: applied_revisions / latest_revision_pass en el expediente de trabajo; principio de coherencia con la lectura textual adoptada
translation_notes:
  revision_awareness: 'El expediente inglés muestra una revisión decisiva: la cláusula final pasó de ''guard him'' a ''guard us'' para reflejar la lectura común del sufijo y la cuestión ketiv/qere. La propuesta española sigue esa última lectura auditada, en coherencia con el estado más reciente del texto fuente de trabajo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino, conforme al estándar del proyecto.
  - «Guardar» se usa de forma consistente para שׁמר y נצר, evitando alternar con «preservar» o «proteger» sin necesidad.
  - «Para siempre» conserva la fórmula poética usual de לעולם.
  - La nota al pie marca la decisión textual/pronominal, ya que el español no puede mostrar de otro modo la tensión del expediente anterior.
