translation:
  language: es
  text: Y los hombres armados iban delante de los sacerdotes que tocaban las trompetas[a], y la retaguardia iba detrás del arca, mientras seguían tocando las trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo shofarot, literalmente «cuernos»; a menudo se entiende como «cuernos de carnero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶחָלוּץ
  english_pob_choice: the armed men
  chosen_spanish: los hombres armados
  alternatives_spanish:
  - la vanguardia
  - la fuerza armada
  - los hombres armados para la batalla
  lexicon: HALOT
  rationale: En este contexto procesional y militar, el término señala al contingente armado que iba al frente. «Los hombres armados» conserva el sentido concreto y es natural en español; «vanguardia» sería más abstracto y menos explícito.
- source_word: הֹלֵךְ
  english_pob_choice: were going
  chosen_spanish: iban
  alternatives_spanish:
  - estaban yendo
  - marchaban
  - caminaban
  lexicon: HALOT
  rationale: El participio expresa acción en curso dentro de la procesión. «Iban» comunica bien la continuidad narrativa sin sonar forzado.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - antes de
  - en frente de
  lexicon: HALOT
  rationale: Aquí el sentido es espacial dentro del orden de marcha. «Delante de» es la equivalencia más natural en español.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del culto
  - los presbíteros
  lexicon: HALOT
  rationale: «Sacerdotes» es la equivalencia estándar y fiel en contexto cultual y narrativo.
- source_word: תקעו הַשּׁוֹפָרוֹת
  english_pob_choice: who were blowing the trumpets
  chosen_spanish: que tocaban las trompetas
  alternatives_spanish:
  - que soplaban los cuernos
  - que tocaban los cuernos de carnero
  - que sonaban las trompetas
  lexicon: HALOT
  rationale: El verbo describe la acción continua de producir sonido con el instrumento. «Tocaban» es idiomático en español para instrumentos de viento; «trompetas» mantiene la claridad pública, mientras la especificación más concreta del hebreo queda indicada en la nota.
- source_word: הַמְאַסֵּף
  english_pob_choice: the rear guard
  chosen_spanish: la retaguardia
  alternatives_spanish:
  - el que cerraba la marcha
  - la guardia trasera
  - el rearguardia
  lexicon: HALOT
  rationale: El término designa a quienes iban al final de la formación. «Retaguardia» es preciso, militar y natural en español.
- source_word: אַחֲרֵי
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - tras
  - después de
  lexicon: HALOT
  rationale: El valor espacial es el pertinente en la descripción de la procesión. «Detrás de» reproduce ese orden con claridad.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  - el arca del testimonio
  lexicon: HALOT
  rationale: El referente ya está claro en el contexto inmediato; por eso se conserva la forma breve «el arca», sin añadir un complemento no presente en el verso.
- source_word: הָלוֹךְ וְתָקוֹעַ
  english_pob_choice: while they kept blowing
  chosen_spanish: mientras seguían tocando
  alternatives_spanish:
  - mientras tocaban sin cesar
  - y continuaban tocando
  - mientras iban tocando
  lexicon: HALOT
  rationale: La construcción expresa acción continuada o reiterada durante el movimiento. «Seguían tocando» refleja bien esa continuidad sin sobreinterpretar ni intensificar más de lo que pide el hebreo.
- source_word: בַּשּׁוֹפָרוֹת
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - los cuernos de carnero
  - los shofarot
  lexicon: HALOT
  rationale: Se mantiene «trompetas» por claridad y fluidez en español, con la nota que preserva la alternativa más concreta del hebreo, «cuernos», especialmente «cuernos de carnero».
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés, donde se prefirió una expresión continua más natural para la construcción hebrea de acción repetida («while they kept blowing»). En español se refleja con «mientras seguían tocando», conservando el matiz durativo sin añadir énfasis extra.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para corresponder al enlace narrativo del hebreo.
  - «Arca» se deja sin expansión, coherente con el contexto inmediato del capítulo.
  - «Tocaban las trompetas» y «seguían tocando» preservan la repetición verbal del hebreo sin mecanicismo.
  - La nota explica la tensión terminológica entre «trompetas» y el valor literal de שׁוֹפָר como «cuerno de carnero».
