translation:
  language: es
  text: Mira[a], es dado al fuego como combustible. El fuego ha consumido sus dos extremos, y su parte de en medio está carbonizada. ¿Será apto para algún trabajo?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ser consumido»; literalmente, «para comer», con el fuego personificado como consumidor de la madera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «útil para el trabajo» o «apto para la manufactura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  - Observa
  lexicon: HALOT
  rationale: La partícula introduce la imagen con fuerza deíctica y llamada de atención. 'Mira' conserva esa función en un español natural y sobrio, sin el tono arcaico de 'He aquí'.
- source_word: לָאֵשׁ
  english_pob_choice: to the fire
  chosen_spanish: al fuego
  alternatives_spanish:
  - para el fuego
  - hacia el fuego
  lexicon: HALOT
  rationale: El ל prefijado señala destino o entrega hacia el fuego. 'Al fuego' es la equivalencia más natural en español y mantiene la imagen de cesión a la acción del fuego.
- source_word: נִתַּן
  english_pob_choice: it is given
  chosen_spanish: se entrega
  alternatives_spanish:
  - es dado
  - se da
  - es puesto
  lexicon: HALOT
  rationale: El pasivo de נתן puede conservarse como 'es dado', pero en español 'se entrega' transmite mejor la idea de ser puesto a disposición del fuego sin perder la pasividad del sujeto.
- source_word: לְאָכְלָה
  english_pob_choice: for fuel
  chosen_spanish: como combustible
  alternatives_spanish:
  - para ser consumido
  - para consumo
  - para quemarse
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'para comer/consumir'; con el fuego como agente consumidor, 'como combustible' expresa en español la función del leño de manera natural y fiel a la metáfora. Se conserva la fuerza del consumo sin volverlo una paráfrasis libre.
- source_word: שְׁנֵי קְצוֹתָיו
  english_pob_choice: both of its ends
  chosen_spanish: ambos extremos de ella
  alternatives_spanish:
  - sus dos extremos
  - los dos extremos de ella
  lexicon: HALOT
  rationale: La referencia al dual enfatiza los dos extremos. 'Ambos extremos de ella' preserva ese énfasis y mantiene el antecedente femenino implícito en español por el sustantivo 'rama' entendido del contexto.
- source_word: אָכְלָה הָאֵשׁ
  english_pob_choice: The fire has consumed
  chosen_spanish: El fuego ha consumido
  alternatives_spanish:
  - El fuego consumió
  - El fuego ha devorado
  lexicon: HALOT
  rationale: El verbo אכל aplicado al fuego expresa consumo total. 'Ha consumido' reproduce bien el resultado completo y evita una personificación demasiado coloquial como 'devorado'.
- source_word: וְתוֹכוֹ
  english_pob_choice: and its middle
  chosen_spanish: y su medio
  alternatives_spanish:
  - y su interior
  - y su centro
  - y su parte media
  lexicon: HALOT
  rationale: תוֹךְ designa el interior o parte media. 'Su medio' es breve y adecuado al paralelismo del versículo; mantiene la idea de la zona central entre los extremos.
- source_word: נָחָר
  english_pob_choice: is charred
  chosen_spanish: está carbonizado
  alternatives_spanish:
  - está quemado
  - está chamuscado
  - está tostado por el fuego
  lexicon: HALOT
  rationale: El verbo indica estar quemado o scorched. 'Carbonizado' refleja un daño intenso y duradero, coherente con la imagen de una madera ya inútil para trabajar.
- source_word: הֲיִצְלַח
  english_pob_choice: Is it fit
  chosen_spanish: ¿Será apta
  alternatives_spanish:
  - ¿Será útil
  - ¿Prosperará
  - ¿Servirá
  lexicon: HALOT
  rationale: En este contexto el verbo apunta a resultar útil o apto, no a 'prosperar' en sentido amplio. '¿Será apta?' mantiene la pregunta retórica de idoneidad.
- source_word: לִמְלָאכָה
  english_pob_choice: for any work
  chosen_spanish: para alguna obra
  alternatives_spanish:
  - para ningún trabajo
  - para una tarea
  - para obra alguna
  lexicon: HALOT
  rationale: מְלָאכָה alude a trabajo práctico o manufactura. 'Alguna obra' conserva el tono retórico y permite una lectura amplia de uso/aptitud sin introducir una especificación que el hebreo no exige.
translation_notes:
  revision_awareness: Se revisó la redacción contra el hebreo masorético de Ezequiel 15:4 y el rastro de auditoría en inglés. No se detectaron cambios de revisión posteriores que alteraran la decisión de traducción; por eso la forma española sigue de cerca la lectura aprobada, preservando la imagen de la madera entregada al fuego y la pregunta retórica sobre su aptitud para una obra.
  spanish_consistency_notes:
  - Se usó 'fuego' de manera consistente para לָאֵשׁ / הָאֵשׁ.
  - Se mantuvo el paralelismo entre 'extremos' y 'medio' para reflejar la estructura hebrea.
  - Se evitó 'prosperar' para הֲיִצְלַח, porque aquí el campo semántico es de aptitud útil, no de éxito vital.
  - Se tradujo la personificación del fuego de forma natural en español, sin borrar la imagen de consumo presente en el hebreo.
