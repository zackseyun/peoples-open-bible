  english_pob_reading: No aparece el Tetragrámaton ni una cita del nombre divino en el versículo.
  chosen_spanish_reading: Sin implicación directa en este versículo.
  alternative_spanish_readings:
  - —
  rationale: El versículo es una lista de nombres propios; no requiere decisión sobre Yahvé/SEÑOR.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el antecedente inglés y su nota textual. No hubo cambios en el sentido básico; la única tensión importante es la identificación de dos formas de nombre en וְקֵלָיָה הוּא קְלִיטָא, que se conserva explícitamente en español.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y enumerativo propio de una lista genealógica.
  - Los nombres propios se transliteran de manera coherente y legible para español bíblico.
  - La nota de alternancia de nombre se conserva para no borrar la relación textual documentada en el audit trail inglés.
