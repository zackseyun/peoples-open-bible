revisions:
- from: Y no he mancillado mi nombre[a], ni el nombre de mi padre, en la tierra de mi cautiverio. Soy la única hija de mi padre, y él no tiene hijo que lo herede[b], ni un pariente cercano[c], ni tampoco tiene un hijo, para que yo me conserve para él como esposa. Ya siete han perecido para mí; ¿para qué vivir? Pero si no te parece bien hacerme morir, manda que me mires y tengas misericordia de mí, y que ya no oiga reproche.
  to: Y no he mancillado[a] mi nombre, ni el nombre de mi padre, en la tierra de mi cautiverio. Soy hija única de mi padre, y él no tiene hijo que lo herede[b], ni un pariente cercano[c], ni tampoco tiene un hijo, para que yo me conserve para él como esposa. Ya siete han perecido lejos de mí[d]; ¿para qué vivir? Pero si no te parece bien darme muerte, manda que me mires y tengas misericordia de mí, y que ya no oiga reproche.
  rationale: Se corrige el anclaje de la nota léxica para que recaiga sobre «mancillado», se añade la nota contextual sobre «siete» en consonancia con el POB inglés, se mejora la naturalidad española con «Soy hija única de mi padre», se sustituye la formulación rígida «para mí» por «lejos de mí» para expresar pérdida personal sin explicitar «esposos» en el cuerpo principal, y se eleva ligeramente el registro con «darme muerte». No hace falta adjudicación adicional porque son ajustes claros de fidelidad y estilo, no un desacuerdo doctrinal o textual irresoluble.
