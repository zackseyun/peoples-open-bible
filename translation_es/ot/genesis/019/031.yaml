translation:
  language: es
  text: 'Y la primogénita dijo a la menor: «Nuestro padre ya es viejo, y no hay hombre en la tierra para unirse a nosotras[a] según la costumbre de toda la tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente, «tener relaciones con nosotras». El hebreo usa una expresión eufemística: «venir/entrar a nosotras».'
    reason: lexical_alternative
  - marker: b
    text: «Según la costumbre de toda la tierra» probablemente significa según el patrón o la costumbre humana ordinaria, especialmente respecto de la unión sexual y la continuación familiar.
    reason: cultural_note
lexical_decisions:
- source_word: הַבְּכִירָה
  english_pob_choice: the firstborn
  chosen_spanish: la primogénita
  alternatives_spanish:
  - la mayor
  - la hija mayor
  lexicon: HALOT
  rationale: “Primogénita” conserva el énfasis en el orden de nacimiento que el hebreo marca con הַבְּכִירָה. En español suena natural y mantiene la relación contrastiva con “la menor”.
- source_word: הַצְּעִירָה
  english_pob_choice: the younger
  chosen_spanish: la menor
  alternatives_spanish:
  - la más joven
  - la hija menor
  lexicon: HALOT
  rationale: El adjetivo comparativo hebreo se refleja bien con “la menor”, que es claro, breve y empareja naturalmente con “la primogénita”.
- source_word: אָבִינוּ זָקֵן
  english_pob_choice: Our father is old
  chosen_spanish: Nuestro padre está viejo
  alternatives_spanish:
  - Nuestro padre es viejo
  - Nuestro padre ha envejecido
  lexicon: HALOT
  rationale: La cláusula nominal hebrea permite un presente simple en español. “Está viejo” comunica el estado actual sin convertirlo en una glosa interpretativa más amplia.
- source_word: וְאִישׁ אֵין בָּאָרֶץ
  english_pob_choice: and there is not a man in the land
  chosen_spanish: y no hay hombre en la tierra
  alternatives_spanish:
  - y no hay varón en la tierra
  - y no hay nadie en la tierra
  lexicon: HALOT
  rationale: Se conserva el valor específico de אִישׁ como “hombre”, tal como en el inglés auditado, porque el contexto tiene referencia masculina y sexual. “En la tierra” sigue de cerca בָּאָרֶץ.
- source_word: לָבוֹא עָלֵינוּ
  english_pob_choice: to come in to us
  chosen_spanish: para entrar a nosotras
  alternatives_spanish:
  - para llegarse a nosotras
  - para tener relaciones con nosotras
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual. “Entrar a nosotras” preserva la imagen sin explicitarla más de lo que el texto exige. “Tener relaciones con nosotras” sería más interpretativo.
- source_word: כְּדֶרֶךְ כָּל הָאָרֶץ
  english_pob_choice: according to the way of all the earth
  chosen_spanish: conforme al modo de toda la tierra
  alternatives_spanish:
  - según la manera de toda la tierra
  - como es costumbre en toda la tierra
  lexicon: HALOT
  rationale: “Modo” y “conforme a” mantienen la estructura proverbial/idiomática del hebreo sin cerrarla del todo a una sola explicación. “Tierra” refleja el alcance general de הָאָרֶץ y deja espacio para la nota cultural.
theological_decisions:
- issue: Sentido de la expresión proverbial כְּדֶרֶךְ כָּל הָאָרֶץ
  english_pob_reading: likely means according to the ordinary human custom or pattern, especially regarding sexual union and family continuation
  chosen_spanish_reading: conforme al modo de toda la tierra, con la misma ambigüedad proverbial que remite al orden humano ordinario y, en este contexto, a la unión sexual y la continuación familiar
  alternative_spanish_readings:
  - según la costumbre ordinaria de toda la gente
  - de acuerdo con el patrón humano habitual, especialmente en la unión sexual
  rationale: La traducción principal conserva la fórmula hebrea y no disuelve la tensión semántica. La nota explica, como en el inglés POB, que el dicho apunta al patrón humano ordinario, aquí con referencia contextual a la sexualidad y la descendencia.
  doctrine_reference: Cultura y lenguaje figurado en el relato; no es una afirmación doctrinal, sino una observación semántica contextual.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la solución inglesa auditada, conservando el orden de nacimiento, el eufemismo sexual y la fórmula proverbial. No se detectaron revisiones previas aplicables en el paquete aportado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva «primogénita/menor» para mantener la oposición de edad o nacimiento, evitando una paráfrasis más libre.
  - «Hombre» se mantiene por el valor específico de אִישׁ en el contexto, en lugar de neutralizarlo a «nadie».
  - La preposición y el verbo de movimiento se ajustan al español idiomático («para entrar a nosotras») sin perder el eufemismo hebreo.
  - La nota cultural se mantiene separada del texto principal para no cargar la frase proverbial con una explicación cerrada.
