id: ROM.13.2
reference: Romans 13:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥστε ὁ ἀντιτασσόμενος τῇ ἐξουσίᾳ τῇ τοῦ θεοῦ διαταγῇ ἀνθέστηκεν, οἱ δὲ ἀνθεστηκότες ἑαυτοῖς κρίμα λήμψονται.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/002.yaml
  text: Therefore, the one who resists the authority has opposed the ordinance of God, and those who have opposed it will receive judgment on themselves.
translation:
  language: ko
  text: 그러므로 권세에 맞서는 자는 하나님의 명령에 맞선 것이며, 맞선 자들은 스스로 심판[a]을 받게 됩니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「정죄」 「선고」. 헬라어 κρίμα는 문맥에 따라 심판이나 정죄를 뜻할 수 있으나, 본문은 더 강한 최종적 정죄를 명시하지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_korean: 그러므로
  alternatives_korean:
  - 그러기에
  - 따라서
  lexicon: BDAG
  rationale: 앞 절에서 도출되는 추론 접속사를 자연스러운 한국어로 옮긴다.
- source_word: ὁ ἀντιτασσόμενος
  english_pob_choice: the one who resists
  chosen_korean: 맞서는 자
  alternatives_korean:
  - 반대하는 자
  - 거스르는 자
  lexicon: BDAG
  rationale: 현재 중간태 분사의 특성을 살린 일반화된 표현. ὑποτάσσομαι(복종)와 ἀντιτάσσομαι(맞섬)의 의도적 대비를 「복종/맞섬」으로 보존한다.
- source_word: τῇ ἐξουσίᾳ
  english_pob_choice: the authority
  chosen_korean: 권세
  alternatives_korean:
  - 통치 권세
  lexicon: BDAG
  rationale: 직전 문맥(13:1)의 통치 권세를 가리키지만, 단수 정관사 그대로 「권세」로 옮겨 문맥이 지시 대상을 공급하게 한다.
- source_word: τῇ τοῦ θεοῦ διαταγῇ
  english_pob_choice: the ordinance of God
  chosen_korean: 하나님의 명령
  alternatives_korean:
  - 하나님의 정하심
  - 하나님의 질서
  lexicon: BDAG
  rationale: διαταγή는 정하심·배치·명령을 뜻한다. 권세에 관한 하나님의 정하신 바를 「명령」으로 옮겨 형식적·제도적 무게를 살린다.
- source_word: ἀνθέστηκεν
  english_pob_choice: has opposed
  chosen_korean: 맞선 것
  alternatives_korean:
  - 대항한 것
  - 거역한 것
  lexicon: BDAG
  rationale: 완료 시제로 결과 지속의 의미. 앞의 ἀντιτασσόμενος와의 연계를 「맞서다」 어휘 군에서 유지한다.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_korean: 심판
  alternatives_korean:
  - 정죄
  - 선고
  lexicon: BDAG
  rationale: 본문은 결과로 임할 사법적·신적 심판을 말하나 최종 정죄로 못박지 않는다. 「심판」이 더 넓고 본문의 무게에 충실하다.
- source_word: ἑαυτοῖς ... λήμψονται
  english_pob_choice: will receive ... on themselves
  chosen_korean: 스스로 ... 받게 됩니다
  alternatives_korean:
  - 자기 자신에게
  lexicon: BDAG
  rationale: 재귀 여격은 결과가 맞선 자 자신에게 되돌아옴을 보여준다. 「스스로」로 자연스럽게 표현한다.
theological_decisions:
- issue: κρίμα의 범위
  chosen_reading: 심판
  alternative_readings:
  - 정죄
  rationale: 본문은 맞선 자들이 신적·사법적 심판을 받는다고 말하지만 영원한 정죄로 한정하지 않는다. 「심판」이 본문의 경고를 보존하면서 신학적 결과를 과장하지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
