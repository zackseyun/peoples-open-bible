base_translation:
  language: en
  yaml_path: translation/ot/genesis/034/024.yaml
  text: And all who went out of the gate of his city listened to Hamor and to Shechem his son[a], and every male, all who went out of the gate of his city[c][b], was circumcised.
  footnotes:
