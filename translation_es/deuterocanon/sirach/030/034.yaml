translation:
  language: es
  text: Ponlo a trabajar mientras sea niño, y hallarás descanso; deja ociosas sus manos[a], y buscará libertad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «afloja sobre sus manos», es decir, relaja la disciplina sobre su trabajo o actividad.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «libertad» significa sacudirse la restricción o la disciplina, no libertad política.
    reason: cultural_note
lexical_decisions:
- source_word: ἔργασαι
  english_pob_choice: Put him to work
  chosen_spanish: Apártalo para el trabajo
  alternatives_spanish:
  - Ponlo a trabajar
  - Haz que trabaje
  - Entrénalo en el trabajo
  lexicon: LSJ
  rationale: El imperativo medio aoristo expresa aquí una exhortación a encaminar al niño al trabajo o a una actividad disciplinada. «Apártalo para el trabajo» conserva el sentido causativo y resulta natural en español, sin volverlo innecesariamente duro.
- source_word: ἐν παιδί
  english_pob_choice: while he is a child
  chosen_spanish: mientras sea niño
  alternatives_spanish:
  - durante su niñez
  - cuando es niño
  - en la infancia
  lexicon: LSJ
  rationale: La construcción es temporal e idiomática; el griego se refiere a tratarlo así en la etapa de la niñez. «Mientras sea niño» expresa con claridad ese valor temporal en español.
- source_word: εὑρήσεις ἀνάπαυσιν
  english_pob_choice: you will find rest
  chosen_spanish: hallarás descanso
  alternatives_spanish:
  - encontrarás descanso
  - hallarás alivio
  - obtendrás paz
  lexicon: LSJ
  rationale: ἀνάπαυσις denota descanso o alivio. «Hallarás descanso» mantiene la naturalidad proverbial y la cercanía al griego.
- source_word: ἄνες
  english_pob_choice: let his hands go idle
  chosen_spanish: deja que sus manos queden ociosas
  alternatives_spanish:
  - relaja la disciplina sobre sus manos
  - suéltale las manos
  - déjalo sin ocupación
  lexicon: LSJ
  rationale: En este contexto ἀνίημι no es solo 'soltar' físicamente, sino aflojar la restricción del trabajo o la disciplina. «Queden ociosas» comunica bien esa idea de inactividad resultante.
- source_word: χεῖρας αὐτῷ
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su mano
  - su actividad
  - su labor
  lexicon: LSJ
  rationale: Se conserva el plural del griego, que en español puede funcionar de manera natural como referencia metonímica a su actividad o trabajo.
- source_word: ζητήσει ἐλευθερίαν
  english_pob_choice: he will seek freedom
  chosen_spanish: buscará libertad
  alternatives_spanish:
  - buscará independencia
  - buscará libertad personal
  - querrá librarse del control
  lexicon: LSJ
  rationale: ἐλευθερία significa literalmente libertad, pero aquí el contexto apunta a sacudirse la disciplina o la restricción, no a una libertad política. «Buscará libertad» preserva el término literal y deja que el contexto aporte la carga disciplinaria.
theological_decisions:
- issue: Referencia masculina singular del dicho sapiencial
  english_pob_reading: Render the verse with masculine singular reference ('him ... he')
  chosen_spanish_reading: Mantener la referencia masculina singular («lo ... sea ... sus ... buscará»).
  alternative_spanish_readings:
  - Hacerlo genérico con «un niño ... ellos»
  - Neutralizar con «la persona ...»
  rationale: El griego usa singular masculino (παιδί, αὐτῷ y el sujeto implícito de ζητήσει). Para mantener la fidelidad al texto fuente, se conserva la referencia masculina singular en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La revisión más reciente no cambió el texto; el informe de control cruzado marcó problemas mayores, así que esta redacción intenta resolver la tensión principal: el imperativo disciplinario del griego y el valor no político de ἐλευθερίαν, manteniendo la lectura proverbial y el singular masculino del original.'
  spanish_consistency_notes:
  - Se usa «libertad» para ἐλευθερίαν por fidelidad léxica, con nota aclaratoria para evitar una lectura política.
  - Se evita «siervo» o vocabulario eclesiástico no presente en el dicho.
  - La frase verbal se formula en un español moderno y publicable, sin perder el tono proverbial del hebreo/greco-sapiencial.
