base_translation:
  language: en
  yaml_path: translation/ot/zechariah/001/016.yaml
  text: 'Therefore[a], thus says Yahweh: I have returned to Jerusalem with compassion; my house will be built in it, declares Yahweh of hosts[c][b], and a measuring line will be stretched out over Jerusalem.'
  footnotes:
  - marker: a
    text: Or 'my temple will be built in her.' The Hebrew reads literally 'my house,' referring to the temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'with mercies' or 'in mercy.' The Hebrew uses a plural form that expresses abundant compassion.
    reason: lexical_alternative
  - marker: c
    text: The 'measuring line' signifies planned restoration and rebuilding of Jerusalem.
    reason: cultural_note
