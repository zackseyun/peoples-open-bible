    issue: 'Inicio poco natural: «los patios quedan cercados alrededor de uno»'
    rationale: Aunque intenta seguir la sintaxis difícil del griego, en español la frase resulta rígida y redundante. Una formulación como «los atrios quedan cerrados en torno a uno» o «los recintos quedan asegurados alrededor de uno» preserva mejor el sentido y la legibilidad.
  - severity: low
    issue: «Patios» debilita el matiz de αὐλαί
    rationale: «Patios» no es imposible, pero en contexto judicial/arquitectónico «atrios» o «recintos» comunica mejor la imagen de áreas cerradas o cortes alrededor del condenado.
  - severity: low
