translation:
  language: es
  text: El valle de Sidim estaba lleno de pozos de betún[a], y los reyes de Sodoma y de Gomorra huyeron y cayeron allí[b], mientras el resto huyó a la región montañosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "pozos de alquitrán" o "pozos de asfalto"; el hebreo se refiere a pozos de betún.
    reason: lexical_alternative
  - marker: b
    text: Es decir, cayeron allí en el valle de Sidim, probablemente dentro de los pozos de betún.
    reason: lexical_alternative
  - marker: c
    text: O "a las montañas".
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵמֶק הַשִׂדִּים
  english_pob_choice: the Valley of Siddim
  chosen_spanish: el valle de Sidim
  alternatives_spanish:
  - el Valle de Sidim
  - el valle de Siddim
  lexicon: HALOT
  rationale: Se conserva el valor toponímico de la expresión sin añadir interpretación. En español, “Sidim” reproduce el nombre propio con naturalidad; se mantiene “valle” como término geográfico básico.
- source_word: בֶּאֱרֹת בֶּאֱרֹת חֵמָר
  english_pob_choice: was full of bitumen pits
  chosen_spanish: estaba lleno de pozos de betún
  alternatives_spanish:
  - estaba lleno de pozos de asfalto
  - estaba lleno de pozos de brea
  - estaba lleno de pozos de bitumen
  lexicon: HALOT
  rationale: Se traduce חֵמָר con “betún”, que comunica bien la sustancia fósil/pegajosa referida por el hebreo. “Pozos de betún” conserva el carácter material del término y su función descriptiva; “lleno de” refleja el plural intensivo de בֶּאֱרֹת sin forzar una construcción más literal y menos natural en español.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: HALOT
  rationale: “Huyeron” es el equivalente narrativo natural de נוס en este contexto y mantiene la acción rápida del relato.
- source_word: מֶלֶךְ סְדֹם וַעֲמֹרָה
  english_pob_choice: the kings of Sodom and Gomorrah
  chosen_spanish: los reyes de Sodoma y de Gomorra
  alternatives_spanish:
  - el rey de Sodoma y de Gomorra
  - el rey de Sodoma y Gomorra
  lexicon: HALOT
  rationale: 'Aunque מֶלֶךְ aparece en singular, el contexto y la concordancia verbal plural muestran un sentido colectivo. En español se explicita naturalmente con plural: “los reyes de Sodoma y de Gomorra”.'
- source_word: וַיִּפְּלוּ שָׁמָּה
  english_pob_choice: fell there
  chosen_spanish: cayeron allí
  alternatives_spanish:
  - cayeron allí dentro
  - fueron derribados allí
  lexicon: HALOT
  rationale: “Cayeron allí” preserva la sobriedad del hebreo sin añadir de forma explícita el objeto “en los pozos”, que el texto no formula directamente. En español suena natural y deja abierta la implicación contextual.
- source_word: וְהַנִּשְׁאָרִים
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - los demás
  - los que quedaron
  lexicon: HALOT
  rationale: “El resto” mantiene la referencia colectiva y evita precisar más de lo que el hebreo dice. En español resulta claro y acorde con el registro narrativo.
- source_word: הֶרָה
  english_pob_choice: to the hill country
  chosen_spanish: hacia la región montañosa
  alternatives_spanish:
  - a las montañas
  - hacia las montañas
  - a la región montañosa
  lexicon: HALOT
  rationale: La forma direccional de הֶרָה permite expresar movimiento hacia una zona elevada. “Región montañosa” es una equivalencia española natural para “hill country” y evita una imagen demasiado rígida de “montañas” si el sentido es territorial.
- source_word: נָסוּ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se dio a la fuga
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica de la primera cláusula con “huyó”, conservando cohesión verbal y el dinamismo del relato.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios de revisión ni conflictos textuales. La redacción española sigue de cerca el sentido auditado del inglés POB y del hebreo, sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se mantiene el topónimo como “Sidim” para conservar la forma breve y reconocible del nombre propio.
  - Se evita traducir mecánicamente con “SEÑOR” u otros términos teológicos no presentes en el verso.
  - Se conserva la doble referencia de huida con un mismo campo semántico (“huyeron” / “huyó”) para reflejar la repetición verbal del hebreo.
  - Se usa “región montañosa” como equivalente idiomático de dirección hacia el monte, manteniendo el matiz geográfico sin sobreinterpretar.
