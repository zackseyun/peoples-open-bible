translation:
  language: es
  text: Y bajo su mando estaba Amasías hijo de Zicri[a], que se ofreció voluntariamente a Yahvé, y con él estaban doscientos mil hombres valerosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que se ofreció voluntariamente para Yahvé». El participio hebreo puede destacar la auto-dedicación voluntaria, y la preposición puede entenderse como «a» o «para».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  english_pob_choice: And under his command was
  chosen_spanish: Y bajo su mando estaba
  alternatives_spanish:
  - Y a su mando estaba
  - Y bajo él estaba
  - Y bajo su autoridad estaba
  lexicon: HALOT
  rationale: El hebreo expresa subordinación administrativa o militar. «Bajo su mando» comunica en español actual la relación funcional sin perder el matiz de autoridad implícito en el idiomático עַל יָד con sufijo.
- source_word: עֲמַסְיָה
  english_pob_choice: Amasiah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amasiah
  lexicon: Transliteración estándar del nombre propio
  rationale: En español bíblico, el nombre se vuelve más legible y natural como «Amasías», manteniendo la transliteración del nombre propio sin traducirlo.
- source_word: בֶן זִכְרִי
  english_pob_choice: son of Zichri
  chosen_spanish: hijo de Zicri
  alternatives_spanish:
  - hijo de Zichri
  lexicon: Construcción genealógica regular
  rationale: «Hijo de» preserva la relación genealógica de בן. «Zicri» sigue la transliteración habitual en español, con adaptación gráfica mínima para lectura natural.
- source_word: הַמִּתְנַדֵּב
  english_pob_choice: who volunteered himself
  chosen_spanish: que se ofreció voluntariamente
  alternatives_spanish:
  - que se ofreció a sí mismo voluntariamente
  - el que se ofreció voluntariamente
  - el voluntario
  lexicon: HALOT
  rationale: El hitpael expresa auto-dedicación voluntaria. En español, «se ofreció voluntariamente» conserva el sentido reflexivo y la iniciativa libre sin sonar forzado. Se evita «voluntario» como sustantivo por no reproducir bien el participio relativo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la norma del proyecto para יהוה: «Yahvé» en el texto principal. La preposición ל admite dirección o dedicación; aquí «a Yahvé» conserva el sentido de entrega personal al destinatario divino.'
- source_word: וְעִמּוֹ
  english_pob_choice: and with him were
  chosen_spanish: y con él había
  alternatives_spanish:
  - y con él estaban
  - y junto con él había
  lexicon: HALOT
  rationale: En español, «había» suena más natural que un plural explícito cuando el sintagma introducido es una cifra de tropas. Se mantiene la idea de compañía/adhesión de fuerzas asociadas a Amasías.
- source_word: מָאתַיִם אֶלֶף
  english_pob_choice: two hundred thousand
  chosen_spanish: doscientos mil
  alternatives_spanish:
  - doscientas mil
  lexicon: Numeral cardinal
  rationale: La cardinalidad se traduce de manera directa. Se usa el masculino plural estándar por referirse implícitamente a combatientes.
- source_word: גִּבּוֹר חָיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes de guerra
  alternatives_spanish:
  - hombres poderosos de valor
  - guerreros valientes
  - hombres valerosos de guerra
  lexicon: HALOT
  rationale: La expresión denota hombres de capacidad y fortaleza militar. «Hombres valientes de guerra» conserva el registro bélico y evita la redundancia algo fija de «mighty men of valor», sin perder el sentido de fuerza y valentía.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se aplica la convención doctrinal del proyecto en español: el Tetragrammaton se vierte «Yahvé». Así se preserva el nombre de pacto sin la sustitución litúrgica por «el SEÑOR».'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto base inglés se mantuvo sustancialmente sin cambios en la revisión más reciente; la decisión española se ajusta al mismo marco de equivalencia óptima y a la nota léxica sobre la auto-dedicación voluntaria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para יהוה.
  - Se conserva el tono militar elevado de «hombres valientes de guerra» sin introducir terminología eclesiástica.
  - La frase verbal evita calco excesivo del inglés y reproduce el sentido idiomático hebreo de subordinación y adscripción militar.
