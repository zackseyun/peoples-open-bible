revisions:
- from: Y comerán la carne de sus hijos, y comerán la carne de sus hijas.
  to: Y ustedes comerán la carne de sus hijos, y comerán la carne de sus hijas.
  rationale: Se añade «ustedes» para preservar explícitamente la segunda persona plural del hebreo en un español latinoamericano natural, evitando que «comerán» se entienda como tercera persona plural. Se mantiene la repetición de «comerán» y «la carne» para conservar el paralelismo y la fuerza del juicio.
