translation:
  language: es
  text: Después de esto[a], Absalón, hijo de David, tenía una hermana hermosa llamada Tamar, y Amnón, hijo de David, la amó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "estaba encaprichado con ella" o "la deseó". El verbo hebreo es la palabra común para "amar", pero la narración siguiente muestra que el afecto de Amnón era corrupto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי / אֲחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego
  - Más tarde
  - Después
  lexicon: HALOT
  rationale: La fórmula narrativa marca secuencia temporal. 'Después de esto' conserva ese enlace y suena natural en español moderno sin volverla demasiado explicativa.
- source_word: וּלְאַבְשָׁלוֹם בֶּן דָּוִד
  english_pob_choice: Absalom son of David had
  chosen_spanish: Absalón, hijo de David, tenía
  alternatives_spanish:
  - Absalón, hijo de David, poseía
  - A Absalón, hijo de David, le pertenecía
  lexicon: HALOT
  rationale: El hebreo expresa posesión mediante una construcción preposicional; en español, 'tenía' transmite mejor esa posesión natural y mantiene el registro narrativo.
- source_word: אָחוֹת יָפָה
  english_pob_choice: a beautiful sister
  chosen_spanish: una hermana hermosa
  alternatives_spanish:
  - una hermana bella
  - una hermana muy hermosa
  lexicon: HALOT
  rationale: '''Hermosa'' reproduce el valor físico de יָפָה de manera directa y literaria. Se conserva el artículo indefinido porque el español lo requiere.'
- source_word: וּשְׁמָהּ תָּמָר
  english_pob_choice: whose name was Tamar
  chosen_spanish: cuyo nombre era Tamar
  alternatives_spanish:
  - y su nombre era Tamar
  - de nombre Tamar
  lexicon: HALOT
  rationale: '''Cuyo nombre era Tamar'' reproduce bien la cláusula de identificación hebrea y mantiene el tono formal del relato.'
- source_word: וַיֶּאֱהָבֶהָ
  english_pob_choice: loved her
  chosen_spanish: la amó
  alternatives_spanish:
  - la quiso
  - se enamoró de ella
  - la deseó
  lexicon: HALOT
  rationale: 'Se mantiene el verbo normal ''amar'' para preservar la tensión del relato: el texto hebreo usa el término común para amar, y el desarrollo posterior mostrará el carácter desordenado de esa ''amor'' sin resolverlo aquí.'
- source_word: אַמְנוֹן בֶּן דָּוִד
  english_pob_choice: Amnon son of David
  chosen_spanish: Amnón, hijo de David
  alternatives_spanish:
  - Amnón, hijo de David
  - Amnón, el hijo de David
  lexicon: HALOT
  rationale: Se conserva la identificación dinástica repetida en el versículo. 'Hijo de David' mantiene la relación familiar y la prominencia del linaje en el relato.
theological_decisions:
- issue: Amor moralmente cargado en la narración
  english_pob_reading: loved her
  chosen_spanish_reading: la amó
  alternative_spanish_readings:
  - la deseó
  - estaba infatuado con ella
  - la quiso
  rationale: El hebreo emplea el verbo común de amar sin añadir una calificación moral. Mantener 'la amó' preserva la tensión literaria y teológica que el contexto posterior revelará, en vez de anticiparla en el versículo.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it prematurely.'
translation_notes:
  revision_awareness: 'Coincide con la lectura inglesa auditada: conserva la secuencia temporal, la identificación repetida ''hijo de David'' y el verbo ordinario de amor sin suavizar la tensión narrativa. No se detectaron revisiones aplicadas en la fuente inglesa.'
  spanish_consistency_notes:
  - Se usa 'Absalón' y 'Amnón' con acento gráfico conforme al español.
  - Se mantiene 'David' como forma consagrada del nombre propio, y no se introduce 'el rey' porque no está en el hebreo de este versículo.
  - '''Hermosa'' se emplea para יָפָה como belleza física, no moral.'
  - La nota conserva la alternativa interpretativa del audit trail inglés para reflejar la tensión léxica de אָהֵב.
