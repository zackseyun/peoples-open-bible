translation:
  language: es
  text: Porque desde que vine al faraón para hablar en tu nombre[a], ha hecho mal a este pueblo[b], y ciertamente no has librado a tu pueblo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Desde que vine al faraón para hablar en tu nombre”.'
    reason: alternative_reading
  - marker: b
    text: 'O: “ha empeorado las cosas para este pueblo”.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa un infinitivo absoluto con el verbo para intensificar la negación: “ciertamente no has librado” o “no has librado en absoluto”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵאָז
  english_pob_choice: For since
  chosen_spanish: Porque desde que
  alternatives_spanish:
  - Y desde que
  - Desde entonces
  lexicon: HALOT
  rationale: מֵאָז expresa “desde entonces / desde que”; en español, “Porque desde que” conserva el valor temporal y al mismo tiempo justifica la queja de Moisés dentro del discurso, igual que el inglés POB usa “For” para enlazar con el contexto.
- source_word: בָּאתִי
  english_pob_choice: I came
  chosen_spanish: vine
  alternatives_spanish:
  - he venido
  - llegué
  lexicon: HALOT
  rationale: El perfecto qal de בוא se entiende naturalmente como un pasado narrativo en español. “Vine” mantiene la retrospección de la queja y suena más directo que un presente perfecto.
- source_word: אֶל־פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: al faraón
  alternatives_spanish:
  - ante el faraón
  - hacia el faraón
  lexicon: HALOT
  rationale: אֶל indica dirección hacia una persona; en español, “al faraón” es la forma más natural y fiel. Se usa “faraón” en minúscula por estilo castellano moderno, sin alterar el referente.
- source_word: לְדַבֵּר
  english_pob_choice: to speak
  chosen_spanish: para hablar
  alternatives_spanish:
  - para decir
  - para hablarle
  lexicon: HALOT
  rationale: El infinitivo constructo expresa propósito. “Para hablar” comunica bien esa finalidad en español y evita un calco rígido que sonaría menos natural.
- source_word: בִּשְׁמֶךָ
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - con tu autoridad
  lexicon: HALOT
  rationale: La expresión idiomática se conserva literalmente para no perder su peso teológico. “En tu nombre” es idiomático en español y mantiene la idea de representación ante faraón.
- source_word: הֵרַע
  english_pob_choice: he has done evil
  chosen_spanish: ha hecho mal
  alternatives_spanish:
  - ha hecho daño
  - ha obrado mal
  lexicon: HALOT
  rationale: רעע puede señalar daño o mal. En este contexto, “ha hecho mal” preserva la acusación moral y resulta más natural que una formulación demasiado abstracta; además deja abierta la tensión entre mal moral y perjuicio concreto.
- source_word: לָעָם הַזֶּה
  english_pob_choice: to this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - para este pueblo
  - contra este pueblo
  lexicon: HALOT
  rationale: עָם es “pueblo”. Con el verbo de causar daño, “a este pueblo” transmite el objeto del perjuicio sin forzar una preposición más interpretativa.
- source_word: וְהַצֵּל לֹא הִצַּלְתָּ
  english_pob_choice: and you have certainly not delivered
  chosen_spanish: y ciertamente no has librado
  alternatives_spanish:
  - y no has librado en absoluto
  - y ciertamente no has rescatado
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la negación. “Ciertamente no has librado” conserva esa fuerza y usa un verbo que en español bíblico expresa bien la liberación/redención sin ocultar la intensidad del hebreo.
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - tu pueblo
  lexicon: HALOT
  rationale: El objeto directo con אֶת se refleja naturalmente con “a”. “Tu pueblo” mantiene la pertenencia pactal y el vínculo personal con Dios.
theological_decisions:
- issue: Intensificación de la negación con el infinitivo absoluto de נצל
  english_pob_reading: and you have certainly not delivered your people
  chosen_spanish_reading: y ciertamente no has librado a tu pueblo
  alternative_spanish_readings:
  - y no has librado a tu pueblo en absoluto
  - y de ningún modo has librado a tu pueblo
  rationale: El hebreo usa infinitivo absoluto + verbo finito para intensificar la negación. “Ciertamente no” preserva esa fuerza sin exagerarla. “Librado” encaja con el campo de liberación/redención del Éxodo y suena natural en español.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de בִּשְׁמֶךָ como representación autorizada
  english_pob_reading: in your name
  chosen_spanish_reading: en tu nombre
  alternative_spanish_readings:
  - por tu nombre
  - con tu autoridad
  rationale: La traducción literal conserva la densidad teológica de hablar y actuar bajo el nombre de Yahvé. No se reduce a una mera fórmula funcional de representación, pero tampoco la pierde.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Revisé el paquete fuente hebreo y la auditoría inglesa POB, incluyendo las notas de alternativa y la decisión de intensificación verbal. Mantengo la estructura de queja de Moisés, con equivalencia óptima y sin suavizar la acusación ni la negación enfática.
  spanish_consistency_notes:
  - Se conservó el paralelismo discursivo de la oración única con dos miembros causales y una conclusión negativa.
  - Se eligió “faraón” en minúscula por norma editorial en español; no afecta el referente ni la fidelidad.
  - Se mantuvo “en tu nombre” como fórmula transparente y teológicamente cargada.
  - “Librar” se prefirió a “rescatar” para alinearse con el campo semántico de liberación del Éxodo y con el uso bíblico idiomático en español.
