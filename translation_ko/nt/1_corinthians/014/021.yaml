id: 1CO.14.21
reference: 1 Corinthians 14:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν τῷ νόμῳ γέγραπται ὅτι Ἐν ἑτερογλώσσοις καὶ ἐν χείλεσιν ⸀ἑτέρων λαλήσω τῷ λαῷ τούτῳ, καὶ οὐδ’ οὕτως εἰσακούσονταί μου, λέγει κύριος.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/021.yaml
  text: 'In the Law it is written: “By people of other tongues and by the lips of foreigners I will speak to this people[d][c][b][a], and not even in this way will they listen to me,” says the Lord.'
  footnotes:
  - marker: a
    text: Or “By other tongues and by the lips of others.”
    reason: lexical_alternative
  - marker: b
    text: Or “will they heed me.”
    reason: lexical_alternative
  - marker: c
    text: The quotation echoes Isaiah 28:11–12.
    reason: cross_reference
  - marker: d
    text: Because this is a citation of Israel’s God speaking, some translations render “says the LORD” to reflect the Hebrew background.
    reason: alternative_reading
translation:
  language: ko
  text: 율법에 기록되기를, 「내가 다른 방언과 다른 입술로 이 백성에게 말하겠으나, 그래도 그들은 내 말을 듣지 않을 것이다」라고 야훼께서 말씀하십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 28:11~12 인용. 헬라어 본문의 κύριος는 LXX에서 야훼(יהוה)를 옮긴 것이므로 「야훼」로 복원한다.
    reason: cross_reference
lexical_decisions:
- source_word: ἑτερογλώσσοις
  english_pob_choice: people of other tongues
  chosen_korean: 다른 방언
  alternatives_korean:
  - 다른 언어
  - 외국어
  lexicon: BDAG
  rationale: 14장 전체의 γλῶσσα/방언 용어 일관성을 위해 「다른 방언」으로 옮기되, LXX 이사야의 원문맥은 외국어로서의 방언(앗수르의 침공)을 가리킴을 각주에서 명시할 수 있다.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_korean: 야훼
  alternatives_korean:
  - 주
  lexicon: BDAG
  rationale: 구약 인용에서 κύριος = יהוה이므로 글로사리에 따라 「야훼」로 복원한다.
theological_decisions:
- issue: 신약 본문 안의 구약 인용에서 κύριος = YHWH의 복원
  chosen_reading: 야훼
  alternative_readings:
  - 주
  rationale: 본 절은 사 28:11-12의 LXX 인용이며, 원문은 야훼의 말씀이다. 글로사리·DOCTRINE.md의 지침에 따라 인용된 신적 이름을 「야훼」로 복원한다.
  doctrine_reference: 'DOCTRINE.md: divine names; KO glossary κύριος=YHWH'
