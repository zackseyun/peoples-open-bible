translation:
  language: es
  text: Pues, aunque Moisés se enojó contra Datán y Abirón[a], no hizo nada contra ellos con ira, sino que por juicio racional dominó la ira[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Ἀβειρών; tradicionalmente «Abiram».
    reason: lexical_alternative
  - marker: b
    text: 'O: «con razón gobernó su ira». El griego destaca el gobierno de la razón sobre la pasión, un tema central en 4 Macabeos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυμούμενος
  english_pob_choice: was angered
  chosen_spanish: se enojó
  alternatives_spanish:
  - estaba airado
  - se indignó
  lexicon: LSJ
  rationale: El participio expresa un estado real de enojo. «Se enojó» comunica de forma natural ese hecho sin suavizar la emoción ni convertirla en mera disposición intelectual.
- source_word: γέ τοι
  english_pob_choice: although
  chosen_spanish: aunque
  alternatives_spanish:
  - ciertamente
  - en efecto
  lexicon: LSJ
  rationale: La partícula introduce matiz concesivo con énfasis. «Aunque» reproduce bien la contraposición entre el enojo de Moisés y su control racional.
- source_word: κατὰ Δαθὰν καὶ Ἀβειρών
  english_pob_choice: against Dathan and Abiron
  chosen_spanish: contra Datán y Abirón
  alternatives_spanish:
  - respecto de Datán y Abirón
  lexicon: LSJ
  rationale: La preposición con personas expresa dirección hostil. Se conserva la forma griega Ἀβειρών como «Abirón», siguiendo la primacía del testimonio fuente frente a la forma hebrea más familiar «Abiram».
- source_word: οὐ θυμῷ τι κατ᾽ αὐτῶν ἐποίησεν
  english_pob_choice: he did nothing against them in anger
  chosen_spanish: no hizo nada contra ellos con ira
  alternatives_spanish:
  - no obró contra ellos impulsado por la ira
  - no actuó de ningún modo contra ellos con ira
  lexicon: LSJ
  rationale: 'El dativo θυμῷ funciona aquí como medio o modo: no actuó desde la ira. «Con ira» mantiene la construcción y la oposición ética con la acción racional.'
- source_word: λογισμῷ
  english_pob_choice: with reason
  chosen_spanish: con razón
  alternatives_spanish:
  - por juicio racional
  - con razonamiento
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es término clave para el juicio racional que gobierna las pasiones. «Con razón» es conciso y legible en español, y conserva esa fuerza temática sin volver la frase técnica en exceso.
- source_word: τὸν θυμὸν διήτησεν
  english_pob_choice: he mastered anger
  chosen_spanish: dominó la ira
  alternatives_spanish:
  - gobernó la ira
  - venció la ira
  - controló la ira
  lexicon: LSJ
  rationale: El verbo destaca el acto de superar o gobernar la pasión. «Dominó la ira» refleja mejor ese sentido que una simple restricción, y mantiene el contraste con actuar «con ira».
theological_decisions:
- issue: Cómo renderizar λογισμῷ en un contexto donde la obra subraya el dominio de la razón sobre las pasiones
  english_pob_reading: with reason
  chosen_spanish_reading: con razón
  alternative_spanish_readings:
  - por juicio racional
  - con razonamiento
  rationale: La obra presenta el triunfo del juicio racional sobre la ira como un tema central. «Con razón» preserva esa idea de manera natural y comprensible para la lectura pública.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Forma del nombre del personaje Ἀβειρών
  english_pob_reading: Abiron
  chosen_spanish_reading: Abirón
  alternative_spanish_readings:
  - Abiram
  rationale: Se conserva la transliteración del griego en lugar de normalizar al nombre más tradicional del hebreo. Eso respeta la primacía del texto fuente y evita borrar la forma documental del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail inglés, que ajustó la clausula final de «restrained anger» a «mastered anger». Por eso se eligió «dominó la ira» para reflejar mejor el sentido de control u obtención de victoria sobre la pasión, sin debilitar el contraste con actuar «con ira».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se usa «ira» para θυμός en el marco ético del pasaje; no se introduce «enojo» en la cláusula final para evitar una doblete innecesario.
  - 'Los nombres propios se transliteran desde el griego con acento españolizado: Datán, Abirón.'
  - 'La puntuación conserva la oposición retórica del original: concesión, negación de acción impulsada por ira y clausula final de dominio racional.'
