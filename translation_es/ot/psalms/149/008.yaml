translation:
  language: es
  text: para atar a sus reyes con cadenas, y a sus hombres honorables[a] con grillos de hierro
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "sus nobles" o "sus dignatarios" para "sus hombres honorables".
