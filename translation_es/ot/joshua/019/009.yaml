  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen términos sensibles del glosario mayor. La preservación de 'los hijos de Judá' y 'los hijos de Simeón' sigue la decisión auditada de transparencia tribal literal.
  issues:
