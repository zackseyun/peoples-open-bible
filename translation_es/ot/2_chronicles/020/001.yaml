translation:
  language: es
  text: Después de esto[a], los moabitas y los amonitas, y con ellos algunos de los meunitas, vinieron contra Josafat para la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Texto hebreo: «algunos de los amonitas». Muchos intérpretes, siguiendo el contexto y las versiones antiguas, entienden aquí a los meunitas o a un grupo aliado semejante, en vez de una repetición de «amonitas».'
    reason: textual_variant
lexical_decisions:
- source_word: וַיְהִי אֲחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Más tarde
  - Y sucedió después de esto
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una secuencia temporal; «Después de esto» conserva la relación temporal sin volver pesada la construcción con un calco más largo.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron contra
  - se acercaron
  lexicon: HALOT
  rationale: El verbo básico de movimiento se mantiene sencillo en español. El matiz hostil queda expresado por la preposición siguiente, como en el hebreo y en la lectura inglesa.
- source_word: בְנֵי מוֹאָב
  english_pob_choice: the Moabites
  chosen_spanish: los moabitas
  alternatives_spanish:
  - los hijos de Moab
  lexicon: HALOT
  rationale: La designación étnica es la equivalencia natural en español; «los hijos de Moab» sería demasiado literal y menos idiomático.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  lexicon: HALOT
  rationale: Como en Moab, el nombre étnico español es la forma más clara y estándar para el lector.
- source_word: וְעִמָּהֶם
  english_pob_choice: and with them
  chosen_spanish: y con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: Reproduce de manera directa la relación de compañía/acompañamiento sin añadir precisión no explicitada.
- source_word: מֵהָעַמּוֹנִים
  english_pob_choice: some of the Meunites
  chosen_spanish: algunos de los meunitas
  alternatives_spanish:
  - algunos de los amonitas
  lexicon: HALOT
  rationale: Sigo la decisión crítica del POB inglés y de muchos intérpretes que ven aquí otro grupo aliado, no una simple repetición de «amonitas». Mantengo la alternativa textual en nota.
- source_word: עַל יְהוֹשָׁפָט
  english_pob_choice: against Jehoshaphat
  chosen_spanish: contra Josafat
  alternatives_spanish:
  - sobre Josafat
  - a Josafat
  lexicon: HALOT
  rationale: En contexto militar, עַל expresa hostilidad u oposición; «contra» transmite con naturalidad esa fuerza en español.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - a la guerra
  lexicon: HALOT
  rationale: «Guerra» conserva el sustantivo hebreo con claridad en español. «Batalla» es posible, pero «guerra» refleja mejor el término amplio del original.
translation_notes:
  revision_awareness: 'El POB inglés reciente mantiene sin cambios esta línea: «After this[a], the Moabites and the Ammonites, and with them some of the Meunites, came against Jehoshaphat for battle.» No se registran revisiones aplicadas en el pasaje auditado.'
  spanish_consistency_notes:
  - Uso «Josafat» sin h, siguiendo la forma habitual en español bíblico para יהושafat.
  - Conservo «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Meunitas» se usa como etnónimo transliterado coherente con la nota crítica, no como armonización con «amonitas».
