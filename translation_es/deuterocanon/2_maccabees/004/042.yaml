translation:
  language: es
  text: Pero, al enterarse también del ataque de Lisímaco[a], unos agarraron piedras, otros gruesos trozos de madera[b], y algunos, tomando puñados de las cenizas cercanas, arrojaban todo junto contra los que estaban alrededor de Lisímaco[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sabiendo también del ataque de Lisímaco». El participio griego puede entenderse de forma más estática («sabiendo») o más dinámica en el contexto («al enterarse»).'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «espesores de madera», es decir, trozos de madera gruesos o pesados.
    reason: lexical_alternative
  - marker: c
    text: La frase puede referirse a los acompañantes o partidarios de Lisímaco.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνειδότες
  english_pob_choice: became aware of
  chosen_spanish: al enterarse también de
  alternatives_spanish:
  - sabiendo también de
  - estando conscientes también de
  lexicon: LSJ
  rationale: El participio introduce una reacción informada en el flujo narrativo. «Al enterarse también de» comunica bien en español la idea de conocimiento reciente o advertido, sin volverlo excesivamente estático.
- source_word: ἐπίθεσιν
  english_pob_choice: attack
  chosen_spanish: ataque
  alternatives_spanish:
  - asalto
  - agresión
  lexicon: LSJ
  rationale: En este contexto de violencia, «ataque» es natural en español y conserva la fuerza hostil del sustantivo griego.
- source_word: συναρπάσαντες
  english_pob_choice: snatched up
  chosen_spanish: agarraron
  alternatives_spanish:
  - tomaron de golpe
  - arrebataron
  lexicon: LSJ
  rationale: El verbo expresa una acción súbita y enérgica sobre objetos a mano. «Agarraron» es idiomático y suficientemente fuerte en español; el matiz de rapidez queda sostenido por el contexto.
- source_word: ξύλων πάχη
  english_pob_choice: thick pieces of wood
  chosen_spanish: gruesos trozos de madera
  alternatives_spanish:
  - maderos gruesos
  - trozos espesos de madera
  - pedazos gruesos de madera
  lexicon: LSJ
  rationale: La expresión literal apunta a «espesores/masas de madera», no a un arma técnica. «Gruesos trozos de madera» conserva la imagen concreta sin sobreinterpretarla como «garrotes» o «clavos».
- source_word: σποδοῦ
  english_pob_choice: ashes
  chosen_spanish: cenizas
  alternatives_spanish:
  - ceniza
  - rescoldos
  lexicon: LSJ
  rationale: «Cenizas» es la equivalencia más directa y clara en español para el sustantivo. Mantiene la concreción del cuadro narrativo.
- source_word: δραξόμενοι
  english_pob_choice: grabbing handfuls of
  chosen_spanish: tomando puñados de
  alternatives_spanish:
  - agarrando puñados de
  - sacando puñados de
  - tomando con la mano de
  lexicon: LSJ
  rationale: El participio medio sugiere tomar con la mano, incluso en porciones. «Tomando puñados de» reproduce bien el valor físico y resulta natural en español.
- source_word: φύρδην
  english_pob_choice: all together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - mezcladamente
  - en desorden
  - a bulto
  lexicon: LSJ
  rationale: La partícula expresa una acción conjunta y mezclada, no necesariamente “confusa” en español moderno. «Todos juntos» sigue el ajuste del audit trail inglés y refleja el lanzamiento indiscriminado/combinado.
- source_word: ἐνετίνασσον
  english_pob_choice: hurled
  chosen_spanish: arrojaban
  alternatives_spanish:
  - lanzaban
  - tiraban con fuerza
  - apedreaban
  lexicon: LSJ
  rationale: El imperfecto describe una acción repetida. «Arrojaban» conserva la fuerza del verbo sin agregar una intensidad demasiado interpretativa.
- source_word: τοὺς περὶ τὸν Λυσίμαχον
  english_pob_choice: those around Lysimachus
  chosen_spanish: los que estaban alrededor de Lisímaco
  alternatives_spanish:
  - los de alrededor de Lisímaco
  - los que acompañaban a Lisímaco
  - Lisímaco y los suyos
  lexicon: LSJ
  rationale: La frase griega se refiere literalmente a quienes estaban alrededor de Lisímaco. «Los que estaban alrededor de Lisímaco» evita definir de más si se trata de guardias, seguidores o acompañantes.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su revisión posterior: ‘all together’ para φύρδην, manteniendo la idea de acción colectiva/indiscriminada; además, se conservó el valor narrativo de los participios y la referencia abierta a los que rodean a Lisímaco sin especificarla más de lo que permite el griego.'
  spanish_consistency_notes:
  - Se usó «Lisímaco» de manera consistente para Λυσίμαχος.
  - Se prefirió «ataque» por su claridad y correspondencia semántica con ἐπίθεσιν.
  - Se mantuvo «cenizas» para σποδοῦ y no «polvo», porque el texto pide una imagen concreta.
  - La construcción con imperfecto («arrojaban») refleja la acción reiterada del griego.
  - «Todos juntos» se eligió para reflejar el matiz de acción mezclada/colectiva de φύρδην sin forzar un matiz negativo adicional.
