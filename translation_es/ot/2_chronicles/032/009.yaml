    issue: Marcadores de notas desalineados con su contenido
    rationale: La nota [a] está anclada a «Después de esto», pero su contenido explica «sobre/contra Laquis». La nota [b] vuelve a tratar Laquis, creando duplicación confusa. Los marcadores deben aparecer exactamente donde corresponde la alternativa léxica.
  - severity: medium
    issue: «todo Judá que estaba en Jerusalén» es poco natural y semánticamente impreciso
    rationale: El hebreo se refiere a los judíos/judaítas presentes en Jerusalén. En español, «todo Judá» puede entenderse como el pueblo o territorio en singular colectivo, pero con «que estaba» resulta forzado. Es preferible una formulación personal y plural.
  - severity: low
    issue: «toda su fuerza con él» suena menos idiomático que «todas sus fuerzas con él»
    rationale: Ambas son posibles, pero el plural encaja mejor con el contexto militar y con la revisión final del POB inglés («all his forces with him»).
