translation:
  language: es
  text: Para el director del coro. Salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por David' o 'para David'; el superscrito hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director de música
  - Para el maestro de coro
  - Para el jefe de músicos
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, esta forma con ל suele funcionar como nota de dedicación o destino para quien dirige la ejecución musical. 'Director del coro' comunica con naturalidad la función y evita un calco demasiado arcaico como 'jefe de músicos'.
- source_word: מִזְמֹור
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Melodía
  lexicon: HALOT
  rationale: Es el término genérico y técnico del encabezamiento. 'Salmo' es la equivalencia más precisa y reconocible en español para este género literario.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en este tipo de encabezamientos puede indicar autoría, asociación o dedicación. 'De David' conserva esa amplitud sin resolverla indebidamente, manteniendo la tensión documentada por el texto fuente.
theological_decisions:
- issue: Alcance del encabezamiento davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo permite varias relaciones entre el salmo y David. La traducción principal preserva esa ambigüedad en vez de fijar una sola relación, siguiendo la política de mantener la tensión interpretativa cuando el original no la resuelve.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se atendió la revisión auditada que movió el marcador de nota al final del verso, para que la nota explique correctamente לְדָוִד y no 'director del coro'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como término por defecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se mantuvo el orden y función de encabezamiento breve propio de las superscripciones de salmos.
  - '''Salmo'' se dejó sin artículo para reflejar el estilo nominal conciso del hebreo del encabezamiento.'
