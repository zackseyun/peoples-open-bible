translation:
  language: es
  text: Así que ahora, no se burlen, no sea que se fortalezcan sus ataduras; porque he oído de parte del Señor Yahvé de los ejércitos[b] una destrucción completa y decretada contra toda la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra todo el país». La palabra hebrea puede significar «tierra» o «país».
    reason: alternative_reading
  - marker: b
    text: O «de las huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: La combinación hebrea introduce transición urgente y consecuencia lógica; «Así que ahora» conserva ese valor inferencial y temporal en un español natural y solemne.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no deben
  - no han de
  lexicon: HALOT
  rationale: En una prohibición directa con imperativo/imperfecto, el «no» simple es el equivalente más natural y fiel.
- source_word: תִּתְלוֹצָצוּ
  english_pob_choice: scoff
  chosen_spanish: se burlen
  alternatives_spanish:
  - se mofen
  - se burlen con desprecio
  lexicon: HALOT
  rationale: El verbo expresa burla despectiva; «se burlen» comunica bien el tono profético de desprecio arrogante sin endurecer innecesariamente el español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - si no
  lexicon: HALOT
  rationale: «No sea que» reproduce la advertencia de posible consecuencia indeseada de forma idiomática en español.
- source_word: יֶחְזְקוּ
  english_pob_choice: be made stronger
  chosen_spanish: se fortalezcan
  alternatives_spanish:
  - se hagan más fuertes
  - se aprieten
  lexicon: HALOT
  rationale: En el contexto de restricciones/ataduras, el verbo puede entenderse como volverse más fuertes o tensas; «se fortalezcan» preserva la fuerza verbal sin interpretar demasiado.
- source_word: מוֹסְרֵיכֶם
  english_pob_choice: your bonds
  chosen_spanish: sus ataduras
  alternatives_spanish:
  - sus ligaduras
  - sus cadenas
  lexicon: HALOT
  rationale: «Ataduras» mantiene la metáfora concreta de vínculo o sujeción y suena natural en español bíblico contemporáneo. Se eligió el plural posesivo de tercera persona acorde con el discurso directo plural del versículo en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia; «porque» es claro y plenamente idiomático.
- source_word: כָלָה
  english_pob_choice: a complete destruction
  chosen_spanish: una destrucción completa
  alternatives_spanish:
  - un fin completo
  - una consumación total
  lexicon: HALOT
  rationale: En contexto judicial, כָלָה comunica una ruina total o consumación; «una destrucción completa» mantiene la severidad del juicio sin sobretraducción interpretativa.
- source_word: וְנֶחֱרָצָה
  english_pob_choice: decreed
  chosen_spanish: decretada
  alternatives_spanish:
  - determinada
  - sentenciada
  lexicon: HALOT
  rationale: El pasivo comunica algo fijado/decidido de antemano; «decretada» expresa bien la idea de un juicio ya resuelto y mantiene el tono jurídico-profético.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - he escuchado
  - escuché
  lexicon: HALOT
  rationale: El perfecto funciona como anuncio profético recibido; «he oído» suena natural y conserva el matiz de noticia ya recibida y válida.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: «De parte de» refuerza el origen autorizado del mensaje profético sin añadir contenido ajeno.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino según la política del proyecto: YHWH → «Yahvé». Como אֲדֹנָי precede al nombre, «Señor Yahvé» mantiene ambos elementos sin la convención inglesa de «Lord GOD».'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: En español bíblico, el título divino se comunica con naturalidad como «de los Ejércitos»; conserva el valor militar del hebreo sin sonar forzado.
- source_word: עַל כָּל הָאָרֶץ
  english_pob_choice: against the whole land
  chosen_spanish: contra toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - contra todo el país
  lexicon: HALOT
  rationale: La preposición y el contexto de juicio favorecen «contra». «Tierra» mantiene la ambigüedad semántica de אֶרֶץ entre tierra/país/mundo, que el inglés POB también preserva con nota.
theological_decisions:
- issue: Título divino compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El texto hebreo une el título soberano אֲדֹנָי con el nombre del pacto YHWH. La traducción principal debe mantener ambos elementos de modo legible en español. «Yahvé» sigue la convención del proyecto para el Tetragrámaton y evita la máscara de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé; preservar el nombre divino en traducción'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios respecto al borrador auditado en inglés; por eso el español sigue de cerca las decisiones léxicas y teológicas ya justificadas, adaptándolas al uso natural del español y preservando la tensión tierra/tierra-mundo mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para YHWH según la política del proyecto, y «Señor Yahvé» para אֲדֹנָי יְהוִה.
  - Se usa «tierra» en el texto principal para conservar la lectura contextual de juicio local, con nota que permite «toda la tierra» como alternativa.
  - «Ejércitos» traduce צְבָאוֹת de forma transparente y compatible con el tono bíblico contemporáneo.
  - Se prefirió «ataduras» para מוֹסְרֵיכֶם por su concreción metafórica y fluidez en español.
