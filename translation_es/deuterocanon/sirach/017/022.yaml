translation:
  language: es
  text: Vuelve[a][c] al Altísimo y apártate de la maldad[b], y odia intensamente lo abominable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuélvete al Altísimo». El imperativo griego también puede expresarse como un retorno o volverse de nuevo hacia Dios, con matiz de arrepentimiento y renovada orientación hacia él.
    reason: lexical_alternative
  - marker: b
    text: «Maldad» también puede traducirse «injusticia» o «mal obrar», según se enfatice el mal moral en sentido amplio o un acto más concreto de conducta injusta.
    reason: lexical_alternative
  - marker: c
    text: El texto griego en esta sección de Sirácida es el testimonio principal usado aquí; las notas de validación de la fuente indican una discrepancia en la historia de transmisión de este versículo, por lo que la traducción se mantiene muy ceñida al griego conservado.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπάναγε
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Regresa
  - Vuelve
  lexicon: LSJ
  rationale: El imperativo pide un volver orientado a Dios; «vuélvete» expresa mejor en español la idea de retorno con matiz de arrepentimiento que un simple movimiento espacial.
- source_word: ἐπὶ Ὕψιστον
  english_pob_choice: to the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Más Alto
  - hacia el Altísimo
  lexicon: LSJ
  rationale: «Altísimo» conserva el título divino y suena natural en español bíblico; el artículo con contracción («al») refleja la dirección del verbo sin perder el valor reverencial.
- source_word: ἀπόστρεφε
  english_pob_choice: turn away from
  chosen_spanish: apártate de
  alternatives_spanish:
  - aléjate de
  - vuélvete de
  lexicon: LSJ
  rationale: El verbo pide una separación moral continua; «apártate de» mantiene la fuerza exhortativa y funciona con naturalidad en español.
- source_word: ἀπὸ ἀδικίας
  english_pob_choice: from unrighteousness
  chosen_spanish: de la injusticia
  alternatives_spanish:
  - de la maldad
  - del mal obrar
  - de la injusticia cometida
  lexicon: LSJ
  rationale: ἀδικία puede abarcar injusticia, maldad o conducta torcida; aquí «injusticia» preserva el peso ético y evita un giro demasiado abstracto como «maldad».
- source_word: σφόδρα
  english_pob_choice: intensely
  chosen_spanish: intensamente
  alternatives_spanish:
  - muchísimo
  - con vehemencia
  - en gran manera
  lexicon: LSJ
  rationale: El adverbio intensifica el mandato; «intensamente» reproduce bien esa fuerza en español contemporáneo sin suavizarla.
- source_word: μίσησον
  english_pob_choice: hate
  chosen_spanish: odia
  alternatives_spanish:
  - aborrece
  - detesta
  lexicon: LSJ
  rationale: El imperativo es fuerte; «odia» conserva la severidad del original. «Aborrece» o «detesta» podrían sonar más idiomáticas, pero atenúan menos o cambian ligeramente el registro.
- source_word: βδέλυγμα
  english_pob_choice: what is abominable
  chosen_spanish: lo abominable
  alternatives_spanish:
  - la abominación
  - lo detestable
  - lo repugnante
  lexicon: LSJ
  rationale: Para evitar convertir el objeto en una categoría demasiado técnica o en un sustantivo más rígido, «lo abominable» sigue el valor del adjetivo sustantivado y preserva la amplitud moral del término.
theological_decisions:
- issue: Matiz de arrepentimiento en el llamado inicial
  english_pob_reading: Return to the Most High
  chosen_spanish_reading: Vuélvete al Altísimo
  alternative_spanish_readings:
  - Regresa al Altísimo
  - Vuelve al Altísimo
  rationale: El contexto sapiencial llama a una reorientación moral hacia Dios; «vuélvete» comunica retorno y cambio de dirección, manteniendo la dimensión de conversión implícita en el verbo griego.
  doctrine_reference: 'DOCTRINE.md: repentance / turning back as renewed orientation toward God'
- issue: Alcance moral de ἀδικία
  english_pob_reading: unrighteousness
  chosen_spanish_reading: injusticia
  alternative_spanish_readings:
  - maldad
  - wrongdoing
  - injusticia o mal obrar
  rationale: La POB inglesa opta por un término moral amplio; en español, «injusticia» conserva esa amplitud ético-covenantal y evita reducir el sentido a un solo acto social.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: Fuerza del objeto final βδέλυγμα
  english_pob_reading: what is abominable
  chosen_spanish_reading: lo abominable
  alternative_spanish_readings:
  - lo detestable
  - la abominación
  rationale: La frase final debe conservar la gravedad del término sin forzar una categoría doctrinal específica; «lo abominable» reproduce la idea de algo moralmente odioso y naturaliza el giro en español.
  doctrine_reference: 'DOCTRINE.md: readable modern Spanish, not archaic or overly technical'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y la decisión inglesa revisada, especialmente en la progresión imperativa (volver/apartarse/odiar) y en el final sustantivado de βδέλυγμα. Se evita depender mecánicamente del inglés, pero se conserva la misma tensión semántica entre retorno a Dios, rechazo moral y odio a lo abominable.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino coherente con el proyecto.
  - «Injusticia» preserva el campo semántico amplio de ἀδικία sin caer en una equivalencia demasiado estrecha.
  - No se introduce «Cristo» ni terminología cristológica ajena al versículo.
  - El registro es bíblico y sobrio, apto para lectura pública en español neutro.
