id: PRO.6.3
reference: Proverbs 6:3
source:
  edition: WLC
  text: עֲשֵׂ֨ה זֹ֥את אֵפ֪וֹא בְּנִ֡/י וְֽ/הִנָּצֵ֗ל כִּ֘י בָ֤אתָ בְ/כַף רֵעֶ֑/ךָ לֵ֥ךְ הִ֝תְרַפֵּ֗ס וּ/רְהַ֥ב רֵעֶֽי/ךָ׀־׃
translation:
  text: 'Do this[a], then, my son, and deliver yourself, for you have come into the palm of your neighbor: go, humble yourself[c][b], and press your plea with your neighbors.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'into the palm of your neighbor,' that is, into your neighbor's power or control.
    reason: lexical_alternative
  - marker: b
    text: Or 'throw yourself down' / 'submit yourself' for 'humble yourself.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'your neighbors' (plural), though many understand the sense as singular, 'your neighbor' or 'your friend,' in line with the earlier phrase.
    reason: textual_variant
lexical_decisions:
- source_word: עֲשֵׂה זֹאת
  chosen: Do this
  alternatives:
  - Do this now
  - Do this, therefore
  lexicon: HALOT
  rationale: Straightforward imperative plus demonstrative. English keeps the urgency without adding content.
- source_word: אֵפוֹא
  chosen: then
  alternatives:
  - now
  - therefore
  lexicon: HALOT
  rationale: Discourse particle marking inference/urgency. 'Then' fits natural modern English while preserving the exhortational flow.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Masculine singular with filial address in wisdom literature. Per gender-accurate policy, 'my son' best matches the source and genre.
- source_word: וְהִנָּצֵל
  chosen: deliver yourself
  alternatives:
  - save yourself
  - free yourself
  lexicon: HALOT
  rationale: Niphal imperative of נצל conveys escaping or being delivered. 'Deliver yourself' preserves the reflexive force and urgency.
- source_word: כִּי בָאתָ
  chosen: for you have come
  alternatives:
  - since you have come
  - when you have come
  lexicon: HALOT
  rationale: 'כִּי here gives the reason for the command. Perfect verb rendered as present-result English: the addressee is already in this condition.'
- source_word: בְכַף רֵעֶךָ
  chosen: into the palm of your neighbor
  alternatives:
  - into the hand of your neighbor
  - under your neighbor's power
  lexicon: HALOT
  rationale: כַּף is literally 'palm,' an idiom for being in someone's grasp or power. Main text keeps the concrete image; the idiomatic alternative is preserved in a footnote.
- source_word: לֵךְ
  chosen: go
  alternatives:
  - be off
  - go at once
  lexicon: HALOT
  rationale: Simple imperative introducing the next urgent actions.
- source_word: הִתְרַפֵּס
  chosen: humble yourself
  alternatives:
  - throw yourself down
  - submit yourself
  lexicon: HALOT
  rationale: The rare hitpael likely conveys abasing oneself or making oneself low before another. 'Humble yourself' communicates the social posture required without over-specifying the physical gesture.
- source_word: וּרְהַב
  chosen: press your plea
  alternatives:
  - urge strongly
  - importune
  - press hard
  lexicon: HALOT
  rationale: Imperative from רהב in this context is commonly understood as acting insistently or importunately. 'Press your plea' makes explicit the implied object in idiomatic English while retaining the sense of urgent entreaty.
- source_word: רֵעֶיךָ
  chosen: your neighbors
  alternatives:
  - your friend
  - your associates
  lexicon: HALOT
  rationale: Masculine plural form in the MT is difficult after singular רֵעֶךָ earlier in the verse. The plural is retained in the main text as the received reading, while the likely singular sense is preserved in a footnote as a lexical/textual note.
