translation:
  language: es
  text: Hace una sola la mente del rey y del huérfano, y la del esclavo[a] y la del libre, y la del pobre y la del rico;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "siervo" para οἰκέτου, aunque el contraste con "libre" hace más probable el sentido de esclavo o de condición no libre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖ
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - hace que sea
  - convierte
  lexicon: LSJ
  rationale: Verbo simple de acción causativa; "hace" conserva la fuerza activa y resulta natural en español sin añadir explicaciones.
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - pensamiento
  - entendimiento
  - modo de pensar
  lexicon: LSJ
  rationale: '"Mente" expresa bien la facultad interior o disposición mental que se unifica en el contraste social del versículo.'
- source_word: μίαν
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - la misma
  - única
  lexicon: LSJ
  rationale: '"Una" reproduce de forma directa la unidad/igualación del griego y funciona naturalmente con "mente".'
- source_word: βασιλέως
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - gobernante
  lexicon: LSJ
  rationale: '"Rey" es el equivalente más directo y estándar para βασιλεύς en este contexto.'
- source_word: ὀρφανοῦ
  english_pob_choice: orphan
  chosen_spanish: huérfano
  alternatives_spanish:
  - huérfano de padre
  - desamparado
  lexicon: LSJ
  rationale: '"Huérfano" es el correlato natural de la vulnerabilidad social expresada por el griego y mantiene el contraste con "rey".'
- source_word: οἰκέτου
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado doméstico
  lexicon: LSJ
  rationale: El contraste inmediato con ἐλευθέρου exige una condición de sujeción; "esclavo" preserva mejor esa fuerza que "siervo".
- source_word: ἐλευθέρου
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - liberto
  - persona libre
  lexicon: LSJ
  rationale: '"Libre" es el término más directo y natural para el contraste social con "esclavo".'
- source_word: πένητος
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - indigente
  lexicon: LSJ
  rationale: Término socioeconómico amplio; "pobre" reproduce el contraste con "rico" de manera clara e idiomática.
- source_word: πλουσίου
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - adinerado
  - acomodado
  lexicon: LSJ
  rationale: '"Rico" es el equivalente directo y el par natural de "pobre" en español.'
theological_decisions:
- issue: οἰκέτου en contraste social con ἐλευθέρου
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La oposición explícita con "libre" indica estatus de dependencia o falta de libertad; por eso "esclavo" preserva mejor la tensión léxica que una forma más suave.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: Coincide con el pasaje inglés auditado en su lectura de nivel social y en el mantenimiento del contraste rey/huérfano, esclavo/libre y pobre/rico; no se documentan revisiones posteriores que alteren esa decisión.
  spanish_consistency_notes:
  - 'Se mantuvo un registro uniforme de los pares antitéticos: rey/huérfano, esclavo/libre, pobre/rico.'
  - '"Huérfano" se conserva sin glosa adicional porque el texto no exige explicitar "sin padre".'
  - Se eligió "esclavo" en lugar de "siervo" para seguir la fuerza del contraste social del original y del inglés POB.
