  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: וְאַחֲרִיתָהּ se refleja idiomáticamente como «al final ella», מָרָה como «es amarga», כַלַּעֲנָה como «como el ajenjo», y כְּחֶרֶב פִּיּוֹת como «como una espada de dos filos». La imagen proverbial y el contraste están preservados. El punto principal a corregir es חַדָּה: en este contexto con espada, «aguda» es menos natural y menos preciso que «afilada».'
  spanish_quality_summary: La frase es clara y digna, pero «aguda como una espada» suena poco idiomático en español bíblico general. «Afilada como una espada de dos filos» fluye mejor y expresa con más naturalidad la cualidad cortante. También conviene ajustar la nota alternativa para mantener la concordancia femenina del adjetivo con «ella».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Ajenjo» para לענה y «espada de dos filos» para חֶרֶב פִּיּוֹת están bien alineados. La revisión propuesta solo mejora la naturalidad y precisión léxica de חַדָּה en español.
  issues:
  - severity: medium
    issue: «aguda» para חַדָּה suena poco natural con «espada»
    rationale: Aunque semánticamente posible, en español la colocación normal es «afilada» para un arma cortante. Esto comunica mejor el sentido de «sharp» en la comparación hebrea.
  - severity: low
    issue: La nota alternativa usa «amargo» y «aguda» con «su final»
    rationale: Si se mantiene la alternativa formal «su final», «amargo» concuerda con «final», pero «aguda» deja de concordar naturalmente con el referente inmediato y suena más torpe en español. Conviene rehacer toda la alternativa formal como una formulación nominal coherente.
  revised_spanish_text: pero al final ella es amarga como el ajenjo[a], afilada como una espada de dos filos.
