translation:
  language: es
  text: 'Para el director del coro: según «Lirios»[a]. De los hijos de Coré. Maskil[b]. Un canto de amores[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo Shoshannim suele entenderse tradicionalmente como nombre de una melodía o ajuste musical; literalmente significa «lirios».
    reason: lexical_alternative
  - marker: b
    text: Maskil es un término técnico en los encabezados de los salmos; puede señalar una composición contemplativa o instructiva.
    reason: lexical_alternative
  - marker: c
    text: O «un canto de amor». El hebreo dice literalmente «un canto de amores».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder musical
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala al responsable musical. «Director del coro» es natural en español y conserva la función litúrgico-musical sin imponer una precisión mayor que la del hebreo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - con la melodía de
  lexicon: HALOT
  rationale: En encabezados musicales, la preposición puede introducir una melodía o designación de tono. «Según» mantiene abierta la referencia técnica, como hace el inglés POB con «according to».
- source_word: שֹׁשַׁנִּים
  english_pob_choice: “Lilies”
  chosen_spanish: «Lirios»
  alternatives_spanish:
  - «Lilies»
  - Shoshannim
  lexicon: HALOT
  rationale: El hebreo es literalmente «lirios», pero en el encabezado probablemente nombra una melodía o ajuste musical. Se conserva el sentido léxico en la línea principal y la ambigüedad inherente sin transliterar el término en el cuerpo.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: Of the sons of Korah
  chosen_spanish: De los hijos de Coré
  alternatives_spanish:
  - Para los hijos de Coré
  - Por los hijos de Coré
  lexicon: HALOT
  rationale: La construcción de pertenencia/atribución se expresa de manera directa en español con «de». «Coré» sigue la forma castellana común del nombre propio.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - un maskil
  - un canto instructivo
  lexicon: HALOT
  rationale: Es un término técnico de encabezado cuyo valor exacto es incierto. Se mantiene transliterado para no falsear su sentido; la mayúscula sigue la decisión auditada del inglés POB de tratarlo como término literario/técnico.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Un canto
  alternatives_spanish:
  - Un poema
  - Una canción
  lexicon: HALOT
  rationale: «Canto» es una opción natural y digna en español bíblico para el género poético-musical, y evita la posible asociación moderna de «canción».
- source_word: יְדִידֹת
  english_pob_choice: of loves
  chosen_spanish: de amores
  alternatives_spanish:
  - de amor
  - de los amores
  lexicon: HALOT
  rationale: El plural hebreo es raro y el inglés POB conserva «of loves» para no aplanar la forma. «De amores» preserva esa pluralidad y su ambigüedad poética mejor que una singularización interpretativa.
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del inglés POB: se mantiene «Maskil» como término transliterado y se conserva la ambigüedad musical/poética del encabezado sin sobreespecificarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero aquí no aparece ningún teónimo.
  - Se mantiene una sintaxis de encabezado breve y formal, adecuada para superscripciones salmódicas.
  - Se evita traducir mecánicamente desde el inglés al preservar la estructura y la ambigüedad del hebreo donde el encabezado lo requiere.
