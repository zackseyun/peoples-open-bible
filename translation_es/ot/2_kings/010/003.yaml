    text: Or 'look for the good and upright one from among your master's sons.' The Hebrew verb is literally 'see,' but here it carries the sense of selecting after consideration.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here means the royal household or dynasty, not merely a physical building.'
    reason: cultural_note
