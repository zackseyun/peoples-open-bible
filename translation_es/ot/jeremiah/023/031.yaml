translation:
  language: es
  text: 'He aquí, yo estoy contra los profetas, declara Yahvé, los que usan sus lenguas y declaran[a]: «¡Declara Yahvé!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que usan sus lenguas y dicen: “¡Oráculo!”». El hebreo es breve y probablemente irónico, presentando a profetas que fabrican un habla con apariencia de autoridad desde su propia boca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo estoy
  alternatives_spanish:
  - Mira, yo estoy
  - He aquí, yo me pongo
  lexicon: HALOT
  rationale: He aquí conserva el tono solemne y profético de una auto-presentación divina; añado yo estoy para mantener la presencia enfática de la primera persona en un español natural.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - frente a
  lexicon: HALOT
  rationale: En esta construcción idiomática, el sentido es de oposición o juicio, no de ubicación espacial.
- source_word: הַנְּבִיאִם
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los falsos profetas
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'los profetas'; se mantiene esa forma sin añadir el calificativo 'falsos' que proviene del contexto amplio pero no de la cláusula misma.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Declara Yahvé reproduce la fórmula profética con un verbo de proclamación actual y conserva el nombre divino según el criterio POB para יְהוָה.
- source_word: הַלֹּקְחִים
  english_pob_choice: who use
  chosen_spanish: los que usan
  alternatives_spanish:
  - los que toman
  - los que agarran
  lexicon: HALOT
  rationale: Aunque el sentido literal básico es 'tomar', aquí el contexto requiere la idea de usar o manipular la lengua como instrumento de habla interesada; 'usan' refleja bien esa función sin perder la referencia al órgano físico.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongues
  chosen_spanish: su lengua
  alternatives_spanish:
  - sus lenguas
  - su habla
  lexicon: HALOT
  rationale: En español, el singular colectivo 'su lengua' comunica de manera natural el hebreo plural posesivo y preserva el elemento corporal y retórico del texto.
- source_word: וַיִּנְאֲמוּ
  english_pob_choice: and declare
  chosen_spanish: y proclaman
  alternatives_spanish:
  - y declaran
  - y profieren
  lexicon: HALOT
  rationale: El verbo comparte raíz con נְאֻם y crea un juego de palabras. 'Proclaman' suena idiomático y permite conservar la idea de una formulación autoritativa; 'declaran' queda como alternativa cercana.
- source_word: נְאֻם
  english_pob_choice: ‘Declares Yahweh.’
  chosen_spanish: «¡Declara Yahvé!»
  alternatives_spanish:
  - «¡Oráculo de Yahvé!»
  - «¡Dice Yahvé!»
  lexicon: HALOT
  rationale: El final abrupto y repetitivo imita la fórmula profética con ironía. En español, la exclamación mantiene el tono terso y la aparente autoritatividad de la fórmula que estos profetas se apropian.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el criterio POB de no enmascarar el nombre del pacto. 'Yahvé' es la forma establecida para el texto español, manteniendo la referencia directa al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de la ironía en la fórmula final
  english_pob_reading: ‘Declares Yahweh.’
  chosen_spanish_reading: «¡Declara Yahvé!»
  alternative_spanish_readings:
  - «¡Oráculo de Yahvé!»
  - «¡Dice Yahvé!»
  rationale: 'La última palabra reproduce la fórmula נְאֻם de modo abrupto. Traducirla como cita exclamativa conserva la ironía: los profetas fabrican un sonsonete de autoridad en boca propia.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La redacción sigue el último estado del audit trail: se abandona una traducción demasiado literal de הַלֹּקְחִים como ''tomar'' y se adopta una opción más natural para el contexto, ''usar''. También se conserva la ironía final de נְאֻם mediante una exclamación breve, en lugar de una paráfrasis explicativa.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre la fórmula profética (declara Yahvé) y la cita irónica final (¡Declara Yahvé!), para que el lector perciba el juego de palabras del hebreo.
  - Se usa 'Yahvé' de forma consistente con el estándar POB para el nombre divino.
  - La nota al pie cubre la alternativa semántica preservada por el audit trail sin sobrecargar el texto principal.
