base_translation:
  language: en
  yaml_path: translation/ot/isaiah/015/005.yaml
  text: My heart cries out for Moab[a]; her fugitives flee as far as Zoar, as far as Eglath-shelishiyah. For they go up the ascent of Luhith with weeping[c][b]; for on the road to Horonaim they raise a cry of destruction.
  footnotes:
  - marker: a
    text: Hebrew בְּרִיחֶיהָ is difficult. It may mean 'her fugitives/refugees,' as rendered here, or more literally 'her bars,' which some take metaphorically or emend in light of the context.
    reason: lexical_alternative
  - marker: b
    text: Eglath-shelishiyah is likely a place name. The expression could also be understood literally as 'a three-year-old heifer.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verbs in this verse shift between singular and plural forms; the translation smooths them to reflect the collective movement of Moab's people.
    reason: lexical_alternative
