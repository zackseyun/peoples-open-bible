    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «para él», aparentemente refiriéndose específicamente al rey, aunque también se invita a Amán.'
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción básica porque representa fielmente el hebreo y la auditoría inglesa. Se corrige el anclaje de la nota sobre el singular «para él» y se normaliza el nombre propio a «Amán» para un español más natural y consistente.
