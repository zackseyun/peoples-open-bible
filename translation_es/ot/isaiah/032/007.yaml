translation:
  language: es
  text: Y los recursos del malvado[a] son perversos; él concibe planes para arruinar a los humildes[b] con palabras engañosas, aun cuando el necesitado habla justicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'instrumentos', 'herramientas', 'medios' o 'armas' para 'recursos'; el término hebreo puede referirse literalmente a implementos y, aquí, figuradamente a métodos o recursos.
    reason: lexical_alternative
  - marker: b
    text: O 'los afligidos' o 'los mansos' para 'los humildes'.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''y cuando el pobre/necesitado habla justicia/juicio''; el sentido puede ser que el malvado se opone al pobre incluso cuando la causa del pobre es justa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵלַי / כֵּלָיו
  english_pob_choice: devices
  chosen_spanish: dispositivos
  alternatives_spanish:
  - instrumentos
  - herramientas
  - medios
  lexicon: HALOT
  rationale: El hebreo כלי puede denotar utensilios o instrumentos concretos, pero aquí funciona metafóricamente para los recursos mentales o estratégicos del malvado. 'Dispositivos' conserva esa idea de medios o mecanismos sin concretarla indebidamente como armas físicas.
- source_word: רָעִים
  english_pob_choice: evil
  chosen_spanish: perversos
  alternatives_spanish:
  - malos
  - malvados
  - malignos
  lexicon: HALOT
  rationale: El adjetivo califica moralmente los 'dispositivos'. 'Perversos' mantiene la carga ética fuerte del hebreo en un registro natural para el español bíblico actual.
- source_word: הוּא
  english_pob_choice: the rogue’s
  chosen_spanish: del hombre malo
  alternatives_spanish:
  - del malvado
  - del malhechor
  - de ese hombre
  lexicon: HALOT
  rationale: Como en el inglés POB, el sujeto implícito se hace explícito en español para claridad. 'Hombre malo' mantiene el contraste de carácter del contexto sin introducir una categoría más fuerte que la evidencia del verso.
- source_word: זִמּוֹת
  english_pob_choice: schemes
  chosen_spanish: planes
  alternatives_spanish:
  - maquinaciones
  - tramas
  - estratagemas
  lexicon: HALOT
  rationale: '''Planes'' es más sobrio y directo en español, aunque el contexto les da un matiz negativo. Se evita sobretraducir a una palabra más cargada como ''maquinaciones'' si el propio sustantivo ya recibe su tono del contexto.'
- source_word: יָעָץ
  english_pob_choice: he devises
  chosen_spanish: concibe
  alternatives_spanish:
  - maquina
  - planea
  - idea
  lexicon: HALOT
  rationale: El verbo expresa acción deliberada de formar un plan. 'Concibe' preserva el aspecto intelectual y intencional sin depender de una frase demasiado analítica.
- source_word: לְחַבֵּל
  english_pob_choice: to ruin
  chosen_spanish: arruinar
  alternatives_spanish:
  - destruir
  - dañar
  - perjudicar
  lexicon: HALOT
  rationale: '''Arruinar'' comunica daño devastador y social, acorde con el contexto profético, sin implicar aniquilación absoluta.'
- source_word: ענוים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los afligidos
  - los pobres
  lexicon: HALOT
  rationale: '''Humildes'' reproduce bien el valor ético del término y permite conservar el contraste con אֶבְיוֹן en el final del verso, que nombra explícitamente al necesitado.'
- source_word: בְּאִמְרֵי שֶׁקֶר
  english_pob_choice: with lying words
  chosen_spanish: con palabras engañosas
  alternatives_spanish:
  - con palabras de mentira
  - con palabras falsas
  - mediante palabras engañosas
  lexicon: HALOT
  rationale: La construcción con בְּ indica medio. 'Palabras engañosas' transmite el contenido falso y la intención de fraude en un español natural.
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: el menesteroso
  alternatives_spanish:
  - el necesitado
  - el pobre
  - el indigente
  lexicon: HALOT
  rationale: Se conserva el singular masculino con un término que suena bíblico pero inteligible. 'Menesteroso' refleja la condición de necesidad y evita neutralizar el género gramatical sin necesidad.
- source_word: וּבְדַבֵּר אֶבְיוֹן מִשְׁפָּט
  english_pob_choice: even when the needy speaks justice
  chosen_spanish: aun cuando el menesteroso habla justicia
  alternatives_spanish:
  - aun cuando el necesitado habla justicia
  - y cuando el menesteroso expone su causa con justicia
  - aun cuando el pobre habla lo justo
  lexicon: HALOT
  rationale: 'Se conserva la cercanía al hebreo: el infinitivo con בְּ se entiende circunstancialmente. ''Habla justicia'' mantiene la expresión compacta del original y deja visible la tensión semántica de מִשְׁפָּט sin suavizarla demasiado.'
theological_decisions:
- issue: Lectura de אֶבְיוֹן y מִשְׁפָּט al final del verso
  english_pob_reading: even when the needy speaks justice
  chosen_spanish_reading: aun cuando el menesteroso habla justicia
  alternative_spanish_readings:
  - aun cuando el necesitado habla justicia
  - aun cuando el pobre expone una causa justa
  - aun cuando el menesteroso habla lo que es justo
  rationale: La POB inglesa revisó el final para reflejar más de cerca el hebreo, manteniendo la idea de que el malvado actúa incluso frente a una reclamación justa del pobre/necesitado. En español se conserva esa tensión sin explicitarla en exceso, porque מִשְׁפָּט puede abarcar justicia, derecho o causa justa.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Sujeto implícito del primer hemistiquio
  english_pob_reading: the rogue’s devices are evil
  chosen_spanish_reading: los dispositivos del hombre malo son perversos
  alternative_spanish_readings:
  - los dispositivos del malvado son perversos
  - son perversos sus dispositivos
  - los medios del malvado son perversos
  rationale: El hebreo presenta una predicación nominal y el inglés POB explicita el referente. El español sigue esa estrategia para claridad, sin introducir una interpretación doctrinal adicional.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 2
translation_notes:
  revision_awareness: El inglés POB pasó de una redacción más interpretativa en la cláusula final a otra más cercana al hebreo, cambiando 'the poor man speaks what is just' por 'the needy speaks justice'. También ajustó el valor de אֶבְיוֹן hacia 'needy' y mantuvo la lectura metafórica de כלי como 'devices'. La versión española sigue esas decisiones revisadas y procura preservar la tensión semántica de מִשְׁפָּט sin resolverla en paráfrasis.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el Tetragrámaton aparezca explícitamente; este verso no lo contiene.
  - Se conserva 'humildes' para ענוים y 'menesteroso' para אֶבְיוֹן para distinguir dos matices sociales/éticos distintos.
  - '''Dispositivos'' se usa en sentido metafórico y se ancla con nota porque en español puede sonar técnico; la nota preserva las alternativas concretas del hebreo.'
  - La puntuación sigue el patrón de dos cláusulas principales con una cláusula circunstancial final, reflejando la sintaxis hebrea y la revisión inglesa más reciente.
