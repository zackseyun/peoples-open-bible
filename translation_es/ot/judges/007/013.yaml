    changes_summary: 'Adjusted wording for closer lexical accuracy and smoother English: changed ''was rolling around in the camp'' to ''was tumbling into the camp'' to reflect motion into the camp; removed ''up'' from ''came up to the tent''; changed ''He turned it upside down'' to ''and turned it upside down'' so the loaf remains the subject; simplified ''collapsed'' to ''fell'' for consistency with the repeated verb.'
translation:
  language: es
  text: 'Cuando Gedeón llegó, he aquí, un hombre estaba contando un sueño a su compañero. Y dijo: «Mira, he soñado un sueño: he aquí, una torta redonda de pan de cebada[a] iba rodando hacia el campamento de Madián, y llegó hasta la tienda, la golpeó, y esta cayó, la volteó al revés, y la tienda cayó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo emplea un término raro; puede referirse a una torta, hogaza o pan redondo de cebada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: When Gideon came
  chosen_spanish: Cuando Gedeón llegó
  alternatives_spanish:
  - Y Gedeón llegó
  - Ahora Gedeón llegó
  lexicon: HALOT
  rationale: La forma con waw consecutiva introduce la escena de modo temporal. «Cuando» conserva la relación narrativa natural en español sin perder la función de marco.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula expresa sorpresa y vividez. «He aquí» mantiene ese énfasis de manera más reverente y cercana al valor del original que una simple coordinación.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El hebreo presenta una figura concreta y singular. «Un hombre» preserva esa concreción mejor que una forma más indefinida.
- source_word: מְסַפֵּר לְרֵעֵהוּ
  english_pob_choice: was telling a dream to his companion
  chosen_spanish: estaba contando un sueño a su compañero
  alternatives_spanish:
  - estaba relatando un sueño a su compañero
  - estaba contando un sueño a su amigo
  lexicon: HALOT
  rationale: El participio indica acción en curso. «Contando» refleja bien la escena. «Compañero» conserva la neutralidad militar/social de רֵעַ sin convertirlo necesariamente en un vínculo íntimo.
- source_word: חֲלוֹם
  english_pob_choice: a dream
  chosen_spanish: un sueño
  alternatives_spanish:
  - un sueño
  lexicon: HALOT
  rationale: Equivalencia directa y natural.
- source_word: הִנֵּה חֲלוֹם חָלַמְתִּי
  english_pob_choice: Look, I dreamed a dream
  chosen_spanish: Mira, he soñado un sueño
  alternatives_spanish:
  - He aquí, he soñado un sueño
  - Mira, tuve un sueño
  lexicon: HALOT
  rationale: El hebreo usa un énfasis cognado. «He soñado un sueño» conserva ese eco verbal sin volverlo rígido. «Mira» funciona bien en el discurso directo en español.
- source_word: צָלוּל / צלול
  english_pob_choice: a round loaf
  chosen_spanish: una torta redonda
  alternatives_spanish:
  - un pan redondo
  - una hogaza redonda
  - un pastel redondo
  lexicon: HALOT
  rationale: La palabra es rara y el contexto sugiere una pieza redonda de pan/masa. La POB inglesa preserva la incertidumbre con «round loaf». En español, «torta redonda» comunica forma y unidad comestible sin cerrar demasiado el sentido; se mantiene la ambigüedad razonable del término.
- source_word: לֶחֶם שְׂעֹרִים
  english_pob_choice: of barley bread
  chosen_spanish: de pan de cebada
  alternatives_spanish:
  - de cebada
  - de una torta de cebada
  - de hogaza de cebada
  lexicon: HALOT
  rationale: El constructo identifica el alimento como hecho de cebada. «Pan de cebada» es claro y mantiene el material del alimento.
- source_word: מִתְהַפֵּךְ
  english_pob_choice: was tumbling
  chosen_spanish: iba rodando
  alternatives_spanish:
  - estaba rodando
  - iba dando vueltas
  - iba volteándose
  lexicon: HALOT
  rationale: El hitpael describe movimiento de giro/volteo continuo. «Iba rodando» transmite la acción en curso y el desplazamiento con naturalidad en español.
- source_word: בְּמַחֲנֵה מִדְיָן
  english_pob_choice: in the camp of Midian
  chosen_spanish: hacia el campamento de Madián
  alternatives_spanish:
  - en el campamento de Madián
  - dentro del campamento de Madián
  lexicon: HALOT
  rationale: Aunque בְּ puede ser «en», el contexto narrativo incluye movimiento hacia la tienda; la tradición inglesa resumió el desplazamiento como «into the camp». «Hacia» conserva el avance visible sin afirmar más de lo que la forma hebrea exige.
- source_word: עַד הָאֹהֶל
  english_pob_choice: to the tent
  chosen_spanish: hasta la tienda
  alternatives_spanish:
  - a la tienda
  - junto a la tienda
  lexicon: HALOT
  rationale: עַד señala llegar hasta un punto. «Hasta» preserva ese valor límite.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck it
  chosen_spanish: la golpeó
  alternatives_spanish:
  - la golpeó con fuerza
  - la hirió
  lexicon: HALOT
  rationale: El verbo expresa un golpe físico. «Golpeó» es natural en español y suficientemente fuerte; el pronombre concuerda con el sustantivo femenino «torta».
- source_word: וַיִּפֹּל
  english_pob_choice: so that it fell
  chosen_spanish: y ésta cayó
  alternatives_spanish:
  - y cayó
  - de modo que cayó
  lexicon: HALOT
  rationale: En español, la secuencia narrativa queda clara con una coordinación simple. «Ésta» retoma la torta, no la tienda.
- source_word: וַיַּהַפְכֵהוּ לְמַעְלָה
  english_pob_choice: turned it upside down
  chosen_spanish: la volteó boca arriba
  alternatives_spanish:
  - la puso patas arriba
  - la volteó al revés
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y difícil de verter literalmente. «Volteó boca arriba» comunica el volteo completo sin perder el sentido de inversión/alteración extrema; se mantiene el objeto femenino.
- source_word: וְנָפַל הָאֹהֶל
  english_pob_choice: the tent fell
  chosen_spanish: y la tienda cayó
  alternatives_spanish:
  - y la tienda se derrumbó
  - y la tienda cayó por tierra
  lexicon: HALOT
  rationale: El hebreo repite el verbo de caída para enfatizar el resultado. «Cayó» conserva la repetición y evita sobredeterminar con una paráfrasis más interpretativa.
theological_decisions:
- issue: Repetición enfática del sueño y del caer de la tienda
  english_pob_reading: I dreamed a dream ... the tent fell
  chosen_spanish_reading: he soñado un sueño ... y la tienda cayó
  alternative_spanish_readings:
  - tuve un sueño ... y la tienda cayó
  - he tenido un sueño ... y la tienda se derrumbó
  rationale: Se conserva el paralelismo cognado del hebreo y la repetición final del verbo caer. Esto mantiene el carácter vívido y profético de la escena sin suavizarla.
  doctrine_reference: Narrative emphasis; no doctrinal alteration
- issue: Identidad y matiz de רֵעַ
  english_pob_reading: companion
  chosen_spanish_reading: compañero
  alternative_spanish_readings:
  - amigo
  - camarada
  rationale: «Compañero» es suficientemente amplio para el contexto de campamento y no añade una cercanía afectiva no explícita en el texto.
  doctrine_reference: Lexical context sensitivity
- issue: Ambigüedad léxica de la pieza de pan
  english_pob_reading: round loaf
  chosen_spanish_reading: torta redonda
  alternative_spanish_readings:
  - pan redondo
  - hogaza redonda
  - torta de cebada
  rationale: El término hebreo es raro; la traducción debe conservar la incertidumbre razonable. «Torta redonda» mantiene forma y comestibilidad sin fijar demasiado la clase exacta del objeto.
  doctrine_reference: Lexical uncertainty / source transparency
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó el movimiento del pan hacia el campamento y mantuvo la secuencia de golpes, caída y volteo. La versión española sigue esa lectura narrativa, preservando tanto el desplazamiento como la repetición final de la caída de la tienda.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del verso porque no aparece el nombre divino en este texto.
  - Se usó «Madián» para el topónimo según uso bíblico estándar en español.
  - Se evitó «Cristo/Mesías» porque no hay título mesiánico en el pasaje.
  - Se prefirió concordancia femenina con «torta» para mantener claridad referencial en los pronombres y verbos.
