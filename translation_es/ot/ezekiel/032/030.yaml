translation:
  language: es
  text: Allí están todos los príncipes del norte, todos ellos, y todos los sidonios, que descendieron con los caídos, en el terror que causaron por su poder, avergonzados. Yacen incircuncisos[a] con los caídos por la espada, y llevan su vergüenza con los que descienden al pozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Incircuncisos» se conserva de modo literal como término de vergüenza pactual en el lenguaje profético de Ezequiel.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמָּה
  english_pob_choice: There are
  chosen_spanish: Allí están
  alternatives_spanish:
  - Allí
  - Allí se encuentran
  lexicon: HALOT
  rationale: El adverbio señala presencia en el ámbito de la muerte; en español, «Allí están» comunica mejor el estado/presencia que un mero «Allí» y conserva el tono catalogal del pasaje.
- source_word: נְסִיכֵי צָפוֹן
  english_pob_choice: the princes of the north
  chosen_spanish: los príncipes del norte
  alternatives_spanish:
  - los líderes del norte
  - los jefes del norte
  lexicon: HALOT
  rationale: נְסִיךְ denota gobernantes/príncipes. «Príncipes» preserva el registro elevado y el sentido político sin rebajarlo a un término más general.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos los demás
  lexicon: HALOT
  rationale: La frase explícita refuerza la totalidad del grupo. «Todos ellos» conserva esa completitud de manera natural en español.
- source_word: וְכָל צִדֹנִי
  english_pob_choice: and all the Sidonians
  chosen_spanish: y todos los sidonios
  alternatives_spanish:
  - y cada sidonio
  - y toda Sidón
  lexicon: HALOT
  rationale: El gentilicio singular funciona colectivamente; «los sidonios» es la forma natural en español para el grupo étnico/político.
- source_word: יָרְדּוּ
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron abajo
  lexicon: HALOT
  rationale: En Ezequiel 32 es un modismo estable para descender al ámbito de los muertos. «Descendieron» conserva la imagen formal y el movimiento hacia el Seol/tumba.
- source_word: אֶת חֲלָלִים
  english_pob_choice: with the slain
  chosen_spanish: con los muertos
  alternatives_spanish:
  - entre los muertos
  - junto con los muertos
  lexicon: HALOT
  rationale: Aunque אֶת suele marcar objeto directo, aquí funciona asociativamente. Dado el contexto funerario y el paralelismo de la serie, «con los muertos» expresa la compañía en la muerte sin perder la idea de los caídos.
- source_word: בְּחִתִּיתָם
  english_pob_choice: in the terror they caused
  chosen_spanish: en el terror que causaron
  alternatives_spanish:
  - por el terror que causaron
  - con el terror que causaron
  lexicon: HALOT
  rationale: La construcción hebrea apunta al terror vinculado con ellos; la versión inglesa ya interpreta que fue el terror que impusieron a otros. En español, «en el terror que causaron» mantiene esa relación causal sin forzar una paráfrasis adicional.
- source_word: מִגְבוּרָתָם
  english_pob_choice: by their might
  chosen_spanish: por su poder
  alternatives_spanish:
  - por su fuerza
  - a causa de su poder
  lexicon: HALOT
  rationale: גְבוּרָה aquí remite a fuerza/poder militar. «Poder» es un equivalente natural y elevado en español, y «por» conserva la idea de procedencia o base causal.
- source_word: בּוֹשִׁים
  english_pob_choice: ashamed
  chosen_spanish: avergonzados
  alternatives_spanish:
  - avergonzados y humillados
  - con vergüenza
  lexicon: HALOT
  rationale: El participio describe su condición presente. «Avergonzados» reproduce la carga de bochorno y se integra bien con la mención posterior de la vergüenza/ignominia.
- source_word: וַיִּשְׁכְּבוּ
  english_pob_choice: They lie
  chosen_spanish: Yacen
  alternatives_spanish:
  - Yacen allí
  - Se acuestan
  lexicon: HALOT
  rationale: En este catálogo de Sheol, el valor discursivo es de estado resultante. «Yacen» comunica la postura/condición de los muertos de forma más natural que un pasado narrativo.
- source_word: עֲרֵלִים
  english_pob_choice: uncircumcised
  chosen_spanish: incircuncisos
  alternatives_spanish:
  - sin circuncidar
  - no circuncidados
  lexicon: HALOT
  rationale: Se conserva el término literal porque en Ezequiel funciona como marca de vergüenza y exclusión pactual; no conviene diluirlo con paráfrasis interpretativas.
- source_word: אֶת חַלְלֵי חֶרֶב
  english_pob_choice: with those slain by the sword
  chosen_spanish: con los muertos a espada
  alternatives_spanish:
  - con los caídos a espada
  - entre los muertos por la espada
  lexicon: HALOT
  rationale: La frase es otra asociación funeraria, y «muertos a espada» mantiene la brevedad y la imagen sin sobreexplicar el modo de morir.
- source_word: וַיִּשְׂא֥וּ כְלִמָּתָם
  english_pob_choice: and they bear their disgrace
  chosen_spanish: y llevan su vergüenza
  alternatives_spanish:
  - y cargan con su vergüenza
  - y soportan su ignominia
  lexicon: HALOT
  rationale: נשא con כְלִמָּה expresa portar/desplegar una vergüenza pública. «Llevan su vergüenza» preserva el juego semántico y evita repetir «avergonzados» demasiado cerca.
- source_word: אֶת יֹרְדֵי בוֹר
  english_pob_choice: with those who go down to the pit
  chosen_spanish: con los que descienden al pozo
  alternatives_spanish:
  - con los que bajan al pozo
  - entre los que descienden al pozo
  lexicon: HALOT
  rationale: «Pozo» reproduce la imagen del hebreo y el lenguaje del sepulcro/abismo en este contexto. «Descienden» conserva el movimiento ritual/literario del original.
theological_decisions:
- issue: Renderización de עֲרֵלִים en un oráculo de juicio
  english_pob_reading: uncircumcised
  chosen_spanish_reading: incircuncisos
  alternative_spanish_readings:
  - sin circuncidar
  - fuera del pacto
  rationale: El término se mantiene literal porque Ezequiel lo usa como señal de vergüenza, impureza y exclusión pactual. Traducirlo como interpretación («fuera del pacto») debilitaría la fuerza concreta del juicio.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor aspectual de וַיִּשְׁכְּבוּ en un catálogo de los muertos
  english_pob_reading: They lie
  chosen_spanish_reading: Yacen
  alternative_spanish_readings:
  - Y dejaron de yacer
  - Se acostaron
  rationale: Aunque la forma verbal es narrativa, el contexto visionario describe una condición vigente en el reino de los muertos. El presente «Yacen» refleja mejor esa escena estática sin alterar el sentido.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión final del inglés POB: conserva la enumeración completa («todos ellos»), mantiene la relación causal del terror vinculado al poder, y refleja el estado presente de los muertos con un verbo de permanencia («yacen»). También preserva el término técnico y de vergüenza pactual «incircuncisos» sin suavizarlo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general cuando el hebreo lo requiera; aquí no aparece.
  - Se prefirió «pozo» para בּוֹר por coherencia con el registro de Sheol/sepulcro en el capítulo.
  - Se evitó «SEÑOR» como sustituto reverencial, siguiendo el estándar del proyecto.
  - Se mantuvo «poder» para גְבוּרָה por consistencia con fuerza militar y capacidad intimidatoria.
