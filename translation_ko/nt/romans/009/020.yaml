id: ROM.9.20
reference: Romans 9:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸂ὦ ἄνθρωπε, μενοῦνγε⸃ σὺ τίς εἶ ὁ ἀνταποκρινόμενος τῷ θεῷ; μὴ ἐρεῖ τὸ πλάσμα τῷ πλάσαντι Τί με ἐποίησας οὕτως;
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/020.yaml
  text: But who are you[a], O man, to answer back to God? Will what is formed say to the one who formed it[d][c][b], “Why did you make me like this?”
  footnotes:
  - marker: a
    text: Or “On the contrary, O man” for μενοῦνγε, making the corrective force more explicit.
    reason: lexical_alternative
  - marker: b
    text: Greek “O man,” a masculine singular form used here representatively for a human being.
    reason: cultural_note
  - marker: c
    text: Or “Will not what is formed say…?” The Greek question expects a negative answer.
    reason: lexical_alternative
  - marker: d
    text: Literally, “Why did you make me thus?”
    reason: lexical_alternative
translation:
  language: ko
  text: 오 사람이여, 도리어 하나님께 말대답하는 당신은 누구입니까? 지어진 것이 지은 분에게 「어찌하여 나를 이렇게 만드셨습니까?」 하고 말하겠습니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὦ ἄνθρωπε
  english_pob_choice: O man
  chosen_korean: 오 사람이여
  alternatives_korean:
  - 사람아
  lexicon: BDAG
  rationale: 수사적 호격. 합쇼체 안에서도 강조를 위해 「오 ...이여」를 유지한다.
- source_word: ἀνταποκρινόμενος
  english_pob_choice: answer back
  chosen_korean: 말대답하는
  alternatives_korean:
  - 맞서 대답하는
  - 대꾸하는
  lexicon: BDAG
  rationale: ἀντι- 접두사의 대립적 뉘앙스를 「말대답」으로 살린다.
