translation:
  language: es
  text: Pero tú, por las amenazas de tu impiedad[a], eres atormentado; y no escaparás, oh tirano sumamente impuro, de los castigos de la ira divina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por las amenazas de tu impiedad». El griego es comprimido y puede leerse de manera más literal, pero el contexto apunta a sufrimientos amenazados o causados por la impiedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: NA/LSJ
  rationale: El contraste adversativo está claro; «Pero tú» reproduce la oposición retórica de forma natural en español.
- source_word: ἐν ταῖς τῆς ἀσεβείας ἀπειλαῖς
  english_pob_choice: by the threats of your ungodliness
  chosen_spanish: por las amenazas de tu impiedad
  alternatives_spanish:
  - por las amenazas de tu impiedad
  - en las amenazas de tu impiedad
  - bajo las amenazas de tu impiedad
  lexicon: LSJ
  rationale: «ἀπειλαῖς» significa «amenazas», no «tormentos»; por eso se conserva el sustantivo de amenaza. La construcción griega es comprimida, así que en español se explicita con «por», que expresa mejor el medio o causa del padecimiento.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - impiedad
  - irreverencia
  - maldad
  lexicon: BDAG
  rationale: «Impiedad» conserva el campo religioso-moral de ἀσέβεια de forma más precisa que «maldad», y es comprensible en español bíblico sin sonar arcaizante en exceso.
- source_word: βασανίζῃ
  english_pob_choice: are being tortured
  chosen_spanish: eres atormentado
  alternatives_spanish:
  - estás siendo atormentado
  - serás atormentado
  - eres torturado
  lexicon: BDAG
  rationale: El verbo βασανίζω puede ser «atormentar/torturar». Dado el contexto de juicio y amenaza, «eres atormentado» mantiene el valor pasivo/presente que destacó la revisión inglesa, sin perder la fuerza del sufrimiento infligido.
- source_word: μιερώτατε
  english_pob_choice: most defiled
  chosen_spanish: defiladísimo
  alternatives_spanish:
  - muy defileado
  - sumamente impuro
  - muy profanado
  lexicon: LSJ
  rationale: Se preserva la superlación insultante y la carga de contaminación ritual/moral. «Defiladísimo» suena duro y directo en español, y evita suavizar el desdén del original.
- source_word: τύραννε
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - déspota
  - gobernante
  - usurpador
  lexicon: BDAG
  rationale: «Tirano» es el equivalente directo y conserva el tono acusatorio político-moral del griego.
- source_word: τὰς τῆς θείας ὀργῆς δίκας
  english_pob_choice: the punishments of divine wrath
  chosen_spanish: los castigos de la ira divina
  alternatives_spanish:
  - las penas de la ira divina
  - los castigos del enojo divino
  - las sanciones de la ira divina
  lexicon: BDAG
  rationale: «δίκας» aquí denota penas/castigos retributivos; «castigos» es la forma más clara en español. «Divina» reproduce θείας sin imponer explícitamente «de Dios», aunque el contexto lo sugiera.
theological_decisions:
- issue: Referente de θείας ὀργῆς
  english_pob_reading: divine wrath
  chosen_spanish_reading: ira divina
  alternative_spanish_readings:
  - ira de Dios
  - enojo divino
  rationale: Se conserva el adjetivo «divina» porque el griego no nombra explícitamente a Dios con θείας; así se respeta la formulación del texto y, a la vez, el contexto deja claro el carácter judiciario de la ira.
  doctrine_reference: 'Principio de primacía del original: mantener la forma adjetival donde el griego no explicita el nombre divino.'
- issue: Valor aspectual de βασανίζῃ
  english_pob_reading: are being tortured
  chosen_spanish_reading: eres atormentado
  alternative_spanish_readings:
  - estás siendo atormentado
  - serás atormentado
  rationale: La revisión inglesa prefirió un valor presente/pasivo. En español, «eres atormentado» puede sonar gnómico o de presente actual, manteniendo la tensión profética sin forzar un futuro donde el griego revisado no lo exige.
  doctrine_reference: Criterio de correspondencia aspectual y pragmática, no de calco temporal mecánico.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que corrige la lectura de ἀπειλαῖς como «threats/amenazas» y de βασανίζῃ como un pasivo/presente («are being tortured»). Por eso el español evita «tormentos amenazados» y también evita un futuro directo, optando por una solución que preserve la amenaza presente y el valor pasivo del verbo. Se mantiene la invectiva final y la referencia a la ira divina sin añadir especificaciones no presentes en el griego.
  spanish_consistency_notes:
  - Se usa «impiedad» para ἀσέβεια, en línea con el registro bíblico y la terminología del proyecto.
  - Se usa «tirano» para τύραννε, no «déspota» ni «gobernante», por su fuerza condenatoria.
  - Se evita «SEÑOR» o una sustitución tradicional porque θείας ὀργῆς no nombra a YHWH directamente.
  - Se mantiene la distinción entre «amenazas» y «castigos», reflejando la compresión griega sin fusionar ambos términos.
  - «Defiladísimo» conserva la superlación insultante de μιερώτατε y la idea de contaminación moral/ritual.
