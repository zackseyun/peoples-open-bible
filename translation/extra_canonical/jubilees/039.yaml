translation:
  text: '1[a]. And Jacob dwelt in the land of his father’s sojourning, in the land of Canaan. And these are the generations of Jacob. And Joseph, being seventeen years old, was brought down into Egypt, and Potiphar, a eunuch of Pharaoh, chief of the guards, bought him.

    2. And he appointed Joseph over all his house, and the blessing of the LORD came upon the house of the Egyptian because of Joseph.

    3[b]. And everything that he did, the LORD made to prosper. And the Egyptian left everything in Joseph’s hand, because he saw that the LORD was with him, and everything that he did the LORD made to prosper.

    4. And Joseph was handsome in appearance and very good to look at, and his master’s wife lifted up her eyes and saw Joseph and loved him, and asked him

    5. to lie with her. But he guarded his soul and remembered the LORD and the words that Jacob his father used to recite from the words of Abraham, that there is no man who commits fornication with a woman who has a husband, for the judgment of death has been ordained for him in heaven before the Most High God, and the sin is recorded against him in the eternal books continually before the LORD.

    6. And Joseph remembered this matter and refused to lie with her. And she urged him for one year and a second, but he refused to listen. And she embraced him

    7. in the house to force him to lie with her, and she shut the doors of the house and seized him, but he left his garment in her hand and broke the door-bar and ran outside from before her face.

    8. And that woman saw that he would not lie with her, and she accused him before his master, saying, “Your Hebrew slave, whom you love, came in to violate me so as to lie with me; and it happened that when

    9. I raised my voice, he ran and left his garment in my hand when I seized him, and he broke the door-bar.”

    10. And the Egyptian saw Joseph’s garment and the broken door-bar, and he heard the account of his wife, and he put Joseph into the prison-house, into the place where the king’s prisoners were confined. And he was there in prison.

    11. And the LORD gave favor to Joseph before the chief of the keepers of the prison-house, and mercy before him, because he saw that the LORD was with him, and everything

    12. that he did the LORD made to prosper. And he left everything in his hand, and the chief of the keepers of the prison knew nothing that was with him, because Joseph did everything and the LORD brought it to completion.

    13. And he remained there two years. And in those days Pharaoh king of Egypt was angry with his two eunuchs, with the chief cupbearer and with the chief baker, and he put them into

    14. prison, into the house of the chief of the keepers, in the prison where Joseph was confined there.

    15. And the chief of the keepers of the prison appointed Joseph to attend them and to minister before them.

    16. And both of them dreamed a dream, the chief cupbearer and the chief baker, and they told them to Joseph.

    17. And as he interpreted for them, so it happened to them: Pharaoh restored the chief cupbearer to his service, but the baker he killed, just as Joseph had interpreted for them. But the chief cupbearer forgot Joseph in the prison-house, though he knew what would happen, and he did not remember to make it known to Pharaoh what Joseph had told him[c][d][e][f], for he forgot.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about Jacob reciting words received from Abraham is an expansion characteristic of Jubilees, grounding Joseph’s refusal in transmitted patriarchal instruction rather than only personal scruple.
    reason: cross_reference
    anchor_ref: '39:5'
  - marker: b
    text: 'The sequence is textually dense: she shuts the doors, seizes him, he leaves the garment, breaks the door-bar, and flees. The exact order may reflect compressed narration in the Ethiopic segmentation.'
    reason: segmentation_note
    anchor_ref: '39:7'
  - marker: f
    text: The accusation term rendered “violate me” could also be understood more generally as “assault me” or “mock me,” but the surrounding clauses point to an attempted sexual charge.
    reason: lexical_alternative
    anchor_ref: '39:8'
  - marker: e
    text: The title here uses the same keeper/guard root as earlier, but in the prison setting it refers to the prison official rather than Potiphar’s household office.
    reason: lexical_alternative
    anchor_ref: '39:11'
  - marker: d
    text: The Ethiopic row reads literally “and they told them to Joseph”; this is understood as “they told them to Joseph,” i.e., they related their dreams to him.
    reason: segmentation_note
    anchor_ref: '39:16'
  - marker: c
    text: The final sentence is awkward in the transmitted Ethiopic. The sense appears to be that the chief cupbearer forgot Joseph and did not report Joseph’s interpretation to Pharaoh, despite knowing its truth.
    reason: textual_variant
    anchor_ref: '39:17'
lexical_decisions:
- source_word: ምድረ፡ ፍልሰተ፡
  chosen: land of ... sojourning
  alternatives:
  - land of exile
  - land of wandering
  lexicon: Ge'ez contextual
  rationale: Preserves the patriarchal resident-alien sense without overstating forced exile; matches Genesis-like idiom while staying readable.
- source_word: ትዝምደ፡
  chosen: generations
  alternatives:
  - family history
  - descendants
  lexicon: Ge'ez contextual
  rationale: Keeps the toledot-style heading and preserves Jubilees’ genealogical framing rather than smoothing to a generic narrative transition.
- source_word: ኅፅዉ፡
  chosen: eunuch
  alternatives:
  - officer
  - courtier
  lexicon: Ge'ez contextual
  rationale: The Ethiopic term regularly reflects a court official/eunuch. 'Eunuch' preserves the lexical force; 'officer' would flatten the title.
- source_word: ሊቀ፡ ዐቀብት።
  chosen: chief of the guards
  alternatives:
  - captain of the guard
  - chief keeper
  lexicon: Ge'ez contextual
  rationale: Best fits Potiphar’s role in vv. 1–3. In prison contexts the same root is rendered with 'keepers' to reflect local function.
- source_word: ይሴርሖ
  chosen: made to prosper
  alternatives:
  - directed successfully
  - made successful
  lexicon: Ge'ez contextual
  rationale: Retains the repeated providential motif and echoes the source’s emphasis on divine success.
- source_word: ሠናይ፡ ራእዮ፡ ወላህይ፡ ራእዮ፡
  chosen: handsome in appearance and very good to look at
  alternatives:
  - beautiful in form and appearance
  lexicon: Ge'ez contextual
  rationale: Preserves the doubled description of Joseph’s attractiveness without simply copying traditional phrasing.
- source_word: አመጠወ፡ ነፍሶ፡
  chosen: guarded his soul
  alternatives:
  - restrained himself
  - kept himself
  lexicon: Ge'ez contextual
  rationale: Keeps the moral and inward dimension explicit; Joseph’s refusal is framed as spiritual self-guarding.
- source_word: ይዜሙ፡
  chosen: commits fornication
  alternatives:
  - has sexual relations unlawfully
  - commits adultery
  lexicon: Ge'ez contextual
  rationale: The immediate context is adultery with another man’s wife, but the verb has broader sexual-immorality force; 'commits fornication' preserves the lexical breadth while the following clause specifies the married woman.
- source_word: ኵነኔ፡ ሞት፡
  chosen: judgment of death
  alternatives:
  - sentence of death
  - death penalty
  lexicon: Ge'ez contextual
  rationale: Preserves the juridical and heavenly-register language important in Jubilees.
- source_word: መጻሕፍት፡ ዘለዓለም፡
  chosen: eternal books
  alternatives:
  - everlasting books
  - books forever
  lexicon: Ge'ez contextual
  rationale: Maintains Jubilees’ heavenly-book motif and apocalyptic density.
- source_word: አስተብቍዐቶ፡
  chosen: urged him
  alternatives:
  - solicited him
  - pressed him
  lexicon: Ge'ez contextual
  rationale: In v. 4 the same verb is rendered 'asked him'; in v. 6 the repeated action over years is better conveyed by 'urged him.'
- source_word: ወአንዘተ፡
  chosen: embraced him
  alternatives:
  - grabbed him
  - seized him
  lexicon: Ge'ez contextual
  rationale: The context is physical grasping with sexual intent; 'embraced' preserves that nuance, while the following clause clarifies coercion.
- source_word: ማዕጾ፡
  chosen: door-bar
  alternatives:
  - bolt
  - bar
  lexicon: Ge'ez contextual
  rationale: More concrete than 'door' and explains the force of Joseph’s escape.
- source_word: ይትዐገላኒ፡
  chosen: violate me
  alternatives:
  - mock me
  - assault me
  lexicon: Ge'ez contextual
  rationale: Best fits the false accusation of sexual assault in context.
- source_word: ቤተ፡ ሞቅሕ፡
  chosen: prison-house
  alternatives:
  - prison
  - house of confinement
  lexicon: Ge'ez contextual
  rationale: Retains the compound institutional sense of the Ethiopic rather than reducing it to a bare modern term.
- source_word: ሞገሰ፡
  chosen: favor
  alternatives:
  - grace
  - goodwill
  lexicon: Ge'ez contextual
  rationale: Readable modern English that still conveys divine bestowal of acceptance.
- source_word: ይፈጽም።
  chosen: brought it to completion
  alternatives:
  - completed it
  - made it succeed
  lexicon: Ge'ez contextual
  rationale: Highlights divine agency not only in success but in bringing Joseph’s work to its intended end.
- source_word: ሊቀ፡ መዛርት፡
