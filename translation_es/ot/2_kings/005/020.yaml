  text: וַ/יֹּ֣אמֶר גֵּיחֲזִ֗י נַעַר֮ אֱלִישָׁ֣ע אִישׁ הָ/אֱלֹהִים֒ הִנֵּ֣ה חָשַׂ֣ךְ אֲדֹנִ֗/י אֶֽת נַעֲמָ֤ן הָֽ/אֲרַמִּי֙ הַ/זֶּ֔ה מִ/קַּ֥חַת מִ/יָּד֖/וֹ אֵ֣ת אֲשֶׁר הֵבִ֑יא חַי יְהוָה֙ כִּֽי אִם רַ֣צְתִּי אַחֲרָ֔י/ו וְ/לָקַחְתִּ֥י מֵ/אִתּ֖/וֹ מְאֽוּמָה־׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/020.yaml
  text: But Gehazi[a], the servant of Elisha the man of God, said, “Look, my master has spared Naaman this Aramean by not taking from his hand what he brought. As Yahweh lives[d][c][b], I will run after him and take something from him.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''this Aramean, Naaman''; the appositional order is retained in sense but smoothed in English.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has held back from taking from his hand what he brought.'
    reason: alternative_reading
  - marker: c
    text: 'Hebrew oath formula: ''As the LORD lives.'''
    reason: cultural_note
  - marker: d
    text: Or 'has spared this Aramean, Naaman, by not taking from his hand'.
    reason: previous_rendering
