lexical_decisions:
- source_word: θνητός
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - sujeto a la muerte
  - mortal, destinado a morir
  lexicon: LSJ
  rationale: El adjetivo expresa condición humana de mortalidad; “mortal” es natural en español y conserva la afirmación de fragilidad compartida sin añadir matices no presentes en el griego.
- source_word: ἴσος ἅπασιν
  english_pob_choice: equal to all
  chosen_spanish: igual a todos
  alternatives_spanish:
  - en igualdad con todos
  - igual con todos
  lexicon: LSJ
  rationale: La frase resalta la condición común, no mera semejanza. “Igual a todos” reproduce bien el valor comparativo y suena idiomático en español.
- source_word: γηγενοῦς
  english_pob_choice: earth-born
  chosen_spanish: formado de la tierra
  alternatives_spanish:
  - nacido de la tierra
  - terreno
  lexicon: LSJ
  rationale: Aunque el inglés conserva la imagen compuesta “earth-born”, en español “formado de la tierra” comunica con claridad la alusión al origen humano desde la tierra sin forzar un compuesto poco natural.
- source_word: ἀπόγονος
  english_pob_choice: descendant
  chosen_spanish: descendiente
  alternatives_spanish:
  - progenie
  - posteridad
  lexicon: LSJ
  rationale: El sustantivo indica relación genealógica con un antepasado; “descendiente” es la equivalencia más directa y comprensible.
- source_word: πρωτοπλάστου
  english_pob_choice: first-formed man
  chosen_spanish: el primer hombre formado de la tierra
  alternatives_spanish:
  - el primer hombre formado
  - Adán
  lexicon: LSJ
  rationale: El griego no nombra a Adán, sino que lo describe. “El primer hombre formado de la tierra” mantiene el carácter alusivo y hace explícita la referencia antropológica conservada por la POB inglesa.
- source_word: ἐγλύφην
  english_pob_choice: I was molded
  chosen_spanish: fui modelado
  alternatives_spanish:
  - fui formado
  - fui esculpido
  lexicon: LSJ
  rationale: En contexto prenatal, el verbo de tallar/grabar se entiende como formar/modelar. “Fui modelado” conserva la idea de configuración pasiva y evita una imagen demasiado literal de tallado.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  lexicon: LSJ
  rationale: Aquí el término es literal y anatómico; “carne” mantiene la fuerza semítica y la decisión terminológica del proyecto para σάρξ en contextos literales.
theological_decisions:
- issue: Referencia de πρωτοπλάστου sin nombrar a Adán en el texto principal
  english_pob_reading: The first-formed man alludes to Adam.
  chosen_spanish_reading: “El primer hombre formado de la tierra” conserva la alusión a Adán sin introducir el nombre en el cuerpo del texto.
  alternative_spanish_readings:
  - Adán
  - el primer hombre
  rationale: El original usa un título descriptivo, no el nombre propio. Mantener la descripción respeta la primacía del texto fuente y preserva la alusión reconocible para el lector.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; por eso el español mantiene la lectura de la POB inglesa, pero la ajusta a una formulación natural en español y explícita donde el griego conserva una alusión descriptiva.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - Se traduce σάρξ como “carne” por tratarse de uso literal, no metafórico.
  - No se introduce “Adán” en el texto principal para respetar la forma descriptiva del griego y la decisión auditada de la POB inglesa.
