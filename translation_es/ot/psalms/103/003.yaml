translation:
  language: es
  text: el que perdona toda tu iniquidad[a], el que sana todas tus enfermedades[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu culpa» o «tu pecado». El hebreo עָוֹן puede denotar iniquidad, culpa o la consecuencia cargada de culpa por el mal cometido.
    reason: lexical_alternative
  - marker: b
    text: O «tus dolencias» o «tus males». La línea puede leerse de forma concreta acerca de enfermedades corporales, aunque algunos lectores la entienden en un contexto poético más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסֹּלֵחַ
  english_pob_choice: who forgives
  chosen_spanish: el que perdona
  alternatives_spanish:
  - el que absuelve
  - el que perdona continuamente
  lexicon: HALOT
  rationale: El participio con artículo funciona de modo sustantivo y describe una acción característica. En español, «el que perdona» conserva bien ese valor relacional y resulta más natural que un calco como «quien está perdonando».
- source_word: לְכָל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - la totalidad de
  lexicon: HALOT
  rationale: Con el sustantivo singular colectivo «iniquidad», «toda» expresa la amplitud total de manera fluida en español y preserva el alcance comprehensivo del hebreo.
- source_word: עֲוֺנֵכִי
  english_pob_choice: your iniquity
  chosen_spanish: tu iniquidad
  alternatives_spanish:
  - tu culpa
  - tu pecado
  lexicon: HALOT
  rationale: «עָוֹן» puede abarcar iniquidad, culpa o el peso consecuente del mal. «Iniquidad» mantiene mejor el peso moral y la tensión semántica que una reducción a «pecado»; el singular colectivo se conserva como en el hebreo.
- source_word: הָרֹפֵא
  english_pob_choice: who heals
  chosen_spanish: el que sana
  alternatives_spanish:
  - el que cura
  - el que restaura
  lexicon: HALOT
  rationale: El participio substantivado se traduce con paralelismo a la primera línea. «Sana» es natural en español bíblico contemporáneo y mantiene el sentido concreto de acción curativa.
- source_word: תַּחֲלֻאָיִכִי
  english_pob_choice: your diseases
  chosen_spanish: tus enfermedades
  alternatives_spanish:
  - tus males
  - tus dolencias
  lexicon: HALOT
  rationale: «Enfermedades» refleja con claridad el referente corporal concreto de la palabra hebrea. Se evita espiritualizar o ampliar demasiado el término, manteniendo abierta la lectura poética sin perder precisión léxica.
theological_decisions:
- issue: Alcance del perdón y de la sanidad en el paralelismo poético
  english_pob_reading: Retain concrete 'forgives all your iniquity' and 'heals all your diseases' without narrowing either line to a purely spiritual sense.
  chosen_spanish_reading: Conservar el perdón concreto de la iniquidad y la sanidad concreta de las enfermedades, sin reducir ninguna línea a un sentido exclusivamente espiritual.
  alternative_spanish_readings:
  - perdona todos tus pecados y sana todas tus heridas espirituales
  - absuelve toda tu culpa y restaura toda tu aflicción
  rationale: 'El hebreo presenta dos participios paralelos: uno sobre el perdón del mal moral y otro sobre la sanidad de enfermedades. La traducción española mantiene esa apertura teológica y no resuelve interpretativamente el alcance del segundo miembro, en línea con la filosofía de equivalencia óptima.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta un fuerte paralelismo semántico y sintáctico con participios articulars. La versión española conserva esa estructura con dos cláusulas relativas breves y equivalentes, sin introducir elementos no atestiguados en el hebreo. La revisión más reciente indicó acuerdo alto y sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el contexto lo exijan explícitamente; aquí no aparece el Tetragrámaton en el versículo.
  - Se prefiere «iniquidad» para mantener la fuerza moral de עָוֹן, reservando «pecado» como alternativa anotada.
  - «Sana» y «enfermedades» sostienen la lectura concreta del paralelismo sin excluir aplicación teológica más amplia.
