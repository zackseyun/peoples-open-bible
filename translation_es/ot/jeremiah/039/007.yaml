  - severity: low
    issue: '''Lo ató con grilletes de bronce'' es comprensible pero algo áspero'
    rationale: Como el instrumento ya expresa la sujeción física, 'lo sujetó con grilletes de bronce' suena más natural en español y sigue fielmente el valor de אָסַר sin sobreespecificar.
