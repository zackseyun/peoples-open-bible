  yaml_path: translation/deuterocanon/4_maccabees/001/011.yaml
  text: For those men became even more admirable[a], not only to all people for their courage and endurance, but also to those who tortured them; they became the cause of the overthrow of the tyranny against the nation, having conquered the tyrant by endurance[b], so that through them the fatherland was purified.
  footnotes:
