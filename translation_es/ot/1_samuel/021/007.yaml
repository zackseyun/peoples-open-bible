    text: O, más tradicionalmente, «pan de la proposición». Literalmente, «el pan de la Presencia».
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base y su terminología, pero se reemplaza ‘el día en que se lo quitaban’ por ‘el día en que fue retirado’ para reflejar con mayor precisión el pasivo del hebreo, evitar ambigüedad pronominal y alinearse mejor con el audit trail inglés.
