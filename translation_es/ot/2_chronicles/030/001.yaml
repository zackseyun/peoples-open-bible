translation:
  language: es
  text: Entonces Ezequías envió mensaje a todo Israel y Judá[a], y también escribió cartas a Efraín y a Manasés, para que vinieran a la casa de Yahvé en Jerusalén, para celebrar la Pascua para Yahvé[b][c], el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por todo Israel y Judá»; la preposición hebrea puede sugerir que el mensaje fue enviado ampliamente por la tierra, además de dirigido al pueblo.
    reason: lexical_alternative
  - marker: b
    text: O «para hacer la Pascua». El hebreo dice literalmente «hacer Pascua», un modismo para observar la fiesta.
    reason: lexical_alternative
  - marker: c
    text: O «para celebrar la Pascua a Yahvé». La preposición final puede entenderse como dedicación u orientación del rito.
    reason: theological_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent word
  chosen_spanish: envió aviso
  alternatives_spanish:
  - envió
  - envió mensaje
  - mandó aviso
  lexicon: HALOT
  rationale: El hebreo expresa envío de una comunicación o convocatoria. En español, 'envió aviso' comunica naturalmente la acción de convocar sin introducir 'mensajeros' que el texto no menciona.
- source_word: עַל כָּל יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: to all Israel and Judah
  chosen_spanish: a todo Israel y Judá
  alternatives_spanish:
  - por todo Israel y Judá
  - en todo Israel y Judá
  - sobre todo Israel y Judá
  lexicon: HALOT
  rationale: Se conserva el alcance de la convocatoria dirigida al pueblo. 'A' funciona bien en español como destino del aviso, y evita cargar el verso con una interpretación espacial no necesaria.
- source_word: אִגְּרוֹת
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - misivas
  - epístolas
  lexicon: HALOT
  rationale: '''Cartas'' es el equivalente natural y transparente para correspondencia escrita.'
- source_word: עַל אֶפְרַיִם וּמְנַשֶּׁה
  english_pob_choice: to Ephraim and Manasseh
  chosen_spanish: a Efraín y a Manasés
  alternatives_spanish:
  - sobre Efraín y Manasés
  - respecto de Efraín y Manasés
  - en Efraín y Manasés
  lexicon: HALOT
  rationale: Las cartas van dirigidas a esos territorios/tribus. En español, la preposición 'a' comunica mejor la dirección del envío.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: para que vinieran
  alternatives_spanish:
  - para venir
  - para que acudieran
  - para entrar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito de la convocatoria. 'Vinieran' reproduce con claridad la invitación al desplazamiento hacia Jerusalén.
- source_word: לְבֵית יְהוָה
  english_pob_choice: to the house of Yahweh
  chosen_spanish: a la casa de Yahvé
  alternatives_spanish:
  - al templo de Yahvé
  - a la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea 'casa de Yahvé' porque el texto no dice simplemente 'templo' y la fórmula mantiene mejor el vínculo con el santuario de Jerusalén.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención POB de transliterar el nombre divino como 'Yahvé', preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - desde Jerusalén
  lexicon: HALOT
  rationale: Equivalente locativo directo y natural en español.
- source_word: לַעֲשׂוֹת פֶּסַח
  english_pob_choice: to keep the Passover
  chosen_spanish: a celebrar la Pascua
  alternatives_spanish:
  - a guardar la Pascua
  - a observar la Pascua
  - a hacer la Pascua
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hacer Pascua', un modismo para observar la fiesta. 'Celebrar la Pascua' comunica el sentido ritual de forma natural en español; se preserva la tensión con el literal en nota.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - para Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: La preposición expresa orientación/dedicación de la celebración. 'A Yahvé' sigue de cerca el hebreo y conserva la relación cultual del acto.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula de alianza y pertenencia histórica tal como aparece en el original.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La política POB para este versículo preserva el nombre propio divino. En español, 'Yahvé' es la forma estándar del proyecto y evita la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לַעֲשׂוֹת פֶּסַח
  english_pob_reading: to keep the Passover
  chosen_spanish_reading: a celebrar la Pascua
  alternative_spanish_readings:
  - a observar la Pascua
  - a guardar la Pascua
  - a hacer la Pascua
  rationale: El hebreo conserva un modismo de 'hacer' la Pascua. En español, 'celebrar' comunica el acto festivo y cultual sin perder el referente a la observancia ritual; la nota mantiene visible la alternativa más literal.
  doctrine_reference: POB translation policy on idiom preservation and intelligibility
- issue: Preposición con לַיהוָה
  english_pob_reading: to Yahweh
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - para Yahvé
  - a Yahveh
  rationale: La preposición conserva la dirección/dedicación del acto litúrgico. 'A Yahvé' es la forma más cercana al hebreo y suficientemente natural en español eclesial.
  doctrine_reference: Hebrew dative of dedication in cultic contexts
translation_notes:
  revision_awareness: 'La redacción sigue el juicio revisado del audit trail inglés: la convocatoria se entiende como un envío de aviso dirigido al pueblo, las cartas se extienden a Efraín y Manasés, y la expresión final se mantiene cerca del hebreo con la dedicación cultual a Yahvé. Se conserva además el nombre divino transliterado y la fórmula ''casa de Yahvé'' por coherencia con el proyecto.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - Se prefirió 'Pascua' como término establecido, con nota para el modismo hebreo 'hacer Pascua'.
  - Se mantuvo 'casa de Yahvé' en lugar de 'templo' para reflejar la expresión hebrea.
  - Las preposiciones 'a' y 'para' se eligieron según la función de convocatoria/dedicación, sin sobreinterpretar el hebreo.
