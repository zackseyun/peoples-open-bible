  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים se traduce correctamente como «Dios»; no aparecen términos sensibles como Yahvé/Mesías/Espíritu. La decisión de mantener «pero» para la cláusula final concuerda con la justificación teológica documentada en la POB inglesa.'
