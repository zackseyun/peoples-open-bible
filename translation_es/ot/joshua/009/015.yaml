review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: Josué establece paz, hace un pacto para conservarles la vida, y los dirigentes juran. Sin embargo, hay dos desajustes: «hizo paz» suena poco natural en español bíblico actual, y la nota [a] introduce un error verbal («hicieron») que no corresponde al singular hebreo ni al texto principal.'
  spanish_quality_summary: El texto es generalmente claro, pero «hizo paz con ellos» es un calco torpe; «hizo la paz con ellos» o «estableció paz» sería más idiomático. «Hizo un pacto» es aceptable, pero «hizo un pacto con ellos» repite innecesariamente el verbo ya usado antes; aun así, es comprensible. «Los jefes de la congregación» y «les juraron» son legibles y dignos.
  glossary_alignment: No hay conflictos con la glosaría principal del proyecto. «Pacto» para בְּרִית y «congregación» para הָעֵדָה son defendibles. La revisión mantiene la textura pactal y comunitaria sin introducir terminología ajena.
  issues:
  - severity: medium
    issue: «hizo paz con ellos» es poco idiomático en español
    rationale: Aunque intenta reflejar el hebreo עשה שלום, en español natural y eclesial se dice «hizo la paz con ellos» o «hizo paz» solo en registros muy marcados. Aquí conviene una formulación más clara y digna.
  - severity: high
    issue: La nota [a] dice «hicieron un pacto con ellos»
    rationale: El sujeto hebreo y del texto es singular (Josué), no plural. La nota contradice el original y debe corregirse.
  - severity: low
    issue: La nota [a] habla de «hicieron un pacto» como alternativa, pero la alternativa pertinente al inglés auditado es «hizo un pacto» / «cortó un pacto»
    rationale: La formulación actual no solo cambia el número, sino que además desordena la relación entre la lectura principal y la alternativa lexical documentada.
  revised_spanish_text: Así Josué hizo la paz con ellos e hizo un pacto con ellos para dejarlos vivir[a][b], y los jefes de la congregación les juraron[c].
  revised_footnotes:
