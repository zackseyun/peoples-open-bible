base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/030.yaml
  text: And David was going up the ascent of the Mount of Olives[a], going up and weeping, with his head covered, and he was walking barefoot. And all the people who were with him each covered his head, and they went up[c][b], weeping as they went.
  footnotes:
