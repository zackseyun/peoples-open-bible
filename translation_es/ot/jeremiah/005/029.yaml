translation:
  language: es
  text: ¿No castigaré[a] por estas cosas? declara Yahvé. ¿No se vengará mi alma[b] de una nación como esta?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿No llamaré estas cosas a cuenta?». El verbo hebreo puede significar «visitar» en el sentido de intervenir judicialmente o castigar.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo «¿No se vengará mi alma...?». «Mi alma» es un hebraísmo que expresa la resolución personal de Yahvé; algunas traducciones lo expresan de manera más idiomática: «¿No me vengaré yo mismo...?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַל אֵלֶּה לֹא אֶפְקֹד
  english_pob_choice: Shall I not punish for these things?
  chosen_spanish: ¿No castigaré por estas cosas?
  alternatives_spanish:
  - ¿No llamaré a cuenta por estas cosas?
  - ¿No visitaré estas cosas con juicio?
  lexicon: HALOT
  rationale: El hebreo usa una pregunta retórica con פקד en contexto judicial. En español, «castigaré» comunica con claridad la intervención punitiva sin sonar forzado; se conserva la pregunta retórica y el referente de «estas cosas».
- source_word: אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  lexicon: HALOT
  rationale: El demonstrativo remite a las faltas mencionadas antes. «Estas cosas» es natural en español y mantiene la referencia explícita que el inglés también desarrolla.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para יְהוָה como «Yahvé». «Declara» conserva el tono profético solemne y corresponde bien a la fórmula נְאֻם.
- source_word: בְּגוֹי
  english_pob_choice: on a nation
  chosen_spanish: de una nación
  alternatives_spanish:
  - contra una nación
  - sobre una nación
  lexicon: HALOT
  rationale: Con נקם, el hebreo expresa el objeto de la venganza; en español, la construcción «vengarse de» es idiomática y evita una traducción rígida de la preposición.
- source_word: כָּזֶה
  english_pob_choice: such as this
  chosen_spanish: como esta
  alternatives_spanish:
  - tal como esta
  - de este tipo
  lexicon: HALOT
  rationale: La comparación cualitativa se expresa con «como esta», que conserva la fuerza del hebreo y su referencia deíctica inmediata.
- source_word: תִתְנַקֵּם
  english_pob_choice: avenge itself
  chosen_spanish: se vengará
  alternatives_spanish:
  - se tomará venganza
  - se vindicará
  lexicon: HALOT
  rationale: El hitpael de נקם tiene fuerza reflexiva/mutua. En español, «se vengará» transmite esa reflexividad de manera natural; el sujeto siguiente, «mi alma», mantiene el hebraísmo sin sobre-explicar.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - yo mismo
  lexicon: HALOT
  rationale: Se opta por «mi alma» para preservar el paralelismo y la textura semítica del original. En español es comprensible como una forma de decir la propia persona o interioridad, sin neutralizar el término.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene directamente el Tetragrámaton. Conforme a la política del proyecto, se conserva el nombre del pacto como «Yahvé» y no se lo enmascara con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Hebrew idiom נַפְשִׁי / 'my soul'
  english_pob_reading: '''My soul'' is a Hebrew idiom expressing the LORD''s own personal resolve'
  chosen_spanish_reading: '''mi alma'' es un hebraísmo que expresa la resolución personal de Yahvé'
  alternative_spanish_readings:
  - '''yo mismo'''
  - '''mi ser'''
  rationale: La POB inglesa preserva el hebraísmo y lo nota. En español se mantiene «mi alma» en el texto principal para no borrar la tensión lexical, y el sentido idiomático se entiende como auto-referencia intensiva de Yahvé.
  doctrine_reference: DOCTRINE.md Antropomorphisms and idioms
translation_notes:
  revision_awareness: La revisión más reciente reporta el texto sin cambios necesarios, con alta concordancia con el original y solo observaciones menores. Esta versión española sigue la decisión léxica y teológica ya auditada, especialmente en פקד, נקם, נַפְשִׁי y en la representación de יְהוָה como Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva el hebraísmo «mi alma» porque el audit trail lo trata como idiomático y teológicamente significativo.
  - «Castigaré» y «se vengará» reflejan la fuerza judicial y reflexiva del hebreo sin diluirla en perífrasis más suaves.
  - La puntuación conserva el paralelismo de dos preguntas retóricas separadas por la fórmula profética.
