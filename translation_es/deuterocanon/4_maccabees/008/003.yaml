translation:
  language: es
  text: Después de que el tirano hubo dado estas órdenes[a], fueron traídos siete hermanos con su anciana madre, hermosos, modestos, nobles y encantadores en todo aspecto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había mandado estas cosas»; el griego combina la orden del tirano con su anterioridad respecto de la escena.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «graciosos en todo»; el griego también puede expresar gracia o encanto en el porte y en las maneras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα διαταξαμένου
  english_pob_choice: had given these orders
  chosen_spanish: había dado estas órdenes
  alternatives_spanish:
  - había mandado estas cosas
  - había impartido estas instrucciones
  lexicon: LSJ
  rationale: El genitivo absoluto indica una acción previa del tirano. «Había dado estas órdenes» conserva el valor de mando y su relación temporal anterior, con un español natural y solemne.
- source_word: τοῦ τυράννου
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: LSJ
  rationale: τύραννος es peyorativo en este contexto narrativo. «Tirano» mantiene la valoración moral del griego y del auditor inglés.
- source_word: παρῆσαν ἀγόμενοι
  english_pob_choice: were brought in
  chosen_spanish: fueron traídos
  alternatives_spanish:
  - aparecieron siendo conducidos
  - entraron bajo escolta
  lexicon: LSJ
  rationale: La expresión combina llegada con conducción forzada. «Fueron traídos» expresa de manera idiomática la pasividad y la coerción sin perder el sentido de arribo.
- source_word: μετὰ γεραιᾶς μητρός
  english_pob_choice: with their aged mother
  chosen_spanish: con su anciana madre
  alternatives_spanish:
  - con su madre de edad avanzada
  - con su madre ya anciana
  lexicon: LSJ
  rationale: γεραιᾶς indica avanzada edad. «Anciana» es claro, digno y fiel al tono solemne.
- source_word: ἑπτὰ ἀδελφοί
  english_pob_choice: seven brothers
  chosen_spanish: siete hermanos
  alternatives_spanish:
  - siete varones
  - siete hermanos varones
  lexicon: LSJ
  rationale: El griego es masculino plural y se refiere a hermanos varones. «Hermanos» en español comunica eso de forma natural; no es necesario añadir «varones» en el cuerpo del texto.
- source_word: καλοί
  english_pob_choice: handsome
  chosen_spanish: hermosos
  alternatives_spanish:
  - apuestos
  - bien parecidos
  lexicon: LSJ
  rationale: En una lista descriptiva de personas, καλός alude a buen porte o belleza física. «Hermosos» es natural en español y cubre esa fuerza sin sonar excesivamente coloquial.
- source_word: αἰδήμονες
  english_pob_choice: modest
  chosen_spanish: modestos
  alternatives_spanish:
  - recatados
  - tímidos
  lexicon: LSJ
  rationale: El término implica pudor, decoro y modestia. «Modestos» conserva esa cualidad ética-social de manera breve y comprensible.
- source_word: γενναῖοι
  english_pob_choice: noble
  chosen_spanish: nobles
  alternatives_spanish:
  - valientes
  - de carácter noble
  lexicon: LSJ
  rationale: Aquí γενναῖοι forma parte de una lista de virtudes personales; «nobles» preserva el matiz de nobleza de carácter y dignidad, dejando que el relato desarrolle el coraje en contexto.
- source_word: ἐν παντὶ χαρίεντες
  english_pob_choice: gracious in every way
  chosen_spanish: agradables en todo
  alternatives_spanish:
  - graciosos en todo sentido
  - encantadores en todo aspecto
  lexicon: LSJ
  rationale: χαρίεις puede abarcar gracia, encanto y agradable presencia. «Agradables en todo» es la opción más transparente en español para expresar la amplitud de ἐν παντί sin forzar una equivalencia demasiado cargada.
theological_decisions:
- issue: Conservación del juicio retórico sobre Antioquía/Antíoco como τύραννος
  english_pob_reading: the tyrant
  chosen_spanish_reading: el tirano
  alternative_spanish_readings:
  - el rey
  - el gobernante
  rationale: El texto no usa un título neutral sino uno valorativo. Mantener «tirano» preserva la caracterización moral del autor y evita suavizar el tono polémico del original.
  doctrine_reference: Primacía del texto original y preservación de la carga retórica
- issue: Descripción conjunta de los hermanos y su madre bajo coerción
  english_pob_reading: were brought in with their aged mother
  chosen_spanish_reading: fueron traídos con su anciana madre
  alternative_spanish_readings:
  - aparecieron siendo conducidos con su madre anciana
  - vinieron escoltados con su anciana madre
  rationale: El griego vincula presencia y conducción forzada. La formulación elegida mantiene la coerción sin agregar elementos interpretativos, y conserva la dignidad de la escena.
  doctrine_reference: Fidelidad semántica al aspecto pasivo y coercitivo del griego
translation_notes:
  revision_awareness: La comparación cruzada indicó acuerdo general con observaciones menores. Se mantuvo la lectura del tirano como cargada moralmente y se prefirió una solución española más natural para ἀγόμενοι, sin perder la coerción implícita. También se ajustó la amplitud de χαρίεντες a una fórmula idiomática en español.
  spanish_consistency_notes:
  - Se conserva «tirano» para τύραννος conforme al uso crítico del POB.
  - Se usa «hermanos» como masculino genérico específico, dado que el griego es ἀδελφοί.
  - «Agradables en todo» evita introducir una noción más fuerte que la del griego, pero mantiene la amplitud de ἐν παντί.
  - Las notas a y b se anclan en los segmentos que presentan la alternativa lexical relevante.
