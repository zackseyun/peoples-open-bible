revisions:
- from: Porque he aquí[a], estoy llamando a todas las familias[b] de los reinos del norte, declara Yahvé, y vendrán; cada uno pondrá su trono a la entrada de las puertas de Jerusalén, contra todos sus muros alrededor, y contra todas las ciudades de Judá.
  to: Porque he aquí[a], estoy llamando a todos los clanes[b] de los reinos del norte, declara Yahvé, y vendrán; cada uno pondrá su trono a la entrada de las puertas de Jerusalén, contra todos sus muros por todos lados, y contra todas las ciudades de Judá.
  rationale: Se cambia «familias» por «clanes» para alinearse con la decisión léxica principal documentada y evitar una lectura demasiado doméstica de מִשְׁפְּחוֹת. La nota correspondiente se invierte para preservar «familias» como alternativa. Además, se ajusta «contra todos sus muros alrededor» a «contra todos sus muros por todos lados» para un español más natural que mantenga la fuerza de סָבִיב.
  reviewer_model: gpt-5.4
