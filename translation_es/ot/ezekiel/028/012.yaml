  rationale: La revisión corrige el anclaje de la nota sobre la cópula implícita, castellaniza la alternativa léxica de la nota [b], y ajusta אֲדֹנָי יְהוִה a 'el Señor Yahvé', que preserva explícitamente ambos elementos hebreos y sigue la política del proyecto sobre el nombre divino sin sacrificar naturalidad española.
