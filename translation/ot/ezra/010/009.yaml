id: EZR.10.9
reference: Ezra 10:9
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֣וּ כָל אַנְשֵֽׁי יְהוּדָה֩ וּ/בִנְיָמִ֨ן יְרוּשָׁלִַ֜ם לִ/שְׁלֹ֣שֶׁת הַ/יָּמִ֗ים ה֛וּא חֹ֥דֶשׁ הַ/תְּשִׁיעִ֖י בְּ/עֶשְׂרִ֣ים בַּ/חֹ֑דֶשׁ וַ/יֵּשְׁב֣וּ כָל הָ/עָ֗ם בִּ/רְחוֹב֙ בֵּ֣ית הָ/אֱלֹהִ֔ים מַרְעִידִ֥ים עַל הַ/דָּבָ֖ר וּ/מֵ/הַ/גְּשָׁמִֽים־־׀־־׃פ
translation:
  text: So all the men of Judah and Benjamin gathered in Jerusalem within the three days[a]. It was the ninth month, on the twentieth day of the month. And all the people sat in the open square of the house of God[c][b], trembling because of this matter and because of the heavy rain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the men of Judah and Benjamin'; the wording is grammatically masculine and likely refers to the male members or representatives summoned to the assembly.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the plaza before the house of God.' The Hebrew refers to a broad open area, not necessarily an inner court.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  chosen: gathered
  alternatives:
  - assembled
  lexicon: HALOT
  rationale: The Niphal form of קבץ here denotes being gathered/assembling. 'Gathered' is natural English and preserves the collective movement without adding nuance beyond the Hebrew.
- source_word: כָל אַנְשֵׁי יְהוּדָה וּבִנְיָמִן
  chosen: all the men of Judah and Benjamin
  alternatives:
  - all the people of Judah and Benjamin
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In context the summons is directed to the male representatives/householders, so 'men' is the gender-accurate rendering required by the translation philosophy, rather than flattening to 'people.'
- source_word: לִשְׁלֹשֶׁת הַיָּמִים
  chosen: within the three days
  alternatives:
  - in three days
  - by the end of three days
  lexicon: HALOT
  rationale: The phrase indicates compliance with the previously announced three-day deadline. 'Within the three days' captures the temporal limit more clearly than a bare 'in three days.'
- source_word: הוּא חֹדֶשׁ הַתְּשִׁיעִי
  chosen: It was the ninth month
  alternatives:
  - that was the ninth month
  lexicon: HALOT
  rationale: This clause gives the calendrical setting. 'It was the ninth month' is straightforward modern English.
- source_word: בְּעֶשְׂרִים בַּחֹדֶשׁ
  chosen: on the twentieth day of the month
  alternatives:
  - on the twentieth of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew date formula. The chosen rendering is idiomatic and precise.
- source_word: וַיֵּשְׁבוּ
  chosen: sat
  alternatives:
  - took their seats
  - were sitting
  lexicon: HALOT
  rationale: ישׁב commonly means 'sit' or 'remain seated.' 'Sat' is the simplest and most direct rendering in this narrative sequence.
- source_word: בִּרְחוֹב בֵּית הָאֱלֹהִים
  chosen: in the open square of the house of God
  alternatives:
  - in the plaza before the house of God
  - in the courtyard of the house of God
  lexicon: HALOT
  rationale: רְחוֹב denotes a broad open place or square, not specifically an inner temple court. 'Open square' preserves the spatial sense without over-specifying architecture. 'House of God' is retained as the standard rendering for the temple.
- source_word: מַרְעִידִים
  chosen: trembling
  alternatives:
  - shaking
  - quaking
  lexicon: HALOT
  rationale: The Hiphil participle from רעד expresses physical trembling. 'Trembling' works well with the dual causes that follow and can include both fear/anxiety and bodily reaction.
- source_word: עַל הַדָּבָר
  chosen: because of this matter
  alternatives:
  - about the matter
  - because of the affair
  lexicon: HALOT
  rationale: הַדָּבָר refers to the issue under discussion, namely the crisis over foreign marriages. 'This matter' is idiomatic and suitably weighty.
- source_word: וּמֵהַגְּשָׁמִים
  chosen: and because of the heavy rain
  alternatives:
  - and because of the rains
  - and from the rain
  lexicon: HALOT
  rationale: The preposition מִן after a trembling expression marks cause/source. The plural גְּשָׁמִים often refers to rainstorms or seasonal rains; 'heavy rain' communicates the likely sense in natural English.
