    text: 'O «¿Por qué ando en tinieblas bajo la opresión del enemigo?»; hebreo: “oscuro/sombrío”, con posible sentido de duelo o desánimo.'
    reason: lexical_alternative
  revision_rationale: Se corrige la colocación de la nota para que quede anclada al término relevante («enlutado»), se fusiona la información duplicada en una sola nota léxica, y se mejora levemente la naturalidad de la apertura con «Digo» en lugar de «Yo digo», sin cambiar el sentido ni la base exegética.
