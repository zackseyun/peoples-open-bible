lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  lexicon: καί
  rationale: Conserva la continuidad narrativa de Lucas con una conjunción simple y natural en español. 'Y' reproduce mejor el enlace directo del griego que una paráfrasis más interpretativa.
- source_word: Ζαχαρίας
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zequerías
  lexicon: Ζαχαρίας
  rationale: Nombre propio transliterado al español por convención bíblica estándar. 'Zacarías' es la forma natural y reconocible en español.
- source_word: ὁ πατὴρ αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de él
  lexicon: ὁ πατὴρ αὐτοῦ
  rationale: La relación posesiva se expresa de modo idiomático en español con 'su padre'. Evita una construcción más rígida sin perder el referente familiar.
- source_word: ἐπλήσθη
  english_pob_choice: was filled
  chosen_spanish: fue lleno
  alternatives_spanish:
  - quedó lleno
  - se llenó
  lexicon: πίμπλημι
  rationale: El pasivo aoristo se conserva con una forma pasiva clara en español. 'Fue lleno' mantiene la voz pasiva y la acción puntual del texto, sin añadir matices no presentes.
- source_word: πνεύματος ἁγίου
  english_pob_choice: with the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - con el Espíritu Santo
  - de Espíritu Santo
  lexicon: πνεῦμα ἅγιον
  rationale: Aunque el inglés auditado usa 'with', en español la construcción más natural con 'fue lleno' es 'del Espíritu Santo'. El referente es el Espíritu de Dios; por eso se capitaliza y se explicita como nombre propio teológico.
- source_word: ἐπροφήτευσεν
  english_pob_choice: prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - habló proféticamente
  lexicon: προφητεύω
  rationale: '''Profetizó'' reproduce directamente el verbo y conserva la fuerza de habla inspirada. Evita una expansión interpretativa.'
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: λέγω
  rationale: El participio introductorio se vierte de manera directa como fórmula de introducción del discurso. 'Diciendo' conserva la relación sintáctica con la profecía que sigue.
theological_decisions:
- issue: Referente de πνεύματος ἁγίου
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - un espíritu santo
  - espíritu santo
  rationale: En Lucas- Hechos, la expresión en este contexto señala al Espíritu de Dios, no a una mera cualidad de inspiración. La traducción con artículo y mayúsculas preserva esa lectura narrativa y teológica.
  doctrine_reference: Lucas 1:15, 41, 67; Hechos 2:4; afirmaciones POB sobre el Espíritu Santo
translation_notes:
  revision_awareness: El audit trail inglés no presenta variantes ni notas textuales adicionales; la revisión más reciente indicó que no se requerían cambios. La versión española sigue esa estabilidad y conserva la misma lectura de πνεύματος ἁγίου como referencia al Espíritu Santo.
  spanish_consistency_notes:
  - Se mantiene el nombre bíblico convencional 'Zacarías'.
  - Se usa 'Espíritu Santo' con mayúsculas por referencia personal y teológica.
  - Se evita 'Cristo' o cualquier terminología no presente en el verso.
  - La puntuación con dos puntos reproduce el inicio de discurso introducido por λέγων.
