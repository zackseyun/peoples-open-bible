translation:
  language: es
  text: 'Pero Yahvé le dijo: «La paz[a] sea contigo. No temas; no morirás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Paz a ti». El hebreo shalom puede comunicar paz, bienestar o una palabra de tranquilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: El verbo narrativo אמר se vierte naturalmente con «decir» en español; «le dijo» conserva el destinatario implícito del hebreo y suena fluido en la narración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa el nombre divino propio; en la tradición española de la POB se normaliza como «Yahvé», manteniendo el nombre del pacto en lugar de una sustitución titulada.
- source_word: שָׁלוֹם לְךָ
  english_pob_choice: Peace be to you
  chosen_spanish: Paz a ti
  alternatives_spanish:
  - Paz para ti
  - Paz contigo
  - Que haya paz para ti
  lexicon: HALOT
  rationale: שָׁלוֹם aquí funciona como fórmula de reassurance/blessing. En español, «Paz a ti» conserva la brevedad idiomática y el valor de saludo/aseguramiento sin sobretraducir.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: La prohibición con ירא es una fórmula estable de consuelo; «No temas» es la equivalencia más natural y solemne en español, y preserva el tono directo del hebreo.
- source_word: לֹא תָּמוּת
  english_pob_choice: you shall not die
  chosen_spanish: no morirás
  alternatives_spanish:
  - no vas a morir
  - ciertamente no morirás
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa aquí una seguridad futura tras el temor del interlocutor; «no morirás» es breve, solemne y fiel al valor de aseguramiento del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio divino revelado en el hebreo, evitando la sustitución por un título. «Yahvé» es la forma establecida en la POB española para alinear con el principio auditado del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo masorético y con la lectura auditada en inglés; no se detectan variantes textuales ni revisiones previas que alteren la traducción.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al criterio general del proyecto.
  - «No temas» conserva la fórmula bíblica de consuelo sin añadir matices no presentes en el hebreo.
  - La puntuación reproduce la pausa retórica del hebreo con una declaración inicial de paz seguida por la prohibición y la seguridad final.
