translation:
  language: es
  text: Cometer maldad es como un juego para el necio[a], pero la sabiduría es para un hombre de entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacer un plan malo» o «cometer un acto desvergonzado». El término hebreo para «maldad» también puede sugerir una acción desvergonzada o escandalosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּשְׂחוֹק
  english_pob_choice: is like a joke
  chosen_spanish: como juego le es
  alternatives_spanish:
  - es como una broma
  - le es como risa
  - es como diversión
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación y שְׂחוֹק apunta a risa, broma o diversión. 'Como juego le es' conserva el tono proverbial de algo tratado como algo ligero o entretenido, sin perder la comparación.
- source_word: לִכְסִיל
  english_pob_choice: to a fool
  chosen_spanish: a un necio
  alternatives_spanish:
  - para un necio
  - al necio
  lexicon: HALOT
  rationale: La preposición ל marca aquí relación o perspectiva. 'A un necio' comunica de manera natural que así le parece al necio lo que hace.
- source_word: עֲשׂוֹת
  english_pob_choice: Doing
  chosen_spanish: cometer
  alternatives_spanish:
  - hacer
  - el hacer de
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como sujeto nominal de la cláusula. En español, 'cometer' da un equivalente idiomático para la acción negativa implicada por זִמָּה y mantiene la brevedad del proverbio.
- source_word: זִמָּה
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - mala acción
  - perversidad
  - malvado plan
  - desvergüenza
  lexicon: HALOT
  rationale: זִמָּה puede abarcar maldad, perversidad o un acto desvergonzado; en Proverbios, el sentido ético general es el más probable. 'Maldad' preserva el peso moral sin restringir el término a una sola matiz.
- source_word: וְחָכְמָה
  english_pob_choice: but wisdom
  chosen_spanish: pero la sabiduría
  alternatives_spanish:
  - y la sabiduría
  - mas la sabiduría
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', el paralelismo sapiencial exige contraste. 'Pero' refleja mejor la oposición entre el necio y el hombre entendido.
- source_word: לְאִישׁ תְּבוּנָה
  english_pob_choice: is for a man of understanding
  chosen_spanish: es para un hombre de entendimiento
  alternatives_spanish:
  - pertenece a un hombre de entendimiento
  - es deleite para un hombre de entendimiento
  - para un hombre de entendimiento
  lexicon: HALOT
  rationale: La frase hebrea es elíptica y literalmente dice 'para un hombre de entendimiento'. En español, 'es para' mantiene la concisión y la relación abierta del texto sin añadir una interpretación demasiado específica.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - uno
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular masculino representativo. 'Hombre' conserva esa correspondencia y evita suavizar la forma del original.
theological_decisions:
- issue: Contraste sapiencial entre necio y entendido
  english_pob_reading: Doing wickedness is like a joke to a fool, but wisdom is for a man of understanding.
  chosen_spanish_reading: Cometer maldad le resulta como juego a un necio, pero la sabiduría es para un hombre de entendimiento.
  alternative_spanish_readings:
  - La maldad le parece una broma al necio, pero la sabiduría es para el entendido.
  - Hacer el mal es diversión para el necio, pero la sabiduría es para un hombre prudente.
  rationale: 'El proverbio presenta una oposición moral, no solo psicológica: el necio trivializa la maldad, mientras que el hombre de entendimiento se relaciona con la sabiduría. La traducción conserva ese contraste sin reducirlo a mera ironía.'
  doctrine_reference: 'Proverbios sapienciales: contraste moral entre necedad y sabiduría, sin suavizar la responsabilidad ética del acto'
- issue: Valor de זִמָּה en contexto
  english_pob_reading: wickedness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - acto desvergonzado
  - mala acción
  - perversidad
  rationale: La POB inglesa preserva la amplitud ética del término y anota que puede sugerir un acto vergonzoso u outrageous. En español, 'maldad' mantiene el sentido general sin cerrarlo a un matiz sexual o exclusivamente de conspiración.
  doctrine_reference: Uso léxico contextual del AT; evitar restringir indebidamente un término moral amplio
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético y la auditoría inglesa indicada. No se introdujeron cambios textuales; la única nota preserva la alternativa léxica relevante de זִמָּה y su posible matiz de desvergüenza o escándalo.
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' para חָכְמָה y 'entendimiento' para תְּבוּנָה, diferenciando ambos campos semánticos.
  - '''Necio'' se usó para כְּסִיל, en línea con el tono sapiencial y la equivalencia estable del término.'
  - Se evitó 'Cristo', 'Señor' u otra terminología no pertinente al pasaje.
  - La puntuación reproduce el paralelismo hebreo con una coma antes del contraste adversativo.
