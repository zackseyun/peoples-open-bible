base_translation:
  language: en
  yaml_path: translation/ot/nahum/002/013.yaml
  text: The lion tore enough for his cubs and strangled prey for his lionesses[b][a]; he filled his dens with prey and his lairs with torn flesh.
  footnotes:
  - marker: a
    text: Or 'The lion was tearing sufficient prey for his cubs.' The Hebrew participle can be rendered with a more continuous sense.
    reason: lexical_alternative
  - marker: b
    text: '''Torn flesh'' could also be rendered ''prey'' or ''what was torn.'' The translation distinguishes this term from the earlier ''prey'' to preserve the Hebrew poetic variation.'
    reason: lexical_alternative
