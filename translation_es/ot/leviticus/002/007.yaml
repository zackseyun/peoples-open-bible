translation:
  language: es
  text: Y si tu ofrenda es una ofrenda de cereal preparada en una sartén[a], se hará de harina fina con aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plancha», «sartén honda» o «recipiente de cocción»; el tipo exacto de utensilio indicado por el término hebreo es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La partícula conjuntiva más la condicional introduce otra cláusula dentro de las instrucciones sacrificiales. «Y si» conserva mejor el enlace secuencial y casuístico que un simple «Si».
- source_word: מִנְחַת
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda
  - ofrenda de grano
  lexicon: HALOT
  rationale: En Levítico 2, מִנְחָה designa la ofrenda cultual de cereal/grano, no una dádiva genérica. «Ofrenda de cereal» transmite ese valor técnico con claridad en español; «de grano» también sería posible, pero «cereal» evita una lectura demasiado moderna o imprecisa.
- source_word: מַרְחֶשֶׁת
  english_pob_choice: pan
  chosen_spanish: sartén
  alternatives_spanish:
  - plancha
  - parrilla
  - recipiente de cocción
  lexicon: HALOT
  rationale: El término señala un utensilio de cocción usado para preparar esta ofrenda. Como el tipo exacto es incierto, «sartén» funciona en español como designación amplia y natural sin especificar más de lo que el hebreo permite.
- source_word: קָרְבָּנֶךָ
  english_pob_choice: your offering
  chosen_spanish: tu ofrenda
  alternatives_spanish:
  - tu regalo
  - tu ofrenda presentada
  lexicon: HALOT
  rationale: קָרְבָּן es el término general para algo acercado a Dios como ofrenda. «Tu ofrenda» es la manera más natural y fiel de reflejar el posesivo en español.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina de primera
  lexicon: HALOT
  rationale: Este es el ingrediente cultual estándar en las ofrendas de cereal. «Flor de harina» es la equivalencia tradicional y precisa en español, y comunica bien la idea de harina finamente molida.
- source_word: בַּשֶּׁמֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - en aceite
  - mezclada con aceite
  lexicon: HALOT
  rationale: La preposición indica acompañamiento o material de preparación. «Con aceite» es conciso y natural; «mezclada con aceite» sería más interpretativo que el hebreo.
- source_word: תֵּעָשֶׂה
  english_pob_choice: it shall be made
  chosen_spanish: será hecha
  alternatives_spanish:
  - debe hacerse
  - será preparada
  lexicon: HALOT
  rationale: El imperfecto nifal expresa cómo debe prepararse la ofrenda. «Será hecha» conserva la pasiva y el tono instructivo del texto; «será preparada» explicita el proceso, pero se aparta un poco más de la forma verbal.
theological_decisions:
- issue: Naturaleza técnica de la ofrenda de cereal en Levítico 2
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda de cereal
  alternative_spanish_readings:
  - ofrenda de grano
  - ofrenda
  rationale: No se debe diluir el sentido cultual específico de מִנְחָה como una ofrenda ritual concreta. «Ofrenda de cereal» mantiene el valor técnico y evita una generalización excesiva.
  doctrine_reference: Levítico 2; uso cultual de מִנְחָה
- issue: Vaso de cocción incierto en מַרְחֶשֶׁת
  english_pob_reading: pan
  chosen_spanish_reading: sartén
  alternative_spanish_readings:
  - plancha
  - recipiente de cocción
  rationale: El tipo exacto del utensilio no es seguro, y la traducción no debe fingir precisión donde el hebreo no la da. «Sartén» ofrece una imagen clara sin resolver indebidamente la incertidumbre lexical.
  doctrine_reference: HALOT sobre מַרְחֶשֶׁת; nota de alternativa lexical
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del testimonio inglés: no se detectan cambios posteriores necesarios, y se mantiene el acuerdo alto con la lectura auditada.'
  spanish_consistency_notes:
  - Se conserva el flujo casuístico con «Y si».
  - Se evita «SEÑOR»; aquí no aparece el tetragrámaton.
  - «Flor de harina» refleja el término cultual estándar y es más idiomático que una paráfrasis explicativa.
  - La nota al pie se ancla únicamente en el término incierto del utensilio de cocción.
