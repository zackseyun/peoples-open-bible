review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los correos llevan cartas por todo Israel y Judá, llaman a los hijos de Israel a volver a Yahvé, preserva correctamente el nombre divino, y mantiene la fórmula textual menos habitual «Abraham, Isaac e Israel». También conserva la reciprocidad de שׁוּבוּ / וְיָשֹׁב. Sin embargo, hay dos desajustes: la nota al pie está anclada en el lugar equivocado, y «corredores»/«desde la mano» suenan poco naturales en español para este contexto administrativo.'
  spanish_quality_summary: El texto es mayormente comprensible y digno, pero necesita un pequeño ajuste de estilo para español bíblico natural. «Los corredores» resulta demasiado literal y puede evocar atletas más que mensajeros oficiales; «los correos» o «los mensajeros» comunica mejor la función. «Desde la mano del rey» es un calco menos idiomático que «de mano del rey» o «de parte del rey»; dado que el proyecto valora conservar la imagen de «mano», conviene «de mano del rey». Además, las notas están invertidas respecto del contenido que explican.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> «Yahvé» está correcto; «Dios» para אֱלֹהֵי está correcto; «remanente» preserva bien הַפְּלֵיטָה. No hay conflicto terminológico mayor. La principal mejora es léxica/estilística: הָרָצִים debe rendirse en español con una forma funcional natural para portadores oficiales de cartas, preferiblemente «los correos».'
  issues:
  - severity: medium
    issue: Notas al pie invertidas
    rationale: 'La nota que dice «Hebreo: “Israel”, no el más familiar “Jacob”» corresponde a la frase «Isaac e Israel», no a «Judá». La otra nota alternativa corresponde al sintagma «remanente... queda para ustedes», no a «Israel». Esto incumple la disciplina de anclaje de notas.'
  - severity: medium
    issue: «Los corredores» es demasiado literal y poco natural
    rationale: Aunque רָצִים literalmente se relaciona con correr, en este contexto de cartas reales se refiere funcionalmente a correos/couriers. «Corredores» en español moderno no comunica bien ese rol administrativo.
  - severity: low
    issue: «Desde la mano del rey» suena calco
    rationale: La imagen de «mano» puede y debe conservarse, pero «de mano del rey» es más idiomático en español que «desde la mano del rey».
  revised_spanish_text: 'Así, los correos fueron con las cartas de mano del rey y de sus oficiales por todo Israel y Judá, conforme al mandato del rey, diciendo: «Hijos de Israel, vuelvan a Yahvé, el Dios de Abraham, Isaac e Israel[a], para que él vuelva al remanente que ha escapado y queda para ustedes[b] de la mano de los reyes de Asiria».'
  revised_footnotes:
