translation:
  language: es
  text: 'Esta es[a] la interpretación, oh rey, y es un decreto del Altísimo que ha venido sobre mi señor el rey:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Altísimo». El título arameo designa a Dios como supremo sobre todos los gobernantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Esto
  - Esta es
  lexicon: HALOT
  rationale: El demostrativo introduce la explicación de Daniel; en español, «Esta» funciona naturalmente con el predicado nominal «la interpretación», sin añadir una paráfrasis innecesaria.
- source_word: פִשְׁרָא
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - el significado
  - la explicación
  lexicon: HALOT
  rationale: En arameo bíblico, el término designa la interpretación de un sueño o misterio; «interpretación» conserva con precisión el sentido técnico y el paralelo del audit trail inglés.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - mi rey
  lexicon: HALOT
  rationale: Se trata de un vocativo cortesano; «oh rey» preserva el tono elevado y claro en español, sin suavizar la dirección directa al monarca.
- source_word: וּגְזֵרַת
  english_pob_choice: and it is a decree
  chosen_spanish: y es un decreto
  alternatives_spanish:
  - y el decreto
  - y este es un decreto
  lexicon: HALOT
  rationale: El hebreo/arameo presenta una segunda cláusula nominal ligada por la conjunción; en español conviene explicitar la cópula con naturalidad, manteniendo la fuerza declarativa de «decreto» en contexto de juicio real/divino.
- source_word: עִלָּיָא
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Más Elevado
  lexicon: HALOT
  rationale: El título divino de Daniel se traduce de forma estable como «el Altísimo», que es idiomático, reverente y fiel a la supremacía divina implicada en el arameo.
- source_word: הִיא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - esto es
  - se trata de
  lexicon: HALOT
  rationale: El pronombre independiente funciona como sujeto de la cláusula nominal; en español basta «es» porque el referente ya está expresado por «un decreto».
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - cuyo
  lexicon: HALOT
  rationale: La partícula relativa introduce la proposición que modifica «decreto»; «que» es la forma más natural en español moderno y conserva la relación sintáctica.
- source_word: מְטָת
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - ha llegado sobre
  lexicon: HALOT
  rationale: El verbo expresa venir/llegar sobre alguien en contexto judicial; «ha venido» mantiene la imagen verbal del arameo y encaja con «sobre» sin forzar el sentido.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: La preposición marca que el decreto recae sobre el rey; «sobre» conserva la relación espacial-metafórica sin decidir de entrada por una hostilidad explícita que el contexto sugiere pero no obliga a formular aquí.
- source_word: מָרִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi soberano
  - mi señor
  lexicon: HALOT
  rationale: Es un tratamiento cortesano hacia el rey; en español «mi señor» reproduce el honorífico de manera clara y digna, equivalente al «my lord» del audit trail.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  - su majestad
  lexicon: HALOT
  rationale: La repetición final es apposicional a «mi señor»; «el rey» mantiene la referencia explícita sin introducir una fórmula moderna ajena al texto.
theological_decisions:
- issue: Título divino עִלָּיָא
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Supremo
  rationale: Se conserva el título tradicional y bíblicamente establecido que comunica supremacía divina sobre los reyes humanos. No se reduce a un adjetivo genérico, porque el texto usa un título teológico cargado.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish.'
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y sin revisiones aplicadas; la versión española sigue la misma estructura sintáctica básica, conservando el vocativo, el título divino y la relación de recaída del decreto sobre el rey sin amplificar el juicio más allá de lo documentado.
  spanish_consistency_notes:
  - Se usa «Altísimo» de manera consistente para עִלָּיָא, conforme al tratamiento establecido en Daniel.
  - Se mantiene «rey»/«mi señor» para el honorífico cortesano, evitando sustituirlo por fórmulas eclesiásticas.
  - La cópula se explicita solo donde el español la requiere para naturalidad, sin alterar la secuencia de cláusulas nominales del arameo.
