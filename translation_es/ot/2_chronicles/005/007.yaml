translation:
  language: es
  text: Entonces los sacerdotes llevaron el arca del pacto de Yahvé a su lugar, al santuario interior de la casa, al Lugar Santísimo[a], debajo de las alas de los querubines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el Santo de los Santos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  english_pob_choice: brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - introdujeron
  lexicon: HALOT
  rationale: El verbo causativo de בוא puede expresar tanto ‘traer’ como ‘llevar’ según la perspectiva narrativa. En español, ‘llevaron’ suena natural para el traslado del arca hacia su ubicación final y conserva la acción de conducción sin añadir detalle.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los clérigos
  lexicon: HALOT
  rationale: La referencia es específica a los sacerdotes; ‘sacerdotes’ es la equivalencia directa y el registro adecuado. Se evita ‘clérigos’, que sería anacrónico y menos preciso.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: Se conserva la cadena de posesión ‘arca del pacto de...’. ‘Pacto’ refleja בְּרִית con su fuerza covenantal, y ‘Yahvé’ traduce el Tetragrámaton según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: ‘Yahvé’. Es la forma más establecida en español bíblico académico y respeta la decisión de no ocultar el nombre personal mediante ‘SEÑOR’.'
- source_word: מְקוֹמוֹ
  english_pob_choice: its place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - su ubicación
  lexicon: HALOT
  rationale: El sufijo pronominal remite al arca. ‘Su lugar’ es la forma más directa e idiomática en español, sin sobreinterpretar como ‘lugar propio’ o ‘lugar designado’.
- source_word: דְּבִיר הַבַּיִת
  english_pob_choice: the inner sanctuary of the house
  chosen_spanish: el santuario interior de la casa
  alternatives_spanish:
  - el lugar interior de la casa
  - el oráculo de la casa
  lexicon: HALOT
  rationale: דְּבִיר designa la cámara interior más sagrada. ‘Santuario interior’ comunica la función cultual con naturalidad en español; se mantiene ‘casa’ para בַּיִת, como en el hebreo, sin sustituirlo por ‘templo’.
- source_word: קֹדֶשׁ הַקְּדָשִׁים
  english_pob_choice: the Most Holy Place
  chosen_spanish: el Lugar Santísimo
  alternatives_spanish:
  - el Santísimo
  - el Santo de los Santos
  lexicon: HALOT
  rationale: Esta construcción superlativa se puede verter como ‘Lugar Santísimo’ o ‘Santo de los Santos’. Se elige la forma tradicional y comprensible en español litúrgico, equivalente al ‘Most Holy Place’ del POB inglés, y se preserva la opción alternativa implícita en la tradición.
- source_word: תַּחַת כַּנְפֵי הַכְּרוּבִים
  english_pob_choice: under the wings of the cherubim
  chosen_spanish: debajo de las alas de los querubines
  alternatives_spanish:
  - bajo las alas de los querubines
  - bajo las alas de los querubines
  lexicon: HALOT
  rationale: ‘Debajo de’ expresa bien תַּחַת y conserva la relación espacial concreta. ‘Querubines’ mantiene el término bíblico tradicional para estos seres alados.
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El POB inglés evita la sustitución por un título y translitera el nombre divino. En español, ‘Yahvé’ cumple esa misma función de modo reconocible y coherente con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto base inglés no muestra cambios recientes en esta unidad; se ha mantenido la misma estructura semántica y se ha ajustado a la norma del proyecto para el nombre divino y la terminología cultual en español.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - Se conserva la distinción cultual con ‘santuario interior’ y ‘Lugar Santísimo’ sin sustituirlos por un único término genérico.
  - ‘Arca del pacto’ mantiene la fuerza de בְּרִית como alianza/pacto sin reducirla a una posesión simple.
