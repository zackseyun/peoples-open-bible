translation:
  language: es
  text: Destilen, cielos, desde lo alto[a]; y las nubes derramen rectitud; ábrase la tierra, y brote salvación, y haga brotar rectitud juntamente. Yo, Yahvé, lo he creado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia» en ambas ocurrencias de «rectitud»; el hebreo צדק / צדקה puede denotar rectitud o justicia según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְעִיפוּ
  english_pob_choice: Drip down
  chosen_spanish: Destilen
  alternatives_spanish:
  - Derramen
  - Lluvien
  - Goteen
  lexicon: HALOT
  rationale: El verbo רָעַף sugiere caer en gotas o destilar. «Destilen» conserva la imagen de un fluir fino y poético sin intensificarlo indebidamente como una lluvia torrencial.
- source_word: שָׁמַיִם
  english_pob_choice: heavens
  chosen_spanish: cielos
  alternatives_spanish:
  - cielo
  - firmamento
  lexicon: HALOT
  rationale: En poesía elevada, el plural hebreo puede reflejar el ámbito celestial. «Cielos» mantiene el registro bíblico y la amplitud cósmica del llamado.
- source_word: מִמַּעַל
  english_pob_choice: from above
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde arriba
  - de lo alto
  lexicon: HALOT
  rationale: La frase indica origen vertical. «Desde lo alto» es natural en español y preserva la dirección descendente de la imagen.
- source_word: שְׁחָקִים
  english_pob_choice: clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - las nubes del cielo
  lexicon: HALOT
  rationale: El término, en paralelo con «cielos», apunta a la zona nubosa. «Las nubes» explicita con naturalidad la imagen de precipitación.
- source_word: יִזְּלוּ
  english_pob_choice: pour down
  chosen_spanish: derramen
  alternatives_spanish:
  - flu yan
  - goteen
  - viertan
  lexicon: HALOT
  rationale: El verbo expresa fluir o caer hacia abajo. «Derramen» funciona bien en español poético y conserva el movimiento descendente sin perder solemnidad.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: HALOT
  rationale: Aunque puede rendirse «justicia» o «rectitud», aquí la pareja con «salvación» y el paralelismo con צְדָקָה permiten una traducción consistente y bíblica en español. La nota preserva la alternativa semántica.
- source_word: תִּפְתַּח אֶרֶץ
  english_pob_choice: let the earth open
  chosen_spanish: ábrase la tierra
  alternatives_spanish:
  - que se abra la tierra
  - abra la tierra
  lexicon: HALOT
  rationale: El hebreo es un jussivo poético. «Ábrase la tierra» reproduce con fluidez el valor exhortativo/optativo y suena natural en español literario.
- source_word: וְיִפְרוּ
  english_pob_choice: that salvation may sprout
  chosen_spanish: y brote salvación
  alternatives_spanish:
  - y florezca salvación
  - y germine salvación
  - y dé fruto salvación
  lexicon: HALOT
  rationale: El verbo פרה tiene fuerza vegetal de fructificar/sprout. «Brote salvación» comunica la imagen de surgimiento orgánico con buena concisión poética.
- source_word: יֶשַׁע
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - auxilio
  lexicon: HALOT
  rationale: «Salvación» es el equivalente más amplio y teológicamente adecuado en Isaías; no restringe el sentido a liberación militar o política.
- source_word: וּצְדָקָה תַצְמִיחַ יַחַד
  english_pob_choice: and let righteousness spring up together
  chosen_spanish: y haga brotar justicia juntamente
  alternatives_spanish:
  - y haga surgir justicia a una
  - y brote justicia juntamente
  - y haga florecer justicia al mismo tiempo
  lexicon: HALOT
  rationale: תַצְמִיחַ es causativo y mantiene la metáfora vegetal. «Haga brotar» respeta ese matiz causal. «Juntamente» refleja יַחַד con un registro bíblico claro.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I, Yahweh
  chosen_spanish: Yo, Yahvé
  alternatives_spanish:
  - Yo soy Yahvé
  - Yo, el Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יְהוָה: «Yahvé» en el texto principal. La forma en aposición reproduce el énfasis solemne del hebreo.'
- source_word: בְּרָאתִיו
  english_pob_choice: have created it
  chosen_spanish: la he creado
  alternatives_spanish:
  - lo he creado
  - la he hecho
  - lo he hecho
  lexicon: HALOT
  rationale: El sufijo pronominal retoma el fenómeno total descrito. «La he creado» concuerda con «la tierra» como antecedente cercano y conserva el perfecto español para la afirmación divina.
theological_decisions:
- issue: Render de צדק / צדקה
  english_pob_reading: righteousness with alternative justice note
  chosen_spanish_reading: justicia en el texto, con nota sobre la alternativa «rectitud/righteousness»
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: En español, «justicia» comunica bien el rango semántico del par צדק / צדקה y mantiene la posible tensión con «salvación». Se conserva una nota para no ocultar que el hebreo también puede leerse como «rectitud» o, en ciertos contextos, «justicia» en sentido forense o moral.
  doctrine_reference: 'DOCTRINE.md Contested terms: צדק / צדקה semantic range'
- issue: Render del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue la norma del proyecto para no enmascarar el Nombre. «Yahvé» preserva el Tetragrama y es una forma estable en español bíblico contemporáneo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la segunda cola vegetal para reflejar mejor el verbo hebreo como «sprout». En español se reflejó esa misma sensibilidad con «brote» / «haga brotar», manteniendo el paralelismo vegetal y la brevedad poética.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de acuerdo con la terminología base del proyecto.
  - Se distinguió cuidadosamente entre el par lexical צדק / צְדָקָה y su posible oscilación entre «justicia» y «rectitud».
  - La sintaxis conserva el tono poético imperativo/jussivo del hebreo, evitando una paráfrasis explicativa.
  - 'Se respetó la metáfora vegetal con dos verbos distintos: «brote» y «haga brotar».'
