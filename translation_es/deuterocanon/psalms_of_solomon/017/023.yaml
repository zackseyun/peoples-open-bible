translation:
  language: es
  text: Mira, oh Señor, y levanta para ellos su rey, el hijo de David[a], en el tiempo que tú escogiste, oh Dios, para que reine sobre Israel tu siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hijo de David». La expresión griega también puede oírse con fuerza mesiánica más marcada; por eso aquí se mantiene «el hijo de David» como lectura principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδε
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira bien
  - Fíjate
  lexicon: BDAG
  rationale: El imperativo dirigido a Dios pide atención inmediata. «Mira» conserva la fuerza vocativa y suena natural en español moderno sin perder reverencia.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Dueño
  lexicon: BDAG
  rationale: Como vocativo divino, «Señor» es el equivalente natural y reverente en español. Se añade «oh» para reflejar la invocación directa del original y la cadencia litúrgica.
- source_word: ἀνάστησον
  english_pob_choice: raise up
  chosen_spanish: levanta
  alternatives_spanish:
  - levanta
  - suscita
  - alza
  lexicon: BDAG
  rationale: «Levanta» comunica la idea de hacer surgir o poner en pie a un rey davídico. Mantiene el matiz bíblico sin sonar demasiado técnico.
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para ellos
  - a favor de ellos
  - para su bien
  lexicon: BDAG
  rationale: La preposición expresa beneficio para el pueblo. «Para ellos» es la forma más directa y clara en español.
- source_word: τὸν βασιλέα αὐτῶν
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - su rey
  - el rey de ellos
  lexicon: BDAG
  rationale: La posesión se expresa con naturalidad en español con «su rey».
- source_word: υἱὸν Δαυίδ
  english_pob_choice: the son of David
  chosen_spanish: el hijo de David
  alternatives_spanish:
  - el hijo de David
  - el descendiente de David
  - un hijo de David
  lexicon: BDAG
  rationale: La revisión más reciente del audit trail corrige la indefinición anterior y trata la expresión como título mesiánico definido. En español, «el hijo de David» preserva ese valor identificador sin explicitar más de lo que dice el griego.
- source_word: εἰς τὸν καιρὸν
  english_pob_choice: at the time
  chosen_spanish: en el tiempo
  alternatives_spanish:
  - en el tiempo
  - para el tiempo
  - en aquel tiempo
  lexicon: BDAG
  rationale: La construcción apunta a un momento determinado. «En el tiempo» reproduce la referencia temporal de forma fiel; aquí se completa con la cláusula relativa siguiente.
- source_word: ὃν ἴδες σύ, ὁ θεός
  english_pob_choice: at the time you chose, O God
  chosen_spanish: que tú escogiste, oh Dios
  alternatives_spanish:
  - que tú elegiste, oh Dios
  - que tú viste, oh Dios
  lexicon: BDAG
  rationale: El contexto de revisión del proyecto indica que ἴδες funciona aquí con sentido de escoger/proveer, no de ver de manera literal. «Escogiste» preserva esa decisión lexical y evita resolver indebidamente la tensión interpretativa con un «viste» literal.
- source_word: τοῦ βασιλεῦσαι
  english_pob_choice: for him to reign
  chosen_spanish: para que reine
  alternatives_spanish:
  - para que reine
  - para reinar
  - a fin de que reine
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa con naturalidad en español mediante «para que reine», dejando claro el sujeto implícito.
- source_word: ἐπʼ Ἰσραὴλ
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre Israel
  - sobre el Israel
  lexicon: BDAG
  rationale: En contexto real, «sobre Israel» conserva la relación de gobierno sin introducir un giro menos natural como «encima de».
- source_word: παῖδά σου
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  - tu hijo
  lexicon: BDAG
  rationale: La lectura «siervo» refleja mejor el idioma bíblico de pacto y mantiene la distinción frente a un posible «hijo/niño», que el audit trail no adopta como traducción principal.
theological_decisions:
- issue: Alcance mesiánico de υἱὸν Δαυίδ
  english_pob_reading: the son of David
  chosen_spanish_reading: el hijo de David
  alternative_spanish_readings:
  - el descendiente de David
  - un hijo de David
  rationale: La frase funciona como título mesiánico definido en este contexto. El español debe reflejar ese valor identificador sin diluirlo en una formulación más genérica.
  doctrine_reference: Translate titles for meaning, but avoid importing doctrinal specificity beyond the source text.
- issue: Sentido de ὃν ἴδες σύ, ὁ θεός
  english_pob_reading: at the time you chose, O God
  chosen_spanish_reading: que tú escogiste, oh Dios
  alternative_spanish_readings:
  - que tú viste, oh Dios
  - que tú determinaste, oh Dios
  rationale: El audit trail revisado corrige el valor de ἴδες hacia «chose/provide». La traducción española debe seguir esa decisión y no reintroducir el literalismo de «ver».
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: ἴδες se entendió como «escogiste/proveíste» y υἱὸν Δαυίδ como título definido («el hijo de David»). También se evitó la corrupción textual previa y se ajustó el vocativo a un español natural.'
  spanish_consistency_notes:
  - Se mantuvo «oh Señor» para el vocativo divino y «oh Dios» para la segunda invocación, conservando la doble apelación del texto.
  - «Tu siervo» traduce παῖδά σου en la línea de la lectura principal del proyecto, sin introducir «hijo» o «niño».
  - La puntuación distribuye las invocaciones y la cláusula de propósito de forma clara para lectura pública.
