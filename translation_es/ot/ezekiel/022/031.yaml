translation:
  language: es
  text: Así que derramé mi indignación sobre ellos; con el fuego de mi ira los consumí.[b] Puse su camino sobre sus propias cabezas,[a] declara el Señor Yahvé.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Puse su camino sobre sus cabezas», un modismo profético que significa que las consecuencias de su conducta han recaído sobre ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con el fuego de mi furia los destruí».'
    reason: alternative_reading
  - marker: c
    text: Hebreo אֲדֹנָי יְהוִה, con el nombre divino YHWH en el original; el proyecto lo vierte como «Yahvé».
    reason: source_note
lexical_decisions:
- source_word: וָאֶשְׁפֹּךְ
  english_pob_choice: I poured out
  chosen_spanish: derramé
  alternatives_spanish:
  - vertí
  - derramé fuera
  lexicon: HALOT
  rationale: שׁפך expresa el acto de derramar; en español, «derramé» conserva la imagen física y se ajusta al uso profético de juicio sin sonar forzado.
- source_word: זַעְמִי
  english_pob_choice: my indignation
  chosen_spanish: mi indignación
  alternatives_spanish:
  - mi ira
  - mi enojo
  lexicon: HALOT
  rationale: «Indignación» mantiene mejor el matiz judicial y moral de זַעַם que un mero «enojo», y coincide con la decisión inglesa de preservar la fuerza forense del término.
- source_word: בְּאֵשׁ עֶבְרָתִי
  english_pob_choice: with the fire of my wrath
  chosen_spanish: con el fuego de mi ira
  alternatives_spanish:
  - con el fuego de mi furia
  - en el fuego de mi ira
  lexicon: HALOT
  rationale: La metáfora de fuego destruyente se conserva. «Ira» es una equivalencia natural y sobria en español; «furia» sería posible, pero puede sonar más desbordada que el valor judicial del hebreo.
- source_word: כִּלִּיתִים
  english_pob_choice: I consumed them
  chosen_spanish: los consumí
  alternatives_spanish:
  - los destruí
  - los acabé
  lexicon: HALOT
  rationale: כלה en este contexto de fuego permite «consumí», que conserva la imagen de destrucción por fuego y sigue de cerca la elección inglesa.
- source_word: דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su conducta
  - sus caminos
  lexicon: HALOT
  rationale: «Camino» mantiene el singular colectivo hebreo y la frase profética idiomática. En español, «su camino» suena natural y conserva la referencia al modo de vida.
- source_word: בְּרֹאשָׁם נָתַתִּי
  english_pob_choice: I have put their way on their own heads
  chosen_spanish: Puse su camino sobre su propia cabeza
  alternatives_spanish:
  - hice recaer su conducta sobre su propia cabeza
  - retribuí su camino sobre su cabeza
  lexicon: HALOT
  rationale: Se conserva la metáfora retributiva hebrea. «Sobre su propia cabeza» refleja el idiomático בְּרֹאשָׁם; el singular «cabeza» es una adaptación natural del plural colectivo en español.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir יְהוִה como «Yahvé» en el texto principal. «Declara» reproduce la fórmula profética נְאֻם con registro digno y claro. «Señor» traduce אֲדֹנָי como título reverencial.
theological_decisions:
- issue: Lenguaje de juicio divino intenso
  english_pob_reading: Retain strong personal language of God's indignation, wrath, and retributive justice without softening.
  chosen_spanish_reading: Mantener el lenguaje personal e intenso de indignación, ira y retribución sin atenuarlo.
  alternative_spanish_readings:
  - usar un lenguaje más suave como «desagrado» o «castigo»
  - reformular el versículo en términos menos personales
  rationale: El hebreo atribuye al Señor una respuesta judicial activa. La traducción española debe conservar esa gravedad profética y la coherencia con la imagen del fuego consumidor.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Forma del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé
  rationale: El texto hebreo contiene explícitamente el nombre divino YHWH junto al título אֲדֹנָי. Siguiendo la norma del proyecto, se preserva «Yahvé» en español en vez de ocultarlo bajo una convención tipográfica de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y no se detectaron cambios posteriores en la decisión global de sentido. La versión española conserva el paralelismo, la metáfora del fuego y el idiomatismo retributivo sin ampliar ni suavizar el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la norma del proyecto para יְהוִה.
  - «Indignación» se usa para זַעַם por su matiz judicial; no se rebaja a un término afectivo genérico.
  - «Su camino» preserva el singular colectivo hebreo y el idioma profético.
  - La puntuación y el orden siguen el flujo retórico del hebreo y del audit trail inglés, con una formulación natural en español.
