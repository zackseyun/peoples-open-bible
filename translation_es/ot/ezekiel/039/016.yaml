translation:
  language: es
  text: Y el nombre de la ciudad también será Hamoná[a]. Así limpiarán la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hamoná es un nombre de lugar probablemente relacionado con la palabra hebrea para «multitud» o «horda».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And ... also
  chosen_spanish: Y ... también
  alternatives_spanish:
  - También
  - Además
  lexicon: HALOT
  rationale: La combinación conjuntiva-adverbial añade un detalle más al contexto inmediato. «Y ... también» conserva el valor aditivo de forma natural en español sin endurecer el ritmo.
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - nombre
  lexicon: HALOT
  rationale: En construcción con «ciudad», la frase indica el nombre de la ciudad. El artículo definido es natural porque se trata de una ciudad específica del contexto.
- source_word: עִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - ciudad
  lexicon: HALOT
  rationale: Se refiere a una ciudad concreta asociada al contexto inmediato; por eso el artículo definido encaja mejor en español.
- source_word: הֲמוֹנָה
  english_pob_choice: Hamonah
  chosen_spanish: Hamoná
  alternatives_spanish:
  - Hamonah
  - Multitud
  lexicon: HALOT
  rationale: Se trata de un topónimo y debe transliterarse como nombre propio. Se adapta la acentuación al español para facilitar la lectura, sin traducir el sentido probable de «multitud/horda» en el texto principal.
- source_word: וְטִהֲרוּ
  english_pob_choice: Thus they will cleanse
  chosen_spanish: Así limpiarán
  alternatives_spanish:
  - Y limpiarán
  - Así purificarán
  lexicon: HALOT
  rationale: 'El verbo expresa un efecto/resultante en la secuencia: después del entierro, la tierra queda limpiada. «Limpiarán» conserva el sentido concreto y es más natural que «purificarán» en este contexto material.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En Ezequiel el término suele referirse al territorio/la tierra del pueblo, no al globo terráqueo. «La tierra» mantiene ese valor territorial y sigue siendo idiomática en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés: conserva el topónimo transliterado, mantiene el valor aditivo de וְגַם y el sentido resultativo de וְטִהֲרוּ. Se evita una traducción más interpretativa como «purificarán» para no desdibujar el contexto concreto de limpieza de la tierra.'
  spanish_consistency_notes:
  - Se usa «Hamoná» como transliteración españolizada del topónimo, coherente con la práctica de preservar nombres propios.
  - «Limpiarán la tierra» mantiene el paralelo con el inglés POB «cleanse the land» y con el contexto de contaminación/limpieza ritual o material en Ezequiel.
  - No se sustituyó «tierra» por «mundo» o «país» para no ampliar indebidamente el alcance del hebreo הָאָרֶץ.
