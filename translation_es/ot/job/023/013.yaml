translation:
  language: es
  text: Pero él es uno[a], ¿y quién podrá hacerlo volver atrás? Lo que desea su alma[b], eso hace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es uno solo»; el hebreo puede expresar que él tiene un solo propósito o que es inmutable en su propósito.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Lo que él desea, eso hace». El hebreo dice «su alma», un modo frecuente de referirse al propio querer o deseo de una persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Mas él
  lexicon: HALOT
  rationale: El hebreo usa una conjunción más pronombre independiente, con valor contrastivo frente al contexto previo. «Pero» reproduce bien ese giro adversativo en español y «él» conserva el pronombre explícito.
- source_word: בְאֶחָד
  english_pob_choice: is one
  chosen_spanish: es uno
  alternatives_spanish:
  - es uno solo
  - está en una sola mente
  - permanece igual
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «en/por uno», y la revisión inglesa reciente prefirió «one» para mantenerse más cerca del hebreo. En español, «es uno» conserva esa literalidad y deja abierta la tensión interpretativa sobre unidad, singularidad o firmeza de propósito.
- source_word: וּמִי יְשִׁיבֶנּוּ
  english_pob_choice: and who can turn him back?
  chosen_spanish: ¿y quién podrá hacerle dar vuelta?
  alternatives_spanish:
  - ¿y quién podrá volverlo atrás?
  - ¿y quién podrá hacerlo cambiar?
  - ¿y quién podrá responderle?
  lexicon: HALOT
  rationale: El hiphil de שוב expresa volver atrás, hacer retroceder o invertir el curso. «Hacerle dar vuelta» conserva la imagen verbal de reversión y mantiene la idea de que nadie puede desviar su resolución.
- source_word: וְנַפְשׁוֹ
  english_pob_choice: What his soul
  chosen_spanish: Lo que desea su alma
  alternatives_spanish:
  - Lo que él desea
  - Lo que anhela
  - Su propio querer
  lexicon: HALOT
  rationale: נפש aquí funciona como modo hebreo de hablar del centro volitivo o deseo personal. «Su alma» preserva el giro del hebreo; en español se explicita «lo que desea» para que la construcción sea natural y comprensible sin perder la fuerza antropológica del término.
- source_word: אִוְּתָה
  english_pob_choice: desires
  chosen_spanish: desea
  alternatives_spanish:
  - quiere
  - anhela
  - apetece
  lexicon: HALOT
  rationale: El verbo denota desear o querer. «Desea» es una opción amplia, natural y suficientemente precisa para el contexto.
- source_word: וַיָּעַשׂ
  english_pob_choice: that he does
  chosen_spanish: eso hace
  alternatives_spanish:
  - eso lo hace
  - eso realiza
  - eso ejecuta
  lexicon: HALOT
  rationale: עשה es el verbo común «hacer». «Eso hace» reproduce la concisión hebrea y mantiene el paralelismo con el objeto previo sin añadir matices interpretativos.
theological_decisions:
- issue: Cómo reflejar la afirmación sobre la firmeza del querer divino
  english_pob_reading: But he is one, and who can turn him back? What his soul desires, that he does.
  chosen_spanish_reading: Pero él es uno[a], ¿y quién podrá hacerle dar vuelta? Lo que desea su alma[b], eso hace.
  alternative_spanish_readings:
  - Pero él es uno solo, ¿y quién podrá volverlo atrás? Lo que su alma desea, eso hace.
  - Pero él es uno en propósito, ¿y quién podrá desviarlo? Lo que desea, eso hace.
  rationale: La revisión inglesa reciente volvió a una formulación más literal («one») para no resolver de antemano el sentido. En español se conserva igualmente «es uno», dejando abierta la tensión entre unidad, singularidad e inmutabilidad de propósito, y sin convertir el verso en una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: El valor de נֶפֶשׁ en una afirmación sobre Dios
  english_pob_reading: What his soul desires, that he does.
  chosen_spanish_reading: Lo que desea su alma, eso hace.
  alternative_spanish_readings:
  - Lo que él desea, eso hace.
  - Lo que su ser desea, eso hace.
  rationale: La lectura inglesa conserva «soul» como huella del hebreo. En español, «alma» mantiene ese enlace semántico y evita borrar la expresión original; a la vez, el contexto hace claro que no se trata de una antropología materialista sino del querer personal de Dios.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió mantener «one» frente a una expansión interpretativa como «unchangeable», así que la redacción española sigue ese nivel de literalidad y no introduce una explicación doctrinal en el texto principal. También se conserva la referencia a «su alma» para reflejar el hebreo, con nota alternativa para la lectura más idiomática.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el hebreo contiene el nombre divino; aquí no aparece.
  - Se conserva «alma» para נֶפֶשׁ porque el texto y el audit trail destacan esa imagen hebrea.
  - «Es uno» mantiene la tensión del original y evita elegir prematuramente entre unidad, singularidad o inmutabilidad.
  - La puntuación en español sigue el valor contrastivo de la primera cláusula y el paralelismo del verso.
