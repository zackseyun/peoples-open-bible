revisions:
- from: Pero ahora, ve, guía al pueblo a donde he hablado a ti. Mira, mi ángel irá delante de ti; pero el día en que yo los castigue[c], los castigaré[b] por su pecado.
  to: Pero ahora, ve, guía al pueblo al lugar[a] del que te hablé. Mira, mi ángel[b] irá delante de ti; pero el día en que yo los castigue[c], los castigaré por su pecado.
  rationale: Se corrige un calco no idiomático («he hablado a ti») por una formulación natural y fiel al hebreo («al lugar del que te hablé»), y se restaura la nota [a] del expediente inglés. También se normalizan los marcadores para que aparezcan en orden y anclados correctamente en el texto.
