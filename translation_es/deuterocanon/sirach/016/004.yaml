translation:
  language: es
  text: De un hombre sin hijos que teme a Yahvé,[a] será habitada una ciudad; pero de una familia de traidores será devastada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «De un hombre prudente será habitada una ciudad». El hebreo dice: «De un hombre sin hijos que teme a Yahvé»'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֶחַד
  english_pob_choice: From one
  chosen_spanish: De uno
  alternatives_spanish:
  - Por uno
  - A causa de uno
  lexicon: HALOT
  rationale: La preposición מִן con אֶחָד expresa origen o procedencia; en español, 'de uno' conserva ese valor y mantiene el paralelismo con el griego ἀπὸ ... ἑνός.
- source_word: עֲרִירִי
  english_pob_choice: childless man
  chosen_spanish: uno
  alternatives_spanish:
  - hombre sin hijos
  - hombre estéril
  - solitario
  lexicon: HALOT
  rationale: El testimonio hebreo apunta a la idea de alguien sin descendencia; aquí se conserva de forma breve porque el complemento relativo 'que teme a Yahvé' ya identifica al sujeto y evita añadir una perífrasis demasiado pesada en español. La nota preserva la alternativa griega de 'prudente'.
- source_word: יְרֵא יְהֹוָה
  english_pob_choice: who fears Yahweh
  chosen_spanish: que teme a Yahvé
  alternatives_spanish:
  - temeroso de Yahvé
  - que teme al Señor
  - piadoso
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a YHWH; por eso se mantiene 'Yahvé' en vez de un genérico. 'Que teme a Yahvé' reproduce el sentido reverencial sin borrar el nombre divino.
- source_word: תֵּשֵׁב עִיר
  english_pob_choice: a city will be inhabited
  chosen_spanish: será habitada una ciudad
  alternatives_spanish:
  - una ciudad será poblada
  - una ciudad se asentará
  - habitará una ciudad
  lexicon: HALOT
  rationale: El verbo ישב en esta forma expresa que la ciudad llega a estar habitada. En español, la pasiva 'será habitada' conserva bien el resultado y evita forzar una construcción extraña.
- source_word: מִמִּשְׁפַּחַת
  english_pob_choice: from a family
  chosen_spanish: la familia
  alternatives_spanish:
  - el linaje
  - la clan
  - la casa
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede referirse a familia o grupo de parentesco. 'Familia' es la opción más natural y fiel para el contraste del versículo.
- source_word: בֹּגְדִים
  english_pob_choice: traitors
  chosen_spanish: traidores
  alternatives_spanish:
  - infieles
  - perversos
  - pérfidos
  lexicon: HALOT
  rationale: '''Traidores'' recoge la fuerza moral de בוגדים, que describe a quienes actúan con deslealtad y ruptura de confianza.'
- source_word: תֶּחֱרָב
  english_pob_choice: it will be laid waste
  chosen_spanish: será devastada
  alternatives_spanish:
  - será arruinada
  - será desolada
  - quedará en ruinas
  lexicon: HALOT
  rationale: El verbo חרב expresa ruina, desolación o devastación. 'Será devastada' comunica esa pérdida severa con un español natural y sobrio.
theological_decisions:
- issue: Divergencia entre el hebreo ('uno que teme a Yahvé' / 'hombre sin hijos') y el griego ('un prudente') en la primera mitad del versículo
  english_pob_reading: Main text follows the Hebrew witness; Greek is preserved in a footnote as an alternative reading.
  chosen_spanish_reading: 'El texto principal sigue el hebreo: ''uno que teme a Yahvé''.'
  alternative_spanish_readings:
  - un prudente
  - un hombre entendido
  - un hombre sensato
  rationale: Como el hebreo está preservado con alta confianza, se prioriza en el texto principal. El griego se conserva indirectamente en la nota para no borrar una tensión textual real.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva, preservando alternativas genuinas en nota.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto principal. También se mantuvo el orden natural del español con la cláusula relativa pospuesta a 'uno' para reflejar el hebreo sin añadir material no sustentado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto para el nombre divino.
  - Se evita 'Señor' como sustituto de máscara.
  - '''Traidores'' conserva la fuerza ética de בוגדים.'
  - La pasiva 'será habitada' y 'será devastada' reflejan adecuadamente los verbos hebreos y el paralelo griego.
