review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: condición, remoción de los habitantes, remanentes que causan aflicción y hostigamiento en la tierra. Sin embargo, no preserva del todo la decisión léxica auditada de distinguir las dos imágenes punzantes: el inglés POB eligió primero ''barbs'' y luego ''thorns'', mientras el español invierte el orden conceptual con ''espinas ... aguijones''. Además, faltan en español las notas alternativas asociadas a las imágenes punzantes y al verbo final de aflicción, presentes en el rastro auditado inglés. La frase ''los que de ellos dejen'' también suena incompleta; el hebreo causativo se expresa mejor con ''dejen quedar'' o ''dejen permanecer''.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos tropiezos de naturalidad: ''los que de ellos dejen'' suena poco idiomático, y ''sobre la tierra'' es algo rígido en español en este contexto. Dado que el inglés auditado mantuvo ''on the land'' por cercanía al hebreo, puede conservarse ''sobre la tierra'', pero conviene suavizar el resto de la sintaxis. También es mejor mantener una distinción metafórica más clara con ''púas en sus ojos'' y ''espinas en sus costados'', que suena natural y preserva la diferencia semántica.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. Las decisiones léxicas relevantes del proyecto se respetan en lo esencial, pero conviene alinear mejor תּוֹתִירוּ con un causativo explícito ('dejen quedar') y לְשִׂכִּים / לִצְנִינִם con dos imágenes diferenciadas, como en el audit trail inglés.
  issues:
  - severity: medium
    issue: La expresión 'los que de ellos dejen' es poco natural y subexpresa el causativo de תּוֹתִירוּ.
    rationale: El hebreo significa 'los que ustedes dejen quedar / dejen permanecer de entre ellos'. La redacción actual suena truncada en español.
  - severity: medium
    issue: La pareja metafórica invierte y debilita la distinción auditada entre לְשִׂכִּים y לִצְנִינִם.
    rationale: El POB inglés distingue 'barbs' y 'thorns'. 'Espinas ... aguijones' puede funcionar, pero 'aguijones' para el segundo término sugiere más un instrumento de picar que una espina lateral. 'Púas ... espinas' preserva mejor dos imágenes diferentes y naturales en español.
  - severity: medium
    issue: Faltan notas léxicas para las dos imágenes punzantes y para וְצָרֲרוּ, presentes en el audit trail inglés.
    rationale: El encargo pide preservar alternativas significativas cuando el inglés POB las preservó. Deben trasladarse al español con marcadores únicos y anclados en el texto.
  revised_spanish_text: Pero si no expulsan[a] a los habitantes de la tierra de delante de ustedes, entonces los que de entre ellos dejen quedar serán púas[b] en sus ojos y espinas[c] en sus costados, y los hostigarán[d] sobre la tierra en la que ustedes habitan.
  revised_footnotes:
