review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del arameo y conserva correctamente elementos clave como ''el Dios de Daniel'', ''el Dios vivo'', la permanencia divina y la indestructibilidad del reino. Sin embargo, hay dos desajustes importantes con el sentido y la gramática del original: (1) ''tiendan a temblar y a temer'' no refleja adecuadamente el mandato/decreto; suena aspectual o disposicional, no imperativo/deóntico como לֶהֱוֺן + participios. (2) ''y su dominio hasta el fin'' queda elíptico en español y omite el verbo/copulativo implícito que el inglés POB sí preserva (''will be to the end'').'
  spanish_quality_summary: 'El español es en general claro y digno, pero contiene giros poco naturales para un decreto formal: ''De parte de mí se emite un decreto'' es entendible, aunque menos idiomático que ''Por mí se emite un decreto'' o ''Se emite por mí un decreto''; y sobre todo ''tiendan a temblar y a temer'' suena forzado. La cláusula final necesita completarse para sonar plenamente natural y fiel: ''y su dominio será hasta el fin'' o similar.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Dios', 'el Dios vivo' y 'dominio' están bien alineados. No intervienen aquí Yahvé, Mesías, Espíritu, etc. La decisión de mantener 'dominio' para שָׁלְטָן es adecuada.
  issues:
  - severity: medium
    issue: '''tiendan a temblar y a temer'' no expresa bien el mandato del decreto'
    rationale: El arameo לֶהֱוֺן con participios describe lo que los súbditos deben hacer bajo el decreto. En español, 'tiendan a...' sugiere inclinación o hábito, no obligación oficial. 'tiemblen y teman' preserva mejor la fuerza y la intensidad.
  - severity: medium
    issue: 'La última cláusula queda incompleta: ''y su dominio hasta el fin'''
    rationale: 'Aunque el arameo es breve, en español esta formulación suena fragmentaria. Debe explicitarse el valor verbal: ''y su dominio será hasta el fin'' o ''durará hasta el fin''. Esto además sigue mejor la justificación del POB inglés.'
  - severity: low
    issue: '''De parte de mí'' es menos idiomático en una fórmula de decreto'
    rationale: No es incorrecto, pero en registro administrativo solemne 'Por mí se emite un decreto' suena más natural y más cercano al valor de procedencia/autoridad del original y del inglés 'by me'.
  revised_spanish_text: 'Por mí[a] se emite un decreto: que en todo el dominio de mi reino tiemblen y teman ante[b] el Dios de Daniel, porque él es el Dios vivo y permanece para siempre; y su reino no será destruido[c], y su dominio será hasta el fin.'
  revised_footnotes:
