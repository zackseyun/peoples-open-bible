translation:
  language: es
  text: Entonces Israel llegó a Egipto, y Jacob habitó como forastero[a] en la tierra de Cam[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «residió como extranjero» o «moró»; el verbo hebreo destaca vivir en un lugar como no nativo.'
    reason: lexical_alternative
  - marker: b
    text: «La tierra de Cam» es un nombre poético de Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... llegó
  alternatives_spanish:
  - y ... llegó
  - entró
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la secuencia; «entonces» conserva el valor consecutivo y «llegó» expresa de forma natural el movimiento de arribo sin cargar el verbo con matices no presentes en el hebreo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacobo
  lexicon: Nombre propio
  rationale: Se mantiene el nombre bíblico estándar. Aquí conserva el paralelismo intencional con «Jacob» en la línea siguiente, sin reducirlo a una sola designación.
- source_word: מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mizraim
  lexicon: Nombre propio
  rationale: Es el equivalente usual y claro en español para el topónimo.
- source_word: וְיַעֲקֹב
  english_pob_choice: and Jacob
  chosen_spanish: y Jacob
  alternatives_spanish:
  - entonces Jacob
  lexicon: Nombre propio
  rationale: Se conserva el paralelismo poético entre Israel y Jacob, como en el hebreo y en la auditoría inglesa.
- source_word: גָּר
  english_pob_choice: lived as a foreigner
  chosen_spanish: habitó como forastero
  alternatives_spanish:
  - moró como extranjero
  - residió como extranjero
  - sojourned
  lexicon: HALOT
  rationale: גור puede expresar residencia temporal o de no nativo. «Habitó como forastero» comunica en español la idea de vivir allí sin pertenecer a ese lugar, manteniendo la tensión lexical sin caer en un término demasiado técnico o arcaico.
- source_word: בְּאֶרֶץ
  english_pob_choice: in the land of
  chosen_spanish: en la tierra de
  alternatives_spanish:
  - en el país de
  - en la tierra
  lexicon: HALOT
  rationale: אֶרֶץ admite «tierra» o «país»; aquí «tierra de Cam» reproduce la construcción poética tradicional y mantiene la referencia geográfica-literaria.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Ham
  lexicon: Nombre propio
  rationale: Se adapta el nombre al uso bíblico español común. Al tratarse de un nombre poético para Egipto, se conserva como designación propia y no se sustituye por el país en el texto principal.
theological_decisions:
- issue: Preservar el paralelismo Israel // Jacob
  english_pob_reading: Keep both names in the main text
  chosen_spanish_reading: Mantener «Israel» y «Jacob» en la línea principal
  alternative_spanish_readings:
  - Entonces Jacob llegó a Egipto y habitó como forastero en la tierra de Cam
  - Entonces Israel llegó a Egipto y habitó como forastero en la tierra de Cam
  rationale: El hebreo usa dos nombres para el mismo referente con valor poético y representativo. La traducción conserva ambos para no aplanar la textura del verso ni borrar la correspondencia intencional entre el patriarca y la nación.
  doctrine_reference: Principio de equivalencia óptima y preservación de la forma poética del texto fuente.
- issue: Nombre poético «la tierra de Ham/Cam»
  english_pob_reading: '''The land of Ham'' is a poetic name for Egypt.'
  chosen_spanish_reading: «la tierra de Cam» como nombre poético tradicional dentro del verso
  alternative_spanish_readings:
  - Egipto
  - la tierra de Egipto
  rationale: El hebreo no dice solo «Egipto» al final, sino «tierra de Cam», una designación literaria. Se conserva para no perder la alusión poética y la textura intertextual del pasaje.
  doctrine_reference: Lectura literaria del Salmo 105 y su nombre poético para Egipto.
translation_notes:
  revision_awareness: Se revisó el paralelismo hebreo y la nota inglesa sobre גָּר. La versión española mantiene la secuencia narrativa, el doble nombre Israel/Jacob y la designación poética «tierra de Cam», sin cambios respecto al sentido auditado.
  spanish_consistency_notes:
  - Se usa «Cam» para el nombre bíblico חָם, conforme al uso español tradicional y a la función poética del verso.
  - «Habitó como forastero» conserva el matiz de residencia de no nativo sin introducir la arcaicidad de «sojourned».
  - Se evita colapsar «Israel» y «Jacob» en una sola referencia para respetar el paralelismo del hebreo.
