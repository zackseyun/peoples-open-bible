translation:
  language: es
  text: La luz de los justos se alegra[a], pero la lámpara de los impíos se apaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está contenta». El verbo hebreo normalmente significa «alegrarse» o «estar contento»; algunos entienden aquí un sentido contextual como «brilla con claridad» porque el sujeto es la «luz».
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: HALOT
  rationale: אוֹר denota luz o brillo. «Luz» es el equivalente natural en español y mantiene bien el contraste poético con «lámpara» en el segundo hemistiquio.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  lexicon: HALOT
  rationale: El adjetivo está usado sustantivamente. «Los justos» conserva la categoría moral con concisión y es idiomático en la literatura sapiencial.
- source_word: יִשְׂמָח
  english_pob_choice: rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - está contenta
  - brilla con gozo
  lexicon: HALOT
  rationale: El verbo שׂמח normalmente significa alegrarse o regocijarse. En español, «se alegra» preserva la personificación de la luz sin forzar el verbo a significar «brillar».
- source_word: נֵר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara de aceite
  - candil
  lexicon: HALOT
  rationale: נֵר designa una lámpara, comúnmente de aceite. «Lámpara» comunica el objeto poético con naturalidad y mantiene el contraste con «luz».
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El plural adjetival funciona como sustantivo. «Los impíos» es un equivalente bíblico claro en español y conserva el contraste moral con «los justos».
- source_word: יִדְעָךְ
  english_pob_choice: goes out
  chosen_spanish: se apaga
  alternatives_spanish:
  - se extingue
  - se extingue por completo
  lexicon: HALOT
  rationale: El verbo se usa especialmente de una lámpara que se extingue. «Se apaga» es idiomático en español y transmite el final de la luz sin sobrerrepresentar la causa.
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: Aunque formalmente es «y», aquí introduce contraste antitético entre los dos cola. «Pero» expresa naturalmente esa fuerza adversativa en español.
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa en la lectura principal: la personificación de «la luz» se conserva con el verbo de alegría, sin convertirlo en un verbo de brillo. También se mantiene el contraste antitético entre la luz de los justos y la lámpara de los impíos que se apaga.'
  spanish_consistency_notes:
  - Se usó «justos/impíos» para mantener un par moral breve y estable en estilo sapiencial.
  - Se prefirió «lámpara» en vez de «candil» o «vela» para no modernizar en exceso ni desplazar el valor léxico de נֵר.
  - La nota conserva la tensión interpretativa sobre si el verbo alude a alegría o a brillo, como en la auditoría inglesa.
