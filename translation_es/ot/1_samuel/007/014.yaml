translation:
  language: es
  text: Y las ciudades que los filisteos habían tomado de Israel fueron devueltas a Israel, desde Ecrón hasta Gat; e Israel libró su territorio de la mano de los filisteos. Y hubo paz entre Israel y los amorreos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los cananeos», si aquí se entiende «amorreos» como un término más amplio para los pueblos de la tierra.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתָּשֹׁבְנָה
  english_pob_choice: were restored
  chosen_spanish: fueron restauradas
  alternatives_spanish:
  - volvieron
  - regresaron
  lexicon: HALOT
  rationale: El hebreo presenta a las ciudades como sujeto de שוב, y el inglés POB usa una pasiva para expresar que volvieron a estar bajo posesión israelita. En español, la pasiva perifrástica mantiene esa fuerza sin personificar de forma extraña a las ciudades.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las aldeas
  lexicon: HALOT
  rationale: '''Ciudades'' es la equivalencia directa y encaja con el contexto territorial y político del pasaje.'
- source_word: לָקְחוּ
  english_pob_choice: had taken
  chosen_spanish: habían tomado
  alternatives_spanish:
  - tomaron
  - habían capturado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja la acción anterior a la restauración. 'Tomado' conserva el sentido amplio de apoderarse, sin añadir una violencia más específica que el hebreo no exige aquí.
- source_word: מֵאֵת יִשְׂרָאֵל ... לְיִשְׂרָאֵל
  english_pob_choice: from Israel ... to Israel
  chosen_spanish: de Israel ... a Israel
  alternatives_spanish:
  - de los israelitas ... a los israelitas
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo para marcar el cambio de posesión. En español, la fórmula breve y paralela es natural y fiel.
- source_word: מֵעֶקְרוֹן וְעַד גַּת
  english_pob_choice: from Ekron to Gath
  chosen_spanish: desde Ecrón hasta Gat
  alternatives_spanish:
  - de Ecrón a Gat
  - desde Ecrón y hasta Gat
  lexicon: HALOT
  rationale: Se transliteran los topónimos de manera estable y reconocible en español bíblico. 'Desde... hasta...' expresa bien el alcance geográfico.
- source_word: וְאֶת גְּבוּלָן
  english_pob_choice: its territory
  chosen_spanish: su territorio
  alternatives_spanish:
  - su frontera
  - su lindero
  lexicon: HALOT
  rationale: Aunque גבול puede significar 'frontera' o 'límite', aquí la idea es la recuperación del dominio territorial asociado a esas ciudades. 'Su territorio' es claro y coherente con la lectura inglesa auditada.
- source_word: הִצִּיל
  english_pob_choice: delivered
  chosen_spanish: libró
  alternatives_spanish:
  - libertó
  - rescató
  lexicon: HALOT
  rationale: El hifil de נצל expresa acción de rescatar o sacar de poder ajeno. 'Libró' conserva el registro bíblico de liberación de una mano hostil, sin sonar arcaizante en exceso.
- source_word: מִיַּד פְּלִשְׁתִּים
  english_pob_choice: from the hand of the Philistines
  chosen_spanish: de mano de los filisteos
  alternatives_spanish:
  - del poder de los filisteos
  - de la mano de los filisteos
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de 'mano' para mantener el matiz de control/opresión. La preposición 'de' suena natural en español y corresponde al valor idiomático.
- source_word: וַיְהִי שָׁלוֹם
  english_pob_choice: there was peace
  chosen_spanish: hubo paz
  alternatives_spanish:
  - y hubo paz
  - y reinó la paz
  lexicon: HALOT
  rationale: La cláusula existencial queda bien reflejada con 'hubo paz'. Es breve, bíblica y evita añadir matices no presentes.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - los amoritas
  - los cananeos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo específico del texto hebreo. 'Amorreos' es la forma usual y comprensible en español bíblico; 'cananeos' se reserva como alternativa interpretativa, no como sustituto del texto base.
theological_decisions:
- issue: Alcance de הָאֱמֹרִי al final del verso
  english_pob_reading: the Amorites, with a footnote noting a broader Canaanite reading
  chosen_spanish_reading: los amorreos[a]
  alternative_spanish_readings:
  - los cananeos
  rationale: El texto hebreo nombra específicamente a los amorreos, y la traducción principal preserva ese etnónimo. Como el audit trail inglés documenta la posibilidad de entenderlo como término amplio para los pueblos de la tierra, se conserva esa tensión en una nota y no se resuelve en el cuerpo del texto.
  doctrine_reference: Preservar la primacía del texto original y la tensión interpretativa documentada; no introducir armonización doctrinal innecesaria.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'their territory' a 'its territory' por concordancia con 'Israel'. En español se reflejó como 'su territorio', concordando naturalmente con el sujeto singular 'Israel'. No se introdujeron cambios adicionales de sentido frente al audit trail inglés; el texto español sigue la lectura principal hebrea y conserva la alternativa interpretativa sobre 'amorreos' en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa 'filisteos' y 'amorreos' como etnónimos estables y de registro bíblico.
  - La construcción 'de mano de' preserva el modismo hebreo sin volverlo opaco en español.
  - '''Su territorio'' se eligió por claridad y concordancia con el sujeto singular ''Israel''.'
