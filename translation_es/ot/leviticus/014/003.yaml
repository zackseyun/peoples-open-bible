translation:
  language: es
  text: El sacerdote saldrá a un lugar fuera del campamento, y el sacerdote lo examinará; y he aquí, la afección[a] de lepra ha sanado en la persona con la enfermedad de la piel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, 'la lepra' o 'la llaga de la lepra'. El hebreo נֶגַע הַצָּרַעַת puede referirse más ampliamente a una afección cutánea/ritual y no necesariamente a la lepra moderna.
    reason: alternative_reading
  - marker: b
    text: Heb. 'en el afectado por צָרַעַת'. El término puede describir de manera más amplia a una persona con una enfermedad de la piel que a un 'leproso' en sentido médico moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: shall go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - deberá salir
  - irá
  lexicon: HALOT
  rationale: En contexto legal-prescriptivo, el imperfecto hebreo con וְ expresa acción ordenada; en español, el futuro simple transmite bien esa obligación/proyección normativa sin sonar forzado.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: כהן en contexto cultual se refiere al sacerdote; 'sacerdote' es el equivalente natural y fiel en español. 'Presbítero' introduciría un término eclesiástico posterior y menos transparente.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: to a place outside the camp
  chosen_spanish: a un lugar fuera del campamento
  alternatives_spanish:
  - fuera del campamento
  - al exterior del campamento
  lexicon: HALOT
  rationale: La combinación de dirección y ubicación se expresa bien con 'a un lugar fuera del campamento', que conserva el valor direccional de אֶל y la noción locativa de מִחוּץ.
- source_word: וְרָאָה
  english_pob_choice: shall examine him
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo inspeccionará
  lexicon: HALOT
  rationale: Aunque literalmente es 'ver', en esta legislación sacerdotal el verbo implica una inspección evaluativa. 'Examinar' comunica mejor la función ritual-jurídica del acto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y, he aquí
  - y verá que
  lexicon: HALOT
  rationale: '''He aquí'' conserva el matiz de descubrimiento/constatación del hebreo, sin reducirlo a una simple condicionalidad. En español mantiene dignidad y claridad.'
- source_word: נִרְפָּא
  english_pob_choice: has been healed
  chosen_spanish: ha sanado
  alternatives_spanish:
  - ha sido sanada
  - se ha curado
  lexicon: HALOT
  rationale: El nifal tiene sentido resultativo/pasivo. 'Ha sanado' expresa el estado alcanzado y evita una formulación excesivamente clínica.
- source_word: נֶגַע הַצָּרַעַת
  english_pob_choice: the disease of leprosy
  chosen_spanish: la llaga de la lepra
  alternatives_spanish:
  - la afección de la lepra
  - la enfermedad de la lepra
  lexicon: HALOT
  rationale: נֶגַע puede ser 'llaga', 'plaga' o 'afección'; aquí 'llaga' preserva la materialidad visible de la lesión y armoniza con el campo semántico ritual. 'Lepra' sigue el uso tradicional documentado en el POB inglés, con la reserva médica ya señalada en la nota.
- source_word: מִן הַצָּרוּעַ
  english_pob_choice: in the one with the skin disease
  chosen_spanish: en el que tenía la afección de la piel
  alternatives_spanish:
  - del afligido
  - en el leproso
  lexicon: HALOT
  rationale: מן marca separación/origen respecto de la persona afectada; el español 'en el que tenía' reproduce de forma natural el resultado de la curación visible sobre esa persona, evitando el tecnicismo engañoso de 'leproso' como diagnóstico moderno.
theological_decisions:
- issue: Alcance de צָרַעַת / צָרוּעַ
  english_pob_reading: skin disease / one with the skin disease, with a note preserving traditional 'leprosy' language
  chosen_spanish_reading: afección de la piel / el que tenía la afección de la piel, con nota sobre la lectura tradicional 'lepra'
  alternative_spanish_readings:
  - lepra / leproso
  - enfermedad de la piel / persona afligida
  rationale: El hebreo describe una condición ritual y cutánea más amplia que la lepra moderna (en sentido clínico). Mantener una expresión descriptiva evita anacronismos, mientras que la nota preserva la lectura tradicional por familiaridad del lector.
  doctrine_reference: Principio de primacía del texto fuente y de no imponer equivalencias médicas posteriores al término bíblico.
- issue: Valor de וְהִנֵּה
  english_pob_reading: and behold
  chosen_spanish_reading: y he aquí
  alternative_spanish_readings:
  - y mira
  - y resulta que
  rationale: La partícula introduce una constatación ante lo visto por el sacerdote; 'y he aquí' conserva el tono de descubrimiento textual sin convertirla en una mera subordinada condicional.
  doctrine_reference: Atención al valor discursivo de las partículas hebreas en narrativa legal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB inglés, que revirtió una condicional implícita a una constatación con וְהִנֵּה y prefirió una formulación más literal para נֶגַע הַצָּרַעַת. La versión española refleja esa misma decisión: ''y he aquí'' y ''la llaga de la lepra'' en lugar de una paráfrasis más general.'
  spanish_consistency_notes:
  - Se usa 'sacerdote' para כֹּהֵן en todo el pasaje, conforme al registro cultual.
  - '''He aquí'' se conserva como equivalente de וְהִנֵּה para mantener el giro de constatación.'
  - '''Afección de la piel'' evita identificar sin matices la condición con lepra moderna, pero la nota conserva la tradición léxica.'
  - La cláusula final se entiende como estado resultante de sanidad respecto de la persona afectada, no como movimiento espacial literal.
