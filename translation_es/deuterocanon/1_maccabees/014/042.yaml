lexical_decisions:
- source_word: στρατηγόν
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - general
  - gobernador
  lexicon: LSJ
  rationale: στρατηγός designa aquí a un jefe militar o dirigente; en español, «comandante» conserva el valor de mando sin imponer un rango moderno específico como «general».
- source_word: μέλῃ
  english_pob_choice: should take thought for
  chosen_spanish: tuviera cuidado de
  alternatives_spanish:
  - se preocupara por
  - atendiera a
  lexicon: LSJ
  rationale: μέλω expresa cuidado o preocupación. «Tuviera cuidado de» reproduce bien el matiz de atención responsable en un registro formal y claro en español.
- source_word: τῶν ἁγίων
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - las cosas santas
  - el lugar santo
  lexicon: LSJ
  rationale: El griego transmitido es difícil; la revisión inglesa optó por «sanctuary». En español, «santuario» es la equivalencia natural y conserva la referencia sagrada sin sobreprecisar el referente textual.
- source_word: καθιστάναι
  english_pob_choice: appoint men over
  chosen_spanish: estableciera hombres sobre
  alternatives_spanish:
  - pusiera hombres sobre
  - nombrara hombres sobre
  lexicon: LSJ
  rationale: El infinitivo aquí tiene sentido administrativo de nombrar o poner a cargo. «Estableciera hombres sobre» conserva la estructura formal del decreto y la idea de designación.
- source_word: τῶν ἔργων
  english_pob_choice: their works
  chosen_spanish: sus trabajos
  alternatives_spanish:
  - sus asuntos
  - sus tareas
  lexicon: LSJ
  rationale: ἔργα puede significar obras, trabajos o asuntos según el contexto. «Trabajos» mantiene la cercanía léxica al griego y funciona de manera comprensible en una lista administrativa.
- source_word: χώρας
  english_pob_choice: the country
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: LSJ
  rationale: χώρα puede referirse a tierra, territorio o región. «La tierra» evita el anacronismo político de «país» y sigue de cerca el valor geográfico-político del término.
- source_word: ὅπλων
  english_pob_choice: the weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - los armamentos
  lexicon: LSJ
  rationale: ὅπλα son armas o pertrechos militares. «Armas» es la equivalencia más directa y natural en español.
- source_word: ὀχυρωμάτων
  english_pob_choice: the strongholds
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los baluartes
  - los lugares fortificados
  lexicon: LSJ
  rationale: ὀχυρώματα son lugares fortificados o fortificaciones. «Fortalezas» conserva el sentido militar y es idiomático en español.
theological_decisions:
- issue: Término difícil τῶν ἁγίων en el texto griego transmitido
  english_pob_reading: Rendered broadly as 'the sanctuary' in the main text, with a note that the Greek wording is difficult
  chosen_spanish_reading: «el santuario» en el texto principal, con nota sobre la dificultad del griego
  alternative_spanish_readings:
  - «las cosas santas»
  - «el lugar santo»
  rationale: No se debe resolver artificialmente una dificultad textual que el propio audit trail señala. «Santuario» sigue la revisión inglesa y ofrece una solución clara sin borrar la tensión del texto transmitido.
  doctrine_reference: Primacía del texto fuente y preservación de la dificultad textual; no forzar una precisión no asegurada por el griego.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió de «the holy things» a «the sanctuary» para reflejar mejor τῶν ἁγίων y hacer más natural el inglés formal. La redacción española sigue esa revisión en el texto principal, pero conserva en nota las alternativas relacionadas para no ocultar la dificultad textual del griego transmitido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «santuario» en consonancia con la revisión inglesa y con la ambigüedad del griego, evitando una paráfrasis más interpretativa.
  - «Comandante» y «fortalezas» mantienen el tono administrativo-militar del pasaje.
  - «Armas» y «tierra» se prefirieron por claridad natural en español sin perder el campo semántico original.
