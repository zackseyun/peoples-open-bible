  yaml_path: translation/ot/numbers/014/009.yaml
  text: Only[a], do not rebel against Yahweh. And do not fear the people of the land, for they are our bread; their protection has departed from over them, and Yahweh is with us[b]. Do not fear them.
  footnotes:
  - marker: a
    text: Or, 'for they are our food.' The Hebrew says literally, 'they are our bread,' a metaphor for easy conquest or being consumed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'their shadow has departed from over them.' Here 'shadow' likely refers to protection or shelter.
    reason: lexical_alternative
