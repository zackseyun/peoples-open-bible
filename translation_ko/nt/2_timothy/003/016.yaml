source:
  edition: SBLGNT
  text: πᾶσα γραφὴ θεόπνευστος καὶ ὠφέλιμος πρὸς διδασκαλίαν, πρὸς ⸀ἐλεγμόν, πρὸς ἐπανόρθωσιν, πρὸς παιδείαν τὴν ἐν δικαιοσύνῃ,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/016.yaml
  text: Every Scripture is God-breathed and profitable for teaching, for reproof, for correction, and for training in righteousness.
translation:
  language: ko
  text: 모든 성경은 하나님의 영감으로 된 것이며[a], 가르치고[b] 책망하고 바로잡고 의로 훈련하는 데에 유익합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님이 숨을 불어넣으신 것이며」. 헬라어 θεόπνευστος는 「하나님의 숨(πνεῦμα)이 깃든」을 본의로 한다. 직역의 무게를 살리는 표현이다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 πᾶσα γραφή는 「모든 성경」(집합적)으로도, 「성경의 모든 부분」(분배적)으로도 읽을 수 있다. 두 가지 의미를 모두 포함한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα γραφὴ
  english_pob_choice: Every Scripture
  chosen_korean: 모든 성경
  alternatives_korean:
  - 성경 전체
  - 성경의 모든 부분
  lexicon: BDAG
  rationale: πᾶσα는 집합적(「모든」)과 분배적(「각각의·매 ~마다」) 모두 가능. 한국어 「모든」은 두 의미를 함께 담을 수 있어 가장 적합하다. 가능성은 각주에 둔다.
- source_word: θεόπνευστος
  english_pob_choice: God-breathed
  chosen_korean: 하나님의 영감으로 된 것
  alternatives_korean:
  - 하나님이 숨을 불어넣으신 것
  - 하나님의 호흡이 깃든 것
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 「하나님의 영감으로 된」을 본문에 채택. 한국 성서 전통에서 가장 익숙하면서도 신학적 무게를 담는 표현이다. 직역에 가까운 「하나님이 숨을 불어넣으신」은 각주에 두어 θεόπνευστος의 어원(θεός+πνέω)을 보존한다.
- source_word: ὠφέλιμος
  english_pob_choice: profitable
  chosen_korean: 유익합니다
  alternatives_korean:
  - 도움이 됩니다
  - 쓸모 있습니다
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 「유익한」으로 통일. 한국 성서 전통과 일치한다.
- source_word: πρὸς διδασκαλίαν, πρὸς ἐλεγμόν, πρὸς ἐπανόρθωσιν, πρὸς παιδείαν τὴν ἐν δικαιοσύνῃ
  english_pob_choice: for teaching, for reproof, for correction, and for training in righteousness
  chosen_korean: 가르치고 책망하고 바로잡고 의로 훈련하는 데에
  alternatives_korean:
  - 가르침과 책망과 교정과 의로 훈육하는 일에
  - 교훈과 책망과 바로잡음과 의로 훈련하는 데에
  lexicon: BDAG
  rationale: πρός + 대격이 「~을 위해·~에」의 네 가지 용도를 가리키는 운율적 짝을 이룬다. 한국어로는 명사 나열보다 동사 나열(「가르치고 책망하고 바로잡고 훈련하는」)이 더 자연스러우며, 본문의 능동적 사역 흐름을 살린다. παιδεία ἐν δικαιοσύνῃ는 「의로 훈련하는」으로 옮겨 정의 영역에서의 훈육 의미를 분명히 드러낸다.
theological_decisions:
- issue: θεόπνευστος(하나님의 영감)의 표현 — 직역과 전통의 균형
  chosen_reading: 모든 성경은 하나님의 영감으로 된 것이며
  alternative_readings:
  - 모든 성경은 하나님이 숨을 불어넣으신 것이며
  - 모든 성경은 하나님의 호흡이 깃든 것이며
  rationale: θεόπνευστος는 신약에 한 번만 등장하는 합성어(θεός+πνέω)로, 직역하면 「하나님이 숨을 불어넣으신」이다. 한국 성서 전통의 「하나님의 영감으로 된」은 의미를 잘 담으면서도 본문의 신학적 권위를 약화시키지 않으므로 본문으로 채택한다. 직역 「하나님이 숨을 불어넣으신」은 각주에 두어 어원의 시각적 무게(창세기 2:7의 생기 불어넣음 이미지)를 잃지 않도록 한다. 본 절은 πᾶσα γραφή(모든 성경)와 결합되어 성경 전체의 신적 기원을 천명하는 핵심 본문이므로, 매끄럽게 다듬지 않고 두 가지 표현을 함께 보존한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological force; north-star — true and powerful meaning'
