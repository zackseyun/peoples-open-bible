translation:
  language: es
  text: La recompensa de la humildad y del temor de Yahvé[a] es riqueza, honor y vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «La recompensa de la humildad es el temor de Yahvé, riqueza, honor y vida».'
    reason: alternative_reading
lexical_decisions:
- source_word: עֵקֶב
  english_pob_choice: reward of
  chosen_spanish: recompensa de
  alternatives_spanish:
  - resultado de
  - consecuencia de
  - a causa de
  lexicon: HALOT
  rationale: El hebreo puede expresar consecuencia, resultado o recompensa. En este proverbio, la lectura proverbial de un resultado benéfico se comunica de manera natural con «recompensa de», preservando el valor resultativo sin sonar forzado en español.
- source_word: עֲנָוָה
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - mansedumbre
  - bajeza
  lexicon: HALOT
  rationale: El sustantivo denota humildad o bajeza. «Humildad» es el equivalente más claro y directo en español, y mantiene el valor ético sapiencial del término.
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el respeto por Yahvé
  - la reverencia por Yahvé
  lexicon: HALOT
  rationale: La expresión sapiencial habitual en hebreo transmite temor reverente y lealtad pactal. «Temor de Yahvé» conserva el idioma bíblico tradicional sin diluir su fuerza teológica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según el criterio del proyecto. «Yahvé» preserva el Tetragrámaton como nombre, no como título.
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - abundancia
  lexicon: HALOT
  rationale: El término se refiere a abundancia material. «Riqueza» es natural en español y encaja bien con el estilo conciso de los proverbios.
- source_word: כָּבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - estima
  lexicon: HALOT
  rationale: En este contexto sapiencial, el sentido es prestigio o estima social, no la gloria divina. «Honor» reproduce bien ese valor en español.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida larga
  - vivir
  lexicon: HALOT
  rationale: Aunque la forma es plural, el sustantivo funciona aquí como «vida» abstracta. No se añade «larga» porque el hebreo no lo expresa de forma explícita.
theological_decisions:
- issue: Relación sintáctica entre «humildad» y «el temor de Yahvé»
  english_pob_reading: Treat both nouns together as the qualities whose outcome is wealth, honor, and life.
  chosen_spanish_reading: Tomar «la humildad y el temor de Yahvé» como cualidades asociadas cuyo resultado es riqueza, honor y vida.
  alternative_spanish_readings:
  - «La recompensa de la humildad es el temor de Yahvé, riqueza, honor y vida.»
  rationale: 'El hebreo admite cierta compresión sintáctica. La construcción principal en español sigue la lectura más natural y proverbial: ambas cualidades se presentan juntas como fuente del trío final de bendiciones. Se preserva la alternativa en nota para no borrar la ambigüedad real.'
  doctrine_reference: Preservar ambigüedad sintáctica genuina; no resolverla dogmáticamente cuando el hebreo permite más de una lectura.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el rastro auditado inglés. Se mantuvo la lectura principal de recompensa/resultados benéficos y se preservó en nota la alternativa apposicional reconocida como menos probable en el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se evitó «SEÑOR» como sustituto tipográfico.
  - «Temor de Yahvé» conserva la fórmula sapiencial bíblica sin suavizarla a «reverencia».
  - «Vida» se deja sin adjetivar, ya que el hebreo no especifica «larga».
