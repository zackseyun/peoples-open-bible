  - severity: medium
    issue: «en retorno por» suena poco natural en español
    rationale: Aunque intenta reflejar ἀντί como reciprocidad retributiva, la expresión no es idiomática. «En pago por» mantiene mejor la idea de correspondencia punitiva y suena más bíblico-natural.
  - severity: high
    issue: Marcador de nota inválido en «animales[viles]»
    rationale: El formato requerido exige marcadores como [a], [b], etc., y todo marcador debe corresponder exactamente a una nota. «[viles]» no es un marcador válido y no tiene nota asociada.
