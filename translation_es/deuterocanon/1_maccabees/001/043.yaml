translation:
  language: es
  text: Y muchos de Israel aprobaron su culto[a], y sacrificaron a los ídolos y profanaron el sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aprobaban su culto», «se complacían en su culto» o «consentían en su culto».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ ἀπὸ Ἰσραήλ
  english_pob_choice: many from Israel
  chosen_spanish: muchos de Israel
  alternatives_spanish:
  - muchos israelitas
  - muchos procedentes de Israel
  lexicon: LSJ
  rationale: La construcción ἀπό con un nombre de pueblo expresa procedencia o pertenencia dentro del grupo. En español, «muchos de Israel» conserva esa relación de origen/pertenencia y sigue siendo natural.
- source_word: ηὐδόκησαν
  english_pob_choice: approved of
  chosen_spanish: aprobaron
  alternatives_spanish:
  - se complacieron en
  - estuvieron de acuerdo con
  - consintieron en
  lexicon: LSJ
  rationale: El verbo expresa aceptación o aprobación voluntaria. «Aprobaron» comunica bien ese asentimiento en este contexto de apostasía sin introducir una carga emocional que el griego no exige.
- source_word: τῇ λατρίᾳ αὐτοῦ
  english_pob_choice: his worship
  chosen_spanish: su culto
  alternatives_spanish:
  - su adoración
  - su servicio religioso
  - su culto religioso
  lexicon: LSJ
  rationale: λατρεία aquí es observancia/culto religioso. «Culto» mantiene el sentido cultual de la frase y refleja mejor el sistema religioso impuesto que «adoración», que en español puede sonar más general o devocional.
- source_word: ἔθυσαν
  english_pob_choice: sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron sacrificios
  lexicon: LSJ
  rationale: El aoristo indica el acto sacrificial. «Sacrificaron» es directo, preciso y conserva el contenido ritual.
- source_word: τοῖς εἰδώλοις
  english_pob_choice: to the idols
  chosen_spanish: a los ídolos
  alternatives_spanish:
  - ante los ídolos
  - a los idolos
  lexicon: LSJ
  rationale: εἴδωλον significa «ídolo» en este contexto. La preposición española «a» reproduce con naturalidad el dativo de destino/relación en la ofrenda sacrificial.
- source_word: ἐβεβήλωσαν
  english_pob_choice: profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - desecraron
  - contaminaron
  lexicon: LSJ
  rationale: El verbo expresa hacer común o violar lo sagrado. «Profanaron» es el equivalente más claro y eclesiásticamente reconocible en español sin perder el matiz de sacrilegio.
- source_word: τὸ σάββατον
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el Sabbat
  - el día de reposo
  lexicon: LSJ
  rationale: En español bíblico amplio, «sábado» comunica de manera inmediata el día sagrado judío. Mantiene la referencia al día semanal y es más transparente que una transliteración.
theological_decisions:
- issue: λατρεία aplicada al sistema religioso impuesto por el rey
  english_pob_reading: his worship
  chosen_spanish_reading: su culto
  alternative_spanish_readings:
  - su adoración
  - su servicio religioso
  rationale: La expresión no describe mera devoción privada, sino una práctica cultual impuesta. «Su culto» conserva ese alcance institucional y religioso, y evita reducirlo a una emoción o a una acción individual.
  doctrine_reference: 'Translation philosophy: consistency of cultic terminology where the source indicates public religious observance.'
- issue: Interpretación de τὸ σάββατον en contexto judío
  english_pob_reading: the Sabbath
  chosen_spanish_reading: el sábado
  alternative_spanish_readings:
  - el Sabbat
  - el día de reposo
  rationale: El contexto judío exige referir el día santo establecido. «El sábado» es la forma más natural en español; sigue siendo reconocible como el día de reposo judío sin necesidad de perífrasis.
  doctrine_reference: Consistencia de términos bíblicos judíos en español; claridad para lectores de iglesia amplia.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego y la decisión inglesa auditada, manteniendo las tres acciones encadenadas: aprobación del culto impuesto, sacrificio a los ídolos y profanación del sábado. Se preserva la ambigüedad de ηὐδόκησαν como aprobación/consentimiento, sin suavizarla más allá de lo que permite el contexto.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según corresponda, pero aquí no aparece ninguna de esas formas.
  - Se usa «sábado» para σάββατον por claridad y naturalidad en español bíblico.
  - «Culto» se emplea para λατρεία por su valor religioso-cultual; no se reemplaza por «adoración» para evitar perder el matiz institucional.
