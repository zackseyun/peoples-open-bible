  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay un problema de anclaje de nota: la marca [a] está puesta en ''morirá'' aunque la nota explica la intensificación de ''ciertamente irá al exilio''. Además, ''Amos'' debería ajustarse a la forma española usual ''Amós''. La frase revisada suena más natural y más fiel al hebreo y al POB: ''Israel ciertamente irá al exilio de su tierra''.'
  glossary_alignment: No hay términos del glosario principal especialmente conflictivos aquí. El nombre propio debe seguir el uso español habitual 'Amós'. La decisión 'a espada' es aceptable. Conviene mantener 'Israel' como entidad colectiva con 'su tierra'.
  issues:
  - severity: high
    issue: La nota [a] está anclada en la palabra equivocada.
    rationale: La nota explica el infinitivo absoluto con verbo finito de גָּלֹה יִגְלֶה, no el verbo 'morirá'. Debe anclarse en la frase de exilio.
