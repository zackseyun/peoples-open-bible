id: 2TH.3.11
reference: 2 Thessalonians 3:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀκούομεν γάρ τινας περιπατοῦντας ἐν ὑμῖν ἀτάκτως, μηδὲν ἐργαζομένους ἀλλὰ περιεργαζομένους·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/011.yaml
  text: For we hear that some among you are walking disorderly[a], doing no work at all[b], but meddling.
translation:
  language: ko
  text: 우리는 여러분 가운데 어떤 자들이 무질서하게 행하며[a] 아무 일도 하지 않고 도리어 남의 일에 참견한다고[b] 듣고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「게으르게 살고」. 헬라어 ἀτάκτως는 본 정황에서 게으름의 함의를 가진다.
    reason: lexical_alternative
  - marker: b
    text: 전통적으로 「참견꾼」. 헬라어는 어휘 유희를 사용 — 「일하지(ἐργάζομαι) 않고 도리어 (일에) 둘러서 일하다(περιεργάζομαι)」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούομεν
  english_pob_choice: we hear
  chosen_korean: 듣고 있습니다
  alternatives_korean:
  - 듣습니다
  lexicon: BDAG
  rationale: 현재의 진행적 소식 청취를 자연스럽게 표현.
- source_word: τινας
  english_pob_choice: some
  chosen_korean: 어떤 자들이
  alternatives_korean:
  - 일부 사람들이
  - 몇몇이
  lexicon: BDAG
  rationale: 회중 내 미명시 일부를 가리킴.
- source_word: περιπατοῦντας
  english_pob_choice: are walking
  chosen_korean: 행하며
  alternatives_korean:
  - 살아가며
  - 지내며
  lexicon: BDAG
  rationale: 「행하다」의 한국 성경 비유 보존.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_korean: 여러분 가운데
  alternatives_korean:
  - 여러분 사이에
  lexicon: BDAG
  rationale: 공동체 내 위치.
- source_word: ἀτάκτως
  english_pob_choice: disorderly
  chosen_korean: 무질서하게
  alternatives_korean:
  - 게으르게
  - 분수 없이
  lexicon: BDAG
  rationale: 3:6, 3:7과 어휘적 일관. 정황적 게으름 함의는 각주.
- source_word: μηδὲν ἐργαζομένους
  english_pob_choice: doing no work at all
  chosen_korean: 아무 일도 하지 않고
  alternatives_korean:
  - 전혀 일하지 않고
  - 어떤 일도 하지 않고
  lexicon: BDAG
  rationale: 강조적 μηδέν을 「아무 ~ 도」로 자연스럽게.
- source_word: περιεργαζομένους
  english_pob_choice: meddling
  chosen_korean: 남의 일에 참견한다
  alternatives_korean:
  - 쓸데없는 일에 분주하다
  - 일을 이리저리 만지작거린다
  - 참견꾼이 된다
  lexicon: BDAG
  rationale: 「일하지 않고 도리어 (남의) 일에 참견하는」의 어휘 유희를 한국어로 「남의 일에 참견하다」로 자연스럽게 살린다.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_korean: 도리어
  alternatives_korean:
  - 오히려
  lexicon: BDAG
  rationale: 강한 대조.
