id: JOS.17.11
reference: Joshua 17:11
source:
  edition: WLC
  text: וַ/יְהִ֨י לִ/מְנַשֶּׁ֜ה בְּ/יִשָּׂשכָ֣ר וּ/בְ/אָשֵׁ֗ר בֵּית שְׁאָ֣ן וּ֠/בְנוֹתֶי/הָ וְ/יִבְלְעָ֨ם וּ/בְנוֹתֶ֜י/הָ וְֽ/אֶת יֹשְׁבֵ֧י דֹ֣אר וּ/בְנוֹתֶ֗י/הָ וְ/יֹשְׁבֵ֤י עֵֽין דֹּר֙ וּ/בְנֹתֶ֔י/הָ וְ/יֹשְׁבֵ֤י תַעְנַךְ֙ וּ/בְנֹתֶ֔י/הָ וְ/יֹשְׁבֵ֥י מְגִדּ֖וֹ וּ/בְנוֹתֶ֑י/הָ שְׁלֹ֖שֶׁת הַ/נָּֽפֶת־־־׃
translation:
  text: And Manasseh had in Issachar and in Asher Beth-shean and its daughter villages[a], and Ibleam and its daughter villages, and the inhabitants of Dor and its daughter villages, and the inhabitants of En-dor and its daughter villages, and the inhabitants of Taanach and its daughter villages[b], and the inhabitants of Megiddo and its daughter villages—the three regions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the three regions' or 'the three districts.' The Hebrew phrase is difficult and may refer to a geographical or administrative grouping.
    reason: lexical_alternative
  - marker: b
    text: Literally 'its daughters,' a Hebrew idiom for a town's dependent villages or settlements.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי לִמְנַשֶּׁה
  chosen: And Manasseh had
  alternatives:
  - And it belonged to Manasseh
  - And there was for Manasseh
  lexicon: HALOT
  rationale: The idiom ויהי ל plus a tribal name introduces possession/allotment. 'Manasseh had' is natural English while preserving the sense that these places belonged to Manasseh's allotment.
- source_word: בְּיִשָּׂשכָר וּבְאָשֵׁר
  chosen: in Issachar and in Asher
  alternatives:
  - within Issachar and Asher
  - among Issachar and Asher
  lexicon: HALOT
  rationale: The preposition ב marks location within the territories of these tribes. Repeating 'in' keeps the territorial sense clear.
- source_word: בֵּית שְׁאָן
  chosen: Beth-shean
  alternatives:
  - Beth Shan
  - Beit-shean
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; names are transliterated rather than translated.
- source_word: בְנוֹתֶיהָ
  chosen: its daughter villages
  alternatives:
  - its towns
  - its dependent settlements
  - its villages
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for dependent settlements surrounding a principal city. 'Daughter villages' preserves the metaphor and clarifies the referent in readable English.
- source_word: יִבְלְעָם
  chosen: Ibleam
  alternatives:
  - Jibleam
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אֶת יֹשְׁבֵי דֹאר
  chosen: the inhabitants of Dor
  alternatives:
  - those dwelling in Dor
  - the residents of Dor
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial form meaning 'inhabitants/dwellers of.' 'Inhabitants of Dor' is concise and idiomatic.
- source_word: עֵין דֹּר
  chosen: En-dor
  alternatives:
  - Endor
  lexicon: HALOT
  rationale: Standard transliteration of the place name, preserving the compound form.
- source_word: תַעְנַךְ
  chosen: Taanach
  alternatives:
  - Ta'anach
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: מְגִדּוֹ
  chosen: Megiddo
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: שְׁלֹשֶׁת הַנָּפֶת
  chosen: the three heights
  alternatives:
  - the three regions
  - the three districts
  lexicon: HALOT
  rationale: נפת here is a topographical/administrative term. In this context, likely referring to the three elevated ridge districts associated with the listed sites. 'Heights' best reflects the probable geographical sense while remaining concise. Because 'regions/districts' is also possible, that alternative is preserved in a footnote.
