translation:
  language: es
  text: Pero alégrense y gócense para siempre en lo que yo estoy creando; porque he aquí[a], yo estoy creando a Jerusalén como regocijo, y a su pueblo como alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy creando a Jerusalén para regocijo, y a su pueblo para alegría».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Más bien
  - Sino
  lexicon: HALOT
  rationale: La combinación introduce contraste con lo anterior; «Pero» expresa bien la oposición en español sin forzar una reconstrucción más pesada.
- source_word: שִׂישׂוּ
  english_pob_choice: be glad
  chosen_spanish: alégrense
  alternatives_spanish:
  - gócense
  - regocíjense
  lexicon: HALOT
  rationale: El verbo expresa júbilo/exultación. «Alégrense» suena natural y digno; mantiene la primera mitad del doblete de gozo.
- source_word: וְגִילוּ
  english_pob_choice: and rejoice
  chosen_spanish: y gócense
  alternatives_spanish:
  - y regocíjense
  - y exulten
  lexicon: HALOT
  rationale: Se distingue del verbo anterior para preservar el paralelismo hebreo y la intensificación poética mediante dos verbos cercanos pero no idénticos.
- source_word: עֲדֵי עַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Es un modismo de duración indefinida y continua; «para siempre» es la equivalencia natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר אֲנִי בוֹרֵא
  english_pob_choice: in what I am creating
  chosen_spanish: en lo que yo estoy creando
  alternatives_spanish:
  - por lo que yo estoy creando
  - a causa de lo que yo estoy creando
  lexicon: HALOT
  rationale: El relativo identifica el ámbito/ocasion del regocijo. «En lo que» reproduce bien la construcción del inglés auditado y conserva el participio en progreso.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - mirad
  lexicon: HALOT
  rationale: Es una partícula deíctica y solemne. En español, «miren» comunica la llamada atenta y profética sin sonar arcaizante como «he aquí».
- source_word: בוֹרֵא
  english_pob_choice: I am creating
  chosen_spanish: estoy creando
  alternatives_spanish:
  - creo
  - voy a crear
  lexicon: HALOT
  rationale: El participio transmite acción en curso o inminente. «Estoy creando» preserva ese aspecto y la repetición enfática del verbo.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio estándar en español; mantiene la forma tradicional y ampliamente inteligible.
- source_word: גִּילָה
  english_pob_choice: as rejoicing
  chosen_spanish: como gozo
  alternatives_spanish:
  - como regocijo
  - para gozo
  lexicon: HALOT
  rationale: El sustantivo funciona predicativamente/resultativamente con ברא. «Como gozo» conserva la relación léxica con los verbos de regocijo del versículo, sin cerrar la alternativa de lectura final.
- source_word: וְעַמָּהּ
  english_pob_choice: and her people
  chosen_spanish: y a su pueblo
  alternatives_spanish:
  - y a su gente
  - y a su población
  lexicon: HALOT
  rationale: El sufijo femenino retoma a Jerusalén como ciudad personificada. «Su pueblo» mantiene esa personificación y la sintaxis castellana con objeto directo marcado por «a».
- source_word: מָשׂוֹשׂ
  english_pob_choice: as joy
  chosen_spanish: como alegría
  alternatives_spanish:
  - como gozo
  - como regocijo
  lexicon: HALOT
  rationale: El sustantivo completa el paralelismo con גִּילָה. «Alegría» es natural en español y conserva la idea predicativa, aunque se mantiene también la opción alternativa de lectura final.
theological_decisions:
- issue: Valor predicativo o final de los sustantivos גִּילָה y מָשׂוֹשׂ tras ברא
  english_pob_reading: 'Jerusalem as rejoicing, and her people as joy; footnote: Or, ''I am creating Jerusalem for rejoicing, and her people for gladness.'''
  chosen_spanish_reading: Jerusalén como gozo, y a su pueblo como alegría
  alternative_spanish_readings:
  - Jerusalén para gozo, y a su pueblo para alegría
  - Jerusalén como regocijo, y a su pueblo como gozo
  rationale: El hebreo admite una lectura predicativa/resultativa o una lectura final/purpose. El texto principal conserva la imagen de identidad transformada («como»), mientras la nota ofrece la lectura final para no resolver artificialmente la tensión semántica.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica y literaria sin simplificarla'
- issue: Partícula deíctica divina הִנְנִי y su tono profético
  english_pob_reading: for behold
  chosen_spanish_reading: porque, miren
  alternative_spanish_readings:
  - porque, he aquí
  - porque, mirad
  rationale: La fórmula anuncia solemnemente una acción divina. «Miren» preserva el carácter exhortativo/deíctico en un español actual; la coma mantiene la transición profética.
  doctrine_reference: Estilo profético y discurso divino en Isaías
translation_notes:
  revision_awareness: Concordé con el audit trail inglés en la distinción de los dos verbos de gozo, el participio presente de ברא, y la posibilidad de leer los sustantivos finales como predicativos o finales. No se detectaron revisiones posteriores que requirieran ajuste; la lectura quedó estable en el último pase.
  spanish_consistency_notes:
  - Usé «Yahvé» por defecto solo cuando aparece el nombre divino explícito; este versículo no lo contiene.
  - Mantengo «Jerusalén» como nombre propio en español, siguiendo la forma establecida y legible.
  - Conservé la personificación de la ciudad con el posesivo femenino «su» en «su pueblo», alineado con el sufijo hebreo.
  - No introduje terminología eclesiástica tradicional ajena al hebreo; el vocabulario de gozo se mantiene en una pareja verbal diferenciada.
