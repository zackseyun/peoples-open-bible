translation:
  language: es
  text: No castigaré a sus hijas cuando se prostituyan, ni a sus nueras cuando cometan adulterio; porque ellos mismos se apartan[a] con prostitutas y sacrifican con prostitutas cultuales[b], y un pueblo sin entendimiento cae en ruina[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se relacionan con prostitutas». El verbo hebreo, literalmente, significa «se separan» o «se apartan».
    reason: lexical_alternative
  - marker: b
    text: O «prostitutas del templo». El hebreo se refiere a mujeres asociadas con práctica sexual cultual ilícita.
    reason: lexical_alternative
  - marker: c
    text: El verbo final es raro y puede significar «ser derribado», «ser confundido» o, de manera más general, «caer en ruina».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְק֨וֹד
  english_pob_choice: I will not punish
  chosen_spanish: No castigaré
  alternatives_spanish:
  - No visitaré
  - No pediré cuentas
  lexicon: HALOT
  rationale: En un contexto judicial, פקד con עַל expresa atender para castigo o rendir cuentas. «Castigaré» comunica de forma natural en español moderno el sentido jurídico que el inglés POB ya había fijado.
- source_word: בְּנוֹתֵיכֶם
  english_pob_choice: your daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - vuestras hijas
  - sus muchachas
  lexicon: HALOT
  rationale: Se conserva el parentesco directo y el posesivo plural del destinatario; «sus» funciona bien en español bíblico neutral cuando el contexto ya identifica a los oyentes.
- source_word: תִזְנֶינָה
  english_pob_choice: prostitute themselves
  chosen_spanish: se prostituyan
  alternatives_spanish:
  - cometan inmoralidad sexual
  - forniquen
  lexicon: HALOT
  rationale: זנה aquí designa conducta sexual ilícita y en Oseas suele mantener fuerza de prostitución. «Se prostituyan» conserva esa concreción sin arcaísmo.
- source_word: כַּלּוֹתֵיכֶם
  english_pob_choice: your daughters-in-law
  chosen_spanish: sus nueras
  alternatives_spanish:
  - sus desposadas
  - sus esposas de los hijos
  lexicon: HALOT
  rationale: כלה en este vínculo familiar se refiere a las esposas de los hijos, no simplemente a novias. «Nueras» es el equivalente claro y directo.
- source_word: תְנָאַפְנָה
  english_pob_choice: commit adultery
  chosen_spanish: cometan adulterio
  alternatives_spanish:
  - adulteren
  - sean adúlteras
  lexicon: HALOT
  rationale: נאף apunta específicamente a adulterio; «cometan adulterio» mantiene la precisión y la distinción respecto de זנה.
- source_word: יְפָרֵדוּ
  english_pob_choice: go apart
  chosen_spanish: se apartan
  alternatives_spanish:
  - se separan
  - se retiran
  lexicon: HALOT
  rationale: El verbo literalmente significa separarse o apartarse. «Se apartan» preserva la imagen verbal y deja abierta la alusión eufemística al irse con prostitutas.
- source_word: הַזֹּנוֹת
  english_pob_choice: prostitutes
  chosen_spanish: prostitutas
  alternatives_spanish:
  - rameras
  lexicon: HALOT
  rationale: Es el sentido básico del participio sustantivado; «prostitutas» mantiene claridad moderna y evita un lenguaje más cargado o anticuado.
- source_word: הַקְּדֵשׁוֹת
  english_pob_choice: cult prostitutes
  chosen_spanish: prostitutas cultuales
  alternatives_spanish:
  - prostitutas del culto
  - prostitutas de culto
  - prostitutas del templo
  lexicon: HALOT
  rationale: קדשות alude a mujeres vinculadas a práctica sexual ilícita en contexto cultual. «Cultuales» conserva el vínculo con el culto sin sobreespecificar el marco institucional.
- source_word: יְזַבֵּחוּ
  english_pob_choice: sacrifice
  chosen_spanish: sacrifican
  alternatives_spanish:
  - ofrecen sacrificios
  - sacrifican ofrendas
  lexicon: HALOT
  rationale: El verbo sacrificial básico se expresa naturalmente con un presente histórico/genericizado en español para el valor resultativo del contexto.
- source_word: וְעָם לֹא יָבִין
  english_pob_choice: and a people without understanding
  chosen_spanish: y un pueblo sin entendimiento
  alternatives_spanish:
  - y un pueblo que no entiende
  - y un pueblo sin discernimiento
  lexicon: HALOT
  rationale: El colectivo עם se rinde de modo genérico. «Sin entendimiento» refleja la fuerza de la negación del verbo y sigue de cerca la formulación del POB inglés.
- source_word: יִלָּבֵט
  english_pob_choice: comes to ruin
  chosen_spanish: se hunde
  alternatives_spanish:
  - cae en ruina
  - es derribado
  - perece
  lexicon: HALOT
  rationale: El verbo es raro y admite matices de ser derribado, confundido o caer en ruina. «Se hunde» comunica el resultado de colapso de forma natural en español, sin fijar una interpretación demasiado estrecha.
theological_decisions:
- issue: Si el verso exime o no a las hijas y nueras del juicio
  english_pob_reading: Dios no las castiga por separado porque los hombres participan también en la misma corrupción sexual y cultual.
  chosen_spanish_reading: Dios no castiga por separado a las hijas y nueras; la cláusula causal deja claro que los hombres mismos están implicados en la misma corrupción sexual y cultual.
  alternative_spanish_readings:
  - No castigo a las mujeres, sin más matiz sobre la conducta de los hombres.
  - Las mujeres quedan completamente exentas de juicio.
  rationale: 'La cláusula con כי explica la negativa: no es una absolución general de la culpa femenina, sino una denuncia compartida. La traducción conserva esa tensión sin suavizarla.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
- issue: Cómo traducir קְדֵשׁוֹת sin domesticar su carga cultual
  english_pob_reading: cult prostitutes
  chosen_spanish_reading: prostitutas cultuales
  alternative_spanish_readings:
  - prostitutas del templo
  - mujeres consagradas
  rationale: El término está ligado a inmoralidad sexual dentro de un marco de culto ilícito. «Cultuales» retiene el elemento cultual y evita imponer detalles institucionales que el hebreo no explicita.
  doctrine_reference: Primacía del dato del idioma original sobre la tradición eclesiástica de traducción.
translation_notes:
  revision_awareness: Se incorporó la revisión posterior del POB inglés que cambió la última cláusula de futuro («will come to ruin») a presente/resultativo («comes to ruin»). La versión española adopta un presente de resultado («se hunde») para reflejar ese ajuste sin perder la fuerza del cierre. También se respetó la distinción entre זנה y נאף, y entre prostitutas comunes y prostitutas cultuales.
  spanish_consistency_notes:
  - Se mantuvo Yahvé solo cuando el texto no lo exige aquí; este versículo no contiene el nombre divino.
  - Se preservó la distinción léxica entre «se prostituyan» (זנה) y «cometan adulterio» (נאף).
  - «Prostitutas cultuales» fue preferido sobre «del templo» para no forzar un detalle institucional no explicitado.
  - El cierre en presente («se hunde») sigue la última revisión inglesa y funciona como resultado general, no como cambio de tiempo narrativo.
