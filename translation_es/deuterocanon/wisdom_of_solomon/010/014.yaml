base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/010/014.yaml
  text: She went down with him into the pit[a], and in chains she did not abandon him, until she brought him the scepter of a kingdom and authority over those who had tyrannized him; she showed those who had accused him to be false[b], and gave him everlasting glory.
  footnotes:
