translation:
  language: es
  text: Estos también son proverbios de Salomón[a], que copiaron los hombres de Ezequías[b], rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «transcribieron» o «compilaron». El verbo hebreo probablemente se refiere a copiar estos proverbios en una forma recopilada.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hombres de Ezequías», probablemente miembros de la corte de Ezequías o funcionarios escribales.'
    reason: cultural_note
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: Marca continuidad o adición respecto de la colección precedente; «también» conserva esa fuerza de manera natural en español.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: HALOT
  rationale: El demostrativo introduce la colección que sigue; «estos» es directo y mantiene el referente plural sin añadir contenido.
- source_word: מִשְׁלֵי
  english_pob_choice: proverbs
  chosen_spanish: proverbios
  alternatives_spanish:
  - dichos
  - sentencias
  - máximas
  lexicon: HALOT
  rationale: En el contexto del libro, el término corresponde al género sapiencial de «proverbios»; es la equivalencia más estable y precisa.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Shelomó
  lexicon: nombre propio
  rationale: Nombre propio bíblico en forma española estándar y reconocible para lectura eclesial.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - los cuales
  lexicon: HALOT
  rationale: Introduce la cláusula relativa sobre los proverbios; «que» suena natural en español y conserva la relación sintáctica.
- source_word: הֶעְתִּיקוּ
  english_pob_choice: copied
  chosen_spanish: copiaron
  alternatives_spanish:
  - transcribieron
  - compilaron
  - trasladaron
  lexicon: HALOT
  rationale: El verbo sugiere copiar o transcribir proverbios en forma recopilada; «copiaron» preserva el sentido sin fijar más de lo que el hebreo exige.
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - los oficiales de
  - los servidores de
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente masculina plural; se conserva con «los hombres de» para respetar la forma y la observación de género del texto fuente.
- source_word: חִזְקִיָּה
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: nombre propio
  rationale: Forma española habitual del nombre del rey de Judá.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La cadena constructa identifica el oficio real de Ezequías; «rey de Judá» es la forma natural y precisa en español.
theological_decisions:
- issue: Expresión masculina אַנְשֵׁי חִזְקִיָּה
  english_pob_reading: the men of Hezekiah, likely referring to members of Hezekiah's court or scribal officials
  chosen_spanish_reading: los hombres de Ezequías, probablemente miembros de su corte o funcionarios de escriba
  alternative_spanish_readings:
  - los oficiales de Ezequías
  - los servidores de Ezequías
  rationale: Se mantiene la forma masculina explícita del hebreo, siguiendo la política de precisión de género. En nota se conserva la posible referencia funcional a la corte o al ámbito de escribas, sin reemplazar el léxico del texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor de הֶעְתִּיקוּ
  english_pob_reading: copied
  chosen_spanish_reading: copiaron
  alternative_spanish_readings:
  - transcribieron
  - compilaron
  rationale: La evidencia del audit trail indica que el verbo probablemente alude a copiar o transcribir proverbios a una colección. «Copiaron» refleja esa acción editorial sin cargarla con una interpretación más amplia.
  doctrine_reference: Lexical note on הֶעְתִּיקוּ in the English POB audit trail
translation_notes:
  revision_awareness: El pasaje coincide con el último pase de revisión sin cambios; el borrador sigue el acuerdo alto del control cruzado y conserva las decisiones léxicas y culturales del audit trail en español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece el nombre divino.
  - Se mantiene «proverbios» como término de género sapiencial, coherente con el libro.
  - Se conserva la forma masculina plural «los hombres de» para reflejar la estructura del hebreo.
  - La puntuación y el orden sintáctico están ajustados a español bíblico moderno, sin añadir contenido explicativo al texto principal.
