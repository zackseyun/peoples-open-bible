translation:
  language: es
  text: 'Micaía le dijo: «¿De dónde vienes?». Y él le dijo: «Soy levita de Belén, en Judá, y voy a vivir como forastero[a] dondequiera que encuentre un lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «a residir temporalmente». El verbo transmite la idea de vivir por un tiempo en condición de forastero o dependiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַיִן
  english_pob_choice: Where do you come from
  chosen_spanish: ¿De dónde vienes?
  alternatives_spanish:
  - ¿De dónde procede?
  - ¿De dónde eres?
  lexicon: HALOT
  rationale: La pregunta hebrea indaga el origen/procedencia. En español, «¿De dónde vienes?» es natural y conserva mejor el movimiento implícito que una formulación más estática.
- source_word: לֵוִי
  english_pob_choice: a Levite
  chosen_spanish: levita
  alternatives_spanish:
  - un levita
  - levítico
  lexicon: HALOT
  rationale: La autodesignación tribal/religiosa se expresa de forma natural en español con «levita». Se omite el artículo porque en discurso directo español puede sonar más conciso sin perder el sentido.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem in Judah
  chosen_spanish: de Belén de Judá
  alternatives_spanish:
  - de Belén en Judá
  - de Belén de Judá
  lexicon: HALOT
  rationale: La expresión señala la Belén situada en Judá. «De Belén de Judá» reproduce la relación geográfica de forma clara y idiomática en español.
- source_word: הֹלֵךְ
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me dirijo
  lexicon: HALOT
  rationale: El participio denota una acción en curso; «voy» mantiene la progresión verbal de modo natural en español.
- source_word: לָגוּר
  english_pob_choice: to sojourn
  chosen_spanish: vivir como forastero
  alternatives_spanish:
  - sojornar
  - residir temporalmente
  - habitar como extranjero
  lexicon: HALOT
  rationale: «לָגוּר» conserva el matiz de residir sin derecho pleno, como alguien externo o dependiente. «Vivir como forastero» comunica ese valor social en español mejor que un tecnicismo poco natural como «sojornar».
- source_word: בַּאֲשֶׁר אֶמְצָא
  english_pob_choice: wherever I may find a place
  chosen_spanish: dondequiera que encuentre un lugar
  alternatives_spanish:
  - dondequiera que encuentre
  - donde encuentre un lugar
  lexicon: HALOT
  rationale: El hebreo es elíptico y presupone un lugar. La adición de «un lugar» hace explícito el objeto implícito, como en la auditoría inglesa, sin exceder el sentido del texto.
theological_decisions:
- issue: Matiz social de לָגוּר
  english_pob_reading: to sojourn wherever I may find a place
  chosen_spanish_reading: voy a vivir como forastero dondequiera que encuentre un lugar
  alternative_spanish_readings:
  - voy a sojornar dondequiera que encuentre un lugar
  - voy a residir temporalmente dondequiera que encuentre un lugar
  rationale: El término no se reduce a mero alojamiento; implica la condición de un residente temporal o externo. «Vivir como forastero» preserva esa tensión sin introducir un tecnicismo opaco en español.
  doctrine_reference: Nota léxica sobre el estatuto de extranjero/forastero; no implica una doctrina específica.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «reside» a «sojourn» para reflejar mejor לָגוּר. La versión española sigue esa corrección, evitando un verbo neutro que diluya el matiz de residencia temporal y condición de forastero.
  spanish_consistency_notes:
  - Se mantiene «Judá» para el topónimo, conforme al uso bíblico habitual y al paralelismo con la fuente hebrea.
  - Se usa «levita» como designación identitaria estándar en español bíblico sin cambiarla a «sacerdote» u otra categoría.
  - No se traduce el nombre propio «Micaía» como variante tradicional «Miqueas», porque aquí el referente es el personaje del relato, no el profeta; se conserva la forma ajustada al contexto narrativo.
