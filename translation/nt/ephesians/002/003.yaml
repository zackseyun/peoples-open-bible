  from: just as the rest were also
  to: just as the rest were
  rationale: The word 'also' at the end of the clause is redundant when 'just as' is used. The Greek 'ὡς καὶ' is fully captured by 'just as' or 'even as'. Removing the final 'also' makes the sentence more concise and idiomatic without any loss of meaning.
