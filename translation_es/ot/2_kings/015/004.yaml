translation:
  language: es
  text: Solo los lugares altos no fueron quitados; el pueblo seguía sacrificando y quemando incienso[a] en los lugares altos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haciendo que una ofrenda suba en humo en los lugares altos». El verbo hebreo puede referirse específicamente a quemar incienso o, de manera más amplia, a hacer que una ofrenda suba en humo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: «רַק» introduce una excepción o limitación; «Solo» conserva esa fuerza restrictiva de manera natural en español y mantiene el tono resumitivo propio de Reyes.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos
  - los santuarios
  - los cerros altos
  lexicon: HALOT
  rationale: «בָּמוֹת» designa sitios cultuales elevados. «Lugares altos» es la equivalencia estándar y suficientemente transparente en español para conservar el marco histórico-religioso sin interpretarlo excesivamente.
- source_word: לֹא סָרוּ
  english_pob_choice: were not removed
  chosen_spanish: no fueron quitados
  alternatives_spanish:
  - no fueron eliminados
  - no desaparecieron
  - no se apartaron
  lexicon: HALOT
  rationale: Con «los lugares altos» como sujeto, el hebreo comunica que esos sitios no fueron retirados. «No fueron quitados» expresa bien la pasividad del resultado sin forzar un sentido distinto.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: seguía
  alternatives_spanish:
  - todavía
  - aún
  - seguían
  lexicon: HALOT
  rationale: «עוֹד» señala continuidad. En este contexto, «seguía» vuelve natural la acción continua del pueblo y conserva la idea de persistencia pese a las reformas.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: El colectivo israelita en este tipo de resumen regio suele expresarse con «el pueblo». Es una traducción clara y adecuada al registro bíblico en español.
- source_word: מְזַבְּחִים
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificando
  alternatives_spanish:
  - ofreciendo sacrificios
  - haciendo sacrificios
  lexicon: HALOT
  rationale: El verbo זבח se refiere al acto sacrificial. «Sacrificando» mantiene la acción verbal breve y directa que refleja el hebreo participial.
- source_word: וּמְקַטְּרִים
  english_pob_choice: burning incense
  chosen_spanish: quemando incienso
  alternatives_spanish:
  - ofreciendo humo
  - haciendo ofrendas en humo
  - quemando ofrendas
  lexicon: HALOT
  rationale: En este pasaje, la revisión inglesa optó por «burning incense» como la equivalencia más natural y precisa. En español, «quemando incienso» preserva la concreción cultual sin ampliar indebidamente el alcance del verbo.
- source_word: בַּבָּמוֹת
  english_pob_choice: on the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - sobre los lugares altos
  - en los altos
  - en los santuarios altos
  lexicon: HALOT
  rationale: La preposición hebrea localiza la práctica cultual en esos sitios. «En los lugares altos» suena natural en español y conserva la referencia geográfica-cultual del texto.
theological_decisions:
- issue: Alcance teológico de la adoración en los lugares altos
  english_pob_reading: The verse reports ongoing unauthorized worship at local cult sites without specifying whether every act was idolatrous.
  chosen_spanish_reading: El versículo informa que el pueblo seguía sacrificando y quemando incienso en los lugares altos, sin precisar en sí mismo si todo ese culto era idolátrico o si se dirigía a Yahvé de manera no autorizada.
  alternative_spanish_readings:
  - El pueblo practicaba allí una idolatría explícita.
  - El pueblo solo adoraba a Yahvé en un lugar indebido.
  rationale: El hebreo no identifica aquí el destinatario del culto; por eso la traducción debe conservar esa reserva y no resolver la tensión teológica que el texto mismo deja abierta.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde una opción más amplia («making offerings in smoke») a una más precisa y natural («burning incense») para מְקַטְּרִים. La redacción española sigue esa decisión revisada, pero conserva en nota la amplitud semántica del verbo hebreo para no perder la alternativa lexical documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto cuando el contexto histórico-teológico presupone el nombre divino.
  - Se usa «lugares altos» como término técnico estable para בָּמוֹת, evitando sustituciones interpretativas.
  - «Quemando incienso» sigue la revisión auditada y evita la rareza de una perífrasis demasiado literal en español.
  - 'La estructura de la oración reproduce el contraste del hebreo: excepción inicial, persistencia del culto, y localización final reiterada.'
