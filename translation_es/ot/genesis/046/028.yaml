translation:
  language: es
  text: Envió a Judá delante de él, a José, para mostrar el camino[a] delante de él, a Gosén[b]; y llegaron a la tierra de Gosén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dirigirlo a Gosén» o «dar instrucciones delante de él hacia Gosén». El verbo hebreo puede tener el sentido de dirigir o instruir, y la cláusula es algo comprimida.
    reason: lexical_alternative
  - marker: b
    text: La forma direccional hebrea puede expresarse también como «hacia Gosén».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - mandó enviar
  lexicon: HALOT
  rationale: El verbo básico de enviar en un relato narrativo se expresa naturalmente con «envió». Conserva la acción simple y directa del hebreo sin añadir matices de autoridad que no son necesarios aquí.
- source_word: לְפָנָיו
  english_pob_choice: ahead of him
  chosen_spanish: delante de él
  alternatives_spanish:
  - antes de él
  - en frente de él
  lexicon: HALOT
  rationale: La expresión idiomática comunica prioridad espacial y temporal. «Delante de él» suena natural en español y preserva el valor de precedencia del hebreo.
- source_word: לְהוֹרֹת
  english_pob_choice: to show the way
  chosen_spanish: para que le indicara el camino
  alternatives_spanish:
  - para mostrarle el camino
  - para dirigirlo
  - para darle instrucciones
  lexicon: HALOT
  rationale: En este contexto logístico, la idea no es solo enseñar en abstracto sino orientar concretamente el trayecto o los arreglos del viaje. «Indicar el camino» recoge la función direccional sin forzar una interpretación demasiado amplia.
- source_word: לְפָנָיו גֹּשְׁנָה
  english_pob_choice: before him to Goshen
  chosen_spanish: antes de él hacia Gosén
  alternatives_spanish:
  - delante de él a Gosén
  - hacia Gosén
  lexicon: HALOT
  rationale: El doble matiz de precedencia y destino se mantiene con «antes de él hacia Gosén». Conserva la repetición relacional del hebreo sin volverla pesada.
- source_word: גֹּשְׁנָה
  english_pob_choice: to Goshen
  chosen_spanish: hacia Gosén
  alternatives_spanish:
  - a Gosén
  - para Gosén
  lexicon: HALOT
  rationale: El sufijo direccional se refleja mejor con «hacia». En español, el topónimo se mantiene transliterado como «Gosén».
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: En una escena de movimiento hacia una región, «llegaron» comunica mejor el arribo narrativo que un simple «vinieron», sin alterar el flujo del hebreo.
- source_word: אַרְצָה גֹּשֶׁן
  english_pob_choice: into the land of Goshen
  chosen_spanish: a la tierra de Gosén
  alternatives_spanish:
  - a la región de Gosén
  - a Gosén
  lexicon: HALOT
  rationale: «Tierra» preserva el sentido territorial de אֶרֶץ. En español, la preposición de destino con «a la tierra de Gosén» transmite llegada sin añadir el interior espacial de «into» de manera excesiva.
- source_word: יְהוּדָה / יוֹסֵף / גֹּשֶׁן
  english_pob_choice: Judah / Joseph / Goshen
  chosen_spanish: Judá / José / Gosén
  alternatives_spanish:
  - Judá / Yosef / Gosén
  lexicon: Proyecto POB
  rationale: 'Los nombres propios se transliteran o adaptan según el uso bíblico español estándar del proyecto: Judá, José y Gosén.'
translation_notes:
  revision_awareness: 'El inglés POB pasó por varias revisiones en la frase de לְהוֹרֹת: de «to show the way» a «to get directions» y luego a «to show the way» otra vez. La decisión española evita depender de una reconstrucción interpretativa fuerte y opta por un equivalente concreto y publicable que conserve la noción de guía/indicación del camino. También se mantiene el doble movimiento del versículo: envío previo y llegada a Gosén.'
  spanish_consistency_notes:
  - Se mantiene «Gosén» como topónimo uniforme en todo el versículo.
  - Se conserva la distinción entre el envío previo de Judá y la llegada posterior del grupo.
  - «Delante de él» y «antes de él» mantienen la lógica espacial/temporal del hebreo sin traducir mecánicamente.
  - «Tierra de Gosén» preserva el valor territorial de אֶרֶץ sin sobreexplicar.
