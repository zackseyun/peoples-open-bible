translation:
  language: es
  text: Tragará a la muerte para siempre[b], y el Señor Dios[a] enjugará las lágrimas de todo rostro, y quitará de toda la tierra el oprobio de su pueblo[c], porque Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Señor Yahvé», que representa אֲדֹנָי יְהוִה, literalmente «Señor YHWH».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ha tragado a la muerte para siempre». El perfecto hebreo puede entenderse como perfecto profético, expresando un acto futuro como cierto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la afrenta de su pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלַּע / בלע
  english_pob_choice: He will swallow up
  chosen_spanish: tragará
  alternatives_spanish:
  - devorará
  - absorberá
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de 'tragar/engullir'. En español, 'tragar' conserva mejor la metáfora que un verbo más interpretativo como 'destruir'. Se mantiene el valor futurivo profético del perfecto.
- source_word: הַמָּוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural en español. El artículo definido ayuda a conservar la fuerza del sustantivo personificado en el contexto.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para eternamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa duración perpetua en un español moderno y fluido. 'Para siempre' es idiomático y mantiene la promesa de duración indefinida.
- source_word: וּמָחָה
  english_pob_choice: and ... will wipe away
  chosen_spanish: enjugará
  alternatives_spanish:
  - limpiará
  - borrará
  lexicon: HALOT
  rationale: Con 'lágrimas' en español, 'enjugar' reproduce de forma natural la imagen de quitar el llanto del rostro. 'Borrar' sería más abstracto y menos acorde con el objeto corporal.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé Dios
  lexicon: HALOT
  rationale: Se conserva la combinación reverencial del título compuesto sin ocultar el nombre divino. 'Señor Yahvé' representa de manera directa אֲדֹנָי + YHWH en un español claro; se evita sustituirlo por una convención de ocultamiento.
- source_word: דִּמְעָה
  english_pob_choice: tears
  chosen_spanish: las lágrimas
  alternatives_spanish:
  - el llanto
  - cada lágrima
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, el español natural exige plural en este contexto distributivo. 'Las lágrimas' transmite mejor el sentido colectivo que un singular artificial.
- source_word: מֵעַל כָּל פָּנִים
  english_pob_choice: from every face
  chosen_spanish: de todo rostro
  alternatives_spanish:
  - de cada rostro
  - de toda cara
  lexicon: HALOT
  rationale: '''Rostro'' es más elevado y bíblico en español que ''cara'', y mantiene el sentido distributivo de ''from every face''. ''Todo rostro'' suena natural y solemne.'
- source_word: וְחֶרְפַּת עַמּוֹ
  english_pob_choice: the reproach of his people
  chosen_spanish: el oprobio de su pueblo
  alternatives_spanish:
  - la afrenta de su pueblo
  - la vergüenza de su pueblo
  - el reproche de su pueblo
  lexicon: HALOT
  rationale: '''חרפה'' abarca reproche, afrenta y deshonra pública. ''Oprobio'' conserva el peso vergonzoso y público del término con registro bíblico digno, sin reducirlo a vergüenza interior.'
- source_word: יָסִיר
  english_pob_choice: he will remove
  chosen_spanish: quitará
  alternatives_spanish:
  - retirará
  - removerá
  - apartará
  lexicon: HALOT
  rationale: '''Quitar'' es un equivalente natural y fuerte en español para la idea de remover o hacer desaparecer. Evita un calco innecesario y mantiene el tono directo de la promesa.'
- source_word: מֵעַל כָּל הָאָרֶץ
  english_pob_choice: from all the earth
  chosen_spanish: de sobre toda la tierra
  alternatives_spanish:
  - de toda la tierra
  - de encima de toda la tierra
  lexicon: HALOT
  rationale: La preposición compuesta conserva el valor espacial de 'from off/from upon'. 'De sobre' refleja mejor el hebreo que un simple 'de', y 'tierra' permite la amplitud universal del pasaje.
- source_word: כִּי יְהוָה דִּבֵּר
  english_pob_choice: for Yahweh has spoken
  chosen_spanish: porque Yahvé ha hablado
  alternatives_spanish:
  - pues Yahvé ha hablado
  - porque el Señor ha hablado
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' y el perfecto con valor de certeza. 'Ha hablado' reproduce la solemnidad final de garantía profética.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh / the Lord GOD for אֲדֹנָי יְהוִה
  chosen_spanish_reading: Yahvé / el Señor Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor Dios
  - Yahvé
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política del proyecto pide transliterarlo como 'Yahvé'. En la combinación אֲדֹנָי יְהוִה se preserva además el título reverencial mediante 'el Señor Yahvé' para no ocultar el nombre ni diluir el compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor temporal de los perfectos proféticos
  english_pob_reading: future-oriented promises ('He will swallow up ... will wipe away ... will remove')
  chosen_spanish_reading: futuros proféticos ('tragará... enjugará... quitará')
  alternative_spanish_readings:
  - pasado perfecto ('tragó... enjugó... quitó')
  - presente profético
  rationale: Aunque las formas hebreas son perfectas, el contexto es una promesa escatológica. El futuro en español comunica mejor la certeza prospectiva sin alterar el género profético.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Sentido de חֶרְפָּה
  english_pob_reading: reproach / disgrace of his people
  chosen_spanish_reading: oprobio de su pueblo
  alternative_spanish_readings:
  - afrenta de su pueblo
  - vergüenza de su pueblo
  - reproche de su pueblo
  rationale: '''Oprobio'' recoge tanto la deshonra pública como el tono de acusación social. En español mantiene la tensión entre vergüenza y desprecio sin domesticar el término.'
  doctrine_reference: LEXICON/HALOT חרפה
translation_notes:
  revision_awareness: Se corrigió la anclaje de notas al insertar [a], [b] y [c] exactamente en los segmentos correspondientes del texto español. La formulación mantiene el consenso de la auditoría inglesa y conserva las alternativas semánticas principales sin sobreparáfrasis.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה, conforme a la política del proyecto.
  - Se conserva el matiz escatológico con futuros españoles, coherente con el perfecto profético hebreo.
  - '''Rostro'' se eligió por registro bíblico y naturalidad; ''lágrimas'' en plural responde a idiomatismo español sin perder el singular hebreo distributivo.'
