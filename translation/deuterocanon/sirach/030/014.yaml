theological_decisions:
- issue: Anthropological wording in bodily contrast
  chosen_reading: Retain the concrete expression 'in his flesh' rather than smoothing to 'in body' or 'in health.'
  alternative_readings:
  - in his body
  - in health
  rationale: The verse is proverbial rather than doctrinal, but it contrasts poverty with bodily condition. Preserving 'flesh' keeps the Hebrew concreteness and avoids importing a broader abstraction about health not explicitly stated in the Hebrew, even though the Greek parallel leans in that direction.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Gendered singular nouns in wisdom style
  chosen_reading: Use 'poor man' and 'rich man.'
  alternative_readings:
  - poor person ... rich person
  rationale: The Hebrew uses masculine singular forms in a representative proverb. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral language when the source is grammatically masculine and generic.
  doctrine_reference: Translation philosophy §4
