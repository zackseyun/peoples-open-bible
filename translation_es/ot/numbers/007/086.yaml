translation:
  language: es
  text: doce cuencos de oro, llenos de incienso[a]; cada cuenco, de diez siclos según el siclo del santuario; todo el oro de los cuencos era de ciento veinte siclos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «recipientes», «platos» o, tradicionalmente, «cucharas» para estos vasos del incienso.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפּוֹת
  english_pob_choice: dishes
  chosen_spanish: platos
  alternatives_spanish:
  - vasijas
  - copas
  - cuencos
  lexicon: HALOT
  rationale: En este contexto cultual, el término designa recipientes para incienso. «Platos» comunica de manera natural la idea de recipientes pequeños sin caer en «cucharas», que sería tradicional pero poco claro para el lector moderno.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - dorados
  lexicon: HALOT
  rationale: El hebreo indica el material de los recipientes; «de oro» conserva la designación directa y sobria del texto.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en total
  lexicon: HALOT
  rationale: Número cardinal simple; en español va naturalmente antepuesto al sustantivo.
- source_word: מְלֵאֹת קְטֹרֶת
  english_pob_choice: full of incense
  chosen_spanish: llenos de incienso
  alternatives_spanish:
  - llenos de perfume
  - colmados de incienso
  lexicon: HALOT
  rationale: La forma adjetival seguida del sustantivo indica que los recipientes estaban llenos de incienso. «Llenos de incienso» es fiel y fluido en español.
- source_word: עֲשָׂרָה עֲשָׂרָה
  english_pob_choice: each ... ten
  chosen_spanish: cada plato, de diez siclos
  alternatives_spanish:
  - diez siclos cada uno
  - cada uno con diez siclos
  lexicon: HALOT
  rationale: La repetición distributiva expresa el peso de cada recipiente. La formulación elegida mantiene claridad y evita una traducción demasiado literal que sonaría extraña en español.
- source_word: הַכַּף
  english_pob_choice: dish
  chosen_spanish: plato
  alternatives_spanish:
  - vasija
  - recipiente
  lexicon: HALOT
  rationale: El singular distributivo se refiere a cada unidad individual. Se repite «plato» para mantener coherencia con el sustantivo plural inicial.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - al siclo del santuario
  lexicon: HALOT
  rationale: La expresión fija especifica el estándar oficial de peso cultual. «Según» conserva el valor normativo/estándar de la construcción hebrea.
- source_word: כָּל זְהַב הַכַּפּוֹת
  english_pob_choice: all the gold of the dishes
  chosen_spanish: todo el oro de los platos
  alternatives_spanish:
  - el total de oro de los platos
  - todo el oro de esas vasijas
  lexicon: HALOT
  rationale: La construcción resumida indica el peso total del oro de todos los recipientes. «Todo el oro de los platos» reproduce con naturalidad la suma global.
- source_word: עֶשְׂרִים וּמֵאָה
  english_pob_choice: one hundred twenty shekels
  chosen_spanish: ciento veinte siclos
  alternatives_spanish:
  - cien y veinte siclos
  - ciento veinte
  lexicon: HALOT
  rationale: El hebreo da la cantidad total de 120. En español es necesario explicitar la unidad de peso desde el contexto inmediato, como hace el audit trail inglés.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide sustancialmente con la solución auditada en inglés: recipientes de oro llenos de incienso, peso individual de diez siclos según el siclo del santuario y total de ciento veinte siclos. Se mantiene la misma ambigüedad léxica relevante de כַּפּוֹת mediante una nota de alternativas, sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se usó «siclo» para la unidad de peso, coherente con el lenguaje bíblico y con la formulación técnica del estándar del santuario.
  - Se evitó «SEÑOR» u այլ sustituciones reverenciales porque el versículo no contiene el nombre divino.
  - Se mantuvo una sintaxis compacta y enumerativa, adecuada para una lista de ofrendas en contexto ritual.
