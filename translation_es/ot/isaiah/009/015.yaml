translation:
  language: es
  text: Y los dirigentes de este pueblo han llegado a ser quienes los extravían[a], y los guiados por ellos son tragados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que bendicen a este pueblo están extraviándolo, y los bendecidos por ellos son tragados». El hebreo con אשר también puede entenderse en relación con declarar a alguien bendito o dichoso, aunque el contexto favorece «dirigentes» / «guiados».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: have become
  chosen_spanish: han venido a ser
  alternatives_spanish:
  - han llegado a ser
  - se han convertido en
  lexicon: HALOT
  rationale: El hebreo con waw consecutivo expresa un estado resultante; en español, «han venido a ser» comunica bien el cambio de condición sin sonar mecánico. Mantiene la idea de transición más que un simple pasado estático.
- source_word: מְאַשְּׁרֵי
  english_pob_choice: the guides of
  chosen_spanish: los guías de
  alternatives_spanish:
  - los que guían a
  - los líderes de
  - los que llaman bienaventurado a
  lexicon: HALOT
  rationale: El contexto inmediato favorece el valor de dirección/gobierno, no el de «bendecir». «Guías» preserva la conexión verbal con el campo semántico de אשר y suena natural en español bíblico contemporáneo.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: «Pueblo» reproduce de forma directa עם y mantiene el tono profético. «Este pueblo» conserva la deixis del hebreo.
- source_word: מַתְעִים
  english_pob_choice: those who lead them astray
  chosen_spanish: quienes los extravían
  alternatives_spanish:
  - quienes los hacen errar
  - quienes los desvían
  - quienes los llevan por mal camino
  lexicon: HALOT
  rationale: El causativo de תעה pide una acción de desvío activa. «Extravían» es idiomático y conserva la fuerza verbal sin perder la imagen de apartar del camino.
- source_word: וּמְאֻשָּׁרָיו
  english_pob_choice: those guided by them
  chosen_spanish: los guiados por ellos
  alternatives_spanish:
  - los llevados por ellos
  - los que siguen a esos guías
  - los que son guiados por ellos
  lexicon: HALOT
  rationale: La forma pasiva con sufijo apunta con naturalidad a quienes reciben la guía de esos dirigentes. «Guiados por ellos» mantiene el paralelismo con «guías» y evita resolver prematuramente la ambigüedad del lexema a favor de «bendecidos».
- source_word: מְבֻלָּעִים
  english_pob_choice: are swallowed up
  chosen_spanish: son tragados
  alternatives_spanish:
  - son engullidos
  - quedan absorbidos
  - son devorados
  lexicon: HALOT
  rationale: El verbo conserva la imagen concreta de ser «tragados»; en español, esta opción retiene el choque metafórico del hebreo más directamente que «destruidos», sin explicitar de más el efecto final.
theological_decisions:
- issue: Ambigüedad de אשר en la primera mitad del versículo
  english_pob_reading: Render the paired forms as guides/leaders and those guided by them
  chosen_spanish_reading: Traducir las dos formas como «guías» y «guiados», manteniendo el paralelismo de liderazgo fallido
  alternative_spanish_readings:
  - Traducirlas como «los que bendicen a este pueblo» y «los bendecidos por ellos»
  - Traducir la primera como «los que llaman bienaventurado»
  rationale: Aunque אשר puede relacionarse con declarar bendito o dichoso, el paralelo con מַתְעִים y la segunda mitad del versículo favorece una lectura de conducción/guía. La traducción elegida preserva la ironía profética de un liderazgo que extravía al pueblo. La alternativa se deja implícita en la nota porque la forma hebrea sí admite ese matiz.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo con la revisión más reciente; no se requirieron cambios sustantivos respecto del criterio base de la POB inglesa. Se mantuvo la decisión auditada de leer las formas de אשר en sentido de guía/conducción, preservando en nota la lectura alternativa de bendición.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Guías» / «guiados» mantiene el paralelismo léxico y evita introducir vocabulario eclesiástico no requerido por el hebreo.
  - «Son tragados» conserva la metáfora de בלע sin suavizarla en una abstracción como «destruidos».
