  to: Entonces el sacerdote mandará que se degüelle[a] un ave sobre un recipiente de barro que contiene agua corriente[b].
  rationale: Se reemplaza «agua fresca» por «agua corriente» para reflejar mejor מַיִם חַיִּים en español, manteniendo «agua viva» como alternativa tradicional en nota. También se mejora la fluidez y precisión sintáctica con «que contiene», eliminando la nota explicativa innecesaria sobre la preposición sin perder ningún elemento del sentido fuente ni de la revisión inglesa.
