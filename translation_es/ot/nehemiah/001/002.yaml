base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/001/002.yaml
  text: Hanani[a], one of my brothers, came—he and some men from Judah—and I asked them about the Jews who had escaped, who were left from the captivity[c][b], and about Jerusalem.
  footnotes:
