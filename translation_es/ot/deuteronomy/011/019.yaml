revisions:
- from: Y las enseñarán a sus hijos[a], hablando de ellas cuando te sientes en tu casa, cuando camines por el camino, cuando te acuestes y cuando te levantes.
  to: Y las enseñarás a tus hijos[a], hablando de ellas cuando te sientes en tu casa, cuando camines por el camino, cuando te acuestes y cuando te levantes.
  rationale: Se corrige el cambio erróneo a tercera persona y se unifica la referencia en segunda persona para conservar el sentido exhortativo del hebreo en español natural. También se ajusta la nota para explicar el valor representativo del masculino hebreo sin introducir una expansión principal no documentada en el audit trail.
