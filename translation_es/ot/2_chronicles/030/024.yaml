translation:
  language: es
  text: Porque Ezequías, rey de Judá, dio a la asamblea[a] mil toros y siete mil ovejas[b]; y los oficiales dieron a la asamblea mil toros y diez mil ovejas[c]; y los sacerdotes se consagraron en gran número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la asamblea»; la preposición hebrea puede entenderse de cualquiera de las dos maneras en este contexto de provisión de animales para la adoración comunitaria.
    reason: lexical_alternative
  - marker: b
    text: Hebreo צֹאן, un término más amplio que puede referirse en general a animales del rebaño, incluidas ovejas y cabras.
    reason: lexical_alternative
  - marker: c
    text: Hebreo צֹאן, un término más amplio que puede referirse en general a animales del rebaño, incluidas ovejas y cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del dato anterior; en español «Porque» conserva bien la conexión causal/discursiva sin sonar forzado.
- source_word: הֵרִים / הֵרִימוּ
  english_pob_choice: gave
  chosen_spanish: dio / dieron
  alternatives_spanish:
  - ofreció / ofrecieron
  - contribuyó / contribuyeron
  - levantó / levantaron
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto describe la entrega de animales para el uso comunitario de culto. «Dar» es más directo y natural que un calco como «elevar» o una explicación demasiado interpretativa.
- source_word: לַקָּהָל
  english_pob_choice: to the assembly
  chosen_spanish: a la asamblea
  alternatives_spanish:
  - para la asamblea
  - a la congregación
  lexicon: HALOT
  rationale: קהל designa al grupo reunido; «asamblea» mantiene el sentido comunitario y cultual. La preposición puede entenderse como destino o beneficio, pero aquí el español fluye mejor con «a la asamblea».
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: פָּרִים son bovinos masculinos aptos para sacrificio. «Toros» comunica bien la especie en español general; «novillos» sería más específico pero menos seguro aquí.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - animales del rebaño
  - ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן es un término más amplio que puede incluir ovejas y cabras. Siguiendo el valor narrativo simple del registro inglés, «ovejas» es una equivalencia natural, aunque no agota el término técnico; la nota preserva la amplitud posible.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los gobernantes
  - los jefes
  lexicon: HALOT
  rationale: שָׂרִים alude a dirigentes de alto rango. «Oficiales» mantiene la función administrativa/gubernativa sin imponer la connotación hereditaria de «príncipes».
- source_word: וַיִּתְקַדְּשׁוּ כֹהֲנִים
  english_pob_choice: and priests consecrated themselves
  chosen_spanish: y los sacerdotes se consagraron
  alternatives_spanish:
  - y los sacerdotes se santificaron
  - y muchos sacerdotes se purificaron
  lexicon: HALOT
  rationale: El hitpael de קדשׁ expresa una acción reflexiva de apartarse ritualmente para el servicio. «Se consagraron» conserva el sentido cultual mejor que «se purificaron», que enfatiza solo la limpieza ritual.
- source_word: לָרֹב
  english_pob_choice: in great numbers
  chosen_spanish: en gran número
  alternatives_spanish:
  - en abundancia
  - muchos
  lexicon: HALOT
  rationale: La frase marca cantidad elevada. «En gran número» es idiomático en español y mantiene el énfasis narrativo sin sobretraducción.
theological_decisions:
- issue: Sentido cultual de la «consagración» sacerdotal
  english_pob_reading: and priests consecrated themselves in great numbers
  chosen_spanish_reading: y los sacerdotes se consagraron en gran número
  alternative_spanish_readings:
  - y los sacerdotes se santificaron en gran número
  - y muchos sacerdotes se purificaron
  rationale: El hebreo indica un apartarse ritual para el servicio sagrado; «consagraron» preserva esa fuerza cultual sin reducirla a higiene ritual. Se mantiene la tensión entre consagración y purificación en el contexto sacrificial.
  doctrine_reference: Santificación/consagración ritual para el servicio sagrado (cf. uso cultual de קדשׁ).
- issue: Cuantificación y amplitud de צֹאן
  english_pob_reading: seven thousand sheep / ten thousand sheep
  chosen_spanish_reading: siete mil ovejas / diez mil ovejas
  alternative_spanish_readings:
  - siete mil animales del rebaño / diez mil animales del rebaño
  - siete mil ganado menor / diez mil ganado menor
  rationale: Aunque צֹאן puede abarcar ovejas y cabras, el contexto de lista sacrificial permite una traducción fluida por «ovejas». La nota conserva la posible amplitud semántica para no borrar el matiz léxico.
  doctrine_reference: Léxico sacrificial hebreo; categoría de ganado menor (צֹאן).
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «contributed» a «gave» para hacer más directo el verbo principal; la presente traducción sigue esa revisión con «dio / dieron». También se conservó la estructura paralela del versículo y la nota de amplitud léxica para צֹאן, manteniendo el registro culto y la transparencia del original.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma estándar cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «asamblea» para קהל, en coherencia con el proyecto.
  - Se usa «sacerdotes» y «se consagraron» para preservar el campo cultual del hebreo.
  - Se evita «Cristo» o terminología ajena al texto; el versículo es narrativo y administrativo-sacrificial.
