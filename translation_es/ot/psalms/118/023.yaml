revisions:
- from: Esto ha venido de Yahvé[a]; es maravilloso en nuestros ojos[b].
  to: Esto viene de Yahvé[a]; es maravilloso[b] a nuestros ojos[c].
  rationale: Se revisa para mejorar la naturalidad del español sin alejarse del hebreo ni del razonamiento del POB. «Viene de Yahvé» expresa mejor el origen del hecho; «a nuestros ojos» conserva el idiomatismo con mejor legibilidad; y las notas se separan para reflejar con precisión las alternativas léxicas y el hebraísmo literal.
