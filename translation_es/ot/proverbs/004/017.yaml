translation:
  language: es
  text: Porque comen el pan de la maldad[a], y beben el vino de la violencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Porque se alimentan del pan de la maldad''. El verbo hebreo también puede llevar la idea de ''alimentarse de'' o ''consumir'', pero ''comen'' es la traducción más directa en paralelo con ''beben''.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''vino de violencias''. El plural puede intensificar o expresar una realidad colectiva; en español suele darse de forma natural como ''violencia''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la razón de la advertencia previa; en español, 'Porque' comunica con naturalidad el valor explicativo sin perder la conexión causal.
- source_word: לָחֲמוּ
  english_pob_choice: they eat
  chosen_spanish: comen
  alternatives_spanish:
  - se alimentan de
  - consumen
  lexicon: HALOT
  rationale: El verbo hebreo puede significar comer o consumir; 'comen' es la equivalencia más directa y natural, manteniendo el paralelismo con 'beben'.
- source_word: לֶחֶם
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - pan
  - alimento
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'pan', que en hebreo funciona como sustento básico y encaja con el paralelismo poético del versículo.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la impiedad
  - la perversidad
  lexicon: HALOT
  rationale: '''Maldad'' comunica bien el campo moral del término en literatura sapiencial y suena idiomático en español sin suavizar la carga ética.'
- source_word: וְיֵין
  english_pob_choice: and drink the wine
  chosen_spanish: y beben el vino
  alternatives_spanish:
  - y toman el vino
  - y el vino
  lexicon: HALOT
  rationale: Se explicita el verbo 'beben' para reflejar el paralelismo con el primer colon y conservar la estructura poética del hebreo.
- source_word: חֲמָסִים
  english_pob_choice: violence
  chosen_spanish: la violencia
  alternatives_spanish:
  - violencias
  - actos violentos
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, suele funcionar de modo colectivo o intensivo; el singular 'violencia' preserva la fuerza idiomática en español.
- source_word: יִשְׁתּוּ
  english_pob_choice: drink
  chosen_spanish: beben
  alternatives_spanish:
  - toman
  - beberán
  lexicon: HALOT
  rationale: El tiempo presente en español refleja el valor gnómico/proverbial del hebreo y mantiene el paralelismo con 'comen'.
