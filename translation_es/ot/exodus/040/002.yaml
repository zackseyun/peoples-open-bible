  glossary_alignment: «tabernáculo» para מִשְׁכָּן y «tienda de reunión» para אֹהֶל מוֹעֵד están bien alineados con el expediente. La nota alternativa también preserva adecuadamente la opción más formal. No hay conflicto con la terminología base del proyecto.
