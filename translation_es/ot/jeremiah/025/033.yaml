translation:
  language: es
  text: Las víctimas de Yahvé[a] en aquel día estarán desde un extremo de la tierra hasta el otro extremo de la tierra[b]. No serán lamentadas, ni recogidas, ni sepultadas; serán como estiércol sobre la superficie del suelo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que Yahvé mató». La frase hebrea puede hacer más explícita la agencia de Yahvé en la matanza.'
    reason: alternative_reading
  - marker: b
    text: 'O: «de un extremo del país al otro extremo del país». El hebreo אֶרֶץ puede significar «tierra» o «país/territorio»; aquí se prefiere «tierra» por el alcance amplio del oráculo.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «sobre la faz del suelo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלְלֵי יְהוָה
  english_pob_choice: the slain of Yahweh
  chosen_spanish: los muertos de Yahvé
  alternatives_spanish:
  - los caídos de Yahvé
  - los muertos por Yahvé
  - los muertos de Yahvé
  lexicon: HALOT
  rationale: חַלְלֵי es el plural constructo de «muertos/heridos de muerte, caídos». En este contexto judicial, la construcción con el nombre divino señala a los que han muerto bajo el juicio de Yahvé. «Los muertos de Yahvé» conserva la fuerza compacta del hebreo y la agencia divina sin suavizarla con un giro más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino revelado a Israel, en lugar de sustituirlo por un título.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: «En aquel día» es una equivalencia natural en español profético y conserva el tono escatológico/solemne del hebreo.
- source_word: מִקְצֵה הָאָרֶץ וְעַד קְצֵה הָאָרֶץ
  english_pob_choice: from one end of the earth to the other end of the earth
  chosen_spanish: desde un extremo de la tierra hasta el otro extremo de la tierra
  alternatives_spanish:
  - desde un extremo de la tierra al otro
  - desde un extremo del país hasta el otro extremo del país
  lexicon: HALOT
  rationale: «אֶרֶץ» puede significar «tierra» o «país/territorio». Dado el alcance amplio del juicio en este contexto, se mantiene «tierra», como en la lectura inglesa preferida. La fórmula «desde... hasta...» preserva el merismo enfático.
- source_word: לֹא יִסָּפְדוּ
  english_pob_choice: they will not be mourned
  chosen_spanish: no serán lamentados
  alternatives_spanish:
  - no se hará duelo por ellos
  - no serán llorados
  lexicon: HALOT
  rationale: El nifal de ספד expresa recibir duelo/lamento. «Lamentados» es formal y natural en español bíblico; conserva la idea de que no habrá duelo público por ellos.
- source_word: וְלֹא יֵאָסְפוּ
  english_pob_choice: or gathered
  chosen_spanish: ni recogidos
  alternatives_spanish:
  - ni reunidos
  - ni juntados
  lexicon: HALOT
  rationale: En la secuencia funeraria, el verbo alude a recoger cadáveres para su atención o entierro. «Recogidos» es breve y mantiene el orden del hebreo sin explicar de más.
- source_word: וְלֹא יִקָּבֵרוּ
  english_pob_choice: or buried
  chosen_spanish: ni sepultados
  alternatives_spanish:
  - ni enterrados
  lexicon: HALOT
  rationale: «Sepultados» es un equivalente digno y preciso del pasivo de קבר; evita una repetición demasiado coloquial de «enterrados» junto con «recogidos».
- source_word: לְדֹמֶן
  english_pob_choice: dung
  chosen_spanish: estiércol
  alternatives_spanish:
  - boñiga
  - dung
  lexicon: HALOT
  rationale: «דֹמֶן» designa excremento usado como abono o basura. En español bíblico, «estiércol» comunica la humillación y repulsión del cuadro con registro público legible, sin perder la crudeza de la imagen.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the surface of the ground
  chosen_spanish: sobre la superficie del suelo
  alternatives_spanish:
  - sobre la faz de la tierra
  - sobre la faz del suelo
  lexicon: HALOT
  rationale: La expresión literal es «sobre la faz de la tierra/suelo». Se prefirió «sobre la superficie del suelo» por claridad moderna, manteniendo la imagen concreta del cadáver expuesto.
- source_word: יִהְיוּ
  english_pob_choice: they will be like
  chosen_spanish: serán como
  alternatives_spanish:
  - serán cual
  - quedarán como
  lexicon: HALOT
  rationale: 'Después de לְדֹמֶן, la frase resulta idiomática: no describe una transformación ontológica, sino la condición resultante de quedar sin sepultura. «Serán como» refleja mejor el valor comparativo que la lectura revisada de la fuente inglesa.'
theological_decisions:
- issue: Alcance de אֶרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  rationale: La construcción merística «de un extremo... al otro» y el horizonte del oráculo favorecen una amplitud mayor que un simple ámbito local. «Tierra» conserva esa amplitud y sigue de cerca la decisión inglesa preferida.
  doctrine_reference: No aplica; decisión léxico-contextual.
- issue: Fuerza de חַלְלֵי יְהוָה
  english_pob_reading: the slain of Yahweh
  chosen_spanish_reading: los muertos de Yahvé
  alternative_spanish_readings:
  - los muertos por Yahvé
  - los caídos de Yahvé
  rationale: La relación constructa con el nombre divino señala a quienes mueren bajo el juicio de Yahvé. Se evita suavizar la agencia divina, y se conserva el nombre propio según la norma doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen final de comparación
  english_pob_reading: they will be like dung
  chosen_spanish_reading: serán como estiércol
  alternative_spanish_readings:
  - quedarán como estiércol
  - serán como excremento
  rationale: La comparación final transmite deshonra total y exposición sin entierro. «Serán como estiércol» conserva el impacto profético sin añadir interpretación ajena.
  doctrine_reference: No aplica; imagen profética explícita.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del audit trail inglés: se mantiene la amplitud de alcance con una fórmula más natural en español, y se refleja la comparación final con «serán como estiércol» en lugar de una transformación literal. También se conserva la secuencia de verbos pasivos («lamentados, recogidos, sepultados») y el tono de juicio profético del texto fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se traduce חַלְלֵי como «los muertos» para evitar una paraphrase excesiva, manteniendo la dureza del juicio.
  - Se conserva la merisma «desde un extremo... hasta el otro extremo...» sin atenuarla.
  - 'Se mantiene el paralelismo negativo triple: no lamentados, ni recogidos, ni sepultados.'
  - La imagen final se da con valor comparativo («serán como»), coherente con la revisión auditada del inglés.
