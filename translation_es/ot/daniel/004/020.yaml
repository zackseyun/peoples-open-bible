translation:
  language: es
  text: 'Y porque el rey vio a un vigilante[a], un santo, que descendía del cielo y decía: «Corten el árbol y destrúyanlo, pero dejen el tocón de sus raíces en la tierra, con una banda[b] de hierro y de bronce, en la hierba del campo; y que sea empapado con el rocío del cielo, y que su porción sea con las bestias del campo hasta que siete tiempos[c] pasen sobre él»—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «centinela»; el término arameo designa un ser celestial caracterizado por estar despierto o vigilante.
    reason: lexical_alternative
  - marker: b
    text: O «con una ligadura de hierro y bronce».
    reason: lexical_alternative
  - marker: c
    text: «Siete tiempos» puede significar siete periodos de tiempo; el texto no especifica la unidad exacta.
    reason: alternative_reading
lexical_decisions:
- source_word: עִיר
  english_pob_choice: watcher
  chosen_spanish: vigilante
  alternatives_spanish:
  - vigía
  - centinela
  lexicon: HALOT
  rationale: En Daniel, el término arameo designa un ser celestial caracterizado por estar despierto/vigilante. «Vigilante» mantiene ese rasgo semántico y suena natural en español; «centinela» o «vigía» también son posibles, pero tienden a sonar más militares o menos transparentes para este contexto.
- source_word: וְקַדִּישׁ
  english_pob_choice: a holy one
  chosen_spanish: un santo
  alternatives_spanish:
  - un ser santo
  - un consagrado
  lexicon: HALOT
  rationale: La expresión funciona en aposición con «vigilante», por lo que se mantiene la referencia al mismo ser celestial. «Santo» conserva la forma breve del original y el valor de ser apartado/santo sin resolver más de lo que el texto dice.
- source_word: נָחִת מִן שְׁמַיָּא
  english_pob_choice: coming down from heaven
  chosen_spanish: que descendía desde los cielos
  alternatives_spanish:
  - que bajaba del cielo
  - que descendía del cielo
  lexicon: HALOT
  rationale: 'El participio expresa una acción en curso: el ser es visto mientras desciende. «Descendía» conserva ese aspecto; «desde los cielos» respeta el plural/intensivo arameo y evita uniformarlo sin necesidad.'
- source_word: גֹּדּוּ
  english_pob_choice: Cut down
  chosen_spanish: Corten
  alternatives_spanish:
  - Talen
  - Derriben
  lexicon: HALOT
  rationale: El imperativo plural pide una acción de tala. «Corten» es claro y directo en español; el contexto del árbol hace innecesario una formulación más técnica.
- source_word: וְחַבְּלוּהִי
  english_pob_choice: destroy it
  chosen_spanish: destrúyanlo
  alternatives_spanish:
  - arruinenlo
  - arrásenlo
  lexicon: HALOT
  rationale: El verbo expresa daño severo o destrucción. «Destrúyanlo» comunica bien la fuerza del mandato y evita suavizar el sentido.
- source_word: עִקַּר שָׁרְשׁוֹהִי
  english_pob_choice: the stump of its roots
  chosen_spanish: el tocón de sus raíces
  alternatives_spanish:
  - el tronco de sus raíces
  - la cepa de sus raíces
  lexicon: HALOT
  rationale: La imagen no es la de raíces abstractas, sino la parte remanente del árbol tras ser cortado. «Tocón» es el equivalente natural en español para ese resto del árbol, y «de sus raíces» conserva el vínculo con el plural del original.
- source_word: שְׁבֻקוּ
  english_pob_choice: leave
  chosen_spanish: dejen
  alternatives_spanish:
  - dejen permanecer
  - dejen quedar
  lexicon: HALOT
  rationale: El imperativo pide que algo quede sin ser eliminado. «Dejen» mantiene la sencillez del mandato y encaja con la secuencia de órdenes.
- source_word: אֱסוּר
  english_pob_choice: band
  chosen_spanish: banda
  alternatives_spanish:
  - faja
  - cinta
  - ligadura
  lexicon: HALOT
  rationale: En este contexto arbóreo, el sustantivo denota una atadura o envoltura que mantiene unido el tocón. «Banda» conserva la imagen de una franja envolvente sin forzar la idea de prisión; por eso se prefiere frente a «ligadura», que puede sonar más abstracta.
- source_word: פַרְזֶל וּנְחָשׁ
  english_pob_choice: iron and bronze
  chosen_spanish: hierro y de bronce
  alternatives_spanish:
  - hierro y bronce
  - hierro y cobre
  lexicon: HALOT
  rationale: El metal correspondiente a נְחָשׁ en este entorno es «bronce». Se mantiene la coordinación del hebreo/arameo con la repetición de la preposición para una lectura natural en español.
- source_word: בְּדִתְאָא דִּי בָרָא
  english_pob_choice: in the grass of the field
  chosen_spanish: en la hierba del campo
  alternatives_spanish:
  - en la hierba del campo abierto
  - en el pasto del campo
  lexicon: HALOT
  rationale: La frase designa vegetación del campo abierto. «Hierba» funciona bien en español bíblico moderno y evita introducir un matiz más técnico o pastoril que no está exigido por el texto.
- source_word: יִצְטַבַּע
  english_pob_choice: let him be drenched
  chosen_spanish: que sea rociado
  alternatives_spanish:
  - que sea empapado
  - que quede mojado
  lexicon: HALOT
  rationale: El verbo indica quedar mojado por una humedad externa. En español, «sea rociado» comunica de forma sobria la acción del rocío sobre el sujeto; «empapado» sería más intenso de lo que exige el contexto.
- source_word: וְעִם חֵיוַת בָּרָא חֲלָקֵהּ
  english_pob_choice: and let his portion be with the beasts of the field
  chosen_spanish: y que su porción sea con las bestias del campo
  alternatives_spanish:
  - y que su parte sea con las bestias del campo
  - y que su suerte sea con los animales del campo
  lexicon: HALOT
  rationale: «Porción» conserva el sentido formal de participación asignada o lote. «Bestias» sigue el registro bíblico tradicional y mantiene la correspondencia con el plural de animales salvajes del campo.
- source_word: שִׁבְעָה עִדָּנִין
  english_pob_choice: seven times
  chosen_spanish: siete tiempos
  alternatives_spanish:
  - siete periodos
  - siete temporadas
  lexicon: HALOT
  rationale: עִדָּן en Daniel puede significar un tiempo o periodo, pero el texto no especifica la unidad exacta. «Siete tiempos» preserva esa ambigüedad auditada en la POB inglesa.
- source_word: יַחְלְפוּן עֲלֹוהִי
  english_pob_choice: pass over him
  chosen_spanish: pasen sobre él
  alternatives_spanish:
  - pasen por encima de él
  - transcurran sobre él
  lexicon: HALOT
  rationale: La expresión idiomática indica el transcurso de un periodo sobre alguien. «Pasen sobre él» mantiene la metáfora y el paralelismo con la lectura inglesa sin sobre-explicar.
theological_decisions:
- issue: Identidad del 'vigilante, un santo'
  english_pob_reading: Render as a heavenly being without specifying angelic taxonomy beyond the text
  chosen_spanish_reading: 'Mantener la designación del texto como un ser celestial: «un vigilante, un santo»'
  alternative_spanish_readings:
  - un ángel
  - un miembro del consejo divino
  rationale: El arameo usa su propio título y no nombra explícitamente un ángel. La traducción conserva la tensión teológica y evita resolver la clasificación del ser más allá de lo que el texto afirma.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que eliminó «even» antes de la frase sobre la banda de hierro y bronce para una formulación más natural. En español se refleja con una construcción directa equivalente, sin añadir intensificadores.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca explícitamente el nombre divino; este versículo no lo contiene.
  - Se conserva el registro bíblico de «bestias» y «porción» para mantener la imagen y el paralelismo del arameo.
  - Se evita traducir el ser celestial como «ángel» para no cerrar una tensión teológica no resuelta por el texto.
  - «Siete tiempos» se mantiene ambiguo de forma deliberada, en línea con la POB inglesa.
