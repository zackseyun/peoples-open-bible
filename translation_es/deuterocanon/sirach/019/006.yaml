translation:
  language: es
  text: Nunca repitas una palabra[a][b], y nada se te quitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una asunto» / «una declaración». El griego λόγον puede significar ‘palabra’, ‘asunto’ o ‘declaración’; aquí se conserva la lectura breve «palabra», pero el sentido más amplio sigue siendo posible.
