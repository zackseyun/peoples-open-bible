translation:
  language: es
  text: Pero cierto Alcimo[a], antiguo sumo sacerdote, que se había contaminado voluntariamente en los tiempos de la separación, comprendiendo que de ningún modo tenía seguridad, ni ya acceso al santo altar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, "en los tiempos de la apostasía". El griego dice literalmente "los tiempos de separación/no mezcla", lo que puede describir el período de impureza y alejamiento religioso.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄλκιμος
  english_pob_choice: Alcimus
  chosen_spanish: Alcimo
  alternatives_spanish:
  - Alcimus
  lexicon: transliteración propia
  rationale: Se conserva el nombre propio en forma hispanizada y reconocible, sin traducirlo ni sustituirlo por un equivalente interpretativo.
- source_word: προγεγονὼς ἀρχιερεύς
  english_pob_choice: formerly high priest
  chosen_spanish: antes sumo sacerdote
  alternatives_spanish:
  - antiguo sumo sacerdote
  - que había sido sumo sacerdote
  lexicon: participio adjetival / LSJ
  rationale: El griego marca una condición previa. "Antes sumo sacerdote" mantiene la referencia temporal sin añadir más desarrollo que el texto no exige.
- source_word: ἑκουσίως
  english_pob_choice: willingly
  chosen_spanish: voluntariamente
  alternatives_spanish:
  - de buena voluntad
  - deliberadamente
  lexicon: LSJ
  rationale: El adverbio expresa intención y asentimiento propio; "voluntariamente" comunica bien esa decisión consciente en español.
- source_word: μεμολυσμένος
  english_pob_choice: had defiled himself
  chosen_spanish: se había contaminado
  alternatives_spanish:
  - se había manchado
  - se había hecho impuro
  - se había defilado
  lexicon: LSJ
  rationale: El participio perfecto indica un estado resultante de una acción ya realizada. "Contaminado" conserva la idea de impureza ritual y moral sin forzar un tecnicismo ajeno al español bíblico.
- source_word: ἐν τοῖς τῆς ἀμιξίας χρόνοις
  english_pob_choice: in the times of separation
  chosen_spanish: en los tiempos de la separación
  alternatives_spanish:
  - en los tiempos de la apostasía
  - durante el tiempo de separación
  - en los tiempos de no mezcla
  lexicon: LSJ
  rationale: ἀμιξία literalmente es "no mezcla" o separación. Se mantiene la forma más transparente para no resolver de antemano la carga histórico-religiosa del término.
- source_word: συννοήσας
  english_pob_choice: realizing
  chosen_spanish: comprendiendo
  alternatives_spanish:
  - entendiendo
  - percibiendo
  - advirtiendo
  lexicon: LSJ
  rationale: El participio introduce una toma de conciencia. "Comprendiendo" suena natural en español y conserva el valor cognitivo del griego.
- source_word: καθʼ ὁντιναοῦν τρόπον
  english_pob_choice: in no way
  chosen_spanish: de ningún modo
  alternatives_spanish:
  - en ningún modo
  - de ninguna manera
  - por ningún medio
  lexicon: LSJ
  rationale: La expresión intensifica la negación siguiente. "De ningún modo" reproduce esa imposibilidad de forma idiomática.
- source_word: σωτηρία
  english_pob_choice: safety
  chosen_spanish: salvación
  alternatives_spanish:
  - seguridad
  - rescate
  - liberación
  lexicon: LSJ
  rationale: Aunque el contexto inmediato puede sugerir preservación práctica, el término español "salvación" es más fiel a la amplitud del griego y mantiene la tensión entre seguridad histórica y resonancia teológica.
- source_word: πρὸς τὸ ἅγιον θυσιαστήριον ἔτι πρόσοδος
  english_pob_choice: any longer access to the holy altar
  chosen_spanish: ni ya acceso al santo altar
  alternatives_spanish:
  - ni ya entrada al santo altar
  - ni ya acercamiento al santo altar
  - ni acceso alguno al santo altar
  lexicon: LSJ
  rationale: πρόσοδος es acceso o aproximación. "Acceso" conserva la idea de posibilidad de acercarse o entrar en contacto con el altar; "santo altar" traduce directamente τὸ ἅγιον θυσιαστήριον.
theological_decisions:
- issue: Sentido de ἀμιξία en un contexto histórico-religioso
  english_pob_reading: times of separation, with note that it may describe apostasy/estrangement
  chosen_spanish_reading: los tiempos de la separación
  alternative_spanish_readings:
  - los tiempos de la apostasía
  - los tiempos de la impureza ritual
  - los tiempos del apartamiento
  rationale: Se preserva el sentido literal de "no mezcla / separación" para no imponer una interpretación más fuerte que el griego. La nota permite reconocer la posible referencia histórico-religiosa sin borrar la tensión lexical.
  doctrine_reference: 'Principio POB: primacía del texto original y conservación de tensiones interpretativas'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y también toma en cuenta el ajuste final del audit trail inglés, que favorece una sintaxis más fluida sin perder la progresión participial: condición previa de Alcimo, su contaminación voluntaria y su reconocimiento de que ya no tenía acceso al altar.'
  spanish_consistency_notes:
  - Se usa "Alcimo" como forma hispanizada del nombre propio, manteniendo la transliteración y la legibilidad.
  - '"Santo altar" conserva el valor de ἅγιον θυσιαστήριον sin sustituirlo por una expresión litúrgica más interpretativa.'
  - Se mantiene "salvación" para no estrechar el alcance semántico de σωτηρία únicamente a seguridad material.
  - El participio griego encadenado se refleja con cláusulas relativas y gerundio para conservar el orden lógico del original.
