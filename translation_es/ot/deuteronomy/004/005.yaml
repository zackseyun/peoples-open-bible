translation:
  language: es
  text: Miren[a], yo les he enseñado estatutos y juicios, tal como Yahvé mi Dios me mandó, para actuar así en medio de la tierra[b] en la que ustedes entran para poseerla[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'decretos y ordenanzas' para 'estatutos y juicios'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''en medio de la tierra''; muchas traducciones simplifican a ''en la tierra''.'
    reason: lexical_alternative
  - marker: c
    text: O 'ustedes entran para poseerla' o 'ustedes van a heredarla'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Ve
  lexicon: HALOT
  rationale: Imperativo singular usado como llamado discursivo para captar la atención. En español, 'Mira' transmite de forma natural esa interpelación directa sin sonar arcaico.
- source_word: לִמַּדְתִּי
  english_pob_choice: I have taught
  chosen_spanish: yo les he enseñado
  alternatives_spanish:
  - yo les enseñé
  - yo les enseñaba
  lexicon: HALOT
  rationale: El perfecto hebreo se entiende como una acción concluida con vigencia presente dentro de la exhortación. 'Les he enseñado' conserva ese valor mejor que un simple pretérito.
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' es el equivalente legal más estable para חֻקִּים en este contexto de legislación del pacto.'
- source_word: מִשְׁפָּטִים
  english_pob_choice: judgments
  chosen_spanish: preceptos
  alternatives_spanish:
  - juicios
  - ordenanzas
  - decretos
  lexicon: HALOT
  rationale: En español bíblico, 'preceptos' comunica bien el valor normativo de מִשְׁפָּטִים sin sonar forzado. 'Juicios' conservaría la raíz judicial, pero aquí puede sonar menos natural para lectores contemporáneos.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: La frase marca correspondencia exacta con el mandato divino. 'Tal como' preserva esa conformidad con naturalidad en español.
- source_word: יְהוָה אֱלֹהָי
  english_pob_choice: the LORD my God
  chosen_spanish: Yahvé mi Dios
  alternatives_spanish:
  - Yahvé, mi Dios
  - el Señor mi Dios
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el nombre divino: ''Yahvé''. La construcción posesiva se mantiene en español de forma directa.'
- source_word: לַעֲשׂוֹת כֵּן
  english_pob_choice: to do thus
  chosen_spanish: para hacer así
  alternatives_spanish:
  - para obrar de ese modo
  - para actuar conforme a ello
  lexicon: HALOT
  rationale: El infinitivo con כֵּן expresa finalidad vinculada a la enseñanza recibida. 'Para hacer así' conserva el deíctico 'así/so' sin sobreexplicarlo.
- source_word: בְּקֶרֶב הָאָרֶץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio del país
  - dentro de la tierra
  lexicon: HALOT
  rationale: '''En medio de la tierra'' preserva la imagen hebrea de בְּקֶרֶב sin convertirla prematuramente en la simple localización ''en la tierra''.'
- source_word: בָּאִים שָׁמָּה
  english_pob_choice: you are entering there
  chosen_spanish: ustedes van entrando
  alternatives_spanish:
  - ustedes están entrando
  - ustedes entran allí
  lexicon: HALOT
  rationale: El participio con dirección indica un movimiento en curso hacia esa tierra. 'Van entrando' expresa bien esa progresividad en español y evita la dureza de 'entrando allí'.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess it
  chosen_spanish: para tomar posesión de ella
  alternatives_spanish:
  - para poseerla
  - para heredarla
  lexicon: HALOT
  rationale: En contexto de tierra prometida, ירשׁ incluye la idea de entrar en posesión del territorio. 'Tomar posesión de ella' es idiomático y mantiene la relación con el objeto femenino 'tierra'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo la terminología del proyecto, se traduce como 'Yahvé' para preservar el nombre del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético de Deuteronomio 4:5 y se cotejó con el audit trail inglés. Se conservó la estructura de mandato + enseñanza + conformidad con el mandato divino + propósito en la tierra prometida. Se decidió mantener la imagen espacial 'en medio de la tierra' y resolver el hebreo participial con una perífrasis natural ('van entrando'). También se ajustó el cierre para evitar redundancias, siguiendo el tipo de revisión que el POB ya aplicó en inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al criterio del proyecto para יְהוָה.
  - '''Estatutos'' se mantuvo para חֻקִּים y ''preceptos'' para מִשְׁפָּטִים, preservando el registro legal sin calco rígido.'
  - '''En medio de la tierra'' conserva la imaginería hebrea marcada por בְּקֶרֶב.'
  - '''Tomar posesión de ella'' refleja el valor contextual de לְרִשְׁתָּהּ sin imponer ''heredar'' como única opción.'
