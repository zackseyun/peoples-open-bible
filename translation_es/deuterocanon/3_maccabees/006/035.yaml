translation:
  language: es
  text: Y los judíos, como dijimos antes, tras formar el coro antes mencionado[a], pasaban el tiempo con festejos, en alegres acciones de gracias[b] y salmos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tras organizar el coro antes mencionado’. El griego χορὸς puede referirse a un coro o a una compañía coral semejante.
    reason: lexical_alternative
  - marker: b
    text: ‘Acciones de gracias’ traduce ἐξομολογήσεσιν ἱλαραῖς, donde ἐξομολόγησις aquí probablemente significa agradecimiento o alabanza, no confesión de pecados.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε Ἰουδαῖοι
  english_pob_choice: And the Jews
  chosen_spanish: Y los judíos
  alternatives_spanish:
  - Y los judeos
  - Y los judeanos
  lexicon: LSJ
  rationale: Ἰουδαῖοι puede referirse al pueblo judío como comunidad étnico-religiosa. En este contexto narrativo, 'judíos' es claro en español y mantiene el valor colectivo del original sin introducir una distinción geográfica no requerida.
- source_word: καθὼς προειρήκαμεν
  english_pob_choice: as we said before
  chosen_spanish: como dijimos antes
  alternatives_spanish:
  - como hemos dicho antes
  - como se dijo antes
  lexicon: LSJ
  rationale: La frase retoma una referencia previa del narrador. 'Como dijimos antes' conserva el anclaje retrospectivo y suena natural en español bíblico moderno.
- source_word: συστησάμενοι
  english_pob_choice: having formed
  chosen_spanish: habiendo formado
  alternatives_spanish:
  - habiendo organizado
  - habiendo reunido
  lexicon: LSJ
  rationale: El participio expresa la acción de constituir o disponer un grupo. 'Habiendo formado' sigue de cerca la estructura verbal sin perder naturalidad en español.
- source_word: τὸν προειρημένον χορὸν
  english_pob_choice: the previously mentioned chorus
  chosen_spanish: el coro antes mencionado
  alternatives_spanish:
  - la compañía antes mencionada
  - el coro ya mencionado
  lexicon: LSJ
  rationale: χορὸς admite 'coro' o 'compañía coral'. Dado el contexto con salmos y celebración, 'coro' preserva bien el matiz litúrgico y musical. 'Antes mencionado' refleja προειρημένον de manera directa.
- source_word: μετʼ εὐωχίας
  english_pob_choice: with feasting
  chosen_spanish: con banquetes
  alternatives_spanish:
  - con festines
  - con celebración festiva
  lexicon: LSJ
  rationale: εὐωχία denota gozo festivo con comida, a menudo un banquete. 'Con banquetes' expresa con más concreción ese ambiente celebrativo sin exagerar el texto.
- source_word: ἐν ἐξομολογήσεσιν ἱλαραῖς
  english_pob_choice: in joyful thanksgivings
  chosen_spanish: en alegres acciones de gracias
  alternatives_spanish:
  - en gores agradecimientos
  - en alegres alabanzas
  lexicon: LSJ
  rationale: En contexto judío-griego, ἐξομολόγησις puede significar agradecimiento o alabanza, no confesión de pecados. 'Acciones de gracias' mantiene ese sentido y 'alegres' refleja ἱλαραῖς. Se evita 'confesiones' para no introducir una connotación ajena al pasaje.
- source_word: καὶ ψαλμοῖς
  english_pob_choice: and psalms
  chosen_spanish: y salmos
  alternatives_spanish:
  - y himnos
  - y cantos salmódicos
  lexicon: LSJ
  rationale: ψαλμοί se traduce más directamente como 'salmos'. Es el término más fiel y reconocible en español para el repertorio de alabanza del texto.
- source_word: διῆγον
  english_pob_choice: spent their time
  chosen_spanish: pasaban el tiempo
  alternatives_spanish:
  - pasaban sus días
  - se mantenían
  lexicon: LSJ
  rationale: El imperfecto expresa una actividad continuada. 'Pasaban el tiempo' reproduce bien ese valor durativo en español corriente.
translation_notes:
  revision_awareness: Texto alineado con el paquete de fuente griega y con la traducción inglesa auditada; no se detectaron revisiones aplicadas en el registro fuente.
  spanish_consistency_notes:
  - Se mantiene 'judíos' para Ἰουδαῖοι, coherente con el uso comunitario del pasaje.
  - Se conserva el término litúrgico 'salmos' por ser el equivalente más directo de ψαλμοῖς.
  - Se evitó 'confesiones' en el cuerpo principal para preservar la interpretación de ἐξομολογήσεσιν como agradecimiento/alabanza en este contexto.
