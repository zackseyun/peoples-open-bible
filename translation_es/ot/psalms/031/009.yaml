translation:
  language: es
  text: y no me has entregado en la mano del enemigo[a]; has puesto mis pies en un lugar amplio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «no me has entregado al poder del enemigo».'
    reason: lexical_alternative
  - marker: b
    text: «Un lugar amplio» evoca libertad, seguridad y alivio frente al encierro o la angustia.
    reason: cultural_note
lexical_decisions:
- source_word: הִסְגַּרְתַּנִי
  english_pob_choice: have not delivered me
  chosen_spanish: me has entregado
  alternatives_spanish:
  - me has entregado
  - me has puesto en manos de
  - me has abandonado a
  lexicon: HALOT
  rationale: El hifil de סגר aquí expresa poner a alguien en poder de otro. «Entregado» conserva ese valor de rendición o traspaso al dominio hostil, con un registro natural en español bíblico.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  - en poder de
  lexicon: HALOT
  rationale: La imagen hebrea de la «mano» como poder o control se mantiene de forma idiomática en español con «en manos de», que suena natural y conserva la metáfora concreta.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  - el foe
  lexicon: HALOT
  rationale: Aunque el sustantivo no lleva artículo en hebreo, aquí funciona de modo genérico/colectivo. «El enemigo» comunica bien el sentido de oposición hostil sin perder el carácter representativo.
- source_word: הֶעֱמַדְתָּ
  english_pob_choice: have set
  chosen_spanish: has puesto
  alternatives_spanish:
  - has hecho estar
  - has establecido
  - has hecho firmar
  lexicon: HALOT
  rationale: El hifil de עמד indica hacer que algo quede colocado o firme. «Has puesto» es una solución natural y precisa, y evita una rigidez innecesaria en español.
- source_word: בַמֶּרְחָב
  english_pob_choice: in a broad place
  chosen_spanish: en un lugar espacioso
  alternatives_spanish:
  - en un lugar amplio
  - en un lugar abierto
  - en un lugar holgado
  lexicon: HALOT
  rationale: מֶרְחָב denota amplitud/apertura en contraste con aprieto o confinamiento. «Lugar espacioso» conserva la metáfora de amplitud y resulta claro para el lector actual.
- source_word: רַגְלָי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mi pie
  - mis pasos
  lexicon: HALOT
  rationale: El plural hebreo se refleja con «mis pies», que preserva la imagen de estabilidad y libertad de movimiento.
- source_word: וְלֹא
  english_pob_choice: and ... not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  - y no has
  lexicon: HALOT
  rationale: La conjunción enlaza la línea con la anterior; «y no» reproduce de manera simple la continuidad sintáctica del hebreo.
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa al preferir «entregado» frente a una formulación más interpretativa, manteniendo el paralelismo del verso y la metáfora espacial de forma transparente.
  spanish_consistency_notes:
  - Se mantuvo «enemigo» en singular genérico, acorde con el uso poético del hebreo.
  - Se conservó la imagen corporal de «mano» mediante la expresión idiomática española «en manos de».
  - «Lugar espacioso» se eligió por claridad y por conservar el contraste implícito con aprieto, peligro o confinamiento.
