  to: 'Y Finés, hijo de Eleazar el sacerdote, dijo a los hijos de Rubén[a], y a los hijos de Gad, y a los hijos de Manasés: «Hoy sabemos que Yahvé está entre nosotros, porque ustedes no han actuado infielmente contra Yahvé en este asunto[b]. Entonces han librado a los hijos de Israel de la mano de Yahvé[c]».'
