translation:
  language: es
  text: Pero un hijo de Ahimelec, hijo de Ahitub, escapó[a], y su nombre era Abiatar, y huyó tras David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huyó a David». El hebreo dice literalmente «huyó tras David», lo cual puede significar que fue detrás de él para unirse a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּלֵט
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se salvó
  - logró escapar
  lexicon: HALOT
  rationale: El nifal de מלט expresa que alguien logra salir con vida de una situación de peligro. «Escapó» conserva la acción de librarse de la matanza, sin añadir más interpretación de la que permite el hebreo.
- source_word: בֵּן אֶחָד
  english_pob_choice: one son
  chosen_spanish: uno de los hijos
  alternatives_spanish:
  - un hijo
  - un solo hijo
  lexicon: HALOT
  rationale: El hebreo resalta que fue uno solo el descendiente masculino que quedó con vida. En español, «uno de los hijos» suena más natural en un encabezado genealógico y preserva la idea de que fue el único sobreviviente de esa línea en ese contexto.
- source_word: לַאֲחִימֶלֶךְ בֶּן אֲחִיטוּב
  english_pob_choice: of Ahimelech son of Ahitub
  chosen_spanish: de Ahimelec, hijo de Ahitub
  alternatives_spanish:
  - perteneciente a Ahimelec, hijo de Ahitub
  - de la casa de Ahimelec, hijo de Ahitub
  lexicon: HALOT
  rationale: La ל idiomática ante el nombre se expresa bien con «de». Se mantiene la identificación genealógica con «hijo de Ahitub», que corresponde directamente al patrón hebreo.
- source_word: וּשְׁמוֹ אֶבְיָתָר
  english_pob_choice: and his name was Abiathar
  chosen_spanish: y su nombre era Abiatar
  alternatives_spanish:
  - y se llamaba Abiatar
  - su nombre era Abiatar
  lexicon: HALOT
  rationale: Es una cláusula de nombramiento directa. «Y su nombre era» sigue de cerca la estructura hebrea y es plenamente natural en español bíblico contemporáneo.
- source_word: וַיִּבְרַח
  english_pob_choice: he fled
  chosen_spanish: y huyó
  alternatives_spanish:
  - y escapó
  - y se dio a la fuga
  lexicon: HALOT
  rationale: Se distingue de וַיִּמָּלֵט. Como el primer verbo ya se tradujo con «escapó», aquí «huyó» conserva la diferencia verbal y el movimiento subsecuente.
- source_word: אַחֲרֵי דָוִד
  english_pob_choice: after David
  chosen_spanish: tras David
  alternatives_spanish:
  - después de David
  - detrás de David
  lexicon: HALOT
  rationale: אַחֲרֵי puede significar literalmente «después de / detrás de», pero en contexto puede indicar ir tras alguien para unirse a él. «Tras David» preserva la imagen hebrea sin cerrar del todo la posibilidad de intención relacional.
- source_word: אֲחִימֶלֶךְ
  english_pob_choice: Ahimelech
  chosen_spanish: Ahimelec
  alternatives_spanish:
  - Ahimelech
  lexicon: Transliteración estándar
  rationale: Se adapta el nombre propio a la forma española usual sin cambiar la identidad del personaje.
- source_word: אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  alternatives_spanish:
  - Ajitub
  lexicon: Transliteración estándar
  rationale: Se conserva la transliteración habitual del nombre propio.
- source_word: אֶבְיָתָר
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abiathar
  lexicon: Transliteración estándar
  rationale: Se usa la forma española usual del nombre propio, manteniendo la correspondencia con la tradición de transliteración bíblica en español.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: La conjunción inicial introduce contraste narrativo con la matanza previa. «Pero» reproduce bien esa fuerza adversativa en español.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al mantener la secuencia narrativa con «y» entre las dos acciones finales, en vez de separar con punto y coma. También conserva la tensión del hebreo en אַחֲרֵי דָוִד mediante una nota alternativa, como hace el POB inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable en este versículo.
  - Se usa «escapó» para וַיִּמָּלֵט y «huyó» para וַיִּבְרַח, preservando la distinción verbal.
  - 'Los nombres propios se adaptan a formas españolas habituales: Ahimelec, Ahitub, Abiatar.'
  - «Pero» expresa el contraste con el contexto previo, coherente con el valor discursivo de la waw inicial.
  - La nota al pie conserva la alternativa textual/lexical de «huyó a David» sin perder la literalidad del hebreo.
