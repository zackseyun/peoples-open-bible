review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la doble cláusula de ausencia previa, la causalidad introducida por כִּי, el causativo de הִמְטִיר, el nombre divino «Yahvé Dios» y la ausencia de un hombre para cultivar. Sin embargo, no preserva adecuadamente la distinción léxica entre הָאָרֶץ («la tierra»/earth) y הָאֲדָמָה («el suelo»/ground), distinción que el expediente inglés consideró significativa y que el hebreo marca explícitamente.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. La frase «no había todavía arbusto del campo... ni había aún planta del campo» es legible, aunque puede afinarse a una forma más paralela y fluida. El principal problema de calidad/fidelidad es repetir «tierra» para ambos sustantivos hebreos, lo que borra un contraste importante y suena menos preciso en español.
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «Yahvé» y «Dios». «Hombre» para אָדָם es defendible en este contexto. «Arbusto del campo» / «planta del campo» preserva bien la distinción entre שִׂיחַ y עֵשֶׂב. Debe corregirse la decisión sobre הָאָרֶץ / הָאֲדָמָה para reflejar «tierra» frente a «suelo» o «terreno».
  issues:
  - severity: high
    issue: No se distingue הָאָרֶץ de הָאֲדָמָה en el texto español.
    rationale: 'El hebreo usa dos sustantivos diferentes: אֶרֶץ para la tierra en sentido amplio y אֲדָמָה para el suelo/terreno cultivable. El borrador usa «tierra» en ambos casos y contradice la rationale documentada en el expediente inglés, que considera importante preservar esa diferencia.'
  - severity: medium
    issue: La segunda cláusula omite un verbo de brote más explícito para יִצְמָח.
    rationale: «Ni había aún planta del campo» se entiende por paralelismo, pero יִצְמָח añade la idea de brotar/surgir. Incluir «había brotado» o equivalente preserva mejor el matiz verbal y mejora la correspondencia con la fuente.
  - severity: low
    issue: Falta en español una nota equivalente a la alternativa inglesa sobre «hombre/humano» o «trabajar el suelo».
    rationale: No es indispensable, pero el expediente inglés preserva una alternativa para la cláusula final. Dado que la revisión propuesta introduce «suelo», conviene añadir una nota lexical alternativa para mantener esa información auditada.
  revised_spanish_text: Ahora bien, todavía no había en la tierra arbusto del campo[a], ni había brotado aún planta del campo, porque Yahvé Dios no había hecho llover sobre la tierra[b], y no había hombre para trabajar el suelo[c].
  revised_footnotes:
