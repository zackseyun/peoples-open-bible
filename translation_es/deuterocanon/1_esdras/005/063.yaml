    issue: 'Construcción inicial poco natural: «Y al oír los enemigos...»'
    rationale: Aunque intenta reflejar el participio aoristo, en español esa secuencia resulta ambigua o torpe, porque el lector puede procesar «los enemigos» como complemento de «oír» antes de resolver la oración. Una subordinada con «cuando» preserva la temporalidad de manera más clara.
