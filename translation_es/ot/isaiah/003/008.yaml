translation:
  language: es
  text: Porque Jerusalén ha tropezado, y Judá ha caído, porque su lengua y sus obras están contra Yahvé, para rebelarse contra los ojos de su gloria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la vista de su gloria». El hebreo dice literalmente «los ojos de su gloria», una expresión vívida de desafío abierto ante la presencia gloriosa de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En el primer כִּי, el valor explicativo-causal se conserva naturalmente con «Porque». Mantiene la relación con el juicio anterior sin sonar rígido.
- source_word: כָשְׁלָה
  english_pob_choice: has stumbled
  chosen_spanish: ha tropezado
  alternatives_spanish:
  - ha vacilado
  - ha tambaleado
  lexicon: HALOT
  rationale: El verbo expresa la imagen de tropiezo o tambaleo. «Ha tropezado» conserva la metáfora corporal y el matiz de caída incipiente sin forzar una ruina total.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalém
  lexicon: Transliteración estándar
  rationale: Se usa la forma española establecida del nombre propio.
- source_word: וִיהוּדָה
  english_pob_choice: and Judah
  chosen_spanish: y Judá
  alternatives_spanish:
  - e Judá
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre regional propio con la conjunción normal en español.
- source_word: נָפָל
  english_pob_choice: has fallen
  chosen_spanish: ha caído
  alternatives_spanish:
  - ha caído derribada
  - ha sucumbido
  lexicon: HALOT
  rationale: «Ha caído» es el equivalente más natural y directo del verbo, manteniendo el paralelismo poético con «ha tropezado».
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su habla
  - lo que dicen
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «lengua», que en español también puede funcionar metonímicamente por el habla. El singular posesivo refleja el hebreo colectivo.
- source_word: וּמַעַלְלֵיהֶם
  english_pob_choice: and their deeds
  chosen_spanish: y sus obras
  alternatives_spanish:
  - y sus acciones
  - y sus prácticas
  lexicon: HALOT
  rationale: «Obras» comunica el peso moral del término y encaja con la denuncia profética. Es una opción fiel y natural en español.
- source_word: אֶל יְהוָה
  english_pob_choice: are against Yahweh
  chosen_spanish: están contra Yahvé
  alternatives_spanish:
  - van contra Yahvé
  - se oponen a Yahvé
  lexicon: HALOT
  rationale: El contexto hostil justifica el sentido adversativo de אֶל. Se mantiene «Yahvé» según el criterio del proyecto para el Tetragrámaton.
- source_word: לַמְרוֹת
  english_pob_choice: to rebel against
  chosen_spanish: para rebelarse contra
  alternatives_spanish:
  - para provocar contra
  - en rebelión contra
  lexicon: HALOT
  rationale: 'La forma infinitiva expresa finalidad o resultado: «para rebelarse contra». Así se conserva la fuerza de מרה sin diluirla en una idea meramente general de oposición.'
- source_word: עֵנֵי כְבוֹדוֹ
  english_pob_choice: the eyes of his glory
  chosen_spanish: los ojos de su gloria
  alternatives_spanish:
  - la vista de su gloria
  - ante la gloria de su presencia
  lexicon: HALOT
  rationale: Se preserva la expresión literal y su tensión semántica. En español, «los ojos de su gloria» mantiene el carácter vívido e inusual del hebreo sin sustituirlo por una paráfrasis interpretativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto para el Tetragrámaton, usando «Yahvé» en el texto principal en lugar de una sustitución titulada. Esto conserva el nombre pactual revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de la cláusula final con לַמְרוֹת עֵנֵי כְבוֹדוֹ
  english_pob_reading: to rebel against the eyes of his glory
  chosen_spanish_reading: para rebelarse contra los ojos de su gloria
  alternative_spanish_readings:
  - para rebelarse ante los ojos de su gloria
  - en abierta rebeldía ante la gloria de su presencia
  rationale: Se mantiene la estructura formal de la hebrea y la tensión de una rebeldía dirigida «contra» la gloria divina. No se suaviza a una paráfrasis devocional para no perder la imaginería audaz del original.
  doctrine_reference: Isaías 3:8; nota lexical sobre עֵנֵי כְבוֹדוֹ
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que ajustó la última cláusula para reflejar mejor לַמְרוֹת como «to rebel against» y el valor hostil de אֶל. En español se reprodujo esa decisión con «para rebelarse contra», evitando una paráfrasis que suavizara el paralelismo hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera uniforme para יְהוָה.
  - Se eligieron verbos perfectivos en pasado («ha tropezado», «ha caído») para reproducir el aspecto narrativo del hebreo en contexto poético.
  - Se mantuvo la metáfora concreta de «lengua» y la expresión literal «los ojos de su gloria» para respetar el registro profético y la tensión retórica del versículo.
