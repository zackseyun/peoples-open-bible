translation:
  language: es
  text: 'Dios vino a Balaam de noche y le dijo: «Si los hombres han venido a llamarte[a], levántate, ve con ellos; pero solo la palabra que yo te diga[b], eso harás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si los hombres han venido a convocarte».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero solo el asunto que yo te diga, eso harás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: El hebreo dice אֱלֹהִים, no el nombre divino YHWH. Por eso se conserva la designación directa ‘Dios’ en español, sin armonizarla a ‘el Señor’.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: HALOT
  rationale: וַיָּבֹא expresa llegada o venida en la narrativa. ‘Vino’ mantiene el movimiento de entrada hacia Balaam sin introducir una visión o manifestación que el hebreo no especifica.
- source_word: לַיְלָה
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: ‘De noche’ es la forma natural y fiel en español para el marco temporal nocturno.
- source_word: אִם לִקְרֹא לְךָ בָּאוּ הָאֲנָשִׁים
  english_pob_choice: If the men have come to call you
  chosen_spanish: Si los hombres han venido a llamarte
  alternatives_spanish:
  - Si los hombres han venido a convocarte
  - Si los hombres han venido a llamarte para que vayas
  lexicon: HALOT
  rationale: La expresión לִקְרֹא לְךָ se traduce literalmente ‘llamarte’. El sentido de ‘convocar’ o ‘llamar para que vayas’ es posible por contexto, pero ‘llamarte’ conserva mejor la cercanía lexical del hebreo.
- source_word: קוּם לֵךְ
  english_pob_choice: rise, go
  chosen_spanish: levántate, ve
  alternatives_spanish:
  - alzate, ve
  - ponte en pie, ve
  lexicon: HALOT
  rationale: La secuencia imperativa se conserva con dos mandatos breves y naturales en español. ‘Levántate’ y ‘ve’ reflejan bien la urgencia del hebreo.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: La preposición con sufijo se expresa de manera directa como ‘con ellos’.
- source_word: וְאַךְ
  english_pob_choice: but only
  chosen_spanish: pero solo
  alternatives_spanish:
  - sin embargo, solo
  - aunque solo
  lexicon: HALOT
  rationale: אַךְ introduce restricción. ‘Pero solo’ conserva el contraste y la limitación impuesta por Dios.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la cosa
  lexicon: HALOT
  rationale: Aunque דָּבָר puede significar ‘asunto’ o ‘cosa’, en un contexto de habla profética la equivalencia más natural y precisa en español es ‘la palabra’.
- source_word: אֲדַבֵּר אֵלֶיךָ
  english_pob_choice: I speak to you
  chosen_spanish: yo te hable
  alternatives_spanish:
  - yo te hablaré
  - yo te diga
  lexicon: HALOT
  rationale: El verbo hebreo permite un valor de acción hablada inmediata. En español, el subjuntivo ‘te hable’ encaja con la cláusula relativa ‘la palabra que yo te hable’ y mantiene la relación verbal del original.
- source_word: אֹתוֹ תַעֲשֶׂה
  english_pob_choice: that you shall do
  chosen_spanish: eso harás
  alternatives_spanish:
  - lo harás
  - eso deberás hacer
  lexicon: HALOT
  rationale: La estructura enfática del hebreo coloca el objeto al frente. ‘Eso harás’ conserva la focalización y el tono imperativo sin volverlo innecesariamente explicativo.
theological_decisions:
- issue: Designación divina en la escena
  english_pob_reading: Translate אֱלֹהִים as 'God' rather than harmonizing to 'the LORD'
  chosen_spanish_reading: Traducir אֱלֹהִים como ‘Dios’
  alternative_spanish_readings:
  - el Señor
  rationale: Se mantiene la distinción del hebreo en esta frase. Aunque el contexto inmediato del relato usa el nombre divino en otros versículos, aquí la forma textual es אֱלֹהִים y la traducción no la homogeneiza.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for יְהוָה
- issue: Valor de דָּבָר en un mandato profético
  english_pob_reading: '''the word'' rather than ''the matter'''
  chosen_spanish_reading: ‘la palabra’
  alternative_spanish_readings:
  - el asunto
  - la cosa
  rationale: La elección preserva la fuerza profética y la conexión con el verbo ‘hablar’. ‘Asunto’ o ‘cosa’ sonarían más genéricos y diluirían el sentido de instrucción verbal autorizada.
  doctrine_reference: Lexical consistency for prophetic speech
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el registro de la POB en inglés. Se retuvieron las decisiones auditadas: אֱלֹהִים = ‘Dios’, לַיְלָה = ‘de noche’, קוּם לֵךְ = ‘levántate, ve’, וְאַךְ = ‘pero solo’, y אֹתוֹ תַעֲשֶׂה con énfasis final ‘eso harás’. La nota de alternativa para לִקְרֹא לְךָ se mantiene porque el español también admite ‘convocar’ como posibilidad contextual, aunque ‘llamarte’ es más cercano al hebreo.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ en lugar de ‘el Señor’ para respetar la forma hebrea אֱלֹהִים.
  - Se evita ‘Cristo’ o cualquier terminología cristológica porque el verso no la contiene.
  - Se mantiene el paralelismo entre ‘hablar’ y ‘palabra’ para conservar el matiz profético.
  - El estilo es formal y claro, con puntuación española y comillas angulares para el discurso directo.
