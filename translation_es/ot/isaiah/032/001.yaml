translation:
  language: es
  text: He aquí[a], un rey reinará en justicia[b][d], y los príncipes[c] gobernarán con justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira» o «Ve» para la interjección inicial.
    reason: lexical_alternative
  - marker: b
    text: O «un rey reinará justamente»; hebreo «en justicia».
    reason: lexical_alternative
  - marker: c
    text: «Príncipes» también puede traducirse «gobernantes» o «oficiales».
    reason: lexical_alternative
  - marker: d
    text: Muchos lectores cristianos entienden a este rey en sentido mesiánico dentro del contexto más amplio, pero el hebreo aquí simplemente dice «un rey».
    reason: cross_reference
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Ve
  - Observa
  lexicon: HALOT
  rationale: La interjección hebrea introduce una afirmación enfática y de atención profética. «He aquí» conserva mejor ese valor solemne y de anuncio que un simple «mira» o «ve», sin volverse artificial en español bíblico contemporáneo.
- source_word: לְצֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - para justicia
  - justamente
  lexicon: HALOT
  rationale: La preposición ל con צֶדֶק expresa aquí la esfera o norma del reinado. «En justicia» mantiene el sustantivo y su peso ético-jurídico, más cercano al hebreo que un adverbio como «justamente».
- source_word: יִמְלָךְ מֶלֶךְ
  english_pob_choice: a king will reign
  chosen_spanish: un rey reinará
  alternatives_spanish:
  - el rey reinará
  - reinará un rey
  - un rey gobernará
  lexicon: HALOT
  rationale: El hebreo no lleva artículo con מֶלֶךְ, así que «un rey» respeta la indefinición. El futuro simple expresa bien el yiqtol. Se evita identificar al rey de forma explícita en el texto principal, porque la gramática no lo hace.
- source_word: וּלְשָׂרִים
  english_pob_choice: and princes
  chosen_spanish: y los príncipes
  alternatives_spanish:
  - y los gobernantes
  - y los oficiales
  - y los jefes
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar príncipes, gobernantes u oficiales. «Príncipes» conserva mejor el paralelo cortesano con «rey» y sigue la opción inglesa del POB, sin perder dignidad ni amplitud semántica.
- source_word: לְמִשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - para justicia
  - según justicia
  - con juicio
  lexicon: HALOT
  rationale: La frase señala el modo o norma del gobierno. «Con justicia» es natural en español y preserva el sentido judicial-ético de מִשְׁפָּט sin reducirlo a un «juicio» más estrecho o punitivo.
- source_word: יָשֹׂרוּ
  english_pob_choice: will rule
  chosen_spanish: gobernarán
  alternatives_spanish:
  - reinarán
  - dirigirán
  - ejercerán gobierno
  lexicon: HALOT
  rationale: El verbo שׂרר apunta a ejercer autoridad o gobierno. En español, «gobernarán» comunica bien esa función de los שָׂרִים en contexto político. «Reinarán» sería demasiado fuerte para el segundo miembro y rompería el paralelismo.
theological_decisions:
- issue: Identidad del rey en el texto principal
  english_pob_reading: Retain the indefinite expression 'a king' without identifying him as the Messiah in translation.
  chosen_spanish_reading: Mantener «un rey» sin explicitar en el texto principal que se trata del Mesías.
  alternative_spanish_readings:
  - el rey
  - un rey mesiánico
  - el Mesías reinará
  rationale: El hebreo presenta un sustantivo indefinido y no nombra al Mesías. La traducción conserva esa tensión y evita introducir una conclusión doctrinal en el cuerpo del versículo. La posible lectura mesiánica queda abierta para el contexto interpretativo, no impuesta por la redacción.
  doctrine_reference: Fidelidad al texto original y preservación de la tensión interpretativa; no resolver en traducción lo que la gramática hebrea no explicita.
- issue: Valor de צֶדֶק / מִשְׁפָּט como pares ético-jurídicos
  english_pob_reading: in righteousness ... with justice
  chosen_spanish_reading: en justicia ... con justicia
  alternative_spanish_readings:
  - en rectitud ... con juicio
  - en rectitud ... con justicia
  - justamente ... con justicia
  rationale: Ambos términos se mantienen como «justicia» para conservar el paralelismo semántico del hebreo. Aunque existe cierta superposición, el contexto de gobierno y orden legal justifica mantener el peso judicial-moral sin crear una diferenciación artificial que el texto no exige.
  doctrine_reference: Lexical fidelity and parallelism preservation in prophetic Hebrew.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el paquete hebreo WLC y el auditable English POB. No se introdujeron revisiones textuales adicionales; se conservó la indefinición de מֶלֶךְ y el paralelismo entre צֶדֶק y מִשְׁפָּט.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - «Justicia» se emplea para ambos miembros por fidelidad al paralelismo hebreo.
  - «Príncipes» se mantiene como término cortesano y gobernante coherente con el contexto.
  - La puntuación y el registro buscan ser publicables y eclesialmente legibles en español moderno.
