theological_decisions:
- issue: Whether to render the servant's burdens as physical illness language or generalized emotional suffering
  chosen_reading: physical illness language in the main text ('sicknesses' / 'pains')
  alternative_readings:
  - generalized suffering ('griefs' / 'sorrows')
  rationale: The Hebrew nouns חֳלִי and מַכְאוֹב most naturally denote sickness and pain. Because the translation philosophy prioritizes original-language primacy over inherited English tradition, the main text keeps the more concrete lexical sense. The broader redemptive significance can be recognized by readers and in intertextual use without flattening the Hebrew into purely emotional terms.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: How explicitly to state divine agency in מֻכֵּה אֱלֹהִים
  chosen_reading: 'explicit divine agency: ''struck down by God'''
  alternative_readings:
  - '''smitten by God'''
  - '''stricken by God'''
  rationale: The construct clearly attributes the striking to God. The translation should not mute that agency, even though the verse also contrasts human misperception with the servant's actual burden-bearing.
  doctrine_reference: Translation philosophy §1, §5
