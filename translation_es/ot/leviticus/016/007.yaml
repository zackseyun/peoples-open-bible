review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: secuencia ritual futura (''tomará''), dos animales, colocación ante Yahvé, y ubicación en la entrada de la tienda de reunión. Sin embargo, introduce una especificación léxica no escogida por el POB inglés en שְׂעִירִם al traducir ''machos cabríos'' en vez de la opción más neutra y suficiente ''cabras/cabras machos/goats''; en español, ''machos cabríos'' es fiel pero algo pesado y más específico de lo necesario según la justificación auditada.'
  spanish_quality_summary: El español es claro y digno. No obstante, la nota [a] está anclada en 'pondrá' aunque explica 'delante de Yahvé'; debe moverse al sintagma pertinente. Además, 'los dos machos cabríos' suena más cargado de lo necesario; 'los dos chivos' o 'las dos cabras' podrían variar regionalmente, pero 'los dos cabros' también es menos panhispánico. La reparación mínima y más estable es 'los dos cabríos', que conserva naturalidad y evita sobreespecificación.
  glossary_alignment: 'Alinea correctamente Yahvé para יְהוָה y ''tienda de reunión'' para אֹהֶל מוֹעֵד. No hay conflicto doctrinal. La principal desviación es lexical: el proyecto inglés eligió no forzar el rasgo masculino de שְׂעִירִם en este versículo, por lo que conviene no endurecerlo innecesariamente en español.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'pondrá' en vez de en 'Yahvé' o 'delante de Yahvé'.
    rationale: La nota explica la traducción de לִפְנֵי יְהוָה y el nombre divino; por disciplina editorial, el marcador debe aparecer en la palabra o frase relevante.
  - severity: medium
    issue: '''los dos machos cabríos'' sobreespecifica שְׂעִירִם frente a la decisión auditada del POB.'
    rationale: La evidencia permite 'macho cabrío', pero el POB inglés justificó que 'goats' bastaba en este contexto. En español conviene una solución fiel pero menos pesada y menos interpretativa.
  revised_spanish_text: Y tomará los dos cabríos y los pondrá delante de Yahvé[a], a la entrada de la tienda de reunión.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «delante de Yahvé». Se mantiene el nombre divino conforme a la convención del proyecto.'
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a la frase que comenta y se ajusta שְׂעִירִם a una formulación española más sobria y más alineada con la decisión auditada de no enfatizar innecesariamente el sexo del animal en este versículo. El resto del texto es fiel y natural.
