translation:
  language: es
  text: Se levantaron y fueron a Zif delante de Saúl. Ahora David y sus hombres estaban en el desierto de Maón, en la Arabá, al sur del Jesimón[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la derecha del Jesimón». La expresión hebrea dice literalmente «derecha/lado derecho», que en uso geográfico puede significar «sur».'
    reason: lexical_alternative
  - marker: b
    text: «Jesimón» puede entenderse también como «desierto» o «despoblado», pero aquí probablemente funciona como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: They arose
  chosen_spanish: Se levantaron
  alternatives_spanish:
  - Se pusieron en pie
  - Se alzaron
  lexicon: HALOT
  rationale: El verbo קום en narración consecutiva expresa la acción siguiente de ponerse en movimiento. En español, «se levantaron» mantiene la secuencia narrativa con naturalidad y sin añadir matices no presentes en el hebreo.
- source_word: וַיֵּלְכוּ
  english_pob_choice: and went
  chosen_spanish: y fueron
  alternatives_spanish:
  - y fueron de camino
  - y partieron
  lexicon: HALOT
  rationale: הלך en este contexto narrativo simple significa ir. «Fueron» es directo y preserva el movimiento hacia Zif sin sobredeterminar el tipo de viaje.
- source_word: זִיפָה
  english_pob_choice: to Ziph
  chosen_spanish: a Zif
  alternatives_spanish:
  - hacia Zif
  - a la ciudad de Zif
  lexicon: HALOT
  rationale: La ה direccional indica movimiento hacia el lugar. «A Zif» conserva el valor direccional de forma natural en español.
- source_word: לִפְנֵי שָׁאוּל
  english_pob_choice: ahead of Saul
  chosen_spanish: delante de Saúl
  alternatives_spanish:
  - antes de Saúl
  - en presencia de Saúl
  lexicon: HALOT
  rationale: Aquí לִפְנֵי es espacial y/o de precedencia. «Delante de Saúl» comunica con claridad que iban por delante de él, sin reducirlo a un sentido meramente temporal.
- source_word: בְּמִדְבַּר מָעוֹן
  english_pob_choice: in the wilderness of Maon
  chosen_spanish: en el desierto de Maón
  alternatives_spanish:
  - en el desierto de Maón
  - en la región desértica de Maón
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «despoblado». Dado el uso geográfico narrativo, «desierto de Maón» es una opción natural en español y conserva la referencia topográfica.
- source_word: בָּעֲרָבָה
  english_pob_choice: in the Arabah
  chosen_spanish: en la Arabá
  alternatives_spanish:
  - en el Arabá
  - en la llanura
  lexicon: HALOT
  rationale: Aquí עֲרָבָה funciona probablemente como designación geográfica. Se conserva «Arabá» para mantener el valor de nombre regional en vez de neutralizarlo como simple «llanura».
- source_word: אֶל יְמִין הַיְשִׁימוֹן
  english_pob_choice: to the south of the Jeshimon
  chosen_spanish: al sur del Jesimón
  alternatives_spanish:
  - a la derecha del Jesimón
  - al lado derecho del Jesimón
  lexicon: HALOT
  rationale: יַמִין literalmente es «derecha», pero en orientación geográfica puede señalar el sur. En este contexto topográfico, «al sur de» expresa el sentido probable del hebreo con mayor claridad en español.
- source_word: הַיְשִׁימוֹן
  english_pob_choice: the Jeshimon
  chosen_spanish: el Jesimón
  alternatives_spanish:
  - el Jeshimon
  - el desierto
  lexicon: HALOT
  rationale: Se retiene como topónimo. La forma «Jesimón» refleja la adaptación castellana del nombre y evita perder el probable valor de lugar propio.
theological_decisions:
- issue: Sentido direccional de יָמִין en una descripción geográfica
  english_pob_reading: to the south of the Jeshimon
  chosen_spanish_reading: al sur del Jesimón
  alternative_spanish_readings:
  - a la derecha del Jesimón
  - al lado derecho del Jesimón
  rationale: La tensión entre el sentido literal («derecha») y el valor geográfico («sur») se resuelve siguiendo el uso topográfico documentado en el contexto. La redacción española conserva el sentido geográfico sin ocultar que el hebreo usa la noción de derecha.
  doctrine_reference: Ninguna; decisión geográfica y semántica.
- issue: Tratamiento de הַיְשִׁימוֹן como topónimo o sustantivo común
  english_pob_reading: the Jeshimon may also be understood as 'the wasteland' or 'the desert,' but here it likely functions as a place name
  chosen_spanish_reading: el Jesimón como topónimo
  alternative_spanish_readings:
  - el desierto
  - el despoblado
  rationale: 'Se sigue la lectura auditada de la POB inglesa: aunque el sustantivo puede ser común, aquí probablemente funciona como nombre de lugar. La traducción mantiene esa ambigüedad en nota.'
  doctrine_reference: Ninguna; decisión lexical/topográfica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la POB inglesa, que precisó «to the south of the Jeshimon» para reflejar con mayor naturalidad la orientación geográfica de אֶל יְמִין. La versión española adopta ese mismo ajuste semántico.
  spanish_consistency_notes:
  - Se conservó Yahvé como norma general para el Tetragrámaton en este proyecto, pero este versículo no lo contiene.
  - Se usó «desierto» para מִדְבָּר y «Arabá» como nombre regional, manteniendo la distinción entre un término común y un topónimo.
  - Se mantuvo la forma de lugar «Jesimón» en el texto principal y se explicó en nota la posibilidad de un sentido común.
