translation:
  language: es
  text: Partieron de Iyim y acamparon en Dibon-gad[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asentaron el campamento». El verbo hebreo suele emplearse para instalar campamento en las fórmulas de itinerario del desierto.
    reason: lexical_alternative
  - marker: b
    text: El nombre del lugar también puede transliterarse «Iyyim» o «Iim».
