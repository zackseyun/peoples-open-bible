theological_decisions:
- issue: Divine judgment language and anthropomorphic idiom
  chosen_reading: Retain 'I struck down,' 'in my anger and in my wrath,' and 'I have hidden my face' as direct divine speech.
  alternative_readings:
  - Soften to impersonal disaster language
  - Interpret 'hidden my face' non-literally without preserving the idiom
  rationale: The verse explicitly attributes judgment to God and uses covenantal anthropomorphic language. Optimal equivalence preserves this theological weight rather than softening it. 'Hidden my face' is maintained because it is a significant biblical idiom for withdrawn favor/presence.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering אָדָם
  chosen_reading: men
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine default allows 'man / humankind' contextually. Here the phrase refers to concrete war dead in Jerusalem, not humanity in general. 'Men' is gender-accurate to the context and idiomatic in English, while the footnote preserves the broader lexical possibility.
  doctrine_reference: 'Contested terms table: אָדָם; Translation philosophy §4'
