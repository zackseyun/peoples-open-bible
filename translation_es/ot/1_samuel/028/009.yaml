translation:
  language: es
  text: 'Pero la mujer le dijo: «Mira, tú mismo sabes lo que ha hecho Saúl: que ha eliminado del país a las médiums[a] y a los espiritistas[b]. Entonces, ¿por qué tiendes una trampa contra mi vida, para matarme?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Médiums» traduce aquí el hebreo אָבוֹת, es decir, practicantes asociados con consulta a espíritus o a los muertos. Alternativamente: «los que tienen espíritus familiares».'
    reason: lexical_alternative
  - marker: b
    text: '«Espiritistas» refleja el hebreo הַיִּדְּעֹנִי, una categoría de personas que reclamaban conocimiento oculto o mediación espiritual. Alternativamente: «adivinos» o, en lenguaje más tradicional, «hechiceros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La conjunción narrativa admite matiz adversativo en este contexto de respuesta cautelosa; en español, «Pero» conserva esa tensión sin sonar forzado.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la mujer de Endor
  lexicon: HALOT
  rationale: El hebreo es directo; el contexto ya identifica a la mujer, por lo que «la mujer» basta y mantiene la simplicidad del texto fuente.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: Introduce énfasis y llama la atención. «Mira» es natural en español moderno y preserva ese valor discursivo.
- source_word: אַתָּה יָדַעְתָּ
  english_pob_choice: you yourself know
  chosen_spanish: tú mismo sabes
  alternatives_spanish:
  - tú sabes
  - ciertamente sabes
  lexicon: HALOT
  rationale: El pronombre explícito intensifica la afirmación; «tú mismo sabes» reproduce mejor esa fuerza que un simple «sabes».
- source_word: אֵת אֲשֶׁר עָשָׂה שָׁאוּל
  english_pob_choice: what Saul has done
  chosen_spanish: lo que ha hecho Saúl
  alternatives_spanish:
  - lo que Saúl hizo
  - aquello que hizo Saúl
  lexicon: HALOT
  rationale: La frase relativa se vierte de manera idiomática y fiel; el presente perfecto mantiene la vigencia de la acción para el momento del relato.
- source_word: הִכְרִית
  english_pob_choice: has cut off
  chosen_spanish: ha expulsado
  alternatives_spanish:
  - ha eliminado
  - ha extirpado
  - ha apartado
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente sugiere «cortar off/arrancar», en este contexto de prohibición y remoción de practicantes ocultistas, «ha expulsado» comunica con claridad la medida tomada por Saúl sin suavizarla.
- source_word: הָאֹבוֹת
  english_pob_choice: the mediums
  chosen_spanish: las médiums
  alternatives_spanish:
  - las médium
  - las evocadoras de espíritus
  - las nigromantes
  lexicon: HALOT
  rationale: El término designa practicantes de consulta con los muertos/espíritus. «Médiums» es un equivalente moderno claro; se conserva el valor funcional del término sin asumir folklore posterior.
- source_word: הַיִּדְּעֹנִי
  english_pob_choice: the spiritists
  chosen_spanish: los adivinos
  alternatives_spanish:
  - los espiritistas
  - los videntes
  - los nigromantes
  lexicon: HALOT
  rationale: El término apunta a personas con pretensión de conocimiento oculto. «Adivinos» ofrece una categoría comprensible en español y evita la connotación engañosa de «hechiceros» o «magos».
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: del país
  alternatives_spanish:
  - de la tierra
  - de la región
  lexicon: HALOT
  rationale: En este contexto se refiere al territorio bajo la jurisdicción de Israel. «Del país» suena natural en español y conserva la referencia territorial concreta.
- source_word: וְלָמָה
  english_pob_choice: So why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - Entonces, ¿por qué?
  - ¿Por qué, entonces?
  lexicon: HALOT
  rationale: La partícula introduce una inferencia lógica desde la conducta de Saúl; en español la conexión se expresa con una pregunta natural que conserva la relación argumentativa.
- source_word: מִתְנַקֵּשׁ
  english_pob_choice: are you laying a snare
  chosen_spanish: tiendes una trampa
  alternatives_spanish:
  - me acechas
  - estás poniendo una trampa
  - me estás cazando
  lexicon: HALOT
  rationale: El verbo expresa hostilidad cautelosa y la idea de enredar/atrapar. «Tiendes una trampa» conserva la metáfora y resulta idiomático en español.
- source_word: בְּנַפְשִׁי
  english_pob_choice: for my life
  chosen_spanish: para mi vida
  alternatives_spanish:
  - contra mi vida
  - sobre mi vida
  lexicon: HALOT
  rationale: El hebreo apunta a la vida como objetivo amenazado. «Para mi vida» mantiene la construcción del enredo/trampa; «contra mi vida» sería posible, pero menos fluido aquí.
- source_word: לַהֲמִיתֵנִי
  english_pob_choice: to put me to death
  chosen_spanish: para matarme
  alternatives_spanish:
  - para darme muerte
  - para ejecutarme
  lexicon: HALOT
  rationale: La finalidad homicida es explícita; «para matarme» es directo y fiel, sin cargar un matiz jurídico que el contexto inmediato no exige.
theological_decisions:
- issue: Cómo nombrar a los practicantes ocultistas expulsados por Saúl
  english_pob_reading: mediums and spiritists
  chosen_spanish_reading: médiums y adivinos
  alternative_spanish_readings:
  - médiums y espiritistas
  - los que tienen espíritu familiar y los adivinos
  - necromantes y adivinos
  rationale: La POB inglesa evita términos folclóricos y elige categorías funcionales comprensibles. En español, «médiums» conserva el referente básico del hebreo אָבוֹת; «adivinos» transmite la clase de especialistas de ידעוני sin introducir un tecnicismo menos natural. Se preserva así la condena a prácticas ocultas sin suavizarlas.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la auditoría inglesa revisada: mantiene la relación adversativa de וַתֹּאמֶר con «Pero», reproduce el énfasis de אַתָּה יָדַעְתָּ con «tú mismo sabes», y conserva la progresión lógica de «¿Y por qué...?» para וְלָמָה. También refleja la revisión inglesa que precisó אֲשֶׁר como «that» en vez de «how», aquí vertido de forma directa en «que ha expulsado».'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto, porque el pasaje no lo exige.
  - 'Se mantuvo un registro léxico coherente para términos ocultistas: «médiums» para אָבוֹת y «adivinos» para יִדְּעֹנִי.'
  - La puntuación reproduce una cita directa natural en español, con énfasis inicial equivalente a הִנֵּה.
