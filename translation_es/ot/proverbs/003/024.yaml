translation:
  language: es
  text: Si te acuestas, no tendrás miedo; cuando te acuestes, tu sueño será agradable[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu sueño será dulce».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición o circunstancia general. «Si» conserva esa fuerza básica en español; el contexto permite entenderla como una situación habitual sin volverla mecánicamente hipotética.
- source_word: תִּשְׁכַּב
  english_pob_choice: you lie down
  chosen_spanish: te acuestas
  alternatives_spanish:
  - te vas a acostar
  - te recuestas
  lexicon: HALOT
  rationale: De שׁכב, aquí en el sentido natural de acostarse para dormir. «Te acuestas» es idiomático en español y mantiene la imagen corporal simple del hebreo.
- source_word: לֹא תִפְחָד
  english_pob_choice: you will not be afraid
  chosen_spanish: no tendrás miedo
  alternatives_spanish:
  - no temerás
  - no necesitarás tener miedo
  lexicon: HALOT
  rationale: El imperfecto con negación expresa seguridad/resultados futuros. «No tendrás miedo» reproduce bien la garantía emocional de פחד en un español natural.
- source_word: וְשָׁכַבְתָּ
  english_pob_choice: when you lie down
  chosen_spanish: cuando te acuestes
  alternatives_spanish:
  - y te acuestas
  - y al acostarte
  lexicon: HALOT
  rationale: La forma con waw y perfecto continúa la idea con matiz temporal/resultativo. «Cuando te acuestes» evita una coordinación dura en español y conserva la progresión del paralelismo.
- source_word: וְעָרְבָה
  english_pob_choice: will be pleasant
  chosen_spanish: será agradable
  alternatives_spanish:
  - será dulce
  - será placentero
  lexicon: HALOT
  rationale: De ערב en el sentido de ser agradable o dulce. «Agradable» comunica bien el valor semántico en español actual sin perder la posibilidad literal de «dulce».
- source_word: שְׁנָתֶךָ
  english_pob_choice: your sleep
  chosen_spanish: tu sueño
  alternatives_spanish:
  - tu dormir
  - tu descanso
  lexicon: HALOT
  rationale: Se refiere al estado de sueño. «Tu sueño» es claro y directo en español; «descanso» suaviza el término, pero desplaza ligeramente el foco semántico.
translation_notes:
  revision_awareness: El texto inglés más reciente se mantiene sin cambios; la versión española sigue la misma estructura de seguridad condicional y el mismo valor léxico principal de «pleasant/sweet» con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Si» para la particula condicional hebrea, manteniendo la apertura del verso sin introducir una promesa distinta.
  - «Tu sueño» conserva el referente de שְׁנָתֶךָ y evita tecnicismos innecesarios.
  - La nota «dulce» preserva la alternativa léxica tradicional documentada por el POB inglés, sin reemplazar el término principal «agradable».
