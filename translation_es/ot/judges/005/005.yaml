translation:
  language: es
  text: Los montes se derritieron[a] ante Yahvé[b], este Sinaí ante Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «fluyeron» o «corrieron hacia abajo»; el verbo hebreo significa fluir o gotear, y muchas traducciones lo interpretan como «se derritieron».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «de delante de la presencia de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los montes
  lexicon: HALOT
  rationale: El hebreo tiene artículo definido; en español, "los montes" suena natural en poesía bíblica y conserva la imagen del relieve elevado. "Montañas" también sería posible, pero "montes" evita un tono más moderno o geográfico.
- source_word: נָזְלוּ
  english_pob_choice: quaked / flowed down
  chosen_spanish: se derritieron
  alternatives_spanish:
  - se deslizaron
  - fluyeron hacia abajo
  - se fundieron
  lexicon: HALOT
  rationale: El verbo base significa fluir, correr o gotear, pero en este contexto poético de teofanía la imagen tradicional de derretirse comunica bien el efecto visual y retiene la tensión interpretativa reconocida en la tradición de traducción. Se evita fijar una sola lectura demasiado literal que suene extraña en español.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - de delante de
  - por la presencia de
  - en presencia de
  lexicon: HALOT
  rationale: '"Ante" expresa bien la idea de estar en la presencia de alguien en un registro bíblico y poético. La alternativa más literal "de delante de" es más pesada en español, aunque refleja mejor el hebraísmo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Tetragrámaton: usar "Yahvé" en el texto principal español, preservando el nombre divino revelado en lugar de sustituirlo por un título.'
- source_word: זֶה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - éste
  - tal
  lexicon: HALOT
  rationale: El demostrativo es abrupto y poético. "Este Sinaí" conserva la deixis del hebreo sin añadir elementos que no están en el texto.
- source_word: סִינַי
  english_pob_choice: Sinai
  chosen_spanish: Sinaí
  alternatives_spanish:
  - Monte Sinaí
  lexicon: HALOT
  rationale: El hebreo dice simplemente "Sinaí"; en español se mantiene el nombre propio sin añadir "monte", que no aparece en la fuente.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de manera natural y fiel como "el Dios de Israel", manteniendo la identificación pactual sin sobreinterpretarla.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El recordatorio doctrinal del proyecto favorece la transliteración del nombre divino. "Yahvé" preserva la referencia personal y pactal del Tetragrámaton y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen poética de los montes en la teofanía
  english_pob_reading: The mountains quaked / flowed down before Yahweh
  chosen_spanish_reading: Los montes se derritieron ante Yahvé
  alternative_spanish_readings:
  - Los montes temblaron ante Yahvé
  - Los montes fluyeron ante Yahvé
  rationale: El hebreo usa una imagen verbal que puede entenderse como fluir o deshacerse. En español, "se derritieron" conserva la fuerza imagística y la ambigüedad poética sin reducirla a una explicación prosaica. Se evita "temblaron" porque desplaza el sentido hacia un efecto sísmico no expresado por el verbo.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source text''s plain sense'
translation_notes:
  revision_awareness: El registro inglés de referencia muestra una revisión reciente que cambió la imagen verbal de "flowed down" a "quaked" por naturalidad contextual. En español se ha elegido una solución intermedia y auditable, "se derritieron", que mantiene la imagen poética del verbo hebreo y también conversa con la tradición interpretativa que ve aquí una reacción intensa de la creación ante la presencia divina.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva "Sinaí" sin añadir "monte", ya que el hebreo no lo explicita.
  - '"Los montes" respeta el artículo definido del hebreo y su tono poético.'
  - La nota al pie ancla la alternativa literal de מִפְּנֵי sin duplicar la explicación en el cuerpo del texto.
