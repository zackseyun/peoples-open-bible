translation:
  language: es
  text: Él arremete contra él con el cuello[a], con las protuberancias gruesas de sus escudos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Él arremete contra él con el cuello extendido, con las protuberancias gruesas de sus escudos». El hebreo presenta una imagen muy vívida y algo comprimida.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרוּץ
  english_pob_choice: rushes
  chosen_spanish: arremete
  alternatives_spanish:
  - corre
  - embiste
  lexicon: HALOT
  rationale: En un contexto hostil, el hebreo רוץ expresa un avance rápido y agresivo. «Arremete» comunica ese movimiento ofensivo sin exagerarlo con un matiz militar más fuerte de lo que exige el texto.
- source_word: אֵלָיו
  english_pob_choice: at him
  chosen_spanish: contra él
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: HALOT
  rationale: Aunque la preposición puede ser direccional, aquí el contexto es de ataque. «Contra él» preserva el sentido adversativo que la POB inglesa resolvió con «at him».
- source_word: בְּצַוָּאר
  english_pob_choice: with his neck
  chosen_spanish: con el cuello
  alternatives_spanish:
  - con el cuello extendido
  - con el cuello erguido
  lexicon: HALOT
  rationale: El hebreo dice literalmente «con cuello». Mantengo la imagen concreta en español y dejo implícita la postura sugerida por el contexto, sin introducir un rasgo no explicitado por el texto.
- source_word: בַּעֲבִי
  english_pob_choice: with the thick
  chosen_spanish: con los abultados
  alternatives_spanish:
  - con los gruesos
  - con la masa
  lexicon: HALOT
  rationale: עֳבִי expresa grosor o masa. En español, «abultados» ayuda a transmitir la idea de prominencia física cuando se une a los salientes del escudo, sin perder la noción de espesor.
- source_word: גַּבֵּי
  english_pob_choice: bosses
  chosen_spanish: salientes
  alternatives_spanish:
  - umbrones
  - bosses
  lexicon: HALOT
  rationale: En relación con escudos, el término alude a las protuberancias o partes convexas. «Salientes» es comprensible en español y conserva la imagen de relieve físico; «bosses» sería demasiado técnico o poco natural.
- source_word: מָגִנָּיו
  english_pob_choice: his shields
  chosen_spanish: sus escudos
  alternatives_spanish:
  - su escudo
  lexicon: HALOT
  rationale: La forma hebrea es plural con sufijo de tercera persona masculina singular. Por eso se conserva el plural «escudos», que refleja con precisión la forma del original.
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo directamente, en diálogo con la solución auditada de la POB inglesa. Se conserva el carácter comprimido e imagístico del verso y se evita suavizar la pluralidad de «sus escudos».
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo interno de la imagen: avance violento + cuello + relieve de los escudos.'
  - Se evitó traducir «Yahvé» o terminología teológica ajena porque el verso no contiene nombres divinos ni conceptos doctrinales explícitos.
  - Se preservó el plural de «escudos» para reflejar con fidelidad la morfología hebrea.
