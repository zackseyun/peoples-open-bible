base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/033.yaml
  text: And when this people[a], or a prophet, or a priest asks you, saying, ‘What is the burden of Yahweh?’ then you shall say to them[b], ‘What burden? I will cast you off,’ declares Yahweh.
  footnotes:
  - marker: a
    text: 'Hebrew מַשָּׂא (massaʾ) can mean ''burden'' or ''oracle/message.'' The verse likely uses deliberate wordplay: those asking for the LORD’s ''burden'' are themselves called the burden.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'What burden?' The Hebrew of the reply is difficult, and some understand it as rejecting the phrase 'the burden of the LORD' rather than saying, 'You are the burden.'
    reason: alternative_reading
