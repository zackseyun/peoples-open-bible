base_translation:
  language: en
  yaml_path: translation/ot/joshua/004/012.yaml
  text: And the sons of Reuben[a], the sons of Gad, and the half-tribe of Manasseh crossed over armed before the sons of Israel[c][b], just as Moses had spoken to them.
  footnotes:
  - marker: a
    text: Or 'the Reubenites, the Gadites, and the half-tribe of Manasseh.' The Hebrew more literally reads 'the sons of Reuben ... the sons of Gad ...'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' The Hebrew more literally reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: '''Armed'' renders a Hebrew term that can denote being equipped or arranged for battle; some have proposed a more literal sense such as ''arrayed in ranks.'''
    reason: lexical_alternative
