translation:
  language: es
  text: Desde el día en que sus padres salieron de la tierra de Egipto hasta este día[a], yo les he enviado a todos mis siervos, los profetas, día tras día[b]; me levantaba temprano y los enviaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus antepasados salieron de la tierra de Egipto».'
    reason: alternative_reading
  - marker: b
    text: 'Modismo hebreo: «levantándose temprano y enviando», que expresa la acción repetida, persistente y solícita de enviar a los profetas.'
    reason: cultural_note
lexical_decisions:
- source_word: לְמִן הַיּוֹם אֲשֶׁר
  english_pob_choice: From the day ...
  chosen_spanish: Desde el día en que ...
  alternatives_spanish:
  - Desde el tiempo en que ...
  - Desde que ...
  lexicon: HALOT
  rationale: La expresión compuesta marca el punto de partida de un lapso temporal. En español, «Desde el día en que» conserva bien ese inicio y suena natural sin perder precisión.
- source_word: יָצְאוּ אֲבוֹתֵיכֶם
  english_pob_choice: your fathers came out
  chosen_spanish: sus padres salieron
  alternatives_spanish:
  - sus antepasados salieron
  - sus padres salieron de
  lexicon: HALOT
  rationale: «אָבוֹת» puede referirse a padres literales o a antepasados. La opción «sus padres» conserva la forma idiomática hebrea; el contexto histórico muestra que se trata de los antepasados de Israel.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: Se mantiene la fórmula amplia «tierra de Egipto», porque el hebreo conserva esa resonancia histórica y pactal que no conviene reducir sin necesidad.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - a este día
  lexicon: HALOT
  rationale: Es la equivalencia natural en español para expresar continuidad hasta el presente del hablante. Conserva el sentido temporal completo del hebreo.
- source_word: וָאֶשְׁלַח
  english_pob_choice: I have sent
  chosen_spanish: yo les he enviado
  alternatives_spanish:
  - yo envié
  - yo enviaba
  lexicon: HALOT
  rationale: En este contexto, que abarca desde el éxodo hasta el presente de Jeremías, el perfecto compuesto español comunica mejor la acción reiterada que llega hasta el momento de referencia.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El plural está claro por el contexto. En español, el dativo «les» suena natural y mantiene el destinatario plural sin sobrecargar la frase.
- source_word: אֶת כָּל עֲבָדַי הַנְּבִיאִים
  english_pob_choice: all my servants the prophets
  chosen_spanish: todos mis siervos, los profetas
  alternatives_spanish:
  - todos mis servidores, los profetas
  - todos mis siervos, profetas
  lexicon: HALOT
  rationale: «Siervos» mantiene el valor de agente comisionado que el contexto exige. Se evita «esclavos» porque aquí no se enfatiza estado servil, sino servicio profético autorizado. La aposición con coma hace explícita la identificación de los profetas.
- source_word: יוֹם
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - día a día
  lexicon: HALOT
  rationale: El singular adverbial expresa repetición continua. «Día tras día» reproduce bien la insistencia y la persistencia del hebreo en un español natural.
- source_word: הַשְׁכֵּם
  english_pob_choice: rising early
  chosen_spanish: madrugando
  alternatives_spanish:
  - levantándome de madrugada
  - alzándome temprano
  lexicon: HALOT
  rationale: En Jeremías, la construcción forma un modismo de prontitud y empeño. «Madrugando» conserva la idea de prontitud reiterada con fluidez en español.
- source_word: וְשָׁלֹחַ
  english_pob_choice: and sending them
  chosen_spanish: y enviándolos
  alternatives_spanish:
  - y enviando
  - y los enviaba
  lexicon: HALOT
  rationale: El infinitivo continúa el modismo junto con «madrugando». «Enviándolos» explicita por el contexto que los enviados son los profetas, sin añadir contenido ajeno al hebreo.
theological_decisions:
- issue: עֲבָדַי aplicado a los profetas
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - esclavos
  - servidores
  rationale: La relación aquí es de comisión divina, no de esclavitud servil en sentido social. «Siervos» preserva la dignidad funcional del cargo profético y evita introducir una connotación no focalizada por el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; sensitivity of bonded-status terms by context
- issue: El modismo hebreo «rising early and sending»
  english_pob_reading: day after day, rising early and sending them
  chosen_spanish_reading: día tras día, madrugando y enviándolos
  alternative_spanish_readings:
  - cada día, levantándose temprano y enviándolos
  - una y otra vez, madrugando y enviándolos
  rationale: El hebreo expresa insistencia, prontitud y repetición. La redacción española mantiene el valor idiomático sin convertirlo en una mera paráfrasis explicativa ni perder el matiz de urgencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; idioms and aspect in prophetic discourse
translation_notes:
  revision_awareness: 'Coincide con el expediente inglés revisado: no hubo revisiones aplicadas y el juicio de alta concordancia se mantiene. La versión española conserva la línea temporal continua desde el éxodo, la identificación de los profetas como siervos de Yahvé y el modismo hebreo de envío insistente.'
  spanish_consistency_notes:
  - Se mantiene «tierra de Egipto» por consistencia con la fórmula histórica bíblica.
  - Se usa «Yahvé» solo donde el texto hebreo tuviera el nombre divino explícito; aquí no aparece, por lo que no se introduce.
  - «Siervos» se usa como término funcional, no como traducción generalizada de δοῦλος fuera de contexto.
  - La puntuación refleja la aposición explicativa de «los profetas» y ayuda a leer el hebreo sin endurecerlo.
