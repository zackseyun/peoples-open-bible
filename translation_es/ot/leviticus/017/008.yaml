translation:
  language: es
  text: 'Y les dirás: Todo hombre[a] de la casa de Israel, o del forastero residente[b] que habita entre ellos, que ofrezca un holocausto o un sacrificio—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La duplicación hebrea («hombre, hombre») es un giro distributivo legal que significa cada caso individual.
    reason: lexical_alternative
  - marker: b
    text: O «extranjero residente». El hebreo designa a un no israelita que reside entre Israel bajo su orden comunitario y cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲלֵהֶם תֹּאמַר
  english_pob_choice: And you shall say to them
  chosen_spanish: Y dirás a ellos
  alternatives_spanish:
  - Y les dirás
  - 'Y dirás a ellos:'
  - Entonces les dirás
  lexicon: HALOT
  rationale: El hebreo introduce una instrucción enlazada con una conjunción y un verbo directivo. «Y dirás a ellos» conserva el carácter de mandato y el enlace discursivo sin endurecer innecesariamente el orden español.
- source_word: אִישׁ אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Todo hombre[a]
  alternatives_spanish:
  - Cualquier hombre
  - Todo varón
  - Cualquier persona
  lexicon: HALOT
  rationale: 'La duplicación hebrea es distributiva y legal: no significa ''hombre'' como categoría genérica simple, sino ''cada individuo''. «Todo hombre» conserva el masculino y la fuerza distributiva; la nota explica el valor idiomático.'
- source_word: מִבֵּית יִשְׂרָאֵל
  english_pob_choice: from the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de entre la casa de Israel
  - de Israel
  - de la familia de Israel
  lexicon: HALOT
  rationale: «Casa de Israel» es una expresión pactual estable y no debe aplanarse. En español, la preposición «de» comunica bien la pertenencia/origen sin forzar una literalidad extraña.
- source_word: וּמִן הַגֵּר
  english_pob_choice: or from the sojourner
  chosen_spanish: o de entre el forastero residente[b]
  alternatives_spanish:
  - o del forastero residente
  - o del sojourner
  - o del extranjero residente
  lexicon: HALOT
  rationale: גֵּר designa a un no israelita que vive dentro de Israel y está sometido a su orden cultual. «Forastero residente» evita la ambigüedad moderna de 'extranjero' y explica el estatuto social; la nota preserva la alternativa léxica de «sojourner».
- source_word: אֲשֶׁר יָגוּר בְּתוֹכָם
  english_pob_choice: who sojourns among them
  chosen_spanish: que habita entre ellos
  alternatives_spanish:
  - que reside entre ellos
  - que vive entre ellos
  - que peregrina entre ellos
  lexicon: HALOT
  rationale: El verbo repite la raíz de גֵּר, pero en español «sojornar» sería artificial. «Habita entre ellos» comunica la residencia efectiva sin perder el sentido de permanencia bajo el orden comunitario.
- source_word: אֲשֶׁר יַעֲלֶה
  english_pob_choice: who offers up
  chosen_spanish: que ofrezca
  alternatives_spanish:
  - que presente
  - que suba
  - que ofrezca en holocausto
  lexicon: HALOT
  rationale: El verbo causativo en contexto sacrificial significa ofrecer. En español, «ofrezca» es natural y suficientemente preciso; el valor de ofrenda queda reforzado por los sustantivos siguientes.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - un sacrificio totalmente consumido
  lexicon: HALOT
  rationale: Aunque «holocausto» puede tener asociaciones modernas sensibles, es el equivalente tradicional y técnico del hebreo עֹלָה en registros bíblicos en español. Mantiene la referencia sacrificial específica mejor que una paráfrasis.
- source_word: אוֹ זָבַח
  english_pob_choice: or a sacrifice
  chosen_spanish: o un sacrificio
  alternatives_spanish:
  - o una víctima
  - o una ofrenda sacrificial
  - o un sacrificio de comunión
  lexicon: HALOT
  rationale: זָבַח aquí nombra de manera amplia una ofrenda sacrificada, en contraste con עֹלָה. «Sacrificio» conserva esa amplitud sin añadir una categoría más concreta que el texto no exige.
theological_decisions:
- issue: Expresión legal distributiva אִישׁ אִישׁ
  english_pob_reading: Any man
  chosen_spanish_reading: Todo hombre
  alternative_spanish_readings:
  - Cualquier hombre
  - Cualquier persona
  - Todo varón
  rationale: El hebreo usa masculino singular con valor distributivo en registro legal. Se conserva el masculino porque refleja la forma de la fuente y porque la construcción no busca neutralizar género, sino distribuir el caso por individuo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Categoría cultual/social de גֵּר
  english_pob_reading: sojourner
  chosen_spanish_reading: forastero residente
  alternative_spanish_readings:
  - extranjero residente
  - sojourner
  - forastero
  rationale: El texto no habla de un simple visitante, sino de alguien integrado de manera estable en la comunidad israelita y sujeto a sus normas cultuales. «Forastero residente» comunica esa tensión entre alteridad y residencia mejor que «extranjero» a secas.
  doctrine_reference: HALOT, entrada גֵּר; contexto legal-cultual de Levítico
- issue: Término sacrificial עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda ascendente
  rationale: En español bíblico y litúrgico, «holocausto» es el término asentado para עֹלָה. Aunque es importante reconocer su carga histórica moderna, aquí conserva con precisión el tipo de ofrenda al que se refiere el texto.
  doctrine_reference: HALOT, entrada עֹלָה
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con el audit trail inglés; no hay revisiones aplicadas ni cambios de sentido pendientes en la última pasada, así que la redacción española sigue de cerca la solución ya aprobada.
  spanish_consistency_notes:
  - Se conserva la fórmula legal de mandato con verbo en futuro de valor exhortativo («dirás»).
  - «Casa de Israel» se mantiene como expresión pactual fija.
  - «Holocausto» y «sacrificio» distinguen correctamente dos términos sacrificiales distintos.
  - La opción «forastero residente» intenta preservar la función del גֵּר sin importar una categoría moderna ajena al contexto.
