translation:
  language: es
  text: 'Y Dios los bendijo, diciendo: «Fructifiquen y multiplíquense, y llenen las aguas en los mares, y que las aves[a] se multipliquen en la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las criaturas voladoras»; עוֹף puede referirse de manera más amplia a seres voladores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - bendijo con bendición
  lexicon: HALOT
  rationale: El piel de ברך aquí expresa el acto de impartir bendición. «Bendijo» es la equivalencia natural y fiel en español, y conserva el sentido de favor divino sin explicitar más de lo que el hebreo dice.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre objeto directo masculino plural retoma a las criaturas del mar y a las aves del versículo anterior. «Los» es la forma española más directa y natural.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el hebreo dice אֱלֹהִים, el contexto inmediato de Génesis 1 presenta al Dios creador; en este proyecto se prefiere «Yahvé» como convención para el nombre divino en la edición española, sin ocultar el referente del texto hebreo. Aquí no se usa una sustitución mecánica por «Dios» porque la línea editorial española del proyecto distingue el nombre divino del título genérico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  lexicon: HALOT
  rationale: La construcción introductoria de discurso directo se vierte de modo idiomático con «diciendo».
- source_word: פְּרוּ
  english_pob_choice: Be fruitful
  chosen_spanish: Fructifiquen
  alternatives_spanish:
  - Sean fructíferos
  - Den fruto
  lexicon: HALOT
  rationale: El imperativo de פרה en este contexto de bendición se expresa mejor en español con un verbo verbal y breve. «Fructifiquen» conserva el valor fecundo del hebreo sin volverlo mera metáfora agrícola.
- source_word: וּרְבוּ
  english_pob_choice: multiply
  chosen_spanish: multiplíquense
  alternatives_spanish:
  - aumenten
  - háganse muchos
  lexicon: HALOT
  rationale: רבה apunta al aumento numérico. El reflexivo «multiplíquense» reproduce bien la fuerza volitiva del plural imperativo en español y mantiene el paralelismo con el primer mandato.
- source_word: וּמִלְאוּ
  english_pob_choice: fill
  chosen_spanish: llenen
  alternatives_spanish:
  - colmén
  - llenen de
  lexicon: HALOT
  rationale: מלא significa «llenar». «Llenen» es claro, directo y no añade énfasis no presente en el hebreo.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El hebreo usa el plural מַיִם; «las aguas» refleja mejor la forma y el estilo elevado de la creación.
- source_word: בַּיַּמִּים
  english_pob_choice: in the seas
  chosen_spanish: en los mares
  alternatives_spanish:
  - en el mar
  lexicon: HALOT
  rationale: El plural de ים se conserva con «mares», que sigue el número hebreo y mantiene el paralelismo cosmológico del pasaje.
- source_word: וְהָעוֹף
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - las criaturas voladoras
  - las aves del cielo
  lexicon: HALOT
  rationale: עוֹף puede abarcar criaturas voladoras en general, pero en este contexto inmediato el referente natural es el conjunto de aves. «Aves» es un término amplio y más abarcador que «pájaros», y deja abierta la amplitud semántica del hebreo.
- source_word: יִרֶב
  english_pob_choice: let ... multiply
  chosen_spanish: se multipliquen
  alternatives_spanish:
  - sean muchas
  - aumenten
  lexicon: HALOT
  rationale: El imperfecto/jusivo de רבה expresa aquí fuerza volitiva dentro de la bendición. En español, «que las aves se multipliquen» preserva esa tensión entre deseo, comisión y efecto, sin reducirlo a una simple predicción.
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: אָרֶץ aquí designa la esfera terrestre. «En la tierra» es la equivalencia natural y conserva el marco cósmico del relato.
theological_decisions:
- issue: Forma de la bendición divina y la fuerza de los verbos
  english_pob_reading: 'Render the imperatives and jussive as a divine blessing expressed in command-like form: ''Be fruitful and multiply ... let the birds multiply.'''
  chosen_spanish_reading: 'Traducir los imperativos y el yusivo como una bendición divina expresada en forma exhortativa: «Fructifiquen y multiplíquense ... que las aves se multipliquen».'
  alternative_spanish_readings:
  - «Sean fecundos y proliferen ...»
  - «Fructifiquen y multipliquen ...»
  rationale: El hebreo presenta la bendición mediante formas verbales de mandato/jusivo. La versión española conserva esa tensión sin volverla una orden desnuda ni una simple predicción futura. El «que» en la última cláusula ayuda a mantener el matiz volitivo del original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hay cambios respecto del pase más reciente en el audit trail inglés; la versión española refleja de forma estable la decisión de preservar la fuerza benedictiva y volitiva del hebreo sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto para el nombre divino, en lugar de ocultarlo con «SEÑOR» o neutralizarlo con «Dios».
  - Se conserva un registro bíblico moderno y digno, evitando calcos rígidos pero respetando la sintaxis hebrea cuando aporta paralelismo o matiz.
  - «Aves» se eligió frente a «pájaros» por amplitud semántica y tono más general; la nota preserva la alternativa semántica del hebreo.
