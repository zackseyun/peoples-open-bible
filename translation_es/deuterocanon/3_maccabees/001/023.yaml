translation:
  language: es
  text: Pero cuando gritaron para lanzarse hacia las armas, y morir con valentía por la ley ancestral[b], causaron gran alboroto en el lugar, y apenas por los ancianos[c] y los mayores[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego proporcionado para este versículo parece cortarse en medio de la oración después de «por los ancianos y los mayores». La traducción conserva ese sentido incompleto en lugar de suplir palabras no presentes en el fragmento.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «para la ley ancestral» o «a causa de la ley ancestral». La expresión griega puede leerse como una muerte en fidelidad a la ley heredada.
    reason: lexical_alternative
  - marker: c
    text: 'Aquí se distinguen dos términos griegos: uno para hombres de edad avanzada y otro para mayores o dirigentes de la comunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσαντες
  english_pob_choice: when they cried out
  chosen_spanish: cuando gritaron
  alternatives_spanish:
  - cuando clamaron
  - al gritar
  lexicon: LSJ
  rationale: El participio aoristo introduce la acción que desencadena la escena. En español, «gritaron» conserva bien el impulso vocal e inmediato sin volverse rebuscado.
- source_word: τὴν ὁρμὴν ... ποιήσασθαι
  english_pob_choice: to make a rush
  chosen_spanish: lanzarse
  alternatives_spanish:
  - hacer una acometida
  - hacer una carga
  - arrojarse
  lexicon: LSJ
  rationale: ὁρμή expresa un impulso o acometida rápida. «Lanzarse» comunica ese movimiento decidido en español natural, sin especificar más de lo que el griego dice.
- source_word: ἐπὶ τὰ ὅπλα
  english_pob_choice: for the weapons
  chosen_spanish: hacia las armas
  alternatives_spanish:
  - a las armas
  - para las armas
  - contra las armas
  lexicon: LSJ
  rationale: La construcción indica dirección hacia el objeto; en contexto se trata de correr para tomar las armas. «Hacia las armas» preserva esa orientación sin sugerir una oposición al objeto.
- source_word: θαρραλέως
  english_pob_choice: courageously
  chosen_spanish: con valentía
  alternatives_spanish:
  - valerosamente
  - con coraje
  - audazmente
  lexicon: LSJ
  rationale: El adverbio señala firmeza valiente frente a la muerte. «Con valentía» es claro, solemne y natural en español bíblico actual.
- source_word: ὑπὸ τοῦ πατρῴου νόμου
  english_pob_choice: for the ancestral law
  chosen_spanish: por la ley ancestral
  alternatives_spanish:
  - por la ley de los padres
  - por la ley paterna
  - debajo de la ley ancestral
  lexicon: LSJ
  rationale: El sentido es morir en fidelidad a la ley heredada. «Por la ley ancestral» refleja bien la lectura preferida por el POB inglés y evita una calca que sonaría extraña en español.
- source_word: τελευτᾷν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - perecer
  - llegar a morir
  - encontrar la muerte
  lexicon: LSJ
  rationale: El infinitivo significa simplemente morir. «Morir» es la opción más directa y menos cargada interpretativamente.
- source_word: ἱκανὴν ... τραχύτητα
  english_pob_choice: considerable turmoil
  chosen_spanish: gran alboroto
  alternatives_spanish:
  - considerable tumulto
  - gran disturbio
  - mucho desorden
  lexicon: LSJ
  rationale: En este contexto narrativo, τραχύτης apunta a conmoción o disturbio violento. «Gran alboroto» reproduce el efecto en un español fluido y comprensible.
- source_word: μόλις
  english_pob_choice: only with difficulty
  chosen_spanish: apenas
  alternatives_spanish:
  - con dificultad
  - difícilmente
  - a duras penas
  lexicon: LSJ
  rationale: El adverbio indica que lo siguiente se logró con dificultad. «Apenas» transmite esa limitación y encaja con la frase truncada del testimonio griego.
- source_word: γεραιῶν
  english_pob_choice: old men
  chosen_spanish: ancianos
  alternatives_spanish:
  - viejos
  - hombres ancianos
  - hombres de edad
  lexicon: LSJ
  rationale: Se distingue de πρεσβύτεροι dentro de la misma cláusula. «Ancianos» conserva la referencia a edad avanzada sin confundirse con el cargo o estatus de «presbíteros».
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: presbíteros
  alternatives_spanish:
  - ancianos
  - mayores
  - seniores
  lexicon: LSJ
  rationale: En este contexto puede referirse a dirigentes mayores o miembros senior de la comunidad. Dado que el español eclesial dispone de «presbíteros», esa palabra preserva una distinción útil respecto de γεραιῶν.
theological_decisions:
- issue: Rendering of πατρῷος νόμος
  english_pob_reading: the ancestral law
  chosen_spanish_reading: la ley ancestral
  alternative_spanish_readings:
  - la ley de los padres
  - la ley paterna
  rationale: La frase apunta a la ley heredada de los antepasados, es decir, la identidad normativa del pueblo. «Ley ancestral» mantiene ese peso covenantal e histórico sin introducir explicaciones ajenas al texto.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; readable modern Spanish'
- issue: How to handle the fragmentary ending of the Greek witness
  english_pob_reading: Translate the extant clause without supplying an unstated completion
  chosen_spanish_reading: Traducir la cláusula conservada sin completar el final
  alternative_spanish_readings:
  - Suplir una continuación conjetural
  - Suavizar la frase para que parezca completa
  rationale: El testimonio griego termina de forma incompleta. Para respetar la transparencia del proyecto, el español conserva la terminación abierta en vez de inventar palabras no atestiguadas.
  doctrine_reference: 'PHILOSOPHY.md: transparency; derivative-work guardrails'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés al preferir una lectura causal/final de ὑπό en contexto («por la ley ancestral») y al mantener sin completar el final fragmentario del testimonio griego. También conserva la distinción entre γεραιῶν y πρεσβυτέρων en español, con una solución que evita borrar la diferencia léxica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se mantiene «ley ancestral» para πατρῷος νόμος, en línea con el POB inglés.
  - «Presbíteros» se reserva aquí para πρεσβυτέρων por la necesidad de distinguirlo de «ancianos».
  - El registro es bíblico-solemne pero moderno, evitando calcos rígidos.
