lexical_decisions:
- source_word: הַמַּרְגִּיז
  english_pob_choice: who shakes
  chosen_spanish: que sacude
  alternatives_spanish:
  - que hace temblar
  - que agita
  - que conmueve
  lexicon: HALOT
  rationale: El participio causativo de רגז expresa provocar sacudida o agitación. «Sacude» transmite bien la fuerza causativa en español natural, sin perder la imagen activa del original.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el país
  lexicon: HALOT
  rationale: En este contexto cósmico, el referente es el mundo terrestre en sentido amplio. «La tierra» conserva mejor la amplitud y la imaginería poética que «el país».
- source_word: מִמְּקוֹמָהּ
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - fuera de su lugar
  - desde su lugar
  lexicon: HALOT
  rationale: La preposición más el sustantivo con sufijo posesivo se vierte de forma directa y idiomática como «de su lugar», manteniendo la idea de desplazamiento cósmico.
- source_word: וְעַמּוּדֶיהָ
  english_pob_choice: and its pillars
  chosen_spanish: y sus columnas
  alternatives_spanish:
  - y sus pilares
  - y sus fundamentos
  lexicon: HALOT
  rationale: עַמּוּד puede significar columna o pilar. «Columnas» es una opción clara y digna en español; «pilares» también sería posible, pero puede sonar menos concreto. No se sustituye por «fundamentos» porque el texto preserva una imagen arquitectónica/cosmológica.
- source_word: יִתְפַלָּצוּן
  english_pob_choice: tremble
  chosen_spanish: tiemblan
  alternatives_spanish:
  - tiritan
  - se estremecen
  - se espantan
  lexicon: HALOT
  rationale: El verbo denota un temblor violento o estremecimiento. «Tiemblan» es una correspondencia natural y sobria; mantiene la tensión poética sin convertirla en una reacción psicológica.
theological_decisions:
- issue: Imagen cosmológica de la tierra con columnas
  english_pob_reading: Retain the poetic image literally as 'its pillars'
  chosen_spanish_reading: Conservar la imagen poética con «sus columnas»
  alternative_spanish_readings:
  - interpretar como «sus fundamentos» para modernizar la cosmología
  - parafrasear para eliminar la imagen arquitectónica
  rationale: El hebreo usa lenguaje poético antiguo sobre la estructura del mundo. La traducción debe preservar esa imaginería en lugar de armonizarla con cosmologías modernas. No se convierte en una afirmación doctrinal sobre física, sino en una imagen literaria de poder divino.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El chequeo más reciente coincide con alta concordancia y no registra cambios; por eso se mantiene la línea del original con una solución española natural y directa.
  spanish_consistency_notes:
  - Se mantiene «la tierra» para el contexto cósmico.
  - Se conserva la imaginería de «columnas» en lugar de interpretarla como «fundamentos».
  - El verbo final se traduce con un plural español simple, coherente con el sujeto plural «sus columnas».
