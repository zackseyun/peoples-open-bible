base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/001.yaml
  text: How the Lord in his anger has clouded over daughter Zion! He has cast from heaven to earth the beauty of Israel[c][b][a], and he did not remember his footstool in the day of his anger.
  footnotes:
  - marker: a
    text: Or 'has darkened' or 'has covered with a cloud.' The Hebrew verb evokes the imagery of clouding over.
    reason: lexical_alternative
  - marker: b
    text: '''His footstool'' may refer to Zion, the temple, or the ark as the place associated with God''s earthly presence.'
    reason: alternative_reading
  - marker: c
    text: Or 'the glory of Israel' or 'the splendor of Israel.'
    reason: lexical_alternative
