translation:
  language: es
  text: 'Jesús dijo: «El que está cerca de mí está cerca del fuego[c][b], y el que está lejos de mí está lejos del reino[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Reino» traduce el copto ⲙⲛⲧⲣⲣⲟ, que también puede significar «realeza», «reinado» o «gobierno real».
    reason: lexical_alternative
  - marker: b
    text: El manuscrito tiene «a mí» (ⲉⲣⲟⲓ) / «de mí» (ⲙ̄ⲙⲟⲓ); Dilley los normaliza con pronombres independientes. El artículo con «reino» varía (ⲧ-/ⲡ-).
    reason: textual_variant
  - marker: c
    text: Compárese la imagen del fuego en Lucas 12:49 por resonancia temática, aunque este dicho es distinto.
    reason: cross_reference
lexical_decisions:
- source_word: ϩⲏⲛ
  english_pob_choice: be near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - se acerca
  lexicon: Crum; Layton
  rationale: El copto expresa proximidad estática, no movimiento. «Está cerca» conserva la fuerza aforística y el paralelismo del dicho sin añadir dinamismo no presente en el original.
- source_word: ⲉⲣⲟⲓ / ⲙ̄ⲙⲟⲓ
  english_pob_choice: to me / from me
  chosen_spanish: de mí
  alternatives_spanish:
  - hacia mí / desde mí
  - conmigo / lejos de mí
  lexicon: Layton (Grammar)
  rationale: En español, «cerca de mí» y «lejos de mí» comunican de manera natural la orientación relacional de las preposiciones coptas. Mantiene el contraste sin volverlo torpe.
- source_word: ⲥⲁⲧⲉ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - la llama
  lexicon: Crum
  rationale: «Fuego» es el sentido básico y más sobrio; no conviene especificar «llama», que estrecharía la imagen más de lo que permite el copto.
- source_word: ⲟⲩⲏⲩ (ϥⲟⲩⲏⲩ)
  english_pob_choice: is far
  chosen_spanish: está lejos
  alternatives_spanish:
  - está distante
  lexicon: Crum
  rationale: «Está lejos» reproduce la simetría con «está cerca» y conserva la brevedad proverbial del dicho.
- source_word: ⲙⲛⲧⲣⲣⲟ
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: Crum; Layton
  rationale: Aunque el término copto puede abarcar «reino», «realeza» o «gobierno real», en español «el reino» es la opción más natural y tradicional para este dicho, sin perder el campo semántico de soberanía.
- source_word: ⲡⲉⲧ- (relative construction)
  english_pob_choice: the one who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - aquel que
  lexicon: Layton (Grammar)
  rationale: «El que» preserva la forma proverbial singular del copto y resulta más compacto que «quien» o «aquel que».
theological_decisions:
- issue: Cómo renderizar ⲙⲛⲧⲣⲣⲟ sin fijar una sola noción teológica
  english_pob_reading: ‘Kingdom’ translates Coptic ⲙⲛⲧⲣⲣⲟ, which can also mean ‘kingship’ or ‘royal rule.’
  chosen_spanish_reading: «el reino»
  alternative_spanish_readings:
  - «la realeza»
  - «el reinado»
  - «el gobierno real»
  rationale: Se conserva el término idiomático principal, pero la nota deja visible que el copto también puede referir soberanía, realeza o gobierno real. Así no se borra la tensión lexical documentada en el audit trail.
  doctrine_reference: Terminología del Reino de Dios / soberanía real
- issue: Mantener la imagen del fuego sin convertirla en una glosa interpretativa
  english_pob_reading: The saying links proximity to Jesus with proximity to fire.
  chosen_spanish_reading: «el fuego»
  alternative_spanish_readings:
  - «la llama»
  - «el juicio»
  rationale: La frase copta es imagética y no desarrolla una explicación. Traducir «el fuego» preserva la ambigüedad productiva del dicho y evita imponer una interpretación secundaria.
  doctrine_reference: Imaginería simbólica en dichos sapienciales
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto copto y el audit trail en inglés. Se adoptó una equivalencia óptima: se preservó la estructura paralela, la imagen del fuego y la ambigüedad de ⲙⲛⲧⲣⲣⲟ, sin depender mecánicamente de la fraseología inglesa.'
  spanish_consistency_notes:
  - Se usó «Jesús» como nombre propio y no se añadió ninguna capitalización teológica no presente en el copto.
  - «Cerca de mí» / «lejos de mí» mantiene el paralelismo direccional del original.
  - Se prefirió «el reino» por naturalidad en español, dejando la alternativa semántica en nota.
  - No se añadió puntuación interpretativa adicional ni se suavizó la contundencia proverbial del dicho.
