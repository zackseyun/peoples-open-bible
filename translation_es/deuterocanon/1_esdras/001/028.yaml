  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: el rey pide ser retirado del combate por su gran debilidad, y sus asistentes lo sacan enseguida de la formación. También preserva correctamente la distinción entre μάχη («batalla») y παράταξις («línea/formación de batalla»).'
  spanish_quality_summary: 'El español es claro y natural en general, pero hay dos ajustes menores de calidad y precisión: «atendientes» no es la mejor alternativa en español general; «asistentes» o «sirvientes» sería más idiomático. Además, «Apartadme» funciona, pero «Retírenme» suena más natural en español latinoamericano neutral dentro de un contexto militar. El resto del verso está bien logrado.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La decisión de traducir παῖδες como «servidores» es aceptable y está bien justificada por el contexto y el paralelo hebreo. Sin embargo, en la nota léxica conviene reemplazar «atendientes» por «asistentes», que representa mejor la alternativa inglesa «attendants» en español eclesial legible.
  issues:
  - severity: medium
    issue: La nota al pie usa «atendientes» como alternativa para παῖδες.
    rationale: «Atendientes» suena poco idiomático en español general. «Asistentes» comunica mejor la idea de attendants sin rareza léxica.
  - severity: low
    issue: «Apartadme» es comprensible, pero menos natural que «Retírenme» en español neutral latinoamericano.
    rationale: El griego Ἀποστήσατέ με pide remover al rey del combate. «Retírenme de la batalla» mantiene la fuerza y suena más natural y militar en el registro meta.
  revised_spanish_text: 'Y dijo el rey a sus servidores[a]: «Retírenme de la batalla, porque estoy muy débil». E inmediatamente sus servidores lo apartaron de la línea de batalla,'
  revised_footnotes:
  - marker: a
    text: O «asistentes». El griego παῖδες puede significar «servidores», «asistentes» o «jóvenes»; el paralelo hebreo lee «sus siervos».
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido del original y de la auditoría inglesa, pero se mejora la naturalidad del mandato principal con «Retírenme» y se corrige la alternativa léxica de la nota a un español más idiomático con «asistentes».
