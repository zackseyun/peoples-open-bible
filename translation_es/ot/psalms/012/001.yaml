    rationale: El hebreo מִזְמוֹר funciona como rótulo nominal; el inglés auditado usa «A psalm». En español de encabezado suena más completo y natural «Un salmo de David» que «Salmo de David», sin cambiar el sentido.
  - severity: low
    issue: Capitalización interna de la cita hebrea en la nota a.
    rationale: Si la nota explica el significado léxico del hebreo, «la octava» en minúscula dentro de comillas es más exacto como glosa; la capitalización en el texto principal puede mantenerse por tratarse de designación/título.
