revisions:
- from: Ellos apartaron las ofrendas quemadas[a], para darlas por divisiones, según las casas paternas, a los hijos del pueblo, para presentarlas a Yahvé, como está escrito en el libro de Moisés; y así también con el ganado.
  to: Apartaron los holocaustos, para darlos por divisiones de las casas paternas a los hijos del pueblo[a], para presentarlos a Yahvé, como está escrito en el libro de Moisés; y así también con el ganado.
  rationale: Se revisa para usar el término sacrificial español más natural y preciso ('holocaustos') para עֹלָה, mejorar levemente la sintaxis española ('de las casas paternas') y anclar correctamente la nota en 'los hijos del pueblo'. No se requiere adjudicación especial.
