  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La principal cuestión léxica es idiomática: mantener el sentido de «double-tongued» en español natural. Conviene conservar la nota sobre el hebreo literal y añadir la variante griega textual, ya que el inglés POB la preserva explícitamente.'
