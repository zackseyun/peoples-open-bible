    rationale: ἰδοὺ + γάρ introduce explicación enfática, pero en español «Porque miren[a]» o simplemente «Miren[a]» suena más natural. Dado que el resto de la oración ya explica la causa, «Porque miren» refleja bien el enlace discursivo.
  - severity: medium
    issue: «sin hablarle» es menos preciso que «sin hablar con ella».
    rationale: ὁμιλέω con dativo aquí expresa hablar/conversar con ella, no solo dirigirle palabras. «Hablar con ella» preserva mejor la reciprocidad de la interacción.
  - severity: medium
