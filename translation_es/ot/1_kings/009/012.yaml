translation:
  language: es
  text: Entonces Hiram salió de Tiro para ver las ciudades que Salomón le había dado[a], pero no le parecieron bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero no le agradaron». El modismo hebreo dice literalmente: «no eran agradables o rectas a sus ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - salió fuera
  lexicon: HALOT
  rationale: יצא en esta forma narrativa expresa salir o partir. 'Salió' conserva de manera natural el movimiento desde Tiro sin añadir matices interpretativos.
- source_word: מִצֹּר
  english_pob_choice: from Tyre
  chosen_spanish: de Tiro
  alternatives_spanish:
  - desde Tiro
  - fuera de Tiro
  lexicon: HALOT
  rationale: מן marca procedencia. 'De Tiro' es la forma más natural en español y mantiene el punto de origen geográfico.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para inspeccionar
  - para mirar
  lexicon: HALOT
  rationale: ראה puede significar ver, examinar o mirar. Aquí 'para ver' preserva el sentido básico sin imponer la idea más específica de inspección.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las urbes
  lexicon: HALOT
  rationale: עיר suele referirse a una ciudad o poblado. 'Ciudades' sigue la equivalencia estándar y encaja con el contexto territorial.
- source_word: אֲשֶׁר נָתַן לוֹ שְׁלֹמֹה
  english_pob_choice: that Solomon had given him
  chosen_spanish: que Salomón le había dado
  alternatives_spanish:
  - que Salomón le dio
  - que Salomón le había entregado
  lexicon: HALOT
  rationale: El pasado perfecto español ayuda a reflejar que el regalo de Salomón precede a la visita de Hiram. 'Le había dado' conserva el valor relacional del hebreo sin sobretraducir.
- source_word: וְלֹא יָשְׁרוּ בְּעֵינָיו
  english_pob_choice: but they were not pleasing in his eyes
  chosen_spanish: pero no eran agradables a sus ojos
  alternatives_spanish:
  - pero no le agradaron
  - pero no le parecieron bien
  - pero no eran rectas a sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea idiomática ישר בעיני comunica aceptación o agrado según el juicio de alguien. 'No eran agradables a sus ojos' conserva la imagen del original y mantiene la tensión idiomática documentada por la POB inglesa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: usa el pasado perfecto para la secuencia narrativa, conserva la imagen idiomática de ''sus ojos'' y evita suavizar la valoración de Hiram más allá de lo que el hebreo permite. No se registraron revisiones textuales en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Hiram' y 'Salomón' como nombres propios estables.
  - Se traduce el verbo de movimiento con un español natural ('salió') sin perder el valor direccional del hebreo.
  - La frase final conserva la imagen de 'ojos' para reflejar el modismo hebreo y el pie de nota explicita la alternativa semántica.
