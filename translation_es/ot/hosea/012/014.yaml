translation:
  language: es
  text: Por medio de un profeta Yahvé hizo subir a Israel de Egipto[a], y por medio de un profeta fue guardado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, probablemente Moisés en el contexto del éxodo.
    reason: cross_reference
  - marker: b
    text: O «fue preservado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנָבִיא
  english_pob_choice: by a prophet
  chosen_spanish: por medio de un profeta
  alternatives_spanish:
  - por un profeta
  - por medio del profeta
  lexicon: HALOT
  rationale: La preposición ב aquí expresa instrumento o agencia. «Por medio de» conserva esa mediación sin sonar rígido en español, y mantiene el paralelismo de ambos cola. Se evita «por un profeta» porque puede sonar más causal que mediado.
- source_word: הֶעֱלָה
  english_pob_choice: brought ... up
  chosen_spanish: sacó ... de
  alternatives_spanish:
  - hizo subir
  - trajo ... arriba
  - llevó ... fuera
  lexicon: HALOT
  rationale: El hifil de עלה en contexto del éxodo puede expresarse como «sacar» en español, porque el movimiento desde Egipto es el foco natural del verso. Esto comunica el sentido sin perder la referencia histórica al éxodo; «hizo subir» sería más literal, pero menos natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Preserva el nombre propio divino y evita la sustitución por un título.'
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: «De Egipto» es la forma más natural y suficiente en español para el complemento de origen. «Desde Egipto» también sería posible, pero no añade una diferencia de sentido necesaria aquí.
- source_word: נִשְׁמָר
  english_pob_choice: he was guarded
  chosen_spanish: fue guardado
  alternatives_spanish:
  - fue protegido
  - fue preservado
  - fue vigilado
  lexicon: HALOT
  rationale: El nifal de שׁמר tiene un valor pasivo de protección/custodia. «Fue guardado» conserva la tersura y la correspondencia léxica mejor que «fue protegido», aunque en español la expresión sea menos idiomática; se mantiene para no borrar el matiz de custodia del hebreo.
theological_decisions:
- issue: Identidad implícita del profeta del éxodo
  english_pob_reading: Leave 'a prophet' indefinite in the main text, allowing the reader to infer Moses from the exodus context.
  chosen_spanish_reading: Mantener «un profeta» sin identificarlo en el texto principal, dejando la inferencia contextual al lector.
  alternative_spanish_readings:
  - el profeta
  - Moisés
  rationale: El hebreo no nombra a Moisés ni usa artículo definido. Conservar la indefinición respeta la forma del verso y mantiene el énfasis en la mediación profética sin resolverla interpretativamente en el cuerpo del texto.
  doctrine_reference: Primacía del texto original y preservación de la tensión literaria; no añadir identificaciones explícitas donde el hebreo no las formula.
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa al preferir una forma pasiva para נִשְׁמָר. En español se optó por «fue guardado» para mantener esa lectura pasiva y la correspondencia léxica, sin introducir una interpretación más fuerte como «protegido». También se preservó la estructura paralela de ambas cláusulas con «por medio de un profeta».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el Nombre divino.
  - Se conserva «profeta» en singular e indefinido para no resolver la referencia implícita.
  - La elección de «fue guardado» refleja custodia pasiva y no debe entenderse como una simplificación de sentido a mera conservación física.
  - La nota al pie a señala la probable identificación contextual con Moisés; no forma parte del texto principal.
