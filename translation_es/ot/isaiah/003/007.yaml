translation:
  language: es
  text: 'En aquel día él alzará la voz[a], diciendo: «No seré curador, porque en mi casa no hay pan y no hay manto; no me hagan jefe[b] del pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seré uno que venda heridas», conservando la imagen literal detrás de «curador».
    reason: lexical_alternative
  - marker: b
    text: O «líder del pueblo», «principal del pueblo» o «gobernante del pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  english_pob_choice: he will cry out
  chosen_spanish: alzará la voz
  alternatives_spanish:
  - clamará
  - gritará
  - alzará
  lexicon: HALOT
  rationale: El hebreo literalmente significa “levantar/cargar”, pero en este giro con palabra hablada expresa una proclamación o exclamación pública. «Alzará la voz» conserva la imagen y suena natural en español.
- source_word: חֹבֵשׁ
  english_pob_choice: healer
  chosen_spanish: sanador
  alternatives_spanish:
  - vendador
  - uno que venda
  - curador
  lexicon: HALOT
  rationale: La forma participial puede referirse literalmente a alguien que venda heridas, y por extensión a quien remedia una crisis social. «Sanador» comunica bien la función metafórica sin perder del todo la idea de restauración.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El sentido básico es «pan», aunque puede representar alimento en general. Se conserva el concreto porque el paralelo con «manto» depende de la imagen de necesidades básicas.
- source_word: שִׂמְלָה
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - manto exterior
  - prenda
  - ropa
  lexicon: HALOT
  rationale: La palabra designa una prenda exterior. «Manto» es una opción natural en español y mantiene la pareja concreta con «pan».
- source_word: תְשִׂימֻנִי
  english_pob_choice: you must not make me
  chosen_spanish: no me pongan por
  alternatives_spanish:
  - no me nombren
  - no me establezcan como
  - no me hagan
  lexicon: HALOT
  rationale: El verbo significa «poner/colocar/nombrar». En contexto es una negativa a recibir un cargo; «no me pongan por» conserva el matiz de designación para un puesto.
- source_word: קְצִין עָם
  english_pob_choice: leader of the people
  chosen_spanish: jefe del pueblo
  alternatives_spanish:
  - jefe del pueblo
  - líder del pueblo
  - gobernante del pueblo
  - capitán del pueblo
  lexicon: HALOT
  rationale: קצין denota un oficial, jefe o dirigente. «Jefe del pueblo» es natural y suficientemente amplio sin forzar un matiz militar o monárquico.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que añadió la segunda negación en español para reflejar mejor la repetición hebrea de אֵין. Se mantuvo el tono formal y la imagen concreta de חֹבֵשׁ, adaptándola a un español publicable.
  spanish_consistency_notes:
  - Se mantuvo «pan» y «manto» como bienes concretos y cotidianos, en línea con la fuerza imagística del hebreo.
  - Se evitó «SEÑOR» o formulación tradicional no requerida, porque el versículo no contiene el nombre divino.
  - «Jefe del pueblo» conserva el valor amplio de קְצִין sin imponer una lectura exclusivamente militar.
