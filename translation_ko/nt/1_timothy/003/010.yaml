id: 1TI.3.10
reference: 1 Timothy 3:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ οὗτοι δὲ δοκιμαζέσθωσαν πρῶτον, εἶτα διακονείτωσαν ἀνέγκλητοι ὄντες.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/010.yaml
  text: And these also must first be tested[a]; then let them serve[b], being beyond reproach.
  footnotes:
  - marker: a
    text: Or 'let them serve'—the Greek verb means 'to serve,' but here it occurs in the context of qualifications for deacons, so 'serve as deacons' makes the office-specific sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'blameless.' The phrase means that no valid charge can be brought against them, not that they are sinless.
    reason: lexical_alternative
translation:
  language: ko
  text: 이들도 먼저 시험을 거쳐야 하며, 책망할 것이 없으면 그 후에 집사로 섬기게[a] 하십시오[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「섬기게 하라」. 헬라어 διακονέω는 「섬기다」이지만, 본 문맥은 집사 직무이므로 「집사로 섬기게」로 직무를 명시한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「흠 잡을 것이 없으면」. 본 어구는 무죄(無罪)를 뜻하지 않고 정당한 고발거리가 없음을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκιμαζέσθωσαν
  english_pob_choice: must first be tested
  chosen_korean: 시험을 거쳐야 하며
  alternatives_korean:
  - 검증을 받아야 하며
  - 검토를 받아야 하며
  lexicon: BDAG
  rationale: δοκιμάζω는 「시험·검증」. 한국 교회 어휘 「시험」.
- source_word: διακονείτωσαν
  english_pob_choice: let them serve
  chosen_korean: 집사로 섬기게
  alternatives_korean:
  - 섬기게
  - 봉사하게
  lexicon: BDAG
  rationale: 본 문맥(집사 자격)에서 직무를 명시함이 자연스럽다.
- source_word: ἀνέγκλητοι ὄντες
  english_pob_choice: being beyond reproach
  chosen_korean: 책망할 것이 없으면
  alternatives_korean:
  - 흠 잡을 것이 없으면
  - 비난할 것이 없는 자로서
  lexicon: BDAG
  rationale: 2절 ἀνεπίλημπτος와 의미 유사. 일관되게 「책망할 것이 없는」 사용.
