base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/011/002.yaml
  text: And know today that it is not your children who have not known and who have not seen the discipline of Yahweh your God[a], his greatness, his mighty hand[b], and his outstretched arm—
  footnotes:
