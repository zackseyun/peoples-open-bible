translation:
  language: es
  text: 'Así llegó al fin de una ruina miserable: confinado junto a Aretas[a], el gobernante de los árabes, huyendo de ciudad en ciudad, perseguido por todos, odiado como apóstata de las leyes y aborrecido como destructor de su patria y de sus conciudadanos, fue arrojado a Egipto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tirano de los árabes». El griego τύραννον puede significar «tirano», pero aquí también puede funcionar de manera más neutral como «gobernante».
    reason: lexical_alternative
  - marker: b
    text: O «fue expulsado a Egipto»; el verbo griego es muy enérgico y sugiere una expulsión violenta, casi como si fuera echado fuera.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέρας οὖν κακῆς καταστροφῆς ἔτυχεν
  english_pob_choice: he met the end of a miserable ruin
  chosen_spanish: llegó al fin de una ruina miserable
  alternatives_spanish:
  - alcanzó el final de una ruina miserable
  - sufrió el fin de una ruina miserable
  lexicon: LSJ
  rationale: La frase griega expresa haber llegado a un desenlace ruin y desastroso. «Llegó al fin» conserva el valor idiomático sin sonar forzado; «ruina miserable» mantiene la carga negativa de κακή καταστροφή.
- source_word: ἐγκλεισθεὶς
  english_pob_choice: confined
  chosen_spanish: confinado
  alternatives_spanish:
  - encerrado
  - aprisionado
  - recluido
  lexicon: LSJ
  rationale: El participio indica quedar encerrado o limitado. «Confinado» refleja bien la idea sin especificar un tipo de prisión que el griego no exige.
- source_word: πρὸς Ἀρέταν
  english_pob_choice: with Aretas
  chosen_spanish: con Aretas
  alternatives_spanish:
  - junto a Aretas
  - ante Aretas
  - bajo Aretas
  lexicon: LSJ
  rationale: La preposición aquí puede expresar relación o situación. En español, «con Aretas» conserva esa apertura sin imponer una lectura más específica.
- source_word: τὸν τῶν Ἀράβων τύραννον
  english_pob_choice: the ruler of the Arabs
  chosen_spanish: el gobernante de los árabes
  alternatives_spanish:
  - el tirano de los árabes
  - el príncipe de los árabes
  lexicon: LSJ
  rationale: Siguiendo la decisión inglesa, «gobernante» evita cargar a Aretas con una condena moral que el término τύραννος no necesariamente exige aquí.
- source_word: πόλιν ἐκ πόλεως φεύγων
  english_pob_choice: fleeing from city to city
  chosen_spanish: huyendo de ciudad en ciudad
  alternatives_spanish:
  - huyendo de una ciudad a otra
  - fugitivo de ciudad en ciudad
  lexicon: LSJ
  rationale: Es una expresión distributiva clara. «Huyendo de ciudad en ciudad» suena natural en español y conserva la repetición del movimiento.
- source_word: διωκόμενος ὑπὸ πάντων
  english_pob_choice: pursued by all
  chosen_spanish: perseguido por todos
  alternatives_spanish:
  - acosado por todos
  - cazado por todos
  lexicon: LSJ
  rationale: διώκω aquí denota persecución o acoso literal. «Perseguido por todos» es directo y fiel al tono narrativo.
- source_word: στυγούμενος
  english_pob_choice: hated
  chosen_spanish: odiado
  alternatives_spanish:
  - detestado
  - aborrecido
  lexicon: LSJ
  rationale: El participio expresa odio fuerte. «Odiado» funciona bien en español y evita suavizar la intensidad del texto.
- source_word: τῶν νόμων ἀποστάτης
  english_pob_choice: an apostate from the laws
  chosen_spanish: apóstata de las leyes
  alternatives_spanish:
  - desertor de las leyes
  - rebelde contra las leyes
  lexicon: LSJ
  rationale: «Apóstata» conserva el peso religioso y covenantal que el inglés POB quiso mantener. El genitivo plural «de las leyes» refleja el referente concreto del texto.
- source_word: βδελυσσόμενος
  english_pob_choice: abhorred
  chosen_spanish: aborrecido
  alternatives_spanish:
  - detestado
  - repugnado
  lexicon: LSJ
  rationale: El verbo expresa repulsión intensa. «Aborrecido» empareja bien con «odiado» sin repetir exactamente el mismo matiz.
- source_word: πατρίδος καὶ πολιτῶν δήμιος
  english_pob_choice: the destroyer of his homeland and fellow citizens
  chosen_spanish: destructor de su patria y de sus conciudadanos
  alternatives_spanish:
  - destructor de su país y de sus conciudadanos
  - verdugo de su patria y de sus conciudadanos
  lexicon: LSJ
  rationale: δήμιος puede sugerir ejecutor público o destructor mortal. En este contexto de violencia contra su propio pueblo, «destructor» comunica la devastación sin introducir un oficio específico que el pasaje no requiere.
- source_word: εἰς Αἴγυπτον ἐξεβράσθη
  english_pob_choice: he was driven into Egypt
  chosen_spanish: fue arrojado a Egipto
  alternatives_spanish:
  - fue expulsado a Egipto
  - fue lanzado a Egipto
  lexicon: LSJ
  rationale: El verbo es muy enérgico y denota expulsión violenta. «Arrojado» conserva esa fuerza mejor que una formulación más suave.
theological_decisions:
- issue: Valor moral de τύραννος aplicado a Aretas
  english_pob_reading: rendered as 'ruler' rather than 'tyrant'
  chosen_spanish_reading: gobernante, no tirano
  alternative_spanish_readings:
  - tirano
  - soberano
  rationale: El griego puede usar τύραννος como título político sin que el narrador esté necesariamente condenando a Aretas. La lectura principal reserva la censura moral para Antíoco y su caída.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de ἀποστάτης respecto de la ley
  english_pob_reading: an apostate from the laws
  chosen_spanish_reading: apóstata de las leyes
  alternative_spanish_readings:
  - desertor de las leyes
  - rebelde contra las leyes
  rationale: El término señala una ruptura grave con la lealtad debida a la ley. «Apóstata» preserva esa gravedad religiosa y jurídica sin ampliarla indebidamente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que prefirió formas más naturales y cercanas al griego: «confined», «destroyer» y «driven into Egypt». La versión española sigue esa línea, manteniendo la fuerza narrativa y evitando suavizar el final violento del pasaje.'
  spanish_consistency_notes:
  - Se mantiene «Aretas» sin transliteración alternativa para coherencia con el expediente inglés.
  - Se usa «leyes» en plural porque el genitivo griego es plural y el contexto de 2 Macabeos habla de la ley en sentido normativo colectivo.
  - Se conserva la progresión de participios y frases breves para reflejar el ritmo acumulativo del griego.
  - «Patria» se usa como equivalente natural de πατρίς, con paralelismo con «conciudadanos».
