translation:
  language: es
  text: 'Entonces Moisés dijo a toda la congregación[a] de los hijos de Israel[b]: «Esto es lo que[c] Yahvé ha mandado, diciendo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asamblea».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas» o la forma tradicional «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «Esta es la cosa»; también puede entenderse «Esta es la palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» comunica mejor en español la secuencia narrativa que un simple «Y», sin perder el valor progresivo del hebreo.
- source_word: עֲדַת
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: La expresión designa al pueblo reunido corporativamente. «Congregación» conserva bien ese sentido colectivo y es natural en el registro bíblico español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo sin neutralizarla. En español, «hijos de Israel» sigue siendo claro y tradicionalmente comprensible.
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the thing
  chosen_spanish: Esta es la cosa
  alternatives_spanish:
  - Esta es la palabra
  - Esto es lo que
  - Esta es la cosa/esto es el asunto
  lexicon: HALOT
  rationale: El contexto inmediato y la revisión inglesa favorecen «the thing» como traducción más natural de הַדָּבָר en esta fórmula. «Cosa» mantiene el valor de cosa/materia sin forzar un sentido más teologizado de «palabra».
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha mandado
  lexicon: HALOT
  rationale: «Mandado» reproduce bien el acto imperativo-divino del hebreo y suena natural en español; «ordenado» también es posible, pero «mandado» suele encajar mejor en fórmulas bíblicas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino según la norma del proyecto en español. «Yahvé» comunica directamente el Tetragrámaton sin sustitución por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria al contenido se rinde con el gerundio normal «diciendo», que preserva la función de cita inmediata.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se mantiene el nombre propio divino en lugar de sustituirlo por un título. Esto sigue la decisión doctrinal del proyecto y preserva la identidad del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahweh; aplicado al español como Yahvé'
- issue: Expresión masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma masculina del hebreo para no neutralizarla. En español sigue siendo clara y eclesialmente reconocible.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión inglesa reciente favoreció «the thing» para הַדָּבָר en lugar de «the word». La redacción española sigue esa decisión con «la cosa», evitando sobrerrepresentar «palabra» y manteniendo la fuerza de fórmula de mandato.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se evita «el SEÑOR» como sustitución editorial del Tetragrámaton.
  - «Hijos de Israel» mantiene la correspondencia gramatical masculina del hebreo.
  - Las comillas y el orden de la cita siguen la sintaxis natural del español bíblico moderno.
