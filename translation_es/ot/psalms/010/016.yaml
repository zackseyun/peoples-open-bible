translation:
  language: es
  text: Yahvé es Rey por los siglos de los siglos[a]; las naciones han perecido de su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su mundo». El hebreo puede significar «tierra» o «mundo», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrámaton en una forma española ya establecida en el proyecto. No se sustituye por un título genérico, para mantener la transparencia del texto fuente y la decisión doctrinal de nombrar a Dios por su nombre.
- source_word: מֶלֶךְ
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - es rey
  - reina
  lexicon: HALOT
  rationale: El hebreo usa un predicado nominal; 'Rey' conserva esa fuerza nominal mejor que verbalizarlo. En español suena natural y mantiene la declaración directa del verso.
- source_word: עוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: HALOT
  rationale: La fórmula española tradicional expresa bien la intensidad durativa del par hebreo y conserva el tono enfático sin adelgazarlo a un simple 'para siempre'.
- source_word: אָבְדוּ
  english_pob_choice: have perished
  chosen_spanish: han perecido
  alternatives_spanish:
  - perecieron
  - han sido destruidas
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una realidad consumada; 'han perecido' reproduce esa completitud de manera idiomática en español. Se evita 'han sido destruidas' porque añade pasividad no explícita en el verbo.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' es el equivalente más preciso y menos cargado teológicamente en este contexto, donde se trata de poderes colectivos externos y no de una categoría eclesial.'
- source_word: מֵאַרְצוֹ
  english_pob_choice: from his land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - de su país
  - de su tierra/país
  - de su tierra
  lexicon: HALOT
  rationale: Se elige 'tierra' para conservar la ambigüedad hebrea entre 'land' y 'earth' sin imponer una sola lectura. En español 'tierra' puede abarcar el ámbito territorial concreto y, al mismo tiempo, dejar abierta la amplitud cósmica del término.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea hebrea contiene explícitamente יְהוָה. La traducción española adopta 'Yahvé' para preservar el nombre revelado, de acuerdo con la práctica del proyecto, en vez de ocultarlo tras un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Alcance de מֵאַרְצוֹ
  english_pob_reading: from his land
  chosen_spanish_reading: de su tierra
  alternative_spanish_readings:
  - de su tierra/país
  - de su tierra
  rationale: El contexto permite tanto una referencia territorial concreta como una lectura más amplia de 'earth'. La elección 'tierra' mantiene esa tensión y evita resolver de manera prematura una ambigüedad que el texto hebreo no despeja por sí mismo.
  doctrine_reference: DOCTRINE.md — Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide con el avalúo auditado de la POB en inglés: se mantiene el nombre divino como Yahvé, el predicado nominal Rey, la intensificación durativa de ''por los siglos de los siglos'' y la ambigüedad de מֵאַרְצוֹ mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - '''Rey'' conserva la estructura nominal del hebreo sin convertirla en perífrasis verbal.'
  - '''de su tierra'' mantiene abierta la tensión entre ''land'' y ''earth'' sin introducir un sentido ajeno al contexto.'
  - La puntuación con punto y coma refleja la cesura poética del hebreo y la división propuesta por la POB en inglés.
