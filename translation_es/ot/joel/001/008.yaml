translation:
  language: es
  text: ¡Gime como una virgen vestida de cilicio[a], por el esposo de su juventud[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ceñida de cilicio».
    reason: lexical_alternative
  - marker: b
    text: «Esposo» también puede entenderse como «prometido», pues la imagen poética y cultural está muy condensada.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלִי
  english_pob_choice: Wail
  chosen_spanish: ¡Gime!
  alternatives_spanish:
  - ¡Clama!
  - ¡Lamenta!
  lexicon: HALOT
  rationale: El imperativo pide una expresión audible y aguda de duelo. «Gime» conserva mejor la fuerza lamentosa que un simple «llora» y evita suavizar el tono profético.
- source_word: כִּבְתוּלָה
  english_pob_choice: like a virgin
  chosen_spanish: como una virgen
  alternatives_spanish:
  - como una doncella
  - como una joven mujer
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige «como». «Virgen» mantiene el valor semántico y la carga imagística vinculada a su condición juvenil/no casada, sin diluirla.
- source_word: חֲגֻרַת שַׂק
  english_pob_choice: clothed in sackcloth
  chosen_spanish: vestida de cilicio
  alternatives_spanish:
  - ceñida de cilicio
  - vestida de saco
  lexicon: HALOT
  rationale: La imagen literalmente es «ceñida de saco/cilicio». «Vestida de cilicio» suena natural en español bíblico moderno y retiene el signo de luto. «Cilicio» comunica el tejido áspero asociado al duelo.
- source_word: שַׂק
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco
  - tela áspera de luto
  lexicon: HALOT
  rationale: En español eclesial amplio, «cilicio» es el equivalente tradicional y comprensible para la prenda de aflicción. Aunque puede sugerir disciplinas ascéticas, aquí el contexto de duelo justifica su uso.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - sobre
  lexicon: HALOT
  rationale: En contextos de lamento, עַל introduce el motivo u objeto del duelo. «Por» es la opción española más idiomática y conserva la relación causal/afectiva.
- source_word: בַּעַל
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - prometido
  lexicon: HALOT
  rationale: El término puede abarcar la relación conyugal o comprometida; el POB inglés preserva la tensión con una nota. «Esposo» comunica la relación matrimonial o de compromiso sin forzar una resolución interpretativa en el texto principal.
- source_word: נְעוּרֶיהָ
  english_pob_choice: of her youth
  chosen_spanish: de su juventud
  alternatives_spanish:
  - desde su juventud
  - de sus años mozos
  lexicon: HALOT
  rationale: La construcción genitiva se refleja naturalmente como «de su juventud». Mantiene el vínculo idiomático con la etapa temprana de vida y con el esposo/compañero referido.
theological_decisions:
- issue: Tensión entre «virgen» y «esposo de su juventud»
  english_pob_reading: Retain the Hebrew imagery without harmonizing it to a fully explicit modern category.
  chosen_spanish_reading: 'Mantener la imagen hebrea sin resolverla por paráfrasis: «como una virgen... por el esposo de su juventud».'
  alternative_spanish_readings:
  - como una joven prometida...
  - como una novia que llora por su marido
  rationale: La poesía profética usa una imagen condensada que puede implicar virginidad literal, juventud, o un compromiso matrimonial. El español debe conservar esa tensión en lugar de sustituirla por una explicación interpretativa no presente en el hebreo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto base del POB inglés ya había sido revisado y mantenido sin cambios en la última pasada; esta versión sigue ese estado estable y traslada sus decisiones léxicas y de tensión poética al español sin añadir resolución interpretativa no documentada.
  spanish_consistency_notes:
  - Se preservó la equivalencia de lamento fuerte con un imperativo breve («Gime»).
  - Se eligió «cilicio» por ser un equivalente bíblico natural en español para la prenda de duelo, con nota de alternativa literal.
  - Se mantuvo la ambigüedad controlada de בַּעַל mediante «esposo», dejando abierta la posibilidad de compromiso/noviazgo en la nota.
  - El orden general sigue el hebreo y la segmentación poética del versículo.
