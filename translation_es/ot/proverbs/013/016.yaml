translation:
  language: es
  text: Todo hombre prudente obra con conocimiento[a], pero el necio despliega necedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pone al descubierto necedad» / «extiende necedad». El verbo hebreo sugiere hacer algo abierto o visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo hombre
  lexicon: HALOT
  rationale: El valor distributivo del hebreo encaja bien con «Todo» en un proverbio gnómico. Mantiene la generalización sin introducir una formulación innecesariamente pesada.
- source_word: עָרוּם
  english_pob_choice: prudent man
  chosen_spanish: hombre prudente
  alternatives_spanish:
  - prudente
  - hombre sagaz
  - hombre sensato
  lexicon: HALOT
  rationale: En Proverbios, el término tiene una fuerza positiva de previsión y buen juicio. «Prudente» conserva ese valor; «hombre» reproduce el singular masculino representativo del hebreo y evita una abstracción menos natural en español.
- source_word: יַעֲשֶׂה
  english_pob_choice: acts
  chosen_spanish: obra
  alternatives_spanish:
  - actúa
  - hace
  - trabaja
  lexicon: HALOT
  rationale: «Obra» comunica conducta habitual en un refrán sapiencial y suena más natural que un calco de «hace». Mantiene el sentido amplio del verbo hebreo.
- source_word: בְדָעַת
  english_pob_choice: with knowledge
  chosen_spanish: con conocimiento
  alternatives_spanish:
  - en conocimiento
  - sabiamente
  - con entendimiento
  lexicon: HALOT
  rationale: La preposición beth expresa aquí base o acompañamiento instrumental. «Con conocimiento» es fiel y claro en español, sin forzar el matiz adverbial.
- source_word: וּכְסִיל
  english_pob_choice: but a fool
  chosen_spanish: pero el necio
  alternatives_spanish:
  - y el necio
  - pero un necio
  lexicon: HALOT
  rationale: El hebreo coordina con «y», pero el contraste proverbial queda mejor en español con «pero». «Necio» es el término sapiencial más directo y evita un giro menos idiomático como «fool» traducido mecánicamente.
- source_word: יִפְרֹשׂ
  english_pob_choice: displays
  chosen_spanish: despliega
  alternatives_spanish:
  - expone
  - extiende
  - deja ver
  - pone al descubierto
  lexicon: HALOT
  rationale: El verbo hebreo sugiere literalmente extender o abrir. «Despliega» conserva esa imagen y puede entenderse como hacer visible la necedad sin perder el matiz léxico del hebreo.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - locura
  - fatuidad
  lexicon: HALOT
  rationale: «Necedad» es el equivalente sapiencial más natural en español y mantiene el sustantivo abstracto del hebreo. Evita «locura», que en español contemporáneo puede sonar más clínica o emocional que moral.
translation_notes:
  revision_awareness: 'La versión inglesa auditada sigue estable y no requiere cambios: conserva el paralelismo sapiencial, la oposición prudente/necio y el valor imagen-léxico de יִפְרֹשׂ con una nota alternativa sobre su metáfora de “abrir/mostrar”.'
  spanish_consistency_notes:
  - Se preserva el estilo sapiencial breve y antitético del proverbio.
  - «Prudente» y «necio/necedad» mantienen terminología bíblica clara y reconocible en español.
  - La nota conserva la tensión léxica del verbo final sin sobreinterpretarlo.
