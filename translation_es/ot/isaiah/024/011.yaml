translation:
  language: es
  text: Hay un clamor por el vino en las calles; toda alegría se ha oscurecido[a]; el regocijo de la tierra se ha ido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda alegría ha llegado a ser noche», conservando la imagen hebrea de la alegría oscureciéndose como al caer la noche.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el regocijo de la tierra ha partido».'
    reason: alternative_reading
lexical_decisions:
- source_word: צְוָחָה
  english_pob_choice: There is an outcry
  chosen_spanish: Hay un clamor
  alternatives_spanish:
  - Hay un grito
  - Hay un alarido
  lexicon: HALOT
  rationale: El hebreo es un sustantivo de lamento o grito de angustia. En español, «Hay un clamor» conserva el valor nominal y suena natural en contexto público y de aflicción.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - a causa de
  lexicon: HALOT
  rationale: Con «vino» la preposición señala el motivo del lamento. «Por» mantiene una relación causal/comentativa natural en español sin cerrar la ambigüedad del hebreo.
- source_word: הַיַּיִן
  english_pob_choice: the wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: Se conserva el artículo definido porque el hebreo lo presenta así y el español lo admite de forma natural.
- source_word: בַּחוּצוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los espacios públicos
  lexicon: HALOT
  rationale: El plural hebreo designa lugares abiertos y públicos de la ciudad. «Calles» comunica bien el escenario sin sonar técnico.
- source_word: עָרְבָה
  english_pob_choice: has grown dark
  chosen_spanish: se ha oscurecido
  alternatives_spanish:
  - ha caído la noche
  - se ha hecho de noche
  - se ha puesto oscuro
  lexicon: HALOT
  rationale: Aplicado a la alegría, el verbo usa la imagen de oscurecerse o ponerse de noche. «Se ha oscurecido» conserva la metáfora sin neutralizarla.
- source_word: כָּל שִׂמְחָה
  english_pob_choice: all joy
  chosen_spanish: toda alegría
  alternatives_spanish:
  - toda la alegría
  - toda clase de alegría
  lexicon: HALOT
  rationale: La frase es totalizante. «Toda alegría» reproduce bien el alcance integral del hebreo y es idiomática en español.
- source_word: גָּלָה
  english_pob_choice: has gone away
  chosen_spanish: se ha ido
  alternatives_spanish:
  - ha desaparecido
  - se ha marchado
  lexicon: HALOT
  rationale: Con «la alegría» como sujeto, el verbo expresa partida o retiro. «Se ha ido» es breve, claro y respeta la imagen de alejamiento.
- source_word: מְשׂוֹשׂ
  english_pob_choice: the gladness
  chosen_spanish: la alegría
  alternatives_spanish:
  - el regocijo
  - la dicha
  - la algazara
  lexicon: HALOT
  rationale: Este sustantivo se superpone con שִׂמְחָה, pero puede intensificar la idea de regocijo festivo. En español, «la alegría» mantiene continuidad semántica sin forzar una distinción artificial.
- source_word: הָאָרֶץ
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra habitada
  - del mundo
  lexicon: HALOT
  rationale: Aunque el contexto de Isaías 24 es amplio, el término hebreo también permite «tierra»; en español funciona bien para conservar tanto la amplitud como la concreción poética del original.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra habitada
  - el mundo
  rationale: El capítulo presenta un juicio de alcance amplio, pero el hebreo usa un término que puede abarcar tanto territorio como mundo. «La tierra» conserva esa amplitud sin estrechar indebidamente el texto ni imponer una cosmología explicativa adicional.
  doctrine_reference: Isaías 24:1–13; uso poético de הָאָרֶץ en literatura profética
translation_notes:
  revision_awareness: Se siguió la lectura estable del inglés POB, pero se ajustó el alcance de הָאָרֶץ a «la tierra» para reflejar mejor la ambigüedad poética del hebreo y evitar una decisión demasiado interpretativa. No se detectaron revisiones sustantivas en el audit trail reciente.
  spanish_consistency_notes:
  - Se mantiene «alegría» para שִׂמְחָה y también para מְשׂוֹשׂ, siguiendo la cercanía semántica del hebreo; la diferencia se conserva solo en el matiz contextual, no con dos términos españoles artificialmente distintos.
  - «Yahvé» no aparece en este versículo, por lo que no se aplica la convención del nombre divino.
  - Se prefirió una sintaxis española directa y publicable, sin eliminar la imagen hebrea de oscurecimiento en la segunda cláusula.
