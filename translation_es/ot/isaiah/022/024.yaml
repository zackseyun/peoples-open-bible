  to: Y colgarán de él toda la gloria de la casa de su padre[a], la descendencia y las ramificaciones[b], todo utensilio pequeño, desde los cuencos[c] hasta todos los cántaros.
  rationale: Se ajusta «las ramas» a «las ramificaciones» para mantener la idea de líneas familiares secundarias sin una imagen demasiado literal o tosca en español. Se cambia «todos los utensilios pequeños» por «todo utensilio pequeño» para reflejar mejor el singular colectivo del hebreo y del audit trail inglés. Se simplifica la nota b para explicar la distinción familiar probable sin imponer una metáfora específica en el texto principal.
