  spanish_consistency_notes:
  - Se conserva el orden breve y nominal del original, adecuado para listas censales.
  - No se introduce artículo antes de los nombres propios, en línea con el hebreo.
  - «para» reproduce la función relacional de ל mejor que una posesión simple.
  - Los nombres propios se normalizan de forma consistente al español bíblico sin perder su enlace reconocible con el hebreo.
