translation:
  language: es
  text: Pero tú eres justo en todo lo que ha venido sobre nosotros[a], porque has actuado con fidelidad, pero nosotros hemos actuado perversamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has hecho verdad», es decir, «has actuado con fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: Yet you
  chosen_spanish: Sin embargo, tú
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: La partícula con pronombre introduce contraste con la confesión de culpa; «Sin embargo» comunica mejor ese giro adversativo en español que un simple «y».
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo delante de Dios
  lexicon: HALOT
  rationale: «Justo» conserva la afirmación moral y judicial respecto de Dios en este contexto confesional. «Recto» sería posible, pero suena menos natural aquí.
- source_word: עַל כָּל הַבָּא עָלֵינוּ
  english_pob_choice: in all that has come upon us
  chosen_spanish: en todo lo que ha venido sobre nosotros
  alternatives_spanish:
  - respecto de todo lo que ha venido sobre nosotros
  - ante todo lo que nos ha sobrevenido
  lexicon: HALOT
  rationale: La construcción expresa el ámbito en que se declara la justicia de Dios. «Ha venido sobre nosotros» refleja bien el hebreo del mal o juicio que sobreviene.
- source_word: אֱמֶת עָשִׂיתָ
  english_pob_choice: you have acted faithfully
  chosen_spanish: has actuado con fidelidad
  alternatives_spanish:
  - has hecho verdad
  - has obrado en verdad
  lexicon: HALOT
  rationale: El POB inglés ya interpreta אֱמֶת con sentido adverbial de fidelidad. En español, «con fidelidad» expresa naturalmente esa idea relacional y covenantal sin perder el matiz de verdad/lealtad.
- source_word: עָשִׂיתָ
  english_pob_choice: you have acted
  chosen_spanish: has actuado
  alternatives_spanish:
  - has hecho
  - has obrado
  lexicon: HALOT
  rationale: «Actuado» mantiene la referencia al comportamiento de Dios, en paralelo con la cláusula siguiente. Evita una traducción demasiado literal que sonaría rígida en español.
- source_word: וַאֲנַחְנוּ
  english_pob_choice: but we
  chosen_spanish: pero nosotros
  alternatives_spanish:
  - y nosotros
  - en cambio, nosotros
  lexicon: HALOT
  rationale: El contraste es claro en el contexto; «pero nosotros» lo hace explícito y natural en español.
- source_word: הִרְשָׁעְנוּ
  english_pob_choice: have acted wickedly
  chosen_spanish: hemos obrado perversamente
  alternatives_spanish:
  - hemos actuado mal
  - nos hemos portado impíamente
  lexicon: HALOT
  rationale: El verbo comunica la idea de obrar con culpa o maldad. «Obrado perversamente» preserva la fuerza moral del hebreo sin recurrir a un término demasiado arcaico.
theological_decisions:
- issue: La justicia de Dios frente a los desastres que han caído sobre Israel
  english_pob_reading: God is righteous in all that has come upon us, without softening the statement or implying injustice.
  chosen_spanish_reading: Dios es justo en todo lo que ha venido sobre nosotros, sin atenuar que la confesión reconoce la rectitud divina ante el juicio experimentado.
  alternative_spanish_readings:
  - Dios tiene razón en todo lo que nos ha sucedido
  - Dios es justo al castigarnos
  rationale: 'La frase mantiene la tensión confesional: el pueblo admite la justicia de Dios respecto de lo ocurrido, sin explicar más de lo que el texto dice. «Justo» conserva la carga teológica de la declaración.'
  doctrine_reference: Translation philosophy §3; conservación de la tensión confesional y del lenguaje de justicia divina.
- issue: אֱמֶת עָשִׂיתָ y su posible sentido lexical
  english_pob_reading: you have acted faithfully / Or 'you have done truth,' that is, 'you have acted in faithfulness.'
  chosen_spanish_reading: has actuado con fidelidad
  alternative_spanish_readings:
  - has hecho verdad
  - has obrado en verdad
  rationale: La nota inglesa preserva la alternativa lexical. En español, «con fidelidad» comunica mejor el valor relacional de אֱמֶת en esta construcción, sin perder la base de verdad/reliabilidad.
  doctrine_reference: Contested terms table; preservación de matices léxicos sin mecanicismo.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; este borrador sigue de cerca la lectura aprobada, adaptando el paralelismo y la nota léxica al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo nombra explícitamente el nombre divino; aquí el sujeto es «tú» y el versículo no requiere esa forma.
  - Se mantiene «justo» para צַדִּיק por su valor confesional y judicial en el contexto.
  - Se conserva el contraste adversativo con «Sin embargo» / «pero», coherente con la lógica del versículo.
  - La nota a pie de página reproduce la alternativa léxica sin introducir una interpretación doctrinal nueva.
