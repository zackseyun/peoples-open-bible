review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue de manera fiel la línea principal adoptada por el POB inglés. Introduce expansiones del paralelo griego en el texto principal (''en los sueños, como en día de guardia'', ''ha escapado... de la guerra'') que el inglés relegó a notas, y además debilita o altera varios sentidos del hebreo: לריק se vuelve ''casi nada'' en lugar de ''en vano'', ובהלות לבו se suaviza a ''turbación'' en vez de ''terrores/espantos''. La idea central compartida por hebreo y griego es: reposo brevísimo e inútil, seguido por sacudimiento interior, como de alguien que huye de un perseguidor.'
  spanish_quality_summary: 'El español actual suena fragmentario y poco natural: ''Por un poco, casi nada, en reposo'' y ''y desde eso'' no son formulaciones idiomáticas. Además, el uso de dos puntos sintácticos provenientes del griego produce una frase poco legible. Una revisión breve puede volver el versículo claro, digno y fiel sin perder la cautela textual.'
  glossary_alignment: 'No hay términos del glosario principal especialmente controvertidos aquí, pero sí hay desalineación con decisiones léxicas documentadas del POB: ''in vain'' debe reflejarse como ''en vano''; ''the terrors of his heart'' debe conservar fuerza léxica en español (''los terrores/espantos de su corazón''); y la imagen final debe seguir la opción principal ''como quien huye de delante de un perseguidor'', dejando la variante griega sobre ''la guerra'' en nota.'
  issues:
  - severity: high
    issue: El texto principal español incorpora material del paralelo griego que el POB inglés dejó en nota.
    rationale: La frase 'y desde eso, en los sueños, como en día de guardia' proviene del griego expandido, no de la línea principal inglesa basada en el hebreo difícil. Esto cambia la base textual del versículo y rompe la trazabilidad con el audit trail.
  - severity: high
    issue: La imagen final cambia 'de un perseguidor' por 'de la guerra'.
    rationale: El POB inglés decidió traducir la imagen compartida mínima como huida ante un perseguidor, dejando 'de la guerra' como variante del paralelo griego. El borrador español invierte esa decisión y por tanto no preserva la elección documentada.
  - severity: medium
    issue: לריק está mal representado por 'casi nada'.
    rationale: '''Casi nada'' expresa cantidad mínima, no inutilidad o vaciedad. El sentido documentado es ''en vano'' o ''para nada'', calificando el descanso como ineficaz.'
  - severity: medium
    issue: בהלות לבו se atenúa indebidamente como 'la turbación de su corazón'.
    rationale: Aunque 'turbación' es posible en contexto, la decisión inglesa preserva la fuerza de 'terrors/alarms'. En español conviene 'los terrores de su corazón' o 'los espantos de su corazón' para no suavizar el hebreo.
  - severity: medium
    issue: La redacción española es poco idiomática.
    rationale: 'Expresiones como ''Por un poco'' y ''y desde eso'' no suenan naturales en español bíblico actual. Se puede mantener fidelidad con formas más claras: ''Por un poco de tiempo... luego, por los terrores de su corazón...''.'
  revised_spanish_text: Por un poco de tiempo[a], como por un instante, está quieto en vano; luego, por los terrores de su corazón[b], es sacudido, como quien huye de delante de un perseguidor.
  revised_footnotes:
