    text: Or “turning back to the LORD with all your heart.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew plural “Ashtaroths” likely refers to manifestations, images, or cultic forms associated with the goddess Ashtoreth/Astarte.
    reason: cultural_note
  - marker: c
    text: Or “prepare your heart for the LORD.”
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew: “from the hand of the Philistines,” an idiom for deliverance from their power.'
    reason: lexical_alternative
