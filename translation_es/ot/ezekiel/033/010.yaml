revisions:
- from: 'Y tú, hijo de hombre, di a la casa de Israel: «Así habéis dicho: “Ciertamente nuestras rebeliones y nuestros pecados están sobre nosotros, y por ellos nos vamos deshaciendo[a]; ¿cómo, pues, viviremos?”»'
  to: 'Y tú, hijo de hombre, di a la casa de Israel: «Así han dicho: “Ciertamente nuestras transgresiones y nuestros pecados están sobre nosotros, y en ellos nos consumimos[a]; ¿cómo podremos vivir?”»'
  rationale: 'Se corrige la alineación con la evidencia fuente y con el expediente POB en dos puntos clave: «transgresiones» en vez de «rebeliones» y «en ellos» en vez de «por ellos». También se ajusta el registro al español neutral con «han dicho» y se mejora la naturalidad/precisión de נְמַקִּים con «nos consumimos». No se requiere adjudicación adicional porque los cambios son directos y bien sustentados por el expediente.'
  reviewer_model: gpt-5.4
