translation:
  language: es
  text: La raspó en sus manos[a] y siguió caminando, comiendo mientras iba. Luego fue a su padre y a su madre, y les dio un poco, y comieron. Pero no les dijo que había raspado la miel del cadáver del león.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sacó» o «la extrajo»; el verbo hebreo sugiere quitar la miel con la mano desde el interior del cadáver.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדֵּהוּ
  english_pob_choice: He scraped it
  chosen_spanish: Lo desmenuzó
  alternatives_spanish:
  - Lo raspó
  - Lo sacó
  lexicon: HALOT
  rationale: El verbo רדה aquí describe extraer la miel del interior del cuerpo del león con la mano. En español, «desmenuzó» no es literal, pero comunica la acción concreta de separar y extraer; sin embargo, «raspó» conserva mejor la imagen física de la POB inglesa «scraped». La elección principal busca fluidez sin perder la fuerza corporal del acto.
- source_word: אֶל כַּפָּיו
  english_pob_choice: into his hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en sus palmas
  - sobre sus manos
  lexicon: HALOT
  rationale: כַּף puede significar «palma» o «mano». «En sus manos» es la forma más natural en español y conserva la imagen sin sonar forzada.
- source_word: וַיֵּלֶךְ הָלוֹךְ וְאָכֹל
  english_pob_choice: went on, eating as he went
  chosen_spanish: siguió caminando y comiendo
  alternatives_spanish:
  - fue andando y comiendo
  - siguió andando, comiendo mientras iba
  lexicon: HALOT
  rationale: La construcción infinitiva expresa continuidad. «Siguió caminando y comiendo» reproduce el sentido durativo de manera natural en español.
- source_word: וַיֵּלֶךְ אֶל אָבִיו וְאֶל אִמּוֹ
  english_pob_choice: Then he went to his father and mother
  chosen_spanish: Luego fue a su padre y a su madre
  alternatives_spanish:
  - Entonces fue a su padre y a su madre
  - Fue a su padre y a su madre
  lexicon: HALOT
  rationale: הלך es simplemente «ir». «Luego» refleja la secuencia narrativa del hebreo, y «fue» mantiene la simplicidad del verbo.
- source_word: וַיִּתֵּן לָהֶם
  english_pob_choice: gave some to them
  chosen_spanish: les dio un poco
  alternatives_spanish:
  - les dio de ello
  - les dio
  lexicon: HALOT
  rationale: El objeto está implícito por el contexto; en español conviene explicitar la porción con «un poco», como hizo la POB inglesa con «some», sin añadir más de lo debido.
- source_word: וַיֹּאכֵלוּ
  english_pob_choice: they ate
  chosen_spanish: y comieron
  alternatives_spanish:
  - y lo comieron
  - y ellos comieron
  lexicon: HALOT
  rationale: El verbo es narrativo simple y el objeto se entiende por el contexto. «Y comieron» es natural y suficiente.
- source_word: וְלֹא הִגִּיד לָהֶם
  english_pob_choice: But he did not tell them
  chosen_spanish: Pero no les dijo
  alternatives_spanish:
  - Y no les dijo
  - Pero no se lo dijo
  lexicon: HALOT
  rationale: הגיד significa «decir, declarar, comunicar». «No les dijo» es la equivalencia narrativa más directa y natural en español.
- source_word: מִגְּוִיַּת הָאַרְיֵה
  english_pob_choice: from the carcass of the lion
  chosen_spanish: del cadáver del león
  alternatives_spanish:
  - de la carroña del león
  - del cuerpo del león
  lexicon: HALOT
  rationale: גְּוִיָּה denota un cuerpo muerto, cadáver. «Cadáver» preserva la concreción desagradable del hebreo y es más general que «carroña» para un animal.
- source_word: רָדָה הַדְּבָשׁ
  english_pob_choice: had scraped the honey
  chosen_spanish: había desmenuzado la miel
  alternatives_spanish:
  - había raspado la miel
  - había sacado la miel
  lexicon: HALOT
  rationale: El mismo verbo רדה reaparece en la cláusula explicativa. Para mantener coherencia léxica con la acción inicial, conviene reflejar la idea de extracción manual; «había raspado» es la alternativa más cercana al inglés POB y a la imagen hebrea.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una sola nota léxica sobre la acción de retirar la miel de dentro del cadáver del león. La versión española conserva esa misma tensión semántica y la traslada a una formulación natural en español. Se reconoció además la revisión inglesa de «out of» a «from» como un ajuste estilístico sin cambio de sentido, por lo que no requiere nota textual adicional.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo del hebreo: extracción, marcha continua, visita a los padres, entrega de parte, consumo y silencio sobre el origen.'
  - Se preserva la concreción de גְּוִיָּה con «cadáver», evitando suavizar el tono del texto.
  - La redundancia de movimiento y acción se reproduce con «siguió caminando y comiendo» para reflejar el valor durativo del hebreo.
  - No se usa «SEÑOR» ni terminología eclesial no pertinente; el versículo no contiene nombres divinos explícitos.
