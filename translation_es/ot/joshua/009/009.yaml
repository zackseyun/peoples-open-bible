  glossary_alignment: Alinea bien con la política del proyecto en «Yahvé». La principal desalineación está en tratar עבד según una preferencia genérica de fuerza léxica en vez de seguir la excepción contextual documentada en el propio expediente inglés para discurso diplomático deferente. «Su fama» para שָׁמַעְנוּ שָׁמְעוֹ está bien, con nota alternativa adecuada.
