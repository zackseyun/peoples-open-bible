translation:
  language: es
  text: y, al inclinarte ante mi apelación benévola[a], te apiadarás de tu propia vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al rendir homenaje a»; en el contexto más amplio de apostasía forzada, posiblemente «al adorar».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκυνήσας
  english_pob_choice: by bowing down
  chosen_spanish: al inclinarte ante
  alternatives_spanish:
  - al postrarte ante
  - al rendir homenaje a
  - al adorar
  lexicon: LSJ
  rationale: El participio aoristo expresa la acción previa o concomitante de someterse físicamente. En español, «al inclinarte ante» conserva la imagen corporal y el matiz de deferencia sin cerrar demasiado el sentido en «adorar», aunque ese matiz sigue posible en el contexto.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mía
  - de mí
  lexicon: LSJ
  rationale: Es el posesivo directo y natural en español para el discurso del hablante.
- source_word: τὴν φιλάνθρωπον παρηγορίαν
  english_pob_choice: my humane persuasion
  chosen_spanish: mi persuasión benévola
  alternatives_spanish:
  - mi apelación benévola
  - mi exhortación benigna
  - mi persuasión humana
  lexicon: LSJ
  rationale: παρηγορία puede abarcar consuelo, estímulo o apelación persuasiva; aquí el contexto es coercitivo, por lo que «persuasión» comunica mejor la fuerza retórica que «consuelo». φιλάνθρωπον se traduce con un adjetivo que preserve la valoración presentada por el hablante sin avalarla como genuinamente misericordiosa.
- source_word: οἰκτειρήσεις
  english_pob_choice: you will have pity on
  chosen_spanish: tendrás compasión de
  alternatives_spanish:
  - te apiadarás de
  - tendrás piedad de
  - perdonarás
  lexicon: LSJ
  rationale: El futuro de οἰκτείρω expresa compasión o piedad. En español, «tener compasión de» es idiomático y mantiene el tono de consideración hacia uno mismo que el griego sugiere en esta apelación.
- source_word: τὸ σεαυτοῦ γῆρας
  english_pob_choice: your own old age
  chosen_spanish: tu propia vejez
  alternatives_spanish:
  - tu propia ancianidad
  - tu propia edad avanzada
  - tu vejez
  lexicon: LSJ
  rationale: γῆρας significa «vejez» o «ancianidad». «Tu propia vejez» conserva la fuerza reflexiva de σεαυτοῦ y el llamado a la autopreservación en la vejez.
theological_decisions:
- issue: Sentido de προσκυνέω en contexto de presión real
  english_pob_reading: bow down, with possible worship/homage nuance preserved in footnote
  chosen_spanish_reading: inclinarte ante, con posible matiz de postración/homenaje preservado en nota
  alternative_spanish_readings:
  - adorarte
  - postrarte
  - rendir homenaje
  rationale: El verbo puede denotar adoración o postración/homenaje. Como el contexto inmediato es una exigencia de sumisión coercitiva, «inclinarte ante» mantiene la ambigüedad útil entre gesto corporal y acto de reverencia, sin resolver prematuramente la tensión teológica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió una lectura más directa del participio («by bowing down») y «persuasion» para παρηγορίαν. En español se reflejó esa decisión con una subordinación participial natural («al inclinarte ante») y con «persuasión benévola», manteniendo la tensión entre benevolencia aparente y coerción del contexto.
  spanish_consistency_notes:
  - Se evitó «Señor» y no aplica la convención de Yahvé en este versículo.
  - Se eligió «vejez» para γῆρας, más natural y fiel que una paráfrasis amplia.
  - «Persuasión benévola» conserva la ironía contextual de un ruego interesado; no se suavizó a «consuelo».
  - La nota al pie preserva el posible matiz de homenaje/adoración que el contexto narrativo puede exigir.
