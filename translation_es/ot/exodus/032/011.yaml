translation:
  language: es
  text: 'Pero Moisés suplicó[a] a Yahvé, su Dios, y dijo: «¿Por qué, Yahvé, ha de encenderse tu ira contra tu pueblo, que tú sacaste de la tierra de Egipto con gran poder y con mano fuerte[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «buscó el rostro de Yahvé»; es un modismo que significa suplicar con insistencia o buscar favor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con mano poderosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַל
  english_pob_choice: pleaded with
  chosen_spanish: suplicó
  alternatives_spanish:
  - rogó
  - intercedió
  - imploró
  lexicon: HALOT
  rationale: El verbo en este contexto expresa una súplica intensa e intercesora. «Suplicó» comunica bien el sentido de pedir con urgencia y respeto, sin perder el matiz relacional que el inglés POB captó con «pleaded with».
- source_word: אֶת־פְּנֵי
  english_pob_choice: with
  alternatives_spanish:
  - ante
  - delante de
  - a favor de
  lexicon: HALOT
  rationale: La expresión hebrea literal «buscó el rostro de» es un modismo. En español, el sentido idiomático queda mejor expresado por la combinación con «suplicó», por lo que no se vierte de modo mecánico como «el rostro de».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: «Yahvé» en el texto principal, conservando la transparencia del nombre personal de Dios.'
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - su propio Dios
  lexicon: HALOT
  rationale: El posesivo singular señala la relación de pacto entre Moisés y Dios. «Su Dios» conserva la referencia sin sobreexplicar.
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón
  - ¿Con qué motivo
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español; mantiene el tono de reprensión súplica del versículo.
- source_word: יֶחֱרֶה אַפְּךָ
  english_pob_choice: should your anger burn
  chosen_spanish: ha de encenderse tu ira
  alternatives_spanish:
  - arde tu ira
  - debería arder tu ira
  - se encienda tu ira
  lexicon: HALOT
  rationale: La imagen hebrea combina ardor y nariz/ira. «Ha de encenderse tu ira» preserva la metáfora de calor en un español natural y solemne, sin banalizarla como simple «estar enojado».
- source_word: בְּעַמֶּךָ
  english_pob_choice: against your people
  chosen_spanish: contra tu pueblo
  alternatives_spanish:
  - sobre tu pueblo
  - en contra de tu pueblo
  lexicon: HALOT
  rationale: Con el verbo de ira, «contra» expresa bien la dirección hostil implícita del hebreo y mantiene la fuerza retórica de la intercesión.
- source_word: אֲשֶׁר הוֹצֵאתָ
  english_pob_choice: whom you brought out
  chosen_spanish: que tú sacaste
  alternatives_spanish:
  - que tú sacaste afuera
  - a quienes sacaste
  lexicon: HALOT
  rationale: El éxodo hebreo usa «sacar» como verbo clásico de liberación. «Sacaste» resulta más idiomático en español que «trajiste afuera» y conserva el hecho de la liberación divina.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: La fórmula completa mantiene la cadencia formal del hebreo y la especificidad geográfica del relato.
- source_word: בְּכֹחַ גָּדוֹל
  english_pob_choice: with great power
  chosen_spanish: con gran poder
  alternatives_spanish:
  - con gran fuerza
  - mediante gran poder
  lexicon: HALOT
  rationale: «Poder» reproduce bien la idea de fuerza eficaz y soberana, y «gran» refleja el énfasis intensivo del adjetivo hebreo.
- source_word: וּבְיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: y con mano fuerte
  alternatives_spanish:
  - y con mano poderosa
  - y con mano poderosa y fuerte
  lexicon: HALOT
  rationale: La expresión es una fórmula estable del éxodo. «Mano fuerte» es un equivalente directo y claro del hebreo, y funciona de manera natural en español bíblico moderno.
theological_decisions:
- issue: Antropomorfismo de la ira divina
  english_pob_reading: Retain the metaphor in moderated form as 'your anger burn' rather than flattening to 'be angry' or over-literalizing to 'your nose burn.'
  chosen_spanish_reading: 'Conservar la metáfora en una forma moderada: «ha de encenderse tu ira»'
  alternative_spanish_readings:
  - tu ira arda
  - tu ira se encienda
  - se encienda tu nariz
  rationale: El hebreo emplea imaginería corporal para la ira divina. La versión española mantiene la fuerza figurada sin convertirla en una expresión extraña ni diluirla por completo.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue el estándar editorial del proyecto para el Tetragrámaton, manteniendo transparencia y coherencia en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando marcas de nota ancladas exactamente en el texto español ([a], [b], [c]) y manteniendo la lectura fuente-granular sin depender mecánicamente del inglés. La redacción conserva la intercesión, el modismo hebreo subyacente y la fórmula del éxodo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en coherencia con el criterio del proyecto.
  - Se mantiene «pueblo» y no «gente», porque el hebreo tiene un sustantivo de pertenencia pactal.
  - «Mano fuerte» sigue la fórmula del éxodo y evita la sustitución por un giro más devocional.
  - La expresión «ha de encenderse tu ira» conserva la imaginería semítica sin volverla áspera en español.
