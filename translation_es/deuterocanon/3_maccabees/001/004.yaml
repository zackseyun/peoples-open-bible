translation:
  language: es
  text: Y cuando la batalla se había vuelto encarnizada y los asuntos se inclinaban aún más en favor de Antíoco, Arsinoe iba entre las tropas y las exhortaba insistentemente, con compasión y lágrimas, con el cabello suelto, a ayudarse ellos mismos y a sus hijos y a sus mujeres valerosamente, prometiendo dar a cada uno dos minas[a] de oro si vencían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una mina era una antigua unidad de peso y de dinero; aquí se promete a cada soldado dos minas de oro al obtener la victoria.
    reason: cultural_note
lexical_decisions:
- source_word: γενομένης δὲ καρτερᾶς μάχης
  english_pob_choice: when the battle had become fierce
  chosen_spanish: cuando la batalla se había vuelto recia
  alternatives_spanish:
  - cuando la batalla se había hecho feroz
  - cuando el combate se había intensificado
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto marca circunstancia de fondo; καρτεράς comunica dureza o reciedumbre del combate. «Rocia» conserva la fuerza sin sonar tan marcada como un calco.
- source_word: τῶν πραγμάτων μᾶλλον ἐρρωμένων τῷ Ἀντιόχῳ
  english_pob_choice: affairs were turning more strongly in Antiochus’s favor
  chosen_spanish: los asuntos iban cobrando más fuerza en favor de Antíoco
  alternatives_spanish:
  - la situación se hacía más fuerte para Antíoco
  - las cosas se volvían más favorables a Antíoco
  lexicon: LSJ
  rationale: 'πράγματα es amplio: asuntos, situación, cosas. ἐρρωμένων expresa fortalecimiento; «iban cobrando más fuerza» preserva esa idea y el comparativo μᾶλλον, sin perder la orientación favorable a Antíoco.'
- source_word: ἱκανῶς
  english_pob_choice: earnestly
  chosen_spanish: con compasión y lágrimas
  alternatives_spanish:
  - intensamente
  - insistentemente
  lexicon: LSJ
  rationale: 'El adverbio intensifica la acción de Arsinoe. En español, conviene reflejarlo en el tono de la exhortación: «las exhortaba» con el modo emotivo del contexto, sin introducir un adverbio extraño o redundante.'
- source_word: ἐπιπορευσαμένη τὰς δυνάμεις
  english_pob_choice: went among the troops
  chosen_spanish: pasando entre las tropas
  alternatives_spanish:
  - yendo entre las tropas
  - recorriendo las tropas
  lexicon: LSJ
  rationale: La forma participial describe que se movía entre las fuerzas. «Pasando entre las tropas» suena natural en español y mantiene el sentido espacial sin forzar una idea de repetición no segura.
- source_word: παρεκάλει
  english_pob_choice: urged
  chosen_spanish: las exhortaba
  alternatives_spanish:
  - las urgía
  - las alentaba
  lexicon: BDAG
  rationale: Παρακαλέω aquí tiene sentido exhortativo/apelativo. «Exhortaba» es más pleno que «urgía» y conserva el tono persuasivo y público de la escena.
- source_word: μετὰ οἴκτου καὶ δακρύων
  english_pob_choice: with pity and tears
  chosen_spanish: con compasión y lágrimas
  alternatives_spanish:
  - con piedad y lágrimas
  - con misericordia y lágrimas
  lexicon: LSJ
  rationale: οἶκτος puede ser compasión o piedad; «compasión» es claro en español contemporáneo y mantiene el registro emocional de la súplica.
- source_word: τοὺς πλοκάμους λελυμένη
  english_pob_choice: her hair let down
  chosen_spanish: con el cabello suelto
  alternatives_spanish:
  - con las trenzas sueltas
  - con la cabellera desatada
  lexicon: LSJ
  rationale: La imagen culturalmente significativa es la del cabello desatado como gesto de angustia o súplica. «Cabello suelto» comunica bien ese signo sin arcaísmo.
- source_word: βοηθεῖν ἑαυτοῖς τε καὶ τοῖς τέκνοις καὶ ταῖς γυναιξὶν
  english_pob_choice: to help themselves and their children and wives
  chosen_spanish: a ayudarse a sí mismos, y a sus hijos y a sus mujeres
  alternatives_spanish:
  - a defenderse a sí mismos, y a sus hijos y a sus mujeres
  - a auxiliarse a sí mismos, y a sus hijos y a sus mujeres
  lexicon: BDAG
  rationale: βοηθεῖν es «ayudar» o «venir en ayuda». Mantener «ayudarse a sí mismos» sigue de cerca el griego y evita añadir una interpretación militar demasiado fuerte donde el texto dice ayuda/defensa en sentido amplio.
- source_word: θαρραλέως
  english_pob_choice: courageously
  chosen_spanish: valerosamente
  alternatives_spanish:
  - con valentía
  - audazmente
  lexicon: LSJ
  rationale: El adverbio pide una acción decidida y valiente. «Valerosamente» es idiomático y conserva el tono exhortativo de la escena.
- source_word: ἐπαγγελλομένη δώσειν
  english_pob_choice: promising to give
  chosen_spanish: prometiendo dar
  alternatives_spanish:
  - comprometiéndose a dar
  - ofreciendo dar
  lexicon: BDAG
  rationale: El participio introduce el contenido de la promesa. «Prometiendo dar» es natural y fiel a la estructura griega.
- source_word: νικήσασιν
  english_pob_choice: if they won
  chosen_spanish: si vencían
  alternatives_spanish:
  - a los vencedores
  - si resultaban vencedores
  lexicon: LSJ
  rationale: El participio aoristo en dativo funciona con sentido condicional. «Si vencían» expresa bien la condición en español, sin forzar una nominalización.
- source_word: ἑκάστῳ δύο μνᾶς χρυσίου
  english_pob_choice: two minas of gold to each one
  chosen_spanish: a cada uno dos minas de oro
  alternatives_spanish:
  - dos minas de oro a cada uno
  - a cada uno dos minas de oro
  lexicon: LSJ
  rationale: μνᾶ es una unidad antigua de peso y valor; se conserva como «mina» sin convertirla a equivalencias modernas. «A cada uno» refleja el distributivo ἑκάστῳ y evita restringirlo a «cada hombre».
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del audit trail: no introduce la idea de que Arsinoe fuera ''repeatedly'' entre las tropas, porque ἐπιπορευσαμένη solo indica que iba/pasaba entre ellas; y traduce ἑκάστῳ de forma distributiva como «a cada uno», sin especificar género.'
  spanish_consistency_notes:
  - Se mantiene «Antíoco» para Ἀντίοχος, sin añadir título.
  - Se conserva «mina(s)» como unidad antigua, sin equivalencia moderna especulativa.
  - Se usa «compasión» para οἶκτος y «cabello suelto» para la señal de duelo o súplica.
  - No se introduce terminología eclesiástica ajena al contexto militar-histórico.
