translation:
  language: es
  text: Él remueve los montes[a], y no lo saben[b], cuando los vuelca en su ira[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mueve». El verbo hebreo puede indicar hacer que algo cambie de lugar.
    reason: lexical_alternative
  - marker: b
    text: La línea personifica poéticamente a los montes como si no supieran cuando Dios los vuelca.
    reason: cultural_note
  - marker: c
    text: O «en su furor».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּעְתִּיק
  english_pob_choice: removes
  chosen_spanish: remueve
  alternatives_spanish:
  - mueve
  - traslada
  - arranca
  lexicon: HALOT
  rationale: El participio hifil de עתק expresa hacer que algo se desplace de su lugar. En español, «remueve» comunica ese desplazamiento con naturalidad poética y mantiene la fuerza contextual; «mueve» es posible pero más débil, y «traslada» o «arranca» introducen matices menos ajustados al poema.
- source_word: הָרִים
  english_pob_choice: mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: El hebreo usa el plural de «montes/colinas montañosas». «Montes» es una opción válida y solemne en español bíblico, sin perder el referente plural.
- source_word: וְלֹא יָדָעוּ
  english_pob_choice: and they do not know it
  chosen_spanish: y no lo saben
  alternatives_spanish:
  - y no saben
  - sin saberlo
  lexicon: HALOT
  rationale: Se conserva la personificación del plural sujeto. «No lo saben» expresa en español la falta de conciencia del desplazamiento sin añadir demasiado; el objeto implícito se recupera por contexto, como en el inglés auditado.
- source_word: אֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - mientras
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal en que los montes no saben lo que ocurre. «Cuando» es la forma más natural y fiel al valor circunstancial del hebreo.
- source_word: הֲפָכָם
  english_pob_choice: he overturns them
  chosen_spanish: los trastorna
  alternatives_spanish:
  - los revierte
  - los derriba
  - los voltea
  lexicon: HALOT
  rationale: הפך denota voltear/derribar/poner al revés. «Trastorna» comunica el vuelco violento sin sonar demasiado mecánico en español; mantiene el sentido de inversión drástica que exige el contexto poético.
- source_word: בְּאַפּוֹ
  english_pob_choice: in his anger
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su furor
  - por su ira
  - en su indignación
  lexicon: HALOT
  rationale: אַף aquí es ira/enojo, no el órgano físico. «Ira» preserva el tono elevado y la equivalencia semántica de la expresión idiomática.
theological_decisions:
- issue: Antropomorfismo poético de los montes que «no saben»
  english_pob_reading: The line poetically personifies the mountains as not knowing when God overturns them.
  chosen_spanish_reading: La línea personifica poéticamente a los montes como incapaces de advertir cuando Dios los trastorna.
  alternative_spanish_readings:
  - los montes no saben
  - los montes no perciben
  rationale: Se conserva la personificación sin convertirla en explicación prosaica. En español, «no lo saben» mantiene la tensión poética y la imagen de poder soberano sobre la creación.
  doctrine_reference: Job 9:5; cf. Salmo 104:32; Isaías 40:4-5
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo en la revisión más reciente: no se registraron cambios aplicados y el dictamen fue de conformidad plena. La redacción española mantiene esa lectura estable, con ajuste natural de registro y metáfora poética.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente aquí, sino por la política general del proyecto cuando el contexto requiera el nombre divino; en este verso el sujeto está implícito por el marco del libro y se traduce con pronombre.
  - Se mantuvo el paralelismo poético breve del hebreo, evitando expandir la línea con glosas explicativas en el texto principal.
  - Se prefirió «ira» sobre «furor» por claridad y por alinearse con la equivalencia contextual de בְּאַפּוֹ.
