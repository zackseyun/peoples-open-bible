translation:
  language: es
  text: Quien se levante temprano por ella[a] no se cansará[b], porque la encontrará sentada junto a sus puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien la busque desde temprano». El verbo griego, en sentido más literal, alude a levantarse temprano y, por extensión, a buscar con diligencia desde temprano.'
    reason: lexical_alternative
  - marker: b
    text: La imagen es la de la Sabiduría personificada, ya presente y esperando junto a la entrada del que la busca.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ὀρθρίσας
  english_pob_choice: Whoever rises early
  chosen_spanish: Quien se levante temprano
  alternatives_spanish:
  - Quien madrugue
  - Quien se levante de madrugada
  - El que se levante temprano
  lexicon: LSJ
  rationale: ὀρθρίζω expresa levantarse muy temprano o madrugar; en español, 'levantarse temprano' conserva el sentido proverbial y resulta natural. 'Se levante' mantiene el valor general del participio sin volverlo demasiado literal o arcaico.
- source_word: ἐπ' αὐτὴν
  english_pob_choice: for her
  chosen_spanish: para ella
  alternatives_spanish:
  - hacia ella
  - por ella
  - para la Sabiduría
  lexicon: LSJ
  rationale: La preposición con acusativo indica dirección o empeño hacia la Sabiduría personificada. 'Para ella' mantiene la referencia femenina y la idea de buscarla con propósito, sin añadir explicaciones que el griego no exige aquí.
- source_word: οὐ κοπιάσει
  english_pob_choice: will not grow weary
  chosen_spanish: no se cansará
  alternatives_spanish:
  - no trabajará en vano
  - no se fatigará
  - no se cansará de tanto buscarla
  lexicon: LSJ
  rationale: κοπιάω puede significar trabajar con esfuerzo o cansarse. Dado el contexto, el punto es que la búsqueda no resultará agotadora; 'no se cansará' comunica bien esa idea en español actual.
- source_word: πάρεδρον
  english_pob_choice: sitting beside
  chosen_spanish: sentada junto a
  alternatives_spanish:
  - sentada al lado de
  - que está junto a
  - como compañera junto a
  lexicon: LSJ
  rationale: πάρεδρος designa estar sentado junto a alguien o estar en su presencia como asistente. 'Sentada junto a' conserva la imagen concreta de la Sabiduría presente y cercana, tal como la resuelve la traducción inglesa auditable.
- source_word: τῶν πυλῶν αὐτοῦ
  english_pob_choice: his gates
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus portones
  - las puertas de su casa
  - sus pórticos
  lexicon: LSJ
  rationale: πύλη denota propiamente 'puerta' o 'portón' de entrada, a veces de una casa o recinto. 'Sus puertas' es natural en español y mantiene el sentido de acceso/entrada sin sobreespecificar 'casa', que no aparece explícitamente en el griego.
theological_decisions:
- issue: Personificación femenina de la Sabiduría y referencia genérica del buscador
  english_pob_reading: Retain feminine reference for Wisdom ('her') and generic masculine singular for the seeker ('he,' 'his').
  chosen_spanish_reading: Conservar la Sabiduría como 'ella' y traducir al buscador con un sujeto genérico singular en español, sin neutralizar la personificación.
  alternative_spanish_readings:
  - Quien se levante temprano para ello...
  - Quien madrugue por ella...
  rationale: El griego presenta a la Sabiduría como figura femenina y usa formas masculinas genéricas para el buscador. El español puede reflejar esa tensión con 'ella' sin forzar una neutralización que borre la personificación del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión española sigue el estado final del apunte inglés auditado, que no registró cambios en la última revisión y fue verificado con alto acuerdo textual y semántico.
  spanish_consistency_notes:
  - Se usa 'Sabiduría' con mayúscula para mantener la personificación establecida por el contexto.
  - Se mantiene el registro proverbial y sobrio del original, evitando añadir explicaciones interpretativas al cuerpo del versículo.
  - '''Puertas'' conserva la imagen de entrada plural del griego sin convertirla en ''puerta'' singular ni en ''casa'' explícita.'
