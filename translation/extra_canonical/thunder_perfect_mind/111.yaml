  lexicon: Crum, Coptic Dictionary
  rationale: ⲥⲙⲏ can denote hearing/listening; given the nearby loanword ⲛⲁⲕⲣⲟⲁⲧⲏⲥ
    (“hearers”), “hearing” yields a sharp speech/hearing antithesis.
- source_word: ⲧⲏⲣⲟⲩ
