translation:
  language: es
  text: Y todos los oficiales de las provincias[a], los sátrapas, los gobernadores y los que hacían el trabajo del rey estaban apoyando a los judíos, porque el temor de Mardoqueo había caído sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaban ayudando a los judíos»; el verbo hebreo también puede comunicar la idea de «levantar» o «favorecerlos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַמְּדִינוֹת
  english_pob_choice: officials of the provinces
  chosen_spanish: oficiales de las provincias
  alternatives_spanish:
  - príncipes de las provincias
  - líderes de las provincias
  lexicon: HALOT
  rationale: שָׂרִים designa funcionarios o gobernantes, y 'oficiales' comunica de forma natural el carácter administrativo del listado que sigue.
- source_word: אֲחַשְׁדַּרְפְּנִים
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: HALOT
  rationale: Se conserva el título persa técnico para mantener con precisión el trasfondo histórico y la distinción administrativa.
- source_word: פַּחוֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - prefectos
  lexicon: HALOT
  rationale: Es el equivalente español más claro y natural para este cargo regional distinto de los sátrapas.
- source_word: עֹשֵׂי הַמְּלָאכָה אֲשֶׁר לַמֶּלֶךְ
  english_pob_choice: those doing the king’s work
  chosen_spanish: los que hacían la obra del rey
  alternatives_spanish:
  - los que atendían los asuntos del rey
  - los administradores reales
  lexicon: HALOT
  rationale: '''Obra'' conserva la cercanía al hebreo מְלָאכָה y el giro ''los que hacían'' mantiene el sentido participial sin sobreinterpretarlo.'
- source_word: מְנַשְּׂאִים אֶת הַיְּהוּדִים
  english_pob_choice: were supporting the Jews
  chosen_spanish: estaban apoyando a los judíos
  alternatives_spanish:
  - estaban ayudando a los judíos
  - estaban favoreciendo a los judíos
  - estaban levantando a los judíos
  lexicon: HALOT
  rationale: El hifil de נָשָׂא puede expresar levantar, sostener o favorecer. 'Apoyando' preserva la idea práctica de respaldo sin forzar una exaltación social excesiva.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce con claridad la causa de la actitud favorable de los funcionarios.
- source_word: נָפַל פַּחַד מָרְדֳּכַי עֲלֵיהֶם
  english_pob_choice: the fear of Mordecai had fallen on them
  chosen_spanish: el temor de Mardoqueo había caído sobre ellos
  alternatives_spanish:
  - el pavor de Mardoqueo había caído sobre ellos
  - había caído sobre ellos el temor de Mardoqueo
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de 'caer sobre' para mantener la imagen vívida y el valor aspectual del perfecto en contexto.
- source_word: מָרְדֳּכַי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: Tradición bíblica española / transliteración estándar
  rationale: '''Mardoqueo'' es la forma asentada y más reconocible en español bíblico; se usa por inteligibilidad sin alterar el referente propio.'
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo de WLC y el audit trail en inglés. Se mantuvo la enumeración administrativa y el modismo 'caer sobre' para פַּחַד. La única ampliación interpretativa relevante es 'apoyando', que refleja la gama semántica indicada por el POB inglés. No se detectaron revisiones aplicadas posteriores en el registro proporcionado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la pauta general, pero este versículo no contiene el nombre divino.
  - Se prefirió 'Mardoqueo' por consistencia con el uso bíblico español establecido; no altera el contenido fuente.
  - La secuencia administrativa se conservó en el mismo orden que el hebreo para reflejar el énfasis acumulativo del original.
