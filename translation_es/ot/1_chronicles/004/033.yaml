translation:
  language: es
  text: Y todas sus aldeas[a] que estaban alrededor de estas ciudades, hasta Baal. Estos eran sus asentamientos, y estaban inscritos por genealogía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus caseríos» o «sus asentamientos» por «sus aldeas».
    reason: lexical_alternative
  - marker: b
    text: O «y tenían su genealogía registrada»; el hebreo se refiere a inscripción o registro genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַצְרֵיהֶם
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus pueblos
  - sus poblaciones
  - sus asentamientos
  lexicon: HALOT
  rationale: חָצֵר puede referirse a un recinto, patio o, por contexto territorial, a una aldea o pequeño asentamiento. En una enumeración de lugares habitados alrededor de ciudades, "aldeas" comunica bien el sentido geográfico sin perder naturalidad en español.
- source_word: אֲשֶׁר סְבִיבוֹת הֶעָרִים הָאֵלֶּה
  english_pob_choice: that were around these cities
  chosen_spanish: que estaban alrededor de estas ciudades
  alternatives_spanish:
  - que rodeaban estas ciudades
  - en torno a estas ciudades
  - que se hallaban en la vecindad de estas ciudades
  lexicon: HALOT
  rationale: La cláusula relativa describe la ubicación de las aldeas respecto de las ciudades mencionadas. "Estaban alrededor de" mantiene la relación espacial de forma clara y sobria.
- source_word: עַד בָּעַל
  english_pob_choice: as far as Baal
  chosen_spanish: hasta Baal
  alternatives_spanish:
  - hasta llegar a Baal
  - así como Baal como límite
  lexicon: HALOT
  rationale: עַד expresa extensión o límite. Se conserva el nombre propio transliterado como "Baal", y "hasta" reproduce de forma natural el alcance territorial.
- source_word: זֹאת
  english_pob_choice: these were
  chosen_spanish: Estas eran
  alternatives_spanish:
  - Éstas fueron
  - Esto era
  lexicon: HALOT
  rationale: Aunque זֹאת es formalmente singular femenino, aquí funciona de modo resumptivo y colectivo sobre la lista anterior. En español, el plural femenino "Estas" es la forma más natural y fiel al referente acumulativo.
- source_word: מוֹשְׁבֹתָם
  english_pob_choice: their settlements
  chosen_spanish: sus poblaciones
  alternatives_spanish:
  - sus asentamientos
  - sus lugares de habitación
  - sus poblados
  lexicon: HALOT
  rationale: מוֹשָׁב denota lugar de residencia o asentamiento. "Poblaciones" permite un registro algo más amplio y administrativo que "aldeas", evitando repetir el mismo sustantivo con el término anterior.
- source_word: וְהִתְיַחְשָׂם לָהֶם
  english_pob_choice: and they had their genealogy recorded
  chosen_spanish: y su genealogía estaba registrada
  alternatives_spanish:
  - y fueron inscritos por genealogía
  - y su registro genealógico estaba en ellos
  - y se inscribieron por genealogía
  lexicon: HALOT
  rationale: El hitpael de יחס señala registro o adscripción genealógica. El español pasivo "estaba registrada" conserva la idea de un registro formal sin forzar una autoinscripción que el hebreo no exige explícitamente.
theological_decisions:
- issue: Registro genealógico de los clanes
  english_pob_reading: their genealogy recorded
  chosen_spanish_reading: su genealogía estaba registrada
  alternative_spanish_readings:
  - y se inscribieron por genealogía
  - y su registro genealógico estaba para ellos
  rationale: El punto del texto es la pertenencia y ordenamiento genealógico de los habitantes, no una afirmación doctrinal adicional. La redacción española mantiene la referencia al registro familiar sin añadir matices ajenos al hebreo.
  doctrine_reference: Números 1:18; Nehemías 7:5
translation_notes:
  revision_awareness: 'La revisión inglesa reciente separó con punto la secuencia para hacer más natural la puntuación sin cambiar el contenido. La redacción española refleja ese mismo corte: una primera oración territorial y una segunda oración resumptiva con el registro genealógico.'
  spanish_consistency_notes:
  - Se mantiene "Baal" como nombre propio transliterado, en línea con el tratamiento de topónimos del proyecto.
  - Se usó "aldeas" para חַצְרֵי/הֶם y "poblaciones" para מוֹשְׁבֹתָם para diferenciar dos términos cercanos sin perder el campo semántico de asentamiento.
  - El final se formula en pasiva descriptiva para conservar el valor de registro genealógico sin añadir un sujeto reflexivo no explicitado.
