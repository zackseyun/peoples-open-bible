translation:
  language: es
  text: Pero aúllan[a], clamando delante de sus dioses, como algunos en un banquete funerario por un difunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en una comida para el muerto» o «en un banquete funerario». El griego se refiere a una comida de luto o vinculada con ritos funerarios por una persona fallecida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠρύονται
  english_pob_choice: they howl
  chosen_spanish: aúllan
  alternatives_spanish:
  - rujen
  - gimen
  - braman
  lexicon: LSJ
  rationale: El verbo griego expresa un clamor fuerte, con matiz animal o lastimero. «Aúllan» conserva la fuerza sonora y la despectiva vivacidad del contexto mejor que una forma más neutra.
- source_word: βοῶντες
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - dando voces
  - clamando en voz alta
  lexicon: LSJ
  rationale: Como participio de vocalización intensa, «clamando» refleja bien el acto de exclamar con fuerza sin duplicar de manera mecánica la idea ya expresada por «aúllan».
- source_word: ἐναντίον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - frente a
  lexicon: LSJ
  rationale: 'El sentido espacial es el principal: el ruido se hace frente a los ídolos. «Delante de» es natural en español y conserva esa ubicación.'
- source_word: θεῶν
  english_pob_choice: gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus dioses falsos
  - sus ídolos
  lexicon: LSJ
  rationale: El griego dice «dioses», no «ídolos». En español, «sus dioses» mantiene el término de la fuente y el tono polémico, mientras que el contexto deja claro que se trata de falsos cultos.
- source_word: ὥσπερ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: LSJ
  rationale: Marcador comparativo simple y directo; «como» es la equivalencia más natural en español.
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  - ciertos
  lexicon: LSJ
  rationale: Indefinido plural breve y idiomático. «Algunos» conserva la indefinición del original sin sobreinterpretar.
- source_word: ἐν περιδείπνῳ νεκροῦ
  english_pob_choice: at a funeral meal for the dead
  chosen_spanish: en un banquete funerario por el muerto
  alternatives_spanish:
  - en una comida funeraria por el muerto
  - en un banquete por el difunto
  - en una comida para el muerto
  lexicon: LSJ
  rationale: La expresión griega remite a una comida asociada al luto o a ritos funerarios. «Banquete funerario» comunica el trasfondo cultural; «por el muerto» mantiene la referencia al difunto sin añadir más explicación al versículo.
theological_decisions:
- issue: θεῶν en un contexto de polémica antiidolátrica
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - ídolos
  - falsos dioses
  rationale: Se conserva el término de la fuente griega. En el contexto del libro queda claro que estos «dioses» son objetos de culto denunciados por el texto, por lo que no es necesario sustituirlos en la línea principal por «ídolos».
  doctrine_reference: Principio de primacía del texto original y preservación del lenguaje polémico del pasaje.
translation_notes:
  revision_awareness: La versión inglesa auditada ajustó «shouting» a «crying out» para reflejar más directamente βοῶντες, y mantuvo «they howl» para ὠρύονται. La propuesta española sigue esa distinción con «aúllan» y «clamando», y conserva la nota de alternativa para la frase funeraria.
  spanish_consistency_notes:
  - Se preserva «dioses» en lugar de «ídolos» en la línea principal para mantener la forma explícita del griego.
  - «Aúllan» y «clamando» buscan reproducir dos matices distintos de expresión sonora intensa sin redundancia innecesaria.
  - «Banquete funerario» es más literal y elevado que una paráfrasis interpretativa, pero la nota ofrece una alternativa más simple para lectores que la prefieran.
