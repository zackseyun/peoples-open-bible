  yaml_path: translation/ot/isaiah/057/017.yaml
  text: Because of the iniquity of his unjust gain I was angry[a], and I struck him; I hid myself and was angry[b], and he went on backsliding in the way of his heart.
  footnotes:
  - marker: a
    text: Or 'his covetousness.' The Hebrew term can refer either to greedy desire or to profit gained by greed.
    reason: lexical_alternative
  - marker: b
    text: Or 'I hid my face and was angry.' 'Hid my face' reflects a common biblical idiom, though 'face' is not explicit in the Hebrew here.
    reason: alternative_reading
