base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/049/014.yaml
  text: Few have been created on earth like Enoch[c][b][a], and he too was taken up.
  footnotes:
  - marker: a
    text: 'Hebrew: ''Few have been created on earth like Enoch, and he too was taken …'' The final Hebrew word is difficult here; the Greek parallel reads ''from the earth,'' which is followed in the main text.'
    reason: textual_variant
  - marker: b
    text: Greek has the stronger wording 'not even one was created like Enoch on the earth.' The Hebrew witness reads 'few' rather than an absolute 'no one.'
    reason: alternative_reading
  - marker: c
    text: Or 'was taken up.' The wording recalls the tradition of Enoch's removal by God (compare Gen 5:24).
    reason: lexical_alternative
