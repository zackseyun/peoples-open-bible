translation:
  language: es
  text: Lo mejor de ellos es como un espino; el recto es peor que una cerca de espinos. El día de tus vigilantes, tu castigo[a], ha llegado; ahora será su confusión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu visitación». El término hebreo puede denotar visitación, supervisión o castigo; aquí se refiere al día en que cae el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבָם
  english_pob_choice: the best of them
  chosen_spanish: lo mejor de ellos
  alternatives_spanish:
  - su mejor parte
  - el mejor de ellos
  lexicon: HALOT
  rationale: טוֹב con sufijo plural expresa comparativamente lo mejor dentro del grupo. En español, «lo mejor de ellos» conserva esa idea colectiva sin forzar un singular artificial.
- source_word: כְּחֵדֶק
  english_pob_choice: like a brier
  chosen_spanish: como un espino
  alternatives_spanish:
  - como una zarza
  - como una briera
  lexicon: HALOT
  rationale: חֵדֶק designa una planta espinosa. «Espino» comunica bien la imagen de algo áspero y dañino en español natural, manteniendo el tono figurado.
- source_word: יָשָׁר
  english_pob_choice: the upright
  chosen_spanish: el recto
  alternatives_spanish:
  - el justo
  - el íntegro
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona sustantivamente. «El recto» preserva la referencia moral y evita introducir una precisión jurídica que el hebreo no exige en este punto.
- source_word: מִמְּסוּכָה
  english_pob_choice: worse than a thorn hedge
  chosen_spanish: peor que una cerca de espinos
  alternatives_spanish:
  - peor que un seto de espinos
  - peor que un cercado de espinos
  - peor que una cerca
  lexicon: HALOT
  rationale: מְסוּכָה es una cerca/seto. Dado el contexto de plantas espinosas, «cerca de espinos» transmite la fuerza hostil de la imagen sin depender de un giro demasiado técnico.
- source_word: מְצַפֶּיךָ
  english_pob_choice: your watchmen
  chosen_spanish: tus atalayas
  alternatives_spanish:
  - tus centinelas
  - tus vigilantes
  lexicon: HALOT
  rationale: La raíz צפה tiene el sentido de vigilar/observar. «Atalayas» mantiene el matiz bíblico de quienes miran desde un puesto de vigilancia y, en español, puede designar por metonimia a los vigilantes mismos.
- source_word: פְּקֻדָּתְךָ
  english_pob_choice: your punishment
  chosen_spanish: tu visitación
  alternatives_spanish:
  - tu castigo
  - tu visita
  - tu juicio
  lexicon: HALOT
  rationale: La palabra admite «visita/visitation», «supervisión» o «castigo». Siguiendo el tramo auditado del POB, «visitación» preserva la tensión semántica y el posible valor judicial, mientras la nota aclara la lectura contextual.
- source_word: בָאָה
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - ha venido ya
  lexicon: HALOT
  rationale: El perfecto profético comunica un hecho ya seguro. «Ha llegado» funciona de manera natural en español y conserva el sentido de acontecimiento inminente/consumado.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - entonces
  lexicon: HALOT
  rationale: Adverbio temporal directo que marca la consecuencia inmediata del anuncio profético.
- source_word: תִהְיֶה מְבוּכָתָם
  english_pob_choice: their confusion will be
  chosen_spanish: será su confusión
  alternatives_spanish:
  - vendrá su confusión
  - quedarán confundidos
  - será su desconcierto
  lexicon: HALOT
  rationale: 'El hebreo presenta un predicado nominal: «su confusión será». «Será su confusión» conserva esa estructura y evita convertir la frase en una paráfrasis verbal más libre.'
theological_decisions:
- issue: Sentido de פְּקֻדָּה en un oráculo de juicio
  english_pob_reading: your punishment / your visitation
  chosen_spanish_reading: tu visitación
  alternative_spanish_readings:
  - tu castigo
  - tu juicio
  - tu visita
  rationale: El contexto es de denuncia y sentencia, pero la raíz mantiene la ambigüedad entre visitación, supervisión y castigo. «Visitación» conserva esa tensión léxica que el texto y el audit trail documentan, mientras la nota permite leer el sentido judicial sin borrar la amplitud del término.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor de מְצַפֶּיךָ como imagen profética
  english_pob_reading: your watchmen
  chosen_spanish_reading: tus atalayas
  alternative_spanish_readings:
  - tus vigilantes
  - tus centinelas
  rationale: El término puede referirse a vigías proféticos o a guardianes. «Atalayas» mantiene la imagen de observación y anuncio, y en español puede funcionar como sustantivo referido a personas, preservando la función profética sin añadir precisión no demostrada.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'El texto base inglés fue afinado en la revisión reciente para quitar el guion largo y usar comas: ese ajuste no cambia el sentido y se refleja aquí con una puntuación sobria y fluida. También se mantuvo la decisión auditada de conservar la ambigüedad de פְּקֻדָּה mediante una nota, en lugar de fijarla sin matiz.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto no presente en el hebreo.
  - Se mantuvo «visitación» como término técnico auditado para פְּקֻדָּה, con nota explicativa.
  - «Atalayas» se eligió por su valor bíblico y por su relación con el acto de vigilar/observar.
  - La puntuación conserva la cadencia de dos miembros comparativos y una cláusula de juicio final.
