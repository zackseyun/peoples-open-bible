translation:
  language: es
  text: 'Pero Micaías dijo[a]: «Tan cierto como que Yahvé vive, todo lo que mi Dios diga, eso hablaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vive Yahvé; lo que mi Dios diga, eso hablaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en este contexto de respuesta contrastiva al ruego previo, «pero» comunica bien la oposición sin perder el movimiento narrativo.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Miqueas
  lexicon: Convención bíblica de nombres propios
  rationale: Se conserva el nombre propio en forma española reconocible y transparente, manteniendo la identidad del profeta sin forzar una transliteración ajena al lector hispano.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Tan cierto como vive Yahvé
  - Por la vida de Yahvé
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento. «Vive Yahvé» reproduce con concisión su fuerza idiomática en español, y la forma «Yahvé» preserva el nombre divino según el criterio del proyecto.
- source_word: אֲשֶׁר יֹאמַר אֱלֹהַי
  english_pob_choice: whatever my God says
  chosen_spanish: todo lo que mi Dios diga
  alternatives_spanish:
  - lo que mi Dios diga
  - cualquier cosa que mi Dios diga
  lexicon: HALOT
  rationale: La construcción relativa expresa el contenido íntegro de lo que Dios pudiera decir. «Todo lo que» conserva la amplitud de אֲשֶׁר y el valor de totalidad implícito en el contexto del juramento.
- source_word: אֹתוֹ
  english_pob_choice: that
  chosen_spanish: eso
  alternatives_spanish:
  - lo
  - aquello
  lexicon: HALOT
  rationale: El pronombre retoma de manera resumida el contenido dicho por Dios. «Eso» suena natural en español y mantiene la referencia anafórica sin añadir explicaciones.
- source_word: אֲדַבֵּר
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - hablaré de
  lexicon: HALOT
  rationale: דבר en pi‘el suele significar hablar en un sentido solemne o declarativo. «Hablaré» preserva el acto de declarar públicamente lo recibido, adecuado al contexto profético.
theological_decisions:
- issue: Tetragrámaton en fórmula de juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo tiene explícitamente יְהוָה, por lo que en español se conserva el nombre propio divino como «Yahvé», no un sustituto titular. En una fórmula juramentaria, esto mantiene la referencia directa al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del pronombre resumptivo final
  english_pob_reading: that I will speak
  chosen_spanish_reading: eso hablaré
  alternative_spanish_readings:
  - lo hablaré
  - eso diré
  rationale: El hebreo usa un objeto resumptivo que retoma el contenido de la revelación. «Eso hablaré» conserva la relación objeto-verbo sin expandir el texto más allá de lo que el original requiere.
  doctrine_reference: 'Hebreo bíblico: construcción resumptiva con אֹתוֹ + אֲדַבֵּר'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requirieron cambios; la lectura española conserva la fórmula de juramento, el nombre divino y el objeto resumptivo con equivalencia idiomática.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene un registro bíblico sobrio y claro, sin calcos duros de la sintaxis inglesa.
  - El nombre propio se adapta a la tradición española común como «Micaías».
