translation:
  language: es
  text: Y llamaré una espada contra él en todos mis montes[a] —declara el Señor Yahvé—; la espada de cada hombre será contra su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y llamaré contra él una espada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרָאתִי
  english_pob_choice: And I will summon
  chosen_spanish: Y llamaré
  alternatives_spanish:
  - Y convocaré
  - Y llamaré en contra
  lexicon: HALOT
  rationale: קרא en este contexto expresa convocar o hacer venir como instrumento de juicio. En español, «llamar» mantiene esa fuerza de convocatoria sin sonar artificial; «convocaré» sería más explícito pero menos natural aquí.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - en su contra
  lexicon: HALOT
  rationale: Con קרא y el contexto de juicio, la preposición exige dirección hostil. «Contra él» comunica mejor la relación adversativa que una traducción literal «sobre él».
- source_word: לְכָל הָרַי
  english_pob_choice: on all my mountains
  chosen_spanish: sobre todos mis montes
  alternatives_spanish:
  - en todos mis montes
  - por todos mis montes
  lexicon: HALOT
  rationale: La expresión ubica el juicio en el territorio montañoso de Israel. «Mis montes» conserva el posesivo divino y «sobre» refleja con naturalidad la localización espacial del hebreo.
- source_word: חֶרֶב
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  lexicon: HALOT
  rationale: La primera ocurrencia funciona con sentido indefinido como instrumento de guerra y juicio. En español, «una espada» conserva ese valor no específico.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: —declara el Señor Yahvé—
  alternatives_spanish:
  - —dice el Señor Yahvé—
  - —oráculo del Señor Yahvé—
  lexicon: HALOT
  rationale: נְאֻם introduce la fórmula profética de declaración. Siguiendo la terminología del proyecto, יְהוָה se rinde como «Yahvé»; al preceder אֲדֹנָי, «Señor Yahvé» evita una repetición torpe y preserva ambos elementos del título compuesto.
- source_word: חֶרֶב אִישׁ בְּאָחִיו תִּהְיֶה
  english_pob_choice: every man's sword will be against his brother
  chosen_spanish: la espada de cada hombre será contra su hermano
  alternatives_spanish:
  - la espada de cada uno será contra su hermano
  - la espada de cada hombre se volverá contra su hermano
  lexicon: HALOT
  rationale: La construcción distributiva de אִישׁ se expresa bien con «cada hombre». Se conserva la imagen concreta de violencia mutua; «hermano» mantiene el valor idiomático de prójimo o pariente en conflicto sin suavizarlo.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה dentro de la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El proyecto pide traducir YHWH como «Yahvé» y no ocultarlo bajo una convención de mayúsculas. En español, «Señor Yahvé» conserva el título אֲדֹנָי y el nombre propio del pacto sin crear una duplicación extraña.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo base y con el audit trail inglés en sentido y estructura. Se mantuvo la localización «sobre todos mis montes» y la imagen de violencia interna final; no se detectaron revisiones aplicadas en el paquete inglés reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantuvo el registro profético con em dash para la fórmula declarativa.
  - «Espada» se conserva de forma literal por la fuerza imagística del hebreo.
  - La relación distributiva de «cada hombre» se mantuvo sin neutralizarla en exceso.
