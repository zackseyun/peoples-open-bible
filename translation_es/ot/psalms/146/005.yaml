translation:
  language: es
  text: Bienaventurado el que tiene al Dios de Jacob por ayuda[a], y cuya esperanza está en Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dichoso el que tiene al Dios de Jacob como su ayudador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado[a]
  alternatives_spanish:
  - Dichoso[a]
  - Feliz
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa la fórmula de bienaventuranza del salmo. «Bienaventurado» conserva mejor el tono solemne y sapiencial que «feliz»; el añadido entre corchetes refleja que el hebreo no marca género explícitamente en la forma de beatitud y que el referente es singular e implícito.
- source_word: שֶׁאֵל יַעֲקֹב
  english_pob_choice: whose help is the God of Jacob
  chosen_spanish: el que tiene al Dios de Jacob por ayuda
  alternatives_spanish:
  - cuya ayuda es el Dios de Jacob
  - cuyo ayudador es el Dios de Jacob
  lexicon: HALOT
  rationale: La construcción hebrea identifica a la persona por su relación con el Dios de Jacob como ayuda. En español, «tener por ayuda» reproduce con naturalidad esa relación de apoyo, sin forzar una estructura nominal demasiado pesada.
- source_word: בְּעֶזְרוֹ
  english_pob_choice: whose help is
  chosen_spanish: por ayuda
  alternatives_spanish:
  - como ayuda
  - en su ayuda
  lexicon: HALOT
  rationale: La preposición hebrea con עֵזֶר funciona de modo idiomático para indicar ayuda disponible o perteneciente a la persona. «Por ayuda» conserva la idea relacional en un español natural y cercano al valor del original.
- source_word: שִׂבְרוֹ
  english_pob_choice: whose hope
  chosen_spanish: cuya esperanza
  alternatives_spanish:
  - cuyas expectativas
  - cuya confianza
  lexicon: HALOT
  rationale: El sustantivo denota esperanza/expectación. «Esperanza» es la opción más clara y litúrgicamente reconocible en español, manteniendo el paralelismo con la línea anterior.
- source_word: עַל
  english_pob_choice: is in
  chosen_spanish: está en
  alternatives_spanish:
  - reposa sobre
  - descansa en
  lexicon: HALOT
  rationale: Con términos de esperanza o dependencia, עַל expresa el objeto en quien se apoya la confianza. «Está en» es la formulación española más natural para ese apuntar de la esperanza hacia Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre divino como transliteración «Yahvé», conforme al criterio del proyecto para YHWH, en lugar de sustituirlo por un título como «SEÑOR».
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - su Dios personal
  lexicon: HALOT
  rationale: El sufijo posesivo singular masculino queda bien reflejado con «su Dios», preservando la relación de pacto sin sobreexplicar.
theological_decisions:
- issue: Beatitude with implicit subject
  english_pob_reading: the one
  chosen_spanish_reading: el que
  alternative_spanish_readings:
  - la persona que
  - quien
  rationale: El hebreo omite un sustantivo explícito para el sujeto de la bienaventuranza. «El que» reproduce adecuadamente ese valor general e impersonal en un español bíblico claro.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve implied referents without adding unsupported specificity.'
- issue: Rendering the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma española «Yahvé» conserva el nombre propio divino, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se observaron cambios relevantes en el pasaje respecto del último pase auditado; el texto inglés final mantiene la lectura de bienaventuranza, la relación de ayuda/esperanza y la transliteración del nombre divino. La propuesta española sigue esa misma línea con formulación natural y auditable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «Dios de Jacob» como título pactal, sin convertirlo en una glosa explicativa.
  - 'La sintaxis intenta conservar el paralelismo del verso: ayuda / esperanza, con dos miembros coordinados.'
  - La marca [a] se coloca solo en la bienaventuranza, donde sí existe alternativa lexical relevante.
