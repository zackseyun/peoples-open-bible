translation:
  language: es
  text: Entonces miré, y he aquí, sobre la expansión que estaba sobre las cabezas de los querubines apareció sobre ellos algo como una piedra de zafiro[a], con apariencia de semejanza de un trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «como una piedra de lapislázuli»; el término hebreo que tradicionalmente se vierte «zafiro» puede designar una piedra preciosa azul oscura identificada de otro modo en la mineralogía moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  english_pob_choice: Then I looked
  chosen_spanish: Entonces miré
  alternatives_spanish:
  - Y vi
  - Miré
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la escena; «Entonces miré» mantiene el progreso del relato y la perspectiva visual del profeta sin sonar mecánica.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y vi que
  alternatives_spanish:
  - y he aquí
  - y behold
  lexicon: HALOT
  rationale: En español, «y vi que» comunica la irrupción visual de la visión de manera natural y digna, sin perder el matiz de descubrimiento súbito que aporta el marcador hebreo.
- source_word: הָרָקִיעַ
  english_pob_choice: the expanse
  chosen_spanish: el espacio extendido
  alternatives_spanish:
  - la expansión
  - la bóveda
  lexicon: HALOT
  rationale: En Ezequiel, רָקִיעַ designa una superficie o plataforma celeste dentro de la visión. «Espacio extendido» conserva la idea de extensión y evita tanto el tecnicismo de «firmamento» como una lectura demasiado moderna de «bóveda».
- source_word: אֲשֶׁר עַל רֹאשׁ הַכְּרֻבִים
  english_pob_choice: that was above the heads of the cherubim
  chosen_spanish: que estaba sobre las cabezas de los querubines
  alternatives_spanish:
  - que estaba encima de las cabezas de los querubines
  lexicon: HALOT
  rationale: La cláusula relativa se vuelve natural en español y conserva la ubicación espacial precisa del elemento visionario respecto de los querubines.
- source_word: הַכְּרֻבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  lexicon: HALOT
  rationale: «Querubines» es el término establecido para estas criaturas celestiales; no se suaviza a un equivalente explicativo que altere el referente bíblico.
- source_word: כְּאֶבֶן סַפִּיר
  english_pob_choice: something like a sapphire stone
  chosen_spanish: algo como una piedra de zafiro
  alternatives_spanish:
  - como una piedra de zafiro
  - algo parecido a un zafiro
  lexicon: HALOT
  rationale: «Algo como» conserva la comparación aproximada. «Piedra de zafiro» sigue el valor tradicional y comprensible en español, sin cerrar la posible referencia mineral precisa.
- source_word: כְּמַרְאֵה דְּמוּת כִּסֵּא
  english_pob_choice: in appearance like the likeness of a throne
  chosen_spanish: con el aspecto de la semejanza de un trono
  alternatives_spanish:
  - en apariencia como la semejanza de un trono
  - con la apariencia de una forma de trono
  lexicon: HALOT
  rationale: Se preserva la acumulación de términos de comparación («aspecto», «semejanza») porque Ezequiel no identifica sin más un trono, sino que intensifica la aproximación visionaria.
- source_word: נִרְאָה
  english_pob_choice: there appeared
  chosen_spanish: aparecía
  alternatives_spanish:
  - se veía
  - se hacía visible
  lexicon: HALOT
  rationale: El nifal expresa aparición/visibilidad. «Aparecía» funciona bien en español para un fenómeno visionario y mantiene el foco en lo que se dejó ver.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - por encima de ellos
  lexicon: HALOT
  rationale: «Sobre ellos» reproduce la relación espacial inmediata con los querubines y encaja con la estructura del versículo en español.
theological_decisions:
- issue: Grado de identificación de la visión
  english_pob_reading: Retain layered comparison language rather than stating directly that Ezekiel saw a throne.
  chosen_spanish_reading: Conservar la cadena de comparaciones («algo como… con el aspecto de la semejanza de un trono») sin convertirla en una afirmación directa.
  alternative_spanish_readings:
  - Había un trono de zafiro sobre ellos
  - Vi un trono sobre ellos
  rationale: El hebreo acumula términos de semejanza para marcar distancia entre la visión y la identificación plena. La traducción debe preservar esa tensión teológica y perceptiva, no resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: El cotejo más reciente indicó alta concordancia y no requirió cambios; esta redacción sigue de cerca la decisión auditada de mantener el lenguaje de comparación escalonada y la referencia visual del trono sin simplificación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Querubines» conserva el término técnico bíblico, coherente con otros pasajes del corpus.
  - Se evita «firmamento» para רָקִיעַ a fin de conservar la lectura visionaria específica de Ezequiel.
  - La nota de zafiro/lapislázuli se conserva porque el español también puede crear la misma ambigüedad léxica que el inglés auditado.
