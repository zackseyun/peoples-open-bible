translation:
  language: es
  text: Porque no hay palabra en mi lengua—he aquí[a], Yahvé, tú la conoces toda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente, Yahvé, tú la conoces toda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: La partícula introduce aquí la base explicativa de lo dicho antes; «Porque» mantiene la relación discursiva con naturalidad en español.
- source_word: אֵין
  english_pob_choice: there is not
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no está
  lexicon: HALOT
  rationale: El negativo existencial se expresa con naturalidad en español como «no hay», seguido del sustantivo singular «palabra».
- source_word: מִלָּה
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - habla
  - expresión
  - dicho
  lexicon: HALOT
  rationale: «Palabra» es la equivalencia más directa y fiel al singular hebreo en este contexto de habla.
- source_word: בִּלְשׁוֹנִי
  english_pob_choice: on my tongue
  chosen_spanish: en mi lengua
  alternatives_spanish:
  - sobre mi lengua
  - en mi boca
  - en mis labios
  lexicon: HALOT
  rationale: El hebreo usa el órgano del habla como imagen. «En mi lengua» conserva mejor esa metáfora que «en mis labios», y suena natural en español bíblico contemporáneo.
- source_word: הֵן
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ciertamente
  - en verdad
  lexicon: HALOT
  rationale: Es una partícula de llamada de atención. «He aquí» reproduce el énfasis solemne del original sin ampliar el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino personal del texto hebreo según la convención POB, en lugar de sustituirlo por un título.
- source_word: יָדַעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú la conoces
  alternatives_spanish:
  - tú sabes
  - la sabes
  - tú la sabes
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento pleno y actual; en español, el presente «conoces» comunica mejor esa certeza continua.
- source_word: כֻלָּהּ
  english_pob_choice: it altogether
  chosen_spanish: toda
  alternatives_spanish:
  - por completo
  - del todo
  - enteramente
  lexicon: HALOT
  rationale: El adverbio inglés «altogether» expresa exhaustividad. En español, «toda» con el pronombre objeto la recupera de modo natural y mantiene el referente femenino singular de «palabra».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo contiene explícitamente el Tetragrámaton. La política POB pide conservar el nombre propio divino, y en español la forma establecida es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de כֻלָּהּ
  english_pob_reading: it altogether
  chosen_spanish_reading: toda
  alternative_spanish_readings:
  - por completo
  - enteramente
  - toda ella
  rationale: El hebreo femenino singular retoma «palabra» y enfatiza plenitud. «Toda» comunica esa totalidad sin añadir una abstracción innecesaria.
  doctrine_reference: POB lexical policy — preserve source referent and totality without flattening the image
translation_notes:
  revision_awareness: La redacción inglesa más reciente ajustó el cierre de «completely» a «altogether» para expresar con mayor naturalidad la totalidad de כֻלָּהּ. La propuesta española sigue esa misma decisión semántica con «toda», evitando un adverbio pesado y conservando el referente femenino singular de «palabra».
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé» en consonancia con la política general del proyecto.
  - «Palabra» mantiene el paralelismo con el singular hebreo מִלָּה.
  - «En mi lengua» preserva la imagen corporal del hebreo sin desplazarla a un miembro distinto del habla.
  - La puntuación con raya reproduce la pausa enfática del hebreo y del texto inglés auditado.
