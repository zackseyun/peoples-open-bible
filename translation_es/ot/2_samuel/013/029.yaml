translation:
  language: es
  text: Así hicieron los jóvenes[a] de Absalón con Amnón, conforme a lo que Absalón había mandado[b]. Entonces se levantaron todos los hijos del rey, y cada uno montó su mula y huyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los servidores de Absalón” / “los asistentes de Absalón”. El hebreo נַעַר puede referirse a jóvenes en servicio.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, “hicieron con Amnón conforme a lo que Absalón había mandado”. El versículo anterior explicita la orden: dar muerte a Amnón cuando su corazón estaba alegre con vino.'
    reason: cross_reference
lexical_decisions:
- source_word: נַעֲרֵי אַבְשָׁלוֹם
  english_pob_choice: Absalom’s young men
  chosen_spanish: los jóvenes de Absalón
  alternatives_spanish:
  - los siervos de Absalón
  - los servidores de Absalón
  - los muchachos de Absalón
  lexicon: HALOT
  rationale: נַעַר puede significar joven, servidor o asistente según el contexto. Aquí designa a los agentes de Absalón que ejecutan su orden. 'Jóvenes' conserva el valor léxico del hebreo y sigue siendo natural en español; 'siervos/servidores' estrecharían o desplazarían el matiz sin necesidad textual.
- source_word: וַיַּעֲשׂוּ לְאַמְנוֹן
  english_pob_choice: did to Amnon
  chosen_spanish: hicieron con Amnón
  alternatives_spanish:
  - trataron a Amnón
  - obraron contra Amnón
  - hicieron a Amnón
  lexicon: HALOT
  rationale: El hebreo usa hacer + לְ para expresar la acción ejercida sobre Amnón. En español, 'hicieron con Amnón' mantiene la concisión y la ambigüedad controlada del original, dejando que el versículo anterior aporte el contenido violento explícito.
- source_word: כַּאֲשֶׁר צִוָּה
  english_pob_choice: as ... had commanded
  chosen_spanish: conforme a lo que Absalón había mandado
  alternatives_spanish:
  - tal como Absalón había mandado
  - según lo que Absalón había mandado
  - como Absalón había mandado
  lexicon: HALOT
  rationale: La cláusula indica conformidad con una instrucción previa. 'Conforme a lo que... había mandado' expresa bien la relación de correspondencia y preserva el orden narrativo del pluscuamperfecto en español.
- source_word: וַיָּקֻמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  - se levantaron de inmediato
  lexicon: HALOT
  rationale: En este contexto, el verbo señala la reacción súbita de los hijos del rey. 'Se levantaron' es la opción más natural y mantiene el tono narrativo sin añadir precisión no presente en el hebreo.
- source_word: כָּל בְּנֵי הַמֶּלֶךְ
  english_pob_choice: all the king’s sons
  chosen_spanish: todos los hijos del rey
  alternatives_spanish:
  - todos los hijos del monarca
  - todos los hijos del rey David
  lexicon: HALOT
  rationale: '''Hijos'' reproduce directamente בְּנֵי y evita introducir ''varones'' o una especificación no presente. En este pasaje se refiere a los descendientes varones de David presentes en el banquete.'
- source_word: וַיִּרְכְּבוּ אִישׁ עַל פִּרְדּוֹ
  english_pob_choice: each mounted his mule
  chosen_spanish: cada uno montó su mula
  alternatives_spanish:
  - cada uno montó su mulo
  - cada uno cabalgó en su mula
  - cada uno subió a su mula
  lexicon: HALOT
  rationale: פִּרְדּוֹ designa una mula y el distributivo אִישׁ pide 'cada uno'. 'Montó su mula' es idiomático en español y conserva la imagen concreta del texto; 'mulo' puede funcionar, pero 'mula' sigue el uso bíblico más natural en castellano moderno.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron huyendo
  - escaparon
  - se dieron a la fuga
  lexicon: HALOT
  rationale: נוּס significa huir o escapar. 'Huyeron' es la forma más directa y natural en español para la salida apresurada que describe el verso.
theological_decisions:
- issue: Preservar la referencia implícita a la violencia sin añadirla al versículo
  english_pob_reading: '''did to Amnon as Absalom had commanded'' leaves the violent act to the immediate context and the preceding verse''s explicit command.'
  chosen_spanish_reading: '''hicieron con Amnón, conforme a lo que Absalón había mandado'' mantiene la tersura del hebreo y deja que el contexto cercano aporte el contenido explícito.'
  alternative_spanish_readings:
  - '''mataron a Amnón conforme a lo que Absalón había mandado'''
  - '''hicieron lo que Absalón había mandado contra Amnón'''
  rationale: El texto hebreo de este versículo no especifica el acto; sólo remite a la orden previa. En la traducción española conviene no adelantar contenido que el verso no formula, para respetar la progresión narrativa y la tensión textual.
  doctrine_reference: Principio de suficiencia del contexto inmediato; honestidad textual
- issue: Mantener la ambigüedad funcional de נַעַר en un contexto de servicio
  english_pob_reading: '''young men'' preserves the lexical form while remaining natural English; a footnote notes ''servants/attendants.'''
  chosen_spanish_reading: '''los jóvenes de Absalón'' conserva la forma léxica y la posible referencia a agentes/acompañantes de Absalón.'
  alternative_spanish_readings:
  - '''los siervos de Absalón'''
  - '''los servidores de Absalón'''
  rationale: Traducir sólo como 'siervos' convertiría una ambigüedad real en una identificación más fuerte de la que el hebreo exige. 'Jóvenes' permite leerlos como hombres jóvenes al servicio de Absalón sin perder la amplitud semántica.
  doctrine_reference: Precisión léxica y no sobreinterpretación
translation_notes:
  revision_awareness: Se revisó el pasaje y no se requirieron cambios adicionales respecto del sentido de la fuente; la redacción mantiene la equivalencia óptima del audit trail inglés y la ambigüedad controlada del hebreo.
  spanish_consistency_notes:
  - Se usó 'Amnón' y 'Absalón' con ortografía española consistente.
  - Se prefirió 'mula' para פֶּרֶד en coherencia con el valor léxico del término y con el inglés auditado.
  - 'Se mantuvo el orden narrativo del hebreo: ejecución de la orden, reacción de los hijos del rey, monta, huida.'
  - No se introdujo 'SEÑOR' ni terminología teológica ajena al versículo.
