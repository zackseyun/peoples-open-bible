translation:
  language: es
  text: David estaba sentado entre las dos puertas[a], y el centinela subió al techo de la puerta, junto al muro. Alzó los ojos y miró, y he aquí, un hombre iba corriendo solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “entre las dos casas de la puerta”; el hebreo dice literalmente “entre las dos puertas”, probablemente refiriéndose al espacio dentro de una entrada fortificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba permaneciendo sentado
  lexicon: HALOT
  rationale: El participio hebreo expresa una अवस्था/acción en desarrollo en la escena narrativa. En español, 'estaba sentado' conserva el valor durativo sin sonar forzado.
- source_word: בֵּין שְׁנֵי הַשְּׁעָרִים
  english_pob_choice: between the two gates
  chosen_spanish: entre las dos puertas
  alternatives_spanish:
  - entre las dos puertas de acceso
  - entre las dos entradas
  lexicon: HALOT
  rationale: Sigo la elección literal de 'two gates' y mantengo 'puertas' como equivalente natural en español. El texto hebreo probablemente alude al espacio de una entrada fortificada, pero no especifica 'casas de la puerta' en el propio hebreo de este versículo.
- source_word: הַצֹּפֶה
  english_pob_choice: the watchman
  chosen_spanish: el centinela
  alternatives_spanish:
  - el vigilante
  - el atalaya
  lexicon: HALOT
  rationale: En español, 'centinela' comunica bien la función militar/de vigilancia en un contexto de muralla. 'Atalaya' es posible, pero suena más arcaico; 'vigilante' es más general.
- source_word: אֶל גַּג הַשַּׁעַר אֶל הַחוֹמָה
  english_pob_choice: to the roof of the gate by the wall
  chosen_spanish: al techo de la puerta, junto al muro
  alternatives_spanish:
  - al techo de la puerta, al lado del muro
  - a la azotea de la puerta, junto al muro
  lexicon: HALOT
  rationale: '''Techo'' funciona como equivalente claro de גַג en español contemporáneo. ''Junto al muro'' refleja la relación espacial de אֶל הַחוֹמָה sin sobreespecificar una arquitectura no explicitada por el hebreo.'
- source_word: וַיִּשָּׂא אֶת עֵינָיו
  english_pob_choice: He lifted up his eyes
  chosen_spanish: Alzó los ojos
  alternatives_spanish:
  - levantó los ojos
  - alzó la vista
  lexicon: HALOT
  rationale: La locución hebrea se conserva de manera idiomática en español con 'alzó los ojos'. Es natural y mantiene la textura bíblica sin volverse rígida.
- source_word: וַיַּרְא וְהִנֵּה
  english_pob_choice: and looked, and behold
  chosen_spanish: miró, y he aquí que
  alternatives_spanish:
  - vio, y he aquí
  - miró, y he aquí
  lexicon: HALOT
  rationale: '''He aquí que'' preserva la fuerza deíctica de הִנֵּה. En español, combinar ''miró'' con esta fórmula mantiene el doble acto de observar y de presentarse súbitamente lo visto.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - alguien
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y se refiere a un individuo concreto. 'Un hombre' es la opción natural y fiel.
- source_word: רָץ
  english_pob_choice: was running
  chosen_spanish: venía corriendo
  alternatives_spanish:
  - iba corriendo
  - corría
  lexicon: HALOT
  rationale: El participio presenta la acción en curso y observada en la escena. 'Venía corriendo' comunica movimiento progresivo con buena fluidez narrativa en español.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - en solitario
  - por sí solo
  lexicon: HALOT
  rationale: '''Solo'' es la forma más natural y directa para expresar que iba sin compañía. Mantiene la observación visual del hebreo sin añadir matices no presentes.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y coincide con la revisión inglesa más reciente en dos puntos relevantes: el movimiento ascendente del centinela hacia el techo y la soledad del corredor expresada de forma natural. Evita especificar más allá del hebreo el detalle arquitectónico del espacio entre las puertas.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - '''Centinela'' mantiene consistencia con el campo semántico militar de vigilancia; no se usa ''atalaya'' salvo necesidad contextual.'
  - '''Puertas'' se mantiene literal para respetar la tensión lexicográfica documentada entre literalidad y posible referencia a la puerta fortificada.'
