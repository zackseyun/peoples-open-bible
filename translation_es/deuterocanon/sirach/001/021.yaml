translation:
  language: es
  text: Dichoso el hombre que medita[b] en ella[a], y ella es para él mejor que cualquier tesoro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego dice de manera muy distinta: «Porque el impulso de su ira es su caída». Esto probablemente refleja otra forma textual o una alineación diferente del versículo.'
    reason: textual_variant
  - marker: b
    text: 'O: «que pondera en ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Happy is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Bienaventurado
  - Feliz
  lexicon: HALOT
  rationale: אַשְׁרֵי es la fórmula sapiencial de bienaventuranza o dicha. «Dichoso» suena natural en español moderno y conserva el valor de estado envidiable sin forzar una fórmula eclesiástica más fija que el hebreo no exige.
- source_word: אֱנוֹשׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - la persona
  lexicon: HALOT
  rationale: El sustantivo hebreo designa al ser humano con matiz de mortalidad, y el singular masculino funciona de manera representativa en la sabiduría. «El hombre» mantiene esa forma sin neutralizar indebidamente el género gramatical del original.
- source_word: יֶהְגֶּה
  english_pob_choice: meditates
  chosen_spanish: medita
  alternatives_spanish:
  - pondera
  - murmura
  lexicon: HALOT
  rationale: הגה en contexto sapiencial expresa reflexión sostenida, meditación o contemplación. «Medita» comunica bien esa atención continua y es más natural que un calco menos idiomático.
- source_word: בָּהּ
  english_pob_choice: on her
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - en él
  lexicon: HALOT
  rationale: El sufijo femenino apunta a un antecedente femenino personificado; en el contexto de Sirácides, se refiere a la sabiduría. «En ella» preserva esa personificación y evita volverla impersonal.
- source_word: וְטוֹבָה
  english_pob_choice: and she is better
  chosen_spanish: y ella le es mejor
  alternatives_spanish:
  - y es mejor para él
  - y ella es mejor
  lexicon: HALOT
  rationale: La construcción comparativa pide expresar superioridad de valor. «Le es mejor» suena natural en español y conserva la relación comparativa sin perder el sujeto femenino del hebreo.
- source_word: מִכָּל אוֹצָר
  english_pob_choice: than every treasure
  chosen_spanish: que cualquier tesoro
  alternatives_spanish:
  - que todo tesoro
  - que todos los tesoros
  lexicon: HALOT
  rationale: אוצר puede significar tesoro o depósito de riqueza. «Cualquier tesoro» reproduce bien el sentido totalizante de מִכָּל y resulta fluido en español. No se eligió «cualquier depósito» porque el contexto apunta a valor/riqueza acumulada.
- source_word: ἡ γὰρ ῥοπὴ τοῦ θυμοῦ αὐτοῦ πτῶσις αὐτῷ
  english_pob_choice: not followed in main text
  chosen_spanish: —
  alternatives_spanish:
  - Porque el impulso de su ira es su caída
  - Porque el giro de su ira es su ruina
  lexicon: LSJ
  rationale: El testimonio griego paralelo difiere de manera fuerte del hebreo conservado y parece corresponder a otra forma textual o a otra alineación versicular. Por eso no se incorporó al texto principal, aunque se deja constancia de la divergencia como variante importante.
theological_decisions:
- issue: Beatitud sapiencial con adjetivo de dicha
  english_pob_reading: Happy is
  chosen_spanish_reading: Dichoso
  alternative_spanish_readings:
  - Bienaventurado
  - Feliz
  rationale: La elección mantiene el tono sapiencial sin imponer una formulación litúrgica. «Dichoso» comunica estado de favor o bienestar, que es el valor de אַשְׁרֵי en este contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Personificación femenina de la sabiduría
  english_pob_reading: on her / she is better
  chosen_spanish_reading: en ella / ella le es mejor
  alternative_spanish_readings:
  - sobre ella / ella es mejor
  - en ella / es mejor
  rationale: El hebreo usa sufijo femenino y el contexto de Sirácides personifica la sabiduría. Mantener «ella» evita despersonalizarla y conserva la tensión literaria y teológica del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Relación con el testimonio griego divergente
  english_pob_reading: Greek witness reads very differently
  chosen_spanish_reading: Se documenta como variante textual no incorporada al texto principal
  alternative_spanish_readings:
  - integrar la línea griega en nota principal
  - omitir toda mención a la variante
  rationale: El proyecto debe dejar visible la divergencia textual sin mezclar tradiciones distintas en una sola línea de traducción. La nota preserva la auditable tensión entre hebreo y griego.
  doctrine_reference: DOCTRINE.md §Textual criticism and audit trail
translation_notes:
  revision_awareness: La redacción española sigue el hebreo conservado, incorporando la conjunción «y» que enlaza las dos cláusulas, como indicó la revisión del texto inglés. También conserva la personificación femenina de la sabiduría y deja constancia de la variante griega fuerte como nota textual separada.
  spanish_consistency_notes:
  - Se emplea «Dichoso» para אַשְׁרֵי, coherente con un registro bíblico moderno y digno.
  - Se mantiene «el hombre» como singular representativo, en línea con la política de exactitud gramatical del proyecto.
  - «En ella» y «ella le es mejor» preservan la referencia femenina a la sabiduría.
  - «Tesoro» traduce אוֹצָר con el valor de riqueza acumulada; no se optó por «depósito» por menor naturalidad contextual.
  - La variante griega se aísla en nota para no diluir la base hebrea del versículo en este testimonio editorial.
