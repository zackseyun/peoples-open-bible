translation:
  language: es
  text: Y Zilpa[a], la esclava de Lea, dio a luz a Jacob un segundo hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'la sierva de Lea'. El hebreo usa un término femenino para una sierva o esclava vinculada a Lea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: El verbo de nacimiento en esta fórmula narrativa se expresa de manera natural en español con 'dio a luz', que conserva el sentido de parto y evita una calca extraña. 'Parió' es posible pero más áspero en registro; 'engendró' desplaza el foco al padre y no al acto de nacimiento.
- source_word: זִלְפָּה
  english_pob_choice: Zilpah
  chosen_spanish: Zilpa
  alternatives_spanish:
  - Zilpá
  - Silpa
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio con adaptación gráfica usual al español bíblico, manteniendo la identidad del personaje sin alterar el contenido del texto fuente.
- source_word: שִׁפְחַת לֵאָה
  english_pob_choice: Leah's female servant
  chosen_spanish: la sierva de Lea
  alternatives_spanish:
  - la servidora de Lea
  - la esclava de Lea
  - la criada de Lea
  lexicon: HALOT
  rationale: שִׁפְחָה designa una mujer en condición de servidumbre y puede tener fuerza social cercana a 'esclava', pero en español 'sierva' comunica la relación de dependencia con claridad y dignidad. Se evita 'criada' por suavizar demasiado el término, y 'esclava' se reserva cuando el contexto exige mayor dureza lexical.
- source_word: בֵּן שֵׁנִי
  english_pob_choice: a second son
  chosen_spanish: un segundo hijo
  alternatives_spanish:
  - un segundo varón
  - otro hijo
  lexicon: HALOT
  rationale: En español, 'segundo hijo' suena más natural que una secuencia más literal. 'Hijo' mantiene el sentido genealógico básico de בֵּן en este contexto narrativo; 'varón' es innecesario aquí.
- source_word: לְיַעֲקֹב
  english_pob_choice: for Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  - de Jacob
  lexicon: HALOT
  rationale: 'El ל posesivo/benefactivo en fórmulas de nacimiento se expresa de manera idiomática con el dativo en español: ''a Jacob''. Así se conserva el sentido relacional sin forzar una construcción menos natural.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora aparece anclada en el texto español junto a ''Zilpa''. Se mantuvo el sentido narrativo y la relación de servidumbre de la expresión hebrea, sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se preserva el estilo bíblico sobrio y directo.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes.
  - La estructura sigue de cerca la fórmula narrativa hebrea y la traducción auditada en inglés, pero con sintaxis española natural.
