lexical_decisions:
- source_word: אֲמַרְיָה
  english_pob_choice: Amariah
  chosen_spanish: Amarías
  alternatives_spanish:
  - Amarías
  - Amaryah
  lexicon: HALOT
  rationale: Nombre propio; se translitera, no se traduce. 'Amarías' mantiene la forma bíblica más reconocible en español y refleja de cerca la pronunciación del nombre hebreo sin forzar una adaptación etimológica.
- source_word: מַלּוּךְ
  english_pob_choice: Malluk
  chosen_spanish: Maluc
  alternatives_spanish:
  - Malluc
  - Malluk
  - Malluch
  lexicon: HALOT
  rationale: Nombre propio; se translitera. 'Maluc' conserva la terminación gutural/kaf del hebreo de manera natural en español y evita imponer la grafía inglesa 'Malluch', menos transparente para el lector hispanohablante.
- source_word: חַטּוּשׁ
  english_pob_choice: Hattush
  chosen_spanish: Hatús
  alternatives_spanish:
  - Hatus
  - Hattush
  lexicon: HALOT
  rationale: Nombre propio; se translitera. 'Hatús' adapta el nombre a la ortografía y acentuación del español para lectura pública, manteniendo lo esencial de la forma hebrea.
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés coinciden en que aquí no hay variantes textuales ni decisiones teológicas: el versículo es una lista de nombres propios. Se mantuvo la transliteración directa de los tres nombres, con adaptación ortográfica española donde ayuda a la lectura pública.'
  spanish_consistency_notes:
  - Se preservó el carácter nominativo del versículo sin añadir conectores ni artículos que no están en el hebreo.
  - Se mantuvo una transliteración uniforme de nombres propios bíblicos, priorizando transparencia y legibilidad en español.
  - La nota al pie solo documenta una alternativa de transliteración del primer nombre, paralela al tipo de observación del audit trail inglés.
