translation:
  language: es
  text: Él es sabio en el corazón[a] y poderoso en fuerza[b]; ¿quién se ha endurecido contra él y ha prosperado[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente 'sabio en corazón', manteniendo el corazón como sede de inteligencia y voluntad.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión hebrea es enfática: literalmente, ''poderoso en fuerza''; se conserva la duplicación semántica sin suavizarla.'
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como 'ha quedado ileso', 'ha salido en paz' o 'ha salido íntegro'; el hebreo permite la idea de salir entero o sin daño.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכַם לֵבָב
  english_pob_choice: wise in heart
  chosen_spanish: sabio de corazón
  alternatives_spanish:
  - sabio en el corazón
  - sabio de mente
  lexicon: HALOT
  rationale: Conserva la imagen hebrea del corazón como sede de pensamiento y voluntad, sin reducirla a una mera frase abstracta. "De corazón" suena natural en español y mantiene el paralelismo poético.
- source_word: וְאַמִּיץ כֹּחַ
  english_pob_choice: mighty in strength
  chosen_spanish: poderoso en fuerza
  alternatives_spanish:
  - fuerte en poder
  - poderoso en poder
  - mighty en fuerza
  lexicon: HALOT
  rationale: La combinación hebrea es enfática y algo tautológica. "Poderoso en fuerza" refleja la duplicación semántica sin sonar demasiado forzado, y respeta la idea de potencia/might del original.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿quién es el que
  - ¿quién fue el que
  lexicon: HALOT
  rationale: La pregunta retórica se expresa de manera natural y formal con "¿quién".
- source_word: הִקְשָׁה
  english_pob_choice: has hardened himself
  chosen_spanish: se ha endurecido
  alternatives_spanish:
  - se ha puesto duro
  - ha sido obstinado
  - se ha hecho duro
  lexicon: HALOT
  rationale: En este contexto el verbo implica resistencia obstinada frente a Dios. "Se ha endurecido" conserva la fuerza moral del hebreo y funciona bien en español.
- source_word: אֵלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - ante él
  - hacia él
  lexicon: HALOT
  rationale: Con este verbo la preposición indica oposición hostil, no mera dirección. "Contra él" expresa correctamente la relación.
- source_word: וַיִּשְׁלָם
  english_pob_choice: and prospered
  chosen_spanish: ha prosperado
  alternatives_spanish:
  - ha quedado ileso
  - ha salido en paz
  - ha salido íntegro
  lexicon: HALOT
  rationale: El audit trail inglés señala la posibilidad de "prospered" y también de salir entero o en paz. En español, "ha prosperado" mantiene la lectura formal adoptada en la revisión reciente y deja abierta la resonancia de salir bien librado.
theological_decisions:
- issue: Sujeto implícito del primer hemistiquio
  english_pob_reading: He is understood to refer to God from the surrounding context.
  chosen_spanish_reading: Él se entiende como referencia a Dios por el contexto inmediato.
  alternative_spanish_readings:
  - Dios es sabio de corazón y poderoso en fuerza
  - Él es sabio de corazón y poderoso en fuerza
  rationale: El hebreo no expresa un sujeto explícito en la apertura, pero el contexto de Job apunta claramente a Dios. Mantener "Él" respeta esa elipsis y evita introducir más de lo que la forma hebrea dice, mientras que la nota contextual deja clara la referencia.
  doctrine_reference: Contexto literario de Job 9; lectura referencial del discurso sobre Dios
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'prospered' sobre 'come through safely' para וַיִּשְׁלָם. Por eso el español adopta 'ha prosperado' como lectura principal, pero la nota mantiene las alternativas semánticas reconocidas por el audit trail. También se preserva la elipsis del sujeto inicial, siguiendo la decisión inglesa de suplirlo por contexto.
  spanish_consistency_notes:
  - Se mantuvo Yahvé/Jesús/Cristo sin aplicar aquí porque el versículo no contiene esos términos.
  - Se evitó 'SEÑOR' porque el hebreo no usa el tetragrámaton explícitamente en esta cláusula; el referente se deja en el pronombre contextual.
  - Se conservó el tono poético y la pregunta retórica sin añadir paráfrasis interpretativa.
  - '"Corazón" se usó de modo consistente con el valor hebreo de centro de inteligencia y voluntad.'
