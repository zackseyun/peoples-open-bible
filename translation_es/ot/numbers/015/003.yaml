review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: acción cultual de presentar una ofrenda a Yahvé, tipos de sacrificio, propósito de cumplir un voto u ofrecer voluntariamente, referencia a tiempos señalados y procedencia del animal. Sin embargo, hay dos desajustes con la auditoría inglesa y el texto fuente: (1) la nota [b] fue trasladada a מִן הַבָּקָר (''del ganado''), cuando en el POB inglés la alternativa documentada corresponde a בְּמוֹעֲדֵיכֶם (''sus tiempos señalados'' / ''sus festividades señaladas''); (2) ''ofrenda encendida'' no es incorrecto, pero es menos fiel al valor técnico de אִשֶּׁה que ''ofrenda hecha por fuego'' o ''ofrenda de fuego''.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico moderno adecuado. No obstante, 'para hacer un aroma agradable' suena algo calcado en español; 'como aroma agradable' fluye mejor, pero dado el rastro inglés auditado, puede mantenerse 'para hacer' si se prioriza cercanía formal. La reparación imprescindible es reubicar la nota [b] al segmento correcto y ajustar su contenido.
  glossary_alignment: 'Buen cumplimiento de la terminología del proyecto: יהוה como ''Yahvé'', עֹלָה como ''holocausto'', זֶבַח como ''sacrificio'', נֶדֶר como ''voto''. No hay conflicto doctrinal relevante. La única mejora léxica recomendada es fortalecer אִשֶּׁה con ''ofrenda hecha por fuego'', además de restaurar la nota de בְּמוֹעֲדֵיכֶם según la auditoría inglesa.'
  issues:
  - severity: high
    issue: La nota [b] está anclada y redactada para 'del ganado', pero en la auditoría inglesa la alternativa [b] corresponde a 'en sus tiempos señalados'.
    rationale: 'Se pierde una decisión léxica documentada del POB: מוֹעֵד puede significar ''tiempos señalados'' o más específicamente ''festividades''. La nota actual introduce en su lugar una alternativa no documentada para הַבָּקָר.'
  - severity: medium
    issue: '''Ofrenda encendida'' debilita el término técnico אִשֶּׁה.'
    rationale: Aunque comunica relación con fuego, en español suena menos preciso y puede sugerir meramente que la ofrenda está ardiendo. 'Ofrenda hecha por fuego' preserva mejor el tecnicismo sacrificial y coincide con la alternativa ya reconocida en la nota.
  revised_spanish_text: y presentarán una ofrenda hecha por fuego[a] a Yahvé—ya sea un holocausto o un sacrificio—para cumplir un voto, o como ofrenda voluntaria, o en sus tiempos señalados[b], para hacer un aroma agradable a Yahvé, del ganado o del rebaño.
  revised_footnotes:
