theological_decisions:
- issue: Metaphorical referent of 'inside'
  chosen_reading: Retain the metaphor as 'your inside' rather than specifying 'your heart' or 'your minds.'
  alternative_readings:
  - your hearts are full of greed and wickedness
  - your inner self is full of greed and wickedness
  rationale: The Greek deliberately contrasts outer cleansing with inner corruption. Specifying a psychological faculty would interpret beyond the text; preserving the metaphor maintains the theological tension between external ritual purity and internal moral state.
  doctrine_reference: Translation philosophy §1, §3
- issue: Moral sense of ἁρπαγή
  chosen_reading: Render as 'greed' in the main text, with more concrete alternatives footnoted.
  alternative_readings:
  - robbery
  - extortion
  - plunder
  rationale: In context Jesus condemns the Pharisees' inner moral corruption rather than describing a single criminal act. 'Greed' communicates the inward vice in contemporary English, while the footnote preserves the lexical range that includes exploitative seizure.
  doctrine_reference: Translation philosophy §5
