translation:
  language: es
  text: Rebeca alzó sus ojos y vio a Isaac, y descendió[a] del camello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «y cayó desde encima del camello». El hebreo probablemente usa «cayó» de manera idiomática para indicar que desmontó.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂא ... אֶת עֵינֶיהָ
  english_pob_choice: lifted up her eyes
  chosen_spanish: alzó sus ojos
  alternatives_spanish:
  - levantó sus ojos
  - miró al frente
  lexicon: HALOT
  rationale: El hebreo conserva un giro idiomático de elevación de los ojos; en español, «alzó sus ojos» mantiene esa imagen sin sonar forzado. «Levantó sus ojos» también es posible, pero «alzó» resulta más fluido y digno.
- source_word: וַתֵּרֶא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - divisó
  - alcanzó a ver
  lexicon: HALOT
  rationale: La percepción visual simple se expresa de modo directo con «vio». Otras opciones añaden matiz innecesario o sugieren distancia/descubrimiento no explicitados por el texto.
- source_word: אֶת יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: a Isaac
  alternatives_spanish:
  - Isaac
  lexicon: convención onomástica
  rationale: Los nombres propios se conservan sin transliteración adicional en español; el acusativo personal se hace natural con la preposición «a».
- source_word: וַתִּפֹּל מֵעַל הַגָּמָל
  english_pob_choice: got down from the camel
  chosen_spanish: descendió del camello
  alternatives_spanish:
  - se bajó del camello
  - cayó del camello
  - se apeó del camello
  lexicon: HALOT
  rationale: La POB inglesa opta por el sentido idiomático de desmontar. En español, «descendió del camello» comunica ese valor sin sugerir un accidente. «Se apeó» es preciso pero más marcado y regional; «se bajó» es claro pero menos elevado.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo con el control cruzado fue alto. Por eso se mantiene la lectura idiomática de נפל como desmontar, reflejada en español con «descendió del camello», y se conserva la nota alternativa literal para no borrar la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se mantiene el orden narrativo del hebreo: levantar los ojos, ver a Isaac, y luego bajar del camello.'
  - «Descendió» busca equilibrio entre fidelidad al idiomático hebreo y naturalidad en español bíblico contemporáneo.
