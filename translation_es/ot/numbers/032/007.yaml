translation:
  language: es
  text: ¿Y por qué desaniman los corazones de los hijos de Israel para que no crucen[a] a la tierra que Yahvé les ha dado?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de cruzar a la tierra». El hebreo literalmente dice «desaniman el corazón», una expresión que también puede comunicar desalentar el ánimo o la resolución.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas» o «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָּה
  english_pob_choice: And why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - ¿Por qué
  lexicon: HALOT
  rationale: Conserva el enlace discursivo del hebreo con la pregunta anterior y reproduce la fuerza interrogativa de manera natural en español.
- source_word: תְּנִיאוּן
  english_pob_choice: do you discourage
  chosen_spanish: desaniman
  alternatives_spanish:
  - desalientan
  - disuaden
  - hacen desistir
  lexicon: HALOT
  rationale: El verbo expresa causar desánimo o desaliento que debilita la resolución. En español, 'desaniman' comunica bien ese efecto sobre la disposición interior sin perder la fuerza causal del hebreo.
- source_word: אֶת לֵב
  english_pob_choice: the hearts
  chosen_spanish: el corazón
  alternatives_spanish:
  - los corazones
  - la valentía
  - la resolución
  lexicon: HALOT
  rationale: El hebreo habla literalmente del 'corazón'. Aunque el sentido incluye ánimo o resolución, se conserva 'corazón' para reflejar la imagen hebrea; en español puede usarse en singular colectivo con valor genérico.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: '''Hijos de Israel'' preserva la forma hebrea y mantiene el matiz genealógico/nacional del original, sin recurrir a una neutralización que borre la expresión fuente.'
- source_word: מֵעֲבֹר
  english_pob_choice: from crossing over
  chosen_spanish: para que no pasen
  alternatives_spanish:
  - de cruzar
  - de pasar al otro lado
  - para que no crucen
  lexicon: HALOT
  rationale: El infinitivo hebreo de עבר expresa el cruce hacia la tierra. En español, 'pasen' en este contexto transmite de forma natural el movimiento de entrada/cruce sin añadir material ajeno.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - hacia la tierra
  - a la tierra prometida
  lexicon: HALOT
  rationale: '''A la tierra'' reproduce la dirección del hebreo con sencillez; en español, ''entrar a la tierra'' es comprensible y no requiere intensificar el destino con una glosa interpretativa.'
- source_word: אֲשֶׁר נָתַן לָהֶם
  english_pob_choice: that Yahweh has given them
  chosen_spanish: que Yahvé les ha dado
  alternatives_spanish:
  - que Yahvé les dio
  - que Yahvé les había dado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte como presente perfecto para expresar el don ya otorgado y vigente. Se mantiene 'Yahvé' según la política del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma española del proyecto, 'Yahvé', en lugar de sustituirlo por un título.
theological_decisions:
- issue: Forma singular/plural en 'corazón'
  english_pob_reading: the hearts of the sons of Israel
  chosen_spanish_reading: el corazón de los hijos de Israel
  alternative_spanish_readings:
  - los corazones de los hijos de Israel
  - el ánimo de los hijos de Israel
  rationale: Aunque el audit trail inglés revisó 'heart' a 'hearts' por concordancia con el plural colectivo, el hebreo conserva un sustantivo singular. En español, el singular colectivo 'el corazón de los hijos de Israel' preserva la literalidad idiomática sin perder el sentido grupal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se mantiene la decisión doctrinal del proyecto de no enmascarar el nombre divino con un título. 'Yahvé' es la forma española establecida para el Tetragrámaton en el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa de referencia ajustó 'the heart' a 'the hearts' para reflejar el plural colectivo de 'sons of Israel'. En español se preservó el valor idiomático del singular hebreo ('el corazón') porque la construcción funciona naturalmente como colectivo; no se añadió un plural artificial. También se mantuvo el nombre divino como 'Yahvé' conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con la política del proyecto para יְהוָה.
  - Se prefirió 'hijos de Israel' por fidelidad formal al hebreo; la nota contempla la alternativa 'israelitas'.
  - '''Pasen a la tierra'' conserva el movimiento de cruce/entrada sin forzar una paráfrasis.'
  - La puntuación interrogativa española se abrió con '¿' y se mantuvo el tono de reprensión implícita del hebreo.
