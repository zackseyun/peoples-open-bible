translation:
  language: es
  text: Y aconteció que, antes de que Isaías saliera al patio intermedio[a], la palabra de Yahvé vino a él, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la ciudad intermedia». La expresión se entiende tradicionalmente aquí como un área del palacio o un patio; por eso se traduce «patio intermedio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce un nuevo giro de la acción; «aconteció» conserva ese valor discursivo sin sonar demasiado arcaico.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaías
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español, transliterado de forma reconocible y constante.
- source_word: לֹא יָצָא
  english_pob_choice: had gone out
  chosen_spanish: saliera
  alternatives_spanish:
  - hubiera salido
  - no había salido
  lexicon: HALOT
  rationale: El hebreo expresa que Isaías aún no había completado su salida cuando ocurrió el siguiente hecho. En español, la subordinada temporal con «antes de que» y subjuntivo imperfecto comunica bien la secuencia temporal sin añadir una negación pesada en la cláusula principal.
- source_word: הָעִיר הַתִּיכֹנָה
  english_pob_choice: the middle court
  chosen_spanish: el patio intermedio
  alternatives_spanish:
  - el patio del medio
  - el patio interior
  - la ciudad intermedia
  lexicon: HALOT
  rationale: Aunque עיר significa literalmente «ciudad», el contexto palaciego y el audit trail inglés indican una referencia a un área del palacio/corte. «Patio intermedio» mantiene la solución contextual sin ocultar la tensión entre el sentido literal y el uso probable.
- source_word: וּדְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahweh
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para יהוה: «Yahvé». «Palabra» conserva la fórmula profética estándar.'
- source_word: הָיָה אֵלָיו
  english_pob_choice: came to him
  chosen_spanish: vino a él
  alternatives_spanish:
  - le vino
  - llegó a él
  lexicon: HALOT
  rationale: La expresión idiomática profética transmite la recepción de un mensaje divino; «vino a él» conserva esa direccionalidad con naturalidad en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y diciendo,
  - con estas palabras,
  lexicon: HALOT
  rationale: Fórmula introductoria que enlaza con el discurso directo siguiente; «diciendo» es la equivalencia más transparente y estándar.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El paquete fuente y la norma del proyecto piden conservar el nombre de pacto. En español, «Yahvé» es la forma principal establecida por la política terminológica del proyecto, evitando la máscara litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido contextual de הָעִיר הַתִּיכֹנָה
  english_pob_reading: the middle court
  chosen_spanish_reading: el patio intermedio
  alternative_spanish_readings:
  - el patio interior
  - la ciudad intermedia
  rationale: La lectura contextual de una zona del palacio/corte está respaldada por el audit trail inglés. El español debe conservar esa decisión contextual y, a la vez, no borrar que la forma hebrea literal dice «ciudad».
  doctrine_reference: Notas léxicas del contexto; principio de equivalencia óptima con tensión semántica preservada
translation_notes:
  revision_awareness: 'El borrador sigue el pase más reciente sin cambios sustantivos: mantiene la secuencia narrativa, la fórmula profética y la decisión contextual para הָעִיר הַתִּיכֹנָה. Se conserva la tensión entre el hebreo literal «ciudad» y el sentido contextual de «patio» mediante nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - «Aconteció» mantiene el tono bíblico moderno y evita el arcaísmo excesivo.
  - La subordinada con «antes de que» permite reflejar la anterioridad de la salida de Isaías sin forzar una negación redundante.
  - «Patio intermedio» preserva la decisión contextual ya auditada para הָעִיר הַתִּיכֹנָה.
