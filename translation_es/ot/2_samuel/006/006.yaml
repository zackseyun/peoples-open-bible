revisions:
- from: Cuando llegaron a la era de Nacón[a], Uzá extendió la mano hacia el arca de Dios y la tomó[b], porque los bueyes resbalaron.
  to: Cuando llegaron a la era de Nacón[a], Uzá extendió la mano hacia el arca de Dios y la sujetó, porque los bueyes tropezaron[b].
  rationale: Se ajusta «la tomó» a «la sujetó» para reflejar mejor וַיֹּאחֶז בּוֹ. Se reubica la nota [b] a la cláusula causal, porque sus alternativas corresponden a שָׁמְטוּ y no a la acción de Uzá. También se limpia la nota [a] para no repetir la lectura principal como si fuera alternativa, preservando mejor el expediente léxico del POB inglés.
