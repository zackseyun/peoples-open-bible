    rationale: Aunque intenta preservar la concisión del hebreo, en español resulta torpe y ambiguo. 'Equivale a veinte geras' comunica mejor la equivalencia de peso sin perder fidelidad.
  - severity: low
    issue: 'Inicio algo forzado: ''Y a los que han de ser redimidos'''
