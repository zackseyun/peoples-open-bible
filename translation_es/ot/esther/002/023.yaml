translation:
  language: es
  text: Cuando el asunto fue investigado y se comprobó que era cierto, ambos fueron colgados en un árbol[a], y quedó escrito en el libro de las crónicas en presencia del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron impalados en un árbol/estaca». El hebreo dice literalmente «fueron colgados en un árbol», pero el método persa exacto de ejecución quizá implicó impalación o suspensión pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבֻקַּשׁ הַדָּבָר
  english_pob_choice: When the matter was investigated
  chosen_spanish: Cuando el asunto fue investigado
  alternatives_spanish:
  - Y se indagó el asunto
  - Y se examinó el asunto
  lexicon: HALOT
  rationale: בקּשׁ en pasiva con הַדָּבָר expresa una averiguación formal del hecho reportado. «Fue investigado» conserva el sentido judicial y es natural en español actual.
- source_word: וַיִּמָּצֵא
  english_pob_choice: and found to be so
  chosen_spanish: y hallado así
  alternatives_spanish:
  - y se encontró
  - y se descubrió
  lexicon: HALOT
  rationale: El verbo en resultado pasivo indica que la acusación quedó verificada. «Hallado así» mantiene la concisión del hebreo sin agregar una paráfrasis excesiva.
- source_word: וַיִּתָּלוּ
  english_pob_choice: were hanged
  chosen_spanish: fueron colgados
  alternatives_spanish:
  - fueron ahorcados
  - fueron impalados
  lexicon: HALOT
  rationale: תלה denota ser colgado o suspendido. En español, «colgados» sigue de cerca la forma verbal sin decidir en exceso el mecanismo exacto de ejecución.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos de ellos
  lexicon: HALOT
  rationale: La expresión dual señala explícitamente a los dos conspiradores. «Ambos» es la forma natural y fiel en español.
- source_word: עַל עֵץ
  english_pob_choice: on a tree
  chosen_spanish: en un árbol
  alternatives_spanish:
  - sobre un árbol
  - en un madero
  lexicon: HALOT
  rationale: עֵץ literalmente es «árbol» o madera. Se conserva «árbol» por transparencia al texto hebreo, dejando abierta la cuestión del modo exacto de ejecución.
- source_word: וַיִּכָּתֵב
  english_pob_choice: and it was written
  chosen_spanish: y quedó escrito
  alternatives_spanish:
  - y fue escrito
  - y se escribió
  lexicon: HALOT
  rationale: El pasivo de כתב encaja bien con «quedó escrito», que suena natural en español y mantiene el valor de registro oficial.
- source_word: בְּסֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the book of the chronicles
  chosen_spanish: en el libro de las crónicas
  alternatives_spanish:
  - en el libro de los acontecimientos
  - en el libro de las memorias
  lexicon: HALOT
  rationale: La frase alude a un registro oficial de anales. «Libro de las crónicas» es una equivalencia idiomática reconocible en español y fiel al género documental.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: in the presence of the king
  chosen_spanish: en presencia del rey
  alternatives_spanish:
  - delante del rey
  - ante el rey
  lexicon: HALOT
  rationale: לִפְנֵי puede significar «delante de» o «en presencia de». Se prefiere la forma más clara y ceremonial en español para el contexto cortesano.
theological_decisions:
- issue: Modo de ejecución implícito en וַיִּתָּלוּ עַל עֵץ
  english_pob_reading: were hanged on a tree; footnote allows impalement as an alternative Persian execution method
  chosen_spanish_reading: fueron colgados en un árbol
  alternative_spanish_readings:
  - fueron ahorcados en un árbol
  - fueron impalados en un árbol/estaca
  rationale: El hebreo dice literalmente «colgados en un árbol». Mantener esa formulación preserva la tensión histórica y lexical. La posible impalación pertenece a una alternativa interpretativa, no al sentido explícito del verbo hebreo.
  doctrine_reference: Lexical/theological note on execution terminology; no doctrinal issue.
translation_notes:
  revision_awareness: 'Se siguió el sentido verificado del texto hebreo y el audit trail en inglés: investigación formal del asunto, hallazgo de su veracidad, ejecución de ambos conspiradores, y registro en los anales reales. No se introdujeron cambios de lectura respecto del pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un registro sobrio y documental, acorde con la escena administrativa de la corte persa.
  - «Crónicas» se usó en sentido de anales oficiales, no como título bíblico posterior.
