base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/009/034.yaml
  text: These were the heads of the fathers’ houses of the Levites[a], according to their generations, heads[b]. These lived in Jerusalem.
  footnotes:
  - marker: a
    text: Or “chiefs” or “heads” for “chief men.” The Hebrew repeats the same root used earlier in the verse for emphasis.
    reason: lexical_alternative
  - marker: b
    text: “Fathers’ houses” refers to clan or ancestral family units, not merely individual households.
    reason: cultural_note
