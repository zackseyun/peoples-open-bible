translation:
  language: es
  text: 'Entonces lo llevó a Jerusalén y lo puso sobre el pináculo[a] del templo[b], y le dijo: «Si eres el Hijo de Dios[c], tírate desde aquí abajo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ala del templo». El término griego se refiere a una saliente o punto elevado del complejo del templo.
    reason: lexical_alternative
  - marker: b
    text: Griego ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: c
    text: O «Ya que eres el Hijo de Dios». La condición griega puede leerse así, pero aquí se traduce «Si» para conservar el desafío del tentador.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἤγαγεν
  english_pob_choice: led
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo condujo
  - lo guió
  lexicon: BDAG
  rationale: El aoristo de ἄγω expresa aquí movimiento guiado; «lo llevó» comunica el avance narrativo con naturalidad en español y mantiene la acción del tentador sin añadir matices no presentes en el griego.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: BDAG
  rationale: δέ marca transición narrativa. «Entonces» conserva la secuencia en español de manera clara y fluida.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ἔστησεν
  english_pob_choice: set him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo situó
  lexicon: BDAG
  rationale: El valor causativo de ἵστημι se expresa de forma natural con «puso» en español, evitando una construcción forzada como «lo hizo estar de pie».
- source_word: ἐπὶ τὸ πτερύγιον
  english_pob_choice: on the pinnacle
  chosen_spanish: sobre el pináculo
  alternatives_spanish:
  - sobre el ala
  - sobre el saliente más alto
  lexicon: BDAG
  rationale: En este contexto arquitectónico, πτερύγιον alude a una parte sobresaliente o elevada del templo. «Pináculo» mantiene la referencia tradicional reconocible en español y comunica altura; la alternativa más literal «ala» se preserva en nota porque podría ser oscura.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del complejo del templo
  - del recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no específicamente el santuario interior. «Templo» es la forma natural en español, y la nota aclara el alcance del término.
- source_word: Εἰ υἱὸς εἶ τοῦ θεοῦ
  english_pob_choice: If you are the Son of God
  chosen_spanish: Si eres el Hijo de Dios
  alternatives_spanish:
  - Ya que eres el Hijo de Dios
  lexicon: BDAG
  rationale: La condición con εἰ e indicativo se mantiene como desafío tentador con «Si», como en el inglés auditado. «Hijo de Dios» conserva el valor titular sin reexpresarlo como nombre propio.
- source_word: βάλε σεαυτὸν
  english_pob_choice: throw yourself
  chosen_spanish: tírate
  alternatives_spanish:
  - arrójate
  - lánzate
  lexicon: BDAG
  rationale: βάλλω aquí implica arrojarse. «Tírate» es una forma natural y directa en español para la autogestión del movimiento descendente; se mantiene el tono imperativo de la tentación.
- source_word: ἐντεῦθεν
  english_pob_choice: from here
  chosen_spanish: desde aquí
  alternatives_spanish:
  - de aquí
  - desde este lugar
  lexicon: BDAG
  rationale: La partícula señala el lugar presente. «Desde aquí» es la equivalencia idiomática más clara.
- source_word: κάτω
  english_pob_choice: down
  chosen_spanish: abajo
  alternatives_spanish:
  - hacia abajo
  - al suelo
  lexicon: BDAG
  rationale: El adverbio indica dirección descendente. «Abajo» preserva la fuerza direccional de forma concisa.
theological_decisions:
- issue: El valor de la condición del tentador en la identidad de Jesús
  english_pob_reading: If you are the Son of God
  chosen_spanish_reading: Si eres el Hijo de Dios
  alternative_spanish_readings:
  - Ya que eres el Hijo de Dios
  rationale: Se conserva la tensión retórica de la prueba. «Si» reproduce el desafío sin resolver la condición como si fuera una afirmación del narrador, manteniendo la lectura auditada.
  doctrine_reference: Preservar la tensión teológica de la tentación sin neutralizarla.
- issue: Alcance de ἱερόν
  english_pob_reading: of the temple
  chosen_spanish_reading: del templo
  alternative_spanish_readings:
  - del complejo del templo
  - del recinto del templo
  rationale: No se debe confundir el ἱερόν con el santuario interior (ναός). La redacción española usual «templo» es adecuada, con aclaración en nota para no borrar la diferencia lexical.
  doctrine_reference: Precisión lexical sobre el espacio sagrado.
translation_notes:
  revision_awareness: Concordance alta con el audit trail inglés (0.95). Se mantiene la filosofía de equivalencia óptima, sin cambios sustantivos respecto de la revisión más reciente; sólo se adapta la sintaxis al español y se conservan las tensiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - «Hijo de Dios» se conserva como título fijo, no como descripción genérica.
  - Se evita traducir ἱερόν como un santuario interior; se mantiene la distinción en nota.
  - La dirección final se expresa como «desde aquí abajo», natural en español y fiel al movimiento descendente del griego.
