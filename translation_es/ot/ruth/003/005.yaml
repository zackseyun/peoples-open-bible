lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella le dijo
  alternatives_spanish:
  - Entonces ella dijo
  - Así que ella dijo
  lexicon: HALOT
  rationale: El wayyiqtol de אמר avanza la narración con pasado simple. En español, «Y ella le dijo» mantiene el flujo narrativo y refleja el cambio de hablante sin añadir interpretación.
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - para ella
  lexicon: HALOT
  rationale: El sufijo femenino singular con אֶל marca dirección de habla hacia Naomi. En español, el dativo «le» expresa naturalmente esa dirección dentro del diálogo.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: All that
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo cuanto
  - Cada cosa que
  lexicon: HALOT
  rationale: La combinación expresa totalidad con una cláusula relativa. «Todo lo que» conserva la amplitud del hebreo y suena natural en español.
- source_word: תֹּאמְרִי
  english_pob_choice: you say
  chosen_spanish: tú digas
  alternatives_spanish:
  - dices
  - digas
  lexicon: HALOT
  rationale: El imperfecto 2fs de אמר, en este contexto de instrucción directa, funciona como contenido de lo que Naomi mande. En español, el subjuntivo presente «digas» refleja mejor la dependencia de la cláusula relativa en el mandato/compromiso que el indicativo.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: lo haré
  alternatives_spanish:
  - haré
  - lo voy a hacer
  lexicon: HALOT
  rationale: El imperfecto 1cs de עשה expresa resolución futura. «Lo haré» comunica la intención de Ruth con claridad; el pronombre «lo» es necesario en español para completar la referencia implícita del objeto tácito.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto a la nota alternativa correspondiente.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de habla directa con comillas latinas y puntuación española.
  - «Todo lo que» conserva la totalidad del hebreo sin volverlo más interpretativo que el texto fuente.
  - Se usa «lo haré» para hacer explícito en español el objeto tácito de עשה, sin alterar el sentido del compromiso de Ruth.
