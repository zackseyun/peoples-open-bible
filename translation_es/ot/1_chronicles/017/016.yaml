review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa hebrea: David entra, se sienta delante de Yahvé y responde con una pregunta de humildad. También preserva correctamente «Yahvé» para יְהוָה y mantiene «mi casa» para בֵיתִי con nota explicativa. Sin embargo, la cláusula final introduce un matiz distinto al usar «para que me hayas traído», que sugiere finalidad, mientras que כִּי aquí introduce el contenido/resultado del asombro: «que me has traído» o «que me hayas traído» sin «para».'
  spanish_quality_summary: El español es claro, natural y digno. La puntuación y el registro son adecuados para una Biblia eclesial legible. La única reparación necesaria es evitar «para que», que en español cambia la relación semántica de la frase. La nota al pie es útil, aunque «hogar» no es la mejor alternativa contextual frente a «casa/familia/dinastía».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה como «Yahvé», אֱלֹהִים como «Dios», y mantenimiento de «casa» para בֵיתִי con resonancia dinástica. Se recomienda ajustar la nota para priorizar alternativas más contextuales («familia», «casa real», «dinastía») en lugar de «hogar».'
  issues:
  - severity: high
    issue: «para que me hayas traído» introduce finalidad no presente en כִּי
    rationale: El hebreo כִּי en esta construcción expresa el contenido o motivo del asombro de David, no propósito. «Para que» altera el sentido fuente; debe ser «que me has traído» o equivalente.
  - severity: low
    issue: La nota al pie incluye «mi hogar», alternativa menos adecuada en este contexto
    rationale: Aunque בֵיתִי puede ser amplio, el contexto del pacto davídico favorece «familia/casa real/dinastía» más que «hogar», que suena doméstico y reduce la resonancia dinástica.
  revised_spanish_text: 'Entonces el rey David entró y se sentó delante de Yahvé, y dijo[a]: «¿Quién soy yo, oh Yahvé Dios, y qué es mi casa, que me has traído hasta aquí?»'
  revised_footnotes:
