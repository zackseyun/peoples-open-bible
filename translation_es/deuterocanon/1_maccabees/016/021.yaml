revisions:
- from: Y corrió delante y lo informó a Juan en Gazara, que su padre y sus hermanos habían perecido[a], y que también había enviado a matarte.
  to: Y, adelantándose corriendo, le informó a Juan en Gazara que su padre y sus hermanos habían perecido[a], y que había enviado a alguien para matarte también.
  rationale: Se corrige un giro no idiomático («lo informó a Juan») por «le informó a Juan» y se mejora προδραμὼν con «adelantándose corriendo», que conserva mejor el matiz de ir por delante con rapidez. También se resuelve la elipsis de Ἀπέσταλκεν de forma natural en español mediante «había enviado a alguien», respaldado por nota, para evitar una frase truncada y preservar la explicación auditada sobre el objeto implícito.
