translation:
  language: es
  text: 'los que dicen[a]: «No está cerca construir casas. Esta ciudad es la olla[b], y nosotros somos la carne».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No es pronto construir casas», o «No pronto es construir casas». El hebreo es elíptico.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la carne». En esta metáfora culinaria, «carne» conserva bien la imagen en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמְרִים
  english_pob_choice: who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - quienes dicen
  - los que están diciendo
  lexicon: HALOT
  rationale: El participio sustantivado con artículo funciona como referencia a un grupo identificado; «los que dicen» conserva el valor relacional y suena natural en español.
- source_word: לֹא בְקָרוֹב
  english_pob_choice: It is not near
  chosen_spanish: No está cerca
  alternatives_spanish:
  - No es pronto
  - No está próximo
  lexicon: HALOT
  rationale: El hebreo es elíptico y expresa cercanía temporal negada. «No está cerca» preserva esa concisión sin añadir «tiempo» en el texto principal.
- source_word: בְּנוֹת בָּתִּים
  english_pob_choice: to build houses
  chosen_spanish: el construir casas
  alternatives_spanish:
  - construir casas
  - la construcción de casas
  lexicon: HALOT
  rationale: El infinitivo constructo con objeto directo se vierte de modo formal como nominalización en español para mantener la estructura elíptica del hebreo. No se añade un matiz reflexivo que no está explícito.
- source_word: הִיא הַסִּיר
  english_pob_choice: This city is the pot
  chosen_spanish: Esta ciudad es la olla
  alternatives_spanish:
  - Ésta es la olla
  - Esta ciudad es el caldero
  lexicon: HALOT
  rationale: El pronombre apunta a la ciudad en contexto; el español necesita explicitarla. «Olla» conserva la imagen culinaria de סִיר con registro claro y natural; «caldero» sería posible, pero más pesado.
- source_word: וַאֲנַחְנוּ הַבָּשָׂר
  english_pob_choice: and we are the meat
  chosen_spanish: y nosotros somos la carne
  alternatives_spanish:
  - y nosotros somos la carne
  - y nosotros somos la carne para comer
  lexicon: HALOT
  rationale: En la metáfora del cocimiento, בָּשָׂר puede traducirse por «carne» para conservar la imagen literal en español. Se evita «carne» con un sentido teológico interpretativo; aquí es imagen culinaria.
theological_decisions:
- issue: Interpretación del proverbio de la olla y la carne
  english_pob_reading: Retain the metaphor without resolving whether it expresses confidence in the city's protection or cynical dismissal of prophetic warning.
  chosen_spanish_reading: Mantener la metáfora sin decidir en el texto principal si expresa confianza en la protección de la ciudad o desprecio cínico de la advertencia profética.
  alternative_spanish_readings:
  - La ciudad nos protege como una olla protege la carne
  - Esa frase minimiza sarcásticamente la urgencia del juicio
  rationale: El verso funciona como proverbio y su fuerza se aclara por el contexto más amplio. La traducción debe preservar la imagen y dejar abierta la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en el texto principal.
translation_notes:
  revision_awareness: El audit trail inglés revisó la primera cláusula desde una lectura con «the time» añadido a una forma más literal («It is not near»). La versión española evita añadir «tiempo» en el texto principal y mantiene la elipsis. También conserva la imagen de la olla y la carne sin explicitar la interpretación del proverbio.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el pasaje lo requiera explícitamente; aquí no aparece.
  - Se prefirió «carne» para בָּשָׂר por la metáfora culinaria, manteniendo la imagen literal.
  - «Olla» se eligió como equivalente neutral y claro de סִיר; no se introdujo «caldero» en el texto principal.
  - La puntuación con comillas angulares es adecuada para español bíblico moderno.
