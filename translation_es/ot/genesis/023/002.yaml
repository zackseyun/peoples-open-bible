translation:
  language: es
  text: Y murió Sara en Quiriat-arba[a], es decir, Hebrón, en la tierra de Canaán, y Abraham vino para hacer duelo por Sara y para llorar por ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quiriat-arba se identifica aquí con Hebrón.
    reason: cross_reference
  - marker: b
    text: 'O: «para lamentar a Sara y para llorar por ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: El hebreo מות expresa muerte de manera directa. En español, «murió» conserva esa franqueza sin suavizar el hecho; «falleció» sería más eufemístico.
- source_word: בְּקִרְיַת אַרְבַּע
  english_pob_choice: in Kiriath-arba
  chosen_spanish: en Quiriat-arba
  alternatives_spanish:
  - en Kiriat-arba
  - en la ciudad de Quiriat-arba
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera en español. Se usa «Quiriat-arba» para una forma reconocible y coherente con el nombre hebreo.
- source_word: הִוא חֶבְרוֹן
  english_pob_choice: that is, Hebron
  chosen_spanish: es decir, Hebrón
  alternatives_spanish:
  - que es Hebrón
  - o sea, Hebrón
  lexicon: HALOT
  rationale: La apposición explica la identificación del lugar. «Es decir» reproduce bien la fuerza explicativa en español sin sonar arcaico.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en la región de Canaán
  lexicon: HALOT
  rationale: אֶרֶץ está explícito en el hebreo, por lo que «la tierra de Canaán» preserva la amplitud de la expresión.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: HALOT
  rationale: El verbo בוא puede variar según perspectiva. Aquí «vino» conserva la sencillez narrativa del hebreo y encaja con el movimiento hacia el lugar del duelo.
- source_word: לִסְפֹּד
  english_pob_choice: to mourn
  chosen_spanish: para hacer duelo
  alternatives_spanish:
  - para lamentar
  - para guardar luto
  lexicon: HALOT
  rationale: ספד no es solo llorar, sino realizar el lamento funerario o duelo. «Hacer duelo» comunica mejor esa acción que un simple «lamentar».
- source_word: לְשָׂרָה
  english_pob_choice: for Sarah
  chosen_spanish: por Sara
  alternatives_spanish:
  - para Sara
  - sobre Sara
  lexicon: HALOT
  rationale: En español, con verbos de duelo, «por» es la preposición más natural y conserva el objeto del lamento.
- source_word: וְלִבְכֹּתָהּ
  english_pob_choice: and to weep for her
  chosen_spanish: y para llorarla
  alternatives_spanish:
  - y para llorar por ella
  - y para llorar sobre ella
  lexicon: HALOT
  rationale: 'El verbo בכה se traduce de forma directa con «llorar». El sufijo pronominal se integra naturalmente como objeto directo: «llorarla».'
theological_decisions:
- issue: Identificación de Quiriat-arba con Hebrón
  english_pob_reading: Kiriath-arba is identified here with Hebron.
  chosen_spanish_reading: Quiriat-arba, es decir, Hebrón
  alternative_spanish_readings:
  - Quiriat-arba, que es Hebrón
  - Quiriat-arba, o sea, Hebrón
  rationale: El hebreo presenta una apposición explicativa; no hay tensión doctrinal, pero sí una decisión de claridad. «Es decir» preserva la identificación sin añadir interpretación.
  doctrine_reference: toponimia bíblica / identificación geográfica
- issue: Matiz de luto y llanto en el duelo de Abraham
  english_pob_reading: to mourn for Sarah and to weep for her
  chosen_spanish_reading: para hacer duelo por Sara y para llorarla
  alternative_spanish_readings:
  - para lamentar a Sara y llorarla
  - para guardar luto por Sara y llorar por ella
  rationale: 'Se conserva la doble expresión hebrea: una acción formal de duelo y una expresión de llanto. No se nivela la diferencia entre ספד y בכה.'
  doctrine_reference: lexicografía hebrea / duelo funerario
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantienen la transliteración del topónimo, la apposición explicativa, la referencia plena a «la tierra de Canaán» y la doble acción de duelo/llanto. No se registran revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando el Tetragrámaton aparezca, aunque este versículo no lo contiene.
  - 'Se mantiene la transliteración de nombres propios de lugar con ortografía española habitual: «Quiriat-arba», «Hebrón», «Canaán».'
  - «Hacer duelo» se prefirió sobre un simple «lamentar» para reflejar el valor funerario de ספד sin perder naturalidad en español.
