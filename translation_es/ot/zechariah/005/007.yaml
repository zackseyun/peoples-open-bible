translation:
  language: es
  text: Y he aquí[a], un disco de plomo[b] fue levantado, y esta era una mujer sentada dentro del efa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y mira». La expresión hebrea introduce de modo repentino otro elemento de la visión.'
    reason: alternative_reading
  - marker: b
    text: 'O: «un peso redondo de plomo», «un disco de plomo» o, más literalmente, «un talento de plomo». La expresión hebrea puede denotar una masa redonda y pesada de plomo; aquí parece funcionar como la tapa del efa.'
    reason: lexical_alternative
  - marker: c
    text: Un efa era una medida para áridos y, por extensión, el recipiente usado para ella; por eso algunos traducen «canasta» o «cesta».
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí, mira
  lexicon: HALOT
  rationale: Mantiene el valor deíctico e interjectivo de sorpresa en la visión, con un giro natural y solemne en español bíblico contemporáneo.
- source_word: כִּכַּר עֹפֶרֶת
  english_pob_choice: a lead disk
  chosen_spanish: un disco de plomo
  alternatives_spanish:
  - un peso redondo de plomo
  - una pieza redonda de plomo
  - un talento de plomo
  lexicon: HALOT
  rationale: ‘Disco’ conserva la forma redonda sugerida por כִּכַּר y sigue la revisión inglesa que prefirió una lectura más literal de la masa redonda de plomo; ‘de plomo’ preserva el material explícito.
- source_word: נִשֵּׂאת
  english_pob_choice: was lifted up
  chosen_spanish: fue levantado
  alternatives_spanish:
  - fue alzado
  - fue levantado hacia arriba
  - era levantado
  lexicon: HALOT
  rationale: El pasivo comunica la acción visual de alzar el objeto; en español, ‘fue levantado’ es natural y suficientemente cercano al movimiento indicado.
- source_word: אִשָּׁה אַחַת
  english_pob_choice: one woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una sola mujer
  - una mujer única
  - una mujer
  lexicon: HALOT
  rationale: En español el numeral ‘una’ ya conserva el valor de אַחַת sin sonar forzado; ‘una sola mujer’ sería más enfático de lo que exige el hebreo.
- source_word: יוֹשֶׁבֶת
  english_pob_choice: sitting
  chosen_spanish: sentada
  alternatives_spanish:
  - sentada allí
  - sentada
  - morando
  lexicon: HALOT
  rationale: El participio describe postura/ubicación dentro del recipiente; ‘sentada’ es la equivalencia más natural y concreta en español.
- source_word: בְּתוֹךְ הָאֵיפָה
  english_pob_choice: inside the ephah
  chosen_spanish: dentro del efa
  alternatives_spanish:
  - dentro del recipiente
  - dentro de la efa
  - dentro del canasto
  lexicon: HALOT
  rationale: Se conserva ‘efa’ como término cultural concreto y se traduce בְּתוֹךְ con ‘dentro de’, que suena idiomático y preciso. Se evita ‘canasto’ porque la fuente inglesa lo deja solo como alternativa explicativa, no como decisión principal.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió una lectura más literal y visual de כִּכַּר עֹפֶרֶת como objeto redondo de plomo, en lugar de ‘cover’; por eso se eligió ‘disco de plomo’. También se conservó ‘efa’ por fidelidad al término cultural, con nota explicativa equivalente a la del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene el tono visionario y profético con una formulación natural en español.
  - Se preserva el término cultural ‘efa’ en el texto principal, evitando sustituirlo por una glosa interpretativa.
  - ‘Mujer’ y no ‘esposa’ refleja con neutralidad la falta de determinación contextual específica.
  - No se introduce terminología eclesiástica tradicional que no esté respaldada por la fuente.
