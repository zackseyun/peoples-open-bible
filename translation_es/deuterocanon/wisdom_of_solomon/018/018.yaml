translation:
  language: es
  text: y otro, arrojado[a] en otro lugar[b], medio muerto, daba a conocer la causa por la cual estaba muriendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echado» o «lanzado». El participio griego enfatiza el ser arrojado o lanzado con violencia.
    reason: lexical_alternative
  - marker: b
    text: O «en otro sitio» o «en un lugar distinto». El adverbio griego señala una ubicación diferente respecto del ejemplo anterior en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλαχῇ
  english_pob_choice: elsewhere
  chosen_spanish: en otro lugar
  alternatives_spanish:
  - en otro sitio
  - en un lugar distinto
  lexicon: LSJ
  rationale: El adverbio expresa contraste espacial con el caso anterior. «En otro lugar» es natural en español y conserva la idea de ubicación distinta sin añadir interpretación.
- source_word: ῥιφεὶς
  english_pob_choice: cast down
  chosen_spanish: arrojado
  alternatives_spanish:
  - echado
  - lanzado
  - arrojado hacia abajo
  lexicon: LSJ
  rationale: El participio comunica ser lanzado o arrojado con fuerza. «Arrojado» mantiene la violencia física del griego sin exigir en español la imagen idiomática de «cast down».
- source_word: ἡμίθνητος
  english_pob_choice: half-dead
  chosen_spanish: medio muerto
  alternatives_spanish:
  - semi muerto
  - a medio morir
  lexicon: LSJ
  rationale: La forma griega es literal y vívida. En español, «medio muerto» comunica de manera directa el estado extremo sin sonar artificial.
- source_word: διʼ ἣν ... αἰτίαν
  english_pob_choice: the cause for which
  chosen_spanish: la causa por la cual
  alternatives_spanish:
  - el motivo por el cual
  - la causa por la que
  lexicon: LSJ
  rationale: La expresión explica la razón específica de la muerte. «La causa por la cual» conserva el registro algo formal y la relación causal explícita del griego.
- source_word: ἔθνησκεν
  english_pob_choice: he was dying
  chosen_spanish: estaba muriendo
  alternatives_spanish:
  - moría
  - iba muriendo
  lexicon: LSJ
  rationale: El imperfecto presenta un proceso en curso. «Estaba muriendo» preserva esa continuidad mejor que un pretérito puntual.
- source_word: ἐνεφάνιζεν
  english_pob_choice: made known
  chosen_spanish: daba a conocer
  alternatives_spanish:
  - manifestaba
  - declaraba
  - mostraba
  lexicon: LSJ
  rationale: El verbo significa hacer visible o dar a conocer. «Daba a conocer» es claro y mantiene el sentido de revelación o exposición sin sobrerretraducir.
theological_decisions:
- issue: Aspecto imperfectivo de ἔθνησκεν en la escena
  english_pob_reading: Render the imperfect ἔθνησκεν as ongoing ('was dying') rather than completed ('died').
  chosen_spanish_reading: Se traduce como «estaba muriendo», no como «murió».
  alternative_spanish_readings:
  - murió
  - iba a morir
  rationale: 'La decisión responde al aspecto verbal griego y conserva la inmediatez narrativa: el hombre todavía se hallaba en el proceso de morir cuando daba a conocer la causa. No implica una enseñanza doctrinal distinta, sino fidelidad temporal al relato.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No se registran revisiones textuales en el paquete. La traducción sigue el texto griego normalizado de Wisdom of Solomon 18:18 y el rastro auditado en inglés, sin cambios pendientes según el último pase de revisión.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo; no hay términos divinos en el texto.
  - Se conserva el contraste espacial de ἀλλαχῇ con una solución natural en español («en otro lugar»).
  - El estado ἡμίθνητος se vierte con una fórmula comprensible y sobria («medio muerto»), sin atenuarlo.
  - El imperfecto ἔθνησκεν se refleja con perífrasis progresiva («estaba muriendo») para respetar el aspecto durativo.
