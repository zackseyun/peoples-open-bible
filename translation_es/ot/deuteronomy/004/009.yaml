base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/004/009.yaml
  text: Only guard yourself carefully[a], and keep your soul very carefully, lest you forget the things that your eyes saw and lest they depart from your heart all the days of your life. Make them known to your children and to your children's children[b],
