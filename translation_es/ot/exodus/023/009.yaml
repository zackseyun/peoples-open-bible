translation:
  language: es
  text: No oprimirás al extranjero[a], y ustedes mismos conocen el alma[b] del extranjero, porque ustedes fueron extranjeros en la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘forastero’, ‘residente extranjero’ o ‘extraño’. El hebreo ger se refiere a una persona no nativa que vive entre un pueblo, a menudo en situación social vulnerable.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘conocen el alma del extranjero’; es un modismo que expresa conocimiento de primera mano de la vida interior o de la condición vivida del extranjero.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - extranjero
  - residente forastero
  - forastero residente
  lexicon: HALOT
  rationale: גֵר nombra a una persona no nativa que vive entre el pueblo, en condición social vulnerable. En español, ‘forastero’ comunica bien esa condición sin la carga burocrática de ‘residente alien’ ni la posible vaguedad de ‘extranjero’.
- source_word: תִלְחָץ
  english_pob_choice: oppress
  chosen_spanish: oprimir
  alternatives_spanish:
  - apremiar
  - maltratar
  - presionar
  lexicon: HALOT
  rationale: En este contexto legal, לחץ expresa presión injusta o explotación. ‘Oprimir’ conserva la fuerza social y ética del verbo y encaja con el mandato prohibitivo.
- source_word: יְדַעְתֶּם
  english_pob_choice: you yourselves know
  chosen_spanish: ustedes mismos conocen
  alternatives_spanish:
  - ustedes conocen
  - han conocido
  lexicon: HALOT
  rationale: El verbo perfecto con el énfasis de וְאַתֶּם pide una expresión que marque experiencia personal. ‘Ustedes mismos’ reproduce ese énfasis sin forzar la temporalidad.
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  - vida interior
  lexicon: HALOT
  rationale: La revisión inglesa optó por ‘soul’ para acercarse más a nephesh; en español, ‘alma’ transmite mejor ese eco semántico que ‘vida’, aunque mantiene una tensión con posibles matices de ‘persona/vida’. Se conserva así la ambigüedad reverente del hebreo.
- source_word: אֶת נֶפֶשׁ הַגֵּר
  english_pob_choice: the soul of the sojourner
  chosen_spanish: el alma del forastero
  alternatives_spanish:
  - el alma del extranjero
  - la condición del forastero
  - la vida del forastero
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y apunta a conocimiento empático de la condición interna o vivida del גֵר. ‘El alma del forastero’ mantiene una lectura relativamente formal y conserva la tensión interpretativa del original.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la razón del mandato; ‘porque’ expresa de forma clara y natural el valor causal.
- source_word: גֵרִים הֱיִיתֶם
  english_pob_choice: you were sojourners
  chosen_spanish: forasteros fueron
  alternatives_spanish:
  - ustedes fueron forasteros
  - fueron extranjeros
  lexicon: HALOT
  rationale: Se mantiene la correspondencia léxica con גֵר mediante ‘forasteros’. La forma verbal impersonalizada en español evita recargar el pronombre cuando el contexto ya lo identifica.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: ‘Tierra de Egipto’ refleja más de cerca la formulación hebrea y conserva el tono formal del recuerdo histórico.
theological_decisions:
- issue: Terminología para גֵר en ley de pacto
  english_pob_reading: sojourner
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - extranjero
  - residente forastero
  - stranger
  rationale: La ley apela a la memoria de Israel como pueblo vulnerable en Egipto. ‘Forastero’ comunica la alteridad social y la situación de residencia no nativa sin reducir el término a una categoría meramente étnica o administrativa.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Renderización de נֶפֶשׁ en una expresión idiomática
  english_pob_reading: the soul of the sojourner
  chosen_spanish_reading: el alma del forastero
  alternative_spanish_readings:
  - la vida del forastero
  - la condición del forastero
  - el ser interior del forastero
  rationale: El hebreo no se limita a una anatomía espiritual; habla de la realidad interior y vivida del גֵר. ‘Alma’ conserva una ambigüedad útil en español y evita una paráfrasis demasiado explicativa.
  doctrine_reference: Translation philosophy §7 (conservar tensiones léxicas cuando el original es idiomático)
translation_notes:
  revision_awareness: La versión inglesa revisada cambió ‘life’ por ‘soul’ para acercarse más a nephesh; esta propuesta refleja esa revisión y conserva la tensión idiomática del hebreo en español mediante ‘alma’.
  spanish_consistency_notes:
  - Se mantiene un solo término principal para גֵר en el texto base ('forastero') para preservar consistencia interna.
  - ‘Tierra de Egipto’ sigue la cadencia formal del hebreo, aunque ‘Egipto’ solo sería una opción estilísticamente más breve.
  - Se evita ‘señor’ u otras formas tradicionales ajenas al pasaje; no hay Tetragrámaton aquí, por lo que no aplica terminología de Yahvé.
