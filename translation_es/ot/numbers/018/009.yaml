    rationale: Aunque intenta reflejar el partitivo hebreo, en español bíblico natural es más claro «de las cosas santísimas» o «de entre las ofrendas santísimas». La forma actual afecta legibilidad sin ganar precisión.
  - severity: medium
    issue: «De entre el fuego» es poco idiomático y semánticamente confuso
