  rationale: El versículo destaca la limitación humana como criaturas sujetas a la muerte frente a la sabiduría divina. «Mortales» preserva mejor ese peso teológico-antropológico que una alternativa más general.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original sobre la tradición de traducción; precisión antropológica'
- issue: Relación entre los dos miembros paralelos
  english_pob_reading: reasonings ... thoughts
  chosen_spanish_reading: razonamientos ... pensamientos
  alternative_spanish_readings:
  - pensamientos ... pensamientos
