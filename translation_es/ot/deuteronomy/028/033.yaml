revisions:
- from: El fruto de tu tierra y todo tu trabajo[a] se lo comerá un pueblo que no has conocido; y serás solamente oprimido y aplastado todos los días.
  to: El fruto[a] de tu tierra y todo tu trabajo[b] se lo comerá un pueblo que no has conocido; y serás solamente oprimido y aplastado todos tus días.
  rationale: Se ajusta la expresión final a 'todos tus días' para reflejar mejor כָּל הַיָּמִים / 'all your days', y se añade la alternativa léxica para פְּרִי, preservando más completamente el rastro de decisiones del POB. El resto del texto puede mantenerse tal como está por ser fiel, claro y natural en español.
