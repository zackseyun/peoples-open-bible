lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en forma transliterada y reconocible en español, conforme al principio de no sustituirlo por un título. "Yahvé" mantiene el valor propio del nombre del pacto mejor que una máscara litúrgica.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - guerrero
  lexicon: HALOT
  rationale: El hebreo dice literalmente "hombre"; en esta construcción predicativa, "hombre de guerra" conserva con más fidelidad la imagen y evita convertir de entrada el sustantivo en una interpretación más libre.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - batalla
  - combate
  - guerra militar
  lexicon: HALOT
  rationale: '"Guerra" refleja con naturalidad el sustantivo hebreo y reproduce la fuerza del sintagma compacto אִישׁ מִלְחָמָה sin añadir matices no presentes en el original.'
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  - ese es su nombre
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal sin verbo explícito; en español se suplió "es" para lograr una lectura natural y mantener el énfasis identificador del original.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura teológica sigue el nombre propio del texto hebreo y evita la sustitución por un título. En español, "Yahvé" es la forma usual de esta transliteración en proyectos que preservan el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / transliteración del nombre divino'
- issue: Expresión יְהוָה אִישׁ מִלְחָמָה
  english_pob_reading: Yahweh is a warrior
  chosen_spanish_reading: Yahvé es un hombre de guerra
  alternative_spanish_readings:
  - Yahvé es un guerrero
  - Yahvé es un hombre de combate
  rationale: Se conserva la imagen hebrea más directamente que con "guerrero", porque el original usa una expresión nominal literal. "Hombre de guerra" mantiene la tensión entre literalidad e idiomaticidad sin borrar el lenguaje poético del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source imagery where possible'
- issue: Frase final identificadora
  english_pob_reading: Yahweh is his name
  chosen_spanish_reading: Yahvé es su nombre
  alternative_spanish_readings:
  - Yahvé es su nombre mismo
  - ese es su nombre
  rationale: Se mantiene la identificación enfática del nombre divino con su sujeto, sin introducir glosa interpretativa. La cláusula breve reproduce adecuadamente el paralelismo del hebreo.
  doctrine_reference: 'DOCTRINE.md: preserve emphatic identification and avoid paraphrase beyond source'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «a man of war» a «a warrior» para sonar más natural, pero el hebreo base conserva la imagen literal אִישׁ מִלְחָמָה. Por eso el español mantiene «hombre de guerra» y no colapsa la metáfora en «guerrero», aunque esa sea una alternativa válida y documentada en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto en español.
  - Se preserva la estructura poética breve del hebreo sin añadir artículos o complementos innecesarios.
  - La nota a pie de página marca explícitamente la alternativa interpretativa «guerrero» sin desplazar la lectura principal.
