revisions:
- from: Y habitarán en ella; y no habrá ya más cosa[a] dedicada al anatema, y Jerusalén habitará con seguridad.
  to: Y habitarán en ella, y ya no habrá nada[a] dedicado a la destrucción, y Jerusalén habitará con seguridad.
  rationale: Se reemplazó «cosa dedicada al anatema» por «nada dedicado a la destrucción» para alinearse mejor con la decisión léxica y teológica documentada del POB y evitar la ambigüedad de «anatema» en español. También se ajustó «no habrá ya más» a «ya no habrá» por mayor naturalidad. Se mantuvo «habitarán / habitará» y «con seguridad» por su fidelidad y buena legibilidad.
