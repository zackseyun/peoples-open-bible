translation:
  language: es
  text: Elihoref y Ahías, hijos de Sisa[a], eran secretarios[b]; Josafat, hijo de Ahilud, era el cronista[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Sisa». Un pasaje paralelo (2 Sam. 8:17) presenta una forma relacionada del nombre, a menudo vertida «Shavsha».'
    reason: alternative_reading
  - marker: b
    text: O «escribas» para «secretarios»; el término hebreo se refiere a funcionarios reales de escritura.
    reason: lexical_alternative
  - marker: c
    text: O «registrador» o «memorialista» para «cronista», refiriéndose a un oficial de corte que llevaba registros y presentaba asuntos al rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלִיחֹרֶף
  english_pob_choice: Elihoreph
  chosen_spanish: Elihoref
  alternatives_spanish:
  - Elihorep
  lexicon: nombre propio
  rationale: Se translitera el nombre propio; en español se ajusta la terminación final para una forma natural y reconocible, manteniendo la correspondencia con el hebreo.
- source_word: וַאֲחִיָּה
  english_pob_choice: and Ahijah
  chosen_spanish: y Ahías
  alternatives_spanish:
  - y Ahías
  - y Ahiah
  lexicon: nombre propio
  rationale: Se conserva el nombre propio con transliteración hispana estándar. La forma 'Ahías' es más natural para el lector en español que una transliteración más rígida.
- source_word: בְּנֵי שִׁישָׁא
  english_pob_choice: the sons of Shisha
  chosen_spanish: hijos de Sisa
  alternatives_spanish:
  - los hijos de Sisa
  - hijos de Shisha
  lexicon: constructo relacional
  rationale: El hebreo expresa filiación en constructo; 'hijos de' es la forma directa y fiel. 'Sisa' sigue la vocalización del texto masorético, mientras que la variante 'Shavsha' se preserva en nota como lectura paralela.
- source_word: סֹפְרִים
  english_pob_choice: secretaries
  chosen_spanish: secretarios
  alternatives_spanish:
  - escribas
  - secretarios de corte
  lexicon: HALOT
  rationale: En este listado administrativo, el término denota funcionarios reales de escritura y documentación. 'Secretarios' comunica mejor en español la función cortesana que 'escribas', y evita confusión con otros oficios.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  lexicon: nombre propio
  rationale: Se adopta la forma española tradicional del nombre propio, ampliamente inteligible y cercana a la transliteración habitual.
- source_word: בֶּן אֲחִילוּד
  english_pob_choice: the son of Ahilud
  chosen_spanish: hijo de Ahilud
  alternatives_spanish:
  - el hijo de Ahilud
  lexicon: filiación
  rationale: Se reproduce la relación filial de manera natural en español, sin añadir artículo innecesario en una lista administrativa.
- source_word: הַמַּזְכִּיר
  english_pob_choice: the recorder
  chosen_spanish: el registrador
  alternatives_spanish:
  - el recordador
  - el cronista
  - el memorialista
  lexicon: HALOT
  rationale: El cargo designa a un oficial de corte encargado de llevar registros y presentar asuntos al rey. 'Registrador' comunica la función de archivo y documentación en español moderno sin confundirlo con 'secretario'.
theological_decisions:
- issue: Distinción entre dos cargos cortesanos en la misma versículo
  english_pob_reading: secretaries ... the recorder
  chosen_spanish_reading: secretarios ... el registrador
  alternative_spanish_readings:
  - escribas ... el cronista
  - secretarios ... el cronista
  rationale: Se mantiene la diferenciación funcional que el texto hebreo marca entre סֹפְרִים y הַמַּזְכִּיר. En español conviene no colapsarlos en un solo oficio, para preservar la estructura administrativa del pasaje.
  doctrine_reference: 1 Reyes 4:3; uso léxico administrativo del AT
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y conserva la distinción funcional del listado cortesano. Se ha preferido la forma española de nombres propios más reconocible, sin introducir cambios textuales respecto del testimonio base; la nota sobre Sisa/Shavsha preserva la variante documentada en el paralelo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton en forma directa en la frase castellana.
  - '''Secretarios'' se reserva para סֹפְרִים, mientras ''registrador'' se usa para הַמַּזְכִּיר, evitando solapamiento semántico.'
  - Los nombres propios se adaptan a formas españolas estándar cuando existe una tradición clara ('Josafat', 'Ahías').
