translation:
  language: es
  text: ¿Qué tiene tu amado[a] más que otro amado, la más bella entre las mujeres? ¿Qué tiene tu amado más que otro amado, para que nos hayas hecho jurar así?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu amante» a lo largo del versículo; el hebreo דּוֹד puede designar al amado en sentido romántico.
    reason: lexical_alternative
  - marker: b
    text: O «nos hayas conjurado» o «nos hayas puesto bajo juramento»; el verbo hebreo significa hacer que alguien jure.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What is
  chosen_spanish: ¿Qué tiene... que ver...
  alternatives_spanish:
  - ¿Qué es...
  - ¿En qué consiste...
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta comparativa e idiomática. En español, «¿Qué tiene... que ver...?» comunica de forma natural la comparación implícita sin perder el tono interrogativo del original.
- source_word: דּוֹדֵךְ
  english_pob_choice: your beloved
  chosen_spanish: tu amado
  alternatives_spanish:
  - tu amado
  - tu amante
  lexicon: HALOT
  rationale: דּוֹד en Cantar de los Cantares suele designar al amado en sentido romántico. «Amado» conserva el registro poético y evita la carga moderna o excesivamente sexual de «amante».
- source_word: מִדּוֹד
  english_pob_choice: more than another beloved
  chosen_spanish: que ver con otro amado
  alternatives_spanish:
  - más que otro amado
  - por encima de otro amado
  lexicon: HALOT
  rationale: El מִן comparativo expresa superioridad o contraste. En español, la construcción «¿Qué tiene X que ver con Y?» reproduce con naturalidad la comparación retórica del verso, aunque no calca la sintaxis hebrea de manera mecánica.
- source_word: הַיָּפָה בַּנָּשִׁים
  english_pob_choice: most beautiful among women
  chosen_spanish: oh la más bella entre las mujeres
  alternatives_spanish:
  - oh la más hermosa entre las mujeres
  - oh la más bella de las mujeres
  lexicon: HALOT
  rationale: La expresión hebrea tiene fuerza superlativa. «La más bella entre las mujeres» mantiene el sentido intensivo y el tono poético; el vocativo «oh» ayuda a reflejar la forma de interpelación del pasaje.
- source_word: שֶׁכָּכָה
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de tal manera
  lexicon: HALOT
  rationale: El adverbio señala modo o grado. «Así» es la opción más directa y sobria en español, conservando la formalidad del registro revisado en el contexto inglés.
- source_word: הִשְׁבַּעְתָּנוּ
  english_pob_choice: you have made us swear
  chosen_spanish: nos hayas hecho jurar
  alternatives_spanish:
  - nos hayas puesto bajo juramento
  - nos hayas conjurado
  lexicon: HALOT
  rationale: El hiphil de שבע significa causar que alguien jure, imponer juramento. «Hacer jurar» expresa esa causación de manera clara y fiel; «conjurar» sería menos transparente en español actual.
translation_notes:
  revision_awareness: El inglés auditado cambió «like this» por «thus» para un registro más formal. La versión española refleja ese ajuste con «así», y mantiene la repetición retórica de «tu amado»/«otro amado» sin suavizar la comparación.
  spanish_consistency_notes:
  - Se mantiene «amado» como término base para דּוֹד, en coherencia con el valor poético documentado en el POB inglés.
  - Se evita «Cristo» o terminología eclesial ajena al texto, porque el verso trata un diálogo amoroso del Cantar y no presenta ese contenido.
  - La expresión final «nos hayas hecho jurar así» conserva el valor causativo del hebreo sin introducir interpretaciones adicionales.
