translation:
  language: es
  text: También en Judá estaba la mano de Dios sobre ellos para darles un solo corazón[a], para cumplir el mandato del rey y de los oficiales, conforme a la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un corazón unido» para «un solo corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: El valor aditivo introduce a Judá en continuidad con el contexto previo; «También» mantiene esa adición de manera natural en español sin sobredimensionar el énfasis.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - entre Judá
  - en la tierra de Judá
  lexicon: HALOT
  rationale: La preposición con el nombre geográfico es locativa. «En Judá» es la forma más directa y natural en español.
- source_word: הָיְתָה יַד הָאֱלֹהִים
  english_pob_choice: the hand of God was on them
  chosen_spanish: estaba la mano de Dios sobre ellos
  alternatives_spanish:
  - vino sobre ellos la mano de Dios
  - la mano de Dios estuvo sobre ellos
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de la «mano de Dios» como acción/poder divino operante. «Sobre ellos» refleja bien el hebreo y su sentido de influencia activa.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: para darles
  alternatives_spanish:
  - para concederles
  - para otorgarles
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa naturalmente con «para darles»; mantiene la sencillez del texto sin introducir una carga más técnica de «conceder» o «otorgar».
- source_word: לֵב אֶחָד
  english_pob_choice: one heart
  chosen_spanish: un solo corazón[a]
  alternatives_spanish:
  - un corazón unido
  - un corazón unánime
  lexicon: HALOT
  rationale: Se preserva la metáfora literal «un solo corazón». En español, la nota permite la alternativa interpretativa «corazón unido» sin perder la imagen original.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to carry out
  chosen_spanish: para cumplir
  alternatives_spanish:
  - para hacer
  - para llevar a cabo
  lexicon: HALOT
  rationale: En el contexto de obedecer una orden, «cumplir» comunica mejor la ejecución obediente que un simple «hacer» y evita una repetición torpe.
- source_word: מִצְוַת
  english_pob_choice: the command
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - la orden
  - el mandato
  lexicon: HALOT
  rationale: En español, «mandamiento» mantiene el valor de instrucción/mandato solemne y encaja bien con el sustantivo en constructo, sin forzar una terminología exclusivamente cultual.
- source_word: הַמֶּלֶךְ וְהַשָּׂרִים
  english_pob_choice: the king and the officials
  chosen_spanish: del rey y de los oficiales
  alternatives_spanish:
  - del rey y de los príncipes
  - del rey y de los líderes
  lexicon: HALOT
  rationale: שָׂרִים designa gobernantes/funcionarios de autoridad. «Oficiales» es claro y suficientemente administrativo para el contexto.
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: «Conforme a» expresa conformidad normativa, no mera instrumentalidad. Se conserva «Yahvé» como decisión estándar del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración española estándar del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: La «mano de Dios» como causa de la unidad del pueblo
  english_pob_reading: Render as a strong statement of God's active influence producing unity, without specifying a later doctrinal mechanism of grace beyond the text.
  chosen_spanish_reading: La frase se traduce como afirmación fuerte de la acción activa de Dios que produce unidad, sin explicar el mecanismo teológico más allá de lo que dice el versículo.
  alternative_spanish_readings:
  - Dios los ayudó
  - Dios los hizo irresistiblemente unidos
  rationale: El hebreo atribuye la respuesta unificada a la acción divina. La versión española conserva esa afirmación, pero evita precisar un modo de causalidad no explicitado en el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del pasaje.
translation_notes:
  revision_awareness: 'El audit trail inglés no muestra cambios posteriores: la lectura permanece estable, y la versión española sigue la misma decisión de mantener la imagen de «one heart» con una alternativa interpretativa en nota.'
  spanish_consistency_notes:
  - Se mantiene la transliteración «Yahvé» de forma consistente con el proyecto.
  - Se conserva la imagen hebrea de «mano de Dios» en vez de explicarla como simple ayuda providencial.
  - «Mandamiento» y «oficiales» reflejan bien el registro administrativo del contexto.
  - La nota sobre «un solo corazón» reproduce la alternativa lexical documentada en el POB inglés.
