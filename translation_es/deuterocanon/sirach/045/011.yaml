translation:
  language: es
  text: piedras preciosas sobre el pectoral, grabadas como un sello en sus engastes[b]; cada piedra preciosa como memorial, grabada con escritura según el número de los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «según el número de las tribus de Israel». El testigo hebreo dice «hijos de Israel», probablemente aludiendo a los nombres tribales representados en las piedras.'
    reason: alternative_reading
  - marker: b
    text: El griego menciona explícitamente un engaste de oro («en un engaste de oro»), mientras que el hebreo aquí solo implica piedras colocadas en sus engastes.
    reason: textual_variant
lexical_decisions:
- source_word: אבני חפץ
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedras de valor
  - piedras escogidas
  - piedras deseables
  lexicon: HALOT
  rationale: El hebreo y el griego señalan piedras de gran valor; en español, «piedras preciosas» es natural, digno y fiel al sentido de κόστος/valor.
- source_word: החשן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral sacerdotal
  - la pectoral
  - la pieza del pecho
  lexicon: HALOT
  rationale: En el contexto sacerdotal, חשן nombra la pieza con piedras del sumo sacerdote. «Pectoral» es el término más claro y tradicional en español bíblico, sin sugerir armadura.
- source_word: פתוחי חותם
  english_pob_choice: engraved like a seal
  chosen_spanish: grabadas como sello
  alternatives_spanish:
  - grabadas al estilo de un sello
  - grabadas como un sello de sigilo
  - talladas como sello
  lexicon: HALOT
  rationale: La imagen compara el modo de tallado con el de un sello/signet. En español, «grabadas como sello» conserva la comparación breve y directa; el griego γλύμματος σφραῖδος la refuerza.
- source_word: במלואים
  english_pob_choice: in their settings
  chosen_spanish: en sus engastes
  alternatives_spanish:
  - en sus monturas
  - en sus montajes
  - en sus alojamientos
  lexicon: HALOT
  rationale: El hebreo apunta a piedras colocadas en soportes; el griego ἐν δέσει χρυσίου sugiere sujeción o engaste, posiblemente de oro. «Engastes» transmite bien esa fijación sin añadir material no explícito en el hebreo.
- source_word: לזכרון
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - para memoria
  - como recuerdo
  - para remembranza
  lexicon: HALOT
  rationale: «Memorial» mantiene el valor cultual y conmemorativo del término, en paralelo con el griego εἰς μνημόσυνον.
- source_word: בכתב חרות
  english_pob_choice: engraved with writing
  chosen_spanish: grabada con escritura
  alternatives_spanish:
  - inscrita con escritura
  - grabada con inscripción
  - con escritura grabada
  lexicon: HALOT
  rationale: El hebreo combina escritura y grabado; el griego ἐν γραφῇ κεκολαμμένῃ también une ambos elementos. «Grabada con escritura» preserva esa doble idea sin endurecer el español.
- source_word: למספר בני ישראל
  english_pob_choice: according to the number of the sons of Israel
  chosen_spanish: según el número de las tribus de Israel
  alternatives_spanish:
  - según el número de los hijos de Israel
  - conforme al número de los hijos de Israel
  - según el número de las tribus de Israel
  lexicon: HALOT
  rationale: Aunque el hebreo conservado dice «hijos de Israel», el griego explicita «tribus de Israel». Aquí se adopta la lectura griega en el texto principal por claridad referencial, y se documenta la alternativa hebrea en nota.
theological_decisions:
- issue: Relación entre la lectura hebrea y la griega sobre el referente de Israel
  english_pob_reading: The stones memorialize Israel by bearing engraved names corresponding to Israel's sons/tribes.
  chosen_spanish_reading: Las piedras recuerdan a Israel mediante una inscripción que corresponde a sus tribus.
  alternative_spanish_readings:
  - Las piedras recuerdan a Israel mediante una inscripción que corresponde a sus hijos.
  - Las piedras se describen simplemente como adorno sacerdotal, sin enfatizar la función memorial.
  rationale: El hebreo y el griego coinciden en la función de memorial; la diferencia está en si se dice «hijos» o «tribus». El texto principal usa la lectura griega por su precisión contextual, pero la nota conserva la variante hebrea para no borrar la tensión documental.
  doctrine_reference: Preservar variantes textuales y función memorial cultual; primacía de los testigos originales sobre la armonización traductiva.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el hebreo conservado para «piedras preciosas», «pectoral» y «como memorial», pero adopta la precisión del griego en «las tribus de Israel», tal como el audit trail inglés preserva la tensión entre los testigos. También se integra la imagen de grabado y engaste sin añadir más especificación material de la que los textos permiten.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiere; aquí no aparece.
  - Se evitó «Cristo», «SEÑOR» y formulaciones devocionales no presentes en el verso.
  - «Pectoral» conserva el término bíblico reconocido en español y evita la ambigüedad de «coraza» o armadura.
  - «Grabada con escritura» mantiene la doble referencia a inscripción y tallado; no se simplificó a solo «inscrita».
  - La nota b no se incorporó al texto principal porque el detalle del oro está atestiguado solo explícitamente en el griego.
