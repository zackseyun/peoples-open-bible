translation:
  language: es
  text: Nada de lo suyo faltó[a], desde lo pequeño hasta lo grande, hijos e hijas, botín, o todo lo que les habían quitado[b]; David lo devolvió todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «desde el más pequeño hasta el más grande».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo lo que habían tomado para sí»; el sentido en contexto es lo que había sido tomado de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶעְדַּר
  english_pob_choice: was missing
  chosen_spanish: faltó
  alternatives_spanish:
  - estaba ausente
  - se había perdido
  - faltaba
  lexicon: HALOT
  rationale: El nifal de עדר expresa que algo quedó sin faltar o sin estar presente. «Faltó» es natural en español y conserva la idea de ausencia o carencia sin sugerir necesariamente pérdida permanente.
- source_word: לָהֶם
  english_pob_choice: of theirs
  chosen_spanish: de lo suyo
  alternatives_spanish:
  - de ellos
  - para ellos
  - les
  lexicon: HALOT
  rationale: La expresión posesiva en español se adapta mejor como «de lo suyo», que mantiene el sentido de pertenencia sin sonar torpe. En contexto se refiere a personas y bienes recuperados.
- source_word: מִן הַקָּטֹן וְעַד הַגָּדֹל
  english_pob_choice: from small to great
  chosen_spanish: desde lo pequeño hasta lo grande
  alternatives_spanish:
  - del menor al mayor
  - desde el más pequeño hasta el más grande
  - desde los pequeños hasta los grandes
  lexicon: HALOT
  rationale: El hebreo funciona como merismo inclusivo. «Desde lo pequeño hasta lo grande» preserva la amplitud del original y evita convertirlo demasiado pronto en una expresión social o etaria cerrada.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - hijos y hijas
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambos sexos. En español, «hijos e hijas» conserva esa precisión; «niños y niñas» desplaza el foco hacia la edad más que hacia la formulación textual.
- source_word: מִשָּׁלָל
  english_pob_choice: spoil
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - presa
  - saqueo
  lexicon: HALOT
  rationale: «Botín» es el equivalente español más natural y directo para el conjunto de bienes capturados en guerra. Mantiene el valor narrativo de la lista sin sonar forzado.
- source_word: כָּל אֲשֶׁר לָקְחוּ לָהֶם
  english_pob_choice: anything that had been taken from them
  chosen_spanish: cualquier cosa que les habían tomado
  alternatives_spanish:
  - todo lo que habían tomado para sí
  - todo lo que les habían arrebatado
  - cualquier cosa que había sido tomada de ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todo lo que habían tomado para sí», pero en contexto el poseedor afectado son los hombres de David. «Les habían tomado» expresa con claridad la situación recuperada sin perder la base textual.
- source_word: הַכֹּל הֵשִׁיב
  english_pob_choice: brought back everything
  chosen_spanish: lo recuperó todo
  alternatives_spanish:
  - lo restauró todo
  - lo trajo todo de vuelta
  - devolvió todo
  lexicon: HALOT
  rationale: El hiphil de שוב indica hacer volver o restaurar. «Lo recuperó todo» comunica bien la acción concreta de David y el resultado total, en un español natural y fiel al contexto narrativo.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el audit trail inglés, manteniendo el merismo inclusivo, la enumeración completa y la idea de restitución total. Se prefirió un español fluido («faltó», «botín», «lo recuperó todo») sin perder la precisión semántica documentada por la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo «David» como nombre propio estándar.
  - Se evitó «SEÑOR» u otras máscaras porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - «Botín» conserva el registro narrativo militar del texto.
  - «Lo recuperó todo» preserva la plenitud del objeto directo total del hebreo.
