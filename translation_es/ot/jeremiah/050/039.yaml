revisions:
- from: Por tanto, criaturas del desierto habitarán allí con hienas[a], y las hijas del avestruz[b] habitarán en ella[c]. No volverá a ser habitada, ni será habitada de generación en generación.
  to: Por tanto, criaturas del desierto habitarán allí con hienas[a], y avestruces[b] habitarán en ella[c]; no volverá a ser habitada, ni vivirá nadie en ella de generación en generación.
  rationale: Se revisa «las hijas del avestruz» a «avestruces» para alinearse con la decisión fuente-auditada de poner el sentido idiomático en el texto principal y la literalidad en nota. Se mejora la segunda cláusula final a «ni vivirá nadie en ella» para reflejar mejor el verbo שׁכן y evitar repetición rígida. También se ajusta la puntuación con punto y coma para una lectura más fluida y coherente con la sintaxis del verso.
