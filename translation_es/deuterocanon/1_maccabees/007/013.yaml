revisions:
- from: Y los asideos fueron los primeros entre los hijos de Israel[a], y buscaban la paz de ellos.
  to: Y los asideos fueron los primeros entre los hijos de Israel[a], y procuraban obtener paz de parte de ellos.
  rationale: Se conserva la fidelidad al griego y a las decisiones auditadas, pero se reemplaza «buscaban la paz de ellos» por «procuraban obtener paz de parte de ellos» para lograr un español natural que todavía preserve el matiz de παρʼ αὐτῶν como procedencia/origen de la paz buscada. Se mantiene la nota sobre «hijos de Israel».
