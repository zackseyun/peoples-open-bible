  rationale: Se elimina «Así que» para no añadir inferencia no marcada, se ajusta אֲמָהֹת a «sirvientas» para reflejar mejor la decisión contextual documentada de «female servants», y se suaviza la puntuación y el enlace secuencial con «Luego» para una narrativa española más natural y fiel.
