translation:
  language: es
  text: 'Entonces se acercaron a Zorobabel y a los jefes de las casas paternas, y les dijeron: «Construyamos con ustedes, porque, como ustedes, buscamos a su Dios[b], y le hemos estado sacrificando[a] desde los días de Esar-hadón, rey de Asiria, que nos hizo subir hasta aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «y no estamos sacrificando»; muchos entienden que refleja una forma textual por «y le estamos sacrificando», o bien que debe entenderse idiomáticamente en sentido afirmativo según el contexto.'
    reason: textual_variant
  - marker: b
    text: También puede traducirse «buscamos a su Dios» como «lo consultamos» o «le rendimos culto»; el verbo hebreo דרשׁ puede abarcar una búsqueda religiosa más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: they approached
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - se llegaron
  lexicon: HALOT
  rationale: El hebreo narra un movimiento hacia Zorobabel y los jefes; «se acercaron» conserva ese valor dinámico en español natural, sin perder el matiz de aproximación.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas de los padres
  - los jefes de los linajes paternos
  lexicon: HALOT
  rationale: Se conserva la estructura social del hebreo con una expresión suficientemente literal y comprensible en español, manteniendo la terminología típica de Esdras.
- source_word: נִבְנֶה עִמָּכֶם
  english_pob_choice: Let us build with you
  chosen_spanish: Construyamos con ustedes
  alternatives_spanish:
  - Edifiquemos con ustedes
  - Vamos a construir con ustedes
  lexicon: HALOT
  rationale: El imperfecto de primera plural en discurso directo tiene fuerza volitiva/invitacional; «Construyamos» reproduce mejor esa propuesta que un simple futuro.
- source_word: כִּי כָכֶם
  english_pob_choice: for like you
  chosen_spanish: porque, como ustedes
  alternatives_spanish:
  - porque somos como ustedes
  - pues igual que ustedes
  lexicon: HALOT
  rationale: La comparación queda breve y clara en español, dejando que el verbo siguiente complete la afirmación de similitud.
- source_word: נִדְרֹשׁ לֵאלֹהֵיכֶם
  english_pob_choice: we seek your God
  chosen_spanish: buscamos a su Dios
  alternatives_spanish:
  - consultamos a su Dios
  - adoramos a su Dios
  lexicon: HALOT
  rationale: «Buscar» preserva la amplitud de דרשׁ con ל, que puede implicar buscar, consultar o rendir culto. Se evita estrechar el sentido a «adorar» sin necesidad textual.
- source_word: וְלֹא אֲנַחְנוּ זֹבְחִים
  english_pob_choice: and we have been sacrificing to him
  chosen_spanish: y hemos estado sacrificando a él
  alternatives_spanish:
  - y estamos sacrificando a él
  - y sacrificamos a él
  lexicon: HALOT
  rationale: Se mantiene el valor afirmativo contextual de la cláusula, pero con una redacción que deja visible la tensión textual del hebreo escrito, donde aparece לֹא.
- source_word: מִימֵי אֵסַר חַדֹּן
  english_pob_choice: since the days of Esar-haddon
  chosen_spanish: desde los días de Esar-hadón
  alternatives_spanish:
  - a partir de los días de Esar-hadón
  - desde tiempos de Esar-hadón
  lexicon: HALOT
  rationale: La locución temporal se expresa de modo idiomático en español y se conserva la forma histórica del nombre propio.
- source_word: הַמַּעֲלֶה אֹתָנוּ פֹּה
  english_pob_choice: who brought us up here
  chosen_spanish: que nos hizo subir hasta aquí
  alternatives_spanish:
  - que nos trajo hasta aquí
  - que nos hizo venir hasta aquí
  lexicon: HALOT
  rationale: «Hizo subir» preserva el causativo y el movimiento ascendente del hebreo; «hasta aquí» comunica el destino sin perder naturalidad.
theological_decisions:
- issue: La afirmación religiosa de los recién llegados
  english_pob_reading: The translation reports their claim neutrally as seeking Israel's God and sacrificing to him, without endorsing its truthfulness.
  chosen_spanish_reading: 'La traducción presenta su afirmación de manera neutral: buscan a su Dios y dicen haberle sacrificado, sin validar su sinceridad ni ortodoxia.'
  alternative_spanish_readings:
  - adoramos a su Dios
  - consultamos a su Dios
  rationale: El contexto narrativo plantea tensión entre la pretensión de los interlocutores y la reacción posterior de Judá. Por eso conviene mantener la formulación reportiva y no resolver la cuestión teológica en el texto mismo.
  doctrine_reference: Preservar la tensión narrativa y doctrinal sin adjudicarla en la traducción.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés: se mantiene la solución contextual afirmativa para la cláusula difícil con לֹא, y se conserva la amplitud semántica de דרשׁ sin convertirla en «adorar» por defecto. No se detectaron revisiones sustantivas en el tramo más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «Dios» para אֱלֹהִים y «sacrificando» para זֹבְחִים, evitando suavizar el verbo sacrificial.
  - «Casas paternas» se traduce como «casas paternas»/«casas paternas» en sentido genealógico administrativo, no como familias modernas.
  - 'Los nombres propios siguen la forma castellana habitual: Zorobabel, Esar-hadón, Asiria.'
  - La puntuación de diálogo y comillas se adapta a norma española sin alterar el contenido.
