translation:
  language: es
  text: Fieles son las heridas de un amigo, pero los besos del enemigo son excesivos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘profusos’; el sentido puede ser que los besos de un enemigo son sobreabundantes y por eso insinceros o engañosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱמָנִים
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - fiables
  - confiables
  - leales
  lexicon: HALOT
  rationale: El hebreo describe lo confiable o digno de confianza. En este proverbio, ‘fieles’ conserva la fuerza moral y la concisión proverbial mejor que ‘fiables’, y mantiene la correspondencia natural con ‘amigo’/‘enemigo’.
- source_word: פִּצְעֵי
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - golpes
  - lesiones
  - laceraciones
  lexicon: HALOT
  rationale: El término se refiere a heridas o lesiones. ‘Heridas’ es claro en español y permite la lectura proverbial de corrección dolorosa sin forzar una paráfrasis.
- source_word: אוֹהֵב
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - uno que ama
  - amante
  - persona que ama
  lexicon: HALOT
  rationale: Aunque el participio significa literalmente ‘el que ama’, en este contexto sapiencial designa a un compañero afectuoso o amigo. ‘Amigo’ refleja mejor el paralelismo con ‘enemigo’ en español.
- source_word: וְנַעְתָּרוֹת
  english_pob_choice: excessive
  chosen_spanish: excesivos
  alternatives_spanish:
  - profusos
  - abundantes
  - de sobra
  lexicon: HALOT
  rationale: La forma es difícil y admite el sentido de abundancia o exceso. ‘Excesivos’ conserva esa amplitud semántica en el texto principal, sin cerrar la posibilidad de la lectura alternativa indicada por el POB en la nota.
- source_word: נְשִׁיקוֹת
  english_pob_choice: kisses
  chosen_spanish: besos
  alternatives_spanish:
  - ósculos
  - muestras de afecto
  lexicon: HALOT
  rationale: El sustantivo significa ‘besos’. ‘Besos’ es el equivalente natural y transparente en español.
- source_word: שׂוֹנֵא
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - odiante
  - quien odia
  - adversario
  lexicon: HALOT
  rationale: El participio literalmente es ‘el que odia’, pero ‘enemigo’ es el correlato natural de ‘amigo’ y preserva el paralelismo antitético del proverbio.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión reciente que reordenó la primera cláusula para reflejar mejor el hebreo: ‘Fieles son las heridas de un amigo’. La versión española mantiene ese orden sintáctico y conserva la tensión léxica de נַעְתָּרוֹת como ‘excesivos’, dejando la alternativa interpretativa en nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘amigo’/‘enemigo’ para reflejar el contraste proverbial y la solución ya adoptada en el audit trail inglés.
  - Se eligió ‘fieles son’ para reproducir la inversión enfática del hebreo, en consonancia con la revisión aprobada.
  - ‘Excesivos’ se dejó en el cuerpo del texto porque el hebreo admite una lectura de abundancia/exceso; la nota recoge la alternativa ‘profusos’ sin añadir interpretaciones ajenas al texto.
