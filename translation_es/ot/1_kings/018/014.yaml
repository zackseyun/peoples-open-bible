translation:
  language: es
  text: 'Y ahora tú estás diciendo: «Ve, dile a tu señor: “Mira[a], Elías está aquí”». Y me matará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí». La expresión hebrea es un deíctico que llama la atención sobre la presencia de Elías.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y en este momento
  lexicon: HALOT
  rationale: La partícula conjuntiva más el adverbio temporal introduce la objeción inmediata de Abdías. «Y ahora» conserva la transición discursiva y suena natural en español.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis en hebreo. En español conviene conservarlo con el sujeto explícito, en registro directo.
- source_word: אֹמֵר
  english_pob_choice: are saying
  chosen_spanish: estás diciendo
  alternatives_spanish:
  - dices
  lexicon: HALOT
  rationale: El participio expresa acción presente/imperfectiva. «Estás diciendo» comunica mejor la queja inmediata que un presente simple.
- source_word: לֵךְ אֱמֹר
  english_pob_choice: Go, tell
  chosen_spanish: Ve, dile
  alternatives_spanish:
  - Ve, di
  - Anda, dile
  lexicon: HALOT
  rationale: La secuencia de imperativos se vuelve idiomática en español con «ve, dile». Mantiene el encargo de ir y comunicar sin forzar un calco.
- source_word: לַאדֹנֶיךָ
  english_pob_choice: your lord
  chosen_spanish: a tu señor
  alternatives_spanish:
  - a tu amo
  - a tu dueño
  lexicon: HALOT
  rationale: Se refiere a un superior humano, Ahab, no al título divino. «Señor» en minúscula conserva la dignidad del cargo sin confundirlo con el nombre/título de Dios.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, aquí está
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la presencia de Elías. «Mira» es una solución española natural; «He aquí» sería más arcaizante.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías el profeta
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וַהֲרָגָנִי
  english_pob_choice: and he will kill me
  chosen_spanish: y me matará
  alternatives_spanish:
  - y me va a matar
  lexicon: HALOT
  rationale: La forma verbal expresa la consecuencia temida en un marco futuro/contextual. En español, «me matará» es más conciso y fiel al temor de Abdías.
theological_decisions:
- issue: Tratamiento de אָדוֹן aplicado a un superior humano
  english_pob_reading: your lord
  chosen_spanish_reading: tu señor
  alternative_spanish_readings:
  - tu amo
  - tu dueño
  rationale: No se trata del título divino. «Señor» en minúscula mantiene el sentido social-político de autoridad humana y evita confusión con Yahvé.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; no importar mayúsculas teológicas donde el referente es humano.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la última revisión inglesa: se mantiene la puntuación de cita anidada y se refleja el registro formal del deíctico con una solución española natural («Mira»), sin perder la alternativa más literal señalada en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no ocurre.
  - Se mantiene «señor» en minúscula para un superior humano, conforme al audit trail inglés.
  - Se conserva el nombre «Elías» como transliteración estándar española.
  - La construcción con comillas anidadas reproduce la relación de mandato y cita del hebreo y del inglés auditado.
