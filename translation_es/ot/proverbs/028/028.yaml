base_translation:
  language: en
  yaml_path: translation/ot/proverbs/028/028.yaml
  text: When the wicked rise[a], a man hides himself, but when they perish[b], the righteous increase.
  footnotes:
  - marker: a
    text: Or 'is hidden'; the Hebrew verb may be read as passive ('a man is hidden') or with a reflexive/middle sense ('a man hides himself').
    reason: lexical_alternative
  - marker: b
    text: '''A man'' renders Hebrew adam, which can function generically for a human being in proverbial speech.'
    reason: lexical_alternative
