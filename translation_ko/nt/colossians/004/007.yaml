  text: 주 안에서 사랑하는 형제이며 신실한 일꾼[a]이며 동료 노예[b]인 두기고가, 나에 관한 모든 일을 여러분에게 알릴 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「봉사자」, 「집사」. 헬라어 διάκονος는 「섬기는 자·사역자」를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「동료 종」, 「함께 매인 자」. 헬라어 σύνδουλος는 δοῦλος에서 파생되며 매임의 의미를 담는다.
    reason: lexical_alternative
