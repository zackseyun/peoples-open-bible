translation:
  language: es
  text: También mataron a Hamor y a su hijo Siquem con la espada[a], y tomaron a Dina de la casa de Siquem y salieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «por la boca de la espada», un giro idiomático que significa muerte a espada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: They also
  chosen_spanish: También
  alternatives_spanish:
  - Y
  - Además
  lexicon: HALOT
  rationale: La conjunción más el marcador de objeto añade a Hamor y a Siquem como nuevos objetos de la violencia. En español no se traduce el marcador de objeto; «También» conserva bien el valor aditivo del contexto narrativo.
- source_word: חֲמוֹר
  english_pob_choice: Hamor
  chosen_spanish: Hamor
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa para mantener la identidad del personaje.
- source_word: שְׁכֶם בְּנוֹ
  english_pob_choice: his son Shechem
  chosen_spanish: a su hijo Siquem
  alternatives_spanish:
  - Siquem, su hijo
  - Siquem su hijo
  lexicon: HALOT
  rationale: El hebreo explicita la relación filial con el sufijo posesivo. «A su hijo Siquem» conserva la filiación de manera natural en español y sigue siendo fiel al orden semántico del original.
- source_word: הָרְגוּ
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - mataron de muerte
  lexicon: HALOT
  rationale: Verbo narrativo directo y claro. «Mataron» transmite el valor básico de הרג sin elevar el registro ni introducir matices no presentes.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - a filo de espada
  - por la espada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «por la boca de la espada», un giro idiomático para muerte por espada. En el texto principal se conserva el sentido idiomático con español natural; la nota recoge la literalidad.
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - arrebataron
  lexicon: HALOT
  rationale: לקח en esta narrativa funciona como acción de tomar/llevar consigo. «Tomaron» es amplio y no añade violencia extra que el hebreo no exprese explícitamente aquí.
- source_word: אֶת דִּינָה
  english_pob_choice: Dinah
  chosen_spanish: a Dina
  alternatives_spanish:
  - Dina
  lexicon: HALOT
  rationale: El marcador de objeto se refleja con «a» delante del nombre propio, que en español naturaliza la función sintáctica del hebreo.
- source_word: מִבֵּית שְׁכֶם
  english_pob_choice: from Shechem’s house
  chosen_spanish: de la casa de Siquem
  alternatives_spanish:
  - de la casa de Siquem
  - de la casa de Siquem
  lexicon: HALOT
  rationale: בית aquí se refiere de manera más concreta a la casa o vivienda inmediata. «De la casa de Siquem» conserva esa concreción mejor que una traducción más abstracta como «del hogar/linaje».
- source_word: וַיֵּצֵאוּ
  english_pob_choice: and went out
  chosen_spanish: y salieron
  alternatives_spanish:
  - y se fueron
  - y salieron de allí
  lexicon: HALOT
  rationale: El verbo יצא expresa salida/movimiento hacia afuera. «Salieron» es natural en español y mantiene la simpleza narrativa del hebreo.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la base inglesa auditada: no hay revisiones aplicadas y el nivel de acuerdo en la comprobación cruzada es alto. Se mantiene la misma estructura narrativa, con una única nota para transparentar el hebraísmo de לְפִי חָרֶב.'
  spanish_consistency_notes:
  - Se usa «Siquem» para el nombre propio, coherente con la transliteración española estándar del hebreo שְׁכֶם.
  - Se mantiene la coordinación narrativa con comas y «y» final, acorde al flujo del hebreo wayyiqtol.
  - No se introduce terminología eclesiástica ajena al texto; el registro es sobrio y transparente.
