translation:
  language: es
  text: Mejor es un joven pobre y sabio que un rey viejo y necio que ya no sabe hacer caso a la advertencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que ya no sabe recibir instrucción» o «que ya no sabe aceptar corrección».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Bueno es
  lexicon: HALOT
  rationale: 'En una construcción comparativa con מִן implícito en el hebreo, el español natural exige una forma comparativa: «Mejor es ... que ...».'
- source_word: יֶלֶד
  english_pob_choice: youth
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven
  - niño
  lexicon: HALOT
  rationale: El contraste con «rey viejo» pide una designación de edad general. «Joven» conserva la idea de persona joven sin restringirla a infancia o masculinidad excesiva.
- source_word: מִסְכֵּן
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - pobre
  - empobrecido
  lexicon: HALOT
  rationale: El término denota condición social/económica baja; «pobre» es la equivalencia directa y sobria en español bíblico moderno.
- source_word: וְחָכָם
  english_pob_choice: but wise
  chosen_spanish: y sabio
  alternatives_spanish:
  - pero sabio
  - y sabio
  lexicon: HALOT
  rationale: El hebreo une los dos rasgos del joven. En español, «y sabio» reproduce la coordinación sin introducir una concesión que no está explícita en el texto.
- source_word: מִמֶּלֶךְ
  english_pob_choice: than ... king
  chosen_spanish: que un rey
  alternatives_spanish:
  - que un rey
  - que rey
  lexicon: HALOT
  rationale: La preposición comparativa מִן se expresa naturalmente con «que» en español, conservando la relación comparativa del proverbio.
- source_word: זָקֵן
  english_pob_choice: old
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  - viejo
  - de edad avanzada
  lexicon: HALOT
  rationale: «Viejo» mantiene el contraste directo con «joven» y refleja el valor simple del adjetivo en la sentencia proverbial.
- source_word: וּכְסִיל
  english_pob_choice: and foolish
  chosen_spanish: y necio
  alternatives_spanish:
  - y necio
  - y insensato
  - y tonto
  lexicon: HALOT
  rationale: En literatura sapiencial, כְסִיל apunta a necedad moral y práctica; «necio» preserva mejor ese registro que «tonto».
- source_word: אֲשֶׁר לֹא יָדַע
  english_pob_choice: who no longer knows
  chosen_spanish: que ya no sabe
  alternatives_spanish:
  - que no sabe
  - que ya no sabe
  - que no ha sabido
  lexicon: HALOT
  rationale: La negación con עוֹד expresa una cesación continuada. «Ya no sabe» comunica con naturalidad que ha perdido la capacidad o disposición de responder a la advertencia.
- source_word: לְהִזָּהֵר
  english_pob_choice: to heed warning
  chosen_spanish: dejarse amonestar
  alternatives_spanish:
  - escuchar advertencia
  - aceptar corrección
  - dejarse amonestar
  lexicon: HALOT
  rationale: El nifal infinitivo implica recibir advertencia/corrección. «Dejarse amonestar» capta bien la receptividad pasiva a la reprensión, más precisa que «ser cuidadoso».
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - ya no
  - no más
  - todavía
  lexicon: HALOT
  rationale: Con el verbo negado, עוֹד aporta la idea de continuidad cesada. «Ya no» es la forma más natural y fiel en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el juicio comparativo del hebreo y coincide con la revisión inglesa más reciente al reflejar la capacidad perdida de aceptar advertencia/corrección, expresada en español con «ya no sabe dejarse amonestar».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí por no aparecer el nombre divino.
  - «Neceo»/«necio» se prefirió por su valor sapiencial tradicional en español, evitando «tonto» por ser demasiado coloquial.
  - El comparativo se resolvió con «Mejor es ... que ...», construcción idiomática y transparente en español bíblico contemporáneo.
