  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: νῦν ἰδὲ como llamado de atención inmediato, ἀλλότριος ὢν θεοῦ como alienación relacional respecto de Dios, πολεμεῖς como hostilidad bélica, y τοὺς εὐσεβοῦντας εἰς τὸν θεόν como personas reverentes hacia Dios. Sin embargo, «estando alejado de Dios» atenúa la fuerza léxica de ἀλλότριος («ajeno/extraño a») y «haces guerra contra» suena menos idiomático en español que «haces la guerra contra» o «combates».'
  spanish_quality_summary: 'El español es claro, pero tiene dos puntos mejorables para fidelidad y naturalidad digna: «alejado de Dios» es demasiado suave frente a ἀλλότριος, y «los que son reverentes hacia Dios» resulta algo rígido; «los que actúan con reverencia hacia Dios» preserva mejor el valor participial y suena más natural. «Ahora mira» funciona, aunque «Mira ahora» también sería posible; no exige cambio.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεός se traduce correctamente como «Dios». No aparecen términos con directrices especiales como Yahvé, Mesías, esclavo, carne, gracia, etc. La principal cuestión léxica es mantener la fuerza de ἀλλότριος con «ajeno a Dios» en vez de un giro más débil.'
  issues:
