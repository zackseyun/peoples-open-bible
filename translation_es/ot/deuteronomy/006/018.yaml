  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general: mandato de hacer lo que es moralmente correcto, finalidad de bienestar, entrada en la tierra y posesión de ella, con conservación de Yahvé y de ''padres''. Sin embargo, ''entrarás'' en indicativo futuro después de ''para que'' endurece el matiz de finalidad/resultado que el inglés auditado preserva con ''you may go in''.'
  spanish_quality_summary: 'El español es claro y natural en conjunto. No obstante, ''ante los ojos de Yahvé'' suena algo menos idiomático que ''a los ojos de Yahvé'' en este modismo evaluativo, y la secuencia verbal mejora con subjuntivo tras ''para que'': ''puedas entrar y tomar posesión''.'
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה > ''Yahvé''; ירשׁ > ''tomar posesión de'' con nota alternativa ''heredar''; לַאֲבֹתֶיךָ > ''a tus padres''. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: Modo verbal tras 'para que'
    rationale: El hebreo לְמַעַן introduce propósito/resultado, y el POB inglés refleja esto con 'so that ... you may go in'. En español, 'para que entrarás' no sería correcto; aunque el borrador separa la cláusula, 'y entrarás' sigue sonando más a afirmación futura que a finalidad. 'Y puedas entrar' preserva mejor la relación sintáctica y semántica.
  - severity: low
