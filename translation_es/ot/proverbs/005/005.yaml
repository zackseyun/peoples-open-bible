review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: «sus pies» por רַגְלֶיהָ, «descienden» por יֹרְדוֹת, «la muerte» por מָוֶת, «sus pasos» por צְעָדֶיהָ, y la transliteración «Seol» preserva adecuadamente שְׁאוֹל. La relación poética entre los dos hemistiquios también se conserva. Sin embargo, la nota al pie está anclada en «muerte[a]», cuando la alternativa léxica documentada corresponde a «Seol», no a «muerte».'
  spanish_quality_summary: El español es claro, digno y natural. «Sus pies descienden a la muerte; sus pasos se aferran a Seol» suena bien en registro bíblico moderno. La única reparación necesaria es mover el marcador de nota al lugar correcto para evitar ambigüedad semántica y mejorar la legibilidad editorial.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: no aparece Yahvé; שְׁאוֹל se mantiene como «Seol» con alternativas explicativas; no hay conflictos con otros términos guía. La decisión «se aferran a» es una buena equivalencia española de «hold fast to» y respeta la fuerza de תמך en contexto.'
  issues:
  - severity: medium
    issue: Marcador de nota al pie colocado en «muerte» en lugar de «Seol».
    rationale: La nota explica alternativas para שְׁאוֹל («el sepulcro», «el reino de los muertos»), no para מָוֶת. Tal como está, el lector puede entender erróneamente que esas alternativas glosan «muerte». El anclaje debe moverse a «Seol[a]».
  - severity: low
    issue: Comillas y redacción de la nota algo forzadas por calco del inglés.
    rationale: 'La forma «''O «el sepulcro» o «el reino de los muertos». Hebreo: «Seol».»'' funciona, pero en español fluye mejor sin la comilla simple inicial y con formulación más directa.'
  revised_spanish_text: Sus pies descienden a la muerte; sus pasos se aferran a Seol[a].
