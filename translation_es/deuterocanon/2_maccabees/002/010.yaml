translation:
  language: es
  text: Porque cuando nuestros padres eran llevados a Persia, los sacerdotes piadosos tomaron secretamente un poco del fuego del altar y lo escondieron en la cavidad de un pozo seco[a], donde lo aseguraron, de modo que el lugar fuera desconocido para todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión griega es comprimida: reúne la idea de una cavidad con la de un pozo o foso seco.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγοντο
  english_pob_choice: were being led away
  chosen_spanish: eran llevados
  alternatives_spanish:
  - eran conducidos
  - eran deportados
  - eran llevados cautivos
  lexicon: LSJ
  rationale: El imperfecto pasivo de ἄγω expresa una acción en curso con idea de traslado forzado. «Eran llevados» conserva esa pasividad y evita especificar más de lo que el griego dice.
- source_word: εἰς τὴν Περσικὴν
  english_pob_choice: into Persia
  chosen_spanish: a Persia
  alternatives_spanish:
  - hacia Persia
  - en Persia
  lexicon: LSJ
  rationale: El movimiento del verbo se expresa naturalmente en español con «a Persia». Mantiene el valor direccional sin volver pesada la frase.
- source_word: εὐσεβεῖς
  english_pob_choice: devout
  chosen_spanish: piadosos
  alternatives_spanish:
  - devotos
  - temerosos de Dios
  - justos
  lexicon: LSJ
  rationale: «Piadosos» comunica bien la cualidad religiosa de los sacerdotes en español bíblico actual y evita un tono demasiado moderno o demasiado vago.
- source_word: λαβόντες ἀπὸ τοῦ πυρὸς τοῦ θυσιαστηρίου
  english_pob_choice: took some of the fire from the altar
  chosen_spanish: tomaron secretamente un poco del fuego del altar
  alternatives_spanish:
  - tomaron fuego del altar
  - tomaron parte del fuego del altar
  - tomaron del fuego del altar
  lexicon: LSJ
  rationale: El griego indica tomar una porción del fuego perteneciente al altar. «Un poco del fuego del altar» conserva esa partitividad. «Secretamente» modifica de manera natural a «tomaron», como en la revisión inglesa.
- source_word: λαθραίως
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - a escondidas
  - en secreto
  - furtivamente
  lexicon: LSJ
  rationale: «Secretamente» es claro, directo y fiel al adverbio de ocultamiento sin añadir matices de sospecha o astucia.
- source_word: κατέκρυφαν
  english_pob_choice: hid
  chosen_spanish: lo escondieron
  alternatives_spanish:
  - lo ocultaron
  - lo enterraron
  - lo guardaron
  lexicon: LSJ
  rationale: El verbo significa esconder o ocultar. «Lo escondieron» es natural en español y conserva el objeto ya mencionado, el fuego.
- source_word: ἐν κοιλώματι φρέατος
  english_pob_choice: in the hollow of a dry well
  chosen_spanish: en la hendidura de un pozo seco
  alternatives_spanish:
  - en la cavidad de un pozo seco
  - en el hueco de un pozo seco
  - en la concavidad de un pozo seco
  lexicon: LSJ
  rationale: 'La construcción griega es comprimida y algo áspera: combina «hendidura/cavidad» con «pozo» o «foso». «Hendidura de un pozo seco» mantiene la imagen espacial sin sobreexplicar.'
- source_word: τάξιν ἔχοντος ἀνύδρου
  english_pob_choice: dry well
  chosen_spanish: pozo seco
  alternatives_spanish:
  - pozo sin agua
  - pozo árido
  - pozo desprovisto de agua
  lexicon: LSJ
  rationale: La frase participial describe algo sin agua. En español, «pozo seco» transmite con naturalidad la falta de agua y conserva el tono sobrio del pasaje.
- source_word: κατησφαλίσαντο
  english_pob_choice: secured it
  chosen_spanish: lo aseguraron
  alternatives_spanish:
  - lo aseguraron bien
  - lo hicieron seguro
  - lo sellaron
  lexicon: LSJ
  rationale: El verbo medio expresa que lo dejaron seguro o protegido. «Lo aseguraron» conserva amplitud semántica sin decidir si lo sellaron físicamente.
- source_word: ὥστε πᾶσιν ἄγνωστον εἶναι τὸν τόπον
  english_pob_choice: so that the place would be unknown to everyone
  chosen_spanish: de modo que el lugar quedara desconocido para todos
  alternatives_spanish:
  - para que nadie supiera el lugar
  - de manera que nadie conociera el lugar
  - de modo que el lugar fuese desconocido para todos
  lexicon: LSJ
  rationale: La cláusula de resultado se vierte de forma natural y clara. «Quedara desconocido» mantiene el valor resultativo del infinitivo con ἄγνωστον.
theological_decisions:
- issue: Conservación pía del fuego del altar durante el exilio/deportación
  english_pob_reading: The text describes devout priests secretly preserving altar fire during deportation, without specifying a ritual theory beyond concealment and preservation.
  chosen_spanish_reading: 'El texto narra un acto de piedad: sacerdotes fieles preservan en secreto el fuego del altar durante el traslado forzado, sin desarrollar aquí una teoría ritual adicional.'
  alternative_spanish_readings:
  - El pasaje puede entenderse como preservación reverente de un elemento sagrado.
  - También puede leerse como una acción que apunta a la continuidad del culto tras el exilio.
  rationale: La traducción evita imponer conclusiones doctrinales o litúrgicas que el versículo no explicita. Mantiene la tensión narrativa entre preservación sagrada y simple ocultamiento.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se incorporó la revisión que mueve el matiz de ocultamiento hacia «tomaron secretamente» y la simplificación de la imagen a «pozo seco», manteniendo la observación de que el griego es denso y algo abrupto en esta descripción.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se mantiene «piadosos» como equivalente de εὐσεβεῖς por su claridad bíblica en español.
  - Se conserva la estructura de acción clandestina sin añadir detalles narrativos no presentes en el griego.
  - La nota al pie está anclada en «pozo seco[a]» para resolver la ambigüedad lexical sin duplicar marcadores.
