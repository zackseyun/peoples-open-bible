  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente el sentido del arameo y del POB inglés: conserva la elipsis de וְהֵן לָא con «Pero si no[a]», mantiene el tono formal de «que se te haga saber», expresa la negativa resuelta de servicio y prosternación, y preserva la distinción entre servir a los dioses y postrarse ante la imagen de oro.'
  spanish_quality_summary: 'El texto es claro y digno, pero hay un detalle de estilo y fidelidad tonal que conviene pulir: en español bíblico y eclesial neutral suena más natural «sea sabido por ti» o «te sea sabido» / «sábelo» que «que se te haga saber», que resulta algo forzado y pasivo. Además, «ni nos postraremos» coordina bien, pero con el negativo previo la construcción más directa y paralela es «y no nos postraremos», más cercana también al original con waw conjuntiva.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé en este versículo. «tus dioses», «imagen de oro» y «nos postraremos» respetan bien las decisiones léxicas documentadas. No se requiere ajuste teológico ni terminológico mayor.
  issues:
  - severity: medium
    issue: «que se te haga saber» suena poco natural en español bíblico actual
    rationale: Aunque transmite la idea impersonal de יְדִיעַ לֶהֱוֵא לָךְ, la formulación es algo pesada. «sea sabido por ti» preserva mejor el tono solemne y la naturalidad literaria en español.
  - severity: low
    issue: La coordinación «ni nos postraremos» puede mejorarse a «y no nos postraremos»
    rationale: El arameo simplemente coordina con waw. En español, tras «que no serviremos...», tanto «ni» como «y no» son posibles, pero «y no» mantiene paralelismo más transparente con los dos futuros negativos y evita que suene a coordinación secundaria.
  revised_spanish_text: Pero si no[a], sea sabido por ti, oh rey, que no serviremos a tus dioses, y no nos postraremos ante la imagen de oro que has levantado.
