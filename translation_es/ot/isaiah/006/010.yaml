revisions:
- from: Haz insensible[a] el corazón de este pueblo, y haz pesados sus oídos, y ciega[b] sus ojos, para que no vea con sus ojos, ni oiga con sus oídos, ni entienda con su corazón, y se vuelva[c], y sea sanado.
  to: Embota el corazón de este pueblo, y haz pesados sus oídos, y ciega[a] sus ojos, no sea que vea con sus ojos, y oiga con sus oídos, y entienda con su corazón, y se vuelva[b][c], y sea sanado.
  rationale: Se ajusta ‘para que no’ a ‘no sea que’ para reflejar mejor la fuerza preventiva de פֶּן, se añade la nota faltante sobre el singular colectivo conforme al rastro auditado, y se mejora ligeramente la naturalidad y precisión de הַשְׁמֵן con ‘Embota’.
