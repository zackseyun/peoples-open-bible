id: ROM.7.5
reference: Romans 7:5
source:
  edition: SBLGNT
  text: ὅτε γὰρ ἦμεν ἐν τῇ σαρκί, τὰ παθήματα τῶν ἁμαρτιῶν τὰ διὰ τοῦ νόμου ἐνηργεῖτο ἐν τοῖς μέλεσιν ἡμῶν εἰς τὸ καρποφορῆσαι τῷ θανάτῳ·
translation:
  text: For when we were in the flesh[a], the sinful passions that came through the law[c][b], were at work in our members to bear fruit for death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sinful nature' / 'in our fallen human condition.'
    reason: alternative_reading
  - marker: b
    text: Lit. 'the passions of sins.'
    reason: lexical_alternative
  - marker: c
    text: '''Members'' here refers to the parts or faculties of the body as instruments of action.'
    reason: cultural_note
lexical_decisions:
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  - fallen human condition
  lexicon: BDAG
  rationale: Paul’s phrase ἐν τῇ σαρκί is a loaded idiom for life in the old human condition, but the project’s default is to preserve 'flesh' where possible and document metaphorical alternatives. Here 'in the flesh' keeps Paul’s wording and theological tension without over-interpreting it.
- source_word: παθήματα
  chosen: passions
  alternatives:
  - sufferings
  - desires
  lexicon: BDAG
  rationale: In this context the term refers not to sufferings but to affective drives or impulses connected with sin. 'Passions' best preserves that moral-psychological sense in readable English.
- source_word: τῶν ἁμαρτιῶν
  chosen: sinful
  alternatives:
  - of sins
  - belonging to sins
  lexicon: BDAG
  rationale: An attributive rendering, 'sinful passions,' is clearer and more natural in English than the formally wooden 'passions of sins,' while preserving the genitive sense that these passions are characterized by sin.
- source_word: διὰ τοῦ νόμου
  chosen: that came through the law
  alternatives:
  - through the law
  - aroused through the law
  lexicon: BDAG
  rationale: The phrase modifies the sinful passions as operating by means of the law. 'That came through the law' is natural English and preserves the causal/instrumental force without importing more than the context warrants. 'Aroused through the law' is possible from the broader Pauline argument but is more interpretive.
- source_word: νόμος
  chosen: law
  lexicon: BDAG
  rationale: '''Law'' is the standard and contextually appropriate rendering in Romans. The immediate context points to the Mosaic law, but the anarthrous English ''the law'' sufficiently preserves Paul’s wording.'
- source_word: ἐνηργεῖτο
  chosen: were at work
  alternatives:
  - worked
  - were working
  - were active
  lexicon: BDAG
  rationale: The imperfect middle/passive-form verb conveys ongoing operative activity in past time. 'Were at work' captures this durative sense idiomatically better than the flatter 'worked.'
- source_word: μέλεσιν
  chosen: members
  alternatives:
  - body parts
  - limbs
  - bodily faculties
  lexicon: BDAG
  rationale: Paul commonly uses 'members' for the parts or faculties of the body as instruments of action. Retaining 'members' preserves intertextual consistency in Romans while allowing readers to sense both bodily and instrumental nuance.
- source_word: καρποφορῆσαι
  chosen: to bear fruit
  alternatives:
  - to produce fruit
  lexicon: BDAG
  rationale: '''Bear fruit'' is the established and natural English equivalent, preserving Paul’s organic metaphor and linking with nearby fruit imagery in Romans 7.'
- source_word: τῷ θανάτῳ
  chosen: for death
  alternatives:
  - to death
  - resulting in death
  lexicon: BDAG
  rationale: The dative here expresses result or relation. 'For death' is concise and preserves the metaphorical direction of fruit-bearing toward death, matching Paul’s stark contrastive style.
