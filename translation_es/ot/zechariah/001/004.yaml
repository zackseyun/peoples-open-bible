translation:
  language: es
  text: 'No sean como sus padres[a], a quienes los profetas anteriores proclamaron, diciendo: “Así dice Yahvé de los ejércitos: Vuélvanse, por favor, de sus malos caminos y de sus malas obras”. Pero ellos no escucharon ni me prestaron atención, declara Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “antepasados”. El hebreo dice literalmente “sus padres”, refiriéndose a generaciones anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּהְיוּ
  english_pob_choice: Do not be
  chosen_spanish: No sean
  alternatives_spanish:
  - No lleguen a ser
  - No resulten ser
  lexicon: HALOT
  rationale: 'La prohibición con אַל + היה en imperfecto se expresa naturalmente en español con una prohibición de estado/identidad: “No sean”. Conserva el valor exhortativo y evita una paráfrasis innecesaria.'
- source_word: כַאֲבֹתֵיכֶם
  english_pob_choice: like your fathers
  chosen_spanish: como sus padres
  alternatives_spanish:
  - como sus antepasados
  - como sus ancestros
  lexicon: HALOT
  rationale: El hebreo dice literalmente “sus padres”, refiriéndose a generaciones anteriores. “Padres” mantiene la forma léxica del original y el paralelismo del texto, mientras el contexto aclara el sentido generacional.
- source_word: הַנְּבִיאִים הָרִאשֹׁנִים
  english_pob_choice: the former prophets
  chosen_spanish: los profetas anteriores
  alternatives_spanish:
  - los primeros profetas
  - los profetas de antaño
  lexicon: HALOT
  rationale: הָרִאשֹׁנִים marca anterioridad temporal. “Anteriores” comunica eso de modo directo y claro en español, sin sugerir un título técnico distinto.
- source_word: שׁוּבוּ נָא
  english_pob_choice: Turn back, please
  chosen_spanish: Vuélvanse, por favor
  alternatives_spanish:
  - Regresen, por favor
  - Vuélvanse ahora
  lexicon: HALOT
  rationale: שׁוּב en contexto profético implica volver atrás en conducta y arrepentirse. “Vuélvanse” conserva ese movimiento moral; “por favor” reproduce la súplica de נָא sin convertirla en mera indicación temporal.
- source_word: מִדַּרְכֵיכֶם הָרָעִים
  english_pob_choice: from your evil ways
  chosen_spanish: de sus malos caminos
  alternatives_spanish:
  - de sus caminos malos
  - de sus conductas malas
  lexicon: HALOT
  rationale: דֶּרֶךְ puede referirse al modo de vida o conducta. “Caminos” es un equivalente bíblico natural en español y mantiene la imagen de curso de vida; “malos” traduce la cualidad moral de רָעִים.
- source_word: וּמַעֲלִילֵיכֶם הָרָעִים
  english_pob_choice: and your evil deeds
  chosen_spanish: y de sus malas obras
  alternatives_spanish:
  - y de sus malas acciones
  - y de sus malas prácticas
  lexicon: HALOT
  rationale: מַעֲלָלִים designa actos, hechos o prácticas. “Obras” funciona bien en español bíblico y conserva la concreción ética del contraste con “caminos”.
- source_word: וְלֹא שָׁמְעוּ
  english_pob_choice: But they did not listen
  chosen_spanish: Pero ellos no escucharon
  alternatives_spanish:
  - Pero no oyeron
  - Pero no obedecieron
  lexicon: HALOT
  rationale: שָׁמַע aquí va más allá de oír; implica prestar oído a la advertencia. “Escucharon” reproduce ese matiz sin forzar el sentido a “obedecieron”.
- source_word: וְלֹא הִקְשִׁיבוּ אֵלַי
  english_pob_choice: or pay attention to me
  chosen_spanish: ni me prestaron atención
  alternatives_spanish:
  - ni me atendieron
  - ni me hicieron caso
  lexicon: HALOT
  rationale: הִקְשִׁיבוּ expresa atención deliberada y concentrada. “Prestar atención” es idiomático en español y mantiene el objeto personal אֵלַי.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito como “Yahvé”, conforme a la terminología del proyecto, y נְאֻם se vierte con la fórmula profética breve “declara”, que distingue esta clausura del discurso directo anterior.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto pide transliterar el Tetragrámaton como “Yahvé” en el texto principal. Esto preserva la referencia al nombre de pacto sin la sustitución tradicional por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de שׁוּבוּ en exhortación profética
  english_pob_reading: Turn back
  chosen_spanish_reading: Vuélvanse
  alternative_spanish_readings:
  - Arrepiéntanse
  - Regresen
  rationale: El verbo hebreo incluye la idea de volverse de una conducta anterior. “Vuélvanse” mantiene el movimiento de retorno y deja visible la dimensión moral exigida por el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y concuerda con la auditoría inglesa: mantiene la prohibición inicial, el paralelismo “caminos / obras”, la fórmula profética y el nombre divino explícito. No se detectaron revisiones posteriores que exigieran un ajuste adicional.'
  spanish_consistency_notes:
  - Se conservó “Yahvé” de manera uniforme para יְהוָה.
  - 'Se usó el trato de segunda persona plural de forma consistente: “sean”, “sus”, “vuélvanse”, “escucharon”, “prestaron atención”.'
  - Se mantuvo el paralelismo semántico entre “caminos” y “obras” para reflejar דַּרְכֵיכֶם y מַעֲלִילֵיכֶם.
  - Se evitó “SEÑOR” como sustituto del nombre divino, de acuerdo con la política del proyecto.
