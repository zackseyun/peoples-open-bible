    reason: lexical_alternative
  - marker: b
    text: 'O también: «desde más allá del Jordán».'
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor y busca ajustar el español más estrechamente a las decisiones locativas del hebreo y del POB inglés: ''junto a'' evita una lectura demasiado específica de ''en''. También se pule la nota b y se mejora ligeramente la naturalidad de ''capturaron'' a ''apresaron''.'
