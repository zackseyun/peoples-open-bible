  to: Y sucederá que toda olla en Jerusalén y en Judá será santa para Yahvé de los ejércitos, y vendrán todos los que sacrifican, y tomarán de ellas y cocerán en ellas. Y ya no habrá cananeo[a] alguno en la casa de Yahvé de los ejércitos en aquel día.
  rationale: Se elimina el marcador editorial espurio '[?]' y se sustituye 'caldero' por 'olla' para una equivalencia más natural y ampliamente comprensible de סִיר. También se ajusta el pronombre a femenino plural ('de ellas... en ellas') para concordar con 'olla' entendido distributivamente en español. El resto del versículo se mantiene por su buena fidelidad al hebreo y al razonamiento documentado por el POB inglés.
