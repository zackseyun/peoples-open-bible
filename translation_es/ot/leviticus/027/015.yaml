review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura legal del hebreo: condición, redención de la casa, adición de un quinto y resultado de propiedad. «Consagró», «redime», «su casa» y «será suya» reflejan fielmente הַמקדישׁ, יגאל, ביתו y והיה לו. Sin embargo, «del plata» es gramaticalmente incorrecto y no reproduce bien כֶּסֶף עֶרְכְּךָ; además, «sobre ella» para עָלָיו suena torpe y puede sugerir ubicación física más que suma añadida.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita una reparación menor para naturalidad y corrección gramatical. «de la plata de tu valuación» mejora la sintaxis y conserva la concreción de «plata». También conviene cambiar «sobre ella» por «a ella» para expresar adición de modo natural en español jurídico/bíblico. La nota b debe alinearse mejor con la idea de la plata de la tasación fijada por el sacerdote.
  glossary_alignment: La terminología del proyecto está bien respetada en este versículo. No hay conflicto con Yahvé/Mesías/etc. «Consagró» coincide con la decisión cultual documentada; «redime» mantiene la fuerza legal-sacral; «plata» debe conservarse frente a «dinero», pero con sintaxis española correcta.
  issues:
  - severity: high
    issue: «del plata» es incorrecto en español
    rationale: La preposición y el artículo están mal combinados. Debe ser «de la plata», y además la frase completa debe reflejar con claridad כֶּסֶף עֶרְכְּךָ.
  - severity: medium
    issue: «sobre ella» suena poco natural para expresar adición monetaria
    rationale: Aunque intenta seguir literalmente עָלָיו, en español puede leerse espacialmente. «a ella» o «además de ella» comunican mejor la suma añadida; «a ella» mantiene mayor cercanía formal.
  - severity: low
    issue: La nota b no menciona explícitamente la tasación sacerdotal documentada en el audit trail inglés
    rationale: La explicación puede afinarse para reflejar que se añade un quinto al valor de plata según la valuación establecida por el sacerdote en el contexto.
  revised_spanish_text: Y si el que la consagró[a] redime su casa, añadirá una quinta parte de la plata de tu valuación a ella[b], y será suya.
  revised_footnotes:
