translation:
  text: 'I am the daughter and the woman[a].

    I am the mother of my father

    and the daughter of my husband[d][c][b],

    and he is my offspring.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲥϩⲓⲙⲉ can also mean ‘wife’; ‘woman’ is chosen to keep the wider semantic
      range and the poem’s stark pairing with ‘daughter.’
    reason: lexical_alternative
  - marker: b
    text: Some editions/readings at this locus have ‘sister of my husband’ (ⲥⲛⲁⲓ ⲙⲡⲁϩⲁⲓ)
      rather than ‘daughter of my husband.’ The OCR here reads ⲧⲥⲱⲛⲉ (daughter), but
      letter-shape confusion is possible.
    reason: textual_variant
  - marker: c
    text: The phrase ‘and he is my offspring’ follows the common Thunder tradition
      here; if the damaged word is actually ⲡⲁϫⲟⲉⲓⲥ, the line would read ‘and he is
      my lord.’
    reason: alternative_reading
  - marker: d
    text: An incomplete following half-line begins ‘I am the humiliation of my …’
      (ⲁⲛⲟⲕ ⲧⲉ ⲧϩⲙϩⲁⲗ ⲛⲧⲉ ⲡⲁ—). It is not translated here to avoid conjecture.
    reason: alignment_note
lexical_decisions:
- source_word: ⲥⲱⲛⲉ
  chosen: daughter
  alternatives:
  - girl
  - child
  lexicon: Crum; Layton
  rationale: Standard Sahidic sense is ‘daughter’ in kinship contexts; preserves the
    genealogical paradox the poem foregrounds.
- source_word: ⲥϩⲓⲙⲉ
  chosen: woman
  alternatives:
  - wife
  lexicon: Crum; Layton
  rationale: ⲥϩⲓⲙⲉ is ‘woman’ generically; ‘wife’ is possible by context, but retaining
    ‘woman’ keeps the broader, starker pairing with ‘daughter’ and avoids prematurely
    narrowing to marital status.
- source_word: ⲙⲁⲁⲩ
  chosen: mother
  lexicon: Crum; Layton
  rationale: Unambiguous basic kinship term; needed to preserve the paradox ‘mother
    of my father’.
- source_word: ⲉⲓⲱⲧ
  chosen: father
  lexicon: Crum; Layton
  rationale: Plain kinship term; standard gloss maintains the shock of ‘mother of
    my father’.
- source_word: ϩⲁⲓ (as ⲡⲁϩⲁⲓ across a line break)
  chosen: husband
  alternatives:
  - man
  lexicon: Crum; Layton
  rationale: ⲡϩⲁⲓ is the customary word for ‘husband’; segmentation across the line
    suggests ⲙⲡⲁϩⲁⲓ ‘of my husband’.
- source_word: ⲛⲧⲟϥ ⲡⲉ ⲡⲁϫⲡⲟ (OCR-uncertain)
  chosen: he is my offspring
  alternatives:
  - he is my lord
  lexicon: Contextual; compare published NHC VI,2 editions
  rationale: The larger Thunder tradition at this spot has ‘and he is my offspring,’
    completing the kinship paradox. OCR suggests ⲡⲁϫⲡⲟ, which could reflect a damaged
    word; if it were ⲡⲁϫⲟⲉⲓⲥ it would read ‘my lord.’ Given the immediate kinship
    chain, ‘offspring’ best fits while noting uncertainty.
- source_word: ϩⲙϩⲁⲗ (not translated in main line due to fragment)
  chosen: humiliation
  alternatives:
  - humility
  - weakness
  - shame
  lexicon: Crum; Layton
  rationale: Term denotes humiliation/shame or weakness. The genitive complement is
    truncated in the OCR excerpt; decision documented though omitted from the main
    English to avoid false precision.
