  text: דַּבֵּר֮ אֶל בְּנֵ֣י יִשְׂרָאֵל֒ אִ֣ישׁ אֽוֹ אִשָּׁ֗ה כִּ֤י יַעֲשׂוּ֙ מִ/כָּל חַטֹּ֣את הָֽ/אָדָ֔ם לִ/מְעֹ֥ל מַ֖עַל בַּ/יהוָ֑ה וְ/אָֽשְׁמָ֖ה הַ/נֶּ֥פֶשׁ הַ/הִֽוא־־־׃
