revisions:
- from: Y el que hiera[a] a un animal hará restitución por él, pero el que hiera a un hombre será muerto.
  to: Y el que mate a un animal hará restitución por él, pero el que mate a un hombre[a] será condenado a muerte.
  rationale: Se ajusta מַכֵּה a «mate» para reflejar la fuerza letal inferida del contexto legal y de la auditoría inglesa; y se reemplaza «será muerto» por «será condenado a muerte», que expresa de manera más natural y clara en español el pasivo judicial de יוּמָת. Se mantiene «hombre» con la nota alternativa ya documentada.
