review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: imperativo/futuro directivo de הֲקֵמֹתָ, referencia técnica a הַמִּשְׁכָּן como «tabernáculo», y locativo «en el monte». También preserva la nota del POB sobre la alternativa hebrea activa «que viste». Sin embargo, la cláusula relativa hebrea אֲשֶׁר («que/el cual») fue convertida en comparativa con «como», lo que altera levemente la sintaxis y el sentido: el texto no dice ‘de la manera como te fue mostrado’, sino ‘según su ordenanza, la cual te fue mostrada / que viste en el monte’.'
  spanish_quality_summary: 'El español es claro y digno, pero «como te fue mostrado» suena menos exacto que una relativa y puede leerse como modificando el modo de levantar, no «su ordenanza». Además, para concordar con «ordenanza» y evitar ambigüedad, conviene formular la relativa en femenino: «la cual te fue mostrada».'
  glossary_alignment: «tabernáculo» está bien alineado con מִשְׁכָּן. «ordenanza» sigue la revisión auditada del inglés para כְּמִשְׁפָּטוֹ, aunque en español sigue siendo algo menos natural que «disposición prescrita»; aun así es aceptable por fidelidad al audit trail. No hay conflictos con la terminología principal del proyecto.
  issues:
  - severity: medium
    issue: Uso de «como» en lugar de una cláusula relativa
    rationale: אֲשֶׁר introduce una relativa («que/la cual»), no una comparación. «Como te fue mostrado» puede desplazar el sentido hacia el modo de ejecución en vez de identificar la ordenanza/prescripción mostrada en el monte.
  - severity: low
    issue: Falta de concordancia explícita con «ordenanza»
    rationale: Con «como te fue mostrado», el antecedente queda difuso. «La cual te fue mostrada» vincula claramente la revelación a «ordenanza», manteniendo la nota alternativa «que viste».
  revised_spanish_text: Y levantarás el tabernáculo conforme a su ordenanza[a], la cual te fue mostrada en el monte.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «que viste en el monte». El texto principal expresa la idea de manera idiomática como «la cual te fue mostrada en el monte».'
    reason: lexical_alternative
  revision_rationale: Se cambia «como te fue mostrado» por «la cual te fue mostrada» para reflejar fielmente la cláusula relativa hebrea אֲשֶׁר, mantener la aclaración idiomática auditada por el POB inglés, y mejorar la claridad sintáctica en español sin apartarse del sentido fuente.
