revisions:
- from: 'Pero al impío, Dios le dice: “¿Qué derecho tienes[a] para recitar mis estatutos y para poner[b] mi pacto sobre tus labios?”'
  to: Pero al impío, Dios le dice:[a] «¿Qué derecho tienes para recitar mis estatutos y para tomar[b] mi pacto sobre tus labios?»
  rationale: 'La revisión es menor: conserva la estructura y la buena legibilidad del borrador, pero reemplaza «poner» por «tomar» para reflejar mejor וַתִּשָּׂא y la auditoría inglesa. También pule la nota literal de מַה לְּךָ para que suene más natural en español. Se mantiene «pacto», que en este versículo es aceptable y sigue el término ya elegido en el borrador, aunque «alianza» también sería posible en otros contextos.'
