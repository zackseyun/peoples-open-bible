translation:
  language: es
  text: Si el lugar que Yahvé tu Dios escoja para poner allí su nombre está demasiado lejos de ti, entonces podrás degollar de tu vacada y de tu rebaño[a], que Yahvé te ha dado, como te he mandado; y podrás comer dentro de tus puertas, según todo el deseo de tu alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de tus ciudades»; literalmente, «dentro de tus puertas».
    reason: lexical_alternative
  - marker: b
    text: O «según todo lo que anhela tu alma» / «según todo tu apetito».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Porque
  - Cuando
  lexicon: HALOT
  rationale: En este contexto legal introduce una circunstancia condicional; «Si» reproduce con naturalidad esa fuerza y encaja con la concesión que sigue.
- source_word: יִרְחַק מִמְּךָ
  english_pob_choice: is too far from you
  chosen_spanish: está demasiado lejos de ti
  alternatives_spanish:
  - está lejos de ti
  - se aleja de ti
  lexicon: HALOT
  rationale: רחק expresa distancia; «demasiado lejos de ti» comunica la fuerza práctica de la cláusula, no solo la distancia física.
- source_word: הַמָּקוֹם אֲשֶׁר יִבְחַר יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the place that Yahweh your God chooses
  chosen_spanish: el lugar que Yahvé tu Dios escoja
  alternatives_spanish:
  - el lugar que Yahvé tu Dios elija
  - el lugar que Yahvé tu Dios escogerá
  lexicon: HALOT
  rationale: El yiqtol en esta fórmula de santuario central funciona como formulación general y estable; «escoja» preserva ese valor y mantiene el registro bíblico sin forzar futuro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración según el criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: לָשׂוּם שְׁמוֹ שָׁם
  english_pob_choice: to put his name there
  chosen_spanish: para poner allí su nombre
  alternatives_spanish:
  - para poner su nombre allí
  - para establecer allí su nombre
  lexicon: HALOT
  rationale: «Poner allí su nombre» sigue de cerca la fórmula deuteronómica sin introducir interpretaciones adicionales; «allí» mantiene el referente del lugar escogido.
- source_word: וְזָבַחְתָּ
  english_pob_choice: then you may slaughter
  chosen_spanish: entonces podrás degollar
  alternatives_spanish:
  - entonces podrás sacrificar
  - entonces matarás
  lexicon: HALOT
  rationale: זבח aquí permite el sentido de matanza para consumo porque el contexto distingue esta acción del sacrificio cultual; «degollar» evita sugerir necesariamente un rito sacrificial local.
- source_word: מִבְּקָרְךָ וּמִצֹּאנְךָ
  english_pob_choice: from your herd and from your flock
  chosen_spanish: de tu vacada y de tu rebaño
  alternatives_spanish:
  - de tu ganado vacuno y de tu ganado menor
  - de tus reses y de tus ovejas/cabras
  lexicon: HALOT
  rationale: בקר y צאן son colectivos; «vacada» y «rebaño» conservan el paralelismo y la distinción entre ganado mayor y menor en español bíblico claro.
- source_word: אֲשֶׁר נָתַן יְהוָה לְךָ
  english_pob_choice: that Yahweh has given you
  chosen_spanish: que Yahvé te ha dado
  alternatives_spanish:
  - que Yahvé te dio
  - que Yahvé te ha concedido
  lexicon: HALOT
  rationale: El perfecto expresa un don ya otorgado con efecto presente; «te ha dado» suena natural y mantiene la relación de posesión resultante.
- source_word: כַּאֲשֶׁר צִוִּיתִךָ
  english_pob_choice: as I have commanded you
  chosen_spanish: como te he mandado
  alternatives_spanish:
  - como te he ordenado
  - como te mandé
  lexicon: HALOT
  rationale: El verbo צוה conserva la idea de mandato normativo; «te he mandado» preserva la voz primera del hablante y la referencia a instrucción previa.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - en tus ciudades
  - dentro de tus ciudades
  lexicon: HALOT
  rationale: «Puertas» mantiene la metáfora hebrea y su textura legal; aquí se conserva la literalidad que el inglés POB también preserva.
- source_word: בְּכֹל אַוַּת נַפְשֶׁךָ
  english_pob_choice: according to all the desire of your soul
  chosen_spanish: según todo el deseo de tu alma
  alternatives_spanish:
  - según todo el apetito de tu alma
  - a gusto de tu alma
  - según todo lo que desea tu alma
  lexicon: HALOT
  rationale: La expresión hebrea habla del deseo/apetito de la נֶפֶשׁ; «alma» mantiene la antropología bíblica y «según todo el deseo» conserva la tensión entre deseo y medida total.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto en forma transliterada, conforme al criterio del proyecto, evitando la sustitución por un título y manteniendo auditable la presencia del Tetragrámaton en el texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de זבח en un contexto de permiso alimentario
  english_pob_reading: then you may slaughter
  chosen_spanish_reading: entonces podrás degollar
  alternative_spanish_readings:
  - entonces podrás sacrificar
  - entonces podrás matar
  rationale: La cláusula explica una concesión para matar animales de consumo cuando el santuario central está lejos; «degollar» evita imponer un matiz de sacrificio ritual local que el contexto no exige.
  doctrine_reference: Contexto legal de Deuteronomio 12:21
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente marcado como sin cambios, con acuerdo alto y sin revisiones aplicadas; el borrador respeta el audit trail inglés y conserva las dos alternativas léxicas documentadas donde el español también admite ambigüedad.
  spanish_consistency_notes:
  - Yahvé se usa de manera consistente para יְהוָה.
  - Se conserva la metáfora de «puertas» para בִּשְׁעָרֶיךָ, con nota alternativa sobre «ciudades».
  - «Degollar» se emplea para evitar una lectura sacrificial impropia del contexto.
  - «Alma» traduce נֶפֶשׁ con valor antropológico, manteniendo la tensión deseo/apetito sin neutralizarla.
