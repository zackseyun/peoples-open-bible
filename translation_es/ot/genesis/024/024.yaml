translation:
  language: es
  text: 'Ella le dijo: «Soy la hija de Betuel, hijo de Milcá, a quien Milcá dio a luz para Najor[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «a quien Milcá dio a luz para Nahor». La fórmula hebrea de nacimiento usa con frecuencia la preposición ל para identificar al padre; por eso puede expresarse más literalmente «dio a luz para Nahor», aunque en español también puede entenderse como «dio a luz para/a Nahor» en contexto genealógico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: She said
  chosen_spanish: Ella le dijo
  alternatives_spanish:
  - Y dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción siguiente en la narración. En español, «le dijo» mantiene el valor de habla dirigida al interlocutor sin forzar un conector explícito.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a ese hombre
  lexicon: HALOT
  rationale: El complemento dativo se expresa de forma natural en español con pronombre clítico de objeto indirecto; el referente masculino queda claro por el contexto.
- source_word: בַּת ... אָנֹכִי
  english_pob_choice: I am the daughter of
  chosen_spanish: Soy la hija de
  alternatives_spanish:
  - Yo soy hija de
  - Soy hija de
  lexicon: HALOT
  rationale: La estructura nominal hebrea se vuelve más idiomática en español con una copulativa explícita. Se conserva la autodefinición genealógica sin añadir artículos innecesarios.
- source_word: בְּתוּאֵל
  english_pob_choice: Bethuel
  chosen_spanish: Betuel
  alternatives_spanish:
  - Bethuel
  lexicon: Nombres propios transliterados
  rationale: Se translitera el nombre propio al español con forma habitual de uso bíblico en castellano, sin traducirlo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  - descendiente de
  lexicon: HALOT
  rationale: El constructo genealógico se rinde con la forma normal española «hijo de», que conserva la relación filial sin sobrecargar el ritmo.
- source_word: מִלְכָּה
  english_pob_choice: Milcah
  chosen_spanish: Milcá
  alternatives_spanish:
  - Milca
  lexicon: Nombres propios transliterados
  rationale: Se mantiene el nombre propio con transliteración bíblica española; el acento gráfico ayuda a la lectura y no altera el referente.
- source_word: אֲשֶׁר יָלְדָה לְנָחוֹר
  english_pob_choice: whom she bore to Nahor
  chosen_spanish: la cual dio a luz a Najor
  alternatives_spanish:
  - que dio a luz para Najor
  - que le dio a luz a Najor
  - la que dio a luz a Najor
  lexicon: HALOT
  rationale: La fórmula hebrea de nacimiento se expresa en español con «dio a luz a», que comunica el acto de alumbramiento y conserva la relación con el padre marcado por לְ. Se eligió «la cual» para reflejar el relativo femenino y mantener el antecedente de forma clara.
- source_word: לְנָחוֹר
  english_pob_choice: to Nahor
  chosen_spanish: a Najor
  alternatives_spanish:
  - para Najor
  - de Najor
  lexicon: HALOT
  rationale: En esta fórmula genealógica, ל marca al padre asociado al nacimiento. «A Najor» reproduce la relación de modo natural en español; «para» se conserva como alternativa posible, pero es menos directa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés: conserva la secuencia narrativa, la identificación genealógica «hija de Betuel, hijo de Milcá», y la fórmula de nacimiento con su relación paterna. Se optó por un español natural y publicable, evitando calcos pesados pero manteniendo la tensión lexical de לְנָחוֹר mediante la nota.'
  spanish_consistency_notes:
  - Se usa «Najor» para el nombre propio en forma española habitual.
  - Se usa «Betuel» y «Milcá» con transliteración española consistente.
  - «Dio a luz a» mantiene la fórmula de nacimiento sin perder el valor genealógico del hebreo.
  - El pronombre clítico «le» representa el dativo de אֵלָיו sin redundancia innecesaria.
