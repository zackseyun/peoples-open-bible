revisions:
- from: 'Y Yahvé dijo a Jehú: «Porque has hecho bien al hacer lo recto[a] ante mis ojos, y has hecho a la casa de Acab conforme a todo lo que estaba en mi corazón, tus hijos hasta la cuarta generación se sentarán en el trono de Israel».'
  to: 'Y Yahvé dijo a Jehú: «Porque has hecho bien al hacer lo recto ante mis ojos, y has hecho con la casa de Acab conforme a todo lo que estaba en mi corazón, tus hijos[a] hasta la cuarta generación se sentarán en el trono de Israel».'
  rationale: Se reemplaza una construcción poco natural («has hecho a la casa de Acab») por una más idiomática y fiel al contexto («has hecho con la casa de Acab»), sin añadir una interpretación más fuerte que el hebreo. Además, se traslada la nota al punto léxico más significativo del versículo, preservando la alternativa/documentación del modismo בְּנֵי רְבִעִים según la auditoría inglesa.
