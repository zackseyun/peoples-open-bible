translation:
  language: es
  text: Sin falta diezmarás[a] todo el producto de tu semilla que sale del campo, año tras año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «Debes diezmar todo el producto que tu campo da cada año».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַשֵּׂר תְּעַשֵּׂר
  english_pob_choice: You shall surely tithe
  chosen_spanish: Ciertamente diezmarás
  alternatives_spanish:
  - Debes diezmar
  - Sin falta diezmarás
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica el mandato. En español, 'Ciertamente diezmarás' conserva la fuerza enfática y el tono imperativo sin volverlo artificial. 'Diezmar' mantiene el paralelismo léxico con el acto requerido.
- source_word: תְּבוּאַת
  english_pob_choice: produce
  chosen_spanish: producto
  alternatives_spanish:
  - producción
  - rendimiento
  - cosecha
  lexicon: HALOT
  rationale: '''תְּבוּאַת'' designa de manera amplia el fruto o rendimiento agrícola. ''Producto'' es amplio y comprensible en español moderno, sin limitar el sentido a una sola clase de cultivo.'
- source_word: זַרְעֶךָ
  english_pob_choice: your seed
  chosen_spanish: tu semilla
  alternatives_spanish:
  - tu grano
  - lo que siembras
  - tus cultivos
  lexicon: HALOT
  rationale: La expresión es literalmente 'tu semilla'. Mantener 'semilla' conserva la imagen del hebreo y evita especificar indebidamente el tipo de cosecha.
- source_word: הַיֹּצֵא הַשָּׂדֶה
  english_pob_choice: that comes out of the field
  chosen_spanish: que salga del campo
  alternatives_spanish:
  - que produce el campo
  - que brota del campo
  - que sale del campo
  lexicon: HALOT
  rationale: El participio expresa literalmente lo que 'sale' del campo. 'Que salga del campo' preserva la imagen fuente con buena naturalidad en español; la lectura más dinámica 'que produce el campo' queda como alternativa.
- source_word: שָׁנָה שָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - año por año
  lexicon: HALOT
  rationale: La repetición distributiva indica recurrencia anual. 'Año tras año' es una frase natural y fiel en español.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden estrechamente; no se detectan revisiones relevantes ni variantes textuales que afecten la traducción. Se mantiene la intensificación del mandato y la imaginería agrícola del original.
  spanish_consistency_notes:
  - Se preserva 'diezmar' como verbo técnico acorde con el mandato cultual.
  - Se mantiene la metáfora agrícola de 'semilla' y 'campo' sin sustituirla por un equivalente más interpretativo.
  - '''Año tras año'' reproduce la recurrencia distributiva del hebreo sin añadir matices inexistentes.'
