  text: אִם עֹ֣שֶׁק רָ֠שׁ וְ/גֵ֨זֶל מִשְׁפָּ֤ט וָ/צֶ֨דֶק֙ תִּרְאֶ֣ה בַ/מְּדִינָ֔ה אַל תִּתְמַ֖הּ עַל הַ/חֵ֑פֶץ כִּ֣י גָבֹ֜הַּ מֵ/עַ֤ל גָּבֹ֨הַ֙ שֹׁמֵ֔ר וּ/גְבֹהִ֖ים עֲלֵי/הֶֽם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/005/007.yaml
  text: If you see the oppression of the poor and the robbery of justice and righteousness in the province[a], do not be astonished at the matter; for one high official is watched by one higher[c][b], and there are higher ones over them.
  footnotes:
  - marker: a
    text: Or 'extortion of the poor.' The Hebrew terms can emphasize exploitative seizure as well as general oppression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plundering of justice and righteousness.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew literally says 'for a high one is watching over a high one, and higher ones are over them,' which may refer to layers of human officials and may also imply ultimate divine oversight.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
