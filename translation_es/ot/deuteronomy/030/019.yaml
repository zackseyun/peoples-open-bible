translation:
  language: es
  text: Yo llamo hoy a los cielos y a la tierra como testigos contra ti:[a] he puesto delante de ti la vida y la muerte, la bendición y la maldición. Elige la vida, para que vivas tú y tu descendencia.[b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el cielo y la tierra". El hebreo dice literalmente "los cielos y la tierra".
    reason: lexical_alternative
  - marker: b
    text: 'La expresión tiene sentido legal y de pacto: "llamo ... como testigos contra ti".'
    reason: theological_note
  - marker: c
    text: O "tus descendientes"; hebreo "tu semilla/descendencia".
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעִידֹתִי בָכֶם
  english_pob_choice: I call ... to witness against you
  chosen_spanish: llamo ... como testigos contra ti
  alternatives_spanish:
  - doy testimonio contra ti
  - llamo ... para testificar contra ti
  lexicon: HALOT
  rationale: La forma hifil de עוּד tiene aquí un valor jurídico de convocar testigos en un litigio de pacto. En español, 'llamo ... como testigos contra ti' conserva ese matiz forense mejor que una simple 'advertencia'.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: '''Hoy'' es la forma natural en español moderno y conserva el énfasis temporal del hebreo sin arcaísmo.'
- source_word: אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra
  lexicon: HALOT
  rationale: En español, el par suele mantenerse como merismo con plural 'los cielos y la tierra'. Esa forma refleja mejor el hebreo que 'el cielo' cuando se quiere conservar la fórmula solemne.
- source_word: הַחַיִּים וְהַמָּוֶת
  english_pob_choice: life and death
  chosen_spanish: la vida y la muerte
  alternatives_spanish:
  - vida y muerte
  lexicon: HALOT
  rationale: Traducción directa y natural del par abstracto, manteniendo el contraste de pacto.
- source_word: נָתַתִּי לְפָנֶיךָ
  english_pob_choice: I have set before you
  chosen_spanish: he puesto delante de ti
  alternatives_spanish:
  - he colocado delante de ti
  - he presentado ante ti
  lexicon: HALOT
  rationale: '''Poner delante de'' reproduce con precisión el sentido de situar una opción ante alguien. ''He puesto delante de ti'' suena natural y conserva la imagen.'
- source_word: הַבְּרָכָה וְהַקְּלָלָה
  english_pob_choice: blessing and curse
  chosen_spanish: la bendición y la maldición
  alternatives_spanish:
  - bendición y maldición
  - la bendición y la maldición
  lexicon: HALOT
  rationale: '''Bendición'' y ''maldición'' son las equivalencias directas y fieles al contraste pactual del hebreo.'
- source_word: וּבָחַרְתָּ
  english_pob_choice: Choose life
  chosen_spanish: Elige la vida
  alternatives_spanish:
  - Escoge la vida
  - y elige la vida
  lexicon: HALOT
  rationale: El imperativo español 'Elige' expresa claramente la exhortación. Se omite una conjunción no representada por el hebreo en el tramo final.
- source_word: בַּחַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: HALOT
  rationale: 'En español, el artículo definido es natural y no altera el sentido: se trata de la opción/camino de la vida.'
- source_word: לְמַעַן תִּחְיֶה
  english_pob_choice: so that ... may live
  chosen_spanish: para que vivas
  alternatives_spanish:
  - a fin de que vivas
  - para que tú vivas
  lexicon: HALOT
  rationale: '''Para que'' conserva de manera clara la finalidad/resultad​o. El subjuntivo ''vivas'' reproduce el valor deseado del hebreo.'
- source_word: אַתָּה וְזַרְעֶךָ
  english_pob_choice: you and your offspring
  chosen_spanish: tú y tu descendencia
  alternatives_spanish:
  - tú y tu linaje
  - tú y tus descendientes
  lexicon: HALOT
  rationale: '''Descendencia'' comunica bien זֶרַע en español bíblico contemporáneo y evita la literalidad ambigua de ''semilla''.'
theological_decisions:
- issue: Framing jurídico-covenantal del testimonio
  english_pob_reading: The verse is rendered with legal-witness language ('call heaven and earth to witness against you').
  chosen_spanish_reading: 'Se conserva el lenguaje forense: ''llamo hoy a los cielos y a la tierra como testigos contra ti''.'
  alternative_spanish_readings:
  - te advierto hoy por los cielos y la tierra
  - doy testimonio contra ti hoy
  rationale: El hebreo usa una fórmula de pacto con testigos invocados. La redacción española mantiene el peso jurídico-teológico sin diluirlo en una simple advertencia.
  doctrine_reference: Deuteronomio 30:19; traducción pactual y forense
- issue: Singular representativo de segunda persona
  english_pob_reading: Main text keeps singular 'you' addressed to Israel through Moses.
  chosen_spanish_reading: Se mantiene el singular ('ti', 'tú') como dirigirse representativo a Israel.
  alternative_spanish_readings:
  - ustedes
  - vosotros
  rationale: El hebreo está en segunda persona masculina singular. En español, 'ti/tú' conserva con precisión la forma original y el carácter representativo del destinatario.
  doctrine_reference: Deuteronomio 30:19; fidelidad morfosintáctica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que eliminó ''Therefore'' por no estar representado en el texto hebreo. La versión española omite también cualquier equivalente inferido y conserva solo la exhortación directa: ''Elige la vida''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma solo cuando el texto hebreo contiene יהוה; aquí no aparece, así que no se introduce.
  - Se conserva el tono solemne y forense sin recurrir a 'SEÑOR' u otras sustituciones no motivadas.
  - '''Los cielos y la tierra'' mantiene el merismo hebreo; ''la bendición y la maldición'' sigue el paralelismo del original.'
  - '''Descendencia'' se prefiere a ''semilla'' por claridad en español, sin perder el matiz genealógico del hebreo.'
