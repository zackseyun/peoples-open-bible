translation:
  language: es
  text: Azufre y sal[a], una desolación ardiente, son toda su tierra; no se siembra, no brota, y no crece en ella ninguna hierba, como la destrucción de Sodoma y Gomorra, Admá y Zeboím, que Yahvé destruyó en su ira y en su furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'azufre y sal, ardor de quemazón'. 'Azufre' es el equivalente moderno claro; el inglés tradicional usa a veces 'brimstone'.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּפְרִית
  english_pob_choice: sulfur
  chosen_spanish: azufre
  alternatives_spanish:
  - brimstone
  lexicon: HALOT
  rationale: גָּפְרִית designa el mineral/elemento sulfurado. 'Azufre' es el equivalente claro y natural en español moderno; 'brimstone' no es idiomático en español y resultaría arcaizante.
- source_word: וָמֶלַח
  english_pob_choice: and salt
  chosen_spanish: y sal
  alternatives_spanish:
  - y sal gema
  - y salitre
  lexicon: HALOT
  rationale: El sustantivo es פשוטamente 'sal'. Mantener 'sal' conserva la pareja desoladora 'azufre y sal' sin introducir especificación no respaldada por el texto.
- source_word: שְׂרֵפָה
  english_pob_choice: a burning waste
  chosen_spanish: un ardiente desolamiento
  alternatives_spanish:
  - una quemadura
  - un terreno quemado
  - un incendio
  lexicon: HALOT
  rationale: Aquí el sustantivo funciona appositivamente con la condición del terreno. 'Ardiente desolamiento' intenta preservar la idea de estado devastado por fuego sin forzar un término demasiado literal o poco natural en español.
- source_word: כָל אַרְצָהּ
  english_pob_choice: are all its land
  chosen_spanish: toda su tierra
  alternatives_spanish:
  - toda la tierra
  - todo su territorio
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'toda su tierra'. En español, 'toda su tierra' mantiene la referencia territorial y evita una construcción verbal pesada; la pluralidad del sujeto compuesto se resuelve naturalmente con 'son'.
- source_word: לֹא תִזָּרַע
  english_pob_choice: it is not sown
  chosen_spanish: no se siembra
  alternatives_spanish:
  - no será sembrada
  - no puede ser sembrada
  lexicon: HALOT
  rationale: El niphal expresa pasividad/estado de la tierra. 'No se siembra' es una pasiva refleja natural en español y conserva el carácter descriptivo del versículo.
- source_word: וְלֹא תַצְמִחַ
  english_pob_choice: it does not sprout
  chosen_spanish: no germina
  alternatives_spanish:
  - no brota
  - no produce crecimiento
  lexicon: HALOT
  rationale: El verbo causaliza la producción de brote/crecimiento. 'Germina' recoge la idea de brotar/crecer sin sonar demasiado botánico o técnico.
- source_word: וְלֹא יַעֲלֶה בָהּ כָּל עֵשֶׂב
  english_pob_choice: and no grass grows in it
  chosen_spanish: y no sube en ella ninguna hierba
  alternatives_spanish:
  - y no brota en ella ninguna hierba
  - y no crece en ella ninguna planta
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'no sube' o 'no asciende' vegetación. 'No sube en ella' conserva esa dirección verbal; 'hierba' da un equivalente común para עֵשֶׂב, sin restringir innecesariamente el sentido.
- source_word: כְּמַהְפֵּכַת
  english_pob_choice: like the overthrow of
  chosen_spanish: como la subversión de
  alternatives_spanish:
  - como la destrucción de
  - como el vuelco de
  lexicon: HALOT
  rationale: מַהְפֵּכָה procede de הפך, 'voltear/derribar'. 'Subversión' conserva el campo semántico de inversión violenta, pero en español bíblico puede sonar menos natural; se retiene aquí por el valor de 'derrocamiento/volteo' y la conexión con הָפַךְ. Si se privilegia fluidez, 'destrucción' sería una alternativa aceptable.
- source_word: סְדֹם וַעֲמֹרָה אַדְמָה וּצְבֹיִים
  english_pob_choice: Sodom and Gomorrah, Admah and Zeboiim
  chosen_spanish: Sodoma y Gomorra, de Admá y de Zeboím
  alternatives_spanish:
  - Sodoma y Gomorra, Admá y Zeboím
  - Sodoma, Gomorra, Admá y Zeboím
  lexicon: HALOT
  rationale: Son nombres propios y se transliteran según el uso bíblico en español. Se conservan 'Admá' y 'Zeboím' con acentuación adaptada a la ortografía española.
- source_word: אֲשֶׁר הָפַךְ יְהוָה
  english_pob_choice: which Yahweh overthrew
  chosen_spanish: que Yahvé subvirtió
  alternatives_spanish:
  - que Yahvé destruyó
  - que Yahvé derribó
  lexicon: HALOT
  rationale: הָפַךְ y מַהְפֵּכָה están ligados lexicalmente. 'Subvirtió' intenta preservar ese vínculo verbal con 'subversión', aunque en español corriente pueda sentirse menos habitual; por eso se mantiene la tensión lexicográfica del hebreo en vez de neutralizarla por completo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el Tetragrámaton se vierte 'Yahvé', preservando el nombre propio del pacto y evitando la sustitución por una mera designación titulada.
- source_word: בְּאַפּוֹ וּבַחֲמָתוֹ
  english_pob_choice: in his anger and in his wrath
  chosen_spanish: en su ira y en su furor
  alternatives_spanish:
  - en su enojo y en su ira
  - en su cólera y en su furia
  lexicon: HALOT
  rationale: El hebreo usa dos términos intensificadores de cólera divina. 'Ira' y 'furor' mantienen la duplicación y el crescendo semántico sin perder la gravedad del juicio.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto nombra explícitamente a YHWH. La política del proyecto pide conservar el nombre propio en lugar de una sustitución litúrgica; 'Yahvé' es la forma estándar de esta serie en español del proyecto y mantiene la visibilidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación léxica בין מַהְפֵּכָה y הָפַךְ
  english_pob_reading: overthrow / overthrew
  chosen_spanish_reading: subversión / subvirtió
  alternative_spanish_readings:
  - destrucción / destruyó
  - volteo / volteó
  rationale: El hebreo repite la raíz הפך para conectar el sustantivo y el verbo. Traducir ambos con familias distintas perdería esa cohesión; 'subversión / subvirtió' intenta conservar la relación raíz-eco, aunque con una palabra menos frecuente en español.
  doctrine_reference: Principio de correspondencia lexical en pares de raíz cognada
- issue: Imagen de esterilidad total del terreno
  english_pob_reading: it is not sown, and it does not sprout, and no grass grows in it
  chosen_spanish_reading: no se siembra, no germina, y no sube en ella ninguna hierba
  alternative_spanish_readings:
  - no será sembrada, no brota, y no crece en ella ninguna hierba
  - no se siembra, no brota, y no crece en ella ninguna planta
  rationale: La secuencia hebrea presenta una desolación completa y progresiva. La formulación elegida mantiene esa triple negación y la imagen de infertilidad sin añadir elementos ajenos al texto.
  doctrine_reference: Lectura descriptiva del juicio territorial en Deuteronomio 29
- issue: Comparación con Sodoma y ciudades vecinas
  english_pob_reading: like the overthrow of Sodom and Gomorrah, Admah and Zeboiim
  chosen_spanish_reading: como la subversión de Sodoma y Gomorra, de Admá y de Zeboím
  alternative_spanish_readings:
  - como la destrucción de Sodoma y Gomorra, de Admá y de Zeboím
  - como el derrocamiento de Sodoma y Gomorra, de Admá y de Zeboím
  rationale: La comparación remite al juicio ejemplar sobre ciudades históricas. 'Subversión' mantiene el lazo con el verbo hebreo y con la idea de un vuelco judicial total; no introduce una lectura doctrinal adicional.
  doctrine_reference: Génesis 19; Deuteronomio 29:23
translation_notes:
  revision_awareness: Se tuvo en cuenta el pase de revisión que corrigió la concordancia en inglés a un sujeto plural ('Sulfur and salt... are'). En español se resolvió con 'Azufre y sal... son', manteniendo concordancia natural. También se respetó la decisión auditada de conservar la relación léxica entre 'overthrow/overthrew' y el nombre/verbos derivados de הפך, aunque en español eso exige una solución menos común ('subversión/subvirtió').
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva la triple negación del hebreo para enfatizar la esterilidad total del territorio.
  - 'Los nombres propios bíblicos se adaptan a la ortografía española habitual: Sodoma, Gomorra, Admá, Zeboím.'
  - Se mantiene una equivalencia lo más cercana posible sin perder la conexión morfológica entre 'subversión' y 'subvirtió'.
