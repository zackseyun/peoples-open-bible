translation:
  language: es
  text: y así los hará incurrir en culpa que exige restitución[a] al comer sus cosas sagradas[b], porque yo soy Yahvé, quien los santifica[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hará cargar con culpa»; la expresión hebrea es difícil y puede enfatizar la responsabilidad por una ofensa cultual.
    reason: lexical_alternative
  - marker: b
    text: «Sus cosas sagradas» se refiere a porciones u ofrendas consagradas.
    reason: cultural_note
  - marker: c
    text: O «quien los hace santos» o «quien los consagra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשִּׂיאוּ
  english_pob_choice: and so cause
  chosen_spanish: y así los hará incurrir
  alternatives_spanish:
  - y así los hará
  - y les acarreará
  lexicon: HALOT
  rationale: El verbo causativo en hebreo expresa que algo se hace recaer sobre ellos o los coloca en una situación de responsabilidad. En español, «hacer incurrir» comunica bien la idea de provocar culpa o responsabilidad sin perder el matiz causativo.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  - a ellos
  lexicon: HALOT
  rationale: El objeto directo retoma a las personas en vista en el contexto. «Los» conserva la referencia directa y la fuerza sintáctica del pronombre.
- source_word: עֲוֺן אַשְׁמָה
  english_pob_choice: guilt requiring restitution
  chosen_spanish: culpa que exige restitución
  alternatives_spanish:
  - culpa de ofensa
  - culpa de transgresión
  lexicon: HALOT
  rationale: La combinación hebrea es cultual y legal, y no conviene reducirla a un simple «culpa». «Que exige restitución» hace visible la carga de responsabilidad reparadora que el inglés POB quiso preservar.
- source_word: בְּאָכְלָם
  english_pob_choice: by eating
  chosen_spanish: al comer
  alternatives_spanish:
  - por comer
  - cuando comen
  lexicon: HALOT
  rationale: La construcción con ב y el infinitivo indica circunstancia o medio. En español, «al comer» expresa naturalmente ese valor circunstancial.
- source_word: קָדְשֵׁיהֶם
  english_pob_choice: their holy things
  chosen_spanish: sus cosas sagradas
  alternatives_spanish:
  - sus cosas santas
  - sus ofrendas sagradas
  lexicon: HALOT
  rationale: «Cosas sagradas» mantiene una cercanía al hebreo sin perder comprensibilidad. Evita imponer una interpretación demasiado específica donde el contexto cultual admite varias concreciones.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal según la convención del proyecto en español, en lugar de sustituirlo por un título.
- source_word: מְקַדְּשָׁם
  english_pob_choice: who sanctifies them
  chosen_spanish: quien los santifica
  alternatives_spanish:
  - quien los hace santos
  - quien los consagra
  lexicon: HALOT
  rationale: «Santifica» preserva el registro cultual y teológico del participio piel de קדשׁ. El pronombre «los» mantiene la posible referencia a las personas implicadas, sin resolverla artificialmente.
theological_decisions:
- issue: Referente del pronombre final en «quien los santifica»
  english_pob_reading: the LORD sanctifies the priests/Israelites in view, not the holy things themselves
  chosen_spanish_reading: Yahvé santifica a las personas en vista, no las cosas sagradas mismas
  alternative_spanish_readings:
  - Yahvé santifica las cosas sagradas
  - Yahvé las santifica, refiriéndose a las ofrendas
  rationale: La forma pronominal hebrea permite más de una referencia posible en el flujo del pasaje. La traducción principal conserva esa tensión sin imponer una resolución que no está forzada por la sintaxis.
  doctrine_reference: Preservar la tensión interpretativa del texto
- issue: Naturaleza de la culpa en la fórmula cultual
  english_pob_reading: guilt requiring restitution
  chosen_spanish_reading: culpa que exige restitución
  alternative_spanish_readings:
  - culpa de ofensa
  - culpa que acarrea reparación
  rationale: La expresión combina carga moral y responsabilidad reparadora. La versión española evita diluirla en un término meramente abstracto y conserva la dimensión legal-cultual.
  doctrine_reference: Levítico 22:16; relación con culpa y reparación cultual
translation_notes:
  revision_awareness: Se siguió el último pase sin cambios sustanciales; se corrigió la presentación española para anclar explícitamente las notas al texto mediante marcas [a], [b] y [c], y se mantuvo la decisión auditada de preservar la ambigüedad del referente final.
  spanish_consistency_notes:
  - Se emplea «Yahvé» conforme al estándar del proyecto para el Tetragrama.
  - Se usa «santifica» para conservar el registro cultual de קדשׁ.
  - Se evita sustituir la culpa cultual por un lenguaje moral genérico que borre la dimensión reparadora.
  - Las notas están ancladas exactamente en el texto y usan marcadores únicos.
