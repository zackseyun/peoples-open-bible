base_translation:
  language: en
  yaml_path: translation/ot/2_kings/010/001.yaml
  text: Now Ahab had seventy sons in Samaria[a]. And Jehu wrote letters and sent them to Samaria, to the rulers of Jezreel, the elders, and the guardians of Ahab's sons, saying[b],
  footnotes:
  - marker: a
    text: 'Hebrew: ''to the officials of Jezreel.'' Since the letters are said to be sent to Samaria, some understand this as referring to Jezreel-associated officials residing there, while some ancient versions and interpreters favor ''officials of Samaria.'' The main text preserves the Masoretic wording.'
    reason: textual_variant
  - marker: b
    text: Or 'foster fathers' or 'caretakers' for 'guardians.' The Hebrew refers to those responsible for rearing or overseeing Ahab's sons.
    reason: lexical_alternative
