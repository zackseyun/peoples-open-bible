translation:
  language: es
  text: 'Y todos hablaban bien de él[a] y se maravillaban de las palabras de gracia[b] que salían de su boca, y decían: «¿No es este el hijo de José?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atestiguaban acerca de él». El verbo griego puede indicar tanto hablar favorablemente de alguien como dar testimonio acerca de él; aquí el sentido favorable encaja mejor con «se maravillaban».
    reason: lexical_alternative
  - marker: b
    text: O «palabras de gracia»; es decir, palabras caracterizadas por gracia, favor o atracción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρουν αὐτῷ
  english_pob_choice: were speaking well of him
  chosen_spanish: hablaban bien de él
  alternatives_spanish:
  - daban testimonio de él
  - atestiguaban acerca de él
  lexicon: BDAG
  rationale: El verbo puede expresar tanto testimonio como habla favorable. En este contexto, junto con «se maravillaban», la idea de aprobación pública es la más natural; «hablaban bien de él» comunica esa valoración sin introducir un tono jurídico ajeno al pasaje.
- source_word: ἐθαύμαζον
  english_pob_choice: were marveling
  chosen_spanish: se maravillaban
  alternatives_spanish:
  - se asombraban
  - se admiraban
  lexicon: BDAG
  rationale: El imperfecto sugiere una reacción continua. «Se maravillaban» conserva el matiz de asombro admirativo y mantiene la fuerza del verbo sin reducirlo a simple sorpresa.
- source_word: ἐπὶ τοῖς λόγοις
  english_pob_choice: at the ... words
  chosen_spanish: de las palabras
  alternatives_spanish:
  - por las palabras
  - a causa de las palabras
  lexicon: BDAG
  rationale: La preposición marca la base u ocasión del asombro. En español, «se maravillaban de» expresa bien esa reacción respecto de las palabras.
- source_word: τῆς χάριτος
  english_pob_choice: gracious
  chosen_spanish: de gracia
  alternatives_spanish:
  - graciosas
  - llenas de gracia
  - graciosas y favorables
  lexicon: BDAG
  rationale: El genitivo puede leerse cualitativamente como palabras caracterizadas por gracia/favor. Aquí se preserva la expresión más cercana al griego, «palabras de gracia», porque la formulación es breve y deja abierta la amplitud semántica sin forzar una sola paráfrasis.
- source_word: τοῖς ἐκπορευομένοις ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: coming from his mouth
  chosen_spanish: que salían de su boca
  alternatives_spanish:
  - que procedían de su boca
  - que brotaban de su boca
  lexicon: BDAG
  rationale: La frase participial subraya el origen concreto de las palabras. «Salían de su boca» es natural en español y conserva la imagen física del texto.
- source_word: Οὐχὶ
  english_pob_choice: Is this not
  chosen_spanish: ¿No es este
  alternatives_spanish:
  - ¿Acaso no es este?
  - ¿No será este?
  lexicon: BDAG
  rationale: La partícula introduce una pregunta con expectativa de respuesta afirmativa. «¿No es este…?» mantiene esa fuerza retórica de manera clara y idiomática.
- source_word: υἱός ἐστιν Ἰωσὴφ οὗτος
  english_pob_choice: Joseph’s son
  chosen_spanish: el hijo de José
  alternatives_spanish:
  - el hijo de José este
  - el hijo de José, ¿no?
  lexicon: BDAG
  rationale: La construcción griega expresa la identificación que hace la multitud. «El hijo de José» es la forma más natural y fiel en español; conserva la tensión del relato sin añadir aclaraciones doctrinales al discurso de los oyentes.
theological_decisions:
- issue: Referencia a Jesús como hijo de José frente a la concepción virginal
  english_pob_reading: Render the crowd's statement straightforwardly as 'Joseph’s son' without qualification.
  chosen_spanish_reading: Traducir la afirmación de la multitud de manera directa como «el hijo de José», sin suavizarla ni corregirla dentro del versículo.
  alternative_spanish_readings:
  - «el supuesto hijo de José»
  - «el hijo de José, según ellos»
  - «¿No es este el hijo adoptivo de José?»
  rationale: El versículo reporta la percepción de la gente, no una corrección narratorial. Mantener la frase sin explicaciones preserva la tensión teológica e histórica del pasaje, tal como hace el texto fuente y el audit trail en inglés.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del audit trail inglés y no se detectaron cambios posteriores que afectaran el contenido base; por eso se mantiene una redacción ajustada al griego y al sentido contextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando el texto lo requiera, aunque este versículo no la contiene.
  - Se usa «se maravillaban» para conservar el imperfecto iterativo y la reacción continua.
  - Se eligió «palabras de gracia» en el texto con nota para preservar la ambigüedad lexical entre gracia, favor y cualidad atractiva.
  - La frase final conserva la tensión del testimonio de la multitud sin explicaciones doctrinales añadidas.
