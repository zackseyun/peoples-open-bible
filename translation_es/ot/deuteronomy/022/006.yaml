  text: כִּ֣י יִקָּרֵ֣א קַן צִפּ֣וֹר לְ/פָנֶ֡י/ךָ בַּ/דֶּ֜רֶךְ בְּ/כָל עֵ֣ץ א֣וֹ עַל הָ/אָ֗רֶץ אֶפְרֹחִים֙ א֣וֹ בֵיצִ֔ים וְ/הָ/אֵ֤ם רֹבֶ֨צֶת֙ עַל הָֽ/אֶפְרֹחִ֔ים א֖וֹ עַל הַ/בֵּיצִ֑ים לֹא תִקַּ֥ח הָ/אֵ֖ם עַל הַ/בָּנִֽים־׀־׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/022/006.yaml
  text: If a bird’s nest happens to be before you on the way[a], in any tree or on the ground, with young ones or eggs, and the mother is sitting on the young ones or on the eggs[b], you shall not take the mother along with the young.
  footnotes:
  - marker: a
    text: Or 'When a bird’s nest is encountered before you.' The Hebrew verb suggests a chance finding rather than a deliberate search.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the mother upon the young.' The idiom means taking the mother together with her offspring.
    reason: lexical_alternative
