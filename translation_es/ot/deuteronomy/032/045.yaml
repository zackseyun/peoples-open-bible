  lexicon: HALOT
  rationale: כלה expresa completar o llevar algo a su fin. «Terminó» es natural en español y conserva la idea de cerrar la acción de hablar.
- source_word: לְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - hablando
  - para hablar
  lexicon: HALOT
  rationale: La construcción con כלה pide en español una frase verbal que indique el acto concluido. «De hablar» reproduce de modo idiomático el infinitivo dependiente.
- source_word: אֶת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
