review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general: «Estos cuatro», «nacieron», «en Gat», «cayeron», y la preservación de הָרָפָה como «Rapha» concuerda con el rastro POB y mantiene la ambigüedad. Sin embargo, el uso de «para el Rapha» no refleja bien el valor genealógico de לְהָרָפָה en español natural; suena final o direccional, no de descendencia. También hay un problema de notas: la nota [a] está anclada a «Estos cuatro» pero trata de Rapha, no de esa expresión.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «nacieron para el Rapha» resulta poco idiomático y puede confundir al lector. «Le nacieron al Rapha» sería más natural en español, pero cambia la perspectiva; la opción más fiel y legible es «nacieron del Rapha», que comunica descendencia sin cerrar la ambigüedad más de lo debido. Además, conviene eliminar la nota redundante y reubicar la nota alternativa en «Rapha».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Siervos» para עֲבָדָיו es defendible aquí por seguir el inglés POB y el valor de servicio. «Rapha» preserva correctamente la decisión auditada. «Gat» es una forma española aceptable para Gath.
  issues:
  - severity: high
    issue: «para el Rapha» es una traducción poco fiel y poco natural de לְהָרָפָה
    rationale: En este contexto genealógico, «para» en español no comunica descendencia; sugiere finalidad o destinatario. El hebreo expresa que estos cuatro provenían del linaje asociado con Rapha. «del Rapha» o una formulación equivalente transmite mejor ese sentido.
  - severity: medium
    issue: La nota [a] está mal anclada
    rationale: El marcador [a] aparece en «Estos cuatro», pero el contenido de la nota explica «Rapha» y sus alternativas, no la expresión numeral-demostrativa. Esto rompe la correspondencia exigida entre texto y nota.
  - severity: low
    issue: Las dos notas son parcialmente redundantes
    rationale: La nota de alternativa y la nota teológica repiten la misma explicación básica sobre la ambigüedad de «Rapha». Puede consolidarse en una sola nota clara anclada al término relevante.
  revised_spanish_text: Estos cuatro nacieron del Rapha[a] en Gat, y cayeron por mano de David y por mano de sus siervos.
  revised_footnotes:
  - marker: a
    text: 'O «de Rapha», «del gigante» o «de los refaítas». El hebreo probablemente alude a la descendencia de la línea de gigantes asociada con Gat. Se conserva «Rapha» en el texto principal para mantener la ambigüedad del hebreo: puede entenderse como nombre propio, como título o como referencia al linaje de los refaítas.'
    reason: alternative_reading
  revision_rationale: Se reemplaza «para el Rapha» por «del Rapha» para expresar descendencia de manera fiel y natural en español. Se mueve la nota al término relevante y se fusionan las dos notas existentes para evitar redundancia y cumplir con el anclaje correcto de marcadores.
