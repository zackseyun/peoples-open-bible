  yaml_path: translation/ot/deuteronomy/033/025.yaml
  text: Your bars shall be iron and bronze[a], and as your days[b], so shall your strength be.
  footnotes:
  - marker: a
    text: Or 'Your sandals/shoes shall be iron and bronze.' The Hebrew noun can refer to footwear, though many understand it here as bars or bolts in view of the metal imagery and the context of security.
    reason: lexical_alternative
  - marker: b
    text: Or 'so shall your rest/security be.' The final Hebrew term is rare and uncertain; 'strength' is a traditional rendering that fits the blessing context.
    reason: lexical_alternative
