    issue: Las notas al pie no siguen fielmente el rastro inglés ni están bien ancladas.
    rationale: La nota [a] aparece en «nobles», pero el expediente inglés coloca la nota en el sintagma de μυστήριον/βουλή; además el texto de la nota [a] dice «O “nobles”», lo cual no aporta una alternativa real a «nobles». La nota sobre la dificultad de «κακία τῆς γῆς» falta como tal y debe preservarse.
  - severity: medium
