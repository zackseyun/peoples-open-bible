translation:
  language: es
  text: Estará sobre Aarón cuando ministre[a], y se oirá su sonido cuando entre al Lugar Santo delante de Yahvé y cuando salga[c][b], para que no muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y se oirá el sonido de ella»; el sufijo hebreo probablemente se refiere al vestido con sus campanillas.'
    reason: lexical_alternative
  - marker: b
    text: O «al santuario»; aquí «el Lugar Santo» se refiere al espacio sagrado del tabernáculo delante de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O «no sea que muera».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: It shall be
  chosen_spanish: Estará
  alternatives_spanish:
  - Será
  - Ha de estar
  lexicon: HALOT
  rationale: En este contexto normativo-ritual, el imperfecto hebreo con וְ expresa disposición prescrita; «estará» conserva ese valor directivo sin volver la frase torpe en español.
- source_word: עַל אַהֲרֹן
  english_pob_choice: on Aaron
  chosen_spanish: sobre Aarón
  alternatives_spanish:
  - en Aarón
  - sobre él
  lexicon: HALOT
  rationale: La imagen concreta del vestido colocado sobre Aarón se expresa mejor con «sobre»; mantiene la relación física del manto con el sacerdote.
- source_word: לְשָׁרֵת
  english_pob_choice: when he ministers
  chosen_spanish: cuando ministre
  alternatives_spanish:
  - para ministrar
  - cuando sirva
  lexicon: HALOT
  rationale: El infinitivo de propósito/circunstancia se vierte de modo temporal y funcional. «Ministre» respeta el contexto sacerdotal sin cambiar a un término más general que borre la función cultual.
- source_word: וְנִשְׁמַע קֹלוֹ
  english_pob_choice: and its sound shall be heard
  chosen_spanish: y se oirá su sonido
  alternatives_spanish:
  - y se oirá el sonido de él
  - y se oirá su voz
  lexicon: HALOT
  rationale: La referencia del sufijo apunta al vestido con sus campanillas, no a la voz de Aarón. «Su sonido» deja esa relación implícita y es natural en español; en notas se preserva la alternativa más formal.
- source_word: בְּבֹאוֹ
  english_pob_choice: when he goes
  chosen_spanish: cuando entre
  alternatives_spanish:
  - al entrar
  - cuando vaya
  lexicon: HALOT
  rationale: Aunque el inglés POB mantuvo un verbo más general, el complemento inmediato «al Lugar Santo» muestra que el movimiento es de ingreso. En español, «entre» expresa mejor esa dirección sin añadir contenido.
- source_word: אֶל הַקֹּדֶשׁ
  english_pob_choice: into the Holy Place
  chosen_spanish: en el Lugar Santo
  alternatives_spanish:
  - al Lugar Santo
  - en el santuario
  lexicon: HALOT
  rationale: «Lugar Santo» conserva la especificidad cultual del tabernáculo. Se evitó «santuario» como opción más amplia; con «en» se expresa el recinto donde ya se encuentra al entrar.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el nombre divino. «Delante de» reproduce la fórmula de comparecencia ritual y mantiene el matiz presencial.
- source_word: וּבְצֵאתוֹ
  english_pob_choice: and when he comes out
  chosen_spanish: y cuando salga
  alternatives_spanish:
  - y al salir
  - y cuando salga de allí
  lexicon: HALOT
  rationale: Se conserva el paralelismo temporal con «cuando entre». «Salir» es la forma española más natural para el contraste entrada/salida en el recinto sagrado.
- source_word: וְלֹא יָמוּת
  english_pob_choice: so that he may not die
  chosen_spanish: para que no muera
  alternatives_spanish:
  - a fin de que no muera
  - para no morir
  lexicon: HALOT
  rationale: El hebreo expresa resultado prevenido; «para que no muera» comunica ese sentido de finalidad/protección en un español claro y formal. Se preserva la tensión ritual de muerte evitada sin suavizarla.
theological_decisions:
- issue: Referente del sonido audible
  english_pob_reading: The sound is that of the robe's bells, not Aaron's voice or person generally.
  chosen_spanish_reading: El sonido es el del vestido con sus campanillas, no la voz de Aarón ni una mera referencia general a su presencia.
  alternative_spanish_readings:
  - El sonido de él se refiere de forma más general a Aarón.
  - El sonido es simplemente el ruido de su movimiento.
  rationale: El contexto inmediato de los vv. 33–34 describe campanillas en el borde del manto; por eso el pronombre se entiende mejor como referente del vestido. La redacción española evita borrar ese vínculo y mantiene la lógica ritual de advertencia audible.
  doctrine_reference: Ex 28:33–35; continuidad contextual del texto masorético
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue el estándar del proyecto para יהוה. «Yahvé» es la forma designada en español, evitando la sustitución por una máscara litúrgica y manteniendo la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: La traducción sigue de cerca el análisis del POB en inglés y coincide con su revisión más reciente sin cambios sustanciales; se mantiene la lectura cultual del pasaje, el referente del sonido como las campanillas del manto y la terminología de Yahvé para el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se usa «Lugar Santo» para הַקֹּדֶשׁ en coherencia con el contexto tabernacular.
  - Se mantiene «ministere/ministre» como verbo cultual y no se sustituye por «servir» para evitar perder la función sacerdotal específica.
  - Se conserva el paralelismo «cuando entre / cuando salga» para reflejar la estructura hebrea de entrada y salida.
  - La nota sobre «su sonido» preserva la ambigüedad controlada del hebreo sin oscurecer el referente principal.
