id: JOB.17.5
reference: Job 17:5
source:
  edition: WLC
  text: לְ֭/חֵלֶק יַגִּ֣יד רֵעִ֑ים וְ/עֵינֵ֖י בָנָ֣י/ו תִּכְלֶֽנָה׃
translation:
  text: He denounces friends for a share[a], and the eyes of his children will fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a portion,' 'for gain,' or, according to another interpretation, 'as flattery.' The Hebrew phrase is difficult, but the sense is of treating friends for personal advantage.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְחֵלֶק
  chosen: for a share of the spoil
  alternatives:
  - for a portion
  - for gain
  - for flattery
  lexicon: HALOT
  rationale: חֵלֶק commonly means 'share, portion.' In this difficult context, the phrase likely denotes acting for personal profit or a share in plunder/spoil. 'For a share of the spoil' makes the mercenary sense explicit while staying close to the noun's core meaning. Because the verse is notoriously obscure, more general alternatives are preserved in a footnote.
- source_word: יַגִּיד
  chosen: informs against
  alternatives:
  - tells
  - betrays
  - accuses
  lexicon: HALOT
  rationale: The Hiphil of נגד means 'declare, tell, make known.' In context with 'friends' and the mercenary phrase לְחֵלֶק, the sense is not neutral reporting but exposing or betraying them. 'Informs against' preserves the denunciatory force without overcommitting to a narrower legal setting.
- source_word: רֵעִים
  chosen: friends
  alternatives:
  - companions
  - associates
  lexicon: HALOT
  rationale: רֵעִים ordinarily means 'friends' or 'companions.' 'Friends' best conveys the relational betrayal implied by the verse.
- source_word: וְעֵינֵי בָנָיו
  chosen: the eyes of his children
  alternatives:
  - his sons' eyes
  lexicon: HALOT
  rationale: בנים can mean 'sons' specifically or 'children' more broadly. In English, 'children' is natural and does not materially alter the sense here. The construct phrase is rendered straightforwardly.
- source_word: תִּכְלֶנָה
  chosen: will fail
  alternatives:
  - will waste away
  - will grow dim
  - will pine away
  lexicon: HALOT
  rationale: כלה in this form can denote coming to an end, wasting away, or failing. With 'eyes' as subject, 'will fail' is idiomatic English and preserves the image of eyes wasting away or growing dim from deprivation or judgment.
