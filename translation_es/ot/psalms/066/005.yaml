translation:
  language: es
  text: Vengan y vean las obras de Dios; él es sobrecogedor en sus hechos hacia los hijos del hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «hacia la humanidad». Hebreo: «hacia los hijos del hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan aquí
  - Acérquense
  lexicon: HALOT
  rationale: El imperativo plural de הלך funciona aquí como invitación. En español, «Vengan» expresa de forma natural la convocatoria a acercarse y observar.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y observen
  lexicon: HALOT
  rationale: El imperativo plural de ראה se mantiene con un verbo claro y directo. «Vean» conserva la invitación a constatar con los ojos las obras de Dios.
- source_word: מִפְעֲלוֹת
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  lexicon: HALOT
  rationale: El plural se refiere a lo que Dios ha hecho. «Obras» es la opción más natural y fiel en español para este sustantivo colectivo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El referente es claramente el Dios de Israel; por eso se traduce simplemente «Dios».
- source_word: נוֹרָא
  english_pob_choice: awesome
  chosen_spanish: es impresionante
  alternatives_spanish:
  - es temible
  - es sobrecogedor
  - inspirar temor reverente
  lexicon: HALOT
  rationale: El término expresa la cualidad de causar asombro reverente. «Impresionante» comunica ese efecto en un español contemporáneo digno, sin sonar coloquial.
- source_word: עֲלִילָה
  english_pob_choice: deeds
  chosen_spanish: hechos
  alternatives_spanish:
  - obras
  - acciones
  - hazañas
  lexicon: HALOT
  rationale: Este sustantivo singular/abstracto describe la actividad de Dios. «Hechos» conserva el sentido de acciones concretas y evita duplicar exactamente «obras» del primer miembro.
- source_word: עַל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - sobre
  - contra
  - entre
  lexicon: HALOT
  rationale: La preposición indica dirección u orientación respecto de la humanidad. «Hacia» es suficientemente amplio y no impone una carga favorable o adversa.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the children of man
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - la humanidad
  - los seres humanos
  - los hijos del hombre
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente masculina y representativa. Se conserva esa forma en el texto principal para mantener la huella lexical; una alternativa más inclusiva podría explicarse en nota, pero aquí se prioriza la cercanía formal al hebreo.
theological_decisions:
- issue: Expresión genérica masculina en בְּנֵי אָדָם
  english_pob_reading: the children of man
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: El hebreo usa una fórmula convencional para referirse a la humanidad. La versión principal conserva la estructura masculina representativa, siguiendo la política de no aplanar automáticamente el matiz del original; el sentido inclusivo queda implícito en el uso idiomático de la expresión.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que pasó de «sons of man» a «children of man» por naturalidad, pero en español se optó por mantener una fórmula más cercana al hebreo («los hijos de los hombres») para conservar la correspondencia lexical y la representación masculina genérica documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó «Dios» sin máscara litúrgica, conforme al estándar del proyecto para אֱלֹהִים.
  - Se mantuvo la pareja verbal imperativa «Vengan y vean» como invitación natural y fiel.
  - «Hechos» evita repetir «obras» en ambos cola y refleja la distinción lexical del hebreo.
  - La expresión final conserva el plural representativo masculino del hebreo, coherente con la política de traducción documentada.
