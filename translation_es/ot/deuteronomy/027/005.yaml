revisions:
- from: Y edificarás allí un altar para Yahvé tu Dios[a], un altar de piedras; no alzarás hierro sobre ellas.
  to: Y edificarás allí un altar para Yahvé tu Dios, un altar de piedras; no usarás hierro sobre ellas[a].
  rationale: Se reemplaza 'no alzarás hierro' por 'no usarás hierro' para expresar de manera natural y fiel el sentido contextual de la prohibición, manteniendo el sustantivo literal 'hierro' y preservando en nota la opción más explícita 'instrumento de hierro'. También se mueve el marcador de nota al segmento pertinente.
