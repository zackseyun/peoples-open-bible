  to: Y el segundo coro de acción de gracias[a] iba hacia la izquierda, y yo iba detrás de él, con la mitad del pueblo sobre la muralla, desde por encima de la Torre de los Hornos hasta el Muro Ancho.
  rationale: Se ajusta «muro» a «muralla» para mayor precisión contextual, se restituye mejor el sentido espacial de מֵעַל en el inicio del trayecto con «desde por encima de la Torre de los Hornos», y se corrige la nota al pie para que preserve alternativas reales sin duplicar innecesariamente la lectura principal.
