translation:
  language: es
  text: El sonido del clamor de los pastores, y el lamento de los líderes del rebaño[a][b], porque Yahvé está devastando sus pastos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los poderosos del rebaño' o 'los nobles del rebaño'.
    reason: lexical_alternative
  - marker: b
    text: La imagen de pastor/rebaño probablemente alude en sentido metafórico a gobernantes y a quienes están bajo su cuidado.
    reason: cultural_note
lexical_decisions:
- source_word: ק֚וֹל
  english_pob_choice: The sound of
  chosen_spanish: El sonido de
  alternatives_spanish:
  - La voz de
  - Un sonido de
  lexicon: HALOT
  rationale: קול puede significar sonido, voz o ruido. Aquí introduce lo audible que sigue ('clamor' y 'lamento'), por lo que 'El sonido de' preserva la referencia sensorial sin forzar 'voz'.
- source_word: צַעֲקַ֣ת
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - el alarido
  lexicon: HALOT
  rationale: צעק denota un grito o clamor de angustia. 'Clamor' comunica bien el tono de aflicción y funciona en paralelo con 'lamento'.
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los pastores de ovejas
  - los ganaderos
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'pastores'. Se conserva en español para mantener la metáfora profética, sin reinterpretarla en el cuerpo del texto.
- source_word: וִילְלַת
  english_pob_choice: and the wailing
  chosen_spanish: y el lamento
  alternatives_spanish:
  - y el aullido
  - y el gemido
  lexicon: HALOT
  rationale: ילל expresa lamentación intensa, incluso aullido. 'Lamento' es natural en español bíblico contemporáneo y conserva el sentido de duelo audible.
- source_word: אַדִּירֵי הַצֹּאן
  english_pob_choice: the leaders of the flock
  chosen_spanish: los líderes del rebaño
  alternatives_spanish:
  - los poderosos del rebaño
  - los nobles del rebaño
  lexicon: HALOT
  rationale: אַדִּירִים puede ser 'poderosos', 'nobles' o 'líderes'. En este contexto de metáfora pastoril, 'líderes del rebaño' comunica función y rango sin abandonar la imagen del rebaño.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del clamor. 'Porque' es la forma más clara y natural en español para esta relación explicativa/causal.
- source_word: שֹׁדֵד
  english_pob_choice: is devastating
  chosen_spanish: está devastando
  alternatives_spanish:
  - está arrasando
  - está asolando
  - está saqueando
  lexicon: HALOT
  rationale: El participio de שׁדד expresa ruina violenta o asolamiento. 'Está devastando' conserva el aspecto durativo y la fuerza del verbo sin sobreinterpretarlo como saqueo militar בלבד.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como 'Yahvé', de acuerdo con la convención del proyecto y con el valor del Tetragrámaton en el hebreo original.
- source_word: מַרְעִיתָם
  english_pob_choice: their pasture
  chosen_spanish: su pastura
  alternatives_spanish:
  - su pasto
  - su pastizal
  - su lugar de pastoreo
  lexicon: HALOT
  rationale: מַרְעִית significa pastura o lugar de pastoreo. 'Pastura' conserva la imagen pastoril y permite una lectura más fluida en español que 'pasto' o una paráfrasis explicativa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre propio divino en español, sin sustituirlo por un título litúrgico, para mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metáfora de pastores y rebaño
  english_pob_reading: Preserve the metaphor in the main text ('shepherds,' 'leaders of the flock,' 'pasture')
  chosen_spanish_reading: Preservar la metáfora ('pastores', 'líderes del rebaño', 'pastura')
  alternative_spanish_readings:
  - Interpretar como 'gobernantes' y 'pueblo'
  - Explicitar 'jefes' y 'territorio'
  rationale: Jeremías emplea con frecuencia el lenguaje pastoril para líderes y pueblo, pero aquí el hebreo funciona plenamente como metáfora. Mantenerla evita imponer una glosa interpretativa en el texto principal.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios, con alta concordancia entre el texto base y la verificación posterior; por tanto, este borrador sigue de cerca la lectura auditada y no introduce enmiendas textuales.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con la terminología del proyecto para יְהוָה.
  - Se preservó la metáfora pastoril en el cuerpo del texto, y la nota aclara su probable alcance figurado.
  - '''Pastura'' se eligió para מַרְעִית por su naturalidad en español y su fidelidad a la imagen de pastoreo.'
  - El paralelismo entre 'clamor' y 'lamento' busca reflejar dos lamentos audibles distintos, sin suavizar la intensidad del hebreo.
