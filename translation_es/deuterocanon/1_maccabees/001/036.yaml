translation:
  language: es
  text: Y llegó a ser una emboscada para el santuario[a], y un adversario perverso contra Israel continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un calumniador perverso». El griego διάβολος puede significar «calumniador» o «adversario»; aquí el sentido hostil del contexto favorece «adversario».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se convirtió
  - pasó a ser
  lexicon: BDAG
  rationale: El aoristo medio de γίνομαι expresa un resultado o estado alcanzado. «Llegó a ser» conserva ese proceso/resultante sin sonar rígido en español.
- source_word: εἰς ἔνεδρον
  english_pob_choice: an ambush
  chosen_spanish: una emboscada
  alternatives_spanish:
  - un acecho
  - una trampa
  lexicon: LSJ
  rationale: ἔνεδρον designa una emboscada o lugar de espera hostil. «Emboscada» es natural en español y mantiene la imagen militar dirigida contra el santuario.
- source_word: τῷ ἁγιάσματι
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el santuario del templo
  lexicon: LSJ
  rationale: En este contexto del templo de Jerusalén, «santuario» es la forma más directa y fiel, sin añadir especificaciones que el griego no exige.
- source_word: εἰς διάβολον πονηρόν
  english_pob_choice: a wicked adversary
  chosen_spanish: un adversario perverso
  alternatives_spanish:
  - un malicioso acusador
  - un enemigo perverso
  - un diablo perverso
  lexicon: BDAG
  rationale: διάβολος aquí funciona como sustantivo común con sentido de adversario/acusador, no como título propio. «Adversario» preserva el valor hostil; «perverso» refleja πονηρόν con registro digno y formal.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: against Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - contra Israel
  - a Israel
  lexicon: BDAG
  rationale: El griego presenta una relación hostil hacia Israel. En español, «para Israel» puede sonar menos explícitamente adversativo; por eso se prefiere una construcción clara en el texto principal si el ritmo lo permite, manteniendo la dirección hostil del contexto.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: La frase indica continuidad duradera. «Continuamente» conserva esa duración con naturalidad en español.
theological_decisions:
- issue: Renderización de διάβολος como término común y no como nombre propio o figura diabólica
  english_pob_reading: 'common noun: ''adversary'''
  chosen_spanish_reading: adversario
  alternative_spanish_readings:
  - diablo
  - acusador
  - enemigo
  rationale: En este pasaje histórico, el contexto militar y político describe una función hostil del poder ocupante respecto de Israel. Traducirlo como «diablo» introduciría una lectura personal/sobrenatural no exigida por el texto. «Adversario» mantiene la tensión lexical sin resolverla indebidamente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La base inglesa pasó de «evil adversary» a «wicked adversary» para reflejar πονηρόν con mayor naturalidad formal. La versión española sigue esa revisión con «adversario perverso», manteniendo el valor hostil de διάβολος sin convertirlo en nombre propio.
  spanish_consistency_notes:
  - Se usa «santuario» para τῷ ἁγιάσματι, coherente con el contexto del templo.
  - Se evita «Diablo» porque el griego no exige un nombre propio aquí.
  - «Perverso» conserva el matiz moral de πονηρόν sin exagerar el tono.
  - La frase final «continuamente» reproduce la duración de διὰ παντός con español idiomático.
