translation:
  language: es
  text: Entonces la gloria de Yahvé salió de encima del umbral de la casa y se detuvo sobre los querubines[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el templo». El hebreo dice: «la casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió fuera
  lexicon: HALOT
  rationale: יצא en forma narrativa expresa movimiento hacia afuera. «Salió» comunica ese desplazamiento de manera natural en español y mantiene la imagen concreta sin añadir interpretación.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvéh
  - la gloria del SEÑOR
  lexicon: HALOT
  rationale: כָּבוֹד se refiere a la gloria/presencia manifiesta de Dios. Se conserva «gloria» y el nombre divino «Yahvé» conforme al criterio del proyecto, evitando la sustitución litúrgica por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como transliteración del nombre divino. «Yahvé» es la forma establecida en el proyecto para preservar el nombre personal de Dios.
- source_word: מֵעַל
  english_pob_choice: from above
  chosen_spanish: de sobre
  alternatives_spanish:
  - desde arriba
  - desde sobre
  lexicon: HALOT
  rationale: La preposición indica alejamiento de una posición encima de algo. «De sobre» reproduce la relación espacial del hebreo con suficiente naturalidad; «desde arriba» sería más idiomático pero menos preciso en el matiz de posición sobre un objeto.
- source_word: מִפְתַּן
  english_pob_choice: threshold
  chosen_spanish: umbral
  alternatives_spanish:
  - escalón
  - entrada
  lexicon: HALOT
  rationale: מִפְתָּן designa el umbral o pieza de entrada. «Umbral» es la equivalencia más precisa y digna en español.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa». Se mantiene ese término, como hace el POB inglés, para no sustituir el texto por una interpretación explicativa.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso
  alternatives_spanish:
  - estuvo
  - se quedó
  lexicon: HALOT
  rationale: עמד expresa ponerse o mantenerse en pie. En español, «se puso» comunica el cambio de posición y la acción visual de la visión; «estuvo» sería más estático y menos vívido.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - upon
  lexicon: HALOT
  rationale: En el contexto espacial de la visión, «sobre» reproduce adecuadamente la relación de posición superior entre la gloria y los querubines.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines alados
  - los querubines celestiales
  lexicon: HALOT
  rationale: Se conserva el término técnico «querubines», ya asentado en español bíblico, sin añadir adjetivos no presentes en el hebreo.
theological_decisions:
- issue: Forma de traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios, no un título. «Yahvé» preserva esa decisión del POB y evita la sustitución por «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: ¿Traducir הַבָּיִת como «la casa» o interpretarlo como «el templo»?
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Aunque el referente es el templo, el hebreo emplea «la casa». Se conserva esa forma concreta para respetar la auditable proximidad al original.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el pasaje permanece estable y con alta concordancia de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en coherencia con el estándar del proyecto.
  - Se conserva la equivalencia concreta de «la casa» en lugar de «el templo», siguiendo el auditorio del texto hebreo.
  - «Querubines» se usa como término técnico estable en plural, sin modernizaciones innecesarias.
