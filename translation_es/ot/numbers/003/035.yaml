translation:
  language: es
  text: Y el jefe[a] de la casa paterna[b] de los clanes de Merari era Zuriel hijo de Abihail. Debían acampar en el lado norte del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'líder' o 'príncipe' para נָשִׂיא; aquí se prefiere 'jefe' en este contexto organizativo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'casa paterna', un término de parentesco para una unidad doméstica o de clan.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/נְשִׂיא
  english_pob_choice: And the chief
  chosen_spanish: Y el jefe
  alternatives_spanish:
  - Y el líder
  - Y el príncipe
  lexicon: HALOT
  rationale: נָשִׂיא puede expresar líder, jefe o príncipe. En este contexto administrativo de organización del campamento, 'jefe' comunica autoridad reconocida sin traer a la mente un sentido monárquico o demasiado elevado de 'príncipe'. Se conserva la conjunción inicial para continuar la enumeración.
- source_word: בֵית אָב
  english_pob_choice: the ancestral house
  chosen_spanish: la casa paterna
  alternatives_spanish:
  - la casa ancestral
  - la casa del padre
  lexicon: HALOT
  rationale: La expresión hebrea designa una unidad de parentesco patrilineal, no solo una vivienda. 'Casa paterna' es una forma natural en español bíblico y conserva la idea de linaje/clan; por eso se acompaña de la nota que explicita el sentido cultural del término.
- source_word: לְמִשְׁפְּחֹת
  english_pob_choice: of the clans of
  chosen_spanish: de las familias de
  alternatives_spanish:
  - de los clanes de
  - para las familias de
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת en este pasaje organiza subdivisiones tribales. En español, 'familias' es claro y aceptable; 'clanes' sería más técnico, pero menos natural para lectores amplios. Se mantiene el valor colectivo y genealógico sin perder legibilidad.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Meraí
  - Merarí
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma estable; no requiere adaptación semántica.
- source_word: צוּרִיאֵל
  english_pob_choice: Zuriel
  chosen_spanish: Zuriel
  alternatives_spanish:
  - Curiel
  lexicon: Nombre propio
  rationale: Nombre propio transliterado según la convención del proyecto.
- source_word: בֶן אֲבִיחָיִל
  english_pob_choice: son of Abihail
  chosen_spanish: hijo de Abihail
  alternatives_spanish:
  - hijo de Abihail
  - descendiente de Abihail
  lexicon: HALOT
  rationale: בֶּן se expresa con el estándar genealógico 'hijo de'. 'Descendiente de' suavizaría la filiación explícita que el hebreo sí formula.
- source_word: עַל יֶרֶךְ הַמִּשְׁכָּן
  english_pob_choice: on the north side of the tabernacle
  chosen_spanish: al lado norte del tabernáculo
  alternatives_spanish:
  - en el costado norte del tabernáculo
  - junto al tabernáculo, al norte
  lexicon: HALOT
  rationale: יֶרֶךְ literalmente puede ser 'lado' o 'flanco'. En español, 'lado norte' comunica con naturalidad la ubicación campamental y evita una calca dura. 'Tabernáculo' es el equivalente contextual apropiado de מִשְׁכָּן.
- source_word: יַחֲנוּ
  english_pob_choice: They were to camp
  chosen_spanish: Acamparán
  alternatives_spanish:
  - debían acampar
  - acamparán
  lexicon: HALOT
  rationale: El imperfecto expresa disposición normativa en el relato. En español, 'acamparán' transmite de forma sobria el arreglo prescrito; la obligación queda implícita por el contexto organizativo del pasaje.
- source_word: צָפֹנָה
  english_pob_choice: north
  chosen_spanish: norte
  alternatives_spanish:
  - hacia el norte
  - al norte
  lexicon: HALOT
  rationale: Adverbio direccional incorporado en 'lado norte'. No hace falta añadir una redundancia como 'hacia' o 'al' si ya está integrado en la frase.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: chief/leader/prince para נָשִׂיא, ancestral house para בֵית אָב, clans/families para מִשְׁפְּחֹת y la localización norte del tabernáculo. La redacción española busca naturalidad sin perder la estructura genealógica y campamental del hebreo.'
  spanish_consistency_notes:
  - Se conservó 'tabernáculo' para מִשְׁכָּן en coherencia con el uso bíblico y el audit trail inglés.
  - 'Se mantuvo la secuencia genealógica y administrativa del hebreo: jefe + casa paterna + familias + nombre propio + filiación.'
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el texto, ya que no aparecen en este versículo.
  - 'La dirección espacial quedó integrada en una sola frase natural en español: ''al lado norte''.'
