  text: בָּ֣אוּ יְמֵ֣י הַ/פְּקֻדָּ֗ה בָּ֚אוּ יְמֵ֣י הַ/שִׁלֻּ֔ם יֵדְע֖וּ יִשְׂרָאֵ֑ל אֱוִ֣יל הַ/נָּבִ֗יא מְשֻׁגָּע֙ אִ֣ישׁ הָ/ר֔וּחַ עַ֚ל רֹ֣ב עֲוֺנְ/ךָ֔ וְ/רַבָּ֖ה מַשְׂטֵמָֽה׀׃
base_translation:
  language: en
  yaml_path: translation/ot/hosea/009/007.yaml
  text: The days of punishment have come[a]; the days of repayment have come; Israel will know it. The prophet is a fool; the man of the spirit is mad[c][b], because of the greatness of your iniquity and your great hostility.
  footnotes:
  - marker: a
    text: Or, 'The prophet is foolish; the inspired man is mad.' The Hebrew phrase 'man of the spirit' may mean one claiming spiritual inspiration.
    reason: lexical_alternative
  - marker: b
    text: 'Some understand this line as the people''s scornful description of the true prophet: ''The prophet is a fool; the man of the spirit is mad.'' The Hebrew does not explicitly mark it as a quotation.'
    reason: alternative_reading
  - marker: c
    text: Or 'the abundance of your guilt and great hostility/hatred.' The final noun may refer to enmity or animosity, and its precise object is not stated.
    reason: lexical_alternative
