translation:
  language: es
  text: 'Entonces dijo al rey[a]: «Recuerda el voto que hice para reconstruir Jerusalén el día en que recibiste tu reino»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Recuerda la oración que hice para reconstruir Jerusalén …». El griego usa εὐχή/ηὐξάμην, que puede referirse tanto a un voto como a una oración; aquí el contexto favorece un compromiso votivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate de
  - Ten presente
  lexicon: BDAG
  rationale: Es un imperativo directo y natural en español. «Recuerda» conserva el tono de apelación inmediata al rey sin sonar arcaico.
- source_word: εὐχήν
  english_pob_choice: vow
  chosen_spanish: voto
  alternatives_spanish:
  - oración
  - promesa
  lexicon: LSJ
  rationale: En este contexto, εὐχήν apunta a un compromiso solemne ligado a una acción concreta. «Voto» preserva mejor esa carga que «oración», aunque se mantiene la alternativa lexical en nota.
- source_word: ηὐξάμην
  english_pob_choice: I made
  chosen_spanish: hice
  alternatives_spanish:
  - voté
  - oré
  lexicon: BDAG
  rationale: Dado que el sustantivo ya expresa la idea de voto, «hice» evita una repetición forzada como «el voto que voté» y mantiene la fluidez del español.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to rebuild
  chosen_spanish: reconstruir
  alternatives_spanish:
  - edificar
  - reedificar
  lexicon: BDAG
  rationale: Con Jerusalén como objeto y en un contexto de restauración, «reconstruir» comunica con claridad la intención de restaurar una ciudad previamente dañada.
- source_word: παρέλαβες
  english_pob_choice: you received
  chosen_spanish: recibiste
  alternatives_spanish:
  - tomaste
  - llegaste a poseer
  lexicon: BDAG
  rationale: La forma verbal se refiere a asumir o recibir el reino. «Recibiste» es la opción más natural y no sugiere una toma violenta.
- source_word: τὸ βασίλειόν σου
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu realeza
  - tu poder real
  lexicon: LSJ
  rationale: «Reino» es la traducción más directa y comprensible para βασίλειον en este contexto de acceso al trono, y conserva el sentido de dominio real.
theological_decisions:
- issue: Sentido de εὐχή / ηὐξάμην
  english_pob_reading: A vowed commitment made by the speaker
  chosen_spanish_reading: Un voto solemne hecho por el hablante
  alternative_spanish_readings:
  - Una oración ofrecida por el hablante
  rationale: La cláusula infinitiva («para reconstruir Jerusalén») concreta el contenido comprometido, lo que favorece leer εὐχή aquí como voto. La alternativa de «oración» se conserva en nota porque el griego permite ambas lecturas.
  doctrine_reference: 'Translation philosophy: preserve significant lexical/theological alternatives in notes rather than flattening them.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y concuerda con el audit trail en inglés: mantiene la ambigüedad léxica documentada en εὐχή/ηὐξάμην en una nota, mientras adopta «voto» en el texto principal por el contexto narrativo. No se registraron revisiones sustantivas en el paso más reciente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Jerusalén» y «reino» mantienen la terminología histórica y política del pasaje.
  - Se prefiere «reconstruir» a «edificar» por claridad contextual en español, sin perder el sentido de οἰκοδομῆσαι.
