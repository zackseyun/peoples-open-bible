base_translation:
  language: en
  yaml_path: translation/ot/genesis/037/036.yaml
  text: Meanwhile[a], the Medanites sold him into Egypt to Potiphar, an officer of Pharaoh[c][b], the captain of the guard.
  footnotes:
  - marker: a
    text: 'Hebrew: ''Medanites''; traditionally understood here as ''Midianites'' in light of the surrounding narrative and ancient versions.'
    reason: alternative_reading
  - marker: b
    text: Or 'a eunuch of Pharaoh' or 'a court official of Pharaoh.' The Hebrew term can refer either to a literal eunuch or to a royal officer.
    reason: lexical_alternative
  - marker: c
    text: Literally 'chief of the slaughterers.' In royal context this likely refers to the captain of the guard or bodyguard.
    reason: lexical_alternative
