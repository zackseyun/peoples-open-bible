source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: II. Ὁμολογῶ τοίνυν¹ τὴν ἁμαρτίαν μου, τέκνα², ὅτι πλειστάκις ἤθελον³ ἀνελεῖν αὐτόν, *ἐπειδὴ ἐμίσουν αὐτὸν ἐκ ψυχῆς⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/002/001.yaml
  text: Therefore I confess my sin, children, that many times I wanted to kill him, because I hated him from my soul.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:43Z'
    unchanged: false
    changes_summary: Replaced the colon with 'that' to reflect ὅτι more naturally and formally in English; otherwise retained the draft wording.
translation:
  language: es
  text: Por tanto confieso mi pecado, hijos, que muchas veces quise matarlo, porque lo odiaba desde el alma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁμολογῶ
  english_pob_choice: I confess
  chosen_spanish: confieso
  alternatives_spanish:
  - reconozco
  lexicon: BDAG
  rationale: El tono confesional y penitencial de Gad encaja mejor con 'confieso' que con el más neutro 'reconozco'.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - ofensa
  - falta
  lexicon: BDAG
  rationale: Término moral-religioso estándar; 'pecado' conserva el peso teológico de la autoacusación.
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: matarlo
  alternatives_spanish:
  - quitarle la vida
  - darle muerte
  lexicon: BDAG
  rationale: Verbo claro y directo en español, sin arcaísmos, fiel a la intención homicida del texto.
- source_word: ἐμίσουν αὐτὸν ἐκ ψυχῆς
  english_pob_choice: I hated him from my soul
  chosen_spanish: lo odiaba desde el alma
  alternatives_spanish:
  - lo odiaba con toda el alma
  - lo aborrecía desde el alma
  lexicon: BDAG
  rationale: Conserva la intensidad semítica del idiom griego sin suavizarlo a una expresión moderna genérica.
translation_notes:
  revision_awareness: El revisor inglés cambió ':' por 'that' para reflejar ὅτι más naturalmente; el español usa 'que' como conjunción explicativa, lo que refleja la misma decisión estilística.
  spanish_consistency_notes:
  - '''pecado'' como rendición estándar de ἁμαρτία a lo largo de la colección'
  - '''desde el alma'' preserva el modismo griego ἐκ ψυχῆς'
