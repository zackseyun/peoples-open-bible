translation:
  language: es
  text: El séptimo le correspondió a Jesharela[a]; sus hijos y sus hermanos fueron doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «El séptimo, Jesharela, sus hijos y sus hermanos, doce»; el verbo de reparto («le correspondió») se suple a partir de la fórmula repetida de sorteo en los versículos cercanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁבִעִי
  english_pob_choice: The seventh
  chosen_spanish: La séptima
  alternatives_spanish:
  - El séptimo
  - La séptima suerte
  - La séptima división
  lexicon: HALOT
  rationale: El ordinal funciona de manera sustantivada dentro del reparto por sorteo. En español, el femenino concuerda naturalmente con la idea implícita de «suerte» o «porción» sin introducir un sustantivo que el hebreo no expresa explícitamente.
- source_word: יְשַׂרְאֵלָה
  english_pob_choice: Jesharelah
  chosen_spanish: Jesharela
  alternatives_spanish:
  - Israela
  lexicon: HALOT
  rationale: Se translitera el nombre propio en lugar de traducirlo. Se adapta a la ortografía española habitual para nombres bíblicos, manteniendo la identidad del nombre sin anglicismo innecesario.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos/varones». En español, «hijos» puede funcionar como plural masculino inclusivo de hijos varones cuando el contexto genealogical lo delimita; «hijos varones» sería más explícito pero más pesado.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes varones
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: «Hermanos» preserva el sentido básico del hebreo. Aunque en el contexto puede abarcar asociados del mismo grupo familiar, no se sustituye por una paráfrasis más amplia sin base textual directa.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: eran doce
  alternatives_spanish:
  - doce
  - hacían doce
  lexicon: HALOT
  rationale: El hebreo concluye con el número cardinal, y el audit trail inglés resuelve la sintaxis con un verbo copulativo. En español, «eran doce» expresa de forma natural que el total de sus hijos y hermanos era doce, sin perder la concisión del original.
translation_notes:
  revision_awareness: 'El inglés POB finalizó en una formulación más clara: añadió el verbo «were» y separó con punto y coma la idea del total numérico. Esta versión española sigue ese mismo ajuste de claridad, pero conserva la brevedad del hebreo y la suposición contextual del reparto por sorteo.'
  spanish_consistency_notes:
  - Se mantiene un tono bíblico moderno y sobrio, sin depender de fórmulas tradicionales de máscara como «SEÑOR».
  - Se conserva la ambigüedad mínima del hebreo en la relación exacta entre «hijos» y «hermanos», pero se expresa el total con naturalidad en español.
  - La transliteración del nombre propio se adapta a la ortografía española, no a una forma litúrgica fija.
