    rationale: El hebreo distingue 'sons' frente a 'daughters', y el inglés POB auditado preserva esa oposición. En español, 'hijos' puede leerse como genérico inclusivo; 'hijos varones' conserva mejor la fuerza del original sin sonar antinatural.
