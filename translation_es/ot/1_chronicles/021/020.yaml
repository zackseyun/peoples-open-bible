translation:
  language: es
  text: Entonces Ornan se volvió y vio al ángel[a], y sus cuatro hijos con él se escondían, mientras Ornan trillaba trigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se estaban escondiendo». El hebreo reflexivo sugiere más literalmente «se escondían a sí mismos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - se giró
  - volvió la vista
  lexicon: HALOT
  rationale: שׁוּב expresa volver o girarse; en esta escena narrativa, «se volvió» comunica de forma natural el movimiento físico previo a ver al ángel, sin añadir más de lo que el hebreo exige.
- source_word: וַיַּרְא אֶת־הַמַּלְאָךְ
  english_pob_choice: saw the angel
  chosen_spanish: vio al ángel
  alternatives_spanish:
  - vio al mensajero
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar «mensajero» o «ángel», pero aquí el contexto de juicio divino favorece claramente «ángel»; el español mantiene esa referencia sobrenatural con la preposición personal «al».
- source_word: וְאַרְבַּעַת בָּנָיו
  english_pob_choice: his four sons
  chosen_spanish: sus cuatro hijos
  alternatives_spanish:
  - los cuatro hijos que tenía
  - y sus cuatro hijos
  lexicon: HALOT
  rationale: El hebreo identifica a los cuatro hijos como pertenecientes a Ornan. «Sus cuatro hijos» es idiomático en español y conserva la relación posesiva.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: Aunque «con él» sería más breve, la relativa «que estaban con él» aclara el vínculo sintáctico en español y evita ambigüedad respecto de los hijos sin alterar el sentido.
- source_word: מִתְחַבְּאִים
  english_pob_choice: were hiding themselves
  chosen_spanish: se escondían
  alternatives_spanish:
  - se estaban escondiendo
  - se ocultaban
  lexicon: HALOT
  rationale: El hitpael es reflexivo/medio; «se escondían» preserva esa fuerza de manera natural en español. Se evita «escondían» sin reflexivo porque debilitaría el matiz documentado.
- source_word: וְאָרְנָן דָּשׁ חִטִּים
  english_pob_choice: while Ornan was threshing wheat
  chosen_spanish: mientras Ornan trillaba trigo
  alternatives_spanish:
  - y Ornan trillaba trigo
  - mientras Ornan estaba trillando trigo
  lexicon: HALOT
  rationale: דָּשׁ indica la acción de trillar; «trillaba» es el equivalente directo y natural. Se conserva la circunstancia progresiva con «mientras», que refleja bien el trasfondo de la acción simultánea.
- source_word: חִטִּים
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - trigo maduro
  - grano
  lexicon: HALOT
  rationale: חִטִּים designa específicamente trigo. «Trigo» es la traducción precisa y suficiente en español; «grano» sería demasiado general.
theological_decisions:
- issue: Identidad de הַמַּלְאָךְ en un contexto de juicio divino
  english_pob_reading: angel
  chosen_spanish_reading: ángel
  alternative_spanish_readings:
  - mensajero
  rationale: Aunque מַלְאָךְ puede ser «mensajero», el pasaje pertenece a una escena de intervención divina y juicio, por lo que «ángel» comunica mejor la lectura auditada sin ocultar la referencia sobrenatural.
  doctrine_reference: 1 Crónicas 21:15-20; cf. uso contextual de מַלְאָךְ en narrativas de juicio
- issue: Valor del hitpael en מִתְחַבְּאִים
  english_pob_reading: were hiding themselves
  chosen_spanish_reading: se escondían
  alternative_spanish_readings:
  - se ocultaban
  - se estaban escondiendo
  rationale: La forma reflexiva no se debe borrar en español. «Se escondían» conserva la idea de acción reflexiva/mutua de manera natural, y evita perder la tensión léxica documentada por el inglés POB.
  doctrine_reference: No doctrinal; decisión gramatical/lexical basada en el valor verbal del hitpael
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el audit trail; la redacción española sigue el texto hebreo y las decisiones léxicas auditadas del inglés POB sin introducir cambios no documentados.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en toda la serie POB cuando aparezca; en este versículo no se presenta.
  - Se mantiene «ángel» y no «mensajero» por la claridad contextual del juicio divino.
  - Se conserva el reflexivo español «se escondían» para reflejar el hitpael hebreo.
  - «Trigo» se usa como equivalente específico de חִטִּים, no el genérico «grano».
