translation:
  language: es
  text: 'Betsabé[a] dijo: «Bien; hablaré por ti al rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de ti» o «en tu favor». La expresión hebrea puede significar hablar con referencia a alguien y, en este contexto, probablemente implica intercesión por Adonías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el discurso directo; en español, «dijo» es la opción más natural y exacta para abrir la cita. «Respondió» sería posible solo si el contexto inmediato enfatizara una réplica; aquí no es necesario. «Habló» es demasiado general.
- source_word: בַּת שֶׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Bat-seba
  alternatives_spanish:
  - Betsabé
  lexicon: HALOT
  rationale: Se conserva el nombre propio como transliteración funcional. «Bat-seba» refleja la forma española directa del hebreo y evita una adaptación tradicional que podría ocultar la transparencia del original. «Betsabé» es una forma castellana más tradicional, pero menos alineada con la política de transliteración del POB.
- source_word: טוֹב
  english_pob_choice: Good
  chosen_spanish: Bien
  alternatives_spanish:
  - Bueno
  - Muy bien
  lexicon: HALOT
  rationale: Aquí טוב funciona como respuesta breve de aprobación. En español, «Bien» reproduce mejor la concisión dialogal que «Bueno», que suena menos natural como aprobación inmediata. «Muy bien» añade matiz que no está explícito en el hebreo.
- source_word: אֲדַבֵּר
  english_pob_choice: will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - me dirigiré
  lexicon: HALOT
  rationale: El piel de דבר se traduce de modo directo como «hablar». «Hablaré» conserva la simpleza del verbo hebreo sin introducir una acción más específica. «Diré» desplaza el énfasis hacia contenido verbal; «me dirigiré» añade solemnidad no requerida.
- source_word: עָלֶיךָ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - acerca de ti
  - en tu favor
  - en tu nombre
  lexicon: HALOT
  rationale: La construcción con על + דבר puede significar hablar acerca de alguien o en beneficio de alguien. En este contexto de intercesión cortesana, «por ti» conserva la ambigüedad útil entre hablar acerca de y actuar en beneficio de. «Acerca de ti» es más literal pero menos idiomático; «en tu favor» y «en tu nombre» son más interpretativas.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  - ante el rey
  lexicon: HALOT
  rationale: El hebreo expresa dirección hacia el rey; «al rey» es la equivalencia normal y sobria en español. «Ante el rey» añade una escena judicial que no está explícita en el texto. Se usa minúscula porque se trata del título real, no de una referencia divina.
theological_decisions:
- issue: Alcance de עָלֶיךָ en un contexto de intercesión
  english_pob_reading: The Hebrew phrase can denote speaking concerning someone, and in context likely implies intercession for Adonijah.
  chosen_spanish_reading: La frase puede significar hablar acerca de ti y, en este contexto, probablemente implica interceder por Adonías.
  alternative_spanish_readings:
  - hablar acerca de ti
  - hablar en tu favor
  - interceder por Adonías
  rationale: 'La traducción principal «por ti» conserva una ambigüedad compatible con el hebreo y con la nota auditada en inglés: puede ser mera referencia o acción de representación. En la nota se explicita que el contexto sugiere intercesión, evitando cerrar prematuramente el sentido.'
  doctrine_reference: No aplica; decisión léxica-contextual, no doctrinal.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en la auditoría inglesa y no registra revisiones aplicadas; por ello se mantiene una solución directa, con una nota que preserva la ambigüedad de עָלֶיךָ sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se mantiene el nombre propio en forma transliterada («Bat-seba») para coherencia con la política de transparencia del proyecto.
  - Se traduce טוב con un adverbio breve («Bien») porque funciona como respuesta aprobatoria en diálogo.
  - Se conserva la preposición ambigua de beneficio/intercesión con «por ti», y la nota aclara las alternativas sin fijar más de lo que el hebreo exige.
