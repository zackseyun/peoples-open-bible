translation:
  language: es
  text: para obtener la estabilidad del reino. Por tanto[a], habiendo quitado lo de los antepasados
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conservado para este versículo es fragmentario y parece cortarse a mitad de frase después de «lo de los antepasados…». Por eso la traducción se limita a las palabras efectivamente presentes en el testimonio suministrado y no reconstruye el objeto que falta.
    reason: textual_variant
lexical_decisions:
- source_word: βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el gobierno real
  - la soberanía
  lexicon: LSJ
  rationale: En este contexto político, βασιλείαν designa el ámbito o ejercicio del poder real. «Reino» es la opción más natural en español y conserva tanto la esfera como la administración del poder, sin introducir una abstracción mayor como «soberanía».
- source_word: εὐσταθείας
  english_pob_choice: stability
  chosen_spanish: estabilidad
  alternatives_spanish:
  - firmeza
  - seguridad
  - solidez
  lexicon: LSJ
  rationale: El sustantivo expresa un estado estable, bien asentado. «Estabilidad» reproduce con claridad el valor político de un reino firme y seguro, y corresponde bien al uso de la POB en inglés.
- source_word: τυχεῖν
  english_pob_choice: to obtain
  chosen_spanish: obtener
  alternatives_spanish:
  - alcanzar
  - conseguir
  - lograr
  lexicon: LSJ
  rationale: El infinitivo tiene el sentido de llegar a poseer o conseguir algo. «Obtener» mantiene el matiz de adquisición y suena natural con el complemento abstracto «la estabilidad».
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - por eso
  - de donde
  - por lo cual
  lexicon: LSJ
  rationale: Aquí introduce una consecuencia o inferencia. «Por tanto» conserva la fuerza consecutiva de manera clara y formal en español.
- source_word: ἀφελόμενος
  english_pob_choice: having taken away
  chosen_spanish: habiendo quitado
  alternatives_spanish:
  - habiendo removido
  - habiendo apartado
  - habiendo tomado
  lexicon: LSJ
  rationale: El participio de ἀφαιρέω indica quitar o remover. «Habiendo quitado» preserva la forma participial y evita sobreespecificar el objeto, que en el testimonio recibido queda incompleto.
- source_word: προγονικὴν
  english_pob_choice: ancestral
  chosen_spanish: lo ancestral
  alternatives_spanish:
  - lo heredado de los antepasados
  - lo de los padres
  - la tradición ancestral
  lexicon: LSJ
  rationale: El adjetivo alude a lo perteneciente a los antepasados. Como el griego transmitido se corta antes del sustantivo, un sustantivo neutro como «lo ancestral» mantiene la apertura del objeto perdido y no reconstruye indebidamente el texto.
theological_decisions:
- issue: Texto fragmentario y objeto implícito de la acción
  english_pob_reading: The extant Zone 1 Greek for this verse is fragmentary and appears to break off mid-sentence after 'the ancestral…'. The English therefore translates only the wording actually present in the supplied witness and does not reconstruct the missing object.
  chosen_spanish_reading: 'El español traduce solo la parte conservada: «habiendo quitado lo ancestral», sin intentar reconstruir el objeto perdido.'
  alternative_spanish_readings:
  - habiendo quitado la tradición ancestral
  - habiendo quitado las costumbres ancestrales
  - habiendo quitado la herencia ancestral
  rationale: La evidencia griega termina abruptamente y no permite identificar con seguridad el complemento del participio. Traducir de forma abierta respeta la cautela textual de la POB inglesa y evita imponer una lectura interpretativa no atestiguada.
  doctrine_reference: Principio de crítica textual y respeto al testimonio conservado; no añadir al texto lo que no está presente en el manuscrito.
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; sin embargo, el control cruzado señaló problemas mayores por la fragmentariedad del testimonio griego. Esta versión conserva la cautela textual de la POB inglesa y evita completar el segmento faltante.
  spanish_consistency_notes:
  - Se mantiene «reino» para βασιλείαν en coherencia con el valor político del término.
  - Se mantiene «estabilidad» para εὐσταθείας y «obtener» para τυχεῖν siguiendo el sentido de adquisición segura.
  - Se evita «mesías/Cristo» u otra terminología no pertinente al pasaje.
  - Se usa «lo ancestral» para no sobrerreconstruir προγονικὴν en un contexto textual incompleto.
  - La nota al pie marca explícitamente la fragmentariedad del testimonio, como en la POB inglesa.
