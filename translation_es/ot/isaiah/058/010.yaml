translation:
  language: es
  text: y si derramas tu vida[a] para el hambriento y sacias al alma afligida[b], entonces tu luz surgirá en la oscuridad, y tu oscuridad profunda será como el mediodía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu alma». El hebreo usa נֶפֶשׁ para la vida o la persona entera.
    reason: lexical_alternative
  - marker: b
    text: O «la persona afligida». El hebreo «alma» aquí suele referirse a la persona entera, no solo al aspecto inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָפֵק
  english_pob_choice: pour yourself out
  chosen_spanish: derramas tu vida
  alternatives_spanish:
  - te entregas
  - te derramas a ti mismo
  - extiendes tu vida
  lexicon: HALOT
  rationale: 'El hebreo usa el verbo en una construcción idiomática con נֶפֶשׁ para expresar gasto total de la propia vida o persona en favor de otro. En español, «derramas tu vida» conserva la imagen de entrega intensa sin sonar forzado como un calco literal de «alma». '
- source_word: לָרָעֵב
  english_pob_choice: for the hungry
  chosen_spanish: para el hambriento
  alternatives_spanish:
  - al hambriento
  - por el hambriento
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo designa a la persona que tiene hambre. «Para el hambriento» expresa con naturalidad el destinatario del acto de entrega.
- source_word: נַפְשֶׁךָ
  english_pob_choice: yourself
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tú mismo
  - tu ser
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí puede significar la vida o la persona entera, no solo el componente inmaterial. «Tu vida» conserva el valor idiomático y evita una antropología más estrecha de la que exige el texto.
- source_word: וְנֶפֶשׁ נַעֲנָה
  english_pob_choice: the afflicted soul
  chosen_spanish: al alma afligida
  alternatives_spanish:
  - a la persona afligida
  - al alma humillada
  - al afligido
  lexicon: HALOT
  rationale: El hebreo vuelve a usar נֶפֶשׁ para la persona entera, descrita como afligida o humillada. «Al alma afligida» sigue de cerca la imagen del original y mantiene la tensión lexical que el POB inglés preserva con «afflicted soul».
- source_word: תַּשְׂבִּיעַ
  english_pob_choice: satisfy
  chosen_spanish: sacias
  alternatives_spanish:
  - satisfaces plenamente
  - colmás
  - llenarás
  lexicon: HALOT
  rationale: El verbo en causativo indica dar satisfacción o plenitud. «Sacias» es conciso, bíblicamente claro y corresponde bien al sentido de llenar hasta la plenitud.
- source_word: וְזָרַח
  english_pob_choice: will rise
  chosen_spanish: brillará
  alternatives_spanish:
  - saldrá
  - amanecerá
  - resplandecerá
  lexicon: HALOT
  rationale: En este contexto condicional/futuro, el verbo expresa la salida o aparición de la luz. «Brillará» comunica bien el efecto visible de la luz emergiendo en la oscuridad, sin perder la metáfora.
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en medio de la oscuridad
  lexicon: HALOT
  rationale: La preposición indica localización. «En la oscuridad» preserva la imagen concreta y es una forma natural y sobria en español.
- source_word: אוֹרֶךָ
  english_pob_choice: your light
  chosen_spanish: tu luz
  alternatives_spanish:
  - tu resplandor
  - tu claridad
  lexicon: HALOT
  rationale: La imagen de la luz se mantiene sin explicitarla alegóricamente. «Tu luz» corresponde de manera directa al sustantivo hebreo con sufijo de segunda persona.
- source_word: וַאֲפֵלָתְךָ
  english_pob_choice: your gloom
  chosen_spanish: tu densa sombra
  alternatives_spanish:
  - tu oscuridad
  - tu tiniebla
  - tu penumbra
  lexicon: HALOT
  rationale: אֲפֵלָה denota oscuridad espesa o sombría. «Densa sombra» intenta preservar la fuerza imagética y evitar una mera repetición de «oscuridad»; también recoge la idea de un estado de aflicción visible y envolvente.
- source_word: כַּצָּהֳרָיִם
  english_pob_choice: like noonday
  chosen_spanish: como el mediodía
  alternatives_spanish:
  - como el pleno día
  - como el mediodía luminoso
  lexicon: HALOT
  rationale: צָהֳרַיִם significa el mediodía. «Como el mediodía» es una equivalencia natural y precisa en español.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ en ambas cláusulas
  english_pob_reading: Render contextually as 'yourself' in the first clause and 'the afflicted soul' in the second phrase
  chosen_spanish_reading: 'Traducir con valor contextual: «tu vida» en la primera cláusula y «el alma afligida» en la segunda'
  alternative_spanish_readings:
  - Traducir ambas veces como «alma»
  - Traducir ambas veces como «persona»
  rationale: El hebreo emplea נֶפֶשׁ de manera idiomática para designar la vida o la persona entera. En la primera cláusula, «tu vida» transmite mejor la entrega de sí mismo y evita una fórmula rígida. En la segunda, «alma afligida» preserva la imagen hebrea y la tensión lexical que el texto presenta. Así se mantiene el balance entre fidelidad y claridad sin imponer una doctrina técnica del alma no exigida por el verso.
  doctrine_reference: Principios de traducción POB §§1, 5, 6
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó alta concordancia y sin cambios necesarios. No hubo revisiones aplicadas al contenido de esta línea, así que el borrador español se construyó directamente desde el texto hebreo con el audit trail inglés como apoyo para las decisiones léxicas y antropológicas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología POB por defecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se conserva la metáfora de luz/oscuridad sin explicarla en exceso.
  - Se evita sustituir «alma» por una paráfrasis más abstracta en la segunda mitad, para respetar la imagen hebrea y la tensión documentada en el POB inglés.
