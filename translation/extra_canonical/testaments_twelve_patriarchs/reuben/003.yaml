translation:
  text: |-
    And besides all these, there is an eighth spirit, the spirit of sleep, with which are created the trance of nature and the image of death.
    
    With these spirits are mixed the spirits of error. First, the spirit of sexual immorality is lodged in the nature and in the senses. Second, a spirit of insatiableness of the belly. Third, a spirit of fighting in the liver and in the gall. Fourth, a spirit of self-display and sorcery, so that through excessive meddling one may appear attractive. Fifth, a spirit of pride, so that one boasts and thinks grand thoughts. Sixth, a spirit of falsehood in destruction and jealousy, for shaping words and hiding one’s words from one’s own kin and household. Seventh, a spirit of injustice, with which come thefts and acts of greed, so that it may satisfy the pleasures of his heart. For injustice works together with the other spirits through taking and giving.
    
    And over all these the spirit of sleep is joined, which is the eighth spirit of error and fantasy. And so every young man is destroyed, darkening his mind from the truth and not understanding the law of God, nor listening to the instruction of his fathers, just as I also suffered in my youth.
    
    And now, my children, love the truth, and it will keep you safe. Hear the words of Reuben your father, as I teach you. Do not pay attention to a woman’s appearance, nor keep company with a married woman, nor pry into the affairs of women.
