    rationale: El antecedente inmediato es 'Nob, la ciudad de los sacerdotes'; en español la concordancia natural y referencial exige femenino singular ('la hirió') si se conserva el verbo 'herir'.
  - severity: medium
    issue: Ligera pérdida de precisión referencial al tratar a Nob como masculino después de aposición femenina
    rationale: Aunque 'Nob' como topónimo puede sentirse masculino por sí solo, la aposición 'la ciudad de los sacerdotes' activa claramente un referente femenino en la cláusula; mantenerlo evita aspereza y ambigüedad.
