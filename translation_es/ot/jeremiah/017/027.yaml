translation:
  language: es
  text: Pero si no me escuchan, para santificar el día del sábado, y para no llevar una carga[a] ni meterla por las puertas de Jerusalén en el día del sábado, entonces encenderé un fuego en sus puertas[b], y consumirá los palacios de Jerusalén, y no se apagará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevar una carga». La expresión hebrea se refiere literalmente a levantar o cargar una carga.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en sus puertas»; «Jerusalén» es gramaticalmente femenina en hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁמְעוּ אֵלַי
  english_pob_choice: listen to me
  chosen_spanish: me escuchan
  alternatives_spanish:
  - me oyen
  - me obedecen
  lexicon: HALOT
  rationale: שׁמע con אֶל expresa oír/escuchar con la idea implícita de atender. «Me escuchan» conserva el giro auditivo y deja la obediencia como implicatura contextual, sin explicitarla más allá del hebreo.
- source_word: לְקַדֵּשׁ אֶת י֣וֹם הַשַּׁבָּת
  english_pob_choice: to keep the Sabbath day holy
  chosen_spanish: para santificar el día del sábado
  alternatives_spanish:
  - para guardar santo el día del sábado
  - para tratar como santo el día del sábado
  lexicon: HALOT
  rationale: קדשׁ en piel significa apartar o declarar santo. «Santificar» sigue de cerca la forma verbal del hebreo y mantiene la fuerza de consagración del día.
- source_word: וּלְבִלְתִּי שְׂאֵת מַשָּׂא
  english_pob_choice: and not to carry a load
  chosen_spanish: y para no cargar una carga
  alternatives_spanish:
  - y para no llevar un peso
  - y para no portar una carga
  lexicon: HALOT
  rationale: נשא + מַשָּׂא alude literalmente a levantar o cargar un peso. «Carga» reproduce el sustantivo cargado de sentido comercial/laboral, aunque en español suena algo redundante; se conserva esa redundancia porque refleja la repetición léxica del hebreo.
- source_word: וּבֹא בְּשַׁעֲרֵי יְרוּשָׁלִַם
  english_pob_choice: and bring it in through the gates of Jerusalem
  chosen_spanish: y entrarla por las puertas de Jerusalén
  alternatives_spanish:
  - y pasarla por las puertas de Jerusalén
  - y meterla por las puertas de Jerusalén
  lexicon: HALOT
  rationale: בוא en coordinación con la carga implica introducirla en la ciudad. En español, «entrarla» es una solución compacta para conservar el objeto implícito y el movimiento hacia dentro sin añadir comentario interpretativo.
- source_word: וְהִצַּתִּי אֵשׁ
  english_pob_choice: then I will kindle a fire
  chosen_spanish: entonces encenderé un fuego
  alternatives_spanish:
  - entonces prenderé un fuego
  - entonces haré prender fuego
  lexicon: HALOT
  rationale: יצת en hiphil significa encender o prender. «Encenderé un fuego» es natural en español y mantiene el sentido causal de juicio que el contexto exige.
- source_word: בִּשְׁעָרֶיהָ
  english_pob_choice: in its gates
  chosen_spanish: en sus puertas
  alternatives_spanish:
  - en sus portones
  - en sus entradas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «en sus puertas/portones», en español «puertas» comunica la imagen sin sonar técnico; además evita la personificación obligada de «sus puertas» como forma ciudadana femenina.
- source_word: וְאָכְלָה אַרְמְנוֹת יְרוּשָׁלִַם
  english_pob_choice: and it will consume the palaces of Jerusalem
  chosen_spanish: y consumirá los palacios de Jerusalén
  alternatives_spanish:
  - y devorará los palacios de Jerusalén
  - y consumirá las mansiones de Jerusalén
  lexicon: HALOT
  rationale: אָכַל en esta imagen de fuego puede traducirse «consumir». אַרְמְנוֹת se refiere a palacios o residencias fortificadas; «palacios» es la opción más directa y clara en español.
- source_word: וְלֹא תִכְבֶּה
  english_pob_choice: and it will not be quenched
  chosen_spanish: y no se apagará
  alternatives_spanish:
  - y no será apagado
  - y no se extinguirá
  lexicon: HALOT
  rationale: כבה significa apagarse o ser apagado. «No se apagará» es la formulación española más idiomática para un fuego que permanece inextinguible.
theological_decisions:
- issue: Sábado / Sabbath day
  english_pob_reading: Sabbath day
  chosen_spanish_reading: día del sábado
  alternative_spanish_readings:
  - sábado
  - día de reposo
  rationale: El hebreo incluye explícitamente יוֹם, «día». «Día del sábado» preserva ese dato sin sustituirlo por una formulación más interpretativa o litúrgica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Estructura condicional de juicio
  english_pob_reading: then I will kindle a fire
  chosen_spanish_reading: entonces encenderé un fuego
  alternative_spanish_readings:
  - y encenderé un fuego
  - por tanto encenderé un fuego
  rationale: La cláusula condicional hebrea presenta consecuencia judicial. «Entonces» hace explícita la apódosis sin alterar la relación semántica del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Imagen del fuego que no se apaga
  english_pob_reading: it will not be quenched
  chosen_spanish_reading: no se apagará
  alternative_spanish_readings:
  - no será apagado
  - no se extinguirá
  rationale: La forma pasiva/medio-pasiva del hebreo queda bien reflejada con «no se apagará». En español conserva la solemnidad profética de un juicio irreversible.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvieron las decisiones clave sobre שׁמע, קדשׁ, שְׂאֵת מַשָּׂא, בוא, יצת, אָכַל y כבה, y se respetó la observación sobre el femenino gramatical de Jerusalén. No hay revisiones aplicadas en el paquete fuente, por lo que el borrador español se alinea con el estado más reciente y estable del texto inglés.'
  spanish_consistency_notes:
  - Se prefirió «sábado» en vez de «Sabbath» para español natural, pero se conservó «día del sábado» para reflejar יוֹם.
  - Se mantuvo la repetición «carga una carga» porque el hebreo repite la idea de transportar un peso y la extrañeza es fuente-basada.
  - Se evitó «SEÑOR» para el nombre divino porque no aparece aquí; no se introdujo terminología no presente en el versículo.
  - Se usó «puertas» y no «portones» para una lectura más fluida y amplia en español, sin perder el sentido locativo del hebreo.
  - Se mantuvo el orden de juicio condicional con «entonces» para reflejar la consecuencia del hebreo.
