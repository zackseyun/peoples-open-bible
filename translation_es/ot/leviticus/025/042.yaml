source:
  edition: WLC
  text: כִּֽי עֲבָדַ֣/י הֵ֔ם אֲשֶׁר הוֹצֵ֥אתִי אֹתָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם לֹ֥א יִמָּכְר֖וּ מִמְכֶּ֥רֶת עָֽבֶד־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/042.yaml
  text: For they are my slaves[a], whom I brought out from the land of Egypt[b]; they shall not be sold as slaves are sold.
  footnotes:
  - marker: a
    text: Or, 'my servants.' The Hebrew עֲבָדַי can be rendered either way, but 'slaves' is used here because the verse emphasizes ownership and prohibits sale as ordinary slave property.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they shall not be sold with the sale of a slave,' that is, not in the manner of an ordinary slave transaction.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
