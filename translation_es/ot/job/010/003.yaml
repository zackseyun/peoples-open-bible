translation:
  language: es
  text: ¿Acaso es bueno para ti que oprimas, que desprecies la obra de tus manos y que brilles[a] sobre el consejo de los impíos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muestres favor al consejo de los impíos». El verbo hebreo significa literalmente «brillar sobre», y aquí probablemente expresa un trato favorable.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲטוֹב
  english_pob_choice: Is it good
  chosen_spanish: ¿Acaso es bueno para ti
  alternatives_spanish:
  - ¿Te parece bien
  - ¿Es correcto para ti
  lexicon: HALOT
  rationale: El hebreo forma una pregunta retórica sobre lo que es bueno o apropiado. «¿Acaso es bueno para ti» conserva la confrontación directa y evita suavizarla con una formulación más explicativa.
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - de tu parte
  lexicon: HALOT
  rationale: La preposición ל aquí expresa relación o beneficio respecto de Dios; «para ti» suena natural en español y conserva el sentido de pertinencia personal.
- source_word: תַעֲשֹׁק
  english_pob_choice: you oppress
  chosen_spanish: oprimas
  alternatives_spanish:
  - oprimas injustamente
  - maltrates
  lexicon: HALOT
  rationale: «Oprimir» preserva la fuerza verbal de עָשַׁק y la acusación directa del texto. Se mantiene el valor verbal sin atenuarlo con un equivalente más general.
- source_word: תִמְאַס
  english_pob_choice: you despise
  chosen_spanish: desprecies
  alternatives_spanish:
  - rechaces
  - repudies
  lexicon: HALOT
  rationale: מָאַס implica rechazo con desdén. «Desprecies» reproduce bien esa carga afectiva y mantiene el paralelismo con el verbo anterior.
- source_word: יְגִיעַ כַּפֶּיךָ
  english_pob_choice: the work of your hands
  chosen_spanish: la obra de tus manos
  alternatives_spanish:
  - el trabajo de tus manos
  - la labor de tus manos
  lexicon: HALOT
  rationale: Aunque יְגִיעַ puede referirse al trabajo o al fruto del trabajo, en este contexto la expresión apunta a la obra creadora de Dios. «La obra de tus manos» es una equivalencia bíblica natural en español y comunica claramente la relación con la acción divina.
- source_word: עֲצַת רְשָׁעִים
  english_pob_choice: the counsel of the wicked
  chosen_spanish: el consejo de los impíos
  alternatives_spanish:
  - el plan de los malvados
  - la intención de los impíos
  lexicon: HALOT
  rationale: עֵצָה abarca consejo, plan o propósito. «Consejo» conserva amplitud semántica y «impíos» refleja con precisión el campo moral de רְשָׁעִים en registro bíblico.
- source_word: הוֹפָעְתָּ
  english_pob_choice: shine upon
  chosen_spanish: resplandezcas sobre
  alternatives_spanish:
  - brilles sobre
  - muestres favor a
  lexicon: HALOT
  rationale: El hiphil de יָפַע conserva la imagen de brillar o resplandecer; por eso se mantiene la metáfora en el texto principal. «Resplandezcas sobre» reproduce la imagen sin trasladarla de inmediato a una glosa interpretativa.
theological_decisions:
- issue: Tensión teológica en la acusación dirigida a Dios
  english_pob_reading: Retain Job's direct rhetorical challenge without softening the verbs or reframing them as mere appearance.
  chosen_spanish_reading: Mantener la pregunta retórica y los verbos fuertes, sin convertir la frase en una mera impresión subjetiva ni suavizar la acusación.
  alternative_spanish_readings:
  - ¿Acaso te parece bien...
  - ¿Es correcto que parezca que oprimes...
  rationale: El hebreo presenta el lamento de Job con lenguaje frontal y acusatorio. La traducción española conserva esa tensión, porque resolverla anticipadamente borraría la fuerza retórica del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se revisó la propuesta a la luz del audit trail inglés y del hebreo masorético: se mantuvieron el tono interrogativo, la acusación directa y la metáfora de ‘resplandecer/brillar’, sin convertirla en una paráfrasis explicativa en el texto principal.'
  spanish_consistency_notes:
  - Se usa «impíos» para רְשָׁעִים, en coherencia con el registro bíblico y para mantener la distinción moral del hebreo.
  - Se prefiere «obra de tus manos» frente a una glosa más literal de יְגִיעַ, porque en español expresa con naturalidad la referencia a la acción creadora de Dios.
  - El marcador [a] se ancla en «resplandezcas sobre» porque allí está la alternativa interpretativa del verbo hebreo.
