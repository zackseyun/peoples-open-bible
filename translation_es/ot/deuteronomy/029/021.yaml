translation:
  language: es
  text: 'Y dirán la generación venidera[a]—sus hijos, los que se levanten después de ustedes, y el extranjero que venga de tierra lejana—cuando vean las plagas de aquella tierra y sus enfermedades[b], con que Yahvé la afligió[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la generación posterior». La expresión hebrea se refiere a una generación futura después de la presente, no necesariamente a la última generación.
    reason: lexical_alternative
  - marker: b
    text: O «sus dolencias» para «sus enfermedades».
    reason: lexical_alternative
  - marker: c
    text: Lit. «con que Yahvé la hizo enfermar en ella» o «la afligió en ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדּוֹר הָאַחֲרוֹן
  english_pob_choice: the generation to come
  chosen_spanish: la generación venidera
  alternatives_spanish:
  - la generación futura
  - la generación que ha de venir
  lexicon: HALOT
  rationale: La expresión hebrea señala una generación futura respecto de los oyentes presentes, no necesariamente la última en sentido escatológico. «Venidera» conserva ese valor prospectivo con buen español.
- source_word: בְּנֵיכֶם
  english_pob_choice: your children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: HALOT
  rationale: En este contexto, בנים puede referirse a la posteridad familiar. «Sus hijos» refleja el vínculo filial de manera natural en español y mantiene el alcance corporativo de la frase.
- source_word: וְהַנָּכְרִי
  english_pob_choice: and the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el foráneo
  lexicon: HALOT
  rationale: נכרי designa a una persona de fuera del pueblo o de otra nación. «Extranjero» es la equivalencia moderna más clara y respeta la referencia nacional/étnica.
- source_word: מֵאֶרֶץ רְחוֹקָה
  english_pob_choice: from a distant land
  chosen_spanish: de tierra lejana
  alternatives_spanish:
  - de una tierra distante
  - de un país lejano
  lexicon: HALOT
  rationale: «De tierra lejana» preserva la imagen geográfica del hebreo con un giro natural en español, sin añadir precisión política que el texto no exige.
- source_word: וְרָאוּ
  english_pob_choice: when they see
  chosen_spanish: cuando vean
  alternatives_spanish:
  - y verán
  - al ver
  lexicon: HALOT
  rationale: La forma hebrea introduce la circunstancia temporal de la reacción verbal. «Cuando vean» expresa con claridad la secuencia en español sin perder el matiz narrativo.
- source_word: מַכּוֹת
  english_pob_choice: the plagues
  chosen_spanish: las plagas
  alternatives_spanish:
  - los azotes
  - los golpes
  lexicon: HALOT
  rationale: En el marco de maldiciones del pacto, מכת puede aludir a calamidades punitivas visibles. «Plagas» comunica bien ese sentido y conserva la fuerza de juicio.
- source_word: תַּחֲלֻאֶיהָ
  english_pob_choice: its sicknesses
  chosen_spanish: sus enfermedades
  alternatives_spanish:
  - sus dolencias
  - sus males
  lexicon: HALOT
  rationale: El plural denomina enfermedades o dolencias que afectan a la tierra. «Enfermedades» es más claro en español contemporáneo que «sicknesses» literalizado como «sicknesses».
- source_word: חִלָּה
  english_pob_choice: has afflicted
  chosen_spanish: afligió
  alternatives_spanish:
  - hizo enfermar
  - hirió
  - castigó
  lexicon: HALOT
  rationale: El piel de חלה puede significar hacer enfermar o afligir. «Afligió» mantiene la amplitud del efecto sobre la tierra y evita restringirlo solo a enfermedad física.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé», transliteración del nombre divino, en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de forma directa. En español del POB se mantiene el nombre divino transliterado para preservar la referencia personal y pactal, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de בְּנֵיכֶם
  english_pob_reading: your children
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus descendientes
  - sus hijos varones
  rationale: El hebreo puede abarcar posteridad en sentido amplio. «Sus hijos» conserva la filiación y el sujeto colectivo sin restringir indebidamente al sexo masculino.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El cotejo más reciente indicó alta concordancia y sin cambios necesarios; se mantiene la solución previa de fondo, con adaptación al español y preservación de las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con el estándar del proyecto para יְהוָה.
  - «Extranjero» traduce נכרי con el sentido de procedencia nacional externa, no simplemente «desconocido».
  - «Plagas» y «enfermedades» conservan el paralelismo del hebreo entre calamidad visible y dolencia de la tierra.
  - 'La nota c retiene la tensión entre traducción idiomática y literalidad del hebreo: «afligió» / «hizo enfermar» en ella.'
