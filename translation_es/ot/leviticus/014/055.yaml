translation:
  language: es
  text: y para la sarna del vestido o de la casa[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tsaraʿat suele verterse tradicionalmente «lepra», pero en Levítico designa una gama más amplia de afecciones o contaminaciones, incluso en vestidos y casas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְ
  english_pob_choice: and for
  chosen_spanish: y para
  alternatives_spanish:
  - y concerniente a
  - también para
  lexicon: HALOT
  rationale: La partícula conjuntiva con preposición continúa la lista de disposiciones legales. En español, «y para» conserva esa función enumerativa y resulta natural sin añadir matices ajenos al hebreo.
- source_word: צָרַעַת
  english_pob_choice: a skin disease
  chosen_spanish: la sarna
  alternatives_spanish:
  - una enfermedad de la piel
  - la afección cutánea
  lexicon: HALOT
  rationale: En este versículo la afección se aplica a vestidura y casa, de modo que una traducción estrictamente clínica como «enfermedad de la piel» sería engañosa. «Sarna» mantiene la idea de una afección visible y contaminante, aunque no debe entenderse como diagnóstico médico moderno; por eso se explica en nota.
- source_word: הַבֶּגֶד
  english_pob_choice: a garment
  chosen_spanish: el vestido
  alternatives_spanish:
  - la prenda
  - el manto
  lexicon: HALOT
  rationale: El hebreo usa artículo definido, pero en español el sustantivo singular genérico queda bien con artículo definido en una enumeración legal. «Vestido» aquí funciona como prenda/vestidura y evita la vaguedad de «ropa».
- source_word: וְלַבָּיִת
  english_pob_choice: or in a house
  chosen_spanish: o de la casa
  alternatives_spanish:
  - y en la casa
  - o en una casa
  lexicon: HALOT
  rationale: El hebreo enlaza otro caso dentro de la misma categoría. En español, «o de la casa» reproduce la distribución del listado y expresa de manera natural que la afección puede pertenecer al ámbito de la casa.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el registro inglés; el texto inglés permanece sin cambios tras la última pasada, aunque el control cruzado marcó el caso para revisión por la amplitud semántica de צָרַעַת.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el Nombre divino.
  - Se evitó «lepra» en el texto principal para no restringir indebidamente צָרַעַת a una enfermedad clínica moderna; la nota preserva la tensión léxica tradicional.
  - Se eligió una formulación breve y legal, acorde con la estructura enumerativa del hebreo.
