  yaml_path: translation/nt/acts/007/035.yaml
  text: This Moses[a], whom they rejected, saying, ‘Who appointed you a ruler and a judge?’—this man God sent as both ruler and redeemer by the hand of the angel who appeared to him in the bush.
  footnotes:
  - marker: a
    text: Or 'deliverer.' The Greek term can denote one who brings release or liberation; 'redeemer' was chosen to preserve the redemption nuance.
    reason: lexical_alternative
translation:
  language: ko
  text: 바로 이 모세를 그들이 「누가 너를 통치자와 재판관으로 세웠느냐?」고 말하며 부인하였으나, 하나님께서 그를 떨기나무에서 그에게 나타난 천사의 손을 통하여 통치자와 구속자로[a] 보내셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 λυτρωτής는 「대속하여 풀어 주는 자」를 뜻하며, 출애굽의 해방의 무게를 담는다.
    reason: lexical_alternative
