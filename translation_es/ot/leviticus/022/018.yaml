translation:
  language: es
  text: 'Habla a Aarón y a sus hijos, y a todos los hijos de Israel, y diles: Cualquier hombre de la casa de Israel, o de los extranjeros residentes[a] en Israel, que presente su ofrenda por cualquiera de sus votos, o por cualquiera de sus ofrendas voluntarias[c][b], que ellos presenten a Yahvé como holocausto—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los residentes extranjeros en Israel». El hebreo גֵּר señala a un no israelita que vive entre Israel bajo su orden comunitario.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «todos los hijos de Israel»; en español también puede expresarse como «todos los israelitas».
    reason: lexical_alternative
  - marker: c
    text: O «por todas sus ofrendas votivas y por todas sus ofrendas voluntarias». La construcción hebrea puede entenderse de manera más específica como ofrendas asociadas a votos.
    reason: alternative_reading
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: Imperativo de la raíz דבר en registro legal y exhortativo. «Habla» conserva el tono formal de instrucción directa y es natural en español bíblico contemporáneo.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos
  - sus hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos», en este contexto sacerdotal se refiere a los descendientes masculinos de Aarón. «Sus hijos» mantiene la forma del original sin forzar una aclaración que el texto no explicita aquí.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todos los hijos de Israel
  - todos los israelitas
  lexicon: HALOT
  rationale: Se conserva la imagen genealógica y representativa del hebreo. «Hijos de Israel» es más transparente al texto fuente que «israelitas».
- source_word: אִישׁ אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Cualquier hombre
  alternatives_spanish:
  - Todo hombre
  - Quienquiera
  lexicon: HALOT
  rationale: La repetición distributiva expresa «cualquiera». En español, «Cualquier hombre» refleja el valor representativo masculino del hebreo sin perder naturalidad.
- source_word: מִבֵּית יִשְׂרָאֵל
  english_pob_choice: from the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de la casa de Israel
  - del pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión pactal «casa de Israel», que en español conserva mejor la carga histórica y teológica que una paráfrasis más general.
- source_word: הַגֵּר בְּיִשְׂרָאֵל
  english_pob_choice: the sojourners in Israel
  chosen_spanish: los extranjeros residentes en Israel
  alternatives_spanish:
  - el sojourner en Israel
  - el extranjero en Israel
  - el residente extranjero en Israel
  lexicon: HALOT
  rationale: גֵּר designa al no israelita que vive dentro de la comunidad. «Extranjeros residentes» comunica la función social y legal del término, evitando tanto «extranjero» a secas como «forastero», que serían más ambiguos.
- source_word: יַקְרִיב
  english_pob_choice: presents
  chosen_spanish: presente
  alternatives_spanish:
  - presente
  - traiga
  - ofrezca
  lexicon: HALOT
  rationale: El hiphil de קרב en contexto sacrificial es «presentar» una ofrenda ante Yahvé. «Presente» mantiene ese matiz técnico y el paralelismo con el inglés POB.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su ofrenda
  - su don
  - su sacrificio
  lexicon: HALOT
  rationale: קָרְבָּן es el término general de ofrenda. «Ofrenda» es la equivalencia española más clara y amplia, sin reducirlo a «sacrificio».
- source_word: לְכָל נִדְרֵיהֶם
  english_pob_choice: for any of their vows
  chosen_spanish: por cualquiera de sus votos
  alternatives_spanish:
  - por cualquiera de sus votos
  - por todos sus votos
  - para cualquiera de sus votos
  lexicon: HALOT
  rationale: Se mantiene la relación con los votos tal como aparece en el hebreo. «Por» conserva bien la conexión con la ofrenda que acompaña o cumple el voto.
- source_word: נִדְבוֹתָם
  english_pob_choice: their freewill offerings
  chosen_spanish: ofrendas voluntarias
  alternatives_spanish:
  - ofrendas voluntarias
  - ofrendas espontáneas
  lexicon: HALOT
  rationale: En lenguaje sacrificial, נְדָבָה es la ofrenda hecha de manera voluntaria. «Ofrendas voluntarias» es la opción estándar y precisa en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como «Yahvé» y no ocultarlo tras un título genérico.
- source_word: לְעֹלָה
  english_pob_choice: as a burnt offering
  chosen_spanish: como holocausto
  alternatives_spanish:
  - como holocausto
  - como ofrenda totalmente quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio que asciende en humo; en español bíblico, «holocausto» es el término técnico establecido y más conciso.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: to Yahweh
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al SEÑOR
  - a Yahvé
  rationale: El hebreo contiene el nombre propio del pacto. Siguiendo la norma del proyecto, se conserva como «Yahvé» para no enmascarar el nombre con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lenguaje masculino distributivo en אִישׁ אִישׁ
  english_pob_reading: Any man
  chosen_spanish_reading: Cualquier hombre
  alternative_spanish_readings:
  - Cualquier persona
  - Quienquiera
  rationale: El hebreo usa un distributivo masculino con valor representativo. «Cualquier hombre» mantiene esa forma sin volverla genérica de manera no motivada por el texto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Sentido de הַגֵּר בְּיִשְׂרָאֵל
  english_pob_reading: the sojourners in Israel
  chosen_spanish_reading: los extranjeros residentes en Israel
  alternative_spanish_readings:
  - los sojourners en Israel
  - los residentes extranjeros en Israel
  rationale: El término גֵּר no es simplemente «forastero», sino un no israelita integrado bajo el orden comunitario de Israel. La opción elegida comunica bien ese valor legal y social en español.
  doctrine_reference: HALOT, גֵּר
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la frase sobre el gēr para reflejar mejor el plural colectivo («sojourners in Israel»). En español se ha seguido esa dirección con «los extranjeros residentes en Israel», manteniendo el plural colectivo y la distinción legal del término. No se introdujeron cambios doctrinales adicionales respecto del nombre divino ni del registro legal del mandato.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se conserva «casa de Israel» como expresión pactal estable.
  - «Holocausto» se usa como término sacrificial técnico en español bíblico.
  - La puntuación final con raya indica que el versículo continúa, en paralelo con el texto fuente.
