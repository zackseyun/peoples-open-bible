translation:
  language: es
  text: 'Y él les dijo[a]: «Vuelvan a mí dentro de tres días». Y el pueblo se fue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todavía tres días, y vuelvan a mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר introduce discurso directo. En español, «Y él les dijo» conserva la secuencia narrativa y hace explícito el destinatario implícito del verbo de habla en este contexto.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos/ellas
  lexicon: HALOT
  rationale: El complemento indirecto plural queda naturalmente expresado con «les»; el referente está claro por el contexto de la conversación con el pueblo.
- source_word: עוֹד שְׁלֹשֶׁת יָמִים
  english_pob_choice: in three days
  chosen_spanish: dentro de tres días
  alternatives_spanish:
  - en tres días
  - todavía tres días
  - aún tres días
  lexicon: HALOT
  rationale: La hebra literal tiene el matiz de «todavía/otros tres días», pero el valor idiomático es un aplazamiento de tres días antes de volver. «Dentro de tres días» comunica ese sentido con naturalidad en español sin perder la demora temporal.
- source_word: וְשׁוּבוּ
  english_pob_choice: Come back
  chosen_spanish: Vuelvan
  alternatives_spanish:
  - Regresen
  - Vuelvan de regreso
  lexicon: HALOT
  rationale: El imperativo plural de שוב se rinde de forma natural con «vuelvan». Como el complemento «a mí» ya orienta el movimiento, no hace falta añadir más.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa de manera directa como «a mí», que es la construcción natural con el verbo de retorno.
- source_word: וַיֵּלֶךְ הָעָם
  english_pob_choice: So the people went away
  chosen_spanish: Y el pueblo se fue
  alternatives_spanish:
  - Y la gente se fue
  - Entonces el pueblo se retiró
  lexicon: HALOT
  rationale: El sustantivo colectivo הָעָם puede funcionar con sentido plural, pero en español «el pueblo» es la forma más sobria y fiel al referente colectivo. «Se fue» comunica el desplazamiento sin añadir matices no presentes.
translation_notes:
  revision_awareness: Se corrigió la falla de validación anterior anclando la nota de pie en el texto principal con el marcador [a]. El resto del versículo se mantiene alineado con el sentido idiomático y narrativo del hebreo y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «pueblo» como colectivo singular en español, en paralelo al hebreo.
  - Se evita «SEÑOR» o terminología teológica ajena al versículo, ya que no aparecen en el texto fuente.
  - La nota [a] preserva la alternativa literal útil para auditoría sin desplazar la traducción principal.
