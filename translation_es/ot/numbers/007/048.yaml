translation:
  language: es
  text: El séptimo día, el líder de los hijos de Efraín[a] fue Elisama, hijo de Amihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder para los hijos de Efraín». La preposición hebrea puede entenderse como de relación o de representación.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/יּוֹם הַ/שְּׁבִיעִי
  english_pob_choice: On the seventh day
  chosen_spanish: En el séptimo día
  alternatives_spanish:
  - El séptimo día
  - En día siete
  lexicon: HALOT
  rationale: La expresión temporal con ב + יום + ordinal se vierte naturalmente en español con «en». «El séptimo día» conserva el orden idiomático y el valor temporal del hebreo sin sonar calcado.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En Números 7 el término designa al cabeza representativo de la tribu que presenta la ofrenda. «Jefe» comunica bien la función de autoridad/representación en español, evitando «príncipe», que podría inducir un matiz nobiliario ajeno al contexto.
- source_word: לִ/בְנֵ֣י אֶפְרָ֑יִם
  english_pob_choice: of the sons of Ephraim
  chosen_spanish: de los hijos de Efraín
  alternatives_spanish:
  - para los hijos de Efraín
  - de la tribu de Efraín
  - de Efraín
  lexicon: HALOT
  rationale: Se mantiene la expresión filial hebrea con «hijos de Efraín», que preserva la referencia tribal y evita suavizarla en una paráfrasis más general. El valor relacional de ל en este contexto se expresa de forma natural con «de» en español.
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elisama
  alternatives_spanish:
  - Elishama
  lexicon: Convención onomástica española
  rationale: Se adapta el nombre a la forma usual en español bíblico, «Elisama», que es transparente y reconocible para lectores en español, sin alterar la identificación del personaje.
- source_word: בֶּן עַמִּיהֽוּד
  english_pob_choice: son of Ammihud
  chosen_spanish: hijo de Amihud
  alternatives_spanish:
  - el hijo de Amihud
  lexicon: HALOT
  rationale: La construcción patronímica se traduce de modo directo y natural con «hijo de», preservando la identificación genealógica sin añadir artículos innecesarios.
translation_notes:
  revision_awareness: El texto coincide en sustancia con el registro inglés auditado. No se documentan revisiones posteriores con impacto semántico; se conserva el orden y la función del sujeto tribal con una equivalencia española natural.
  spanish_consistency_notes:
  - Se mantiene la terminología tribal bíblica con «hijos de» para conservar la estructura del hebreo.
  - «Jefe» se usa aquí como equivalente funcional de נָשִׂיא en un contexto administrativo-tribal, no como título nobiliario.
  - Los nombres propios se presentan en forma española habitual cuando existe una convención establecida.
