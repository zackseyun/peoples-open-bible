translation:
  language: es
  text: Entonces Abraham alzó los ojos y miró, y he aquí, detrás de él[a], un carnero atrapado en el matorral[b] por sus cuernos. Abraham fue, tomó el carnero y lo ofreció en holocausto en lugar de su hijo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «detrás», sin el «de él» explícito; el hebreo אַחַר aquí es entendido por muchos traductores como un adverbio locativo.
    reason: lexical_alternative
  - marker: b
    text: O «en la espesura»; el hebreo describe vegetación densa y enredada.
    reason: lexical_alternative
  - marker: c
    text: O «en vez de su hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא ... עֵינָיו
  english_pob_choice: lifted up his eyes
  chosen_spanish: alzó los ojos
  alternatives_spanish:
  - levantó los ojos
  - alzó la vista
  lexicon: HALOT
  rationale: El hebreo usa un modismo narrativo para indicar que Abraham elevó la mirada. «Alzó los ojos» conserva esa textura idiomática sin sonar rígido en español.
- source_word: וַיַּרְא
  english_pob_choice: looked
  chosen_spanish: miró
  alternatives_spanish:
  - vio
  lexicon: HALOT
  rationale: Se mantiene la secuencia verbal con el gesto anterior («alzó los ojos y miró»), como en el audit trail inglés, para no comprimir indebidamente la acción.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - y resulta que
  lexicon: HALOT
  rationale: «He aquí» reproduce la función deíctica y de sorpresa del marcador hebreo sin convertirlo en una paráfrasis explicativa.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  lexicon: HALOT
  rationale: «Carnero» es el equivalente natural y preciso en español para el macho adulto de la oveja en contexto sacrificial.
- source_word: בַּסְּבַךְ
  english_pob_choice: in the thicket
  chosen_spanish: en el matorral
  alternatives_spanish:
  - en la espesura
  - en la maleza
  lexicon: HALOT
  rationale: «Matorral» comunica la idea de vegetación enredada y densa. Se evita «thicket» transliterado o una expresión demasiado literaria que oscurezca la imagen.
- source_word: בְּקַרְנָיו
  english_pob_choice: by its horns
  chosen_spanish: por sus cuernos
  alternatives_spanish:
  - con sus cuernos
  - entre sus cuernos
  lexicon: HALOT
  rationale: La preposición hebrea aquí expresa la manera o el medio por el que el carnero quedó atrapado. «Por sus cuernos» es natural y conserva esa relación instrumental/local.
- source_word: וַיַּעֲלֵהוּ לְעֹלָה
  english_pob_choice: offered it up as a burnt offering
  chosen_spanish: lo ofreció en holocausto
  alternatives_spanish:
  - lo ofreció como holocausto
  - lo elevó como holocausto
  lexicon: HALOT
  rationale: «Holocausto» es el término bíblico tradicional en español para עֹלָה, sacrificio totalmente quemado. Se mantiene la equivalencia sacrificial sin diluir el valor técnico del término.
- source_word: תַּחַת בְּנוֹ
  english_pob_choice: instead of his son
  chosen_spanish: en lugar de su hijo
  alternatives_spanish:
  - en vez de su hijo
  - sustituyendo a su hijo
  lexicon: HALOT
  rationale: La preposición תַּחַת tiene fuerza sustitutiva real en este contexto. «En lugar de» expresa claramente esa sustitución sin añadir elaboración doctrinal.
theological_decisions:
- issue: Fuerza sustitutiva de תַּחַת בְּנוֹ
  english_pob_reading: instead of his son
  chosen_spanish_reading: en lugar de su hijo
  alternative_spanish_readings:
  - en vez de su hijo
  rationale: Se conserva el sentido de reemplazo/substitución que el hebreo expresa en la escena. No se explicita una teoría sacrificial posterior; la redacción permanece en el nivel narrativo del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla fuera del pasaje.
translation_notes:
  revision_awareness: 'El inglés POB opta por una solución de equivalencia óptima: «lifted up his eyes and looked», «behold», «ram», «in the thicket», y el sustitutivo «instead of his son». La versión española sigue ese patrón, manteniendo la secuencia narrativa y la fuerza sustitutiva, sin introducir glosas doctrinales ni resolver ambigüedades que el texto no resuelve.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente es el nombre divino; este versículo no lo contiene.
  - «Holocausto» se conserva por ser el término sacrificial técnico más reconocido en español y fiel a עֹלָה.
  - Se evita «SEÑOR» porque no hay aquí un sustituto reverencial para el nombre divino.
  - «Carnero» se prefiere a «macho de oveja» por naturalidad y precisión en español bíblico.
  - La construcción «alzó los ojos y miró» mantiene el paralelismo narrativo con el audit trail inglés.
