id: 2CO.3.3
reference: 2 Corinthians 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: φανερούμενοι ὅτι ἐστὲ ἐπιστολὴ Χριστοῦ διακονηθεῖσα ὑφ’ ἡμῶν, ἐγγεγραμμένη οὐ μέλανι ἀλλὰ πνεύματι θεοῦ ζῶντος, οὐκ ἐν πλαξὶν λιθίναις ἀλλ’ ἐν πλαξὶν καρδίαις σαρκίναις.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/003.yaml
  text: showing that you are a letter from the Messiah, ministered by us, written not with ink but with the Spirit of the living God, not on stone tablets but on tablets of hearts of flesh.
  footnotes:
  - marker: a
    text: Or 'a letter of Christ.' The Greek genitive can be read more literally that way; the main text renders the likely sense of source/authorship as 'from the Messiah.'
    reason: alternative_reading
  - marker: b
    text: '''Messiah'' translates the title Χριστός; traditionally, ''Christ.'''
    reason: lexical_alternative
  - marker: c
    text: '''Hearts of flesh'' echoes Old Testament new-covenant imagery, especially Ezekiel 11:19 and 36:26.'
    reason: cross_reference
  - marker: d
    text: Or 'tablets of hearts of flesh'.
    reason: previous_rendering
translation:
  language: ko
  text: 여러분이 메시아의 편지임이 분명히 드러납니다. 그것은 우리의 사역으로 된 것이며, 먹으로 쓴 것이 아니라 살아 계신 하나님의 영으로 쓴 것이요, 돌판에 쓴 것이 아니라 살로 된 마음 판에 쓴 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διακονηθεῖσα
  english_pob_choice: ministered
  chosen_korean: 사역으로 되다
  alternatives_korean:
  - 수종으로 된
  lexicon: BDAG
  rationale: διακονέω는 본 장의 핵심 어휘. 「사역」으로 옮긴다.
- source_word: μέλανι
  english_pob_choice: ink
  chosen_korean: 먹
  alternatives_korean: []
  lexicon: BDAG
  rationale: 고대의 검은 잉크. 한국어 「먹」이 자연스럽다.
- source_word: πνεύματι θεοῦ ζῶντος
  english_pob_choice: the Spirit of the living God
  chosen_korean: 살아 계신 하나님의 영
  alternatives_korean:
  - 살아 계신 하나님의 성령
  lexicon: BDAG
  rationale: 본 절은 하나님의 영을 분명히 가리키나, 1세기 비-대문자화 원칙을 유지하여 「영」으로 옮긴다.
- source_word: πλαξὶν λιθίναις / σαρκίναις
  english_pob_choice: stone tablets / hearts of flesh
  chosen_korean: 돌판 / 살로 된 마음 판
  alternatives_korean: []
  lexicon: BDAG
  rationale: 출 31:18과 겔 11:19, 36:26의 인유. 새 언약의 정형 대비.
