translation:
  language: es
  text: Y será una señal en tu mano y frontales[a] entre tus ojos[b], porque con mano poderosa Yahvé nos sacó de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandas»; tradicionalmente, «filacterias». El término hebreo es raro y probablemente se refiere a algo que se llevaba en la frente como recordatorio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre tus ojos», un modismo que a menudo se entiende como «sobre tu frente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y será que
  - Y acontecerá
  lexicon: HALOT
  rationale: En español, “será” conserva el valor futuro/resultativo de la fórmula hebrea sin sonar artificial; “y” mantiene el enlace con la exhortación previa.
- source_word: לְאוֹת
  english_pob_choice: as a sign
  chosen_spanish: como una señal
  alternatives_spanish:
  - como un signo
  - para una señal
  lexicon: HALOT
  rationale: '“Señal” es natural en español bíblico y refleja היטב el valor de אוֹת sin perder la amplitud semántica de “sign”. '
- source_word: עַל יָדְכָה
  english_pob_choice: on your hand
  chosen_spanish: sobre tu mano
  alternatives_spanish:
  - en tu mano
  - sobre tu brazo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo “mano”; “sobre” suena idiomático en español para un objeto colocado encima, sin convertirlo en “brazo” ni resolverlo interpretativamente.
- source_word: וּלְטוֹטָפֹת
  english_pob_choice: as frontlets
  chosen_spanish: como frontales
  alternatives_spanish:
  - como frontlets
  - como bandas
  - como filacterias
  lexicon: HALOT
  rationale: “Frontales” permite conservar la referencia a algo puesto en la frente sin introducir de entrada el término técnico posterior “filacterias”; mantiene la tensión lexical documentada en el POB inglés.
- source_word: בֵּין עֵינֶיךָ
  english_pob_choice: between your eyes
  chosen_spanish: entre tus ojos
  alternatives_spanish:
  - sobre tu frente
  - en tu frente
  lexicon: HALOT
  rationale: Se mantiene la formulación literal del hebreo para no cerrar la ambigüedad entre imagen literal e interpretación idiomática; la opción “frente” queda como alternativa implícita pero no principal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la base explicativa de la señal; “porque” es la conjunción causal más clara y fluida en español.
- source_word: בְּחֹזֶק יָד
  english_pob_choice: with a strong hand
  chosen_spanish: con mano poderosa
  alternatives_spanish:
  - con mano fuerte
  - con mano vigorosa
  - con poderosa mano
  lexicon: HALOT
  rationale: “Mano poderosa” comunica la fuerza eficaz del modismo hebreo y suena más natural y solemne en español que un calco como “mano fuerte”; preserva la fuerza divina del pasaje.
- source_word: הוֹצִיאָנוּ
  english_pob_choice: brought us out
  chosen_spanish: nos sacó
  alternatives_spanish:
  - nos hizo salir
  - nos sacó fuera
  lexicon: HALOT
  rationale: El hifil de יצא se expresa de forma idiomática en español con “sacar”; “nos sacó” es breve, claro y plenamente fiel al sentido de éxodo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se aplica el término normativo del proyecto en español para el nombre divino, manteniendo la transparencia frente a sustituciones por título.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: “De Egipto” es la forma más natural en español tras “nos sacó” y conserva el movimiento de salida sin sobrecargar el sintagma.
theological_decisions:
- issue: Cómo traducir el lenguaje de la mano y los ojos sin resolver si alude a un objeto ritual concreto o a una imagen memorística
  english_pob_reading: Retain the concrete imagery literally in the main text ('on your hand' / 'frontlets between your eyes')
  chosen_spanish_reading: Conservar la imaginería concreta en el texto principal (“sobre tu mano” / “entre tus ojos”), sin introducir “filacterias” en la línea principal
  alternative_spanish_readings:
  - Interpretar explícitamente como “filacterias” en el texto principal
  - Parafrasear como mero recordatorio simbólico
  rationale: El hebreo usa una imagen concreta y ambigua; traducirla literalmente preserva la tensión documentada por el POB inglés entre objeto ritual, signo visible y memoria. La glosa “frontales” evita cerrar la interpretación.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de concordancia general fue alto, con observaciones menores únicamente. Se mantuvo la decisión del POB inglés de conservar la imaginería literal y la ambigüedad lexical de טוֹטָפֹת.
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה.
  - Se evita “Señor” como sustituto del nombre divino, de acuerdo con la norma del proyecto.
  - Se mantiene el singular concreto “mano” en lugar de “brazo”, siguiendo el hebreo.
  - Se conserva la tensión entre lectura literal e interpretativa en la expresión “entre tus ojos” mediante nota.
  - “Frontales” funciona aquí como término provisional y auditable, no como equivalencia técnica cerrada.
