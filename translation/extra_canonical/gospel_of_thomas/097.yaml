    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: Coptic ⲛⲟⲉⲓⲧ can mean ‘meal’ or ‘flour’; either is possible in household
        context.
      reason: lexical_alternative
    - marker: b
      text: ⲙⲁⲁϫⲉ is the vessel’s handle; some propose ‘strap’ where jars were carried
        with a sling.
      reason: lexical_alternative
    - marker: c
      text: NHAM02.49/lb 10 reads ⲉⲥⲟⲩⲏⲟⲩ, often taken as ‘while she was still far
        [from home].’ Dilley normalizes to ⲉⲣⲉⲛⲧⲟⲥⲟⲩⲉ; the translation reflects the
        normalized reading but the ‘far’ nuance is a plausible alternative.
      reason: lacuna_or_restoration
    - marker: d
      text: The double awareness clauses ‘she did not know it’ (ⲛⲉⲣⲉⲛⲧⲟⲥⲥⲟⲟⲩⲛ ⲁⲛ ⲡⲉ)
        and ‘she had not noticed’ (ⲛⲉⲣⲉⲙⲡⲉⲛⲧⲟⲥⲉⲓⲙⲉ ⲉϩⲓⲥⲉ) are typical Thomasine terseness;
        ⲉϩⲓⲥⲉ here marks the event-time of the unnoticed spilling rather than adding
        new content.
      reason: dialect_note
    - marker: e
      text: The last clause could be rendered ‘she found it had become empty,’ treating
        ϣⲟⲩⲟ adjectivally with a resultative sense.
      reason: lexical_alternative
    - marker: f
      text: Or 'As she was walking on the road, the jar’s handle broke and the meal
        spilled out behind her along the road. She did not know it and had not noticed.'.
      reason: previous_rendering
