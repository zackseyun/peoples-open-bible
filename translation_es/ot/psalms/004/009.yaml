translation:
  language: es
  text: En paz, a la vez[a] me acostaré y dormiré, porque tú solo, Yahvé[b], me haces habitar seguro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En paz, juntamente me acostaré y dormiré»; el adverbio hebreo puede significar «juntamente» o «por completo», pero aquí se vierte de modo idiomático como «a la vez» con los dos verbos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque tú, Yahvé, me haces habitar solo y seguro». El hebreo puede entenderse de modo que «solo» describa la morada del salmista, aunque el texto principal toma la palabra con «tú» como la lectura más natural.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּשָׁלוֹם
  english_pob_choice: In peace
  chosen_spanish: En paz
  alternatives_spanish:
  - Con paz
  - En bienestar
  - En plenitud
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y wholeness. 'En paz' es la opción más natural y fiel en español para este contexto de descanso confiado.
- source_word: יַחְדָּו
  english_pob_choice: both
  chosen_spanish: —
  alternatives_spanish:
  - juntos
  - a la vez
  - por completo
  lexicon: HALOT
  rationale: El POB inglés integra el adverbio en la coordinación 'lie down and sleep' con 'both ... and ...'. En español, la coordinación simple 'me acostaré y dormiré' comunica bien el valor intensivo/total del adverbio sin forzar una construcción artificial.
- source_word: אֶשְׁכְּבָה
  english_pob_choice: I will lie down
  chosen_spanish: me acostaré
  alternatives_spanish:
  - me acostaré a dormir
  - me tenderé
  lexicon: HALOT
  rationale: El imperfecto expresa decisión/confianza futura. 'Me acostaré' es la forma natural y directa en español, y mantiene el matiz volitivo.
- source_word: וְאִישָׁן
  english_pob_choice: and sleep
  chosen_spanish: y dormiré
  alternatives_spanish:
  - y conciliaré el sueño
  - y me dormiré
  lexicon: HALOT
  rationale: ישן en qal significa 'dormir'. 'Dormiré' es más sobrio y poético que 'conciliaré el sueño', y evita añadir un matiz no requerido por el texto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del descanso pacífico. 'Porque' expresa de forma clara y natural la causalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: לְבָדָד
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - en soledad
  - a solas
  lexicon: HALOT
  rationale: El POB inglés toma el término con 'you'. En español, 'tú solo' preserva esa lectura natural y exclusiva, sin convertirlo en una descripción del sujeto que duerme.
- source_word: לָבֶטַח
  english_pob_choice: in safety
  chosen_spanish: en seguridad
  alternatives_spanish:
  - con seguridad
  - seguro
  - en paz
  lexicon: HALOT
  rationale: בֶּטַח denota seguridad/protección. 'En seguridad' mantiene el sentido concreto de habitar protegido y resulta idiomático en español bíblico contemporáneo.
- source_word: תּוֹשִׁיבֵנִי
  english_pob_choice: make me dwell
  chosen_spanish: me haces habitar
  alternatives_spanish:
  - me haces morar
  - me estableces
  - me causes a habitar
  lexicon: HALOT
  rationale: El hifil de ישׁב es causativo. 'Me haces habitar' conserva esa fuerza sin sonar arcaico; 'me causas a habitar' sería más literal pero menos natural.
theological_decisions:
- issue: Alcance de לְבָדָד
  english_pob_reading: God alone is the one who causes the psalmist to dwell securely.
  chosen_spanish_reading: Tú solo, Yahvé, eres quien me haces habitar en seguridad.
  alternative_spanish_readings:
  - Yo habitaré solo en seguridad.
  - Solo en seguridad me haces habitar.
  rationale: La sintaxis y el paralelismo favorecen vincular 'solo' con Dios, no con el hablante. 'Tú solo' preserva la dependencia exclusiva de Yahvé sin añadir una doctrina extra al versículo.
  doctrine_reference: Salmo 4:9; cf. confianza exclusiva en Yahvé en el salterio
