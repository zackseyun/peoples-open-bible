    text: O «el mensajero de Yahvé». La palabra hebrea puede significar tanto «mensajero» como «ángel»; en este contexto se refiere a una figura sobrenatural.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y corrección del español sin alterar el significado fuente: «no se volvió a aparecer» → «no volvió a aparecer». Se conserva todo lo demás, incluida la nota léxica sobre «mensajero/ángel».'
