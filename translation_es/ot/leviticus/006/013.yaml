revisions:
- from: 'Este es[a] el sacrificio de Aarón y de sus hijos, que ellos presentarán a Yahvé[b] el día de su unción: la décima parte de un efa de flor de harina como ofrenda[c] regular de cereal, la mitad de ella por la mañana y la mitad de ella por la tarde.'
  to: 'Esta es la ofrenda de Aarón y de sus hijos, que ellos presentarán a Yahvé el día de su unción[a]: la décima parte de un efa de flor de harina como ofrenda regular de cereal, la mitad de ella por la mañana y la mitad de ella por la tarde.'
  rationale: Se corrige 'sacrificio' a 'ofrenda' para reflejar mejor קָרְבַּן, y se incorpora 'de cereal' al texto principal para representar explícitamente מִנְחָה conforme al original y a la auditoría inglesa. Se eliminan notas no esenciales y se conserva una sola nota útil sobre la tensión del pronombre singular en la frase de la unción.
