translation:
  language: es
  text: 'Y he aquí[a], gozo y alegría, matando ganado y degollando ovejas, comiendo carne y bebiendo vino: «Comamos y bebamos, porque mañana moriremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Comer y beber», preservando la fuerza breve y casi formular de la consigna hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y miren
  - Y vean
  - Y he aquí
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica de הִנֵּה y el enlace discursivo del וְ inicial, en un registro formal y natural para el español bíblico contemporáneo.
- source_word: שָׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  - júbilo
  lexicon: HALOT
  rationale: Mantiene el matiz de alegría exuberante sin volver el español demasiado coloquial; además se equilibra bien con el término siguiente.
- source_word: וְשִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  - contento
  lexicon: HALOT
  rationale: Como pares cercanos en hebreo, שָׂשׂוֹן y שִׂמְחָה funcionan casi como hendiadys de festividad; en español, 'gozo y alegría' comunica esa duplicación sin forzar una distinción artificial.
- source_word: הָרֹג בָּקָר
  english_pob_choice: killing cattle
  chosen_spanish: matando ganado
  alternatives_spanish:
  - matando reses
  - sacrificando ganado
  - degollando ganado
  lexicon: HALOT
  rationale: '''Ganado'' reproduce bien בָּקָר en un contexto de animales para consumo; ''matando'' conserva la secuencia verbal de actividad festiva sin añadir interpretación ritual.'
- source_word: וְשָׁחֹט צֹאן
  english_pob_choice: slaughtering sheep
  chosen_spanish: sacrificando ovejas
  alternatives_spanish:
  - degollando ovejas
  - matando ovejas
  - sacrificando ganado menor
  lexicon: HALOT
  rationale: שָׁחַט puede ser 'sacrificar' o 'degollar'; en este contexto de banquete, 'sacrificando' expresa la acción de preparación para consumo y mantiene la paralela con el miembro anterior.
- source_word: אָכֹל בָּשָׂר
  english_pob_choice: eating meat
  chosen_spanish: comiendo carne
  alternatives_spanish:
  - comiendo carne de res
  - comiendo carne
  - comiendo carne animal
  lexicon: HALOT
  rationale: '''Carne'' es el equivalente natural de בָּשָׂר en un contexto alimentario en español, y evita la literalidad poco idiomática de ''flesh''.'
- source_word: וְשָׁתוֹת יָיִן
  english_pob_choice: drinking wine
  chosen_spanish: y bebiendo vino
  alternatives_spanish:
  - y tomando vino
  - y bebiendo vino
  - y a beber vino
  lexicon: HALOT
  rationale: Conserva la coordinación de la lista de acciones y el objeto concreto יָיִן con un español claro y directo.
- source_word: אָכוֹל וְשָׁתוֹ
  english_pob_choice: Let us eat and drink
  chosen_spanish: Comamos y bebamos
  alternatives_spanish:
  - Comamos y bebamos
  - ¡A comer y beber!
  - Comed y bebed
  lexicon: HALOT
  rationale: En este contexto la forma hebrea funciona como eslogan citado; el subjuntivo exhortativo español transmite mejor la invitación colectiva que un infinitivo literal.
- source_word: כִּי מָחָר נָמוּת
  english_pob_choice: for tomorrow we die
  chosen_spanish: porque mañana moriremos
  alternatives_spanish:
  - porque mañana morimos
  - pues mañana moriremos
  - porque mañana vamos a morir
  lexicon: HALOT
  rationale: El futuro español conserva la sentencia proverbial y la inevitabilidad del dicho sin perder naturalidad.
theological_decisions:
- issue: Si la escena debe sonar moralmente condenatoria dentro del versículo
  english_pob_reading: Render the activities descriptively without adding condemnatory adjectives
  chosen_spanish_reading: Describir las acciones sin adjetivos interpretativos condenatorios
  alternative_spanish_readings:
  - añadir 'revelía pecaminosa'
  - añadir 'fiesta disoluta'
  - añadir 'banquete impío'
  rationale: El hebreo presenta una escena de festín fatalista; la reprensión profética pertenece al contexto circundante y no debe injertarse en el versículo mismo.
  doctrine_reference: 'Principio de traducción: no introducir juicios doctrinales o evaluativos que el texto no exprese explícitamente.'
translation_notes:
  revision_awareness: El texto inglés revisado optó por 'behold' en lugar de 'look' para un registro más formal y más cercano a הִנֵּה; la versión española refleja esa misma formalidad con 'he aquí' y mantiene intacta la estructura enumerativa y la cita proverbial final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en otros contextos donde corresponda, pero este versículo no contiene el nombre divino.
  - Se prefirió 'carne' para בָּשָׂר por ser el equivalente natural en contexto alimentario.
  - Se mantuvo la cita en primera persona plural con valor proverbial, no como mandato directo al lector.
  - No se añadió lenguaje moralizante; la condena depende del contexto inmediato de Isaías 22, no de una inserción traductiva en este versículo.
