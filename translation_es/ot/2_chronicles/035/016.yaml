  glossary_alignment: Se respeta correctamente el nombre divino como 'Yahvé'. No hay conflictos con la terminología doctrinal principal. La revisión propuesta alinea mejor עֲבוֹדָה con el valor cultual documentado en el English POB ('service of Yahweh').
