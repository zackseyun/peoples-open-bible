translation:
  language: es
  text: Y porque dijeron que se dejara el tocón del árbol con sus raíces[a], tu reino seguirá siendo tuyo, desde que llegues a saber que el Cielo gobierna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las raíces del árbol». El arameo describe la base que queda del árbol talado; «el tocón del árbol con sus raíces» expresa con claridad esa imagen en español.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְדִי
  english_pob_choice: And because
  chosen_spanish: Y porque
  alternatives_spanish:
  - Y ya que
  - Y dado que
  lexicon: HALOT
  rationale: La combinación conjuntiva introduce una relación causal o explicativa con lo anterior; «porque» expresa mejor esa fuerza que un simple «y» coordinante.
- source_word: אֲמַרוּ
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - se dijo
  - fue dicho
  lexicon: HALOT
  rationale: El perfecto peal es activo; en español conviene conservar el sujeto tácito plural con un verbo activo, como hace la lectura inglesa auditada.
- source_word: לְמִשְׁבַּק
  english_pob_choice: to leave
  chosen_spanish: dejar
  alternatives_spanish:
  - permitir que quede
  - dejar permanecer
  lexicon: HALOT
  rationale: «Dejar» reproduce con naturalidad el valor de «leave» en este contexto de no destruir el resto del árbol.
- source_word: עִקַּר שָׁרְשׁוֹהִי
  english_pob_choice: the stump of the tree with its roots
  chosen_spanish: el tocón del árbol con sus raíces
  alternatives_spanish:
  - el tronco con sus raíces
  - la base del árbol con sus raíces
  lexicon: HALOT
  rationale: La imagen apunta al resto del árbol talado; «tocón» comunica en español la base que queda, y «con sus raíces» conserva el matiz explícito de la expresión aramea.
- source_word: דִּי אִילָנָא
  english_pob_choice: of the tree
  chosen_spanish: del árbol
  alternatives_spanish:
  - del árbol aquel
  - que es del árbol
  lexicon: HALOT
  rationale: La relación de pertenencia o especificación se expresa de forma natural con «del árbol»; no hace falta sobre-explicar la aposición.
- source_word: מַלְכוּתָךְ לָךְ קַיָּמָה
  english_pob_choice: your kingdom will remain yours
  chosen_spanish: tu reino te quedará perteneciendo
  alternatives_spanish:
  - tu reino permanecerá siendo tuyo
  - tu reino quedará para ti
  lexicon: HALOT
  rationale: La construcción aramea afirma permanencia/restauración de la realeza. «Te quedará perteneciendo» intenta mantener la fuerza posesiva y durativa, aunque suene menos idiomático; se prefiere esta forma para no diluir el sentido de permanencia real de la expresión.
- source_word: מִן דִּי
  english_pob_choice: from the time that
  chosen_spanish: desde que
  alternatives_spanish:
  - a partir de que
  - desde el momento en que
  lexicon: HALOT
  rationale: La locución marca el punto temporal a partir del cual se cumple la continuidad del reino; «desde que» es la forma breve y fiel en español.
- source_word: תִנְדַּע
  english_pob_choice: you know
  chosen_spanish: llegues a saber
  alternatives_spanish:
  - sepas
  - reconozcas
  lexicon: HALOT
  rationale: El verbo es «saber/conocer», pero el contexto incluye reconocimiento efectivo. «Llegues a saber» conserva el valor cognitivo sin forzar una interpretación más doctrinal de la cuenta.
- source_word: שַׁלִּטִן
  english_pob_choice: rules
  chosen_spanish: gobierna
  alternatives_spanish:
  - reina
  - tiene dominio
  lexicon: HALOT
  rationale: La forma predicativa expresa soberanía; «gobierna» suena natural en español y mantiene la idea de autoridad efectiva sin introducir una formulación eclesiástica ajena.
- source_word: שְׁמַיָּא
  english_pob_choice: Heaven
  chosen_spanish: el Cielo
  alternatives_spanish:
  - los cielos
  - el Cielo
  lexicon: HALOT
  rationale: En Daniel, «los cielos» puede funcionar como circunlocución reverencial de la autoridad divina. En español, «el Cielo» capitalizado preserva ese matiz metonímico sin convertirlo en una paráfrasis explícita de «Dios».
theological_decisions:
- issue: Cómo rendir שְׁמַיָּא como circunlocución reverencial
  english_pob_reading: Heaven rules
  chosen_spanish_reading: el Cielo gobierna
  alternative_spanish_readings:
  - los cielos gobiernan
  - Dios gobierna
  rationale: 'Se conserva la tensión teológica del arameo: la expresión habla del soberano dominio divino sin nombrarlo directamente. «El Cielo» capitalizado mantiene el valor reverencial y evita resolver demasiado pronto la metonimia.'
  doctrine_reference: Preservar la circunlocución reverencial y la primacía del idioma fuente.
- issue: Cómo expresar la permanencia del reino en la cláusula posesiva
  english_pob_reading: your kingdom will remain yours
  chosen_spanish_reading: tu reino te quedará perteneciendo
  alternative_spanish_readings:
  - tu reino permanecerá siendo tuyo
  - tu reino quedará para ti
  rationale: La frase busca reflejar tanto la permanencia como la posesión garantizada. Se optó por una formulación que conserve la relación posesiva del original, aunque sea menos idiomática que otras opciones.
  doctrine_reference: Mantener la fuerza semántica de קַיָּמָה sin aplanarla a una simple promesa genérica.
translation_notes:
  revision_awareness: El inglés auditado revisó «will remain for you» a «will remain yours» para hacer más natural la posesión en la meta; la presente versión española intenta sostener esa misma naturalidad semántica mientras conserva la fuerza de permanencia de קַיָּמָה y la circunlocución reverencial de שְׁמַיָּא. Se mantuvo la decisión de traducir el verbo final con un predicado de soberanía y no con una paráfrasis explícita de «Dios», siguiendo el criterio de no borrar la tensión teológica documentada.
  spanish_consistency_notes:
  - Se usa «Cielo» capitalizado para la circunlocución reverencial, coherente con la política POB de no ocultar el término fuente.
  - «tocón» se emplea para la imagen arbórea; no se sustituye por un término más interpretativo como «raíz» o «base» solamente.
  - Se evita «SEÑOR» como sustituto automático del nombre divino, porque aquí el arameo habla de «cielos/Cielo» como metonimia.
  - La redacción procura ser publicable en español moderno sin desprenderse del valor causal, posesivo y temporal del texto arameo.
