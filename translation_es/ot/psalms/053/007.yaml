review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: deseo optativo, salvación procedente de Sion, restauración por Dios y paralelismo Jacob/Israel. Sin embargo, en la segunda mitad se aparta del tono volitivo documentado por el POB: יָגֵל / יִשְׂמַח, tras la apertura optativa, deben conservarse como deseo/jusivo (''que Jacob se alegre; que Israel se goce/esté alegre'') más que como futuro predictivo (''se alegrará... se gozará''). La nota al pie también está mal anclada: el marcador [a] aparece en ''¡Oh[a]...'' pero el contenido de la nota explica שׁוּב שְׁבוּת, no מִי יִתֵּן.'
  spanish_quality_summary: El español es generalmente claro y digno. 'de Sion' y 'la salvación de Israel' son naturales. 'la suerte de su pueblo' es una opción válida para el modismo, aunque 'restaura la suerte' suena un poco menos habitual que 'restaura la fortuna/las circunstancias'; aun así, es aceptable y fiel. El principal problema de legibilidad/fidelidad es el cambio innecesario al futuro indicativo en la cláusula final. Además, la nota necesita reubicarse en la frase pertinente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: אֱלֹהִים se traduce correctamente como ''Dios''; no aparecen Yahvé, Mesías, δοῦλος, etc. ''Sion'' es una forma española aceptable para צִיּוֹן. La decisión idiomática para שׁוּב שְׁבוּת concuerda con el razonamiento teológico del POB, pero la nota debe reflejar mejor las alternativas inglesas y anclarse en la expresión relevante.'
  issues:
  - severity: high
    issue: Los verbos finales se traducen como futuro indicativo ('se alegrará... se gozará') en vez de mantener el matiz optativo/jusivo.
    rationale: El rastro léxico inglés documenta explícitamente 'let Jacob rejoice; let Israel be glad' por continuidad con la apertura optativa מִי יִתֵּן. El futuro español convierte el ruego en predicción, alterando el tono de la oración.
  - severity: medium
    issue: La nota [a] está anclada en '¡Oh!' pero su contenido corresponde al modismo 'cuando Dios restaure la suerte/cautividad de su pueblo'.
    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase relevante. Tal como está, induce a pensar que la nota explica מִי יִתֵּן en vez de שׁוּב שְׁבוּת.
  - severity: low
    issue: La redacción de la nota al pie es mejorable en español.
    rationale: '''restauración de la desgracia'' es poco natural y semánticamente confuso; debe decir ''restauración desde la desgracia'' o mejor ''reversión de una situación de aflicción/desgracia''. También conviene reflejar la alternativa ''restaura a su pueblo cautivo'' del expediente inglés.'
  revised_spanish_text: ¡Oh, que la salvación de Israel viniera de Sion! Cuando Dios restaure la suerte[a] de su pueblo, que Jacob se alegre; que Israel se goce.
  revised_footnotes:
  - marker: a
    text: 'O: «Cuando Dios haga volver la cautividad de su pueblo» o «Cuando Dios restaure a su pueblo cautivo». El modismo hebreo puede denotar la restauración desde una situación de aflicción en general, a menudo incluyendo el regreso del cautiverio.'
    reason: alternative_reading
  revision_rationale: Se corrige el tono verbal de la segunda mitad para preservar el deseo/oración del hebreo y del POB auditado, y se reubica la nota al modismo que realmente explica. Se mantiene 'la suerte de su pueblo' como opción principal por su amplitud idiomática en español, con una nota más natural y más fiel a las alternativas documentadas.
