translation:
  language: es
  text: Entonces el límite bajará desde Sefam hasta Ribla, al oriente de Ain[a]; y el límite bajará y llegará hasta el hombro del mar de Quinéret al oriente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al este de Ain». La expresión hebrea puede entenderse más literalmente como una ubicación al este de Ain.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «llegará al hombro del mar de Quinéret»; «hombro» aquí designa el costado o la pendiente del terreno junto al mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד
  english_pob_choice: shall go down
  chosen_spanish: bajará
  alternatives_spanish:
  - descenderá
  - irá bajando
  lexicon: HALOT
  rationale: En descripciones de fronteras, ירד expresa descenso topográfico o avance a lo largo de una línea de linde. «Bajará» conserva la idea direccional de descenso con español natural y sobrio.
- source_word: הַגְּבֻל / הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: גְּבוּל puede traducirse como «límite» o «frontera». Aquí el contexto territorial y descriptivo hace natural «límite», que mantiene el registro legal-geográfico sin sonar demasiado moderno o militar.
- source_word: מִשְּׁפָם
  english_pob_choice: from Shepham
  chosen_spanish: desde Sefam
  alternatives_spanish:
  - desde Shefam
  - desde Séfam
  lexicon: HALOT
  rationale: Es nombre propio; se translitera al español con una forma clara y pronunciable. «Sefam» evita la grafía inglesa y mantiene cercanía fonética.
- source_word: הָרִבְלָה
  english_pob_choice: to Riblah
  chosen_spanish: hasta Ribla
  alternatives_spanish:
  - a Ribla
  - hasta Reblá
  lexicon: HALOT
  rationale: Es topónimo. En la secuencia de movimiento de un límite, «hasta» comunica bien el tramo que llega a ese punto. «Ribla» sigue la forma hispana breve y estable.
- source_word: מִקֶּדֶם לָעָיִן
  english_pob_choice: east of Ain
  chosen_spanish: al oriente de Ain
  alternatives_spanish:
  - al este de Ain
  - a oriente de Ain
  lexicon: HALOT
  rationale: מִקֶּדֶם marca localización oriental. «Al oriente de» es idiomático en español bíblico contemporáneo y conserva la relación espacial sin añadir más que lo necesario.
- source_word: וּמָחָה
  english_pob_choice: reach
  chosen_spanish: llegará hasta
  alternatives_spanish:
  - tocará
  - alcanzará
  lexicon: HALOT
  rationale: En contexto de linderos, מחה expresa que la frontera llega a un punto o lo toca. «Llegará hasta» conserva el sentido de término/contacto de manera natural en español.
- source_word: עַל כֶּתֶף
  english_pob_choice: the shoulder of
  chosen_spanish: el hombro de
  alternatives_spanish:
  - la ladera de
  - el flanco de
  lexicon: HALOT
  rationale: כֶּתֶף literalmente es «hombro», y aquí la POB inglesa preserva esa imagen con nota. En español se mantiene «hombro» para no borrar la metáfora geográfica del hebreo, aunque aluda al costado o pendiente del terreno.
- source_word: יָם כִּנֶּרֶת
  english_pob_choice: the Sea of Kinnereth
  chosen_spanish: el mar de Quinéret
  alternatives_spanish:
  - el mar de Kinneret
  - el mar de Quineret
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo del cuerpo de agua, tal como hace la POB inglesa. «Quinéret» adapta la transliteración al español y mantiene el toponímico bíblico, en vez de sustituirlo por un nombre tradicional posterior.
- source_word: קֵדְמָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - orientalmente
  lexicon: HALOT
  rationale: El adverbio indica orientación oriental respecto del mar. «Hacia el oriente» conserva el movimiento/dirección y funciona bien con el alcance del límite.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: No aparece el Tetragrámaton ni un título divino en este versículo.
  chosen_spanish_reading: No se introduce ninguna referencia divina.
  alternative_spanish_readings:
  - No aplica
  rationale: El versículo es un enunciado geográfico. No hay decisión teológica especial sobre el nombre divino en esta unidad.
  doctrine_reference: N/A
- issue: Valor de la metáfora geográfica "shoulder"
  english_pob_reading: '''shoulder'' here refers to the side or slope of the terrain by the sea.'
  chosen_spanish_reading: Se conserva «hombro» en el texto, sin ocultar la imagen corporal aplicada al relieve.
  alternative_spanish_readings:
  - ladera
  - flanco
  - pendiente
  rationale: La POB inglesa conserva la metáfora y la explica en nota. En español se mantiene la imagen para ser fiel al hebreo y para que la nota pueda aclarar el valor topográfico sin borrar la tensión léxica.
  doctrine_reference: Principio de equivalencia óptima y transparencia textual
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir una relación espacial directa para מִקֶּדֶם y conservar la metáfora más literal de כֶּתֶף como «hombro», evitando suavizarla a «ladera» en el texto principal. Se mantuvo la progresión fronteriza con verbos de movimiento sobrios y legales.
  spanish_consistency_notes:
  - Se usa «límite» de forma uniforme para גְּבוּל en vez de alternar con «frontera», para mantener coherencia en una descripción territorial.
  - 'Se transliteran los topónimos con formas hispanizadas breves: Sefam, Ribla, Ain, Quinéret.'
  - Se conserva el registro bíblico-geográfico sin modernizar nombres como «mar de Galilea».
  - La nota sobre «hombro» preserva la ambigüedad útil entre metáfora anatómica y relieve geográfico, siguiendo la práctica auditada de la POB inglesa.
