translation:
  language: es
  text: Pero otros[a], habiéndose reunido en cuevas cercanas para observar en secreto la semana, fueron denunciados a Felipe y fueron quemados juntos, porque se abstuvieron de defenderse por respeto al honor de aquel día santísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «observar secretamente el sábado». El griego dice literalmente «observar la semana en secreto», pero en este contexto probablemente se refiere a la observancia del sábado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - algunos otros
  - los demás
  lexicon: LSJ
  rationale: El contraste indefinido con el grupo anterior se expresa naturalmente con «otros» en español, sin añadir especificidad que el griego no da.
- source_word: πλησίον συνδρομόντες εἰς τὰ σπήλαια
  english_pob_choice: having gathered nearby into the caves
  chosen_spanish: habiéndose reunido cerca en las cuevas
  alternatives_spanish:
  - habiendo corrido juntos hacia las cuevas cercanas
  - habiéndose juntado en las cuevas vecinas
  lexicon: LSJ
  rationale: συνδρομόντες indica reunirse/afluir juntos; con πλησίον y εἰς τὰ σπήλαια, la idea es que se congregaron en cuevas cercanas. «Habiéndose reunido cerca en las cuevas» mantiene el movimiento colectivo y la localización sin volverse duro.
- source_word: λεληθότως ἄγειν τὴν ἑβδομάδα
  english_pob_choice: to observe the week in secret
  chosen_spanish: observar en secreto la semana
  alternatives_spanish:
  - guardar en secreto la semana
  - observar secretamente el sábado
  lexicon: LSJ
  rationale: El griego dice literalmente «la semana» y no usa σάββατον, por lo que se conserva «semana» en el texto principal. «Observar» refleja ἄγειν en sentido de observar/celebrar una observancia temporal, y «en secreto» traduce λεληθότως.
- source_word: μηνυθέντες τῷ Φιλίππῳ
  english_pob_choice: were informed against to Philip
  chosen_spanish: fueron denunciados a Felipe
  alternatives_spanish:
  - fueron informados contra Felipe
  - fueron reportados a Felipe
  lexicon: LSJ
  rationale: El pasivo implica traición o delación. «Denunciados» preserva ese matiz hostil de forma clara y natural en español.
- source_word: συνεφλογίσθησαν
  english_pob_choice: were burned together
  chosen_spanish: fueron quemados juntos
  alternatives_spanish:
  - fueron consumidos por el fuego juntos
  - fueron quemados vivos juntos
  lexicon: LSJ
  rationale: El verbo compuesto expresa que fueron quemados en conjunto. «Quemados juntos» es directo y fiel; «vivos» queda como implicación contextual, no como adición principal.
- source_word: διὰ τὸ εὐλαβῶς ἔχειν βοηθῆσαι αὐτοῖς
  english_pob_choice: because they scrupled to defend themselves
  chosen_spanish: porque escrupulosamente se negaban a ayudarse a sí mismos
  alternatives_spanish:
  - porque, por reverencia, rehusaron defenderse
  - porque actuaban con temor reverente al no ayudarse
  lexicon: LSJ
  rationale: εὐλαβῶς implica cautela reverente o escrúpulo; βοηθῆσαι αὐτοῖς literalmente es «ayudarse a sí mismos». En este contexto la idea práctica es no defenderse, pero el español conserva la literalidad interna de «ayudarse a sí mismos» para no borrar el giro reflexivo del griego.
- source_word: κατὰ δόξαν τῆς σεμνοτάτης ἡμέρας
  english_pob_choice: out of regard for the honor of that most holy day
  chosen_spanish: por respeto al honor de aquel día santísimo
  alternatives_spanish:
  - por consideración a la honra de aquel día sacratísimo
  - en atención a la dignidad de aquel día reverentísimo
  lexicon: LSJ
  rationale: δόξα aquí se entiende mejor como honor/reputación que como gloria visible. σεμνοτάτης expresa una santidad o venerabilidad extrema; «santísimo» comunica bien esa carga religiosa en español.
theological_decisions:
- issue: Sentido de τὴν ἑβδομάδα en este contexto persecutorio
  english_pob_reading: the week; likely Sabbath observance, preserved in a footnote
  chosen_spanish_reading: la semana; probablemente la observancia del sábado, preservada en nota
  alternative_spanish_readings:
  - el sábado
  - la observancia sabática
  rationale: El griego dice «la semana» y no el término más explícito para sábado. Para respetar la evidencia textual, el cuerpo conserva «la semana», mientras la nota expone la lectura contextual probable sin ocultar la tensión lexical.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Interpretación de la negativa a ayudar/defenderse
  english_pob_reading: they scrupled to defend themselves out of regard for the honor of that most holy day
  chosen_spanish_reading: se negaban escrupulosamente a ayudarse a sí mismos por respeto al honor de aquel día santísimo
  alternative_spanish_readings:
  - se abstuvieron de defenderse por reverencia
  - rehusaron ayudarse por piedad
  rationale: La construcción griega puede entenderse como ayuda/defensa de sí mismos. En el contexto histórico, la idea es que no se defendieron; el español retiene el reflejo literal de «ayudarse a sí mismos» y conserva el motivo religioso de la abstención.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que ajustó la frase a «observe the week in secret» y la nota que mantiene la posible referencia al sábado. En español se preservó la literalidad de «semana» en el texto principal, sin perder la explicación contextual en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usó «denunciados» para reflejar el valor hostil del pasivo griego.
  - Se evitó sustituir «Mesías/Cristo» porque el versículo no contiene ese término.
  - Se conservó el matiz de «semana» en el cuerpo principal para no borrar la tensión textual con la posible observancia del sábado.
