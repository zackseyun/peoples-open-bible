translation:
  language: es
  text: 'Entonces llamarás, y Yahvé responderá; clamarás por ayuda, y él dirá: «Aquí estoy». Si quitas de en medio de ti el yugo[b], el señalar con el dedo[a] y el hablar maldad[c],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el apuntar con el dedo»; el hebreo dice literalmente «enviar/estirar el dedo», una expresión idiomática de gesto acusador o despectivo.
    reason: lexical_alternative
  - marker: b
    text: «El yugo» es una metáfora del trato opresivo o de cargas impuestas sobre otros.
    reason: cultural_note
  - marker: c
    text: O «hablar perversidad», «hablar mal» o «hablar de manera maliciosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la consecuencia temporal de las condiciones previas; «Entonces» es natural en español y conserva el valor resultativo.
- source_word: תִּקְרָא
  english_pob_choice: you will call
  chosen_spanish: llamarás
  alternatives_spanish:
  - clamarás
  - invocarás
  lexicon: HALOT
  rationale: En contexto de oración, «llamarás» mantiene la correspondencia con el inglés auditado y la forma básica de קרא sin cargar de interpretación excesiva.
- source_word: וַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: el nombre divino se vierte como «Yahvé» y no como máscara litúrgica.'
- source_word: יַעֲנֶה
  english_pob_choice: will answer
  chosen_spanish: responderá
  alternatives_spanish:
  - contestará
  - dará respuesta
  lexicon: HALOT
  rationale: «Responderá» preserva la relación directa entre llamar y recibir respuesta; es claro y idiomático en español.
- source_word: תְּשַׁוַּע
  english_pob_choice: you will cry for help
  chosen_spanish: clamarás por ayuda
  alternatives_spanish:
  - gritarás por auxilio
  - suplicarás ayuda
  lexicon: HALOT
  rationale: שׁוע expresa un clamor urgente; «clamarás por ayuda» conserva el tono de súplica sin perder naturalidad.
- source_word: וְיֹאמַר
  english_pob_choice: and he will say
  chosen_spanish: y él dirá
  alternatives_spanish:
  - y dirá
  - y responderá diciendo
  lexicon: HALOT
  rationale: Continúa la acción del sujeto divino de manera simple y fiel al hebreo.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Aquí me tienes
  - Estoy aquí
  lexicon: HALOT
  rationale: Expresa la disponibilidad inmediata del hablante divino con una fórmula natural en español.
- source_word: מִתּוֹכְךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu interior
  - de entre ustedes
  lexicon: HALOT
  rationale: La imagen hebrea es comunitaria o ambiental; «de en medio de ti» preserva el giro profético y el alcance interno/social.
- source_word: מוֹטָה
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la barra
  - la opresión
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del instrumento de carga, como en el audit trail inglés, dejando que el contexto sostenga el sentido opresivo.
- source_word: שְׁלַח אֶצְבַּע
  english_pob_choice: the pointing of the finger
  chosen_spanish: el señalar con el dedo
  alternatives_spanish:
  - el apuntar con el dedo
  - el extender el dedo
  lexicon: HALOT
  rationale: El hebreo es idiomático y gestual; «el señalar con el dedo» comunica la acción acusatoria sin volverla más abstracta de lo debido.
- source_word: וְדַבֶּר אָוֶן
  english_pob_choice: speaking wickedness
  chosen_spanish: el hablar perversidad
  alternatives_spanish:
  - el hablar maldad
  - el hablar mal
  - el hablar iniquidad
  lexicon: HALOT
  rationale: אָוֶן abarca maldad dañina, discurso torcido o perverso; «perversidad» conserva la fuerza moral y el peso negativo del término.
theological_decisions:
- issue: Renderizado del nombre divino YHWH/יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El registro inglés del POB actualizado ya documenta la decisión de usar el nombre divino en transliteración. En español, «Yahvé» es la forma coherente con esa opción y con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del sintagma final אָוֶן en un contexto de habla dañina
  english_pob_reading: speaking wickedness / speaking evil / malicious speech
  chosen_spanish_reading: hablar perversidad
  alternative_spanish_readings:
  - hablar maldad
  - hablar malicioso
  - hablar mal
  rationale: No se neutraliza el término a mera «maldad» genérica; «perversidad» mantiene la carga ética y discursiva del hebreo, sin borrar la ambigüedad entre discurso falso, dañino o malicioso.
  doctrine_reference: Isaías 58:9, marco profético de ética social
- issue: Sentido metafórico de מוֹטָה
  english_pob_reading: the yoke / oppressive treatment or burdens imposed on others
  chosen_spanish_reading: el yugo
  alternative_spanish_readings:
  - la opresión
  - la carga opresiva
  rationale: Se conserva la metáfora concreta en el texto principal y no se la sustituye por una abstracción interpretativa; el peso opresivo queda implícito en el contexto de la denuncia.
  doctrine_reference: Isaías 58:9, imaginería profética de opresión
translation_notes:
  revision_awareness: El texto sigue de cerca el estado más reciente del POB en inglés, que ya incorporó la elección del nombre divino como Yahvé y mantuvo la metáfora del yugo y la fuerza idiomática de «pointing of the finger» / «speaking wickedness». No se detectaron revisiones posteriores que alteraran el contenido semántico de esta unidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva la metáfora concreta «el yugo» en vez de explicitarla dentro del texto principal.
  - «El señalar con el dedo» recoge el gesto idiomático sin perder la imagen corporal.
  - «Hablar perversidad» intenta preservar la gravedad moral del hebreo אָוֶן sin suavizarla a mero «hablar mal».
  - La puntuación y las comillas siguen el uso editorial en español y permiten lectura pública clara.
