translation:
  language: es
  text: 'Y oyó las palabras de los hijos de Labán, diciendo: «Jacob ha tomado todo lo que pertenecía a nuestro padre, y de lo que pertenecía a nuestro padre ha adquirido toda esta riqueza[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda esta gloria». El hebreo כָּבוֹד puede denotar honor, esplendor o riqueza material; aquí se refiere a la prosperidad visible de Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: Now he heard
  chosen_spanish: Y oyó
  alternatives_spanish:
  - Entonces oyó
  - Ahora oyó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español bíblico natural, «Y oyó» conserva la secuencia sin introducir un adverbio que el hebreo no exige. El sujeto implícito es Jacob por el contexto inmediato.
- source_word: דִּבְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las declaraciones
  lexicon: HALOT
  rationale: דְּבָרִים refiere aquí a dicho reportado; «las palabras» mantiene la expresión concreta y es natural en español.
- source_word: בְנֵי לָבָן
  english_pob_choice: Laban’s sons
  chosen_spanish: los hijos de Labán
  alternatives_spanish:
  - los hijos de Labán
  - los hijos de Laban
  lexicon: HALOT
  rationale: La construcción de estado constructo se vuelve naturalmente posesiva en español. Se mantiene «Labán» como forma usual en castellano bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: HALOT
  rationale: Función quotativa estándar. «Diciendo» reproduce la introducción directa del discurso sin añadir contenido interpretativo.
- source_word: לָקַח
  english_pob_choice: has taken
  chosen_spanish: ha tomado
  alternatives_spanish:
  - ha llevado
  - ha quitado
  lexicon: HALOT
  rationale: El verbo en la acusación se expresa de forma simple. «Ha tomado» sigue de cerca el sentido básico sin cargarlo con la fuerza de «robar» o «apoderarse».
- source_word: כָּל אֲשֶׁר לְאָבִינוּ
  english_pob_choice: all that belonged to our father
  chosen_spanish: todo lo que pertenecía a nuestro padre
  alternatives_spanish:
  - todo lo que era de nuestro padre
  - todo lo que fue de nuestro padre
  lexicon: HALOT
  rationale: La construcción con לְ indica posesión; «pertenecía a nuestro padre» hace explícita esa relación en español y conserva el matiz de propiedad.
- source_word: וּמֵאֲשֶׁר לְאָבִינוּ
  english_pob_choice: and from what belonged to our father
  chosen_spanish: y de lo que pertenecía a nuestro padre
  alternatives_spanish:
  - y de lo que era de nuestro padre
  - y de los bienes de nuestro padre
  lexicon: HALOT
  rationale: מִן marca fuente/origen. Se conserva la repetición posesiva para reflejar la acusación acumulativa del hebreo, sin simplificarla en exceso.
- source_word: עָשָׂה
  english_pob_choice: he has gained
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha ganado
  - ha adquirido
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hizo». Aunque en contexto implica producir/adquirir riqueza, el español «ha hecho» permite mantener la tensión del original frente a una interpretación más explícita; se complementa con «riqueza» para que el sentido resulte inteligible.
- source_word: כָּל הַכָּבֹד הַזֶּה
  english_pob_choice: all this wealth
  chosen_spanish: toda esta riqueza
  alternatives_spanish:
  - toda esta gloria
  - toda esta prosperidad
  lexicon: HALOT
  rationale: כָּבוֹד puede abarcar honor, esplendor o bienes visibles. Aquí el contexto trata de prosperidad material de Jacob, por lo que «riqueza» comunica bien el referente. Se conserva la alternativa «gloria» en nota por la tensión lexical documentada.
theological_decisions:
- issue: Sentido de כָּבוֹד como honor/gloria vs. riqueza material
  english_pob_reading: The Hebrew word can denote honor, splendor, or material wealth; here it refers to Jacob’s visible prosperity.
  chosen_spanish_reading: Aquí se refiere a la riqueza visible de Jacob.
  alternative_spanish_readings:
  - gloria
  - esplendor
  - honor
  rationale: No hay una decisión doctrinal, pero sí una elección semántica importante. El contexto narrativo y la acusación de los hijos de Labán apuntan a bienes/prosperidad, no a gloria abstracta; sin embargo, se preserva la posibilidad lexical de «gloria» en nota para no borrar la ambigüedad del hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registran cambios necesarios y el texto fuente/inglés presenta alto grado de acuerdo. La redacción española sigue esa lectura sin introducir expansiones no sustentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «riqueza» para כָּבוֹד en el cuerpo del texto, con nota que preserva la alternativa «gloria» por la tensión léxica documentada.
  - Se traduce לְאָבִינוּ con una posesión explícita en español («pertenecía a nuestro padre») para reflejar la relación de propiedad sin añadir contenido nuevo.
  - Se conserva la repetición de «de lo que pertenecía a nuestro padre» para reflejar el paralelismo y la insistencia acusatoria del hebreo.
