translation:
  language: es
  text: Ahora bien, los hijos de Rubén[a], primogénito de Israel—aunque él era el primogénito, al profanar el lecho de su padre, su primogenitura fue dada a los hijos de José, hijo de Israel[b], y no para ser inscritos por la primogenitura—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los lechos de su padre». El hebreo está literalmente en plural («lechos/camas»), como un modismo para el lecho matrimonial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero no para ser registrados genealógicamente según la primogenitura». La cláusula indica que la primogenitura pasó a los hijos de José sin hacerlos los inscritos genealógicamente como primogénitos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: Now the sons of
  chosen_spanish: Ahora bien, los hijos de
  alternatives_spanish:
  - Y los hijos de
  lexicon: HALOT
  rationale: Se conserva la conexión narrativa/genealógica del waw, pero en español 'Ahora bien' comunica mejor el giro explicativo y el inicio de una aclaración histórica sin perder el enlace con el texto anterior.
- source_word: בְּכוֹר יִשְׂרָאֵל
  english_pob_choice: the firstborn of Israel
  chosen_spanish: primogénito de Israel
  alternatives_spanish:
  - el primero en nacer de Israel
  - el primogénito de Israel
  lexicon: HALOT
  rationale: '''Primogénito'' es el equivalente natural y preciso para בכור en este contexto de estatus de nacimiento y privilegio.'
- source_word: כִּי הוּא הַבְּכוֹר
  english_pob_choice: for he was the firstborn
  chosen_spanish: porque él era el primogénito
  alternatives_spanish:
  - pues él era el primogénito
  - ya que él era el primogénito
  lexicon: HALOT
  rationale: Aquí כי introduce una explicación. 'Porque' mantiene el valor explicativo sin forzar una causalidad más fuerte de la que exige el hebreo.
- source_word: וּבְחַלְּלוֹ
  english_pob_choice: but because he defiled
  chosen_spanish: al profanar
  alternatives_spanish:
  - cuando profanó
  - por haber profanado
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo ב expresa circunstancia. 'Al profanar' conserva esa relación y comunica la gravedad moral del acto sin añadir elementos no presentes en el hebreo.
- source_word: יְצוּעֵי אָבִיו
  english_pob_choice: his father’s bed
  chosen_spanish: el lecho de su padre
  alternatives_spanish:
  - la cama de su padre
  - el lecho nupcial de su padre
  lexicon: HALOT
  rationale: La expresión idiomática apunta al lecho matrimonial/paternal. 'Lecho' preserva el registro bíblico y el valor sexual de la imagen mejor que una simple 'cama'.
- source_word: נִתְּנָה בְּכֹרָתוֹ
  english_pob_choice: his birthright was given
  chosen_spanish: su primogenitura fue dada
  alternatives_spanish:
  - sus derechos de primogénito fueron dados
  - su derecho de primogenitura fue dado
  lexicon: HALOT
  rationale: '''Primogenitura'' comunica tanto el estatus de primogénito como los privilegios jurídicos asociados, siguiendo el sentido del inglés POB y del hebreo.'
- source_word: לִבְנֵי יוֹסֵף בֶּן יִשְׂרָאֵל
  english_pob_choice: to the sons of Joseph son of Israel
  chosen_spanish: a los hijos de José, hijo de Israel
  alternatives_spanish:
  - a los hijos de José, el hijo de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica de modo explícito. 'Hijo de Israel' refleja el hebreo sin sustituirlo por una expansión interpretativa.
- source_word: וְלֹא לְהִתְיַחֵשׂ לַבְּכֹרָה
  english_pob_choice: though not to be enrolled by birthright
  chosen_spanish: aunque no para ser inscritos por la primogenitura
  alternatives_spanish:
  - aunque no para ser contados por la primogenitura
  - aunque no para ser registrados según la primogenitura
  - aunque no para ser inscritos como primogénitos
  lexicon: HALOT
  rationale: התיחשׂ es un término genealógico de inscripción/registro. 'Inscritos' conserva la idea de registro, y 'por la primogenitura' refleja con cercanía el hebreo lַבְּכֹרָה sin resolver la tensión del verso.
theological_decisions:
- issue: Distinción entre la condición natural de Rubén y la transferencia de privilegios
  english_pob_reading: The verse distinguishes between Reuben's biological status as firstborn and the transfer of the birthright privileges to Joseph's sons, without asserting that Joseph became the genealogically reckoned firstborn.
  chosen_spanish_reading: El versículo distingue entre el hecho de que Rubén era el primogénito y la entrega de su primogenitura a los hijos de José, sin afirmar que José quedara contado como primogénito en sentido genealógico.
  alternative_spanish_readings:
  - José pasó a ser el primogénito en todo sentido
  - la primogenitura quedó totalmente absorbida por José
  rationale: 'El cierre hebreo limita el traslado: la primogenitura fue dada a los hijos de José, pero la frase final impide identificar sin más ese don con el registro genealógico de primogenitura. La traducción conserva esa tensión.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, especialmente la distinción entre el estatus biológico de Rubén, el acto que motivó la pérdida de privilegio y la cláusula final restrictiva sobre el registro genealógico. Se adoptó una forma española que mantiene el paralelismo hebreo y la tensión legal/genealógica sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se usa 'primogénito' para בכור y 'primogenitura' para בכורה, manteniendo la distinción de forma consistente.
  - Se conservó 'hijo de Israel' en sentido genealógico, tal como lo hace el hebreo y el inglés auditado.
  - '''Lecho'' se eligió para el idioma idiomático de יצועי אביו, evitando una paráfrasis excesiva.'
  - No se introdujo ninguna nota al pie porque el español elegido no requiere una alternativa textual obligatoria para lectura pública en este versículo.
