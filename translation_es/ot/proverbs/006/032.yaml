translation:
  language: es
  text: El que comete adulterio con una mujer carece de entendimiento[a]; el que lo hace se destruye a sí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «El que comete adulterio con una esposa carece de entendimiento; quien lo hace arruina su vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹאֵף
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - es adúltero
  - adultera
  lexicon: HALOT
  rationale: El participio expresa a quien practica adulterio. En español, la construcción verbal 'comete adulterio' comunica con naturalidad la acción y conserva la fuerza moral del proverbio.
- source_word: אִשָּׁה
  english_pob_choice: with a woman
  chosen_spanish: con una mujer
  alternatives_spanish:
  - con una esposa
  lexicon: HALOT
  rationale: אִשָּׁה puede significar 'mujer' o 'esposa'. Aquí se mantiene el valor más amplio y directo de 'mujer', mientras que el matiz adúltero ya lo aporta el verbo 'comete adulterio'.
- source_word: חֲסַר לֵב
  english_pob_choice: lacks sense
  chosen_spanish: carece de entendimiento
  alternatives_spanish:
  - carece de juicio
  - es insensato
  - le falta corazón
  lexicon: HALOT
  rationale: Literalmente es 'falto de corazón', pero en Proverbios esta expresión apunta a falta de juicio o discernimiento. 'Carece de entendimiento' conserva el sentido sapiencial sin sonar forzado en español.
- source_word: מַשְׁחִית
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - corrompe
  lexicon: HALOT
  rationale: El participio hifil expresa causar destrucción o ruina. 'Destruye' reproduce bien la severidad y la brevedad del hebreo.
- source_word: נַפְשׁוֹ
  english_pob_choice: himself
  chosen_spanish: su propia vida
  alternatives_spanish:
  - a sí mismo
  - su propia alma
  - su propia persona
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida o al propio ser de la persona. 'Su propia vida' mantiene la referencia concreta y evita reducirlo indebidamente a una noción abstracta de 'alma'.
- source_word: הוּא יַעֲשֶׂנָּה
  english_pob_choice: he who does it
  chosen_spanish: el que lo hace
  alternatives_spanish:
  - quien lo hace
  - el que comete ese acto
  lexicon: HALOT
  rationale: La expresión pronominal retoma el acto de adulterio. 'El que lo hace' preserva el sujeto genérico y la referencia resumida al acto ya mencionado.
translation_notes:
  revision_awareness: La versión anterior no incluía la marca de nota en el texto principal. Esta revisión ancla la alternativa lexical en [a] para cumplir la validación y mantener la opción 'mujer/esposa' documentada por el audit trail.
  spanish_consistency_notes:
  - Se mantuvo la estructura paralela del proverbio en dos miembros.
  - Se evitó 'SEÑOR' u otra terminología no pertinente.
  - '''Entendimiento'' traduce el sentido sapiencial de חֲסַר לֵב sin calco duro de ''corazón''.'
  - '''Su propia vida'' expresa la fuerza reflexiva de נַפְשׁוֹ de manera idiomática en español.'
