review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del hebreo: José habla a sus hermanos y a la casa de su padre, expresa su intención de subir, informar a Faraón y citar lo que dirá sobre la llegada de su familia desde Canaán. Sin embargo, el borrador debilita una decisión léxica clave ya documentada en el POB inglés: בֵּית אָבִיו / בֵּית אָבִי se entendió como unidad familiar («household»), no meramente casa física. En español, «la casa de su padre / de mi padre» deja más fácilmente la lectura de edificio, y la nota no compensa del todo en el texto principal.'
  spanish_quality_summary: El español es natural y digno. «Subiré», «le informaré a Faraón» y «que estaban en la tierra de Canaán» funcionan bien. La principal mejora es hacer explícito en el texto el sentido familiar de בַּיִת; «familia de su padre / de mi padre» o «casa paterna» serían más claros, pero la opción más fiel al razonamiento auditado es «familia». También conviene pulir la nota para reflejar que «casa de mi padre» es la alternativa más literal, mientras el texto principal comunica el sentido.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La alineación léxica general es buena, salvo la inconsistencia con la decisión auditada de traducir בֵּית אָב como unidad familiar. Debe preferirse una formulación española que preserve ese valor semántico en el texto principal.
  issues:
  - severity: medium
    issue: «la casa de su padre / la casa de mi padre» en el texto principal puede sonar principalmente a edificio
    rationale: El POB inglés documenta explícitamente que בֵּית אָב aquí significa la unidad familiar o doméstica. En español, «casa» conserva la imagen hebrea pero comunica con menos claridad ese sentido social; por fidelidad al análisis fuente-contenido, conviene explicitar «familia» en el texto principal.
  - severity: low
    issue: La nota actual ofrece «mi casa paterna», que no corresponde bien al primer sintagma «su padre»
    rationale: La nota mezcla alternativas del primer y segundo sintagma sin distinguirlas. Es mejor formular una nota general breve que indique la alternativa más literal («casa de su padre / de mi padre») y explique el sentido de unidad familiar.
  revised_spanish_text: 'Entonces José dijo a sus hermanos y a la familia de su padre[a]: «Subiré y le informaré a Faraón, y le diré: “Mis hermanos y la familia de mi padre, que estaban en la tierra de Canaán, han venido a mí”».'
  revised_footnotes:
  - marker: a
    text: Literalmente, «la casa de su padre»; también después, «la casa de mi padre». Aquí la expresión hebrea se refiere a la unidad familiar o doméstica, no solo al edificio.
    reason: lexical_alternative
  revision_rationale: Se revisa בֵּית אָבִיו / בֵּית אָבִי como «familia de su padre / de mi padre» para reflejar en el texto principal la decisión léxica auditada de que la expresión denota el grupo familiar, no meramente la vivienda. Se conserva en nota la alternativa más literal con «casa». El resto del versículo ya era fiel y natural.
