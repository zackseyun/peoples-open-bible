translation:
  language: es
  text: Han edificado los lugares altos de Tófet[a], que está en el valle de Ben-hinom, para quemar a sus hijos y a sus hijas en el fuego—algo que yo no mandé, ni subió a mi corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tófet: transliteración del nombre o designación cultual hebrea.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más dinámicamente: «ni me pasó por la mente». El hebreo dice literalmente: «ni subió sobre mi corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  english_pob_choice: They have built
  chosen_spanish: Han edificado
  alternatives_spanish:
  - Han construido
  - Construyeron
  lexicon: HALOT
  rationale: El qal perfecto comunica una acción completada con efecto presente en el reproche profético. 'Han edificado' conserva ese valor resultativo y mantiene el tono bíblico sin volverse arcaico.
- source_word: בָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - las alturas
  - los santuarios altos
  lexicon: HALOT
  rationale: '''Lugares altos'' es la equivalencia española más estable para בָּמוֹת en contexto cultual. Conserva el sentido de sitio de culto elevado sin explicar de más.'
- source_word: הַתֹּפֶת
  english_pob_choice: Topheth
  chosen_spanish: Tófet
  alternatives_spanish:
  - Topet
  - Tófet, el Tófet
  lexicon: HALOT
  rationale: Se translitera como nombre propio/designación cultual. 'Tófet' respeta la forma del término y evita convertirlo en una glosa interpretativa.
- source_word: בְּגֵיא בֶן־הִנֹּם
  english_pob_choice: in the Valley of Ben-hinnom
  chosen_spanish: en el valle de Ben-hinom
  alternatives_spanish:
  - en el valle del hijo de Hinom
  - en Ben-hinom Valle
  lexicon: HALOT
  rationale: '''Valle de Ben-hinom'' conserva la función de topónimo. ''Ben-hinom'' se translitera porque el hebreo funciona aquí como nombre geográfico fijo, no como frase explicativa.'
- source_word: לִשְׂרֹף
  english_pob_choice: to burn
  chosen_spanish: para quemar
  alternatives_spanish:
  - para arrojar al fuego
  - a fin de quemar
  lexicon: HALOT
  rationale: El infinitivo de propósito se rinde naturalmente con 'para quemar', que expresa finalidad y mantiene la dureza del acto sin suavizarlo.
- source_word: בְּנֵיהֶם וְאֶת־בְּנֹתֵיהֶם
  english_pob_choice: their sons and their daughters
  chosen_spanish: a sus hijos y a sus hijas
  alternatives_spanish:
  - a sus hijos varones y a sus hijas
  - a sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente entre hijos y hijas. En español, 'hijos y sus hijas' comunica esa especificidad de manera natural; 'hijos' aquí puede incluir varones, pero el paralelismo mantiene la distinción de ambos grupos.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - en la fuego
  - con fuego
  lexicon: HALOT
  rationale: '''En el fuego'' es la construcción española más idiomática para este contexto de sacrificio humano. ''Fuego'' conserva la imagen concreta sin reinterpretarla.'
- source_word: אֲשֶׁר לֹא צִוִּיתִי
  english_pob_choice: something I did not command
  chosen_spanish: algo que yo no mandé
  alternatives_spanish:
  - algo que yo no ordené
  - lo cual yo no mandé
  lexicon: HALOT
  rationale: El relativo vuelve sobre la práctica descrita. 'Mandé' reproduce con claridad la fuerza normativa del verbo sin cargarlo con matices legales adicionales; 'algo' hace explícito el referente implícito en español.
- source_word: וְלֹא עָלְתָה עַל־לִבִּי
  english_pob_choice: nor did it come up in my heart
  chosen_spanish: ni me subió al corazón
  alternatives_spanish:
  - ni entró en mi mente
  - ni subió a mi corazón
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea del corazón como sede interior y volitiva. 'Me subió al corazón' es una reproducción cercana del idiomático 'came up upon my heart', manteniendo la tensión teológica sin resolverla con una paráfrasis psicológica.
theological_decisions:
- issue: Rechazo divino del sacrificio de niños
  english_pob_reading: The verse states that this practice was not commanded by God and was wholly contrary to his will, without implying ignorance or lack of foreknowledge.
  chosen_spanish_reading: El texto presenta la práctica como no mandada por Dios y totalmente ajena a su voluntad, sin insinuar ignorancia ni limitación de conocimiento divino.
  alternative_spanish_readings:
  - ni me pasó por la mente
  - ni se me ocurrió
  rationale: La frase hebrea es una negación enfática que usa la imagen del corazón. Mantener una versión cercana evita convertir el dicho en una afirmación sobre limitación cognitiva y preserva la reprensión profética.
  doctrine_reference: Preservar la tensión teológica del texto; no resolverla con una explicación doctrinal ajena al versículo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió 'in my heart' por naturalidad sin abandonar el hebreo subyacente. En español se optó por una imagen cercana ('me subió al corazón') para conservar la metáfora y la tensión teológica del original, manteniendo la naturalidad suficiente para lectura pública.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantiene 'Tófet' como transliteración estable de la designación cultual.
  - '''Ben-hinom'' se conserva como topónimo transliterado, no como ''hijo de Hinom'', porque aquí funciona como nombre geográfico fijo.'
  - '''Corazón'' se conserva para לֵב/לֵבָב como sede interior, en coherencia con el estilo bíblico español del proyecto.'
