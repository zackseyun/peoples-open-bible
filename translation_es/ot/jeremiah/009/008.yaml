translation:
  language: es
  text: ¿No he de castigarlos por estas cosas? —declara Yahvé. ¿No se vengará mi alma[a] de una nación como esta?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi alma», expresión antropopática; alternativamente, «yo mismo» o «mi ser».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַל
  english_pob_choice: Shall ... for these things?
  chosen_spanish: ¿No he de castigarlos por estas cosas?
  alternatives_spanish:
  - ¿Por estas cosas no los he de castigar?
  - ¿No los castigaré por estas cosas?
  lexicon: HALOT
  rationale: 'La partícula interrogativa con עַל introduce una pregunta retórica de causa o motivo. En español, la forma natural y solemne es una pregunta con valor enfático: «¿No he de castigarlos por estas cosas?», que conserva la fuerza causal sin sonar forzada.'
- source_word: אֶפְקָד
  english_pob_choice: punish
  chosen_spanish: castigarlos
  alternatives_spanish:
  - visitarlos
  - llamarlos a cuenta
  lexicon: HALOT
  rationale: En este contexto judicial de juicio, פקד tiene sentido de castigar. «Castigar» comunica con claridad el acto de juicio divino mejor que un calco como «visitar».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé
  alternatives_spanish:
  - —dice Yahvé
  - —oráculo de Yahvé
  lexicon: HALOT
  rationale: «Declara» conserva la fórmula profética solemne y natural en español. Se mantiene «Yahvé» para el nombre divino, conforme a la convención del proyecto, en vez de sustituirlo por un título.
- source_word: אִם
  english_pob_choice: Shall ... not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿Ciertamente no
  lexicon: HALOT
  rationale: Aquí אִם abre una segunda pregunta retórica paralela, no una condición. El español la refleja con «¿No…?», preservando el paralelismo y la fuerza esperada de afirmación.
- source_word: בְּגוֹי אֲשֶׁר כָּזֶה
  english_pob_choice: on a nation such as this
  chosen_spanish: de una nación como esta
  alternatives_spanish:
  - contra una nación así
  - sobre una nación como esta
  lexicon: HALOT
  rationale: La expresión identifica al objeto del juicio. «De una nación como esta» es idiomático en español y conserva el énfasis demostrativo de «como esta».
- source_word: תִתְנַקֵּם
  english_pob_choice: avenge itself
  chosen_spanish: se vengará
  alternatives_spanish:
  - tomará venganza
  - se tomará venganza
  lexicon: HALOT
  rationale: El hitpael de נקם tiene fuerza reflexiva/media. En español, «se vengará» conserva bien esa reflexividad y el sentido de retribución, sin perder naturalidad.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo mismo
  - mi ser
  lexicon: HALOT
  rationale: נפש aquí es una expresión antropopática para Dios. «Mi alma» preserva la imagen del hebreo y mantiene la tensión teológica sin resolverla hacia una paráfrasis explicativa.
theological_decisions:
- issue: Antropopatismo divino en נַפְשִׁי
  english_pob_reading: my soul
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - yo mismo
  - mi ser
  rationale: 'Se conserva la formulación figurada del hebreo en vez de suavizarla. Esto mantiene la tensión retórica y teológica del texto profético: Dios habla con lenguaje humano de sí mismo para expresar su resolución judicial.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en sentido y decisiones clave. No hubo revisiones aplicadas en el registro inglés; por eso la redacción española sigue de cerca la lectura aprobada, manteniendo el paralelismo interrogativo, el valor judicial de פקד y la expresión antropopática de נַפְשִׁי.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino, no como sustitución reverencial.
  - Se conservó el paralelismo de dos preguntas retóricas.
  - «Mi alma» deja visible la tensión antropopática que el registro inglés preserva.
  - El verbo «castigar» se usa por el contexto de juicio, no por mera equivalencia mecánica.
