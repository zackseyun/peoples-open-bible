translation:
  language: es
  text: 'Entonces Moisés dijo a Josué: «Escoge hombres para nosotros y sal; pelea[a] contra Amalec. Mañana yo estaré de pie en la cima de la colina[b], con la vara de Dios en mi mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haz guerra contra Amalec».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sobre la cabeza de la colina», un modismo para decir «en la cima de la colina».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo marca avance de la acción; «Entonces» mantiene la progresión sin sonar mecánico en español.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: Convención bíblica española
  rationale: Se usa la forma bíblica española tradicional y plenamente inteligible.
- source_word: בְּחַר לָנוּ אֲנָשִׁים
  english_pob_choice: Choose men for us
  chosen_spanish: Escoge hombres para nosotros
  alternatives_spanish:
  - Elige hombres para nosotros
  - Selecciona hombres para nosotros
  lexicon: HALOT
  rationale: בָּחַר expresa elegir/escoger. «Hombres» conserva el valor literal de אֲנָשִׁים, sin neutralizarlo a «personas», ya que el contexto militar sugiere combatientes varones.
- source_word: וְצֵא
  english_pob_choice: and go out
  chosen_spanish: y sal
  alternatives_spanish:
  - y sal fuera
  - y ve
  lexicon: HALOT
  rationale: צֵא se rinde naturalmente con «sal» en español; el matiz de «go out» queda implícito y la frase suena idiomática.
- source_word: הִלָּחֵם בַּעֲמָלֵק
  english_pob_choice: fight against Amalek
  chosen_spanish: pelea contra Amalec
  alternatives_spanish:
  - lucha contra Amalec
  - haz guerra contra Amalec
  lexicon: HALOT
  rationale: El imperativo refleja combate directo. «Contra Amalec» expresa bien la relación adversativa del hebreo. «Pelea» conserva la fuerza verbal sin sobrecargar el registro.
- source_word: מָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Al día siguiente
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural en español.
- source_word: אָנֹכִי נִצָּב
  english_pob_choice: I will stand
  chosen_spanish: yo estaré
  alternatives_spanish:
  - yo estaré de pie
  - yo me pondré en pie
  lexicon: HALOT
  rationale: Aunque נִצָּב es participio, aquí tiene fuerza futura por el contexto. «Estaré» comunica la intención futura con naturalidad; la imagen completa se apoya en el complemento locativo posterior.
- source_word: עַל רֹאשׁ הַגִּבְעָה
  english_pob_choice: on the top of the hill
  chosen_spanish: en la cima de la colina
  alternatives_spanish:
  - en la cumbre de la colina
  - sobre la cabeza de la colina
  lexicon: HALOT
  rationale: רֹאשׁ se entiende idiomáticamente como «cima/top». «Colina» traduce גִּבְעָה de forma sencilla y moderna; se evita el calco «cabeza» porque en español suena extraño.
- source_word: וּמַטֵּה הָאֱלֹהִים
  english_pob_choice: with the staff of God
  chosen_spanish: con la vara de Dios
  alternatives_spanish:
  - con el bastón de Dios
  - con la vara divina
  lexicon: HALOT
  rationale: Se preserva la construcción posesiva/relacional. «Vara» es más natural en español bíblico que «bastón» y mantiene el eco de Éxodo.
- source_word: בְּיָדִי
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en la mano
  lexicon: HALOT
  rationale: Traducción directa y transparente del sintagma preposicional, sin añadir énfasis innecesario.
theological_decisions:
- issue: Referencia a Dios en מַטֵּה הָאֱלֹהִים
  english_pob_reading: the staff of God
  chosen_spanish_reading: la vara de Dios
  alternative_spanish_readings:
  - la vara divina
  - la vara de Yahvé
  rationale: El hebreo presenta un constructo con אֱלֹהִים; la traducción conserva la referencia a Dios sin explicitar «Yahvé», ya que el texto fuente inmediato usa la forma genérica y no exige un ajuste interpretativo adicional. Se mantiene así la misma tensión relacional del original.
  doctrine_reference: Éxodo 17:9; uso contextual de אֱלֹהִים en constructo
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin traducir mecánicamente: se mantuvieron la progresión narrativa, el imperativo militar y el modismo de רֹאשׁ הַגִּבְעָה; no hubo revisiones aplicadas en el paquete fuente, y la versión española conserva las mismas decisiones léxicas principales con adaptación idiomática al español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término por defecto en el proyecto, pero aquí no aparece porque el hebreo usa אֱלֹהִים en el sintagma constructo «la vara de Dios».
  - «Josué» sigue la convención bíblica española estándar para el nombre propio.
  - «Vara» se usa de manera consistente para מַטֶּה en contexto narrativo bíblico, sin introducir terminología eclesiástica ajena al pasaje.
  - La nota sobre la colina preserva la tensión entre literalidad y modismo que el audit trail en inglés ya documenta.
