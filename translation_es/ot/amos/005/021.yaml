    rationale: El expediente inglés documenta «I reject» porque מאס enfatiza repudiar o rechazar como inaceptable. «Desprecio» añade un matiz afectivo/evaluativo que ya está cubierto por «aborrezco».
  - severity: medium
    issue: Marcador de nota mal ubicado
    rationale: La nota explica la expresión «no oleré», pero el marcador [a] aparece en «aborrezco». Esto incumple la disciplina de anclar cada nota en la palabra o frase pertinente del texto.
  - severity: low
