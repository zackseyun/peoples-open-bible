revisions:
- from: No reprendas al escarnecedor[a], para que no te odie; reprende al sabio[b], y te amará.
  to: No reprendas al escarnecedor[a], no sea que te odie; reprende a un sabio[b], y te amará.
  rationale: Se hacen ajustes menores para reflejar con más precisión el valor de פֶּן como advertencia («no sea que») y la indefinición de לְחָכָם («a un sabio»). También se pule la nota b para mejor naturalidad editorial en español. No hay cambio de sentido sustancial ni cuestión doctrinal compleja.
