translation:
  language: es
  text: Porque sus posesiones eran demasiado grandes para habitar juntos,[a] y la tierra de su residencia temporal[b] no podía sostenerlos[a] a causa de su ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no podía cargarlos» o «no podía soportarlos».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra donde residían temporalmente»; el hebreo «la tierra de su residencia temporal» preserva la idea de estancia temporal como forasteros.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la separación; «Porque» conserva el valor explicativo y es natural en español.
- source_word: רְכוּשָׁם
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - su propiedad
  - sus bienes
  - su riqueza
  lexicon: HALOT
  rationale: רְכוּשׁ se refiere a bienes/posesiones acumuladas; «posesiones» mantiene amplitud sin reducirlo solo a riqueza o solo a bienes muebles.
- source_word: רָב
  english_pob_choice: too great
  chosen_spanish: eran demasiado grandes
  alternatives_spanish:
  - eran muchos
  - eran abundantes
  - eran excesivas
  lexicon: HALOT
  rationale: En este contexto, el adjetivo expresa exceso práctico, no solo cantidad. «Demasiado grandes» reproduce bien la fuerza de suficiencia insuficiente para convivir.
- source_word: מִשֶּׁבֶת יַחְדָּו
  english_pob_choice: for them to dwell together
  chosen_spanish: para habitar juntos
  alternatives_spanish:
  - para vivir juntos
  - para morar juntos
  - para residir juntos
  lexicon: HALOT
  rationale: El infinitivo con מִן expresa límite/exceso respecto de morar juntos; «habitar» conserva un tono formal y cercano a «dwell» sin sonar arcaico.
- source_word: אֶרֶץ מְגֻרֵיהֶם
  english_pob_choice: the land of their sojourning
  chosen_spanish: la tierra de su peregrinación
  alternatives_spanish:
  - la tierra donde habitaban como forasteros
  - la tierra de su estancia
  - la tierra de su residencia temporal
  lexicon: HALOT
  rationale: מְגוּרִים denota residencia como forasteros/estancia temporal. «Peregrinación» preserva la idea de residencia no permanente y el matiz patriarcal de forastería.
- source_word: לָשֵׂאת אֹתָם
  english_pob_choice: could not support them
  chosen_spanish: no podía sostenerlos
  alternatives_spanish:
  - no podía soportarlos
  - no podía mantenerlos
  - no podía llevarlos
  lexicon: HALOT
  rationale: נשא literalmente es «llevar/cargar»; con la tierra como sujeto, «sostener» comunica de modo claro la incapacidad de contener a personas y bienes.
- source_word: מִפְּנֵי מִקְנֵיהֶם
  english_pob_choice: because of their livestock
  chosen_spanish: a causa de su ganado
  alternatives_spanish:
  - por causa de sus rebaños
  - debido a su ganado
  - a causa de sus animales
  lexicon: HALOT
  rationale: מִקְנֶה suele referirse al ganado/livestock como posesión adquirida. «Ganado» es una equivalencia natural en español y suficientemente amplia; «rebaños» sería más estrecho.
theological_decisions:
- issue: Mantenimiento del matiz de residencia temporal en «מְגֻרֵיהֶם»
  english_pob_reading: the land of their sojourning preserves the idea of temporary residence as resident aliens.
  chosen_spanish_reading: la tierra de su peregrinación preserva la idea de estancia temporal y forastería.
  alternative_spanish_readings:
  - la tierra donde estaban de paso
  - la tierra de su residencia temporal
  - la tierra donde habitaban como forasteros
  rationale: No se neutralizó el trasfondo de extranjería patriarcal. «Peregrinación» es una solución idiomática que mantiene la temporalidad sin convertir el texto en una paráfrasis interpretativa.
  doctrine_reference: Tema bíblico de los patriarcas como forasteros y peregrinos (cf. Gn 23; Heb 11:13).
translation_notes:
  revision_awareness: La versión inglesa final del POB cambió «live together» por «dwell together» para un registro algo más formal; la redacción española adopta igualmente un verbo formal pero natural («habitar juntos») y conserva la estructura causal del versículo. También se mantuvo la equivalencia de «support»/«sostener» con la nota sobre la posibilidad literal de «soportarlos».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Ganado» se eligió para מִקְנֵיהֶם por ser amplio y natural; no se restringió a «cattle»/«vacuno».
  - «Peregrinación» mantiene el valor de sojourning sin borrar el matiz de residencia provisional.
  - La estructura del versículo sigue el orden causal y explicativo del hebreo sin sobrecargarlo con explicaciones ajenas al texto.
