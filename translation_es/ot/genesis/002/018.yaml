translation:
  language: es
  text: 'Entonces Yahvé Dios dijo[a]: «No es bueno que el hombre esté solo. Le haré una ayudante que le corresponda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una ayudante adecuada para él», «una ayudante apropiada para él» o «una ayudante que esté a su altura». La frase hebrea sugiere a alguien que corresponde al hombre, no meramente a alguien de rango inferior.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton, no una sustitución titulativa. «Yahvé» es el equivalente español más establecido para reflejar el nombre personal revelado.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En la expresión יְהוָה אֱלֹהִים, «Dios» preserva el título divino común junto con el nombre propio. En español puede leerse con naturalidad sin perder la referencia al único Dios verdadero.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - entonces dijo
  - y dijo
  lexicon: HALOT
  rationale: El verbo פשוטo de decir se vierte con «dijo». «Entonces» puede reflejar la secuencia narrativa, pero en español queda mejor integrado al inicio de la cláusula sin forzar una traducción mecánica del waw-consecutivo.
- source_word: לֹא טוֹב
  english_pob_choice: It is not good
  chosen_spanish: No es bueno
  alternatives_spanish:
  - No está bien
  - No es conveniente
  lexicon: HALOT
  rationale: Se mantiene el juicio valorativo directo del hebreo. «No es bueno» reproduce con claridad la evaluación de estado/situación sin suavizarla.
- source_word: הֱיוֹת הָאָדָם
  english_pob_choice: for the man to be
  chosen_spanish: que el hombre esté
  alternatives_spanish:
  - que el hombre sea
  - que exista el hombre
  lexicon: HALOT
  rationale: 'En español, la construcción más natural para el infinitivo con sujeto es una subordinada sustantiva: «que el hombre esté». «El hombre» sigue la decisión del POB inglés de «the man», en lugar de generalizar a «ser humano».'
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - en soledad
  - por sí mismo
  lexicon: HALOT
  rationale: «Solo» expresa la idea de estar sin compañía de forma directa y natural. En este contexto, «solo» conserva la nota de aislamiento relacional del hebreo.
- source_word: אֶעֱשֶׂה־לּוֹ
  english_pob_choice: I will make ... for him
  chosen_spanish: Haré para él
  alternatives_spanish:
  - Le haré
  - Haré algo para él
  lexicon: HALOT
  rationale: El futuro volitivo/divino se refleja con «Haré». «Para él» mantiene el dativo beneficiario sin añadir una interpretación de inferioridad o servicio.
- source_word: עֵזֶר
  english_pob_choice: helper
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - ayudante
  - ayudadora
  lexicon: HALOT
  rationale: En español, «ayuda» funciona como sustantivo abstracto y también personal en esta construcción, pero evita el matiz jerárquico que a veces sugiere «ayudante». La nota de correspondencia queda en la frase siguiente.
- source_word: כְּנֶגְדּוֹ
  english_pob_choice: corresponding to him
  chosen_spanish: correspondiente a él
  alternatives_spanish:
  - que le corresponda
  - adecuada a él
  - que le haga frente
  lexicon: HALOT
  rationale: «Correspondiente a él» preserva la idea de correspondencia relacional, de frente y en paralelo, sin convertirla en una mera utilidad funcional. Es una solución española fiel al sentido y suficientemente transparente.
theological_decisions:
- issue: Tratamiento de יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión conserva el nombre personal divino en lugar de enmascararlo como título. «Yahvé» sigue la política del proyecto y evita sustituir el nombre revelado por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: render the divine name transparently'
- issue: Sentido de אָדָם en el contexto narrativo
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: Aquí se trata del varón humano ya formado en el huerto, no de la humanidad en abstracto. «El hombre» preserva la concreción narrativa y la lectura de género-precisa del texto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; contested terms for אָדָם'
- issue: Posible lectura jerárquica de עֵזֶר כְּנֶגְדּוֹ
  english_pob_reading: a helper corresponding to him
  chosen_spanish_reading: una ayuda correspondiente a él
  alternative_spanish_readings:
  - una ayuda adecuada para él
  - una ayuda que le corresponda
  - una ayudante para él
  rationale: El hebreo presenta ayuda y correspondencia, pero no declara inferioridad ni superioridad. «Correspondiente a él» mantiene la tensión semántica y evita imponer una lectura social ajena al texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje con alta concordancia con la revisión más reciente, sin cambios sustantivos respecto del testimonio base. Se conservan las decisiones clave del POB inglés: nombre divino transparente, אָדָם como «el hombre», y עֵזֶר כְּנֶגְדּוֹ como una relación de correspondencia y no de inferioridad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Dios» se usa para אֱלֹהִים dentro de la expresión fija con el nombre divino.
  - «El hombre» preserva la referencia singular y narrativa de אָדָם.
  - «Ayuda» evita introducir un matiz jerárquico no presente en el hebreo.
  - La nota al pie explica la alternativa lexical sin romper la fluidez de lectura.
