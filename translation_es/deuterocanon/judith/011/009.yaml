review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: λόγος como ''asunto'', συνεδρείᾳ como ''consejo'', ἠκούσαμεν/ῥήματα como ''hemos oído sus palabras'', y la cláusula final como el reporte de Achior a los de Betulia. También capta adecuadamente ὅτι con valor causal (''porque''). Sin embargo, ''lo preservaron'' no refleja bien el valor contextual e idiomático de περιεποίησαντο en español bíblico natural; aquí la idea es que le perdonaron la vida / lo dejaron con vida, y la alternativa inglesa documentada favorece ''lo perdonaron'' o ''le perdonaron la vida'' más que ''preservaron''.'
  spanish_quality_summary: El texto es claro y legible, pero 'Achior' debería ajustarse a la forma española más normal 'Ajor'. Además, 'lo preservaron' suena poco natural en español general y eclesial; 'le perdonaron la vida' o 'lo salvaron' comunica mejor. 'Ante ti' es aceptable, aunque 'en tu presencia' aclara mejor la nota y evita posible rigidez.
  glossary_alignment: No hay términos del glosario principal en juego. La principal cuestión léxica es mantener fidelidad al matiz de περιεποίησαντο sin producir español acartonado; el proyecto permite claridad moderna, por lo que conviene evitar 'preservaron'.
  issues:
  - severity: medium
    issue: Transliteración de Ἀχιὼρ como 'Achior'
    rationale: En español bíblico la forma más natural y extendida es 'Ajor'. 'Achior' es comprensible pero suena más anglicada/latinista y menos propia del registro meta.
  - severity: medium
    issue: '''lo preservaron'' es poco idiomático para περιεποίησαντο'
    rationale: Aunque 'preservar' toca parte del campo semántico, en esta escena narrativa española suena forzado. El contexto pide 'le perdonaron la vida' o, secundariamente, 'lo salvaron', que expresan mejor que no lo mataron y lo mantuvieron con vida.
  - severity: low
    issue: 'Nota a: desajuste de concordancia'
    rationale: Si el texto dice 'lo preservaron', la nota no debería dar como alternativa 'lo salvó' en singular, sino 'lo salvaron'.
  revised_spanish_text: Y ahora, en cuanto al asunto que Ajor habló en tu consejo, hemos oído sus palabras, porque los hombres de Betulia le perdonaron la vida[a], y él les informó de todo lo que había hablado en tu presencia[b].
  revised_footnotes:
  - marker: a
    text: O “lo salvaron”; el verbo griego puede significar preservar, guardar o mantener con vida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “todo lo que había hablado de ti / junto a ti”; probablemente significa todo lo que había dicho en tu presencia.
    reason: lexical_alternative
  revision_rationale: Se ajustó 'Achior' a 'Ajor' por naturalidad en español bíblico; se reemplazó 'lo preservaron' por 'le perdonaron la vida' para reflejar mejor el sentido contextual de περιεποίησαντο en español idiomático; y se hizo explícito 'en tu presencia' en la cláusula final, en línea con la explicación léxica ya documentada.
