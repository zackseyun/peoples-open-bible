translation:
  language: es
  text: Entonces los ojos de los que ven no estarán velados[a], y los oídos de los que oyen prestarán atención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘no estarán cegados’. El verbo hebreo puede denotar ojos que ya no están impedidos u oscurecidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹ֥א תִשְׁעֶ֖ינָה
  english_pob_choice: will not be dim
  chosen_spanish: no estarán oscuros
  alternatives_spanish:
  - no estarán débiles
  - no estarán cegados
  - no estarán apagados
  lexicon: HALOT
  rationale: El hebreo comunica que los ojos dejarán de estar impedidos u oscurecidos. En español, ‘oscuros’ conserva la idea de falta de claridad visual sin afirmar más de lo que el verbo exige. Evita también una equivalencia demasiado fuerte como ‘cegados’, que podría sobrecargar el sentido.
- source_word: עֵינֵ֣י
  english_pob_choice: the eyes of
  chosen_spanish: los ojos de
  alternatives_spanish:
  - ojos
  lexicon: HALOT
  rationale: El constructo hebreo se expresa de forma natural en español con ‘los ojos de’, manteniendo la relación sintáctica con el participio siguiente.
- source_word: רֹאִ֑ים
  english_pob_choice: those who see
  chosen_spanish: los que ven
  alternatives_spanish:
  - los videntes
  - los que miran
  lexicon: HALOT
  rationale: El participio sustantivado se vierte de manera idiomática como ‘los que ven’. ‘Videntes’ sería posible, pero introduce una carga más técnica o profética que el contexto no obliga a adoptar.
- source_word: וְ/אָזְנֵ֥י
  english_pob_choice: the ears of
  chosen_spanish: los oídos de
  alternatives_spanish:
  - las orejas de
  - oídos
  lexicon: HALOT
  rationale: ‘Oídos de’ reproduce bien el paralelismo con ‘ojos de’ y suena natural en español bíblico contemporáneo.
- source_word: שֹׁמְעִ֖ים
  english_pob_choice: those who hear
  chosen_spanish: los que oyen
  alternatives_spanish:
  - los oyentes
  - los que escuchan
  lexicon: HALOT
  rationale: ‘Los que oyen’ conserva el paralelismo con ‘los que ven’ y evita forzar una terminología más abstracta que el hebreo no requiere.
- source_word: תִּקְשַֽׁבְנָה
  english_pob_choice: will listen attentively
  chosen_spanish: prestarán atención
  alternatives_spanish:
  - escucharán atentamente
  - atenderán
  - oirán con atención
  lexicon: HALOT
  rationale: קשׁב expresa escucha atenta, no simple recepción auditiva. ‘Prestarán atención’ comunica bien esa intensificación en español y mantiene el contraste con la primera cola.
- source_word: וְ
  english_pob_choice: Then / and
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: HALOT
  rationale: En este contexto profético, la conjunción tiene valor consecutivo. ‘Entonces’ comunica mejor la progresión respecto al versículo anterior que un simple ‘y’.
theological_decisions:
- issue: Alcance de la imagen de ojos y oídos
  english_pob_reading: A general promise of restored moral/spiritual and social discernment, expressed through physical-sensory imagery
  chosen_spanish_reading: Una promesa general de percepción restaurada, expresada mediante imágenes sensoriales físicas
  alternative_spanish_readings:
  - Una promesa estrictamente literal de sanidad de ceguera y sordera
  - Una referencia exclusiva a líderes proféticos
  rationale: 'El contexto inmediato habla de un orden justo y de comprensión renovada. La traducción conserva la imagen corporal para no resolver la tensión entre lo físico y lo figurado: puede sugerir restauración sensorial real y, a la vez, una apertura de discernimiento.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés que prefirió ‘dim’ sobre ‘blind’ por mayor precisión léxica; por eso en español se evitó una solución demasiado fuerte como ‘cegados’ y se optó por ‘oscuros’, manteniendo la ambigüedad controlada del hebreo. También se preservó la lectura consecutiva de la conjunción inicial con ‘Entonces’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general, pero este versículo no lo contiene.
  - Se evitó ‘escucharán’ para no perder el matiz de atención intensiva de קשב.
  - Se preservó el paralelismo sintáctico ‘los ojos de... / los oídos de...’ para reflejar la estructura hebrea.
  - La nota al pie ofrece una alternativa española que corresponde a la alternativa léxica inglesa preservada en el audit trail.
