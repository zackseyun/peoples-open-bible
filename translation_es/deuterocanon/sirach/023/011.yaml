base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/023/011.yaml
  text: A man who swears many oaths will be filled with lawlessness[a], and the scourge will not depart from his house. If he sins unintentionally, his sin is upon him; and if he disregards it, he has sinned doubly. And if he swore in vain, he will not be justified[d][c][b], for his house will be filled with calamities.
  footnotes:
  - marker: a
    text: Or 'the scourge will not depart from his house.' The Greek μάστιξ can denote a literal whip or, figuratively, a scourge of punishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'if he ignores it, he has sinned twice over.' The sense is that treating the offense lightly compounds the guilt.
    reason: lexical_alternative
  - marker: c
    text: Or 'if he swore falsely' / 'if he took an empty oath.' The Greek literally speaks of swearing 'through emptiness.'
    reason: lexical_alternative
  - marker: d
    text: The final term is difficult; it likely means imposed troubles or punitive afflictions coming upon the household.
    reason: textual_variant
