revisions:
- from: 'Y le dijo[a]: «Por favor, alza tus ojos y mira: todos los machos cabríos que se aparean con el rebaño[b] son listados, punteados y pintados, porque he visto todo lo que Labán te está haciendo».'
  to: 'Y le dijo: «Por favor, alza tus ojos y mira: todos los machos cabríos que se aparean con el rebaño[a] son listados[b], punteados y manchados, porque he visto todo lo que Labán te está haciendo».'
  rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a las frases comentadas. Además, se cambió «pintados» por «manchados» para reflejar mejor וּבְרֻדִּים como rasgo natural del pelaje y mantener la serie distintiva «listados, punteados y manchados» en español claro y fiel.
