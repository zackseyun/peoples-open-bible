translation:
  language: es
  text: Que los montes traigan paz al pueblo[a], y los collados, en justicia[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por justicia»; «justicia» también puede entenderse como «rectitud».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y los collados, en justicia».'
    reason: previous_rendering
lexical_decisions:
- source_word: יִשְׂאוּ
  english_pob_choice: May ... bring
  chosen_spanish: Que ... traigan
  alternatives_spanish:
  - que ... lleven
  - que ... produzcan
  - que ... hagan llegar
  lexicon: HALOT
  rationale: El verbo hebreo נָשָׂא tiene aquí sentido poético de llevar o traer. En español, ‘traigan’ comunica bien la idea jussiva de deseo/petición sin sonar mecánico. Se conserva el matiz de exhortación implícita en el perfecto/imperf. volitivo del salmo.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: ‘Montes’ es un equivalente natural y solemne en español bíblico para el plural hebreo. Mantiene el paralelismo poético con ‘collados’ y suena más fluido que ‘montañas’ en este contexto.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - prosperidad
  - plenitud
  lexicon: HALOT
  rationale: ‘Paz’ es la equivalencia más directa y transparente para שָׁלוֹם en este verso. Aunque el término puede abarcar bienestar o plenitud, el contexto poético permite conservar el sentido amplio sin sobreexplicar.
- source_word: לָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - para el pueblo
  - al pueblo de Dios
  lexicon: HALOT
  rationale: La preposición ל admite dirección o beneficio. ‘Al pueblo’ reproduce bien el movimiento hacia los destinatarios de la paz y evita añadir una glosa interpretativa innecesaria.
- source_word: וּגְבָעוֹת
  english_pob_choice: and the hills
  chosen_spanish: y los collados
  alternatives_spanish:
  - y las colinas
  - y las lomas
  lexicon: HALOT
  rationale: ‘Collados’ conserva el paralelismo poético con ‘montes’ y es una palabra natural en registro bíblico. También evita una repetición demasiado moderna o prosaica de ‘montañas’.
- source_word: בִּצְדָקָה
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - por justicia
  - con justicia
  lexicon: HALOT
  rationale: El sustantivo צְדָקָה puede designar justicia o rectitud. ‘En justicia’ conserva la compactación hebrea de la frase preposicional y deja abierta la relación exacta entre paz y justicia, sin convertirla en un objeto distinto.
theological_decisions:
- issue: Función del imperfecto en un salmo real de bendición/petición
  english_pob_reading: 'jussive-like wish/prayer: ''May the mountains bring'''
  chosen_spanish_reading: 'petición/deseo: ''Que los montes traigan'''
  alternative_spanish_readings:
  - Los montes traerán
  - Los montes traerían
  rationale: En el marco del Salmo 72, la forma verbal expresa una aspiración por el reinado justo del rey, no una simple predicción. El español con ‘Que ... traigan’ preserva el valor desiderativo sin perder naturalidad.
  doctrine_reference: Salmo 72 como oración mesiánico-real por un gobierno justo y pacificador
translation_notes:
  revision_awareness: La revisión inglesa reciente evitó convertir la segunda cola en un objeto explícito ('bring righteousness') y volvió a 'in righteousness'. Por eso el español mantiene la frase preposicional 'en justicia' en vez de duplicar un verbo o convertirla en objeto directo, preservando mejor la estructura hebrea y la tensión interpretativa documentada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Se eligió 'paz' para שָׁלוֹם y 'justicia' para צְדָקָה, manteniendo el par semántico sin fusionarlos.
  - La puntuación refleja el paralelismo poético y la elipsis verbal del segundo hemistiquio.
