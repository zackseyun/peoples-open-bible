    reason: textual_variant
  - marker: b
    text: O 'una esposa habladora'. El hebreo dice literalmente 'una esposa de lengua', y el griego tiene una mujer dada a la lengua.
    reason: lexical_alternative
  - marker: c
    text: O 'para un hombre tranquilo'. El griego usa un término que puede significar 'tranquilo' o 'pacífico'; se eligió 'apacible' por naturalidad en español y para reflejar mejor el contraste de carácter.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar con más fidelidad las decisiones léxicas ya auditadas: ''de lengua áspera'' conserva el carácter negativo de אֵשֶׁת לָשׁוֹן mejor que ''charlatana'', y ''apacible'' reproduce mejor la preferencia documentada por ''gentle'' frente a la alternativa ''quiet''. Se mantienen la imagen principal, la sintaxis proverbial y las notas textuales del original auditado.'
