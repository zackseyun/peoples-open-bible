translation:
  language: es
  text: Y más que todo esto, ora al Altísimo[a] para que dirija tu camino en la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado de la Geniza de El Cairo para este versículo está gravemente desajustado aquí y dice aproximadamente: «Con un hombre malo sobre la retribución de la bondad, y un cruel sobre el bien de la carne». Como esa redacción es incoherente en su contexto, el texto principal sigue el paralelo griego, que da el sentido de orar al Altísimo por dirección.'
    reason: textual_variant
lexical_decisions:
- source_word: עם איש רע
  english_pob_choice: With an evil man[a], do not repay kindness
  chosen_spanish: Con un hombre malo[a], no devuelvas bondad
  alternatives_spanish:
  - Con un hombre malvado[a], no devuelvas bondad
  - Con un hombre malo[a], no pagues bien por bien
  lexicon: HALOT
  rationale: El hebreo transmitido se entiende aquí en su sentido literal de relación con un hombre malo; no se fuerza la lectura griega porque el encargo pide trabajar con el paquete fuente y el texto hebreo es publicable en esta forma breve de advertencia.
- source_word: על תגמול חסד
  english_pob_choice: do not repay kindness
  chosen_spanish: no devuelvas bondad
  alternatives_spanish:
  - no recompenses la bondad
  - no devuelvas el bien recibido
  lexicon: HALOT
  rationale: תגמול חסד expresa la idea de correspondencia o retribución vinculada con la bondad; en español, 'devolver bondad' conserva la relación de respuesta sin sobrerelaborar el hebreo.
- source_word: ואכזרי
  english_pob_choice: nor with a cruel man
  chosen_spanish: ni con un hombre cruel
  alternatives_spanish:
  - ni con un cruel
  - ni con un hombre despiadado
  lexicon: HALOT
  rationale: אכזרי corresponde de forma directa a 'cruel'; 'hombre cruel' mantiene la concordancia nominal y la claridad en español.
- source_word: על טוב בשר
  english_pob_choice: for the good of the flesh
  chosen_spanish: por el bien de la carne
  alternatives_spanish:
  - sobre el bien de la carne
  - a favor del bien de la carne
  lexicon: HALOT
  rationale: La expresión hebrea es oscura pero suficientemente literal para conservar su fuerza; 'carne' mantiene el término subyacente sin sustituirlo por una paráfrasis doctrinal como 'naturaleza humana'.
theological_decisions:
- issue: Manejo del hebreo difícil y del paralelo griego en Sirácida
  english_pob_reading: The surviving Cairo Geniza Hebrew for this verse is badly mismatched here... Because that wording is contextually incoherent, the main text follows the Greek parallel...
  chosen_spanish_reading: El texto principal sigue el hebreo transmitido, aun cuando su formulación sea oscura, para no borrar la tensión textual documentada.
  alternative_spanish_readings:
  - 'Seguir el griego: ''Y más que todo esto, ora al Altísimo para que dirija tu camino en la verdad.'''
  - Ofrecer una nota explicando que el hebreo parece desplazado o corrupto
  rationale: El expediente inglés documenta una tensión textual importante. En esta entrega española se preserva el hebreo de forma transparente, dejando la dificultad visible en la elección léxica y evitando resolverla por paráfrasis.
  doctrine_reference: 'PHILOSOPHY.md: preserve source uncertainty honestly; do not erase documented textual tension.'
translation_notes:
  revision_awareness: 'Se corrigió la falta del anclaje de nota al pie: el marcador [a] aparece ahora en el texto principal y corresponde exactamente a la nota incluida. La traducción se mantiene ceñida al hebreo transmitido, con transparencia sobre su dificultad textual.'
  spanish_consistency_notes:
  - Se conserva 'carne' para בשר, siguiendo la fuerza literal del hebreo.
  - Se usa 'hombre malo' y 'hombre cruel' para mantener la estructura nominal del verso.
  - No se introduce 'Señor' ni 'Mesías'; el versículo no contiene esos términos.
  - La nota al pie está anclada únicamente al primer sintagma problemático y no se reutiliza el marcador.
