translation:
  language: es
  text: 'De entre los hijos de Adonikam[a], los últimos, y estos son sus nombres: Elifalat hijo de Jeuel, y Semaía[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los últimos». La expresión puede indicar el subgrupo final o los descendientes más tardíos de la familia; se conserva una redacción cercana al griego porque el matiz exacto no es seguro.'
    reason: lexical_alternative
  - marker: b
    text: El testimonio paralelo del texto hebreo correspondiente en Esdras difiere en este punto. Como 1 Esdras a menudo reordena o reelabora sus paralelos hebreos, aquí se sigue el griego como fuente primaria.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: From the sons of
  chosen_spanish: De entre los hijos de
  alternatives_spanish:
  - De los hijos de
  - Entre los hijos de
  lexicon: LSJ
  rationale: La preposición ἐκ expresa origen o pertenencia desde un grupo. En español, «De entre» comunica bien esa procedencia dentro de una lista genealógica sin sonar rígido.
- source_word: Ἀδωνιακαὶμ
  english_pob_choice: Adonikam
  chosen_spanish: Adonikam
  alternatives_spanish:
  - Adoniakim
  lexicon: LSJ
  rationale: Es un nombre propio; se translitera. Se prefiere la forma más cercana al ajuste revisado del POB inglés y más reconocible en castellano bíblico.
- source_word: οἱ ἔσχατοι
  english_pob_choice: the last
  chosen_spanish: los últimos
  alternatives_spanish:
  - los postreros
  - los finales
  lexicon: LSJ
  rationale: ἔσχατοι puede significar «últimos» en sentido temporal o de orden dentro de una lista. «Los últimos» conserva esa ambigüedad sin imponer una explicación más específica.
- source_word: καὶ ταῦτα τὰ ὀνόματα αὐτῶν
  english_pob_choice: and these are their names
  chosen_spanish: y estos son sus nombres
  alternatives_spanish:
  - y estos eran sus nombres
  - y estos sus nombres
  lexicon: LSJ
  rationale: Es una fórmula lista-introductoria estándar. «Estos son sus nombres» suena natural en español y mantiene el valor presentativo del griego.
- source_word: Ἐλειφάλα
  english_pob_choice: Eliphalat
  chosen_spanish: Elifala
  alternatives_spanish:
  - Elifalat
  - Elifala
  lexicon: LSJ
  rationale: El nombre propio se translitera desde el griego, pero en español se evita una forma artificialmente cercana a la grafía inglesa. «Elifala» mantiene la base fónica del original griego de manera legible.
- source_word: τοῦ Γεουὴλ
  english_pob_choice: son of Jeuel
  chosen_spanish: hijo de Jeuel
  alternatives_spanish:
  - de Jeuel
  lexicon: LSJ
  rationale: El genitivo con nombre personal en listas genealógicas indica filiación. «Hijo de» hace explícita la relación en español sin añadir interpretación adicional.
- source_word: Σαμαίας
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Samaías
  - Semaia
  lexicon: LSJ
  rationale: Se usa la forma castellana tradicional/transliterada del nombre semítico, que reproduce mejor la pronunciación esperable que una transliteración griega estricta.
theological_decisions:
- issue: El valor de οἱ ἔσχατοι en una lista genealógica
  english_pob_reading: the last
  chosen_spanish_reading: los últimos
  alternative_spanish_readings:
  - los postreros
  - los últimos descendientes
  rationale: No hay necesidad de cargar el sintagma con una explicación doctrinal; en este contexto funciona como marcador de orden o de subgrupo final. La traducción mantiene la tensión semántica sin resolverla en exceso.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue el griego de Swete como ancla principal. Se tomó en cuenta el audit trail inglés y su revisión más reciente, especialmente la preferencia por Adonikam, Jeuel y el valor más sobrio de οἱ ἔσχατοι, pero se ajustó la forma española para mantener naturalidad y consistencia bíblica.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo donde el texto lo requiera; aquí no aparece.
  - Se usa «hijo de» para una filiación genealógica explícita, en lugar de una genitivo ambiguo.
  - Los nombres propios se transliteran de manera legible en español, evitando una calca demasiado inglesa.
  - La ambigüedad de «los últimos» se conserva para respetar el griego y el audit trail del POB.
