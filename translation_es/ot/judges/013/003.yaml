    text: 'O «el mensajero de Yahvé». Hebreo: «Mira, por favor»; la partícula añade énfasis o una leve urgencia.'
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación mínima para mejorar la naturalidad del español y corregir el anclaje de la nota. Se mantuvo «Yahvé», «ángel», «estéril», «concebirás» y «darás a luz un hijo». Se eliminó «ahora» porque en español suena forzado aquí; la nota preserva el matiz de הִנֵּה נָא. También se quitó el marcador tras «le dijo» y se colocó la nota en «Mira», donde realmente corresponde. Dado que solo puede haber una nota anclada a esa zona del texto, se fusionó en una sola nota la alternativa léxica de «ángel/mensajero» y la explicación de הִנֵּה נָא.
