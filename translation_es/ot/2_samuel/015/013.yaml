translation:
  language: es
  text: 'Entonces llegó un mensajero a David[a], diciendo: «Los corazones de los hombres de Israel están con Absalón».


    [a] Hebreo literalmente: «el corazón de los hombres de Israel está después de Absalón», un modismo que significa que su lealtad o fidelidad se ha pasado a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «el corazón de los hombres de Israel está después de Absalón», un modismo que significa que su lealtad o fidelidad se ha pasado a él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El wayyiqtol de בוא avanza la narración con una acción pasada simple. «Llegó» suena natural en español y conserva el movimiento narrativo sin cargar el texto con un matiz más fuerte que el del hebreo.
- source_word: הַמַּגִּיד
  english_pob_choice: a messenger
  chosen_spanish: un mensajero
  alternatives_spanish:
  - el informante
  - el portador del mensaje
  - el que daba el informe
  lexicon: HALOT
  rationale: El participio hifil de נגד señala a quien comunica o trae un informe. «Mensajero» es la equivalencia más clara y digna en español para este contexto político, y evita sobreespecificar la función con términos más técnicos o interpretativos.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: «Diciendo» reproduce de forma transparente la introducción hebrea del discurso directo sin añadir un enlace narrativo que el original no exige.
- source_word: הָיָה לֶב
  english_pob_choice: The hearts ... are with
  chosen_spanish: El corazón ... está con
  alternatives_spanish:
  - La lealtad ... se ha pasado a
  - El ánimo ... está con
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el corazón ... ha estado/está después de». En español, conservar «corazón» mantiene la imagen semítica y deja visible la tensión idiomática; «está con» comunica el sentido de adhesión o lealtad sin forzar una paráfrasis excesiva.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - la gente de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, funciona colectivamente. «Los hombres de Israel» respeta la forma masculina y el sentido colectivo del grupo mencionado, y coincide con la fuerza sociopolítica del pasaje.
- source_word: אַחֲרֵי
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - después de
  - siguiendo a
  lexicon: HALOT
  rationale: El sentido literal es «después de», pero en este dicho la relación es de seguimiento o adhesión. «Con» es el equivalente idiomático en español que expresa lealtad política de manera clara y fiel.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: tradicional proper name convention
  rationale: Se usa la forma castellanizada habitual «Absalón» para el nombre propio, plenamente inteligible en español bíblico y coherente con el uso editorial estándar.
theological_decisions:
- issue: Idiom of allegiance expressed by 'heart ... after Absalom'
  english_pob_reading: Hebrew literally, 'the heart of the men of Israel is after Absalom,' an idiom meaning their loyalty or allegiance has gone over to him.
  chosen_spanish_reading: «El corazón de los hombres de Israel está con Absalón» mantiene la imagen literal y comunica la lealtad política implícita.
  alternative_spanish_readings:
  - «La lealtad de los hombres de Israel se ha pasado a Absalón»
  - «El corazón de los hombres de Israel sigue a Absalón»
  rationale: No se borra la tensión semántica del hebreo entre imagen corporal e idioma de adhesión. La redacción española conserva el término «corazón» y usa «está con» para expresar el valor relacional/político que el contexto demanda, sin convertirlo en una paráfrasis explicativa.
  doctrine_reference: Semántica bíblica del corazón como centro de voluntad, inclinación y lealtad; cf. uso idiomático del AT en narrativas políticas.
translation_notes:
  revision_awareness: El pasaje presenta un alto grado de acuerdo con el audit trail inglés y no requiere cambios sustanciales. Se mantiene la imagen hebrea del «corazón» para no ocultar el modismo, pero se da en español una formulación natural que expresa el sentido de lealtad política.
  spanish_consistency_notes:
  - Se mantiene «mensajero» para הַמַּגִּיד, en consonancia con el valor de reporte del participio.
  - Se usa el tratamiento narrativo en pasado simple («llegó») para seguir el avance del relato.
  - Se conserva «Absalón» como forma española estable del nombre propio.
  - La nota al pie explica la literalidad hebrea y el valor idiomático sin duplicar la traducción principal.
