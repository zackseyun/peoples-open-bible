translation:
  language: es
  text: Por tanto, cumplirán mis estatutos[a] y guardarán mis juicios, y los pondrán por obra[b]; y habitarán en la tierra con seguridad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '‘Estatutos’ y ‘juicios’ distinguen dos términos legales hebreos diferentes: חֻקִּים y מִשְׁפָּטִים.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite el verbo ‘hacer’: literalmente, ‘y harán mis estatutos ... y mis juicios guardarán y los harán’.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, habitarán la tierra prometida en seguridad.
    reason: cultural_note
lexical_decisions:
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: ‘Estatutos’ conserva el valor jurídico-covenantal de חֻקִּים y mantiene la distinción con מִשְׁפָּטִים. Es la opción más natural en español bíblico sin perder precisión.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis reglas
  - mis ordenanzas
  lexicon: HALOT
  rationale: ‘Juicios’ reproduce el peso legal de מִשְׁפָּטִים y distingue esta serie de חֻקִּים. ‘Reglas’ sería más claro, pero menos solemne; ‘ordenanzas’ podría nivelar la diferencia semántica entre ambos términos.
- source_word: תִּשְׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  lexicon: HALOT
  rationale: En contextos pactales, שׁמר expresa guardar/observar. ‘Guardarán’ conserva la idea de atención fiel y funciona bien con el paralelo legal del versículo.
- source_word: וַעֲשִׂיתֶם ... אֹתָם
  english_pob_choice: carry out ... and do them
  chosen_spanish: cumplirán ...; y los pondrán por obra
  alternatives_spanish:
  - harán ... y los harán
  - practicarán ... y los practicarán
  lexicon: HALOT
  rationale: El hebreo repite עשה para enfatizar la ejecución real. ‘Cumplirán’ y ‘poner por obra’ conservan esa fuerza y evitan una repetición torpe en español, a la vez que respetan el carácter enfático del doble verbo.
- source_word: וִישַׁבְתֶּם
  english_pob_choice: you shall dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - vivirán
  - residirán
  lexicon: HALOT
  rationale: ‘Habitarán’ es el equivalente más natural para יָשַׁב en el marco de la promesa de la tierra y suena adecuado en español bíblico actual.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Levítico, el término apunta al territorio pactal. ‘La tierra’ conserva la resonancia bíblica sin explicitar más de lo que el versículo dice.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en paz
  lexicon: HALOT
  rationale: בֶּטַח expresa seguridad/sin riesgo. ‘Con seguridad’ comunica bien la estabilidad del habitar, con un tono natural en español.
theological_decisions:
- issue: Relación entre obediencia y seguridad en la tierra
  english_pob_reading: 'The verse presents covenantal consequence within Israel''s land context: obedience leads to secure dwelling in the land.'
  chosen_spanish_reading: 'El versículo presenta una consecuencia pactal dentro del contexto de la tierra de Israel: la obediencia conduce a habitar con seguridad en la tierra.'
  alternative_spanish_readings:
  - Una promesa general de prosperidad o protección para cualquier creyente en cualquier contexto
  - Una garantía absoluta e individual de ausencia de peligro
  rationale: El hebreo vincula directamente guardar y cumplir los estatutos y juicios de Yahvé con habitar con seguridad en la tierra. La redacción española preserva ese marco pactal y territorial, sin universalizar indebidamente la promesa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El pasaje concuerda plenamente con la revisión más reciente: no hubo cambios requeridos y se mantiene la solución óptima ya validada por la auditoría en inglés.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino cuando aparece en el marco terminológico del proyecto, aunque este versículo no lo contiene explícitamente.
  - Se conserva la distinción léxica entre ‘estatutos’ y ‘juicios’ para reflejar los dos sustantivos hebreos diferentes.
  - La estructura con dos verbos de acción (‘cumplirán’ / ‘los pondrán por obra’) intenta reflejar la repetición enfática de עשה sin sonar rígida en español.
  - ‘La tierra’ se deja sin glosa en el texto principal para respetar la economía del versículo; la aclaración aparece en nota.
