  rationale: Se corrige la segunda persona al plural para ajustarse al hebreo y se mejora la naturalidad de לִשְׁמֹר מְאֹד וְלַעֲשׂוֹת con 'observar cuidadosamente y hacer', manteniendo la decisión léxica sobre צָרַעַת y la identificación de los sacerdotes levitas.
