revisions:
- from: Pero en cuanto a ti y a tus siervos[a], sé que todavía no temen[b] a Yahvé Dios.
  to: Pero en cuanto a ti y a tus siervos[a], sé que ustedes todavía no temen[b] ante Yahvé Dios.
  rationale: Se corrige la concordancia para reflejar adecuadamente el plural hebreo sin forzar «vosotros/teméis», menos natural en el español latinoamericano meta. También se ajusta «a» a «ante» para conservar mejor el matiz de מִפְּנֵי documentado en la auditoría inglesa. Las notas se mantienen y se afinan levemente para mayor naturalidad en español.
