translation:
  language: es
  text: ¿Podrás llenar su piel[a] con arpones[b], o su cabeza con lanzas de pesca[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Piel» traduce aquí el valor corporal concreto de עוֹר; en español también podría decirse «cuero», pero «piel» conserva mejor la simetría con «cabeza» y evita especializar demasiado el término.
    reason: lexical_alternative
  - marker: b
    text: El hebreo contiene un término raro; por eso «arpones» refleja una posible arma o implemento punzante de caza o pesca. También podría entenderse más generalmente como «hierros con púas».
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea puede referirse más generalmente a un implemento para capturar peces; también podría traducirse «anzuelos de pesca» o «ganchos de pesca», aunque aquí «lanzas de pesca» encaja mejor con la imagen paralela de ataque.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתְמַלֵּא
  english_pob_choice: Can you fill
  chosen_spanish: ¿Podrás llenar
  alternatives_spanish:
  - ¿Puedes llenar
  - ¿Vas a llenar
  lexicon: HALOT
  rationale: El imperfecto piel con partícula interrogativa formula un reto retórico; en español, «¿Podrás…?» conserva la idea de capacidad/desafío mejor que un futuro simple o una pregunta meramente directa.
- source_word: בְשֻׂכּוֹת
  english_pob_choice: with harpoons
  chosen_spanish: con arpones
  alternatives_spanish:
  - con hierros con púas
  - con ganchos
  lexicon: HALOT
  rationale: El término es raro y probablemente designa un instrumento punzante o con púas. «Arpones» comunica bien la imagen de un arma penetrante y mantiene la fuerza concreta del paralelismo con el segundo hemistiquio.
- source_word: עוֹרוֹ
  english_pob_choice: his hide
  chosen_spanish: su piel
  alternatives_spanish:
  - su cuero
  - su dermis
  lexicon: HALOT
  rationale: «Hide» en inglés funciona como piel gruesa de un animal grande; en español, «piel» es la opción natural y fiel, evitando un tecnicismo que sonaría forzado. Se mantiene el referente corporal sin añadir interpretación.
- source_word: וּבְצִלְצַל דָּגִים
  english_pob_choice: with fishing spears
  chosen_spanish: con lanzas para pescar
  alternatives_spanish:
  - con lanzas de pesca
  - con anzuelos
  lexicon: HALOT
  rationale: La expresión hebrea es oscura, pero el paralelismo con «arpones» favorece un instrumento de ataque. «Lanzas para pescar» preserva la función instrumental y la ambigüedad del original mejor que «anzuelos», que debilitaría la imagen de asalto.
- source_word: רֹאשׁוֹ
  english_pob_choice: his head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - su cabeza misma
  lexicon: HALOT
  rationale: Equivale de manera directa al término anatómico hebreo y conserva el paralelismo con «su piel».
translation_notes:
  revision_awareness: 'El pasaje coincide con la línea inglesa auditada en su lectura retórica e imaginería: una pregunta desafiante sobre si alguien podría perforar a Leviatán en la piel y en la cabeza. No se detectaron revisiones aplicadas en el expediente inglés reciente.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de la pregunta retórica con segunda persona singular formal implícita en el verbo («podrás»), coherente con el tono desafiante del hebreo.
  - Se evita «SEÑOR» y otras convenciones no pertinentes porque este versículo no contiene el nombre divino ni vocabulario teológico especializado.
  - «Arpones» y «lanzas para pescar» preservan el paralelismo de instrumentos penetrantes sin uniformar en exceso dos términos hebreos distintos.
