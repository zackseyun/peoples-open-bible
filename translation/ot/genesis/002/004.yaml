id: GEN.2.4
reference: Genesis 2:4
source:
  edition: WLC
  text: אֵ֣לֶּה תוֹלְד֧וֹת הַ/שָּׁמַ֛יִם וְ/הָ/אָ֖רֶץ בְּ/הִבָּֽרְאָ֑/ם בְּ/י֗וֹם עֲשׂ֛וֹת יְהוָ֥ה אֱלֹהִ֖ים אֶ֥רֶץ וְ/שָׁמָֽיִם׃
translation:
  text: These are the generations of the heavens and the earth when they were created[c][b][a], in the day that Yahweh God made the earth and the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew toledot, often rendered 'generations'; it can also mean 'account,' 'history,' or 'origins' in Genesis section headings.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the day that' is an idiom meaning 'when' or 'at the time that.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew divine name is YHWH, traditionally rendered 'the LORD'; alternatively, 'Yahweh God.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Standard deictic plural introducing a heading or section formula. Rendered straightforwardly as 'These are.' 'This is' is possible in smoother English when the formula is treated idiomatically, but the plural demonstrative is explicit in Hebrew.
- source_word: תוֹלְדוֹת
  chosen: generations
  alternatives:
  - account
  - history
  - origins
  lexicon: HALOT
  rationale: The noun often functions as a structuring formula in Genesis and can denote what is generated from or the account/history of something. 'Generations' preserves the lexical link to the recurring toledot formula while remaining intelligible. Alternatives are viable interpretive renderings but are less formally transparent.
- source_word: הַשָּׁמַיִם וְהָאָרֶץ
  chosen: the heavens and the earth
  alternatives:
  - the sky and the land
  - heaven and earth
  lexicon: HALOT
  rationale: Retains the familiar merism for the created order. 'Heavens' reflects the Hebrew plural form שָׁמַיִם. 'Sky and land' is too reductive here, and singular 'heaven' would flatten the Hebrew form.
- source_word: בְּהִבָּרְאָם
  chosen: when they were created
  alternatives:
  - in their being created
  - when they were brought into being
  lexicon: HALOT
  rationale: The prefixed ב plus infinitive construct with pronominal suffix is naturally temporal here. The Niphal of ברא is passive/reflexive in sense, so 'when they were created' is clear and idiomatic while preserving the passive force.
- source_word: בְּיוֹם
  chosen: in the day that
  alternatives:
  - when
  - at the time that
  lexicon: HALOT
  rationale: Hebrew idiomatically uses 'in the day' to mean 'when' or 'at the time that.' The more formal rendering is retained here because it is natural enough in English and preserves the literary texture of the Hebrew.
- source_word: עֲשׂוֹת
  chosen: made
  alternatives:
  - making
  - fashioned
  lexicon: HALOT
  rationale: Infinitive construct of עשה following בְּיוֹם yields the clause 'in the day that ... made.' 'Made' is the most direct and idiomatic English equivalent in this context.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The compound divine name is conventionally and accurately rendered 'the LORD God.' 'Yahweh God' is preserved as an alternative but not used in the main text per stated policy.
- source_word: אֶרֶץ וְשָׁמַיִם
  chosen: earth and heavens
  alternatives:
  - the earth and the heavens
  - land and sky
  lexicon: HALOT
  rationale: The word order reverses the earlier pair and is preserved in translation for literary effect. Articles are omitted here in English for smoother style after 'made,' while still reflecting the Hebrew objects. 'Land and sky' is too narrow for the creation context.
