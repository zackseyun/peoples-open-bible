translation:
  language: es
  text: Renuevas tus testigos[a] contra mí, y aumentas tu ira conmigo; cambios y duro servicio[b] están conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus evidencias» en lugar de «tus testigos»; el hebreo puede entenderse como testimonio forense o como pruebas presentadas contra Job.
    reason: lexical_alternative
  - marker: b
    text: O «cambios y guerra están conmigo». El hebreo probablemente evoca oleadas sucesivas de asalto con imaginería militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחַדֵּשׁ
  english_pob_choice: you renew
  chosen_spanish: renuevas
  alternatives_spanish:
  - haces nuevos
  - vuelves a traer
  lexicon: HALOT
  rationale: El piel de חדש expresa renovar o hacer nuevo otra vez. «Renuevas» conserva el valor iterativo y mantiene el tono directo de la queja de Job sin sobreinterpretar.
- source_word: עֵדֶיךָ
  english_pob_choice: your witnesses
  chosen_spanish: tus testigos
  alternatives_spanish:
  - tu testimonio
  - tus evidencias
  lexicon: HALOT
  rationale: עֵד puede referirse a testigos o a testimonios/evidencias. «Testigos» preserva mejor el marco forense de acusación que el contexto sugiere; la alternativa impersonal queda como posibilidad lexical.
- source_word: נֶגְדִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - delante de mí
  - en mi presencia
  lexicon: HALOT
  rationale: Aunque literalmente significa «delante de mí», en contexto adversarial/judicial el sentido natural es «contra mí». Esa opción reproduce la fuerza acusatoria del hebreo.
- source_word: וְתֶרֶב
  english_pob_choice: and you increase
  chosen_spanish: y aumentas
  alternatives_spanish:
  - y multiplicas
  - y haces grande
  lexicon: HALOT
  rationale: El verbo de רבה comunica hacer más abundante o grande. «Aumentas» es idiomático en español y conserva la idea de incremento continuo en la queja.
- source_word: כַּעַשְׂךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu enojo
  - tu indignación
  - tu disgusto
  lexicon: HALOT
  rationale: כעס puede abarcar ira, enojo o indignación. «Ira» es la opción más natural y solemne en español bíblico para la acusación dirigida a Dios.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  - sobre mí
  lexicon: HALOT
  rationale: Se mantiene la preposición literal «con» para preservar el hebraísmo comprimido del poema, aun cuando el contexto hace sentir una relación hostil.
- source_word: חֲלִיפוֹת
  english_pob_choice: changes
  chosen_spanish: cambios
  alternatives_spanish:
  - alternancias
  - relevo tras relevo
  - sucesivos ataques
  lexicon: HALOT
  rationale: La revisión inglesa reciente favorece «changes» frente a imágenes más interpretativas. «Cambios» es la equivalencia más sobria y cercana, y deja abierta la sucesión de embates implícita en el contexto.
- source_word: וְצָבָא
  english_pob_choice: hard service
  chosen_spanish: dura servidumbre
  alternatives_spanish:
  - duro servicio
  - ejército
  - guerra
  lexicon: HALOT
  rationale: צָבָא puede significar ejército o servicio/obligación dura. Dado que la revisión inglesa optó por «hard service», «dura servidumbre» recoge el peso opresivo sin forzar la imagen militar, aunque esta permanezca como trasfondo posible.
- source_word: עִמִּי
  english_pob_choice: are with me
  chosen_spanish: están conmigo
  alternatives_spanish:
  - son conmigo
  - están sobre mí
  lexicon: HALOT
  rationale: Se conserva la literalidad de «with me» mediante «conmigo». En español suena natural y mantiene la concisión poética del original.
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de una imagen más militar («relays and an army») a «changes and hard service». La redacción española sigue esa revisión reciente: «cambios y dura servidumbre», evitando una militarización excesiva y respetando la ambigüedad poética del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «conmigo» para עִמִּי y «contra mí» para נֶגְדִּי, reflejando la alternancia entre la preposición literal y su fuerza contextual adversativa.
  - Se prefirió «ira» para כַּעַשְׂךָ por coherencia con el registro bíblico y por claridad en español contemporáneo.
  - «Dura servidumbre» intenta conservar el peso opresivo de צָבָא sin imponer una lectura exclusivamente militar, en línea con la revisión inglesa más reciente.
