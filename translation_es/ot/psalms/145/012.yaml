review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: לְהוֹדִיעַ como ''dar a conocer'', לִבְנֵי הָאָדָם como ''a los hijos del hombre'' con nota inclusiva, y מַלְכוּתוֹ como ''su reino''. Sin embargo, la secuencia וּכְבוֹד הֲדַר מַלְכוּתוֹ no queda del todo fiel con ''el esplendor glorioso de su reino'', porque desplaza demasiado כבוד (''gloria'') y puede sonar redundante en español. Conviene conservar más claramente ambas nociones: gloria + esplendor/majestad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'sus proezas' puede sugerir heroicidad humana más que actos poderosos divinos, y 'esplendor glorioso' suena algo pesado. Además, la nota al pie puede formularse con español más limpio y natural. Una leve revisión mejora fidelidad y legibilidad sin apartarse del audit trail.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La decisión de mantener 'los hijos del hombre' en el texto y explicar el sentido genérico en nota concuerda con la pauta documentada. La mejora propuesta busca alinear mejor כבוד con 'gloria' y גבורות con 'actos poderosos/hechos poderosos'.
  issues:
  - severity: medium
    issue: '''sus proezas'' para גְּבוּרֹתָיו'
    rationale: Aunque es idiomático, 'proezas' puede sonar más heroico o humano que teológico. El hebreo apunta a actos poderosos o hechos de poder; 'sus actos poderosos' preserva mejor esa fuerza.
  - severity: medium
    issue: '''el esplendor glorioso'' para וּכְבוֹד הֲדַר'
    rationale: La formulación es comprensible, pero en español atenúa demasiado la noción de 'gloria' presente en כבוד y produce una combinación algo redundante. 'La gloria del esplendor' conserva ambas palabras y refleja mejor la relación del hebreo.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: 'La nota actual es entendible, pero ''a la gente'' es menos precisa que ''a la humanidad'' o ''a la humankind/mankind'' del inglés. Conviene una redacción más limpia: ''O: “a la humanidad” / “al género humano”.'''
  revised_spanish_text: para dar a conocer a los hijos del hombre[a] sus actos poderosos y la gloria del esplendor de su reino.
  revised_footnotes:
  - marker: a
    text: 'O: “a la humanidad” / “al género humano”. El hebreo dice literalmente “a los hijos del hombre”, una expresión genérica para los seres humanos.'
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor pero necesaria para mejorar fidelidad semántica y naturalidad: ''actos poderosos'' comunica mejor גבורות que ''proezas'', y ''la gloria del esplendor de su reino'' conserva explícitamente tanto כבוד como הדר, en línea con el audit trail inglés. La nota se pulió para español más natural y preciso.'
