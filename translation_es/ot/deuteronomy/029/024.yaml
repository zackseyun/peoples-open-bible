review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: secuencia narrativa («Entonces dirán»), causalidad («Porque»), infidelidad al pacto, nombre divino «Yahvé», referencia patriarquica («sus padres»), establecimiento del pacto y marco temporal del éxodo. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en el audit trail inglés para אֱלֹהֵי אֲבֹתָם: el inglés ofrece «their fathers’ God», no «sus antepasados».'
  spanish_quality_summary: 'El español es claro, natural y digno. Hay solo reparaciones menores: conviene ajustar la nota para que refleje la alternativa correcta, y «que él hizo con ellos» puede mejorarse a «que hizo con ellos», ya que el pronombre explícito no es necesario en español y suena un poco pesado. El resto del versículo lee bien.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה → «Yahvé», בְּרִית → «pacto», אֱלֹהֵי אֲבֹתָם → «el Dios de sus padres». La única desalineación real está en la nota léxica, donde «antepasados» contradice la decisión documentada de preservar «fathers/padres» y sustituye una alternativa estructural por una semánticamente distinta.'
  issues:
  - severity: medium
    issue: La nota al pie introduce «el Dios de sus antepasados» como alternativa.
    rationale: El audit trail inglés documenta como alternativa «their fathers’ God», es decir, una variante estructural («el Dios de sus padres» / «el Dios que fue de sus padres» o similar), no una neutralización a «antepasados». Además, el proyecto pide preservar la referencia patriarcal.
  - severity: low
    issue: «que él hizo con ellos» suena ligeramente redundante en español.
    rationale: El hebreo permite sujeto explícito por la forma verbal, pero en español el pronombre «él» no aporta contraste aquí. «que hizo con ellos» es más natural sin pérdida de sentido.
  revised_spanish_text: 'Entonces dirán[a]: «Porque abandonaron el pacto de Yahvé, el Dios de sus padres, que hizo con ellos cuando los sacó de la tierra de Egipto».'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «el Dios de sus padres»; alternativamente, «el Dios de los padres de ellos».'
    reason: lexical_alternative
  revision_rationale: Se revisa la nota al pie para reflejar fielmente la alternativa documentada en el audit trail inglés sin neutralizar «padres» a «antepasados». También se elimina el pronombre explícito «él» para mejorar la naturalidad del español manteniendo intacto el sentido del hebreo.
