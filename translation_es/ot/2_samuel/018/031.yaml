translation:
  language: es
  text: 'Y he aquí[a] que llegó el cusita, y el cusita dijo: «Que mi señor el rey reciba la buena noticia[b], porque Yahvé te ha hecho justicia hoy de la mano de todos los que se alzaron contra ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el etíope». Hebreo: «el cusita».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé ha juzgado por ti hoy» o «te ha dado justicia hoy».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y entonces
  - Y ve
  lexicon: HALOT
  rationale: El hebreo introduce una llegada repentina con fuerza discursiva; 'he aquí' conserva esa vivacidad en español sin perder naturalidad narrativa.
- source_word: הַכּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: el cuxita
  alternatives_spanish:
  - el cushita
  - el etíope
  - el hombre de Cus
  lexicon: HALOT
  rationale: Se conserva el etnónimo cercano al hebreo y a la decisión de la POB en inglés, evitando una identificación más interpretativa como 'etíope'. 'Cuxita' mantiene la referencia geográfica/étnica sin sustituirla por un nombre propio.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: En español, 'llegó' expresa con naturalidad la entrada del mensajero en escena. El valor narrativo simple del perfecto hebreo queda preservado.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: Es la equivalencia narrativa estándar y directa para אמר en secuencia.
- source_word: יִתְבַּשֵּׂר
  english_pob_choice: receive the good news
  chosen_spanish: reciba la buena noticia
  alternatives_spanish:
  - oiga la buena noticia
  - sea notificado de la buena noticia
  - se le anuncie la buena noticia
  lexicon: HALOT
  rationale: El hitpael funciona aquí con matiz volitivo/jussivo en boca del mensajero. 'Reciba la buena noticia' comunica el acto de anuncio de forma idiomática en español sin perder el contenido de noticias favorables.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi amo el rey
  - mi señor rey
  lexicon: HALOT
  rationale: '''Mi señor el rey'' reproduce la fórmula cortesana con dignidad y sin sugerir matiz servil excesivo en español moderno.'
- source_word: שְׁפָטְךָ
  english_pob_choice: has vindicated you
  chosen_spanish: te ha hecho justicia
  alternatives_spanish:
  - te ha vindicado
  - ha juzgado por ti
  - te ha dado justicia
  lexicon: HALOT
  rationale: La raíz שׁפט aquí tiene fuerza judicial y de reivindicación. 'Te ha hecho justicia' conserva la idea de juicio favorable y la acción pública de Yahvé, sin cerrar el campo semántico a una sola interpretación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por título. ''Yahvé'' es la forma fijada para el texto español.'
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: Equivalencia directa y natural en español.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de agencia/hostilidad del hebreo, transparente también en español.
- source_word: כָּל הַקָּמִים עָלֶיךָ
  english_pob_choice: all who rose up against you
  chosen_spanish: todos los que se alzaron contra ti
  alternatives_spanish:
  - todos los que se levantaron contra ti
  - todos tus adversarios
  - todos los que se rebelaron contra ti
  lexicon: HALOT
  rationale: '''Alzaron contra ti'' mantiene la fuerza verbal de קום con על y sugiere oposición hostil sin sobretraducir como rebelión explícita.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Siguiendo la convención del proyecto y la decisión inglesa auditada, se translitera el nombre divino para preservar el nombre personal del pacto, no un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de שׁפט en el contexto
  english_pob_reading: has vindicated you / has judged for you today / has given you justice today
  chosen_spanish_reading: te ha hecho justicia
  alternative_spanish_readings:
  - te ha vindicado
  - ha juzgado por ti
  - te ha dado justicia
  rationale: 'La POB en inglés retiene la tensión entre juicio y vindicación. ''Te ha hecho justicia'' conserva ese campo semántico en español y deja abiertas las dos dimensiones: pronunciamiento judicial favorable y liberación efectiva frente a los enemigos.'
  doctrine_reference: DOCTRINE.md contested lexical-theological range for שׁפט
- issue: La imagen de 'la mano' como dominio hostil
  english_pob_reading: from the hand of all who rose up against you
  chosen_spanish_reading: de la mano de todos los que se alzaron contra ti
  alternative_spanish_readings:
  - del poder de todos los que se alzaron contra ti
  - de todos los que se alzaron contra ti
  rationale: Se conserva la metáfora corporal del hebreo y del audit trail inglés, porque en este contexto expresa poder opresor y liberación concreta.
  doctrine_reference: HALOT entry for יָד / hand as idiom
translation_notes:
  revision_awareness: La versión sigue el pasaje hebreo WLC y coincide sustancialmente con la auditoría inglesa más reciente (estado de alta concordancia, sin cambios en la última pasada). Se mantienen las decisiones auditadas sobre el nombre divino, el etnónimo y el campo semántico judicial de שׁפט, con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה.
  - Se emplea 'cuxita' para el etnónimo correspondiente a הַכּוּשִׁי, manteniendo la referencia étnico-geográfica.
  - Se conserva la metáfora 'de la mano de' como imagen de dominio y liberación.
  - '''Te ha hecho justicia'' queda deliberadamente abierto entre vindicación y juicio favorable, conforme al audit trail en inglés.'
