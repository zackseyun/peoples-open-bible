translation:
  language: es
  text: Sin embargo, los lugares altos no fueron quitados, y el pueblo todavía no había dispuesto[a] su corazón hacia el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no había preparado su corazón para el Dios de sus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: La partícula abre un giro concesivo/contrastivo; «Sin embargo» conserva ese contraste con registro natural y digno en español bíblico moderno.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos lugares
  - los santuarios de altura
  lexicon: HALOT
  rationale: Se conserva el término cultual tradicional sin forzar una interpretación más específica que el hebreo no exige aquí. «Lugares altos» es claro en español y mantiene el referente histórico-religioso.
- source_word: לֹא סָרוּ
  english_pob_choice: were not removed
  chosen_spanish: no fueron quitados
  alternatives_spanish:
  - no se apartaron
  - no fueron eliminados
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma verbal activa con sentido idiomático, en español la pasiva expresa con naturalidad el estado persistente de esos lugares. «Quitados» reproduce bien la idea de que no fueron removidos.
- source_word: וְעוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía seguían
  lexicon: HALOT
  rationale: Marca continuidad de una condición pendiente. «Todavía» es idiomático y transmite la persistencia del problema.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo del país
  lexicon: HALOT
  rationale: El colectivo designa a la comunidad nacional/covenantal; «el pueblo» mantiene esa fuerza mejor que un plural más genérico.
- source_word: לֹא הֵכִינוּ לְבָבָם
  english_pob_choice: had not set their hearts
  chosen_spanish: no había dispuesto su corazón
  alternatives_spanish:
  - no había preparado su corazón
  - no había orientado su corazón
  - no habían preparado sus corazones
  lexicon: HALOT
  rationale: El hifil de כון con «corazón» admite la idea de preparar, establecer u orientar. En español, «disponer el corazón» conserva la intención volitiva e interna sin sonar forzado. Se mantiene el singular colectivo de «el pueblo» con un complemento singular distributivo natural.
- source_word: לֵאלֹהֵי אֲבֹתֵיהֶם
  english_pob_choice: toward the God of their fathers
  chosen_spanish: hacia el Dios de sus padres
  alternatives_spanish:
  - para el Dios de sus padres
  - al Dios de sus padres
  lexicon: HALOT
  rationale: La preposición ל expresa dirección/orientación del corazón. «Hacia» hace explícita esa orientación. Se conserva «el Dios de sus padres» como referencia pactal e histórica.
theological_decisions:
- issue: Alcance de la carencia del pueblo
  english_pob_reading: 'The verse describes incomplete covenant devotion: external reform remained unfinished and the people''s inner allegiance was not yet directed to the God of their fathers.'
  chosen_spanish_reading: El versículo presenta una reforma externa incompleta y una orientación interior todavía no dirigida al Dios de sus padres.
  alternative_spanish_readings:
  - El pueblo no se había preparado emocionalmente para adorar
  - El pueblo no había afirmado plenamente su lealtad exclusiva
  rationale: 'Conviene preservar ambas dimensiones del texto: la persistencia de los lugares altos y la falta de disposición interior. «Orientación interior» evita reducir el sentido a una emoción momentánea o a una formulación doctrinal posterior.'
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; se mantiene la lectura concesiva de אַךְ, la pasiva idiomática para los lugares altos y la orientación del corazón expresada con לֵאלֹהֵי.
  spanish_consistency_notes:
  - Se mantiene «Dios de sus padres» para conservar la referencia histórica y pactal.
  - Se evita «SEÑOR» porque el hebreo usa אֱלֹהֵי, no una sustitución del nombre divino.
  - Se usa «lugares altos» como término cultual estable y auditable.
  - Se conserva un registro bíblico moderno y claro, sin arcaísmos innecesarios.
