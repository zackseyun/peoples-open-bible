revisions:
- from: Porque Yahvé honró al padre por encima de los hijos, y confirmó el derecho de la madre sobre sus hijos.
  to: Porque Yahvé honró al padre por encima de los hijos, y estableció la autoridad[a] de la madre sobre sus hijos.
  rationale: 'Se ajusta el segundo hemistiquio para seguir la decisión léxica principal documentada en el POB inglés: משפט האם se vierte mejor como ''la autoridad de la madre'' en el texto principal, mientras ''derecho'' se conserva como alternativa en nota. También se cambia ''confirmó'' por ''estableció'' para corresponder más estrechamente a la elección principal ''established'' y al matiz de hacer firme.'
