  to: 'Entonces Amán tomó el manto y el caballo, vistió a Mardoqueo, lo hizo montar[a] sobre el caballo, lo llevó por la plaza de la ciudad y proclamó delante de él: «Así se hará al hombre a quien el rey se complace en honrar».'
