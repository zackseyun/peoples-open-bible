translation:
  language: ko
  text: 여러분을 부르시는 분은 신실하시니, 그분께서 또한 이루실 것입니다.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분을 부르시는 이는 미쁘시니, 그분이 또한 그것을 성취하실 것입니다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς ὁ καλῶν ὑμᾶς
  english_pob_choice: Faithful is the one who calls you
  chosen_korean: 여러분을 부르시는 분은 신실하시니
  alternatives_korean:
  - 여러분을 부르시는 이는 미쁘시니
  - 여러분을 부르신 분은 진실하시니
  lexicon: BDAG
  rationale: πιστός의 「신실함」을 「신실하시니」로 옮긴다. 한국 교회 전통의 「미쁘시다」는 고어적이므로 합쇼체 현대어 「신실하시다」로 옮긴다.
- source_word: ὃς καὶ ποιήσει
  english_pob_choice: who also will do it
  chosen_korean: 그분께서 또한 이루실 것입니다
  alternatives_korean:
  - 그분이 또한 행하실 것입니다
  - 그분께서 또한 성취하실 것입니다
  lexicon: BDAG
  rationale: ποιέω의 미래형. 본 문맥은 23절의 거룩하게 하심과 보전을 가리키므로 「이루다」가 자연스럽다.
