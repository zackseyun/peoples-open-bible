translation:
  language: es
  text: el que cuida de su pueblo contra la calamidad[a], y fortalece su ciudad contra la angustia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de un desastre repentino»; el paralelo griego dice «de caída» o «de ruina», lo que apoya la idea de protección contra el derrumbe.
    reason: lexical_alternative
  - marker: b
    text: O «contra el sitio»; el paralelo griego apunta más específicamente a presión militar que la expresión hebrea puede requerir.
    reason: alternative_reading
lexical_decisions:
- source_word: הַדּוֹאֵג
  english_pob_choice: the one who cares for
  chosen_spanish: el que se preocupa por
  alternatives_spanish:
  - el que cuida de
  - el que vela por
  - el que se ocupa de
  lexicon: HALOT
  rationale: El participio expresa preocupación activa y continua. «Se preocupa por» conserva ese matiz sin convertirlo en mera administración o provisión formal.
- source_word: לְעַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - para su pueblo
  - por su pueblo
  lexicon: HALOT
  rationale: «Pueblo» transmite el colectivo עם de modo natural en español, y el posesivo «su» conserva la referencia pronominal.
- source_word: מֵחֶתֶף
  english_pob_choice: against calamity
  chosen_spanish: de la calamidad
  alternatives_spanish:
  - de un desastre repentino
  - de la ruina
  - de la caída
  lexicon: HALOT
  rationale: El hebreo puede denotar una destrucción o golpe súbito. En español, «calamidad» conserva el sentido amplio de desastre amenazante; el matiz de súbito queda preservado en la nota de alternativa.
- source_word: וּמְחַזֵּק
  english_pob_choice: and strengthens
  chosen_spanish: y fortalece
  alternatives_spanish:
  - y fortalece más
  - y hace fuerte
  - y refuerza
  lexicon: HALOT
  rationale: «Fortalece» es el equivalente natural de חזק en piel, y puede incluir la idea de fortificar sin forzar un tecnicismo militar en el texto principal.
- source_word: עִירוֹ
  english_pob_choice: his city
  chosen_spanish: su ciudad
  alternatives_spanish:
  - la ciudad de él
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo con sufijo pronominal.
- source_word: מִצָּר
  english_pob_choice: against distress
  chosen_spanish: contra la angustia
  alternatives_spanish:
  - contra el sitio
  - contra la opresión
  - de la aflicción
  lexicon: HALOT
  rationale: El hebreo puede referirse a presión, estrechez o angustia; la versión griega apunta más específicamente a asedio. «Contra la angustia» preserva la amplitud hebrea, mientras la alternativa militar queda señalada en la nota.
theological_decisions:
- issue: 'Alcance de la protección: calamidad general vs. ruina súbita, y angustia vs. asedio'
  english_pob_reading: The English POB keeps the Hebrew broad in the main line, with notes acknowledging the Greek's more specific 'downfall' and 'siege'.
  chosen_spanish_reading: 'La línea principal mantiene un sentido amplio: «calamidad» y «angustia».'
  alternative_spanish_readings:
  - «de un desastre repentino»
  - «contra el sitio»
  - «contra la opresión»
  rationale: No se debe estrechar el hebreo más allá de lo que el texto base permite, pero tampoco borrar la señal de la LXX. La solución principal conserva la amplitud hebrea y la nota recoge la lectura militar sugerida por el griego.
  doctrine_reference: Principio de prioridad del texto fuente y de transparencia frente a variantes textuales
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la evaluación más reciente indica que no había cambios necesarios. La traducción española sigue esa lectura estable, conservando la tensión entre el hebreo amplio y el matiz militar de la LXX en notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se usa «fortalece» en vez de «fortifica» en el texto principal para evitar una restricción militar indebida, aunque la nota conserva esa posibilidad.
  - «Angustia» traduce la amplitud de צָר mejor que «sitio» en el cuerpo principal, pero la nota documenta la lectura específica del griego.
  - La puntuación y el orden sintáctico siguen un español bíblico moderno y legible sin depender de calcos rígidos.
