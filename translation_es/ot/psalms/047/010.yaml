translation:
  language: es
  text: Los nobles de los pueblos se han reunido como el pueblo del Dios de Abraham[a], porque a Dios pertenecen los escudos de la tierra[b]; él es muy exaltado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gobernantes de la tierra»; literalmente, «los escudos de la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «se han reunido con el pueblo del Dios de Abraham». El hebreo puede expresar asociación estrecha o identificación.
    reason: alternative_reading
lexical_decisions:
- source_word: נְדִיבֵי
  english_pob_choice: the nobles of
  chosen_spanish: los nobles de
  alternatives_spanish:
  - los príncipes de
  - los generosos de
  lexicon: HALOT
  rationale: נָדִיב designa personas de rango o nobleza; «nobles» es natural en español y conserva la referencia a una clase distinguida sin forzar un sentido de realeza.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: El plural apunta a grupos colectivos distintos; «pueblos» conserva mejor el matiz humano-colectivo que «naciones» en este contexto poético.
- source_word: נֶאֱסָפוּ
  english_pob_choice: have gathered
  chosen_spanish: se han reunido
  alternatives_spanish:
  - han sido reunidos
  - se han juntado
  lexicon: HALOT
  rationale: El nifal expresa reunión/intransitividad; «se han reunido» refleja bien el perfecto consumado en español y evita un pasivo innecesario.
- source_word: עַם אֱלֹהֵי אַבְרָהָם
  english_pob_choice: as the people of the God of Abraham
  chosen_spanish: como el pueblo del Dios de Abraham
  alternatives_spanish:
  - con el pueblo del Dios de Abraham
  - el pueblo del Dios de Abraham
  lexicon: HALOT
  rationale: El hebreo es comprimido y permite una relación de identificación o inclusión. «Como» mantiene esa tensión sin cerrarla demasiado hacia una sola lectura.
- source_word: לֵאלֹהִים
  english_pob_choice: belong to God
  chosen_spanish: a Dios pertenecen
  alternatives_spanish:
  - pertenecen a Dios
  - son de Dios
  lexicon: HALOT
  rationale: La preposición ל indica pertenencia; en español, el orden enfático «a Dios pertenecen» conserva el valor posesivo y el tono poético.
- source_word: מָגִנֵּי אֶרֶץ
  english_pob_choice: the shields of the earth
  chosen_spanish: los escudos de la tierra
  alternatives_spanish:
  - los gobernantes de la tierra
  - los protectores de la tierra
  lexicon: HALOT
  rationale: Se preserva la imagen literal del hebreo. La metáfora puede aludir a gobernantes o protectores, pero el texto base no obliga a desactivarla en el cuerpo principal.
- source_word: נַעֲלָה
  english_pob_choice: he is greatly exalted
  chosen_spanish: él es muy exaltado
  alternatives_spanish:
  - él ha sido exaltado en gran manera
  - él es exaltado grandemente
  lexicon: HALOT
  rationale: Aunque la forma verbal es 3ms, el sujeto implícito se entiende de Dios por el contexto. «Muy exaltado» transmite el sentido doxológico sin sobreinterpretar el aspecto verbal.
theological_decisions:
- issue: Relación de los nobles de los pueblos con el pueblo del Dios de Abraham
  english_pob_reading: The nobles of the peoples are gathered as/in identification with the people of the God of Abraham; the phrase preserves some ambiguity and possible inclusion of the nations.
  chosen_spanish_reading: Los nobles de los pueblos se reúnen como el pueblo del Dios de Abraham, dejando abierta la relación exacta entre identificación e inclusión.
  alternative_spanish_readings:
  - Los nobles de los pueblos se reúnen con el pueblo del Dios de Abraham.
  - Los nobles de los pueblos son reunidos en el pueblo del Dios de Abraham.
  rationale: El hebreo permite más de una relación sintáctica-teológica. «Como» conserva la ambigüedad productiva sin resolverla hacia una fórmula eclesiológica más cerrada de lo que el verso garantiza.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Metáfora de los escudos de la tierra
  english_pob_reading: The shields of the earth belong to God; the phrase may metaphorically refer to rulers or protectors.
  chosen_spanish_reading: Los escudos de la tierra pertenecen a Dios, manteniendo la imagen y su posible referencia metafórica a gobernantes o protectores.
  alternative_spanish_readings:
  - Los gobernantes de la tierra pertenecen a Dios.
  - Los protectores de la tierra pertenecen a Dios.
  rationale: La decisión principal conserva la metáfora en el texto, como hace el inglés POB, para no borrar la tensión entre imagen poética y posible referencia política.
  doctrine_reference: Preserve metaphorical force and avoid unnecessary flattening.
translation_notes:
  revision_awareness: 'He seguido el estado de revisión más reciente, que no introduce cambios respecto del pasaje fuente, y he mantenido las tensiones léxicas y sintácticas ya auditadas por el POB inglés: la posible lectura metafórica de «escudos» y la ambigüedad de la relación entre los nobles de los pueblos y el pueblo del Dios de Abraham.'
  spanish_consistency_notes:
  - Uso «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Conservo «pueblos» para עַמִּים y no lo reduzco a «naciones», para mantener el matiz colectivo.
  - Mantengo la imagen literal «escudos de la tierra» en el cuerpo principal y la alternativa interpretativa en nota.
  - La sintaxis «a Dios pertenecen» refleja la posesión de לֵאלֹהִים con un orden natural en español.
  - «Muy exaltado» conserva el tono doxológico sin sustituirlo por una paráfrasis más explicativa.
