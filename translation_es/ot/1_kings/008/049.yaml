  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: «entonces escucha» refleja la secuencia peticional; «en el cielo» preserva הַשָּׁמַיִם sin añadir «desde»; «el lugar de tu morada» transmite מְכוֹן שִׁבְתְּךָ; «su oración y su súplica» mantiene la distinción תפלה / תחנה; y «defiende su causa» comunica de manera aceptable el modismo jurídico וְעָשִׂיתָ מִשְׁפָּטָם. La principal corrección necesaria no es de sentido base sino de precisión paratextual y naturalidad mínima.'
  spanish_quality_summary: El español es claro y digno, pero la nota [a] no funciona bien como alternativa porque repite exactamente el texto principal en vez de ofrecer la alternativa documentada. Además, en la nota [b] conviene evitar mezclar inglés («judgment») dentro del español. Una leve mejora estilística en el texto principal es insertar «desde» antes de «el lugar de tu morada» para que la aposición suene más natural en español sin alterar el sentido de la imaginería.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones «oración», «súplica» y «causa» son coherentes con el razonamiento léxico documentado. La única desalineación real está en la nota [a], que no preserva correctamente la alternativa inglesa («tu morada» / «tu lugar de morada») frente al texto principal.
  issues:
  - severity: medium
    issue: La nota [a] repite el texto principal en lugar de dar una alternativa real.
    rationale: El texto principal ya dice «el lugar de tu morada»; por tanto, la nota «O ‘el lugar de tu morada’» no aporta variante y no preserva fielmente la función de la nota inglesa, que ofrecía una alternativa más simple como «your dwelling place».
  - severity: low
    issue: La nota [b] incluye la palabra inglesa «judgment».
    rationale: Debe mantenerse todo el aparato en español. «Juicio» basta para explicar el literal hebreo sin code-switching.
  - severity: low
    issue: La puntuación/sintaxis puede sonar más natural con «desde el lugar de tu morada».
    rationale: Aunque el hebreo no lleva preposición explícita antes de מְכוֹן שִׁבְתְּךָ, en español «escucha en el cielo, el lugar de tu morada» es algo rígido. «Escucha en el cielo, desde el lugar de tu morada» conserva la imaginería y mejora la fluidez sin introducir una desviación seria.
  revised_spanish_text: entonces escucha en el cielo[a], desde el lugar de tu morada, su oración y su súplica, y defiende su causa[b].
