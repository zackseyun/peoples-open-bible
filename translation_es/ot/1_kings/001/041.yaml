base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/041.yaml
  text: Adonijah and all the invited guests who were with him heard it as they finished eating[a]. And when Joab heard the sound of the trumpet, he said[b], “Why is the sound of the city in an uproar?”
  footnotes:
