translation:
  language: es
  text: Soplaste con tu viento[a]; el mar los cubrió. Se hundieron como plomo en aguas poderosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con tu aliento». La palabra hebrea puede significar «viento», «aliento» o «espíritu»; aquí el contexto del cruce del mar favorece «viento».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשַׁפְתָּ
  english_pob_choice: you blew
  chosen_spanish: Soplaste
  alternatives_spanish:
  - soplaste
  - soplaste sobre
  lexicon: HALOT
  rationale: El verbo hebreo denota soplar o respirar. En este paralelo poético, «soplaste» comunica de manera natural la acción directa de Dios sobre el mar y conserva la imagen de un aliento/viento expedido por él.
- source_word: בְרוּחֲךָ
  english_pob_choice: with your wind
  chosen_spanish: con tu viento
  alternatives_spanish:
  - con tu aliento
  - con tu espíritu
  lexicon: HALOT
  rationale: רוּחַ puede significar viento, aliento o espíritu. El contexto inmediato del cruce del mar favorece «viento» como imagen física principal; «aliento» sigue siendo una alternativa válida y más antropomórfica, por eso se preserva en nota.
- source_word: כִּסָּמוֹ יָם
  english_pob_choice: the sea covered them
  chosen_spanish: el mar los cubrió
  alternatives_spanish:
  - el mar los ocultó
  - el mar los sepultó
  lexicon: HALOT
  rationale: כסה significa cubrir. «Cubrió» es la equivalencia directa y mantiene el sentido literal sin añadir una interpretación más fuerte como «sepultó».
- source_word: צָלֲלוּ
  english_pob_choice: they sank
  chosen_spanish: Se hundieron
  alternatives_spanish:
  - se sumergieron
  - cayeron al fondo
  lexicon: HALOT
  rationale: El verbo expresa descenso o hundimiento en el agua. «Se hundieron» es claro, natural y mantiene la imagen de movimiento hacia abajo que sigue a «el mar los cubrió».
- source_word: כַּעֲפֹרֶת
  english_pob_choice: like lead
  chosen_spanish: como plomo
  alternatives_spanish:
  - como si fuera plomo
  - cual plomo
  lexicon: HALOT
  rationale: עוֹפֶרֶת es el metal plomo. «Como plomo» preserva la comparación de peso y caída con la naturalidad suficiente para español moderno.
- source_word: בְמַיִם אַדִּירִים
  english_pob_choice: in mighty waters
  chosen_spanish: en aguas poderosas
  alternatives_spanish:
  - en aguas majestuosas
  - en aguas imponentes
  lexicon: HALOT
  rationale: אַדִּירִים comunica fuerza, poder o majestad. «Poderosas» reproduce bien esa fuerza en español y evita suavizar el énfasis poético del hebreo.
theological_decisions:
- issue: Sentido de רוּחַ en un contexto poético-teofánico
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - aliento
  - espíritu
  rationale: La escena describe la derrota del ejército egipcio en el mar; el verbo paralelo de soplar favorece una imagen meteorológica. Para no resolver innecesariamente la tensión semántica, el texto principal mantiene «viento», mientras la nota conserva «aliento» como alternativa lexical legítima.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
- issue: ¿Implica el texto el Espíritu divino o solamente un viento enviado por Yahvé?
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - Espíritu
  - aliento
  rationale: Aunque «espíritu» es posible léxicamente, el contexto narrativo no exige una referencia explícita al Espíritu Santo. Mantener «viento» evita sobreinterpretar la imagen y respeta la lectura auditada de la POB inglesa.
  doctrine_reference: Translation philosophy §3 (preservar tensión teológica y lexical)
translation_notes:
  revision_awareness: El pasaje coincide con la auditoría inglesa de alta concordancia; no se detectaron revisiones aplicadas en la versión fuente y se conserva la misma decisión principal para רוּחַ, con nota de alternativa semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma reservada para el nombre divino en la POB, aunque este versículo no lo explicita.
  - Se conserva la distinción entre «viento» en el texto principal y «aliento» en nota para no borrar la amplitud semántica de רוּחַ.
  - «Aguas poderosas» sigue la fuerza de אַדִּירִים sin convertirla en una paráfrasis explicativa.
