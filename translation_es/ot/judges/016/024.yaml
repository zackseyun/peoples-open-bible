translation:
  language: es
  text: 'Cuando el pueblo lo vio, alabó a su dios, porque dijo: «Nuestro dios ha entregado a nuestro enemigo en nuestra mano[a], al devastador de nuestra tierra[b], que multiplicó nuestros caídos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ha dado en nuestra mano», un modismo que significa «ha entregado a nuestro poder».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «el destructor de nuestra tierra».'
    reason: lexical_alternative
  - marker: c
    text: 'También: «que aumentó nuestros muertos» o «que mató a muchos de nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ אֹתוֹ
  english_pob_choice: When the people saw him
  chosen_spanish: Cuando el pueblo lo vio[a]
  alternatives_spanish:
  - Y el pueblo lo vio[a]
  - Cuando ellos lo vieron[a]
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Cuando» reproduce bien la secuencia temporal. «Pueblo» refleja הָעָם de forma directa y natural. El pronombre objeto «lo» conserva la referencia a Sansón sin añadir explicaciones.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el conjunto del pueblo
  lexicon: HALOT
  rationale: עָם designa un colectivo; «el pueblo» es la equivalencia más directa y sobria en español bíblico moderno.
- source_word: וַֽיְהַלְל֖וּ
  english_pob_choice: praised
  chosen_spanish: alabó
  alternatives_spanish:
  - dieron alabanza a
  - celebró
  lexicon: HALOT
  rationale: הלל en piel se traduce normalmente con «alabar». El singular en español sigue el sujeto colectivo «el pueblo» como entidad corporativa.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their god
  chosen_spanish: a su dios
  alternatives_spanish:
  - a sus dioses
  - a su dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológicamente, el verbo singular y el contexto inmediato apuntan a una deidad singular. Se conserva así la lectura semántica singular sin borrar la tensión gramatical del hebreo.
- source_word: נָתַן ... בְיָדֵנוּ
  english_pob_choice: has given our enemy into our hand
  chosen_spanish: ha entregado ... en nuestra mano
  alternatives_spanish:
  - ha dado ... en nuestra mano
  - ha puesto ... en nuestra mano
  lexicon: HALOT
  rationale: El idioma hebreo «dar en la mano» expresa entregar al poder de alguien. «Entregar» comunica bien la fuerza idiomática en español sin perder la imagen de dominio.
- source_word: אֹיְבֵנוּ
  english_pob_choice: our enemy
  chosen_spanish: a nuestro enemigo
  alternatives_spanish:
  - al enemigo nuestro
  - a nuestro adversario
  lexicon: HALOT
  rationale: El singular es apropiado para Sansón como representante del enemigo filisteo. «Enemigo» mantiene la relación hostil de forma directa.
- source_word: מַחֲרִיב אַרְצֵנוּ
  english_pob_choice: the devastator of our land
  chosen_spanish: al devastador de nuestra tierra[b]
  alternatives_spanish:
  - al destructor de nuestra tierra[b]
  - al que asola nuestra tierra[b]
  lexicon: HALOT
  rationale: 'El participio hifil de חרב tiene sentido causativo y sustantivo: quien arrasa/devasta. «Devastador» conserva la fuerza y la brevedad del hebreo; «tierra» mantiene el paralelismo con el idioma bíblico para territorio/nación.'
- source_word: וַאֲשֶׁר הִרְבָּה אֶת חֲלָלֵינוּ
  english_pob_choice: who multiplied our slain
  chosen_spanish: que multiplicó nuestros muertos[c]
  alternatives_spanish:
  - que aumentó nuestros muertos[c]
  - que hizo רבים nuestros caídos[c]
  lexicon: HALOT
  rationale: הִרְבָּה expresa hacer numerosos/aumentar, y חֲלָלִים son los muertos caídos en combate. «Multiplicó nuestros muertos» mantiene la aspereza y la estructura del hebreo; «muertos» evita suavizar la imagen.
theological_decisions:
- issue: Número de אֱלֹהִים en el discurso filisteo
  english_pob_reading: singular 'their god' / 'our god'
  chosen_spanish_reading: singular «su dios» / «nuestro dios»
  alternative_spanish_readings:
  - plural «sus dioses» / «nuestros dioses»
  rationale: Aunque la forma hebrea es plural, el verbo singular y el contexto de una sola deidad filistea favorecen el singular semántico. La traducción sigue esa lectura y no borra la señal gramatical del original.
  doctrine_reference: Gramática y semántica del texto, no una afirmación doctrinal sobre el politeísmo
- issue: Valor del idiomatismo «en nuestra mano»
  english_pob_reading: has given our enemy into our hand
  chosen_spanish_reading: ha entregado ... en nuestra mano
  alternative_spanish_readings:
  - ha puesto ... en nuestro poder
  - ha dado ... en nuestra mano
  rationale: La frase expresa sometimiento y control, no solo localización. «En nuestra mano» conserva la imagen bíblica de poder recibido; «entregar» comunica el resultado de manera clara en español.
  doctrine_reference: Uso idiomático hebreo de dominio/entrega
- issue: Traducción de חֲלָלִים
  english_pob_reading: our slain
  chosen_spanish_reading: nuestros muertos
  alternative_spanish_readings:
  - nuestros caídos
  - nuestros muertos en combate
  rationale: חֲלָלִים designa muertos abatidos, con frecuencia en contexto bélico. «Muertos» es directo y fiel; «caídos» podría suavizar la dureza del término.
  doctrine_reference: Léxico narrativo de guerra en hebreo bíblico
translation_notes:
  revision_awareness: 'El inglés POB fue revisado para mejorar el orden de palabras en «has given our enemy into our hand» y mantuvo las frases appositivas «the devastator of our land» y «who multiplied our slain». La versión española conserva esa misma estructura semántica: sujeto colectivo, verbo de alabanza, cita causal con entrega en la mano, y las dos descripciones del enemigo como participios sustantivados. También mantiene el singular semántico para אֱלֹהִים, alineado con la decisión auditada del POB.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en todo el proyecto cuando aparezca el nombre divino, pero aquí el texto hebreo tiene אֱלֹהִים y no יהוה.
  - Se evita «Señor» o mayúsculas de sustitución para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - «En nuestra mano» reproduce el hebraísmo de poder/entrega y no debe entenderse de modo meramente literal.
  - «Nuestros muertos» mantiene la aspereza del hebreo; no se suaviza a una perífrasis más interpretativa.
