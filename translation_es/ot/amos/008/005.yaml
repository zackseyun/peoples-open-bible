base_translation:
  language: en
  yaml_path: translation/ot/amos/008/005.yaml
  text: saying[a], “When will the new moon be over, so that we may sell grain, and the Sabbath, so that we may offer grain for sale—making the ephah small and the shekel large[b], and falsifying deceitful scales?”
  footnotes:
  - marker: a
    text: Or 'the month' for 'the new moon'; here the context favors the festival observance rather than the calendar month.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'making the ephah small and the shekel large'—that is, giving less product and demanding more payment.
    reason: cultural_note
