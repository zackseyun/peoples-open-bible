  to: 'Y se reunieron los sátrapas, los prefectos, los gobernadores y los consejeros del rey, y vieron a estos hombres: que el fuego no había tenido poder sobre sus cuerpos, ni se había chamuscado el cabello de sus cabezas, ni sus mantos[a] habían sufrido cambio, y ningún olor a fuego les había llegado.'
