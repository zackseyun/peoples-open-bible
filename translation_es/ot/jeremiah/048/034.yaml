translation:
  language: es
  text: Desde el clamor de Hesbón hasta Elealé[a], hasta Jahaz, alzan su voz; desde Soar hasta Horonaim, hasta Eglat-shelishiyá. Porque incluso las aguas de Nimrim se convertirán en desolaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «una ternera de tres años». La expresión hebrea עֶגְלַת שְׁלִשִׁיָּה puede entenderse descriptivamente, pero aquí probablemente funciona como nombre de lugar en la serie de sitios mencionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/זַּעֲקַת
  english_pob_choice: From the cry of
  chosen_spanish: Desde el clamor de
  alternatives_spanish:
  - Desde el grito de
  - A causa del clamor de
  lexicon: HALOT
  rationale: זַעֲקָה expresa un clamor o grito de angustia; en español, «clamor» conserva mejor el tono poético y de aflicción que un simple «grito». La preposición מִן aquí introduce el punto de partida o extensión del clamor, por lo que «Desde» reproduce bien la imagen espacial y sonora.
- source_word: נָתְנוּ קוֹלָם
  english_pob_choice: they raise their voice
  chosen_spanish: alzan su voz
  alternatives_spanish:
  - levantan su voz
  - dan su voz
  - se oye su voz
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «dieron su voz»; el sentido idiomático es vocalizar un clamor. «Alzan su voz» conserva el movimiento activo sin volverlo demasiado literal ni perder el carácter idiomático.
- source_word: עַד
  english_pob_choice: to / as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta allí
  - así como
  - a
  lexicon: HALOT
  rationale: La repetición de עַד marca la extensión geográfica. «Hasta» es la forma natural en español para señalar límite o alcance y mantiene el paralelismo de la lista de lugares.
- source_word: מִ/צֹּעַר
  english_pob_choice: from Zoar
  chosen_spanish: desde Soar
  alternatives_spanish:
  - de Soar
  - a partir de Soar
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración española común «Soar», y la preposición «desde» refleja el valor de origen o extensión del hebreo מִן.
- source_word: חֹרֹנַיִם
  english_pob_choice: Horonaim
  chosen_spanish: Horonaim
  alternatives_spanish:
  - Joronaim
  lexicon: HALOT
  rationale: Nombre propio geográfico; se mantiene la transliteración tradicionalmente reconocible y coherente con el resto de la serie de lugares.
- source_word: עֶגְלַת שְׁלִשִׁיָּה
  english_pob_choice: Eglath-shelishiyah
  chosen_spanish: Eglat-selisiya
  alternatives_spanish:
  - una ternera de tres años
  - Eglat la tercera
  lexicon: HALOT
  rationale: 'La POB inglesa preserva la ambigüedad: puede ser un nombre de lugar o una descripción etimológica («ternera de tres años»). En el texto principal se opta por la transliteración para no imponer una interpretación incierta. La forma española sigue de cerca la transliteración auditada y mantiene el carácter toponímico probable en la secuencia.'
- source_word: כִּי גַּם
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - Pues incluso
  - Porque incluso
  lexicon: HALOT
  rationale: כִּי introduce explicación y גַּם añade énfasis. «Porque aun» comunica ambas fuerzas de manera natural en español y sostiene la relación causal/explicativa del verso.
- source_word: מֵי נִמְרִים
  english_pob_choice: the waters of Nimrim
  chosen_spanish: las aguas de Nimrim
  alternatives_spanish:
  - las aguas de Nimirim
  - las aguas de Nimrín
  lexicon: HALOT
  rationale: La construcción posesiva se conserva de forma directa. «Aguas» mantiene el plural hebreo y el nombre propio se adapta a la transliteración española usual sin alterar la referencia geográfica.
- source_word: לִ/מְשַׁמּוֹת
  english_pob_choice: desolations
  chosen_spanish: desolaciones
  alternatives_spanish:
  - lugares desolados
  - una desolación
  lexicon: HALOT
  rationale: El plural hebreo se refleja con el plural español «desolaciones», tal como la POB inglesa preserva la pluralidad de forma bastante literal. Esto evita suavizar el término a un singular más abstracto.
- source_word: יִהְיוּ
  english_pob_choice: will become
  chosen_spanish: serán
  alternatives_spanish:
  - se convertirán en
  - llegarán a ser
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «will become» para destacar el resultado, en español «serán desolaciones» suena más natural y sigue expresando el estado resultante. «Se convertirán en» sería más explícito, pero menos conciso; «serán» mantiene la fuerza profética.
theological_decisions:
- issue: La frase final describe un cambio a estado de ruina; decidir si enfatizar proceso o resultado.
  english_pob_reading: the waters of Nimrim will become desolations
  chosen_spanish_reading: las aguas de Nimrim serán desolaciones
  alternative_spanish_readings:
  - las aguas de Nimrim se convertirán en desolaciones
  - las aguas de Nimrim llegarán a ser desolación
  rationale: No hay una carga doctrinal directa, pero sí una decisión de aspecto verbal. El hebreo con היה + לְ indica resultado. «Serán desolaciones» preserva ese resultado sin sobreexplicar el proceso.
  doctrine_reference: No aplica; decisión aspectual/poética.
translation_notes:
  revision_awareness: Se mantuvo la lectura alta de acuerdo con la POB inglesa y no se introdujeron cambios textuales sustantivos. La principal decisión fue conservar la ambigüedad de עֶגְלַת שְׁלִשִׁיָּה mediante transliteración, con nota alternativa, y ajustar la sintaxis al español natural sin perder el paralelismo geográfico ni el tono de lamentación.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió «clamor» para זַעֲקָה por su tono de angustia y dignidad literaria.
  - Los topónimos se mantuvieron transliterados para respetar la secuencia geográfica del hebreo.
  - Se conservó el plural de «aguas» y «desolaciones» para reflejar los plurales hebreos sin forzar singularización.
