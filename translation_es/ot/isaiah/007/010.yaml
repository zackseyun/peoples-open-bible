translation:
  language: es
  text: Yahvé siguió hablando a Acaz[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Idiomismo hebreo: “Yahvé añadió a hablar a Acaz”, es decir, “Yahvé continuó hablando a Acaz” o “Yahvé le habló de nuevo a Acaz”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף
  english_pob_choice: continued
  chosen_spanish: siguió
  alternatives_spanish:
  - continuó
  - volvió a
  lexicon: HALOT
  rationale: La expresión verbal hebrea con יָסַף + infinitivo comunica acción continuada o reiterada. En español, 'siguió hablando' transmite de forma natural la continuidad del habla divina sin perder el valor iterativo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el nombre propio del pacto, no un título. En español se mantiene 'Yahvé' para preservar la referencia directa al Tetragrámaton, conforme al criterio del proyecto.
- source_word: דַּבֵּר
  english_pob_choice: to speak
  chosen_spanish: hablando
  alternatives_spanish:
  - hablar
  - decir
  lexicon: HALOT
  rationale: Con וַיּוֹסֶף, el infinitivo funciona idiomáticamente como continuidad de la acción verbal. 'Siguió hablando' reproduce el valor de continuidad en español con naturalidad.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección del discurso hacia una persona; 'a Acaz' es el equivalente más directo y natural en español.
- source_word: אָחָז
  english_pob_choice: Ahaz
  chosen_spanish: Acaz
  alternatives_spanish:
  - Ajaz
  lexicon: HALOT
  rationale: Se usa la forma tradicional en español 'Acaz', que es la adaptación habitual del nombre propio bíblico en la lengua de destino.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: El infinitivo introductorio hebreo se conserva con la fórmula española 'diciendo,' para señalar el inicio del discurso sin añadir contenido ajeno.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo nombra directamente a YHWH. Se conserva el nombre propio en español para mantener la transparencia textual y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] en el texto español. La redacción mantiene el valor idiomático del hebreo וַיּוֹסֶף + infinitivo y el nombre divino YHWH como Yahvé.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio, apto para lectura pública.
  - Se evita la sustitución de Yahvé por una máscara litúrgica, de acuerdo con el criterio del proyecto.
  - La partícula introductoria 'diciendo,' conserva la estructura narrativa hebrea sin sobreinterpretación.
