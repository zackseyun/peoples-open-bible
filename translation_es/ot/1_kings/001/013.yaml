translation:
  language: es
  text: 'Ve, entra al rey David y dile: «Mi señor el rey, ¿no juraste a tu sierva[a], diciendo: “Salomón, tu hijo, reinará después de mí y se sentará en mi trono”? ¿Por qué entonces Adonías se ha hecho rey?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tu esclava». El hebreo usa un término específicamente femenino para la manera en que Batseba se dirige al rey con deferencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכִי וּבֹאִי
  english_pob_choice: Please go in
  chosen_spanish: Ve, entra
  alternatives_spanish:
  - Anda, entra
  - Ve y entra
  lexicon: HALOT
  rationale: Son dos imperativos femeninos singulares encadenados; en español conviene mantener la doble acción sin sonar redundante. «Ve, entra» conserva la urgencia y el movimiento hacia el rey.
- source_word: אֶל הַמֶּלֶךְ דָּוִד
  english_pob_choice: to King David
  chosen_spanish: ante el rey David
  alternatives_spanish:
  - al rey David
  - a donde está el rey David
  lexicon: HALOT
  rationale: «Ante» expresa bien la audiencia formal y evita una calca pesada; el nombre propio con título corresponde al valor courtés del hebreo.
- source_word: וְאָמַרְתְּ אֵלָיו
  english_pob_choice: and say to him
  chosen_spanish: y dile
  alternatives_spanish:
  - y le dirás
  - y dile a él
  lexicon: HALOT
  rationale: La secuencia imperativa en español queda natural con «dile», manteniendo el encargo directo sin perder la continuidad del mandato.
- source_word: הֲלֹא
  english_pob_choice: did you not
  chosen_spanish: ¿no
  alternatives_spanish:
  - ¿acaso no
  - ¿no es cierto que
  lexicon: HALOT
  rationale: La pregunta retórica espera confirmación; «¿no» preserva esa fuerza sin añadir matices ajenos.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: My lord the king
  chosen_spanish: Mi señor el rey
  alternatives_spanish:
  - Mi señor, el rey
  - Mi señor, oh rey
  lexicon: HALOT
  rationale: Es un tratamiento reverente humano, no divino. «Mi señor el rey» reproduce el tono cortesano y evita confusión con el nombre divino.
- source_word: נִשְׁבַּעְתָּ
  english_pob_choice: swear
  chosen_spanish: juraste
  alternatives_spanish:
  - te juraste
  - prometiste con juramento
  lexicon: HALOT
  rationale: El verbo indica prestar juramento; «juraste» es la forma más directa y solemne en español.
- source_word: לַאֲמָתְךָ
  english_pob_choice: to your servant
  chosen_spanish: a tu sierva[a]
  alternatives_spanish:
  - a tu esclava
  - a tu criada
  lexicon: HALOT
  rationale: El término hebreo es femenino de manera específica; «sierva» conserva la deferencia y el contraste de género que la nota inglesa documenta.
- source_word: לֵאמֹר כִּי
  english_pob_choice: saying, “Surely
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - diciendo que
  - 'diciendo: «Ciertamente»'
  lexicon: HALOT
  rationale: La revisión inglesa eliminó «Surely» por no ser necesario; en español también conviene no añadir intensificador. Se deja la cita directa simple.
- source_word: שְׁלֹמֹה בְנֵךְ
  english_pob_choice: Solomon your son
  chosen_spanish: Salomón, tu hijo
  alternatives_spanish:
  - tu hijo Salomón
  - Salomón tu hijo
  lexicon: HALOT
  rationale: «Salomón» reproduce el nombre propio y el orden español más natural. La coma ayuda a separar apelación y apposición.
- source_word: יִמְלֹךְ אַחֲרַי
  english_pob_choice: shall reign after me
  chosen_spanish: reinará después de mí
  alternatives_spanish:
  - reinará en mi lugar
  - será rey después de mí
  lexicon: HALOT
  rationale: «Reinará» conserva la idea regia del verbo sin sobrerrepresentar el acceso al trono. «Después de mí» sigue de cerca el valor sucesorio del hebreo.
- source_word: וְהוּא יֵשֵׁב עַל כִּסְאִי
  english_pob_choice: and he shall sit on my throne
  chosen_spanish: y se sentará en mi trono
  alternatives_spanish:
  - y se sentará sobre mi trono
  - y ocupará mi trono
  lexicon: HALOT
  rationale: «Sentarse en el trono» es la fórmula española natural para entronización. «Se sentará» preserva el paralelo verbal con el hebreo.
- source_word: וּמַדּוּעַ
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué entonces
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué, pues
  lexicon: HALOT
  rationale: El interrogativo marca la conclusión lógica a partir del juramento previo; «entonces» transmite ese enlace inferencial.
- source_word: מָלַךְ אֲדֹנִיָהוּ
  english_pob_choice: has Adonijah become king
  chosen_spanish: ha reinado Adonías
  alternatives_spanish:
  - se ha hecho rey Adonías
  - Adonías ha llegado a ser rey
  lexicon: HALOT
  rationale: El hebreo afirma el hecho consumado de gobernar. «Ha reinado» conserva el valor verbal sin forzar una perífrasis más interpretativa; el nombre se adapta a la forma española usual «Adonías».
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que eliminó el intensificador equivalente a «Surely» por no estar exigido por el hebreo. La redacción española evita añadir ese refuerzo y mantiene el tono interrogativo-retórico, la fórmula de juramento y el cierre sobre la entronización de Adonías.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; aquí no aparece.
  - Se usa «Adonías» como forma española estable del nombre hebreo אֲדֹנִיָּהוּ.
  - Se conserva la distinción de género en «sierva» y se ancla con nota porque el hebreo es específicamente femenino.
  - La puntuación con comillas angulares y dos puntos sigue el uso editorial español sin alterar la relación de cita interna.
