translation:
  language: es
  text: Pero yo solo iba muchas veces a Jerusalén para las fiestas[a], conforme está escrito para todo Israel en una ordenanza perpetua, llevando las primicias, los diezmos del fruto y las primeras esquilas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Jerusalén»; el griego usa «en Jerusalén» con un verbo de desplazamiento, pero en español normalmente se dice «ir a Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: O «las primeras porciones del esquileo». El raro término griego probablemente se refiere a la primera porción obtenida al esquilar el ganado; algunos lo entienden más generalmente como las primeras contribuciones pastoriles.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  english_pob_choice: I alone
  chosen_spanish: yo solo
  alternatives_spanish:
  - yo únicamente
  - yo por mi parte, solo
  lexicon: BDAG
  rationale: μόνος enfatiza la singularidad de Tobit frente a otros; en español, "yo solo" conserva ese matiz enfático de manera natural y directa.
- source_word: ἐπορευόμην πλεονάκις
  english_pob_choice: would often go
  chosen_spanish: iba muchas veces
  alternatives_spanish:
  - solía ir con frecuencia
  - iba con frecuencia
  lexicon: BDAG
  rationale: El imperfecto con πλεονάκις expresa acción habitual repetida en el pasado. "Iba muchas veces" comunica ese valor iterativo sin sonar forzado.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: 'Aunque el griego usa ἐν con el nombre de lugar, el contexto de movimiento pide en español una dirección natural: "a Jerusalén". Se preserva la referencia geográfica sin calcar la preposición griega.'
- source_word: ταῖς ἑορταῖς
  english_pob_choice: for the feasts
  chosen_spanish: para las fiestas
  alternatives_spanish:
  - en las fiestas
  - para los festivales
  lexicon: BDAG
  rationale: '"Fiestas" es el equivalente bíblico natural para las festividades de peregrinación de Israel y mantiene el tono tradicional sin resultar arcaico.'
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: conforme está escrito
  alternatives_spanish:
  - como está escrito
  - tal como está escrito
  lexicon: BDAG
  rationale: La fórmula introduce autoridad escrita. "Conforme está escrito" conserva el valor normativo del giro griego y su resonancia legal-escrituraria.
- source_word: ἐν προστάγματι αἰωνίῳ
  english_pob_choice: in an everlasting ordinance
  chosen_spanish: en un decreto eterno
  alternatives_spanish:
  - en una ordenanza perpetua
  - en un mandato eterno
  lexicon: BDAG
  rationale: πρόσταγμα puede ser decreto, mandato u ordenanza. En español, "decreto" comunica bien la fuerza normativa; "eterno" preserva αἰώνιος como validez duradera/covenantal, sin imponer una lectura filosófica.
- source_word: ἀπαρχὰς
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - las primeras ofrendas
  lexicon: BDAG
  rationale: '"Primicias" es el término cultual establecido en español para ἀπαρχάς y conserva con precisión la categoría sacrificial.'
- source_word: δεκάτας
  english_pob_choice: the tithes
  chosen_spanish: los diezmos
  alternatives_spanish:
  - las décimas partes
  - las ofrendas del diezmo
  lexicon: BDAG
  rationale: δεκάτας corresponde al diezmo; "diezmos" es el equivalente bíblico claro y ampliamente inteligible.
- source_word: γενημάτων
  english_pob_choice: of the produce
  chosen_spanish: del fruto
  alternatives_spanish:
  - de la cosecha
  - de los productos
  lexicon: BDAG
  rationale: γενημάτων puede abarcar el rendimiento agrícola. "Del fruto" es breve y amplio en español bíblico; conserva la idea de lo producido por la tierra sin restringirla demasiado.
- source_word: προκουρίας
  english_pob_choice: the first shearings
  chosen_spanish: los primeros esquilmos
  alternatives_spanish:
  - las primeras esquilas
  - la primera lana esquilada
  lexicon: LSJ
  rationale: El término raro probablemente alude a la primera porción del esquileo del ganado. "Esquilmos" preserva el campo semántico pastoral y mantiene cierta rareza léxica acorde con el original.
- source_word: ἔχων
  english_pob_choice: bringing
  chosen_spanish: llevando
  alternatives_spanish:
  - trayendo
  - portando
  lexicon: BDAG
  rationale: El participio expresa que Tobit acudía con esas ofrendas en mano. "Llevando" comunica de forma natural la acción acompañante y evita una traducción demasiado literal como "teniendo".
theological_decisions:
- issue: Obediencia concreta a la ley de peregrinación y ofrendas
  english_pob_reading: The verse presents Tobit as personally observing Israel's festival and offering obligations centered on Jerusalem.
  chosen_spanish_reading: El versículo presenta a Tobit como observante personal de las fiestas y de las ofrendas prescritas para Israel, centradas en Jerusalén.
  alternative_spanish_readings:
  - El versículo podría leerse solo como piedad general.
  - Podría entenderse como una referencia vaga a devoción religiosa.
  rationale: La mención de "para todo Israel" y del "decreto eterno" junto con la lista de ofrendas indica observancia concreta de la ley, no mera religiosidad genérica. La traducción debe conservar ese peso normativo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de αἰώνιος en fórmula legal
  english_pob_reading: everlasting
  chosen_spanish_reading: eterno
  alternative_spanish_readings:
  - perpetuo
  - permanente
  rationale: En fórmulas legales/covenantales, αἰώνιος expresa vigencia duradera. "Eterno" mantiene el registro bíblico en español sin añadir una especulación metafísica ajena al contexto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios en la traducción inglesa auditada y el veredicto cruzado fue de alta concordancia. Se mantuvo la misma línea interpretativa para los elementos léxicos raros y la fórmula legal.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece el nombre divino.
  - 'Se usa terminología cultual bíblica estable: «primicias», «diezmos», «decreto eterno».'
  - Se evita calcar el griego con «en Jerusalén» en la línea principal, pero se documenta la alternativa en nota.
  - «Esquilmos» se elige para reflejar el término raro sin sustituirlo por una paráfrasis más general.
