review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: doble movimiento verbal (''subirás'' / ''vendrás''), los símiles de tormenta y nube, el propósito ''para cubrir'', y la coalición con Gog. Sin embargo, se aparta innecesariamente del rastro POB en dos puntos: traduce הָאָרֶץ como ''la tierra'' donde el expediente inglés prefirió ''the land'' por contexto local, y usa ''destacamentos'' para אֲגַפֶּיךָ, que es posible pero más estrecho y menos natural que ''tropas'' para el sentido militar amplio documentado.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y más cercano al expediente con 'tormenta' en vez de 'tempestad' si se desea alineación más directa con 'storm', 'la tierra' ajustado a 'la tierra[a]' o mejor 'la tierra' con nota; aun así, la mejora principal es 'tropas' por legibilidad. También conviene corregir la nota [a], que actualmente repite 'tempestad' y no preserva la alternativa relevante 'tierra'/'land' frente a 'earth'.
  glossary_alignment: No hay conflictos con la terminología doctrinal mayor del proyecto. La revisión recomendada alinea mejor הָאָרֶץ con 'la tierra/el país/territorio' mediante nota contextual y ajusta אֲגַפֶּיךָ al sentido militar preferido por POB con 'tropas', manteniendo una nota sobre el literal 'alas'.
  issues:
  - severity: medium
    issue: הָאָרֶץ se tradujo como 'la tierra' sin preservar la alternativa contextual principal documentada por POB.
    rationale: El expediente inglés prefirió 'the land' en este contexto de invasión local, con nota sobre la posibilidad de 'earth'. En español, 'la tierra' es posible, pero debe ir acompañada de una nota que preserve la alternativa contextual para no perder la decisión auditada.
  - severity: medium
    issue: La nota [a] no corresponde al punto léxico más importante preservado por POB.
    rationale: La nota inglesa [a] trata de 'land/earth', no del símil meteorológico. La nota española actual sobre 'tempestad/tormenta/devastación' introduce información distinta y deja sin reflejar la alternativa documentada del expediente.
  - severity: low
    issue: '''Destacamentos'' para אֲגַפֶּיךָ es entendible, pero menos natural y algo más específico que el sentido militar amplio.'
    rationale: El hebreo literal es 'alas', con sentido de alas/divisiones militares. 'Tropas' comunica mejor en español general y coincide más estrechamente con la elección POB 'your troops'.
  revised_spanish_text: 'Subirás como una tormenta; vendrás como una nube para cubrir la tierra[a]: tú y todas tus tropas[b], y muchos pueblos contigo.'
