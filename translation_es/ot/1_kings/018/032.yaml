- from: Y con las piedras edificó un altar en el nombre de Yahvé[a], y hizo una zanja alrededor del altar, de la capacidad de dos seahs de semilla.
  to: Y con las piedras edificó un altar en el nombre de Yahvé, e hizo una zanja alrededor del altar, como de la capacidad de dos seahs de semilla[a].
