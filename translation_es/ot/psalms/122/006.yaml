revisions:
- from: 'Pidan por la paz de Jerusalén: que prosperen[a] los que te aman.'
  to: 'Oren por la paz de Jerusalén[a]: que prosperen los que te aman[b].'
  rationale: Se ajusta el imperativo principal a 'Oren por' para reflejar con más naturalidad el valor litúrgico/intercesor documentado para שַׁאֲלוּ en este contexto. También se añade la alternativa del segundo hemistiquio para preservar la ambigüedad poética de יִשְׁלָיוּ entre deseo/oración y afirmación, en línea con el rastro inglés del POB.
