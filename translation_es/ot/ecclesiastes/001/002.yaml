translation:
  language: es
  text: Vapor de vapores[a], dice Qohelet[b]; vapor de vapores, todo es mero vapor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo הֶבֶל (hevel), literalmente «aliento» o «vapor». Qohelet usa esta palabra a lo largo del libro con tres sentidos vinculados a la vez: lo transitorio (como un vapor que ya se fue), lo escurridizo (no se puede atrapar) y lo irónico (lo esperado y lo que sucede no coinciden). Ninguna sola palabra en español cubre los tres. La construcción הֲבֵל הֲבָלִים es un superlativo hebreo, como «cantar de cantares» o «santo de los santos».'
    reason: lexical_choice
  - marker: b
    text: Qohelet es el título o nombre hebreo tradicionalmente vertido como «el Maestro» o «el Predicador»; ambas opciones son interpretativas y estrechan el sentido de manera distinta. Se translitera para conservar esa amplitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵל
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - vapor
  - aliento fugaz
  - vaho
  - vanidad
  - futilidad
  lexicon: HALOT
  rationale: En español, 'aliento' preserva la imagen concreta de algo que pasa y se desvanece, de modo semejante a 'breath' en inglés. 'Vanidad' y 'futilidad' abstraen demasiado y pierden la imaginería recurrente del libro.
- source_word: הֲבֵל הֲבָלִים
  english_pob_choice: breath of breaths
  chosen_spanish: aliento de alientos
  alternatives_spanish:
  - vanidad de vanidades
  - futilidad absoluta
  - mero aliento de meros alientos
  lexicon: HALOT
  rationale: El hebreo usa una construcción de superlativo absoluto ('X de Xs'). 'Aliento de alientos' conserva esa forma y la imagen concreta, sin sustituirla por una abstracción interpretativa.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es qatal, la fórmula literaria funciona como encabezado en presente; 'dice' suena natural en español y mantiene la vivacidad del enunciado.
- source_word: קֹהֶלֶת
  english_pob_choice: Qoheleth
  chosen_spanish: Qohelet
  alternatives_spanish:
  - el Predicador
  - el Maestro
  - el Asamblador
  lexicon: HALOT
  rationale: Se translitera el título hebreo para no estrechar su alcance semántico con una equivalencia interpretativa como 'el Maestro' o 'el Predicador'.
- source_word: הַכֹּל
  english_pob_choice: all / everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo eso
  - todo lo demás
  - el todo
  lexicon: HALOT
  rationale: '''Todo'' conserva el alcance totalizante del hebreo y es idiomático en español.'
- source_word: הָבֶל
  english_pob_choice: mere breath
  chosen_spanish: mero aliento
  alternatives_spanish:
  - aliento
  - vapor
  - vano
  - vacío
  lexicon: HALOT
  rationale: En posición predicativa, se añade 'mero' para que el español no suene a definición ontológica. La combinación 'mero aliento' conserva el tono evaluativo y la deflación del hebreo.
theological_decisions:
- issue: Cómo rendir הֶבֶל, motivo rector de Eclesiastés
  english_pob_reading: Render with the concrete image — 'breath of breaths' for the superlative construct, 'mere breath' for the predicate — while preserving the Hebrew's three-way semantic range across the book.
  chosen_spanish_reading: Rendir con la imagen concreta — 'aliento de alientos' para la construcción superlativa y 'mero aliento' en el predicado — preservando la amplitud semántica del hebreo a lo largo del libro.
  alternative_spanish_readings:
  - vanidad
  - futilidad
  - vacío
  - absurdo
  - sin sentido
  rationale: '''Vanidad'' en español bíblico puede sonar tradicional, pero hoy suele sugerir orgullo; ''futilidad'' y ''sin sentido'' reducen el campo semántico del hebreo a una sola idea. La imagen concreta deja abiertas la transitoriedad, lo elusivo y la ironía del término.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente que favorece la estructura hebrea breve y el paralelismo directo, pero conserva la necesidad lexical de 'mero' en posición predicativa para evitar que 'aliento' se lea como una afirmación ontológica. También evita residuos en inglés y ancla explícitamente en el texto los marcadores de nota.
  spanish_consistency_notes:
  - Se mantiene 'aliento' de forma consistente para הֶבֶל, en armonía con la decisión inglesa de preservar la imagen concreta.
  - Se usa 'Qohelet' transliterado para no convertir el título en una interpretación limitante.
  - '''Todo'' traduce el alcance total del hebreo sin introducir explicaciones ajenas al verso.'
  - Las notas al pie están ancladas en el texto con [a] y [b], sin marcadores huérfanos.
