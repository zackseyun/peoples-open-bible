translation:
  language: es
  text: Harás un velo[a] de azul, púrpura y carmesí, y de lino fino torcido; será hecho con querubines[c][b], obra de diseñador experto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortina». El término hebreo se refiere al colgante interior que separaba el Lugar Santo del Lugar Santísimo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «carmesí»; más literalmente, alude a material teñido de escarlata, tradicionalmente asociado con tintura derivada de insectos.
    reason: cultural_note
  - marker: c
    text: O «obra de un tejedor artístico» o «trabajo finamente elaborado». La expresión hebrea denota artesanía experta.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָרֹכֶת
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  lexicon: HALOT
  rationale: El término designa el colgante interior que separaba el Lugar Santo del Lugar Santísimo. En español, 'velo' conserva mejor esa función cultual específica que 'cortina', que sería más general.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul teñido
  - azul intenso
  lexicon: HALOT
  rationale: El hebreo nombra una tela o material de color prestigioso; 'azul' comunica de forma natural el color del material sin añadir una especificación no presente en el hebreo.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - purpúreo
  lexicon: HALOT
  rationale: '''Púrpura'' reproduce bien el tinte de lujo del texto y encaja con la serie de materiales para el velo.'
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - lana carmesí
  - escarlata
  - hilo carmesí
  lexicon: HALOT
  rationale: El hebreo alude al material teñido de escarlata/carmesí. En español, 'carmesí' es natural y fiel al valor cromático; no repito 'hilo' porque el sustantivo ya está implícito en la lista de materiales.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino trenzado
  - lino finamente torcido
  - lino torcido fino
  lexicon: HALOT
  rationale: שֵׁשׁ indica lino fino y מָשְׁזָר la cualidad de estar torcido/hilado con torsión. 'Lino fino torcido' conserva ambos rasgos de manera clara y sobria.
- source_word: מַעֲשֵׂה חֹשֵׁב
  english_pob_choice: the work of a skillful designer
  chosen_spanish: obra de un hábil artífice
  alternatives_spanish:
  - obra de un artesano experto
  - obra de un diseñador hábil
  - trabajo de un artífice experto
  lexicon: HALOT
  rationale: La expresión denota trabajo artístico especializado, no mera fabricación. 'Artífice' transmite habilidad técnica y creatividad artesanal sin restringirlo indebidamente a un oficio moderno específico.
- source_word: יַעֲשֶׂה אֹתָהּ
  english_pob_choice: it shall be made
  chosen_spanish: se hará
  alternatives_spanish:
  - será hecho
  - lo harán
  lexicon: HALOT
  rationale: La construcción hebrea pasa de la orden directa a una formulación impersonal. 'Se hará' suena natural en español y conserva el matiz de instrucción general sin introducir un sujeto no expresado.
- source_word: כְּרֻבִים
  english_pob_choice: with cherubim
  chosen_spanish: con querubines
  alternatives_spanish:
  - con figuras de querubines
  - adornado con querubines
  lexicon: HALOT
  rationale: Mantengo el nombre tradicional 'querubines' porque el texto los presenta como motivo de diseño del velo. 'Con' expresa la incorporación del motivo a la ornamentación.
theological_decisions:
- issue: No importar simbolismos posteriores del velo al texto base
  english_pob_reading: Translate as a concrete instruction for tabernacle construction, using 'veil' and 'cherubim' in their immediate cultic sense.
  chosen_spanish_reading: Traducirlo como una instrucción concreta para la fabricación del velo del tabernáculo, con 'velo' y 'querubines' en su sentido cultual inmediato.
  alternative_spanish_readings:
  - Cargar el versículo con alusiones simbólicas posteriores
  - Hacer explícita una interpretación teológica del velo en el texto principal
  rationale: El hebreo describe materiales, técnica y decoración. La traducción española debe dejar ese sentido directo intacto y reservar lecturas teológicas posteriores para notas o estudio, no para el texto principal.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La versión coincide con el último pase de revisión disponible (gpt-5.4), marcado como sin cambios y con acuerdo alto en la verificación cruzada. No se registraron revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada para el nombre divino, pero este versículo no lo contiene.
  - '''Querubines'' se conserva como plural técnico tradicional y no se reduce a ''figuras'' en el texto principal.'
  - '''Velo'' se elige por precisión cultual frente a ''cortina'', que queda documentada en nota.'
  - 'La secuencia de colores/materiales sigue el orden del hebreo: azul, púrpura, carmesí y lino fino torcido.'
