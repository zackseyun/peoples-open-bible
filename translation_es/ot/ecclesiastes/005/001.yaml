translation:
  language: es
  text: No te apresures con tu boca[a], ni tu corazón se apresure a pronunciar palabra delante de Dios, porque Dios está en el cielo y tú en la tierra. Por tanto, sean pocas tus palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacar una palabra»; en contexto esto puede incluir votos apresurados, pero el hebreo aquí habla de manera más amplia de pronunciar palabras delante de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּבַהֵל
  english_pob_choice: be hasty
  chosen_spanish: te apresures
  alternatives_spanish:
  - seas precipitado
  - te muestres apresurado
  lexicon: HALOT
  rationale: El verbo expresa prisa indebida o precipitación. «Te apresures» comunica bien la advertencia en español natural y conserva el matiz de impaciencia del mandato negativo.
- source_word: עַל פִּיךָ
  english_pob_choice: with your mouth
  chosen_spanish: con tu boca
  alternatives_spanish:
  - en tu boca
  - de tu boca
  lexicon: HALOT
  rationale: La imagen literal apunta al órgano de habla. «Con tu boca» suena natural en español y mantiene la referencia corporal sin convertirla en una abstracción.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  lexicon: HALOT
  rationale: En hebreo, «corazón» incluye pensamiento, voluntad e ինտención; «tu corazón» preserva esa antropología bíblica sin reducirla a emoción.
- source_word: יְמַהֵר
  english_pob_choice: be quick
  chosen_spanish: darse prisa
  alternatives_spanish:
  - apresurarse
  - ir rápido
  lexicon: HALOT
  rationale: La repetición con el primer verbo pide una segunda formulación natural en español. «Darse prisa» refleja היטב el movimiento interior precipitado de la construcción.
- source_word: לְהוֹצִיא דָבָר
  english_pob_choice: to bring forth a word
  chosen_spanish: sacar una palabra
  alternatives_spanish:
  - pronunciar una palabra
  - emitir una palabra
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sacar/traer fuera una palabra». «Sacar una palabra» conserva la concreción de la expresión, más que interpretarla como «hacer un voto» en el texto principal.
- source_word: לִפְנֵי הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: «Delante de Dios» reproduce la solemnidad relacional del hebreo y encaja con el registro bíblico en español.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí se refiere al único Dios verdadero. En español, «Dios» es la forma estándar y más clara, sin necesidad de artículo.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, el contraste espacial funciona naturalmente en español con «el cielo». Esta opción conserva el paralelismo cielo/tierra sin sonar forzada.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  lexicon: HALOT
  rationale: «En la tierra» mantiene la antítesis con «en el cielo» y expresa la distancia creatural del ser humano respecto de Dios.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: «Por tanto» comunica la conclusión lógica del contraste cielo/tierra con un tono sobrio y bíblico.
- source_word: יִהְיוּ דְבָרֶיךָ מְעַטִּים
  english_pob_choice: let your words be few
  chosen_spanish: sean pocas tus palabras
  alternatives_spanish:
  - que tus palabras sean pocas
  - habla poco
  lexicon: HALOT
  rationale: El jussivo exhorta a la moderación verbal. «Sean pocas tus palabras» conserva el imperativo suave y la imagen del hebreo sin añadir más contenido del necesario.
theological_decisions:
- issue: ¿Restringir el verso a votos o promesas hechas en el culto, o conservar la referencia amplia a hablar delante de Dios?
  english_pob_reading: Retain the broader reference to speech before God rather than specifying vows.
  chosen_spanish_reading: Conservar la referencia amplia a hablar delante de Dios, sin convertir «una palabra» en «un voto» en el texto principal.
  alternative_spanish_readings:
  - No te apresures a hacer votos delante de Dios
  - No seas precipitado al prometer delante de Dios
  rationale: El contexto inmediato de Eclesiastés 5 trata del culto, pero la cláusula hebrea aquí habla más ampliamente de «sacar una palabra» delante de Dios. Para no resolver la tensión interpretativa, la traducción mantiene la formulación amplia y deja la posible referencia a votos en la nota.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; el borrador español mantiene la decisión inglesa de no especificar «votos» en el cuerpo del texto y conserva el contraste cielo/tierra y la conclusión exhortativa con un registro sobrio.
  spanish_consistency_notes:
  - Se mantiene «Dios» como traducción de הָאֱלֹהִים en todo el versículo.
  - Se usa «cielo/tierra» para preservar el paralelismo espacial natural en español.
  - Se evita «SEÑOR» o «Yahvé» porque el texto hebreo usa אֱלֹהִים, no el tetragrámaton.
  - La nota al pie conserva la alternativa verbal sin forzar la lectura específica de votos.
  - «Palabras» traduce דְבָרֶיךָ con sentido comunicativo general, coherente con la decisión inglesa de no estrechar el alcance semántico.
