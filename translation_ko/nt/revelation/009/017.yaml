  text: 그 환상에서 내가 본 말들과 그 위에 탄 자들은 이러하였습니다. 그들은 불빛 같고 자줏빛 같고 유황빛 같은 흉배를 가지고 있었고, 말들의 머리는 사자들의 머리 같았으며, 그것들의 입에서는 불과 연기와 유황이 나오고 있었습니다.
