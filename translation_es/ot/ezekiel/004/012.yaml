translation:
  language: es
  text: La comerás como una torta de cebada[a], y la cocerás sobre excremento humano, ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con excremento humano'—el hebreo con la preposición puede entenderse más literalmente, pero el sentido aquí es cocer sobre un fuego alimentado con excremento humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻגַת שְׂעֹרִים
  english_pob_choice: a barley cake
  chosen_spanish: una torta de cebada
  alternatives_spanish:
  - una torta hecha de cebada
  - una hogaza de cebada
  lexicon: HALOT
  rationale: עֻגָה denota una torta o pan plano; con שְׂעֹרִים, el sentido es una torta hecha de cebada. 'Torta de cebada' conserva la imagen concreta y suena natural en español bíblico moderno.
- source_word: תֹּאכֲלֶנָּה
  english_pob_choice: you shall eat it
  chosen_spanish: Comerás
  alternatives_spanish:
  - La comerás
  - Habrás de comerla
  lexicon: HALOT
  rationale: El verbo en segunda persona masculina singular con sufijo femenino remite a la torta. El futuro imperativo/profético se expresa bien con 'Comerás' en español, manteniendo fuerza directiva sin sobreexplicar.
- source_word: בְּגֶלְלֵי
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: La preposición en este contexto de cocción indica el combustible o la base de la cocción. 'Sobre' comunica la relación material de manera más clara y idiomática en español que una traducción mecánica de la preposición.
- source_word: גֶלְלֵי צֵאַת הָאָדָם
  english_pob_choice: human dung
  chosen_spanish: excremento humano
  alternatives_spanish:
  - estiércol humano
  - desechos humanos
  lexicon: HALOT
  rationale: La expresión hebrea es cruda y concreta; 'excremento humano' preserva esa crudeza sin caer en una formulación demasiado eufemística. 'Humano' refleja el valor genérico de הָאָדָם aquí.
- source_word: תְּעֻגֶנָה
  english_pob_choice: you shall bake it
  chosen_spanish: la cocerás
  alternatives_spanish:
  - la cocerás al horno
  - la hornearás
  lexicon: HALOT
  rationale: El verbo puede implicar cocer o preparar como torta. Como ya se identificó el alimento como torta, 'la cocerás' evita redundancia y conserva el acto de cocción sin introducir un horno no explicitado.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: in their sight
  chosen_spanish: en su presencia
  alternatives_spanish:
  - a la vista de ellos
  - ante sus ojos
  lexicon: HALOT
  rationale: El modismo subraya la visibilidad pública de la señal profética. 'En su presencia' es natural en español y conserva el matiz de acto hecho delante de otros.
theological_decisions:
- issue: Valor genérico de הָאָדָם
  english_pob_reading: human
  chosen_spanish_reading: humano
  alternative_spanish_readings:
  - varón
  - hombre
  rationale: Aquí אָדָם no apunta a varón específico sino a la humanidad en general, en contraste con el estiércol animal del verso siguiente. 'Humano' mantiene el valor genérico sin introducir masculinidad innecesaria.
  doctrine_reference: 'DOCTRINE.md: אָדָם → man / humankind según el contexto'
- issue: Fuerza del acto profético visible
  english_pob_reading: in their sight
  chosen_spanish_reading: en su presencia
  alternative_spanish_readings:
  - a la vista de ellos
  - delante de ellos
  rationale: El hebreo exige una señal pública, no algo privado. 'En su presencia' preserva la dimensión testimonial del acto y su carácter deliberadamente visible.
  doctrine_reference: Sign-act prophetic visibility in Ezekiel
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditorial inglés de POB. Se mantuvo la equivalencia óptima en el verbo de cocción, y se adoptó una formulación española natural para la señal profética visible. Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  spanish_consistency_notes:
  - Se usó 'cebada' con un sustantivo concreto ('torta') para conservar la imagen alimentaria.
  - '''Excremento humano'' mantiene la crudeza del hebreo y del inglés POB.'
  - El marcador de nota [a] aparece en el punto léxico relevante y ofrece la alternativa de preposición/lectura.
  - '''Comerás'' y ''la cocerás'' conservan el tono directivo del profeta sin añadir explicaciones interpretativas.'
