translation:
  language: es
  text: De entre ellos exaltó y santificó[a], y de entre ellos estableció un número fijo de días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantó y santificó»; los verbos griegos también pueden traducirse de manera más literal así.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacia un número de días»; probablemente significa un plazo o duración asignados y fijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπ᾽ αὐτῶν
  english_pob_choice: From them
  chosen_spanish: De entre ellos
  alternatives_spanish:
  - De ellos
  - Entre ellos
  - A partir de ellos
  lexicon: LSJ
  rationale: La preposición ἀπό con genitivo expresa origen o procedencia. En español, «de entre ellos» conserva bien el matiz de selección o procedencia colectiva que puede estar presente en el griego, sin decidir innecesariamente entre lectura partitiva o separativa.
- source_word: ἀνύψωσεν
  english_pob_choice: he exalted
  chosen_spanish: lo exaltó
  alternatives_spanish:
  - lo levantó
  - lo ensalzó
  - lo elevó
  lexicon: LSJ
  rationale: ἀνυψόω puede significar «levantar» o «exaltar». Dado el paralelo con «santificó», «lo exaltó» comunica mejor la idea de honor o elevación de rango que el simple movimiento físico.
- source_word: ἡγίασεν
  english_pob_choice: sanctified
  chosen_spanish: lo santificó
  alternatives_spanish:
  - lo hizo santo
  - lo consagró
  - lo apartó para sí
  lexicon: LSJ
  rationale: ἁγιάζω admite «hacer santo», «santificar» o «consagrar». Se conserva «santificó» por su correspondencia formal y su registro teológico, sin restringirlo solo al sentido cultual de «consagró».
- source_word: ἔθηκεν
  english_pob_choice: appointed
  chosen_spanish: estableció
  alternatives_spanish:
  - puso
  - fijó
  - designó
  lexicon: LSJ
  rationale: 'τίθημι es amplio: «poner», «establecer», «designar». En la frase temporal siguiente, «estableció» transmite la idea de fijar o asignar un orden determinado sin sonar demasiado técnico ni introducir una interpretación excesiva.'
- source_word: εἰς ἀριθμὸν ἡμερῶν
  english_pob_choice: a fixed number of days
  chosen_spanish: un número fijo de días
  alternatives_spanish:
  - un número determinado de días
  - para un número de días
  - un cómputo de días
  lexicon: LSJ
  rationale: La expresión literal es «para/into un número de días», idiomática en griego para una duración asignada. «Un número fijo de días» reproduce el valor de plazo determinado que la POB inglesa ya explicitó.
theological_decisions:
- issue: Sujeto implícito de los verbos
  english_pob_reading: he
  chosen_spanish_reading: lo / de entre ellos
  alternative_spanish_readings:
  - él
  - Dios
  - el Señor
  rationale: El griego omite el sujeto explícito; la POB inglesa preserva esa ambigüedad con «he». En español se evita introducir un sujeto nominativo explícito y se mantiene la referencia implícita mediante pronombres y complementos, sin resolver artificialmente si el sujeto es Dios, el Señor u otra referencia contextual.
  doctrine_reference: Preservar la ambigüedad anafórica del texto fuente.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene una ambigüedad de sujeto y añade una nota para el modismo temporal. No hubo revisiones posteriores. La propuesta española conserva esa misma tensión: evita nombrar al sujeto, traduce con un verbo de exaltación y mantiene el sentido idiomático de la expresión temporal con una nota explicativa.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y transparente propio de la POB.
  - Se evita «SEÑOR» como sustituto editorial no presente en el griego.
  - «Santificó» se conserva por coherencia terminológica con el valor de ἁγιάζω.
  - La nota temporal aclara el valor idiomático sin sobretraducir el griego.
  - El marcador [a] aparece una sola vez en el texto y corresponde a la alternativa léxica de los dos primeros verbos.
