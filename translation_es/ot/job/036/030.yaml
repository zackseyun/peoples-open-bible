translation:
  language: es
  text: He aquí, extiende su luz[a] sobre ello[b], y cubre las raíces[c] del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su relámpago» o «su resplandor» para «su luz».
    reason: lexical_alternative
  - marker: b
    text: O «sobre él»; el pronombre hebreo es masculino singular, pero el referente no está explícito y puede apuntar al contexto de la nube o tormenta más que a una persona.
    reason: alternative_reading
  - marker: c
    text: Literalmente, «las raíces del mar»; esto puede referirse a sus partes más profundas o fundamentales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - Mira
  lexicon: HALOT
  rationale: La partícula discursiva llama la atención sobre lo que sigue. En español, «¡Mira!» conserva el impulso exhortativo y la viveza poética; «¡He aquí!» sería más tradicional pero algo más arcaico.
- source_word: פָּרַשׂ
  english_pob_choice: spreads
  chosen_spanish: Extiende
  alternatives_spanish:
  - despliega
  - extiende hacia
  lexicon: HALOT
  rationale: El verbo expresa la idea de extender o desplegar. «Extiende» es natural en español y mantiene la imagen de expansión sin añadir contenido ajeno.
- source_word: עָלָיו
  english_pob_choice: over it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ello
  - sobre él/ello
  lexicon: HALOT
  rationale: El sufijo pronominal es masculino singular y el referente no está explícito en el verso. Se conserva la ambigüedad con «él», que puede apuntar al sujeto implícito del contexto; no se neutraliza a «ello» para no borrar la huella gramatical hebrea.
- source_word: אוֹרוֹ
  english_pob_choice: his light
  chosen_spanish: su luz
  alternatives_spanish:
  - su relámpago
  - su resplandor
  lexicon: HALOT
  rationale: «Luz» es la traducción nuclear del término. En contexto de tormenta puede sugerir relámpago o resplandor; por eso se deja la ambigüedad abierta en el texto principal y se documenta la alternativa léxica.
- source_word: וְשָׁרְשֵׁי
  english_pob_choice: and ... the roots of
  chosen_spanish: y ... las raíces de
  alternatives_spanish:
  - y ... los cimientos de
  - y ... las profundidades de
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «raíces», que en poesía hebrea puede señalar lo más profundo o fundamental. «Cimientos» o «profundidades» interpretan la metáfora, pero la forma literal es más auditable.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - las aguas
  lexicon: HALOT
  rationale: El sustantivo designa directamente el mar. «Las aguas» amplía indebidamente el alcance semántico; por eso se mantiene «mar».
- source_word: כִּסָּה
  english_pob_choice: he covers
  chosen_spanish: cubre
  alternatives_spanish:
  - ha cubierto
  - oculta
  lexicon: HALOT
  rationale: El verbo significa «cubrir». El presente simple funciona bien en poesía descriptiva y mantiene la acción directa sin forzar un matiz aspectual no explicitado por el hebreo.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al texto hebreo WLC y el audit trail inglés de POB; no se detectaron cambios de sentido necesarios respecto de la lectura base, solo decisiones de claridad y registro para el español.
  spanish_consistency_notes:
  - Se preservó la ambigüedad del pronombre masculino singular con «él», en lugar de reescribirlo de manera impersonal.
  - Se mantuvo la metáfora de «raíces» para respetar la imaginería hebrea y la trazabilidad lexical.
  - El estilo es bíblico pero no arcaizante, coherente con un registro de publicación actual en español.
