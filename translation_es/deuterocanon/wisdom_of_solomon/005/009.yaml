translation:
  language: es
  text: Todas aquellas cosas pasaron como una sombra[a], y como una noticia que pasa rápidamente;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «como un reporte que pasa rápidamente». El griego ἀγγελία puede significar «mensaje», «reporte» o «anuncio», y παρατρέχουσα subraya que pasa con rapidez.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρῆλθεν
  english_pob_choice: passed away
  chosen_spanish: pasaron
  alternatives_spanish:
  - pasaron de largo
  - se desvanecieron
  - pasaron y se fueron
  lexicon: BDAG
  rationale: El aoristo de παρέρχομαι expresa transitoriedad y desaparición. En español, «pasaron» comunica con naturalidad la idea de que esas cosas quedaron atrás sin añadir matiz interpretativo excesivo. Evita una formulación más explicativa que altere la imagen del texto.
- source_word: ἐκεῖνα πάντα
  english_pob_choice: all those things
  chosen_spanish: todas aquellas cosas
  alternatives_spanish:
  - todas esas cosas
  - aquellas cosas todas
  lexicon: LSJ
  rationale: ἐκεῖνα mira a elementos ya mencionados y algo distanciados; «aquellas» conserva esa distancia anafórica. «Todas» mantiene el valor totalizador de πάντα. «Cosas» es más natural en español que una traducción demasiado literal del demostrativo sin sustantivo.
- source_word: ὡς σκιὰ
  english_pob_choice: like a shadow
  chosen_spanish: como una sombra
  alternatives_spanish:
  - como sombra
  - cual sombra
  lexicon: LSJ
  rationale: La comparación con σκιὰ expresa fugacidad e insustancialidad. «Como una sombra» es idiomática en español y conserva la imagen sin endurecer el sintagma.
- source_word: ἀγγελία
  english_pob_choice: report
  chosen_spanish: mensaje
  alternatives_spanish:
  - informe
  - noticia
  - reporte
  lexicon: LSJ
  rationale: Aunque el contexto inglés prefirió «report» por matiz formal, en español «mensaje» conserva mejor la amplitud semántica de ἀγγελία y sugiere algo que se transmite rápidamente. Se evita «reporte», que en español moderno suena más técnico o administrativo.
- source_word: παρατρέχουσα
  english_pob_choice: running past
  chosen_spanish: que corre velozmente
  alternatives_spanish:
  - que pasa corriendo
  - que va pasando deprisa
  - que se precipita al pasar
  lexicon: LSJ
  rationale: El participio presente de παρατρέχω conserva una imagen dinámica de rapidez. «Que corre velozmente» mantiene el movimiento verbal y la rapidez del paso, en español claro y solemne.
translation_notes:
  revision_awareness: El inglés POB revisó este versículo de «passed by» a «passed away», y de «message» a «report», para expresar mejor la transitoriedad de παρῆλθεν y el valor formal de ἀγγελία. La presente versión española sigue esa intención de fluidez y desaparición, pero elige «mensaje» como equivalente más natural y amplio en español, dejando constancia en nota de las alternativas de ἀγγελία.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo o una cita del nombre divino lo exija; este versículo no lo contiene.
  - «Sombra» conserva el valor metafórico de fugacidad sin introducir explicaciones.
  - No se usa lenguaje eclesiástico tradicional innecesario; se prioriza el español contemporáneo leído con dignidad.
  - 'La puntuación sigue la estructura binaria del griego: dos comparaciones unidas por «y».'
