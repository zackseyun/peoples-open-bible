translation:
  language: es
  text: Entonces él volvía a Ramá[a], porque allí estaba su casa, y allí juzgaba a Israel. Edificó allí un altar a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''Y su regreso era a Ramá''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְשֻׁבָתוֹ
  english_pob_choice: Then he would return
  chosen_spanish: Entonces él volvía
  alternatives_spanish:
  - Y su regreso era
  - Y su vuelta era
  lexicon: HALOT
  rationale: El sustantivo con sufijo pronominal significa literalmente 'su retorno/vuelta'. En español, para conservar naturalidad narrativa y la idea de movimiento habitual, se verbaliza como 'volvía'. 'Entonces' refleja la continuidad temporal del waw en el contexto del circuito de Samuel.
- source_word: הָרָמָתָה
  english_pob_choice: to Ramah
  chosen_spanish: a Ramá
  alternatives_spanish:
  - hacia Ramá
  - a la Ramá
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el lugar. En español, 'a Ramá' es la forma natural y clara, manteniendo el nombre propio sin forzar un calco.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón de su regreso: su casa estaba allí. En español, ''porque'' expresa esa relación causal de modo directo y transparente.'
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su morada
  lexicon: HALOT
  rationale: Aquí בית tiene sentido locativo concreto. 'Casa' preserva la referencia física y es plenamente natural en español.
- source_word: וְשָׁם
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - y ahí
  - allí también
  lexicon: HALOT
  rationale: Se conserva la repetición de שָׁם, que organiza el verso alrededor de Ramá como centro de la actividad de Samuel.
- source_word: שָׁפַט אֶת־יִשְׂרָאֵל
  english_pob_choice: he judged Israel
  chosen_spanish: juzgaba a Israel
  alternatives_spanish:
  - gobernaba a Israel
  - administraba justicia a Israel
  lexicon: HALOT
  rationale: שׁפט en este contexto designa la función de juez de Samuel, más amplia que una sola acción forense. 'Juzgaba a Israel' es la equivalencia más estable y fiel al uso bíblico.
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Edificó
  alternatives_spanish:
  - Construyó
  - Levantó
  lexicon: HALOT
  rationale: El verbo se refiere a la construcción de un altar. 'Edificó' es una forma digna y precisa en español bíblico, sin añadir la idea de 'también', que no está en el hebreo.
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un sacrificatorio
  lexicon: HALOT
  rationale: Renderización estándar del término. No hay presión contextual para especificar más.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se adopta 'Yahvé' conforme al criterio del proyecto para יהוה. La preposición ל expresa dedicación/destinación del altar; en español 'a Yahvé' comunica adecuadamente esa relación y evita la convención de ocultar el nombre divino.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la directriz del proyecto, se preserva el nombre del pacto en español como 'Yahvé', en lugar de sustituirlo por una designación tradicional o por una máscara tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada retiró 'also' en una revisión posterior porque no está presente en el hebreo. La redacción española evita igualmente cualquier equivalente añadido y mantiene el paralelismo simple del texto fuente.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יהוה, en línea con la terminología del proyecto.
  - Se usa 'juzgaba' para שׁפט, manteniendo el valor funcional de juez sin reducirlo a una mera audiencia legal.
  - No se añadió ningún equivalente de 'también', porque el hebreo no lo contiene y la revisión inglesa lo corrigió por esa misma razón.
