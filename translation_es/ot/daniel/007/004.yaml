  to: La primera era como un león, y tenía alas de águila. Seguí observando hasta que sus alas fueron arrancadas[a], y fue levantada de la tierra y puesta en pie sobre dos pies como un hombre[b], y le fue dado un corazón humano[c].
  rationale: La revisión corrige la desalineación grave de la nota [a], trasladando la alternativa al verbo correcto ('fueron arrancadas'). También reemplaza 'patas' por 'pies' para reflejar mejor el arameo y el contraste con lo humano sin añadir color zoológico interpretativo. Se conservan las decisiones fuertes del borrador ('Seguí observando', 'como un hombre', 'corazón humano') porque son fieles al source, al audit trail inglés y al español eclesial claro.
  reviewer_model: gpt-5.4
