translation:
  language: es
  text: 'Pero nosotros no podemos darles esposas de nuestras hijas[a], porque los hijos de Israel han jurado, diciendo: «Maldito el que dé una esposa a Benjamín».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «a la tribu de Benjamín» o «a un benjaminita»; el hebreo usa directamente el nombre tribal «Benjamín».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Y nosotros
  - Ahora nosotros
  lexicon: HALOT
  rationale: La conjunción más el pronombre independiente introduce contraste en la línea argumental; «Pero nosotros» conserva ese giro y el énfasis del sujeto en español natural.
- source_word: לֹא נוּכַל
  english_pob_choice: cannot
  chosen_spanish: no podemos
  alternatives_spanish:
  - no somos capaces de
  - no podemos legalmente
  lexicon: HALOT
  rationale: נוכל expresa imposibilidad o capacidad. En este contexto la negativa es práctica y atada al juramento; «no podemos» es claro y fiel sin añadir una glosa jurídica que el hebreo no explicita.
- source_word: לָתֵת לָהֶם
  english_pob_choice: give them
  chosen_spanish: darles
  alternatives_spanish:
  - dar a ellos
  - proveerles
  lexicon: HALOT
  rationale: El verbo נתן con dativo pronominal se expresa de forma natural en español con el clítico indirecto «darles», sin perder el valor de transferencia.
- source_word: נָשִׁים
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  lexicon: HALOT
  rationale: El contexto matrimonial de Jueces 21 exige el sentido de cónyuge; «esposas» comunica el matiz con claridad en español actual.
- source_word: מִבְּנוֹתֵינוּ
  english_pob_choice: from our daughters
  chosen_spanish: de entre nuestras hijas
  alternatives_spanish:
  - de nuestras hijas
  - tomadas de nuestras hijas
  lexicon: HALOT
  rationale: La preposición מן marca procedencia; «de entre» preserva mejor la idea de selección/extracción desde el grupo familiar que un simple «de».
- source_word: נִשְׁבְּעוּ
  english_pob_choice: have sworn
  chosen_spanish: han jurado
  alternatives_spanish:
  - juraron
  - se han comprometido por juramento
  lexicon: HALOT
  rationale: El nifal de שׁבע denota prestar juramento. «Han jurado» mantiene el hecho pasado con vigencia actual en la discusión.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación masculina explícita del hebreo, sin suavizarla a «israelitas», para respetar la forma del texto fuente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - declarando
  lexicon: HALOT
  rationale: La forma infinitiva quotativa introduce la cita; «diciendo» es la equivalencia directa y transparente en español.
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldicho
  - Bajo maldición
  lexicon: HALOT
  rationale: Es el término judicial/covenantal de maldición. «Maldito» transmite la fuerza del juicio sin depender de un registro arcaico.
- source_word: נֹתֵן אִשָּׁה
  english_pob_choice: the one who gives a wife
  chosen_spanish: el que dé una esposa
  alternatives_spanish:
  - quien dé una esposa
  - el que entregue una mujer en matrimonio
  lexicon: HALOT
  rationale: El participio funciona de modo genérico. El subjuntivo en español («dé») reproduce bien la idea de cualquier persona que realice la acción bajo la sanción del juramento.
- source_word: לְבִנְיָמִן
  english_pob_choice: to Benjamin
  chosen_spanish: a Benjamín
  alternatives_spanish:
  - a la tribu de Benjamín
  - a un benjaminita
  lexicon: HALOT
  rationale: El hebreo usa el nombre tribal directamente; en español puede mantenerse la forma breve «a Benjamín», que conserva la referencia corporativa sin sobreexplicar el término.
theological_decisions:
- issue: Alcance de la maldición formulada como juramento comunitario
  english_pob_reading: Cursed is the one who gives a wife to Benjamin.
  chosen_spanish_reading: Maldito el que dé una esposa a Benjamín.
  alternative_spanish_readings:
  - Maldito el que entregue una esposa a Benjamín.
  - Maldito quien dé una esposa a la tribu de Benjamín.
  rationale: Se mantiene la fuerza de la fórmula de maldición/juramento sin intensificarla ni atenuarla. El español conserva el carácter sancionador del dicho comunitario.
  doctrine_reference: Números 30:2; Deuteronomio 27:15-26
- issue: Referencia tribal de 'Benjamín'
  english_pob_reading: to Benjamin
  chosen_spanish_reading: a Benjamín
  alternative_spanish_readings:
  - a la tribu de Benjamín
  - a un benjaminita
  rationale: El hebreo nombra directamente al linaje/tribu. «A Benjamín» respeta la economía del original; las alternativas explicitan el referente tribal pero añaden interpretación.
  doctrine_reference: Jueces 20–21; Génesis 49:27
translation_notes:
  revision_awareness: El pasaje fue revisado previamente con alta concordancia y sin cambios pendientes; esta versión mantiene la lectura de fondo del inglés auditado, ajustándola a un español natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se conserva la formulación masculina explícita «los hijos de Israel» por consistencia con el hebreo.
  - «Benjamín» se mantiene sin expansión en el cuerpo del texto, con nota para la alternativa tribal más explícita.
  - «Han jurado» refleja un juramento vigente en el argumento, coherente con el valor aspectual del contexto.
