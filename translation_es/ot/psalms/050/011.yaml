translation:
  language: es
  text: Conozco cada ave de los montes, y las criaturas[a] del campo están conmigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los seres que se mueven del campo» o «los animales salvajes del campo», por la difícil palabra hebrea זִיז.
    reason: lexical_alternative
  - marker: b
    text: O «son míos»; el hebreo dice más literalmente «están conmigo».
    reason: alternative_reading
lexical_decisions:
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Conozco
  alternatives_spanish:
  - Sé
  - He conocido
  lexicon: HALOT
  rationale: El perfecto qal de ידע expresa aquí conocimiento establecido; en español, el presente "conozco" comunica de forma natural ese conocimiento continuo y completo de Dios.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: cada
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: 'Con un sustantivo colectivo singular, "cada" preserva mejor el valor distributivo: Dios conoce individualmente a cada ave.'
- source_word: עוֹף
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - animal volador
  lexicon: HALOT
  rationale: '"Ave" es un equivalente bíblico y digno en español, amplio suficiente para עוֹף sin sonar demasiado restringido ni demasiado técnico.'
- source_word: הָרִים
  english_pob_choice: of the mountains
  chosen_spanish: de los montes
  alternatives_spanish:
  - de las montañas
  - de las colinas
  lexicon: HALOT
  rationale: '"Montes" conserva bien el plural hebreo y el tono poético. En español bíblico, resulta natural y mantiene la imagen de altura y solidez.'
- source_word: וְזִיז
  english_pob_choice: and the creatures
  chosen_spanish: las criaturas
  alternatives_spanish:
  - los seres que se mueven
  - los animales salvajes
  lexicon: HALOT
  rationale: Zִיז es un término difícil. "Criaturas" permite una solución amplia y sobria, sin forzar una identificación más precisa de la que el hebreo garantiza.
- source_word: שָׂדַי
  english_pob_choice: of the field
  chosen_spanish: del campo
  alternatives_spanish:
  - de la llanura
  - del campo abierto
  lexicon: HALOT
  rationale: En español, "campo" comunica bien el ámbito abierto y rural de שָׂדַי, manteniendo el paralelismo poético con "los montes".
- source_word: עִמָּדִי
  english_pob_choice: are with me
  chosen_spanish: están conmigo
  alternatives_spanish:
  - son míos
  - están junto a mí
  lexicon: HALOT
  rationale: La preposición expresa literalmente compañía o cercanía. "Están conmigo" preserva la formulación textual y deja implícita la posible idea de posesión, sin adelantarla en el cuerpo del verso.
theological_decisions:
- issue: Posible implicación de posesión divina en עִמָּדִי
  english_pob_reading: Retain the more literal 'are with me' rather than making the implication explicit as 'are mine'.
  chosen_spanish_reading: Mantener "están conmigo" en vez de explicitar "son míos".
  alternative_spanish_readings:
  - son míos
  - me pertenecen
  rationale: El hebreo dice literalmente "conmigo" y no formula de manera explícita la posesión. La traducción conserva esa tensión y deja que el contexto de conocimiento soberano la sugiera, no la imponga.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el expediente inglés; el consenso de revisión fue de alta concordancia y sin cambios.
  spanish_consistency_notes:
  - Se mantuvo "conmigo" para עִמָּדִי, siguiendo la literalidad preservada por la POB inglesa.
  - Se evitó "SEÑOR" porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - '"Montes" y "campo" conservan el paralelismo poético y el registro bíblico en español.'
