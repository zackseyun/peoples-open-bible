    reason: lexical_alternative
  revision_rationale: Se corrige la fecha para reflejar con fidelidad y naturalidad el valor calendárico del hebreo y se restituye 'este'. Se aligera el reflexivo redundante en español. La nota se reubica en la expresión ritual clave, conforme al rastro auditado inglés y a la importancia teológica/lexical de וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם.
