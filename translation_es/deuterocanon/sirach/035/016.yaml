review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo extante: וידעו = «sabrán», כל אפסי ארץ = «todos los confines de la tierra», אתה = «tú eres», אלהי עולם = «el Dios eterno». También preserva correctamente la primacía del hebreo frente al griego divergente mediante nota textual.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español. La única reparación necesaria está en la nota léxica: actualmente ofrece como alternativa exactamente la misma frase del texto principal («el Dios eterno»), lo cual no aporta una verdadera alternativa. Conviene reemplazarla por una opción distinta y fiel, como «el Dios perpetuo» o «el Dios sempiterno».'
  glossary_alignment: 'No hay conflicto con la glosa del proyecto: no aparecen Yahvé, Mesías, δοῦλος, etc. «Dios» es correcto. La referencia griega usa «Señor» solo dentro de la nota de variante textual, lo cual es apropiado porque reproduce la tradición griega y no el texto principal.'
  issues:
  - severity: low
    issue: La nota [b] repite el mismo giro del texto principal
    rationale: La nota dice «O “el Dios eterno” / “el Dios perpetuo”», pero «el Dios eterno» ya es la lectura del cuerpo principal. Una nota de alternativa debe ofrecer una opción realmente distinta para reflejar el matiz de עולם.
  revised_spanish_text: Y todos los confines de la tierra sabrán que tú eres el Dios eterno.[a][b]
  revised_footnotes:
  - marker: a
    text: 'La tradición griega lee: «Los que temen al Señor hallarán juicio, y encenderán obras justas como luz». El testimonio hebreo aquí preserva una línea sustancialmente diferente.'
    reason: textual_variant
  - marker: b
    text: O «el Dios perpetuo» / «el Dios sempiterno».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y bien alineado con el hebreo y con el audit trail inglés. Solo se corrige la nota léxica [b] para que ofrezca alternativas reales a «el Dios eterno» en vez de repetir la misma expresión.
