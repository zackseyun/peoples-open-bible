translation:
  language: es
  text: Y cuando lo vieron[a], consiguieron treinta compañeros, y estuvieron con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amigos»; posiblemente acompañantes de boda o algo como «padrinos de boda».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Ahora sucedió
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce la escena. En español, «Y» conserva la continuidad del relato sin forzar una fórmula más pesada como «y sucedió».
- source_word: כִּרְאוֹתָם
  english_pob_choice: when they saw
  chosen_spanish: cuando lo vieron
  alternatives_spanish:
  - al verlo
  - en cuanto lo vieron
  lexicon: HALOT
  rationale: La construcción temporal se vierte de modo natural con «cuando». El sufijo plural exige plural en español, y el objeto es masculino singular, por eso «lo vieron».
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: Como pronombre de objeto directo en español, «lo» es la forma natural y mantiene la referencia a Sansón sin añadir énfasis innecesario.
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - escogieron
  lexicon: HALOT
  rationale: לקח puede ser «tomar», y aquí la idea es que designaron o tomaron consigo a esos hombres para la función indicada. «Tomaron» conserva la literalidad básica y funciona bien en español.
- source_word: שְׁלֹשִׁים
  english_pob_choice: thirty
  chosen_spanish: treinta
  lexicon: HALOT
  rationale: Número cardinal directo, sin complicación contextual.
- source_word: מֵרֵעִים
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - amigos
  - acompañantes
  - groomsmen
  lexicon: HALOT
  rationale: El término puede abarcar asociados, amigos o compañeros de boda. «Compañeros» preserva la amplitud semántica sin decidir de manera definitiva por un rol técnico como «groomsmen».
- source_word: וַיִּהְיוּ אִתּוֹ
  english_pob_choice: and they were with him
  chosen_spanish: y estuvieron con él
  alternatives_spanish:
  - y estuvieron junto a él
  - y lo acompañaron
  lexicon: HALOT
  rationale: La construcción hebrea es simple y relacional. «Estuvieron con él» mantiene esa simplicidad y evita añadir una interpretación más específica que la fuente no exige.
theological_decisions:
- issue: Posible función social de los 'compañeros'
  english_pob_reading: Or 'friends,' possibly specifically wedding companions or groomsmen.
  chosen_spanish_reading: ‘compañeros’, con nota alternativa sobre ‘amigos’ y posible función nupcial
  alternative_spanish_readings:
  - amigos
  - acompañantes
  - padrinos de boda
  - groomsmen
  rationale: El hebreo מֵרֵעִים admite una gama relacional amplia. Como el contexto puede sugerir una ceremonia nupcial, pero no lo prueba de forma concluyente en este verso aislado, conviene mantener la amplitud en el texto principal y señalar la alternativa en nota.
  doctrine_reference: Ninguno; decisión léxica-contextual sin implicación doctrinal
translation_notes:
  revision_awareness: El contexto inglés POB está en alta concordancia y no requiere revisión sustantiva. Se preserva la estructura simple del hebreo, la referencia pronominal a Sansón y la ambigüedad léxica de מֵרֵעִים mediante una nota breve.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece en el texto fuente; aquí no aparece.
  - Se conserva el pronombre átono «lo» para el objeto directo masculino singular.
  - «Compañeros» mantiene la amplitud semántica de מֵרֵעִים sin sobredeterminar un rol ceremonial.
