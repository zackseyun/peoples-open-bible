review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la codicia por la ganancia trae daño a la propia casa, en contraste con rechazar sobornos y así vivir. Sin embargo, «es avaro de ganancia» no representa de manera idiomática ni precisa la construcción intensiva בּוֹצֵעַ בָּצַע; suena forzado en español y desplaza el foco de codicia/apetito por provecho a un rasgo de tacañería. Además, la nota al pie está anclada en el lugar equivocado: comenta «ganancia» cuando el matiz discutido corresponde a la expresión completa de codicia por ganancia, no a un solo sustantivo.'
  spanish_quality_summary: El texto es claro y legible, pero «avaro de ganancia» no es español natural en un registro bíblico moderno. «Codicia la ganancia» o «es codicioso de ganancia» sería mejor; la primera es más fluida. «Perturba su casa» es aceptable, aunque algo menos natural que «trae problemas a su casa»; no requiere cambio. «Aborrece los sobornos vivirá» es correcto y digno.
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. «Sobornos» sigue bien la decisión contextual para מַתָּנוֹת, y «vivirá» preserva la tersura de יִחְיֶה. La revisión propuesta mejora la fidelidad lexical de בּוֹצֵעַ בָּצַע sin introducir paráfrasis.
  issues:
  - severity: medium
    issue: «es avaro de ganancia» es poco idiomático y semánticamente impreciso para בּוֹצֵעַ בָּצַע
    rationale: En español, «avaro» suele sugerir tacañería o apego al dinero, no necesariamente codicia activa por obtener ganancia. El hebreo expresa apetito codicioso por provecho; «codicia la ganancia» comunica mejor esa fuerza y suena natural.
  - severity: medium
    issue: La nota [a] está colocada sobre «avaro» pero comenta «ganancia» y el matiz de la expresión completa
    rationale: El marcador debe ir donde realmente surge la alternativa lexical. Aquí la nota trata el campo semántico de בָּצַע/ganancia y del giro intensivo, no del adjetivo «avaro» en sí.
  revised_spanish_text: Quien codicia la ganancia[a] perturba su casa, pero el que aborrece los sobornos vivirá.
  revised_footnotes:
