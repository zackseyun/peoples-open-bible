translation:
  text: 'And you, you shall prophesy all these words against them, and you shall say to them: The LORD will roar from on high, and from his holy dwelling he will give his voice; he will surely roar against his pasture. He will answer with a shout like those who tread grapes, against all the inhabitants of the earth.'
