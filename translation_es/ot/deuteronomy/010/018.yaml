review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: acción judicial hacia el huérfano y la viuda, amor hacia el גֵּר, y provisión concreta. «Hace justicia» para עֹשֶׂה מִשְׁפָּט es idiomático y fiel. «Huérfano» es una adaptación española aceptable con nota. El punto más débil es «vestido» para שִׂמְלָה, que en este contexto de provisión básica se entiende mejor como «ropa»; además, la nota c está mal formulada porque presenta como literal lo que en realidad es el propio texto español anclado, no una explicación del contraste entre lo literal y el sentido.'
  spanish_quality_summary: El español es claro y digno, pero «pan y vestido» suena menos natural en español contemporáneo general que «pan y ropa». «Vestido» puede leerse como una prenda específica femenina, lo que estrecha indebidamente el sentido de שִׂמְלָה. También conviene mejorar la nota c para explicar que «pan» es literal y que la pareja expresa provisión básica, sin llamar «lit.» a toda la frase de la traducción.
  glossary_alignment: No hay conflicto con los términos de proyecto mayores. La decisión «extranjero residente» para גֵּר es defendible y preserva el matiz de residente no nativo mejor que «extranjero» a secas. «Huérfano» como excepción contextual frente a «fatherless» está bien documentado en nota. La revisión propuesta mantiene esas decisiones y solo ajusta שִׂמְלָה a «ropa» por fidelidad semántica y naturalidad española.
  issues:
  - severity: medium
    issue: «Vestido» para שִׂמְלָה es demasiado estrecho y potencialmente engañoso.
    rationale: שִׂמְלָה es un término general de prenda/ropa. En español actual, «vestido» suele evocar una prenda específica, a menudo femenina. «Ropa» preserva mejor la referencia general a vestimenta básica.
  - severity: medium
    issue: La nota c usa «Lit.» de manera imprecisa.
    rationale: El hebreo literal es «pan y vestido/prenda», pero la traducción propuesta ya usa «pan y vestido». La nota debería explicar el valor de «pan» como literal y la pareja como provisión básica, no presentar toda la frase española como si fuera una glosa literal diferenciada.
  - severity: low
    issue: El orden de marcadores en el inglés (c][b]) no debe arrastrarse mecánicamente al español.
    rationale: El borrador no lo hace mal, pero conviene confirmar que cada marcador español ancle su propia nota pertinente y en orden natural local, como exige el proyecto.
  revised_spanish_text: Él hace justicia al huérfano y a la viuda[a], y ama al extranjero residente[b], dándole pan[c] y ropa.
  revised_footnotes:
