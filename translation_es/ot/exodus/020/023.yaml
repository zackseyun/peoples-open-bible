translation:
  language: es
  text: No harán dioses de plata junto a mí[a], ni harán para ustedes mismos dioses de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conmigo». El hebreo dice literalmente «conmigo»; aquí se traduce de forma más natural como «junto a mí» para reflejar la relación prohibida con Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲשׂוּן / תַעֲשׂוּ
  english_pob_choice: make
  chosen_spanish: harán
  alternatives_spanish:
  - fabricarán
  - harán para sí
  - hacerán
  lexicon: HALOT
  rationale: El verbo עשה en este contexto se refiere a producir o fabricar objetos de culto. En español, «harán» conserva la fuerza directa de la prohibición legal sin añadir una precisión artesanal que el hebreo no exige aquí.
- source_word: אִתִּי
  english_pob_choice: alongside me
  chosen_spanish: junto a mí
  alternatives_spanish:
  - conmigo
  - al lado de mí
  - junto conmigo
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular significa literalmente «conmigo». En este contexto de prohibición de rivales cultuales, «junto a mí» comunica bien la relación de proximidad indebida sin sobredeterminar el matiz como «al lado de mí».
- source_word: אֱלֹהֵי כֶסֶף
  english_pob_choice: gods of silver
  chosen_spanish: dioses de plata
  alternatives_spanish:
  - dioses de dinero
  - ídolos de plata
  - dioses hechos de plata
  lexicon: HALOT
  rationale: La cadena constructa se rinde de manera directa como «dioses de plata». En español, «plata» es el equivalente natural de כֶסֶף en este contexto y mantiene el foco en deidades ilícitas hechas de ese material.
- source_word: וֵאלֹהֵי זָהָב
  english_pob_choice: gods of gold
  chosen_spanish: dioses de oro
  alternatives_spanish:
  - ídolos de oro
  - dioses hechos de oro
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y con la estructura hebrea repetida. «Dioses de oro» preserva el sustantivo cultual y el material, sin convertirlo en una paráfrasis más interpretativa.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí mismos
  - para ustedes mismos
  - para su uso
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural con ל expresa destinatario o posesión. En español, «para ustedes» reproduce de forma natural el valor dativo/posesivo sin forzar una explicitación reflexiva que el hebreo no exige estrictamente.
- source_word: לֹא ... לֹא
  english_pob_choice: You shall not ... nor shall you ...
  chosen_spanish: No harán ... ni harán ...
  alternatives_spanish:
  - No harán ... y no harán ...
  - No hagan ... ni hagan ...
  lexicon: HALOT
  rationale: Los dos negativos coordinados funcionan como prohibiciones legales paralelas. «No harán ... ni harán ...» conserva el registro jurídico del texto del pacto y el paralelismo de la doble prohibición.
theological_decisions:
- issue: Cómo reflejar אִתִּי sin importar una interpretación más fuerte que el hebreo literal
  english_pob_reading: alongside me
  chosen_spanish_reading: junto a mí
  alternative_spanish_readings:
  - conmigo
  - al lado de mí
  - beside me
  rationale: El hebreo dice literalmente «conmigo», y el contexto indica una prohibición de cultos rivales en relación con Yahvé. «Junto a mí» expresa la cercanía prohibida de manera natural en español y evita la fraseología más interpretativa de «al lado de mí» si suena demasiado espacial o estilizada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo mantener la distinción entre dioses ilícitos y objetos meramente decorativos
  english_pob_reading: gods of silver / gods of gold
  chosen_spanish_reading: dioses de plata / dioses de oro
  alternative_spanish_readings:
  - ídolos de plata / ídolos de oro
  - dioses hechos de plata / hechos de oro
  rationale: El hebreo usa אֱלֹהֵי, no un término genérico para imágenes. «Dioses de plata» y «dioses de oro» conservan esa dureza lexical y la denuncia de deidades fabricadas, sin suavizarla a «ídolos» salvo que el contexto inmediato lo exija.
  doctrine_reference: Exodus 20; covenant prohibition against rival worship
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «alongside me» frente a una redacción más explicativa. Este borrador español sigue esa decisión con «junto a mí», manteniendo la literalidad funcional del hebreo אִתִּי y el paralelismo de las dos prohibiciones, sin añadir interpretaciones como «en mi presencia» o «además de mí».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino estándar del proyecto cuando el contexto lo requiere, aunque en este versículo no aparece explícitamente.
  - Se usa «dioses» en el sentido polémico del hebreo, sin sustituirlo por «ídolos» para no borrar la forma lexical del texto fuente.
  - Se conserva el tono legal y compacto del mandamiento con dos cláusulas negativas coordinadas.
