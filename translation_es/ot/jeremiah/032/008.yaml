translation:
  language: es
  text: 'Entonces Hanamel, hijo de mi tío, vino a mí en el patio de la guardia, conforme a la palabra de Yahvé, y me dijo: «Por favor, compra mi campo, que está en Anatot, en la tierra de Benjamín; porque tuyo es el derecho de herencia y tuya la redención[a]. Cómpralo para ti». Entonces supe que esta era la palabra de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente, «el derecho de redención». El hebreo dice literalmente: «la redención es tuya», refiriéndose al derecho o deber familiar de rescatar la propiedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa כְּ + דְבָר para expresar conformidad con algo ya dicho. «Conforme a» conserva esa relación narrativa y suena natural en español. Se mantiene «Yahvé» para el nombre divino, siguiendo el criterio del proyecto.
- source_word: חֲצַר הַמַּטָּרָה
  english_pob_choice: the court of the guard
  chosen_spanish: el patio de la guardia
  alternatives_spanish:
  - el atrio de la guardia
  - el patio de los guardias
  - el patio del guardia
  lexicon: HALOT
  rationale: La expresión designa el recinto vigilado donde Jeremías estaba retenido. «Patio de la guardia» conserva la idea de un espacio custodiado sin imponer «prisión» en el texto principal. «Patio» resulta idiomático y claro en español.
- source_word: קְנֵה נָא
  english_pob_choice: Please buy
  chosen_spanish: Por favor, compra
  alternatives_spanish:
  - Compra, por favor
  - Te ruego que compres
  lexicon: HALOT
  rationale: קנה es «comprar/adquirir» en este contexto de propiedad. נָא suaviza la orden y marca petición cortés; «por favor» transmite bien ese matiz en español.
- source_word: שָׂדִי
  english_pob_choice: my field
  chosen_spanish: mi campo
  alternatives_spanish:
  - mi terreno
  - mi parcela
  lexicon: HALOT
  rationale: שָׂדֶה suele ser «campo». En una transacción de propiedad, «campo» es directo, preciso e idiomático en español.
- source_word: בַּעֲנָתוֹת
  english_pob_choice: at Anathoth
  chosen_spanish: en Anatot
  alternatives_spanish:
  - en Anatot, junto a
  - en la localidad de Anatot
  lexicon: HALOT
  rationale: Con un topónimo, el español natural usa «en». Se mantiene la transliteración «Anatot» como forma habitual en español bíblico.
- source_word: מִשְׁפַּט הַיְרֻשָּׁה
  english_pob_choice: the right of inheritance
  chosen_spanish: el derecho de herencia
  alternatives_spanish:
  - el derecho hereditario
  - el derecho de heredar
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene fuerza jurídica de derecho/pretensión, y יְרֻשָּׁה apunta a herencia/posesión. «Derecho de herencia» conserva el sentido legal y es claro para lectores actuales.
- source_word: הַגְּאֻלָּה
  english_pob_choice: the redemption
  chosen_spanish: la redención
  alternatives_spanish:
  - el rescate
  - el derecho de redención
  - la obligación de rescate
  lexicon: HALOT
  rationale: El término alude al derecho/responsabilidad de redimir propiedad familiar. «Redención» mantiene la forma sustantiva cercana al hebreo; el matiz jurídico queda explicado en la nota.
- source_word: קְנֵה לָךְ
  english_pob_choice: Buy it for yourself
  chosen_spanish: Cómpralo para ti
  alternatives_spanish:
  - Adquiérelo para ti
  - Cómpralo para ti mismo
  lexicon: HALOT
  rationale: La expresión idiomática pide un objeto explícito en español para evitar ambigüedad. «Para ti» conserva el sentido reflexivo/dativo del hebreo y fluye naturalmente.
- source_word: וָאֵדַע כִּי דְבַר יְהוָה הוּא
  english_pob_choice: Then I knew that this was the word of Yahweh
  chosen_spanish: Entonces supe que era palabra de Yahvé
  alternatives_spanish:
  - Entonces supe que esto era palabra de Yahvé
  - Y entendí que era la palabra de Yahvé
  lexicon: HALOT
  rationale: La frase marca el reconocimiento de Jeremías de que el acontecimiento confirmaba el mensaje previo. «Era palabra de Yahvé» reproduce el hebreo de forma concisa; el artículo puede quedar implícito en español sin perder naturalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de una sustitución por título.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios. La forma española del proyecto es «Yahvé», que conserva la referencia personal del nombre del pacto sin sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: «La redención» como derecho kinésico-jurídico
  english_pob_reading: the redemption
  chosen_spanish_reading: la redención
  alternative_spanish_readings:
  - el derecho de redención
  - la obligación de redención
  rationale: El hebreo dice literalmente «la redención es tuya», refiriéndose al derecho o deber familiar de rescatar la propiedad. En el texto principal se conserva «la redención» y se aclara el matiz legal en nota para no borrar la tensión lexical.
  doctrine_reference: Nota lexical sobre גְּאֻלָּה en HALOT y el uso contextual en Jer 32:8
translation_notes:
  revision_awareness: 'La redacción española sigue el pasaje hebreo de cerca y conserva las decisiones auditadas del POB inglés: el nombre divino se traduce como Yahvé/Yahweh según el proyecto, חֲצַר הַמַּטָּרָה se entiende como un recinto vigilado, y גְּאֻלָּה mantiene la forma sustantiva «redención» con aclaración en nota. No se introdujeron cambios textuales respecto del análisis previo.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «derecho de herencia» y «redención» para reflejar la estructura jurídica del hebreo.
  - «Campo» y «Anatot» son formas idiomáticas y consistentes con el registro bíblico en español.
  - La puntuación del discurso directo busca claridad sin alejarse del orden narrativo del original.
