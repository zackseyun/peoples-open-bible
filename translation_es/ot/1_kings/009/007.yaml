  to: entonces yo cortaré a Israel de la faz de la tierra que les he dado, y la casa[a] que he consagrado para mi nombre[b] la arrojaré de delante de mí[c], e Israel llegará a ser un proverbio y una burla[d] entre todos los pueblos.
  rationale: La revisión mantiene las decisiones de fondo del POB inglés y del hebreo, pero mejora la naturalidad del español y corrige la ubicación de las notas. 'Cortaré a Israel de la faz de la tierra' preserva mejor el modismo de juicio que 'extirparé... de sobre la superficie de la tierra'. 'De delante de mí' conserva el sentido principal con mejor legibilidad, mientras la literalidad más marcada queda en nota. También se redistribuyen las notas para que cada una quede anclada a la palabra o frase pertinente, según las reglas del proyecto.
