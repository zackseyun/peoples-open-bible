translation:
  language: es
  text: Por eso también le estableció una estatuto[a], una alianza perpetua, para sostener el santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego paralelo: «Por eso se estableció para él una alianza de paz, como guardián de las cosas santas y para su pueblo, de modo que la dignidad del sacerdocio fuera para él y para su descendencia para siempre». El testigo hebreo aquí es más breve y se concentra en un estatuto y una alianza perpetua para sostener el santuario.'
    reason: alternative_reading
lexical_decisions:
- source_word: לכן / διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  - Así que
  lexicon: HALOT; BDAG
  rationale: La partícula introduce consecuencia directa del acto previo de Finehás. «Por eso» suena natural en español y conserva la relación causal sin volver el verso demasiado formal.
- source_word: גם לו
  english_pob_choice: he also established for him
  chosen_spanish: también le estableció
  alternatives_spanish:
  - le estableció también
  - le preparó también
  - también le instituyó
  lexicon: HALOT
  rationale: El hebreo marca que la provisión es un añadido personal para él. «Le estableció» mantiene el valor jurídico/covenantal de la acción y «también» conserva el matiz aditivo.
- source_word: הכין / ἐστάθη
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - preparó
  - instituyó
  - dispuso
  lexicon: HALOT; LXX ἐστάθη
  rationale: Aunque «preparó» es posible, el contexto de estatuto y alianza pide una formulación de establecimiento formal. «Estableció» refleja bien la fijación duradera del don y armoniza con el griego ἐστάθη ('fue establecido').
- source_word: חק
  english_pob_choice: a statute
  chosen_spanish: una estatuto
  alternatives_spanish:
  - un decreto
  - una ordenanza
  - un precepto
  lexicon: HALOT
  rationale: Se conserva la fuerza legal de חק. En español, «estatuto» expresa una disposición fija y normativa. Se mantiene el artículo indefinido para reflejar la estructura del hebreo y la traducción inglesa auditada.
- source_word: ברית עולם
  english_pob_choice: an everlasting covenant
  chosen_spanish: una alianza perpetua
  alternatives_spanish:
  - un pacto eterno
  - una alianza eterna
  - un pacto perpetuo
  lexicon: HALOT
  rationale: «Alianza» es un equivalente bíblico claro y natural para ברית. «Perpetua» transmite la continuidad duradera de עולם sin sonar excesivamente literal o filosófico.
- source_word: לכלכל
  english_pob_choice: to sustain
  chosen_spanish: para sostener
  alternatives_spanish:
  - para mantener
  - para proveer para
  - para sustentar
  lexicon: HALOT
  rationale: El verbo expresa apoyo continuo y mantenimiento. «Sostener» funciona bien en español y evita reducir el sentido a mera provisión económica, en concordancia con el contexto del santuario.
- source_word: מקדש
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el templo
  - el recinto sagrado
  lexicon: HALOT
  rationale: «Santuario» preserva el registro cultual general del hebreo sin forzar una identificación arquitectónica más estrecha que la del texto.
theological_decisions:
- issue: Divergencia hebreo-griego sobre el contenido de la promesa
  english_pob_reading: The Hebrew main line speaks of a statute, an everlasting covenant, to sustain the sanctuary; the Greek parallel expands this into a covenant of peace and a perpetual priesthood for Phinehas and his offspring.
  chosen_spanish_reading: Se traduce la línea hebrea principal y se deja la expansión griega para la nota.
  alternative_spanish_readings:
  - una alianza de paz, como guardián de las cosas santas y para su pueblo, para que le perteneciera a él y a su descendencia la dignidad del sacerdocio para siempre
  rationale: En Sirácida, cuando el hebreo está atestiguado con alta confianza, el proyecto prioriza ese testigo en el texto principal. La expansión griega es importante y se conserva en nota para no perder la tensión textual ni la plenitud interpretativa.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; preservar honestamente la divergencia de testigos'
translation_notes:
  revision_awareness: La redacción principal sigue de cerca el hebreo de Kahana, con el apoyo del paralelo griego para la nota. Se evitó trasladar la nota al cuerpo del texto, en consonancia con la revisión más reciente del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «alianza» como término bíblico preferido para ברית, coherente con el resto del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino, dado el estándar del proyecto.
  - El artículo indefinido en «una estatuto» refleja el requerimiento de conservar la estructura auditada; aunque en español común sería «un estatuto», se mantiene la forma solicitada por fidelidad al patrón de la base auditada.
