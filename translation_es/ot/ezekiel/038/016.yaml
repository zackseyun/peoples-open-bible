translation:
  language: es
  text: Y tú vendrás contra mi pueblo Israel como una nube para cubrir la tierra. En los postreros días acontecerá que te traeré contra mi tierra, para que las naciones me conozcan, cuando me mostraré santo por medio de ti[a] delante de sus ojos, Gog.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «cuando yo me santifique en ti delante de sus ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלִיתָ
  english_pob_choice: And you will come up against
  chosen_spanish: Y tú subirás contra
  alternatives_spanish:
  - Y tú vendrás contra
  - Y tú ascenderás contra
  lexicon: HALOT
  rationale: עלה conserva el movimiento de ascenso/subida, y en contexto bélico el sentido natural es desplazarse hostilmente contra alguien. En español, «subir contra» mantiene la imagen hebrea y su fuerza militar sin volverlo demasiado técnico.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: against my people Israel
  chosen_spanish: contra mi pueblo Israel
  alternatives_spanish:
  - sobre mi pueblo Israel
  - contra mi pueblo de Israel
  lexicon: HALOT
  rationale: La preposición עַל con movimiento hostil exige un valor adversativo. «Mi pueblo Israel» conserva el posesivo del pacto; «pueblo Israel» suena más natural que «pueblo de Israel» y mantiene la identificación.
- source_word: כֶּעָנָן לְכַסּוֹת הָאָרֶץ
  english_pob_choice: like a cloud to cover the land
  chosen_spanish: como nube para cubrir la tierra
  alternatives_spanish:
  - como una nube que cubre la tierra
  - como nube que cubre la tierra
  lexicon: HALOT
  rationale: La comparación explícita se conserva. «Tierra» es preferible a «mundo» o «suelo» porque el contexto inmediato es el territorio invadido; el infinitivo final expresa propósito o resultado, bien rendido por «para cubrir».
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: In the latter days
  chosen_spanish: En los postreros días
  alternatives_spanish:
  - En los últimos días
  - En días venideros
  lexicon: HALOT
  rationale: Es una fórmula profética estable. «Postreros días» conserva el tono bíblico y la apertura escatológica sin fijar un esquema cronológico más específico de lo que pide el hebreo.
- source_word: תִּהְיֶה
  english_pob_choice: it will happen
  chosen_spanish: acontecerá
  alternatives_spanish:
  - será
  - sucederá
  lexicon: HALOT
  rationale: El verbo ser/haber aquí funciona de modo eventivo. «Acontecerá» comunica con naturalidad que se trata de un hecho que sucederá, no meramente de un estado.
- source_word: וַהֲבִאוֹתִיךָ
  english_pob_choice: I will bring you
  chosen_spanish: te traeré
  alternatives_spanish:
  - te haré venir
  - te conduciré
  lexicon: HALOT
  rationale: El Hifil de בוא es causativo; «traeré» es breve y natural en español, y preserva la agencia divina sobre el movimiento de Gog.
- source_word: עַל אַרְצִי
  english_pob_choice: against my land
  chosen_spanish: contra mi tierra
  alternatives_spanish:
  - sobre mi tierra
  - a mi tierra
  lexicon: HALOT
  rationale: En este contexto hostil, עַל tiene fuerza adversativa. «Mi tierra» preserva la posesión divina; «contra mi tierra» refleja mejor el tono de invasión que «a mi tierra».
- source_word: לְמַעַן דַּעַת הַגּוֹיִם אֹתִי
  english_pob_choice: so that the nations may know me
  chosen_spanish: para que las naciones me conozcan
  alternatives_spanish:
  - a fin de que las naciones me conozcan
  - para que las naciones lleguen a conocerme
  lexicon: HALOT
  rationale: דעת aquí tiene un sentido relacional y revelatorio. «Conozcan» conserva ese valor mejor que una mera cognición intelectual, y el subjuntivo expresa la finalidad.
- source_word: בְּהִקָּדְשִׁי בְךָ
  english_pob_choice: when I show myself holy through you
  chosen_spanish: cuando yo me santifique en ti
  alternatives_spanish:
  - cuando yo me muestre santo en ti
  - cuando yo me santifique por medio de ti
  lexicon: HALOT
  rationale: El hebreo usa una forma que literalmente habla de la acción divina de santificarse. La elección principal mantiene esa tensión con un giro natural en español; «en ti» sigue de cerca la construcción textual, aunque «por medio de ti» explicita el medio.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - ante sus ojos
  lexicon: HALOT
  rationale: Es un hebraísmo transparente que significa visiblemente, en público. «Delante de sus ojos» preserva la imagen y su fuerza testimonial.
- source_word: גּוֹג
  english_pob_choice: O Gog
  chosen_spanish: Gog
  alternatives_spanish:
  - Oh Gog
  - ¡Gog!
  lexicon: HALOT
  rationale: El nombre funciona como vocativo final. En español, el vocativo puede quedar implícito por la posición y el contexto; evitar «Oh» mantiene dignidad y naturalidad.
theological_decisions:
- issue: Fórmula escatológica בְּאַחֲרִית הַיָּמִים
  english_pob_reading: In the latter days
  chosen_spanish_reading: En los postreros días
  alternative_spanish_readings:
  - En los últimos días
  - En días venideros
  rationale: La expresión conserva peso profético y cierta ambigüedad cronológica. «Postreros días» mantiene esa tensión sin imponer una lectura escatológica más cerrada que la del hebreo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
- issue: Lenguaje de auto-santificación divina בְּהִקָּדְשִׁי בְךָ
  english_pob_reading: when I show myself holy through you
  chosen_spanish_reading: cuando yo me santifique en ti
  alternative_spanish_readings:
  - cuando yo me muestre santo en ti
  - cuando yo me santifique por medio de ti
  rationale: El hebreo afirma que Yahvé manifestará su santidad públicamente en relación con Gog. La redacción principal preserva la literalidad del acto verbal sin sugerir que Dios se vuelve moralmente más santo; el contexto de juicio hace claro el sentido.
  doctrine_reference: 'Translation philosophy §6 y §3: español claro, sin eliminar la tensión lexical-teológica.'
translation_notes:
  revision_awareness: El texto base inglés y el control cruzado muestran alta concordancia y ninguna revisión aplicada; la redacción española sigue el mismo sentido auditado, manteniendo la tensión de בְּהִקָּדְשִׁי sin suavizarla ni resolverla de más.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando el nombre divino aparece explícitamente; aquí el versículo usa primera persona divina, por lo que no se introduce el nombre.
  - «Tierra» se mantuvo frente a «mundo» porque el contexto es la invasión de un territorio concreto.
  - «Conozcan» y «me santifique» mantienen la relación entre revelación pública y reconocimiento de Yahvé.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden a este pasaje ni al texto fuente.
