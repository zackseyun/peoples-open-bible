translation:
  language: es
  text: Vengan a Betel, y transgredan; a Gilgal, y multipliquen la transgresión. Traigan sus sacrificios cada mañana, sus diezmos cada tres días[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al tercer día» o «después de tres días», para la expresión traducida aquí como «cada tres días».'
    reason: alternative_reading
lexical_decisions:
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vayan
  - Entren
  lexicon: HALOT
  rationale: El imperativo plural de בוא se rinde naturalmente con «vengan» en español. Conserva la convocatoria profética directa y el tono irónico del contexto, sin volverla paráfrasis.
- source_word: בֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Beth-el
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera como «Betel» en español bíblico moderno y readable, siguiendo el criterio de no traducirlo como «casa de Dios».
- source_word: וּפִשְׁעוּ
  english_pob_choice: and transgress
  chosen_spanish: y transgredan
  alternatives_spanish:
  - y pequen
  - y rebélense
  lexicon: HALOT
  rationale: פשע tiene fuerza de transgresión/rebelión, a menudo en marco pactual. «Transgredan» conserva mejor esa carga que el más general «pequen»; la forma imperativa mantiene la ironía profética.
- source_word: הַגִּלְגָּל
  english_pob_choice: to Gilgal
  chosen_spanish: a Gilgal
  alternatives_spanish:
  - en Gilgal
  lexicon: HALOT
  rationale: El hebreo nombra el destino de movimiento en paralelo con Betel. En español, la preposición «a» expresa con naturalidad la dirección implícita.
- source_word: הַרְבּוּ לִפְשֹׁעַ
  english_pob_choice: and multiply transgression
  chosen_spanish: y multipliquen la transgresión
  alternatives_spanish:
  - y aumenten su transgresión
  - y pequen más
  lexicon: HALOT
  rationale: La construcción intensiva se refleja con «multipliquen la transgresión», que preserva la concisión y el sarcasmo del original sin explicitarlo en exceso.
- source_word: וְהָבִיאוּ
  english_pob_choice: Bring
  chosen_spanish: Traigan
  alternatives_spanish:
  - Y traigan
  - Presenten
  lexicon: HALOT
  rationale: El imperativo plural continúa la serie exhortativa irónica. «Traigan» es el equivalente más natural y directo en español.
- source_word: לַבֹּקֶר
  english_pob_choice: every morning
  chosen_spanish: cada mañana
  alternatives_spanish:
  - por la mañana
  - todas las mañanas
  lexicon: HALOT
  rationale: El valor distributivo se expresa bien con «cada mañana», que mantiene la idea de repetición frecuente y evita la ambigüedad de «por la mañana».
- source_word: זִבְחֵיכֶם
  english_pob_choice: your sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas sacrificiales
  lexicon: HALOT
  rationale: «Sacrificios» es el término culto estándar y claro en español para זבח en este contexto; el posesivo de cortesía no corresponde aquí, por lo que se usa el posesivo de segunda persona plural contextual «sus».
- source_word: לִשְׁלֹשֶׁת יָמִים
  english_pob_choice: every three days
  chosen_spanish: cada tres días
  alternatives_spanish:
  - al tercer día
  - después de tres días
  lexicon: HALOT
  rationale: La frase hebrea es ambigua. En el sarcasmo del pasaje, «cada tres días» comunica bien una periodicidad frecuente, manteniendo abierta la tensión interpretativa documentada por el texto y el aparato inglés.
- source_word: מַעְשְׂרֹתֵיכֶם
  english_pob_choice: your tithes
  chosen_spanish: sus diezmos
  alternatives_spanish:
  - sus décimas partes
  lexicon: HALOT
  rationale: «Diezmos» es la forma establecida y clara para מַעְשְׂרוֹת en lenguaje bíblico español; preserva el sentido cultual sin añadir explicación ajena al verso.
theological_decisions:
- issue: Ironía profética en los imperativos
  english_pob_reading: 'Render the commands straightforwardly while allowing the irony to emerge from context: ''Come ... and transgress ... multiply transgression.'''
  chosen_spanish_reading: 'Conservar los imperativos como mandato directo, dejando que la ironía surja del contexto: «Vengan ... y transgredan ... y multipliquen la transgresión».'
  alternative_spanish_readings:
  - Aclarar la ironía con una paráfrasis como «Vayan y sigan pecando»
  - Suavizar la forma imperativa para que parezca una denuncia no irónica
  rationale: El hebreo usa imperativos reales dentro de una reprensión sarcástica. La traducción no debe convertir la ironía en explicación explícita ni debilitar el filo retórico del profeta.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor temporal de לִשְׁלֹשֶׁת יָמִים
  english_pob_reading: Translate as 'every three days' in the main text.
  chosen_spanish_reading: Traducir con «cada tres días» en el texto principal.
  alternative_spanish_readings:
  - al tercer día
  - después de tres días
  rationale: La expresión es realmente discutida. «Cada tres días» es la opción principal más coherente con la sátira de exceso ritual, mientras que las alternativas se mantienen abiertas para no borrar la ambigüedad del hebreo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; se mantiene una lectura de alta concordancia con observaciones menores. La versión española conserva el tono irónico, el paralelismo y la ambigüedad temporal documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Betel/Betel» como nombre propio transliterado, no como «casa de Dios».
  - Se conserva «transgredan/transgresión» para reflejar פשע con su fuerza pactual y no se reduce a «pequen».
  - Se usa «diezmos» y no «ofrendas del diezmo» para respetar el valor cultual estándar del término.
  - La puntuación con comas y punto y coma se ajusta al español, pero sin diluir el paralelismo poético del hebreo.
