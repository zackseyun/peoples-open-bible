id: 2SA.11.16
reference: 2 Samuel 11:16
source:
  edition: WLC
  text: וַ/יְהִ֕י בִּ/שְׁמ֥וֹר יוֹאָ֖ב אֶל הָ/עִ֑יר וַ/יִּתֵּן֙ אֶת א֣וּרִיָּ֔ה אֶל הַ/מָּקוֹם֙ אֲשֶׁ֣ר יָדַ֔ע כִּ֥י אַנְשֵׁי חַ֖יִל שָֽׁם־־־־׃
translation:
  text: So when Joab was watching the city[a], he stationed Uriah in the place where he knew the mighty men were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mighty men' or 'strong warriors.' The Hebrew phrase אַנְשֵׁי חַיִל refers here to capable or formidable fighting men.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁמֹר
  chosen: was watching
  alternatives:
  - was keeping watch on
  - was observing
  - was besieging
  lexicon: HALOT
  rationale: The infinitive construct of שׁמר with ב marks a temporal clause, 'when ... was watching/keeping watch.' In this military context with אֶל־הָעִיר, the sense is surveillance or monitoring the city during the siege, not merely generic guarding. 'Watching' is natural modern English and preserves the temporal force.
- source_word: אֶל הָעִיר
  chosen: the city
  alternatives:
  - against the city
  - toward the city
  lexicon: HALOT
  rationale: With שׁמר in this context, אֶל likely indicates the object or focus of the watch. English idiom does not require the preposition, so 'watching the city' is the clearest rendering. 'Against the city' would overstate hostility from the preposition alone.
- source_word: וַיִּתֵּן אֶת־אוּרִיָּה
  chosen: he stationed Uriah
  alternatives:
  - he put Uriah
  - he placed Uriah
  - he assigned Uriah
  lexicon: HALOT
  rationale: נתן literally means 'gave/put,' but in military deployment context 'stationed' best conveys deliberate placement of a soldier at a tactical position without sounding wooden. This is an optimal-equivalence rendering of the idiom.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the spot
  - the position
  lexicon: HALOT
  rationale: מקום is straightforwardly 'place.' In context it refers to a tactical location. 'Place' preserves the lexical form, while the military nuance is carried by 'stationed.'
- source_word: יָדַע
  chosen: he knew
  alternatives:
  - he had learned
  - he recognized
  lexicon: HALOT
  rationale: ידע is the common verb 'to know.' No contextual pressure requires a more interpretive gloss. The simple past fits the narrative sequence.
- source_word: אַנְשֵׁי חַיִל
  chosen: the valiant men
  alternatives:
  - mighty men
  - strong warriors
  - fighting men
  lexicon: HALOT
  rationale: The phrase can denote capable, strong, or valiant warriors. Here it refers to formidable enemy fighters at that location. 'Valiant men' preserves both the masculine form and the martial sense without importing a technical title. 'Mighty men' could suggest David's elite corps, which is not intended here.
- source_word: שָׁם
  chosen: were
  alternatives:
  - were there
  lexicon: HALOT
  rationale: The adverb means 'there.' In English, 'where ... were' naturally incorporates the locative sense, so an explicit 'there' is unnecessary and stylistically clumsy.
- source_word: וַיְהִי
  chosen: So when
  alternatives:
  - And it happened when
  - Now when
  - And when
  lexicon: HALOT
  rationale: וַיְהִי introduces the next event in Hebrew narrative. 'So when' gives smooth modern narrative flow while retaining the temporal transition. 'And it happened' would be overly literal and awkward in contemporary English.
