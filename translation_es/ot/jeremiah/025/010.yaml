base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/025/010.yaml
  text: And I will destroy from among them the sound of joy and the sound of gladness[a], the voice of the bridegroom and the voice of the bride[b], the sound of the millstones and the light of the lamp.
  footnotes:
