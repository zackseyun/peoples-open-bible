theological_decisions:
- issue: Whether ματαίοις should be interpreted specifically as idols or more generally as worthless/empty things
  chosen_reading: 'more general: ''the empty things'''
  alternative_readings:
  - the idols
  - vain things
  rationale: Although in Jewish polemical contexts μάταια can refer to idols, the immediate Greek does not explicitly name idols. A more general rendering preserves the lexical force and avoids importing a narrower theological claim than the text states.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
