translation:
  language: es
  text: Hay un mal que he visto debajo del sol,[a] y pesa sobre el hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la humanidad» / «sobre el género humano». El hebreo אָדָם («hombre») es genérico aquí y se refiere a la humanidad en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  lexicon: HALOT
  rationale: La partícula existencial pide una formulación natural en español. «Hay» conserva la simple observación de existencia sin añadir énfasis.
- source_word: רָעָה
  english_pob_choice: an evil
  chosen_spanish: un mal
  alternatives_spanish:
  - una desgracia
  - una cosa mala
  lexicon: HALOT
  rationale: En Eclesiastés, רָעָה puede abarcar mal, calamidad o cosa dolorosa. «Mal» preserva la carga fuerte del hebreo sin fijar demasiado el matiz.
- source_word: אֲשֶׁר רָאִיתִי
  english_pob_choice: that I have seen
  chosen_spanish: que he visto
  alternatives_spanish:
  - que vi
  - el cual he visto
  lexicon: HALOT
  rationale: El relativo seguido del perfecto encaja bien con el pretérito perfecto español, que expresa una observación ya realizada pero todavía relevante para el hablante.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  lexicon: HALOT
  rationale: Se conserva el modismo de Eclesiastés de manera transparente. «Debajo del sol» suena natural en español y mantiene la imagen recurrente del libro.
- source_word: וְרַבָּה הִיא
  english_pob_choice: and it is heavy
  chosen_spanish: y es pesado
  alternatives_spanish:
  - y es grave
  - y es grande
  lexicon: HALOT
  rationale: La POB inglesa optó por una correspondencia cercana al valor de רבה en esta construcción. En español, «pesado» conserva la idea de carga o gravedad sin perder la correspondencia léxica con el hebreo.
- source_word: עַל הָאָדָם
  english_pob_choice: upon man
  chosen_spanish: sobre el hombre
  alternatives_spanish:
  - sobre la humanidad
  - sobre el género humano
  lexicon: HALOT
  rationale: אָדָם aparece en singular genérico. «El hombre» mantiene esa forma representativa y la relación preposicional de carga expresada por עַל. La nota preserva la alternativa inclusiva cuando se entiende el referente colectivo.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el género humano
  rationale: El hebreo usa singular genérico para referirse a la humanidad en conjunto. «El hombre» reproduce mejor esa forma que una pluralización o una abstracción más interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; tabla de términos debatidos para אָדָם
translation_notes:
  revision_awareness: Se siguió la revisión final del POB inglés, que ajustó la última cola de «weighs heavily» a «is heavy upon» para una correspondencia más cercana con el hebreo. Por eso el español mantiene «es pesado sobre» en vez de una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «debajo del sol» como eco idiomático estable de Eclesiastés.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Mal» traduce de forma amplia la ambivalencia semántica de רָעָה en Qohelet sin moralizar en exceso.
  - La nota al pie conserva la tensión entre singular genérico y lectura inclusiva, como en el audit trail inglés.
