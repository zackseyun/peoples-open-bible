translation:
  language: es
  text: 'Entonces Saúl dijo a su joven[a]: «Pero mira, si vamos, ¿qué llevaremos al hombre? Porque ya no queda pan en nuestras alforjas[b], y no hay regalo[c] que llevar al hombre de Dios. ¿Qué tenemos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "sirviente" o "muchacho". El hebreo נַעַר puede referirse a un joven, un ayudante o un servidor, según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "el pan se ha acabado de nuestros recipientes/contenedores". El hebreo usa "pan" de manera concreta y un término para los recipientes donde llevaban sus provisiones.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "presente". El término hebreo designa algo que se lleva para obsequiar a una persona respetada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - sirviente
  - mozo
  lexicon: HALOT
  rationale: El contexto narrativo muestra a un acompañante de Saúl; 'joven' conserva la referencia a edad/condición sin imponer 'siervo' ni 'esclavo'. En español suena natural y sigue de cerca la opción auditada 'young man'.
- source_word: וְהִנֵּה
  english_pob_choice: But look
  chosen_spanish: Pero mira
  alternatives_spanish:
  - mira
  - he aquí
  - y mira
  lexicon: HALOT
  rationale: La partícula introduce una objeción práctica con matiz deíctico. 'Pero mira' reproduce bien el valor discursivo sin caer en un registro arcaico como 'he aquí'.
- source_word: נֵלֵךְ
  english_pob_choice: if we go
  chosen_spanish: si vamos
  alternatives_spanish:
  - si fuéramos
  - si nos vamos
  - si iremos
  lexicon: HALOT
  rationale: En español, la condicional con 'si vamos' comunica de forma natural la cláusula hipotética del hebreo sin forzar un futuro innecesario.
- source_word: נָּבִיא
  english_pob_choice: bring
  chosen_spanish: llevaremos
  alternatives_spanish:
  - traeremos
  - presentaremos
  - llevaremos con nosotros
  lexicon: HALOT
  rationale: Aquí el sentido es llevar algo consigo para ofrecerlo al hombre. 'Llevaremos' mantiene el movimiento implícito y evita una traducción mecánica de 'bring' que en español puede sonar menos natural según el contexto.
- source_word: לָאִישׁ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al varón
  - a ese hombre
  lexicon: HALOT
  rationale: La expresión conserva el sustantivo simple del hebreo y queda luego precisada por la apposición 'hombre de Dios', tal como en el inglés auditado.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - las provisiones
  lexicon: HALOT
  rationale: Se mantiene el término concreto 'pan', aunque funcione metonímicamente por provisiones. Es la opción más fiel y clara en español, en paralelo con la decisión inglesa.
- source_word: אָזַל
  english_pob_choice: is gone
  chosen_spanish: se nos acabó
  alternatives_spanish:
  - se nos fue
  - se agotó
  - ya no queda
  lexicon: HALOT
  rationale: El verbo expresa que el suministro quedó agotado. 'Se nos acabó' transmite bien la idea de provisión consumida y suena idiomático en español.
- source_word: כְּלִי
  english_pob_choice: bags
  chosen_spanish: alforjas
  alternatives_spanish:
  - bolsas
  - vasijas
  - contenedores
  lexicon: HALOT
  rationale: El hebreo puede referirse a recipientes/contendedores para provisiones; 'alforjas' comunica una bolsa de viaje concreta y natural para este contexto, más precisa que 'vasijas' y menos genérica que 'bolsas'.
- source_word: תְּשׁוּרָה
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - presente
  - obsequio
  - ofrenda
  lexicon: HALOT
  rationale: Se conserva el sentido de un presente llevado a una persona respetada. 'Regalo' es claro y evita cargar el término con matiz cultual que el contexto no exige.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  - el varón de Dios
  lexicon: HALOT
  rationale: Se conserva el título hebreo de forma literal, tal como lo hace la POB en inglés, porque es una denominación reconocible y no debe reducirse sin base a 'profeta'.
- source_word: מָה אִתָּנוּ
  english_pob_choice: What do we have?
  chosen_spanish: ¿Qué tenemos?
  alternatives_spanish:
  - ¿Qué hay con nosotros?
  - ¿Qué llevamos?
  - ¿Qué tenemos a mano?
  lexicon: HALOT
  rationale: La pregunta idiomática busca recursos disponibles. '¿Qué tenemos?' reproduce de manera natural el sentido práctico de posesión o disponibilidad.
theological_decisions:
- issue: Título אִישׁ הָאֱלֹהִים
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el profeta
  - el varón de Dios
  rationale: No se colapsa el título a 'profeta' en el texto principal, porque el hebreo usa una expresión titulary específica. La forma literal mantiene la tensión entre función profética y designación honorífica.
  doctrine_reference: Terminología bíblica de oficio/llamamiento; preservación del título hebreo
- issue: Metonimia de לֶחֶם
  english_pob_reading: the bread is gone from our bags
  chosen_spanish_reading: el pan se nos acabó de las alforjas
  alternative_spanish_readings:
  - se nos acabaron las provisiones
  - ya no queda pan en nuestras alforjas
  rationale: Se conserva la concreción de 'pan' en vez de generalizar a 'provisiones', porque el hebreo dice literalmente 'pan' y la imagen de suministro agotado forma parte del razonamiento del verso.
  doctrine_reference: Principio de concreción léxica y respeto del detalle textual
- issue: Identificación del acompañante
  english_pob_reading: young man
  chosen_spanish_reading: joven
  alternative_spanish_readings:
  - muchacho
  - sirviente
  rationale: No se introduce 'esclavo' ni 'siervo' porque el contexto no exige un estatus servil marcado; la relación es la de un acompañante joven. 'Joven' evita sobreinterpretar el rol social.
  doctrine_reference: Claridad narrativa; evitar expansión semántica no sustentada
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó el inglés de 'can we bring' a 'will we bring' para seguir más de cerca el hebreo. La redacción española usa '¿qué llevaremos...?' para reflejar esa orientación prospectiva sin introducir una modalización distinta. También se respetó la decisión establecida de conservar 'bread' de manera concreta y 'man of God' como título literal.
  spanish_consistency_notes:
  - Se mantiene 'hombre de Dios' para אִישׁ הָאֱלֹהִים, coherente con la terminología POB.
  - Se evita 'SEÑOR' o 'Yahvé' porque este versículo no contiene el nombre divino ni cita directa de יהוה.
  - '''Pan'' conserva la concreción del hebreo, aunque en español pueda funcionar metonímicamente por provisiones.'
  - '''Joven'' y no ''siervo'' evita cargar la relación con un matiz social no explicitado por el texto.'
