theological_decisions:
- issue: Whether זְנוּת should be rendered in a way that foregrounds literal sexual sin, metaphorical idolatry, or both
  chosen_reading: Rendered as 'prostitution' in the main text, allowing Hosea's recurring marriage/unfaithfulness metaphor to remain vivid without narrowing it to either literal immorality or idolatry alone.
  alternative_readings:
  - whoredom
  - sexual immorality
  - harlotry
  rationale: Hosea regularly uses sexual-infidelity language for covenant unfaithfulness. 'Prostitution' is readable modern English and preserves the prophetic metaphorical force while still allowing literal overtones.
  doctrine_reference: Translation philosophy §3, §6
- issue: Whether נִטְמָא should be translated as a simple state ('is defiled') or as culpable self-pollution ('has defiled itself')
  chosen_reading: Translated as 'has defiled itself.'
  alternative_readings:
  - is defiled
  - has become unclean
  rationale: In context the pollution is not merely a passive condition but the result of Israel's own covenant infidelity. The English reflects that moral agency without adding content foreign to the Hebrew.
  doctrine_reference: Translation philosophy §1, §6
