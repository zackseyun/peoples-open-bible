  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּֽה אָמַ֥ר יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל אָר֣וּר הָ/אִ֔ישׁ אֲשֶׁר֙ לֹ֣א יִשְׁמַ֔ע אֶת דִּבְרֵ֖י הַ/בְּרִ֥ית הַ/זֹּֽאת־־׃
