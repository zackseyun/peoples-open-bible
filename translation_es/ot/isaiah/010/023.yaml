    rationale: El hebreo dice אֲדֹנָי יְהוִה; 'Yahvé, el Señor' conserva ambos elementos pero invierte el orden y añade una apposición no exigida por el texto. 'El Señor Yahvé' es más directo y fiel en español.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: 'La forma ''O ''toda la tierra/país'''' suena comprimida y poco idiomática. Conviene explicitar las dos posibilidades: ''toda la tierra'' o ''todo el país''.'
  revised_spanish_text: Porque el Señor Yahvé de los ejércitos está realizando una destrucción completa[a], una que ha sido decretada, en medio de toda la tierra.
