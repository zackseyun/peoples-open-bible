translation:
  language: es
  text: 'Y dijo[a]: «Oí tu voz en el jardín, y tuve miedo porque estaba desnudo; por eso me escondí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu sonido». Hebreo qol puede significar tanto «sonido» como «voz»; aquí se ha optado por «voz» por contexto y por la revisión auditada del texto inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide una introducción fluida en español. «Y dijo» conserva el avance secuencial sin añadir matices no explícitos.
- source_word: אֶת קֹלְךָ
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - tu sonido
  - el sonido de tu voz
  lexicon: HALOT
  rationale: Aunque קוֹל puede abarcar «sonido» o «voz», en este contexto la revisión inglesa más reciente favorece «voice» por ser más natural y contextual. «Tu voz» mantiene esa decisión sin forzar una lectura más amplia que el texto ya ha estrechado por contexto.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - he oído
  lexicon: HALOT
  rationale: «Oí» es una equivalencia directa y natural para el perfecto qal 1cs en un relato pasado. Es breve y transparente.
- source_word: בַּגָּן
  english_pob_choice: in the garden
  chosen_spanish: en el jardín
  alternatives_spanish:
  - en el huerto
  lexicon: HALOT
  rationale: «Jardín» comunica con claridad el referente del relato y es ampliamente inteligible. «Huerto» sería posible, pero en español moderno suena más específico y menos neutral.
- source_word: וָאִירָא
  english_pob_choice: and I was afraid
  chosen_spanish: tuve miedo
  alternatives_spanish:
  - temí
  - me dio miedo
  lexicon: HALOT
  rationale: El hebreo expresa miedo experimentado; «tuve miedo» es idiomático en español y conserva el sentido afectivo sin rigidizarlo en una forma más literaria.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de su miedo. «Porque» es la conexión causal más clara en español.
- source_word: עֵירֹם אָנֹכִי
  english_pob_choice: I was naked
  chosen_spanish: estaba desnudo
  alternatives_spanish:
  - soy desnudo
  - estoy desnudo
  lexicon: HALOT
  rationale: Aunque la cláusula hebrea es nominal y sin marca temporal explícita, el contexto narrativo pasado en español pide imperfecto. «Estaba desnudo» reproduce la explicación de estado y su valor situacional.
- source_word: וָאֵחָבֵא
  english_pob_choice: so I hid myself
  chosen_spanish: por eso me escondí
  alternatives_spanish:
  - y me escondí
  - así que me oculté
  lexicon: HALOT
  rationale: El verbo es reflexivo en sentido. «Me escondí» comunica bien la acción, y «por eso» hace explícita la relación de resultado que el hebreo desarrolla en la secuencia.
theological_decisions:
- issue: Valor de קוֹל en relación con la presencia divina
  english_pob_reading: your voice
  chosen_spanish_reading: tu voz
  alternative_spanish_readings:
  - tu sonido
  rationale: El contexto de la escena en el jardín y la revisión inglesa más reciente favorecen «voz» como la opción más natural y contextualmente adecuada. Se mantiene la transparencia al reconocer la alternativa léxica, pero el texto principal no la amplía innecesariamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió la última revisión auditada del POB inglés, que cambió «sound» por «voice» para קֹלְךָ. Por eso el español principal usa «voz» y no requiere mantener la alternativa principal en nota salvo como transparencia léxica.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo simple y sobrio.
  - Se evitó el calco «fui temeroso»; se prefirió la locución idiomática «tuve miedo».
  - Se conservó el resultado causal con «por eso» para reflejar la secuencia del hebreo sin sobreexplicarla.
  - No se usó «SEÑOR» ni términos eclesiásticos añadidos; el verso no contiene el Tetragrámaton ni cristología explícita.
