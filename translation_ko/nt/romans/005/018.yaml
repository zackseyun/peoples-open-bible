  lexicon: BDAG
  rationale: 속격을 「생명을 가져오는」으로 풀어 자연스럽게 표현.
theological_decisions:
- issue: 두 번째 「모든 사람」의 범위
  chosen_reading: 본문 그대로 「모든 사람」 유지
  alternative_readings:
