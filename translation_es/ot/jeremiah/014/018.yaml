translation:
  language: es
  text: Si salgo al campo, he aquí los caídos por la espada; y si entro en la ciudad, he aquí los enfermos de hambre. Porque tanto profeta como sacerdote andan por la tierra[a] y no saben[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «andan comerciando por la tierra», ya que el verbo hebreo puede tener sentido comercial además de expresar movimiento.'
    reason: lexical_alternative
  - marker: b
    text: El final del versículo es difícil en hebreo. También puede entenderse como «han ido a una tierra que no conocen» o simplemente «no entienden».
    reason: alternative_reading
lexical_decisions:
- source_word: אִם יָצָאתִי
  english_pob_choice: If I go out
  chosen_spanish: Si yo salgo
  alternatives_spanish:
  - Cuando yo salga
  - Si saliera
  lexicon: HALOT
  rationale: El condicional hebreo con perfecto expresa una situación vivida o imaginada; en español, «Si yo salgo» conserva la fuerza inmediata y naturalidad, sin convertirlo en pasado ni en una paraphrase más interpretativa.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo abierto
  - la campiña
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «campo», en contraste con «la ciudad» en español «el campo» comunica mejor el espacio exterior/opuesto a lo urbano sin perder el contraste léxico.
- source_word: וְהִנֵּה
  english_pob_choice: look—
  chosen_spanish: 'mira:'
  alternatives_spanish:
  - 'he aquí:'
  - mira—
  lexicon: HALOT
  rationale: La partícula deíctica pide una llamada de atención. «Mira:» reproduce la inmediatez del hebreo con un registro moderno y respetuoso.
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: those slain by the sword
  chosen_spanish: los caídos por la espada
  alternatives_spanish:
  - los muertos a espada
  - los heridos de espada
  lexicon: HALOT
  rationale: El hebreo designa personas abatidas violentamente por arma de guerra. «Los caídos por la espada» mantiene la imagen sin forzar un tecnicismo; «muertos a espada» sería una alternativa más literal.
- source_word: בָּאתִי הָעִיר
  english_pob_choice: if I enter the city
  chosen_spanish: si entro en la ciudad
  alternatives_spanish:
  - si voy a la ciudad
  - si ingreso en la ciudad
  lexicon: HALOT
  rationale: בוא con destino suele significar entrar/llegar. «Entro en la ciudad» conserva la progresión paralela con el primer miembro y suena natural en español.
- source_word: תַּחֲלוּאֵי רָעָב
  english_pob_choice: those sick with famine
  chosen_spanish: los enfermos de hambre
  alternatives_spanish:
  - las dolencias del hambre
  - los consumidos por el hambre
  lexicon: HALOT
  rationale: El sustantivo apunta a enfermedad/afección; aquí la construcción paralela con «los caídos por la espada» favorece una referencia concreta a personas debilitadas por la hambruna. «Los enfermos de hambre» es claro y cercano al hebreo.
- source_word: כִּי גַם נָבִיא גַם כֹּהֵן
  english_pob_choice: For both prophet and priest
  chosen_spanish: Porque tanto profeta como sacerdote
  alternatives_spanish:
  - Pues tanto profeta como sacerdote
  - Porque profeta y sacerdote
  lexicon: HALOT
  rationale: כִּי introduce la explicación; la correlación גַם... גַם se refleja mejor con «tanto... como...», preservando el énfasis sobre ambos grupos.
- source_word: סָחֲרוּ
  english_pob_choice: go about
  chosen_spanish: andan
  alternatives_spanish:
  - van y vienen
  - merodean
  - comercian
  lexicon: HALOT
  rationale: El verbo admite un matiz de moverse por ahí, incluso comerciar, pero el contexto es difícil. «Andan» mantiene la idea de desplazamiento sin resolver la ambigüedad hacia comercio o exilio.
- source_word: אֶל אֶרֶץ
  english_pob_choice: in the land
  chosen_spanish: por la tierra
  alternatives_spanish:
  - en la tierra
  - por el país
  lexicon: HALOT
  rationale: Dado el valor de movimiento del verbo y el audit trail inglés, «por la tierra» comunica circulación en el territorio. «En la tierra» también sería posible, pero «por» expresa mejor el tránsito.
- source_word: וְלֹא יָדָעוּ
  english_pob_choice: and do not know
  chosen_spanish: y no saben
  alternatives_spanish:
  - y no entienden
  - y no conocen
  lexicon: HALOT
  rationale: El hebreo es literal y deja el objeto implícito. Se conserva esa apertura con «no saben», sin añadir un complemento como «qué hacer».
theological_decisions:
- issue: 'Ambigüedad del final: ignorancia, ignorar el camino, o movimiento a tierra desconocida'
  english_pob_reading: The final clause is difficult Hebrew. It may also mean 'they have gone into a land they do not know' or simply 'they do not understand.'
  chosen_spanish_reading: La traducción mantiene «y no saben», dejando abierta la dificultad del hebreo sin cerrar el sentido hacia exilio, comercio o incapacidad práctica específica.
  alternative_spanish_readings:
  - y no entienden
  - y han ido a una tierra que no conocen
  rationale: El texto hebreo y el audit trail inglés reconocen una verdadera dificultad interpretativa. La versión española no debe resolverla artificialmente; debe conservar la tensión, permitiendo las lecturas alternativas documentadas.
  doctrine_reference: Preservar la tensión textual en lugar de armonizarla prematuramente.
- issue: Estado de profetas y sacerdotes bajo juicio
  english_pob_reading: The verse depicts even the religious leaders as disoriented and helpless under judgment, not as offering a positive theological solution.
  chosen_spanish_reading: El verso muestra incluso a profeta y sacerdote desorientados e impotentes bajo el juicio, sin presentarlos como respuesta o solución.
  alternative_spanish_readings:
  - profeta y sacerdote andan comerciando en la tierra
  - profeta y sacerdote han sido llevados a una tierra extranjera
  rationale: La traducción no debe cargar el texto con una interpretación de culpa, comercio o exilio que el hebreo no afirma con claridad. Se conserva el cuadro de crisis y desorientación.
  doctrine_reference: Preservar la tensión teológica y evitar sobreinterpretación.
translation_notes:
  revision_awareness: 'Sigo el último pasaje revisado del audit trail inglés, que prefirió una formulación más cercana y neutral: «go about in the land and do not know». Por eso evito agregar «qué hacer» u otra explicación implícita, y conservo la ambigüedad final en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton cuando aparezca; aquí no aparece.
  - Se mantiene el contraste semántico campo/ciudad con vocabulario natural en español.
  - «Profeta» y «sacerdote» se dejan sin mayúsculas por no ser nombres propios.
  - La puntuación con dos puntos tras «mira» reproduce la función deíctica del hebreo y del inglés auditado.
