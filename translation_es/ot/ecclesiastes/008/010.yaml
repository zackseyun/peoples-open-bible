revisions:
- from: Y así vi a los impíos sepultados[a]; habían entrado y salido del lugar santo, y fueron olvidados en la ciudad donde así habían hecho[b]. También esto es vanidad[c].
  to: Y así vi a los impíos sepultados; habían entrado y salido del lugar santo[b], y fueron olvidados[a] en la ciudad donde así habían hecho. También esto es vanidad[c].
  rationale: 'Se conserva la traducción base porque representa bien el hebreo y el audit trail, pero se corrigen los anclajes de notas para que cada una corresponda exactamente al segmento afectado: la variante textual a «fueron olvidados», la nota cultural a «lugar santo», y la nota léxica a «vanidad». También se adopta punto y coma para reflejar mejor la revisión inglesa auditada.'
  reviewer_model: gpt-5.4
