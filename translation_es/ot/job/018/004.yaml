translation:
  language: es
  text: Tú, que te desgarras en tu ira[a], ¿habrá de ser abandonada la tierra por tu causa, o que una roca sea removida de su lugar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «El que desgarra su alma en su ira». El hebreo comienza con una expresión participial de tercera persona antes de pasar a la segunda persona directa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טֹרֵף
  english_pob_choice: tear yourself apart
  chosen_spanish: te desgarras
  alternatives_spanish:
  - te destrozas
  - te arrancas a ti mismo
  lexicon: HALOT
  rationale: El participio expresa una acción violenta y autodestructiva. En español, «te desgarras» comunica mejor la fuerza figurada del hebreo que un calco como «rasgas tu alma», y conserva el tono de reprensión.
- source_word: נַפְשׁוֹ
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - tu alma
  - tu vida
  - a ti mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí funciona de modo reflexivo e idiomático. «Te» permite mantener la referencia a la persona sin imponer «alma» como si el hebreo exigiera una psicologización que el giro no requiere.
- source_word: בְּאַפּוֹ
  english_pob_choice: in your anger
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu enojo
  - con tu furor
  - en tu cólera
  lexicon: HALOT
  rationale: אַף literalmente es «nariz», pero en uso común significa ira o furor. «Ira» es la opción más sobria y natural en español bíblico contemporáneo.
- source_word: הֲלְמַעַנְךָ
  english_pob_choice: for your sake
  chosen_spanish: por tu causa
  alternatives_spanish:
  - por tu bien
  - a tu favor
  - por ti
  lexicon: HALOT
  rationale: La partícula interrogativa con לְמַעַן cuestiona si el orden del mundo debería alterarse en atención a Job. «Por tu causa» conserva ese matiz de motivo o consideración, con un registro formal y claro.
- source_word: תֵּעָזַב אָרֶץ
  english_pob_choice: shall the earth be abandoned
  chosen_spanish: habrá de ser abandonada la tierra
  alternatives_spanish:
  - será abandonada la tierra
  - se dejará la tierra
  - la tierra quedará abandonada
  lexicon: HALOT
  rationale: אָרֶץ aquí tiene alcance cósmico/proverbial, por lo que «tierra» es adecuado. La pasiva «habrá de ser abandonada» mantiene el tono interrogativo-retórico y la forma verbal pasiva del hebreo sin sonar excesivamente rígida.
- source_word: וְיֶעְתַּק
  english_pob_choice: be moved
  chosen_spanish: ser removida
  alternatives_spanish:
  - ser movida
  - ser desplazada
  - ser apartada
  lexicon: HALOT
  rationale: En paralelo con «abandonada», «ser removida» expresa bien el desarraigo o traslado del objeto en cuestión. Evita la posible ambigüedad de «mover» en español moderno.
- source_word: צוּר
  english_pob_choice: a rock
  chosen_spanish: una roca
  alternatives_spanish:
  - un peñasco
  - una peña
  - la roca
  lexicon: HALOT
  rationale: צוּר designa una roca maciza o peñasco. «Roca» es suficientemente fiel y más natural en español general que una forma más técnica o regional.
- source_word: מִמְּקֹמוֹ
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - desde su lugar
  - de donde está
  lexicon: HALOT
  rationale: El sufijo posesivo remite a la roca como objeto inanimado; «de su lugar» mantiene la imagen de estabilidad y el paralelismo del dicho.
theological_decisions:
- issue: Cambio de persona en el verso
  english_pob_reading: Direct second-person address in English, while noting the Hebrew begins with a third-person participial expression before shifting to direct address.
  chosen_spanish_reading: 'Mantener el arranque en segunda persona por cohesión retórica: «Tú, que te desgarras...»'
  alternative_spanish_readings:
  - El que se desgarraba en su ira...
  - Él, que se desgarraba en su ira...
  rationale: El hebreo inicia con una forma participial de tercera persona con sufijo de tercera, pero enseguida pasa a segunda persona con לְמַעַנְךָ. En español, la reprensión se oye con más naturalidad si se unifica como discurso directo; la nota preserva la tensión formal del original.
  doctrine_reference: Job 18:4; traducción de discurso y deixis en poesía hebrea
- issue: Imagen de orden cósmico
  english_pob_reading: The earth would not be abandoned or a rock moved from its place for Job's sake.
  chosen_spanish_reading: La pregunta retórica conserva que no se alterará el orden estable del mundo por la causa de Job.
  alternative_spanish_readings:
  - ¿Acaso la tierra sería abandonada por tu bien?
  - ¿Se removería una roca de su lugar por ti?
  rationale: 'No se introduce una tesis doctrinal nueva; se conserva la fuerza proverbial: el mundo no se reorganiza en atención a la angustia o ira de una persona. La redacción española debe sonar como reprensión sapiencial, no como declaración cosmológica técnica.'
  doctrine_reference: Job 18:4; sabiduría poética y retórica
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés: se conservó la fuerza participial del comienzo mediante una nota, pero la línea principal se adaptó a una reprensión directa y natural en español, sin perder el paralelismo entre la tierra abandonada y la roca removida.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» en el proyecto cuando corresponda, pero aquí el versículo no contiene el nombre divino.
  - Se mantuvo «tierra» para אָרֶץ por el alcance proverbial/cósmico del contexto.
  - «Ira» se prefirió a «cólera» por registro sobrio y amplio.
  - No se introdujo «alma» en el texto principal porque נֶפֶשׁ aquí funciona reflexivamente, no como antropología explícita.
