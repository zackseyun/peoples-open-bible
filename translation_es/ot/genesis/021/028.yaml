translation:
  language: es
  text: Y Abraham colocó siete corderas[a] del rebaño por separado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Abraham apartó siete corderas del rebaño». El verbo hebreo puede sugerir que las colocó en una posición distinta, lo cual es significativo en el contexto del testimonio del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּב
  english_pob_choice: set
  chosen_spanish: colocó
  alternatives_spanish:
  - puso
  - estableció
  - dispuso
  lexicon: HALOT
  rationale: El verbo en forma narrativa con נצב expresa poner algo en posición o hacer que quede situado. En español, «colocó» conserva ese sentido concreto y natural sin añadir la idea interpretativa de separación como elemento principal del verbo.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: nombre propio
  rationale: Se mantiene la forma habitual y reconocible del nombre propio, coherente con la transliteración estándar del texto bíblico.
- source_word: שֶׁבַע
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete en número
  lexicon: HALOT
  rationale: Es un cardinal directo y no presenta dificultad semántica.
- source_word: כִּבְשֹׂת
  english_pob_choice: ewe lambs
  chosen_spanish: corderas
  alternatives_spanish:
  - corderas hembra
  - ovejas jóvenes hembra
  lexicon: HALOT
  rationale: El sustantivo designa crías femeninas; «corderas» comunica de forma natural el rasgo de juventud y sexo en español. Se evita «ovejas» por ser más amplio y menos preciso.
- source_word: הַצֹּאן
  english_pob_choice: of the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de la grey
  - de las ovejas
  - del ganado menor
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, normalmente ovejas y cabras. «Del rebaño» es idiomático en español y conserva el valor colectivo sin estrecharlo indebidamente.
- source_word: לְבַדְּהֶן
  english_pob_choice: by themselves
  chosen_spanish: aparte de ellas
  alternatives_spanish:
  - separadas
  - por sí mismas
  - aisladas
  lexicon: HALOT
  rationale: La frase indica separación respecto de las demás. «Aparte de ellas» expresa claramente la distinción en español y evita la ambigüedad de un giro demasiado libre. La referencia pronominal femenina se conserva por concordancia con «corderas».
theological_decisions:
- issue: Valor de separación de לְבַדְּהֶן
  english_pob_reading: by themselves; or 'set apart seven ewe lambs of the flock'
  chosen_spanish_reading: aparte de ellas
  alternative_spanish_readings:
  - separadas
  - puestas aparte
  rationale: El texto hebreo permite tanto la idea de colocarlas aparte como la de situarlas en un lugar distinto. La redacción principal mantiene la separación sin convertirla en la interpretación explícita del verbo. La nota conserva la alternativa interpretativa documentada en el POB inglés.
  doctrine_reference: Génesis 21:28; contexto inmediato del pacto/testimonio entre Abraham y Abimelec
translation_notes:
  revision_awareness: El expediente inglés indica alta concordancia, sin revisiones aplicadas y sin cambios necesarios en el último pase. La versión española sigue de cerca esa decisión estable, conservando la ambigüedad útil del verbo y la separación explícita de las siete corderas.
  spanish_consistency_notes:
  - Se mantiene «Abraham» como nombre propio transliterado.
  - «Corderas» conserva mejor que «ovejas» la especificidad femenina del hebreo.
  - «Aparte de ellas» refleja la separación sin añadir una interpretación doctrinal no exigida por el verso.
