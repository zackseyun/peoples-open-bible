review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: movimiento desde Guibetón y acción militar contra Tirza. Conserva correctamente «todo Israel con él» como colectivo. Sin embargo, hay un desajuste gramatical importante: el verbo hebreo inicial está en singular («subió»), no en plural. Aunque el sujeto compuesto posterior puede motivar español plural por concordancia natural, la secuencia hebrea pone primero a Omrí como sujeto del verbo y luego añade «y todo Israel con él». En español, para máxima fidelidad y buena lectura, conviene «subió Omrí, y todo Israel con él».'
  spanish_quality_summary: El español es claro y legible, pero «subieron» diluye una particularidad sintáctica del original. La nota al pie actual suena poco natural y además repite una construcción menos idiomática («la sitiaron a Tirza»). «Pusieron sitio a Tirza» o «asediaron Tirza» funciona mejor como alternativa formal/léxica. Por lo demás, los topónimos y la redacción son comprensibles.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Omrí», «Guibetón» y «Tirza» son aceptables como formas españolas. «Sitiaron» transmite bien צור. «Todo Israel» respeta la decisión del POB de mantener el colectivo.
  issues:
  - severity: medium
    issue: Concordancia verbal inicial en plural («subieron») frente al singular hebreo
    rationale: 'וַיַּעֲלֶה es 3ms: «subió». El original presenta primero la acción de Omrí y luego añade «y todo Israel con él». El plural español es entendible, pero pierde un rasgo formal del texto fuente que puede conservarse naturalmente.'
  - severity: low
    issue: Nota al pie poco idiomática en español
    rationale: «la sitiaron a Tirza» no es una alternativa española natural. Si se conserva una nota lexical, debe ofrecer una opción realmente idiomática, como «asediaron Tirza» o «pusieron sitio a Tirza».
  revised_spanish_text: Entonces subió Omrí, y todo Israel con él, desde Guibetón[a], y sitiaron Tirza.
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «asediaron Tirza».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo inicial al singular para reflejar mejor el hebreo וַיַּעֲלֶה, manteniendo una sintaxis española natural. También se mejora la nota al pie con una alternativa idiomática y fiel al valor militar de צור.
