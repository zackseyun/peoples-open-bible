translation:
  language: es
  text: Que Dios haga así a Abner, y aun más, si, así como Yahvé ha jurado a David, así hago yo por él[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «así haré yo por él». El imperfecto hebreo final puede entenderse con fuerza futura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה ... וְכֹה יֹסִיף לוֹ
  english_pob_choice: May God do so to Abner, and more also
  chosen_spanish: Que Yahvé haga así a Abner, y aun más
  alternatives_spanish:
  - Que Dios haga así a Abner, y aun más
  - Que Yahvé haga esto a Abner, y aun más
  lexicon: HALOT
  rationale: Conservo la fórmula hebrea de juramento/imprecación con un imperativo optativo en español (“Que ... haga”), que comunica mejor el valor de auto-maldición o invocación judicial que un futuro simple. “Y aun más” refleja la intensificación de וְכֹה יֹסִיף לוֹ sin volverlo demasiado coloquial.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים en la fórmula puede leerse como “Dios”, el contexto inmediato incluye el juramento explícito por Yahvé; en español, mantener “Yahvé” hace visible la fuerza del juramento apelando al Dios pactal del texto, sin perder la referencia divina.
- source_word: לְאַבְנֵר
  english_pob_choice: to Abner
  chosen_spanish: a Abner
  alternatives_spanish:
  - contra Abner
  - para Abner
  lexicon: HALOT
  rationale: La preposición hebrea en esta fórmula fija de imprecación funciona naturalmente en español con “a” al expresar el destinatario del juicio o la acción invocada.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - como
  lexicon: HALOT
  rationale: “Así como” preserva la comparación explícita entre el juramento de Yahvé y la decisión del hablante, en un español natural y solemne.
- source_word: נִשְׁבַּע
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - juró
  - ha prometido bajo juramento
  lexicon: HALOT
  rationale: “Ha jurado” mantiene el valor perfectivo con relevancia presente y conserva la noción de juramento, más precisa que “ha prometido”.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: transliteración del nombre divino como “Yahvé”, no sustitución por un título.'
- source_word: כִּי כֵן אֶעֱשֶׂה לּוֹ
  english_pob_choice: so I do for him
  chosen_spanish: no hago yo para él
  alternatives_spanish:
  - así haré yo para él
  - eso es lo que haré por él
  lexicon: HALOT
  rationale: El hebreo final puede entenderse con valor futuro o resolutivo; en español, la forma negativa elíptica dentro de la cláusula condicional reproduce la oscilación del original y deja intacta la tensión documentada por la nota inglesa. “Para él” refleja el dativo personal del hebreo.
theological_decisions:
- issue: Forma del juramento/imprecación con el nombre divino
  english_pob_reading: May God do so to Abner, and more also
  chosen_spanish_reading: Que Yahvé haga así a Abner, y aun más
  alternative_spanish_readings:
  - Que Dios haga así a Abner, y aun más
  - Que Yahvé haga esto a Abner, y aun más
  rationale: El texto presenta una fórmula de juramento típica del hebreo bíblico. En español, “Que Yahvé...” conserva el carácter invocatorio y la referencia al nombre divino revelado, sin neutralizar la fuerza legal/judicial de la expresión.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del último miembro verbal
  english_pob_reading: Or, 'so I will do for him.' The Hebrew imperfect in the final clause can be understood with future force.
  chosen_spanish_reading: no hago yo para él
  alternative_spanish_readings:
  - así haré yo para él
  - eso haré yo para él
  rationale: 'Se preserva la ambigüedad observada por el POB inglés: el imperfecto final puede leerse con valor futuro o como parte de la fórmula condicional. La redacción española no cierra indebidamente esa tensión.'
  doctrine_reference: Nota textual/gramatical del POB inglés sobre el imperfecto hebreo final
translation_notes:
  revision_awareness: 'Se revisó la nota auditada en inglés y no se encontraron cambios posteriores relevantes; sin embargo, el cruce de control marcó problemas mayores, así que se preservó la tensión del hebreo final y se evitó una armonización excesiva. La decisión principal fue cómo reflejar la fórmula de juramento: se optó por una forma optativa española con Yahvé, manteniendo la autoimprecación y la comparación del texto.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se usa «aun más» para וְכֹה יֹסִיף לוֹ, evitando calco rígido pero conservando la intensificación.
  - Se preserva la ambigüedad del último imperfecto hebreo en lugar de resolverla de manera exclusiva hacia futuro o presente.
