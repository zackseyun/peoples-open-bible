translation:
  language: es
  text: 'Ahora estaban allí los tres hijos de Sarvia[a]: Joab, Abisai y Asael. Y Asael era ligero de pies, como una de las gacelas que están en el campo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hijos de Zeruía'. Se conserva 'Sarvia' como forma española tradicional del nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ שָׁם
  english_pob_choice: were there
  chosen_spanish: estaban allí
  alternatives_spanish:
  - estuvieron allí
  - se hallaban allí
  lexicon: HALOT
  rationale: La cláusula marca simplemente presencia en el lugar; en español, 'estaban allí' conserva el valor situacional sin sobrecargar el aspecto narrativo.
- source_word: שְׁלֹשָׁה בְּנֵי צְרוּיָה
  english_pob_choice: the three sons of Zeruiah
  chosen_spanish: los tres hijos de Sarvia
  alternatives_spanish:
  - los tres hijos de Zeruía
  - los tres hijos de Zeruia
  lexicon: HALOT
  rationale: Se mantiene la referencia al grupo conocido de manera natural en español. 'Hijos' refleja correctamente בְּנֵי; 'Sarvia' sigue la forma tradicional española del nombre femenino.
- source_word: יוֹאָב וַאֲבִישַׁי וַעֲשָׂהאֵל
  english_pob_choice: Joab, Abishai, and Asahel
  chosen_spanish: Joab, Abisai y Asael
  alternatives_spanish:
  - Joab, Abisai, y Asael
  lexicon: Nombres propios
  rationale: Los nombres se transliteran con las convenciones españolas habituales. Se conserva la coordinación simple y natural del español.
- source_word: קַל
  english_pob_choice: swift
  chosen_spanish: ligero de pies
  alternatives_spanish:
  - rápido
  - veloz
  - ágil
  lexicon: HALOT
  rationale: El adjetivo describe rapidez, no peso. 'Ligero de pies' conserva la imagen corporal del hebreo y sugiere habilidad para correr sin volverlo técnico o abstracto.
- source_word: בְּרַגְלָיו
  english_pob_choice: on his feet
  chosen_spanish: de pies
  alternatives_spanish:
  - con los pies
  - en sus pies
  lexicon: HALOT
  rationale: La expresión española se integra en la locución 'ligero de pies', que preserva el sentido idiomático del hebreo de velocidad al correr.
- source_word: כְּאַחַד הַצְּבָיִם
  english_pob_choice: like one of the gazelles
  chosen_spanish: como una de las gacelas
  alternatives_spanish:
  - como uno de los ciervos
  - como una de las ciervas
  lexicon: HALOT
  rationale: צְבִי designa con más precisión la gacela. 'Gacelas' mantiene la imagen de animal esbelto y veloz que el contexto requiere.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: that are in the field
  chosen_spanish: que están en el campo
  alternatives_spanish:
  - que hay en el campo
  - del campo
  lexicon: HALOT
  rationale: Se conserva la ubicación simple y natural del hebreo. 'Campo' reproduce el ámbito abierto sin añadir matices de 'campo abierto' que el texto no exige.
translation_notes:
  revision_awareness: Se incorporó la revisión reciente del inglés POB que redujo 'open field' a 'field'; por eso la traducción usa 'campo' sin expansión adicional. También se evitó una transliteración rígida en favor de una forma española tradicional y legible.
  spanish_consistency_notes:
  - Se mantuvo 'Sarvia' para el nombre propio según uso español tradicional, pero la nota admite la variante 'Zeruía' como alternativa transparente.
  - Se tradujo 'gacelas' en plural por concordancia con כְּאַחַד הַצְּבָיִם ('como una de las gacelas').
  - El adverbio narrativo inicial 'Ahora' corresponde al waw secuencial del hebreo y al 'Now' del POB inglés.
