translation:
  language: es
  text: 'Entonces Yahvé dijo a Aarón: «Tú, tus hijos y la casa de tu padre contigo llevarán la iniquidad del santuario[a]; y tú y tus hijos contigo llevarán la iniquidad de vuestro sacerdocio[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘llevarán la culpa del santuario’; el hebreo también puede expresar la responsabilidad por ofensas relacionadas con el santuario.
    reason: lexical_alternative
  - marker: b
    text: O ‘llevarán la culpa de vuestro sacerdocio’; el hebreo puede significar también responsabilidad por ofensas ligadas a vuestro oficio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton, siguiendo la decisión auditada del POB en inglés. ‘Yahvé’ es la forma española más reconocible y digna para reproducir el nombre sin sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y luego ... dijo
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; ‘Entonces’ transmite el valor secuencial de manera natural en español sin perder la progresión del relato.
- source_word: בֵית אָבִיךָ
  english_pob_choice: your father’s house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - tu casa paterna
  - tu casa ancestral
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática hebrea con el mínimo de expansión necesaria. En español ‘la casa de tu padre’ mantiene el alcance de clan/familia paterna que el POB documenta.
- source_word: תִּשְׂאוּ
  english_pob_choice: shall bear
  chosen_spanish: llevarán
  alternatives_spanish:
  - cargarán
  - serán responsables de
  lexicon: HALOT
  rationale: Se elige un verbo que conserve la imagen de ‘llevar’ sin resolver demasiado pronto la carga semántica de culpabilidad/responsabilidad. ‘Llevarán’ permite mantener la tensión idiomática del hebreo con buena fluidez en español.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - castigo por la iniquidad
  lexicon: HALOT
  rationale: ‘Iniquidad’ preserva la amplitud semántica del sustantivo hebreo y coincide con la decisión auditada del POB. Evita reducirlo solo a ‘culpa’ o a una paráfrasis explicativa.
- source_word: הַמִּקְדָּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado
  lexicon: HALOT
  rationale: ‘Santuario’ es el equivalente natural en español para el espacio sagrado del texto y reproduce con claridad el sustantivo hebreo sin diluir su referencia cultual.
- source_word: כְּהֻנַּתְכֶם
  english_pob_choice: your priesthood
  chosen_spanish: su sacerdocio
  alternatives_spanish:
  - vuestro sacerdocio
  - su oficio sacerdotal
  lexicon: HALOT
  rationale: Se traduce el sustantivo institucional por ‘sacerdocio’, que es el equivalente más directo y comprensible. El posesivo ‘su’ concuerda con la construcción ‘tú y tus hijos’ y evita una repetición demasiado rígida de ‘vuestro’.
theological_decisions:
- issue: Sentido de ‘llevar la iniquidad’ en contexto sacerdotal
  english_pob_reading: Retain the idiom 'shall bear the iniquity' without resolving whether it emphasizes guilt, liability, or responsibility.
  chosen_spanish_reading: Mantener ‘llevar la iniquidad’ sin decidir entre culpa, responsabilidad o carga legal.
  alternative_spanish_readings:
  - llevarán la culpa
  - serán responsables por el pecado del santuario y del sacerdocio
  rationale: El hebreo admite una tensión real entre culpabilidad, responsabilidad y carga cultual. La traducción conserva esa ambigüedad teológica en vez de cerrarla con una explicación interpretativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el estado de concordancia cruzada es alto; por tanto, este borrador sigue de cerca la lectura auditada del POB en inglés, especialmente en el mantenimiento del nombre divino, del modismo ‘llevar la iniquidad’ y de la doble construcción paralela del versículo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene ‘iniquidad’ en ambas cláusulas para conservar la repetición hebrea y su paralelismo.
  - Se traduce la segunda mitad con el mismo verbo ‘llevarán’ para reflejar la estructura repetida del original.
  - El posesivo ‘su’ en ‘su sacerdocio’ busca naturalidad en español sin alterar la referencia colectiva al sacerdocio de Aarón y sus hijos.
