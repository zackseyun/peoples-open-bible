translation:
  language: es
  text: Cualquiera que blasfeme el nombre de Yahvé[a] ciertamente será muerto; toda la congregación ciertamente lo apedreará. Tanto el forastero como el natural del país, cuando blasfeme el Nombre[b], será muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría entenderse: ‘el que pronuncie el nombre’ o ‘el que maldiga el nombre’. El verbo hebreo puede aludir a pronunciar distintamente o a injuriar/profanar en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘el Nombre’, como sustituto reverente del nombre divino.'
    reason: cultural_note
lexical_decisions:
- source_word: וְנֹקֵב
  english_pob_choice: whoever blasphemes
  chosen_spanish: cualquiera que blasfeme
  alternatives_spanish:
  - el que pronuncie
  - el que maldiga
  - el que blasfeme
  lexicon: HALOT, BDB
  rationale: En este contexto legal, el verbo hebreo tiene un alcance debatido entre ‘pronunciar distintamente’, ‘mencionar’ y ‘revile/blaspheme’. Dado el vínculo con la pena capital y con el nombre divino, ‘blasfeme’ comunica mejor la ofensa religiosa y mantiene la tensión lexicográfica sin reducirla a mera pronunciación.
- source_word: שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el Nombre de Yahvé
  - el nombre de Yahvé
  lexicon: HALOT, BDB
  rationale: Se conserva ‘nombre’ en minúscula en la primera cláusula porque es un sintagma nominal ordinario; el Tetragrámaton se rinde con el término del proyecto ‘Yahvé’, no con una máscara litúrgica como ‘SEÑOR’.
- source_word: מ֣וֹת יוּמָ֔ת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente será muerto
  alternatives_spanish:
  - de seguro será muerto
  - ciertamente será puesto a muerte
  - morirá ciertamente
  lexicon: HALOT, BDB
  rationale: La construcción de infinitivo absoluto + verbo finito expresa énfasis legal de certeza/obligación. ‘Será muerto’ preserva la pasiva judicial breve del hebreo; ‘ciertamente’ reproduce la intensificación.
- source_word: רָג֥וֹם יִרְגְּמוּ
  english_pob_choice: shall certainly stone him
  chosen_spanish: ciertamente lo apedreará
  alternatives_spanish:
  - lo apedrearán ciertamente
  - ciertamente lo lapidará
  - ciertamente lo apedrearán
  lexicon: HALOT, BDB
  rationale: ‘Apedrear’ es el equivalente verbal natural en español para el acto judicial de arrojar piedras. Aunque el hebreo está en plural, en español se mantiene un sujeto colectivo implícito ligado a ‘toda la congregación’.
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT, BDB
  rationale: ‘Congregación’ conserva el matiz formal y jurídico del conjunto del pueblo reunido, alineado con el valor covenantal de עֵדָה.
- source_word: כַּגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente extranjero
  - el peregrino
  - el extranjero residente
  lexicon: HALOT, BDB
  rationale: En este contexto contrasta al no nativo que vive entre Israel con el nacido en la tierra. ‘Forastero’ es comprensible y menos cargado que ‘extranjero’ en español contemporáneo, aunque ambas opciones quedan posibles.
- source_word: כָּאֶזְרָח
  english_pob_choice: the native-born
  chosen_spanish: el natural del país
  alternatives_spanish:
  - el nativo
  - el nacido en la tierra
  - el ciudadano
  lexicon: HALOT, BDB
  rationale: El par con גֵּר exige una contraposición clara entre residente no nativo y miembro originario de la comunidad. ‘Natural del país’ comunica bien la oposición sin introducir connotaciones modernas de ciudadanía política.
- source_word: בְּנָקְבוֹ שֵׁם
  english_pob_choice: when he blasphemes the Name
  chosen_spanish: cuando blasfeme el Nombre
  alternatives_spanish:
  - cuando pronuncie el nombre
  - al blasfemar el Nombre
  - cuando maldiga el Nombre
  lexicon: HALOT, BDB
  rationale: La preposición ב con infinitivo constructo tiene valor circunstancial/temporal. Se conserva ‘el Nombre’ con mayúscula en la segunda cláusula, porque funciona como sustituto reverente absoluto del nombre divino, tal como documenta el audit trail en inglés.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será puesto a muerte
  - deberá morir
  lexicon: HALOT, BDB
  rationale: Se mantiene la fórmula legal pasiva, breve y enfática, coherente con la primera ocurrencia de la cláusula de pena capital.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto fuente usa el Tetragrámaton directamente. Siguiendo el estándar del proyecto, se traduce con ‘Yahvé’ para preservar el nombre del pacto y evitar la máscara litúrgica ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de נֹקֵב / בְּנָקְבוֹ con el nombre divino
  english_pob_reading: blasphemes
  chosen_spanish_reading: blasfeme
  alternative_spanish_readings:
  - pronuncie
  - maldiga
  - blaspheme
  rationale: La frase legisla pena de muerte por un uso profanador del nombre divino. ‘Blasfeme’ comunica ese sentido teológico-jurídico sin imponer que el delito sea mera articulación fonética. Se preserva así la tensión semántica documentada en el audit trail.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; la versión inglesa más reciente aparece como sin cambios y con acuerdo alto. La propuesta española sigue ese estado estable, manteniendo las tensiones léxicas relevantes y la fórmula legal del texto fuente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה de manera consistente con el estándar del proyecto.
  - Se conserva ‘el Nombre’ con mayúscula en la segunda cláusula como sustituto reverente.
  - Se mantiene el paralelismo jurídico de ‘ciertamente será muerto / ciertamente lo apedreará’.
  - ‘Congregación’ se elige por su valor formal y comunitario frente a opciones más modernas o genéricas.
