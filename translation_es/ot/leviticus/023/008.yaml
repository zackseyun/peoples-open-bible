translation:
  language: es
  text: Y presentaréis una ofrenda por fuego[a] a Yahvé durante siete días. El séptimo día habrá una convocación sagrada; no haréis ningún trabajo laborioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda de fuego’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: y presentaréis
  alternatives_spanish:
  - y ofreceréis
  - y llevaréis
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de קרב expresa traer/presentar una ofrenda. 'Presentaréis' conserva el acto cultual sin sonar mecánico en español.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: La expresión sacerdotal designa una ofrenda hecha por fuego. 'Ofrenda encendida' comunica ese sentido en español natural y preserva el vínculo con el fuego sin reducirlo a un término más interpretativo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: El lamed expresa dirección/dedicación de la ofrenda. 'A Yahvé' mantiene el sentido directo y sigue el criterio del proyecto para el nombre divino.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: La frase marca duración continua. 'Durante siete días' suena natural en español y conserva el valor temporal.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocación
  alternatives_spanish:
  - una convocación santa
  - una asamblea santa
  lexicon: HALOT
  rationale: Es una fórmula fija de calendario cultual. 'Santa convocación' conserva el registro formal y el sentido de reunión convocada para culto.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: laborious work
  chosen_spanish: ningún trabajo laborioso
  alternatives_spanish:
  - ninguna obra laboriosa
  - ningún trabajo servil
  - ningún trabajo ordinario
  lexicon: HALOT
  rationale: La construcción prohíbe el trabajo de carácter laboral/servil propio de los días comunes. 'Trabajo laborioso' sigue la decisión auditada en inglés y evita ampliar indebidamente la prohibición a toda actividad.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no haréis
  alternatives_spanish:
  - no deberéis hacer
  - no realizaréis
  lexicon: HALOT
  rationale: La negación con el verbo de hacer se vierte de modo directo y jurídico en español bíblico contemporáneo.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La base hebrea usa el Tetragrámaton. El proyecto pide verterlo como 'Yahvé', preservando el nombre propio del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo base y con la auditoría inglesa: no se requiere revisión textual ni ajuste doctrinal adicional. Se conserva la única nota léxica del inglés para אִשֶּׁה, adaptada al español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el criterio del proyecto para יהוה.
  - '''Santa convocación'' reproduce la fórmula cultual fija sin sustituirla por un sinónimo más libre.'
  - '''Trabajo laborioso'' conserva la restricción de מְלֶאכֶת עֲבֹדָה sin convertirla en una prohibición absoluta de toda acción.'
