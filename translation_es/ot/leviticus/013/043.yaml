base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/043.yaml
  text: and the priest examines him[a], and behold, the swelling of the disease is reddish-white on his bald head or on his bald forehead, like the appearance of a skin disease on the flesh[b],
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת is traditionally rendered 'leprosy,' but in Leviticus it refers more broadly to a range of serious skin conditions rather than specifically Hansen's disease.
    reason: lexical_alternative
  - marker: b
    text: The two terms for baldness likely distinguish the back of the head and the front of the head; rendered here as 'bald head' and 'bald forehead' to preserve the contrast.
    reason: cultural_note
