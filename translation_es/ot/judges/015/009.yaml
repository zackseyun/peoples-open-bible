translation:
  language: es
  text: Entonces los filisteos subieron y acamparon en Judá[a], y se desplegaron en Lehi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, "se extendieron por Lehi". El verbo hebreo puede sugerir un despliegue militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron hacia arriba
  - ascendieron
  - marcharon
  lexicon: HALOT
  rationale: עלה en narrativa expresa movimiento ascendente o de avance geográfico/militar. «Subieron» conserva ese valor direccional de manera natural en español sin añadir interpretación extra.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es la designación étnica estándar. El artículo definido español refleja correctamente la referencia a un grupo conocido dentro del relato.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - levantaron campamento
  - se acamparon
  lexicon: HALOT
  rationale: חנה significa establecer campamento. «Acamparon» es claro y fiel en español; evita el tono más arcaico de «acamparon»? (no) y mantiene la acción militar concreta.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - contra Judá
  - dentro de Judá
  lexicon: HALOT
  rationale: La preposición ב indica ubicación en este contexto. «En Judá» conserva el valor espacial; no se introduce una lectura hostil que el texto aquí no marca gramaticalmente.
- source_word: וַיִּנָּטְשׁוּ
  english_pob_choice: spread out
  chosen_spanish: se desplegaron
  alternatives_spanish:
  - se extendieron
  - se dispersaron
  - se alinearon
  lexicon: HALOT
  rationale: En este contexto militar, נטשׁ puede sugerir extenderse o desplegarse sobre un área. «Se desplegaron» reproduce bien la idea táctica sin convertirla en una acción distinta como «se dispersaron».
- source_word: בַּלֶּחִי
  english_pob_choice: at Lehi
  chosen_spanish: en Lehi
  alternatives_spanish:
  - en Lejí
  - junto a Lehi
  lexicon: HALOT
  rationale: Lehi es un topónimo. «En Lehi» preserva el nombre propio y el valor locativo; no se necesita una adaptación fonética especial en el texto base.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la lectura inglesa auditada. Se mantiene la ambigüedad militar de וַיִּנָּטְשׁוּ mediante una nota alternativa, como en el POB inglés.
  spanish_consistency_notes:
  - Se usó «Judá» como nombre geográfico sin artículo, siguiendo el uso bíblico en español.
  - «Lehi» se mantuvo como topónimo transliterado del original; si en otros contextos del proyecto se opta por «Lejí», conviene unificar solo si existe criterio editorial documentado.
  - El registro es sobrio y narrativo, adecuado para un verso histórico breve.
