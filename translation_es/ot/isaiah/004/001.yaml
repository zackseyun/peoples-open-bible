  to: 'Y siete mujeres se asirán de un solo hombre en aquel día, diciendo: “Comeremos nuestro propio pan y vestiremos nuestra propia ropa; solo que tu nombre sea llamado sobre nosotras[a]. Quita nuestro oprobio[b].”'
