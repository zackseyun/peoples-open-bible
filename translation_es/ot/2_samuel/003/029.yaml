base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/029.yaml
  text: May it fall on the head of Joab and on all his father’s house[a], and may there never be cut off from the house of Joab one who has a discharge, or is leprous, or holds a staff, or falls by the sword[b], or lacks bread.
  footnotes:
  - marker: a
    text: Or, more broadly, “has a defiling skin disease.” The Hebrew term traditionally rendered “leprous” can refer to a range of serious skin conditions.
    reason: lexical_alternative
  - marker: b
    text: Or “holds a distaff”; some understand the phrase as “leans on a staff.”
    reason: lexical_alternative
