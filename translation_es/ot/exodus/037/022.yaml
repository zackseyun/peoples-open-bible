translation:
  language: es
  text: Sus botones y sus ramas eran de una sola pieza con ella[c][b][a]; toda ella era una sola obra martillada de oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse ‘sus perillas’; el término hebreo se refiere a un adorno redondeado, aquí probablemente expresado con imaginería floral como ‘botones’.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘de ella’ o ‘desde ella’. El sentido es que los botones y las ramas fueron hechos como una sola pieza con la propia menorá.
    reason: lexical_alternative
  - marker: c
    text: 'También: ‘una sola pieza de obra martillada’ o ‘martillada de una sola pieza’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפְתֹּרֵיהֶם
  english_pob_choice: their buds
  chosen_spanish: sus botones
  alternatives_spanish:
  - sus nudos
  - sus knobs
  - sus cálices
  lexicon: HALOT
  rationale: En el contexto de la menorá, el término designa un elemento ornamental redondeado. ‘Botones’ conserva la imagen vegetal sugerida por el inglés POB (‘buds’) y resulta natural en español, sin forzar un término arquitectónico como ‘capiteles’.
- source_word: וּקְנֹתָם
  english_pob_choice: and their branches
  chosen_spanish: y sus ramas
  alternatives_spanish:
  - y sus varas
  - y sus cañas
  - y sus brazos
  lexicon: HALOT
  rationale: En la descripción cultual de la menorá, קָנֶה alude a los salientes laterales. ‘Ramas’ mantiene la metáfora orgánica del inglés POB y comunica bien la forma de las extensiones del candelabro en español.
- source_word: מִמֶּנָּה
  english_pob_choice: with it
  chosen_spanish: con ella
  alternatives_spanish:
  - de ella
  - desde ella
  - de la menorá
  lexicon: HALOT
  rationale: El hebreo indica que las partes fueron hechas integradas en una sola pieza con el objeto principal. En español, ‘con ella’ expresa mejor la unión material que un simple ‘de ella’, y evita una lectura demasiado literal que sonaría menos idiomática.
- source_word: כֻּלָּהּ
  english_pob_choice: all of it
  chosen_spanish: todo ello
  alternatives_spanish:
  - todo de ella
  - el conjunto
  - todo
  lexicon: HALOT
  rationale: El sufijo femenino remite a la menorá completa. ‘Todo ello’ preserva el valor colectivo y suena natural en español, sin perder la referencia a la pieza entera.
- source_word: מִקְשָׁה אַחַת
  english_pob_choice: one hammered work
  chosen_spanish: una sola obra martillada
  alternatives_spanish:
  - una sola pieza martillada
  - una obra de martillo hecha de una sola pieza
  - martillada de una sola pieza
  lexicon: HALOT
  rationale: 'מִקְשָׁה señala metal trabajado a martillo, y אַחַת refuerza la unidad. ‘Una sola obra martillada’ conserva ambas ideas: trabajo por martillado y unidad de fabricación. Se evita ‘forjada’ porque el término hebreo no es específicamente de forja.'
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro limpio
  lexicon: HALOT
  rationale: ‘Oro puro’ es la equivalencia natural y fiel en español para la fórmula cultual del tabernáculo, manteniendo la calidad material sin introducir matices ajenos al texto.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente, que no requería cambios sustantivos; la redacción española conserva la misma lectura unitaria de la pieza y el mismo valor léxico de los ornamentos y el trabajo martillado.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Botones’ se eligió como equivalente principal de la imaginería ornamental floral, coherente con el audit trail inglés.
  - ‘Obra martillada’ conserva el valor técnico de מִקְשָׁה sin convertirlo en una paráfrasis libre.
