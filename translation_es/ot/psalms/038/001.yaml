translation:
  language: es
  text: Salmo de David[a], para recuerdo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De David» también puede entenderse como «por David» o «para David»; la fórmula hebrea del encabezado puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «para memorial» o «para traer a la memoria». La frase hebrea es breve y puede señalar una función memorial o litúrgica.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמ֖וֹר
  english_pob_choice: psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - cántico
  - canción
  lexicon: HALOT
  rationale: מִזְמוֹר designa un tipo de composición poética/cantada; en español, «Salmo» es el equivalente establecido y más fiel para el género de los encabezados bíblicos.
- source_word: לְדָוִ֣ד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: El lamed de los encabezados puede señalar autoría, asociación o dedicación. «De David» conserva esa amplitud mejor que opciones más interpretativas como «por David» o «para David».
- source_word: לְהַזְכִּֽיר
  english_pob_choice: for remembrance
  chosen_spanish: para hacer memoria
  alternatives_spanish:
  - para memorial
  - para recuerdo
  - para traer a la memoria
  lexicon: HALOT
  rationale: El infinitivo causativo de זכר expresa una finalidad relacionada con recordar o hacer recordar. «Para hacer memoria» suena natural en español y preserva la función litúrgica/general sin decidir excesivamente si el acto de recordar recae en Dios, en la comunidad o en el uso cultual.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo (WLC) y armoniza con el audit trail inglés, que mantiene la ambigüedad de לְדָוִד y de לְהַזְכִּיר. No se registran revisiones posteriores en el contexto suministrado.
  spanish_consistency_notes:
  - Se usa «Salmo» como término de género bíblico estándar, no una paráfrasis más amplia.
  - Se preserva la ambigüedad de לְדָוִד con una nota, sin forzar autoría exclusiva.
  - «Hacer memoria» evita una reducción excesivamente técnica de לְהַזְכִּיר y mantiene la posibilidad de uso litúrgico o conmemorativo.
  - La puntuación y el orden responden al estilo de encabezado breve en español bíblico contemporáneo.
