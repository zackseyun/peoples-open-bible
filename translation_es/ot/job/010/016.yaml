  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta una construcción menos natural en «como a un león» con «me cazas», y una nota al pie poco idiomática: «me actúas maravillosamente» no es español natural. Además, «maravilloso contra mí» puede sonar algo elogioso; «de manera extraordinaria contra mí» preserva mejor la tensión hostil sin resolverla.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones clave relevantes aquí son contextuales: conservar la elipsis de וְיִגְאֶה, el campo semántico de caza para צוד, y la tensión de פלא en contexto hostil. La revisión propuesta mejora la naturalidad del español sin apartarse de la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «me cazas como a un león» suena menos natural y puede sugerir que Job es cazado del modo en que se caza a un león, no que Dios lo caza cual león cazador.
    rationale: El hebreo כַּשַּׁחַל modifica la acción de cazar con una comparación depredadora. En español, «como un león» transmite mejor la imagen del cazador-león.
  - severity: medium
    issue: La nota b usa «me actúas maravillosamente», expresión no idiomática en español.
    rationale: Debe reformularse a algo como «actúas de manera extraordinaria contra mí» para reflejar la alternativa lexical sin español defectuoso.
  - severity: low
    issue: «te muestras maravilloso contra mí» es comprensible, pero en español «maravilloso» puede inclinarse a una valoración positiva devocional.
    rationale: «Te muestras extraordinario contra mí» o «actúas de manera extraordinaria contra mí» conserva mejor la extrañeza y hostilidad del contexto sin aplanar פלא.
  revised_spanish_text: Si me engrandezco[a], me cazas como un león, y otra vez te muestras extraordinario[b] contra mí.
