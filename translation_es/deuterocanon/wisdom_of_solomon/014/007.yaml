translation:
  language: es
  text: Porque bendito es el leño por el cual viene la justicia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la rectitud». δικαιοσύνη puede expresar justicia o rectitud; el texto principal sigue la opción más natural en español para este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγηται
  english_pob_choice: is blessed
  chosen_spanish: bendito es
  alternatives_spanish:
  - ha sido bendito
  - es alabado
  lexicon: BDAG
  rationale: El perfecto pasivo de εὐλογέω expresa un estado resultante; en español, «bendito es» comunica bien ese estado permanente y suena natural en registro bíblico. «Ha sido bendito» es más explícito, pero menos fluido; «es alabado» desplaza el sentido hacia elogio humano.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa con el contexto anterior. «Porque» es claro y natural en español, y conserva el valor causal/explicativo de γὰρ.
- source_word: ξύλον
  english_pob_choice: wood
  chosen_spanish: leño
  alternatives_spanish:
  - madera
  - árbol
  - madero
  lexicon: BDAG
  rationale: ξύλον puede significar madera, árbol o un objeto de madera. Aquí conviene un sustantivo concreto para el material/objeto aludido; «leño» conserva la materialidad y evita la especificación arbórea de «árbol». «Madero» sería posible, pero en español puede sonar más marcado por asociaciones posteriores.
- source_word: δι' οὗ
  english_pob_choice: through which
  chosen_spanish: por el cual
  alternatives_spanish:
  - a través del cual
  - mediante el cual
  lexicon: BDAG
  rationale: El relativo neutro remite a ξύλον, y en español la mediación instrumental se expresa bien con «por el cual». «A través del cual» es más literal, pero menos natural; «mediante el cual» es correcto, aunque más técnico.
- source_word: γίνεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - se produce
  - se realiza
  - surge
  lexicon: BDAG
  rationale: γίνομαι aquí expresa llegada a ser/ocurrir. En español, «viene» conserva el valor de acontecimiento que se produce por medio de ese leño, sin recargar la frase. «Se produce» o «se realiza» son más abstractos.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: BDAG
  rationale: Se preserva la alternativa lexical documentada por el POB inglés. En español, «justicia» cubre con naturalidad el campo de δικαιοσύνη y deja abierta tanto la dimensión moral como la forense/social; «rectitud» sería viable, pero estrecha el alcance y suena menos directo aquí.
theological_decisions:
- issue: 'Alcance de δικαιοσύνη: righteousness vs. justice'
  english_pob_reading: righteousness
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  rationale: El POB inglés mantiene «righteousness» con nota alternativa «justice». En español, «justicia» es una traducción plenamente legítima de δικαιοσύνη y preserva mejor el posible doble matiz de rectitud moral y orden justo. Se conserva la tensión semántica sin forzar una lectura exclusivamente ética o exclusivamente judicial.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative justice preserved where relevant'
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del POB inglés, que no introdujo cambios posteriores y confirmó alta concordancia; por eso no se aplicaron revisiones adicionales. La única variación relevante para el español es la elección de «justicia» como equivalente principal de δικαιοσύνη, manteniendo la alternativa en nota.
  spanish_consistency_notes:
  - Se usó «bendito» para reflejar el estado resultante del perfecto pasivo de εὐλόγηται.
  - Se prefirió «leño» para ξύλον por su concreción material y por evitar una especificación excesiva.
  - Se eligió «por el cual» para la mediación instrumental de δι' οὗ.
  - Se mantuvo el ritmo breve y proverbial de la frase griega, sin expandirla innecesariamente.
  - La nota conserva la alternativa semántica principal de δικαιοσύνη para transparencia auditiva.
