translation:
  language: es
  text: Yahvé hará que la lluvia de tu tierra sea polvo y tierra[a]; desde los cielos caerá sobre ti hasta que seas destruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «polvo y tierra suelta». El hebreo acumula dos sustantivos emparentados (אָבָק, עָפָר) para intensificar la imagen de la lluvia convertida en sequedad y devastación.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino según el criterio del proyecto. «Yahvé» mantiene la referencia al Tetragrámaton sin sustituirlo por un título, y es el equivalente español más natural para la transliteración usada en el POB inglés.
- source_word: יִתֵּן
  english_pob_choice: will make
  chosen_spanish: hará que
  alternatives_spanish:
  - dará
  - convertirá
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dar», pero aquí expresa un efecto causativo sobre la lluvia. «Hará que» comunica mejor la acción resultativa sin perder la fuerza del verbo hebreo.
- source_word: מְטַר אַרְצְךָ
  english_pob_choice: the rain of your land
  chosen_spanish: la lluvia de tu tierra
  alternatives_spanish:
  - la lluvia para tu tierra
  - la lluvia de tu país
  lexicon: HALOT
  rationale: La construcción de relación se conserva de forma transparente en español. «Tu tierra» refleja bien el posesivo y evita añadir matices territoriales no presentes en el texto.
- source_word: אָבָק
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - polvo fino
  - tierra
  lexicon: HALOT
  rationale: «Polvo» es el equivalente directo y natural en español para esta imagen de materia seca y fina. Mantiene la intensidad del castigo sin sobreexplicar.
- source_word: וְעָפָר
  english_pob_choice: and powder
  chosen_spanish: y arena
  alternatives_spanish:
  - y polvo
  - y tierra
  - y arena fina
  lexicon: HALOT
  rationale: El hebreo acumula dos términos cercanos para reforzar la imagen. En español, «arena» evita repetir «polvo» y conserva la sensación de material seco y pulverizado. La alternativa «polvo» también es posible, pero no distingue suficientemente los dos sustantivos hebreos.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from the heavens
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - de los cielos
  lexicon: HALOT
  rationale: El plural hebreo se puede conservar con «los cielos», que además suena bíblico y plenamente natural en español. «Desde» expresa bien el origen del descenso.
- source_word: יֵרֵד עָלֶיךָ
  english_pob_choice: it will come down on you
  chosen_spanish: caerá sobre ti
  alternatives_spanish:
  - descenderá sobre ti
  - vendrá sobre ti
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es «bajar/descender», en contexto la imagen de lluvia convertida en polvo pide en español el verbo «caer». Es más idiomático y comunica el golpe del juicio sin alterar el sentido.
- source_word: עַד הִשָּׁמְדָךְ
  english_pob_choice: until you are destroyed
  chosen_spanish: hasta que seas destruido
  alternatives_spanish:
  - hasta tu destrucción
  - hasta que te aniquilen
  lexicon: HALOT
  rationale: Se refleja el final del juicio con una forma pasiva natural en español. «Destruido» mantiene la fuerza del hebreo sin introducir un agente explícito que el texto no formula.
theological_decisions:
- issue: Nombre divino del pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el principio del proyecto de no ocultar el Tetragrámaton detrás de una sustitución. «Yahvé» es consistente con la transparencia textual y con el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el pasaje revisado más reciente: no se requirieron cambios respecto del último pase auditado, y la decisión clave sobre el Tetragrámaton se mantiene estable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva una distinción estilística entre «polvo» y el segundo término mediante «arena», para evitar redundancia y reflejar la acumulación hebrea.
  - La pasiva final «seas destruido» reproduce con naturalidad el resultado del juicio sin añadir sujeto implícito.
