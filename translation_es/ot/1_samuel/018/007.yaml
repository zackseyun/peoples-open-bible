translation:
  language: es
  text: 'Y las mujeres que celebraban cantaban en respuesta[a][b], diciendo: «Saúl ha derribado[c] a sus miles, y David a sus decenas de miles».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se respondían unas a otras»; el sentido aquí probablemente es de canto antifonal o responsivo.
    reason: lexical_alternative
  - marker: b
    text: El participio hebreo también puede sugerir juego festivo, danza o regocijo.
    reason: lexical_alternative
  - marker: c
    text: O «ha matado»; el verbo hebreo literalmente significa «ha golpeado», aquí en sentido militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲנֶינָה
  english_pob_choice: sang responsively
  chosen_spanish: respondían
  alternatives_spanish:
  - cantaban responsivamente
  - respondían cantando
  - cantaban en respuesta
  lexicon: ענה
  rationale: El verbo hebreo aquí no describe solo una respuesta verbal simple, sino un canto antífona/responsivo en contexto de celebración. En español, «respondían» conserva el valor de respuesta conjunta sin forzar una expresión poco natural; el matiz musical queda explicado en la nota.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las mujeres
  lexicon: אשה
  rationale: Correspondencia directa y sin pérdida de referencia al sujeto femenino plural.
- source_word: הַמְשַׂחֲקוֹת
  english_pob_choice: who were celebrating
  chosen_spanish: que celebraban
  alternatives_spanish:
  - que jugaban
  - que festejaban
  - que hacían fiesta
  lexicon: שׂחק
  rationale: El participio puede abarcar juego, danza o regocijo festivo. En este contexto de victoria, «celebraban» comunica bien el sentido amplio sin concretarlo excesivamente.
- source_word: וַתֹּאמַרְןָ
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: אמר
  rationale: Forma natural para introducir la cita en español y mantener la secuencia narrativa.
- source_word: הִכָּה
  english_pob_choice: has struck down
  chosen_spanish: ha derribado
  alternatives_spanish:
  - ha golpeado
  - ha herido
  - ha dado muerte
  lexicon: נכה
  rationale: El verbo literal es «golpear/abatir», pero en el balance militar del verso implica victoria contundente. «Ha derribado» conserva fuerza dinámica en español y puede abarcar la derrota mortal o decisiva sin restringir demasiado el matiz.
- source_word: באלפו
  english_pob_choice: his thousands
  chosen_spanish: a sus miles
  alternatives_spanish:
  - a sus miles de hombres
  - a sus millares
  lexicon: אלף
  rationale: El hebreo usa una cifra militar y poética. En español, «a sus miles» mantiene el paralelismo y la economía del verso; la posesión se expresa naturalmente con «a sus» dentro del refrán.
- source_word: בְּרִבְבֹתָיו
  english_pob_choice: his tens of thousands
  chosen_spanish: a sus decenas de miles
  alternatives_spanish:
  - a sus miríadas
  - a sus millares
  lexicon: רבבה
  rationale: «Decenas de miles» refleja el valor numérico de רבבה con claridad moderna y preserva el contraste poético con «miles». Se evita «miríadas» por ser menos transparente para lectores generales.
theological_decisions:
- issue: Canto responsivo de las mujeres
  english_pob_reading: sang responsively; antiphonal or responsive singing
  chosen_spanish_reading: respondían
  alternative_spanish_readings:
  - cantaban responsivamente
  - respondían unas a otras cantando
  rationale: 'La escena no es mera conversación: es una respuesta coral. «Respondían» deja abierto el modo exacto, mientras la nota explica la posibilidad antífona/alternada sin fijar una sola reconstrucción.'
  doctrine_reference: None
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que todos los marcadores de nota incluidos en el texto español aparezcan exactamente en el lugar correspondiente. El marcador [a] quedó anclado en «respondían[a]» y [b] en «derribado[b]».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce el paralelismo numérico con «miles» / «decenas de miles» para conservar claridad y contraste poético.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el verso.
  - Se conserva un español moderno y litúrgicamente digno, sin arcaísmos innecesarios.
