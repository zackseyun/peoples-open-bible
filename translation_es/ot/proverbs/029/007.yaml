    changes_summary: Removed 'such' before 'knowledge' because it is not in the source. Retained 'case of the poor' for דִּין דַּלִּים and rendered דָּעַת simply as 'knowledge' for closer lexical accuracy.
translation:
  language: es
  text: El justo conoce el caso de los pobres[a]; el malvado no entiende conocimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la causa», «el derecho» o «la justicia» de los pobres. El hebreo דִּין puede expresar un caso, una causa o justicia en sentido jurídico.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «no entiende conocimiento». El hebreo usa el sustantivo de forma abrupta y absoluta al final de la cláusula; se conserva así para seguir más de cerca la forma y el sentido del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - entiende
  - reconoce
  lexicon: HALOT
  rationale: El participio ידע expresa conocimiento/reconocimiento. En español, 'conoce' comunica de forma natural esa relación personal o práctica con el caso de los pobres, sin añadir interpretación excesiva.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - un hombre justo
  - el hombre justo
  - el recto
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. 'El justo' conserva la fuerza proverbial y la categoría representativa del tipo humano, sin forzar una marca masculina explícita que el español puede omitir en este contexto genérico.
- source_word: דִּין
  english_pob_choice: case
  chosen_spanish: caso
  alternatives_spanish:
  - causa
  - derecho
  - justicia
  lexicon: HALOT
  rationale: '''Caso'' refleja bien el sentido concreto de asunto/pleito/causa legal que el POB inglés decidió, y mantiene la tensión con la posible lectura más abstracta de ''justicia'' sin resolverla de manera indebida.'
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los débiles
  - los menesterosos
  lexicon: HALOT
  rationale: '''Pobres'' es la equivalencia más natural en español para el plural sustantivado, y conserva la referencia a personas socialmente vulnerables.'
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: el malvado
  alternatives_spanish:
  - un hombre malvado
  - el impío
  - el perverso
  lexicon: HALOT
  rationale: Como en el primer hemistiquio, el adjetivo funciona sustantivamente. 'El malvado' da un contraste claro y idiomático con 'el justo' en español.
- source_word: יָבִין
  english_pob_choice: understand
  chosen_spanish: entiende
  alternatives_spanish:
  - discierne
  - comprende
  lexicon: HALOT
  rationale: '''Entiende'' es la forma más directa y moderna para בין, y refleja el contraste sapiencial con ''conoce'' en el primer hemistiquio.'
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - la sabiduría
  - el entendimiento
  - el saber
  lexicon: HALOT
  rationale: El sustantivo desnudo דָּעַת puede sonar abrupto si se vierte solo como 'conocimiento', pero el español requiere artículo en este contexto. Se conserva la abstracción del término sin añadir 'tal' o 'ese', que no están en el hebreo.
theological_decisions:
- issue: Interpretación de דִּין דַּלִּים
  english_pob_reading: the case of the poor
  chosen_spanish_reading: el caso de los pobres
  alternative_spanish_readings:
  - la justicia de los pobres
  - la causa de los pobres
  - los derechos de los pobres
  rationale: 'La traducción mantiene la ambigüedad controlada del hebreo y del POB inglés: puede referirse al pleito, asunto o situación legal/social de los pobres, sin fijarla demasiado pronto como ''justicia'' solamente.'
  doctrine_reference: Sabiduría proverbial; justicia social y judicial en literatura sapiencial
- issue: Relación entre las dos cláusulas
  english_pob_reading: a wicked man does not understand knowledge
  chosen_spanish_reading: el malvado no entiende el conocimiento
  alternative_spanish_readings:
  - el malvado no entiende esa clase de conocimiento
  - el malvado no comprende el conocimiento
  rationale: Se sigue la revisión final del POB que eliminó 'such' por no estar en la fuente. En español, se conserva la frase simple y directa, sin explicitar una conexión adicional que el hebreo no marca.
  doctrine_reference: Proverbios; contraste moral entre justo y malvado
translation_notes:
  revision_awareness: 'La revisión inglesa final eliminó ''such'' antes de ''knowledge'' por no estar en la fuente y mantuvo ''case of the poor'' para דִּין דַּלִּים. La versión española sigue esa decisión: no añade demostrativos ni amplía el segundo hemistiquio, y conserva la ambigüedad controlada de דִּין con una nota de alternativas.'
  spanish_consistency_notes:
  - Se mantiene 'el justo' / 'el malvado' para reflejar el paralelismo substantivado del hebreo.
  - '''Conoce'' y ''entiende'' conservan el contraste sapiencial sin introducir comentarios explicativos.'
  - '''El conocimiento'' respeta el sustantivo דָּעַת con la mínima expansión gramatical requerida por el español.'
  - Las notas se anclan correctamente en el texto con [a] y [b] y no añaden marcadores sin soporte.
