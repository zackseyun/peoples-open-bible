translation:
  language: es
  text: ¡Devastación[a], desolación y destrucción! Los corazones se derriten, las rodillas flaquean, hay angustia en todos los lomos, y todos los rostros palidecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «todos sus rostros juntan negrura». La expresión hebrea es difícil y puede describir un aspecto facial oscurecido o descolorido por el terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוּקָה
  english_pob_choice: Devastation
  chosen_spanish: Devastación
  alternatives_spanish:
  - Vaciamiento
  - Desolación
  lexicon: HALOT
  rationale: La primera palabra de la tríada expresa ruina y vaciamiento total. «Devastación» reproduce con naturalidad el impacto del término en español y conserva el inicio enfático de la serie.
- source_word: מְבוּקָה
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - vacío
  - desamparo
  lexicon: HALOT
  rationale: Sigue la tríada con un matiz cercano pero distinguible. «Desolación» mantiene el paralelismo retórico sin volverla innecesariamente técnica o repetitiva.
- source_word: מְבֻלָּקָה
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - quebrantamiento
  lexicon: HALOT
  rationale: El término culmina la secuencia con fuerza máxima. «Destrucción» es idiomático en español y conserva el cierre creciente del hebreo.
- source_word: לֵב נָמֵס
  english_pob_choice: Hearts melt
  chosen_spanish: El corazón se derrite
  alternatives_spanish:
  - Los corazones se derriten
  - el valor se derrite
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal de disolución por terror. El singular genérico «el corazón» funciona bien en español sin perder el sentido colectivo del contexto.
- source_word: פִק בִּרְכַּיִם
  english_pob_choice: knees give way
  chosen_spanish: las rodillas flaquean
  alternatives_spanish:
  - las rodillas ceden
  - las rodillas se doblan
  lexicon: HALOT
  rationale: La imagen hebrea apunta a debilidad física por miedo. «Flaquean» expresa bien la pérdida de firmeza sin introducir una escena demasiado libre.
- source_word: חַלְחָלָה בְּכָל מָתְנַיִם
  english_pob_choice: anguish is in every waist
  chosen_spanish: hay angustia en todos los lomos
  alternatives_spanish:
  - hay temblor en todos los lomos
  - hay angustia en toda cintura
  lexicon: HALOT
  rationale: Se conserva el referente corporal de «māṯnayim» como «lomos», que en español bíblico sigue siendo comprensible y más fiel que «cintura» para este contexto. «Angustia» capta el efecto de terror y agitación interna mejor que una simple descripción física.
- source_word: וּפְנֵי כֻלָּם קִבְּצוּ פָארוּר
  english_pob_choice: all their faces grow pale
  chosen_spanish: los rostros de todos palidecen
  alternatives_spanish:
  - todos sus rostros se ensombrecen
  - los rostros de todos adquieren negrura
  lexicon: HALOT
  rationale: La frase es difícil y la POB inglesa opta por el efecto visible del temor. «Palidecen» comunica en español la pérdida de color del rostro y preserva la lectura contextual preferida sin ocultar la tensión léxica.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la resolución establecida en la auditoría inglesa actual: la tríada inicial se vierte con tres sustantivos distintos y el cierre oscuro de los rostros se resuelve de forma interpretativa en el cuerpo del texto, dejando la alternativa más literal en nota.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y moderno, sin recurrir a fórmulas eclesiásticas arcaizantes.
  - Se conservó la intensidad poética de la tríada hebrea mediante tres sustantivos no idénticos en español.
  - «Lomos» se retuvo por fidelidad corporal y por su uso tradicional en registros bíblicos, aunque resulte menos cotidiano que «cintura».
  - No se introdujo ninguna decisión cristológica o teológica específica, pues el versículo es descriptivo y judicial.
