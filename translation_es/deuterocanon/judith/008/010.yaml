  rationale: Se conserva la estructura del borrador, pero se refuerza la fidelidad contextual de ἐκάλεσεν con «mandó llamar» y se corrigen los nombres a una transliteración española más cercana al griego y más coherente con el rastro auditado. La nota se ajusta para ofrecer alternativas españolas más precisas que «doncella».
