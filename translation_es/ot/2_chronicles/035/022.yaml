base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/022.yaml
  text: But Josiah did not turn his face away from him[a]; rather, he disguised himself to fight against him. He did not listen to the words of Neco from the mouth of God[c][b], and he came to fight in the Valley of Megiddo.
