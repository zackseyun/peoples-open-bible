    reason: lexical_alternative
  - marker: b
    text: «Edom» suena como la palabra hebrea para «rojo», preservando el juego de palabras del versículo.
    reason: cross_reference
  revision_rationale: 'Se ajustó la frase repetida para que preserve la elipsis hebrea con mejor legibilidad en español, sin añadir ''guiso'' al texto principal. Se añadió ''algo de'' para reflejar el valor partitivo de מִן. Se corrigió la fórmula de nombramiento a una construcción española natural y fiel: ''se le llamó Edom''. También se ancló la nota [a] en ''Jacob'', como en el rastro inglés, porque explica la repetición posterior del hebreo en la cita.'
