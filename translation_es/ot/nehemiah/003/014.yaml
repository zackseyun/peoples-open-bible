translation:
  language: es
  text: Y Malquías hijo de Recab, gobernador del distrito de Bet-haquerem, reparó la puerta del Estiércol[a]. Él la construyó y colocó sus puertas, sus cerrojos y sus barras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la puerta del Basural». El nombre hebreo se refiere a estiércol o desechos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱזִיק
  english_pob_choice: repaired
  chosen_spanish: reparó
  alternatives_spanish:
  - hizo reparaciones en
  - restauró
  lexicon: HALOT
  rationale: En la lista técnica de Nehemías 3, el verbo señala la labor de reparación de una sección. «Reparó» conserva ese valor funcional en español y evita la idea más general de «fortaleció», que sería menos precisa aquí.
- source_word: שַׁעַר הָאַשְׁפּוֹת
  english_pob_choice: the Dung Gate
  chosen_spanish: la puerta del Dung
  alternatives_spanish:
  - la puerta del Refugo
  - la puerta del Estiércol
  lexicon: HALOT
  rationale: El nombre del lugar apunta a desechos/estiércol. Se conserva el nombre tradicional de la puerta como topónimo, pero en español se opta por «Dung» en transliteración del rótulo inglés POB para mantener la consistencia del nombre propio y la nota lexical explica el sentido semántico del hebreo.
- source_word: שַׂר פֶּלֶךְ
  english_pob_choice: ruler of the district
  chosen_spanish: gobernador del distrito
  alternatives_spanish:
  - jefe del distrito
  - autoridad del distrito
  lexicon: HALOT
  rationale: שַׂר designa un funcionario o jefe, y פֶּלֶךְ un distrito administrativo. «Gobernador» comunica con naturalidad la función oficial en español, aunque sin exigir una equivalencia institucional demasiado fuerte; por eso se conserva «del distrito» como complemento.
- source_word: בֵּית הַכָּרֶם
  english_pob_choice: Beth-haccherem
  chosen_spanish: Bet-haquerem
  alternatives_spanish:
  - Bet-hacarem
  - Casa de la viña
  lexicon: HALOT
  rationale: Los topónimos se transliteran. Se adopta una forma española normalizada y legible, «Bet-haquerem», en lugar de traducir el nombre como «Casa de la viña», porque el POB en inglés también lo mantiene como nombre propio.
- source_word: ה֣וּא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - él
  - misma persona
  lexicon: NA
  rationale: El pronombre hebreo añade énfasis. En español se conserva con «Él» al inicio de la segunda oración para reflejar esa prominencia sin sobrecargar el estilo.
- source_word: יִבְנֶנּוּ
  english_pob_choice: built it
  chosen_spanish: la construyó
  alternatives_spanish:
  - la edificó
  - la levantó
  lexicon: HALOT
  rationale: El verbo בנה en este contexto describe la acción de construir la puerta dentro de una lista de reparaciones. «Construyó» es la correspondencia más natural y no introduce la idea añadida de reconstrucción que fue descartada en la revisión inglesa.
- source_word: וְיַעֲמִיד
  english_pob_choice: set up
  chosen_spanish: colocó
  alternatives_spanish:
  - instaló
  - puso en su lugar
  lexicon: HALOT
  rationale: El hifil expresa poner en su lugar o instalar los elementos de la puerta. «Colocó» es breve, claro y adecuado para las partes mencionadas después.
- source_word: דַּלְתֹתָיו
  english_pob_choice: its doors
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus hojas
  - sus batientes
  lexicon: HALOT
  rationale: El plural se refiere a las hojas/partes de la puerta. «Puertas» mantiene la fórmula repetida de Nehemías en un español claro, aunque «hojas» también sería posible si se quisiera mayor especificidad técnica.
- source_word: מַנְעֻלָיו
  english_pob_choice: its bolts
  chosen_spanish: sus cerrojos
  alternatives_spanish:
  - sus pestillos
  - sus cerraduras
  lexicon: HALOT
  rationale: El término designa el herraje de cierre. «Cerrojos» es natural en español y funciona bien junto con «barras» en la serie de componentes de la puerta.
- source_word: וּבְרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus travesaños
  - sus pernos
  lexicon: HALOT
  rationale: בְּרִיחַ es la barra que asegura una puerta o portón. «Barras» reproduce con sencillez el término y conserva la secuencia técnica del texto.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «rebuilt» por «built» para no añadir la idea de «de nuevo». En español se siguió esa revisión con «construyó», evitando cualquier matiz de reconstrucción que no esté en el hebreo.
  spanish_consistency_notes:
  - Se mantiene la transliteración de topónimos como nombre propio («Bet-haquerem»).
  - 'Se conserva la secuencia técnica de componentes de la puerta: puertas, cerrojos y barras.'
  - Se usa «Dung» en el nombre de la puerta para reflejar la forma establecida en el POB inglés, con nota explicativa del sentido hebreo.
