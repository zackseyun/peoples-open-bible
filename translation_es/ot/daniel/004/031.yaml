translation:
  language: es
  text: Al fin de los días, yo, Nabucodonosor, alcé mis ojos al cielo, y mi entendimiento[a] volvió a mí; y bendije al Altísimo, y alabé y honré al que vive para siempre, porque su dominio es un dominio eterno, y su reino es de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi razón volvió a mí». El término arameo puede denotar conocimiento, entendimiento o razón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִקְצָת יֽוֹמַיָּה
  english_pob_choice: At the end of the days
  chosen_spanish: Al fin de los días
  alternatives_spanish:
  - Al término de los días
  - Al final de aquellos días
  lexicon: HALOT
  rationale: La expresión aramea es idiomática para el cierre del período señalado. «Al fin de los días» conserva el tono formal y refleja bien la estructura del original sin convertirla en una paráfrasis.
- source_word: עַיְנַי לִשְׁמַיָּא נִטְלֵת
  english_pob_choice: lifted my eyes to heaven
  chosen_spanish: alcé mis ojos al cielo
  alternatives_spanish:
  - levanté mis ojos al cielo
  - miré al cielo
  lexicon: HALOT
  rationale: La imagen es corporal y devocional a la vez. «Alcé mis ojos al cielo» reproduce el giro idiomático con naturalidad en español y mantiene la referencia al movimiento hacia Dios.
- source_word: וּמַנְדְּעִי עֲלַי יְתוּב
  english_pob_choice: my understanding returned to me
  chosen_spanish: mi entendimiento volvió a mí
  alternatives_spanish:
  - mi razón volvió a mí
  - mi conocimiento volvió a mí
  lexicon: HALOT
  rationale: מַנְדַּע puede abarcar conocimiento, entendimiento o razón. En este contexto narrativo de restauración tras el juicio, «entendimiento» comunica la claridad mental recuperada sin sobreespecificar una categoría moderna.
- source_word: לָעֶלְיָא
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Ser Altísimo
  lexicon: HALOT
  rationale: Es el título divino habitual en Daniel. «El Altísimo» es la equivalencia española establecida y comunica con precisión la referencia al Dios supremo.
- source_word: בָּרְכֵת
  english_pob_choice: blessed
  chosen_spanish: bendije
  alternatives_spanish:
  - dije bien de
  - bendecí
  lexicon: HALOT
  rationale: El verbo conserva el valor de bendecir, no simplemente de alabar. «Bendije» preserva esa distinción frente al verbo siguiente, que sí expresa alabanza.
- source_word: וּלְחַי עָלְמָא
  english_pob_choice: him who lives forever
  chosen_spanish: al que vive para siempre
  alternatives_spanish:
  - al que vive por siempre
  - al Viviente eterno
  lexicon: HALOT
  rationale: La frase identifica a Dios como el que vive eternamente. «Al que vive para siempre» suena natural en español y mantiene el referente personal del texto.
- source_word: שַׁבְּחֵת וְהַדְּרֵת
  english_pob_choice: praised and honored
  chosen_spanish: alabé y honré
  alternatives_spanish:
  - exalté y honré
  - alabé y glorifiqué
  lexicon: HALOT
  rationale: Los dos verbos son cercanos pero no idénticos. «Alabé y honré» conserva el paralelismo y la distinción entre expresión de alabanza y acto de honra.
- source_word: שָׁלְטָנֵהּ שָׁלְטָן עָלַם
  english_pob_choice: his dominion is an everlasting dominion
  chosen_spanish: su dominio es un dominio eterno
  alternatives_spanish:
  - su dominio es dominio para siempre
  - su señorío es un señorío eterno
  lexicon: HALOT
  rationale: La construcción cognada es enfática. «Dominio» mantiene el vocabulario político-royal de Daniel y «un dominio eterno» conserva la repetición del original en español.
- source_word: וּמַלְכוּתֵהּ עִם דָּר וְדָר
  english_pob_choice: his kingdom is from generation to generation
  chosen_spanish: y su reino es de generación en generación
  alternatives_spanish:
  - y su reino pasa de generación en generación
  - y su reino permanece de generación en generación
  lexicon: HALOT
  rationale: La expresión aramea indica sucesión continua entre generaciones. «Es de generación en generación» reproduce de manera directa la formulación del texto fuente.
- source_word: אֲנָה נְבוּכַדְנֶצַּר
  english_pob_choice: I, Nebuchadnezzar
  chosen_spanish: yo, Nabucodonosor
  alternatives_spanish:
  - yo, Nabucodonosor mismo
  - yo, el rey Nabucodonosor
  lexicon: HALOT
  rationale: La autodesignación del rey se preserva de forma directa. La transliteración española tradicional «Nabucodonosor» es la forma reconocible y precisa del nombre propio.
theological_decisions:
- issue: Referencia al Dios verdadero mediante el título «el Altísimo» y pronombres personales
  english_pob_reading: and I praised and honored him who lives forever
  chosen_spanish_reading: y alabé y honré al que vive para siempre
  alternative_spanish_readings:
  - y alabé y honré al que vive eternamente
  - y alabé y honré a quien vive para siempre
  rationale: El arameo presenta una descripción participial de Dios como sujeto personal de la doxología. «Al que vive para siempre» mantiene el carácter personal del destinatario y evita diluir la alabanza en una fórmula impersonal.
  doctrine_reference: Daniel 4:31; doxología dirigida al Dios viviente.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó la cláusula final a una formulación más literal: «his kingdom is from generation to generation». La propuesta española sigue esa decisión con «su reino es de generación en generación», manteniendo la equivalencia directa con el arameo. También preserva la distinción entre «bendije» y «alabé y honré» en correspondencia con los dos verbos distintos del original.'
  spanish_consistency_notes:
  - Se usa «Altísimo» para לָעֶלְיָא conforme al estándar POB y al uso bíblico en Daniel.
  - Se conserva «dominio» y no «señorío» para reflejar el vocabulario regio-político del pasaje.
  - «Al que vive para siempre» evita una paráfrasis devocional excesiva y mantiene el referente personal.
  - La nota textual sobre מַנְדַּע se marca en el texto porque la alternancia entre entendimiento y razón es significativa y ya estaba documentada en el audit trail inglés.
