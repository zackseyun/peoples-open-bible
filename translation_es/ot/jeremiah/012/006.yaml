translation:
  language: es
  text: Porque incluso tus hermanos y la casa de tu padre, aun ellos han obrado con traición contra ti; aun ellos han llamado a gritos tras ti[a]. No confíes en ellos[b], aunque te hablen cosas buenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'han llamado tras ti a plena voz', quizá implicando un clamor público hostil o una persecución.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'tus hermanos' es gramaticalmente masculino; en contexto se refiere a los parientes varones cercanos de Jeremías, junto con 'la casa de tu padre' para el grupo doméstico más amplio.
    reason: cultural_note
lexical_decisions:
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tu parentela
  - tus parientes
  lexicon: HALOT
  rationale: ‘Hermanos’ preserva el término de parentesco masculino plural del hebreo y sigue la decisión del POB de mantener la forma más directa del parentesco, en vez de ampliar innecesariamente a ‘parentela’ o ‘parientes’.
- source_word: וּבֵית אָבִיךָ
  english_pob_choice: and your father’s house
  chosen_spanish: y la casa de tu padre
  alternatives_spanish:
  - y la familia de tu padre
  - y el hogar de tu padre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y socialmente amplia; ‘casa de tu padre’ conserva el valor de casa/linaje/household sin diluirlo en ‘familia’.
- source_word: בָּגְדוּ בָךְ
  english_pob_choice: have dealt treacherously with you
  chosen_spanish: han obrado con traición contra ti
  alternatives_spanish:
  - te han traicionado
  - han sido infieles contigo
  lexicon: HALOT
  rationale: ‘Obrado con traición’ conserva el peso moral y profético de בגד mejor que una simple ‘traición’ nominal o un ‘te han traicionado’ más idiomático pero menos marcado.
- source_word: קָרְאוּ אַחֲרֶיךָ מָלֵא
  english_pob_choice: have called out loudly after you
  chosen_spanish: han llamado detrás de ti en voz alta
  alternatives_spanish:
  - han gritado tras de ti
  - han clamado detrás de ti con voz alta
  lexicon: HALOT
  rationale: La combinación ‘llamaron detrás de ti’ conserva la dirección del hebreo, y ‘en voz alta’ refleja מָלֵא como intensificación vocal. No se traduce como mero ‘gritar’ para no borrar el matiz de llamada/pursuit detrás del profeta.
- source_word: אַל תַּאֲמֵן בָּם
  english_pob_choice: Do not trust them
  chosen_spanish: No confíes en ellos
  alternatives_spanish:
  - No creas en ellos
  - No pongas tu confianza en ellos
  lexicon: HALOT
  rationale: ‘Confiar’ refleja bien אמן en este contexto personal y advertencia relacional; ‘creer’ sería menos preciso aquí porque el problema es fiarse de ellos, no solo asentir a su discurso.
- source_word: טוֹבוֹת
  english_pob_choice: good things
  chosen_spanish: cosas buenas
  alternatives_spanish:
  - palabras amables
  - buenas palabras
  lexicon: HALOT
  rationale: '‘Cosas buenas’ mantiene la literalidad del sustantivo plural y deja abierto el alcance semántico: palabras favorables, promesas agradables o discurso benevolente.'
theological_decisions:
- issue: 'Sentido de la advertencia: confiar versus creer'
  english_pob_reading: Do not trust them, though they speak good things to you.
  chosen_spanish_reading: No confíes en ellos, aunque te hablen cosas buenas.
  alternative_spanish_readings:
  - No creas en ellos, aunque te hablen cosas buenas.
  - No pongas tu confianza en ellos, aunque te hablen cosas buenas.
  rationale: El hebreo prohíbe poner confianza en personas cuyo discurso puede ser favorable pero engañoso. ‘Confiar’ comunica mejor el alcance práctico de la advertencia que ‘creer’, aunque este último siga siendo posible como eco secundario.
  doctrine_reference: Sabiduría bíblica sobre discernimiento y desconfianza prudente ante palabras halagadoras (cf. Prov 26:24-26).
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión del POB al preferir una expresión más directa para קָרְאוּ: ‘han llamado detrás de ti en voz alta’, en lugar de una paráfrasis más libre. También conserva la fuerza de la advertencia en ‘No confíes en ellos’ y la concesión de ‘aunque te hablen cosas buenas’.'
  spanish_consistency_notes:
  - Se mantiene ‘casa de tu padre’ como calco idiomático estable, no como simple ‘familia’, para preservar la carga social del hebreo.
  - Se usa ‘han obrado con traición’ para sostener el tono profético y evitar suavizar בגד.
  - La nota de pie de página en ‘ellos’ aclara el masculino gramatical sin alterar el texto principal.
  - ‘Cosas buenas’ se deja deliberadamente amplio para no cerrar el rango semántico de טוֹבוֹת.
  - Se evita ‘SEÑOR’ o terminología sustitutiva porque este versículo no contiene el nombre divino ni una cita de κύριος.
