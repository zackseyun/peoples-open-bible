translation:
  language: es
  text: ¡Oh, más noble que los varones en fortaleza, y más viril[a] que los hombres en perseverancia!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más valiente que los hombres en perseverancia». El griego dice literalmente «más viril que los hombres», preservando un juego retórico deliberado sobre una virtud codificada como masculina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρρένων
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - hombres
  - males
  lexicon: LSJ
  rationale: ἀρρήν designa al sexo masculino de manera más básica que ἀνήρ. En español, “varones” conserva esa distinción frente a “hombres” en la segunda mitad, sin perder la fuerza retórica del contraste.
- source_word: πρὸς καρτερίαν
  english_pob_choice: in courage
  chosen_spanish: en fortaleza
  alternatives_spanish:
  - en coraje
  - en valentía
  - en perseverancia firme
  lexicon: LSJ
  rationale: καρτερία incluye firmeza, resistencia y fortaleza ante la prueba. “Fortaleza” es un término natural en español que mantiene esa idea de resistencia valiente sin estrecharla solo a “coraje”.
- source_word: γενναιοτέρα
  english_pob_choice: more noble
  chosen_spanish: más noble
  alternatives_spanish:
  - más noble de ánimo
  - más generosa
  - más alta de espíritu
  lexicon: LSJ
  rationale: El comparativo de γενναῖος puede expresar nobleza, magnanimidad y valentía. “Más noble” preserva esa elevación moral y heroica con claridad en español.
- source_word: ἀνδρῶν
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  lexicon: LSJ
  rationale: ἀνήρ suele significar “hombre/varón” con matiz de adultez masculina. Aquí “los hombres” conserva el paralelismo y deja intacto el contraste con “varones”.
- source_word: πρὸς ὑπομονὴν
  english_pob_choice: in endurance
  chosen_spanish: en perseverancia
  alternatives_spanish:
  - en paciencia
  - en resistencia
  - en constancia
  lexicon: LSJ
  rationale: ὑπομονή puede denotar paciencia perseverante bajo prueba. “Perseverancia” comunica bien esa resistencia sostenida en un español natural y digno.
- source_word: ἀνδρειοτέρα
  english_pob_choice: more manly
  chosen_spanish: más viril
  alternatives_spanish:
  - más varonil
  - más valiente
  - más guerrera
  lexicon: LSJ
  rationale: El adjetivo deriva de ἀνήρ y evoca manhood/manliness de forma explícita. “Más viril” conserva el juego retórico de género y la referencia al ideal masculino de fortaleza.
theological_decisions:
- issue: Retener el contraste de género en la alabanza retórica
  english_pob_reading: “more noble than males ... more manly than men” preserves a deliberate rhetorical play on male-coded virtue.
  chosen_spanish_reading: “más noble que los varones ... más viril que los hombres” mantiene el contraste explícito entre dos términos masculinos distintos.
  alternative_spanish_readings:
  - “más valiente que cualquier hombre”
  - “más fuerte que los hombres”
  rationale: El griego hace una comparación deliberadamente marcada entre ἀρρένων y ἀνδρῶν. En español conviene conservar esa tensión para no neutralizar el recurso retórico ni borrar la inversión de expectativas de género.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios posteriores ni objeciones en el control cruzado; la presente redacción conserva el paralelismo de género y la elevación retórica del original griego.'
  spanish_consistency_notes:
