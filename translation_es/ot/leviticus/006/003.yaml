  rationale: 'Se revisa para mejorar fidelidad sintáctica y registro: «vestidura» encaja mejor con contexto sacerdotal; «prendas interiores» evita el tono coloquial de «calzoncillos»; y la cláusula de las cenizas se rehace para reflejar de forma natural el hebreo y la revisión inglesa auditada.'
