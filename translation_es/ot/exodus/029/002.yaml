review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura tripartita del hebreo: pan sin levadura, tortas sin levadura mezcladas con aceite, y una tercera preparación delgada sin levadura con aceite; también preserva correctamente la cláusula final prescriptiva sobre hacerlas de harina fina de trigo. Sin embargo, dos elecciones léxicas debilitan la fidelidad y naturalidad: «hojuelas» no corresponde bien a רְקִיקֵי en este contexto cultual-panadero, y «esparcidas con aceite» no expresa de manera idiomática la preparación de panes; el sentido es más bien «untadas» o «embadurnadas».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «hojuelas» suena más a cereal o lámina quebradiza que a una pieza de pan/galleta ritual, y «esparcidas con aceite» resulta poco natural con ese sustantivo. «De flor de harina de trigo las harás» es comprensible y bastante bíblico; puede mantenerse. El resto del verso fluye bien en español eclesial amplio.
  glossary_alignment: No hay conflictos con la terminología doctrinal global del proyecto. Las decisiones relevantes aquí son culinarias/rituales. Conviene ajustar «רְקִיקֵי מַצּוֹת» a «obleas sin levadura» o similar, y «מְשֻׁחִים בַּשָּׁמֶן» a «untadas con aceite», lo cual además encaja con la revisión inglesa documentada hacia una formulación culinaria más natural.
  issues:
  - severity: medium
    issue: «hojuelas sin levadura» para רְקִיקֵי מַצּוֹת
    rationale: רְקִיקִים son piezas delgadas tipo wafer/cake, no «hojuelas» en el sentido común moderno. «Hojuelas» en muchos contextos hispanos sugiere copos o láminas fritas, y no preserva bien el contraste ritual con «tortas».
  - severity: medium
    issue: «esparcidas con aceite» para מְשֻׁחִים בַּשָּׁמֶן
    rationale: Aunque intenta reflejar la revisión inglesa «spread with oil», en español natural lo que se esparce es el aceite, no las obleas. Para el alimento preparado, «untadas con aceite» expresa mejor la acción culinaria y conserva la idea de aplicación superficial.
  - severity: low
    issue: Nota a demasiado expansiva y algo imprecisa
    rationale: 'La nota actual mezcla varias posibilidades no igualmente justificadas por el hebreo y puede simplificarse para reflejar mejor la alternativa documentada: «panes» o, según el contexto, una forma más cercana a «tortas/panes ácimos».'
  revised_spanish_text: y pan sin levadura[a], y tortas sin levadura mezcladas con aceite, y obleas sin levadura untadas con aceite[b]; de flor de harina de trigo las harás.
