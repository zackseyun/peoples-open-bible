id: EZR.3.12
reference: Ezra 3:12
source:
  edition: WLC
  text: וְ/רַבִּ֡ים מֵ/הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּם֩ וְ/רָאשֵׁ֨י הָ/אָב֜וֹת הַ/זְּקֵנִ֗ים אֲשֶׁ֨ר רָא֜וּ אֶת הַ/בַּ֤יִת הָֽ/רִאשׁוֹן֙ בְּ/יָסְד֔/וֹ זֶ֤ה הַ/בַּ֨יִת֙ בְּ/עֵ֣ינֵי/הֶ֔ם בֹּכִ֖ים בְּ/ק֣וֹל גָּד֑וֹל וְ/רַבִּ֛ים בִּ/תְרוּעָ֥ה בְ/שִׂמְחָ֖ה לְ/הָרִ֥ים קֽוֹל־׃
translation:
  text: But many of the priests and the Levites and the heads of the fathers’ houses[a], the old men who had seen the first house, were weeping with a loud voice when this house was founded before their eyes[c][b], while many were raising their voice with a shout of joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the former house' for 'the first house.' The Hebrew literally says 'the first house,' referring to the earlier temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'when the foundation of this house was laid.'
    reason: lexical_alternative
  - marker: c
    text: '''Heads of fathers’ houses'' refers to leaders of ancestral family groups or clans.'
    reason: cultural_note
lexical_decisions:
- source_word: וְרַבִּים
  chosen: But many
  alternatives:
  - And many
  - many
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but here 'but' best brings out the contrast with the previous verse's joyful shouting. רַבִּים is straightforwardly 'many.'
- source_word: מֵהַכֹּהֲנִים וְהַלְוִיִּם וְרָאשֵׁי הָאָבוֹת
  chosen: of the priests and Levites and heads of fathers’ houses
  alternatives:
  - from the priests and Levites and heads of ancestral houses
  - of the priests and the Levites and the heads of the fathers
  lexicon: HALOT
  rationale: מִן after רַבִּים is partitive, hence 'many of.' רָאשֵׁי הָאָבוֹת refers to clan/family leaders; 'heads of fathers’ houses' preserves the Hebrew social structure more closely than a flattened 'family heads.'
- source_word: הַזְּקֵנִים
  chosen: the old men
  alternatives:
  - the elders
  - the aged men
  lexicon: HALOT
  rationale: Here the term qualifies those old enough to have seen the former temple, so age is primary rather than office. 'The old men' fits the context better than the institutional-sounding 'elders.'
- source_word: אֲשֶׁר רָאוּ אֶת הַבַּיִת הָרִאשׁוֹן
  chosen: who had seen the first house
  alternatives:
  - who had seen the former house
  - who had seen the first temple
  lexicon: HALOT
  rationale: בַּיִת in Ezra commonly refers to the temple as 'the house.' 'First house' preserves the lexical link and avoids importing 'temple' where the Hebrew says 'house,' though the referent is clearly the temple.
- source_word: בְּיָסְדוֹ זֶה הַבַּיִת
  chosen: when this house was founded
  alternatives:
  - at the laying of the foundation of this house
  - when the foundation of this house was laid
  lexicon: HALOT
  rationale: The infinitive construct with suffix from יסד refers to the founding/foundation-laying of the house. The chosen rendering is idiomatic while retaining the building-foundation sense.
- source_word: בְּעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  lexicon: HALOT
  rationale: A natural English rendering of the idiom that preserves the vividness of direct witnessing.
- source_word: בֹּכִים בְּקוֹל גָּדוֹל
  chosen: were weeping with a loud voice
  alternatives:
  - were weeping loudly
  - were crying out loudly
  lexicon: HALOT
  rationale: The participle indicates ongoing action; 'were weeping' fits the narrative. בְּקוֹל גָּדוֹל is literally 'with a great/loud voice,' preserved here rather than reduced to an adverb alone.
- source_word: וְרַבִּים
  chosen: while many
  alternatives:
  - and many
  - but many others
  lexicon: HALOT
  rationale: The second clause contrasts another group responding differently. 'While many' captures the simultaneous contrast without over-specifying 'others,' which is implied but not explicit.
- source_word: בִּתְרוּעָה בְשִׂמְחָה
  chosen: with a shout of joy
  alternatives:
  - with joyful shouting
  - with a shout in gladness
  lexicon: HALOT
  rationale: תְּרוּעָה is a loud shout/cry, often jubilant in context; בְשִׂמְחָה specifies joy. 'With a shout of joy' keeps both elements clear.
- source_word: לְהָרִים קוֹל
  chosen: were raising their voice
  alternatives:
  - to raise the voice
  - lifting up the voice
  lexicon: HALOT
  rationale: The idiom means to lift/raise the voice in vocal expression. Rendering as a finite verbal idea in English makes the clause read naturally while preserving the Hebrew image.
