  rationale: Se cambió «sacaron» por «tomaron» para reflejar con mayor fidelidad וַיִּקְחוּ y alinearse con la decisión léxica auditada. Se corrigió la nota al pie para que aporte una alternativa real y explique la literalidad de «a la casa». También se ajustó la cláusula final a «Y vivió entre el pueblo» para una continuidad narrativa más natural en español.
