translation:
  language: es
  text: Prepara su alimento en verano[a]; recoge[b] sus provisiones en la cosecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su pan»; aquí probablemente significa «su alimento» o, más generalmente, su sustento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acopia su alimento en la cosecha».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּכִין
  english_pob_choice: prepares
  chosen_spanish: prepara
  alternatives_spanish:
  - prepara de antemano
  - alista
  lexicon: HALOT
  rationale: El verbo hifil aquí expresa hacer algo listo o disponerlo; «prepara» conserva la idea de diligencia y es natural en español, sin añadir más de lo que el hebreo exige.
- source_word: בַּקַּיִץ
  english_pob_choice: in summer
  chosen_spanish: en el verano
  alternatives_spanish:
  - durante el verano
  - en verano
  lexicon: HALOT
  rationale: La preposición con el sustantivo definido marca el tiempo de la acción; «en el verano» es claro, idiomático y fiel al valor temporal.
- source_word: לַחְמָהּ
  english_pob_choice: its food
  chosen_spanish: su alimento
  alternatives_spanish:
  - su comida
  - su pan
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «su pan», aquí el término funciona de manera más amplia como sustento. «Su alimento» preserva esa amplitud sin forzar una imagen demasiado específica.
- source_word: אָגְרָה
  english_pob_choice: it gathers
  chosen_spanish: recoge
  alternatives_spanish:
  - acopia
  - reúne
  lexicon: HALOT
  rationale: El verbo אגר implica juntar o almacenar. «Recoge» mantiene el paralelismo directo con el primer hemistiquio y puede sugerir el acopio que el contexto pide.
- source_word: בַקָּצִיר
  english_pob_choice: at harvest
  chosen_spanish: en la siega
  alternatives_spanish:
  - en la cosecha
  - al tiempo de la siega
  lexicon: HALOT
  rationale: El sustantivo refiere al tiempo de cosecha; «siega» comunica bien la estación/acto de recolección y conserva un tono bíblico comprensible en español.
- source_word: מַאֲכָלָהּ
  english_pob_choice: its provisions
  chosen_spanish: sus provisiones
  alternatives_spanish:
  - su alimento
  - su sustento
  lexicon: HALOT
  rationale: El término designa comida destinada a ser consumida. «Sus provisiones» refleja mejor la idea de reservas acumuladas para el futuro, como en la lectura inglesa auditada.
translation_notes:
  revision_awareness: El testigo hebreo y la traducción inglesa auditada concuerdan de forma alta; no se registran revisiones sustantivas en el pasaje. La versión española sigue la misma estructura de dos hemistiquios y conserva la alternancia semántica entre alimento general y provisiones almacenadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el hebreo.
  - Se ha preferido «alimento» para לַחְם y «provisiones» para מַאֲכָל para respetar la leve distinción semántica observada en la auditoría inglesa.
  - «En la siega» traduce el tiempo de cosecha con una expresión breve y bíblicamente reconocible en español.
