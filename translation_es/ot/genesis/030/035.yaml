revisions:
- from: Ese día apartó los machos cabríos[a] rayados y moteados, y todas las cabras moteadas y salpicadas, todo lo que tenía blanco en sí, y todo animal de color oscuro entre los corderos[b]; y los puso en manos[c] de sus hijos.
  to: Ese día apartó los machos cabríos[a] rayados y moteados, y todas las cabras salpicadas y moteadas, cada una que tenía blanco en ella, y todo animal de color oscuro entre los corderos[b]; y los puso al cuidado[c] de sus hijos.
  rationale: 'Se ajusta el texto para reflejar mejor el sentido del hebreo y la racionalidad del POB inglés: se mejora la naturalidad de la cláusula distributiva sobre los animales con blanco, se expresa en el texto principal el sentido idiomático de custodia de בְיַד, y se afina la distinción entre los dos términos de pelaje en las cabras. También se pule una alternativa de nota para mayor naturalidad en español.'
  reviewer_model: gpt-5.4
