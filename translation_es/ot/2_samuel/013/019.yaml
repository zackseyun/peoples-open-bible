base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/019.yaml
  text: Then Tamar put ashes on her head[a], tore the robe of many colors that was on her, put her hand on her head, and went away, going and crying out.
  footnotes:
  - marker: a
    text: Or 'the ornamented robe,' 'the richly colored robe'; traditionally, 'the robe of many colors.' The Hebrew expression is uncertain, but in this context it refers to the distinctive garment worn by the king's virgin daughters.
    reason: lexical_alternative
