translation:
  language: es
  text: 'Y después de llamarlo, le dijo: «¿Qué es esto que oigo sobre ti? Da cuenta de tu administración[a], porque ya no puedes administrar».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Da cuenta de tu mayordomía» o «Rinde cuentas de tu administración».
    reason: lexical_alternative
  - marker: b
    text: O «porque ya no puedes servir como mayordomo».
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσας αὐτὸν
  english_pob_choice: after calling him
  chosen_spanish: después de llamarlo
  alternatives_spanish:
  - habiéndolo llamado
  - tras llamarlo
  - después de convocarlo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, «después de llamarlo» expresa bien la secuencia sin sonar forzado. «Convocarlo» sería posible, pero sugiere un matiz más formal que el contexto inmediato no exige.
- source_word: Τί τοῦτο ἀκούω περὶ σοῦ;
  english_pob_choice: What is this that I hear about you?
  chosen_spanish: ¿Qué es esto que oigo acerca de ti?
  alternatives_spanish:
  - ¿Qué es esto que oigo de ti?
  - ¿Qué es este informe que oigo acerca de ti?
  lexicon: BDAG
  rationale: Conservo la fuerza retórica de la pregunta y el sentido natural de περὶ σοῦ como «acerca de ti». «Oigo de ti» sería más breve, pero puede perder el matiz de rumor o información reportada.
- source_word: ἀπόδος
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Entrega
  - Rinde
  - Presenta
  lexicon: BDAG
  rationale: El imperativo de ἀποδίδωμι aquí pide que el mayordomo presente lo que debe. «Da» es breve, idiomático y mantiene el tono imperativo sin sobrecargarlo.
- source_word: τὸν λόγον
  english_pob_choice: an account
  chosen_spanish: cuenta
  alternatives_spanish:
  - rendición de cuentas
  - informe
  - explicación
  lexicon: BDAG
  rationale: En este contexto administrativo, λόγος no significa «palabra», sino la rendición de una cuenta. En español, «dar cuenta» es una expresión natural y fiel; por eso traduzco «τὸν λόγον» aquí como «cuenta» dentro de la frase fija «da cuenta».},{
- source_word: τῆς οἰκονομίας σου
  english_pob_choice: of your stewardship
  chosen_spanish: de tu administración
  alternatives_spanish:
  - de tu mayordomía
  - de tu mayordomía/administración
  - de tu gestión
  lexicon: BDAG
  rationale: οἰκονομία designa la función de administrar bienes ajenos o una casa/propiedad. En español, «administración» comunica bien la idea de responsabilidad de manejo; «mayordomía» conserva el término tradicional, pero puede sonar más eclesiástico o menos transparente para lectores modernos.
- source_word: οὐ γὰρ δύνῃ ἔτι οἰκονομεῖν
  english_pob_choice: for you are no longer able to manage
  chosen_spanish: porque ya no puedes administrar
  alternatives_spanish:
  - porque ya no eres capaz de administrar
  - porque ya no puedes servir como mayordomo
  - porque ya no puedes gestionar
  lexicon: BDAG
  rationale: δύνῃ + infinitivo expresa incapacidad, y ἔτι añade la idea de «ya no». «Administrar» conserva la relación con οἰκονομία y suena natural en español; «gestionar» es posible, pero menos alineado con la cadena léxica del texto.
- source_word: οἰκονομεῖν
  english_pob_choice: to manage
  chosen_spanish: administrar
  alternatives_spanish:
  - gestionar
  - ser mayordomo
  - desempeñar la administración
  lexicon: BDAG
  rationale: El verbo cognado con οἰκονομία remite a ejercer la función de administrador/mayordomo. Repetir «administrar» en español mantiene la cohesión léxica del pasaje y evita una paráfrasis innecesaria.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete griego SBLGNT y el rastro auditado en inglés POB. La principal decisión fue mantener la metáfora administrativa de οἰκονομία/οἰκονομέω con «administración/administrar» en el texto principal, mientras que «mayordomía/mayordomo» queda preservado en nota como alternativa documentada por el inglés POB. También se optó por una estructura española natural para el participio inicial («después de llamarlo») y para la orden final («ya no puedes administrar»), sin perder la secuencia y el tono judicial-administrativo del original.
  spanish_consistency_notes:
  - Se mantuvo el registro formal pero claro, apto para lectura eclesial general.
  - 'Se preservó la correspondencia entre οἰκονομία y οἰκονομεῖν con una misma familia léxica en español: administración/administrar.'
  - No se introdujo terminología litúrgica o eclesiástica no requerida por el contexto.
  - Las notas alternativas reflejan tensiones léxicas reales entre «administración» y «mayordomía», sin borrar ninguna de las opciones auditadas por la POB inglesa.
