translation:
  language: es
  text: Porque vendrán unos pocos años[a], y yo iré por el camino[b] de donde no volveré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «años de número»; es decir, años pocos en cantidad o limitados.
    reason: lexical_alternative
  - marker: b
    text: O «el camino de donde no volveré». La expresión alude al viaje irreversible hacia la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una relación causal o explicativa con lo anterior. «Porque» comunica bien esa conexión en español natural y digno.
- source_word: שְׁנוֹת מִסְפָּר
  english_pob_choice: a few years
  chosen_spanish: años contados
  alternatives_spanish:
  - unos pocos años
  - años de número
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «años de número», es decir, años pocos o limitados. «Contados» conserva la idea de escasez y límite sin sonar forzado en español.
- source_word: יֶאֱתָיוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  - se acercarán
  lexicon: HALOT
  rationale: Con «años» como sujeto, el verbo expresa la llegada o venida de esos años sobre Job. «Vendrán» conserva el movimiento implícito del hebreo.
- source_word: וְאֹרַח
  english_pob_choice: the path
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: El sustantivo denota un camino o senda concreta y aquí funciona metafóricamente. «Camino» es claro y natural en español, aunque «senda» también sería posible.
- source_word: לֹא אָשׁוּב
  english_pob_choice: from which I will not return
  chosen_spanish: del que no volveré
  alternatives_spanish:
  - de donde no regresaré
  - que no volveré a recorrer
  lexicon: HALOT
  rationale: El hebreo expresa una vuelta imposible desde el camino. En español, la relación se mantiene con «del que no volveré», sin debilitar la imagen del viaje irreversible.
- source_word: אֶהֱלֹךְ
  english_pob_choice: I will go
  chosen_spanish: iré
  alternatives_spanish:
  - caminaré
  - seguiré
  lexicon: HALOT
  rationale: El verbo simple de ir/caminar aquí apunta al avance hacia la muerte. «Iré» es breve, formal y fiel al movimiento del texto.
translation_notes:
  revision_awareness: 'Ajusté la línea para que cada nota quede anclada exactamente en el texto español: [a] sobre «años» y [b] sobre «camino». También cambié el orden para que la frase fluya con naturalidad en español y mantenga la metáfora del recorrido irreversible.'
  spanish_consistency_notes:
  - Conservo el valor idiomático de שְׁנוֹת מִסְפָּר como limitación numérica, no como simple cantidad indefinida.
  - Mantengo la metáfora espacial del hebreo («camino») para el recorrido hacia la muerte, en continuidad con la lectura auditada del POB inglés.
  - Uso «volveré» para reflejar la negación de retorno; no sustituyo por una formulación más abstracta que borre la imagen del viaje.
