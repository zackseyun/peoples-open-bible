translation:
  language: es
  text: En cuanto a los asuntos relativos a Judas Macabeo[a] y a sus hermanos, y la purificación del santuario más grande, y la dedicación[b] del altar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Judas el Macabeo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la rededicación del altar». El griego dice «dedicación», pero el contexto histórico es la restauración del altar después de su profanación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὰ ... κατὰ τὸν Ἰούδαν
  english_pob_choice: the matters concerning Judas
  chosen_spanish: los asuntos relativos a Judas
  alternatives_spanish:
  - los hechos concernientes a Judas
  - las cosas referentes a Judas
  - la historia acerca de Judas
  lexicon: LSJ
  rationale: El plural neutro con κατά + acusativo introduce el conjunto de asuntos o materias vinculadas con Judas. 'Asuntos relativos a' conserva esa amplitud sin reducirlo indebidamente a solo hechos o narración histórica.
- source_word: Ἰούδαν τὸν Μακκαβαῖον
  english_pob_choice: Judas Maccabeus
  chosen_spanish: Judas Maccabeo
  alternatives_spanish:
  - Judas el Macabeo
  - Judas Macabeo
  lexicon: LSJ
  rationale: Se conserva el nombre propio con su epíteto tradicional en forma natural para el español bíblico. 'Maccabeo' refleja el término establecido y evita una transliteración demasiado pesada.
- source_word: τοὺς τούτου ἀδελφοὺς
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos de sangre
  lexicon: LSJ
  rationale: ἀδελφοί aquí se refiere a los hermanos literales de Judas. 'Hermanos' es la opción natural y fiel en español.
- source_word: τὸν τοῦ ἱεροῦ τοῦ μεγίστου καθαρισμόν
  english_pob_choice: the purification of the greatest sanctuary
  chosen_spanish: la purificación del santuario más grande
  alternatives_spanish:
  - la purificación del mayor santuario
  - la purificación del santuario grandísimo
  - la purificación del templo más grande
  lexicon: LSJ
  rationale: ἱερόν puede rendirse como 'santuario' en este contexto cultual e histórico, tal como refleja la revisión inglesa. μεγίστου se vierte de manera literal como 'más grande' para no sobreinterpretar con 'santísimo' u otro valor no explícito en el griego.
- source_word: βωμοῦ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: LSJ
  rationale: βωμός en contexto de sacrificio se traduce de forma directa como 'altar'.
- source_word: ἐγκαινισμόν
  english_pob_choice: dedication
  chosen_spanish: dedicación
  alternatives_spanish:
  - rededicación
  - consagración
  lexicon: LSJ
  rationale: ἐγκαινισμός significa 'dedicación' o inauguración. 'Dedicación' mantiene la correspondencia directa; 'rededicación' se reserva como posibilidad contextual porque el trasfondo histórico es la restauración tras la profanación, aunque el griego no añade un prefijo de 'nuevo'.
theological_decisions:
- issue: ἱερόν en contexto judeo-helenístico
  english_pob_reading: the greatest sanctuary
  chosen_spanish_reading: el santuario más grande
  alternative_spanish_readings:
  - el templo más grande
  - el santuario grandísimo
  rationale: En español, 'santuario' mantiene mejor la precisión lexical de ἱερόν sin imponer una equivalencia interpretativa más fuerte como 'templo'. Se conserva además el comparativo/superlativo griego con 'más grande'.
  doctrine_reference: Primacía del texto original; precisión léxica en vocabulario cultual.
- issue: ἐγκαινισμόν y el trasfondo de restauración
  english_pob_reading: dedication of the altar
  chosen_spanish_reading: dedicación del altar
  alternative_spanish_readings:
  - rededicación del altar
  - consagración del altar
  rationale: La forma griega expresa 'dedicación'; sin embargo, el contexto histórico de la purificación previa hace plausible hablar de 'rededicación'. Se mantiene la lectura principal 'dedicación' en el texto y se preserva la alternativa contextual en nota.
  doctrine_reference: Respeto por la tensión semántica y por el contexto histórico narrativo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó 'temple' a 'sanctuary' para acercarse a ἱερόν. Por eso el español adopta 'santuario' en el texto principal, manteniendo la literalidad del comparativo ('más grande') y la deduplicación del altar como 'dedicación', con la alternativa contextual 'rededicación' preservada en nota mentalmente disponible pero no anclada porque el texto principal no la emplea.
  spanish_consistency_notes:
  - Se prefirió 'Maccabeo' para coherencia con el nombre tradicional en español bíblico, pero se dejó constancia de la variante 'Macabeo'.
  - '''Santuario'' se usa como equivalente de ἱερόν; no se sustituyó por ''templo'' sin necesidad, siguiendo el ajuste de la auditoría inglesa.'
  - '''Dedicación'' se mantuvo en el cuerpo por fidelidad al griego; la posible lectura de ''rededicación'' se registra como alternativa contextual.'
