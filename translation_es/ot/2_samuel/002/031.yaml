translation:
  language: es
  text: Pero los siervos[a] de David abatieron a trescientos sesenta hombres de Benjamín y de los hombres de Abner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y los siervos de David...». El hebreo permite una coordinación simple con וְ; se eligió «Pero» para reflejar el contraste narrativo con el versículo anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/עַבְדֵי
  english_pob_choice: But ... servants
  chosen_spanish: Pero ... siervos
  alternatives_spanish:
  - Y ... siervos
  - Pero ... servidores
  lexicon: HALOT
  rationale: La conjunción puede ser coordinante o adversativa según el contexto. Aquí se refleja mejor el contraste narrativo con el versículo anterior usando «Pero». Para עֲבָדִים, «siervos» conserva la idea de personas al servicio de David sin forzar «esclavos», que sería demasiado fuerte para este contexto militar/cortesano.
- source_word: דָוִד
  english_pob_choice: David’s
  chosen_spanish: de David
  alternatives_spanish:
  - de David
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio con posesión natural en español.
- source_word: הִכּוּ
  english_pob_choice: struck down
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - derribaron
  - mataron
  lexicon: HALOT
  rationale: נכה suele significar «golpear/herir» y en contexto de batalla implica derrota mortal. «Hirieron» mantiene el valor verbal básico sin resolver demasiado pronto la relación entre el golpe y el resultado mortal, que se expresa en el contexto mediante el conteo de muertos.
- source_word: מִ/בִּנְיָמִן
  english_pob_choice: from Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - de Benjamín
  - entre los benjaminitas
  lexicon: HALOT
  rationale: El prefijo מִן marca el grupo de procedencia de las bajas. «De Benjamín» es claro, natural y fiel al referente tribal.
- source_word: וּ/בְ/אַנְשֵׁי אַבְנֵר
  english_pob_choice: and from Abner’s men
  chosen_spanish: y de los hombres de Abner
  alternatives_spanish:
  - y entre los hombres de Abner
  - y de los guerreros de Abner
  lexicon: HALOT
  rationale: La construcción identifica un segundo grupo de bajas. En español, «hombres de Abner» reproduce bien el sentido de combatientes adscritos a él. El «de» paralelo a Benjamín mantiene la estructura de procedencia de las bajas.
- source_word: שְׁלֹשׁ מֵאוֹת וְשִׁשִּׁים
  english_pob_choice: three hundred and sixty
  chosen_spanish: trescientos sesenta
  alternatives_spanish:
  - trescientos sesenta
  lexicon: Numerales
  rationale: Equivalencia cardinal directa y natural en español.
- source_word: אִישׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: HALOT
  rationale: Aunque en hebreo aparece en singular tras el número, en español el numeral exige plural. «Hombres» es idiomático y adecuado para combatientes.
theological_decisions:
- issue: Sentido de la conjunción inicial en relación con el versículo anterior
  english_pob_reading: But ...
  chosen_spanish_reading: Pero ...
  alternative_spanish_readings:
  - Y ...
  - Mas ...
  rationale: La lectura adversativa comunica mejor el contraste entre la pérdida previa y la respuesta militar de los hombres de David. No introduce una idea doctrinal nueva, sino una relación discursiva del relato.
  doctrine_reference: Coherencia narrativa del texto bíblico
- issue: Relación entre «hirieron» y el número de muertos
  english_pob_reading: struck down ...
  chosen_spanish_reading: hirieron ...
  alternative_spanish_readings:
  - mataron ...
  - derribaron ...
  rationale: 'Se conserva la tensión del hebreo: el verbo expresa el golpe/derrota militar y el número total de bajas queda implícito en el recuento. No se borra la fuerza bélica ni se transforma el verso en una simple afirmación de homicidio sin matiz.'
  doctrine_reference: Precisión semántica del relato histórico
translation_notes:
  revision_awareness: El audit trail inglés primero vertió la conjunción como «But» por contraste, con nota de que el hebreo también puede leerse simplemente «And». La revisión posterior reordenó la oración en inglés para mayor naturalidad y quitó la cláusula redundante «who died». En español se adopta una redacción natural y concisa que conserva el contraste narrativo sin añadir redundancia.
  spanish_consistency_notes:
  - Se mantiene «Benjamín» como nombre tribal en forma estándar española.
  - Se usa «siervos» para עֲבָדִים por el sentido de subordinados al servicio de David en contexto militar; no se usa «esclavos» porque sería excesivo aquí.
  - Se conserva «hombres de Abner» para אַנְשֵׁי אַבְנֵר, siguiendo el sentido de combatientes asociados con él.
  - No se añade una cláusula equivalente a «quienes murieron», ya que el hebreo la expresa de forma redundante junto con el recuento y el audit trail inglés la omitió por naturalidad.
