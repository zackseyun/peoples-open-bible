- from: 'Pero él dijo: «No puedes ver mi rostro[a], porque no me verá[b] el hombre y vivirá».'
  to: 'Pero él dijo: «No puedes ver mi rostro[a], porque el hombre[b] no puede verme y vivir».'
  rationale: Se ajusta solo la cláusula final para lograr un español más natural y transparente sin perder el singular genérico ni el antropomorfismo del hebreo. También se mueve el anclaje de la nota cultural al término que realmente explica.
