    rationale: δοθήτω y τεθήτω son pasivos imperativos formales. «que le sea dada» y «que sea colocada» preservan mejor la forma y el tono administrativo del original.
  - severity: low
    issue: «lugar visible» debilita el matiz de ἐπισήμῳ.
    rationale: El término no solo sugiere visibilidad física, sino un lugar destacado, notable o señalado oficialmente. «Lugar destacado» conserva mejor ese rango semántico.
  revised_spanish_text: Ahora bien, procuren hacer una copia de estas cosas, y que le sea dada a Jonatán, y que sea colocada en el monte santo, en un lugar destacado[a].
