translation:
  language: es
  text: Y se quitó el cilicio que llevaba, y se despojó de las vestiduras de su viudez. Se lavó el cuerpo con agua y se ungió con perfume[a], arregló su cabello y se puso una diadema[b], y se vistió con sus vestiduras festivas, con las que solía adornarse durante los días de la vida de su esposo Manasés[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ungüento perfumado». El griego puede denotar perfume o ungüento perfumado, con el adjetivo sugiriendo riqueza o espesor.
    reason: lexical_alternative
  - marker: b
    text: O «turbante» o «tocado». El término griego se refiere a una cubierta o adorno para la cabeza.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «durante los días de la vida de su esposo Manasés».
    reason: lexical_alternative
lexical_decisions:
- source_word: περιείλατο
  english_pob_choice: took off
  chosen_spanish: se quitó
  alternatives_spanish:
  - se despojó de
  - se sacó
  lexicon: LSJ
  rationale: El griego medio indica quitar de sí una prenda; «se quitó» es natural en español y mantiene el valor de acción sobre la propia vestimenta.
- source_word: σάκκον
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco de penitencia
  - tela basta
  lexicon: LSJ
  rationale: En contexto bíblico de duelo y aflicción, «cilicio» comunica mejor la prenda penitencial tradicional; se conserva el matiz de vestidura de luto sin perder inteligibilidad eclesial.
- source_word: ἐνεδύκει
  english_pob_choice: had been wearing
  chosen_spanish: llevaba
  alternatives_spanish:
  - había estado llevando
  - vestía
  lexicon: LSJ
  rationale: El pluscuamperfecto/imperfectivo del griego se refleja de forma natural con «llevaba», que expresa estado previo continuo antes de quitárselo.
- source_word: ἐξεδύσατο
  english_pob_choice: removed
  chosen_spanish: se despojó de
  alternatives_spanish:
  - se quitó
  - se desvistió de
  lexicon: LSJ
  rationale: «Se despojó de» reproduce con algo más de fuerza el quitarse una vestidura, y evita repetir mecánicamente el primer verbo.
- source_word: τὰ ἱμάτια τῆς χηρεύσεως
  english_pob_choice: the garments of her widowhood
  chosen_spanish: las vestiduras de su viudez
  alternatives_spanish:
  - las ropas de su viudez
  - las vestiduras del duelo de viuda
  lexicon: LSJ
  rationale: Se conserva el genitivo abstracto de estado social/religioso con «viudez», siguiendo de cerca la construcción griega y manteniendo visible el contraste narrativo.
- source_word: περιεκλύσατο
  english_pob_choice: washed
  chosen_spanish: se lavó
  alternatives_spanish:
  - se bañó
  - se enjuagó
  lexicon: LSJ
  rationale: El verbo describe lavar el cuerpo con agua; «se lavó» es fiel y no añade la especificidad de un baño completo que el griego no exige.
- source_word: ἔχρισατο μύρῳ παχεῖ
  english_pob_choice: anointed herself with rich perfume
  chosen_spanish: se ungió con perfume rico
  alternatives_spanish:
  - se ungió con ungüento rico
  - se perfumó con ungüento rico
  lexicon: LSJ
  rationale: «Ungió» conserva el verbo de unción; «perfume rico» sigue la decisión inglesa de μύρον como sustancia perfumada y παχύς como riqueza/densidad, no solo costo. Se evita «aceite» porque el texto apunta a perfume/ungüento aromático.
- source_word: διέταξε τὰς τρίχας τῆς κεφαλῆς αὐτῆς
  english_pob_choice: arranged the hair of her head
  chosen_spanish: ordenó el cabello de su cabeza
  alternatives_spanish:
  - arregló el cabello de su cabeza
  - peinó el cabello de su cabeza
  lexicon: LSJ
  rationale: «Ordenó» refleja el sentido de poner en orden sin especificar una técnica de peinado que el griego no menciona; «cabello de su cabeza» sigue de cerca la estructura original.
- source_word: μίτραν
  english_pob_choice: headband
  chosen_spanish: mītra
  alternatives_spanish:
  - tocado
  - cinta para la cabeza
  - diadema
  lexicon: LSJ
  rationale: El término griego es un tocado o banda ornamental. Se deja sin traducir en el texto principal como término cultural específico, y se aclara su sentido mediante nota para no fijar indebidamente una sola forma española.
- source_word: τὰ ἱμάτια τῆς εὐφροσύνης αὐτῆς
  english_pob_choice: her festive garments
  chosen_spanish: las vestiduras de su alegría
  alternatives_spanish:
  - sus vestiduras festivas
  - las ropas de su alegría
  lexicon: LSJ
  rationale: «εὐφροσύνη» es alegría/festividad; se conserva el sustantivo abstracto «alegría» para mantener el contraste lexical con «viudez», mientras el sentido de gala queda visible por el contexto y la nota interna del pasaje.
- source_word: ἐστολίζετο
  english_pob_choice: used to adorn herself
  chosen_spanish: solía adornarse
  alternatives_spanish:
  - se adornaba habitualmente
  - solía ataviarse
  lexicon: LSJ
  rationale: El imperfecto habitual se expresa bien con «solía adornarse», que comunica costumbre pasada y el matiz de ataviarse con prendas especiales.
- source_word: ἐν ταῖς ἡμέραις τῆς ζωῆς τοῦ ἀνδρὸς αὐτῆς Μανασσή
  english_pob_choice: during the days of her husband Manasseh’s life
  chosen_spanish: durante los días de la vida de su esposo Manasés
  alternatives_spanish:
  - mientras vivía su esposo Manasés
  - en la vida de su esposo Manasés
  lexicon: LSJ
  rationale: Se conserva la literalidad del giro temporal griego sin forzarlo, manteniendo el nombre propio y el valor de duración ligado a la vida del esposo.
theological_decisions:
- issue: Luto/viudez frente a adorno festivo
  english_pob_reading: Retained explicit references to sackcloth and garments of her widowhood rather than smoothing to generic mourning clothes.
  chosen_spanish_reading: Se mantienen referencias explícitas al cilicio y a las vestiduras de su viudez, en contraste con las vestiduras de su alegría.
  alternative_spanish_readings:
  - ropas de duelo
  - vestiduras de luto
  rationale: El versículo subraya la transición narrativa entre condición de duelo y adorno deliberado. Conservar ambos polos hace visible el cambio social y simbólico sin interpretarlo en exceso.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: μίτραν como objeto cultural específico
  english_pob_reading: Or 'put on a turban/headdress.' The Greek term refers to a head covering or ornamental band.
  chosen_spanish_reading: Se translitera 'mītra' en el texto principal y se explica su valor como tocado/cinta ornamental en nota.
  alternative_spanish_readings:
  - turbante
  - tocado
  - diadema
  rationale: Como el término puede abarcar varias formas de adorno para la cabeza, una sola equivalencia española cerrada podría empobrecer el original. La transliteración preserva la ambigüedad documentada y permite una nota explicativa.
  doctrine_reference: Translation philosophy §§2, 4, 6
translation_notes:
  revision_awareness: La auditoría inglesa revisó μύρῳ παχεῖ desde 'thick perfume' a 'rich perfume' por naturalidad, sin cambiar el sentido; la presente versión española conserva ese equilibrio con «perfume rico». También se tuvo en cuenta que la nota inglesa sobre μίτραν admite 'headband/turban/headdress', por lo que el español evita cerrar prematuramente la referencia corporal o cultural. No se detectan otras revisiones sustantivas que afecten la sintaxis o el contenido.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando aparezca un equivalente del Tetragrámaton; este verso no lo contiene.
  - Se usa 'viudez' para τῆς χηρεύσεως y no 'duelo', para conservar el estado social explícito.
  - '''Ungió'' se reserva para ἔχρισατο; no se reemplaza por ''perfumo'' en el texto principal para no perder la forma verbal del original.'
  - Se prefirió un ritmo de lista con comas, acorde al encadenamiento griego, sin añadir conectores explicativos.
  - La transliteración 'mītra' en el texto principal es una decisión deliberada para señalar una realidad cultural específica y mantener abierta la ambigüedad del original.
