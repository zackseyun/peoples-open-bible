base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/060.yaml
  text: '⟨They saw⟩ a Samaritan carrying a lamb[⟨They saw⟩], going into Judea. He said to his disciples, "That one around the lamb?"

    They said to him, "So that he may kill it and eat it."

    He said to them, "As long as it is alive, he will not eat it, but if he kills it and it becomes a corpse."

    They said, "Otherwise he will not be able to do it."

    He said to them, "You yourselves, seek a place for yourselves in rest[and they eat you][That one around the lamb?], so that you will not become a corpse and they eat you."'
  footnotes:
  - marker: ⟨They saw⟩
    text: The manuscript lacks a main verb here, reading literally 'to a Samaritan.' Editors supply 'They saw' (ⲁⲩⲛⲁⲩ) to complete the sense.
    reason: textual_variant
  - marker: That one around the lamb?
    text: The Coptic is elliptical, literally 'That one around the lamb?' The disciples' response ('So that he may kill it...') indicates they understood it as a question about the man's intentions.
    reason: lexical_alternative
  - marker: and they eat you
    text: The Coptic uses an active third-person plural ('and they eat you'), which functions similarly to an English passive ('and you be eaten') but is more vivid.
    reason: register_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: '⟨Vieron⟩ a un samaritano que llevaba un cordero y entraba en Judea. Él dijo a sus discípulos: «¿Ese, en torno al cordero?[a]». Ellos le dijeron: «Para que lo mate y lo coma». Él les dijo: «Mientras esté vivo, no lo comerá; pero si lo mata y llega a ser un cadáver[b], lo comerá». Ellos dijeron: «De otro modo no podrá hacerlo». Él les dijo: «Ustedes mismos busquen para ustedes un lugar de descanso[c], para que no lleguen a ser un cadáver y los coman[d]».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El copto es elíptico, literalmente «ese alrededor del cordero?». La respuesta de los discípulos muestra que lo entendieron como una pregunta sobre la intención del hombre.
    reason: lexical_alternative
  - marker: b
    text: El copto emplea el préstamo griego para «cadáver»; se conserva este matiz físico y no se suaviza como «cuerpo» o «muerto».
    reason: lexical_alternative
  - marker: c
    text: ἀνάπαυσις puede traducirse también «reposo» o «descanso»; aquí se opta por «lugar de descanso» para conservar el sentido de búsqueda de un sitio concreto.
    reason: lexical_alternative
  - marker: d
    text: El copto usa un activo de tercera persona plural, «y los coman», más vívido que una pasiva impersonal como «y sean comidos».
    reason: register_note
lexical_decisions:
- source_word: ⲁⲩⲛⲁⲩ
  english_pob_choice: They saw
  chosen_spanish: Vieron
  alternatives_spanish:
  - Vieron ellos
  - Ellos vieron
  lexicon: Crum 248a
  rationale: El testimonio coptico carece de verbo principal en la forma manuscrita y los editores suplen el sentido con «vieron». En español, la forma impersonal con sujeto implícito conserva la concisión del original y la decisión editorial auditada.
- source_word: ⲥⲁⲙⲁⲣⲉⲓⲧⲏⲥ
  english_pob_choice: Samaritan
  chosen_spanish: samaritano
  alternatives_spanish:
  - samaritana
  - habitante de Samaria
  lexicon: Crum 318b
  rationale: El sustantivo designa al hombre como samaritano; «samaritano» es la equivalencia natural y fiel en español.
- source_word: ⲡⲏ
  english_pob_choice: That one
  chosen_spanish: Ese
  alternatives_spanish:
  - Aquel
  - Ese hombre
  lexicon: Crum 254a
  rationale: El demostrativo es elíptico y retórico. «Ese» mantiene la extrañeza del texto sin explicitar de más la pregunta, como hace la POB inglesa con «That one».
- source_word: ⲕⲱⲧⲉ
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - acerca de
  lexicon: Crum 120b
  rationale: La construcción copta es espacial y el español «alrededor de» reproduce con claridad el valor preposicional sin convertirlo en paráfrasis interpretativa.
- source_word: ⲡⲧⲱⲙⲁ
  english_pob_choice: corpse
  chosen_spanish: cadáver
  alternatives_spanish:
  - cuerpo muerto
  - carcasa
  - muerto
  lexicon: BDAG 893
  rationale: El préstamo griego significa un cuerpo caído o muerto. «Cadáver» es la opción más natural y precisa en español; en el primer caso aparece en singular por el referente del cordero, y luego se conserva el mismo término para mantener la coherencia léxica.
- source_word: ϣⲁ
  english_pob_choice: be able
  chosen_spanish: podrá
  alternatives_spanish:
  - será capaz
  - tendrá poder de
  lexicon: Crum 551a
  rationale: La construcción futura copta expresa capacidad futura. «Podrá» refleja bien el valor de posibilidad/capacidad sin volverlo una perífrasis demasiado pesada.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  english_pob_choice: rest
  chosen_spanish: lugar de descanso
  alternatives_spanish:
  - descanso
  - reposo
  lexicon: BDAG 73
  rationale: En Thomas, ἀνάπαυσις tiene peso temático y no solo indica descanso físico. «Lugar de descanso» conserva el valor locativo que exige el contexto («busquen para ustedes un lugar») y preserva el eco terminológico del original.
theological_decisions:
- issue: Conservación de la frase elíptica y enigmática sobre el cordero
  english_pob_reading: That one around the lamb?
  chosen_spanish_reading: ¿Ese, alrededor del cordero?
  alternative_spanish_readings:
  - ¿Por qué ese anda con el cordero?
  - ¿Ese hombre que lleva el cordero?
  rationale: El copto es sumamente elíptico; la respuesta de los discípulos muestra que entendieron la frase como una pregunta sobre la intención del hombre. La versión española conserva esa rareza sintáctica en lugar de aclararla en exceso.
  doctrine_reference: No aplica; decisión de forma y tono del dicho
- issue: Futuro de capacidad en «no podrá hacerlo»
  english_pob_reading: he will not be able to do it
  chosen_spanish_reading: no podrá hacerlo
  alternative_spanish_readings:
  - no es capaz de hacerlo
  - no lo podrá hacer
  rationale: El copto usa una forma futura con valor de capacidad. El español futuro «podrá» mantiene la tensión entre posibilidad y capacidad, y respeta la revisión auditada que corrigió una lectura presente.
  doctrine_reference: No aplica; observación gramatical del sahídico
- issue: Traducción de ἀνάπαυσις en un contexto simbólico-escatológico
  english_pob_reading: rest
  chosen_spanish_reading: lugar de descanso
  alternative_spanish_readings:
  - reposo
  - descanso
  rationale: En Tomás, ἀνάπαυσις suele funcionar como término de carga espiritual. «Lugar de descanso» preserva la dimensión concreta de la búsqueda y evita reducir el término a mera comodidad física.
  doctrine_reference: Tradición lexical de Tomás; BDAG 73
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la respuesta de los discípulos para conservar el valor finalidad de ϫⲉⲕⲁⲁⲥ («para que») y la revisión que fijó ϥⲛⲁϣⲁⲥ ⲁⲛ como «no podrá» en lugar de un presente. También se respetó la decisión editorial de mantener la pregunta elíptica y el uso de «corpse/cadáver» para πτῶμα.
  spanish_consistency_notes:
  - Se mantiene «cadáver» para πτῶμα en ambas apariciones a fin de preservar coherencia léxica.
  - Se mantiene el registro sobrio y enigmático de la frase sobre el cordero, sin convertirla en explicación interpretativa.
  - Se usa «samaritano» como gentilicio sustantivado estándar en español.
  - Se evita «Señor» o «Cristo» porque no aparecen en el pasaje ni corresponden a la terminología fuente.
  - Se conserva el plural inclusivo «ustedes mismos» para reflejar el énfasis copto en el destinatario colectivo.
