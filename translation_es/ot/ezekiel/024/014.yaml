translation:
  language: es
  text: Yo, Yahvé, he hablado; viene, y yo lo haré. No me detendré[a], ni tendré compasión, ni cederé[b]. Conforme a tus caminos y conforme a tus hechos te juzgarán[c], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no me retiraré» / «no aflojaré» para «no me detendré».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no cambiaré de parecer» para «no cederé».'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo tiene un plural no especificado: «te juzgarán», que puede referirse a los agentes del juicio de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino personal del Tetragrámaton con la forma ya establecida en el proyecto: «Yahvé». Evita la sustitución por un título y mantiene la transparencia hacia el hebreo.'
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  - hablé
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una declaración ya pronunciada con vigencia en el contexto profético; «he hablado» comunica bien esa fuerza solemne en español.
- source_word: בָּאָה
  english_pob_choice: it is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  lexicon: HALOT
  rationale: El verbo femenino singular alude al juicio/calamidad implícito. «Viene» es natural en español y mantiene el sentido de inminencia sin convertirlo en pasado.
- source_word: וְעָשִׂיתִי
  english_pob_choice: and I will do it
  chosen_spanish: y yo lo haré
  alternatives_spanish:
  - y lo haré
  - y actuaré
  lexicon: HALOT
  rationale: Aunque morfológicamente perfecto, aquí funciona con valor futurizante en la secuencia profética. «Lo haré» reproduce esa determinación de cumplimiento.
- source_word: אֶפְרַע
  english_pob_choice: hold back
  chosen_spanish: me detendré
  alternatives_spanish:
  - me retraeré
  - me echaré atrás
  - retendré mi mano
  lexicon: HALOT
  rationale: «No me detendré» capta la idea de no frenar ni retirar la acción de juicio. Mantiene la fuerza sin forzar una metáfora poco natural en español.
- source_word: אָחוּס
  english_pob_choice: spare
  chosen_spanish: tendré compasión
  alternatives_spanish:
  - perdonaré
  - ahorraré
  - me apiadaré
  lexicon: HALOT
  rationale: En contexto judicial, el hebreo puede significar «ahorrar/perdonar por compasión». Se eligió «tendré compasión» para conservar la dimensión afectiva y la tensión teológica sin volverlo más técnico de lo necesario.
- source_word: אֶנָּחֵם
  english_pob_choice: relent
  chosen_spanish: me arrepentiré
  alternatives_spanish:
  - cambiaré de parecer
  - me retractaré
  - me arrepentiré y desistiré
  lexicon: HALOT
  rationale: Se conserva la tensión del hebreo נָחַם con un término español que puede sugerir desistir/cambiar de actitud. En este contexto de juicio, «me arrepentiré» no implica pecado, sino el posible giro del decreto, algo que el texto niega. Se deja la tensión visible en vez de resolverla demasiado.
- source_word: כִּדְרָכַיִךְ
  english_pob_choice: according to your ways
  chosen_spanish: conforme a tus caminos
  alternatives_spanish:
  - según tus caminos
  - de acuerdo con tus caminos
  - conforme a tu conducta
  lexicon: HALOT
  rationale: «Caminos» conserva el valor metafórico ético del hebreo y suena natural en español bíblico contemporáneo.
- source_word: וְכַעֲלִילוֹתַיִךְ
  english_pob_choice: and according to your deeds
  chosen_spanish: y conforme a tus hechos
  alternatives_spanish:
  - y conforme a tus obras
  - y según tus actos
  - y conforme a tus acciones
  lexicon: HALOT
  rationale: «Hechos» reproduce bien el sentido moral de עֲלִילוֹת en un oráculo de juicio y evita un matiz demasiado técnico o arcaico.
- source_word: שְׁפָטוּךְ
  english_pob_choice: they will judge you
  chosen_spanish: te juzgarán
  alternatives_spanish:
  - te van a juzgar
  - serás juzgada
  - te juzgarán ellos
  lexicon: HALOT
  rationale: 'El hebreo presenta un plural no especificado con sufijo de segunda femenina singular. El español puede conservar la pasiva implícita con un activo impersonal: «te juzgarán», sin identificar indebidamente a los agentes.'
- source_word: אֲדֹנָי יְהֹוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: Se distingue el título אֲדֹנָי («Señor») del nombre divino יְהוִה («Yahvé»), evitando la convención de máscara «SEÑOR» y manteniendo la combinación reverencial del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La traducción sigue la política del proyecto de transliterar el Nombre divino en vez de sustituirlo por un título. «Yahvé» preserva la referencia al nombre de pacto revelado en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: נָחַם aplicado a Dios en juicio
  english_pob_reading: relent
  chosen_spanish_reading: me arrepentiré
  alternative_spanish_readings:
  - cambiaré de parecer
  - me retractaré
  - cederé
  rationale: El hebreo comunica la posibilidad de desistir o volverse atrás del juicio anunciado. En español, «me arrepentiré» conserva esa fuerza y deja visible la tensión teológica; el contexto de juicio impide leerlo como pecado o error moral en Dios.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Plural implícito en שְׁפָטוּךְ
  english_pob_reading: they will judge you
  chosen_spanish_reading: te juzgarán
  alternative_spanish_readings:
  - serás juzgada
  - te juzgarán ellos
  rationale: El hebreo no nombra explícitamente a los agentes. El español impersonal plural conserva la indeterminación y evita añadir sujetos no presentes en la fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Source transparency and minimal supplementation'
translation_notes:
  revision_awareness: Se siguió de cerca el último estado del texto inglés POB, que mantiene Yahweh, el valor futurizante de «it is coming / and I will do it», y la tensión de נָחַם con una nota alternativa. No se reportan cambios posteriores en la revisión más reciente, por lo que el borrador español se alinea con ese audit trail estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, en coherencia con la política del proyecto.
  - Se conserva la secuencia oracular breve y enfática del hebreo, sin expandirla interpretativamente.
  - Se evita la máscara «SEÑOR» para יְהוָה; «Señor» se usa solo para אֲדֹנָי en la fórmula final.
  - La forma verbal en primera persona singular y los futuros mantienen el tono de sentencia divina inminente.
  - Las notas preservan la alternativa semántica donde el inglés POB también documenta tensión lexical.
