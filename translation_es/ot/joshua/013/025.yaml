- from: Y fue su territorio Jazer[a], y todas las ciudades de Galaad, y la mitad de la tierra de los amonitas, hasta Aroer, que está frente a Rabá.
  to: Y su territorio era Jazer,[a] y todas las ciudades de Galaad, y la mitad de la tierra de los amonitas, hasta Aroer, que está frente a Rabá.
