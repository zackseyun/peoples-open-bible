  to: Estos son los hijos[a] de la provincia que subieron del cautiverio de los exiliados[b], a quienes Nabucodonosor[c], rey de Babilonia, había llevado cautivos a Babilonia, y regresaron a Jerusalén y a Judá, cada uno a su ciudad.
