id: 2SA.11.2
reference: 2 Samuel 11:2
source:
  edition: WLC
  text: וַ/יְהִ֣י לְ/עֵ֣ת הָ/עֶ֗רֶב וַ/יָּ֨קָם דָּוִ֜ד מֵ/עַ֤ל מִשְׁכָּב/וֹ֙ וַ/יִּתְהַלֵּךְ֙ עַל גַּ֣ג בֵּית הַ/מֶּ֔לֶךְ וַ/יַּ֥רְא אִשָּׁ֛ה רֹחֶ֖צֶת מֵ/עַ֣ל הַ/גָּ֑ג וְ/הָ֣/אִשָּׁ֔ה טוֹבַ֥ת מַרְאֶ֖ה מְאֹֽד׀־־׃
translation:
  text: Then at evening time David arose from his bed and walked on the roof of the king’s house[a], and from the roof he saw a woman bathing[b]; and the woman was very beautiful in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and it happened at the time of evening.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the king’s house'; 'palace' is a possible contextual rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לְעֵת הָעֶרֶב
  chosen: Then at evening time
  alternatives:
  - And it happened at the time of evening
  - Toward evening
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol plus temporal phrase introduces the scene. 'Then at evening time' preserves the narrative progression and temporal setting in natural English without over-literal awkwardness.
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - rose
  lexicon: HALOT
  rationale: A straightforward rendering of קום. 'Arose' fits the narrative register slightly better than the more colloquial 'got up.'
- source_word: מֵעַל מִשְׁכָּבוֹ
  chosen: from his bed
  alternatives:
  - from his couch
  - from where he was lying
  lexicon: HALOT
  rationale: מִשְׁכָּב can denote a bed or place of lying down. 'Bed' is the most natural English equivalent here and suits the domestic setting.
- source_word: וַיִּתְהַלֵּךְ
  chosen: was walking
  alternatives:
  - walked about
  - strolled
  lexicon: HALOT
  rationale: The hitpael form suggests iterative or durative movement. 'Was walking' captures the ongoing action better than a simple past, while avoiding the potentially too interpretive 'strolled.'
- source_word: עַל גַּג בֵּית הַמֶּלֶךְ
  chosen: on the roof of the king’s house
  alternatives:
  - on the rooftop of the royal palace
  - on the roof of the palace
  lexicon: HALOT
  rationale: Literally 'on the roof of the house of the king.' 'The king’s house' stays close to the Hebrew while remaining idiomatic. 'Palace' is possible but slightly more interpretive than the source wording.
- source_word: וַיַּרְא אִשָּׁה רֹחֶצֶת
  chosen: he saw a woman bathing
  alternatives:
  - he saw a woman washing herself
  - he saw a woman who was bathing
  lexicon: HALOT
  rationale: The participle רֹחֶצֶת describes ongoing action. 'A woman bathing' is concise and natural English, accurately reflecting the participial sense.
- source_word: מֵעַל הַגָּג
  chosen: from the roof
  alternatives:
  - from upon the roof
  lexicon: HALOT
  rationale: 'This most naturally modifies David''s vantage point: he saw her from the roof. Rendering it explicitly in English avoids ambiguity and preserves the spatial detail.'
- source_word: טוֹבַת מַרְאֶה מְאֹד
  chosen: very beautiful in appearance
  alternatives:
  - very beautiful
  - very good-looking
  - very fair to look upon
  lexicon: HALOT
  rationale: The phrase literally refers to being good/pleasing of appearance. 'Very beautiful in appearance' preserves the visual emphasis of מַרְאֶה better than simply 'very beautiful,' while remaining readable modern English.
