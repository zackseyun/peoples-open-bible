translation:
  text: and on them were strong wooden towers[a], covered over, on each beast, fitted on them with engines; and on each one were thirty-two fighting men[b], and its Indian driver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'its Indian.' The phrase likely refers to the Indian handler or driver assigned to each elephant.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'beast' here; the wider context indicates these were elephants.
    reason: lexical_alternative
lexical_decisions:
- source_word: πύργοι ξύλινοι
  chosen: wooden towers
  alternatives:
  - wooden turrets
  lexicon: LSJ
  rationale: πύργοι are towers or turrets; 'wooden towers' is the straightforward rendering and fits siege-like structures mounted on elephants.
- source_word: ὀχυροὶ
  chosen: strong
  alternatives:
  - fortified
  - stout
  lexicon: LSJ
  rationale: The adjective conveys sturdiness/defensibility. 'Strong' is natural English and preserves the sense without over-specifying military fortification.
- source_word: σκεπαζόμενοι
  chosen: covered over
  alternatives:
  - roofed
  - covered
  lexicon: LSJ
  rationale: The participle indicates being covered or roofed. 'Covered over' keeps the passive sense and avoids implying a specific architectural form beyond the Greek.
- source_word: θηρίου
  chosen: beast
  alternatives:
  - animal
  - elephant
  lexicon: LSJ
  rationale: Literally the Greek says 'beast.' In context the animals are war elephants, but because the noun itself is generic here, 'beast' preserves the source wording while the context makes the referent clear.
- source_word: ἐζωσμένοι ... μηχαναῖς
  chosen: fitted ... with engines
  alternatives:
  - equipped ... with machines
  - girded ... with devices
  lexicon: LSJ
  rationale: ἐζωσμένοι literally suggests being girded/equipped, and μηχαναῖς refers to contrivances or war engines. 'Fitted ... with engines' gives clear military sense in idiomatic English.
- source_word: ἄνδρες δύο καὶ τριάκοντα
  chosen: thirty-two men
  alternatives:
  - two and thirty men
  lexicon: LSJ
  rationale: This is the natural English equivalent of the Greek numeral expression.
- source_word: οἱ πολεμοῦντες
  chosen: who fought
  alternatives:
  - the fighters
  - who were fighting
  lexicon: LSJ
  rationale: The participle identifies the men by their combat role. 'Who fought' is concise and natural in English.
- source_word: ὁ Ἰνδὸς αὐτοῦ
  chosen: its Indian driver
  alternatives:
  - its Indian
  - its Indian mahout
  lexicon: LSJ
  rationale: Literally 'its Indian.' In context this refers to the Indian handler assigned to each elephant. 'Indian driver' makes the role explicit without importing the more specialized loanword 'mahout,' which is not in the Greek.
