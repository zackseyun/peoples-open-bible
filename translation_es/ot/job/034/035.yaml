    rationale: 'El hebreo repite una construcción negativa de modo: «no con conocimiento ... no con entendimiento». «Carecen de entendimiento» transmite la idea general, pero cambia el perfil semántico y el paralelismo poético al convertirlo en carencia posesiva de «las palabras».'
