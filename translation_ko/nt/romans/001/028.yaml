id: ROM.1.28
reference: Romans 1:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ καθὼς οὐκ ἐδοκίμασαν τὸν θεὸν ἔχειν ἐν ἐπιγνώσει, παρέδωκεν αὐτοὺς ὁ θεὸς εἰς ἀδόκιμον νοῦν, ποιεῖν τὰ μὴ καθήκοντα,
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/028.yaml
  text: And just as they did not see fit to have God in their knowledge[a], God gave them over to a debased mind, to do what is not fitting[b],
  footnotes:
  - marker: a
    text: Or 'to retain God in their knowledge.'
    reason: lexical_alternative
  - marker: b
    text: '''Unfit'' translates a word related to ''see fit'' earlier in the verse, preserving Paul''s wordplay; alternatively, ''debased mind.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 그들이 하나님을 그 지식 가운데 두기를 합당하게 여기지 않았으므로, 하나님께서는 그들을 합당하지 못한 마음에 내버려 두셔서 마땅하지 못한 일을 행하게 하셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἐδοκίμασαν / ἀδόκιμον
  english_pob_choice: did not see fit / debased
  chosen_korean: 합당하게 여기지 않았 / 합당하지 못한
  alternatives_korean:
  - 받아들이지 않 / 인정받지 못한
  lexicon: BDAG
  rationale: 바울의 동족 어원 말놀이(δοκιμ-)를 한국어 「합당-」으로 보존한다.
- source_word: τὰ μὴ καθήκοντα
  english_pob_choice: what is not fitting
  chosen_korean: 마땅하지 못한 일
  alternatives_korean:
  - 부당한 일
  - 해서는 안 될 일
  lexicon: BDAG
  rationale: 스토아 윤리 용어 καθῆκον의 함의를 한국어 「마땅한 일」로 옮긴다.
