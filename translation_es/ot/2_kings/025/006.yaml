translation:
  language: es
  text: Entonces capturaron al rey y lo llevaron al rey de Babilonia, en Ribla[a], y pronunciaron juicio contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «hablaron juicio con él», un modismo que significa que pronunciaron juicio judicial contra él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפְּשׂוּ
  english_pob_choice: captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - aprehendieron
  - se apoderaron de
  lexicon: HALOT
  rationale: תפשׂ en este contexto describe la captura efectiva de un rey fugitivo. «Capturaron» es natural en español contemporáneo y conserva la fuerza de la acción sin volverse técnico o arcaico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo mantiene el referente definido sin repetir el nombre personal. «El rey» conserva esa forma discursiva y es la opción más directa y transparente en español.
- source_word: וַיַּעֲלוּ אֹתוֹ
  english_pob_choice: brought him up
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo hicieron subir
  - lo llevaron arriba
  lexicon: HALOT
  rationale: עלה literalmente puede ser «subir» o «llevar arriba», pero en español «lo llevaron» transmite el traslado sin una calca forzada. La idea direccional queda absorbida por el contexto hacia Ribla y no requiere una expresión pesada.
- source_word: אֶל מֶלֶךְ בָּבֶל
  english_pob_choice: to the king of Babylon
  chosen_spanish: ante el rey de Babilonia
  alternatives_spanish:
  - al rey de Babilonia
  lexicon: HALOT
  rationale: Aunque אֶל puede ser simplemente «a», el contexto judicial/palaciego implica comparecencia ante autoridad. «Ante el rey de Babilonia» expresa mejor la escena sin contradecir el hebreo, y preserva el sentido de audiencia judicial indicado por el resto del versículo.
- source_word: רִבְלָתָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblatá
  - en Ribla[a]
  lexicon: HALOT
  rationale: El topónimo se adapta de forma usual al español bíblico como «Ribla». La vocal final del hebreo con he direccional no exige reproducirse en español; «en Ribla» comunica la localización natural del acto.
- source_word: וַיְדַבְּרוּ אִתּוֹ מִשְׁפָּט
  english_pob_choice: they pronounced judgment on him
  chosen_spanish: dictaron sentencia sobre él
  alternatives_spanish:
  - pronunciaron juicio sobre él
  - hablaron juicio con él
  lexicon: HALOT
  rationale: El giro דבר + משפט es un modismo judicial, no una mera conversación. «Dictaron sentencia» comunica con claridad la fuerza forense del hebreo y mantiene el valor de pronunciamiento judicial que la auditoría inglesa quiso preservar.
theological_decisions:
- issue: Sentido judicial del modismo דבר + משפט
  english_pob_reading: they pronounced judgment on him
  chosen_spanish_reading: dictaron sentencia sobre él
  alternative_spanish_readings:
  - pronunciaron juicio sobre él
  - hablaron juicio con él
  rationale: No se suaviza el hebreo a un simple intercambio verbal. La escena es de juicio/condena formal, y el español debe reflejar esa carga legal sin introducir elementos inexistentes en el texto.
  doctrine_reference: Derecho judicial en narración histórica; cf. el uso forense del lenguaje de sentencia en textos narrativos del AT.
translation_notes:
  revision_awareness: El inglés auditado revisó «passed sentence on him» a «pronounced judgment on him» para acercarse más al hebreo sin perder naturalidad. Esta versión española sigue esa intención, optando por una formulación forense clara («dictaron sentencia sobre él») y manteniendo la escena de comparecencia en Ribla.
  spanish_consistency_notes:
  - «Ribla» se usa como forma española del topónimo, coherente con el estilo bíblico en español.
  - Se evita «SEÑOR» o terminología eclesiástica no pertinente; el versículo es narrativo y judicial.
  - «Capturaron» y «dictaron sentencia» preservan la progresión verbal de captura, traslado y condena formal.
