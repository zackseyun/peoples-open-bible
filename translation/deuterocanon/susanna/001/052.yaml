theological_decisions:
- issue: Moral force of Daniel's address to the elder
  chosen_reading: The rebuke is rendered as an accusation of long-standing wickedness rather than merely advanced age.
  alternative_readings:
  - A more neutral 'old man of evil days'
  rationale: The context is judicial and condemnatory. The Greek vocative plus κακῶν carries moral censure, so the translation should preserve that force without adding details not in the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.'
