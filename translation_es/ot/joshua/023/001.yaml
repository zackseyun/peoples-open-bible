translation:
  language: es
  text: Y aconteció[a], después de muchos días, después de que Yahvé hubiera dado reposo a Israel de todos sus enemigos de alrededor, que Josué era viejo[b], avanzado en años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de un largo tiempo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: literalmente, «venido en días».'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y llegó a pasar
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un nuevo marco de escena. «Aconteció» conserva esa función discursiva en español con un tono digno y bíblico, sin depender de una fórmula anticuada.
- source_word: מִיָּמִים רַבִּים
  english_pob_choice: after many days
  chosen_spanish: después de muchos días
  alternatives_spanish:
  - después de mucho tiempo
  - tras largo tiempo
  lexicon: HALOT
  rationale: La expresión hebrea marca una cantidad considerable de tiempo transcurrido. «Después de muchos días» sigue de cerca el hebreo y suena natural en español.
- source_word: אַחֲרֵי אֲשֶׁר
  english_pob_choice: after
  chosen_spanish: después de que
  alternatives_spanish:
  - cuando
  - tras
  lexicon: HALOT
  rationale: La construcción compuesta introduce la referencia temporal del evento. En español, «después de que» expresa con claridad la relación temporal sin añadir interpretación extra.
- source_word: הֵנִיחַ
  english_pob_choice: had given ... rest
  chosen_spanish: hubiera dado reposo
  alternatives_spanish:
  - hubiera concedido reposo
  - hubiera hecho descansar
  lexicon: HALOT
  rationale: El Hiphil de נוח aquí tiene el sentido de otorgar descanso o alivio frente a enemigos. «Dar reposo» preserva el valor bíblico y la imagen idiomática sin volverla rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino, no un título. La norma del proyecto pide «Yahvé», que mantiene el nombre personal del pacto y evita la sustitución por un título.
- source_word: מִכָּל אֹיְבֵיהֶם מִסָּבִיב
  english_pob_choice: from all their enemies around them
  chosen_spanish: de todos sus enemigos alrededor de ellos
  alternatives_spanish:
  - de todos sus enemigos en derredor
  - de todos sus enemigos circundantes
  lexicon: HALOT
  rationale: La frase subraya la totalidad de la liberación y la ubicación espacial de los enemigos. «Alrededor de ellos» conserva el sentido de מִסָּבִיב con español claro y directo.
- source_word: וִיהוֹשֻׁעַ
  english_pob_choice: that Joshua
  chosen_spanish: que Josué
  alternatives_spanish:
  - y Josué
  lexicon: HALOT
  rationale: La waw enlaza la cláusula final con la introducción temporal. En español, «que Josué» hace natural la subordinación resultante del período largo.
- source_word: זָקֵן
  english_pob_choice: was old
  chosen_spanish: estaba viejo
  alternatives_spanish:
  - era viejo
  - estaba anciano
  lexicon: HALOT
  rationale: El hebreo presenta a Josué como entrado en edad. «Estaba viejo» reproduce directamente el predicado de edad; se mantiene junto con el modismo siguiente para no diluir el énfasis.
- source_word: בָּא בַּיָּמִים
  english_pob_choice: advanced in years
  chosen_spanish: avanzado en años
  alternatives_spanish:
  - entrado en días
  - de edad avanzada
  lexicon: HALOT
  rationale: La locución hebrea literalmente dice «había venido en días», un modismo para la vejez. «Avanzado en años» preserva el sentido idiomático en español, como en la auditoría inglesa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene explícitamente el Tetragrama. La política del proyecto exige transliterarlo como «Yahvé» para conservar el Nombre del pacto y no ocultarlo bajo un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La auditoría inglesa indica alta concordancia y sin cambios en la última revisión. Se conservan las dos notas de alternancia/idioma del inglés: la amplitud temporal de מִיָּמִים רַבִּים y el modismo de vejez בָּא בַּיָּמִים. No se introducen variantes textuales ni cambios doctrinales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para el Nombre divino.
  - Se usa «Josué» como forma estable del nombre propio.
  - Se conserva la distinción entre el dato temporal y el modismo de edad en dos notas separadas.
  - El orden general sigue la sintaxis hebrea sin sonar forzado en español.
