review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente la estructura y el sentido del hebreo: transición discursiva («Y ahora»), acto divino completado con vigencia presente («he escogido»), dedicación sagrada del templo («consagrado»), propósito («para que mi nombre esté allí»), duración continua («para siempre»), y preservación del antropomorfismo («mis ojos y mi corazón»). La nota sobre «esta casa» también corresponde bien al referente cultural del templo.'
  spanish_quality_summary: El español es claro y digno, pero «mis ojos y mi corazón estarán allí todos los días» suena menos natural en este contexto y puede leerse como frecuencia diaria más que continuidad permanente. «Siempre» expresa mejor כָּל הַיָּמִים aquí y además coincide con la revisión auditada del inglés. También conviene pulir la nota a «apartar como santo» o «apartar para uso santo» para español más natural.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé en el texto fuente de este versículo. «Consagrado», «nombre», «corazón» y el lenguaje antropomórfico están bien alineados con las decisiones léxicas y teológicas documentadas.
  issues:
  - severity: medium
    issue: «todos los días» para כָּל הַיָּמִים
    rationale: Aunque es literal y posible, en español contemporáneo aquí suena más a repetición cotidiana que a permanencia ininterrumpida. El contexto pide mejor «siempre», que también sigue la revisión final del English POB.
  - severity: low
    issue: Redacción de la nota léxica sobre «consagrado»
    rationale: «Apartar para ser santo» es comprensible, pero «apartar como santo» o «apartar para uso santo» suena más idiomático en español y explica mejor el valor de קדשׁ en hifil.
  revised_spanish_text: Y ahora he escogido y consagrado esta casa[a], para que mi nombre esté allí para siempre[b], y mis ojos y mi corazón estarán allí siempre.
  revised_footnotes:
  - marker: a
    text: O «santificado». El verbo hebreo significa apartar para uso santo.
    reason: lexical_alternative
  - marker: b
    text: «Esta casa» se refiere al templo.
    reason: cultural_note
  revision_rationale: Se cambia «todos los días» por «siempre» para expresar mejor la continuidad permanente de כָּל הַיָּמִים en español natural y en línea con la auditoría inglesa. También se pule la nota de «consagrado» para un español más idiomático sin cambiar el sentido léxico.
