translation:
  language: es
  text: La hospitalidad[a] y los regalos[b] ciegan los ojos de los sabios, y, como un bozal en la boca, apartan las reprensiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obsequios de hospitalidad»; el griego ξένια puede referirse a la hospitalidad brindada a un huésped o a regalos asociados con la amistad entre huésped y anfitrión.
    reason: lexical_alternative
  - marker: b
    text: «Regalos» aquí lleva el sentido de favores que pueden corromper el juicio; el griego no dice explícitamente «sobornos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ξένια
  english_pob_choice: hospitality
  chosen_spanish: hospitalidad
  alternatives_spanish:
  - regalos de huéspedes
  - obsequios de hospitalidad
  - agasajos
  lexicon: LSJ
  rationale: En este contexto sapiencial, ξένια puede referirse a la hospitalidad misma o a presentes asociados con la relación huésped-anfitrión. «Hospitalidad» conserva esa esfera social y evita igualarla por completo con δῶρα, que sigue como «regalos».
- source_word: δῶρα
  english_pob_choice: gifts
  chosen_spanish: regalos
  alternatives_spanish:
  - presentes
  - obsequios
  - sobornos
  lexicon: LSJ
  rationale: El griego dice literalmente «regalos». Aunque el contexto sugiere un efecto corruptor, el término no nombra explícitamente «sobornos», por lo que «regalos» mantiene la correspondencia léxica y deja que el contexto aporte la carga moral.
- source_word: ἀποτυφλοῖ
  english_pob_choice: blind
  chosen_spanish: ciegan
  alternatives_spanish:
  - hacen ciegos
  - oscurecen
  - privan de vista
  lexicon: LSJ
  rationale: 'El verbo expresa una acción fuerte: volver ciego o dejar sin vista. «Ciegan» reproduce la metáfora con naturalidad en español y conserva el impacto moral de la imagen.'
- source_word: ὀφθαλμοὺς σοφῶν
  english_pob_choice: the eyes of the wise
  chosen_spanish: los ojos de los sabios
  alternatives_spanish:
  - los ojos de los sabios y prudentes
  - los ojos de la gente sabia
  lexicon: LSJ
  rationale: La construcción genitiva se vierte de modo directo. «Los sabios» es la opción más natural en español y retiene el alcance general sin forzar una especificación de género.
- source_word: φιμὸς
  english_pob_choice: muzzle
  chosen_spanish: bozal
  alternatives_spanish:
  - mordaza
  - freno
  - boquilla
  lexicon: LSJ
  rationale: 'La imagen es concreta: un dispositivo puesto sobre la boca para impedir hablar o morder. «Bozal» preserva esa metáfora corporal con un término claro y actual en español.'
- source_word: ἀποτρέπει
  english_pob_choice: turn away
  chosen_spanish: apartan
  alternatives_spanish:
  - desvían
  - rechazan
  - alejan
  lexicon: LSJ
  rationale: El verbo significa apartar o desviar. «Apartan» conserva la idea de que las reprensiones son desviadas o impedidas, sin añadir una interpretación más fuerte que el original.
- source_word: ἐλεγμούς
  english_pob_choice: rebukes
  chosen_spanish: reprensiones
  alternatives_spanish:
  - repruebas
  - correcciones
  - censuras
  lexicon: LSJ
  rationale: En literatura sapiencial, el término apunta a censura o corrección verbal. «Reprensiones» suena natural en español bíblico moderno y mantiene la fuerza moral del pasaje.
translation_notes:
  revision_awareness: Texto revisado conforme al testimonio griego de Swete (1909) y al audit trail inglés POB. Se mantiene la distinción entre ξένια y δῶρα, y se preserva la metáfora concreta de φιμός con una imagen idiomática en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evita traducir ξένια y δῶρα con el mismo español para no perder la duplicidad lexical observada en el original.
  - «Reprensiones» se eligió para ἐλεγμούς por su tono sapiencial y su inteligibilidad general en español.
  - La puntuación busca reflejar dos miembros paralelos del proverbio sin sobreexplicar la relación causal.
