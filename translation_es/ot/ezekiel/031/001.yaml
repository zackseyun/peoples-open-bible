translation:
  language: es
  text: 'Y sucedió en el undécimo año[a], en el tercer mes, el primer día del mes, que la palabra de Yahvé vino a mí, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR»; alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea abre una datación profética; «Y sucedió» conserva el giro de acontecimiento sin sonar arcaico. Mantiene el enlace con el contexto previo sin añadir contenido.
- source_word: בְּאַחַת עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the eleventh year
  chosen_spanish: en el undécimo año
  alternatives_spanish:
  - en el año once
  lexicon: HALOT
  rationale: La expresión ordinal de datación se naturaliza en español con «undécimo año», que comunica la misma cronología de manera clara y reverente.
- source_word: בַּשְּׁלִישִׁי
  english_pob_choice: in the third month
  chosen_spanish: en el mes tercero
  alternatives_spanish:
  - en el tercer mes
  lexicon: HALOT
  rationale: El hebreo omite «mes» por estar implícito; en español conviene hacerlo explícito. «Mes tercero» mantiene el orden más cercano al original, sin perder inteligibilidad.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: a primero del mes
  alternatives_spanish:
  - el primer día del mes
  - a la primera del mes
  lexicon: HALOT
  rationale: La locución calendárica hebrea se puede verter con una forma breve y exacta. «A primero del mes» preserva la especificidad temporal y suena natural en un registro bíblico sobrio.
- source_word: הָיָה דְבַר יְהוָה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: la palabra de Yahvé vino
  alternatives_spanish:
  - la palabra de Yahvé llegó
  - vino la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética de «venir» la palabra divina, que refleja mejor la irrupción de revelación que un simple estado de ser. «Palabra» traduce דְבַר con su peso de mensaje revelado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término del proyecto para el nombre divino, evitando la sustitución litúrgica por «el SEÑOR» y manteniendo la transparencia del Tetragrámaton.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición hebrea marca destinatario de la revelación; «a mí» reproduce con sencillez y exactitud el receptor del mensaje profético.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'al decir:'
  lexicon: HALOT
  rationale: «Diciendo:» introduce el discurso directo de modo formal y continuo, como en la fórmula profética hebrea, sin forzar una paráfrasis.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En coherencia con el criterio del proyecto, se preserva el nombre propio divino en español como «Yahvé», en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El cotejo de revisión indica alta concordancia y sin cambios necesarios; por ello se mantiene la formulación de la fecha y de la fórmula profética sin introducir variantes interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la terminología del proyecto para el nombre divino.
  - Se conserva la fórmula profética «la palabra de Yahvé vino a mí» para reflejar la irrupción reveladora del hebreo.
  - La datación se expresa en español natural sin perder el orden y la especificidad del original.
