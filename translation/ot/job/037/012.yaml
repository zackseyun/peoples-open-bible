id: JOB.37.12
reference: Job 37:12
source:
  edition: WLC
  text: וְ/ה֤וּא מְסִבּ֨וֹת מִתְהַפֵּ֣ךְ ב/תחבולת/ו לְ/פָעֳלָ֑/ם כֹּ֖ל אֲשֶׁ֥ר יְצַוֵּ֓/ם עַל פְּנֵ֖י תֵבֵ֣ל אָֽרְצָ/ה׀׀־׃
translation:
  text: It turns around and around by his guidance[c][b][a], to accomplish all that he commands them over the face of the inhabited world on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in circuits' or 'round about'; the Hebrew emphasizes repeated circling motion.
    reason: lexical_alternative
  - marker: b
    text: Or 'by his steering' or 'by his direction'; the Hebrew term suggests skillful guidance or control.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the inhabited world, earthward/landward,' a layered expression for the terrestrial world.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: It
  alternatives:
  - he
  lexicon: HALOT
  rationale: The pronoun is masculine singular, but in context refers back to the storm cloud(s)/weather phenomena under God's control in the surrounding verses. English idiom prefers the impersonal 'it' for such a referent.
- source_word: מְסִבּוֹת
  chosen: around and around
  alternatives:
  - in circuits
  - round about
  lexicon: HALOT
  rationale: The noun/adverbial form conveys circling or turning in rounds. 'Around and around' captures the iterative, circular motion in natural English while preserving the imagery.
- source_word: מִתְהַפֵּךְ
  chosen: turns
  alternatives:
  - is turned
  - changes direction
  - whirls
  lexicon: HALOT
  rationale: The hitpael participle expresses turning oneself about / changing direction. 'Turns' works smoothly with the preceding adverbial idea and avoids over-specifying violent motion.
- source_word: בְּתַחְבֻּלֹתוֹ
  chosen: by his guidance
  alternatives:
  - by his steering
  - by his direction
  - by his counsel
  lexicon: HALOT
  rationale: The noun can denote steering, guidance, or skillful direction. In this meteorological context, 'guidance' communicates God's directing control over the clouds/winds without sounding overly technical.
- source_word: לְפָעֳלָם
  chosen: to accomplish
  alternatives:
  - for their doing
  - for them to do
  - for their work
  lexicon: HALOT
  rationale: 'The infinitival sense with pronominal suffix points to the purpose/result of the turning: that they perform what is assigned. ''To accomplish'' expresses purposeful execution in idiomatic English.'
- source_word: כֹּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - whatever
  lexicon: HALOT
  rationale: A straightforward rendering of the comprehensive relative expression.
- source_word: יְצַוֵּם
  chosen: he commands them
  alternatives:
  - he appoints for them
  - he orders them
  lexicon: HALOT
  rationale: The piel of צוה normally means 'command.' The 3mp suffix most naturally refers to the weather agents/clouds. Rendering the object explicitly preserves the Hebrew syntax.
- source_word: עַל־פְּנֵי
  chosen: over the face of
  alternatives:
  - upon
  - across
  lexicon: HALOT
  rationale: This is a common Hebrew spatial idiom. 'Over the face of' is slightly more formal but preserves the imagery and scope.
- source_word: תֵבֵל
  chosen: the inhabited world
  alternatives:
  - the world
  - the productive world
  lexicon: HALOT
  rationale: תבל often denotes the world as inhabited land, not merely the physical globe. 'Inhabited world' preserves that nuance.
- source_word: אָרְצָה
  chosen: on the earth
  alternatives:
  - earthward
  - to the earth
  - landward
  lexicon: HALOT
  rationale: The directional ending can intensify or localize the scene toward the earth/land. Because the phrase follows תבל, rendering it 'on the earth' preserves the terrestrial setting without awkwardness. The apparent redundancy reflects Hebrew style and is retained in moderated form.
