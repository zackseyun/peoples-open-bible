  text: 'multitudo tempestatis. Et concidit super multitudinis impetum quod paratum erat pugnare, et succendit omnes, ut subito nihil uideretur de innumerabili multitudine nisi solummodo puluis cineris et fumi odor. et uidi et extiti. Et post haec uidi ipsum hominem descendentem de monte et aduocantem ad se multitudinem aliam pacificam. Et accedebant ad eum uultus hominum multorum, quorundam gaudentium, quorundam tristantium, aliqui uero alligati, aliqui adducentes ex eis qui offerebantur. et ego a multitudine pauoris expergefactus sum et deprecatus sum altissimum et dixi : Tu ab initio demonstrasti seruo tuo mirabilia haec, et dignum me habuisti ut susciperes deprecationem meam; Et nunc demonstra mihi'
