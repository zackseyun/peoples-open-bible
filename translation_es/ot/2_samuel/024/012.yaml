translation:
  language: es
  text: 'Ve y habla a David[a]: «Así dice Yahvé: pongo tres cosas delante de ti. Elige para ti una de ellas, y la haré venir sobre ti»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo simplemente «tres»; el sustantivo está implícito por el contexto. Posibles traducciones: «tres cosas» o «tres opciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ וְדִבַּרְתָּ
  english_pob_choice: Go and speak
  chosen_spanish: Ve y habla
  alternatives_spanish:
  - Ve, habla
  - Ve y dile
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la orden. En español, «Ve y habla» conserva bien la secuencia imperativa y la fuerza del mandato sin sonar forzado.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - a David
  lexicon: Nombre propio bíblico
  rationale: 'Se mantiene el nombre propio con la preposición explícita en la sintaxis española para naturalidad: «habla a David».'
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así ha dicho Yahvé
  alternatives_spanish:
  - Así dice Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva con cadencia bíblica. «Ha dicho» refleja bien el perfecto profético del hebreo; «Yahvé» traduce directamente el Tetragrámaton según la terminología POB.
- source_word: שָׁלֹשׁ
  english_pob_choice: three things
  chosen_spanish: tres cosas
  alternatives_spanish:
  - tres
  - tres opciones
  lexicon: HALOT
  rationale: El hebreo solo da el numeral, con el sustantivo implícito. En español hace falta un sustantivo; «cosas» es la opción mínima y más neutra, mientras que «opciones» interpreta un poco más el contexto.
- source_word: אָנֹכִי נוֹטֵל עָלֶיךָ
  english_pob_choice: I am setting three things before you
  chosen_spanish: pongo delante de ti
  alternatives_spanish:
  - coloco delante de ti
  - pongo sobre ti
  - impongo sobre ti
  lexicon: HALOT
  rationale: El valor base de נוֹטֵל con עַל admite la idea concreta de poner/colocar. Dado que el propio contexto requiere una elección, «delante de ti» comunica bien la presentación de alternativas sin perder el trasfondo de carga o imposición implícita.
- source_word: בְּחַר לְךָ
  english_pob_choice: Choose one of them for yourself
  chosen_spanish: Elige para ti
  alternatives_spanish:
  - Escoge para ti
  - Elige para ti una de ellas
  lexicon: HALOT
  rationale: בּחר se traduce naturalmente por «elegir». El dativo ético לְךָ se conserva con «para ti», que en español expresa responsabilidad personal. El complemento ya se completa con «una de ellas» en el flujo de la frase.
- source_word: אַחַת מֵהֶם
  english_pob_choice: one of them
  chosen_spanish: una de ellas
  alternatives_spanish:
  - una de ellas mismas
  - una de esas cosas
  lexicon: HALOT
  rationale: La expresión partitiva se vuelve natural en español con «una de ellas». «Ellas» concuerda con «cosas» y mantiene la referencia a las tres opciones implícitas.
- source_word: וְאֶעֱשֶׂה לָּךְ
  english_pob_choice: and I will do it to you
  chosen_spanish: y yo te la haré
  alternatives_spanish:
  - y yo te lo haré
  - y yo lo haré contra ti
  - y yo te lo haré a ti
  lexicon: HALOT
  rationale: En el contexto de juicio, el verbo breve hebreo implica una acción adversa que recae sobre David. «Te la haré» conserva la referencia pronominal a la cosa elegida y el valor afectado de la frase; el uso de «la» responde a «una de ellas».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el principio del POB en español: reproducir el nombre divino con una forma transliterada, no sustituirlo por un título. «Yahvé» es la forma ya establecida para la traducción española del Tetragrámaton.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de las 'tres' cosas
  english_pob_reading: three things / three options
  chosen_spanish_reading: tres cosas
  alternative_spanish_readings:
  - tres opciones
  - tres alternativas
  rationale: El hebreo no nombra el sustantivo; la elección entre «cosas» y «opciones» depende de cuánto se explicite la inferencia contextual. Para la lectura española, «cosas» conserva mejor la sobriedad del original y evita cerrar demasiado el sentido.
  doctrine_reference: HALOT; nota auditada en la POB inglesa sobre el sustantivo implícito
- issue: Valor adverso de la frase final
  english_pob_reading: and I will do it to you
  chosen_spanish_reading: y yo te la haré
  alternative_spanish_readings:
  - y yo te lo haré
  - y yo lo haré contra ti
  - y yo te lo haré a ti
  rationale: La secuencia hebrea expresa una acción que recaerá sobre David; el español debe mantener ese carácter personal y directo. La forma breve «te la haré» suena natural y conserva la relación entre el objeto elegido y el destinatario afectado.
  doctrine_reference: Contexto narrativo de juicio en 2 Samuel 24
- issue: Presentación de las tres posibilidades
  english_pob_reading: I am setting three things before you
  chosen_spanish_reading: pongo delante de ti
  alternative_spanish_readings:
  - coloco delante de ti
  - presento delante de ti
  - pongo sobre ti
  rationale: Aunque el hebreo puede sugerir peso o imposición, la revisión inglesa optó por la presentación de opciones. En español, «delante de ti» captura esa presentación sin introducir una imagen demasiado pesada que el contexto inmediato no obliga a explicitar.
  doctrine_reference: Revisión auditada en English POB, 2026-04-23
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la imagen de «poner sobre» a «poner delante» para hacer más natural la idea de presentar alternativas. Esta versión española sigue esa lectura contextual, pero conserva la concisión del hebreo en «tres cosas» y mantiene el cierre verbal breve como acción que recae sobre David.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma coherente con la política del proyecto para el nombre divino.
  - Se prefiere «habla» sobre «dile» porque el mandato es específicamente de comunicación profética.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se conserva un registro bíblico sobrio, sin amplificar el contenido más allá del hebreo.
