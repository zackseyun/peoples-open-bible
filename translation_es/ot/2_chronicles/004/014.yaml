translation:
  language: es
  text: Él hizo los soportes[a], y hizo las palanganas[b] sobre los soportes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Soportes» traduce de forma funcional el hebreo מְּכֹנוֹת; otras versiones prefieren «bases».
    reason: lexical_alternative
  - marker: b
    text: En la tradición inglesa antigua suele aparecer «lavers»; en español, aquí se prefiere un término moderno y claro.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּכֹנוֹת
  english_pob_choice: the stands
  chosen_spanish: los soportes
  alternatives_spanish:
  - las bases
  - los pedestales
  lexicon: HALOT
  rationale: El término hebreo designa las estructuras de apoyo para las vasijas; en español, «soportes» comunica con claridad su función sin cargar una imagen más específica que el texto no exige. «Bases» es posible, pero suena más abstracto; «pedestales» puede sugerir un objeto ornamental más que funcional.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - elaboró
  lexicon: HALOT
  rationale: El verbo común עשה se vierte de manera directa con «hizo», que mantiene el sentido simple de fabricar o producir sin añadir matices artesanales innecesarios. «Fabricó» y «elaboró» son más interpretativos o estilizados.
- source_word: הַכִּיֹּרוֹת
  english_pob_choice: the basins
  chosen_spanish: las palanganas
  alternatives_spanish:
  - los cuencos
  - las vasijas de lavar
  lexicon: HALOT
  rationale: כִּיּוֹר designa un recipiente para lavar; «palanganas» expresa ese uso funcional en español moderno y conserva la idea de recipiente amplio. «Basins» calca el inglés; «cuencos» puede sonar demasiado pequeño; «vasijas de lavar» explicita en exceso.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - arriba de
  lexicon: HALOT
  rationale: La preposición indica ubicación encima de los soportes. «Sobre» es la equivalencia natural y suficientemente precisa en español.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: and ... and
  chosen_spanish: Él hizo ... y hizo ...
  alternatives_spanish:
  - Hizo ... e hizo ...
  - Hizo ... y también hizo ...
  lexicon: HALOT
  rationale: La coordinación hebrea se expresa con naturalidad repitiendo el verbo en español para mantener la paralelismo del texto y evitar una traducción demasiado mecánica del marcador de objeto.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail en inglés: se conserva la repetición verbal, se evita introducir ornamentos no presentes y se opta por equivalentes españoles funcionales para los objetos del mobiliario del templo.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y directo, adecuado para descripciones de mobiliario sagrado.
  - Se evita «SEÑOR» o terminología litúrgica no pertinente, ya que el versículo no contiene el nombre divino.
  - «Soportes» y «palanganas» buscan claridad moderna sin alejarse del sentido técnico del pasaje.
