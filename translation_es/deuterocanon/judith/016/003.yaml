translation:
  language: es
  text: Asiria[a] vino de los montes, desde el norte; vino con miríadas de sus fuerzas, cuya multitud obstruyó los wadis[b], y sus caballos cubrieron las colinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Asur». El griego designa aquí al poder asirio personificado.
    reason: lexical_alternative
  - marker: b
    text: O «torrentes de invierno» o «cauces estacionales»; el griego se refiere a cursos de agua temporales.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσσούρ
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  - Asiria / Asur
  lexicon: LSJ
  rationale: El griego nombra aquí al poder asirio como sujeto personificado. En español, «Asiria» comunica naturalmente la entidad política/imperial, manteniendo el verbo singular y evitando una transliteración innecesaria en el texto principal.
- source_word: ἐξ ὀρέων ἀπὸ βορρᾶ
  english_pob_choice: from the mountains out of the north
  chosen_spanish: de los montes del norte
  alternatives_spanish:
  - desde los montes del norte
  - de los montes, desde el norte
  - de las montañas del norte
  lexicon: LSJ
  rationale: La doble preposición griega expresa procedencia y dirección; en español, «de los montes del norte» conserva el sentido global sin forzar una repetición artificial. «Montes» y no «montañas» deja espacio para el contraste con «colinas» al final del versículo.
- source_word: ἐν μυριάσι δυνάμεων αὐτοῦ
  english_pob_choice: with myriads of his forces
  chosen_spanish: con miríadas de sus fuerzas
  alternatives_spanish:
  - con decenas de millares de sus tropas
  - con miríadas de su ejército
  - con innumerables fuerzas
  lexicon: LSJ
  rationale: «Miríadas» preserva el registro elevado y la literalidad de μυριάσι. «Fuerzas» reproduce bien δυνάμεων sin reducirlo a un término militar más estrecho que el griego.
- source_word: χειμάρρους
  english_pob_choice: wadis
  chosen_spanish: wadis
  alternatives_spanish:
  - torrentes de invierno
  - cauces secos
  - arroyos estacionales
  lexicon: LSJ
  rationale: El POB inglés retuvo «wadis» para el cauce estacional seco o torrencial. En español, el préstamo ya es comprensible en registros bíblicos y geográficos; así se conserva la precisión sin perder la imagen del curso de agua temporal.
- source_word: ἐνέφραξεν
  english_pob_choice: blocked up
  chosen_spanish: obstruyó
  alternatives_spanish:
  - tapó
  - bloqueó
  - colmó
  lexicon: LSJ
  rationale: El verbo griego expresa el acto de cerrar u obstruir. «Obstruyó» suena natural en español y mantiene la fuerza visual de la masa del ejército impidiendo el paso de los cauces.
- source_word: ἡ ἵππος αὐτῶν
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - su caballería
  - sus caballos de guerra
  - sus corceles
  lexicon: LSJ
  rationale: Aunque la forma griega es singular colectiva, la revisión inglesa prefirió «their horses» para reflejar de manera más directa la imagen básica. En español, «sus caballos» conserva esa concreción sin introducir la expansión interpretativa de «caballería».
- source_word: βουνούς
  english_pob_choice: hills
  chosen_spanish: las colinas
  alternatives_spanish:
  - los montes
  - las lomas
  lexicon: LSJ
  rationale: βουνούς suele designar elevaciones menores que ὄρη; «colinas» preserva el contraste con «montes» y mantiene la gradación imagética del verso.
theological_decisions:
- issue: Sujeto imperial personificado con referencias posesivas mixtas
  english_pob_reading: Render Assyria as a singular subject while keeping the plural reference to its forces and horses.
  chosen_spanish_reading: Mantener «Asiria» como sujeto singular y conservar los posesivos plurales («sus fuerzas», «sus caballos»).
  alternative_spanish_readings:
  - «el asirio» como sujeto personificado
  - uniformar todo en singular o plural para aligerar el estilo
  rationale: El griego mezcla personificación singular del imperio con referencias plurales a sus tropas. El español conserva esa tensión sin normalizarla, porque forma parte de la retórica poética del texto.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada del POB inglés de traducir ἡ ἵππος αὐτῶν como «their horses» en lugar de «their cavalry», para evitar una expansión interpretativa y ceñirse más de cerca a la imagen colectiva singular del griego. También conserva «wadis» para χειμάρρους, respetando la precisión geográfica y la nota alternativa ya auditada.
  spanish_consistency_notes:
  - Se mantiene «Asiria» para Ἀσσούρ en el texto principal, con «Asur» solo como alternativa anotada.
  - «Miríadas» se usa consistentemente para μυριάσι, en consonancia con el registro poético elevado.
  - «Montes» y «colinas» reproducen la distinción entre ὄρεων y βουνούς.
  - La frase «sus caballos» sigue la revisión inglesa más reciente y evita introducir «caballería» en el texto principal.
  - Los marcadores de nota [a] y [b] aparecen solo donde corresponde en el texto principal y se usan una sola vez cada uno.
