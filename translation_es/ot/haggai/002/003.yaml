translation:
  language: es
  text: ¿Quién de ustedes queda que vio esta casa[a] en su gloria anterior[b]? ¿Y cómo la ven ahora? ¿No es como nada a sus ojos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo». El hebreo dice literalmente «casa», una manera común de referirse al templo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en su gloria primera».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי בָכֶם הַנִּשְׁאָר
  english_pob_choice: Who among you is left
  chosen_spanish: ¿Quién entre ustedes queda
  alternatives_spanish:
  - ¿Quién de ustedes permanece
  - ¿Quién entre ustedes ha quedado
  lexicon: HALOT
  rationale: La pregunta busca identificar a los sobrevivientes de la generación anterior. «Queda» expresa de modo natural en español el valor de resto/sobreviviente del participio, sin reducirlo a mera continuidad temporal.
- source_word: אֲשֶׁר רָאָה
  english_pob_choice: who saw
  chosen_spanish: el que vio
  alternatives_spanish:
  - el que ha visto
  - quien vio
  lexicon: HALOT
  rationale: 'El verbo hebreo presenta una acción pasada completa: ver el templo anterior. El pretérito simple en español conserva bien ese valor.'
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta casa esta
  lexicon: HALOT
  rationale: «Casa» reproduce literalmente el hebreo y, en este contexto, mantiene la referencia al templo. Se conserva la ambigüedad léxica documentada en la POB inglesa.
- source_word: בִּכְבוֹדוֹ הָרִאשׁוֹן
  english_pob_choice: in its former glory
  chosen_spanish: en su gloria primera
  alternatives_spanish:
  - en su gloria anterior
  - en su antiguo esplendor
  lexicon: HALOT
  rationale: «Gloria primera» refleja de forma más directa el hebreo, conservando tanto el matiz temporal de רִאשׁוֹן como el valor de כָּבוֹד. Se evita suavizarlo demasiado con una paráfrasis más idiomática.
- source_word: וּמָה אַתֶּם רֹאִים אֹתוֹ עַתָּה
  english_pob_choice: And how do you see it now?
  chosen_spanish: ¿Y cómo la ven ahora?
  alternatives_spanish:
  - ¿Y qué ven ahora?
  - ¿Y cómo les parece ahora?
  lexicon: HALOT
  rationale: 'El verbo «ver» en español puede conservar el sentido evaluativo del hebreo: no solo percepción visual, sino valoración del estado actual del templo. El pronombre femenino concuerda con «casa».'
- source_word: הֲלוֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es
  - ¿No será
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera acuerdo. «¿No es» comunica esa fuerza de manera natural en español.
- source_word: כָמֹהוּ כְּאַיִן
  english_pob_choice: as nothing
  chosen_spanish: como nada
  alternatives_spanish:
  - como si no fuera nada
  - como nada en absoluto
  lexicon: HALOT
  rationale: La comparación expresa extrema insignificancia. «Como nada» conserva la brevedad y el golpe retórico del hebreo y del audit trail inglés.
- source_word: בְּעֵינֵיכֶם
  english_pob_choice: in your eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - en sus ojos
  lexicon: HALOT
  rationale: El hebreo usa un modismo de შეფასación/percepción. En español, «ante sus ojos» comunica con claridad la valoración subjetiva sin sonar forzado; se mantiene la referencia al punto de vista de los oyentes.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se hicieron cambios; por eso esta propuesta sigue de cerca el texto fuente y el trazado auditado en inglés, conservando las ambigüedades léxicas documentadas sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «casa» para בַּיִת, con nota alternativa «templo» como en la POB inglesa.
  - Se conserva la imagen de evaluación subjetiva con «ante sus ojos», equivalente idiomático de בְּעֵינֵיכֶם.
  - «Gloria primera» preserva la tensión entre literalidad y naturalidad, reflejando el valor de הָרִאשׁוֹן.
  - El pronombre «la» en «¿Y cómo la ven ahora?» concuerda con «casa» y respeta la referencia textual.
  - No se introduce vocabulario eclesiástico tradicional no documentado por el audit trail.
