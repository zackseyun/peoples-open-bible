translation:
  language: es
  text: Porque sucedió que estaba atando la gavilla en el campo, y el viento abrasador[a] vino sobre su cabeza, y cayó sobre su cama y murió en Betulia, su ciudad. Y lo sepultaron con sus padres en el campo entre Dotaim y Balamón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el calor abrasador vino sobre su cabeza». El griego καύσων puede referirse tanto al calor ardiente como a un viento abrasador.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτύγγανε
  english_pob_choice: he happened to be
  chosen_spanish: sucedió que estaba
  alternatives_spanish:
  - estaba
  - ocurrió que estaba
  lexicon: BDAG
  rationale: El griego marca circunstancia incidental; «sucedió que estaba» conserva ese matiz sin sonar forzado en español.
- source_word: δεσμεύοντος τὸ δράγμα
  english_pob_choice: binding the sheaf
  chosen_spanish: atando la gavilla
  alternatives_spanish:
  - atando la gavilla recolectada
  - atando el haz
  lexicon: LSJ
  rationale: δράγμα es un manojo o gavilla reunida en la siega. Dado que el texto griego usa el singular, «la gavilla» refleja mejor la forma que un plural.
- source_word: ὁ καύσων
  english_pob_choice: the hot wind
  chosen_spanish: el viento abrasador
  alternatives_spanish:
  - el calor abrasador
  - el viento cálido y abrasador
  lexicon: LSJ
  rationale: καύσων puede referirse tanto al calor ardiente como a un viento abrasador. Como el audit trail inglés preserva el sentido meteorológico concreto, «viento abrasador» mantiene esa tensión sin reducirlo solo a temperatura.
- source_word: ἔπεσεν ἐπὶ τὴν κλίνην
  english_pob_choice: he fell onto his bed
  chosen_spanish: cayó sobre su cama
  alternatives_spanish:
  - se desplomó sobre su cama
  - cayó en su lecho
  lexicon: BDAG
  rationale: κλίνη puede significar cama o lecho. «Cayó sobre su cama» es natural y mantiene la imagen directa del griego.
- source_word: ἐτελεύτησεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - terminó su vida
  lexicon: BDAG
  rationale: Verbo directo para morir; «murió» es la forma más clara y fiel, sin eufemismo.
- source_word: Βαιτυλουὰ
  english_pob_choice: Bethulia
  chosen_spanish: Betulia
  alternatives_spanish:
  - Bethulia
  - Betulua
  lexicon: transliteration
  rationale: Se adopta la transliteración habitual en español bíblico para el topónimo, ajustada a la ortografía española.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus padres ancestrales
  - con sus antepasados
  lexicon: LSJ
  rationale: La expresión funeraria bíblica suele equivaler a reunirse con los antepasados; sin embargo, el texto español conserva la formulación más cercana al griego y al inglés POB, «con sus padres».
- source_word: ἐν τῷ ἀγρῷ τῷ ἀνὰ μέσον Δωθαεὶμ καὶ Βαλαμών
  english_pob_choice: in the field between Dothaim and Balamon
  chosen_spanish: en el campo entre Dotaim y Balamón
  alternatives_spanish:
  - en el campo que está entre Dotaim y Balamón
  - en el campo situado entre Dotaim y Balamón
  lexicon: LSJ
  rationale: ἀνὰ μέσον significa «entre». Los nombres propios se transliteran de manera consistente y natural para el español.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «sheaves» a «the sheaf» para reflejar con mayor precisión el singular τὸ δράγμα; la versión española sigue esa corrección con «la gavilla». También se tuvo en cuenta la nota inglesa sobre καύσων, preservando en español la ambigüedad entre calor y viento mediante «viento abrasador».
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton ni κύριος con valor divino.
  - Se mantiene un registro bíblico claro y moderno; «con sus padres» conserva la resonancia funeraria tradicional sin añadir interpretación.
  - 'Los topónimos se uniforman en ortografía española: Betulia, Dotaim, Balamón.'
