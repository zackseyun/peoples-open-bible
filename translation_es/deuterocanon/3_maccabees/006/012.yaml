translation:
  language: es
  text: Pero tú, que posees toda fuerza y dominio, incesante, eterno[a], mira ahora; ten misericordia de nosotros, que por la violencia insolente de hombres sin ley somos privados de la vida[b] insensatamente, a la manera de conspiradores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «incansable» para ἀπάναυε.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «siendo removidos de la vida»; el sentido en este contexto es que están siendo llevados a la muerte.
    reason: lexical_alternative
  - marker: c
    text: O «como conspiradores» para ἐν ἐπιβούλων τρόπῳ.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσαν ἀλκὴν
  english_pob_choice: all might
  chosen_spanish: toda fuerza
  alternatives_spanish:
  - todo poder
  - toda fortaleza
  lexicon: LSJ
  rationale: ἀλκή expresa vigor, fuerza o bravura. «Toda fuerza» conserva la amplitud del término y evita fusionarlo con δυναστείαν, que ya aporta la idea de dominio/régimen.
- source_word: δυναστείαν
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - poder
  - soberanía
  - gobierno
  lexicon: LSJ
  rationale: El término apunta a poder de mando o señorío. «Dominio» mantiene esa diferencia respecto de ἀλκήν y suena natural en una invocación dirigida a Dios.
- source_word: ἀπάναυε
  english_pob_choice: unceasing One
  chosen_spanish: incesante
  alternatives_spanish:
  - incansable
  - cesante
  lexicon: LSJ
  rationale: La forma funciona como epíteto vocativo. En español, el adjetivo breve «incesante» preserva el matiz de no cesar sin forzar una perífrasis innecesaria.
- source_word: αἰώνιε
  english_pob_choice: eternal One
  chosen_spanish: eterno
  alternatives_spanish:
  - eterno Dios
  - perpetuo
  lexicon: LSJ
  rationale: También es vocativo y paralelo a ἀπάναυε. «Eterno» conserva la solemnidad del ruego y deja implícita la referencia a Dios, como en el griego.
- source_word: ἐπίδε
  english_pob_choice: look now
  chosen_spanish: mira ahora
  alternatives_spanish:
  - mira
  - mira aquí ahora
  - vuélvete y mira ahora
  lexicon: LSJ
  rationale: El imperativo pide una mirada de atención sobre los suplicantes. «Mira ahora» es directo, urgente y suficientemente cercano al valor contextual de ἐπίδε.
- source_word: ἐλέησον
  english_pob_choice: have mercy on us
  chosen_spanish: ten misericordia de nosotros
  alternatives_spanish:
  - apiádate de nosotros
  - ten piedad de nosotros
  lexicon: LSJ
  rationale: La fórmula de súplica en español eclesial contemporáneo se expresa con «ten misericordia de nosotros», que preserva el sentido de favor compasivo sin añadir matices ajenos.
- source_word: καθʼ ὕβριν
  english_pob_choice: through the insolent violence
  chosen_spanish: por la violencia insolente
  alternatives_spanish:
  - por la violencia de su arrogancia
  - a causa del ultraje violento
  lexicon: LSJ
  rationale: ὕβρις incluye insolencia, abuso y violencia desmedida. «Violencia insolente» conserva ambos aspectos y suena natural en español.
- source_word: ἀνόμων
  english_pob_choice: lawless men
  chosen_spanish: hombres sin ley
  alternatives_spanish:
  - los sin ley
  - malvados
  lexicon: LSJ
  rationale: El genitivo describe a los agentes del abuso. «Hombres sin ley» preserva la concreción humana y el rasgo de transgresión legal, evitando una abstracción excesiva.
- source_word: ἀλόγιστον
  english_pob_choice: senselessly
  chosen_spanish: sensatamente
  alternatives_spanish:
  - insensatamente
  - irracionalmente
  - sin razón
  lexicon: LSJ
  rationale: El adverbio debe calificar la privación de vida como carente de razón; en español, la forma negativa más fiel es «insensatamente». Se conserva así la idea de acción absurda o irracional.
- source_word: ἐκ τοῦ ζῆν μεθισταμένους
  english_pob_choice: being deprived of life
  chosen_spanish: privados de la vida
  alternatives_spanish:
  - siendo quitados de la vida
  - sacados de la vida
  - apartados de vivir
  lexicon: LSJ
  rationale: La construcción literalmente habla de ser removidos de vivir/de la vida, es decir, de morir o ser ejecutados. «Privados de la vida» mantiene la imagen de despojo sin volverla demasiado técnica.
- source_word: ἐν ἐπιβούλων τρόπῳ
  english_pob_choice: in the manner of conspirators
  chosen_spanish: a la manera de conspiradores
  alternatives_spanish:
  - como conspiradores
  - en modo de complotados
  - como si fuéramos conspiradores
  lexicon: LSJ
  rationale: ἐπίβουλος se refiere a quien trama o conspira. «A la manera de conspiradores» conserva el valor modal y la ambigüedad del griego sin introducir un comparativo más fuerte de lo necesario.
theological_decisions:
- issue: Vocativos divinos ἀπάναυε y αἰώνιε
  english_pob_reading: Both are translated as direct divine epithets, not as ordinary adjectives modifying an expressed noun.
  chosen_spanish_reading: 'Ambos se conservan como epítetos vocativos: «incesante, eterno».'
  alternative_spanish_readings:
  - «Dios incesante y eterno»
  - «incesante, eterno Dios»
  - tomar ἀπάναυε como adverbio con «mira ahora»
  rationale: El griego presenta dos formas vocativas en secuencia antes del imperativo. Mantenerlas como epítetos preserva el tono orante y evita añadir «Dios» donde no aparece explícitamente en el texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de ἐκ τοῦ ζῆν μεθισταμένους
  english_pob_reading: A plea about being taken out of life, i.e. facing death.
  chosen_spanish_reading: Una referencia a ser apartados de la vida, es decir, a la muerte o ejecución inminente.
  alternative_spanish_readings:
  - «siendo asesinados»
  - «expulsados de la vida»
  - «separados de vivir»
  rationale: La expresión griega dice literalmente un traslado/remoción «de vivir/de la vida». En el contexto de persecución, el sentido de muerte es primario, pero la redacción española conserva la imagen original de privación.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefirió «unceasing, eternal One» como epítetos coordinados y afinó la frase final a «deprived of life in the manner of conspirators». En español, eso se refleja manteniendo los dos vocativos como apposición breve («incesante, eterno») y conservando el matiz modal de la última cláusula con «a la manera de conspiradores».
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta serie solo cuando el texto fuente lo exige; aquí el griego no contiene el nombre divino explícito.
  - Se evita «Cristo» porque no aparece en el versículo.
  - «Misericordia» se mantiene como fórmula de súplica; no se sustituye por un calco más frío.
  - La secuencia de participios se vierte en español de manera fluida, pero sin eliminar la referencia a la privación de vida.
