translation:
  language: es
  text: 'Pero dirán[a]: «No hay esperanza, porque seguiremos nuestros propios planes, y cada uno de nosotros actuará según la terquedad de su mal corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es inútil» o «No tiene remedio». La expresión hebrea puede comunicar tanto desesperación como la desestimación de la apelación del profeta como algo vano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹאָשׁ
  english_pob_choice: It is hopeless
  chosen_spanish: No hay esperanza
  alternatives_spanish:
  - Es inútil
  - No tiene sentido
  lexicon: HALOT
  rationale: La forma hebrea puede expresar desesperación o la idea de que la invitación profética es vana. En español, «No hay esperanza» comunica con naturalidad esa pérdida de esperanza y conserva la fuerza de rechazo del llamado a arrepentirse. Se preservan alternativas porque el matiz puede inclinarse hacia la inutilidad de la exhortación.
- source_word: אַחֲרֵי מַחְשְׁבוֹתֵינוּ נֵלֵךְ
  english_pob_choice: we will follow our own plans
  chosen_spanish: seguiremos nuestros propios planes
  alternatives_spanish:
  - iremos tras nuestros propios pensamientos
  - seguiremos nuestros propios designios
  lexicon: HALOT
  rationale: El giro «ir/andar tras» en hebreo comunica seguir o perseguir. «Seguiremos nuestros propios planes» suena natural en español y transmite con claridad la auto-dirección deliberada del pueblo sin volverlo más oscuro de lo que exige el texto.
- source_word: וְאִישׁ
  english_pob_choice: and each of us
  chosen_spanish: y cada uno
  alternatives_spanish:
  - y cada hombre
  - y cada persona
  lexicon: HALOT
  rationale: El singular distributivo hebreo se entiende mejor en español como «cada uno». Conserva el sentido colectivo sin introducir un masculino innecesario o una perífrasis pesada.
- source_word: שְׁרִרוּת
  english_pob_choice: stubbornness
  chosen_spanish: terquedad
  alternatives_spanish:
  - obstinación
  - endurecimiento
  - voluntad obstinada
  lexicon: HALOT
  rationale: El sustantivo apunta a autoafirmación resistente y rebelde. «Terquedad» comunica bien ese rasgo en español actual; «obstinación» es una alternativa válida y un poco más formal, pero «terquedad» resulta clara y fiel al tono de rechazo.
- source_word: לִבּוֹ הָרָע
  english_pob_choice: his evil heart
  chosen_spanish: su corazón malo
  alternatives_spanish:
  - su corazón perverso
  - su corazón impío
  - su mal corazón
  lexicon: HALOT
  rationale: Se conserva «corazón» para reflejar el centro interior de voluntad y pensamiento que expresa לֵב. «Malo» mantiene la calificación moral explícita del hebreo; «perverso» o «impío» serían posibles, pero introducirían un registro más interpretativo.
- source_word: נַעֲשֶׂה
  english_pob_choice: will act
  chosen_spanish: actuará
  alternatives_spanish:
  - hará
  - procederá
  - llevará a cabo
  lexicon: HALOT
  rationale: Aquí עשה se refiere al comportamiento consecuente con el corazón. «Actuará» es una forma natural en español que conserva la idea de conducta intencional sin perder la amplitud del verbo hebreo.
theological_decisions:
- issue: Desesperación o desestimación de la exhortación profética
  english_pob_reading: It is hopeless
  chosen_spanish_reading: No hay esperanza
  alternative_spanish_readings:
  - Es inútil
  - No tiene sentido
  rationale: El hebreo permite tanto la desesperación como la declaración de que el llamado del profeta es inútil. En español se mantiene esa tensión con «No hay esperanza», que puede leerse como desaliento real o como rechazo culpable del mensaje, sin resolver prematuramente la ambigüedad.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa sin cambios recientes; la presente redacción mantiene la misma lectura de alta concordancia y conserva la ambigüedad léxica principal de נוֹאָשׁ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología estándar del proyecto cuando el contexto lo requiera; este versículo no lo contiene explícitamente.
  - Se mantiene «corazón» para לֵב por consistencia bíblica y por su valor semítico como centro interior de decisión.
  - Se evita «Señor» o formulaciones eclesiásticas tradicionales no requeridas por el hebreo.
  - La puntuación y el estilo buscan una lectura pública natural sin perder la estructura responsiva del texto.
