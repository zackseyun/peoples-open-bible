translation:
  language: es
  text: En aquel tiempo capturamos todas sus ciudades[a], y dedicamos a la destrucción a todos los hombres de toda ciudad, junto con las mujeres y los niños pequeños. No dejamos ningún sobreviviente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «pusimos toda ciudad bajo el anatema». El verbo hebreo expresa poner algo bajo ḥerem, es decir, dedicarlo a la destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּלְכֹּד
  english_pob_choice: we captured
  chosen_spanish: capturamos
  alternatives_spanish:
  - tomamos
  - apoderamos de
  lexicon: HALOT
  rationale: כָּד/לכד es un verbo militar de toma de ciudades. «Capturamos» es natural en español y conserva el marco de conquista sin suavizarlo ni volverlo interpretativo.
- source_word: כָּל עָרָיו
  english_pob_choice: all his cities
  chosen_spanish: todas sus ciudades
  alternatives_spanish:
  - todas sus villas
  - todas sus poblaciones
  lexicon: HALOT
  rationale: «Ciudades» mantiene el sentido militar y geográfico del plural de עִיר. «Sus» conserva el sufijo pronominal masculino del hebreo.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: HALOT
  rationale: Expresión temporal idiomática y solemne en español, fiel al valor de la frase hebrea.
- source_word: וַנַּחֲרֵם
  english_pob_choice: we devoted ... to destruction
  chosen_spanish: dedicamos a destrucción
  alternatives_spanish:
  - consagramos al anatema
  - pusimos bajo el anatema
  lexicon: HALOT
  rationale: חרם tiene fuerza técnico-sacral de poner algo bajo ḥerem, con resultado de destrucción. «Dedicamos a destrucción» conserva esa carga sin recurrir a una perífrasis eclesiástica opaca como «anatema».
- source_word: כָּל עִיר מְתִם
  english_pob_choice: every inhabited city
  chosen_spanish: toda ciudad habitada
  alternatives_spanish:
  - cada ciudad poblada
  - toda ciudad de hombres
  lexicon: HALOT
  rationale: La construcción señala ciudades con población humana; «habitada» refleja el matiz de עִיר מְתִם y evita la literalidad extraña de «ciudad de hombres».
- source_word: וְהַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: con las mujeres
  alternatives_spanish:
  - y las mujeres
  - junto con las mujeres
  lexicon: HALOT
  rationale: La lista hebrea mantiene a las mujeres como grupo distinto dentro de los habitantes destruidos; la preposición «con» conecta naturalmente la enumeración en español.
- source_word: וְהַטָּף
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los pequeños
  - los niños
  lexicon: HALOT
  rationale: טף refiere a niños pequeños o dependientes vulnerables. «Niños pequeños» preserva el matiz de edad y fragilidad con claridad.
- source_word: לֹא הִשְׁאַ֖רְנוּ שָׂרִיד
  english_pob_choice: We left no survivor
  chosen_spanish: No dejamos ningún sobreviviente
  alternatives_spanish:
  - No dejamos ningún remanente
  - No dejamos a nadie con vida
  lexicon: HALOT
  rationale: שָׂרִיד significa sobreviviente/remanente. «Sobreviviente» es la opción más natural y directa en español para este contexto de guerra.
theological_decisions:
- issue: Cómo reflejar el lenguaje de ḥerem en un texto de conquista
  english_pob_reading: we devoted to destruction
  chosen_spanish_reading: dedicamos a destrucción
  alternative_spanish_readings:
  - consagramos al anatema
  - los destruimos por completo
  rationale: El hebreo emplea el concepto técnico de חרם, con fuerza sacral y judicial. La lectura elegida conserva el resultado destructivo sin borrar el trasfondo ritual ni introducir una explicación excesiva.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Distinción de grupos humanos en la enumeración final
  english_pob_reading: the men, the women, and the little children
  chosen_spanish_reading: toda ciudad habitada, con las mujeres y los niños pequeños
  alternative_spanish_readings:
  - los hombres, las mujeres y los niños pequeños
  - las personas, incluidas mujeres y niños
  rationale: El hebreo distingue entre ciudades habitadas y los grupos humanos mencionados. En español, «ciudad habitada» comunica el valor de מְתִם sin forzar una construcción rara, y mantiene la relación con mujeres y niños pequeños.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: reemplaza una formulación más general por «ciudad habitada» para reflejar עִיר מְתִם, y mantiene «dedicamos a destrucción» y «No dejamos ningún sobreviviente» como equivalentes naturales y fieles. También conserva la fuerza técnica de חרם mediante una nota alternativa, como en el registro inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en la norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Dedicamos a destrucción» se mantiene para conservar el valor técnico de חרם sin depender de un tecnicismo eclesiástico.
  - «Niños pequeños» se prefirió a «niños» para reflejar טף como dependientes vulnerables, no simplemente menores en general.
