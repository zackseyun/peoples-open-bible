review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo y el rastro POB en la secuencia ritual, los referentes anatómicos y el sentido sacrificial general. Sin embargo, la nota al pie está anclada en «entrañas» cuando la alternativa documentada corresponde a הַיֹּתֶרֶת עַל הַכָּבֵד («el lóbulo del hígado»), no a «entrañas». Además, en español «el lóbulo sobre el hígado» suena algo menos natural que «el lóbulo del hígado», aunque la preposición hebrea עַל sí justifica conservar la idea espacial en nota.
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Tomarás», «toda la grasa», «los dos riñones» y «los quemarás sobre el altar» funcionan bien. La principal falla de calidad es la colocación errónea de la nota, que genera confusión. También conviene ajustar la frase principal a «el lóbulo del hígado» para mejor fluidez en español, manteniendo en nota la opción más literal «sobre el hígado».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos anatómicos y sacrificiales están bien resueltos. «Grasa», «entrañas», «riñones» y «altar» concuerdan con el criterio POB. No hay vocabulario teológico sensible en este versículo.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «entrañas», pero su contenido explica una alternativa para «el lóbulo del hígado».
    rationale: Esto desaline­a el aparato crítico con el término fuente הַיֹּתֶרֶת עַל הַכָּבֵד y puede inducir al lector a pensar que «entrañas» tiene esa alternativa anatómica.
  - severity: medium
    issue: «El lóbulo sobre el hígado» es fiel a עַל, pero suena menos idiomático en español que «el lóbulo del hígado».
    rationale: Dado que la identificación anatómica es incierta y la propia nota preserva la alternativa, la forma principal más natural en español puede ser «del hígado», dejando «sobre el hígado» como matiz explicativo si se desea.
  revised_spanish_text: Entonces tomarás toda la grasa que cubre las entrañas, el lóbulo del hígado[a], los dos riñones y la grasa que está sobre ellos, y los quemarás sobre el altar.
  revised_footnotes:
  - marker: a
    text: O «el lóbulo sobre el hígado». El término hebreo señala una parte específica unida al hígado, pero su identificación anatómica exacta es incierta.
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación de la nota para que ancle el término anatómico correcto y se ajustó la redacción principal a una forma más natural en español sin perder la alternativa más literal documentada por el POB.
