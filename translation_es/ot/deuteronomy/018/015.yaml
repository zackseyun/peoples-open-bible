- from: Yahvé tu Dios te levantará un profeta[a] como yo, de en medio de ti[b], de entre tus hermanos; a él escucharéis.
  to: Yahvé tu Dios te levantará un profeta como yo[b], de en medio de ti[a], de entre tus hermanos[a]; a él deben escucharlo.
  rationale: Se corrigen los marcadores de notas para que coincidan con el contenido que explican y se actualiza la cláusula final a un español más claro y contemporáneo, manteniendo el sentido mandatorio del hebreo sin sobreinterpretarlo como 'obedecer'.
