  language: en
  yaml_path: translation/ot/1_samuel/007/014.yaml
  text: And the cities that the Philistines had taken from Israel were restored to Israel[a], from Ekron to Gath; and Israel delivered its territory from the hand of the Philistines. And there was peace between Israel and the Amorites.
  footnotes:
