review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue la auditoría inglesa en puntos clave: «Ustedes mismos saben» conserva el énfasis de Αὐτοὶ οἴδατε; «la casa de mi padre» preserva el modismo; «las cosas santas» mantiene la amplitud de τῶν ἁγίων; y no añade «hemos soportado» a «las angustias». Sin embargo, hay dos problemas formales y de fidelidad discursiva: παρεκάλεσεν αὐτούς es plural («los animó»), no singular («lo animó»), y el uso de la misma nota [a] en dos lugares distintos no cumple la disciplina de notas. Además, «cuánto hemos hecho yo, mis hermanos y la casa de mi padre» suena menos natural que una formulación que mantenga el sujeto expreso sin torpeza.'
  spanish_quality_summary: El español es generalmente comprensible y digno, pero presenta un error gramatical de objeto directo («lo animó» por «los animó») y una construcción algo forzada en «cuánto hemos hecho yo, mis hermanos y la casa de mi padre». Una leve reordenación mejora mucho la legibilidad sin alejarse del griego. También conviene anclar la nota solo en «las cosas santas[a]» en vez de repetirla al final del versículo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «las cosas santas» está bien justificado frente a la alternativa «el santuario». No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección «animó» es aceptable para παρεκάλεσεν, pero debe concordar en número con αὐτούς.
  issues:
  - severity: high
    issue: 'Error de número en el objeto directo: «lo animó»'
    rationale: El griego dice παρεκάλεσεν αὐτούς, ‘animó/exhortó a ellos’, es decir, plural. «Lo animó» cambia el referente y es incorrecto.
  - severity: medium
    issue: Reutilización indebida del marcador de nota [a]
    rationale: La misma nota aparece tras «dijo[a]» y al final del versículo, pero solo explica «las cosas santas». Las instrucciones requieren anclar cada nota exactamente donde corresponde y no reutilizar un marcador para dos anclajes distintos.
  - severity: low
    issue: 'Construcción española poco natural: «cuánto hemos hecho yo, mis hermanos y la casa de mi padre»'
    rationale: Aunque transmite la idea, el orden suena torpe en español. «cuánto hemos hecho por... yo, mis hermanos y la casa de mi padre» o «lo que yo... hemos hecho» mejora la fluidez manteniendo el sentido.
  revised_spanish_text: 'Y los animó y les dijo: «Ustedes mismos saben cuánto hemos hecho por las leyes y las cosas santas[a], yo, mis hermanos y la casa de mi padre, y las guerras y las angustias».'
  revised_footnotes:
  - marker: a
    text: O «por la ley y el santuario». El griego dice literalmente «las cosas santas», que puede referirse de manera más amplia al santuario y a otros asuntos sagrados.
    reason: lexical_alternative
  revision_rationale: Se corrigió el error de número en «los animó», se eliminó la duplicación incorrecta del marcador de nota y se reordenó la frase para un español más natural, conservando el énfasis, la amplitud de «las cosas santas» y la enumeración final sin añadir interpretaciones ausentes del griego.
