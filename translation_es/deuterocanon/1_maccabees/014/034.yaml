review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en casi todos los puntos: «fortificó», «Gazara», «Azoto», «los enemigos», «antes», «judíos», y la ambigüedad final de «para su restauración» están bien preservados. También mantiene correctamente la nota sobre «Gazara/Gezer» y la nota interpretativa sobre «restauración». Sin embargo, «Joppe» es menos natural y menos reconocible en español general que «Jope», y «puso en ellos» suena torpe porque el referente son lugares; en español digno y claro conviene «puso allí» o «puso en ellos mismos», siendo «allí» la mejor solución idiomática sin pérdida sustancial del sentido.'
  spanish_quality_summary: 'El texto es mayormente legible y fiel, pero presenta dos asperezas de estilo/uso: «Joppe» no es la forma española más estándar para Ἰόππην, y «puso en ellos» resulta poco natural en español cuando se habla de ciudades o lugares. Además, «estableció allí a judíos» es aceptable, pero «asentó allí a judíos» refleja mejor el sentido causativo de κατοικίζω en contexto de repoblación. La revisión propuesta mejora naturalidad y precisión sin apartarse del griego ni del audit trail inglés.'
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Los topónimos siguen el principio de transliterar desde el griego: se conserva «Gazara» con nota alternativa «Gezer». La revisión propone «Jope» como forma española más natural del topónimo griego Ἰόππην, sin cambiar la política de base. «Judíos» se mantiene conforme al POB auditado.'
  issues:
