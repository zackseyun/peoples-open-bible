- from: Entonces llevarás la mesa y dispondrás lo que va sobre ella[a]; y llevarás el candelabro y colocarás sus lámparas.
  to: Entonces introducirás la mesa y dispondrás lo que va sobre ella; e introducirás el candelabro y colocarás sus lámparas[a].
  rationale: Se cambia 'llevarás' por 'introducirás' para conservar el matiz de ingreso al santuario que el hebreo y la auditoría inglesa subrayan. Se mueve la nota al verbo/frase de las lámparas, donde realmente pertenece el matiz alternativo de וְהַעֲלֵיתָ, y se pule su redacción. El resto del verso es fiel, natural y suficiente.
