translation:
  language: es
  text: 'Pero Sara lo negó[a], diciendo: «No me reí», porque tenía miedo. Pero él[b] dijo: «No, sino que te reíste».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la negó» o «mintió». El verbo hebreo puede significar negar o tratar falsamente; aquí se refiere a la negación de haber reído.'
    reason: lexical_alternative
  - marker: b
    text: El hablante no se nombra explícitamente en esta cláusula; el contexto lo identifica con Yahvé en la narración circundante.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּכַחֵשׁ
  english_pob_choice: denied it
  chosen_spanish: lo negó
  alternatives_spanish:
  - mintió
  - lo negó
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar negar o actuar con falsedad. En este contexto, la lectura más directa es la negación de lo que se le acaba de atribuir. «Lo negó» conserva la fuerza de la negación sin cargar innecesariamente el texto con una acusación explícita de mentira en la línea principal.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: HALOT
  rationale: Es la introducción normal de discurso directo. «Diciendo» mantiene el enlace formal con la cita y suena natural en español bíblico.
- source_word: לֹא צָחַקְתִּי
  english_pob_choice: I did not laugh
  chosen_spanish: No me reí
  alternatives_spanish:
  - No me he reído
  - No me reí
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa con naturalidad en pretérito simple español en este relato. «No me reí» conserva la negación directa y el registro narrativo.
- source_word: כִּי יָרֵאָה
  english_pob_choice: because she was afraid
  chosen_spanish: porque tenía miedo
  alternatives_spanish:
  - porque estaba asustada
  - pues tenía miedo
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la negación. «Tenía miedo» comunica bien la causa y evita una formulación demasiado literal o torpe en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y él dijo
  - Pero dijo
  lexicon: HALOT
  rationale: El waw narrativo avanza la escena, y en español «Pero» ayuda a marcar el contraste con la negación de Sara. Se conserva el pronombre para reflejar que el sujeto no se nombra explícitamente en esta cláusula.
- source_word: לֹא כִּי צָחָקְתְּ
  english_pob_choice: No, but you did laugh
  chosen_spanish: No, sino que te reíste
  alternatives_spanish:
  - No, pero te reíste
  - No, pues te reíste
  lexicon: HALOT
  rationale: El לֹא rechaza la negación de Sara, y כִּי aquí tiene valor adversativo/enfático, no causal. «No, sino que te reíste» expresa con claridad la refutación y el énfasis del hebreo; en español necesita «sino que» para sonar natural y fiel.
theological_decisions:
- issue: Identidad del hablante en la segunda intervención
  english_pob_reading: Render generically as 'he said' rather than specifying 'the LORD said.'
  chosen_spanish_reading: «Pero él dijo»
  alternative_spanish_readings:
  - «Pero dijo»
  - «Yahvé dijo»
  - «El Señor dijo»
  rationale: El verbo hebreo aquí no repite un sujeto explícito. Aunque el contexto amplio identifica al hablante con Yahvé, esta cláusula por sí sola no lo formula. El pronombre conserva la ambigüedad auditada y evita añadir una especificación que el verso no expresa de manera inmediata.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje de referencia y mantiene la misma resolución auditada del inglés POB: negación de Sara, causalidad de su miedo y hablante no especificado en la segunda réplica. No se registran revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no nombra al hablante de forma explícita en la cláusula final.
  - Se usó «lo negó» en la línea principal para preservar la ambigüedad del verbo hebreo entre negar y tratar falsamente.
  - «No, sino que...» reproduce mejor el valor adversativo de לֹא כִּי que una traducción meramente causal o coordinada.
  - El español narrativo usa pretérito simple para reflejar el perfecto hebreo en este contexto.
  - «Tenía miedo» comunica la causa de la negación con naturalidad y sin perder el sentido causal de כִּי.
