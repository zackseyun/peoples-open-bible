translation:
  language: es
  text: 'Y dijo[a]: «Oigan ahora mis palabras: si hay un profeta entre ustedes, yo, Yahvé, me daré a conocer a él en una visión[b]; le hablaré en un sueño[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si uno de ustedes es profeta». La expresión hebrea es literalmente «si hay su profeta».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me revelaré a él».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hablaré con él». El hebreo literalmente tiene «hablaré en/con él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce discurso directo de manera simple. «Y dijo» conserva la fluidez narrativa sin añadir énfasis temporal innecesario.
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Hear now
  chosen_spanish: Oigan ahora
  alternatives_spanish:
  - Escuchen ahora
  - Por favor, oigan
  lexicon: HALOT
  rationale: El imperativo plural con נָא expresa una exhortación solemne y apremiante. «Oigan ahora» suena natural en español y mantiene el tono de llamada atenta.
- source_word: דְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - lo que digo
  - mi palabra
  lexicon: HALOT
  rationale: El plural con sufijo de primera persona se refleja con claridad como «mis palabras», que es directo y formal.
- source_word: אִם יִהְיֶה נְבִיאֲכֶם
  english_pob_choice: if there is a prophet among you
  chosen_spanish: si hay un profeta entre ustedes
  alternatives_spanish:
  - si uno de ustedes es profeta
  - si ustedes tienen un profeta
  lexicon: HALOT
  rationale: El hebreo es idiomático y literalmente cercano a «si hay su profeta». En español, «entre ustedes» conserva la referencia comunitaria sin forzar la sintaxis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española establecida en este proyecto. No se sustituye por «SEÑOR», para preservar el Tetragrámaton como nombre propio.
- source_word: בַּמַּרְאָה
  english_pob_choice: in a vision
  chosen_spanish: en una visión
  alternatives_spanish:
  - por una visión
  - mediante una visión
  lexicon: HALOT
  rationale: מַרְאָה aquí designa un medio de revelación visionaria. «En una visión» es la forma natural y fiel en español.
- source_word: אֵלָיו אֶתְוַדָּע
  english_pob_choice: I make myself known to him
  chosen_spanish: me daré a conocer a él
  alternatives_spanish:
  - me revelaré a él
  - me haré conocido a él
  lexicon: HALOT
  rationale: 'El hitpael de ידע tiene matiz reflexivo: Dios se da a conocer. «Me daré a conocer» preserva ese matiz y mantiene un registro bíblico claro.'
- source_word: בַּחֲלוֹם
  english_pob_choice: in a dream
  chosen_spanish: en un sueño
  alternatives_spanish:
  - por medio de un sueño
  - mediante un sueño
  lexicon: HALOT
  rationale: La preposición indica el medio de revelación. «En un sueño» es idiomático y ajustado al hebreo.
- source_word: אֲדַבֶּר בּוֹ
  english_pob_choice: I speak to him
  chosen_spanish: le hablaré
  alternatives_spanish:
  - hablaré con él
  - hablaré a él
  lexicon: HALOT
  rationale: El hebreo expresa la comunicación divina hacia la persona. En español, «le hablaré» es natural y conserva la dirección del acto de hablar sin rigidizar la preposición.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En este proyecto, la forma española normativa elegida es «Yahvé», para preservar el nombre propio de Dios sin ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Modo de revelación profética
  english_pob_reading: make myself known to him in a vision; I speak to him in a dream
  chosen_spanish_reading: me daré a conocer a él en una visión; le hablaré en un sueño
  alternative_spanish_readings:
  - me revelaré a él en una visión; le hablaré en un sueño
  - se me dará a conocer a él en una visión; le hablaré en un sueño
  rationale: 'La versículo distingue dos medios de revelación: visión y sueño. La traducción conserva esa distinción sin suavizarla ni convertirla en una formulación más general.'
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés actualizado, especialmente en la segunda cola verbal: se optó por «le hablaré en un sueño» para reflejar mejor la preposición hebrea y la revisión final del inglés, manteniendo la misma distinción entre visión y sueño.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme a la terminología predeterminada del proyecto para יְהוָה.
  - «Entre ustedes» mantiene el sentido colectivo de נְבִיאֲכֶם sin una paráfrasis innecesaria.
  - No se introdujeron notas al pie porque el español resuelve aquí sin ambigüedad adicional las alternativas lexicales ya documentadas en el audit trail.
