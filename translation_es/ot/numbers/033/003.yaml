  glossary_alignment: No hay conflicto con los glosarios troncales. Se conserva «los hijos de Israel» conforme a la decisión documentada. No aparecen términos del glosario mayor como Yahvé/Mesías/etc. El modismo בְיָד רָמָה se mantiene de forma suficientemente literal en español con explicación en nota.
