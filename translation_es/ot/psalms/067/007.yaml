translation:
  language: es
  text: La tierra[b] ha dado su fruto; Dios, nuestro Dios, nos bendice[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que Dios, nuestro Dios, nos bendiga» o «Dios, nuestro Dios, nos bendecirá». El verbo hebreo puede leerse aquí como presente, deseo o futuro.
    reason: alternative_reading
  - marker: b
    text: O «La tierra ha dado su fruto». El hebreo אֶרֶץ puede significar «tierra» o «territorio/la tierra» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra/país
  lexicon: HALOT
  rationale: En este salmo el horizonte es amplio y abarca a las naciones; por eso, como en la traducción inglesa auditada, conviene la amplitud de «la tierra» más que un sentido restringido de territorio. En español, «tierra» conserva tanto el valor de mundo habitado como el de suelo/ámbito productivo, que además encaja con el fruto mencionado.
- source_word: נָתְנָה
  english_pob_choice: has yielded
  chosen_spanish: ha dado
  alternatives_spanish:
  - ha producido
  - dio
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «dar». En español, con el complemento agrícola «su fruto», «ha dado» mantiene la relación semántica sin forzar una metáfora más idiomática que el hebreo. Se evita «ha producido» por sonar más interpretativo que el original.
- source_word: יְבוּלָהּ
  english_pob_choice: its produce
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su cosecha
  - su rendimiento
  lexicon: HALOT
  rationale: «Fruto» es una manera natural y bíblicamente clara de expresar el incremento agrícola de la tierra. «Cosecha» sería más específica que el término hebreo, y «produce» resulta menos natural en español. Se conserva la idea de rendimiento de la tierra sin estrecharla a una sola clase de cultivo.
- source_word: יְבָרְכֵנוּ
  english_pob_choice: blesses us
  chosen_spanish: nos bendice
  alternatives_spanish:
  - nos bendiga
  - nos bendecirá
  lexicon: HALOT
  rationale: Como en el texto inglés auditado, el imperfecto hebreo admite lectura indicativa, jussiva o futura. En español, «nos bendice» expresa la afirmación confiada del contexto sin resolver indebidamente la tensión verbal. Se preservan las otras posibilidades en nota.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: La forma plural morfológica toma sentido singular al referirse al Dios de Israel. «Dios» es el equivalente directo y solemne en español.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: HALOT
  rationale: 'Se conserva la repetición enfática del hebreo: «Dios, nuestro Dios». En español, el posesivo posnominal sería más marcado y menos natural; la forma elegida mantiene intimidad pactual y claridad.'
theological_decisions:
- issue: Fuerza del imperfecto יְבָרְכֵנוּ
  english_pob_reading: 'indicative present: ''blesses us'''
  chosen_spanish_reading: 'presente indicativo: «nos bendice»'
  alternative_spanish_readings:
  - «nos bendiga» (subjuntivo/jussivo)
  - «nos bendecirá» (futuro)
  rationale: 'El hebreo permite varias lecturas, pero el contexto de bendición ya recibida por la tierra favorece una afirmación confiada. Como en el POB inglés, la lectura principal no elimina la ambigüedad: se deja constancia de las alternativas para no borrar la tensión interpretativa del verso.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas. La versión española sigue esa línea sin añadir interpretaciones no documentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios, nuestro Dios» para reproducir la repetición enfática del hebreo y del POB inglés.
  - Se usa «la tierra» en lugar de «la tierra/país» en el cuerpo por fluidez, dejando la alternativa en nota.
  - No se sustituye el verbo bíblico por una paráfrasis más libre; se conserva una estructura breve y declarativa, acorde con el verso.
  - La puntuación y el orden buscan una lectura pública natural en español sin perder la ambigüedad verbal del original.
