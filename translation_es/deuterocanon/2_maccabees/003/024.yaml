base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/003/024.yaml
  text: But when he had already arrived there with the guards at the treasury[a], the Sovereign of spirits and of all authority made a great manifestation, so that all who had dared to come in, struck with awe at the power of God[c][b], were turned to weakness and fear.
  footnotes:
  - marker: a
    text: Or 'bodyguards' for 'guards'; the Greek literally refers to spear-bearers.
    reason: lexical_alternative
  - marker: b
    text: Or 'made a great appearing'; the Greek emphasizes a striking divine manifestation.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'had dared to come in' may also be understood more generally as 'had dared to come together,' but the immediate context favors entry into the treasury area.
    reason: alternative_reading
