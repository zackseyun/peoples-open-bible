translation:
  language: es
  text: '¿Bebe todos los días? Y Daniel dijo, riendo: «No te dejes engañar, oh rey; porque este es barro por dentro y bronce por fuera, y nunca[a]—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego provisto para este versículo se interrumpe después de «y nunca—» (καὶ οὐ), de modo que la oración queda incompleta en el extracto fuente usado aquí.
    reason: textual_variant
lexical_decisions:
- source_word: πίνει
  english_pob_choice: drink
  chosen_spanish: bebe
  alternatives_spanish:
  - toma
  - está bebiendo
  lexicon: LSJ
  rationale: El verbo simple πίνει pide un verbo directo en español. En la pregunta, «¿Bebe todos los días?» reproduce el sentido sin añadir material ajeno.
- source_word: καθʼ ἑκάστην ἡμέραν
  english_pob_choice: every day
  chosen_spanish: todos los días
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: LSJ
  rationale: La expresión distributiva se vierte naturalmente como «todos los días», que conserva el valor habitual del griego y suena idiomático en español.
- source_word: γελάσας
  english_pob_choice: laughing
  chosen_spanish: riendo
  alternatives_spanish:
  - con una risa
  - sonriendo
  lexicon: LSJ
  rationale: El participio aoristo expresa el modo en que Daniel habla. «Riendo» mantiene esa función adverbial y evita la dureza de una construcción más literal.
- source_word: Μὴ πλανῶ
  english_pob_choice: Do not be deceived
  chosen_spanish: No te dejes engañar
  alternatives_spanish:
  - No te engañes
  - No te extravíes
  lexicon: LSJ
  rationale: En este contexto la advertencia apunta a no ser inducido al error acerca del ídolo. «No te dejes engañar» expresa bien la fuerza prohibitiva y el matiz de no ser llevado a una falsa conclusión.
- source_word: βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: LSJ
  rationale: El vocativo se conserva con una forma reverente y clara en español. «Oh rey» mantiene el registro solemne del discurso.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este ídolo
  - este dios
  - él
  lexicon: LSJ
  rationale: El demostrativo griego no añade un sustantivo explícito, por lo que «este» conserva la transparencia del original y deja que el contexto identifique la referencia.
- source_word: ἔσωθέν
  english_pob_choice: inside
  chosen_spanish: por dentro
  alternatives_spanish:
  - dentro
  - en su interior
  lexicon: LSJ
  rationale: La oposición con ἔξωθεν pide un contraste espacial natural en español. «Por dentro» reproduce la idea de composición interna.
- source_word: πηλός
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - lodo
  lexicon: LSJ
  rationale: Aunque «arcilla» es posible, «barro» resulta más transparente en español para la imagen de un objeto hecho de material terroso y conserva el contraste con el metal exterior.
- source_word: ἔξωθεν
  english_pob_choice: outside
  chosen_spanish: por fuera
  alternatives_spanish:
  - externamente
  - afuera
  lexicon: LSJ
  rationale: La pareja con «por dentro» se mantiene clara y simétrica en español.
- source_word: χαλκός
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: LSJ
  rationale: En el uso bíblico griego, χαλκός puede abarcar metal de cobre/bronce. «Bronce» conserva la elección del audit trail en un español natural y evita «latón», que sería menos adecuado.
theological_decisions:
- issue: Referencia implícita del demostrativo en la acusación contra el ídolo
  english_pob_reading: this one
  chosen_spanish_reading: este
  alternative_spanish_readings:
  - este ídolo
  - este dios
  - él
  rationale: Se conserva la indeterminación del griego, que no explicita «ídolo» ni «dios». Así se respeta la transparencia del texto fuente y el lector recibe la identificación por contexto.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy y transparencia textual'
- issue: Final incompleto del verso en el testimonio griego
  english_pob_reading: and never—
  chosen_spanish_reading: y nunca—
  alternative_spanish_readings:
  - y no—
  - y jamás—
  rationale: El griego termina abruptamente con καὶ οὐ. La traducción debe dejar visible la incompletud sin reconstruir el cierre, para no importar una continuación no atestiguada.
  doctrine_reference: 'PHILOSOPHY.md: fidelidad a la evidencia y marcación de lagunas del testimonio'
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando cualquier nota al pie no anclada en el texto. La traducción ahora no usa marcadores de nota, de modo que no hay desajuste entre el cuerpo y las notas. También se alineó el arranque con καὶ mediante «Y», y se mantuvo el final incompleto con una raya larga para reflejar el corte del testimonio griego.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una convención litúrgica necesaria aquí.
  - Se mantiene el registro sobrio y bíblico sin arcaizar innecesariamente.
  - Se conserva la simetría espacial «por dentro / por fuera» para reflejar ἔσωθεν / ἔξωθεν.
  - No se añadió sustantivo explícito a οὗτος para no sobreinterpretar el referente.
  - El final truncado con raya larga preserva la fragmentariedad del texto fuente.
