revisions:
- from: y todo la plata y el oro que halles en toda la provincia de Babilonia, junto con la ofrenda voluntaria[a] del pueblo y de los sacerdotes[b], que voluntariamente ofrecen para la casa de su Dios que está en Jerusalén.
  to: y toda la plata y el oro que halles en toda la provincia de Babilonia, junto con la ofrenda voluntaria[a] del pueblo y de los sacerdotes, que voluntariamente ofrecen para la casa de su Dios[b] que está en Jerusalén.
  rationale: Se corrige la discordancia gramatical (‘toda la plata’) y se mejora la nota léxica para que presente una alternativa real y útil en español. También se ancla la nota cultural al sintagma pertinente ‘casa de su Dios’. No se requiere una revisión doctrinal o textual compleja.
