translation:
  language: es
  text: Pero entrar en detalle[a], y hacer una exposición extensa, y ocuparse demasiado de los pormenores, le corresponde al iniciador de la historia;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «penetrar más profundamente, y hacer una excursión amplia en palabras». El griego usa metáforas vivas para un tratamiento más pleno y expansivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβατείνειν
  english_pob_choice: to go into detail
  chosen_spanish: entrar en detalle
  alternatives_spanish:
  - penetrar más profundamente
  - ir más al fondo
  lexicon: LSJ
  rationale: El verbo griego sugiere meterse o avanzar más adentro; en este contexto retórico, la idea es tratar el asunto con mayor amplitud o profundidad. «Entrar en detalle» conserva ese valor idiomático de forma natural en español.
- source_word: περίπατον ποιεῖσθαι λόγῳ
  english_pob_choice: to make an extended treatment in speech
  chosen_spanish: hacer una exposición extensa en palabras
  alternatives_spanish:
  - hacer un recorrido verbal amplio
  - explayarse en el discurso
  lexicon: LSJ
  rationale: 'La expresión es metafórica: literalmente, algo así como «hacer un paseo en palabras». En español, «exposición extensa en palabras» comunica el tratamiento amplio sin forzar un calco poco natural, pero mantiene la idea de discurso desarrollado.'
- source_word: πολυπραγμονεῖν
  english_pob_choice: to be overly occupied
  chosen_spanish: ocuparse demasiado
  alternatives_spanish:
  - entremeterse demasiado
  - afanarse excesivamente
  lexicon: LSJ
  rationale: Aquí el verbo matiza una atención excesiva a los detalles. «Ocuparse demasiado» preserva la carga de exceso sin llevar el texto hacia el matiz interpersonal de «entremeterse», que no es el foco principal en este contexto.
- source_word: ἐν τοῖς κατὰ μέρος
  english_pob_choice: with particulars
  chosen_spanish: de los pormenores
  alternatives_spanish:
  - de los detalles
  - de los asuntos particulares
  lexicon: LSJ
  rationale: La frase apunta a asuntos itemizados, por partes. «Pormenores» es un equivalente español claro y adecuado para ese contraste con un tratamiento general de la historia.
- source_word: τῷ τῆς ἱστορίας ἀρχηγενέτῃ
  english_pob_choice: to the originator of the history
  chosen_spanish: al originador de la historia
  alternatives_spanish:
  - al autor de la historia
  - al iniciador de la historia
  lexicon: LSJ
  rationale: ἀρχηγενέτης es raro y designa al que origina o produce primero algo. «Originador» conserva mejor esa distinción que «autor», que podría aplanar el matiz frente al epitomizador.
- source_word: καθῆκε
  english_pob_choice: belongs
  chosen_spanish: le corresponde
  alternatives_spanish:
  - le pertenece
  - es propio de él
  lexicon: LSJ
  rationale: El verbo expresa lo que toca o compete a alguien. «Le corresponde» comunica con naturalidad que ese tratamiento amplio es la tarea apropiada del historiador original.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el criterio óptimo-equivalente del POB en inglés, conservando el paralelismo de las tres acciones infinitivas y la contraposición final con el «originador de la historia». Se evitó un calco demasiado rígido de λόγῳ/περίπατον y se mantuvo la imagen metafórica en una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se prefirió «originador de la historia» para conservar el matiz de ἀρχηγενέτης frente a un simple «autor».
  - «Pormenores» refleja mejor el valor de κατὰ μέρος que una paráfrasis más general.
