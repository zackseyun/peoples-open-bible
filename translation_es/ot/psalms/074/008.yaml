  glossary_alignment: No hay conflicto con los términos base del proyecto. «Dios» está bien; no aparece Yahvé ni otros términos sensibles del glosario. «Lugares de reunión de Dios» refleja bien מוֹעֲדֵי אֵל y evita el anacronismo de «sinagogas».
