base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/012/011.yaml
  text: And when a fierce battle had taken place[a], and those with Judas had prevailed because of the help from God, the nomads, having been weakened, asked Judas to give them his right hand[b], promising both to provide pasture and to be useful to them in the future.
  footnotes:
  - marker: a
    text: Literally, 'to give them the right hand,' an idiom for making peace or pledging alliance.
    reason: cultural_note
  - marker: b
    text: The Greek wording at the end is somewhat compressed; the sense is that they promised grazing support and future assistance.
    reason: textual_variant
