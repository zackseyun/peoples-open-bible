translation:
  language: es
  text: Muchos toros me rodean[a]; toros poderosos de Basán me cercan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Basán era una región al oriente del Jordán asociada con ganado fuerte y bien alimentado; la expresión evoca adversarios poderosos y amenazantes.
    reason: cultural_note
lexical_decisions:
- source_word: סְבָבוּנִי
  english_pob_choice: surround me
  chosen_spanish: me rodean
  alternatives_spanish:
  - me han rodeado
  - me cercan
  lexicon: HALOT
  rationale: El verbo סבב comunica estar alrededor o rodear. En español, «me rodean» conserva la imagen de cerco ya presente sin volverla demasiado pesada con el perfecto compuesto.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: פָּרִים designa toros o toros jóvenes; «toros» es un equivalente natural y suficientemente fuerte para la metáfora hostil.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - numerosos
  lexicon: HALOT
  rationale: El adjetivo cuantitativo se expresa de forma directa con «muchos», que resulta claro y poético en español.
- source_word: אַבִּירֵי
  english_pob_choice: mighty bulls
  chosen_spanish: toros poderosos
  alternatives_spanish:
  - toros fuertes
  - los poderosos
  lexicon: HALOT
  rationale: אַבִּיר puede significar fuerte, poderoso o vigoroso. Como va en aposición a פָּרִים, se conserva la imagen bovina con «toros poderosos» en lugar de abstraerla a «los poderosos».
- source_word: בָשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Bashán
  lexicon: HALOT
  rationale: Nombre propio geográfico transliterado al uso español «Basán». Mantiene la referencia cultural y la asociación con ganado fuerte.
- source_word: כִּתְּרוּנִי
  english_pob_choice: encircle me
  chosen_spanish: me cercan
  alternatives_spanish:
  - me rodean
  - me cercan por completo
  lexicon: HALOT
  rationale: כתר expresa rodear o cercar. «Me cercan» mantiene el segundo hemistiquio diferenciado de «me rodean» y conserva la paralelidad poética.
theological_decisions:
- issue: Imagen metafórica de adversarios como toros
  english_pob_reading: Retain the metaphor directly as 'bulls' rather than interpretively rendering 'enemies' in the main text.
  chosen_spanish_reading: Conservar la metáfora como «toros» y «toros poderosos», sin explicarla como «enemigos» en el texto principal.
  alternative_spanish_readings:
  - Muchos enemigos me rodean; los poderosos de Basán me cercan.
  - Muchos toros me rodean; los fuertes de Basán me cercan.
  rationale: El hebreo presenta a los adversarios mediante imaginería animal. La traducción debe preservar esa tensión poética y dejar la interpretación al lector, como en la base inglesa POB.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; no paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado fue alto y no se detectaron objeciones textuales o semánticas.
  spanish_consistency_notes:
  - Se mantuvo la metáfora bovina del hebreo, en paralelo con la lectura inglesa auditada.
  - Se usó «Basán» como transliteración española estable del topónimo.
  - Se evitó un calco rígido y se conservaron dos verbos distintos («rodean» / «cercan») para reflejar el paralelismo del texto fuente.
