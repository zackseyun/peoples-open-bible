translation:
  language: es
  text: Y ahora, hijo[a], ama a tus hermanos, y no te envanezcas en tu corazón por encima de tus hermanos y de los hijos y las hijas de tu pueblo, para tomar una esposa de entre ellos. Porque en el orgullo hay ruina y mucho desorden, y en la inutilidad[b] hay disminución y gran necesidad; porque la inutilidad es madre del hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te hagas orgulloso respecto de tus hermanos y de los hijos y las hijas de tu pueblo al tomar una esposa de entre ellos». La sintaxis griega es comprimida, y la relación exacta entre la advertencia contra el orgullo y la cláusula matrimonial puede entenderse de más de una manera.'
    reason: alternative_reading
  - marker: b
    text: También puede traducirse «ociosidad», «holgazanería» o, menos probablemente en este contexto, «falta de provecho» o «inutilidad» en sentido de improductividad. Las líneas vecinas sobre disminución, necesidad y hambre favorecen la idea de inactividad improductiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - hijo
  - niño mío
  lexicon: BDAG
  rationale: El vocativo es tierno y directo. «Niño» conserva la cercanía afectiva sin añadir posesivo inexistente; «hijo» sería más interpretativo y «niño mío» introduce un matiz no presente.
- source_word: ἀγάπα
  english_pob_choice: love
  chosen_spanish: ama
  alternatives_spanish:
  - quiére
  - muéstrale amor a
  lexicon: BDAG
  rationale: El imperativo pide una acción estable de amor. «Ama» es natural en español y conserva la fuerza directa del verbo griego.
- source_word: ἀδελφούς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  lexicon: BDAG
  rationale: El plural masculino griego se mantiene como «hermanos». En español bíblico es claro y no fuerza una expansión que el texto no hace aquí.
- source_word: ὑπερηφάνευε
  english_pob_choice: become proud
  chosen_spanish: te engrías
  alternatives_spanish:
  - te vuelvas arrogante
  - te hagas orgulloso
  lexicon: BDAG
  rationale: El verbo expresa autoexaltación interior. «Te engrías» comunica bien la idea de orgullo presuntuoso sin sonar demasiado moderno o moralizante.
- source_word: τῇ καρδίᾳ σου
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu mente
  - dentro de ti
  lexicon: BDAG
  rationale: Se conserva la antropología bíblica literal. «Corazón» es la mejor correspondencia para el centro interno de la persona.
- source_word: ἀπὸ τῶν ἀδελφῶν σου καὶ τῶν υἱῶν καὶ θυγατέρων τοῦ λαοῦ σου
  english_pob_choice: over your brothers and the sons and daughters of your people
  chosen_spanish: sobre tus hermanos y sobre los hijos y las hijas de tu pueblo
  alternatives_spanish:
  - contra tus hermanos y contra los hijos y las hijas de tu pueblo
  - respecto de tus hermanos y de los hijos y las hijas de tu pueblo
  lexicon: BDAG
  rationale: La preposición con lenguaje de orgullo comunica elevación por encima de otros. «Sobre» mantiene esa relación jerárquica implícita mejor que una simple separación.
- source_word: λαβεῖν σεαυτῷ ἐξ αὐτῶν γυναῖκα
  english_pob_choice: to take a wife for yourself from among them
  chosen_spanish: para tomar de entre ellos una esposa para ti
  alternatives_spanish:
  - para casarte con una de entre ellos
  - para tomar para ti una mujer de entre ellos
  lexicon: BDAG
  rationale: Se conserva el infinitivo de propósito y la procedencia «de entre ellos». «Esposa» evita la ambigüedad moderna de «mujer» y expresa el sentido matrimonial con claridad.
- source_word: ἀπώλεια
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - destrucción
  - perdición
  lexicon: BDAG
  rationale: «Ruina» reproduce bien el resultado desastroso sin cargar el término con un sentido escatológico ajeno al contexto sapiencial.
- source_word: ἀκαταστασία πολλή
  english_pob_choice: much disorder
  chosen_spanish: mucho desorden
  alternatives_spanish:
  - mucha confusión
  - mucha inestabilidad
  lexicon: BDAG
  rationale: «Desorden» es claro y amplio para la inestabilidad social o práctica que sugiere el texto. El cuantificador «mucho» refleja el πολλή griego.
- source_word: ἀχρειότης
  english_pob_choice: uselessness
  chosen_spanish: inutilidad
  alternatives_spanish:
  - holgazanería
  - inactividad improductiva
  - pereza
  lexicon: BDAG
  rationale: La revisión inglesa favorece «uselessness», pero en español «inutilidad» conserva mejor la fuerza de falta de provecho sin introducir demasiado una acusación moral específica que el contexto solo sugiere.
- source_word: ἐλάττωσις
  english_pob_choice: decline
  chosen_spanish: disminución
  alternatives_spanish:
  - reducción
  - empobrecimiento
  lexicon: BDAG
  rationale: El sustantivo expresa reducción o mengua. «Disminución» es fiel y funcional en español, especialmente junto a la referencia a la necesidad y al hambre.
- source_word: ἔνδεια μεγάλη
  english_pob_choice: great want
  chosen_spanish: gran necesidad
  alternatives_spanish:
  - gran carencia
  - gran pobreza
  lexicon: BDAG
  rationale: «Necesidad» conserva la idea de falta aguda. «Gran necesidad» suena natural y mantiene el tono proverbial.
- source_word: μήτηρ ἐστὶν τοῦ λιμοῦ
  english_pob_choice: is the mother of famine
  chosen_spanish: es madre del hambre
  alternatives_spanish:
  - es la madre del hambre
  - da origen al hambre
  lexicon: BDAG
  rationale: Se conserva la metáfora materna explícita. «Hambre» comunica mejor en español la idea de λιμός en este contexto sapiencial que una paráfrasis abstracta.
theological_decisions:
- issue: Relación entre orgullo y la cláusula matrimonial comprimida
  english_pob_reading: The warning links pride toward one's kin and people with the choice of taking a wife from among them, without importing a broader doctrinal claim beyond the verse.
  chosen_spanish_reading: La advertencia vincula el orgullo respecto de los parientes y del pueblo con la decisión de tomar esposa de entre ellos, sin resolver más de lo que el griego permite.
  alternative_spanish_readings:
  - No te engrías al tomar esposa de entre tu propio pueblo.
  - No te hagas orgulloso respecto de tus hermanos y del pueblo cuando elijas esposa de entre ellos.
  rationale: La sintaxis griega es comprimida. La redacción española conserva esa tensión sin decidir de forma excesiva si el énfasis principal está en el matrimonio endógamo o en el orgullo que lo rodea.
  doctrine_reference: Preservar la tensión textual en lugar de armonizarla de antemano.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió «uselessness» frente a «idleness» para ἀχρειότης. En español se optó por «inutilidad» por ser la forma más transparente y menos interpretativamente cargada, manteniendo el contraste con «disminución» y «gran necesidad». También se preservó la cláusula infinitiva con «para tomar» y la metáfora final de madre del hambre.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma estándar cuando corresponda, pero este versículo no lo contiene.
  - Se mantuvo «hermanos» por fidelidad al masculino plural griego y al precedente auditado en inglés.
  - Se evitó «Cristo» o fórmulas tradicionales no presentes en el texto.
  - La alternancia entre «esposa» y «mujer» se resolvió a favor de «esposa» para claridad matrimonial en español.
  - La advertencia del orgullo se tradujo sin suavizar la tensión sintáctica del original.
