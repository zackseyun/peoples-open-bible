translation:
  language: es
  text: El perezoso hunde su mano en el plato[a][b]; está demasiado cansado para volverla a llevar a su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esconde su mano en el plato». El verbo hebreo puede significar «esconder» o «enterrar»; se eligió «hunde» para conservar la imagen exagerada del proverbio en español.
    reason: lexical_alternative
  - marker: b
    text: O «en el tazón» o «en la fuente».
    reason: lexical_alternative
lexical_decisions:
- source_word: טָמַן
  english_pob_choice: buries
  chosen_spanish: hunde
  alternatives_spanish:
  - esconde
  - entierra
  - mete
  lexicon: HALOT
  rationale: El verbo hebreo puede significar esconder, ocultar o enterrar. En este proverbio hiperbólico, «hunde» conserva la imagen corporal y exagerada mejor que un verbo más plano como «mete», y evita la posible rareza de «entierra» en español aplicado a la mano.
- source_word: עָצֵל
  english_pob_choice: sluggard
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el flojo
  - la persona perezosa
  - el holgazán
  lexicon: HALOT
  rationale: En Proverbios, el término funciona como tipo proverbial. «El perezoso» mantiene ese valor caracterológico en español sin perder naturalidad.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  - su propia mano
  lexicon: HALOT
  rationale: Es una traducción directa del sustantivo singular con sufijo de tercera persona masculina, manteniendo la imagen concreta.
- source_word: בַּצַּלָּחַת
  english_pob_choice: in the dish
  chosen_spanish: en el plato
  alternatives_spanish:
  - en el tazón
  - en la fuente
  - en la vasija
  lexicon: HALOT
  rationale: El sustantivo designa un recipiente para comer. «Plato» es la opción más natural en español y conserva el contexto de comida sin sobrerresolver la forma del recipiente.
- source_word: נִלְאָה
  english_pob_choice: is too weary
  chosen_spanish: le cuesta tanto
  alternatives_spanish:
  - está demasiado cansado
  - se fatiga
  - está cansado
  lexicon: HALOT
  rationale: La forma puede expresar hacerse cansado o agotado. En el contexto, la idea no es cansancio físico normal sino una ironía sobre la pereza extrema; «le cuesta tanto» transmite bien ese efecto resultante en español.
- source_word: לַהֲשִׁיבָהּ
  english_pob_choice: to bring it back
  chosen_spanish: devolverla
  alternatives_spanish:
  - volverla a traer
  - traerla de vuelta
  - retornarla
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer volver o traer de regreso. «Devolverla» recoge ese movimiento de regreso desde el plato hacia la boca y suena más natural que una traducción demasiado literal.
- source_word: אֶל פִּיו
  english_pob_choice: to his mouth
  chosen_spanish: a su boca
  alternatives_spanish:
  - a su propia boca
  - hasta su boca
  lexicon: HALOT
  rationale: «Boca» es la equivalencia literal e idiomática del hebreo y preserva la imagen cómica del proverbio.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto de traducción y que toda nota tenga anclaje visible. No se añadieron notas sin marcador ni marcadores sin nota.
  spanish_consistency_notes:
  - Se prefirió «el perezoso» como tipo proverbial estable en Proverbios.
  - Se mantuvo el registro sobrio y publicable, sin calcado innecesario del inglés.
  - Se preservó la comicidad hiperbólica del original mediante una imagen corporal concreta y una frase final idiomática.
