translation:
  language: es
  text: para que pueda huir allí el homicida que hiere de muerte a una persona por accidente[a], sin saberlo, y les servirán de refugio[b] del vengador de sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin intención», o «inadvertidamente». El hebreo usa dos expresiones que subrayan que no se trata de un homicidio deliberado.
    reason: lexical_alternative
  - marker: b
    text: O «del vengador de la sangre». La frase alude al pariente responsable de reclamar justicia por la muerte dentro del sistema legal israelita.
    reason: cultural_note
lexical_decisions:
- source_word: לָנוּס
  english_pob_choice: may flee
  chosen_spanish: pueda huir
  alternatives_spanish:
  - pueda escapar
  - huyera
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa finalidad. En español, «pueda huir» comunica naturalmente ese propósito sin perder el sentido de movimiento de escape.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio direccional se refiere a las ciudades de refugio mencionadas. «Allí» es claro y sobrio en español moderno.
- source_word: רוֹצֵחַ
  english_pob_choice: manslayer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador
  - que mata
  lexicon: HALOT
  rationale: En este contexto legal, el hebreo no describe a un asesino con intención, sino a alguien involucrado en una muerte. «Homicida» conserva el ámbito jurídico mejor que «asesino».
- source_word: מַכֵּה נֶפֶשׁ
  english_pob_choice: who strikes down a person
  chosen_spanish: que hiere de muerte a una persona
  alternatives_spanish:
  - que mata a una persona
  - que da muerte a una persona
  - que hiere a una persona
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y denota causar la muerte. «Hiere de muerte» mantiene una huella formal del verbo de herir y deja claro el resultado letal.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: una persona
  alternatives_spanish:
  - una vida
  - un ser humano
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona como referencia legal a un ser humano. «Persona» reproduce bien ese valor sin introducir la carga abstracta de «alma».
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: por accidente
  alternatives_spanish:
  - sin intención
  - inadvertidamente
  - por error
  lexicon: HALOT
  rationale: El término expresa inadvertencia o acción accidental en un marco legal. «Por accidente» es natural en español y comunica bien la ausencia de intención.
- source_word: בִּבְלִי דָעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin saberlo
  alternatives_spanish:
  - sin conocimiento
  - sin darse cuenta
  - sin advertirlo
  lexicon: HALOT
  rationale: La frase refuerza la falta de conocimiento o conciencia. «Sin saberlo» conserva la idea con fluidez idiomática en español.
- source_word: וְהָיוּ לָכֶם לְמִקְלָט
  english_pob_choice: and they shall be for you a refuge
  chosen_spanish: y les servirán de refugio
  alternatives_spanish:
  - y serán para ustedes un refugio
  - y les serán refugio
  lexicon: HALOT
  rationale: El verbo plural se refiere a las ciudades. «Servirán de refugio» expresa la función de las ciudades con buena naturalidad y cercanía al hebreo.
- source_word: מִקְלָט
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - asilo
  - amparo
  - santuario
  lexicon: HALOT
  rationale: En la institución de las ciudades de refugio, «refugio» es el equivalente más claro y estándar en español.
- source_word: מִגֹּאֵל הַדָּם
  english_pob_choice: from the avenger of blood
  chosen_spanish: contra el vengador de sangre
  alternatives_spanish:
  - del vengador de sangre
  - contra el vengador de la sangre
  - del redentor de sangre
  lexicon: HALOT
  rationale: El término designa al responsable del reclamo de sangre dentro del sistema legal de parentesco. «Vengador de sangre» sigue de cerca la formulación tradicional y hace visible la carga jurídica del hebreo.
theological_decisions:
- issue: Carácter legal de la muerte causada
  english_pob_reading: The verse describes one who has caused a death unintentionally, not a morally culpable murderer.
  chosen_spanish_reading: El versículo describe a quien causó una muerte por accidente y sin saberlo, no a un asesino con intención premeditada.
  alternative_spanish_readings:
  - a un asesino
  - a un homicida culpable
  - a un matador
  rationale: Las dos expresiones hebreas de calificación excluyen la intención homicida. La traducción evita sugerir asesinato deliberado y conserva la tensión legal del texto.
  doctrine_reference: Éxodo 21:13; Números 35:11-15
translation_notes:
  revision_awareness: 'No hay cambios sustanciales respecto del pasaje base en el audit trail inglés; la versión española sigue la misma lectura óptima: muerte accidental, sin conocimiento, y función de refugio frente al vengador de sangre.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo, ya que no aparece el nombre divino en el texto fuente.
  - Se evita «SEÑOR» como sustituto teológico, conforme a la política del proyecto.
  - «Homicida» se usa en sentido legal y no como equivalente de asesinato deliberado.
  - «Vengador de sangre» conserva el término técnico del sistema legal israelita.
