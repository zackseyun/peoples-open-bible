revisions:
- from: El enemigo actuó en alienación[a], con orgullo; y su corazón era ajeno a nuestro Dios[b].
  to: El enemigo obró como ajeno[a], en soberbia; y su corazón era ajeno a nuestro Dios[b].
  rationale: Se reemplaza «en alienación» por «obró como ajeno» para evitar un término español poco natural y psicológicamente cargado, mientras se conserva la idea central de ἀλλοτριότης como ajenidad/otredad. Se cambia «con orgullo» por «en soberbia» para reflejar mejor ὑπερηφανίᾳ y mantener el paralelismo formal del griego. Se mantiene «era ajeno a nuestro Dios» porque reproduce bien ἀλλοτρία sin forzar la idea de una relación previa rota.
