base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/030/008.yaml
  text: And it shall happen in that day[a], declares Yahweh of Armies, that I will break his yoke from off your neck, and I will tear off your bonds[b], and foreigners shall no longer make him their slave.
  footnotes:
