base_translation:
  language: en
  yaml_path: translation/ot/isaiah/050/002.yaml
  text: Why[a], when I came, was there no man? When I called, was there no one to answer? Is my hand really too short to redeem, or is there no power in me to deliver? Behold[b], by my rebuke I dry up the sea; I make rivers a wilderness[c]; their fish stink for lack of water and die of thirst.
  footnotes:
  - marker: a
    text: Or 'was there no one?' Hebrew 'no man' (אִישׁ), a masculine singular form used here in a representative sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'Has my hand become too short for redemption?' The Hebrew preserves the metaphor of a 'shortened hand' for inability.
    reason: lexical_alternative
  - marker: c
    text: '''Deliver'' could also be rendered ''save'' or ''rescue.'''
    reason: lexical_alternative
