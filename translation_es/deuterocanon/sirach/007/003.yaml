review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo extante de Sirácida 7:3 y conserva correctamente la nota sobre la variante griega. Sin embargo, «de parte de Dios» no refleja con suficiente naturalidad ni precisión el simple מן en este contexto; sugiere mediación o comisión más que procedencia. El sentido fuente se preserva mejor con «de Dios».
  spanish_quality_summary: La redacción es comprensible, pero «autoridad de parte de Dios» suena forzada en español bíblico natural. «Un asiento de honor» es posible, aunque «un puesto de honor» o «un lugar de honor» sería más idiomático; no obstante, puede mantenerse para conservar la imagen concreta de מוֹשַׁב. La nota textual está clara y bien redactada.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Dios» está bien para אֵל. «Autoridad» corresponde adecuadamente a מֶמְשֶׁלַת. La decisión clave a ajustar es la preposición: מן debe verterse aquí como «de», no «de parte de».'
  issues:
  - severity: medium
    issue: «de parte de Dios» para מֵאֵל
    rationale: 'El hebreo expresa simplemente procedencia: «de Dios». En español, «de parte de» suele implicar mensaje, representación o comisión, matiz no exigido por el texto y menos natural con «buscar autoridad».'
  - severity: low
    issue: Naturalidad limitada de «un asiento de honor»
    rationale: La frase es entendible y bastante fiel a la imagen, pero en español corriente «un puesto de honor» o «un lugar de honor» suena más natural. Aun así, no es un error y puede conservarse por cercanía formal.
  - severity: low
    issue: 'Alternativa léxica defectuosa en las decisiones: «No procuras»'
    rationale: Como alternativa de imperativo negativo, «No procuras» es gramaticalmente incorrecto; debería ser «No procures». Esto no afecta el texto principal, pero muestra un pequeño descuido en la documentación.
  revised_spanish_text: No busques autoridad de Dios[a], ni del rey un asiento de honor.
  revised_footnotes:
  - marker: a
    text: 'El testigo griego aquí lee una sentencia distinta: «Hijo, no siembres en surcos de injusticia, y no los segarás siete veces». El texto principal sigue el testigo hebreo conservado para este versículo.'
    reason: textual_variant
