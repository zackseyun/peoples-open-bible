revisions:
- from: Allí está el mar[a], grande y ancho; en él hay seres que pululan sin número[b][c], criaturas vivientes, pequeñas junto con grandes.
  to: He aquí el mar[a], grande y ancho; en él hay seres que pululan sin número[b][c], criaturas, pequeñas y grandes.
  rationale: Se reemplazó «Allí está» por «He aquí» para reflejar mejor la función presentativa de זֶה sin imponer una localización espacial marcada. Se simplificó el final a «criaturas, pequeñas y grandes» para mejorar la fluidez del español sin perder la inclusividad del hebreo. También se ajustó la redacción y clasificación de la nota c para alinearla con el rastro auditado en inglés.
