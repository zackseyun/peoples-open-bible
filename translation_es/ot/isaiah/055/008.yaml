    rationale: El hebreo מַחְשְׁבוֹתֵיכֶם / דַרְכֵיכֶם significa 'vuestros/de ustedes', no 'de ellos/ellas' ni un 'sus' ambiguo. En español neutro latinoamericano, 'de ustedes' evita ambigüedad y preserva la dirección directa del discurso.
  - severity: low
