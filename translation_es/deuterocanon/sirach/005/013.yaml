translation:
  language: es
  text: No seas un aventador a todo viento[a], ni camines por la senda de la tormenta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego paralelo dice algo muy distinto: «La honra y la deshonra están en el habla, y la lengua del hombre es su caída». La traducción principal sigue el testimonio hebreo conservado, que aquí es la fuente primaria cuando está disponible.'
    reason: alternative_reading
  - marker: b
    text: El hebreo שִׁבֹּלֶת es incierto aquí. Puede significar «tormenta» o «torrente»; en otros contextos también puede referirse a una «espiga» de grano. La traducción sigue el sentido que mejor encaja con la imagen de «todo viento».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּהְיֶה
  english_pob_choice: Do not be
  chosen_spanish: No seas
  alternatives_spanish:
  - No llegues a ser
  - No te hagas
  lexicon: HALOT
  rationale: La prohibición con היה se expresa de manera natural y directa en español con un imperativo negativo de ser; conserva el tono admonitorio sin añadir matices innecesarios.
- source_word: זוֹרֶה
  english_pob_choice: a winnower
  chosen_spanish: un aventador
  alternatives_spanish:
  - uno que avienta el grano
  - un bieldador
  lexicon: HALOT
  rationale: El verbo agrícola de aventar o separar el grano por el viento se comunica mejor en español con «aventador», que preserva la imagen concreta de inestabilidad ligada al viento.
- source_word: לְכָל רוּחַ
  english_pob_choice: to every wind
  chosen_spanish: para todo viento
  alternatives_spanish:
  - a todo viento
  - con todo viento
  lexicon: HALOT
  rationale: «Para todo viento» reproduce la apertura a cualquier viento o influencia cambiante y mantiene la concisión proverbial del hebreo.
- source_word: וּפוֹנֶה
  english_pob_choice: walk on
  chosen_spanish: camines
  alternatives_spanish:
  - vayas
  - te desvíes
  lexicon: HALOT
  rationale: El segundo miembro continúa la advertencia en forma de movimiento; «camines» conserva el matiz de seguir un curso de vida sin volverlo demasiado explicativo.
- source_word: דֶרֶך
  english_pob_choice: path
  chosen_spanish: camino
  alternatives_spanish:
  - senda
  - ruta
  lexicon: HALOT
  rationale: «Camino» es la opción más natural y bíblicamente transparente en español para el hebreo דֶרֶך, sin perder la imagen de conducta o trayectoria.
- source_word: שִׁבֹּלֶת
  english_pob_choice: the storm
  chosen_spanish: la tormenta
  alternatives_spanish:
  - el torrente
  - la avenida
  - la corriente
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa de leer el término en sentido meteorológico dentro de la imagen de viento e inestabilidad, «tormenta» comunica bien la idea de fuerza peligrosa y conserva la ambigüedad del hebreo.
theological_decisions:
- issue: Preferencia por el texto hebreo frente al paralelo griego distinto
  english_pob_reading: The main translation follows the extant Hebrew witness, which is the primary source for this verse where available.
  chosen_spanish_reading: La traducción principal sigue el testimonio hebreo conservado, porque aquí es la fuente primaria disponible.
  alternative_spanish_readings:
  - 'Seguir el griego: «La honra y la deshonra están en el habla, y la lengua del hombre es su caída».'
  rationale: El hebreo y el griego no coinciden; para este registro se mantiene el hebreo como base textual principal, dejando constancia del paralelo griego como lectura alternativa relevante.
  doctrine_reference: Textual criticism / primacía del testimonio hebreo conservado en Sirácides cuando está disponible
translation_notes:
  revision_awareness: El inglés POB revisó esta línea desde una formulación con «turn along» a «walk on» para mayor naturalidad, pero mantuvo la metáfora de inestabilidad («winnower», «every wind», «path», «storm»). La versión española adopta esa misma orientación y la vierte de modo idiomático como advertencia de conducta, sin perder la imagen agrícola y meteorológica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se eligieron términos concretos y proverbiales («aventador», «viento», «camino», «tormenta») para conservar el paralelismo imaginativo del hebreo.
  - No se incorporó el paralelo griego en el texto principal porque el expediente lo trata como lectura secundaria frente al testimonio hebreo conservado.
