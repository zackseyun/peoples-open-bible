revisions:
- from: 'Entonces los hijos de Israel clamaron a Yahvé[a], y Yahvé levantó un libertador[b] para los hijos de Israel, que los libró: Otoniel, hijo de Quenaz, hermano menor de Caleb[c].'
  to: 'Entonces los hijos de Israel clamaron a Yahvé[a], y Yahvé levantó un rescatador[b] para los hijos de Israel, que los libró: Otniel, hijo de Quenaz, hermano menor de Caleb[c].'
  rationale: Se revisa «libertador» a «rescatador» para alinear mejor el español con el sentido de ישׁע y con la justificación léxica del POB, evitando un matiz innecesariamente politizado. Se regulariza «Otoniel» a «Otniel» por mayor fidelidad onomástica y uso bíblico común en español. Las demás decisiones principales pueden mantenerse.
  reviewer_model: gpt-5.4
