translation:
  language: es
  text: Ordena a los sacerdotes que llevan el arca del testimonio que suban del Jordán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el arca del testigo». El hebreo dice «testimonio», no la expresión más familiar «pacto» o «alianza» que aparece en muchas otras referencias al arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַוֵּה
  english_pob_choice: Command
  chosen_spanish: Da esta orden
  alternatives_spanish:
  - Manda
  - Ordena
  lexicon: HALOT
  rationale: El imperativo directivo se conserva con una fórmula natural en español. ‘Da esta orden’ comunica la fuerza de צַוֵּה sin sonar excesivamente rígido, aunque ‘manda’ u ‘ordena’ también serían posibles.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: כהנים se traduce de manera estándar por ‘sacerdotes’, forma clara y ampliamente inteligible en español bíblico.
- source_word: נֹשְׂאֵי
  english_pob_choice: who carry
  chosen_spanish: que llevan
  alternatives_spanish:
  - que cargan
  - portadores de
  lexicon: HALOT
  rationale: El participio constructo se vierte con una relativa natural en español. ‘Llevan’ mantiene el sentido de portar sin la dureza de un calco.
- source_word: אֲרוֹן הָעֵדוּת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del testimonio
  - el arca del testimonio
  lexicon: HALOT
  rationale: Se conserva עֵדוּת como ‘testimonio’ y no se armoniza con ‘pacto’/‘alianza’, porque el hebreo aquí usa explícitamente ese término. ‘Arca’ corresponde a אֲרוֹן.
- source_word: וְיַעֲלוּ
  english_pob_choice: to come up
  chosen_spanish: suban
  alternatives_spanish:
  - suban
  - salgan
  lexicon: HALOT
  rationale: עלה en este contexto de abandonar el cauce se expresa de manera natural con ‘suban’, que preserva la perspectiva espacial del hebreo.
- source_word: מִן הַיַּרְדֵּן
  english_pob_choice: from the Jordan
  chosen_spanish: del Jordán
  alternatives_spanish:
  - desde el Jordán
  - fuera del Jordán
  lexicon: HALOT
  rationale: ‘Del Jordán’ reproduce la preposición de salida con un español fluido. ‘Jordán’ se conserva como nombre propio del río.
theological_decisions:
- issue: Distinción entre ‘testimonio’ y la formulación tradicional ‘pacto’ en relación con el arca
  english_pob_reading: The Hebrew reads 'testimony,' not the more familiar 'covenant' found in many other references to the ark.
  chosen_spanish_reading: el arca del testimonio
  alternative_spanish_readings:
  - el arca del pacto
  - el arca de la alianza
  rationale: 'Se mantiene la tensión textual que destaca el audit trail: este versículo no dice ‘pacto/alianza’, sino ‘testimonio’. En español se conserva esa precisión para no borrar la diferencia léxica del hebreo.'
  doctrine_reference: Precisión textual y terminológica en la traducción bíblica; cf. uso diferenciado de עֵדוּת frente a fórmulas de pacto
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el análisis previo: no se requieren revisiones textuales, y se preserva la decisión clave de no armonizar עֵדוּת con la formulación más conocida sobre el arca.'
  spanish_consistency_notes:
  - Se usa ‘Jordán’ como nombre propio del río, en concordancia con el uso bíblico en español.
  - Se evita ‘SEÑOR’ o términos de armonización no presentes en el hebreo.
  - ‘Sacerdotes’ se mantiene como equivalente estable de כהנים.
  - La nota conserva la alternativa léxica documentada sin introducir lecturas ajenas al texto.
