    rationale: La nota explica el uso sustantivado de «los/lejanos» y «los/cercanos»; funciona mejor anclada al grupo vocativo completo «ustedes que están lejos» que solo a «lejos», aunque el borrador actual no distorsiona el sentido.
  revised_spanish_text: Oigan, ustedes que están lejos[a], lo que he hecho; y conozcan, ustedes que están cerca, mi poder[b].
