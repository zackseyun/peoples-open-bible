translation:
  language: es
  text: 'Gaal volvió a hablar y dijo: «Miren, viene gente bajando desde el centro del territorio[a], y un grupo viene por el camino del Roble de los Adivinos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «el ombligo de la tierra», un modismo para la parte central del territorio.
    reason: lexical_alternative
  - marker: b
    text: O «el terebinto de los adivinos» / «el roble de Meonenim». El último elemento del nombre de lugar es incierto y puede referirse a adivinos o agoreros.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד לְדַבֵּר
  english_pob_choice: spoke again
  chosen_spanish: habló de nuevo
  alternatives_spanish:
  - continuó hablando
  - volvió a hablar
  lexicon: HALOT
  rationale: El hebreo expresa el giro idiomático de reanudar el habla; en español, «habló de nuevo» conserva la repetición narrativa de forma natural y fiel sin volverlo más explícito de lo que el hebreo exige.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  lexicon: HALOT
  rationale: Como partícula deíctica que llama la atención de los oyentes, «Miren» reproduce bien el valor discursivo en español moderno y conserva la inmediatez del hebreo.
- source_word: עָם
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - gente
  - hombres
  - pueblo
  lexicon: HALOT
  rationale: En este contexto Gaal está señalando grupos que se aproximan; «personas» es suficientemente general y no fuerza un matiz militar que el sustantivo hebreo por sí solo no exige.
- source_word: יֹרְדִים
  english_pob_choice: are coming down
  chosen_spanish: bajando
  alternatives_spanish:
  - descendiendo
  - viniendo hacia abajo
  lexicon: HALOT
  rationale: El participio indica movimiento en curso; «bajando» preserva la perspectiva visual del observador y suena natural en español narrativo.
- source_word: מֵעִם טַבּוּר הָאָרֶץ
  english_pob_choice: from the center of the land
  chosen_spanish: desde el centro de la tierra
  alternatives_spanish:
  - desde el ombligo de la tierra
  - desde el centro de la tierra
  lexicon: HALOT
  rationale: Aunque טַבּוּר literalmente es «ombligo», el uso geográfico apunta al centro de la tierra/territorio. Se mantiene «centro» para transmitir el sentido idiomático y se evita una literalidad que en español sería oscura; «tierra» refleja la amplitud territorial del hebreo הָאָרֶץ.
- source_word: וְרֹאשׁ אֶחָד
  english_pob_choice: one company
  chosen_spanish: un grupo
  alternatives_spanish:
  - una compañía
  - una división
  - una cabeza
  lexicon: HALOT
  rationale: רֹאשׁ puede funcionar como unidad o destacamento; «un grupo» comunica de forma natural la idea de una parte distinta dentro del conjunto que se acerca, sin imponer una precisión militar no explícita en el hebreo.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está llegando
  lexicon: HALOT
  rationale: El sentido progresivo del relato se expresa en español con «viene», que suena fluido y conserva la observación inmediata del narrador.
- source_word: מִדֶּרֶךְ
  english_pob_choice: by the way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la vía de
  - desde el camino de
  lexicon: HALOT
  rationale: La frase describe la ruta o dirección de llegada; «por el camino de» es la forma más natural en español y mantiene el matiz topográfico.
- source_word: אֵלוֹן
  english_pob_choice: Oak
  chosen_spanish: Encino
  alternatives_spanish:
  - Roble
  - Terebinto
  lexicon: HALOT
  rationale: אֵלוֹן puede referirse a un árbol grande, comúnmente «oak/terebinth». «Encino» conserva el valor arbóreo de manera comprensible en español y evita la rigidez de un calco técnico.
- source_word: מְעוֹנְנִים
  english_pob_choice: the Soothsayers
  chosen_spanish: los Adivinos
  alternatives_spanish:
  - los Adivinadores
  - los Soñadores
  - los Soothsayers
  lexicon: HALOT
  rationale: El término es incierto y puede relacionarse con adivinación/augurio. «Adivinos» comunica ese campo semántico en español; se mantiene la mayúscula por tratarse probablemente de un nombre de lugar o elemento toponímico.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés presenta alta concordancia y sin revisiones aplicadas; esta versión sigue la lectura estable del texto, conservando las dos tensiones léxicas principales: el modismo de «ombligo de la tierra» y la incertidumbre del topónimo/elemento final «Meonenim».'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparece léxico divino en el hebreo.
  - Se evita «SEÑOR» o equivalentes tradicionales no presentes en el texto.
  - La puntuación y el estilo intentan reproducir el discurso directo narrativo sin añadir interpretación.
  - Se conserva la ambigüedad de מְעוֹנְנִים mediante un nombre con valor adjetival («los Adivinos»), sin resolverla de manera excesiva.
