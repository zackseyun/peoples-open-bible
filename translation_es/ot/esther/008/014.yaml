revisions:
- from: Los correos[a], montados en los corceles reales, salieron apresurados y urgidos por la orden del rey; y el decreto fue promulgado en Susa la ciudadela.
  to: Los correos[a], montados en los corceles reales, salieron apresurados y urgidos por la orden del rey, y el decreto fue emitido en Susa la ciudadela.
  rationale: Se mantiene la estructura y sentido del borrador, pero se corrige la nota al pie para alinearla con la alternativa documentada en la auditoría inglesa final, se suaviza la puntuación para un español más natural, y se cambia 'promulgado' por 'emitido' como equivalente administrativo más fluido en este contexto narrativo.
  reviewer_model: gpt-5.4
