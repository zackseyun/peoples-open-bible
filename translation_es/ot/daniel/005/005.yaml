translation:
  language: es
  text: En ese mismo instante salieron los dedos de una mano humana[a] y escribieron[b] frente al candelabro[c] sobre el yeso[d] de la pared del palacio[e] del rey, y el rey vio la palma[f] de la mano que estaba escribiendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dedos de una mano de hombre». El arameo אֱנָשׁ puede significar «hombre» o, más ampliamente, «ser humano».
    reason: lexical_alternative
  - marker: b
    text: O «estaban escribiendo».
    reason: lexical_alternative
  - marker: c
    text: O «delante del candelabro» u «opuesto al candelabro». La expresión aramea señala una posición frente a la fuente de luz.
    reason: lexical_alternative
  - marker: d
    text: O «estuco» o «enlucido» de la pared. El término arameo puede referirse a un revestimiento de cal o yeso.
    reason: lexical_alternative
  - marker: e
    text: O «del salón del rey». El arameo puede designar un palacio o una gran sala dentro de él.
    reason: lexical_alternative
  - marker: f
    text: O posiblemente «la mano» en sentido más general; el matiz exacto de פַּס es debatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהּ שַׁעֲתָה
  english_pob_choice: At that moment
  chosen_spanish: En ese mismo instante
  alternatives_spanish:
  - En aquella hora
  - En ese momento
  lexicon: HALOT
  rationale: La expresión aramea indica inmediatez narrativa; «En ese mismo instante» conserva la súbita irrupción del signo y suena natural en español.
- source_word: נפקו
  english_pob_choice: came out
  chosen_spanish: aparecieron
  alternatives_spanish:
  - salieron
  - salieron a la vista
  lexicon: HALOT
  rationale: El verbo literalmente puede ser «salir/caber afuera», pero en este contexto la acción es la manifestación visible de unos dedos sobrenaturales; «aparecieron» comunica bien esa emergencia sin perder el carácter repentino.
- source_word: אֶצְבְּעָן דִּי יַד אֱנָשׁ
  english_pob_choice: the fingers of a human hand
  chosen_spanish: los dedos de una mano humana
  alternatives_spanish:
  - los dedos de una mano de hombre
  - los dedos de una mano de un ser humano
  lexicon: HALOT
  rationale: «Humana» conserva la oposición entre lo humano y lo sobrenatural y evita imponer masculinidad específica; «mano humana» es idiomática y fiel al constructo arameo.
- source_word: וְכָתְבָן
  english_pob_choice: and wrote
  chosen_spanish: y escribieron
  alternatives_spanish:
  - y escribía
  - y estaban escribiendo
  lexicon: HALOT
  rationale: El plural se refiere a los dedos como agente visible. En español, «escribieron» reproduce el hecho narrativo de forma clara; «estaban escribiendo» sería más aspectual, pero aquí el relato avanza con fuerza puntual.
- source_word: לָקֳבֵל נֶבְרַשְׁתָּא
  english_pob_choice: opposite the lampstand
  chosen_spanish: frente al candelabro
  alternatives_spanish:
  - en frente del candelabro
  - opuesto al candelabro
  lexicon: HALOT
  rationale: «Frente a» expresa la relación espacial del arameo con naturalidad. «Candelabro» es el equivalente español más transparente de נברשתא en este contexto de iluminación del salón.
- source_word: עַל גִּירָא
  english_pob_choice: on the plaster
  chosen_spanish: sobre el yeso
  alternatives_spanish:
  - sobre el revoque
  - sobre el enlucido
  lexicon: HALOT
  rationale: El término arameo denota una capa de revestimiento de pared; «yeso» es comprensible para lectores actuales y mantiene la idea de una superficie blanqueada o estucada. En nota se preserva la alternativa técnico-textual de «yeso/estuco» implícita en el hebreo-arameo.
- source_word: דִּי כְתַל הֵיכְלָא דִּי מַלְכָּא
  english_pob_choice: of the wall of the king’s palace
  chosen_spanish: de la pared del palacio del rey
  alternatives_spanish:
  - de la pared del salón del rey
  - de la pared del palacio real
  lexicon: HALOT
  rationale: «Palacio» mantiene el contexto cortesano; «pared» traduce כְתַל con precisión. La lectura «palacio del rey» evita ambigüedad y se ajusta al entorno narrativo.
- source_word: וּמַלְכָּא חָזֵה
  english_pob_choice: and the king saw
  chosen_spanish: y el rey veía
  alternatives_spanish:
  - y el rey vio
  - y el rey observaba
  lexicon: HALOT
  rationale: El participio/verbo aporta una escena en curso; «veía» preserva ese aspecto visual continuo mejor que un pasado simple totalmente puntual.
- source_word: פַּס יְדָה
  english_pob_choice: the palm of the hand
  chosen_spanish: la palma de la mano
  alternatives_spanish:
  - la palma de su mano
  - la mano
  lexicon: HALOT
  rationale: «Palma» es la lectura específica más probable de פַּס aquí y mantiene el foco visual en la parte visible de la mano.
- source_word: דִּי כָתְבָה
  english_pob_choice: that was writing
  chosen_spanish: que estaba escribiendo
  alternatives_spanish:
  - que escribía
  - que escribía en ese momento
  lexicon: HALOT
  rationale: La cláusula relativa presenta la acción en curso; «estaba escribiendo» conserva el aspecto progresivo y la tensión de la escena.
translation_notes:
  revision_awareness: La versión española sigue de cerca el estado final del audit trail inglés, sin cambios textuales reportados en la revisión más reciente; se conservaron las decisiones léxicas principales (aparición repentina, dedos de mano humana, posición frente al candelabro, superficie de yeso/estuco, y la imagen específica de la palma).
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé/Cristo» según los defaults del proyecto, pero este versículo no los contiene.
  - Se mantuvo un registro formal y readable en español neutro, evitando un calco rígido de la sintaxis inglesa.
  - La forma verbal «veía» intenta preservar el aspecto durativo del participio arameo, aunque en español podría leerse como simple pasado; la nota explica la opción.
  - No se introdujo terminología eclesiástica ajena al contexto; «candelabro» y «palacio» siguen el entorno narrativo de la corte babilónica.
