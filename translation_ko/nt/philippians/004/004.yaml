id: PHP.4.4
reference: Philippians 4:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Χαίρετε ἐν κυρίῳ πάντοτε· πάλιν ἐρῶ, χαίρετε.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/004.yaml
  text: Rejoice in the Lord always; again I will say, rejoice.
translation:
  language: ko
  text: 주 안에서 항상 기뻐하십시오. 내가 다시 말합니다, 기뻐하십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Χαίρετε
  english_pob_choice: Rejoice
  chosen_korean: 기뻐하십시오
  alternatives_korean:
  - 즐거워하십시오
  - 기뻐하라
  lexicon: BDAG
  rationale: 현재 능동 명령형 2인칭 복수. 합쇼체 「-십시오」로 권면의 격식을 살린다. 한국 교회에서 가장 널리 외워지는 구절이나, 개역개정의 「하라」(보통체)는 본 번역의 현대 합쇼체 일관성을 위해 사용하지 않는다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주를 인하여
  - 주와 함께
  lexicon: BDAG
  rationale: 바울의 정형 표현 ἐν κυρίῳ를 처소·관계적 의미로 「주 안에서」 보존한다. 「~을 인하여」(인과) 또는 「~로 말미암아」(도구)는 헬라어가 의도적으로 열어 둔 모호함을 좁히게 된다.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_korean: 항상
  alternatives_korean:
  - 늘
  - 언제나
  lexicon: BDAG
  rationale: 「항상」은 한국 교회의 정형어로 정착되어 있으며, 합쇼체 권면의 무게에 적합하다.
- source_word: πάλιν
  english_pob_choice: again
  chosen_korean: 다시
  lexicon: BDAG
  rationale: 강조적 반복 도입어. 「다시」는 간결하고 자연스러운 표준 등가어이다.
- source_word: ἐρῶ
  english_pob_choice: I will say
  chosen_korean: 말합니다
  alternatives_korean:
  - 말하겠습니다
  - 말씀드립니다
  lexicon: BDAG
  rationale: λέγω의 미래형이나, 한국어 「내가 다시 말합니다」가 의지·강조의 미래 함의를 자연스럽게 담는다. 더 강한 「말하겠습니다」는 어조가 무겁고, 「말씀드립니다」는 대상이 하나님이 아닌 회중이므로 어색하다.
- source_word: χαίρετε (반복)
  english_pob_choice: rejoice
  chosen_korean: 기뻐하십시오
  lexicon: BDAG
  rationale: 바울의 수사적 반복을 한국어에서도 동일하게 살린다.
theological_decisions:
- issue: 「주 안에서」의 의미 범위
  chosen_reading: '관계·처소적 읽기: 주와의 연합과 그 영역 안에서 기뻐하는 것'
  alternative_readings:
  - 도구적 「주로 말미암아」
  - 인과적 「주 때문에」
  rationale: 바울의 ἐν κυρίῳ는 일반적으로 영역·관계적 의미가 본령이며, 「주 안에서」가 그 신학적 폭을 그대로 보존한다. 좁은 의미로 결정하지 않는다.
  doctrine_reference: 'Preserve theological tension rather than resolve it.'
