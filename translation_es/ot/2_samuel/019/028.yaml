review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: Ziba habló hostilmente contra Mefiboset ante el rey, el rey es comparado con el ángel de Dios, y se le pide que haga lo que juzgue bueno. Sin embargo, hay desajustes de anclaje de notas y una decisión léxica principal que no sigue la justificación auditada de POB para עבד en este contexto cortesano.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'tu esclavo' suena demasiado literal y menos natural en una fórmula de auto-humillación ante el rey; 'tu siervo' o 'tu servidor' lee mejor en registro bíblico-cortesano. Además, la nota [a] está anclada en la frase equivocada y 'en tus ojos' resulta menos natural que 'a tus ojos' si se mantiene el modismo literal.
  glossary_alignment: 'Buena alineación en ''ángel de Dios'', ''Dios'' y la preservación de la imagen. No hay términos del glosario mayor comprometidos como Yahvé/Mesías. La principal divergencia es עבד: aquí la documentación inglesa explícitamente prefirió ''servant'' por tratarse de una fórmula cortesana, por lo que ''esclavo'' no preserva bien la racionalidad documentada.'
  issues:
  - severity: high
    issue: La nota [a] está colocada después de 'rey' pero su contenido explica 'como un ángel de Dios'.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, induce al lector a asociar la alternativa con 'mi señor el rey' en vez de con 'el ángel de Dios'.
  - severity: high
    issue: La nota [b] está colocada después de 'Dios' pero su contenido explica el modismo 'en tus ojos'.
    rationale: Hay un desajuste formal claro entre marcador y referente textual, contrario a la disciplina requerida de notas.
  - severity: medium
    issue: '''Tu esclavo'' no sigue la rationale documentada para este versículo.'
    rationale: La auditoría inglesa eligió 'your servant' precisamente porque עבד en fórmulas de corte funciona como autorreferencia deferencial. En español bíblico legible, 'tu siervo' preserva mejor ese valor sin introducir la dureza impropia de 'esclavo' en este contexto.
  - severity: medium
    issue: '''En tus ojos'' es comprensible pero poco idiomático en español en esta cláusula.'
    rationale: Si se quiere conservar el calco idiomático con nota, 'a tus ojos' suena más natural y sigue expresando juicio o parecer; alternativamente podría dinamizarse a 'como te parezca', pero el proyecto quiere preservar el idiomático en el texto principal.
  - severity: low
    issue: '''Difamó'' es aceptable, pero ''calumnió'' o ''habló mal de'' también podrían considerarse.'
    rationale: No requiere cambio obligatorio; 'difamó' sí comunica bien la desacreditación hostil.
