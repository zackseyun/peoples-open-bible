review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: segunda persona dirigida a Dios, derrocamiento de los opositores, envío del ardor/ira divina y metáfora de consumo por fuego. Sin embargo, «hojarasca» no representa bien כַּקַּשׁ, que se refiere a paja/rastrojo/hojarasca agrícola tipo rastrojo o paja, no hojas caídas. Además, «ardiente enojo» es comprensible pero menos natural que «ardiente ira» o «ira ardiente» en registro bíblico; aun así, no es un error grave. La revisión principal necesaria es el último símil.'
  spanish_quality_summary: El español es claro y digno, pero «hojarasca» suena menos preciso y algo desviado semánticamente en contexto agrícola-bíblico. «Los consume como paja» es más natural y fiel. El resto del verso lee bien en español moderno e inteligible para uso eclesial.
  glossary_alignment: No hay conflicto con los términos base del proyecto. No aparece Yahvé en este versículo. La traducción mantiene bien el lenguaje de juicio divino sin suavizarlo. Se respeta la segunda persona. La única decisión léxica que conviene corregir es כַּקַּשׁ -> «como paja» (o «como rastrojo»), mejor que «como hojarasca».
  issues:
  - severity: medium
    issue: «hojarasca» para כַּקַּשׁ
    rationale: קַשׁ denota paja, rastrojo o residuo seco de tallos de cereal, no hojas secas. «Hojarasca» introduce una imagen botánica distinta de la del hebreo y del inglés POB («stubble»).
  - severity: low
    issue: 'Alternativa de nota a: «con la abundancia de tu grandeza»'
    rationale: Es aceptable, pero duplica el campo semántico de grandeza/grandeza. Dado que el inglés auditado ofrece «grandeur», conviene «majestad» para evitar repetición y mantener mejor la relación con el texto principal.
  revised_spanish_text: Y en la grandeza de tu majestad derribas a los que se levantan contra ti[a]; envías tu ardiente enojo[b]; los consume como paja.
  revised_footnotes:
  - marker: a
    text: O «con la abundancia de tu majestad».
    reason: lexical_alternative
  - marker: b
    text: O «tu ira ardiente». El hebreo literalmente se refiere a «tu ardiente enojo».
    reason: lexical_alternative
  revision_rationale: Se cambia «hojarasca» por «paja» para reflejar con mayor fidelidad כַּקַּשׁ y conservar la imagen agrícola de material seco rápidamente consumido. También se mejora la nota a para evitar repetición innecesaria y alinear mejor la alternativa con el campo semántico de «grandeur/majesty».
