    changes_summary: Removed 'a man is' to avoid adding words not explicit in the Hebrew; streamlined to 'one is reduced' for accuracy and natural English. Kept the contrast between prostitute and married woman and the image of 'a loaf of bread' and 'a precious life.'
translation:
  language: es
  text: Porque, a causa de una prostituta, uno queda reducido a un pedazo de pan[a], pero una mujer casada[b] caza una vida preciosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Porque, a causa de una prostituta, hasta un pan; y una mujer casada caza una vida/alma preciosa». El hebreo es muy comprimido, y muchos entienden la primera línea como que alguien queda reducido a la pobreza.'
    reason: lexical_alternative
  - marker: b
    text: «Una mujer casada» es literalmente «la esposa de un hombre»; en contexto se refiere a una relación adúltera con la esposa de otro hombre.
    reason: lexical_alternative
  - marker: c
    text: O «una alma preciosa». La palabra hebrea puede significar «alma», «ser» o «vida»; aquí «vida» encaja mejor con el contexto de advertencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base explicativa de la advertencia. «Porque» reproduce bien el valor causal sin forzar una duplicación innecesaria como «por porque».
- source_word: בְעַד
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - a causa de
  - a cuenta de
  lexicon: HALOT
  rationale: La preposición expresa causa o consecuencia. «A causa de» conserva la relación causal que el inglés POB entendió en el contexto.
- source_word: אִשָּׁה זוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una mujer prostituta
  - una mujer promiscua
  lexicon: HALOT
  rationale: זונה designa a una prostituta o mujer de prostitución. «Prostituta» es claro y moderno, y mantiene la fuerza lexical sin recurrir a un arcaísmo.
- source_word: עַד כִּכַּר לָחֶם
  english_pob_choice: is reduced to a loaf of bread
  chosen_spanish: uno queda reducido a un pan
  alternatives_spanish:
  - uno queda reducido a una hogaza de pan
  - uno es reducido a un pan
  - uno llega a un trozo de pan
  lexicon: HALOT
  rationale: La línea hebrea es muy comprimida. Sigo la lectura auditada del POB, que entiende un resultado de empobrecimiento. En español «queda reducido a un pan» conserva la idea de precariedad y evita una expansión interpretativa excesiva.
- source_word: וְאֵשֶׁת אִישׁ
  english_pob_choice: a married woman
  chosen_spanish: la esposa de un hombre
  alternatives_spanish:
  - una mujer casada
  - la mujer de un hombre
  - la esposa de otro hombre
  lexicon: HALOT
  rationale: Literalmente es «la esposa de un hombre». Mantengo la forma más cercana al hebreo para no suavizar la expresión, y porque el contraste con la prostituta depende de esa literalidad. En contexto apunta a una relación adúltera.
- source_word: נֶפֶשׁ יְקָרָה
  english_pob_choice: a precious life
  chosen_spanish: una vida preciosa
  alternatives_spanish:
  - un alma preciosa
  - una vida valiosa
  - un alma/corazón precioso
  lexicon: HALOT
  rationale: נפש puede ser vida, alma o ser. Aquí «vida» encaja mejor con el contexto de advertencia y ruina moral; «preciosa» reproduce יקרה sin atenuarlo.
- source_word: תָצוּד
  english_pob_choice: hunts
  chosen_spanish: caza
  alternatives_spanish:
  - acecha
  - caza y atrapa
  - persigue como presa
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de caza/presa. «Caza» es breve, vívido y compatible con el sujeto femenino singular.
theological_decisions:
- issue: Si la última línea habla de «alma» o de «vida»
  english_pob_reading: a precious life
  chosen_spanish_reading: una vida preciosa
  alternative_spanish_readings:
  - un alma preciosa
  - una vida valiosa
  rationale: El POB inglés opta por «life» porque el aviso apunta a ruina total y peligro concreto. En español mantengo «vida»; «alma» podría sonar más espiritualizado de lo que el hebreo exige aquí.
  doctrine_reference: Anthropology / נפש semantic range
- issue: Identidad de la «esposa de un hombre»
  english_pob_reading: a married woman
  chosen_spanish_reading: la esposa de un hombre
  alternative_spanish_readings:
  - una mujer casada
  - la esposa de otro hombre
  - un adulterio
  rationale: 'Sigo la literalidad del hebreo y la nota auditada: en contexto se trata de la esposa de otro hombre, es decir, una relación adúltera. No reemplazo la expresión por un término más interpretativo en el texto principal.'
  doctrine_reference: Sexual ethics / adultery context
- issue: Valor de la línea hebrea elíptica sobre el pan
  english_pob_reading: one is reduced to a loaf of bread
  chosen_spanish_reading: uno queda reducido a un pan
  alternative_spanish_readings:
  - uno queda reducido a una hogaza de pan
  - uno es reducido a un pan
  - uno queda reducido a la miseria
  rationale: La imagen semita es comprimida y admite una lectura de empobrecimiento. Mantengo la imagen del pan en lugar de paraphrasearla a «miseria» para conservar la tensión lexical documentada.
  doctrine_reference: Poetic metaphor / poverty consequence
translation_notes:
  revision_awareness: El español sigue la revisión más reciente del POB que eliminó «a man is» para no añadir palabras no explícitas en el hebreo. También conserva el tratamiento del hebreo elíptico como una imagen de reducción a lo mínimo, sin convertirla en una explicación totalmente interpretativa.
  spanish_consistency_notes:
  - He mantenido «prostituta» y no un arcaísmo como «ramera», en línea con la claridad moderna del POB.
  - He conservado la metáfora de caza («caza») para תָצוּד, evitando «atrapa» porque pierde la imagen cinegética.
  - He usado «vida» para נֶפֶשׁ y dejado una nota con la alternativa «alma», porque el hebreo permite ambas y el contexto favorece la primera.
  - La formulación «la esposa de un hombre» preserva la literalidad hebrea; la nota aclara el sentido contextual de adulterio sin sobrecargar el texto principal.
