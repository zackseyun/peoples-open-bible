translation:
  language: es
  text: También él invocó a Dios, cuando sus enemigos lo cercaban por todos lados[a]; cuando ofreció un cordero alimentado con leche[b], Yahvé tronó desde el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cuando sus enemigos ... por todos lados», pero la forma exacta en el hebreo conservado es difícil; el paralelo griego apoya el sentido de que sus enemigos lo presionaban o rodeaban por todos lados.'
    reason: textual_variant
  - marker: b
    text: 'O: «un cordero mamón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קרא אל אל / ἐπεκαλέσατο τὸν κύριον
  english_pob_choice: called upon God
  chosen_spanish: invocó a Dios
  alternatives_spanish:
  - llamó a Dios
  - clamó a Dios
  - apeló a Dios
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego expresan una llamada dirigida a Dios en contexto de angustia o súplica. En español, «invocó a Dios» conserva el valor devocional y apelativo sin sonar mecánico.
- source_word: כאפכה לו אויביו מסביב / ἐν τῷ θλίψαι ἐχθροὺς αὐτοῦ κυκλόθεν
  english_pob_choice: when his enemies hemmed him in all around
  chosen_spanish: cuando sus enemigos lo cercaban por todos lados
  alternatives_spanish:
  - cuando sus enemigos lo rodeaban por todos lados
  - cuando sus enemigos lo estrechaban por todos lados
  lexicon: HALOT; LSJ
  rationale: La forma hebrea es difícil, pero el contexto y el paralelo griego apuntan a una presión de enemigos rodeándolo. «Lo cercaban por todos lados» transmite tanto el encierro como la hostilidad sin forzar una solución demasiado interpretativa.
- source_word: בעלתו / ἐν προσφορᾷ
  english_pob_choice: when he offered
  chosen_spanish: cuando ofreció
  alternatives_spanish:
  - en su ofrenda
  - al presentar
  lexicon: HALOT; LSJ
  rationale: 'El griego clarifica un contexto sacrificial. En español conviene verbalizarlo como acción completa: «cuando ofreció».'
- source_word: טלה חלב / ἀρνὸς γαλαθηνοῦ
  english_pob_choice: a milk-fed lamb
  chosen_spanish: un cordero alimentado con leche
  alternatives_spanish:
  - un cordero de leche
  - un cordero lactante
  - un cordero mamón
  lexicon: HALOT; LSJ
  rationale: Se mantiene la imagen de un animal joven alimentado con leche. «Alimentado con leche» es comprensible y digno en español; otras opciones son más técnicas o regionales.
- source_word: וירעם משמים יהוה
  english_pob_choice: the LORD thundered from heaven
  chosen_spanish: Yahvé tronó desde el cielo
  alternatives_spanish:
  - Yahvé retumbó desde el cielo
  - Yahvé hizo tronar desde el cielo
  lexicon: HALOT
  rationale: El verbo רעם apunta al trueno. Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto, y «tronó desde el cielo» reproduce bien la respuesta teofánica.
theological_decisions:
- issue: Renderización del Tetragrammaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Nombre divino. La norma del proyecto exige «Yahvé» en el cuerpo principal para no ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre el hebreo difícil y el paralelo griego
  english_pob_reading: The Hebrew is difficult; the Greek supports the sense of enemies surrounding him
  chosen_spanish_reading: Se mantiene una traducción que refleje el cerco enemigo sin pretender resolver por completo la dificultad del hebreo.
  alternative_spanish_readings:
  - seguir de cerca la forma hebrea incierta
  - traducir solo el griego paralelo
  rationale: 'La redacción española conserva la tensión textual: no se suaviza la dificultad, pero sí se expresa el sentido corroborado por el griego.'
  doctrine_reference: Principio POB de transparencia textual y respeto por variantes auditablemente atestiguadas
translation_notes:
  revision_awareness: Se ha integrado el criterio revisado del POB inglés de traducir el Nombre divino como «Yahweh» allí donde el proyecto lo exija; en español se aplica la forma estándar del proyecto, «Yahvé». No se requieren otras revisiones respecto del pasaje base.
  spanish_consistency_notes:
  - 'Se preserva la secuencia narrativa del versículo: invocación, cerco enemigo, ofrenda sacrificial y respuesta divina.'
  - «Dios» traduce אל / τὸν κύριον en la apelación inicial, mientras que «Yahvé» se reserva para el Tetragrammaton final.
  - La nota textual marca la dificultad del hebreo sin borrar el apoyo del griego.
  - «Cordero alimentado con leche» evita tecnicismos innecesarios y sigue siendo fiel al sentido zoológico-sacrificial.
