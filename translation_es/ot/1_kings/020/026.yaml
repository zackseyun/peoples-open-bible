translation:
  language: es
  text: Al volver el año[a], Ben-adad reunió a Aram[b] y subió a Afec para la batalla contra Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''al retorno del año'', un modismo para cuando el ciclo anual vuelve; algunos lo traducen ''en la primavera''.'
    reason: lexical_alternative
  - marker: b
    text: O 'los arameos'. El hebreo 'Aram' puede referirse al reino o a su pueblo/ejército.
    reason: lexical_alternative
  - marker: c
    text: O 'con Israel'. La preposición hebrea es literalmente 'con', usada aquí en un contexto de batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִתְשׁוּבַת הַשָּׁנָה
  english_pob_choice: at the turn of the year
  chosen_spanish: al comenzar el año
  alternatives_spanish:
  - al retorno del año
  - en la primavera del año
  - cuando el año volvía
  lexicon: HALOT
  rationale: El hebreo es un modismo temporal que literalmente expresa la idea de que el año ‘vuelve’ o ‘da la vuelta’. En español, ‘al comenzar el año’ conserva la referencia al ciclo anual sin forzar una imagen extraña. ‘En la primavera del año’ sería una inferencia contextual posible, pero no está explícita en el hebreo.
- source_word: בֶּן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: Nombre propio hebreo transliterado
  rationale: Se conserva el nombre propio en forma castellana estable. La adaptación con ‘d’ refleja la escritura del hebreo bíblico sin introducir una forma tradicional distinta si no es necesaria.
- source_word: וַיִּפְקֹד
  english_pob_choice: mustered
  chosen_spanish: reunió
  alternatives_spanish:
  - musterió
  - pasó revista a
  - levantó
  lexicon: HALOT
  rationale: En contexto militar, פקד implica reunir/convocar tropas. ‘Reunió’ comunica la acción de manera natural en español y conserva el sentido de concentración de fuerzas. ‘Pasó revista a’ sería más específico, pero añade una imagen no expresada de forma explícita.
- source_word: אֶת אֲרָם
  english_pob_choice: Aram
  chosen_spanish: a Aram
  alternatives_spanish:
  - a los arameos
  - a Siria
  lexicon: HALOT
  rationale: Se mantiene ‘Aram’ como nombre del reino/pueblo, siguiendo la decisión del texto base inglés. El complemento con ‘a’ refleja que el verbo de reunión toma a Aram como objeto convocado/movilizado en el contexto militar.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - marchó hacia arriba
  - avanzó
  lexicon: HALOT
  rationale: ‘Subió’ reproduce el verbo hebreo estándar עלה y sugiere el movimiento narrativo sin sobreespecificar la ruta o la táctica militar.
- source_word: אֲפֵקָה
  english_pob_choice: to Aphek
  chosen_spanish: a Afec
  alternatives_spanish:
  - a Apec
  - hacia Afec
  lexicon: HALOT
  rationale: Se translitera el topónimo bíblico con ortografía española natural. ‘A Afec’ expresa correctamente el movimiento hacia el lugar.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - para combatir
  lexicon: HALOT
  rationale: ‘Batalla’ es la equivalencia más directa y clara para el contexto bélico concreto. ‘Guerra’ sería más amplia, y ‘combatir’ cambia la categoría gramatical.
- source_word: עִם יִשְׂרָאֵל
  english_pob_choice: with Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘con’, el contexto de guerra exige expresar la relación adversativa en español. Se conserva en nota la literalidad del preposición hebrea para no borrar la tensión textual.
theological_decisions:
- issue: Relación semántica de la preposición עִם en un contexto de guerra
  english_pob_reading: Or 'against Israel.' The Hebrew preposition is literally 'with,' used here in a battle context.
  chosen_spanish_reading: contra Israel
  alternative_spanish_readings:
  - con Israel
  rationale: 'La traducción principal debe ser idiomática en español: en un contexto de batalla, ‘contra’ comunica el sentido esperado. Sin embargo, la nota conserva la literalidad ‘con’ para reflejar el dato hebreo y la decisión auditada del texto inglés.'
  doctrine_reference: Precisión semántica del texto bíblico; no doctrinal.
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantuvo sin cambios en la revisión más reciente; no se registraron correcciones de contenido. La versión española sigue esa lectura estable y conserva las tres decisiones lexicales/semánticas principales: modismo temporal, nombre geopolítico y preposición bélica.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, evitando paráfrasis expansivas.
  - Se conserva ‘Aram’ como nombre propio y no se sustituye por ‘Siria’.
  - La nota de ‘con/contra’ preserva la tensión entre literalidad hebrea e idiomatismo español.
  - ‘Afec’ se usa como transliteración española natural del topónimo.
