  text: הַ/דָּבָ֗ר אֲשֶׁ֤ר דִּבֶּר֙ יִרְמְיָ֣הוּ הַ/נָּבִ֔יא אֶל בָּר֖וּךְ בֶּֽן נֵֽרִיָּ֑ה בְּ/כָתְב/וֹ֩ אֶת הַ/דְּבָרִ֨ים הָ/אֵ֤לֶּה עַל סֵ֨פֶר֙ מִ/פִּ֣י יִרְמְיָ֔הוּ בַּ/שָּׁנָה֙ הָֽ/רְבִעִ֔ית לִ/יהוֹיָקִ֧ים בֶּן יֹאשִׁיָּ֛הוּ מֶ֥לֶךְ יְהוּדָ֖ה לֵ/אמֹֽר־־־־־׃ס
