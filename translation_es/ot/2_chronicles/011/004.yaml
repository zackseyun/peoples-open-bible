    text: 'O: «este asunto procede de mí». El hebreo atribuye el hecho a la iniciativa divina.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «sus hermanos»; el hebreo subraya que se trata de israelitas del mismo pueblo, no de enemigos extranjeros.
    reason: cultural_note
  - marker: c
    text: 'O: «se volvieron de ir hacia Jeroboam»; en contexto se trata de un avance con intención bélica, por eso «contra Jeroboam» aclara el sentido.'
    reason: alternative_reading
  revision_rationale: 'La revisión corrige dos problemas de español y de concordancia con el hebreo: el imperativo plural «Vuélvanse» en lugar de «Vuélvase», y una formulación más natural para el desistimiento de la marcha contra Jeroboam. También reordena las notas para que reflejen mejor las decisiones documentadas en el audit trail inglés y ancla cada nota en el lugar correspondiente del texto.'
