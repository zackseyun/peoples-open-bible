  text: 회당에 모였던 사람들이 흩어진 뒤에, 많은 유대 사람과 경건한 개종자들이 바울과 바나바를 따라왔고, 두 사람은 그들에게 말하면서 하나님의 은혜에 머물러 있으라고 권면하였습니다.
