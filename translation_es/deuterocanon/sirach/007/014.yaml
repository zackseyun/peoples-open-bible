translation:
  language: es
  text: No parlotees en la asamblea de los gobernantes[a], y no te repitas en tu oración[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la asamblea de los ancianos» o «en la reunión de los jefes». El hebreo habla de personas con autoridad; el paralelo griego dice «entre la multitud de los ancianos».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «no repitas una palabra en tu oración». La advertencia apunta a la repetición redundante o mecánica, no necesariamente a toda petición repetida con sinceridad.'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ ἀδολέσχει / תְּסַוֵּר
  english_pob_choice: chatter
  chosen_spanish: charlees
  alternatives_spanish:
  - parlotees
  - charles
  - hables en exceso
  lexicon: HALOT; Greek parallel ἀδολέσχει
  rationale: El hebreo y el paralelo griego apuntan a habla vana o excesiva, no a simple hablar. 'Charlar' en español conserva el matiz de conversación ligera o indebida en un contexto formal, y evita un calco demasiado rígido.
- source_word: בַּעֲדַת
  english_pob_choice: in the assembly of
  chosen_spanish: en la asamblea de
  alternatives_spanish:
  - en el consejo de
  - entre la reunión de
  - en medio de la congregación de
  lexicon: HALOT
  rationale: '''Asamblea'' reproduce bien la idea de un cuerpo reunido y suena natural en español para un contexto público y formal.'
- source_word: שָׂרִים
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los líderes
  - los príncipes
  lexicon: HALOT
  rationale: שָׂרִים designa personas de rango o autoridad. 'Gobernantes' conserva el peso de autoridad pública sin restringir indebidamente el término a 'príncipes'.
- source_word: μὴ δευτερώσῃς λόγον / תִּישֶׁן דָּבָר
  english_pob_choice: do not repeat yourself
  chosen_spanish: no te repitas
  alternatives_spanish:
  - no repitas una palabra
  - no repitas un dicho
  - no digas dos veces lo mismo
  lexicon: Greek δευτερόω; HALOT
  rationale: La versión española debe sonar natural sin perder la advertencia contra la repetición redundante. 'No te repitas' comunica el sentido idiomático de forma clara y fiel al paralelismo hebreo-griego.
- source_word: ἐν προσευχῇ σου / בַּתְּפִלָּה
  english_pob_choice: in your prayer
  chosen_spanish: en tu oración
  alternatives_spanish:
  - al orar
  - mientras oras
  - en la oración
  lexicon: Greek προσευχή; HALOT
  rationale: '''Tu oración'' sigue el posesivo del griego y del hebreo, manteniendo el tono personal del mandato. ''Oración'' es más sobrio y litúrgicamente amplio que ''rezar''.'
theological_decisions:
- issue: Si la segunda mitad prohíbe toda repetición en la oración o solo la repetición vacía/redundante
  english_pob_reading: It warns against repeating words in a verbose or mechanical way during prayer, not against all earnest persistence in prayer.
  chosen_spanish_reading: Advierte contra la repetición vana o mecánica en la oración, no contra toda insistencia sincera.
  alternative_spanish_readings:
  - Prohíbe cualquier repetición en la oración.
  - Condena en general multiplicar palabras delante de Dios.
  rationale: El hebreo y el griego paralelos señalan repetición de palabras o de habla, pero el contexto sapiencial favorece una crítica a la verbosidad o mecanicidad, no una prohibición absoluta de insistir en oración. La redacción española conserva esa tensión sin resolverla de más.
  doctrine_reference: Preservar la tensión teológica sin neutralizarla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paralelismo hebreo-griego y la decisión inglesa más reciente de naturalizar la segunda cola como una prohibición contra la repetición de uno mismo en oración. En español se optó por una formulación idiomática equivalente, manteniendo el sentido de habla excesiva y la cautela interpretativa sobre la oración repetitiva.
  spanish_consistency_notes:
  - Se usa 'oración' para προσευχή/תְּפִלָּה, manteniendo un registro bíblico claro y amplio.
  - '''Gobernantes'' traduce שָׂרִים con un término de autoridad pública sin sobrecargarlo de monarquía.'
  - La nota textual/lexical conserva la alternativa 'ancianos' por el contraste entre hebreo y griego, sin desplazar la lectura principal.
