translation:
  language: es
  text: Lávate[a], úngete y ponte tu manto[b]; luego baja a la era[c]. No te des a conocer al hombre hasta que termine de comer y beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «báñate». El verbo hebreo puede denotar lavar o bañar el cuerpo.
    reason: lexical_alternative
  - marker: b
    text: O «tu vestido» o «tu prenda». El hebreo se refiere en general a una prenda exterior; algunas traducciones lo entienden más específicamente como ropa de fiesta o la mejor ropa.
    reason: lexical_alternative
  - marker: c
    text: 'La forma consonántica hebrea aquí es inusual; en contexto se entiende comúnmente como la instrucción continuada de Noemí a Rut: «baja a la era».'
    reason: textual_variant
lexical_decisions:
- source_word: וְרָחַצְתְּ
  english_pob_choice: Wash yourself
  chosen_spanish: Lávate
  alternatives_spanish:
  - Báñate
  - Lávate el cuerpo
  lexicon: HALOT
  rationale: רחץ puede abarcar lavar o bañar el cuerpo. En español, el imperativo reflexivo «Lávate» comunica bien la acción corporal general sin forzar una paráfrasis más amplia.
- source_word: וָסַכְתְּ
  english_pob_choice: anoint yourself
  chosen_spanish: úngete
  alternatives_spanish:
  - ínguete con aceite
  - perfúmate
  lexicon: HALOT
  rationale: סוך remite al acto de ungir con aceite o ungüento. «Únete» conserva ese valor léxico y evita reducirlo indebidamente a perfume.
- source_word: וְשַׂמְתְּ שִׂמְלָתֵךְ עָלַיִךְ
  english_pob_choice: put your cloak on
  chosen_spanish: ponte tu manto
  alternatives_spanish:
  - ponte tu vestido
  - ponte tu ropa
  lexicon: HALOT
  rationale: שִׂמְלָה designa una prenda exterior, un manto o capa. «Manto» reproduce bien esa función y mantiene el tono sobrio del hebreo; no se añadió «mejor» ni «de gala» porque no está explícito en el texto.
- source_word: וירדתי הַגֹּרֶן
  english_pob_choice: then go down to the threshing floor
  chosen_spanish: luego baja a la era
  alternatives_spanish:
  - y baja a la era
  - desciende a la era
  lexicon: HALOT
  rationale: El consonántico es inusual, pero en contexto se entiende como instrucción a Ruth para bajar a la era. «Luego» refleja la secuencia de mandatos, y «era» es el equivalente natural de גֹּרֶן en español bíblico actual.
- source_word: אַל תִּוָּדְעִי
  english_pob_choice: Do not make yourself known
  chosen_spanish: No te hagas conocer
  alternatives_spanish:
  - No te reveles
  - No permitas que te reconozcan
  lexicon: HALOT
  rationale: El niphal de ידע tiene fuerza reflexiva/pasiva. «No te hagas conocer» conserva el giro idiomático y evita especificar más de lo que exige el hebreo.
- source_word: לָאִישׁ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al hombre ese
  - a Boaz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «al hombre». En castellano, «al hombre» suena más natural que «al hombre» con artículo fuerte traducido mecánicamente, y preserva la referencia sin nombrarlo explícitamente.
- source_word: עַד כַּלֹּתוֹ לֶאֱכֹל וְלִשְׁתּוֹת
  english_pob_choice: until he has finished eating and drinking
  chosen_spanish: hasta que termine de comer y beber
  alternatives_spanish:
  - hasta que haya terminado de comer y beber
  - hasta que acabe de comer y beber
  lexicon: HALOT
  rationale: כלה expresa завершение/terminación de la acción. «Termine de comer y beber» comunica de forma natural la idea de que las acciones han concluido, sin perder el sentido temporal.
translation_notes:
  revision_awareness: 'La redacción española sigue el mismo juicio de revisión estable del texto inglés: no se introdujeron cambios de sentido ni ajustes textuales adicionales. Se mantuvo la lectura contextual de la forma inusual en «baja a la era», y se preservaron las alternativas léxicas relevantes en notas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino por consistencia general del proyecto, aunque este versículo no lo contiene.
  - Se prefirió el lenguaje reflexivo natural en español («lávate», «úngete», «no te hagas conocer») para conservar la fuerza verbal del hebreo.
  - «Manto» se usó como equivalente sobrio de שִׂמְלָה, evitando una expansión interpretativa hacia «ropa de gala».
  - «Era» reproduce el lugar de trillado de גֹּרֶן sin cargarlo con términos agrícolas modernos menos transparentes.
