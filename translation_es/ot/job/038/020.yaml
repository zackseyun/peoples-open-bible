translation:
  language: es
  text: para que lo llevaras a su límite[a], y para que discernieras las sendas a su casa[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los pronombres «lo» y «su» remiten al antecedente singular del contexto inmediato: o la luz o la oscuridad en las preguntas paralelas de Job 38:19–20.'
    reason: cross_reference
  - marker: b
    text: O «entendieras los caminos hacia su hogar».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - de modo que
  - porque
  lexicon: HALOT
  rationale: En este paralelismo interrogativo, la función es subordinante con matiz de propósito/resultación; en español, «para que» expresa con naturalidad esa relación modal sin volver la frase causal ni forzar un calco.
- source_word: תִקָּחֶנּוּ
  english_pob_choice: you might take it
  chosen_spanish: lo llevaras
  alternatives_spanish:
  - lo tomaras
  - lo trajeras
  - lo llevaras consigo
  lexicon: HALOT
  rationale: לקח puede abarcar 'tomar, llevar, conducir'. En este contexto de llevar algo hasta un límite, «llevar» comunica mejor la idea espacial que «tomar», y el imperfecto modal se vierte en imperfecto de subordinación.
- source_word: אֶל גְּבוּלוֹ
  english_pob_choice: to its boundary
  chosen_spanish: a su límite
  alternatives_spanish:
  - a su frontera
  - a su borde
  - a su límite territorial
  lexicon: HALOT
  rationale: גְּבוּל puede significar 'límite' o 'frontera'. Dado el contexto poético sobre luz u oscuridad, «límite» conserva la imagen sin restringirla a una frontera política.
- source_word: תָבִין
  english_pob_choice: you might discern
  chosen_spanish: discernieras
  alternatives_spanish:
  - entendieras
  - percibieras
  - reconocieras
  lexicon: HALOT
  rationale: בין aquí tiene fuerza de discernimiento perceptivo. «Discernieras» mantiene esa matiz de reconocer con claridad el rumbo o itinerario, más preciso que «entendieras» en español.
- source_word: נְתִיבוֹת
  english_pob_choice: the paths
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - los senderos
  - las rutas
  lexicon: HALOT
  rationale: נְתִיבוֹת denota senderos o caminos trazados. «Caminos» es una equivalencia idiomática amplia y clara en español, apta para el paralelismo poético con בֵּיתוֹ.
- source_word: בֵּיתוֹ
  english_pob_choice: its house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su morada
  - su vivienda
  lexicon: HALOT
  rationale: בַּיִת es literalmente 'casa'. «Casa» preserva la personificación concreta del texto; «hogar» suavizaría la imagen y añadiría una afectividad no explícita.
translation_notes:
  revision_awareness: 'Se mantiene la lectura elevada por el control hebreo y el audio-título inglés: la cláusula es interrogativa retórica con valor de propósito, y los dos miembros paralelos conservan el referente singular implícito del contexto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera explícitamente; aquí no aplica.
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - «Casa» se conservó como imagen concreta para בַּיִת, en paralelo con «camino(s)» para נְתִיבוֹת.
  - La puntuación con coma antes de la segunda cláusula refleja el paralelismo hebreo sin añadir contenido interpretativo.
