    it is your garment.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲛⲁⲩ
  chosen: see
  alternatives:
  - look at
  - behold
  lexicon: Crum; standard Sahidic usage
  rationale: ⲛⲁⲩ is the common Sahidic verb for visual perception; plain, unmarked
    English "see" best preserves the directness and cadence.
- source_word: ⲉⲃⲟⲗ
  chosen: outside
  alternatives:
  - outward
  - from outside
  lexicon: Crum; Sahidic preposition/adverb
  rationale: ⲉⲃⲟⲗ marks exteriority or motion/outwardness; here antithetical to ⲉϩⲟⲩⲛ,
    so "outside" keeps the parallel clean.
- source_word: ⲉϩⲟⲩⲛ
  chosen: inside
  alternatives:
  - within
  - inward
  lexicon: Crum; Sahidic preposition/adverb
  rationale: As the complement of ⲉⲃⲟⲗ, ⲉϩⲟⲩⲛ denotes interiority; "inside" mirrors
    "outside" without smoothing the antithesis.
- source_word: ⲟⲣⲁⲧⲟⲛ (Greek loan ὁρατόν)
  chosen: what is visible
  alternatives:
  - the visible thing
  - the seen
  lexicon: LSJ (ὁρατός) attested as loan in Sahidic texts
  rationale: The Greek adjective functions substantivally; "what is visible" preserves
    the nominal force and echoes the seeing motif.
- source_word: ⲓⲙⲁⲧⲓⲟⲛ (Greek loan ἱμάτιον)
  chosen: garment
  alternatives:
  - cloak
  - clothing
  lexicon: LSJ (ἱμάτιον) widely loaned into Coptic
  rationale: '"Garment" is the standard, slightly formal term that fits the poem’s
    diction and metaphorical register without over-interpretation.'
parallelism_check: 'The line preserves the antithetical parallel: outside/inside in
  exact mirror, with repeated "you see" forming a clear chiasm. The second cola adds
  an appositive identification ("it is what is visible") and a further predicate ("and
  it is your garment"), maintaining the poem’s cadence and paradox without collapsing
  the pair.'
voice_check: 'Retains the oracular, direct address voice of Thunder: second-person
  "you" and declarative assertions. The initial "And" keeps the chain-like rhythm
  of the surrounding imperatives/declarations.'
