translation:
  language: es
  text: 'El rey respondió y dijo[a]: «Sé con certeza que ustedes procuran ganar tiempo, porque han visto que el asunto ha salido de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra ha salido de mí», «el asunto se me ha escapado» o posiblemente «el mandato es firme de parte de mí». La expresión aramea es compacta y admite más de una lectura en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: עָנֵה מַלְכָּא וְאָמַר
  english_pob_choice: The king answered and said
  chosen_spanish: El rey respondió y dijo
  alternatives_spanish:
  - El rey contestó y dijo
  - El rey respondió
  lexicon: HALOT/lexicones arameos
  rationale: Conservo la fórmula narrativa doble del arameo. En español, «respondió y dijo» suena natural en estilo bíblico sin volverlo arcaico en exceso.
- source_word: מִן יַצִּיב
  english_pob_choice: for certain
  chosen_spanish: con certeza
  alternatives_spanish:
  - ciertamente
  - de cierto
  - con seguridad
  lexicon: HALOT/lexicones arameos
  rationale: La expresión aramea combina una preposición con un adjetivo de firmeza/certeza. «Con certeza» comunica bien la fuerza enfática en español moderno y mantiene el sentido de seguridad afirmada por el rey.
- source_word: יָדַע אֲנָה
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - conozco
  lexicon: HALOT/lexicones arameos
  rationale: El verbo cognitivo en primera persona singular se expresa de forma directa con «sé». Es breve, natural y fiel al enunciado.
- source_word: עִדָּנָא
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - demora
  - lapso de tiempo
  lexicon: HALOT/lexicones arameos
  rationale: Aquí el sustantivo apunta al tiempo que se intenta ganar. «Tiempo» es la opción más directa; el matiz de dilación lo aporta el contexto verbal.
- source_word: אַנְתּוּן זָבְנִין
  english_pob_choice: you are trying to gain
  chosen_spanish: ustedes procuran ganar
  alternatives_spanish:
  - ustedes están tratando de ganar
  - ustedes quieren ganar
  lexicon: HALOT/lexicones arameos
  rationale: El participio del verbo «comprar» funciona idiomáticamente como «ganar tiempo». «Procuran ganar» conserva la idea de intentar obtener, sin forzar el símil comercial en español.
- source_word: כָּל־קֳבֵל דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT/lexicones arameos
  rationale: Esta conjunción introduce la base causal de la acusación. «Porque» es la equivalencia más clara y común.
- source_word: חֲזֵיתוֹן
  english_pob_choice: you have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - han percibido
  - han notado
  lexicon: HALOT/lexicones arameos
  rationale: El perfecto plural segunda persona se traduce con el perfecto compuesto español para conservar la acción completada con relevancia presente.
- source_word: אַזְדָּא מִנִּי
  english_pob_choice: has gone from me
  chosen_spanish: se ha apartado de mí
  alternatives_spanish:
  - ha salido de mí
  - ha ido de mí
  - se me ha escapado
  lexicon: HALOT/lexicones arameos
  rationale: La frase aramea expresa que algo ha dejado de estar disponible para el rey. «Se ha apartado de mí» es formalmente cercano y en español suena más natural que un calco demasiado literal.
- source_word: מִלְּתָא
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la palabra
  - la cosa
  - el mandato
  lexicon: HALOT/lexicones arameos
  rationale: El sustantivo puede abarcar palabra, asunto o mandato. «El asunto» preserva la amplitud semántica y evita cerrar prematuramente la ambigüedad del arameo.
theological_decisions:
- issue: Ambigüedad de מִלְּתָא / אַזְדָּא מִנִּי
  english_pob_reading: the matter has gone from me
  chosen_spanish_reading: el asunto se ha apartado de mí
  alternative_spanish_readings:
  - la palabra ha salido de mí
  - el mandato es firme de parte de mí
  - el asunto se me ha escapado
  rationale: El arameo permite entender tanto que el rey ha perdido de vista el asunto como que el tema/orden ha salido de su control o de su memoria. La versión española mantiene esa tensión sin resolverla. «Se ha apartado de mí» conserva la imagen de alejamiento y no obliga a decidir entre «palabra», «mandato» o «memoria».
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual en vez de resolverla artificialmente'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la fórmula narrativa doble, el valor idiomático de «ganar tiempo» y la ambigüedad de מִלְּתָא / אַזְדָּא מִנִּי. No se introdujeron lecturas doctrinales ajenas al texto; la única nota preserva las alternativas señaladas por la traducción inglesa.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - Se usó «Yahvé» solo donde corresponda en otros pasajes; aquí no aplica.
  - «Asunto» mantiene la amplitud de מִלְּתָא mejor que una opción demasiado específica como «mandato» o «palabra».
  - Se conservó el registro bíblico con español contemporáneo y readable.
  - La nota al pie refleja la ambigüedad ya documentada en el POB inglés, sin ampliarla indebidamente.
