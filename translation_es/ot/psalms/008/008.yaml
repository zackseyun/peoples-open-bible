lexical_decisions:
- source_word: צֹנֶה
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaños
  lexicon: HALOT
  rationale: El término designa animales domésticos de rebaño pequeño, especialmente ovejas/cabras. En español, "ovejas" es la opción más natural y concreta dentro de esta enumeración poética.
- source_word: וַאֲלָפִים
  english_pob_choice: and oxen
  chosen_spanish: y toros
  alternatives_spanish:
  - y bueyes
  - y ganado
  lexicon: HALOT
  rationale: El hebreo se refiere al ganado bovino. "Toros" conserva el paralelo poético con "ovejas" y comunica bien la imagen de animales domésticos grandes; "bueyes" o "ganado" también son posibles, pero menos directos aquí.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: El sufijo pronominal expresa explícitamente "de ellos". "Todos ellos" refleja esa plenitud y mantiene el énfasis del hebreo.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - e incluso
  lexicon: HALOT
  rationale: La partícula añade un grupo más a la lista. "Y también" reproduce con claridad ese valor aditivo en español.
- source_word: בַּהֲמוֹת
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - los seres vivientes
  lexicon: HALOT
  rationale: Aquí el plural tiene sentido amplio de animales, especialmente bestias mayores. "Bestias" preserva el tono poético y la distinción respecto del ganado doméstico.
- source_word: שָׂדָי
  english_pob_choice: of the field
  chosen_spanish: del campo
  alternatives_spanish:
  - del campo abierto
  - de la campiña
  lexicon: HALOT
  rationale: El sustantivo significa campo / espacio abierto. "Del campo" es la equivalencia española más natural y conserva la imagen bíblica de animales del campo frente al ganado doméstico.
translation_notes:
  revision_awareness: El texto fuente y el aparato inglés muestran alta concordancia; no se registran revisiones aplicadas y no hay variación textual relevante en este verso. La decisión principal en español es léxica/poética, no textual.
  spanish_consistency_notes:
  - Se mantiene el orden y la acumulación de la lista animal del hebreo.
  - '"Toros" se usa aquí como equivalente poético de ganado bovino, sin cargar un sentido sacrificial o agrícola específico.'
  - '"Bestias del campo" conserva el contraste entre animales domésticos y salvajes implícito en el verso.'
