  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὁ κόσμος παράγεται καὶ ἡ ἐπιθυμία αὐτοῦ, ὁ δὲ ποιῶν τὸ θέλημα τοῦ θεοῦ μένει εἰς τὸν αἰῶνα.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/017.yaml
  text: And the world is passing away[a], along with its desire[b], but the one who does the will of God remains forever.
  footnotes:
  - marker: a
    text: Or 'the world passes away, and so does its lust.' The Greek ἐπιθυμία can also be rendered 'lust' or 'craving,' but here it refers broadly to the world's disordered desire.
    reason: lexical_alternative
  - marker: b
    text: The Greek μένει is often translated 'abides' in Johannine literature; here 'remains' is used for clearer contemporary English.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 세상은 그 욕망과 함께 지나갑니다. 그러나 하나님의 뜻을 행하는 자는 영원히 머뭅니다.
  philosophy: optimal-equivalence
