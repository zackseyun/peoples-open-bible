base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/021/019.yaml
  text: And after some time[a], at the end of two years, his bowels came out because of his sickness, and he died of severe diseases[b]. And his people made no burning for him like the burning for his fathers.
  footnotes:
  - marker: a
    text: Or 'his intestines came out.' The Hebrew literally refers to his inward organs.
    reason: lexical_alternative
  - marker: b
    text: The 'burning' here likely refers to a funerary honor, such as the burning of spices, not the cremation of his body; compare royal burial customs elsewhere in Chronicles.
    reason: cultural_note
