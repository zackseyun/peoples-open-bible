review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: mantiene el distributivo de וְכָל, el valor técnico de עֶרְכְּךָ, la norma de medida de בְּשֶׁקֶל הַקֹּדֶשׁ y la definición del siclo como veinte geras. Sin embargo, la nota al pie introduce una explicación menos precisa que el rastro inglés al hablar del ''patrón estándar de peso usado para las valoraciones del santuario'', lo que puede sugerir que las valoraciones pertenecen al santuario, en vez de que se midan por el estándar cultual oficial.'
  spanish_quality_summary: El español es claro y digno. 'Tu valoración' es entendible, pero en contexto legal-cultual suena algo menos natural que 'tu tasación'. El resto del verso fluye bien. Conviene ajustar la nota para mayor precisión y, opcionalmente, mejorar la naturalidad técnica del primer sintagma.
  glossary_alignment: Buena alineación con la terminología del proyecto. 'Siclo' para שֶׁקֶל y 'geras' para גֵּרָה son adecuados en español. No hay conflictos con nombres divinos ni términos teológicos sensibles. La elección 'valoración' es aceptable, aunque 'tasación' representa mejor en español el sentido técnico de ערך en Levítico 27.
  issues:
  - severity: medium
    issue: La nota al pie matiza de forma imprecisa 'siclo del santuario'.
    rationale: El inglés auditado explica que el hebreo se refiere al siclo patrón usado para valoraciones relacionadas con el santuario. La redacción actual ('patrón estándar de peso usado para las valoraciones del santuario') puede leerse como si las valoraciones fueran del santuario mismo, no como un estándar cultual oficial aplicado a las valoraciones.
  - severity: low
    issue: '''Tu valoración'' es comprensible, pero menos idiomático-técnico que ''tu tasación'' en este contexto legal.'
    rationale: En Levítico 27, ערך es una valuación fijada oficialmente para votos y cosas dedicadas. 'Tasación' suena más natural en español jurídico/administrativo sin perder precisión.
