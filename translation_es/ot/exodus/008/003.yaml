    rationale: Aunque 'por' no es incorrecto, en español bíblico natural 'con sus artes secretas' expresa mejor el instrumento o medio de la acción y suena menos calcado del inglés.
  revised_spanish_text: Y los magos hicieron lo mismo con sus artes secretas[a], e hicieron subir las ranas sobre la tierra de Egipto.
  revised_footnotes:
