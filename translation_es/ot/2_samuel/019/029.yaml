revisions:
- from: Pues toda la casa de mi padre no era sino hombres dignos de muerte[a] delante de mi señor el rey; y tú pusiste a tu siervo entre los que comen en tu mesa. Así que ¿qué otro derecho[b] tengo todavía para clamar aún al rey?
  to: Pues toda la casa de mi padre no eran sino hombres dignos de muerte[a] delante de mi señor el rey; sin embargo, pusiste a tu siervo entre los que comen en tu mesa. Así que, ¿qué otro derecho[b] me queda, para que siga clamando al rey?
  rationale: 'La revisión conserva todas las decisiones léxicas correctas del borrador, pero mejora la naturalidad y precisión del español: "eran" concuerda mejor con el referente colectivo familiar; "sin embargo" expresa claramente el contraste de וַ; y "me queda, para que siga clamando al rey" evita una construcción final poco natural y transmite mejor que Mefiboset ya no tiene base para seguir apelando.'
