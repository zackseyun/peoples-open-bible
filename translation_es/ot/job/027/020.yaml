lexical_decisions:
- source_word: תַּשִּׂיגֵהוּ
  english_pob_choice: overtake him
  chosen_spanish: lo alcanzan
  alternatives_spanish:
  - lo sobrepasan
  - lo alcanzan y lo alcanzan
  lexicon: HALOT
  rationale: El verbo en hifil expresa la idea de alcanzar o dar alcance. En español, «lo alcanzan» reproduce de forma natural la imagen de calamidades que dan alcance al impío, sin perder el movimiento de persecución implícito en el hebreo.
- source_word: כַמַּיִם
  english_pob_choice: like waters
  chosen_spanish: como aguas
  alternatives_spanish:
  - como agua
  - como torrentes
  lexicon: HALOT
  rationale: El plural hebreo se conserva mejor con «aguas». «Como agua» suaviza la forma plural, y «torrentes» introduce una interpretación más específica de la imagen.
- source_word: בַּלָּהוֹת
  english_pob_choice: terrors
  chosen_spanish: Terrores
  alternatives_spanish:
  - horrores
  - espantos
  lexicon: HALOT
  rationale: «Terrores» refleja bien el sustantivo plural hebreo y mantiene la fuerza poética de calamidades súbitas y aterradoras.
- source_word: לַיְלָה
  english_pob_choice: in the night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: HALOT
  rationale: La función adverbial del término se expresa con naturalidad en español mediante «de noche», sin necesidad de añadir preposición literal.
- source_word: גְּנָבַתּוּ
  english_pob_choice: steals him away
  chosen_spanish: lo arrebata
  alternatives_spanish:
  - lo roba
  - lo lleva sigilosamente
  lexicon: HALOT
  rationale: El verbo «robar/robo» en español puede sonar demasiado literal o señalar un acto voluntario humano; «arrebata» conserva la idea de remoción súbita y violenta atribuida a la tormenta, cercana al matiz de «steals him away».
- source_word: סוּפָה
  english_pob_choice: a storm
  chosen_spanish: una tormenta
  alternatives_spanish:
  - un temporal
  - un torbellino
  lexicon: HALOT
  rationale: «Tormenta» es el equivalente moderno más claro para סוּפָה en este contexto. «Torbellino» es posible, pero más específico de lo que exige el hebreo aquí.
theological_decisions:
- issue: Imagen de juicio súbito sobre el impío
  english_pob_reading: Terrors overtake him like waters; in the night a storm steals him away.
  chosen_spanish_reading: Terrores lo alcanzan como aguas; de noche, una tormenta lo arrebata.
  alternative_spanish_readings:
  - Terrores lo alcanzan como aguas; de noche, una tempestad lo lleva.
  - Horrores lo sorprenden como aguas; por la noche una tormenta lo arrastra.
  rationale: El verso mantiene la imagen de un juicio repentino que alcanza al malvado. En español, «lo alcanzan» y «lo arrebata» conservan tanto la velocidad como la violencia de la escena sin interpretar más allá del texto.
  doctrine_reference: Job 27:20; poesía sapiencial sobre retribución divina y ruina súbita del impío
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última revisión; no hubo correcciones aplicadas ni discrepancias pendientes en el control cruzado.
  spanish_consistency_notes:
  - Se conservó el plural poético «aguas» para reflejar כַמַּיִם.
  - Se evitó «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Tormenta» se eligió por claridad moderna, dejando «tempestad» y «torbellino» como alternativas.
  - La puntuación busca reflejar el paralelismo y la pausa del verso hebreo.
