review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: anterioridad temporal, mandato de llamar a Ajior, propósito doble «vea y reconozca», desprecio contra «la casa de Israel», y envío de Ajior «como para muerte». Sin embargo, hay un problema de fidelidad/pragmática en «llamadme a Ajior», que en español suena poco natural y ambiguo; el dativo μοι se expresa mejor como «tráiganme» o «llamen ... para que venga ante mí». También conviene reparar la sintaxis relativa «al que ... y que lo envió», que suena trabada; el griego coordina dos participios del mismo referente, mejor reflejados con «al que ... y lo envió».'
  spanish_quality_summary: El texto es mayormente claro y de registro bíblico adecuado, pero mezcla voseo peninsular («llamadme») con una meta declarada latinoamericana/church-readable. «Como para muerte» es defendible por literalidad, pero suena algo áspero; puede mantenerse si la nota lo explica. La nota a está bien en contenido, pero la solución principal debe ser más idiomática. También conviene evitar una construcción relativa redundante y mejorar la fluidez general.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Casa de Israel» preserva bien el modismo bíblico. «Ajior el amonita» es aceptable en español. No hay términos teológicos sensibles que exijan ajuste adicional.
  issues:
  - severity: medium
    issue: «llamadme a Ajior el amonita» es poco natural y ambiguo en español
    rationale: Aunque intenta preservar μοι, en español moderno y ampliamente legible suena forzado, y además usa una forma peninsular menos adecuada para la meta latinoamericana. «Tráiganme a Ajior el amonita» comunica mejor el mandato dirigido a terceros con referencia a la hablante.
  - severity: medium
    issue: Construcción «al que ... y que lo envió» torpe
    rationale: El griego coordina dos participios que modifican al mismo referente. En español, «al que ha tratado con desprecio ... y lo envió» o «al que ... y que lo envió»; la segunda opción resulta trabada. La coordinación simple mejora legibilidad sin perder sentido.
  - severity: low
    issue: Nota a ya no corresponde si se cambia el verbo principal
    rationale: Si el texto se revisa a «tráiganme», la nota debe ajustarse para reflejar que καλέω puede traducirse también como «llamar» o «convocar», mientras el español principal adopta una formulación más idiomática.
  revised_spanish_text: Pero antes de hacer estas cosas, tráiganme a Ajior el amonita[a], para que vea y reconozca al que ha tratado con desprecio la casa de Israel y lo envió a nosotros como para muerte[b][c].
