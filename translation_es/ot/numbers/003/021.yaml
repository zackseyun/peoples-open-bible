review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: relación posesiva con Gersón, dos subgrupos paralelos, y fórmula final de identificación. Sin embargo, introduce una inconsistencia semántica importante al traducir מִשְׁפַּחַת en la primera mitad como «familia» mientras cierra con «clanes», cuando el inglés auditado y el contexto censal apuntan de forma consistente a una subdivisión de linaje tipo «clan».'
  spanish_quality_summary: El español es claro y legible, pero «la familia de los libnitas / simeítas» suena menos preciso en un registro genealógico-censal y rompe la cohesión terminológica del versículo. «Clan» es natural en este contexto bíblico y mejora la precisión. El resto fluye bien.
  glossary_alignment: No hay términos del glosario principal en juego salvo la preferencia por consistencia léxica contextual. Debe alinearse מִשְׁפָּחָה / מִשְׁפְּחוֹת con «clan / clanes» en todo el versículo, en conformidad con la decisión documentada del POB inglés.
  issues:
  - severity: medium
    issue: «מִשְׁפַּחַת» se tradujo como «familia» en las dos primeras ocurrencias.
    rationale: En este contexto censal y genealógico, la unidad es una subdivisión de linaje mayor que una familia nuclear. «Clan» expresa mejor el valor de מִשְׁפָּחָה y mantiene la consistencia con la última frase del mismo versículo y con la decisión léxica auditada.
  - severity: low
    issue: Inconsistencia interna entre «familia» y «clanes».
    rationale: Aunque no cambia drásticamente el sentido, sí debilita la precisión y la cohesión terminológica del versículo.
  revised_spanish_text: A Gersón pertenecían el clan de los libnitas y el clan de los simeítas; estos son los clanes de los gersonitas.
  revision_rationale: Se reemplaza «familia» por «clan» en ambas ocurrencias de מִשְׁפַּחַת para reflejar mejor la subdivisión genealógica del hebreo y mantener consistencia con «clanes» en la conclusión del versículo. No se requieren notas al pie.
