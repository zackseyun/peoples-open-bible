  text: לָ/כֵן֩ תֵּ֨ן אֶת בְּנֵי/הֶ֜ם לָ/רָעָ֗ב וְ/הַגִּרֵ/ם֮ עַל יְדֵי חֶרֶב֒ וְ/תִֽהְיֶ֨נָה נְשֵׁי/הֶ֤ם שַׁכֻּלוֹת֙ וְ/אַלְמָנ֔וֹת וְ/אַ֨נְשֵׁי/הֶ֔ם יִֽהְי֖וּ הֲרֻ֣גֵי מָ֑וֶת בַּח֣וּרֵי/הֶ֔ם מֻכֵּי חֶ֖רֶב בַּ/מִּלְחָמָֽה־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/018/021.yaml
  text: Therefore give their children over to famine[a], and hand them over to the power of the sword. Let their wives become bereaved and widowed, and let their men be slain by death[c][b], their young men struck down by the sword in battle.
  footnotes:
  - marker: a
    text: Or 'hand them over into the hands of the sword.' The Hebrew idiom is literally more concrete than the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'their sons' for 'their children'; the Hebrew can be read more narrowly, though it may also function collectively for offspring.
    reason: lexical_alternative
  - marker: c
    text: Literally 'killed of death,' a difficult Hebrew expression conveying fatal destruction.
    reason: lexical_alternative
