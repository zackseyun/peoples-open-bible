revisions:
- from: 'Ahora pues[a], habla, te ruego, a los hombres de Judá y a los habitantes de Jerusalén, diciendo: «Así dice Yahvé: He aquí, yo estoy formando una calamidad[b] contra ustedes y trazando un plan contra ustedes. Vuélvanse, por favor, cada uno de su mal camino[c], y hagan buenos sus caminos y sus obras».'
  to: 'Ahora pues[a], di a los hombres de Judá y a los habitantes de Jerusalén: «Así dice Yahvé: He aquí, yo estoy formando una calamidad[b] contra ustedes y trazando un plan contra ustedes. Vuélvanse[c], por favor, cada uno de su mal camino[d], y hagan buenos sus caminos y sus obras».'
  rationale: 'Se hacen reparaciones menores para alinear mejor el español con el hebreo y con la auditoría inglesa: se sustituye ''habla, te ruego'' por ''di'', que es más natural y menos interpretativo; se conserva la dignidad del registro; y se añaden/ajustan notas para reflejar las alternativas documentadas en ''shuvu na'' y en ''disaster''. No se requieren cambios doctrinales ni de fondo.'
