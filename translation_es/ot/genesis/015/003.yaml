base_translation:
  language: en
  yaml_path: translation/ot/genesis/015/003.yaml
  text: Then Abram said[a], “Behold, you have given me no offspring, and behold[b], a son of my household will inherit me.”
  footnotes:
  - marker: a
    text: Or “will inherit me” or more interpretively, “will be my heir.” The Hebrew reads literally, “a son of my household is inheriting me.”
    reason: lexical_alternative
  - marker: b
    text: “Offspring” translates Hebrew zeraʿ, literally “seed,” here meaning progeny or descendants.
    reason: lexical_alternative
