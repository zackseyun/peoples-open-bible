revisions:
- from: 'Porque así dijo Yahvé a mí con mano fuerte[a], advirtiéndome[b] que no anduviera en el camino de este pueblo, diciendo:'
  to: 'Porque así me dijo Yahvé, con mano fuerte[a], advirtiéndome[b] que no anduviera por el camino de este pueblo, diciendo:'
  rationale: 'Se ajusta la sintaxis a un español natural y fiel: «me dijo» en lugar de «dijo a mí». Se añade «por» con «anduviera por el camino» para una colocación más idiomática en español sin perder la metáfora bíblica. Se mejora la nota b para incluir «instruyéndome», que estaba en la evidencia inglesa, y se pule la nota a para mayor naturalidad. No se requiere adjudicación adicional porque los cambios son estilísticos y de claridad, no doctrinales ni textualmente inciertos.'
