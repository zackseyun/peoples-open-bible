translation:
  language: es
  text: 'A los hermanos judíos en Egipto: los hermanos judíos en Jerusalén y los que están en la tierra de Judea, saludos[a] y buena paz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salud». El griego usa la fórmula epistolar convencional χαίρειν («saludos»), seguida por «buena paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφοῖς ... Ἰουδαίοις
  english_pob_choice: To the Jewish brothers
  chosen_spanish: A los hermanos judíos
  alternatives_spanish:
  - A los judíos hermanos
  - A los hermanos de los judíos
  lexicon: BDAG
  rationale: ἀδελφοῖς requiere expresar la relación fraterna; en español, 'hermanos judíos' conserva el término familiar y el adjetivo étnico/religioso sin volverlo un calco torpe.
- source_word: τοῖς κατʼ Αἴγυπτον
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - que están en Egipto
  - por Egipto
  lexicon: BDAG
  rationale: La frase identifica a los destinatarios por ubicación. 'En Egipto' es natural y fiel al valor locativo del griego.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - greetings
  lexicon: BDAG
  rationale: En fórmula epistolar, χαίρειν funciona como saludo convencional. 'Salud' reproduce bien el valor formular y evita añadir el verbo 'enviar' que el texto griego no expresa explícitamente.
- source_word: οἱ ἀδελφοὶ οἱ ἐν Ἱεροσολύμοις Ἰουδαῖοι
  english_pob_choice: the Jewish brothers in Jerusalem
  chosen_spanish: los hermanos judíos que están en Jerusalén
  alternatives_spanish:
  - los hermanos judíos en Jerusalén
  - los judíos hermanos en Jerusalén
  lexicon: BDAG
  rationale: Se conserva la repetición de 'hermanos' y se explicita la ubicación con una relativa natural en español. La estructura evita ambigüedad y refleja la presentación de los remitentes.
- source_word: καὶ οἱ ἐν τῇ χώρᾳ τῆς Ἰουδαίας
  english_pob_choice: and those in the land of Judea
  chosen_spanish: y los que están en la tierra de Judea
  alternatives_spanish:
  - y los de la tierra de Judea
  - y los que están en el país de Judea
  lexicon: BDAG
  rationale: χώρα puede significar tierra, región o país. 'Tierra de Judea' mantiene la amplitud geográfica sin forzar un término más administrativo o más moderno de lo que el griego warrants.
- source_word: εἰρήνην ἀγαθήν
  english_pob_choice: good peace
  chosen_spanish: buena paz
  alternatives_spanish:
  - paz buena
  - paz y bienestar
  lexicon: BDAG
  rationale: Se conserva la colocación marcada del griego sin expandirla a 'prosperidad' o 'bienestar'. 'Buena paz' suena algo enfático en español, pero preserva la tensión lexical del original y la lectura auditada del POB en inglés.
theological_decisions:
- issue: Mantenimiento del parentesco fraterno como término masculino plural
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanas y hermanos
  - hermanos y hermanas
  - brethren
  rationale: El griego usa ἀδελφοί como término masculino plural. Se conserva 'hermanos' para no suavizar la forma ni introducir una expansión no señalada por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tratamiento del saludo χαίρειν en fórmula de carta
  english_pob_reading: greetings
  chosen_spanish_reading: salud
  alternative_spanish_readings:
  - saludos
  - que se alegren
  rationale: Como saludo convencional, χαίρειν no debe leerse aquí como un mandato de 'regocijarse'. 'Salud' conserva la función epistolar y evita una paráfrasis doctrinalmente o contextualmente innecesaria.
  doctrine_reference: Lexical policy on epistolary formulas
- issue: Traducción de εἰρήνην ἀγαθήν sin amplificación interpretativa
  english_pob_reading: good peace
  chosen_spanish_reading: buena paz
  alternative_spanish_readings:
  - paz buena
  - paz y prosperidad
  - gran paz
  rationale: Se mantiene la unión de 'paz' con el adjetivo 'buena' para no borrar la construcción inusual del griego. No se añade 'prosperidad' porque el texto no lo dice explícitamente.
  doctrine_reference: BDAG; source-text transparency
translation_notes:
  revision_awareness: El inglés auditado revisó la redacción para eliminar la adición interpretativa 'send' y dejar la salutación como fórmula directa. La versión española sigue esa revisión al usar un saludo nominal breve ('salud') y no un verbo añadido. También conserva la yuxtaposición final 'buena paz' para respetar la construcción marcada εἰρήνην ἀγαθήν.
  spanish_consistency_notes:
  - Se mantuvo 'Judea' como 'Judea' y no 'Judea (país)' para evitar sobreexplicación.
  - Se usó 'hermanos' de manera uniforme para ἀδελφοί en todos los miembros de la frase.
  - No se introdujo 'Cristo', 'SEÑOR' ni otros términos no presentes en el versículo.
  - La puntuación en dos miembros separados por dos puntos y comas sigue el formato epistolar del original y de la auditoría inglesa.
