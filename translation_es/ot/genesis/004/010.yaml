translation:
  language: es
  text: 'Y dijo: «¿Qué has hecho? La voz de la sangre[a] de tu hermano clama a mí desde el suelo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "sangres", forma plural frecuentemente usada en contextos de derramamiento de sangre; en español normalmente se vierte como "sangre".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Y él dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se conserva como avance de la acción. En español, 'Entonces dijo' comunica el giro narrativo con naturalidad sin añadir interpretación temporal excesiva.
- source_word: מֶה עָשִׂיתָ
  english_pob_choice: What have you done?
  chosen_spanish: ¿Qué has hecho?
  alternatives_spanish:
  - ¿Qué hiciste?
  - ¿Qué has cometido?
  lexicon: HALOT
  rationale: El perfecto compuesto expresa bien la acción ya realizada con peso moral presente, como en la decisión inglesa. '¿Qué has hecho?' es una acusación directa, natural y fiel.
- source_word: קוֹל
  english_pob_choice: The voice
  chosen_spanish: La voz
  alternatives_spanish:
  - El sonido
  - La voz clamante
  lexicon: HALOT
  rationale: '''Voz'' preserva la personificación del hebreo y evita volver la frase demasiado impersonal. Mantiene la tensión figurativa del texto.'
- source_word: דְּמֵי
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  - las sangres
  lexicon: HALOT
  rationale: El hebreo plural 'sangres' es idiomático para sangre derramada. En español, el sustantivo singular 'sangre' comunica de forma natural el mismo referente, sin perder el trasfondo de derramamiento que la nota explica.
- source_word: אָחִיךָ
  english_pob_choice: your brother’s
  chosen_spanish: de tu hermano
  alternatives_spanish:
  - de tu hermano
  lexicon: HALOT
  rationale: El constructo hebreo se vierte de manera idiomática como complemento posesivo en español.
- source_word: צֹעֲקִים
  english_pob_choice: is crying out
  chosen_spanish: clama
  alternatives_spanish:
  - está clamando
  - claman
  lexicon: HALOT
  rationale: El participio plural hebreo se entiende con concordancia natural en español mediante un singular colectivo ('la sangre' / 'clama'). 'Clama' conserva el tono solemne y la fuerza judicial del grito.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hasta mí
  lexicon: HALOT
  rationale: La meta del clamor se expresa de modo directo con 'a mí'. Es la equivalencia natural del complemento preposicional hebreo.
- source_word: מִן הָאֲדָמָה
  english_pob_choice: from the ground
  chosen_spanish: desde la tierra
  alternatives_spanish:
  - desde el suelo
  - desde la tierra del suelo
  lexicon: HALOT
  rationale: '''אֲדָמָה'' puede significar ''tierra'' o ''suelo''. Aquí ''tierra'' mantiene mejor la resonancia bíblica y el vínculo con el relato de Caín, sin rigidizarlo en un calco.'
theological_decisions:
- issue: Personificación de la sangre de Abel
  english_pob_reading: Retain the figurative language that the blood itself cries out to God.
  chosen_spanish_reading: Mantener la imagen figurada de que la sangre clama a Dios.
  alternative_spanish_readings:
  - Interpretar la frase solo como sangre derramada que reclama justicia
  - Explicar la imagen en el texto principal como culpa de sangre
  rationale: El hebreo presenta una personificación vívida; traducirla literalmente preserva la fuerza moral y teológica del pasaje. La explicación de 'sangre' en la nota permite entender el plural hebreo sin borrar la imagen principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del texto auditado en inglés; se mantiene la imagen personificada y se resuelve en nota el plural hebreo de דְּמֵי.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando corresponda al nombre divino; aquí no aparece.
  - Se prefirió 'tierra' para אֲדָמָה por resonancia bíblica y naturalidad, en línea con el audit trail inglés.
  - Se conservó una nota de plural hebreo para no perder la tensión léxica de דְּמֵי.
  - El registro es bíblico y contemporáneo, sin arcaismos innecesarios.
