translation:
  language: es
  text: Entonces el rey se quitó de la mano su anillo de sello y se lo dio a Amán hijo de Hammedata, el agagueo, enemigo de los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judeanos». El hebreo יְהוּדִים puede denotar al pueblo judío en sentido amplio o, en algunos contextos, a los habitantes de Judá/Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: took
  chosen_spanish: quitó
  alternatives_spanish:
  - retiró
  - tomó
  lexicon: HALOT
  rationale: El verbo expresa quitar o remover. En español, «quitó» comunica con naturalidad la acción de retirar el anillo de la mano del rey, sin perder la fuerza narrativa del hebreo.
- source_word: טַבַּעְתּוֹ
  english_pob_choice: his signet ring
  chosen_spanish: su anillo de sello
  alternatives_spanish:
  - su anillo
  - su sello
  lexicon: HALOT
  rationale: El contexto cortesano indica que no era solo un anillo ornamental, sino un anillo con función oficial de sellar. «Anillo de sello» conserva esa función política y jurídica.
- source_word: מֵעַל יָדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de encima de su mano
  - de su mano
  lexicon: HALOT
  rationale: La frase hebrea se vierte de manera directa y natural. «De su mano» preserva la imagen original sin resultar forzado en español.
- source_word: וַיִּתְּנָהּ
  english_pob_choice: gave it
  chosen_spanish: se lo dio
  alternatives_spanish:
  - lo dio
  - lo entregó
  lexicon: HALOT
  rationale: El pronombre femenino remite al anillo. «Se lo dio» es idiomático en español y mantiene la referencia pronominal sin explicitar de más.
- source_word: לְהָמָן
  english_pob_choice: to Haman
  chosen_spanish: a Amán
  alternatives_spanish:
  - a Haman
  lexicon: Transliteration tradition / Spanish biblical convention
  rationale: Se adapta el nombre a la forma usual en español bíblico, «Amán», manteniendo la identificación del personaje.
- source_word: בֶּן הַמְּדָתָא
  english_pob_choice: son of Hammedatha
  chosen_spanish: hijo de Hammedata
  alternatives_spanish:
  - hijo de Hammedatha
  lexicon: Transliteration tradition / Spanish biblical convention
  rationale: Se conserva la estructura patronímica literal. El nombre propio se adapta a la grafía española habitual, sin añadir interpretación.
- source_word: הָאֲגָגִי
  english_pob_choice: the Agagite
  chosen_spanish: el agaguita
  alternatives_spanish:
  - el agagueo
  - el agagita
  lexicon: HALOT
  rationale: El gentilicio conserva la referencia hebrea al linaje o procedencia vinculada con Agag. «Agaguita» sigue de cerca la forma del original y mantiene la resonancia narrativa.
- source_word: צֹרֵר
  english_pob_choice: the enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - opositor
  lexicon: HALOT
  rationale: El participio designa a uno que hostiga u oprime. «Enemigo» transmite con claridad la oposición hostil del personaje hacia el pueblo.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: HALOT
  rationale: En Ester, el término se refiere al pueblo judío como grupo identificable dentro de la narración. «Judíos» es la forma natural y fiel en español.
theological_decisions:
- issue: Cómo rendir el referente étnico-היסטórico de הַיְּהוּדִים en Ester
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: La tradición auditada en inglés opta por «the Jews» porque en este contexto designa al pueblo judío dentro de la historia de Ester. En español, «judíos» comunica de manera inmediata ese mismo referente colectivo.
  doctrine_reference: Ninguno; decisión de referencia histórica y lexical
- issue: Función del anillo en la escena cortesana
  english_pob_reading: signet ring
  chosen_spanish_reading: anillo de sello
  alternative_spanish_readings:
  - anillo
  - sello
  rationale: El objeto tiene valor administrativo y real, no solo ornamental. Mantener la función de sellar evita perder el peso narrativo del gesto del rey.
  doctrine_reference: Ninguno; decisión histórico-narrativa
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios y que hay alto grado de acuerdo con la fuente y la decisión auditada en inglés. Esta versión sigue ese estado estable, trasladando al español las mismas decisiones léxicas y narrativas sin ampliar el sentido.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y claro, evitando calcos innecesarios.
  - Se conservó la función del anillo con «anillo de sello», coherente con el contexto real.
  - Se eligió «Amán» como forma española estándar del nombre propio, sin alterar la referencia textual.
  - La nota textual sobre «judíos/judeanos» se conserva porque el español reproduce la misma ambigüedad semántica que el inglés auditado.
