id: PHP.2.8
reference: Philippians 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐταπείνωσεν ἑαυτὸν γενόμενος ὑπήκοος μέχρι θανάτου, θανάτου δὲ σταυροῦ·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/008.yaml
  text: he humbled himself, becoming obedient to the point of death—even death on a cross.
translation:
  language: ko
  text: 그리고 자기를 낮추셔서, 죽음에 이르기까지[a], 곧 십자가의 죽음에 이르기까지[b] 순종하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「죽기까지」. 헬라어 구문은 그분의 순종이 죽음 자체에까지 이르렀음을 뜻한다.
    reason: lexical_alternative
  - marker: b
    text: 문자적으로는 「죽음, 곧 십자가의」. 본문의 의미는 「그것도 십자가의 죽음」으로, 죽음의 형태를 충격적으로 부각시키는 강조이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταπείνωσεν
  english_pob_choice: he humbled
  chosen_korean: 낮추다
  alternatives_korean:
  - 낮게 하다
  - 비하하다
  lexicon: BDAG
  rationale: 글로사리에 정한 표준 어휘. 자발적 낮춤의 의미를 가장 자연스럽게 담아내며 9절의 ὑψόω(「높이심」)와 대조를 이룬다.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_korean: 자기를
  alternatives_korean:
  - 자기 자신을
  lexicon: BDAG
  rationale: 재귀 대명사를 직접 옮긴다. 자발적 자기 낮춤의 강조를 살린다.
- source_word: γενόμενος
  english_pob_choice: becoming
  chosen_korean: ~하셔서 … 순종하셨다
  alternatives_korean:
  - ~이 되심으로써
  - 됨으로써
  lexicon: BDAG
  rationale: 헬라어 분사가 자기 낮춤의 방식을 가리킨다. 한국어로는 문장 전체를 「낮추셔서 … 순종하셨다」로 풀어 순종이 낮춤의 방식임을 자연스럽게 담는다.
- source_word: ὑπήκοος
  english_pob_choice: obedient
  chosen_korean: 순종하다
  alternatives_korean:
  - 복종하다
  - 따르다
  lexicon: BDAG
  rationale: 형용사를 한국어 동사 「순종하다」로 옮기는 것이 합쇼체 산문에 자연스럽다. 본 절의 기독론적 무게를 살린다.
- source_word: μέχρι θανάτου
  english_pob_choice: to the point of death
  chosen_korean: 죽음에 이르기까지
  alternatives_korean:
  - 죽기까지
  - 죽음에 이르도록
  lexicon: BDAG
  rationale: 한국어로 자연스러우며, 순종이 죽음 자체에까지 이르렀다는 무게를 보존한다.
- source_word: δὲ
  english_pob_choice: even
  chosen_korean: 곧
  alternatives_korean:
  - 그것도
  - 더구나
  lexicon: BDAG
  rationale: 여기서 δέ는 단순 죽음이 아니라 충격적 죽음으로의 상승을 표시한다. 한국어 「곧」으로 그 동격적·강조적 상승을 자연스럽게 살린다.
- source_word: σταυροῦ
  english_pob_choice: on a cross
  chosen_korean: 십자가의
  alternatives_korean:
  - 십자가에서의
  - 십자가에 못 박힌
  lexicon: BDAG
  rationale: 「죽음에 이르기까지」를 두 번 사용해 압축된 헬라어 구조를 한국어로 자연스럽게 풀고, 십자가형의 구체적 수치를 본문에 그대로 남긴다.
theological_decisions:
- issue: 마지막 구절 θανάτου δὲ σταυροῦ의 강조 기능
  chosen_reading: 단순한 재진술이 아니라 「곧 십자가의 죽음에 이르기까지」로 상승적 강조
  alternative_readings:
  - 「실로 십자가의 죽음」
  - 「죽음, 곧 십자가의 죽음」
  rationale: 본 절은 십자가형의 수치스럽고 저주받은 성격에서 절정에 이르므로, 한국어 번역도 추가적 교리적 해석을 덧붙이지 않고 수사적 상승을 보존한다.
