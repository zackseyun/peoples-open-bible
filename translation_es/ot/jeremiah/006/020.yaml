revisions:
- from: '¿Por qué esto para mí: el incienso viene de Saba[a], y la caña aromática[b] de una tierra distante? Vuestros holocaustos no son aceptables, y vuestros sacrificios no me agradan.'
  to: '¿Por qué esto para mí: el franquincienso viene de Saba[a], y la caña aromática[b] de una tierra distante? Vuestros holocaustos no son aceptables, y vuestros sacrificios no me agradan.'
