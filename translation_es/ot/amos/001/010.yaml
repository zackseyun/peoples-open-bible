review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: primera persona futura («enviaré»), «fuego», el objeto locativo sobre/contra el muro de Tiro, y el resultado de consumo. Sin embargo, falla en el referente de אַרְמְנֹתֶיהָ: el hebreo singular-plural posesivo se refiere a las construcciones prominentes de la ciudad («sus ciudadelas / palacios / fortalezas»), no a «sus ciudades fortificadas», que cambia el sentido de edificios o complejos dentro de la ciudad a ciudades múltiples.'
  spanish_quality_summary: El español es claro y digno, pero «sus ciudades fortificadas» suena semánticamente incorrecto en contexto, porque Tiro es una ciudad y el juicio recae sobre su muro y sus estructuras internas. «Así enviaré» es aceptable, aunque algo rígido; funciona como continuidad discursiva. El resto de la frase es natural y legible.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en este versículo. El topónimo «Tiro» está bien. La decisión principal a corregir es léxica: אַרְמְנֹתֶיהָ debe alinearse con «ciudadelas», «fortalezas» o «palacios», no «ciudades fortificadas».'
  issues:
  - severity: high
    issue: «sus ciudades fortificadas» no traduce fielmente אַרְמְנֹתֶיהָ
    rationale: אַרְמוֹן denota palacio, fortaleza o ciudadela; no significa «ciudad». La versión actual altera el referente y expande indebidamente el alcance del juicio.
  - severity: medium
    issue: La nota al pie no corresponde bien al texto principal
    rationale: Si el texto principal dice «ciudades fortificadas», la alternativa «sus palacios» no presenta una alternativa léxica cercana, sino una corrección de categoría semántica. La nota debe acompañar una opción principal como «ciudadelas».
  revised_spanish_text: Así enviaré fuego sobre el muro de Tiro, y consumirá sus ciudadelas[a].
