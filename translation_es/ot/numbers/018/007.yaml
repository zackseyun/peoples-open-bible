review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la estructura del hebreo y del POB inglés, pero introduce varios desajustes importantes: cambia indebidamente la persona posesiva de «vuestro sacerdocio» a «su sacerdocio», convierte el singular de servicio sacerdotal en plural con «ministrarán», y traduce הַזָּר como «el extranjero», lo cual contradice la decisión auditada de evitar una lectura étnica. También «será muerto» suena menos natural en español que «será condenado a muerte» o «morirá», y aquí conviene reflejar mejor la fuerza legal de יוּמָת.'
  spanish_quality_summary: El texto es comprensible, pero contiene problemas de concordancia y naturalidad. «Su sacerdocio» es ambiguo y menos fiel que «su sacerdocio» con voseo plural implícito no funciona bien aquí; en español bíblico claro debe ser «su sacerdocio» solo si el referente no es segunda persona, pero el hebreo exige «vuestro». «Ministrarán» rompe la concordancia con el tratamiento previo y además introduce un matiz eclesiástico innecesario frente a «servirán». «Servicio dado como don» es aceptable, pero una formulación más compacta y clara es preferible.
  glossary_alignment: 'No hay términos del glosario principal como Yahvé/Mesías en este versículo, pero sí hay desalineación con la decisión léxica auditada sobre הַזָּר: debe evitarse «extranjero» por su potencial sentido étnico. También conviene mantener el lenguaje de servicio sacerdotal sin sobrecargarlo con «ministrar» cuando el POB inglés eligió «serve».'
  issues:
  - severity: high
    issue: «su sacerdocio» traduce incorrectamente כְּהֻנַּתְכֶם
    rationale: 'El hebreo lleva sufijo de segunda persona plural: «vuestro/su sacerdocio» en sentido de ustedes. En español neutral eclesial, «su» puede ser ambiguo; aquí conviene «su sacerdocio» solo si el contexto es inequívoco, pero dado el paralelismo con «tú y tus hijos contigo» y la necesidad de precisión, la redacción debe ajustarse para evitar ambigüedad. Mejor mantener una formulación clara con el referente sacerdotal de Aarón y sus hijos.'
  - severity: high
    issue: «el extranjero» para הַזָּר induce una lectura étnica
    rationale: La documentación inglesa especifica que se refiere a cualquier persona no autorizada para funciones sacerdotales, no a un extranjero étnico. El español debe reflejar esto en el texto principal o al menos evitar el falso sentido principal.
  - severity: medium
    issue: «ministrarán» no refleja bien וַעֲבַדְתֶּם y además cambia innecesariamente el registro
    rationale: El hebreo expresa servicio cultual. «Servirán» es más directo, más cercano al audit trail y menos interpretativo que «ministrarán».
  - severity: medium
    issue: «será muerto» es poco natural en español moderno
    rationale: Aunque intenta reflejar la pasiva causativa de יוּמָת, en español suena tosco. «Será condenado a muerte» sobreinterpreta el proceso judicial; «morirá» debilita la causatividad. «Será ejecutado» sería demasiado específico. Una solución equilibrada es «será condenado a muerte» solo si se acepta ese matiz; de lo contrario puede mantenerse «morirá» con nota. Aquí prefiero «será condenado a muerte» por la fuerza legal del contexto, pero sin necesidad de adjudicación adicional.
  - severity: low
    issue: La nota [c] repite exactamente la redacción del texto principal como alternativa
    rationale: Una nota alternativa debe aportar una verdadera opción léxica, por ejemplo «un don de servicio» o explicar la ambigüedad de la construcción hebrea.
