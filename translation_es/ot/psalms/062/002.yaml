translation:
  language: es
  text: Solo en Dios halla silencio mi alma[a]; de él viene mi salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Solo para Dios espera en silencio mi alma», o «Solo en Dios está en reposo mi alma».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Sólo
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: אַךְ expresa restricción o exclusividad; en español, 'Solo' conserva ese valor enfático y mantiene el tono breve del hebreo poético.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: para
  alternatives_spanish:
  - hacia
  - a
  - para
  lexicon: HALOT
  rationale: En este contexto, la orientación del alma hacia Dios se expresa de forma más natural en español con 'para' que con un calco más duro; preserva la idea de dirección/dependencia sin sugerir un 'silencio hacia' negativo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים designa al Dios de Israel; 'Dios' es la equivalencia directa y sobria en español.
- source_word: דּוּמִיָּה
  english_pob_choice: silent
  chosen_spanish: en silencio
  alternatives_spanish:
  - silenciosa
  - en quietud
  - en reposo
  lexicon: HALOT
  rationale: El sustantivo puede denotar silencio, quietud o reposo. 'En silencio' conserva la imagen principal sin forzar una paráfrasis interpretativa como 'espera' o 'descansa'.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi vida
  - mi interior
  lexicon: HALOT
  rationale: '''Alma'' es la forma española tradicional y natural para נֶפֶשׁ en este tipo de poesía, manteniendo la referencia a la persona interior sin reducirla a psicología moderna.'
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - procedente de él
  lexicon: HALOT
  rationale: La preposición indica origen; 'de él' es la forma idiomática breve en español y conserva que la salvación procede de Dios.
- source_word: יְשׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi rescate
  lexicon: HALOT
  rationale: '''Salvación'' reproduce el campo semántico teológico del término y encaja con el registro bíblico del salmo, sin limitarlo a una liberación meramente circunstancial.'
theological_decisions:
- issue: 'El matiz de דּוּמִיָּה: silencio, espera o reposo'
  english_pob_reading: An expression of quiet, trusting silence before God
  chosen_spanish_reading: Una expresión de silencio confiado delante de Dios
  alternative_spanish_readings:
  - Una expresión de espera en silencio ante Dios
  - Una expresión de reposo en Dios
  rationale: 'El hebreo permite más de una resonancia: silencio, quietud y espera. El texto principal preserva la imagen primaria de silencio sin resolverla completamente en ''espera'' o ''reposo'', para no borrar la tensión lexical documentada.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y lexical.'
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del audit trail inglés, pero ajusta 'toward' a 'para' por idiomaticidad española y mantiene la ambigüedad lexical de דּוּמִיָּה con una nota alternativa breve. No se introducen lecturas doctrinales no atestiguadas.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y se mantuvo 'Dios' conforme al estándar del proyecto para אֱלֹהִים en este contexto.
  - Se usó 'salvación' en vez de 'liberación' para conservar el registro teológico del salmo.
  - '''Solo'' se eligió para reflejar la exclusividad de אַךְ sin añadir énfasis ajeno.'
