translation:
  language: es
  text: No lo derramarán sobre carne humana[a], y según su composición no harán nada igual. Es santo; será santo para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la carne del hombre». El hebreo «carne de אָדָם» usa אָדָם con sentido genérico para seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִיסָךְ
  english_pob_choice: shall be poured
  chosen_spanish: se derramará
  alternatives_spanish:
  - será derramado
  - se aplicará
  lexicon: HALOT
  rationale: El verbo hebreo refiere aquí al acto concreto de verter/aplicar el aceite especialmente compuesto. «Se derramará» conserva esa imagen material sin convertirlo de antemano en un término técnico de unción.
- source_word: עַל בְּשַׂר אָדָם
  english_pob_choice: on human flesh
  chosen_spanish: sobre carne humana
  alternatives_spanish:
  - sobre la carne del hombre
  - sobre el cuerpo de cualquier persona
  lexicon: HALOT
  rationale: «Carne» preserva בָּשָׂר con su fuerza literal, y «humana» expresa el valor genérico de אָדָם. Evita suavizar el hebreo a «cuerpo» y mantiene el alcance general de la prohibición.
- source_word: וּבְמַתְכֻּנְתּוֹ
  english_pob_choice: in its composition
  chosen_spanish: conforme a su composición
  alternatives_spanish:
  - según su receta
  - según su fórmula
  lexicon: HALOT
  rationale: מַתְכֹּנֶת comunica la composición medida o fórmula del aceite. «Conforme a su composición» suena natural en español y conserva la idea de una mezcla definida, no reproducible libremente.
- source_word: לֹא תַעֲשׂוּ כָּמֹהוּ
  english_pob_choice: you shall not make any like it
  chosen_spanish: no haréis otro igual
  alternatives_spanish:
  - no haréis nada semejante a él
  - no haréis uno como él
  lexicon: HALOT
  rationale: La frase prohíbe fabricar una mezcla equivalente. «Otro igual» transmite el comparativo de כָּמֹהוּ de manera idiomática en español sin perder el valor de semejanza exacta.
- source_word: קֹדֶשׁ הוּא
  english_pob_choice: It is holy
  chosen_spanish: Es santo
  alternatives_spanish:
  - Es sagrado
  lexicon: HALOT
  rationale: «Santo» conserva el término bíblico central y su peso teológico mejor que «sagrado», que en español puede sonar más general o menos marcado.
- source_word: קֹדֶשׁ יִהְיֶה לָכֶם
  english_pob_choice: it shall be holy to you
  chosen_spanish: santo será para ustedes
  alternatives_spanish:
  - les será santo
  - será santo para ustedes
  lexicon: HALOT
  rationale: La construcción final mantiene el predicado repetido del hebreo y el sentido de apartamiento respecto de Israel. «Para ustedes» refleja el dativo de beneficio/relación sin volverlo explicativo de más.
theological_decisions:
- issue: Uso genérico de אָדָם en contexto de prohibición ritual
  english_pob_reading: human flesh
  chosen_spanish_reading: carne humana
  alternative_spanish_readings:
  - la carne del hombre
  - carne de cualquier persona
  rationale: El hebreo emplea אָדָם en sentido genérico, no un varón individual. «Carne humana» conserva la genericidad y el paralelismo con la materia física del texto, sin introducir una restricción inexistente en el hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura final inglesa, pero evita calcar «human flesh» con una frase menos natural en español. Se mantuvo la doble afirmación de santidad y la prohibición de reproducir la composición, sin añadir explicaciones ajenas al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «santo» para קֹדֶשׁ en ambas cláusulas, preservando la repetición enfática del original.
  - «Conforme a su composición» refleja el valor de fórmula/mezcla medida de מַתְכֻּנְתּוֹ sin convertirlo en una paráfrasis amplia.
  - Se usó un pronombre plural de segunda persona («ustedes») coherente con el español neutral latinoamericano y con el plural hebreo.
  - La nota [a] conserva la alternativa semántica que el audit trail inglés también documenta para אָדָם.
