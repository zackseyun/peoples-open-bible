translation:
  language: es
  text: 'Entonces ella dijo: «Aquí está mi esclava Bilhá. Entra a ella, para que dé a luz sobre mis rodillas[a], y yo también sea edificada por medio de ella[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «dar a luz sobre mis rodillas», probablemente aludiendo a una práctica cultural por la cual el niño nacido de una esclava era recibido simbólicamente como hijo de la esposa.
    reason: cultural_note
  - marker: b
    text: 'O: «yo también obtenga hijos por medio de ella». El hebreo dice «sea edificada», usando una metáfora de familia/descendencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲמָתִי
  english_pob_choice: my female servant
  chosen_spanish: mi esclava
  alternatives_spanish:
  - mi sierva
  - mi criada
  - mi servidora
  lexicon: HALOT
  rationale: אמה/אָמָה denota una mujer en condición servil; «esclava» conserva esa fuerza social y semántica mejor que términos más suavizados. En español bíblico moderno «sierva» puede sonar más débil o devocional, y aquí el contexto exige la relación de subordinación de Bilhá.
- source_word: בֹּא אֵלֶיהָ
  english_pob_choice: Go in to her
  chosen_spanish: Entra a ella
  alternatives_spanish:
  - Ten relaciones con ella
  - Acércate a ella sexualmente
  - Duérmete con ella
  lexicon: HALOT
  rationale: La frase es un eufemismo hebreo estándar para relaciones sexuales. «Entra a ella» preserva el giro idiomático con suficiente claridad y evita una paráfrasis excesiva; «ten relaciones con ella» explicita el sentido, pero pierde el eco formal del original.
- source_word: עַל בִּרְכַּי
  english_pob_choice: so that she may give birth on my knees
  chosen_spanish: sobre mis rodillas
  alternatives_spanish:
  - en mis rodillas
  - con el niño sobre mis rodillas
  - para que yo reciba al niño sobre mis rodillas
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal literal porque el hebreo la conserva y porque la POB inglesa la retuvo por transparencia. En español «dar a luz sobre mis rodillas» comunica el hecho sin eliminar la referencia cultural marcada.
- source_word: וְאִבָּנֶה
  english_pob_choice: I may be built up
  chosen_spanish: sea edificada
  alternatives_spanish:
  - sea construida
  - me vea establecida
  - obtenga hijos
  lexicon: HALOT
  rationale: El nifal de בנה conserva la metáfora de «ser edificada/edificado». En español, «ser edificada» mantiene el juego léxico y permite al lector percibir la imagen de familia descendiente; se evita reemplazarla por «obtener hijos» en el texto principal para no borrar la tensión metafórica documentada.
- source_word: מִמֶּנָּה
  english_pob_choice: through her
  chosen_spanish: por medio de ella
  alternatives_spanish:
  - a través de ella
  - de ella
  - por ella
  lexicon: HALOT
  rationale: 'La preposición expresa medio/instrumentalidad: Bilhá es el medio por el cual se espera descendencia. «Por medio de ella» es claro y natural en español, y preserva mejor la relación instrumental que un simple «de ella».'
- source_word: גַם אָנֹכִי
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  - a mí también
  lexicon: HALOT
  rationale: La partícula enfática גַם junto con אָנֹכִי expresa participación personal en el resultado deseado. «Yo también» es natural y conserva el énfasis en primera persona.
theological_decisions:
- issue: La metáfora de ser "edificada" por descendencia
  english_pob_reading: I too may be built up through her
  chosen_spanish_reading: yo también sea edificada por medio de ella
  alternative_spanish_readings:
  - yo también sea establecida por medio de ella
  - yo también obtenga hijos por medio de ella
  rationale: La decisión principal conserva la metáfora de construcción/edificación del hebreo, en línea con la POB inglesa. Aunque el sentido contextual apunta a la obtención de hijos, el texto no debe desactivar la imagen; por eso se mantiene la tensión entre metáfora y resultado procreativo.
  doctrine_reference: Metáfora narrativa y semántica del texto hebreo; no implica una afirmación doctrinal específica.
- issue: Posible lectura cultural de la frase "sobre mis rodillas"
  english_pob_reading: so that she may bear on my knees
  chosen_spanish_reading: para que dé a luz sobre mis rodillas
  alternative_spanish_readings:
  - para que pare sobre mis rodillas
  - para que el niño sea recibido sobre mis rodillas
  rationale: Se conserva la formulación literal porque el testimonio textual es claro y la POB inglesa ya documenta la práctica cultural asociada. La nota explica la posible costumbre de recepción simbólica del niño sin imponer una explicación única en el cuerpo del texto.
  doctrine_reference: Costumbre cultural del antiguo Cercano Oriente; no es una enseñanza doctrinal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y la revisión inglesa más reciente: mantiene el eufemismo sexual «entra a ella», conserva la imagen cultural de «sobre mis rodillas» y el verbo metafórico «ser edificada», sin introducir una paráfrasis que borre la tensión léxica documentada. También refleja el ajuste de fluidez observado en la revisión inglesa, uniendo naturalmente las dos cláusulas de propósito sin repetir innecesariamente conectores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el hebreo lo exija; este versículo no lo contiene.
  - Se prefiere «esclava» para אֲמָה por la fuerza social del término, en consonancia con la política terminológica del proyecto.
  - Se mantiene la metáfora de construcción en «sea edificada» para conservar el vínculo con el hebreo בנה.
  - La puntuación con comillas y coma es compatible con el español bíblico moderno y conserva la claridad de la subordinación de propósito.
