id: GEN.31.18
reference: Genesis 31:18
source:
  edition: WLC
  text: וַ/יִּנְהַ֣ג אֶת כָּל מִקְנֵ֗/הוּ וְ/אֶת כָּל רְכֻשׁ/וֹ֙ אֲשֶׁ֣ר רָכָ֔שׁ מִקְנֵה֙ קִנְיָנ֔/וֹ אֲשֶׁ֥ר רָכַ֖שׁ בְּ/פַדַּ֣ן אֲרָ֑ם לָ/ב֛וֹא אֶל יִצְחָ֥ק אָבִ֖י/ו אַ֥רְצָ/ה כְּנָֽעַן־־־־־׃
translation:
  text: And he drove all his livestock and all his possessions that he had acquired—the livestock he had acquired in Paddan-aram—to go to Isaac his father in the land of Canaan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the land of Canaan." The Hebrew uses a directional form, literally "Canaan-ward/landward," indicating movement toward Canaan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנְהַג
  chosen: drove
  alternatives:
  - led
  - drove along
  lexicon: HALOT
  rationale: The verb נהג in this context refers to moving animals along. 'Drove' best fits the pastoral context of transporting flocks and herds, while remaining natural English.
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his cattle
  - his herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock or acquired animals collectively. 'Livestock' is broad and modern, covering the full sense without narrowing to cattle.
- source_word: רְכֻשׁוֹ
  chosen: his possessions
  alternatives:
  - his property
  - his goods
  lexicon: HALOT
  rationale: רְכוּשׁ refers to movable property or goods. 'Possessions' is clear modern English and suitably broad.
- source_word: רָכָשׁ
  chosen: had acquired
  alternatives:
  - had gained
  - had gotten
  lexicon: HALOT
  rationale: The verb emphasizes obtaining property. 'Had acquired' matches the economic sense and preserves the repeated wording in the verse.
- source_word: מִקְנֵה קִנְיָנוֹ
  chosen: the livestock of his own acquisition
  alternatives:
  - his acquired livestock
  - the livestock he had acquired
  lexicon: HALOT
  rationale: This phrase is somewhat emphatic and repetitive in Hebrew. The chosen rendering preserves that emphasis more transparently than a smoother paraphrase, while still being intelligible.
- source_word: בְּפַדַּן אֲרָם
  chosen: in Paddan-aram
  alternatives:
  - in Paddan Aram
  lexicon: HALOT
  rationale: This is a place name and is transliterated rather than translated, following the translation philosophy for names.
- source_word: לָבוֹא
  chosen: to go
  alternatives:
  - in order to go
  - for going
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: Jacob moved his possessions in order to go to Isaac. ''To go'' is concise and accurate.'
- source_word: אַרְצָה כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - to the land of Canaan
  - Canaan-ward
  lexicon: HALOT
  rationale: The directional form אַרְצָה with Canaan indicates movement toward the land. In English, 'in the land of Canaan' attached to Isaac sounds slightly less direct than the Hebrew movement sense, but keeps the destination clear. The alternative 'to the land of Canaan' is also viable; the main text prioritizes readability while preserving the destination.
