translation:
  language: es
  text: Sacrifiquen el cordero[a] de la Pascua, conságrense y preparen lo necesario para sus hermanos, para hacer conforme a la palabra de Yahvé por mano de Moisés[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la Pascua»; el término hebreo puede designar el sacrificio pascual como un todo, pero aquí se refiere específicamente al animal que se inmola.
    reason: lexical_alternative
  - marker: b
    text: O, «por medio de Moisés».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁחֲטוּ
  english_pob_choice: Slaughter
  chosen_spanish: Sacrifiquen
  alternatives_spanish:
  - sacrifiquen
  - degüellen
  - maten
  lexicon: HALOT
  rationale: El verbo en este contexto es sacrificial y ritual. En español, 'sacrifiquen' comunica con claridad la acción cultual sin sonar tan áspero como 'maten', y mantiene el marco del rito pascual. 'Degüellen' sería más literal pero menos natural para una publicación general.
- source_word: הַפָּסַח
  english_pob_choice: the Passover lamb
  chosen_spanish: el cordero de la Pascua
  alternatives_spanish:
  - la Pascua
  - el sacrificio de Pascua
  lexicon: HALOT
  rationale: El hebreo puede referirse a la víctima pascual concreta, no solo a la festividad. En español, 'el cordero de la Pascua' explicita el animal implícito y conserva el sentido sacrificial. 'La Pascua' se deja como alternativa porque es más literal, pero aquí sería menos precisa en contexto.
- source_word: וְהִתְקַדְּשׁוּ
  english_pob_choice: consecrate yourselves
  chosen_spanish: conságrense
  alternatives_spanish:
  - santifíquense
  - háganse santos
  lexicon: HALOT
  rationale: El hitpael tiene sentido reflexivo de preparación cultual. 'Conságrense' es breve, natural y fiel al tono ritual. 'Santifíquense' también es posible, pero 'consagrar' expresa mejor la preparación para servicio sagrado en español actual.
- source_word: וְהָכִינוּ
  english_pob_choice: prepare
  chosen_spanish: prepárense
  alternatives_spanish:
  - háganse listos
  - dispónganse
  - preparen
  lexicon: HALOT
  rationale: Aunque el verbo puede ser transitivo, aquí la idea es de ponerse listos para la tarea indicada después. 'Prepárense' fluye bien en español y refleja la preparación requerida para actuar conforme a la instrucción dada.
- source_word: לַאֲחֵיכֶם
  english_pob_choice: for your brothers
  chosen_spanish: para sus hermanos
  alternatives_spanish:
  - para sus hermanos y hermanas
  - para sus compatriotas
  - para sus parientes
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino 'hermanos'. Se conserva ese valor en la traducción principal por fidelidad léxica y porque el texto habla a los levitas/sacerdotes dentro de la comunidad masculina designada. 'Sus' mantiene el sentido de destinatarios del servicio.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para cumplir
  - a fin de hacer
  lexicon: HALOT
  rationale: El infinitivo constructo enlaza la preparación con la ejecución del mandato. 'Para hacer' es formalmente cercano y suficientemente idiomático en español. 'Cumplir' sería interpretativo; 'hacer' conserva la amplitud del verbo hebreo.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  - conforme al mandato de Yahvé
  lexicon: HALOT
  rationale: '''Palabra'' reproduce el sustantivo דְּבַר sin reducirlo de entrada a ''mandato''. ''Conforme a'' suena natural en español bíblico moderno y mantiene la relación normativa del texto. Se conserva ''Yahvé'' para el nombre divino, según la convención del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la terminología base del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre propio divino en lugar de sustituirlo por un título. 'Jehová' y 'el SEÑOR' se evitan por no corresponder a la convención establecida.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - a través de Moisés
  - por la mano de Moisés
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo de mediación. 'Por mano de Moisés' conserva la imagen y su fuerza textual; 'por medio de Moisés' es una alternativa natural pero menos cercana al hebreo. Se evita 'por la mano' por sonar menos idiomático en español.
theological_decisions:
- issue: Alcance de הַפָּסַח en contexto pascual
  english_pob_reading: The English POB reads 'the Passover lamb' and notes that the Hebrew can denote the Passover as a whole, but here specifically the animal being slaughtered.
  chosen_spanish_reading: el cordero de la Pascua
  alternative_spanish_readings:
  - la Pascua
  - el sacrificio de la Pascua
  rationale: El contexto inmediato exige una víctima concreta que se inmola. Traducirlo como 'cordero de la Pascua' hace visible el referente sacrificial sin perder la relación con la fiesta. Se conserva la tensión entre el término amplio y el referente específico mediante la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy § lexical precision in sacrificial contexts
- issue: Nombre divino יְהוָה
  english_pob_reading: The English POB uses Yahweh, preserving the personal name of God.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El proyecto en español sigue la convención de transliterar el Nombre divino como 'Yahvé'. Esto conserva el valor covenantal y personal del nombre frente a una sustitución por título. Se mantiene coherencia con el texto base y con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Léxico relacional לַאֲחֵיכֶם
  english_pob_reading: for your brothers
  chosen_spanish_reading: para sus hermanos
  alternative_spanish_readings:
  - para sus hermanos y hermanas
  - para sus hermanos, es decir, sus correligionarios
  rationale: Se conserva el masculino plural del hebreo, ya que el texto dirige instrucciones a varones con función cultual y el término hebreo es explícitamente masculino. 'Hermanos' es fiel, breve y adecuado para lectura pública. No se amplía a lenguaje inclusivo porque el dato lingüístico del original no lo exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se revisó el paquete fuente original (WLC y morfología), la traducción inglesa POB y sus notas, y el estado de revisión más reciente, que indica que no se requerían cambios. La versión española conserva las decisiones lexicográficas y la tensión semántica documentada en el original, en especial para הַפָּסַח, לַאֲחֵיכֶם y בְּיַד מֹשֶׁה, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con la política terminológica del proyecto.
  - Se usa voz imperativa plural en español para reflejar la forma verbal plural hebrea.
  - Se conserva el registro ritual-sacrificial con verbos y sustantivos que suenan naturales en español bíblico moderno.
  - La nota sobre הַפָּסַח preserva la alternativa entre sentido amplio y referente concreto, como en el audit trail inglés.
