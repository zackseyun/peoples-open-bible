translation:
  language: es
  text: Y la cebada y la paja para los caballos y los [a]corceles se llevaban al lugar donde cada uno estaba[b], según su asignación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Corceles» corresponde al hebreo רָכֶשׁ, que puede referirse a animales de monta selectos; la expresión no obliga a una especie más precisa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre», usado de manera distributiva para decir «cada uno» o «cada responsable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׂעֹרִים
  english_pob_choice: the barley
  chosen_spanish: la cebada
  alternatives_spanish:
  - la cebada en grano
  lexicon: HALOT
  rationale: El hebreo nombra el cereal de forma directa; en este contexto de provisión para animales, «cebada» comunica naturalmente el alimento sin añadir paráfrasis.
- source_word: וְהַתֶּבֶן
  english_pob_choice: the straw
  chosen_spanish: la paja
  alternatives_spanish:
  - la paja de forraje
  - la paja para forraje
  lexicon: HALOT
  rationale: «תֶּבֶן» aquí se refiere al material vegetal usado como forraje o provisión. En español bíblico y moderno, «paja» es el equivalente más claro y natural.
- source_word: לַסּוּסִים
  english_pob_choice: for the horses
  chosen_spanish: para los caballos
  alternatives_spanish:
  - para los caballos de montar
  lexicon: HALOT
  rationale: La preposición indica destino o provisión. «Caballos» es la forma más directa y comprensible en español.
- source_word: וְלָרָכֶשׁ
  english_pob_choice: and the steeds
  chosen_spanish: los corceles
  alternatives_spanish:
  - los caballos de monta
  - los caballos de silla
  lexicon: HALOT
  rationale: El término hebreo designa animales de monta selectos o de prestigio. «Corceles» mantiene una diferencia léxica respecto de «caballos» sin forzar una identificación zoológica más precisa de la que el texto permite.
- source_word: יָבִיאוּ
  english_pob_choice: were brought
  chosen_spanish: eran llevadas
  alternatives_spanish:
  - se traían
  - eran traídas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es activa, el contexto administrativo admite una pasiva impersonal en español. «Eran llevadas» conserva el hecho de la entrega regular y evita introducir agentes no enfatizados por el texto.
- source_word: אֶל הַמָּקוֹם
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - al sitio
  lexicon: HALOT
  rationale: «Lugar» reproduce con naturalidad la referencia locativa general del hebreo.
- source_word: אֲשֶׁר יִהְיֶה שָּׁם אִישׁ
  english_pob_choice: where each man was
  chosen_spanish: donde cada uno estaba
  alternatives_spanish:
  - donde estaba cada responsable
  - donde estaba cada hombre
  lexicon: HALOT
  rationale: El sustantivo singular אִישׁ funciona distributivamente. En español, «cada uno» conserva esa distribución sin cargar el texto con una explicación interpretativa innecesaria. La nota de la POB inglesa sobre el valor distributivo se refleja aquí.
- source_word: כְּמִשְׁפָּטוֹ
  english_pob_choice: according to his duty
  chosen_spanish: conforme a su encargo
  alternatives_spanish:
  - según su deber
  - de acuerdo con su asignación
  lexicon: HALOT
  rationale: En este pasaje מִשְׁפָּט no significa «juicio» sino la disposición o tarea asignada. «Encargo» comunica bien la idea administrativa de responsabilidad asignada; «deber» también sería posible, pero suena menos concreto en este contexto.
theological_decisions:
- issue: Valor distributivo de אִישׁ en la cláusula final
  english_pob_reading: Hebrew 'each man,' used distributively for each responsible person.
  chosen_spanish_reading: donde cada uno estaba
  alternative_spanish_readings:
  - donde cada hombre estaba
  - donde estaba cada responsable
  rationale: 'La lectura no es individualizante en sentido narrativo sino distributiva: cada punto de entrega correspondía a una persona/responsable. «Cada uno» preserva el sentido sin introducir una expansión interpretativa adicional.'
  doctrine_reference: Gramática/distribución del hebreo bíblico; no implica doctrina específica.
- issue: Sentido administrativo de כְּמִשְׁפָּטוֹ
  english_pob_reading: according to his duty
  chosen_spanish_reading: conforme a su encargo
  alternative_spanish_readings:
  - según su deber
  - de acuerdo con su asignación
  rationale: El texto describe una organización de suministros, no un juicio legal. La traducción elegida mantiene el matiz de asignación u obligación operativa.
  doctrine_reference: Uso semántico de מִשְׁפָּט en contexto administrativo; sin carga doctrinal directa.
translation_notes:
  revision_awareness: 'Se revisó el traslado respecto del audit trail inglés: se evitó añadir el modificador «rápidos»/«veloces» a רָכֶשׁ, en línea con la revisión inglesa más reciente que prefirió el valor léxico más cercano («steeds»). En español, por claridad y distinción léxica, se optó por «corceles» sin agregar adjetivos que el hebreo no exige. También se preservó el valor distributivo de אִישׁ y el sentido administrativo de מִשְׁפָּטוֹ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» como sustituto no presente en el hebreo.
  - «Caballos» y «corceles» distinguen el par léxico de forma natural en español sin sobreespecificar especies.
  - La pasiva «eran llevadas» refleja la entrega regular de suministros y suena natural en español bíblico moderno.
