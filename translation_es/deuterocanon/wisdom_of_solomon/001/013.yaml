translation:
  language: es
  text: Porque Dios no hizo la muerte[a], ni se deleita en la destrucción de los vivos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no creó la muerte». El verbo griego puede traducirse de ambas maneras; aquí se eligió «hizo» como equivalente más directo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la relación explicativa/causal del versículo con el contexto anterior. 'Porque' comunica con naturalidad esa conexión en español y preserva la fuerza de explicación de ὅτι.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Nombre común y directo del sujeto divino; en español 'Dios' es la forma natural y fiel al griego con artículo.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: El sustantivo abstracto se mantiene sin expansión interpretativa; el artículo definido en español ayuda a reflejar la concreción del objeto directo.
- source_word: οὐκ ἐποίησεν
  english_pob_choice: did not make
  chosen_spanish: no hizo
  alternatives_spanish:
  - no creó
  - no produjo
  lexicon: BDAG
  rationale: ποίηω puede traducirse como 'hacer' o 'crear'. 'No hizo' sigue de cerca el verbo griego y conserva la decisión auditada de no sobreespecificar cosmológicamente el enunciado.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - y no
  lexicon: BDAG
  rationale: Une de manera natural la segunda cláusula negativa en español, manteniendo el paralelismo con la primera.
- source_word: τέρπεται
  english_pob_choice: does he delight
  chosen_spanish: se deleita
  alternatives_spanish:
  - toma placer
  - se complace
  lexicon: BDAG
  rationale: Conserva el sentido afectivo de gozo o complacencia; 'se deleita' es idiomático y transmite bien el matiz del verbo.
- source_word: ἐπʼ ἀπωλείᾳ
  english_pob_choice: in the destruction
  chosen_spanish: en la destrucción
  alternatives_spanish:
  - en la ruina
  - en la perdición
  lexicon: BDAG
  rationale: ἀπώλεια apunta a ruina o destrucción; 'destrucción' es la equivalencia más directa y amplia sin añadir matices ajenos.
- source_word: ζώντων
  english_pob_choice: of the living
  chosen_spanish: de los que viven
  alternatives_spanish:
  - de los vivientes
  - de los vivos
  lexicon: BDAG
  rationale: El participio sustantivado se refiere a seres/personas vivientes. 'De los que viven' conserva la referencia personal y suena natural en español.
theological_decisions:
- issue: 'ὁ θεὸς θάνατον οὐκ ἐποίησεν: si traducir ἐποίησεν como ''hizo'' o ''creó'''
  english_pob_reading: did not make death
  chosen_spanish_reading: no hizo la muerte
  alternative_spanish_readings:
  - no creó la muerte
  rationale: 'Se sigue la lectura auditada de ''make'' para no imponer una precisión doctrinal no explicitada por el verbo griego. ''No hizo la muerte'' mantiene la tensión teológica: el texto niega el origen de la muerte en la acción de Dios, sin resolver más allá de la fuente.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Fuente y auditoría coinciden con alta concordancia; la versión en inglés no recibió cambios en la última pasada. No se detectan revisiones posteriores que afecten la decisión principal entre 'hacer' y 'crear'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, en línea con el estándar del proyecto.
  - Se conserva 'la muerte' y 'la destrucción' sin ampliar a formulaciones doctrinales más interpretativas.
  - '''Se deleita'' reproduce el valor afectivo de τέρπεται con registro bíblico natural en español.'
  - '''De los que viven'' evita una nominalización rígida y mantiene el participio sustantivado griego.'
