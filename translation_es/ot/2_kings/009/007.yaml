review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del hebreo: juicio contra la casa de Acab, venganza divina por la sangre derramada, identificación de los profetas como siervos de Dios, y mantenimiento de Yahvé para יְהוָה. Sin embargo, «golpearás» no refleja adecuadamente la fuerza letal/judicial de וְהִכִּיתָה en contexto dinástico; el sentido es más bien «derribarás/abatirás/exterminarás» la casa de Acab. También conviene mejorar la sintaxis de la aposición «mis siervos los profetas» y la puntuación general para mayor naturalidad.'
  spanish_quality_summary: El español es legible y digno, pero «golpearás la casa de Ahab» suena poco natural e insuficiente en contexto de juicio real. «Ahab» debe ajustarse a la forma española habitual «Acab» para lectura eclesial amplia. La frase gana claridad con «abatirás la casa de Acab, tu señor» o «tu amo»; aquí «tu señor» es más idiomático para un superior real humano sin riesgo serio de confusión, especialmente con Yahvé explícito en el resto del versículo. La nota al pie es útil y debe mantenerse anclada en «Jezabel».
  glossary_alignment: 'Se alinea bien con «Yahvé». No hay lenguaje de Mesías/Cristo aquí. El uso de «siervos» para עבד es aceptable por contexto relacional. La principal desalineación es lexical: וְהִכִּיתָה no debe quedar como «golpearás».'
  issues:
  - severity: high
    issue: «golpearás» debilita וְהִכִּיתָה
    rationale: En este contexto de juicio contra una dinastía, נכה no se refiere meramente a dar un golpe, sino a abatir/derribar decisivamente. «Golpearás la casa» suena literalista y semánticamente insuficiente en español.
  - severity: medium
    issue: Forma del nombre «Ahab»
    rationale: En español bíblico general la forma establecida es «Acab». Mantener «Ahab» reduce naturalidad sin necesidad contextual.
  - severity: low
    issue: Puntuación de «mis siervos, los profetas»
    rationale: La coma no es incorrecta, pero la aposición sin coma («mis siervos los profetas») fluye mejor aquí y se acerca al inglés auditado.
  revised_spanish_text: Y abatirás la casa de Acab, tu señor, y yo vengaré la sangre de mis siervos los profetas y la sangre de todos los siervos de Yahvé, de la mano de Jezabel[a].
  revised_footnotes:
