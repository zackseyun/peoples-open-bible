source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Ἐὰν δὲ³³ *ζημίᾳ ἢ ἀπωλείᾳ τινὶ περιπέσητε³⁴, τέκνα³⁵, ⌈μὴ ἐκθροεῖσθε³⁶⌉. ὅτι ⌈αὐτὸ⌉¹ τὸ πνεῦμα³⁷ *ποιεῖ ἐπιθυμῆσαι³⁸ τοῦ ἀπολλυμένου³⁹ ἵνα *θυμῷ πέσῃ διὰ τοῦ πάθους⁴⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/004/005.yaml
  text: But if you fall into any loss or destruction, children, do not be thrown into confusion. For that very spirit causes one to desire to be angry over what is perishing, so that he may fall into anger through passion.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:33Z'
    unchanged: false
    changes_summary: Revised 'ruin' to 'destruction' for closer lexical match to ἀπωλείᾳ; removed 'my' since it is not in the Greek; changed 'be distressed' to 'be thrown into confusion' to reflect ἐκθροεῖσθε more closely; and replaced 'through affliction' with 'through passion' to match πάθους.
translation:
  language: es
  text: Pero si caen en alguna pérdida o destrucción, hijos, no se dejen llevar a la confusión. Porque ese mismo espíritu hace que uno desee airarse por lo que se está perdiendo, de modo que caiga en la ira a través de la pasión.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζημίᾳ ἢ ἀπωλείᾳ
  english_pob_choice: loss or destruction
  chosen_spanish: pérdida o destrucción
  alternatives_spanish:
  - daño o ruina
  - merma o perdición
  lexicon: LSJ
  rationale: Refleja la revisión inglesa 'destruction' (en vez de 'ruin') más cercana a ἀπώλεια.
- source_word: ἐκθροεῖσθε
  english_pob_choice: be thrown into confusion
  chosen_spanish: no se dejen llevar a la confusión
  alternatives_spanish:
  - no se aturdan
  - no se conturben
  lexicon: LSJ
  rationale: Captura la perturbación emocional sin restringirla solo al miedo, en línea con la revisión inglesa.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - disposición
  - impulso
  lexicon: LSJ
  rationale: En este contexto testamentario-ético, 'espíritu' conserva la fuerza cuasi-personificada que actúa en la ira.
- source_word: τοῦ ἀπολλυμένου
  english_pob_choice: what is perishing
  chosen_spanish: lo que se está perdiendo
  alternatives_spanish:
  - aquello que perece
  - lo que se destruye
  lexicon: LSJ
  rationale: Conserva la abstracción participial sin concretizar el objeto.
- source_word: πάθους
  english_pob_choice: passion
  chosen_spanish: pasión
  alternatives_spanish:
  - sufrimiento
  - padecimiento
  lexicon: LSJ
  rationale: Sigue la revisión inglesa de 'affliction' a 'passion' para reflejar πάθος.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  lexicon: LSJ
  rationale: El griego no tiene posesivo; sigo la revisión que retiró 'mis'. Sin embargo, en español 'hijos' sin artículo en vocativo es natural.
translation_notes:
  revision_awareness: El inglés POB cambió 'ruin' → 'destruction', removió 'my', 'be distressed' → 'be thrown into confusion', y 'through affliction' → 'through passion'. El español sigue todos estos cambios.
  spanish_consistency_notes:
  - πνεῦμα → espíritu (cuasi-personificado en este contexto).
  - πάθος → pasión, no 'aflicción'.
  - 'τέκνα sin posesivo: ''hijos'' en vocativo simple.'
