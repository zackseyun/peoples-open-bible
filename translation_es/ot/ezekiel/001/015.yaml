translation:
  language: es
  text: Al mirar a los seres vivientes, he aquí, una rueda estaba en la tierra, junto a los seres vivientes, para cada uno de sus cuatro rostros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «correspondiente a sus cuatro rostros». La frase hebrea es compacta y puede describir la rueda como situada en relación con la forma de cuatro rostros de cada ser viviente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: As I looked
  chosen_spanish: Al mirar
  alternatives_spanish:
  - Y vi
  - Entonces vi
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva y verbo de ver introduce la observación del profeta. «Al mirar» conserva el carácter visual y el avance de la escena sin sonar tan mecánico como «y vi».
- source_word: הַחַיּוֹת
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - los seres vivientes
  lexicon: HALOT
  rationale: En Ezequiel 1 designa a las criaturas del trono. «Seres vivientes» mantiene la vivacidad del término y evita una traducción demasiado interpretativa; es una opción natural en español para este contexto visionario.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La partícula marca una irrupción súbita en la visión. «He aquí» preserva ese valor de llamada de atención en un registro bíblico claro y digno.
- source_word: אוֹפַן אֶחָד
  english_pob_choice: one wheel
  chosen_spanish: una rueda
  alternatives_spanish:
  - una sola rueda
  - una rueda, una
  lexicon: HALOT
  rationale: El sustantivo singular con אֶחָד puede expresarse de forma natural como «una rueda»; el numeral no requiere énfasis adicional en español y la singularidad sigue siendo clara por el contexto.
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el suelo
  lexicon: HALOT
  rationale: Aunque el inglés usa «on the earth», en español «en la tierra» comunica la ubicación terrenal de la rueda de manera natural y fiel al hebreo אֶרֶץ.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: La preposición indica proximidad. «Junto a» es breve, precisa y funciona bien en un relato visionario.
- source_word: לְאַרְבַּעַת פָּנָיו
  english_pob_choice: for each of their four faces
  chosen_spanish: para cada uno de sus cuatro rostros
  alternatives_spanish:
  - correspondiente a sus cuatro rostros
  - según sus cuatro rostros
  lexicon: HALOT
  rationale: El hebreo es compacto y el sufijo singular puede leerse distributivamente. «Para cada uno de sus cuatro rostros» conserva esa relación sin resolverla en exceso, y mantiene «rostros» para reflejar de forma concreta la imaginería del texto.
theological_decisions:
- issue: Valor distributivo de לְאַרְבַּעַת פָּנָיו
  english_pob_reading: 'Render distributively: ''for each of their four faces'''
  chosen_spanish_reading: «para cada uno de sus cuatro rostros»
  alternative_spanish_readings:
  - «correspondiente a sus cuatro rostros»
  - «junto con sus cuatro rostros»
  rationale: 'El sufijo singular tras el plural se entiende naturalmente de manera distributiva en el contexto inmediato: cada ser viviente tiene cuatro rostros. La redacción española preserva esa relación sin imponer una explicación más cerrada que la del hebreo.'
  doctrine_reference: Preservar la tensión interpretativa documentada; no sobreespecificar la imagen visionaria.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de referencia; la lectura inglesa final se mantiene sin cambios y el español sigue esa línea, con ajuste natural al orden y la idiomática del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «seres vivientes» para el término técnico de Ezequiel 1, en consonancia con el contexto visionario.
  - «Rostros» conserva la imaginería corporal del hebreo פָּנִים sin sustituirla por una abstracción como «aspectos».
