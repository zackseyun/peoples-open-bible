translation:
  language: es
  text: Y si se esconden en la cumbre del Carmelo, de allí yo los buscaré y los tomaré; y si se ocultan de delante de mis ojos en el fondo[a] del mar, de allí mandaré a la serpiente[b], y los morderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el lecho del mar». El hebreo dice literalmente algo como «en el piso/fondo del mar».
    reason: lexical_alternative
  - marker: b
    text: O «la culebra». El sustantivo hebreo puede denotar tanto «serpiente» como «culebra».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵחָבְאוּ
  english_pob_choice: hide themselves
  chosen_spanish: se esconden
  alternatives_spanish:
  - se ocultan
  - se esconden a sí mismos
  lexicon: HALOT
  rationale: El nifal expresa una acción de ocultarse o esconderse con intención. «Se esconden» es natural en español y conserva el matiz reflexivo sin volverlo más explicativo de lo que permite el hebreo.
- source_word: בְּרֹאשׁ הַכַּרְמֶל
  english_pob_choice: on the summit of Carmel
  chosen_spanish: en la cumbre del Carmelo
  alternatives_spanish:
  - en la cima del Carmelo
  - en la parte alta del Carmelo
  - en el monte Carmelo
  lexicon: HALOT
  rationale: רֹאשׁ aquí señala la parte más alta. «Cumbre» preserva la imagen espacial con buena naturalidad en español. «Carmelo» mantiene el nombre propio sin expandirlo innecesariamente.
- source_word: אֲחַפֵּשׂ
  english_pob_choice: I will search them out
  chosen_spanish: los buscaré
  alternatives_spanish:
  - los buscaré exhaustivamente
  - los buscaré a fondo
  - los rastrearé
  lexicon: HALOT
  rationale: El piel implica una búsqueda minuciosa. En español, «los buscaré» es suficiente en contexto, y el alcance intensivo queda sostenido por la estructura paralela y el juicio inescapable del verso.
- source_word: וּלְקַחְתִּים
  english_pob_choice: and take them
  chosen_spanish: los tomaré
  alternatives_spanish:
  - los agarraré
  - los capturaré
  - los apresaré
  lexicon: HALOT
  rationale: לקח significa de manera amplia «tomar». «Los tomaré» conserva esa amplitud sin especificar más de lo que el hebreo dice; en este contexto implica aprehensión judicial.
- source_word: יִסָּתְרוּ
  english_pob_choice: conceal themselves
  chosen_spanish: se ocultan
  alternatives_spanish:
  - se esconden
  - quedan ocultos
  - se apartan de la vista
  lexicon: HALOT
  rationale: El segundo verbo de ocultarse mantiene una ligera variación léxica respecto del primero, como en el inglés POB, sin perder naturalidad en español.
- source_word: מִנֶּגֶד עֵינַי
  english_pob_choice: from before my eyes
  chosen_spanish: de delante de mis ojos
  alternatives_spanish:
  - de mi vista
  - ante mis ojos
  - fuera de mi vista
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se traduce de manera bastante literal para conservar su fuerza antropomórfica. «De delante de mis ojos» mantiene el peso formal y visual del original.
- source_word: בְּקַרְקַע הַיָּם
  english_pob_choice: on the floor of the sea
  chosen_spanish: en el suelo del mar
  alternatives_spanish:
  - en el fondo del mar
  - sobre el lecho del mar
  - en la superficie del mar
  lexicon: HALOT
  rationale: קַרְקַע denota terreno, piso o suelo. «Suelo del mar» sigue de cerca la imagen del hebreo y corresponde al énfasis espacial del texto; se conserva la alternativa tradicional «fondo del mar» como opción interpretativa implícita en la nota.
- source_word: אֲצַוֶּה
  english_pob_choice: I will command
  chosen_spanish: mandaré
  alternatives_spanish:
  - ordenaré
  - daré la orden
  lexicon: HALOT
  rationale: צוה expresa dar una orden con autoridad. «Mandaré» funciona bien en español bíblico actual y comunica la soberanía divina sin arcaísmo excesivo; la fuerza del acto se mantiene por el contexto.
- source_word: הַנָּחָשׁ
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  - el serpiente
  lexicon: HALOT
  rationale: נחשׁ puede referirse a serpiente o culebra. Aquí «serpiente» corresponde al registro elevado y al uso consagrado del español bíblico, sin forzar una lectura simbólica adicional.
- source_word: וּנְשָׁכָם
  english_pob_choice: and it will bite them
  chosen_spanish: y los morderá
  alternatives_spanish:
  - y los picará
  - y los herirá con su mordida
  lexicon: HALOT
  rationale: נשׁך significa morder. La forma singular del sujeto se entiende por el español verbal y el contexto; «los morderá» es directo y fiel.
theological_decisions:
- issue: Preservación del antropomorfismo de la visión divina
  english_pob_reading: Retain the concrete expression 'from before my eyes' rather than smoothing it to a purely abstract paraphrase.
  chosen_spanish_reading: Conservar «de delante de mis ojos» en vez de convertirlo en una formulación abstracta como «fuera de mi vista».
  alternative_spanish_readings:
  - fuera de mi vista
  - de mi vista
  rationale: El verso comunica juicio inescapable mediante lenguaje concreto. Mantener la imagen de los ojos preserva la fuerza retórica del hebreo y evita diluir el énfasis de la omnisciencia y la búsqueda judicial.
  doctrine_reference: Translation philosophy §3, §6
- issue: Habla divina en primera persona sin añadir sujeto explícito
  english_pob_reading: Use first-person divine speech ('I will...') without inserting 'the LORD' into the verse text.
  chosen_spanish_reading: Mantener la primera persona («yo buscaré», «mandaré») sin insertar «Yahvé» en el texto del versículo.
  alternative_spanish_readings:
  - Yahvé los buscará y los tomará
  - el Señor los buscará
  rationale: El hebreo continúa el discurso divino del contexto inmediato; este versículo no introduce un nuevo sujeto nominal. En español, la primera persona conserva la continuidad del habla y evita expandir el texto más allá de su alcance.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La versión sigue de cerca la revisión final en inglés, sin cambios sustanciales respecto al acuerdo alto del control cruzado. Se mantiene la doble imagen de ocultarse y la secuencia judicial del verso, con equivalentes españoles naturales y auditables.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término estándar del proyecto solo cuando el texto lo requiera explícitamente; aquí el versículo queda en primera persona divina sin insertar el nombre.
  - Se prefirió «serpiente» por registro y coherencia bíblica, dejando nota de la alternativa «culebra».
  - Se mantuvo «de delante de mis ojos» para conservar el idiomatismo hebreo y la tensión teológica de la omnisciencia divina.
  - «Carmelo» se conserva como topónimo sin añadir «monte», siguiendo la economía del hebreo.
