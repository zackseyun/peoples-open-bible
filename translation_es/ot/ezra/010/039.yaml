lexical_decisions:
- source_word: שֶׁלֶמְיָה
  english_pob_choice: Shelemiah
  chosen_spanish: Shelemías
  alternatives_spanish:
  - Shelamías
  lexicon: nombre propio
  rationale: Se translitera el nombre propio; en español bíblico es natural adaptar el final hebreo -iah a -ías para mantener legibilidad y cercanía fonética, sin traducir el nombre.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Natan
  lexicon: nombre propio
  rationale: Nombre propio transliterado; en español la forma con tilde ayuda a reflejar el acento y es ampliamente reconocible.
- source_word: עֲדָיָה
  english_pob_choice: Adaiah
  chosen_spanish: Adaías
  alternatives_spanish:
  - Adaya
  - Adaiah
  lexicon: nombre propio
  rationale: Nombre propio transliterado; se conserva el valor onomástico del hebreo y se adapta la forma al patrón español -ías para claridad y eufonía.
- source_word: וְ / וַ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción
  rationale: La waw conjuntiva se vierte con la conjunción simple 'y', que reproduce la lista del hebreo de forma directa y natural. Se evita 'e' porque no hay choque fonético con /i/.
