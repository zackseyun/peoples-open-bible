translation:
  language: es
  text: Como el ganado que baja al valle[a], el Espíritu de Yahvé les dio descanso; así condujiste a tu pueblo, para hacerte un nombre glorioso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el viento de Yahvé le dio descanso». El hebreo רוּחַ puede significar «espíritu», «viento» o «aliento», aunque «Espíritu» encaja mejor aquí.
    reason: lexical_alternative
  - marker: b
    text: O «un nombre de gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבְּהֵמָה
  english_pob_choice: Like livestock
  chosen_spanish: Como ganado
  alternatives_spanish:
  - Como ganado vacuno
  - Como bestias
  lexicon: HALOT
  rationale: בְּהֵמָה es un término colectivo para animales domésticos; en español, «ganado» comunica bien la imagen colectiva sin sugerir animales salvajes y suena natural en un registro bíblico moderno.
- source_word: בַּבִּקְעָה
  english_pob_choice: into the valley
  chosen_spanish: al valle
  alternatives_spanish:
  - en el valle
  - hacia el valle
  lexicon: HALOT
  rationale: La preposición con ירד expresa movimiento de descenso; «al valle» conserva la idea direccional sin forzar una perífrasis pesada.
- source_word: תֵרֵד
  english_pob_choice: that go down
  chosen_spanish: desciende
  alternatives_spanish:
  - baja
  - va descendiendo
  lexicon: HALOT
  rationale: El hebreo presenta la acción de bajar en la comparación. «Desciende» mantiene el movimiento y permite una construcción fluida en español con valor de imagen.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el viento de Yahvé
  - el aliento de Yahvé
  lexicon: HALOT
  rationale: En este contexto de guía salvífica y descanso, la referencia personal divina encaja mejor que «viento» o «aliento». Se conserva «Yahvé» según el criterio del proyecto para יְהוָה.
- source_word: תְּנִיחֶנּוּ
  english_pob_choice: gave them rest
  chosen_spanish: les dio descanso
  alternatives_spanish:
  - los hizo descansar
  - les concedió descanso
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es singular, el contexto trata a Israel como colectividad. En español, «les dio descanso» preserva el sentido colectivo señalado en la revisión inglesa sin perder naturalidad.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - por eso
  lexicon: HALOT
  rationale: Marca la conclusión comparativa; «así» funciona bien en español para enlazar la imagen con la acción de Dios.
- source_word: נִהַגְתָּ
  english_pob_choice: you led
  chosen_spanish: guiaste
  alternatives_spanish:
  - condujiste
  - llevaste
  lexicon: HALOT
  rationale: El verbo implica conducción/guía en el contexto del éxodo. «Guiaste» conserva la dirección pastoral y evita matices de coerción.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: «Pueblo» mantiene el sentido de pertenencia de pacto y la referencia corporativa al Israel dirigido por Dios.
- source_word: לַעֲשׂוֹת לְךָ
  english_pob_choice: to make for yourself
  chosen_spanish: para hacerte
  alternatives_spanish:
  - para hacer para ti
  - para procurarte
  lexicon: HALOT
  rationale: 'La construcción final expresa propósito; «para hacerte» permite leer con naturalidad el reflexivo implícito de la frase: Dios obra en favor de la manifestación de su propio honor.'
- source_word: שֵׁם תִּפְאָרֶת
  english_pob_choice: a glorious name
  chosen_spanish: un nombre glorioso
  alternatives_spanish:
  - un nombre de gloria
  - un nombre hermoso y glorioso
  lexicon: HALOT
  rationale: La expresión denota un nombre caracterizado por esplendor/honor. «Nombre glorioso» conserva el campo semántico de תִּפְאָרֶת sin volverlo paraphraseado.
theological_decisions:
- issue: Referencia del sufijo singular en תְּנִיחֶנּוּ
  english_pob_reading: The singular likely refers to Israel as a people considered collectively; English revision rendered it as plural 'them'.
  chosen_spanish_reading: Se traduce con plural colectivo «les dio descanso» para ajustarse al antecedente corporativo «tu pueblo» y a la revisión inglesa.
  alternative_spanish_readings:
  - le dio descanso
  - les daba descanso
  rationale: El hebreo puede mantener un singular colectivo; sin embargo, en español el plural resuelve de forma transparente la referencia comunitaria ya explicitada en la línea y sigue el ajuste de la revisión POB más reciente.
  doctrine_reference: Preserve the collective sense without obscuring the syntax of the surrounding clause.
- issue: Sentido de רוּחַ יְהוָה
  english_pob_reading: the Spirit of Yahweh
  chosen_spanish_reading: el Espíritu de Yahvé
  alternative_spanish_readings:
  - el viento de Yahvé
  - el aliento de Yahvé
  rationale: El contexto de salvación y guía por el desierto favorece una agencia personal divina. No se impone una lectura pneumatológica posterior, pero sí la lectura más natural del contexto narrativo-profético.
  doctrine_reference: Original-language primacy over translation tradition; do not import claims beyond the text.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que cambió el singular «him» por el plural colectivo «them» y ajustó la comparación a una forma más natural. Por eso la traducción española usa «les dio descanso» y mantiene el paralelismo con «tu pueblo» sin añadir elementos no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al criterio del proyecto, no «SEÑOR».
  - Se mantiene «Espíritu» con mayúscula por tratarse de una referencia divina personal en este contexto.
  - «Nombre glorioso» conserva el valor honorífico de תִּפְאָרֶת sin convertirlo en una paráfrasis expansiva.
