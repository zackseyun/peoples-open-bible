  yaml_path: translation/ot/numbers/007/088.yaml
  text: And all the cattle for the sacrifice of peace offerings were twenty-four bulls[a], sixty rams, sixty male goats, and sixty one-year-old lambs. This was the dedication of the altar after it had been anointed.
