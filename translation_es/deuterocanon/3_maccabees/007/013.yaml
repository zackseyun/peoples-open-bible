translation:
  language: es
  text: 'Entonces los sacerdotes de estas gentes y toda la multitud, habiéndolo[a] alabado como era debido, exclamaron: “¡Aleluya!”[b] y se retiraron con alegría.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre probablemente se refiere a Dios; el griego no repite el sustantivo de manera explícita.
    reason: alternative_reading
  - marker: b
    text: O “¡Hallelujah!”; el griego conserva una aclamación litúrgica hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατευφημήσαντες
  english_pob_choice: having praised
  chosen_spanish: habiéndolo alabado
  alternatives_spanish:
  - habiéndolo aclamado
  - habiéndolo ensalzado
  - habiéndolo bendecido
  lexicon: LSJ
  rationale: El participio expresa una alabanza pública y solemne. En español, “alabar” comunica bien el acto de elogio cultual sin forzar un tecnicismo que el contexto no exige.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Dios
  lexicon: Greek lexicon
  rationale: El griego usa un pronombre masculino singular sin repetir el sustantivo. “Lo” conserva esa referencia pronominal sin expandirla explícitamente, aunque el referente probable sea Dios.
- source_word: ὡς πρέπει ἦν
  english_pob_choice: as was fitting
  chosen_spanish: como era debido
  alternatives_spanish:
  - como era apropiado
  - como convenía
  lexicon: LSJ
  rationale: La expresión indica lo que resultaba correcto o adecuado. “Como era debido” mantiene el tono digno y natural en español.
- source_word: οἱ τούτων ἱερεῖς
  english_pob_choice: the priests of these people
  chosen_spanish: los sacerdotes de este pueblo
  alternatives_spanish:
  - sus sacerdotes
  - los sacerdotes pertenecientes a ellos
  lexicon: LSJ
  rationale: τούτων conserva un demostrativo de cercanía o referencia contextual. “De este pueblo” reproduce mejor esa relación que un posesivo simple.
- source_word: πᾶν τὸ πλῆθος
  english_pob_choice: the whole multitude
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - la multitud entera
  - todo el pueblo reunido
  lexicon: LSJ
  rationale: πλῆθος designa una multitud o agrupación numerosa. “Toda la multitud” preserva el sentido colectivo y el valor totalizador de πᾶν.
- source_word: ἐπιφωνήσαντες
  english_pob_choice: cried out
  chosen_spanish: exclamaron
  alternatives_spanish:
  - clamaron
  - gritaron
  lexicon: LSJ
  rationale: El verbo señala una exclamación en voz alta. “Exclamaron” funciona bien con la cita litúrgica y evita una aspereza innecesaria en español.
- source_word: ἀλληλουιά
  english_pob_choice: Hallelujah
  chosen_spanish: Aleluya
  alternatives_spanish:
  - Hallelujah
  - Alleluia
  lexicon: LSJ
  rationale: Se trata de la aclamación litúrgica hebrea transliterada. En español, “Aleluya” es la forma natural y reconocible, y conserva la referencia cultual.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - alegres
  - gozosos
  lexicon: LSJ
  rationale: La preposición con el sustantivo expresa acompañamiento afectivo. “Con alegría” mantiene la estructura nominal y suena natural en español.
- source_word: ἀνέλυσαν
  english_pob_choice: departed
  chosen_spanish: se retiraron
  alternatives_spanish:
  - partieron
  - se fueron
  - se dispersaron
  lexicon: LSJ
  rationale: En este cierre de escena, el verbo puede expresar irse o retirarse. “Se retiraron” resulta sobrio y adecuado para un contexto de despedida colectiva.
theological_decisions:
- issue: Referente implícito de αὐτόν
  english_pob_reading: The pronoun is left as 'him' rather than expanded to 'God.'
  chosen_spanish_reading: El pronombre se conserva implícito como “lo”, sin añadir “Dios” al texto principal.
  alternative_spanish_readings:
  - a Dios
  - lo alabaron a él
  rationale: La escena sugiere a Dios como referente, pero el griego no lo nombra. Mantener el pronombre evita introducir una explicitación no presente en la fuente y conserva la tensión documentada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor litúrgico de ἀλληλουιά
  english_pob_reading: Hallelujah
  chosen_spanish_reading: Aleluya
  alternative_spanish_readings:
  - Hallelujah
  - Alleluia
  - ¡Alaben a Yah!
  rationale: La aclamación se deja como término litúrgico tradicional en español. “Aleluya” preserva el carácter cultual y es la forma más transparente para el lector hispanohablante.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Se corrigió el problema previo de anclaje de notas: ahora cada marcador de nota aparece explícitamente en el texto español. También se ajustó el cierre verbal para reflejar mejor el matiz de ἀνέλυσαν sin perder naturalidad.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como norma del proyecto solo cuando el texto la requiera explícitamente; aquí no aparece un tetragrámaton ni una cita directa que exija esa forma en el cuerpo del versículo.
  - Se preservó el registro cultual y solemne del original, evitando una paráfrasis expansiva.
  - Se conservó la referencia pronominal implícita del original sin sustituirla por un sustantivo interpretativo.
