    reason: lexical_alternative
  - marker: c
    text: O ‘para todos los que estaban impuros’.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad y el registro bíblico en español: ''inmolación'' representa mejor el sacrificio ritual de שְׁחִיטָה que ''degollación'', que suena demasiado crudo. El resto del texto puede mantenerse porque es fiel al hebreo, al POB inglés y a la terminología del proyecto.'
