translation:
  language: es
  text: Tu mal te disciplinará, y tus apostasías[a] te reprenderán. Reconoce, pues, y ve que es malo y amargo haber abandonado a Yahvé tu Dios, y que no hay temor de mí en ti[b], declara el Señor Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tus extravíos» o «tus desvíos».
    reason: lexical_alternative
  - marker: b
    text: O, «y mi temor no está en ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּיַסְּרֵךְ
  english_pob_choice: will discipline you
  chosen_spanish: te disciplinará
  alternatives_spanish:
  - te castigará
  - te corregirá
  lexicon: HALOT
  rationale: El piel de יסר puede expresar disciplina correctiva con fuerza admonitora. «Disciplinará» conserva esa mezcla de corrección y juicio mejor que un simple «castigará».
- source_word: רָעָתֵךְ
  english_pob_choice: your evil
  chosen_spanish: tu mal
  alternatives_spanish:
  - tu maldad
  - tu calamidad
  lexicon: HALOT
  rationale: La relación con «abandonado a Yahvé tu Dios» favorece un sentido moral. «Tu mal» mantiene la fuerza general del hebreo sin especificar más de lo que el contexto exige.
- source_word: מְשֻׁבוֹתַיִךְ
  english_pob_choice: your apostasies
  chosen_spanish: tus apostasías
  alternatives_spanish:
  - tus desvíos
  - tus extravíos
  - tus rebeliones
  lexicon: HALOT
  rationale: El plural señala actos de apartarse de Yahvé en sentido de infidelidad pactual. «Apostasías» conserva ese peso teológico; es más preciso que una mera idea de tropiezos o errores.
- source_word: תּוֹכִחֻךְ
  english_pob_choice: will reprove you
  chosen_spanish: te reprenderán
  alternatives_spanish:
  - te rebatirán
  - te demostrarán tu culpa
  - te corregirán
  lexicon: HALOT
  rationale: La forma hiphil de יכח tiene matiz de reprender, demostrar culpa o poner en evidencia. «Reprenderán» funciona bien en español y mantiene la función acusatoria del paralelo.
- source_word: וּדְעִי וּרְאִי
  english_pob_choice: So know and see
  chosen_spanish: Reconoce, pues, y ve
  alternatives_spanish:
  - Conoce, pues, y ve
  - Sabe, pues, y mira
  lexicon: HALOT
  rationale: Los dos imperativos llaman a una percepción intelectual y visual. «Reconoce» expresa mejor el componente cognitivo en español moderno que «conoce» en este contexto.
- source_word: רַע וָמָר
  english_pob_choice: evil and bitter
  chosen_spanish: malo y amargo
  alternatives_spanish:
  - malvado y amargo
  - malo y áspero
  - malo y amarguísimo
  lexicon: HALOT
  rationale: «Amargo» preserva la imagen del efecto doloroso; «malo» es una opción idiomática y amplia para רע en español, aunque «maldad» también sería posible si se quisiera mayor abstracto.
- source_word: עָזְבֵךְ אֶת־יְהוָה אֱלֹהָיִךְ
  english_pob_choice: for you to forsake Yahweh your God
  chosen_spanish: haber abandonado a Yahvé tu Dios
  alternatives_spanish:
  - abandonar a Yahvé tu Dios
  - tu haber abandonado a Yahvé tu Dios
  - haber dejado a Yahvé tu Dios
  lexicon: HALOT
  rationale: El infinitivo con sufijo se vierte naturalmente como una subordinada de infinitivo en español. «Abandonado» conserva la idea de dejar atrás con más peso que «dejado».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El proyecto exige «Yahvé» para el nombre divino en el texto principal. Se mantiene la coherencia terminológica con el resto del POB en español.
- source_word: וְלֹא פַחְדָּתִי אֵלַיִךְ
  english_pob_choice: and that my fear is not in you
  chosen_spanish: y que no hay temor de mí en ti
  alternatives_spanish:
  - y que mi temor no está en ti
  - y que no me temes
  - y que no hay temor hacia mí en ti
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo («mi temor») y el sentido natural en español es la ausencia de temor reverente hacia Dios. Se opta por una formulación idiomática, preservando el contenido y aclarando la relación reverencial.
- source_word: נְאֻם אֲדֹנָי יְהוִה צְבָאוֹת
  english_pob_choice: declares the Lord GOD of hosts
  chosen_spanish: declara el Señor Yahvé de los ejércitos
  alternatives_spanish:
  - declara el Señor Yahvé de los ejércitos celestiales
  - oráculo del Señor Yahvé de los ejércitos
  lexicon: HALOT
  rationale: «Declara» reproduce el valor formular de נְאֻם. «Señor Yahvé» refleja אֲדֹנָי יְהוִה sin ocultar el nombre divino, y «de los ejércitos» mantiene צְבָאוֹת.
theological_decisions:
- issue: Sentido de מְשֻׁבוֹתַיִךְ en contexto pactual
  english_pob_reading: your apostasies
  chosen_spanish_reading: tus apostasías
  alternative_spanish_readings:
  - tus desvíos
  - tus rebeldías
  - tus retrocesos
  rationale: El verso acusa infidelidad a Yahvé, no solo irregularidad moral. «Apostasías» conserva el peso de la ruptura pactual que el contexto exige.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Forma de expresar וְלֹא פַחְדָּתִי אֵלַיִךְ
  english_pob_reading: and that my fear is not in you
  chosen_spanish_reading: y que no hay temor de mí en ti
  alternative_spanish_readings:
  - y que mi temor no está en ti
  - y que no me temes
  rationale: La frase hebrea es nominal, pero en español la lectura más clara y fiel al sentido es la ausencia de temor reverente hacia Dios. Se preserva la idea teológica central sin forzar una literalidad opaca.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el expediente inglés POB: conserva la secuencia causal/admonitoria, el paralelismo entre «mal» y «apostasías», y la fórmula profética final. Se optó por una españolización idiomática en la última cláusula para que el sentido reverencial sea transparente sin perder la fuerza del hebreo nominal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para YHWH conforme al criterio del proyecto.
  - «Apostasías» se usa en sentido técnico-pactual, no como simple sinónimo de pecados genéricos.
  - «Señor Yahvé de los ejércitos» refleja la fórmula profética final sin sustituirla por una convención eclesiástica de ocultamiento.
  - La nota sobre «temor» preserva la alternativa literal y la opción idiomática en español.
