translation:
  language: es
  text: 'Y ellos le dijeron: «Tus siervos han venido de una tierra muy lejana para el nombre de Yahvé tu Dios, porque hemos oído su fama[a] y todo lo que hizo en Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hemos oído el informe acerca de él» o «hemos oído de su renombre». El hebreo usa una construcción cognada que, literalmente, dice «hemos oído su oír/informe».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  english_pob_choice: And they said to him
  chosen_spanish: Y ellos le dijeron
  alternatives_spanish:
  - Entonces ellos le dijeron
  - Así le dijeron
  lexicon: HALOT
  rationale: La fórmula narrativa de wayyiqtol se vierte de modo directo y natural en español con «Y». Se conserva el flujo del relato sin añadir una relación discursiva más fuerte que la del hebreo.
- source_word: מֵאֶרֶץ רְחוֹקָה מְאֹד
  english_pob_choice: from a very distant land
  chosen_spanish: de una tierra muy lejana
  alternatives_spanish:
  - de una tierra muy distante
  - de una tierra lejísimos
  lexicon: HALOT
  rationale: «Tierra» reproduce bien אֶרֶץ en contexto geográfico, y «muy lejana» comunica la intensificación de מְאֹד de forma natural en español.
- source_word: בָּאוּ
  english_pob_choice: have come
  chosen_spanish: han venido
  alternatives_spanish:
  - vinieron
  lexicon: HALOT
  rationale: El presente perfecto español encaja con la declaración actual de los hablantes y refleja la llegada como hecho ya cumplido con relevancia presente.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  lexicon: HALOT
  rationale: Se mantiene la fuerza lexical de עֶבֶד como «esclavo», como en la decisión inglesa cuando no se atenúa el término. Aunque es una fórmula deferente, el contexto diplomático no obliga a suavizarlo a «siervos» sin perder fuerza.
- source_word: לְשֵׁם יְהוָה אֱלֹהֶיךָ
  english_pob_choice: for the name of Yahweh your God
  chosen_spanish: para el nombre de Yahvé tu Dios
  alternatives_spanish:
  - por el nombre de Yahvé tu Dios
  - en atención al nombre de Yahvé tu Dios
  lexicon: HALOT
  rationale: «Para el nombre de» refleja el valor final/motivacional de לְשֵׁם sin convertirlo en una explicación causal libre. Se conserva «Yahvé» conforme al estándar del proyecto para יְהוָה.
- source_word: שָׁמַעְנוּ שָׁמְעוֹ
  english_pob_choice: we have heard of his fame
  chosen_spanish: hemos oído su fama
  alternatives_spanish:
  - hemos oído su renombre
  - hemos oído el informe acerca de él
  lexicon: HALOT
  rationale: La construcción cognada se traduce de manera compacta como «hemos oído su fama», manteniendo el sentido de reputación/renombre que motiva su afirmación. En nota se preserva la alternativa más literal de «hemos oído su informe».
- source_word: וְאֵת כָּל אֲשֶׁר עָשָׂה בְּמִצְרָיִם
  english_pob_choice: and all that he did in Egypt
  chosen_spanish: y todo lo que hizo en Egipto
  alternatives_spanish:
  - y todas las cosas que hizo en Egipto
  lexicon: HALOT
  rationale: Se sigue la estructura directa del hebreo con una coordinación simple y natural en español. «Todo lo que hizo» reproduce bien el alcance total de כָּל אֲשֶׁר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: Se usa la forma del nombre divino establecida por el proyecto en español, preservando el Tetragrámaton en lugar de enmascararlo con un título.
theological_decisions:
- issue: Nombre divino יְהוָה en discurso directo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre pactual de Dios. La traducción española mantiene ese nombre como «Yahvé» para conservar la referencia explícita del original y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לְשֵׁם en la frase motivacional
  english_pob_reading: for the name of Yahweh your God
  chosen_spanish_reading: para el nombre de Yahvé tu Dios
  alternative_spanish_readings:
  - por el nombre de Yahvé tu Dios
  - a causa del nombre de Yahvé tu Dios
  rationale: La preposición hebrea con שֵׁם aquí expresa propósito, ocasión o referencia motivacional. «Para el nombre de» conserva esa relación sin forzar una paráfrasis causal más fuerte de la que el hebreo exige.
  doctrine_reference: 'DOCTRINE.md: translation method — preserve source relations where semantically relevant'
- issue: Construcción cognada שָׁמַעְנוּ שָׁמְעוֹ
  english_pob_reading: we have heard of his fame
  chosen_spanish_reading: hemos oído su fama
  alternative_spanish_readings:
  - hemos oído su renombre
  - hemos oído el informe acerca de él
  rationale: El hebreo usa una expresión intensiva/cognada que puede apuntar a fama, renombre o informe oído. «Su fama» comunica con naturalidad el efecto comunicativo principal en español, mientras que la nota conserva la lectura alternativa más literal.
  doctrine_reference: HALOT; English POB lexical note on cognate hearing/report
- issue: עֲבָדֶיךָ como auto-designación deferente
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  - tus servidores
  rationale: Aunque la expresión es diplomática y deferente, el término base עֶבֶד mantiene fuerza de servidumbre/esclavitud. Se conserva «esclavos» para no debilitar la carga lexical del original; la alternativa queda implícitamente disponible si un contexto más protocolario lo requiriera.
  doctrine_reference: HALOT; project lexical default for δοῦλος/עֶבֶד when force is lexical
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la frase a «for the name of the LORD your God» para reflejar más directamente לְשֵׁם. En español se preservó ese ajuste con «para el nombre de Yahvé tu Dios». También se observó la preferencia auditada por traducir שָׁמַעְנוּ שָׁמְעוֹ con una expresión natural de fama/renombre, manteniendo la nota alternativa literal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma española del Tetragrámaton, en coherencia con el proyecto.
  - Se eligió un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - Se mantiene la fuerza lexical de «esclavos» para עֲבָדֶיךָ, con nota implícita de su uso deferente.
  - «Su fama» responde al sentido idiomático principal de la construcción cognada; la nota preserva la alternativa de informe/renombre.
