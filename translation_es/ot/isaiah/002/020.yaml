revisions:
- from: En aquel día el hombre arrojará sus ídolos de plata y sus ídolos de oro[a], que hicieron para él para postrarse[b], a los topos[c] y a los murciélagos.
  to: En aquel día el hombre arrojará sus ídolos de plata y sus ídolos de oro, que hicieron para él para postrarse ante ellos[a], a los topos[b] y a los murciélagos.
  rationale: 'Se revisa únicamente la zona problemática para hacer natural el español y preservar explícitamente el sentido direccional de לְהִשְׁתַּחֲוֺת: no solo «postrarse», sino «postrarse ante ellos». También se elimina la nota [a] previa porque repetía el texto principal en lugar de aportar una alternativa útil; la nota de incertidumbre zoológica queda anclada en «topos». No se requiere adjudicación adicional, porque la corrección es estilística y semánticamente directa dentro del expediente ya documentado.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: fórmula temporal profética, singular genérico de הָאָדָם, repetición de «ídolos de…», plural activo «hicieron», y destino de los ídolos a criaturas despreciadas/oscurecidas. Sin embargo, «que hicieron para él para postrarse» no preserva con suficiente claridad la relación del infinitivo hebreo לְהִשְׁתַּחֲוֺת con los ídolos; en español suena como si el hombre fuera a postrarse en general, no necesariamente ante ellos. Conviene explicitar el complemento «ante ellos» o equivalente, en línea con la nota inglesa.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la secuencia «para él para postrarse» resulta torpe y poco natural. También la nota a repite exactamente la lectura principal («En aquel día») en vez de ofrecer la alternativa documentada correspondiente a «On that day», que en español conviene expresar como «Aquel día» o «Ese día». El resto del verso lee con naturalidad suficiente para un registro bíblico moderno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «El hombre» para הָאָדָם es defendible según la decisión doctrinal documentada; «ídolos», «postrarse», «topos» y «murciélagos» están alineados con el expediente inglés. La única mejora léxica necesaria es aclarar el objeto implícito de «postrarse» en español.
  issues:
  - severity: medium
    issue: La frase «que hicieron para él para postrarse» es gramaticalmente tosca y semánticamente ambigua.
    rationale: El hebreo לְהִשְׁתַּחֲוֺת significa «postrarse / inclinarse ante» los ídolos. Sin complemento, el español no expresa claramente que la acción es dirigida a ellos. «Para postrarse ante ellos» preserva mejor el sentido fuente y mejora la legibilidad.
  - severity: low
    issue: La nota [a] no presenta una alternativa real al texto principal.
    rationale: 'El inglés distingue «In that day» / «On that day». Si el texto principal es «En aquel día», la alternativa española no debe repetirlo idénticamente; «O: “Aquel día”» comunica mejor la variación posible sin forzar el español.'
  revised_spanish_text: En aquel día el hombre arrojará sus ídolos de plata y sus ídolos de oro, que hicieron para él para postrarse ante ellos[a], a los topos[b] y a los murciélagos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «postrarse»; es decir, adorarlos.'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea probablemente se refiere a topos u otros animales que cavan; el animal exacto es incierto.
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente la zona problemática para hacer natural el español y preservar explícitamente el sentido direccional de לְהִשְׁתַּחֲוֺת: no solo «postrarse», sino «postrarse ante ellos». También se elimina la nota [a] previa porque repetía el texto principal en lugar de aportar una alternativa útil; la nota de incertidumbre zoológica queda anclada en «topos». No se requiere adjudicación adicional, porque la corrección es estilística y semánticamente directa dentro del expediente ya documentado.'
