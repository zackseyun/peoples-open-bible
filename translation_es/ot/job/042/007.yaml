translation:
  language: es
  text: 'Y sucedió[a], después de que Yahvé había hablado estas palabras a Job, que Yahvé dijo a Elifaz el temanita: «Mi ira se enciende contra ti y contra tus dos amigos, porque no hablaron rectamente acerca de mí[b], como mi siervo Job».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y aconteció». La fórmula narrativa hebrea introduce el cambio de escena después de las palabras dirigidas a Job.'
    reason: alternative_reading
  - marker: b
    text: 'O: «a mí» o «de mí». El hebreo dice literalmente «a mí», pero en contexto probablemente se refiere a lo que dijeron acerca de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino en español. «Yahvé» preserva el nombre propio en lugar de ocultarlo con una sustitución funcional, y es coherente con la decisión inglesa documentada.
- source_word: וַיְהִי אַחַר
  english_pob_choice: And it happened, after
  chosen_spanish: Y aconteció, después que
  alternatives_spanish:
  - Y sucedió, después que
  - Después que
  lexicon: HALOT
  rationale: La fórmula narrativa conserva el arranque hebreo con waw consecutiva y la relación temporal. «Aconteció» mantiene un registro bíblico natural sin volverse rígido; se complementa con «después que» para reflejar el orden del original.
- source_word: דִּבֶּר ... אֶת־הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: had spoken these words
  chosen_spanish: había hablado estas palabras
  alternatives_spanish:
  - había dicho estas palabras
  - había hablado estas cosas
  lexicon: HALOT
  rationale: «Palabras» refleja bien דְּבָרִים en este contexto y suena natural en español. El pluscuamperfecto expresa correctamente la anterioridad indicada por la estructura temporal del hebreo.
- source_word: אֶל אִיּוֹב
  english_pob_choice: to Job
  chosen_spanish: a Job
  alternatives_spanish:
  - para Job
  - con Job
  lexicon: HALOT
  rationale: La preposición española «a» reproduce de manera directa el destinatario del discurso sin añadir matices ajenos.
- source_word: אֱלִיפַז הַתֵּימָנִי
  english_pob_choice: Eliphaz the Temanite
  chosen_spanish: Elifaz el temanita
  alternatives_spanish:
  - Elifaz de Temán
  - Elifaz el de Temán
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado de forma habitual al español y el gentilicio tradicional «temanita», que es claro y compacto.
- source_word: חָרָה אַפִּי
  english_pob_choice: My anger burns
  chosen_spanish: Mi ira se enciende
  alternatives_spanish:
  - Mi ira arde
  - Mi enojo se enciende
  lexicon: HALOT
  rationale: La imagen hebrea de la ira encendida/ardiente se vierte de forma idiomática y digna. «Ira» mantiene el registro más solemne que «enojo» y preserva el valor metafórico del original.
- source_word: בְךָ וּבִשְׁנֵי רֵעֶיךָ
  english_pob_choice: against you and against your two friends
  chosen_spanish: contra ti y contra tus dos amigos
  alternatives_spanish:
  - contra ti y tus dos amigos
  - sobre ti y sobre tus dos amigos
  lexicon: HALOT
  rationale: El hebreo de חרה אַפִּי con esta construcción expresa dirección de la ira. En español, repetir «contra» hace explícita la hostilidad dirigida a los destinatarios y sigue la equivalencia funcional del inglés auditado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la ira divina de manera directa y natural en español.
- source_word: לֹא דִבַּרְתֶּם
  english_pob_choice: you have not spoken
  chosen_spanish: no habéis hablado
  alternatives_spanish:
  - no hablasteis
  - no han hablado
  lexicon: HALOT
  rationale: Se mantiene la negación del acto de hablar y un perfecto compuesto que suena solemne y natural en el discurso divino. La segunda persona plural conserva la dirección a Job y sus amigos.
- source_word: אֵלַי
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  - para mí
  lexicon: HALOT
  rationale: El inglés auditado adoptó «of me» por una mayor cercanía formal al hebreo, aunque reconoció la tensión semántica. En español, «de mí» preserva la correspondencia literal con אֵלַי y deja abierta la lectura contextual de contenido teológico sobre Yahvé.
- source_word: נְכוֹנָה
  english_pob_choice: rightly
  chosen_spanish: rectamente
  alternatives_spanish:
  - bien
  - correctamente
  - como es debido
  lexicon: HALOT
  rationale: «Rectamente» conserva la idea de lo correcto/ajustado del hebreo sin restringirla solo a exactitud factual. Además, armoniza con el registro moral y judicial del reproche divino.
- source_word: כְּעַבְדִּי אִיּוֹב
  english_pob_choice: as my servant Job has
  chosen_spanish: como mi siervo Job
  alternatives_spanish:
  - como mi esclavo Job
  - como Job, mi siervo
  lexicon: HALOT
  rationale: Se preserva el título relacional significativo «mi siervo», que en el discurso divino funciona como designación honorífica estable. En español, «siervo» es la forma más idiomática y reverente en este contexto; «esclavo» sonaría demasiado duro aquí sin una razón contextual adicional.
theological_decisions:
- issue: Alcance de אֵלַי en la evaluación divina
  english_pob_reading: of me
  chosen_spanish_reading: de mí
  alternative_spanish_readings:
  - sobre mí
  - acerca de mí
  - a mí
  rationale: La frase juzga el contenido de la كلامa de los amigos respecto de Yahvé. «De mí» conserva la cercanía literal del hebreo y evita fijar unilateralmente una sola paráfrasis contextual; en lectura, puede abarcar lo que dijeron sobre Yahvé, no solo a quién se dirigían.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de נְכוֹנָה en el veredicto divino
  english_pob_reading: rightly
  chosen_spanish_reading: rectamente
  alternative_spanish_readings:
  - correctamente
  - con verdad
  - como es debido
  rationale: «Rectamente» mantiene la tensión entre corrección, adecuación y rectitud moral/teológica. No reduce el juicio a mera precisión informativa ni lo convierte en una generalidad vaga.
  doctrine_reference: Translation philosophy §3
- issue: Rendición del título aplicado a Job
  english_pob_reading: my servant Job
  chosen_spanish_reading: mi siervo Job
  alternative_spanish_readings:
  - mi esclavo Job
  - Job, mi siervo
  rationale: El título marca la relación aprobada por Dios y es un elemento teológicamente cargado del libro. «Siervo» comunica esta relación en español de modo digno; «esclavo» sería más literal para δοῦλος/עֶבֶד en otros contextos, pero aquí no aporta mayor fidelidad comunicativa.
  doctrine_reference: Job 1:8; 2:3; 42:7-8
translation_notes:
  revision_awareness: El texto español sigue de cerca el estado más reciente del audit trail en inglés, especialmente la decisión de mantener una formulación más formal y cercana al hebreo para אֵלַי («de mí») en vez de una paráfrasis más interpretativa. También conserva la estructura narrativa y el juicio sobre la manera de hablar de los amigos, sin suavizar la referencia a la ira divina ni el título «mi siervo» aplicado a Job.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «mi siervo» para Job, evitando alternar con «siervo» sin posesivo o con «esclavo».
  - La expresión «de mí» se reserva aquí para reflejar el vínculo con el hebreo אֵלַי y la tensión documentada en el audio de inglés; no debe normalizarse automáticamente a «sobre mí» en pasajes cercanos sin reevaluación contextual.
  - El registro es bíblico-formal pero natural en español latinoamericano, evitando arcaísmos innecesarios como «Jehová» o «he aquí» cuando no son requeridos por la fuente.
