theological_decisions:
- issue: Identity of the 'new priest'
  chosen_reading: Translate generically as 'a new priest' without specifying Messiah, Christ, or a historical high priest in the main text.
  alternative_readings:
  - an eschatological priestly messiah
  - a Christianized reference to Jesus
  - an idealized renewed priesthood
  rationale: The Greek text presents a singular exalted priestly figure with cosmic and salvific traits, but the chapter's transmission history is complex. The translation should preserve the figure's grandeur without resolving the debated identification in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Bracketed expansions in vv. 5, 7, 9
  chosen_reading: Omit bracketed material from the main text and preserve it in footnotes as textual variants.
  alternative_readings:
  - include all bracketed material in the main text
  rationale: The source presentation marks these phrases as textually uncertain or secondary. Transparency is better served by noting them rather than silently incorporating them.
- issue: '''Spirit of holiness'' in v. 11'
  chosen_reading: Retain the phrase as 'the spirit of holiness' rather than capitalizing it as a fixed Trinitarian title.
  alternative_readings:
  - the Holy Spirit
  rationale: The Greek phrase can bear strong theological significance, but the translation should not force later doctrinal precision beyond the wording of the witness.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension.
