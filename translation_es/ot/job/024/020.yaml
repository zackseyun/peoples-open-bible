revisions:
- from: El vientre se olvida de él[a]; el gusano se deleita en él. Ya no se le recuerda[b], y la injusticia[c] se quiebra como un árbol.
  to: El vientre lo olvida; el gusano se alimenta dulcemente de él[a]. Ya no se le recuerda[b], y la injusticia se quiebra como un árbol[c].
  rationale: La revisión corrige el punto principal de fidelidad semántica en מְתָקוֹ/רִמָּה, alineando el español con la decisión auditada del POB de hacer explícita la imagen de alimento. También reordena las notas para que reflejen las alternativas realmente documentadas y pule la primera cláusula para un español más natural sin perder la imagen literal.
