base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/042/017.yaml
  text: The holy ones of God have not been sufficient to recount the wonders of the Lord[b][a]. God has strengthened his hosts to be strong before his glory.
  footnotes:
  - marker: a
    text: Masada appears to read 'has not comprehended' where the Cairo Geniza text reads 'have not been able/sufficed'; the Greek supports the sense 'have not been able to recount fully.'
    reason: textual_variant
  - marker: b
    text: 'The second clause varies in the Hebrew witnesses: Cairo Geniza reads ''God has strengthened his hosts,'' while Masada appears to read ''the Lord has strengthened in his lights/luminaries''; the Greek reads ''what the Lord Almighty established, for the whole to be made firm in his glory.'''
    reason: textual_variant
