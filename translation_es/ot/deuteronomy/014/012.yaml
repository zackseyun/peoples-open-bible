revisions:
- from: 'Y estos son los que no comerán de entre ellos: el águila[a], el quebrantahuesos y el buitre negro.'
  to: 'Y estos son los que no deben comer de entre ellos: el águila[a], el quebrantahuesos y el buitre negro.'
  rationale: Se ajusta la prohibición a un español más fiel y natural para un contexto legal ('no deben comer') y se pule la redacción de la nota sin cambiar su contenido auditado.
  reviewer_model: gpt-5.4
