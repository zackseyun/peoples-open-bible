review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del griego: Jesús responde preguntando si la afirmación de Pilato procede de él mismo o de otros. Sin embargo, la nota al pie está mal planteada: presenta como alternativa exactamente la misma expresión usada en el texto principal, en vez de preservar la alternativa más literal/documentada del griego («de ti mismo» / «desde ti mismo»).'
  spanish_quality_summary: El texto es claro, natural y digno en español. «Por tu propia cuenta» suena bien y refleja adecuadamente ἀπὸ σεαυτοῦ. «Jesús respondió» y «acerca de mí» también son plenamente legibles. El único problema real es de consistencia editorial en la nota, no de fluidez del texto.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. «Jesús» está correcto. Las decisiones léxicas principales respetan el análisis del POB: ἀπεκρίθη -> «respondió», Ἀπὸ σεαυτοῦ -> expresión de origen personal, περὶ ἐμοῦ -> «acerca de mí».'
  issues:
  - severity: medium
    issue: La nota al pie repite la misma frase del texto principal como si fuera una alternativa.
    rationale: 'El texto principal ya dice «por tu propia cuenta», pero la nota dice «O: “por tu propia cuenta”». Eso no preserva la alternativa léxica ni ayuda al lector. La nota debe reflejar la literalidad documentada del griego, por ejemplo «de ti mismo» o explicar «desde ti mismo».'
  - severity: low
    issue: La explicación de la nota puede sonar ligeramente rígida con «interrogando».
    rationale: Una formulación más natural en español bíblico moderno sería «preguntando si...» o «cuestionando si...», sin afectar el contenido.
  revised_spanish_text: 'Jesús respondió[a]: «¿Tú dices esto por tu propia cuenta, o te lo dijeron otros acerca de mí?»'
  revised_footnotes:
  - marker: a
    text: 'O: «de ti mismo». El griego dice literalmente «desde ti mismo», preguntando si la afirmación proviene de Pilato mismo.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y refleja bien el sentido de origen personal de ἀπὸ σεαυτοῦ. Solo se corrige la nota al pie para que ofrezca una alternativa real y documente adecuadamente la literalidad griega, en línea con la auditoría inglesa.
