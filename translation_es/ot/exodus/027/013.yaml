translation:
  language: es
  text: Y el ancho del atrio, en el lado oriental[a], hacia el oriente, será de cincuenta codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la anchura del atrio en el lado oriental, hacia donde sale el sol, cincuenta codos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרֹחַב
  english_pob_choice: And the width
  chosen_spanish: Y el ancho
  alternatives_spanish:
  - Y la anchura
  - Y el ancho de
  lexicon: HALOT
  rationale: רֹחַב expresa la medida transversal; en español, «ancho» es natural y conserva el valor dimensional. Mantengo la coordinación con «Y» para reflejar el estilo descriptivo de las instrucciones del tabernáculo.
- source_word: הֶחָצֵר
  english_pob_choice: of the court
  chosen_spanish: del atrio
  alternatives_spanish:
  - de la corte
  - del patio
  lexicon: HALOT
  rationale: En contexto cultual, חָצֵר se refiere al recinto exterior del santuario. «Atrio» es el equivalente tradicional y claro en español bíblico; evita la ambigüedad de «patio» y el uso no pertinente de «corte».
- source_word: לִפְאַת
  english_pob_choice: on the east side
  chosen_spanish: en el lado
  alternatives_spanish:
  - en la parte
  - al lado
  lexicon: HALOT
  rationale: פֵאָה indica lado, borde o flanco. La construcción española más natural en este contexto es «en el lado», que conserva la referencia espacial sin forzar una calca.
- source_word: קֵדְמָה
  english_pob_choice: east
  chosen_spanish: oriental
  alternatives_spanish:
  - del este
  - al oriente
  lexicon: HALOT
  rationale: El término señala la dirección del este. «Oriental» mantiene el valor direccional y funciona bien en una formulación de estilo bíblico en español.
- source_word: מִזְרָחָה
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia el amanecer
  alternatives_spanish:
  - hacia el oriente
  - hacia el este
  lexicon: HALOT
  rationale: מִזְרָח nombra el lugar del amanecer/east. «Hacia el amanecer» conserva la imagen hebrea del sol que sale y evita repetir simplemente «este», que ya está implícito en el miembro anterior.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  lexicon: HALOT
  rationale: Número cardinal directo sin dificultad de equivalencia.
- source_word: אַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos de medida
  lexicon: HALOT
  rationale: אַמָּה es la unidad lineal estándar. «Codos» es el término bíblico usual en español y preserva la medida sin conversión ni explicación ajena al texto.
translation_notes:
  revision_awareness: El inglés POB revisado mantiene alta concordancia con el hebreo y no presenta cambios textuales significativos; esta versión española sigue de cerca la estructura del original y conserva la duplicación direccional mediante una formulación idiomática en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se eligió «atrio» como término cultual estándar para חָצֵר, coherente con el registro bíblico en español.
  - Se mantuvo «codos» para la unidad de medida, sin convertirla a sistema métrico, por fidelidad al texto fuente.
