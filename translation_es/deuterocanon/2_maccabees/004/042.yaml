    text: Literally 'thicknesses of wood,' that is, heavy or thick wooden pieces.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'those around Lysimachus' likely refers to his accompanying men or supporters.
    reason: lexical_alternative
