    reason: alternative_reading
  revision_rationale: Se restituye en el texto principal la lectura apoyada por el hebreo suministrado ('casa de Sión') y se conserva la alternativa interpretativa en nota. También se corrige el anclaje de la nota léxica para que recaiga sobre el verbo pertinente.
