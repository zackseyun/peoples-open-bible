translation:
  language: es
  text: Sesan dio su hija a Jarha, su esclavo, como esposa[a]; y ella le dio un hijo, Attai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su siervo'. El hebreo עֶבֶד puede denotar tanto un siervo como un esclavo; aquí se usa 'esclavo' porque la condición dependiente de Jarha dentro de la casa de Sesan parece socialmente significativa en la narración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - dio en matrimonio
  lexicon: HALOT
  rationale: El hebreo נתן significa literalmente 'dar'. En este contexto matrimonial, 'dio' conserva la estructura breve del texto hebreo; 'dio en matrimonio' sería una expansión interpretativa que el original no exige.
- source_word: שֵׁשָׁן
  english_pob_choice: Sheshan
  chosen_spanish: Sesan
  alternatives_spanish:
  - Sheshan
  lexicon: transliteración estándar
  rationale: Nombre propio; en español se adapta la transliteración a una forma legible y consistente. Se evita añadir explicación al nombre.
- source_word: בִּתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  lexicon: HALOT
  rationale: Término filial directo con sufijo de tercera persona masculina singular. 'Su hija' es natural y fiel.
- source_word: לְיַרְחָע
  english_pob_choice: to Jarha
  chosen_spanish: a Jarha
  alternatives_spanish:
  - para Jarha
  lexicon: transliteración estándar
  rationale: El לְ marca el destinatario/beneficiario de la acción; en español 'a Jarha' expresa bien ese valor.
- source_word: עַבְדּוֹ
  english_pob_choice: his slave
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su servidor
  lexicon: HALOT
  rationale: עֶבֶד puede significar 'siervo' o 'esclavo'. Aquí se conserva 'esclavo' porque el texto destaca la condición dependiente de Jarha dentro de la casa de Sesan; esa fuerza social se atenúa con 'siervo'.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - para esposa
  lexicon: HALOT
  rationale: La expresión hebrea idiomática indica relación matrimonial. 'Como esposa' es natural en español y mantiene el sentido sin sobreexplicar.
- source_word: וַתֵּלֶד
  english_pob_choice: she bore
  chosen_spanish: ella le dio a luz
  alternatives_spanish:
  - ella dio a luz
  - parió
  lexicon: HALOT
  rationale: El verbo ילד en qal con sujeto femenino se usa en fórmulas genealógicas para 'dar a luz'. 'Le dio a luz' conserva la relación con el destinatario que sigue en el hebreo.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal con ל expresa el beneficiario/padre en la fórmula de nacimiento; en español el dativo 'le' es más fluido que repetir 'a él'.
- source_word: עַתָּי
  english_pob_choice: Attai
  chosen_spanish: Attai
  alternatives_spanish:
  - Attai
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado sin intento de traducción.
theological_decisions:
- issue: ¿'esclavo' o 'siervo' para עַבְדּוֹ?
  english_pob_reading: '''slave'' is used here because Jarha''s dependent status within Sheshan''s household appears to be socially significant in the narrative.'
  chosen_spanish_reading: '''esclavo'' se conserva para reflejar la dependencia doméstica y la carga social del término.'
  alternative_spanish_readings:
  - '''siervo'''
  - '''servidor'''
  rationale: La decisión sigue el valor léxico más fuerte cuando el contexto hace relevante la subordinación de Jarha. 'Siervo' podría suavizar indebidamente esa relación.
  doctrine_reference: DOCTRINE.md policy on δοῦλος / עֶבֶד
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión intermedia que cambió 'slave' a 'servant' por registro, seguida de una corrección de regresión que restauró 'slave'. La presente traducción sigue la lectura final restaurada y conserva la misma decisión léxica fuerte para עבד.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto cuando corresponda; este versículo no lo contiene.
  - Se conserva una transliteración estable de nombres propios, evitando normalizaciones innecesarias.
  - La sintaxis reproduce la secuencia genealógica breve del hebreo sin expandirla a 'dio en matrimonio'.
