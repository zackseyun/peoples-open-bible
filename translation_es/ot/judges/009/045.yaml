translation:
  language: es
  text: Y Abimélec luchó contra la ciudad todo aquel día[a], y capturó la ciudad y mató a la gente que estaba en ella. Luego derribó la ciudad y la sembró con sal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «atacó la ciudad». El verbo hebreo es literalmente «luchó» y, con la preposición usada aquí, probablemente indica acción militar contra la ciudad.'
    reason: lexical_alternative
  - marker: b
    text: «La sembró con sal» es un acto simbólico de devastación y maldición, que señala la ruina de la ciudad.
    reason: cultural_note
lexical_decisions:
- source_word: נִלְחָם בָּעִיר
  english_pob_choice: fought against the city
  chosen_spanish: luchó contra la ciudad
  alternatives_spanish:
  - peleó contra la ciudad
  - atacó la ciudad
  lexicon: HALOT
  rationale: El verbo לחם con ב en contexto bélico puede expresar combate hostil contra un objetivo. «Luchó contra la ciudad» conserva el valor verbal de combate sin convertirlo en una paráfrasis más interpretativa como «atacó». “Peleó” es posible, pero «luchó» suena más digno y natural en español bíblico moderno.
- source_word: כֹּל הַיּוֹם הַהוּא
  english_pob_choice: all that day
  chosen_spanish: todo aquel día
  alternatives_spanish:
  - todo el día
  - a lo largo de aquel día
  lexicon: HALOT
  rationale: La expresión idiomática marca duración completa en un día específico. «Todo aquel día» reproduce bien el énfasis temporal y mantiene la deíxis del original.
- source_word: וַיִּלְכֹּד
  english_pob_choice: he captured
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: En el contexto de tomar una ciudad, «tomó» comunica el hecho militar de manera natural en español. «Capturó» explicita más el matiz militar, pero «tomó» sigue siendo fiel y fluido; «se apoderó de» suena más idiomático pero algo más expansivo.
- source_word: הָעָם אֲשֶׁר בָּהּ
  english_pob_choice: the people who were in it
  chosen_spanish: el pueblo que estaba en ella
  alternatives_spanish:
  - la gente que estaba en ella
  - los habitantes que había en ella
  lexicon: HALOT
  rationale: עָם aquí designa a la población dentro de la ciudad. «El pueblo que estaba en ella» preserva el sustantivo colectivo sin forzar «habitantes», y la concordancia femenina «en ella» sigue el referente de la ciudad.
- source_word: הָרָג
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - hirió de muerte a
  - degolló
  lexicon: HALOT
  rationale: El verbo simplemente indica dar muerte. «Mató» es la equivalencia más clara y directa; evita arcaísmos como «mató/salle»? and no adds imagery beyond the Hebrew.
- source_word: וַיִּתֹּץ
  english_pob_choice: he tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - demolió
  - destruyó
  lexicon: HALOT
  rationale: נתץ suele referirse a derribar o demoler estructuras. «Derribó» es preciso y natural en español; «demolió» es posible, pero más técnico.
- source_word: וַיִּזְרָעֶהָ מֶלַח
  english_pob_choice: sowed it with salt
  chosen_spanish: la sembró con sal
  alternatives_spanish:
  - esparció sal sobre ella
  - la saló
  lexicon: HALOT
  rationale: Conviene conservar la imagen verbal de «sembrar» para mantener el gesto simbólico de devastación. «La sembró con sal» sigue de cerca el hebreo y preserva la fuerza figurativa; «esparció sal sobre ella» explica la acción pero pierde el paralelismo verbal.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en acuerdo alto con el audit trail inglés y sin necesidad de ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se preserva la imagen verbal de «sembró con sal» por su valor simbólico, en continuidad con el inglés auditado.
  - Se evita «SEÑOR» como sustituto teológico, y se conserva un español bíblico moderno sin arcaísmos innecesarios.
