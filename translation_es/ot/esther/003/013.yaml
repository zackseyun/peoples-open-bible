- from: Se enviaron cartas por medio de los corredores a todas las provincias del rey[a], para destruir, matar y aniquilar a todos los judíos, desde jóvenes hasta ancianos[c], niños y mujeres, en un solo día, el trece del duodécimo mes, es decir, el mes de Adar, y para apoderarse de sus bienes[d].
  to: Se enviaron cartas por mano de los mensajeros[a] a todas las provincias del rey, para destruir, matar y aniquilar[b] a todos los judíos, desde jóvenes hasta ancianos[c], niños y mujeres, en un solo día, el día trece del mes duodécimo, es decir, el mes de Adar, y para saquear sus bienes[d].
  rationale: Se ajustó ‘corredores’ a ‘mensajeros’ en el texto principal para evitar ambigüedad en español, preservando el literal en nota. Se añadió la nota sobre la intensificación de la tríada verbal, presente en la auditoría inglesa. Se reemplazó ‘apoderarse de sus bienes’ por ‘saquear sus bienes’ para reflejar el matiz de botín/despojo del hebreo. Se refinó levemente la fecha para mayor claridad y tono bíblico natural.
