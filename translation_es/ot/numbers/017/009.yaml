lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo דבר en esta fórmula narrativa introduce un acto de habla solemne; en español, "habló" conserva mejor la distinción con אמר y mantiene un registro natural y digno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino personal del texto hebreo con la forma recomendada por el proyecto en español: "Yahvé". Evita la sustitución por un título y mantiene la transparencia del Tetragrámaton.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso; en español, "a" expresa de forma natural y fiel la relación indirecta.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma castellana establecida y plenamente reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria funciona como enlace hacia el discurso directo; "diciendo" es la equivalencia idiomática natural y precisa en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa auditada preserva el nombre propio divino. En español, "Yahvé" es la forma coherente con la política del proyecto y conserva la referencia explícita al nombre revelado, sin convertirlo en un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado permanece estable y sin revisiones; no hay cambios aplicados en la pasada más reciente. La presente redacción española sigue directamente el hebreo, con el inglés usado como control de decisiones léxicas y teológicas.
  spanish_consistency_notes:
  - 'Se mantiene la distinción entre hablar y decir: "habló" para וַיְדַבֵּר y "diciendo" para לֵאמֹר.'
  - Se usa "Yahvé" de manera consistente con la terminología del proyecto para יְהוָה.
  - El orden y la puntuación reflejan la fórmula narrativa breve del hebreo sin añadir contenido interpretativo.
