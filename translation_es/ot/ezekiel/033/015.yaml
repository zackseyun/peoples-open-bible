    issue: '''paga lo que ha robado'' debilita la fuerza restitutiva de יְשַׁלֵּם'
    rationale: El pi'el יְשַׁלֵּם en este contexto legal no es solo 'pagar', sino reparar/restituir respecto de lo robado. En español, 'paga lo que ha robado' puede entenderse ambiguamente y no expresa con suficiente claridad la restitución de la pérdida.
  - severity: low
    issue: La nota b omite la alternativa más literal 'estatutos de la vida'
    rationale: Aunque la nota no es incorrecta, el inglés POB conserva alternativas que explican el sentido dador de vida. La nota española puede mantenerse; no es necesario cambiarla si el texto principal conserva la literalidad.
