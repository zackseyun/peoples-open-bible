translation:
  language: es
  text: 'Uno escribió[a]: «El vino es más fuerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El vino prevalece». El verbo griego puede denotar prevalecer o ser más fuerte/superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εἷς
  english_pob_choice: One
  chosen_spanish: Uno
  alternatives_spanish:
  - El uno
  - Uno de ellos
  lexicon: LSJ
  rationale: La expresión griega literalmente significa «el uno», pero en este contexto de respuesta competitiva funciona de modo indefinido y distributivo. «Uno» conserva esa indefinición con naturalidad en español y sigue de cerca la economía del griego.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - había escrito
  - inscribió
  lexicon: LSJ
  rationale: El aoristo de γράφω se traduce con un pasado simple. «Escribió» es la opción más directa y natural en español para un acto de escritura puntual.
- source_word: Ὑπερισχύει
  english_pob_choice: is stronger
  chosen_spanish: es más fuerte
  alternatives_spanish:
  - prevalece
  - es superior
  - lleva la ventaja
  lexicon: LSJ
  rationale: El verbo puede significar ser superior en fuerza o prevalecer. En esta formulación, el comparativo de fuerza es el valor más transparente y reproduce bien la comparación del griego.
- source_word: ὁ οἶνος
  english_pob_choice: Wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: LSJ
  rationale: Aunque el griego usa artículo, en español la frase queda más natural con artículo definido en una afirmación genérica. Mantiene el sustantivo común sin forzar una lectura especial.
translation_notes:
  revision_awareness: El borrador sigue la lectura griega directa de Swete (ὁ εἷς ἔγραψεν Ὑπερισχύει ὁ οἶνος) y mantiene la alternativa lexical que el audit trail inglés documenta para Ὑπερισχύει, sin introducir interpretación adicional.
  spanish_consistency_notes:
  - Se usa «vino» en minúscula por tratarse de un sustantivo común en una cita.
  - La puntuación con dos puntos y comillas angulares respeta el español editorial y separa claramente el habla citada.
  - Se mantiene el tono breve y sentencioso del original griego.
