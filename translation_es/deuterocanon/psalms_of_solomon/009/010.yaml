- from: Porque los juicios de Yahvé están en justicia, según cada hombre y casa[a][b][c].
  to: Porque los juicios de Yahvé están en justicia, según cada hombre y cada casa[a][b][c].
  rationale: Se ajusta el español para hacer explícito el valor distributivo en ambos miembros («cada hombre y cada casa») y se corrigen las notas para que sean idiomáticas y coherentes con la auditoría inglesa y la decisión de preservar δικαιοσύνη como sustantivo.
