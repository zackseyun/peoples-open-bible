translation:
  language: es
  text: Y lo que quede de la ofrenda de cereal[a] será para Aarón y para sus hijos, santísimo, de las ofrendas por fuego[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de la ofrenda vegetal».
    reason: lexical_alternative
  - marker: b
    text: O, «de las ofrendas hechas por fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתֶרֶת
  english_pob_choice: And what remains
  chosen_spanish: Y lo que quede
  alternatives_spanish:
  - Y el resto
  - Y lo que оста
  - Y lo restante
  lexicon: HALOT
  rationale: El hebreo funciona sustantivamente como ‘lo que queda/resta’. ‘Lo que quede’ conserva ese valor de remanente y suena natural en español legal-prescriptivo.
- source_word: מִן הַמִּנְחָה
  english_pob_choice: of the grain offering
  chosen_spanish: de la ofrenda de cereal
  alternatives_spanish:
  - de la ofrenda de grano
  - de la ofrenda vegetal
  - de la oblación
  lexicon: HALOT
  rationale: מִנְחָה en Levítico 2 designa la ofrenda de cereal/grano. ‘Cereal’ evita el matiz demasiado litúrgico de ‘oblación’ y conserva el sentido sacrificial concreto.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: shall be for Aaron and for his sons
  chosen_spanish: será para Aarón y para sus hijos
  alternatives_spanish:
  - pertenecerá a Aarón y a sus hijos
  - quedará para Aarón y para sus hijos
  lexicon: HALOT
  rationale: El lamed expresa asignación/posesión. ‘Será para’ reproduce la relación jurídica sin añadir una glosa innecesaria.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - muy santo
  - santo de santos
  - santidad de santidades
  lexicon: HALOT
  rationale: El superlativo hebreo se refleja bien con ‘santísimo’. Evita la expresión ambigua ‘santo de santos’ en este contexto, que podría sonar a un lugar en vez de una cualidad de la porción.
- source_word: מֵאִשֵּׁי
  english_pob_choice: from the food offerings
  chosen_spanish: de las ofrendas encendidas
  alternatives_spanish:
  - de las ofrendas hechas por fuego
  - de las ofrendas por fuego
  - de las ofrendas encendidas al fuego
  lexicon: HALOT
  rationale: אִשֶּׁה alude a ofrendas presentadas por fuego. ‘Ofrendas encendidas’ preserva el elemento ígneo sin introducir ‘comida’ en español, que podría ser malentendido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino en transliteración según la directriz del proyecto: ‘Yahvé’, en vez de sustituirlo por un título.'
theological_decisions:
- issue: Sentido cultual de אִשֵּׁי יְהוָה
  english_pob_reading: from the food offerings of Yahweh
  chosen_spanish_reading: de las ofrendas encendidas de Yahvé
  alternative_spanish_readings:
  - de las ofrendas hechas por fuego de Yahvé
  - de las ofrendas por fuego de Yahvé
  - de las ofrendas de comida de Yahvé
  rationale: En el contexto levítico, el hebreo se refiere a ofrendas entregadas por fuego en honor de Yahvé. ‘Ofrendas encendidas’ conserva el componente sacrificial y evita la posible confusión de ‘ofrendas de comida’ en español.
  doctrine_reference: Levítico 2:1-16; traducción del vocabulario sacrificial
- issue: Valor superlativo de קֹדֶשׁ קָדָשִׁים
  english_pob_reading: most holy
  chosen_spanish_reading: santísimo
  alternative_spanish_readings:
  - sumamente santo
  - santo en extremo
  - santo de santos
  rationale: El hebreo expresa grado máximo de santidad, no una cualidad genérica. ‘Santísimo’ mantiene el valor intensivo sin trasladar indebidamente la frase a un nombre de lugar.
  doctrine_reference: Éxodo 29:37; Levítico 6:17
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó ‘a’ y ‘portion’ para ceñirse más al hebreo; por eso el español evita añadir artículo indefinido o sustantivo equivalente y mantiene una estructura breve: ‘santísimo’. También se preserva la referencia directa al nombre divino, conforme al criterio actualizado de renderizar יְהוָה como Yahvé.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió ‘ofrenda de cereal’ como equivalente principal de מִנְחָה en este contexto sacrificial.
  - ‘Santísimo’ reproduce el superlativo hebreo sin añadir elementos explicativos no presentes en el texto.
  - La nota al pie conserva una alternativa legítima para מִנְחָה, dada la oscilación semántica entre ‘cereal’ y ‘vegetal’ en español bíblico.
