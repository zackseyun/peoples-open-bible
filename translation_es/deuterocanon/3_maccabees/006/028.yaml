translation:
  language: es
  text: Liberen a los hijos[a] del Dios todopoderoso, celestial, Dios viviente, que desde el tiempo de nuestros antepasados hasta ahora ha otorgado a nuestros asuntos estabilidad sin impedimento[b] con gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dejen libres a los hijos del Dios todopoderoso, celestial, Dios viviente». El griego dice literalmente «hijos»; en español, «hijos» preserva de manera natural la referencia filial masculina del original.
    reason: lexical_alternative
  - marker: b
    text: «Sin impedimento» traduce el sentido de ἀπαραπόδιστον; también puede entenderse como «sin obstáculo» o «sin estorbo». La expresión describe una estabilidad no entorpecida en los asuntos del reino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολύσατε
  english_pob_choice: Release
  chosen_spanish: Liberen
  alternatives_spanish:
  - Dejen libres
  - Suelten
  lexicon: LSJ
  rationale: El imperativo plural pide una liberación inmediata. «Liberen» conserva la fuerza directiva y suena natural en español moderno sin añadir matices ajenos al mandato.
- source_word: τοὺς υἱοὺς
  english_pob_choice: the sons
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos varones
  - los hijos
  lexicon: LSJ
  rationale: Aunque el inglés POB preservó «sons» por precisión de género, en español «hijos» funciona como equivalente idiomático y puede abarcar la filiación masculina sin sonar rígido. Se conserva la referencia filial explícita del griego.
- source_word: τοῦ παντοκράτορος
  english_pob_choice: the almighty
  chosen_spanish: el Dios todopoderoso
  alternatives_spanish:
  - el Todopoderoso
  - el Dios omnipotente
  lexicon: LSJ
  rationale: Παντοκράτωρ es un título divino establecido. En español, «Dios todopoderoso» comunica de forma fiel y reverente el valor titulario, manteniendo el referente explícito a Dios.
- source_word: ἐπουρανίου
  english_pob_choice: heavenly
  chosen_spanish: celestial
  alternatives_spanish:
  - celestial
  - del cielo
  lexicon: LSJ
  rationale: El adjetivo modifica a Dios dentro de una cadena de títulos. «Celestial» refleja bien el matiz y evita una redundancia pesada con «del cielo» en la serie atributiva.
- source_word: θεοῦ ζῶντος
  english_pob_choice: living God
  chosen_spanish: viviente
  alternatives_spanish:
  - Dios viviente
  - que vive
  lexicon: LSJ
  rationale: La combinación se integra en español como una cadena de atributos. «Viviente» preserva el participio griego y mantiene el tono solemne; el sentido completo queda en el sintagma anterior con «Dios».
- source_word: ἀφʼ ἡμετέρων μέχρι τοῦ νῦν προγόνων
  english_pob_choice: from the time of our forefathers until now
  chosen_spanish: desde el tiempo de nuestros antepasados hasta ahora
  alternatives_spanish:
  - desde nuestros antepasados hasta ahora
  - desde el tiempo de nuestros padres hasta ahora
  lexicon: LSJ
  rationale: La frase griega expresa continuidad temporal desde los antepasados hasta el presente. «Nuestros antepasados» es natural en español y suficientemente formal; «hasta ahora» reproduce la continuidad hasta el momento actual.
- source_word: ἀπαραπόδιστον
  english_pob_choice: unimpeded
  chosen_spanish: sin tropiezo
  alternatives_spanish:
  - sin impedimento
  - sin obstáculo
  lexicon: LSJ
  rationale: El adjetivo señala algo no obstruido. «Sin tropiezo» mantiene la idea de ausencia de estorbo con una cadencia idiomática en español; las otras opciones quedan como equivalentes literales.
- source_word: εὐστάθειαν
  english_pob_choice: stability
  chosen_spanish: estabilidad
  alternatives_spanish:
  - seguridad firme
  - solidez
  lexicon: LSJ
  rationale: El núcleo semántico es firmeza/estabilidad. «Estabilidad» es la mejor correspondencia en este contexto de los asuntos del pueblo/estado.
- source_word: μετὰ δόξης
  english_pob_choice: with glory
  chosen_spanish: con gloria
  alternatives_spanish:
  - gloriosamente
  - con honor
  lexicon: LSJ
  rationale: Se conserva la construcción preposicional para no suavizarla en adverbio. «Con gloria» reproduce directamente el valor formal y honorífico del griego.
- source_word: προφέρει
  english_pob_choice: has granted
  chosen_spanish: ha otorgado
  alternatives_spanish:
  - ha concedido
  - ha procurado
  - ha traído
  lexicon: LSJ
  rationale: El contexto describe la acción benevolente y continuada de Dios hacia los asuntos del pueblo. «Ha otorgado» refleja bien la idea de conceder/proveer y suena natural en español culto.
- source_word: τοῖς ἡμετέροις πράγμασιν
  english_pob_choice: to our affairs
  chosen_spanish: a nuestros asuntos
  alternatives_spanish:
  - a nuestras cosas
  - a nuestro estado
  - a nuestros negocios
  lexicon: LSJ
  rationale: 'Πράγματα es amplio: asuntos, cuestiones, negocios públicos. «Nuestros asuntos» preserva esa amplitud sin restringirlo indebidamente a «reino» o «estado».'
theological_decisions:
- issue: 'Cadena de títulos divinos: παντοκράτορος ἐπουρανίου θεοῦ ζῶντος'
  english_pob_reading: the almighty, heavenly, living God
  chosen_spanish_reading: el Dios todopoderoso, celestial, viviente
  alternative_spanish_readings:
  - el Dios todopoderoso, del cielo, viviente
  - el Todopoderoso celestial, Dios viviente
  rationale: El griego acumula descriptores sin conjunciones. La versión española conserva esa acumulación y evita fusionar los títulos de modo que se pierda alguno de sus matices. No se oculta el nombre divino con una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source distinctions'
- issue: Filiación masculina de υἱοὺς
  english_pob_reading: the sons
  chosen_spanish_reading: los hijos
  alternative_spanish_readings:
  - los hijos varones
  - los hijos
  rationale: Aunque el griego es explícitamente masculino, en español «hijos» es el equivalente natural y puede funcionar como término filial masculino sin alterar el sentido. Se conserva la referencia a los varones del grupo sin forzar una formulación poco idiomática.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: ἀπαραπόδιστον εὐστάθειαν μετὰ δόξης
  english_pob_reading: unimpeded stability with glory
  chosen_spanish_reading: estabilidad sin tropiezo con gloria
  alternative_spanish_readings:
  - estabilidad sin impedimento con gloria
  - seguridad firme con gloria
  rationale: La frase combina firmeza, ausencia de obstáculo y honor. «Sin tropiezo» comunica la ausencia de impedimento de manera idiomática, mientras «estabilidad» y «con gloria» mantienen el resto de la carga semántica.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension where present'
translation_notes:
  revision_awareness: El inglés auditado pasó de «has brought» a «has granted», y de «ancestors» a «forefathers» para reflejar mejor el griego y un registro más formal. La redacción española sigue esa revisión en sentido, usando «ha otorgado» y una referencia temporal formal a «nuestros antepasados», sin depender mecánicamente del inglés base.
  spanish_consistency_notes:
  - Se mantiene el registro reverente y formal sin recurrir a una sustitución litúrgica de Yahvé, porque el texto griego aquí usa θεοῦ y no el nombre divino.
  - Se preserva la estructura acumulativa de títulos divinos para respetar el estilo del original.
  - «Nuestros asuntos» conserva la amplitud de πράγματα y evita interpretar indebidamente el ámbito político como «reino».
