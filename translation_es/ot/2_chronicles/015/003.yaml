translation:
  language: es
  text: Durante muchos días Israel estuvo sin el Dios verdadero[a], sin un sacerdote que enseñara[b], y sin la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin un Dios verdadero» o «sin el Dios de la verdad».
    reason: lexical_alternative
  - marker: b
    text: O «sin un sacerdote que instruyera»; el hebreo מוֹרֶה expresa la función de enseñar o instruir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יָמִים רַבִּים
  english_pob_choice: For many days
  chosen_spanish: Porque durante muchos días
  alternatives_spanish:
  - Y durante muchos días
  - Durante muchos días
  lexicon: WLC / HALOT
  rationale: La frase introduce duración temporal; en español, «durante muchos días» transmite de forma natural el alcance idiomático. Añadí «Porque» para reflejar la conexión discursiva del contexto inmediato en español fluido.
- source_word: לְ/יִשְׂרָאֵל
  english_pob_choice: Israel was
  chosen_spanish: Israel estuvo
  alternatives_spanish:
  - Israel había estado
  - para Israel
  lexicon: WLC / HALOT
  rationale: El hebreo usa una construcción relacional que en español pide un verbo copulativo/estativo. «Estuvo» comunica bien la situación de carencia en un marco durativo.
- source_word: לְ/לֹא אֱלֹהֵי אֱמֶת
  english_pob_choice: without the true God
  chosen_spanish: sin el Dios verdadero
  alternatives_spanish:
  - sin un Dios verdadero
  - sin el Dios de verdad
  - sin un Dios de la verdad
  lexicon: WLC / HALOT
  rationale: Aun cuando el hebreo permite «Dios de verdad» o «verdadero Dios», en español «el Dios verdadero» es la forma más natural y fiel al valor atributivo de אֱמֶת. Mantiene la idea de autenticidad/reliabilidad, no solo de cualidad moral abstracta.
- source_word: אֱמֶת
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - de verdad
  - fiel
  - de verdad / verdadero
  lexicon: HALOT
  rationale: En este sintagma, אֱמֶת funciona casi adjetivalmente. «Verdadero» conserva la fuerza de genuinidad frente a lo falso y evita restringir el sentido a «fiel» sin una base contextual más fuerte.
- source_word: וּ/לְ/לֹא כֹּהֵן מוֹרֶה
  english_pob_choice: without a teaching priest
  chosen_spanish: sin un sacerdote que enseñara
  alternatives_spanish:
  - sin un sacerdote que instruyera
  - sin un sacerdote maestro
  - sin un sacerdote docente
  lexicon: WLC / HALOT
  rationale: 'מוֹרֶה es participial y señala función habitual: enseñar/instruir. Elegí una relativa en español para expresar de manera natural esa función, sin añadir más contenido del que el hebreo exige.'
- source_word: מוֹרֶה
  english_pob_choice: teaching
  chosen_spanish: que enseñara
  alternatives_spanish:
  - que instruyera
  - enseñador
  lexicon: HALOT
  rationale: El participio de ירה expresa la acción de enseñar o instruir. «Enseñara» suena más natural y dignificado que un adjetivo rígido, y mantiene la referencia al rol sacerdotal.
- source_word: וּ/לְ/לֹא תוֹרָה
  english_pob_choice: without the law
  chosen_spanish: sin la ley
  alternatives_spanish:
  - sin instrucción
  - sin enseñanza
  - sin la instrucción
  lexicon: HALOT
  rationale: La revisión inglesa volvió a «the law» para reflejar con más precisión תוֹרָה. En español, «la ley» es la equivalencia más directa y conservadora en este contexto, aunque el término puede abarcar instrucción/enseñanza según el trasfondo bíblico.
theological_decisions:
- issue: Alcance de תוֹרָה
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  - la instrucción
  rationale: El contexto admite el campo semántico amplio de תוֹרָה, pero la decisión de la revisión inglesa favorece la equivalencia más directa. «La ley» preserva el registro tradicional y la referencia al cuerpo normativo/instructivo de Yahvé sin diluir la conexión léxica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identidad de אֱלֹהֵי אֱמֶת
  english_pob_reading: the true God
  chosen_spanish_reading: el Dios verdadero
  alternative_spanish_readings:
  - un Dios verdadero
  - el Dios de verdad
  rationale: El pasaje describe la privación de Israel respecto del Dios del pacto; por eso el artículo definido en español comunica mejor el referente concreto. «El Dios verdadero» mantiene la afirmación de autenticidad frente a los dioses falsos implícitos.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: el inglés POB volvió de «instruction» a «the law» para תוֹרָה. Por eso el español opta por «la ley», manteniendo la correspondencia léxica y el registro formal, mientras conserva «sacerdote que enseñara» para reflejar el valor participial de מוֹרֶה.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece el tetragrámaton en la forma del versículo, por lo que no se introduce en el texto.
  - Conservé «ley» como término bíblico tradicional por la revisión auditada, pero no lo convertí en paráfrasis doctrinal más amplia.
  - La estructura con «sin... sin... y sin...» preserva la triple carencia del hebreo.
