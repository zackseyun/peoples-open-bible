  text: 'And their dead bodies lie in the street of the great city[a], which is spiritually called Sodom and Egypt[c][b], where also their Lord was crucified.'
  footnotes:
  - marker: a
    text: Or 'figuratively called Sodom and Egypt.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'dead body' likely treats the two witnesses as a unit; some translations render 'dead bodies' for smoother English.
    reason: alternative_reading
  - marker: c
    text: The phrase 'where also their Lord was crucified' points to Jerusalem, though the text retains the symbolic title 'the great city.'
    reason: cross_reference
