translation:
  language: es
  text: Moab[a] está devastada, y sus ciudades han subido; lo mejor de sus jóvenes ha bajado a la matanza, declara el Rey[b], cuyo nombre es Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y uno ha subido contra sus ciudades»; el hebreo es breve y puede aludir a una fuerza atacante que avanza contra las ciudades de Moab.'
    reason: alternative_reading
  - marker: b
    text: 'Tradicional: «el SEÑOR de los ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁדַּד
  english_pob_choice: is devastated
  chosen_spanish: está devastada
  alternatives_spanish:
  - está despojada
  - está destruida
  lexicon: HALOT
  rationale: El pasivo de שׁדד expresa ruina violenta o devastación. «Está devastada» comunica bien el resultado pasivo sin restringirlo solo al saqueo, y encaja con el tono profético en español.
- source_word: וְעָרֶיהָ עָלָה
  english_pob_choice: and her cities have gone up
  chosen_spanish: y sus ciudades han subido
  alternatives_spanish:
  - y uno ha subido contra sus ciudades
  - y sus ciudades han sido atacadas
  lexicon: HALOT
  rationale: La construcción hebrea es breve y algo abrupta. Mantengo «han subido» para conservar el verbo עָלָה y su posible matiz militar, sin forzar en el texto principal un sujeto implícito que el hebreo no explicita.
- source_word: מִבְחַר
  english_pob_choice: the choicest
  chosen_spanish: los más escogidos
  alternatives_spanish:
  - los mejores
  - los escogidos
  lexicon: HALOT
  rationale: El sustantivo señala lo selecto o escogido. «Los más escogidos» reproduce la idea superlativa y funciona de manera natural con el grupo siguiente en español.
- source_word: בַּחוּרָיו
  english_pob_choice: her young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachos
  - sus jóvenes varones
  lexicon: HALOT
  rationale: Aunque la morfología apunta a sufijo masculino, el contexto personifica a Moab como entidad femenina. En español, «sus jóvenes» conserva esa referencia nacional-personificada sin sobrecargar con una precisión de género que el contexto no exige.
- source_word: יָרְדוּ לַטָּבַח
  english_pob_choice: have gone down to the slaughter
  chosen_spanish: han bajado a la matanza
  alternatives_spanish:
  - han descendido a la matanza
  - han bajado para la matanza
  lexicon: HALOT
  rationale: «Han bajado» mantiene la metáfora de movimiento descendente. «Matanza» es un equivalente idiomático claro de טבח y preserva el sentido de muerte violenta en español bíblico sin sonar arcaizante.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Declara» es preciso, solemne y natural en español moderno; conserva el valor de declaración autorizada sin introducir perífrasis innecesarias.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: Aquí funciona como título divino, en coordinación con el nombre de Yahvé. La mayúscula ayuda a marcar ese valor titular en español, como en la solución inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Sigo el estándar del proyecto para el Tetragrámaton: «Yahvé». Preserva el nombre propio divino en vez de sustituirlo por un título.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» comunica con claridad el valor marcial y cósmico del título. Uso mayúscula inicial en «Ejércitos» al formar parte del título divino.
- source_word: שְׁמוֹ
  english_pob_choice: whose name is
  chosen_spanish: cuyo nombre es
  alternatives_spanish:
  - y su nombre es
  - de quien el nombre es
  lexicon: HALOT
  rationale: El español requiere una relación más natural que la mera yuxtaposición nominal. «Cuyo nombre es» preserva la función appositiva del hebreo y la conexión con el título previo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה in the title יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahveh de los Ejércitos
  - el SEÑOR de los ejércitos
  rationale: El hebreo usa explícitamente el Tetragrámaton, por lo que no debe ocultarse tras un sustituto. «Yahvé» conserva el nombre revelado de Dios; «de los Ejércitos» transmite el título compuesto de forma transparente y reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones aplicadas y el resumen de revisión indica alta concordancia; por eso la versión española sigue de cerca las decisiones ya estabilizadas, conservando la ambigüedad de וְעָרֶיהָ עָלָה en una nota en vez de resolverla dentro del texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «Ejércitos» con mayúscula solo dentro del título divino, no como sustantivo común.
  - «Matanza» conserva el valor fuerte de טבח sin introducir una paráfrasis explicativa.
  - La personificación femenina de Moab se refleja en «devastada» y «sus ciudades».
