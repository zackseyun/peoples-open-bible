  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Fosa' es aceptable para שחת con nota alternativa; 'sangre' con nota sobre 'derramamiento de sangre / culpa de sangre' está bien. La principal corrección es de fidelidad semántica y sintáctica, no de glosario.
