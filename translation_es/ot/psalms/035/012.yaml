translation:
  language: es
  text: Ellos me pagan mal por bien, duelo[a] para mi alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pérdida devastadora». El hebreo שְׁכוֹל denota bereavement, es decir, una pérdida de tipo doloroso y arrasador; aquí se usa de manera figurada para la condición interior del salmista.
    reason: lexical_alternative
  - marker: b
    text: O «para mi vida» o «para mí». El hebreo נֶפֶשׁ (nephesh) puede significar «alma», «vida» o la persona misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁלְּמ֣וּ/נִי
  english_pob_choice: They repay me
  chosen_spanish: Ellos me pagan
  alternatives_spanish:
  - Ellos me recompensan
  - Ellos me retribuyen
  lexicon: HALOT
  rationale: El piel de שׁלם expresa la idea de retribuir o pagar en devolución. «Me pagan» suena natural en español y conserva la reciprocidad hostil del contexto sin suavizarla.
- source_word: רָ֭עָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  lexicon: HALOT
  rationale: El sustantivo puede abarcar mal moral o daño. «Mal» mantiene la brevedad poética del hebreo y permite abarcar ambas cargas semánticas sin forzar una sola.
- source_word: תַּ֥חַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  lexicon: HALOT
  rationale: La preposición marca intercambio o retribución. En español, «por» reproduce de manera idiomática la relación de correspondencia en «mal por bien».
- source_word: טוֹבָ֗ה
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bondad
  - beneficio
  lexicon: HALOT
  rationale: Aquí «bien» funciona mejor que «bondad» o «beneficio» porque conserva el paralelismo fijo «mal por bien» y refleja la forma compacta del hebreo.
- source_word: שְׁכ֣וֹל
  english_pob_choice: bereavement
  chosen_spanish: desolación
  alternatives_spanish:
  - duelo
  - privación
  - bereavimiento
  lexicon: HALOT
  rationale: El término puede significar pérdida devastadora, a menudo duelo por hijos, pero en este contexto funciona como un sustantivo de resultado. «Desolación» comunica el golpe interno y la ruina afectiva sin añadir una especificación no explícita.
- source_word: לְ/נַפְשִֽׁ/י
  english_pob_choice: for my soul
  chosen_spanish: para mi alma
  alternatives_spanish:
  - a mi alma
  - para mi vida
  - para mí
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o ser. «Mi alma» preserva la imagen poética y el peso interior del hebreo; «para» mantiene la relación de afectación con el sustantivo anterior.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en לְנַפְשִׁי
  english_pob_reading: for my soul, with lexical note that nephesh can mean soul, life, or self
  chosen_spanish_reading: para mi alma, con la misma amplitud posible de alma/vida/yo
  alternative_spanish_readings:
  - para mi vida
  - para mí
  rationale: No se debe reducir נֶפֶשׁ a una sola equivalencia. «Alma» preserva el lenguaje bíblico y permite anotar que también puede aludir a vida o a la persona entera.
  doctrine_reference: Antropología bíblica; uso semántico de נֶפֶשׁ en poesía hebrea
translation_notes:
  revision_awareness: El texto español sigue la revisión que devuelve la segunda cola a una frase nominal compacta, no a una oración verbal. Por eso se evita una paráfrasis como «mi alma está desolada» y se conserva la estructura breve del hebreo mediante «desolación para mi alma».
  spanish_consistency_notes:
  - Se mantiene «mal por bien» como fórmula transparente y bíblicamente reconocible, sin sustituirla por una expresión más explicativa.
  - Se usa «alma» para נֶפֶשׁ por coherencia con el registro bíblico, aunque la nota reconoce la amplitud semántica de vida/yo.
  - No se introduce «Señor» ni otras terminologías ajenas al verso, y no hay mención directa de nombres divinos en este pasaje.
  - «Desolación para mi alma» conserva el sustantivo de resultado y evita convertir la cola en una cláusula verbal, en línea con la revisión auditada.
