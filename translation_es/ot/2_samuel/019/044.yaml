translation:
  language: es
  text: 'Entonces el hombre de Israel respondió al hombre de Judá y dijo[a]: «Yo tengo diez porciones en el rey, y también en David tengo más que tú[b]. ¿Por qué, pues, me trataste con desprecio? ¿No fue mi palabra la primera[c] en hacer volver a mi rey? Pero la palabra de los hombres de Judá fue más dura[d] que la palabra de los hombres de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «diez manos para mí en el rey», un modismo que significa diez porciones o partes; probablemente alude al reclamo de las diez tribus del norte frente a Judá.'
    reason: cultural_note
  - marker: b
    text: 'O: «también en David tengo un reclamo mayor que tú». El hebreo es elíptico, pero expresa una comparación de derecho o participación.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «¿No fue mi propuesta la primera en hacer volver a mi rey?».'
    reason: alternative_reading
  - marker: d
    text: 'O: «la palabra de los hombres de Judá fue más fuerte / más feroz que la palabra de los hombres de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ יִשְׂרָאֵל / אִישׁ יְהוּדָה
  english_pob_choice: the man of Israel / the man of Judah
  chosen_spanish: el hombre de Israel / el hombre de Judá
  alternatives_spanish:
  - los hombres de Israel / los hombres de Judá
  - un israelita / un hombre de Judá
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular representativo en el diálogo. Mantener el singular en español conserva la forma del intercambio, aunque el cierre tenga valor colectivo.
- source_word: עֶשֶׂר יָדוֹת לִי בַמֶּלֶךְ
  english_pob_choice: I have ten shares in the king
  chosen_spanish: Yo tengo diez porciones en el rey
  alternatives_spanish:
  - Yo tengo diez partes en el rey
  - Yo tengo diez manos en el rey
  lexicon: HALOT
  rationale: יָדוֹת es literalmente “manos”, pero aquí funciona como idiomático para porciones o reclamos. “Porciones” comunica la idea de participación/pretensión sin volver opaco el dicho.
- source_word: וְגַם בְּדָוִד אֲנִי מִמְּךָ
  english_pob_choice: and in David also I have more than you
  chosen_spanish: y también en David tengo más que tú
  alternatives_spanish:
  - y aun en David soy más que tú
  - y también tengo mayor reclamo en David que tú
  lexicon: HALOT
  rationale: La construcción es elíptica y comparativa. En español, “tengo más que tú” conserva la comparación implícita de manera natural, sin atribuir una superioridad personal que el contexto no exige.
- source_word: הֱקִלֹּתַנִי
  english_pob_choice: did you treat me lightly
  chosen_spanish: me trataste con ligereza
  alternatives_spanish:
  - me menospreciaste
  - me hiciste de menos
  - me deshonraste
  lexicon: HALOT
  rationale: El causativo de קלל expresa tratar como insignificante o ligero. “Con ligereza” preserva el matiz de menosprecio sin intensificarlo innecesariamente a “deshonrar”.
- source_word: וְלֹא הָיָה דְבָרִי רִאשׁוֹן לִי לְהָשִׁיב אֶת מַלְכִּי
  english_pob_choice: Was not my word first in bringing back my king?
  chosen_spanish: ¿No fue mi palabra la primera en hacer volver a mi rey?
  alternatives_spanish:
  - ¿No fue mi propuesta la primera en hacer volver a mi rey?
  - ¿No hablé yo primero para hacer volver a mi rey?
  lexicon: HALOT
  rationale: דָבָר puede significar palabra, asunto o propuesta. “Mi palabra” conserva el sustantivo hebreo y “la primera” refleja la prioridad reclamada en la acción de traer de vuelta al rey.
- source_word: מַלְכִּי
  english_pob_choice: my king
  chosen_spanish: mi rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El sufijo de primera persona singular es retóricamente importante y expresa pertenencia/allegamiento. Debe conservarse en español.
- source_word: וַיִּקֶשׁ דְּבַר אִישׁ יְהוּדָה מִדְּבַר אִישׁ יִשְׂרָאֵל
  english_pob_choice: the word of the men of Judah was harsher than the word of the men of Israel
  chosen_spanish: la palabra del hombre de Judá fue más dura que la palabra del hombre de Israel
  alternatives_spanish:
  - la palabra de los hombres de Judá fue más dura que la palabra de los hombres de Israel
  - los de Judá hablaron con más dureza que los de Israel
  lexicon: HALOT
  rationale: קשׁה expresa severidad o dureza. En el resumen final, el hebreo singular tiene sentido colectivo; “el hombre de Judá / de Israel” mantiene la simetría del original, y “más dura” reproduce el contraste semántico.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios sustantivos; la versión española conserva el singular representativo, el modismo de las “porciones” y la comparación elíptica con ajuste idiomático natural en español.
  spanish_consistency_notes:
  - Se usa “Yahvé” en este proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se conserva “mi rey” para reproducir el matiz posesivo del hebreo.
  - “Palabra” traduce דָבָר de modo consistente como enunciado/propuesta, no como mero sonido verbal.
  - El singular representativo (“el hombre de…”) se mantiene también en el cierre para reflejar la forma hebrea del verso.
