translation:
  language: es
  text: Y si estos tres hombres estuvieran en medio de ella[a], vivo yo, declara el Señor Yahvé, no librarían hijos ni hijas[b]; ellos solos serían librados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en su interior» o «en medio de ella».'
    reason: lexical_alternative
  - marker: b
    text: O «no rescatarían ...; ellos solos serían salvados»; el verbo hebreo puede significar «librar», «rescatar» o «salvar», pero aquí se refiere a escapar del juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁלֹשֶׁת
  english_pob_choice: And if these three
  chosen_spanish: Y si estos tres
  alternatives_spanish:
  - Y estos tres
  - Aun si estos tres
  lexicon: HALOT
  rationale: El hebreo introduce aquí una continuación de la hipótesis repetida en el contexto. En español, «Y si» comunica bien la fuerza condicional implícita sin volverlo más literal de lo que pide la sintaxis.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: men
  chosen_spanish: estos tres hombres
  alternatives_spanish:
  - estas tres personas
  - estos tres
  lexicon: HALOT
  rationale: אֲנָשִׁים es el plural normal de «hombres». Dado el contexto de Noé, Daniel y Job, «hombres» conserva el rasgo masculino del original y la referencia concreta.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in its midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - dentro de ella
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «En medio de ella» es fiel, pero en español «en medio de ella» / «en medio de ella» resulta algo pesado; «en medio de ella» se mantiene en la versión final con una formulación natural en español bíblico. La referencia es a la entidad bajo juicio en el contexto.
- source_word: חַי אָנִי
  english_pob_choice: as I live
  chosen_spanish: vivo yo
  alternatives_spanish:
  - tan cierto como que yo vivo
  - por mi vida
  lexicon: HALOT
  rationale: Es la fórmula solemne de juramento divino. «Vivo yo» conserva el tono bíblico y la fuerza performativa del original sin añadir contenido.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética נְאֻם como «declara». Para אֲדֹנָי יְהוִה se usa «Señor Yahvé» conforme al criterio del proyecto para preservar el nombre divino y evitar la máscara convencional «SEÑOR».
- source_word: לֹא יַצִּילוּ
  english_pob_choice: they would not deliver
  chosen_spanish: no salvarían
  alternatives_spanish:
  - no librarían
  - no rescatarían
  lexicon: HALOT
  rationale: El verbo נצל puede abarcar «librar, rescatar, salvar». En este contexto de juicio, «salvarían» conserva la idea de preservación de una manera natural en español, sin perder la tensión de escape del castigo.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons or daughters
  chosen_spanish: a hijos ni a hijas
  alternatives_spanish:
  - a hijos e hijas
  - a niños ni niñas
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambos sexos. Después de una negación, «ni ... ni ...» reproduce bien la estructura negativa del español y conserva el paralelismo de la pareja sexual del original.
- source_word: לְבַדָּם
  english_pob_choice: alone
  chosen_spanish: ellos solos
  alternatives_spanish:
  - solamente ellos
  - solo ellos
  lexicon: HALOT
  rationale: El término enfatiza exclusividad. «Ellos solos» es natural en español y deja claro que la liberación no se extiende a otros.
- source_word: יִנָּצֵלוּ
  english_pob_choice: would be delivered
  chosen_spanish: serían librados
  alternatives_spanish:
  - serían salvados
  - escaparían
  lexicon: HALOT
  rationale: Se conserva la conexión léxica con la primera cláusula y el matiz de quedar a salvo de juicio. «Librados» es un equivalente bíblico claro sin volverse doctrinalmente excesivo.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - el Señor, Yahvé
  rationale: El paquete fuente y la política del proyecto indican que יהוה debe aparecer como «Yahvé». En la fórmula compuesta se conserva «Señor» para אֲדֹנָי y «Yahvé» para el Tetragrámaton, evitando la convención de ocultamiento mediante mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
- issue: Alcance de la acción verbal de נצל
  english_pob_reading: deliver / delivered
  chosen_spanish_reading: salvarían / serían librados
  alternative_spanish_readings:
  - rescatarían / serían rescatados
  - librarían / serían librados
  rationale: El contexto trata de preservación temporal del juicio, no de una afirmación doctrinal sobre salvación eterna. «Salvar» en la primera cláusula y «serían librados» en la segunda mantienen la tensión semántica entre rescate y escape judicial sin sobredeterminarla.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1, #3'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios tras el último pase; la propuesta mantiene la concordancia alta con el audit trail en inglés y respeta la decisión de conservar el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal entre «salvarían» y «serían librados» para reflejar la relación entre el hifil y el nifal de נצל.
  - Se conserva el tono solemne de juramento con «Vivo yo».
  - La pareja «hijos ni hijas» refleja de forma explícita el hebreo sin generalizar a «niños».
  - «Señor Yahvé» sigue la terminología del proyecto para el Tetragrámaton en vez de la máscara tradicional «SEÑOR».
