theological_decisions:
- issue: Sense of שָׁמֵעוּ in relation to the judged nations
  chosen_reading: did not listen
  alternative_readings:
  - did not obey
  - did not heed
  rationale: The Hebrew verb שׁמע can denote both hearing and obedient response. To preserve theological tension rather than over-resolve it, the main text uses 'listen,' which is lexically transparent, while alternatives that make the obedience nuance explicit are preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
