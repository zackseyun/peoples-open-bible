id: JOS.10.6
reference: Joshua 10:6
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֣וּ אַנְשֵׁי֩ גִבְע֨וֹן אֶל יְהוֹשֻׁ֤עַ אֶל הַֽ/מַּחֲנֶה֙ הַ/גִּלְגָּ֣לָ/ה לֵ/אמֹ֔ר אַל תֶּ֥רֶף יָדֶ֖י/ךָ מֵֽ/עֲבָדֶ֑י/ךָ עֲלֵ֧ה אֵלֵ֣י/נוּ מְהֵרָ֗ה וְ/הוֹשִׁ֤יעָ/ה לָּ֨/נוּ֙ וְ/עָזְרֵ֔/נוּ כִּ֚י נִקְבְּצ֣וּ אֵלֵ֔י/נוּ כָּל מַלְכֵ֥י הָ/אֱמֹרִ֖י יֹשְׁבֵ֥י הָ/הָֽר־־־־׃
translation:
  text: Then the men of Gibeon sent to Joshua[a], to the camp at Gilgal, saying, “Do not withdraw your hand from your servants. Come up to us quickly, and save us and help us, for all the kings of the Amorites who live in the hill country have gathered against us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Do not relax your hand from your servants,'' an idiom meaning ''do not stop supporting us'' or ''do not abandon us.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from שלח, introducing the next event in sequence. 'Sent' is natural modern English and sufficiently formal.
- source_word: אַנְשֵׁי גִבְעוֹן
  lemma: אַנְשֵׁי
  chosen: the men of Gibeon
  alternatives:
  - the people of Gibeon
  lexicon: HALOT
  rationale: אַנְשֵׁי literally means 'men of.' Per gender-accurate philosophy, retain 'men' rather than neutralizing, since the Hebrew expression is masculine and likely refers to the city's representatives.
- source_word: אֶל ... אֶל
  chosen: to Joshua, to the camp at Gilgal
  alternatives:
  - to Joshua at the camp, to Gilgal
  lexicon: HALOT
  rationale: The repeated אֶל marks both recipient and destination. English smooths this as message sent to Joshua, specifically to the camp at Gilgal.
- source_word: הַמַּחֲנֶה הַגִּלְגָּלָה
  chosen: the camp at Gilgal
  alternatives:
  - the camp in Gilgal
  - the camp, Gilgalward
  lexicon: HALOT
  rationale: Directional ending on Gilgal indicates motion/location toward Gilgal; idiomatic English is 'the camp at Gilgal.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with this message
  lexicon: HALOT
  rationale: Conventional introduction to direct speech; 'saying' preserves the formal structure without awkwardness.
- source_word: אַל תֶּרֶף יָדֶיךָ מֵעֲבָדֶיךָ
  chosen: Do not relax your hand from your servants
  alternatives:
  - Do not withdraw your hand from your servants
  - Do not abandon your servants
  lexicon: HALOT
  rationale: רפה 'let drop, slacken, relax' with 'hand' is an idiom for ceasing support or action. I preserved the hand idiom in the main text for transparency to the Hebrew, while keeping more interpretive alternatives noted.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, here it functions as a deferential covenantal-political self-designation toward Joshua rather than emphasizing chattel status. 'Servants' best fits context.
- source_word: עֲלֵה אֵלֵינוּ
  chosen: Come up to us
  alternatives:
  - Go up to us
  lexicon: HALOT
  rationale: עלה reflects ascent in terrain; because Joshua is being addressed from Gilgal toward the hill country, 'come up' is idiomatic from the speakers' perspective and preserves the topographical nuance.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - hurry
  - without delay
  lexicon: HALOT
  rationale: Adverbial accusative expressing urgency. 'Quickly' is clear and natural.
- source_word: וְהוֹשִׁיעָה לָּנוּ
  chosen: save us
  alternatives:
  - deliver us
  - give us victory
  lexicon: HALOT
  rationale: ישע in military danger commonly means rescue/deliver. 'Save us' is the broad, direct equivalent and preserves the lexical link to salvation language without overtheologizing.
- source_word: וְעָזְרֵנוּ
  chosen: help us
  alternatives:
  - come to our aid
  lexicon: HALOT
  rationale: Simple imperative/request from עזר. 'Help us' is the most direct equivalent and pairs naturally with 'save us.'
- source_word: כִּי נִקְבְּצוּ אֵלֵינוּ
  chosen: for ... have gathered against us
  alternatives:
  - have assembled against us
  - have gathered to us
  lexicon: HALOT
  rationale: With hostile context, אֶל after קבץ conveys movement against/onto them, not merely toward them. English requires the adversative sense 'against us.'
- source_word: כָּל מַלְכֵי הָאֱמֹרִי
  chosen: all the kings of the Amorites
  alternatives:
  - all the Amorite kings
  lexicon: HALOT
  rationale: Construct chain straightforwardly rendered. Either English order works; chosen form is slightly more formal.
- source_word: יֹשְׁבֵי הָהָר
  chosen: who live in the hill country
  alternatives:
  - who dwell in the hill country
  - inhabitants of the hill country
  lexicon: HALOT
  rationale: Participle of ישב denotes settled residence. הָהָר here is the upland region, better rendered 'hill country' than simply 'mountain.'
