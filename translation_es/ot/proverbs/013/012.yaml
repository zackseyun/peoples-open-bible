translation:
  language: es
  text: La esperanza demorada enferma el corazón[a], pero el deseo cumplido es un árbol de vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «La esperanza prolongada es enfermedad del corazón, y el deseo que llega es árbol de vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹחֶלֶת
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: HALOT
  rationale: El sustantivo expresa expectativa confiada; «esperanza» es la opción natural y fiel en español para este contexto sapiencial.
- source_word: מְמֻשָּׁכָה
  english_pob_choice: deferred
  chosen_spanish: demorada
  alternatives_spanish:
  - prolongada
  - dilatada
  - aplazada
  lexicon: HALOT
  rationale: La idea literal es de algo «extendido/dibujado fuera»; «demorada» comunica en español la espera alargada con buena naturalidad y sin perder la fuerza experiencial del proverbio.
- source_word: מַחֲלָה לֵב
  english_pob_choice: makes the heart sick
  chosen_spanish: enferma el corazón
  alternatives_spanish:
  - es enfermedad del corazón
  - causa enfermedad al corazón
  - es mal del corazón
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal; en español conviene volverla verbal para expresar con claridad la relación predicativa, manteniendo la metáfora de enfermedad del corazón.
- source_word: וְעֵץ חַיִּים
  english_pob_choice: but a tree of life
  chosen_spanish: pero árbol de vida
  alternatives_spanish:
  - y árbol de vida
  - mas árbol de vida
  lexicon: HALOT
  rationale: Aunque la conjunción es literalmente «y», el paralelismo antitético favorece «pero» para reflejar el contraste del proverbio. Se conserva la imagen bíblica fija «árbol de vida».
- source_word: תַּאֲוָה
  english_pob_choice: a desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - un anhelo
  - una aspiración
  lexicon: HALOT
  rationale: El sustantivo es amplio y relativamente neutral; «deseo» reproduce bien el campo semántico sin añadir matiz excesivamente positivo o negativo.
- source_word: בָאָה
  english_pob_choice: fulfilled
  chosen_spanish: cumplido
  alternatives_spanish:
  - llegado
  - venido
  lexicon: HALOT
  rationale: El verbo tiene la idea de «haber venido/llegado»; en el contexto, «cumplido» expresa de manera idiomática que el deseo se ha realizado o ha llegado a su meta.
theological_decisions:
- issue: Valor adversativo de la conjunción waw antes de «árbol de vida»
  english_pob_reading: but
  chosen_spanish_reading: pero
  alternative_spanish_readings:
  - y
  - mas
  rationale: En sabiduría hebrea la coordinación simple puede marcar contraste. «Pero» transmite mejor el paralelismo antitético que una coordinación puramente aditiva en español.
  doctrine_reference: Principio de equivalencia óptima; preservación del sentido retórico del paralelismo hebreo.
translation_notes:
  revision_awareness: Se sigue de cerca el texto hebreo masorético y el auditoría inglesa POB. No se detectaron revisiones textuales relevantes en el expediente; la nota conserva la alternativa más literal que el POB inglés documentó para la primera y segunda colonas.
  spanish_consistency_notes:
  - Se mantiene «árbol de vida» como imagen estable y reconocible en toda la Biblia.
  - Se usa «esperanza» en vez de un calco más técnico para conservar naturalidad sin perder el valor semántico del hebreo.
  - La nota al pie preserva la alternativa literal documentada por el POB inglés y aclara la relación entre «demorada/cumplido» y «prolongada/llegado».
