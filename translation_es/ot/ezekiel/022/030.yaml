translation:
  language: es
  text: Y busqué entre ellos un hombre[a] que levantara un muro y se pusiera en la brecha[b] delante de mí, a favor de la tierra, para que yo no la destruyera; pero no lo hallé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «un hombre». La forma singular masculina puede funcionar representativamente, pero la traducción conserva la redacción del texto fuente.
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el hueco». La imagen hebrea es la de ocupar una brecha en la muralla, con sentido de intervención protectora.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲבַקֵּשׁ
  english_pob_choice: And I sought
  chosen_spanish: Y busqué
  alternatives_spanish:
  - Y procuré
  - Y fui en busca de
  lexicon: HALOT
  rationale: בקש expresa buscar o procurar. «Busqué» conserva la fuerza verbal sin sonar afectado en español, y mantiene el encadenamiento narrativo-propético que marca el prefijo conjuntivo.
- source_word: מֵהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - de entre ellos
  - entre ellos mismos
  lexicon: HALOT
  rationale: La preposición מן con pronombre señala selección dentro de un grupo. «Entre ellos» comunica naturalmente que la persona buscada debía hallarse dentro del mismo pueblo bajo acusación.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: אִישׁ es singular masculino y aquí tiene valor representativo. «Un hombre» preserva la forma gramatical y el peso retórico del hebreo, en lugar de suavizarlo con un término más genérico.
- source_word: גֹּדֵר גָּדֵר
  english_pob_choice: who would build up a wall
  chosen_spanish: que levantara un muro
  alternatives_spanish:
  - que reparara un muro
  - que murara el muro
  lexicon: HALOT
  rationale: La expresión participial con el sustantivo cognado comunica la imagen de cerrar o restaurar una defensa. «Levantara un muro» conserva la imagen de fortificación en español de modo natural y sin borrar el matiz defensivo.
- source_word: וְעֹמֵד בַּפֶּרֶץ
  english_pob_choice: and stand in the breach
  chosen_spanish: y se pusiera en la brecha
  alternatives_spanish:
  - y se mantuviera en la brecha
  - y se parara en la brecha
  lexicon: HALOT
  rationale: פֶּרֶץ es una brecha o abertura en una muralla. «Ponerse en la brecha» mantiene la imagen concreta y también la resonancia intercesora del pasaje, sin reemplazarla por una paráfrasis más abstracta.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: La frase indica comparecer ante Dios. «Delante de mí» es claro, sobrio y fiel al valor espacial-relacional del hebreo.
- source_word: בְּעַד הָאָרֶץ
  english_pob_choice: on behalf of the land
  chosen_spanish: a favor de la tierra
  alternatives_spanish:
  - por la tierra
  - en favor de la tierra
  lexicon: HALOT
  rationale: בְּעַד expresa representación o beneficio en favor de otro. «A favor de la tierra» conserva ese matiz intercesor y evita reducirlo solo a una acción general «por».
- source_word: לְבִלְתִּי שַׁחֲתָהּ
  english_pob_choice: so that I would not destroy it
  chosen_spanish: para que yo no la destruyera
  alternatives_spanish:
  - a fin de no destruirla
  - para no destruirla
  lexicon: HALOT
  rationale: La construcción marca finalidad preventiva. El sufijo femenino singular remite a «la tierra»; «la destruyera» mantiene esa referencia y el tono de propósito en un castellano natural.
- source_word: וְלֹא מָצָאתִי
  english_pob_choice: but I found none
  chosen_spanish: pero no lo hallé
  alternatives_spanish:
  - y no hallé ninguno
  - pero no encontré a nadie
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente «y», el contraste final en español se expresa mejor con «pero». «No lo hallé» conserva el referente singular masculino, en línea con la forma hebrea y con la lectura representativa del pasaje.
theological_decisions:
- issue: Imagen de defensa urbana y mediación intercesora
  english_pob_reading: Render the verse with both civic-defense imagery ('wall,' 'breach') and intercessory language ('before me,' 'on behalf of the land') intact.
  chosen_spanish_reading: Mantener tanto la imaginería de fortificación («muro», «brecha») como la de representación ante Dios («delante de mí», «a favor de la tierra»).
  alternative_spanish_readings:
  - 'Reducirlo a una sola idea intercesora: «alguien que intercediera por la tierra»'
  - 'Reducirlo a una sola imagen militar: «un defensor que cerrara la brecha»'
  rationale: 'El hebreo une dos planos: la muralla abierta y la comparecencia ante Yahvé. La traducción debe conservar esa tensión para no borrar ni el símbolo político-social ni la dimensión de mediación divina.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor representativo del singular masculino אִישׁ
  english_pob_reading: The singular masculine form may function representatively, but the translation preserves the wording of the source.
  chosen_spanish_reading: Traducir con «un hombre» y no neutralizarlo a «alguien» o «una persona».
  alternative_spanish_readings:
  - alguien
  - una persona
  rationale: El hebreo usa una forma masculina singular que funciona de manera representativa. La versión española debe conservar esa huella gramatical, salvo que el contexto exigiera otra cosa.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se ha seguido la revisión más reciente del POB en inglés, que ajustó la frase a «sought among them for a man». En español se reflejó esa naturalidad con «busqué entre ellos un hombre» y se conservó el cierre negativo con el contraste final del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el pasaje habla en primera persona divina, así que no hace falta insertarlo.
  - «Brecha» se mantuvo para פֶּרֶץ, en coherencia con el audit trail inglés y con el campo semántico de apertura defensiva.
  - Se prefirió «tierra» para הָאָרֶץ, siguiendo el sentido concreto del versículo y su posible valor colectivo.
  - Se preservó el singular masculino del hebreo con «un hombre» y el referente anafórico singular con «lo» en la clausura.
