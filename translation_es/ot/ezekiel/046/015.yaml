review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente los elementos básicos del hebreo: la conjunción inicial, el sentido cultual de וְעָשׂוּ como provisión/preparación, los tres objetos directos, la iteración temporal בַּבֹּקֶר בַּבֹּקֶר y la finalidad del sintagma עוֹלַת תָּמִיד. Sin embargo, ''ofrenda de cereal'' suena menos idiomático en español bíblico general que ''ofrenda de grano'', y ''holocausto regular'' es comprensible pero menos fiel al matiz de תָּמִיד que ''holocausto continuo'' o ''holocausto regular'' con nota. Dado que el inglés POB conservó la alternativa ''continual burnt offering'' en nota, conviene preservarla también en español.'
  spanish_quality_summary: El texto es claro y digno, pero admite una mejora menor de naturalidad y precisión terminológica. 'Mañana tras mañana' funciona bien. 'Proveerán' es defendible, aunque algo técnico; aun así encaja con la decisión inglesa. La principal mejora es usar 'ofrenda de grano' para una lectura más natural y ampliamente eclesial. También conviene añadir nota para 'holocausto continuo' porque el inglés auditado la preserva y porque 'regular' puede sonar algo administrativo en español.
  glossary_alignment: No hay conflictos con los términos troncales del proyecto. La elección 'holocausto' para עוֹלָה está bien. La revisión propuesta mantiene la racionalidad léxica del POB y preserva la alternativa documentada para תָּמִיד mediante nota.
  issues:
  - severity: medium
    issue: '''ofrenda de cereal'' es menos idiomático que ''ofrenda de grano'' en este registro bíblico'
    rationale: Aunque es entendible, en español general 'cereal' puede sonar técnico o moderno. 'Ofrenda de grano' comunica mejor מִנְחָה en contexto sacrificial y suena más natural para lectores de iglesia.
  - severity: medium
    issue: Falta la nota léxica correspondiente a la alternativa de עוֹלַת תָּמִיד
    rationale: El inglés POB conservó explícitamente la alternativa 'a continual burnt offering'. En español conviene reflejarla para preservar el expediente auditado y aclarar que תָּמִיד enfatiza continuidad constante.
  revised_spanish_text: Y proveerán el cordero, la ofrenda de grano y el aceite, mañana tras mañana, para un holocausto regular[a].
  revised_footnotes:
  - marker: a
    text: O 'un holocausto continuo'. El hebreo enfatiza la regularidad continua de esta ofrenda.
