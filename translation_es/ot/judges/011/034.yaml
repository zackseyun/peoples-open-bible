translation:
  language: es
  text: Entonces Jefté llegó a Mizpa, a su casa; y he aquí, su hija salía a recibirlo con panderos y con danzas[a]. Y ella era su única descendiente[b]; aparte de ella, no tenía hijo ni hija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salía a recibirlo con panderos y danzando».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su única»; es decir, su único hijo o hija.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... llegó
  alternatives_spanish:
  - Y ... llegó
  - Entonces ... vino
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, «Entonces» mantiene la secuencia narrativa con naturalidad, y «llegó» conserva el valor de movimiento del verbo sin forzar un calco.
- source_word: הַמִּצְפָּה
  english_pob_choice: to Mizpah
  chosen_spanish: a Mizpa
  alternatives_spanish:
  - a la Mizpa
  lexicon: HALOT
  rationale: Como nombre propio de lugar, se translitera como «Mizpa». Se omite el artículo en el texto principal por uso español normal con topónimos, sin perder la referencia al lugar.
- source_word: אֶל בֵּיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  lexicon: HALOT
  rationale: «Casa» es la correspondencia más concreta y fiel del hebreo בַּיִת en este contexto narrativo; «hogar» sería más interpretativo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: «Y he aquí» conserva el giro de sorpresa y énfasis discursivo del hebreo, con tono bíblico natural en español.
- source_word: בִתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  lexicon: HALOT
  rationale: Término filial directo y sin ambigüedad; no requiere expansión.
- source_word: יֹצֵאת לִקְרָאתוֹ
  english_pob_choice: was coming out to meet him
  chosen_spanish: salía a recibirlo
  alternatives_spanish:
  - salía a encontrarse con él
  - venía a recibirlo
  lexicon: HALOT
  rationale: El participio expresa acción en curso en el momento de su llegada. «Salía a recibirlo» transmite esa idea de manera natural en español y recoge el sentido relacional de לִקְרָאתוֹ.
- source_word: בְתֻפִּים
  english_pob_choice: with tambourines
  chosen_spanish: con panderos
  alternatives_spanish:
  - con tamboriles
  - con panderetas
  lexicon: HALOT
  rationale: «Panderos» es un equivalente español bíblico claro para el instrumento festivo de percusión; evita un término excesivamente moderno o una palabra que sugiera otro instrumento.
- source_word: וּבִמְחֹלוֹת
  english_pob_choice: and with dances
  chosen_spanish: y danzas
  alternatives_spanish:
  - y bailes
  - y con danzas
  lexicon: HALOT
  rationale: El plural hebreo se conserva bien con «danzas», que suena más solemne y preciso que «bailes» en este registro.
- source_word: וְרַק הִיא יְחִידָה
  english_pob_choice: Now she was his only child
  chosen_spanish: Ahora ella era su única hija
  alternatives_spanish:
  - Y ella era su única hija
  - Pero ella era su única hija
  lexicon: HALOT
  rationale: «יְחִידָה» en contexto explica que era su único descendiente; «única hija» expresa el sentido idiomático sin perder la fuerza de exclusividad del hebreo.
- source_word: אֵין לוֹ מִמֶּנּוּ בֵּן אוֹ בַת
  english_pob_choice: besides her he had neither son nor daughter
  chosen_spanish: fuera de ella, no tenía hijo ni hija
  alternatives_spanish:
  - además de ella, no tenía hijo ni hija
  - no tenía, fuera de ella, hijo ni hija
  lexicon: HALOT
  rationale: La cláusula refuerza que no había más descendencia. «Fuera de ella» corresponde bien a מִמֶּנּוּ en el contexto de exclusión, y la negación total queda clara en español.
theological_decisions:
- issue: Estado de la hija de Jefté y alcance interpretativo del versículo
  english_pob_reading: Render the verse descriptively without importing later interpretive conclusions about Jephthah's vow or the daughter's fate.
  chosen_spanish_reading: Traducir el versículo de modo descriptivo, sin resolver aquí si el relato apunta a sacrificio literal, a virginidad perpetua o a otra lectura del pasaje.
  alternative_spanish_readings:
  - Introducir una lectura sacrificial explícita
  - Introducir una lectura de virginidad perpetua
  rationale: El hebreo de este versículo informa que ella era la única hija y que salía a recibirlo; no decide por sí mismo el desenlace del voto. La traducción debe preservar esa tensión textual sin adelantar una conclusión doctrinal o interpretativa.
  doctrine_reference: Conservar la tensión hermenéutica del pasaje sin resolverla en el versículo.
translation_notes:
  revision_awareness: El antecedente inglés presenta alta concordancia y no requiere revisiones textuales sustantivas; se mantiene la decisión de traducir de forma descriptiva y de conservar la ambigüedad interpretativa del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Jefté» como forma española estable del nombre propio.
  - «Mizpa» se conserva como transliteración del topónimo sin añadir artículo en el cuerpo principal.
  - Se usa «panderos» para el instrumento festivo y «danzas» para el plural hebreo, manteniendo un registro bíblico claro.
  - Se evita resolver en el texto la discusión sobre el voto de Jefté y el destino de su hija.
