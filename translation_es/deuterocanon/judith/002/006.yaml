translation:
  language: es
  text: Y saldrás al encuentro de toda la tierra hacia el oeste[a], porque desobedecieron la palabra de mi boca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «hacia occidente» o «al oeste». La expresión griega ἐπὶ δυσμᾶς puede señalar dirección o región.
    reason: lexical_alternative
  - marker: b
    text: «La palabra de mi boca» reproduce de forma literal una expresión griega que puede significar una orden o decreto hablado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελεύσῃ
  english_pob_choice: you shall go out
  chosen_spanish: saldrás
  alternatives_spanish:
  - saldrás fuera
  - irás
  lexicon: LSJ
  rationale: El futuro de ἐξέρχομαι funciona aquí como mandato o anuncio directo; «saldrás» conserva el movimiento sin añadir una precisión militar que el griego no expresa explícitamente.
- source_word: εἰς συνάντησιν
  english_pob_choice: to meet
  chosen_spanish: a enfrentarte
  alternatives_spanish:
  - a encontrarte con
  - para un encuentro con
  lexicon: LSJ
  rationale: En este contexto bélico, la expresión implica un choque u oposición. «A enfrentarte» comunica mejor el sentido contextual que un simple «a encontrarte».
- source_word: πάσῃ τῇ γῇ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la región
  - toda la tierra
  lexicon: LSJ
  rationale: El sustantivo singular con πᾶς se entiende colectivamente como un territorio. «Tierra» mantiene la amplitud geográfica y suena natural en español bíblico.
- source_word: ἐπὶ δυσμᾶς
  english_pob_choice: toward the west
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - hacia occidente
  - al oeste
  lexicon: LSJ
  rationale: La frase puede indicar dirección o región. «Hacia el oeste» conserva la orientación direccional marcada por la revisión inglesa y evita fijar indebidamente una localización estática.
- source_word: ἠπείθησαν
  english_pob_choice: they disobeyed
  chosen_spanish: desobedecieron
  alternatives_spanish:
  - se negaron a obedecer
  - fueron desobedientes a
  lexicon: LSJ
  rationale: El aoristo de ἀπειθέω expresa falta de obediencia a una orden. «Desobedecieron» es directo y fiel al valor verbal.
- source_word: τῷ ῥήματι τοῦ στόματός μου
  english_pob_choice: the word of my mouth
  chosen_spanish: la palabra de mi boca
  alternatives_spanish:
  - la palabra dicha por mi boca
  - mi palabra pronunciada
  lexicon: LSJ
  rationale: Se preserva el genitivo literal y la imagen de una orden pronunciada. «La palabra de mi boca» mantiene la fuerza retórica sin convertirlo en una paráfrasis más explicativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'toward the west' frente a 'in the west' para reflejar con más precisión ἐπὶ δυσμᾶς. La redacción española sigue esa lectura direccional y conserva el resto del sentido del texto griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí un tetragrámaton, sino porque la consigna del proyecto fija ese término cuando corresponda; en este versículo no se emplea.
  - Se mantuvo la formulación literal «la palabra de mi boca» para no borrar la tensión entre palabra y mandato hablados.
