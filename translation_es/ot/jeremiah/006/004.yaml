review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés: mantiene el imperativo sacral de קַדְּשׁוּ con «Consagren», expresa correctamente la dirección hostil «contra ella», conserva «subamos» para וְנַעֲלֶה, y refleja adecuadamente la decadencia del día y el alargamiento de las sombras. La nota alternativa también preserva correctamente la opción idiomática «Prepárense para la guerra contra ella».'
  spanish_quality_summary: 'El texto es claro y digno, pero necesita un pequeño ajuste de puntuación para mejor español natural: en neutral contemporáneo es preferible «¡Ay de nosotros!», sin coma después del signo de cierre. El resto del verso suena bien y es ampliamente legible en registro eclesial moderno.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé/Mesías u otros términos sensibles del glosario. La decisión teológica clave de conservar el lenguaje de consagración militar está bien alineada con el POB inglés.
  issues:
  - severity: low
    issue: Puntuación poco natural en «¡Ay de nosotros!,»
    rationale: En español estándar no se usa coma inmediatamente después de cerrar una interjección exclamativa breve aquí; «¡Ay de nosotros! porque...» o mejor «¡Ay de nosotros! Porque...» serían posibles, pero dentro de la sintaxis continua del verso la forma más natural es «¡Ay de nosotros! porque...», y dado el flujo bíblico, «¡Ay de nosotros!, porque...» se percibe innecesariamente trabado. La reparación mínima es quitar la coma.
  revised_spanish_text: Consagren la guerra contra ella; levántense[a], y subamos al mediodía. ¡Ay de nosotros! porque el día declina, porque las sombras de la tarde se alargan.
  revised_footnotes:
