  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה = «Yahvé» correctamente; מִצְוֺת = «mandamientos» bien; no hay conflictos con terminología doctrinal principal. La metáfora espacial y corporal se conserva como pide el POB.'
