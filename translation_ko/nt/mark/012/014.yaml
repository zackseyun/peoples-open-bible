  text: And they came and said to him[a], “Teacher, we know that you are truthful and do not care about anyone, for you do not look at the face of men, but truly teach the way of God. Is it lawful to pay the poll tax to Caesar or not? Should we pay it[b], or should we not pay it?”
  footnotes:
  - marker: a
    text: Or, “you do not show partiality to people” or “you are not swayed by appearances.”
    reason: lexical_alternative
  - marker: b
    text: The Greek κῆνσος refers to the Roman census or poll tax.
    reason: cultural_note
translation:
  language: ko
  text: 그리고 그들이 와서 그분께 말했습니다. 「선생님, 우리는 당신이 진실하시며 누구에게도 매이지 않으심을 압니다. 당신은 사람의 외모를 보지 않으시고 참되이 하나님의 도를 가르치십니다. 카이사르에게 인두세를 바치는 것이 합당합니까, 아닙니까? 우리가 바쳐야 합니까, 바치지 말아야 합니까?」
  philosophy: optimal-equivalence
