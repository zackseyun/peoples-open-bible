review_pass:
  verdict: revise
  source_alignment_summary: 'El griego καὶ ἐπιθυμήσαντες αὐτῆς expresa un participio aoristo con sentido de deseo ilícito en contexto: literalmente, ''y habiendo deseado de ella / deseándola''. El borrador capta el sentido básico, pero ''habiéndola deseado'' suena algo forzado en español y la coma tras ''y'' no ayuda a la fluidez. Una forma más natural y fiel al valor adverbial del participio es ''y, al desearla,'' manteniendo la sobriedad del verbo principal con nota para la explicitación contextual.'
  spanish_quality_summary: 'El español actual del borrador es comprensible, pero ''habiéndola deseado'' resulta pesado y menos idiomático en una línea narrativa tan breve. ''Y, al desearla,[a]'' lee mejor en español eclesial moderno y conserva el enlace con la acción siguiente. La nota también conviene ajustar para reflejar más de cerca el inglés auditado: ''la desearon con lujuria'' o ''la codiciaron'' como explicitación contextual; ''la codiciaron'' es aceptable y más conciso.'
  glossary_alignment: No hay términos de glosario principal implicados. La decisión léxica para ἐπιθυμήσαντες debe mantener un verbo base sobrio ('desear') en el texto principal y reservar la explicitación contextual en nota, en línea con el rastro POB inglés.
  issues:
  - severity: medium
    issue: Construcción participial poco natural en español
    rationale: Aunque 'habiéndola deseado' refleja formalmente el aoristo participial, en esta cláusula aislada suena rígido y menos idiomático que 'al desearla'.
  - severity: low
    issue: Puntuación mejorable
    rationale: La secuencia 'y, habiéndola deseado' introduce una pausa innecesaria y pesada. Con la revisión, la puntuación queda más natural para una cláusula dependiente breve.
  - severity: low
    issue: Nota léxica podría alinearse mejor con el matiz contextual
    rationale: La nota actual con 'la codiciaron' es válida, pero conviene dejar claro que se trata de una explicitación contextual del deseo sexual ilícito, no de un cambio del texto principal.
  revised_spanish_text: y, al desearla,[a]
