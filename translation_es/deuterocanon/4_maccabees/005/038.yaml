translation:
  language: es
  text: Porque ciertamente podrás tiranizar sobre los impíos, pero sobre mis razonamientos[a] relativos a la piedad no dominarás ni por palabras ni por obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis juicios racionales relativos a la piedad». El griego λογισμῶν es un término clave en 4 Macabeos para la deliberación moral razonada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσεβῶν
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreligiosos
  - los impíos
  - los que no temen a Dios
  lexicon: LSJ
  rationale: El genitivo plural en la construcción con τυραννήσεις señala a las personas sobre quienes recae la acción. «Impíos» conserva el contraste moral-religioso con εὐσέβεια y es un término natural en español bíblico sin sonar arcaico en exceso.
- source_word: τυραννήσεις
  english_pob_choice: you may indeed tyrannize over
  chosen_spanish: podrás tiranizar
  alternatives_spanish:
  - podrás dominar tiránicamente
  - podrás actuar como tirano sobre
  - podrás oprimir
  lexicon: LSJ
  rationale: El verbo está emparentado con «tirano» y expresa dominio opresivo, no simple gobierno. «Podrás tiranizar» conserva esa fuerza y el matiz concesivo del μὲν ... δέ.
- source_word: τῶν δὲ ἐμῶν ... λογισμῶν
  english_pob_choice: my reasonings
  chosen_spanish: mis razonamientos
  alternatives_spanish:
  - mis pensamientos
  - mis convicciones
  - mis juicios racionales
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es un término técnico para el razonamiento moral. «Razonamientos» conserva mejor esa carga conceptual que «pensamientos» y se alinea con la nota inglesa sobre la deliberación racional.
- source_word: περὶ τῆς εὐσεβείας
  english_pob_choice: concerning godliness
  chosen_spanish: relativos a la piedad
  alternatives_spanish:
  - sobre la piedad
  - acerca de la devoción
  - relativos a la reverencia
  lexicon: LSJ
  rationale: εὐσέβεια aquí designa devoción fiel a Dios. «Piedad» mantiene el campo religioso y suena más cercano al registro bíblico español; «relativos a» evita una expansión interpretativa y refleja el valor del sintagma preposicional.
- source_word: δεσπόσεις
  english_pob_choice: you will rule
  chosen_spanish: dominarás
  alternatives_spanish:
  - gobernarás
  - serás dueño de
  - ejercerás dominio sobre
  lexicon: LSJ
  rationale: En este contexto δεσπόζω no es gobierno legítimo sino dominio sobre la voluntad interior. «Dominarás» reproduce el sentido de control o sometimiento y funciona bien con la doble negación instrumental que sigue.
- source_word: οὔτε λόγοις ... οὔτε δι᾽ ἔργων
  english_pob_choice: neither by words nor by deeds
  chosen_spanish: ni por palabras ni por obras
  alternatives_spanish:
  - ni con palabras ni con hechos
  - ni por discursos ni por acciones
  - ni mediante palabras ni mediante obras
  lexicon: LSJ
  rationale: La pareja balanceada λόγοις / ἔργων se conserva con una estructura española igualmente paralela. «Palabras» y «obras» es claro, digno y suficientemente amplio para abarcar persuasión verbal y coerción práctica.
theological_decisions:
- issue: Contraste moral-religioso entre ἀσέβεια y εὐσέβεια
  english_pob_reading: ungodly / godliness
  chosen_spanish_reading: impíos / piedad
  alternative_spanish_readings:
  - irreligiosos / piedad
  - sin Dios / devoción
  - impíos / devoción a Dios
  rationale: El versículo opone el dominio del tirano sobre quienes viven sin reverencia a Dios y su incapacidad de someter el compromiso interior del hablante con la piedad. «Impíos / piedad» preserva la polaridad teológica con vocabulario bíblico natural en español.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: λογισμῶν como término técnico de deliberación moral
  english_pob_reading: my reasonings concerning godliness
  chosen_spanish_reading: mis razonamientos relativos a la piedad
  alternative_spanish_readings:
  - mis juicios racionales sobre la piedad
  - mis pensamientos acerca de la piedad
  - mis convicciones respecto de la piedad
  rationale: 4 Macabeos desarrolla el poder rector de la razón sobre las pasiones. «Razonamientos» conserva esa dimensión antropológica y ética, evitando reducir λογισμῶν a pensamientos vagos o meras opiniones.
  doctrine_reference: Translation philosophy §§2, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y coincide con el audit trail inglés sin introducir cambios doctrinales. Se preservó el paralelismo concesivo μὲν ... δέ y la doble negación instrumental οὔτε ... οὔτε; no se detectaron revisiones pendientes en el expediente inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto cuando corresponda; este versículo no contiene el nombre divino explícito.
  - Se prefirió «piedad» frente a «piedad/reverencia» para conservar el campo semántico de εὐσέβεια sin estrecharlo demasiado.
  - «Razonamientos» se usó como equivalente estable de λογισμοί en línea con la terminología técnica de 4 Macabeos.
  - La construcción «ni por palabras ni por obras» conserva el paralelismo retórico del griego y su ritmo balanceado.
