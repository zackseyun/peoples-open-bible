translation:
  language: es
  text: Y nosotros te invocaremos[a], y tú nos escucharás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “nos oirás” / “nos atenderás”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσόμεθαί
  english_pob_choice: will call upon
  chosen_spanish: te invocaremos
  alternatives_spanish:
  - te llamaremos
  - clamaríamos a ti
  - te llamaremos en oración
  lexicon: BDAG
  rationale: En contexto de oración, ἐπικαλέω expresa dirigirse a alguien en súplica o invocación. “Invocar” conserva esa fuerza religiosa y es natural en español bíblico; “llamar” es posible, pero menos preciso para el matiz cultual/petitorio.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - a usted
  lexicon: Pronombre de 2.ª persona
  rationale: El griego usa el objeto directo de segunda persona. En español, el clítico “te” mantiene la relación directa y fluida sin añadir formalidad ajena al texto.
- source_word: ἐπακούσει
  english_pob_choice: will hear
  chosen_spanish: escucharás
  alternatives_spanish:
  - oirás
  - atenderás
  - nos escucharás favorablemente
  lexicon: BDAG
  rationale: ἐπακούω puede significar oír, escuchar con atención o atender favorablemente. “Escucharás” conserva la idea básica de oír atendiendo, y evita introducir explícitamente “responderás”, que sería más interpretativo.
- source_word: ἡμῶν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - nuestra voz
  - nuestra oración
  lexicon: Sintaxis griega
  rationale: El genitivo plural depende de ἐπακούω; en español se expresa de forma natural con pronombre directo/indirecto, “nos”, sin expandir a “nuestra oración”, que no aparece en el griego.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto español, anclado a la primera cláusula verbal. La redacción sigue de cerca el griego y mantiene la alternativa semántica de ἐπακούω en la nota.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de dos cláusulas con futuro: invocación y respuesta auditiva.'
  - Se usa “Y nosotros” para reflejar el énfasis del καὶ ἡμεῖς inicial sin volverlo redundante.
  - Se evitó “Cristo/Mesías” u otro vocabulario no presente en el versículo.
