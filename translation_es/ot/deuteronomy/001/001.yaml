translation:
  language: es
  text: Estas son las palabras que Moisés habló a todo Israel, al otro lado del Jordán[a], en el desierto, en la Arabá[b], frente a Suph[c], entre Parán, Topel, Labán, Jazerot y Dizahab[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá del Jordán» o «del otro lado del Jordán». La expresión hebrea admite distintos puntos de vista geográficos.
    reason: lexical_alternative
  - marker: b
    text: «Arabá» es un término geográfico para la región de la depresión o llanura del Jordán; tradicionalmente también se traduce «llanura».
    reason: cultural_note
  - marker: c
    text: Hebreo «Suph». Algunos lo entienden como un nombre de lugar; otros lo relacionan con el «mar de Juncos», pero aquí no aparece la palabra «mar».
    reason: alternative_reading
  - marker: d
    text: O, en un español más fluido, «entre Parán, Topel, Labán, Jazerot y Dizahab».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El demostrativo plural introduce una sección discursiva; en español, «Estas son» reproduce mejor la fuerza presentacional que un simple «Estas».
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las palabras
  - las cosas
  - los asuntos
  lexicon: HALOT
  rationale: Aquí דְּבָרִים funciona como introducción al discurso de Moisés; «palabras» conserva el valor verbal inmediato y es natural en español.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that ... spoke
  chosen_spanish: que habló
  alternatives_spanish:
  - que dijo
  - que pronunció
  lexicon: HALOT
  rationale: El verbo piel de דבר señala habla formal. «Habló» es fiel y más adecuado que «dijo» para una apertura solemne.
- source_word: אֶל כָּל יִשְׂרָאֵל
  english_pob_choice: to all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todo el Israel
  - a todo el pueblo de Israel
  lexicon: HALOT
  rationale: «Todo Israel» mantiene la referencia corporativa al pueblo del pacto y sigue de cerca la forma hebrea con כָּל.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión hebrea admite distintos puntos de vista geográficos; se conserva la ambigüedad con una fórmula natural en español, sin imponer una dirección única.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» suele corresponder a «wilderness», en español «desierto» comunica con claridad el espacio árido y despoblado del contexto.
- source_word: בָּעֲרָבָה
  english_pob_choice: in the Arabah
  chosen_spanish: en la Arabá
  alternatives_spanish:
  - en el Arabá
  - en la llanura
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico técnico como «Arabá», ya que el término funciona aquí como designación regional y no solo como «llanura» común.
- source_word: מוֹל סוּף
  english_pob_choice: opposite Suph
  chosen_spanish: frente a Suph
  alternatives_spanish:
  - opuesto a Suph
  - enfrente de Suph
  lexicon: HALOT
  rationale: מוֹל significa «frente a/opuesto a». Se mantiene «Suph» como topónimo, evitando expandirlo a «mar de juncos» porque el hebreo aquí no contiene יָם.
- source_word: בֵּין פָּארָן וּבֵין תֹּפֶל וְלָבָן וַחֲצֵרֹת וְדִי זָהָב
  english_pob_choice: between Paran, Tophel, Laban, Hazeroth, and Dizahab
  chosen_spanish: entre Parán, Topel, Labán, Jazerot y Dizahab
  alternatives_spanish:
  - entre Parán, Topel, Labán, Jazerot y Dizahab
  - entre Parán y Topel y Labán y Jazerot y Dizahab
  lexicon: HALOT
  rationale: La lista se adapta a un español más legible, manteniendo todos los topónimos. Se conserva el valor de lugar propio; no se traduce literalmente דִי זָהָב como «suficiente oro» porque el contexto y la tradición auditada lo tratan como nombre de lugar.
theological_decisions:
- issue: Expresión geográfica de «beyond the Jordan» y su posible perspectiva
  english_pob_reading: The Hebrew expression can be rendered from different geographic viewpoints.
  chosen_spanish_reading: «al otro lado del Jordán» deja abierta la perspectiva geográfica sin fijarla.
  alternative_spanish_readings:
  - más allá del Jordán
  - del otro lado del Jordán
  rationale: No hay una decisión doctrinal en juego, pero sí una tensión de perspectiva geográfica que conviene preservar en español tal como la nota auditada lo indica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la revisión auditada que suaviza la enumeración de topónimos con comas y una sola conjunción final, preservando todos los elementos del hebreo y la decisión de no interpretar Suph como «mar de juncos» por ausencia de יָם.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino explícito; en este versículo no aparece.
  - 'Se mantuvo la transliteración de topónimos técnicos: Arabá, Parán, Topel, Labán, Jazerot, Dizahab.'
  - Se prefirió «desierto» para מִדְבָּר y «Arabá» para עֲרָבָה, distinguiendo término común y región geográfica.
  - Se evitó «SEÑOR» porque no hay aquí sustitución del nombre divino.
  - Se preservó la posible ambigüedad geográfica de בְּעֵבֶר הַיַּרְדֵּן con una nota textual.
