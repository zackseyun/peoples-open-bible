    reason: previous_rendering
  revision_rationale: Se reemplazó la construcción nominal pesada por una verbal más natural en español, en línea con la revisión final de la POB inglesa y con el sentido adquisitivo de מִקְנֵה. Se cambió «fue hecha a» por «fueron comprados a» para expresar claramente la transacción. Se mantuvo «los hijos de Het» como forma principal y se corrigió la nota b para reflejar la alternativa nominal documentada, en vez de repetir el texto base.
