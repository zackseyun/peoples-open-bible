    rationale: El hebreo se refiere a bienes obtenidos mediante opresión o explotación. En español, «extorsionar» normalmente rige personas o dinero exigido bajo amenaza; «lo que extorsionó» suena forzado y puede estrechar indebidamente el sentido.
  - severity: low
    issue: «Y sucederá que» suena algo pesado como apertura legal
    rationale: Aunque no es incorrecto, «Y será que» o simplemente «Y sucederá, cuando...» fluye mejor en español bíblico-jurídico y conserva la fórmula casuística sin rigidez innecesaria.
