translation:
  language: es
  text: Vi la tierra[a], y he aquí, estaba sin forma y vacía; miré a los cielos, y no tenían luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo tohu vabohu, tradicionalmente «sin forma y vacía» o «desolación y vacío»; la expresión remite a Génesis 1:2.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I looked
  chosen_spanish: Miré
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El verbo hebreo es ראה en perfecto 1cs. En un contexto de visión profética, «Miré» conserva el acto de observar y la escena contemplativa que sigue; «Vi» también sería posible, pero «Miré» resulta más vivo y cercano al matiz del inglés POB.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el país
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar «tierra», «país» o «tierra/terreno» según contexto, aquí el paralelo con «los cielos» y la resonancia con Génesis 1:2 favorecen una referencia cósmica general. En español, «la tierra» comunica esa amplitud de forma natural.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: La fórmula deíctica mantiene el efecto visionario y profético. «Y he aquí» es la forma española más estable y digna para conservar la irrupción de la escena sin aplanarla.
- source_word: תֹהוּ וָבֹהוּ
  english_pob_choice: formless and empty
  chosen_spanish: sin forma y vacía
  alternatives_spanish:
  - desolada y vacía
  - desordenada y vacía
  - sin forma y sin contenido
  lexicon: HALOT
  rationale: La pareja hebrea evoca Génesis 1:2. «Sin forma y vacía» preserva el eco intertextual y el sentido de des-creación con un español claro. Se evita «vacía y vacía» o una paráfrasis excesiva; también se evita resolver la expresión solo como ruina histórica, porque el texto conserva tensión teológica y literaria.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos arriba
  lexicon: HALOT
  rationale: El plural hebreo שָׁמַיִם corresponde mejor a «los cielos» que a «el cielo». En paralelo con «la tierra», la formulación mantiene el contraste cósmico.
- source_word: וְאֵין אוֹרָם
  english_pob_choice: and they had no light
  chosen_spanish: y no tenían luz
  alternatives_spanish:
  - y no había luz en ellos
  - y les faltaba la luz
  lexicon: HALOT
  rationale: El sufijo posesivo de אוֹרָם remite a «los cielos». «No tenían luz» reproduce con naturalidad la predicación de ausencia sin forzar una explicación adicional sobre si la luz fue retirada o simplemente no estaba presente.
theological_decisions:
- issue: Eco intertextual de Génesis 1:2 en un oráculo de juicio
  english_pob_reading: 'Render the verse in a way that preserves cosmic de-creation imagery: ''earth ... formless and empty'' and ''the heavens ... had no light.'''
  chosen_spanish_reading: Traducir con «sin forma y vacía» y «los cielos ... no tenían luz» para conservar la imagen de des-creación cósmica.
  alternative_spanish_readings:
  - «sin forma y vacío»
  - «desolada y vacía»
  - una lectura restringida solo a devastación local
  rationale: La combinación תֹהוּ וָבֹהוּ y el contraste tierra/cielos evocan Génesis 1:2. La traducción preserva esa tensión literaria y teológica sin negar que históricamente el oráculo se dirige a una situación concreta de juicio.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto base muestra alto grado de acuerdo y no presenta revisiones aplicadas; la redacción española sigue de cerca el audit trail inglés y el hebreo, manteniendo el eco de Génesis 1:2 y la predicación de ausencia de luz en los cielos.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «La tierra» y «los cielos» preservan el paralelismo cósmico del hebreo.
  - Se mantiene la ambigüedad teológica entre devastación histórica y des-creación literaria, sin resolverla en la traducción.
