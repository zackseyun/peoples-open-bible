base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/024.yaml
  text: By your servants you have mocked the Lord[a], and you have said, ‘With my many chariots I have gone up to the heights of the mountains, to the remotest parts of Lebanon; I will cut down its tall cedars, its choicest cypresses, and I will enter its farthest height[c][b], its fruitful forest.’
  footnotes:
  - marker: a
    text: Or 'have reproached' or 'have taunted'; the Hebrew verb carries the sense of insulting or defying with contempt.
    reason: lexical_alternative
  - marker: b
    text: The tree named here (Hebrew berosh) is uncertain; it may refer to cypress, fir, or another conifer.
    reason: lexical_alternative
  - marker: c
    text: Or 'its luxuriant forest' or 'its fruitful forest'; the Hebrew combines the ideas of forest and fertile orchard-land.
    reason: lexical_alternative
