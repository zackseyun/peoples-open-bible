    issue: Construcción poco natural en «el que hizo a los padres escogidos»
    rationale: Aunque refleja literalmente el inglés auditado, en español esa secuencia suena rígida y algo ambigua. El griego admite mejor «el que hizo escogidos a los padres», que preserva el sentido y mejora la fluidez sin paráfrasis.
