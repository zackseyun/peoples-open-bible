translation:
  language: es
  text: Pero si hubieran estado en mi consejo[a], entonces habrían hecho oír a mi pueblo mis palabras, y los habrían hecho volverse de su mal camino y de la maldad de sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en mi consejo secreto» o «en mi consejo». El hebreo סוֹד puede referirse a un consejo confidencial, un círculo íntimo o un consejo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En el contexto de contraste con los profetas falsos, «Pero si» conserva el valor adversativo que el inglés POB destacó con «But if».
- source_word: עָמְדוּ
  english_pob_choice: had stood
  chosen_spanish: hubieran estado
  alternatives_spanish:
  - estuvieran
  - estuvieron
  lexicon: HALOT
  rationale: La forma contrafactual del hebreo se expresa naturalmente en español con pluscuamperfecto de subjuntivo; «hubieran estado» comunica la situación no realizada.
- source_word: בְּסוֹדִי
  english_pob_choice: in my council
  chosen_spanish: en mi consejo
  alternatives_spanish:
  - en mi consejo secreto
  - en mi consejo íntimo
  - en mi consejo deliberativo
  lexicon: HALOT
  rationale: סוֹד puede ser consejo confidencial o círculo íntimo. «Consejo» mantiene la imagen de participación en la deliberación divina sin añadir demasiado. En español, «consejo» es más natural que «council» y conserva la idea del POB de un consejo divino.
- source_word: וְיַשְׁמִעוּ
  english_pob_choice: they would have caused ... to hear
  chosen_spanish: habrían hecho oír
  alternatives_spanish:
  - habrían proclamado
  - habrían hecho escuchar
  lexicon: HALOT
  rationale: El causativo de שׁמע se refleja bien con «hacer oír», que preserva la fuerza verbal de «causar que oigan» sin perder naturalidad.
- source_word: דְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi mensaje
  - mi palabra
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «mis palabras», como en el POB inglés «my words», evitando reducirlo a un singular.
- source_word: אֶת־עַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - a mi gente
  lexicon: HALOT
  rationale: «Mi pueblo» es la traducción directa y bíblicamente estable de עַמִּי; el dativo de objeto se expresa naturalmente con «a».
- source_word: וִישִׁבוּם
  english_pob_choice: they would have turned them
  chosen_spanish: los habrían hecho volver
  alternatives_spanish:
  - los habrían vuelto
  - los habrían regresado
  lexicon: HALOT
  rationale: El causativo de שוב se rinde mejor con «hacer volver», que mantiene la idea de retorno/alejamiento del mal sin forzar un giro demasiado interpretativo.
- source_word: מִדַּרְכָּם הָרָע
  english_pob_choice: from their evil way
  chosen_spanish: de su mal camino
  alternatives_spanish:
  - de su camino malo
  - de su mal proceder
  lexicon: HALOT
  rationale: «Camino» preserva la metáfora hebrea de conducta; «mal» corresponde directamente a הָרָע. En español, «mal camino» suena más idiomático que «camino malo».
- source_word: וּמֵרֹעַ מַעַלְלֵיהֶם
  english_pob_choice: and from the evil of their deeds
  chosen_spanish: y de la maldad de sus obras
  alternatives_spanish:
  - y del mal de sus obras
  - y de las malas obras que hacen
  lexicon: HALOT
  rationale: La construcción hebrea abstracto + concreto se refleja con «maldad de sus obras», que conserva la relación entre la cualidad moral y los actos. «Obras» mantiene el campo semántico de מַעַלְלִים.
theological_decisions:
- issue: Naturaleza de סוֹד / participación profética
  english_pob_reading: Rendered as 'my council' to reflect the prophetic image of participation in the LORD's deliberative assembly.
  chosen_spanish_reading: «Mi consejo» conserva la imagen de participación en el círculo deliberativo de Yahvé.
  alternative_spanish_readings:
  - mi consejo secreto
  - mi consejo íntimo
  - mi consejo deliberativo
  rationale: El hebreo admite una esfera íntima y deliberativa; «consejo» en español permite mantener ambas sin resolver artificialmente la tensión entre consejo y secreto. Dado el trasfondo profético, la lectura sugiere acceso verdadero a la deliberación divina, no mera opinión humana.
  doctrine_reference: Jeremías 23:18–22; cf. el uso profético de סוֹד en la tradición bíblica
- issue: Causatividad ética de los verbos
  english_pob_reading: they would have caused my people to hear ... and they would have turned them
  chosen_spanish_reading: «habrían hecho oír» y «los habrían hecho volver»
  alternative_spanish_readings:
  - habrían proclamado
  - los habrían traído de vuelta
  rationale: 'La cláusula describe la función de un verdadero profeta: no solo hablar, sino producir escucha y retorno del pueblo. «Hacer oír» y «hacer volver» conservan la causalidad del hebreo sin desdibujar el llamado al arrepentimiento práctico.'
  doctrine_reference: Jeremías 23:16-22; la responsabilidad profética de confrontar el pecado
translation_notes:
  revision_awareness: Se revisó el enunciado para mantener el contraste adversativo, la contrafactualidad, la causalidad de los verbos hebreos y la doble expresión moral final. La redacción actual sigue de cerca el audit trail inglés del POB, pero adapta la sintaxis al español natural sin perder el valor de los términos clave.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo donde el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se preserva la metáfora de «camino» para דֶּרֶךְ y la relación abstracto-concreta de «maldad de sus obras».
  - «Consejo» se usa como equivalente de סוֹד conforme al audit trail; la nota recoge las alternativas documentadas.
  - La frase «hacer oír» refleja el causativo hebreo y evita reducir la idea a mera proclamación.
