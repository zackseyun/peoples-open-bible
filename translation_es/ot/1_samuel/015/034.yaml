translation:
  language: es
  text: Entonces Samuel fue a Ramá[a], y Saúl subió a su casa en Guibeá de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Saúl de Guibeá». El hebreo preserva el nombre del lugar en la forma «Guibeá de Saúl».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: El verbo narrativo הלך en esta forma suele avanzar la acción con el sentido simple de ir. En español, «fue» comunica ese movimiento de manera natural y evita una repetición innecesaria de «ir» o una paráfrasis más fuerte.
- source_word: הָרָמָתָה
  english_pob_choice: to Ramah
  chosen_spanish: a Ramá
  alternatives_spanish:
  - hacia Ramá
  - a la Ramá
  lexicon: HALOT
  rationale: El artículo-direccional hebreo expresa movimiento hacia el lugar. En español se resuelve de forma natural con la preposición «a» ante el topónimo, manteniendo el nombre propio «Ramá».
- source_word: עָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: עלה conserva aquí el matiz topográfico de ascenso. «Subió» transmite ese valor con naturalidad en español y preserva mejor el detalle espacial que un simple «fue».
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su morada
  lexicon: HALOT
  rationale: בַּיִת con sufijo posesivo se refiere de manera directa a la casa de Saúl. «Su casa» es la equivalencia más clara y cercana al hebreo; «casa» se prefiere sobre «hogar» por la mayor correspondencia léxica.
- source_word: גִּבְעַת שָׁאוּל
  english_pob_choice: Gibeah of Saul
  chosen_spanish: Guibeá de Saúl
  alternatives_spanish:
  - Saúl's Gibeah
  - Guibeá de Saúl
  lexicon: HALOT
  rationale: Se preserva el nombre propio transliterado y la relación genitiva del hebreo. «Guibeá de Saúl» refleja directamente la forma מקור original sin convertirla en una expresión interpretativa o posesiva más libre.
theological_decisions:
- issue: Topónimo tradicional con posible lectura posesiva
  english_pob_reading: The Hebrew preserves the place name in the form 'Gibeah of Saul.'
  chosen_spanish_reading: El hebreo preserva el nombre del lugar como «Guibeá de Saúl».
  alternative_spanish_readings:
  - «Saúl de Guibeá»
  - «la Guibeá de Saúl»
  rationale: 'No hay problema doctrinal, pero sí una decisión de forma: conviene mantener la estructura del hebreo y el valor de nombre de lugar. La traducción evita forzar una posesión explicativa que el texto no desarrolla y conserva la identificación geográfica.'
  doctrine_reference: Toponimia bíblica y principio de correspondencia formal moderada
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que cambió «at Gibeah of Saul» por «in Gibeah of Saul» para ajustarse mejor a la relación con «his house». En español, «en Guibeá de Saúl» sería posible, pero «en su casa en Guibeá de Saúl» resulta menos natural; por eso se optó por «subió a su casa en Guibeá de Saúl», que conserva la localización sin sonar forzado.
  spanish_consistency_notes:
  - Se usó «Ramá» para el topónimo, en línea con la transliteración española habitual.
  - Se mantuvo «Guibeá» como forma transliterada consistente con un registro bíblico lector, no «Gibea» ni una castellanización excesiva.
  - Se prefirió «subió» para reproducir el valor espacial de עלה, sin necesidad de marcar un ascenso literal adicional.
  - La nota al pie se ancla solo en el topónimo, porque esa es la única alternativa lexical relevante preservada por el audit trail.
