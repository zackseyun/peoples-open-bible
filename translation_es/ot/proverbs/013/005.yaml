translation:
  language: es
  text: El justo aborrece la palabra de mentira[a], pero el malvado se hace odioso[b] y cae en vergüenza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la falsedad”. El hebreo dice literalmente “palabra de mentira”.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: “actúa vergonzosamente y causa deshonra”, o bien “se vuelve odioso y es avergonzado”. Los dos verbos hebreos permiten matices activos o resultativos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר שֶׁקֶר
  english_pob_choice: a lying word
  chosen_spanish: la palabra de mentira
  alternatives_spanish:
  - una palabra falsa
  - falsedad
  - una palabra mentirosa
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente “palabra de mentira/falsedad”. En español, “palabra de mentira” conserva el sustantivo concreto “palabra” y refleja bien la relación genitiva sin volverlo demasiado abstracto. Mantiene además la tensión entre un dicho falso concreto y la abstracción de “falsedad”.
- source_word: יִשְׂנָא
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - detesta
  lexicon: HALOT
  rationale: El qal de שׂנא expresa aversión fuerte. “Aborrece” suena natural en español bíblico y conserva la intensidad moral de “hates” sin sonar demasiado coloquial.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - un hombre justo
  - la persona justa
  - el recto
  lexicon: HALOT
  rationale: El sustantivo adjetival singular funciona como tipo proverbial. En español, “el justo” preserva el valor substantivado y la forma proverbial sin forzar un masculino explícito innecesario.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - un hombre malvado
  - el perverso
  lexicon: HALOT
  rationale: La contraparte de צַדִּיק requiere un término fuerte y proverbial. “Malvado” mantiene la antítesis moral y es suficientemente amplio para el registro sapiencial.
- source_word: יַבְאִישׁ
  english_pob_choice: acts shamefully
  chosen_spanish: actúa vergonzosamente
  alternatives_spanish:
  - hace algo vergonzoso
  - se vuelve repugnante
  - despide mal olor
  lexicon: HALOT
  rationale: El verbo hiphil de באש puede apuntar a volverse odioso, causar repulsión o quedar con mal olor. Dado que el texto inglés optó por una lectura moralizada y el contexto paralelístico con “deshonra”, “actúa vergonzosamente” comunica la fuerza evaluativa sin imponer la metáfora olfativa como única opción.
- source_word: וְיַחְפִּיר
  english_pob_choice: and disgracefully / or becomes shameful / is put to shame
  chosen_spanish: y con deshonra
  alternatives_spanish:
  - y vergonzosamente
  - y es avergonzado
  - y se cubre de vergüenza
  lexicon: HALOT
  rationale: 'El verbo admite tanto sentido activo como pasivo: causar vergüenza o sufrir vergüenza. Para no borrar esa tensión, “con deshonra” funciona como equivalente amplio y deja abierta la relación con la vergüenza/deshonra del paralelo hebreo.'
theological_decisions:
- issue: La forma proverbial de “el justo” y “el malvado” como tipos morales representativos
  english_pob_reading: A righteous man... a wicked man...
  chosen_spanish_reading: El justo... el malvado...
  alternative_spanish_readings:
  - Un hombre justo... un hombre malvado...
  - Los justos... los malvados...
  rationale: El hebreo usa singulares sustantivados que representan tipos morales, no necesariamente individuos aislados. El singular con artículo en español conserva la fuerza proverbial y la antítesis ética del verso.
  doctrine_reference: Sabiduría bíblica; lenguaje proverbial tipológico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que suavizó la segunda mitad para evitar un literalismo incómodo (“stinks”) y conservar el campo semántico de vergüenza/deshonra. También se respetó la decisión auditada de mantener la concreción de “word” en la primera cláusula en lugar de abstraerla a “falsehood”.
  spanish_consistency_notes:
  - Se evitó “SEÑOR” y otros sustitutos innecesarios porque este verso no contiene el nombre divino.
  - Se prefirió “el justo / el malvado” como sustantivos proverbiales masculinos en singular, coherentes con la estructura del hebreo.
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando calcos demasiado duros como “palabra mentirosa” o “despide hedor”, que oscurecerían el paralelismo sapiencial.
