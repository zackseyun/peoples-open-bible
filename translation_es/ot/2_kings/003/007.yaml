translation:
  language: es
  text: 'Y fue y envió mensaje a Josafat, rey de Judá, diciendo: «El rey de Moab se ha rebelado contra mí. ¿Irás conmigo contra Moab para la batalla?». Y él dijo: «Iré. Yo soy como tú; mi pueblo como tu pueblo, mis caballos como tus caballos».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So he went
  chosen_spanish: Y fue
  alternatives_spanish:
  - Entonces fue
  - Y se fue
  lexicon: HALOT
  rationale: El hebreo avanza la narración con una forma consecutiva simple; «Y fue» mantiene la secuencia narrativa sin sobreexplicar.
- source_word: וַיִּשְׁלַח אֶל
  english_pob_choice: and sent word to
  chosen_spanish: envió mensaje a
  alternatives_spanish:
  - envió palabra a
  - mandó decir a
  lexicon: HALOT
  rationale: Con אֶל y una cita directa, el sentido es el de enviar un mensaje. «Envió mensaje a» es natural en español y conserva el acto comunicativo.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: convencional Spanish biblical form
  rationale: Se usa la forma bíblica habitual en español, inteligible para lectores de iglesia, sin alterar el referente.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  - rey sobre Judá
  lexicon: HALOT
  rationale: La construcción posesiva-identificadora se vierte de modo directo y transparente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: Fórmula narrativa estándar para introducir discurso directo.
- source_word: מֶלֶךְ מוֹאָב פָּשַׁע בִּי
  english_pob_choice: The king of Moab has rebelled against me
  chosen_spanish: El rey de Moab se ha rebelado contra mí
  alternatives_spanish:
  - El rey de Moab se ha apartado de mí
  - El rey de Moab ha quebrantado su lealtad hacia mí
  lexicon: HALOT
  rationale: En contexto político, פשע denota rebelión de un vasallo. «Se ha rebelado contra mí» preserva esa fuerza histórica y relacional.
- source_word: הֲתֵלֵךְ אִתִּי
  english_pob_choice: Will you go with me
  chosen_spanish: ¿Irás conmigo?
  alternatives_spanish:
  - ¿Vendrás conmigo?
  - ¿Te irás conmigo?
  lexicon: HALOT
  rationale: «Irás conmigo» mantiene el verbo básico הלך y su valor de movimiento sin cambiar a «venir», que sería más perspectival.
- source_word: אֶל מוֹאָב לַמִּלְחָמָה
  english_pob_choice: against Moab for battle
  chosen_spanish: contra Moab para la guerra
  alternatives_spanish:
  - a Moab para la batalla
  - contra Moab para batalla
  lexicon: HALOT
  rationale: El hebreo expresa dirección hostil hacia Moab con finalidad militar. «Para la guerra» conserva la finalidad bélica de forma sobria y natural.
- source_word: אֶעֱלֶה
  english_pob_choice: I will go
  chosen_spanish: Subiré
  alternatives_spanish:
  - Iré
  - Marcharé
  lexicon: HALOT
  rationale: Aquí conviene retener «subir» por la fuerza literal y militar del verbo עלה, que el propio contexto permite y la POB reconoce con nota en inglés.
- source_word: כָּמוֹנִי כָמוֹךָ
  english_pob_choice: I am as you are
  chosen_spanish: Yo soy como tú
  alternatives_spanish:
  - Soy como tú
  - Soy igual que tú
  lexicon: HALOT
  rationale: La equivalencia mutua se expresa de forma clara y idiomática en español, conservando la solidaridad formulada en el hebreo.
- source_word: כְעַמִּי כְעַמֶּךָ
  english_pob_choice: my people as your people
  chosen_spanish: mi pueblo como tu pueblo
  alternatives_spanish:
  - mi gente como tu gente
  - mi pueblo es como tu pueblo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo nominal del hebreo sin añadir verbos innecesarios.
- source_word: כְּסוּסַי כְּסוּסֶיךָ
  english_pob_choice: my horses as your horses
  chosen_spanish: mis caballos como tus caballos
  alternatives_spanish:
  - mis caballos son como tus caballos
  - mis corceles como tus corceles
  lexicon: HALOT
  rationale: «Caballos» reproduce el término base y conserva la posible alusión militar a recursos de guerra.
theological_decisions:
- issue: Valor de פָּשַׁע en contexto político-teológico
  english_pob_reading: has rebelled against me
  chosen_spanish_reading: se ha rebelado contra mí
  alternative_spanish_readings:
  - se ha apartado de mí
  - ha quebrantado su lealtad hacia mí
  rationale: La frase describe la ruptura de vasallaje entre reinos; no se suaviza como simple distanciamiento. La traducción elegida conserva la carga política y relacional del verbo.
  doctrine_reference: 2 Kings 3:7; uso histórico-político del lenguaje de rebelión en la narrativa deuteronomista
- issue: Retener la fuerza de אֶעֱלֶה
  english_pob_reading: I will go
  chosen_spanish_reading: Subiré
  alternative_spanish_readings:
  - Iré
  - Marcharé
  rationale: Aunque el inglés POB opta por «I will go» por fluidez, el hebreo literalmente dice «subiré» y el contexto militar justifica conservar esa imagen sin oscurecer el sentido.
  doctrine_reference: 2 Kings 3:7; semántica direccional y militar de עלה
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «to fight against Moab» a «against Moab for battle» para acercarse más al hebreo אֶל מוֹאָב לַמִּלְחָמָה. En español se reflejó esa sobriedad con «contra Moab para la guerra», evitando intensificar innecesariamente la acción. También se mantuvo la nota conceptual sobre עלה mediante «Subiré» en lugar de nivelar a «iré».
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino según la pauta general, aunque este versículo no contiene el tetragrámaton.
  - Se usó «rey de Judá» y «rey de Moab» de forma uniforme para preservar la identificación política del pasaje.
  - «Josafat» sigue la forma castellana usual, coherente con el registro bíblico en español.
  - El paralelismo final se mantuvo casi literal para no perder la estructura enfática del hebreo.
