theological_decisions:
- issue: Use of the Greek parallel versus the Hebrew witness
  chosen_reading: Translate from the extant Hebrew as the primary witness, while allowing the Greek parallel to signal that the textual tradition at this point is unstable.
  alternative_readings:
  - 'Greek parallel: ''Remember that anger does not last long'''
  rationale: For Sirach, the project translates from the Hebrew where it survives. Here the Hebrew and Greek differ sharply, indicating a divergent textual tradition rather than a minor wording variation. The main text therefore follows the Hebrew, but the Greek alternative is preserved in a footnote because it materially affects interpretation and may reflect a different Vorlage or line placement.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
