translation:
  language: es
  text: Entonces se levantaron los jefes de las casas paternas[a] de las tribus de Judá y de Benjamín, y los sacerdotes y los levitas, y todos aquellos cuyo espíritu el Señor había movido, para subir a edificar la casa del Señor que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo de Esdras 1:5 dice: "todos aquellos cuyo espíritu Dios había movido". Aquí 1 Esdras dice: "el Señor".'
    reason: alternative_reading
lexical_decisions:
- source_word: καταστήσαντες / וַיָּק֜וּמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron en pie
  - se alzaron
  - se levantaron y fueron
  lexicon: LSJ / HALOT
  rationale: La forma griega transmitida es algo áspera, pero el paralelo hebreo apoya claramente la idea de levantarse o ponerse en pie. En español, 'se levantaron' conserva el movimiento inicial sin añadir una interpretación demasiado fuerte.
- source_word: οἱ ἀρχίφυλοι τῶν πατριῶν / רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the ancestral houses
  chosen_spanish: los cabezas de las casas patriarcales
  alternatives_spanish:
  - los jefes de las casas paternas
  - los cabezas de los linajes
  - los jefes de las familias
  lexicon: LSJ / HALOT
  rationale: '''Casas patriarcales'' mantiene la estructura de parentesco del original y evita reducir el término a una simple familia nuclear. ''Cabezas'' reproduce el valor de liderazgo de ἀρχίφυλοι y de ראשי.'
- source_word: τῆς Ἰούδα καὶ Βενιαμεὶν φυλῆς
  english_pob_choice: of the tribes of Judah and Benjamin
  chosen_spanish: de las tribus de Judá y de Benjamín
  alternatives_spanish:
  - de Judá y Benjamín
  - de la tribu de Judá y de Benjamín
  lexicon: LSJ
  rationale: La revisión inglesa añadió 'the tribes of' para reflejar mejor φυλῆς; el español lo expresa de forma directa y natural con el plural 'tribus'.
- source_word: ἤγειρεν ... τὸ πνεῦμα / הֵעִיר ... אֶת־רוּחוֹ
  english_pob_choice: had stirred up ... spirit
  chosen_spanish: había movido
  alternatives_spanish:
  - había despertado
  - había incitado
  - había despertado el espíritu
  lexicon: LSJ / HALOT
  rationale: '''Mover el espíritu'' es una forma bíblica natural en español y conserva la imagen de impulso interior sin forzar una psicología moderna. Evita también la ambigüedad de ''incitar'', que puede sonar agresiva.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: LSJ
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה en el texto hebreo, aquí la fuente primaria griega dice Κύριος. En español, 'el Señor' respeta esa forma del testimonio griego y mantiene la referencia reverente al título divino.
- source_word: ἀναβῆναι
  english_pob_choice: to go up
  chosen_spanish: para subir
  alternatives_spanish:
  - para ascender
  - para ir
  - para ir subiendo
  lexicon: LSJ
  rationale: '''Subir'' conserva el idiomatismo bíblico de ir a Jerusalén y suena natural en español contemporáneo.'
- source_word: οἰκοδομῆσαι οἶκον
  english_pob_choice: to build the house
  chosen_spanish: a edificar la casa
  alternatives_spanish:
  - a construir la casa
  - a reedificar la casa
  - a edificar un templo
  lexicon: LSJ
  rationale: '''Edificar'' es una opción digna y bíblica en español, cercana a ''build'' sin introducir explícitamente una ''re-'' que el griego no tiene. ''La casa'' conserva el referente sagrado del templo.'
- source_word: τῷ κυρίῳ τὸν ἐν Ἱερουσαλήμ
  english_pob_choice: of the Lord that is in Jerusalem
  chosen_spanish: la casa del Señor que está en Jerusalén
  alternatives_spanish:
  - la casa del Señor en Jerusalén
  - la casa del Señor, la que está en Jerusalén
  lexicon: LSJ
  rationale: 'La frase se entiende mejor como identificación del templo: pertenece al Señor y está en Jerusalén. En español, ''la casa del Señor que está en Jerusalén'' es claro y sigue de cerca el griego.'
theological_decisions:
- issue: 'Designación divina: κύριος frente al paralelo hebreo ''Dios'''
  english_pob_reading: the Lord had stirred up
  chosen_spanish_reading: el Señor había movido
  alternative_spanish_readings:
  - Dios había movido
  - Yahvé había movido
  rationale: En 1 Esdras, el testimonio primario es el griego, que usa Κύριος. Aunque el paralelo hebreo de Esdras 1:5 dice 'Dios', la traducción española sigue el griego y mantiene 'el Señor' en el cuerpo del texto, reservando la observación comparativa para nota si fuera necesario.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma fuente en deuterocanónicos; κύριος como título divino en el testimonio griego'
translation_notes:
  revision_awareness: Se incorporó la revisión que hace explícito el plural 'tribus' para reflejar mejor φυλῆς, y se mantuvo la lectura griega primaria para Κύριος frente al paralelo hebreo. También se corrigió la relación entre nota y texto, anclando la única nota con [a] en la frase correspondiente.
  spanish_consistency_notes:
  - Se prefirió 'el Señor' por corresponder a Κύριος en el griego, no por una máscara automática del nombre divino hebreo.
  - '''Casas patriarcales'' conserva la estructura de parentesco del original y evita modernizar en exceso a ''familias''.'
  - '''Subir'' y ''edificar'' mantienen el registro bíblico sin introducir un giro interpretativo adicional.'
  - La nota [a] está anclada directamente en 'casas patriarcales' para evitar una nota sin marcador visible.
