id: 2CH.6.39
reference: 2 Chronicles 6:39
source:
  edition: WLC
  text: וְ/שָׁמַעְתָּ֨ מִן הַ/שָּׁמַ֜יִם מִ/מְּכ֣וֹן שִׁבְתְּ/ךָ֗ אֶת תְּפִלָּתָ/ם֙ וְ/אֶת תְּחִנֹּ֣תֵי/הֶ֔ם וְ/עָשִׂ֖יתָ מִשְׁפָּטָ֑/ם וְ/סָלַחְתָּ֥ לְ/עַמְּ/ךָ֖ אֲשֶׁ֥ר חָֽטְאוּ לָֽ/ךְ־־־־׃
translation:
  text: then hear from heaven[a], from the place where you dwell, their prayer and their pleas, and maintain their cause, and forgive your people who have sinned against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grant them justice' or 'do justice for them.' The Hebrew literally says 'do their judgment/case.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  chosen: then hear
  alternatives:
  - and hear
  - hear
  lexicon: HALOT
  rationale: Qal perfect 2ms in a prayer context functions as a petition/wish directed to God. English idiom renders this as an imperative-like request. 'Then' reflects the discourse continuation from the preceding conditional context better than a bare 'and.'
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, 'heaven' is the natural English equivalent in this idiom. Retaining singular avoids awkwardness while preserving the sense of God's heavenly hearing.
- source_word: מִמְּכוֹן שִׁבְתְּךָ
  chosen: from the place where you dwell
  alternatives:
  - from your dwelling place
  - from your settled habitation
  lexicon: HALOT
  rationale: מָכוֹן denotes an established place/fixed dwelling, and שִׁבְתְּךָ specifies God's dwelling. 'The place where you dwell' is clear modern English and preserves the locative force without archaic phrasing.
- source_word: תְּפִלָּתָם
  chosen: their prayer
  alternatives:
  - their prayer petition
  lexicon: HALOT
  rationale: Standard rendering for תְּפִלָּה. Singular collective fits the Hebrew and English well.
- source_word: תְּחִנֹּתֵיהֶם
  chosen: their pleas
  alternatives:
  - their supplications
  - their entreaties
  lexicon: HALOT
  rationale: This term emphasizes earnest appeals for mercy. 'Pleas' is more readable modern English than 'supplications' while preserving the intensity and distinction from 'prayer.'
- source_word: וְעָשִׂיתָ מִשְׁפָּטָם
  chosen: and uphold their cause
  alternatives:
  - and execute their judgment
  - and grant them justice
  - and do justice for them
  lexicon: HALOT
  rationale: The idiom 'do/perform their משפט' in context means to act on their behalf judicially, vindicating them or giving them justice. 'Uphold their cause' captures the forensic sense in idiomatic English without sounding wooden. Alternatives like 'execute their judgment' are too opaque in modern English.
- source_word: וְסָלַחְתָּ
  chosen: and forgive
  alternatives:
  - and pardon
  lexicon: HALOT
  rationale: Standard rendering of סלח in divine-forgiveness contexts. 'Forgive' is the clearest and most consistent English gloss.
- source_word: לְעַמְּךָ
  chosen: your people
  alternatives:
  - to your people
  lexicon: HALOT
  rationale: The indirect-object sense is naturally carried in English by the verb phrase 'forgive your people.' Explicit 'to' is unnecessary in idiomatic English.
- source_word: אֲשֶׁר חָטְאוּ לָךְ
  chosen: who have sinned against you
  alternatives:
  - who sinned against you
  lexicon: HALOT
  rationale: The preposition לְ with חטא here conveys offense directed against God; English idiom is 'sin against.' The perfect is rendered 'have sinned' to fit the prayer's present relevance.
