revisions:
- from: 'Entonces Saúl había tomado la realeza sobre Israel, y combatió por todos lados contra todos sus enemigos: contra Moab, contra los amonitas, contra Edom, contra los reyes de Zobá y contra los filisteos. Dondequiera que se volvía, infligía castigo[a].'
  to: 'Entonces Saúl había tomado el reinado sobre Israel, y combatió por todos lados contra todos sus enemigos: contra Moab, contra los amonitas, contra Edom, contra los reyes de Zobá y contra los filisteos. Adondequiera que se dirigía, infligía castigo[a].'
  rationale: Se reemplazó 'la realeza' por 'el reinado' para reflejar mejor הַמְּלוּכָה como ejercicio/posesión del gobierno real, no la cualidad abstracta de ser rey. Se cambió 'Dondequiera que se volvía' por 'Adondequiera que se dirigía' para expresar con más naturalidad el sentido distributivo de פנה. También se pulió la nota al pluralizar 'los condenaba' para corresponder al objeto implícito 'sus enemigos'.
