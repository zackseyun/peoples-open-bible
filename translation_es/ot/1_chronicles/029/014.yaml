review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: contraste humilde (''Pero''), pregunta retórica de indignidad, capacidad para ofrecer voluntariamente, y la afirmación de que todo procede de Dios y vuelve a él. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: (1) ''quiénes son mi pueblo'' es una discordancia gramatical en español y además debilita el sujeto colectivo singular hebreo עַמִּי; debe ser ''quién es mi pueblo''; (2) la nota al pie no preserva una verdadera alternativa, porque repite esencialmente la misma redacción del texto principal. También conviene mejorar ''tengamos fuerza de ofrecer'' a una forma más natural y fiel al valor idiomático de capacidad, como ''podamos ofrecer''.'
  spanish_quality_summary: El español es en general claro y digno, pero presenta una incorrección notable de concordancia ('quiénes son mi pueblo'). Además, 'tengamos fuerza de ofrecer' suena algo forzado en español moderno; 'podamos ofrecer' comunica mejor la capacidad implícita sin perder sentido. La cláusula final 'de tu mano te lo hemos dado' es buena y natural, preservando la imagen hebrea.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La teología de procedencia divina y devolución a Dios está bien conservada. La decisión 'ofrecer voluntariamente' encaja con לְהִתְנַדֵּב. La única corrección léxica principal es preferir 'podamos' en el texto y reservar la opción más formal/literal sobre 'fuerza' para la nota.
  issues:
  - severity: high
    issue: Discordancia en '¿quiénes son mi pueblo?'
    rationale: 'El hebreo עַמִּי es singular colectivo (''mi pueblo''). En español, ''mi pueblo'' exige singular: ''¿quién es mi pueblo?''. La forma plural ''quiénes son'' es gramaticalmente incorrecta y altera la presentación retórica del sujeto colectivo.'
  - severity: medium
    issue: '''Tengamos fuerza de ofrecer'' suena poco natural en español'
    rationale: Aunque refleja más de cerca la nota formal inglesa sobre נַעְצֹר כֹּחַ, el sentido principal auditado por POB es 'ser capaces / poder'. En español bíblico legible, 'podamos ofrecer voluntariamente así' comunica mejor el idiomatismo hebreo.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real
    rationale: 'La nota repite casi exactamente el texto principal, por lo que no cumple la función de preservar una opción léxica alternativa. Debe invertirse: texto principal con la opción natural (''podamos'') y nota con la opción más formal (''tengamos fuerza'').'
  revised_spanish_text: Pero ¿quién soy yo[a], y quién es mi pueblo, para que podamos ofrecer voluntariamente así? Porque todo viene de ti, y de tu mano te lo hemos dado.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «para que tengamos fuerza de ofrecer voluntariamente así».'
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia de 'mi pueblo' al singular, se mejora la naturalidad y fidelidad idiomática de נַעְצֹר כֹּחַ con 'podamos', y se reestructura la nota para que preserve de verdad la alternativa más formal documentada en la auditoría inglesa.
