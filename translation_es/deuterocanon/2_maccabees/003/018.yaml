review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: habitantes saliendo de sus casas, movimiento colectivo, súplica pública, e inminente deshonra del templo referido como «el lugar». Sin embargo, «los que salían de las casas» desplaza el foco de οἱ δὲ ἐκ τῶν οἰκιῶν, que identifica a los procedentes de las casas, mientras ἐξεπήδων aporta la acción de salir precipitadamente. Conviene evitar repartir dos veces la idea de salida entre sujeto y verbo.'
  spanish_quality_summary: El español es claro y digno, pero «se apresuraban en grupos» suena algo débil frente a la viveza de ἐξεπήδων. Una formulación como «salían apresuradamente en grupos» o «iban saliendo apresuradamente en grupos» conserva mejor el movimiento urgente sin sonar forzada. El resto es natural y legible. La nota al pie está bien anclada y formulada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Súplica pública» y «el lugar» siguen bien el rastro léxico del POB inglés. La nota que aclara que se trata del recinto del templo preserva correctamente la decisión teológica/lexical de no explicitar «templo» en el texto principal.
  issues:
  - severity: medium
    issue: El sujeto «los que salían de las casas» introduce en οἱ δὲ ἐκ τῶν οἰκιῶν una acción de salir que en griego corresponde principalmente a ἐξεπήδων.
    rationale: La frase griega distingue entre «los de/desde las casas» y luego «salían precipitadamente». En español, el borrador fusiona ambos elementos y reduce la fuerza verbal posterior.
  - severity: low
    issue: «Se apresuraban» atenúa la imagen vívida de ἐξεπήδων.
    rationale: El verbo griego evoca irrupción o salida precipitada; «se apresuraban» expresa urgencia, pero no tan claramente el movimiento hacia afuera.
  revised_spanish_text: Y los de las casas salían apresuradamente en grupos para una súplica pública[a], porque el lugar estaba a punto de caer en desprecio.
  revised_footnotes:
  - marker: a
    text: Es decir, el recinto del templo; el griego dice simplemente «el lugar».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la primera cláusula para reflejar más fielmente la distribución del sentido en griego: οἱ δὲ ἐκ τῶν οἰκιῶν = «los de las casas», y ἐξεπήδων = «salían apresuradamente». Así se preserva mejor la viveza del original sin perder naturalidad en español. Se mantiene «súplica pública» y «el lugar» con la nota explicativa, en línea con el POB inglés.'
