review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura comparativa del hebreo, el agente implícito con pasiva/impersonal, el nombre divino Yahvé, y el propósito cultual final. Sin embargo, se aparta del rastro auditado del POB en un punto importante: לְכַפֵּר se documentó en inglés como ''to make atonement'', y en español ''hacer expiación'' estrecha algo el sentido frente a la formulación más amplia y establecida ''hacer expiación/atonación''. En español eclesial legible, la mejor equivalencia aquí es ''hacer expiación'' o ''hacer expiación por ustedes'', pero dado el criterio del proyecto de preservar la tensión teológica y la redacción inglesa auditada, conviene usar una formulación más cercana a ''hacer expiación'' solo si se justifica. Aun así, el problema más claro es de naturalidad: ''en este día'' suena menos idiomático que ''en este día''/''hoy''; y ''ha mandado hacerlo'' es comprensible pero algo menos natural que ''ha mandado que se haga'' para reflejar לַעֲשֹׂת con
    acción prescrita impersonal.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad ceremonial. 'Así como se ha hecho en este día' suena algo rígido; 'Tal como se ha hecho en este día' o 'Así como se ha hecho hoy' serían más fluidos. 'Ha mandado hacerlo' funciona, pero en contexto ritual 'ha mandado que se haga' refleja mejor una acción ordenada a realizarse sin sujeto explícito. El texto es legible, pero una pequeña revisión lo haría más natural sin perder precisión.
  glossary_alignment: 'Alinea bien con ''Yahvé'' para יהוה. No hay conflicto con otros términos base del glosario. El punto revisable es כפר: aunque ''expiación'' es defendible, el rastro inglés privilegia ''make atonement''; en español conviene explicitar en la justificación que se usa ''expiación'' como equivalente cultual amplio, o bien ajustar a una formulación más neutral. Para esta revisión mínima, se conserva ''expiación'' por buena inteligibilidad en español bíblico, pero se corrige la sintaxis del mandato.'
  issues:
  - severity: medium
    issue: '''ha mandado hacerlo'' suena menos natural y menos preciso para לַעֲשֹׂת'
    rationale: El infinitivo hebreo expresa la acción prescrita para ser realizada; en español, 'ha mandado que se haga' comunica mejor el matiz impersonal/ritual que 'hacerlo', que puede sonar coloquial o demasiado directo.
  - severity: low
    issue: '''Así como se ha hecho en este día'' es algo rígido en español'
    rationale: Aunque fiel, la frase resulta menos natural que alternativas como 'Tal como se ha hecho en este día' o 'Así como se hizo hoy' en la nota. Puede mantenerse, pero admite mejora estilística menor.
  revised_spanish_text: Así como se ha hecho en este día[a], Yahvé ha mandado que se haga, para hacer expiación por ustedes.
  revised_footnotes:
  - marker: a
    text: 'O: «Así como se hizo hoy, así Yahvé mandó que se hiciera, para hacer expiación por ustedes».'
    reason: lexical_alternative
