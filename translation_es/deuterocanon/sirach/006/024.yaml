    text: El testimonio hebreo conservado para este versículo es textual­mente incierto y no concuerda bien con el paralelo griego. Aquí se sigue la revisión más reciente del proyecto, que entiende la línea hebrea como un proverbio sobre el fruto, el cultivo, el razonamiento y la inclinación.
    reason: textual_variant
  revision_rationale: Se conserva el texto español principal, que es claro y fiel a la revisión inglesa más reciente, pero se corrige la nota para representar con honestidad la incertidumbre textual documentada en el expediente y evitar una afirmación excesiva sobre la estabilidad del hebreo.
