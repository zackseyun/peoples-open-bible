translation:
  language: es
  text: Mía es la venganza[a] y la retribución, cuando su pie resbale[b]; porque cercano está el día de su desastre, y se apresura lo que les ha sido preparado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «retribución» o «resarcimiento» para el sentido de «pago debido».
    reason: lexical_alternative
  - marker: b
    text: O «su pie da un traspié» o «su pie vacila».
    reason: lexical_alternative
  - marker: c
    text: O «las cosas destinadas para ellos se apresuran»; el hebreo es conciso.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: mía es
  alternatives_spanish:
  - es mío
  - a mí me pertenece
  lexicon: HALOT
  rationale: El hebreo expresa posesión/dative de primera persona; en español, la inversión posesiva «mía es» mantiene el énfasis solemne y evita una construcción menos natural como «a mí pertenece».
- source_word: נָקָם
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - vindicacion
  lexicon: HALOT
  rationale: «Venganza» conserva el peso judicial y el eco intertextual del texto fuente. «Retribución» puede servir para el segundo miembro, pero aquí el primer sustantivo debe mantener la fuerza del término hebreo.
- source_word: וְשִׁלֵּם
  english_pob_choice: recompense
  chosen_spanish: la retribución
  alternatives_spanish:
  - la recompensa debida
  - el resarcimiento
  lexicon: HALOT
  rationale: El término nominalizado acompaña a «venganza» como segundo miembro paralelo. «Retribución» comunica la idea de pago debido sin reducirlo a una equivalencia meramente comercial.
- source_word: לְעֵת
  english_pob_choice: at the time when
  chosen_spanish: al tiempo en que
  alternatives_spanish:
  - en el tiempo cuando
  - cuando
  lexicon: HALOT
  rationale: La frase preposicional introduce una cláusula temporal; «al tiempo en que» preserva el registro formal y el valor temporal del hebreo sin sonar arcaizante.
- source_word: תָּמוּט רַגְלָם
  english_pob_choice: their foot slips
  chosen_spanish: resbalará su pie
  alternatives_spanish:
  - su pie dará un paso en falso
  - les fallará el pie
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo con sufijo plural. «Resbalará su pie» mantiene la imagen corporal y la anticipación del tropiezo, con un español natural y solemne.
- source_word: כִּי קָרוֹב
  english_pob_choice: for ... is near
  chosen_spanish: porque cercano está
  alternatives_spanish:
  - pues está cerca
  - ya que cerca está
  lexicon: HALOT
  rationale: «Porque» conserva la relación causal/explicativa del hebreo. La inversión «cercano está» ayuda al tono poético y refleja la estructura enfática del original.
- source_word: יוֹם אֵידָם
  english_pob_choice: the day of their disaster
  chosen_spanish: el día de su desastre
  alternatives_spanish:
  - el día de su calamidad
  - el día de su ruina
  lexicon: HALOT
  rationale: «Desastre» es un equivalente claro y digno para אֵיד, preservando el sentido de destrucción inminente sin sobrecargar el verso.
- source_word: וְחָשׁ
  english_pob_choice: hastens
  chosen_spanish: se apresura
  alternatives_spanish:
  - se precipita
  - llega con rapidez
  lexicon: HALOT
  rationale: El verbo expresa velocidad de aproximación. «Se apresura» conserva la compactación poética y el matiz de urgencia del texto.
- source_word: עֲתִדֹת לָמוֹ
  english_pob_choice: what is prepared for them
  chosen_spanish: lo que les ha sido preparado
  alternatives_spanish:
  - las cosas destinadas para ellos
  - lo destinado para ellos
  lexicon: HALOT
  rationale: La construcción es comprimida y apunta a lo que está preparado/establecido para ellos. «Lo que les ha sido preparado» mantiene la concreción del hebreo sin abstractizarlo indebidamente.
theological_decisions:
- issue: Prerrogativa divina de retribución
  english_pob_reading: Retain 'Vengeance is mine' as a statement of God's rightful judicial retribution, without softening it or turning it into personal vindictiveness.
  chosen_spanish_reading: Mía es la venganza
  alternative_spanish_readings:
  - Mía es la justicia
  - Yo tomaré venganza
  rationale: La lectura conserva la afirmación de derecho judicial divino y su resonancia canónica. «Justicia» diluye la fuerza del término; «yo tomaré venganza» cambia la formulación nominal del hebreo.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Naturaleza de lo preparado para ellos
  english_pob_reading: Translate concretely as 'what is prepared for them' rather than abstractly as 'their doom' in the main text.
  chosen_spanish_reading: lo que les ha sido preparado
  alternative_spanish_readings:
  - su condena
  - su destino
  rationale: La formulación concreta evita imponer una abstracción que el hebreo no explicita, dejando intacta la tensión entre preparación divina e inminencia del juicio.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «recompense» para וְשִׁלֵּם; en español se decidió por «retribución» como paralelo formal de «venganza», manteniendo el balance poético. También se preservó la concreción de עֲתִדֹת לָמוֹ con una perífrasis que no abstrae a «destino» como opción principal.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Venganza» se usa aquí en sentido judicial y no como venganza personal.
  - La imagen singular de «su pie» respeta el hebreo colectivo con sufijo plural.
  - Se evitó «Cristo» y cualquier terminología cristológica no pertinente al pasaje.
