translation:
  language: es
  text: La lechuza del desierto y el erizo[a] tomarán posesión de ella, y la lechuza y el cuervo habitarán en ella; él extenderá sobre ella la cuerda de medir de la desolación y las piedras de plomada del vacío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación de los animales nombrados aquí es incierta. 'Lechuza del desierto' también puede traducirse 'pelícano' o 'cormorán', y 'erizo' también puede traducirse 'puercoespín' o 'avetoro'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la cuerda de medir de tohu y las piedras de bohu''. La expresión remite a Génesis 1:2 (''sin forma y vacía'' / ''desorden y vacío'') y presenta la tierra como reducida a la no creación.'
    reason: cross_reference
lexical_decisions:
- source_word: וִירֵשׁוּהָ
  english_pob_choice: will possess her
  chosen_spanish: poseerán
  alternatives_spanish:
  - la heredarán
  - tomarán posesión de ella
  lexicon: HALOT
  rationale: ירשׁ puede significar poseer, heredar o tomar posesión. En este contexto de juicio y territorio arruinado, 'poseerán' comunica mejor la ocupación del lugar sin introducir la idea jurídica de herencia.
- source_word: קָאַת
  english_pob_choice: desert owl
  chosen_spanish: lechuza del desierto
  alternatives_spanish:
  - pelícano
  - cormorán
  lexicon: HALOT
  rationale: La identificación del ave es incierta. 'Lechuza del desierto' conserva el sentido de ave nocturna y de desolación en un español claro; la incertidumbre zoológica se mantiene en nota.
- source_word: קִפּוֹד
  english_pob_choice: hedgehog
  chosen_spanish: erizo
  alternatives_spanish:
  - puercoespín
  - avetoro
  lexicon: HALOT
  rationale: El término animal es discutido. 'Erizo' es una equivalencia natural en español y encaja con la imagen de ruina habitada por criaturas pequeñas; se preserva la incertidumbre en la nota.
- source_word: יַנְשׁוֹף
  english_pob_choice: owl
  chosen_spanish: lechuza
  alternatives_spanish:
  - búho
  - tecolote
  lexicon: HALOT
  rationale: יַנְשׁוֹף designa un ave nocturna, generalmente algún tipo de búho/lechuza. 'Lechuza' evita una precisión falsa y mantiene el paralelismo con aves de ruina.
- source_word: עֹרֵב
  english_pob_choice: raven
  chosen_spanish: cuervo
  alternatives_spanish:
  - grajo
  lexicon: HALOT
  rationale: עֹרֵב se traduce de forma estándar como 'cuervo'. En español, es la equivalencia más natural para la imagen de desolación.
- source_word: יִשְׁכְּנוּ בָהּ
  english_pob_choice: will dwell in her
  chosen_spanish: habitarán en ella
  alternatives_spanish:
  - vivirán en ella
  - se establecerán en ella
  lexicon: HALOT
  rationale: שׁכן expresa morar o habitar. 'Habitarán' conserva el tono solemne y la idea de residencia estable en el lugar devastado.
- source_word: וְנָטָה עָלֶיהָ
  english_pob_choice: he will stretch over her
  chosen_spanish: extenderá sobre ella
  alternatives_spanish:
  - tenderá sobre ella
  - alzará sobre ella
  lexicon: HALOT
  rationale: נטה aquí evoca extender una línea de medición. 'Extenderá sobre ella' suena natural en español y mantiene la imagen de un acto de trazado o medición judicial.
- source_word: קַו תֹהוּ
  english_pob_choice: the measuring line of desolation
  chosen_spanish: la cuerda de medir de la desolación
  alternatives_spanish:
  - la línea de caos
  - la cuerda de medir del vacío
  lexicon: HALOT
  rationale: קַו es una cuerda o línea de medir. 'Cuerda de medir' suena idiomático y concreto en español; 'desolación' comunica el contexto de juicio sin borrar el eco de תֹהוּ.
- source_word: וְאַבְנֵי בֹהוּ
  english_pob_choice: and the plumb stones of emptiness
  chosen_spanish: y las piedras de plomada del vacío
  alternatives_spanish:
  - y las piedras de medida del vacío
  - y las piedras del caos
  lexicon: HALOT
  rationale: אַבְנֵי aquí funciona en paralelo con el lenguaje de medición; 'piedras de plomada' conserva esa imagen. 'Vacío' refleja בֹהוּ y mantiene el eco de creación invertida.
theological_decisions:
- issue: Eco de Génesis 1:2 en תֹהוּ / בֹהוּ
  english_pob_reading: Render with judgment-oriented terms in the main text while preserving the creation-chaos echo in documentation/footnote
  chosen_spanish_reading: Traducir con términos de juicio en el texto principal, preservando en nota el eco de 'caos' y 'vacío'
  alternative_spanish_readings:
  - traducir más literalmente como 'caos' y 'vacío' en el cuerpo
  rationale: Isaías usa el lenguaje de Génesis 1:2 para describir la reversión de Edom a la des-creación. En el texto principal, 'desolación' y 'vacío' resultan más naturales y fieles al contexto inmediato, mientras la nota mantiene el enlace intertextual.
  doctrine_reference: 'Philosophy #3, #6'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios sustantivos: el pasaje quedó confirmado sin modificaciones necesarias, con acuerdo alto entre revisores.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto solo cuando aparezca el Tetragrámaton explícito; aquí no aparece.
  - '''Mesías/Cristo'' no aplica en este versículo.'
  - Se conserva la imagen de aves y criaturas de ruina con equivalencias naturales en español, sin forzar tecnicismos zoológicos.
  - '''Cuerda de medir'' y ''piedras de plomada'' preservan el campo semántico de medición judicial del hebreo.'
