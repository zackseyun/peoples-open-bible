translation:
  language: es
  text: Y Huram le envió[a], por mano de sus siervos, naves y siervos que conocían el mar[b]. Fueron con los siervos de Salomón a Ofir, tomaron de allí cuatrocientos cincuenta talentos de oro y los llevaron[c] al rey Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por mano de sus siervos», un modismo que significa «por medio de sus siervos».'
    reason: cultural_note
  - marker: b
    text: O «siervos experimentados en el mar» o simplemente «marineros». El hebreo dice literalmente «siervos que conocían el mar».
    reason: lexical_alternative
  - marker: c
    text: El hebreo tiene «los llevaron»; en español también podría traducirse «lo llevaron», refiriéndose colectivamente al oro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: En narrativa, שלח se expresa naturalmente como 'envió'. Mantiene el sentido básico de envío sin añadir matices de orden o despacho que el texto no exige.
- source_word: חוּרָם
  english_pob_choice: Huram
  chosen_spanish: Huram
  alternatives_spanish:
  - Hiram
  lexicon: Transliteración hebrea/uso propio
  rationale: Se conserva la forma hebrea 'Huram', coherente con el testimonio del texto fuente y con la elección inglesa documentada.
- source_word: בְּיַד עֲבָדָיו
  english_pob_choice: by the hand of his servants
  chosen_spanish: por mano de sus siervos
  alternatives_spanish:
  - por medio de sus siervos
  - a través de sus siervos
  lexicon: HALOT
  rationale: El giro hebreo es idiomático y señala mediación por agentes. 'Por mano de' preserva el color semítico y es claro en español; se eligió 'siervos' aquí porque la frase idiomática funciona mejor en registro bíblico español, aunque no se sustituye mecánicamente en otros contextos.
- source_word: אֳנִיּוֹת
  english_pob_choice: ships
  chosen_spanish: naves
  alternatives_spanish:
  - barcos
  - embarcaciones
  lexicon: HALOT
  rationale: '''Naves'' es un término digno y comprensible para el contexto marítimo de Ofir. Evita estrechar demasiado el referente y mantiene el registro narrativo elevado.'
- source_word: וַעֲבָדִים יֹדְעֵי יָם
  english_pob_choice: servants who knew the sea
  chosen_spanish: siervos que conocían el mar
  alternatives_spanish:
  - siervos experimentados en el mar
  - marineros
  lexicon: HALOT
  rationale: Se conserva tanto el estatuto de עבדים como su pericia marítima. 'Conocían el mar' reproduce bien el hebreo literal sin borrar la tensión entre condición social y habilidad náutica. 'Marineros' aclararía la función pero perdería 'siervos'.
- source_word: עִם עַבְדֵי שְׁלֹמֹה
  english_pob_choice: with Solomon’s servants
  chosen_spanish: con los siervos de Salomón
  alternatives_spanish:
  - con los servidores de Salomón
  lexicon: HALOT
  rationale: Se conserva la relación posesiva simple y el término 'siervos' para mantener continuidad con el campo léxico de עבד en el versículo.
- source_word: אוֹפִירָה
  english_pob_choice: to Ophir
  chosen_spanish: a Ofir
  alternatives_spanish:
  - hacia Ofir
  lexicon: Topónimo
  rationale: La he direccional se expresa naturalmente como 'a Ofir'. Es la opción más idiomática y fiel en español.
- source_word: וַיִּקְחוּ מִשָּׁם
  english_pob_choice: took from there
  chosen_spanish: tomaron de allí
  alternatives_spanish:
  - obtuvieron de allí
  - trajeron de allí
  lexicon: HALOT
  rationale: '''Tomaron de allí'' refleja el verbo לקח sin sobreinterpretar el modo de adquisición. ''De allí'' conserva la deixis narrativa.'
- source_word: אַרְבַּע מֵאוֹת וַחֲמִשִּׁים כִּכַּר זָהָב
  english_pob_choice: four hundred and fifty talents of gold
  chosen_spanish: cuatrocientos cincuenta talentos de oro
  alternatives_spanish:
  - 450 talentos de oro
  lexicon: HALOT
  rationale: Se preserva la unidad antigua 'talentos' y el número por extenso, conforme al registro bíblico. 'Oro' traduce de forma directa זָהָב.
- source_word: וַיָּבִיאוּ אֶל הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: and brought them to King Solomon
  chosen_spanish: y los llevaron al rey Salomón
  alternatives_spanish:
  - y lo llevaron al rey Salomón
  lexicon: HALOT
  rationale: Se mantiene el plural verbal y el antecedente colectivo implícito de 'los' para reflejar la acumulación de los talentos. 'Al rey Salomón' es la formulación española natural y digna.
theological_decisions:
- issue: Tratamiento del nombre divino no presente explícitamente en el versículo
  english_pob_reading: No explicit divine-name issue in the verse
  chosen_spanish_reading: No se introduce ninguna sustitución por Yahvé ni equivalentes
  alternative_spanish_readings:
  - usar SEÑOR por convención
  rationale: El versículo no contiene el Tetragrámaton ni una cita directa del nombre divino. No se añade una convención de sustitución que el hebreo no requiera.
  doctrine_reference: Coherencia textual y evitación de inserciones no motivadas por el original
- issue: Valor léxico de עֲבָדִים y עַבְדֵי שְׁלֹמֹה
  english_pob_reading: servants / servants
  chosen_spanish_reading: siervos / siervos
  alternative_spanish_readings:
  - esclavos / esclavos
  - servidores / servidores
  rationale: Se mantiene 'siervos' por continuidad interna y porque en este contexto la relación de servicio cortesano y expedicionario está bien atestiguada. 'Esclavos' sería posible en abstracto, pero endurecería innecesariamente el matiz social aquí; 'servidores' debilitaría el campo léxico documentado.
  doctrine_reference: Lexicografía bíblica de עבד y consistencia terminológica
- issue: Relación entre 'por mano de sus siervos' y la mediación del envío
  english_pob_reading: by the hand of his servants
  chosen_spanish_reading: por mano de sus siervos
  alternative_spanish_readings:
  - por medio de sus siervos
  - a través de sus siervos
  rationale: Se preserva el giro idiomático para no perder la mediación indirecta. En español, 'por mano de' suena bíblico pero sigue siendo transparente; además evita borrar la imagen semítica del texto fuente.
  doctrine_reference: Fidelidad formal a un modismo hebreo sin oscurecer el sentido
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que favorece una formulación más natural de la pericia marítima ('who knew the sea'). En español se optó por 'que conocían el mar', conservando el paralelismo entre su condición de siervos y su conocimiento náutico. También se mantuvo la lectura colectiva de 'los llevaron', en línea con la decisión inglesa de reflejar el plural narrativo y la unidad contable de los talentos.
  spanish_consistency_notes:
  - Se mantiene 'siervos' de forma consistente para עבדים en este versículo, en lugar de alternar con 'esclavos' o 'servidores'.
  - Se conserva el topónimo 'Ofir' en forma breve y direccional natural ('a Ofir').
  - Se usa 'naves' para elevar ligeramente el registro sin alterar el referente marítimo.
  - La puntuación y el orden responden a un español bíblico moderno, con fluidez de lectura y sin calcos innecesarios.
