base_translation:
  language: en
  yaml_path: translation/ot/1_kings/009/015.yaml
  text: Now this is the account of the forced labor that King Solomon levied to build the house of Yahweh[a], his own house, the Millo, the wall of Jerusalem, Hazor, Megiddo[b], and Gezer.
  footnotes:
  - marker: a
    text: Or 'labor levy' or 'corvée,' that is, compulsory state labor rather than a monetary tax.
    reason: lexical_alternative
  - marker: b
    text: '''The Millo'' is likely a known fortification or terraced fill structure in Jerusalem; the Hebrew term may mean ''the fill'' or refer to terraces.'
    reason: cultural_note
