translation:
  language: es
  text: ¡Maten todos sus toros; que bajen a la matanza! ¡Ay de ellos[a], porque ha llegado su día, el tiempo de su castigo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tiempo de su visitación». El término hebreo puede denotar una visitación para juicio, supervisión o ajuste de cuentas; aquí se refiere a un juicio punitivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִרְבוּ
  english_pob_choice: Slay
  chosen_spanish: Destruyan
  alternatives_spanish:
  - Mátenlos
  - Pasen a espada
  - Destruyan por completo
  lexicon: HALOT
  rationale: El verbo hebreo en forma causativa pide una acción violenta dirigida contra los toros/toros jóvenes de Babilonia. En español, «destruyan» comunica el mandato de aniquilación sin forzar un calco duro; «pasen a espada» sería más interpretativo y desplaza la imagen original.
- source_word: כָּל פָּרֶיהָ
  english_pob_choice: all her bulls
  chosen_spanish: todos sus toros
  alternatives_spanish:
  - todos sus toros jóvenes
  - todos sus novillos
  - todos sus fuertes
  lexicon: HALOT
  rationale: Se conserva la metáfora animal del hebreo. «Toros» es natural en español y retiene la fuerza figurativa aplicada a guerreros o nobles. «Toros jóvenes» es más literal, pero suena más pesado sin aportar claridad decisiva en el texto principal.
- source_word: יֵרְדוּ לַטָּבַח
  english_pob_choice: let them go down to the slaughter
  chosen_spanish: que bajen a la matanza
  alternatives_spanish:
  - que desciendan a la matanza
  - que vayan a la matanza
  - que bajen al degüello
  lexicon: HALOT
  rationale: «Bajen» reproduce bien el movimiento descendente de יֵרְדוּ. «Matanza» preserva el sentido de טבח como muerte violenta de sacrificio/ejecución; «degüello» es posible, pero más coloquial y menos amplio.
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay
  alternatives_spanish:
  - ¡Ay de
  - ¡Ay,
  - ¡Ay de ellos
  lexicon: HALOT
  rationale: La interjección profética se expresa con «¡Ay», que mantiene el tono de lamento y juicio. En español, la construcción completa se ajusta a la sintaxis del verso mediante «¡Ay de ellos».
- source_word: עֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: de ellos
  alternatives_spanish:
  - sobre ellos
  - para ellos
  lexicon: HALOT
  rationale: Con la exclamación «¡Ay», el español requiere «de ellos» para sonar natural. «Sobre ellos» sería más literal, pero menos idiomático en este contexto profético.
- source_word: כִּי בָא יוֹמָם
  english_pob_choice: for their day has come
  chosen_spanish: porque ha llegado su día
  alternatives_spanish:
  - porque vino su día
  - porque su día ha venido
  - porque ha venido su día
  lexicon: HALOT
  rationale: El perfecto בָא presenta el día como ya llegado. «Su día» conserva el idiomático día de destino/jucio; «ha llegado» es claro y fiel al valor aspectual.
- source_word: עֵת פְּקֻדָּתָם
  english_pob_choice: the time of their punishment
  chosen_spanish: el tiempo de su castigo
  alternatives_spanish:
  - el tiempo de su visitación
  - el tiempo de su visita
  - el tiempo de su rendición de cuentas
  lexicon: HALOT
  rationale: En este contexto de juicio contra Babilonia, פְּקֻדָּה apunta a una intervención retributiva. «Castigo» comunica esa fuerza de manera transparente. Se conserva la ambigüedad tradicional de «visitación» en nota, porque el término hebreo también puede abarcar visita, supervisión o ajuste de cuentas.
theological_decisions:
- issue: Sentido de פְּקֻדָּה en un oráculo de juicio
  english_pob_reading: punishment
  chosen_spanish_reading: castigo
  alternative_spanish_readings:
  - visitación
  - rendición de cuentas
  - recuento
  rationale: El contexto inmediato anuncia juicio sobre Babilonia y paralela ese momento con «su día». Por eso la lectura principal debe expresar el carácter punitivo. A la vez, la raíz hebrea tiene un campo semántico más amplio; no se borra esa tensión, sino que se conserva en nota.
  doctrine_reference: Jeremías 50:27; principio de mantener la ambigüedad léxica cuando el hebreo la posee, pero priorizar el sentido contextual claro.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la decisión inglesa de tratar פְּקֻדָּה como juicio punitivo en el cuerpo principal, conservando la alternativa tradicional «visitación» en nota. No se observan revisiones posteriores que requieran ajuste.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para el nombre divino cuando aparezca, pero este versículo no lo contiene.
  - Se usó un registro profético solemne y moderno, evitando calcos rígidos.
  - «Matanza» conserva mejor el campo semántico de טבח que un término eclesiástico más técnico.
