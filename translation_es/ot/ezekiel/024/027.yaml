translation:
  language: es
  text: En aquel día se te abrirá la boca cuando el fugitivo llegue a ti[a], y hablarás y ya no estarás mudo. Así serás para ellos una señal, y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con el fugitivo'; la frase hebrea es difícil y puede referirse al momento en que el fugitivo llega con las noticias.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La expresión temporal profética se conserva con una forma natural y solemne en español. 'En aquel día' mantiene el valor de referencia profética del hebreo sin sonar arcaico en exceso.
- source_word: יִפָּתַח פִּיךָ
  english_pob_choice: your mouth will be opened
  chosen_spanish: se te abrirá la boca
  alternatives_spanish:
  - tu boca será abierta
  - se abrirá tu boca
  lexicon: HALOT
  rationale: El nifal de פתח se refleja mejor con una pasiva natural en español. 'Se te abrirá la boca' conserva la imagen y la relación con la mudez impuesta y luego levantada.
- source_word: אֶת הַפָּלִיט
  english_pob_choice: when the fugitive comes to you
  chosen_spanish: cuando venga a ti el fugitivo
  alternatives_spanish:
  - cuando llegue a ti el fugitivo
  - con el fugitivo
  - cuando el fugitivo venga a ti
  lexicon: HALOT
  rationale: La construcción hebrea es difícil; el contexto apunta al mensajero que escapó y trae noticia. La frase española sigue la lectura contextual atestiguada por la POB en inglés, sin ocultar el matiz de 'fugitivo' para פליט.
- source_word: וּתְדַבֵּר
  english_pob_choice: and you will speak
  chosen_spanish: y hablarás
  alternatives_spanish:
  - y hablarás entonces
  - y dirás
  lexicon: HALOT
  rationale: El futuro simple comunica bien la secuencia de restauración del habla. 'Hablarás' es el equivalente más directo y natural.
- source_word: וְלֹא תֵאָלֵם עוֹד
  english_pob_choice: and no longer be mute
  chosen_spanish: y no volverás a quedar mudo
  alternatives_spanish:
  - y no serás mudo otra vez
  - y ya no serás mudo
  lexicon: HALOT
  rationale: תֵאָלֵם indica mutismo o incapacidad de hablar, no mera reserva voluntaria. 'Quedar mudo' conserva la condición pasiva; 'no volverás a' expresa adecuadamente la continuidad de la restauración en español.
- source_word: וְהָיִיתָ לָהֶם לְמוֹפֵת
  english_pob_choice: So you will be a sign to them
  chosen_spanish: Así serás para ellos una señal
  alternatives_spanish:
  - y serás para ellos una señal
  - de modo que serás para ellos una señal
  - y serás para ellos un portento
  lexicon: HALOT
  rationale: מוֹפֵת puede ser señal, portento o prodigio. 'Señal' es clara y suficientemente amplia en español bíblico moderno; 'Así' ayuda a reflejar la fuerza resultativa del hebreo.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  english_pob_choice: and they will know that I am Yahweh
  chosen_spanish: y sabrán que yo soy Yahvé
  alternatives_spanish:
  - y sabrán que yo soy Yahweh
  - y conocerán que yo soy Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración según el estándar del proyecto. 'Yo soy Yahvé' reproduce la fórmula ezequielina de reconocimiento con claridad y reverencia.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la convención del proyecto, se translitera como 'Yahvé' en lugar de ocultarlo con una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la restauración del habla de Ezequiel
  english_pob_reading: literal restoration from prophetic muteness tied to the fugitive's arrival
  chosen_spanish_reading: restauración literal de la capacidad de hablar al llegar el fugitivo
  alternative_spanish_readings:
  - fin general del silencio
  - habilitación metafórica para hablar
  rationale: La secuencia narrativa conecta el fin de la mudez con la llegada del fugitivo. La redacción española conserva esa relación sin espiritualizarla ni volverla una paráfrasis libre.
  doctrine_reference: Contexto profético de Ezequiel 24 y 33
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que ajustó la relación temporal para reflejar mejor la llegada del fugitivo. La versión española adopta esa lectura contextual con una formulación natural en español y conserva la nota de alternativa por la dificultad sintáctica del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estable para יְהוָה.
  - '''Señal'' se emplea para מוֹפֵת por claridad y uso bíblico amplio.'
  - '''Fugitivo'' conserva la fuerza léxica de פליט; la nota admite la alternativa contextual ''con el fugitivo''.'
  - Se prefirió 'mudo' a 'silencioso' para mantener el sentido específico de אלם.
