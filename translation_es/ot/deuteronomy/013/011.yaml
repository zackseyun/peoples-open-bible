  spanish_quality_summary: El texto principal es claro, digno y ampliamente legible en español eclesial latinoamericano. ‘Lo apedrearás con piedras, y morirá’ suena algo redundante pero reproduce bien el hebreo legal. ‘Procuró apartarte’ es aceptable, aunque menos enérgico que ‘intentó alejarte’ o ‘buscó apartarte’; no requiere cambio. La principal deficiencia está en la nota [a], que es incorrecta en forma y contenido.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יהוה → ‘Yahvé’, no ‘SEÑOR’; la fórmula ‘casa de esclavitud’ conserva el valor pactal; no hay conflictos con otros términos clave. La decisión ‘apartarte de Yahvé’ es defendible para לְהַדִּיחֲךָ מֵעַל, aunque la nota debe reflejar mejor las alternativas ‘desviar’/‘alejar’.'
