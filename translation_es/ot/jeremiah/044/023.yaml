base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/023.yaml
  text: Because you burned incense and sinned against Yahweh[a], and have not listened to the voice of Yahweh or walked in his law, his statutes, and his testimonies, therefore this disaster has come upon you[d][c][b], as it is this day.
  footnotes:
  - marker: a
    text: Or 'you offered incense.' The Hebrew verb refers to making sacrificial smoke/incense offerings.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not obey the LORD.' Literally, 'did not listen to the voice of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: '''Law'' may also be rendered ''instruction'' (Hebrew torah).'
    reason: lexical_alternative
  - marker: d
    text: Or 'this calamity has befallen you.' The Hebrew word can mean 'evil' or, in contexts like this, 'disaster/calamity.'
    reason: lexical_alternative
  ai_draft:
