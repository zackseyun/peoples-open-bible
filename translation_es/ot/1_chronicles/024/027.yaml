translation:
  language: es
  text: 'Los hijos de Merari: Jaazías su hijo[a], y Shoham, Zakur e Ibri.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su hijo». La sintaxis es difícil; algunos toman esta forma como el nombre propio «Beno», mientras que otros entienden un sentido plural, como «sus hijos».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En un registro genealógico, "hijos de" reproduce con claridad la fórmula constructa hebrea y mantiene el valor de linaje/clan sin sobreinterpretarlo.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merarí
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la forma transliterada convencional; en español puede leerse naturalmente como nombre propio.
- source_word: לְיַעֲזִיָּהוּ
  english_pob_choice: of Jaaziah
  chosen_spanish: Jaazías
  alternatives_spanish:
  - de Jaazías
  - para Jaazías
  - la casa de Jaazías
  lexicon: HALOT
  rationale: El lamed aquí marca asociación genealógica o pertenencia a una rama; en español, la apposición directa con el nombre es más natural que repetir una preposición, y preserva el enlace con la frase siguiente.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - sus hijos
  - Beno
  lexicon: HALOT
  rationale: La sintaxis masorética apunta a un singular posesivo. "Su hijo" conserva el sentido literal y deja visible la dificultad textual, que se resuelve en nota.
- source_word: וְשֹׁהַם
  english_pob_choice: Shoham
  chosen_spanish: Soham
  alternatives_spanish:
  - Shoham
  lexicon: HALOT
  rationale: Nombre propio. Se opta por una transliteración española más fluida, sin cambiar la identidad del nombre.
- source_word: וְזַכּוּר
  english_pob_choice: Zaccur
  chosen_spanish: Zakur
  alternatives_spanish:
  - Zaccur
  lexicon: HALOT
  rationale: Nombre propio. La adaptación gráfica con "k" refleja de modo claro la oclusiva velar sorda del hebreo y mantiene legibilidad en español.
- source_word: וְעִבְרִי
  english_pob_choice: Ibri
  chosen_spanish: Ibri
  alternatives_spanish:
  - Ibrí
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la transliteración breve y reconocible del nombre.
theological_decisions:
- issue: Tratamiento del caso difícil בְנוֹ (¿"su hijo", nombre propio, o plural implícito?)
  english_pob_reading: The main text reads 'his son'; a footnote notes that some take this as the proper name 'Beno,' while others understand a plural sense such as 'his sons.'
  chosen_spanish_reading: '"su hijo" en el texto principal, con nota que reconoce las lecturas alternativas.'
  alternative_spanish_readings:
  - Beno
  - sus hijos
  rationale: La forma consonántica y la elección auditada del POB inglés favorecen mantener el singular literal en el texto principal. La ambigüedad sintáctica es real, así que se conserva en nota para no borrar la tensión documental.
  doctrine_reference: Cuestiones textuales y genealógicas; no implica doctrina, sino cautela exegética y fidelidad al MT.
translation_notes:
  revision_awareness: 'Se siguió la revisión del POB inglés que eliminó la preposición redundante antes de Jaaziah, conservando la estructura apposicional natural: nombre + relación filial + lista de nombres. También se mantuvo la lectura principal singular de בְנוֹ y se documentó la ambigüedad en nota.'
  spanish_consistency_notes:
  - Se evitó "SEÑOR" u otras sustituciones no pertinentes, ya que no aparece el nombre divino en este versículo.
  - Se eligió una transliteración española sobria y consistente para los nombres propios, sin normalizarlos a formas litúrgicas tradicionales si no eran las documentadas por el audit trail.
  - La puntuación con dos puntos refleja correctamente la introducción de la lista genealógica.
