translation:
  language: es
  text: Extendí mis manos todo el día a un pueblo rebelde[b][a], que anda por un camino que no es bueno, siguiendo sus propios pensamientos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tenía extendidas mis manos todo el día».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un pueblo obstinado».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sus propios planes» o «designios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֵּרַשְׂתִּי
  english_pob_choice: I spread out
  chosen_spanish: Extendí
  alternatives_spanish:
  - He extendido
  - Tendí
  - Abrí
  lexicon: HALOT
  rationale: El verbo transmite una acción corporal de extender o desplegar las manos. «Extendí» conserva la imagen concreta en español natural y deja abierta la lectura de gesto insistente de súplica o acogida.
- source_word: יָדַי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mi mano
  lexicon: HALOT
  rationale: El hebreo usa un plural/doble con sufijo de primera persona; «mis manos» preserva la pluralidad corporal del gesto y evita reducirlo a un singular abstracto.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - durante todo el día
  lexicon: HALOT
  rationale: Es una expresión durativa. «Todo el día» comunica bien la continuidad de la acción sin añadir énfasis ajeno al texto.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: En este contexto se trata de una colectividad del pacto, no simplemente de personas individuales. «Pueblo» es natural en español bíblico y conserva ese matiz comunitario.
- source_word: סוֹרֵר
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - obstinado
  - desobediente
  - rebelde y obstinado
  lexicon: HALOT
  rationale: El participio describe una actitud de resistencia/torcedura frente a Yahvé. «Rebelde» reproduce bien la fuerza moral y relacional del término; «obstinado» queda como alternativa válida, pero menos directa en este contexto.
- source_word: הַהֹלְכִים
  english_pob_choice: who walk
  chosen_spanish: que camina
  alternatives_spanish:
  - que andan
  - que van
  - caminando
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, el relativo en español puede concordar de forma más fluida con «pueblo». «Que camina» mantiene la imagen de conducta o modo de vida, sin alejarse del sentido colectivo.
- source_word: הַדֶּרֶךְ
  english_pob_choice: in a way
  chosen_spanish: por un camino
  alternatives_spanish:
  - en un camino
  - en la senda
  - por la senda
  lexicon: HALOT
  rationale: El hebreo usa «el camino» como metáfora de conducta. «Por un camino» conserva la imagen del proceder sin forzar una interpretación demasiado explicativa.
- source_word: לֹא טוֹב
  english_pob_choice: that is not good
  chosen_spanish: que no es bueno
  alternatives_spanish:
  - que no es recto
  - que no es correcto
  - malo
  lexicon: HALOT
  rationale: Se conserva la evaluación negativa literal del hebreo («no bueno») en vez de intensificarla a «malo» o «malvado». Esto preserva la tensión lexical documentada por el POB inglés.
- source_word: אַחַר
  english_pob_choice: following
  chosen_spanish: siguiendo
  alternatives_spanish:
  - tras
  - después de
  - conforme a
  lexicon: HALOT
  rationale: En este contexto con el verbo de caminar, la preposición expresa seguimiento de una dirección o guía. «Siguiendo» comunica esa orientación conductual de manera natural.
- source_word: מַחְשְׁבֹתֵיהֶם
  english_pob_choice: their own thoughts
  chosen_spanish: sus propios pensamientos
  alternatives_spanish:
  - sus planes
  - sus esquemas
  - sus designios
  lexicon: HALOT
  rationale: El sustantivo puede abarcar pensamientos, planes o designios. «Pensamientos» es la equivalencia más directa; añadir «propios» refleja el sufijo posesivo y la auto-dirección del sujeto, como en la decisión inglesa.
theological_decisions:
- issue: Imagen antropomórfica de Dios con las manos extendidas
  english_pob_reading: Retain the anthropomorphic image 'I spread out my hands' as a gesture of persistent appeal or openness.
  chosen_spanish_reading: 'Conservar la imagen corporal: «Extendí mis manos todo el día».'
  alternative_spanish_readings:
  - Mantuve mis manos extendidas todo el día
  - No cesé de tender mis manos
  rationale: El hebreo presenta una metáfora encarnada de la iniciativa divina hacia un pueblo rebelde. Mantener la imagen evita suavizar la tensión teológica entre la paciencia de Dios y la obstinación humana.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor evaluativo de לֹא טוֹב
  english_pob_reading: Translate לֹא טוֹב as 'not good' rather than a stronger interpretive gloss such as 'evil.'
  chosen_spanish_reading: 'Traducir literalmente: «que no es bueno».'
  alternative_spanish_readings:
  - que es malo
  - que es perverso
  - que no es recto
  rationale: El hebreo niega «bueno» en vez de usar un término más fuerte para maldad. Mantener «no es bueno» conserva el alcance semántico original y evita una intensificación no necesaria.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el análisis previo mantiene alta concordancia con el texto fuente y con la decisión inglesa de conservar la metáfora corporal y la valoración literal de לֹא טוֹב.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para el nombre divino solo cuando aparezca explícitamente en el contexto; este verso no lo contiene.
  - Se prefirió un español bíblico claro y moderno, evitando calcos excesivos, pero conservando la metáfora de manos, camino y pensamientos.
  - Las notas a pie de página preservan alternativas lexicales documentadas en el audit trail inglés y una variante útil para «no es bueno».
