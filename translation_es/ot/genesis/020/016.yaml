  rationale: Se corrigió el anclaje de la nota para que [a] acompañe la expresión difícil «velo para los ojos». Se ajustó «de todos los que están contigo» a «para todos los que están contigo» para reflejar mejor לְכֹל y el expediente inglés. También se quitó «como» para no introducir una comparación ausente en el hebreo, manteniendo la metáfora formal en el texto principal.
