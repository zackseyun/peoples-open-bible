  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: ver primero y luego ser reunido al propio pueblo, con la comparación explícita con Aarón. También preserva correctamente el modismo funerario en vez de reducirlo a ''morir''. Sin embargo, ''con tu pueblo'' se aparta innecesariamente de אֶל עַמֶּיךָ (''a tu pueblo'') y debilita la correspondencia con la nota que explica la literalidad del hebreo.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse ligeramente para mayor fidelidad y cohesión interna. 'Y cuando la hayas visto' suena natural en contexto. La frase 'serás reunido a tu pueblo' es suficientemente comprensible en español bíblico y armoniza mejor con la nota y con la decisión léxica documentada. La puntuación con comas en 'Aarón, tu hermano' no es necesaria y fluye mejor sin ellas.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. El tratamiento del idiomático אסף está bien orientado, pero conviene alinear mejor la preposición con el hebreo y con la justificación léxica: ''a tu pueblo'' en lugar de ''con tu pueblo''.'
  issues:
  - severity: medium
    issue: La preposición 'con' en 'serás reunido con tu pueblo' suaviza la dirección expresada por אֶל ('a').
    rationale: El inglés POB y la nota léxica preservan deliberadamente el modismo 'be gathered to your people'. En español, 'a tu pueblo' mantiene mejor la forma y la resonancia del original sin perder inteligibilidad.
  - severity: low
    issue: La nota al pie no coincide exactamente con la mejor formulación revisada.
    rationale: Si el texto principal usa 'a tu pueblo', la nota debe reflejar la misma literalidad para evitar incoherencia interna.
  - severity: low
    issue: Las comas en 'Aarón, tu hermano' son prescindibles.
    rationale: 'La aposición sin comas suena más natural y directa en este contexto bíblico breve: ''Aarón tu hermano''.'
  revised_spanish_text: Y cuando la hayas visto[a], tú también serás reunido a tu pueblo, así como Aarón tu hermano fue reunido.
  revised_footnotes:
  - marker: a
    text: O, de manera más interpretativa, 'morirás' o 'serás reunido con tus antepasados'. El hebreo dice literalmente 'ser reunido a tu pueblo'.
    reason: lexical_alternative
