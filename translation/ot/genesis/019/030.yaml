id: GEN.19.30
reference: Genesis 19:30
source:
  edition: WLC
  text: וַ/יַּעַל֩ ל֨וֹט מִ/צּ֜וֹעַר וַ/יֵּ֣שֶׁב בָּ/הָ֗ר וּ/שְׁתֵּ֤י בְנֹתָי/ו֙ עִמּ֔/וֹ כִּ֥י יָרֵ֖א לָ/שֶׁ֣בֶת בְּ/צ֑וֹעַר וַ/יֵּ֨שֶׁב֙ בַּ/מְּעָרָ֔ה ה֖וּא וּ/שְׁתֵּ֥י בְנֹתָֽי/ו׃
translation:
  text: Then Lot went up from Zoar and lived in the mountains[a], and his two daughters were with him, because he was afraid to live in Zoar. So he lived in a cave, he and his two daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the cave''; the definite article may simply mark the cave as the specific one he occupied, though English idiom often says ''in a cave'' when first mentioning such a dwelling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - left
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' 'Went up' preserves the directional sense without sounding overly formal. 'Left' would omit the vertical/topographical nuance.
- source_word: מִצּוֹעַר
  chosen: from Zoar
  lexicon: HALOT
  rationale: The preposition מן marks movement away from the place-name Zoar. 'From Zoar' is the straightforward rendering.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - settled
  - dwelt
  - sat
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, live.' In this narrative context it denotes residence, so 'lived' is natural modern English. 'Dwelt' is accurate but archaic; 'settled' may imply permanence more strongly than the context requires.
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountain
  - in the mountains
  lexicon: HALOT
  rationale: The singular הַר can function collectively/topographically. 'In the hill country' communicates the terrain idiomatically in English better than the more wooden 'in the mountain,' while avoiding an unnecessary plural not present in the Hebrew.
- source_word: וּשְׁתֵּי בְנֹתָיו עִמּוֹ
  chosen: and his two daughters were with him
  alternatives:
  - with his two daughters
  - and his two daughters with him
  lexicon: HALOT
  rationale: The phrase is verbless in Hebrew, appended to the clause about Lot's residence. Rendering it as 'and his two daughters were with him' makes the relationship explicit in natural English while preserving the simple narrative coordination.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Lot's move. 'Because' is clearer in contemporary English than 'for.'
- source_word: יָרֵא
  chosen: he was afraid
  alternatives:
  - he feared
  lexicon: HALOT
  rationale: The stative sense is well conveyed by 'he was afraid.' 'He feared' is also possible but slightly less idiomatic here.
- source_word: לָשֶׁבֶת בְּצֹעַר
  chosen: to live in Zoar
  alternatives:
  - to dwell in Zoar
  - to stay in Zoar
  lexicon: HALOT
  rationale: The infinitive construct of ישב again denotes residence. 'To live in Zoar' matches the earlier rendering for consistency and readability.
- source_word: בַּמְּעָרָה
  chosen: in a cave
  alternatives:
  - in the cave
  lexicon: HALOT
  rationale: Although the noun has the article ('in the cave'), English often uses an indefinite expression when introducing a cave as a dwelling place without prior identification. 'In a cave' reads naturally and fits the discourse. The definite alternative is preserved in a footnote because the Hebrew article is present.
- source_word: הוּא וּשְׁתֵּי בְנֹתָיו
  chosen: he and his two daughters
  lexicon: HALOT
  rationale: This appositional phrase restates the occupants of the cave. The direct rendering preserves the Hebrew emphasis and closes the sentence naturally.
