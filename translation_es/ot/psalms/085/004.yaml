revisions:
- from: Retiraste toda tu ira[a]; te volviste atrás del ardor de tu enojo.
  to: Retiraste toda tu ira[a]; te apartaste del ardor de tu enojo.
  rationale: Se mantiene «Retiraste» por fidelidad a la revisión inglesa auditada y por buena naturalidad en español. Se cambia «te volviste atrás del» por «te apartaste del» para expresar con claridad y buen español la idea de volverse de / apartarse de, sin introducir arrepentimiento emocional. La nota alternativa se ajusta para preservar una opción más cercana a la imaginería verbal de «volverse», pero en una forma española aceptable.
