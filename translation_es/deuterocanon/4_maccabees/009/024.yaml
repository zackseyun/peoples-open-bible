translation:
  language: es
  text: por medio de la cual nuestra providencia justa[a] y ancestral, habiéndose vuelto favorable[b] a la nación, podría castigar al tirano maldito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recta» para δικαία; el griego conserva el matiz de rectitud moral y legal.
    reason: lexical_alternative
  - marker: b
    text: O «misericordiosa» o «propicia» para ἵλεως; el término griego denota estar favorablemente dispuesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ἧς
  english_pob_choice: through which
  chosen_spanish: por medio de la cual
  alternatives_spanish:
  - por la cual
  - mediante la cual
  lexicon: LSJ
  rationale: διά con el relativo expresa medio o instrumento. «Por medio de la cual» conserva ese valor instrumental en español sin forzar el antecedente femenino.
- source_word: ἵλεως
  english_pob_choice: gracious
  chosen_spanish: favorable
  alternatives_spanish:
  - graciosa
  - misericordiosa
  - propicia
  lexicon: LSJ
  rationale: El término griego indica disposición favorable, apaciguada o benigna. En español, «favorable» comunica bien ese matiz con menos riesgo de sonar afectado que una traducción demasiado religiosa o anticuada.
- source_word: ἡ δικαία καὶ πάτριος ἡμῶν πρόνοια
  english_pob_choice: our righteous and ancestral providence
  chosen_spanish: nuestra providencia justa y ancestral
  alternatives_spanish:
  - nuestra providencia recta y ancestral
  - nuestra providencia justa y de los padres
  lexicon: LSJ
  rationale: «Providencia» conserva πρόνοια. «Justa» traduce δικαία y «ancestral» traduce πάτριος, que alude a lo heredado de los padres/antepasados; se evita «paternal» porque no es el sentido principal aquí.
- source_word: τῷ ἔθνει
  english_pob_choice: to the nation
  chosen_spanish: a la nación
  alternatives_spanish:
  - para la nación
  - hacia la nación
  lexicon: LSJ
  rationale: El dativo con γενηθεῖσα marca relación favorable hacia el pueblo colectivo. «A la nación» suena natural en español y mantiene el referente étnico-comunitario de ἔθνος.
- source_word: γενηθεῖσα
  english_pob_choice: having become
  chosen_spanish: habiéndose mostrado
  alternatives_spanish:
  - habiendo llegado a ser
  - habiéndose hecho
  lexicon: LSJ
  rationale: El participio aoristo de γίνομαι aquí expresa un cambio de estado o volverse favorable. «Habiéndose mostrado» preserva la idea de llegar a ser favorable sin sonar rígido en español.
- source_word: τιμωρήσειεν
  english_pob_choice: might punish
  chosen_spanish: podría castigar
  alternatives_spanish:
  - podría vengar
  - castigaría
  lexicon: LSJ
  rationale: El optativo sugiere posibilidad o deseo en un contexto de súplica. «Podría castigar» mantiene esa modalidad sin cargar el verbo con una noción de venganza más fuerte de lo necesario.
- source_word: τὸν ἀλάστορα τύραννον
  english_pob_choice: the accursed tyrant
  chosen_spanish: al tirano maldito
  alternatives_spanish:
  - al tirano accursedo
  - al tirano abominable
  - al tirano vengador
  lexicon: LSJ
  rationale: ἀλάστωρ puede llevar la idea de maldito/consignado a desgracia, y también de figura vengadora. Aquí, en el ataque directo al tirano, «maldito» recoge bien la condena y evita introducir más interpretación de la requerida.
theological_decisions:
- issue: Valor de πρόνοια en un contexto elevado judío-helenístico
  english_pob_reading: A reverent reference to God's providential care in relation to Israel's ancestral faith
  chosen_spanish_reading: Una referencia reverente a la providencia de Dios en relación con la fe ancestral de Israel
  alternative_spanish_readings:
  - Una providencia más abstracta e impersonal
  - Un simple concepto filosófico de orden
  rationale: Aunque el griego no añade explícitamente «Dios», el lenguaje de πρόνοια en 4 Macabeos es teológicamente cargado. «Providencia» preserva esa densidad sin suplir indebidamente un sujeto explícito.
  doctrine_reference: Mantener la primacía del texto original y no resolver la tensión teológica mediante una explicitación no presente en el griego.
- issue: Sentido de ἵλεως y su relación con la nación
  english_pob_reading: gracious to the nation
  chosen_spanish_reading: favorable a la nación
  alternative_spanish_readings:
  - misericordiosa con la nación
  - propicia para la nación
  rationale: «Favorable» expresa de modo natural en español la disposición benigna o apaciguada de ἵλεως, y se ajusta bien al régimen con el dativo/relación hacia la nación.
  doctrine_reference: Conservar el matiz de favor divino sin convertirlo automáticamente en terminología devocional tradicional.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «merciful» por «gracious» para ἵλεως. La versión española adopta «favorable», que conserva ese ajuste de la revisión y suena natural con el dativo «a la nación». Se mantuvieron el valor instrumental de διʼ ἧς, la secuencia participial de γενηθεῖσα y el tono condenatorio de ἀλάστορα τύραννον.
  spanish_consistency_notes:
  - Se conserva «providencia» para πρόνοια por consistencia con el registro teológico de 4 Macabeos.
  - Se evitó «Señor» o una explicitación de Dios porque el griego no la ofrece aquí.
  - Se mantuvo un tono solemne y publication-readable, sin calco rígido.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponden.
