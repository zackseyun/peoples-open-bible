- from: Pero ellos velan alrededor de él, y cada uno no puede irse y hacer su trabajo, ni desobedecerle.
  to: Pero ellos velan alrededor de él, y cada uno no puede irse y hacer su trabajo, ni le desobedecen.
  rationale: Se corrige la cláusula final para que «παρακούουσιν αὐτοῦ» se traduzca como un verbo finito coordinado independiente, en conformidad con el griego y con la auditoría inglesa. No se requieren notas.
