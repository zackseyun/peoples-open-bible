translation:
  language: es
  text: porque no les salieron al encuentro con pan y agua por el camino, cuando salieron de Egipto, y porque contrató a Balaam hijo de Beor, de Petor, de Aram-Naharaim[a], contra ti para maldecirte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aram-Naharaim es tradicionalmente identificado con Mesopotamia, literalmente «Aram de los Dos Ríos».
    reason: cultural_note
lexical_decisions:
- source_word: עַל דְּבַר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - por cuanto
  lexicon: HALOT
  rationale: La expresión introduce la base causal de la prohibición anterior; «porque» comunica de forma natural y directa esa relación causal sin añadir matices ajenos al hebreo.
- source_word: קִדְּמוּ אֶתְכֶם
  english_pob_choice: did not meet you
  chosen_spanish: no les salieron al encuentro
  alternatives_spanish:
  - no los recibieron
  - no los saludaron al llegar
  lexicon: HALOT
  rationale: En este contexto קדמ implica salir al encuentro con provisiones. «Salir al encuentro» conserva la idea de ir hacia alguien, y el complemento negativo refleja la falta de hospitalidad sin sobreinterpretar el verbo.
- source_word: בַּלֶּחֶם וּבַמַּיִם
  english_pob_choice: with bread and water
  chosen_spanish: con pan y con agua
  alternatives_spanish:
  - con alimentos y agua
  - con pan y agua
  lexicon: HALOT
  rationale: Se conservan los sustantivos concretos del hebreo. La repetición de «con» mantiene la simetría del original y la acusación específica de falta de sustento.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - durante el camino
  lexicon: HALOT
  rationale: «Por el camino» es natural en español y conserva el valor locativo de trayecto del hebreo.
- source_word: בְּצֵאתְכֶם מִמִּצְרָיִם
  english_pob_choice: when you came out from Egypt
  chosen_spanish: cuando salían de Egipto
  alternatives_spanish:
  - cuando saliste de Egipto
  - al salir de Egipto
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición tiene valor temporal. El plural se mantiene con «salían» para concordar con «les» y con el destinatario colectivo.
- source_word: שָׂכַר עָלֶיךָ
  english_pob_choice: he hired ... against you
  chosen_spanish: alquiló contra ti
  alternatives_spanish:
  - contrató contra ti
  - pagó contra ti
  lexicon: HALOT
  rationale: Se conserva el verbo de contratación mercenaria con fuerza hostil. Aunque «alquilar» es menos común en español moderno para personas, puede transmitir la idea de contratar a sueldo; se mantiene la tensión léxica del hebreo, donde שׂכר no es simplemente «enviar» sino contratar a cambio de pago.
- source_word: בִּלְעָם בֶּן בְּעוֹר
  english_pob_choice: Balaam son of Beor
  chosen_spanish: Balaam hijo de Beor
  alternatives_spanish:
  - Balaam, hijo de Beor
  lexicon: HALOT
  rationale: Se transliteran los nombres propios y se conserva el patronímico hebreo con «hijo de».
- source_word: מִפְּתֹר אֲרַם נַהֲרַיִם
  english_pob_choice: from Pethor of Aram-naharaim
  chosen_spanish: de Petor, de Aram-Naharaim
  alternatives_spanish:
  - de Petor, de Aram de los Dos Ríos
  - de Petor en Mesopotamia
  lexicon: HALOT
  rationale: Se preserva el topónimo y la designación regional semítica. «Aram-Naharaim» mantiene la forma del hebreo y evita reemplazarla por una equivalencia interpretativa; la preposición repetida ayuda a leer dos designaciones geográficas en serie.
- source_word: לְקַלְלֶךָּ
  english_pob_choice: to curse you
  chosen_spanish: para maldecirte
  alternatives_spanish:
  - para pronunciar maldición contra ti
  - para maldecir contra ti
  lexicon: HALOT
  rationale: El infinitivo de finalidad se expresa de manera directa. «Maldecirte» es exacto y natural en español y conserva la finalidad hostil del pasaje.
theological_decisions:
- issue: Identificación de Aram-naharaim
  english_pob_reading: Aram-naharaim is traditionally identified with Mesopotamia, literally 'Aram of the Two Rivers.'
  chosen_spanish_reading: Aram-Naharaim se conserva como nombre regional sin sustituirlo por Mesopotamia en el texto principal.
  alternative_spanish_readings:
  - Mesopotamia
  - Aram de los Dos Ríos
  rationale: El texto hebreo presenta una designación geográfica propia; mantenerla evita introducir una equivalencia interpretativa en la línea principal. La identificación tradicional puede explicitarse en nota sin borrar la forma fuente.
  doctrine_reference: Toponimia bíblica y fidelidad al texto fuente
- issue: Fuerza hostil de עַל en שָׂכַר עָלֶיךָ
  english_pob_reading: he hired ... against you
  chosen_spanish_reading: alquiló contra ti
  alternative_spanish_readings:
  - contrató contra ti
  - lo contrató para ir contra ti
  rationale: El hebreo marca contratación con dirección hostil. La traducción mantiene ese choque semántico sin neutralizarlo en un simple «envió» o «mandó».
  doctrine_reference: Precisión léxica y sentido adversativo del texto
- issue: Referencia colectiva en el cierre temporal
  english_pob_reading: when you came out from Egypt
  chosen_spanish_reading: cuando salían de Egipto
  alternative_spanish_readings:
  - cuando saliste de Egipto
  - al salir de Egipto
  rationale: El destinatario deuteronómico suele ser colectivo; el español en plural conserva esa dimensión comunitaria mejor que un singular forzado.
  doctrine_reference: Coherencia pragmática del discurso deuteronómico
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se mantuvo la lectura causal única con dos motivos coordinados, se conservó la mención de Aram-Naharaim como topónimo propio y se reflejó la sintaxis de finalidad del cierre sin añadir material explicativo en el cuerpo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conservaron nombres propios transliterados y el orden de los motivos causales del hebreo.
  - La nota sobre Aram-Naharaim está anclada en el texto con [a] para cumplir la trazabilidad editorial.
