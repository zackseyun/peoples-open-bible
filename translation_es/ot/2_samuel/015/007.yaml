translation:
  language: es
  text: 'Y sucedió que al cabo de cuarenta años[a], Absalón dijo al rey: «Permíteme ir, por favor, y cumplir el voto que le hice a Yahvé en Hebrón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cuarenta años»; algunos testigos antiguos y muchas traducciones leen «cuatro años».'
    reason: textual_variant
lexical_decisions:
- source_word: מִקֵּץ אַרְבָּעִים שָׁנָה
  english_pob_choice: at the end of forty years
  chosen_spanish: al cabo de cuarenta años
  alternatives_spanish:
  - al final de cuarenta años
  - después de cuarenta años
  lexicon: HALOT
  rationale: La expresión hebrea indica un punto terminal del período; «al cabo de» conserva ese valor temporal con naturalidad en español. Se mantiene «cuarenta años» porque el texto base WLC/MT así lo lee.
- source_word: אֵלֲכָה נָּא
  english_pob_choice: Please let me go
  chosen_spanish: Déjame ir, por favor
  alternatives_spanish:
  - Permíteme ir, por favor
  - Por favor, déjame ir
  lexicon: HALOT
  rationale: El cohortativo con נָא expresa una petición cortés. «Déjame ir, por favor» comunica esa cortesía y la intención volitiva sin sonar rígido.
- source_word: וַאֲשַׁלֵּם
  english_pob_choice: fulfill
  chosen_spanish: cumplir
  alternatives_spanish:
  - satisfacer
  - pagar
  lexicon: HALOT
  rationale: Con נדר, el verbo שׁלם puede significar completar o cumplir un voto. En español, «cumplir» expresa mejor la realización del voto que «pagar», que sería más literal pero menos natural aquí.
- source_word: נִדְרִי אֲשֶׁר נָדַרְתִּי
  english_pob_choice: the vow that I vowed
  chosen_spanish: el voto que hice
  alternatives_spanish:
  - mi voto que hice
  - el voto que prometí
  lexicon: HALOT
  rationale: El hebreo repite sustantivo y verbo para énfasis. En español, «el voto que hice» conserva el sentido de la formulación sin forzar un calco poco idiomático; «voto» se mantiene para no diluir el término técnico.
- source_word: לַֽ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: Según el criterio del proyecto, el nombre divino יהוה se vierte «Yahvé» en el texto principal, no como «SEÑOR» de sustitución. Se conserva el nombre propio para transparen​cia y trazabilidad textual.
- source_word: בְּ/חֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebrón
  lexicon: HALOT
  rationale: 'Topónimo estándar transliterado al español con acento gráfico: «Hebrón».'
theological_decisions:
- issue: Número de años en el texto base
  english_pob_reading: forty years
  chosen_spanish_reading: cuarenta años
  alternative_spanish_readings:
  - cuatro años
  rationale: Se sigue el texto hebreo recibido (WLC/MT), que lee «cuarenta años». La alternativa «cuatro años» se reconoce como variante textual/tradicional en nota, sin desplazar el texto base.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audit trail inglés revisó «pay the vow» a «fulfill the vow» por naturalidad y precisión. En español se reflejó esa mejora con «cumplir el voto», evitando un calco como «pagar el voto» y manteniendo la equivalencia semántica con el verbo hebreo en contexto votivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «voto» como término técnico bíblico y no «promesa», para conservar la carga ritual/jurídica del hebreo נדר.
  - La construcción narrativa inicial «Y sucedió que» reproduce de forma natural וַיְהִי sin endurecer el español.
  - «Absalón» y «Hebrón» siguen la ortografía castellana habitual con acento gráfico.
