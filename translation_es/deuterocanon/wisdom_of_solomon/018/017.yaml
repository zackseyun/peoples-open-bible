translation:
  language: es
  text: Entonces, al instante, visiones de sueños[a] los turbaron terriblemente, y temores inesperados vinieron sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apariciones de sueños» o «fantasmas de los sueños». El griego φαντασίαι puede denotar apariencias o imágenes aparicionales; «visiones de sueños» conserva el contexto onírico sin afirmar más de lo que el texto dice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: LSJ
  rationale: Marca la secuencia narrativa de manera natural en español y conserva el valor temporal de inicio del episodio.
- source_word: παραχρῆμα
  english_pob_choice: at once
  chosen_spanish: al instante
  alternatives_spanish:
  - de inmediato
  - enseguida
  lexicon: LSJ
  rationale: Expresa la rapidez súbita del acontecimiento con un español idiomático y directo.
- source_word: φαντασίαι
  english_pob_choice: dream-visions
  chosen_spanish: visiones de sueños
  alternatives_spanish:
  - apariciones de sueños
  - imágenes de sueños
  lexicon: LSJ
  rationale: '"Visiones" conserva el valor de apariciones o imágenes visibles sin afirmar fantasmas literales; el complemento "de sueños" mantiene el contexto onírico del griego.'
- source_word: ὀνείρων
  english_pob_choice: dream-
  chosen_spanish: de sueños
  alternatives_spanish:
  - oníricas
  - soñadas
  lexicon: LSJ
  rationale: Se conserva la relación genitiva con una construcción natural en español; "oníricas" sería más literario y menos directo.
- source_word: δεινῶς
  english_pob_choice: terrifying
  chosen_spanish: terriblemente
  alternatives_spanish:
  - espantosamente
  - de manera atroz
  lexicon: LSJ
  rationale: Como adverbio intensifica el efecto perturbador; "terriblemente" reproduce esa fuerza en español sin introducir un sujeto afectivo nuevo.
- source_word: ἐτάραξαν
  english_pob_choice: troubled
  chosen_spanish: perturbaban
  alternatives_spanish:
  - turbaron
  - inquietaban
  - agitaron
  lexicon: LSJ
  rationale: El verbo puede significar turbar o agitar; "perturbaban" conserva el sentido de desorden mental/emocional y evita sobredeterminar el grado con "terrorizaron".
- source_word: φόβοι
  english_pob_choice: fears
  chosen_spanish: temores
  alternatives_spanish:
  - miedos
  - terrores
  lexicon: LSJ
  rationale: El plural abstracto se vierte de forma natural como "temores", manteniendo la pluralidad y el matiz de estados de miedo.
- source_word: ἐπέστησαν
  english_pob_choice: came upon
  chosen_spanish: se abatieron sobre
  alternatives_spanish:
  - vinieron sobre
  - sobrevinieron
  lexicon: LSJ
  rationale: La imagen de irrupción súbita se expresa bien con "se abatieron sobre", que en español transmite peso y acometida sin perder el valor de llegada inesperada.
- source_word: ἀδόκητοι
  english_pob_choice: unexpected
  chosen_spanish: inesperados
  alternatives_spanish:
  - imprevistos
  - no esperados
  lexicon: LSJ
  rationale: Equivale de forma directa a lo no anticipado; "inesperados" es natural y preciso en español contemporáneo.
translation_notes:
  revision_awareness: Se siguió el texto griego base de Swete (LXX 1909) y el audit trail inglés. La redacción española preserva la secuencia temporal, la inmediatez, el carácter onírico de φαντασίαι y la irrupción repentina de los temores, sin suavizar la tensión léxica del original.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando tecnicismos innecesarios.
  - '"Temores" y "perturbaban" conservan el plural y la intensidad gradual del griego.'
  - La nota textual/lexical se ancla en "visiones" porque ahí reside la ambigüedad semántica principal de φαντασίαι.
