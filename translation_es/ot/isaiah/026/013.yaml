review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: vocativo a Yahvé, contraste con otros señores que han ejercido dominio, y exclusividad en la mención del nombre divino. Sin embargo, desplaza la decisión principal del POB inglés sobre בך לבד. El texto inglés auditado eligió ''through you alone'' como lectura principal y preservó ''in you alone'' en nota; el español puso ''en ti'' en el texto y duplicó la ambigüedad en dos notas, una de ellas mal anclada.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero ''Oh Yahvé'' suena menos natural que ''Oh, Yahvé'' con puntuación española, y ''han dominado sobre nosotros'' es menos idiomático que ''han dominado sobre nosotros'' aunque sigue siendo entendible; el problema principal es de notas y anclaje, no de fluidez. También sobra la doble nota: [a] está puesta tras ''Dios'' pero comenta una alternativa de בך לבד, no del vocativo.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto al usar ''Yahvé'', ''Dios'', ''señores'' y ''hacemos mención de tu nombre''. No hay conflicto terminológico mayor. La excepción importante es metodológica: debe seguir la decisión documentada del POB inglés para la lectura principal de בך, dejando ''en ti'' como alternativa en nota.'
  issues:
  - severity: high
    issue: La lectura principal de בך לבד no sigue la decisión auditada del POB inglés.
    rationale: El registro inglés fijó 'through you alone' como texto principal y reservó 'in you alone' para nota. El borrador español invierte esa relación al poner 'solo en ti' como texto principal.
  - severity: high
    issue: Las notas al pie están mal distribuidas y una está anclada en el lugar incorrecto.
    rationale: La nota [a] aparece tras 'nuestro Dios' pero trata la ambigüedad de 'en/por ti solo'. Ese contenido debe anclarse en la frase correspondiente dentro de la segunda mitad del versículo. Además, no se deben crear dos notas distintas para la misma ambigüedad sin necesidad.
  - severity: medium
    issue: La puntuación vocativa puede mejorarse para español.
    rationale: '''Oh, Yahvé nuestro Dios'' lee mejor con coma tras la interjección en español.'
  revised_spanish_text: Oh, Yahvé nuestro Dios, otros señores además de ti han dominado sobre nosotros, pero solo por ti[a] hacemos mención de tu nombre.
  revised_footnotes:
  - marker: a
    text: 'O: «solo en ti hacemos mención de tu nombre». La preposición hebrea en «por/en ti» puede entenderse de más de una manera.'
