translation:
  language: es
  text: 'Entonces me dijo: «Volverás a ver grandes abominaciones[a] que están haciendo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mayores». El hebreo גְּדֹלוֹת puede leerse simplemente como «grandes», pero en el contexto de la escalada de ofensas en Ezequiel 8, «mayores» también puede ser una posibilidad interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» mantiene esa secuencia en español de modo natural. «Me dijo» conserva el destinatario explícito del hebreo.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - otra vez
  - de nuevo
  lexicon: HALOT
  rationale: En este contexto visionario, el adverbio señala una visión adicional o continuada. «Aún» transmite bien la idea de algo que todavía queda por ver, sin forzar una repetición meramente mecánica.
- source_word: תָּשׁוּב תִּרְאֶה
  english_pob_choice: you will again see
  chosen_spanish: verás
  alternatives_spanish:
  - volverás a ver
  - verás de nuevo
  - volverás y verás
  lexicon: HALOT
  rationale: La combinación שוב + verbo funciona aquí de manera adverbial. En español, «verás» con el adverbio contextual «aún» comunica la continuidad/ulterioridad sin redundancia artificial.
- source_word: תּוֹעֵבוֹת
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas detestables
  - cosas abominables
  lexicon: HALOT
  rationale: «Abominaciones» conserva la fuerza moral y profética del término técnico bíblico, especialmente en un contexto de idolatría y ofensa ritual.
- source_word: גְּדֹלוֹת
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - mayores
  - más grandes
  lexicon: HALOT
  rationale: La evidencia textual y la revisión inglesa favorecen el valor simple «great/grandes» más que un comparativo explícito. En español, «grandes» respeta esa decisión sin añadir una comparación que el hebreo no exige aquí.
- source_word: אֲשֶׁר הֵמָּה עֹשִׂים
  english_pob_choice: that they are doing
  chosen_spanish: que ellos están haciendo
  alternatives_spanish:
  - que hacen
  - las cuales ellos hacen
  lexicon: HALOT
  rationale: El participio/imperfectivo expresa acción en curso. «Están haciendo» lo reproduce con naturalidad; se mantiene «ellos» para dejar explícito el sujeto plural.
theological_decisions:
- issue: Intensidad moral de תּוֹעֵבוֹת en contexto profético
  english_pob_reading: abominations
  chosen_spanish_reading: abominaciones
  alternative_spanish_readings:
  - cosas detestables
  - impurezas
  rationale: En Ezequiel 8 el término funciona como denuncia profética de prácticas idolátricas y gravemente ofensivas. «Abominaciones» preserva ese peso teológico y no suaviza el juicio del texto.
  doctrine_reference: Profecía de juicio y santidad cultual en Ezequiel 8
- issue: Valor de גְּדֹלוֹת
  english_pob_reading: great
  chosen_spanish_reading: grandes
  alternative_spanish_readings:
  - mayores
  - más graves
  rationale: La revisión inglesa corrigió una lectura comparativa hacia un adjetivo simple. En español, «grandes» mantiene la neutralidad semántica y deja que el contexto de progresión en el capítulo sugiera la gravedad sin sobretraducir.
  doctrine_reference: Precisión lexical y principio de no añadir comparativo implícito
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «greater abominations» a «great abominations» para reflejar con más precisión גְּדֹלוֹת. La redacción española sigue esa decisión, evitando un comparativo explícito y manteniendo la progresión del capítulo por contexto, no por gramática añadida.
  spanish_consistency_notes:
  - Se conserva «Yahvé» no porque aparezca explícitamente aquí, sino por coherencia con la terminología POB cuando el nombre divino esté en el pasaje inmediato.
  - Se eligió «abominaciones» como término bíblico estable; no se sustituyó por una paráfrasis más suave.
  - Se evitó «volverás a ver» porque, aunque posible, la secuencia española se vuelve más natural con «aún verás» en esta frase breve.
  - La puntuación con comillas angulares sigue el uso editorial del español bíblico moderno.
