lexical_decisions:
- source_word: וְ/זִיזָא
  english_pob_choice: and Ziza
  chosen_spanish: y Ziza
  alternatives_spanish:
  - y Zizá
  - y Zizah
  lexicon: HALOT
  rationale: La conjunción וְ se mantiene como «y» para conservar la continuidad genealógica. El nombre propio se translitera; «Ziza» sigue la forma inglesa auditada y es suficientemente transparente en español. «Zizah» reflejaría otra convención inglesa, pero el hebreo termina en alef, no en he.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: En una fórmula genealógica, בֶן se expresa naturalmente como «hijo de». Se preserva la repetición para reflejar la estructura hebrea con transparencia.
- source_word: שִׁפְעִי
  english_pob_choice: Shiphi
  chosen_spanish: Shipi
  alternatives_spanish:
  - Shipi
  - Shiphi
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español se adapta la grafía a una forma legible y cercana al hebreo; se evita duplicar la h inglesa final si no aporta claridad. La forma mantiene el valor identificador sin traducir el nombre.
- source_word: אַלּוֹן
  english_pob_choice: Allon
  chosen_spanish: Allón
  alternatives_spanish:
  - Allon
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se añade tilde para ajustar la acentuación natural del español y ayudar a la lectura, sin alterar la identificación del nombre.
- source_word: יְדָיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Jedajías
  - Yedaías
  lexicon: HALOT
  rationale: Nombre propio transliterado con una forma española comprensible y tradicionalmente reconocible. Se conserva la identidad del nombre sin traducirlo.
- source_word: שִׁמְרִי
  english_pob_choice: Shimri
  chosen_spanish: Shimri
  alternatives_spanish:
  - Simri
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva «Sh» para reflejar la shin hebrea, como en la decisión inglesa auditada.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemayá
  - Shemaías
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española natural. Se usa «Se-» para una lectura fluida en español, manteniendo la referencia al nombre hebreo; la forma inglesa auditada «Shemaiah» muestra la misma base consonántica.
