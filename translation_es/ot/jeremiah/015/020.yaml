translation:
  language: es
  text: Y yo te haré para este pueblo una muralla de bronce fortificada[a]; pelearán contra ti, pero no prevalecerán contra ti, porque yo estoy contigo para salvarte y para librarte, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un muro de bronce fortificado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּיךָ
  english_pob_choice: And I will make you
  chosen_spanish: Y yo te pondré
  alternatives_spanish:
  - Y yo te haré
  - Y yo te estableceré
  lexicon: HALOT
  rationale: נתן en esta construcción con complemento predicativo expresa la idea de poner o constituir a alguien en cierto estado. En español, «te pondré» mantiene ese valor de asignación/constitución sin forzar un calco mecánico.
- source_word: לָעָם הַזֶּה
  english_pob_choice: to this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - para este pueblo
  - frente a este pueblo
  lexicon: HALOT
  rationale: La preposición hebrea en este contexto marca relación respecto de «este pueblo». «A este pueblo» conserva esa relación de referencia y funciona naturalmente con «poner» en español.
- source_word: לְחוֹמַת נְחֹשֶׁת בְּצוּרָה
  english_pob_choice: a fortified wall of bronze
  chosen_spanish: como muro de bronce fortificado
  alternatives_spanish:
  - como una muralla de bronce fortificada
  - como muro fortificado de bronce
  lexicon: HALOT
  rationale: חוֹמָה es «muro/muralla»; נְחֹשֶׁת es «bronce»; בְּצוּרָה añade la idea de algo fortificado o inaccesible. «Como muro de bronce fortificado» preserva la metáfora y el orden más natural en español.
- source_word: וְנִלְחֲמוּ אֵלֶיךָ
  english_pob_choice: they will fight against you
  chosen_spanish: pelearán contra ti
  alternatives_spanish:
  - librarán guerra contra ti
  - combatirán contra ti
  lexicon: HALOT
  rationale: לָחַם con אֶל tiene el sentido de pelear contra alguien. «Pelearán contra ti» comunica la acción de manera clara y directa en español.
- source_word: וְלֹא יוּכְלוּ לָךְ
  english_pob_choice: but they will not prevail over you
  chosen_spanish: pero no podrán contra ti
  alternatives_spanish:
  - pero no prevalecerán sobre ti
  - pero no podrán vencerte
  lexicon: HALOT
  rationale: יָכֹל con לְ aquí expresa incapacidad de triunfar o imponerse. «No podrán contra ti» conserva esa fuerza idiomática sin introducir un equivalente más explicativo que el hebreo no exige.
- source_word: כִּי אִתְּךָ אֲנִי
  english_pob_choice: for I am with you
  chosen_spanish: porque yo estoy contigo
  alternatives_spanish:
  - pues yo estoy contigo
  - porque estoy contigo
  lexicon: HALOT
  rationale: כִּי introduce la razón de su fracaso y de la protección divina. «Porque yo estoy contigo» reproduce el valor explicativo y mantiene la cercanía del hebreo.
- source_word: לְהוֹשִׁיעֲךָ
  english_pob_choice: to save you
  chosen_spanish: para salvarte
  alternatives_spanish:
  - para rescatarte
  - para darte salvación
  lexicon: HALOT
  rationale: ישע significa salvar/deliver. «Salvarte» es el equivalente más directo y fiel en español.
- source_word: וּלְהַצִּילֶךָ
  english_pob_choice: and to deliver you
  chosen_spanish: y para librarte
  alternatives_spanish:
  - y para rescatarte
  - y para sacarte a salvo
  lexicon: HALOT
  rationale: נצל añade la idea de librar, rescatar o arrancar de peligro. «Librarte» distingue el segundo verbo del anterior sin perder el paralelismo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: El hebreo concluye con la fórmula profética נְאֻם y el nombre divino YHWH. Siguiendo el criterio del proyecto, se mantiene «Yahvé» en lugar de un sustituto reverencial, y «declara» reproduce la fórmula solemne de cierre.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español del proyecto, la forma establecida es «Yahvé», para preservar el nombre del pacto y evitar la ocultación convencional del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece explícitamente en el texto español y corresponde a la alternativa léxica documentada para la metáfora de «muro de bronce fortificado».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se distinguieron los dos verbos finales con «salvarte» y «librarte» para preservar el paralelismo hebreo.
  - Se prefirió una sintaxis natural en español sin perder la imagen de fortificación del original.
