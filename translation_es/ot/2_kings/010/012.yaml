revisions:
- from: Entonces se levantó y fue a Samaria[a]. Estaba en Bet-edec de los pastores, en el camino.
  to: Entonces se levantó, fue y siguió hacia Samaria. Estaba en Bet-Équed[a] de los pastores, en el camino.
  rationale: Se restaura mejor la secuencia de tres verbos del hebreo usando una formulación natural en español («fue y siguió hacia Samaria»), y se corrige el topónimo a una transliteración más fiel a la decisión POB de no traducirlo. Se conserva la nota léxica porque la etimología del nombre sigue siendo incierta.
  reviewer_model: gpt-5.4
