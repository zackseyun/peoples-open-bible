base_translation:
  language: en
  yaml_path: translation/ot/genesis/043/003.yaml
  text: Then Judah said to him[a], “The man solemnly warned us, saying[b], ‘You shall not see my face unless your brother is with you.’”
  footnotes:
  - marker: a
    text: Or, 'The man strictly warned us' or 'The man plainly warned us.' The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'You shall not see my face.' This idiom can also mean 'You shall not appear before me.'
    reason: lexical_alternative
