review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva bien el sentido global del hebreo y sigue adecuadamente las decisiones del POB en cuanto a Yahvé, el alcance universal de 'tierra', y la dificultad de la cláusula final. Sin embargo, contiene un error gramatical importante en 'su celos' y varias formulaciones poco naturales en español ('hará un fin completo', nota a sobre 'los librará') que conviene corregir para reflejar fielmente el sentido sin torpeza.
  spanish_quality_summary: 'La legibilidad general es aceptable, pero hay una incorrección clara (''su celos'') y dos giros poco idiomáticos: ''en el fuego de sus celos'' puede sonar algo pesado, aunque es defendible; ''hará un fin completo'' es demasiado calcado y poco natural. ''pondrá un fin completo'' o ''hará una destrucción completa'' serían más naturales; aquí se prefiere ''pondrá un fin completo'' por cercanía semántica sin ampliar demasiado. También conviene ajustar la nota a para no sugerir erróneamente un singular verbal alternativo.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה -> ''Yahvé''; קִנְאָה mantiene el matiz relacional con ''celos''; הָאָרֶץ se traduce como ''tierra'' con alcance universal. No hay conflicto doctrinal serio. La única excepción es que ''celos'' debe ir con posesivo plural correcto en español (''sus celos'') o replantearse; se mantiene ''celos'' por la rationale documentada.'
  issues:
  - severity: high
    issue: Error gramatical en 'su celos'.
    rationale: En español estándar debe ser 'sus celos' o cambiar a 'su celo'. La forma actual no es aceptable en el texto bíblico final.
  - severity: medium
    issue: '''hará un fin completo'' suena calcado y poco natural.'
    rationale: Aunque intenta reflejar el hebreo, en español moderno y digno resulta torpe. 'pondrá un fin completo' preserva mejor el sentido con naturalidad.
  - severity: medium
    issue: La nota [a] propone 'los librará', que altera indebidamente la estructura verbal.
    rationale: El hebreo expresa incapacidad ('no podrán librarlos' / 'no serán capaces de librarlos'), no una simple alternativa singular afirmativa. La nota actual puede confundir al lector.
  - severity: low
    issue: Falta nota sobre 'tierra' = 'tierra' o 'país'.
    rationale: El inglés POB incluye una nota de alternativa relevante para אֶרֶץ. No es estrictamente obligatorio, pero sí recomendable cuando ya se usan notas léxicas y el término puede crear ambigüedad en español.
  revised_spanish_text: Ni su plata ni su oro podrán librarlos en el día de la ira de Yahvé[a], y en el fuego de sus celos[b] será consumida toda la tierra; porque él pondrá un fin completo, sí, repentino[c], a todos los habitantes de la tierra.
  revised_footnotes:
