id: ISA.48.10
reference: Isaiah 48:10
source:
  edition: WLC
  text: הִנֵּ֥ה צְרַפְתִּ֖י/ךָ וְ/לֹ֣א בְ/כָ֑סֶף בְּחַרְתִּ֖י/ךָ בְּ/כ֥וּר עֹֽנִי׃
translation:
  text: Behold[a], I have refined you, but not as silver[b]; I have chosen you in the furnace of affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have chosen you in the furnace of affliction.' The Hebrew verb can also be understood in its more usual sense, 'choose.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'not with/as silver'; the Hebrew phrase is difficult, likely meaning that this refining was not like the refining of silver.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - See
  - Look
  lexicon: HALOT
  rationale: Introduces the statement with emphatic attention-getting force. 'Behold' preserves the prophetic register more closely than 'Look,' while remaining intelligible in modern English.
- source_word: צְרַפְתִּיךָ
  chosen: I have refined you
  alternatives:
  - I have smelted you
  - I have tested you
  lexicon: HALOT
  rationale: The verb צרף commonly refers to smelting/refining metals. 'Refined' communicates the metallurgical metaphor naturally in English and fits the following mention of silver and furnace imagery.
- source_word: וְלֹא בְכָסֶף
  chosen: but not as silver
  alternatives:
  - but not with silver
  - but not for silver
  lexicon: HALOT
  rationale: The preposition ב with כסף here is difficult. In context of refining imagery, the sense is best taken comparatively or with reference to the manner/result of refining rather than instrumentality. 'But not as silver' captures the likely meaning that Israel's refining was not like the refining of silver. This also aligns with the parallel shift to the furnace of affliction.
- source_word: בְּחַרְתִּיךָ
  chosen: I have tested you
  alternatives:
  - I have chosen you
  - I have proved you
  lexicon: HALOT
  rationale: Although בחר usually means 'choose,' in this context many understand it in a related sense of selecting/proving within the refining metaphor. 'I have tested you' best fits the immediate imagery of refining and affliction and avoids the awkward repetition of election language in a verse focused on purification through suffering.
- source_word: בְּכוּר
  chosen: in the furnace
  alternatives:
  - in the smelting furnace
  - in the crucible
  lexicon: HALOT
  rationale: כור denotes a smelting furnace. 'Furnace' is clear and idiomatic; the metallurgical nuance is already carried by 'refined' and the context.
- source_word: עֹנִי
  chosen: affliction
  alternatives:
  - misery
  - poverty
  - suffering
  lexicon: HALOT
  rationale: The noun can denote affliction, misery, or poverty. Here it refers broadly to the suffering through which Israel has been refined. 'Affliction' preserves the gravity and breadth of the term.
