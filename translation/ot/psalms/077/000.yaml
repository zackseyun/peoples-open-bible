id: PSA.77.0
reference: Psalms 77:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ עַֽל ידיתון לְ/אָסָ֥ף מִזְמֽוֹר־׃
translation:
  text: 'For the choir director: according to Jeduthun[d][c][b][a]. A psalm of Asaph.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the music director' or 'To the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: '''According to Jeduthun'' may indicate a musical style, tune, ensemble, or the guild associated with Jeduthun.'
    reason: cultural_note
  - marker: c
    text: Or 'For Asaph'; the Hebrew preposition can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: d
    text: Or 'Of Asaph. A psalm.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the chief musician
  lexicon: HALOT
  rationale: In Psalm superscriptions, this participial form conventionally indicates direction to the person overseeing musical performance. 'Choir director' is clear modern English and preserves the functional sense without archaic wording.
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - for
  - with
  lexicon: HALOT
  rationale: In musical superscriptions, עַל often introduces the tune, style, or performance designation rather than a simple spatial 'on.' 'According to' best captures this heading usage in readable English.
- source_word: יְדוּתוּן
  chosen: Jeduthun
  lexicon: HALOT
  rationale: This is a personal or guild name and, per translation philosophy, names are transliterated rather than translated.
- source_word: לְאָסָף
  chosen: Of Asaph
  alternatives:
  - For Asaph
  - Belonging to Asaph
  lexicon: HALOT
  rationale: The lamed in psalm headings can mark authorship, association, or dedication. 'Of Asaph' is the most natural concise English rendering and preserves the ambiguity of association without over-specifying authorship.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: The standard genre term for מִזְמוֹר is 'psalm.' This preserves the literary classification and aligns with established English usage without obscuring meaning.
