    rationale: El texto dice «matas», mientras la ficha de decisión dice «mates». No afecta gravemente el verso, pero una revisión del texto resuelve también esta falta de concordancia.
  revised_spanish_text: Sigue, pues, tirano; y si nos quitas la vida[a] por causa de la piedad, no pienses que, al torturarnos, nos haces daño.
