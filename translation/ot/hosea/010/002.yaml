theological_decisions:
- issue: Referent of the emphatic pronoun הוּא
  chosen_reading: 'God is the implied subject of the acts of judgment: ''He himself will tear down... he will devastate...'''
  alternative_readings:
  - An unnamed enemy/agent of judgment is the subject
  rationale: The verse moves from Israel's guilt to a singular masculine agent who destroys their cultic sites. In Hosea, God is regularly the ultimate actor in judgment, whether directly or through instruments. The English keeps the pronoun without adding 'the LORD,' but the capitalization and emphasis reflect the likely divine referent.
  doctrine_reference: Preserve theological tension rather than resolve it; render the most likely reading without importing more than the text states.
