base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/046/017.yaml
  text: In a mighty crash his voice was heard[a], and the leaders of the foe were subdued[c][b], and all the rulers of the Philistines perished.
  footnotes:
  - marker: a
    text: Hebrew 'in a mighty crash'; the Greek parallel more explicitly reads that the Lord thundered from heaven and made his voice heard with a great sound.
    reason: alternative_reading
  - marker: b
    text: Or 'the garrisons of the enemy,' if נציבי is taken in an impersonal or military-post sense rather than as leaders.
    reason: lexical_alternative
  - marker: c
    text: '''Rulers of the Philistines'' reflects the Philistine title known from 1 Samuel; alternatively, ''lords of the Philistines.'''
    reason: cross_reference
