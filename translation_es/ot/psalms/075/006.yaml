translation:
  language: es
  text: No levanten en alto su cuerno[a]; no hablen con cuello altivo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘su cuerno’ es una metáfora de fuerza, poder o autoexaltación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘no hablen con cuello insolente’ / ‘no hablen con el cuello rígido’. El hebreo conserva una metáfora corporal de desafío orgulloso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagan
  - No levanten
  lexicon: HALOT
  rationale: La partícula de prohibición se expresa con una negación imperativa simple en español. Mantiene el valor prohibitivo directo del hebreo sin añadir énfasis innecesario.
- source_word: תָּרִימוּ
  english_pob_choice: lift up
  chosen_spanish: levanten en alto
  alternatives_spanish:
  - levanten
  - alzaren
  - exalten
  lexicon: HALOT
  rationale: ‘Levanten en alto’ conserva la imagen concreta de elevar algo, y en español mantiene mejor el paralelismo con el verbo físico del hebreo que ‘exalten’, que sería más interpretativo.
- source_word: לַמָּרוֹם
  english_pob_choice: on high
  chosen_spanish: en alto
  alternatives_spanish:
  - hacia lo alto
  - en las alturas
  lexicon: HALOT
  rationale: La expresión espacial se vierte con una frase idiomática natural en español. ‘En alto’ preserva la idea de elevación sin perder claridad.
- source_word: קַרְנְכֶם
  english_pob_choice: your horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su poder
  - su fuerza
  - su orgullo
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal de ‘cuerno’, como en el texto fuente y en la traducción inglesa auditada. Así no se borra la imagen de fuerza/exaltación que el hebreo deja visible.
- source_word: תְּדַבְּרוּ
  english_pob_choice: speak
  chosen_spanish: hablen
  alternatives_spanish:
  - hablen ustedes
  - digan
  - pronuncien
  lexicon: HALOT
  rationale: El verbo general de hablar se expresa de forma natural y sobria. ‘Hablen’ corresponde al registro exhortativo del salmo.
- source_word: בְצַוָּאר
  english_pob_choice: with a ... neck
  chosen_spanish: con cuello
  alternatives_spanish:
  - con la cerviz
  - con el cuello rígido
  lexicon: HALOT
  rationale: Se mantiene el sustantivo corporal ‘cuello’ para preservar la metáfora del hebreo. No se sustituye por una paráfrasis interpretativa.
- source_word: עָתָק
  english_pob_choice: arrogant
  chosen_spanish: arrogante
  alternatives_spanish:
  - insolente
  - altivo
  - huraño
  lexicon: HALOT
  rationale: ‘Arrogante’ comunica de manera clara y fiel la carga de insolencia/presunción del término, y encaja con el matiz de la metáfora del cuello.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la revisión más reciente; la presente redacción sigue de cerca su solución óptima-equivalente y conserva las dos metáforas principales (cuerno y cuello) sin neutralizarlas.
  spanish_consistency_notes:
  - Se conservó el tratamiento en plural (‘su’) porque el hebreo se dirige a un colectivo.
  - Se mantuvo la metáfora de ‘cuerno’ en el texto principal y se explicó su valor figurado en nota, en línea con la práctica auditada en inglés.
  - ‘Cuello arrogante’ busca ser natural en español sin eliminar la imagen corporal del hebreo; la nota ofrece alternativas más cercanas a la literalidad.
  - No se introdujo terminología eclesiástica adicional ni se interpretó ‘cuerno’ como ‘poder’ en el cuerpo principal para respetar la tensión léxica documentada.
