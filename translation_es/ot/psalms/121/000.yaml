review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la cláusula principal del encabezado y el verso: ‘Alzo mis ojos… ¿de dónde vendrá mi ayuda?’ refleja fielmente אֶשָּׂא עֵינַי … מֵאַיִן יָבֹא עֶזְרִי. Sin embargo, el encabezado שִׁיר לַמַּעֲלוֹת está mejor representado en plural, en línea con el inglés POB ‘A Song of Ascents’, no con el singular ‘de ascenso’.'
  spanish_quality_summary: El español es claro y digno. ‘Alzo mis ojos’ y ‘¿de dónde vendrá mi ayuda?’ son naturales y legibles. La principal mejora necesaria es corregir el título a un plural más fiel y ajustar la nota léxica para que corresponda al término realmente alternado.
  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. Sí importa la consistencia con el audit trail: שִׁיר לַמַּעֲלוֹת debe conservar el valor plural ‘ascensos/subidas’ mejor que el singular ‘ascenso’. Además, la nota inglesa sobre ‘mountains/hills’ debe anclarse al sustantivo geográfico, no al encabezado.'
  issues:
  - severity: high
    issue: ‘Cántico de ascenso’ reduce indebidamente el plural hebreo מַעֲלוֹת.
    rationale: El source y el inglés POB tienen plural (‘Ascents’). Aunque el singular puede sonar idiomático como nombre de colección, aquí pierde un rasgo formal del encabezado sin necesidad.
  - severity: high
    issue: La nota [a] está mal anclada al encabezado en vez de a ‘montes’.
    rationale: La nota inglesa ‘Or “the hills”’ comenta הֶהָרִים, no שִׁיר לַמַּעֲלוֹת. En español, el marcador debe aparecer junto a ‘montes’ o ‘montañas’.
  - severity: medium
    issue: El contenido de la nota ‘O “los montes”’ no corresponde al texto base actual.
    rationale: Si el texto dice ‘montes’, la alternativa debe ser ‘las montañas’ o ‘las colinas/cerros’ según la decisión editorial. Repetir ‘los montes’ no ofrece alternativa real.
  revised_spanish_text: Cántico de ascensos. Alzo mis ojos a los montes[a]; ¿de dónde vendrá mi ayuda?
