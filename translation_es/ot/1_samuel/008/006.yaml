translation:
  language: es
  text: 'Pero el asunto fue desagradable[a] a los ojos de Samuel cuando dijeron: «Danos un rey para que nos juzgue[b]». Y Samuel oró a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue malo a los ojos de Samuel». El hebreo dice literalmente que el asunto «fue malo» en los ojos de Samuel, expresando una evaluación muy negativa.
    reason: lexical_alternative
  - marker: b
    text: O «para gobernarnos» o «para regirnos». El verbo hebreo puede incluir la idea de gobierno, no solo de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרַע
  english_pob_choice: was displeasing
  chosen_spanish: fue desagradable
  alternatives_spanish:
  - fue malo
  - fue evil / fue malo en sentido moral
  - le pareció mal
  lexicon: HALOT
  rationale: El hebreo expresa una valoración negativa fuerte del asunto. En español, «fue desagradable» conserva la reacción negativa sin sonar artificial, y deja abierta la tensión entre disgusto y juicio moral que el contexto sugiere.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - el hecho
  - la petición
  lexicon: HALOT
  rationale: דָּבָר puede significar «cosa», «asunto» o «palabra». Aquí el referente es la solicitud presentada; «la cosa» es algo amplia pero natural, y evita estrechar el sentido demasiado rápido a «petición».
- source_word: בְּעֵינֵי שְׁמוּאֵל
  english_pob_choice: in Samuel’s eyes
  chosen_spanish: a los ojos de Samuel
  alternatives_spanish:
  - ante Samuel
  - en la opinión de Samuel
  - para Samuel
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y evalúa el hecho desde la perspectiva de Samuel. «A los ojos de Samuel» conserva la imagen y el valor evaluativo del giro original.
- source_word: כַּאֲשֶׁר אָמְרוּ
  english_pob_choice: when they said
  chosen_spanish: cuando dijeron
  alternatives_spanish:
  - al decir
  - porque dijeron
  - así que dijeron
  lexicon: HALOT
  rationale: El valor temporal es el más natural aquí. «Cuando dijeron» sigue fielmente la secuencia narrativa sin introducir causalidad explícita que el hebreo no exige.
- source_word: תְּנָה לָּנוּ
  english_pob_choice: Give us
  chosen_spanish: Danos
  alternatives_spanish:
  - Concédenos
  - Entréganos
  - Asigna para nosotros
  lexicon: HALOT
  rationale: El imperativo es directo y exigente. «Danos» reproduce esa inmediatez en español de forma natural y fiel.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - un gobernante
  - un soberano
  lexicon: HALOT
  rationale: Es el equivalente directo y contextual apropiado.
- source_word: לְשָׁפְטֵנוּ
  english_pob_choice: to judge us
  chosen_spanish: para que nos juzgue
  alternatives_spanish:
  - para gobernarnos
  - para regirnos
  - para juzgarnos
  lexicon: HALOT
  rationale: El verbo שָׁפַט puede abarcar juicio y gobierno. Se mantiene «juzgue» por la vinculación lexical con el libro de los jueces y porque el contexto sigue siendo una petición sobre autoridad; la estructura «para que» expresa bien la finalidad en español.
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rezó
  - intercedió
  - se puso a orar
  lexicon: HALOT
  rationale: En español eclesial amplio, «oró» es el equivalente claro y sobrio del hitpael de פלל. «Intercedió» sería demasiado específico para el verbo solo.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - al Señor
  - a Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: el Tetragrámaton se vierte «Yahvé». La preposición «a» expresa naturalmente la dirección de la oración.'
theological_decisions:
- issue: Valoración moral fuerte del rechazo del pueblo
  english_pob_reading: was displeasing in Samuel’s eyes
  chosen_spanish_reading: fue desagradable a los ojos de Samuel
  alternative_spanish_readings:
  - fue malo a los ojos de Samuel
  - le pareció mal a Samuel
  - era detestable para Samuel
  rationale: El hebreo no solo comunica emoción; conserva una evaluación negativa seria. «Desagradable» retiene la desaprobación sin convertirla en una paráfrasis moralizante más fuerte de lo que el contexto inmediato demanda.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-language tension and evaluative force'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la convención del proyecto para el Tetragrámaton, evitando el reemplazo por un título en mayúsculas. Esto conserva la trazabilidad del nombre divino en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB, que prefirió «was displeasing» como más natural que «was evil», sin perder la fuerza evaluativa del hebreo. La versión española refleja esa decisión con «fue desagradable», mientras conserva la imagen idiomática de «a los ojos de Samuel» y el verbo «juzgue» con nota de posible sentido gubernativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el valor idiomático de «a los ojos de Samuel» en lugar de normalizarlo a «para Samuel».
  - «Juzgue» mantiene la conexión con el campo semántico de שפט; la nota explica la posible extensión a «gobernar» o «regir».
  - Se evita «SEÑOR» para el nombre divino, conforme al criterio del proyecto.
