translation:
  language: es
  text: Y las jóvenes que apenas habían entrado en la cámara nupcial[a] para compartir la vida en matrimonio, cambiando el gozo por lamentación, y con su cabellera empapada de perfume embadurnada de polvo, siendo llevadas sin velo[b], entonaban un lamento en vez de cantos nupciales, unánimes, como si hubieran sido desgarradas por abusos de extranjeros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lecho matrimonial» para γαμικὸν ... παστόν.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «descubiertas» o «con la cabeza descubierta», signo de humillación pública en este contexto.
    reason: cultural_note
  - marker: c
    text: O «de extranjeros» en vez de «por extranjeros»; el griego resalta el ultraje asociado con gente de otra nación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτι
  english_pob_choice: had just
  chosen_spanish: apenas habían entrado
  alternatives_spanish:
  - habían entrado hacía poco
  - recién habían entrado
  lexicon: LSJ
  rationale: Expresa la inmediatez del ingreso al ámbito nupcial con naturalidad en español y conserva el valor reciente del participio temporal.
- source_word: πρὸς βίου κοινωνίαν
  english_pob_choice: for the sharing of life
  chosen_spanish: para la comunión de la vida
  alternatives_spanish:
  - para la participación en la vida
  - para la sociedad de la vida
  lexicon: LSJ
  rationale: κοινωνία conserva la idea de participación/comunión compartida; 'comunión de la vida' refleja esa unión sin reducirla a una fórmula eclesiástica ni perder el matiz relacional.
- source_word: γαμικὸν ... παστόν
  english_pob_choice: the bridal chamber
  chosen_spanish: la cámara nupcial
  alternatives_spanish:
  - el tálamo nupcial
  - la alcoba nupcial
  lexicon: LSJ
  rationale: παστός puede referir al espacio nupcial o lecho matrimonial; 'cámara nupcial' es un equivalente digno y comprensible en español, manteniendo la ambigüedad espacial/ritual documentada por el inglés.
- source_word: νεάνιδες
  english_pob_choice: the young women
  chosen_spanish: las jóvenes
  alternatives_spanish:
  - las muchachas
  - las doncellas
  lexicon: LSJ
  rationale: El griego señala juventud y sexo femenino sin especificar 'novias'; 'jóvenes' es fiel y evita interpretar de más.
- source_word: ἀντὶ τέρψεως μεταλαβοῦσαι γόους
  english_pob_choice: taking up lamentation instead of joy
  chosen_spanish: tomando lamentación en lugar de gozo
  alternatives_spanish:
  - recibiendo duelo en vez de deleite
  - asumiendo llanto en vez de alegría
  lexicon: LSJ
  rationale: Mantiene la oposición explícita entre τέρψις y γόος con un español sobrio y directo; 'lamentación' y 'gozo' preservan el contraste literario.
- source_word: μυροβρεχῆ ... κόμην
  english_pob_choice: their perfume-drenched hair
  chosen_spanish: el cabello empapado en perfumes
  alternatives_spanish:
  - el cabello mojado en ungüento aromático
  - la cabellera empapada de perfume
  lexicon: LSJ
  rationale: El compuesto indica cabello mojado/empapado en sustancias aromáticas; 'perfumes' conserva la idea de ungüento perfumado sin imponer una identificación única.
- source_word: πεφυρμέναι
  english_pob_choice: smeared
  chosen_spanish: mezclado con polvo
  alternatives_spanish:
  - embadurnado de polvo
  - ensuciado con polvo
  lexicon: LSJ
  rationale: El verbo expresa que lo preparado con perfume aparece manchado por polvo; en español, 'mezclado con polvo' comunica la contaminación visible sin exagerar el desprecio del gesto.
- source_word: ἀκαλύπτως
  english_pob_choice: unveiled
  chosen_spanish: sin velo
  alternatives_spanish:
  - descubiertas
  - con la cabeza descubierta
  lexicon: LSJ
  rationale: En este contexto cultural, 'sin velo' transmite la humillación pública de manera natural para el lector español y mantiene la equivalencia funcional con el griego.
- source_word: ἀγόμεναι
  english_pob_choice: were being led away
  chosen_spanish: llevadas
  alternatives_spanish:
  - conducidas
  - arrastradas
  lexicon: LSJ
  rationale: La voz pasiva describe movimiento impuesto; 'llevadas' es sobrio y suficientemente coercitivo sin añadir violencia no explicitada por el verbo mismo.
- source_word: θρῆνον
  english_pob_choice: a dirge
  chosen_spanish: un lamento
  alternatives_spanish:
  - un canto fúnebre
  - un dirge
  lexicon: LSJ
  rationale: En español, 'lamento' comunica la función funeraria/afligida del término con mayor naturalidad que un calco técnico.
- source_word: ὑμεναίων
  english_pob_choice: wedding songs
  chosen_spanish: cantos nupciales
  alternatives_spanish:
  - cantos de boda
  - himnos nupciales
  lexicon: LSJ
  rationale: El sustantivo alude a canciones de boda; 'cantos nupciales' conserva el contraste ceremonial con 'lamento' y suena natural en español.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: con un mismo sentir
  alternatives_spanish:
  - unánimemente
  - de común acuerdo
  lexicon: LSJ
  rationale: La frase comunica unanimidad afectiva y acción conjunta; 'con un mismo sentir' retiene el tono colectivo sin ser rígidamente literal.
- source_word: ὡς ἐσπαραγμέναι
  english_pob_choice: as though torn apart
  chosen_spanish: como si hubieran sido desgarradas
  alternatives_spanish:
  - como si estuvieran despedazadas
  - como si hubieran sido rasgadas
  lexicon: LSJ
  rationale: σπαράσσω implica desgarro violento; 'desgarradas' preserva la intensidad figurada del comparativo ὡς sin afirmar literalidad física.
- source_word: αἰκίαις
  english_pob_choice: by abuse
  chosen_spanish: por abusos
  alternatives_spanish:
  - por maltratos
  - por vejaciones
  lexicon: LSJ
  rationale: El término puede abarcar trato cruel y ultraje; 'abusos' mantiene amplitud semántica y el peso moral del agravio.
- source_word: ἀλλοεθνεῖσιν
  english_pob_choice: from foreigners
  chosen_spanish: de extranjeros
  alternatives_spanish:
  - por extranjeros
  - de gente de otra nación
  lexicon: LSJ
  rationale: El adjetivo señala alteridad étnica/nacional; 'extranjeros' reproduce ese otro-en cuanto-pueblo sin diluirlo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete 1909 y armoniza las decisiones inglesas auditadas con equivalentes españoles naturales; no se incorporaron revisiones posteriores porque el pass más reciente indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se preservó el contraste entre alegría nupcial y lamento mediante 'gozo' / 'lamentación' / 'cantos nupciales'.
  - Se mantuvo la imagen de honor público y humillación con 'sin velo' y 'desgarradas'.
  - Se evitó reemplazar términos culturales por lenguaje eclesiástico moderno no sustentado por el griego.
