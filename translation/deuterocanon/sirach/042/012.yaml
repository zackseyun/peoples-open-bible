translation:
  text: Do not display your beauty to any man[b][a], and do not sit among women in the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to every male do not give beauty/appearance.'' The Greek parallel reads, ''Do not look upon every person/man in beauty,'' reflecting a different understanding of the line.'
    reason: alternative_reading
  - marker: b
    text: The final Hebrew verb is uncertain in the Geniza text. The Greek parallel supports the sense 'do not sit/keep company among women.' A Masada witness is reported to reflect a related social-interaction reading rather than the exact Geniza wording.
    reason: textual_variant
lexical_decisions:
- source_word: לכל זכר
  chosen: to any man
  alternatives:
  - to every male
  - before any man
  - to any male
  lexicon: HALOT
  rationale: The Hebrew literally means 'to every male.' In idiomatic English, 'to any man' best conveys the warning's sense while preserving the gender-specific reference. The Greek parallel παντὶ ἀνθρώπῳ broadens slightly to 'every person/man,' but the Hebrew witness is primary here and remains specifically male.
- source_word: אל תתן תאר
  chosen: do not display your beauty
  alternatives:
  - do not give your form
  - do not show your appearance
  - do not present your beauty
  lexicon: HALOT
  rationale: The phrase is idiomatic. תאר commonly refers to form, figure, or beauty/appearance. In this context, with the Greek ἐν κάλλει ('in beauty') as a control, the sense is not literal 'give form' but making one's beauty visible or available to the gaze. 'Display your beauty' is natural English and fits both witnesses.
- source_word: ובית נשים
  chosen: in the house
  alternatives:
  - in a women's house
  - in the women's quarters
  lexicon: HALOT
  rationale: The Hebrew phrase literally includes 'house of women,' but the line is textually difficult and the Greek has ἐν μέσῳ γυναικῶν ('among women'). Because the following verb likely concerns social sitting/association, 'in the house' keeps the locative force without over-specifying a reconstructed institution. The women's setting is then carried by 'among women.'
- source_word: אל תסתויד
  chosen: do not sit among women
  alternatives:
  - do not associate with women
  - do not converse among women
  - do not linger among women
  lexicon: HALOT
  rationale: The Hebrew verb is uncertain in form and meaning in the Geniza text. The Greek συνέδρευε clearly points to sitting together/keeping company. Given the Masada consult note also points toward a social-interaction verb, 'do not sit among women' is the most defensible rendering, preserving the concrete image rather than flattening it to a vague prohibition.
