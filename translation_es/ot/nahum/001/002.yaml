review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura enfática del hebreo, repite adecuadamente נֹקֵם con ''vengador / toma venganza'', mantiene ''Yahvé'' para יהוה y refleja bien ''guarda ira para sus enemigos'' para וְנוֹטֵר הוּא לְאֹיְבָיו. Sin embargo, la colocación de las notas [c][b] en ''sus adversarios'' induce a error: la nota b corresponde a וּבַעַל חֵמָה (''lleno de ira''), no a ''adversarios''; y la nota c en español no debe ofrecer como alternativa exactamente la cláusula final del versículo, sino la alternativa para el segmento de נֹקֵם לְצָרָיו / וְנוֹטֵר... Además, la nota a tiene la forma incorrecta ''zeloso'' en vez de ''celoso''/''celante'' o ''celoso''/''celoso'' alternativa más normal ''celante'' no es ideal; la alternativa documentada del inglés es ''zealous'', que en español conviene expresar como ''celoso'' vs. ''lleno de celo'' o ''celante'', pero aquí basta una formulación más natural.'
  spanish_quality_summary: El español principal es claro, digno y natural. 'Yahvé es un Dios celoso y vengador' suena bien; 'lleno de ira' y 'guarda ira para sus enemigos' también. El único problema serio de legibilidad es la mala anclación de las notas, que hace que el lector asocie observaciones léxicas equivocadas con 'adversarios'. También conviene corregir la ortografía/elección de 'zeloso' en la nota a, ya que no es la forma moderna esperable en este registro.
  glossary_alignment: 'Buen alineamiento con el glosario del proyecto: יהוה -> ''Yahvé'', אֵל -> ''Dios'', חֵמָה -> ''ira'', y se mantiene el lenguaje fuerte de juicio. No hay conflicto doctrinal relevante. La principal desviación es técnica/editorial: la nota sobre בעל חמה debe anclarse a ''lleno de ira'', no a ''adversarios''.'
  issues:
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado.
    rationale: La nota b explica literalmente וּבַעַל חֵמָה ('dueño/poseedor de ira'), pero en el borrador aparece junto a 'sus adversarios', lo que falsea la relación entre nota y texto fuente.
  - severity: medium
    issue: La nota [c] en español es engañosa tal como está formulada y ubicada.
    rationale: El inglés marca una alternativa para la relación entre 'takes vengeance on his adversaries' y 'he keeps wrath for his enemies'. En español, poner [c] en 'adversarios' con el texto 'O "guarda ira para sus enemigos"' parece sustituir una frase por otra idéntica a la cláusula final ya presente. Conviene reformularla para expresar la alternativa completa y anclarla donde corresponda.
  - severity: low
    issue: La nota [a] usa 'zeloso', forma no recomendable aquí.
    rationale: Aunque históricamente existe 'celoso/zeloso', en español moderno y eclesial amplio 'zeloso' resulta impropio. Debe usarse una alternativa más natural, p. ej. 'lleno de celo'.
  revised_spanish_text: Yahvé es un Dios celoso[a] y vengador; Yahvé es vengador y lleno de ira[b]. Yahvé toma venganza de sus adversarios[c], y guarda ira para sus enemigos.
  revised_footnotes:
  - marker: a
    text: O 'lleno de celo' para 'celoso'. El término hebreo denota celo de pacto y exclusividad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'dueño/poseedor de ira'.
    reason: lexical_alternative
  - marker: c
    text: O 'él reserva ira para sus enemigos'.
    reason: lexical_alternative
  revision_rationale: Se corrigen las anclas de las notas para que correspondan a los segmentos hebreos correctos, se mejora la alternativa de la nota a con español natural, y se ajusta la nota c para reflejar de manera inteligible la alternativa documentada sin duplicar torpemente la cláusula final.
