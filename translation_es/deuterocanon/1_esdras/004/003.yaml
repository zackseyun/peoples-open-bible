  to: Y comieron y bebieron[a], y cuando quedaron satisfechos, se retiraron. Pero Darío el rey fue a su alcoba y durmió, y después despertó.
  rationale: Se mantiene la traducción general porque es fiel al griego y al audit trail inglés. Solo se corrige «cámara de dormir» a «alcoba» para lograr un español más natural y digno que siga representando κοιτών como un aposento de dormir, especialmente en contexto real. Además, se afina levemente la clausura temporal con «y después despertó».
