translation:
  language: es
  text: 'Y los ancianos de Galaad dijeron a Jefté: «Por eso ahora hemos vuelto a ti, para que vayas con nosotros y pelees contra los amonitas[b], y serás cabeza[a] sobre todos los habitantes de Galaad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «jefe». El hebreo dice literalmente «cabeza», una metáfora de autoridad.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Amón», es decir, los amonitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי
  english_pob_choice: the elders of
  chosen_spanish: los ancianos de
  alternatives_spanish:
  - los líderes de
  - los mayores de
  lexicon: HALOT
  rationale: זקנים en este contexto designa a los representantes reconocidos de la comunidad. «Ancianos» conserva mejor ese cargo social-político que una expresión más general como «líderes».
- source_word: לָכֵן עַתָּה
  english_pob_choice: That is why ... now
  chosen_spanish: Por eso ahora
  alternatives_spanish:
  - Por tanto ahora
  - Así que ahora
  lexicon: HALOT
  rationale: La secuencia expresa causa o consecuencia inmediata y urgencia. «Por eso ahora» mantiene el vínculo inferencial con el reproche anterior y su fuerza temporal.
- source_word: שַׁבְנוּ אֵלֶיךָ
  english_pob_choice: we have now come back to you
  chosen_spanish: hemos vuelto a ti
  alternatives_spanish:
  - hemos regresado a ti
  - nos hemos vuelto a ti
  lexicon: HALOT
  rationale: שׁוּב en este contexto tiene el sentido de volver o retornar a una relación/interlocución previa. «Hemos vuelto a ti» conserva esa idea sin forzar un calco demasiado duro.
- source_word: וְהָלַכְתָּ עִמָּנוּ
  english_pob_choice: so that you may go with us
  chosen_spanish: vayas con nosotros
  alternatives_spanish:
  - vengas con nosotros
  - anduvieras con nosotros
  lexicon: HALOT
  rationale: הָלַךְ literalmente es «ir/caminar». En el discurso directo español, «vayas con nosotros» sigue el movimiento del hebreo y respeta la relación de acompañamiento solicitada.
- source_word: וְנִלְחַמְתָּ בִּבְנֵי עַמּוֹן
  english_pob_choice: fight against the Ammonites
  chosen_spanish: pelees contra los amonitas
  alternatives_spanish:
  - combatas contra los amonitas
  - pelees contra los hijos de Amón
  lexicon: HALOT
  rationale: נלחם con בְּ indica combate hostil. «Amonitas» es la forma natural en español para el этnónimo, y «contra» expresa claramente la oposición.
- source_word: וְהָיִיתָ לָּנוּ לְרֹאשׁ
  english_pob_choice: you will be head over us
  chosen_spanish: seas cabeza[a]
  alternatives_spanish:
  - seas nuestro jefe
  - seas nuestro líder
  lexicon: HALOT
  rationale: רֹאשׁ conserva la metáfora de «cabeza» para liderazgo. Se prefiere mantener el término corporal-metafórico en español porque el texto subraya una autoridad amplia, no solo una función militar.
- source_word: לְכֹל יֹשְׁבֵי גִלְעָד
  english_pob_choice: over all the inhabitants of Gilead
  chosen_spanish: sobre todos los habitantes de Galaad
  alternatives_spanish:
  - sobre todos los que habitan en Galaad
  - para todos los habitantes de Galaad
  lexicon: HALOT
  rationale: יֹשְׁבֵי significa quienes habitan allí. «Habitantes» es claro y amplio, y «sobre» refleja la relación de autoridad contenida en לְרֹאשׁ.
theological_decisions:
- issue: Alcance de la autoridad prometida a Jefté
  english_pob_reading: The elders promise Jephthah civic-military leadership over all the inhabitants of Gilead, not merely command in battle.
  chosen_spanish_reading: Los ancianos le prometen una jefatura amplia sobre toda la población de Galaad, no solo mando para la batalla.
  alternative_spanish_readings:
  - Solo le prometen un mando militar temporal.
  - Le ofrecen una función honorífica limitada.
  rationale: La frase final extiende el alcance más allá del conflicto inmediato. «Cabeza» sobre todos los habitantes preserva la amplitud del encargo sin convertirlo en una categoría institucional ajena al texto.
  doctrine_reference: Exégesis narrativa / liderazgo civil y militar en Jueces
translation_notes:
  revision_awareness: 'Se ha seguido la revisión más reciente del POB en el flujo del sentido: mantener «go with us» como «vayas con nosotros» para reflejar el verbo de movimiento del hebreo, y conservar la relación de propósito/resulto de la oración mediante «para que». En español, se eligió una estructura fluida pero cercana al original, evitando sustituir la metáfora de «cabeza» por un término más interpretativo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Amonitas» se usa como etnónimo natural en español, con nota sobre el hebreo literal.
  - «Ancianos» conserva la función comunitaria-política del hebreo זִקְנֵי.
  - «Cabeza» se retiene por la metáfora de autoridad de לְרֹאשׁ, en línea con la auditable POB.
  - La puntuación separa la cláusula de propósito para reflejar el flujo del hebreo y la revisión inglesa más reciente.
