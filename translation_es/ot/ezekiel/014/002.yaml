translation:
  language: es
  text: Y vino la palabra de Yahvé[a] a mí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo YHWH; tradicionalmente vertido «el SEÑOR» en versiones españolas. Alternativa: «Yahvé».'
