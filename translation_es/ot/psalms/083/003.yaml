revisions:
- from: Porque, mira[a], tus enemigos se alborotan[b], y los que te odian han levantado la cabeza.
  to: Porque he aquí, tus enemigos se alborotan[a], y los que te odian han levantado la cabeza[b].
  rationale: Se reemplaza «mira» por «he aquí» para mantener un registro más digno y alineado con la decisión auditada del inglés para הִנֵּה. Se elimina la nota anterior de «mira/he aquí» porque, al quedar «he aquí» en el texto principal, ya no hace falta como alternativa. Se añade la nota sobre «han levantado la cabeza» para preservar la explicación lexical del modismo hebreo documentada en el POB inglés. Se mantiene «se alborotan» y «han levantado la cabeza» por ser fieles, naturales y poéticos en español.
