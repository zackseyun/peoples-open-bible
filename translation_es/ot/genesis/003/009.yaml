translation:
  language: es
  text: 'Entonces Yahvé Dios llamó al hombre y le dijo[a]: «¿Dónde estás?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé Dios». El texto principal sigue la decisión del proyecto de expresar יְהוָה como «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a gritos
  - convocó
  - clamó
  lexicon: HALOT
  rationale: El wayyiqtol de קרא en narrativa expresa una acción secuencial. En español, «llamó» reproduce con naturalidad la acción de dirigirse a alguien por la voz sin sobrecargarla con matices que el contexto no exige.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: Yahweh God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - Yahweh Dios
  - el Señor Dios
  - Yahvé el Dios
  lexicon: HALOT
  rationale: La pauta del proyecto para יְהוָה es «Yahvé», y אֱלֹהִים se traduce normalmente «Dios». La combinación en español mantiene el nombre propio del pacto y el título divino sin ocultar el tetragrama.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: El valor direccional de אֶל con verbos de hablar/llamar se expresa de forma idiomática en español con «al».
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el humano
  - la humanidad
  lexicon: HALOT
  rationale: En este contexto narrativo concreto, אָדָם designa al varón específico en el huerto, no a la humanidad en general. «El hombre» conserva ese referente particular y coincide con la decisión auditada del inglés POB.
- source_word: וַיֹּאמֶר ל֖וֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y le habló a él
  lexicon: HALOT
  rationale: El objeto pronominal está explícito en hebreo; en español se preserva con el dativo «le». «Dijo» mantiene el registro sobrio y claro del relato.
- source_word: אַיֶּכָּה
  english_pob_choice: Where are you?
  chosen_spanish: ¿Dónde estás?
  alternatives_spanish:
  - ¿Dónde te encuentras?
  - ¿Dónde estás tú?
  lexicon: HALOT
  rationale: La pregunta con sufijo de segunda masculina singular se traduce de forma directa. «¿Dónde estás?» es la forma natural y fiel en español; no añade información interpretativa.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: 'Se sigue la política del proyecto para el tetragrama: usar «Yahvé» en el texto principal, conservando el nombre del pacto en lugar de una sustitución reverencial. Esto mantiene visible la decisión lexical y teológica del original.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente de הָאָדָם
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: Aunque אָדָם puede tener sentido colectivo en otros contextos, aquí Dios se dirige al individuo masculino implicado en la escena. La traducción conserva ese alcance específico y evita generalizarlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context)'
translation_notes:
  revision_awareness: 'Se consultó el paquete fuente hebreo y el audit trail inglés. La versión española sigue la lectura ya revisada como estable (latest_revision_pass: unchanged) y conserva las decisiones semánticas clave: nombre divino, referente singular de אָדָם y pregunta directa final.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la política del proyecto.
  - «Dios» traduce אֱלֹהִים sin alterar el título compuesto.
  - El pronombre enclítico «le» preserva el objeto explícito de ל֖וֹ.
  - La pregunta final conserva el trato directo de segunda persona singular sin añadidos.
