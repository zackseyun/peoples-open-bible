  source_alignment_summary: 'El borrador español refleja bien el sentido general del arameo: acercarse al foso, clamar con voz afligida, la fórmula de habla del rey, el tratamiento honorífico de Daniel como siervo del Dios viviente, el servicio continuo a Dios y la pregunta sobre la liberación de los leones. Sin embargo, las notas al pie no siguen fielmente el rastro de auditoría inglés: la nota [a] fue desplazada a «foso» cuando en el POB inglés la alternativa corresponde a «voz angustiada/afligida», y falta la nota sobre la alternativa «esclavo» para עֲבֵד. También conviene ajustar «constantemente» a «continuamente» para alinearse mejor con בִּתְדִירָא y con la decisión léxica base.'
