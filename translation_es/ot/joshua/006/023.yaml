base_translation:
  language: en
  yaml_path: translation/ot/joshua/006/023.yaml
  text: So the young men[a], the spies, went in and brought out Rahab, her father, her mother, her brothers, and all who belonged to her[b]. They brought out all her families and placed them outside the camp of Israel.
  footnotes:
  - marker: a
    text: Or 'all that belonged to her.' The Hebrew expression may be broader than persons alone, though in context it likely refers chiefly to members of her household.
    reason: lexical_alternative
  - marker: b
    text: Or 'all her clans' or 'all her relatives.'
    reason: lexical_alternative
