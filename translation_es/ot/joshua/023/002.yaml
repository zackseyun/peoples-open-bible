translation:
  language: es
  text: 'Entonces Josué llamó a todo Israel: a sus ancianos[a], a sus jefes[b], a sus jueces y a sus oficiales; y les dijo: «Yo soy viejo; he avanzado en años[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «convocó» o «citó». El verbo hebreo puede significar llamar o reunir; aquí tiene el sentido de reunir a los dirigentes.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus cabezas», es decir, sus jefes o principales.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebraísmo: «he entrado en días», es decir, «he avanzado en años».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called for
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó para
  lexicon: HALOT
  rationale: El verbo קרא con לְ aquí expresa reunir o citar a personas. En español, «llamó» comunica de forma natural la acción de convocar, sin añadir formalidad innecesaria; «convocó» sería posible, pero más marcado administrativamente.
- source_word: לְכָל יִשְׂרָאֵל
  english_pob_choice: for all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - para todo Israel
  - todo Israel
  lexicon: HALOT
  rationale: Se conserva el alcance colectivo del hebreo y la relación marcada por la preposición. «A todo Israel» fluye mejor en español con el verbo de convocatoria y mantiene el sentido representativo del conjunto nacional.
- source_word: לִזְקֵנָיו
  english_pob_choice: its elders
  chosen_spanish: a sus ancianos
  alternatives_spanish:
  - a sus mayores
  - a los ancianos
  lexicon: HALOT
  rationale: El sufijo de tercera persona singular remite a Israel como colectivo. «Ancianos» es la manera más transparente y habitual para este grupo dirigente; «mayores» sería menos preciso en un contexto institucional.
- source_word: וּלְרָאשָׁיו
  english_pob_choice: its heads
  chosen_spanish: a sus cabezas
  alternatives_spanish:
  - a sus jefes
  - a sus líderes
  lexicon: HALOT
  rationale: Se mantiene la metáfora administrativa de ראשׁ con «cabezas», siguiendo la decisión inglesa de preservar la imagen fuente y distinguir este grupo de los demás. «Jefes» o «líderes» aclaran, pero suavizan la forma hebrea.
- source_word: וּלְשֹׁפְטָיו
  english_pob_choice: its judges
  chosen_spanish: a sus jueces
  alternatives_spanish:
  - a sus magistrados
  lexicon: HALOT
  rationale: שׁפט en este contexto cívico señala funcionarios judiciales. «Jueces» es el equivalente directo y claro en español, sin perder el carácter oficial del cargo.
- source_word: וּלְשֹׁטְרָיו
  english_pob_choice: its officers
  chosen_spanish: a sus oficiales
  alternatives_spanish:
  - a sus funcionarios
  - a sus alguaciles
  lexicon: HALOT
  rationale: שׁטרים se refiere a oficiales subordinados de administración. «Oficiales» conserva el rango funcional de manera amplia; «funcionarios» es posible pero menos específico, y «alguaciles» sería demasiado estrecho.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: and said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y les habló
  - y les habló diciendo
  lexicon: HALOT
  rationale: La fórmula introductoria al discurso directo se traduce de modo sobrio y natural. «Les dijo» es el equivalente más simple y fiel en español.
- source_word: אֲנִי זָקַנְתִּי
  english_pob_choice: I am old
  chosen_spanish: Yo estoy viejo
  alternatives_spanish:
  - Yo soy viejo
  - Yo he envejecido
  lexicon: HALOT
  rationale: Aunque el hebreo usa un perfecto, la autodescripción apunta al estado presente. «Estoy viejo» transmite ese resultado sin sonar tan rígido como una calca verbal; se conserva la afirmación directa de edad avanzada.
- source_word: בָּאתִי בַּיָּמִים
  english_pob_choice: I have advanced in years
  chosen_spanish: he avanzado en años
  alternatives_spanish:
  - he llegado a los días
  - estoy avanzado en años
  - estoy muy entrado en años
  lexicon: HALOT
  rationale: Se mantiene el sentido idiomático de «entrar en días» como vejez avanzada. «He avanzado en años» refleja bien la metáfora temporal sin volverla extraña en español, y corresponde al valor que la POB documenta en inglés.
theological_decisions:
- issue: Cómo conservar el valor colectivo de «todo Israel» junto con la lista de cargos
  english_pob_reading: The phrase is retained as 'all Israel' while the subsequent offices specify representative leaders being addressed.
  chosen_spanish_reading: Se conserva «todo Israel» y luego se especifican los grupos dirigentes reunidos.
  alternative_spanish_readings:
  - Josué convocó solo a los líderes de Israel
  - Josué llamó a Israel, es decir, a sus dirigentes
  rationale: El hebreo dice explícitamente «todo Israel» y después enumera ancianos, cabezas, jueces y oficiales. La versión española mantiene ambos elementos, evitando reducir el texto a una paráfrasis interpretativa que borre la tensión entre el todo nacional y sus representantes.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditorio crítico de la POB en inglés. Se preservan la lista administrativa, el valor colectivo de «todo Israel» y el modismo de vejez avanzada; no hubo revisiones previas que alteraran el contenido base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando el hebreo dice YHWH, aunque este versículo no lo contiene.
  - Se conserva «ancianos» para זְקֵנִים en sentido de liderazgo, y «cabezas» para רָאשִׁים para respetar la distinción lexical.
  - «Oficiales» se usa para שֹׁטְרִים en armonía con el registro administrativo del pasaje.
  - La combinación de «estoy viejo» y «he avanzado en años» evita perder el paralelismo semántico de las dos cláusulas hebreas.
