theological_decisions:
- issue: '「ἐγώ εἰμι」의 신성한 잔향 (18:5-6)'
  chosen_reading: 식별 응답 「내가 그 사람이다」로 옮기되, 6절 군중의 후퇴·낙상 반응을 통해 신적 자기-선언의 잔향을 드러낸다
  alternative_readings:
  - 「내가 곧 그다」
  - 「내가 ~이다」(식별만)
  rationale: '18:5-6의 ἐγώ εἰμι는 표면적으로는 「내가 (찾는) 그 사람이다」의 식별 응답이나, 6절에서 군중이 뒤로 물러나 땅에 쓰러지는 반응은 요한복음의 「ἐγώ εἰμi」 신적 자기-선언(요 8:58 등)과 출 3:14의 신현 어조를 함께 환기한다. 본문은 식별 응답을 자연스럽게 옮기되, 6절의 신성한 무게를 손상시키지 않도록 두 절 모두 「내가 그 사람이다」로 일관된 정형을 유지한다.'
  doctrine_reference: 'DOCTRINE.md: 본문의 신학적 잔향 보존; 18:5-6 「ἐγώ εἰμι」 신현 어조'
