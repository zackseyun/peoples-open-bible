id: JHN.5.19
reference: John 5:19
source:
  edition: SBLGNT
  text: Ἀπεκρίνατο οὖν ὁ Ἰησοῦς καὶ ⸀ἔλεγεν αὐτοῖς· Ἀμὴν ἀμὴν λέγω ὑμῖν, οὐ δύναται ὁ υἱὸς ποιεῖν ἀφ’ ἑαυτοῦ οὐδὲν ⸀ἐὰν μή τι βλέπῃ τὸν πατέρα ποιοῦντα· ἃ γὰρ ἂν ἐκεῖνος ποιῇ, ταῦτα καὶ ὁ υἱὸς ὁμοίως ποιεῖ.
translation:
  text: So Jesus answered and said to them[a], “Truly, truly, I say to you, the Son is not able to do anything from himself unless he sees the Father doing it; for whatever that one does[b], these things the Son also does likewise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “the Son can do nothing on his own, except what he sees the Father doing.”
    reason: lexical_alternative
  - marker: b
    text: The statement describes the Son’s complete unity with and dependence on the Father in action; it should not be read as denying the Son’s full deity.
    reason: cross_reference
lexical_decisions:
- source_word: Ἀπεκρίνατο οὖν
  chosen: So ... answered
  alternatives:
  - Therefore ... answered
  - Then ... answered
  lexicon: BDAG
  rationale: οὖν is inferential/connective; 'So' gives natural English linkage without overstating logical force.
- source_word: καὶ ἔλεγεν
  chosen: and was saying
  alternatives:
  - and said
  - and began to say
  lexicon: BDAG
  rationale: Imperfect ἔλεγεν is preserved with progressive force to reflect ongoing/discoursal speech, though English often simplifies to 'said.'
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Retains the solemn emphatic doubling in accessible English; 'Amen, amen' is more formal/transliterated but less transparent.
- source_word: οὐ δύναται
  chosen: is not able
  alternatives:
  - cannot
  - can do nothing
  lexicon: BDAG
  rationale: Makes explicit the sense of ability/inability in δύναται. This avoids collapsing the clause into mere permission or volition.
- source_word: ὁ υἱὸς
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: In Johannine context this is a christological title referring specifically to Jesus in relation to the Father, so capitalization signals titular use in English.
- source_word: ἀφ’ ἑαυτοῦ
  chosen: from himself
  alternatives:
  - on his own
  - of himself
  lexicon: BDAG
  rationale: More formally reflects ἀπό + reflexive pronoun. 'On his own' is idiomatic and possible, but 'from himself' better preserves the relational dependence emphasized in context.
- source_word: οὐδὲν
  chosen: anything
  alternatives:
  - nothing
  lexicon: BDAG
  rationale: With English syntax 'not able to do anything' is natural and equivalent to the Greek negation.
- source_word: ἐὰν μή τι βλέπῃ τὸν πατέρα ποιοῦντα
  chosen: unless he sees the Father doing something
  alternatives:
  - unless he sees the Father doing it
  - except what he sees the Father doing
  lexicon: BDAG
  rationale: 'The construction expresses exception: the Son does nothing from himself unless/except in relation to seeing the Father at work. ''Doing something'' supplies the implicit object of τι and keeps the Greek''s open-endedness. ''Except what he sees...'' is smoother but slightly restructures the syntax.'
- source_word: βλέπῃ
  chosen: sees
  alternatives:
  - watches
  - observes
  lexicon: BDAG
  rationale: Simple present 'sees' best fits Johannine style and can carry the sense of perceptive observation without over-interpretation.
- source_word: πατέρα
  chosen: the Father
  alternatives:
  - his Father
  lexicon: BDAG
  rationale: The Greek has the article, not an explicit possessive. 'The Father' preserves the title and the relational uniqueness already implied by 'the Son.'
- source_word: ἃ γὰρ ἂν ἐκεῖνος ποιῇ
  chosen: for whatever that one does
  alternatives:
  - for whatever he does
  - for whatever that one may do
  lexicon: BDAG
  rationale: The relative + ἄν + subjunctive expresses generalizing indefiniteness, hence 'whatever.' 'That one' reflects ἐκεῖνος for emphasis/distinction from the Son, though it is somewhat wooden.
- source_word: ταῦτα καὶ ὁ υἱὸς ὁμοίως ποιεῖ
  chosen: these things the Son also does likewise
  alternatives:
  - the Son does these things likewise
  - the Son also does the same
  lexicon: BDAG
  rationale: Preserves the emphatic correspondence of ταῦτα ... ὁμοίως. Slightly formal English is acceptable here to keep the parallelism visible.
