revisions:
- from: Entonces los líderes presentaron la ofrenda de dedicación[a] del altar, el día en que fue ungido, y los líderes presentaron su ofrenda delante del altar.
  to: Entonces los líderes presentaron la ofrenda de dedicación[a] para el altar, en el día en que fue ungido, y los líderes presentaron su ofrenda delante del altar.
  rationale: Se ajusta «del altar» a «para el altar» para reflejar mejor la decisión contextual del POB inglés y evitar una lectura ambigua o poco natural en español. Se añade «en» antes de la expresión temporal para corresponder más de cerca a בְּיוֹם sin afectar la fluidez. El resto del versículo está bien alineado con el hebreo y con la justificación léxica auditada.
