translation:
  language: es
  text: En las ciudades de la región montañosa, en las ciudades de la llanura baja[a], y en las ciudades del Neguev[b], y en la tierra de Benjamín, y alrededor de Jerusalén, y en las ciudades de Judá, los rebaños volverán a pasar bajo la mano del que los cuenta[c], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Sefelá», el nombre de la región judeana de las tierras bajas.
    reason: lexical_alternative
  - marker: b
    text: O «el Sur»; hebreo «el Neguev», una región meridional de Judá.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo literalmente: «bajo la mano del que cuenta», preservando la imagen de un pastor que cuenta el ganado al pasar.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּעָרֵי הָהָר
  english_pob_choice: in the cities of the hill country
  chosen_spanish: en las ciudades de la región montañosa
  alternatives_spanish:
  - en las ciudades de la sierra
  - en las ciudades del territorio montañoso
  lexicon: HALOT
  rationale: עָרִים se conserva con 'ciudades' por la fórmula geográfica repetida; הָהָר aquí designa una región montañosa, no una montaña única. 'Región montañosa' comunica el sentido sin perder la referencia territorial.
- source_word: הַשְּׁפֵלָה
  english_pob_choice: the lowland
  chosen_spanish: la Sefelá
  alternatives_spanish:
  - la llanura baja
  - la región de las laderas
  lexicon: HALOT
  rationale: La POB inglesa conserva el nombre regional en nota; en español, 'Sefelá' mantiene el topónimo técnico de la llanura/foothill belt de Judá, más preciso que una glosa general.
- source_word: הַנֶּגֶב
  english_pob_choice: the Negeb
  chosen_spanish: el Neguev
  alternatives_spanish:
  - el Sur
  - la región del sur
  lexicon: HALOT
  rationale: Se preserva el nombre de la región como topónimo bíblico reconocido. 'Neguev' evita aplanar el término a 'Sur', que pierde fuerza geográfica.
- source_word: אֶרֶץ בִּנְיָמִן
  english_pob_choice: the land of Benjamin
  chosen_spanish: la tierra de Benjamín
  alternatives_spanish:
  - el territorio de Benjamín
  lexicon: HALOT
  rationale: '''Tierra'' refleja directamente אֶרֶץ y mantiene el matiz territorial tribal del hebreo.'
- source_word: סְבִיבֵי יְרוּשָׁלִַם
  english_pob_choice: around Jerusalem
  chosen_spanish: alrededor de Jerusalén
  alternatives_spanish:
  - en los alrededores de Jerusalén
  - en torno a Jerusalén
  lexicon: HALOT
  rationale: Expresión natural y fiel para el área circundante; no requiere mayor explicitación.
- source_word: עָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - los pueblos de Judá
  lexicon: HALOT
  rationale: Se mantiene 'ciudades' por consistencia con las frases paralelas de la línea y con el valor geográfico general de עָרִים.
- source_word: עֹד
  english_pob_choice: again
  chosen_spanish: volverán a
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: En español, 'volverán a' transmite de manera natural la idea de repetición/restauración presente en עֹד dentro del contexto de regreso a la normalidad pastoral.
- source_word: תַּעֲבֹרְנָה הַצֹּאן
  english_pob_choice: the flocks will again pass
  chosen_spanish: las ovejas volverán a pasar
  alternatives_spanish:
  - los rebaños volverán a pasar
  - las flotas volverán a pasar
  lexicon: HALOT
  rationale: הַצֹּאן es colectivo para ganado menor; aquí 'ovejas' sigue la imaginería pastoral concreta del pasaje. 'Rebaños' también sería posible, pero 'ovejas' mantiene la vividez del cuadro de paso individual.
- source_word: עַל יְדֵי
  english_pob_choice: under the hands of
  chosen_spanish: bajo la mano de
  alternatives_spanish:
  - bajo las manos de
  - por la mano de
  lexicon: HALOT
  rationale: La imagen idiomática de pasar bajo la mano del que cuenta se conserva en español con una formulación natural. 'Bajo la mano de' retiene el gesto concreto sin introducir explicación excesiva.
- source_word: מוֹנֶה
  english_pob_choice: the one who counts them
  chosen_spanish: el que las cuenta
  alternatives_spanish:
  - el contador
  - el que las numera
  lexicon: HALOT
  rationale: Participio agente entendido de manera personal. 'El que las cuenta' es claro y conserva la imagen de conteo/inspección pastoral.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: ''Yahvé'' en el texto principal español, preservando el nombre propio del pacto en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Preservación de la imagen pastoral de conteo
  english_pob_reading: Retain the concrete pastoral image of flocks passing under the hands of the one who counts them.
  chosen_spanish_reading: Conservar la imagen concreta de las ovejas pasando bajo la mano del que las cuenta.
  alternative_spanish_readings:
  - reinterpretar como un cuidado general del rebaño
  - explicitar la idea como 'las ovejas serán revisadas'
  rationale: El hebreo presenta una escena tangible de restauración pastoral; la traducción española mantiene esa materialidad en lugar de sustituirla por una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. La forma 'Yahvé' preserva el nombre del pacto y evita el ocultamiento por título; además concuerda con la terminología del proyecto.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión, que indicó ''unchanged: true'' y ''No changes needed''. La redacción española se ajusta al mismo sentido que la POB inglesa, pero con terminología propia del proyecto (Yahvé; Sefelá; Neguev) y con la imagen pastoral intacta.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el Tetragrama, conforme al estándar del proyecto.
  - Se preservaron los nombres regionales bíblicos 'Sefelá' y 'Neguev' en el texto, con glosas en notas.
  - Se mantuvo la fórmula repetida 'en las ciudades de...' para reflejar la estructura hebrea.
  - '''las ovejas'' traduce el colectivo צֹּאן de forma natural dentro del contexto pastoral.'
