translation:
  language: es
  text: Para el director del coro; según Jedutún[a]. Salmo de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: ''para Jedutún'' o ''a Jedutún''; la preposición hebrea puede indicar distintas clases de relación en los encabezados de salmos.'
    reason: alternative_reading
  - marker: b
    text: 'También puede entenderse: ''por David''; el encabezado hebreo dice más literalmente ''de David'' y puede indicar autoría o asociación.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de canto
  - Para el jefe de los músicos
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala a la persona a cargo de la ejecución musical. 'Director del coro' comunica bien la función cultual-musical en español moderno sin perder el sentido del cargo.
- source_word: לִידוּתוּן
  english_pob_choice: according to Jeduthun
  chosen_spanish: según Jedutún
  alternatives_spanish:
  - para Jedutún
  - a Jedutún
  lexicon: HALOT
  rationale: La preposición ל en este tipo de encabezados puede indicar asociación, dedicación o referencia a un estilo/entonación. 'Según' conserva esa relación abierta sin imponer una sola interpretación. El nombre se translitera como Jedutún para reflejar el uso bíblico.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: Es la etiqueta genérica del género en el Salterio. 'Salmo' es el equivalente natural y más reconocible en español, y mantiene la función literaria del término.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en estos encabezados es amplia y puede señalar autoría, dedicación o asociación. 'De David' conserva esa ambigüedad mejor que 'por David'.
theological_decisions:
- issue: Encabezado de salmo y relación con David/Jedutún
  english_pob_reading: For the choir director; according to Jeduthun. A psalm of David.
  chosen_spanish_reading: Para el director del coro; según Jedutún. Salmo de David.
  alternative_spanish_readings:
  - Para el director del coro; para Jedutún. Salmo de David.
  - Para el director del coro; a Jedutún. Salmo de David.
  - Para el director del coro; según Jedutún. Un salmo de David.
  rationale: 'No hay una afirmación doctrinal aquí, pero sí una cuestión de fidelidad histórica y literaria: el hebreo deja abierta la función exacta de las preposiciones del encabezado. La redacción española conserva esa apertura sin resolverla de forma innecesaria.'
  doctrine_reference: Psalm superscriptions; authorial/ liturgical attribution
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió la colocación de las notas: [a] corresponde a la expresión sobre Jedutún y [b] a la expresión sobre David. La redacción española sigue esa distribución y evita trasladar mecánicamente un orden anterior incorrecto.'
  spanish_consistency_notes:
  - Se mantuvo 'Jedutún' como transliteración estable del nombre propio.
  - Se eligió 'director del coro' por claridad moderna y porque preserva la función musical del encabezado.
  - Se usó 'de David' en vez de una formulación más cerrada para respetar la ambigüedad del ל hebreo en los títulos de salmo.
  - El texto base no introduce comillas ni puntuación extra que no esté motivada por el hebreo o por el uso editorial normal en español.
