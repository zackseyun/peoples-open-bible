  to: Mira[a], estas mujeres fueron las que, por la palabra de Balaam, hicieron que los hijos de Israel[b] actuaran infielmente contra Yahvé en el asunto de Peor, y así vino la plaga sobre la congregación de Yahvé.
  rationale: Se reubica la nota [b] para que corresponda correctamente a «los hijos de Israel», y se cambia «cometieran infidelidad» por «actuaran infielmente» para reflejar mejor el valor verbal y pactual de מַעַל en un español más natural. El resto del texto es fiel al hebreo y al rastro de auditoría del POB.
