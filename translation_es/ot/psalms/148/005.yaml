translation:
  language: es
  text: ¡Que alaben el nombre de Yahvé[a], porque él mandó, y fueron creados!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR»; alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהַלְלוּ
  english_pob_choice: Let them praise
  chosen_spanish: ¡Que alaben
  alternatives_spanish:
  - Que lo alaben
  - Alábenlo
  lexicon: HALOT
  rationale: El imperfecto yiqtol en este contexto poético funciona como exhortación/jussivo dirigido a los seres convocados en el entorno del salmo. En español, «¡Que alaben!» expresa mejor esa fuerza exhortativa que un futuro simple, y mantiene el tono litúrgico sin volverlo mecánico.
- source_word: אֶת שֵׁם
  english_pob_choice: the name of
  chosen_spanish: el nombre de
  alternatives_spanish:
  - la fama de
  - la renombre de
  lexicon: HALOT
  rationale: La expresión conserva el sustantivo «nombre», que en español refleja bien el hebraísmo para designar la identidad revelada y la reputación de Dios. Traducirlo como «fama» o «renombre» apagaría la fórmula bíblica de alabanza al nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto pide rendir יהוה como «Yahvé» en el texto principal. Eso preserva el nombre propio divino, evitando la sustitución por un título, y adapta la forma transliterada a una grafía natural en español.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden
  lexicon: HALOT
  rationale: «Mandó» expresa con naturalidad el acto de dar una orden divina y mantiene el vínculo causal con la siguiente cláusula. «Ordenó» sería posible, pero «mandó» suena más directo y poético en español bíblico contemporáneo.
- source_word: וְנִבְרָאוּ
  english_pob_choice: and they were created
  chosen_spanish: y fueron creados
  alternatives_spanish:
  - y fueron hechos
  - y llegaron a ser
  lexicon: HALOT
  rationale: El nifal de ברא pide un pasivo real que preserve el motivo de creación. «Fueron creados» mantiene ese sentido con precisión; «fueron hechos» sería menos específico y «llegaron a ser» diluiría el lenguaje creativo del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión teológica y editorial del POB es no ocultar el Tetragrama con una sustitución tradicional. En español, «Yahvé» comunica el nombre del pacto de forma reverente y legible, conservando la identidad personal de Dios en el salmo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: El paquete de inglés POB muestra alta concordancia y sin revisiones aplicadas; por eso no se introducen cambios de sentido ni notas textuales adicionales. La draft sigue de cerca la sintaxis poética hebrea y la elección establecida para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - 'Se conserva el paralelismo causal del verso: exhortación a alabar + razón + acto creador.'
  - La puntuación exclamativa en la primera hemistiquio ayuda a reflejar el tono de llamada litúrgica sin añadir contenido nuevo.
