revisions:
- from: 'Y a Éber le nacieron dos hijos: el nombre del uno fue Péleg[a], porque en sus días la tierra fue dividida, y el nombre de su hermano fue Joctán.'
  to: 'Y a Éber le nacieron dos hijos: el nombre del uno fue Péleg[a], porque en sus días la tierra se dividió, y el nombre de su hermano fue Joctán.'
  rationale: Se corrige la nota para que preserve una alternativa léxica real para הָאָרֶץ, conforme al rastro de auditoría inglés, y se mejora la naturalidad de «fue dividida» a «se dividió» sin alterar el sentido ni la relación etimológica con Péleg. No se requiere adjudicación adicional.
