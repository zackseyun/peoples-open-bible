translation:
  language: es
  text: ¿No es hoy la cosecha de trigo? Yo invocaré a Yahvé[a], y él dará truenos[b] y lluvia, para que sepan y vean que su maldad es grande, la cual han hecho ante los ojos de Yahvé, al pedir un rey para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «clamaré a Yahvé». El hebreo קרא אֶל puede expresar llamar, invocar o clamar dirigido a Dios; aquí «invocaré» suena más natural en español bíblico actual.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y dará voces y lluvia»; en este contexto, «voces» se refiere a truenos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No es... ?
  alternatives_spanish:
  - ¿No es verdad que... ?
  - Ciertamente...
  lexicon: HALOT
  rationale: La pregunta retórica en hebreo espera afirmación; el español interrogativo directo conserva mejor la fuerza retórica que una afirmación suavizada.
- source_word: קְצִיר חִטִּים
  english_pob_choice: wheat harvest
  chosen_spanish: la cosecha de trigo
  alternatives_spanish:
  - la siega del trigo
  - la cosecha del trigo
  lexicon: HALOT
  rationale: La construcción nominal se vierte de modo natural en español, manteniendo el marco agrícola y temporal del pasaje.
- source_word: אֶקְרָא אֶל יְהוָה
  english_pob_choice: I will call to Yahweh
  chosen_spanish: Yo clamaré a Yahvé
  alternatives_spanish:
  - Yo llamaré a Yahvé
  - Yo invocaré a Yahvé
  lexicon: HALOT
  rationale: קרא אל expresa un llamado dirigido a Dios; 'clamar' comunica bien la apelación intensa y preserva la dirección del verbo sin sonar mecánico.
- source_word: וְיִתֵּן
  english_pob_choice: he will send
  chosen_spanish: él dará
  alternatives_spanish:
  - él enviará
  - él mandará
  lexicon: HALOT
  rationale: Se conserva el sentido literal de נתן ('dar') porque en español el marco permite entender 'dar truenos y lluvia' sin forzar el verbo a un equivalente meteorológico menos transparente.
- source_word: קֹלֹות
  english_pob_choice: thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - voces
  - trueno
  lexicon: HALOT
  rationale: En contexto meteorológico, קֹלוֹת alude a truenos; el plural español mantiene el plural hebreo y la imagen sonora del texto.
- source_word: וּמָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - la lluvia
  lexicon: HALOT
  rationale: Equivalente léxico directo y claro.
- source_word: וּדְעוּ וּרְאוּ
  english_pob_choice: so that you may know and see
  chosen_spanish: para que sepan y vean
  alternatives_spanish:
  - y sepan y vean
  - entonces sepan y vean
  lexicon: HALOT
  rationale: El español expresa con naturalidad la relación de resultado/propósito con 'para que', conservando el doble imperativo/resultativo 'conocer y ver'.
- source_word: רָעַתְכֶם רַבָּה
  english_pob_choice: your wickedness is great
  chosen_spanish: grande es su maldad
  alternatives_spanish:
  - grande es su perversidad
  - su maldad es mucha
  lexicon: HALOT
  rationale: רָעָה en este contexto es mal moral; 'maldad' mantiene la carga ética fuerte. El adjetivo pospuesto imita la énfasis semítica sin sonar rígido.
- source_word: אֲשֶׁר עֲשִׂיתֶם
  english_pob_choice: which you have done
  chosen_spanish: que han cometido
  alternatives_spanish:
  - que han hecho
  - que ustedes hicieron
  lexicon: HALOT
  rationale: El relativo retoma la acción específica; 'cometido' explicita el carácter culpable de la acción, acorde con el contexto de acusación.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a la vista de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de evaluación divina. 'Ante los ojos de Yahvé' es una equivalencia transparente y idiomática en español.
- source_word: לִשְׁאֹל לָכֶם מֶלֶךְ
  english_pob_choice: by asking for yourselves a king
  chosen_spanish: al pedir para ustedes un rey
  alternatives_spanish:
  - por pedir para ustedes un rey
  - al solicitarse un rey
  lexicon: HALOT
  rationale: El infinitivo con ל expresa el acto que constituye la culpa; 'al pedir' comunica la relación causal sin añadir interpretación ajena al texto.
theological_decisions:
- issue: Render del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se adopta 'Yahvé' conforme al criterio del proyecto para el Tetragrámaton, evitando la sustitución litúrgica por 'SEÑOR' y manteniendo el nombre del pacto con forma española reconocible.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de קֹלֹות en el contexto meteorológico
  english_pob_reading: thunder
  chosen_spanish_reading: truenos
  alternative_spanish_readings:
  - voces
  - truenos y relámpagos
  rationale: El contexto de señal climática exige el valor meteorológico de קֹלוֹת. 'Truenos' preserva la referencia sin diluirla en una lectura más vaga.
  doctrine_reference: HALOT / contexto narrativo de 1 Samuel 12:17
- issue: Valor moral de רָעַתְכֶם
  english_pob_reading: your wickedness
  chosen_spanish_reading: su maldad
  alternative_spanish_readings:
  - su perversidad
  - su mal
  rationale: La acusación de Samuel es ética y judicial; 'maldad' comunica el juicio moral de manera directa en español.
  doctrine_reference: contexto profético-judicial del libro de Samuel
translation_notes:
  revision_awareness: 'Se tomó en cuenta el análisis revisado del proyecto en inglés, con alta concordancia y sin cambios sustantivos en la última pasada. La versión española mantiene las decisiones clave del audit trail: nombre divino, valor meteorológico de קֹלות, y la relación causal de «al pedir para ustedes un rey».'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino, conforme al estándar del proyecto.
  - Se mantuvo la relación de propósito/resultado con 'para que'.
  - Se conservó el matiz acusatorio de 'maldad' en lugar de una neutralización como 'error' o 'mala acción'.
