review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura básica del hebreo: futuro plural (''cantará(n)''), causal ''porque'', ''gloria'', y el nombre divino ''Yahvé''. Sin embargo, ''cantarán en los caminos de Yahvé'' introduce una lectura locativa más fuerte que la intención documentada por la POB inglesa, que entiende בְּדַרְכֵי como tema del canto (''de/sobre los caminos de Yahvé'') y solo conserva ''en'' como alternativa literal en nota.'
  spanish_quality_summary: El español es claro y digno, pero 'cantar en los caminos' suena más a ubicación física que a tema del canto. En español bíblico natural, 'cantar de los caminos de Yahvé' o 'cantar sobre los caminos de Yahvé' comunica mejor el sentido pretendido. El resto del verso lee bien.
  glossary_alignment: Alineado con la terminología del proyecto en 'Yahvé' para יְהוָה y 'gloria' para כָּבוֹד. No hay conflicto terminológico mayor. La única desalineación relevante es semántica/sintáctica en בְּדַרְכֵי, donde el borrador favorece una literalidad menos fiel al razonamiento lexical auditado.
  issues:
  - severity: medium
    issue: '''en los caminos de Yahvé'' sugiere ubicación más que tema del canto'
    rationale: La evidencia hebrea permite una lectura literal con ב, pero el expediente POB concluye que aquí, tras 'cantar', la frase probablemente significa cantar acerca de los caminos de Yahvé. En español, 'cantar en los caminos' se entiende naturalmente como 'cantar mientras están en los caminos', lo cual desplaza el sentido.
  - severity: low
    issue: La nota actual explica un sentido que el texto principal no refleja bien
    rationale: La nota dice que probablemente significa cantar acerca de los caminos de Yahvé, pero el texto principal mantiene una formulación española poco natural para ese sentido. Conviene alinear mejor texto y nota.
  revised_spanish_text: y cantarán de los caminos de Yahvé[a], porque grande es la gloria de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «en los caminos de Yahvé»; la frase probablemente significa cantar acerca de los caminos de Yahvé o sobre ellos.'
    reason: lexical_alternative
  revision_rationale: 'Se cambia ''en los caminos'' por ''de los caminos'' para reflejar mejor la decisión lexical auditada: la frase describe el tema del canto, no principalmente su ubicación. Se conserva en nota la alternativa más literal ''en los caminos'', tal como hace la POB inglesa. No se requiere adjudicación especial, porque el ajuste es pequeño y está directamente respaldado por el expediente.'
