translation:
  language: es
  text: habiendo designado a sus hermanos para dirigir cada división, Simón, José y Jonatán, asignando a cada uno mil hombres además de quinientos[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega es literalmente «mil además de quinientos», es decir, 1.500 bajo cada jefe.
    reason: lexical_alternative
lexical_decisions:
- source_word: τάξας
  english_pob_choice: having appointed
  chosen_spanish: habiendo puesto
  alternatives_spanish:
  - habiendo designado
  - habiendo nombrado
  lexicon: LSJ
  rationale: El participio aoristo introduce una acción preparatoria antes del verbo principal. En español, «habiendo puesto» comunica de forma natural la acción de colocar a alguien en un cargo o función militar, sin perder el matiz de nombramiento administrativo que el inglés POB captó con «having appointed».
- source_word: ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  lexicon: LSJ
  rationale: El sentido directo es fraternal. No hay base en el contexto para debilitarlo a «parientes». La forma posesiva se mantiene naturalmente en español.
- source_word: προηγουμένους
  english_pob_choice: to lead
  chosen_spanish: al frente de
  alternatives_spanish:
  - para dirigir
  - como jefes de
  lexicon: LSJ
  rationale: Aunque literalmente puede sugerir «ir delante», en contexto militar indica liderazgo de una formación. «Al frente de» conserva la idea de dirección visible y evita una construcción demasiado abstracta.
- source_word: ἑκάτερας τάξεως
  english_pob_choice: each division
  chosen_spanish: cada división
  alternatives_spanish:
  - cada formación
  - cada unidad
  - cada escuadrón
  lexicon: LSJ
  rationale: En contexto militar, τάξις se refiere a un cuerpo ordenado o formación. «División» es una solución idiomática y clara en español para una unidad organizada de tropas.
- source_word: ὑποτάξας
  english_pob_choice: assigning
  chosen_spanish: asignando
  alternatives_spanish:
  - poniendo bajo su mando
  - subordinando
  lexicon: LSJ
  rationale: El participio expresa la distribución de tropas bajo cada jefe. «Asignando» comunica esa repartición sin cargar innecesariamente la frase con un tecnicismo que en español podría sonar forzado o ambiguo.
- source_word: ἑκάστῳ
  english_pob_choice: to each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada cual
  lexicon: LSJ
  rationale: 'El valor distributivo es claro: la asignación recae sobre cada uno de los tres hermanos. «A cada uno» es natural y preciso en español.'
- source_word: χιλίους πρὸς τοῖς πεντακοσίοις
  english_pob_choice: a thousand men in addition to five hundred
  chosen_spanish: mil hombres además de quinientos
  alternatives_spanish:
  - mil quinientos hombres
  - mil hombres y quinientos más
  - un total de mil quinientos hombres
  lexicon: LSJ
  rationale: La expresión griega es literalmente aditiva, no aritméticamente resumida. Se conserva «además de quinientos» para no borrar la forma de contar del original; «hombres» se sobreentiende por el contexto militar y se explicita para claridad en español.
translation_notes:
  revision_awareness: El griego presenta una construcción aditiva explícita en la cifra; la redacción española conserva esa forma en lugar de normalizarla a «mil quinientos» para respetar el énfasis del original y la decisión auditada del POB inglés.
  spanish_consistency_notes:
  - Se mantiene «división» para τάξις en sentido militar, coherente con una formación organizada de tropas.
  - Se conserva la estructura participial inicial con «habiendo…» para reflejar la secuencia del griego sin sobrecargar la sintaxis.
  - El nombre Ἰώσηπος se vierte como «José», la forma española estándar del nombre propio.
