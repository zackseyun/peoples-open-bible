translation:
  language: es
  text: Bendito sea el que libra[a] a Israel por siempre. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El que libra» traduce ὁ ῥύστης, un título para quien rescata o libra del peligro. No se añade «Dios» en el texto principal porque el griego no lo expresa explícitamente, aunque el referente sea claramente divino en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: ¡Bendito sea
  alternatives_spanish:
  - Bendito es
  - Alabado sea
  lexicon: BDAG
  rationale: En una fórmula doxológica, el adjetivo predicativo funciona mejor en español como exclamación o bendición litúrgica. «Bendito sea» conserva la fuerza declarativa y devocional del griego sin volverlo demasiado rígido.
- source_word: ὁ ῥύστης
  english_pob_choice: the deliverer
  chosen_spanish: el libertador
  alternatives_spanish:
  - el rescatador
  - el que libra
  lexicon: BDAG
  rationale: ῥύστης designa al que rescata o libera de peligro. «Libertador» es natural en español bíblico y mantiene la idea de rescate eficaz sin convertirla en una paráfrasis más larga.
- source_word: Ἰσραὴλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: N/A (nombre propio)
  rationale: Se conserva el nombre propio sin modificación, conforme al uso estándar del proyecto.
- source_word: εἰς τοὺς ἀεὶ χρόνους
  english_pob_choice: for all time
  chosen_spanish: por todos los tiempos
  alternatives_spanish:
  - para siempre
  - por todas las edades
  lexicon: BDAG
  rationale: La expresión griega sugiere duración continua o permanente. «Por todos los tiempos» refleja mejor el matiz de continuidad histórica y evita resolverlo demasiado pronto en una fórmula fija como «para siempre».
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  lexicon: BDAG
  rationale: Se preserva la forma litúrgica tradicional en español.
theological_decisions:
- issue: Referente implícito del «libertador de Israel»
  english_pob_reading: A doxological reference to God as the one who has rescued Israel.
  chosen_spanish_reading: Una alabanza dirigida implícitamente a Dios como el que ha liberado a Israel, sin añadir «Dios» al texto.
  alternative_spanish_readings:
  - Una bendición genérica sin explicitar el referente divino
  - «Bendito sea Dios, el libertador de Israel»
  rationale: El griego nombra solo «el libertador de Israel». El español conserva esa tensión y no introduce un sujeto explícito que el texto no da, aunque el contexto teológico apunte claramente a Dios.
  doctrine_reference: Primacía del texto original; mantener la referencia teológica implícita sin sobreinterpretarla.
translation_notes:
  revision_awareness: El inglés auditado revisó «forever» a «for all time» para reflejar con más precisión εἰς τοὺς ἀεὶ χρόνους; el español sigue esa misma línea con «por todos los tiempos», evitando una simplificación demasiado cerrada.
  spanish_consistency_notes:
  - Se mantuvo el registro litúrgico breve y declarativo del original.
  - Se evitó reemplazar el referente implícito por una formulación teológica más explícita que el griego no contiene.
  - «Amén» se conserva como cierre convencional, sin traducirlo por «así sea» para no perder la fórmula estable.
  - La puntuación reproduce el carácter de doxología breve con exclamación inicial y cierre afirmativo.
