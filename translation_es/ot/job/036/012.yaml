revisions:
- from: Pero si no escuchan[a], pasarán por la espada, y morirán sin conocimiento.
  to: Pero si no escuchan, perecerán por la espada y morirán sin entendimiento[a].
  rationale: Se corrige una expresión no idiomática («pasarán por la espada») por una formulación española fiel al sentido de juicio del hebreo («perecerán por la espada»). Además, se mejora la naturalidad de la cláusula final con «sin entendimiento», manteniendo en nota la alternativa causal ya documentada en el audit trail inglés.
