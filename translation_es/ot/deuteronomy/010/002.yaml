review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue fielmente el hebreo y el rastro auditado en inglés: futuro divino «escribiré», «las palabras» con nota alternativa, contraste con «las primeras tablas», y lectura contextual de que el pronombre final se refiere a las tablas. No hay desvíos teológicos relevantes.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero «sobre las tablas ... sobre las primeras tablas» suena algo rígido en español. En este contexto de texto inscrito, «en las tablas» es más idiomático y sigue siendo fiel al valor locativo del hebreo. El resto del verso es bien legible y digno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Arca» es correcto para אָרוֹן. «Palabras» preserva la decisión léxica de no expandir a «mandatos» en el texto principal; la nota alternativa está bien orientada, aunque «mandamientos» reflejaría más de cerca la nota inglesa.
  issues:
  - severity: medium
    issue: Uso repetido de «sobre» con las tablas
    rationale: Aunque עַל puede traducirse literalmente «sobre», en español para contenido escrito en tablas resulta más natural «en las tablas». La repetición de «sobre» en ambas cláusulas suena calcada y menos idiomática sin aportar precisión adicional.
  - severity: low
    issue: Alternativa de nota «los mandatos»
    rationale: La nota es aceptable, pero la POB inglesa usa «the commandments». En español bíblico amplio, «los mandamientos» comunica mejor esa alternativa tradicional que «los mandatos».
  revised_spanish_text: Y escribiré en las tablas las palabras[a] que estaban en las primeras tablas, que quebraste, y las pondrás en el arca.
  revised_footnotes:
  - marker: a
    text: O «los mandamientos»; el hebreo dice «las palabras».
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor de estilo y naturalidad: «en las tablas» evita un calco innecesario de «sobre» en contexto de inscripción escrita, sin perder fidelidad al hebreo ni al audit trail inglés. También se ajusta la nota alternativa a «los mandamientos» para alinearla mejor con la alternativa documentada en inglés.'
