translation:
  language: es
  text: Cierto Eleazar, uno de los escribas principales, hombre ya avanzado en edad y de aspecto muy noble, era obligado, con la boca abierta de par en par, a comer carne de cerdo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carne de puerco». El griego se refiere literalmente a carne de cerdo; «carne de cerdo» es la equivalencia española natural y más neutra.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλεάζαρός τις
  english_pob_choice: A certain Eleazar
  chosen_spanish: Un tal Eleazar
  alternatives_spanish:
  - Cierto Eleazar
  - Un Eleazar
  lexicon: LSJ
  rationale: El griego introduce al personaje de forma narrativa e indefinida con τις; en español, «un tal» preserva mejor esa indefinición que un nombre desnudo o un «cierto» más literario.
- source_word: τῶν πρωτευόντων γραμματέων
  english_pob_choice: one of the leading scribes
  chosen_spanish: uno de los escribas principales
  alternatives_spanish:
  - uno de los escribas líderes
  - uno de los escribas principales del pueblo
  lexicon: LSJ
  rationale: πρωτευόντων expresa primacía o prominencia; «principales» comunica rango sin añadir matices ajenos. γραμματέων se mantiene como «escribas», siguiendo el valor lexical básico.
- source_word: ἤδη προβεβηκὼς τὴν ἡλικίαν
  english_pob_choice: already advanced in age
  chosen_spanish: hombre ya avanzado en edad
  alternatives_spanish:
  - ya anciano
  - ya muy avanzado en años
  lexicon: LSJ
  rationale: La construcción señala edad avanzada de modo digno y descriptivo. «Avanzado en edad» conserva el registro sobrio del griego y del POB inglés.
- source_word: τὴν πρόσοψιν τοῦ προσώπου κάλλιστος
  english_pob_choice: most noble in appearance
  chosen_spanish: de aspecto muy noble
  alternatives_spanish:
  - de muy noble apariencia
  - de rostro muy hermoso
  - de aspecto muy hermoso
  lexicon: LSJ
  rationale: El audit trail inglés revisó hacia «most noble in appearance» para reflejar mejor un porte digno; en español, «de aspecto muy noble» sigue esa decisión sin reducirla a mera belleza física. Se evita «hermoso» para no desplazar el énfasis hacia lo estético solamente.
- source_word: ἀναχαινόμενον
  english_pob_choice: with his mouth opened wide
  chosen_spanish: con la boca abierta de par en par
  alternatives_spanish:
  - con la boca muy abierta
  - con la boca forzadamente abierta
  - con la boca abierta
  lexicon: LSJ
  rationale: El participio describe la boca abierta por coerción física. «Abierta de par en par» comunica claramente la apertura forzada y se ajusta mejor al español natural que una calca literal.
- source_word: ἠναγκάζετο
  english_pob_choice: was being forced
  chosen_spanish: era obligado
  alternatives_spanish:
  - estaba siendo obligado
  - era forzado
  - lo obligaban
  lexicon: LSJ
  rationale: El imperfecto pasivo indica coerción continua. «Era obligado» mantiene esa pasividad y continuidad de manera sobria; «estaba siendo obligado» sonaría más pesado en español bíblico.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: a comer
  alternatives_spanish:
  - para comer
  - a ingerir
  lexicon: LSJ
  rationale: Infinitivo de propósito/complemento natural después de «obligado». «A comer» es la forma más directa y fiel.
- source_word: ὕειον κρέας
  english_pob_choice: pork
  chosen_spanish: carne de cerdo
  alternatives_spanish:
  - puerco
  - carne de puerco
  - carne porcina
  lexicon: LSJ
  rationale: El griego designa carne de cerdo/puerco; en español, «carne de cerdo» es claro, neutral y auditable. Se prefiere esta formulación sobre «pork», que no pertenece al español, y sobre «puerco», que puede sonar regional o más coloquial.
theological_decisions:
- issue: Carne impura en contexto de fidelidad a la Ley
  english_pob_reading: The verse's theological weight lies in forced violation of Jewish dietary law, but the Greek itself simply names pig flesh.
  chosen_spanish_reading: El texto nombra la carne de cerdo sin explicar la prohibición; la fuerza teológica queda en que se lo obliga a comer lo impuro.
  alternative_spanish_readings:
  - se lo obliga a comer cerdo
  - se lo obliga a comer carne impura
  rationale: No conviene añadir en el texto principal una explicación doctrinal que el griego no enuncia. La mención de «carne de cerdo» basta para el trasfondo de impureza ritual; la nota léxica puede aclarar la equivalencia sin convertirla en comentario exegético.
  doctrine_reference: Pureza ritual judía; martirio por fidelidad a la Ley (sin expansión interpretativa en el versículo)
translation_notes:
  revision_awareness: 'El texto inglés del POB fue revisado desde «most handsome in appearance» a «most noble in appearance» y desde «with his mouth pried open» a «with his mouth opened wide». La versión española sigue esa revisión: «de aspecto muy noble» y «con la boca abierta de par en par», evitando una descripción meramente estética o una imagen excesivamente brusca. También se mantiene la equivalencia moderna de la carne impura como «carne de cerdo», en línea con el criterio auditado del inglés.'
  spanish_consistency_notes:
  - Se conserva «Eleazar» como nombre propio transliterado estándar.
  - Se usa «escribas» y no un equivalente interpretativo como «maestros de la ley».
  - La coerción se expresa con pasiva («era obligado») para reflejar el imperfecto griego.
  - La nota a pie de página marca una alternativa léxica real sin duplicar el contenido del texto principal.
  - El registro es bíblico moderno y sobrio, sin arcaísmos innecesarios.
