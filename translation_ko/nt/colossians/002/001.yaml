id: COL.2.1
reference: Colossians 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Θέλω γὰρ ὑμᾶς εἰδέναι ἡλίκον ἀγῶνα ἔχω ⸀ὑπὲρ ὑμῶν καὶ τῶν ἐν Λαοδικείᾳ καὶ ὅσοι οὐχ ἑόρακαν τὸ πρόσωπόν μου ἐν σαρκί,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/001.yaml
  text: For I want you to know how great a struggle I have for you and for those in Laodicea, and for all who have not seen my face in the flesh,
translation:
  language: ko
  text: 나는 여러분이, 내가 여러분과 라오디게아에 있는 이들, 그리고 육신[a]으로 내 얼굴을 보지 못한 모든 이를 위하여 얼마나 큰 싸움을 하고 있는지 알기를 원합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「몸으로」, 「직접」. 헬라어 「육체로」는 본 문맥에서 신체적 임재를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θέλω γὰρ ὑμᾶς εἰδέναι
  english_pob_choice: For I want you to know
  chosen_korean: 나는 여러분이 ... 알기를 원합니다
  alternatives_korean:
  - 나는 여러분이 ... 알기를 바랍니다
  lexicon: BDAG
  rationale: γάρ + θέλω 구문을 한국어 어순으로 자연스럽게 재배열한다. 합쇼체의 직접적 의지 표현으로 「원합니다」를 사용한다.
- source_word: ἡλίκον ἀγῶνα
  english_pob_choice: how great a struggle
  chosen_korean: 얼마나 큰 싸움
  alternatives_korean:
  - 얼마나 큰 분투
  - 얼마나 격렬한 다툼
  lexicon: BDAG
  rationale: ἡλίκον의 크기 강조와 ἀγών의 분투·경기의 어감을 「얼마나 큰 싸움」으로 옮긴다.
- source_word: ἔχω ὑπὲρ ὑμῶν
  english_pob_choice: I have for you
  chosen_korean: 여러분 ... 을 위하여 ... 하고 있는지
  alternatives_korean:
  - 여러분을 대신하여 하고 있는지
  lexicon: BDAG
  rationale: ἔχω + ἀγῶνα는 「싸움을 하다」 관용구. ὑπέρ는 「위하여」(유익).
- source_word: τῶν ἐν Λαοδικείᾳ
  english_pob_choice: those in Laodicea
  chosen_korean: 라오디게아에 있는 이들
  alternatives_korean:
  - 라오디게아의 사람들
  lexicon: BDAG
  rationale: 관사 + 처소 구문을 자연스러운 한국어 관형절로 옮긴다.
- source_word: ὅσοι οὐχ ἑόρακαν τὸ πρόσωπόν μου ἐν σαρκί
  english_pob_choice: all who have not seen my face in the flesh
  chosen_korean: 육신으로 내 얼굴을 보지 못한 모든 이
  alternatives_korean:
  - 직접 내 얼굴을 보지 못한 모든 사람
  - 몸으로 내 얼굴을 못 본 모든 사람
  lexicon: BDAG
  rationale: ὅσοι의 포괄적 어감과 ἐν σαρκί의 「몸으로의 임재」를 살린다. σάρξ는 「육체」 또는 자연스러운 「육신」으로 옮긴다.
