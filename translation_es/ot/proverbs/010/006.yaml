translation:
  language: es
  text: Las bendiciones están sobre la cabeza del justo, pero la boca de los malvados encubre violencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oculta violencia»; algunos también entienden: «la violencia cubre la boca de los malvados».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרָכוֹת
  english_pob_choice: Blessings
  chosen_spanish: bendiciones
  alternatives_spanish:
  - bendiciones
  - bendiciones favorables
  lexicon: HALOT
  rationale: El plural hebreo nombra beneficios o favores concedidos; «bendiciones» es el equivalente natural en español y conserva el plural sin sobreexplicar.
- source_word: לְרֹאשׁ
  english_pob_choice: are on the head of
  chosen_spanish: están sobre la cabeza de
  alternatives_spanish:
  - están sobre la cabeza de
  - recaen sobre la cabeza de
  lexicon: HALOT
  rationale: La imagen hebrea es espacial y de cobertura/apoyo sobre la cabeza; «están sobre la cabeza de» mantiene el cuadro poético sin volverlo rígidamente literal.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo
  - la persona justa
  lexicon: HALOT
  rationale: Como sustantivo/adjetivo sustantivado en singular representativo, «el justo» refleja bien la figura proverbial y es idiomático en español.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los malvados
  - los impíos
  lexicon: HALOT
  rationale: El sustantivo plural describe a los malvados como grupo. «Malvados» comunica con claridad el contraste ético y evita una resonancia demasiado eclesiástica de «impíos» si no es necesaria.
- source_word: יְכַסֶּה
  english_pob_choice: conceals
  chosen_spanish: encubre
  alternatives_spanish:
  - encubre
  - oculta
  - cubre
  lexicon: HALOT
  rationale: El verbo admite la imagen de cubrir/ocultar. «Encubre» conserva la ambigüedad del hebreo y sigue de cerca la lectura inglesa revisada «conceals» sin perder naturalidad en español.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - violencia
  - injusticia violenta
  - daño violento
  lexicon: HALOT
  rationale: «Violencia» es la equivalencia directa y estable en sabiduría bíblica para חָמָס, manteniendo su fuerza moral y social.
theological_decisions:
- issue: Ambigüedad del segundo colon
  english_pob_reading: the mouth of the wicked conceals violence; some also understand, 'violence covers the mouth of the wicked.'
  chosen_spanish_reading: la boca de los malvados encubre violencia
  alternative_spanish_readings:
  - la boca de los malvados oculta violencia
  - la violencia cubre la boca de los malvados
  rationale: El hebreo es breve y permite más de una relación sintáctica/semántica. La línea principal sigue la sintaxis más directa del texto masorético, mientras la nota preserva la alternativa tradicional sin resolver la tensión.
  doctrine_reference: 'Principio POB: preservar la tensión interpretativa cuando el hebreo es ambivalente'
translation_notes:
  revision_awareness: La versión inglesa auditada cambió de «covers violence» a «conceals violence» para reflejar con mayor naturalidad el verbo hebreo y la ambigüedad del sintagma. La propuesta española sigue esa revisión con «encubre», que mantiene tanto el sentido de cubrir como el de ocultar.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general solo cuando el texto lo requiera; este versículo no incluye el nombre divino.
  - Se prefirió «el justo» en singular representativo para seguir el valor proverbial del hebreo.
  - Se eligió «malvados» frente a «impíos» por claridad y porque el contraste ético es directo en español.
  - «Encubre» preserva la posibilidad de leer el verbo como cubrir u ocultar, en línea con la nota inglesa.
  - La puntuación reproduce el paralelismo antitético con coma antes de «pero».
