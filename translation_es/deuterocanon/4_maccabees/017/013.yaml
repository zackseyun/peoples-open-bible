    text: 'El griego usa una serie de verbos de contienda: Eleazar «tomaba la delantera en la lucha», la madre «competía como atleta» y los hermanos «contendían». La traducción conserva esa imaginería compartida con una variación moderada en español.'
    reason: lexical_alternative
  revision_rationale: Se revisa el primer verbo para reflejar mejor el matiz de precedencia/liderazgo de προηγωνίζετο, y se aligera la sintaxis verbal con imperfectos simples más naturales en español. Se conserva la metáfora agonística a lo largo de las tres cláusulas y se mantiene 'los hermanos' por precisión contextual. No se fuerza 'hijos varones' en el texto principal para evitar pesadez, pero se señala la cuestión como matiz contextual menor.
