translation:
  language: es
  text: 'Los hijos de Judá: Er, Onán y Sela; tres le nacieron de Bat-súa[a] la cananea. Er, el primogénito de Judá, fue malo ante los ojos de Yahvé, y lo hizo morir.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la hija de Súa, la cananea»; algunos entienden «Bat-súa» como nombre propio aquí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y Yahvé lo hizo morir». El hebreo deja el sujeto implícito, pero el antecedente más natural es Yahvé en la cláusula anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: The sons of Judah
  chosen_spanish: Los hijos de Judá
  alternatives_spanish:
  - Los descendientes de Judá
  - Los hijos de Judá
  lexicon: HALOT
  rationale: La construcción genealógica se conserva de modo natural en español con «Los hijos de Judá», que mantiene el tono de registro familiar y la relación de pertenencia sin añadir paráfrasis.
- source_word: עֵר וְאוֹנָן וְשֵׁלָה
  english_pob_choice: Er, Onan, and Shelah
  chosen_spanish: Er, Onán y Sela
  alternatives_spanish:
  - Er, Onán y Selá
  lexicon: HALOT
  rationale: Se mantienen los nombres propios según la forma usual en español bíblico, con acentuación gráfica donde corresponde para la lectura moderna.
- source_word: שְׁלוֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - eran tres
  lexicon: HALOT
  rationale: El cardinal se conserva explícitamente porque el hebreo resume cuántos hijos se mencionan, y el español puede reproducir esa precisión sin ampliar el sentido.
- source_word: נ֣וֹלַד ל֔וֹ
  english_pob_choice: were born to him
  chosen_spanish: le nacieron
  alternatives_spanish:
  - le fueron nacidos
  - nacieron para él
  - fueron nacidos para él
  lexicon: HALOT
  rationale: El pasivo hebreo se expresa con una fórmula natural en español que conserva la relación receptiva («le nacieron») y evita una construcción demasiado mecánica.
- source_word: מִבַּת שׁוּעַ הַכְּנַעֲנִית
  english_pob_choice: by Bath-shua the Canaanite
  chosen_spanish: por Bat-súa, la cananea
  alternatives_spanish:
  - por la hija de Súa, la cananea
  - por Bat-súa la cananea
  lexicon: HALOT
  rationale: Se adopta la lectura de nombre propio documentada en la revisión inglesa («Bath-shua») con la forma hispanizada «Bat-súa», que es clara y evita la falsa impresión de una simple perífrasis. La gentilicia se conserva con «la cananea».
- source_word: בְּכוֹר יְהוּדָה
  english_pob_choice: Judah’s firstborn
  chosen_spanish: el primogénito de Judá
  alternatives_spanish:
  - el primero de Judá
  - el hijo mayor de Judá
  lexicon: HALOT
  rationale: «Primogénito» reproduce con precisión el valor técnico de בְּכוֹר y mantiene el matiz genealógico del texto.
- source_word: רַע בְּעֵינֵי יְהוָה
  english_pob_choice: was evil in the sight of Yahweh
  chosen_spanish: fue malo ante los ojos de Yahvé
  alternatives_spanish:
  - fue malo a los ojos de Yahvé
  - fue perverso ante los ojos de Yahvé
  - era malo ante los ojos de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula evaluativa hebrea con una expresión idiomática española equivalente. «Malo» mantiene el juicio moral amplio del texto sin intensificar indebidamente a «perverso».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el Nombre divino como «Yahvé», en vez de sustituirlo por un título, para preservar la referencia explícita al nombre propio de Dios.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: he put him to death
  chosen_spanish: lo hizo morir
  alternatives_spanish:
  - lo mató
  - Yahvé lo hizo morir
  - él lo hizo morir
  lexicon: HALOT
  rationale: La forma causativa se refleja mejor con «lo hizo morir», que conserva la idea de causar la muerte sin añadir innecesariamente el sujeto explícito del hebreo narrativo. El antecedente inmediato permite entender que el agente es Yahvé.
theological_decisions:
- issue: Sujeto implícito de וַיְמִיתֵהוּ
  english_pob_reading: and he put him to death, with 'he' referring to the LORD
  chosen_spanish_reading: y él lo hizo morir, con referencia implícita a Yahvé
  alternative_spanish_readings:
  - y Yahvé lo hizo morir
  - y lo hizo morir
  rationale: El hebreo deja implícito el sujeto, pero el contexto inmediato lo remite a Yahvé. En español, «él» conserva la continuidad narrativa y mantiene visible la tensión gramatical del original, mientras la nota aclara la referencia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Forma del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre personal de Dios conforme al criterio editorial del proyecto, evitando la sustitución por un título y manteniendo la transparencia textual.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «the daughter of Shua» a «Bath-shua» para reflejar mejor בַּת־שׁוּעַ como nombre propio. La presente versión sigue esa decisión con «Bat-súa», y mantiene el sujeto implícito de la última cláusula, explicándolo en nota para no ocultar la ambigüedad gramatical del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Primogénito» conserva el valor técnico de בְּכוֹר en genealogías.
  - Se mantiene «la cananea» como gentilicio, no como nombre étnico reinterpretado.
  - La puntuación separa la lista genealógica de la evaluación moral final, como en el hebreo.
