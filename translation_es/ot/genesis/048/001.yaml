translation:
  language: es
  text: 'Ahora bien, después de estas cosas[a], se le dijo a José: «Mira, tu padre está enfermo». Entonces tomó a sus dos hijos consigo, Manasés y Efraín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «y dijo a José»; como el hablante no se nombra, la traducción mantiene la indefinición con una construcción impersonal.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ...
  chosen_spanish: Ahora bien, ...
  alternatives_spanish:
  - Y ocurrió que ...
  - Entonces ...
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una nueva escena; «Ahora bien» conserva el giro discursivo sin sonar arcaico en español.
- source_word: אַחֲרֵי הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de estos acontecimientos
  - después de estos hechos
  lexicon: HALOT
  rationale: «Cosas» refleja de manera amplia דְּבָרִים sin precisar más de lo que el hebreo dice.
- source_word: וַיֹּאמֶר לְיוֹסֵף
  english_pob_choice: it was said to Yoseph
  chosen_spanish: se le dijo a José
  alternatives_spanish:
  - le dijeron a José
  - le fue dicho a José
  lexicon: HALOT
  rationale: El hebreo deja indefinido al hablante; en español, la pasiva refleja mantiene esa indefinición mejor que introducir un sujeto no nombrado.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  lexicon: HALOT
  rationale: Es una partícula deíctica de atención; «Mira» es natural y conserva la inmediatez.
- source_word: חֹלֶה
  english_pob_choice: is sick
  chosen_spanish: está enfermo
  alternatives_spanish:
  - está sick
  - está mal
  lexicon: HALOT
  rationale: El participio describe la condición presente de Jacob; «está enfermo» es idiomático y fiel.
- source_word: וַיִּקַּח
  english_pob_choice: So he took
  chosen_spanish: Entonces tomó
  alternatives_spanish:
  - Y tomó
  - Así que tomó
  lexicon: HALOT
  rationale: La waw consecutiva avanza la acción narrativa; «Entonces» reproduce bien la secuencia en español.
- source_word: שְׁנֵי בָנָיו עִמּוֹ
  english_pob_choice: his two sons with him
  chosen_spanish: a sus dos hijos consigo
  alternatives_spanish:
  - a sus dos hijos con él
  - a sus dos hijos junto con él
  lexicon: HALOT
  rationale: «Consigo» expresa de forma natural la compañía de sus hijos y evita repetir «con él» de manera pesada.
- source_word: מְנַשֶּׁה וְאֶת אֶפְרָיִם
  english_pob_choice: Manasseh and Ephraim
  chosen_spanish: Manasés y Efraín
  alternatives_spanish:
  - Manasés y Ephraím
  - Manasé y Efraín
  lexicon: HALOT
  rationale: Se usan las formas castellanas tradicionales y ampliamente reconocibles de los nombres propios.
theological_decisions:
- issue: Sujeto indefinido en «וַיֹּאמֶר לְיוֹסֵף»
  english_pob_reading: it was said to Yoseph
  chosen_spanish_reading: se le dijo a José
  alternative_spanish_readings:
  - alguien le dijo a José
  - le dijeron a José
  rationale: La fuente no identifica al hablante; la pasiva refleja preserva la indefinición sin imponer una interpretación narrativa adicional.
  doctrine_reference: Fidelidad textual y cautela exegética
- issue: Terminología para el nombre propio de Yoseph
  english_pob_reading: Yoseph
  chosen_spanish_reading: José
  alternative_spanish_readings:
  - Yoséf
  - Yosef
  rationale: En español bíblico, «José» es la forma establecida y claramente inteligible; no hay razón source-based para transliterar aquí.
  doctrine_reference: Uso onomástico consagrado en español bíblico
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «someone said to Yoseph» a «it was said to Yoseph» para reflejar mejor el sujeto indefinido del hebreo; la redacción española sigue esa lectura con una pasiva refleja equivalente. También se adoptó un español más natural que mantiene la secuencia narrativa sin añadir contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «José» para el nombre propio, coherente con el uso bíblico estándar en español y con la decisión inglesa de no introducir más transliteración de la necesaria.
  - No se introduce ninguna interpretación adicional sobre quién informó a José; el texto queda intencionalmente indefinido como en el hebreo.
