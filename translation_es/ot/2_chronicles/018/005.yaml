translation:
  language: es
  text: 'Así que el rey de Israel reunió a los profetas, cuatrocientos hombres, y les dijo: «¿Iremos a Ramot de Galaad para la batalla, o me abstengo?». Y ellos respondieron: «Sube[a], y Dios la entregará en la mano del rey[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los profetas responden: «Sube, y Dios la entregará en la mano del rey». El hebreo deja «el rey» sin especificar, en vez de decir «en tu mano».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «en la mano del rey». La expresión es un modismo que significa bajo el poder o control del rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  lexicon: HALOT
  rationale: קבץ expresa reunir o convocar a un grupo. «Reunió» es natural en español y conserva la acción de juntar a los profetas sin añadir matices no presentes.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  - los portavoces proféticos
  lexicon: HALOT
  rationale: נביאים es el término habitual para «profetas». No hay base en el contexto para sustituirlo por una paráfrasis.
- source_word: אַרְבַּע מֵאוֹת אִישׁ
  english_pob_choice: four hundred men
  chosen_spanish: cuatrocientos hombres
  alternatives_spanish:
  - cuatrocientos
  - cuatrocientos varones
  lexicon: HALOT
  rationale: El hebreo incluye אִישׁ, por lo que conviene mantener la referencia personal con «hombres» en lugar de omitirla.
- source_word: הֲנֵלֵךְ
  english_pob_choice: Should we go
  chosen_spanish: ¿Iremos?
  alternatives_spanish:
  - ¿Deberíamos ir?
  - ¿Vamos?
  lexicon: HALOT
  rationale: La forma interrogativa plural admite una pregunta directa en español. «¿Iremos?» conserva la consulta sin forzar una equivalencia modal demasiado larga.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-Galaad
  - Ramot de Gilead
  lexicon: HALOT
  rationale: Es un topónimo. Se translitera de forma inteligible para el lector hispanohablante; «de Galaad» refleja el compuesto toponímico con claridad.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - a la batalla
  - para la guerra
  lexicon: HALOT
  rationale: La preposición expresa finalidad. «Para la batalla» es la forma más natural y precisa en español.
- source_word: אִם אֶחְדָּל
  english_pob_choice: or should I refrain
  chosen_spanish: o me abstengo
  alternatives_spanish:
  - o me detengo
  - o renuncio
  lexicon: HALOT
  rationale: El hebreo cambia a primera singular. «Me abstengo» preserva ese cambio de persona y reproduce la idea de desistir sin nivelarla a un plural.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Subid
  - Marcha arriba
  lexicon: HALOT
  rationale: עלה en contexto militar puede conservar el sentido literal de «subir». En español, «Sube» comunica la orden breve y mantiene el eco semántico.
- source_word: וְיִתֵּן
  english_pob_choice: will give it
  chosen_spanish: la entregará
  alternatives_spanish:
  - la dará
  - la pondrá en manos de
  lexicon: HALOT
  rationale: En este contexto, el verbo denota entregar en poder de alguien. «La entregará» expresa el resultado con naturalidad en español.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los dioses
  - la Deidad
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, el verbo singular y el contexto exigen un referente singular. «Dios» mantiene esa lectura.
- source_word: בְּיַד הַמֶּלֶךְ
  english_pob_choice: into the hand of the king
  chosen_spanish: en la mano del rey
  alternatives_spanish:
  - en poder del rey
  - en manos del rey
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como esfera de poder. «En la mano del rey» sigue de cerca el original y permanece comprensible en español.
theological_decisions:
- issue: Referente de «el rey» en la respuesta de los profetas
  english_pob_reading: retain the Hebrew expression 'the king' without specifying which king
  chosen_spanish_reading: mantener «el rey» sin explicitar a cuál rey se refiere
  alternative_spanish_readings:
  - entenderlo como el rey de Israel
  - suponer que alude reverencialmente a Acab
  rationale: El hebreo dice simplemente «el rey», y el POB inglés conserva esa ambigüedad. En español conviene no resolverla más allá del texto, para mantener la tensión documental.
  doctrine_reference: Preservar la tensión textual sin armonizarla.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el audit trail inglés. Se preservan dos rasgos relevantes del original: la imagen idiomática de «la mano del rey» y la ambigüedad de «el rey» en la respuesta profética, sin resolverlas por armonización.'
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים, conforme al valor singular exigido por el verbo.
  - Se mantiene «el rey» en la cita profética para reflejar la falta de especificación del hebreo.
  - «Ramot de Galaad» conserva el topónimo compuesto de manera legible en español.
  - «Sube» traduce el imperativo קצר del hebreo y conserva el lenguaje de ascenso militar.
