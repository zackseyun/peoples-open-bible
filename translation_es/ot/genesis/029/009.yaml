translation:
  language: es
  text: Mientras él aún hablaba con ellos, Raquel vino con el rebaño de su padre, porque ella era pastora.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ella era pastor». El hebreo usa una forma femenina que identifica a Raquel en el papel de quien cuidaba el rebaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדֶנּוּ מְדַבֵּר
  english_pob_choice: While he was still speaking
  chosen_spanish: Mientras él aún hablaba
  alternatives_spanish:
  - Mientras seguía hablando
  - Todavía hablaba
  lexicon: HALOT
  rationale: La combinación expresa simultaneidad con una acción en curso. «Mientras él aún hablaba» reproduce bien el valor aspectual y suena natural en español narrativo.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - con los hombres
  - con ellos mismos
  lexicon: HALOT
  rationale: El sufijo plural masculino se refiere a los pastores con quienes Jacob estaba conversando; «con ellos» es directo y fiel.
- source_word: וְרָחֵל בָּאָה
  english_pob_choice: Rachel came
  chosen_spanish: Raquel llegó
  alternatives_spanish:
  - Raquel vino
  - Raquel vino llegando
  lexicon: HALOT
  rationale: El verbo de movimiento en narrativa puede vertirse naturalmente como «llegó» sin perder el avance del relato. «Llegó» comunica bien el contraste temporal del verso.
- source_word: עִם הַצֹּאן אֲשֶׁר לְאָבִיהָ
  english_pob_choice: with her father’s flock
  chosen_spanish: con el rebaño de su padre
  alternatives_spanish:
  - con el rebaño que era de su padre
  - con el ganado de su padre
  lexicon: HALOT
  rationale: צֹאן se refiere al rebaño/ganado menor; «rebaño» es el equivalente más natural y precisa la relación de posesión expresada por la relativa. Se mantiene la referencia al padre de Raquel.
- source_word: רֹעָה הִוא
  english_pob_choice: she was a shepherdess
  chosen_spanish: ella era pastora
  alternatives_spanish:
  - ella era una pastora
  - ella cuidaba el rebaño
  lexicon: HALOT
  rationale: El participio femenino destaca el rol habitual de Raquel como mujer que apacienta el rebaño. «Pastora» preserva la fuerza léxica y la marca de género sin sonar forzado.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en el valor temporal de עוֹדֶנּוּ + participio, en el movimiento narrativo de בָּאָה y en la nota léxica sobre la forma femenina רֹעָה. Se adapta la naturalidad del español sin introducir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se conservó el nombre propio «Raquel» y la referencia posesiva «de su padre» para mantener la relación explícita del hebreo.
  - Se prefirió «rebaño» para צֹאן en un contexto pastoril; no se usó una terminología más litúrgica o abstracta.
  - 'La nota al pie mantiene la alternativa de género del original: «pastora» frente a una posible traducción más genérica de la función.'
