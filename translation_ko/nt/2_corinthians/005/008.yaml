  text: θαρροῦμεν δὲ καὶ εὐδοκοῦμεν μᾶλλον ἐκδημῆσαι ἐκ τοῦ σώματος καὶ ἐνδημῆσαι πρὸς τὸν κύριον·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/008.yaml
  text: So we are confident and would rather be away from the body and at home with the Lord.
  footnotes:
  - marker: a
    text: Or 'be absent from the body and be at home with the Lord.'
    reason: lexical_alternative
translation:
  language: ko
  text: 우리는 담대하며, 차라리 몸을 떠나 주께로 가서 거하기를 더 좋아합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκδημῆσαι ἐκ τοῦ σώματος
  english_pob_choice: away from the body
  chosen_korean: 몸을 떠나
  alternatives_korean:
  - 몸에서 떠나
  lexicon: BDAG
  rationale: 직역. 한국 전통 번역들이 「세상을 떠나」 등으로 도덕화·완곡화해 왔으나, 본문의 직접성을 보존한다.
- source_word: ἐνδημῆσαι πρὸς τὸν κύριον
  english_pob_choice: at home with the Lord
  chosen_korean: 주께로 가서 거하다
  alternatives_korean: []
  lexicon: BDAG
  rationale: 「주와 함께 본거지를 두다」.
theological_decisions:
- issue: 5:8 ἐκδημῆσαι ἐκ τοῦ σώματος의 직접성 보존
  chosen_reading: 몸을 떠나 주께로 가서 거하다
  alternative_readings:
  - 세상을 떠나 주와 함께 거하다
  - 몸을 떠나 주와 함께 있다
  rationale: 바울은 죽음(몸을 떠남)을 곧 주와의 본거지적 거함으로 직접 연결한다. 한국 전통은 「세상을 떠나」로 완곡화하거나 「몸과 분리되어」로 영혼-몸 이원론적으로 도덕화해 왔으나, 본문의 직접성·구체성을 보존한다. 「몸을 떠나」는 바울의 신학적 무게(중간 상태 / 부활의 몸 / 종말론적 거함)를 모두 열어 둔 채 문자적 직접성을 유지한다.
  doctrine_reference: DOCTRINE.md §1 source-primacy; do not moralize
