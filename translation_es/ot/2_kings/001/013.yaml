translation:
  language: es
  text: 'Otra vez envió a un tercer capitán de cincuenta con sus cincuenta.[a] Él subió y vino, y el tercer capitán de cincuenta se arrodilló de rodillas delante de Elías, le rogó y le dijo: «Hombre de Dios[b], te ruego que mi vida y la vida de estos cincuenta siervos tuyos sean preciosas ante tus ojos».[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con sus cincuenta hombres». El hebreo dice literalmente «con sus cincuenta», dejando «hombres» implícito.
    reason: lexical_alternative
  - marker: b
    text: O «Varón de Dios». El hebreo usa el título profético אִישׁ הָאֱלֹהִים.
    reason: lexical_alternative
  - marker: c
    text: O «que mi alma y el alma de estos cincuenta siervos tuyos sean preciosas ante tus ojos». El hebreo נֶפֶשׁ puede significar «vida», «ser» o «alma» según el contexto; aquí se refiere a la vida en peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: HALOT
  rationale: El hebreo retoma la secuencia narrativa con valor repetitivo/resuntivo. «Otra vez» reproduce ese matiz de reiteración de forma natural en español.
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: Es el verbo narrativo normal para שׁלח en este contexto militar.
- source_word: שַׂר חֲמִשִּׁים שְׁלִשִׁי
  english_pob_choice: a third captain of fifty
  chosen_spanish: un tercer capitán de cincuenta
  alternatives_spanish:
  - el tercer capitán de cincuenta
  - un capitán de cincuenta, el tercero
  lexicon: HALOT
  rationale: Conserva el orden ordinal y el título militar sin añadir «hombres», que no está explícito en el hebreo.
- source_word: וַחֲמִשָּׁיו
  english_pob_choice: with his fifty
  chosen_spanish: con sus cincuenta
  alternatives_spanish:
  - con sus cincuenta hombres
  - con los cincuenta a su cargo
  lexicon: HALOT
  rationale: El hebreo menciona literalmente «sus cincuenta»; en español puede entenderse la elipsis de «hombres» sin necesidad de explicitarla.
- source_word: וַיַּעַל וַיָּבֹא
  english_pob_choice: He went up and came
  chosen_spanish: Subió y vino
  alternatives_spanish:
  - Subió y llegó
  - Subió y se presentó
  lexicon: HALOT
  rationale: Se mantienen los dos verbos para preservar el movimiento narrativo del hebreo. «Vino» refleja mejor la literalidad del segundo verbo que «llegó».
- source_word: וַיִּכְרַע עַל בִּרְכָּיו
  english_pob_choice: knelt on his knees
  chosen_spanish: se arrodilló sobre sus rodillas
  alternatives_spanish:
  - cayó de rodillas
  - se inclinó de rodillas
  lexicon: HALOT
  rationale: La forma hebrea expresa la postura de arrodillarse; la construcción española mantiene el énfasis corporal y la humillación sin suavizarlo excesivamente.
- source_word: לְנֶגֶד אֵלִיָּהוּ
  english_pob_choice: before Elijah
  chosen_spanish: delante de Elías
  alternatives_spanish:
  - ante Elías
  - frente a Elías
  lexicon: HALOT
  rationale: «Delante de» reproduce bien el sentido espacial y deferencial del hebreo en este gesto de súplica.
- source_word: וַיִּתְחַנֵּן אֵלָיו
  english_pob_choice: pleaded with him
  chosen_spanish: imploróle
  alternatives_spanish:
  - le rogó
  - suplicóle
  lexicon: HALOT
  rationale: El hitpael de חנן expresa una súplica intensa; «imploróle» mantiene un registro digno y directo. Se conserva un tono más literario, acorde con el texto bíblico.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: Man of God
  chosen_spanish: Hombre de Dios
  alternatives_spanish:
  - Varón de Dios
  - Oh hombre de Dios
  lexicon: HALOT
  rationale: «Hombre de Dios» es la equivalencia natural y reconocible en español para este título profético.
- source_word: תִּיקַר נָא
  english_pob_choice: please let ... be precious
  chosen_spanish: te ruego que ... sea preciosa
  alternatives_spanish:
  - por favor, que ... sea valiosa
  - te suplico que ... sea estimada
  lexicon: HALOT
  rationale: Se conserva el valor de «ser precioso/valioso» en vez de convertirlo en «perdonar» o «ahorrar», para no borrar la metáfora del hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: En este contexto de peligro inmediato, נֶפֶשׁ se refiere a la vida de la persona. «Mi vida» evita cargar el texto con una antropología ajena al pasaje.
- source_word: וְנֶפֶשׁ עֲבָדֶיךָ אֵלֶּה חֲמִשִּׁים
  english_pob_choice: and the life of these fifty servants of yours
  chosen_spanish: y la vida de estos cincuenta siervos tuyos
  alternatives_spanish:
  - y la vida de estos cincuenta siervos de tuyos
  - y la vida de estos tus cincuenta siervos
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo «la vida» por fidelidad estructural y naturalidad española, y se usa «siervos» porque עבדים en la relación de subordinación puede expresarse así sin perder el sentido de dependencia.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your sight
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - a tu vista
  - en tu opinión
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de valoración o juicio. «Ante tus ojos» preserva la imagen y su sentido relacional.
theological_decisions:
- issue: Valor de נֶפֶשׁ en una escena de peligro
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser
  rationale: El capitán pide que no se le quite la vida a él ni a sus hombres; traducir נֶפֶשׁ como «alma» introduciría una carga doctrinal no requerida por el contexto inmediato. «Vida» conserva la tensión sin doctrinalizar el término.
  doctrine_reference: Prioridad del contexto inmediato sobre una antropología sistemática importada; preservar la tensión léxica.
- issue: Tratamiento del título profético אִישׁ הָאֱלֹהִים
  english_pob_reading: Man of God
  chosen_spanish_reading: Hombre de Dios
  alternative_spanish_readings:
  - Varón de Dios
  - oh hombre de Dios
  rationale: Se mantiene el título tradicional profético sin sustituirlo por una perífrasis explicativa. La vocatividad se resuelve con la puntuación española.
  doctrine_reference: Fidelidad al título profético y a la función vocativa del discurso directo.
translation_notes:
  revision_awareness: La redacción inglesa más reciente ajustó 'these your fifty servants' a 'these fifty servants of yours' por naturalidad. La versión española sigue esa misma intención de naturalidad sin perder la apposición hebrea de 'estos cincuenta' sobre 'siervos tuyos'. No se adoptaron lecturas más interpretativas como 'hombres' porque no están explícitas en el texto base.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en otros contextos; aquí no aparece.
  - Se usa «Hombre de Dios» con mayúscula por ser título profético.
  - Se conserva la distinción entre «vida» y «alma» en relación con נֶפֶשׁ según el contexto.
  - Se evita reemplazar el hebreo con términos eclesiásticos más tradicionales cuando el texto requiere una equivalencia más precisa.
