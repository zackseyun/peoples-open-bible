id: 1PE.2.19
reference: 1 Peter 2:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦτο γὰρ χάρις εἰ διὰ συνείδησιν θεοῦ ὑποφέρει τις λύπας πάσχων ἀδίκως·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/019.yaml
  text: 'For this is grace: if someone endures sorrows while suffering unjustly because of consciousness of God.'
translation:
  language: ko
  text: '이는 은혜로운 일이기 때문입니다 — 곧 어떤 사람이 하나님을 의식함으로 부당하게 고난당하면서 슬픔을 견뎌 낸다면 말입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_korean: 은혜로운 일
  alternatives_korean:
  - 칭찬받을 일
  - 은혜
  lexicon: BDAG
  rationale: χάρις는 여기서 「하나님 보시기에 가치 있는 일·은혜로운 일」을 가리킨다. 2:20에서 동일 어휘 반복으로 통일.
- source_word: διὰ συνείδησιν θεοῦ
  english_pob_choice: because of consciousness of God
  chosen_korean: 하나님을 의식함으로
  alternatives_korean:
  - 하나님에 대한 양심으로
  - 하나님을 깨달아 알기 때문에
  lexicon: BDAG
  rationale: συνείδησις θεοῦ는 「하나님을 의식함」 곧 하나님에 대한 자각을 가리킨다. 「양심」도 가능하나 한국어 「양심」이 본문보다 좁은 의미를 끌어올 수 있다.
- source_word: ὑποφέρει ... λύπας
  english_pob_choice: endures sorrows
  chosen_korean: 슬픔을 견뎌 낸다
  alternatives_korean:
  - 고통을 참아 낸다
  - 슬픔들을 감내한다
  lexicon: BDAG
  rationale: ὑποφέρω의 「감당해 냄」을 「견뎌 내다」로 옮긴다.
- source_word: πάσχων ἀδίκως
  english_pob_choice: suffering unjustly
  chosen_korean: 부당하게 고난당하면서
  alternatives_korean:
  - 억울하게 고난을 받으며
  lexicon: BDAG
  rationale: ἀδίκως를 「부당하게」로 명시하여 노예의 매임이 정당화될 수 없음을 본문대로 드러낸다.
