theological_decisions:
- issue: Meaning of 'his brothers' in covenant context
  chosen_reading: Rendered as 'his brothers' in the main text, without expanding to 'kinsmen' or 'relatives.'
  alternative_readings:
  - his kinsmen
  - his relatives
  rationale: The Hebrew term can extend beyond literal siblings, but the text itself uses the familial term. Preserving 'brothers' maintains source-language texture and avoids interpretive expansion, while the broader sense can be noted in a footnote.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral) and §5 (consistency of key terms, or documented exception).
