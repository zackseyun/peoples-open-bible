translation:
  text: But the Lord’s abundant compassion has had mercy on you and your household, and he will strengthen
    you and establish you in his glory. Only do not be slothful, but take heart and strengthen your household.
    For, as the blacksmith hammering his work masters the thing he intends, so also the righteous word
    spoken daily prevails over every wickedness. Do not, therefore, cease admonishing your children; for
    I know that if they repent with their whole heart, they will be written in the books of life with
    the holy ones.
