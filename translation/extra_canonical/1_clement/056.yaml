source:
  edition: Funk 1901 (normalized OCR)
  text: Καὶ ἡμεῖς οὖν ἐντύχωμεν περὶ τῶν ἐν τινι παραπτώματι ὑπαρχόντων, ὅπως δοθῇ αὐτοῖς ἐπιείκεια καὶ ταπεινοφροσύνη εἰς τὸ εἶξαι αὐτοὺς μὴ ἡμῖν, ἀλλὰ τῷ θελήματι τοῦ θεοῦ· οὕτως γὰρ ἔσται αὐτοῖς ἔγκαρπος καὶ τελεία ἡ πρὸς τὸν θεὸν καὶ τοὺς ἁγίους μετ’ οἰκτιρμῶν μνεία. 2. ἀναλάβωμεν παιδείαν, ἐφ’ ᾗ οὐδεὶς ὀφείλει ἀγανακτεῖν, ἀγαπητοί. ἡ νουθέτησις, ἣν ποιούμεθα εἰς ἀλλήλους, καλὴ ἐστιν καὶ ὑπεράγαν ὠφέλιμος· κολλᾷ γὰρ ἡμᾶς τῷ θελήματι τοῦ θεοῦ. 3. οὕτως γάρ φησιν ὁ ἅγιος λόγος· Παιδεύων ἐπαίδευσέν με ὁ κύριος, καὶ τῷ θανάτῳ οὐ παρέδωκέν με· 4. ὃν γὰρ ἀγαπᾷ κύριος, παιδεύει, μαστιγοῖ δὲ πάντα υἱόν, ὃν παραδέχεται. 5. Παιδεύσει με γάρ, φησίν, δίκαιος ἐν ἐλέει καὶ ἐλέγξει με, ἔλαιον δὲ ἁμαρτωλῶν μὴ λιπανάτω τὴν κεφαλήν μου. 6. Καὶ πάλιν λέγει· Μακάριος ἄνθρωπος, ὃν ἤλεγξεν ὁ κύριος· νουθέτημα δὲ παντοκράτορος μὴ ἀπαναίνου· αὐτὸς γὰρ ἀλγεῖν ποιεῖ, καὶ πάλιν ἀποκαθίστησιν· 7. ἔπαισεν, καὶ αἱ χεῖρες αὐτοῦ ἰάσαντο. 8. ἑξάκις ἐξ ἀναγκῶν ἐξελεῖταί σε, ἐν δὲ τῷ ἑβδόμῳ οὐχ ἅψεταί σου κακόν. . ἐν λιμῷ ῥύσεταί σε ἐκ θανάτου, ἐν πολέμῳ δὲ ἐκ χειρὸς σιδήρου λύσει σε· 10. καὶ ἀπὸ μάστιγος γλώσσης σε κρύψει, καὶ οὐ μὴ φοβηθήσῃ κακῶν ἐπερχομένων. 11. ἀδίκων καὶ ἀνόμων καταγελάσῃ, ἀπὸ δὲ θηρίων ἀγρίων οὐ μὴ φοβηθῇς. . θῆρες γὰρ ἄγριοι εἰρηνεύσουσίν σοι. 13. εἶτα γνώσῃ, ὅτι εἰρηνεύσει σου ὁ οἶκος, ἡ δὲ δίαιτα τῆς σκηνῆς σου οὐ μὴ ἁμάρτῃ. 14. γνώσῃ δέ, ὅτι πολὺ τὸ σπέρμα σου, τὰ δὲ τέκνα σου ὥσπερ τὸ παμβότανον τοῦ ἀγροῦ. 15. ἐλεύσῃ δὲ ἐν τάφῳ ὥσπερ σῖτος ὥριμος κατὰ καιρὸν θεριζόμενος, ἢ ὥσπερ θημωνιὰ ἅλωνος καθ’ ὥραν συγκομισθεῖσα. 16. βλέπετε, ἀγαπητοί, πόσος ὑπερασπισμός ἐστιν τοῖς παιδευομένοις ὑπὸ τοῦ δεσπότου· πατὴρ γὰρ ἀγαθὸς ὢν παιδεύει εἰς τὸ ἐλεηθῆναι ἡμᾶς διὰ τῆς ὁσίας παιδείας αὐτοῦ.
  language: Greek
