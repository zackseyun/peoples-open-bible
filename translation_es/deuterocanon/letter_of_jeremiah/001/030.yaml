    issue: '''se sientan en dignidad'' es una expresión antinatural en español'
    rationale: Aunque intenta reflejar 'sit in state', en español no es una colocación idiomática. Una opción como 'se sientan con ostentación' o 'se sientan ceremoniosamente' comunica mejor el matiz sin sonar forzada.
  - severity: low
    issue: '''con la cabeza descubierta'' pasa a singular donde el griego tiene plural'
    rationale: El original dice 'sus cabezas... no cubiertas'. El singular puede entenderse distributivamente, pero el plural 'las cabezas descubiertas' refleja mejor la forma y la imagen del texto.
