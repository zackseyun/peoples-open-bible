translation:
  language: es
  text: Pero los que temen a Yahvé resucitarán para vida eterna, y su vida en la luz de Yahvé no cesará jamás.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φοβούμενοι
  english_pob_choice: those who fear
  chosen_spanish: los que temen
  alternatives_spanish:
  - los que reverencian
  - los que sienten temor
  lexicon: BDAG
  rationale: El participio funciona de manera sustantiva para designar a un grupo caracterizado por una disposición continua hacia Dios. En español, «los que temen» conserva mejor el peso bíblico-teológico que suavizarlo como «reverencian», y además suena natural.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: BDAG
  rationale: El contexto griego usa κύριος como título divino. En este versículo el auditorio y la fraseología favorecen la forma devocional «el Señor» como equivalente funcional en español, sin necesidad de marcar el Nombre divino explícito aquí.
- source_word: ἀναστήσονται
  english_pob_choice: will rise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - resucitarán
  - se alzarán
  lexicon: BDAG
  rationale: El futuro medio expresa levantarse/emerger. En español, «se levantarán» mantiene la imagen verbal y permite, por el contexto de «vida eterna», la resonancia de resurrección sin añadir una forma pasiva que el griego no tiene.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: to eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - a vida eterna
  - hacia vida eterna
  lexicon: BDAG
  rationale: La preposición εἰς señala meta o resultado. «Para vida eterna» comunica bien la finalidad/destino y suena natural en español; «vida eterna» conserva la fórmula teológica sin calcar excesivamente.
- source_word: ἐν φωτὶ Κυρίου
  english_pob_choice: in the light of the Lord
  chosen_spanish: en la luz del Señor
  alternatives_spanish:
  - en la luz de Yahvé
  - por la luz del Señor
  lexicon: BDAG
  rationale: La imagen preposicional se conserva de forma directa. «En la luz del Señor» es transparente, natural en español y mantiene la relación espacial/metafórica del texto griego.
- source_word: οὐκ ἐκλείψει ἔτι
  english_pob_choice: will never cease
  chosen_spanish: no cesará jamás
  alternatives_spanish:
  - nunca terminará
  - no fallará ya más
  lexicon: BDAG
  rationale: Para ζωή, ἐκλείπω comunica cesar o extinguirse. «No cesará jamás» expresa continuidad indefinida de modo idiomático y conserva la fuerza enfática de οὐκ ... ἔτι.
theological_decisions:
- issue: Lenguaje de resurrección en ἀναστήσονται εἰς ζωὴν αἰώνιον
  english_pob_reading: A future resurrection to everlasting life is expressed directly in the main text.
  chosen_spanish_reading: Se conserva un sentido de levantarse con clara resonancia de resurrección, orientado a la vida eterna.
  alternative_spanish_readings:
  - resucitarán para vida eterna
  - se alzarán hacia vida eterna
  rationale: El verbo griego es literalmente «se levantarán»; la frase siguiente «para vida eterna» define la dirección escatológica. En español, «se levantarán» evita imponer una pasiva no presente, pero el contexto permite leerlo como resurrección futura.
  doctrine_reference: Esperanza escatológica / resurrección de los justos
- issue: Relación entre «Señor» y el nombre divino
  english_pob_reading: Per project doctrine, κύριος defaults to 'Lord.' Here it refers to God and does not require the small-caps convention reserved for YHWH in Hebrew contexts.
  chosen_spanish_reading: Se mantiene «el Señor» como título reverente para κύριος, sin forzar «Yahvé» donde el texto griego no lo marca explícitamente.
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: El texto fuente es griego y usa κύριος; aunque remite al Dios de Israel, el equivalente auditado en el POB inglés es «the Lord». En español, «el Señor» preserva esa lectura sin introducir una identificación más específica que el verso no exige.
  doctrine_reference: Teología del nombre divino / equivalencia titulativa
translation_notes:
  revision_awareness: El pasaje no presenta cambios en el último pase de revisión; el dictamen de alta concordancia confirma que la lectura inglesa auditada se mantiene estable. Esta versión española sigue esa lectura sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se conserva el paralelismo entre la primera y la segunda cláusula.
  - «Vida eterna» y «la luz del Señor» mantienen el registro bíblico sin arcaísmo excesivo.
  - No se usa «SEÑOR» en versalitas porque el source packet griego aporta κύριος, no una citación explícita del tetragrámaton.
