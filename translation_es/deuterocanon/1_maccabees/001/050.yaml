translation:
  language: es
  text: Y cualquiera que no obre conforme a la palabra del rey, morirá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según la orden del rey». El griego dice literalmente «la palabra del rey», que en este contexto se refiere a su mandato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἂν μὴ ποιήσῃ
  english_pob_choice: whoever does not act
  chosen_spanish: y cualquiera que no obre
  alternatives_spanish:
  - y quien no haga
  - y cualquiera que no realice
  lexicon: BDAG
  rationale: 'La construcción indefinida con ἄν pide un valor general: «quienquiera / cualquiera que». ποιέω aquí tiene fuerza de ejecución o cumplimiento de una orden; en español, «obrar» comunica mejor la idea de actuar en conformidad con una disposición que un simple «hacer».'
- source_word: κατὰ τὸ ῥῆμα
  english_pob_choice: according to the word
  chosen_spanish: conforme a la palabra
  alternatives_spanish:
  - según la palabra
  - de acuerdo con la palabra
  - conforme al mandato
  lexicon: BDAG
  rationale: ῥῆμα es literalmente «palabra, dicho, expresión». La POB inglesa conservó «word» para no forzar un término más específico. En español, «palabra» mantiene esa literalidad, y «conforme a» expresa bien la dependencia normativa del texto.
- source_word: τοῦ βασιλέως
  english_pob_choice: of the king
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey soberano
  - del monarca
  lexicon: BDAG
  rationale: 'El genitivo es directo: la palabra pertenece al rey. «Rey» es el equivalente natural y preciso en español.'
- source_word: ἀποθανεῖται
  english_pob_choice: shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - será muerto
  - será ejecutado
  lexicon: BDAG
  rationale: El futuro de ἀποθνῄσκω expresa literalmente «morirá». Aunque el contexto implica pena capital, el griego no explicita el agente de la ejecución; por eso se conserva la formulación más formal y menos interpretativa.
translation_notes:
  revision_awareness: El texto griego y el audito inglés están en alta concordancia; no se detectaron revisiones aplicadas ni cambios textuales relevantes, así que la versión española sigue de cerca la lectura auditada sin añadir interpretación extra.
  spanish_consistency_notes:
  - Se conserva «rey» sin amplificación, porque el contexto ya identifica la autoridad.
  - «Morirá» mantiene la ambigüedad formal del griego mejor que una voz explícitamente pasiva.
  - «Palabra» conserva la literalidad de ῥῆμα y deja la aclaración al pie de página.
