base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/023/007.yaml
  text: And it was reported to Saul that David had come to Keilah[a]. So Saul said, “God has delivered him into my hand[b], for he has shut himself in by entering a city with doors and bars.”
  footnotes:
  - marker: a
    text: Or, 'God has handed him over into my hand.' Saul interprets David's position as divine delivery into his power.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a city of double doors and bar,' referring to a fortified city secured by paired gate-leaves and a crossbar.
    reason: cultural_note
