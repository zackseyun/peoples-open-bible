translation:
  language: es
  text: Cuando aumentan los bienes[a], aumentan también los que los consumen; y ¿qué provecho hay para sus dueños, sino el ver de sus ojos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bienes materiales', 'cosas buenas' o 'riqueza' para 'bienes'. El término hebreo puede abarcar bienes materiales o prosperidad en sentido más amplio; aquí el contexto inmediato favorece posesiones que se pueden consumir y poseer.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'excepto el ver de sus ojos'. El hebreo conserva un giro idiomático que sugiere que la única ganancia del dueño puede ser simplemente mirar lo que posee.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְבוֹת
  english_pob_choice: When ... increase
  chosen_spanish: Cuando aumentan
  alternatives_spanish:
  - Al aumentar
  - En el aumentar de
  lexicon: HALOT
  rationale: La construcción temporal con ב e infinitivo constructo expresa 'cuando / al incrementarse'. 'Cuando aumentan' conserva la relación temporal y suena natural en español.
- source_word: הַטּוֹבָה
  english_pob_choice: goods
  chosen_spanish: los bienes
  alternatives_spanish:
  - las cosas buenas
  - la prosperidad
  - la riqueza
  lexicon: HALOT
  rationale: En este contexto económico, el término apunta a posesiones o bienes materiales que pueden crecer, ser consumidos y tener dueño. 'Bienes' mantiene esa concreción sin ampliar indebidamente a una idea abstracta de prosperidad.
- source_word: רַבּוּ
  english_pob_choice: increase
  chosen_spanish: aumentan también
  alternatives_spanish:
  - se multiplican
  - crecen
  lexicon: HALOT
  rationale: El segundo רבה conserva el paralelismo con el primero. 'Aumentan también' reproduce la idea de multiplicación y el efecto de correspondencia retórica en español.
- source_word: אוֹכְלֶיהָ
  english_pob_choice: those who consume them
  chosen_spanish: los que los consumen
  alternatives_spanish:
  - los que los comen
  - sus consumidores
  - los que los devoran
  lexicon: HALOT
  rationale: El participio de אכל es literalmente 'comer/consumir'. Dado que el referente son bienes, 'los que los consumen' conserva el valor de uso y agotamiento de los bienes sin sonar forzado.
- source_word: וּמַה כִּשְׁרוֹן
  english_pob_choice: and what advantage is there
  chosen_spanish: ¿qué provecho hay
  alternatives_spanish:
  - ¿qué ventaja hay
  - ¿qué ganancia hay
  lexicon: HALOT
  rationale: כִּשְׁרוֹן denota provecho, ventaja o ganancia. 'Provecho' es idiomático en español y funciona bien en la pregunta retórica de Eclesiastés.
- source_word: לִבְעָלֶיהָ
  english_pob_choice: to their owners
  chosen_spanish: para sus dueños
  alternatives_spanish:
  - para sus propietarios
  - para sus poseedores
  - para sus amos
  lexicon: HALOT
  rationale: בעל aquí significa propietario o poseedor. 'Dueños' comunica con claridad la relación de posesión y mantiene el nivel natural del español.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - solo
  lexicon: HALOT
  rationale: 'En esta pregunta retórica, la locución introduce la única excepción. ''Sino'' en español expresa con precisión esa exclusión: el único beneficio es una mera contemplación.'
- source_word: רְאִית
  english_pob_choice: the seeing
  chosen_spanish: el ver
  alternatives_spanish:
  - el mirar
  - la visión
  - el contemplar
  lexicon: HALOT
  rationale: El sustantivo derivado de ראה conserva la fuerza nominal de 'seeing'. 'El ver' mantiene esa forma proverbial y evita suavizarla demasiado en una paráfrasis.
- source_word: עֵינָיו
  english_pob_choice: of their eyes
  chosen_spanish: con sus ojos
  alternatives_spanish:
  - de sus ojos
  - con los ojos de ellos
  - por sus ojos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus ojos / sus ojos' dentro de un giro idiomático. 'Con sus ojos' transmite la imagen de la observación o contemplación directa sin perder la referencia corporal del original.
translation_notes:
  revision_awareness: Se ha seguido de cerca el sentido del hebreo y el audit trail en inglés, conservando el paralelismo, la pregunta retórica y el giro idiomático final sin traducir mecánicamente. No hubo revisiones aplicadas en la fuente inglesa; el acuerdo de revisión es alto y no requiere cambios sustanciales.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'bienes' por el contexto económico y 'dueños' para בעל, evitando términos eclesiásticos o abstractos no requeridos por el hebreo.
  - Se conservó la ambigüedad proverbial final mediante una nota, en lugar de resolverla completamente como mera 'mirada'.
