review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene los dos imperativos, la imagen concreta de atar/escribir, «dedos» para אֶצְבְּעֹתֶיךָ, y «corazón» para לִבֶּךָ. «Tabla» es aceptable para לוּחַ, aunque «tabla» puede sonar algo menos natural que «tablilla» o «tableta» en este modismo bíblico; no obstante, sigue siendo fiel.'
  spanish_quality_summary: 'La línea principal es clara y legible en español. El problema principal está en la nota: «Árralos» no es una alternativa válida ni idiomática para קשר aquí y parece un error léxico. También conviene ajustar la puntuación tipográfica de la nota para mantener estilo editorial limpio.'
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo la preservación de la metáfora sapiencial, que el borrador conserva correctamente. «Átalos» alinea bien con el POB inglés «Tie them» y la alternativa española adecuada para «Bind them» sería «Átalos»/«Lígalos»/«Ámalos»? No; la mejor alternativa documentable aquí es «Átalos» vs. «Átalos» no sirve como alternativa. Lo correcto es «Átalos» en texto principal y «O: “Átalos…”» no aporta variante. Mejor usar «Lígalos» como alternativa léxica natural, o «Átalos» principal sin nota si no se desea variante. Dado que el inglés preservó una alternativa, en español puede mantenerse con «Lígalos».'
  issues:
  - severity: medium
    issue: La nota al pie usa «Árralos», forma incorrecta o no pertinente.
    rationale: No corresponde al sentido de קשר ni es una opción idiomática estándar en español bíblico moderno. Introduce confusión léxica y debilita la confiabilidad del aparato.
  - severity: low
    issue: La nota al pie necesita normalización editorial.
    rationale: 'La puntuación actual (''O: «Árralos en tus dedos».'') puede mejorarse junto con la corrección léxica para adecuarse al estilo del proyecto.'
  revised_spanish_text: Átalos[a] en tus dedos; escríbelos en la tabla de tu corazón.
  revised_footnotes:
  - marker: a
    text: 'O: «Lígalos en tus dedos».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel, claro y mantiene la metáfora del original. Solo se corrige la nota léxica: «Árralos» es erróneo; «Lígalos» ofrece una alternativa española natural que corresponde al matiz de «bind them» en el registro del POB.'
