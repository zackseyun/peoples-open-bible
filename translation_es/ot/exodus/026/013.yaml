translation:
  language: es
  text: Y el codo de un lado y el codo de otro[a], de lo que sobra en la longitud de las cortinas de la tienda, colgará sobre los lados del tabernáculo[b], de un lado y del otro, para cubrirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un codo de un lado y un codo del otro». El hebreo repite la unidad de medida con demostrativos, aludiendo al sobrante en cada lado.'
    reason: alternative_reading
  - marker: b
    text: «Tabernáculo» traduce mishkán, la estructura sagrada de morada bajo la cubierta de la tienda.
    reason: cultural_note
lexical_decisions:
- source_word: הָאַמָּה
  english_pob_choice: the cubit
  chosen_spanish: el codo
  alternatives_spanish:
  - el cubito
  - un codo
  lexicon: HALOT
  rationale: אַמָּה es la medida lineal estándar 'codo'. En español bíblico moderno, 'codo' comunica la unidad sin introducir una paráfrasis. Mantengo el valor de medida y dejo que el contexto explique que se trata del sobrante de longitud.
- source_word: מִזֶּה ... מִזֶּה
  english_pob_choice: on this side ... on that side
  chosen_spanish: de un lado ... de otro
  alternatives_spanish:
  - de este lado ... de aquel lado
  - a un lado ... al otro
  lexicon: HALOT
  rationale: Las demostrativas señalan dos lados opuestos. 'De un lado... de otro' suena natural en español y conserva la distribución paralela del hebreo sin forzar elípticamente 'este/ese' donde el contexto arquitectónico ya hace clara la oposición.
- source_word: בָּעֹדֵף
  english_pob_choice: the surplus
  chosen_spanish: de lo que sobra
  alternatives_spanish:
  - del sobrante
  - de la excedencia
  lexicon: HALOT
  rationale: El sustantivo expresa lo que queda sobrando. 'De lo que sobra' reproduce bien el valor residual sin tecnicismo innecesario; evita perder la imagen concreta de material sobrante.
- source_word: יְרִיעֹת הָאֹהֶל
  english_pob_choice: the tent curtains
  chosen_spanish: las cortinas de la tienda
  alternatives_spanish:
  - las cortinas del tabernáculo
  - las lonas de la tienda
  lexicon: HALOT
  rationale: Yərîʿôt son paneles/cortinas de tela; הָאֹהֶל es 'la tienda'. En español, 'cortinas de la tienda' conserva la imagen física del textil de cobertura y evita anticipar 'tabernáculo' en un miembro donde el hebreo dice literalmente 'tienda'.
- source_word: יִהְיֶה סָרוּחַ
  english_pob_choice: shall hang over
  chosen_spanish: se colgará
  alternatives_spanish:
  - colgará sobre
  - se extenderá sobre
  lexicon: HALOT
  rationale: El verbo sugiere quedar pendiendo/sobresaliendo. 'Se colgará sobre' expresa el efecto físico del exceso de tela y permite integrar el sobrecolgamiento sin añadir una interpretación más amplia que el original.
- source_word: צִדֵּי הַמִּשְׁכָּן
  english_pob_choice: the sides of the tabernacle
  chosen_spanish: los lados del tabernáculo
  alternatives_spanish:
  - los costados del tabernáculo
  - los lados de la morada
  lexicon: HALOT
  rationale: מִשְׁכָּן se rinde aquí como 'tabernáculo', término ya asentado en la tradición de traducción española y claramente apropiado para la estructura sagrada. 'Lados' es la opción más directa para צִדֵּי en un contexto de construcción.
- source_word: לְכַסֹּתוֹ
  english_pob_choice: to cover it
  chosen_spanish: para cubrirlo
  alternatives_spanish:
  - para taparlo
  - a fin de cubrirlo
  lexicon: HALOT
  rationale: El infinitivo de propósito indica finalidad. 'Para cubrirlo' es la formulación más clara y fiel en español; mantiene el propósito funcional del material sobrante sin añadir matices devocionales ajenos al texto.
theological_decisions:
- issue: Traducción de מִשְׁכָּן
  english_pob_reading: '''Tabernacle'' translates Hebrew mishkan, the sacred dwelling structure beneath the tent covering.'
  chosen_spanish_reading: '''Tabernáculo'' traduce mishkán, la estructura sagrada de morada bajo la cubierta de la tienda.'
  alternative_spanish_readings:
  - '''Morada'''
  - '''Lugar de habitación'''
  rationale: No hay un problema doctrinal aquí, pero sí una decisión terminológica. 'Tabernáculo' comunica la referencia técnica habitual en español y mantiene la relación con la cubierta de la tienda. La alternativa 'morada' sería más literal al campo semántico, pero menos reconocible en este contexto ritual-constructivo.
  doctrine_reference: Éxodo 26; terminología del santuario
- issue: Imagen del sobrante como elemento funcional
  english_pob_reading: the overhanging material serves to cover the tabernacle
  chosen_spanish_reading: el material sobrante se cuelga para cubrir el tabernáculo
  alternative_spanish_readings:
  - el sobrante se extiende para cubrir
  - el exceso de tela queda sobre los lados
  rationale: 'El hebreo presenta un uso funcional del sobrante: no es meramente decorativo, sino que cubre. Mantengo esa finalidad explícita para no diluir el detalle arquitectónico del texto.'
  doctrine_reference: Éxodo 26:13; descripción del santuario
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido ya consolidado en el audit trail inglés (cubit/surplus/hang over/cover) y no introduce cambios textuales relevantes respecto de la última revisión, marcada como sin cambios. La principal adaptación es lexical en español: ''codo'' para la medida, ''de lo que sobra'' para el sobrante, y ''cortinas de la tienda'' para יְרִיעֹת הָאֹהֶל, manteniendo la imagen constructiva del original.'
  spanish_consistency_notes:
  - Se conserva el paralelismo de los dos lados con 'de un lado ... de otro'.
  - '''Tabernáculo'' se usa de manera consistente para מִשְׁכָּן.'
  - '''Tienda'' se reserva para אֹהֶל en la expresión ''cortinas de la tienda''.'
  - No se fuerza 'SEÑOR' ni otros reemplazos teológicos ajenos al versículo.
  - La frase final 'para cubrirlo' mantiene la finalidad del infinitivo hebreo.
