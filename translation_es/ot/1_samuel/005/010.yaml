translation:
  language: es
  text: 'Así enviaron el arca de Dios a Ecrón. Pero cuando el arca de Dios llegó a Ecrón, los ecronitas gritaron, diciendo: «Han traído hasta mí[a] el arca del Dios de Israel, para matarme a mí y a mi pueblo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «a mí ... matarme a mí y a mi pueblo», usando lenguaje de primera persona singular, probablemente personificando la ciudad o expresando la voz de un portavoz representativo. Algunas traducciones suavizan esto al plural («a nosotros»).
    reason: alternative_reading
lexical_decisions:
- source_word: וַֽ/יְשַׁלְּח֛וּ
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - remitieron
  lexicon: HALOT
  rationale: El verbo de narrativa כאן expresa el acto de despachar el arca; en español, «enviaron» transmite de manera natural y fiel ese movimiento sin añadir matiz administrativo o epistolar.
- source_word: אֲר֥וֹן הָ/אֱלֹהִ֖ים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios
  lexicon: HALOT
  rationale: Se mantiene la construcción de posesión/relación con «de Dios», que es la forma directa y transparente en español para este sintagma fijo.
- source_word: עֶקְר֑וֹן
  english_pob_choice: Ekron
  chosen_spanish: Ecrón
  alternatives_spanish:
  - Ekron
  lexicon: HALOT
  rationale: Se usa la transliteración española habitual «Ecrón» para la ciudad filistea, conservando el nombre propio bíblico en forma legible para lectores en español.
- source_word: וַ/יִּזְעֲק֨וּ
  english_pob_choice: cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - dieron gritos
  lexicon: HALOT
  rationale: El verbo expresa una reacción de alarma y angustia; «gritaron» comunica bien la intensidad del clamor. «Clamaron» también sería posible, pero puede sonar más litúrgico.
- source_word: הָֽ/עֶקְרֹנִ֜ים
  english_pob_choice: the Ekronites
  chosen_spanish: los ecronitas
  alternatives_spanish:
  - la gente de Ecrón
  lexicon: HALOT
  rationale: El gentilicio plural se conserva como colectivo. «Ecronitas» sigue de cerca la forma de origen y es comprensible en español bíblico.
- source_word: הֵסַ֤בּוּ
  english_pob_choice: they have brought around
  chosen_spanish: han traído hacia nosotros
  alternatives_spanish:
  - han traído alrededor de nosotros
  - lo han traído hasta nosotros
  lexicon: HALOT
  rationale: El Hifil de סבב en este contexto comunica el haber hecho llegar el arca de un lugar a otro, con la idea de traerla a su entorno. «Hacia nosotros» conserva la orientación relacional sin forzar un calco extraño en español.
- source_word: אֵלַ/י֙
  english_pob_choice: to me
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - contra nosotros
  - a nosotros
  lexicon: HALOT
  rationale: Aunque el hebreo tiene primera singular, el audit trail inglés revisó la línea a plural para reflejar a los ecronitas hablando colectivamente. En español se sigue esa lectura plural del discurso colectivo.
- source_word: אֱלֹהֵ֣י יִשְׂרָאֵ֔ל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  lexicon: HALOT
  rationale: Se conserva la designación reverencial y específica del Dios de Israel con la forma directa y estándar en español.
- source_word: לַ/הֲמִיתֵ֖/נִי
  english_pob_choice: to kill me
  chosen_spanish: para matarnos
  alternatives_spanish:
  - para darnos muerte
  - para matarnos a nosotros
  lexicon: HALOT
  rationale: Se adapta la referencia al plural del discurso colectivo en la revisión inglesa; «para matarnos» reproduce con naturalidad el propósito letal.
- source_word: וְ/אֶת עַמִּֽ/י
  english_pob_choice: and my people
  chosen_spanish: a nosotros y a nuestro pueblo
  alternatives_spanish:
  - y a nuestro pueblo
  - y a nuestra gente
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que regularizó los pronombres al plural. «Nuestro pueblo» mantiene el sentido corporativo del hebreo y su tono de amenaza comunitaria.
theological_decisions:
- issue: Pronombres de primera persona singular/plural en el clamor de los ecronitas
  english_pob_reading: The revised English POB reads 'to us ... to kill us and our people,' treating the city as a collective speaker and smoothing the Hebrew singular forms.
  chosen_spanish_reading: 'Se traduce en plural: «hacia nosotros ... para matarnos a nosotros y a nuestro pueblo».'
  alternative_spanish_readings:
  - «hacia mí ... para matarme a mí y a mi pueblo»
  rationale: Dado que el expediente inglés más reciente corrigió el pasaje al plural y explicó una lectura colectiva, el español debe reflejar esa decisión editorial. Así se conserva el sentido comunitario del discurso sin reabrir la tensión ya resuelta en el auditorio de referencia.
  doctrine_reference: 'Translation philosophy #3, #5'
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa aprobada, que cambió los pronombres de singular a plural para reflejar el habla colectiva de los ecronitas; por ello no se conservó la nota de singularidad textual de la versión anterior.
  spanish_consistency_notes:
  - «Yahvé» no aparece aquí porque el texto hebreo usa אֱלֹהִים en la expresión fija «arca de Dios / Dios de Israel».
  - Se prefirió «Ecrón / ecronitas» por coherencia con la transliteración española bíblica y para evitar alternancia con la forma inglesa.
  - Se evitó «SEÑOR» porque el pasaje no contiene el tetragrámaton sino la referencia a Dios mediante אֱלֹהִים.
  - Se mantuvo el plural en todo el clamor final conforme a la última decisión editorial del audit trail en inglés.
