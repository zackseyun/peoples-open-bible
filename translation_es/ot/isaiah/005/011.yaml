translation:
  language: es
  text: ¡Ay de los que se levantan temprano por la mañana para perseguir la bebida embriagante, los que se quedan hasta tarde, hasta el anochecer[a], hasta que el vino los enciende!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta la tarde» o «hasta el crepúsculo». El hebreo נֶשֶׁף puede denotar la penumbra, especialmente al caer la tarde, aunque su matiz exacto varía según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de aquellos...!
  lexicon: HALOT
  rationale: En profecía, הוֹי expresa una advertencia de juicio o lamentación. «¡Ay de...» conserva ese tono oracular en español y evita un giro demasiado explicativo.
- source_word: מַשְׁכִּימֵי
  english_pob_choice: those who rise early
  chosen_spanish: los que se levantan de madrugada
  alternatives_spanish:
  - los que se levantan temprano
  - los madrugadores
  lexicon: HALOT
  rationale: El participio señala el acto de levantarse temprano. «De madrugada» mantiene la idea de anticipación temporal con naturalidad en español.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de madrugada
  alternatives_spanish:
  - por la mañana
  - en la mañana
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «en la mañana», el contexto de buscar bebida desde temprano hace que «de madrugada» exprese mejor la fuerza idiomática sin perder el sentido temporal.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: la sidra
  alternatives_spanish:
  - la bebida fuerte
  - el licor fuerte
  - bebida embriagante
  lexicon: HALOT
  rationale: שֵׁכָר designa una bebida fermentada e intoxicante distinta del vino. «Sidra» es una opción tradicional en español bíblico para esa bebida fuerte; se conserva el término del campo semántico de alcohol fermentado y se evita reducirlo a un licor moderno específico.
- source_word: יִרְדֹּפוּ
  english_pob_choice: pursue
  chosen_spanish: seguir
  alternatives_spanish:
  - perseguir
  - buscar con empeño
  - andar tras
  lexicon: HALOT
  rationale: El verbo implica perseguir o ir tras algo con insistencia. En español, «seguir» comunica la idea de dedicarse a esa bebida con persistencia, sin añadir violencia inexistente en el contexto.
- source_word: מְאַחֲרֵי
  english_pob_choice: who stay late
  chosen_spanish: los que se quedan hasta tarde
  alternatives_spanish:
  - los que se demoran hasta tarde
  - los que trasnochan
  lexicon: HALOT
  rationale: El participio indica tardanza o prolongar la espera. «Se quedan hasta tarde» transmite bien la permanencia prolongada y encaja con el paralelo del verso.
- source_word: בַנֶּשֶׁף
  english_pob_choice: in the evening
  chosen_spanish: en la noche
  alternatives_spanish:
  - al anochecer
  - en el atardecer
  - en la tarde
  lexicon: HALOT
  rationale: El audit trail inglés resolvió נֶשֶׁף como «evening» por el contexto; en español «en la noche» hace natural la idea de prolongarse hasta altas horas. Se mantiene la opción interpretativa sin afirmar más precisión que la que el contexto permite.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: HALOT
  rationale: Correspondencia directa y estable en español bíblico.
- source_word: יַדְלִיקֵם
  english_pob_choice: inflames them
  chosen_spanish: los enciende
  alternatives_spanish:
  - los inflama
  - los prende
  - los excita
  lexicon: HALOT
  rationale: La forma causativa de דלק evoca prender fuego o inflamar. «Los enciende» conserva la metáfora de calor/combustión con buena naturalidad en español.
theological_decisions:
- issue: Alcance del reproche profético
  english_pob_reading: Woe to those...
  chosen_spanish_reading: ¡Ay de...!
  alternative_spanish_readings:
  - ¡Desgracia a...!
  - ¡Malditos los que...!
  rationale: No se trata de una imprecación aislada sino de una fórmula profética de denuncia. «¡Ay de...» preserva la carga de juicio sin convertirla en una maldición literal.
  doctrine_reference: Fórmula profética de ay (oráculos de juicio) en Isaías
- issue: Naturaleza de שֵׁכָר
  english_pob_reading: strong drink
  chosen_spanish_reading: la sidra
  alternative_spanish_readings:
  - bebida fuerte
  - licor fuerte
  - bebida embriagante
  rationale: El hebreo distingue esta bebida del vino. En español, «sidra» funciona como término bíblico tradicional para una bebida fermentada fuerte; se elige por equivalencia semántica histórica, no por referencia a la sidra moderna comercial.
  doctrine_reference: Lexicografía bíblica del alcohol fermentado
- issue: Imagen final del vino
  english_pob_reading: until wine inflames them
  chosen_spanish_reading: hasta que el vino los enciende
  alternative_spanish_readings:
  - hasta que el vino los inflama
  - hasta que el vino los quema
  rationale: La frase conserva la metáfora física del hebreo y evita suavizar el efecto moral del vino en el contexto de la reprensión.
  doctrine_reference: Metáfora bíblica de intoxicación y juicio
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el ajuste final del audit trail inglés: se mantiene la equivalencia formal-idiomática de «pursue» y «evening» en vez de opciones más vívidas como «chase» o «twilight». La principal decisión propia del español es cómo verter שֵׁכָר, donde se conserva una equivalencia bíblica tradicional sin perder la distinción respecto de יַיִן.'
  spanish_consistency_notes:
  - Se usa «vino» para יַיִן y se distingue de שֵׁכָר, evitando fusionar ambos términos.
  - Se mantiene el tono profético de advertencia con «¡Ay de...!».
  - La metáfora final se conserva con un verbo de encender/inflamar para no diluir la imagen del hebreo.
