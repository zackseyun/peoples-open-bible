translation:
  language: es
  text: 'Y Abraham dijo[a]: «Dios proveerá para sí mismo el cordero para el holocausto, hijo mío». Así los dos siguieron caminando juntos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Dios verá para sí mismo el cordero para el holocausto». El verbo hebreo puede significar «ver» o, de manera idiomática aquí, «proveer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Abraham said
  chosen_spanish: Y Abraham dijo
  alternatives_spanish:
  - Entonces Abraham dijo
  - Y dijo Abraham
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Y ... dijo» conserva ese flujo hebreo sin volver la frase pesada en español. El orden con el sujeto explícito mantiene naturalidad y claridad.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí el término común para Dios se refiere al Dios verdadero en el discurso de Abraham; «Dios» es la equivalencia natural en español y preserva el referente teológico.
- source_word: יִרְאֶה לּוֹ
  english_pob_choice: will provide for himself
  chosen_spanish: proveerá para sí
  alternatives_spanish:
  - verá para sí
  - verá/proveerá para sí
  - se encargará de
  lexicon: HALOT
  rationale: ראה puede significar literalmente «ver», pero en este contexto funciona idiomáticamente como «proveer». «Proveerá para sí» conserva la decisión del POB inglés de mantener el matiz reflexivo de לּוֹ y evita borrar la tensión entre «ver» y «proveer».
- source_word: הַשֶּׂה
  english_pob_choice: the lamb
  chosen_spanish: el cordero
  alternatives_spanish:
  - la oveja
  - el animal para el sacrificio
  lexicon: HALOT
  rationale: שֶׂה designa una cabeza de ganado menor; en este contexto sacrificial, «cordero» es la opción más natural y transmite bien el valor sacrificial del término.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para el holocausto
  alternatives_spanish:
  - para una ofrenda quemada
  - como holocausto
  lexicon: HALOT
  rationale: עֹלָה es el término técnico del sacrificio totalmente quemado. «Holocausto» conserva el sentido cultual tradicional y es una equivalencia aceptable y clara en español bíblico.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío querido
  lexicon: HALOT
  rationale: El hebreo expresa un trato directo y afectuoso. «Hijo mío» conserva la relación familiar y el tono emotivo del discurso.
- source_word: וַיֵּלְכוּ שְׁנֵיהֶם יַחְדָּו
  english_pob_choice: So the two of them went on together
  chosen_spanish: Y los dos siguieron juntos
  alternatives_spanish:
  - Y ambos caminaron juntos
  - Y los dos fueron juntos
  lexicon: HALOT
  rationale: La frase hebrea subraya su caminar conjunto. «Siguieron juntos» comunica continuidad narrativa de manera natural, mientras preserva la idea de movimiento compartido.
theological_decisions:
- issue: Sentido de יִרְאֶה לּוֹ en la boca de Abraham
  english_pob_reading: God will provide for himself the lamb for a burnt offering
  chosen_spanish_reading: Dios proveerá para sí el cordero para el holocausto
  alternative_spanish_readings:
  - Dios verá para sí el cordero para el holocausto
  - Dios verá/proveerá para sí el cordero para el holocausto
  rationale: El hebreo permite una lectura más literal con «ver», pero el sentido idiomático en contexto es «proveer». Mantener «para sí» conserva la fuerza del pronombre dativo y la posible tensión narrativa entre una afirmación de provisión y la formulación más literal del texto hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB inglés, especialmente la decisión de reflejar לּוֹ con una construcción reflexiva («para sí») y no con una simple intensificación tipo «Dios mismo». Se ha conservado la tensión entre la lectura literal «ver» y la idiomática «proveer» en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin sustitución por «SEÑOR».
  - Se usa «holocausto» para עֹלָה por ser el término cultual técnico más claro en español bíblico.
  - «Cordero» sigue el alcance semántico del hebreo en este contexto sacrificial.
  - La frase final conserva el énfasis de movimiento conjunto con una formulación natural en español.
