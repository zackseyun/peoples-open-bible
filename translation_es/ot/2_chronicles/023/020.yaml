base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/023/020.yaml
  text: Then he took the commanders of hundreds[a], the nobles, the rulers of the people, and all the people of the land, and brought the king down from the house of Yahweh[c][b]. They entered through the upper gate of the king’s house and seated the king on the throne of the kingdom.
  footnotes:
