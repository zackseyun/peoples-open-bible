    text: O «el SEÑOR de los ejércitos».
    reason: lexical_alternative
  - marker: b
    text: Aquí «mal» significa calamidad o desastre en juicio, no mal moral.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'para cortar a toda Judá' por 'para extirpar a toda Judá' para reflejar con claridad וּלְהַכְרִית en español natural y grave, preservando la fuerza de juicio del hebreo. Se mantienen los demás elementos, que ya están bien alineados con la fuente y con la terminología del proyecto.
