translation:
  language: es
  text: Tu padre hizo más pesado nuestro yugo[a]. Ahora, pues, aligera la dura servidumbre que impuso tu padre y su pesado yugo que puso sobre nosotros[b], y te serviremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «hizo duro nuestro yugo» o «hizo severo nuestro yugo».'
    reason: lexical_alternative
  - marker: b
    text: «Servidumbre» aquí se refiere a trabajo u obligación impuestos bajo dominio real; alternativamente, «trabajo».
    reason: cultural_note
lexical_decisions:
- source_word: הִקְשָׁה
  english_pob_choice: made our yoke heavy
  chosen_spanish: hizo pesado nuestro yugo
  alternatives_spanish:
  - hizo duro nuestro yugo
  - hizo severo nuestro yugo
  lexicon: HALOT
  rationale: El hifil de קשׁה es causativo; en español, «hizo pesado» conserva la imagen del yugo y refleja bien la decisión revisada del POB en inglés. «Duro» o «severo» son posibles, pero «pesado» mantiene la coherencia con el yugo del resto del versículo.
- source_word: עֻלֵּנוּ
  english_pob_choice: our yoke
  chosen_spanish: nuestro yugo
  alternatives_spanish:
  - nuestra carga
  lexicon: HALOT
  rationale: «Yugo» preserva la metáfora concreta y política del hebreo, que continúa en la segunda mitad del versículo. «Carga» explicaría el sentido, pero perdería la imagen central.
- source_word: הָקֵל
  english_pob_choice: lighten
  chosen_spanish: aligera
  alternatives_spanish:
  - haz más ligero
  - alivia
  lexicon: HALOT
  rationale: El imperativo pide reducir la carga; «aligera» es natural en español y corresponde bien a la imagen de peso/yugo.
- source_word: מֵעֲבֹדַת ... הַקָּשָׁה
  english_pob_choice: the hard service
  chosen_spanish: la dura servidumbre
  alternatives_spanish:
  - el duro servicio
  - el penoso trabajo
  lexicon: HALOT
  rationale: «עֲבֹדָה» aquí denota trabajo impuesto o obligación bajo dominio real. «Servidumbre» comunica mejor el carácter coercitivo de la situación en español que «servicio», sin perder el matiz de sujeción política.
- source_word: וּמֵעֻלּוֹ הַכָּבֵד
  english_pob_choice: and his heavy yoke
  chosen_spanish: y su pesado yugo
  alternatives_spanish:
  - y su yugo gravoso
  - y su yugo oneroso
  lexicon: HALOT
  rationale: Se mantiene el mismo campo metafórico de yugo con el adjetivo correspondiente. «Pesado» reproduce de forma directa כָּבֵד y queda en paralelo con «hizo pesado nuestro yugo».
- source_word: אֲשֶׁר נָתַן עָלֵינוּ
  english_pob_choice: that he put on us
  chosen_spanish: que puso sobre nosotros
  alternatives_spanish:
  - que nos impuso
  - que colocó sobre nosotros
  lexicon: HALOT
  rationale: «Puso sobre nosotros» sigue de cerca la imagen hebrea de poner/cargar algo sobre alguien, sin volverlo demasiado abstracto. «Impuso» aclara la fuerza del acto, pero es más interpretativo.
- source_word: וְנַעַבְדֶךָּ
  english_pob_choice: and we will serve you
  chosen_spanish: y te serviremos
  alternatives_spanish:
  - y seremos tus servidores
  - y te prestaremos servicio
  lexicon: HALOT
  rationale: En este contexto de súplica política, «te serviremos» suena natural y conserva la promesa de sometimiento/obligación. «Servidores» sería más nominal y menos fluido en español.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - su padre
  lexicon: HALOT
  rationale: Referencia directa a Salomón; se conserva la repetición para mantener la fuerza retórica del discurso.
translation_notes:
  revision_awareness: El texto inglés del POB fue revisado de «made our yoke harsh» a «made our yoke heavy» para reflejar con mayor precisión la imagen del yugo; la redacción española sigue esa revisión usando «pesado» y manteniendo la paridad con «su pesado yugo» en la misma cláusula.
  spanish_consistency_notes:
  - Se conserva «yugo» de manera consistente en ambas mitades del versículo para reflejar la metáfora hebrea.
  - Se eligió «servidumbre» para expresar el sentido de labor impuesta; en notas se conserva la alternativa «trabajo» para no borrar la ambigüedad semántica de עֲבֹדָה.
  - El registro es sobrio y bíblico, pero con español contemporáneo natural, evitando calcos innecesarios.
