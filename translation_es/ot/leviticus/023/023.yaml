lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo introduce un nuevo acto de habla. En español, 'habló' conserva el valor de discurso formal y natural en esta fórmula, sin perder la relación con la cláusula siguiente introducida por 'diciendo'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino del Tetragrámaton como transliteración estándar en español: ''Yahvé''. Esto preserva el nombre personal del pacto, en lugar de sustituirlo por un título.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español, 'a' expresa de manera natural la dirección del habla hacia Moisés.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva funciona como fórmula introductoria del discurso. 'Diciendo' preserva la estructura hebrea de manera idiomática y clara en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español, 'Yahvé' comunica el nombre del pacto sin sustituirlo por un título como 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El auditable inglés mantiene una sola nota para el nombre divino y no reporta revisiones textuales; la versión española sigue esa decisión, adaptando la transliteración al uso estándar en español ('Yahvé').
  spanish_consistency_notes:
  - Se preserva la fórmula narrativa breve del hebreo con 'habló ... diciendo'.
  - Se evita el sustitutivo confesional 'SEÑOR' para el Tetragrámaton, conforme a la política POB.
  - La puntuación con coma antes de 'diciendo' refleja el valor introductorio de לֵאמֹר.
