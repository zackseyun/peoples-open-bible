id: JOS.16.7
reference: Joshua 16:7
source:
  edition: WLC
  text: וְ/יָרַ֥ד מִ/יָּנ֖וֹחָ/ה עֲטָר֣וֹת וְ/נַעֲרָ֑תָ/ה וּ/פָגַע֙ בִּֽ/ירִיח֔וֹ וְ/יָצָ֖א הַ/יַּרְדֵּֽן׃
translation:
  text: Then it went down from Janoah to Ataroth and Naarah[a], and reached Jericho[c][b], and ended at the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Naarah; some relate this place name to Naarath in Joshua 16:7–8 traditions.
    reason: alternative_reading
  - marker: b
    text: Or 'reached Jericho' for 'touched Jericho'; the Hebrew verb can denote a boundary line meeting or touching a location.
    reason: lexical_alternative
  - marker: c
    text: Or 'went out to the Jordan'; the Hebrew idiom describes the boundary line's course or endpoint.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד
  chosen: Then it went down
  alternatives:
  - and it descended
  - and it went down
  lexicon: HALOT
  rationale: In boundary descriptions, ירד commonly describes the line descending in elevation or direction. 'Went down' is natural modern English while preserving the geographic movement. 'Then' reflects the sequential waw in a boundary list.
- source_word: מִיָּנוֹחָה
  lemma: מִן
  chosen: from Janoah
  alternatives:
  - from Yanoah
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention. The prefixed preposition מִן is rendered 'from.'
- source_word: עֲטָרוֹת
  chosen: Ataroth
  alternatives:
  - Atarot
  lexicon: HALOT
  rationale: Place name transliterated rather than translated, following the project's policy for names.
- source_word: וְנַעֲרָתָה
  chosen: and Naarah
  alternatives:
  - and Naarath
  lexicon: HALOT
  rationale: Place name transliterated. The form may correspond to a place elsewhere spelled Naarath; here the MT points it as Naarah, so the main text follows the verse's form while preserving the alternative in a footnote.
- source_word: וּפָגַע בִּירִיחוֹ
  chosen: and touched Jericho
  alternatives:
  - and reached Jericho
  - and met at Jericho
  - and struck against Jericho
  lexicon: HALOT
  rationale: פגע in territorial descriptions often means to meet, reach, or touch a boundary point. 'Touched' preserves the spatial sense without overinterpreting whether the line merely approached or directly met the city boundary.
- source_word: וְיָצָא הַיַּרְדֵּן
  chosen: and ended at the Jordan
  alternatives:
  - and went out to the Jordan
  - and came out at the Jordan
  lexicon: HALOT
  rationale: יצא in boundary formulas often indicates the boundary's terminal emergence or endpoint. 'Ended at' communicates the function of the phrase clearly in English, while the Jordan is the destination/terminus of the border line.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the river name with the article preserved. 'River' is implicit and unnecessary in this context.
