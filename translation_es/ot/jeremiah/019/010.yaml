lexical_decisions:
- source_word: וְשָׁבַרְתָּ
  english_pob_choice: Then you shall break
  chosen_spanish: Entonces romperás
  alternatives_spanish:
  - Y romperás
  - Entonces debes romper
  lexicon: HALOT
  rationale: En un mandato profético encadenado, el perfecto con waw funciona como instrucción sucesiva. «Entonces» conserva la secuencia; el futuro simple en español expresa con naturalidad el mandato, sin perder el valor directivo del hebreo.
- source_word: הַבַּקְבֻּק
  english_pob_choice: the flask
  chosen_spanish: la vasija
  alternatives_spanish:
  - la jarra
  - el frasco
  lexicon: HALOT
  rationale: El término designa un recipiente concreto usado en la señal profética. «Vasija» comunica bien la idea de un objeto de barro o recipiente quebrable en español bíblico natural. Se evita «frasco» por su asociación moderna con vidrio y «jarra» por sugerir otra forma más doméstica que la señal no precisa.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: delante de los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal del hebreo, que enfatiza la visibilidad pública del acto. «Delante de los ojos de» preserva la fuerza idiomática sin volverse forzada en español.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino plural y el contexto no amplía explícitamente a un grupo mixto. «Los hombres» conserva la referencia lexical y el tono del pasaje.
- source_word: הַהֹלְכִים אֹתָךְ
  english_pob_choice: who are going with you
  chosen_spanish: que van contigo
  alternatives_spanish:
  - que te acompañan
  - que van junto a ti
  lexicon: HALOT
  rationale: El participio describe a los que acompañan a Jeremías en ese momento. «Que van contigo» refleja el aspecto progresivo del hebreo y suena natural en español.
translation_notes:
  revision_awareness: El texto en inglés POB y el control cruzado coinciden plenamente con el hebreo masorético; no se reportan revisiones ni variantes textuales relevantes para este versículo.
  spanish_consistency_notes:
  - Se conserva el estilo narrativo-profético directo con futuro de mandato, acorde con la estrategia óptima del POB en español.
  - «Vasija» se usa como equivalente funcional de «flask» para un recipiente rompible y de forma no especificada con precisión en el hebreo.
  - La nota mantiene la alternativa semántica de לְעֵינֵי sin duplicar indebidamente el sentido principal en el texto base.
