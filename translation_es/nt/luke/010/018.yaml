translation:
  language: es
  text: 'Y les dijo[a]: «Yo observaba a Satanás caer como relámpago del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo vi a Satanás caer como relámpago del cielo». El imperfecto griego puede traducirse de manera más simple como «vi», aunque «yo observaba» preserva mejor el aspecto continuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - estaba diciendo
  lexicon: BDAG
  rationale: El aoristo narrativo de λέγω se vierte naturalmente con un pasado simple en español. «Dijo» conserva la función de verbo principal sin sobrecargar el estilo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  - Y, pues
  lexicon: BDAG
  rationale: δέ es un conector suave; «Y» mantiene la continuidad narrativa sin añadir una relación discursiva más fuerte que la del griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural funciona como objeto indirecto en español. «Les» es la forma natural y fiel en estilo bíblico contemporáneo.
- source_word: Ἐθεώρουν
  english_pob_choice: I was watching
  chosen_spanish: yo estaba viendo
  alternatives_spanish:
  - yo vi
  - yo estaba observando
  - yo observaba
  lexicon: BDAG
  rationale: El imperfecto de θεωρέω expresa acción en curso. «Yo estaba viendo» preserva el aspecto durativo mejor que un simple «vi», y suena natural en español.
- source_word: τὸν Σατανᾶν
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Σατανᾶς funciona aquí como designación personal/titular. Se conserva el nombre transliterado usual en español, sin sustituirlo por una glosa interpretativa.
- source_word: ὡς ἀστραπὴν
  english_pob_choice: like lightning
  chosen_spanish: como relámpago
  alternatives_spanish:
  - como un relámpago
  - como rayo
  lexicon: BDAG
  rationale: ὡς introduce comparación. «Como relámpago» reproduce la imagen con naturalidad; en español puede omitir el artículo sin perder fuerza poética ni precisión.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: BDAG
  rationale: οὐρανός puede ser «cielo» o «cielos»; aquí, por el contraste con la caída de Satanás, «desde el cielo» comunica bien el sentido cosmológico sin forzar una formulación más teológica de tradición eclesial.
- source_word: πεσόντα
  english_pob_choice: fall
  chosen_spanish: caer
  alternatives_spanish:
  - habiendo caído
  - cayendo
  - caído
  lexicon: BDAG
  rationale: 'El participio aoristo dentro de la construcción con θεωρέω se vierte de forma natural con un infinitivo en español: «caer». Así se mantiene la imagen del evento sin introducir temporalidad adicional.'
theological_decisions:
- issue: Alcance temporal y teológico de la caída de Satanás
  english_pob_reading: Preserve theological tension rather than resolve it; keep the imperfect aspectual force and the imagery without specifying whether this refers to a primordial fall, the disciples' present ministry, or a prophetic vision of defeat.
  chosen_spanish_reading: 'Conservar la tensión teológica: el imperfecto y la imagen se mantienen sin decidir si alude a una caída primordial, al ministerio presente de los discípulos o a una visión profética de derrota.'
  alternative_spanish_readings:
  - Vi a Satanás caer como relámpago desde el cielo
  - Yo estaba viendo a Satanás ya caído del cielo
  rationale: El griego no obliga a una cronología única. La traducción española debe preservar esa apertura interpretativa y no resolver por adelantado una cuestión doctrinal debatida.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: 'Revisión consciente del pasaje: no se introdujeron cambios doctrinales ni se alteró la imagen principal; se optó por una equivalencia óptima que preserve el aspecto imperfectivo de Ἐθεώρουν y la ambigüedad temporal/teológica del dicho.'
  spanish_consistency_notes:
  - Se conserva «Satanás» como transliteración estable en español.
  - Se usa «cielo» para οὐρανός en un contexto de caída desde la esfera celestial, no «cielos».
  - La nota[a] se ancla en «dijo» como corresponde al audit trail inglés, pero el contenido de la alternativa se refiere al verbo de percepción imperfectivo del dicho completo.
