revisions:
- from: Y sucedió que[a], mientras estaba adorando en la casa de Nisroc, su dios, Adramélec y Sarézer, sus hijos, lo hirieron con la espada, y escaparon a la tierra de Ararat[b][c]. Y Esar-hadón, su hijo, reinó en su lugar.
  to: Y sucedió que[a], mientras estaba adorando en la casa de Nisroc, su dios, Adramélec y Sarézer, sus hijos, lo abatieron a espada, y escaparon a la tierra de Ararat[b][c]. Y Esar-hadón, su hijo, reinó en su lugar.
  rationale: Se ajusta el verbo principal a «lo abatieron a espada» para conservar mejor la fuerza contextual de הִכֻּהוּ sin sobrerinterpretarlo como «lo mataron». Se mantienen la estructura, los nombres y la opción «la casa de» por fidelidad al hebreo y al POB auditado. También se simplifica la nota sobre Esar-hadón para reflejar solo la variante gráfica pertinente.
