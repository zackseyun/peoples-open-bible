review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura legal del hebreo: prohibición de evaluar el animal por calidad, prohibición de sustituirlo, intensificación en la cláusula condicional de sustitución, inclusión de ambos animales en el estatus de קדש, y prohibición de redención. Sin embargo, hay ajustes de fidelidad y naturalidad: יְבַקֵּר se refleja mejor como ‘examinará/inspeccionará’ que como ‘hará distinción’, porque el hebreo describe el acto de examinar/seleccionar y la distinción ya está expresada por בֵּין טוֹב לָרַע. Además, ‘santos’ aplicado a animales suena poco natural en español; en este contexto cultual, ‘consagrados’ preserva mejor el sentido de קדש sin perder la fuerza sacral. Finalmente, לֹא יִגָּאֵל se vierte mejor como ‘no será redimido’ que ‘no podrá ser redimido’, para seguir más de cerca el valor legal enunciativo del hebreo y del POB inglés.'
  spanish_quality_summary: 'El texto es claro y legible, pero tiene dos puntos de estilo importantes: ‘hará distinción’ suena algo abstracto y duplica semánticamente la frase siguiente, mientras que ‘serán santos’ resulta chocante en español moderno cuando se refiere a animales. La revisión propuesta mejora fluidez, precisión léxica y registro bíblico-legible sin caer en arcaísmo.'
  glossary_alignment: 'No hay conflicto con los glosarios principales de proyecto. La decisión clave es קדש: aunque el inglés usa ‘holy’, en español aquí conviene ‘consagrados’ por claridad contextual; se documenta como excepción justificada por la legibilidad y el referente no humano. ‘Redimido’ se mantiene conforme al valor cultual de גאל. ‘Sustituto’ también alinea bien con la terminología técnica del pasaje.'
  issues:
  - severity: medium
    issue: יְבַקֵּר traducido como ‘hará distinción’
    rationale: El verbo principal se refiere al examen/inspección del animal en el proceso de selección; la idea de distinguir ya la aporta la expresión ‘entre bueno y malo’. ‘Examinará’ o ‘inspeccionará’ refleja mejor la distribución semántica del hebreo y evita redundancia.
  - severity: medium
    issue: ‘serán santos’ para קֹדֶשׁ
    rationale: Aunque es formalmente posible, en español suena poco idiomático y puede sugerir santidad moral personal. En contexto levítico, ‘quedarán consagrados’ o ‘serán consagrados’ comunica mejor el estado cultual de ambos animales.
  - severity: low
    issue: ‘no podrá ser redimido’ en vez de ‘no será redimido’
    rationale: La formulación con ‘podrá’ introduce matiz modal de posibilidad/permisión; el hebreo legal y el POB inglés presentan una declaración normativa más directa. ‘No será redimido’ es más ceñido y más bíblico-natural.
  - severity: low
    issue: Nota c innecesaria si se revisa el texto a ‘consagrados’
    rationale: La nota teológica intenta resolver una rareza creada por la propia elección ‘santos’. Si se usa ‘consagrados’, la aclaración deja de ser necesaria.
