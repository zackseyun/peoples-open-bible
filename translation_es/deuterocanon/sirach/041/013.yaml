review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo primario y conserva correctamente el contraste entre una vida de días contables y un nombre de duración incontable, con nota que preserva la expansión interpretativa griega. Sin embargo, la colocación de las notas está invertida respecto del rastro POB en inglés: la nota léxica sobre «nombre» debe anclarse en «nombre», y la nota sobre el griego debe anclarse en la primera cláusula como en el audit trail.'
  spanish_quality_summary: 'El español es claro y digno, pero «el buen nombre son días sin número» suena menos natural por discordancia conceptual entre singular y plural. «El bien del buen nombre son días sin número» preserva mejor el paralelismo hebreo con «El bien de la vida…». También conviene ajustar «etiqueta personal» a una formulación más natural en contexto bíblico: «un nombre personal».'
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de mantener «nombre» en vez de «reputación» en el texto principal está bien alineada con la rationale inglesa, siempre que la nota léxica permanezca anclada a «nombre».
  issues:
  - severity: medium
    issue: Anclaje de notas invertido
    rationale: La nota [a] en el borrador está colocada tras «días», pero su contenido corresponde a la alternativa griega para la segunda cláusula. La nota léxica sobre «nombre» aparece como [b] al final de la segunda cláusula, cuando debe anclarse directamente en «nombre» para evitar ambigüedad.
  - severity: medium
    issue: Pérdida parcial del paralelismo de טובת en la segunda cláusula
    rationale: El hebreo repite טובת en ambas mitades. El borrador traduce la segunda como «el buen nombre», lo cual cambia de estructura y desplaza «bueno» desde el sustantivo abstracto «bien» hacia «nombre». «El bien del nombre» preserva mejor la forma; dado el matiz reputacional, «el bien del buen nombre» suena natural y mantiene el valor positivo.
  - severity: low
    issue: Formulación mejorable en la nota léxica
    rationale: «Etiqueta personal» no es la forma más natural o precisa en español bíblico para contraponer el sentido reputacional de «nombre». «Nombre personal» o «designación personal» comunica mejor la idea.
  revised_spanish_text: El bien de la vida es un número limitado de días[b][a], pero el bien del buen nombre es días sin número.
  revised_footnotes:
  - marker: a
    text: 'Griego: «y un buen nombre permanecerá para siempre».'
    reason: alternative_reading
  - marker: b
    text: «Nombre» aquí lleva el sentido de reputación u honor recordado, no solo de un nombre personal.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que coincidan con el audit trail y con la ubicación semántica correcta; se restaura mejor el paralelismo hebreo repitiendo «El bien de / el bien del…»; y se pule la nota léxica para un español más natural y preciso.
