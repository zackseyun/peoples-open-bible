translation:
  language: es
  text: Él me invocará[a], y yo le responderé; yo estoy con él en la angustia; lo rescataré y lo honraré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me llamará» en el sentido de invocarme.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y lo glorificaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְרָאֵנִי
  english_pob_choice: He will call on me
  chosen_spanish: Él me invocará
  alternatives_spanish:
  - Él me llamará
  - Él me llamará a mí
  lexicon: HALOT
  rationale: קרא con objeto personal en contexto de oración o apelación a Dios expresa invocación. «Invocará» conserva ese matiz religioso mejor que un simple «llamará», y mantiene la relación personal del verbo con el destinatario divino.
- source_word: וְאֶעֱנֵהוּ
  english_pob_choice: and I will answer him
  chosen_spanish: y yo le responderé
  alternatives_spanish:
  - y yo le contestaré
  - y yo le daré respuesta
  lexicon: HALOT
  rationale: ענה en este uso significa responder a una petición o clamor. «Responderé» es natural en español y preserva la correspondencia directa entre invocación y respuesta.
- source_word: עִמּוֹ אָנֹכִי
  english_pob_choice: I am with him
  chosen_spanish: yo estaré con él
  alternatives_spanish:
  - yo estoy con él
  - yo mismo estaré con él
  lexicon: HALOT
  rationale: Aunque el hebreo presenta la frase con énfasis, en español la forma futura «estaré con él» expresa bien la promesa dentro de la serie de acciones divinas del verso. Se mantiene «yo» para conservar el énfasis del original.
- source_word: בְצָרָה
  english_pob_choice: in trouble
  chosen_spanish: en la angustia
  alternatives_spanish:
  - en la tribulación
  - en el apuro
  lexicon: HALOT
  rationale: צָרָה abarca angustia, opresión o aflicción. «Angustia» comunica con claridad la presión existencial del término sin suavizarla, y es un equivalente amplio y digno en español bíblico contemporáneo.
- source_word: אֲחַלְּצֵהוּ
  english_pob_choice: I will rescue him
  chosen_spanish: lo rescataré
  alternatives_spanish:
  - lo libraré
  - lo sacaré de allí
  lexicon: HALOT
  rationale: חלץ en piel puede significar sacar, librar o rescatar de peligro. «Rescataré» comunica la intervención activa de forma clara y sigue de cerca la elección inglesa del POB, sin perder fuerza verbal.
- source_word: וַאֲכַבְּדֵהוּ
  english_pob_choice: and honor him
  chosen_spanish: y lo honraré
  alternatives_spanish:
  - y lo glorificaré
  - y lo haré honrado
  lexicon: HALOT
  rationale: כבד en piel significa honrar o glorificar. «Honraré» es la opción más natural en español para una acción divina sobre la persona protegida; evita posibles confusiones doctrinales que «glorificaré» podría suscitar en este contexto.
theological_decisions:
- issue: Alcance de la promesa divina sin añadir condiciones interpretativas
  english_pob_reading: 'A straightforward sequence of divine responses: hearing, presence, rescue, and honor'
  chosen_spanish_reading: 'Una secuencia directa de respuesta divina: invocar, responder, estar presente, rescatar y honrar'
  alternative_spanish_readings:
  - Una versión más interpretativa que explicite condiciones previas de fidelidad
  - Una formulación que atenúe el carácter de promesa
  rationale: El hebreo presenta la respuesta de Dios de manera lineal y sin añadir condiciones explicativas dentro del verso. La redacción española conserva esa secuencia promesa-respuesta sin importar restricciones doctrinales que el texto no formula aquí.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; se mantiene la lectura del inglés POB con ajuste natural al español y atención al hebreo de base. El acuerdo de revisión fue alto, con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto cuando aparezca el nombre divino; aquí el verso usa primera persona divina y no requiere sustitución.
  - Se conservan los pronombres directos e indirectos de manera consistente para reflejar el objeto personal del hebreo.
  - «Rescataré» y «honraré» mantienen el paralelismo verbal del hebreo sin diluir la fuerza semántica.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al texto.
  - La puntuación sigue el ritmo de cláusulas cortas del original y del inglés auditado.
