id: 2CO.4.7
reference: 2 Corinthians 4:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἔχομεν δὲ τὸν θησαυρὸν τοῦτον ἐν ὀστρακίνοις σκεύεσιν, ἵνα ἡ ὑπερβολὴ τῆς δυνάμεως ᾖ τοῦ θεοῦ καὶ μὴ ἐξ ἡμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/004/007.yaml
  text: But we have this treasure in clay jars, so that the surpassing greatness of the power may be of God and not from us.
  footnotes:
  - marker: a
    text: Or "in earthen vessels."
    reason: lexical_alternative
  - marker: b
    text: Or "the extraordinary power" or "the surpassing power."
    reason: lexical_alternative
translation:
  language: ko
  text: 우리는 이 보배를 질그릇에 가지고 있습니다. 이는 능력의 뛰어남이 하나님께로부터 나온 것이지 우리에게서 나온 것이 아님을 드러내려 함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θησαυρὸν
  english_pob_choice: treasure
  chosen_korean: 보배
  alternatives_korean:
  - 보물
  lexicon: BDAG
  rationale: 한국어 「보배」가 정립 어휘이며 문학적 무게가 있다.
- source_word: ὀστρακίνοις σκεύεσιν
  english_pob_choice: clay jars
  chosen_korean: 질그릇
  alternatives_korean:
  - 토기
  lexicon: BDAG
  rationale: ὀστράκινος는 「구운 토기·도자」. 한국어 「질그릇」이 부서지기 쉬운 일상 그릇의 정확한 등가어.
- source_word: ὑπερβολὴ
  english_pob_choice: surpassing greatness
  chosen_korean: 뛰어남
  alternatives_korean:
  - 탁월함
  lexicon: BDAG
  rationale: 바울의 「뛰어남」 어휘. 3:10 ὑπερβάλλω와 동근.
theological_decisions:
- issue: 4:7 ὀστράκινα σκεύη — 보배(복음)와 그릇(사도)의 대비
  chosen_reading: 이 보배를 질그릇에 가지고 있습니다
  alternative_readings:
  - 이 보물을 토기에 담고 있다
  - 이 보배를 깨지기 쉬운 그릇에 담고 있다
  rationale: 바울의 비유는 (a) 보배(복음의 영광)와 (b) 그릇(연약한 사도들)의 극단적 대비를 통해 능력의 출처가 하나님이심을 드러낸다. 한국 전통의 「질그릇」은 (1) 일상적 친숙성 (2) 깨지기 쉬움 (3) 값싼 흙으로 빚어짐 — 세 함의를 모두 담고 있어 본문의 의도를 정확히 보존한다. 「토기」는 의미는 같으나 일상어로서의 비유적 힘이 약하다.
  doctrine_reference: DOCTRINE.md §1 source-primacy; preserve the source's vivid imagery
