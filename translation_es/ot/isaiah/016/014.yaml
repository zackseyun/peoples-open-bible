translation:
  language: es
  text: 'Pero ahora Yahvé ha hablado, diciendo: “Dentro de tres años[a], como los años de un jornalero, la gloria de Moab será abatida[b], con toda su gran multitud; y el remanente será escaso, muy pequeño[c], no poderoso.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en tres años, como los años de un jornalero”, subrayando un plazo fijo y exacto.
    reason: lexical_alternative
  - marker: b
    text: O “la gloria de Moab será deshonrada”, con el sentido de que el prestigio de Moab será humillado.
    reason: lexical_alternative
  - marker: c
    text: O “el remanente será escaso, muy pequeño, no grande/fuerte”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La conjunción adversativa y el adverbio temporal en contexto marcan contraste con el oráculo previo; “Pero ahora” conserva esa fuerza de transición.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: the LORD has spoken
  chosen_spanish: Yahvé ha hablado
  alternatives_spanish:
  - Yahvé habló
  - Yahvé dice
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino directo יְהוָה; conforme al criterio del proyecto, se traduce “Yahvé”. El perfecto profético se vierte de modo que suene a declaración solemne ya emitida y vigente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Es la fórmula introductoria del discurso directo; “diciendo” es natural en español y mantiene el valor de cita.
- source_word: בְּשָׁלֹשׁ שָׁנִים
  english_pob_choice: Within three years
  chosen_spanish: Dentro de tres años
  alternatives_spanish:
  - En tres años
  - Al cabo de tres años
  lexicon: HALOT
  rationale: La preposición ב con la expresión temporal indica el lapso dentro del cual ocurrirá el juicio; “Dentro de” comunica bien ese intervalo delimitado.
- source_word: כִּשְׁנֵי שָׂכִיר
  english_pob_choice: like the years of a hired worker
  chosen_spanish: como los años de un jornalero
  alternatives_spanish:
  - como los años de un trabajador contratado
  - como los años de un asalariado
  lexicon: HALOT
  rationale: שָׂכִיר denota alguien contratado por jornal o salario; “jornalero” preserva la imagen de un término fijo y exacto, sin alargarlo.
- source_word: וְנִקְלָה
  english_pob_choice: will be brought low
  chosen_spanish: será abatida
  alternatives_spanish:
  - será humillada
  - será rebajada
  - será deshonrada
  lexicon: HALOT
  rationale: El niphal de קלה expresa quedar rebajado en honor o estatus. “Abatida” funciona bien con “gloria” y conserva la idea de degradación pública.
- source_word: כְּבוֹד מוֹאָב
  english_pob_choice: the glory of Moab
  chosen_spanish: la gloria de Moab
  alternatives_spanish:
  - el esplendor de Moab
  - el honor de Moab
  lexicon: HALOT
  rationale: כָּבוֹד aquí nombra la honra, prestigio y esplendor nacional de Moab; “gloria” mantiene el peso semántico del hebreo.
- source_word: בְּכֹל הֶהָמוֹן הָרָב
  english_pob_choice: with all its great multitude
  chosen_spanish: con toda su gran multitud
  alternatives_spanish:
  - con toda su gran muchedumbre
  - junto con toda su gran multitud
  - a pesar de toda su gran multitud
  lexicon: HALOT
  rationale: הָמוֹן puede ser multitud, masa o muchedumbre; “gran multitud” conserva la amplitud del término sin precisar más de lo que el hebreo exige.
- source_word: וּשְׁאָר
  english_pob_choice: and the remnant
  chosen_spanish: y el remanente
  alternatives_spanish:
  - y lo que quede
  - y los sobrevivientes
  lexicon: HALOT
  rationale: “Remanente” reproduce el valor de lo que queda tras el juicio y evita importar de inmediato una carga teológica positiva que aquí no es el foco.
- source_word: מְעַט מִזְעָר
  english_pob_choice: will be few, very small
  chosen_spanish: será poco, muy pequeño
  alternatives_spanish:
  - será muy poco, insignificante
  - será escaso, muy escaso
  lexicon: HALOT
  rationale: Los dos términos intensifican la pequeñez; “poco, muy pequeño” conserva la duplicación enfática. Se mantiene la relación con el sustantivo “remanente” sin añadir más que el texto.
- source_word: לֹא כַבִּיר
  english_pob_choice: not mighty
  chosen_spanish: no poderoso
  alternatives_spanish:
  - no fuerte
  - no grande
  - sin fuerza
  lexicon: HALOT
  rationale: כַּבִּיר puede expresar grandeza, poder o fuerza. “No poderoso” recoge la negación de capacidad/fortaleza en un español claro y solemne.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrammaton de forma directa. El proyecto pide “Yahvé” como forma principal en español, evitando el reemplazo litúrgico por “SEÑOR”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de שְׁאָר en contexto de juicio
  english_pob_reading: and the remnant
  chosen_spanish_reading: y el remanente
  alternative_spanish_readings:
  - y lo que queda
  - y los sobrevivientes
  rationale: Aunque “remanente” tiene resonancias teológicas en Isaías, aquí el contexto enfatiza reducción numérica extrema. Se conserva el término por fidelidad léxica, sin cargarlo de un matiz esperanzador que el versículo no desarrolla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail en inglés, que añadió la idea de “few” junto con “very small” para reflejar más plenamente שְׁאָר + מְעַט מִזְעָר. En español se integró esa intensificación con “poco, muy pequeño”, manteniendo el sentido de reducción extrema y la frase final “no poderoso”.
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - “Jornalero” refleja mejor el matiz de plazo fijado que una traducción más genérica como “trabajador contratado”.
  - “Gloria de Moab” y “remanente” preservan la estructura nominal del hebreo sin suavizar el juicio.
  - La puntuación reproduce el discurso directo con comillas españolas y una cadencia apta para publicación.
