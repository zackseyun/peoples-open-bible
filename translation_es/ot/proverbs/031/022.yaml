translation:
  language: es
  text: Hace cubiertas[a] para sí; lino fino y púrpura son su ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'colchas', 'cobertores' o posiblemente 'tapices'. El término hebreo se refiere en sentido amplio a cubiertas textiles y puede denotar telas lujosas del hogar.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְבַדִּים
  english_pob_choice: coverings
  chosen_spanish: cobertores
  alternatives_spanish:
  - cubiertas
  - coberturas
  - cobijas
  - tapices
  lexicon: HALOT
  rationale: El término hebreo es amplio para textiles extendidos o colocados sobre algo, y el POB inglés lo dejó igualmente amplio con ‘coverings’. En español, ‘cobertores’ conserva esa amplitud y mantiene el ámbito doméstico sin restringirlo innecesariamente a un uso de cama o a un tapiz de pared.
- source_word: עָשְׂתָה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - ha hecho
  - hizo
  lexicon: HALOT
  rationale: El qatal en poesía sapiencial puede describir una acción característica o habitual. ‘Hace’ comunica el aspecto habitual en español de manera natural, como en el inglés POB.
- source_word: לָּהּ
  english_pob_choice: for herself
  chosen_spanish: para sí
  alternatives_spanish:
  - para ella
  - para sí misma
  lexicon: HALOT
  rationale: La preposición con sufijo indica beneficio o posesión. ‘Para sí’ expresa bien que lo confecciona para su propio uso y evita la redundancia de ‘para ella’, que en español puede sonar menos reflexiva en este contexto.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad
  lexicon: HALOT
  rationale: ‘Lino fino’ reproduce la cualidad de alta calidad que el hebreo sugiere y mantiene una equivalencia clara con el POB inglés ‘fine linen’.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - tela púrpura
  - tejido púrpura
  lexicon: HALOT
  rationale: El sustantivo designa material teñido de púrpura, asociado con dignidad y riqueza. ‘Púrpura’ es la forma más precisa y sobria en español, y el referente textil queda claro por el paralelismo con ‘su vestido’.
- source_word: לְבוּשָׁהּ
  english_pob_choice: her clothing
  chosen_spanish: su vestido
  alternatives_spanish:
  - su ropa
  - su indumentaria
  lexicon: HALOT
  rationale: Aunque el hebreo es singular colectivo, en español ‘su vestido’ suena más natural y digno en una línea poética corta. No se reduce a una sola prenda en sentido estricto, sino que funciona como término de vestimenta general.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo masorético y coincide sustancialmente con el audit trail inglés POB; no hay revisiones aplicadas ni tensiones textuales adicionales en este versículo.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo nominal del hebreo con dos miembros: ‘cobertores’ / ‘lino fino y púrpura’.'
  - Se evitó ‘SEÑOR’ o cualquier terminología teológica no presente en el versículo.
  - Se mantuvo un registro bíblico contemporáneo y respetuoso, sin arcaísmos innecesarios.
