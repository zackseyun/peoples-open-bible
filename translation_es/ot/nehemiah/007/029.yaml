lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: El hebreo usa el constructo plural de אִישׁ, que en este tipo de lista censal señala a los hombres vinculados con cada localidad. «Los hombres de» conserva ese matiz mejor que una generalización a «la gente» o «los habitantes».
- source_word: קִרְיַת יְעָרִים
  english_pob_choice: Kiriath-jearim
  chosen_spanish: Quiriat-jearim
  alternatives_spanish:
  - Quiriat Jearim
  lexicon: HALOT
  rationale: Se translitera el topónimo. «Quiriat» reproduce mejor la forma hebrea que una grafía más castellana, y el guion mantiene la unidad del nombre compuesto.
- source_word: כְּפִירָה
  english_pob_choice: Kephirah
  chosen_spanish: Quefirá
  alternatives_spanish:
  - Cefirá
  - Quefirá
  lexicon: HALOT
  rationale: Se conserva el nombre propio como transliteración. «Quefirá» refleja de manera directa la consonancia hebrea y evita la forma inglesa «Kephirah», menos natural en español.
- source_word: וּבְאֵרוֹת
  english_pob_choice: and Beeroth
  chosen_spanish: y Beerot
  alternatives_spanish:
  - y Be-erot
  - y Beeroth
  lexicon: HALOT
  rationale: El nombre propio se translitera, y se simplifica la terminación al uso español sin perder la identificación del lugar. Se prefiere «Beerot» como forma más fluida para lector hispano.
- source_word: שְׁבַע מֵאוֹת אַרְבָּעִים וּשְׁלֹשָׁה
  english_pob_choice: '743'
  chosen_spanish: '743'
  alternatives_spanish:
  - setecientos cuarenta y tres
  lexicon: HALOT
  rationale: En una lista censal, el número en cifras comunica con claridad y mantiene exactamente la cantidad hebrea. La decisión inglesa ya optó por numerales por legibilidad.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el pasaje quedó con acuerdo alto y sin ajustes pendientes. La versión española sigue de cerca esa estabilidad textual y la misma decisión de presentar la cifra en numerales.
  spanish_consistency_notes:
  - Se mantiene la transliteración de topónimos como principio consistente con el proyecto.
  - Se conserva el patrón censal con numerales para facilitar lectura y comparación.
  - No se introduce terminología eclesiástica tradicional que altere los nombres propios del hebreo.
