  yaml_path: translation/ot/psalms/032/009.yaml
  text: Do not be like a horse or like a mule[a], without understanding, whose trappings are bit and bridle to restrain them, or else they will not come near you.
  footnotes:
  - marker: a
    text: Or, 'lest it come near you.' The final clause is difficult in Hebrew and may be understood either as the animal refusing to approach unless restrained, or as needing restraint so that it does not rush near.
