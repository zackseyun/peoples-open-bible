revisions:
- from: 'Entonces Labán y Betuel respondieron y dijeron[a]: «La cosa ha salido de Yahvé[b]; no podemos hablarte malo ni bueno».'
  to: 'Entonces Labán y Betuel respondieron y dijeron: «El asunto ha venido de Yahvé; no podemos decirte[a] ni malo ni bueno».'
  rationale: 'Se corrigen expresiones poco naturales o imprecisas: «el asunto» por «la cosa» para reflejar mejor הַדָּבָר; «ha venido de Yahvé» para expresar origen con español más natural; y «decirte ni malo ni bueno» para preservar el merismo hebreo en una forma legible. Se elimina la puntuación de notas innecesarias y se conserva una sola nota útil para explicar el giro idiomático.'
