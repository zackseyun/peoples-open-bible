translation:
  language: es
  text: Un juramento de Yahvé[a] estará entre los dos, de que él no ha metido su mano en la propiedad de su prójimo[b]; y su dueño lo aceptará[c], y no hará restitución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'un juramento de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''ha metido su mano en la propiedad de su prójimo'', un modismo para apropiarse o manipular indebidamente lo ajeno.'
    reason: cultural_note
  - marker: c
    text: 'O: ''su dueño lo recibirá'', es decir, aceptará el juramento como suficiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבֻעַת / oath
  english_pob_choice: an oath
  chosen_spanish: un juramento
  alternatives_spanish:
  - un voto
  - un juramento solemne
  lexicon: HALOT
  rationale: En un contexto legal, שְׁבֻעָה es un juramento formal. 'Juramento' conserva la fuerza jurídica y resulta natural en español; 'voto' no comunica tan bien la función forense.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto pide 'Yahvé' para el Tetragrámaton. Mantiene el nombre divino y evita la sustitución por un título.
- source_word: בֵּין שְׁנֵיהֶם
  english_pob_choice: between the two of them
  chosen_spanish: entre los dos
  alternatives_spanish:
  - entre ambos
  - entre ellos
  lexicon: HALOT
  rationale: El hebreo marca explícitamente dos partes. 'Entre los dos' preserva esa bilateralidad con español natural.
- source_word: אִם לֹא
  english_pob_choice: that ... not
  chosen_spanish: de que no
  alternatives_spanish:
  - que no
  - si no
  lexicon: HALOT
  rationale: En esta fórmula juramentada, אִם לֹא introduce el contenido del juramento. 'De que no' comunica la cláusula jurada sin volverla una condición española engañosa.
- source_word: שָׁלַח יָדוֹ
  english_pob_choice: put his hand to
  chosen_spanish: ha metido su mano
  alternatives_spanish:
  - ha puesto su mano
  - ha extendido su mano
  lexicon: HALOT
  rationale: El modismo hebreo expresa apropiación o manipulación indebida. 'Meter la mano' mantiene la imagen corporal y sugiere intrusión indebida en español.
- source_word: בִּמְלֶאכֶת רֵעֵהוּ
  english_pob_choice: his neighbor’s property
  chosen_spanish: la propiedad de su prójimo
  alternatives_spanish:
  - los bienes de su prójimo
  - lo que pertenece a su prójimo
  lexicon: HALOT
  rationale: En este contexto, מְלָאכָה no es 'trabajo' sino aquello confiado o perteneciente al otro. 'Propiedad' refleja el sentido legal-económico que el POB inglés documenta.
- source_word: בְּעָלָיו
  english_pob_choice: its owner
  chosen_spanish: su dueño
  alternatives_spanish:
  - su propietario
  - el dueño
  lexicon: HALOT
  rationale: '''Dueño'' es claro y natural en español para el poseedor legal. Conserva la referencia al titular del bien sin sobrecargar la frase.'
- source_word: יְשַׁלֵּם
  english_pob_choice: make restitution
  chosen_spanish: hará restitución
  alternatives_spanish:
  - pagará
  - compensará
  lexicon: HALOT
  rationale: '''Hacer restitución'' reproduce bien el valor jurídico de שׁלם en la ley de pacto. Es más preciso que un simple ''pagar''.'
theological_decisions:
- issue: Tratamiento del nombre divino en una fórmula jurídica
  english_pob_reading: an oath of Yahweh
  chosen_spanish_reading: un juramento de Yahvé
  alternative_spanish_readings:
  - un juramento de Yahweh
  - un juramento del SEÑOR
  rationale: Se mantiene el nombre propio divino en español conforme al estándar del proyecto. No se sustituye por una mayúscula litúrgica, porque el texto hebreo nombra directamente a Yahvé.
  doctrine_reference: Éxodo 3:15; uso consistente del Tetragrámaton en la POB
- issue: Valor de אִם לֹא en la fórmula de juramento
  english_pob_reading: that he has not put his hand to
  chosen_spanish_reading: de que no ha metido su mano
  alternative_spanish_readings:
  - que no ha metido su mano
  - si no ha metido su mano
  rationale: La lectura del POB entiende אִם לֹא como contenido del juramento, no como condicional simple. 'De que no' preserva esa función forense en español.
  doctrine_reference: Éxodo 22:11-12; fórmulas jurídicas del AT
- issue: Idiomático de שָׁלַח יָד
  english_pob_reading: put his hand to
  chosen_spanish_reading: ha metido su mano
  alternative_spanish_readings:
  - ha puesto su mano
  - ha extendido su mano
  rationale: No se domestica el modismo hasta perder su imagen, pero tampoco se calca de manera rígida. 'Meter la mano' es una equivalencia idiomática clara para apropiación indebida.
  doctrine_reference: Uso semántico de modismos legales hebreos
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que ajustó la preposición de 'before the LORD' a 'of Yahweh' por mayor precisión léxica. En español se reflejó directamente esa relación posesiva con 'de Yahvé', manteniendo el resto del veredicto legal sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'juramento' sobre 'voto' por el contexto legal.
  - Se mantuvo 'restitución' para el valor forense de יְשַׁלֵּם.
  - '''Prójimo'' traduce רֵעֵהוּ de forma bíblica y comprensible en español.'
  - El pronombre de objeto en 'lo aceptará' queda implícito en el antecedente legal, en línea con la lectura del POB inglés.
