  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé»; הִצִּיל -> «libró»; יָד idiomático -> «mano»; הָעָם -> «el pueblo». No hay conflicto terminológico relevante.'
