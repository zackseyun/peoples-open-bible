translation:
  language: es
  text: Si privé[a] a los pobres de lo que deseaban, o hice desfallecer los ojos de la viuda[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «de su deseo» o, por contexto, «de lo que necesitaban».'
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «hacer desfallecer los ojos de la viuda», expresión de anhelo prolongado, esperanza postergada o decepción persistente.'
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Si es que
  lexicon: HALOT
  rationale: Introduce la cláusula condicional del juramento de Job con una forma natural y directa en español.
- source_word: אֶמְנַע
  english_pob_choice: I have withheld
  chosen_spanish: yo hubiera retenido
  alternatives_spanish:
  - yo retuve
  - yo habría retenido
  - yo hubiera negado
  lexicon: HALOT
  rationale: מנע expresa ‘retener’ o ‘impedir’. En español, el pluscuamperfecto de subjuntivo encaja bien con una condición hipotética de autoimprecación y conserva el valor retrospectivo del juicio moral.
- source_word: מֵחֵפֶץ
  english_pob_choice: from their desire
  chosen_spanish: lo que deseaban
  alternatives_spanish:
  - su deseo
  - lo que necesitaban
  - su anhelo
  lexicon: HALOT
  rationale: חֵפֶץ puede significar deseo, deleite o aquello que se desea. ‘Lo que deseaban’ preserva la amplitud semántica sin cerrar prematuramente a ‘necesidad’, que el contexto puede sugerir pero no obliga.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los débiles
  - los humildes
  lexicon: HALOT
  rationale: דַּלִּים designa a los pobres, débiles o bajos socialmente. ‘Los pobres’ es la equivalencia más natural y acorde al contexto de injusticia social.
- source_word: וְעֵינֵי
  english_pob_choice: or caused the eyes of
  chosen_spanish: o hecho desfallecer los ojos de
  alternatives_spanish:
  - y hecho languidecer los ojos de
  - o causado que los ojos de
  lexicon: HALOT
  rationale: El hebreo une una segunda acusación en paralelo. En español, añadir ‘hecho desfallecer’ ayuda a expresar el verbo implícito y mantiene el valor idiomático de la frase.
- source_word: אַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - una viuda
  lexicon: HALOT
  rationale: El singular funciona de modo genérico/clase, y ‘la viuda’ conserva ese matiz como categoría social representativa.
- source_word: אֲכַלֶּה
  english_pob_choice: to fail
  chosen_spanish: desfallecer
  alternatives_spanish:
  - consumirse
  - marchitarse
  - debilitarse
  lexicon: HALOT
  rationale: כלה en piel puede significar acabar, consumir o hacer languidecer. Con ‘ojos’ como imagen idiomática de espera y esperanza frustrada, ‘desfallecer’ comunica bien el agotamiento emocional sin perder la metáfora.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado provisto para Job 31:16 y se cotejó con la solución auditada en inglés POB. La versión española conserva la estructura condicional y el paralelismo, pero ajusta la segunda cola para que el modismo resulte inteligible en español sin perder su fuerza idiomática. No se registraron revisiones aplicadas en el pase más reciente.
  spanish_consistency_notes:
  - Se mantiene ‘los pobres’ para דַּלִּים, en línea con el valor social del término en este contexto.
  - Se traduce el singular ‘la viuda’ como categoría representativa, no como caso individual aislado.
  - ‘Desfallecer los ojos’ conserva el modismo hebreo mejor que una paráfrasis totalmente explicativa.
  - No se introduce ‘SEÑOR’; el versículo no contiene el nombre divino.
