  yaml_path: translation/ot/1_chronicles/028/020.yaml
  text: And David said to Solomon his son[a], “Be strong and courageous, and do it. Do not fear or be dismayed, for Yahweh God, my God, is with you. He will not fail you or forsake you until all the work for the service of the house of Yahweh is finished.”
