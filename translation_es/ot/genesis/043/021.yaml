translation:
  language: es
  text: 'Y cuando llegamos al lugar de hospedaje y abrimos nuestros costales, he aquí, la plata de cada uno estaba en la boca[a] de su costal: nuestra plata, con su peso completo[b]; y la devolvimos en nuestras manos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la abertura de su costal». El hebreo dice literalmente «en la boca de su costal».
    reason: lexical_alternative
  - marker: b
    text: O «nuestra plata, según su peso»; el hebreo indica que se devolvió la cantidad exacta medida por peso.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמָּלוֹן
  english_pob_choice: the lodging place
  chosen_spanish: la posada
  alternatives_spanish:
  - el lugar donde nos alojamos
  - el albergue
  - el sitio de hospedaje
  lexicon: HALOT
  rationale: מָלוֹן designa un lugar para pasar la noche en un viaje. En español, «posada» comunica bien una parada de alojamiento sin precisar indebidamente una institución moderna; mantiene la naturalidad sin perder el sentido básico de hospedaje.
- source_word: וַנִּפְתְּחָה
  english_pob_choice: opened
  chosen_spanish: abrimos
  alternatives_spanish:
  - se abrieron
  - nosotros abrimos
  lexicon: HALOT
  rationale: La forma narrativa funciona aquí con sentido de primera persona plural. «Abrimos» reproduce la acción directamente y conserva la secuencia narrativa del hebreo.
- source_word: אַמְתְּחֹתֵינוּ / אַמְתַּחְתּוֹ
  english_pob_choice: sacks / his sack
  chosen_spanish: costales / su costal
  alternatives_spanish:
  - sacos / su saco
  - bolsas / su bolsa
  lexicon: HALOT
  rationale: אַמְתַּחַת es un saco o costal de viaje; «costal» es más concreto que «bolsa» y encaja mejor con el contexto narrativo de José. Mantiene además la repetición del término hebreo entre plural y singular.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  - resulta que
  lexicon: HALOT
  rationale: La partícula marca descubrimiento repentino. «He aquí» preserva el golpe narrativo sin suavizarlo en exceso; es más fiel al énfasis del hebreo que una simple conjunción explicativa.
- source_word: כֶסֶף אִישׁ
  english_pob_choice: each man's silver
  chosen_spanish: el dinero de cada uno
  alternatives_spanish:
  - la plata de cada uno
  - el dinero de cada hombre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «plata», en español «dinero» evita una lectura demasiado material o arcaizante donde «plata» podría sonar a moneda específica. El distributivo de אִישׁ se expresa naturalmente con «de cada uno». Se conserva la idea del valor devuelto, sin introducir un tecnicismo innecesario.
- source_word: בְּפִי אַמְתַּחְתּוֹ
  english_pob_choice: in the mouth of his sack
  chosen_spanish: en la boca de su costal
  alternatives_spanish:
  - en la abertura de su costal
  - en la boca de su saco
  lexicon: HALOT
  rationale: El hebreo usa «boca» como imagen idiomática para la abertura del recipiente. «En la boca de su costal» conserva la metáfora fuente, como en el texto auditado en inglés, y evita perder la textura concreta del original.
- source_word: כַּסְפֵּנוּ
  english_pob_choice: our silver
  chosen_spanish: nuestro dinero
  alternatives_spanish:
  - nuestra plata
  - nuestro efectivo
  lexicon: HALOT
  rationale: Se mantiene la referencia al valor devuelto, pero en español «nuestro dinero» es más idiomático y claro para lectores contemporáneos. No se fuerza una equivalencia literal que podría sonar extraña en castellano.
- source_word: בְּמִשְׁקָלוֹ
  english_pob_choice: in its full weight
  chosen_spanish: con su peso completo
  alternatives_spanish:
  - según su peso
  - con el peso exacto
  - al peso completo
  lexicon: HALOT
  rationale: La frase indica que el monto estaba íntegro, medido por peso. «Con su peso completo» comunica la idea de exactitud e integridad del valor devuelto, sin perder el vínculo con la medida original.
- source_word: וַנָּשֶׁב אֹתוֹ
  english_pob_choice: we brought it back
  chosen_spanish: lo devolvimos
  alternatives_spanish:
  - lo trajimos de vuelta
  - lo retornamos
  lexicon: HALOT
  rationale: La secuencia narrativa exige pasado simple en español. «Lo devolvimos» expresa con naturalidad la acción de regresar el dinero a quienes correspondía, manteniendo la fuerza del relato y la coherencia temporal del hebreo.
- source_word: בְּיָדֵנוּ
  english_pob_choice: in our hand
  chosen_spanish: en nuestra mano
  alternatives_spanish:
  - con nosotros
  - en nuestras manos
  lexicon: HALOT
  rationale: El singular hebreo «mano» con sujeto plural es un idiomatismo. «En nuestra mano» lo conserva literalmente; en español suena algo marcado, pero sigue siendo comprensible y respeta la textura del original.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail, que prefirió un pasado narrativo consistente («brought it back» → «we brought it back»). En español, esa consistencia se reproduce con pasado simple («devolvimos»). También se decidió mantener la imaginería de «boca» para la abertura del costal, como permite el hebreo y como señala la nota lexical del inglés POB.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió «costal» para reflejar el saco de viaje del contexto, evitando términos demasiado genéricos.
  - «Dinero» se usa por claridad española, pero la nota conserva la posibilidad de traducir más literalmente «plata» o la idea de peso exacto.
  - La puntuación con guion largo se ajusta a la convención española con dos puntos y coma implícito para separar la explicación narrativa final.
