translation:
  language: es
  text: Entonces el profeta fue y se puso junto al camino, esperando al rey[a], y se disfrazó con una venda sobre sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con ceniza sobre sus ojos». La expresión puede referirse ya sea a ceniza literal o, en este contexto, a un cubrimiento o venda usado como disfraz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So ... went
  chosen_spanish: Así que ... fue
  alternatives_spanish:
  - Entonces ... fue
  - Y ... fue
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Así que» comunica secuencia de forma natural en español sin perder el movimiento de la acción.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Yahvé
  - el mensajero
  lexicon: HALOT
  rationale: El sustantivo definido se vierte de manera directa como «el profeta», sin añadir precisión no explicitada en el hebreo.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso
  alternatives_spanish:
  - se quedó
  - tomó posición
  lexicon: HALOT
  rationale: En este contexto de colocarse en el camino para interceptar al rey, «se puso» expresa mejor la postura intencional que un simple «estuvo de pie».
- source_word: לַמֶּלֶךְ
  english_pob_choice: for the king
  chosen_spanish: para el rey
  alternatives_spanish:
  - ante el rey
  - para recibir al rey
  lexicon: HALOT
  rationale: Conserva la relación de propósito del hebreo y evita sobreinterpretar el matiz espacial; en español «para el rey» mantiene la finalidad de su colocación.
- source_word: עַל הַדָּרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - por el camino
  lexicon: HALOT
  rationale: «Junto al camino» reproduce con naturalidad la escena de espera al borde de la vía, más idiomática que un calco literal.
- source_word: וַיִּתְחַפֵּשׂ
  english_pob_choice: disguised himself
  chosen_spanish: se disfrazó
  alternatives_spanish:
  - se ocultó
  - se hizo irreconocible
  lexicon: HALOT
  rationale: El hitpael de חפשׂ aquí indica ocultarse mediante apariencia distinta; «se disfrazó» es la equivalencia española más directa y clara.
- source_word: בָּאֲפֵר
  english_pob_choice: with a bandage
  chosen_spanish: con una venda
  alternatives_spanish:
  - con ceniza
  - con un paño
  lexicon: HALOT
  rationale: 'Sigue la lectura contextual adoptada por la POB inglesa: aunque el hebreo puede sugerir «ceniza», el sintagma con «sobre sus ojos» favorece un cubrimiento usado como parte del disfraz; «venda» lo expresa en español sin eliminar la tensión léxica.'
- source_word: עַל עֵינָיו
  english_pob_choice: over his eyes
  chosen_spanish: sobre sus ojos
  alternatives_spanish:
  - encima de sus ojos
  - a la altura de sus ojos
  lexicon: HALOT
  rationale: Mantiene el sentido literal de localización del hebreo y funciona de manera natural con «venda» en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y las decisiones lexicográficas del inglés POB, conservando la tensión de בָּאֲפֵר entre «ceniza» y un cubrimiento funcional. No hay revisiones aplicadas en el paquete fuente; se mantiene la lectura contextual ya aprobada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma regular del nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Profeta» se mantiene como término estable para הַנָּבִיא.
  - «Se disfrazó» conserva el valor reflexivo del hitpael.
  - La nota a pie de página marca la alternativa semántica importante entre «ceniza» y «venda/cubrimiento».
