translation:
  language: es
  text: 'Un hombre que se aparta de su lecho dice en su interior[a]: «¿Quién me ve?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita en el contexto: «Un hombre que deja su lecho matrimonial». El griego dice literalmente «un hombre que transgrede/se aparta de su lecho», una expresión eufemística en este contexto de pecado sexual. Lit. «dice en su alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  - Alguien
  lexicon: LSJ
  rationale: El griego es singular y masculino gramaticalmente. En este contexto introduce a un individuo representativo, no a la humanidad en abstracto. Por ello, en español se mantiene «un hombre» en vez de neutralizarlo.
- source_word: παραβαίνων
  english_pob_choice: who transgresses
  chosen_spanish: que transgrede
  alternatives_spanish:
  - que se desvía
  - que traspasa
  - que se extravía
  lexicon: LSJ
  rationale: La forma participial expresa una acción de quebrantar o cruzar un límite moral. «Transgrede» conserva esa fuerza más claramente que «se desvía», sin volver explícito en exceso el sentido sexual que el contexto sugiere.
- source_word: ἀπὸ τῆς κλίνης αὐτοῦ
  english_pob_choice: from his bed
  chosen_spanish: desde su lecho
  alternatives_spanish:
  - de su cama
  - desde su cama
  - de su lecho matrimonial
  lexicon: LSJ
  rationale: κλίνη puede significar cama o lecho; «lecho» suena más digno y conserva mejor el posible matiz eufemístico del contexto. Se evita «lecho matrimonial» en el texto principal porque esa precisión está implícita por el contexto, no formulada en el griego.
- source_word: λέγων ἐν τῇ ψυχῇ αὐτοῦ
  english_pob_choice: says in his soul
  chosen_spanish: dice en su alma
  alternatives_spanish:
  - dice para sí
  - dice en su corazón
  - se dice a sí mismo
  lexicon: LSJ
  rationale: La POB inglesa preserva el lenguaje antropológico de ψυχή con «soul». En español, «alma» reproduce mejor esa textura literal que «para sí» o «a sí mismo», que son más idiomáticos pero menos fieles al término subyacente.
- source_word: Τίς με ὁρᾷ;
  english_pob_choice: Who sees me?
  chosen_spanish: ¿Quién me ve?
  alternatives_spanish:
  - ¿Quién me está viendo?
  - ¿Quién puede verme?
  lexicon: LSJ
  rationale: La pregunta es directa y presente. «¿Quién me ve?» es la forma más natural y breve en español, y mantiene la presuposición de ocultamiento del hablante.
theological_decisions:
- issue: Si explicitar en el texto principal la alusión a inmoralidad sexual o adulterio
  english_pob_reading: Keep the euphemistic wording 'transgressing from his bed' in the main text
  chosen_spanish_reading: Mantener la formulación eufemística «transgrede desde su lecho» en el texto principal
  alternative_spanish_readings:
  - Un hombre que deja su lecho matrimonial
  - Un hombre que comete adulterio
  rationale: El contexto de Sirácida 23 apunta con fuerza al pecado sexual oculto, pero la cláusula griega no nombra explícitamente el adulterio. Para no añadir especificidad que el texto no formula, se conserva el eufemismo y se deja que el contexto haga su trabajo interpretativo.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del expediente inglés, que corrigió «who strays from his bed» a «who transgresses from his bed» para reflejar mejor la fuerza moral de παραβαίνων. En español se preserva esa intensificación con «transgrede», sin convertir la alusión en una formulación más explícita que el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «alma» para ψυχή siguiendo la decisión inglesa de conservar el lenguaje antropológico, aunque «para sí» sería más idiomático.
  - «Lecho» se prefiere a «cama» para sostener el tono literario y la posible alusión eufemística.
  - El orden de la cláusula reproduce la estructura del griego con fluidez natural en español.
