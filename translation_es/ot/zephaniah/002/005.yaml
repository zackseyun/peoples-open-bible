revisions:
- from: ¡Ay de los habitantes de la costa del mar, nación de los cereteos[a]! La palabra de Yahvé está contra ustedes, Canaán, tierra de los filisteos; y yo los destruiré hasta que no quede habitante alguno.
  to: ¡Ay de los habitantes de la costa del mar, nación de los cereteos[a]! La palabra de Yahvé está contra ustedes, Canaán, tierra de los filisteos; y te destruiré hasta que no quede habitante alguno.
  rationale: Se corrige «los destruiré» a «te destruiré» para reflejar fielmente el sufijo hebreo de segunda persona femenina singular, cuyo referente es la tierra/personificación «Canaán, tierra de los filisteos». El resto del borrador es sustancialmente fiel y natural.
