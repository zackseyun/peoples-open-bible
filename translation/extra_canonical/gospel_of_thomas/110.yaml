translation:
  text: Jesus said, “Whoever has found the world[b] and become wealthy[a], let that
    one renounce the world.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘become great/prominent’; the verb ⲣⲣⲙⲙⲁⲟ can denote becoming rich or
      becoming great (Crum s.v. ⲣⲙⲙⲁⲟ).
    reason: lexical_alternative
  - marker: b
    text: Dilley restores the preposition [ⲙ̄] before the first ‘world’ due to a small
      lacuna (NHAM02.51 / lb 4).
    reason: lacuna_or_restoration
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - He said, ‘Jesus’
  lexicon: Crum; Layton (grammar for quotative ϫⲉ)
  rationale: Set formula introducing direct speech; straightforward rendering preserves
    Thomas’s terse cadence.
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ ϭⲓⲛⲉ
  chosen: whoever has found
  alternatives:
  - the one who has found
  - who finds
  lexicon: Layton, Coptic Grammar, on relative ⲡⲉⲧⲉⲣⲉ- with perfect ⲁ-; Crum s.v.
    ϭⲓⲛⲉ
  rationale: Indefinite relative construction used generically; perfect aspect ‘has
    found’ suits ⲁ- + ϭⲓⲛⲉ.
- source_word: ⲛⲡⲕⲟⲥⲙⲟⲥ (1st)
  chosen: the world
  alternatives:
  - the cosmos
  - the ordered world
  lexicon: Crum s.v. ⲕⲟⲥⲙⲟⲥ (loan from Gk. κόσμος)
  rationale: ‘World’ is the most transparent English; keeps the Thomasine starkness
    without interpretive expansion.
- source_word: ⲛ̄ⲧⲉⲛⲧⲟϥ ⲣⲣⲙⲙⲁⲟ
  chosen: and [has] become wealthy
  alternatives:
  - and become great
  - and become prominent
  lexicon: Crum s.v. ⲣⲙⲙⲁⲟ ‘great man; rich man’; verbal ⲣⲣⲙⲙⲁⲟ ‘to be/become rich,
    great’
  rationale: The factitive/verbal form with gemination expresses a resultant state;
    in Thomas’s ethical context ‘wealthy’ is the likely nuance, though ‘great/prominent’
    is possible.
- source_word: ⲙⲁⲣⲉ ⲛⲧⲟϥ
  chosen: let that one
  alternatives:
  - let him
  - let her/him
  lexicon: Layton, Coptic Grammar (jussive/optative ⲙⲁⲣⲉ + pronominal subject)
  rationale: Jussive particle ⲙⲁⲣⲉ gives an injunction; ‘that one’ retains impersonal
    force of the relative clause.
- source_word: ⲁⲣⲛⲁ
  chosen: renounce
  alternatives:
  - deny
  - disown
  lexicon: Crum s.v. ⲁⲣⲛⲁ ‘deny, renounce’
  rationale: ‘Renounce’ best conveys ethical/ascetic rejection rather than merely
    verbal denial, fitting Thomas’s usage.
- source_word: ⲛ/ⲙ ⲡⲕⲟⲥⲙⲟⲥ (2nd)
  chosen: the world
  alternatives:
  - the cosmos
  lexicon: Crum s.v. ⲕⲟⲥⲙⲟⲥ
  rationale: Object preposition varies in witnesses (n- vs m-); does not affect sense.
    Render simply as ‘the world’ again to mirror the repetition.
textual_note: '- A small lacuna at NHAM02.51 / lb 4 affects the object marker before
  the first ⲡⲕⲟⲥⲙⲟⲥ; Dilley’s printed text shows a restored [ⲙ̄], while the normalized
  lemma presents the expected construction ‘ϭⲓⲛⲉ ⲛⲡⲕⲟⲥⲙⲟⲥ’. The preposition is not
  crucial for meaning (‘find the world’).

  - Line-level transcription at lb 5 reads ⲛ̄ϥⲣ̄ⲣⲙ̄ⲙⲁⲟ, whereas Dilley’s normalization
  parses this as ⲛ̄ⲧⲉⲛⲧⲟϥ ⲣⲣⲙⲙⲁⲟ (‘and he has become rich’), making the subject and
  circumstantial linkage explicit. The semantics are the same.

  - Before the second occurrence of ⲡⲕⲟⲥⲙⲟⲥ, the printed line shows ⲙⲡⲕⲟⲥⲙⲟⲥ while
  the normalization has ⲛⲡⲕⲟⲥⲙⲟⲥ. This m/n variation (possibly orthographic/dialectal)
  does not materially affect the translation of ⲁⲣⲛⲁ as ‘renounce [the] world’.'
