translation:
  language: es
  text: Armen ahora mismo los elefantes para mañana, para la destrucción de los judíos[b].[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la aniquilación de los judíos». El sustantivo griego puede denotar destrucción total u obliteración.
    reason: lexical_alternative
  - marker: b
    text: O «los judeanos», aunque en este contexto es más probable el sentido etnorreligioso amplio «los judíos».
    reason: alternative_reading
lexical_decisions:
- source_word: καθόπλισον
  english_pob_choice: arm
  chosen_spanish: armen
  alternatives_spanish:
  - equípen
  - apresten para la batalla
  - armen completamente
  lexicon: LSJ
  rationale: El imperativo pide preparar militarmente a los elefantes para el combate. «Armen» conserva la urgencia y la acción concreta de equiparlos para guerra, con un español natural y directo.
- source_word: ἔτι καὶ νῦν
  english_pob_choice: even now
  chosen_spanish: aun ahora
  alternatives_spanish:
  - todavía ahora
  - incluso ahora
  - ya ahora
  lexicon: LSJ
  rationale: La expresión intensifica la urgencia. «Aun ahora» reproduce bien ese énfasis sin añadir interpretación.
- source_word: εἰς τὴν αὔριον
  english_pob_choice: for tomorrow
  chosen_spanish: para mañana
  alternatives_spanish:
  - para el día de mañana
  - contra mañana
  - para el siguiente día
  lexicon: LSJ
  rationale: La frase idiomática apunta a una preparación con vista al día siguiente. «Para mañana» es la forma más natural en español y mantiene el sentido temporal.
- source_word: ἐπὶ τὸν ... ἀφανισμόν
  english_pob_choice: for the destruction of
  chosen_spanish: para la destrucción de
  alternatives_spanish:
  - para la aniquilación de
  - para la exterminación de
  - hacia la destrucción de
  lexicon: LSJ
  rationale: ἀφανισμός expresa destrucción, ruina o borramiento. «Destrucción» preserva la fuerza del término sin sobreespecificar con un tecnicismo moderno.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: LSJ
  rationale: En 3 Macabeos el término designa al pueblo judío en contexto helenístico-diáspora. «Los judíos» comunica mejor ese valor etnorreligioso que una designación geográfica estrecha.
theological_decisions:
- issue: Alcance de Ἰουδαῖοι en contexto helenístico-diáspora
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: La escena trata de un colectivo etnorreligioso bajo dominio ptolemaico, no de residentes de Judea en sentido geográfico estricto. La decisión es histórica y lexical, no doctrinal, pero afecta la interpretación del pasaje.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; se mantiene la lectura estable con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «elefantes» para τοὺς ἐλέφαντας por correspondencia directa y porque el contexto militar lo exige.
  - Se usa «destrucción» como término principal y se documenta en nota la alternativa «aniquilación» para reflejar la amplitud semántica de ἀφανισμός.
  - Se conserva el orden y la urgencia del griego sin añadir elementos explicativos no presentes en el original.
