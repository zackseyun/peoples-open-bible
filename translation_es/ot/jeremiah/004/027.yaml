base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/027.yaml
  text: 'For thus says Yahweh: The whole land will be a desolation[b][a], yet I will not make a full end.'
  footnotes:
  - marker: a
    text: Or 'the whole earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'land' is preferred because the context centers on Judah under judgment, though the surrounding imagery may evoke wider, cosmic devastation.
    reason: alternative_reading
  - marker: b
    text: Or 'I will not make a complete end' / 'I will not completely destroy it.' The Hebrew preserves a tension between devastating judgment and the LORD's refusal to bring total annihilation.
    reason: lexical_alternative
