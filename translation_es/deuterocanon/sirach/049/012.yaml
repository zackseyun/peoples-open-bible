review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue fielmente ni el hebreo principal ni el rastro auditado del POB inglés. Sustituye la línea principal por la lectura griega ('edificaron una casa... levantaron un pueblo santo para Yahvé') y además omite en el cuerpo la cláusula incierta del altar, aunque la revisión inglesa aplicada la restauró en el texto principal. También introduce un relativo plural ('quienes') que no concuerda con 'Yehoshúa hijo de Jehozadac'.
  spanish_quality_summary: El español es legible, pero la sintaxis está dañada por la discordancia entre sujeto singular y relativo/plural verbal. 'Edificaron una casa' suena menos fiel al hebreo/POB que 'levantaron un templo santo', y la frase completa cambia el sentido del versículo. La nota al pie es útil y clara, pero el texto principal necesita corrección integral.
  glossary_alignment: No hay problemas mayores con 'Yahvé' en la nota, pero el texto principal no preserva la decisión léxica auditada para היכל קדש ('templo santo') ni para ומכונן ('establecido'). El nombre propio transliterado es aceptable. La decisión sobre la cláusula bracketed contradice la revisión inglesa aplicada, que la reincorporó al texto principal.
  issues:
  - severity: high
    issue: El texto principal cambia de base textual y de sentido
    rationale: El borrador traduce la lectura griega 'edificaron una casa... levantaron un pueblo santo para Yahvé' en lugar de la línea hebrea/POB auditada 'levantaron un templo santo, establecido para gloria eterna', y por eso no preserva el sentido escogido por el expediente.
  - severity: high
    issue: Se omite del texto principal la cláusula del altar restaurada en la revisión aplicada
    rationale: El audit trail muestra que la versión inglesa final reincorporó 'who in distress raised up an altar' al texto principal. El español la dejó solo en nota, por lo que ya no corresponde al estado revisado del POB.
  - severity: medium
    issue: 'Discordancia gramatical: ''Yehoshúa... quienes en sus días edificaron'''
    rationale: El antecedente es singular, pero el relativo y los verbos están en plural, lo que vuelve la frase incorrecta y confusa en español.
  - severity: medium
    issue: '''Una casa'' y ''un pueblo santo para Yahvé'' debilitan la claridad en español'
    rationale: Aunque reflejan el griego paralelo, aquí desplazan la decisión principal documentada. Además, 'una casa' no comunica con suficiente claridad el sentido cultual que el expediente fijó como 'templo santo'.
  revised_spanish_text: Así también Yehoshúa hijo de Jehozadac[a], que en la angustia levantó un altar; y levantaron un templo santo, establecido para gloria eterna.
  revised_footnotes:
  - marker: a
    text: 'La edición hebrea también conserva esta cláusula entre corchetes y de lectura incierta: «También Yehoshúa hijo de Jehozadac, que en la angustia levantó un altar». El paralelo griego no contiene esta línea.'
    reason: textual_variant
  revision_rationale: 'Se corrige el español para alinearlo con la versión inglesa auditada y su revisión aplicada: se restaura en el cuerpo la cláusula del altar, se conserva en nota su carácter incierto, se reemplaza la lectura griega divergente por la línea principal hebrea/POB (''templo santo... establecido para gloria eterna'') y se corrige la sintaxis a un relativo singular natural en español. No se requiere adjudicación adicional porque la evidencia y el rastro de revisión ya fijan la lectura a seguir.'
