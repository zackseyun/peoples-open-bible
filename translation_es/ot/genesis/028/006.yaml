translation:
  language: es
  text: 'Entonces Esaú vio que Isaac había bendecido a Jacob y lo había enviado a Padán-aram para tomar de allí una mujer para sí[a], y que, cuando lo bendijo, le mandó, diciendo: «No tomarás mujer de las hijas de Canaán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las mujeres cananeas». El hebreo dice literalmente «de las hijas de Canaán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: Now Esau saw
  chosen_spanish: Entonces Esaú vio
  alternatives_spanish:
  - Y Esaú vio
  - Ahora Esaú vio
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, «Entonces» expresa bien la secuencia discursiva sin forzar un calco.
- source_word: בֵרַךְ
  english_pob_choice: had blessed
  chosen_spanish: había bendecido
  alternatives_spanish:
  - bendijo
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que la bendición es anterior a la percepción de Esaú.
- source_word: וְשִׁלַּח אֹתוֹ
  english_pob_choice: and sent him
  chosen_spanish: lo había enviado
  alternatives_spanish:
  - y lo envió
  lexicon: HALOT
  rationale: Se mantiene la relación temporal con la bendición; «enviar» conserva el valor básico de שׁלח en este contexto narrativo.
- source_word: פַּדֶּנָה אֲרָם
  english_pob_choice: to Paddan-aram
  chosen_spanish: a Padán-aram
  alternatives_spanish:
  - a Paddán-aram
  - a Padán Aram
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma legible en español; el guion ayuda a reconocer el nombre compuesto.
- source_word: לָקַחַת לוֹ מִשָּׁם אִשָּׁה
  english_pob_choice: to take a wife for himself from there
  chosen_spanish: para tomar para sí de allí una mujer
  alternatives_spanish:
  - para tomar allí una esposa para sí
  - para conseguir de allí una mujer
  lexicon: HALOT
  rationale: «Tomar para sí» conserva el matiz reflexivo de לוֹ; «mujer» mantiene la literalidad del hebreo, evitando imponer una equivalencia más interpretativa como «esposa».
- source_word: בְּבָרֲכוֹ אֹתוֹ
  english_pob_choice: when he blessed him
  chosen_spanish: cuando lo bendijo
  alternatives_spanish:
  - al bendecirlo
  - mientras lo bendecía
  lexicon: HALOT
  rationale: El ב circunstancial se expresa naturalmente con «cuando»; mantiene la relación temporal sin añadir desarrollo narrativo.
- source_word: וַיְצַו עָלָיו לֵאמֹר
  english_pob_choice: he commanded him, saying
  chosen_spanish: le mandó, diciendo
  alternatives_spanish:
  - le ordenó, diciendo
  - le dio mandato, diciendo
  lexicon: HALOT
  rationale: «Mandó» reproduce bien el valor de צוה en un contexto familiar y narrativo; el dativo se resuelve con «le».
- source_word: לֹא תִקַּח
  english_pob_choice: You shall not take
  chosen_spanish: No tomarás
  alternatives_spanish:
  - No debes tomar
  - No tomarás para ti
  lexicon: HALOT
  rationale: La prohibición directiva en segunda persona se expresa con futuro de mandato en español, una forma natural y solemne.
- source_word: מִבְּנוֹת כְּנָעַן
  english_pob_choice: from the daughters of Canaan
  chosen_spanish: de entre las hijas de Canaán
  alternatives_spanish:
  - de las hijas de Canaán
  - de las mujeres cananeas
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión hebrea; «de entre» ayuda a reflejar el origen/separación implícitos en el hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo, con la misma secuencia narrativa que refleja el audit trail inglés. Se ajusta la temporalidad con pluscuamperfecto donde el hebreo presenta hechos previos al ver de Esaú, y se mantiene la expresión literal «hijas de Canaán» con nota alternativa, como en la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Padán-aram» como topónimo transliterado, coherente con el tratamiento del nombre propio en el contexto.
  - Se preserva la distinción entre «mujer» y «esposa» para no sobreinterpretar el hebreo más allá de su literalidad.
  - La forma de mandato «No tomarás» es coherente con el registro solemne del pasaje y con el inglés auditado.
