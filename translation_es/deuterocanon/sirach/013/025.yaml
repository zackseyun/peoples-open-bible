translation:
  language: es
  text: La riqueza es buena si no hay iniquidad, y la pobreza es mala según la boca de la arrogancia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego presenta una lectura sustancialmente distinta: «El corazón del hombre cambia su rostro, ya sea para bien o para mal».'
    reason: textual_variant
  - marker: b
    text: La expresión hebrea «según la boca de la arrogancia» es difícil; puede significar «según el juicio de los arrogantes» o «según el habla de los arrogantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - buenas
  - buenas cosas
  - beneficiosas
  lexicon: HALOT
  rationale: El hebreo evalúa el estado mencionado de forma directa; en español, el adjetivo concuerda naturalmente con «riquezas» y conserva la brevedad proverbial sin añadir explicación.
- source_word: הָעֹשֶׂר
  english_pob_choice: wealth
  chosen_spanish: las riquezas
  alternatives_spanish:
  - la riqueza
  - la prosperidad
  - los bienes
  lexicon: HALOT
  rationale: El sustantivo hebreo puede abarcar riqueza/riquezas. «Las riquezas» mantiene el plural proverbial y suena natural en español bíblico contemporáneo.
- source_word: אִם אֵין עָוֹן
  english_pob_choice: if there is no iniquity
  chosen_spanish: si no hay iniquidad
  alternatives_spanish:
  - si no existe pecado
  - si no hay culpa
  - si está libre de maldad
  lexicon: HALOT
  rationale: La condición moral se expresa con claridad y sin perder peso ético. «Iniquidad» preserva el valor de עָוֹן como torcedura moral o culpa, como en la traducción inglesa auditada.
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  - maldad
  lexicon: HALOT
  rationale: «Iniquidad» es el equivalente más estable y solemne para עָוֹן en este contexto sapiencial, y mantiene la densidad moral del hebreo.
- source_word: וְרַע
  english_pob_choice: and poverty is bad
  chosen_spanish: y la pobreza es mala
  alternatives_spanish:
  - y la pobreza es mala
  - y la pobreza es nociva
  - y la pobreza es un mal
  lexicon: HALOT
  rationale: El paralelo con el primer hemistiquio pide un contraste directo y no recargado. «Mala» reproduce el juicio valorativo de manera simple y fiel.
- source_word: הָעוֹנִי
  english_pob_choice: poverty
  chosen_spanish: la pobreza
  alternatives_spanish:
  - la penuria
  - la indigencia
  - la necesidad
  lexicon: HALOT
  rationale: «Pobreza» es la forma más clara e idiomática para el sustantivo hebreo, y funciona bien en el paralelismo sapiencial.
- source_word: עַל פִּי
  english_pob_choice: according to the mouth of
  chosen_spanish: según la boca de
  alternatives_spanish:
  - según el juicio de
  - de acuerdo con la boca de
  - a juicio de
  lexicon: HALOT
  rationale: La expresión hebrea es literal y difícil. Se conserva «boca» para no borrar la tensión lexical; la construcción «según la boca de» refleja la rareza del original y deja abierta la relación entre habla, juicio o caracterización.
- source_word: זָדוֹן
  english_pob_choice: arrogance
  chosen_spanish: la arrogancia
  alternatives_spanish:
  - la insolencia
  - la presunción
  - el orgullo
  lexicon: HALOT
  rationale: «Arrogancia» comunica bien el matiz de soberbia/presunción del término hebreo y encaja con la observación de la traducción inglesa sobre posible juicio o habla de los arrogantes.
theological_decisions:
- issue: Lectura hebrea principal frente al paralelo griego divergente
  english_pob_reading: Translate the extant Hebrew proverb about wealth and poverty as the primary text, while noting the Greek parallel as a substantially different saying.
  chosen_spanish_reading: Traducir como texto principal el proverbio hebreo sobre las riquezas y la pobreza, y señalar en nota que el paralelo griego ofrece un dicho sustancialmente distinto.
  alternative_spanish_readings:
  - «El corazón del hombre cambia su rostro, ya sea para bien o para mal»
  - «El corazón humano altera su semblante, sea para bien o para mal»
  rationale: En Sirácides, cuando el hebreo se conserva, se toma como texto primario. Aquí el griego no es una simple variante estilística, sino una frase diferente; por eso debe quedar en nota y no desplazar el sentido del hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el griego en vista.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente sin cambios sustanciales: se mantiene la primacía del hebreo, la nota del paralelo griego y la conservación de la expresión difícil עַל פִּי como giro literal en español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «iniquidad» para עָוֹן, en continuidad con la opción inglesa auditada.
  - Se mantiene el contraste proverbial breve y simétrico, sin armonizarlo con el paralelo griego en el cuerpo principal.
