- from: Incluso Judá no guardó los mandamientos de Yahvé su Dios[a], sino que anduvo[b] en las estatutas que había hecho Israel.
  to: Incluso Judá no guardó los mandamientos de Yahvé su Dios[a], sino que anduvo[b] en los estatutos que Israel había hecho.
  rationale: Se corrige un error léxico grave («estatutas» → «estatutos») y se ajusta la cláusula final para reflejar con claridad la decisión auditada del POB inglés sobre el sujeto implícito, sin alejarse del hebreo. También se mejora la naturalidad de la nota alternativa.
