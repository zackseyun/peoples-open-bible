  text: But the signal began to rise from the city as a pillar of smoke[a], and Benjamin turned behind him, and behold[c][b], the whole city was going up to the heavens.
  footnotes:
  - marker: a
    text: Or 'the beacon began to rise from the city as a pillar of smoke.' The Hebrew term can denote something lifted up and here likely refers to the prearranged battle signal.
    reason: lexical_alternative
