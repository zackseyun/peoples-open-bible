translation:
  language: es
  text: Un hombre malvado acepta un soborno del regazo[a] para pervertir los caminos de la justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del seno»; la imagen hebrea probablemente sugiere algo tomado de un pliegue oculto de la ropa, lo que implica secreto.
    reason: lexical_alternative
  - marker: b
    text: O «el curso de la justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחַד
  english_pob_choice: bribe
  chosen_spanish: soborno
  alternatives_spanish:
  - cohecho
  - mordida
  - regalo
  lexicon: HALOT
  rationale: El término hebreo designa un pago ilícito para influir una decisión; en español, "soborno" es la equivalencia más clara y natural en un contexto jurídico-sapiencial. "Cohecho" es más técnico, y "regalo" sería demasiado ambiguo o eufemístico.
- source_word: מֵחֵיק
  english_pob_choice: from the bosom
  chosen_spanish: del regazo
  alternatives_spanish:
  - del seno
  - del pliegue de la ropa
  - secretamente
  lexicon: HALOT
  rationale: חֵיק señala literalmente el seno/regazo y puede sugerir el pliegue de la ropa donde algo se oculta. "Del regazo" conserva la imagen concreta en español sin convertirla prematuramente en un adverbio como "secretamente".
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: un hombre malvado
  alternatives_spanish:
  - el malvado
  - un impío
  - un hombre perverso
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo describe a una persona malvada. "Un hombre malvado" mantiene el singular representativo del proverbio y es claro en español moderno.
- source_word: יִקָּח
  english_pob_choice: takes
  chosen_spanish: acepta
  alternatives_spanish:
  - toma
  - recibe
  lexicon: HALOT
  rationale: Aunque el verbo básico es "tomar", en este contexto el sentido es recibir o aceptar un soborno. "Acepta" comunica con precisión la fuerza pragmática del acto en español.
- source_word: לְהַטּוֹת
  english_pob_choice: to pervert
  chosen_spanish: para pervertir
  alternatives_spanish:
  - para desviar
  - para torcer
  - para subvertir
  lexicon: HALOT
  rationale: El infinitivo expresa hacer que algo se desvíe de lo recto. "Pervertir" conserva el valor fuerte del verbo en contexto judicial y corresponde bien al empleo inglés de POB.
- source_word: אָרְחוֹת
  english_pob_choice: the paths
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - las vías
  - los senderos
  lexicon: HALOT
  rationale: El plural hebreo mantiene la imagen de trayectorias o caminos. "Caminos" es la opción más natural y bíblicamente inteligible en español, aunque "sendas" también sería posible.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: de la justicia
  alternatives_spanish:
  - del juicio
  - del derecho
  lexicon: HALOT
  rationale: En este contexto de soborno y corrupción judicial, מִשְׁפָּט se refiere a la justicia como orden recto de decisión. "Justicia" es la mejor equivalencia española aquí.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el juicio de la POB en inglés, conservando la imagen concreta de "hֵיק" mediante "regazo" en nota y manteniendo la pluralidad metafórica de אָרְחוֹת como "caminos". No se detectaron revisiones textuales adicionales en el registro auditado.
  spanish_consistency_notes:
  - Se usa "soborno" para שֹׁחַד por ser el equivalente jurídico más natural y preciso en español.
  - Se evita "SEÑOR" o terminología teológica ajena porque el versículo no contiene un nombre divino.
  - '"Pervertir" conserva el tono fuerte y legal del hebreo sin volver la línea innecesariamente técnica.'
  - La frase "caminos de la justicia" preserva la imagen proverbial y permite la alternativa anotada "sendas" implícitamente sin perder legibilidad.
