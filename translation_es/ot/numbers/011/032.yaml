revisions:
- from: Y el pueblo se levantó todo aquel día y toda aquella noche y todo el día siguiente, y recogieron las codornices. El que recogió menos, recogió diez homer[a]; y las extendieron para sí, todo alrededor del campamento.
  to: Y el pueblo se levantó todo aquel día y toda aquella noche y todo el día siguiente, y recogieron las codornices. El que recogió menos, recogió diez homeres[a]; y las extendieron para ellos mismos por todo alrededor del campamento.
  rationale: Se añadió la alternativa léxica documentada para חֳמָרִים, se mejoró la naturalidad del préstamo de medida en español con 'homeres', y se suavizaron dos giros ('para ellos mismos', 'por todo alrededor del campamento') para mayor legibilidad sin apartarse del hebreo ni de la auditoría inglesa.
