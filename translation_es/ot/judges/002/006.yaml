translation:
  language: es
  text: Entonces Josué despidió al pueblo[a], y los hijos de Israel se fueron, cada hombre a su heredad, para tomar posesión de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: sent ... away
  chosen_spanish: despidió
  alternatives_spanish:
  - envió
  - dejó ir
  lexicon: HALOT
  rationale: En este contexto narrativo, שׁלח implica despedir o dejar partir al pueblo. «Despidió» comunica el matiz de enviar fuera o hacer salir, sin perder naturalidad en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - el pueblo de Israel
  - la asamblea
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el pueblo». Se conserva esa forma breve y directa en la traducción principal, sin expandirla innecesariamente.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene el paralelismo formal del hebreo con «los hijos de Israel». En español, «hijos» es una opción natural y transparente para el giro idiomático.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada varón
  lexicon: HALOT
  rationale: El hebreo distributivo exige una expresión singular distributiva. «Cada uno» fluye mejor en español que una repetición forzada de «cada hombre», aunque se conserva el sentido individual.
- source_word: לְנַחֲלָתוֹ
  english_pob_choice: to his inheritance
  chosen_spanish: a su heredad
  alternatives_spanish:
  - a su herencia
  - a su posesión
  lexicon: HALOT
  rationale: «Heredad» conserva el valor de porción asignada en el marco del reparto territorial de Israel, más que una mera posesión material. Es un equivalente bíblico tradicional y preciso.
- source_word: לָרֶשֶׁת
  english_pob_choice: to take possession of
  chosen_spanish: para tomar posesión de
  alternatives_spanish:
  - para poseer
  - para heredar
  lexicon: HALOT
  rationale: 'La forma infinitiva expresa finalidad: ir a la heredad con el propósito de ocuparla. «Tomar posesión de» conserva la fuerza activa del verbo ירשׁ en este contexto.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: Aquí ארץ apunta a la tierra de la asignación israelita. «La tierra» es el equivalente más fiel y sobrio en español; «tierra» también mantiene la resonancia bíblica del término.
theological_decisions:
- issue: Terminología de la heredad territorial
  english_pob_reading: inheritance
  chosen_spanish_reading: heredad
  alternative_spanish_readings:
  - herencia
  - posesión
  rationale: «Heredad» preserva el peso covenantal y territorial del reparto de la tierra entre las tribus, sin reducirlo a propiedad privada.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #1, #5'
- issue: Designación corporativa de Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma masculina del hebreo para reflejar con fidelidad la redacción original, sin eliminar el referente corporativo del pueblo.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió «When» por «Then» para reflejar mejor la waw narrativa. En español se refleja con «Entonces», manteniendo la secuencia narrativa directa y la relación causal-temporal del hebreo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - «Heredad» y «tomar posesión de» mantienen el campo semántico de reparto de la tierra.
  - La nota [a] está anclada explícitamente en «pueblo[a]» y ofrece la alternativa lexical preservada en el audit trail.
