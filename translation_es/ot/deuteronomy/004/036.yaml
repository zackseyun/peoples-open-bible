revisions:
- from: Desde el cielo te hizo oír su voz para disciplinarte[a]; y sobre la tierra te mostró su gran fuego[b], y oíste sus palabras desde en medio del fuego.
  to: Desde el cielo te hizo oír su voz para disciplinarte[a]; y sobre la tierra te mostró su gran fuego, y oíste sus palabras de en medio del fuego[b].
  rationale: Se corrige la frase final a 'de en medio del fuego' para una correspondencia más natural y fiel con מִתּוֹךְ הָאֵשׁ. Se reubica la nota [b] a la cláusula correcta, ya que la alternativa documentada pertenece a la procedencia 'del fuego' y no a 'su gran fuego'. También se mejora la nota [a] reemplazando 'castigarte' por 'corregirte' para reflejar mejor el rango semántico de יסר en este contexto.
  reviewer_model: gpt-5.4
