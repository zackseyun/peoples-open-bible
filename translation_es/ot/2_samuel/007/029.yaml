base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/029.yaml
  text: And now[a], please be pleased to bless the house of your servant, that it may be before you forever. For you, Lord Yahweh, have spoken[c][b], and by your blessing the house of your servant will be blessed forever.
  footnotes:
  - marker: a
    text: Or 'be pleased' or 'consent' for 'please be willing.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also carry the sense of ''household'' or ''dynasty'' in this context.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Lord GOD' represents the title-name combination 'Adonai YHWH'; elsewhere YHWH is rendered 'the LORD.'
    reason: alternative_reading
