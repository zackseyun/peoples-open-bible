    reason: lexical_alternative
  revision_rationale: Se ajusta la prótasis a una forma condicional más natural en español moderno («llega a redimirlo») sin perder el énfasis documentado del hebreo, que se conserva en la nota. Se mantiene «quinta parte» y «tu valoración» por fidelidad léxica y claridad.
