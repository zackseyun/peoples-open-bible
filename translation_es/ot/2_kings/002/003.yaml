review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los hijos de los profetas en Betel salen hacia Eliseo, le preguntan si sabe que Yahvé quitará a su superior, y Eliseo responde que él también lo sabe y les manda callar. También preserva correctamente Yahvé por יְהוָה y mantiene la nota sobre el modismo מֵעַל רֹאשֶׁךָ.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos puntos mejorables: «a tu señor» no comunica tan bien como «a tu maestro» o «a tu amo» la relación humana de discipulado/superioridad y puede rozar ambigüedad reverencial; además, el cierre de la cita directa usa puntuación poco natural en español bíblico moderno («?».). Conviene ajustar a una forma más natural y precisa.'
  glossary_alignment: 'Alineación buena con la política del proyecto en «Yahvé». No hay conflicto con otros términos doctrinales. La principal desviación léxica es אֲדֹנֶיךָ: el inglés auditado escogió «your master» para evitar confusión con el Señor divino, y en español «tu señor» no sigue tan bien esa rationale; «tu maestro» expresa mejor la relación entre Elías y Eliseo en contexto narrativo.'
  issues:
  - severity: medium
    issue: «a tu señor» para אֲדֹנֶיךָ
    rationale: Aunque posible literalmente, en español eclesial «señor» puede sonar demasiado reverencial o ambiguo frente a Yahvé. La decisión inglesa documentada buscó justamente distinguir un superior humano. «Tu maestro» comunica mejor el vínculo de discipulado sin sugerir divinidad.
  - severity: low
    issue: Puntuación de diálogo «...?».
    rationale: En español lo natural es cerrar la pregunta con ? dentro de las comillas sin añadir punto inmediatamente después. El texto debe leerse con puntuación española estándar.
  - severity: low
    issue: «hacia Eliseo»
    rationale: No es incorrecto, pero «a Eliseo» suena más natural con «salieron ... a Eliseo» en esta escena. Es una mejora estilística menor de legibilidad.
  revised_spanish_text: 'Entonces los hijos de los profetas que estaban en Betel salieron a Eliseo y le dijeron[a]: «¿Sabes que hoy Yahvé está tomando a tu maestro de sobre tu cabeza?» Y él respondió: «Yo también lo sé; callen».'
  revised_footnotes:
  - marker: a
    text: O «de encima de ti»; el hebreo dice literalmente «de sobre tu cabeza», un modismo para la remoción de quien está en autoridad sobre otro.
    reason: lexical_alternative
  revision_rationale: Se revisa «tu señor» a «tu maestro» para seguir mejor el sentido contextual de superior humano/mentor reflejado en la auditoría inglesa y evitar ambigüedad con un título divino. También se normaliza la puntuación española de la pregunta y se mejora ligeramente la fluidez con «salieron a Eliseo».
