translation:
  language: es
  text: 'Entonces Daniel habló con el rey: «¡Oh rey[a], vive para siempre!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más explícita: «¡Que el rey viva para siempre!». El arameo usa una fórmula convencional de bendición real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces mismo
  - En ese momento
  lexicon: HALOT
  rationale: Adverbio arameo de secuencia narrativa. «Entonces» conserva la progresión temporal de manera natural en español y mantiene el enlace discursivo del relato.
- source_word: דָּנִיֶּאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - Daniél
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio transliterado según el uso bíblico estándar en español.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - a
  - ante
  lexicon: HALOT
  rationale: La preposición básica es «con». Aunque en este giro verbal puede expresar a quién se dirige la palabra, «habló con el rey» preserva la forma del hebreo/arameo sin forzar una paraphrase como «habló al rey».
- source_word: מַלְכָּא
  english_pob_choice: the king / O king
  chosen_spanish: el rey / ¡oh rey!
  alternatives_spanish:
  - el rey / rey
  - ¡rey!
  lexicon: HALOT
  rationale: La primera ocurrencia funciona como complemento del verbo («con el rey»). La segunda es vocativa en el saludo regio; en español, «¡Oh rey!» conserva el tono elevado y la fuerza de la fórmula.
- source_word: מַלִּל
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: Perfecto peal de «hablar/decir». «Habló» sigue de cerca el valor verbal y encaja bien con la construcción «con el rey».
- source_word: לְעָלְמִין
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Expresión adverbial de duración continua. «Para siempre» es la equivalencia más natural y digna en español para esta bendición cortesana.
- source_word: חֱיִי
  english_pob_choice: live
  chosen_spanish: vive
  alternatives_spanish:
  - que vivas
  - viva
  lexicon: HALOT
  rationale: 'Imperativo/jussivo en fórmula de bendición. En español, el imperativo breve «vive» reproduce bien el carácter formulaico del saludo: «¡vive para siempre!».'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo/arameo y el análisis del POB en inglés: mantiene el valor secuencial de אֱדַיִן, la relación preposicional de עִם y la fórmula cortesana del saludo real sin añadir elementos ajenos al original.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «rey» y no «monarca» por mayor naturalidad y por correspondencia directa con el término del original.
  - La puntuación con dos puntos introduce el discurso directo y la cita entre comillas angulares sigue la convención editorial en español.
