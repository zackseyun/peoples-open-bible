translation:
  language: es
  text: Pero Yahvé[a], que los hizo subir de la tierra de Egipto con gran poder y con un brazo extendido, a él le temerán[b], a él se postrarán, y a él sacrificarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Más bien, Yahvé... a él le temerán». El inicio hebreo es contrastivo y pone a Yahvé en oposición a otros dioses.'
    reason: alternative_reading
  - marker: b
    text: «Temerán» aquí lleva el sentido de reverencia y lealtad de pacto, no solamente de terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino que
  - Más bien
  - Solo que
  lexicon: HALOT
  rationale: El inicio es contrastivo frente a otros dioses y mandatos negativos previos. 'Pero' conserva la oposición de forma natural en español, sin perder la fuerza del contraste.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: usar el nombre divino en español como ''Yahvé'', preservando el nombre propio del pacto en lugar de sustituirlo por un título.'
- source_word: הֶעֱלָה
  english_pob_choice: brought ... up
  chosen_spanish: los hizo subir
  alternatives_spanish:
  - los sacó
  - los hizo salir
  lexicon: HALOT
  rationale: El hebreo expresa la idea de hacer subir en contexto de éxodo. 'Los hizo subir' mantiene la imagen verbal del original con español claro y fiel.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' conserva la fórmula del éxodo con su resonancia bíblica completa, sin reducirla innecesariamente.'
- source_word: בְּכֹחַ גָּדוֹל
  english_pob_choice: with great power
  chosen_spanish: con gran poder
  alternatives_spanish:
  - con gran fuerza
  - por gran poder
  lexicon: HALOT
  rationale: '''Poder'' corresponde bien al כוח aquí, y ''gran'' transmite la magnitud con naturalidad en español.'
- source_word: וּבִזְרֹעַ נְטוּיָה
  english_pob_choice: and with an outstretched arm
  chosen_spanish: y con brazo extendido
  alternatives_spanish:
  - y con brazo alzado
  - y con el brazo tendido
  lexicon: HALOT
  rationale: La expresión exodítica convencional se conserva de manera idiomática en español como 'brazo extendido', sin perder la imagen corporal de poder salvador.
- source_word: אֹתוֹ תִירָאוּ
  english_pob_choice: you shall fear him
  chosen_spanish: a él temerán
  alternatives_spanish:
  - a él reverenciarán
  - lo temerán
  lexicon: HALOT
  rationale: Se conserva 'temer' para no diluir la tensión teológica del verbo ירא. La forma impersonal/futuro con 'a él' refleja adecuadamente el hebreo con objeto adelantado y el valor normativo.
- source_word: וְלוֹ תִשְׁתַּחֲוּוּ
  english_pob_choice: and to him you shall bow down
  chosen_spanish: ante él se inclinarán
  alternatives_spanish:
  - y a él se postrarán
  - y ante él adorarán
  lexicon: HALOT
  rationale: El verbo implica postración corporal. 'Se inclinarán' conserva la imagen física y funciona bien en español; 'ante él' expresa el valor direccional del hebreo.
- source_word: וְלוֹ תִזְבָּחוּ
  english_pob_choice: and to him you shall sacrifice
  chosen_spanish: y a él ofrecerán sacrificios
  alternatives_spanish:
  - y a él sacrificarán
  - y a él le ofrecerán sacrificios
  lexicon: HALOT
  rationale: '''Ofrecerán sacrificios'' comunica con claridad el sentido cultual de זבח en español. Mantiene el destinatario ''a él'' y evita un calco demasiado duro.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio del pacto. Según la terminología del proyecto, se lo traduce como 'Yahvé' para preservar transparencia y evitar el sustituto tradicional por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de ירא en contexto de alianza y culto
  english_pob_reading: fear him
  chosen_spanish_reading: a él temerán
  alternative_spanish_readings:
  - a él reverenciarán
  - a él adorarán
  rationale: '''Temer'' conserva el peso semántico y la tensión teológica del verbo, sin resolverlo prematuramente en una sola paráfrasis devocional. En este contexto incluye reverencia y lealtad de pacto.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente hebreo y el audit trail en inglés. No se registran revisiones aplicadas en el historial más reciente; el texto se mantiene en alta concordancia con la traducción POB inglesa y con la decisión doctrinal de preservar el nombre divino y la tensión de 'temer'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'temer' en lugar de 'reverenciar' para mantener la fuerza lexical y teológica del hebreo.
  - '''Brazo extendido'' mantiene la fórmula exodítica clásica sin depender de una calca rígida.'
  - 'Se prefiere una sintaxis española fluida, pero sin borrar el paralelismo de los tres mandatos: temer, inclinarse y ofrecer sacrificios.'
