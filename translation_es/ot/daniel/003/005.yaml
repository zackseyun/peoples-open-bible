  language: en
  yaml_path: translation/ot/daniel/003/005.yaml
  text: At the time when you hear the sound of the horn[a], pipe, lyre, trigon, psaltery, bagpipe, and every kind of music[b], you are to fall down and pay homage to the golden image that King Nebuchadnezzar has set up.
  footnotes:
