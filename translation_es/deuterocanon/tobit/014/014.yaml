lexical_decisions:
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó de esta vida
  lexicon: BDAG
  rationale: El aoristo expresa una muerte directa y simple. «Murió» es el equivalente natural y claro en español, sin eufemismo innecesario.
- source_word: ἐτῶν ἑκατὸν ἑπτὰ
  english_pob_choice: at the age of one hundred seven
  chosen_spanish: a la edad de ciento siete años
  alternatives_spanish:
  - siendo de ciento siete años
  - de edad de ciento siete años
  lexicon: LSJ
  rationale: La construcción genitiva indica edad al morir. «A la edad de ciento siete años» conserva el sentido exacto y suena formal y publicable en español.
- source_word: ἐν Ἐκβατάνοις
  english_pob_choice: in Ecbatana
  chosen_spanish: en Ecbátana
  alternatives_spanish:
  - en Ecbatana
  - en la ciudad de Ecbátana
  lexicon: LSJ
  rationale: Se conserva el topónimo tradicional en transliteración adaptada al español, con acento gráfico para facilitar la lectura. La preposición «en» reproduce bien el griego.
- source_word: τῆς Μηδείας
  english_pob_choice: of Media
  chosen_spanish: de Media
  alternatives_spanish:
  - de la Media
  - en Media
  lexicon: LSJ
  rationale: El genitivo especifica cuál Ecbátana se menciona. «De Media» mantiene la relación descriptiva del griego y distingue el lugar con precisión.
theological_decisions:
- issue: Edad al morir sin implicación doctrinal adicional
  english_pob_reading: And he died at the age of one hundred seven in Ecbatana of Media.
  chosen_spanish_reading: Y murió a la edad de ciento siete años en Ecbátana de Media.
  alternative_spanish_readings:
  - Y murió con ciento siete años en Ecbátana de Media.
  - Y falleció a la edad de ciento siete años en Ecbátana de Media.
  rationale: No hay carga doctrinal especial en el versículo; la decisión principal es mantener una formulación sobria y fiel al dato histórico/biográfico del texto.
  doctrine_reference: No aplica; relato histórico en Tobit.
translation_notes:
  revision_awareness: La versión inglesa revisó la frase de edad desde una formulación más literal a «at the age of one hundred seven», y la presente redacción española sigue esa equivalencia natural y formal sin perder el dato exacto del griego. No se introdujeron notas textuales porque el testimonio fuente es estable y la concordancia con la versión inglesa auditada es alta.
  spanish_consistency_notes:
  - Se mantiene un español neutral y digno, apto para lectura eclesial.
  - Se conserva el topónimo «Ecbátana» con acentuación española, evitando una transliteración cruda.
  - «Murió» se usa como equivalente directo, en línea con la fuerza simple del aoristo griego.
  - «De Media» refleja el genitivo descriptivo sin sobreexplicarlo.
