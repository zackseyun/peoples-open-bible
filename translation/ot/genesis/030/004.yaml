id: GEN.30.4
reference: Genesis 30:4
source:
  edition: WLC
  text: וַ/תִּתֶּן ל֛/וֹ אֶת בִּלְהָ֥ה שִׁפְחָתָ֖/הּ לְ/אִשָּׁ֑ה וַ/יָּבֹ֥א אֵלֶ֖י/הָ יַעֲקֹֽב־־׃
translation:
  text: So she gave him Bilhah her servant as a wife[a], and Jacob went in to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her maidservant.' The Hebrew term refers to a female servant of subordinate status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֶּן
  chosen: So she gave
  alternatives:
  - Then she gave
  - And she gave
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English flow while preserving the sequential sense of the Hebrew verb נתן ('give').
- source_word: לּוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The indirect object is naturally incorporated in English as 'gave him,' which is idiomatic and fully represents the Hebrew prepositional pronoun.
- source_word: בִּלְהָה
  chosen: Bilhah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: שִׁפְחָתָהּ
  chosen: her female servant
  alternatives:
  - her maidservant
  - her slave-girl
  - her servant-girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave of lower status. 'Female servant' is clear modern English and preserves the gendered social role without sounding archaic. 'Maidservant' is traditional but dated; 'slave-girl' may over-specify age and sound harsher than the immediate context requires.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This construction commonly indicates taking a woman in marital/concubinal union. 'As a wife' is idiomatic and reflects the Hebrew legal-relational sense without overexplaining.
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: went in to her
  alternatives:
  - had relations with her
  - came to her
  lexicon: HALOT
  rationale: This is the standard Hebrew euphemism for sexual union. 'Went in to her' preserves the source's modest idiom more closely than the more explicit 'had relations with her,' while remaining understandable in English.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal name is transliterated by standard English convention.
