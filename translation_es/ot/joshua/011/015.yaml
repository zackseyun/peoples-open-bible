    text: 'O: "su esclavo". El hebreo עבד puede significar "esclavo" o "siervo"; aquí "siervo" encaja mejor con el uso honorífico y de pacto aplicado a Moisés.'
    reason: lexical_alternative
  revision_rationale: Se corrige עַבְדּוֹ a 'su siervo' para ajustarse al contexto honorífico-covenantal, al rationale auditado del inglés POB y a la legibilidad natural del español bíblico. Se conserva una nota con la alternativa 'su esclavo' para no perder la amplitud léxica del hebreo. El resto del versículo puede mantenerse sin cambios sustanciales.
