    rationale: 'מִבֵּיתוֹ lleva sufijo masculino singular: «de su casa» = la casa de él. En español, «su casa» puede referirse a ella o a él, por lo que se pierde precisión referencial.'
  - severity: low
    issue: Marcación innecesaria de «y ella»
    rationale: El pronombre explícito no es incorrecto, pero en español puede omitirse sin pérdida. Aquí no distorsiona el sentido, así que no requiere cambio obligatorio.
