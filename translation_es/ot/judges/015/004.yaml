- from: Entonces Shimshón fue y atrapó trescientos zorras[a], y tomó teas y las puso cola con cola, y puso una tea entre cada par de colas, en medio.
  to: Entonces Shimshón fue y atrapó trescientos zorros[a], y tomó antorchas y los puso cola con cola, y puso una antorcha entre cada par de colas, en medio.
  rationale: Se corrige un error gramatical grave, se reemplaza «zorras» por «zorros» para reflejar mejor el plural genérico del hebreo y evitar un matiz no deseado en español, y se sustituye «teas» por «antorchas» para mayor claridad en español eclesial amplio. Se mantiene la estructura narrativa y la nota léxica alternativa del inglés POB.
