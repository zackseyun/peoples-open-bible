id: ZEC.7.12
reference: Zechariah 7:12
source:
  edition: WLC
  text: וְ/לִבָּ֞/ם שָׂ֣מוּ שָׁמִ֗יר מִ֠/שְּׁמוֹעַ אֶת הַ/תּוֹרָ֤ה וְ/אֶת הַ/דְּבָרִים֙ אֲשֶׁ֨ר שָׁלַ֜ח יְהוָ֤ה צְבָאוֹת֙ בְּ/רוּח֔/וֹ בְּ/יַ֖ד הַ/נְּבִיאִ֣ים הָ/רִֽאשֹׁנִ֑ים וַֽ/יְהִי֙ קֶ֣צֶף גָּד֔וֹל מֵ/אֵ֖ת יְהוָ֥ה צְבָאֽוֹת־־׃
translation:
  text: They made their hearts like diamond-hard stone[a], so as not to hear the law and the words that Yahweh of Armies had sent by his Spirit through the former prophets[c][b]. So great wrath came from Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שָׁמִיר denotes an extremely hard substance; traditionally 'adamant,' possibly 'flint.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the instruction' for 'the law.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבָּם
  chosen: their hearts
  alternatives:
  - their heart
  lexicon: HALOT
  rationale: 'לֵב/לֵבָב commonly denotes the inner will, mind, or disposition. English idiom prefers the plural with a plural possessor here: ''their hearts.'''
- source_word: שָׂמוּ
  lemma: שׂוּם
  chosen: made
  alternatives:
  - set
  - placed
  lexicon: HALOT
  rationale: שׂוּם literally means 'set/place,' but with לֵב plus predicate noun it idiomatically means 'make/render' their hearts into a certain state.
- source_word: שָׁמִיר
  chosen: diamond-hard stone
  alternatives:
  - adamant
  - flint
  lexicon: HALOT
  rationale: שָׁמִיר can denote a very hard stone, traditionally 'adamant' or sometimes 'flint.' 'Diamond-hard stone' communicates the metaphor of extreme hardness in clear modern English without archaic diction. The exact mineral identification is uncertain, so a footnote preserves alternatives.
- source_word: מִשְּׁמוֹעַ
  lemma: מִן
  chosen: so as not to hear
  alternatives:
  - from hearing
  - lest they hear
  lexicon: HALOT
  rationale: 'The preposition מִן with infinitive here expresses prevention/result: they hardened themselves in order not to listen. English requires the negation to be made explicit from the idiom and context.'
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in prophetic contexts it often refers to God's authoritative revealed law. 'The law' preserves that covenantal force, while 'instruction' is preserved in a footnote as a lexical alternative.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - the messages
  - the matters
  lexicon: HALOT
  rationale: דְּבָרִים here refers to the prophetic words/messages sent by God. 'Words' is the most direct rendering and keeps the parallel with 'the law.'
- source_word: שָׁלַח
  chosen: had sent
  alternatives:
  - sent
  lexicon: HALOT
  rationale: 'A past perfect fits the sequence in English: the words were those which the LORD had previously sent through the prophets.'
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'Armies' is clearer modern English than 'Hosts' while preserving the martial/cosmic sense.
- source_word: בְּרוּחוֹ
  chosen: by his Spirit
  alternatives:
  - by his spirit
  - through his רוח
  lexicon: HALOT
  rationale: רוּחַ with 3ms suffix here most naturally refers to God's Spirit as the means by which he sent the prophetic words. Capitalization reflects this referent in English; the phrase denotes agency/instrumentality.
- source_word: בְּיַד
  chosen: through
  alternatives:
  - by the hand of
  lexicon: HALOT
  rationale: The Hebrew idiom 'by the hand of' means agency/mediation. 'Through' is the natural English equivalent in this context.
- source_word: הַנְּבִיאִים הָרִאשֹׁנִים
  chosen: the former prophets
  alternatives:
  - the earlier prophets
  lexicon: HALOT
  rationale: הָרִאשֹׁנִים here means those earlier in Israel's history, not the canonical division 'Former Prophets.' Lowercase 'former prophets' avoids importing a technical canon label.
- source_word: וַיְהִי קֶצֶף גָּדוֹל
  chosen: Therefore great wrath came
  alternatives:
  - and there was great wrath
  - so great wrath came to pass
  lexicon: HALOT
  rationale: The clause marks the resulting divine response. 'Therefore' makes the consequence relation explicit in natural English, and 'great wrath came' preserves the eventive force of וַיְהִי.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - from with
  lexicon: HALOT
  rationale: 'מֵאֵת marks source/origin: the wrath came from the LORD of Armies.'
