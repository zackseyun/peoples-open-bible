translation:
  language: es
  text: Utai, hijo de Ammihud[a], hijo de Omri, hijo de Imri, hijo de Bani, de los hijos de Pérez, hijo de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo aquí es difícil; el vocablo vertido como «Bani» también puede leerse como «de», lo que daría: «hijo de Imri, de los hijos de Pérez, hijo de Judá». Se conserva en el texto principal la lectura como nombre propio porque encaja mejor con la serie de nombres.'
    reason: textual_variant
