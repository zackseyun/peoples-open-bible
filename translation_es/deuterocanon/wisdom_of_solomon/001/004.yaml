translation:
  language: es
  text: Porque la sabiduría no entrará en un alma que trama el mal[a], ni habitará en un cuerpo esclavizado al pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que maquina el mal’, ‘astuta para el mal’ o, más literalmente, ‘experta en el mal’.
    reason: lexical_alternative
  - marker: b
    text: O ‘sujeto al pecado’, ‘liable al pecado’ o ‘endeudado con el pecado’. El griego describe un cuerpo bajo la reclamación o el dominio del pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακότεχνον
  english_pob_choice: a soul that devises evil
  chosen_spanish: que trama el mal
  alternatives_spanish:
  - astuta para el mal
  - que maquin a el mal
  - maliciosa
  lexicon: LSJ
  rationale: El adjetivo griego apunta a la idea de ‘darle forma’ o ‘idear’ algo malo, no solo a ser engañoso en sentido general. ‘Trama el mal’ conserva la noción de planificación o contrivancia moralmente perversa y suena natural en español.
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  lexicon: LSJ
  rationale: En este contexto sapiencial, ψυχή designa la vida interior o la persona en su interioridad moral. ‘Alma’ mantiene el peso antropológico y literario del texto, y permite conservar el contraste con ‘cuerpo’.
- source_word: εἰσελεύσεται
  english_pob_choice: will enter
  chosen_spanish: entrará
  alternatives_spanish:
  - vendrá a
  - ingresará
  lexicon: LSJ
  rationale: El futuro de εἰσελεύσεται se expresa de forma directa y natural con ‘entrará’, conservando la metáfora espacial de acceso.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría divina
  lexicon: LSJ
  rationale: Es la traducción estándar y suficiente en este libro; no requiere ampliación interpretativa.
- source_word: κατοικήσει
  english_pob_choice: dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - morará
  - se quedará
  - hará su morada
  lexicon: LSJ
  rationale: El verbo implica residencia estable. ‘Habitará’ mantiene la idea de permanencia y un tono bíblico claro en español.
- source_word: σώματι
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo humano
  lexicon: LSJ
  rationale: La contraposición con ‘alma’ exige conservar ‘cuerpo’ de manera directa.
- source_word: κατάχρεῳ
  english_pob_choice: enslaved to
  chosen_spanish: esclavizado al
  alternatives_spanish:
  - sujeto a
  - indebido al
  - obligado al
  lexicon: LSJ
  rationale: La expresión griega puede sugerir estar bajo una reclamación, deuda o dominio. ‘Esclavizado al’ comunica con fuerza el sentido de sujeción real que el POB inglés resolvió con ‘enslaved to’, sin borrar la tensión semántica del original.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecaminosidad
  - culpa
  lexicon: LSJ
  rationale: El genitivo se traduce de forma simple y concreta como ‘pecado’; ‘pecaminosidad’ abstraería demasiado el giro.
theological_decisions:
- issue: Contraste antropológico entre alma y cuerpo
  english_pob_reading: Retain both 'soul' and 'body' as distinct terms without importing a full dualistic anthropology.
  chosen_spanish_reading: Conservar ‘alma’ y ‘cuerpo’ como términos distintos, sin añadir una antropología filosófica ajena al versículo.
  alternative_spanish_readings:
  - traducir ψυχή como ‘persona’
  - traducir ψυχή como ‘ser interior’
  rationale: El griego contrapone explícitamente ψυχή y σώμα; la traducción conserva esa tensión literaria y moral, evitando resolverla o amplificarla doctrinalmente más allá del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Fuerza de κατάχρεῳ ἁμαρτίας
  english_pob_reading: Render as 'enslaved to sin' to express subjection to sin's power.
  chosen_spanish_reading: ‘Esclavizado al pecado’ para expresar una sujeción real al dominio del pecado.
  alternative_spanish_readings:
  - ‘sujeto al pecado’
  - ‘liable al pecado’
  - ‘endeudado con el pecado’
  rationale: La frase no describe solo contacto ocasional con el pecado, sino una relación de dominio o reclamación. ‘Esclavizado al pecado’ reproduce en español la fuerza que el audit trail inglés decidió preservar.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La base inglesa revisó ‘deceitful soul’ a ‘a soul that devises evil’ para acercarse mejor a κακότεχνον; por eso el español evita ‘engañoso’ como solución principal y opta por ‘que trama el mal’. También se mantuvo la fuerza de la segunda cláusula con una expresión de sujeción al pecado comparable a ‘enslaved to sin’.
  spanish_consistency_notes:
  - Se usa ‘sabiduría’ de forma uniforme para σοφία.
  - Se conserva la pareja ‘alma/cuerpo’ para reflejar ψυχή/σῶμα.
  - ‘Pecado’ se mantiene concreto y no se abstrae a ‘pecaminosidad’.
  - El registro es bíblico pero en español moderno claro, evitando calcos innecesarios.
