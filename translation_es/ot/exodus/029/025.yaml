translation:
  language: es
  text: Entonces los tomarás de sus manos y los quemarás en el altar, sobre el holocausto, como aroma agradable delante de Yahvé. Es una ofrenda hecha por fuego[a] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ofrenda de fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: Then you shall take
  chosen_spanish: Entonces tomarás
  alternatives_spanish:
  - Y tomarás
  - Tomarás
  lexicon: HALOT
  rationale: En una instrucción ritual, el prefijo conjuntivo marca secuencia; «Entonces» conserva el orden procedimental sin sonar mecánico en español y mantiene el valor de mandato.
- source_word: מִיָּדָם
  english_pob_choice: from their hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de las manos de ellos
  - de sus propias manos
  lexicon: HALOT
  rationale: La imagen corporal concreta se conserva de manera directa y natural en español.
- source_word: וְהִקְטַרְתָּ
  english_pob_choice: burn
  chosen_spanish: las quemarás
  alternatives_spanish:
  - las harás humear
  - las ofrecerás en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hiphil de קטר describe el acto de hacer humo/quemar sobre el altar; «quemar» es claro en español y preserva la acción ritual.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: en el altar
  alternatives_spanish:
  - sobre el altar
  - sobre el altar, hacia el altar
  lexicon: HALOT
  rationale: El valor direccional queda bien expresado en español con «en el altar» dentro del acto sacrificial; evita una construcción forzada sin perder la ubicación ritual.
- source_word: עַל הָעֹלָה
  english_pob_choice: on top of the burnt offering
  chosen_spanish: sobre el holocausto
  alternatives_spanish:
  - encima del holocausto
  - sobre la ofrenda quemada
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente bíblico tradicional y fiel para עֹלָה. «Sobre» comunica la superposición ritual sin añadir una glosa innecesaria.
- source_word: לְרֵיחַ נִיחוֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como olor agradable
  - como fragancia agradable
  lexicon: HALOT
  rationale: La expresión fija se vierte de forma idiomática; «aroma agradable» preserva la metáfora de aceptación/grato olor sin sobreexplicar.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el principio editorial del proyecto para el Tetragrámaton: «Yahvé». «Delante de» conserva la relación espacial-relacional de לִפְנֵי.'
- source_word: אִשֶּׁה
  english_pob_choice: offering made by fire
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  lexicon: HALOT
  rationale: El término cultual apunta a una ofrenda consumida/activada por fuego; «ofrenda encendida» es una formulación bíblica y clara en español que conserva el rasgo del fuego sin reducirlo a una simple descripción técnica.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: El לamed de dedicación se expresa naturalmente en español con «para», manteniendo la orientación de pertenencia/dedicación del sacrificio.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto para el Nombre divino, transliterándolo como «Yahvé» en el texto principal para no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אִשֶּׁה en el contexto sacrificial
  english_pob_reading: offering made by fire
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  rationale: El hebreo mantiene la referencia cultual al fuego como medio de presentación de la ofrenda. «Ofrenda encendida» preserva esa tensión semántica en español con naturalidad y sin perder el vínculo ritual.
  doctrine_reference: Lexical theology of priestly offerings in Pentateuchal sacrificial language
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión reciente que sustituyó «food offering» por «offering made by fire» para afinar אִשֶּׁה; esta versión española adopta una equivalencia que mantiene explícito el componente de fuego sin seguir la antigua opción inglesa ni introducir una paráfrasis más amplia que el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Holocausto» se usa para עֹלָה, como término bíblico consagrado y preciso.
  - «Aroma agradable» reproduce la fórmula cultual sin añadir intensificación interpretativa.
  - No se usa «SEÑOR» como máscara del nombre divino.
