lexical_decisions:
- source_word: κατευξάμενος
  english_pob_choice: after praying
  chosen_spanish: después de orar
  alternatives_spanish:
  - habiendo orado
  - después de haber orado
  - después de hacer esta oración
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción previa a la principal. En español, «después de orar» comunica bien la secuencia temporal sin sonar recargado, y mantiene el sentido de una oración ya concluida antes del acto final.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  - esta oración
  lexicon: BDAG
  rationale: El demostrativo neutro plural apunta al contenido de lo dicho u orado previamente. «Estas cosas» conserva la referencia amplia del griego; en el flujo español queda natural junto con «orar».
- source_word: ἑαυτὸν ἔρριψεν
  english_pob_choice: he threw himself
  chosen_spanish: se lanzó
  alternatives_spanish:
  - se arrojó
  - se echó
  - se precipitó
  lexicon: BDAG
  rationale: El griego enfatiza un acto deliberado y violento de autoarrojamiento. «Se lanzó» transmite esa fuerza en español actual y evita una literalidad pesada; el reflexivo mantiene que él mismo realizó la acción.
- source_word: κατὰ τῶν τηγάνων
  english_pob_choice: onto the frying pans
  chosen_spanish: sobre las sartenes
  alternatives_spanish:
  - contra las sartenes
  - sobre los panes calientes
  - sobre los instrumentos de tortura
  lexicon: LSJ
  rationale: κατά con genitivo aquí indica movimiento hacia abajo/contra. τηγάνων designa literalmente sartenes o planchas/panes calientes; «sartenes» reproduce el objeto del texto con naturalidad, y el contexto de martirio sostiene la imagen sin necesidad de explicitar más.
- source_word: ἀπέδωκεν
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - entregó su vida
  - expiró
  - cedió su vida
  lexicon: BDAG
  rationale: En este contexto martirial, el verbo funciona de manera elíptica para indicar que entregó la vida. «Murió» es la forma más clara y sobria en español; las alternativas conservan la posibilidad más literal de «devolver/entregar» la vida sin imponer una lectura teológica adicional.
theological_decisions:
- issue: Sentido idiomático de ἀπέδωκεν en un relato de martirio
  english_pob_reading: he died
  chosen_spanish_reading: murió
  alternative_spanish_readings:
  - entregó su vida
  - cedió su vida
  - devolvió su vida
  rationale: El texto griego no menciona explícitamente «vida» o «espíritu», pero el contexto narra su muerte. «Murió» evita añadir contenido no expreso y comunica el desenlace con fidelidad y claridad. Las alternativas quedan como posibilidades más literales, pero menos naturales en español.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se requirieron revisiones sustantivas. La única tensión relevante es ἀπέδωκεν, donde el español mantiene la decisión narrativa «murió» y conserva en nota la alternativa literal ligada al acto de entregar la vida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece en el texto.
  - «Sartenes» refleja la imagen concreta de τηγάνων sin suavizar el martirio ni introducir terminología eclesiástica.
  - El estilo sigue siendo bíblico y digno, con sintaxis natural en español contemporáneo.
