translation:
  language: es
  text: He aquí[a], yo estaré delante de ti allí, sobre la roca en Horeb; y golpearás la roca, y de ella saldrá agua, y el pueblo beberá. Y Moisés hizo así, en presencia de los ancianos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí, estoy delante de ti allí, sobre la roca en Horeb». El participio hebreo puede entenderse en sentido presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, aquí estoy
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una declaración solemne y llama la atención. «He aquí» conserva mejor ese tono deíctico elevado que opciones más planas como «mira».
- source_word: עֹמֵד
  english_pob_choice: I will stand
  chosen_spanish: estaré de pie
  alternatives_spanish:
  - estoy de pie
  - estoy parado
  lexicon: HALOT
  rationale: Aunque es participio en hebreo, en este contexto tiene fuerza inminente/futura. «Estaré de pie» sigue la lectura del POB inglés y encaja con la secuencia de instrucciones y cumplimiento.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en frente de ti
  - ante ti
  lexicon: HALOT
  rationale: En español, «delante de ti» expresa con naturalidad la relación espacial y visual del hebreo sin sonar forzado. «Ante ti» también sería posible, pero menos transparente en el habla actual.
- source_word: הַצּוּר
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  lexicon: HALOT
  rationale: צוּר puede referirse a una masa rocosa o peña. Aquí se eligió «peña» para conservar con más fuerza la imagen de una roca sólida e imponente; «roca» sigue siendo una alternativa válida y más general.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  lexicon: HALOT
  rationale: Como topónimo, «en Horeb» es la forma más natural en español. No se agrega artículo para mantener el nombre propio tal como aparece en el contexto bíblico.
- source_word: וְהִכִּיתָ
  english_pob_choice: you shall strike
  chosen_spanish: golpearás
  alternatives_spanish:
  - herirás
  - darás golpe a
  lexicon: HALOT
  rationale: El verbo tiene fuerza de acción física dirigida contra la peña. «Golpearás» comunica bien esa acción en español sin suavizarla; «herirás» podría sugerir más daño del que el texto requiere.
- source_word: בַצּוּר
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  lexicon: HALOT
  rationale: Se mantiene la misma opción léxica que en la primera ocurrencia para conservar la repetición deliberada del hebreo.
- source_word: וְיָצְאוּ
  english_pob_choice: will come out
  chosen_spanish: saldrán
  alternatives_spanish:
  - saldrá
  - brotarán
  lexicon: HALOT
  rationale: «Saldrán» reproduce de manera directa el movimiento de salir del agua desde la peña. «Brotarán» añadiría una imagen más interpretativa.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de él
  - de la peña
  lexicon: HALOT
  rationale: El sufijo pronominal remite a la peña. En español, «de ella» concuerda con el antecedente femenino adoptado en la traducción («peña»).
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: El plural hebreo puede conservarse naturalmente en español como «aguas», subrayando el flujo abundante del pasaje. «Agua» también sería posible, pero perdería parte de esa resonancia.
- source_word: וְשָׁתָה הָעָם
  english_pob_choice: the people will drink
  chosen_spanish: el pueblo beberá
  alternatives_spanish:
  - y el pueblo beberá
  - el pueblo podrá beber
  lexicon: HALOT
  rationale: «El pueblo» reproduce el sujeto colectivo del hebreo y evita una pluralización innecesaria. El futuro simple mantiene la secuencia narrativa resultativa.
- source_word: וַיַּעַשׂ כֵּן
  english_pob_choice: did so
  chosen_spanish: lo hizo así
  alternatives_spanish:
  - actuó así
  - procedió así
  lexicon: HALOT
  rationale: Es una fórmula de cumplimiento narrativa. «Lo hizo así» es natural en español y conserva el matiz de obediencia a la orden divina.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a la vista de
  - delante de
  lexicon: HALOT
  rationale: La frase subraya testimonio público. «En presencia de» comunica bien que la acción fue realizada ante testigos, sin perder solemnidad.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los líderes de Israel
  - los ancianos israelitas
  lexicon: HALOT
  rationale: «Ancianos» es la equivalencia tradicional y precisa para el cuerpo de liderazgo reconocido dentro de Israel. «Líderes» sería más explicativo pero menos específico.
theological_decisions:
- issue: Lectura del participio divino עֹמֵד
  english_pob_reading: Behold, I will stand before you there on the rock at Horeb
  chosen_spanish_reading: He aquí, yo estaré de pie delante de ti allí, sobre la peña en Horeb
  alternative_spanish_readings:
  - He aquí, yo estoy de pie delante de ti allí, sobre la peña en Horeb
  - He aquí, yo estaré delante de ti allí sobre la peña en Horeb
  rationale: Se conserva la tensión entre la forma participial y el valor discursivo futuro que destacó el POB inglés. El español futuro comunica mejor la acción inminente sin borrar la posibilidad presente que el hebreo permite.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación sintáctica de «sobre la peña en Horeb»
  english_pob_reading: God stands before Moses there on the rock at Horeb
  chosen_spanish_reading: yo estaré de pie delante de ti allí, sobre la peña en Horeb
  alternative_spanish_readings:
  - yo estaré de pie delante de ti allí en la peña de Horeb
  - yo estaré de pie delante de ti allí, junto a la peña en Horeb
  rationale: La puntuación y el orden mantienen la imagen sorprendente de la presencia divina vinculada a la peña, sin suavizarla ni añadir explicaciones. Se evita convertirlo en una simple ubicación lateral o metafórica.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El POB inglés no introdujo revisiones textuales ni cambios de contenido en este versículo; el español sigue de cerca el texto hebreo y refleja la misma nota sobre la posible lectura presente del participio, ajustada a un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene «peña» de forma consistente para traducir צוּר, para preservar la repetición del hebreo.
  - Se usa «ancianos de Israel» como fórmula estable para זִקְנֵי יִשְׂרָאֵל.
  - «He aquí» conserva la solemnidad de הִנְנִי sin recurrir a una máscara litúrgica.
  - Se preserva la distinción entre singular colectivo «el pueblo» y el plural del verbo español donde corresponde.
