translation:
  language: es
  text: Una mujer aceptará a cualquier varón[a], pero una hija es mejor que otra hija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “Una esposa aceptará a cualquier hombre.” γυνή puede significar “mujer” o “esposa”, y ἄρρην puede verterse de modo más general como “hombre”, aunque “varón” es más literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ἄρρενα
  english_pob_choice: any male
  chosen_spanish: a cualquier varón
  alternatives_spanish:
  - a cualquier hombre
  - a todo varón
  - a cualquier macho
  lexicon: LSJ
  rationale: πάντα con ἄρρενα tiene un valor distributivo (“cualquier/every”). En español, “varón” conserva mejor el rasgo de sexo biológico señalado por ἄρρην que “hombre”, el cual puede sonar más amplio o más social. “A cualquier varón” mantiene la literalidad funcional sin introducir connotaciones matrimoniales.
- source_word: ἐπιδέξεται
  english_pob_choice: will accept
  chosen_spanish: aceptará
  alternatives_spanish:
  - recibirá
  - tomará
  lexicon: LSJ
  rationale: El futuro medio expresa recibir/aceptar. “Aceptará” reproduce bien el gesto de acogida o aceptación en un dicho proverbial y suena más natural en español que “recibirá”, que sería más mecánico, o “tomará”, que podría sugerir una acción más fuerte o distinta.
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una mujer casada
  lexicon: LSJ
  rationale: γυνή puede significar “mujer” o “esposa”. Aquí el griego es proverbial y general, sin marcar explícitamente estado civil; “una mujer” preserva esa amplitud y evita cargar el dicho con una lectura marital no explicitada.
- source_word: ἔστιν δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y sin embargo
  - mas
  lexicon: LSJ
  rationale: La partícula adversativa introduce contraste entre los dos miembros del proverbio. “Pero” comunica con claridad ese giro en un español contemporáneo y digno.
- source_word: θυγάτηρ θυγατρός
  english_pob_choice: one daughter ... another
  chosen_spanish: una hija ... otra hija
  alternatives_spanish:
  - una hija de otra hija
  - una hija frente a otra hija
  lexicon: LSJ
  rationale: La repetición griega es idiomática y comparativa. En español, “una hija ... otra hija” expresa de forma natural la comparación implícita sin literalismos engañosos.
- source_word: κρεῖσσον
  english_pob_choice: is better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es superior
  - es preferible
  lexicon: LSJ
  rationale: κρεῖσσον es el comparativo “mejor/superior”. “Es mejor” es la formulación más directa y proverbial en español, y conserva el paralelismo con el original.
theological_decisions:
- issue: Marco social y tono del proverbio
  english_pob_reading: Render the line as a general observation about women and daughters without adding explanatory material about marriage or morality.
  chosen_spanish_reading: Presentar el dicho como una observación proverbial general, sin añadir aclaraciones sobre matrimonio ni suavizar su formulación de género.
  alternative_spanish_readings:
  - Interpretar γυνή como “esposa” y volver explícito el tema matrimonial
  - Parafrasear para atenuar la estructura de género del proverbio
  rationale: El griego es breve, proverbial y socialmente situado. La versión española debe conservar ese mundo de referencia y su franqueza, sin introducir comentarios interpretativos que el texto no exige ni neutralizaciones que borren la tensión documentada.
  doctrine_reference: DOCTRINE.md §§1, 4, 6
