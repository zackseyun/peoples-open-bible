  text: דַּבֵּ֛ר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר בַּ/חֹ֨דֶשׁ הַ/שְּׁבִיעִ֜י בְּ/אֶחָ֣ד לַ/חֹ֗דֶשׁ יִהְיֶ֤ה לָ/כֶם֙ שַׁבָּת֔וֹן זִכְר֥וֹן תְּרוּעָ֖ה מִקְרָא קֹֽדֶשׁ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/023/024.yaml
  text: 'Speak to the sons of Israel[a], saying: In the seventh month, on the first day of the month, there shall be for you a solemn rest, a memorial of trumpet blasts, a holy convocation.'
  footnotes:
  - marker: a
    text: Or 'a memorial of loud blasts'; the Hebrew term can refer more broadly to a raised signal sound, including shouting or horn/trumpet blasts.
    reason: lexical_alternative
