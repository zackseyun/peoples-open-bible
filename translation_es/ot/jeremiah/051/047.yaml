review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: transición inferencial, fórmula profética de inminencia, juicio sobre los פסילים de Babilonia, vergüenza de su tierra y caída de sus muertos en su interior. Sin embargo, no preserva con suficiente precisión dos decisiones léxicas importantes del audit trail: חֲלָלֶיהָ se reduce a «sus muertos» en vez de «sus caídos»/«sus muertos a espada»/«sus muertos en combate», y faltan en español las notas que preservan las alternativas documentadas para «castigaré» y «imágenes talladas».'
  spanish_quality_summary: El texto es legible y de registro bíblico digno. «Por tanto, he aquí, vienen días» suena natural dentro del estilo formal. «Será avergonzada» es aceptable, aunque en español «será avergonzada» con sujeto «tierra» puede sonar algo menos idiomático que «quedará avergonzada» o «será humillada»; aun así, es defendible porque busca reflejar la personificación. La reparación principal es de precisión léxica y de completitud de notas, no de fluidez general.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. «Babilonia» es correcto. La elección «imágenes talladas» alinea bien con פסילים y con la POB inglesa, pero debe conservar también la alternativa «ídolos de Babilonia» en nota. La personificación femenina se mantiene bien con «su tierra» y «de ella».
  issues:
  - severity: medium
    issue: «todos sus muertos» debilita el sentido de חֲלָלֶיהָ
    rationale: El hebreo חללים en este contexto de guerra/jucio se refiere a los muertos caídos, los asesinados o los caídos en combate, no simplemente a los muertos en general. La POB inglesa eligió «all her slain» precisamente para conservar esa precisión.
  - severity: medium
    issue: Faltan las notas correspondientes a las alternativas léxicas de וּפָקַדְתִּי עַל y פְּסִילֵי
    rationale: El audit trail inglés conserva notas para «I will punish» / «I will visit judgment on» y para «the carved images» / «the idols». El borrador español solo conserva la nota sobre «será avergonzada», dejando incompleto el rastro documentado de decisiones significativas.
  - severity: low
    issue: La nota c no añade una alternativa real en su primera opción
    rationale: 'La nota actual dice «O ‘será avergonzada’ o ‘será deshonrada’». Repetir exactamente la lectura del texto como primera alternativa no aporta información. Conviene reflejar las alternativas del inglés: «quedará avergonzada» o «será deshonrada».'
  revised_spanish_text: Por tanto[a], he aquí, vienen días en que castigaré las imágenes talladas[b] de Babilonia, y toda su tierra será avergonzada[c], y todos sus caídos caerán en medio de ella.
  revised_footnotes:
