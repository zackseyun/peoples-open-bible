base_translation:
  language: en
  yaml_path: translation/ot/exodus/024/016.yaml
  text: And the glory of Yahweh settled on Mount Sinai[a], and the cloud covered it for six days[b]. On the seventh day he called to Moses from the midst of the cloud.
  footnotes:
