- issue: Rendering occult terms without softening the prohibition implied by the prophetic context
  chosen_reading: Use direct modern terms ('idols,' 'ghosts,' 'mediums,' 'spiritists') that reflect illicit spiritual consultation
  alternative_readings:
  - Use more traditional but archaic terms such as 'charmers,' 'wizards,' or 'familiar spirits'
  rationale: The verse catalogs Egypt's turn to forbidden spiritual resources in crisis. Modern terms preserve the prophetic force and readability without importing extra doctrinal claims beyond the text.
