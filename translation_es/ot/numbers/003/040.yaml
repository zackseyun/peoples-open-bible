translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Cuenta a todo primogénito varón entre los hijos de Israel, desde un mes de edad en adelante, y toma el número de sus nombres[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «y cuéntalos por nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como forma explícita y transparente, en línea con el POB en inglés. ‘Yahvé’ es la opción estándar del proyecto para YHWH en español, evitando la sustitución por un título enmascarado.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Y habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; ‘Entonces’ reproduce en español el valor secuencial sin cargar de manera artificial el estilo.
- source_word: פְּקֹד
  english_pob_choice: Count
  chosen_spanish: Cuenta
  alternatives_spanish:
  - Haz un censo
  - Numera
  - Muster
  lexicon: HALOT
  rationale: En este contexto censal, el imperativo pide contar. ‘Cuenta’ es natural y mantiene la fuerza directa del mandato sin perder el sentido de censo.
- source_word: כָּל בְּכֹר זָכָר
  english_pob_choice: every firstborn male
  chosen_spanish: todo primogénito varón
  alternatives_spanish:
  - cada primogénito varón
  - todo varón primogénito
  - todo hijo primogénito varón
  lexicon: HALOT
  rationale: ‘Primogénito’ refleja בְּכֹר y ‘varón’ refleja זָכָר. ‘Todo’ conserva el alcance distributivo de כָּל sin forzar una construcción demasiado pesada.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - de los hijos de Israel
  - entre los descendientes de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma literal ‘hijos de Israel’ para preservar la correspondencia con el hebreo. ‘Entre’ expresa bien el ámbito del conteo dentro del pueblo.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: desde un mes de edad y hacia arriba
  alternatives_spanish:
  - desde un mes de edad y más
  - a partir de un mes y en adelante
  - desde que tenga un mes y más
  lexicon: HALOT
  rationale: Se conserva el umbral de edad literal y comprensible en español. ‘De edad’ aclara que el hebreo establece una condición de antigüedad mínima, no una fecha exacta.
- source_word: וְשָׂא אֵת מִסְפַּר שְׁמֹתָם
  english_pob_choice: and take the number of their names
  chosen_spanish: y toma el número de sus nombres
  alternatives_spanish:
  - y cuenta por nombre
  - y toma la cuenta de sus nombres
  - y registra el número de sus nombres
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de ‘tomar’ el número, que en español suena algo más literal pero todavía inteligible. Mantiene la tensión idiomática del hebreo entre contar y enumerar por nombre, sin reducirlo de inmediato a una paráfrasis.
theological_decisions:
- issue: Nombre divino frente a título reverencial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio YHWH; por eso se preserva como ‘Yahvé’ y no se lo reemplaza por un título. Esto mantiene la transparencia del texto base y la coherencia del proyecto.
  doctrine_reference: Éxodo 3:15; Deuteronomio 12:5
- issue: 'Alcance del conteo: censo general o conteo nominal'
  english_pob_reading: Count ... and take the number of their names
  chosen_spanish_reading: Cuenta ... y toma el número de sus nombres
  alternative_spanish_readings:
  - haz un censo ... y registra sus nombres
  - cuéntalos por nombre
  rationale: El hebreo combina el acto de contar con la referencia a los nombres; por eso la traducción conserva ambas expresiones. No se aplana la frase solo a ‘censo’, porque el POB en inglés también retiene la rareza idiomática.
  doctrine_reference: Números 1:2; Números 3:15-39
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del texto hebreo y del audit trail en inglés, manteniendo la secuencia narrativa, el nombre divino explícito, el límite de edad y la rareza idiomática de 'tomar el número de sus nombres'. No hubo revisiones pendientes en el contexto inglés auditado.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ consistentemente para יהוה.
  - ‘Hijos de Israel’ conserva la correspondencia literal con el hebreo.
  - La fórmula ‘desde un mes de edad y hacia arriba’ sigue el umbral etario del original sin modernizarlo en exceso.
  - Se mantiene ‘nombres’ en plural para reflejar la enumeración nominal y no solo una simple suma numérica.
