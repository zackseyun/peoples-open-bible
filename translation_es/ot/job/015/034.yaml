translation:
  language: es
  text: Porque la compañía de los impíos es estéril[a], y el fuego consume las tiendas del soborno[aquí-no][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hipócritas». En Job, חָנֵף puede significar «hipócrita», pero con frecuencia expresa una idea más amplia de impiedad o irreverencia.
    reason: lexical_alternative
  - marker: b
    text: Lit. «las tiendas del soborno» o «las tiendas de un soborno». La expresión alude a moradas marcadas por ganancia corrupta.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Aquí introduce la razón o fundamento de la afirmación previa. «Porque» conserva la conexión explicativa de manera natural en español.
- source_word: עֲדַת
  english_pob_choice: the company of
  chosen_spanish: la compañía de
  alternatives_spanish:
  - la asamblea de
  - la congregación de
  - el grupo de
  lexicon: HALOT
  rationale: El sustantivo señala un conjunto reunido. «Compañía» refleja el sentido colectivo sin cargar el verso con matiz eclesial.
- source_word: חָנֵף
  english_pob_choice: the godless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los hipócritas
  - los profanos
  - los irreverentes
  lexicon: HALOT
  rationale: En Job, חָנֵף suele ir más allá de la mera hipocresía social y apunta a impiedad o irreverencia. El plural en español expresa el valor colectivo de עֲדַת.
- source_word: גַּלְמוּד
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - desolada
  - sin fruto
  - barrena
  lexicon: HALOT
  rationale: El adjetivo comunica falta de fecundidad, vacío o improductividad. «Estéril» es natural en español y preserva la imagen de carencia de fruto.
- source_word: וְאֵשׁ
  english_pob_choice: and fire
  chosen_spanish: y el fuego
  alternatives_spanish:
  - y fuego
  - y una llama
  lexicon: HALOT
  rationale: La imagen hebrea es concreta; en español el artículo definido mejora la fluidez sin alterar el referente.
- source_word: אָכְלָה
  english_pob_choice: consumes
  chosen_spanish: consume
  alternatives_spanish:
  - ha consumido
  - devora
  - consumió
  lexicon: HALOT
  rationale: El perfecto hebreo funciona con valor gnómico o proverbial en este contexto sapiencial. El presente español transmite mejor la verdad general.
- source_word: אָהֳלֵי
  english_pob_choice: the tents of
  chosen_spanish: las tiendas de
  alternatives_spanish:
  - las carpas de
  - las moradas de
  - los hogares de
  lexicon: HALOT
  rationale: «Tiendas» conserva la imagen concreta de la tienda/campamento del hebreo y coincide con la elección auditada del inglés.
- source_word: שֹׁחַד
  english_pob_choice: bribery
  chosen_spanish: el soborno
  alternatives_spanish:
  - la coima
  - el cohecho
  - la bribonería
  lexicon: HALOT
  rationale: El término nombra el soborno o la práctica corrupta asociada a él. «Soborno» suena natural en español y mantiene la idea de ganancia ilícita sin introducir un agente no explícito.
theological_decisions:
- issue: Lectura de חָנֵף como impío/hypocrita
  english_pob_reading: the godless, with note allowing 'hypocrite' as an alternative
  chosen_spanish_reading: los impíos
  alternative_spanish_readings:
  - los hipócritas
  - los irreligiosos
  rationale: Job usa חָנֵף con frecuencia para describir una condición moral-religiosa de impiedad, no solo insinceridad. Mantener «impíos» conserva esa amplitud; la nota preserva la alternativa «hipócritas» donde el español podría sugerir otra tensión léxica.
  doctrine_reference: Sabiduría bíblica sobre la impiedad y el juicio moral
- issue: Imagen de las 'tiendas del soborno'
  english_pob_reading: Literal 'the tents of bribery' or 'the tents of a bribe'; the phrase refers to dwellings marked by corrupt gain.
  chosen_spanish_reading: las tiendas del soborno
  alternative_spanish_readings:
  - las tiendas del cohecho
  - las tiendas del soborno o de la ganancia corrupta
  rationale: La construcción hebrea es elíptica y apunta a casas o moradas caracterizadas por soborno. «Tiendas del soborno» mantiene la imagen y la carga ética sin expandir indebidamente el texto.
  doctrine_reference: Condena bíblica del soborno y la corrupción
- issue: Valor gnómico del verbo de consumición
  english_pob_reading: consumes as a general truth in wisdom literature
  chosen_spanish_reading: consume
  alternative_spanish_readings:
  - ha consumido
  - consumirá
  - devora
  rationale: El perfecto hebreo en contexto sapiencial expresa una verdad proverbial general. El presente español comunica mejor esa fuerza gnómica que un pasado puntual.
  doctrine_reference: Uso proverbial en literatura sapiencial
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente indicado como sin cambios. La versión española busca mantener la equivalencia óptima del inglés auditado, pero reancla las decisiones léxicas directamente en el hebreo: עֲדַת como grupo reunido, חָנֵף como impiedad, גַּלְמוּד como esterilidad, y שֹׁחַד como soborno/corrupción. Se conservó la imagen concreta de ''tiendas'' y el valor proverbial del verbo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el contexto lo requieren; este versículo no contiene el nombre divino.
  - «Impíos» se eligió aquí por el sentido colectivo y moral de חָנֵף en Job; la nota deja abierta «hipócritas».
  - «Tiendas» se conservó por fidelidad imagística; no se suavizó a «hogares» o «moradas».
  - El orden del verso sigue de cerca la sintaxis hebrea sin forzar un calco en español.
