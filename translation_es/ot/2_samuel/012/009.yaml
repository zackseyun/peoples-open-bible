base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/012/009.yaml
  text: Why have you despised the word of Yahweh[a], to do what is evil in his sight? You struck down Uriah the Hittite with the sword, and took his wife for yourself as a wife[c][b], and killed him with the sword of the Ammonites.
  footnotes:
  - marker: a
    text: Or 'have you treated the word of the LORD with contempt?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'took his wife for yourself as a wife'; the wording underscores David's personal appropriation of Uriah's wife.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'with the sword of the sons of Ammon,' indicating that David caused Uriah's death through Ammonite agency.
    reason: cultural_note
