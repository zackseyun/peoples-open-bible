translation:
  language: es
  text: nardo[a] y azafrán, cálamo y canela, con todos los árboles de incienso[b][c], mirra y áloes[d], con todas las especias más selectas[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espicanardo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo, literalmente: «con todos los árboles de incienso».'
    reason: lexical_alternative
  - marker: c
    text: Aquí la imagen es arbórea; no se reduce simplemente a la resina de incienso.
    reason: source_note
  - marker: d
    text: «Áloes» aquí probablemente se refiere a una madera aromática, no al aloe vera.
    reason: cultural_note
  - marker: e
    text: 'Hebreo, literalmente: «con todas las principales especias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵרְדְּ
  english_pob_choice: nard
  chosen_spanish: nardo
  alternatives_spanish:
  - espicanardo
  lexicon: HALOT
  rationale: נֵרְדְּ designa un aromático conocido en la tradición bíblica. 'Nardo' es el equivalente español más natural y transparente; 'espicanardo' conserva la opción tradicional, pero suena más marcado y menos directo.
- source_word: כַרְכֹּם
  english_pob_choice: saffron
  chosen_spanish: azafrán
  alternatives_spanish:
  - crocus
  lexicon: HALOT
  rationale: El término apunta al condimento aromático y costoso. 'Azafrán' es el equivalente normal y claro en español.
- source_word: קָנֶה
  english_pob_choice: calamus
  chosen_spanish: cálamo
  alternatives_spanish:
  - caña aromática
  - junco aromático
  lexicon: HALOT
  rationale: En una lista de perfumes, el sentido aromático es el que gobierna. 'Cálamo' mantiene el valor léxico de una planta/aroma específico sin reducirlo a una caña genérica.
- source_word: קִנָּמוֹן
  english_pob_choice: cinnamon
  chosen_spanish: canela
  alternatives_spanish:
  - cinamomo
  lexicon: HALOT
  rationale: El spice list requiere un equivalente natural y reconocible. 'Canela' comunica el término de forma inmediata en español.
- source_word: עִם כָּל עֲצֵי לְבוֹנָה
  english_pob_choice: with all the trees of frankincense
  chosen_spanish: con todos los árboles de incienso
  alternatives_spanish:
  - con todos los árboles de mirra de incienso
  - con toda clase de árboles de incienso
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente arbórea. Se conserva 'árboles de incienso' para no borrar la imagen poética ni sustituirla por una mera referencia a la resina.
- source_word: מֹר
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - mirra amarga
  lexicon: HALOT
  rationale: '''Mirra'' es el equivalente usual y fiel para el resin aroma.'
- source_word: אֲהָלוֹת
  english_pob_choice: aloes
  chosen_spanish: áloes
  alternatives_spanish:
  - agarwood
  - madera de águila
  lexicon: HALOT
  rationale: En contexto bíblico perfumado, no se trata de aloe vera medicinal. 'Áloes' conserva la forma tradicional y mantiene la tensión identificada por la POB; la identificación específica como madera aromática queda implícita por el contexto y no se desarrolla en el texto principal.
- source_word: רָאשֵׁי בְשָׂמִים
  english_pob_choice: the finest spices
  chosen_spanish: las mejores especias
  alternatives_spanish:
  - las especias principales
  - las especias más selectas
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'cabezas/principales de especias'. En español, 'las mejores especias' transmite con naturalidad el valor superlativo sin perder el matiz de selección.
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y también refleja la revisión inglesa que prefirió «all the trees of frankincense» sobre una paráfrasis más libre. Mantiene la enumeración poética y la imagen arbórea, a la vez que usa equivalentes españoles naturales para los aromas y especias.
  spanish_consistency_notes:
  - Se preservó el orden y la acumulación de la lista aromática.
  - Se evitó sustituir la imagen de «árboles de incienso» por una glosa explicativa dentro del texto principal.
  - «Áloes» se mantuvo como término bíblico tradicional, con nota aclaratoria por la posible confusión botánica.
  - No hay términos de alianza, cristología o eclesiología que requieran decisiones doctrinales aquí.
