base_translation:
  language: en
  yaml_path: translation/ot/amos/004/003.yaml
  text: And through the breaches you will go out[a], each woman straight ahead of her[b], and you will be cast out toward Harmon,” declares Yahweh.
  footnotes:
  - marker: a
    text: Or possibly “and you will be thrown to Harmon,” “to the fortress,” or “to Hermon.” The Hebrew הַהַרְמוֹנָה is obscure, and its precise referent is uncertain.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: “woman before/opposite her,” likely meaning each woman will go straight out through the breach in front of her.'
    reason: lexical_alternative
