  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La principal cuestión de alineación léxica es הַר: el inglés POB documenta «hill country» como opción principal por el contexto de viaje. En español conviene reflejar eso en el texto principal como «región montañosa», con «monte» en nota como alternativa, no al revés.'
