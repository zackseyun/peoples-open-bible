translation:
  language: es
  text: entonces, escucha en el cielo, el lugar donde habitas, perdona, actúa y da a cada hombre según todos sus caminos, cuyo corazón conoces, porque solo tú conoces el corazón de todos los hijos del hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “todos los hijos del hombre”, un modismo que designa a todos los seres humanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  english_pob_choice: may you hear
  chosen_spanish: oye
  alternatives_spanish:
  - puedas oír
  - oye, por favor
  lexicon: HALOT
  rationale: En una oración dirigida a Dios, el imperfecto hebreo funciona como ruego; en español, el imperativo/petición breve 'oye' conserva mejor el tono apelativo que una perífrasis más larga.
- source_word: הַשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - desde el cielo
  - en los cielos
  lexicon: HALOT
  rationale: El español natural para la frase apposicional siguiente es 'en el cielo'; mantiene el sentido locativo sin la rigidez de 'los cielos'.
- source_word: מְכ֤וֹן שִׁבְתֶּךָ
  english_pob_choice: the place where you dwell
  chosen_spanish: el lugar donde habitas
  alternatives_spanish:
  - tu lugar de morada
  - tu morada
  lexicon: HALOT
  rationale: מָכוֹן indica un lugar establecido/fijo; 'el lugar donde habitas' conserva la referencia locativa y evita una expresión demasiado pesada.
- source_word: וְסָלַחְתָּ
  english_pob_choice: and forgive
  chosen_spanish: perdona
  alternatives_spanish:
  - y perdonarás
  - y perdones
  lexicon: HALOT
  rationale: La secuencia continúa la súplica; en español, la forma exhortativa breve reproduce mejor el valor peticional que una futura simple.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and act
  chosen_spanish: actúa
  alternatives_spanish:
  - y haz
  - y intervén
  lexicon: HALOT
  rationale: El verbo es amplio ('hacer'); en este contexto oracional, 'actúa' expresa la respuesta divina sin especificarla en exceso.
- source_word: וְנָתַתָּ לָאִישׁ
  english_pob_choice: and give to each man
  chosen_spanish: y da a cada hombre
  alternatives_spanish:
  - y da a cada persona
  - y retribuye a cada hombre
  lexicon: HALOT
  rationale: La expresión es distributiva; 'cada hombre' conserva la fuerza singular-genérica de לָאִישׁ sin neutralizarla, en consonancia con la política de precisión de género del proyecto.
- source_word: כְּכָל דְּרָכָיו
  english_pob_choice: according to all his ways
  chosen_spanish: según todos sus caminos
  alternatives_spanish:
  - conforme a toda su conducta
  - según toda su manera de vivir
  lexicon: HALOT
  rationale: '''Caminos'' conserva el metaforismo bíblico de conducta y encaja bien con el español bíblico contemporáneo.'
- source_word: אֲשֶׁר תֵּדַע אֶת לְבָבוֹ
  english_pob_choice: whose heart you know
  chosen_spanish: cuyo corazón conoces
  alternatives_spanish:
  - al que conoces el corazón
  - cuyo interior conoces
  lexicon: HALOT
  rationale: La relativa se refiere naturalmente al individuo previo; 'corazón' preserva el valor antropológico de לֵבָב como sede de voluntad, pensamiento y disposición.
- source_word: לְבָב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: '''Corazón'' es el equivalente bíblico más fiel y mantiene la imagen antropológica del hebreo sin diluirla en una explicación abstracta.'
- source_word: לְבַדְּךָ
  english_pob_choice: you alone
  chosen_spanish: tú solo
  alternatives_spanish:
  - solo tú
  - tú únicamente
  lexicon: HALOT
  rationale: La expresión enfatiza exclusividad; 'tú solo' es idiomático y claro en español.
- source_word: כָּל בְּנֵי הָאָדָם
  english_pob_choice: all the sons of man
  chosen_spanish: todos los hijos del hombre
  alternatives_spanish:
  - toda la humanidad
  - todos los seres humanos
  lexicon: HALOT
  rationale: Se preserva la textura idiomática masculina del hebreo, con un español natural y reverente; no se neutraliza en el texto principal.
theological_decisions:
- issue: Expresión antropológica masculina en כָּל בְּנֵי הָאָדָם
  english_pob_reading: all the sons of man
  chosen_spanish_reading: todos los hijos del hombre
  alternative_spanish_readings:
  - toda la humanidad
  - todos los seres humanos
  rationale: El hebreo usa una fórmula masculina representativa; el texto principal conserva esa forma para no borrar la textura del original, mientras una nota aclara el sentido inclusivo.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם *adam* → man / humankind (context)'
- issue: Valor peticional de la serie verbal dirigida a Yahvé
  english_pob_reading: may you hear... and forgive, and act, and give
  chosen_spanish_reading: oye... perdona, actúa y da
  alternative_spanish_readings:
  - que oigas... y perdones, y actúes, y des
  - oye... y perdona, y haz, y da
  rationale: En una oración real, los verbos hebreos encadenados funcionan como súplica. El español opta por una serie exhortativa breve para conservar esa fuerza de petición sin volverla mecánica.
  doctrine_reference: DOCTRINE.md §Biblical Hebrew verbal semantics; Prayer language in narrative prose
translation_notes:
  revision_awareness: La versión inglesa auditada ajustó 'the heavens' a 'heaven' por naturalidad. La presente traducción sigue ese equilibrio con 'en el cielo', manteniendo la apposición 'el lugar donde habitas' y conservando la secuencia peticional del hebreo sin introducir explicaciones no presentes en el texto.
  spanish_consistency_notes:
  - Se mantuvo 'corazón' para לֵבָב, en consonancia con el uso bíblico proyectado por POB.
  - Se conservó la metáfora de 'caminos' para דְּרָכָיו, evitando explicitarla como 'conducta' en el texto principal.
  - Se preservó la fórmula masculina 'hijos del hombre' en el cuerpo y se aclaró el sentido inclusivo en nota.
  - Se usó 'Yahvé' no porque aparezca el Tetragrámaton en este versículo, sino para consistencia con el proyecto; aquí el texto dirige la oración a Dios de forma implícita sin necesidad de reemplazo terminológico.
