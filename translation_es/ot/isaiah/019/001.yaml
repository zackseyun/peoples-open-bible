base_translation:
  language: en
  yaml_path: translation/ot/isaiah/019/001.yaml
  text: 'An oracle concerning Egypt: Behold[a], Yahweh is riding on a swift cloud and is coming to Egypt; the idols of Egypt will tremble before him[c][b], and the heart of Egypt will melt within it.'
  footnotes:
