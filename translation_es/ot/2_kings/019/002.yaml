translation:
  language: es
  text: Y envió a Eliaquim, que estaba a cargo de la casa real, y a Sebná, el escriba, y a los ancianos de los sacerdotes, vestidos de cilicio[a], a Isaías el profeta[b], hijo de Amoz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubriéndose de cilicio». El participio hebreo puede destacar la acción de vestirse o el estado resultante.
    reason: lexical_alternative
  - marker: b
    text: «Que estaba a cargo de la casa real» designa un alto oficial real encargado del palacio o de la casa real.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: And he sent
  chosen_spanish: Y envió
  alternatives_spanish:
  - Entonces envió
  - Y mandó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se conserva con una coordinación simple en español. «Y envió» refleja el avance del relato sin añadir una temporalidad más fuerte que la del hebreo.
- source_word: אֲשֶׁר עַל הַבַּיִת
  english_pob_choice: who was over the household
  chosen_spanish: que estaba sobre la casa
  alternatives_spanish:
  - que estaba sobre la casa real
  - el administrador del palacio
  lexicon: HALOT
  rationale: Mantiene la estructura idiomática hebrea sin convertirla en un título más interpretativo. «Casa» conserva la metáfora institucional y evita reemplazarla por una explicación no explicitada en el texto.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el cronista
  lexicon: HALOT
  rationale: «Escriba» es el equivalente directo y más amplio para סֹפֵר. «Secretario» podría estrechar indebidamente el oficio; «cronista» añade una función no garantizada aquí.
- source_word: זִקְנֵי הַכֹּהֲנִים
  english_pob_choice: the elders of the priests
  chosen_spanish: los ancianos de los sacerdotes
  alternatives_spanish:
  - los ancianos sacerdotales
  - los principales sacerdotes
  lexicon: HALOT
  rationale: La construcción en hebreo distingue «ancianos» y «sacerdotes»; la traducción literal preserva esa relación. «Principales sacerdotes» fusionaría los dos sustantivos y perdería la forma del original.
- source_word: מִתְכַּסִּים בַּשַּׂקִּים
  english_pob_choice: clothed in sackcloth
  chosen_spanish: vestidos de cilicio
  alternatives_spanish:
  - cubiertos de cilicio
  - vistiendo cilicio
  lexicon: HALOT
  rationale: «Cilicio» transmite el atuendo de duelo y humillación con dignidad estilística en español bíblico. Como el participio puede describir el estado o la acción, «vestidos de» conserva bien el resultado visible sin forzar el matiz aspectual.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa naturalmente con «a» en español; «hacia» sería más perifrástico de lo necesario.
- source_word: יְשַׁעְיָהוּ הַנָּבִיא
  english_pob_choice: Isaiah the prophet
  chosen_spanish: Isaías el profeta
  alternatives_spanish:
  - Isaías, el profeta
  lexicon: HALOT
  rationale: Se conserva la aposición directa del hebreo sin añadir puntuación explicativa que no esté exigida por el texto. Es una forma clara y fiel en español.
- source_word: בֶּן אָמוֹץ
  english_pob_choice: the son of Amoz
  chosen_spanish: hijo de Amoz
  alternatives_spanish:
  - el hijo de Amoz
  lexicon: HALOT
  rationale: En español, el artículo es innecesario en la identificación genealógica y la forma breve suena más natural. No se pierde contenido semántico.
translation_notes:
  revision_awareness: Se siguió de cerca la lectura auditada del inglés POB, sin cambios de sentido sustanciales. La única tensión relevante es el participio מִתְכַּסִּים, que el inglés resuelve con una nota alternativa; en español se mantiene la misma apertura semántica mediante una nota equivalente.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma general de la serie, pero este versículo no contiene el Tetragrámaton.
  - «Escriba» se conserva por consistencia con el valor lexical de סֹפֵר.
  - «Cilicio» mantiene el registro bíblico y corresponde al sackcloth del texto fuente.
  - La sintaxis sigue el orden narrativo hebreo sin volverla excesivamente rígida en español.
