translation:
  language: es
  text: 'Entonces David envió mensajeros a los hombres de Jabés de Galaad y les dijo: «Benditos son ustedes por Yahvé[a], porque han mostrado esta bondad[b] a su señor, a Saúl, y lo han sepultado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Benditos son ustedes de parte de Yahvé». El hebreo usa una fórmula declarativa de bendición; la preposición puede expresarse en español de distintas maneras según el grado de literalidad e idiomaticidad.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo חֶסֶד (hesed): puede abarcar bondad, lealtad o amor fiel. Aquí se refiere al acto concreto de enterrar a Saúl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - ángeles
  - enviados
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de agentes humanos enviados por David, no de seres celestiales. «Mensajeros» conserva con naturalidad el sentido y el registro narrativo.
- source_word: אַנְשֵׁי יָבֵישׁ גִּלְעָד
  english_pob_choice: the men of Jabesh-gilead
  chosen_spanish: los hombres de Jabés de Galaad
  alternatives_spanish:
  - la gente de Jabés de Galaad
  - los varones de Jabés de Galaad
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino plural constructo. «Los hombres de» conserva esa forma sin neutralizarla, y «Jabés de Galaad» sigue el nombre propio habitual en español bíblico.
- source_word: בְּרֻכִים אַתֶּם לַיהוָה
  english_pob_choice: Blessed are you by Yahweh
  chosen_spanish: Benditos sean ustedes de Yahvé
  alternatives_spanish:
  - Benditos son ustedes de Yahvé
  - Sean ustedes benditos por Yahvé
  lexicon: HALOT
  rationale: La forma hebrea es un participio pasivo de bendición, no una mera petición. En español, «Benditos sean ustedes» preserva mejor la fuerza enunciativa/benedictoria que una paráfrasis optativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración, conforme al criterio del proyecto, en lugar de sustituirlo por un título enmascarado.
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - bondad leal
  - misericordia
  - fidelidad amorosa
  lexicon: HALOT
  rationale: En este caso חֶסֶד describe el acto concreto de enterrar a Saúl. «Bondad» comunica con claridad el gesto de lealtad y benevolencia sin sobrecargar el término con una glosa más técnica en el texto principal. La nota preserva la amplitud semántica del hebreo.
- source_word: אֲדֹנֵיכֶם
  english_pob_choice: your lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su soberano
  lexicon: HALOT
  rationale: Aquí Saúl es llamado con un título de autoridad y honor. «Su señor» refleja mejor ese valor relacional y político en español que «amo», que sería demasiado duro en este contexto.
- source_word: עִם שָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - con Saúl
  - para Saúl
  lexicon: HALOT
  rationale: El hebreo literal «con Saúl» se entiende naturalmente en el marco de la acción mostrada hacia Saúl. En español, «a Saúl» fluye mejor después de «esta bondad» sin perder el referente.
- source_word: וַתִּקְבְּרוּ אֹתוֹ
  english_pob_choice: and have buried him
  chosen_spanish: y lo han sepultado
  alternatives_spanish:
  - y lo enterraron
  - y lo han enterrado
  lexicon: HALOT
  rationale: «Sepultar» es una opción digna y plenamente natural en registro bíblico. Se conserva el aspecto perfecto/completado con «han sepultado», correspondiente al elogio de una acción ya realizada.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la norma del proyecto, se preserva el nombre propio divino como «Yahvé», en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de בְּרֻכִים אַתֶּם
  english_pob_reading: Blessed are you by Yahweh
  chosen_spanish_reading: Benditos sean ustedes de Yahvé
  alternative_spanish_readings:
  - Benditos son ustedes de Yahvé
  - Sean ustedes benditos por Yahvé
  rationale: La construcción es una declaración de bendición, no una simple invitación. Por eso se evita una forma que suene solo desiderativa y se mantiene el carácter declarativo del hebreo.
  doctrine_reference: Gramática hebrea del participio pasivo en fórmulas de bendición
translation_notes:
  revision_awareness: La revisión auditada del inglés cambió «May you be blessed by the LORD» a «Blessed are you by the LORD» para reflejar mejor el participio pasivo hebreo בְּרֻכִים. La versión española sigue esa decisión y evita una formulación meramente optativa. También se conserva el nombre divino como Yahvé, conforme al criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Se conserva el masculino plural explícito en «los hombres de Jabés de Galaad».
  - «Sepultado» mantiene un registro digno y bíblico, sin añadir matices no presentes en el hebreo.
  - La nota sobre חֶסֶד preserva la amplitud semántica sin cargar el texto principal.
