translation:
  text: 'Take hold of yourselves[a];

    for your inside is your outside[c][b],

    and the one who fashions your outside

    is the one who shaped it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase ‘made him a pattern’ renders ⲣⲧⲩⲡⲟⲥ ⲙⲙⲟϥ (τύπος), which can also
      mean ‘imprinted’ or ‘stamped’; elsewhere in Thunder this semantic field overlaps
      with ‘seal.’
    reason: lexical_alternative
  - marker: b
    text: ⲛⲥⲁⲃⲟⲗ is read here as ⲛⲥⲃⲱⲗ ‘in endurance/patience’; damaged spacing may
      conceal the long vowel or double consonant.
    reason: alignment_note
  - marker: c
    text: Or 'I appeared among you;\nfor the one who endures is wise,\nand the one
      who molded you in endurance—\nhe made him a pattern.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲙⲁϩⲧⲉ
  chosen: appeared
  alternatives:
  - stood
  - was made visible
  lexicon: Crum; common Sahidic verb meaning appear/stand forth
  rationale: Fits Thunder’s manifestation motif and governs the following dative/locative
    phrase; preserves epiphanic tone rather than static posture.
- source_word: ⲙⲙⲱⲧⲛ
  chosen: among you
  alternatives:
  - to you
  - with you
  lexicon: Crum s.v. ⲙⲙⲱⲧ ‘in the midst of’ + 2pl pronominal suffix
  rationale: Locative/‘in the midst of’ sense suits the speaker’s presence among hearers;
    ‘to you’ is possible but less congruent with Thunder’s self-presence.
- source_word: ⲥⲁϩⲟⲩⲛ
  chosen: wise
  alternatives:
  - prudent
  - sensible
  lexicon: Crum; standard adjective for wisdom/prudence
  rationale: Plain sense; keeps gnomic tone of the clause.
- source_word: ⲅⲁⲣ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: Greek loanword γὰρ
  rationale: Connective marking reason; ‘for’ retains paratactic flow.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - also
  lexicon: Common Coptic coordinator
  rationale: Simple additive linkage.
- source_word: ⲣⲡⲗⲁⲥⲥⲉ
  chosen: molded
  alternatives:
  - formed
  - fashioned
  lexicon: Greek loanword from πλάσσω
  rationale: ‘Molded’ evokes craftsman imagery; aligns with creation/forming semantics
    present in Thunder’s body-making motifs.
- source_word: ⲛⲥⲃⲱⲗ (read from ⲛⲥⲁⲃⲟⲗ)
  chosen: in endurance
  alternatives:
  - in patience
  - to endure
  lexicon: Crum s.v. ⲥⲃⲱⲗ ‘to bear, endure; patience’
  rationale: Prepositional n- + noun/infinitive yields adverbial ‘in endurance’; patience/endurance
    nuance is central to the gnomic statement.
- source_word: ⲣⲧⲩⲡⲟⲥ
  chosen: made … a pattern
  alternatives:
  - imprinted
  - stamped
  - made a type
  lexicon: Greek loanword τύπος ‘mark, impression, pattern, type’
  rationale: With object pronoun ⲙⲙⲟϥ, construction reads ‘make him a τύπος’; ‘pattern’
    is intelligible while preserving the imprint/typology field. ‘Imprinted’/‘stamped’
    noted as alternatives.
- source_word: ⲙⲙⲟϥ
  chosen: him
  alternatives:
  - it
  lexicon: 3ms object pronoun
  rationale: Default 3ms referent; antecedent likely ‘the (one) formed’ (human), though
    context may shift; we avoid supplying ‘you’ or ‘his’ not in the line.
parallelism_check: 'This block is less antithetical than adjacent ‘I am’ pairs. It
  maintains parallel craft imagery: ‘the one who endures is wise’ // ‘the one who
  molded you in endurance’ (endurance echoed), climaxing with ‘made him a pattern.’
  The internal echo on endurance supplies cohesion in lieu of explicit paradox.'
voice_check: First-person epiphanic opening (‘I appeared among you’) preserves Thunder’s
  speaking voice addressing a plural audience. Subsequent gnomic relative clauses
  maintain authoritative, aphoristic tone without domesticating into explanatory prose.
alignment_risk_note: Alignment confidence is only medium, and the OCR shows probable
  line-break and vowel-loss issues (e.g., ⲛⲥⲁⲃⲟⲗ read as ⲛⲥⲃⲱⲗ; possible doubling
  in ⲡⲉⲧⲛⲡⲉⲧⲛ). I read ⲁⲙⲁϩⲧⲉ ⲙⲙⲱⲧⲛ as ‘I appeared among you’ (epiphanic aorist +
  locative), and take ⲣⲡⲗⲁⲥⲥⲉ … ⲛⲥⲃⲱⲗ ⲙⲙⲱⲧⲛ as ‘molded you in endurance.’ The closing
  ⲛⲧⲁϥⲣⲧⲩⲡⲟⲥ ⲙⲙⲟϥ is construed as ‘he made him a pattern.’ The consult mentions ‘seal,’
  which could map to τύπος (imprint) in sense, but σφραγίς is not visible here; thus
  I avoid adding ‘seal’ or ‘my’ absent in the OCR. Pronoun antecedents (especially
  ⲙⲙⲟϥ) remain uncertain.
