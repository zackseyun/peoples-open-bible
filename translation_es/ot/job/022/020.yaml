translation:
  language: es
  text: Ciertamente nuestros adversarios[a] han sido destruidos, y el fuego ha consumido lo que quedaba de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros opositores»; también puede entenderse «nuestros bienes» o «nuestras posesiones», ya que el hebreo קִימָנוּ es difícil.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - Sin duda
  - De veras
  lexicon: HALOT
  rationale: En este uso, la expresión no introduce una condición real sino una afirmación enfática. «Ciertamente» reproduce bien el valor aseverativo en español sin sonar forzado.
- source_word: נִכְחַד
  english_pob_choice: have been cut off
  chosen_spanish: han sido cortados
  alternatives_spanish:
  - han sido destruidos
  - han perecido
  - han sido eliminados
  lexicon: HALOT
  rationale: El nifal de כחד comunica la idea de ser borrado, eliminado o apartado. «Han sido cortados» conserva la fuerza pasiva/resultativa y el matiz de remoción definitiva.
- source_word: קִימָנוּ
  english_pob_choice: our adversaries
  chosen_spanish: nuestros adversarios
  alternatives_spanish:
  - nuestros opositores
  - nuestra substancia
  - nuestros que se levantaron
  lexicon: HALOT
  rationale: La forma consonántica es difícil y admite varias lecturas. En el contexto, la lectura que apunta a personas hostiles u opositores encaja mejor con la cláusula paralela sobre el resto consumido por fuego.
- source_word: וְיִתְרָם
  english_pob_choice: what was left of them
  chosen_spanish: lo que quedaba de ellos
  alternatives_spanish:
  - su remanente
  - lo que les quedaba
  - su resto
  lexicon: HALOT
  rationale: יתר expresa lo que permanece o queda. «Lo que quedaba de ellos» mantiene la idea de remanente con naturalidad en español.
- source_word: אָכְלָה אֵשׁ
  english_pob_choice: fire has consumed
  chosen_spanish: el fuego ha consumido
  alternatives_spanish:
  - el fuego devoró
  - un fuego consumió
  lexicon: HALOT
  rationale: La combinación de אכל con אש como sujeto es un giro idiomático de destrucción por consumo. «Ha consumido» preserva la imagen vívida y el sentido destructivo.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el criterio óptimo-equivalente reflejado en el POB inglés. Se conserva la ambigüedad documentada de קִימָנוּ mediante nota, mientras que la cláusula final se traduce con un giro natural en español que mantiene la imagen de consumo por fuego.
  spanish_consistency_notes:
  - Se usa «Ciertamente» para la partícula aseverativa אִם לֹא en lugar de una condicional literal.
  - Se mantiene «Dios»/«Yahvé» fuera del versículo porque no aparecen en el texto.
  - 'Se evita «SEÑOR» y se preserva la imaginería concreta del hebreo: corte/consumo/fuego.'
  - «Adversarios» se eligió por encajar mejor con el contexto que una lectura material como «substancia», pero la alternativa queda señalada en nota.
