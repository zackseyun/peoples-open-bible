    rationale: La auditoría inglesa conserva una alternativa para el verbo final (‘recline/rest’) y registra además la historia de traducción entre ‘wash your feet’ y ‘rest yourselves’. En español conviene notar la alternativa del verbo final en el lugar correspondiente, no moverla a «los pies».
  revised_spanish_text: Por favor, que se traiga un poco de agua, y lávense los pies, y recuéstense[a] bajo el árbol.
