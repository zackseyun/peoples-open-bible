translation:
  language: es
  text: 'Y di: «Así dice el Señor Yahvé: ¡Ay de las mujeres que cosen cintas[a] sobre cada muñeca[b], y hacen velos[c] para las cabezas de personas de toda estatura, para cazar almas[d]! ¿Cazarán las almas[d] de mi pueblo y mantendrán vivas sus propias almas[d]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «bandas», «brazaletes» o, tradicionalmente, «almohadillas» para el raro término hebreo כְּסָתוֹת.
    reason: lexical_alternative
  - marker: b
    text: O «sobre cada brazo», «sobre cada articulación del brazo» o «sobre cada muñeca», para el raro hebreo אַצִּילֵי יָדַי.
    reason: lexical_alternative
  - marker: c
    text: O «coberturas» o «pañuelos» para el raro término hebreo הַמִּסְפָּחוֹת.
    reason: lexical_alternative
  - marker: d
    text: El hebreo נְפָשׁוֹת también puede significar «vidas» o «personas» aquí; se mantiene «almas» en el texto principal para preservar la repetición y la fuerza retórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: En español conviene conservar el título compuesto sin reemplazar YHWH por una máscara como «SEÑOR». «Señor Yahvé» refleja el valor del hebreo אֲדֹנָי יְהוִה y mantiene la distinción entre el título y el nombre divino.
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay,
  lexicon: HALOT
  rationale: La exclamación profética en español puede expresarse con «¡Ay!» para conservar tanto el lamento como el juicio; luego el complemento «de las mujeres...» desarrolla la denuncia.
- source_word: לִמְתַפְּרוֹת
  english_pob_choice: to the women who sew
  chosen_spanish: las mujeres que cosen
  alternatives_spanish:
  - las que cosen
  - las costureras
  lexicon: HALOT
  rationale: El participio femenino plural señala explícitamente a mujeres; «que cosen» conserva el sentido verbal directo sin introducir oficio no atestiguado por la fuente.
- source_word: כְּסָתוֹת
  english_pob_choice: bands
  chosen_spanish: cintas
  alternatives_spanish:
  - bandas
  - brazaletes
  - almohadillas
  lexicon: HALOT
  rationale: El término es raro y admite varias soluciones. «Cintas» es neutral y acepta el uso físico de algo cosido sobre las muñecas sin añadir la interpretación de «mágico», que fue descartada en la revisión inglesa por exceder la evidencia.
- source_word: עַל כָּל אַצִּילֵי יָדַי
  english_pob_choice: on every wrist
  chosen_spanish: sobre todas las muñecas de mis manos
  alternatives_spanish:
  - sobre todas las muñecas
  - sobre cada muñeca de mis manos
  - sobre todos los codos de mis manos
  lexicon: HALOT
  rationale: אַצִּיל puede abarcar el área del brazo/muñeca/codo; en español «muñecas» comunica bien el lugar de colocación. Se mantiene el plural distributivo con «todas» y la referencia a «mis manos» para reflejar el hebreo. La formulación suena algo extraña, pero preserva la imagen corporal del original.
- source_word: וְעֹשׂוֹת הַמִּסְפָּחוֹת
  english_pob_choice: and make veils
  chosen_spanish: y hacen velos
  alternatives_spanish:
  - y hacen cobertores
  - y hacen pañuelos
  - y hacen cubiertas
  lexicon: HALOT
  rationale: El sustantivo raro se relaciona con una pieza de cobertura. «Velos» es comprensible y mantiene el objeto confeccionado, como en el inglés auditado.
- source_word: עַל רֹאשׁ כָּל קוֹמָה
  english_pob_choice: for the heads of persons of every height
  chosen_spanish: para la cabeza de toda estatura
  alternatives_spanish:
  - para las cabezas de toda estatura
  - para la cabeza de toda persona
  - para las cabezas de personas de toda estatura
  lexicon: HALOT
  rationale: «קוֹמָה» alude a estatura/altura. La frase española conserva la imagen concreta; el singular colectivo «la cabeza» sigue la lectura natural, pero se reconoce la pluralidad semántica del hebreo en el dato de estatura.
- source_word: לְצוֹדֵד נְפָשׁוֹת
  english_pob_choice: to hunt souls
  chosen_spanish: para cazar almas
  alternatives_spanish:
  - para cazar vidas
  - para atrapar personas
  - para cazar personas
  lexicon: HALOT
  rationale: «Cazar» reproduce el valor de acechar/atrapar con fuerza denunciatoria. «Almas» mantiene la repetición del hebreo y la carga espiritual del pasaje, aunque en otras lecturas podría decirse «vidas» o «personas».
- source_word: הַנְּפָשׁוֹת תְּצוֹדֵדְנָה לְעַמִּי
  english_pob_choice: Will you hunt the souls of my people
  chosen_spanish: ¿Cazarán las almas de mi pueblo
  alternatives_spanish:
  - ¿Cazarán las vidas de mi pueblo
  - ¿Atraparán las almas de mi pueblo
  - ¿Cazarán las personas de mi pueblo
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica y la repetición de נֶפֶשׁ con «almas». El futuro español funciona como interrogación retórica equivalente al hebreo en contexto de reprensión.
- source_word: וּנְפָשׁוֹת לָכֶנָה תְחַיֶּינָה
  english_pob_choice: and keep your own souls alive
  chosen_spanish: y mantendrán vivas sus propias almas
  alternatives_spanish:
  - y mantendrán vivas sus propias vidas
  - y se conservarán vivas
  lexicon: HALOT
  rationale: La última cola contrapone lo que destruyen con lo que preservan para sí. «Sus propias almas» conserva la recurrencia léxica de נֶפֶשׁ y la ironía acusatoria del texto.
theological_decisions:
- issue: Cómo traducir נֶפֶשׁ en un contexto de denuncia profética y manipulación
  english_pob_reading: souls
  chosen_spanish_reading: almas
  alternative_spanish_readings:
  - vidas
  - personas
  rationale: Aunque נֶפֶשׁ puede significar vida o persona, aquí la repetición retórica y el tono de acusación permiten mantener «almas» para no perder la fuerza verbal y espiritual del pasaje. Se deja constancia de las alternativas semánticamente válidas.
  doctrine_reference: Consistencia de término clave con tensión semántica preservada; no neutralizar el efecto retórico.
- issue: Designación del nombre divino en español
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: La política del proyecto pide usar «Yahvé» en lugar de ocultar el nombre divino. En la combinación con אֲדֹנָי, «el Señor Yahvé» mantiene la estructura del título compuesto de forma clara y reverente.
  doctrine_reference: Convención editorial del proyecto para יהוה / YHWH.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: elimina la expansión interpretativa «mágico» y refleja el ajuste de plural en la imagen de la cabeza/estatura. También mantiene la tensión léxica de נֶפֶשׁ y evita mecanizar el inglés donde el hebreo permite una imagen corporal más concreta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para YHWH.
  - «Almas» se mantiene en todo el versículo para preservar la repetición de נֶפֶשׁ.
  - 'Se prefieren soluciones neutras y auditables para términos raros: «cintas», «velos».'
  - La puntuación reproduce el tono profético con comillas y preguntas retóricas claras.
